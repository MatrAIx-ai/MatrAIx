  career_goals: Looking ahead, Barbara aims to advance to an HR Director or senior HR Business Partner role within the next five years, overseeing strategic workforce planning for a mid-size organization
    in the New Jersey tri-state area. She plans to obtain the SHRM-Senior Certified Professional (SHRM-SCP) credential and to lead a company-wide diversity, equity, and inclusion initiative that builds
    on her strength in creating harmonious work environments. Additionally, she aspires to mentor emerging HR professionals, and eventually launch a boutique consulting practice that helps small local businesses
    establish compliant, streamlined HR systems.
