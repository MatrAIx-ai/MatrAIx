    board games with friends'']'
  career_goals: Regina aspires to pursue a career that blends her curiosity about human behavior with her desire to help others feel secure and supported. She is interested in studying psychology or social
    work in college, with a long‑term goal of becoming a school counselor or youth mental‑health advocate. She also dreams of integrating her practical mindset by developing community wellness programs
    that combine mental‑health education with environmental stewardship, reflecting her love for Colorado's outdoors.
