persona_description: A member of the Santa Barbara County Search and Rescue Team who is responsible for coordinating the location of Emergency Locating Beacons (ELT) and Personal Locator Beacons (PLB) in
  the county, and for tracking down the specific signal by triangulating on the signal and determining if it's a real plane crash requiring additional EMS services. They are likely to be trained in aviation
  safety, emergency response, and satellite communication. They possess strong analytical and problem-solving skills, as well as knowledge of emergency response protocols and procedures. They are also likely
  to be familiar with the latest technologies and trends in emergency response, and to be able to use this knowledge to coordinate the search and rescue efforts effectively.
