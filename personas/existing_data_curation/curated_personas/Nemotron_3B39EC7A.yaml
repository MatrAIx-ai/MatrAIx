  hobbies: '[''Reading sci‑fi and fantasy novels'', ''Hiking in the Santa Cruz Mountains'', ''Coding simple video games'', ''Playing acoustic guitar'', ''Digital photography'', ''Volunteering at the local
    animal shelter'', ''Cooking family recipes (including Portuguese dishes)'', ''Participating in robotics club (FIRST LEGO League)'']'
  career_goals: Elisa aspires to pursue a career in technology, ideally as a software engineer or product developer focused on educational tools that blend curiosity with practical application. In the short
    term, she aims to secure a spot in a prestigious summer coding camp, win a regional science‑fair award with a project that uses data analysis to address a local environmental issue, and obtain a mentorship
    or internship with a nearby tech startup. Long‑term, she plans to attend a top university such as Stanford or UC Berkeley to study computer science, then work on products that make learning more accessible
    while giving back to her community through volunteer‑driven tech initiatives.
