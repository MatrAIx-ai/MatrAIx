personas:
  professional: Elisa Fernandes is an aspiring software engineer who leads her school's FIRST LEGO League robotics team, leveraging her strong Python programming and spreadsheet analytics skills while they
    apply their methodical planning and reliable teamwork to drive projects from concept to competition-ready prototypes.
  sports: Elisa Fernandes combines weekend treks through the Santa Cruz Mountains with after‑school practices for the Los Gatos High girls’ soccer team, avidly follows the San Jose Earthquakes and Sharks,
    and logs her workouts in a Google Calendar, treating each hike as a data point for their personal performance tracker.
  arts: Elisa Fernandes spends evenings strumming acoustic versions of John Mayer and Bon Iver while curating a digital photography portfolio inspired by Ansel Adams, and draws narrative inspiration from
    the fantasy worlds of J.R.R. Tolkien and N.K. Jemisin for their Python‑based interactive story projects.
  travel: Elisa Fernandes prefers meticulously planned road trips, having already camped in Yosemite and explored the coastal cliffs of Big Sur, and dreams of a future exchange semester in Lisbon to experience
    the city where their family’s saint‑day celebrations originated.
  culinary: Elisa Fernandes enjoys cooking traditional bacalhau à Brás with her parents on saint’s days, experiments with avocado‑lime quinoa bowls for lunch, and alternates between precise recipe following
    and spontaneous flavor pairings when they freestyle their own pesto‑marinated chicken dishes.
  core: Elisa Fernandes is a methodical teen tech enthusiast who balances her love for coding, guitar, and hiking with a disciplined budget and a knack for turning family traditions into creative projects,
    which they pursue with quiet determination.
background:
  cultural: Elisa is a white American with Portuguese ancestry, raised in the affluent, tech‑oriented suburb of Los Gatos, California. Her family blends mainstream American customs with occasional Portuguese
    traditions—celebrating saint’s days, preparing dishes like bacalhau, and speaking Portuguese at home. Growing up in Silicon Valley, she is immersed in a culture that values academic achievement, innovation,
    and outdoor recreation, while her school environment offers exposure to a diverse student body. This mix of progressive Californian lifestyle, community‑service orientation, and Portuguese‑American
    heritage shapes her worldview and personal identity.
