  career_goals: Enrique aims to leverage his analytical expertise to become a senior systems architect within the next five years, guiding cross‑functional teams on complex digital transformation projects.
    He plans to earn a bachelor's degree in Information Technology and obtain certifications such as PMP and CISSP to broaden his strategic and security competencies. Ultimately, he aspires to lead initiatives
    that improve system resilience and user experience while fostering a collaborative, inclusive workplace that supports mental‑health awareness for himself and his colleagues.
