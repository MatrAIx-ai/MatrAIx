  reviews, and tips for using iPads, Google Apps, and other devices to engage digital learners in all curriculum areas. Erin is known for her creativity in using Pic Collage to add Emojis to projects and
  has a unique approach to using technology in the classroom. She has a special interest in integrating digital citizenship and digital citizenship education into her lessons.
