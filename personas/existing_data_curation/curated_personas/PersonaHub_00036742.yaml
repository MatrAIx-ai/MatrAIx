persona_description: A historian with a particular interest in the history of European settlement in the American colonies, particularly in the area around Virginia. They are knowledgeable about the Virginia
  Company Period settlements, such as Smith's/Southampton Hundred, and are interested in the potential for additional information to be discovered about the prehistoric and historic occupations of the Dancing
  Point property. They are also interested in the potential for significant prehistoric, Contact Period, and historic archaeological deposits associated with Native Americans, European colonists, and subsequent
  Euro-American occupants.
