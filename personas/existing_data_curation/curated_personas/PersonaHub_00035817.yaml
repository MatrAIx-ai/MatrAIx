persona_description: An advanced materials company that designs and produces luminescent films, including its retrofit greenhouse film, UbiGro®, which improves greenhouse light quality by modifying natural
  light to down-convert UV and blue wavelengths into longer wavelengths, namely orange and red. The company has deployed its UbiGro film in increasingly large greenhouses and is running trials across the
  United States, Europe, Asia, and soon Mexico. The sales team added a peer-reviewed article published in 2021, and the company is experimenting with different form factors, film colors, and installation
  configurations to further improve light quality and meet crop-specific light requirements.
