personas:
  professional: Erin Hinton is an aspiring junior visual storyteller who blends hand‑drawn doodles with digital Minecraft builds, using their curiosity about Indianapolis street murals to craft colorful
    narratives that enthrall classmates during library storytime.
  sports: Erin Hinton is a lively backyard field‑general who captains neighborhood tag and kickball games, plays on the Indianapolis YMCA's U‑10 soccer team, and fervently roots for the Indiana Pacers and
    Indianapolis Colts during weekend broadcasts.
  arts: Erin Hinton is an enthusiastic creator who transposes the bold lines of Indianapolis murals and Banksy‑style street art into sketchbooks, devours graphic novels by Raina Telgemeier and Noelle Stevenson,
    dances to Lizzo and BTS beats, and showcases impromptu skits at church youth nights, weaving their love of color and story into everyday play.
  travel: Erin Hinton is an adventurous family traveler who has wandered through the Children’s Museum of Indianapolis, taken a weekend road‑trip to see the murals at the Art Institute of Chicago, and dreams
    of camping in the Great Smoky Mountains, preferring spontaneous day‑trips over rigidly planned vacations.
  culinary: Erin Hinton is a budding kitchen helper who loves pepperoni pizza, rainbow fruit salads featuring strawberries and blueberries, and whipping up cheesy quesadillas, often improvising with glittery
    cupcake frosting after arts‑and‑crafts sessions.
  core: Erin Hinton is a curious, chatty ten‑year‑old who turns every hallway into a gallery, every allowance into a spontaneous art fund, and every backyard into a stage, all while juggling a shoebox of
    saved coins and a handful of allergy pills.
background:
  cultural: Erin is part of a close‑knit African‑American family in Indianapolis. Her family celebrates traditions such as Sunday gospel services, soul‑food gatherings, and holiday events like Juneteenth
    celebrations that highlight Black history and culture. She is exposed to the rich heritage of the local Black community through visits to the Indiana Black Film Center, local jazz clubs, and community
    art programs that showcase African‑American artists. Her parents emphasize the importance of education, community service, and cultural pride, encouraging Erin to explore her artistic talents while
    staying connected to her roots.
