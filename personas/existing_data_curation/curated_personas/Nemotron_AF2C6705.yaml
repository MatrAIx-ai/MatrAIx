  career_goals: Erin dreams of becoming a creative professional who can blend art, storytelling, and community engagement. She hopes to one day be a children's illustrator or a multimedia artist who designs
    interactive stories for kids. She also envisions leading after‑school art workshops that bring together children from diverse backgrounds, fostering a love of creativity and cultural expression. In
    the near term, she aims to develop a personal portfolio of illustrations, learn more about coding to create animated stories, and possibly host a small podcast or video series sharing her art and stories
    with friends.
