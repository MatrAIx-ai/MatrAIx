persona_description: A historian who is interested in the history of the world and the experiences of travelers, particularly those who have travelled extensively in India, the Middle East, and Africa.
  They are knowledgeable about the works of Al-Masudi, who is known as the 'Herodotus of the Arabs' and wrote a 30-volume history of the world. They are also interested in the concepts and theories related
  to history and geography, such as those developed by Al-Masudi, and are likely to have a deep understanding of the history and geography of the Middle East, India, and Africa.
