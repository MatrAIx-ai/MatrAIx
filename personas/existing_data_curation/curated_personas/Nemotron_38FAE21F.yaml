  hobbies: '[''Drawing/Sketching'', ''Watercolor painting'', ''Digital illustration on tablet'', ''Reading fantasy and adventure books'', ''Visiting art museums'', ''Crafts (origami, friendship bracelets)'',
    ''Collecting rocks and leaves'', ''Building with LEGO'', ''Scratch programming'', ''Journaling'', ''Listening to music (indie pop)'', ''School drama club'']'
  career_goals: Sarah dreams of becoming an illustration artist or animator, possibly working for a children's book publisher or a museum where she can combine her love of art and storytelling. She hopes
    to study environmental science later to help protect nature and envisions a future as an art therapist or museum educator, mixing her artistic talent with a desire to support others. In the short term,
    she aims to improve her artistic techniques, build a personal portfolio, and participate in school art competitions.
