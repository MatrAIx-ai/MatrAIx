personas:
  professional: An aspiring young visual storyteller, Sarah Weir blends hand‑drawn character sketches with digital illustrations on a tablet, infusing each piece with the whimsical flair of fantasy novels
    and the experimental spirit of Scratch coding, though they have a relaxed attitude toward deadlines that often results in charmingly messy sketchbooks and spontaneous bursts of creativity.
  sports: An enthusiastic after‑school athlete, Sarah Weir plays midfield for the Oak Grove Community Soccer Club (U12) and cheers for the Chicago Cubs during baseball season, but they prefer flexible,
    unstructured play, often opting for spontaneous nature hikes with their rock collection rather than regimented team drills.
  arts: A budding arts aficionado, Sarah Weir draws inspiration from the whimsical illustrations of Shaun Tan and the delicate watercolors of John Singer Sargent, while humming to indie pop staples like
    Tegan and Sara and crafting friendship bracelets that rival the intricate folds of origami masters such as Akira Yoshizawa, all of which fuels their imaginative contributions to the school drama club,
    and they often share their creations during rehearsals.
  travel: An adventurous daydreamer, Sarah Weir has wandered the halls of the Smithsonian National Air and Space Museum in Washington, D.C., collected leaf specimens in the Redwood forests of California,
    and dreams of sipping matcha tea while sketching cherry blossoms in Kyoto, Japan, preferring spontaneous nature walks over rigid itineraries yet they always keep a travel journal to capture fleeting
    impressions.
  culinary: A budding food explorer, Sarah Weir loves munching on strawberry‑banana smoothies, crafting homemade pizza topped with artichoke hearts and mozzarella, and experimenting with rainbow fruit kebabs
    made of pineapple, blueberries, and kiwi, though they sometimes forget to eat lunch, opting for a quick bag of granola bars instead.
  core: An imaginative, slightly scatterbrained 11‑year‑old, Sarah Weir merges art, code, and curiosity into a vivid world while they quietly wrestle with frequent worries.
background:
  cultural: Sarah is raised in Dallas, Texas, within a predominantly white, middle‑class American family. She experiences the blend of Southern hospitality, Texan traditions such as attending the State
    Fair and enjoying barbecue, and the multicultural environment of the Dallas metro area, where she is exposed to Hispanic and African‑American cultural influences through school and community events.
    Her family celebrates holidays like Christmas, Thanksgiving, and Halloween, and she participates in local community activities such as school field trips to museums, art workshops, and neighborhood
    festivals. This cultural mix nurtures her curiosity about different perspectives while grounding her in a supportive, family‑centric upbringing.
