  hobbies: '[''Cooking traditional dishes'', ''Gardening'', ''Walking on the beach'', ''Reading historical fiction and biographies'', ''Attending cultural festivals'', ''Calligraphy'', ''Quilting'', ''Listening
    to classic Chinese instrumental music'']'
  career_goals: Although retired from formal employment, Jing aims to deepen her contribution to the San Diego senior community by mentoring younger volunteers and preserving her cultural heritage. She
    intends to compile a family cookbook that blends classic recipes with modern twists, and to share it through workshops at the local cultural center. Jing also hopes to serve on the neighborhood council's
    aging‑in‑place committee, advocating for accessible public spaces. Personally, she aspires to maintain her health through regular walks on the beach and to travel to her native region for a reunion
    with extended family.
