  career_goals: Russell dreams of a future where he can create and solve problems in a structured environment. He aspires to become a mechanical or robotics engineer, fascinated by how machines work and
    how designs can be tested repeatedly. He also imagines himself as a computer programmer who writes clear, logical code. His ambition is to pursue a career that offers predictability, tangible results,
    and the ability to contribute useful inventions to his community.
