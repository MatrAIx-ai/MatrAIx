personas:
  professional: Russell Cherry, an organized 7‑year‑old aspiring engineer, channels their love of LEGO, jigsaw puzzles and after‑school robotics into sketching precise invention designs and leading small,
    rule‑bound project teams with meticulous planning.
  sports: Russell Cherry, an organized 7‑year‑old swimmer, spends weekends perfecting strokes at the community swim club under a strict training schedule, follows the predictable rules of lap counting,
    and passionately roots for the local Springfield Sluggers baseball team, finding comfort in the clear structure of both activities.
  arts: Russell Cherry, a methodical 7‑year‑old who loves drawing precise invention sketches, finds inspiration in the structured melodies of Johann Sebastian Bach and the cinematic scores of Hans Zimmer,
    and often watches the animated craft series "Makers" on YouTube for creative ideas.
  travel: Russell Cherry, a 7‑year‑old who thrives on well‑planned itineraries, enjoys family trips to Legoland California where they can build massive brick structures, and dreams of visiting the Smithsonian
    National Air and Space Museum in Washington, D.C., appreciating the orderly layout of each exhibit.
  culinary: Russell Cherry, a 7‑year‑old with a penchant for structured meals, prefers the familiar comfort of spaghetti Bolognese and chicken nuggets, delights in assembling DIY mini‑pizzas with exact
    topping patterns, and often asks for the bright orange carrot sticks from their favorite veggie tray.
  core: Russell Cherry is an organized, detail‑driven 7‑year‑old who finds joy in building, planning, and mastering structured activities, while quietly wrestling with a persistent undercurrent of worry.
background:
  cultural: Russell is a Black child raised in New Haven, Connecticut, within a close‑knit African‑American family that emphasizes education, community involvement, and cultural pride. His family attends
    Sunday services at a local church, celebrates Juneteenth and other heritage events, and shares meals that include traditional soul food dishes. He participates in community programs at the neighborhood
    center and the public library, where he enjoys storytime and after‑school activities. Stories of local civil‑rights leaders and family history are part of his upbringing, fostering a sense of responsibility
    and connection to his cultural roots.
attributes:
  skills: '[''Reading simple chapter books'', ''Basic addition and subtraction'', ''Following multi-step instructions'', ''Constructing detailed LEGO models'', ''Organizing school materials'', ''Maintaining
