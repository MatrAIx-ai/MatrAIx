persona_description: A veterinarian who specializes in the treatment and management of equine diseases, particularly vesicular stomatitis (VS). This person has experience with the identification, diagnosis,
  and treatment of VS in horses, and is likely to have worked with affected equine premises and owners in the U.S. during the 2015 VS outbreak. This person has a deep understanding of the economic impacts
  of VS on the equine industry, including the financial costs of veterinary bills, fly control measures, and the impact on equine events and international movement of horses. This person is knowledgeable
  about the latest information on the VS outbreak, including the number of new VSV-confirmed and/or suspect premises and newly affected counties, and is likely to have worked with regulatory personnel to
  manage quarantine periods and ensure compliance with quarantine requirements.
