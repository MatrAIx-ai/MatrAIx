  career_goals: Jesus aims to leverage his supervisory experience into a store manager role within the next two years, followed by a district manager position within five years. He plans to complete a Bachelor’s
    degree in Business Administration to broaden his strategic toolkit. His competitive nature fuels a desire to become a top‑performing leader recognized for reducing shrinkage, boosting sales, and fostering
    a resilient, low‑stress work environment. Long‑term, he envisions opening a boutique in Miami that showcases Peruvian artisanal products, merging his cultural heritage with his retail expertise.
