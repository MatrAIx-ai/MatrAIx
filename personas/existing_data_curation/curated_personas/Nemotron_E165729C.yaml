personas:
  professional: Nelly Sanchez is a charismatic teenage performer who shines as the lead improviser in her middle school drama club, channeling her quick wit and empathy to keep the cast cohesive, while
    her love for routine pushes her to rehearse lines diligently despite occasional forgetfulness about props.
  sports: Nelly Sanchez enjoys weekend soccer practices with the local Youth Sprinters club and cheers for the nearby high school Hawks football team, while she also follows the national NBA squad the Golden
    State Warriors, but prefers low-impact dance workouts over intense cardio due to her anxiety.
  arts: Nelly Sanchez pours her energy into singing pop anthems by Ariana Grande and performing traditional folk melodies her family enjoys, while she sketches vibrant scenes inspired by her favorite Disney
    animated films and idolizes Broadway star Lin-Manuel Miranda for his storytelling flair.
  travel: Nelly Sanchez loves family road trips to the Grand Canyon and summer camps at Lake Tahoe, dreams of a future adventure to Tokyo's Harajuku district, and always plans trips with a detailed itinerary
    but leaves room for spontaneous ice-cream stops.
  culinary: Nelly Sanchez whips up spicy chicken tacos with homemade guacamole and can perfectly melt cheese for quesadillas, yet her kitchen skills are limited to quick snacks like Nutella toast and rainbow
    fruit smoothies, and she often snacks on chips while rehearsing.
  core: Nelly Sanchez is a sociable, drama-loving teen who balances a love for structured rehearsal routines with occasional anxiety-driven impulsivity, turning compassion into community service while chasing
    pop beats and taco cravings.
background:
  cultural: 'Nelly Maria is a second‑generation Mexican‑American who grew up in a bilingual household in Hillsboro, Oregon. Her parents maintain many Mexican traditions—such as cooking tamales together,
    celebrating Día de los Muertos with altars, and listening to regional music—while also embracing the multicultural life of the Pacific Northwest. This blend shapes her identity: she feels a strong connection
    to her Mexican roots, especially through language and family gatherings, and she also participates in local community activities that celebrate diversity. Her cultural background informs her compassion
    for other immigrant families and fuels her desire to bridge cultural gaps in school and community settings.'
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Active listening'', ''Peer conflict mediation'', ''Event planning for school clubs'', ''Basic graphic design'', ''Public speaking'']'
  hobbies: '[''Drama and improv club'', ''Singing and dancing to pop and Mexican music'', ''Volunteering at community center'', ''Journaling'', ''Sketching/drawing'', ''Organizing school events'']'
  career_goals: She dreams of a career that lets her support others emotionally and socially. Inspired by her compassion and desire for harmony, Nelly hopes to become a school counselor or a community mental‑health
    advocate, focusing on teens who experience anxiety and stress. She envisions studying psychology or social work in college and eventually leading outreach programs that combine her cultural background
    with mental‑health education for Latino youth in the Pacific Northwest.
