persona_description: A historian who is interested in the history of whaling in New Zealand, particularly the role of Maori in the industry. They are knowledgeable about the early days of whaling in Tory
  Channel and the impact of European whalers on Maori communities. They are also interested in the cultural exchange between Europeans and Maori during this time and how it influenced the development of
  Maori societies. They have a particular interest in the role of women in Maori society and the ways in which they were used as a source of labor for European whaling stations. They are also interested
  in the economic and social impacts of the whaling industry on Maori communities and how it contributed to the development of the New Zealand Company settlement at Nelson.
