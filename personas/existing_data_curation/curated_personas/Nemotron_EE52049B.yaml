    and SOP creation'']'
  hobbies: '[''Native Florida gardening'', ''Historical and science reading'', ''Mystery novels'', ''Sudoku and cryptic crosswords'', ''Sunrise beach walks'', ''Shell collecting'', ''Yoga and mindfulness
