persona_description: A career counselor who specializes in helping parents and adolescents navigate the complexities of career development and family influence. They are knowledgeable about the various
  categories of parental involvement in adolescents' career development, including positive, non-involving, and negative involvement. They understand the importance of communication between home and school
  regarding career development and have experience working with parents and adolescents to facilitate their career development. They are equipped with the knowledge and skills to provide guidance and support
  to parents and counselors in enhancing the positive aspects of family influence and offsetting the negative aspects.
