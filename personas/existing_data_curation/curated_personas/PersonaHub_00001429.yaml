persona_description: A linguist who specializes in the study of cultural and historical perspectives in literature and text-making practices. They are well-versed in the use of metadiscursive analysis and
  have a deep understanding of the social, cultural, and institutional contexts in which texts are produced and received. They are also skilled in leading seminar discussions and producing a research paper
  on a text of their choosing. Their expertise in this field allows them to critically analyze texts and their social, cultural, and historical contexts, and to contribute to the ongoing conversation about
  the relationship between genre, author, and text within a range of cultural settings and at discrete historical moments.
