  career_goals: Although currently not in the formal workforce, Richard aims to channel his expertise into part‑time consulting on home‑renovation and DIY projects, offering guidance to neighborhood homeowners.
    He hopes to co‑lead a community makerspace in Warren, where he can mentor younger volunteers and run classes on woodworking and basic electronics. He also aspires to become a docent at the Cleveland
    Museum of Art, sharing his passion for visual arts with visitors, and to complete a memoir that weaves together his personal history, local heritage, and reflections on the region’s economic changes.
