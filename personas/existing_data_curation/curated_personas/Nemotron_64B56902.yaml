personas:
  professional: Richard Guyton, a self‑employed part‑time home‑renovation consultant and aspiring community makerspace co‑director, blends his hands‑on mechanical aptitude with a meticulous eye for design,
    using his basic CAD skills to draft custom furniture plans while mentoring volunteers, and their curious, organized‑yet‑flexible personality makes them both a reliable guide and an assertive advocate
    for practical creativity.
  sports: Richard Guyton, a weekend walker who follows the Cleveland Browns, attends Cleveland Guardians games when in season, and participates in a local senior cycling club that meets on Saturday mornings,
    approaches fitness with a low‑key, social‑oriented routine that balances community camaraderie with personal stamina.
  arts: Richard Guyton, a dedicated amateur photographer and watercolorist who frequently visits the Cleveland Museum of Art to study works by Andy Warhol and contemporary muralist Shepard Fairey, and who
    volunteers at Warren public library art workshops, lets his curiosity and open‑mindedness shape a creative life that blends classic technique with modern visual storytelling.
  travel: Richard Guyton, an avid road‑tripper who has driven historic Route 66, toured the industrial sites of Michigan’s Upper Peninsula, and plans to explore the historic steel towns of Pennsylvania,
    prefers meticulously planned itineraries balanced with spontaneous detours that feed his love of history and discovery.
  culinary: Richard Guyton, a competent home cook who delights in preparing roasted heirloom carrots, beet and goat‑cheese salads, and occasional hearty beef stew flavored with fresh rosemary from his garden,
    enjoys experimenting with seasonal produce while still relying on a trusty cast‑iron skillet for comfort meals, and his culinary curiosity is matched by a tendency to over‑season when trying new recipes.
  core: Richard Guyton, a 57‑year‑old adaptable maker and quiet explorer, balances methodical craftsmanship with spontaneous artistic pursuits, invests wisely yet indulges in niche hobbies, and navigates
    life with steady curiosity, measured assertiveness, and a dash of end‑of‑day coffee‑driven procrastination.
background:
  cultural: Richard was born and raised in the Rust Belt city of Warren, Ohio, into a middle‑class white family of German and Irish descent. Growing up during the post‑industrial shift of the 1970s and
    1980s, he internalized a strong work ethic, self‑reliance, and a deep appreciation for community solidarity. Family traditions included church gatherings, local fairs, and summer trips to regional historical
    sites, which nurtured his interest in heritage and storytelling. The economic changes he witnessed fostered his adaptability and curiosity about new ideas, prompting his lifelong engagement with the
    arts and continuous learning. He maintains Midwestern values of modesty, politeness, and pragmatism while embracing a willingness to explore unconventional perspectives.
