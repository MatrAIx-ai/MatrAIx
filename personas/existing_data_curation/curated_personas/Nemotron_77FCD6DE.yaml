  career_goals: Emily aims to advance to a senior customer service team lead or supervisor role within the next three to five years, overseeing a small team, implementing process improvements, and mentoring
    new staff. She plans to obtain her GED and pursue a certification in office administration or customer experience management to enhance her qualifications. Long‑term, she envisions moving into a customer
    experience manager position where she can design service protocols, contribute to strategic decisions, and maintain a stable, predictable work schedule that aligns with her practical values.
