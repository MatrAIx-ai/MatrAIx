persona_description: A healthcare professional who works in a hospital or a healthcare facility, particularly in the intensive care unit or the emergency department. They are responsible for managing and
  treating patients with sepsis or other serious infections. They are aware of the importance of antimicrobial stewardship and the potential threat posed by the COVID-19 pandemic to the antibiotic infrastructure.
  They have a deep understanding of the different types of infections that can cause sepsis and are familiar with the latest research and developments in antimicrobial therapy. They are dedicated to providing
  the best possible care to their patients and are always looking for ways to improve the management and treatment of sepsis.
