  hobbies: '[''Soccer (team league)'', ''Cricket'', ''Gym and strength training'', ''Running'', ''Puzzle solving (Sudoku, escape rooms)'', ''Reading true crime books'', ''Watching crime documentaries'',
    ''Cooking Indian/Pakistani cuisine'', ''Dancing at cultural festivals'', ''Volunteer community safety workshops'', ''Hiking in Houston parks'', ''Strategy video games (e.g., L.A. Noire)'']'
  career_goals: Nitin aims to secure a full‑time detective position with the Houston Police Department, ideally within the Homicide or Special Victims Unit, where he can apply his structured investigative
    approach. Over the next three to four years, he plans to earn a bachelor’s degree in Criminal Justice and obtain certifications such as Certified Criminal Investigator (CCI) and advanced forensic photography
    training. He aspires to lead a task force focused on organized crime, later transition into a supervisory detective role, and ultimately establish a private investigation firm that specializes in corporate
    fraud and complex financial crimes, leveraging his analytical expertise and community ties.
