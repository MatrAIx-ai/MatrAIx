  hobbies: '["Gardening", "Farmers market shopping", "Cooking with local produce", "Reading historical fiction", "Community theater attendance", "Food bank volunteering", "Yoga", "Hiking", "Photography",
    "DIY upcycling crafts", "Podcast listening", "Board game evenings"]'
  career_goals: Darlene aims to move from her current clerk role to a senior procurement analyst position within the next three years, focusing on sustainable and ethical sourcing. She plans to obtain certifications
    such as the Certified Procurement Professional (CPP) and Sustainable Procurement Specialist credentials. Her ambition includes leading initiatives that prioritize local Lancaster producers, embed corporate
    social responsibility into procurement processes, and mentor new staff. Ultimately, she hopes to become a procurement manager overseeing a team while also helping to establish a collaborative buying
    consortium for regional nonprofits and community groups.
