personas:
  professional: Maria Hernandez, a 33-year-old retail cashier who excels at POS transactions, bilingual customer service, and inventory tracking, leverages their love of routine and painstaking attention
    to detail to keep the register error‑free while quietly asserting themselves in team meetings as they work toward a supervisory promotion.
  sports: Maria Hernandez, who enjoys early‑morning walks in the local park and plays in a community volleyball league, roots for the New York Knicks in basketball, follows the New York Yankees in baseball,
    and treats their weekly salsa dance nights as their primary cardio workout.
  arts: Maria Hernandez finds personal expression through salsa dancing to classics by Celia Cruz and modern hits by Marc Anthony, attends occasional community theater productions of classic plays, and
    reads self‑help books by Brené Brown and Malcolm Gladwell to fuel their personal growth.
  travel: Maria Hernandez favors short, budget‑friendly road trips to historic towns like St. Augustine and weekend visits to the Dominican Republic’s Santo Domingo to stay connected with family heritage,
    while dreaming of a future solo trek through the Andes for a deeper sense of adventure.
  culinary: Maria Hernandez, an experienced home cook, regularly prepares sancocho with yucca, plantain, and beef, crafts silky mangú topped with sautéed onions and fried cheese, and loves seasoning their
    dishes with garlic, cilantro, and a splash of lime.
  core: Maria Hernandez balances meticulous routine at work with a restless mind that often channels worry into strict budgeting, yet they occasionally break their disciplined habits for spontaneous salsa
    outings.
background:
  cultural: Maria grew up in a bilingual Dominican household in Queens, where Spanish was spoken at home and English at school. She maintains close ties to the Dominican diaspora, celebrating cultural holidays
    such as Dominican Independence Day and Carnaval with family gatherings, music, and traditional foods. The rhythms of merengue and bachata, along with the communal spirit of local church events, shape
    her social life. While fully integrated into American urban life, Maria’s cultural identity remains a source of pride and informs her values of family loyalty, hospitality, and hard work.
attributes:
  skills: '["Customer Service", "Cash Handling", "POS System Operation", "Bilingual Communication (Spanish/English)", "Inventory Management", "Basic Accounting", "Conflict Resolution", "Time Management",
    "Attention to Detail"]'
  hobbies: '["Cooking Dominican cuisine", "Salsa dancing", "Reading self‑help and personal development books", "Walking in local parks", "Knitting", "Volunteer work at the community church"]'
  career_goals: Maria aims to progress from her current cashier role to a supervisory position within the next two years, seeking to lead a shift team and assist with staff scheduling. She plans to complete
    an associate degree in Business Administration through evening classes, which will equip her with managerial and financial skills. Long‑term, Maria aspires to manage a retail location or open a small
    convenience store that serves her neighborhood, allowing her to combine her practical retail experience with entrepreneurial ambitions while providing stable income for her family.
