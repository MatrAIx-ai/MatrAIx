persona_description: A dentist who specializes in the safe and effective use of silver fillings, including composite, porcelain, and gold fillings, and who also offers cosmetic dental treatments such as
  teeth whitening, tooth-colored fillings, veneers, crowns, and dental implants. The dentist is knowledgeable about the causes of periodontal disease, including bad habits, and is able to detect and treat
  it. The dentist is also knowledgeable about the signs and symptoms of periodontal disease and can help patients with self-diagnosis and treatment. The dentist is aware of the potential side effects of
  medications and changes in hormone levels that can affect the mouth and gums, and can recommend appropriate treatments. The dentist is also knowledgeable about the importance of regular dental check-ups
  and periodontal examinations in detecting and treating periodontal disease.
