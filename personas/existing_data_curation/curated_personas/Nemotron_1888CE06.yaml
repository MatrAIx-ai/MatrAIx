  hobbies: '[''Watercolor painting'', ''Sketching'', ''Knitting'', ''Crocheting'', ''Attending theater performances'', ''Live music events'', ''Reading mystery novels'', ''Historical biographies'', ''Senior
    book club'', ''Walking the Thames River Trail'', ''Gardening (herb garden)'', ''Visiting art museums'', ''Volunteer computer tutoring'', ''Organizing craft fairs'']'
  career_goals: Although retired, Angela aims to continue learning and giving back. She plans to develop a senior‑focused art mentorship program at the Groton Community Center, publish a collection of oral
    histories documenting Groton’s maritime past, and earn a certificate in community arts facilitation to strengthen her ability to organize inclusive workshops. She also hopes to travel within New England
    to attend regional art fairs and to complete a personal painting series inspired by the local coastline.
