  hobbies: '[''abstract painting'', ''experimental music composition'', ''science-fiction & philosophy reading'', ''scale model ship building'', ''community mural volunteering'', ''cooking Puerto Rican
    dishes'', ''bicycle touring'', ''playing congas'', ''language exchange (Spanish/English)'']'
  career_goals: Josue aims to formalize his expertise by obtaining the Certified Welding Inspector (CWI) designation within the next two years, positioning himself for a supervisory role on his current
    shop floor. Parallel to his professional advancement, he plans to launch a boutique studio focused on bespoke metal art that integrates community narratives and sustainable materials. He envisions collaborating
    with local schools and cultural organizations to run apprenticeship workshops for Hispanic youth, fostering pathways into skilled trades. Long‑term, Josue aspires to become a part‑time instructor at
    a community college, sharing both the technical rigor and creative possibilities of welding, while continuing to contribute to public art projects that reflect his Puerto Rican heritage and Boston’s
    diverse neighborhoods.
