  hobbies: '[''Hiking'', ''Mountain Biking'', ''Nature Photography'', ''Gardening'', ''Cooking'', ''Listening to Classic Rock'', ''Appalachian Folk Music'', ''Reading Historical Biographies'', ''Volunteering
    at Community Center'', ''DIY Home Projects'']'
  career_goals: Though content with his current role, Michael is motivated to advance within the retail sector. He aims to become a shift supervisor within the next one to two years, leveraging his reliability
    and leadership potential. Over the longer term, he hopes to secure a store manager position that would allow him to implement efficient operational processes he has observed in larger stores. To support
    these goals, he plans to enroll in evening courses at the nearby community college to earn an associate degree in Business Administration. He also aspires to lead training sessions for new cashiers,
    sharing his practical knowledge while honing his coaching skills. Ultimately, Michael envisions a stable career path that provides financial security for his family and greater influence over store
    policy.
