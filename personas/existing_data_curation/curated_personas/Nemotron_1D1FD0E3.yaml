  career_goals: Rena aims to channel her organizational talent into volunteer leadership roles, seeking to chair the East Sandwich Seniors Committee and mentor emerging local entrepreneurs. She wishes to
    develop a community garden program that bridges seniors and youth, and aspires to write a memoir that captures her family's Cape Cod heritage. Additionally, she plans modest travel with her husband
    to explore historic sites and culinary destinations across New England, while remaining active in local civic initiatives.
