personas:
  professional: Floribel Franco, a bilingual retail specialist, leverages an eye‑catching visual storytelling flair and a flexible, improvisational work style to transform fast‑paced floor sales into immersive
    product displays while swiftly resolving customer issues on the fly.
  sports: Floribel Franco balances gentle yoga sessions at a downtown studio with occasional pick‑up volleyball at a community park, while cheering on the Houston Astros in spring, the Rockets during basketball
    season, and the Dynamo in summer, using these games as social anchors that keep her active and connected.
  arts: Floribel Franco pours imagination onto abstract acrylic canvases inspired by Yayoi Kusama’s repetitive motifs and Frida Kahlo’s introspective self‑portraits, finds lyrical resonance in Ocean Vuong’s
    poetry and Björk’s ethereal soundscapes, and routinely shares her own short poems during community art workshops.
  travel: Floribel Franco prefers spontaneous weekend escapes, often jetting to the vibrant markets of Oaxaca for street‑food inspiration, wandering Austin’s eclectic art districts, and dreaming of future
    immersion in Marrakech’s historic souks, all while navigating a modest travel budget and last‑minute bookings.
  culinary: Floribel Franco is a self‑taught experimental cook who reimagines classic tamales with smoked brisket and chipotle, crafts quick avocado‑lime ceviche, and perfects salsa verde using tomatillos,
    jalapeños, and fresh cilantro, delighting friends with her fusion of traditional flavors and Texan twists.
  core: Floribel Franco is a vivid visual dreamer who paints memories, battles anxiety with yoga, and occasionally forgets to return library books, channeling her restless imagination into art and community.
background:
  cultural: Floribel was born and raised in Houston to Mexican immigrant parents, making her fluent in both English and Spanish. She grew up celebrating Día de los Muertos, quinceañeras, and regional festivals,
    which instilled a deep appreciation for Mexican folklore, music, and cuisine. Her family maintains strong ties to the local Mexican community, often gathering for communal meals and religious observances.
    While she embraces these traditions, Floribel also identifies with the vibrant, multicultural fabric of Houston, blending her heritage with contemporary urban influences in her personal style and creative
    projects.
attributes:
  skills: '[''Customer service'', ''Bilingual communication (English/Spanish)'', ''Visual merchandising'', ''Creative display design'', ''POS system operation'', ''Sales analytics'', ''Social media content
