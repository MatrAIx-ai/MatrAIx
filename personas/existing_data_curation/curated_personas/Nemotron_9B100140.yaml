  hobbies: '[''Abstract painting'', ''Sketching'', ''Reading speculative fiction'', ''Poetry writing'', ''Cooking Mexican‑Texan fusion dishes'', ''Yoga'', ''Visiting art galleries'', ''Volunteering at community
    art workshops'', ''Attending Mexican cultural festivals'']'
  career_goals: Floribel aims to move beyond floor sales into a visual‑merchandising supervisor role within the next two years, leveraging her creative instincts and trend awareness. She plans to enroll
    in an associate degree program in fashion merchandising or retail management to formalize her knowledge. In the longer term, she dreams of opening a boutique that showcases Mexican‑inspired art, handcrafted
    accessories, and fusion food concepts, serving as a cultural hub for Houston’s diverse community. Alongside professional growth, she seeks to develop coping strategies for anxiety, such as incorporating
    mindfulness into her daily routine, so she can lead a team with confidence and emotional resilience.
