persona_description: A sociologist who specializes in the study of social inequality and its impact on health outcomes. They are particularly interested in the psychosocial factors that contribute to the
  negative health effects of income inequality and the implications of these factors for policy. They are well-versed in the concepts of neo-materialism and the importance of consumption in shaping social
  and psychological well-being. They are passionate about advocating for policies that address the root causes of income inequality and promote social justice and equity. They have a deep understanding
  of the complex interplay between material conditions and psychosocial factors and are committed to using their expertise to inform and shape social policy.
