  career_goals: Dionne aims to transition from a front‑line representative to a supervisory role where she can mentor new agents and shape a supportive team culture. She plans to earn a certification in
    Customer Experience Management and eventually pursue an associate degree in Communications or Arts Administration. Long‑term, she dreams of merging her passion for community arts with her professional
    expertise by becoming a community outreach coordinator for a Brooklyn cultural institution or a nonprofit that promotes Puerto Rican heritage. She also hopes to launch a side blog that showcases emerging
    artists from her neighborhood, using the platform to advocate for inclusive, culturally resonant customer experiences. Balancing ambition with her sensitivity to stress, she seeks a role that offers
    structured growth while preserving flexibility for self‑care.
