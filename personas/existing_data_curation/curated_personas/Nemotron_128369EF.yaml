personas:
  professional: Dionne Hernandez is a front-line customer support specialist with expertise in bilingual communication, CRM tools like Zendesk and Salesforce, and a knack for de-escalating tense calls,
    and they bring a warm, cooperative demeanor and love of creative problem-solving to mentor agents and shape an inclusive team culture.
  sports: Dionne Hernandez enjoys dancing salsa and bachata at a neighborhood studio three times a week, practices yoga on weekends, follows the New York Knicks and Brooklyn Nets avidly, and they join a
    casual community basketball league during the summer.
  arts: Dionne Hernandez regularly visits Brooklyn's street-art districts, collects prints from muralist Miky, attends open-mic poetry nights featuring spoken-word poet Anis, and they draw inspiration from
    Lin-Manuel Miranda's Broadway scores as well as the rhythms of Bad Bunny.
  travel: Dionne Hernandez favors spontaneous weekend getaways, often jetting to coastal towns like San Juan and Cancun for beach festivals, while they dream of exploring Barcelona's art scene and the hidden
    waterfalls of Puerto Rico's Vieques when budget permits.
  culinary: Dionne Hernandez loves cooking arroz con gandules and pastelón from scratch, mastering the art of sofrito with cilantro and annatto, and they occasionally experiment with a fusion of plantain-based
    tacos, though they sometimes burn the garlic when distracted by a favorite reggaeton playlist.
  core: Dionne Hernandez is a culturally-rooted, art-obsessed community advocate who balances a chaotic, anxiety-prone lifestyle with a fierce devotion to uplifting local voices through music, dance, and
    empathetic customer service, and they constantly juggle their creative projects with the need for self-care.
background:
  cultural: Dionne grew up in a close‑knit Puerto Rican family in Brooklyn, surrounded by the rhythms of bomba, plena, and reggaetón that echoed from neighborhood block parties. Fluent in both Spanish and
    English, she celebrates traditional holidays such as Nochebuena and the annual Puerto Rican Day Parade, often helping organize community events that showcase the island’s art, food, and dance. Her upbringing
    blended island customs with the eclectic energy of New York City, giving her a bicultural identity that values family ties, community solidarity, and cultural pride. This background informs her warm,
    cooperative demeanor and fuels her desire to uplift Latino voices within the broader urban tapestry.
