  hobbies: '[''Reading science and nature books'', ''LEGO building'', ''Jigsaw puzzles'', ''Chess'', ''Birdwatching'', ''Journaling'', ''Piano practice'']'
  career_goals: Helen dreams of one day becoming a pioneering aerospace engineer or astronaut, inspired by space exploration and robotics. She is determined to excel academically, earn top grades throughout
    middle and high school, and eventually attend a leading university for engineering. In parallel, she is fascinated by environmental science and imagines contributing to sustainable technology research.
    Her competitive nature drives her to aim for scholarships, science fairs, and leadership roles in STEM clubs, reflecting her high standards and desire for achievement.
