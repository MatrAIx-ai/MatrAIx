    fiction and Latin American literature'',''Attending live Tex-Mex music concerts'',''DIY home improvement projects'']'
  career_goals: He aims to re‑enter the workforce in a role that merges his love for art, community building, and his Mexican heritage. His immediate goal is to complete his GED and enroll in a community‑college
    program in arts administration or hospitality management. Over the next five years, he plans to launch a small family‑owned Mexican café that also serves as a gallery space for local Latino artists,
    providing a cultural hub in Odessa. He is also interested in becoming a certified community liaison, helping new immigrants navigate local services. To support these ambitions, Miguel is seeking part‑time
    work in event coordination to regain professional experience while continuing personal therapy to manage his anxiety.
