personas:
  professional: Miguel Prieto, an emerging arts‑administration coordinator, channels their curiosity for visual culture and methodical planning into meticulously organized community events, while their
    charismatic, talkative nature makes them the focal point at gatherings, their competitive edge drives them to secure every sponsorship, and their occasional skepticism and anxiety lead them to double‑check
    contracts and seek reassurance from trusted colleagues.
  sports: Miguel Prieto, a devoted fan of the Dallas Cowboys, Texas Rangers, and Houston Rockets, channels their competitive drive into weekly pickup basketball games at the Odessa YMCA and a membership
    in the Odessa Adult Soccer Club, combining spirited support for pro teams with active participation in local sports.
  arts: Miguel Prieto, an avid cultural enthusiast, frequents the Odessa Museum of Art and community galleries, curates pop‑up exhibitions featuring works by Banksy and local muralist Anna Rivera, delights
    in karaoke nights singing hits from the classic rock band The Strokes and country legend Alison Krauss, and captures vibrant street murals with a vintage Leica camera, satisfying their curiosity and
    love for visual storytelling.
  travel: Miguel Prieto, a detail‑oriented traveler, maps road‑trip itineraries in Google Sheets, has explored Santa Fe, New Orleans, and the big desert expanses of Big Bend, and aspires to a week‑long
    art retreat in Barcelona, yet their anxiety about budgeting sometimes delays finalizing bookings.
  culinary: Miguel Prieto, a passionate home cook, experiments with regional dishes such as carnitas tacos, chiles en nogada, and pozole, layering fresh cilantro, ancho chilies, and masa harina, while their
    habit of over‑seasoning sometimes overwhelms guests, and they often treat themselves to late‑night cooking marathons as a way to unwind from anxiety.
  core: Miguel Prieto is a curious, organized community builder whose sociable charisma fuels vibrant art‑centered projects, yet their competitive edge and anxiety‑driven perfectionism sometimes spark impulsive
    spending and self‑doubt.
background:
  cultural: Miguel grew up in a bilingual Mexican‑American household in the Rio Grande Valley before moving to Odessa as a teenager. His upbringing blended traditional Mexican customs—such as celebrating
    Día de los Muertos, preparing tamales with his grandmother, and attending Catholic Mass—with the frontier spirit of West Texas, where community gatherings often revolve around rodeos, barbecues, and
    oil‑town festivals. He maintains strong ties to his extended family, many of whom still live in Mexico, and regularly travels to visit them, reinforcing his fluency in Mexican Spanish. In Odessa, he
    participates in the local Hispanic Chamber of Commerce and contributes to cultural events that showcase Mexican folk music and dance, embodying a bicultural identity that honors his heritage while adapting
    to the broader Texan environment.
