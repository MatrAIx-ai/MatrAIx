  career_goals: Isabel plans to earn her GED within the next two years, after which she intends to enroll in a culinary apprenticeship program at a local community college or vocational school. Her long‑term
    ambition is to become a certified chef specializing in Mexican cuisine and to open a modest, family‑run catering and bakery business that offers traditional dishes and pastries to the Phoenix community.
    She hopes to build a reputation for consistent quality, aiming to win local food‑fair awards and eventually expand to a small storefront.
