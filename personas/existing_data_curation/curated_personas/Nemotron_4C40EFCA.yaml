personas:
  professional: Dwight Fabien, a meticulous pre‑kindergarten learner who organizes classroom supplies into color‑coded bins and leads small‑group block‑building activities, they love structure and keep
    playtime orderly while flexibly adapting when friends join, and assertively yet kindly guide peers through simple tasks.
  sports: Dwight Fabien, a budding soccer enthusiast who attends a local under‑5 soccer clinic twice a week, they prefer one‑on‑one dribbling drills with a trusted friend over larger scrimmages, proudly
    wear the hometown baseball team’s jersey (the Chicago Cubs) during recess, and also enjoy splash‑time in the community pool where they practice basic strokes with structured lessons.
  arts: Dwight Fabien, a budding illustrator who spends afternoons filling a sketchbook with neatly labeled crayon drawings of scenes from animated classics like "Moana" and "Toy Story", they recite Dr.
    Seuss verses with rhythmic precision, and assemble LEGO sets methodically, reflecting their structured yet creative spirit.
  travel: Dwight Fabien, an adventurous yet routine‑loving child who enjoys family road trips to nearby state parks following a picture‑book itinerary, they pack a favorite stuffed rabbit and a snack of
    sliced apples each time, and dream of visiting the Disney theme parks once they master bedtime independence.
  culinary: Dwight Fabien, a selective eater who favors macaroni‑and‑cheese with extra cheddar, chicken nuggets, and sliced apples, they enjoy helping stir pancake batter under close supervision, but consistently
    refuse peas and broccoli, insisting on predictable meal times that match their love for routine.
  core: Dwight Fabien, a four‑year‑old who thrives on predictable routines, meticulously organizes toys, saves allowance in a piggy bank, manages mild eczema with calm diligence, and occasionally displays
    stubbornness at bedtime, they embody quiet confidence and structured curiosity.
background:
  cultural: Dwight grows up in a vibrant African‑American household in Los Angeles. His family celebrates cultural traditions such as Juneteenth, enjoys soul‑food meals on Sundays, and listens to a mix
    of gospel, R&B, and contemporary hip‑hop that his parents play at home. He attends community‑center events featuring drumming circles, storytelling, and dance, reinforcing his sense of cultural identity.
    The multicultural environment of Los Angeles also exposes him to a diverse range of languages and cuisines, broadening his worldview while his family instills pride in his heritage.
