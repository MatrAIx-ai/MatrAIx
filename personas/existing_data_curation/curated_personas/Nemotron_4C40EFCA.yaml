  career_goals: Dwight often talks about becoming a firefighter because he likes the clear schedule, teamwork, and helping people. He also imagines being a builder or a teacher, where he can organize things
    and work with small groups of children. His current ambition is to master tying his shoes and to read simple books on his own, which he sees as steps toward future jobs that involve helping and leading.
