  career_goals: She dreams of becoming a veterinarian because she loves caring for animals in a hands‑on, practical way, and she also thinks about being a teacher one day, enjoying the routine of a classroom
    and helping younger children learn. Anh wants a career that offers stability, allows her to help her family and community, and lets her apply her love of organization and responsibility.
