personas:
  professional: Anh Lor is an aspiring LEGO architect who thrives on step‑by‑step building challenges, turning the disciplined routine they enjoy at home into meticulously crafted models while quietly dreaming
    of designing community play spaces for their friends, and they often lead peers in collaborative build sessions.
  sports: Anh Lor is a dedicated member of the Tucson Soccer Academy U‑9 team, often wearing the colors of FC Tucson, and they look up to the Arizona Diamondbacks baseball team while practicing dribbling
    and occasionally captaining games, combining collaboration with a confident drive to lead.
  arts: Anh Lor delights in drawing detailed animal sketches inspired by illustrator Jillian Tamaki and the flowing animation style of Hayao Miyazaki, spends free afternoons painting abstract murals, and
    crafts traditional lanterns for Tet, admiring the delicate brushwork of Sumi‑e masters, while they also attend monthly art workshops at the Tucson Cultural Center.
  travel: Anh Lor enjoys weekend family trips to Saguaro National Park, where they marvel at towering cacti, and loves visiting San Diego’s zoo during summer breaks; they prefer well‑planned itineraries
    with clear stops, dream of seeing cherry blossoms in Japan someday, and often request a “map‑reading” game on road trips to stay engaged.
  culinary: Anh Lor eagerly helps prepare fragrant pho broth, rolls fresh spring rolls with rice paper, and shapes crisp almond cookies for festive gatherings, relishing the bright notes of lemongrass,
    chilies, and fresh basil, while they proudly measure ingredients from a recipe card and taste the sweet red‑bean paste in bánh bao despite occasional kitchen spills.
  core: Anh Lor is a routine‑loving eight‑year‑old who blends meticulous LEGO building, soccer leadership, and cultural lantern crafting, balancing disciplined saving with a sweet‑tooth indulgence and a
    pragmatic approach to health.
background:
  cultural: 'Anh comes from a Vietnamese‑American family that settled in Tucson, Arizona. Her household blends Southeast Asian customs with Southwest U.S. life: she speaks English at school and Vietnamese
    at home, celebrates Tet with traditional foods and lanterns, attends events at the Tucson Vietnamese Cultural Center, and values respect for elders, practicality, and preserving cultural heritage while
    adapting to the desert climate and community.'
