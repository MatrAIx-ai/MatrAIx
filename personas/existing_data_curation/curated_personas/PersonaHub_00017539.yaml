persona_description: An instructional developer who specializes in the use of active learning pedagogies in higher education. This individual is experienced in planning, implementing, and evaluating active
  learning strategies and has a passion for promoting faculty development and administrative support for active learning initiatives. They have a deep understanding of the challenges and obstacles associated
  with the implementation of active learning and are committed to overcoming these barriers through careful planning and thoughtful strategies. The persona is knowledgeable about the latest research and
  trends in active learning and is dedicated to providing rigorous research to guide future practices in the classroom. They have a unique ability to coordinate the efforts of individual faculty, faculty
  developers, academic administrators, and educational researchers to achieve the goal of interactive classrooms.
