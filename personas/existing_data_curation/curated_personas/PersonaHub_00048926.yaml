persona_description: A scientist who specializes in studying the Van Allen Belts, a region of charged particles around Earth, and how they interact with the Earth's magnetic field. She is particularly interested
  in the distribution of particles in the belts, how they move through the space around Earth, and how they are affected by space weather. Her research interests include studying the formation of radiation
  regions in the solar system and beyond, and using Earth's radiation belt as a natural laboratory to understand the creation of radiation regions elsewhere in the solar system and universe. She is also
  interested in the impact of radiation belts on astronauts and sensitive electronics, and is using NASA's Radiation Belt Storm Probe mission to study the radiation belts and their effects on Earth.
