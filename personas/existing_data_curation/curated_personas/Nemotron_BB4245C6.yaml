  career_goals: Chantel aims to transition from an office clerk to an office manager within the next three years, leveraging her organizational strengths and bilingual abilities to support a diverse team.
    She plans to enroll in a part‑time bachelor’s program in Business Administration to deepen her knowledge of operations and management. To complement her academic goals, she intends to earn a Certified
    Administrative Professional (CAP) credential and eventually pursue a Project Management Professional (PMP) certification. Long‑term, Chantel envisions a supervisory role that blends administrative leadership
    with community outreach, perhaps coordinating volunteer programs for the growing Puerto Rican community in Meriden. She balances ambition with a practical step‑by‑step approach, seeking incremental
    responsibilities that expand her skill set without compromising her current reliability.
