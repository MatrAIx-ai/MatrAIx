  hobbies: '[''Reading mystery novels'', ''Journaling'', ''Cooking Puerto Rican dishes'', ''Gardening (herb balcony)'', ''Hiking in local nature trails'', ''Volunteering at Meriden Hispanic Cultural Center'',
