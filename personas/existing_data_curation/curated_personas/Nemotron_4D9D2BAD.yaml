  career_goals: She aims to advance to a senior operations or facilities manager role within the next five years, overseeing broader organizational functions and leading cross‑departmental initiatives.
    Jennifer also plans to earn a PMP certification and complete a part‑time MBA to deepen her strategic expertise. Additionally, she aspires to mentor younger women in the workplace, develop a mentorship
    program for administrative staff, and eventually transition into a consulting role helping small businesses improve their office efficiency and work‑life balance.
