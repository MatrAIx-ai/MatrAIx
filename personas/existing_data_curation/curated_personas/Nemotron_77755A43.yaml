  career_goals: Despite not holding formal employment, Michael aspires to deepen his impact on the Tewksbury community. He plans to obtain his GED within the next year, then volunteer as a docent at the
    nearby museum, eventually leading a regular seniors‑focused art appreciation program. He hopes to launch a quarterly neighborhood art showcase that highlights both emerging local artists and unconventional
    mediums. Long‑term, Michael dreams of authoring a memoir that interweaves his life experiences with the cultural history of his hometown, contributing to local archives and school curricula.
