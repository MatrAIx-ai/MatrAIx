personas:
  professional: Keila Bright is a seasoned backend engineer whose mastery of object-oriented design, Docker, and AWS is paired with a disciplined Scrum mindset, making them the go-to mentor for junior developers
    while championing clean, test-driven codebases at a local nonprofit tech hub.
  sports: Keila Bright enjoys low-key weekend hikes on the nearby Natchez Trace, follows the Tennessee Volunteers football team for local spirit, and participates in a community walking club, yet avoids
    large stadium crowds, preferring the predictability of a quiet trail.
  arts: Keila Bright finds creative solace in crocheting blankets while humming along to church choir rehearsals, devouring mystery novels by Agatha Christie and historical biographies by David McCullough,
    and listening to soulful jazz legends such as Nina Simone and contemporary singer-songwriter Hozier, which together shape their artistic sensibility.
  travel: Keila Bright prefers carefully planned weekend road trips to nature-rich destinations like the Great Smoky Mountains and Asheville, relishes quiet cabins over bustling resorts, and conserves a
    modest travel budget that selects serene spots over pricey international getaways, though they dream of a cultural pilgrimage to New Orleans for its music and cuisine.
  culinary: Keila Bright artfully blends garden harvests of kale and sweet potatoes into soul-food classics such as collard greens with smoked turkey and peach-glazed pork ribs, cooking at a moderate skill
    level that balances comfort-food nostalgia with experimental spice combinations like cumin-infused cornbread.
  core: Keila Bright merges a disciplined coding career with a garden-tended sanctuary, choir harmonies, and patient mentorship, navigating life with structured pragmatism, quiet generosity, and an occasional
    penchant for late-night mystery reads.
background:
  cultural: Keila is an African American woman who grew up in the South, blending the richness of her cultural heritage with the professional demands of a tech career. Her upbringing emphasized community,
    family, and church involvement, which continue to shape her values of cooperation, harmony, and service. Navigating the tech industry as a Black woman, she draws strength from a legacy of resilience
    and strives to be a visible role model for other underrepresented professionals. In Murfreesboro, she balances her marriage and family responsibilities with a deep appreciation for Southern traditions—celebrating
    holidays, participating in local cultural festivals, and supporting neighborhood initiatives that reflect her commitment to both her cultural roots and her forward‑looking career.
