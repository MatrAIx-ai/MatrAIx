  career_goals: Keila aims to progress into a lead software engineer role where she can mentor junior developers and champion best‑practice coding standards. She plans to earn an AWS Solutions Architect
    certification to deepen her cloud expertise and to spearhead projects that deliver stable, predictable technology solutions for local nonprofits and small businesses. Ultimately, she hopes to combine
    her technical leadership with community outreach, creating inclusive tech programs that empower underrepresented youth in Murfreesboro.
