personas:
  professional: Vilma Martinezbeltran, a budding community outreach specialist, leverages bilingual communication, event‑planning flair, and savvy social‑media content creation to design inclusive campaigns,
    while balancing pragmatic curiosity with an outgoing, team‑oriented spirit.
  sports: Vilma Martinezbeltran, a lively recreational soccer player with the Central Valley Flyers, trains twice weekly, joins weekend trail‑hikes with the Sierra Foothills Hiking Club, and cheers on Sacramento
    Republic FC during the MLS season, embodying a balanced mix of competitive vigor and relaxed outdoor activity.
  arts: Vilma Martinezbeltran, an enthusiastic dance‑floor regular, moves to the rhythms of Celia Cruz and Carlos Vives during salsa and cumbia nights, captures vibrant moments with a DSLR inspired by Vivian Maier,
    and channels that visual storytelling into community event promotion.
  travel: Vilma Martinezbeltran, an adventure‑curious traveler, prefers short road trips to nearby wine‑country towns like Paso Robles and spontaneous weekend escapes to the coastal cliffs of Big Sur, while
    dreaming of a cultural immersion journey to Oaxaca, balancing budget constraints with a love for authentic experiences.
  culinary: Vilma Martinezbeltran, a confident home cook, whips up classic tacos al pastor, chilaquiles with mole, and fresh guacamole, favoring corn tortillas, chipotle peppers, and cilantro, often sharing
    the meals at communal gatherings before energetic dance evenings commence.
  core: Vilma Martinezbeltran blends energetic community spirit with disciplined organization, turning every dance, hike, or volunteer project into a chance to connect and create, though they sometimes
    binge‑watch reality cooking shows late into the night.
background:
  cultural: Raised in a Mexican‑American household in Clovis, Vilma grew up bilingual, celebrating traditions such as Día de los Muertos, Las Posadas, and family quinceañeras. Her family maintains strong
    ties to Mexican heritage through language, cuisine, and community involvement at the local Catholic parish. She actively participates in regional Latino cultural events and values the blend of Mexican
    customs with the broader Californian lifestyle, which shapes her identity and community outlook.
attributes:
  skills: '["Bilingual communication (English-Spanish)", "Customer service", "Social media management", "Event planning and coordination", "Team collaboration", "Basic graphic design (Canva)", "Time management",
