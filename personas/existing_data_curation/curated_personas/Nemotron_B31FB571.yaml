  hobbies: '["Salsa and cumbia dancing", "Cooking Mexican cuisine", "Hiking in the Sierra foothills", "Volunteer work at community center", "Photography", "Playing recreational soccer", "Attending cultural
    festivals (Cinco de Mayo, Día de los Muertos)"]'
  career_goals: Vilma aims to complete her bachelor's degree in communications or public health, leveraging her existing skills to secure an entry‑level role in community outreach or nonprofit marketing.
    She aspires to become a program coordinator for a Latino‑focused organization, where she can design culturally relevant initiatives and events. In the longer term, she envisions a leadership position—such
    as a community health educator or regional outreach director—where she can blend her practical curiosity with her passion for serving the Mexican‑American community in Central California.
