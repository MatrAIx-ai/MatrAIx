  career_goals: Paul aims to earn his private pilot license within the next year, followed by a commercial pilot certificate and eventually an airline transport pilot (ATP) rating. He aspires to become
    a flight engineer for a major carrier, with a long‑term goal of serving as a captain on long‑haul international routes. Driven by his compassionate nature, Paul also hopes to participate in humanitarian
    aviation missions, such as disaster relief and medical transport, and eventually mentor aspiring pilots from under‑represented backgrounds. He envisions combining his technical expertise with community
    outreach, establishing a youth aviation program in the Boston area to inspire the next generation while managing his own stress through structured professional development.
