personas:
  professional: Edwin Keane, a 28‑year‑old landscape technician with strong design instincts, blends hands‑on grounds‑keeping expertise in irrigation, hardscape construction, and native planting with SketchUp‑driven
    conceptual layouts, letting their vivid imagination and competitive drive turn client sites into sculptural, water‑wise garden installations while mentoring crew members.
  sports: Edwin Keane enjoys early‑morning hikes in the Appalachian foothills, plays pick‑up basketball at the community center during summer, follows the Philadelphia Eagles in the NFL and the Pittsburgh
    Steelers in a friendly rivalry, and participates in a local amateur soccer league, balancing a love for endurance with a competitive edge.
  arts: Edwin Keane immerses themselves in acoustic sessions of folk legends like Neil Young and local Irish‑American fiddlers, paints natural scenes inspired by Andrew Wyeth’s realism, draws creative sparks
    from poet Seamus Heaney, and attends performances by the regional theater troupe that stages classic works by Shakespeare and modern plays by Lin‑Manuel Miranda, weaving these influences into their
    own speculative‑fiction and garden sculptures.
  travel: Edwin Keane plans trips with a blend of meticulous itineraries and spontaneous foraging detours, favoring weekend escapes to Shenandoah National Park, a summer pilgrimage to Dublin’s literary
    pubs, a fall weekend in the Finger Lakes wine region, and occasional road trips to the New England coast, all while budgeting around their modest freelance design income.
  culinary: Edwin Keane experiments in the kitchen with herb‑infused Irish stew, rosemary‑scented roasted root vegetables, homemade sourdough topped with wild garlic, and crafts seasonal craft beers using
    Cascade hops and foraged elderflower, showcasing a modest cooking skill that leans toward rustic, farm‑to‑table flavors.
  core: Edwin Keane is a fiercely imaginative groundskeeper who fuses artistic vision with practical landscaping, constantly juggling competitive ambition, occasional procrastination, and a love for folk
    traditions.
background:
  cultural: Edwin grew up in a working‑class Irish‑American family in the small town of Lebanon, Pennsylvania. His surname reflects his Irish heritage, and his family has long participated in the local
    Catholic parish, celebrating traditions such as St. Patrick’s Day with music and food. The region’s Pennsylvania‑Dutch agricultural roots and close‑knit community values taught him the importance of
    hard work, self‑reliance, and respect for the land. These influences, combined with a love for folk art and regional festivals, have shaped his identity—a blend of Irish cultural pride, Mid‑Atlantic
    modesty, and an appreciation for the natural environment that underpins his professional and creative pursuits.
attributes:
  skills: '["Plant identification and selection", "Soil analysis and amendment", "Irrigation system design and maintenance", "Hardscape installation (pavers, retaining walls)", "Landscape equipment operation
    and maintenance", "Project planning and time management", "Customer service and communication", "Digital landscape design using SketchUp and AutoCAD", "Creative design thinking and artistic composition",
    "Sustainable landscaping practices (native planting, xeriscaping)", "Safety compliance (OSHA regulations)", "Inventory management and supply ordering", "Problem solving and adaptive design adjustments",
    "Basic horticulture and plant health care"]'
  hobbies: '["Landscape sketching and painting", "Macro photography of flora", "Playing acoustic guitar", "Reading speculative fiction and poetry", "Creative writing (poetry, short stories)", "Hiking and
    nature foraging", "DIY woodworking and small sculpture", "Building scale garden models", "Homebrewing craft beer", "Attending local art and music events"]'
  career_goals: Edwin is driven to move beyond day‑to‑day groundskeeping and become a recognized designer of artistic, environmentally responsible landscapes. Over the next few years he plans to earn the
    Landscape Industry Certified Technician (LICT) credential and enroll in an associate program in horticulture or landscape architecture at a nearby community college. He aims to take on larger residential
    and small‑commercial projects, eventually stepping into a senior designer or foreman role where he can mentor junior crew members. In the longer term, Edwin hopes to launch his own design‑build firm
    that specializes in integrating sculptural art, native plant palettes, and water‑wise techniques into bespoke garden installations for clients throughout the Mid‑Atlantic. His competitive nature fuels
    a desire to win regional landscaping awards and to be featured in local design publications.
