  hobbies: '[''Gardening'', ''Reading historical biographies'', ''Classic literature'', ''Book club (small group)'', ''Chamber music listening'', ''Piano playing'', ''Hiking in Angeles National Forest'',
    ''Watercolor painting'', ''Mediterranean cooking'', ''Volunteer tax assistance for seniors'']'
  career_goals: Approaching the next phase of her professional life, Jessica aims to transition into a senior advisory role where she can shape audit strategy and mentor the next generation of accountants.
    She plans to earn her CPA license if not already held, deepen her expertise in cloud‑based financial technologies, and lead internal audit initiatives that improve efficiency and compliance for her
    firm. Beyond the workplace, she aspires to volunteer her accounting expertise through local non‑profit tax assistance programs and eventually offer part‑time consulting to small businesses in the Glendale
    community.
