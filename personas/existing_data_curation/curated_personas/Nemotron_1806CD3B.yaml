  hobbies: '[''Fishing'', ''Gardening'', ''Woodworking'', ''Reading historical nonfiction'', ''Attending veterans reunions'', ''Mentoring at community center'', ''Listening to classic rock'', ''Playing
    bridge'', ''Road trips to national parks'']'
  career_goals: Robert aims to expand his organization’s outreach to underserved neighborhoods in Tulsa County by launching sustainable after‑school and senior support programs. He seeks to mentor emerging
    social‑service managers, create a regional grant consortium that amplifies funding opportunities for small nonprofits, and eventually transition into a consulting role that leverages his decades of
    experience. Additionally, he hopes to establish a legacy endowment for community health initiatives before fully retiring, ensuring long‑term impact for the people he serves.
