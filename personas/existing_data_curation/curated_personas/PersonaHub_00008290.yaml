persona_description: A dedicated and experienced paraprofessional, Diana Davis, who is currently enrolled in an innovative alternative certification program at Highline Public Schools in partnership with
  Woodring College of Education at Western Washington University. Davis is one of 16 fellows participating in the inaugural cohort of the two-year program, which aims to prepare a small group of paraprofessionals
  to earn their teaching certification with the goal of easing the district's current shortage of bilingual teachers. Davis is skilled in teaching English learners (ELs) how to mix syllables together to
  form a word, demonstrating her ability to effectively communicate and teach in Spanish. Her unique approach to teaching and her passion for education make her a valuable asset to the program and the district.
