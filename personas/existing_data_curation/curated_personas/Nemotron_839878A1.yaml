personas:
  professional: An innovative STEM educator, Lien Her, designs immersive STEAM curricula that intertwine engineering, coding, and abstract art, and they leverage meticulous planning, data-driven assessment,
    and bilingual touches to inspire elementary and middle‑school students while championing high standards.
  sports: A nature‑oriented fitness enthusiast, Lien Her hikes the trails around Prior Lake with the local Trailblazers Club, follows the Minnesota Twins and Vikings for weekend camaraderie, and they fit
    in weekly yoga classes at the community center to complement their active lifestyle.
  arts: A passionate visual creator, Lien Her paints abstract watercolors inspired by the geometric elegance of origami, curates digital illustrations referencing James Gurney and Hayao Miyazaki, and they
    regularly attend gallery openings featuring Yayoi Kusama‑inspired installations while improvising piano pieces in the style of Nils Frahm.
  travel: A meticulous planner, Lien Her prefers cultural immersion trips that blend scenic hikes and culinary discovery, having trekked the ancient stone paths of Kyoto and the volcanic landscapes of Iceland,
    and they aim to explore the pristine fjords of New Zealand next summer while balancing family and budget constraints.
  culinary: A creative home cook, Lien Her skillfully prepares hand‑rolled dumplings with ginger‑infused pork filling and sautés stir‑fried bok choy with sesame oil, while they experiment with matcha‑infused
    desserts and savor craft coffee at the local Roaster's Guild café.
  core: A disciplined, imaginative teacher‑engineer, Lien Her fuses art and technology in the classroom, saves strategically, tends to minor health quirks, stays active with hikes and yoga, revels in watercolor
    and piano, and plans culturally rich travels when budget permits.
background:
  cultural: 'Lien’s East Asian heritage instills a deep respect for education, perseverance, and collective well‑being. Growing up in a family that celebrated Lunar New Year, Mid‑Autumn Festival, and traditional
    music, she maintains cultural ties through cooking, language practice, and community events at the local cultural center. These values shape her teaching philosophy: she emphasizes diligent effort,
    encourages collaborative learning while also fostering individual excellence, and occasionally incorporates bilingual elements—such as simple Mandarin vocabulary—into science lessons to broaden cultural
    awareness. Her background also informs a balanced worldview that blends analytical rigor with an appreciation for aesthetic harmony, a perspective she brings to both her professional innovations and
    personal artistic pursuits.'
attributes:
  skills: '[''STEM curriculum development'', ''Project‑based learning design'', ''Educational technology integration (Google Classroom, Nearpod, Scratch, Arduino)'', ''Data analysis and formative assessment'',
    ''Classroom management and behavior intervention'', ''Differentiated instruction for diverse learners'', ''STEAM interdisciplinary teaching'', ''Professional development facilitation'', ''Grant writing
    for classroom resources'', ''Makerspace setup and facilitation'', ''Creative arts integration (visual art, digital media)'', ''Cross‑cultural communication and bilingual resources'']'
  hobbies: '[''Abstract watercolor painting'', ''Digital illustration with Procreate'', ''Origami mathematics puzzles'', ''Coding interactive art with Processing'', ''Reading science‑fiction and fantasy
    novels'', ''Hiking and nature photography around Prior Lake'', ''Playing piano (improvisational)'', ''Participating in local maker fairs'', ''Practicing yoga for mental balance'', ''Volunteering at
    the Minnesota Science Museum outreach program'']'
  career_goals: Driven by a competitive spirit and a passion for novelty, Lien aspires to become a district‑wide STEM curriculum coordinator and later an instructional leader who shapes statewide STEAM
    policy. She plans to earn an Ed.D. in Educational Leadership to deepen her expertise in systemic school improvement. Her short‑term goals include securing a multi‑year grant to expand the school's makerspace,
    publishing a series of interdisciplinary lesson‑plan guides, and presenting her innovative classroom models at national education conferences. Ultimately, she aims to be recognized as a Minnesota Teacher
    of the Year and to mentor emerging teachers, fostering a culture of high standards and creative inquiry.
