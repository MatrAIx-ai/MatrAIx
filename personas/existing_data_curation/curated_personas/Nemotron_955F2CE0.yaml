    compliance (CLIA, CAP)'', ''Team training and mentorship'']'
  hobbies: '[''Adult soccer league'', ''Volunteering at health fairs'', ''Fishing trips with friends'', ''Barbecue cooking and hosting gatherings'', ''DIY home improvement projects'', ''Gardening'', ''Attending
    live music events'', ''Board game nights'']'
  career_goals: Martin plans to earn his ASCP MLS certification and complete an associate degree in clinical laboratory science within the next two years, strengthening his professional credentials. He
    aims to move into a senior technologist role, eventually taking on supervisory responsibilities where he can lead a multidisciplinary lab team. Passionate about emerging technologies, Martin hopes to
    spearhead the implementation of rapid molecular testing platforms at his hospital. In the long term, he envisions transitioning into laboratory management, combining his organized approach, collaborative
    nature, and commitment to patient safety to drive continuous quality improvement.
