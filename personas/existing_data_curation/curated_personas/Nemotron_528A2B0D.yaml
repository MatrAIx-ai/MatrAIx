personas:
  professional: Marcos Mora, a retired construction specialist turned community mentor, blends hands‑on carpentry, gardening, and translation skills to lead art‑focused storytelling workshops and sustainable
    garden projects at the neighborhood cultural center, approaching each task with relaxed flexibility and an open curiosity.
  sports: Marcos Mora stays active through daily park walks, occasional tai‑chi classes with the Bethesda Senior Fitness Club, and cheering on the Baltimore Ravens and Washington Capitals, preferring a
    flexible, low‑pressure fitness routine over rigid training schedules.
  arts: Marcos Mora spends weekends wandering Maryland art galleries, discussing works by Diego Rivera and local folk artists, listening to Central American guitar ballads, and reading biographies of Georgia
    O'Keeffe and Frida Kahlo, allowing their deep appreciation for visual storytelling to shape their volunteer mentorship.
  travel: Marcos Mora favors relaxed, culturally immersive trips, such as a weekend road‑trip to historic Annapolis, a summer visit to the colonial streets of Antigua, Guatemala, and a fall excursion to
    the coastal town of Cartagena, balancing limited budget constraints with a love for culinary and artistic experiences.
  culinary: Marcos Mora delights in preparing authentic pupusas filled with cheese, beans, and chicharrón, frying crisp yuca frita, and experimenting with herb‑infused marinades using cilantro, annatto,
    and lime, often inviting neighbors to share the meals while juggling occasional kitchen clutter due to their relaxed organization.
  core: Marcos Mora is a curious, hands‑on community elder who blends art, gardening, and cooking into a relaxed mentorship, occasionally misplacing tools but always finding joy in shared stories and flavors.
background:
  cultural: Marcos was born in a small town near San Salvador and emigrated to the United States in his early twenties, settling first in Virginia before moving to Maryland. He grew up in a Catholic household
    where family gatherings centered around shared meals, music, and oral storytelling. Salvadoran customs such as celebrating the Day of the Dead (Dia de los Muertos) and the feast of San Juan are still
    observed in his home, often with traditional foods and decorations. He maintains close ties with a vibrant Salvadoran diaspora in the Washington‑DC metro area, participating in cultural clubs, church
    events, and community festivals that celebrate his heritage. This background instills in him a strong sense of collective responsibility, warmth toward neighbors, and a desire to pass on his cultural
    legacy to younger generations while also embracing the multicultural fabric of his Maryland community.
attributes:
  skills: '[''Traditional Salvadoran cooking'', ''Backyard gardening'', ''Basic carpentry and home repairs'', ''Spanish-English translation'', ''Art appreciation and informal museum guide'', ''Community
