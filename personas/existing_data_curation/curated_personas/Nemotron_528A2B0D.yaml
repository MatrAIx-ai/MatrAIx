  hobbies: '[''Visiting art galleries and museums'', ''Cooking and experimenting with recipes'', ''Gardening'', ''Listening to folk and world music'', ''Sketching and casual watercolor painting'', ''Participating
    in community festivals and cultural events'', ''Reading biographies of artists'', ''Walking and nature observation'']'
  career_goals: Marcos aims to deepen his engagement with Salvadoran cultural preservation and to share his love of art with the next generation. He aspires to volunteer regularly at the local cultural
    center, where he can lead cooking workshops that teach traditional dishes and their stories. He hopes to develop a community garden project that brings together neighbors of diverse backgrounds, offering
    informal lessons on sustainable gardening. Additionally, he wishes to take a series of beginner art classes—specifically watercolor and folk‑art techniques—to expand his own creative practice. Although
    he is not seeking paid employment, he values the sense of purpose that comes from mentorship, intergenerational exchange, and being a bridge between Salvadoran traditions and his Maryland community.
