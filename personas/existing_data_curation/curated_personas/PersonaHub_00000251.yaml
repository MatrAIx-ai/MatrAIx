persona_description: A paleoanthropologist and researcher who specializes in the study of hominid evolution, particularly focusing on the early hominid species and their development of fine motor skills
  for toolmaking. He is known for his work on the Orrorin tugenensis fossil and the discovery of a pattern that argues against the idea that hominids first evolved handier hands as they learned to make
  stone tools. He has presented his findings at international meetings and has published extensively on the subject.
