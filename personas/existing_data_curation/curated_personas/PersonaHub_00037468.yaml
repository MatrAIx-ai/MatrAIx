persona_description: A chemist or chemical engineer with expertise in catalytic partial oxidation, renewable fuels, and reaction engineering. They are interested in the development of new chemical technologies
  and the interplay between surface chemistry, catalysis, materials, and reaction engineering. They have a strong background in research, with a focus on the conversion of alkanes into useful chemicals
  and energy sources using monolith catalysts and novel reactor configurations. They have published several papers on the subject, including high yields of olefins and hydrogen from decane in short contact
  time reactors, renewable hydrogen from ethanol by autothermal reforming, and the engineering of chemical reactions. They are also interested in catalytic combustion and incineration in short contact time
  reactors.
