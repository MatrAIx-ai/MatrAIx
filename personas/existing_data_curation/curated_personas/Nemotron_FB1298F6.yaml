  hobbies: '[''reading mystery novels'', ''journaling'', ''crossword puzzles'', ''indoor gardening'', ''nature walks'', ''home yoga'', ''mindfulness meditation'', ''watching science documentaries'', ''online
    learning (MOOCs)'', ''simple cooking'']'
  career_goals: Yamileth aims to obtain her ASCP certification within the next year and leverage it to move into a lead technologist position where she can mentor newer staff and oversee quality‑assurance
    programs. She is particularly interested in deepening her expertise in molecular pathology, including next‑generation sequencing workflows, to position herself for a future role in a specialized genetics
    laboratory. Recognizing the stress of her current shift schedule, she also hopes to negotiate a more predictable, partially flexible timetable that supports better work‑life balance. Long‑term, she
    envisions pursuing an associate degree in clinical laboratory science to broaden her credential profile and possibly transition into a supervisory or educational role within the lab setting.
