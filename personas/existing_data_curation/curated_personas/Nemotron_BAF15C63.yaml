  hobbies: '["Cooking (southern soul‑food)","Hosting social gatherings","Women’s softball league","Gardening (vegetable garden)","Puzzle solving (crossword, Sudoku)","Community theater participation","STEM
    mentorship for high‑school girls","Church choir singing","Trivia night competitions"]'
  career_goals: Debra aims to obtain the Certified Engineering Technician (CET) credential within the next year and then pursue a bachelor’s degree in engineering technology. She aspires to move into a
    supervisory role where she can lead a team of technicians, spearhead process‑improvement projects, and reduce equipment downtime. Long‑term, she envisions becoming a project manager for major plant
    upgrades and eventually launching a consultancy that helps small manufacturers in Virginia adopt lean practices while mentoring underrepresented youth in STEM fields.
