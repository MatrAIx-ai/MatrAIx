persona_description: A constitutional law professor who specializes in the interpretation and application of the United States Constitution, particularly in the areas of federalism, treaty-making, and the
  balance of power between the federal government and the states. The professor's expertise includes the interpretation of the Article I, Section 9 of the Constitution, which limits the power of the federal
  government to enter into treaties that have the effect of suspending the operation of state laws. The professor's research interests include the impact of international treaties on domestic law, the relationship
  between treaty-making and state sovereignty, and the constitutional limitations on the federal government's power to enter into treaties. The professor is likely to be interested in the implications of
  the Supreme Court's decision in Rappaport v. Thomas, which addressed the constitutional limitations on the federal government's power to enter into treaties that have the effect of suspending the operation
  of state laws.
