  hobbies: '[''Hiking'', ''Birdwatching'', ''Gardening'', ''Woodworking'', ''Crossword Puzzles'', ''Reading (history, business, true‑crime)'', ''Community Theater Attendance'', ''Volunteering at VA Hospital'',
    ''Barbecue Cooking'', ''Listening to Classic Jazz'']'
  career_goals: Although approaching traditional retirement, Kirk aims to transition into a mentorship and advisory role where he can codify his extensive knowledge for the next generation of project managers.
    He is planning to author a guidebook on balancing flexibility with rigorous project governance, and to volunteer his expertise to local non‑profits focused on sustainable infrastructure projects in
    the Colorado Springs area. Additionally, he seeks to stay current with emerging project‑management technologies, positioning himself as a consultant for veteran‑owned startups that value disciplined
    yet innovative execution.
