  career_goals: Jennifer aims to complete her Bachelor of Science in Nursing within the next two years and obtain certification as a Diabetes Educator. She plans to specialize in community health, focusing
    on underserved Pacific Islander populations in the Los Angeles area. In the longer term, she hopes to pursue a Nurse Practitioner track, allowing her to provide primary care and health promotion services.
    Additionally, she aspires to lead a patient advocacy committee in her hospital and mentor new nurses, leveraging her sociable nature and organizational strengths.
