  career_goals: Looking ahead, John aims to leverage his engineering background by offering freelance consulting for local small manufacturers, focusing on sustainable design and process improvement. He
    also plans to mentor high‑school and college students through STEM outreach programs, satisfying his curiosity for new ideas while sharing practical experience. Additionally, he hopes to enroll in continuing‑education
    courses in renewable energy systems to broaden his expertise and eventually serve on the Duxbury town planning board to influence community development.
