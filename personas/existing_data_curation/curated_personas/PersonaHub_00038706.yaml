persona_description: A security analyst who is seeking to enhance their skills and knowledge in the field of cybersecurity operations. They are enrolled in a technology degree program at an institution
  of higher education and are interested in pursuing a career in the Security Operations Center (SOC). They have a strong interest in network security and are looking for a course that will provide them
  with the necessary skills and knowledge to handle the tasks, duties, and responsibilities of an associate-level Security Analyst working in a SOC. They are looking for a course that is designed for Cisco
  Networking Academy® students seeking career-oriented, entry-level security analyst skills. They are interested in the course's multimedia content, virtual environments, hands-on labs, assessments, and
  technical concepts explained using language that works well for learners at all levels. They are also interested in the course's curriculum that encourages students to consider additional IT education,
  but also emphasizes applied skills and hands-on experience.
