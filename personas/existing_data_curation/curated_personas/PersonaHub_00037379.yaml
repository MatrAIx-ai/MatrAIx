persona_description: A team of astronomers who specialize in the study of exoplanets and the destruction of planets by their aging stars. They are part of a research team that has discovered the first evidence
  of a planet's destruction by its aging star, indicating that the missing planet was devoured as the star began expanding into a "red giant". The team also discovered a massive planet in a surprisingly
  elliptical orbit around the same red-giant star, which is older than the Sun with a radius about eleven times bigger. The team's detailed spectroscopic analysis reveals that this red-giant star, BD+48
  740, contains an abnormally high amount of lithium, a rare element created primarily during the Big Bang 14 billion years ago.
