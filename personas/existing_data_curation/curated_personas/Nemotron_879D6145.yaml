personas:
  professional: Reina Garciarivas, a curious preschool architect in the making, loves arranging block towers with practical precision while daydreaming about building playgrounds for friends, even though
    their scattered toys reveal a relaxed approach to tidy obligations.
  sports: Reina Garciarivas, an energetic member of the Tiny Tots Soccer Club, dashes through preschool recess playing catch, delights in watching the New York Yankees on TV in winter, and attends weekly
    swimming lessons at the community pool, preferring spontaneous games over rigid drills – a testament to their flexible, low‑pressure attitude toward structured sports.
  arts: Reina Garciarivas, a budding little artist, spends afternoons finger‑painting scenes from Mo Willems’ books, sings along to Disney’s Let It Go by Idina Menzel, and eagerly attends the local library’s
    storytime where they admire illustrations by Eric Carle, all while delighting in the freedom to improvise rather than follow strict artistic rules.
  travel: Reina Garciarivas, a curious young explorer, loves family road trips to the nearby beach where they build sandcastles, daydreams about visiting the Eiffel Tower in Paris, and prefers unplanned
    stops at quirky roadside playgrounds over strict itineraries, reflecting their love of flexibility and spontaneous discovery.
  culinary: Reina Garciarivas, a picky yet adventurous eater, adores mac & cheese with cheddar, requests peanut butter and jelly sandwiches, can stir pancake batter with a wooden spoon—though they often
    spill a splatter on the counter—and insists on adding fresh strawberries to yogurt for extra flavor.
  core: Reina Garciarivas, a four‑year‑old bundle of curiosity and compassion, balances imaginative play with practical problem‑solving, prefers flexible routines, shares willingly, and handles toddler
    challenges with calm resilience.
background:
  cultural: Reina’s family maintains strong Mexican traditions while living in Clinton, Iowa. At home, Spanish is spoken alongside English, and celebrations like Día de los Muertos and Día de la Independencia
    are marked with colorful decorations, music, and food such as tamales and horchata. She participates in a bilingual preschool that incorporates Mexican folktales and songs, and the local community center
    hosts occasional cultural festivals where she sees traditional dances and crafts. This blend of Mexican heritage and Midwestern small‑town life shapes her identity, fostering a unique perspective that
    values both cultural roots and the friendly, cooperative spirit of her Iowa neighborhood.
