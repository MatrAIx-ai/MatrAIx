  career_goals: Even at four, Reina talks about helping others when she grows up. She dreams of becoming a teacher because she loves sharing stories and guiding friends, and she imagines being a veterinarian
    to care for animals. She also envisions assisting her community in simple ways, like running a neighborhood garden or organizing play groups.
