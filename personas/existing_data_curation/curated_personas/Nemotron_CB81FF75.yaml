  hobbies: '["Museum Visits", "Art Gallery Tours", "Reading Black Literature", "Creative Writing", "Yoga", "Meditation", "Community Gardening", "Soul Food Cooking", "Beach Walking", "Street Photography",
    "Live Music (Jazz, Gospel)"]'
  career_goals: Kourtnee aims to re‑enter the community sector in a part‑time or volunteer capacity, focusing on arts education and cultural programming for underserved youth. She plans to complete her
    undergraduate degree in Arts Administration or Community Development within the next two years. Long‑term, she envisions launching a neighborhood arts hub that offers workshops, exhibitions, and a modest
    gallery space, and she hopes to author a memoir that captures her experiences as a Black woman navigating life in New York City. She also aspires to serve on the board of a local nonprofit dedicated
    to preserving African American cultural heritage.
