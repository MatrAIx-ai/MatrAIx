personas:
  professional: Kourtnee Nattiel, at 54, is a veteran community arts coordinator who blends meticulous project‑management skills, grant‑writing expertise, and a curiosity for archival research to design
    and deliver inclusive cultural programs for underserved youth, while simultaneously pursuing a bachelor's degree in arts administration to transition into part‑time nonprofit work.
  sports: Kourtnee Nattiel, at 54, enjoys low‑impact fitness like weekly yoga, early morning beach walks for cardio, supports the New York Yankees and Brooklyn Nets during game nights, and participates
    in a senior tennis league at the community center.
  arts: Kourtnee Nattiel, a 54‑year‑old art enthusiast, dedicates weekends to curating small exhibitions that highlight contemporary painters exploring themes of identity and resilience, leads visual‑arts
    workshops for youth, and frequents jazz performances at the Blue Note and gospel concerts at historic venues, drawing inspiration from artists whose work bridges tradition and modernity.
  travel: Kourtnee Nattiel, at 54, plans culturally immersive trips on a modest budget, having recently explored the historic music districts of New Orleans, savored Caribbean culinary festivals in Trinidad,
    and now dreams of a tranquil retreat in the Hudson Valley, all while using travel rewards and careful itinerary planning to accommodate a comfortable pace.
  culinary: Kourtnee Nattiel, a 54‑year‑old home cook, excels at preparing soul‑comfort dishes that meld Southern and Caribbean flavors, regularly cooking collard greens seasoned with thyme and Scotch bonnet
    peppers, coconut‑spiced sweet potatoes, and jerk‑marinated chicken, and enjoys discovering new farm‑to‑table pop‑ups in the city.
  core: Kourtnee Nattiel, at 54, balances methodical project management with an insatiable curiosity, juggling community arts initiatives, a budding memoir, and a habit of late‑night coffee that often fuels
    over‑packed schedules.
background:
  cultural: Kourtnee is a second‑generation African American raised in the vibrant, multicultural neighborhoods of New York City. Her family roots trace back to the Southern United States, where traditions
    of gospel music, storytelling, and communal cooking were passed down. Growing up in Queens, she was immersed in a mosaic of cultures, fostering a deep appreciation for the African diaspora’s artistic
    expressions. She remains active in local Black cultural organizations, participates in heritage celebrations, and draws inspiration from historic civil‑rights figures and contemporary Black artists.
