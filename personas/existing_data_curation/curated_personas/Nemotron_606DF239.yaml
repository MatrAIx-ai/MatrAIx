  career_goals: Even at four, Giovanni dreams of a future where he can explore how things work and help others stay safe. He often talks about becoming a scientist who discovers new things, an engineer
    who builds cool machines, or a firefighter who protects his community. His curiosity pushes him to imagine inventing gadgets, while his practical side wants those inventions to be useful and reliable.
    Because he worries about safety, he also envisions roles like a doctor or a teacher, where he can make sure people feel cared for and secure.
