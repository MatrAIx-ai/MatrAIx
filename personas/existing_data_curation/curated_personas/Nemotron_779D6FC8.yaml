  hobbies: '[''Visiting art museums'', ''Gardening (herbs and ornamental plants)'', ''Cooking Vietnamese dishes'', ''Crocheting and quilting'', ''Reading historical and literary fiction'', ''Volunteer work
    at community cultural center'', ''Attending local theater productions'', ''Learning Mandarin basics'', ''Traveling to Vietnam'', ''Participating in local book clubs'']'
  career_goals: In retirement, Ngoc Ann aims to take an active leadership role in preserving and sharing Vietnamese heritage within the Canton area. She plans to chair the annual multicultural arts festival,
    develop a community cookbook that blends Vietnamese and Southern dishes, mentor younger immigrants in navigating local resources, and pursue a certificate in art history at the nearby community college.
    Long‑term, she hopes to serve on the board of a regional cultural nonprofit and author a memoir reflecting her family's journey.
