  hobbies: '["Crocheting", "Quilting", "Gardening", "Traditional soul-food cooking", "Singing gospel hymns", "Reading devotional books", "Walking by the bayou", "Playing dominoes", "Attending community
    storytelling events"]'
  career_goals: Although retired, Marie Mae aims to continue serving her church and neighborhood by mentoring younger women in cooking, sewing, and financial stewardship. She hopes to document her family’s
    oral histories in a memoir for future generations, and to ensure that her garden provides fresh produce for the local food pantry. Her ambition is to leave a lasting legacy of compassion, harmony, and
    practical wisdom within her community.
