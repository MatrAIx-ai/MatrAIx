persona_description: A Chief Information Security Officer (CISO) who is responsible for controlling information security issues in an organization and creating, implementing and communicating the organization's
  digital information security policies and procedures. They must understand how to protect computer systems, secure them with special hardware, software and secure business processes, and handle an emergency
  situation with an established business continuity plan (BCP). They usually report to the Chief Information Officer (CIO) or other chief-level executive and help guide a company with a combined knowledge
  of business and technology. To increase employability, they may obtain an information security certification, such as the Certified Information Systems Security Professional (CISSP).
