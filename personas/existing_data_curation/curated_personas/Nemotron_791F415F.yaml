  career_goals: Vipul envisions a future where his love for technology, storytelling, and community intersect. In the short term, he aims to deepen his coding abilities and build simple mobile apps or indie
    games, hoping to enroll in a specialized STEM high school and later study computer science. Parallel to that, he aspires to grow his personal brand as a content creator, producing short videos that
    showcase life as a South Asian teen in Brooklyn, celebrate cultural traditions, and raise awareness about mental‑health challenges faced by adolescents. Ultimately, he sees himself working as a game
    developer or UI/UX designer who designs inclusive, culturally resonant experiences, while also volunteering as a youth mentor to help other teens navigate anxiety and cultural identity.
