    to music (classical, indie)'', ''Gardening'', ''Volunteering at immigrant support organizations'']'
  career_goals: Maria aims to deepen her expertise in strategic HR and eventually move into a senior HR business partner or director role where she can shape company culture and employee well‑being programs.
    She plans to complete a bachelor’s degree in Human Resources Management and obtain the SHRM‑Senior Certified Professional (SHRM‑SCP) credential. A key ambition is to champion mental‑health initiatives
    and inclusive policies for immigrant employees, leveraging her personal experience to foster a supportive workplace. Over the next five years, she hopes to lead a cross‑functional team that integrates
    HR analytics with talent development, positioning herself as a trusted advisor to senior leadership.
