  hobbies: '["Oil Painting", "Visiting Art Museums", "Local Theater", "Gardening", "Cooking (World Cuisines)", "Book Club Participation", "Yoga", "Group Fitness Classes", "Volunteer Work at Community Center",
    "Traveling to Cultural Festivals", "Podcast Listening (Psychology & Self‑Improvement)"]'
  career_goals: Karen aspires to re‑enter the workforce through a leadership role in a nonprofit arts organization or community center. Her primary ambition is to become a Program Director for an arts‑and‑wellness
    initiative that serves seniors and at‑risk youth, integrating art therapy, creative workshops, and community building. She also hopes to launch a small grant‑funded program that offers free art classes
    and therapeutic gardening sessions, leveraging her organizational skills and compassionate drive to foster social harmony and personal growth in her neighborhood.
