personas:
  professional: Sharon Alaoui, a retired part‑time office administrator, now channels her organizational acumen and love of the land into leading a senior‑focused garden education program and serving as
    a safety coordinator on the Delta County Senior Center board, where they apply meticulous record‑keeping and practical problem‑solving to community projects.
  sports: Sharon Alaoui enjoys low‑impact fitness through weekly gentle hikes on the foothill trails, follows the Colorado Rockies and Denver Broncos on TV, participates in the senior walking club at the
    community center, and occasionally joins a local bird‑watching hike organized by the Delta Nature Society, reflecting a balanced yet modest sporting enthusiasm.
  arts: Sharon Alaoui finds artistic solace in knitting traditional patterns inspired by the folk songs of John Denver, reading historical fiction by Philippa Gregory, listening to the piano works of Chuck
    Mangione, and attending performances at the Delta Community Theater featuring local playwrights, weaving these cultural threads into a quietly creative identity.
  travel: Sharon Alaoui prefers road‑trip itineraries that blend scenic drive‑throughs of Rocky Mountain National Park, leisurely stays in historic towns like Durango, and annual pilgrimages to Sedona’s
    red‑rock trails, planning trips months in advance while budgeting travel costs with the same meticulous care they apply to garden logs.
  culinary: Sharon Alaoui delights in seasonal cooking, preparing dishes such as Colorado lamb stew, roasted heirloom carrots, homemade apple butter, and quinoa salad with locally foraged greens, while
    their modest culinary skill shines in canning jars of garden tomatoes and preserving heirloom beans for winter, often accompanied by a strong cup of black tea.
  core: Sharon Alaoui is a structured, resilient retiree who blends frontier practicality with quiet creativity, tending gardens, quilting, and community service while occasionally forgetting to water a
    plant or misplace a knitting needle.
background:
  cultural: Sharon’s roots trace back to Anglo‑American settlers who arrived in Colorado during the early 1900s. Growing up in a rural farming family, she inherited a strong work ethic, reverence for the
    land, and a sense of self‑reliance that are typical of the Western Colorado frontier culture. Her family has long been active members of the United Methodist congregation in Delta, where community service
    and modest, orderly worship are valued. These cultural influences shape her practical, structured approach to life and her commitment to preserving local traditions and natural surroundings.
attributes:
  skills: '["Budgeting and financial planning", "Administrative organization and record‑keeping", "Event coordination for community activities", "Basic home repair and maintenance", "Garden design and horticulture",
