  hobbies: '["Gardening and vegetable cultivation", "Birdwatching", "Knitting and quilting", "Historical fiction reading", "Bridge (card game) with a small group", "Hiking local trails", "Canning and food
    preservation", "Volunteer work at church and senior center"]'
  career_goals: Although retired from formal employment, Sharon hopes to deepen her involvement in her community. She aims to lead a local garden program that teaches sustainable planting to seniors and
    schoolchildren, and to serve on the board of the Delta County Senior Center to improve safety and social programming. She also plans to compile and publish a community cookbook featuring recipes from
    longtime residents, preserving culinary heritage. Additionally, she wishes to document her family’s pioneering stories in a modest memoir that can be donated to the county historical society.
