personas:
  professional: Lourdes Morales, a veteran audiovisual installer and repair specialist, blends twenty years of expertise in signal routing, structured cabling, and system calibration with methodical planning
    and a competitive drive that fuels meticulous project delivery for churches and schools, while their outgoing communication style and mentorship of apprentices reflect a balance of curiosity and practicality.
  sports: Lourdes Morales stays fit through thrice‑weekly Zumba classes, weekend hikes with the Appalachian Trail Hiking Club, and cheering on the Atlanta Falcons, Braves, and Hawks, while they occasionally
    join a local community softball league in the spring, embodying a competitive spirit that mirrors their professional drive.
  arts: Lourdes Morales channels creative energy backstage at the Little River Community Theater, handling lighting and sound for productions, while their evenings are filled with listening to regional
    Mexican artists like Los Tigres del Norte and Ana Gabriel, attending the Dalton Walnut Festival, and collecting vintage audio gear that fuels their love for both classic cinema and emerging AV technologies.
  travel: Lourdes Morales prefers road‑trip adventures that blend nature and culture, having hiked the Blue Ridge Parkway, explored New Orleans’ music scene, and planning a future trek through Patagonia’s
    Andes, all while balancing travel costs with a pragmatic budgeting mindset that ensures family responsibilities remain met.
  culinary: Lourdes Morales, an avid home cook, masterfully prepares tamales, enchiladas, and mole using heirloom corn masa, dried chilies, and dark chocolate, while they enjoy experimenting with homemade
    salsas and occasionally indulge in a late‑night queso fundido, reflecting a confident yet occasionally meticulous approach to flavor and presentation.
  core: Lourdes Morales blends technical mastery with a vibrant social life, balancing a competitive work ethic and a love for vintage tube amps with a habit of over‑caffeinating during late‑night sci‑fi
    marathons.
background:
  cultural: Lourdes is a Mexican‑American who grew up in a bilingual household, preserving many of the traditions of her heritage while adapting to Southern Georgian culture. She celebrates Día de los Muertos
    and Las Posadas with family, preparing homemade foods and sharing stories of ancestors. Spanish remains a language she uses at home with relatives, and she incorporates Mexican culinary techniques into
    her cooking, often sharing meals at church gatherings. At the same time, she embraces Southern hospitality, participates in community service, and enjoys the local music and festivals. This blend of
    Mexican familial values and Georgian community spirit shapes her identity, making her both a proud bearer of her cultural roots and an active, engaged member of the local area.
attributes:
  skills: '[''Audiovisual system installation'', ''Signal routing and cable management'', ''Equipment troubleshooting and repair'', ''Audio‑visual system calibration'', ''Network integration for AV'', ''Electrical
    safety compliance'', ''Technical blueprint interpretation'', ''Customer communication and needs assessment'', ''Project scheduling and budgeting'', ''Team leadership and apprentice training'']'
  hobbies: '[''Zumba fitness classes'', ''Cooking Mexican cuisine'', ''Hiking in the Appalachian foothills'', ''Community theater backstage work'', ''Attending local festivals and fairs'', ''Listening to
    Mexican music and regional radio'', ''Collecting vintage audio gear'', ''Watching sci‑fi movies and following AV tech trends'']'
  career_goals: Lourdes aims to formalize her extensive experience by earning the Certified Technology Specialist (CTS) credential within the next year. She plans to transition from being a field technician
    to a small‑business owner, establishing her own AV service firm that focuses on churches, community centers, and local schools in North Georgia. Her ambition includes expanding into live‑event streaming
    and smart‑home audiovisual installations, positioning herself as the go‑to specialist for modern, integrated solutions. She also hopes to develop a mentorship program for at‑risk youth in the community,
    offering hands‑on training in AV technology. Financial stability is a key goal, allowing her to support her adult children and invest in her own property.
