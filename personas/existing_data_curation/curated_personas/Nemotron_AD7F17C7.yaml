  hobbies: '[''Photography'', ''Hiking'', ''Visiting Art Galleries and Museums'', ''Reading (philosophy, psychology, business)'', ''Watercolor Painting'', ''Gardening'', ''Yoga and Meditation'', ''Board
    Games with close friends'', ''Volunteering at community center'']'
  career_goals: Shane aims to advance to a regional management role within the next five years, overseeing multiple store locations and developing a mentorship program for emerging leaders. He also dreams
    of launching his own boutique that merges retail with local art, creating a community hub where commerce and creativity intersect. Long‑term, he envisions a sustainable business model that supports
    local artisans while maintaining operational excellence.
