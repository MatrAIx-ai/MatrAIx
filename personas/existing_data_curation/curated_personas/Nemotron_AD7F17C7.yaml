personas:
  professional: Shane Jordan, a 29‑year‑old regional operations strategist, blends rigorous Excel‑driven budgeting and SQL data analysis with a watercolor‑inspired eye for design, leading cross‑store teams
    to streamline inventory while embedding artistic touches into retail layouts, and they consistently mentor junior staff.
  sports: Shane Jordan enjoys weekend hikes with the Boise Hikers Association, follows the Boise State Broncos football team, supports the Idaho Falls Chukars minor‑league baseball club, incorporates occasional
    trail‑run intervals into their fitness routine to stay active, and they often log mileage in a Strava app.
  arts: Shane Jordan frequents the Boise Art Museum, studies the works of 'Ansel Adams' and 'Georgia O’Keeffe', paints watercolors of the Sawtooth Mountains, curates a personal photo series that blends
    nature’s raw textures with minimalist design principles, and they regularly attend opening nights to network with local artists.
  travel: Shane Jordan prefers meticulously planned road trips across the Pacific Northwest, has trekked the Cascades in Washington, dreams of photographing the cherry blossoms in Kyoto, budgets each getaway
    to ensure savings for their future boutique while savoring spontaneous detours to local farmer’s markets, and they keep a travel journal of sketches and reflections.
  culinary: Shane Jordan enjoys farm‑to‑table meals, often prepares roasted Idaho potatoes with rosemary, pan‑seared trout with almond butter, and a quinoa‑kale salad topped with heirloom tomatoes, hones
    a moderate cooking skill level that balances garden harvests with occasional experiments in sous‑vide, and they sometimes over‑season dishes in an effort to impress friends at board‑game evenings.
  core: Shane Jordan is a methodical yet creatively restless 29‑year‑old who channels anxiety into artistic pursuits, over‑analyzes business decisions, and sometimes procrastinates on personal projects
    while obsessively polishing their photography portfolio.
background:
  cultural: Shane was raised in a middle‑class white family in the rural environs of Eagle, Idaho, a community that values self‑reliance, modesty, and a close connection to the outdoors. His heritage includes
    Scandinavian and German ancestry common to the region, and his upbringing blended traditional Mid‑western values with exposure to the growing arts scene of nearby Boise. He grew up attending local county
    fairs, 4th of July celebrations, and church gatherings, fostering a strong sense of community and cooperative spirit. While rooted in these local traditions, Shane also respects the Native American
    cultures of Idaho, often participating in cultural events that highlight regional history and art.
attributes:
  skills: '[''Team Leadership'', ''Project Management'', ''Financial Budgeting'', ''Data Analysis (Excel, SQL)'', ''Inventory Management'', ''Process Optimization'', ''Conflict Resolution'', ''Strategic
