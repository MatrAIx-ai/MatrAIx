personas:
  professional: Victoria Rivera, a budding robotics enthusiast who spends afternoons in the school robotics club designing simple autonomous bots, blends her love of strategic chess with practical engineering,
    and approaches projects with a meticulous yet flexible mindset, often preferring solo coding sessions before collaborative builds.
  sports: Victoria Rivera swims three times weekly at the community pool, where she follows the local youth swim team, the River Rapids, and balances her training with a love for the school’s intramural
    chess club, viewing each lap as a strategic challenge.
  arts: Victoria Rivera immerses herself in mystery novels by Agatha Christie, sketches urban scenes in her notebook, and enjoys the vibrant rhythms of son and salsa from artists like Celia Cruz and Marc
    Anthony, sometimes practicing dance steps in the living room to the beat.
  travel: Victoria Rivera dreams of visiting the robotics museum in Osaka and the historic streets of Cartagena, but currently favors weekend trips to nearby beaches where she can collect seashells for
    sketching and test portable waterproof robot prototypes.
  culinary: Victoria Rivera loves cooking home‑style island recipes such as arroz con pollo and yuca al mojo, skillfully chopping vegetables while humming salsa tunes, though she sometimes forgets to set
    timers and ends up over‑cooking the rice.
  core: Victoria Rivera is a curiosity‑driven, competitive teen who balances solitary strategy games with hands‑on robotics, saving every penny for tech parts while juggling allergies, swim laps, and a
    secret love for mystery novels.
background:
  cultural: Victoria comes from a Cuban-American family in Bryan, Texas. She grew up in a bilingual household where Spanish is spoken daily, and she celebrates Cuban traditions such as Carnaval, Family
    Day gatherings, and preparing dishes like arroz con pollo and tostones. Her family maintains close ties with the local Cuban community, attending cultural events at nearby Houston centers. The vibrant
    rhythms of Cuban music, the emphasis on family hospitality, and stories of resilience from her parents shape her identity and inspire her ambition to give back to her community.
