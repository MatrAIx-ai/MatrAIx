  career_goals: Inspired by her love for science, technology, and helping others, Victoria aspires to study biomedical engineering or computer science in college, aiming to develop affordable medical devices
    that benefit underserved communities. She hopes to leverage her bilingual abilities in international research collaborations and eventually mentor younger students in STEM, sharing both her technical
    skills and cultural heritage.
