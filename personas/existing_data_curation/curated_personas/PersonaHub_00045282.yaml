persona_description: A sensory researcher who is working on decoding vague concepts such as "like" and taste into a common language that helps sensory researchers, potato breeders, restaurants and other
  food producers better align potato and potato products with consumer expectations and desires. He is currently working on a project that involves collecting and analyzing 55 potato varieties, developing
  a technical language comprised of sensory descriptors, and conducting consumer testing to evaluate each of the 12 potato varieties on liking, taste, texture, aroma, and visual appearance.
