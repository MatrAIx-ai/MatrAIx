  career_goals: Rodolfo aims to earn a certified forklift operator license within the next year and move into a lead‑hand or shift‑supervisor role at his current facility. Long‑term, he hopes to start a
    small family‑run logistics and material‑handling business that can provide more predictable income and flexibility for his wife and children while allowing him to apply his practical skills in a managerial
    capacity.
