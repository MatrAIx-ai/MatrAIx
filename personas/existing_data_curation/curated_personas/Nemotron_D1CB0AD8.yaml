  career_goals: Masha’s immediate goal is to transition back into the professional sphere by enrolling in a master’s program in social work or a certification in grief counseling. She aims to become a licensed
    bereavement counselor and eventually lead a community‑based support program for widowed and grieving families in Madison. In the short term, she plans to secure a part‑time role in nonprofit program
    coordination to apply her organizational skills while gaining practical experience. Long‑term, she hopes to design and manage a local initiative that combines therapeutic support with community activities
    such as a garden and a peer‑support circle, achieving both personal financial stability and broader social impact.
