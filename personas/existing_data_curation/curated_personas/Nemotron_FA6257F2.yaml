  hobbies: '[''Historical Fiction Reading'', ''Local History Research'', ''Gardening (Heirloom Vegetables)'', ''Genealogy Research'', ''Trail Walking'', ''Quilting'', ''Volunteer Teaching (Computer Literacy)'',
    ''Community Book Club'']'
  career_goals: Maria aims to advance into a senior title examiner or team lead role, where she can mentor junior staff and spearhead process‑improvement initiatives. She plans to obtain the Certified Title
    Examiner (CTE) credential within the next two years to solidify her expertise. In the longer term, Maria envisions transitioning to a consulting capacity, offering training and advisory services to
    smaller title firms in the Midwest, while also exploring opportunities to contribute to local professional associations related to real‑estate law and property research.
