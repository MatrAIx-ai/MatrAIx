persona_description: A historian or archaeologist who specializes in the study of the early American colonies, particularly the Roanoke Island colony. The individual is knowledgeable about the historical
  context, events, and figures associated with this period, and is interested in the theories and interpretations of the events that occurred at the Roanoke Island colony. They are also interested in the
  theories of James Horn, Vice President of Research and Historical Interpretation at the Colonial Williamsburg Foundation, who argues that the colonists did not abandon Roanoke Island and settled in the
  Chesapeake Bay area, and is interested in Horn's theories and their implications for the history of the Roanoke Island colony.
