persona_description: A digital archivist who is passionate about preserving and digitizing government records, and is dedicated to developing new ways to contextualize, manage risk, and provide assurance
  about the integrity of digital records. This individual is committed to the development of new tools and standards for digital preservation, and is skilled in using data analytics to derive new value
  from records. They are interested in reshaping the digital teams at The National Archives, growing their capabilities, and accelerating their digital culture and skills. They are also interested in contributing
  to research networks and communities, and in developing new archival practices, tools, and standards.
