personas:
  professional: Lucy Larrea is a dynamic secondary‑school business teacher who merges rigorous financial‑literacy curricula with vibrant, acrylic‑based art projects, leveraging bilingual fluency and Google
    Classroom to create inclusive, tech‑enhanced lessons that reflect their curiosity and organized yet flexible approach to education.
  sports: Lucy Larrea enjoys weekend hikes on the Pennypack Trail with a local hiking club, follows the Washington Capitals in ice hockey and the Washington Wizards in basketball, plays in a co‑ed adult
    soccer league at the Montgomery County Recreation Center, and incorporates regular yoga sessions at a nearby studio into their fitness routine.
  arts: Lucy Larrea spends their evenings painting acrylic canvases inspired by bold street‑mural colors, draws creative spark from exhibitions featuring artists like Jean‑Michel Basquiat and contemporary
    painter Kehinde Wiley, curates playlists that blend salsa legends such as Héctor Lavoe with modern pop icons like Bad Bunny, and regularly attends performances at the Arena Stage that showcase works
    by Lin‑Manuel Miranda, reflecting their love for cultural hybridity.
  travel: Lucy Larrea plans trips that blend cultural immersion with creative inspiration, having explored the vibrant streets of San Juan during a family reunion, trekked the historic alleys of Barcelona,
    and taken weekend getaways to Shenandoah National Park, while their future bucket list includes a road trip along the Pacific Coast Highway to visit the art galleries of San Francisco.
  culinary: Lucy Larrea, an enthusiastic home chef, regularly prepares aromatic arroz con gandules, succulent lechón adobado, and fragrant sofrito‑based sauces, skillfully balancing traditional island flavors
    with fresh herbs like cilantro and oregano, and they often host lively salsa nights where guests sample their signature tostones with garlic aioli and empanaditas.
  core: Lucy Larrea blends relentless curiosity for arts and entrepreneurship with a habit of juggling too many projects at once, leading to occasional sleepless nights fueled by worry, yet they always
    end the day with a calming yoga session and a splash of salsa music.
background:
  cultural: Lucy’s Puerto Rican heritage is a central thread in her identity. Raised in a bilingual household, she retains deep ties to Puerto Rican customs, music, and cuisine, which she celebrates through
    family gatherings and community events in Montgomery County. She actively participates in local Latinx organizations, helping to preserve cultural traditions like the Fiesta de San Juan and promoting
    multicultural awareness in her school. Lucy’s cultural perspective enriches her teaching philosophy, emphasizing inclusivity, respect for diverse viewpoints, and the importance of connecting students
    to their cultural roots while navigating a broader American context.
attributes:
  skills: '[''Curriculum design'', ''Financial literacy instruction'', ''Project‑based learning'', ''Technology integration (Google Classroom, educational apps)'', ''Bilingual communication (English‑Spanish)'',
    ''Classroom management'', ''Mentorship and counseling'', ''Community outreach and partnership building'', ''Event planning'', ''Data‑driven assessment'']'
  hobbies: '[''Visiting art galleries and museums'', ''Acrylic painting'', ''Cooking Puerto Rican cuisine'', ''Salsa dancing and hosting dance nights'', ''Yoga and mindfulness practice'', ''Hiking (Pennypack
    Trail)'', ''Reading contemporary fiction and Latin American literature'', ''Participating in a book club'', ''Volunteering at community cultural festivals'', ''Organizing youth financial‑literacy workshops'']'
  career_goals: Lucy aspires to become the Business Department Chair at her school, eventually moving into a district‑wide curriculum coordinator role where she can champion interdisciplinary programs that
    blend art, entrepreneurship, and cultural studies. She plans to earn a master's degree in Educational Leadership to strengthen her administrative credentials and to develop a school‑based financial‑literacy
    initiative for underserved students. Long‑term, Lucy hopes to influence education policy on equity and to author a practical guide for teachers integrating creative arts into business curricula.
