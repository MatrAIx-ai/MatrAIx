personas:
  professional: Juliana Meza, a veteran middle-school teacher and STEAM specialist, leverages a strong STEM foundation and bilingual fluency to design interdisciplinary, inquiry‑driven lessons that weave
    oil painting, pottery, and local ecology into math and science, while they embrace a relaxed, slightly disorganized approach that encourages students to value flexibility and creative problem‑solving.
  sports: Juliana Meza, an avid hiker and member of the Colorado Mountain Hikers club, tackles the Sangre de Cristo peaks each summer, roots for the Denver Broncos and Colorado Avalanche, and participates
    in a weekly senior‑center shuffleboard league that satisfies their competitive edge.
  arts: Juliana Meza, an oil‑painter, potter, and amateur guitarist, draws inspiration from Ansel Adams’ landscapes, Frida Kahlo’s storytelling brushwork, and the melodies of Carlos Santana and Joni Mitchell,
    regularly showcasing mixed‑media pieces at local folk‑dance gatherings.
  travel: Juliana Meza favors flexible, experience‑rich trips, from weekend drives to the Great Sand Dunes and seasonal adventures in Aspen to a memorable trek along the Inca Trail to Machu Picchu, and
    they dream of a future road‑trip across the American Southwest visiting Sedona’s red rocks and Santa Fe’s art markets.
  culinary: Juliana Meza, an enthusiastic home cook, blends traditional Mexican dishes like chiles en nogada, pozole, and tamales with Colorado‑grown trout, often adding roasted poblano peppers and fresh
    corn masa, and they relish hosting informal potlucks where the centerpiece is their experimental mole‑infused enchilada bake.
  core: Juliana Meza channels boundless curiosity into hands‑on learning, competitive trivia nights, and spontaneous art projects, all while juggling a delightfully disorganized schedule and a habit of
    forgetting where they parked their car after a hike.
background:
  cultural: Juliana grew up in a Mexican-American household where Spanish was spoken daily and family gatherings centered around music, storytelling, and traditional foods. The values of community, respect
    for elders, and celebration of cultural holidays such as Dia de los Muertos have shaped her worldview. After moving to Pueblo, Colorado in her early teens, she maintained strong ties to her heritage
    by participating in local Hispanic festivals and incorporating Mexican scientific history - like the contributions of ancient Aztec astronomers - into her lessons. Her bilingual fluency allows her to
    bridge cultural gaps in the classroom, and she often uses Mexican folk art motifs to make abstract concepts more relatable for her students.
