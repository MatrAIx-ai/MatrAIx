  hobbies: '[''Oil Painting'',''Pottery'',''Landscape Photography'',''Cooking Mexican Cuisine'',''Mexican Folk Dancing'',''Hiking'',''Community Garden Volunteering'',''Playing Guitar'',''Trivia Competitions'']'
  career_goals: She aims to become the district's lead STEAM coordinator, designing a culturally responsive STEM program that highlights Mexican scientific contributions and local Colorado ecology. Juliana
    plans to secure a grant to create a community-based makerspace where students and families can collaborate on art-infused science projects. She also hopes to mentor early-career teachers, present at
    regional educator conferences, and eventually publish a children's book that blends Mexican folklore with basic scientific concepts.
