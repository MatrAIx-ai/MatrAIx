persona_description: A child psychologist who specializes in the development of cognitive and moral reasoning in children. She is particularly interested in Piaget's stages of cognitive development and
  Kohlberg's moral development theory. She is also familiar with Lev Vygotsky's theory of scaffolding and cultural aspects in language development. Her research interests include the study of cognitive
  and moral development in children and the application of these theories in educational settings.
