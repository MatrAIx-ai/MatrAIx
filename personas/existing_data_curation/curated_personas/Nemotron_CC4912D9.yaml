personas:
  professional: Yuliya Rojas is a retired community event planner whose warm, cooperative nature and practical curiosity shine as they orchestrate senior center gatherings, mentor volunteers, and manage
    garden‑related projects using Excel spreadsheets and personable communication.
  sports: Yuliya Rojas stays active on the trails of Effingham’s park system, participates in the senior center’s low‑impact fitness classes, cheerfully roots for the Effingham Flyers high school football
    team and the Chicago Cubs, and they prefer leisurely walks over competitive sports, balancing seasonal outdoor strolls with gentle gardening cardio.
  arts: Yuliya Rojas channels creative energy through quilting, community theater, and a budding digital photography hobby, often citing the works of Ansel Adams for inspiration, enjoying the folk songs
    of Dolly Parton, and they regularly attend local performances of classics like "Our Town" while collecting vintage sewing patterns.
  travel: Yuliya Rojas favors purposeful road trips that blend history and scenery, having explored Chicago’s architecture, St. Louis’s Gateway Arch, and the historic Williamsburg colony, they now dream
    of a leisurely pilgrimage to the Great Smoky Mountains and a culinary tour of New Orleans during the off‑season to avoid crowds.
  culinary: Yuliya Rojas delights in Midwestern comfort cooking, hand‑rolling flaky apple and pumpkin pies, simmering chicken pot pie with heirloom vegetables, seasoning casseroles with fresh thyme and
    rosemary, and they often host potluck evenings where friends swap recipes for cornbread, deviled eggs, and their signature herb‑infused butter.
  core: Yuliya Rojas blends seasoned practicality with boundless curiosity, turning garden soil, quilting needles, and a camera lens into tools for community harmony, while they occasionally hoard extra
    pie crusts and forget to water newly‑planted seedlings.
background:
  cultural: Yuliya grew up in the heart of the Midwest, raised in a small‑town Illinois family with German and Irish ancestry. Her upbringing emphasized hard work, self‑reliance, and community responsibility—values
    that continue to shape her worldview. The region’s modest, friendly culture taught her the importance of hospitality, tending to neighbors, and preserving local traditions. While she identifies as Protestant
    (Methodist), her cultural practices blend respect for classic Midwestern customs—such as seasonal festivals, church gatherings, and home‑cooked meals—with an openness to new ideas, reflecting her curiosity
    and balanced outlook.
