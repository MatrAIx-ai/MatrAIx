  career_goals: Although Yuliya is retired from formal employment, she remains driven by personal growth and community contribution. Her primary ambition is to stay physically and mentally healthy through
    regular gardening, walking, and lifelong learning—particularly by mastering digital photography to document her family’s history and local events. She aims to mentor younger volunteers at the senior
    center, passing on her knowledge of event planning and crafts. Yuliya also aspires to compile a comprehensive family genealogy into a memoir that blends personal stories with Midwestern heritage, and
    to expand the neighborhood community garden she helped launch, ensuring it remains a practical, sustainable resource for her town. These goals reflect her blend of curiosity, practicality, and desire
    for social harmony.
