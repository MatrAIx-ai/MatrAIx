persona_description: A federal researcher who studies educational programs and policies, specifically focusing on the evaluation and assessment of special education programs. The individual is interested
  in comparing the effectiveness of schools that are required to report on the performance of students with disabilities and those that are not, and is looking for insights into the differences in practices
  and outcomes between these two groups. The researcher is likely to be familiar with the No Child Left Behind Act and its revisions, and is interested in how changes to the law may affect the accountability
  and testing requirements for special education programs.
