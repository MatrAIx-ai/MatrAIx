persona_description: A political analyst who closely follows Egyptian politics and the rise of the Islamists, particularly their role in shaping the political landscape of the country. This person is well-versed
  in the intricacies of the constitutional process and the role of the military in Egypt's political system. They are knowledgeable about the historical context of the Islamists' rise to power and the current
  divisions within Egyptian society between those who support a civil state and those who insist on making Egypt an Islamic state governed by Sharia law. They have a keen interest in the parliamentary elections
  and the subsequent presidential election in 2012, and are likely to have a deep understanding of the current political climate in Egypt.
