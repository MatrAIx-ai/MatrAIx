  career_goals: David aims to transition into a senior program-director role within a regional healthcare system or a state agricultural development agency, where he can lead multi-year strategic initiatives
    that impact community health and sustainability. Over the next five years, he plans to earn the PgMP (Program Management Professional) certification, expand his expertise in sustainable project delivery,
    and mentor emerging project managers through formal coaching programs. Ultimately, he envisions establishing a boutique consulting practice focused on helping Midwestern firms integrate lean practices
    with digital transformation while preserving local values.
