  hobbies: '[''Attending art exhibitions'', ''Watercolor painting'', ''Crocheting and quilting'', ''Cooking Mexican cuisine'', ''Gardening'', ''Visiting cultural festivals'', ''Reading historical fiction'',
    ''Salsa dancing'', ''Volunteer reading programs'', ''Book clubs'']'
  career_goals: Although retired from formal employment, Ana aims to deepen her involvement with local cultural and senior organizations in Raleigh. She hopes to mentor younger volunteers, launch a cross‑generational
    art program that showcases Mexican and American artistic traditions, and establish a small community garden that serves as a therapeutic space for seniors. Additionally, she plans to compile a family
    recipe book preserving traditional Mexican cuisine, advocate for mental‑health resources for older adults, and possibly write a memoir reflecting on her life experiences and cultural heritage.
