personas:
  professional: Ana Soto, a retired business graduate turned community volunteer coordinator, leverages their budgeting acumen, bilingual communication, and compassionate mediation skills to organize flexible,
    art-infused senior programs in Raleigh, even though their relaxed attitude toward strict deadlines sometimes leads to last‑minute scrambling.
  sports: Ana Soto enjoys low‑impact exercise through daily walks in the Raleigh park system, they dance salsa at community socials, and they cheer for the NC State Wolfpack men's basketball team while
    occasionally attending Durham Bulls baseball games as part of the local senior fans club.
  arts: Ana Soto paints watercolors inspired by Claude Monet, creates quilts drawing on Georgia O’Keeffe’s desert palette, and they regularly attend performances by the Raleigh Community Theatre, which
    showcases everything from Shakespeare to contemporary playwrights, while also supporting local galleries that feature a diverse roster of regional artists.
  travel: Ana Soto favors relaxed road trips to historic towns like Savannah and Charleston, loves exploring weekend cultural festivals such as New Orleans’ Jazz & Heritage Festival, and they plan a future
    visit to the Grand Canyon’s South Rim, always booking accommodations a month in advance but occasionally forgetting essential travel meds amid their spontaneous itinerary adjustments.
  culinary: Ana Soto delights in preparing family‑heritage dishes such as hand‑made steamed corn dough parcels filled with savory fillings, a rich sauce made with dried chilies and chocolate, and fresh
    ceviche with lime, cilantro, and tomatoes, often sourcing herbs like oregano and epazote from their own garden, and while their culinary skill borders on masterful, they sometimes over‑salt a broth
    in their enthusiasm.
  core: Ana Soto is a compassionate, art‑loving retiree who blends cultural storytelling with community service, yet their worry‑prone nature and relaxed planning leave them juggling spontaneity with occasional
    disarray.
background:
  cultural: Ana was raised in a Mexican immigrant family in Texas, speaking Spanish at home while learning English in school. Her upbringing was steeped in Mexican traditions—celebrations like Día de los
    Muertos, Catholic holidays, and a deep love for Mexican cuisine and music. After moving to Raleigh, North Carolina, she has remained active in the local Mexican-American community, participating in
    cultural events, sharing recipes, and teaching Spanish basics to neighbors. She values family, hospitality, and community solidarity, while also embracing the diverse, progressive atmosphere of her
    current city. Her bilingual ability and cultural fluency enable her to serve as a bridge between Mexican heritage and the broader Raleigh community.
