persona_description: A scientist who is interested in the study of traditional agricultural systems and their potential contributions to sustainable agriculture. They are particularly interested in the
  ecological interactions between fish, rice, and the environment, and how these systems can be used to develop innovative solutions for sustainable agriculture. They are likely to be familiar with the
  work of Xie et al. and the United Nations Food and Agriculture Organization's program to recognize "globally important agricultural heritage systems". They are likely to have a strong background in environmental
  science, ecology, and agricultural sciences, and may have expertise in methods such as ecological surveys, fieldwork, and data analysis. They are also likely to have a strong interest in developing and
  implementing sustainable agricultural practices.
