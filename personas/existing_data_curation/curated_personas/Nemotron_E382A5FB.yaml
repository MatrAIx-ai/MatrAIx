  career_goals: Renato aims to expand his solo carpentry operation into a small family‑run contracting business that can take on larger renovation projects across Toa Alta and neighboring municipalities.
    He hopes to open a community workshop where he will train the next generation of local craftsmen, preserving traditional techniques while integrating sustainable materials. Over the next five years,
    he also plans to establish a modest boutique showcasing his custom furniture, positioning himself as a cultural artisan while securing a comfortable retirement for his family.
