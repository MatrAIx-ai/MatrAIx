personas:
  professional: Renato Dominguez is a master carpenter whose three decades of experience in precise framing, historic renovation, and custom furniture making are complemented by a methodical approach to
    project management, clear client communication, and they mentor apprentices while making firm decisions when deadlines loom.
  sports: Renato Dominguez enjoys playing weekly softball at the local community center, follows the Cangrejeros de Santurfe baseball team avidly, supports the Leones de Ponce basketball squad, and they
    spend Saturdays fishing with the coastal anglers’ club, balancing team sports with solitary outdoor activity.
  arts: Renato Dominguez is a passionate fan of plena and bomba, regularly dancing to the rhythms of artists like Rafael Cepeda and listening to modern salsa icons such as Bobby Valentín, and they also
    appreciate the murals of local folk artists displayed during the town’s patron saint festivals.
  travel: Renato Dominguez prefers road‑trip adventures, having explored historic Old San Juan, the beaches of Cabo Rojo, and the colonial charm of Ponce, and they dream of a future cruise to the Dominican
    Republic’s Punta Cana, balancing cultural immersion with family‑friendly itineraries.
  culinary: Renato Dominguez excels at cooking traditional island dishes, especially mofongo stuffed with crab, arroz con gandules seasoned with sofrito, and crispy tostones, often preparing them for communal
    gatherings, and they admit their desserts, like tembleque, never quite meet their high standards.
  core: Renato Dominguez blends a structured, reliability‑driven work ethic with a gregarious love for community games, music, and cooking, and they occasionally slip into stubbornness when plans derail
    but always return to their workshop with a fresh batch of ideas.
background:
  cultural: Renato grew up in Toa Alta, a close‑knit municipality where family and community ties run deep. His upbringing blended Spanish colonial heritage with Afro‑Caribbean rhythms, reflected in the
    town's annual fiestas patronales, vibrant music, and communal meals. He was immersed in the island’s oral storytelling tradition and the value of 'familismo,' which informs his collaborative work style
    and dedication to mentoring younger neighbors. The practical resilience forged by Puerto Rico’s economic challenges shaped his preference for stability, structured planning, and tangible results in
    both his craft and personal life.
