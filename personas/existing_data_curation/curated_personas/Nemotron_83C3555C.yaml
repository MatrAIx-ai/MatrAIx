personas:
  professional: An experienced commercial cleaning specialist, Samantha Cotton blends decades of hands‑on facility maintenance with a curiosity for eco‑friendly technologies, using their practical mindset,
    they apply it to troubleshoot equipment, manage OSHA compliance, and assertively lead custodial crews, even when spontaneous scheduling makes strict deadlines a challenge.
  sports: Samantha Cotton enjoys low‑impact fitness, joining the Northwest Hiking Club for weekend trail walks and occasional kayaking on Puget Sound, cheering on the Seattle Seahawks in football and the
    Seattle Sounders FC in soccer, while they reserve winter months for indoor yoga to counteract the occasional lower‑back strain from manual labor.
  arts: Samantha Cotton unwinds with mystery novels by Agatha Christie and Gillian Flynn, listens to eco‑focused podcasts such as The Minimalists and Sustainable World Radio, and curates a playlist of folk
    and acoustic artists like Bob Dylan, Norah Jones, and Fleet Foxes, and they find that these creative threads reinforce their pragmatic yet curious outlook.
  travel: Samantha Cotton favors spontaneous, budget‑conscious road trips to nearby nature hotspots like Olympic National Park and the Oregon coast, while dreaming of a sustainable‑tourism adventure in
    Iceland’s Reykjavik and the Snæfellsnes Peninsula, and they often plan only the basics and leave room for impromptu bird‑watching detours.
  culinary: Samantha Cotton enjoys cooking affordable, wholesome meals such as lentil and vegetable stew, quinoa‑seed salad with roasted sweet potatoes, chickpea curry, and grilled wild‑caught salmon, relying
    on staple ingredients like kale, carrots, chickpeas, and fresh herbs, and they maintain a moderate cooking skill level that mixes recipe following with on‑the‑fly improvisation.
  core: Samantha Cotton is a practical, curiosity‑driven green‑cleaning pro who thrives on solo projects, balances frugality with occasional impulsive gadget buys, and they navigate life with a flexible,
    sometimes deadline‑averse rhythm.
background:
  cultural: Samantha grew up in a middle‑class white family in central Florida, where the warm climate and outdoor lifestyle shaped her appreciation for nature and practical, hands‑on work. The regional
    culture emphasizes self‑reliance, a strong work ethic, and community involvement, values that she carries into her professional and personal life. While her background is rooted in mainstream American
    traditions, she has absorbed the multicultural flavor of Florida—enjoying the local cuisine, occasional Latin‑influenced festivals, and the laid‑back, inclusive atmosphere of Volusia County. Her upbringing
    encouraged independence and modesty, leading her to value privacy, small‑group connections, and a practical approach to learning new skills.
attributes:
  skills: '[''Commercial cleaning techniques'', ''Eco‑friendly cleaning solutions'', ''OSHA safety compliance'', ''Basic facilities maintenance'', ''Inventory control'', ''Customer service and communication'',
    ''Problem solving under time constraints'', ''Adaptability and quick decision making'', ''Operation of floor scrubbers and pressure washers'', ''Basic computer literacy (MS Office, scheduling software)'']'
  hobbies: '[''Reading mystery and sustainability books'', ''Gardening (vegetables and native plants)'', ''DIY home‑repair projects'', ''Birdwatching on nature trails'', ''Listening to eco‑friendly podcasts'',
    ''Cooking budget‑friendly meals'', ''Knitting scarves'', ''Attending small community workshops on green living'', ''Participating in local beach clean‑ups'', ''Exploring flea markets for vintage finds'']'
  career_goals: Samantha aims to move from front‑line cleaning to a supervisory role where she can design and implement green‑cleaning programs for larger facilities. She plans to complete a certification
    in Environmental Health and Safety and eventually earn a facilities management credential. In the longer term, she envisions either becoming a facilities manager for a regional office complex or launching
    a small, locally‑focused cleaning business that emphasizes sustainable practices and flexible scheduling. Completing the remaining coursework toward an associate degree in business administration is
    also part of her personal development plan.
