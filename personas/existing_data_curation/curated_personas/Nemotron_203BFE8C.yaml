  career_goals: Debra is eager to broaden her influence beyond her own classroom. In the next five years she aims to complete a master’s degree in Educational Leadership with a focus on curriculum innovation,
    and to assume the role of school STEAM coordinator, crafting school‑wide arts‑integrated initiatives. She plans to lead professional‑development workshops that share her experimental, project‑based
    teaching methods with colleagues. Long‑term, Debra envisions establishing a community art hub in Naples where students, families, and local artists collaborate on public murals and exhibitions, and
    she hopes to mentor new teachers entering the field, channeling her competitive spirit into supportive mentorship.
