  hobbies: '[''Golf'',''Cycling'',''Reading (science‑fiction and business strategy)'',''Experimenting with personal finance apps'',''Cooking'',''Meditation'',''Listening to music (classic rock, jazz)'',''Attending
    live music events'']'
  career_goals: Austin aims to transition from a financial manager to a senior finance director within the next three years, positioning himself for a future CFO role at a mid‑size technology or manufacturing
    firm. He wants to lead a cross‑functional finance team, drive digital transformation of finance operations, and champion the adoption of AI‑enhanced analytics to improve decision‑making. In the longer
    term, he envisions launching his own boutique consultancy that helps small to medium enterprises optimize cash flow and implement sustainable financial practices.
