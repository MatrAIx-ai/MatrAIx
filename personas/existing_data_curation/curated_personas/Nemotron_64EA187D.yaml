personas:
  professional: Jenny Correa is a 34-year-old strategic sourcing professional who blends data-driven cost analysis, bilingual contract negotiation, and a relaxed, people-centric style to forge collaborative
    supplier relationships while pushing sustainable procurement practices, and they leverage their sociable energy to inspire cross-functional teamwork.
  sports: Jenny Correa stays active by dancing bachata and merengue at community socials, cheering for New York City FC during the soccer season, following the Knicks in winter, and participating in a co-ed
    adult basketball league at the Bronx Recreation Center, preferring social, low-pressure workouts over strict training regimens that they find too restrictive.
  arts: Jenny Correa immerses themselves in Latin-beat music, dancing to tracks by Romeo Santos and Aventura, curating playlists that feature Marc Anthony and classic salsa, regularly attending off-Broadway
    shows starring Lin-Manuel Miranda, and proudly displaying a modest collection of Frida Kahlo prints in their living room, a habit they attribute to their love of vibrant storytelling.
  travel: Jenny Correa favors spontaneous weekend getaways, often escaping to the Catskill mountains for hiking and urban gardening workshops, while dreaming of a vibrant cultural immersion trip to Cartagena
    and a relaxed beach stay in Puerto Rico, balancing limited vacation time with the occasional one-night flight to nearby cities that they book at the last minute.
  culinary: Jenny Correa showcases a strong affinity for hearty, plant-based stews like sancocho and creamy plantain mash reminiscent of mangú, regularly sourcing fresh cilantro, yucca, and local spices
    at farmers’ markets to whip up comforting meals for their lively dinner parties, while admittedly sometimes over-seasoning out of excitement, a quirk they laugh about after the guests leave.
  core: Jenny Correa is a sociable procurement strategist whose love of dancing, spontaneous cooking, and community mentorship is tempered by an end-of-day habit of misplacing their planner and a lingering
    worry that fuels both meticulous data analysis and occasional over-thinking, traits they navigate with a blend of curiosity and practicality.
background:
  cultural: Jenny is a first‑generation Dominican‑American whose upbringing in the Bronx immersed her in a vibrant Latino community. Her family's traditions—weekly family meals, music festivals, and strong
    ties to the Dominican diaspora—instilled a deep appreciation for cultural heritage and bilingual communication. She balances the warmth and collectivism of Dominican culture with the hustle and resilience
    of Bronx life, often serving as a cultural bridge in her workplace by fostering inclusive vendor relationships and celebrating her roots through food, dance, and community involvement.
attributes:
  skills: '[''Strategic Sourcing'', ''Supplier Relationship Management'', ''Cost Analysis'', ''Negotiation'', ''Contract Management'', ''Data Visualization'', ''Advanced Excel'', ''SQL'', ''Bilingual Communication
    (Spanish/English)'', ''Cross‑Functional Collaboration'']'
  hobbies: '[''Bachata dancing'', ''Cooking traditional Dominican cuisine'', ''Hosting dinner parties'', ''Community volunteering (teaching computer basics)'', ''Urban gardening'', ''Reading personal development
    books'']'
  career_goals: Jenny aims to advance to a senior procurement manager role within the next three to five years, overseeing a larger team and shaping sustainable sourcing strategies for her company. She
    plans to obtain the Certified Professional in Supply Management (CPSM) credential and to lead initiatives that integrate technology—such as AI‑assisted demand forecasting—into procurement processes.
    Long‑term, she envisions mentoring other women from underrepresented backgrounds in the Bronx, potentially launching a community‑focused mentorship program that bridges her professional expertise with
    her commitment to social harmony and empowerment.
