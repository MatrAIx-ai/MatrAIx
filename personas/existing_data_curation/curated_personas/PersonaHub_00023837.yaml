persona_description: A coastal engineer who specializes in the study of longshore drift and its effects on coastal systems, particularly in the New Zealand region. This individual has extensive knowledge
  of the characteristics and dynamics of longshore drift systems, including their formation, evolution, and impact on coastal environments. They are skilled in analyzing and predicting the effects of longshore
  drift on tidal inlets, estuaries, and lagoons, and have a deep understanding of the factors that influence the structuring of these systems. This person is also knowledgeable about the construction and
  maintenance of longshore drift barriers, including the design and implementation of groyne structures to enhance or mitigate the effects of longshore drift on the coastline.
