  career_goals: Zijing aims to advance within the manufacturing field by pursuing a supervisory or quality assurance role. She plans to complete her associate degree and later transfer to a bachelor's program
    in industrial engineering or supply chain management, gaining certifications in Lean Six Sigma and forklift operation. Ultimately, she hopes to combine her practical experience with technical expertise
    to lead process improvement projects, contribute to a more efficient production environment, and secure a stable, well paid career that allows her to support her family and continue her personal development.
