  career_goals: Patricia aims to complete her Business Administration studies at Mississippi State University and obtain a sales certification within the next two years. She plans to advance from sales
    associate to senior sales representative, then pursue a sales manager role where she can design and implement structured sales processes for a regional retail chain. Long‑term, she fantasizes about
    launching her own boutique that blends contemporary fashion with Southern style, leveraging her expertise in customer insights, inventory control, and community‑focused marketing. Along the way, she
    hopes to mentor other young sales professionals, especially women entering the retail industry.
