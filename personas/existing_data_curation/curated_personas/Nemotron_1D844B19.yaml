  career_goals: James aims to transition into a senior leadership role, such as Regional Sales Manager, within the next three years. He plans to formalize his systematic sales approach across a broader
    territory, increase annual revenue by at least 12%, and earn the Certified Professional Salesperson credential. Additionally, he wants to establish a mentorship program that raises first-year sales-rep
    retention by 15% and set the foundation for a post-retirement consulting practice that helps small tech firms design efficient sales processes.
