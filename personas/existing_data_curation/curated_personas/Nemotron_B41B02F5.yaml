  career_goals: Paul aims to earn his high‑school equivalency (GED) within the next year, then enroll in an automotive‑technology apprenticeship at a local community college. His long‑term ambition is to
    secure a stable position as an automotive technician while also exploring the possibility of joining Madison's volunteer fire department, where his desire to help others and his teamwork strengths would
    be valuable. He hopes to build a career that blends practical, hands‑on work with community service, allowing him to contribute to his hometown and eventually mentor younger teens facing similar educational
    challenges.
