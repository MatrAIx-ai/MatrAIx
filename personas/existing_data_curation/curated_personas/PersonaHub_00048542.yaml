persona_description: A scientist who studies the impacts of climate change on mountain ecosystems and the responses of different forest types to changing environmental conditions. This scientist uses satellite
  imagery, ground measurements, and statistical analysis to understand how mid-level forests, which are sensitive to rising temperatures and changes in precipitation and snowmelt, are affected by these
  changes. They are interested in the complex interactions between temperature, precipitation, and snowmelt, and how these factors contribute to the decline of mid-level forests in the western United States.
