personas:
  professional: Francisco is an aspiring community outreach coordinator who blends bilingual communication, basic graphic design, and event-planning experience to craft arts-based youth programs, and they
    thrive when steering collaborative projects that celebrate local traditions while staying organized yet adaptable.
  sports: Francisco enjoys playing pickup basketball at the local park, follows the Visalia Rawhide and the Los Angeles Lakers on game nights, and joins a weekend salsa-dance fitness class that doubles
    as cardio, all while cheering for the San Jose Earthquakes whenever they travel to watch a match.
  arts: Francisco is a watercolour enthusiast and street-art documentarian who frequently shares Instagram reels featuring murals by local creator Cielito, draws inspiration from Frida Kahlo and Diego Rivera,
    and they attend live performances by the local mariachi ensemble and the San Jose Symphony.
  travel: Francisco loves spontaneous road trips along Highway 101, has explored Santa Barbara’s historic mission, trekked the redwoods of Humboldt County, and they dream of a cultural immersion stay in
    Oaxaca during Día de los Muertos, preferring budget-friendly hostels over luxury hotels.
  culinary: Francisco delights in cooking homemade tamales, carnitas, and caliente salsa verde for friends, expertly balancing fresh cilantro, roasted chilies, and masa, yet they often burn the edges of
    their corn tortillas when multitasking between painting and plating.
  core: Francisco is a talkative, curiosity-driven 21-year-old who seamlessly merges meticulous planning with spontaneous midnight mural hunts, frequently loses sleep over unfinished art projects, and they
    habitually carry a sketchbook everywhere.
background:
  cultural: Francisco is a second‑generation Mexican American who grew up in a bilingual household in Visalia, California. He was raised with strong family ties, celebrating Mexican holidays such as Día
    de los Muertos, Cinco de Mayo, and Christmas with traditional foods, music, and community gatherings. His parents emphasized the value of helping others, which fostered his compassionate nature and
    involvement in local volunteer work. Fluent in both Spanish and English, he bridges cultural contexts by translating for community members, preserving Mexican folklore, and promoting cross‑cultural
    understanding through art and storytelling. While rooted in Mexican traditions, he also embraces the diverse cultural fabric of the Central Valley, participating in multicultural events and integrating
    Californian influences into his everyday life.
attributes:
  skills: '[''Bilingual Spanish-English communication'', ''Public speaking'', ''Group facilitation'', ''Volunteer coordination'', ''Event planning and logistics'', ''Conflict mediation'', ''Basic graphic
    design (Canva, Photoshop)'', ''Photography and photo editing'', ''Social media content creation'', ''Time management'', ''Team collaboration'', ''Empathy-driven problem solving'']'
  hobbies: '[''Exploring local street art and murals'', ''Sketching and watercolour painting'', ''Photography, especially documenting community events'', ''Salsa and cumbia dance classes'', ''Cooking traditional
    Mexican recipes'', ''Volunteering at community centers and animal shelters'', ''Tutoring younger students in Spanish'', ''Reading science fiction and philosophy'', ''Creating social media content for
    local cultural events'', ''Playing cooperative online video games'']'
  career_goals: Francisco aims to enroll in a community college program in communications or social work and eventually earn a bachelor's degree in community development or arts administration. He aspires
    to become a community outreach coordinator who designs and runs arts‑based youth programs that blend cultural heritage with contemporary creative expression. In the long term, he envisions leading a
    nonprofit organization that uses art and storytelling to foster social inclusion and empower underserved neighborhoods in the Central Valley. He also hopes to deepen his digital media expertise to produce
    content that celebrates Mexican-American culture and inspires cross‑cultural dialogue.
