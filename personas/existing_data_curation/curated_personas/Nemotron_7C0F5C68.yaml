  career_goals: Although Kimberly is no longer employed full‑time, she aims to stay actively engaged in her community and personal growth. She hopes to join the board of the Lima Arts Council, mentor younger
    volunteers at the senior center, complete a series of advanced watercolor workshops, and compile a family memoir that weaves together her genealogical research. Additionally, she plans to travel to
    regional museums and historic sites, expand her digital photography portfolio, and spearhead a community garden project that promotes sustainable growing practices.
