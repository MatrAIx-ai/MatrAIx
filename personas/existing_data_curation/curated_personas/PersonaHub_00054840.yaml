persona_description: A biomedical engineering student who is enrolled in a senior level thermal design course and is tasked with developing an Excel spreadsheet calculator for blood properties. The student
  is expected to build upon the constitutive equations developed by the authors for the project and use MATLAB to evaluate thermodynamic properties that require integration or differentiation. The student
  will be required to represent design data in terms of curve fits and develop a computerized property data base, as well as program in Excel and graph in Excel. The student will be expected to demonstrate
  knowledge of thermodynamics and thermophysical properties, as well as have experience with Excel and MATLAB programming.
