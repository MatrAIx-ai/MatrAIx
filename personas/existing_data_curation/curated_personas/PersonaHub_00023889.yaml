persona_description: A University of Alberta researcher who specializes in the study of cultural and religious beliefs of ancient First Nations groups, particularly the Beothuk people. His work involves
  the examination of historical Aboriginal sites and the interpretation of artifacts to uncover the religious practices and beliefs of these groups. He is passionate about sharing his findings with the
  world and promoting awareness of the diversity of human thought processes.
