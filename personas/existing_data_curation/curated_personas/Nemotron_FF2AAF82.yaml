personas:
  professional: Chan Hibbard is a seasoned project management professional who leverages meticulous planning, risk‑aware execution, and data‑driven decision‑making to lead cross‑functional teams in delivering
    infrastructure projects across the Mid‑South, while channeling their sociable energy into mentoring junior staff and forging stakeholder alliances.
  sports: Chan Hibbard is a dedicated amateur athlete who pitches for the Jackson River Rats softball league, hikes with the Mid‑South Trailblazers at Tishomingo State Park, and follows the Memphis Grizzlies
    in the NBA and the New Orleans Saints in the NFL, balancing competitive drive with a collaborative spirit that keeps team morale high.
  arts: Chan Hibbard engages with the arts through a love of classic country and Southern gospel, frequently listening to Willie Nelson, Alabama, and the choir of their Methodist congregation, attending
    live blues performances by B.B. King when touring, and supporting local theater productions such as 'The Glass Menagerie' at the Jackson Playhouse; their genealogical hobby also fuels an appreciation
    for historical narratives found in documentaries by Ken Burns.
  travel: Chan Hibbard prefers meticulously planned trips, often weekending on a fishing charter along the Mississippi River near Vicksburg, hiking the rugged trails of Tishomingo State Park, and taking
    longer vacations to New Orleans for its culinary scene and to the Great Smoky Mountains for scenic drives, all while keeping travel costs within a preset budget that protects time for community commitments.
  culinary: Chan Hibbard is an avid grill master who perfects a hickory‑smoked St. Louis‑style rib recipe, slathers pulled pork with a tangy Memphis‑style sauce, and serves classic sides like hush puppies
    and coleslaw, frequently experimenting with rubs featuring paprika, brown sugar, and cayenne, yet they sometimes over‑smoke the meat and forget to let it rest, leading to occasional dry bites that they
    jokingly attribute to 'project timeline pressure.'
  core: Chan Hibbard is a methodical project leader who channels a love of structure into community service, meticulous finances, and perfectly smoked ribs, yet their penchant for premium fishing gear and
    spontaneous BBQ gatherings sometimes tips the balance.
background:
  cultural: Chan was raised in the Southern United States, with deep roots in Mississippi’s rural-suburban culture. He grew up in a close-knit Methodist family that emphasized hospitality, community service,
    and a strong work ethic. His upbringing combined traditional Southern values—such as respect for family, self-reliance, and practical problem solving—with exposure to broader business perspectives through
    his university education. This blend informs his pragmatic, structured approach to work and his outgoing, collaborative involvement in local civic and religious organizations.
attributes:
  skills: '[''Project Planning'', ''Risk Management'', ''Budgeting & Cost Control'', ''Schedule Development'', ''Waterfall Methodology'', ''Agile Scrum'', ''Stakeholder Communication'', ''Contract Negotiation'',
    ''Financial Analysis'', ''Strategic Planning'', ''Quality Assurance'', ''Data Visualization (Excel, Power BI)'', ''Six Sigma Process Improvement'', ''Team Leadership'', ''Mentoring'']'
  hobbies: '[''Softball League'', ''Youth Mentoring (United Way)'', ''Church Event Coordination'', ''Fishing'', ''Hiking'', ''Southern BBQ Cooking'', ''Project Management Meetup'', ''Business Leadership
    Reading'', ''Genealogy Research'']'
  career_goals: Chan aims to transition into a senior program-manager or director of a Project Management Office within the next five years, overseeing large-scale infrastructure and community-development
    initiatives across the Mid-South. He plans to earn his PMP and Agile Certified Practitioner (PMI-ACP) credentials, publish thought-leadership articles on risk-aware project delivery, and become a sought-after
    speaker at regional PM conferences. Long-term, he envisions launching a boutique consulting firm that helps Mississippi municipalities implement resilient, cost-effective projects while mentoring the
    next generation of project managers.
