  hobbies: '[''Sketching and watercolor painting'', ''Street photography'', ''Attending live music concerts and improv theater'', ''Visiting art galleries and museum exhibitions'', ''Volunteering for community
    mural projects and youth art workshops'', ''Participating in board‑game nights with friends'', ''Reading contemporary philosophy and psychology'', ''Journaling and mindfulness meditation'', ''DIY craft
    and mixed‑media projects'', ''Exploring local nature trails and the Arkansas River'']'
  career_goals: Mark aspires to combine his love for art with his desire to help others by working in community‑focused cultural programs. His short‑term goal is to secure an entry‑level position at a local
    museum, art center, or nonprofit that offers art‑based outreach and mental‑well‑being initiatives in Little Rock. Over the next five years he hopes to complete his bachelor’s degree in Art History or
    Human Services, earn a certification in art therapy, and move into a program‑manager role where he can design and lead workshops that use visual art as a therapeutic tool for teens and adults coping
    with anxiety and depression. He is also interested in eventually pursuing a master’s degree in counseling or expressive arts therapy to broaden his impact across the state.
