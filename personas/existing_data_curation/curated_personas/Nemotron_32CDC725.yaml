  career_goals: Steven aims to transition into a senior leadership role, such as Regional Sales Director, where he can shape broader market strategies and mentor a larger team of sales professionals. He
    envisions building a consultancy focused on helping small and mid‑size manufacturers adopt innovative sales techniques and data‑driven processes. Additionally, he hopes to champion diversity and inclusion
    initiatives within his industry, leveraging his experience to support emerging Black entrepreneurs in the manufacturing sector. Ultimately, he plans to balance his professional legacy with community
    involvement, offering workshops and mentorship programs for youth interested in business and sales.
