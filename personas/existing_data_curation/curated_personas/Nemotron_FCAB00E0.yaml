  career_goals: Though still early, Paul often talks about becoming a creator—an illustrator of children’s books, a museum exhibit designer, or a wildlife artist who captures the forests around Cortland.
    He is fascinated by how art can explain scientific ideas, so he imagines a future where he merges drawing with discovery, perhaps as a science communicator or an architect of interactive learning spaces.
    He aspires to keep learning, attend a school that nurtures his curiosity, and someday turn his love of nature and art into a career that lets him share beautiful ideas with others.
