personas:
  professional: Charles Grant is a budding miniature architect who assembles elaborate forts from couch cushions and Lego bricks with meticulous step‑by‑step plans, turning abstract ideas into tangible
    play structures while reliably following the instructions of picture books and impressing peers with their organized, imaginative creations.
  sports: Charles Grant plays on the Little Tigers Soccer Club, thrills at the fast‑paced drills that let them sprint across the field, cheers loudly for the New York Knicks during family basketball nights,
    and idolizes the agility of professional gymnast Simone Biles, often mimicking her flips at the backyard trampoline.
  arts: Charles Grant spends afternoons drawing whimsical creatures inspired by Dr. Seuss, sings along energetically to the catchy tune of 'Baby Shark,' and delights in watching classic Walt Disney animations,
    often reenacting favorite scenes with stuffed animal actors.
  travel: Charles Grant prefers family road trips to magical destinations like Disneyland and the interactive Children's Museum of Indianapolis, enjoys planning the itinerary with colorful stickers on a
    travel board, and dreams of one day snorkeling among the coral reefs of the Great Barrier Reef.
  culinary: Charles Grant loves crunchy chicken nuggets, creamy mac & cheese, and sweet strawberry slices, proudly helps stir banana pancakes using a plastic whisk, and insists on sprinkling a dash of cinnamon
    over their oatmeal for extra flavor.
  core: Charles Grant is a hyper‑curious four‑year‑old who transforms playtime into methodical, imaginative projects, competes fiercely in treasure‑hunt games, and never misses a chance to stash a coin
    in their bright pink piggy bank.
background:
  cultural: Charles is raised in a white, Midwestern family in Joplin, Missouri, within Jasper County. His upbringing blends the close‑knit community spirit of a small-town environment with typical Midwestern
    values such as friendliness, modesty, and a strong sense of family. He regularly attends community events like the annual county fair, Sunday family meals, and local church gatherings, which provide
    him with a supportive network of neighbors and relatives. The local public school system emphasizes early literacy, arts, and social development, allowing Charles to explore his interests in storytelling,
    art, and collaborative play while staying grounded in the familiar rhythms of a rural‑suburban setting.
