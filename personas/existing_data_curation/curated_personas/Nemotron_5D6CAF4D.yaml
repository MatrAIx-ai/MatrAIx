  career_goals: Even at four, Charles talks about big‑picture dreams. He often says he wants to be an astronaut because he loves space pictures in books and enjoys building rocket models from blocks. He
    also mentions wanting to become an artist, imagining his own comic books filled with fantastical characters. Occasionally he says he would like to be a scientist or inventor, describing experiments
    he could do with household items. These aspirations reflect his curiosity for novelty, abstract ideas, and his competitive drive to create and discover new things.
