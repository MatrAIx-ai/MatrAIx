  career_goals: She aims to move into a senior product manager role within the next three years, leading cross‑functional teams to deliver technology solutions that solve real business problems. Concetta
    plans to augment her business degree with a part‑time MBA focused on technology management, and to earn a PMP certification to strengthen her project leadership credentials. She also envisions eventually
    establishing her own consultancy that helps small businesses in rural Kentucky adopt affordable digital tools, allowing her flexibility to manage her personal life while leveraging her curiosity for
    new tech.
