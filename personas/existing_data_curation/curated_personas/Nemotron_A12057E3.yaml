  hobbies: '["Visiting Art Galleries", "Watercolor Painting", "Quilting", "Gardening", "Hiking/Nature Walks", "Community Volunteering", "Book Club", "Knitting Circle", "Cooking & Baking", "Genealogy Research",
    "Attending Live Music"]'
  career_goals: Brenda aims to move into a supervisory role within the retail environment where she can mentor new employees, streamline inventory processes, and promote a harmonious workplace. She plans
    to earn a certification in supply chain management to deepen her expertise and increase her leadership potential. Simultaneously, she envisions dedicating more time to community service by leading art‑related
    workshops for seniors at the local community center and coordinating food‑bank deliveries. Her long‑term ambition is to transition into a part‑time position that blends her logistical strengths with
    her passion for helping others, allowing her to retire from full‑time stock work while staying actively engaged in meaningful work.
