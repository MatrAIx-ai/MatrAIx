  career_goals: Nathan aims to move into a senior leadership role, such as Director of Marketing or VP of Marketing, within a regional consumer‑goods firm or a mid‑size tech company in the Midwest. He wants
    to be known for creating data‑driven campaigns that deliver measurable growth while maintaining a flexible, innovative approach. Over the next five years, he plans to develop a robust analytics framework
    for his department, mentor a small high‑performing team, and eventually launch his own boutique consulting practice focused on helping local small businesses improve their brand visibility. He also
    seeks a healthier work‑life balance to reduce stress and improve his overall well‑being.
