  hobbies: '[''Community basketball league'', ''Hip-hop dance crew'', ''Cooking Southern dishes with family'', ''TikTok content creation'', ''Volunteering at the local food bank'', ''Church youth group
    activities'', ''Listening to R&B and gospel music'', ''Playing video games with friends'']'
  career_goals: Pearline’s immediate goal is to earn her GED within the next year, providing a concrete credential that aligns with her structured mindset. She plans to enroll in a culinary arts program
    at a local community college, aiming to become a chef who modernizes Southern soul food and eventually opens her own restaurant. Parallel to this, she is exploring the Army Reserve as a pathway to gain
    disciplined training, educational benefits, and a clear career ladder. Leveraging her digital fluency, she also intends to build a personal brand on TikTok focused on fashion, lifestyle, and cooking
    tips for teenage Black girls, turning the platform into a side business that could generate additional income and mentorship opportunities.
