personas:
  professional: Edward Huang is a methodical project management specialist who leverages advanced Excel, Asana, and Microsoft Project to build detailed schedules, allocate resources efficiently, conduct
    thorough risk assessments, and foster clear stakeholder communication while aiming for PMP certification and a senior role in Texas construction projects.
  sports: Edward Huang competes in the Milam County flag‑football league and joins the Fredericksburg Hoops basketball club, enjoys weekend hikes and fishing trips in the Texas Hill Country, and roots for
    the Dallas Cowboys and Dallas Mavericks while maintaining a disciplined workout schedule.
  arts: Edward Huang expresses creativity by strumming acoustic guitar at a local jam session, covering songs by Sturgill Simpson and Chris Stapleton, attending weekly country‑rock shows at Austin’s iconic
    Antone’s, and occasionally experimenting with songwriting during late‑night practice.
  travel: Edward Huang plans trips with the same spreadsheet precision used at work, favoring road‑trip hikes to Enchanted Rock, weekend getaways to Austin’s music festivals, and dreaming of a future backpacking
    adventure through the Rocky Mountains, while balancing travel costs against saving goals.
  culinary: Edward Huang’s palate favors smoky Texas barbecue—especially brisket glazed with honey‑jalapeño sauce—and fresh grilled trout seasoned with lemon and dill, which they often prepare at home after
    a fishing trip, though they admit to over‑indulging in late‑night pizza when a project deadline looms.
  core: Edward Huang blends project‑management precision with an outgoing, community‑focused streak, balancing structured career ambitions with weekend sports, guitar jams, and a love for Texas outdoors,
    all while juggling disciplined finances and occasional indulgent quirks.
background:
  cultural: Edward was raised in Milano, a small town in Milam County, Texas, where a blend of Southern hospitality, rural work ethic, and Texan pride shapes everyday life. His family, of European descent,
    maintains traditions such as Sunday gatherings, church involvement, and annual county‑fair celebrations, which emphasize community cohesion and mutual support. Growing up in this environment, Edward
    developed a deep appreciation for local customs like Texas barbecue, high‑school football culture, and the informal storytelling that characterizes the region. While his cultural identity is firmly
    rooted in Anglo‑American Texas culture, he also respects the multicultural influences present in the broader state, fostering an inclusive outlook.
attributes:
  skills: '["Project scheduling", "Resource allocation", "Risk assessment", "Stakeholder communication", "Budget management", "Microsoft Project", "Asana", "Advanced Excel data analysis", "Team leadership
    & facilitation", "Process improvement & lean methodology"]'
  hobbies: '["Flag football", "Recreational basketball", "Hiking in Texas Hill Country", "Fishing", "Acoustic guitar playing", "Live country‑rock concerts", "Community volunteering (youth workshops, event
    coordination)", "Strategy video gaming", "Reading leadership & productivity books"]'
  career_goals: Edward aims to earn his Project Management Professional (PMP) certification within the next two years and transition from a specialist role to a senior project manager overseeing multi‑disciplinary
    construction and infrastructure projects in Texas. He is interested in applying lean and agile principles to large‑scale residential and commercial developments, ultimately aspiring to lead a regional
    project portfolio. In the long term, Edward hopes to establish his own consulting firm that helps small Texas businesses implement efficient project workflows while fostering community development initiatives.
    He also seeks mentorship opportunities to refine his leadership style and expand his professional network.
