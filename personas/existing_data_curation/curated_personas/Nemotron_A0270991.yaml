  hobbies: '[''Basketball (pickup games & coaching)'', ''Community theater (backstage crew)'', ''Grilling and barbecuing'', ''Classic rock concerts'', ''Hiking in local parks'', ''Vegetable gardening'',
    ''Volunteering at the local food bank'']'
  career_goals: He aims to solidify his teaching credentials by completing a master’s degree in education and obtaining an Ohio teaching license, despite his non‑traditional high‑school background. In the
    next five years he hopes to become the head of the Social Studies department, where he can shape curriculum and mentor newer teachers. He also wants to design a school‑wide mentorship program that pairs
    upper‑classmen with freshmen to foster a supportive community, reflecting his priority on harmony. Long‑term, he envisions moving into school administration, perhaps as an assistant principal, to influence
    school culture and ensure a balance between reliable routines and opportunities for creative, student‑driven learning.
