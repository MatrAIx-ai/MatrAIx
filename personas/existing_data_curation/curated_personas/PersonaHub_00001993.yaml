persona_description: An oceanographer or a scientist who is interested in understanding the interactions between the ocean, atmosphere, biosphere, and lithosphere. They are likely to be a researcher or
  a professor who has conducted studies on the first-order processes within the sea and its impact on its chemistry. They may have expertise in topics such as ocean temperature, energy imbalance, rogue
  or freak wave formation, and the ocean's role in climate change. They may also be familiar with physical oceanography and have a background in meteorology, ocean engineering, and oceanography.
