  hobbies: '[''birdwatching'', ''photography (nature and urban scenes)'', ''balcony vegetable gardening'', ''reading historical fiction and memoirs'', ''small‑group book club'', ''cooking (American-Indian
    fusion recipes)'', ''knitting'', ''pottery'']'
  career_goals: 'Although retired from formal employment, Jill aims to deepen her community involvement and personal growth. She plans to expand the senior‑center gardening program, teaching fellow seniors
    how to grow edible and ornamental plants. She also hopes to document her family’s culinary traditions in a small cookbook that blends American and Indian recipes, sharing stories that reflect her multicultural
    background. Jill is interested in completing a short certificate in digital photography, allowing her to capture Oakland’s neighborhoods and natural spaces, which she could later exhibit at local community
    centers. Travel remains a modest ambition: she would like to take a scenic road trip along the Pacific Coast, stopping at parks and historic sites, while maintaining the flexibility to return to her
    garden whenever she wishes.'
