  hobbies: '[''Reading contemporary fiction and design books'', ''DIY home‑decor projects'', ''Gardening'', ''Hiking local trails'', ''Yoga'', ''Cooking Southern cuisine'', ''Small‑group wine tastings'',
    ''Volunteering at a local animal shelter'', ''Journaling'']'
  career_goals: Alicia aims to become one of the top-producing agents in the Greensboro market within the next three years, earning a place in the regional top‑5% sales leaderboard. She plans to leverage
    her track record to open a boutique brokerage focused on residential sales, where she can mentor a small, high‑performing team. In the longer term, she aspires to diversify into property investment,
    acquiring and renovating homes for rental income, and eventually obtaining a real‑estate development license. She also intends to complete a professional certification in real‑estate finance to deepen
    her expertise.
