personas:
  professional: A driven real‑estate agent named Alicia Cochran leverages market analysis, staging expertise, and CRM mastery to dominate Greensboro listings, and their competitive, structured mindset pushes
    them to exceed sales targets while meticulously coordinating every transaction, and they relish the thrill of closing each deal.
  sports: A dedicated outdoor enthusiast named Alicia Cochran follows the Carolina Panthers and UNC Tar Heels, hikes with the Greensboro Trailblazers club on weekend trips, practices yoga at FlowStudio,
    and they prefer low‑impact, structured fitness activities that fit their schedule and competitive nature.
  arts: An avid design aficionado named Alicia Cochran devours contemporary fiction by Celeste Ng, studies interior‑design monographs by Kelly Hoppen, curates playlists featuring Phoebe Bridgers and Leon
    Bridges, and regularly attends performances by the Carolina Ballet and indie art shows at the Greensboro Center for Creative Arts, letting these influences shape the aesthetic sensibility they bring
    to home‑staging projects.
  travel: A purposeful traveler named Alicia Cochran plans meticulous weekend road trips, having explored Asheville’s Blue Ridge Parkway, Savannah’s historic riverfront, and a Napa Valley vineyard tour,
    while dreaming of a solo culinary immersion in Tuscany, and they balance limited vacation time with a craving for both adventure and relaxation.
  culinary: A passionate home cook named Alicia Cochran specializes in Southern comfort dishes such as fried chicken with hot honey, shrimp & grits, and sweet‑potato pie, expertly seasons with garden‑fresh
    thyme, rosemary, and collard greens, and delights friends with boutique Pinot Noir pairings during low‑key wine‑tasting evenings they host.
  core: Alicia Cochran, a 27‑year‑old real‑estate star with a meticulous design eye, disciplined yet occasionally indulgent finances, health‑focused routines, and intimate gatherings, blends a competitive
    edge with solitary creativity, and they navigate life with a uniquely structured yet flexible approach.
background:
  cultural: Alicia grew up in a middle‑class, white family in Greensboro, North Carolina. Her upbringing reflects a blend of Southern modesty and contemporary suburban culture, with an emphasis on self‑reliance,
    community involvement, and hospitality. While she appreciates traditional Southern foods, local festivals, and the region’s history, she also values personal independence and a pragmatic outlook shaped
    by her family’s focus on education and hard work. Her cultural identity is grounded in the Greensboro community, where she maintains connections to local schools, churches, and neighborhood networks,
    yet she prefers a low‑key, private social life.
attributes:
  skills: '[''Market analysis'', ''Property valuation'', ''Negotiation'', ''Contract preparation'', ''Client relationship management'', ''MLS database proficiency'', ''CRM software (Follow Up Boss, HubSpot)'',
