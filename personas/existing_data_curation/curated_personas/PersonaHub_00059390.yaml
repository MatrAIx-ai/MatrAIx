persona_description: A scientist and researcher working in the field of paleoclimatology and environmental science, particularly focused on the study of past climate change patterns and their correlation
  with present and future climate conditions. With expertise in lake sediment analysis and paleoclimatic records, they collaborate with researchers across California to develop high-resolution, well-dated
  lake-sediment records of paleoclimate change in California, focusing on water variability. They are interested in the timing, amount, and patterns of precipitation using computer climate models to predict
  future patterns of change in California, with a particular focus on the state's heavily engineered water distribution system. They are also interested in the potential range of climate variability, including
  mega-droughts of the medieval period, and the use of high-density and high-precision radiocarbon dating techniques to develop maps of precipitation variability in California over the last 2,000 years.
