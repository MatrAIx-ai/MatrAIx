persona_description: 'A professor of Classical Studies who specializes in the history of women''s protests in the early Roman empire, integrating theories of memory, exemplarity, and landscape. Her research
  interests include the history of Boudica, the fierce leader of the Brittonic Iceni tribe who led a revolt against the Romans, and the economic and cultural life of the Iceni. She is currently working
  on a book concerning forms of female protest as recorded in Tacitus'' Annals and writing about women in the year of the four emperors. Her first book, Boudica: Woman Warrior of Roman Britain, was published
  with Oxford University Press in 2018.'
