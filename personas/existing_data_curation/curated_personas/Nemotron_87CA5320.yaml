  hobbies: '[''Gardening'', ''Historical Reading'', ''Fishing'', ''Woodworking'', ''Grilling/Smoking'', "Senior Men''s Choir", ''Community Volunteer'', ''Chess'']'
  career_goals: Richard aims to transition from a floor‑staff role to a supervisory position within the next two years, aspiring to become a shift manager and eventually a full restaurant manager. He is
    also exploring the possibility of opening a modest neighborhood café that showcases Texas comfort food using locally sourced ingredients. In parallel, he hopes to develop a mentorship program for younger
    employees, create structured training materials, and perhaps partner with a longtime colleague to launch a small catering service for community events.
