personas:
  professional: A seasoned front-of-house veteran with over three decades of high-volume restaurant experience, Richard Lindsay leverages their ServSafe certification, POS mastery, and methodical training
    style to keep service smooth, while quietly mapping out a path toward shift management and a modest neighborhood café that showcases locally sourced Texas comfort food.
  sports: An avid fan of local teams and modest fitness, Richard Lindsay cheers for the Houston Astros, Rockets, and Texans while playing senior-league fishing with the Lake Houston Anglers Association,
    participates in a weekly walking group at the community park, and occasionally joins a low-impact yoga class to ease joint stiffness.
  arts: A community-oriented arts enthusiast, Richard Lindsay sings baritone harmonies in a senior men's choir performing classics by Johnny Cash and Willie Nelson, collects vintage posters of the Grand
    Ole Opry, enjoys occasional trips to the Houston Museum of Fine Arts to view works by Texas landscape painters, and unwinds with classic western films starring Sam Elliott.
  travel: A thoughtful planner with a love for road trips, Richard Lindsay has driven the Texas Hill Country to attend the Austin City Limits festival, visited New Orleans for its jazz and cuisine, dreams
    of exploring the historic streets of Savannah, and hopes to one day tour the vineyards of Napa Valley, always booking accommodations well in advance to stay within their modest travel budget.
  culinary: A seasoned grill master, Richard Lindsay perfects smoked brisket and ribs using mesquite wood, seasons their garden-picked tomatoes, peppers, and jalapeños into fresh salsa for tacos, crafts
    hearty chili with black beans and locally sourced beef, and occasionally experiments with a dry-rubbed pork shoulder, all while sharing their smoked creations at neighborhood potlucks.
  core: Richard Lindsay blends decades of restaurant expertise, methodical organization, and Texas-rooted hospitality into a steady pursuit of managerial leadership, community mentorship, and backyard culinary
    experiments, all while balancing a love of solo gardening with occasional choir performances.
background:
  cultural: Richard comes from a multi‑generational Anglo‑American family that settled in Texas in the early 1900s. He grew up in a middle‑class suburban setting near Dallas before moving to the Houston
    metropolitan area in his thirties, where he embraced the diverse yet distinctly Texan blend of Southern hospitality and multicultural influences. Raised in a Protestant household, he maintains a modest,
    community‑oriented outlook and values the traditions of Texas cuisine, country music, and local festivals. His cultural identity reflects both broader American mainstream and the particular warmth,
    self‑reliance, and hospitality associated with long‑time Texas residents.
attributes:
  skills: '[''Customer Service'', ''Communication'', ''Conflict Resolution'', ''Menu Knowledge'', ''Food Safety (ServSafe)'', ''POS System Operation (Toast, Square)'', ''Cash Handling'', ''Inventory Management'',
