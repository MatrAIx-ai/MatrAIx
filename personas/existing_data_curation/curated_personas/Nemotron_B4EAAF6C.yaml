  hobbies: '[''model kit assembly'', ''puzzle solving'', ''woodworking'', ''fishing'', ''chess club'', ''reading non-fiction (DIY, industrial processes)'']'
  career_goals: Christopher aims to move from frontline cleaning to a supervisory role in facilities management within the next three to five years. He plans to earn certifications such as Certified Facility
    Manager (CFM) and acquire deeper knowledge of building systems to qualify for a facilities coordinator position. Long‑term, he aspires to become a facilities manager for a manufacturing plant in the
    Corning area or to launch his own commercial cleaning business that emphasizes efficiency, reliability, and strict quality standards.
