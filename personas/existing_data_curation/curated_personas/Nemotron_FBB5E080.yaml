personas:
  professional: Sergei Martin, a 10‑year‑old budding engineer and storyteller, they blend a fierce curiosity for science‑fiction with methodical LEGO building, redstone circuitry in Minecraft and Scratch
    animation, turning their organized, reliable nature into miniature projects that always follow a clear plan.
  sports: Sergei Martin, an eager member of the Columbia City Cubs Soccer Club, they sprint through weekend matches with a disciplined warm‑up routine, cheer for the Seattle Sounders FC and Seattle Seahawks,
    and balance the thrill of competition with a methodical habit of tracking their progress on a simple stats sheet after each game.
  arts: Sergei Martin, a budding pianist who practices Mozart’s Sonatas and Einaudi’s \"Nuvole Bianche\", they immerse themselves in adventure novels by Isaac Asimov, watch Studio Ghibli animations, and
    spend weekends humming along to The Beatles and Taylor Swift while sketching scenes for their Scratch projects.
  travel: Sergei Martin, whose family road trips have taken them hiking through Olympic National Park and exploring the lavender fields of Vancouver, they plan future adventures around the solar system—dreaming
    of a science‑fiction‑themed visit to Space Center Houston—while balancing a modest travel budget and school schedule.
  culinary: Sergei Martin, an eager but still novice kitchen helper, they love assembling homemade pizza with pepperoni, mozzarella, and fresh basil, stirring spaghetti Bolognese using carrots and tomatoes
    harvested from the family garden, and delight in a slice of warm apple pie, though they frequently add extra chocolate chips to cookies despite their parents' gentle scolding.
  core: Sergei Martin, a 10‑year‑old explorer‑engineer, they balance relentless curiosity with a checklist‑driven routine, often fretting over unfinished projects while secretly hoarding stray LEGO bricks
    in their bedroom.
background:
  cultural: Sergei was born and raised in Columbia City, a small town in Whitley County, Indiana. His family blends typical Midwestern American values—community involvement, modesty, and respect for hard
    work—with a modest Eastern European heritage reflected in his name; his grandparents immigrated from Ukraine and passed down occasional traditions such as celebrating Easter with traditional foods and
    a few phrases in Russian. He attends a public elementary school where local customs like Friday night football games, county fairs, and church gatherings shape his social world. The supportive, close-knit
    environment of rural Indiana encourages him to be cooperative and considerate, while the practical concerns of a farming community influence his interest in tangible, useful inventions.
