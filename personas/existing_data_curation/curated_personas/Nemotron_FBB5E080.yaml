  hobbies: '[''reading adventure and science-fiction books'', ''Lego building'', ''exploring nature and collecting insects and plants'', ''Minecraft and redstone experiments'', ''Scratch coding projects'',
    ''playing piano'', ''soccer'', ''gardening with family'', ''Cub Scouts'']'
  career_goals: Sergei dreams of becoming a mechanical engineer or inventor who creates practical tools that help people in his community. He often imagines designing a simple eco-friendly garden irrigation
    system for his neighborhood or building a robot that assists with household chores. His love for structured problem-solving leads him to consider a future in robotics or environmental engineering. He
    also expresses a desire to be a teacher one day, so he can share his organized approach and supportive nature with younger students.
