  hobbies: '[''Visiting art galleries'', ''Sketching and watercolor painting'', ''Acoustic guitar'', ''Reading science‑fiction and philosophy'', ''Hiking in the Great Smoky Mountains'', ''Building scale
    model engines'', ''Robotics club participation'', ''Yoga and mindfulness meditation'', ''Journaling'', ''Playing chess'', ''Woodworking contests'']'
  career_goals: Bobby aims to advance into a senior leadership role where he can lead a multidisciplinary engineering team, drive innovative and sustainable product solutions, and integrate his educational
    expertise by establishing an internal engineering training program. He seeks to obtain his Professional Engineer (PE) license, publish technical papers on eco‑friendly mechanical design, and eventually
    transition to teaching mechanical engineering at a community college or university. Additionally, he is committed to developing personal coping strategies for anxiety and hopes to become an advocate
    for mental‑health awareness within the engineering community.
