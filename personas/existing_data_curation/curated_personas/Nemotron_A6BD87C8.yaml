personas:
  professional: Olga Fonseca, a surveillance officer at a bustling casino, leverages her sharp observational skills, bilingual fluency, and curiosity for visual detail to meticulously monitor CCTV feeds,
    while her organized yet flexible mindset drives her ambition to integrate AI‑enhanced analytics and champion mental‑health training for her team.
  sports: Olga Fonseca maintains a low‑key fitness routine centered on yoga three times a week and weekend jogs with the Hartford Running Club, while cheering on the New England Patriots in the fall and
    the Hartford Yard Goats during the summer baseball season.
  arts: Olga Fonseca immerses herself in the visual arts by frequenting the Wadsworth Atheneum and local galleries, studying the works of contemporary photographers like Wolfgang Tillmans and Cindy Sherman,
    curating a small collection of vintage Leica and Rolleiflex cameras, and attending intimate merengue evenings where she enjoys the rhythmical choreography of a local Afro‑Latin live band.
  travel: Olga Fonseca prefers thoughtfully planned cultural getaways, having already explored the colonial streets of Cartagena, the jazz‑laden bars of New Orleans, and the Renaissance art museums of Florence,
    while dreaming of a solo retreat to Kyoto's Zen gardens that balances her love of history with her need for serene reflection.
  culinary: Olga Fonseca, a self‑taught chef, delights in preparing traditional dishes like sancocho and mangú using ripe plantains, yucca, and sofrito, often topping them with fresh cilantro and lime,
    while occasionally indulging in late‑night pizza slices and savoring the aroma of simmering beans during weekend gatherings.
  core: Olga Fonseca is a detail‑driven, art‑loving surveillance professional whose disciplined routine is softened by a passion for cooking, photography, and yoga, yet a lingering undercurrent of anxiety
    fuels both her meticulous work ethic and occasional over‑thinking.
background:
  cultural: Olga is a first‑generation Dominican American who grew up in a bilingual household, celebrating Dominican holidays such as Independence Day and Día de los Muertos with family gatherings, music,
    and traditional foods. The vibrant rhythms of merengue, bachata, and salsa are integral to her sense of identity, while the close‑knit community values of respeto (respect) and solidaridad (solidarity)
    shape her interpersonal approach. Living in Bridgeport, CT, she balances her Caribbean heritage with New England's cultural landscape, participating in local Dominican cultural festivals and contributing
    to the diaspora community through food, dance, and mentorship. This multicultural upbringing fuels her curiosity about art, offers a unique perspective on security work—emphasizing empathy and cultural
    sensitivity—and informs her desire to create inclusive, supportive environments both on and off the job.
attributes:
  skills: '[''CCTV operation'', ''Video analytics interpretation'', ''Suspicious behavior identification'', ''Incident reporting'', ''Conflict de‑escalation'', ''Emergency response'', ''Gambling compliance
