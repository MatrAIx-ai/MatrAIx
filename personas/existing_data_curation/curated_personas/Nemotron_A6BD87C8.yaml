    knowledge'']'
  hobbies: '[''Visiting art galleries and museums'', ''Studying contemporary photography'', ''Collecting vintage cameras'', ''Cooking Dominican cuisine'', ''Yoga and meditation'', ''Reflective journaling'',
    ''Reading investigative nonfiction and mystery novels'', ''Playing chess'', ''Attending merengue and bachata gatherings'', ''Volunteering at community arts outreach programs'']'
  career_goals: Olga aims to advance from a surveillance officer to a supervisory role within the casino security department, eventually becoming a security manager. She plans to complete her bachelor's
    degree in criminal justice and obtain the Certified Protection Professional (CPP) credential. Her long‑term ambition includes designing and implementing a data‑driven, AI‑enhanced monitoring system
    that improves threat detection while reducing staff stress. Olga also hopes to spearhead a training program that incorporates mental‑health awareness for security personnel, leveraging her own experiences
    with anxiety to foster a supportive workplace culture.
