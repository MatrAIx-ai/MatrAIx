  career_goals: June aims to leverage her organizational talent and artistic passion to create a sustainable community arts hub in Coshocton, offering workshops that blend traditional crafts with contemporary
    techniques. She hopes to secure a small grant to fund an intergenerational art program, mentor younger artists, and eventually serve on the board of the local historical museum. On a personal level,
    she aspires to travel to major art museums in the Northeast and to complete a memoir that chronicles her life as a widowed senior activist.
