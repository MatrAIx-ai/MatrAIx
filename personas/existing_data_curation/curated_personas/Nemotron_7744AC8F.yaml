personas:
  professional: June Dove, a 66‑year‑old community arts organizer with a competitive streak, leverages meticulous event‑planning expertise and hands‑on mastery of watercolor, pottery, and quilting to drive
    the creation of a sustainable intergenerational arts hub in Coshocton, securing grants while keeping a skeptical eye on funder motives.
  sports: June Dove, an enthusiastic member of the Coshocton Community Walking Club, incorporates daily park walks and seasonal gardening into their fitness routine, joins the Coshocton Senior Bowling League
    in winter, and follows the Cincinnati Reds and Bengals with the same strategic intensity they bring to bridge games.
  arts: June Dove, a devoted watercolorist, potter, and quilter, draws inspiration from Claude Monet, Georgia O'Keeffe, and Frida Kahlo, regularly attends performances at the Coshocton Community Theatre
    and local art fairs, and enriches their practice by teaching digital media workshops through adult education classes.
  travel: June Dove, a meticulous planner, uses senior discounts and a detailed itinerary to visit premier art institutions such as the Metropolitan Museum of Art in New York, the Museum of Fine Arts in
    Boston, and the Philadelphia Museum of Art, while also taking weekend road trips to Ohio’s Amish country and Hocking Hills for a blend of cultural immersion and nature.
  culinary: June Dove, an avid heirloom tomato gardener, often prepares tomato bruschetta with fresh basil, buffalo mozzarella, and wildflower honey, bakes rustic sourdough in a pottery‑glazed oven they
    crafted themselves, and sometimes over‑season dishes with extra pepper to satisfy their competitive palate.
  core: June Dove blends curiosity, methodical organization, and a competitive edge into a senior life filled with community arts, careful budgeting, proactive health monitoring, and an occasional forgetful
    lapse on medication, all seasoned with a penchant for extra pepper.
background:
  cultural: June grew up in a mid‑Midwestern white family in rural Ohio, steeped in Methodist values of community service, modesty, and self‑reliance. The region’s historic pottery industry and agricultural
    roots shaped her love for crafts and gardening. Her upbringing emphasized participation in church and local civic groups, fostering a strong sense of neighborly responsibility and a curiosity about
    the wider world that she has pursued through art, travel, and lifelong learning.
