  hobbies: '[''DIY electronics and retro computer restoration'', ''Calligraphy'', ''Cooking traditional East Asian cuisine'', ''Basketball'', ''Walking in Prospect Park'', ''Teaching basic computer skills
    to seniors'']'
  career_goals: Hai Tom aims to transition from a hands‑on repair role to a supervisory position within the next three years, seeking a certified Service Technician Manager credential (e.g., CompTIA A+
    and Service Management certifications). He aspires to lead a small team of technicians, negotiate service contracts with banks and corporate clients, and eventually launch his own boutique repair shop
    focused on high‑security ATM systems. His competitive edge pushes him to become the go‑to expert for complex hardware failures in the Brooklyn‑Queens area, while his practical nature keeps his goals
    grounded in achievable milestones.
