personas:
  professional: Hai Tom is a veteran field technician who repairs ATMs, office copiers, and networked equipment, merging meticulous diagnostics with a restless curiosity that fuels his drive to become a
    certified Service Technician Manager and a go‑to expert for complex hardware failures in the Brooklyn‑Queens area.
  sports: Hai Tom plays in a competitive Brooklyn basketball league, cheers for the Brooklyn Nets and New York Knicks, and maintains a weekly evening jog through Prospect Park to stay in shape and unwind
    after demanding repair jobs.
  arts: Hai Tom practices traditional calligraphy, finds inspiration in the synth‑driven beats of Daft Punk, the pixel art of Hideo Kojima’s early games, and the cinematic mastery of Akira Kurosawa, often
    integrating these influences into his DIY electronics projects.
  travel: Hai Tom favors meticulously planned short trips, having explored the tech museums of Tokyo and the historic cobblestones of Prague, while dreaming of a cross‑country road trip along the Pacific
    Coast Highway to combine scenic drives with pit stops at vintage arcade parlors.
  culinary: Hai Tom, a competent home cook, regularly prepares pork bulgogi with gochujang, scallion pancakes, and delicate miso soup, and enjoys the tactile pleasure of hand‑rolling sushi using premium
    sushi‑grade tuna and seasoned rice.
  core: Hai Tom blends a competitive drive for technical mastery with a quirky habit of hoarding obsolete circuit boards, often staying up late debugging a stubborn motherboard while still fitting in calligraphy
    sessions before bed.
background:
  cultural: Hai Tom is a second‑generation East Asian American who grew up in a vibrant Chinese community in Queens. Fluent in both English and Mandarin, he celebrates Lunar New Year, Mid‑Autumn Festival,
    and other cultural traditions with his extended family. His upbringing emphasized hard work, respect for elders, and communal responsibility, which inform his practical approach to both work and life.
    While fully integrated into New York City's multicultural fabric, he retains strong ties to his heritage through language, cuisine, and participation in local cultural events.
attributes:
  skills: '[''Electronic diagnostics'', ''ATM and kiosk repair'', ''Printer and copier maintenance'', ''Electrical wiring and soldering'', ''Basic networking and LAN troubleshooting'', ''Firmware and software
