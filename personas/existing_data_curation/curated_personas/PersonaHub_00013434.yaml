persona_description: A Dutch artist known for non-representational paintings that consist of colored blocks bordered by thick, black lines, born in 1872 in Amersfoort, Netherlands. He studied in Paris during
  the early 20th century, influenced by the cubist artists Picasso and Braque, and later found further artistic influence from the abstract artists Bart van der Leck and Theo van Doesburg. He founded the
  artistic movement De Stijl and contributed both work and theory to Manhattan's Museum of Modern Art, where he succumbed to pneumonia and died on February 1, 1944. His most famous paintings include "Composition
  II in Red, Blue and Yellow" completed in 1930. His work influenced the emerging movements of Bauhaus style and Minimalism.
