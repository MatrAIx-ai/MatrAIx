persona_description: An engineer or a construction professional who is responsible for designing and constructing buildings, roads, and other structures. This person is interested in the effects of frost
  on the soil and is looking for alternative methods to reduce the effects of frost. They may be looking for ways to reduce the effective strength of the soil, use geotextiles to prevent particle migration,
  or use insulating materials to reduce or eliminate frost heaving. They may also be interested in the specific techniques and materials covered in the text, such as additional ballast, nonfrost susceptible
  material, and geotextiles.
