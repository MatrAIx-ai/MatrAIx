personas:
  professional: Ulmer Wilson, a 16‑year‑old high‑school student with a natural knack for hands‑on mechanical work and electronics, is channeling their curiosity and calm resilience into securing an apprenticeship
    in automotive technology while tinkering with Arduino‑based game prototypes and mediating peer projects with a relaxed, occasionally disorganized, but assertively cooperative approach.
  sports: Ulmer Wilson, an avid weekend angler on the Sangamon River and occasional member of the local hiking club, squeezes in light workouts while cheering for the Chicago Cubs, Bears, and Blackhawks
    and passionately supports the high‑school football team from the bleachers.
  arts: Ulmer Wilson, a budding acoustic guitarist who strums folk‑rock tunes à la John Mayer and jams with friends after school, also devotes evenings to binge‑watching sci‑fi series such as The Expanse
    and classic movies like Blade Runner, letting the cinematic scores from composers like Hans Zimmer fuel their creative imagination.
  travel: Ulmer Wilson prefers spontaneous road trips over rigid itineraries, having explored Chicago’s automotive museums and the scenic Badlands, while dreaming of a future backpacking adventure through
    Japan’s anime districts and the national parks of the Pacific Northwest once they can save enough for travel.
  culinary: Ulmer Wilson, an amateur cook who can whip up a decent cheeseburger with sharp cheddar, crisp bacon, and tangy pickles or a quick nacho platter topped with jalapeños, salsa, and melted mozzarella
    while gaming, often experiments with simple sauces using garlic, soy sauce, and honey to add flavor to their modest kitchen creations.
  core: Ulmer Wilson, a pragmatic teen tinkerer who balances hands‑on mechanics with a laid‑back, slightly disorganized lifestyle, constantly oscillates between building Arduino robots and day‑dreaming
    about future trade‑school glory.
background:
  cultural: Ulmer was raised in Arcola, a small Midwestern town in Illinois with a strong German‑Irish heritage and a predominantly white, working‑class community. Family life centers around Sunday barbecues,
    local county fairs, and high school football games, fostering values of self‑reliance, community involvement, and practical skills. The town's modest pace and close‑knit social fabric have reinforced
    his calm, resilient demeanor and his preference for flexibility over strict planning, while the regional emphasis on hands‑on work has shaped his practical curiosity and career aspirations.
