  career_goals: Ulmer aims to secure an apprenticeship in a skilled trade—preferably automotive technology, welding, or HVAC—so he can turn his practical curiosity into a stable career. Over the next few
    years he plans to earn a GED, attend a community‑college trade program, and eventually open his own small repair or maintenance shop that allows flexible scheduling. He also nurtures a secondary ambition
    to explore game design or programming, keeping the door open for a creative side project alongside his trade work.
