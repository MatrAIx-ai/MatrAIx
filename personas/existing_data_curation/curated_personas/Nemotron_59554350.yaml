  career_goals: Robert aims to transition from a front‑line support role to a senior network engineer position within the next three years, targeting certifications such as CompTIA Network+ and Cisco CCNA
    to validate his expertise. He envisions eventually moving into a managerial role where he can blend his technical knowledge with his people‑skills, leading a small team that delivers tailored IT solutions
    to local businesses. Long‑term, he hopes to launch his own consulting practice that offers on‑site troubleshooting, cybersecurity audits, and tech‑training workshops for the Roanoke Rapids community,
    allowing him to leverage his spontaneity and love for teaching while maintaining a flexible schedule for his family.
