persona_description: An engineer who works in the food and engineering sectors, focusing on the use of Neoprene rubber in industrial applications and food industry products. They are particularly interested
  in the material's resistance to degradation, weathering, ozone, and fire, as well as its ability to resist static electricity. They are also knowledgeable about Neoprene's natural resistance to greases,
  fats, and oils, and moderate chemicals and acids, which makes it popular in the food industry and engineering sector. They are also interested in Neoprene's resistance to strong oxidizing acids and esters,
  and the degradation of the material in the presence of ketones and hydrocarbons.
