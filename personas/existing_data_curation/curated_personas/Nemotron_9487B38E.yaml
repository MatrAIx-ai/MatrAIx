  hobbies: '[''Patio Gardening'', ''Cooking Mexican Cuisine'', ''Reading Historical Biographies'', ''Science Journalism'', ''Attending Author Talks'', ''Yoga'', ''Mindfulness Meditation'', ''Volunteering
    at STEM Outreach'', ''Guiding Coding Workshops'']'
  career_goals: Her primary ambition is to cement a lasting legacy by guiding her company toward sustainable growth that benefits both shareholders and the broader community. She aims to launch a mentorship
    pipeline for underrepresented talent, especially Mexican‑American youth aspiring to STEM and executive roles. Yessica also aspires to spearhead a corporate social responsibility initiative that leverages
    technology to improve local education and small‑business development in San Bernardino County. In the next five years, she hopes to transition to a board‑level advisory role, ensuring continuity while
    still influencing strategic direction.
