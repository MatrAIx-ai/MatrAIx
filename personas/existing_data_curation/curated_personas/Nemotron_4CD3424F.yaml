personas:
  professional: A freelance muralist and visual storyteller, Ivan Valido blends large‑scale aerosol art with carpentry, photography, and video production, leveraging their strategic mindset and relaxed
    approach to turn chaotic creative bursts into marketable community projects.
  sports: Ivan Valido enjoys weekend hikes along the Onondaga Lake Trail, plays pickup basketball with friends, and occasionally joins a local adult soccer league (Syracuse City Futbol Club), while cheering
    for the Syracuse Orange men's basketball team and the Buffalo Bills, preferring informal, low‑pressure fitness over regimented training, and they often choose casual play over formal workouts.
  arts: Ivan Valido immerses themselves in the underground arts scene, curating street murals inspired by vibrant island motifs, spinning vinyl from Toots and the Maytals, The Clash, A Tribe Called Quest,
    and Bad Bunny at open‑mic nights, and drawing visual inspiration from graffiti legends like Banksy and local muralists, while they constantly seek new sonic textures.
  travel: Ivan Valido favors spontaneous urban exploration, having trekked abandoned factories in Detroit, sampled street food in New York City, and taken a budget backpacking trip to the Dominican Republic,
    while they dream of a summer adventure in Lisbon’s historic neighborhoods, always balancing travel with limited freelance income.
  culinary: Ivan Valido experiments in the kitchen, mastering plantain‑based tacos with mango salsa and guava‑filled pastel pastries, brewing small‑batch cold‑brew coffee with Ethiopian beans, and seasoning
    dishes with adobo, cilantro, and chipotle, yet they hover between ambitious hobbyist and occasional take‑out reliance.
  core: Ivan Valido is a curiosity‑driven, slightly disorganized creator who blends street art, indie gaming, and culinary mash‑ups into a freelance hustle while they juggle anxiety, spontaneous travel,
    and a penchant for vintage vinyl.
background:
  cultural: Ivan was raised in Syracuse, New York, in a household that blended his parents' Puerto Rican heritage with the upstate New York environment. His mother grew up in Aguadilla and his father in
    San Juan; they migrated to the United States in the late 1980s seeking manufacturing work. The family spoke both Spanish and English at home, celebrating traditional holidays such as Three Kings Day
    and the Feast of San Juan, and preparing dishes like arroz con gandules, pasteles, and tostones. Growing up in a modest Puerto Rican community within Onondaga County, Ivan attended local parish events
    and summer festivals that highlighted bomba, plena, and salsa music, while also absorbing Syracuse's indie art and DIY subcultures. He identifies with the Nuyorican experience of navigating dual identities—maintaining
    family collectivist values and bilingual communication while embracing the individualistic, entrepreneurial spirit of his surroundings. This cultural duality informs his vibrant artistic palette, his
    informal bilingual translation work, and his commitment to giving back through community art initiatives.
attributes:
