  hobbies: '[''Street art creation'',''Experimental cooking (Puerto Rican fusion)'',''Indie video gaming'',''Electric guitar playing'',''Urban photography and exploration'',''Vinyl record collecting'',''Live‑music
    open‑mic attendance'',''Science and philosophy podcast listening'',''Volunteering at cultural festivals'',''Hiking Onondaga Lake Trail'']'
  career_goals: Ivan aims to convert his varied abilities into a sustainable freelance career focused on creative services. In the near term, he plans to secure regular mural commissions across upstate
    New York while offering photography and video‑editing packages to local businesses and cultural events. He intends to obtain a GED within the next year and then enroll in an associate degree program
    in graphic design or visual arts to formalize his training. Long‑term, Ivan dreams of opening a community art space in Syracuse that showcases Puerto Rican and other diaspora artists, hosts hands‑on
    workshops, and provides mentorship for youth who lack traditional educational pathways. He also wants to produce a short‑documentary series that profiles the stories of Puerto Rican families in the
    Northeast, leveraging his bilingual background and visual storytelling skills. Financial independence, artistic recognition in the alternative art scene, and a meaningful contribution to his community
    are his primary ambitions.
