personas:
  professional: Antonio Kendrick is an aspiring junior engineer who spends afternoons constructing LEGO rockets and marine animal models, blending a fierce curiosity about how things work with a practical,
    step‑by‑step approach, and consistently shares his projects with friends, reflecting his cooperative and organized nature.
  sports: Antonio Kendrick plays forward for the Northside Rangers U‑8 soccer team, drills footwork at the neighborhood park every Saturday, joins casual beach frisbee games in the summer, and balances
    structured practice with spontaneous play, reflecting his organized yet flexible approach to fitness and teamwork.
  arts: Antonio Kendrick draws whimsical cartoon fish inspired by Mo Willems, builds detailed LEGO marine dioramas, and crafts pixelated worlds in Minecraft while listening to C418, weaving his love of
    ocean life and space into creative projects that showcase his cooperative spirit, independent imagination, and a preference for mixing established styles with new ideas.
  travel: Antonio Kendrick has explored the tide pools at Cedar Beach and toured the local aquarium, dreams of visiting the Great Barrier Reef in Australia and the Kennedy Space Center in Florida, and prefers
    short family road trips planned with a simple checklist, balancing excitement for new horizons with the comfort of familiar routines.
  culinary: Antonio Kendrick enjoys helping his family bake chocolate‑chip cookies, loves munching on sea‑salted pretzels and sushi‑style rice balls with avocado, and is learning to roll simple pasta dishes,
    often mixing ingredients by instinct rather than strict recipes, revealing a playful yet practical approach to food.
  core: Antonio Kendrick is a curious, organized seven‑year‑old who balances building LEGO rockets, scoring soccer goals, and baking cookies while thoughtfully navigating social play and quiet study, even
    as occasional screen‑time binges and scattered LEGO pieces betray his otherwise disciplined habits.
background:
  cultural: Antonio is an African‑American boy growing up in Port Saint Lucie, Florida. His family celebrates traditions rooted in Black Southern culture, such as Sunday church gatherings, gospel music,
    and family cookouts featuring dishes like fried chicken, collard greens, and sweet potato pie. He participates in local community events like Juneteenth parades and Black History Month activities at
    school, learning about influential Black figures. The multicultural environment of St. Lucie County also exposes him to Caribbean and Latino influences, giving him a love for music genres like reggae
    and salsa, and occasional tasting of dishes like plantains and arroz con pollo. These cultural experiences shape his values of community, resilience, and cooperation.
attributes:
