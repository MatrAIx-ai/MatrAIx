  hobbies: '[''Soccer'', ''LEGO Building'', ''Reading Adventure/Science Books'', ''Beachcombing'', ''Drawing'', ''Minecraft'', ''Baking with Family'']'
  career_goals: Antonio dreams of becoming a marine biologist who studies sea turtles and coral reefs along Florida’s coast, combining his curiosity about ocean life with a practical desire to protect his
    local environment. He also imagines designing safe playgrounds as a civil engineer, using his love for building LEGO sets to create real‑world structures. Ultimately, he hopes to help his community
    by sharing knowledge, perhaps as a future teacher or environmental advocate.
