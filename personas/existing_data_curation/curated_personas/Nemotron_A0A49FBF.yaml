personas:
  professional: Paul Dicks, a retired hands‑on tradesman, channels decades of home‑repair, woodworking, and automotive expertise into leading a community workshop at the senior center where they teach practical
    DIY skills to seniors and teens, embodying their preference for routine, sociable mentorship, and pragmatic problem‑solving.
  sports: Paul Dicks enjoys early‑morning fishing on Bayou Teche, follows the New Orleans Saints and LSU Tigers with avid loyalty, and participates in weekly community‑center bridge tournaments, blending
    low‑key outdoor recreation with local team spirit.
  arts: Paul Dicks delights in zydeco dancing at the St. Landry Parish fair, listening to the accordion stylings of Clifton Chenier and the soulful blues of B.B. King, and often crafts handmade wooden stools
    for community events, weaving music, dance, and craftsmanship into their social identity.
  travel: Paul Dicks prefers short road trips along the Gulf Coast, having visited Grand Isle for fishing, New Orleans for music festivals, and Austin, Texas for vintage truck shows, planning itineraries
    loosely and savoring spontaneous detours that fit their flexible routine.
  culinary: Paul Dicks cooks hearty gumbo with Andouille sausage, shrimp étouffée, and fresh garden‑grown okra, skillfully blending traditional Southern spices with home‑grown ingredients, while they relish
    serving crawfish boils at family reunions and experimenting with sweet potato pie for dessert.
  core: Paul Dicks is a sociable, routine‑loving handyman who balances community mentorship with a love for fishing, zydeco, and home‑cooked Southern comfort food, all while navigating a relaxed, slightly
    disorganized approach to life.
background:
  cultural: Paul was born and raised in Carencro, a small town in St. Landry Parish, Louisiana. He grew up in a predominantly white Southern community with deep roots in the region’s French‑Acadian heritage,
    which is reflected in local language quirks, music, and cuisine. The rhythms of Mardi Gras, zydeco, and Cajun cooking shaped his early experiences, while his family’s involvement in the local Catholic
    (and later Methodist) church reinforced values of hospitality, self‑reliance, and community service. Paul’s cultural identity is tied to the agricultural and oil‑related history of the parish, the tradition
    of neighborly support, and the celebration of regional festivals that blend practicality with joyful camaraderie.
