personas:
  professional: Kevin Barcelo, a diesel engine specialist in the Dallas‑Fort Worth area, they apply their meticulous diagnostic expertise, rigorous adherence to EPA standards, and charismatic mentorship
    to lead workshop workflow, turning complex engine repairs into teach‑able moments while thriving on the social buzz of community car shows.
  sports: Kevin Barcelo, an avid midfielder for the Fort Worth Rough Riders amateur soccer league, they maintain fitness by sprint drills and weekend hill‑climbing hikes, cheer loudly for the Dallas Cowboys
    and Dallas Mavericks, and proudly wear the FC Dallas scarf during matches while balancing a disciplined training regimen with a love for spontaneous pickup games.
  arts: Kevin Barcelo, a devoted fan of regional Mexican music, fills their garage workshop with the sounds of Los Tigres del Norte, Banda El Recodo, and contemporary artist Alejandro Fernández, they attend
    occasional live performances at the Rialto Theatre, and collect vintage vinyl covers that inspire their own DIY engine‑art projects.
  travel: Kevin Barcelo, who prefers meticulously planned road trips, they often spend long weekends exploring the Texas Hill Country towns of Fredericksburg and Marfa, dream of attending the Stuttgart
    International Motor Show in Germany, and balance travel ambitions with a modest budget that prioritizes visits to local automotive museums over luxury getaways.
  culinary: Kevin Barcelo, a confident home cook, they regularly prepare mole poblano, carnitas tacos, and grilled carne asada using fresh chilies, corn masa, and locally sourced beef, while hosting lively
    evening feasts where they meticulously organize a taco bar and experiment with new spice blends, though they occasionally over‑salt dishes in their enthusiasm.
  core: Kevin Barcelo, a stress‑prone yet charismatic diesel specialist, blends rigorous engine diagnostics with weekend taco feasts, obsessively logs every repair in a color‑coded notebook, they never
    skip a local soccer match, and balance entrepreneurial ambition with a tendency to worry about every detail.
background:
  cultural: Kevin was raised in a Mexican‑American household in Grand Prairie, Texas. His family maintains strong ties to Mexican traditions, speaking Spanish at home and celebrating holidays such as Día
    de los Muertos and Mexican Independence Day. He grew up with the aromas of his mother's cooking—tamales, pozole, and tacos—shaping his love for Mexican cuisine. The bilingual, bicultural environment
    of the Dallas‑Fort Worth metroplex blends Mexican family values of respect, hard work, and community with the Texan work ethic. Kevin actively participates in local cultural festivals, supports Mexican
    community organizations, and incorporates his heritage into his daily life while navigating his professional path as a skilled diesel mechanic.
attributes:
  skills: '["Diesel engine diagnostics", "Heavy vehicle maintenance", "Electrical system troubleshooting", "Preventive maintenance scheduling", "Workshop inventory management", "Customer communication",
    "Team training and mentorship", "Emissions compliance testing", "Technical manual interpretation"]'
  hobbies: '["Participating in and organizing local car shows and vintage truck meet‑ups", "Volunteering at community youth mechanical workshops", "Cooking traditional Mexican dishes for friends and family",
    "Playing soccer in a local league", "Listening to regional Mexican music and attending live concerts", "Hiking Texas Hill Country trails", "Restoring a classic diesel truck as a personal project"]'
  career_goals: Kevin aims to attain ASE Master Technician certification within the next two years and advance to a lead shop supervisor role, overseeing a team of mechanics. He aspires to open his own
    specialized diesel service center in the Dallas‑Fort Worth area, focusing on fleet maintenance for buses and trucks. To support this entrepreneurial goal, he plans to complete a business management
    program at a local community college. Additionally, Kevin wants to establish a community apprenticeship program that provides hands‑on training for at‑risk youth, combining his technical skills with
    his compassion for helping others.
