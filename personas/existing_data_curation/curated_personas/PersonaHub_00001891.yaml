  fuel vehicles, including those that use electricity, and for developing and supporting systems that allow increased utilization of electric-powered transportation. They may be interested in understanding
  the latest standards and research, as well as the economic considerations involved in transitioning to electric-powered transportation. They may also be interested in learning about the potential impacts
  on commercial and industrial systems, including generation, transmission, and distribution systems of electrical power.
