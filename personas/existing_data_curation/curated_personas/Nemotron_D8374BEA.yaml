personas:
  professional: An aspiring digital illustrator and DIY electronics hobbyist, Tian Carter blends meticulous planning with boundless curiosity, and they often craft character sketches that double as prototype
    UI mockups for school projects while doodling in the margins of math worksheets.
  sports: A dedicated skate-park regular and youth soccer midfielder, Tian Carter cheers loudly for the Pittsburgh Steelers on Sundays, plays for the local YMCA soccer club during the fall season, and they
    practice freestyle skate tricks at Point State Park's concrete bowl, balancing competitive drive with a laid-back weekend routine.
  arts: An avid patron of Pittsburgh's vibrant arts scene, Tian Carter spends weekends at the Andy Warhol Museum and the Three Rivers Arts Festival, drawing inspiration from Warhol's bold colors, Neil Gaiman's
    narrative twists, and Banksy's provocative street murals, while they create original comic strips that fuse steel-city motifs with fantasy realms.
  travel: An adventurous yet budget-conscious teen, Tian Carter has explored the historic streets of Old Town Erie, navigated the bustling avenues of New York City, and they dream of visiting Kyoto's manga
    districts and Berlin's mural-laden neighborhoods, always planning trips around school breaks and saving pocket money for train tickets.
  culinary: A budding home chef, Tian Carter enjoys crafting pepperoni pizza with a drizzle of honey, rolling homemade pierogi stuffed with cheddar and chives, and experimenting with spicy ramen broth,
    often pairing meals with acoustic guitar melodies while they perfect their culinary techniques.
  core: Methodical and creatively restless, Tian Carter balances meticulous sketchbooks, skate-park tricks, and disciplined saving with occasional late-night gaming marathons and impulsive comic-book splurges
    they indulge in.
background:
  cultural: Tian grew up in a middle‑class family in the Lawrenceville neighborhood of Pittsburgh, a city known for its industrial heritage, vibrant arts scene, and strong community spirit. The regional
    culture of resilience and pride in local sports teams (like the Steelers) shapes his grounded outlook. He is exposed to the city's diverse cultural festivals, such as the Three Rivers Arts Festival,
    which fuels his appreciation for varied artistic expression. Though his ethnic background is white, his parents chose the name "Tian" to reflect an openness to global influences, encouraging him to
    explore multicultural art and ideas while staying rooted in Midwestern values.
