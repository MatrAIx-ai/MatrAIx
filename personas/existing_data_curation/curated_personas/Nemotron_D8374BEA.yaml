  career_goals: Tian aspires to attend a high school with a strong visual‑arts program and eventually pursue a career as a multimedia artist or graphic designer. He dreams of blending his love for art and
    technology to create video game concept art or interactive media. In the longer term, he hopes to work on community art projects in Pittsburgh, perhaps leading a youth art collective that integrates
    public murals with digital storytelling.
