  career_goals: Diana aims to become a senior architect within the next five years, leading large‑scale residential and public projects that prioritize sustainability and community wellbeing. She plans
    to earn her LEED Accredited Professional credential and integrate advanced technologies such as VR/AR walkthroughs into her design workflow. Long‑term, she envisions launching her own boutique firm
    that blends innovative design with the historic character of Charlottesville, while mentoring emerging architects and speaking at regional design conferences. She also hopes to influence local urban
    planning policies to promote greener, more inclusive neighborhoods.
