personas:
  professional: Diana Jones, a licensed architect, blends sustainable design with historic preservation using AutoCAD, Revit, and parametric modeling, and despite a habit of leaving project timelines loosely
    organized, they channel their sociable, community‑centered ethos into collaborative, cost‑effective solutions for Charlottesville’s neighborhoods.
  sports: Diana Jones enjoys weekend hikes with the Shenandoah Hikers Association, regular yoga classes, and lively salsa socials, while cheering on the Virginia Cavaliers basketball, the Washington Nationals,
    and the Washington Capitals, embodying a balanced, community‑oriented approach to fitness and local sport fandom.
  arts: Diana Jones immerses herself in Charlottesville’s vibrant arts scene, attending live‑music festivals featuring The Avett Brothers and St. Vincent, joining improv sketch nights with the UVA Comedy
    Troupe, and getting lost in the speculative worlds of authors like Ursula K. Le Guin and Ann Leckie, which together shape her eclectic creative outlook.
  travel: Diana Jones prefers thoughtfully planned trips that combine architectural exploration and community immersion, having trekked the historic streets of Savannah, admired Gaudí’s Sagrada Família
    in Barcelona, and wandered the tea houses of Kyoto, while they dream of a future road‑trip through the colonial towns of the American South, balancing limited budget constraints with a desire for authentic,
    culture‑rich experiences.
  culinary: Diana Jones, an enthusiastic home cook, regularly whips up Thai green curry with fresh lemongrass and galangal, Moroccan tagine featuring apricots and preserved lemons, and Southern shrimp and
    grits, sharing these creations at lively potlucks that showcase a love for bold flavors, seasonal produce, and communal dining, which they view as a way to strengthen community bonds.
  core: Diana Jones blends a community‑first mindset with a curious, albeit sometimes disorganized, design spirit, turning sustainable architecture into social gatherings while juggling spontaneous creativity
    and a relaxed approach to deadlines.
background:
  cultural: 'Diana grew up in a small town in central Virginia, raised in a family with Irish and English roots. Her upbringing blended Southern hospitality, an appreciation for the region’s colonial heritage,
    and a community‑oriented ethos. Attending the University of Virginia for her STEM‑focused bachelor''s degree immersed her in a progressive academic environment, reinforcing her love for both tradition
    and innovation. Charlottesville’s vibrant arts scene, outdoor culture, and emphasis on historic preservation have shaped her values: she cherishes community harmony, respects local customs, and seeks
    to weave contemporary sustainability into the fabric of her cultural landscape.'
