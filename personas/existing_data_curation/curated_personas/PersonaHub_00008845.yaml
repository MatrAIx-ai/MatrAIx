persona_description: A researcher and educator who is passionate about enhancing children's listening skills through the use of computer games. They believe that computer games can engage with key sensory
  skills and improve general language ability, especially for children with language problems. They have expertise in phonetics and language development and have developed a game called Phonomena to achieve
  this goal. They are optimistic about the potential of computer games to revolutionize education and are excited about the possibility of making homework more enjoyable and engaging for children.
