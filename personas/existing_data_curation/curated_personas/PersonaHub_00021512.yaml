persona_description: A software developer who specializes in the development of augmented reality (AR) applications using the ArcGIS API for Silverlight and the open source Silverlight Augmented Reality
  Toolkit. Richie Carmichael is the founder of the Esri Applications Prototype Lab, where he has been experimenting with using AR to visualize GIS content. He believes that AR adds to reality by enhancing
  or improving upon what is displayed in a web or desktop application, and he is passionate about making GIS content accessible in a new and interesting way. As AR becomes more prevalent in phone, tablet,
  and computer applications, more developers will begin integrating GIS services and content to serve very real and practical purposes.
