  career_goals: Inspired by his love for art and technology, Johnny envisions a future as a game developer or multimedia artist. He aims to attend a STEM-focused high school, build a robust portfolio of
    digital artwork and interactive game prototypes, and eventually study computer science or digital media at university. He also hopes to contribute to indie game communities and possibly launch his own
    creative studio someday.
