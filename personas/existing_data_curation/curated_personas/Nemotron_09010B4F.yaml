  career_goals: Although retired, Mark aims to leave a lasting creative legacy. He plans to publish a collection of essays and poems that explore imagination and abstract thought, and to co-curate a community
    exhibition spotlighting emerging senior artists. He hopes to launch a mentorship program that pairs seasoned creatives with younger participants in New York’s boroughs. Mark also aspires to become a
    guest lecturer at local adult-education centers, sharing insights on art, philosophy, and creative problem-solving. Competing in citywide senior chess tournaments remains a personal benchmark of achievement.
