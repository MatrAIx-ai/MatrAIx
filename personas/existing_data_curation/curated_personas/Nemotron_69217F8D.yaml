  hobbies: '[''Model Electronics Kits (Arduino, Raspberry Pi)'', ''Jogging and Trail Hiking'', ''Landscape Photography'', ''Chess'', ''Reading Technical Journals'', ''Traditional Central Asian Cooking'',
    ''Meditation and Mindfulness'', ''Woodworking'', ''Volunteering for STEM Outreach'']'
  career_goals: Azam aims to transition into a senior engineering leadership role, such as Director of Power Electronics or Chief Engineer for renewable‑energy projects within a utility or technology firm.
    He plans to deepen his expertise in smart‑grid and EV‑charging solutions, obtain an advanced certification in sustainable energy, and eventually launch a boutique consulting practice focused on power‑electronics
    optimization for emerging clean‑tech markets. Mentoring is also a priority; he intends to create a structured mentorship program for junior engineers and contribute technical papers to industry conferences,
    all while maintaining a balanced workload to manage his sensitivity to stress.
