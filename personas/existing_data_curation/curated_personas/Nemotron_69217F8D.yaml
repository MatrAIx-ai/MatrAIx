personas:
  professional: Azam Pena is a seasoned electrical and electronics engineer whose two decades of designing high‑efficiency power conversion systems, mastering Altium Designer, and steering projects with
    PMP precision position them as a natural candidate for a senior leadership role in renewable‑energy power electronics.
  sports: Azam Pena is an avid solo hiker who tackles the Laguna Mountains' backcountry routes each weekend, complements the cardio with occasional rides for the San Diego Cyclists Club, and follows the
    San Diego Padres and Los Angeles Lakers, reserving Saturdays for a 5‑k run with the local Trail Runners group.
  arts: Azam Pena captures sunrise vistas over the Laguna Mountains with a Nikon D850, drawing compositional inspiration from Ansel Adams and Edward Weston, while unwinding to Beethoven’s Ninth Symphony
    and Hans Zimmer’s film scores, and occasionally attending the San Diego Film Week to explore avant‑garde cinema.
  travel: Azam Pena plans travel with project‑like precision, favoring self‑guided photography expeditions in Iceland’s volcanic landscapes and cultural pilgrimages to Kyoto’s historic temples, while fitting
    weekend getaways to Joshua Tree for mountain‑bike trail scouting into a moderate budget that balances family responsibilities.
  culinary: Azam Pena approaches cooking like a laboratory experiment, perfecting classic plov with basmati rice, lamb, carrots, cumin, and saffron, hand‑folding flaky samsa stuffed with spiced ground beef,
    while occasionally testing sous‑vide egg techniques and savoring a steak‑house ribeye to counterbalance disciplined culinary routines.
  core: Azam Pena is a methodical 43‑year‑old engineer whose love for solitary electronics tinkering, early‑dawn photography, and precise traditional cooking is tempered by chronic worry that drives them
    toward strict routines, meticulous budgeting, and vigilant health monitoring.
background:
  cultural: Azam’s family originates from the Central Asian region—specifically Uzbekistan—where values of hospitality, respect for elders, and a strong emphasis on education are deeply ingrained. He grew
    up speaking Uzbek at home, celebrated Nowruz and other cultural festivals, and learned traditional cooking from his grandparents. After moving to the United States for higher education, he integrated
    into the diverse community of Escondido, CA, while preserving his cultural practices. He participates in local Central Asian diaspora gatherings, maintains close ties with extended family abroad, and
    blends his heritage with Californian lifestyle, often sharing dishes from his homeland with neighbors and colleagues.
attributes:
