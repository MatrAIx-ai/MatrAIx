  hobbies: '[''Exploring mural districts and photography'', ''Latin dance classes (salsa, bachata)'', ''Karaoke and live-music outings'', ''Cooking and hosting Mexican-style potluck gatherings'', ''Volunteering
    as a youth arts mentor'', ''Discovering new neighborhoods and cuisines'', ''Reading contemporary art and culture magazines'', ''DIY crafts and hand-painted items'', ''Attending gallery openings and
    art fairs'', ''Participating in community art workshops'']'
  career_goals: Looking ahead, Elisbel aims to turn her artistic curiosity and community-focused skills into a full-time career in the cultural sector. She plans to pursue a certificate in Arts Administration
    or Community Development while seeking entry-level positions such as Community Arts Coordinator or Outreach Specialist at local non-profits. Her ambition is to design and lead neighborhood art festivals
    that celebrate Mexican heritage and the broader Latino culture of Inglewood. Over the next five years she hopes to establish a community-run creative hub where youth can explore visual arts, dance,
    and digital media. Ultimately, she envisions a role where she can blend event management, cultural programming, and public advocacy to increase access to the arts for underserved residents.
