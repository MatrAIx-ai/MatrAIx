personas:
  professional: Elisbel Carrion, a community arts coordinator‑in‑training, blends photography, bilingual storytelling, and event planning to design inclusive neighborhood art festivals that spotlight vibrant
    mural culture and empower youth.
  sports: Elisbel Carrion stays active through salsa and bachata dance classes, weekend jogs in Griffith Park, and cheering for the Los Angeles Lakers and LA Galaxy, while occasionally joining a co‑ed recreational
    volleyball league at a local community center.
  arts: Elisbel Carrion curates street‑art walks inspired by artists like Banksy and Shepard Fairey, showcases analog photography exhibitions echoing the style of Diane Arbus, and draws creative fuel from
    listening to the music of Lila Downs and the films of Guillermo del Toro.
  travel: Elisbel Carrion prefers immersive, short‑haul trips that combine culinary exploration and visual inspiration, having trekked the murals of Oaxaca, sampled tacos al pastor in Mexico City, and planning
    a future photography retreat in Lisbon’s Alfama district.
  culinary: Elisbel Carrion enjoys cooking homestyle dishes such as tamales, pozole, and esquites, mastering the art of corn masa and slow‑cooked pork, while also experimenting with avocado‑lime salsa and
    pairing meals with craft cerveza.
  core: Elisbel Carrion is a talkative, art‑obsessed community builder whose love for dance, photography, and spontaneous gatherings fuels a vibrant, albeit occasionally chaotic, lifestyle.
background:
  cultural: Elisbel is a first-generation Mexican-American whose family traces its roots to the state of Jalisco. Growing up in Inglewood’s tight-knit Mexican community, she was immersed in cultural traditions
    such as Día de los Muertos altars, quinceañera celebrations, and weekly family meals centered around homemade mole and tamales. Bilingual in Spanish and English, she navigates between both languages
    effortlessly, a skill that shapes her social interactions and community work. The Mexican values of hospitality, collective celebration, and reverence for the arts have informed her outgoing personality
    and her commitment to sharing culture with others. Living in the multicultural landscape of Los Angeles County, she also engages with broader Latino and African-American influences, participating in
    citywide festivals and supporting local street artists. Her cultural grounding fuels her desire to preserve Mexican heritage while fostering cross-cultural dialogues through art and community initiatives.
