  hobbies: '[''Visiting Art Galleries'', ''Street Photography'', ''Acoustic Guitar Playing'', ''Cooking Mexican Cuisine'', ''Hiking'', ''Attending Live Music Shows'', ''Volunteer Community Events'', ''Exploring
    Digital Media'', ''Learning New Languages (e.g., French)'', ''Participating in Cultural Festivals'']'
  career_goals: Radames aims to obtain his GED within the next year and pursue a certificate in Community Arts Administration at a local community college. His long‑term ambition is to become a program
    coordinator for a cultural center in Riverside County, where he can design and lead workshops that celebrate Mexican‑American heritage and contemporary art. In parallel, he plans to develop a freelance
    photography and event‑planning business to support himself financially while building a portfolio that highlights the vibrant street art and community events of Southern California.
