personas:
  professional: Marguerite Barber, a tenure‑track professor of humanities at a mid‑size university, blends rigorous textual analysis with digital humanities tools to redesign curricula, leveraging their
    methodical organization, curiosity for new media, and assertive mentorship style to guide first‑generation scholars toward academic success.
  sports: Marguerite Barber hikes the Spruce Knob trail with the Monongahela Hiking Association each spring, supports the West Virginia Mountaineers men’s basketball team and the Pittsburgh Steelers, and
    attends local community yoga classes to complement their love of solitary outdoor exercise.
  arts: Marguerite Barber finds solace in playing Chopin nocturnes on the piano, curating a personal collection of Robert Frost poems, listening to Doc Watson’s Appalachian ballads, and enjoying the provocative
    films of Agnès Varda, all of which color their literary lectures and scholarly research.
  travel: Marguerite Barber prefers meticulously planned road trips, having explored the historic streets of New Orleans and the misty cliffs of the Scottish Highlands, while dreaming of a summer study
    abroad in Provence to deepen their French language immersion.
  culinary: Marguerite Barber, an adept home cook, transforms garden‑grown beets into a roasted beet and goat‑cheese salad, perfects pumpkin gnocchi with sage butter, and experiments with classic French
    ratatouille whenever the season’s tomatoes and zucchini arrive.
  core: Marguerite Barber is a methodical academic who balances solitary reflection with community engagement, channeling Appalachian resilience into innovative humanities scholarship while nurturing a
    garden‑to‑table lifestyle.
background:
  cultural: Marguerite grew up in a modest, middle‑class family in rural West Virginia, exposed early to Appalachian folk traditions, storytelling, and a strong work ethic. Her white American heritage includes
    Germanic and Irish ancestry, and her upbringing blended Protestant community values with a reverence for education. While she left her hometown for university, she retains a deep appreciation for the
    region's natural beauty and cultural narratives, which inform both her teaching and research. Her divorce has reinforced her independent outlook, prompting a balanced worldview that honors personal
    resilience while remaining connected to the communal ties of her local environment.
