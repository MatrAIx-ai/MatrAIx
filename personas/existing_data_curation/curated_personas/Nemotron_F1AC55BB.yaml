  hobbies: '[''Reading Classic and Contemporary Literature'', ''Hiking in Appalachian Trails'', ''Gardening'', ''Seasonal Cooking'', ''Photography'', ''Knitting'', ''Volunteer Literacy Tutoring'', ''Attending
    Small Literary Readings'', ''Playing Piano'']'
  career_goals: Marguerite aims to achieve tenure within the next three years while expanding her impact beyond the classroom. She envisions launching an interdisciplinary digital humanities hub that bridges
    literary studies with data visualization, securing a multi‑year grant to support student research and community outreach. She also aspires to publish a monograph on Appalachian narratives that weaves
    personal history with broader cultural theory, and to mentor a cohort of first‑generation college students toward academic success. Long‑term, she hopes to serve as department chair or director of a
    humanities institute, shaping institutional policy that balances innovative curricula with the proven pedagogical foundations she values.
