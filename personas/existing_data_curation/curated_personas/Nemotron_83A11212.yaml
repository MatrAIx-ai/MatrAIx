personas:
  professional: Cameron Frueh is a budding robotics hobbyist who combines a love for complex LEGO builds with a strategic mindset honed by tactical video games, channeling the Midwestern work ethic into
    meticulous project planning and competitive robot challenges at school.
  sports: Cameron Frueh is a spirited member of the local youth basketball league, drills hoops at the neighborhood park with a competitive edge, passionately follows the Cleveland Cavaliers and Browns,
    and balances fitness with occasional video‑game marathons that sometimes cut training sessions short.
  arts: Cameron Frueh channels creativity into intricate LEGO models, devours science‑fiction novels by Isaac Asimov and Neil Gaiman, and finds inspiration in the cinematic scores of Hans Zimmer and the
    pixel‑art aesthetics of the game ‘Minecraft.’
  travel: Cameron Frueh prefers weekend road trips to explore Lake Erie’s nature trails, dreams of a family vacation to Mackinac Island’s bike‑only streets, and curates a personal travel map that mixes
    local park hikes with future aspirations like touring the Space Center Houston.
  culinary: Cameron Frueh enjoys classic Midwestern comfort foods such as cheese‑laden macaroni, pepperoni pizza, and sweet funnel cake at local fairs, can whip up a reliable grilled cheese with just a
    toaster and cheddar, and always adds a dash of ketchup to homemade chicken nuggets for extra flavor.
  core: Cameron Frueh is a curious, competitively‑driven 11‑year‑old who balances LEGO engineering with basketball, modestly saves allowance yet occasionally splurges on gaming loot, and navigates health
    and school life with a pragmatic, skeptical lens.
background:
  cultural: Cameron grows up in a white, Midwestern family in Cleveland, Ohio, where community values emphasize hard work, modesty, and a love for local sports teams like the Browns and Cavaliers. His upbringing
    blends traditional American holidays—Thanksgiving, Fourth of July fireworks—with exposure to the city's diverse cultural events. The industrial heritage of Cleveland and the region's emphasis on practical
    education influence his pragmatic curiosity and competitive drive.
