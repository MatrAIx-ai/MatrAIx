  career_goals: Looking ahead, Dennis aims to transition into a lead engineering or director‑of‑engineering role within the next five years. He wants to spearhead projects that blend reliability with innovative
    AI/ML features, fostering a culture where team members can explore new ideas without sacrificing product stability. He also envisions launching a small consultancy that offers DevOps and cloud‑migration
    services to local startups, allowing him to balance professional growth with the flexibility he values for his family.
