  career_goals: Though retired from formal employment, Nelson's ambition is to stay intellectually engaged and give back to his community. He aims to deepen his knowledge of Dominican visual arts by taking
    a workshop at the Reading Arts Center, and hopes to curate a small exhibition of local Dominican‑American artists at the senior center. He dreams of documenting family recipes and stories in a bilingual
    memoir that celebrates his heritage and life in Pennsylvania. Nelson also wishes to expand his volunteer work, offering weekly Spanish language tutoring for children of immigrant families and serving
    as a mentor for young adults interested in trades skills. Ultimately, he seeks to maintain an active, socially connected life that balances learning with sharing his cultural legacy.
