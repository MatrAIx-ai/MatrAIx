personas:
  professional: Nelson Irizarry, a retired handyman and community volunteer, combines his practical expertise in carpentry and home repair with a passion for cultural event coordination, using his curiosity
    and organized flexibility to lead bilingual workshops and mentor young tradespeople.
  sports: Nelson Irizarry follows the Philadelphia Eagles and the Reading Fightin Phils, participates in weekly senior aqua‑aerobics at the local recreation center, and joins a low‑key walking club that
    explores the Susquehanna River trail each spring.
  arts: Nelson Irizarry enjoys photographing historic brick facades and vibrant street murals, studies the contemporary works of local painter Sarah Johnson, draws inspiration from Latin jazz legends like
    Tito Puente, and regularly attends exhibitions at the Reading Art Museum featuring modernist pieces by Edward Hopper.
  travel: Nelson Irizarry prefers thoughtful, low‑key travel, revisits his family’s island roots with annual trips to a Caribbean coast, explores historic towns in Spain, and takes weekend getaways to Philadelphia’s
    historic district and the Gettysburg battlefield.
  culinary: Nelson Irizarry loves preparing plantain‑based mofongo, aromatic rice with cilantro and adobo, and seafood paella, experimenting with a pinch of smoked paprika to add a modern twist, while sourcing
    fresh herbs from his garden and often sharing meals at neighborhood potlucks.
  core: Nelson Irizarry, a 61‑year‑old retired craftsman with a quiet curiosity, balances his love for gardening, sketching, and merengue with a habit of misplacing his glasses and an unshakeable devotion
    to family gatherings.
background:
  cultural: Nelson was born to Dominican parents who settled in Reading, Pennsylvania, during the early 1970s. He grew up speaking Spanish at home while attending English‑language schools, creating a bicultural
    identity that blends Caribbean traditions with Mid‑Atlantic American life. Dominican customs—such as celebrating Carnaval, Dominican Independence Day, and family gatherings centered around music, dance,
    and food—remain central to his life. He maintains strong ties to the local Dominican community through the Berks County Dominican Cultural Association, where he participates in cultural festivals, shares
    traditional recipes, and helps organize language‑preservation workshops. While embracing American values of civic participation and volunteerism, he also preserves his heritage through Catholic rituals,
    devotion to family, and the rhythmic sounds of merengue that echo through his home. This dual heritage informs his worldview, fostering respect for both his ancestral roots and the broader community
    he calls home.
