  career_goals: Looking ahead, Dayla aims to transition into a senior executive role such as CFO, where she can shape corporate financial strategy at a broader level and champion data‑driven decision making.
    She is also intent on establishing a mentorship program within her organization to pass on her practical knowledge to the next generation of finance professionals, while ensuring a smooth succession
    plan for her own eventual retirement.
