  hobbies: '[''Digital Painting'', ''Speculative Fiction Reading'', ''Philosophy'', ''Korean Calligraphy'', ''Gayageum Playing'', ''Hiking'', ''Fusion Cooking'', ''Photography'', ''Attending Indie Art Shows'']'
  career_goals: He aims to launch a boutique creative consultancy that merges business strategy with abstract artistic concepts, offering services to startups and artistic collectives. Parallel to that,
    he plans to develop an online platform showcasing original digital art and speculative short stories, eventually publishing a curated anthology. Over the next decade, he hopes to mentor emerging creators
    in the Bay Area, host small‑scale exhibitions, and become recognized as a thought leader at the intersection of innovation and art.
