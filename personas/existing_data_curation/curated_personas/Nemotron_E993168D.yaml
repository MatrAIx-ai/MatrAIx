personas:
  professional: Do Kim, a 45‑year‑old strategic creative consultant, channels a vivid imagination and competitive edge into business plans that fuse abstract visual concepts with data‑driven insights, using
    multilingual fluency to pitch to diverse audiences while habitually overlooking mundane administrative details in favor of big‑picture innovation.
  sports: Do Kim, an avid seasonal hiker, spends Saturdays trekking the rolling hills of Solano County with the Solano County Trailblazers, while cheering on the Golden State Warriors during basketball
    season and occasionally joining a local pick‑up soccer game, balancing a love for solo exploration with light team‑sport engagement.
  arts: Do Kim, a dedicated digital painter, channels the atmospheric sensibilities of James Turrell and the surreal textures of H.R. Giger into Procreate canvases, curates mini‑exhibitions at the Berkeley
    Indie Art Walk, and composes ambient soundtracks inspired by Brian Eno and Aphex Twin while occasionally performing Korean calligraphy for meditative breaks.
  travel: Do Kim, a 45‑year‑old wanderer, prefers self‑designed itineraries that blend art‑focused city trips—like a week of gallery hopping in Tokyo and a culinary retreat on Jeju Island—with rugged hikes
    in Yosemite and a spontaneous weekend in Marrakech, balancing a modest travel budget with a thirst for cultural immersion.
  culinary: Do Kim, an experimental home chef, fuses Korean staples such as gochujang and kimchi with American comfort foods to create dishes like kimchi‑taco sliders and miso‑infused ramen carbonara, cooking
    with an intermediate skill set while occasionally cluttering the kitchen with half‑finished ferments and a habit of tasting spoonfuls straight from the pot.
  core: Do Kim thrives at the intersection of business strategy and abstract art, juggling visionary projects and a habit of misplaced deadlines, all while humming the gayageum in a cluttered studio filled
    with digital canvases, half‑finished recipes, and a growing stack of NFT catalogs.
background:
  cultural: Do Hong Kim is a first‑generation Korean‑American raised in the Bay Area. He grew up bilingual, celebrating Korean holidays such as Chuseok and Seollal while also absorbing the multicultural
    vibe of Vallejo and nearby San Francisco. This dual heritage blends Confucian respect for education with American individualism, shaping his competitive yet introspective demeanor. He remains active
    in the local Korean community through cultural festivals, market visits, and preserving traditional arts, which continually inform his creative and professional pursuits.
attributes:
  skills: '[''Strategic Business Planning'', ''Creative Ideation and Conceptual Design'', ''Digital Illustration'', ''Photography'', ''Storytelling'', ''Multilingual Communication (Korean, English, Basic
