personas:
  professional: Olga Le is a community-focused social work professional who blends graduate training in the humanities with frontline case management, crisis intervention, and arts-based therapeutic techniques
    such as narrative storytelling, using their curiosity-driven yet practical mindset and relaxed, flexible style to adapt workshops on the fly while assertively advocating for culturally responsive funding.
  sports: Olga Le enjoys weekend treks with the Lakewood Trailblazers hiking club, follows the Seattle Seahawks and Seattle Sounders as a laid-back fan, drifts between yoga sessions in the evenings and
    spontaneous snowshoeing in winter, yet they sometimes skip early morning runs when a storytelling workshop runs late.
  arts: Olga Le intertwines a love for landscape painting reminiscent of Albert Bierstadt with a passion for photography inspired by Annie Leibovitz, drums in community circles featuring the music of Buffy
    Sainte-Marie, and leads a book club that devours contemporary voices like N. K. Jemisin, using these creative outlets to fuel both personal expression and therapeutic work.
  travel: Olga Le dreams of returning to Denali for a summer berry-picking expedition, has already trekked the Pacific Northwest’s coastal trail, spent a week in Vancouver exploring art galleries, and plans
    a budget-friendly trip to Maui to fish for mahi-mahi, preferring last-minute flight deals and campsite bookings that let flexibility outweigh strict itineraries.
  culinary: Olga Le is a proficient home cook who masterfully prepares akutaq with cloudberries and sour cream, simmers hearty salmon soup with spruce tips and wild thyme, and occasionally grills cedar-plank
    salmon glazed with fresh blackberry reduction, all while swapping recipes and stories at community potlucks.
  core: Olga Le blends storytelling, land-based healing, and a laid-back hustle, juggling grant deadlines with berry-picking trips and occasional credit-card forgetfulness.
background:
  cultural: Olga identifies as Alaska Native, belonging to the Dena'ina tribal heritage. Her upbringing was steeped in the cultural values of Alaska Native peoples—deep respect for the land, communal responsibility,
    oral storytelling, and the integration of traditional healing practices. Although she now lives in Lakewood, WA, she maintains strong ties with her home village, regularly visits family in the Anchorage
    area, and participates in intertribal networks that support Indigenous health and education. These cultural roots inform her worldview and professional approach, emphasizing relational care, respect
    for cultural protocols, and the incorporation of Indigenous knowledge into social‑service delivery. She celebrates seasonal festivals, engages in subsistence activities such as berry picking and fish
    smoking, and mentors younger Alaska Native members in preserving their heritage.
