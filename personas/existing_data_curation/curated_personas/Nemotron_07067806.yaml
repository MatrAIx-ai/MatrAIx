  hobbies: '[''Hiking'', ''Drumming circles'', ''Powwow participation'', ''Storytelling workshops'', ''Landscape painting'', ''Photography'', ''Cooking traditional foods'', ''Book club'', ''Yoga'', ''Youth
    mentorship'']'
  career_goals: In the next five years, Olga aims to transition from direct casework to a leadership role where she can shape services for Alaska Native and other underserved communities across the Pacific
    Northwest. She plans to pursue a Master’s in Social Work with a focus on Indigenous health, acquire advanced certification in trauma‑informed care, and eventually become a program director or community
    development manager for a nonprofit or tribal health agency. Her ambition is to design and implement a culturally grounded mental‑health and substance‑use prevention program that integrates traditional
    storytelling, art therapy, and land‑based healing. She also hopes to secure sustainable grant funding, mentor junior social workers, and influence county‑level policy to improve access to culturally
    competent services.
