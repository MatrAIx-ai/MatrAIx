  career_goals: Wanda aims to advance to a senior HR leadership role—such as Director or Vice President of Human Resources—where she can shape a company’s culture and strategic workforce planning. She plans
    to earn advanced HR certifications (SHRM-SCP, SPHR) and to spearhead innovative employee‑experience projects that integrate AI‑driven recruitment tools and holistic wellness programs. Long‑term, she
    envisions founding a consulting practice that helps midsize businesses build inclusive, resilient workplaces, while maintaining a balanced life that honors her need for occasional spontaneity and personal
    reflection.
