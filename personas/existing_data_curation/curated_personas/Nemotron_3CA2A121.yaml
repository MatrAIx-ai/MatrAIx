personas:
  professional: Wanda Hayes leverages over a decade of HR expertise—excelling in talent acquisition, employee relations, and performance management—by blending a pragmatic, data‑driven mindset with a spontaneous
    curiosity for emerging technologies, which allows them to swiftly redesign policies while nurturing a harmonious workplace culture.
  sports: Wanda Hayes fuels their love of the outdoors by hiking the Sierra Nevada trail network and joining the Washoe County Hiking Club, practices yoga thrice weekly for grounding, and follows the Vegas
    Golden Knights and Reno Aces, often attending games on spontaneous weekends.
  arts: Wanda Hayes finds creative respite in contemporary fiction, devouring novels by Sally Rooney and Chimamanda Ngozi Adichie, while also attending local indie theater productions featuring works by
    August Wilson, listening to folk‑rock band Lake Street Dive, and occasionally sketching desert landscapes inspired by Georgia O'Keeffe.
  travel: Wanda Hayes favors spontaneous road trips, charting routes with a paper map and a mix of Spotify playlists, exploring desert towns like Tonopah, historic sites such as Virginia City, and national
    parks like Zion and Yosemite, while balancing travel with budget constraints after family commitments.
  culinary: Wanda Hayes experiments in the kitchen, often reinventing classic dishes—such as miso‑glazed salmon with locally sourced asparagus, rosemary‑infused roasted chicken paired with a beet‑goat‑cheese
    salad, and vegan chickpea tacos seasoned with smoked paprika—while cultivating herbs like basil, thyme, and mint in their backyard garden.
  core: Wanda Hayes blends a curiosity‑driven, compassionate HR leadership style with spontaneous, sometimes disorganized habits, an anxious emotional core tempered by yoga, and a love for outdoor adventure,
    experimental cooking, and heartfelt literature.
background:
  cultural: Wanda grew up in a middle‑class, predominantly white suburban community in the Midwest, where values of education, self‑reliance, and community service were emphasized. Relocating to Sparks,
    Nevada, she embraced the region’s blend of Western frontier spirit and growing cultural diversity. Her professional life in HR has deepened her appreciation for multicultural perspectives, and she actively
    integrates inclusive practices in the workplace. While she identifies with broader American cultural norms, her Nevada experience—marked by an outdoor lifestyle, a strong sense of local community, and
    exposure to a mosaic of ethnic backgrounds—shapes her worldview, fostering both practicality and openness to new ideas.
