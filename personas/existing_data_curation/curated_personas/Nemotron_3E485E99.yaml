  hobbies: '[''Gardening'', ''Quilting'', ''Historical fiction reading'', ''Genealogy research'', ''Library volunteering'', ''Bowling'', ''Walking and mindfulness'', ''Digital craft design'']'
  career_goals: Although retired from formal employment, Mai aims to deepen her impact in the Findlay community through targeted volunteering and lifelong learning. She plans to take a short certificate
    course on digital archiving to help the local historical society preserve home-grown records. She also wishes to mentor younger members of her church's outreach programs, sharing her organizational
    expertise while learning fresh perspectives on community engagement. A personal ambition is to compile a family history book that weaves together genealogy research with oral histories, using both traditional
    research and modern online databases. Additionally, Mai hopes to maintain her physical and mental well-being by integrating regular walking groups and mindfulness workshops into her schedule, thereby
    reducing her propensity toward worry.
