  hobbies: '[''Reading science‑fiction and fantasy'', ''Robotics kits and basic electronics'', ''Sketching and watercolor painting'', ''Playing piano'', ''Hiking and nature walks'', ''Volunteering at the
    animal shelter'', ''Participating in school science club'', ''Coding games with Scratch'']'
  career_goals: Jill aspires to a career that blends her love for science with her desire to help others. She dreams of becoming a pediatric nurse or a medical researcher focused on child health, and she
    hopes to volunteer in community health programs during high school. In the longer term, she aims to pursue a degree in biomedical sciences and possibly develop tech‑based tools that improve youth wellness.
