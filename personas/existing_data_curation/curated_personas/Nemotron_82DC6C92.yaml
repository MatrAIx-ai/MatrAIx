personas:
  professional: Jill Scott, an aspiring young robotics engineer, combines curiosity with practicality by designing functional robot prototypes using Arduino kits while reliably meeting school project deadlines
    and collaborating compassionately with classmates.
  sports: Jill Scott enjoys weekend hikes in the nearby hills, cheers for the Seattle Seahawks, and runs on the middle school cross‑country team, blending a love for outdoor endurance with team spirit.
  arts: Jill Scott channels artistic energy through piano pieces by Yiruma, sketches wildlife scenes inspired by Audubon, and devours fantasy novels by Brandon Sanderson, letting music, drawing, and storytelling
    shape her creative identity.
  travel: Jill Scott has explored Yosemite National Park and Barcelona on family trips, favors itineraries that mix nature hikes with cultural immersion, and plans future adventures that balance budget
    constraints with a desire to practice Spanish.
  culinary: Jill Scott prefers homemade pizza topped with mozzarella and fresh basil, enjoys cooking simple tacos adorned with cilantro and lime, experiments with chocolate chip pancakes, but often forgets
    to finish chores before snacking.
  core: Jill Scott is a curious, compassionate 13‑year‑old who blends science, art, and social responsibility, yet sometimes procrastinates on homework in favor of gaming and snack breaks.
background:
  cultural: Jill comes from a White, middle‑class family in San Jose, California. Growing up in the diverse Silicon Valley region, she experiences a blend of traditional Anglo‑American customs and the vibrant
    multicultural environment of the Bay Area. This exposure nurtures her openness to different perspectives, her participation in community events, and her interest in tech‑focused extracurricular activities,
    while still celebrating typical American holidays and family traditions.
