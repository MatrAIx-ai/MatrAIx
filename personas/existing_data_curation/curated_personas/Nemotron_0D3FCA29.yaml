  hobbies: '[''Woodworking club activities'', ''Bridge and chess nights'', ''Gardening'', ''Community theater outings'', ''Classic jazz concerts'', ''Historic home restoration volunteering'', ''Family gatherings'']'
  career_goals: Although nearing the end of his formal career, Vann aims to cement his legacy by documenting his craftsmanship in a memoir and a practical guide for future carpenters. He aspires to establish
    a modest scholarship for local trade‑school students, ensuring the next generation can access quality training. He also wishes to continue contributing his expertise to community preservation projects
    in Arlington, helping protect historic structures. Maintaining his health to support his wife and remain active in his woodworking club remains a personal priority, alongside securing financial stability
    for his family and preserving his workshop for future generations.
