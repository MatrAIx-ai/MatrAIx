  career_goals: Although retired from formal employment, Carolyn aims to deepen her impact on the local community by volunteering as an arts coordinator at the senior center, where she hopes to develop
    a regular program of workshops that bring together seniors and younger neighbors through painting, crafts, and storytelling. She aspires to earn a GED or a community‑college certificate in arts administration
    to formalize her expertise. In the longer term, she wishes to compile a memoir that captures the cultural history of El Centro and her personal journey, and to mentor emerging artists through one‑on‑one
    guidance and collaborative projects.
