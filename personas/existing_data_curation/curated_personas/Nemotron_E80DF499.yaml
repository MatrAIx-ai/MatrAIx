personas:
  professional: Carolyn Taylor is a retired community volunteer who, driven by an imaginative spirit and a knack for organization, now serves as the senior‑center arts coordinator, designing intergenerational
    painting, craft, and storytelling workshops while pursuing a GED and a certificate in arts administration to formally anchor their expertise.
  sports: Carolyn Taylor maintains an active lifestyle by attending senior dance classes for salsa and line dancing, walking daily through historic downtown, and cheering for the San Diego Padres, Los Angeles
    Lakers, and LA Rams, while a member of the El Centro Senior Fitness Club, they prefer low‑impact exercise over high‑intensity sports and occasionally skip a session when a large art project demands
    extra time.
  arts: Carolyn Taylor channels their vivid imagination into abstract watercolor and mixed‑media collages inspired by nature, frequently citing Frida Kahlo, Georgia O’Keeffe, and local desert artist Maria
    Sánchez as influences, participates in community theater productions with the El Centro Players, attends exhibitions at the Riverside Art Museum, and they often spend evenings photographing historic
    architecture for creative projects.
  travel: Carolyn Taylor favors thoughtfully planned road trips that blend artistic inspiration and cultural immersion, having toured the deserts of Sedona, the historic adobe streets of Santa Fe, and the
    vibrant markets of Guanajuato, they hope to someday capture the murals of Valparaíso, Chile, while balancing a modest travel budget and occasional need for rest between excursions.
  culinary: Carolyn Taylor delights in crafting Mexican‑inspired dishes such as enchiladas verdes, pozole, and cactus (nopales) tacos, incorporating fragrant ancho chilies, fresh corn masa, and citrus lime,
    they possess a solid home‑cooking skill set, yet sometimes over‑salt their salsas, and they love pairing meals with a glass of locally sourced Zinfandel.
  core: Carolyn Taylor is a perpetually curious 67‑year‑old artist‑activist whose days swirl between vibrant canvases, senior‑center workshops, salsa steps, and a love for desert flora, all while juggling
    a modest pension and occasional forgetfulness, and they radiate inclusive energy wherever they go.
background:
  cultural: Carolyn grew up as a third‑generation white Californian in the Imperial Valley, where the arid landscape and agricultural economy shaped her early life. Her family’s roots trace back to the
    Midwest, but she has spent most of her adult years in El Centro, a border community where Anglo‑American and Mexican cultural traditions intertwine. This environment influenced her appreciation for
    Mexican cuisine, bilingual community celebrations, and the importance of close‑knit neighborhood bonds. She identifies with the values of self‑reliance, hospitality, and community service common among
    long‑time residents of the desert Southwest. While she does not practice a specific religion, she regularly participates in local civic events such as Fourth of July parades, Cinco de Mayo festivals,
    and church‑based charity drives.
