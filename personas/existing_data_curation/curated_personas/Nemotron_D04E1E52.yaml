personas:
  professional: Ysaac Vigue, a 23‑year‑old CNC machinist, blends meticulous GD&T expertise with a competitive drive, mastering manual and CNC equipment, drafting precise G‑code, and they aim to obtain a
    certified CNC Machinist credential to eventually step into production supervision and engineering design.
  sports: Ysaac Vigue, a 23‑year‑old weight‑lifting enthusiast, hits the Iron Forge Gym three times a week, roots for the Buffalo Bills and the Buffalo Sabres, spends sunrise weekends fishing on Lake Erie,
    hikes the Erie County trails, treats each outing as a strategic challenge to improve endurance, and they view each physical goal as a competition against their own limits.
  arts: Ysaac Vigue, a 23‑year‑old woodworking hobbyist, finds artistic fulfillment in shaping reclaimed pine into minimalist coffee tables while listening to Dream Theater and studying the industrial designs
    of Charles Eames, and they unwind with strategy video games like Civilization VI that satisfy their competitive edge.
  travel: Ysaac Vigue, a 23‑year‑old pragmatic traveler, prefers short road trips to nearby destinations such as Niagara Falls, Mackinac Island, and the German town of Augsburg for its vintage motorcycle
    scene, plans each itinerary down to fuel costs and lodging expenses, reserves savings for a future cross‑country tour of American manufacturing hubs, and they balance adventure with the need to keep
    a tight budget.
  culinary: Ysaac Vigue, a 23‑year‑old home‑cooker, loves grilling the trout they catch on Lake Erie with lemon‑butter, whipping up a quick roux for homemade chicken‑fried steak, experimenting with craft‑beer
    pairings, though they often forget to clean their kitchen tools after a long machining session.
  core: Ysaac Vigue, a 23‑year‑old machinist with a competitive streak, channels curiosity into precise woodworking, vintage motorcycle restoration, and strategic gaming, while they juggle anxiety, meticulous
    budgeting, and a dream of running a bespoke machining shop.
background:
  cultural: Ysaac is a white American who grew up in the suburban community of Getzville, New York. His family has worked in trades for several generations, giving him a pragmatic, work‑oriented upbringing
    typical of upstate New York’s middle‑class families. The local culture—marked by seasonal changes, a strong sense of community, and an emphasis on self‑reliance—has reinforced his balanced approach
    to curiosity and practicality. While he identifies with mainstream American values, he also respects the modest, no‑nonsense ethic of his neighborhood, which shapes his competitive yet cooperative attitude
    in the workplace.
attributes:
  skills: '["CNC milling", "Lathe operation", "Blueprint reading", "G‑code programming", "CAD design (Fusion 360)", "Precision measurement (micrometer, caliper)", "Machine maintenance", "Quality inspection",
    "Metalworking safety", "Troubleshooting"]'
  hobbies: '["Woodworking", "Arduino electronics projects", "Restoring vintage motorcycles", "Fishing", "Hiking in Erie County", "Strategy video gaming", "Weightlifting", "Reading about manufacturing technology",
    "3D printing"]'
  career_goals: Ysaac aims to obtain a certified CNC Machinist credential within the next year and then move into a lead machinist or production supervisor role. He is interested in learning advanced manufacturing
    techniques such as additive manufacturing and hopes to eventually transition into a manufacturing engineer position where he can design processes rather than just execute them. Long‑term, he dreams
    of opening a small, family‑run machining shop that offers custom work for local artisans, giving him both creative freedom and financial stability.
