persona_description: A coalition seeking to overhaul the 1976 Toxic Substances Control Act (TSCA) and push for the "Safe Chemicals Act of 2010" and the "Toxic Chemicals Safety Act of 2010." The group is
  concerned about the increasing evidence linking certain chemicals to reproductive disorders and the lack of data on the chemicals used today, which they believe is a lack of safety. The group's main issues
  with TSCA are that it "grandfathered" in 62,000 chemicals without testing, and that it does not take into account the vulnerable period of exposure. The group is pushing for companies to test their chemicals
  for safety instead of the EPA having to prove they are unsafe. The group is concerned about the unknown long-term effects of exposure to these chemicals and is advocating for limiting exposure through
  lifestyle changes and reducing exposure through cleaner products and household cleaning. The group's approach is to frame the issue in a non-alarmist way and encourage patients to be motivated and receptive
  to minimizing exposure and maximizing health during pregnancy and the health of their baby.
