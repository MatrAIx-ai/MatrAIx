  hobbies: '[''fishing'', ''hiking'', ''gardening'', ''Raspberry Pi projects'', ''woodworking'', ''playing acoustic guitar'', ''watching documentaries'', ''church community service'', ''online strategy
    gaming'']'
  career_goals: Matthew aims to secure stable, well‑compensated employment that leverages his technical aptitude and his desire for reliability. He plans to complete his associate degree in information
    technology or applied sciences, then pursue a certification in network administration or HVAC servicing. In the medium term, he hopes to obtain an apprenticeship, transition into a full‑time technician
    role, and eventually start his own small service business serving the Dyer County community. He also wants to provide financial security for his wife, build a comfortable home, and possibly further
    his education to open doors to supervisory positions.
