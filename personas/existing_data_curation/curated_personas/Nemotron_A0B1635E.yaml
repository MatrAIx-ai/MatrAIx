  career_goals: Adriana dreams of becoming a concept artist and graphic novelist, crafting immersive worlds for video games or animated films. She aspires to attend a specialized arts high school, win regional
    and national art competitions, and eventually earn a degree in visual arts or animation. In the long term, she hopes to open a community studio that mentors Black youth in creative media, using her
    imagination to inspire social change and representation.
