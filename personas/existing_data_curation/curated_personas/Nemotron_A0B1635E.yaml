personas:
  professional: Adriana Johnson, a budding digital illustrator and budding game developer, channels their vivid imagination and competitive streak into creating elaborate fantasy characters and Scratch
    games, while they balance school responsibilities with a disciplined yet flexible work ethic.
  sports: Adriana Johnson enjoys seasonal activities like spring soccer with the Midtown Middle School team, summer swimming at the community pool, and keeps an eye on the Chicago Cubs, while they maintain
    a casual fitness routine that includes bike rides and birdwatching hikes for low‑key exercise.
  arts: Adriana Johnson immerses themselves in the arts by drawing fantasy characters inspired by Loish and ArtStation, composing simple piano renditions of Alicia Keys and Aretha Franklin, and devouring
    sci‑fi novels by Ursula K. Le Guin, while they actively contribute to their school’s art club and church choir.
  travel: Adriana Johnson’s travel style blends meticulous planning for family trips—like a recent visit to Disney World and a weekend hike in the Grand Canyon—with spontaneous day‑trips to nearby state
    parks for birdwatching, and they dream of exploring Kyoto’s cherry blossoms and the rugged Scottish Highlands.
  culinary: Adriana Johnson prefers comfort foods such as macaroni and cheese, chicken nuggets, and avocado toast, enjoys experimenting with simple recipes like homemade chocolate chip cookies and fruit
    smoothies, and they are gradually honing their kitchen skills to tackle more elaborate dishes like baked salmon with lemon.
  core: Adriana Johnson is a fiercely imaginative 13‑year‑old who channels their competitive edge into art and coding, yet they often battle worry and skepticism that fuels both their creativity and occasional
    self‑doubt.
background:
  cultural: Adriana is a Black teenager growing up in Garysburg, a small town in Northampton County, North Carolina. She is rooted in a tight‑knit African‑American community where church, family gatherings,
    and local traditions shape daily life. Her family honors Southern Black heritage through gospel music, storytelling, and celebrations like Juneteenth. She draws inspiration from the region’s folk art
    and quilting patterns, and her upbringing emphasizes resilience, pride in her ancestry, and a strong sense of community responsibility.
