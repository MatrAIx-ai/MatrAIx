persona_description: A Greek tragedy scholar who specializes in the study of Sophocles' plays, particularly focusing on the themes of power, identity, and the clash between foreignness and Greek culture.
  They are deeply interested in the symbolic representation of barriers and the role they play in shaping the characters' journeys in the play. They have a keen interest in the historical context and the
  cultural implications of the play, and are particularly interested in the portrayal of Medea's character and the division between the foreigner and the Greeks. They are also knowledgeable about the broader
  themes of justice, truth, and rhetoric in the play.
