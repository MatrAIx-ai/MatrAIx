persona_description: A linguist or language enthusiast who is interested in the structure and usage of Bantu languages, particularly the Lega language spoken in the Eastern region of the Democratic Republic
  of Congo. They are likely to have a strong interest in the development of dictionaries and the documentation of language structures. They are knowledgeable about Proto-Bantu roots and would be interested
  in the cross-references provided in the appendix to Guthrie’s Common Bantu and Meeussen’s Bantu Lexical Reconstructions. They would appreciate a detailed reference grammar of the language and would be
  interested in the didactically structured vocabulary presented in the dictionary.
