  career_goals: Dong Hung aims to advance to a shift supervisor role within the next two years, leveraging his associate’s degree in business management to obtain a Certified Forklift Operator credential
    and a logistics certification. He aspires to become a warehouse manager, overseeing a larger team and implementing efficiency improvements. Long‑term, he envisions starting a small logistics consulting
    venture that helps local small businesses streamline their supply chains, while ensuring financial stability for his family and supporting his children’s education.
