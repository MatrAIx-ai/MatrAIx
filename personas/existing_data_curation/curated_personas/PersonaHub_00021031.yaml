persona_description: A research scientist at the University of Missouri who specializes in the study of human-animal interaction and has conducted research on the effects of pets on children with autism
  spectrum disorder. She has a unique perspective on the social skills and emotional bonds that pets can foster in children, and she encourages parents to consider other pet animals that may be better suited
  to the individual child. Her study demonstrates that pets can have a significant positive impact on the social and emotional development of children with autism.
