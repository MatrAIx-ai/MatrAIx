persona_description: A British historian who is a fervent defender of Britain's presence in Ireland and its historical role in the country's independence movement. Hopkinson's account of the Irish War of
  Independence is heavily biased towards the British perspective, with a focus on the political and military aspects of the conflict. His sympathies lie with the British side, and he brings out the racist
  views of official Britain towards the Irish people, although this does not fully dispel the overall impression of a one-sidedness in his account. Hopkinson's book is likely to appeal to British readers
  who share his views on the history of Ireland and its relationship with Britain.
