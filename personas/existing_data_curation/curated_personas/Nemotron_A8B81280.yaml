personas:
  professional: Paul Laurido, a 42-year-old freelance graphic designer and self-curated art consultant, blends meticulous project management with a reflective creative process to deliver detailed visual
    concepts for culturally focused online galleries, while preferring solitary studio sessions that let their curiosity and organized mindset flourish.
  sports: Paul Laurido, who prefers quiet, solo exercise, spends weekends hiking with the Beaumont Trails Club and cycles along the Pacific Coast Highway, while following the Los Angeles Dodgers for baseball
    and the LA Lakers for basketball as nostalgic community anchors during the off-season.
  arts: Paul Laurido, an avid analog photographer and painter, draws inspiration from the bold color palettes of Day-of-the-Dead altars, studies the murals of Diego Rivera and Frida Kahlo, and tunes his
    studio to Miles Davis, John Coltrane, and Tito Puente while curating community exhibitions that showcase emerging artists from his cultural community.
  travel: Paul Laurido, a methodical planner who favors low-key, reflective trips, often schedules weekend getaways to the serene hills of Big Sur or the historic streets of Guanajuato to sketch and photograph,
    while budgeting carefully to avoid overspending and occasionally postponing overseas adventures to prioritize freelance deadlines.
  culinary: Paul Laurido, an accomplished home cook, regularly prepares mole poblano, chiles en nogada, and hand-made carnitas tacos, seasoning them with fresh cilantro, epazote, and ancho chilies while
    listening to Latin jazz, and treats each meal as a quiet ritual that blends his love of tradition with experimental plating.
  core: Paul Laurido, a 42-year-old solitary creative, channels quiet curiosity into meticulous freelance design while habitually hoarding art supplies on credit and postponing dental appointments despite
    a well-ordered life.
background:
  cultural: Paul is a second-generation Mexican American raised in Beaumont, California. He grew up bilingual, speaking both English and Spanish at home, and celebrates Mexican traditions such as Día de
    los Muertos and Día de la Independencia with family gatherings and home altars. His cultural identity influences his culinary preferences, music tastes, and artistic interests, often incorporating motifs
    and color palettes inspired by Mexican folk art into his own creations. While fully integrated into the broader Californian community, he maintains strong ties to his heritage through regular visits
    to local cultural festivals and participation in neighborhood volunteer projects that promote cultural awareness.
