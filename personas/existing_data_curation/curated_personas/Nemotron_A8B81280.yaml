  career_goals: Paul aims to transition from his current unstructured employment situation to a sustainable freelance career focused on graphic design and art curation. Over the next few years, he plans
    to complete a bachelor's degree in visual arts or digital media to deepen his technical expertise. He also hopes to launch an online platform that sells his own artwork and collaborates with other Mexican-American
    artists, fostering cultural exchange and providing a modest supplemental income for his family.
