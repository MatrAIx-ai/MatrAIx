persona_description: An American political analyst or commentator who is familiar with the intricacies of American politics and the nuances of red and blue voting maps. They are aware of the term Purple
  America and the associated distortions it represents in the way that American politics is often portrayed. They have a keen interest in understanding the distribution of votes across the nation and the
  ways in which political pundits oversimplify the political landscape. They are likely to be a regular reader of news analysis and political blogs, and are interested in the ways in which political maps
  and voting results can be used to make sense of the complexities of American politics.
