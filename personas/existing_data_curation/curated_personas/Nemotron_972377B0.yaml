    & Interior Aesthetics'', ''Project Management'']'
  hobbies: '[''Visiting art museums and galleries'', ''Photography (sunrise, architecture, street scenes)'', ''Sailing on the Gulf Coast'', ''Gardening native Florida plants'', ''Volunteering with community
    arts programs'', ''Reading about emerging technology and sustainable design'', ''Cooking Mediterranean dishes'', ''Curating home art displays'']'
  career_goals: In the next five years, William aims to position his waterfront property as a benchmark for boutique hospitality that blends art, sustainability, and technology. He plans to secure LEED
    certification, launch an annual “St. Petersburg Art & Culture” exhibition series within the hotel, and develop a formal apprenticeship program that prepares emerging hospitality professionals for leadership
    roles. Looking beyond direct management, he envisions transitioning to a consultancy role that guides other Florida lodging operators in adopting eco-friendly practices and culturally immersive guest
    experiences, while also endowing a small scholarship fund for local students pursuing hospitality or environmental studies.
