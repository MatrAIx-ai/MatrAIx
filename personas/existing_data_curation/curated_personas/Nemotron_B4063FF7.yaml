personas:
  professional: Mary Butler, a 20‑year‑old pharmacy technician adept at medication preparation, prescription verification, and inventory management using QS/1 and Pioneer Rx, balances her curiosity about
    emerging drug therapies with a relaxed, flexible approach to scheduling, delivering compassionate patient counseling even when occasional disorganization leads to piled‑up paperwork.
  sports: Mary Butler, a weekend hiker of the Wichita Mountains and regular attendee of a community yoga studio, also joins a local Norman adult pick‑up soccer league, roots for the Oklahoma Sooners football
    team in the fall and the Oklahoma City Thunder during basketball season, and occasionally volunteers at the senior center’s fitness program.
  arts: Mary Butler, who journals and sketches landscapes after her hikes, finds emotional release strumming acoustic renditions of Joni Mitchell and Ed Sheeran, attends monthly open‑mic nights at a Norman
    coffeehouse, and curates playlists featuring The Lumineers and Norah Jones to set the mood for her creative sessions.
  travel: Mary Butler, favoring spontaneous weekend getaways over rigid itineraries, has hiked Colorado’s Rocky Mountains and explored Santa Fe’s art scene, and dreams of a culturally immersive trip to
    Kyoto, Japan to study tea ceremonies and mindfulness retreats, all while navigating travel plans on a student budget.
  culinary: Mary Butler, an enthusiastic home cook, confidently prepares quinoa‑kale bowls with roasted sweet potatoes, chickpeas, and tahini, crafts calming herbal infusions such as ginger‑turmeric tea
    and peppermint‑valerian blends, and frequently experiments with seasonal produce like butternut squash and heirloom tomatoes to create nutritionally balanced meals.
  core: Mary Butler, a 20‑year‑old pharmacy technician whose blend of curiosity, compassion, and chronic worry fuels a relaxed yet occasionally disorganized pursuit of holistic health, music, and mindful
    adventure.
background:
  cultural: Mary Ann grew up in a middle‑class, Anglophone family in Norman, Oklahoma. Her upbringing blends Midwestern pragmatism with the hospitality typical of small‑town Oklahoma. Her family attended
    a local Methodist church, emphasizing service, community involvement, and modesty. She was raised with an appreciation for family gatherings, community fairs, and a respect for the agricultural roots
    of the region, although her parents worked in education and retail rather than farming. Exposure to a diverse university environment at the University of Oklahoma has broadened her perspective, fostering
    an openness to different cultures while still valuing the traditional values of hard work, modesty, and a strong sense of community responsibility.
attributes:
  skills: '[''Prescription verification'', ''Medication dispensing'', ''Compounding sterile and non‑sterile preparations'', ''Pharmacy software operation (e.g., QS/1, Pioneer Rx)'', ''Inventory management'',
    ''Insurance claim processing'', ''Patient counseling and education'', ''Understanding of drug interactions and dosage calculations'', ''Regulatory compliance (OSHA, state pharmacy law)'', ''Team collaboration
    and conflict resolution'', ''Stress‑sensitive communication'', ''Continuous learning of emerging therapies'']'
  hobbies: '[''Yoga and mindfulness meditation'', ''Hiking in local nature trails'', ''Cooking healthy meals and experimenting with herbal teas'', ''Volunteering at senior center'', ''Journaling'', ''Sketching
    and drawing'', ''Playing acoustic guitar'', ''Reading health and wellness literature'']'
  career_goals: Mary Ann aims to enroll in a Doctor of Pharmacy (Pharm.D.) program within the next two years, leveraging her current experience as a stepping stone toward becoming a licensed pharmacist.
    She aspires to specialize in community health, focusing on medication therapy management for patients with chronic conditions and mental health concerns, where her compassion can make a tangible difference.
    In the long term, she hopes to open a boutique pharmacy in Norman that integrates holistic wellness services, such as nutritional counseling and stress‑reduction workshops, offering flexible hours to
    accommodate diverse community needs. She also envisions taking on mentorship roles, guiding future pharmacy technicians, and contributing to local health outreach programs.
