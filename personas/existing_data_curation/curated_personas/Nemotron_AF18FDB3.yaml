  hobbies: '[''Hiking'', ''Group Trail Runs'', ''Book Club'', ''Yoga'', ''Mindfulness'', ''Volunteering at Food Bank'', ''Photography'', ''Cooking (regional recipes)'']'
  career_goals: Ellie aims to obtain her CPA license within the next year, advance to senior audit manager at her firm, and ultimately become a partner or launch a boutique audit consultancy that leverages
    data‑driven audit solutions for mid‑size businesses in the Great Plains. She also seeks to lead the adoption of advanced analytics in audit processes, mentor junior staff, and serve on professional
    boards such as the South Dakota CPA Society.
