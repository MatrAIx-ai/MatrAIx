  hobbies: '["Visiting art galleries and museums","Sketching and casual painting","Attending community theater performances","Weekend karaoke with friends","Line‑dancing classes at the local community center","Neighborhood
    walking and nature hikes","Cooking Vietnamese and Tex‑Mex fusion dishes","Sharing meals at potluck gatherings","Online courses on sustainability and green cleaning","Volunteering at cultural festivals
    and event setups"]'
  career_goals: Nhan aims to earn a Certified Professional Cleaner credential and move into a supervisory role overseeing a large facility’s maintenance staff. She hopes to launch a small, eco‑focused cleaning
    business that differentiates itself through innovative service models and community outreach. Long‑term, Nhan envisions integrating her love for art by organizing pop‑up art displays in the buildings
    she services, thereby creating more vibrant work environments and showcasing local artists.
