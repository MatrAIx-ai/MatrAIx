  career_goals: Even at 84, Maricel is driven to leave a lasting imprint on her community and family. She aims to compile her migration story and family memories into a memoir that can be shared with her
    grandchildren and the Bronx Mexican diaspora. She plans to launch an intergenerational art project that pairs senior artists with youth from local schools to create a mural celebrating Mexican heritage.
    Maricel also wishes to mentor new volunteers at the Bronx community center, teaching them storytelling techniques and traditional cooking. She hopes to learn basic digital photography to document her
    projects and expand her online presence, ensuring her cultural contributions reach a wider audience. Maintaining her health and independence while staying socially engaged remains a core ambition.
