persona_description: A plant scientist who is passionate about phytoremediation and the use of transgenic trees to remove toxins from the environment. He is dedicated to understanding how plants adapt to
  different environmental conditions and how they use water to grow. Ivan is also interested in creating a more inclusive plant science community that supports emerging scientists. He is a co-founder of
  Taproot, a podcast that explores the working world and publication process of real-life plant scientists. Ivan's research has the potential to improve plant, animal, and human nutrition by understanding
  how plants absorb elements.
