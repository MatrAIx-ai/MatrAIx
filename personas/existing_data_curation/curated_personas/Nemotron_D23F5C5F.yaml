  hobbies: '[''Reading'', ''Cooking and Baking'', ''Gardening'', ''Yoga'', ''Community Volunteering'', ''Board Game Nights'', ''Craft Workshops'']'
  career_goals: Patricia aims to progress from her current retail associate role to a store management position within the next two to three years, using her organized and reliable nature to lead a team.
    She plans to complete her associate's degree in Business Administration and eventually pursue a bachelor's degree to qualify for regional management. Long term, she dreams of opening her own boutique
    that blends Southern hospitality with curated, sustainable fashion, and she hopes to incorporate innovative retail technologies she discovers through her curiosity.
