  hobbies: '["LEGO Duplo building", "color‑sorting games", "crayon drawing and coloring", "listening to rhythmic children’s music", "library storytime", "playground outdoor play", "water play"]'
  career_goals: Even at four, Samuel often talks about his future in vivid, imaginative ways. He is drawn to professions that combine clear routines with helping others, such as a firefighter, teacher,
    or police officer, because they offer predictable daily tasks. At the same time, his curiosity about the stars leads him to dream of becoming an astronaut, a role that lets him explore new frontiers
    while still following a structured training path. His aspirations blend a desire for order with the freedom to imagine.
