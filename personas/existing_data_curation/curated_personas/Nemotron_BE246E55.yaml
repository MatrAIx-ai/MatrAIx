  hobbies: '["Reading (realistic fiction, biographies)", "Journaling", "Drawing and sketching", "Crafting (friendship bracelets, knitting)", "Listening to R&B and soul music", "Cooking family recipes",
    "Walking the family dog", "Puzzle video games (e.g., Tetris, Sudoku)", "Indoor gardening (houseplants)"]'
  career_goals: Philisha aspires to a career that offers stability, routine, and the chance to help others. She envisions becoming an elementary school teacher where she can create a structured, supportive
    learning environment for young children, or a school librarian who can maintain an organized space for learning. She is also interested in nursing or counseling, fields that combine practical skills
    with compassionate care. Her short‑term goals include maintaining strong academic performance, developing coping strategies for anxiety, and earning a scholarship to a university with a strong education
    or health sciences program, so she can give back to her community and serve as a positive role model for other Black youth.
