  hobbies: '["Abstract painting", "Speculative fiction reading", "Fusion cooking experiments", "Bharatanatyam dance", "Herb balcony gardening", "Improv comedy", "Community festival volunteering", "Art gallery
    visits", "Theatre outings", "Lake Erie shoreline walks"]'
  career_goals: Rani aspires to transition from floor staff to a supervisory or manager position within the next two years, aiming to earn a Certified Food Safety Manager (CFSM) credential and later a ServSafe
    Manager certification. She dreams of opening a boutique butcher shop that emphasizes sustainable sourcing, offers specialty cuts, and serves as a culinary hub where she can host cooking workshops that
    blend South Asian techniques with local produce. She also hopes to launch a line of artisanal spice rubs marketed online, leveraging her creative flair and community connections. Long‑term, she envisions
    a culinary education platform—perhaps a YouTube channel or podcast—where she shares food science insights, recipe experiments, and cultural stories, building a following that bridges her love for novelty,
    art, and community interaction.
