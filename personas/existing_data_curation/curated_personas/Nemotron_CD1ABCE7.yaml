  hobbies: '[''Gardening'',''Hiking'',''Reading historical fiction'',''Woodworking'',''Volunteer construction work (Habitat for Humanity)'',''Cooking seasonal meals'',''Small book club gatherings'']'
  career_goals: Michele aims to advance to a senior director role overseeing large-scale commercial and mixed-use developments, with a particular focus on integrating sustainable design and innovative technology.
    She seeks to champion diversity and mentorship within the construction industry, establishing programs that support women and underrepresented groups entering the field. Additionally, Michele aspires
    to become a recognized consultant on green building standards, contributing to public-sector infrastructure projects that enhance community resilience in Massachusetts.
