  hobbies: '[''Gardening'', ''Birdwatching'', ''Bridge'', ''Cooking and baking'', ''Quilting'', ''Hiking'', ''Photography'', ''Volunteer work at the library'', ''Historical society research'']'
  career_goals: Though retired from formal employment, Colleen aims to continue making a meaningful impact in her community. She plans to complete a certificate in community development through a local
    community college, which will enable her to take a leadership role in the Albany Historical Society. She hopes to mentor younger volunteers, develop educational programs about the region’s agricultural
    heritage, and organize an annual garden festival that showcases local produce and sustainable practices. Additionally, she aspires to author a memoir that captures her experiences growing up in the
    Willamette Valley and the lessons of resilience she has learned. Maintaining her health is also a priority; she intends to hike the nearby Cascades and participate in senior fitness classes. Another
    long‑term ambition is to serve on the board of a non‑profit focused on senior services, advocating for resources and programs that support aging residents.
