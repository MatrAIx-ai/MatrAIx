  hobbies: '["Strategy video gaming", "LEGO and model building", "Digital illustration", "Science‑fiction and fantasy reading", "Indie/alternative music listening", "Exploring New Haven parks", "Casual
    basketball with friends", "Collaborative coding challenges", "Tabletop strategy games", "Basic electronics tinkering"]'
  career_goals: David dreams of turning his love for technology and creativity into a career as a software developer or indie game designer. He hopes to attend a local community college or university after
    high school to study computer science while keeping a flexible schedule that allows him to work on personal projects. In the longer term, he aims to create his own small studio where he can combine
    coding, graphic design, and storytelling, providing both financial stability and creative freedom. He also wants to develop enough technical expertise to help his family with everyday tech needs, reflecting
    his blend of compassion and self‑interest.
