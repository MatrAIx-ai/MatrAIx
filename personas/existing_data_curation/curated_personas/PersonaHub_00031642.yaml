persona_description: A team of four students who built a drone with a Tessel chip, 3D printer, and coding skills, aiming to explore the internet of things. They had never worked with many of the technologies
  needed for this project but used the fundamentals developed at Hack Reactor to teach themselves the necessary code. The team had ambitious goals beyond the three-week period they had for this project
  and were contained by the current limits of their tools. The project required strong managing ability. As tech like this becomes more and more affordable to Software Engineers, the internet of things
  is likely to see a rise.
