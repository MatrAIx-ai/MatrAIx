  hobbies: '[''singing along to nursery rhymes'', ''dancing to music'', ''water play during baths'', ''exploring interactive board books'', ''playing with soft plush toys'', ''building towers with stacking
    cubes'', ''pushing toy cars'']'
  career_goals: Even at this early stage, Emma displays a budding desire to help and teach others. She frequently pretends to care for her stuffed animals and mimics adult caregivers, saying she wants to
    "help" and "be a teacher" during play. These actions suggest a future ambition toward a caring profession such as early childhood education or pediatric health care, where her sociable, cooperative
    nature and practical problem‑solving could flourish.
