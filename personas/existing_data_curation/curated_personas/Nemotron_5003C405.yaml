personas:
  professional: Emma Trujillo, a 1-year-old budding explorer of early learning, displays a nascent professional mindset by eagerly sorting colorful blocks, matching shapes, and babbling new words, balancing
    curiosity with practical problem solving while maintaining a routine that blends organization and flexibility.
  sports: Emma Trujillo, a 1-year-old energetic explorer, delights in weekly baby yoga sessions at the local community center and splashes enthusiastically during toddler swim classes, all while cheerfully
    waving a tiny flag for the nearby professional baseball team, the Detroit Tigers, whenever the parents tune in to the game.
  arts: Emma Trujillo, a 1-year-old budding aficionado of the arts, grooves to the cheerful tunes of The Wiggles and Raffi while pointing at the bold illustrations in Eric Carle's picture books, and often
    mimics simple dance moves seen in Baby Einstein videos.
  travel: Emma Trujillo, a 1-year-old adventurous stroller traveler, enjoys the family’s frequent outings to the city zoo, the sandy shores of Santa Monica Beach, and a weekend cabin retreat in the mountains,
    while dreaming—through picture books—of a future visit to Disneyland Paris.
  culinary: Emma Trujillo, a 1-year-old budding food explorer, shows a clear preference for smooth sweet carrot puree, mashed banana, and avocado mash, happily self‑feeds with a tiny spoon, and eagerly
    savors the occasional bite of soft cheese sticks during family dinner.
  core: Emma Trujillo, a 1-year-old curious but worry‑prone explorer, balances a love for new toys with a habit of clinging to familiar blankets, often crying over minor changes while radiating infectious
    energy in group play.
background:
  cultural: Emma is raised in a white, middle‑class family living in Orlando, Florida. Her family observes mainstream American customs such as Thanksgiving, Christmas, and Independence Day celebrations,
    while also appreciating the multicultural atmosphere of Central Florida. Because of her surname, occasional Spanish words and Latin‑American foods appear at family gatherings, adding a subtle cultural
    layer. The warm climate encourages outdoor play, and frequent family trips to local attractions like theme parks provide shared experiences that shape her social world.
attributes:
  skills: '[''walking unaided'', ''basic vocabulary of ~10 words'', ''stacking 2-3 blocks'', ''identifying basic colors'', ''imitating animal sounds'', ''responding to name'', ''participating in group play'',
