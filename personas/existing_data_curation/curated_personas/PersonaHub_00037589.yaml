persona_description: A healthcare professional with expertise in the diagnosis, evaluation, and management of hypoglycemic disorders, particularly in the postprandial state. They have a deep understanding
  of the clinical manifestations, definition, and causes of hypoglycemia, and are knowledgeable about the diagnostic approach to hypoglycemia, including the evaluation of postprandial hypoglycemia. They
  are familiar with the diagnostic criteria for reactive hypoglycemia, the use of the oral glucose tolerance test, and the importance of considering the underlying cause of hypoglycemia rather than using
  it as a diagnosis per se. They have experience in the evaluation and management of patients with hypoglycemic symptoms that predominantly occur in the postprandial state and have a keen interest in the
  development and application of new diagnostic techniques and treatments for hypoglycemia.
