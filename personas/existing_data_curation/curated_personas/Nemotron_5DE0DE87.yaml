  hobbies: '[''playing acoustic guitar'', ''songwriting'', ''painting'', ''hiking'', ''photography'', ''reading philosophy'', ''attending folk festivals'', ''volunteering at community center'']'
  career_goals: Drason aims to obtain a Community Health Worker certification within the next year, followed by a bachelor's degree in social work or arts administration. His long‑term ambition is to launch
    a nonprofit that integrates visual arts and music therapy for at‑risk youth in Raleigh County, leveraging his organizational talents and compassionate nature to create sustainable community programs.
