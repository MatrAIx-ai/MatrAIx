personas:
  professional: Rita Megill, a high‑school visual‑arts prodigy and budding freelance illustrator, leverages her sketching, Photoshop, and rudimentary web‑design skills to run the school’s Art Club exhibitions
    while strategically networking for a future role as a creative director at a socially‑conscious agency.
  sports: Rita Megill supports the Atlanta Hawks, Atlanta Falcons, and Atlanta United FC, squeezes in pick‑up basketball games at Piedmont Park, participates in the Roswell Youth Soccer League, and complements
    these activities with regular yoga at Yoga Tree to balance competitive drive with mental clarity.
  arts: Rita Megill immerses themselves in the Atlanta Contemporary Art Center, draws inspiration from artists like Kara Walker and Ai Weiwei, indulges in graphic novels such as ‘Saga’, and curates playlists
    featuring Sufjan Stevens, Mitski, and Fleet Foxes while playing the ukulele in quiet moments of solo composition.
  travel: Rita Megill’s travel style blends careful budgeting with creative curiosity, leading them to day‑trip historic Savannah and Asheville, savor urban art tours in New York City, and dream of future
    pilgrimages to Berlin’s street‑art districts, Tokyo’s manga cafés, and Reykjavik’s northern‑light hikes.
  culinary: Rita Megill experiments at home by fusing Southern staples like shrimp and grits with miso glaze, infusing fried chicken with gochujang, seasoning peach cobbler with cardamom, and routinely
    stocks their pantry with heirloom tomatoes, okra, and harissa to fuel these cross‑cultural culinary creations.
  core: Rita Megill is a fiercely curious teen who channels relentless worry into sketch‑filled journals, schedules meditative pauses between art commissions, and can’t resist a midnight snack of kimchi‑topped
    pimento cheese.
background:
  cultural: Rita grew up in Roswell, Georgia, a suburban community that blends Southern tradition with the cultural dynamism of the nearby Atlanta metropolitan area. Her family, rooted in the American South,
    celebrates holidays like Thanksgiving and Christmas with classic gatherings and dishes, while also partaking in community events such as local art fairs and farmers' markets. The Southern emphasis on
    hospitality and close‑knit neighborhoods shaped her social outlook, encouraging both community involvement and a respect for personal space. Although she identifies as white, Rita has been exposed to
    a growing multicultural environment through school clubs, regional museums, and the diverse music scene in the region. This exposure fosters an appreciation for varied perspectives, aligning with her
    curiosity and openness to unconventional ideas.
