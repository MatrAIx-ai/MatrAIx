  hobbies: '["Sketching", "Visiting art museums", "Photography excursions", "Reading speculative fiction", "Yoga", "Podcast listening", "Community gardening", "Playing the ukulele", "Cooking experimental
    recipes"]'
  career_goals: Rita aspires to enroll in a reputable art and design program after high school, building a portfolio that merges traditional drawing with digital media. She dreams of becoming a freelance
    illustrator or a creative director at a socially conscious agency, where she can shape visual narratives that raise awareness about mental‑health issues—an area that resonates with her own experiences
    of stress and worry. While creative autonomy is central to her ambition, she also seeks a stable income that would alleviate financial anxieties. In the longer term, Rita hopes to mentor other young
    artists from under‑represented backgrounds, fostering a community that values curiosity and unconventional thinking.
