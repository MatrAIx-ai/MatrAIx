  career_goals: Jose imagines a future where he can combine his love for art, design, and technology. He dreams of becoming an architect or industrial designer who creates innovative, visually striking
    structures, inspired by both the colorful patterns of his Mexican heritage and the sleek forms he sketches. He is also intrigued by the idea of developing video games or interactive stories that let
    him bring his vivid imaginations to life. While he enjoys exploring these possibilities, he remains focused on building a strong foundation in math, science, and visual arts, hoping that his creativity
    and organized approach will open doors to careers in architecture, graphic design, or game development.
