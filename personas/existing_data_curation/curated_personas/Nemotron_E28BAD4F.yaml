personas:
  professional: Jose Duran is a budding digital comic artist who combines hand‑drawn sketches with Scratch animations, meticulously plans each page, and dreams of publishing a graphic novel by high school.
  sports: Jose Duran is a quiet fan of the Atlanta Braves, enjoys watching weekend games with family, participates in a local youth soccer club’s practice drills, and prefers solitary bike rides through
    Marietta’s parks to stay active.
  arts: Jose Duran is a budding comic creator who draws inspiration from the vivid murals of Diego Rivera, the storytelling magic of Studio Ghibli, and the lively tunes of Mariachi Vargas de Tecalitlán,
    while collecting graphic novels by Jim Lee and Alex Ross.
  travel: Jose Duran is an imaginative traveler who loves family road trips to the Georgia Aquarium and Disney World, dreams of exploring the historic streets of Mexico City and the neon lights of Tokyo,
    and marks each destination on a hand‑drawn world map.
  culinary: Jose Duran is a curious home chef who helps prepare tacos al pastor with chipotle‑marinated pork, rolls homemade tamales with masa and corn husks, and enjoys experimenting with guacamole seasoned
    with lime and cilantro, while also mastering mac‑and‑cheese.
  core: Jose Duran is a quiet, methodical dreamer who channels imagination into comics, saves pennies for art supplies, and balances cultural traditions with modern tech, all while occasionally neglecting
    bedtime routines for creative bursts.
background:
  cultural: Jose grows up in a Mexican-American household in Marietta, Georgia. Spanish is spoken at home, and his family maintains traditions such as cooking tacos and tamales together, celebrating Día
    de los Muertos with altars and papel picado, and listening to mariachi and regional Mexican music. These cultural practices nurture his love for vibrant colors, patterns, and storytelling, which often
    appear in his artwork. His parents encourage bilingualism, helping him read books in both English and Spanish, and support his participation in community programs at the local Hispanic cultural center.
    While he navigates the broader American school environment, his Mexican heritage provides a strong sense of identity and community that influences his values, creativity, and appreciation for both his
    family's roots and his hometown.
