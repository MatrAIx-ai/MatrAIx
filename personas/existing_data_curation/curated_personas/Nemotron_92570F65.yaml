personas:
  professional: Matthew Johnson is a master carpenter and project lead who blends advanced woodworking, CAD design, and a disciplined work ethic with their vivid imagination and competitive nature to craft
    high‑end, sustainable furniture that exceeds client expectations.
  sports: Matthew Johnson fuels his fitness through weekend hikes along Lake Michigan, membership in the Lake County Trail Riders club, and occasional pickup basketball games with the Chicago Bulls fan
    group, while cheering for the Chicago Bears, Chicago Cubs, and Chicago White Sox during the NFL, MLB, and NBA seasons.
  arts: Matthew Johnson captures the play of light in his photography inspired by Ansel Adams, strums acoustic chords echoing Bob Dylan and Gillian Welch at local jam sessions, and occasionally paints plein‑air
    scenes reminiscent of Vincent van Gogh, all of which deepen his artistic identity beyond his woodworking craft.
  travel: Matthew Johnson prefers meticulously planned trips that balance adventure with relaxation, having hiked the rugged coastline of Iceland, explored historic Mackinac Island, and trekked the Great
    Smoky Mountains, while dreaming of a future sailing excursion to the Norwegian fjords when his boutique studio stabilizes financially.
  culinary: Matthew Johnson enjoys cooking hearty Midwestern fare such as smoked trout with dill, pan‑seared pork chops with apple compote, and homemade sourdough bread, favoring fresh herbs like rosemary
    and thyme, yet often splurges on craft beer and artisan cheese boards during post‑project celebrations.
  core: Matthew Johnson merges disciplined craftsmanship with a restless imagination, habitually humming indie folk tunes while sketching new designs, and obsessively tracking finances in a spreadsheet,
    even if occasional tool splurges betray their frugal side.
background:
  cultural: Matthew was raised in the suburban Midwest of Lake Bluff, Illinois, a community steeped in a blend of German, Polish, and Scandinavian immigrant heritage. The region’s strong blue‑collar tradition
    and Midwestern work ethic shaped his respect for craftsmanship and reliability. Family gatherings often featured traditional holiday foods and local festivals that celebrated community cohesion, reinforcing
    values of independence, modesty, and hospitality. Growing up near Lake Michigan nurtured his appreciation for natural materials and the outdoors, which later influenced his sustainable woodworking practices.
    While his cultural roots are grounded in Midwestern pragmatism, Matthew’s exposure to regional art scenes and diverse college peers broadened his perspective, fostering an open‑minded, yet critically
    thoughtful outlook.
attributes:
  skills: '["Advanced joinery", "Custom furniture design", "Blueprint interpretation", "Project planning and budgeting", "AutoCAD", "SketchUp", "Sustainable building practices", "Team leadership", "Client
