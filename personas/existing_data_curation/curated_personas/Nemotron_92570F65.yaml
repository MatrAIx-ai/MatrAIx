  hobbies: '["Sketching and painting", "Photography", "Acoustic guitar playing", "Attending live music jam sessions", "Hiking Lake Michigan shoreline and local parks", "Participating in maker fairs", "Volunteer
    carpentry for Habitat for Humanity", "Strategy board games", "DIY home‑renovation projects", "Model building"]'
  career_goals: In the next five years, Matthew aims to launch his own boutique woodworking studio that specializes in high‑end, environmentally‑responsible custom pieces for residential and commercial
    clients. He intends to obtain his general contractor’s license and expand his services to include interior architectural woodworking, collaborating with designers and architects on innovative projects.
    He also aspires to earn recognition through regional design competitions and eventually teach a master‑carpentry course at a local technical college, sharing his blend of artistic vision and disciplined
    craftsmanship.
