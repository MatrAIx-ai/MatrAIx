personas:
  professional: Hoan Phan, a retired senior engineer with a graduate degree in electrical engineering, channels five decades of circuit design and renewable energy expertise into community mentorship programs,
    guiding youths and senior students through low‑cost solar installation workshops while juggling a relaxed, sometimes disorganized, approach to project timelines; they blend curiosity with practicality
    in every technical discussion.
  sports: Hoan Phan stays active through weekly tai chi sessions at the park, leisurely walks with the senior walking club Island Steps, and enthusiastic support for the University of Hawaii Rainbow Warriors
    football team and the Seattle Mariners baseball club, embodying a low‑impact yet socially engaging fitness routine; they relish the camaraderie of group exercise and the occasional spirited game‑day
    cheers.
  arts: Hoan Phan shares traditional dance steps at local cultural festivals, enjoys listening to slack‑key guitarist Keola Beamer, folk singer Trịnh Công Sơn, and classic island crooner Don Ho, and records
    oral histories using a digital storytelling app, weaving together music, movement, and technology in their creative expression; they find great joy in preserving community stories through both performance
    and digital media.
  travel: Hoan Phan prefers relaxed travel itineraries, often revisiting Maui’s Hana Highway and the historic town of Lahaina, while dreaming of exploring Japan’s Kyushu region, the rice terraces of the
    Philippines, and the lantern‑lit streets of Hoi An, balancing a love of familiar island scenery with occasional wanderlust for far‑off cultures; they plan trips with a flexible schedule that leaves
    room for spontaneous discovery.
  culinary: Hoan Phan delights in preparing traditional dishes such as phở, gỏi cuốn, and kalua pork for family gatherings, using fresh lemongrass, cilantro, and taro leaves harvested from their garden,
    and often pairs meals with locally sourced poke bowls, showcasing a home‑cooking skill set that blends aromatic Asian flavors with island comfort foods; they relish the communal aspect of cooking and
    the stories that each spice evokes.
  core: Hoan Phan is an energetic, community‑focused octogenarian who blends engineering rigor with garden‑fresh cooking, occasional financial splurges, a laid‑back approach to plans, and a persistent worry
    that fuels both meticulous mentorship and a habit of forgetting medication.
background:
  cultural: Hoan was born in Vietnam in the late 1930s and moved to the United States as a young adult, eventually settling in Maui, Hawaii, where a vibrant Southeast Asian diaspora provided a familiar
    yet new cultural home. His Vietnamese roots are expressed through language, food, and annual celebrations of Tet, while his Hawaiian environment has introduced him to the Aloha spirit, island ecology,
    and local traditions such as hula and aloha ʻāina. He navigates a bicultural identity, often acting as a bridge between the island’s multicultural community and the Vietnamese elder population, fostering
    mutual respect and shared experiences across generations.
attributes:
  skills: '[''Electrical engineering'', ''Renewable energy system design'', ''Circuit design'', ''Project management'', ''Budget planning'', ''Cross‑disciplinary collaboration'', ''Technical writing'',
    ''Programming (Python, early FORTRAN)'', ''Community outreach'', ''Public speaking'', ''Cultural event coordination'']'
  hobbies: '[''Vegetable and herb gardening'', ''Vietnamese cooking'', ''Hawaiian cultural festivals'', ''Mahjong'', ''Woodworking workshops'', ''Tai Chi'', ''Digital storytelling'', ''Community volunteering'',
    ''Reading historical memoirs'']'
  career_goals: Although officially retired, Hoan aims to leave a lasting legacy by documenting his experiences as a Vietnamese immigrant engineer in Hawaii and by establishing a mentorship program for
    senior students interested in STEM. He hopes to co‑author a series of practical guides on low‑cost solar installations for rural households, and to volunteer with local disaster‑preparedness teams,
    using his expertise to improve community resilience. His long‑term ambition is to see a new generation of island‑based engineers who blend modern technology with the cultural wisdom of both Vietnamese
    and Hawaiian traditions.
