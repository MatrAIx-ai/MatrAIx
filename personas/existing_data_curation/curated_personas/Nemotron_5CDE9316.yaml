  hobbies: '[''reading historical biographies'', ''gardening'', ''cooking traditional Dominican dishes'', ''crocheting'', ''quilting'', ''genealogy research'', ''walking'', ''small‑group cultural storytelling'']'
  career_goals: Although retired, Raquel is driven to leave a lasting intellectual and cultural legacy. She aims to compile a comprehensive oral‑history archive of Dominican elders in Durham, publish a
    memoir‑styled cookbook that blends family recipes with stories, and mentor a small group of Dominican‑American youth in research and writing. She also seeks to secure financial stability for her husband,
    maintain her health through disciplined routines, and serve as a cultural liaison for local schools, ensuring Dominican heritage is accurately represented.
