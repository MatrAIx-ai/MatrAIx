personas:
  professional: Howard Tillery, a 27‑year‑old humanities graduate turned digital storyteller, leverages their research prowess and fluency with WordPress, Adobe Photoshop, and video editing software to
    craft culturally resonant blogs, short documentaries, and community workshops, balancing a structured workflow with a relaxed attitude toward deadlines while they aim for a nonprofit program coordinator
    role that empowers youth heritage initiatives.
  sports: Howard Tillery, a solitary 27‑year‑old, maintains a weekly habit of early morning runs through Branch Brook Park, joins a downtown pick‑up basketball league called East Side Hoops on weekends,
    and follows the New York Knicks and New York Giants from the comfort of their apartment, rarely attending larger stadium events.
  arts: Howard Tillery, a 27‑year‑old literary aficionado and visual chronicler, devotes evenings to dissecting the works of Virginia Woolf and James Baldwin, crafting poetry that echoes the improvisational
    spirit of Miles Davis and the lyrical flow of Kendrick Lamar, and curating urban photography series that capture Newark’s textured streets, while they attend spoken‑word showcases featuring poets like
    Sarah Kay.
  travel: Howard Tillery, a budget‑conscious 27‑year‑old, favors solo cultural excursions that blend literary pilgrimages to Boston and Dublin with impromptu jazz nights in New Orleans, and they dream of
    exploring the historic districts of Edinburgh and the vibrant markets of Marrakech, all while they meticulously plan finances but remain open to last‑minute detours.
  culinary: Howard Tillery, a 27‑year‑old culinary experimenter, whips up soul‑food‑inspired meals such as smoked collard greens, spiced chicken thighs, and caramelized sweet‑potato hash while listening
    to Miles Davis and Kendrick Lamar, meticulously seasoning with smoked paprika, fresh thyme, and a dash of hot sauce to perfect the balance of heat and depth, and they often hum verses of their own poetry
    as the aromas rise.
  core: Howard Tillery, a solitary 27‑year‑old who balances a structured work ethic with relaxed, sometimes disorganized habits, channels their love of classic literature, urban photography, and jazz‑infused
    cooking into community storytelling, and they habitually mutter poetry while soaking in coffee.
background:
  cultural: Howard is an African‑American raised in Newark, New Jersey, whose family roots trace back to the Great Migration. He grew up immersed in the city’s vibrant Black community, regularly attending
    church services, celebrating Juneteenth, and participating in neighborhood block parties that feature soul food, gospel music, and storytelling traditions. These cultural experiences have shaped his
    appreciation for resilience, collective memory, and the rich artistic heritage of the African diaspora in urban America.
