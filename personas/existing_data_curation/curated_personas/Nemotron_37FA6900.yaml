  career_goals: Howard aims to secure a role that merges his passion for cultural storytelling and community empowerment, such as a program coordinator for a nonprofit focused on youth and African‑American
    heritage. Parallel to this, he aspires to build a freelance writing portfolio that highlights Black history, urban culture, and social justice topics. Over the next five years, he plans to pursue a
    master’s degree in public administration or cultural management to deepen his impact and eventually lead a community arts initiative in Newark.
