  career_goals: Ryan aims to transition from a hands‑on maintenance role to a senior facilities management position within the next five years, overseeing multiple properties across Pasco County. He is
    pursuing certifications such as the Certified Maintenance & Reliability Professional (CMRP) and EPA HVAC certification to broaden his technical credentials. Simultaneously, he is laying the groundwork
    to launch his own boutique maintenance contracting firm, focusing on energy‑efficient retrofits and rapid‑response repair services for small businesses and residential complexes. His ambition includes
    mentoring apprentices, establishing a reputation for cost‑effective solutions, and eventually expanding his business to serve the broader Tampa Bay area.
