  hobbies: '[''Visiting local art galleries and murals'', ''Reading contemporary fiction and poetry'', ''Birdwatching'', ''Backyard gardening'', ''Knitting'', ''Small‑group book club participation'', ''Volunteering
    at the senior community center (art‑craft facilitation)'']'
  career_goals: Although officially retired, Anissa aims to complete the remainder of her associate degree in Art History, focusing on modern and outsider art movements. She aspires to curate a quarterly
    pop‑up art exhibition that showcases works by local seniors and emerging artists. Additionally, she wants to mentor a small group of high‑school students interested in visual arts, offering occasional
    workshops at the community center. A personal ambition is to compile her family’s multigenerational stories into a memoir that blends narrative prose with her own artwork, preserving both heritage and
    creative expression.
