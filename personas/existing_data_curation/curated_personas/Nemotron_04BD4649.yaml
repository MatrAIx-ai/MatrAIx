  hobbies: '[''Woodworking'', ''Gardening'', ''Fishing'', ''Reading (history & mechanics)'', ''Bluegrass Music Jam Sessions'', ''Volunteer Work at Church Garden'', ''Model Train Building'']'
  career_goals: Michael aims to formalize his practical abilities by obtaining a certification in home maintenance through the local community college, which would enable him to launch a part-time handyman
    business serving neighbors in Monticello. He also hopes to complete his high-school equivalency (GED) and eventually mentor other adults seeking to develop trade skills. Ultimately, he wants to achieve
    greater financial independence while contributing to his community in a flexible, self-employed role.
