personas:
  professional: Michael Brett, a 41‑year‑old aspiring handyman, blends a toolbox of carpentry, plumbing, and small‑engine expertise with a methodical yet adaptable work style, leveraging their curiosity
    for new repair techniques while maintaining a dependable reputation in Monticello as they pursue a home‑maintenance certification and launch a part‑time freelance business.
  sports: Michael Brett enjoys seasonal outdoor pursuits—spring fishing at nearby streams, summer gardening workouts, fall hunting trips with a local club, and winter jogging around town—while they root
    for the St. Louis Cardinals in baseball and cheer on the Iowa State Cyclones football team, balancing a relaxed fitness routine with community sports enthusiasm.
  arts: Michael Brett, a bluegrass aficionado, joins a weekly jam session playing mandolin to the classic sounds of Bill Monroe and Alison Krauss, attends local history lectures featuring authors like David
    McCullough, and curates a modest collection of folk vinyl records, which they credit for inspiring both their musical and woodworking creativity.
  travel: Michael Brett prefers low‑key road trips that blend historical exploration and nature, meticulously planning off‑season visits to Gettysburg, Pennsylvania, and Shenandoah National Park, yet they
    often postpone longer vacations due to the demands of growing their handyman side‑business and community commitments.
  culinary: Michael Brett enjoys preparing hearty, home‑cooked meals such as smoked catfish seasoned with smoked paprika and brown sugar, slow‑cooked pork shoulder glazed with apple cider, and garden‑fresh
    heirloom tomato salad tossed with basil and olive oil, showcasing modest culinary skills while they occasionally treat themselves to a craft beer from a nearby microbrewery.
  core: Michael Brett balances quiet curiosity with hands‑on practicality, turning solitary crafts and community service into a steady path toward self‑employment, all while habitually hoarding every new
    tool they can acquire.
background:
  cultural: Michael grew up in a rural Appalachian-influenced community in Pulaski County, Kentucky. He was raised in a Baptist family that emphasized self-reliance, community service, and respect for tradition.
    The region's folk music, storytelling, and connection to the land have shaped his values and worldview. While identifying as white American, his cultural identity is deeply rooted in Southern rural
    traditions, including an appreciation for home-cooked Southern cuisine, hunting and fishing heritage, and the close-knit community spirit of small-town Kentucky.
attributes:
  skills: '[''Carpentry'', ''Basic Electrical Work'', ''Plumbing Repairs'', ''Small Engine Maintenance'', ''Hand & Power Tool Operation'', ''Computer Literacy'', ''Online Research'', ''Sustainable Gardening'',
