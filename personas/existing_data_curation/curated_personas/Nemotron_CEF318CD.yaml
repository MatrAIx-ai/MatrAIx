  career_goals: Lale imagines a future where she can blend her love for art and technology, aiming to become a multimedia illustrator or a game designer who creates visually rich stories. She hopes to attend
    a high school with a strong arts program, followed by a college where she can study graphic design and interactive media. In the long term, she envisions working on projects that bring communities together—perhaps
    designing visual campaigns for local festivals or developing educational games that encourage creativity in kids. She also dreams of traveling to art museums worldwide to draw inspiration from diverse
    cultures.
