personas:
  professional: Escolastica Cabrera is a budding environmental advocate who blends bilingual communication, Google Workspace savvy, and a love for sketching into a nascent role as a peer tutor and volunteer
    reading mentor, channeling her curiosity into Scratch coding projects that model simple ecosystem simulations for younger library patrons.
  sports: Escolastica Cabrera enjoys weekend hikes at local nature preserves and is a member of her middle‑school's low‑impact track club, favoring solo runs over team sports, and she regularly follows
    the Orlando City SC soccer team while cheering quietly from home.
  arts: Escolastica Cabrera finds solace sketching urban street scenes in a well‑worn Moleskine, listening to acoustic folk artists like Sufjan Stevens and Iron & Wine, and she frequents the community’s
    open‑mic evenings to share her own digital illustrations, drawing creative inspiration from the layered melodies of indie folk.
  travel: Escolastica Cabrera daydreams of backpacking through the rainforests of Costa Rica after finishing high school, but currently fills her wanderlust with weekend trips to the nearby Orlando wetlands,
    family visits to the historic streets of Charleston, and occasional virtual tours of European botanical gardens.
  culinary: Escolastica Cabrera spends Saturday afternoons perfecting the crispy corn masa crust of arepas and meticulously layering the sweet‑savory filling of hallacas, often adding fresh cilantro, shredded
    cheese, and a pinch of cumin, while experimenting with herb‑infused teas that she blends herself.
  core: Escolastica Cabrera is a quiet, detail‑obsessed teen who balances a love for sketching cityscapes with a growing passion for sustainable tech, hoarding pressed leaves in a secret drawer and compulsively
    reorganizing her study notes before every nightfall.
background:
  cultural: 'Escolastica was raised in a Venezuelan household that preserves many traditions: Spanish is spoken at home, family gatherings revolve around shared meals such as arepas and hallacas, and celebrations
    often include salsa and joropo music. Her parents instilled a sense of community and resilience drawn from the experiences of the Venezuelan diaspora in Orlando. She balances these cultural roots with
    the multicultural environment of Florida, participating in local Hispanic festivals while also integrating into broader American teen culture.'
attributes:
  skills: '[''Bilingual Spanish–English communication'', ''Basic computer literacy (Google Workspace, internet research)'', ''Introductory programming (Scratch)'', ''Creative writing and journaling'', ''Sketching
    and digital illustration'', ''Organizational skills (note‑taking, study planning)'', ''Empathetic peer support and conflict mediation'']'
  hobbies: '[''Reading young adult literature'', ''Sketching nature and urban scenes'', ''Basic plant care and indoor gardening'', ''Introductory coding with Scratch'', ''Volunteer tutoring at the public
    library'', ''Listening to acoustic/folk music'', ''Cooking Venezuelan family recipes'']'
  career_goals: Escolastica hopes to enroll in a high‑school program that offers advanced science and technology courses, eventually pursuing a degree in environmental science or sustainable design. She
    dreams of working on community projects that improve urban green spaces in Orlando and becoming a bilingual advocate for immigrant youth through outreach or education. She aims to balance a career focused
    on social and environmental impact with personal creative pursuits.
