  career_goals: Although retired, Austin aims to channel his experience into mentorship and cultural preservation. He plans to complete the remaining credits toward a bachelor's degree in history or the
    arts, fulfilling a long‑held academic goal. He aspires to become a board member of the Inver Grove Heights Historical Society, where he can guide exhibitions and educational programs. Austin also hopes
    to publish a memoir that intertwines personal anecdotes with the broader story of mid‑century Minnesota, and to launch a weekly senior‑focused art‑discussion circle that encourages creative expression
    and intergenerational dialogue.
