persona_description: A member of the Nature Locator team at the University of Bristol who is passionate about combating the spread of invasive, non-native plant species in the UK. They are dedicated to
  using their expertise and resources to build a comprehensive map of the UK's invasive, non-native plant species. They are interested in the financial cost and potential health risks posed by these plants,
  and are motivated to find solutions to these problems. They are also interested in the potential impact of these plants on the ecology of vulnerable habitats and the wider economy.
