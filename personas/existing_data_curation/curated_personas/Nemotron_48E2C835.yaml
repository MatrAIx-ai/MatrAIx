  hobbies: '[''Reading classic Spanish literature'', ''Philosophical essay analysis'', ''Mindfulness meditation'', ''Yoga'', ''Sketching urban landscapes'', ''Traditional Spanish cooking'', ''Jigsaw puzzles'',
