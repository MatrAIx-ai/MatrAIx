  career_goals: Lisandra aims to advance from floor surveillance officer to Lead Surveillance Analyst within the next three years, obtaining the Certified Protection Professional (CPP) certification and
    a Master’s degree in Security Management. She aspires to design and implement data‑driven monitoring protocols that blend emerging AI‑assisted video analytics with proven procedural safeguards. Long‑term,
    she envisions a supervisory role overseeing a multi‑site security team, where she can mentor new officers, cultivate a supportive workplace culture, and contribute to industry best‑practice standards.
