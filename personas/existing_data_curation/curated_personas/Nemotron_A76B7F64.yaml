  hobbies: '[''Cooking Puerto Rican cuisine'', ''Crocheting'', ''Listening to salsa and bomba music'', ''Walking in local parks'', ''Reading romance novels'', ''Gardening (herb garden)'', ''Attending church
    and community events'', ''Volunteering at local senior center'', ''Dancing (salsa)'', ''Journaling for stress management'']'
  career_goals: Aylin aims to move into a supervisory role within the housekeeping industry, such as lead housekeeper or floor manager at a hotel or senior‑living facility, where she can mentor newer staff
    and shape service standards. She also aspires to obtain a certification in hospitality or facilities management to broaden her credentials. In the long term, she dreams of launching her own small cleaning
    business that offers reliable, family‑friendly services to the Reading community. These goals reflect her desire for greater financial stability, a more predictable schedule to reduce stress, and an
    opportunity to apply her organizational strengths in a leadership capacity.
