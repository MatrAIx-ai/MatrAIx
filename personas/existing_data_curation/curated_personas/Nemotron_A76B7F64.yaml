personas:
  professional: Aylin Moreno, an experienced housekeeping professional known for meticulous deep‑cleaning, eco‑friendly supply management, and bilingual client communication, leverages her preference for
    structure and practicality to train new staff while balancing a compassionate, cooperative leadership style that eases workplace tension.
  sports: Aylin Moreno, an avid park‑walker and member of the Reading City Running Club, supports the Reading FC soccer team and the Philadelphia Eagles, occasionally plays casual pickleball on weekend
    mornings, and incorporates a structured weekly routine of 30‑minute brisk walks and stretching to maintain fitness without overexertion.
  arts: Aylin Moreno, a devoted fan of classic salsa icons such as Celia Cruz and Marc Anthony, regularly attends Latin dance nights where she grooves to bomba rhythms, while also finding solace in romance
    novels by Nicholas Sparks and crocheting vibrant blankets inspired by the colorful patterns of Frida Kahlo’s paintings.
  travel: Aylin Moreno, who balances a meticulously planned budget with a love for spontaneous getaways, frequently explores nearby historic towns such as Bethlehem, Pennsylvania, enjoys weekend road trips
    to the Poconos for hiking, and dreams of a future vacation to the Caribbean island of Puerto Rico to reconnect with her culinary roots while sampling fresh local produce.
  culinary: Aylin Moreno, an adept home chef, skillfully prepares arroz con gandules with sofrito, tender pasteles wrapped in banana leaves, and crispy tostones seasoned with sea salt and lime, while cultivating
    a balcony herb garden of cilantro, oregano, and thyme that she weaves into daily meals, and occasionally treats herself to a fine‑dining paella outing.
  core: Aylin Moreno, a structure‑loving housekeeping supervisor‑in‑training who calms her chronic worry with crocheting colorful scarves, yet can’t resist late‑night romance novels and the occasional extra
    slice of tostones, embodies a blend of meticulous organization and heartfelt creativity.
background:
  cultural: Aylin is a first‑generation Puerto Rican American who grew up in a bilingual household, speaking Spanish at home and English in school. Her family traditions include celebrating Three Kings
    Day, enjoying lively music and dance, and preparing family‑style meals that emphasize communal sharing. Catholic faith and close‑knit family ties shape her values of harmony, cooperation, and service
    to others. Since relocating to Reading, PA, she has blended her Caribbean roots with local culture by joining a Puerto Rican cultural association, attending Latin dance classes, and participating in
    community festivals. This multicultural experience informs her warm hospitality, respect for diverse customs, and dedication to creating comfortable, welcoming environments for everyone she serves.
attributes:
  skills: '[''Housekeeping'', ''Deep Cleaning'', ''Time Management'', ''Inventory Management'', ''Customer Service'', ''Bilingual Communication (Spanish/English)'', ''Safety Compliance'', ''Eco-friendly
