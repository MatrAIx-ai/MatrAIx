persona_description: A researcher or scientist who is interested in the study of livestock reproduction and fertility, particularly in the context of beef cows. They are likely to be familiar with the effects
  of grazing on cattle and the factors that can affect fertility, such as low fertility rates in beef cows on lush forage and low uterine pH. They may also be interested in comparing the fertility of beef
  cows on native range before and during the early breeding season with those on wheat pasture.
