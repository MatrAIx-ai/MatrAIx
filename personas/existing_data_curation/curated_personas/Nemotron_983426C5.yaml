  hobbies: '[''Intramural Basketball'',''Volunteer at Community Health Fairs'',''Competitive Online Gaming'',''Running (5K training)'',''DIY Home Improvement Projects'',''Reading Health‑Tech News'',''Attending
    Healthcare Professional Meet‑ups'']'
  career_goals: Joseph aims to advance from his junior management role to a senior operations manager or director of a regional health system within the next five years. He plans to complete a bachelor's
    degree in Healthcare Administration and eventually pursue a Master’s in Health Services Management. His long‑term ambition is to lead a multi‑site outpatient network that integrates telehealth and data
    analytics to improve patient outcomes while controlling costs. He also envisions launching a consulting practice that helps small clinics adopt innovative technologies and efficiency protocols.
