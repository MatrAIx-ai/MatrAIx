persona_description: A student who is enrolled in a class on woodworking and is tasked with designing and creating a plywood furniture object. The student is expected to finalize their design by resolving
  issues related to form, dimensions, structure, and joinery. The student will be required to create a 1:2 scale or full scale model of their design, using 1/2″ foam core. The student is encouraged to include
  rounded terminals in their design, as creating "I" shaped mortises and tenons with cleared out corners is an advisable way to deal with this. The student will be working on developing strategies for dealing
  with the rounded terminals associated with cutting on the router.
