    community outreach'', ''Organizing storytelling evenings'', ''Amateur radio (ham) operation'', ''Hiking the Kenai Fjords'', ''Reading science fiction'']'
  career_goals: Eusebio aims to lead a flagship project developing climate‑monitoring satellites tailored for the Arctic environment, leveraging his engineering expertise and cultural insight into sustainable
    design. He aspires to become a senior systems engineer who mentors Alaska Native youth, establishing a scholarship and internship pipeline that bridges traditional knowledge with modern STEM pathways.
    Ultimately, he envisions founding a small engineering consultancy in Homer that offers specialized services for cold‑region aerospace applications while championing community‑driven innovation and environmental
    stewardship.
