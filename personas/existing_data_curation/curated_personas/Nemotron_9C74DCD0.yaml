personas:
  professional: Eusebio Jazzar, a seasoned aerospace engineer specializing in structural analysis, computational fluid dynamics, and propulsion system design for cold‑weather satellites, leverages their
    pragmatic problem‑solving mindset and love of jazz improvisation to lead cross‑cultural teams, mentor youth interested in STEM, and translate complex technical concepts into engaging presentations.
  sports: Eusebio Jazzar spends weekends paddling with the Homer Kayak Club, casting for salmon along Kachemak Bay, trekking the Kenai Fjords, and cheering for the Anchorage Seawolves while also keeping
    an eye on the Seattle Seahawks during the NFL season.
  arts: Eusebio Jazzar, an avid saxophonist inspired by John Coltrane and Miles Davis, regularly performs at local jam sessions, crafts drums and traditional carvings in their spare time, and captures the
    aurora borealis and rugged Alaskan coast through photography reminiscent of Ansel Adams, blending technical precision with artistic expression.
  travel: Eusebio Jazzar favors meticulously planned adventures that mix rugged arctic experiences—such as hiking Denali, kayaking in Svalbard, and chasing the northern lights in Tromsø—with occasional
    cultural trips to Reykjavik and Patagonia, all while balancing the costs of a mid‑career mortgage and family commitments.
  culinary: Eusebio Jazzar, a competent home cook, often grills wild Alaskan salmon with dill and citrus, prepares smoked halibut with wild mushroom sauce, enjoys a side of fresh blackberry jam, and pairs
    the meals with a classic Old Fashioned while listening to a Miles Davis record.
  core: Eusebio Jazzar blends a curious engineering mind with a jazzy, talkative spirit, juggling satellite design, community storytelling, and occasional anxiety‑driven impulse buys while keeping a steady
    rhythm of music, woodworking, and Arctic adventure.
background:
  cultural: Eusebio is a member of the Dena'ina Athabascan community, having grown up in the Homer area where Indigenous traditions emphasize respect for the land, communal responsibility, and oral storytelling.
    His family maintains strong ties to subsistence practices such as fishing, carving, and seasonal gatherings that celebrate seasonal cycles. These cultural values shape his worldview, fostering a deep
    sense of stewardship for the environment and a collaborative spirit that he brings to his engineering work. Eusebio frequently participates in cultural events like potlatch ceremonies, language revitalization
    classes, and drumming circles, where he shares his engineering experiences in a way that honors his ancestors' legacy. This blend of modern technical expertise and Indigenous heritage informs his commitment
    to integrating sustainable design principles and community‑focused solutions into aerospace projects.
