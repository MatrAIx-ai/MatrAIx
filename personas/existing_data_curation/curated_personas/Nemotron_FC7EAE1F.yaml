personas:
  professional: Patrick Hodges is a high‑school FFA member who blends his knack for automotive repair with a love for hands‑on electronics, using their organized yet flexible approach to lead small projects
    and troubleshoot both engines and household gadgets.
  sports: Patrick Hodges follows the Carolina Panthers and the College of Charleston Cougars, attends local high‑school football games, plays pickup flag football on weekends, and maintains fitness through
    hunting trips, occasional weight‑lifting at a community gym, and a membership with the regional archery club.
  arts: Patrick Hodges curates a personal soundtrack of country hits from Luke Bryan and rock anthems by Foo Fighters while building Revell model kits, and they regularly binge‑watch historical documentaries
    on Lowcountry heritage and attend the annual Charleston music festival to soak up live performances.
  travel: Patrick Hodges prefers road‑trip adventures that blend fishing on the Santee River, camping in Francis Marion National Forest, and occasional weekend visits to Savannah, GA, while meticulously
    planning routes on Google Maps but still leaving room for spontaneous hunting excursions.
  culinary: Patrick Hodges favors Southern comfort foods like shrimp and grits, BBQ ribs, and fried catfish, enjoys grilling fresh‑caught fish over a campfire, and while they can whip up a decent chili,
    their late‑night gaming sessions often end with a bag of cheesy nachos and soda.
  core: Patrick Hodges is a pragmatic teen who balances solitary tinkering with loud rock playlists, habitually trades bedroom clutter for neatly labeled toolboxes, yet sometimes forgets to water houseplants
    while dreaming of a future eco‑friendly auto shop.
background:
  cultural: Patrick grew up in Georgetown, South Carolina, a small town in the Lowcountry with a strong agricultural and fishing heritage. His family has deep roots in the region, and he was raised with
    Southern hospitality, close‑knit family ties, and regular participation in community church events. He is familiar with the area's historic Gullah influence and the multicultural fabric of coastal South
    Carolina, which shapes his awareness of local traditions and racial dynamics. The community places high value on self‑reliance, respect for elders, and a blend of conservative values with a growing
    openness to technology, all of which have influenced Patrick's outlook and aspirations.
