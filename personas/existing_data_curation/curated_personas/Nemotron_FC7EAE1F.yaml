  career_goals: Patrick hopes to enroll in a vocational program at a community college to become a certified automotive technician or electrician. In the medium term, he aims to gain hands‑on experience
    through an apprenticeship or by joining the Army's mechanical field, where he can receive structured training and benefits. His long‑term ambition is to open his own small auto‑repair shop in Georgetown
    that combines traditional mechanical work with eco‑friendly practices, allowing him to apply his curiosity for new technologies while serving his local community.
