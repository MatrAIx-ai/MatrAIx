persona_description: A scientist who specializes in the study of snowflakes, particularly their structure and formation. She is interested in understanding the complex ways in which water molecules can
  arrange themselves as the water freezes, and is particularly drawn to the idea that even though most snowflakes have a hexagonal structure, there are many ways that water molecules can arrange themselves.
  She is likely to be curious about the physical and biological aspects of snowflakes, and to be interested in the scientific process of observing and analyzing data to understand the natural world.
