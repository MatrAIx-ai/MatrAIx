  career_goals: Loc aims to advance within the transit system by moving into supervisory roles, such as senior driver trainer or dispatch manager, where he can shape safety protocols and mentor new drivers.
    He is also pursuing certification for hybrid and electric bus operations to stay at the forefront of emerging transportation technology. Over the next five years, he hopes to lead a driver-safety committee
    that reduces incident rates and to be recognized as the region's top performer in on-time service and customer satisfaction. Ultimately, he envisions leveraging his experience to open a small community-focused
    vehicle maintenance workshop that serves both transit fleets and local drivers.
