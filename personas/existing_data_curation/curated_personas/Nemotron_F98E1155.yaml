    in driver safety initiatives'', ''Data logging and compliance reporting'', ''Adaptation to hybrid/electric bus technologies'']'
  hobbies: '[''Fishing'', ''Scale model bus building'', ''Cooking traditional Micronesian cuisine'', ''Reading automotive magazines'', ''Listening to world music podcasts'', ''Volunteering for youth road-safety
