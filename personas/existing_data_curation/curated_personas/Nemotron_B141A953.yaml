    classroom experiments)'']'
  hobbies: '[''Reading adventure books'', ''Playing soccer with a youth league'', ''Drawing and painting'', ''Piano lessons'', ''Girl Scouts badge projects'', ''Hands‑on science kits (volcanoes, magnet
    experiments)'', ''Collecting rocks and insects during nature walks'']'
  career_goals: Irina’s imagination is full of possibilities. She often talks about becoming a veterinarian because she loves caring for neighborhood pets and wants to understand how animals stay healthy.
    At the same time, her curiosity about the stars fuels a dream of one day becoming an astronaut, exploring outer space and conducting experiments. She also admires firefighters and teachers for their
    community impact, so she frequently envisions herself in a role that mixes practical problem‑solving with helping others. Her current ambition is to earn good grades, learn more about science, and keep
    improving her leadership skills so she can turn any of these future careers into reality.
