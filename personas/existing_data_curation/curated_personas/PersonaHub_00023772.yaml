persona_description: A history professor who specializes in the study of African American history, particularly the cultural and social history of African Americans in America. He/she is interested in the
  creation of an African American culture and identity, the role of language and religion in shaping cultural identities, and the spread of racial slavery. The professor is motivated by the desire to compare
  current events with historical information and to motivate students to become interested and active in African American history. He/she has a particular interest in the origins, evolution, and spread
  of racial slavery, and in the creation of a distinct African-American culture and how that culture became part of the broader American culture.
