personas:
  professional: Emily Yarger, a 22-year-old customer service representative, leverages her curiosity-driven approach and methodical organization to troubleshoot client issues via Zendesk and Salesforce,
    turning tense calls into positive outcomes while actively documenting process improvements to pave the way toward a team-lead role.
  sports: Emily Yarger fuels her energetic lifestyle with weekly Zumba and spin sessions at Pulse Fitness, hikes the trails of Croton Point and Rockefeller State Parks each weekend, and cheers on the New
    York Yankees and Westchester Knicks, while she occasionally over-commits to group classes, leading to sore calves.
  arts: Emily Yarger captures the pulse of Manhattan's streets through candid photography inspired by Brandon Stanton, curates playlists that feature Lizzo and H.E.R., and spends quiet evenings dissecting
    personal-development books by Brené Brown, using these artistic lenses to recharge her sociable spirit.
  travel: Emily Yarger plans weekend getaways that blend adventure and relaxation, from spontaneous day trips to the Hudson Valley farms to a meticulously researched spring hike in Sedona, balancing her
    student budget and part-time work schedule while yearning to explore the art districts of Barcelona.
  culinary: Emily Yarger experiments with seasonal dishes like quinoa-stuffed carrots and avocado-lime salads, masterfully seasoning with rosemary and citrus zest, while indulging in brunch favorites such
    as lemon ricotta pancakes at The Briar, and she habitually snacks on granola bars during long shift rotations.
  core: Emily Yarger is a curiosity-driven, organized social butterfly who transforms customer complaints into win-wins, splurges on brunches, battles occasional allergies, and never passes up a chance
    for a weekend hike - though they sometimes forget to hydrate after spin class.
background:
  cultural: Emily grew up in a middle‑class, suburban family in White Plains, New York, with roots tracing back to Irish and German ancestry. The cultural atmosphere of Westchester County—marked by a blend
    of traditional American values, a strong emphasis on education, and exposure to the diverse communities of the greater New York metropolitan area—shaped her worldview. She celebrates typical American
    holidays such as Thanksgiving, Independence Day, and Christmas, while also partaking in regional traditions like autumn apple picking in the Hudson Valley and attending local farmers’ markets. Her family
    places importance on community involvement, which is reflected in her volunteer work and her appreciation for the arts and cultural events offered by nearby New York City.
