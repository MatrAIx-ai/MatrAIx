  career_goals: Emily aims to advance from her current representative role to a team lead position within the next 12‑18 months, where she can mentor newer agents and shape shift‑level performance standards.
    She plans to enroll in a part‑time associate’s program in business administration at a local community college, complemented by certifications such as the Certified Customer Service Professional (CCSP)
    and a Six Sigma White Belt to strengthen her analytical and process‑improvement capabilities. Over the longer term, Emily aspires to transition into a customer experience manager role, overseeing cross‑functional
    initiatives that enhance service quality and drive customer loyalty. Her curiosity about data also motivates her to acquire basic analytics skills, such as using Tableau or Power BI, to contribute insights
    to strategic decision‑making.
