    strategy'', ''Basic video editing (Adobe Premiere Pro)'', ''Organizational systems (calendar management, project tracking)'']'
  hobbies: '[''Sketching and experimental painting'', ''Reading speculative fiction and philosophy'', ''Visiting art galleries and local museums'', ''Photography of urban landscapes'', ''Journaling thematic
    ideas for stories'', ''Participating in community art workshops'', ''Exploring new coffee shops and culinary experiments'', ''Puzzle solving (crosswords, logic puzzles)'', ''Weekend nature walks on
    the Elizabeth River'', ''Attending live music and poetry slams'']'
  career_goals: Alice aims to transform her creative passions into a sustainable freelance career as a visual storyteller. Over the next three years she plans to complete a Bachelor of Fine Arts in illustration
    through a combination of online coursework and local studio classes, while building a portfolio that showcases her ability to merge philosophical ideas with striking visual art. She envisions launching
    a boutique consultancy that partners with regional nonprofits and cultural institutions to develop community-focused visual campaigns and educational workshops. In the longer term, Alice hopes to publish
    an illustrated collection of short stories that explores themes of novelty and abstraction, mentor emerging artists in the Portsmouth area, and eventually assume a leadership role within the city's
    arts council to champion inclusive, innovative programming.
