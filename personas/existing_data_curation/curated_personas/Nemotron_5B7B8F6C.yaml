personas:
  professional: A freelance visual storyteller named Alice Meyers transforms philosophical concepts into vibrant mixed-media illustrations for Virginia nonprofits, they leverage a disciplined project workflow,
    calm resilience under deadline pressure, and a collaborative spirit honed by community workshops.
  sports: A weekend enthusiast for active waterfront pursuits named Alice Meyers rows with the Portsmouth Yacht Club, jogs with the Virginia Beach Running Club, practices yoga at a local studio, and faithfully
    follows the Washington Capitals, the Washington Commanders, and DC United, preferring low‑intensity, community‑oriented fitness activities over high‑intensity gym workouts.
  arts: An engaged participant in the regional arts scene named Alice Meyers frequents gallery openings featuring works by Kehinde Wiley, attends poetry slams where local poet KJ Silva performs, collects
    limited‑edition prints by Banksy, draws creative fuel from the speculative fiction of N. K. Jemisin, and listens to playlists featuring Björk and Sufjan Stevens while sketching.
  travel: A thoughtfully structured traveler named Alice Meyers plans weekend road trips to historic coastal towns like Charleston and Savannah, has explored the art‑rich neighborhoods of Berlin and London
    on a backpacking adventure, and dreams of a tranquil retreat in Kyoto’s tea houses, always budgeting trips around freelance cash flow and occasionally sacrificing a workshop commitment to seize a travel
    opportunity.
  culinary: A culinary explorer named Alice Meyers delights in cooking coastal dishes such as Old Bay‑seasoned crab cakes, miso‑glazed salmon, and shrimp and grits with fresh okra, experiments with herbs
    like dill and shiso, brews specialty Ethiopian Yirgacheffe coffee, and rates themselves as an intermediate home cook who loves to host intimate dinner gatherings.
  core: Alice Meyers is a calm, imaginative visual storyteller who balances community art projects, coffee‑fuelled creative marathons, and a penchant for occasional over‑commitment to workshops, all while
    indulging in coastal cuisine and thoughtfully budgeting her freelance life.
background:
  cultural: Alice grew up in a middle‑class family in the Tidewater region of Virginia, with ancestral roots tracing back to English and German forebears. Her upbringing in suburban Portsmouth combined
    the relaxed, community‑oriented atmosphere of a historic naval town with exposure to a vibrant local arts scene. Family traditions emphasized hospitality, storytelling, and shared meals centered on
    coastal seafood, reflecting the region’s maritime heritage. This blend of Southern hospitality, appreciation for the area’s diverse historical influences, and a strong sense of community informs her
    inclusive worldview and collaborative spirit.
attributes:
  skills: '[''Creative writing (fiction, poetry, essay)'', ''Traditional drawing and painting (watercolor, mixed media)'', ''Digital illustration and graphic design (Adobe Photoshop, Procreate)'', ''Research
