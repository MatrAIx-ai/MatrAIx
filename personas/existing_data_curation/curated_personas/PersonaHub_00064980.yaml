persona_description: Rick Delaney, PhD, is a behavioral psychologist who specializes in understanding the ABCs of behavior in relation to anger outbursts in 5- to- 10-year-old children. He has extensive
  experience in predicting, handling, and changing anger outbursts, as well as the impacts of child maltreatment and warning signs of anger outbursts. Delaney is also knowledgeable about positive and negative
  consequences of behavior, healthy anger, and when to seek professional help. He has a unique understanding of the antecedents and consequences of anger outbursts, and how past experience influences bias.
  Delaney's expertise and knowledge make him an ideal resource for parents and educators seeking to understand and manage anger in children.
