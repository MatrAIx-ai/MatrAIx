persona_description: A missionary who is dedicated to spreading the Gospel Message in remote and isolated areas, particularly in South India and the North-West Frontier. This person is skilled in medical
  missions, having established hospitals and dispensaries in the C.M.S. part of Tinnevelly and the Bhil Mission. They have also been involved in Medical Missions on or near the North-West Frontier, where
  they are skilled in providing medical assistance to the people in need. This person is also highly experienced and successful in their work, having been involved in the establishment of several hospitals
  and dispensaries in the district and being highly respected among their colleagues.
