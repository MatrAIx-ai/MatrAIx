persona_description: A conservation biologist who specializes in the study of freshwater ecosystems, particularly mangrove terrapins and their habitats. They have worked with the Fisheries Administration
  and Wildlife Conservation Society (WCS) to implement a two-pronged strategy to conserve Mangrove Terrapins in the Sre Ambel area of Cambodia. Their expertise includes understanding the threats to Mangrove
  Terrapins, devising effective conservation strategies, and implementing successful conservation projects. They are passionate about the survival of this species and are committed to saving it in the wild.
