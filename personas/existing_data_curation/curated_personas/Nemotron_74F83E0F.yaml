personas:
  professional: Hong Wang, a methodical mechanical engineering sophomore, leverages precise CAD modeling, CNC operation, and finite element analysis to design sustainable hardware, channeling their love
    for structure and solitary focus into meticulous documentation and reliable project delivery.
  sports: Hong Wang enjoys solo hikes in Prospect Park and joins the Brooklyn Basketball League’s Saturday pickup games, cheering for the New York Knicks and the Brooklyn Nets, and they maintain a disciplined
    yet low‑key fitness routine centered on bodyweight circuits and occasional cycling on weekends.
  arts: Hong Wang finds solace in the meditative strokes of traditional calligraphy and the immersive soundscapes of Brian Eno and Aphex Twin, often attending screenings of science‑fiction classics like
    Blade Runner and listening to ambient playlists while drafting engineering designs.
  travel: Hong Wang prefers meticulously planned trips that blend technical curiosity with quiet reflection, having organized a solo study tour of Japan’s high‑speed rail factories and a weekend getaway
    to the Adirondacks, they now aim to travel to Iceland’s geothermal power plants and the Swiss Alps to explore sustainable engineering landmarks while staying within a modest student budget.
  culinary: Hong Wang enjoys cooking comfort dishes such as pork dumplings with chashu broth, Vietnamese pho with star‑anise‑infused stock, and occasional experimental ramen using kombu and miso, showcasing
    a solid home‑cooking skill level while favoring fresh herbs, ginger, and a pinch of dill for a subtle twist.
  core: Hong Wang is a detail‑driven, solitary engineer who balances a disciplined work ethic with a penchant for late‑night model‑kit assembly and occasional over‑reliance on structured routines that can
    make spontaneous social plans feel overwhelming.
background:
  cultural: Hong is a first‑generation East Asian American, raised in a bilingual household where Mandarin (or possibly Vietnamese) and English are spoken. His family emphasizes respect for elders, collective
    responsibility, and a strong work ethic—values that shape his disciplined, compassionate approach. He celebrates Lunar New Year and the Mid‑Autumn Festival with his extended family and participates
    in community events at the local Asian cultural center. Traditional foods such as dim sum, pho, and homemade dumplings are staples at home. While his upbringing stresses academic achievement, Hong also
    internalizes a deep sense of communal harmony, which drives his desire to help others through engineering outreach and mentorship.
attributes:
  skills: '["SolidWorks modeling", "AutoCAD drafting", "CNC machining operation", "Materials selection and testing", "Finite element analysis (FEA) using ANSYS", "MATLAB programming for engineering analysis",
