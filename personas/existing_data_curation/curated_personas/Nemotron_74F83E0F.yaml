  hobbies: '["Model kit building", "3D printing personal projects", "Mechanical puzzle solving", "Documentary watching", "Reading sci‑fi and technical non‑fiction", "Traditional calligraphy", "Cooking family
    recipes", "Listening to ambient music", "Solo hiking in local parks", "One‑on‑one tutoring in math"]'
  career_goals: Hong aims to solidify his engineering career through a structured, step‑by‑step progression. In the next two years he plans to complete a bachelor's degree in mechanical engineering and
    pass the Fundamentals of Engineering (FE) exam, setting the stage for Professional Engineer (PE) licensure. He seeks a full‑time design engineer role at a firm focused on sustainable technologies, where
    he can specialize in renewable‑energy hardware such as wind‑turbine components or energy‑efficient HVAC systems. Long‑term, Hong envisions leading multidisciplinary projects that improve community infrastructure—particularly
    low‑cost water filtration or assistive devices for senior residents in Brooklyn—while mentoring junior engineers. He also hopes to launch a modest side workshop offering custom CNC‑fabricated parts
    for local artisans, balancing stable employment with entrepreneurial creativity.
