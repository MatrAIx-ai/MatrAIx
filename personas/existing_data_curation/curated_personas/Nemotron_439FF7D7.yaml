  career_goals: Although retired, Geraldine aims to deepen her involvement in community service by mentoring younger volunteers, leading a local history documentation project, and establishing a small arts
    workshop at the senior center. She aspires to learn digital photography to capture Appalachian landscapes and to publish a memoir that weaves her family’s Italian heritage with Appalachian traditions.
    Additionally, she hopes to advocate for improved mental‑health resources for seniors in her area.
