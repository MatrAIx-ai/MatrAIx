personas:
  professional: Juan Perez, an 11‑year‑old budding engineer, applies their disciplined love for LEGO construction and Scratch coding to design intricate digital games and mechanical prototypes, always striving
    for precision and meeting self‑set high standards.
  sports: Juan Perez, a member of the Chicago Soccer Academy's Under‑10 team, channels their assertive energy on the field while cheering for the Chicago Fire FC and idolizing midfielder Nicolas Lodeiro,
    committing to after‑school drills and weekend matches.
  arts: Juan Perez nurtures creativity by sketching mechanical inventions while listening to Imagine Dragons and watching Pixar’s Coco, frequently drawing inspiration from YouTube creator Mark Rober and
    the graphic novel Amulet.
  travel: Juan Perez prefers family‑oriented road trips to national parks like the Grand Canyon and theme parks such as Disneyland, but dreams of visiting Tokyo’s Akihabara for anime culture and exploring
    the ruins of Machu Picchu during a future school break, balancing adventure with parental budgeting constraints.
  culinary: Juan Perez enjoys helping prepare pupusas and tamales at home, mastering the perfect cheese‑filled filling, while also experimenting with pepperoni pizza and homemade guacamole, showing a budding
    culinary skill that blends traditional dishes with kid‑friendly favorites.
  core: Juan Perez is an organized, curiosity‑driven 11‑year‑old who seamlessly blends disciplined LEGO engineering with imaginative storytelling, careful budgeting, and a proactive approach to health and
    soccer, all while juggling a love for music, art, and family‑cooked meals.
background:
  cultural: Juan grew up in a Salvadoran-American household in Dorchester, Massachusetts. At home, Spanish is spoken and family traditions such as celebrating Semana Santa, preparing pupusas, and listening
    to cumbia and reggae music are integral parts of daily life. His parents immigrated from El Salvador seeking better opportunities and place a strong emphasis on education, hard work, and community support.
    The diverse environment of Dorchester exposes him to a mosaic of cultures, reinforcing his bicultural identity and shaping his values of family loyalty, perseverance, and a desire to contribute positively
    to both his Salvadoran heritage and his local community.
attributes:
  skills: '["Organizational and time-management skills", "Bilingual communication (Spanish/English)", "Basic programming (Scratch)", "Mathematical problem solving", "Scientific inquiry", "Leadership in
