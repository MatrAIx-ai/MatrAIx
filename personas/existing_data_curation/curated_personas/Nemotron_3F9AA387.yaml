  career_goals: Juan aspires to become an engineer—specifically a robotics or civil engineer—so he can design solutions that improve his community. He aims to attend a top high school, earn a scholarship,
    and eventually study at a university where he can merge his technical interests with his desire to give back, perhaps by creating affordable technology for local community centers or designing safe
    public spaces in Dorchester. His long-term ambition includes mentoring younger students from similar backgrounds to pursue STEM fields.
