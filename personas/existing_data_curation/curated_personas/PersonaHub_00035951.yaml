persona_description: A cartographer who specializes in the study of lunar craters and their features, particularly the features of the Jura Mountains. His work includes the addition of the name "Debes"
  to the International Astronomical Union's lunar crater naming scheme and the development of the System of Lunar Craters. His work has been recognized by the Linda Hall Library and the publishing house
  Baedeker.
