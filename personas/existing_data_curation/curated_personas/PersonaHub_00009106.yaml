persona_description: A researcher and public health expert specializing in meningococcal disease epidemiology, vaccination programs, and the impact of vaccination on meningococcal disease. They have a deep
  understanding of the global distribution and incidence of meningococcal disease, including the factors that influence these rates. They are also knowledgeable about the serogroup distribution, carriage
  prevalence, and the relationship between risk factors for disease and those associated with carriage. They are well-versed in the evaluation and licensing of meningococcal vaccines based on their immune
  response in subjects receiving vaccine using serum bactericidal activity (SBA) as the immunologic correlate of protection, and have experience with postlicensure studies that have validated these correlates
  of protection. They are also knowledgeable about the impact of vaccination programs on meningococcal disease, including the role of prelicensure vaccine efficacy trials, and the potential for nasopharyngeal
  carriage of disease-associated strains to be exceedingly rare in settings of outbreaks or in hyperendemic disease.
