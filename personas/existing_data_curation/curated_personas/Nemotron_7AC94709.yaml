  hobbies: '[''LEGO construction (including robotics kits)'', ''Strategic video gaming (Minecraft, Roblox)'', ''Youth soccer league'', ''Reading adventure and science‑fiction books'', ''Cooking with family
    (following recipes)'', ''Junior explorer program at Everglades Learning Center'']'
  career_goals: As a child who loves constructing things and solving puzzles, Lovely envisions a future where he can design and build functional creations. He often talks about becoming a robotics engineer
    or a mechanical engineer who creates machines that help people. Influenced by his community’s fire stations and the confidence of first responders, he also dreams of being a firefighter, attracted by
    the structured training and clear responsibilities. He aspires to excel academically, aiming to graduate high school with honors and attend a STEM‑focused high school or early college program. Ultimately,
    he wants a career that combines his competitive drive, love of hands‑on projects, and desire to make tangible, predictable contributions to his community.
