persona_description: A historian who specializes in the study of African American social history, specifically focusing on the public and private negotiations over gender relationships inside marriage during
  the early Jim Crow era. Her research interests include the development of black middle class identity, intimate relationships, and gender ideals. She is passionate about shedding light on overlooked aspects
  of African American social history and celebrating National Black Marriage Day, a day dedicated to recognizing long marriages, encouraging couples to renew their vows, and showcasing the economic and
  child-rearing benefits of marriage.
