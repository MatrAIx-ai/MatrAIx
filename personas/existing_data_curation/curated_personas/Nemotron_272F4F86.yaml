personas:
  professional: Chelsey Mustelier, a 38‑year‑old aspiring program coordinator, leverages their meticulous research and curatorial skills to design community art workshops while they infuse the cooperative
    spirit of their church upbringing, ensuring every project runs smoothly yet remains flexible enough to welcome spontaneous creative input.
  sports: Chelsey Mustelier stays active by joining the Hocking Hills Explorers hiking club for weekend treks, practicing gentle yoga at sunrise, and cheering on the Dayton Flyers basketball team and the
    Cincinnati Reds, while they prefer low‑impact exercise over competitive sports, keeping fitness a relaxed, community‑oriented routine.
  arts: Chelsey Mustelier immerses themselves in visual culture by curating small exhibitions featuring works reminiscent of Georgia O'Keeffe, photographing the changing light in Hocking Hills like Ansel
    Adams, and discussing contemporary novels by Sally Rooney in a close‑knit book circle, while they often listen to Sufjan Stevens and enjoy a live jazz set at Dayton's historic Oregon District theater.
  travel: Chelsey Mustelier prefers thoughtfully planned getaways that blend quiet nature hikes in Hocking Hills with cultural immersion, having recently visited Florence, Italy and New Orleans for their
    art scenes, while they dream of a solo photography expedition to Kyoto’s temples and a family‑friendly road trip along the Pacific Coast Highway.
  culinary: Chelsey Mustelier enjoys seasonal cooking at a competent level, often pulling heirloom tomatoes from their garden to make a rustic caprese salad, simmering pumpkin risotto with sage and parmesan,
    and experimenting with fermented kimchi as a side, while they indulge in a nightly cup of pour‑over coffee and a modest glass of Pinot Noir on weekends.
  core: Chelsey Mustelier balances curatorial precision with quiet curiosity, channeling a community‑first ethos into art projects while they manage a modest budget and a late‑night sketching habit that
    often steals sleep.
background:
  cultural: Chelsey grew up in a middle‑class, predominantly white suburb of Dayton, Ohio, where Midwestern values of modesty, community responsibility, and self‑reliance were emphasized. Her family attended
    a mainline Protestant church, which fostered a sense of stewardship and cooperation. The regional culture, with its blend of industrial heritage and vibrant local arts scenes, nurtured her appreciation
    for both practicality and creativity. These influences shape her balanced approach to life—valuing both structure and flexibility, and prioritizing harmony in interpersonal interactions.
attributes:
  skills: '[''Art Historical Research'', ''Curatorial Planning'', ''Creative Writing'', ''Digital Archiving'', ''Graphic Design (Adobe Photoshop)'', ''Web Content Management'', ''Event Coordination'', ''Organizational
    Skills'', ''Conflict Mediation'', ''Volunteer Management'']'
  hobbies: '[''Gallery Visits'', ''Sketching'', ''Reading (Fiction, Philosophy, Art Theory)'', ''Journaling'', ''Photography'', ''Blogging about Visual Culture'', ''Gardening'', ''Seasonal Cooking'', ''Facilitating
    Small Book‑Discussion Groups'']'
  career_goals: Chelsey aims to re‑enter the workforce by securing a part‑time position as a program coordinator or outreach specialist at a local museum or nonprofit arts organization. She plans to complete
    a certificate in museum studies to strengthen her curatorial credentials and eventually lead small‑scale community art education programs that foster creative expression in under‑served neighborhoods.
    Long‑term, she hopes to launch a freelance writing and consulting practice focused on art education, allowing her to blend her research expertise with her passion for making art accessible to a broader
    audience.
