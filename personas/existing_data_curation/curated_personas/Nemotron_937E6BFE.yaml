  career_goals: Shelby aims to secure a full teaching license and pursue a master's degree in curriculum and instruction, with a focus on STEAM education. She wants to become a lead teacher who designs
    innovative, art-infused curricula and mentors newer educators. In the longer term she envisions directing an after-school enrichment program that offers hands-on arts and science experiences, and eventually
    moving into a school-wide leadership role such as assistant principal to shape district-level instructional strategy.
