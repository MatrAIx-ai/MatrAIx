personas:
  professional: Shelby Toothman, an innovative elementary educator who excels at integrating visual arts into STEAM curricula, leverages their calm authority and meticulous planning to design data-driven
    lesson plans while their competitive streak drives them to mentor peers and lead school-wide instructional initiatives.
  sports: Shelby Toothman, an avid weekend volleyball player with the River Valley Volleyball Club, combines their love of group activity with a disciplined fitness routine that includes early‑morning trail
    hikes in the spring, yoga sessions in the summer, and cheering for the Portland Trail Blazers during the NBA season, while they keep a competitive edge by tracking personal performance metrics on Strava.
  arts: Shelby Toothman, an enthusiastic participant in the local arts scene, regularly sketches watercolors inspired by Claude Monet’s impressionist palette, photographs everyday moments à la Annie Leibovitz,
    acts in community theater productions of Lin‑Manuel Miranda’s 'In the Heights,' and discusses contemporary novels in a book club that often references works by Chimamanda Ngozi Adichie, shaping their
    identity through a blend of visual and performing arts.
  travel: Shelby Toothman, a weekend‑trip enthusiast who meticulously plans short getaways using a shared Google Sheet, balances adventurous hikes in the Blue Ridge Mountains with cultural immersion in
    Santa Fe’s art fairs, has already explored Portland’s foodie scene and New Orleans’ jazz festivals, and now dreams of a spring visit to Kyoto to study traditional ink‑wash painting, all while balancing
    a modest travel budget.
  culinary: Shelby Toothman, an experimental home chef, enjoys crafting pan‑seared miso‑glazed salmon with a side of saffron risotto and hand‑torn beet‑infused focaccia, often improvising with seasonal
    ingredients like heirloom tomatoes and fresh basil, while they balance their love for gourmet flavors with budget‑friendly meal prepping for their busy teaching schedule.
  core: Shelby Toothman, a curiosity‑driven, art‑loving educator with a competitive edge, tightly schedules every day, yet habitually procrastates bedtime to finish a watercolor, and can’t resist a spontaneous
    theater ticket even when their budget whispers otherwise.
background:
  cultural: Shelby grew up in the small-town atmosphere of central Illinois, where Midwestern values of modesty, hard work, and neighborly cooperation are commonplace. Her family's roots trace back to German
    and Irish immigrants, and she was raised with traditions such as celebrating Thanksgiving with a community potluck, attending county fairs, and participating in the local church's outreach programs.
    This background fostered a strong sense of community involvement, an appreciation for practical arts, and a pragmatic outlook that sometimes makes her skeptical of newcomers' motives.
