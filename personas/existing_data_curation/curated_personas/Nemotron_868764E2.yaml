personas:
  professional: A budding game developer and LEGO robotics enthusiast, Owen Brantley channels their competitive streak and love for strategic gameplay into coding simple Python projects and building programmable
    LEGO sets, preferring the clear logic of code while still appreciating the flexibility of tinkering and often challenging classmates to improvise new game mechanics.
  sports: An energetic member of the Middletown Middle School basketball team, Owen Brantley thrives on the camaraderie of fast-break drills, idolizes the Los Angeles Lakers for their clutch performances,
    and spends weekend afternoons cycling the local trail network to stay fit, balancing structured team practice with the freedom of solo rides.
  arts: A budding beat-maker and graphic-novel aficionado, Owen Brantley draws inspiration from hip-hop legends like Kendrick Lamar and R&B smoothness of SZA while crafting short loops in FL Studio, and
    regularly flips through titles such as 'Saga' and 'Ms. Marvel' which fuel their storytelling imagination.
  travel: Typically planning spontaneous weekend bike rides through the nearby Great Smoky Mountains National Park, Owen Brantley has taken a school field trip to Washington, D.C.'s National Air and Space
    Museum and dreams of one day backpacking through Tokyo's Akihabara district to soak in the gaming and anime scene.
  culinary: A self-declared snack connoisseur, Owen Brantley loves pepperoni pizza and spicy shrimp tacos, experiments with homemade ramen using instant noodles and miso paste, occasionally burns toast
    while trying to perfect scrambled eggs, and proudly boasts a growing repertoire of quick TikTok-style kitchen hacks.
  core: Fueled by a competitive edge and a restless curiosity, Owen Brantley balances intense video-game battles with tinkering LEGO bots, yet often fumbles sleep schedules and over-thinks every move, making
    them a paradox of hyper-focused ambition and lingering worry.
background:
  cultural: Owen’s cultural background is rooted in African‑American traditions passed down by his family, who migrated from the South to Oregon seeking new opportunities. Growing up in Woodburn, a town
    known for its agricultural heritage and diverse population, he experiences a blend of cultural influences, including strong Hispanic community ties. His family celebrates Juneteenth, participates in
    local church events, and shares stories of resilience that emphasize education, community support, and perseverance. Music from black artists—especially hip‑hop and R&B—plays a central role in his daily
    life, reinforcing his sense of identity while also reflecting the multicultural environment of his hometown.
