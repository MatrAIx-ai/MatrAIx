  career_goals: Owen aims to turn his love for technology and competition into a career as a software developer, with a focus on video‑game design. He plans to earn a scholarship to study computer science
    and engineering, while also pursuing a collegiate basketball opportunity. His short‑term goals include completing a coding bootcamp, winning a school robotics competition, and improving his basketball
    statistics. By setting clear, step‑by‑step milestones, he seeks a predictable path that balances his practical need for tangible progress with his competitive drive. He also hopes to acquire reliable
    technical skills—such as advanced programming and hardware repair—that could provide financial stability for his family.
