  hobbies: '[''Gardening (heirloom tomatoes, chilies, native herbs)'', ''Cooking traditional Mexican dishes'', ''Reading historical non‑fiction'', ''Woodworking and furniture restoration'', ''DIY electronics
    projects'', ''Participating in community cultural festivals'', ''Bird watching and nature walks'', ''Playing bridge with senior groups'']'
  career_goals: Even in retirement Rafael remains driven by a desire to leave a lasting impact. He plans to volunteer as a mentor at the local high school’s STEM club, sharing his practical knowledge and
    encouraging curiosity among students. He hopes to develop a small community workshop where seniors can learn basic electronics and woodworking, fostering intergenerational collaboration. Rafael also
    wants to document his life’s lessons and family history in a memoir that weaves together Mexican heritage and his experiences in the Pacific Northwest. Continuing his love of learning, he aims to stay
    current with emerging technologies such as renewable energy systems, applying them to his garden and home.
