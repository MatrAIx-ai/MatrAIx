personas:
  professional: Adonis Gunn, a retired farmhand turned community mentor, leverages his hands‑on mechanical, carpentry, and budgeting skills to spearhead local events and teach younger neighbors, while his
    preference for structure guides his methodical workshops, yet his laid‑back attitude lets him adapt to spontaneous changes.
  sports: Adonis Gunn enjoys early‑morning fishing on Lake Texoma, participates in the local 4‑H hunting club, follows the Dallas Cowboys in the fall and the Houston Astros in the summer, and keeps fit
    by chopping wood and tending his garden, treating exercise as a practical extension of his daily chores.
  arts: Adonis Gunn spends Sunday afternoons at the Texas Heritage Museum, listening to classic country legends like Willie Nelson and Johnny Cash on his vintage record player, and occasionally joins a
    community storytelling circle where his love of genealogy fuels his appreciation for Western film icons such as John Wayne.
  travel: Adonis Gunn prefers road trips in his pickup, having explored the Alamo in San Antonio, the canyons of Big Bend National Park, and dreaming of a future visit to Washington, D.C.’s Smithsonian
    museums, but his travel plans are shaped by the need to coordinate with his grandchildren’s school calendars.
  culinary: Adonis Gunn delights in cooking hearty Texan meals like beef brisket, chili con carne, and fried catfish, seasoning with jalapeños and smoked paprika, while regularly harvesting fresh tomatoes,
    peppers, and collard greens from his garden to create home‑grown side dishes.
  core: Adonis Gunn blends practical wisdom with a stubborn love for routine, yet his habit of misplacing garden tools and delaying bill payments reveals a charmingly disorganized side to his otherwise
    disciplined life.
background:
  cultural: Adonis was born and raised in Comanche, Texas, into a family of Anglo‑American ranchers. His cultural identity is shaped by the rural Central Texas tradition of self‑reliance, strong community
    bonds, and a deep respect for the land. He grew up attending a local Baptist church, celebrating regional holidays such as Texas Independence Day, and participating in community events like county fairs
    and rodeos. These experiences fostered values of family loyalty, practical problem‑solving, and a love for country music and storytelling. While he embraces the broader American culture, his daily life
    remains rooted in the customs and rhythms of mid‑20th‑century Texas rural life.
