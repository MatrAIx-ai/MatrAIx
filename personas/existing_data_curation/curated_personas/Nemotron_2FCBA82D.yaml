  career_goals: Although retired, Adonis aims to stay healthy, independent, and engaged with his community. He aspires to volunteer regularly at the local community center, share his practical knowledge
    with grandchildren and younger neighbors, and document his family's history in a memoir. He also hopes to learn to use video‑calling technology to keep in touch with family far away and to contribute
    to the preservation of local historical stories.
