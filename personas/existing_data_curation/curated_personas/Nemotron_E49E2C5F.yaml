  hobbies: '[''Church choir and potluck events'', ''Seasonal vegetable gardening'', ''Quilting circle'', ''Senior walking group'', ''Reading romance novels'', ''Watching classic sitcoms'']'
  career_goals: As she approaches retirement age, Tessie aims to secure a stable part‑time supervisory role at her current cleaning company, allowing her to mentor younger workers while maintaining a predictable
    schedule. She hopes to obtain a certification in professional cleaning management to formalize her expertise. Long‑term, she envisions starting a small, family‑run cleaning service that serves her close‑knit
    community in Oskaloosa, providing reliable jobs for friends and relatives. Financial stability and reduced stress are key motivations, as she wishes to ensure her family’s comfort and preserve her health.
