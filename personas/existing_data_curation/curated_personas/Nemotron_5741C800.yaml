personas:
  professional: Juan Clavero, a 37‑year‑old career counselor and arts‑integrated facilitator, blends strengths‑based assessment expertise with spontaneous, visual storytelling to help clients envision future
    pathways, though his love of flexibility sometimes clashes with the need for structured case documentation.
  sports: Juan Clavero channels his energy into weekend hikes along the Allegheny foothills, supports the Erie SeaWolves baseball club and the Pittsburgh Steelers football team, and joins a local pick‑up
    soccer league on weekday evenings, balancing outdoor adventure with community sports engagement.
  arts: Juan Clavero explores the Erie art scene by frequenting the Erie Art Museum and the Gherkin Gallery, creates watercolor mixed‑media works inspired by Frida Kahlo’s bold colors and Banksy’s street
    commentary, and performs improvisational sketches with the Creative Collective troupe, while constantly curating playlists of The National and Gustavo Santaolalla for inspiration.
  travel: Juan Clavero’s travel style blends spontaneous road trips with cultural immersion, having trekked the Colombian Andes to sample homemade sancocho, wandered through the street murals of Cartagena,
    explored the historic alleys of Florence, and planning future visits to the Musée d’Orsay in Paris and the vibrant neighborhoods of Tokyo.
  culinary: Juan Clavero, an enthusiastic home chef, delights in preparing traditional Colombian arepas, empanadas, and ajiaco, often experimenting by adding smoked paprika, fresh cilantro, and a splash
    of lime, though his impromptu cooking sessions sometimes lead to over‑seasoned dishes that he happily shares at his weekly salsa nights.
  core: Juan Clavero is a curiosity‑driven, art‑obsessed career counselor who juggles spontaneous creativity with deadline anxiety, thriving on group energy while secretly hoarding half‑finished watercolor
    canvases in his office.
background:
  cultural: Juan is a first‑generation Colombian‑American who grew up in a bilingual household where Spanish was spoken at home and English at school. He was immersed in Colombian traditions such as family
    gatherings, cumbia and vallenato music, and the communal preparation of coffee and arepas. This bicultural upbringing gives him a nuanced understanding of the challenges faced by immigrant and Latino
    students. In Albion, he remains active in the local Colombian community, volunteering at cultural festivals and serving as a bridge between the community and the school system. His cultural lens enriches
    his counseling practice, allowing him to incorporate storytelling, music, and visual arts rooted in his heritage into career exploration activities.
attributes:
  skills: '[''Career counseling'', ''Labor market analysis'', ''Strengths‑based assessment'', ''Art‑inspired career exploration'', ''Group workshop facilitation'', ''Cross‑cultural communication'', ''Active
    listening'', ''Emotional intelligence'', ''Dynamic problem solving'', ''Networking guidance'']'
  hobbies: '[''Visiting art galleries'', ''Watercolor painting'', ''Improvisational theater'', ''Hiking'', ''Salsa dancing'', ''Cooking Colombian cuisine'', ''Listening to podcasts on psychology and innovation'',
    ''Reading philosophy and career development books'', ''Participating in community meetups'', ''Board game nights'']'
  career_goals: Juan aims to deepen his expertise by earning a master’s degree in counseling or school psychology and obtaining NCDA certification. He envisions launching a community‑based counseling center
    in Erie County that blends traditional career guidance with arts‑based methods, specifically serving Latino and immigrant youth. Over the next five years, he plans to develop a digital platform offering
    personalized, culturally responsive career resources, mentor emerging counselors, and influence local education policy to improve equitable access to career development services. He also seeks to enhance
    his organizational skills to manage a larger caseload while preserving his spontaneous, client‑focused approach.
