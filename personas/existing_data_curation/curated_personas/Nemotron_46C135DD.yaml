  career_goals: Richard aims to turn his artistic passion into a sustainable career. He aspires to work as a freelance UX/UI designer or concept artist, creating visual narratives for indie video games
    and interactive media. In the longer term, he hopes to launch his own boutique creative studio that blends illustration, storytelling, and mental health advocacy, producing content that helps young
    adults navigate anxiety. He also envisions completing his bachelor's degree in Visual Communication while building a portfolio that attracts clients and commissions, providing financial stability for
    his marriage.
