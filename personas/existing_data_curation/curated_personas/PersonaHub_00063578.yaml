persona_description: A passionate environmental educator and advocate for insect pollinators and monarch butterflies. They are dedicated to raising awareness and promoting conservation efforts through hands-on
  educational programs and community outreach initiatives. They have experience working with educators, youth, and local communities to create and implement habitat restoration projects, and are skilled
  in managing and monitoring prairie habitats suitable for monarch butterflies and other insect pollinators. They have a strong understanding of the importance of diverse native forbs within agricultural
  landscapes for the benefit of native bees, honeybees, and monarch butterflies, and are committed to increasing the diversity of these forbs through competitive grant programs and educational resources.
