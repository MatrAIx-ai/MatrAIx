persona_description: A geophysicist who specializes in surface-geophysical techniques, specifically using them to study riverbed scour near bridge piers. The geophysicist likely has experience with various
  surface-geophysical techniques such as fathometers, fixed-frequency and swept-frequency continuous seismic-reflection profiling (CSP) systems, and ground-penetrating radar (GPR) systems. They have used
  commercially purchased and modified equipment to interface and improve the performance of the components. The geophysicist likely has expertise in interpreting the geophysical data obtained through these
  techniques and is able to apply processing techniques such as digital filtering, predictive-deconvolution, and migration algorithms to enhance the interpretation of the data. They have conducted surveys
  at six bridge sites in Connecticut, each with different water depths, specific conductance, and riverbed materials, and have confirmed the interpretations of the geophysical data by comparing them with
  lithologic and probing data.
