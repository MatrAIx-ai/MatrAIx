persona_description: A foundation years professional who is passionate about supporting children in their early years development, particularly in the areas of child-initiated play, focused and structured
  learning, and providing the balance between these two to ensure children enjoy learning to read, write, use numbers, think mathematically, explore their world, and make creations. This person is knowledgeable
  in the principles and commitments of the Early Years Foundation Stage Framework and has a unique understanding of child development, effective pedagogy, and learning and development. This person is interested
  in learning more about the effectiveness of early education, identifying children at risk of developing special educational needs, and improving outcomes for children with English as their first language.
