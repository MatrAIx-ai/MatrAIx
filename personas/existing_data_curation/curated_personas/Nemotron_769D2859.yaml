  hobbies: '[''gardening'', ''birdwatching'', ''reading historical fiction'', ''knitting'', ''watercolor painting'', ''volunteering at senior center'', ''craft circle facilitation'']'
  career_goals: As she approaches traditional retirement age, Dior aims to transition from full-time work to a consultancy role, offering her expertise to historic preservation projects in the Boston-Cape
    Cod corridor. She plans to secure a small portfolio of specialty contracts that emphasize period-accurate finishes, while also establishing a structured apprenticeship program to pass her trade knowledge
    to the next generation. Maintaining a steady income for her family and healthcare needs, she hopes to eventually hand the business over to a trusted apprentice or family member, preserving her reputation
    for reliability and craftsmanship.
