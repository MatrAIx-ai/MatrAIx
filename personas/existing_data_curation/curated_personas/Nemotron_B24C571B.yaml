personas:
  professional: Jorge Garcia, a seasoned ATM and office equipment repair specialist, channels three decades of hands‑on diagnostics, schematic reading, and soldering expertise into a methodical consulting
    practice that emphasizes preventive maintenance contracts and apprenticeship mentorship for small Azusa businesses.
  sports: Jorge Garcia stays active through the senior men’s walking club in Azusa, follows the Los Angeles Angels passionately at the local sports bar, and cheers for the regional high‑school basketball
    team during winter months, balancing low‑impact cardio with occasional light weight work.
  arts: Jorge Garcia volunteers in the church choir, where they blend traditional hymns with lively mariachi songs, spend evenings assembling model airplanes, and enjoy listening to classic crooners like
    Frank Sinatra and contemporary folk guitarist John Denver.
  travel: Jorge Garcia prefers road trips to nearby historic towns such as Pasadena and Santa Barbara, planning itineraries around comfortable accommodations and accessible rest stops, while dreaming of
    a leisurely Pacific‑coast cruise once their health permits.
  culinary: Jorge Garcia delights in crafting family recipes of pozole and tamales, seasoning them with hominy, chiles, and fresh cilantro, and pairs the meals with vegetables harvested from their garden,
    though they sometimes over‑salt dishes in pursuit of authentic flavor.
  core: Jorge Garcia is an organized, socially driven technologist who blends meticulous repair work with community spirit, savoring traditional cooking and garden freshness while battling occasional worries
    about health and finances.
background:
  cultural: Jorge grew up in a bicultural Mexican‑American household in Southern California, speaking Spanish at home and English at school. His family maintains strong ties to Mexican traditions, celebrating
    Día de los Muertos, Cinco de Mayo, and religious holidays with extended family gatherings and homemade meals. He identifies with the Catholic faith, attending mass regularly and participating in community
    outreach through his parish. Jorge’s Mexican heritage informs his values of family loyalty, respect for elders, and a communal spirit, which he expresses through his involvement in local cultural events
    and his willingness to share his technical skills with neighbors and the senior community.
attributes:
  skills: '[''ATM hardware repair'', ''Office machine maintenance (photocopiers, fax, printers)'', ''Circuit board soldering'', ''Diagnostic software troubleshooting'', ''Network interfacing for banking
    systems'', ''Technical documentation reading'', ''Training and mentorship of junior technicians'', ''Customer service and communication'']'
  hobbies: '[''Weekly walking club'', ''Mexican cultural festival participation'', ''Cooking traditional Mexican dishes'', ''Los Angeles Angels baseball fan'', ''Vegetable gardening'', ''Model airplane
    building'', ''Crossword puzzles'', ''Church choir singing'']'
  career_goals: Although approaching retirement, Jorge aims to transition from full‑time service calls to a consulting role where he can provide scheduled preventive‑maintenance contracts for small businesses
    in the Azusa area. He hopes to obtain a certification in modern fintech hardware to stay current with emerging ATM security standards. Jorge also wants to mentor a younger apprentice from his community,
    passing on his methodical repair process and emphasizing safety and documentation. Additionally, he aspires to volunteer his technical skills at the local senior center, helping older residents navigate
    basic computer and banking technologies, thereby combining his love for structure with his sociable nature.
