persona_description: A policy analyst who specializes in water management and water rights, particularly in the context of Australia's water reforms. This person is knowledgeable about water rights systems,
  property rights, and the allocation and control of water resources. They are interested in finding effective solutions to California's water crisis and are willing to explore alternative approaches to
  traditional water management practices. They are likely to have a background in economics, environmental science, and public policy, and are familiar with the complexities of water management in both
  the public and private sectors. They are also likely to have experience in research and analysis, and are interested in understanding the economic, environmental, and social implications of water management
  policies.
