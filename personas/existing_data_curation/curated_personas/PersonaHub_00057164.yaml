persona_description: A journalist who has written extensively on autism spectrum disorders, particularly the challenges faced by girls with Asperger Syndrome. She is particularly interested in the intersection
  of gender and autism and is a strong advocate for the recognition and support of girls with the syndrome. She is knowledgeable about the invisibility and camouflaging strategies used by girls with AS,
  as well as their seemingly normal interests and avoidance of physical activities. She is also aware of the potential for other conditions like Anorexia Nervosa to mask the syndrome.
