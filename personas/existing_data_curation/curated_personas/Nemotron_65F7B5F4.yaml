personas:
  professional: Carlos Colon, a seasoned maintenance professional specializing in HVAC, electrical, and plumbing systems, combines his practical curiosity and strong communication skills to lead preventive
    maintenance planning, ensure safety compliance, and mentor junior staff while pushing for energy‑efficient solutions in Las Vegas facilities.
  sports: Carlos Colon, an avid soccer player in the Red Rock Community League, regularly joins weekend matches, follows the Las Vegas Raiders and Vegas Golden Knights, hikes desert trails with the Red
    Rock Trail Club, and augments his fitness routine with DIY strength training using reclaimed car parts, emphasizing teamwork and endurance.
  arts: Carlos Colon, a hobbyist acoustic guitarist who strums covers of John Mayer and José Feliciano, frequently attends live performances at the Smith Center featuring artists like Lila Downs and an
    intimate local jazz trio, and draws creative inspiration for his DIY projects from the visual storytelling of Cirque du Soleil shows.
  travel: Carlos Colon prefers road‑trip adventures, meticulously planning desert excursions to Sedona, the Grand Canyon, and Joshua Tree while also enjoying occasional relaxing escapes to Napa Valley,
    balancing his love of DIY camping gear with budget considerations that reserve his savings for a long‑planned family cruise to the Caribbean.
  culinary: Carlos Colon, an intermediate home chef, delights in preparing mole poblano, carnitas tacos, and chiles rellenos using fresh chilies, corn tortillas, and locally sourced cilantro, while also
    experimenting with wood‑fire grilling of classic American burgers and often treats himself to a craft‑beer dinner at a nearby gastropub after a long workweek.
  core: Carlos Colon blends a tireless DIY spirit, a knack for restoring vintage cars, and a compassionate community vibe, yet habitually leaves his toolbox open, a small chaotic habit that mirrors his
    open‑door approach to mentoring and volunteering.
background:
  cultural: Carlos was raised in a Mexican‑American household in the Las Vegas area, where Spanish and English were spoken daily. His family maintains strong ties to Mexican traditions, celebrating Día
    de los Muertos, Cinco de Mayo, and Semana Santa with food, music, and gatherings. The values of familismo, respeto, and hard work shaped his outlook, and he stays connected to the local Mexican community
    through the church, cultural festivals, and neighborhood events. His culinary skills reflect his heritage, and he often shares stories of his grandparents' migration and the importance of community
    support.
attributes:
  skills: '[''HVAC installation and repair'', ''Electrical troubleshooting'', ''Plumbing maintenance'', ''Preventive maintenance scheduling'', ''Safety compliance (OSHA)'', ''Technical documentation'',
    ''Inventory management'', ''Team coordination and training'', ''Customer service'', ''Energy‑efficiency upgrades'']'
  hobbies: '[''Soccer'', ''Cooking Mexican cuisine'', ''Hiking in Red Rock Canyon'', ''DIY home projects'', ''Classic car restoration'', ''Playing acoustic guitar'', ''Volunteering at community center'']'
  career_goals: Carlos aims to become a lead facilities manager for a large residential or commercial property, focusing on implementing sustainable maintenance practices and mentoring apprentices. He plans
    to earn certifications such as EPA 608, Certified Facility Manager (CFM), and OSHA 30‑hour safety. Over the next five years, he hopes to lead a maintenance team, introduce green building initiatives,
    and eventually launch his own small‑scale repair contracting business that serves the Las Vegas community.
