  career_goals: Brody envisions a future where he can blend his love of technology and creativity, aiming to become a video game designer or interactive media developer. He is also intrigued by the idea
    of creating tools that help organize community sports events, so he hopes to study software engineering with a focus on sports tech. In the short term, he plans to join a high‑school robotics team,
    earn a STEM scholarship, and attend coding camps to deepen his programming skills. Long‑term, he dreams of starting his own tech‑focused startup that builds apps for youth recreation and community engagement.
