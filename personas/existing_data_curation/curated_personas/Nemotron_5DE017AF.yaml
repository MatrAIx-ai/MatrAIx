personas:
  professional: Brody Morales is an aspiring robotics engineer and junior game developer, channeling curiosity and practicality into assembling LEGO robotics kits, scripting Minecraft mods, and co-producing
    animated shorts for the school film club, where they eagerly share ideas with peers.
  sports: Brody Morales spends afternoons shooting hoops at the local park while cheering for the Los Angeles Lakers, they tear up the nearby skate park as a member of the Valley Skaters Club, and they
    pedal through the San Fernando Valley bike trails and Griffith Park hikes on weekends, balancing competitive drive with pure love of movement.
  arts: Brody Morales channels creativity into designing vibrant digital art on Canva inspired by Loish, producing animated shorts for the school film club that echo Pixar’s storytelling style, and mastering
    drum beats from Travis Barker’s tracks, they frequently swap ideas with friends while remixing Minecraft soundscapes from Grian’s channel.
  travel: Brody Morales dreams of weekend escapes, preferring spontaneous bike rides through the San Fernando Valley to planned vacations, they have already explored Griffith Park, the Santa Monica beach
    boardwalk, and a family trip to Yosemite National Park, and they hope to one day visit Tokyo’s anime districts for an ultimate gaming pilgrimage.
  culinary: Brody Morales enjoys devouring pepperoni pizza and chicken quesadillas while experimenting in the kitchen with beginner‑level recipes like chocolate chip cookies, mac and cheese, and banana‑oat
    smoothies, they often improvise a quick nacho platter after a gaming marathon, and they proudly claim the title of “official snack maker” during family movie nights.
  core: Brody Morales is a hyper‑curious, boundlessly energetic teen who simultaneously builds LEGO robots, skins Minecraft worlds, and forgets to tidy up his bike helmet, they thrive on spontaneous group
    fun while occasionally splurging on the latest game loot.
background:
  cultural: Brody is a White American raised in Van Nuys, a culturally diverse part of Los Angeles County. Though his surname "Morales" hints at Hispanic lineage within his extended family, his household
    primarily identifies with mainstream American traditions while also appreciating elements of Latino culture, such as enjoying tacos and participating in community celebrations like Día de los Muertos.
    He attends a public middle school with a multicultural student body, which has fostered an inclusive outlook and comfort interacting with peers from various ethnic backgrounds. English is his primary
    language, but he has some exposure to Spanish through friends and neighborhood events. His family values education, extracurricular involvement, and community service, encouraging Brody's curiosity
    and sociable personality.
