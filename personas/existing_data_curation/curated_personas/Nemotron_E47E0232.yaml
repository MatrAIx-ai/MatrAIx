  hobbies: '[''Watercolor painting'', ''Nature photography'', ''Community gardening'', ''Softball'', ''Hiking'', ''Woodworking'', ''Attending art exhibits'', ''Open‑mic nights'', ''Reading horticultural
    literature'', ''Mindfulness meditation'']'
  career_goals: Anthony aims to transition from employee to owner of a small, locally focused landscaping business that emphasizes sustainable, art-infused garden designs. He plans to earn a certified horticulturist
    credential, enter regional landscape design competitions, and mentor apprentices from the community. Additionally, he wishes to serve as a volunteer design consultant for public green spaces in Lynnwood,
    building a reputation for environmentally responsible aesthetics while cultivating a workload that allows regular self-care to manage his emotional reactivity.
