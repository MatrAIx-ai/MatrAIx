  hobbies: '[''Reading'', ''Hiking'', ''Birdwatching'', ''Gardening'', ''Knitting'', ''Baking'', ''Nature photography'', ''Sketching'']'
  career_goals: Elizabeth aims to complete her GED and pursue a certificate in sustainable horticulture or environmental science at a local community college. Her long‑term ambition is to work as a horticultural
    technician for a regional farm or conservation agency, where she can apply her practical gardening knowledge and contribute to land stewardship. She also dreams of eventually operating a small organic
    produce stand or a farm‑to‑table bakery that supplies her community with locally grown foods, blending her culinary interest with her commitment to environmental health and community harmony.
