personas:
  professional: A budding horticultural technician named Elizabeth Budzien blends their hands‑on gardening mastery, meticulous garden‑planning spreadsheets, and quiet curiosity into community garden projects,
    while their organized, cooperative nature drives them toward a future role stewarding sustainable farmland as a certified horticulture technician.
  sports: Elizabeth Budzien stays active through solo hikes along the Green Mountains, cross‑country skiing in winter, and occasional snowshoeing, while they cheer for the Vermont Catamounts women's soccer
    team and participate in the Green Mountain Hiking Club, preferring low‑key endurance activities over team sports but still maintaining a disciplined weekly fitness schedule.
  arts: Elizabeth Budzien nurtures their creative side by sketching wildlife in a field notebook, capturing sunrise over the Vermont woods with a DSLR reminiscent of Ansel Adams, devouring classic novels
    by Jane Austen, and winding down to the folk‑indie sounds of Sufjan Stevens and The Milk Carton Kids, weaving literature, photography, and music into their quiet evenings.
  travel: Elizabeth Budzien plans their travel with the same methodical precision they apply to garden calendars, favoring low‑key nature escapes such as a weekend trek in Acadia National Park, a culinary
    tour of Montreal’s bakeries, and dreaming of a future road trip through the Pacific Northwest’s Olympic National Park, always budgeting carefully and often traveling solo or with a small group of close
    friends.
  culinary: Elizabeth Budzien is an intermediate baker who delights in crafting sourdough loaves, apple‑cinnamon crumble pies, and heirloom tomato galette, seasoning with rosemary, thyme, and foraged wild
    mushrooms, while their kitchen experiments also include fermenting seasonal vegetables—a culinary practice that reflects their love for sustainable, locally‑sourced flavors.
  core: Elizabeth Budzien is a quietly driven teen who merges solitary nature immersion, meticulous garden stewardship, and occasional baking indulgences, all while battling a habit of over‑organizing their
    schedule and a tendency to delay social invitations.
background:
  cultural: Elizabeth is a white American with Polish ancestry, reflected in her family name Budzien. She was raised in Craftsbury, a tight‑knit rural community in Lamoille County, Vermont. Her upbringing
    blends New England values—self‑reliance, modesty, and a deep respect for the outdoors—with Polish cultural traditions such as homemade pierogi and holiday gatherings centered around the family table.
    Seasonal Vermont customs, like maple‑syrup tapping, community barn‑raisings, and local craft fairs, have shaped her appreciation for communal cooperation and environmental stewardship. This mix of heritage
    and regional culture informs her respectful, cooperative nature and her practical curiosity about the natural world.
