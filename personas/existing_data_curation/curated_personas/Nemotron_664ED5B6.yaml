personas:
  professional: Roxana Perezestrada leverages a graduate business degree and decades of strategic planning experience to provide meticulous financial analysis for nonprofit grant proposals, while volunteer-led
    workshops at the local library let them mentor emerging entrepreneurs with patient, detail‑oriented guidance.
  sports: Roxana Perezestrada enjoys low‑intensity fitness by attending senior yoga classes at the community center and walking the historic downtown Scranton Riverwalk, cheerfully follows the Philadelphia
    Eagles each football season and the Philadelphia Flyers in hockey, and occasionally joins a local senior walking group that doubles as gentle cardio.
  arts: Roxana Perezestrada spends quiet mornings painting watercolors of Andean vistas in the style of Monet, evenings listening to Beethoven’s symphonies alongside folk rhythms by Carlos Vives, and curates
    the local cultural center’s rotating exhibit featuring works by emerging regional artists, while they also knit intricate scarves inspired by abstract patterns.
  travel: Roxana Perezestrada prefers methodical travel planning, often mapping week‑long rail journeys that blend literary pilgrimages to cities like Granada with relaxed garden visits in the highland
    valleys, and they dream of a solo trip to the vineyards of Tuscany once their genealogy scrapbook is complete.
  culinary: Roxana Perezestrada routinely prepares aromatic arepas using cornmeal, anise, and fresh cilantro from their balcony garden, simmers a hearty sancocho with plantain, yucca, and annatto for vibrant
    color, and they experiment with coffee‑infused desserts, though they occasionally over‑season dishes when pantry staples linger.
  core: Roxana Perezestrada fuses disciplined financial acumen with boundless artistic imagination, spending dawns in delicate watercolor, evenings shaping scholarship budgets, and quiet weekends nurturing
    herbs, proving that solitude can power both creativity and community impact.
background:
  cultural: Born in Medellín, Colombia, Roxana grew up immersed in a family that valued education, Catholic traditions, and vibrant community gatherings. After moving to the United States in her early thirties,
    she blended her Colombian roots with American life, preserving customs such as celebrating Carnaval de Barranquilla, savoring Colombian coffee, and maintaining Spanish language use at home. In Scranton,
    she participates in Hispanic cultural events, supports the local Colombian diaspora network, and serves as a cultural bridge, sharing Colombian art, music, and culinary traditions with her neighbors
    while honoring the values of familia and comunidad that shaped her upbringing.
