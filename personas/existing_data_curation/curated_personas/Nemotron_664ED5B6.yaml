    Teaching Business Basics'']'
  career_goals: Even in retirement, Roxana aspires to leave a lasting legacy. She plans to author a memoir that intertwines her business insights with personal reflections on Colombian heritage, and to
    establish a scholarship fund that supports Colombian‑American students pursuing business studies. Additionally, she seeks to mentor emerging entrepreneurs within the Scranton Latino community, contribute
    her curatorial eye to the local cultural center’s art collection, and document her family’s genealogy for future generations.
