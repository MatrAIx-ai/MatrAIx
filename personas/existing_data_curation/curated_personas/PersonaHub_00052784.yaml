persona_description: A researcher in the field of epigenetics and cancer biology, particularly interested in the mechanisms of histone deacetylase inhibitors (HDACi) and their potential as anti-cancer drugs.
  This persona is focused on understanding how normal human cells respond to HDACi, particularly in terms of their transcription-based survival response, and how this response is regulated by the epigenetic
  systems that these organisms use to regulate gene expression and control their growth and behavior. This persona is interested in the potential of HDACi to be developed into effective anti-cancer drugs,
  and is dedicated to furthering our understanding of the mechanisms that allow normal human cells to survive these potential toxins.
