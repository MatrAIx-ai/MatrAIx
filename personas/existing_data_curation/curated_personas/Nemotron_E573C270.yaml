  hobbies: '["Gardening", "Woodworking", "Reading historical biographies", "Church choir participation", "Cooking Southern cuisine", "Genealogy research", "Local history tours", "Walking and mild hiking",
    "Playing checkers", "Listening to jazz and soul music"]'
  career_goals: Although officially retired, Isiah aims to remain actively engaged in his community and family. He plans to complete a written memoir that captures his life’s lessons and the story of his
    family's migration from the South to New Jersey, preserving this history for future generations. He also aspires to learn more about digital photography and video editing to document family gatherings
    and local events. Isiah hopes to continue serving on his church’s outreach board, expand the neighborhood’s senior‑friendly gardening program, and maintain his health through regular walks and low‑impact
    exercise. His long‑term ambition is to leave a legacy of practical knowledge, cultural pride, and community cohesion.
