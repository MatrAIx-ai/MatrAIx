  hobbies: '[''Gardening'', ''Beach walks and birdwatching'', ''Reading historical fiction'', ''Attending theater and art exhibitions'', ''Cooking and exploring seafood recipes'', ''Book club participation'',
    ''Gentle yoga'', ''Volunteering at the local library'', ''Crocheting'', ''Community volunteer work'']'
  career_goals: Natalie aims to leverage her decades of front‑desk experience to transition into a supervisory or coordinator role within her organization, where she can lead a small team, streamline office
    processes, and introduce modern digital tools. She is interested in obtaining a Certified Administrative Professional (CAP) credential to formalize her expertise. As retirement approaches, she plans
    to reduce her hours while mentoring younger staff and eventually volunteer as a community information liaison at the local senior center, using her deep knowledge of Sarasota resources to assist residents.
