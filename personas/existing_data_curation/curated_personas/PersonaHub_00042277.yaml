persona_description: A music educator who is passionate about the development of young children's music and movement skills through a comprehensive and evidence-based approach. They are dedicated to providing
  a safe and nurturing environment for children to explore and learn through music, with a focus on active participation, focused listening, steady beat development, purposeful movement, language learning,
  and the use of instruments and ensembles. They are knowledgeable about the latest research in early childhood music and movement education, and are skilled in designing and delivering engaging and effective
  music classes for young children. They are committed to helping children develop a lifelong love of music and a foundation for future instrumental study.
