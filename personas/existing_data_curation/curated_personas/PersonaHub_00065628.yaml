persona_description: A researcher and technologist who is passionate about combining medical and computer technology with textiles and fabric. They are currently working on fabric and clothes that hide
  sensors, conductive fibers, and transmitters that can monitor vital functions such as heartbeat, body temperature, blood oxygen, and respiration. They are exploring ways to incorporate this technology
  into any fabric or blend without affecting the look or feel of the fabric. They are at the forefront of this technology and are working with companies to commercialize this idea. They are also interested
  in the history of high-tech home medical devices and their integration into everyday life.
