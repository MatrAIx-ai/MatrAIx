  career_goals: Richard aims to pursue a career that blends his curiosity for technology with practical problem‑solving, such as software development, data analysis, or engineering. He plans to attend a
    technical high school or community college, earn a degree in computer science or engineering, and eventually work as a software engineer or systems analyst. He hopes to contribute to open‑source projects,
    develop tools that help small businesses in his community, and find a work environment that allows focused, independent work with occasional collaborative opportunities. Long‑term, he envisions a role
    where he can innovate while maintaining a balanced, stable lifestyle.
