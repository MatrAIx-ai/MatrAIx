  career_goals: Approaching retirement, David aims to transition to a part‑time advisory role that lets him apply his accounting expertise to support local non‑profit arts organizations and cultural institutions.
    He wishes to mentor emerging accountants, serve on professional standards committees, and deliver workshops on financial ethics for the arts sector. Additionally, he hopes to author a series of essays
    or a memoir exploring the intersection of accounting, ethics, and artistic expression, while traveling to world‑renowned museums and galleries to deepen his appreciation for art and history.
