personas:
  professional: Jatuan Jackson is a seasoned front‑of‑house hospitality specialist in a Union City restaurant, leveraging decades of attentive customer interaction, precise cash handling, and schedule management
    to mentor younger staff, while their love of structure and competitive drive pushes them to exceed service targets and design a formal training program.
  sports: Jatuan Jackson follows the Atlanta Hawks and Atlanta Falcons avidly, plays in the Union City Senior Basketball League each winter, participates in a weekly walking club at the senior center, and
    enjoys occasional rounds of golf at a nearby municipal course to stay fit.
  arts: Jatuan Jackson delights in classic R&B legends like Al Green, Marvin Gaye, and the soulful gospel of Kirk Franklin, regularly sings in the church choir, watches stage productions of Southern playwrights,
    and collects vinyl records that echo the storytelling tradition of their community.
  travel: Jatuan Jackson prefers well‑planned trips that blend heritage and relaxation, having explored Savannah's historic squares, taken a riverboat cruise to New Orleans for its jazz scene, and dreaming
    of a pilgrimage to Ghana to connect with ancestral roots while always budgeting for family visits back home.
  culinary: Jatuan Jackson is an accomplished home cook who perfects Southern soul dishes such as fried catfish with hush‑puppy cornmeal, collard greens seasoned with smoked turkey, and sweet potato pie,
    while experimenting with okra‑gumbo variations and growing fresh herbs like thyme and basil for added flavor.
  core: Jatuan Jackson blends a structured, competitive work ethic with a warm, community‑focused spirit, balancing meticulous restaurant management with soulful cooking, lively church gatherings, and a
    skeptical yet generous approach to money.
background:
  cultural: Jatuan grew up in a close‑knit African‑American community in the South, where church, family, and shared meals shaped his identity. His heritage includes the legacy of the Great Migration, reflected
    in his appreciation for soul food traditions and storytelling. He values the strong work ethic and communal support inherent in his cultural upbringing, which informs his dedication to hospitality and
    mentorship. The vibrant cultural landscape of Union City, GA, with its local festivals, church choirs, and historical ties to civil‑rights activism, continues to influence his worldview and daily interactions.
attributes:
