  hobbies: '[''Community Church Events'', ''Neighborhood Basketball Games'', ''Southern Cooking & Recipe Development'', ''Herb & Vegetable Gardening'', ''Weekly Chess Club'', ''R&B and Gospel Music Listening'',
    ''Youth Mentorship Volunteering'']'
  career_goals: At 70, Jatuan aims to transition into a supervisory role within his restaurant, leveraging his experience to become a floor manager or trainer. He wants to implement a structured training
    program for new staff, improve service efficiency, and achieve recognition as a top‑performing employee. Long‑term, he envisions opening a modest community‑focused café that showcases Southern soul
    food, where he can combine his culinary interests with his business knowledge while providing mentorship opportunities for younger workers.
