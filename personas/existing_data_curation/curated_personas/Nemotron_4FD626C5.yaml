  career_goals: Marlene dreams of becoming a veterinarian because she loves animals and wants to ensure they stay healthy. At the same time, she is fascinated by how things work and hopes to design simple
    inventions that make everyday chores easier, blending her curiosity about science with a practical desire to help others. In the near term, she aims to win her school’s science fair with a project on
    animal habitats and to earn a community‑service badge through volunteering at a local animal shelter. Ultimately, she envisions studying biology or biomedical engineering in high school and college.
