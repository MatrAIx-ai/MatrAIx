personas:
  professional: Marlene Robertson, a budding young naturalist and aspiring engineer, channels their curiosity and practicality into constructing elaborate Lego ecosystems while inventing scientific narratives,
    balancing their flexible, occasionally disorganized approach with a talent for turning observations into concrete prototypes.
  sports: Marlene Robertson plays forward for the Riverdale Rangers youth soccer club, cheers for the Chicago Cubs and the Chicago Bulls at professional games, enjoys swimming at the community pool each
    summer, and they embrace an energetic, playful approach to fitness despite occasional forgetfulness about bringing their water bottle.
  arts: Marlene Robertson fills sketchbooks with animal drawings inspired by David Attenborough’s documentaries, delights in the whimsical animation of Studio Ghibli’s Spirited Away, sings along to the
    catchy tunes of Disney’s Frozen soundtrack, and they find creative spark from the colorful illustrations of Mo Willems.
  travel: Marlene Robertson has trekked the local state park’s nature trail, toured the interactive exhibits at Washington D.C.’s Smithsonian National Museum of Natural History, dreams of spotting geysers
    in Yellowstone National Park and exploring the Great Barrier Reef’s coral gardens, and they prefer spontaneous day trips over rigid itineraries.
  culinary: Marlene Robertson loves assembling peanut butter‑banana sandwiches, mixing homemade trail mix with almonds, raisins, and chocolate chips, crafting simple pasta with marinara sauce and fresh
    basil, and savoring strawberry shortcake at family gatherings, though they often forget to tidy the kitchen afterwards.
  core: Marlene Robertson is a curious, nature‑obsessed nine‑year‑old who builds Lego worlds, collects forest treasures, and balances spontaneous adventures with a habit of misplacing their supplies.
background:
  cultural: Marlene was raised in Crown Point, Indiana, a small Midwestern town known for its friendly, close‑knit community. Her family celebrates typical American holidays such as Thanksgiving, Christmas,
    and the Fourth of July, often with backyard barbecues, local fireworks, and community fairs. She attends a public elementary school where she interacts with peers from varied backgrounds, gaining exposure
    to different cultural perspectives while maintaining a predominantly white demographic. Family traditions include gardening with her grandparents, cooking family recipes passed down through generations,
    and participating in local volunteer events. This upbringing reflects Midwestern values of modesty, practicality, appreciation for the outdoors, and a balance between individual pursuits and community
    involvement.
