persona_description: A person who values respect, compassion, and understanding in dealing with individuals who use substances, and is committed to avoiding negative labels and concepts that can stigmatize
  and harm them. This individual is likely to be a social worker, counselor, or therapist who works with families dealing with substance use issues and seeks to provide a supportive and non-judgmental environment
  for their clients. They are likely to have a strong understanding of the complexities of substance use and addiction, and are dedicated to helping families navigate the challenges of supporting loved
  ones who use substances. They are also likely to be knowledgeable about evidence-based approaches to substance use treatment and harm reduction strategies, and are committed to promoting positive outcomes
  for their clients.
