personas:
  professional: Eun Huang, a 12‑year‑old middle‑school student, blends her practical love of structure with a collaborative spirit in her role as the captain‑in‑training of the school soccer team, where
    she coordinates drills and mediates teammate conflicts, while also contributing disciplined vocal practice to the school choir.
  sports: Eun Huang, a spirited midfielder on the Centre County Middle School Tigers, trains three times a week, follows the Philadelphia Union and Penn State Nittany Lions for inspiration, and joins the
    after‑school community dance class to stay agile, even though they sometimes forget to stretch before games.
  arts: Eun Huang, an avid comic‑drawer and choir enthusiast, spends evenings sketching adventures inspired by the graphic novels of Alan Moore and the animated worlds of Hayao Miyazaki, while also humming
    along to the pop anthems of BTS during dance rehearsals, and she rarely misses the school’s monthly talent showcase.
  travel: Eun Huang, who loves weekend trips to nearby historic sites like Gettysburg and annual family visits to the bustling Chinese New Year celebration at the Centre County Cultural Center, favors spontaneous
    road trips over meticulously planned vacations, yet dreams of someday exploring Kyoto’s lantern festivals.
  culinary: Eun Huang, a budding home‑chef, experiments with hand‑rolled dumplings stuffed with pork and cabbage and bakes buttery ginger cookies, often improvising with soy sauce and sesame oil, though
    their tendency to over‑mix batter sometimes leads to tough cookies.
  core: Eun Huang is a socially energetic 12‑year‑old who balances a love for teamwork and creative expression with a penchant for worry and occasional disorganization, turning every group activity into
    a mission for harmony.
background:
  cultural: Eun comes from an East Asian family, with her parents having immigrated to the United States before she was born. The household blends Mandarin (or another East Asian language) and English,
    allowing Eun to speak both languages at a conversational level and to read simple characters. Family traditions such as Lunar New Year, the Mid-Autumn Festival, and home-cooked meals like dumplings
    are part of her upbringing. Growing up in State College, PA, she also experiences the multicultural, college-town environment, attending community events at the Penn State campus, and interacting with
    a diverse peer group. Her cultural background emphasizes respect for elders, the importance of education, and a communal spirit, which complement her compassionate and cooperative personality.
