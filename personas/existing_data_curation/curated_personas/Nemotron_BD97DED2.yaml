  career_goals: Eun aspires to work in a caring profession where she can combine her love for helping others with her practical mindset. In the near future she hopes to become a student-leader, such as
    class president or peer-mentor, to promote mental-wellness initiatives at her school. Looking ahead, she dreams of studying nursing or health sciences to become a pediatric nurse or a community health
    advocate, focusing on creating supportive, stress-free environments for children. She also plans to volunteer at the local hospital's child life program during high school to gain early experience.
