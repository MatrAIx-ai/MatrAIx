  hobbies: '[''Abstract painting'', ''Metal sculpture'', ''Guitar playing'', ''Jam sessions'', ''Improvisational theater'', ''Hiking'', ''Rock climbing'', ''Model rocket building'', ''3D printing'', ''STEM
    mentorship'']'
  career_goals: Santos aims to move from a hands‑on assembler role to a product design and development position where he can merge his technical expertise with his artistic vision. He envisions leading
    a multidisciplinary team that creates functional yet aesthetically striking metal products, incorporating sustainable materials and innovative manufacturing methods. In the longer term, he hopes to
    open a community maker space in Canon City that offers workshops in welding, CAD, and the arts, providing mentorship to young adults, especially those from underserved backgrounds. He also plans to
    obtain certification as a welding instructor, combining his passion for craftsmanship with his commitment to helping others grow.
