personas:
  professional: Santos Perez is a metal fabrication specialist who blends technical mastery of CNC machining, MIG/TIG welding, and CAD modeling with an artistic designer’s vision, and they lead a collaborative
    workshop culture by improvising solutions, mediating conflicts, and prioritizing flexibility over strict schedules.
  sports: Santos Perez embraces the Colorado outdoors by rock‑climbing at Clear Creek Canyon, hiking the Front Range in the summer, and cheering for the Denver Broncos and Colorado Avalanche, while they
    belong to the Boulder Climbing Club and occasionally join a weekend volleyball league at a local community center.
  arts: Santos Perez channels abstract expression onto watercolors inspired by Frida Kahlo’s vivid palettes and sculpts reclaimed metal pieces echoing Pablo Picasso’s cubist forms, they jam on acoustic
    guitar with local folk acts covering songs by Bob Dylan and John Mayer, and they regularly improvise theater scenes with The Improv Collective, drawing energy from the spontaneity of performance.
  travel: Santos Perez prefers loosely planned road trips that blend adventure with artistic discovery, having explored the vibrant streets of Oaxaca for its mural culture, trekked Patagonia’s legendary
    peaks, and dreamed of a spring visit to Kyoto’s temple gardens, while they balance travel ambitions with a modest budget that favors camping over luxury hotels.
  culinary: Santos Perez enjoys cooking simple yet bold meals such as quinoa‑filled peppers, grilled Colorado trout with lemon‑dill sauce, and handcrafted fish tacos seasoned with chipotle and fresh cilantro,
    they are an intermediate‑level home chef who experiments with smoked paprika and rosemary but often forgets to defrost meat in time, leading to rushed meals.
  core: Santos Perez is a hands‑on creative technologist who blends metalworking, art, and community mentorship into a flexible, compassionate lifestyle peppered with occasional disorganization and a penchant
    for spontaneous adventures.
background:
  cultural: Santos was raised in a Spanish household, deeply rooted in the traditions of Andalusian culture. Family gatherings feature vibrant celebrations of Semana Santa and Feria, where Spanish cuisine
    like paella, tapas, and sangria are shared. Bilingual by nature, he seamlessly switches between Spanish and English, preserving his heritage while embracing the multicultural fabric of his Colorado
    community. The collectivist values of hospitality, cooperation, and respect for elders from his upbringing influence his compassionate approach at work and in volunteer settings. Living in Canon City,
    he blends these traditions with the rugged, nature‑focused lifestyle of the American West, often cooking Spanish dishes after a day of hiking, and integrating Mediterranean design aesthetics into his
    metalwork projects. His cultural identity is a living tapestry that informs both his personal passions and his professional aspirations.
