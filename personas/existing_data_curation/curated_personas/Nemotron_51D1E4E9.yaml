  hobbies: '[''Visiting street murals and local art galleries'', ''Photography (coastal and urban scenes)'', ''Pick‑up basketball'', ''Beach volleyball'', ''Live music events (salsa, tejano, indie rock)'',
    ''Cooking fusion dishes (Mexican‑Gulf Coast)'', ''Skateboarding'', ''Competitive video gaming'', ''Listening to tech and entrepreneurship podcasts'', ''Exploring new restaurants and food trucks'']'
  career_goals: Josean aims to advance from his current customer‑service representative role to a team‑lead position within the next two years, focusing on developing coaching and supervisory skills. He
    plans to enroll in a local community college to earn an associate degree in Business Administration and to obtain certifications in Customer Experience Management and leading CRM platforms. In the longer
    term, he aspires to transition into a customer‑experience manager or product‑development role that merges his analytical insights from daily interactions with his passion for innovative, art‑inspired
    concepts, ultimately leading a creative‑focused team in a tech‑oriented company.
