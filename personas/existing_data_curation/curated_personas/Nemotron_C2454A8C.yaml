  hobbies: '[''Acrylic painting'', ''Cooking Guatemalan cuisine'', ''Yoga and mindfulness meditation'', ''Journaling'', ''Salsa dancing'', ''Hiking in local mountains'', ''Reading contemporary fiction'',
