  career_goals: Esmeralda aims to open her own boutique salon that offers a relaxed yet structured environment focused on cultural hair‑care and emotional well‑being. She plans to earn a master stylist
    certification, develop an online tutorial series on stress‑relief hair‑care routines, and become a mentor for emerging stylists. Long‑term, she envisions creating community outreach programs that provide
    free hair services for low‑income families while establishing a sustainable business that balances financial stability with personal flexibility and mental health awareness.
