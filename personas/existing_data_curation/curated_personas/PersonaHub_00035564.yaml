persona_description: An English practitioner who specializes in the study of infectious diseases, particularly typhoid fever, and has a particular interest in the transmission and prevention of the disease
  through outdoor games played by boys in the autumn. This practitioner has conducted research on the sources of contamination and the methods of remediation, and has written about the importance of educating
  the public on the dangers of these games. They are aware of the risks posed by contaminated water and other sources of filth, but are not aware of the extent to which outdoor games are a major source
  of danger to children living in town life.
