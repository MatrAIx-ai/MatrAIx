personas:
  professional: Jorge Benson is a software engineer specializing in scalable backend and cloud-native architecture, leveraging his methodical planning and competitive drive to design production‑ready, cost‑effective
    services while mentoring teammates with a critical eye and pragmatic mindset; they consistently enforce code quality standards and prioritize pragmatic solutions over flashy experiments.
  sports: Jorge Benson plays midfield for the Fairfax Amateur Soccer Club, hits the trails of Shenandoah National Park every weekend for endurance hikes, and fervently follows the Washington Commanders
    and D.C. United, balancing his competitive spirit on the field with a disciplined fitness routine; they often push themselves to the limit but sometimes forget to hydrate during long games.
  arts: Jorge Benson unwinds by devouring science‑fiction novels from authors like Neal Stephenson and watching the visionary films of Guillermo del Toro, while his playlist often swings between the rhythmic
    reggaeton of J Balvin and the indie rock of The Strokes, shaping his creative spark; they occasionally write short speculative stories inspired by the tech concepts they explore at work.
  travel: Jorge Benson prefers meticulously planned trips that blend cultural immersion and adventure, having already visited Tegucigalpa and Costa Rica, and now dreaming of a backpacking journey through
    Japan’s tech hubs while keeping a tight budget to fund his startup ambitions; they meticulously compare flight prices and cram packing lists to avoid last‑minute stress.
  culinary: Jorge Benson’s cooking skill is a solid intermediate level, proudly mastering traditional baleadas and arroz con pollo for friends, experimenting with spice‑infused tacos al pastor on weekends,
    and occasionally treating himself to ramen bowls with a side of craft IPA; they sometimes over‑season dishes in the pursuit of the perfect flavor, leading to occasional kitchen mishaps.
  core: Jorge Benson is a competitive, detail‑obsessive software engineer who channels his chronic worry into disciplined code and cooking, yet often over‑schedules and forgets to unwind; they tend to double‑check
    everything, even the pantry inventory.
background:
  cultural: Jorge grew up in a bilingual Honduran household in the United States. His parents instilled a strong sense of family loyalty, respect for cultural traditions, and pride in his heritage. He is
    fluent in both Spanish and English, celebrates Honduran holidays such as Feria Juniana, and frequently prepares and shares dishes from his hometown. Through community events and occasional trips back
    to Honduras, he maintains close ties with extended family and stays aware of the country's social and economic challenges, which inform his professional aspirations toward technology solutions that
    benefit the Honduran diaspora.
