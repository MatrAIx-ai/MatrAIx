  career_goals: Jorge aims to become a lead architect for cloud‑native services within the next three years, leveraging his competitive drive to lead high‑performing engineering teams. He plans to earn
    the AWS Solutions Architect Professional certification and spearhead projects that improve financial inclusion for Central American communities. Ultimately, he envisions launching his own startup focused
    on secure, low‑cost remittance platforms, while embedding robust stress‑management practices into his team's workflow to balance his practical nature with his well‑being.
