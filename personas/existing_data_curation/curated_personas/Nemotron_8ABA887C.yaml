  hobbies: '[''Golf'', ''Community volunteering'', ''Soul food cooking'', ''Jazz and blues music'', ''Road trips along the Florida coast'', ''Tropical gardening'', ''African American cultural festivals'',
    ''Museum visits'', ''Trivia nights'', ''Stand-up comedy'']'
  career_goals: Raleigh aims to earn the Certified Facility Manager (CFM) credential and advance to a regional facilities‑operations director role for a major hospitality or real‑estate firm. He wants to
    spearhead a campus‑wide green‑building transformation that dramatically cuts energy use, while establishing a mentorship pipeline for emerging minority facility professionals. Long‑term, he envisions
    transitioning to independent consulting, sharing his expertise at industry conferences, and publishing case studies on resilient, community‑focused facilities management.
