personas:
  professional: Raleigh Simmons, a veteran facilities‑management leader with three decades of HVAC, plumbing, and electrical expertise, leverages their methodical planning, curiosity for sustainable technologies,
    and charismatic communication to design preventive‑maintenance programs, negotiate vendor contracts, and inspire diverse teams toward energy‑efficiency milestones in hospitality settings.
  sports: Raleigh Simmons, an avid golfer at West Palm Beach Golf Club, racks up weekend rounds on Palm Beach’s championship courses, follows the Miami Heat and Tampa Bay Buccaneers with spirited pool‑side
    debates, and they maintain light fitness by walking their tropical garden and joining a senior pickleball league at the local community center.
  arts: Raleigh Simmons, a regular at the Blue Marlin Jazz Club, immerses themselves in live performances by Gregory Porter and Wynton Marsalis, collects vintage blues vinyls by B.B. King, and they actively
    participate in cultural heritage festivals and museum tours at the local History Museum, which fuel their appreciation for storytelling through music and visual art.
  travel: Raleigh Simmons, who favors spontaneous weekend road trips along the Atlantic Coast, enjoys cruising to Savannah’s historic squares, Charleston’s waterfront eateries, and the sunny beaches of
    Amelia Island, plans itineraries on a whiteboard over coffee, and they balance budget constraints by staying in modest beachfront motels while dreaming of a future Caribbean cruise to Jamaica and the
    Dominican Republic.
  culinary: Raleigh Simmons, a confident home chef, regularly prepares soulful Southern staples like shrimp and grits and Caribbean classics such as jerk chicken with scotch bonnet peppers, seasons dishes
    with fresh cilantro and mango chutney from their own garden, and they love hosting potluck gatherings where the feast often includes collard greens, plantain fritters, and sweet potato pie, though they
    sometimes overindulge in buttery biscuits.
  core: Raleigh Simmons, a charismatic facilities veteran who blends meticulous sustainability initiatives with a love for jazz, golf, and garden‑grown flavor, is known for their weekly trivia domination,
    occasional forgetfulness about taking medication, and they have a habit of humming blues riffs while reviewing HVAC schematics.
background:
  cultural: Raleigh is a Black Floridian whose upbringing blended Southern and Caribbean influences. He grew up immersed in African‑American church life, gospel music, and family storytelling, which fostered
    his cooperative and considerate nature. Celebrating Black History Month and preserving oral histories are important to him, as is supporting the local NAACP chapter and the African American Museum of
    History and Culture in West Palm Beach. Though never married, he maintains close ties with extended family and mentors younger relatives, valuing community solidarity and resilience cultivated through
    navigating professional spaces where he was historically underrepresented.
attributes:
  skills: '[''HVAC system oversight'', ''Plumbing and electrical maintenance coordination'', ''Preventive maintenance scheduling'', ''Compliance and safety inspections'', ''Budgeting and cost control'',
