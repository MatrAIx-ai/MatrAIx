  career_goals: Aishwarya aims to transition into a supervisory and lead‑trainer role within her department, focusing on developing culturally aware, trauma‑informed policing curricula. She plans to earn
    advanced certifications such as Certified Law Enforcement Trainer and pursue a master's degree in criminal justice to deepen her strategic perspective. Long‑term, she envisions launching a private security
    consultancy that offers safety audits and customized training for schools and community centers, blending her educational expertise with protective‑service experience. She also hopes to serve as a liaison
    between the police and the South Asian community, advocating for policies that improve officer wellbeing and community trust.
