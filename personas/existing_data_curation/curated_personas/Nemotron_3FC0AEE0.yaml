personas:
  professional: Craig King is a budding game strategist and electronics hobbyist who merges his love for Civilization and StarCraft with Arduino-driven LED projects, and they apply their critical, skeptical
    mindset to refine tactics while balancing curiosity with practical problem-solving.
  sports: Craig King enjoys hiking the Appalachian trails and fishing at local streams for balance, plays on their middle school varsity soccer team during the fall season, and they cheer for the Pittsburgh
    Steelers and Washington Capitals while also belonging to a community fishing club on weekends.
  arts: Craig King immerses themselves in bluegrass legends like Bill Monroe, classic rock titans such as Led Zeppelin, metal icons like Metallica, and also devours comic books ranging from Saga to Spider-Man,
    and they let the rhythmic storytelling shape their creative projects.
  travel: Craig King prefers meticulously planned weekend trips to nearby natural spots like Shenandoah National Park and occasional family visits to Washington, D.C., yet they daydream about backpacking
    the Inca Trail in Peru, balancing low-key exploration with a flicker of adventurous ambition.
  culinary: Craig King favors protein-rich meals like grilled trout with lemon-dill sauce, pepperoni pizza, and homemade chili with kidney beans, but their cooking skill hovers at a middle-school level
    where they can bake chocolate chip cookies yet rarely tackle complex techniques beyond assembling LED-lit snack trays, and they often snack on chips while gaming.
  core: Craig King is a tech-savvy, quietly competitive teen who balances strategic gaming, hands-on electronics, and outdoor pursuits, and they often overindulge in video game snacks while occasionally
    forgetting to wear their glasses.
background:
  cultural: Craig grew up in Huntington, West Virginia, a city shaped by its Appalachian roots and an industrial legacy of coal and steel. His family reflects a typical white, working‑class background in
    the region, with stories of generations who worked in mines or factories, fostering a strong sense of self‑reliance and practicality. Local culture emphasizes modesty, community resilience, and a close‑knit
    social circle; festivals like the West Virginia Strawberry Festival and community church gatherings are part of his upbringing. While the area has faced economic challenges, there is a deep pride in
    the natural landscape—the hills, forests, and rivers—which influences Craig's love of outdoor activities. This cultural mix of hard‑working pragmatism, modest competitiveness, and appreciation for both
    tradition and new ideas shapes his worldview.
