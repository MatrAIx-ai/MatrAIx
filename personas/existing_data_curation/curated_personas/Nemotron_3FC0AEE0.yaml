    and fishing in local parks'', ''Music (bluegrass, classic rock, metal)'', ''Collecting comic books'']'
  career_goals: Craig aspires to turn his curiosity and practical skills into a career in engineering, ideally merging software and hardware. His short‑term goal is to graduate high school with a strong
    STEM record and earn a scholarship to study mechanical or electrical engineering at a university. He dreams of leading a robotics team that competes regionally, and eventually wants to design sustainable
    technology solutions—such as low‑cost renewable‑energy devices—that could help Revitalize the Appalachian region. While he is competitive and ambitious, Craig also values independence, so he envisions
    a path that lets him create and innovate on his own terms.
