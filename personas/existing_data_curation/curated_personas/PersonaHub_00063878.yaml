persona_description: A scientist who specializes in the study of lysosomal storage diseases, particularly those caused by mutations in the gene encoding lysosomal enzymes. She is particularly interested
  in the engineering of IgG-enzyme fusion proteins to enable BBB transport and is looking for alternative approaches to achieve this goal. Her research interests include the genetic engineering of lysosomal
  enzymes, the design of IgG-enzyme fusion proteins, and the development of IV ERT for these diseases. She is looking for a flexible and immunogenic linker between the IgG and enzyme domains to ensure high
  enzyme activity after fusion.
