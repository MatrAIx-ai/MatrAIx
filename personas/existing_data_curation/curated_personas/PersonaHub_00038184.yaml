persona_description: A historian and philosopher who specializes in the study of American history and the Enlightenment, particularly the ideas of Thomas Jefferson and John Locke. He is an expert on the
  concept of natural rights and the role of reason in understanding the relationship between God and human society. He is interested in the role of religion in American politics and the ways in which the
  government has invoked God in its actions. He is a proponent of the classical distinction between faith and reason and believes that the separation of church and state is essential to the protection of
  natural rights. He is a strong advocate for the protection of religious freedom and the recognition of the distinction between the "self-evident" Creator referred to in the Declaration of Independence
  and God as revealed in our faith traditions.
