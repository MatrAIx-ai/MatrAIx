  career_goals: Jeff aims to achieve ASE Master Technician certification within the next two years, strengthening his credibility in both conventional and emerging automotive technologies, such as hybrid
    and electric vehicle systems. He envisions opening a small, community‑focused repair shop that offers affordable services and a training program for local youth interested in automotive trades. Additionally,
    Jeff hopes to take on a leadership role in his local union chapter, advocating for fair wages and safe working conditions, while staying involved in continuing education to keep pace with evolving vehicle
    technology.
