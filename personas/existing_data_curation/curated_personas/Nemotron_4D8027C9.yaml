personas:
  professional: Francis Carter is an aspiring mechanical tinkerer who devotes after‑school hours to building LEGO sets and simple gear kits, channeling a practical, routine‑driven mindset into early engineering
    curiosity while casually juggling school assignments with a relaxed view of deadlines.
  sports: Francis Carter is a member of the Southside Youth Soccer League (U‑12) and plays on the Eastside Middle School Tigers basketball team, loving the predictable practice schedule and the camaraderie
    of teammates, while occasionally forgetting their water bottle or shin guards due to a laid‑back attitude toward obligations; they cheer for the Los Angeles Lakers and FC Barcelona as their favorite
    professional teams.
  arts: 'Francis Carter immerses themselves in graphic novels like ''My Hero Academia'' and ''Spider-Man: Into the Spider‑Verse'', strums simple chords to Ed Sheeran and Shawn Mendes on a beginner guitar,
    and channels creative energy into Minecraft builds and LEGO creations, seeing these artistic outlets as a structured way to express imagination.'
  travel: Francis Carter enjoys family road trips to places such as Yellowstone National Park and Orlando’s theme parks, where routine hotel check‑ins and scheduled activities feel comforting, yet they
    dream of visiting Tokyo, Japan to experience anime culture firsthand, balancing a love for predictable itineraries with occasional bursts of adventurous curiosity.
  culinary: Francis Carter favors easy, familiar foods like pepperoni pizza, mac and cheese, and grilled salmon caught on fishing trips, can whip up a decent grilled cheese and microwave ramen, and enjoys
    snacking on trail mix with dried cranberries and pretzels, often experimenting with LEGO‑shaped cookie cutters for fun.
  core: Francis Carter is a sociable, routine‑loving 12‑year‑old who toggles between team sports, gaming marathons, and LEGO builds while wrestling with intense anxiety and a habit of occasional procrastination.
background:
  cultural: Francis grew up in a middle‑class white family in Marshfield, Missouri, a small town in Greene County with a strong Midwestern, evangelical Protestant culture. His family attends a local Methodist
    church, where weekly services, potluck meals, and youth group activities shape his social life. The community values modesty, hard work, respect for tradition, and close‑knit neighborhood ties. Seasonal
    events such as county fairs, high school football games, and outdoor festivals are central to his upbringing, reinforcing a sense of belonging and the importance of community involvement. These cultural
    influences have instilled in him a practical outlook, a preference for familiar routines, and a collaborative spirit.
attributes:
  skills: '["interpersonal communication","team collaboration","basic computer literacy","Scratch programming","routine household chores","LEGO building","mechanical kit assembly","conflict mediation"]'
  hobbies: '["soccer","basketball","video gaming (Minecraft, Fortnite)","LEGO building","mechanical kits","fishing","biking","church youth group","community service","reading graphic novels","guitar practice"]'
  career_goals: He dreams of a future where he can combine his love for people and his practical skills. Francis hopes to become a middle‑school teacher or youth sports coach, roles that let him foster
    a supportive environment and guide younger students. He is also intrigued by hands‑on professions like automotive repair or firefighting, where he can follow clear procedures and help his community.
    His ultimate ambition is to work in a career that balances routine, teamwork, and the opportunity to make a positive impact on others.
