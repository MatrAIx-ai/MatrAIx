persona_description: A marine biologist specializing in the study of pilot whales, particularly their behavior, ecology, and conservation. This individual is likely to have extensive knowledge of the biology,
  behavior, and ecology of pilot whales, including their distribution, habitat preferences, feeding habits, and conservation status. They are likely to have experience with fieldwork, research, and data
  analysis, and are knowledgeable about the challenges and threats facing pilot whales in the wild. They may also have a keen interest in the evolutionary history and potential extinction of pilot whales,
  as evidenced by the discussion of the extinction of Long-finned pilots in north Pacific and the adaptation of Tappanaga (Shiogondou) to colder waters.
