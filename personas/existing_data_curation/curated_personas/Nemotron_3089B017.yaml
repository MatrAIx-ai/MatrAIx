  career_goals: Parry aims to move from first‑line supervision to a store manager role within the next two years, leveraging his organizational strengths to run an entire location. Long‑term, he envisions
    becoming a district manager overseeing several stores, which would allow him to implement standardized procedures that reduce workplace uncertainty. He also plans to complete a GED to formalize his
    knowledge, and he hopes to eventually open a small, community‑focused boutique that balances stable income with a low‑stress environment. Personal development goals include learning stress‑management
    techniques to mitigate his frequent anxiety.
