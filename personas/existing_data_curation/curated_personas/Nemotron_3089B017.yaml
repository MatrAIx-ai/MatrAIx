personas:
  professional: Parry Brown is a retail operations supervisor with expertise in staff scheduling, inventory control, POS management, and sales analytics, and they apply their methodical, anxiety‑driven
    need for predictability to keep store performance metrics tightly monitored and the floor running like clockwork.
  sports: Parry Brown follows the San Diego Padres and the San Diego State Aztecs football team, participates in the Mission Trails Hiking Club, and occasionally joins pick‑up basketball games at a community
    center, using these structured activities to manage stress while staying fit.
  arts: Parry Brown appreciates the songwriting of Bob Dylan, the storytelling of John Steinbeck, and the classic western scores of Ennio Morricone, and they often attend performances at the La Jolla Playhouse
    while listening to 1970s rock on a vintage record player as they arrange model train layouts.
  travel: Parry Brown prefers meticulously planned road trips to nearby natural retreats such as Big Bear Lake and Joshua Tree, dreams of a structured backpacking adventure across New Zealand’s South Island,
    and they keep international travel an occasional treat due to limited vacation days and a steady budget.
  culinary: Parry Brown enjoys cooking simple, well‑executed meals such as grilled salmon with lemon‑dill sauce, classic meatloaf with mashed potatoes, and occasional fish tacos topped with tangy cabbage
    slaw, and they rely on fresh Pacific cod and a well‑organized spice rack to keep the kitchen stress‑free.
  core: Parry Brown is a methodical retail supervisor who channels anxious energy into hyper‑organized store operations, finds calm in solitary hobbies like model trains and fishing, and struggles with
    a habit of over‑planning every aspect of life, as they constantly check and re‑check schedules.
background:
  cultural: Parry grew up in a working‑class, largely Anglo‑American family in the San Diego metropolitan area. His upbringing emphasized self‑reliance, a strong work ethic, and practical problem solving.
    Though his formal education stopped before ninth grade, he learned skills on the job and through community mentors. He identifies with mainstream American cultural norms—celebrating holidays like Thanksgiving
    and Fourth of July, enjoying local sports teams such as the San Diego Padres, and maintaining a modest connection to the Christian values prevalent in his neighborhood. The diverse cultural environment
    of La Mesa has exposed him to Hispanic influences, but his personal identity remains centered on his White, Western U.S. heritage.
