personas:
  professional: Olga Arencibia, a veteran vending‑machine technician with three decades of hands‑on mechanical and electrical expertise, leverages their meticulous documentation, safety‑first mindset, and
    tight scheduling skills to keep coin‑operated devices running flawlessly while pursuing senior certifications and a future eco‑friendly regional service team leadership role.
  sports: Olga Arencibia, a member of the Silver Oak Walking Club, enjoys strolling predetermined park loops five times a week, follows the San Antonio Spurs and San Antonio FC for seasonal excitement,
    and plays low‑impact pickleball at the community center to stay active without overexertion.
  arts: Olga Arencibia finds solace in evening listening sessions featuring Bach's Brandenburg Concertos, Yo‑Yo Ma's cello suites, and the classical guitar works of Pepe Romero, occasionally attending intimate
    gallery openings at the San Antonio Museum of Art where they admire contemporary pieces that echo vintage aesthetics.
  travel: Olga Arencibia prefers meticulously planned trips, having explored historic sites in Seville, Granada, and Barcelona, as well as a serene weekend retreat in Napa Valley, while dreaming of a future
    eco‑tour of the Azores, all balanced against a modest travel budget and a penchant for structured itineraries.
  culinary: Olga Arencibia crafts traditional Spanish dishes such as paella valenciana with saffron, gazpacho using garden‑grown heirloom tomatoes, and tortilla de patatas seasoned with smoked paprika,
    taking pride in mastering each recipe’s precise timing and flavor balance.
  core: Olga Arencibia blends methodical engineering precision with a quiet devotion to vintage coin‑op machines, channeling anxiety‑driven meticulousness into gardening, classic cooking, and a structured,
    solitary lifestyle.
background:
  cultural: Olga’s cultural identity is rooted in her Spanish ancestry, with family origins in Andalusia. She grew up speaking both Spanish and English, celebrating holidays such as Semana Santa and the
    Feria de Abril with family‑cooked paella, gazpacho, and traditional sweets. Catholic traditions and the value placed on hard work and familial loyalty shape her worldview. Living in South San Francisco,
    she participates in the local Hispanic community, attends Spanish‑language church services, and enjoys occasional gatherings that honor her heritage while maintaining a pragmatic, organized lifestyle.
attributes:
  skills: '[''Mechanical repair of vending and amusement machines'', ''Electrical troubleshooting and circuit diagnostics'', ''Preventive maintenance scheduling'', ''Inventory management and parts procurement'',
