persona_description: A graduate student in mathematics at the National Socio-Environmental Synthesis Center, a National Science Foundation-supported institution, who has been researching the factors contributing
  to the collapse of advanced, sophisticated, complex, and creative civilizations, particularly focusing on the relationship between population and resources, and the economic stratification of society
  into Elites and Masses. The research has been done with funding from NASA's Goddard Space Flight Center and is published in Ecological Economics. The research has been described as providing a useful
  timeline for when modern civilization may turn into a post-apocalyptic nightmare, but also highlights the advantage of greater knowledge of what has gone wrong in the past and the capacity to build models
  like Human And Nature Dynamics (HANDY).
