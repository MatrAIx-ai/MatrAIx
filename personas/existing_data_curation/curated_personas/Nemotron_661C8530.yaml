  career_goals: Gerard aims to transition from senior developer to a technical leadership role within the next three years, targeting positions such as Lead Engineer or Solutions Architect where he can
    shape system design and mentor junior talent. He is driven to become a recognized contributor in the open-source community, especially in projects that blend software with creative experiences like
    interactive art installations. Long-term, Gerard envisions launching a side venture that offers AI-enhanced tools for small artists and creators, allowing him to merge his technical skillset with his
    appreciation for art. While ambitious, he prioritizes a schedule that preserves evenings and weekends for family, seeking a balanced career that supports both professional growth and personal wellbeing.
