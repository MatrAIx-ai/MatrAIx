personas:
  professional: Audrey Warren is a correctional supervisor who leverages seven years of frontline experience in staff scheduling, crisis de‑escalation, and trauma‑informed care, blending methodical planning,
    a curious eye for arts‑based rehabilitation, and a reserved yet assertive communication style to drive safety and reform.
  sports: Audrey Warren roots for the Chicago Bulls and Chicago Blackhawks, runs with a local Lakefront Trail running club on Saturday mornings, and plays casual pickleball games with colleagues at the
    facility’s recreation hall.
  arts: Audrey Warren immerses herself in the contemporary art scene by attending gallery openings that feature abstract expressionists like Mark Rothko, drawing inspiration from performance artist Kara
    Walker, quoting poet Ocean Vuong in her sketches, and co‑creating community murals alongside local artist collectives while writing short stories echoing the narrative tones of Jhumpa Lahiri and Ta‑Nehisi
    Coates.
  travel: Audrey Warren plans trips with exhaustive checklists, favoring culturally rich city escapes such as a literary tour of Dublin, a mural‑focused weekend in Berlin, and a planned cabin retreat in
    the Great Smoky Mountains, while also squeezing in spontaneous road trips along the Lake Michigan shoreline whenever vacation days allow.
  culinary: Audrey Warren experiments with fusion soul‑food, mastering smoky collard‑green gratin with miso, sweet‑potato gnocchi tossed in cayenne‑infused butter, and a deconstructed peach cobbler spiced
    with cardamom, moving confidently between confident skillet skills and occasional over‑salted mishaps.
  core: Audrey Warren fuses disciplined correctional leadership with an introspective artist’s soul, turning anxiety into creative energy, meticulously planning both career milestones and mural projects,
    while indulging in spontaneous paint‑splashed evenings and quiet lake walks.
background:
  cultural: Audrey is a second-generation African American raised in Chicago's South Side, where her parents migrated from the Mississippi Delta during the Great Migration. She grew up immersed in the city's
    rich Black cultural heritage—church gatherings, blues and jazz music, and community festivals such as the Chicago African American Heritage Festival. Her family traditions include storytelling, celebrating
    Juneteenth, and preparing soul-food recipes passed down through generations. These experiences inform her deep awareness of systemic inequities that affect Black communities, particularly in the criminal-justice
    system. Audrey's humanities education reinforced her appreciation for Black literature, visual arts, and philosophy, shaping her commitment to culturally responsive practices and advocacy for restorative
    justice within correctional institutions.
