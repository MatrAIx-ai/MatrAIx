  career_goals: Audrey aims to advance to a deputy warden role within the next five years, leveraging a Master's in Public Administration to strengthen her strategic leadership capabilities. She is passionate
    about institutional reform and plans to design a dedicated arts-therapy unit that integrates visual and performing arts into inmate rehabilitation, with measurable outcomes for recidivism reduction.
    Additionally, she seeks to champion mental-health resources for correctional staff, establishing peer-support programs and trauma-informed training curricula. Her long-term ambition is to influence
    state-level correctional policy, presenting evidence-based research at national conferences and contributing to legislative initiatives that promote equity and restorative justice.
