  career_goals: Maria aims to advance from her current representative role to a supervisory or quality‑assurance position within the next three years, where she can shape service standards and mentor junior
    agents. She plans to obtain a Certified Customer Service Professional (CCSP) credential to formalize her expertise and to lead a high‑performing team that consistently exceeds key performance indicators.
    Long‑term, Maria envisions transitioning into a training specialist role, developing structured onboarding programs that blend practical skill development with a focus on measurable outcomes, while
    also preparing for a comfortable retirement supported by steady career progression and professional certifications.
