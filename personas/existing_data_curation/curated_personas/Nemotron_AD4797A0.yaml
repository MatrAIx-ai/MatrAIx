  career_goals: Although retired from formal employment, Vanessa aims to deepen her impact as a mentor and cultural steward. She plans to lead a senior advisory board for the Queens community center, develop
    a weekly storytelling series that preserves oral histories of Black Caribbean families, and co‑author a memoir of her life experiences. Vanessa also hopes to enroll in a local college course on digital
    photography to document community events, and to travel to Jamaica to reconnect with extended family and bring back recipes and traditions to share with her neighborhood.
