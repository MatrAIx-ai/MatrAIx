personas:
  professional: An observant toddler named Michelle Lawhorn, who delights in structured play routines and is already showing early signs of curiosity for sorting blocks, demonstrates how a love for predictability
    and responsibility can manifest even before preschool.
  sports: A tiny sports fan named Michelle Lawhorn, who cheerfully waves a miniature Carolina Panthers flag during Sunday games and attends a local toddler gymnastics class on the community park schedule,
    balances their love for the Charlotte Hornets with their own playful rope‑climbing on the backyard swing set.
  arts: A little art enthusiast named Michelle Lawhorn, who sings along to Dolly Parton's classics, giggles at Sesame Street's animated sketches, and enjoys storytime sessions featuring Dr. Seuss books
    in the church's children's corner, lets these creative moments shape their early sense of rhythm and imagination.
  travel: A curious explorer named Michelle Lawhorn, who has taken their family on weekend picnics to the nearby Walnut Creek Farm and a short drive to the Outer Banks’ sandy shores, dreams of tasting the
    salty breeze of Charleston’s historic harbor and someday stepping onto Disney World’s Magic Kingdom.
  culinary: A young foodie named Michelle Lawhorn, who loves the buttery crumb of homemade biscuits, sips a tiny sip of sweet tea (with a straw), and eagerly gnaws on soft chicken nuggets and mashed sweet
    potatoes seasoned with a pinch of cinnamon.
  core: A structured, sweet‑toothed toddler named Michelle Lawhorn blends Southern hospitality with a love for tidy routines, bright piggy banks, and tiny bursts of cheer for local sports teams.
background:
  cultural: Michelle is raised in a white, Southern family in Clayton, North Carolina, a small‑town community in Johnston County. Her upbringing reflects Southern cultural values such as hospitality, close‑knit
    family ties, and regular participation in community and church events. Family traditions include celebrating holidays with classic Southern foods like biscuits, fried chicken, and sweet tea, as well
    as weekend outings to local farms and nature trails. The rhythm of daily life follows a predictable schedule that reinforces stability and reliability, resonating with her personality’s preference for
    structure.
