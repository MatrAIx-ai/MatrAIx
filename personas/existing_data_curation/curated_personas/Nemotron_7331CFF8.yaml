  career_goals: Santiago aims to channel his sociable energy and competitive drive into a sustainable, community‑focused venture. He dreams of launching a mobile kitchen‑gallery—a food truck that serves
    authentic Mexican street food while showcasing works by local artists and hosting live music. To make this realistic, he plans to obtain a food‑handler certification, attend a short business‑management
    course, and develop a modest online presence through a YouTube channel where he shares cooking tutorials and artist interviews. Ultimately, he wants to become a recognized cultural bridge in Duval County,
    creating spaces where art, music, and cuisine intersect, while achieving financial independence to support himself and his family.
