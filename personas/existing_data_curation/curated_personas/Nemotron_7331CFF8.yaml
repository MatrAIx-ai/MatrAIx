personas:
  professional: Santiago Mateu, a 45‑year‑old community event promoter, leverages his charismatic communication, bilingual fluency, and quick self‑learning of technical skills to organize pop‑up galleries,
    live music nights, and street‑food gatherings, while his spontaneous, competitive mindset drives him to constantly seek larger audiences despite occasional disorganization.
  sports: Santiago Mateu enjoys weekend hikes through the Texas Hill Country and plays casual soccer with a local community league, while cheering for the San Antonio Spurs and the Texas Rangers, yet his
    competitive streak sometimes turns friendly matches into overly intense affairs.
  arts: Santiago Mateu immerses himself in the regional street‑art scene, regularly attending live Norteño and Tejano concerts featuring artists like Los Tigres del Norte and Selena, and participates in
    an improv theater troupe where his talkative, center‑stage energy fuels spontaneous performances, even as his skeptical outlook occasionally fuels creative tension.
  travel: Santiago Mateu frequently drives to the Mexican border to visit family, relishes weekend trips to Austin's music festivals, longs to explore Oaxaca's culinary markets but balances these desires
    against the financial constraints of launching his food‑truck venture.
  culinary: Santiago Mateu, a proficient home cook, delights in preparing tacos al pastor with pineapple‑marinated pork, simmering mole with chocolate and ancho chilies, and hearty pozole using hominy,
    corn masa, and epazote, and often experiments with smoked chipotle and fresh cilantro while hosting impromptu dinner parties that double as live music sessions.
  core: Santiago Mateu is a 45‑year‑old cultural conduit who fuses food, art, and music into community experiences, thriving on spontaneous energy and competitive drive, yet wrestles with organization,
    occasional health neglect, and impulsive spending.
background:
  cultural: Santiago grew up in a Mexican‑American household in Alice, Texas, where Mexican traditions blend with the rural Texan lifestyle. He is bilingual, speaking Spanish at home and English in the
    broader community. Family celebrations revolve around Día de los Muertos altars, Christmas posadas, and communal meals featuring mole, tamales, and barbacoa. The local Tejano culture, with its ranching
    roots, country music, and vibrant festivals, has shaped his identity. While he maintains strong ties to his Mexican heritage through cuisine, music, and religious customs, he also embraces the independent,
    frontier spirit of South Texas, which fuels his spontaneous and competitive nature. This dual cultural grounding gives him a unique perspective that he leverages when connecting people across cultural
    lines.
