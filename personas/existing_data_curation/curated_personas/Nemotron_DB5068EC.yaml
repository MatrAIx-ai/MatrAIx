  career_goals: Susan envisions a future where she works in a supportive, community‑focused role that blends routine with caring for others. She aspires to become an elementary school teacher or a pediatric
    health aide, professions that let her maintain a stable schedule while helping children thrive and stay healthy. Her calm demeanor and desire for harmony drive her ambition to create nurturing environments
    for the next generation.
