personas:
  professional: Don Reid is a seasoned environmental attorney in Rawlins who leverages their engineering background and meticulous research skills to craft data‑driven litigation strategies; they are known
    for a disciplined routine and collaborative nature that make them a go‑to mentor and mediator in multi‑party cases.
  sports: Don Reid engages in a weekly schedule with the Rawlins Community Basketball League, follows the Denver Broncos and Wyoming Cowboys for football, hikes the Medicine Bow–Raton trail system each
    weekend, and hones their marksmanship at the Rawlins Shooting Club, all of which reflect their energetic and disciplined approach to fitness.
  arts: Don Reid channels their hands‑on creativity through woodworking while unwinding to the sounds of classic country icons like Willie Nelson and Johnny Cash, and they occasionally attend performances
    by the Rawlins Community Theater, which together reinforce their appreciation for rugged, homegrown artistry.
  travel: Don Reid favors carefully planned road trips to nearby national treasures such as Yellowstone and Grand Teton, enjoys seasonal ski outings at Colorado's Vail resort, and dreams of a summer fishing
    expedition in British Columbia, all while balancing their legal practice and community commitments.
  culinary: Don Reid prefers hearty western fare—grilling bison steaks with hickory‑smoked BBQ sauce, simmering green chili stew with fresh garden tomatoes and beans, and baking cornbread with locally milled
    cornmeal—showcasing their modest cooking skills and love for farm‑to‑table freshness.
  core: Don Reid balances a strict, routine‑driven professional life with a flair for community basketball, meticulous financial spreadsheets, and a penchant for late‑night woodworking projects that often
    get delayed by their habit of over‑thinking every decision.
background:
  cultural: Don grew up in a small Midwestern town before moving to Rawlins, Wyoming, where he has lived for the past decade. His family traces its roots to German and Irish immigrants who settled in the
    American West in the late 19th century, instilling values of self‑reliance, hard work, and community service. He identifies with mainstream American cultural norms—celebrating holidays like Independence
    Day with local parades and rodeos, participating in town hall meetings, and being an active member of the Rotary Club. His upbringing emphasized practical education, respect for tradition, and a strong
    sense of civic duty, all of which shape his professional ethos and personal life.
attributes:
