  hobbies: '[''Weekly basketball league'', ''Hiking the Medicine Bow–Raton trails'', ''Volunteering at Rawlins Legal Aid Clinic'', ''Woodworking'', ''Target shooting'', ''Attending the Rawlins Rodeo'',
    ''Community book club'', ''Fishing on the North Platte River'', ''Gardening'']'
  career_goals: Don aims to become a partner and head of the environmental practice at his regional law firm, establishing a reputation for rigorous, results‑oriented advocacy that benefits both clients
    and the community. He plans to earn certification as a mediator and to expand pro bono services for low‑income residents of Fremont County. In the longer term, he aspires to serve as a district judge,
    leveraging his structured, fair‑minded approach to uphold the rule of law while maintaining the predictable routine he values. Simultaneously, he wants to publish a series of articles on Wyoming’s natural
    resource policy and mentor young attorneys, ensuring the next generation upholds high professional standards.
