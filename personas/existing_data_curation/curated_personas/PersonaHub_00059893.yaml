persona_description: A historian who specializes in the study of the American Civil War and Reconstruction era, with a particular focus on the legal and social changes that occurred during this period.
  They are deeply interested in the role of the 14th Amendment to the U.S. Constitution in protecting the civil liberties of African Americans and the subsequent disregard and ignoring of these protections.
  They are also knowledgeable about the history of Jim Crow laws, the culture of violence and brutality against African Americans, and the role of the Ku Klux Klan in perpetuating racial segregation. They
  are passionate about the civil rights movement and the ongoing struggle for equality and justice.
