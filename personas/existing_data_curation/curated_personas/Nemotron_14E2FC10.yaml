personas:
  professional: Tiffany Broussard, a retired community organizer, channels her curiosity and disciplined flexibility into coordinating free quilting and watercolor workshops for seniors and youth, leveraging
    their event-planning expertise and compassionate conflict-resolution skills to nurture a vibrant local arts scene.
  sports: Tiffany Broussard, an avid nature walker, joins the Bayou Stroll Seniors Club for weekly flat terrain walks, occasionally attends community yoga classes, and cheers for the New Orleans Saints
    while following local high school basketball games on Fridays.
  arts: Tiffany Broussard, a devoted creator, spends mornings quilting intricate patterns inspired by Georgia O'Keeffe's floral motifs, afternoons watercoloring scenes reminiscent of Claude Monet's gardens,
    and evenings arranging fresh wildflowers while attending performances by the local choir and occasional shows featuring folk musician Jo Dee Messina.
  travel: Tiffany Broussard, a meticulous planner with a love for historic charm, prefers relaxed road trips to towns like Natchez, MS and Savannah, GA, where they explore antebellum architecture, local
    art galleries, and sample regional cuisine, while ensuring each journey fits within their modest travel budget and occasional caregiving responsibilities.
  culinary: Tiffany Broussard, a Southern kitchen enthusiast, perfects crispy fried catfish seasoned with cayenne and buttermilk, savors slow-cooked shrimp etouffee with okra and fresh basil, and experiments
    with Mediterranean lamb tagine, all while faithfully growing heirloom tomatoes and basil in their backyard garden for fresh ingredients.
  core: Tiffany Broussard, a passionate community storyteller, balances a relentless curiosity and a knack for organizing with bouts of anxiety that drive them to seek solace in quilting, watercolor, and
    weekly choir sing-alongs.
background:
  cultural: Tiffany was born and raised in Oak Grove, a small town in West Carroll Parish, Louisiana. Her upbringing was steeped in Southern rural culture, with strong ties to family, church, and community
    gatherings. She grew up attending a Baptist church, where music, fellowship, and service shaped her values. The region’s culinary traditions—gumbo, jambalaya, and home‑cooked comfort foods—are integral
    to her family meals. Local crafts such as quilting circles and garden festivals provided early exposure to creative expression. While she embraces these traditions, Tiffany’s innate curiosity drives
    her to explore broader artistic movements and contemporary ideas, blending the comfort of her Southern heritage with an openness to unconventional perspectives.
attributes:
  skills: '[''Event planning and facilitation'', ''Quilting and textile arts'', ''Painting (watercolor and acrylic)'', ''Floral arrangement'', ''Gardening (vegetable and ornamental)'', ''Home budgeting
