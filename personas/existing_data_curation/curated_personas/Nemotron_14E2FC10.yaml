  hobbies: '[''Visiting art galleries and folk fairs'', ''Quilting'', ''Watercolor painting'', ''Floral arrangement'', ''Gardening (heirloom tomatoes, native wildflowers)'', ''Book club (literature and
    art history)'', ''Church choir and community sing‑alongs'', ''Nature walks along local bayous'', ''Road trips to historic towns'', ''Cooking Southern cuisine and recipe experimentation'']'
  career_goals: As a retired resident, Tiffany’s ambitions center on enriching her community and preserving her personal legacy. She aims to launch a small community arts program that offers free quilting
    and painting workshops for seniors and youth, fostering intergenerational creativity. She is working on a memoir that weaves together family history, local customs, and her reflections on art and resilience,
    hoping to publish it for local libraries. Additionally, Tiffany aspires to become a mentor for younger volunteers at her church, sharing her event‑planning expertise and emotional‑support skills, while
    continuing to explore new artistic techniques and maintain her mental well‑being through mindfulness practices.
