personas:
  professional: Shani Timpe, a 39‑year‑old cleaning specialist in Tampa, leverages her fifteen years of deep‑cleaning expertise, OSHA knowledge and hospitality training to mentor staff and design eco‑friendly
    housekeeping SOPs, positioning herself for a supervisory role in a boutique resort.
  sports: Shani Timpe supports the Tampa Bay Buccaneers and the Tampa Bay Rays, joins a local walking club that meets every Saturday morning at the Riverwalk, and keeps fit through low‑impact cardio and
    occasional community softball games, preferring routine exercise over high‑intensity training.
  arts: Shani Timpe relaxes with classic 1970s family dramas such as "The Way We Were" and enjoys listening to Elton John and local folk singer Andy Pratt while knitting, occasionally attending community
    theater productions of "Our Town" that reinforce her love for timeless storytelling.
  travel: Shani Timpe favors well‑planned, low‑stress trips, often visiting coastal destinations like Key West, Charleston, and Savannah for weekend getaways, and dreams of a road‑trip along the Gulf Coast
    to explore historic lighthouses, balancing limited vacation days with a modest travel budget.
  culinary: Shani Timpe cooks simple, comforting Gulf seafood dishes—grilled grouper with lemon‑herb butter, shrimp étouffée using garden‑grown basil and oregano—while mastering the art of homemade tomato
    sauce from her backyard harvest, preferring home‑cooked meals over dining out.
  core: Shani Timpe is a methodical cleaning veteran who cultivates a backyard garden, sticks to routine walks, and dreams of leading a green housekeeping team, though she sometimes forgets to water her
    tomatoes when work gets hectic.
background:
  cultural: Shani was raised in a middle‑class, suburban community in the Tampa metropolitan area, where the blend of Southern hospitality and coastal lifestyle shaped her worldview. As a white American,
    she grew up celebrating traditional holidays such as Thanksgiving, Christmas, and the Fourth of July, while also partaking in local events like the Gasparilla Festival, which introduced her to the region’s
    eclectic cultural mix. Her family emphasized practicality, hard work, and a strong sense of responsibility—values that align with the broader Floridian work ethic. Though she identifies with mainstream
    American culture, the proximity to the Gulf Coast has fostered an appreciation for seafood cuisine, outdoor recreation, and a relaxed pace of life. She maintains a connection to her community through
    her church, where she values small‑group fellowship and service. These cultural influences reinforce her preference for routine, her cooperative nature, and her desire to contribute positively to her
    surroundings.
attributes:
  skills: '[''Deep cleaning techniques (carpet extraction, steam cleaning)'', ''Floor care (strip-and-wax, buffing, tile maintenance)'', ''Bathroom and kitchen sanitation'', ''Laundry and fabric care (stain
    removal, proper drying)'', ''Inventory management of cleaning supplies'', ''Scheduling and time management for routine tasks'', ''Safe chemical handling and OSHA compliance'', ''Basic maintenance (light
    bulb replacement, minor repairs)'', ''Customer service and professional communication'', ''Training and mentoring new cleaning staff'', ''Sustainable cleaning practices (eco-friendly products, waste
    reduction)'', ''Hospitality standards alignment (guest-service expectations)'']'
  hobbies: '[''Morning walks along Tampa Riverwalk'', ''Vegetable gardening (tomatoes, peppers, herbs)'', ''Reading historical fiction and home-organization guides'', ''Cooking simple comfort meals with
    Gulf seafood'', ''Knitting scarves and blankets'', ''Attending small church potluck gatherings'', ''Participating in neighborhood clean-up projects'', ''Watching classic 1970s-80s family movies'']'
  career_goals: Shani aims to move into a supervisory role within the hospitality sector, such as Housekeeping Supervisor or Manager at a boutique hotel or resort in the Tampa Bay area. To qualify, she
    plans to obtain the Certified Professional Housekeeper (CPH) credential and complete advanced training in sustainable cleaning practices. Over the next five years, she hopes to lead a team of cleaners,
    develop standard operating procedures that emphasize efficiency and environmental responsibility, and contribute to higher guest satisfaction scores. Parallel to her career advancement, she dreams of
    launching a small, family‑run residential cleaning service that specializes in green cleaning for homeowners who value routine and reliability. She also intends to further her education by pursuing
    a bachelor’s degree in Business Administration, which would equip her with the entrepreneurial skills needed to manage her own business and ensure financial stability for her family.
