  career_goals: Kwi Lin aims to advance to a supervisory role within the correctional system, such as Shift Commander or Deputy Warden, where he can implement technology‑driven safety protocols and develop
    comprehensive training programs. He plans to earn a master’s degree in Criminal Justice or Public Administration to deepen his strategic management skills. In the long term, he aspires to a leadership
    position overseeing multiple facilities, championing data‑informed policy reforms that improve inmate rehabilitation outcomes and staff well‑being. He also hopes to serve as a consultant on security
    system integration for correctional institutions, leveraging his STEM background to modernize operations.
