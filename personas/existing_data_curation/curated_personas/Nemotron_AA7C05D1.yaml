  hobbies: '[''Visiting art museums and galleries'', ''Photography (architectural focus)'', ''Painting and mixed‑media art'', ''Traveling to historic and culturally rich destinations'', ''Gardening'', ''Yoga
    and meditation for stress relief'', ''Community theater acting and production'', ''Cooking and exploring international cuisines'', ''Volunteering with local art education programs'', ''Guided group
    hikes and nature walks'']'
  career_goals: Janice aims to transition into a senior strategic role such as Director of Construction or start a boutique consultancy that focuses on marrying sustainable building techniques with artistic
    design. She is pursuing LEED AP certification to deepen her expertise in green construction and hopes to champion more community‑focused projects that incorporate public art installations. Mentoring
    the next generation of women in the construction industry remains a central ambition, as does achieving a healthier work‑life balance by delegating more responsibilities and integrating mindfulness
    practices into her daily routine.
