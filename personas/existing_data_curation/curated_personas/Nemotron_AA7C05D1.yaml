personas:
  professional: Janice Edwards, a seasoned construction manager with over three decades of experience, blends solid business acumen and a curiosity for innovative, sustainable design to lead large‑scale
    commercial and residential projects while mentoring junior staff and championing artistic integration, even as their relaxed, flexible approach sometimes leaves project timelines a bit chaotic, and
    they often rely on intuition to solve unexpected site challenges.
  sports: Janice Edwards enjoys group hikes with the local Green Trail Club and attends Tuesday night yoga at the community center, while cheering on the New Jersey Devils, the New York Giants, and the
    New York Mets, though they rarely engage in competitive sports beyond occasional charity 5K runs.
  arts: Janice Edwards, a lifelong art enthusiast, spends weekends at the Montclair Art Museum and the Met, captures architectural details inspired by Frank Lloyd Wright in their photography, paints watercolors
    echoing Georgia O’Keeffe, and performs in community theater productions of classics like Arthur Miller’s 'The Crucible', where they relish the collaborative energy.
  travel: Janice Edwards plans trips with a blend of meticulous itineraries and spontaneous detours, having explored the historic streets of Florence, the avant‑garde galleries of Barcelona, and the zen
    gardens of Kyoto, while dreaming of a future pilgrimage to Marrakech’s souks and a weekend retreat in the Catskills.
  culinary: Janice Edwards hosts dinner parties featuring dishes such as Thai green curry with fresh lemongrass, Italian risotto with arborio rice and porcini mushrooms, and Moroccan tagine spiced with
    cumin and preserved lemons, while their kitchen shelves are stocked with figs, olives, rosemary, and an ever‑present espresso machine, and they love pairing meals with curated playlists of classical
    piano.
  core: Janice Edwards, a 56‑year‑old construction veteran who fuses art and sustainability in building design, navigates life with boundless curiosity, social gusto, occasional disorganization, and a well‑known
    tendency to spiral into anxiety when deadlines loom.
background:
  cultural: Janice grew up in a suburban New Jersey setting with deep Mid‑Atlantic roots, tracing her family heritage to English and Irish ancestors. Raised in a community that values education, hard work,
    and civic engagement, she absorbed a blend of traditional American values and the cultural diversity of the greater New York metropolitan area. Her upbringing emphasized participation in local events,
    support for community arts, and an openness to new ideas—an outlook that continues to shape her personal and professional life.
attributes:
