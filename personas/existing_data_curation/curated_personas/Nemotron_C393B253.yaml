  hobbies: '[''Visiting art galleries and museums'', ''Exploring street art in downtown LA'', ''Participating in community theater'', ''Cooking traditional Mexican cuisine'', ''Dancing salsa and Mexican
    folk dances'', ''Gardening'', ''Volunteering at senior centers'', ''Attending cultural festivals'', ''Organizing art‑craft workshops'']'
  career_goals: Zacha aims to transition from floor sales to a supervisory role where he can shape the store’s culture and training programs. He envisions becoming a store manager who integrates art‑focused
    events—such as pop‑up exhibitions of local Mexican artists—into the retail space, fostering a vibrant community hub. Additionally, he hopes to launch a mentorship initiative for younger workers from
    immigrant backgrounds, helping them navigate the retail world and develop soft skills. In the longer term, Zacha dreams of opening a small boutique that showcases handcrafted Mexican crafts and offers
    workshops, blending his love of commerce, art, and cultural heritage.
