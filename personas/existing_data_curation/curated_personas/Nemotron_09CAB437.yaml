  career_goals: Michael aims to earn his GED within the next year and then enroll in a community college program that combines environmental science and civil engineering, aligning his curiosity about the
    natural world with practical career prospects. He dreams of becoming a park ranger or a sustainable infrastructure specialist, helping manage and protect the redwood‑filled landscape surrounding Ben
    Lomond. At the same time, he wants to build a modest online presence—streaming strategy game commentary and sharing hiking route videos—to leverage his sociable, talkative nature. Ultimately, Michael
    hopes to lead community‑focused projects, such as youth outdoor education programs, and secure a scholarship that will allow him to continue his studies while giving back to his hometown.
