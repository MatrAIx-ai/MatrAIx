personas:
  professional: Julius Dukes, a retired handyman‑engineer with lifelong experience in plumbing, electrical repairs, carpentry and classic car restoration, leverages his practical curiosity and competitive
    spirit to run quarterly DIY workshops and oral‑history sessions, and they are currently pursuing an engineering degree to formalize his tinkering expertise.
  sports: Julius Dukes stays active with leisurely morning walks along the Mississippi Riverfront, follows the New Orleans Saints and Pelicans with fervor, participates in a senior‑center bowling league,
    and they channel his competitive streak into weekly chess matches, treating each game as a mental workout.
  arts: Julius Dukes immerses himself in the rich sounds of the Treme Brass Band, classic jazz legends like Louis Armstrong and Wynton Marsalis, bell‑bottom‑era film noirs such as Double Indemnity, and
    documentaries on Southern history, and they often note passages for his memoir while sipping café au lait.
  travel: Julius Dukes dreams of a leisurely Mississippi River cruise, has already explored historic coastal towns like Savannah and Charleston, and they prefer flexible, senior‑discount travel plans that
    balance adventure with his health constraints.
  culinary: Julius Dukes concocts hearty gumbo with okra, andouille sausage, crawfish and file powder, simmered jambalaya with heirloom tomatoes and thyme from his garden, and indulgent beignets dusted
    with powdered sugar, and they showcase his mastery of traditional Creole cooking while experimenting with new herb blends.
  core: Julius Dukes is a ninety‑year‑old community‑focused handyman‑historian, and they blend fierce curiosity, practical DIY skills, a love for jazz and Southern cuisine, and a relaxed, slightly disorganized
    lifestyle into a lifelong quest to preserve and share heritage.
background:
  cultural: Julius grew up in the Treme neighborhood of New Orleans, a historic African-American and Creole enclave. His upbringing was shaped by the rhythms of jazz, brass bands, and the annual Mardi Gras
    festivities, as well as the close-knit church community of St. Augustine Catholic Church. He lived through segregation, the civil-rights era, and the post-Katrina rebuilding of the city, experiences
    that gave him a deep appreciation for resilience and cultural preservation. His family heritage blends Southern African-American traditions with Creole influences, including the French-based patois
    spoken by older relatives and the culinary customs of gumbo, po’boys, and red beans and rice. This rich cultural tapestry informs his values, his love for storytelling, and his commitment to sharing
    the history of his neighborhood with future generations.
attributes:
  skills: '[''home repair (plumbing, electrical)'', ''carpentry'', ''classic car restoration'', ''gardening (herbs, heirloom vegetables)'', ''oral storytelling and community history'', ''critical analysis
