  hobbies: '[''listening to jazz and brass-band music'', ''attending second-line parades'', ''gardening (herbs and heirloom vegetables)'', ''cooking traditional Creole dishes'', ''reading history and biographies'',
    ''playing chess at the senior center'', ''walking along the Mississippi Riverfront'', ''watching classic film noirs and documentaries'']'
  career_goals: Even in retirement, Julius is driven to leave a tangible legacy. He hopes to finish the college credits he never completed and earn a degree in engineering as a personal milestone. He is
    drafting a memoir that captures the African-American experience in New Orleans from the 1920s to today, and he plans to archive oral histories from longtime residents at the local library. He also wants
    to organize quarterly community workshops where he shares practical DIY skills and cultural stories, inspiring younger generations to value self-reliance and heritage. A modest travel ambition is to
    take a leisurely Mississippi River cruise before his health limits further journeys.
