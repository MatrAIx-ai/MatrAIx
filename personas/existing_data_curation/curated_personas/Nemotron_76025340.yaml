  hobbies: '[''building with LEGO bricks'', ''drawing and coloring'', ''reading picture books'', ''playing soccer and tag'', ''exploring nature and collecting objects'', ''caring for the family cat'', ''simple
    cooking activities with parents'', ''participating in school science club experiments'']'
  career_goals: Jeffrey dreams of a future where he can protect and care for others. He often talks about becoming a firefighter who rescues people and animals, a veterinarian who helps pets feel better,
    or a kindergarten teacher who guides young children in learning. In the present, his biggest ambition is to be the class helper—assisting his teacher with daily tasks, organizing reading circles, and
    being a supportive friend to his classmates.
