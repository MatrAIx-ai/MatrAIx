personas:
  professional: Jeffrey Lemos, a budding junior builder fascinated by LEGO architecture, shows early spatial reasoning and collaborative problem-solving, turning playground projects into informal design
    challenges while embodying the calm, cooperative spirit of his neighborhood gatherings.
  sports: Jeffrey Lemos plays in the Marietta Community Soccer League, cheers for Atlanta United FC, runs tag with friends at Lumpkin Park, and eagerly participates in school’s after-school basketball basics,
    balancing energetic play with a laid-back attitude toward winning or losing.
  arts: Jeffrey Lemos immerses in creative expression by drawing dinosaurs and planets, singing along to The Wiggles and Disney's 'Let It Go', and enjoys storytime sessions featuring Dr. Seuss at the Cobb
    County Public Library, letting those vivid narratives fuel his imagination.
  travel: Jeffrey Lemos loves family road trips to the Georgia Aquarium in Atlanta and occasional visits to the Disney World resort in Orlando, where they favor the hands-on animal encounters and the thrill
    of rides, but prefers the familiar comfort of stopping at a local drive-through ice-cream stand on the way home.
  culinary: Jeffrey Lemos delights in mixing cookie batter with vanilla and chocolate chips, relishes mac and cheese topped with breadcrumbs, and often helps garnish a plate of carrot sticks with ranch
    dip, showing a growing curiosity for simple recipes while occasionally making a mess of flour on the kitchen floor.
  core: Jeffrey Lemos is a compassionate, curious 6-year-old who balances boundless imagination with a laid-back, slightly disorganized approach to play, learning, and everyday chores.
background:
  cultural: Jeffrey was raised in the suburban community of Marietta, Georgia, where neighborhood gatherings, local school events, and family traditions shape his daily life. He attends a public elementary
    school that emphasizes cooperative learning and celebrates diverse cultures. Weekends often include attending church services with his family, joining community festivals such as the Marietta Street
    Fest, and visiting the Cobb County Public Library for storytime sessions. His family’s Southern upbringing highlights politeness, hospitality, and a strong sense of responsibility toward neighbors,
    reinforcing his compassionate and cooperative nature.
attributes:
  skills: '[''curiosity-driven questioning'', ''basic reading and writing'', ''basic arithmetic'', ''fine motor skills with LEGO and drawing'', ''empathy and conflict mediation'', ''following multi-step
