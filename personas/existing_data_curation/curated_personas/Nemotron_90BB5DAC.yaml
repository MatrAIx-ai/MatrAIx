  hobbies: '[''Visiting local art galleries and festivals'', ''Community theater stagehand'', ''Group fitness classes (Zumba, kickboxing)'', ''Co‑ed softball league'', ''Neighborhood clean‑up volunteering'',
    ''DIY home‑improvement projects'', ''Gardening vegetable and native plants'', ''Collecting vintage mechanical tools'', ''Reading technology and science magazines'', ''Experimenting with new recipes'']'
  career_goals: Gwendolyn aims to advance into a senior facilities management role where she can lead a larger maintenance team and shape strategic asset‑management policies. She plans to earn the Certified
    Facility Manager (CFM) credential and additional EPA certifications to deepen her expertise in sustainable building practices. Her competitive drive pushes her to implement data‑driven maintenance tracking
    systems that reduce downtime and cut operating costs. Long‑term, Gwendolyn envisions launching her own specialist repair consultancy focused on energy‑efficient retrofits for small‑to‑mid‑size businesses,
    while continuing to mentor aspiring technicians.
