  hobbies: '[''Traditional Spanish cooking'', ''Backyard gardening'', ''Community dancing and competitive bingo'', ''Reading mystery novels'', ''Knitting and crocheting'', ''Volunteering at senior center'',
    ''Genealogy research'', ''Listening to flamenco music'']'
  career_goals: Although retired, Juana aims to stay mentally and socially active by leading cooking workshops at the senior center, documenting family recipes in a bilingual cookbook, mentoring younger
    volunteers in event planning, and continuing her genealogy research to preserve her Spanish heritage. She also aspires to become comfortable with new digital tools for video chatting with scattered
    family members, and occasionally travel to Spain to visit her ancestral hometown.
