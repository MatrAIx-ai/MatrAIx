personas:
  professional: Juana Arrastia, a retired community activist, applies their bilingual communication, budgeting, and event coordination expertise to lead cooking workshops and craft sessions at the senior
    center, where their competitive spirit keeps participants energized while their organized routines ensure smooth operations.
  sports: Juana Arrastia participates in the Sunrise Walking Club’s daily morning strolls, enjoys cheering on the local baseball team, the Riverside Raiders, and watches the Los Angeles Lakers for a seasonal
    burst of basketball excitement, while also treating competitive bingo nights as a mental sport.
  arts: Juana Arrastia immerses themselves in flamenco music by listening to Paco de Lucía and Camarón de la Isla, attends church festivals featuring traditional folk dancers, and enjoys reading mystery
    novels by Agatha Christie, which influences their storytelling when they write down family recipes.
  travel: Juana Arrastia dreams of traveling to their ancestral hometown in Andalusia, Spain, while also favoring weekend trips to nearby historic missions and the coastal town of Santa Barbara, planning
    each journey with careful budgeting and a mix of guided tours and spontaneous detours.
  culinary: Juana Arrastia, a seasoned home cook, excels at preparing paella Valenciana, gazpacho, and churros, infusing home‑grown tomatoes, saffron, and chorizo from their garden into their dishes, and
    delights in sharing these meals during community events, though they often over‑salt their sauces in the excitement of new recipe experiments.
  core: Juana Arrastia is a spirited octogenarian who blends competitive bingo fervor, meticulous budgeting, and a love for flamenco and home‑cooked Spanish fare into a lively, community‑centered life.
background:
  cultural: Juana was raised in a Spanish‑American household that preserved many cultural traditions from Spain, such as cooking paella and tapas, celebrating Semana Santa and local fiestas, speaking Spanish
    at home, and attending a Catholic church. Living in Wauchula, Florida, she blends these customs with the local Floridian lifestyle, participating in community events, sharing Spanish recipes with neighbors,
    and maintaining strong family ties across generations.
attributes:
  skills: '[''Traditional Spanish cooking'', ''Seasonal vegetable gardening'', ''Household budgeting'', ''Bilingual Spanish-English communication'', ''Basic computer literacy'', ''Community event coordination'',
