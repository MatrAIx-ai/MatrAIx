personas:
  professional: Erica Todd is a board-certified internal medicine physician specializing in integrative health, who blends rigorous diagnostic reasoning with a humanities-infused approach, leading quality-improvement
    projects, mentoring residents, and championing art-based therapy curricula at her academic medical center.
  sports: Erica Todd follows the New England Patriots and the Boston Red Sox, participates in a local hiking club that explores the Metacomet Trail each fall, and attends weekly yoga classes at a community
    studio, balancing competitive fandom with personal fitness.
  arts: Erica Todd frequents the Yale University Art Gallery, where they study Monet's Water Lilies and the works of Jacob Lawrence, paints watercolors of the Connecticut shoreline, and immerses themselves
    in classical concerts featuring Beethoven and Philip Glass, while also belonging to a book club that dissects modern literature by Margaret Atwood and Kazuo Ishiguro.
  travel: Erica Todd enjoys planning weekend trips to historic New England destinations such as Newport and Acadia National Park, while also dreaming of immersive cultural tours of Florence and Kyoto, balancing
    meticulous itineraries with spontaneous detours to local farmer's markets, all within a modest travel budget supplemented by a travel rewards credit card.
  culinary: Erica Todd prefers New England clam chowder, lobster rolls, and homemade vegetable ratatouille, often cooking with fresh herbs like tarragon and sage, and they occasionally experiment with Mediterranean
    dishes such as Greek salad and Italian osso buco, reflecting an intermediate cooking skill and a love for seasonal, locally sourced ingredients.
  core: Erica Todd blends a disciplined New England work ethic, a physician's analytical mind, and a lifelong passion for the arts into a community-focused, curiosity-driven life marked by meticulous planning
    and occasional over-scheduling.
background:
  cultural: Erica was raised in a middle‑class New England family with deep roots in Connecticut. Her parents, both educators, emphasized the value of a broad liberal‑arts education and community service.
    Growing up in New Haven, she was immersed in the city's rich academic and cultural environment, attending public schools that celebrated both scientific inquiry and artistic expression. Her cultural
    identity reflects an Anglo‑American New England tradition, characterized by a strong work ethic, appreciation for classical arts, and a commitment to egalitarian social values, all of which continue
    to shape her professional and personal life.
