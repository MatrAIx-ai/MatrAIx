  hobbies: '[''Visiting museums and art galleries'', ''Watercolor painting'', ''Attending classical music concerts'', ''Reading contemporary literature and philosophy'', ''Writing reflective essays'', ''Participating
    in book clubs'', ''Hiking the Metacomet Trail'', ''Practicing yoga'', ''Volunteering at community health fairs'', ''Mentoring high‑school students in science and humanities'']'
  career_goals: Erica aims to become a department chair or program director at her academic medical center, where she can embed humanities‑based curricula into physician training. She plans to launch a
    community‑focused integrative health program that pairs conventional treatment with art‑based therapeutic interventions for chronic illness patients in New Haven. Over the next five years she hopes
    to secure federal research funding to study how visual arts exposure impacts patient outcomes, publish a book on the intersection of medicine and art, and serve on state health policy advisory boards
    to advocate for culturally sensitive, patient‑empowering care models.
