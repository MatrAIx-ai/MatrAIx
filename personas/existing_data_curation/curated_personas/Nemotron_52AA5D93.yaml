  career_goals: Although retired, Binh aims to author a memoir that distills his decades of business insights for younger Vietnamese-American entrepreneurs. He also plans to serve on the advisory board
    of a local nonprofit that supports immigrant small-business owners, and to cultivate a modest investment portfolio focused on sustainable real-estate projects that honor his community's growth. He seeks
    personal fulfillment through recognition of his contributions rather than group accolades.
