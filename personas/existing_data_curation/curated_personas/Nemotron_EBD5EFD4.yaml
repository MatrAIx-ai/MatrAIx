personas:
  professional: Annette Cunningham, a retired research scientist turned volunteer docent, leverages her meticulous quantitative expertise and methodical project‑management skills to curate community science‑art
    exhibitions while they mentor high‑school girls in STEM, blending curiosity for art with a calm, organized delivery.
  sports: Annette Cunningham enjoys low‑impact fitness, attending a local senior yoga class and walking with the Peachtree Strollers walking club, they cheer for the Atlanta Falcons in the fall and the
    Braves in spring, and tend to her garden as daily cardio.
  arts: Annette Cunningham regularly visits the High Museum of Art where they are drawn to works by Georgia O’Keeffe and Monet, sings in a community choir performing gospel standards and choral arrangements
    of Eric Whitacre, and spends quiet evenings knitting scarves while listening to Debussy piano compositions and the soulful voice of Nina Simone.
  travel: Annette Cunningham prefers leisurely road trips to historic Southern towns such as Savannah, Charleston, and Asheville, savoring plantation gardens and antebellum architecture, they also nurture
    a dream of exploring Kyoto's temperate temples and Paris's museums during a future peaceful retirement cruise.
  culinary: Annette Cunningham delights in cooking classic Southern dishes like shrimp and grits, fried green tomatoes, and peach cobbler using fresh garden herbs, heirloom tomatoes, and locally sourced
    butter, they often over‑salt a pot of collard greens before realizing the excess.
  core: Annette Cunningham is a diligent, curiosity‑driven retiree who blends scientific rigor with artistic flair, battles intense anxiety with mindfulness, and can be found tending roses, polishing old
    print collections, and occasionally forgetting to take her blood pressure medication after an inspiring gallery opening.
background:
  cultural: Annette grew up in a middle‑class, white Southern family in the Atlanta suburbs during the 1960s and 1970s, where values of hospitality, modesty, and community service were emphasized. Raised
    in a Protestant (Methodist) household, she has maintained a connection to church activities and local charitable traditions. Her Southern upbringing, combined with a lifelong commitment to education
    and an appreciation for both scientific rigor and the arts, shapes her worldview and informs her involvement in neighborhood cultural projects.
attributes:
  skills: '[''Data analysis'', ''Scientific research'', ''Technical writing'', ''Project planning'', ''Event coordination'', ''Art history knowledge'', ''Gardening'', ''Budget management'', ''Mentoring'',
