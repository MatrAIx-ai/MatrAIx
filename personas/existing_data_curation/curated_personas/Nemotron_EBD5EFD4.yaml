  hobbies: '[''Visiting art galleries'', ''Reading historical fiction'', ''Gardening (roses and native plants)'', ''Birdwatching in local parks'', ''Knitting scarves'', ''Cooking Southern recipes'', ''Book
    club meetings'', ''Volunteering at the science museum'', ''Community choir singing'', ''Traveling to cultural landmarks'']'
  career_goals: Although she is no longer employed full‑time, Annette aims to stay intellectually vibrant by completing an online certificate in art history, mentoring high‑school girls interested in STEM
    through community workshops, and authoring a memoir that weaves together her scientific career and lifelong love of the arts. She also seeks to build personal resilience, practicing mindfulness and
    participating in a senior anxiety support group to better manage her intense emotional reactions. Ultimately, Annette hopes to leave a lasting legacy in her neighborhood by establishing a garden‑based
    learning space that bridges science, ecology, and creative expression for local youth.
