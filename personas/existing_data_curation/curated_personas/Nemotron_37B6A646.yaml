  hobbies: '[''Gardening'', ''Hiking'', ''Birdwatching'', ''Cooking (farm-to-table)'', ''Reading historical fiction'', ''Quilting'', ''Volunteering at the local food bank'', ''Attending community theater'',
    ''Walking her dog'', ''Yoga'']'
  career_goals: As she approaches retirement, Christina aims to leave a lasting legacy by establishing a robust succession plan for her department and mentoring the next generation of managers. She hopes
    to earn a regional supervisory role within the next two years, allowing her to influence broader operational standards and champion sustainability initiatives such as sourcing local products and reducing
    store waste. Ultimately, she envisions transitioning to a part‑time advisory capacity, offering consulting services to small businesses in Marion County, while maintaining a balanced lifestyle that
    honors her family commitments.
