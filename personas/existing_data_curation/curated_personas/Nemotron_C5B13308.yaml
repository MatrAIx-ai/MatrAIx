  career_goals: With a vivid imagination, America dreams of growing up to be an astronaut who paints the night sky, a community artist who creates murals for his neighborhood, or a friendly firefighter
    who helps people. He wants to keep exploring new ideas, share his creations with friends, and someday work on projects that bring people together and make the world a more colorful place.
