personas:
  professional: America Detrinidad, a five‑year‑old budding explorer who treats the backyard as a makeshift laboratory, invents wild experiments with glitter, cardboard tubes, and toy dinosaurs, and they
    revel in the spontaneous, unstructured chaos that fuels their boundless curiosity.
  sports: America Detrinidad, a member of the Tiny Tots Soccer Club and a big fan of the Los Angeles Dodgers, they sprint around the playground with boundless energy, love climbing jungle gyms, yet they
    sometimes forget to line up for games, preferring free‑form tag over structured drills.
  arts: America Detrinidad, who delights in drawing vibrant dinosaurs with crayons and singing along to The Wiggles' catchy tunes, they spend afternoons creating whimsical songs on a small keyboard and
    proudly display their finger‑painted masterpieces on the fridge.
  travel: America Detrinidad, who has visited the local zoo, spent a sunny day at a nearby beach, and explored Grandma’s farm in the countryside, they prefer spontaneous, short outings with their parents
    over long, meticulously planned vacations, always packing a favorite stuffed animal for comfort.
  culinary: America Detrinidad, who adores mac and cheese topped with shredded cheddar, banana slices, and a drizzle of chocolate, they love sprinkling extra cheese on everything and often build PB&J sandwiches
    with an enthusiastic, messy technique that leaves crumbs everywhere.
  core: America Detrinidad, a five‑year‑old whirlwind of curiosity, bursts into spontaneous adventures, flits between playrooms, and leaves a trail of glitter and half‑finished crafts wherever they go.
background:
  cultural: America grows up in a Mexican‑American household in Longmont, Colorado, where Spanish is spoken at home alongside English. Family celebrations like Día de los Muertos, Cinco de Mayo, and Christmas
    blend traditional Mexican foods (tamales, arroz con leche) with local Colorado ingredients. He participates in community events at the local park, learns about Colorado’s mountain culture, and attends
    a bilingual preschool that encourages curiosity about art, science, and cultural heritage. This bicultural environment fuels his appreciation for vibrant colors, rhythmic music, and storytelling, shaping
    his open‑minded and sociable personality.
