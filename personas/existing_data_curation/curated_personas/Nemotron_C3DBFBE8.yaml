  hobbies: '[''cooking traditional Mexican recipes'', ''reading adventure and historical novels'', ''sketching and drawing'', ''playing acoustic guitar'', ''gardening herbs and vegetables'', ''volunteering
    at community center'', ''attending local cultural festivals'', ''watching Mexican movies and telenovelas'']'
  career_goals: Alexandera aspires to a career that blends her love for helping others with her methodical nature. In the short term, she aims to earn good grades, graduate high school, and secure a scholarship
    to study nursing or education. She envisions herself as a future nurse or elementary‑school teacher—professions that provide stability, routine, and the opportunity to serve her community. Additionally,
    she dreams of one day opening a small family‑owned bakery that showcases traditional Mexican recipes, allowing her to combine her culinary interests with entrepreneurial responsibilities.
