persona_description: A veterinarian who specializes in the diagnosis and treatment of heart diseases in dogs, with a particular focus on boxers. They are experienced in performing Holter monitoring and
  auscultation to diagnose cardiac conditions, and have a deep understanding of the prevalence and clinical presentation of both Cardiomyopathy and Aortic Stenosis in boxers. They are knowledgeable about
  the diagnostic criteria for these conditions and the potential for misdiagnosis or false negatives. They are also aware of the importance of early detection and management of these conditions in boxers.
