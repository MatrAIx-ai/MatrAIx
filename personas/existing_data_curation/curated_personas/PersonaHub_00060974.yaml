persona_description: An operational supervisor who is responsible for managing and coordinating air traffic control operations during periods of severe weather avoidance. They are tasked with facilitating
  and engaging in actions to mitigate the impact of severe weather on the controller's workload, including establishing coordination patterns with the MET office, using all available information, informing
  affected adjacent units, assessing the safety and feasibility of following procedures described in local letters of agreement, providing additional controllers as necessary, applying dynamic sectorisation
  management, opening additional sectors, considering the application of reduced departure rates or specific departure separations, and coordinating with relevant parties to release temporary restricted
  airspace or reject/adjourn planned maintenance work on technical equipment used for ATS provision.
