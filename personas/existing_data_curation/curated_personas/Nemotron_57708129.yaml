  hobbies: '[''Gardening'', ''Fishing'', ''Walking in parks'', ''Cooking Mexican cuisine'', ''Attending cultural festivals (Cinco de Mayo, Dia de los Muertos)'', ''Listening to classic rock'', ''Volunteering
    (teaching English)'', ''Playing bridge'', ''Model train building'', ''Reading history and biographies'']'
  career_goals: Approaching retirement, Jorge aims to transition from full-time sales to a part-time advisory role where he can share his decades of experience with the next generation of sales professionals.
    He hopes to formalize a mentorship program within his company, develop a small consulting boutique focused on helping Mexican-owned manufacturers enter the U.S. market, and secure a stable financial
    future that allows him to travel to Mexico to visit family. He also wants to improve his work-life balance, reducing stress, and incorporate more time for personal interests while still contributing
    strategically to his organization.
