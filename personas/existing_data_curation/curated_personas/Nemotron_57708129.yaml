personas:
  professional: Jorge Saravia, a veteran wholesale and manufacturing sales strategist, leverages four decades of consultative selling, bilingual fluency, and a knack for improvising solutions to mentor
    junior reps while coaxing complex contracts into profitable wins, all while juggling a relaxed approach to scheduling that sometimes leaves his calendar in disarray.
  sports: Jorge Saravia enjoys seasonal fishing on Lake Minnetonka during warm months, leisurely walks with classic rock on headphones through Minnehaha Park, and is a faithful fan of the Minnesota Vikings
    and Twins, often joining a senior bridge club where they discuss game tactics with the same strategic mindset they apply to sales.
  arts: Jorge Saravia immerses himself in classic rock, regularly spinning The Rolling Stones, Led Zeppelin, and Fleetwood Mac while attending local community‑theater productions of "La Casa de Bernarda
    Alba" and gathering with friends to play bridge, a pastime he likens to a live improvisational performance.
  travel: Jorge Saravia prefers relaxed, family‑oriented trips that blend cultural visits and nature, planning a yearly journey to Oaxaca to reconnect with relatives and savor regional cuisine, while also
    dreaming of a scenic drive along the Pacific Coast of Canada and short weekend getaways to nearby state parks, all balanced against a modest travel budget and retirement timeline.
  culinary: Jorge Saravia spends weekends perfecting traditional family recipes such as mole poblano, chiles en nogada, and handmade tamales, experimenting with heirloom corn varieties from his garden and
    pairing them with fresh cilantro, lime, and queso fresco, while occasionally burning the tortillas due to his tendency to lose track of time on the stove.
  core: Jorge Saravia blends a lifetime of sales savvy, garden‑fresh cooking experiments, and classic‑rock enthusiasm into a relaxed yet slightly disorganized routine that worries about deadlines but finds
    comfort in bridge nights and fishing trips.
background:
  cultural: Jorge was born in a working-class family in central Mexico and moved to the United States in his early twenties. He grew up with strong familismo values, a deep respect for elders, and a love
    for Mexican culinary traditions. Living in Minneapolis for the past four decades, he has integrated into the Midwestern community while preserving his Mexican identity through language, food, and participation
    in local Hispanic cultural organizations. He is fluent in Spanish and English, celebrates Mexican holidays with his family, and often serves as a cultural bridge for Spanish-speaking clients and colleagues.
    His bicultural experience informs his empathetic sales approach and his commitment to helping other immigrants adapt to life in the United States.
attributes:
  skills: '[''B2B sales'', ''Consultative selling'', ''Contract negotiation'', ''Product knowledge (industrial equipment)'', ''Supply chain coordination'', ''Market analysis'', ''Bilingual communication
