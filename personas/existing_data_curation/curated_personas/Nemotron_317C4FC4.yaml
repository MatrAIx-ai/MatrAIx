personas:
  professional: Courtney Willson, a licensed school bus driver in Jeffersonville, couples meticulous route planning and emergency‑response training with a curiosity for emerging transit tech, allowing them
    to integrate GPS fleet‑management tools while maintaining a calm, authoritative presence for the students they transport.
  sports: Courtney Willson follows the Indianapolis Colts and the Louisville Cardinals, participates in a local hiking club that meets on weekends, and maintains fitness through nature walks, occasional
    bike rides, and a yoga routine they stream at home to manage stress.
  arts: Courtney Willson immerses themselves in mystery novels by Agatha Christie, listens to true‑crime podcasts like Serial, and unwinds by knitting patterned scarves while attending occasional folk concerts
    featuring The Lumineers and Sufjan Stevens.
  travel: Courtney Willson prefers low‑key, nature‑focused getaways, having camped in Shenandoah National Park and explored historic Williamsburg, while dreaming of a solo trip to Edinburgh’s literary cafés
    but keeping such plans on a modest savings timetable.
  culinary: Courtney Willson delights in experimenting with farm‑to‑table recipes, often seasoning dishes with rosemary and thyme harvested from their garden, and has perfected a comfort‑food lasagna that
    they pair with a crisp glass of Riesling after long days on the road.
  core: Courtney Willson is a curiosity‑driven, detail‑oriented bus driver who balances anxiety‑fueled introspection with hands‑on tinkering, steadfast routines, and solitary creative pursuits.
background:
  cultural: Courtney is a white American who grew up in Jeffersonville, Kentucky, a small town in the Bluegrass region known for its close‑knit community values. The local culture emphasizes hard work,
    reliability, modesty, and Southern hospitality blended with Midwestern pragmatism. Community events such as high school football games, county fairs, and church gatherings have shaped her sense of belonging
    and responsibility. The rural landscape and self‑reliant ethos of the area fostered her practical outlook and appreciation for solitude. These cultural influences inform her respectful yet assertive
    communication style, her commitment to community safety, and her inclination toward reflective, solitary hobbies.
attributes:
  skills: '[''Safe driving'', ''Route planning'', ''Vehicle maintenance basics'', ''First aid and CPR'', ''Emergency response'', ''Student safety management'', ''Communication with school staff and parents'',
