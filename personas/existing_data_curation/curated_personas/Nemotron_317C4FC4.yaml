  hobbies: '[''Reading mystery novels'', ''Listening to true‑crime podcasts'', ''Journaling'', ''Nature walks'', ''Gardening'', ''Knitting'', ''Photography'', ''Engine tinkering'', ''Cooking'', ''Small
    book club'']'
  career_goals: Courtney aims to progress from frontline driver to a supervisory role within the school district’s transportation department. She plans to complete a certification in School Transportation
    Management through a local community college and eventually become a Bus Operations Supervisor or driver trainer, overseeing route optimization and safety protocols. Inspired by her curiosity about
    sustainable transit, she hopes to contribute to the district’s adoption of electric or hybrid buses and implement eco‑friendly practices. Financial stability and a predictable schedule are important
    to her, as they would lessen the anxiety she experiences in her current role. Over the longer term, she envisions a career in transportation logistics, possibly coordinating district‑wide fleet services
    or working in broader municipal transit planning.
