personas:
  professional: Cynthia Nelson, a 37‑year‑old case manager in rural Georgia, leverages her meticulous documentation, crisis‑intervention expertise, and methodical workflow to coordinate Medicaid‑compliant
    services for low‑income families while asserting herself in interdisciplinary meetings.
  sports: Cynthia Nelson enjoys low‑impact cardio through weekly walks on the Piedmont Trail, occasionally joins a co‑ed recreational softball league in her county, and cheers for the Atlanta Falcons in
    fall football and the Atlanta Braves during spring baseball, preferring structured exercise over spontaneous gym sessions.
  arts: Cynthia Nelson immerses herself in historical fiction by Philippa Gregory, relishes the folk melodies of Emmylou Harris, finds comfort in classic films starring Morgan Freeman, and knits while listening
    to the piano works of Ólafur Arnalds, weaving artistic appreciation into her solitary evenings.
  travel: Cynthia Nelson favors meticulously planned road trips, has explored Savannah’s historic squares, hiked the Great Smoky Mountains, and dreams of tracing her ancestry in Whitby, England, balancing
    budget constraints with a desire for cultural immersion.
  culinary: Cynthia Nelson, an adept home cook, regularly prepares shrimp and grits, collard greens seasoned with smoked turkey, and fresh garden tomatoes in a tangy gazpacho, while savoring the buttery
    richness of pecan pie and often experiments with heirloom basil in her sauces.
  core: Cynthia Nelson blends an orderly, data‑driven mindset with a love for solitary crafts and community stewardship, habitually double‑checking schedules and secretly binge‑watching vintage crime dramas.
background:
  cultural: Cynthia is a white Southern woman who was raised in Albany, Georgia, within a close‑knit, church‑oriented community. Her family’s roots trace back several generations to the American Midwest
    and East Coast, and she grew up immersed in Southern traditions such as community gatherings, church service, and hospitality. The region’s complex history and diverse population have shaped her cultural
    awareness and commitment to social service. While maintaining a respect for traditional values, she aligns with progressive views on equity and community empowerment, reflecting a blend of Southern
    heritage and contemporary social consciousness.
attributes:
  skills: '[''Client Intake Assessment'', ''Case Management'', ''Crisis Intervention'', ''Resource Referral'', ''Medical Documentation'', ''Scheduling and Coordination'', ''Report Writing'', ''Data Entry'',
