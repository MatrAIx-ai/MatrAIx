  hobbies: '[''Reading historical fiction'', ''Gardening'', ''Birdwatching'', ''Knitting and crocheting'', ''Volunteer work at food bank'', ''Small book club participation'', ''Cooking Southern cuisine'',
    ''Genealogy research'']'
  career_goals: Cynthia aims to advance her career by earning a Master’s degree in Social Work within the next three years, positioning herself for a licensed clinical social worker credential. She aspires
    to transition into a supervisory case manager role, where she can design and implement evidence‑based programs for low‑income families in rural Georgia. Long‑term, she hopes to lead a community mental
    health initiative that integrates local cultural resources and provides structured support for underserved populations. She is also pursuing certification as a Certified Case Manager to broaden her
    expertise and increase her advocacy impact.
