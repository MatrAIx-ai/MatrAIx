  career_goals: Terrie aims to launch her own independent label that fuses avant‑garde silhouettes with eco‑friendly fabrics, eventually opening a boutique studio in Shippensburg that doubles as a community
    hub for local artisans. She plans to expand into e‑commerce, collaborate with regional textile producers on innovative sustainable fibers, and curate seasonal pop‑up shows that blend fashion with visual
    art. Long‑term, she hopes to mentor emerging designers through workshops and to be recognized as a thought leader in sustainable, artistic fashion.
