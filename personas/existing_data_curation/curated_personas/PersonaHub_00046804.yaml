persona_description: A child psychologist who specializes in the development and therapy of children with attachment issues. They have a strong interest in the theory behind child-oriented family therapy
  and its application in different family contexts, including adoptive and foster families and families with children born prematurely. They are skilled in observing and understanding the interaction patterns
  between therapist and child, as well as between child and parent during play sessions. They are also experienced in helping children and parents to gradually pull together all of their "selves" into a
  complete and integrated whole through play therapy.
