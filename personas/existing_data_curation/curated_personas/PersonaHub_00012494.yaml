persona_description: A scientist involved in the field of membrane structural and functional biology, particularly in the determination of membrane protein structures and drug development. This scientist
  has expertise in the use of the Lipid Cubic Phase (LCP) for protein crystal growth and has developed a high-throughput method for this purpose. This scientist has also contributed to the development of
  a new method for determining membrane protein structures that uses an X-ray-free laser, which has improved the hit rate and efficiency of protein crystal growth. This scientist has conducted research
  at the Linac Coherent Light Source (LCLS) at Stanford University and has published their findings in the journal Science.
