  hobbies: '[''Gardening'', ''Quilting'', ''Reading historical fiction'', ''Reading mystery novels'', ''Birdwatching'', ''Cooking and baking'', ''Church choir'', ''Volunteering at community food bank'',
    ''Genealogy research'']'
  career_goals: Claudia aims to formalize her expertise by earning a Certified Bookkeeper credential and eventually step into a senior bookkeeping supervisor role within a local small‑business network.
    She hopes to become a trusted financial advisor for community entrepreneurs, mentoring younger clerks and sharing best practices. While she values career advancement, she also wants to secure a stable
    retirement fund for her family and, when the time is right, transition into part‑time consulting that lets her retain flexibility for family and community commitments.
