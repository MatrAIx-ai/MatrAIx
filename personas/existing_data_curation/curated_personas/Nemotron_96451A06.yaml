  hobbies: '[''Playing soccer'', ''Building with LEGO or wooden blocks'', ''Drawing and coloring'', ''Listening to and dancing to music (including mariachi)'', ''Helping with simple cooking tasks'', ''Participating
    in community festivals and parades'']'
  career_goals: Inspired by the clear teamwork and predictable steps of community helpers, Daniel dreams of becoming a firefighter one day. He loves watching fire trucks and hearing the disciplined calls,
    which match his preference for structure. He also enjoys constructing things with his blocks and imagines growing up to be a civil engineer or a builder who designs safe playgrounds. In the short term,
    he aims to be a helpful big brother at home and a class helper at school, assisting teachers and peers.
