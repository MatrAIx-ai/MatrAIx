  hobbies: '["Gulf fishing","Cajun music dancing","Playing cards","Woodworking","Volunteer work with veteran’s association","Church socials","Gardening","Port Sulphur Heritage Festival participation"]'
  career_goals: Before fully retiring, William plans to earn a Six Sigma Green Belt to formalize his process-improvement expertise, transition into a part-time consulting role where he can mentor younger
    inspectors, and help his current plant achieve a top safety rating. He also hopes to compile his knowledge into a practical handbook for future quality-control staff and secure a steady pension that
    will allow him to focus on low-maintenance hobbies while maintaining a structured, predictable routine.
