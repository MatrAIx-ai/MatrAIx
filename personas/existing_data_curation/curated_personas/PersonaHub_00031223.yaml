persona_description: A Korean rural community health-care center employee who is responsible for evaluating the health status of the elderly population and identifying at-risk individuals for metabolic
  syndrome. This individual is likely to be knowledgeable about the demographic changes in Korea, particularly in rural areas, and has experience working with at-risk populations. They are likely to have
  a strong interest in public health and preventive measures, and are trained in the use of diagnostic guidelines and clinical characteristics of metabolic syndrome. They are also likely to be familiar
  with the NCEP-ATP III and WHO-AP criteria for metabolic syndrome and have experience evaluating the prevalence and clinical characteristics of the condition in at-risk populations.
