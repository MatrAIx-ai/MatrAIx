  hobbies: '[''Reading business strategy and literary fiction'', ''Playing chess'', ''Mindful meditation and yoga'', ''Cooking soulful Southern cuisine'', ''Urban gardening'', ''Mentoring high‑school entrepreneurship
    students'', ''Listening to jazz and neo‑soul music'', ''Biking around The Colony'']'
  career_goals: Dequan aims to achieve tenure within the next five years while developing a specialized entrepreneurship and small‑business development track within his department. He plans to pursue a
    Ph.D. in Business Administration to deepen his research capabilities, focusing on culturally responsive business education and its impact on African‑American entrepreneurs. Securing external research
    funding to study sustainable business practices in underserved communities is a key objective. Ultimately, he aspires to become department chair, shaping curriculum strategy, fostering a supportive
    academic culture, and expanding partnerships with local businesses in The Colony and the broader Denton County area.
