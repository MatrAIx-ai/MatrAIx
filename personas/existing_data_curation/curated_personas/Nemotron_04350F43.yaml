personas:
  professional: Dequan Woods, a 26‑year‑old business faculty member, blends rigorous, competency‑based curriculum design, data‑driven financial modeling, and empathetic student mentorship, channeling their
    love for structure and cooperative mindset into a harmoniously organized department environment.
  sports: Dequan Woods follows the Dallas Mavericks and Dallas Cowboys, participates in a local recreational tennis league through the Denton Tennis Association, and incorporates early‑morning jogs and
    weekend yoga sessions into a low‑key fitness routine that balances structured exercise with mindful recovery.
  arts: Dequan Woods immerses in jazz at community venues such as Jazz on the Green, where the improvisations of John Coltrane and Miles Davis inspire them, while their evenings often include rereading
    classics like 'To Kill a Mockingbird' and attending occasional local theater productions.
  travel: Dequan Woods favors low‑key weekend road trips to historic towns like Savannah and New Orleans, has explored Washington, D.C., and dreams of a spring pilgrimage to Kyoto’s temples and a summer
    hike in the Grand Canyon, always planning trips around a modest budget and limited vacation days.
  culinary: Dequan Woods transforms classic Southern comfort foods—such as baked catfish with black‑bean salsa, sweet‑potato collard greens seasoned with smoked paprika, and quinoa‑infused jambalaya—into
    healthier plates, often sourcing fresh herbs from their backyard garden and experimenting with kale, quinoa, and citrus glazes.
  core: Dequan Woods balances a methodical, analytically sharp mind with a quietly fierce devotion to gardening and jazz, yet habitually over‑plans weekly tasks, leading to occasional late‑night caffeine
    marathons when anxiety spikes.
background:
  cultural: Dequan is an African‑American raised in the Dallas‑Fort Worth metroplex, with deep ties to the black community in Texas. His family emphasized the importance of education, church involvement,
    and mutual support, fostering a strong sense of responsibility and communal harmony. Growing up, he participated in church youth groups, basketball leagues, and local cultural events that celebrated
    Black heritage. This upbringing instilled in him a respect for tradition, a commitment to uplifting underserved communities, and an appreciation for the rich tapestry of African‑American history and
    contemporary culture in Texas. He draws on these influences both in his teaching—integrating culturally relevant examples—and in his community engagement, aiming to create pathways for economic empowerment
    among Black entrepreneurs in the region.
