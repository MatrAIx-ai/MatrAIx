persona_description: A paleontologist or botanist interested in the study of the Paleogene period and the extant biotas of the Southern Hemisphere. This person is likely to be interested in the research
  findings presented in the text, which focus on the discovery of new leaf fossils from the Paleogene Ligorio Márquez Formation in South America. The fossils are particularly interesting due to their unique
  characteristics and their potential to contribute to a greater understanding of high southern latitudes during the early Paleogene. The fossils also provide evidence for warm and humid climates in Patagonia
  and for a strongly Gondwanan flora, with little conclusive evidence of taxa belonging to Neotropical and megatherm lineages.
