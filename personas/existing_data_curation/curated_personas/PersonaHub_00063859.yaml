persona_description: A scientist who specializes in the study of human evolution and prehistoric human behavior, particularly the use of stone tools by early humans. This persona is interested in the latest
  findings from the California Academy of Sciences and is eager to learn about the discovery of fossilized bones in Ethiopia from around 3.4 million years ago bearing evidence of stone tool cut marks made
  while carving meat off them. This discovery will likely change the known time frame of a game-changing behavior for our ancestors and force a revision of our text books on human evolution.
