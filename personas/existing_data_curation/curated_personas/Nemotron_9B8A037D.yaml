  career_goals: Hai aims to become a certified Master Carpenter within the next three years, leveraging his experience to open a small, community‑focused woodworking studio in Honolulu. He envisions offering
    custom furniture, eco‑friendly home renovations, and hands‑on workshops that teach practical carpentry skills to locals. Long‑term, he hopes to expand into a modest contracting business that prioritizes
    culturally sensitive design and harmonious relationships with clients and collaborators.
