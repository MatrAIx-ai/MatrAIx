personas:
  professional: Jordan Wilson, a budding LEGO architect with a knack for turning bricks into functional mini‑structures, blends a practical, detail‑oriented mindset with a love for teamwork, often leading
    friends in collaborative builds while embracing the flexibility to improvise when a plan goes awry.
  sports: Jordan Wilson, a lively member of the Eastside Explorers U‑8 soccer club, spends afternoons sprinting across the field, perfecting passing drills, and celebrating each goal, while rooting for
    the Los Angeles Galaxy and the U.S. Men’s National Team during televised matches, and they eagerly join weekend pick‑up games at the community park to stay active.
  arts: Jordan Wilson channels their imagination by doodling Disney characters such as Mickey Mouse and Spider‑Man, humming the upbeat tunes of Pixar movie soundtracks and Taylor Swift’s kid‑friendly songs,
    and immersing themselves in the adventurous narratives of the Magic Tree House books, which together shape a vivid artistic life.
  travel: Jordan Wilson loves spontaneous weekend road trips with their family to nearby state parks like Blue Ridge, trips to the Grand Canyon that sparked a fascination with geology, and day‑long adventures
    at the local zoo, while dreaming of a future vacation to Disney World in Orlando and a school field trip to the Smithsonian in Washington, D.C., preferring the excitement of loose itineraries over rigid
    schedules.
  culinary: Jordan Wilson prefers classic kid‑friendly meals like pepperoni pizza, chicken nuggets, and creamy macaroni‑and‑cheese, enjoys making peanut‑butter‑and‑jelly sandwiches and mixing strawberry‑banana
    smoothies with a plastic spoon, but often sidetracks to snack on gummy bears while accidentally spilling sauce on the kitchen floor.
  core: Jordan Wilson is a sociable, LEGO‑loving 7‑year‑old who thrives on group games, sometimes forgets to tidy up after building projects, and always carries a lucky soccer charm in their pocket.
background:
  cultural: Jordan is a white, Midwestern boy raised in Maquoketa, Iowa, a small‑town community steeped in agricultural and small‑business roots. His family participates in typical Iowa traditions such
    as attending Sunday church services, celebrating Thanksgiving with a large family dinner, and enjoying Fourth of July fireworks over the nearby river. Community events like the Clinton County Fair,
    local high school football games, and church potlucks shape his sense of belonging. He is exposed to a mix of rural values—hard work, modesty, and neighborliness—and the school’s emphasis on teamwork
    and civic responsibility, which together influence his outlook and daily life.
