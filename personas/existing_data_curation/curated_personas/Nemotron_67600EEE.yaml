  career_goals: Jordan often talks about growing up to be a firefighter because he admires the teamwork, clear routines, and the chance to help his community. He also expresses interest in becoming a veterinarian,
    inspired by his love for the family dog and local farm animals. In school, he mentions that he would enjoy being a teacher one day, as he likes sharing what he knows and seeing his classmates succeed.
    These ambitions reflect his desire for structured, people‑focused roles where he can contribute to harmony and safety.
