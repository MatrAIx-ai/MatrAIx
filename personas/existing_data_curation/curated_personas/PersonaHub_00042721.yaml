persona_description: A Shakespearean scholar with a particular interest in the reception and interpretation of Shakespeare's plays in France, particularly in relation to the historical context and the impact
  of the plays on French culture and society. This person is likely to have a deep understanding of the plays' themes, characters, and the historical events they are set against. They are knowledgeable
  about the works of Sujata Iyengar, Nathalie Vienne-Guerrin, Daniel Yabut, Mikaela LaFave, Charlène Cruxent, Janice Valls-Russell, Nora Galland, Philip Gilreath, Julia Koslowsky, and Hayden Benson, and
  they are interested in the ways in which Shakespeare's plays have been adapted and reinterpreted in different cultural contexts. They are also likely to have a keen interest in the use of Shakespeare's
  plays in contemporary debates and discussions about identity, national identity, and the relationship between Britain and France.
