personas:
  professional: Aung Sieng, a 40‑year‑old full‑stack developer, leverages deep expertise in Python, Java, JavaScript, Django, Spring Boot and React to deliver reliable, maintainable code while their methodical,
    organized nature shines in leading agile teams, conducting thorough code reviews, and mentoring junior developers, all guided by a balanced curiosity for emerging tech and steadfast practicality.
  sports: Aung Sieng regularly hikes the cliff‑side trails of Torrey Pines, plays competitive beach volleyball with the Pacific Beach Volleyball Club, follows the San Diego Padres and San Diego Wave FC
    with passionate loyalty, and joins the seasonal outdoor boot‑camp classes at the Balboa Park community center to stay fit.
  arts: Aung Sieng frequently attends modern art openings at the Museum of Contemporary Art San Diego, cites Takashi Murakami and Yayoi Kusama as inspirations, enjoys listening to John Coltrane’s jazz recordings
    and the indie folk sounds of Bon Iver, and watches the latest films of Bong Joon‑ho for narrative depth.
  travel: Aung Sieng favors meticulously planned road trips along the Pacific Coast Highway, has explored Kyoto during its lantern festival, dreams of trekking the hills of Chiang Mai’s night markets, and
    looks forward to a cultural immersion in Lisbon’s Fado scene, balancing travel budgets with a focus on meaningful experiences.
  culinary: Aung Sieng cooks traditional mohinga with lemongrass, fermented tea leaf salad (lahpet) seasoned with roasted peanuts and sesame oil, and experiments with char siu bao, demonstrating an intermediate
    skill level that blends authentic spices like turmeric, tamarind, and fish sauce with occasional over‑seasoning, while savoring fresh mango sticky rice for dessert.
  core: Aung Sieng, a disciplined tech lead with a love for community‑centric cooking, beach volleyball, and art, balances methodical work ethic with spontaneous curiosity, but often forgets to stretch
    after hikes and occasionally splurges on exotic ingredients.
background:
  cultural: Aung was born in Myanmar (Burma) to a Burmese family and moved to the United States in his early twenties to pursue higher education. He grew up immersed in Burmese Buddhist traditions, speaking
    Burmese at home, and celebrating festivals such as Thingyan (water festival) and Thadingyut (lighting festival). His family places a strong emphasis on education, respect for elders, and community cohesion.
    While adapting to life in San Diego, Aung maintains a close connection to his cultural roots through participation in the local Burmese diaspora community, cooking traditional meals, and supporting
    charitable initiatives that aid Myanmar’s development. He balances Western professional norms with Southeast Asian values of humility, collective well‑being, and perseverance.
