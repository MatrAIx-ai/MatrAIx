  career_goals: He aims to transition into a senior engineering role, eventually becoming a software architect or engineering manager, where he can shape technical strategy for products serving Southeast
    Asian markets. He also wants to lead cross-functional teams, champion best practices in code quality and DevOps, and mentor the next generation of developers. In the longer term, Aung aspires to launch
    a technology startup focused on fintech solutions that empower small businesses in Myanmar, leveraging his industry experience and cultural ties. Additionally, he hopes to contribute to open source
    projects related to cloud‑native infrastructure.
