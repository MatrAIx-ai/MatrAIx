persona_description: A prehistoric archaeologist who specializes in the study of flintwork and its use in prehistoric societies. They are knowledgeable in the formation, sources, and characteristics of
  prehistoric flint tools, and have a keen interest in the diffusion of knowledge and mass migration theories in prehistory. Their research interests include the identification and categorization of prehistoric
  flint tools, as well as the analysis of their uses and functions in prehistoric societies. They are likely to have a strong understanding of the differences between different types of prehistoric flint
  tools and their associated technologies, and are likely to have a passion for the history and culture of prehistoric societies.
