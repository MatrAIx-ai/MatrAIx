  hobbies: '[''Baking and cooking'', ''Gardening'', ''Listening to gospel and jazz music'', ''Reading historical fiction and biographies'', ''Quilting and DIY crafts'', ''Church choir participation'', ''Walking
    and nature hikes'', ''Community storytelling'']'
  career_goals: Although retired from formal employment, Tiffany aims to expand the community garden she helped launch, turning it into a reliable source of fresh produce for the local food bank. She plans
    to lead intergenerational programs at the senior center, fostering connections between seniors and school‑age children. To deepen her impact, she intends to complete an online certificate in geriatric
    counseling, equipping herself with professional tools to support peers facing anxiety and grief. Tiffany also dreams of publishing a memoir or blog that chronicles her journey through loss, resilience,
    and cultural heritage, hoping to inspire others. Travel to visit her grandchildren and attend regional cultural festivals remains a cherished personal ambition.
