    cooking with Hawaiian fusion'', ''Volunteer beach clean-up and local ecology knowledge'']'
  hobbies: '[''Cooking traditional Puerto Rican dishes with Hawaiian fusion'', ''Gardening native Hawaiian plants'', ''Beach walking and tide‑pool exploration'', ''Volunteering for community beach clean‑ups'',
    ''Attending local cultural festivals and family gatherings'', ''Reading self‑help and organization books'', ''Practicing Spanish language skills through conversation groups'']'
  career_goals: Lucy aims to translate her organizational strengths into a stable full‑time role such as Administrative Assistant or Office Manager within a local government office, health clinic, or nonprofit
    organization in Hawaii County. She plans to pursue a bachelor’s degree in Business Administration or a certification in medical office administration to enhance her qualifications. In the longer term,
    Lucy envisions opening a small home‑based catering business that offers Puerto Rican‑Hawaiian fusion menus for community events, allowing her to blend her culinary passion with her methodical work style.
