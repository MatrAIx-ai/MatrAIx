  hobbies: '[''Playing soccer'', ''Basketball'', ''Salsa dancing'', ''Cooking traditional Mexican/Latino dishes'', ''Hiking in the Sierra foothills'', ''Volunteering at local youth programs'', ''Attending
    live music concerts'', ''Watching basketball and soccer games'', ''Gaming (strategy games)'', ''DIY home improvement projects'']'
  career_goals: Ishah aims to progress from managing a single retail location to becoming a district or regional manager overseeing multiple stores across the Central Valley, where he can implement data‑driven
    strategies to increase profitability and mentor emerging leaders. He also aspires to earn a certification in management or project management and, eventually, launch his own community‑focused grocery
    concept that highlights locally sourced produce and Latino culinary traditions.
