  hobbies: '[''Watercolor painting'', ''Sketching nature scenes'', ''Reading contemporary fiction and poetry'', ''Journaling and reflective writing'', ''Mindfulness meditation'', ''Gardening native plants'',
    ''Quilting'', ''Knitting'', ''Photography of local landscapes'', ''Listening to live chamber music'', ''Exploring art galleries'', ''Cooking experimental recipes'', ''Birdwatching'', ''Attending small
    workshops on arts integration'']'
  career_goals: Wilma aims to transition from her current teaching‑assistant role to a full‑time classroom teacher within the next two years, targeting a state teaching certification in elementary education.
    She is interested in pursuing a master's degree in educational psychology or arts integration to deepen her ability to support students with anxiety and to embed creative inquiry into the curriculum.
    Long‑term, she envisions leading a school‑wide initiative that creates tranquil, art‑rich learning spaces and provides mindfulness resources for both students and staff. Wilma also hopes to author a
    practical handbook on integrating art and emotional‑well‑being strategies in rural schools, and to mentor new teaching assistants, sharing her methodical approach and passion for quiet, reflective learning
    environments.
