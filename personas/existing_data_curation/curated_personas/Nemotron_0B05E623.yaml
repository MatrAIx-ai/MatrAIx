personas:
  professional: Hector Canals is a budding robotics hobbyist who channels their penchant for structure and predictability into designing and programming competition robots, often melding intricate LEGO
    Technic builds with Python game prototypes to sharpen problem‑solving skills.
  sports: Hector Canals plays midfield for the middle‑school soccer team, idolizes the tactical play of clubs like FC Barcelona and supports local youth league side the River City Rangers, approaching each
    practice with a competitive edge and a methodical focus on improving stamina and ball control.
  arts: Hector Canals strums acoustic guitar while listening to the soaring riffs of Foo Fighters and the vibrant brass of Mariachi Los Dandys, drawing creative inspiration from both contemporary rock and
    traditional Mexican melodies, and enjoys sketching robot designs during quiet afternoons.
  travel: Hector Canals dreams of visiting the Kennedy Space Center in Florida to touch real rockets, has already explored the historic streets of San Antonio on a family road trip, and plans to attend
    the International Robot Expo in Tokyo next summer, balancing a love for adventure with the constraints of school schedules and parental budgeting.
  culinary: Hector Canals loves crafting tacos al pastor at home, carefully marinating pork with pineapple, chilies, and adobo before crisping it on a skillet, and frequently experiments with fresh salsa
    verde made from tomatillos and cilantro, though they sometimes over‑spice the salsa, leading to a tongue‑tingling surprise.
  core: Hector Canals is a methodical teen who blends a competitive drive on the soccer field with a meticulous love for LEGO robotics, balancing disciplined routines with occasional impulsive splurges
    on music and food.
background:
  cultural: Hector was raised in a Mexican‑American household in Citrus Heights, where his parents speak Spanish at home and maintain close ties with relatives in Mexico. Family gatherings often feature
    traditional dishes such as tamales and mole, and celebrations of Día de los Muertos and Cinco de Mayo are woven into his yearly calendar. He attends a local Mexican community center’s cultural events,
    learning folk dances and listening to regional music, which enriches his sense of identity. While fully immersed in American school life and sports, he carries forward values of family loyalty, respect
    for elders, and a strong work ethic that reflect his Mexican heritage.
