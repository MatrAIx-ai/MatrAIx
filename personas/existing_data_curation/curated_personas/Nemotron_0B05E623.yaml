  career_goals: In the short term, Hector aims to graduate middle school with top grades, earn a spot in his district’s STEM magnet program, and win a place on his high school’s robotics team. He plans
    to attend a summer coding camp and compete in national math and robotics competitions to build a strong scholarship portfolio. Long‑term, he envisions a career as a software or robotics engineer, designing
    autonomous systems that could improve infrastructure in the Bay Area. He also hopes to leverage his bilingual background to mentor younger Mexican‑American students in technology, possibly creating
    community workshops that blend engineering skills with cultural pride.
