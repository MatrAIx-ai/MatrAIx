  career_goals: Preston aims to become the top‑selling agent in the Detroit metropolitan area within the next two years, leveraging his creative product presentations and data‑driven strategies. He seeks
    promotion to a senior sales manager role where he can coach a team of agents, instilling both disciplined organization and innovative thinking. Longer‑term, he hopes to launch his own boutique agency
    focused on serving small businesses, integrating financial‑literacy workshops and community outreach that reflect his appreciation for art and new ideas. His ambition is balanced with a desire to secure
    a comfortable retirement for his family while leaving a legacy of mentorship and community contribution.
