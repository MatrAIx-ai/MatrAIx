personas:
  professional: Preston Wiesman is a veteran insurance sales agent with three decades of experience who leverages their curiosity for art and new ideas, meticulous organization, and competitive drive to
    craft vivid, story‑driven risk‑mitigation proposals that consistently land them in the top percentile of Detroit’s sales rankings.
  sports: Preston Wiesman, a die‑hard supporter of the Detroit Lions, Tigers, and Red Wings, spends Saturday mornings hitting the fairways at Oakland Hills Country Club, competes in the Westland bowling
    league with a weekly Thursday night roster, and joins the Great Lakes Fishing Club for sunrise trips along the shoreline, balancing their love for low‑impact golf with the occasional competitive bowling
    spurt.
  arts: Preston Wiesman regularly attends opening nights at the Detroit Institute of Arts—where they're captivated by Diego Rivera’s murals and recent Kehinde Wiley retrospectives—sits on the board of a
    community theater that stages revivals of Arthur Miller and modern experimental plays, and enjoys weekend performances by the Detroit Symphony Orchestra featuring works by Mahler and contemporary composers,
    all of which fuel their creative problem‑solving in the insurance world.
  travel: Preston Wiesman’s travel style blends meticulous planning with spontaneous photo‑excursions, having captured sunrise over Mackinac Island’s historic harbor, trekked the rugged cliffs of Pictured
    Rocks National Lakeshore, immersed themselves in the culinary markets of Barcelona, and earmarked a future trip to Kyoto for its blend of traditional tea ceremonies and contemporary art galleries, all
    while balancing travel costs with their family’s budget.
  culinary: Preston Wiesman’s culinary adventures range from perfecting a pan‑seared lake trout with fresh dill and lemon zest to simmering slow‑cooked beef bourguignon with vintage red wine, experimenting
    with homemade paella brimming with saffron, chorizo, and mussels, and whipping up a seasonal apple‑cinnamon crumble, all seasoned by their love for rosemary, smoked paprika, and a dash of adventurous
    spice.
  core: Preston Wiesman is a competitive, curiosity‑driven insurance veteran who blends art‑inspired creativity with disciplined organization, channels their sociable energy into community engagement, and
    balances a meticulous financial strategy with a penchant for golfing, bowling, and culinary experiments—occasionally neglecting cardio workouts but never their dedication to mentorship.
background:
  cultural: Preston’s cultural identity is rooted in a white, Midwestern, working‑class upbringing in the Detroit suburbs. Growing up in Westland, Michigan, he internalized the region’s values of hard work,
    modesty, community involvement, and a pragmatic outlook tempered by the area’s strong automotive and manufacturing legacy. Family and church gatherings reinforced a sense of loyalty and civic duty,
    and the seasonal rhythms of the Great Lakes—sailing in summer, snow‑bound winters—shaped his appreciation for outdoor recreation. This cultural foundation blends with his personal curiosity, allowing
    him to embrace new ideas while remaining grounded in the practical, people‑focused ethos of the Midwest.
