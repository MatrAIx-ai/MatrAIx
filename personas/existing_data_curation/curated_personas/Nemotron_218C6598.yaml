  hobbies: '[''Sketching and drawing'', ''Photography'', ''Visiting art galleries'', ''Reading design and technology literature'', ''Hiking'', ''Volunteering with Habitat for Humanity'', ''Yoga and meditation'',
    ''Cooking experimental recipes'']'
  career_goals: She aims to become a certified mobile home installer and eventually progress to a supervisory role overseeing construction crews, with a focus on sustainable, energy-efficient prefabricated
    housing. She plans to complete her associate degree in Construction Management or Sustainable Design, then pursue a bachelor's in Architecture or Environmental Engineering. Long-term she envisions starting
    her own small firm that provides affordable, eco-friendly modular homes to underserved communities in Michigan, integrating community-building values and artistic design elements. She also hopes to
    mentor younger workers, especially women, entering the trades.
