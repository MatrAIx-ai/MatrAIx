personas:
  professional: Joan Lassetter, a 19‑year‑old construction management student, blends hands‑on expertise in frame assembly, blueprint reading, and sustainable prefabricated housing with a calm, compassionate
    leadership style that turns site challenges into collaborative design solutions, reflecting their curiosity for art‑inspired design tweaks and their balanced approach to organization and flexibility.
  sports: Joan Lassetter stays active by hiking the Kalamazoo River Trail with the local River Trailblazers club, attending weekly yoga sessions at the community center, cheering on the Detroit Lions and
    Michigan State Spartans for seasonal excitement, and they treat fitness as a meditative practice that balances the physical demands of on‑site construction work.
  arts: Joan Lassetter nurtures their artistic side by sketching Michigan lakeshore scenes, curating nightly photo studies of interior light inspired by Ansel Adams and William Eggleston, frequenting Detroit’s
    Contemporary Art Institute, and they find creative recharge in the folk melodies of Sufjan Stevens and The Milk Carton Kids.
  travel: Joan Lassetter prefers budget‑friendly road trips that blend adventure and design inspiration, having explored Chicago’s architecture, hiked the Upper Peninsula’s Pictured Rocks, and they are
    planning future visits to Iceland’s geothermal villages and Kyoto’s traditional machiya homes to study sustainable living.
  culinary: Joan Lassetter’s culinary experiments fuse Midwestern comfort with world flavors, such as maple‑glazed salmon with miso‑marinade, sweet‑corn and kimchi casserole, and beet‑and‑goat‑cheese pierogi
    topped with fresh cilantro and toasted walnuts, and they often end up with a flour‑dusty kitchen counter after late‑night taste tests.
  core: Joan Lassetter is a calm, curiosity‑driven construction student who volunteers on Habitat builds, sketches lakeside vistas, occasionally forgets to file receipts for tax deductions, and they can’t
    start the day without a triple‑shot espresso.
background:
  cultural: Joan grew up in Olivet, a small Midwestern town in Calhoun County, where community cooperation and a hands-on work ethic are hallmarks of daily life. Her family traces its roots to German and
    Irish immigrants who settled the region in the late 19th century, bringing a pragmatic, modest outlook and a love for seasonal celebrations such as county fairs and summer picnics. The local culture
    values self-reliance, straightforward communication, and a deep respect for the natural landscape of Michigan's lakes and forests. This environment nurtured Joan's appreciation for practical craftsmanship,
    her willingness to help neighbors, and her calm resilience. While she embraces these Midwestern values, she also seeks broader artistic and intellectual experiences beyond her hometown.
attributes:
  skills: '[''Carpentry'', ''Blueprint interpretation'', ''Basic electrical wiring'', ''Plumbing basics'', ''Construction safety compliance'', ''Project coordination'', ''Problem solving'', ''Empathetic
