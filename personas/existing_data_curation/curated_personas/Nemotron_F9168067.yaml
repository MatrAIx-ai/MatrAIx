  career_goals: Yadira aims to advance to a lead cashier or shift supervisor position where she can apply her organizational strengths and mentorship abilities. She is interested in obtaining a retail management
    certification to broaden her supervisory prospects. Over the longer term, she dreams of transitioning into a role with a local cultural center or art nonprofit, leveraging her humanities background
    and community ties to coordinate exhibitions and educational workshops. She also envisions eventually opening a small boutique gallery that showcases works by Mexican‑American artists, combining her
    love of art with entrepreneurial aspirations.
