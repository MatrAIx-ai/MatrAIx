personas:
  professional: Maria Alba is a retired engineer with a bachelor's degree in a scientific discipline who now channels her analytical reasoning into community tutoring in math and science, bilingual translation
    for neighbors, and organizing local events, all while maintaining a disciplined routine that reflects her practical, structured outlook.
  sports: Maria Alba enjoys early morning beach walks along the shoreline for gentle exercise, follows the Los Angeles Dodgers and the Lakers with devoted enthusiasm, and participates in a senior‑friendly
    walking club that meets twice weekly, reflecting her balanced approach to fitness and community.
  arts: Maria Alba immerses herself in historical fiction by authors like Ken Follett, crafts intricate embroidery and papel picado for family celebrations, attends local cultural festivals featuring traditional
    folk music and dance, and appreciates classic cinema from golden‑age Hollywood, all of which nourish her creative spirit.
  travel: Maria Alba prefers short trips that blend relaxation with cultural immersion, such as weekend getaways to Santa Barbara’s historic mission district, wine‑tasting tours in Napa Valley, and occasional
    visits to her family’s hometown on the coast, while dreaming of a future pilgrimage to the historic ruins of Machu Picchu.
  culinary: Maria Alba is an accomplished home cook who blends the flavors of traditional corn‑based dishes like tamales, pozole, and enchiladas with fresh seafood such as shrimp and fish, seasoning them
    with garden‑grown cilantro, oregano, and roasted chilies, and she delights in preparing these meals for family gatherings and community potlucks.
  core: Maria Alba epitomizes a steadfast, detail‑oriented elder who balances a love for structured gardening and cooking with a penchant for over‑scheduling volunteer classes, occasional forgetfulness
    about appointments, and an endearing habit of humming folk tunes while stitching.
background:
  cultural: Maria was born in Los Angeles to Mexican immigrant parents who settled in the city during the 1940s. Raised in a bilingual household, she grew up celebrating Mexican traditions such as Día de
    los Muertos, Cinco de Mayo, and the annual Mexican Independence Day parade in East Los Angeles. She maintains strong ties to the local Mexican-American community through participation in cultural organizations,
    cooking family recipes passed down through generations, and sharing stories of her heritage with her grandchildren. Living in Redondo Beach, Maria blends her Mexican roots with the coastal California
    lifestyle, integrating seaside walks and local seafood into her cultural expressions while preserving the values of family, respect, and community service.
