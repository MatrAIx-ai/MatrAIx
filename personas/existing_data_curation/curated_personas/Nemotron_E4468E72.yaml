  career_goals: Although retired from formal employment, Maria aims to stay actively engaged in her community. She plans to mentor local high‑school students in mathematics and science, sharing her STEM
    background while encouraging more girls to pursue technical fields. She wishes to document her family's immigrant story in a memoir that celebrates Mexican heritage and the resilience of her generation.
    Maria also aspires to keep her health strong through regular walks on the Redondo Beach shoreline and to remain independent by maintaining her garden and home. Finally, she hopes to advocate for senior-friendly
    policies within her city council, ensuring that older adults have access to affordable transportation and community resources.
