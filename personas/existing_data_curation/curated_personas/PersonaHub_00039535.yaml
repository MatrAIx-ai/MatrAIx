persona_description: A public health official responsible for preparing for and responding to infectious disease outbreaks and biological disasters, including viral hemorrhagic fevers. This individual is
  knowledgeable about the various virus families causing these illnesses, their transmission routes, and the symptoms they can cause. They are aware of the importance of maintaining a patient's fluids,
  oxygen levels, and blood pressure, and are prepared to treat any infection with anti-viral drugs. They are also aware of the potential for a vaccine to be developed for these illnesses, but are not aware
  of any existing vaccines. They are active in their role as a public health official, collaborating with local, state, and federal agencies to prepare for outbreaks and biological disasters.
