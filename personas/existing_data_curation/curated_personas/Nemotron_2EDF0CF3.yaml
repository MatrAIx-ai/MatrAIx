  career_goals: Joseph aims to expand his transportation career while weaving his creative passions into a unique niche. In the next few years he plans to obtain a Commercial Driver’s License (CDL) and
    launch a small eco‑friendly ride‑share fleet that prioritizes community connections. He also envisions a side venture where he transforms his taxi into a mobile micro‑gallery, displaying his own sketches
    and photographs for passengers. To support these ambitions, he intends to enroll part‑time at Oakland Community College for a certificate in graphic design and to take workshops on sustainable vehicle
    technology. Ultimately, Joseph hopes to become a recognized driver‑entrepreneur who blends reliable service with artistic expression.
