personas:
  professional: Joseph Matkin, a 25‑year‑old taxi driver in the Detroit metro area, leverages an uncanny sense of urban navigation and calm conflict‑resolution skills to deliver personalized rides while
    sketching cityscapes on the back of receipts and dreaming of turning their cab into a mobile micro‑gallery powered by an upcoming CDL and graphic‑design certificate.
  sports: Joseph Matkin, an avid supporter of Detroit’s Lions, Pistons, and Tigers, spends weekends shooting hoops at a local community center, joins a casual running club to explore city neighborhoods,
    and treats occasional hiking trips to the Upper Peninsula as a break from the cab’s back‑seat routine.
  arts: Joseph Matkin, a sketch‑and‑photo enthusiast, frequents the annual Troy Art Fair, admires street works reminiscent of Banksy, enjoys listening to Miles Davis, Aretha Franklin, and Kendrick Lamar
    while playing keyboard at open‑mic nights, and shares original verses at a poetry circle that fuels their speculative‑fiction imagination.
  travel: Joseph Matkin, a spontaneous planner, loves weekend getaways to the Great Lakes shoreline for sunset photography, dreams of a stargazing trip to Flagstaff, Arizona to join an amateur astronomy
    meetup, and often chooses affordable rideshare options when traveling to New York City’s galleries, balancing curiosity with a modest travel budget.
  culinary: Joseph Matkin, an experimental home cook, delights in preparing Michigan‑style pasties, miso‑ramen broth, and herb‑infused pizza with fresh basil, smoked paprika, and heirloom tomatoes, while
    occasionally treating passengers to a batch of homemade chocolate chip cookies when the ride length permits.
  core: Joseph Matkin, a 25‑year‑old cab driver who blends calm customer service with an artistic flare, dreams of turning each ride into a moving gallery while juggling a relaxed approach to planning and
    a few quirky habits like forgetting to file receipts and misplacing their sketchbook.
background:
  cultural: Joseph is an African‑American raised in the Detroit metropolitan area, with his family rooted in the city’s rich Black cultural traditions. Growing up near the historic neighborhoods of East
    Detroit, he was exposed early to the sounds of Motown, jazz, and hip‑hop, as well as the strong community bonds forged through local churches and neighborhood events. Though his family later relocated
    to the suburban enclave of Troy, he maintains close ties to Detroit’s artistic scene and participates in community gatherings that celebrate Black heritage. The region’s automotive legacy sparked his
    interest in vehicles and driving, while the multicultural fabric of Metro Detroit – with its mix of ethnic cuisines, festivals, and linguistic diversity – nurtured his curiosity about other cultures,
    prompting him to learn basic Spanish and engage with a diverse passenger base.
