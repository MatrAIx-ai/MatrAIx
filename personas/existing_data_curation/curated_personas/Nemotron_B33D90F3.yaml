  career_goals: Elizabeth dreams of becoming a scientist‑inventor who designs educational toys and interactive games that spark curiosity in other children. She is fascinated by space exploration and hopes
    to work on missions that combine robotics with environmental research, eventually contributing to projects that protect ecosystems on Earth and beyond. Her strong desire to help others and her disciplined
    work ethic also lead her to consider a future as a teacher or mentor who guides young learners to achieve their highest potential.
