personas:
  professional: An aspiring young scientist and fantasy storyteller, Elizabeth Piparo channels their disciplined imagination into building elaborate LEGO cities, conducting simple physics experiments from
    their school kit, and drafting short stories that blend magic with scientific principles, treating each creative project as a miniature research endeavor they present proudly to family and teachers.
  sports: A budding athlete, Elizabeth Piparo plays midfield for the Peoria Parks and Recreation youth soccer team, the River Rangers, joins weekend swim lessons at the local community pool, avidly cheers
    the Chicago Cubs on TV, and explores the Apple River trail on family hikes, approaching fitness with the same organized enthusiasm they apply to LEGO building.
  arts: A boundless creator, Elizabeth Piparo sketches whimsical characters in their art journal inspired by Hayao Miyazaki’s animation and John Bauer’s illustrations, composes short stories that echo the
    narrative magic of J.K. Rowling, and practices Beethoven’s “Für Elise” on piano daily, letting each artistic pursuit reflect the disciplined curiosity they bring to science experiments.
  travel: An adventurous explorer, Elizabeth Piparo loves family road trips to Chicago’s Museum of Science and Industry, day‑long hikes along the Apple River trail, dreams of visiting the Grand Canyon and
    the Wizarding World at Universal Orlando, and prefers meticulously planned itineraries that balance discovery with the comfort of familiar routines they cherish.
  culinary: A budding foodie, Elizabeth Piparo enjoys making macaroni and cheese with extra cheddar, baking chocolate chip cookies shaped like tiny dragons, and savoring apple slices with peanut butter,
    while experimenting with simple recipes such as fruit kebabs for their art journal lunchbox, often craving the sweet taste of honey‑drizzled pancakes they occasionally over‑eat before bedtime.
  core: Elizabeth Piparo is a disciplined, imagination‑driven 7‑year‑old who blends scientific curiosity with fantasy storytelling while constantly wrestling with a nervously inquisitive mind.
background:
  cultural: Elizabeth is raised in a middle‑class, predominantly white, Midwestern household in Peoria, Illinois. Her family celebrates traditional American holidays such as Thanksgiving, Fourth of July,
    and Christmas with community gatherings and church services. She attends a local public elementary school where she participates in school art clubs and STEM fairs that reflect the region’s emphasis
    on community involvement and practical learning. The cultural fabric of Peoria—including its small‑city festivals, county fair, and close‑knit neighborhood friendships—shapes Elizabeth’s values of kindness,
    cooperation, and a strong sense of belonging.
