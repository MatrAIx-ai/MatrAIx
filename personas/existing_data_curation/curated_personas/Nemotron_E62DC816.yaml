  career_goals: Jessica aims to leverage her organizational talent and high standards to move into a supervisory role such as Housekeeping Manager for a luxury residential building or upscale boutique hotel
    in New York. She is also planning to launch her own boutique cleaning service that emphasizes eco‑friendly practices and offers professional training modules for staff, drawing on her education background.
    Over the next five years she hopes to earn a Certified Facilities Manager credential, develop a proprietary line of non‑toxic cleaning products, and eventually transition into a part‑time instructor
    role at a community college teaching courses on hospitality management and workplace safety.
