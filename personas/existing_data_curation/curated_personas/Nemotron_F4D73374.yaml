  career_goals: Logan aims to translate his practical retail experience into a supervisory role. Over the next three to five years, he hopes to become a shift lead and eventually a store manager at his
    current employer or a larger regional chain. To support this path, he plans to enroll in a community‑college associate program in business administration while continuing his job part‑time. He is also
    interested in exploring supply‑chain logistics, seeing the movement of goods as a way to combine his preference for structure with his appreciation for flexibility. He envisions acquiring a certification
    in inventory management or a forklift operation license, which would broaden his career options beyond the checkout lane. Ultimately, he desires a stable, locally‑based career that offers predictable
    responsibilities but also leaves room for occasional creative problem‑solving and off‑site training.
