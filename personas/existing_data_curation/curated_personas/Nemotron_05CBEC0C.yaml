  career_goals: Erika dreams of becoming a veterinarian one day, inspired by the farm animals she sees in the Fresno County countryside and her desire to care for them. At the same time, she is determined
    to lead her school’s soccer team to victory in the upcoming district tournament, hoping to eventually play soccer at a professional level. She also envisions using her bilingual skills to volunteer
    at community centers, helping younger kids with homework and cultural activities.
