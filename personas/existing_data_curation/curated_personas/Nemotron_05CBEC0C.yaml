  hobbies: '[''Soccer'', ''Latin dance'', ''Drawing cartoons'', ''Animal-themed reading'', ''Día de los Muertos crafts'', ''Cooking with family'', ''Educational video games'', ''Puzzle solving'', ''Cultural
