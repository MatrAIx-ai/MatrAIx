personas:
  professional: Erika Rios, a budding junior soccer captain, combines their love for teamwork with a natural knack for organization on the field; they lead their local park team, keep score sheets, and
    insist on clear game plans, reflecting their preference for structure and competitive edge.
  sports: Erika Rios, a passionate 7-year-old soccer enthusiast, plays for the Riverside Kids Soccer League and cheers for the Los Angeles Galaxy, while also following the Los Angeles Lakers for basketball;
    they practice drills after school, love the competitive vibe of weekend tournaments, and enjoy watching Sunday match recaps on ESPN Kids.
  arts: Erika Rios, a vivid young cartoonist, fills sketchbooks with animal characters reminiscent of Dr. Seuss and Studio Ghibli, draws inspiration from Frida Kahlo's bold colors, and practices folkloric
    dance steps to the upbeat rhythms of Bad Bunny and Celia Cruz during after-school sessions; they often experiment with bright pigments and mash-up traditional motifs with modern comic styles.
  travel: Erika Rios, an adventurous youngster, has visited the Grand Canyon and the beachside boardwalk in Santa Monica, dreams of exploring the historic streets of Washington D.C., and loves planning
    family road trips using a colorful map where they pin stickers of each destination.
  culinary: Erika Rios, a budding kitchen helper, enjoys mashing ripe avocados with lime juice, cilantro, and salt to perfect guacamole, assembles tacos with soft corn tortillas, diced tomatoes, and queso
    fresco, and crafts vibrant papel picado and paper-mache skulls for festive celebrations; they often sprinkle extra cilantro for flavor and keep a tiny notebook of favorite snack combos.
  core: Erika Rios blends structured teamwork on the soccer field with a competitive spark, saves their allowance meticulously, manages mild allergies while obsessively tracking their health kit, and infuses
    daily life with colorful art, rhythmic dance, and family-centered cooking, all while juggling a habit of forgetting to tidy their crayons.
background:
  cultural: Erika is a Mexican‑American growing up in Clovis, California, where her family blends traditional Mexican customs with the rhythms of suburban life. Spanish is spoken at home, and she celebrates
    holidays such as Día de los Muertos, Cinco de Mayo, and Christmas with colorful altars, family feasts, and music ranging from mariachi to contemporary Latin pop. Her parents emphasize the importance
    of community, often inviting neighbors to share meals and participate in cultural festivals at the local park. At school, she attends a bilingual program that reinforces both languages and promotes
    cultural pride. This bicultural environment shapes her identity, instilling a strong sense of heritage, respect for family, and a love for shared celebrations.
