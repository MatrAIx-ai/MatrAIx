persona_description: A historian and anthropologist who specializes in the study of European exploration and colonization in North America, particularly the expeditions of Prince Maximilian and Karl Bodmer.
  He is a member of the Three Affiliated Tribes and has a deep understanding of the impact of European colonization on indigenous communities. He is knowledgeable about the history of the Dakota people,
  the Mandan and Hidatsa tribes, and the impact of smallpox on indigenous populations. He is also interested in the preservation of indigenous cultures and the importance of understanding the human context
  of historical events.
