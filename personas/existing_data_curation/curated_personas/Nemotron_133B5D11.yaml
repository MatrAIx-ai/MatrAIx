  hobbies: '[''Gardening (vegetables, herbs)'', ''Reading historical non-fiction'', ''Cooking traditional Puerto Rican dishes'', ''Playing chess and checkers'', ''Watching Puerto Rican baseball'', ''Digital
    photography (nature, garden)'', ''Walking along the Severn River'', ''Participating in small parish study groups'']'
  career_goals: Although officially retired, Salvador remains motivated to stay engaged and purposeful. He aspires to volunteer at the local senior center, teaching basic computer skills to fellow retirees
    and sharing his practical repair know‑how with community groups. He hopes to document his family’s migration story, compiling photographs and oral histories to create a small legacy for his grandchildren.
    A long‑standing wish is to travel back to Puerto Rico for a reunion with relatives, especially to explore the coastal towns of his youth and taste the original flavors of his childhood dishes. He also
    aims to keep his health optimal through regular walks along the Severn River and maintaining his garden, ensuring he can remain independent.
