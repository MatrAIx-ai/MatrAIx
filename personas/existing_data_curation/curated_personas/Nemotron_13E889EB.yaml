  hobbies: '[''Bowling league'', ''Golf outings'', ''Community volunteering (youth mentorship)'', ''Gardening'', ''Family travel to historic sites'', ''Reading business biographies'', ''Cooking Southern
    barbecue for friends'', ''Participating in Raleigh Food Drive'', ''Local chamber of commerce networking events'']'
  career_goals: Tommy aims to transition into a senior executive role, such as Vice President of Operations, within the next five years. He wants to lead a division where he can embed a culture of reliability,
    continuous improvement, and employee development. Simultaneously, he is preparing for a phased retirement by mentoring emerging leaders and serving on the board of a local nonprofit focused on workforce
    development. His ambition includes championing sustainable business practices that align with the community’s long‑term growth.
