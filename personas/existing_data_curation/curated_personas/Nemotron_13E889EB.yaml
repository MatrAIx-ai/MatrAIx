personas:
  professional: Tommy Perteet, a veteran operations manager in the Research Triangle's manufacturing and services sectors, combines three decades of hands‑on leadership with Six Sigma and Lean expertise
    to create repeatable processes, while they leverage an outgoing demeanor to foster cross‑functional collaboration and mentorship as they prepare for a VP of Operations role that emphasizes sustainability
    and employee development.
  sports: Tommy Perteet participates in a competitive bowling league at Raleigh Lanes, plays weekend rounds at Hickory Creek Golf Club with a friendly handicap of 22, cheers for the Carolina Panthers and
    the Charlotte Hornets, and occasionally joins the local NC State Wolfpack alumni basketball gatherings, blending camaraderie with a steady exercise routine.
  arts: Tommy Perteet cultivates an appreciation for classic American storytelling, regularly attends performances by the Raleigh Little Theatre, enjoys the musical works of Bruce Springsteen and John Coltrane,
    visits the North Carolina Museum of Art to admire Georgia O'Keeffe paintings, and reads biographies of business icons like Howard Schultz to find inspiration.
  travel: Tommy Perteet prefers well‑planned road trips to historic Southeast towns such as Savannah, Georgia; Charleston, South Carolina; and St. Augustine, Florida, opting for charming B&Bs like The Gastonian,
    guided walking tours that fit within a family‑friendly budget, and a detailed itinerary that leaves little room for spontaneous detours.
  culinary: Tommy Perteet enjoys a garden‑to‑table cooking style, often preparing fresh tomato‑basil bruschetta, herb‑infused chicken piccata, and a signature caprese salad with heirloom tomatoes, while
    also savoring Southern staples like shrimp and grits and occasionally treating the bowling league to pepperoni pizza after a night of strikes.
  core: Tommy Perteet blends a disciplined, process‑centric career with a sociable, community‑focused life, balancing routine with a love for golf, bowling, gardening, and family travel, all while occasionally
    forgetting to water the tomatoes when work gets hectic.
background:
  cultural: Tommy grew up in a middle‑class, white, Protestant family in the suburbs of Raleigh. His upbringing emphasized Southern hospitality, community involvement, and a belief in hard work as the pathway
    to success. He attended a local Methodist church regularly, where he learned the value of service and consensus‑building, which continues to shape his cooperative approach at work and home. The cultural
    mix of traditional Southern values and the innovative, tech‑forward atmosphere of the Research Triangle has given him a pragmatic outlook that balances respect for tradition with openness to incremental
    change.
attributes:
