  career_goals: Juan aims to complete a Bachelor of Science in Nursing (BSN) followed by a Master of Science in Nursing (MSN) to qualify as a nurse practitioner. He envisions moving into a nurse manager
    or clinical educator role where he can shape staffing policies that balance structure with flexibility. Passionate about serving the Mexican immigrant community in Gary, he plans to develop a culturally
    tailored outreach program and eventually co‑found a community health clinic that provides affordable preventive care. He also seeks to obtain certification in critical care to enhance his emergency
    response expertise, while maintaining a stable work schedule that supports his family.
