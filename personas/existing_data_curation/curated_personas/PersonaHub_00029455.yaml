persona_description: A veterinarian who specializes in the diagnosis and treatment of leptospirosis in dogs, particularly in herding dogs, hounds, working dogs, and male dogs. They are experienced in using
  serological tests, such as the microscopic agglutination test (MAT), to diagnose leptospirosis and administering appropriate antibiotics to treat the disease. They are also knowledgeable about the importance
  of supportive care for acute renal failure and the precautions that should be taken when handling suspected cases of leptospirosis. They are likely to be familiar with the new vaccine that protects against
  serovars pomona and grippotyphosa as well as icterohemorrhagiae and canicola.
