persona_description: A prominent and influential Japanese statesman and naval officer, Shishaku Saitō Makoto, who served as the prime minister of Japan and twice the governor-general of Korea. Known for
  his expertise in naval administration, he is credited with promoting civilian administration in Korea and received the title of viscount in 1925. After resigning from the governorship in 1927, he resumed
  his post as governor-general of Korea but was forced to resign in 1932 due to financial scandal. Saitō's assassination by young army officers during a military revolt in 1936 marks the end of his political
  career.
