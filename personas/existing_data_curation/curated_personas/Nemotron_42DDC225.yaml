personas:
  professional: Amy Eatmon, a meticulous 29‑year‑old field technician, blends deep RF expertise with methodical project planning, and they translate complex telecom jargon into friendly explanations for
    clients and teammates.
  sports: Amy Eatmon enjoys weekend hikes on the Stone Mountain trails, participates in a small local running club that meets for 5K runs in the spring, and roots for the Atlanta Falcons in football and
    the Atlanta Hawks in basketball while occasionally catching an Atlanta United soccer match with friends.
  arts: Amy Eatmon channels her curiosity into street photography of everyday life around Stone Mountain and downtown Atlanta, later translating the images into watercolor sketches inspired by Georgia O'Keeffe's
    color palette, and they regularly attend exhibitions at the High Museum featuring artists like Kehinde Wiley while listening to The Avett Brothers and Nina Simone for creative fuel.
  travel: Amy Eatmon prefers low‑key weekend road trips that blend nature and culture, having explored the Blue Ridge Parkway and the historic streets of Savannah, while dreaming of a spring visit to Kyoto's
    temples and the Icelandic aurora—plans they balance against a modest travel budget and occasional work commitments.
  culinary: Amy Eatmon enjoys cooking classic Southern dishes like shrimp‑and‑grits and peach cobbler, often adding a creative twist with herbs inspired by her watercolor studies, and they relish trying
    new coffee blends and occasional artisanal cheese plates while occasionally indulging in extra slices of banana bread during anxious evenings.
  core: Amy Eatmon is a methodical tech‑savvy explorer who balances a love for precise radio engineering with a vivid artistic streak, all while navigating high‑octane anxiety that fuels both meticulous
    planning and occasional impulsive creative bursts.
background:
  cultural: Amy grew up in the suburban outskirts of Atlanta, part of a white, middle‑class Southern community that values hospitality, modesty, and a strong work ethic. Family gatherings often featured
    traditional Southern cuisine, and the local church played a role in community cohesion, though Amy’s personal outlook leans toward progressive, inclusive values. Her upbringing combined respect for
    regional traditions—such as an appreciation for Southern folk music and local festivals—with exposure to the diverse cultural scene of the Greater Atlanta area, fueling her curiosity for art, new ideas,
    and unconventional thinking.
attributes:
  skills: '[''antenna installation and alignment'', ''RF signal testing and measurement'', ''cable splicing and termination'', ''troubleshooting and fault diagnosis'', ''interpretation of schematics and
    blueprints'', ''technical documentation and reporting'', ''project planning and scheduling'', ''FCC regulatory compliance'', ''customer communication and service'', ''team collaboration in small groups'']'
  hobbies: '[''amateur radio (ham) operation and equipment building'', ''street photography and watercolor painting'', ''visiting art galleries and museums'', ''hiking in local parks'', ''mindfulness journaling'',
    ''volunteering to teach digital literacy'', ''playing board games with small groups'', ''listening to podcasts on philosophy and technology'']'
  career_goals: Amy aims to become a senior field technician specializing in emerging 5G and mmWave technologies, eventually moving into a technical trainer role where she can mentor apprentices and share
    her knowledge of modern telecom infrastructures. She plans to obtain an FCC General Radiotelephone Operator License and pursue certifications in wireless network engineering. Over the next five years,
    she hopes to lead small‑team installations of distributed antenna systems in the Atlanta metro area, while also launching a community‑focused tech‑and‑art workshop that blends her technical expertise
    with her love for creative expression. Balancing career advancement with mental‑health strategies is a core part of her ambition.
