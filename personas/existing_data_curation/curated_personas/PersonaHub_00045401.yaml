persona_description: A psychology professor who studies language styles and their impact on relationships, particularly in the context of happy couples. She is interested in using language style matching
  as a predictor of the beginning and end of romantic relationships, and is investigating whether this approach can be used to predict the success of marriages. Her research focuses on the automatic nature
  of style matching and how it serves as an unobtrusive window into people's close relationships with others.
