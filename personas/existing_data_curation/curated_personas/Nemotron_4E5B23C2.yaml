  hobbies: '["Swing and contemporary dance classes", "Church choir (gospel singing)", "Cooking (Southern soul food)", "Hosting potluck gatherings", "Community gardening", "Reading mystery novels", "Watching
    classic films", "Lakefront walking", "Attending local festivals", "Book clubs"]'
  career_goals: Elsie aims to re‑enter the workforce on a part‑time basis as a community outreach coordinator or event planner for local cultural organizations, leveraging her extensive volunteer experience.
    She plans to pursue a bachelor's degree in Social Work or Community Development to deepen her expertise. Additionally, she aspires to start a small home‑based catering service specializing in healthy,
    culturally inspired meals, which could provide supplemental income and allow her to share her culinary heritage. Long‑term, she hopes to secure financial stability that supports her independent lifestyle
    and to volunteer as a mentor for at‑risk youth, using her life experience to guide them.
