personas:
  professional: Milton Nasser, a meticulous preschool builder, channels their love of structure into assembling intricate block cities and, when they guide peers in small-group play, they insist on clear
    rules and achievement.
  sports: Milton Nasser, a budding Little League soccer enthusiast, idolizes "Detroit Lions" and plays for the Kiddie Tigers Soccer Club, preferring structured drills over free play and thriving in small,
    predictable scrimmages where they can follow the game plan exactly.
  arts: Milton Nasser nurtures their artistic side by drawing detailed picture books of family celebrations, humming along to Raffi’s "Bananaphone" and the classic tunes of Sesame Street, and they meticulously
    organize each finished sketch into themed portfolios.
  travel: Milton Nasser enjoys carefully planned family road trips to nearby attractions like the shores of Lake Michigan and the Chicago Children’s Museum, while dreaming of a future Disney World vacation
    that promises the same schedule‑friendly fun and predictable parade routes, and they love counting milestones on the odometer.
  culinary: Milton Nasser delights in the creamy comfort of macaroni‑and‑cheese, the crunchy sweetness of apple slices, and the warm aroma of buttery biscuits, often helping stir the pot with a plastic
    spoon while they meticulously arrange their plate by food group.
  core: Milton Nasser is a pint‑sized perfectionist who thrives on orderly play, meticulous routines, and small‑group interactions, all while harboring a healthy skepticism and an uncanny ability to stay
    calm under toddler‑sized pressures, and they never miss a chance to line up their toys in perfect rows.
background:
  cultural: Milton is raised in a Black American household in Grosse Pointe, Michigan, where his family blends African‑American cultural traditions with Midwestern community values. He participates in family
    gatherings that celebrate Juneteenth and Kwanzaa, and attends a local church that emphasizes service and discipline. His parents encourage academic excellence and cultural pride, often sharing stories
    of Black innovators and creators, which reinforces his interest in structured achievement.
attributes:
  skills: '[''toy sorting by color and size'', ''assembling 12‑piece puzzles'', ''building basic LEGO structures'', ''counting to 20'', ''recognizing letters A–F'']'
  hobbies: '[''building LEGO sets'', ''solving jigsaw puzzles'', ''playing matching/memory games'', ''reading picture books about construction and space'', ''rhythm clapping games'', ''listening to instrumental
    jazz'']'
  career_goals: Milton often talks about becoming a leader in a field that values precision and order. He imagines himself as an architect or engineer, designing structures that are both functional and
    neat. In the near term, he aims to be the best at building the tallest LEGO tower in his preschool class and hopes to earn the "Star Builder" badge.
