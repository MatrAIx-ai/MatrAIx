persona_description: A person who is interested in occupational testing and has a strong background in psychology. They are familiar with various types of tests, including personality tests, ability tests,
  and motivation tests. They have experience in selecting and interpreting tests to identify potential for certain jobs or areas of interest. They are also familiar with the development of psychometric
  tests and have experience in using them to assess various factors. They have a keen interest in understanding the nature of differences between individuals and how they can be used to make informed decisions.
  They have experience in using item response theory to assess the nature of differences in test-taking ability and are familiar with the limitations of traditional test development methods.
