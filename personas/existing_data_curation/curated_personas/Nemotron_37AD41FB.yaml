  career_goals: Jose aims to progress from his current scouting and coaching role into a head coach position at a Division II college, focusing on soccer or baseball. He plans to earn a USSF "A" Coaching
    License and complete advanced scouting certification courses to deepen his analytical expertise. Long‑term, he envisions launching a youth sports academy in Nashville that blends Mexican‑American cultural
    values with modern training methods, providing mentorship and pathways for talented athletes from under‑represented communities. He also aspires to become a senior scout for a major league organization,
    recognized for his keen eye for talent and his ability to bridge cultural perspectives in player development.
