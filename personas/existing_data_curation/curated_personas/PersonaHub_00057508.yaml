persona_description: A neuroscientist who specializes in the study of epilepsy, particularly the mechanisms and causes behind seizures. His research focuses on the changes that occur in the brain from a
  healthy state to an epileptic state, and the factors that lead to injuries and infections that can induce seizures. He is conducting research in the lab to uncover the link between brain trauma and epilepsy,
  and is using models of animals to study the connection between injuries to the blood vessels in the brain and how that is leading to epilepsy. He is looking for the cause of the changes in the electrical
  activity in the brain during an epileptic seizure and how the brain switches into different modes. He is also interested in the relationship between injuries to the blood vessels in the brain and how
  that is leading to epilepsy.
