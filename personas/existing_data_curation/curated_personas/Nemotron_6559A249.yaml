personas:
  professional: John Alsentzer, a retired engineer in La Porte City, leverages decades of hands‑on STEM experience to mentor high‑school students, troubleshoot community projects, and translate technical
    concepts into practical solutions, all while balancing his innate curiosity with a down‑to‑earth practicality, and they are known for their patient, compassionate guidance.
  sports: John Alsentzer enjoys early‑morning trout fishing on the Cedar River, plays weekly scramble golf at the La Porte City Country Club, belongs to the local senior bowling league, and roots for the
    Iowa Hawkeyes football team and the Des Moines Menace soccer club, balancing low‑impact activity with a relaxed fanhood, and they value steady, low‑stress exercise.
  arts: John Alsentzer immerses himself in classic literature like 'The Grapes of Wrath' and 'War and Peace', follows popular science journals, and listens to folk legends such as Bob Dylan and John Prine
    while attending the La Porte City community theatre’s monthly productions and carving wooden birdhouses inspired by the rustic aesthetic of American folk art, and they find creative fulfillment in both
    reading and making.
  travel: John Alsentzer prefers well‑planned road trips that combine scenic countryside, historic towns, and quiet fishing spots, having visited Maquoketa Caves State Park, Mackinac Island, and the historic
    district of Charleston, South Carolina, while dreaming of a leisurely cruise along the Norwegian fjords when health and finances allow, and they cherish the balance of adventure and serenity.
  culinary: John Alsentzer favors hearty Midwestern fare such as slow‑cooked chicken pot pie, homemade sourdough bread, and garden‑fresh heirloom tomato sauce seasoned with basil and rosemary, and while
    his cooking skill is modestly proficient, he delights in growing his own sweet corn and tomatoes for the table, and they enjoy sharing meals with friends and family.
  core: John Alsentzer is a compassionate, curious 83‑year‑old who blends midwestern pragmatism with a lifelong passion for tinkering, gardening, and community mentorship, all while managing a touch of
    chronic worry and a penchant for misplacing their glasses.
background:
  cultural: John grew up in the rural Midwest, raised in a white, Midwestern community in Iowa where hard work, self‑reliance, and neighborly support are core values. His upbringing was shaped by small‑town
    traditions, Protestant church involvement, and the agricultural calendar, fostering a deep respect for nature and community. He attended local public schools before earning a bachelor's degree in a
    STEM field at a state university, after which he returned to La Porte City to work as an engineer. The region’s modest conservatism, emphasis on family gatherings, and pride in local history inform
    his compassionate, cooperative outlook while his curiosity drives him to stay engaged with new ideas and technologies.
