  career_goals: Although retired, John aims to remain an active contributor to his community. He aspires to continue mentoring younger generations in practical engineering skills, volunteer as a senior
    advisor for the La Porte City community council, and document his life experiences in a memoir that highlights the evolution of rural technology. He also hopes to preserve his family’s genealogical
    history, support his wife’s health and well‑being, and maintain his own physical and mental health through regular activity and stress‑management practices.
