persona_description: A scientist or engineer who is interested in space exploration and has expertise in planetary science, particularly the study of Venus. They are likely to be familiar with the Magellan
  mission and its achievements, and are interested in the new global views of Venus released by the mission. They are also likely to be interested in the geology, atmosphere, climate, volcanoes, and tectonic
  processes of Venus, and are interested in the new data set and its potential applications in future scientific studies of Earth's sister planet. They may also be interested in the potential for future
  missions to Venus and the need for high-resolution maps and imagery.
