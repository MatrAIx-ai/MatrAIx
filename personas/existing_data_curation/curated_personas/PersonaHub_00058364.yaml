persona_description: A researcher or conservationist who is interested in the study of fire management strategies, particularly in the context of the accumulation and release of fire-reduced seeds by woody
  plants such as Banksia spinulosa. This person is likely to have a background in botany, ecology, or fire science, and may have experience working with fire management policies and practices. They are
  interested in understanding the factors that influence the accumulation and release of fire-reduced seeds, such as the time since the last fire, the species of plant, and the methods used to collect and
  analyze the data. They may also be interested in the potential impacts of future fires on the availability of fire-reduced seeds and the potential for future wildfires.
