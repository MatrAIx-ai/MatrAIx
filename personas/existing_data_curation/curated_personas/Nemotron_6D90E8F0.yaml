  career_goals: Mariecharlotte aims to progress from a frontline sales associate to a senior sales manager within the next five years, leading a high‑performing team and shaping regional sales strategies.
    She plans to earn a Certified Professional Salesperson (CPS) credential and become a Salesforce Administrator to deepen her technical expertise. Concurrently, she intends to transfer to a four‑year
    university to obtain a Bachelor’s degree in Marketing, which will broaden her strategic perspective. Long‑term, she envisions taking on a director‑level role or launching her own niche retail brand
    that emphasizes data‑driven customer experiences and meticulous operational processes.
