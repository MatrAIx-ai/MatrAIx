  career_goals: Heather aims to become a senior database architect within the next five years, leading large‑scale cloud migration projects and championing data‑driven innovation. She plans to earn a bachelor's
    degree in information systems or computer science to formalize her knowledge, acquire advanced cloud certifications, and eventually transition into a chief data officer role or launch her own consultancy
    focused on ethical, high‑performance data architectures.
