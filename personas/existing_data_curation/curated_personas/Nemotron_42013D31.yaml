  career_goals: Julio aims to move into senior leadership within operations, targeting roles such as Director of Operations or Vice President of Business Excellence within the next five years. He plans
    to earn a Six Sigma Black Belt and a PMP certification to solidify his expertise. Ultimately, he aspires to launch his own consultancy focused on helping mid‑size businesses in Texas streamline processes
    while integrating cultural and creative elements that boost employee engagement and customer experience. He is also committed to mentoring emerging Latino professionals in the field and promoting inclusive
    workplace practices.
