  hobbies: '[''Handcrafted furniture making'', ''Scale model building'', ''Fishing'', ''Hill Country hiking'', ''Attending maker fairs'', ''Woodworking workshops'', ''Volunteering with Habitat for Humanity'',
    ''Reading engineering and sustainability non‑fiction'', ''Listening to classic rock'']'
  career_goals: Mitchell aims to solidify his reputation as a master carpenter by expanding his small‑scale business into a boutique custom‑furniture and remodeling firm that emphasizes sustainable building
    practices. Over the next five years, he plans to obtain the Certified Green Builder credential, hire two apprentices, and develop a streamlined workflow that integrates his STEM background with modern
    construction technology. He also aspires to mentor younger tradespeople, eventually transitioning to a part‑time consulting role that allows him more predictable hours and time for personal projects
    while still contributing his expertise to the local building community.
