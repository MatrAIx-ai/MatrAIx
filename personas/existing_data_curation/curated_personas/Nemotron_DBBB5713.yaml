personas:
  professional: Mitchell Wright is a seasoned carpenter and small‑business owner who leverages a STEM background and meticulous CAD skills to run a boutique custom‑furniture and remodeling firm focused
    on sustainable building practices, while methodically planning projects, mentoring apprentices, and insisting on strict adherence to codes and deadlines, and they never compromise on quality.
  sports: Mitchell Wright is an avid weekend fisherman who regularly casts for largemouth bass on Lake Travis, hikes the rugged trails of the Texas Hill Country with a local club, cheers for the Austin
    FC soccer team and the Texas Rangers baseball club, occasionally competes in regional bass‑tournament qualifiers to test their skill, and they consider each successful catch a quiet triumph.
  arts: Mitchell Wright spins classic rock vinyl—from Led Zeppelin to The Rolling Stones—on a vintage turntable while working in the workshop, attends live performances at Austin’s The Continental Club,
    admires the sculptural grain patterns of reclaimed wood as their own form of visual art, supports the local maker fair community as both participant and audience, and they view each handcrafted piece
    as a personal soundtrack in wood.
  travel: Mitchell Wright prefers self‑planned road trips that blend outdoor adventure with cultural curiosity, having driven the Hill Country’s speckled limestone routes, explored Santa Fe’s art scene,
    dreamed of Scandinavia’s timber‑friendly architecture, scheduled a future visit to the Grand Canyon to photograph sunrise over the rim, and they value the flexibility of spontaneous detours over rigid
    itineraries.
  culinary: Mitchell Wright is a devoted BBQ enthusiast who masters a mesquite‑smoked brisket rub of paprika, brown sugar, and cumin, enjoys grilling freshly caught catfish for fish tacos, occasionally
    indulges in a hearty slab of smoked pork ribs, and experiments with a small home‑brew setup, though they sometimes over‑salt the seasoning in pursuit of deeper flavor.
  core: Mitchell Wright, 56, fuses meticulous carpentry, sustainable entrepreneurship, classic‑rock devotion, and a methodical love of fishing into a disciplined yet occasionally indulgent lifestyle, and
    they never miss a chance to refine their craft.
background:
  cultural: Mitchell is a white American who was raised in central Texas, where the values of self‑reliance, hard work, and community are deeply ingrained. Growing up in a region that blends traditional
    Texan culture—such as appreciation for outdoor recreation, BBQ, and live music—with the progressive, eclectic vibe of Austin, he has learned to respect both the straightforward, pragmatic mindset of
    his upbringing and the diverse perspectives found in his city. His STEM education and carpentry trade reflect a blend of technical rigor and hands‑on craftsmanship that is celebrated in Texas’s long
    tradition of skilled tradespeople. While he identifies with the broader American working‑class culture, his experiences in Austin’s multicultural environment have broadened his worldview, making him
    comfortable navigating both conventional and contemporary social settings.
attributes:
