  hobbies: '[''Recreational soccer league'', ''Volunteer work at food bank'', ''Neighborhood clean‑up events'', ''Hiking Indiana Dunes'', ''Yoga and mindfulness meditation'', ''Cooking and culinary classes'',
    ''Reading popular‑science books on renewable energy'', ''DIY home automation projects at makerspace'']'
  career_goals: Juanita aims to obtain her EPA Section 608 certification within the next year and pursue a master technician designation, positioning herself for a supervisory role in her company. Over
    the next three to five years, she plans to acquire her state contractor’s license and explore opening her own modest HVAC service business that emphasizes energy‑efficiency solutions for residential
    customers in Indiana. She also hopes to mentor women entering the trade, lead community workshops on sustainable home heating, and eventually complete a bachelor’s degree in mechanical engineering to
    expand her technical expertise. Balancing ambition with personal well‑being, she seeks a stable work‑life balance that allows time for her hobbies and social connections.
