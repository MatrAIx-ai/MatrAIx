personas:
  professional: Juanita Goode is a methodical HVAC and refrigeration mechanic who leverages their organized, reliable nature to streamline complex installations, while their sociable, cooperative spirit
    shines when they mentor apprentices and explain system operations to clients.
  sports: Juanita Goode plays forward on a co‑ed recreational soccer league, follows the Indianapolis Colts and the Indiana Pacers for weekend game nights, and they hike the dunes and state parks to stay
    fit, balancing team camaraderie with solo endurance challenges.
  arts: Juanita Goode finds inspiration in the documentaries of David Attenborough, the ambient music of Brian Eno, and the modern art exhibitions at the Indianapolis Museum of Art, and they often draw
    creative parallels between sustainable design and visual storytelling in their DIY makerspace projects.
  travel: Juanita Goode prefers meticulously planned weekend getaways—like kayaking on Lake Michigan’s shoreline, exploring the renewable‑energy showcase in Iceland, and cycling through Michigan’s wine
    regions—but they sometimes have to postpone impulse trips abroad due to budget constraints.
  culinary: Juanita Goode showcases a budding chef’s flair by mastering seasonal dishes such as roasted beet‑goat cheese salads with heirloom tomatoes, grilled wild‑caught perch with fresh dill, and homemade
    sourdough bread enriched with honey from a nearby apiary, and they frequently experiment with local, farm‑sourced ingredients.
  core: Juanita Goode blends high‑energy community involvement with a precise, anxiety‑aware work ethic, turning every HVAC job into a lesson in sustainability while they juggle soccer, cooking, and a chronic
    love for coupons.
background:
  cultural: Juanita was raised in a suburban Midwestern family in Indiana, where a strong work ethic, practicality, and community engagement were core values. Her upbringing emphasized modesty, reliability,
    and the importance of helping neighbors, reflecting the cultural norms of Fishers and the broader Hamilton County area. Growing up in a predominantly white community shaped her appreciation for traditional
    holidays, church involvement, and family gatherings. As a woman entering a traditionally male‑dominated trade, she has become an advocate for gender equity, drawing on both her Midwestern roots of cooperation
    and her personal experiences to support and mentor others. Her cultural background blends the steady, down‑to‑earth Midwestern mindset with an openness to new ideas fostered by her curiosity and diverse
    interactions with customers.
attributes:
