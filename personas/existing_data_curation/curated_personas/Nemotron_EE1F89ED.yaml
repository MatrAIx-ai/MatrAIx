  hobbies: '[''reading automotive magazines and technical manuals'', ''restoring a vintage motorcycle'', ''woodworking projects'', ''fishing at local lakes'', ''hiking rural trails'', ''photography of Iowa
    sunsets'', ''homebrewing craft beer'', ''cooking family meals'', ''volunteering mechanical assistance for neighbors'']'
  career_goals: Thomas aims to become a certified master diesel technician and eventually open his own independent shop that offers reliable service to rural Iowa fleets while providing apprenticeship opportunities.
    He plans to obtain additional ASE certifications and manufacturer-specific training, and to take on a supervisory role that allows him to improve safety standards and efficiency in fleet operations.
    Maintaining a healthy work-life balance remains a priority, so his ambition includes building a business that supports his family and community.
