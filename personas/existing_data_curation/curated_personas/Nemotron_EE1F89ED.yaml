personas:
  professional: Thomas Cecchetti, a 35‑year‑old master diesel technician‑in‑training, blends meticulous diagnostic expertise with a hands‑on mentorship style, managing a fleet service shop’s inventory while
    championing safety and efficiency for rural Iowa transportation.
  sports: Thomas Cecchetti enjoys low‑key fitness through early‑morning hikes across the rolling Iowa fields, occasional fishing trips with the Des Moines Lake Anglers Club, and follows the Iowa Hawkeyes
    football team, while avoiding team sports in favor of solo catch‑and‑release trout outings and weekend bike rides with the Cedar Rapids Cycling Club.
  arts: Thomas Cecchetti channels their creative side by hand‑crafting rustic wooden furniture inspired by Charles and Ray Eames, photographing Iowa sunsets in the style of Ansel Adams, and unwinding to
    the classic rock of The Rolling Stones and folk country ballads by Johnny Cash, while occasionally attending the Des Moines Art Center’s woodworking exhibitions.
  travel: Thomas Cecchetti prefers meticulously planned, low‑key road trips that blend family time with a love for diesel mechanics, having driven the historic Route 66 to Chicago and the Great Lakes region,
    while dreaming of a scenic workshop pilgrimage to Germany’s Autobahn corridors and a quiet weekend escape to the Oregon coast.
  culinary: Thomas Cecchetti, an adept homebrewer and weekend chef, regularly prepares hearty Midwestern fare such as slow‑cooked pork shoulder with apple‑cabbage slaw, creamy corn chowder, and hand‑crafted
    IPA using Cascade hops, while occasionally experimenting with smoked trout and rustic sourdough, though they sometimes forget to refrigerate leftovers, leading to occasional food‑safety oversights.
  core: Thomas Cecchetti, a solitary yet community‑minded diesel aficionado, balances a toolbox of mechanical mastery with a quiet passion for sunset photography, home‑brewed experiments, and a tendency
    to procrastinate on paperwork.
background:
  cultural: Thomas descends from Italian immigrants who settled in the Midwest generations ago, and he grew up in the small farming community of Casey, Iowa. The blend of his Italian-American heritage and
    the Midwestern values of hard work, modesty, and community cooperation shapes his pragmatic outlook. While he participates in local traditions such as county fairs and church gatherings, he also maintains
    family customs like Sunday meals and celebrating Italian holidays. This cultural mix informs his dedication to reliable craftsmanship and his compassionate support of neighbors.
attributes:
  skills: '[''diesel engine repair'', ''hydraulic system maintenance'', ''brake system diagnostics'', ''transmission repair'', ''electrical wiring and troubleshooting'', ''welding and metal fabrication'',
