    details", "Journaling"]'
  career_goals: Yolanda aims to become a master painter recognized for high‑quality work in historic home restoration in Memphis. She plans to obtain advanced certifications in eco‑friendly and specialty
    coatings, and eventually launch her own small contracting business that emphasizes meticulous craftsmanship and reliable service. Over the next five years, she hopes to secure a steady stream of upscale
    residential clients, win a local contractor award, and develop a structured mentorship program to train apprentices while maintaining her preference for solitary work environments.
