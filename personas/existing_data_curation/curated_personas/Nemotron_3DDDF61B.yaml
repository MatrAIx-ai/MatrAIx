personas:
  professional: Nell Hall, an aspiring administrative professional who leverages meticulous Excel budgeting skills and proven event‑coordination experience at the community center, consistently applies
    their methodical, reliable nature to streamline office workflows and keep project timelines on track.
  sports: Nell Hall, a devoted fan of the Boston Celtics and Boston Red Sox, participates in weekly Harborwalk jogs with the Dorchester Running Club, joins community center pickup basketball games each
    Saturday, and practices yoga three times a week to maintain flexibility and mental balance.
  arts: Nell Hall, an avid collector of vintage vinyl, spins classics from Marvin Gaye and Aretha Franklin alongside contemporary acts like Anderson .Paak, regularly attends live shows at the House of Blues
    and the Boston Symphony Hall, and finds inspiration in contemporary fiction by Chimamanda Ngozi Adichie and Ta‑Nehisi Coates.
  travel: Nell Hall, who prefers weekend road trips over long vacations due to budget constraints, frequently explores neighboring coastal towns such as Newport, Rhode Island, dreams of immersing herself
    in the musical heritage of New Orleans, and plans a future pilgrimage to the historic streets of Savannah for its storytelling festivals.
  culinary: Nell Hall, a confident home cook, delights in mastering soul‑food staples like collard greens simmered with smoked turkey, sweet‑potato pie, and perfectly crisp cornbread, experiments with ingredients
    such as smoked paprika and okra, and frequently celebrates community potlucks by swapping family recipes.
  core: Nell Hall is a detail‑obsessed planner who never misses a community event, yet habitually hits the snooze button on weekday mornings, sacrificing precious yoga time for an extra five minutes of
    sleep.
background:
  cultural: Nell is a Black American raised in Dorchester, a vibrant Boston neighborhood with deep African‑American roots. Her family’s history traces back to the Great Migration, and she grew up attending
    a local Baptist church that fosters strong communal ties. She regularly participates in Juneteenth celebrations, African American History Month programs at the Boston Public Library, and neighborhood
    block parties that highlight cultural storytelling, music, and food. These experiences have instilled in her a sense of resilience, pride, and a commitment to community service.
