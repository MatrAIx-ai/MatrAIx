  hobbies: '[''reading contemporary fiction'', ''cooking soul‑food dishes'', ''yoga'', ''walking the Harborwalk'', ''volunteering at community center'', ''listening to vinyl records'', ''genealogy research'',
    ''attending local music events'']'
  career_goals: Nell aims to build a stable, structured career that leverages her affinity for order and reliability. She plans to enroll in a community college business administration program and earn
    a Certified Administrative Professional (CAP) credential, positioning herself for entry‑level administrative or project coordination roles within the Dorchester city government or a local non‑profit.
    Over the next five years, she hopes to advance to a supervisory position where she can mentor new staff and contribute to community‑focused initiatives.
