  hobbies: '[''Hiking and desert trail walking'', ''Bird watching'', ''Gardening (succulents and desert flora)'', ''Reading historical fiction and mystery novels'', ''Knitting and quilting'', ''Cooking
    Southwestern cuisine'', ''Volunteering at the local senior/community center'', ''Participating in community events and workshops'']'
  career_goals: As a seasoned worker, Stephanie aims to continue contributing reliably at her current store while taking on additional responsibilities. She hopes to become a shift supervisor or trainer,
    sharing her expertise with younger employees. At the same time, she wants to secure enough income to support her family's future and pursue part‑time volunteer roles at the local senior center where
    she could teach basic budgeting or cash‑handling basics. Maintaining her health and staying active in the community are also central to her long‑term aspirations.
