personas:
  professional: Stephanie Bartley, a diligent retail cashier with three decades of POS mastery, blends meticulous cash‑handling expertise and a pragmatic curiosity for system upgrades while mentoring new
    staff, and they pursue a shift‑supervisor role despite occasional self‑doubt and a competitive drive to out‑perform peers.
  sports: Stephanie Bartley, an active member of the Cave Creek senior walking club, rises before sunrise to traverse desert trails, cheerfully supports the Arizona Diamondbacks and Phoenix Suns, and they
    quietly compete in the club’s step‑count challenges, balancing low‑impact cardio with a modest competitive edge.
  arts: Stephanie Bartley weaves intricate quilts and scarves inspired by the desert’s muted palette, immerses themselves in Ken Follett’s historical sagas and Agatha Christie’s mysteries, and they admire
    Georgia O’Keeffe’s Southwestern canvases, though they often dismiss avant‑garde installations as needlessly opaque.
  travel: Stephanie Bartley favors meticulously planned road trips to nearby wonders like Sedona’s red rocks and the Grand Canyon, dreams of a tranquil pilgrimage to Joshua Tree, and they carefully balance
    their modest retirement budget against occasional impulse travel urges.
  culinary: Stephanie Bartley delights in crafting Southwestern dishes such as prickly‑pear‑infused pork tacos and roasted chiles rellenos, skillfully blending bold flavors with the comforting familiarity
    of home‑grown succulents during their weekend kitchen experiments.
  core: Stephanie Bartley is a pragmatic yet curious retiree who mixes competitive precision in cash handling with early‑morning desert walks, quilting, and cautious budgeting, all while they wrestle with
    lingering worries and a steadfast dedication to community.
background:
  cultural: Stephanie identifies as a white American of mid‑century, Anglo‑American heritage. Raised in the 1950s‑60s, she internalized values of self‑reliance, hard work, and community responsibility that
    were common among post‑war families. After moving to Arizona for its warm climate and open landscape, she adopted elements of the southwestern desert culture—outdoor recreation, appreciation for native
    flora, and a relaxed yet independent lifestyle. Although not deeply religious, she often attends local church gatherings with her spouse, reflecting a modest Christian influence. Her cultural background
    blends traditional American family norms with the unique regional flavor of the Sonoran Desert community.
attributes:
  skills: '[''Cash handling and reconciliation'', ''Customer service and conflict resolution'', ''Point-of-sale system operation'', ''Inventory tracking and restocking'', ''Basic bookkeeping'', ''Time management
