personas:
  professional: Brandon Ulmer, a retired craftsman and informal community historian, melds his woodworking, gardening, and vintage electronics tinkering into mentorship for local teens while channeling
    a competitive streak into senior craft competitions and oral‑history projects.
  sports: Brandon Ulmer roots for the Charlotte Hornets and Carolina Panthers, participates weekly in shuffleboard and pickleball with the Shelby Senior Gardeners’ Pickleball Club, and spends quiet mornings
    fishing at local ponds, using the activity as both relaxation and low‑key competition.
  arts: Brandon Ulmer immerses himself in classic blues and gospel, regularly spinning B.B. King, Mahalia Jackson, and Sam Cooke on his vintage record player, and he occasionally attends community history
    talks featuring folk storytellers, which fuel his own oral‑history recordings.
  travel: Brandon Ulmer favors low‑key road trips, having traversed the Blue Ridge Parkway countless times and recently explored Savannah’s historic district, while dreaming of a pilgrimage to the National
    Civil Rights Museum in Memphis, preferring spontaneous planning over rigid itineraries.
  culinary: Brandon Ulmer enjoys farm‑to‑table cooking, often grilling heirloom tomatoes, pan‑searing catfish with smoked paprika, and baking buttery buttermilk biscuits, seasoning each dish with fresh
    herbs from his garden and improvising recipes on the fly.
  core: Brandon Ulmer, an 80‑year‑old tinkerer‑historian, blends relentless curiosity with practical hands‑on skills, prefers solitary projects, embraces friendly competition, and lives a modest, self‑sufficient
    lifestyle while occasionally misplacing tools and forgetting appointments.
background:
  cultural: Born in 1945 into a close‑knit African‑American community in Shelby, North Carolina, Brandon grew up during the era of Jim Crow segregation. His grandparents were sharecroppers who imparted
    values of hard work, self‑reliance, and community solidarity. The Black church served as a central pillar of his upbringing, providing spiritual guidance, musical heritage, and a venue for social interaction.
    The civil‑rights movement of the 1950s‑60s deeply influenced his worldview, fostering a healthy skepticism toward authority while reinforcing a deep appreciation for collective struggle and resilience.
    Family gatherings are steeped in soul food, storytelling, and the blues, shaping his love for oral history and music. Today, he remains rooted in these cultural traditions, preserving them through his
    hobbies and personal projects while also embracing new ideas sparked by his lifelong curiosity.
