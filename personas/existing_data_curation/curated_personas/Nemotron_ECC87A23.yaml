personas:
  professional: Luis Santiagodiaz, a 21‑year‑old bilingual hospitality enthusiast, relies on strong interpersonal abilities, casual yet charismatic communication, and a knack for creating engaging short‑form
    social‑media content; they excel in guest‑relations or youth‑program coordination roles, while balancing a preference for structure with a flexible, people‑centered approach.
  sports: Luis Santiagodiaz joins the informal Parkside Kickers soccer group for pickup games at Bayfront Park, they cheer on Inter Miami CF during the MLS season, and they dance salsa and bachata at weekly
    community nights, preferring spontaneous, socially driven workouts over regimented training routines.
  arts: Luis Santiagodiaz curates eclectic playlists featuring Afro‑Peruvian legends Susana Baca and Eva Ayllón alongside Andean virtuoso Jaime Torres, they produce short TikTok cooking demos using Adobe
    Premiere Rush, and they regularly attend salsa‑dance nights where performers like Celia Cruz’s tribute shows inspire their own movement, weaving music and video into a vibrant personal brand.
  travel: Luis Santiagodiaz envisions weekend getaways to the Andean highlands of Cusco for hiking, a cultural immersion trip to Buenos Aires to experience tango, and spontaneous road trips along the U.S.
    Gulf Coast, they plan most journeys on a budget using hostels and rideshare apps while balancing a modest travel fund and academic commitments.
  culinary: Luis Santiagodiaz enjoys a hands‑on cooking style, expertly preparing ceviche with fresh lime juice and ají amarillo, lomo saltado using soy sauce and vinagreta, and ají de gallina with a touch
    of rocoto pepper, they often experiment with quinoa‑based street‑food twists and share the results on TikTok, while also seeking out authentic food‑truck vendors for inspiration.
  core: Luis Santiagodiaz is a sociable, anxiety‑prone 21‑year‑old who mixes a love for community‑driven hospitality, Peruvian street food, and spontaneous digital storytelling, yet they battle occasional
    financial impulsivity and a habit of forgetting to pay bills on time.
background:
  cultural: Luis grew up in a first‑generation Peruvian household in Miami’s vibrant Little Havana–Coconut Grove area. His parents emigrated from Lima in the early 2000s, bringing with them family recipes,
    stories of Andean festivals, and a deep respect for community solidarity. At home, Spanish is the primary language, and traditional holidays such as Inti Raymi, Señor de los Milagros, and Día de la
    Canción Criolla are celebrated with food, music, and dance. Living in Miami, Luis seamlessly blends his heritage with the broader Latino and American cultures, participating in Carnaval Miami, attending
    Afro‑Peruvian concerts, and socializing in bilingual settings. This hybrid environment shapes his identity, giving him a strong sense of pride in his Peruvian roots while fostering adaptability in a
    multicultural city.
attributes:
  skills: '[''Bilingual Spanish-English'', ''Verbal Communication'', ''Customer Service'', ''Social Media Content Creation'', ''Basic Adobe Creative Suite'', ''Peruvian Cuisine Preparation'', ''Event Coordination
