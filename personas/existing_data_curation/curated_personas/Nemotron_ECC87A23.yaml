  hobbies: '[''Soccer'', ''Salsa Dancing'', ''Cooking Peruvian Dishes'', ''Listening to Afro-Peruvian Music'', ''Creating TikTok Videos'', ''Participating in Community Festivals'', ''Playing Video Games'',
    ''Reading Self-Help Books on Stress Management'', ''Volunteering at Community Center'']'
  career_goals: Luis aims to secure a full‑time role in hospitality or community outreach within the next two years, ideally as a guest relations associate or youth program coordinator for a nonprofit serving
    Miami’s Latino population. He plans to enroll in a community college associate program in Hospitality Management while continuing to improve his event‑planning skills. In the longer term, Luis dreams
    of launching a small food‑truck business that would showcase authentic Peruvian street foods, combined with a pop‑up cultural series that brings together music and dance from Peru and the broader Latinx
    diaspora. He also wants to develop a personal brand on social media that highlights his cooking and community activities, turning his sociable nature into a professional asset.
