  career_goals: Although he is not currently part of the formal workforce, Lennie aims to stay active and self‑sufficient by taking on occasional part‑time or volunteer roles that leverage his maintenance
    and mentoring abilities. He hopes to deepen his woodworking skills enough to craft functional furniture for local sales, provide mentorship to neighborhood teens interested in hands‑on trades, and maintain
    a solid financial footing that allows him to live comfortably and support community causes.
