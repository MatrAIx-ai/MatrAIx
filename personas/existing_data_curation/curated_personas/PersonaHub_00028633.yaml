persona_description: A scientist who studies sexual dimorphism in the brain and its implications for gender and sex differences in biology. This persona is likely to be a neuroscientist or a psychologist
  who has conducted research on brain scans and neural connections to identify differences between males and females. They are interested in the concept of a unique mosaic of features in the brain that
  leads to a non-binary picture of the brain, and they are also aware of the alternative view presented in the study of brain activity between men and women, particularly relating to psychiatric conditions.
  This persona is likely to be critical of the idea that gender is based on biological differences and believes that the gender binary is reductive when it comes to biology.
