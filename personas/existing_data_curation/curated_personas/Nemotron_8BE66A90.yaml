  career_goals: Nicholas aims to advance to a senior program manager or director of a Project Management Office within the next five years, leading larger multi-disciplinary portfolios that align with organizational
    strategy. He plans to obtain his PMP and PgMP certifications to formalize his expertise, and to mentor junior project managers to build a collaborative, supportive culture. He also seeks to champion
    sustainable project practices and implement well‑being initiatives that reduce stress for his teams, reflecting his personal desire for more predictable, balanced work environments.
