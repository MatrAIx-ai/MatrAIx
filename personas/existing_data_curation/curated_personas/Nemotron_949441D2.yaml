personas:
  professional: Dorothy Mcintosh, a seasoned secondary school teacher of American History and literature, blends meticulous lesson planning and a love for routine with a flexible, pragmatic approach that
    leverages Google Classroom and interactive whiteboards to create structured yet adaptable classrooms, while they mentor new teachers with assertive compassion.
  sports: Dorothy Mcintosh, an avid early‑morning hiker in the Sonoran Desert and weekly yoga practitioner, cheers for the Arizona Cardinals and Phoenix Suns while belonging to the Sonoran Trailblazers
    hiking club, and they squeeze in occasional community‑run 5K races to stay fit.
  arts: Dorothy Mcintosh indulges their creative side through quilting projects inspired by the geometric patterns of artist Faith Ringgold, weekly visits to the Arizona Shakespeare Festival, and a soundtrack
    of folk legends like Joni Mitchell and Bob Dylan that accompany their late‑night historical‑fiction reading sessions.
  travel: Dorothy Mcintosh favors low‑key, itinerary‑light road trips that blend desert hikes with cultural stops—having explored the Grand Canyon, Sedona’s red rocks, and Santa Fe’s historic plaza, they
    now dream of a spring pilgrimage to England’s Yorkshire countryside to walk the settings of their favorite Victorian novels.
  culinary: Dorothy Mcintosh, a competent home cook, blends comfort recipes such as chicken pot pie and slow‑cooked beef chili with desert‑inspired flavors like prickly pear salsa and cholla bud stir‑fry,
    often seasoning dishes with fresh cilantro, cumin, and locally harvested sage from their garden.
  core: Dorothy Mcintosh thrives on the harmony of routine and spontaneity, habitually juggling lesson plans with morning hikes, a sudden quilt‑making binge, and an occasional forgetfulness that leaves
    a few unpaid bills on the back burner, yet they always manage to keep their classroom humming.
background:
  cultural: Dorothy comes from a white, middle-class American background, raised in a Midwestern suburb before moving to Arizona for work. Her family values traditional holidays, community gatherings, and
    practical, down-to-earth attitudes. She identifies with the broader Anglo-American cultural heritage, appreciating both the conservative, routine-oriented aspects of her upbringing and the laid-back,
    sun-filled lifestyle of the Southwest. She participates in her local Protestant church’s seasonal events and embraces the desert culture of Surprise, Arizona, through its outdoor activities and community
    festivals.
