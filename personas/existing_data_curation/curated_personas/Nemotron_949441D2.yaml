  career_goals: Dorothy aims to take on a leadership role within her school district, such as department chair or curriculum coordinator, where she can shape humanities programs across multiple grades.
    She plans to pursue a master's degree in Educational Leadership within the next two years to qualify for administrative positions. In the medium term, she hopes to design professional-development workshops
    that emphasize practical, routine-based teaching strategies and to mentor novice teachers. Long-term, she envisions contributing to district-wide curriculum reform that balances traditional content
    with the practical needs of a diverse student body.
