persona_description: A health official with the United Nations who is responsible for monitoring and controlling the spread of yellow fever in Sudan's Darfur region. They are trained in disease surveillance,
  case management, and infection prevention and control, and are working to train more than 225 health workers in the region. They are also working with the Sudanese Ministry of Health to dispatch technical
  teams to help tame the outbreak by conducting investigations on new cases, meeting with local community leaders to raise awareness of the disease, and providing blood bank supplies as well as protective
  equipment to affected areas.
