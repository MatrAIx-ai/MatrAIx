personas:
  professional: David Pearson leverages the quick reflexes and tactical thinking honed in Rocket League and Fortnite to lead his middle-school robotics club, transforming LEGO constructions into functional
    prototypes while staying organized enough to meet deadlines yet flexible enough to improvise under pressure.
  sports: David Pearson stars as the point guard for the Desert Dragons Youth Basketball Club, idolizes the Las Vegas Aces and Golden Knights, and follows a high-intensity training schedule after school,
    reflecting their competitive drive and sociable desire to lead on the court.
  arts: David Pearson captivates friends with magic tricks inspired by David Blaine, strums an electric guitar to riffs by Imagine Dragons and Daft Punk, and curates game soundtracks on a personalized playlist,
    blending performance, music, and visual art into their creative outlet.
  travel: David Pearson spends weekends trekking the sandstone trails of Red Rock Canyon, dreams of backpacking the Grand Canyon, and plans future trips to Orlando's Disney World and Japan's Akihabara district,
    favoring spontaneous road trips over meticulously booked tours while staying mindful of a modest allowance.
  culinary: David Pearson's snack arsenal includes jalapeno-spiced nachos, pepperoni pizza, beef jerky, and trail mix, and while their cooking skills are limited to microwaving mac & cheese and grilling
    cheese-filled quesadillas, they often experiment with DIY taco nights using fresh cilantro, lime, and avocado.
  core: David Pearson is a socially magnetic, competition-driven twelve-year-old who fuses gaming strategy, robotics creativity, and desert-hiking adventure into a relentlessly curious and slightly impulsive
    lifestyle.
background:
  cultural: David grew up in a suburban neighborhood of Las Vegas, Nevada, in a household that blends traditional American values with the city's vibrant entertainment culture. His family, of white, predominantly
    European descent, works in the hospitality and education sectors, exposing him to both the service industry’s fast‑paced environment and the importance of learning. Living near the iconic Strip, David
    has absorbed a lively mix of showmanship, technology, and multicultural interactions, which fuels his sociable nature and knack for drawing attention in group settings. At the same time, the surrounding
    desert and proximity to outdoor recreation areas nurture his appreciation for nature and adventure. This combination of urban excitement and open‑space exploration shapes his worldview, encouraging
    both a competitive drive and a balanced, practical approach to new ideas.
attributes:
