  career_goals: David envisions himself channeling his love of competition and communication into a future where he can both create and showcase interactive experiences. In the short term, he aims to lead
    his middle‑school robotics team to a regional championship and earn a leadership role in the student council. Over the next few years, he plans to attend a high school with a strong STEM and esports
    program, secure a scholarship based on his robotics and gaming achievements, and eventually pursue a degree in computer science or digital media production. Long‑term, David dreams of becoming a professional
    esports player or game developer who can blend storytelling with strategic design, while also using his public‑speaking skills to mentor younger gamers and advocate for youth tech education in the Las
    Vegas community.
