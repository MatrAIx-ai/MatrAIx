  career_goals: Though still very young, Melee often talks about wanting to become an artist who creates colorful paintings of the world, a nature explorer who discovers new insects and plants, or a museum
    guide who shares her love of art and curiosity with other kids. She imagines a future where she can combine creativity with learning, perhaps as a teacher or a curator who inspires others to explore
    ideas.
