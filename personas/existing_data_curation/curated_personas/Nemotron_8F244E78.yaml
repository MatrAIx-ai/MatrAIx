personas:
  professional: Melee Ellis is an aspiring junior illustrator who transforms crayon scribbles and watercolor splashes into sprawling imaginary worlds, and they channel their curiosity into storytelling
    through doodles and LEGO creations.
  sports: Melee Ellis enjoys spontaneous games of tag and nature treasure hunts in the local marshes, occasionally cheers for the Harrington Hawks youth soccer team, and prefers barefoot exploration over
    structured sports practice.
  arts: Melee Ellis is captivated by the bold collages of Eric Carle, the whimsical rhymes of Dr. Seuss, and the playful xylophone tunes from Baby Einstein, weaving these inspirations into their own colorful
    sketches and improvised melodies.
  travel: Melee Ellis loves unplanned day trips to nearby wetlands and the community science museum, thrilled by a family road‑trip to Windsor Castle, and dreams of one day wandering the ancient terraces
    of Machu Picchu.
  culinary: Melee Ellis favours peanut butter‑jelly sandwiches, cheesy macaroni, and strawberry‑banana smoothies, often experimenting by adding glittery sprinkles to pancakes, yet they are notorious for
    leaving crumbs everywhere as they craft their own snack masterpieces.
  core: Melee Ellis blends boundless artistic curiosity with a carefree, slightly scattered attitude, turning every leaf and crayon stroke into a new adventure while juggling occasional messy habits and
    a love for spontaneous play.
background:
  cultural: Melee is raised in a white, middle‑class family in Harrington, Delaware, a small town in Kent County that blends suburban life with coastal influences. Her family values community involvement,
    regularly attending events at the Harrington Public Library, seasonal town festivals, and church gatherings. She is exposed to Mid‑Atlantic American traditions, such as celebrating holidays with family
    meals and enjoying regional foods like Delaware seafood. The proximity to the Delaware Bay encourages outdoor exploration, while her early‑learning program at school introduces her to basic American
    cultural concepts and multicultural stories.
