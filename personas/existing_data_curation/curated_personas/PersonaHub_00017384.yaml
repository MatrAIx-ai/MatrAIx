persona_description: A well-known and respected American architect, Charles Follen McKim, who played a significant role in the development of American architecture, particularly in the Classical and Renaissance
  styles. His firm, McKim, Mead, and White, was influential in the design of many notable buildings and structures, including the Agricultural Palace at the Chicago World's Columbian Exposition, the Harvard
  Club and University Club, and the Pierpont Morgan Library. McKim was also associated with D. H. Burnham, Augustus Saint-Gaudens, and F. L. Olmsted, Jr., on the Senate Park Commission, and was first president
  of the American Academy in Rome.
