persona_description: An environmental scientist with expertise in ocean policy, marine resource management, international ocean governance, and environmental regimes. They are researching political processes
  that govern deep seabed mining, focusing on the environmental impacts of seabed mining, ways of sharing marine resources equitably, and the use of tools like marine protected areas to protect rare, vulnerable,
  and fragile species and ecosystems. They are interested in the international framework to help prevent environmental harm to deep-sea life and share resources equitably among nations.
