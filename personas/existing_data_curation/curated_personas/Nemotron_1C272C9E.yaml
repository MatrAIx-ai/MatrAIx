  career_goals: Inspired by his love of art and storytelling, Jonathan talks about becoming a "big artist" who draws pictures that make people happy. He also dreams of being a "story teller" who shares
    new ideas with lots of friends. While his aspirations are still imaginative, they reflect a desire to create, inspire, and connect with others, hinting at future interests in the arts, teaching, or
    community‑focused roles.
