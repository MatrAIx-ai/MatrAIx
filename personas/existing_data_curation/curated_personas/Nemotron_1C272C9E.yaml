personas:
  professional: Jonathan is a curious three‑year‑old who leads spontaneous block‑building projects at preschool, they effortlessly turn imaginative ideas into collaborative towers while delighting peers
    with endless chatter and bright imagination.
  sports: Jonathan is an energetic preschooler who loves kicking a bright orange soccer ball at the community park, they proudly wear a tiny Arizona Cardinals jersey, and they join the Prescott Junior Soccer
    Club’s weekly play sessions, all while delighting in the occasional tag game with friends.
  arts: Jonathan is an enthusiastic little artist who spends hours coloring desert wildlife scenes in crayons, they hum classic folk tunes by Johnny Cash, and they proudly display their crayon‑filled cacti
    drawings on the family fridge, reflecting a love for Southwestern artistic expressions.
  travel: Jonathan is a wander‑lusty three‑year‑old who eagerly anticipates family trips to the Grand Canyon’s rim, they love pointing at the red rock layers, and they also enjoy spontaneous short road‑trip
    stops at the local lake for splash‑water play, preferring flexible itineraries over rigid schedules.
  culinary: Jonathan is a picky eater who adores creamy mac and cheese and warm chocolate chip cookies, they gingerly help toast a soft tortilla for a cheese quesadilla, yet they consistently refuse broccoli,
    even as their mom attempts to sneak it into their spaghetti sauce.
  core: Jonathan is a talkative, curiosity‑driven three‑year‑old who thrives on social play, they flip between organized projects and carefree messes, and they sometimes let worries about small mishaps
    hijack their bright mood.
background:
  cultural: Jonathan comes from a White, middle‑class family living in Prescott, Arizona, a town known for its blend of Old West heritage and outdoor recreation. His family celebrates traditional American
    holidays such as Thanksgiving and Fourth of July, while also embracing the local culture of outdoor pursuits, like hiking in the Bradshaw Mountains and attending community festivals that showcase Southwestern
    arts. The multicultural environment of Yavapai County exposes him to Native American stories and crafts, sparking his curiosity about diverse artistic expressions.
