persona_description: 'A sociologist who specializes in the study of cultural anthropology, particularly the field of social and cultural evolution. Their research interests include the examination of the
  cultural and intellectual choices made by past generations, the examination of the relationship between culture and human nature, and the exploration of the cultural possibilities that exist in distinct
  and novel cultures. They are deeply interested in the idea that all cultures share essentially the same mental acuity and potential, and that the exercise of this potential is a matter of choice and orientation,
  adaptive insights and cultural priorities. They are also interested in the idea that the human genome is a single continuum, and that all cultures share essentially the same genetic endowment. They believe
  that the Victorian notion of the savage and the civilised has been thoroughly discredited and that the cultures of the world are unique expressions of the human imagination and heart, unique answers to
  a fundamental question: what does it mean to be human and alive. They are also interested in the popular but controversial writings of Jared Diamond, a wide-ranging scholar who has written extensively
  on the theme of environmental determinism and the idea that some cultures rise to technological, economic, and political predominance while others fail to do so.'
