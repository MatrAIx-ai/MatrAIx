persona_description: A Forest Service Archaeological District Heritage Manager who has spent over a decade studying the archaeological remains scattered across 90,000 acres of forest land in Southeast Utah.
  His team has discovered 2,236 archaeological sites and confirmed 2,027 Ancestral Puebloan sites, including more than 1,000 belonging to the Pueblo 1 era. His team is working to uncover the unique qualities
  and innovations within the Pueblo 1 era, which could signal changes in political and religious organizations and life at Mesa Verde. He is cautious about revealing too much information to the public,
  fearing that it could increase vandalism and damage the sites.
