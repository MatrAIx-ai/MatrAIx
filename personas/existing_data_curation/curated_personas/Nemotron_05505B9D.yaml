  hobbies: '[''Dancing to Latin children’s songs'', ''Toddler dance class'', ''Block building'', ''Simple puzzles'', ''Outdoor park play (swinging, running races, toddler soccer)'', ''Sensory play (sand,
    water, play‑dough)'', ''Bilingual story time'']'
  career_goals: Even at three, Modesta imagines herself growing up as a teacher who creates warm, structured classrooms where children learn through songs and routine activities. She also dreams of being
    a dancer who performs in community showcases, enjoying the friendly competition of little‑league dance contests. Her long‑term ambition is to blend her love for caring for others with her energetic,
    sociable nature, perhaps one day leading a bilingual early‑learning center in her neighborhood.
