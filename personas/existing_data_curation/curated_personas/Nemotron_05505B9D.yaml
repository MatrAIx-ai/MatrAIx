personas:
  professional: Modesta Corderorivera, a budding snack‑time coordinator at home, orchestrates daily treats with the precision of a routine‑loving planner while delighting in the lively chaos of her playgroup,
    showcasing early leadership and a practical, hands‑on approach.
  sports: Modesta Corderorivera dashes through the local playground with the same zeal she brings to cheering on the New York Mets and the New York Knicks, and she is enrolled in the Little Kickers Soccer
    program at Queens Soccer Club and attends Tuesday dance‑fit sessions at the Fiesta Gymnastics Studio, blending competitive sprint races with rhythmic movement.
  arts: Modesta Corderorivera fills her afternoons with drawing bright maracas and salsa‑inspired stick figures while humming along to Celia Cruz’s La Vida Es Un Carnaval, dancing to Shakira’s Waka Waka
    at neighborhood gatherings, and watching Disney’s Coco on repeat, nurturing a vivid creative spirit anchored in rhythmic music and colorful storytelling.
  travel: Modesta Corderorivera loves the sensory adventure of splashing at the Rockaway beach, marveling at giraffes in the Bronx Zoo, and reminisces about the family’s recent road trip to Washington,
    D.C.’s National Air and Space Museum, while dreaming of future visits to the bright festivals of New Orleans.
  culinary: Modesta Corderorivera adores the sweet crunch of plantain fritters and the comforting aroma of arroz con gandules, delights in mango‑smoothie sips, proudly adds a sprinkle of shredded cheese
    to her mac and cheese, and eagerly helps her mother roll tiny tortilla wraps filled with black beans and avocado, showcasing a budding palate for both familiar comfort foods and fresh, bright flavors.
  core: Modesta Corderorivera thrives on familiar routines and lively group celebrations, yet habitually leaves puzzle pieces scattered across the floor while fiercely competing to finish stories first,
    embodying an energetic blend of practicality, sociability, and playful stubbornness.
background:
  cultural: Modesta is raised in a Hispanic‑Latino household of Puerto Rican descent in the vibrant, multicultural neighborhoods of Brooklyn and Queens. She grows up bilingual, hearing Spanish at home while
    acquiring English at preschool and in the community. Family traditions such as celebrating Día de los Muertos, Christmas posadas, and salsa dance gatherings are woven into her daily life, reinforcing
    values of family cohesion and cultural pride. The neighborhood’s diverse food stalls introduce her to traditional dishes like arroz con gandules and plantains, and local festivals expose her to live
    Latin music and dance, shaping her energetic and sociable personality.
attributes:
  skills: '[''English language basics'', ''Spanish language basics'', ''Following daily routines'', ''Self‑care (dressing, feeding)'', ''Fine motor skills (block building, puzzle solving, drawing)'', ''Social
