  career_goals: Sheila dreams of a future where she can combine her love for animals with scientific inquiry. She aspires to become a wildlife biologist or veterinarian, studying animal behavior and helping
    creatures in her community. At the same time, she imagines running a small community garden or a DIY craft shop where she could teach younger kids practical skills, reflecting her desire for flexibility
    and hands‑on work. In the short term, she aims to win the school science fair, earn a badge in her local Girl Scouts troop, and develop a simple app in Scratch that teaches basic ecology concepts, building
    confidence and resilience for larger goals.
