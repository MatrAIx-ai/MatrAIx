personas:
  professional: Sheila Loberfeld, an aspiring young programmer and budding naturalist, merges curiosity for building Scratch games with a practical knack for LEGO engineering, turning school assignments
    into interactive wildlife‑themed projects, and they thrive best when deadlines are flexible rather than rigid.
  sports: Sheila Loberfeld spends winter weekends snowshoeing with family, follows the Wabash Warriors high‑school basketball team and the Indiana Pacers with fervor, and they prefer low‑key activities
    like nature hikes over organized sports, balancing a love for the outdoors with modest fandom.
  arts: Sheila Loberfeld fills a field journal with bird and plant sketches, devours fantasy novels such as 'The Hobbit' and discusses them in school book club, grooves to The Avett Brothers while baking
    cookies, and they find solace in creative expression through drawing and storytelling.
  travel: Sheila Loberfeld enjoys road‑tripping to the Indiana Dunes for beachcombing, dreams of wandering the misty forests of the Pacific Northwest, and they plan trips that mix adventure with family‑friendly
    budget considerations, often choosing camping over costly theme parks.
  culinary: Sheila Loberfeld bakes chocolate‑chip cookies with their mother every Sunday, twirls pretzel dough during the town’s Oktoberfest celebration, and they experiment with trail‑mix snacks using
    peanuts, dried cranberries, and popcorn, though they sometimes neglect to clean the kitchen afterward.
  core: Sheila Loberfeld is a quietly curious kid who swaps LEGO bricks for bird sketches, saves spare change for future inventions, and they navigate life with a blend of practical pragmatism and modest
    day‑dreaming.
background:
  cultural: Sheila was raised in a predominantly white, Midwestern small‑town environment in Wabash, Indiana. Her family’s heritage includes German ancestry, reflected in occasional celebrations of Oktoberfest
    with homemade pretzels and participation in the annual county fair. The community emphasizes self‑reliance, neighborly cooperation, and modest celebrations of local history. Sheila’s upbringing includes
    attending a local Lutheran church, taking part in community service projects like food drives, and experiencing the close‑knit social fabric of small‑town life, which shapes her practical outlook and
    respect for both tradition and new ideas.
