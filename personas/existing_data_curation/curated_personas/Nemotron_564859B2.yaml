  hobbies: '[''reading historical fiction'', ''herb gardening'', ''knitting'', ''birdwatching'', ''journaling'', ''crossword puzzles'', ''listening to classic country and folk music'']'
  career_goals: Approaching retirement, Pamela seeks to channel her competitive streak into a mentorship role, aiming to become a lead nursing assistant who trains newer staff and sets quality‑care benchmarks
    on her unit. She plans to obtain a Certified Nursing Assistant (CNA) credential to formalize her expertise and to qualify for part‑time supervisory assignments. Long‑term, she hopes to volunteer as
    a hospice care aide, using her practical knowledge and compassionate presence to support families during end‑of‑life transitions, while also documenting her experiences in a memoir that could guide
    future caregivers.
