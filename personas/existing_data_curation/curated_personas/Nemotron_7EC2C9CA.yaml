  hobbies: '[''building with blocks/Lego Duplo'', ''drawing and coloring'', ''nature exploration with magnifying glass'', ''story time at library'', ''preschool group games'', ''quiet reading'', ''visiting
    parks and biking'']'
  career_goals: Erwin often talks about future jobs he could have, blending his love for helping others with his fascination for building and understanding how things work. He says he wants to become a
    builder who designs safe houses for families, an engineer who creates fun playgrounds, or a veterinarian who cares for animals. His ambitions are shaped by visits to the Austin Nature & Science Center
    and the hands‑on exhibits at the Texas Children’s Museum, where he sees how practical solutions can improve everyday life.
