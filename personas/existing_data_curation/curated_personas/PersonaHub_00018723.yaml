persona_description: A researcher in infectious diseases, particularly in the field of diarrhoeal diseases. This person is interested in the prevalence and etiology of Campylobacter infections in children,
  and the potential role of repeated exposure to the pathogen throughout childhood in explaining the high prevalence observed in older children. This person is also interested in the clinical and epidemiological
  aspects of Campylobacter infections, and the potential impact of viral co-infections on the pathogenesis of the disease.
