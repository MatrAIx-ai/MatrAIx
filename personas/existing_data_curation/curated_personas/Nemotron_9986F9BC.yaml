personas:
  professional: Oradee Smith is a disciplined aspiring IT professional who applies their exceptional organization, meticulous schedule‑keeping, and hands‑on problem‑solving—from Python scripts to car restoration—to
    excel in community‑college coursework and aims to become a network support technician who mentors peers in a structured environment.
  sports: Oradee Smith hits the weight room three times a week at the local gym’s strength club, follows the Detroit Pistons for basketball and the New York Yankees for baseball, and occasionally joins
    a community soccer pickup game in the spring, always logging workouts in a spreadsheet to track progress.
  arts: Oradee Smith finds creative release in listening to minimalist composer Philip Glass, binge‑watching Christopher Nolan’s films like Inception, sketching mechanical diagrams during spare moments,
    and occasionally attending an indie gig featuring The Strokes to unwind.
  travel: Oradee Smith prefers meticulously planned road trips to nearby wonders such as the Grand Canyon and Red Rock Canyon, dreams of a technology‑focused tour of Tokyo’s Akihabara district and the classic
    car museums of Stuttgart, and keeps a travel budget spreadsheet to ensure each journey stays within a modest $500 limit.
  culinary: Oradee Smith enjoys high‑protein meals such as grilled chicken breast with quinoa and steamed broccoli, can whip up a quick protein pancake using oats and almond flour, and treats themselves
    to a spicy chicken tikka masala with basmati rice on occasional weekend outings.
  core: Oradee Smith blends razor‑sharp organization with a love of solitary challenges, turning every chess move, code snippet, and weight‑lifting rep into a meticulously logged victory while quietly mentoring
    peers and budgeting every dollar to stay on track.
background:
  cultural: Oradee grew up in a tightly knit African‑American community in Tampa, shaped by family traditions, church gatherings, and neighborhood mentorship. The local Black culture’s emphasis on resilience,
    self‑discipline, and mutual support has reinforced his calm demeanor and cooperative spirit. He maintains close ties to his extended family, celebrates cultural holidays such as Juneteenth, and draws
    inspiration from the community's history of perseverance.
attributes:
  skills: '["Schedule planning","Data management","Microsoft Excel","Basic Python programming","Mechanical troubleshooting","Budget management","Conflict mediation","Attention to detail"]'
