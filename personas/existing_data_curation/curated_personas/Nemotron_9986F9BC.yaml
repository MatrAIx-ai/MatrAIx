  career_goals: Oradee aims to obtain his GED within the next year, then enroll in a community college program in information technology or a trade certification such as CompTIA A+ or HVAC. His long‑term
    ambition is to secure a stable, structured role—such as a network support technician or logistics coordinator—where he can apply his organizational strengths, eventually becoming a mentor for other
    young adults in his community.
