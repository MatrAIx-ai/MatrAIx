  hobbies: '[''Gardening'', ''Classic car restoration'', ''Bridge (card game)'', ''Volunteer work at church and senior center'', ''Local history research'', ''Cooking for community events'', ''Birdwatching'',
    ''Traveling to visit family'']'
  career_goals: Even in retirement, Joshua aims to stay purposeful by contributing his experience to local nonprofits, documenting Tulsa’s regional history, and offering occasional consulting for community
    projects. He plans to complete a memoir that shares his life lessons, learn digital photography to capture local events, and continue exploring emerging technologies that support senior citizens.
