  career_goals: Rosario dreams of turning her love for art, storytelling, and curiosity about the world into a future career. She imagines herself as a museum curator who highlights Mexican and Latino artists,
    a children’s book author who weaves imaginative tales that teach empathy, or a community-focused environmental educator who creates interactive art installations about conservation. While she sometimes
    worries about the difficulty of these paths, she is determined to develop the skills, study hard, and eventually use her creativity to inspire others and honor her cultural heritage.
