personas:
  professional: Rosario Betancourt, a budding child illustrator, blends vivid imagination with meticulous watercolor technique, channeling their curiosity and organization into weekly art club projects
    and school art contests, and they often double‑check each drawing due to occasional anxiety.
  sports: Rosario Betancourt enjoys the after‑school soccer drills with the under‑11 City Hawks team, spends weekend afternoons at the community pool practicing freestyle laps, and they avidly follow the
    regional baseball franchise, the River City Crushers, while preferring low‑key, small‑group games over large competitive events.
  arts: Rosario Betancourt devotes free afternoons to sketching characters from the novels of J.K. Rowling and the fantasy worlds of Brandon Sanderson, experiments with watercolors inspired by the vivid
    brushwork of Vincent van Gogh and contemporary folk artist Yuyi Morales, and they find solace listening to acoustic ballads by Laura Marling while watching Tim Burton’s whimsical films.
  travel: Rosario Betancourt cherishes weekend family trips to the nearby historic town of Old Mill where they explore the local art museum and the summer day‑camps in the national park’s visitor center,
    dreams of wandering the lantern‑lit streets of Kyoto and the Gaudí‑filled alleys of Barcelona, and they plan each adventure meticulously around school holidays and a modest family travel budget.
  culinary: Rosario Betancourt, an enthusiastic junior chef, enjoys mixing vibrant salsa verde with fresh cilantro and jalapeños, helping roll soft corn masa parcels for homemade tamales during holiday
    gatherings, and they eagerly experiment with watercolor‑inspired plating while also mastering the perfect chocolate‑banana smoothie using ripe bananas and cocoa powder.
  core: Rosario Betancourt is a curious, art‑obsessed ten‑year‑old who hoards stickers, worries about missing a brushstroke, and they secretly indulge in late‑night comics when the house is quiet.
background:
  cultural: Rosario is a first-generation Mexican-American raised in San Dimas, California. Her household blends Mexican traditions with Southern California life; she speaks both Spanish and English fluently
    and celebrates holidays such as Día de los Muertos, quinceañera preparations, and Mexican Independence Day with vibrant family gatherings. She participates in community events at the local cultural
    center, where she learns traditional dances, music, and crafts. This bicultural upbringing nurtures her appreciation for Mexican folk art, cuisine, and storytelling while also exposing her to the diverse
    artistic scene of the Los Angeles region.
attributes:
