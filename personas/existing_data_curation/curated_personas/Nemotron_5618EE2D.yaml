  hobbies: '[''Running'', ''Reading mystery and true‑crime books'', ''Street photography'', ''Volunteering at a local animal shelter'', ''Learning acoustic guitar'', ''Solving puzzles (crosswords, Sudoku)'',
    ''Hiking Indiana Nature Trails'', ''Attending community theater productions (behind‑the‑scenes)'']'
  career_goals: Julia aims to advance from her current security guard position into a supervisory role within the surveillance department of a regional casino or gaming facility. She plans to enroll in
    an associate's program in Criminal Justice to deepen her knowledge of law enforcement and investigative procedures. In the long term, she aspires to become a surveillance manager, overseeing a team
    of officers, implementing advanced analytics tools, and contributing to the development of safety policies. Ultimately, she envisions transitioning into a career in private security consulting, where
    she can leverage her practical experience and analytical skills to advise businesses on risk mitigation strategies.
