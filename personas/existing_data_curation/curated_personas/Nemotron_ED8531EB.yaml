personas:
  professional: Charles Flaws, a seasoned production planner with 15 years mastering SAP, Oracle NetSuite, and Tableau, leverages their lean‑manufacturing expertise, data‑driven analysis, and a blend of
    meticulous organization and flexible problem‑solving to keep shop‑floor schedules humming while mentoring junior staff with a cooperative yet assertive style.
  sports: Charles Flaws spends Saturdays fly‑fishing the Green River, tracks the Kentucky Wildcats basketball and Cincinnati Reds baseball teams with avid enthusiasm, plays shortstop for the Grant County
    Gators recreational softball squad, and maintains baseline fitness through early‑morning runs with the Lexington Road Runners club.
  arts: Charles Flaws channels a lifelong love for the Appalachian landscape into acrylic plein‑air paintings and black‑and‑white photography while savoring live blues legends like B.B. King and folk storytellers
    such as John Prine, and they frequently study the works of Monet and Georgia O'Keeffe at the Kentucky Museum of Art and Craft.
  travel: Charles Flaws prefers carefully planned road‑trip itineraries that blend scenic drives through the Bluegrass region with weekend escapes to music hubs like New Orleans and Nashville, and they
    dream of a spring pilgrimage to Barcelona’s Picasso Museum and Kyoto’s bamboo forests, balancing travel aspirations against a busy production schedule and family obligations.
  culinary: Charles Flaws, an intermediate home‑cook, delights in preparing bourbon‑glazed ribs, Kentucky Hot Brown, and crisp fried catfish seasoned with smoked paprika and fresh heirloom tomatoes, often
    wielding a seasoned cast‑iron skillet while pairing meals with local craft IPA and a splash of rye whiskey.
  core: Charles Flaws blends Midwestern hospitality, a curiosity for emerging tech, and a disciplined yet occasionally over‑committed work ethic, carving out time for art, fly‑fishing, and community mentorship
    while occasionally letting craft‑brew indulgences derail their budgeting.
background:
  cultural: Born and raised in central Kentucky, Charles grew up in a predominantly white, Protestant community where hospitality, self‑reliance, and a strong sense of local identity are core values. Family
    ties to farming and small‑town industry instilled a practical work ethic, while community traditions such as church gatherings, county fairs, and high‑school sports shaped his social outlook. Although
    grounded in these Midwestern‑Southern customs, his natural curiosity and appreciation for art have broadened his cultural palate, leading him to seek out contemporary artistic experiences, global ideas,
    and innovative practices while still honoring his regional heritage.
attributes:
  skills: '["Production scheduling","ERP (SAP, Oracle NetSuite)","Inventory control","Data analysis (Excel, SQL, Tableau)","Lean manufacturing","Value‑stream mapping","Continuous‑improvement project management","Vendor
