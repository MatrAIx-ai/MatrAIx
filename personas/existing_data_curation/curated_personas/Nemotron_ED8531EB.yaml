  hobbies: '["Acrylic landscape painting","Nature photography","Woodworking and furniture restoration","Fly fishing","Live blues and folk music concerts","Visiting craft breweries","Reading contemporary
    fiction and technology non‑fiction","Attending the Grant County fair","Mentoring high‑school students in logistics"]'
  career_goals: Looking ahead, Charles aims to transition from a senior clerk role to a production planning supervisor and eventually a supply chain manager within the next five years. He plans to earn
    the APICS Certified Production and Inventory Management (CPIM) credential and pursue Six Sigma Black Belt training to deepen his process‑optimization expertise. Motivated by his curiosity for new ideas,
    he is also exploring the integration of AI‑driven demand‑forecasting tools in his plant’s workflow. Long‑term, he envisions launching a boutique consulting firm that helps small‑to‑mid‑size manufacturers
    adopt lean and digital practices while preserving the community‑focused values that shaped his upbringing.
