  hobbies: '[''Painting and Sketching'',''Acoustic Guitar (Salsa/Plena)'',''Cooking Puerto Rican Cuisine'',''Hiking in Sierra Nevada Foothills'',''Landscape Photography'',''Reading Modern Latin American
    Literature'',''Volunteering: After‑School Art Workshops'']'
  career_goals: Tony aims to pursue a Master’s degree in Educational Leadership within the next three years, positioning himself for a district‑wide curriculum coordinator role focused on humanities and
    arts integration. He envisions developing a bilingual arts program that connects local Puerto Rican cultural heritage with students’ creative expression, and eventually becoming a department chair where
    he can influence policy and teacher training. Long‑term, he hopes to author a guidebook on interdisciplinary, culturally responsive curricula and to lead statewide workshops that empower teachers to
    incorporate diverse artistic perspectives into their classrooms.
