  career_goals: Martha aims to advance within the banking sector by obtaining a Certified Financial Services Counselor credential and moving into a senior teller or personal banker position, where she can
    provide tailored financial guidance to the growing community of small business owners and boutique wineries in Paso Robles. She also plans to enroll in a local community college to earn an associate’s
    degree in business administration, which would support a future transition into a financial advisory role focused on the local agricultural and wine industry. Additionally, she hopes to develop a side
    venture that combines her passion for art and wine, such as curating pop-up art shows at local vineyards.
