  career_goals: Although currently not in the formal workforce, Alex aims to launch a modest, community‑focused convenience store in Rockaway Park that provides essential goods and a gathering spot for
    neighbors. He also seeks to mentor younger entrepreneurs through a local business incubator and serve on the advisory board of a neighborhood nonprofit. Financially, he plans to build a portfolio of
    low‑risk real‑estate and dividend investments to ensure long‑term stability for his family.
