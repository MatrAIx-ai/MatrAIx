  hobbies: '[''Hiking in Franklin Mountains'', ''Digital Photography'', ''Chess'', ''Cooking modern Mexican dishes'', ''Reading economic and technology non-fiction'', ''Volunteering at financial‑literacy
    workshops'', ''Model rocket building'']'
  career_goals: Jose aims to advance to a senior financial analyst role and eventually a finance director position within a multinational firm that operates on both sides of the U.S.–Mexico border. He plans
    to obtain CFA and CPA certifications, lead a data‑driven finance team, and spearhead fintech initiatives that improve investment accessibility for Hispanic entrepreneurs. Long‑term, he envisions launching
    his own consultancy focused on cross‑border financial strategies and mentoring emerging talent from his community.
