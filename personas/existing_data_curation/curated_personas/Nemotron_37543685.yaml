personas:
  professional: Shantelle Jones is a budding builder who lines up her colorful blocks in precise rows, turning each play session into a structured project and quietly offering gentle help to friends when
    they struggle with a puzzle.
  sports: Shantelle Jones enjoys cheering quietly for the Dallas Cowboys during weekend family outings, and she spends her own afternoons at the Forney Little Sprinters soccer club where she loves the routine
    of dribbling a soft ball in the quiet corner of the field, preferring low‑key activity over loud stadium games.
  arts: Shantelle Jones delights in listening to gospel choirs like the Winans family at Sunday services, and she often mimics their melodies while drawing bright suns and rainbows, a creative outlet that
    reflects her calm, solitary nature.
  travel: Shantelle Jones dreams of a short road trip to Austin’s Zilker Park to feed the turtles, yet she prefers the predictable comfort of family drives to Grandma’s house in Waco, where familiar scenery
    and bedtime rituals keep her feeling safe, and she hopes someday to glimpse the Eiffel Tower on a future vacation.
  culinary: Shantelle Jones loves the sweet taste of sweet potato pie at family gatherings, often helping stir the creamy filling, and she also enjoys crunchy carrot sticks with ranch dressing, a simple
    snack that satisfies her practical palate while she occasionally asks for extra cornbread on Sundays.
  core: Shantelle Jones is a quietly resilient four‑year‑old who finds joy in orderly block towers, simple savings, gentle melodies, and the comforting rhythms of family traditions.
background:
  cultural: Shantelle comes from a Black family rooted in the Dallas‑Fort Worth metro area, specifically the close‑knit community of Forney, Texas. Her family honors African‑American traditions through
    regular Sunday church services, gospel and spiritual music, and family gatherings featuring soul‑food favorites like collard greens, cornbread, and sweet potato pie. Storytelling evenings, holiday celebrations,
    and neighborhood block parties reinforce values of kindness, mutual support, and resilience. Growing up in this environment, Shantelle is surrounded by a blend of Southern hospitality and vibrant Black
    cultural expressions that shape her identity and worldview.
attributes:
  skills: '[''following simple daily routines independently'', ''identifying and sorting colors, shapes, and sizes'', ''using crayons and markers for drawing'', ''cutting with safety scissors'', ''building
    basic structures with wooden blocks'', ''completing simple jigsaw puzzles'', ''navigating educational tablet apps for counting and letters'', ''washing hands and dressing with minimal assistance'']'
  hobbies: '[''reading picture books'', ''coloring with crayons and markers'', ''building with wooden blocks'', ''solving simple jigsaw puzzles'', ''listening to gentle music'', ''collecting leaves, rocks,
    and shells'', ''pretend play with dolls'']'
  career_goals: Even at four, Shantelle imagines a future where she can nurture and support others in calm, structured environments. She dreams of becoming a preschool teacher who creates predictable, gentle
    classrooms where every child feels safe and valued. She also expresses a budding interest in caring for animals as a veterinarian, appreciating the quiet responsibility of looking after pets. Beyond
    specific jobs, she aspires to help her community through simple acts—reading storybooks to younger children, assisting librarians with picture‑book sessions, and volunteering at her church's children's
    ministry.
