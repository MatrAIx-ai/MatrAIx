  career_goals: Although still in preschool, Ashley already dreams about future roles that blend her love for art, caring for living things, and curiosity about the world. She frequently tells adults that
    she wants to become an artist to paint bright pictures, a teacher to help other kids learn, a veterinarian to care for animals, or an astronaut to explore space. She sets simple goals like mastering
    drawing new shapes and learning more about animals, showing early ambition.
