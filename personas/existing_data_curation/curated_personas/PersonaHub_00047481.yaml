persona_description: A biologist or a veterinarian who is interested in the genetic improvement of farmed animals. This person is likely to have a background in animal genetics, animal breeding, or animal
  husbandry. They are familiar with the basic sciences underpinning current farmed animal breeding practice and have a keen interest in understanding the role of genetics in improving the productivity,
  health, and welfare of farmed animals. They are also interested in the practical applications of genetic improvement and are looking for a comprehensive and approachable guide to the latest research and
  technologies in animal breeding.
