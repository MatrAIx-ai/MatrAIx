persona_description: A historian who specializes in the study of the history of science, particularly the emergence of the science of race in the 18th and 19th centuries. His research interests include
  the development of racial taxonomy and the impact of this science on the development of ideas about race and ethnicity in Oceania. He is likely to be interested in the interactions between the scientific
  community and colonial administrators in the region, as well as the role of the British Empire in shaping the development of ideas about race in the Pacific. He may also be interested in the impact of
  this science on the development of ideas about race and ethnicity in other parts of the world.
