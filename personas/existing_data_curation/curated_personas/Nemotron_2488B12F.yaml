personas:
  professional: Sheldon West, a 27‑year‑old indie‑folk songwriter and multi‑instrumentalist, merges Chicago blues tonalities with literary‑inspired narratives while applying a systematic Pro Tools and Ableton
    Live workflow, and they meticulously handle royalties, contracts, and gig scheduling with an organized, slightly skeptical eye toward the industry.
  sports: Sheldon West, an early‑morning hiker of the Indiana Dunes and member of the Chicago Road Runners, follows the Chicago Cubs and Chicago Bulls, joins weekend pickup soccer at Humboldt Park, and
    applies chess‑like strategy to hill‑repeat training, though they sometimes skip leg‑day after late‑night gigs.
  arts: Sheldon West, a devoted reader of James Joyce, Toni Morrison, and Virginia Woolf, curates a vinyl library featuring Muddy Waters, Nick Drake, and early Bill Evans, and spends weekends developing
    Fuji Superia film to capture Chicago’s historic architecture, drawing visual inspiration from Vivian Maier’s street photography to shape his lyrical storytelling.
  travel: Sheldon West prefers meticulously planned weekend escapes that balance low‑key nature retreats with music‑centric stops, having trekked the Indiana Dunes, made a short road trip to New Orleans
    for the Jazz & Heritage Festival, visited Milwaukee’s historic breweries, and dreaming of a pilgrimage to Andalucía’s flamenco scene while keeping travel costs modest to preserve EP funding.
  culinary: Sheldon West, an intermediate home cook, loves crafting Midwest comfort dishes like chicken‑and‑dumplings, deep‑dish pizza topped with smoked mozzarella, and caramelized apple‑cinnamon crumble,
    frequently pairing these meals with treasured vinyl spins for intimate dinner gatherings, and they are particular about sourcing locally roasted beans for their espresso.
  core: Sheldon West is a methodical, anxiety‑prone indie‑folk songwriter who balances a vintage blues obsession with meticulous budgeting, yoga‑induced calm, and a secret habit of checking chess rankings
    before bedtime, and they often rehearse verses in the kitchen while the espresso brews.
background:
  cultural: Sheldon grew up in a middle‑class white family on Chicago’s North Side, the son of parents with Irish and German heritage. His upbringing reflected the Midwestern values of reliability, punctuality,
    and community involvement, while the city’s rich musical tapestry—particularly its historic blues clubs, jazz lounges, and vibrant indie‑folk cafés—provided a constant soundtrack to his youth. He attended
    public schools that emphasized arts education, where he first discovered a passion for literature and music. During high school, he participated in a community choir and weekend open‑mic nights, exposing
    him to the city’s diverse cultural expressions. His Bachelor’s degree in humanities deepened his appreciation for storytelling and cultural studies, informing the lyrical depth of his songs. Living
    in Chicago, he’s attuned to the city’s multicultural neighborhoods, seasonal festivals, and the grit‑and‑grace aesthetic that shapes his artistic identity, blending traditional American songwriting
    with the city’s eclectic urban rhythm.
