  hobbies: '[ ''Reading classic literature and literary criticism'', ''Playing chess (tournaments and online)'', ''Urban photography of Chicago architecture and street scenes'', ''Hiking and nature walks
    in Indiana Dunes State Park'', ''Vinyl record collecting (blues, jazz, folk)'', ''DIY guitar pedal building and electronics tinkering'', ''Yoga and mindfulness meditation for stress relief'', ''Cooking
    Midwest comfort dishes and small dinner gatherings'', ''Attending intimate live performances at basement venues'', ''Curating personal playlists on streaming platforms'' ]'
  career_goals: Sheldon aims to release a debut EP that showcases his fusion of indie‑folk storytelling with Chicago blues tonalities within the next twelve months, followed by a full‑length album that
    receives critical attention from regional music press. He seeks an indie label partnership that offers flexible distribution while preserving artistic control, and plans to build a sustainable touring
    circuit across the Midwest, leveraging his organized scheduling skills to balance travel, performance, and personal well‑being. Long‑term, he aspires to open a boutique recording studio in Chicago’s
    Wicker Park neighborhood, where he can produce his own material, provide high‑quality production services for other emerging artists, and mentor musicians in disciplined creative practices. Additionally,
    he intends to secure sync licensing placements for his songs in film and television to create steady revenue streams.
