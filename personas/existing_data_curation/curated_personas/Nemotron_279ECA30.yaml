  hobbies: '["Community theater acting and production", "Hiking in the Ozarks", "Organic gardening", "Volunteering at the Pulaski County Historical Society", "Weekly trivia night participation", "Wine tasting
    club", "Experimental cooking", "Puzzle solving (crossword, Sudoku)", "Yoga and meditation"]'
  career_goals: Stacey aims to move into senior leadership within the analytics field, seeking a role such as Analytics Director or Chief Data Officer where she can shape data‑driven strategy for regional
    health or education initiatives. She aspires to mentor junior statisticians, publish methodological research in peer‑reviewed journals, and become a sought‑after speaker at national statistical conferences.
    Balancing her competitive drive with her love of community, she also hopes to develop a collaborative analytics hub that supports local government and non‑profits in evidence‑based decision making.
