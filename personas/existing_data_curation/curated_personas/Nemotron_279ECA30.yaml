personas:
  professional: Stacey Davis is an experienced statistician who blends rigorous quantitative analysis with a humanities‑infused communication style, designing complex surveys, predictive models, and interactive
    Tableau dashboards while leading cross‑functional teams with a structured, detail‑oriented approach that channels their sociable energy into compelling presentations at conferences and community meetings.
  sports: Stacey Davis hikes the Ozark Trail with the local Ozark Trail Hikers Club, follows a structured weekend routine of cardio runs and yoga to balance competitive trivia vigor, and roots for the St. Louis
    Cardinals in baseball and the Arkansas Razorbacks football team while occasionally joining a community softball league.
  arts: Stacey Davis pours their sociable flair into community theater, starring in productions like *Our Town* and directing set designs while citing the storytelling prowess of Lin‑Manuel Miranda, the
    emotional depth of Meryl Streep, and the lyrical intensity of The National as daily artistic inspirations.
  travel: Stacey Davis favors meticulously planned getaways that blend outdoor adventure with cultural immersion, having trekked the red rocks of Sedona, savored the hot springs of Arkansas, and dreaming
    of exploring Kyoto’s temples and Tuscany’s vineyards, all while leveraging a travel‑reward credit card to stretch a modest vacation budget.
  culinary: Stacey Davis cultivates an experimental kitchen where they expertly transform garden‑fresh heirloom tomatoes, wild mushrooms, and aromatic herbs into dishes like herb‑crusted lamb and wild mushroom
    risotto, often pairing creations with a curated selection of boutique Pinot Noirs while maintaining a well‑tended sourdough starter and a homemade fermented hot sauce.
  core: Stacey Davis is a data‑driven strategist who balances a love for structured analytics with a vibrant community spirit, occasionally over‑committing to trivia night bragging and wine tasting, yet
    constantly grounding themselves through yoga, garden‑grown meals, and an insatiable curiosity for storytelling.
background:
  cultural: Stacey is a White American with deep Midwestern roots, tracing her family lineage to German and Irish ancestors who settled in Missouri in the early 20th century. Raised in a modest, close‑knit
    community near Waynesville, she internalized values of hard work, reliability, and neighborly support. Her upbringing was shaped by both rural traditions—farmers' markets, church potlucks, county fairs—and
    the presence of Fort Leonard Wood, which introduced a subtle military influence and a diverse social environment. She identifies with the Midwestern ethos of practicality, community involvement, and
    a quiet pride in regional heritage, while also appreciating the broader tapestry of American cultural life.
attributes:
  skills: '["Statistical Modeling", "Predictive Analytics", "Data Visualization (Tableau, PowerBI)", "R Programming", "Python (pandas, scikit-learn)", "Survey Design and Implementation", "SQL Database Management",
