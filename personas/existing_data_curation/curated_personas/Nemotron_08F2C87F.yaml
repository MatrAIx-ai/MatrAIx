  hobbies: '[''Desert Hiking'', ''Landscape Photography'', ''Classic Car Restoration'', ''Woodworking'', ''Succulent Gardening'', ''Birdwatching'', ''Historical Nonfiction Reading'', ''Sustainability Workshops'',
    ''Astronomy Observation'']'
  career_goals: Although retired from full‑time employment, Nicholas aims to remain actively engaged in his community and personal growth. He plans to obtain a certification in historic preservation to
    support local restoration projects, continue mentoring younger volunteers at Habitat for Humanity and the senior center, and expand his role as a board member of the Palm Springs Community Garden Association.
    Additionally, he aspires to curate a small exhibition of his desert landscape photography, author a guide on sustainable native‑plant gardening, and pursue lifelong learning through workshops in digital
    media and sustainable building practices.
