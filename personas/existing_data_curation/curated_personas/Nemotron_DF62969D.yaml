  career_goals: Anita aims to expand her impact by creating a regional partnership program that links local businesses with adult learners seeking career transitions, especially in STEM fields. She aspires
    to develop an interdisciplinary guidance model that incorporates art and creativity to foster innovative thinking in career planning. Over the next few years, she hopes to become a senior advisor for
    the Contra Costa County Education Agency, mentor emerging counselors, and author a guidebook on navigating midlife career changes. Additionally, she is interested in teaching part‑time courses on career
    development at a community college.
