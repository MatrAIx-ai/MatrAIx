personas:
  professional: Anita Corbett is a senior career counselor in Contra Costa County who leverages a STEM background and data‑driven counseling programs, excels in psychometric assessment, curriculum development,
    and grant writing, and brings their curious, art‑appreciative nature into workshops that blend creativity with career planning, while they keep participants engaged with sociable energy despite occasional
    stress‑induced worry.
  sports: Anita Corbett enjoys low‑impact hiking the East Bay hills with their camera, participates in a senior walking club affiliated with the Berkeley Trail Runners, and follows the Oakland Athletics
    and Golden State Warriors avidly, balancing weekly yoga sessions with occasional weekend pick‑up basketball at the community center, though they sometimes skip a session due to lingering worry about
    joint pain.
  arts: Anita Corbett nurtures their artistic soul by painting abstract landscapes in a sunlit home studio, curating visits to the Berkeley Art Museum and exhibitions by contemporary artist Julie Mehretu,
    capturing sunrise vistas of the Bay in black‑and‑white photography reminiscent of Ansel Adams, and attending community theater productions of classics like Arthur Miller’s 'Death of a Salesman', which
    fuels their creative thinking in counseling, and they often select works that inspire innovative career‑planning ideas.
  travel: Anita Corbett plans annual trips to cultural festivals such as the Albuquerque International Balloon Fiesta and New Orleans Jazz & Heritage Festival, preferring immersive itineraries that blend
    art workshops and local food markets, and they budget these journeys by setting aside a dedicated travel fund, yet they often last‑minute adjust plans when a new community art class opens in their area.
  culinary: Anita Corbett delights in farm‑to‑table cuisine, expertly preparing grilled vegetable quinoa bowls with heirloom tomatoes, kale, and feta, while their favorite dish at the weekend farmer’s market
    is a roasted beet and goat cheese salad drizzled with balsamic reduction, and they occasionally indulge in a decadent slice of tiramisu after community theater outings.
  core: Anita Corbett blends a lifelong love of art and a data‑driven counseling career with a habit of over‑worrying about every detail, a penchant for weekend hikes with a camera, and a stubborn tendency
    to procrastinate on tax paperwork until the last minute, while they still manage to host weekly art‑based workshops for seniors.
background:
  cultural: Anita grew up in a middle‑class white family in the Bay Area, where an emphasis on education, civic engagement, and community service was deeply ingrained. Her parents, both school teachers,
    fostered a love of learning and encouraged exploration of diverse cultural experiences, from local festivals to museum visits. Living in Antioch and the broader Contra Costa County has exposed her to
    a mosaic of cultures, including Latino, Asian, and African American communities, shaping her inclusive worldview. She celebrates traditional American holidays while also participating in regional cultural
    events, reflecting a blend of her upbringing and the multicultural environment of Northern California.
