persona_description: A software developer who specializes in creating and managing projects, primarily using XML and textual formats for their files. They are proficient in version control systems and use
  notepad for editing files. The software developer likely has experience with various file types, such as *.avproj, *.avcode, *.avlib, *.avdata, and *.avview, and can manage them effectively. They are
  skilled in using graphical tools such as Regions or Paths for editing binary data. The software developer may also have experience with the HMI Design file format, which they use to store information
  about the layout of Data Previews panels.
