  career_goals: Matthew aims to advance to a district‑manager role where he can mentor multiple store teams and implement region‑wide innovative retail concepts that showcase local arts and crafts. He also
    envisions launching a small boutique that blends his retail expertise with his love for visual art, providing a platform for regional artisans. Additionally, he wants to develop a youth apprenticeship
    program within the county to pass on his practical skills and encourage entrepreneurial thinking among the next generation.
