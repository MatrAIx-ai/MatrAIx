personas:
  professional: An experienced retail manager with decades of floor experience, Matthew Doughty blends practical leadership with an imaginative flair, using modern POS systems and local artistic motifs
    to revamp store layouts, mentor front‑line staff, and orchestrate community events, and they keep a steady, calm approach to conflict resolution.
  sports: Matthew Doughty fuels his love for the outdoors by hiking the Laurel Mountains with the local Laurel Trails Club, cheering on the Appalachian State Mountaineers football team each fall, and joining
    a community softball league on summer weekends, and they keep a modest yet regular yoga routine to stay limber.
  arts: Matthew Doughty spends weekends painting Appalachian vistas in acrylics inspired by Andrew Wyeth’s tonal realism, sketching abstract forms after reading Deleuze, strumming acoustic covers of Bob
    Dylan at community gatherings, and volunteering backstage for the town’s community theater, where they also curate art‑filled fundraising fairs featuring regional artisans.
  travel: Matthew Doughty prefers road trips that blend scenic drives like the Blue Ridge Parkway with stops at art festivals in Asheville, occasional overseas pilgrimages to Tuscany’s Renaissance galleries
    for inspiration, and spontaneous weekend geocaching adventures, all while they budget trips through a dedicated travel savings account to fund the future boutique.
  culinary: Matthew Doughty’s barbecue signature is a slow‑smoked pork rib rub of brown sugar, smoked paprika, and a dash of espresso, complemented by hand‑made coleslaw and grilled sweet corn, and while
    they enjoy experimenting with new marinades, they occasionally indulge in sugary desserts that betray their otherwise health‑conscious cooking ethos.
  core: Matthew Doughty is a 56‑year‑old retail visionary who merges artistic passion with community‑centric leadership, balances disciplined finance with occasional splurges, manages health proactively
    despite minor aches, stays active through hiking and local sports, and they live for the joy of painting, music, and crafted barbecue.
background:
  cultural: Matthew is a white Appalachian native whose family roots trace back to German and Irish settlers in West Virginia. He grew up in Inwood, absorbing the region's strong emphasis on self‑reliance,
    hospitality, and storytelling. The local culture—rich with folk music, handcrafted woodworking, and close‑knit community events—has shaped his values of cooperation and community service. Though his
    formal education ended before ninth grade, he benefited from the area's oral traditions and practical apprenticeship learning, which have informed both his work ethic and his appreciation for blending
    traditional crafts with contemporary retail practices.
