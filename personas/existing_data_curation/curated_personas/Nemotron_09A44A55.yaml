  hobbies: '[''Acrylic Painting'', ''Sketching'', ''Guitar Playing'', ''Hiking'', ''Science Fiction Reading'', ''Local History Exploration'', ''Community Theater Volunteering'', ''Geocaching'', ''Barbecue
