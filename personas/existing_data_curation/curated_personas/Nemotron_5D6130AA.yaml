    Settlers of Catan)", "journaling"]'
  career_goals: Jaime aims to transition from her current period of unemployment into a full‑time senior graphic designer or brand strategist role within a forward‑thinking agency or cultural nonprofit
    in the Nashville region. She seeks to lead interdisciplinary creative teams, crafting visual identities that weave contemporary aesthetics with the rich narratives of her Puerto Rican heritage. Over
    the next two years, she plans to complete a bachelor’s degree in Communication Design to deepen her strategic skill set, while simultaneously building a robust portfolio of client work and personal
    projects that showcase her ability to manage complex timelines, drive innovative concepts, and deliver high‑impact designs. Ultimately, she envisions launching her own boutique design studio that offers
    culturally resonant branding services for small businesses and community organizations, balancing creative freedom with the structured processes she values.
