personas:
  professional: Jaime Rodriguez, a senior graphic designer, blends an abstract painter's imagination with razor‑sharp project management, deploying Adobe Photoshop, Illustrator, and Figma to forge bold
    brand identities while their skeptical, competitive mindset drives relentless quality and deadline adherence.
  sports: Jaime Rodriguez stays active by hiking the Natchez Trace with the Nashville Outdoors Club, practices yoga three times weekly at a downtown studio, and roots for the Tennessee Titans, Nashville
    Predators, and Nashville SC, while they also compete in a local board‑gaming league that serves as a strategic mental workout.
  arts: Jaime Rodriguez immerses themselves in the contemporary art scene, regularly attending exhibitions featuring Kehinde Wiley and Yayoi Kusama, while drawing inspiration from Brian Eno's ambient scores
    and Octavio Paz's surreal poetry to fuel their abstract painting and digital illustration practice.
  travel: Jaime Rodriguez prefers meticulously planned cultural trips, having explored the historic streets of Granada and the vibrant markets of Oaxaca, while they dream of a solo road‑trip along the Pacific
    Coast Highway to capture sunrise over Big Sur, balancing modest travel budgets with occasional spontaneous weekend hikes in the Appalachians.
  culinary: Jaime Rodriguez, an adept home cook, revels in preparing aromatic arroz con gandules with sofrito, pernil seasoned with adobo, and experimental avocado‑lime gazpacho, often sourcing fresh cilantro,
    plantains, and smoked paprika from the local farmer’s market before sharing meals at intimate salsa‑dance gatherings.
  core: Jaime Rodriguez balances a fierce competitive edge with a soothing ritual of nightly journaling, turning stress‑induced worry into vivid abstract art, even as they sometimes binge‑watch sci‑fi marathons
    at the expense of a solid bedtime.
background:
  cultural: Jaime is a first‑generation Puerto Rican American who grew up bilingual, speaking Spanish at home and English at school. Her family maintains strong ties to the island’s traditions, celebrating
    holidays such as Three Kings Day, San Juan Bautista, and the vibrant sounds of salsa, bomba, and plena during family gatherings. Food, music, and storytelling have always been central to her identity,
    and she often incorporates Caribbean motifs and color palettes into her artistic work. Relocating to Kingston Springs, Tennessee, she has blended this Caribbean heritage with the Southern hospitality
    and community spirit of Williamson County. While she embraces the local culture—participating in community events, exploring nearby nature, and enjoying Southern comfort food—she also stays connected
    to the broader Puerto Rican diaspora through cultural festivals, Spanish‑language media, and online communities. This dual cultural lens enriches her worldview, informing both her creative expression
    and her desire to craft designs that honor diverse narratives.
