  hobbies: '["Desert hiking", "DIY home improvement projects", "Model kit building", "Gardening with drought‑resistant plants", "Reading technical manuals and non‑fiction", "Volunteering at a local community
    shelter", "Yoga for flexibility and stress relief", "Attending regional maker fairs"]'
  career_goals: Kayla aims to advance to a lead fabricator or supervisor role within the next few years, obtaining advanced certifications such as AWS Certified Welder and CNC Operator credentials. She
    aspires to mentor apprentices, champion workplace safety initiatives, and eventually launch a small custom metalwork business focused on high-quality, functional art pieces for local clients. Her long‑term
    ambition includes establishing a training program for women entering the trade, promoting diversity and empowerment in a traditionally male‑dominated field.
