personas:
  professional: Kayla Ramey leverages her two‑decade career as a sheet‑metal specialist to oversee precision fabrication, expertly interpreting technical drawings, executing CNC plasma cuts, and performing
    MIG/TIG welds while streamlining workflow, enforcing OSHA standards, and mentoring apprentices toward her goal of a lead fabricator role.
  sports: Kayla Ramey spends Saturdays desert‑hiking the nearby Red Rock trail, joins the local 5‑K running club for weekday mornings, attends games of the regional basketball squad the Eastside Eagles,
    and incorporates yoga into their routine to maintain flexibility and mitigate the physical strain of metalwork.
  arts: Kayla Ramey finds creative inspiration at maker fairs, where they study kinetic sculptures by Arthur Ganson, draw design cues from Alexander Calder’s mobiles, unwind by listening to Joni Mitchell
    and The Band on vinyl, and meticulously assemble vintage aircraft model kits during quiet evenings.
  travel: Kayla Ramey prefers well‑planned road trips that blend adventure with practicality, having charted routes to Arches National Park for desert hikes, scheduled a cultural tour of Sheffield’s historic
    metal‑working district in England, and slots annual family visits to their sister’s coastal town during off‑peak seasons to avoid crowds and stay within budget.
  culinary: Kayla Ramey enjoys cooking simple, protein‑rich meals such as chipotle‑spiced quinoa bowls, roasted cactus and corn salsa, and slow‑cooker pulled‑pork tacos, often finishing dishes with fresh
    cilantro and lime, and takes pride in grinding fresh coffee beans each morning for a robust brew.
  core: Kayla Ramey blends disciplined metal‑fabrication expertise with hands‑on hobbies, methodical finances, proactive health habits, and a steady, structured approach to life.
background:
  cultural: Kayla grew up in a middle‑class suburban setting in the Southwest, where a pragmatic work ethic and self‑reliance are highly valued. Her white heritage blends with the multicultural fabric of
    Arizona, exposing her to diverse community traditions, especially the vibrant Hispanic influences in the region. This environment fostered a strong sense of independence, respect for hard work, and
    a commitment to community involvement. These cultural roots shape her disciplined approach to both her career and personal life, while also nurturing her compassion and willingness to give back.
attributes:
  skills: '["Blueprint reading", "Sheet metal fabrication", "MIG/TIG welding", "CNC plasma cutting", "Material measurement and layout", "OSHA safety compliance", "Quality inspection", "Team coordination",
