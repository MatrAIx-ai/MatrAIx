persona_description: A musician from South Asia who specializes in the da-man, a pair of copper kettle drums used in Ladakh for festive occasions, polo games, horse races, and archery contests. He has extensive
  knowledge of the da-man's playing techniques, construction, and history. His expertise extends to the introduction of the da-man to Ladakh from Baltistan in the 16th century and its association with the
  royal palace in Leh. He is also knowledgeable about the da-man's tuning in 5ths and the different ways it is played.
