personas:
  professional: Felix Torres, an aspiring game developer and animation creator on Scratch, blends curiosity with practicality to prototype simple games while balancing school responsibilities with a collaborative
    spirit.
  sports: Felix Torres plays forward for the local youth soccer club, follows the LA Galaxy, enjoys weekend desert hikes with friends, and drills at the community center’s basketball courts during off‑season,
    though they occasionally skip warm‑ups.
  arts: Felix Torres draws comic strips inspired by superhero tropes and anime, delights in Latin pop hits from Bad Bunny and video game soundtracks like The Legend of Zelda, and spends free time watching
    Studio Ghibli films for artistic inspiration.
  travel: Felix Torres dreams of backpacking through the deserts of Arizona and exploring the historic streets of Oaxaca, but currently favours family trips to Joshua Tree and weekend visits to the California
    coast, preferring planned itineraries that fit around school.
  culinary: Felix Torres experiments with fusion dishes such as avocado‑lime carnitas tacos and grilled corn quesadillas topped with kale pesto, skillfully whipping up simple meals under parental supervision
    while occasionally burning the edges.
  core: Felix Torres is a curiosity‑driven, socially energetic teen who merges soccer, coding, and kitchen experiments, thriving on group projects yet often juggling impulsive spending and occasional health
    nags.
background:
  cultural: Felix comes from a Mexican-American family that maintains strong ties to traditional customs while navigating life in Yucca Valley, California. He speaks Spanish at home and celebrates holidays
    such as Día de los Muertos and Día de la Independencia with family gatherings, traditional foods, and music. The blend of his heritage with the desert community’s outdoor culture has nurtured an appreciation
    for both family-centered values and environmental stewardship. His cultural identity reflects the bilingual, bicultural experience common among many Mexican-heritage youths in Southern California.
attributes:
  skills: '["Bilingual communication (Spanish & English)", "Basic programming (Scratch, introductory Python)", "Team soccer coordination and teamwork", "DIY electronics and simple circuit building", "Project
    organization and group collaboration", "Sketching and visual storytelling"]'
  hobbies: '["Playing soccer", "Coding games on Scratch", "Exploring desert hiking trails", "Drawing comic strips", "Listening to Latin pop and video game music", "Participating in cultural festivals (Día
    de los Muertos)", "Building LEGO models", "Cooking Mexican-California fusion meals"]'
  career_goals: Felix aims to blend his love for technology and community by studying computer science and environmental engineering in college, with the long-term goal of developing interactive educational
    tools that encourage youth in under-represented communities to engage with science and the outdoors. He also envisions a role as a mentor for middle-school students, using his sociable nature to inspire
    collaborative learning.
