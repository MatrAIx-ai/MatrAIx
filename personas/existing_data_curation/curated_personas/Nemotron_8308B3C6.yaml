personas:
  professional: Khanh Tran is an aspiring graphic design and UX student who leverages their Adobe Photoshop expertise, bilingual communication, and leadership experience in debate and drama clubs to craft
    inclusive digital experiences, while their curiosity and collaborative spirit shine through every project.
  sports: Khanh Tran stays fit by practicing yoga three times a week, dancing with the high-school contemporary dance team, and cheering for the Los Angeles Galaxy while occasionally joining community pick-up
    basketball games on weekends.
  arts: Khanh Tran immerses themselves in the local art scene, sketching in cafés while streaming indie rock from Tame Impala, pop hits by Ariana Grande, and K-pop tracks from BTS, drawing inspiration from
    Banksy’s street murals and Yayoi Kusama’s surreal installations.
  travel: Khanh Tran prefers budget-friendly, culturally immersive trips, planning weekend getaways to New Orleans’ historic French Quarter for its jazz and art festivals, and dreaming of a month-long backpacking
    adventure across Southeast Asia to capture sunrise over rice terraces for their photography portfolio.
  culinary: Khanh Tran loves cooking family-style dishes like pho, bánh chưng, and fresh spring rolls, experimenting with aromatic herbs such as lemongrass and star-anise, while their casual skill level
    lets them quickly stir-fry a meal for friends, though they sometimes burn caramelized onions when distracted by music.
  core: Khanh Tran blends artistic curiosity with a community-first mindset, juggling late-night design sprints and over-thinking that fuels both brilliant ideas and sleepless nights, while their habit
    of procrastinating on assignments betrays an otherwise organized demeanor.
background:
  cultural: Khanh grew up in Dallas, Texas, within a close‑knit Vietnamese‑American community. Her parents immigrated from Vietnam, preserving traditions such as celebrating Tet, preparing bánh mì, and
    speaking Vietnamese at home. This bicultural upbringing instilled a deep respect for family, elders, and community reciprocity while also exposing her to mainstream American culture—sports, Texan cuisine,
    and a vibrant arts scene. She identifies as Asian‑American, comfortably navigating both her heritage and the diverse cultural landscape of Dallas. Participation in local cultural festivals, community
    center events, and multilingual school projects has reinforced her ability to bridge cultural gaps, celebrate diversity, and maintain a harmonious sense of identity.
