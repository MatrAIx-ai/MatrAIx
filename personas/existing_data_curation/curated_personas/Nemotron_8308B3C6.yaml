  hobbies: '[''Painting'', ''Sketching'', ''Visiting art galleries'', ''Listening to indie and K‑pop music'', ''Contemporary dance'', ''Cooking Vietnamese cuisine'', ''Debate club'', ''Drama club'', ''Yoga'',
