  career_goals: Khanh plans to enroll in a university program focused on graphic design and user experience, aiming to create inclusive digital products that promote mental‑wellness and cultural understanding.
    She dreams of working for a creative agency or tech company where she can blend her artistic talents with her passion for community building. In parallel, she hopes to volunteer as a mentor for younger
    Vietnamese‑American students, eventually pursuing graduate studies in counseling or social design to integrate design thinking with mental‑health advocacy. Her long‑term ambition is to lead interdisciplinary
    projects that empower marginalized voices while maintaining a harmonious and supportive workplace culture.
