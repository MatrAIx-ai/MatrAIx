  career_goals: Although retired, Reyner aims to keep contributing his expertise by volunteering as a mentor for local high‑school STEM clubs, serving on the board of a community development nonprofit,
    and offering occasional consulting on process improvement for small businesses. He also plans to write a memoir that weaves together his Peruvian heritage and professional journey, and to obtain a certificate
    in senior health advocacy to support his peers in the community.
