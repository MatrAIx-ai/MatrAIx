persona_description: A cognitive psychologist who specializes in the study of memory and attention. They are particularly interested in the factors that influence the retention and recall of information,
  and have developed methods to improve memory and learning. They have conducted research on the role of emotion, curiosity, and elaboration in memory, and have developed techniques to help students remember
  information more effectively. They are known for their approach to studying, which involves active reading and writing, and for their use of the SQ3R method for active elaboration. They are likely to
  be interested in the field of psychology, and to have a strong background in cognitive science.
