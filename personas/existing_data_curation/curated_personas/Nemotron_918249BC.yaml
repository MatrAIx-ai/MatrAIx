personas:
  professional: Camen Merlos is a senior graphic designer who leverages Adobe Creative Suite mastery, meticulous typography expertise, and bilingual client communication to deliver culturally resonant brand
    identities while methodically managing print production and project timelines with an eye toward art director promotion.
  sports: Camen Merlos enjoys hiking the Hill Country trails near Granbury, follows the Dallas Cowboys for football, the Texas Rangers for baseball, and participates in a local adult soccer league, balancing
    solo outdoor workouts with occasional group matches that fit their schedule.
  arts: Camen Merlos immerses in watercolor painting inspired by Georgia O'Keeffe, contributes intricate quilts to a community circle featuring works by Vera Isham, and regularly attends art fairs where
    they admire pieces from contemporary Mexican‑American muralist Jorge Rodriguez, allowing creative expression to temper their structured professional life.
  travel: Camen Merlos prefers meticulously planned weekend getaways, favoring nearby Hill Country vineyards, Austin music festivals, and occasional road trips to Santa Fe for its adobe architecture, while
    dreaming of a month‑long immersion in Oaxaca to study traditional cooking techniques and local design motifs.
  culinary: Camen Merlos is an avid home chef who expertly prepares mole poblano, chiles en nogada, and handmade corn tortillas, sourcing fresh cilantro, dried chilies, and masa harina from local markets,
    and relishes plating each dish with an eye for color harmony akin to their design work.
  core: Camen Merlos blends meticulous design precision with a love for solitary creativity, balancing a razor‑sharp work ethic with the quiet rebellion of late‑night kitchen experiments.
background:
  cultural: Camen grew up in a Mexican‑American household in Texas, fluently speaking both Spanish and English. Family traditions such as Día de los Muertos, quinceañeras, and weekly Sunday mass shape her
    cultural identity. She carries forward Mexican culinary customs, folk art motifs, and a reverence for community solidarity, while also embracing the modest, neighborly values of Granbury. Her designs
    often subtly incorporate vibrant Mexican color palettes and folkloric patterns, reflecting a balanced blend of her heritage and her adopted Texan surroundings.
attributes:
  skills: '[''Adobe Photoshop'', ''Adobe Illustrator'', ''Adobe InDesign'', ''Typography'', ''Brand Identity Development'', ''Print Production Management'', ''Digital Asset Management'', ''Project Scheduling'',
    ''Client Consultation (Spanish/English)'', ''Basic UX/UI Design'', ''Critical Design Review'']'
  hobbies: '[''Traditional Mexican cooking'', ''Hill Country hiking'', ''Historical fiction reading'', ''Watercolor painting'', ''Home gardening'', ''Quilting circle'', ''Small community art workshops'']'
  career_goals: Camen aims to progress from senior graphic designer to art director within the next five years, leading a small, tightly‑run design team that values structure and high‑quality output. She
    plans to earn Adobe Certified Expert credentials and deepen her UX/UI capabilities to broaden her service offering. Long‑term, she envisions opening a boutique studio in Granbury that specializes in
    culturally resonant branding for Mexican‑American businesses, allowing her to blend her heritage with professional expertise while maintaining a predictable work‑life balance for her family.
