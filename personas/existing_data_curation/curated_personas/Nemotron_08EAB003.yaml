  hobbies: '[''Mexican cuisine cooking'', ''Gardening (vegetables & herbs)'', ''Hiking local trails'', ''Yoga and meditation'', ''Reading business and personal development books'', ''Volunteering at community
    center'', ''Traveling to Mexico to visit family'', ''Attending cultural festivals'', ''Quilting and textile arts'', ''Nature photography'']'
  career_goals: She is determined to elevate her impact by moving into a senior leadership role such as Director of Project Management Office within a regional corporation or a public‑private partnership
    focusing on sustainable infrastructure. Over the next five years she plans to earn the PMI PMP‑Master designation and Six Sigma Black Belt, mentor emerging female project managers, and eventually launch
    her own consultancy that bridges Mexican‑American business practices with Midwestern industry standards.
