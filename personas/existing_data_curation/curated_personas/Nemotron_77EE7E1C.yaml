personas:
  professional: Lionel Smith is a seasoned arts administrator who leverages meticulous project management, grant‑writing expertise, and event‑planning acumen to lead community‑center programs in Chicago,
    using their methodical, competitive drive to secure funding while navigating stakeholder dynamics with a healthy dose of skepticism.
  sports: Lionel Smith is an avid pick‑up basketball player for the West Loop Hurricanes adult league, a die‑hard Chicago Bulls fan who follows the team each season, and a regular participant in local fitness
    classes, combining vigorous weekend games with off‑season weight‑training at a nearby gym.
  arts: Lionel Smith immerses themselves in Chicago’s jazz and blues scene, attending performances by Wynton Marsalis and the Art Ensemble of Chicago, curating street‑photography essays of Hyde Park life,
    and organizing after‑school art workshops that echo the community‑centric ethos of historic cultural hubs like the DuSable Museum.
  travel: Lionel Smith’s travel style blends purposeful field trips to cities like New Orleans for live jazz festivals and weekend road trips to the Indiana Dunes, while dreaming of an extended study tour
    of the art districts in Paris and Florence to gather inspiration for future community projects.
  culinary: Lionel Smith enjoys cooking traditional soul‑food dishes such as crispy fried chicken, slow‑cooked collard greens, and sweet potato pie, honing their culinary chops at family gatherings and
    occasionally experimenting with a homemade hot‑sauce made from Scotch bonnet peppers—a spicy habit that sometimes leaves their kitchen a mess.
  core: Lionel Smith is a structurally‑minded community champion who balances a competitive love of basketball with an organized passion for jazz, grant‑writing, and soul‑food cooking—often juggling spreadsheets
    and camera lenses while occasionally succumbing to impulsive concert splurges.
background:
  cultural: Lionel is an African American who grew up in Chicago's South Side, immersed in the city's rich Black cultural traditions. He was raised in a close‑knit family that emphasized community involvement,
    church participation, and storytelling. His upbringing exposed him to the legacy of Chicago's blues, jazz, and spoken‑word scenes, as well as the historical significance of the Great Migration and civil
    rights movements. These influences shape his identity and drive his commitment to preserving Black cultural heritage through education, community programs, and artistic expression.
attributes:
  skills: '[''Project Management'', ''Event Planning'', ''Community Outreach Coordination'', ''Grant Writing'', ''Public Speaking'', ''Academic Research'', ''Curriculum Development'', ''Digital Media Production'',
