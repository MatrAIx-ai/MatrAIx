  hobbies: '[''Basketball (team leagues)'', ''Jazz and blues concerts'', ''Museum and gallery visits'', ''Reading African American literature'', ''Cooking soul‑food dishes'', ''Street photography'', ''Mentoring
    youth in art workshops'']'
  career_goals: Lionel aims to transition back into the workforce by securing a leadership role in arts administration or community development, preferably as a program director for a cultural center in
    Chicago. He is focused on building a stable, structured career that leverages his organizational talents and his passion for fostering artistic expression among under‑represented youth. In the longer
    term, he envisions establishing his own non‑profit organization dedicated to preserving and promoting African American cultural heritage through education and public events.
