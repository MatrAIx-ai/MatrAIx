    guides'']'
  career_goals: Adam aims to secure a stable, structured career path that leverages his practical skills. His immediate goal is to obtain a GED within the next year, followed by an apprenticeship in a trade
    such as automotive technology, HVAC, or electrical work. He is also considering enlistment in the U.S. Army, attracted by the clear hierarchical environment, benefits, and opportunities for technical
    training. Long‑term, he hopes to become a certified technician, earn a respectable wage, and possibly mentor younger community members who share his interests in hands‑on work and gaming.
