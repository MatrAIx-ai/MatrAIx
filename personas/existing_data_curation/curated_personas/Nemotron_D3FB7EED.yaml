  career_goals: Even at seven, Jillian dreams of careers that blend creativity, quiet focus, and a chance to share knowledge with others. She imagines becoming a children’s book illustrator, a museum curator
    specializing in natural history, or a wildlife artist who can capture the serenity of Lake Erie’s coast. She also expresses interest in becoming a librarian, creating calm, orderly spaces where other
    children can explore books and art. Her long‑term ambition is to use her artistic talents to bring comfort and inspiration to people while working in environments that respect her need for solitude
    and reflection.
