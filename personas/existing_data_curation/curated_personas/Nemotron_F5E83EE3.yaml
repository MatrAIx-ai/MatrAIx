personas:
  professional: Paula Delcarpio is a high‑school senior who blends bilingual communication, photo‑video editing, and event coordination to run youth cultural nights and health‑fair pop‑ups, turning curiosity
    into practical community outreach while they juggle school assignments and part‑time coding lessons on Scratch.
  sports: Paula Delcarpio spends warm Florida evenings battling for points on the sand with the Fort Lauderdale Youth Volleyball Club, roots for the Miami Dolphins on Sundays, follows the Miami Heat’s march
    to the playoffs, and squeezes in sunrise jogs along the Gulf Coast whenever they need a solo reset.
  arts: Paula Delcarpio lights up local youth gatherings with salsa and reggaetón moves, while they edit snappy TikTok clips set to Bad Bunny and Shakira, channeling the bold colors of street muralist “Stitch,”
    and they draw inspiration from Lin‑Manuel Miranda’s storytelling to craft relatable, bilingual content.
  travel: Paula Delcarpio dreams of strolling through the cobblestone streets of Charleston and exploring the turquoise waters of the Bahamas, while they regularly road‑trip with friends to Key West and
    Naples, mapping each stop on Google Maps and packing a portable speaker for spontaneous dance breaks.
  culinary: Paula Delcarpio experiments with island flavors by perfecting arroz con gandules and golden empanadillas filled with spiced pork, whipping up fresh mango salsa for summer cookouts, and they
    swap secret spice blends over late‑night video calls, though they sometimes over‑salt dishes in the excitement.
  core: Paula Delcarpio fuses infectious energy with meticulous planning, leading dance crews, beach‑volleyball squads, and community health projects, yet they can’t resist binge‑scrolling TikTok late into
    the night or an occasional reckless shoe purchase.
background:
  cultural: Paula grew up in a Puerto Rican‑American household in Niceville, Florida. Her family maintains strong ties to Puerto Rican traditions, celebrating fiestas like San Juan and rehearsing música
    jíbara during holidays. Bilingualism is a daily practice at home, and she often helps younger relatives with Spanish homework. While embracing the laid‑back coastal lifestyle of Walton County—spending
    weekends at the beach and participating in local fairs—she also values the close‑knit community spirit and familial respect that are hallmarks of her heritage.
attributes:
