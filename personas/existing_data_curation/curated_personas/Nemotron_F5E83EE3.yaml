    events"]'
  career_goals: Paula aims to pursue a college degree in communications or public health with a focus on community outreach. She wants to combine her passion for helping others, her cultural heritage, and
    her practical skill set to become a bilingual community liaison or health educator. In the short term, she plans to earn her high school diploma, take part‑time courses at a local community college,
    and volunteer at health fairs and cultural festivals to build experience.
