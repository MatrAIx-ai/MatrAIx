  career_goals: Although retired, Carlos hopes to channel his curiosity and love of art into a small-scale community project that brings together local Appalachian craftsmen and Latin American artists for
    collaborative workshops. He aspires to mentor teens interested in photography and storytelling, helping them document the town’s evolving cultural tapestry. He also plans to write a memoir that weaves
    personal family history with reflections on the immigrant experience, and he dreams of organizing an annual multicultural festival in Daniels that celebrates both Venezuelan and Appalachian music, food,
    and crafts.
