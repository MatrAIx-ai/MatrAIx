  hobbies: '[''Watercolor painting'', ''Macro photography'', ''Reading speculative fiction and philosophy'', ''Chess'', ''Arduino and DIY health-monitoring projects'', ''Community health fair volunteering'',
    ''Vegetable gardening'', ''Hiking in Michigan state parks'', ''Live music and theater attendance'', ''Creative writing (short stories and poetry)'']'
  career_goals: Theron aims to transition from bedside practice to a leadership and educational role within the next five years. He plans to obtain a Certified Wound-Care Nurse (CWCN) credential and pursue
    a Bachelor of Science in Nursing (BSN) followed by a Master’s in Nursing Education, positioning himself to become a clinical instructor for LPN/RN programs in Michigan. Simultaneously, he seeks to design
    and implement an interdisciplinary art-therapy initiative that supports chronic-illness patients in his hospital. Long-term, he envisions serving as a quality-improvement director, mentoring new nurses,
    and eventually volunteering his expertise in community health outreach programs across Genesee County.
