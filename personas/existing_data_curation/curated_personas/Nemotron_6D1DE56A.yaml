  career_goals: 'Hugo aims to translate his on‑the‑ground experience into a supervisory role within the next two years, targeting a shift‑lead or assistant warehouse manager position at his current facility.
    To qualify, he plans to complete the OSHA 30‑hour General Industry certification and become a Certified Forklift Trainer, adding formal credentials to his hands‑on expertise. Long‑term, Hugo envisions
    launching a small, family‑owned freight and material‑handling business that can serve local manufacturers in Boone County, providing a stable income stream for his wife and children. He is motivated
    by a desire for financial security and a lower‑stress work environment, so he is also working on mastering stress‑management techniques and delegating responsibilities as he moves up the hierarchy.
    His ambition is balanced by his practical nature: he wants incremental progress rather than rapid, risky jumps, ensuring his family’s well‑being remains central.'
