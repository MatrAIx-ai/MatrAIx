  hobbies: '[''Playing soccer'', ''Building with LEGO'', ''Reading picture books'', ''Solving jigsaw puzzles'', ''Exploring the woods and collecting leaves'', ''Drawing houses and vehicles'', ''Playing
    structured educational apps'', ''Attending community events like maple syrup festivals and winter sledding'']'
  career_goals: Joshua often talks about wanting to be a firefighter someday because he loves the idea of following clear procedures, helping others, and being part of a team. He also dreams of designing
    and building things, imagining himself as a civil engineer or a construction worker who creates sturdy bridges and houses. His competitive streak fuels his ambition to excel in whichever role he chooses,
    aiming to be reliable and respected.
