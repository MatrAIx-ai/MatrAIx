persona_description: A mechanical engineer who specializes in the design and testing of automotive components, particularly seat belt retractors. This person has extensive experience with vibration testing
  and has worked on developing and improving test procedures for rattles in automotive components. They are skilled in minimizing sound levels, selecting appropriate vibration types, and minimizing instrumentation
  problems. They have developed firm specifications and qualification tests for test systems and have a deep understanding of the challenges involved in producing appropriate vibration conditions in a test
  lab.
