personas:
  professional: Brittney Lee, a 73-year-old veteran computer systems analyst turned creative consultant, blends four decades of data modeling, SQL, and Python automation expertise with a design-thinking
    lens to craft user-centric technology solutions for local nonprofits, while mentoring junior analysts and championing the marriage of art and systems design.
  sports: Brittney Lee, an enthusiastic participant in weekly walking groups along the St. Johns River, supports the Jacksonville Jaguars, occasionally joins a senior bowling league at the community center,
    and enjoys low-impact tai chi sessions to stay fit.
  arts: Brittney Lee, an avid painter of abstract watercolors and digital illustrator on her tablet, regularly attends openings at the downtown Jacksonville Art Museum, draws inspiration from Mark Rothko
    and Yayoi Kusama, performs in community theater productions, and dances ballroom at the senior social club, all of which feed her imaginative spirit.
  travel: Brittney Lee, who plans trips with her husband using a blend of detailed itineraries and spontaneous detours, has cherished weekend getaways to Savannah and Charleston, a nostalgic pilgrimage
    to Kyoto's garden temples, and dreams of exploring Barcelona's modernist architecture, while balancing travel costs with a modest pension.
  culinary: Brittney Lee, a culinary experimenter who loves crafting shrimp and grits with fresh local herbs, perfecting key lime pie using real Florida limes, and mastering Thai basil chicken, often sources
    ingredients at the farmer's market and shares her creations at book-club potlucks, though she sometimes over-salts dishes while engrossed in a crossword.
  core: Brittney Lee blends a lifetime of tech expertise with a vibrant artistic soul, mentoring seniors in coding, strolling riverside, and turning every puzzle into a creative breakthrough, all while
    juggling a love for garden-fresh meals and occasional library-fine mishaps.
background:
  cultural: Brittney grew up in the American South and has been shaped by the values of Southern hospitality, community involvement, and a strong work ethic. Living in Jacksonville, a coastal city with
    a vibrant mix of cultures, she embraces both the relaxed, outdoor lifestyle of Florida and the dynamic, multicultural environment of an urban center. Her family traditions include holiday gatherings,
    church participation, and local volunteerism, all of which reinforce her cooperative and caring nature. While her ethnic background is white, she actively seeks out diverse perspectives through her
    work and community activities, reflecting the inclusive spirit of modern Jacksonville.
