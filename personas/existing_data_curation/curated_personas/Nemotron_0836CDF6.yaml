  hobbies: '[''Abstract watercolor painting'', ''Digital illustration'', ''Art gallery visits'', ''Senior book club (science fiction)'', ''Gardening (native Floridian plants)'', ''Walking groups along the
    St. Johns River'', ''Community theater'', ''Ballroom dancing'', ''Volunteer computer tutoring'', ''Crossword puzzles'', ''Cooking new recipes'']'
  career_goals: In the coming years Brittney aims to leave a lasting legacy by mentoring the next generation of analysts and championing the integration of creativity into technology projects. She plans
    to transition into a consultative role, helping local nonprofits modernize their operations and develop digital outreach programs. She also hopes to author a series of articles on the intersection of
    art and systems design, and to explore emerging technologies such as AI‑assisted creative tools. Additionally, she aspires to develop a community workshop that teaches seniors basic coding and digital
    art, fostering both empowerment and intergenerational collaboration.
