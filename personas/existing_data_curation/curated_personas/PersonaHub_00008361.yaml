persona_description: A program coordinator who is passionate about fostering positive emotions related to nature and place among urban youth, and believes in the power of place attachment to promote environmentally
  responsible behaviour. They are committed to teaching children respect and appreciation for the forest, while acknowledging the Indigenous groups who once lived in the area. They are skilled in developing
  nature connectivity and place attachment through place-based education, and have a deep understanding of the connection between humans and nature. They are dedicated to promoting a culture of connectivity
  and gratitude, and are confident in their ability to engage youth through education and encourage the creation of human-nature relationships without the explicit intent that these values manifest as desirable
  behaviours.
