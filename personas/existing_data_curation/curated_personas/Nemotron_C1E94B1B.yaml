  hobbies: '[''Gardening'', ''Cooking traditional Mexican dishes'', ''Yoga and meditation'', ''DIY home-improvement projects'', ''Reading mystery novels'', ''Volunteering at community events'', ''Listening
    to regional Mexican music'']'
  career_goals: Cristina aims to advance from laborer to crew foreman within the next three years, leveraging her associate degree in construction technology to obtain OSHA 30-hour certification and NCCER
    credentials. She aspires to lead a team where she can implement systematic safety and quality processes, eventually pursuing a supervisory or project-management role. Long-term, she dreams of starting
    a small, family-owned construction firm that emphasizes reliable, high-standard work for the Red Oak community, providing stable employment for other workers like herself.
