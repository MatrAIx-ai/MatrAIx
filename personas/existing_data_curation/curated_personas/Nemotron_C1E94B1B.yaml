personas:
  professional: Cristina Oliva, a seasoned construction laborer with a reputation for meticulous blueprint interpretation and zero‑tolerance safety compliance, uses their associate degree in construction
    technology, their disciplined work ethic, and daily logs to spot issues early, coordinate crew tasks efficiently, and they aim to become a crew foreman within three years.
  sports: Cristina Oliva, a fan of the Dallas Cowboys and Houston Astros, spends weekday evenings in a local community‑center yoga class, joins a weekend adult softball league in Red Oak, and hikes the
    Texas Hill Country each spring to stay fit, and they prefer structured workouts over spontaneous activity.
  arts: Cristina Oliva, who devotes weekend afternoons to reading Agatha Christie mysteries and listening to the ranchera sounds of Vicente Fernández, often attends local cultural festivals where they volunteer,
    finding that the blend of classic storytelling and regional music fuels their creative spark and offers a soothing counterpoint to a demanding construction schedule.
  travel: Cristina Oliva, an avid planner who maps trips in a detailed notebook, enjoys weekend getaways to the Hill Country wineries, dreams of exploring the historic streets of Oaxaca, but they balance
    travel ambitions with the financial realities of saving for a future business, often opting for budget‑friendly road trips over costly flights.
  culinary: Cristina Oliva, whose cooking skill ranges from mastering tamales and pozole to experimenting with chiles en nogada and quinoa‑infused salsas, prefers fresh corn masa, dried ancho chilies, and
    locally sourced cilantro, and they treat each meal as both a therapeutic ritual and a way to share heritage at community gatherings.
  core: Cristina Oliva, a 41‑year‑old construction pro with a knack for turning blueprints into bullet‑proof safety plans, channels their meticulous nature into gardening, yoga, and fiery Mexican cooking,
    while they constantly juggle ambition, worry‑laden thoughts, and a habit of staying up late sketching future projects.
background:
  cultural: Cristina is a first-generation Mexican-American who grew up in a bilingual household in Texas, speaking both Spanish and English. Her family places strong emphasis on community, family loyalty,
    and the values of hard work (trabajo duro) inherited from Mexican cultural traditions. She celebrates Día de los Muertos, Mexican Independence Day, and participates in local Hispanic festivals. These
    cultural ties influence her culinary interests, her collaborative spirit at work, and her commitment to supporting fellow Mexican-American laborers in the construction industry. She is also active in
    her Catholic parish, which provides a supportive social network.
attributes:
  skills: '[''Blueprint reading'', ''Concrete pouring'', ''Formwork construction'', ''Structural framing'', ''Site safety compliance'', ''Heavy equipment operation'', ''Material inventory management'',
