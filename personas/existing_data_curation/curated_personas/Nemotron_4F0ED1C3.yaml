  career_goals: Jason dreams of a future where his love for structure and concrete results can be turned into a career. He often talks about becoming a civil engineer or architect, imagining himself designing
    safe bridges and buildings that help his community. He also admires firefighters for their clear routines and the way they protect others, so a role in public safety also appeals to him. Ultimately,
    he hopes to finish school with top grades, gain the reliable schedule he values, and work in a profession where his practical skills and teamwork make a tangible difference.
