personas:
  professional: Jason Ryan is a budding engineer in the making, already mastering complex LEGO builds and puzzle games that reveal a natural affinity for systematic problem solving and a desire for clear,
    step‑by‑step outcomes.
  sports: Jason Ryan follows the Chicago Cubs on TV, swings a plastic bat for the Pine Grove Little League team, and enjoys practicing short catch sessions with a close friend, preferring low‑pressure,
    structured play over large organized sports.
  arts: Jason Ryan delights in sketching cartoon characters inspired by Mo Willems and Dr. Seuss, and spends evenings re‑creating scenes from the adventure books they read, while also admiring the stop‑motion
    LEGO animations of Brick Film Fest.
  travel: Jason Ryan loves weekend trips to the nearby state park where they collect rocks, and dreams of a family vacation to the Grand Canyon and a future visit to Disneyland, balancing curiosity with
    the comfort of familiar routines.
  culinary: Jason Ryan prefers simple comfort foods like pepperoni pizza, chicken nuggets with ketchup, and peanut‑butter‑jelly sandwiches, yet enjoys helping stir spaghetti sauce with a wooden spoon and
    occasionally tries to assemble a ‘LEGO‑themed’ fruit salad using grapes, bananas, and strawberries.
  core: Jason Ryan is a meticulous, yet easily worried seven‑year‑old who thrives on structured play, occasional impulsive spending, and a quiet imagination that fuels endless LEGO creations and cartoon
    sketches.
background:
  cultural: 'Jason is raised in a predominantly white, middle‑class suburban family in Jericho, New York, a community known for its strong emphasis on education, safety, and community involvement. His upbringing
    reflects typical Long Island suburban culture: participation in after‑school programs, local sports leagues, and family traditions around holidays such as Thanksgiving, Christmas, and Fourth of July.
    He attends a public elementary school with a diverse student body, where his family places high value on academic achievement, respectful behavior, and contributing to neighborhood events.'
