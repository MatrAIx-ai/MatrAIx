personas:
  professional: Nelson Koonce is an organized junior team captain who blends their love for structured LEGO building with leadership on their school soccer and baseball squads, constantly planning practices
    and scouting reports while passionately debating plot twists from adventure books with teammates.
  sports: Nelson Koonce thrives on the soccer field and baseball diamond, playing as a midfielder for the Greenfield Gears youth soccer club and as a shortstop for the Brookside Braves baseball team, while
    cheering for the MLB’s Detroit Tigers and MLS’s Los Angeles FC, and they dedicate after‑school drills to improve agility and teamwork.
  arts: Nelson Koonce immerses themselves in adventure literature, often quoting R.L. Stine and J.K. Rowling, while humming the tunes of Imagine Dragons and favorite Disney soundtracks, and they occasionally
    sketch comic panels inspired by their favorite movies starring Chris Pratt.
  travel: Nelson Koonce prefers family‑planned trips that mix exploration and play, having visited the Grand Canyon, the beaches of Myrtle Beach, and the interactive exhibits at the Smithsonian, while dreaming
    of a future adventure to Disney World’s Magic Kingdom and a hiking excursion in Yosemite National Park.
  culinary: Nelson Koonce loves constructing their own meals, especially homemade tacos with seasoned beef, lettuce, and salsa, and they enjoy baking chocolate chip cookies with a perfect blend of butter,
    brown sugar, and dark chocolate chunks, while still craving classic pizza with extra mozzarella.
  core: Nelson Koonce combines a methodical mind with boundless energy, meticulously planning everything from scavenger hunts to snack portions, yet they often wrestle with worry over school performances,
    making procrastination their occasional guilty habit.
background:
  cultural: Nelson grew up in Jarrell, a small town in Williamson County, Texas, where community ties are strong and local traditions run deep. His family embraces typical Texan values such as hospitality,
    a hard‑working ethic, and frequent involvement in church and school events. He regularly attends county fairs, local high‑school football games, and community gatherings at the town hall, which reinforce
    a sense of belonging. While the region is predominantly Anglo‑American, the multicultural atmosphere of central Texas subtly influences his everyday life through diverse food, music, and neighborhood
    interactions. His cultural identity is rooted in a close‑knit, family‑centered, and faith‑oriented community that values teamwork and service.
