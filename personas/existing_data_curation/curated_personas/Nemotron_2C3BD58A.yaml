  career_goals: Nelson envisions a future where he can help others within a clear, structured environment. He dreams of becoming a firefighter because he admires the teamwork, discipline, and opportunity
    to protect his community. He also talks about being a teacher, attracted by the idea of organizing lessons and guiding younger students through projects. Occasionally, he imagines playing on a professional
    soccer team, reflecting his love for energetic, rule‑based sports. Overall, his ambitions focus on service, structure, and collaborative achievement.
