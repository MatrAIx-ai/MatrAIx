personas:
  professional: Sheng Shi, a senior electrical engineer specializing in power electronics and embedded systems, leverages a methodical, routine‑driven mindset to lead medium‑scale hardware projects while
    quietly mentoring junior staff and championing lean, reliability‑focused production processes.
  sports: Sheng Shi, a tai chi enthusiast who starts each morning with a park routine, hikes the Pacific coastline with his wife on weekends, and cheers for the Golden State Warriors and San Jose Earthquakes,
    blends low‑intensity movement with a competitive streak that pushes him to log at least 10,000 steps daily.
  arts: Sheng Shi, an avid fan of classic cinema such as "Casablanca" and "The Godfather," enjoys restoring vintage radios as a blend of engineering and artistry, and finds inspiration in the brushwork
    of traditional Chinese landscape painters while cooking family recipes, often listening to the mellow strings of Yo‑Yo Ma.
  travel: Sheng Shi, who prefers weekend road trips to coastal trails like Big Sur and seasonal escapes to the vineyards of Napa, also occasionally travels to attend family gatherings for Lunar New Year
    in a southern Asian province, blending a love of spontaneous adventure with a routine of planning itineraries on a spreadsheet.
  culinary: Sheng Shi, a passionate home chef who has mastered the delicate balance of flavors in classic Cantonese steamed fish with ginger, braised pork belly, and hand‑rolled dumplings, often harvests
    fresh cilantro, scallions, and bok choy from his community garden, and treats each cooking session as a meticulous engineering project, occasionally indulging in a late‑night bowl of ramen as a guilty‑pleasure
    break.
  core: Sheng Shi blends a routine‑focused engineering career with a competitive edge, a love for low‑key fitness, meticulous cooking, and a pragmatic, slightly disorganized approach to life that balances
    tradition with personal curiosity.
background:
  cultural: Sheng is a first‑generation Chinese American; his parents immigrated from Guangdong province in the 1970s. He grew up in the Bay Area, speaking Mandarin at home while attending American schools,
    which gave him fluency in both languages and a bicultural perspective. His family places strong emphasis on education, hard work, and respect for elders, values that continue to shape his practical
    approach to life and work. He participates in local Chinese cultural events such as Lunar New Year celebrations and is an active member of the Fremont Chinese community, while also embracing the broader
    American cultural norms of individualism and innovation.
