  hobbies: '[''Chinese Cooking'', ''Tai Chi'', ''Weekend Hiking'', ''Community Gardening'', ''Vintage Radio Restoration'', ''Classic Film Watching'', ''Technical Magazine Reading'']'
  career_goals: Sheng aims to move from senior engineer to a technical lead or engineering manager within the next five years, focusing on bringing sustainable energy products to market. He intends to obtain
    his Professional Engineer (PE) license, mentor junior engineers, and spearhead initiatives that streamline production while maintaining high reliability. He values a predictable career trajectory that
    aligns with his preference for routine and seeks to build a stable, high‑performing team that consistently meets delivery schedules and quality targets.
