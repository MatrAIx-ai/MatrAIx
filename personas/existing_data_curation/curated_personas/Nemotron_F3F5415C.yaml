  career_goals: Julio aims to assume a leadership role as chief of radiology within the next five years, focusing on streamlining workflow and expanding tele‑radiology services to underserved areas of Illinois.
    He seeks to spearhead research on imaging biomarkers for early lung cancer detection and to publish findings in peer‑reviewed journals. Additionally, Julio is committed to establishing a formal mentorship
    program for early‑career radiologists and balancing his professional responsibilities with personal well‑being to mitigate stress.
