  hobbies: '[''Watercolor painting'', ''Digital illustration'', ''Reading science‑fiction and philosophy'', ''Scale model building of historical engines'', ''Solo hiking in Griffith Park'', ''Playing chess'',
    ''Mindfulness meditation'', ''Architectural and nature photography'', ''DIY electronics and Arduino projects'', ''Visiting contemporary art galleries'']'
  career_goals: At this stage in her career, Marlene aims to transition from full‑time engineering leadership to a consultative role where she can focus on interdisciplinary projects that fuse technology
    with art. She aspires to mentor the next generation of women engineers, develop workshops that introduce creative coding and sustainable design to high‑school and community college students, and collaborate
    with local studios on eco‑friendly product development. Marlene also hopes to author a book that chronicles her experiences integrating engineering principles with artistic practice, and to file patents
    for novel mechanisms she has prototyped. While remaining open to selective contract work, she envisions a gradual shift toward thought leadership, speaking at conferences on the value of imagination
    in engineering, and contributing to open‑source platforms that democratize access to advanced design tools.
