  career_goals: Looking ahead, Melissa dreams of merging her love for art and storytelling by becoming a children's book author and illustrator, hoping to travel and collect tales from different cultures.
    She also imagines a role in a natural history museum, curating exhibits that weave scientific concepts with visual art, allowing her to share her curiosity with others. Ultimately, she wants a career
    that lets her nurture and inspire other kids, whether as an art teacher, museum educator, or community program leader, using her kindness and creativity to make learning joyful.
