  hobbies: '["Hiking", "Mountain Biking", "Attending the Albuquerque International Balloon Fiesta", "Visiting Art Galleries", "Volunteering at Community Organizations", "Yoga", "Mindfulness Meditation",
    "Reading Mystery Novels", "Southwestern Cooking", "Playing Board Games"]'
  career_goals: Katelyn aims to advance from her current HR role to a senior HR manager position within the next four to five years, focusing on cultivating a culture of employee wellbeing and inclusion.
    She plans to lead organizational development initiatives, champion flexible work arrangements, and ultimately become an HR Director who shapes company policy and mentors junior staff. To support these
    goals, she intends to earn SHRM‑CP or SHRM‑SCP certification and possibly pursue a master’s degree in organizational psychology, all while preserving a healthy work‑life balance for her family.
