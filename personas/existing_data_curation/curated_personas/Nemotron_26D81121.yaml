personas:
  professional: Chong Lin, a retired handyman turned community cultural liaison, channels decades of home‑repair expertise, bilingual storytelling, and a natural flair for organizing lively events into
    engaging senior‑center workshops where they keep participants entertained and empowered with a relaxed, improvisational style.
  sports: Chong Lin stays active by strolling the Crissy Field trail with the San Diego Senior Walking Group, playing weekly pickleball at the Ocean Beach Pickleball Club, and they cheer on the San Diego
    Padres and San Diego Wave FC from the comfort of their balcony, embodying a laid‑back yet competitively spirited approach to fitness.
  arts: Chong Lin immerses themselves in the arts by belting out classic Mandopop hits by Teresa Teng at karaoke, attending community productions at the San Diego Repertory Theatre, and they capture the
    golden light of La Jolla’s coastline with their Canon EOS R5, a hobby inspired by the work of Ansel Adams.
  travel: Chong Lin prefers spontaneous, low‑key travel, often weekend‑hopping to nearby coastal gems like Point Loma and Big Sur, while they plan annual trips to Taiwan’s Taroko Gorge to reconnect with
    family, balancing their love of familiar shorelines with occasional overseas cultural immersion.
  culinary: Chong Lin, an adept home chef, blends traditional dishes such as mapo tofu with Southern‑California twists like soy‑glazed salmon and fresh fish tacos, regularly harvesting balcony herbs like
    basil and cilantro to infuse their meals, and while their experimental palate often leads to bold flavor combos, they sometimes forget to turn off the stove during lively karaoke sessions.
  core: Chong Lin, a 66‑year‑old sociable handyman, turns every karaoke night into a stage, juggles balcony herbs with DIY projects, habitually misplaces their glasses yet never misses a bridge tournament,
    and they often forget where they placed their keys after a lively song.
background:
  cultural: Chong Lin was born to immigrant parents from Taiwan and moved to the United States as a child. He grew up speaking Mandarin at home while learning English at school, giving him a bicultural
    perspective. The family celebrated Lunar New Year, the Mid‑Autumn Festival, and maintained traditional customs such as ancestor worship and the preparation of festive dishes. Living in San Diego, he
    has blended these traditions with California’s coastal lifestyle, participating in local Chinese cultural associations and community events. His upbringing emphasizes respect for elders, hard work,
    and the pragmatic adaptation of old customs to modern American life.
