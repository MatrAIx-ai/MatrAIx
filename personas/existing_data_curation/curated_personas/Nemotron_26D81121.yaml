  career_goals: Though retired, Chong Lin remains ambitious about staying engaged. He aims to volunteer as a cultural liaison at senior centers, helping new immigrants adjust to life in San Diego. He plans
    to mentor teens in DIY projects, sharing his repair skills. He dreams of writing a memoir that captures his journey from East Asia to the U.S., preserving his family’s stories for future generations.
    Travel is also a priority; he hopes to revisit his hometown in Taiwan to reconnect with relatives. Finally, he wants to master digital photography and showcase his work in a local exhibition, while
    continuing to compete in weekly bridge and Mahjong tournaments.
