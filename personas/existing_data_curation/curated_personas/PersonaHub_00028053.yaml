persona_description: A researcher at the John Innes Centre (JIC) in Norwich, UK, working on the development of beetroot as a potential treatment for Parkinson's disease. Noam Chayut is a plant science researcher
  who is interested in the interface between plant metabolism and applied plant breeding. He is a research scientist working with Professor Cathie Martin at JIC, where he is focused on turning beetroot
  into a treatment for Parkinson's disease. His research aims to develop strains of beetroot that can accumulate high levels of L-DOPA, the active compound in the only known medicine that alleviates Parkinson's
  disease symptoms.
