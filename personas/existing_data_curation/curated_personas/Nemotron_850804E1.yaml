personas:
  professional: Vianca Dominguez, a 12‑year‑old budding scientist who channels her curiosity and disciplined nature into the local weekend science club, where she designs experiments, meticulously records
    data, and proudly presents findings to peers, all while balancing her love for soccer and the arts.
  sports: Vianca Dominguez, a 12‑year‑old energetic midfielder for the Sunset Strikers youth soccer club who trains at the neighborhood park, follows the professional team River City FC for inspiration,
    and supplements her fitness with weekend bike rides and occasional basketball games with friends.
  arts: Vianca Dominguez, a 12‑year‑old illustrator who fills her sketchbook with vibrant depictions of folklore, draws inspiration from the murals of Diego Rivera and the music of Lila Downs, while also
    singing contemporary pop hits like Ariana Grande in her community youth choir.
  travel: Vianca Dominguez, a 12‑year‑old adventure‑seeker who enjoys planning family trips with a preference for hands‑on experiences, has visited the historic town of San Miguel de Allende, spent a weekend
    hiking the red‑rock trails of Sedona, and dreams of exploring the ancient ruins of Machu Picchu when she saves enough for the journey.
  culinary: Vianca Dominguez, a 12‑year‑old budding cook who loves helping her mother prepare tamales using corn masa, pork filling, and chilies, mastering salsa verde with tomatillos, cilantro, and jalapeños,
    and proudly shares her creations at school potlucks, though she sometimes forgets to clean the kitchen afterward.
  core: Vianca Dominguez, a 12‑year‑old organized go‑getter who balances soccer, science, art, and cooking, always carries a sketchbook and a soccer ball, and occasionally procrastinates on homework in
    favor of candy‑filled study breaks.
background:
  cultural: Vianca comes from a Mexican-American family that has lived in Texas for generations. At home, Spanish is spoken daily, and she celebrates traditions such as Día de los Muertos, Semana Santa,
    and Mexican Independence Day with family gatherings, altar building, and traditional foods. Her family places a strong emphasis on community, church participation, and the values of hard work and respect.
    Growing up in Terrell, she experiences a blend of southern Texas culture and Mexican heritage, attending a bilingual school program that supports her dual language skills. Her cultural background shapes
    her sense of identity, fostering a respect for both Mexican customs and the broader American context.
