  hobbies: '[''Soccer'', ''Drawing and illustration'', ''Youth choir singing'', ''Cooking Mexican dishes with family'', ''Science club experiments'']'
  career_goals: Vianca dreams of a future where she can combine her love for animals, science, and community service. She aspires to become a veterinarian or a wildlife biologist, hoping to protect local
    ecosystems in Texas and Mexico. She also envisions studying engineering or computer science to develop practical solutions for sustainable farming in her family's community. Her ambition includes obtaining
    scholarships that recognize her academic discipline and leadership, and eventually mentoring younger students in bilingual education.
