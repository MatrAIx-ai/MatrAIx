persona_description: A historian who specializes in the study of Scottish history, particularly the industrial and social transformations of the eighteenth and nineteenth centuries. Her research interests
  include, but are not limited to, the transformation of the Scottish jewel industry, the impact of industrialisation on Scottish society, and the changing roles of women in Scottish society. Her knowledge
  of the history of Scottish industry and the cultural and social changes that occurred during this period is extensive and detailed, and she is skilled at using this knowledge to analyze and interpret
  the objects made by Scotland's jewellers. She is also knowledgeable about the broader stories that these objects tell, and how they represent the nexus of space and place concerning rural and urban, home
  and away.
