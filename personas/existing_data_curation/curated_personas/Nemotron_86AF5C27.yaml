  career_goals: Although retired from formal employment, Ashley aims to deepen her involvement in the community. She hopes to become a senior mentor for newer volunteers at the local senior center, help
    establish a neighborhood community garden, and contribute her experience to a town advisory board on aging services. Additionally, she is interested in documenting her family’s Greek‑American heritage
    in a memoir and learning digital photography to capture the changing seasons in her garden and local walks.
