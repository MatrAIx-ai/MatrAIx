persona_description: A researcher and scientist who specializes in sediment transport, particularly in the study of fall velocities of natural sediment particles and model sediments. They have extensive
  experience with measuring and analyzing fall velocities using a video imaging technique and have made significant contributions to the field through the derivation and validation of empirical equations.
  They are likely to be interested in the extension of the existing database for natural sand particles and the revised formula based on the work of Fredsoe and Deigaard, as these developments could have
  practical implications for understanding and predicting sediment transport processes in coastal environments.
