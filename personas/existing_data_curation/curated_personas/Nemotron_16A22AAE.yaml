  career_goals: Although retired from formal employment, Thuthao aims to stay active by volunteering as a small‑business mentor for recent immigrants, serving on the board of the local Southeast Asian cultural
    association, and launching a community garden project that blends his love for practicality and community harmony. He also hopes to author a guide on financial literacy for seniors and explore new technologies
    that can help older adults stay connected.
