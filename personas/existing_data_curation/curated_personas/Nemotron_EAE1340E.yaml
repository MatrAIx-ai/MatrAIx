  career_goals: Kimberly aims to advance to a Quality Assurance Supervisor position within the next three to five years, securing a Six Sigma Green Belt certification to deepen her process‑optimization
    expertise. She aspires to lead a small, collaborative team focused on continuous improvement and sustainable practices, while integrating her creative thinking into problem‑solving. Additionally, she
    plans to pursue a bachelor's degree in Quality Management to solidify her technical foundation and to develop stronger organizational habits that balance her flexibility with effective planning. Ultimately,
    she hopes to mentor junior employees, champion a culture of harmony, and contribute to safer, higher‑quality products in her industry.
