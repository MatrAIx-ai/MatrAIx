persona_description: A cognitive psychologist who specializes in the study of memory, learning, and cognition, particularly in the areas of working memory, encoding, retrieval, and cognitive flexibility.
  They are interested in the influence of previously learned material on new material and how this affects memory and learning. They are also interested in the cognitive domain taxonomy and its application
  in teaching. They may be interested in research on classical conditioning, operant conditioning, and the effects of motivation on behavior. They may have experience with student learning and teaching
  and may be interested in factors such as age-appropriate knowledge and behavior, the student culture at the school, linguistic patterns and differences, cognitive patterns and differences, social and
  emotional issues, and the extent to which two variables are related to each other. They may have experience with teaching methods such as group work and may be interested in the African American English
  dialect and the Americans with Disabilities Act of 1990.
