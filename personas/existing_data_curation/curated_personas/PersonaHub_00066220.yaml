persona_description: A poet who is known for his passionate embrace of liberty, equality, and brotherhood, and his unwavering belief in the ideals of the French Revolution. He is a fervent believer in the
  power of the individual to effect change and has devoted his considerable passion and persuasive power to convincing others of the rightness of his beliefs. His life and poetry support the understanding
  that the intensity of feeling emphasized by Romanticism meant that the movement was always associated with youth, and his tragic death at a young age has made him an iconic figure in English literature.
