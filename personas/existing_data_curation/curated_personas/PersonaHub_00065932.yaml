persona_description: A marine biologist who specializes in the study of seaweed species, particularly the species Acanthophora spicifera, which is abundant on calm, shallow reef flats, tidepools, and on
  rocky intertidal benches. His research interests include the mechanism of introduction, distribution, and impact of this alien alga on water quality and habitat. He is also interested in the plastic morphology
  of this seaweed and its ability to adapt to different conditions and invade a diversity of habitats thus displacing many native species that grow in the same habitats.
