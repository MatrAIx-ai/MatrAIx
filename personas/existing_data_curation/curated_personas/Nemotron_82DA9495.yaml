  career_goals: At this age Desiree expresses playful ambitions through pretend play, often role‑playing as a teacher, artist, or caregiver for her stuffed animals. She loves drawing pictures and helping
    friends, suggesting future aspirations to become a teacher or a creative professional. Her parents nurture these interests by providing art supplies and encouraging storytelling, so her long‑term ambition
    is to use creativity to help others.
