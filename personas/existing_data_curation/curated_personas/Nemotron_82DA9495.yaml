personas:
  professional: Desiree Mendez, a two‑year‑old who loves sorting shape‑blocks while singing the alphabet, already shows early signs of a future data analyst by pairing curiosity for patterns with a balanced
    habit of orderly play and flexible improvisation.
  sports: Desiree Mendez, energetic in the Tumble Tots gymnastics class at the neighborhood community center, a budding fan of the Chicago Cubs, and a regular participant in the Little Kicks toddler soccer
    group, loves chasing soft balls on sunny afternoons while cheering for their favorite team on Saturday mornings.
  arts: Desiree Mendez, who delights in finger‑painting bright swirls while humming the ‘Baby Shark’ tune, eagerly watches Sesame Street with Elmo, is captivated by the gentle lullabies of Raffi, and treasures
    the whimsical illustrations of Dr. Seuss in daily bedtime books.
  travel: Desiree Mendez, who recently enjoyed a family road trip to the Monterey Bay aquarium and a weekend stay at Grandma’s lakeside cottage, dreams of exploring the colorful sands of Cancun and the
    snowy peaks of the Swiss Alps as future adventure destinations.
  culinary: Desiree Mendez, a budding eater who can deftly scoop peas with a plastic fork and proudly devours chicken nuggets with crispy breadcrumbs, especially loves buttery macaroni and cheese, fresh
    strawberry slices, and occasional bites of smooth avocado mash.
  core: Desiree Mendez, a precocious two‑year‑old who balances fierce curiosity with an unwavering love for tidy toy shelves, often refuses bedtime to keep building block towers and insists on arranging
    crayons by color before any playtime.
background:
  cultural: Desiree comes from a Mexican‑heritage family living in Needles, California. Her household celebrates traditional Mexican customs such as Día de los Muertos, Las Posadas, and Cinco de Mayo, and
    Spanish is spoken alongside English at home. Family gatherings feature Mexican foods like tacos, tamales, and aguas frescas, and she often participates in community events that blend desert life with
    Mexican cultural expressions. These traditions shape her appreciation for vibrant colors, rhythmic music, and communal storytelling.
