  career_goals: Dimitri aims to solidify his company's market position by focusing on sustainable growth, operational resilience, and a clear succession plan for the next decade. He is committed to enhancing
    profitability while preserving the firm's core values of integrity and practicality. Over the next five years, he seeks to implement a robust digital transformation roadmap that aligns with his pragmatic
    mindset, and he aspires to mentor emerging leaders within the organization before transitioning to a semi‑retired advisory role that allows him more time for family and personal well‑being.
