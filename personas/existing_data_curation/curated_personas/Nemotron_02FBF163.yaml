  career_goals: Looking ahead, Richard aims to move into a senior editorial role where he can shape the newsroom’s investigative agenda and mentor emerging reporters. He envisions launching a quarterly
    podcast series that spotlights rural Idaho issues—farm policy, water rights, and community resilience—leveraging his multimedia expertise. He also wants to champion data‑driven journalism initiatives,
    integrating AI‑assisted tools to streamline research while maintaining rigorous fact‑checking. In the longer term, he hopes to co‑found a nonprofit news outlet dedicated to under‑reported stories in
    the American West, preserving the region’s narratives for future generations. Throughout these ambitions, he seeks to maintain a flexible schedule that preserves his family time and personal pursuits.
