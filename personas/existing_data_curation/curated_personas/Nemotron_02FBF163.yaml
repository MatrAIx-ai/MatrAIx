personas:
  professional: Richard Duong, a seasoned regional journalist with two decades of investigative reporting, blends data‑driven research using GIS and spreadsheets with vivid storytelling, and they bring
    a relaxed, occasionally disorganized workflow that fuels deep‑dives into Idaho’s agricultural politics while fostering a collaborative newsroom where they mentor emerging reporters.
  sports: Richard Duong, an avid outdoorsman, spends weekends trekking the Boise foothills and casting fly‑fish on the Snake River, cheered on by their loyalty to the Boise State Broncos football team and
    membership in the local mountain‑bike club, while they also join seasonal community runs and volunteer as a coach for a youth hiking program.
  arts: Richard Duong blends hands‑on creativity with cultural appreciation, playing acoustic guitar at neighborhood gatherings with a repertoire that includes Neil Young and Joni Mitchell, snapping nature
    photographs inspired by Ansel Adams, and they regularly attend performances by the Boise Modern Theater while curating a modest collection of vintage Western posters featuring Clint Eastwood.
  travel: Richard Duong favors spontaneous road trips that weave through Idaho’s hidden gems—such as the lava fields of Craters of the Moon, the hot springs of Hagerman, and a weekend escape to Sun Valley—and
    they dream of a far‑off trek to Patagonia’s Andes, balancing budget‑conscious local adventures with a lingering desire for distant wilderness expeditions.
  culinary: Richard Duong enjoys experimenting on the grill, routinely smoking Idaho trout with cedar planks, searing local potatoes with fresh rosemary, and concocting a huckleberry‑infused barbecue sauce,
    yet they sometimes over‑season dishes in pursuit of bold flavors, reflecting both a seasoned palate and a willingness to learn from occasional missteps.
  core: Richard Duong is a curiosity‑driven journalist‑craftsperson who balances investigative rigor with a love for the outdoors, vintage woodworking, and spontaneous creativity, often juggling structured
    goals with a relaxed, messy workflow.
background:
  cultural: Richard grew up in a mid‑western farming family that settled in Idaho’s Gem County in the 1970s, giving him a deep connection to the American West’s agrarian roots. His household celebrated
    classic American holidays—Thanksgiving, Fourth of July barbecues, and community harvest festivals—while also fostering a respect for self‑reliance and neighborly cooperation. Though his ancestry includes
    German and Irish lineage, his cultural identity is shaped more by the regional ethos of rugged individualism tempered by community solidarity. He attended a small public high school where local sports
    and theater were central, and his parents, both educators, emphasized the importance of literacy and civic engagement. As an adult, he continues to honor these values through his journalistic commitment
    to give voice to ordinary Idahoans and preserve the cultural narratives of his home state.
