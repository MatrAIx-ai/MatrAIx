personas:
  professional: James Dennis, a veteran licensed electrician specializing in residential wiring, panel upgrades, and home-automation integration, blends his preference for consistent, code-strict routines
    with a sociable, talkative style that makes him the go-to person on site for troubleshooting complex faults and keeping crews coordinated, even as his relaxed approach to scheduling leads him to handle
    last-minute emergencies with improvisational flair.
  sports: James Dennis follows the New York Yankees at his favorite local sports bar, roots for the New York Knicks during basketball season, avidly supports his brother's little-league baseball team, and
    spends his weekends fishing with the Reservoir Anglers Association, balancing casual cardio on the water with a preference for low-key, routine-driven workouts rather than regimented gym sessions.
  arts: James Dennis curates classic-rock soundtracks for his backyard barbecues that feature the Rolling Stones, Led Zeppelin, and Bruce Springsteen, occasionally attends community theater productions
    of 'Our Town', and enjoys rewatching classic films starring Robert De Niro, letting these cultural moments shape his laid-back yet nostalgic vibe.
  travel: James Dennis favors low-key road trips that blend fishing and family picnics, having driven upstate to the Adirondacks for trout fishing, visited the Hudson Valley wineries on a weekend, taken
    a sun-soaked family vacation to Orlando, and dreaming of a future drive-through the Pacific Northwest to explore renewable-energy sites, all while planning trips loosely around his work calendar and
    limited budget.
  culinary: James Dennis excels at grilling, whipping up smoky pork ribs slathered in hickory-infused BBQ sauce, searing brisket with a rub of smoked paprika and brown sugar, and cooking freshly caught
    trout with lemon and dill, while his culinary repertoire also includes hearty mac-and-cheese and classic New York deli pastrami on rye, reflecting a solid home-cook skill level focused on comfort fare.
  core: James Dennis is a talkative, community-centric electrician who balances a love for backyard barbecues and classic rock with an undercurrent of stress-driven worry that fuels occasional overspending
    on tools and fuel for his vintage pickup.
background:
  cultural: James grew up in a working-class white family in Queens, with roots in the Irish-American community that emphasized hard work, reliability, and community involvement. Raised in a suburban environment,
    he regularly attended St. Patrick's parish, where he helped with youth sports and church picnics. The cultural values of modesty, practicality, and loyalty to family shaped his pragmatic outlook and
    his strong sense of neighborhood. He celebrates American holidays with traditional meals and often mixes his cultural heritage with the diverse tapestry of New York City life, resulting in a blend of
    modest Mid-Atlantic sensibilities and an openness to the city's multicultural influences.
attributes:
  skills: '[''Residential wiring'', ''Commercial electrical installation'', ''Electrical troubleshooting'', ''Blueprint reading'', ''NEC code compliance'', ''Safety inspections'', ''Team leadership'', ''Customer
    communication'', ''OSHA certification'', ''Home-automation basics'']'
  hobbies: '[''Barbecuing'', ''Classic rock music'', ''Watching baseball games'', ''Fishing'', ''Hosting neighborhood gatherings'', ''DIY car maintenance'', ''Playing bridge'', ''Volunteering at community
    events'']'
  career_goals: James aims to become a master electrician and eventually open his own small contracting firm that focuses on serving the Ridgewood and Queens neighborhoods. He wants to mentor apprentices,
    pass on his practical knowledge, and build a reputation for reliable, no-nonsense service. While he values the routine of steady work, he also hopes to incorporate more structured scheduling to reduce
    the stress that comes from last-minute emergencies. In the longer term, he is interested in expanding his skill set to include energy-efficiency retrofits and solar-panel installations, positioning
    his business for the growing demand for green upgrades while keeping his work grounded in proven, dependable methods.
