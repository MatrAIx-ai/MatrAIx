personas:
  professional: Aliyah Little is an aspiring software developer and budding wildlife technologist who blends competitive gaming instincts with methodical curiosity, crafting interactive bird-identification
    apps while balancing school assignments and volunteering at the local rehab center; they channel their competitive edge into every line of code.
  sports: Aliyah Little hits the cross-country ski trails and snowboards with a disciplined training log, follows the Colorado Avalanche in the NHL and the Alaska Anchorage Seawolves in collegiate hockey,
    and channels their competitive edge into both winter sports and weekend esports tournaments, while they occasionally over-exert and end up with sore muscles.
  arts: Aliyah Little captures crisp bird photographs and drafts comic panels inspired by mythic stories, drawing heavily from the visual storytelling of Hayao Miyazaki, the narrative depth of Neil Gaiman,
    and the graphic flair of Moebius, while they devour sci-fi epics like Dune and The Expanse for creative fuel.
  travel: Aliyah Little plans meticulous adventure trips, having trekked Denali National Park, kayaked in the Yukon, explored Iceland's volcanic landscapes, and dreaming of Patagonia's glaciers, yet they
    balance these ambitions with family-budget constraints and a love for weekend camping near home.
  culinary: Aliyah Little enjoys cooking simple yet hearty meals such as pan-seared salmon with lingonberry glaze, reindeer stew, and homemade chocolate chip cookies, delights in tasting fresh wild berries,
    and despite a budding cooking skill, they often forget to clean up the kitchen after late-night snack experiments.
  core: Aliyah Little maps the world in code, birds, and snow, fiercely competitive yet practically curious, swapping gaming victories for wildlife rescues, all while they juggle teen quirks like impulse
    snack raids and a habit of postponing schoolwork for the next high-score.
background:
  cultural: 'Aliyah was raised in Anchorage by a family with Northern‑European (primarily Norwegian and Swedish) ancestry, typical of many white Alaskans whose forebears were part of early settlement waves.
    The family embraces the Alaskan frontier spirit: self‑reliance, respect for the environment, and a love of outdoor recreation. While she participates in mainstream American traditions, Aliyah also learns
    about indigenous cultures through school programs and community events such as the Fur Rendezvous festival, where she hears Dena’ina stories and attends workshops on traditional crafts. This blend of
    heritage, local community values, and a deep connection to the natural landscape shapes her worldview.'
attributes:
  skills: '[''Basic programming in Python and Scratch'', ''Cross‑country skiing and snowshoeing'', ''Creative writing and storytelling'', ''Nature photography'', ''Project organization and time management'',
