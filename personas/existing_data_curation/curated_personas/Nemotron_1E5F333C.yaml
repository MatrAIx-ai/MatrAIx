  hobbies: '[''Cross‑country skiing'', ''Snowboarding'', ''Coding simple games'', ''Birdwatching'', ''Nature photography'', ''Reading science‑fiction novels'', ''Drawing comics'', ''Competitive multiplayer
    video gaming'', ''Volunteering at the local wildlife rehabilitation center'']'
  career_goals: Aliyah aspires to merge her love for the Alaskan wilderness with her tech curiosity by pursuing a career in environmental science or wildlife data analysis. She dreams of attending the University
    of Alaska Anchorage to earn a degree in environmental studies, eventually working as a wildlife biologist or a conservation technology specialist. In the shorter term, she aims to win the regional science
    fair with a project that uses simple sensors to monitor local bird migration patterns, and she hopes to mentor younger peers in both coding and outdoor stewardship.
