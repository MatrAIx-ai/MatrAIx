  career_goals: Dana dreams of working with animals one day, envisioning herself as a veterinarian or wildlife biologist who helps care for pets and protects local wildlife. She also imagines becoming a
    science teacher because she enjoys explaining how things work to younger kids. While her curiosity drives these ambitious ideas, she sometimes worries about keeping her grades up, so she sets short‑term
    goals like improving her spelling scores and finishing science projects on time to stay on track for her long‑term aspirations.
