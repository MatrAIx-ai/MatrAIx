  hobbies: '[''Reading historical nonfiction and educational theory'', ''Indoor herb and succulent gardening'', ''Knitting and crocheting'', ''Crossword puzzles and Sudoku'', ''Cooking Southeast Asian dishes'',
    ''Birdwatching at local nature preserves'', ''Meditation and mindfulness practice'']'
  career_goals: Thanh Ann aims to obtain a full teaching credential in early childhood education within the next two years, positioning herself to transition from a teaching assistant to a lead classroom
    teacher. She also seeks to serve as a mentor for newly hired teaching assistants, sharing her expertise in classroom organization, data‑driven instruction, and inclusive practices. In the longer term,
    she plans to develop a series of practical guides on effective classroom management for quiet learning environments and to contribute to district‑wide professional development workshops that focus on
    structured instruction and accommodation strategies. As she approaches retirement, she hopes to leave a lasting legacy by documenting her methods and continuing to support the educational community
    through volunteer mentorship.
