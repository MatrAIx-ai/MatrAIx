  career_goals: Lois aims to graduate high school with strong science and health related grades, earn a scholarship, and pursue a degree in nursing or veterinary medicine. She is motivated by a desire to
    help both people and animals in her community, and she dreams of working in a rural health clinic or a small town veterinary practice where she can combine her scientific curiosity with her compassionate
    nature. In the long term, Lois hopes to become a registered nurse or a veterinary technician, and eventually lead community health outreach programs that emphasize preventive care and education.
