  hobbies: '[''Visiting Art Galleries'', ''Watercolor Painting'', ''Nature Walks'', ''Birdwatching'', ''Reading Historical Fiction'', ''Gardening'', ''Cooking Experimental Recipes'', ''Volunteer at Community
    Arts Programs'', ''Small Book Club'', ''Yoga'']'
  career_goals: Helen aims to transition from her current frontline supervisory role to a strategic position that merges her administrative expertise with her passion for the arts. Over the next two years
    she plans to earn a Certified Associate in Project Management (CAPM) credential and seek a managerial role within a nonprofit art center or community cultural program in Lakeland. She also aspires to
    mentor junior staff, develop a part‑time community art workshop series, and gradually reduce her full‑time workload to create space for personal creative projects while maintaining financial stability
    for early retirement.
