persona_description: A historian who specializes in the Cold War era, particularly the impact of the Korean War on US-South Korean relations and the transnational adoption of Korean orphans and Korean war
  brides. She is highly knowledgeable about the cultural politics of childhood, transnational cultural exchange, and the role of media in shaping perceptions of the Korean War and its aftermath. She has
  conducted meticulous archival research in South Korea and the US to gather evidence on the representations of Korean orphans, mixed-race children, and Korean war brides in both countries. She is adept
  at analyzing and interpreting the media portrayals and the underlying narratives that shaped these representations. She is also skilled at uncovering the agency of children and women in the narratives
  and their impact on the transnational cultural politics of childhood.
