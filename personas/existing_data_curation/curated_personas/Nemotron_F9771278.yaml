personas:
  professional: Claudia Foddell, an 85-year-old former receptionist and information clerk, volunteers at the local senior center and library where she mentors junior clerks, curates community archives,
    and orchestrates a small art exhibit that showcases emerging artists, leveraging her meticulous filing skills and imagination.
  sports: Claudia Foddell enjoys low-impact fitness through morning walks around Minnehaha Park, participates in a senior badminton club at the community center, and avidly follows the Minnesota Twins baseball
    games on TV while keeping a modest collection of team memorabilia.
  arts: Claudia Foddell spends afternoons painting watercolors inspired by Monet and O'Keeffe, sketches abstracts while listening to Miles Davis and B.B. King, and attends gallery talks at the Walker Art
    Center featuring contemporary painters like Kehinde Wiley, finding solace in the interplay of color and rhythm.
  travel: Claudia Foddell prefers short, well-planned trips, such as a nostalgic weekend visit to the historic Mississippi River steamboat museum in St. Paul, a leisurely cruise on Lake Superior during
    the fall, and a carefully scheduled pilgrimage to New Orleans for a jazz festival, always arranging travel through the senior-friendly cruise line that offers wheelchair accessibility.
  culinary: Claudia Foddell delights in cooking soul-food staples like seasoned collard greens, baked sweet-potato casserole, and spiced cornbread, often using fresh herbs from her garden and pairing dishes
    with homemade sweet tea, while meticulously measuring spices to achieve the perfect balance.
  core: Claudia Foddell, an 85-year-old archivist-artist, blends meticulous organization with boundless imagination, channeling a competitive yet solitary spirit into watercolor canvases, curated community
    projects, and disciplined financial habits, all while savoring jazz, garden walks, and classic soul-food recipes.
background:
  cultural: Claudia descends from a family that migrated north during the Great Migration, settling in Minneapolis’s historic Black neighborhoods. She was raised in a close‑knit African‑American community
    where church, storytelling, and soul‑food traditions were central. Her upbringing instilled a deep respect for Black artistic expression, from gospel music to visual arts, and a commitment to preserving
    local African‑American history. Claudia’s cultural identity continues to shape her values, her love for community service, and her appreciation for the rich artistic legacy of Black Midwestern families.
