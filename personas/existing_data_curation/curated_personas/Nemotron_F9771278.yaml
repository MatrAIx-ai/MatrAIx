  career_goals: Although retired, Claudia aspires to give back to the Minneapolis Black community by volunteering at senior centers and local libraries, where she can mentor younger clerks and share her
    knowledge of local history. She dreams of curating a small community art exhibit that showcases emerging Black artists and abstract works, and hopes to publish a memoir that interweaves her personal
    journey with the cultural legacy of her family. Claudia also wishes to stay intellectually curious by exploring new digital art tools and attending intimate gallery talks, ensuring her lifelong love
    of novelty and abstract ideas continues to flourish.
