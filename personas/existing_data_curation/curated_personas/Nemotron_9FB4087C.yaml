personas:
  professional: Lars Holly, a commercial cleaning specialist with deep expertise in industrial floor scrubbers, OSHA compliance, and inventory budgeting, leverages their disciplined, organized nature and
    sociable teamwork skills to design meticulous cleaning schedules while mentoring new staff, all with an eye toward advancing into facilities management.
  sports: Lars Holly, an avid hiker, bowler, and snowmobiler, spends weekends trekking the Bridger‑Teton trails, casting for trout with the Green River Fishing Association, rolling strikes in the Evanston
    Community Bowling League, and cheering on the Wyoming Cowboys football team, balancing structured fitness with the camaraderie of local clubs.
  arts: Lars Holly channels his sociable spirit into weekly tabletop gaming nights featuring Gloomhaven at the town coffee shop, enjoys the folk storytelling of Chris LeDoux and local painter Megan Haines,
    and occasionally sketches western landscapes in a weathered sketchbook, finding creative release after a day of cleaning.
  travel: Lars Holly prefers road‑trip adventures that combine natural scenery and practical budgeting, having camped in Yellowstone, fished the Kenai River in Alaska, and dreamed of tracing ancestry in
    Scandinavia, yet always plans trips around seasonal work peaks and family obligations.
  culinary: Lars Holly, a confident home cook, favors hearty dishes like elk stew, grilled trout with fresh garden herbs, and bison burgers, expertly seasons with locally sourced spices, and indulges in
    a well‑earned coffee at the downtown espresso bar after a long shift, though they sometimes rely on quick microwave meals when inventory runs low.
  core: Lars Holly blends western practicality with meticulous organization, turning everyday chores into pathways for community service, personal growth, and the occasional indulgent snowmobile sprint.
background:
  cultural: As a white resident of Evanston, Wyoming, Lars grew up in a tight‑knit, small‑town environment shaped by the legacy of the American West. His family’s roots trace back to Midwestern farming
    communities with German and Scandinavian heritage, fostering values of self‑reliance, hard work, and community service. The local culture emphasizes outdoor recreation, modesty, and a strong sense of
    neighborly cooperation, which influences his practical outlook, love for the outdoors, and commitment to contributing positively to his community.
attributes:
  skills: '[''Commercial cleaning protocols'', ''Safe chemical handling'', ''Industrial floor equipment operation'', ''Minor plumbing and electrical repairs'', ''Inventory management'', ''Budgeting and
    procurement'', ''Scheduling and documentation'', ''OSHA compliance'', ''Staff training and mentorship'', ''Customer service and conflict resolution'']'
  hobbies: '[''Hiking and mountain trekking'', ''Fishing in the Green River'', ''Bowling league'', ''Volunteer event coordination for Uinta County Fair'', ''Tabletop gaming night'', ''DIY home repair projects'',
    ''Community gardening'', ''Snowmobiling'']'
  career_goals: Lars aims to progress from his current janitorial role to a facilities manager position within a larger institution such as a school district, hospital, or corporate campus. To achieve this,
    he plans to complete his associate degree in business administration, earn professional certifications like Certified Professional Cleaner (CPC) and OSHA safety certification, and develop expertise
    in sustainable cleaning practices. He also aspires to lead a team, overseeing cleaning operations and health‑safety programs, and eventually launch his own environmentally‑focused cleaning service business.
    Beyond career advancement, Lars wishes to remain actively involved in community improvement projects and volunteer initiatives in Evanston.
