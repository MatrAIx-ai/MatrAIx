  career_goals: Looking ahead, Ulisses aims to transition from a hands‑on operator to a supervisory role where he can mentor younger workers and lead a maintenance team. He is pursuing an advanced certification
    in heavy‑equipment management with the goal of becoming a plant‑wide reliability specialist, integrating data‑driven maintenance schedules to reduce downtime. Parallel to his professional aspirations,
    he plans to launch a small side business that offers custom artistic paintwork and retrofitting services for vintage tractors and trucks, blending his mechanical expertise with his love for visual art.
    Long‑term, Ulisses envisions contributing to community development projects that respect tribal land stewardship while promoting sustainable agricultural practices, positioning himself as a cultural
    liaison between the industry and his Native American community.
