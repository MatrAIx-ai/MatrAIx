personas:
  professional: Aiman Chandler is a licensed electrician with deep expertise in residential and commercial wiring, solar PV installation, and smart‑home automation, who blends methodical problem‑solving
    with a curious drive to integrate emerging IoT technologies while mentoring apprentices and maintaining calm composure under pressure.
  sports: Aiman Chandler hikes the Pacific coastline trails such as the Coastal Trail in Marin, cycles weekly with the Bay Area Ride Club, supports the Golden State Warriors and San Francisco Giants, and
    participates in a local weekend triathlon training group, blending solitary endurance activities with occasional community sports viewership.
  arts: Aiman Chandler captures sunrise over the Bay in black‑and‑white photographs inspired by Ansel Adams, enjoys listening to classic rock icons like Fleetwood Mac while restoring his Chevrolet, and
    unwinds with sci‑tech documentaries by Christopher Nolan, integrating visual storytelling into their DIY projects.
  travel: Aiman Chandler prefers weekend road trips along California’s Highway 1, has visited the geothermal fields of Iceland to study renewable energy, dreams of exploring Japan’s tech hubs during a future
    sabbatical, and balances travel plans with family commitments by scheduling trips during school holidays.
  culinary: Aiman Chandler enjoys cooking grilled salmon with quinoa and kale, prepping avocado toast with smoked salmon for breakfast, experimenting with homemade energy‑bar recipes using oats, honey,
    and almond butter, and occasionally treating themselves to a classic cheeseburger with caramelized onions after a long day in the workshop.
  core: Aiman Chandler is a calm, methodical electrician‑entrepreneur who blends a love for sustainable tech, vintage cars, and solitary outdoor pursuits, while occasionally neglecting flossing and splurging
    on hobby parts.
background:
  cultural: Aiman grew up in a middle-class white family in suburban Northern California, where the cultural mix of West-Coast pragmatism, environmental awareness, and a strong work ethic shaped his outlook.
    The diverse community of Alameda County exposed him to a range of perspectives, fostering an appreciation for collaboration and inclusivity while retaining a distinctly American ethos of self-reliance
    and practical problem-solving. His background blends a typical Californian suburban upbringing with a personal commitment to sustainability and community service.
attributes:
  skills: '[''Residential wiring'', ''Commercial wiring'', ''Circuit troubleshooting'', ''NEC compliance'', ''Solar PV installation'', ''Battery storage integration'', ''Smart-home automation'', ''Low-voltage
