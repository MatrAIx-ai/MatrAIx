  hobbies: '[''DIY electronics'', ''Arduino projects'', ''Hiking'', ''Biking'', ''Classic car restoration'', ''Volunteer electrical safety workshops'', ''Reading non-fiction on renewable energy'', ''Photography'']'
  career_goals: Aiman aims to become a master electrician and eventually launch his own contracting firm that specializes in sustainable energy solutions for homes and small businesses in the Bay Area.
    He plans to earn additional certifications such as the Certified Energy Manager (CEM) and the NABCEP PV Installation Professional credential. Over the next five years, he also hopes to mentor a new
    cohort of apprentices, contribute to local green-building initiatives, and integrate cutting-edge IoT technologies into his service offerings while maintaining a balanced work-life schedule with his
    family.
