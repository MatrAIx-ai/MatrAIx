  career_goals: Teresita plans to complete a Bachelor of Science in Nursing within the next two years, followed by a Certified Wound Care Nurse (CWCN) credential. She aims to become a charge nurse at her
    current hospital, where she can apply her practical knowledge to improve unit efficiency and patient safety. Long‑term, she hopes to design and lead a community‑health outreach program in San Ysidro
    that focuses on diabetes prevention and education for low‑income Mexican families. She is also interested in pursuing a Master’s in Nursing with a focus on nurse education, so she can develop cultural‑competence
    training for staff and advocate for policies that expand health care access for undocumented residents. Her ambition is to blend her curiosity for new evidence‑based practices with her practical, patient‑first
    approach to create lasting health improvements in her community.
