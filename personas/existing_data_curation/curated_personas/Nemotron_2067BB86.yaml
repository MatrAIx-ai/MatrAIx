personas:
  professional: Teresita Pena, a veteran acute‑care and community nurse with over 30 years of hands‑on experience, blends expertise in IV therapy, wound care, and bilingual chronic disease education with
    a curiosity for evidence‑based practices and a practical, patient‑first mindset, making them a reliable mentor, quality‑improvement leader, and emerging charge‑nurse.
  sports: Teresita Pena stays active by walking the Tijuana River estuary and joining a local beach‑volleyball league in summer, while cheering for the San Diego Padres, following Club Tijuana Xolos, and
    supporting San Diego Wave FC, which they do with a balanced love for both low‑impact exercise and regional sports fandom.
  arts: Teresita Pena intertwines cultural rhythm with personal expression, listening to ranchera legends like Vicente Fernández and Mariachi Vargas de Tecalitlán, playing acoustic guitar during folklorico
    rehearsals, knitting blankets for patients while humming classic boleros, and diving into historical fiction by Isabel Allende and Arturo Pérez‑Reverte for literary inspiration, which they cherish as
    a bridge between past and present.
  travel: Teresita Pena prefers thoughtfully planned trips that blend cultural immersion and relaxation, having explored historic towns such as Guanajuato and Oaxaca, savoring a weekend getaway to Santa
    Barbara, and now dreaming of a pilgrimage to the historic ruins of Chichen Itzá, all while they balance travel costs with family commitments.
  culinary: Teresita Pena skillfully reimagines traditional dishes like pozole, mole, and carnitas by swapping lard with olive oil, incorporating garden‑fresh cilantro, chilies, and tomatoes, and experimenting
    with cauliflower tortillas, yet they admit a guilty pleasure for occasional store‑bought churros after community events.
  core: Teresita Pena fuses clinical precision with garden‑fresh creativity, tackling patient care with calm efficiency while they secretly hoard salsa packets for late‑night snacks.
background:
  cultural: Teresita was born and raised in a Mexican‑American family in the San Ysidro border community. She grew up bilingual, speaking Spanish at home and English at school, which gave her deep cultural
    fluency. Family gatherings, Catholic holidays such as Día de los Muertos and Christmas Posadas, and the vibrant celebrations of local Mexican festivals remain central to her identity. Though she has
    never married, she maintains close bonds with her extended family, including nieces, nephews, and cousins, as well as with neighbors who share similar heritage. This bicultural upbringing informs her
    compassionate, family‑centered nursing style, allowing her to bridge medical practice with cultural traditions and advocate effectively for immigrant patients.
