  hobbies: '[''Reading mystery and historical fiction'', ''Gardening (vegetables and flowers)'', ''Birdwatching'', ''Walking in nature'', ''Crocheting blankets for church outreach'', ''Listening to gospel
    and jazz music'', ''Volunteering quietly at community food pantry'']'
  career_goals: Deidre aspires to move into a supervisory or lead caretaker role where she can design and deliver training programs for junior cleaning staff, emphasizing both technical excellence and mental‑wellness
    support. She plans to obtain an OSHA certification and a small‑business license with the long‑term goal of starting a modest cleaning service that partners with local churches and senior centers. Financial
    stability for a comfortable retirement and a schedule that allows more quiet personal time are also central to her ambition.
