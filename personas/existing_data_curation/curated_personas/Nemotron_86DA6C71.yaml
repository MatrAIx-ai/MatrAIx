  hobbies: '["Fishing", "Woodworking", "Reading non-fiction (productivity, history)", "Model train building", "Solo hiking", "Gardening", "Crossword puzzles", "Listening to classic rock and Cajun music"]'
  career_goals: Mark aims to advance to a regional management position within the next five years, where he can apply his systematic approach to improve efficiency across multiple locations. He plans to
    earn a Certified Manager (CM) credential and to implement lean‑process initiatives that reduce variability and stress for his teams. In the longer term, he wishes to open his own franchise or independent
    store that operates on a clearly defined set of SOPs, providing a stable, predictable environment that aligns with his preference for structure and reduces personal anxiety. He also seeks to develop
    a mentorship style that balances his competitive drive with constructive collaboration.
