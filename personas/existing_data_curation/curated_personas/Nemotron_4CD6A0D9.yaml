  hobbies: '[''Woodworking'', ''Furniture restoration'', ''Gardening'', ''Reading architecture and design'', ''Listening to soul and jazz music'', ''Cooking Southern cuisine'', ''Mentoring youth in carpentry'',
    ''Attending local history talks'']'
  career_goals: Ashley aims to transition from a tradesperson to a small business owner, establishing a boutique carpentry studio that focuses on custom, eco‑friendly furniture and community renovation
    projects in Monroe County. She seeks certification as a residential contractor to broaden her scope and plans to integrate green building standards, such as reclaimed wood and low‑VOC finishes. Over
    the next five years she intends to mentor a cohort of young apprentices, particularly from underrepresented backgrounds, and become an active member of the local union leadership. While maintaining
    a stable income for her family, she hopes to build a reputation for quality craftsmanship that reflects both her practical skill set and her curiosity for innovative design.
