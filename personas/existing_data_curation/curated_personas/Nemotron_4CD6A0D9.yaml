personas:
  professional: Ashley Richardson, a seasoned carpenter with over twenty years of framing, finish carpentry, custom cabinetry, and CAD drafting experience, channels their reserved curiosity into quietly
    analyzing each project before guiding their crew with a blend of practical problem‑solving and sustainable material experimentation.
  sports: Ashley Richardson stays active by hiking the Monroe County trail network with the local Trail Club in spring, joining a weekday adult‑league softball team that raises funds for church outreach,
    and cheering on the Detroit Tigers and Detroit Lions on game days, favoring steady, low‑impact workouts over high‑intensity gym sessions.
  arts: Ashley Richardson's creative soul immerses itself in the timeless sounds of Miles Davis, the soulful vocals of Aretha Franklin, and the contemporary R&B groove of Leon Bridges, while their evenings
    spent poring over the works of Frank Lloyd Wright and local historic preservation talks inspire the elegant lines of their furniture designs.
  travel: Ashley Richardson prefers carefully plotted weekend road trips to historic Southern gems like Natchez and Charleston, has already reveled in the jazz‑filled streets of New Orleans, and nurtures
    a dream of a sustainable‑design tour of Copenhagen’s Nordic museums, balancing wanderlust with the financial realities of launching a boutique carpentry studio.
  culinary: Ashley Richardson delights in crafting soulful Southern meals—crispy fried chicken, buttery collard greens seasoned with smoked paprika, and a bright heirloom tomato gazpacho—showcasing a confident
    kitchen skill set that blends traditional comfort flavors with fresh garden harvests.
  core: Ashley Richardson is a quietly ambitious carpenter‑gardener who channels curiosity into eco‑friendly furniture, yet habitually procrastinates paperwork, keeps a secret stash of vintage soul vinyl,
    and can’t resist a midnight slice of pecan pie.
background:
  cultural: Ashley is a second‑generation African‑American who grew up in the Midwest, with family roots that trace back to the Great Migration. In Ida and the broader Monroe County area, she maintains
    strong ties to the local Black community through her church, family reunions, and participation in cultural events such as Juneteenth celebrations. Her heritage informs her work ethic, sense of resilience,
    and the collaborative spirit she brings to her trade. She incorporates elements of African‑American craftsmanship traditions—such as the use of reclaimed wood and storytelling through furniture—into
    her designs, and she actively supports Black‑owned suppliers and local artisans. The blend of Midwestern values and Black cultural pride shapes her identity both on and off the job site.
