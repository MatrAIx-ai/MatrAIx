personas:
  professional: Taylor Purdy, an aspiring young visual artist, showcases natural talent in drawing and painting at the children's museum, leads group art projects with cooperative enthusiasm, and embraces
    a relaxed, flexible approach that lets imagination guide creative outcomes rather than strict rules, because they thrive on free-form expression.
  sports: Taylor Purdy, a lively member of the neighborhood junior bike club, loves riding a pink bike through the park, participates in energetic games of tag and hide-and-seek after school, and cheerfully
    supports the local minor-league baseball team the River City Guardians, because they find joy in teamwork and movement.
  arts: Taylor Purdy, a budding creator who spends hours sketching at the children's museum, delights in the whimsical illustrations of Eric Carle, sings along to pop tunes by Kids Bop and bluegrass classics
    from Bill Monroe, and dreams of one day seeing a live performance by the Family Orchestra, because they feel music and art deepen their sense of wonder.
  travel: Taylor Purdy, who has explored the local children's museum and weekend trips to the state's butterfly garden, dreams of soaring to the Smithsonian National Air and Space Museum in Washington DC,
    and plans future adventures with parents using colorful maps, balancing curiosity with the practical limits of school schedules, because they love discovering new places with family.
  culinary: Taylor Purdy, who adores buttery grilled cheese with a hidden stripe of cheddar, munches carrot sticks dipped in hummus, happily helps whisk banana pancakes on Sunday mornings, and often snacks
    on strawberry slices and apple pie wedges after park play, because they enjoy sharing tasty bites with friends.
  core: Taylor Purdy, a 6-year-old whirlwind of curiosity, can be caught doodling on every surface, loses one sock after every bike ride, and spends hours chasing butterflies while humming pop-bluegrass
    mash-ups, because they thrive on endless exploration.
background:
  cultural: Taylor grows up in Louisville, Kentucky, a city that blends Southern hospitality with Midwestern sensibility. Her family participates in local traditions such as the Kentucky Derby festivities
    (e.g., family‑friendly parades), community fairs, and library storytime sessions. She is exposed to regional music like bluegrass and enjoys the city's parks and the Ohio River waterfront. Being raised
    in a predominantly white, middle‑class neighborhood gives her a cultural context of American suburban life, with values of friendliness, politeness, and community involvement.
