  career_goals: Taylor often expresses a desire to become an artist who paints bright pictures for children, a teacher who uses art to make learning fun, or a community storyteller who shares local legends.
    She is also fascinated by space and sometimes says she wants to be an astronaut who draws the stars. While her dreams are shaped by a love for creativity, her gentle nature leads her to imagine roles
    that help others, such as a kindergarten teacher or a wildlife caretaker.
