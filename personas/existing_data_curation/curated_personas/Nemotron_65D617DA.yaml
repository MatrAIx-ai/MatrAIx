personas:
  professional: Elizabeth Todd, a 38‑year‑old restaurant operations manager with a STEM foundation, streamlines dining venues through data‑driven inventory control, menu engineering, and flexible staff
    scheduling, and they blend structured processes with a compassionate focus on employee well‑being, even if occasional spontaneous menu experiments sometimes throw off their carefully planned spreadsheets.
  sports: Elizabeth Todd, a 38‑year‑old outdoor enthusiast, hikes the Potomac River trail system on weekends, participates in a local yoga studio and a community running club, and they cheer on the Washington
    Capitals and DC United while occasionally joining charity 5K runs.
  arts: Elizabeth Todd, a 38‑year‑old book lover and cultural aficionado, devotes evenings to a community book club reading works by Sally Rooney and Brené Brown, enjoys live indie music at The Fillmore,
    and they find inspiration in the paintings of Georgia O'Keeffe, even if they sometimes binge‑watch streaming documentaries about culinary history.
  travel: Elizabeth Todd, a 38‑year‑old travel planner, prefers weekend getaways to Shenandoah National Park and Asheville, uses spreadsheet budgeting to balance adventure and family time, and they dream
    of a culinary tour through Tuscany while occasionally over‑packing for spontaneous photo walks.
  culinary: Elizabeth Todd, a 38‑year‑old herb gardener and experimental cook, incorporates home‑grown basil, rosemary, and thyme into farm‑to‑table dishes like roasted root vegetable medley with goat cheese,
    and they love experimenting with sous‑vide techniques while occasionally over‑seasoning due to late‑night stress.
  core: Elizabeth Todd, a 38‑year‑old detail‑oriented yet flexible hospitality leader, blends analytical rigor with a heartfelt commitment to employee well‑being, often punctuated by anxiety‑driven spontaneity
    and a love for garden‑fresh cooking.
background:
  cultural: Elizabeth was raised in a middle‑class, suburban family in Northern Virginia, where the mix of Southern hospitality and the multicultural pulse of the Washington, D.C. metro area shaped her
    outlook. Her family's values emphasized hard work, community service, and respect for tradition, which underpin her cooperative nature. Growing up near historic sites and diverse neighborhoods gave
    her an appreciation for regional cuisine and the importance of inclusive, harmonious environments, influencing both her personal and professional life.
attributes:
  skills: '[''Restaurant Operations Management'', ''Data-Driven Inventory Control'', ''Budgeting & Cost Analysis'', ''Food Safety & ServSafe Compliance'', ''Menu Engineering & Recipe Development'', ''Team
