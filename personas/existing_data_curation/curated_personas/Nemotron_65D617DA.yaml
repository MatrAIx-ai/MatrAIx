    Food Practices'', ''Customer Service Excellence'']'
  hobbies: '[''Herb Gardening'', ''Experimental Cooking'', ''Yoga and Meditation'', ''Hiking and Nature Photography'', ''Reading Contemporary Fiction'', ''Book Club Participation'', ''Volunteer Work at
    Food Bank'']'
  career_goals: She aims to transition from managing a single location to a regional supervisory role, overseeing multiple dining venues in the Mid-Atlantic. In the next five years, Elizabeth plans to earn
    a Certified Food Safety Manager credential and an MBA in Hospitality Management to blend her technical expertise with strategic leadership. She aspires to implement a franchise model that prioritizes
    employee well‑being, mental‑health support, and sustainable sourcing, creating a workplace culture that balances structured processes with the flexibility her staff values. Additionally, she hopes to
    mentor emerging managers, especially those who struggle with anxiety, by building supportive training programs.
