persona_description: A researcher or educator who is interested in the development and evaluation of adapted physical activity programs for children with various disabilities, particularly those who exhibit
  clumsiness. They are likely to have expertise in psychomotor training, gross motor performance assessments, and the long-term effects of physical activity programs on motor skills and physical development.
  They may also be interested in the social and educational implications of adapted physical activity programs and the role of physical activity in promoting social inclusion and empowerment.
