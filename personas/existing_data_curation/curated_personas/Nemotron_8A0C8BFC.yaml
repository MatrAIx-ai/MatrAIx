personas:
  professional: Sol Estrada, an aspiring veterinary technician with a budding focus on agricultural technology, blends bilingual communication, hands‑on livestock care, DIY carpentry, and a curiosity‑driven
    love of sustainable gardening to solve ranch challenges, balancing practical fixes with inventive ideas while often juggling tasks in a delightfully disorganized but adaptable way.
  sports: Sol Estrada stays active through spontaneous hikes across the West Texas prairie and weekend rides with the local mountain‑biking club, occasionally cheering on the Dallas Cowboys in fall football
    and the Texas Rangers in spring baseball while favoring a relaxed fitness philosophy that prioritizes free‑spirit exploration over regimented training.
  arts: Sol Estrada finds artistic release in strumming corridos and mariachi tunes on an acoustic guitar while sketching sun‑baked landscapes in a worn journal, drafting poems inspired by the rhythms of
    artists like Los Tigres del Norte and Antonio Aguilar, and swapping playlists with friends over late‑night gaming sessions.
  travel: Sol Estrada prefers spontaneous road trips that weave through the rugged beauty of Big Bend National Park, the limestone wonders of Carlsbad Caverns, and the eclectic music scene of Austin, balancing
    youthful wanderlust with a modest budget and a habit of discovering hidden roadside food stalls.
  culinary: Sol Estrada, a self‑taught home cook, experiments with family‑passed recipes by slow‑roasting pork shoulder with a chiltepin‑infused glaze, hand‑rolling corn masa tortillas for fresh tacos,
    and tossing cactus‑pad salads with prickly pear vinaigrette, delighting friends with the bold blend of local ranch ingredients and traditional flavors.
  core: Sol Estrada, a curious yet laid‑back teen with a habit of juggling guitar strings, garden seedlings, and half‑finished journal entries, navigates life by blending spontaneous adventures with a quiet
    determination to turn practical skills into community‑focused dreams.
background:
  cultural: Sol grows up in a Mexican‑American household where Spanish is spoken at home and English is used in school and community settings. Her family maintains strong ties to Mexican traditions, celebrating
    Día de los Muertos, Las Posadas, and other cultural holidays with food, music, and communal gatherings. The Catholic faith plays a role in family life, with regular church attendance and observance
    of religious festivals. Living in Wheeler, Texas, Sol is also shaped by a rural, ranching environment that values hard work, self‑reliance, and close-knit community relationships. This blend of Mexican
    heritage and West Texas ranch culture gives her a unique perspective that balances respect for tradition with an openness to new ideas and practical problem‑solving.
attributes:
  skills: '["Bilingual Spanish‑English communication", "Animal care and small‑livestock handling", "Gardening and horticulture basics", "Traditional Mexican cooking", "Basic computer literacy (Word, Excel,
    internet research)", "DIY repairs and basic carpentry", "Problem solving and troubleshooting", "Interpersonal mediation", "Creative writing and journaling", "Playing acoustic guitar"]'
  hobbies: '["Playing acoustic guitar and listening to traditional Mexican music", "Exploring West Texas outdoors (hiking, biking)", "Cooking and adapting Mexican family recipes", "Reading science articles
    and watching DIY tutorials", "Playing video games with friends", "Journaling, sketching, and creative writing", "Volunteering at the community center"]'
  career_goals: Sol aims to complete her GED within the next year and then enroll in a community college program focused on agricultural technology or veterinary assistance. She dreams of becoming a certified
    veterinary technician who can support local ranchers and pet owners, and she also envisions launching a small agritourism venture that combines a community garden with a pop‑up kitchen serving Mexican‑inspired
    dishes to residents of Wheeler and surrounding areas. In the longer term, she hopes to develop a mentorship program for younger teens in her town, encouraging them to explore practical skills while
    nurturing curiosity about new technologies and sustainable farming practices.
