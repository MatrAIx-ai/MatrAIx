  career_goals: Ella envisions turning her imagination into a sustainable freelance career that fuses writing and visual art. She aspires to publish a collection of speculative short stories and companion
    illustrations, and to develop a graphic‑novel series that explores themes of nature and human resilience. In parallel, she hopes to curate small‑scale exhibitions and creative workshops for local residents,
    fostering a supportive micro‑community of artists and thinkers. Long‑term, Ella aims to become a creative consultant for boutique businesses and nonprofit cultural programs, leveraging her ability to
    generate fresh concepts while maintaining the flexibility and low‑structure environment she thrives in.
