personas:
  professional: Ella Harsh, a 31‑year‑old freelance creative consultant, blends speculative fiction writing, abstract digital illustration, and lo‑fi music production into bespoke storytelling commissions,
    leveraging their improvisational flair and self‑directed learning to deliver concept‑driven projects—though their spontaneous nature sometimes makes deadlines feel like a moving target.
  sports: Ella Harsh finds rhythm in the woods, joining the Kennebec Trails Hiking Club for weekend treks, cross‑country skiing with the local winter crew, and cheering on the Maine Mariners while occasionally
    tossing a ball in the town’s informal women’s softball league.
  arts: Ella Harsh channels the haunting lyricism of Octavia Butler’s speculative worlds, the dreamy beats of Nujabes, and the vivid abstraction of Yayoi Kusama into their lo‑fi tracks and acrylic canvases,
    while regularly performing ukulele renditions of Sufjan Stevens at the town café’s open‑mic nights.
  travel: Ella Harsh prefers solitary, off‑season wanderings that blend rugged nature with quiet culture, having trekked the misty cliffs of Acadia, marveled at the stone circles of the Scottish Highlands,
    and immersed themselves in Kyoto’s serene gardens, all while planning trips through meticulous notebook sketches rather than digital itineraries.
  culinary: Ella Harsh enjoys cooking with local ingredients, often foraging wild mushrooms to stir into a rustic mushroom risotto, pairing fresh New England lobster rolls with a sprinkle of thyme, and
    savoring miso ramen on rainy evenings, though they admit to burning toast when distracted by sudden lyrical ideas.
  core: Ella Harsh is a serene dreamer who stitches folklore, nature, and abstract art into a patchwork life, occasionally lost in spontaneous creative bursts that leave a trail of coffee‑stained sketches
    and half‑finished deadlines.
background:
  cultural: Ella was raised in South China, a small, rural town in Kennebec County, Maine, rooted in a white New England heritage that traces back to early English and Irish settlers. The community’s values
    of self‑reliance, modesty, and close connection to the natural landscape have shaped her independent spirit and calm resilience. Family gatherings often featured storytelling and folk music, reinforcing
    a respect for oral traditions and creative expression. While the town’s pace is slower and its social circles tight‑knit, Ella’s exposure to the region’s seasonal rhythms and the surrounding forests
    nurtured her appreciation for solitude and the subtle beauty of everyday life. This cultural backdrop blends a classic New England work ethic with an openness to artistic novelty, informing both her
    personal identity and her creative pursuits.
