persona_description: Howard Hampton, an NDP Leader from Northern Ontario, is a political activist who is concerned about the overrepresentation of First Nations people in the criminal justice system and
  the lack of representation of First Nations people on jury rolls. He plans to conduct an inquiry into the jury selection system to ensure that members of First Nations communities are included on the
  jury rolls, which is essential for a fair trial.
