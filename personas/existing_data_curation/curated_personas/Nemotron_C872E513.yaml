  career_goals: Even though she is retired, Juanita aims to share her passion for art and history with her community. She plans to volunteer as an art‑workshop facilitator at the Nederland Senior Center,
    lead a small oral‑history project for the Jefferson County Historical Society, and complete a beginner watercolor course at the local community college. She also hopes to travel to at least two major
    art museums each year (e.g., the Museum of Fine Arts in Houston and the Dallas Museum of Art) and to compile a family memoir that preserves her ancestors’ stories for future generations. Maintaining
    her health and managing stress so she can continue these activities is a personal priority.
