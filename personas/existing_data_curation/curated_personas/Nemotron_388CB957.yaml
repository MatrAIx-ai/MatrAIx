personas:
  professional: Twan Blount is a high school junior who combines a hands‑on knack for automotive maintenance, basic carpentry, and lawn care with a disciplined routine, channeling these practical skills
    toward a future apprenticeship in electrical or HVAC trades, where their reliability and teamwork shine.
  sports: Twan Blount spends afternoons at the neighborhood park shooting hoops with the local high school team, rides the skate park honing kickflip tricks, and fishes at Cedar Lake on weekends, cheering
    for the hometown basketball team, the River City Raptors, while also following the NFL's Denver Broncos.
  arts: Twan Blount curates hip‑hop playlists featuring Kendrick Lamar and J. Cole and gospel tracks by Kirk Franklin, creates quick video edits for friends using TikTok and Instagram Reels, and draws inspiration
    from street‑art murals they encounter while skateboarding, occasionally sketching skateboard designs.
  travel: Twan Blount prefers short, budget‑friendly road trips, often joining family on weekend drives to the nearby mountain resort of Pine Ridge for fishing and hiking, while dreaming of a future solo
    backpacking adventure across the Pacific Northwest's national parks.
  culinary: Twan Blount enjoys grilling burgers with cheddar cheese and seasoned potato wedges after basketball games, cooks simple stovetop mac & cheese with a splash of hot sauce, and experiments with
    fresh‑caught trout fillets, favoring pepper, garlic, and lemon zest.
  core: Twan Blount is a structured teen who balances hands‑on trades, team sports, and digital creativity, while wrestling with anxiety‑driven worry and a habit of over‑scheduling every free minute.
background:
  cultural: Twan is an African American teen raised in rural Lancaster County, South Carolina. His upbringing blends Southern Black traditions—such as church gatherings, soul‑food cooking, and community
    storytelling—with contemporary urban influences from music, internet culture, and social media. The close‑knit Black community in his town emphasizes mutual support, faith, and resilience, shaping his
    values of reliability, cooperation, and personal responsibility. These cultural roots inform his daily life, his hobbies, and his aspirations for a stable, respectable career.
attributes:
  skills: '[''Basic automotive maintenance'', ''Lawn care and landscaping'', ''Simple carpentry'', ''Smartphone and social media proficiency'', ''Time‑management and scheduling'', ''Team sports coordination'',
    ''GED preparation basics'', ''Community volunteer assistance'']'
  hobbies: '[''Basketball'', ''Skateboarding'', ''Fishing'', ''Hip‑hop and gospel music listening'', ''Video editing'', ''Playing video games'', ''Reading motivational books'', ''Church youth group volunteering'']'
  career_goals: Twan aims to earn his GED within the next two years and then enroll in a vocational program focused on electrical work or HVAC technology. He hopes to secure an apprenticeship with a local
    utility or manufacturing company, gain certification as an electrician, and ultimately work in a stable, structured trade that provides dependable income for his family. He also wants to develop a reputation
    for reliability and teamwork, which he sees as essential for long‑term career growth.
