  career_goals: Anna hopes to transition from driving for a company to owning a small, community‑focused taxi fleet that prioritizes senior and disabled riders, allowing her to combine her love of service
    with entrepreneurship. She plans to obtain her GED and take a short business‑management course at the local community college to better handle the administrative side of the venture. In the near term,
    she aims to become a certified driver trainer, sharing her route expertise and safety practices with new drivers. Long‑term, she envisions a modest retirement where she can devote more time to art workshops
    and volunteer driver programs for local nonprofits.
