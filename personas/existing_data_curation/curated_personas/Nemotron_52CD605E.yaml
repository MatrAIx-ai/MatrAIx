  hobbies: '[''Hiking'', ''Yoga'', ''Plant‑based cooking'', ''Tech meetups'', ''Hackathons'', ''Urban photography'', ''Board games'', ''Science nonfiction reading'', ''Arduino tinkering'', ''Journaling'']'
  career_goals: Eula aims to advance into a senior technical leadership role within the next five years, steering multidisciplinary teams that build scalable, sustainable technology solutions for urban
    environments. She plans to deepen her expertise in cloud‑native infrastructure and renewable‑energy system integration, pursue an AWS Solutions Architect Professional certification, and eventually influence
    product strategy at a forward‑thinking tech company. Additionally, she is committed to mentoring women and underrepresented groups in engineering and contributing to open‑source projects that promote
    environmental resilience.
