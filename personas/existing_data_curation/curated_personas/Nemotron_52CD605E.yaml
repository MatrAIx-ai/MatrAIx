personas:
  professional: Eula Weber is a full‑stack engineer proficient in Python, JavaScript, and Go, who designs cloud‑native micro‑services on AWS, mentors junior developers, and aims to transition into senior
    technical leadership by integrating renewable‑energy considerations into urban tech solutions.
  sports: Eula Weber hikes the Santa Monica Mountains weekly, practices yoga at a local studio, plays on a co‑ed recreational soccer league, and passionately follows the Los Angeles Galaxy and the Lakers,
    wearing their gear on game days.
  arts: Eula Weber captures vibrant street art and cityscapes through urban photography, draws inspiration from the works of Banksy and Shepard Fairey, enjoys listening to Bon Iver and Miles Davis, and
    attends the LA Philharmonic’s summer concerts whenever possible.
  travel: Eula Weber prefers a mix of spontaneous weekend road trips to places like Yosemite and Iceland and carefully planned overseas tours, yearning to explore a historic Bavarian city during Oktoberfest
    while also craving the minimalist aesthetics of Scandinavian design in Stockholm.
  culinary: Eula Weber experiments with plant‑based dishes, perfecting a vegan bratwurst served with sauerkraut, whipping up spicy chickpea curry with coconut milk, and savoring avocado toast topped with
    microgreens, while keeping a well‑stocked pantry of quinoa, kale, and tempeh.
  core: Eula Weber blends technical precision with eco‑conscious curiosity, balancing high‑energy social engagements with reflective solo pursuits, all while occasionally over‑indulging in artisanal coffee
    and forgetting to water their indoor succulents.
background:
  cultural: Eula comes from a multigenerational white American family with German roots; her grandparents emigrated from Germany to California in the 1960s. Raised in a suburban neighborhood of Los Angeles,
    she grew up bilingual in English and conversational German, celebrating both typical American holidays and German traditions such as Oktoberfest. The cultural mosaic of Los Angeles exposed her to diverse
    perspectives, fostering an inclusive worldview. While she aligns with mainstream American middle‑class values—self‑reliance, education, and community involvement—she maintains a connection to her European
    heritage through family recipes, music, and occasional trips to Germany.
attributes:
  skills: '[''Python'', ''JavaScript'', ''Go'', ''AWS'', ''Docker'', ''Kubernetes'', ''CI/CD pipelines'', ''Micro‑service architecture'', ''RESTful API design'', ''Data analysis with pandas'', ''SQL'',
