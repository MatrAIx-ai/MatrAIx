  career_goals: Although currently not employed full‑time, Maxie is eager to channel his expertise into purposeful community‑focused endeavors. He plans to launch a volunteer STEM mentorship program at
    local schools, where he can guide high‑school students through hands‑on engineering projects. Concurrently, he aspires to offer part‑time consulting for small manufacturers in the Findlay area, helping
    them adopt data‑driven process improvements. On a personal front, Maxie aims to complete the restoration of a 1965 Chevrolet Impala he has been refurbishing for years, and eventually publish a practical
    guide that blends his engineering knowledge with DIY craftsmanship. These goals reflect his desire to stay intellectually curious, remain socially engaged, and leave a lasting, practical impact on his
    community.
