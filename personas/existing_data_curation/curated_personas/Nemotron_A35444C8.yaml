personas:
  professional: Mackenzie Manuel is a seasoned construction professional with over three decades of hands‑on experience in framing, concrete formwork, and operating heavy equipment, who blends a meticulous
    safety‑first mindset with a flexible, problem‑solving attitude, making them an effective mentor and aspiring site safety coordinator.
  sports: Mackenzie Manuel stays active through weekly hikes in nearby state parks and seasonal bird‑watching excursions, supports the Carolina Panthers and Charlotte Hornets as a devoted fan, and plays
    occasional pickup softball with the Mount Airy Seniors League while belonging to the local senior walking club that meets each Saturday morning.
  arts: Mackenzie Manuel expresses artistic passion by singing gospel classics from Mahalia Jackson and contemporary worship songs by Chris Tomlin in their church choir, finds inspiration in the vibrant
    quilt designs of Faith Ringgold during their quilting circle meetings, and enjoys unwinding with classic films starring Doris Day and listening to the folk storytelling of Gillian Welch.
  travel: Mackenzie Manuel prefers spontaneous weekend road trips with their husband, charting routes along the Blue Ridge Parkway to explore Shenandoah and Great Smoky Mountains National Parks, while dreaming
    of a cross‑country drive to the Grand Canyon and a relaxing cruise through the Caribbean islands when finances permit.
  culinary: Mackenzie Manuel, an enthusiastic home cook, delights in turning heirloom tomatoes, sweet corn, and fresh basil from their garden into rustic ratatouille and grilled vegetable medleys for potluck
    gatherings, and treats themselves to a slice of pecan pie spiked with a hint of bourbon caramel on special occasions.
  core: Mackenzie Manuel is a 62‑year‑old construction veteran who balances meticulous safety expertise with a spontaneous love for community garden potlucks, quilting, and weekend park adventures, all
    while championing women in the trades and nurturing a compassionate, steady spirit.
background:
  cultural: Mackenzie is a lifelong resident of Mount Airy, a small town nestled in the foothills of the Blue Ridge Mountains in North Carolina. Raised in a white, Southern, working‑class family, she grew
    up immersed in Appalachian traditions—bluegrass music, church gatherings, and a strong culture of mutual aid. Her upbringing emphasized hard work, hospitality, and community service, values that continue
    to shape her outlook. She holds a deep appreciation for the region’s natural beauty and maintains close ties with extended family and neighbors, often participating in local events, seasonal celebrations,
    and church activities.
attributes:
  skills: '[''Framing'', ''Concrete Formwork'', ''Heavy Equipment Operation (backhoe, skid‑steer)'', ''Blueprint Reading'', ''Site Safety Inspection'', ''OSHA Compliance'', ''Project Scheduling'', ''Cost
    Estimating'', ''Team Coordination'', ''Mentoring and Training'']'
  hobbies: '[''Habitat for Humanity Volunteering'', ''Church Choir'', ''Gardening (heirloom vegetables)'', ''Potluck Hosting'', ''Weekend Road Trips'', ''Hiking and Bird‑watching'', ''Quilting Circle'',
    ''Community Festival Organization'']'
  career_goals: Mackenzie aims to move into a supervisory position, such as crew foreperson or site safety coordinator, within the next few years, leveraging her extensive field experience and her construction‑management
    degree. She plans to earn an OSHA 30‑hour certification and an advanced safety trainer credential to formalize her expertise. A long‑term ambition is to mentor more women entering the trades and eventually
    launch a small consulting service that provides safety audits and training for regional contractors. While she values structure, she also wants a role that permits a flexible schedule to spend quality
    time with her husband and community.
