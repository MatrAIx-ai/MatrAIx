persona_description: A librarian who is responsible for assessing the quality and suitability of open educational resources (OER) for inclusion in the library's collection. This librarian is knowledgeable
  in the field of education, with a focus on the use of technology in education, and has experience with various open education platforms and tools. They are also familiar with the criteria for assessing
  the quality of OER, such as the reputation of the author/institution, standard of technical production, and fitness for purpose, and are able to evaluate resources based on these criteria. Additionally,
  this librarian is skilled in identifying and recommending OER that are relevant to the library's users and the library's collection.
