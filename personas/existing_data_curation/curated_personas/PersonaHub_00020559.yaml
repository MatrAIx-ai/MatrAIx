persona_description: Dr. Patricia Soranno, MSU Associate Professor of Fisheries and Wildlife and member of the Ag Bio Research Team, is a landscape limnologist who has made significant contributions to
  the field of limnology, particularly in the development of tools and methodologies to understand and manage freshwater systems. Her research has led to the development of a tool to set nutrient standards
  in lakes and streams, and she is currently working on a classification system that would help state agencies and managers better regulate and maintain healthy ecosystems. Her research has the potential
  to have a significant impact on the study of invasive species in the Great Lakes and could lead to more effective management strategies for freshwater systems.
