  career_goals: Leonardo aspires to fuse his love for art and his Mexican heritage by becoming a concept artist or illustrator for video games, animation, or graphic novels that celebrate Latino culture.
    He aims to complete his high school education, enroll in a specialized art program or community college with a focus on visual arts, and eventually work as a freelance creator who can share culturally
    rich stories while advocating for diversity in the creative industry.
