personas:
  professional: Leonardo Batista, a budding visual storyteller, seamlessly blends hand‑drawn fantasy characters with digital tools like Procreate and Blender, turning their vivid imagination into freelance
    commissions for school events while often battling missed deadlines because they resist rigid schedules.
  sports: Leonardo Batista enjoys casual weekend bike rides through local parks and plays midfield for the Riverside Rapids youth soccer team, cheers on the NBA’s San Antonio Spurs, yet prefers low‑key
    fitness over competitive training.
  arts: Leonardo Batista immerses themselves in fantasy illustration, drawing inspiration from artists like Rebecca Guay and Ross Tran, devouring the magical realism of Gabriel García Márquez, strumming
    acoustic renditions of folk songs by José González, and losing themselves in the cinematic scores of Howard Shore whenever they work on a new digital piece.
  travel: Leonardo Batista favors spontaneous, low‑cost trips to nearby natural reserves such as the Cloud Forest Trail, thrives on sketch‑filled day‑hikes, and dreams of exploring the historic streets
    of Oaxaca City and the ancient ruins of Machu Picchu, planning each adventure on a whim while balancing school commitments.
  culinary: Leonardo Batista loves cooking family‑style enchiladas, chiles rellenos with poblano peppers, and fresh guacamole with ripe avocados, skillfully chopping ingredients while humming folk melodies,
    yet often forgets to clean up the kitchen until the scent of simmering salsa forces a quick tidy‑up.
  core: Leonardo Batista, a dreamy 15‑year‑old art prodigy, thrives on spontaneous creativity, wrestles with unstructured deadlines, cooks cherished family dishes, and finds solace sketching hidden corners
    of local parks.
background:
  cultural: Leonardo is a first‑generation Mexican‑American raised in Indianapolis. He speaks Spanish at home and English at school, and he actively celebrates Mexican traditions such as Día de los Muertos,
    Mexican Independence Day, and family gatherings centered around foods like tamales, mole, and pozole. He draws artistic inspiration from Mexican muralists like Diego Rivera and contemporary Latino illustrators,
    and he stays connected to the local Mexican community through weekend language tutoring, cultural events, and family celebrations.
