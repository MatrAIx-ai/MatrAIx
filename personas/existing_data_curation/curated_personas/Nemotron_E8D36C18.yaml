  career_goals: Although retired, Selena aims to stay physically and mentally active, maintaining her garden and continuing to share her culinary and cultural knowledge with family and community members.
    She aspires to compile a family cookbook that preserves traditional recipes alongside her own innovations, and to record oral histories of older residents in Granville County for future generations.
    Learning to use a digital camera and simple editing software to archive family photos and community stories is a current ambition. She also hopes to mentor a few younger volunteers at her church, offering
    guidance in event organization, caregiving, and storytelling, while preserving her independence and health.
