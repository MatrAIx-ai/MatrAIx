personas:
  professional: Selena Hill, a retired home economics instructor and community event organizer, blends meticulous planning with a flexible, curiosity‑driven approach to teaching sustainable cooking and
    preserving local histories, while they remain reserved and thoughtful in leadership.
  sports: Selena Hill enjoys low‑impact walking in the garden and on the senior center’s walking club, attends Durham Bulls baseball games each summer, follows the Carolina Panthers during football season,
    and participates in a weekly senior‑friendly yoga class, all while they prefer small, familiar groups over crowded stadiums.
  arts: Selena Hill finds solace in the choir, singing gospel classics by Mahalia Jackson and Aretha Franklin, relishes quilting while listening to the Starlight Gospel Choir, and reads historical fiction
    by authors such as Margaret Mitchell and Ann Patchett, allowing them to weave storytelling into craft.
  travel: Selena Hill favors short, purposeful road trips to historic towns like Savannah, Charleston, and Asheville, enjoys a leisurely stroll through the Blue Ridge Parkway, and dreams of a guided tour
    of Washington, D.C.’s museums, yet they travel with a companion for safety and ease.
  culinary: Selena Hill excels at Southern cooking, perfecting dishes like shrimp and grits with smoked paprika, collard greens seasoned with ham hocks, and sweet‑potato biscuit tops, while they also experiment
    with quinoa‑kale salads tossed with heirloom tomatoes and citrus vinaigrette, showcasing a blend of tradition and innovation.
  core: Selena Hill, an 87‑year‑old garden‑loving chronicler, balances a love for tradition with shy curiosity, often over‑watering seedlings while worrying about the preservation of family stories.
background:
  cultural: Selena Hill was born in the early 1930s in rural North Carolina, growing up under Jim Crow segregation and later witnessing the civil-rights movement’s impact on her community. Her upbringing
    in a close-knit African-American family emphasized church attendance, oral storytelling, and the preservation of Southern Black culinary traditions. She attended a historically Black college for a time,
    studying home economics, and has remained active in her Baptist church, where she serves as a volunteer coordinator. Her cultural identity blends the resilience of her ancestors, the spiritual foundation
    of the Black church, and a deep respect for community solidarity. She participates in local African-American heritage events, contributes to preserving Granville County’s Black history, and maintains
    the customs of family meals, gospel music, and intergenerational knowledge sharing.
