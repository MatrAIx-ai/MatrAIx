personas:
  professional: Maria Peralta, a budding junior artist who devotes her afternoons to drawing intricate watercolors and assembling complex LEGO structures, channels her curiosity and competitive nature into
    meticulous projects that feel like professional assignments, showcasing an early blend of creativity and precision that they proudly share with family.
  sports: Maria Peralta, a spirited participant in the Allentown Youth Soccer Club who cheers for the Philadelphia Eagles and follows the Lehigh Valley IronPigs during baseball season, approaches fitness
    with a blend of competitive drive and careful planning, preferring structured practice sessions over spontaneous play because they worry about keeping up.
  arts: Maria Peralta, an enthusiastic young creator who fills sketchbooks with vibrant watercolors inspired by artists like Frida Kahlo and Pixar animation, dances energetically to merengue beats while
    humming Shakira’s hits, and eagerly watches Sesame Street for both fun and learning, reflecting a vivid imagination that they nurture through crayons and dance.
  travel: Maria Peralta, an imaginative traveler who prefers meticulously planned family trips to places like the Philadelphia Museum of Art and Disney World, while dreaming of a sunny vacation to San Juan
    where they can explore colorful streets and taste local treats, balances excitement with occasional anxiety about new environments.
  culinary: Maria Peralta, a budding kitchen helper who skillfully stirs arroz con leche with her mother, loves the creamy texture of flan, enjoys munching on mangú and cheese empanadas, and experiments
    with bright ingredients like avocado and pineapple in snack creations, though they sometimes get distracted by coloring and forget to finish a recipe.
  core: Maria Peralta, a curious and competitive six‑year‑old whose vibrant imagination fuels endless drawings and LEGO builds, yet a lingering worry often turns playful ambition into meticulous, sometimes
    anxious, pursuits that they navigate with careful strokes.
background:
  cultural: Maria grows up in a close‑knit Dominican family in Allentown, Pennsylvania. Spanish is spoken at home, while English is used at school and in the community. She celebrates Dominican holidays
    such as Día de la Independencia, enjoys traditional foods like mangú, empanadas, and flan, and participates in local cultural events hosted by the Dominican community. Her family practices Catholic
    traditions, values education, music, and strong family ties, and she regularly hears stories and rhythms from her heritage alongside mainstream American culture.
