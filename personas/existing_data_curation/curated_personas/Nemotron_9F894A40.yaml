  career_goals: Maria dreams of becoming a painter or illustrator whose artwork celebrates the colors and stories of her Dominican heritage. She also imagines exploring nature as a young scientist and sharing
    her discoveries in school fairs. Her competitive spirit fuels a desire to win art contests and earn recognition for her creative projects, while she hopes one day to teach children about art and culture.
