persona_description: A mountaineer and environmentalist who is passionate about raising awareness about the danger of glacial melt caused by climate change and the devastating effects of flash floods on
  mountain communities in Nepal and other countries abutting the Himalayan range. Apa is on a quest to educate villagers about the importance of preparing for change and taking action to mitigate the risks
  posed by rising temperatures and changing weather patterns. He is known for his repeated climbs of the world's highest mountain and his expertise in satellite imaging to assess glacial melt. Apa is also
  a trekker who is currently on a 120-day journey to warn villagers about the dangers of more devastating floods.
