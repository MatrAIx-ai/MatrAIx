  career_goals: Norma envisions a future that offers stable, community‑focused work with clear daily routines. She is interested in becoming a veterinary technician or a culinary professional, such as a
    baker, because both fields combine practical hands‑on work with helping others. She plans to graduate high school, attend a community‑college program for veterinary assisting or culinary arts, and eventually
    secure a position at a local clinic or bakery. In the longer term she hopes to open a modest home‑based bakery that allows her to maintain a predictable schedule while staying close to family and friends
    in Chapel Hill.
