personas:
  professional: An aspiring horticulturist and part‑time pet‑sitter, Norma Flowers channels her love for routine and practical hands‑on work into caring for her golden retriever, tending a modest vegetable
    garden, and helping neighbors with small gardening projects while they maintain a relaxed approach to school assignments.
  sports: A nature‑oriented teen, Norma Flowers spends weekends hiking the Occoneechee River trails with the local Trailblazers Club, occasionally jogs with her school's cross‑country team, and avidly follows
    the Charlotte Hornets and UNC Tar Heels while they embrace low‑key fitness over competitive sports.
  arts: A creative hobbyist, Norma Flowers bakes cupcakes while humming to Olivia Rodrigo and Phoebe Bridgers, knits scarves inspired by indie folk album covers, and volunteers as a stagehand for high‑school
    theater productions like Into the Woods, letting music and hands‑on craft shape their leisure time as they unwind after school.
  travel: A modest traveler, Norma Flowers prefers comfortable weekend road trips to the Outer Banks and the Great Smoky Mountains, planning trips with her family using a shared car and a modest allowance,
    and dreams of eventually backpacking through the Pacific Northwest when they save enough.
  culinary: A budding baker, Norma Flowers perfects chocolate‑chip cookies and red‑velvet cupcakes with her mother, regularly whips up garden‑fresh zucchini bread and tomato‑basil soup, and delights in
    the buttery aroma of melted butter and vanilla while they experiment with new frosting flavors.
  core: Norma Flowers balances a love for routine comforts—from baking and gardening to cozy board games—with a laid‑back, occasionally messy approach to obligations, making them a reliable yet delightfully
    unpredictable teen.
background:
  cultural: Norma is a White American teen raised in Chapel Hill, North Carolina, a college‑town that blends Southern hospitality with a progressive, education‑oriented community. Her family’s ancestry
    includes English and German roots, and they uphold traditions such as Sunday family meals, Thanksgiving gatherings, and participation in the local Methodist church. Growing up near the University of
    North Carolina campus, she’s been exposed to a mix of academic influence and the rural‑suburban lifestyle of Durham County. This environment has fostered her practical outlook, appreciation for routine,
    and a modest ambition to contribute to her community, while also allowing her to enjoy the region’s outdoor activities and cultural events.
