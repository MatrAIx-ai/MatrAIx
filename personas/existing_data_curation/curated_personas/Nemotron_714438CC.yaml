  hobbies: '[''Gardening'', ''Knitting'', ''Crossword puzzles'', ''Sudoku'', ''Reading historical biographies'', ''Cooking traditional recipes'', ''Mindfulness meditation'', ''Gentle yoga'', ''Volunteer
    bookkeeping for church charity'']'
  career_goals: Stephanie aims to leverage her finance and education expertise to advance into a senior leadership role, ideally becoming the Chief Financial Officer of her organization within the next
    five years. She seeks to institutionalize robust, routine‑based financial controls that increase profitability and stability while minimizing risk. Parallel to her corporate ambition, she plans to launch
    a community‑focused financial literacy program in New Cumberland, using her teaching background to empower adults with practical money‑management skills and to reinforce her commitment to local service.
