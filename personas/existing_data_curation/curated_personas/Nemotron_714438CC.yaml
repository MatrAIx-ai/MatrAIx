personas:
  professional: Stephanie Sullivan, a seasoned financial manager who blends corporate finance acumen with curriculum design expertise, drives meticulous budgeting, risk assessment, and SOP creation at her
    mid-sized firm, all while plotting a steady path toward the CFO office within five years, leveraging their methodical nature and competitive drive.
  sports: Stephanie Sullivan follows the West Virginia Mountaineers football team and the Cincinnati Bengals avidly, attends Sunday games when schedule allows, participates in a local senior walking club
    that explores the Appalachian foothills each weekend, and quietly enjoys weekly yoga sessions at the community center, aligning with their preference for low‑stimulus, routine‑based fitness.
  arts: Stephanie Sullivan finds creative solace in knitting intricate Fair Isle patterns while listening to classic Appalachian folk recordings by The Carter Family, reads historical biographies such as
    “Team of Rivals” and classic novels like “Pride and Prejudice,” and supports the church choir behind the scenes, illustrating how their love for tradition and structured creativity shapes their cultural
    engagement.
  travel: Stephanie Sullivan prefers meticulously planned road trips to historic small towns like Harpers Ferry, Williamsburg, and Asheville, staying in quaint bed‑and‑breakfasts where they can garden in
    the lobby’s herb plot, yet they avoid spontaneous travel, opting instead for trips that fit within a balanced budget and a familiar routine.
  culinary: Stephanie Sullivan delights in preparing family staples such as chicken and dumplings, cornbread with sage, and apple crisp made from garden‑grown apples, cooks with a moderate skill level,
    favors fresh herbs like thyme and rosemary, and enjoys the comforting ritual of canning vegetables for winter, though anxiety sometimes leads to missed meals.
  core: Stephanie Sullivan is a methodical, routine‑driven finance professional who balances a competitive edge with quiet, solitary hobbies, manages health anxieties through structured self‑care, and cherishes
    community‑rooted traditions while occasionally succumbing to impulsive yarn splurges.
background:
  cultural: Stephanie is a third‑generation White American whose family has deep roots in the Appalachian region of West Virginia. Raised in a small, close‑knit community, she was immersed in values of
    self‑reliance, modesty, and tradition, reinforced by frequent church attendance and strong family ties. The practical, industrious culture of New Cumberland—balancing rural sensibilities with modest
    industrial heritage—has shaped her preference for routine, stability, and community service, while her upbringing emphasized modest ambition and a pragmatic outlook on life.
attributes:
  skills: '[''Financial analysis'', ''Budgeting and forecasting'', ''Regulatory compliance'', ''Risk assessment'', ''Process improvement'', ''Data visualization'', ''Financial reporting'', ''Advanced Excel'',
