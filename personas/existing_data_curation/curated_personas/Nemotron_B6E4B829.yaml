  hobbies: '[''Pickup basketball games'', ''Community soccer league'', ''Model kit building and DIY electronics'', ''Acoustic guitar playing'', ''Cooking (Italian cuisine)'', ''Hiking in the Palisades'',
    ''Board‑game nights'', ''Yoga and mindfulness meditation'', ''STEM mentorship volunteering'']'
  career_goals: Roberto aims to advance to a senior engineering technologist role where he can lead cross‑functional projects and mentor junior staff. He plans to obtain a Lean Six Sigma Black Belt and
    pursue a professional engineering (PE) certification to broaden his credentials. Over the next five years he hopes to manage a small team focused on renewable‑energy retrofits for local manufacturers,
    aligning his practical skills with his desire for sustainable solutions. Ultimately, he envisions launching a consulting firm that helps midsize firms optimize their production processes while fostering
    a collaborative workplace culture. Alongside his career progression, Roberto is committed to maintaining a balanced life to manage his stress and anxiety.
