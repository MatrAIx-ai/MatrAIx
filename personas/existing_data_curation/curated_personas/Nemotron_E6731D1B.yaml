  hobbies: '[''Reading (history, business, self‑improvement)'', ''Woodworking'', ''Model building'', ''Hiking in East Bay regional parks'', ''Fishing on the Delta'', ''Listening to jazz and blues'', ''Meditation
    and journaling'', ''Online chess'', ''Cooking traditional Southern dishes'', ''Tech podcasts (AI, robotics)'']'
  career_goals: Anthony aims to advance from floor manager to regional Operations Director within the next five years, pursuing a part‑time MBA and a Six Sigma Black Belt to deepen his strategic expertise.
    He aspires to lead larger, multi‑site teams while maintaining the high standards he values. Long‑term, he hopes to launch a consulting practice that helps small businesses in the Bay Area improve operational
    efficiency and develop inclusive workplace cultures. Mentoring underrepresented youth for careers in logistics and management is also a core ambition.
