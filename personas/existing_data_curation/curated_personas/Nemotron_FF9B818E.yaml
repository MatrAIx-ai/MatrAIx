  career_goals: Earnest aims to advance to a senior executive role—such as Director of IT or CIO—within the next five to seven years, overseeing a larger, multi‑site operation and leading a digital transformation
    that integrates AI‑driven predictive maintenance and advanced analytics while preserving operational stability. He plans to earn a CISSP certification, deepen his expertise in AI/ML applications for
    manufacturing, and champion a culture of psychological safety and resilience within IT teams to mitigate stress. Additionally, he hopes to mentor emerging IT talent in the region by establishing a community
    learning program in partnership with local colleges and technical schools.
