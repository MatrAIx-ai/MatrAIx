persona_description: A Catholic historian and scholar who specializes in the history of the Catholic Church, particularly the history of the Papal States and the history of the missions in India and China.
  He is known for his work on the history of the Papal legate Charles-Thomas Maillard de Tournon, including his legation to India and China, the establishment of harmony among the missionaries, and the
  enforcement of the decision of the Holy Office against the further toleration of the so-called Chinese rites among the native Christians. He is also known for his work on the history of the Papal legates,
  the history of the missions in India and China, and the history of the Jesuits.
