personas:
  professional: Joann Odette, a budding theatre enthusiast and junior science hobbyist, blends her curiosity with practicality by directing school skits while orchestrating simple experiments, and they
    use their talkative, cooperative nature to rally classmates and community volunteers.
  sports: Joann Odette hikes the nearby Appalachian trails on weekends, they play midfield for the McConnelsville Youth Soccer club, and they cheer for the Ohio State Buckeyes football team while keeping
    a relaxed fitness routine that includes occasional basketball drills in school PE.
  arts: Joann Odette shines in the school drama club and choir, they channel the dramatic flair of Idina Menzel and the pop energy of Taylor Swift while crafting folk‑inspired jewelry, and they often recite
    lines from Harry Potter as they rehearse their roles.
  travel: Joann Odette prefers spontaneous family road trips, they have explored Washington, D.C.’s monuments and camped under the stars in the Great Smoky Mountains, and they dream of a summer adventure
    to the ancient castles of Edinburgh, Scotland.
  culinary: Joann Odette loves baking chocolate chip cookies with a pinch of sea salt and whipping up skillet cornbread topped with honey butter and fresh blackberries, they skillfully balance school cafeteria
    meals with occasional experiments in homemade apple butter.
  core: Joann Odette is a talkative, community‑driven teen who can lead a school play, craft glittering jewelry, and still find time to budget their allowance for science kits and cookies.
background:
  cultural: Joann comes from a white, Midwestern background rooted in the small‑town culture of McConnelsville, Ohio. Her family values community, modesty, and a strong work ethic, often reflecting the
    Appalachian heritage of Morgan County through folk music, storytelling, and seasonal county‑fair traditions. She celebrates holidays like Thanksgiving and Christmas with extended family gatherings and
    participates in local church events and community projects, which reinforce her sense of belonging and cooperative spirit.
