  career_goals: Joann aspires to a career that lets her combine her love for people with practical problem‑solving. She is interested in becoming an elementary school teacher or a youth counselor, where
    she can nurture curiosity in children while providing a stable, supportive environment. She also imagines future possibilities in community health outreach or event coordination, aiming to create inclusive
    spaces that promote harmony.
