personas:
  professional: Amalia Mckain is an aspiring junior architect who fuses her love for drawing fantastical creatures with LEGO building talent to sketch and model imaginative habitats, channeling their natural
    curiosity and organized yet flexible approach while competitively sharing designs at school show‑and‑tell.
  sports: Amalia Mckain plays forward for the Little Tigers youth soccer league, avidly follows the New York Yankees during the baseball season, and spends Saturday mornings at the community pool perfecting
    freestyle laps, balancing their competitive drive with a preference for small‑group practice sessions.
  arts: Amalia Mckain immerses themselves in the world of illustration by drawing unicorns and dragons while listening to the orchestral scores of Harry Potter by John Williams and the pop tunes of Taylor
    Swift, often visiting the virtual gallery of Studio Ghibli for inspiration and collecting limited‑edition prints of the paintings by Claude Monet.
  travel: Amalia Mckain has already trekked the trails of Grand Canyon National Park with family, fascinated by the dinosaur exhibits at the Field Museum in Chicago, and dreams of future adventures to Machu
    Picchu’s ancient citadel and the Kennedy Space Center’s astronaut training simulators.
  culinary: Amalia Mckain favors cheesy pizza slices, sweet banana muffins, and enjoys crafting no‑bake granola bars with rolled oats, honey, dried cranberries, and a dash of cinnamon, often sprinkling
    river‑stone crumbs as a playful garnish on her dessert plates.
  core: Amalia Mckain, an eight‑year‑old sketch‑obsessed explorer with a competitive streak, balances curiosity and quiet independence while hoarding river stones and occasionally trading bedtime for a
    new LEGO set.
background:
  cultural: Amalia was born and raised in Anaheim, a suburban community in Orange County, California. She comes from a white, middle‑class family with mixed Irish and German ancestry. Her household celebrates
    traditional American holidays such as Thanksgiving and the Fourth of July with family gatherings, and she occasionally attends a local Catholic church with her family. Growing up near Disneyland and
    the many cultural festivals of Southern California, she has been exposed to diverse art and music, although her family’s core values emphasize education, self‑reliance, and community involvement through
    the PTA and local library programs.
