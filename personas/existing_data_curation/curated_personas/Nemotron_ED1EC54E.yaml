  career_goals: Amalia dreams of merging her love for art and technology. She hopes to become a children's book illustrator or a game designer who creates interactive story experiences. She also entertains
    the idea of being a museum curator, arranging exhibits that inspire curiosity in other kids. In the near term, she aims to win the school science fair with a project that combines art and engineering,
    and to earn top scores in spelling and math competitions. Her competitive nature drives her to set personal milestones, such as mastering a new coding concept each month and publishing a short comic
    series for her friends.
