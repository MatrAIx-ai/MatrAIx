personas:
  professional: Rosemarie Manrique is an inquisitive block‑builder who arranges stackable toys by size and color, displaying early organizational skill, and they flexibly swap pieces during play, hinting
    at a future collaborative mindset in design or engineering.
  sports: Rosemarie Manrique loves indoor toddler gymnastics at the community center, giggles at the mascot of the local soccer club during weekend family games, and they enjoy weekly stroller jogs with
    their parents, which give them a burst of fresh‑air energy.
  arts: Rosemarie Manrique is enchanted by the bright colors of Pixar’s ‘Toy Story’, hums along to Raffi’s ‘Baby Beluga’, and they watch the local mural festival’s live painting, finding comfort in both
    visual and auditory art.
  travel: Rosemarie Manrique has already explored Monterey Bay’s tide pools on a family beach day, marveled at the Grand Canyon’s vistas during a short vacation, and they look forward to a playful trip
    to Barcelona’s colorful Parc Güell and a winter visit to Quebec’s snowy playgrounds.
  culinary: Rosemarie Manrique relishes smooth sweet‑potato puree, mashed avocado with a dash of lemon juice, and mini cheese sticks, while they watch their mother whisk hummus and place an olive, a scene
    they try to emulate with their tiny hands.
  core: Rosemarie Manrique is a compassionate, curious one‑year‑old who balances meticulous toy organization with spontaneous play, loves shiny coins and lullabies, and they constantly seek gentle cuddles
    while occasionally shunning bedtime routines.
