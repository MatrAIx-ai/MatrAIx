  hobbies: '[''Visiting art galleries and museums'', ''Exploring street art and murals'', ''Attending live music performances'', ''Participating in poetry slams and open‑mic nights'', ''Volunteering at
    community art workshops'', ''Playing basketball in local parks'', ''Taking dance and Zumba classes'', ''Cooking Southern and Caribbean cuisine'', ''Hosting potluck gatherings with friends'', ''Traveling
    and urban photography'']'
  career_goals: Alvin aims to transition into a role that merges his passion for the arts with his desire to support and uplift his community. He envisions becoming a community arts coordinator or program
    manager at a nonprofit organization, where he can design inclusive cultural programs, mentor youth, and foster collaborative spaces. He plans to pursue a certificate in arts administration or social
    work while volunteering at local art centers to gain hands‑on experience. Long‑term, he hopes to launch a community‑driven arts collective that offers workshops, exhibitions, and mental‑health support
    for underserved residents.
