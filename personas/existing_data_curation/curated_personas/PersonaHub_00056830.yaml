persona_description: A scientist who specializes in the study of environmental pollution, particularly the sources and impacts of polycyclic aromatic hydrocarbon pollutants in waterways. She is interested
  in understanding the major sources of these pollutants and how they contribute to the contamination in urban waterways. Her research interests include the use of data from wastewater treatment plant discharges,
  combined sewer overflows, storm water runoff, and the water column of the New York/New Jersey Harbor to estimate the input and removal of PAHs. She is also interested in developing storm water management
  plans to control the amount of storm water runoff entering waterways and remove sediment from the runoff that carries PAHs.
