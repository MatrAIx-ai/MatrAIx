personas:
  professional: A budding scientist and storyteller, Marcela Zuluaga blends curiosity and organization as they lead experiments in their school's science club while drafting illustrated adventure narratives.
  sports: An enthusiastic soccer player, Marcela Zuluaga trains twice a week with the local youth league, idolizes forward Alex Morgan, and cheers for the New York Red Bulls, while occasionally joining
    community pick‑up games at the Watchung Reservation.
  arts: A cartoon enthusiast, Marcela Zuluaga sketches daily scenes inspired by Bill Watterson’s Calvin and Hobbes and Studio Ghibli’s Totoro, listens to Lin‑Manuel Miranda’s musical numbers, and attends
    local art workshops that nurture their creative flair.
  travel: An adventurous weekend explorer, Marcela Zuluaga has visited the Hudson River Valley’s historic sites, toured the Smithsonian museums in Washington, D.C., and dreams of hiking the Grand Canyon’s
    South Rim with family.
  culinary: A budding home chef, Marcela Zuluaga loves preparing pupusas stuffed with cheese and refried beans, mastering the delicate folding of tamales, and experimenting with fresh salsa made from tomatoes,
    cilantro, and jalapeño.
  core: A structured yet imaginative 11‑year‑old, Marcela Zuluaga balances school experiments, soccer drills, dance performances, and family cooking while keeping their allowance neatly logged.
background:
  cultural: Marcela’s family is of Salvadoran descent, and she grew up immersed in Salvadoran traditions, language, and cuisine. Spanish is spoken at home, and she celebrates cultural holidays such as Día
    de los Santos (All Saints Day) and the Festividad de la Virgen de Guadalupe with family gatherings, traditional foods, and music. She attends a local Catholic church where community events often blend
    Salvadoran customs with American influences. Living in Passaic, New Jersey, she is part of a vibrant Hispanic community, participates in neighborhood festivals that feature Salvadoran folk dances, and
    frequently helps organize cultural activities at her school’s Latino Heritage Club.
