  career_goals: Marcela dreams of becoming a teacher or a pediatric nurse, motivated by her love for helping other children and giving back to her community. She aims to attend a high school with strong
    STEM and language programs, then pursue a college degree in education or health sciences. She also hopes to use her bilingual abilities to work as a community liaison for Salvadoran families in Passaic,
    helping them navigate school resources and health services.
