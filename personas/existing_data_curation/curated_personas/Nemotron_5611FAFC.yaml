  hobbies: '["reading historical nonfiction", "gardening (vegetable and herb)", "birdwatching", "coastal fishing", "model ship building", "jigsaw puzzles", "chess", "listening to gospel and jazz music"]'
  career_goals: Although retired, Rasheed remains motivated by a desire to preserve and share the knowledge he has gathered over his life. He aims to compile a detailed family genealogy and local African‑American
    history manuscript that can be donated to the Craven County historical society. He plans to volunteer at the senior center teaching basic computer skills and confidence with email and video‑calling,
    helping peers stay connected with family. Mentoring his grandchildren in practical trades—woodworking, gardening, and simple home repairs—is a personal priority, as is maintaining his own health and
    independence through regular exercise and lifelong learning. Rasheed also hopes to contribute his photographs and oral histories to his church’s archive and, eventually, publish a modest memoir that
    reflects the resilience of his generation.
