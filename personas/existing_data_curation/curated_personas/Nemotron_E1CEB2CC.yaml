personas:
  professional: Christeena Williams, a retired community arts coordinator, leverages her meticulous organization and vivid imagination to plan intergenerational art workshops, weave together quilt exhibitions,
    and mentor volunteers with patient, methodical guidance.
  sports: Christeena Williams, a devoted fan of the Detroit Tigers and Detroit Red Wings, attends summer baseball games at Comerica Park when health permits and supports the local senior softball league,
    while also participating in weekly walks with the Southgate Senior Walking Club and occasional gentle yoga sessions.
  arts: Christeena Williams immerses herself in the arts by quilting intricate patterns inspired by Michigan's seasons, painting watercolor landscapes of Lake Michigan sunsets, attending jazz performances
    by the Detroit Jazz Orchestra and gospel shows at her church's choir, and volunteering backstage for community theater productions of classics like A Raisin in the Sun.
  travel: Christeena Williams prefers road-trip adventures that blend cultural enrichment with family visits, having driven the Great Lakes shoreline to admire fall foliage in Michigan's Upper Peninsula,
    explored New Orleans' historic French Quarter for its jazz heritage, and planning a future pilgrimage to Ghana's Cape Coast Castle to deepen her genealogical research.
  culinary: Christeena Williams enjoys farm-to-table cooking, cultivating heirloom tomatoes and native wildflowers for fresh salads, preparing her signature tomato-basil bruschetta, simmering hearty chicken
    and dumplings for Sunday meals, and occasionally indulging in a slice of cherry pie, though they sometimes over-season dishes with salt.
  core: Christeena Williams blends meticulous organization with boundless creativity, turning every quilt, garden, and community project into a canvas for lifelong learning, even if they occasionally forget
    to water a new plant.
background:
  cultural: Christeena is a second‑generation African American rooted in the Detroit metropolitan area. Her grandparents were part of the Great Migration from the rural South, settling in Detroit’s industrial
    neighborhoods before moving to the quieter suburb of Southgate. The family's cultural fabric is woven from church traditions, soul‑food cooking, and a deep appreciation for Motown music and Black visual
    arts. Growing up during the civil‑rights era, she participated in local activism and community programs that celebrated Black history and empowerment. She maintains strong ties to the African American
    church, where gospel music, storytelling, and mutual aid are central. Her culinary repertoire includes collard greens, cornbread, and Michigan fresh‑water fish dishes that blend Southern roots with
    Midwestern flavors. She engages with regional Black cultural institutions such as the Charles H. Wright Museum of African American History, and she honors the legacy of Detroit’s artistic movements
    through her own creative work.
