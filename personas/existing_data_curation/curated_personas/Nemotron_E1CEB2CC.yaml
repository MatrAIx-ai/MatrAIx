  hobbies: '[''Watercolor painting'', ''Quilting'', ''Reading historical fiction and poetry'', ''Attending jazz and gospel concerts'', ''Singing in church choir'', ''Home gardening'', ''Genealogical research'',
    ''Community theater involvement'']'
  career_goals: Although officially retired, Christeena seeks to channel her lifelong curiosity and love for community into purposeful engagement. She aims to establish a weekly intergenerational art circle
    at the local community center, where seniors and youth can collaborate on murals and storytelling projects. She also hopes to document and publish a family memoir that weaves personal narratives with
    broader African American history of Detroit, using her research skills. In the next five years, she plans to mentor at least three younger volunteers in project management and artistic techniques, and
    to serve on the board of the nearby historical society to help preserve local Black heritage. Her long‑term ambition is to leave a lasting cultural imprint on Southgate by fostering creative expression,
    historical awareness, and social cohesion.
