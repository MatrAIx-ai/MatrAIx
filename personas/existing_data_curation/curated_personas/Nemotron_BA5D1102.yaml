personas:
  professional: Dewon Dennard is a seasoned carpenter with expert skills in framing, finish carpentry and custom cabinetry, who blends curiosity for reclaimed wood and sustainable materials with a pragmatic
    approach to budgets and timelines, and channels his cooperative nature into empathetic client communication and mentoring of apprentices.
  sports: Dewon Dennard fuels his weekend fitness by playing pickup basketball at the Berwyn community park, cheering on the Chicago Bulls and Chicago Bears, and occasionally joins a casual Chicago White
    Sox fan club, balancing his love for competition with a relaxed attitude toward structured workouts.
  arts: Dewon Dennard’s artistic soul resonates with the soulful sounds of Stevie Wonder, the improvisational jazz of Kamasi Washington, and the lyrical depth of The Roots, while classic movies like "Casablanca"
    and community theater performances at the Chicago Blues Festival shape his creative outlook, and they often unwind crafting custom wooden speaker stands while listening to these influences.
  travel: Dewon Dennard prefers purposeful travel that balances cultural immersion and design inspiration, having explored New Orleans’ jazz districts, Savannah’s historic squares, and a weekend architecture
    tour of Chicago, while dreaming of a sustainable woodworking retreat in Asheville, yet they often plan trips on a modest budget and fit them around workshop commitments and community mentoring duties.
  culinary: Dewon Dennard whips up soulful Southern fare—collard greens seasoned with smoked paprika, crispy fried chicken, buttery cornbread, and occasional gumbo—using a blend of heirloom recipes and
    reclaimed‑wood cooking tools, and they take pride in perfecting each dish while occasionally experimenting with plant‑based twists for health‑conscious friends.
  core: Dewon Dennard is a community‑oriented carpenter who fuses sustainable craftsmanship with soulful rhythms, juggling a relaxed approach to planning with a drive to mentor the next generation, even
    if an occasional mess of tools reflects his laid‑back nature.
background:
  cultural: Dewon grew up in a close‑knit African‑American family rooted in Chicago’s South Side, where his grandparents were part of the Great Migration that brought Southern traditions to the Midwest.
    Family gatherings centered around gospel music, church fellowship, and soul‑food cooking, shaping his appreciation for community, rhythm, and heritage. Although he now lives in the diverse suburb of
    Berwyn, he remains connected to the city’s rich Black cultural scene—celebrating Juneteenth, attending blues and jazz concerts, and supporting local Black artisans. His cultural identity informs his
    work ethic, his desire to uplift the next generation of Black tradespeople, and his love for music, food, and communal storytelling.
attributes:
  skills: '["Framing and structural carpentry", "Finish carpentry and custom cabinetry", "Blueprint reading and plan interpretation", "Power tool operation and maintenance", "Sustainable building techniques
    (reclaimed wood, low‑VOC finishes)", "Basic project estimation and budgeting", "Customer communication and service orientation", "Team coordination and mentorship", "Woodworking design and custom furniture
    making", "Problem‑solving under flexible schedules"]'
  hobbies: '["Custom furniture making", "DIY home improvement projects", "Listening to soul, jazz, and hip‑hop music", "Playing pickup basketball", "Cooking Southern comfort food", "Attending local cultural
    festivals and church events", "Reading architecture and woodworking books", "Mentoring youth in woodworking workshops", "Watching classic movies", "Occasional video gaming"]'
  career_goals: Dewon aims to transition from being a freelance carpenter to owning a small, community‑focused carpentry shop that specializes in eco‑friendly residential renovations and handcrafted furniture.
    He plans to earn a general contractor’s license, expand his skill set with advanced sustainable‑building certifications, and establish a modest workshop space where he can host woodworking classes for
    local youth, especially aspiring Black tradespeople. Financially, his goal is to secure a stable income that will allow him to purchase a home in Berwyn and build generational wealth while maintaining
    the flexibility he values in his work life.
