persona_description: A climate change expert and researcher who specializes in analyzing and forecasting disruptions in water supplies brought on by global warming. They have led several studies on the
  impact of global warming on water supplies and have documented the regional impact of climate change on California. They are confident in the reliability of climate models and believe that human activities,
  notably the emission of carbon and other heat-trapping greenhouse gases, are the culprit behind the warming trend. They are aware of the potential consequences of climate change on water supplies and
  are committed to studying and addressing the issue.
