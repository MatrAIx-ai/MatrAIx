  hobbies: '[''Community barbecues and fundraisers'', ''Youth baseball coaching'', ''Woodworking'', ''Classic car restoration'', ''League bowling'', ''Golf outings'', ''Shooting sports'', ''Hiking'', ''Fishing'',
    ''Puzzle solving (Sudoku, crosswords)'', ''Model building'']'
  career_goals: Joseph aims to move from first‑line supervision to a plant‑manager position within the next five years, leveraging his practical knowledge and competitive drive to improve overall plant
    efficiency by at least 15%. He plans to complete a bachelor’s degree in industrial engineering or business administration through night courses, positioning himself for senior operations roles. Long‑term,
    he envisions either overseeing multiple facilities as a regional operations director or launching a consultancy that helps small manufacturers adopt lean and safety best practices. He also seeks industry
    certifications, such as Certified Production and Inventory Management (CPIM), to bolster his credibility.
