personas:
  professional: Evan Holloway, a retired handyman and community historian, leverages their practical DIY skills in carpentry, plumbing, and electrical troubleshooting while informally mentoring younger
    neighbors, balancing their curiosity about local history with a relaxed, flexible approach to projects.
  sports: Evan Holloway enjoys daily walks through Roxbury parks, participates in a senior walking club linked to the local community center, follows the Boston Red Sox and Boston Celtics, and occasionally
    joins a modest bocce league, preferring low‑impact activity that fits their flexible routine.
  arts: Evan Holloway spends evenings listening to Miles Davis and The Rolling Stones, watches classic films like Casablanca and modern streaming series, attends the annual Roxbury multicultural festival
    featuring folk musicians such as Pete Seeger tributes, and delights in local theater productions of historical dramas.
  travel: Evan Holloway favors short, self‑driven excursions to New England historic sites such as Lexington, Concord, Salem, and Plymouth, planning loosely around family visits, while dreaming of a future
    trip to the historic streets of Edinburgh, balancing curiosity with a need for comfortable, low‑stress travel.
  culinary: Evan Holloway often prepares hearty, garden‑fresh meals like herb‑infused chicken pot pie, slow‑cooked beef stew with carrots and potatoes, and jars homemade pickled cucumbers, experimenting
    with heirloom tomatoes, fresh basil, and thyme, while occasionally indulging in classic rock‑era comfort foods like meatloaf and mashed potatoes.
  core: Evan Holloway is a curious, hands‑on retiree who blends a love of local history with practical DIY, prefers flexible, unstructured routines, and cherishes community storytelling, even if they occasionally
    misplace their keys and forget a bill.
background:
  cultural: Evan is a White American of Irish‑Catholic heritage who grew up in a working‑class Boston neighborhood in the post‑World War II era. His upbringing emphasized hard work, self‑reliance, and community
    solidarity, while also exposing him to the evolving cultural landscape of the city. Over the decades he has become integrated into the diverse fabric of Roxbury, valuing multicultural interactions and
    participating in local traditions such as seasonal gardening, neighborhood parades, and regional cuisine. He retains many New England customs but embraces the broader cultural influences of his surrounding
    community.
attributes:
  skills: '[''DIY home repair (carpentry, plumbing, basic electrical)'', ''Vegetable and herb gardening with food preservation (canning)'', ''Local history knowledge and community resource navigation'',
