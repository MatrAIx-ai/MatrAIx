persona_description: A historian who is deeply interested in the history of Christmas and the origins of the poem 'A Visit From St. Nicholas'. They are knowledgeable about the anonymous authorship of the
  poem and the controversy surrounding its authorship. They have a keen interest in the Protestant-Catholic divide and how it was deftly swerved in the poem. They are also interested in the impact of the
  poem on our perception of Santa Claus and the role of the Troy Sentinel in spreading the poem.
