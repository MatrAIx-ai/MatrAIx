persona_description: A cardiologist who focuses on the effects of air pollution on cardiovascular health and the development of new treatments for heart disease. She is particularly interested in the negative
  impact of particulate matter on the lungs and the potential risks of exposure to air pollution for baby boomers, men working in industries that expose them to vapors and other types of combustion, and
  those with a history of heart attack, stent, cardiac arrhythmia, or bypass surgery. She is also interested in the impact of air pollution on blood clotting and inflammation and the need for stricter air
  pollution standards to protect public health.
