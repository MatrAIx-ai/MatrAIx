    Afro‑Caribbean jazz listening'', ''DIY IoT sensor projects'']'
  career_goals: Eusebio aims to become a senior transportation compliance officer within the Puerto Rico Department of Transportation, overseeing a regional team that ensures safe and efficient public transit
    operations. In the next five years, he plans to complete his college degree in civil engineering or transportation planning and to obtain certifications in safety management and smart‑city technologies.
    He aspires to contribute to the modernization of Gurabo’s and Bayamón’s transit infrastructure, advocating for the integration of eco‑friendly transport solutions and improving accessibility for underserved
    neighborhoods. Long‑term, he envisions a leadership role where he can influence policy, mentor new inspectors, and promote innovative, community‑focused transportation initiatives.
