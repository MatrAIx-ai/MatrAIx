  hobbies: '["Visiting Art Galleries", "Watercolor Painting", "Photography", "Reading Contemporary Fiction", "Exploring Business Innovation Books", "Hiking", "Yoga", "Farm‑to‑Table Cooking", "Volunteering
    for Community Arts Programs"]'
  career_goals: Constance aims to double her company's revenue within the next five years while expanding its product line to include sustainably sourced, art‑inspired goods. She plans to launch a mentorship
    program for young women entrepreneurs in Anderson, position her firm as a regional hub for creative entrepreneurship, and eventually pursue an MBA to deepen her strategic finance expertise. Throughout
    her growth trajectory, she seeks to maintain a balanced lifestyle that allows time for personal artistic pursuits and community involvement.
