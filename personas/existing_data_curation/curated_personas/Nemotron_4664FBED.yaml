personas:
  professional: Jacqueline Desousa, a diligent fifth‑grader who excels at organizing school projects and solving math puzzles, channels their love for routine and practicality into a budding passion for
    scientific inquiry, often taking the lead in their Girl Scouts badge presentations while maintaining a quiet, meticulous approach.
  sports: Jacqueline Desousa enjoys the structured rhythm of after‑school swim lessons in summer and a community youth soccer league (team ‘Eagles’) in fall, cheering quietly for the local baseball team
    the ‘City Cougars’ while preferring solo runs in the park to maintain their calm and routine‑driven fitness routine.
  arts: Jacqueline Desousa nurtures their artistic side through beginner piano lessons featuring pieces by Yiruma, daily sketching in their journal inspired by the whimsical style of Studio Ghibli films,
    and a growing bookshelf of fantasy novels by authors such as Rick Riordan, all reflecting their love for calm, detailed creativity.
  travel: Jacqueline Desousa favors well‑planned family road trips to familiar destinations like the nearby state park’s nature trails and occasional weekend getaways to the historic museum city of Washington,
    D.C., while dreaming of a future theme‑park adventure at Disneyland where they can experience structured tours and meet‑and‑greets in a predictable, family‑friendly environment.
  culinary: Jacqueline Desousa enjoys simple, home‑cooked meals such as spaghetti with homemade marinara sauce flavored with fresh basil from their garden, grilled cheese sandwiches with sharp cheddar,
    and carrot‑and‑potato soups that they help prepare by chopping the vegetables they harvested, reflecting their practical palate and budding kitchen confidence.
  core: Jacqueline Desousa, a routine‑loving ten‑year‑old who balances quiet curiosity with a hidden worry, meticulously arranges their books by color while secretly indulging in spontaneous board‑game
    marathons with their close‑knit scout friends.
background:
  cultural: Jacqueline grows up in Freedom, Pennsylvania, a small, close‑knit community in Beaver County with deep roots in working‑class and Appalachian traditions. Her family embodies typical middle‑class
    values, emphasizing practicality, self‑reliance, and community involvement. Local customs include celebrating holidays like Thanksgiving and Christmas with family gatherings, participating in community
    fairs, and supporting local school events and sports. While not necessarily religious, she is exposed to a mix of church and community activities that reinforce modesty, responsibility, and a respect
    for tradition.
