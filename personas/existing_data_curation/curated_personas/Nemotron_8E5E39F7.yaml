personas:
  professional: Donald Brown, a 63-year-old seasoned painter and paperhanger with 35 years of hands-on experience, leverages their associate degree in Construction Technology to excel at surface preparation,
    precise measurement, and flawless wallpaper installation while mentoring apprentices, and they pair their pragmatic yet occasionally disorganized mindset with a goal to transition into a supervisory
    role and launch an eco-friendly finishing-contracting venture for senior-living projects in Las Vegas.
  sports: Donald Brown competes in a Wednesday night bowling league at the Desert Lanes Club, follows the Vegas Golden Knights with avid devotion, enjoys occasional outings to watch the Las Vegas Raiders
    games, and they favor low-impact exercises like short hikes through Red Rock Canyon to manage knee discomfort.
  arts: Donald Brown spends evenings dusting and restoring vintage cork-backed vinyl from The Rolling Stones, Fleetwood Mac, and David Bowie, while listening to these classic rock legends as a backdrop
    for small carpentry projects, and they occasionally attend local community theater productions starring veteran actors such as John Smith, reflecting a modest but heartfelt appreciation for music and
    performing arts.
  travel: Donald Brown prefers spontaneous road trips in the restored 1965 Chevrolet Impala, taking weekend escapes to Red Rock Canyon or Lake Mead for bird-watching hikes, while dreaming of a leisurely
    drive through Italy’s Tuscany countryside, and they relish the freedom of flexible planning and low-key adventure.
  culinary: Donald Brown enjoys cooking grilled ribeye steak with a chipotle-lime rub, occasional shrimp tacos topped with fresh cilantro and jalapeño, and winding down with classic steak-frites, while
    their culinary skill is modest, they often rely on the desert garden’s cactus-infused salsa for a unique Southwest flavor.
  core: Donald Brown blends a meticulous, decades-long mastery of interior finishes with a laid-back love of vintage vinyl, desert gardening, and weekend bowling, all while juggling a cautious financial
    outlook and occasional stress-driven worries that keep them both grounded and ever-curious, and they constantly seek balance between structure and relaxation.
background:
  cultural: Donald grew up in a working‑class family that moved from the Midwest to Nevada when he was a teenager. The blend of Midwestern values—hard work, self‑reliance, and modesty—and the laid‑back,
    outdoors‑oriented lifestyle of North Las Vegas shaped his worldview. He identifies with mainstream American culture, celebrating holidays such as Independence Day with community barbecues, and he appreciates
    the desert’s unique natural beauty. His cultural identity is also tied to the trade community, where mentorship, craftsmanship, and a pragmatic approach to life are highly valued.
attributes:
  skills: '[''Surface preparation'', ''Wallpaper installation'', ''Interior painting'', ''Color matching'', ''Cost estimating'', ''Safety compliance'', ''Basic carpentry'', ''Customer communication'', ''Project
