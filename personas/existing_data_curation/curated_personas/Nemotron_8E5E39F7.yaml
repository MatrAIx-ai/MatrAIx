  hobbies: '[''Gardening (succulents and desert flora)'', ''Bowling (league play)'', ''Hiking and bird‑watching at Red Rock Canyon'', ''Restoring vintage vinyl records'', ''Carpentry and small‑scale woodworking'',
    ''Playing poker with friends'', ''Listening to classic rock'']'
  career_goals: Looking ahead, Donald hopes to transition from full‑time field work to a supervisory role, eventually establishing a small, reputable finishing‑contracting business that specializes in eco‑friendly
    paints and bespoke wallpaper designs for the growing senior‑living market in the Las Vegas area. He aims to secure a steady pipeline of projects that allow him to reduce his physical workload while
    leveraging his expertise to train apprentices. Additionally, he seeks financial stability for retirement and desires to leave a lasting professional legacy for his family.
