persona_description: A filmmaker who specializes in the use of camera movements, particularly dolly zooms, in their films. They are skilled in defining and executing the shot and are known for their ability
  to create a sense of unease and spatial distortion in their viewers. They have a deep understanding of the techniques and their impact on storytelling and have used the vertigo shot in their films to
  represent supernatural forces and to create dramatic moments. They are also skilled in using other types of camera movements and have contributed to some iconic moments in cinema history.
