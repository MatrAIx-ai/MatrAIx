  career_goals: At 71, Lee aims to transition from full-time maintenance work to a part-time mentorship and consultancy role, offering hands-on training to younger workers in his community. He plans to
    launch a series of weekend workshops at the local community center that blend practical repair techniques with creative arts like woodworking and painting. Lee also hopes to compile his decades of experience
    into a practical guidebook for DIY homeowners, and to curate a small exhibition of his watercolor and sketch work to celebrate local folk art. Finally, he is committed to preserving the self-reliance
    of his town by establishing a modest makerspace where seniors can share skills and support one another, while also prioritizing his own mental health by dedicating regular time to creative practice.
