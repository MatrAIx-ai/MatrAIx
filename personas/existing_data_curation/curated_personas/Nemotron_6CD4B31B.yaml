  hobbies: '[''make‑believe play with friends'', ''singing and dancing'', ''drawing and coloring'', ''exploring local parks and the St. Johns River'', ''reading picture books'', ''participating in school
    plays and talent shows'']'
  career_goals: Georgieanne dreams of becoming a teacher who can share stories and help children learn, because she loves the idea of guiding friends and being a supportive role model. She also imagines
    herself as a veterinarian one day, caring for pets and animals she sees around Lake City. Occasionally, she talks about being a star in school plays or community performances, reflecting her love for
    being the center of attention and connecting with others through music and drama.
