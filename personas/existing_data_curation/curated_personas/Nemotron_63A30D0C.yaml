personas:
  professional: Wayne Hunt, a retired production supervisor with three decades of manufacturing oversight, now mentors younger members of the Evansville Manufacturing Association, leveraging his disciplined,
    data‑driven process‑optimization expertise and hands‑on mechanical aptitude to promote safety, efficiency, and community knowledge sharing; they also continue to sketch new workshop layouts in their
    spare time.
  sports: Wayne Hunt stays active through early morning walks with the Evansville Seniors Walking Club, follows the St. Louis Cardinals in baseball and the Indianapolis Colts in football on game days, and
    treats his weekly Ohio River fishing trips as low‑impact sport, preferring steady, low‑intensity activity over gym workouts; they also keep a log of steps taken each day.
  arts: Wayne Hunt nurtures his love of American heritage by listening to Bob Dylan and Johnny Cash on his porch, attending occasional lectures at the Evansville Museum of Arts and History, and hand‑painting
    miniature figures for his model‑railroad scenes, while classic westerns starring John Wayne punctuate his quiet evenings; they often quote lines from these films during community talks.
  travel: Wayne Hunt plans meticulous road trips to historic sites—such as Gettysburg, Colonial Williamsburg, and the National Railway Museum in York—favoring week‑long itineraries that balance museum tours
    with low‑key evenings at local diners, while limited mileage allowance and a modest retirement budget keep his adventures grounded; they also maintain a detailed travel journal with hand‑drawn maps.
  culinary: Wayne Hunt, a competent home cook, favors farm‑to‑table meals like grilled catfish with lemon butter, fresh tomato basil soup using garden tomatoes, and homemade apple‑cinnamon pie, often spicing
    dishes with basil, thyme, and dill harvested from his backyard herb patch; they occasionally over‑salt the soup while lost in thought about a new woodworking project.
  core: Wayne Hunt, a 72‑year‑old retired supervisor, blends meticulous organization with quiet curiosity, filling their days with gardening, woodworking, and historical research, while occasionally hoarding
    railroad ephemera and forgetting to water indoor ferns; they enjoy the calm rhythm of routine but sometimes miss family birthday calls.
background:
  cultural: Wayne grew up in a working‑class, Midwestern family with German and Irish ancestry, a background that emphasizes self‑reliance, hard work, and community involvement. Raised in the Evansville
    region, he internalized the city’s industrial heritage, river‑town culture, and the modest, courteous demeanor typical of the Midwest. His upbringing included regular attendance at a Lutheran church,
    participation in local fairs, and a strong sense of civic duty, all of which shape his respectful, cooperative, and pragmatic outlook.
