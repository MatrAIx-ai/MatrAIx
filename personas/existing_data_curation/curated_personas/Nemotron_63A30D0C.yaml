  hobbies: '["Gardening", "Woodworking", "Model Railroading", "Genealogy Research", "Reading Historical Nonfiction", "Fishing", "Puzzle Solving", "Walking Trails", "Attending Local History Lectures"]'
  career_goals: Although retired, Wayne is intent on remaining professionally active by mentoring younger members of the local Manufacturing Association, guiding them through best practices in safety and
    efficiency. He aims to complete the remaining credits toward his associate degree in Business Administration, document the industrial history of Evansville in a self‑published book, and expand his role
    as a volunteer coordinator for the senior center. His long‑term ambition is to leave a lasting legacy of knowledge sharing and community service while maintaining financial stability.
