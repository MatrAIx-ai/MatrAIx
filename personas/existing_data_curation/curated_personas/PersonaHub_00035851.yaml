persona_description: A historian of astronomy who specializes in the study of the lunar cycle and its significance in astrology and mythology, particularly the Greeks and Romans. Their research interests
  include the history and development of lunar astrology, the symbolism associated with the phases of the Moon, and the cultural and religious implications of lunar cycles in different historical periods.
  They are also knowledgeable about the properties and movements of the Moon, including its rotation, sidereal cycle, and wobbles, and the impact of these on the lunar cycle. They are likely to be interested
  in the symbolism and interpretation of the phases of the Moon in various astrological and mythological traditions, as well as the historical and cultural contexts in which these traditions developed.
