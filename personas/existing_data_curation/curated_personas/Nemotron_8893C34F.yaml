personas:
  professional: Manuela Gil, a 20‑year‑old front‑line food service supervisor, combines bilingual communication, meticulous scheduling, and a passion for food safety, and they lead a small restaurant team,
    fostering a collaborative atmosphere while mentoring new staff.
  sports: Manuela Gil, an avid weekend hiker who climbs the Wasatch foothills with the Wasatch Hiking Club, also follows the Utah Jazz fervently, joins a local salsa dancing fitness class that doubles as
    cardio, supports Real Salt Lake during the MLS season, and they treat outdoor activity as their primary exercise outlet.
  arts: Manuela Gil, who spends afternoons wandering the Utah Museum of Fine Arts and the local gallery scene, draws inspiration from Frida Kahlo’s vivid self‑portraits, the rhythmic storytelling of Lin‑Manuel
    Miranda’s scores, and the contemporary beats of Bad Bunny, and they weave these influences into their artistic journal and occasional sketching sessions.
  travel: Manuela Gil, who plans trips with a bullet‑journal checklist and prefers culturally immersive, budget‑friendly adventures, has explored Santa Fe’s historic plaza and the bustling markets of Oaxaca,
    dreams of hiking the rainforest trails of Puerto Rico, and they balance these ambitions against school expenses.
  culinary: Manuela Gil, a confident home cook who experiments with mole poblano using dried chilies, chocolate, and spices, perfects arroz con gandules with sofrito and plantains, delights friends with
    inventive tacos al pastor featuring locally sourced lamb and pineapple, and they still rely on quick week‑night pasta when time runs short.
  core: Manuela Gil, a curious, organized, and sociable 20‑year‑old who juggles bullet‑journaling, salsa nights, and a relentless quest to fuse Utah produce with Latin flavors, often forgets to water their
    houseplants, and they perfect their next culinary masterpiece.
background:
  cultural: Manuela comes from a Hispanic/Latino family that blends Mexican and Puerto Rican traditions. Raised in a bilingual Spanish‑English household in Kaysville, Utah, she celebrates cultural holidays
    such as Día de los Muertos, Christmas with family gatherings, and local community festivals. Her upbringing emphasized the importance of family, community, and hospitality, which influences her warm,
    cooperative nature and her passion for sharing food and culture with others.
attributes:
  skills: '[''Food safety compliance (ServSafe)'', ''Team leadership and staff supervision'', ''Schedule and labor management'', ''POS and inventory software operation'', ''Bilingual communication (Spanish-English)'',
    ''Conflict resolution'', ''Menu planning and basic culinary techniques'', ''Customer service excellence'', ''Cost control and budgeting'', ''Training and mentorship'']'
  hobbies: '[''Visiting art galleries and museums'', ''Home cooking and recipe experimentation'', ''Salsa and bachata dancing'', ''Hiking in Utah’s mountains'', ''Bullet journaling and planning'', ''Volunteering
    at community food drives'', ''Watching cooking shows and culinary podcasts'']'
  career_goals: Manuela aims to become a certified food safety manager and pursue an associate’s degree in hospitality management, eventually advancing to a kitchen manager role. She aspires to lead a high‑performance
    culinary team, incorporate her Latin heritage into innovative menus, and one day open her own fusion restaurant that celebrates both Utah’s local produce and traditional Hispanic flavors. In the long
    term, she hopes to mentor other young employees, especially from under‑represented backgrounds, and possibly obtain a bachelor’s degree in business administration to broaden her managerial expertise.
