persona_description: A healthcare professional who specializes in the use of technology in healthcare, particularly in the field of telemedicine and robotic surgery. Dr. Vespa and his team at the Ronald
  Reagan UCLA Medical Center use advanced technology such as robotic "surrogates" and electronic noses to diagnose and treat patients remotely. They are interested in developing new technologies to improve
  patient care and reduce the need for in-person visits. Dr. Vespa is currently testing a portable breath analysis system that can detect a wide range of illnesses, including heart failure, liver and kidney
  disease, and asthma. He is also interested in developing new technologies to analyze the breath of patients remotely.
