  career_goals: Even at 90, Marcia is driven by a desire to leave a lasting legacy for her family and community. She aims to complete a memoir that weaves together her personal experiences of the Great
    Migration, the civil‑rights era, and the evolution of Black cultural life in the Midwest. She plans to curate a small traveling exhibition of works by local Black artists, displayed at the Lake In The
    Hills community center and nearby churches. Marcia also hopes to mentor her grandchildren and local youth through storytelling circles, teaching them how to capture oral histories. Additionally, she
    wishes to launch a senior reading club that encourages intergenerational dialogue, and she aspires to learn basic digital photography to document family gatherings and community events.
