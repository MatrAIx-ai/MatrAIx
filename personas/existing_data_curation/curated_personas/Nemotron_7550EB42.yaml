personas:
  professional: Edmond Crawford is a seasoned construction specialist with over two decades of residential and light‑commercial experience, skilled in concrete finishing, framing, heavy‑equipment operation,
    and OSHA safety compliance, and they leverage a compassionate, structured approach to crew coordination and mentorship while pursuing a foreman role and planning a future affordable‑housing remodeling
    business.
  sports: Edmond Crawford plays in the Twin Falls Community Softball League, avidly follows the Boise State Broncos football team and the Idaho Falls Chukars minor‑league baseball squad, and they treat
    hunting trips and weekend fishing on the Snake River as personal sports.
  arts: Edmond Crawford channels their creative side through custom woodworking projects and weekend barbecues while regularly enjoying country‑music concerts featuring Garth Brooks and Miranda Lambert
    at the Twin Falls fairgrounds, and they admire the folk craftsmanship of local artist Jimmy Kline.
  travel: Edmond Crawford prefers road‑trip adventures that blend outdoor activity with modest luxury, having camped in Owyhee Canyon, fished the Snake River, visited Yellowstone and Jackson Hole, and they
    now dream of a guided Alaskan salmon‑fishing expedition.
  culinary: Edmond Crawford boasts an intermediate‑level grill mastery, frequently smoking brisket and cedar‑plank salmon with mesquite wood, seasoning dishes with a signature hickory‑pepper rub, and they
    often pair their meals with Idaho potatoes and huckleberry pie for neighborhood gatherings.
  core: Edmond Crawford fuses a meticulously structured construction career with a community‑first spirit, balancing safety checklists, backyard barbecues, and weekend wilderness pursuits, and they have
    a habit of double‑checking every detail that sometimes slows projects but endears them to teammates.
background:
  cultural: Edmond’s cultural background is rooted in the rural western lifestyle of southern Idaho. His family traces its ancestry to German and Scandinavian immigrants who settled the region in the early
    20th century. Growing up near Filer, he was immersed in a close‑knit community that values self‑reliance, hard work, and neighborly cooperation. Local traditions such as seasonal agricultural festivals,
    hunting seasons, and town gatherings have shaped his sense of identity. He embraces the broader American West ethos of modesty, practicality, and a deep connection to the land, while also valuing the
    collaborative spirit that comes from years of community involvement.
attributes:
  skills: '[''Concrete pouring and finishing'', ''Framing and carpentry'', ''Heavy equipment operation (excavator, backhoe)'', ''Blueprint reading and plan interpretation'', ''Construction safety and OSHA
