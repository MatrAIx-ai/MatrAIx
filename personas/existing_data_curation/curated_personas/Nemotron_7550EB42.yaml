    and training new laborers'']'
  hobbies: '[''Community softball league'', ''Habitat for Humanity volunteering'', ''Fishing trips on Snake River'', ''Hunting with friends'', ''Camping in Owyhee Canyon'', ''Woodworking projects'', ''Barbecue
    cooking for gatherings'', ''Attending local country music concerts'']'
  career_goals: Edmond aims to advance to a foreman or site supervisor role within the next three to five years, leveraging his experience and pursuing further certifications such as an OSHA 30‑hour course
    and a construction‑management credential from a community college. He aspires to lead larger teams, improve site safety protocols, and eventually launch his own small residential‑remodeling business
    focused on affordable, energy‑efficient homes for low‑income families in his region. He also hopes to continue mentoring younger workers and contributing to community‑focused construction projects like
    Habitat for Humanity builds.
