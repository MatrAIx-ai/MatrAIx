  career_goals: Looking ahead, Lizveth aims to transition into a senior advisory role where she can guide mid-size firms in adopting data-driven, sustainable reporting practices. She plans to solidify her
    professional credentials by obtaining a CPA license if not already held and pursuing a Certified Internal Auditor designation. Over the next five years she hopes to serve on the board of a local nonprofit,
    mentor emerging accountants, and shape firm-wide process-improvement initiatives, all while maintaining a flexible schedule that supports her family and personal interests.
