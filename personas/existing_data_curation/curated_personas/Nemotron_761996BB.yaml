personas:
  professional: Lizveth Herrera, a seasoned accountant with over three decades of public and corporate experience, blends a curious appetite for data‑analytics tools with a practical focus on internal controls,
    mentors junior staff with cooperative yet assertive guidance, and embraces a flexible, occasionally disorganized schedule to implement efficient audit solutions.
  sports: Lizveth Herrera enjoys hiking the ridge trails of Connecticut’s state parks on weekends, follows the New England Revolution soccer team, and participates in community salsa dance classes that
    double as cardio workouts, preferring low‑impact activities that combine social interaction with personal endurance.
  arts: Lizveth Herrera immerses themselves in the rhythms of salsa legends like Celia Cruz and Eddie Palmieri during weekly dance sessions, spends evenings re‑reading historical fiction by Hilary Mantel
    and Ken Follett, and occasionally streams Broadway productions featuring Meryl Streep, forging an artistic identity that blends lively music with narrative depth.
  travel: Lizveth Herrera favors relaxed, culturally immersive trips, often planning extended stays with family in a vibrant Andean nation where they reconnect with heritage, while also exploring historic
    towns in Spain and taking scenic coastal drives along the New England shoreline, balancing limited vacation days with a flexible itinerary that blends adventure and family time.
  culinary: Lizveth Herrera, an avid home chef, delights in crafting fluffy arepas, hearty sancocho brimming with plantains and yucca, and golden empanadas stuffed with seasoned beef and cheese, often seasoning
    with cumin, cilantro, and a splash of achiote, while experimenting with seasonal vegetables from their garden to add fresh twists to traditional recipes.
  core: Lizveth Herrera blends a lifelong accountant's precision with a salsa dancer’s spontaneity, juggling meticulous financial spreadsheets by day and spontaneous kitchen experiments by night, all while
    occasionally misplacing their keys due to a relaxed, disorganized schedule.
background:
  cultural: Born and raised in Medellín, Colombia, Lizveth moved to the United States in her early thirties and now resides in Stamford, Connecticut. She remains fluent in both Spanish and English, preserving
    Colombian customs such as celebrating Independence Day, Carnaval de Barranquilla, and family gatherings centered around music and food. Her Colombian heritage informs her values of community, resilience,
    and hospitality, which she brings to her professional interactions and volunteer work. Within Fairfield County she participates in local Latin-American cultural festivals, mentors other Latino professionals,
    and serves as a bridge between her cultural roots and her American corporate environment.
