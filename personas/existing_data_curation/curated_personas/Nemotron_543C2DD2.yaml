  career_goals: Although retired from formal employment, Nadia aims to deepen her impact within the Miami Nicaraguan community. She aspires to become a regular cultural docent at the Pérez Art Museum Miami,
    guiding small groups through exhibitions that highlight Latin American and Afro‑Caribbean artists. She also wishes to launch a low-key intergenerational art workshop series at a local senior center,
    where she can mentor older adults in watercolor painting while preserving oral histories of Nicaraguan migration. Complementing these, Nadia hopes to collaborate with a community garden program to integrate
    traditional planting techniques and seasonal dishes, fostering cultural exchange. Ultimately, her ambition is to weave her love for art, heritage, and learning into sustainable volunteer leadership
    roles that honor both personal growth and collective well‑being.
