persona_description: A healthcare professional who works in a hospital or clinic and specializes in diagnosing and treating patients with dengue fever. They are experienced in using various diagnostic tests
  to confirm the presence of dengue virus or antibodies to dengue virus and are familiar with the signs and symptoms of dengue fever. They may also be knowledgeable about the potential complications of
  dengue fever and the treatment options available. They are likely to be interested in reading articles on dengue diagnosis and prognosis and may consult with other healthcare professionals or experts
  in the field.
