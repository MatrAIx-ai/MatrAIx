  hobbies: '[''Fishing (bayou catfish & bream)'', ''Gardening (vegetable garden)'', ''Cooking Creole and Southern dishes'', ''Listening to blues, gospel, and zydeco music'', ''Woodworking (simple furniture)'',
    ''Playing poker at the community center'', ''Attending St. Martinville Mardi Gras festivals'', ''Church choir participation'']'
  career_goals: Cornelius aims to transition from full‑time long‑haul trucking to an owner‑operator model that gives him greater control over his schedule and earnings. He plans to lease or purchase a medium‑sized
    truck within the next two years, allowing him to serve local agricultural and manufacturing clients in southern Louisiana while reducing the time spent away from home. By building a small fleet of reliable
    drivers, he hopes to create a modest logistics business that can provide stable employment for younger men in his community. Additionally, he wants to mentor new drivers through a formal apprenticeship
    program, sharing his safety‑first mindset and sales techniques. Ultimately, his ambition is to secure a comfortable retirement fund for his family while remaining engaged in the industry he knows best.
