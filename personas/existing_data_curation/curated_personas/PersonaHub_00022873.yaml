persona_description: A Binghamton University engineering professor who specializes in the study of sound localization and has developed a new type of microphone that can locate the source of sound with
  high accuracy. His invention is based on the unique ear structure of the female fly called the ormia ochracea, which uses a mechanism to determine the direction of sound. Miles is currently seeking funding
  to commercialize his invention and is hopeful that SUNY's Technology Accelerator Fund will help him overcome the obstacles to manufacturing and licensing his technology.
