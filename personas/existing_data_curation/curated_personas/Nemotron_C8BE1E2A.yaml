personas:
  professional: Flutura Boone is a retired community volunteer coordinator, and they now channel their event‑planning expertise and botanical know‑how into managing the local senior center garden, mentor
    younger volunteers, and use a tablet to livestream gardening workshops, blending practical organization with a curious willingness to adopt new digital tools.
  sports: Flutura Boone enjoys leisurely morning walks along the Gulf Coast, and they follow the Miami Dolphins and Tampa Bay Rays with modest enthusiasm, participate in senior center bridge tournaments
    (considered a mental sport), and attend weekly yoga for seniors at a local community center, balancing gentle fitness with a social competitive spirit.
  arts: Flutura Boone finds joy in classic country legends like Johnny Cash and jazz greats such as Ella Fitzgerald, devours Agatha Christie mystery novels, knits while listening to old folk songs, and
    volunteers at the local historical society's heritage theater, where they admire performances by the Sarasota Ballet, reflecting a blend of auditory, literary, and visual arts appreciation.
  travel: Flutura Boone prefers road trips to historic Southern gems like St. Augustine, Savannah, and New Orleans, and they often plan week‑long stays with detailed itineraries that include visits to botanical
    gardens and local oyster shacks, but balance this wanderlust with a fixed income that limits overseas travel, favoring domestic cultural immersion.
  culinary: Flutura Boone excels at Southern cuisine, and they regularly bake peach cobbler, cook key‑lime pie, preserve orange marmalade, and canning pickles with dill and garlic, while also experimenting
    with fresh citrus glazes for grilled fish, and they boast a pantry stocked with heirloom flour, honey, and a well‑worn copy of 'Joy of Cooking'.
  core: Flutura Boone, a spry octogenarian gardener‑chef and digital‑learning enthusiast, and they balance practical thrift with occasional impulsive seed sprees, mingle community leadership with gentle
    forgetfulness, and preserve family stories through recipes and garden lore.
background:
  cultural: Flutura is a White American who grew up in mid‑20th‑century Florida, absorbing Southern hospitality, community‑centered values, and a strong work ethic. Her upbringing emphasized respect for
    tradition, self‑reliance, and the importance of family and church. Over the decades, she has embraced the diverse retiree culture of Manatee County, blending classic Florida customs—such as garden gatherings
    and church socials—with a curiosity for new ideas, like digital communication and sustainable gardening practices. This cultural mix informs her balanced approach to life, honoring the past while staying
    open to innovation.
attributes:
  skills: '["Culinary arts (Southern cooking, canning)", "Gardening (Florida native plants, citrus)", "Sewing and quilting", "Basic digital literacy (email, video calls)", "Volunteer event coordination",
    "Caregiving", "Household budgeting"]'
  hobbies: '["Gardening (roses, citrus, native plants)", "Baking and food preservation", "Knitting/Crocheting", "Birdwatching", "Bridge", "Reading mystery novels", "Walking on local beaches", "Local history
    research", "Attending church and community events"]'
  career_goals: At 78, Flutura’s primary ambitions focus on staying active, healthy, and socially engaged. She aims to deepen her digital fluency by mastering a tablet for video calls and photo sharing,
    ensuring she remains connected with family and friends. Flutura plans to mentor younger volunteers at the local senior center, passing on her event‑planning and gardening knowledge. She hopes to compile
    a memoir of family recipes and stories, preserving oral history for future generations. Maintaining independence through regular health check‑ups, gentle exercise, and a balanced diet is also a key
    goal, as is contributing to the growth of the community garden she loves.
