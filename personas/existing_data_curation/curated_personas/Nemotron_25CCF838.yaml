  career_goals: Brittney dreams of becoming a visual storyteller—perhaps a graphic designer, multimedia artist, or illustrator—who can use her art to amplify diverse voices and celebrate cultural heritage.
    She also envisions leading youth empowerment initiatives, combining her love for creativity with community activism. In the long term, she hopes to teach art and mentorship programs, fostering curiosity
    and confidence in the next generation of students.
