personas:
  professional: Brittney Cheeseboro, a budding digital illustrator and content creator, leverages her knack for sketching, tablet artistry, and TikTok choreography to produce engaging art‑process videos,
    while her sociable, organized yet flexible nature makes her a natural collaborator in school art projects.
  sports: Brittney Cheeseboro, a fan of the Dallas Cowboys and Dallas Mavericks, channels her athletic energy into weekly hip‑hop dance classes at a local studio, occasional school soccer matches in the
    fall, and weekend jogs around the Dallas Arboretum, balancing competitive spirit with a love for rhythmic movement.
  arts: Brittney Cheeseboro immerses herself in graphic novels like "Saga" and "Watchmen," draws inspiration from artists such as Hayao Miyazaki and Banksy, and syncs her dance routines to R&B stars like
    H.E.R. and BTS, letting these influences shape both her visual storytelling and performance style.
  travel: Brittney Cheeseboro's travel style mixes spontaneous weekend trips to Austin's music festivals and planned family vacations to New York City museums, while she dreams of a future pilgrimage to
    Tokyo's Akihabara district to soak up anime culture, balancing budget constraints with a craving for vibrant cultural experiences.
  culinary: Brittney Cheeseboro enjoys crafting avocado toast topped with chili flakes, devouring spicy chicken tacos with fresh cilantro, and sipping matcha lattes while experimenting with homemade ramen
    broth, yet she often neglects to finish her meals when a new art project demands attention.
  core: Brittney Cheeseboro, a 13‑year‑old art‑obsessed social butterfly, constantly sketches, dances, and films TikTok clips, juggling a love for spontaneous creativity with a habit of leaving unfinished
    art projects when the next trend hits.
background:
  cultural: Brittney is an African American teenager raised in Mesquite, Texas, a suburb of Dallas. Her family blends Southern hospitality with Black cultural traditions, celebrating gatherings with soul
    food, listening to a mix of gospel, R&B, and hip‑hop, and participating in community events like Juneteenth commemorations and church outreach programs. Growing up in a diverse Dallas‑County environment
    has exposed her to a mosaic of cultural influences, fostering a strong sense of community, pride in her heritage, and an appreciation for artistic expression that reflects both her personal identity
    and the broader cultural landscape.
