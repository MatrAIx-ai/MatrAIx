  career_goals: Approaching retirement, Crystal aims to transition into a supervisory or training role within the Alachua County Sheriff's Office. She hopes to become a sergeant or lieutenant, leading a
    community-policing unit that emphasizes practical safety education for schools and neighborhoods. Ultimately, she envisions serving as a police academy instructor, using her education degree to shape
    the next generation of officers and to leave a legacy of reliable, community-oriented policing.
