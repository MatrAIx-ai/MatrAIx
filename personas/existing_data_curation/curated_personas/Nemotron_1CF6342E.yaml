personas:
  professional: Crystal Ryberg, a seasoned police officer with three decades of experience and a bachelor's in education, leverages their routine‑driven mindset and de‑escalation expertise to design clear
    training modules and mentor junior officers, while pursuing a supervisory role that emphasizes practical safety education for schools and neighborhoods.
  sports: Crystal Ryberg enjoys a low‑key fitness routine that includes walking the Paynes Prairie trails and occasional rounds of golf at the University of Florida Golf Course, they cheerfully support
    the Florida Gators football and basketball teams, and they participate in the local senior bowling league during winter months.
  arts: Crystal Ryberg finds artistic solace in stitching intricate quilts that they gift to fellow officers, devouring Agatha Christie mysteries while listening to the folk sounds of John Denver and the
    soulful blues of B.B. King, and attending occasional community theater performances of classic plays.
  travel: Crystal Ryberg prefers a relaxed, family‑oriented travel style, often planning weekend road trips to historic Savannah or the Florida Keys and dreaming of a longer cruise to the Bahamas, yet they
    keep their itinerary modest to align with their retirement budget and caregiving responsibilities for their husband.
  culinary: Crystal Ryberg, an adept home cook, frequently prepares shrimp and grits with locally sourced catfish, seasons dishes with garden‑grown basil and citrus from their native plant garden, enjoys
    a slice of key lime pie for dessert, and occasionally experiments with Cajun jambalaya, though they tend to rely on their trusty cast‑iron skillet more than fancy gadgets.
  core: Crystal Ryberg is a routine‑loving, community‑driven law‑enforcer whose love for quilting, garden gossip, and occasional impulse buys of garden décor contrast with their surprisingly relaxed approach
    to paperwork and dental appointments.
background:
  cultural: Crystal comes from a traditional, middle-class white American background, having grown up in the Midwest before moving to Gainesville for her law-enforcement career. She values family, marriage,
    and community service, and she participates regularly in her local Methodist church. Her worldview reflects Southern hospitality and a respect for institutional authority, aligning with the predominantly
    white, suburban culture of Alachua County. She embraces local customs such as attending Gators football games, enjoying outdoor activities, and supporting neighborhood events.
