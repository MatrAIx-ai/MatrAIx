personas:
  professional: Kevin Santos, a 27‑year‑old bilingual tour guide in Florida, blends his thorough knowledge of local history, wildlife, and Caribbean cultural narratives with an artistic eye, using photography
    and sketching to enrich his interpretive tours while managing safety and guest needs with calm empathy.
  sports: Kevin Santos, a solitary fitness enthusiast, favors early‑morning hikes along the Everglades trails and bird‑watching walks over team sports, but they proudly root for the Miami Heat, attend occasional
    Orlando Magic games when they need a social break, and belong to a local nature‑run club that meets monthly for 5K trail runs.
  arts: Kevin Santos, whose free afternoons are spent leafing through monographs on Monet, attending quiet gallery openings to admire works by contemporary Latin American artists like Tania Bruguera, and
    listening to the intricate rhythms of Tito Puente and Miles Davis on Latin jazz vinyl, finds inspiration for their own sketchbook and believes that art is the bridge between their cultural roots and
    the natural world.
  travel: Kevin Santos, a meticulous planner, prefers solo or small‑group trips that combine photography expeditions in the Florida Keys with cultural immersion in Caribbean islands such as St. Thomas,
    using detailed itineraries drafted in Excel and budgeting apps to balance his love of adventure with limited savings, while occasionally day‑dreaming about a future eco‑tour company that could take
    clients to hidden mangrove sanctuaries.
  culinary: Kevin Santos, whose kitchen is a laboratory for island flavors, regularly prepares arroz con gandules, alcapurrias, and sweet plantain mofongo, experimenting with spice blends like adobo and
    sofrito while also mastering fresh seafood ceviche, and they enjoy pairing their dishes with a chilled glass of local tropical fruit juice rather than wine.
  core: Kevin Santos, a 27‑year‑old nature‑loving tour guide, channels relentless curiosity and artistic solitude into immersive, eco‑centric experiences while battling high anxiety and a habit of over‑investing
    in camera gear.
background:
  cultural: Kevin was raised in a Puerto Rican family that maintained strong ties to island traditions while living in Florida. Bilingual Spanish‑English communication is a core part of his daily life,
    as are celebrations of Puerto Rican holidays, music, and cuisine. His cultural identity blends Caribbean warmth with the laid‑back Southern Florida lifestyle, fostering a deep appreciation for storytelling,
    community harmony, and artistic expression. This heritage informs his guiding style, as he often weaves Puerto Rican folklore and diaspora perspectives into tours, offering visitors a nuanced view of
    cultural continuity across the Caribbean and the Gulf Coast.
attributes:
  skills: '["Bilingual storytelling (English/Spanish)", "Local history narration", "Ecotourism guiding", "Wildlife identification", "First aid & CPR certification", "Route planning", "Guest safety management",
    "Cultural interpretation", "Small‑group facilitation", "Conflict de‑escalation", "Empathetic listening", "Time management", "Basic photography", "Sketching"]'
  hobbies: '["Nature photography", "Birdwatching", "Sketching landscapes", "Reading art history", "Visiting local galleries", "Cooking Puerto Rican cuisine", "Listening to Latin jazz", "Reading poetry",
    "Solo hiking", "Journaling"]'
  career_goals: Kevin aspires to become a certified naturalist guide and eventually launch his own boutique tour company that offers intimate, art‑focused and culturally rich experiences for solo travelers
    and small groups. He aims to obtain formal training in hospitality management and expand his expertise in sustainable tourism practices. Over the next five years, he hopes to curate specialized itineraries
    that highlight the intersection of Florida's natural ecosystems with Caribbean cultural narratives, positioning himself as a bridge between his Puerto Rican roots and the local community.
