persona_description: A veterinarian who specializes in the treatment of dogs with nasal cancer, particularly those of the Collie breed. This veterinarian has extensive experience in conducting blood tests
  and physical examinations, as well as performing tissue biopsies and CT scans to diagnose nasal cancer in dogs. They are skilled in recommending various treatment options for the dogs, including radiation
  therapy, chemotherapy, surgery, and radiation therapy combined with chemotherapy. They are passionate about improving the quality of life for dogs with nasal cancer and are dedicated to finding effective
  treatments for this canine cancer.
