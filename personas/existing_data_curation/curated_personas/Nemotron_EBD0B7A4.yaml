  career_goals: Tony aims to earn his GED within the next year and then pursue a certification in automotive technology with a focus on electric‑vehicle systems. He hopes to combine his love of electronics
    and cars by becoming an EV service technician. In the longer term, he aspires to open a small independent repair shop that offers both mechanical and electronic diagnostics, allowing him to work independently
    while applying his methodical problem‑solving skills. He also considers obtaining entry‑level IT support certifications (CompTIA A+) as a backup path, giving him flexibility to work remotely if desired.
