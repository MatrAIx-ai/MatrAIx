personas:
  professional: Tony Mccain, a 16‑year‑old self‑taught tech enthusiast, combines their knack for troubleshooting electronics and cars with methodical documentation to prototype Arduino‑controlled automotive
    diagnostics, positioning themselves as a budding EV service technician in the making.
  sports: Tony Mccain, a quiet runner along Detroit’s Riverfront, participates in community 5K races each spring, follows the Detroit Tigers (MLB) and Detroit Red Wings (NHL) for stats‑driven enjoyment,
    and maintains a solo home workout routine with a set of adjustable dumbbells, preferring solitary physical activity over team sports as they find group drills draining.
  arts: Tony Mccain immerses themselves in the worlds of Isaac Asimov and Arthur C. Clarke, curates a personal playlist featuring Daft Punk and Hans Zimmer, decorates their bedroom walls with prints of
    Syd Mead’s futuristic concept art, and when inspiration strikes they sketch cyber‑punk cityscapes, nurturing a quiet yet vibrant artistic identity.
  travel: Tony Mccain prefers meticulously planned trips, having explored Detroit’s Henry Ford Museum, taken a weekend road‑trip to Toronto’s automotive exhibits, and dreaming of a future visit to Stuttgart’s
    Mercedes‑Benz plant and Tokyo’s Akihabara district, balancing budget constraints with a love for tech‑centric destinations as they map each itinerary in a spreadsheet before departure.
  culinary: Tony Mccain, an earnest home‑cook, often whips up spicy ramen with miso paste, sriracha, and soft‑boiled eggs, perfects classic cheeseburger sliders seasoned with smoked paprika, experiments
    with avocado toast topped with poached eggs, and logs each recipe in a well‑organized digital notebook, allowing them to refine flavors with the same precision they apply to budgeting.
  core: Tony Mccain, the quiet, methodical teen who turns solitary curiosity into disciplined projects, merges a love for electronics, budgeting, and order while they rarely let anxiety or social pressure
    interfere.
background:
  cultural: Tony grew up in Detroit’s historically Black neighborhoods, where the legacy of the Great Migration and the city’s auto‑industry heritage shaped his worldview. Family gatherings often featured
    soulful Motown classics and stories of resilience from older relatives, reinforcing a strong sense of community and perseverance. Though he prefers solitude, he respects the cultural emphasis on mutual
    support, which inspires his ambition to eventually give back by providing reliable automotive and tech services to his neighbors. He is also connected to the city’s vibrant street art scene, which influences
    his aesthetic sense, especially in his web design projects.
