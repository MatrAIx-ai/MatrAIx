personas:
  professional: Jarrett Whitfield leads a construction crew as a first‑line supervisor, blending hands‑on craftsmanship with a curiosity for emerging tools like BIM, while their relaxed approach to scheduling
    and preference for solitary problem‑solving shape their transition toward project management and sustainable building practices, and they still enjoy the tactile satisfaction of operating an excavator.
  sports: Jarrett Whitfield frequents the Midlothian Shooting Club for target practice, tackles the trails of Pocahontas State Park each spring, and cheers on the Washington Nationals and Washington Capitals
    while they also join pickup basketball games at the community center on weekends.
  arts: Jarrett Whitfield spends evenings strumming acoustic guitar to classic country songs by John Prine and modern folk by Chris Stapleton, devours science‑fiction novels by Isaac Asimov, and attends
    the Virginia Folk Festival to soak in live bluegrass performances and storytelling by Tim O'Brien, and they find inspiration in the quiet intimacy of these artistic pursuits.
  travel: Jarrett Whitfield enjoys weekend drives along the Blue Ridge Parkway, has hiked sections of the Appalachian Trail near Roanoke, dreams of backpacking through Finnish Lapland’s midnight sun, and
    plans a future trek to the ancient ruins of Machu Picchu, and they balance a love of nature with budget‑friendly planning.
  culinary: Jarrett Whitfield favors Southern‑style barbecue, perfecting a smoky pork shoulder with hickory chips, whips up shrimp and grits seasoned with fresh garlic and cayenne, and relishes cooking
    herb‑roasted chicken with rosemary and thyme, and they occasionally treat themselves to a craft IPA at a local brewpub.
  core: Jarrett Whitfield is a solitary, pragmatic builder with a competitive edge, a love for quiet crafts, and a habit of juggling occasional disorganization with a calm, resilient demeanor, and they
    find solace in the steady rhythm of a hammer.
background:
  cultural: Jarrett grew up in Midlothian, a suburban community in Chesterfield County, Virginia. His upbringing reflects a Southern‑Atlantic working‑class culture that values self‑reliance, hands‑on craftsmanship,
    and modesty. Family gatherings often centered around backyard barbecues, country music, and community events such as county fairs. The region’s strong tradition of trade apprenticeship influenced his
    early interest in construction, while the quiet, wooded surroundings nurtured his preference for solitude and appreciation of nature.
