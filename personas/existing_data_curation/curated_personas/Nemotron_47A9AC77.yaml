  career_goals: Jarrett aims to transform his supervisory experience into broader project leadership. Over the next three to five years he plans to obtain a Project Management Professional (PMP) certification
    and take on the role of project manager for mid‑size commercial renovations. He is also interested in specializing in sustainable building practices and low‑impact construction methods. Ultimately,
    he envisions launching his own small contracting firm focused on residential remodels that allow him to work independently, maintain a flexible schedule, and apply the latest construction technologies
    he enjoys exploring.
