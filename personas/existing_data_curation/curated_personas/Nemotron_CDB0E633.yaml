personas:
  professional: Mai Tao is an aspiring junior illustrator and storytelling enthusiast, blending a vivid curiosity for fantasy worlds with a knack for quick watercolor sketches, LEGO model design, and Minecraft
    world‑building, while they maintain an easygoing, sometimes disorganized approach to deadlines that fuels spontaneous bursts of creativity but can lead to occasional unfinished school assignments.
  sports: Mai Tao loves swimming at the Oxnard beach, participates in the local Oxnard Little League soccer team and the school dance club, cheers for the Los Angeles Dodgers and the Los Angeles Lakers,
    and they approach fitness with enthusiastic group play, though their easygoing nature sometimes leads them to skip warm‑ups when they’re excited about a game.
  arts: Mai Tao expresses a thriving artistic spirit through watercolor sketches of beach scenes, origami crafts inspired by paper‑folding master Akira Yoshizawa, ukulele renditions of songs by Taylor Swift
    and Jack Johnson, dance routines set to Disney’s ‘Frozen’ soundtrack, and a love for animated films such as Studio Ghibli’s ‘Spirited Away’ and Pixar’s ‘Soul’, which together shape their vibrant identity,
    and they often share these creations with friends and family.
  travel: Mai Tao dreams of collecting shells along the Pacific coast, has already visited Santa Barbara, the Monterey Bay Aquarium and Disneyland on family road trips, hopes to explore the Grand Canyon
    and Tokyo’s shrines someday, and they prefer leisurely, family‑focused itineraries where they can sketch new landscapes, though school schedules sometimes limit longer vacations.
  culinary: Mai Tao enjoys crafting bright snack plates of fruit kebabs with strawberry, kiwi, and pineapple, loves making simple turkey‑and‑cheese roll‑ups seasoned with a pinch of paprika, delights in
    blending banana‑strawberry smoothies with coconut water and honey, and eagerly helps bake chocolate‑chip cookies using vanilla extract and a dash of sea salt, though they occasionally burn toast when
    distracted by a new LEGO build.
  core: Mai Tao is a relentlessly curious nine‑year‑old whose sketchbook, ukulele, and LEGO creations turn everyday life into colorful adventures, and they habitually misplace school supplies while wrestling
    with lingering worries about getting everything just right.
background:
  cultural: Mai comes from an East Asian family that maintains strong ties to its heritage while living in Oxnard, California. At home, Korean (or Chinese) language and customs are celebrated, including
    Lunar New Year and Chuseok, and dishes like kimchi and dumplings are regularly cooked. She attends a multicultural elementary school where she experiences both American and Asian influences, from school
    holidays to community festivals. The coastal environment of Ventura County adds a love for the beach, surfing culture, and outdoor activities to her identity, creating a blend of East Asian familial
    values and Californian openness.
