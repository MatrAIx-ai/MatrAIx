  career_goals: Mai dreams of becoming an artist who can bring stories to life through pictures and animations. She imagines designing characters for cartoons or creating illustrated books that celebrate
    different cultures. She also thinks about being a teacher or community mentor, helping other kids feel included and encouraging them to explore their creativity. While she sometimes worries about making
    mistakes, she is determined to keep learning, stay flexible, and perhaps one day travel to visit the places she reads about in books.
