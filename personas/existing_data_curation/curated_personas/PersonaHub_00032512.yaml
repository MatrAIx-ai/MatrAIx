persona_description: A historian interested in the experiences of women during the post-war period, particularly in terms of their everyday health experiences. She is interested in the intersection of sexuality,
  ethnicity, class, and age, and is motivated by the desire to write the history of women who have been overlooked by historians. She is passionate about helping young girls like her nieces realize the
  power they have to resist rigid ideas about gender and is inspired by her own family experiences.
