personas:
  professional: Teresa Sanders is a neighborhood‑level organizer who channels her razor‑sharp budgeting, schedule‑keeping, and public‑speaking abilities into coordinating potlucks, trivia nights, and church
    youth programs, while preparing to re‑enter the workforce as an administrative assistant or program coordinator where their structured, pragmatic mindset and competitive edge ensure projects run on
    time and resources are maximized.
  sports: Teresa Sanders channels competitive energy into weekly Zumba sessions at the community center, cheers on the Washington Capitals and Washington Wizards during the season, and participates in a
    local adult soccer league that meets at the Silver Spring recreation field, balancing a love for team spirit with a pragmatic approach to personal fitness.
  arts: Teresa Sanders fuels her creative side by devouring contemporary urban fiction from authors like Angie Thomas and listening to the soulful performances of Beyoncé, the lyrical storytelling of Lin‑Manuel
    Miranda, and the sharp humor of Trevor Noah, often referencing these influences when organizing community talent nights.
  travel: Teresa Sanders prefers meticulously planned weekend getaways that blend cultural exposure with comfort, such as a historic tour of Savannah, a culinary weekend in New Orleans, and a nature retreat
    at Shenandoah National Park, always budgeting the trip within a $500 limit and using Airbnb for stays that allow easy access to local community events.
  culinary: Teresa Sanders showcases culinary expertise by perfecting traditional Southern comfort dishes like collard greens simmered with smoked turkey, sweet potato pie spiced with cinnamon and nutmeg,
    and a rich gumbo featuring okra and Cajun seasoning, often swapping recipes on the community garden’s shared bulletin board while experimenting with fresh herbs like thyme and parsley.
  core: Teresa Sanders is a talkative, detail‑driven community catalyst whose love for organized events is tempered by a skeptical eye and a habit of overcommitting to every social invitation.
background:
  cultural: Teresa’s cultural identity is grounded in African-American traditions of family cohesion, church involvement, and community activism. Growing up in the Washington, D.C. metropolitan area, she
    celebrates milestones such as Juneteenth and Kwanzaa while maintaining soul-food culinary practices passed down through generations. As a member of a historically Black Baptist congregation in Silver
    Spring, she engages in choir, youth mentorship, and neighborhood service initiatives. Her daily life reflects the rich heritage of Montgomery County’s Black community, blending the resilience of civil-rights
    legacies with contemporary cultural expression.
attributes:
  skills: '[''Household budgeting and financial management'', ''Calendar and schedule coordination'', ''Event planning and community outreach'', ''Interpersonal communication and public speaking'', ''Conflict
    resolution and mediation'', ''Culinary skills, especially traditional African-American cuisine'', ''Basic computer proficiency (Microsoft Office, Google Workspace, social media)'', ''Childcare and early
    childhood educational support'', ''Volunteer coordination for church and local non-profits'']'
  hobbies: '[''Hosting potluck dinners and neighborhood game nights'', ''Community gardening'', ''Participating in a local trivia team'', ''Zumba and group fitness classes'', ''Reading contemporary urban
    fiction'', ''Listening to podcasts on personal development and community activism'', ''Volunteer work at church, mentoring youth and organizing service projects'']'
  career_goals: Teresa aims to re-enter the workforce in a role that leverages her organizational talent and people-centered approach, such as an administrative assistant, program coordinator, or community
    liaison for a local nonprofit or county agency. Over the next two years she plans to earn a part-time certificate in Office Administration and complete an associate degree in Business Administration,
    while gaining relevant experience through volunteer projects. She also envisions launching a small catering side-business that showcases her cooking skills, eventually expanding it into a steady source
    of income. Ultimately, Teresa hopes to become a recognized community advocate, contributing to policies and programs that support families in Montgomery County.
