persona_description: A historian who specializes in the study of illuminated manuscripts, particularly the evolution and development of the Gothic script from the 5th to the 15th century. Their research
  interests include, but are not limited to, the stylistic and functional aspects of these manuscripts, the cultural and religious contexts in which they were produced, and the social and economic factors
  that influenced their creation. They have a particular interest in the rise of literacy in the Middle Ages, the impact of nomism on the art of illuminated manuscripts, and the role of the Palatine school
  in promoting literacy and language reforms.
