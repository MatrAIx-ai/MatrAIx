  hobbies: '[''Visiting art galleries'', ''Street-art mural tours'', ''Sketching'', ''Urban photography'', ''Reading speculative fiction'', ''Philosophy'', ''Improv theater'', ''Board-game meet-ups'', ''Cooking
    Korean cuisine'', ''Experimenting with fusion recipes'', ''Learning Japanese language'', ''Escape rooms'', ''Pop-up cultural events'']'
  career_goals: While remaining a dependable cashier, Chong aims to leverage his artistic curiosity and bilingual abilities to transition into a role that blends retail with cultural programming, such as
    a gallery assistant, museum shop manager, or community arts coordinator. He plans to enroll in a part-time certificate program in museum studies or arts administration, complete it within two years,
    and ultimately secure a position that allows him to curate small exhibitions, develop cultural outreach events, and mentor younger staff. His competitive drive also motivates him to pursue a store management
    position in the near term, improving operational efficiency and sales performance, which he sees as a stepping stone toward his longer-term creative ambitions.
