  hobbies: '[''Historical non-fiction reading'', ''Birdwatching'', ''Hiking along the Missouri River'', ''Community theater acting'', ''Gardening'', ''Quilting'', ''Attending local art fairs'', ''Genealogy
    research'']'
  career_goals: Becky aims to expand her scouting program into a regional hub that connects multiple small communities across Yankton County, offering structured mentorship pipelines for at‑risk youth.
    She aspires to publish a handbook that merges humanities insights with modern coaching tactics, positioning herself as a thought leader in community‑based sports development. A long‑term ambition is
    to lead her teams to a state championship while securing grant funding for sustainable equipment and scholarship initiatives.
