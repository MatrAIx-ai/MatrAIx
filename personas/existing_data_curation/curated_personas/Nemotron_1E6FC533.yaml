personas:
  professional: Becky Avino, a veteran youth sports scout and coach in Yankton County, blends her humanities insight with data‑driven analytics to design flexible training programs, while navigating a relaxed,
    sometimes disorganized schedule that they still manage to turn into competitive results.
  sports: Becky Avino channels her competitive drive into coaching the Yankton Eagles youth soccer team and scouting regional talent, while personally hiking the bluffs for fitness, cheering on the Sioux
    Falls Storm, and they volunteer with the local scouting club’s outdoor adventure program.
  arts: Becky Avino weaves her love of quilting, gardening, and community‑theater into a creative outlet, regularly stitching patterns inspired by folk artist Jean Ritchie, tending a rose garden while humming
    Bob Dylan, and they perform in Yankton Community Theatre’s productions of “Our Town” and “The Crucible.”
  travel: Becky Avino prefers spontaneous weekend road trips along the Missouri River, often camping at the Lewis & Clark State Park, has trekked Badlands National Park, dreams of exploring the historic
    streets of Edinburgh for genealogical research, and they rarely book flights far in advance.
  culinary: Becky Avino favors home‑grown produce, regularly cooking grilled trout with fresh dill, roasted root vegetables tossed in sage, and a hearty chicken pot pie using locally sourced corn, while
    they incorporate wild berries from their garden into homemade jam.
  core: Becky Avino is a pragmatic, curiosity‑driven youth sports architect who balances data‑rich coaching with solitary hobbies, a laid‑back approach to organization, and a relentless competitive streak,
    and they constantly seek ways to merge community values with performance.
background:
  cultural: Becky grew up in a multi‑generational white Midwestern family rooted in Yankton’s farming and river‑town heritage. Her upbringing emphasized self‑reliance, practical problem‑solving, and a strong
    sense of community service, often expressed through church involvement and local historical societies. While her cultural milieu values tradition and modesty, her liberal arts education fosters an appreciation
    for diverse perspectives, allowing her to blend regional pragmatism with a broader, humanistic outlook.
