  career_goals: Elcida aspires to advance to a district or regional manager position within the next five years, aiming to oversee multiple stores and mentor a broader team of supervisors. She also plans
    to earn a retail management certification and eventually open a small boutique that showcases Mexican-handcrafted goods and locally sourced products, blending her cultural roots with her retail expertise.
