    User 2: I''d love to learn. I''ve always wanted to be able to paint.

    User 1: We can start tomorrow, if you want. I have some free time in the afternoon.

    User 2: That would be great. I''ll bring the nachos.

    User 1: Sounds like a plan. See you tomorrow.

