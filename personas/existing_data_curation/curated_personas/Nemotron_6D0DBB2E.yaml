personas:
  professional: Pierre Dudley is a postsecondary business education professor who blends methodical curriculum design with dynamic classroom engagement, leveraging strong project management, data‑driven
    decision making, and polished public speaking to mentor students while simultaneously juggling leadership roles in community partnerships and departmental strategy.
  sports: Pierre Dudley competes in pick‑up basketball at the St. Louis community center, coaches the local youth club team in the St. Louis Junior Basketball Association, and follows the St. Louis Billikens
    men’s basketball for inspiration, while also hiking the trails of Creve Coeur Park each weekend as part of a structured fitness regimen that can be derailed by a heavy academic workload.
  arts: Pierre Dudley is a frequent patron of live jazz and blues at venues such as Jazz St. Louis and The Pageant, where they revel in performances by Wynton Marsalis, Gregory Porter, and B.B. King, and
    they channel that musical passion into organizing church cultural events that celebrate gospel and soul traditions.
  travel: Pierre Dudley plans trips with the same spreadsheet precision they use for lesson plans, favoring short, budget‑conscious weekend getaways to Creve Coeur Park and longer music‑centric journeys
    to New Orleans for its Creole culinary scene and to Nashville for its live music festivals, while balancing marital commitments and a modest savings goal.
  culinary: Pierre Dudley enjoys cooking Southern and Creole dishes with their spouse, mastering gumbo, jambalaya, and shrimp étouffée using ingredients like andouille sausage, okra, and filé powder, and
    they often experiment with heat levels while pairing meals with a glass of chilled Riesling, though they sometimes over‑season in the excitement of the weekend.
  core: Pierre Dudley is an organized, sociable business professor who channels stress‑prone energy into community basketball coaching, jazz night outings, meticulous financial planning, and flavorful Creole
    cooking, all while balancing the demands of academia and family.
background:
  cultural: Pierre identifies as a Black American with family roots in the Southern United States. Raised in the St. Louis metropolitan area, he is deeply connected to the local African‑American community
    and its traditions, including gospel music, church participation, Juneteenth celebrations, and a strong emphasis on education, family cohesion, and community uplift. These cultural influences shape
    his teaching philosophy, mentorship style, and involvement in organizations that support Black business development and youth empowerment.
attributes:
  skills: '[''Business administration'', ''Curriculum design and instructional development'', ''Instructional technology (LMS, Canvas, Blackboard)'', ''Public speaking and presentation'', ''Financial analysis
