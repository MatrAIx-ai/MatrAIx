    ''Community outreach and partnership building'', ''Conflict resolution and team facilitation'', ''Research methods and grant writing'', ''Time management and systematic planning'']'
  hobbies: '[''Basketball'', ''Youth sports coaching'', ''Live jazz and blues concerts'', ''Southern/Creole cooking'', ''Hiking and outdoor activities'', ''Leadership and business book club'', ''Mentoring
    with Big Brothers Big Sisters'', ''Organizing church community events'']'
  career_goals: Pierre aims to secure tenure within the next five years and subsequently step into a department chair role where he can shape the business program’s strategic direction. He plans to develop
    a community‑anchored entrepreneurship incubator that partners with local Black‑owned businesses, obtain external funding for research on inclusive business education, and publish findings in peer‑reviewed
    journals. To deepen his scholarly expertise, he intends to pursue a doctoral degree in business education. Additionally, he wants to launch a structured wellness initiative for faculty and students
    to address stress and promote resilience, while continuing to mentor a growing number of underrepresented students each semester.
