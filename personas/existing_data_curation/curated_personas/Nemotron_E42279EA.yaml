personas:
  professional: Barbara Tatum is a budding event coordinator who leverages her methodical project‑management skills, competitive drive, and clear communication to orchestrate community theater fundraisers
    and local tennis league tournaments, consistently delivering measurable outcomes while adhering to tight budgets.
  sports: Barbara Tatum is a regular competitor in the Aiken Tennis Club’s weekend league, follows the South Carolina Gamecocks football team and the Charlotte Hornets NBA squad, and incorporates early‑morning
    jogs and yoga classes into their fitness routine to stay agile for both tennis and event coordination.
  arts: Barbara Tatum immerses herself in community theater, currently starring in a production of "Our Town" with the Aiken Community Theatre, and enjoys the music of Beyoncé, the songwriting of Lin‑Manuel
    Miranda, and the films of Greta Gerwig, which inspire her creative approach to staging events.
  travel: Barbara Tatum plans trips with a spreadsheet, opting for a blend of cultural immersion and relaxation; they’ve explored Savannah’s historic squares, the vineyards of Napa Valley, and the art museums
    of Paris, while a future wish list includes a culinary road trip through the Basque Country.
  culinary: Barbara Tatum cooks Southern comfort food at an intermediate skill level, frequently preparing shrimp and grits, buttermilk fried chicken, and collard greens seasoned with smoked paprika, and
    enjoys sourcing local heirloom tomatoes for fresh salads.
  core: Barbara Tatum is a structured, socially energized planner who balances a competitive edge with community service, while occasionally over‑scheduling and relying on yoga to unwind.
background:
  cultural: Raised in Aiken, South Carolina, Barbara grew up in a middle‑class white Southern family where church, community gatherings, and hospitality were central. The region’s emphasis on tradition,
    family loyalty, and a close‑knit community spirit shaped her values of reliability, structured planning, and sociability. Exposure to Aiken’s equestrian culture and local festivals reinforced a love
    for organized events and communal celebration.
