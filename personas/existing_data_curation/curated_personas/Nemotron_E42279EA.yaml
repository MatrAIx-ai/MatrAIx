  hobbies: '[''Tennis'', ''Community theater'', ''Volunteer event coordination'', ''Gardening'', ''Southern cooking'', ''Yoga'', ''Travel with spouse'', ''Reading personal development books'']'
  career_goals: Barbara aims to transition from volunteer roles to a professional position in event management or nonprofit project coordination, targeting a Business Administration bachelor's degree and
    a PMP certification within the next three years. She aspires to establish her own boutique event‑planning business that serves the Aiken community while providing a stable income for her family.
