persona_description: A pediatrician who specializes in treating children with burn injuries and is particularly interested in phytophotodermatitis and its potential causes. They are knowledgeable about
  the mechanism of the condition, its effects on the skin and the body, and the alternative medicinal uses of the herb Ruta Graveolens. They are also aware of the hazards of growing this herb in gardens
  where children play and the importance of considering phytophotodermatitis in the differential diagnosis of any partial-thickness burn injury.
