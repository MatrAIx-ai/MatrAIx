  hobbies: '[''LEGO building'', ''Soccer'', ''Scratch programming'', ''Reading adventure books'', ''Exploring nature and waterfalls'', ''Collecting shells'', ''Listening to salsa and plena music'', ''Drawing
    cartoon characters'', ''Playing Mario Kart'']'
  career_goals: Jorge aspires to become an engineer—preferably civil or software—so he can design and build structures that help his town, like bridges over Río Grande de Añasco. He enjoys the logical steps
    of building and wants a job where clear plans and reliable results are valued. In the short term, he aims to win the upcoming school robotics competition, achieve straight‑A grades in math and science,
    and become a class monitor to practice leadership. He also entertains the idea of studying marine biology later to protect the coral reefs surrounding Puerto Rico, reflecting his love for the island's
    natural beauty. His competitive nature drives him to set measurable milestones and track his progress meticulously.
