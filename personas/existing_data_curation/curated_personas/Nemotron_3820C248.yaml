personas:
  professional: Jorge Ruiz, a budding LEGO architect and junior Scratch coder, channels his love for structure and predictability into meticulously planned creations and classroom projects, earning a reputation
    for reliability and methodical problem‑solving among teachers and peers.
  sports: Jorge Ruiz, a passionate member of the Yauco Youth Soccer Club who idolizes Lionel Messi and cheers for the local Yauco Hurricanes while also keeping a weekly record of conditioning drills, displays
    a competitive spirit that drives them to improve dribbling and goal‑scoring skills.
  arts: Jorge Ruiz, who fills spare time sketching vibrant cartoon heroes and dances to salsa legends like Celia Cruz, reggaeton hits from Bad Bunny, and traditional plena rhythms during family gatherings,
    lets these artistic influences shape their imagination and after‑school storytelling adventures.
  travel: Jorge Ruiz, who plans weekend escapades with parents to nearby beaches such as Playa Santa and day hikes to the Cueva del Indio, dreams of exploring the rainforests of El Yunque and later the
    historic streets of Old San Juan, balancing a love for nature with organized, family‑centric travel itineraries.
  culinary: Jorge Ruiz, who loves the crunchy taste of tostones, the savory burst of alcapurrias, and the aromatic arroz con gandules cooked by grandparents, helps whisk rice and shape dough for mallorcas,
    yet often sneaks extra cookies when no one watches, reflecting both budding culinary curiosity and a mischievous sweet tooth.
  core: Jorge Ruiz, a methodical 9‑year‑old with a LEGO‑building mind, soccer‑field ambition, and a lingering worry‑about missed deadlines, balances vibrant community traditions with a quietly competitive,
    sometimes overly cautious personality.
background:
  cultural: Jorge grew up in Yauco, a town in the southwestern part of Puerto Rico known for its vibrant festivals and agricultural heritage. His family speaks Spanish at home and is deeply rooted in Puerto
    Rican traditions, celebrating holidays like Navidad and Día de la Independencia with music, traditional dishes such as arroz con gandules, alcapurrias, and tostones. He often participates in local cultural
    events, such as the Festival de la Leche, where he learns about the town’s dairy farming history. The Catholic faith plays a role in his weekly routine, with attendance at Mass on Sundays. The island’s
    tropical climate and proximity to the Caribbean Sea foster his love for outdoor activities, including beach trips and exploring the nearby rainforest. Community values of familismo, respect for elders,
    and collective celebration influence his sense of identity and responsibility.
