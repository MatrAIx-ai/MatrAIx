  hobbies: '["Pick-up basketball", "Urban cycling for recreation", "Exploring Brooklyn neighborhoods and street art", "Attending live music shows (hip-hop, indie rock)", "Trying new eateries and food trucks",
    "Socializing at community gatherings", "Casual tabletop gaming nights", "Street photography of city life", "Volunteering at local park clean-ups", "Listening to podcasts about tech and logistics"]'
  career_goals: David aims to move beyond front‑line deliveries into a supervisory or logistics coordination role where he can apply his curiosity about new technologies to improve efficiency. He is interested
    in earning a certification in supply‑chain management and eventually launching his own small courier business that leverages electric bikes and AI‑driven route optimization. While he values flexibility,
    he also wants to develop stronger organizational habits to lead a team and mentor newer couriers, all while maintaining the calm, resilient mindset that sets him apart.
