persona_description: A teacher who is comfortable with using digital media in the classroom and is happy to add it to their teaching. They have experience with technology and have integrated it into many
  areas of their instruction. They are aware of the changes that will be made to how they teach as we move towards a more "normal" way of teaching, and they are confident in their ability to adapt to these
  changes. They are aware of the benefits of using technology in the classroom and the potential negative effects of using it too much. They are aware of the challenges that come with teaching in a pandemic
  and have found ways to continue supporting their students virtually. They are comfortable with the idea of finding a healthy balance between high-tech and no-tech instruction and are willing to factor
  in their comfort level when making those decisions. They are aware of the impact of the pandemic on teaching and are willing to provide resources and support to their colleagues.
