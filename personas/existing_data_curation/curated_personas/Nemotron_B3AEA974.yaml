  career_goals: Jacqueline aims to deepen her artistic practice and share it with her community while continuing her personal learning journey. She hopes to exhibit her watercolors in the Granite City community
    center, curate a small exhibition of family histories at the public library, and mentor new volunteers in the local food-share program. She also wishes to travel modestly to regional art museums and
    historic sites, and eventually compile her memoirs and genealogical research into a family album that preserves her heritage for future generations.
