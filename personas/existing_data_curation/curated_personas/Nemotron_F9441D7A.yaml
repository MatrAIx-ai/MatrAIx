personas:
  professional: Erick Gonzalez, a retired handyman turned community program coordinator, leverages their bilingual fluency, practical repair skills, and compassionate nature to design structured yet flexible
    cultural exchange activities at the local senior center, while occasionally bending deadlines to accommodate spontaneous social gatherings.
  sports: Erick Gonzalez is an avid fan of classic baseball, faithfully tuning in to watch the Miami Marlins while also joining a weekly senior walking club at the St. Lucie Nature Trail for low‑impact
    fitness.
  arts: Erick Gonzalez channels their love of rhythm through weekly salsa nights and choir rehearsals, often humming to the classics of Celia Cruz and the tender boleros of Armando Manzanero, which shape
    their evenings and social rituals.
  travel: Erick Gonzalez enjoys day trips to Key West and the Everglades, has taken a memorable cruise to a Caribbean island that reminded them of family stories, and dreams of attending a summer music
    festival in Seville, Spain to experience the dance traditions they cherish.
  culinary: Erick Gonzalez loves cooking traditional homestyle dishes like hand‑rolled tamales, rich mole sauce, and hearty pozole, skillfully balancing bold chilies with fresh herbs to feed family and
    friends during weekend gatherings.
  core: Erick Gonzalez blends disciplined routine with spontaneous social flair, using bilingual storytelling and garden care to nurture community ties while savoring boleros and salsa nights.
background:
  cultural: Born in a small town in Jalisco, Mexico, Erick immigrated to the United States in the early 1970s and settled in Florida after decades of work in construction and community services. He maintains
    a strong connection to his Mexican roots through language, cuisine, and traditions such as Día de los Muertos and Mexican Independence Day celebrations. Family ties and Catholic faith are central to
    his identity, and he often shares stories of his upbringing, emphasizing values of respect, hospitality, and collective responsibility. In Port Saint Lucie, he participates in local Hispanic festivals,
    fostering intercultural dialogue while preserving his heritage for future generations.
attributes:
  skills: '[''bilingual communication (Spanish/English)'', ''handyman repairs'', ''gardening and horticulture'', ''cooking traditional Mexican cuisine'', ''community volunteer coordination'', ''event planning
