  hobbies: '[''salsa dancing'', ''gardening'', ''cooking Mexican cuisine'', ''volunteering at food bank'', ''playing dominoes and card games'', ''church choir participation'', ''nature walks'', ''watching
    baseball'', ''listening to boleros'']'
  career_goals: Although retired, Erick aims to stay actively involved in his community. He aspires to lead a weekly cultural exchange program at the local senior center, where he can share Mexican traditions
    and mentor volunteers. He hopes to compile a memoir of his life experiences to preserve his family’s heritage for his grandchildren, and he is dedicated to supporting a scholarship fund for local students
    pursuing bilingual education. Maintaining a structured routine that includes volunteering, gardening, and family visits helps him balance his preference for predictability with his love for spontaneous
    social gatherings.
