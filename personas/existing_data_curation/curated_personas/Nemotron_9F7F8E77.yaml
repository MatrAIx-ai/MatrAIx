  career_goals: Trac is fascinated by the ocean and hopes to become a marine biologist or an environmental engineer focused on coastal preservation. She aims to attend a high-school STEM academy, earn scholarships
    for marine science programs, and eventually study marine ecology or sustainable infrastructure in college. She also dreams of creating educational videos or interactive games that teach other kids about
    marine conservation, blending her curiosity with practical impact.
