personas:
  professional: A budding junior coder, Trac Croft blends a love for building LEGO sets with Scratch programming to create interactive adventure games, channeling curiosity and practicality into school
    science club projects while reliably meeting deadlines and sharing code with friends.
  sports: A beach‑savvy athlete, Trac Croft plays varsity volleyball with the Sunrise Beach Volleyball Club, cheers on the Miami Heat and the Tampa Bay Rays, and spends weekends surfing with friends, approaching
    fitness with a blend of competitive spirit and relaxed fun.
  arts: A creative visual storyteller, Trac Croft sketches comic strips inspired by pop icons like Billie Eilish and indie acts such as Tame Impala, devours mystery novels by Agatha Christie, and showcases
    LEGO dioramas at school art fairs, letting music and literature shape their artistic voice.
  travel: An adventurous day‑tripper, Trac Croft has explored the mangroves of the Everglades, collected shells on Key West’s Siesta Beach, and dreams of a family vacation to the Bahamas, favoring itineraries
    that mix beach relaxation with ecological tours and a splash of vibrant local culture.
  culinary: A budding home chef, Trac Croft favors grilled shrimp tacos, mango smoothies, and classic backyard barbecues—often assisting Mom in marinating fish with lime and cilantro—while experimenting
    with simple recipes like guacamole and chocolate chip pancakes, though they occasionally forget to rinse the rice.
  core: Trac Croft is a curious, organized 12‑year‑old who codes, collects seashells, and balances beach adventures with disciplined saving, yet tends to misplace LEGO pieces and overindulge in candy during
    study breaks.
background:
  cultural: Trac is a white American raised in Hollywood, Florida, within Broward County’s multicultural setting. Her family’s roots trace back to Northern European ancestors, and they maintain traditions
    such as summer beach trips, backyard barbecues, and holiday celebrations that blend classic American customs with the diverse flavors of South Florida. Growing up, Trac has been exposed to a vibrant
    mix of Latino, Caribbean, and African-American cultures through school, community events, and the local food scene, which has shaped her open-minded outlook and appreciation for diverse perspectives.
    The coastal environment and the region’s strong emphasis on outdoor recreation have influenced her interests in marine life and environmental stewardship.
