  hobbies: '["Watercolor painting", "Urban photography", "Visiting art galleries and museums", "Reading art history and sci‑fi novels", "Small‑group book club", "Volunteer community mural projects", "Yoga
    practice", "Hiking local trails", "Experimenting with international cooking", "Birdwatching"]'
  career_goals: Approaching the final phase of her law‑enforcement career, Lori aims to transition into a senior community‑liaison role that blends policing with the arts, such as developing municipal mural
    projects and local art‑based outreach programs to foster trust. She also aspires to become a training instructor focusing on crisis negotiation, cultural sensitivity, and forensic illustration, mentoring
    younger officers and championing innovative, flexible problem‑solving within the department. Post‑retirement, she envisions consulting for nonprofit public‑safety initiatives that leverage creative
    engagement strategies.
