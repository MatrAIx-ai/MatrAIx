persona_description: A procurement expert who is passionate about the circular economy and green public procurement. They are interested in learning about the benefits of green public procurement and how
  it can contribute to reducing waste and improving sustainability. They are also interested in the specific examples of how green public procurement has been implemented in practice, such as the EcoBuy
  Vienna program in Vienna, Austria. They are eager to learn about the concept of life-cycle costing and how it can be used in green public procurement to save money and have a lower impact on the environment.
