  hobbies: '[''Bowling league'', ''Los Angeles Dodgers games'', ''Weekend barbecues'', ''Community food bank volunteering'', ''Neighborhood trivia nights'', ''Vegetable gardening'', ''Casual photography'',
    ''Beginner Spanish classes'']'
  career_goals: Bruce is focused on advancing within the hospitality industry, targeting a promotion to front‑desk supervisor within the next year and eventually moving into an assistant‑manager or general‑manager
    role at a boutique resort. He plans to complete a certified hospitality management program and obtain the Certified Front Desk Representative (CFDR) credential to strengthen his qualifications. Leveraging
    his competitive drive, Bruce aims to boost guest‑satisfaction scores and streamline check‑in processes, positioning himself as a candidate for higher‑level leadership. In the longer term, he dreams
    of opening a small family‑run inn that reflects his commitment to personalized service and operational excellence.
