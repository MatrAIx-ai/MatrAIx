  career_goals: Patricia aims to continue working part‑time while preserving her health, with the goal of becoming a shift lead or floor manager to formalize her supervisory experience. She wishes to earn
    formal recognition—such as an Employee of the Year award—and to mentor younger colleagues, passing on her systematic service style. In parallel, she plans to launch a modest community‑center workshop
    where she teaches basic serving etiquette and simple cooking techniques to senior participants, combining her curiosity about food with a practical, low‑risk side venture. Ultimately, she seeks financial
    stability for a comfortable retirement and the freedom to travel modestly to historic sites she reads about.
