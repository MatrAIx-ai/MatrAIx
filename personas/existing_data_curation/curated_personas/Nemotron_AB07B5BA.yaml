  career_goals: Janet aims to transition from floor‑level management to a regional operations director role within the next five years, expanding her strategic influence across multiple facilities. She
    plans to complete her bachelor’s degree in Business Administration, pursue an MBA, and lead large‑scale efficiency initiatives that integrate advanced technology and sustainability practices, positioning
    herself as a key decision‑maker in the organization.
