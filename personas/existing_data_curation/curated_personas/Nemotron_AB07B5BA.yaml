personas:
  professional: Janet Gatterdam is a seasoned distribution operations manager in Houston who leverages a decade of process‑optimization, budgeting, and regulatory compliance expertise, pairing a structured
    scheduling mindset with a collaborative, high‑energy team‑building approach as they prepare to step into a regional operations director role.
  sports: Janet Gatterdam rallies with the local running club for weekend 5K runs, cheers on the Houston Astros and Rockets at the stadium, and they fit in bi‑weekly spin sessions at a downtown gym while
    also hiking the Hill Country trails every spring.
  arts: Janet Gatterdam dives into Houston’s live‑music scene, often catching a blues set at Antone’s featuring Gary Clark Jr. or a country‑rock performance by Luke Bryan at the annual Rodeo, and they balance
    these outings with evenings listening to business podcasts that double as audio storytelling.
  travel: Janet Gatterdam prefers well‑planned road trips that combine hiking in the Texas Hill Country, a weekend culinary tour of New Orleans’ gumbo and po’boys, and occasional international getaways
    to northern Mexico to source authentic chilies, all balanced against a mid‑career budget and a small child’s school schedule, and they always map out itineraries in advance.
  culinary: Janet Gatterdam enjoys mastering Tex‑Mex classics like beef fajitas, smoky brisket tacos, and homemade guacamole with fresh cilantro and chipotle, routinely grilling on their backyard smoker
    while occasionally ordering quick‑serve burritos during late‑night shifts, and they pride themselves on a well‑stocked pantry of ancho chilies, queso fresco, and BBQ rubs.
  core: Janet Gatterdam blends a pragmatic, structured work ethic with a love for community‑driven fitness, BBQ‑filled gatherings, and strategic financial planning, all while juggling a penchant for late‑night
    emails and occasional dental‑floss neglect, and they keep a steady pulse on both career goals and neighborhood ties.
background:
  cultural: Janet was raised in a middle‑class Texan family in the suburbs of Houston. Her upbringing reflects Southern hospitality and a strong sense of community, tempered by the multicultural vibrancy
    of Houston’s diverse neighborhoods. She identifies with values of hard work, self‑reliance, and civic engagement common in Texas, while also appreciating the city’s blend of Mexican, African‑American,
    and Asian cultural influences. This background informs her love for BBQ and Tex‑Mex food, support for local sports teams like the Astros and Rockets, and active participation in neighborhood associations.
