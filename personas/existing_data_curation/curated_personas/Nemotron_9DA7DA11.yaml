personas:
  professional: Liza Acosta, a senior biomedical instrument repair technician with two decades of hands‑on expertise in micro‑soldering, schematic analysis, and ISO/FDA compliance, channels their curiosity
    and practicality into meticulous troubleshooting while their relaxed, somewhat disorganized style keeps the workshop flexible and collaborative, often asserting themselves to mentor apprentices through
    clear, user‑friendly documentation.
  sports: Liza Acosta, a sailing enthusiast who spends weekends navigating the Chesapeake Bay with the Annapolis Yacht Club, complements their love of water with weekly yoga classes and avidly follows the
    Baltimore Ravens, Washington Capitals, and Washington Nationals, occasionally joining local adult softball leagues despite their occasionally scattered schedule.
  arts: Liza Acosta, an active member of Annapolis’s community theater troupe, regularly performs in productions ranging from Stephen Sondheim’s *Into the Woods* to locally staged *Shakespeare in the Park*,
    while their book club delves into Hilary Mantel’s historical novels and their craft circle knits and throws pottery inspired by the works of contemporary artist Maya Lin.
  travel: Liza Acosta enjoys short coastal getaways to the Outer Banks and historic Williamsburg, seeks out the seafood bounty of Cape Cod, and dreams of an extended cultural trip to the Scottish Highlands,
    planning trips loosely around their flexible schedule and often booking last‑minute deals that fit their modest travel budget.
  culinary: Liza Acosta loves cooking Maryland crab cakes with Old Bay seasoning, tends an organic garden that supplies fresh herbs for their homemade sourdough starter, and indulges in occasional Indian
    curry nights featuring garlic naan, balancing a competent home‑chef skillset with a penchant for dining out at waterfront restaurants for fresh oysters and steamed mussels.
  core: Liza Acosta is a technically gifted, community‑driven repair specialist who blends curiosity with a laid‑back, sometimes disorganized lifestyle, channeling their love of sailing, theater, and yoga
    into a vibrant social circle while constantly wrestling with worry‑driven perfectionism and a habit of forgetting to file paperwork on time.
background:
  cultural: Liza comes from a white Anglo‑American background with Irish and German ancestry, raised in a middle‑class family in the suburbs of Baltimore before moving to Annapolis. The Mid‑Atlantic maritime
    culture, the presence of the U.S. Naval Academy, and the region’s emphasis on public service have shaped her community‑oriented values. Growing up with parents who were a schoolteacher and a nurse,
    she internalized a respect for education and healthcare, which informs both her career in precision instrument repair for medical devices and her volunteer work. She celebrates typical American holidays
    and enjoys local traditions such as the Maryland Seafood Festival and crab‑picking outings on the Bay.
attributes:
  skills: '[''Precision instrument troubleshooting'', ''Calibration and maintenance of optical/electronic equipment'', ''Electrical schematic interpretation'', ''Micro‑soldering and electronics repair'',
    ''CNC machining and rapid prototyping'', ''Compliance with FDA and ISO standards'', ''Technical documentation and instructional design'', ''Mentoring and training of apprentices'', ''Customer service
    and technical support'', ''Problem solving under pressure'', ''Team collaboration and cross‑functional communication'']'
  hobbies: '[''Sailing on the Chesapeake Bay'', ''Community theater acting'', ''Historical fiction book club'', ''Yoga and mindfulness practice'', ''Organic gardening'', ''DIY electronics and hobbyist tinkering'',
    ''Volunteer tutoring for adult learners'', ''Women’s craft circle (knitting and pottery)'', ''Hiking local nature trails'', ''Cooking experimental cuisines'']'
  career_goals: Liza aims to advance from senior repair technician to service manager or lead specialist, overseeing a small team and establishing a formal apprenticeship program. She hopes to deepen her
    expertise in biomedical instrumentation, earn certifications in advanced diagnostics, and eventually launch a boutique consultancy offering on‑site precision instrument maintenance for hospitals and
    research labs in the Mid‑Atlantic. To balance her career aspirations with her desire for reduced stress, she plans to streamline repair processes, adopt predictive‑maintenance software, and mentor more
    women entering technical trades.
