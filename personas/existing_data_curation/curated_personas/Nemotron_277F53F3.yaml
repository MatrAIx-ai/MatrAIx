  career_goals: Willie aims to advance to a senior HR leadership role, such as Director of Human Resources or Chief Human Resources Officer, within the next five years. He plans to earn the SHRM-SCP certification
    and pursue an MBA to deepen his strategic business acumen. His ambition is to drive organization-wide initiatives that integrate advanced people-analytics, promote mental-health support, and embed a
    culture of continuous learning. He also hopes to mentor junior HR staff, champion diversity, equity and inclusion programs, and eventually launch a consultancy focused on building resilient, employee-centric
    workplaces in the tech-driven Bay Area.
