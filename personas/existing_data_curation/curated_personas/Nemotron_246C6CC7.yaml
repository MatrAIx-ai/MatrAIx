  career_goals: Approaching the final phase of his career, Jalal aims to obtain the Chartered Property Casualty Underwriter (CPCU) designation and leverage his expertise as a senior consultant for a regional
    insurance firm. He also aspires to design and lead a training academy for new adjusters, focusing on ethical investigation practices and innovative claim resolution. Additionally, he plans to volunteer
    his analytical skills with a local nonprofit that provides disaster-preparedness education, while gradually scaling back full-time responsibilities to enjoy more art-related pursuits.
