  hobbies: '[''Hiking and rock climbing'', ''Landscape and street photography'', ''Acoustic guitar and songwriting'', ''Attending open‑mic nights and live music'', ''Visiting galleries and independent film
    screenings'', ''Cooking experimental dishes and hosting dinner parties'', ''Volunteering at a community art center'', ''Listening to creative entrepreneurship podcasts'', ''Reading contemporary art
    journals'']'
  career_goals: Logan aims to complete his bachelor's degree in Communications or Arts Management within the next two years, then secure a position as a community arts coordinator or public relations specialist
    for a cultural organization in Colorado. He envisions building an independent media platform—combining podcasts, short documentary videos, and social media—to spotlight emerging artists and local cultural
    stories. Long‑term, he hopes to travel to international art festivals, curate traveling exhibitions that fuse Western U.S. landscapes with global artistic perspectives, and maintain a career that offers
    creative autonomy, flexible scheduling, and continuous exposure to new ideas.
