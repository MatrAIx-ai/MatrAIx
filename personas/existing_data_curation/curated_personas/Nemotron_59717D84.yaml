  hobbies: '[''Oil painting'', ''Sketching'', ''Playing harmonica'', ''Blues jam sessions'', ''Gardening'', ''Woodworking'', ''Model ship building'', ''Community book club'', ''Reading African American
    literature'', ''Historical biographies'', ''After‑school mentoring'', ''Photography'']'
  career_goals: Brandon aims to move into a supervisory role as an Inventory Control Manager within the next three years, leading a team of ten to twelve employees and driving lean initiatives that reduce
    waste and improve accuracy. He plans to earn the APICS CPIM certification within two years to deepen his supply‑chain expertise. Longer‑term, he hopes to transition into a training position at a community
    college or vocational institute, where he can blend his logistics knowledge with his educational background to teach adult learners. He also wants to mentor junior staff and introduce ergonomic, artistically
    inspired workspace layouts that enhance both efficiency and employee well‑being.
