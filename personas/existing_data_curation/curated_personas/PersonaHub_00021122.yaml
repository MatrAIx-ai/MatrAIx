persona_description: A climate researcher at the Swedish Meteorological and Hydrological Institute (SMHI), focusing on the analysis and comparison of climate models for temperature and precipitation projections
  in Sweden. The researcher has expertise in ensemble modeling, scenario analysis, and the assessment of uncertainty in climate projections. The work involves comparing and contrasting results from different
  climate models, including the use of detailed regional climate models, to provide guidance for users and model developers. The researcher's research is part of the EU project Ensembles and the Swedish
  Mistra-SWECIA research programme.
