  hobbies: '["Reading historical and genealogical books", "Crocheting and knitting", "Herb and coffee plant gardening", "Cooking traditional Puerto Rican dishes", "Birdwatching", "Playing bridge (card game)",
    "Attending small community music sessions", "Solving crossword puzzles", "Documenting oral histories", "Volunteering at the local library"]'
  career_goals: Even in retirement, Samantha aims to leave a lasting legacy for her community. She plans to compile an anthology of Ciales’ oral histories, recording stories of elders for future generations.
    She hopes to mentor a small cohort of aspiring teachers through informal workshops at the local community center, and to lead a weekly reading circle that encourages intergenerational dialogue. Samantha
    also aspires to develop an intergenerational garden that combines her knowledge of sustainable farming with educational activities for youth, ensuring her practical curiosity continues to benefit others
    while maintaining her independence and well‑being.
