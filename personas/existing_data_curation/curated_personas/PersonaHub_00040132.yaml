persona_description: A professional with expertise in environmental regulations and standards, particularly in the automotive industry. They are involved in the revision of European Union standards for
  petrol and diesel fuels, which will have a significant impact on the industry. They are knowledgeable about the current standards, the new Directive, and the process of revision. They have experience
  in negotiations between oil and automotive industries and are familiar with the CEN/TC 19 process. They are interested in the symposium on automotive fuel quality in Europe, particularly the anticipated
  EC Fuels Directive 2005, European fuel quality monitoring system, specifications for petrol, diesel and LPG as well as specifications for "biofuel".
