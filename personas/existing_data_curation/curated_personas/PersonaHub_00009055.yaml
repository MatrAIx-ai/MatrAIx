persona_description: A multidisciplinary physician who specializes in the diagnosis, management and treatment of Multiple System Atrophy (MSA), a rare neurological disorder that affects movement, balance,
  speech, blood pressure and bladder and bowel function. The physician has extensive experience in the disease and is a member of MSA physician's groups in North America, Europe, Japan and China. The physician
  is dedicated to improving the symptoms and quality of life of patients with MSA, and is also involved in ongoing and groundbreaking research, such as a National Institutes of Health multi-center national
  clinical trial for the use of Rifampicin in treating MSA.
