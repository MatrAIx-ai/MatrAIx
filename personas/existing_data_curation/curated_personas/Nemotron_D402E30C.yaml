personas:
  professional: Maritza Peng, an aspiring junior scientist who loves turning crayon drawings into playful experiments, showcases boundless curiosity and spontaneous creativity, often leaving a colorful
    trail of supplies across the kitchen floor while disregarding the tidy routines most adults demand.
  sports: Maritza Peng, an energetic five‑year‑old who darts around the local playground with the Queens Kids Soccer Club, cheers loudly for the New York Knicks and idolizes shortstop Francisco Lindor of
    the New York Mets, preferring spontaneous tag games over rigid drills.
  arts: Maritza Peng, a lively little artist enchanted by Disney’s Frozen and Miyazaki’s My Neighbor Totoro, spends hours coloring vivid scenes with crayons, hums along to Baby Shark, and eagerly participates
    in Queens Museum’s family art workshops.
  travel: Maritza Peng, a curious five‑year‑old who loves spontaneous family outings, has explored Central Park’s playgrounds and Coney Island’s beach, and dreams of a future adventure at Orlando’s Disney
    World, favoring hands‑on discoveries over meticulous itineraries.
  culinary: Maritza Peng, a food‑enthusiastic five‑year‑old who delights in helping fold pork and shrimp dumplings, devours cheesy pizza slices topped with pepperoni, and savors sweet fried plantains seasoned
    with a pinch of cinnamon, often requesting an extra splash of soy sauce on their noodles.
  core: Maritza Peng, a five‑year‑old bundle of curiosity and social sparkle, mixes endless imagination with a love of spontaneous play, repeatedly leaving a trail of crayons and crumbs wherever they go.
background:
  cultural: Maritza’s family is of East Asian heritage, speaking a blend of Mandarin and English at home while preserving traditions such as Lunar New Year celebrations and preparing classical dishes like
    dumplings. Growing up in Jamaica, Queens, she also experiences a vibrant multicultural environment, participating in neighborhood festivals, tasting Caribbean cuisine, and making friends from many different
    cultural backgrounds. This blend of East Asian family customs and the diverse Queens community shapes her worldview and daily experiences.
