  career_goals: Maritza dreams of turning her love for colors and shapes into a future where she can paint giant murals that make people smile. She imagines designing fun play spaces where friends can explore
    together, and she aspires to lead community art projects that bring kids from different backgrounds together. Her ultimate ambition is to be a creator who inspires curiosity and joy in other children.
