  career_goals: Brianna aims to graduate high school with honors and enroll in a local community college to pursue an associate's degree in nursing, valuing the structured curriculum and clear career pathway.
    She plans to become a registered nurse, with the long‑term ambition of contributing to healthcare access in Mission and the surrounding rural communities. While she is committed to the stability of
    the nursing profession, she also hopes to acquire management skills so she can eventually oversee a small clinic or health outreach program, blending her love for organization with a desire to serve
    her community.
