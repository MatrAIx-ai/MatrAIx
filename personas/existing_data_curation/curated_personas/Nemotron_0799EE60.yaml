personas:
  professional: Brianna Ward leverages her meticulous bullet‑journal system and experience as student‑council treasurer and community‑garden volunteer coordinator to hone the organizational, problem‑solving,
    and public‑speaking abilities they will need as a future registered nurse, with a long‑term goal of managing a small rural clinic.
  sports: Brianna Ward avidly follows the Mission High Tigers football and basketball teams, cheers from the bleachers on Friday night games, also subscribes to the Kansas City Chiefs and the Kansas City
    Royals, and participates in a weekend intramural volleyball league at the community center.
  arts: Brianna Ward shines on stage as a drama‑club actress, channeling the humor of Lin‑Manuel Miranda’s “Hamilton” and the classic charm of Audrey Hepburn’s performances into school productions, while
    also devouring nonfiction works on nutrition to fuel her creative energy.
  travel: Brianna Ward prefers short road trips to Kansas state parks like Tallgrass Prairie and the Flint Hills, often planning itineraries in their bullet‑journal months ahead, while dreaming of a spring
    backpacking adventure through the Ozarks and a future study‑abroad semester in Dublin, blending a love for predictable routes with a pinch of wanderlust.
  culinary: Brianna Ward bakes apple pies and oatmeal‑crisp cookies using recipes passed down from their grandparents, experiments with garden‑fresh basil and heirloom tomatoes in savory tarts, and enjoys
    sharing the warm, buttery treats at church potlucks, though they sometimes forget to set the timer and end up with a slightly charred crust.
  core: Brianna Ward is a detail‑obsessed, bullet‑journal‑loving high‑school senior whose practical mindset, community‑rooted compassion, and occasional over‑scheduling create a uniquely organized yet humanly
    imperfect path toward a nursing career.
background:
  cultural: Brianna comes from a white, Midwestern family with deep roots in Kansas, tracing back several generations to German and Irish ancestors who settled in the state during the early 20th century.
    Raised in the small town of Mission, she embodies the region's values of community involvement, self‑reliance, and modesty. Her family participates regularly in church events and local county fairs,
    and they uphold traditions such as seasonal home‑cooking, gardening, and supporting the high‑school sports teams. The close‑knit nature of Mission and its surrounding agricultural landscape have shaped
    her practical outlook, respect for routine, and commitment to contributing positively to her hometown.
