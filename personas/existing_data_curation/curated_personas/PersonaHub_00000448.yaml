persona_description: Sarah Janssen is a senior scientist on the public health team of the Natural Resources Defense Council and an MD and mom. She is concerned about the latest study concerning BPA and
  phthalates in our food and wants parents to be aware of the implications for their daily lives. She believes that eating a low fat diet, eating low on the food chain, and eating a variety of foods are
  the best advice for reducing exposure to phthalates.
