persona_description: A Norwegian scientist who specializes in environmental microbiology, particularly the study of antimicrobial resistance in the environment. He has conducted several risk assessments
  on antimicrobial resistance and has experience in comparing the summary of knowledge with existing reports. He is knowledgeable about the complexities of antimicrobial resistance in the environment, including
  the three dimensions of antimicrobial resistant bacteria, antimicrobial resistance genes, and antimicrobial agents. He is also familiar with the need for greater coordinated international efforts to gain
  a greater understanding of how antimicrobial resistance affects the environment. He is interested in the development of monitoring strategies that provide knowledge of longitudinal resistance dynamics.
