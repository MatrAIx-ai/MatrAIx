persona_description: A statistician who specializes in epidemiological studies, particularly those related to mortality rates and the impact of conflict on population health. Has expertise in data analysis,
  statistical modeling, and survey methodology. Has worked on numerous studies of this nature, including the Lancet study on Iraq's post-invasion mortality rate. Has experience with household surveys and
  data crunching. Has a keen eye for detail and a critical thinking approach to data analysis. Is aware of the importance of triangulating data and ensuring its accuracy. Is aware of the potential for data
  discrepancies and the need for rigorous data validation. Is familiar with the methodology used in the Lancet study and the criticisms raised by the authors. Has a background in demography and public health.
