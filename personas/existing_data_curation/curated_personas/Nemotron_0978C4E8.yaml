personas:
  professional: Cedric Noel is a dynamic communications strategist who leverages storytelling, crisis management, and social media amplification to elevate brand narratives, while their competitive edge
    and relaxed approach to scheduling enable them to pivot quickly and deliver high‑impact campaigns for culturally vibrant institutions.
  sports: Cedric Noel is a beach‑volleyball enthusiast who plays in a local Tampa league, paddles kayaks at sunrise, hikes the Gulf shoreline, supports the Tampa Bay Lightning, Buccaneers, and Rays, and
    treats fitness as a social outlet where competitive spirit fuels regular participation while they occasionally skip workouts when a DJ gig conflicts.
  arts: Cedric Noel is a frequent visitor to Tampa’s contemporary galleries, a vinyl collector who spins records from Daft Punk, The Rolling Stones, and Moby, an improv comedy participant inspired by The
    Second City, and a DJ who curates sets that blend visual art and music, drawing creative energy from artists like Banksy, Ai Weiwei, and Yayoi Kusama.
  travel: Cedric Noel prefers spontaneous, music‑centric trips, often booking last‑minute flights to festival hubs like Austin’s SXSW, the coastal vibes of Key West, the neon streets of Tokyo, and the historic
    cafés of Lisbon, balancing a modest budget with a desire for cultural immersion and occasional luxury stays at beachfront resorts.
  culinary: Cedric Noel enjoys a laid‑back culinary scene, frequently ordering Gulf shrimp tacos with fresh lime, mango salsa, and smoked paprika, while at home they experiment with simple Caribbean‑inspired
    dishes like jerk chicken using all‑spice rubs and coconut milk, and they relish dining out at eclectic eateries that pair craft beers with artisanal burgers.
  core: Cedric Noel is a charismatic, adventure‑loving communicator who balances a competitive drive with a habit of half‑finished plans, a relentless love for vintage vinyl, and an uncanny calm that makes
    crisis situations feel like a smooth set‑list.
background:
  cultural: Cedric is a Black American who grew up in the multicultural neighborhoods of Tampa, where African American, Caribbean, and Southern traditions intersect. His family emphasized the importance
    of community, storytelling, and resilience, values that continue to shape his worldview. He draws inspiration from the rhythm of hip‑hop, the soulful heritage of gospel, and the vibrant visual arts
    scene that celebrates Black creators. This cultural tapestry informs his communication style, giving him an innate ability to connect authentically across diverse audiences while championing inclusive
    narratives.
attributes:
  skills: '["Strategic media relations", "Crisis communication", "Brand storytelling", "Social media content strategy", "Event planning and execution", "Stakeholder engagement", "Market and audience research",
    "Copywriting and editorial", "Public speaking and media training", "Competitive analysis", "Community outreach", "Agile project coordination"]'
  hobbies: '["Visiting art galleries and museums", "Playing beach volleyball", "Improv comedy workshops", "DJing at community events", "Kayaking and hiking in Tampa Bay", "Collecting vintage vinyl records",
    "Attending music festivals", "Mentoring youth in media and communications", "Exploring Tampa''s food scene", "Participating in cultural street festivals"]'
  career_goals: Cedric aims to become a senior communications leader within the next five years, ideally overseeing public relations for a cultural institution or a forward‑thinking corporation that values
    diversity and innovation. He dreams of directing large‑scale campaigns that spotlight emerging Black artists and socially responsible initiatives, and eventually launching his own boutique PR firm that
    specializes in arts, entertainment, and community‑focused brands. Flexibility, creative autonomy, and the ability to shape public narratives around empowerment and social impact are central to his professional
    aspirations.
