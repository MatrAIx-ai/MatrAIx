persona_description: A NPS employee responsible for managing the Glen Canyon National Recreation Area's quagga mussel program, who has been tasked with shifting from prevention to containment efforts to
  control the spread of quagga mussels from Lake Powell to other lakes and rivers. The employee is dedicated to educating visitors on the importance of Clean, Drain, and Dry techniques to prevent the spread
  of mussels and is actively monitoring boat entries and departures to ensure compliance with state laws. The employee is aware of the challenges of controlling the spread of quagga mussels and is committed
  to working hard to protect other lakes and rivers.
