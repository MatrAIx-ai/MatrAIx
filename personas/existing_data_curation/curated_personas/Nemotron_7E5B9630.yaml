personas:
  professional: George Hodge, a seasoned culinary veteran with over 35 years of high‑volume kitchen experience, blends rapid, cost‑controlled cooking with an artist’s eye for plating while mentoring junior
    staff, and they consistently favor spontaneous menu changes over rigid schedules.
  sports: George Hodge, an energetic swing‑dancer and avid supporter of the Minnesota Timberwolves, Vikings, and Twins, takes part in weekly community hall dance nights, joins a senior walking club for
    casual weekend strolls through the Minneapolis park system, and they view these activities as lively, low‑impact ways to stay fit.
  arts: George Hodge, a regular visitor of the Walker Art Center and Minneapolis Institute of Art, draws inspiration from avant‑garde creators such as Yayoi Kusama, photographer Vivian Maier, and the swing
    sounds of Nina Simone, and they weave these artistic influences into both their plating designs and weekend swing‑dancing performances.
  travel: George Hodge, who favors spontaneous, low‑budget road trips to regional events like the Iowa State Fair food pavilion and the Madison Spice Symposium, dreams of a culinary pilgrimage to Oaxaca
    for mole and to Kyoto for kaiseki, and they typically pack a small cooler of herbs and a camera, letting the open road dictate their itinerary.
  culinary: George Hodge, a masterful home chef with advanced plating chops, loves experimenting with dishes like miso‑glazed pork belly served atop beet tartare with goat‑cheese foam, incorporates heirloom
    tomatoes, sumac, and fresh basil from their herb garden, and they relish hosting informal dinner parties where bold flavor pairings meet visual art concepts.
  core: George Hodge, a 61‑year‑old culinary artist who blends Midwest pragmatism with avant‑garde flair, lives for spontaneous pop‑up creations, community swing‑dances, and occasional chaos in schedules,
    and they balance mentor‑ship with a never‑ending quest for fresh inspiration.
background:
  cultural: George grew up in the Upper Midwest, rooted in a historically white, Anglo‑American family that values modesty, community involvement, and practical hard work. He was raised in a small town
    near Minneapolis where local fairs, church gatherings, and a strong emphasis on neighborly support shaped his worldview. Relocating to Minneapolis exposed him to the city’s rich tapestry of cultures,
    especially its vibrant food scene and progressive arts community. This blend of Midwestern pragmatism and exposure to diverse artistic influences informs his open‑minded, socially engaged, and creatively
    curious outlook.
