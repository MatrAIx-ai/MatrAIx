  career_goals: Lindsey plans to complete her GED within the next two years, then enroll in a vocational automotive technology program at a local community college or technical school. Her short-term aim
    is to earn an ASE (Automotive Service Excellence) certification and secure a position as an entry-level mechanic at a reputable garage in the Manchester area. Long-term, she hopes to combine her reliability
    and competitive drive to open her own independent auto repair shop, offering trustworthy, structured service to her community.
