personas:
  professional: Lindsey Crampton is a 16‑year‑old aspiring automotive technician who channels their competitive streak and love of structure into mastering bike repairs, basic car maintenance, and Arduino
    projects, while they plan to earn an ASE certification and eventually run a trustworthy, organized auto shop in Manchester.
  sports: Lindsey Crampton plays midfield for the Manchester Youth Soccer Club, supports the New England Revolution and Boston Bruins, and maintains fitness by jogging on local trails, preferring structured
    practice over spontaneous workouts.
  arts: Lindsey Crampton enjoys the high‑octane soundtracks of the Fast & Furious franchise, frequently streams Daft Punk and The Glitch Mob while tinkering with Arduino kits, and follows YouTube creators
    like ChrisFix for automotive inspiration.
  travel: Lindsey Crampton favors weekend road trips to nearby destinations such as Portland, Maine’s waterfront and the Henry Ford Museum in Dearborn, balancing a low‑budget itinerary with a longing to
    someday drive the mountain roads of Pikes Peak for a racing adventure.
  culinary: Lindsey Crampton cooks simple, protein‑rich meals like spaghetti Bolognese, grilled cheese with tomato soup, and experimental avocado toast, savoring ingredients such as garlic, fresh basil,
    and chili flakes, and often packs trail‑mix snacks for summer hikes.
  core: Lindsey Crampton is a structured, competitive teen who blends a love for mechanics, soccer, and video games with disciplined saving habits and a pragmatic approach to health and life.
background:
  cultural: Lindsey grew up in a middle-class, predominantly white family in Manchester, New Hampshire. Her upbringing reflects typical New England values of self-reliance, modesty, and community involvement.
    Family traditions include celebrating regional holidays, attending local fairs and farmers' markets, and emphasizing practical skills such as home maintenance and cooking. The seasonal climate and close-knit
    neighborhood have fostered her appreciation for outdoor activities and a structured, reliable approach to daily life.
