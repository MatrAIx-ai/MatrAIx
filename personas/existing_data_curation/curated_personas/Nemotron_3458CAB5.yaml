personas:
  professional: Bettie Pearsall, a diligent retail cashier at a neighborhood grocery, leverages their meticulous cash handling, POS expertise, and natural knack for organizing inventory to ensure smooth
    operations while training new staff with their patient, methodical approach.
  sports: Bettie Pearsall enjoys cheering on the South Bend football team during fall weekends, follows the Chicago Bears, participates in a local walking club that meets for evening strolls in West Side
    Park, and tends to skip the gym in favor of gardening as their low‑impact daily exercise.
  arts: Bettie Pearsall finds solace in crocheting blankets while listening to classic rock legends like The Eagles and Bruce Springsteen, sings alto in their Methodist choir, and escapes into historical
    fiction novels by Philippa Gregory and mystery thrillers by Tana French.
  travel: Bettie Pearsall prefers well‑planned weekend road trips, often heading to the Indiana Dunes for a lakeside retreat or to Chicago for a jazz night, while dreaming of a fall itinerary through New
    England’s small towns once their small convenience store is up and running.
  culinary: Bettie Pearsall, an adept home cook, loves preparing herb‑infused chicken soup with fresh rosemary and basil from their garden, perfecting classic Midwestern pot roast, and indulging in homemade
    apple pie topped with a flaky crust during the annual county fair bake‑off.
  core: Bettie Pearsall, a 40‑year‑old organized multitasker, balances a love of structure with creative knitting, a penchant for meticulous budgeting, and an occasional habit of double‑checking every receipt
    long after the cash register closes, a quirk they proudly admit to.
background:
  cultural: Bettie grew up in South Bend, Indiana, in a working‑class, middle‑class family with deep Midwestern roots. Her family background reflects the region’s blend of German, Irish, and English ancestry.
    The community’s values of hard work, reliability, and neighborly support shaped her worldview. She was raised in a Protestant (Methodist) household, participating in church activities that emphasized
    service and modest celebrations. Local traditions such as county fairs, seasonal potlucks, and high school football games are familiar to her, and she values the sense of close‑knit community common
    in the Midwest.
