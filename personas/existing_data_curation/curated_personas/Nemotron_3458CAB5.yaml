  hobbies: '[''Knitting'', ''Crocheting'', ''Herb gardening'', ''Reading historical fiction'', ''Puzzle solving (crosswords, Sudoku)'', ''Volunteer work at food pantry'', ''Walking in local parks'', ''Singing
    in church choir'', ''Listening to classic rock'']'
  career_goals: Bettie aims to leverage her experience to move into a supervisory role within retail, such as shift manager or assistant store manager, where she can apply her organizational strengths.
    She plans to complete her associate degree in business administration within the next two years and obtain a certification in bookkeeping. Long‑term, she dreams of opening a small neighborhood convenience
    store that emphasizes friendly service and community ties. She also wants to develop expertise in inventory optimization to improve store profitability.
