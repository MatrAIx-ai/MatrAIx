  career_goals: Quateria aims to advance into a mid‑level management role such as Administrative Services Manager or Operations Manager, building on her supervisory experience. She plans to enroll in a
    part‑time MBA program to deepen strategic and financial acumen, positioning herself for future senior leadership. A key ambition is to spearhead a department‑wide digital transformation initiative that
    modernizes workflow while preserving flexibility for staff. She also seeks to create a mentorship program for women of color in administrative roles, leveraging her natural kindness and cooperative
    spirit. Long‑term, she envisions launching a consulting practice that helps small, Black‑owned businesses streamline their administrative processes, thereby contributing to community economic empowerment.
