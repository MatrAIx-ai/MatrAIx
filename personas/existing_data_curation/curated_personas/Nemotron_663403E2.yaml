personas:
  professional: Juan Medina is an enthusiastic 10‑year‑old student who channels his love for teamwork into organizing after‑school soccer drills and runs a modest backyard “coach” gig, showing natural leadership
    despite a tendency to procrastinate on school projects and a preference for familiar routines that sometimes clashes with his spontaneous ideas.
  sports: Juan Medina is a forward for the Westside Hawks youth soccer club, idolizes Los Angeles FC and the Los Angeles Dodgers, spends Saturdays mastering penalty kicks at the neighborhood park, and joins
    a summer baseball clinic where they practice right‑field throws while cheering on the local teams.
  arts: Juan Medina loves sketching vibrant cartoons while humming cumbia tracks from Banda El Recodo and Celso Piña, often integrating those characters into Minecraft worlds, and they are a fan of the
    animated series “Adventure Time” and the films starring Gael García Bernal, which fuel their creative storytelling.
  travel: Juan Medina dreams of exploring the colorful murals of Guadalajara and the beachside charm of Ensenada, but currently delights in weekend trips to Disneyland, family visits to San Diego’s Balboa
    Park, and school field trips to the Natural History Museum, preferring road‑trip adventures where they can play car games and snack on churros.
  culinary: Juan Medina enjoys helping prepare tacos al pastor and guacamole, expertly mashing avocados and sprinkling fresh cilantro, occasionally stealing a bite of churros before dinner, and despite
    their enthusiasm, they sometimes forget to wash their hands after handling raw meat, prompting gentle reminders from their parents.
  core: Juan Medina is a spirited 10‑year‑old who blends a love for routine‑driven soccer drills with spontaneous bursts of energy, a sweet craving for churros, and a habit of misplacing their inhaler during
    games.
background:
  cultural: Juan comes from a Mexican family rooted in Huntington Park’s vibrant Latino community. He grows up speaking Spanish at home and English at school, and he participates in cultural celebrations
    such as Día de los Muertos, Mexican Independence Day, and local fiestas. Weekly family meals often feature homemade tortillas, salsa, and other traditional dishes, and his family attends Mass on Sundays.
    The neighborhood’s Mexican markets, cultural centers, and close‑knit community shape his sense of identity, while his exposure to the diverse culture of Los Angeles adds a broader perspective.
