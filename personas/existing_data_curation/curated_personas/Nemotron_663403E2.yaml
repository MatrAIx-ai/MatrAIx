  career_goals: Juan dreams of a future where he can continue helping others while staying connected to the activities he loves. He imagines becoming a teacher or a community health aide to support classmates
    and neighbors, and he also hopes to play soccer at a competitive level and eventually coach younger kids. His short‑term goal is to stay engaged in school, earn good grades, and participate in the school
    buddy program, while his longer‑term ambition is to graduate high school, earn a scholarship for his athletic talent, and study education or nursing.
