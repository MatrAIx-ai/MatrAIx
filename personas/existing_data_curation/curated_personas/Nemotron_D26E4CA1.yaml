  travel: Maher Uppal has already experienced short trips to the family's beachside cottage in Cape Cod and a weekend visit to the National Museum of Natural History in Washington, D.C., suggesting a curiosity
    for both relaxing getaways and educational outings.
  culinary: Maher Uppal's diet consists of pureed carrots, sweet potato mash, and banana-infused oatmeal, and they show a particular fondness for the smooth texture of avocado puree, reflecting a simple
    yet varied palate.
  core: Maher Uppal is a routine-loving newborn who balances a practical outlook with a relaxed, flexible demeanor, quietly absorbing the world while occasionally asserting themselves during playful moments.
background:
  cultural: Maher comes from a South Asian (Punjabi) family that maintains strong cultural and religious traditions while living in Teaneck, New Jersey. He grew up bilingual, speaking Punjabi at home and
    English in school and the community. Family gatherings, festivals like Vaisakhi, and daily prayers at the gurdwara are central to his identity. The community’s emphasis on hospitality, respect for elders,
    and practical work ethic shapes his values and daily routine. He navigates the balance between preserving these traditions and adapting to the multicultural environment of the Greater New York area.
