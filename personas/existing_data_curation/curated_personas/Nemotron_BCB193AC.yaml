  hobbies: '[''Watercolor painting'', ''Sketching mining equipment'', ''Reading art history'', ''Bird-watching'', ''Gardening'', ''Photography'', ''Local history research'', ''Documentary watching'', ''Listening
    to classical music'']'
  career_goals: As she approaches retirement age, Regina aims to transition from full‑time machine operation to a part‑time safety‑training consultant role, where she can share her practical knowledge while
    maintaining a quiet work schedule. She hopes to develop a visual‑based safety curriculum that leverages her artistic eye, using sketches and diagrams to make complex procedures more accessible. Additionally,
    she is interested in documenting the history of mining in Minnesota for a local museum exhibit, preserving the stories of the workers she has known for decades.
