  career_goals: Jing seeks a stable, full‑time position in office administration or project coordination where she can apply her organized, routine‑driven work style. In the next three years she aims to
    obtain a Certified Administrative Professional (CAP) credential and advance to an office manager role within a nonprofit or corporate setting that values teamwork and community impact. Long‑term, she
    envisions mentoring new staff and contributing to process‑improvement initiatives while maintaining a balanced work‑life schedule.
