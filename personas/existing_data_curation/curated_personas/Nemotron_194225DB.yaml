personas:
  professional: Zeenat Patel, a 16‑year‑old aspiring culinary‑visual creator, blends solid kitchen techniques with beginner graphic‑design flair, using structured project checklists yet flexible timelines
    to produce eye‑catching short cooking videos and social‑media graphics for friends and family.
  sports: Zeenat Patel enjoys weekend hikes on the nearby Great Falls trails, follows the Washington Wizards for basketball excitement, and occasionally joins a casual co‑ed soccer pick‑up at the community
    center, favoring low‑pressure cardio over competitive leagues.
  arts: Zeenat Patel draws creative fuel from A.R. Rahman's cinematic scores and Taylor Swift's pop anthems, crafting short TikTok choreography videos, sketching fan‑art of 'My Hero Academia' characters,
    designing Canva graphics with pastel palettes, and hand‑making beaded jewelry inspired by Maria Black's minimalist style.
  travel: Zeenat Patel favors spontaneous day trips to historic Old Town Alexandria and scenic hikes in Shenandoah National Park, while dreaming of a budget‑friendly summer immersion in Delhi's bustling
    street‑food markets, planning itineraries on a free map app that balances school commitments with wanderlust.
  culinary: Zeenat Patel loves to reinvent classic dal‑tadka by adding smoked paprika and avocado‑lime crema, pairs it with rosemary‑infused naan, and experiments with mango‑chili chutney on quinoa‑pani puri,
    showcasing a playful blend of traditional flavors and contemporary twists that they proudly share on their food blog.
  core: Zeenat Patel is a structure‑loving teen who balances disciplined cooking routines with spontaneous doodles, often juggling half‑finished DIY projects while humming a mash‑up of Bollywood beats and
    pop hits.
background:
  cultural: Zeenat is a second‑generation South Asian American, with parents originally from Gujarat, India. Her household celebrates Diwali, Navratri, and other cultural festivals, and family meals often
    feature homemade dhokla, samosas, and biryani. She is bilingual, speaking Gujarati at home while using English at school and in her social circles. The Patel family participates in the local Indian
    community association in the Philadelphia area, attending cultural events and supporting charitable initiatives. Zeenat balances these cultural traditions with typical American teenage experiences,
    navigating a bicultural identity that influences her food preferences, language use, and community involvement.
attributes:
  skills: '["Basic computer operation", "Social media content creation (TikTok, Instagram)", "Cooking South Asian dishes (Gujarati & Punjabi)", "Bilingual communication (English and Gujarati)", "Basic graphic
