  hobbies: '["Cooking traditional and fusion South Asian recipes", "Listening to Bollywood and pop music", "Sketching and digital illustration", "DIY jewelry crafting", "Playing strategy video games", "Reading
    young adult fiction", "Volunteering at local community events", "Exploring parks and nature trails in Montgomery County"]'
  career_goals: Zeenat plans to complete her GED within the next year and then enroll in a community‑college program focused on culinary arts or visual communications. She hopes to blend her love for cooking
    and design by launching a home‑based food blog or a small boutique bakery that showcases modern twists on traditional South Asian recipes. In the longer term, she envisions earning a certification in
    culinary management or building a freelance graphic‑design portfolio, which would give her the flexibility to support her family while pursuing creative work on her own schedule.
