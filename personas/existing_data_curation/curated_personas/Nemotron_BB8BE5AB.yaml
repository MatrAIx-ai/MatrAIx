  career_goals: Evelyn aims to progress from first-line supervision to store management within the next two years, followed by a district manager role overseeing multiple locations. Long-term, she envisions
    a senior operations position at the corporate level, where she can shape retail strategy using data analytics. To support this trajectory, she plans to pursue an MBA or a certification in retail management,
    deepen her expertise in advanced analytics, and lead cross-functional initiatives that boost sales efficiency and employee engagement.
