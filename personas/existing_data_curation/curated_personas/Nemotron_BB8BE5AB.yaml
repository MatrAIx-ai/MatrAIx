personas:
  professional: Evelyn Jenkins is a data‑driven retail supervisor who applies their STEM training to lead sales teams, optimize staffing schedules, analyze performance with Excel, SQL, and Tableau, and
    implement process‑improvement SOPs, all while maintaining a calm, methodical demeanor that keeps their store consistently above sales targets.
  sports: Evelyn Jenkins is a dedicated runner who logs weekly mileage with the New York Road Runners, practices yoga at a boutique studio in Brooklyn, follows the New York Knicks, Yankees, and Rangers,
    and occasionally joins intramural volleyball games at their local community center.
  arts: Evelyn Jenkins immerses themselves in the cultural pulse of Manhattan, attending Broadway shows like Hamilton and Hadestown, frequenting MoMA exhibitions featuring Yayoi Kusama, and curating playlists
    that blend Lin‑Manuel Miranda’s theatrical scores with Kendrick Lamar’s hip‑hop beats, using these artistic experiences to recharge after a structured workday.
  travel: Evelyn Jenkins plans their escapes with spreadsheet precision, taking weekend trips to the Hamptons for beach walks, hiking in the Adirondacks, and has already explored London and Barcelona, while
    dreaming of a tech‑focused adventure in Tokyo that blends professional networking with culinary discovery.
  culinary: Evelyn Jenkins loves experimental cooking, routinely whipping up miso‑glazed salmon with quinoa, experimenting with turmeric‑infused chickpea flour flatbreads, and using fresh basil and mint
    from their balcony garden, yet they occasionally forget to clean the kitchen after indulging in late‑night recipe trials.
  core: Evelyn Jenkins is a methodical retail manager who couples data‑driven efficiency with a passion for experimental cooking, marathon training, and meticulously plotted weekend getaways.
background:
  cultural: Evelyn grew up in a middle-class white family in the suburbs of New York City, where education and community involvement were emphasized. Her parents encouraged academic achievement, leading
    her to pursue a STEM degree at a state university. Living near the cultural hub of Manhattan exposed her to diverse perspectives, fostering an inclusive outlook and appreciation for the city's multicultural
    events. She celebrates typical American holidays, participates in local volunteer activities such as food-bank drives, and maintains strong ties to her family and hometown community while thriving in
    the fast-paced urban environment of New York.
