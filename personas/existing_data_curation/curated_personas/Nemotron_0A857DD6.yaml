  career_goals: As she approaches retirement age, Mackenzie aims to shift from frontline corrections to a senior advisory role, focusing on training, mentorship, and policy development within the Missouri
    Department of Corrections. She hopes to design and implement art‑therapy initiatives that bring her appreciation for the arts into rehabilitative programs. Long‑term, she envisions volunteering as a
    docent at the Springfield Art Museum and possibly authoring a practical guide on correctional best practices that integrates creative‑thinking techniques.
