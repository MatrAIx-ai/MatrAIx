personas:
  professional: Elizabeth Steadman is a meticulous bookkeeping and accounting professional with three decades of experience in small businesses and nonprofits, renowned for their mastery of QuickBooks Online,
    Xero, Sage 50, and advanced Excel automation, whose disciplined, organized nature and competitive streak drive them to transition into a part‑time advisory role, while they mentor junior accountants
    and pursue a CMA designation, developing workshops on stress‑resilient work habits for older professionals.
  sports: Elizabeth Steadman is an avid hiker who explores the East Bay’s Redwood Regional Park and Mount Diablo trails each weekend, they belong to the East Bay Trail Runners club, attend Oakland Athletics
    games in the summer and cheer for the Golden State Warriors during the NBA season, while maintaining a disciplined fitness routine that incorporates yoga classes at a community studio and bridge tournaments
    as a mental sport.
  arts: Elizabeth Steadman regularly visits the Oakland Museum of California, attends watercolor painting classes, they draw inspiration from Georgia O'Keeffe and contemporary Bay Area photographer Mark
    Schill, unwind at live jazz nights featuring John Coltrane tributes at Yoshi's, and fuel their creative perspective with historical fiction and philosophical essays.
  travel: Elizabeth Steadman prefers meticulously planned road trips along the Pacific Coast Highway, they have explored Napa Valley’s vineyards, the historic streets of Florence, Italy, and the ancient
    redwoods of Redwood National Park, while balancing a love for cultural festivals like the Cherry Blossom Festival in Washington, D.C., with a pragmatic budget that aligns with their retirement savings
    goals.
  culinary: Elizabeth Steadman enjoys cooking garden‑fresh ratatouille, roasted beets with feta, and homemade cioppino, they frequently harvest heirloom tomatoes and herbs from their vegetable patch, indulge
    in dim sum at San Francisco’s Chinatown, and experiment with seasonal dishes such as miso‑glazed salmon, reflecting an intermediate skill level that blends comfort cooking with adventurous flavors.
  core: Elizabeth Steadman is a detail‑obsessed, anxiety‑prone yet creatively curious accountant whose competitive spirit fuels a lifelong commitment to mentorship, community service, and the fine balance
    between disciplined budgeting and vibrant artistic pursuits, and they often juggle a spreadsheet in one hand while holding a paintbrush in the other.
background:
  cultural: Elizabeth is a White American whose family lineage traces back to Midwestern settlers, but she has spent most of her adult life in the San Francisco Bay Area, specifically in Hayward and the
    surrounding East Bay. Raised in a post‑war suburban environment, she internalized values of hard work, self‑reliance, and modest ambition. The diverse, progressive culture of the Bay Area has shaped
    her appreciation for the arts, community activism, and lifelong learning. She maintains traditional family customs such as holiday gatherings and home‑cooked meals while also embracing the multicultural
    food scene, local festivals, and community volunteerism that define the region’s social fabric.
