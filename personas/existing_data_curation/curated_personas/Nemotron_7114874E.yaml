  career_goals: At 63, Elizabeth aims to transition from full‑time clerical work to a part‑time advisory role where she can leverage her deep expertise to help small businesses improve financial health
    and compliance. She is pursuing the Certified Management Accountant (CMA) designation to formalize her knowledge, and plans to develop a series of workshops on modern bookkeeping practices and stress‑resilient
    work habits for older professionals. Driven by her competitive streak, she seeks recognition as a leading expert in the East Bay accounting community, aspiring to earn a regional "Financial Excellence
    Mentor" award. Ultimately, she envisions retiring with financial security while continuing to mentor junior accountants and volunteer her skills for local nonprofit financial literacy programs.
