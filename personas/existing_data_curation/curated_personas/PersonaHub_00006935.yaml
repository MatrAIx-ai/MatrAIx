persona_description: A ship engineer who specializes in the design and operation of oil burners and soot blowers on ships. Their expertise lies in the proper functioning and maintenance of these systems
  to ensure optimal combustion and efficient heat transfer. They are responsible for designing and implementing atomization and combustion air registration assemblies, as well as troubleshooting and adjusting
  these systems to achieve the desired results. They may also be involved in the development and testing of new technologies or materials to improve the efficiency and safety of oil burners and soot blowers.
