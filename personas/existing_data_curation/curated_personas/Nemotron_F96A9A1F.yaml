personas:
  professional: Jordan Bennett, a 59‑year‑old professor of art history and cultural studies, designs interdisciplinary curricula that fuse visual culture, digital storytelling, and regional environmental
    themes, while leveraging grant writing and exhibition curation skills, yet their spontaneous, unstructured work style sometimes clashes with academic deadlines.
  sports: Jordan Bennett stays active by walking with the Madison Walking Society along Lake Mendota’s shoreline, participates in occasional community‑organized pick‑up basketball games, and enjoys attending
    Milwaukee Bucks games for social connection, all while preferring low‑impact activities that accommodate their osteoarthritis.
  arts: Jordan Bennett regularly visits regional galleries to sketch scenes with a vintage Leica, draws inspiration from Grant Wood, Georgia O’Keeffe, and contemporary photographer Sally Mann, listens to
    Philip Glass piano works while practicing the piano for personal relaxation, and engages in small‑group literary readings and independent film screenings featuring directors like Kelly Reichardt.
  travel: Jordan Bennett favors spontaneous road trips to historic small towns such as Mackinac Island, Cedarburg, and the ghost town of Centralia, recording oral histories for local historical societies,
    plans most journeys on a whim with a portable recorder and a film camera, and dreams of a future pilgrimage to the ancient streets of Florence, Italy.
  culinary: Jordan Bennett cultivates heirloom tomatoes, rainbow carrots, and kohlrabi, often preparing a rustic heirloom tomato gazpacho or a roasted beet and goat‑cheese salad seasoned with fresh thyme,
    enjoys pairing meals with locally brewed microbrew, and, while their cooking skill is intermediate, they occasionally forget to salt dishes, resulting in surprisingly bland plates.
  core: Jordan Bennett is a 59‑year‑old art historian who blends scholarly rigor with spontaneous community storytelling, prefers quiet solitude punctuated by small‑group creative gatherings, and navigates
    life with curiosity, kindness, and a gentle resistance to heavily structured routines.
background:
  cultural: Jordan grew up in a small Midwestern town near Akron, Ohio, in a family with deep German‑English roots. Raised in a modest Methodist household, he absorbed values of community solidarity, humility,
    and a strong work ethic typical of the region. His upbringing emphasized appreciation for both practical stewardship of the land and cultural enrichment through local museums and libraries. The supportive
    environment of his late spouse, a community organizer, reinforced his kindness, cooperative spirit, and dedication to collective well‑being. These Midwestern sensibilities—pragmatic humility, reverence
    for local history, and an inclusive outlook—permeate his teaching philosophy and personal pursuits.
attributes:
