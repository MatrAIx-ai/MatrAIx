  hobbies: '[''Visiting art galleries and museums'', ''Sketching and drawing'', ''Photography with a vintage film camera'', ''Reading philosophy and contemporary fiction'', ''Playing piano'', ''Gardening
    heirloom vegetables'', ''Volunteering at the local historical society'', ''Attending small literary readings and indie film screenings'', ''Spontaneous road trips to historic sites'', ''Collecting antique
    books'']'
  career_goals: Jordan aims to launch an interdisciplinary course that fuses art history, digital storytelling, and regional environmental themes, culminating in a student‑curated exhibition series that
    highlights overlooked Midwestern artists. He plans to author a book exploring the cultural impact of regional art movements in the Great Lakes area and secure a research grant to investigate the intersection
    of visual arts and ecological stewardship. While he values the possibility of taking on a department advisory role focused on curricular innovation, he seeks to maintain flexibility and avoid overly
    bureaucratic responsibilities. Additionally, he aspires to expand community partnerships with local museums and historical societies, fostering greater public engagement with the humanities.
