  career_goals: Emily aims to transition into a technology architect role where she can shape strategic direction for enterprise applications while mentoring the next generation of developers. She plans
    to earn an AWS Solutions Architect certification and deepen her expertise in cloud‑native design to help rural businesses modernize their IT infrastructure. Over the next five years, she hopes to lead
    a cross‑functional team building a telehealth platform that expands access to healthcare in underserved Mississippi counties. Balancing professional growth with personal well‑being, Emily also envisions
    scaling back to a part‑time remote consulting arrangement that allows more time for her garden and community volunteering.
