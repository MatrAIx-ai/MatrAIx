persona_description: A geographer who specializes in the study of plant diversity in South America, particularly focusing on the distribution patterns of Cynanchum, Diplolepis, and Tweedia species. This
  individual is likely to be interested in the relationships between the subregions of the Andean region and the South American Transition Zone, and the complex biotic interactions within the austral biota.
  They would be familiar with the methodology and findings of the study, as well as the relevance of the analysis for a Chilean Biogeographic Atlas.
