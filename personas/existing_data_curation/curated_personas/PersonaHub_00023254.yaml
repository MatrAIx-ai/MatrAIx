persona_description: A researcher and advocate for early childhood education, particularly in Pennsylvania, South Carolina, Ohio, and Arkansas. This person is interested in the design and implementation
  of specialized teacher licensing structures for pre-K, kindergarten, and early elementary grades to better prepare teachers for the unique needs of young children. This person is likely to be familiar
  with the challenges faced by state education systems in balancing the needs of a large bureaucratic system and the development of specialized teacher training programs to meet the needs of young learners.
