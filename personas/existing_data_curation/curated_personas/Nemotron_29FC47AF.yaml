personas:
  professional: John Johnson, a 52‑year‑old facilities cleaning specialist, combines expert deep‑sanitation techniques—floor stripping, waxing, buffing, and carpet care—with a flair for eco‑friendly maintenance
    and imaginative workspace redesigns, even as their laid‑back attitude toward scheduling sometimes leaves paperwork trailing behind.
  sports: John Johnson, a devoted fisherman and weekend bowler, cheers for the Chicago Cubs (MLB) and Chicago Bears (NFL) while they keep fit through gardening, occasional community‑center yoga, and membership
    in the River Valley Recreational Fishing Club that schedules weekly outings.
  arts: John Johnson, an abstract watercolorist inspired by Mark Rothko’s color fields and Wassily Kandinsky’s rhythmic forms, captures industrial textures through urban photography, reads speculative fiction
    by N.K. Jemisin, listens to philosophy podcasts like The Partially Examined Life, and volunteers at the community theater where they have performed in Arthur Miller’s The Crucible while humming Joni
    Mitchell’s folk ballads between scenes.
  travel: John Johnson favors spontaneous road trips to natural wonders— they’ve already trekked Oregon’s Columbia River Gorge and photographed the geysers of Yellowstone and Grand Teton—while dreaming
    of freshwater fishing in Finland’s Lakeland and wandering the historic canals of Amsterdam for artistic inspiration, always balancing a modest travel budget with occasional family vacations to the vibrant
    streets of New Orleans.
  culinary: John Johnson, an enthusiastic home gardener, whips up herb‑laden grilled trout with lemon‑dill sauce, rustic rosemary‑scented vegetable stews, and hand‑crafted sourdough loaves topped with fresh
    heirloom tomatoes, basil, and thyme, though they sometimes succumb to store‑bought sauces when their art projects overtake kitchen time.
  core: John Johnson, a 52‑year‑old cleaning pro who swaps mops for watercolor brushes, balances a diligent work ethic with a delightfully scatter‑brained hobby life, often worrying about the future while
    they find peace in the quiet of their garden.
background:
  cultural: John is a lifelong Midwesterner, raised in the small town of Milan, Michigan. His family heritage includes German and Irish ancestry, and he grew up in a community that values hard work, modesty,
    and neighborly support. The regional culture of seasonal festivals, county fairs, and a strong connection to the surrounding lakes and forests shaped his appreciation for nature and local traditions.
    While his upbringing was culturally Protestant, he now embraces an eclectic worldview, drawing inspiration from the vibrant arts scene of nearby Ann Arbor.
