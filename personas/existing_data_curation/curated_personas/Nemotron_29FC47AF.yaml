  career_goals: John aspires to advance into a facilities supervisory role where he can mentor junior staff and implement sustainable cleaning programs. He plans to earn OSHA certification and a Certified
    Professional Cleaner credential to formalize his expertise. Additionally, he hopes to showcase his abstract artwork in local galleries and possibly launch a small side business selling prints, blending
    his creative passions with his professional experience.
