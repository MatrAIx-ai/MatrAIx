  gas emissions through the deployment of zero-emission vehicles and is interested in contributing to the development and implementation of policies and strategies to achieve these targets. They are also
  likely to be aware of the importance of infrastructure development, dealership and consumer education, and the transition of municipal fleets in achieving the collective target of 3.3 million zero emission
  vehicles by 2025.
