personas:
  professional: Steven Eide, a 22‑year‑old aspiring museum educator, merges their digital illustration skills and meticulous research ability to design interactive exhibition content while freelancing as
    a graphic designer for local nonprofits, balancing reliability with creative flexibility.
  sports: Steven Eide enjoys weekend hikes along the Piedmont Trail, is a regular member of the Wake Forest Running Club that trains for local 5K races, and casually follows the Carolina Hurricanes, cheering
    them on with fellow friends at local sports bars, a routine that helps them channel restless energy into healthy outlets.
  arts: Steven Eide devotes evenings to sketching figure studies in a well‑worn sketchbook, curates a personal art blog that references artists like Georgia O'Keeffe, Banksy, and Cindy Sherman, and frequently
    visits the Reynolda House Museum where they participate in docent‑led discussions to deepen their curatorial insight.
  travel: Steven Eide prefers low‑cost road trips that blend nature and culture, having driven to Asheville for its folk art scene and planning a future pilgrimage to the Musée d'Orsay in Paris to compare
    Southern folk traditions with European impressionism, all while balancing a student budget and occasional family obligations, illustrating how they integrate curiosity with financial mindfulness.
  culinary: Steven Eide balances a love for Southern comfort foods such as shrimp‑and‑grits with an experimental palate for sushi rolls and ramen, often cooking with fresh garden basil and chilies while
    listening to indie folk playlists, yet has a habit of nibbling on pistachios and sugary coffee drinks late into the night while sketching, a routine they find both soothing and slightly disruptive to
    their sleep.
  core: Steven Eide is a 22‑year‑old art‑driven, anxiety‑prone community advocate who blends digital design gigs, museum education ambitions, mindfulness rituals, and an insatiable curiosity about how creative
    expression can foster emotional well‑being.
background:
  cultural: Steven grew up in a suburban area of Wake Forest, North Carolina, within a middle‑class white family that values Southern hospitality, community involvement, and a respect for local traditions.
    His upbringing exposed him to regional folk art, country music, and outdoor activities like hiking in the nearby Piedmont trails. While his household holds conventional values, his parents encouraged
    intellectual curiosity, allowing him access to books, museum trips, and music beyond the typical Southern repertoire. This blend of Southern cultural roots and openness to broader artistic influences
    shapes his appreciation for both local heritage and contemporary global art movements.
attributes:
  skills: '[''Digital illustration'', ''Graphic design basics (Photoshop, Canva)'', ''Video editing (short-form content)'', ''Research and fact‑checking on art and culture'', ''Creative writing and blogging'',
    ''Basic HTML/CSS web design'', ''Public speaking and presentation'', ''Time management and organization'']'
  hobbies: '[''Sketching and figure drawing'', ''Visiting museums and galleries'', ''Photography (street and nature)'', ''Reading contemporary fiction and art theory'', ''Blogging about art and culture'',
    ''Mindfulness meditation and journaling'', ''Playing narrative‑driven indie video games'', ''Volunteering for community art workshops'']'
  career_goals: Steven aims to pursue an associate degree in Fine Arts or Art History at a local community college, with the long‑term ambition of working in museum education or community arts programming.
    He dreams of curating interactive exhibitions that make contemporary art accessible to diverse audiences, especially younger people who feel underserved. In parallel, he hopes to develop a freelance
    graphic‑design side business to fund his studies while offering services to local nonprofits. Over the next five years, Steven plans to combine his creative talents with his interest in mental‑health
    advocacy by facilitating art‑therapy workshops or creating digital content that promotes emotional well‑being. He is seeking internships at regional museums or cultural centers to gain practical experience
    and build a professional network.
