persona_description: A conservationist or ecologist who is interested in the restoration and protection of natural communities, particularly those in New York. They are knowledgeable about the ecological
  processes, hydrology, floristic variation, and characteristic fauna of Atlantic white cedar swamps, and are interested in researching their classification, ecological processes, and succession. They are
  also interested in inventorying and documenting the extent of this community type in New York, and conducting research to fill information gaps about coastal plain Atlantic white cedar swamps.
