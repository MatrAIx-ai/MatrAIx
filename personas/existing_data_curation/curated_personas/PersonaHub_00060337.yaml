persona_description: A scientist and engineer who specializes in bone tissue engineering and bone regeneration, particularly in the use of synthetic materials to repair and strengthen bone tissue. He has
  experience working with orthopedic surgeons and has successfully used Tetranite in rodent tests on Earth to stabilize dental implants and determine the strength of the bond Tetranite provides. He is interested
  in conducting experiments in space to further test the potential of Tetranite for orthopedic uses such as spinal fusion and dental repair.
