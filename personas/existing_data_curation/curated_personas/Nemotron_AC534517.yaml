  career_goals: Maria aspires to channel her curiosity and discipline into a career that combines science, compassion, and cultural advocacy. Her immediate goal is to win the upcoming school science fair
    with a project on animal health, earning recognition for her meticulous research. Long‑term, she dreams of becoming a veterinarian or wildlife biologist, where she can apply her scientific knowledge
    and love for animals while serving bilingual communities. She also envisions pursuing a degree in environmental health or community health education, enabling her to develop programs that teach children
    about nutrition, mental well‑being, and ecological stewardship, particularly for Spanish‑speaking families. Ultimately, Maria hopes to mentor younger students, sharing her organizational strategies
    and bilingual strengths to help them achieve academic success.
