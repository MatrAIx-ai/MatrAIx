personas:
  professional: April Payne is a preschool enthusiast who channels their organized, methodical nature into building elaborate block towers and leading group storytime, and they balance curiosity-driven
    experiments with practical, step‑by‑step planning.
  sports: April Payne loves the local community's junior soccer program at the YMCA, proudly wears a tiny Chicago Cubs cap while cheering, and they spend weekends climbing the playground's wooden fort,
    balancing vigorous play with a habit of carefully lining up for the slide.
  arts: April Payne is captivated by the whimsical melodies of Raffi and the bright colors of Disney's animated films, often reenacting favorite scenes with a cardboard microphone and crayons, and they
    adore drawing characters from Sesame Street.
  travel: April Payne has visited the bustling aquarium in Monterey, the magical rides of Disneyland, and the serene sand dunes of Aulani Resort, preferring short car rides with a favorite stuffed rabbit,
    and they eagerly collect postcards of each destination.
  culinary: April Payne adores buttery macaroni and cheese, the crisp snap of apple slices, and loves mixing peanut butter and jelly on whole‑grain bread, but they stubbornly refuse to eat broccoli, often
    sneaking extra grapes when no one watches.
  core: April Payne blends a curious, hands‑on spirit with a surprisingly organized routine, marching through playtime like a tiny project manager, never missing a chance to lead friends while hoarding
    bubble wands like treasure, and they do it all with an infectious giggle.
background:
  cultural: April is raised in a suburban American family in Spring Valley, Rockland County, New York. Her household observes major U.S. holidays such as Thanksgiving, Christmas, and the Fourth of July,
    and she attends a local preschool that reflects the diverse community of the area. While her ethnic background is white, she is exposed to the multicultural environment of the region, gaining an appreciation
    for a variety of cultural traditions and languages.
attributes:
  skills: '["counting to 20", "letter recognition (A‑Z)", "color identification", "hand‑eye coordination through block building", "simple puzzle solving", "cooperative group play", "following daily routines",
    "basic drawing of shapes", "singing familiar children’s songs"]'
  hobbies: '["building block towers", "organizing toys and books", "group storytime", "drawing and coloring", "dancing", "dress‑up play", "playdates with friends", "simple science experiments"]'
  career_goals: Even at four, April imagines future paths that combine her love of helping others and her inquisitive mind. She often says she wants to become a teacher because she enjoys sharing ideas
    with friends, and she also dreams of caring for animals as a veterinarian. Occasionally, she talks about exploring space or conducting experiments like a scientist, reflecting a blend of practicality
    and wonder.
