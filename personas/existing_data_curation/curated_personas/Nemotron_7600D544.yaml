    ''Community theater acting'', ''Social media content creation (TikTok, Instagram)'', ''Yoga and mindfulness meditation'', ''Journaling'']'
  career_goals: Connie aims to turn her sociable nature and curiosity into a career in community engagement or marketing. She plans to enroll in a bachelor’s program in communications or nonprofit management
    within the next two years, with the goal of becoming a community outreach coordinator for a local nonprofit or a marketing associate for a small business. She seeks a flexible role that allows creativity,
    regular interaction with people, and the ability to balance work with self‑care to manage her anxiety and emotional sensitivity.
