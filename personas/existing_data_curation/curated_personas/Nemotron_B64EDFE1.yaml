personas:
  professional: Prasanna Kalia, a market research analyst turned insight strategist, blends rigorous statistical analysis with charismatic storytelling, channeling their talkative, sociable nature into
    engaging stakeholder workshops and dynamic presentations while often juggling multiple projects on the fly due to a spontaneous temperament.
  sports: Prasanna Kalia, a regular participant in community cricket matches and a dedicated hiker of the Marin Headlands, follows the San Francisco Giants and Golden State Warriors with fervor, joins a
    local running club for weekly mile‑long runs, and balances seasonal fitness with relaxed weekend games, always buoyed by the collective spirit of the Bay Area sports scene.
  arts: Prasanna Kalia, an avid fan of improv comedy nights and indie music, frequently watches performances by The Second City alumni, draws inspiration from comedians like Bo Burnham, and curates playlists
    featuring Anderson .Paak and Tame Impala, weaving these artistic passions into their own storytelling style.
  travel: Prasanna Kalia, an adventurous traveler who prefers off‑beat cultural immersion, has explored the street food markets of Bangkok, trekked the terraced hills of Oaxaca, and plans a future culinary
    pilgrimage to Marrakech, balancing spontaneous weekend road trips with meticulously researched overseas itineraries.
  culinary: Prasanna Kalia, a self‑taught home chef, loves crafting fusion dishes that marry bold spices such as cumin and cardamom with Western staples—think curry‑infused tacos al pastor or butter‑chicken
    lasagna—while regularly hosting informal dinner parties where friends sample experimental plating alongside classic comfort foods.
  core: Prasanna Kalia blends data‑driven rigor with a talkative, community‑centric spirit, turning every insight into a social story while juggling spontaneous projects, yoga breaks, and a love for fusion
    cuisine.
background:
  cultural: Prasanna was raised in a South Asian household that traces its roots to the Indian state of Tamil Nadu. His family emphasized education, hospitality, and community, celebrating festivals such
    as Diwali, Pongal, and Navaratri with traditional foods, music, and gatherings. Bilingual in English and Tamil, he grew up navigating the dual expectations of his immigrant parents and the broader American
    culture of the Bay Area. This blend of collectivist family values and the entrepreneurial, open‑minded environment of San Francisco has shaped his collaborative yet forward‑thinking outlook. He remains
    active in the local Indian diaspora, participating in cultural events, volunteering at community festivals, and mentoring younger professionals of similar backgrounds.
attributes:
  skills: '["Market research design and execution", "Quantitative and qualitative data analysis", "Statistical modeling (SPSS, R, Python)", "Survey platform management (Qualtrics, SurveyMonkey)", "Data
    visualization (Tableau, Power BI)", "Digital marketing strategy", "Social media management", "Brand storytelling", "Public speaking and workshop facilitation", "Stakeholder communication and collaboration",
    "Cross‑cultural consumer insights", "Agile project management"]'
  hobbies: '["Attending tech and marketing meetups", "Participating in improv comedy shows", "Cooking fusion Indian‑American dishes", "Hosting dinner parties with friends", "Hiking the Marin Headlands and
    other Bay Area trails", "Street‑market photography", "Playing casual cricket with community groups", "Volunteering for digital‑skill workshops for youth", "Practicing yoga and mindfulness", "Traveling
    to explore global food cultures"]'
  career_goals: Prasanna aims to transition from a market research analyst to a senior insights leader within the next five years, ultimately becoming Director of Consumer Insights or Chief Marketing Officer
    for a tech‑forward company. He envisions building and mentoring high‑performing, interdisciplinary teams that blend data science, creative branding, and user experience. Embracing his curiosity, he
    plans to incorporate AI‑driven predictive analytics into everyday market research to deliver faster, more precise recommendations. He also hopes to earn an executive MBA to broaden his strategic perspective
    and to speak regularly at industry conferences, sharing his unique blend of data‑driven rigor and people‑centric storytelling.
