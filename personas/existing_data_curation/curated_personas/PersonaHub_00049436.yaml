persona_description: A company manager or owner who is interested in improving their company's environmental impact and is looking for tools and methods to measure and assess their impact on biodiversity.
  They are open to new ways of thinking and working with natural capital and are willing to invest in sustainable practices. They are familiar with the concept of a biodiversity footprint and are interested
  in learning more about the method and its application in their company. They are also interested in collaborating with others to improve the tool and make it more widely applicable.
