personas:
  professional: Melody Roberts, a 22‑year‑old visual artist and aspiring graphic designer, channels their highly imaginative mind and meticulous organization into crafting striking digital illustrations
    and community‑focused branding projects, while leveraging strong communication and improv skills to lead collaborative design workshops and secure an internship at a local ad agency.
  sports: Melody Roberts, a 22‑year‑old, kicks off mornings with the Portland Running Club, squeezes in yoga at Revolution Yoga, roots for the Portland Timbers in MLS and the Trail Blazers in the NBA, and
    joins pick‑up volleyball at the community center, treating exercise as a vital stress‑relief outlet but often skipping sessions after late‑night design sprints.
  arts: Melody Roberts, a 22‑year‑old visual storyteller, draws inspiration from the surreal abstractions of Yayoi Kusama, the street wit of Banksy, the lyrical flow of poet Amanda Gorman, and the atmospheric
    soundscapes of Radiohead, weaving these influences into daily sketches, digital collages, improv scenes, and late‑night visits to the Portland Art Museum.
  travel: Melody Roberts, a 22‑year‑old explorer, prefers thoughtfully planned weekend getaways that blend urban art tours in Berlin, hiking the basalt cliffs of Iceland, and attending indie music festivals
    in Austin, budgeting each trip with student discounts while dreaming of a solo pilgrimage to the cherry‑blossom streets of Kyoto.
  culinary: Melody Roberts, a 22‑year‑old culinary experimenter, delights in whipping up spicy Korean‑style tofu bibimbap with gochujang, perfecting flaky almond‑croissant pastries, and improvising seasonal
    vegetable ratatouille, while documenting each dish with vivid food photography that fuels their Instagram feed.
  core: Melody Roberts, a 22‑year‑old imagination‑driven perfectionist, fuses disciplined workflow with nightly bouts of over‑thinking, often losing sleep to perfect a palette while simultaneously curating
    community art events and hoarding an ever‑growing stash of sketchbooks.
background:
  cultural: Melody was raised in Blue Springs, Missouri, a suburban community in the Greater St. Louis area. Her family reflects a middle‑class Midwestern background with deep roots in the American heartland,
    emphasizing community involvement, modesty, and a solid work ethic. While her ethnic heritage is primarily European‑American, she grew up surrounded by the cultural diversity of the St. Louis metropolitan
    region, exposing her to a blend of traditional folk festivals, county fairs, and contemporary arts scenes. Her parents encouraged participation in school art programs, local theater, and community events,
    fostering an appreciation for both regional heritage and modern creative expression.
