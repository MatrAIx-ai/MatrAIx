  career_goals: Melody plans to enroll in a community‑college program in graphic design or visual communication, earn Adobe Creative Cloud certification, and secure an internship at a local advertising
    or design agency. She aims to build a robust portfolio of freelance projects, eventually launching her own boutique studio that focuses on community branding, event graphics, and digital art installations.
    Long‑term, she aspires to become a creative director or art director, leading collaborative, innovative campaigns that blend technology, storytelling, and social impact while maintaining a disciplined,
    high‑standard workflow.
