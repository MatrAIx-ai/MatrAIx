    conflict resolution'']'
  hobbies: '[''Woodworking'', ''Scale model railroading'', ''Photography'', ''Art museum visits'', ''Watercolor painting'', ''Gardening'', ''Hiking'', ''Attending community lectures'', ''Jazz and classical
    music listening'', ''Coffeehouse social gatherings'']'
  career_goals: Andrew aims to transition into a consulting role focused on sustainable retrofits for aging industrial equipment, while developing a series of workshops that bring engineers and local artists
    together to explore functional art installations. He hopes to publish a reflective memoir on the evolution of mechanical engineering practice and serve as an adjunct lecturer at the University of Illinois,
    sharing his experience with the next generation. Additionally, he aspires to mentor emerging engineers through community outreach programs that emphasize interdisciplinary thinking.
