personas:
  professional: Minerva Frago is a seasoned healthcare administrator who leverages her expertise in budgeting, compliance, and data‑driven quality improvement to coordinate interdisciplinary teams, while
    they maintain a skeptical eye on vendor contracts and balance innovative care models with proven protocols.
  sports: Minerva Frago enjoys low‑impact exercise, taking daily walks along Miami’s bayside trail, practicing gentle yoga, joining a local tennis club, and cheering for the Miami Heat and the Miami Marlins,
    while they favor solo workouts over competitive leagues.
  arts: Minerva Frago is an avid reader who devours classic and contemporary novels from Haruki Murakami to Mary Oliver, they unwind listening to jazz pianist Herbie Hancock and attending indie film screenings
    featuring Wes Anderson’s work.
  travel: Minerva Frago prefers thoughtful trips that blend quiet reflection with cultural exposure, often spending a week exploring the historic streets of Seville, a weekend retreat in the Florida Keys,
    and dreaming of the lavender fields of Provence, all while balancing travel costs with retirement savings.
  culinary: Minerva Frago finds therapeutic solace in cooking hearty root‑vegetable stews rich with aromatic herbs and corn‑based sides, skillfully balancing flavors with fresh herbs from their urban garden,
    though they sometimes over‑salt dishes when distracted.
  core: Minerva Frago blends a pragmatic, data‑driven career with a quiet, curiosity‑driven personal life, juggling relaxed organization, skeptical independence, and a penchant for heritage cooking and
    solitary walks.
background:
  cultural: Minerva’s Colombian heritage is a central thread of her identity. Raised in a bilingual household, she carries forward family customs, from festive gatherings infused with cumbia rhythms to
    the emphasis on hospitality and close‑knit relationships. Living in Miami’s vibrant Colombian diaspora, she maintains strong ties to her roots through community events, culinary traditions, and regular
    visits to family in Colombia. This cultural lens informs her professional perspective, fostering a deep commitment to culturally sensitive healthcare delivery that respects the values, language, and
    traditions of Latinx patients.
