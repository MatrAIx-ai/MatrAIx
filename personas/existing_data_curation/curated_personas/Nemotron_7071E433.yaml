    at community health fairs'']'
  career_goals: Minerva aims to advance to a regional director role overseeing multiple health service facilities in South Florida, with a focus on integrating innovative yet evidence‑based care models
    that improve patient outcomes for the Latinx community. She is driven to champion culturally responsive programs, expand telehealth services, and mentor emerging leaders in health management. Long‑term,
    she envisions steering a large integrated health system toward sustainable, patient‑centered care while maintaining operational efficiency and fiscal responsibility.
