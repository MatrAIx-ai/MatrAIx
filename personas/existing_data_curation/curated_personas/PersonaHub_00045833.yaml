persona_description: A member of the Property Council of Australia who is passionate about sustainable lighting innovations and the future of low-energy lighting design. They are interested in how new technologies
  such as LEDs, nano-materials, and advanced software design programs are revolutionizing the design of light fittings and their usage in the city. They are also interested in the after dark usage and enjoyment
  of public spaces and buildings without wasting energy. They are part of the Light Walk exhibit, which includes interactive and fun light art installations. They are also interested in the switch-off lights
  campaign and the World First? Australia Switching Off Incandescent Bulbs initiative.
