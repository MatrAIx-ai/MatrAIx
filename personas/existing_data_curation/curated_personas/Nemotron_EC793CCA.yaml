personas:
  professional: Charlotte Parris is a nine‑year‑old aspiring illustrator who spends countless afternoons drawing characters from her favorite graphic novels, channeling her boundless curiosity into bold
    line work while balancing school assignments with the routine of weekly art workshops.
  sports: Charlotte Parris is a nine‑year‑old soccer enthusiast who plays midfield for her local youth league, cheers loudly for Atlanta United FC, and brings her signature cheerleading chants to the sidelines,
    even when she’s on the bench.
  arts: Charlotte Parris is a nine‑year‑old art aficionado who frequents the Decatur Library gallery, joins community art workshops, draws inspiration from graphic‑novel creators like Noelle Stevenson and
    the animated worlds of Studio Ghibli, and often sings her school choir’s songs while sketching.
  travel: Charlotte Parris is a nine‑year‑old explorer who loves weekend trips to Stone Mountain Park and museum tours in Atlanta, dreams of seeing the Louvre’s Mona Lisa, and prefers travel plans that
    mix guided portions with free time for drawing new scenes, even if she overpacks her crayons.
  culinary: Charlotte Parris is a nine‑year‑old foodie who relishes cheesy pizza, macaroni‑and‑cheese, and perfecting strawberry cupcakes topped with glittery sprinkles, while occasionally sneaking an extra
    cookie before dinner despite her parents’ gentle reminders.
  core: Charlotte Parris is a curious, gregarious nine‑year‑old who blends artistic zeal with a love for soccer, constantly juggling school, sketchbooks, and a stash of glitter pens, and never misses a
    chance to be the center of attention.
background:
  cultural: Charlotte is an African‑American girl raised in Decatur, Georgia, a city known for its strong Black heritage and vibrant community activism. Her family participates in local cultural celebrations
    such as Juneteenth and African‑American History Month, and they attend a nearby historic Baptist church where gospel music and storytelling are integral parts of worship. Growing up in DeKalb County,
    Charlotte is exposed to a blend of Southern traditions and contemporary urban culture, which influences her appreciation for rhythm, oral histories, and the importance of community support. This cultural
    foundation nurtures her love of art, music, and collaborative experiences.
