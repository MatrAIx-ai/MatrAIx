  career_goals: Charlotte dreams of becoming someone who can combine art and community. She imagines herself as an art teacher who inspires kids to create, a children's book author who tells diverse stories,
    or a program coordinator at a local community center where she can organize creative workshops. She is motivated to use her love of art and her talent for connecting with people to make a positive impact
    on others.
