  hobbies: '[''Cooking Indian cuisine'', ''Hiking in the Ozarks'', ''Yoga'', ''Reading mystery novels'', ''Volunteer financial literacy workshops'', ''Gardening'', ''Listening to podcasts'', ''Weekend road
    trips'', ''Knitting'']'
  career_goals: Gitaben aims to achieve Fellowship status with the Society of Actuaries within the next three years, positioning herself for senior leadership roles such as Chief Risk Officer or Head of
    Actuarial Consulting. She is driven to specialize in health‑insurance risk management to improve access and affordability for underserved populations. Simultaneously, she aspires to mentor emerging
    actuaries, lead community‑focused financial literacy initiatives, and negotiate flexible work arrangements that allow her to balance her family commitments with her spontaneous, adventure‑seeking side.
