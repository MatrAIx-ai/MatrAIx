personas:
  professional: Gitaben Kurian is a meticulous actuary who leverages Python, R, and SAS to build predictive health‑insurance risk models, translating complex quantitative insights into clear client recommendations,
    while their compassion drives mentorship of junior analysts that sometimes stretches beyond scheduled deadlines, reflecting a balance of structured analytical rigor and spontaneous collaborative spirit.
  sports: Gitaben Kurian enjoys weekend hikes with the Ozark Trailblazers, practices yoga three times weekly at the Zen Flow studio, and loyally follows the St. Louis Cardinals and St. Louis Blues, blending
    a love for outdoor endurance with the camaraderie of live sports fandom.
  arts: Gitaben Kurian unwinds by devouring mystery novels from Agatha Christie and Tana French, listening to the soothing piano of Norah Jones and the sitar improvisations of Ravi Shankar, and occasionally
    attending local theater productions such as a community staging of 'The Crucible' featuring performances inspired by Meryl Streep.
  travel: Gitaben Kurian favors spontaneous weekend road trips, often mapping a rough itinerary in a spreadsheet before driving to destinations like the Grand Canyon, Asheville, and Nashville, while nurturing
    a long‑term dream of an organized summer immersion in Kyoto, Iceland’s hot springs, and Patagonia’s glaciers, balancing adventure with modest budgeting.
  culinary: Gitaben Kurian is an adept home chef who perfects fragrant biryani, buttery masala dosa, and smoky paneer tikka by balancing classic spice blends of cumin, coriander, and turmeric with experimental
    twists like smoked paprika, sourcing fresh cilantro and mango chutney from the farmer’s market.
  core: Gitaben Kurian is a structure‑loving actuary with a compassionate heart whose spontaneous love for hiking, cooking, and community teaching continually nudges them out of their comfort zone.
background:
  cultural: Gitaben is a first‑generation South Asian American of Indian descent, raised in a family that values education, community service, and cultural heritage. Bilingual in English and Malayalam,
    she celebrates festivals such as Diwali and Onam, participates in local Indian cultural associations, and maintains close ties with extended family both in the United States and India. Her upbringing
    blends traditional South Asian customs—like communal meals and respect for elders—with Midwestern American values, fostering a deep sense of belonging to both cultures.
attributes:
  skills: '[''Actuarial Modeling'', ''Statistical Analysis'', ''Risk Assessment'', ''Predictive Analytics'', ''Python'', ''R'', ''SAS'', ''Financial Forecasting'', ''Regulatory Compliance'', ''Client Relationship
