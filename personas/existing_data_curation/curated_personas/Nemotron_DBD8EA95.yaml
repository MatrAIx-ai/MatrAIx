    ''Attention to detail and quality control'']'
  hobbies: '[''Reading historical fiction and biographies'', ''Knitting and crocheting'', ''Gardening (vegetables and herbs)'', ''Baking Southern desserts'', ''Solving crosswords and Sudoku puzzles'', ''Birdwatching
    at local parks'', ''Listening to classical music and podcasts'', ''Photography of nature and garden'']'
  career_goals: Jasna aims to progress to an office manager or senior supervisory position within her organization, where she can oversee broader administrative functions while preserving the reliable,
    structured environment she values. She plans to formalize her education by completing a GED and pursuing an associate degree in business administration to enhance her credentials. In the short term,
    she seeks to implement efficiency projects that streamline office workflows, reduce errors, and boost staff productivity. Long‑term, she envisions a phased retirement that allows her to focus on personal
    interests while still offering her expertise as a mentor or consultant to younger employees.
