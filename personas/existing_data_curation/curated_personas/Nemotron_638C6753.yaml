personas:
  professional: Jeremy Inga, a 20‑year‑old visual‑arts education major at a Pennsylvania college, channels their curiosity and empathetic demeanor into dynamic lesson plans that blend acrylic painting,
    digital illustration, and storytelling, even as they adopt a relaxed attitude toward strict organization and improvise on the fly in the classroom.
  sports: Jeremy Inga enjoys weekend hikes with the Mechanicsburg Hiking Club, supports the Philadelphia Eagles and the Philadelphia Phillies, and occasionally joins a casual intramural soccer league at
    college, and they prefer low‑pressure, community‑centric activities over rigorous training regimens.
  arts: Jeremy Inga immerses themselves in the local arts scene, regularly attending the Mechanicsburg Art Walk, drawing inspiration from artists like Vincent van Gogh and contemporary street artist Banksy,
    strumming acoustic renditions of John Mayer while sketching urban scenes, and they frequently quote poets such as Ocean Vuong during class discussions.
  travel: Jeremy Inga favors spontaneous road trips to nearby cultural spots like Gettysburg and the Shenandoah Valley, dreams of exploring the Irish countryside in the future, and they balance a limited
    student budget with a love for affordable boutique hostels and scenic hiking trails.
  culinary: Jeremy Inga enjoys cooking modest meals, often whipping up spinach artichoke dip or banana bread using fresh basil, goat cheese, and locally sourced honey, while their culinary skill level hovers
    at enthusiastic amateur, and they occasionally swap recipes with friends after board‑gaming nights.
  core: Jeremy Inga, a 20‑year‑old art‑focused education student, blends boundless curiosity with a laid‑back, sometimes disorganized streak, constantly juggling creative projects, community involvement,
    and a quiet undercurrent of worry, and they strive to turn anxiety into artistic fuel.
background:
  cultural: Jeremy comes from a multigenerational white family rooted in the rural-suburban neighborhoods of Cumberland County, Pennsylvania. His ancestry is a blend of German and Irish heritage, reflected
    in family traditions such as holiday gatherings, church involvement at the local United Methodist congregation, and participation in community events like the annual Cumberland County Fair. Growing
    up in Mechanicsburg, he was exposed to a mix of Mid-Atlantic cultural influences, from historic colonial architecture to a thriving local arts scene. This background instilled a strong sense of community
    responsibility, an appreciation for American folk art, and an openness to broader cultural experiences fostered by his curiosity and artistic interests.
attributes:
  skills: '[''Lesson Planning'', ''Classroom Management'', ''Visual Arts Instruction'', ''English Literature Instruction'', ''Educational Technology (Google Classroom, Smartboards, Kahoot)'', ''Sketching
    and Digital Illustration'', ''Basic Photography'', ''Peer Mediation and Conflict Resolution'', ''Public Speaking'', ''Creative Writing Guidance'', ''Adaptability and Improvisational Teaching'']'
  hobbies: '[''Painting (acrylic)'', ''Sketching'', ''Digital illustration'', ''Playing acoustic guitar'', ''Creative writing (short stories, poetry)'', ''Reading contemporary fiction and poetry'', ''Hiking'',
    ''Photography'', ''Board gaming'', ''Attending local art exhibitions'']'
  career_goals: Jeremy aims to complete his bachelor's degree in Education with a concentration in Visual Arts within the next two years and obtain full state certification. He hopes to deepen his content
    expertise, earn a teaching endorsement in special education, and launch an interdisciplinary arts-integration program at his school. In the longer term, he envisions becoming a curriculum developer
    or department head, shaping district-wide arts curricula that emphasize creativity, student agency, and technology. He also aspires to organize community workshops that bring together students, local
    artists, and families, fostering a vibrant cultural exchange in Mechanicsburg.
