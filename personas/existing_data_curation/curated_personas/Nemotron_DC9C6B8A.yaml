  career_goals: In the short term, Johnathan aims to earn a certification in sales analytics and streamline his team's KPI reporting to free up time for strategic coaching. Over the next three to five years,
    he plans to advance to a regional sales manager role overseeing multiple offices in the Mid‑Atlantic, where he will champion the integration of AI‑driven forecasting tools while preserving his team's
    collaborative spirit. Long‑term, he aspires to become a director of sales operations, shaping corporate strategy and launching a mentorship program for young Black professionals interested in STEM‑based
    sales careers. Throughout his ambition ladder, he remains committed to maintaining a healthy work‑life balance, reducing personal stress, and supporting his family and community.
