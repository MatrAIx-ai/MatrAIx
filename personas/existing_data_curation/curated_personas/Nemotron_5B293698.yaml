  hobbies: '[''Gardening'', ''Fishing'', ''Woodworking'', ''Historical research'', ''Reading non-fiction'', ''Chess'', ''Crossword puzzles'', ''Volunteer work at the local historical society'', ''Attending
    small‑group bible study'', ''Model shipbuilding'']'
  career_goals: Although retired from formal employment, John aims to stay actively engaged in his community and preserve his mental sharpness. He aspires to author a memoir that weaves personal anecdotes
    with the rich history of Fort Myers, contributing chapters to the local historical society’s publications. He also seeks to mentor adult learners in basic research and writing skills through a community
    college outreach program. Maintaining his health and physical independence is a priority, so he plans to complete a full‑season garden that supplies fresh produce for his family. Finally, John hopes
    to refine his woodworking craft by building a traditional Gulf‑coast style boat, combining his love of practical skill with a personal challenge.
