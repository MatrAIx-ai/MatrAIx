  hobbies: '[''Vegetable gardening'', ''Hiking'', ''Landscape photography'', ''Reading non‑fiction (sustainability & business)'', ''Chess'', ''Woodworking'', ''Cooking Mexican cuisine'']'
  career_goals: Mario aims to advance beyond his current supervisory role to become an operations manager for a regional landscaping firm, overseeing multiple crews and larger service territories. In the
    longer term, he plans to launch his own eco‑focused landscaping business that emphasizes native, drought‑tolerant plants and smart‑irrigation technology. To support this vision, he intends to earn a
    LEED Green Associate credential and complete an MBA with a concentration in sustainable operations. He also seeks certification as a Certified Landscape Contractor to formalize his expertise and to
    set performance benchmarks that keep him ahead of competitors in the market.
