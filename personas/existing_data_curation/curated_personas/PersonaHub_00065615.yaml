persona_description: A retired NASA scientist who has been warning the world about orbital debris for more than 30 years, Don Kessler. Kessler is known for his landmark paper "Collision Frequency of Artificial
  Satellites" in 1978, which introduced the concept of the Kessler Syndrome, a theory that space junk collides with other space junk, producing more and more fragments, until the debris eventually renders
  low Earth orbit (within about 1,000 miles of Earth’s surface) impassable. Kessler is advocating for a simple policy shift to mandate that satellites fall out of orbit within 25 years, arguing that if
  people are told they will have to get their junk if it doesn’t de-orbit on schedule, then they will follow the guidelines.
