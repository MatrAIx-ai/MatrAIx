personas:
  professional: A preschool explorer who loves building block bridges, Joana Duenas channels their curiosity and practical mindset into meticulous play, organizing their toys while remaining flexible enough
    to improvise new structures, and though they prefer solitary tinkering, they confidently share their creations with a tight‑knit circle of classmates.
  sports: An energetic junior gymnast, Joana Duenas belongs to the Riverdale Rovers gymnastics club, where they balance disciplined routines with the joy of freestyle tumbling, and they cheer on the local
    baseball team, the Springfield Sluggers, during weekend games, though they sometimes feel nervous before performing.
  arts: A budding visual artist, Joana Duenas delights in coloring pages featuring characters like Peppa Pig and drawing whimsical scenes inspired by the music of child‑friendly singer Raffi, their favorite
    song 'Baby Beluga' often playing as they scribble with crayons, and they enjoy watching animated films starring Tom Hanks.
  travel: A cautious little traveler, Joana Duenas prefers short family road trips to familiar places such as the nearby zoo or the seaside boardwalk, but they dream of visiting Disneyland and the towering
    Eiffel Tower someday, always insisting on packing their treasured stuffed rabbit for comfort during flights.
  culinary: A picky yet adventurous eater, Joana Duenas adores chicken nuggets with honey mustard, loves macaroni and cheese sprinkled with cheddar, and occasionally helps stir batter for banana pancakes,
    savoring the sweet aroma of vanilla and the crunch of fresh apple slices, while they sometimes worry that new foods might upset their stomach.
  core: Joana Duenas is a thoughtful five‑year‑old who balances curiosity with caution, meticulously saves their allowance, monitors their mild allergies, enjoys gymnastics, draws with fervor, and dreams
    of big adventures while often worrying about the unknown.
background:
  cultural: Joana comes from a Mexican‑heritage family living in Hattiesburg, Mississippi. She grew up in a bilingual household where Spanish is spoken at home and English is used at school and in the community.
    Her family celebrates Mexican traditions such as Día de los Muertos, Mexican holidays, and enjoys cooking dishes like tamales, quesadillas, and homemade salsa, which she helps prepare. At the same time,
    she is exposed to Southern cultural influences—local festivals, southern cuisine like fried catfish, and the community’s emphasis on hospitality and neighborly support. This blend of Mexican and Southern
    cultures shapes her identity, fostering an appreciation for family gatherings, storytelling, and a respect for both her heritage and her local environment.
attributes:
  skills: '[''basic reading (phonics)'', ''counting to 20'', ''fine motor coordination (drawing, coloring, cutting)'', ''bilingual Spanish-English communication'', ''toy organization and cleanup'', ''simple
    puzzle solving'', ''structured routine adherence'', ''curiosity-driven questioning'']'
  hobbies: '[''reading picture books'', ''drawing and coloring'', ''building with wooden blocks'', ''small‑group playdates with one or two friends'', ''listening to Mexican lullabies and Southern folk music'',
    ''helping with simple kitchen chores'']'
  career_goals: Though only five, Joana already imagines future careers. She often says she wants to be a veterinarian because she loves caring for her family’s dog and neighborhood cats, and enjoys learning
    about animal health. She also dreams of becoming a teacher, motivated by her desire to share stories and help other children learn, reflecting her cooperative nature. Occasionally she mentions engineering,
    envisioning building sturdy bridges with blocks, which aligns with her practical mindset. Her ambitions are shaped by a wish for a stable, caring role that lets her help others while providing the routine
    and predictability that ease her worries.
