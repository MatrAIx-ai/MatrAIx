personas:
  professional: Lance Morgan, a one‑year‑old who meticulously arranges toy blocks by color and shape, demonstrates an early preference for structure and predictability; they thrive on routines and display
    a budding organizational talent that foreshadows future potential in logistics or project coordination.
  sports: Lance Morgan, a one‑year‑old enthusiastic participant in daycare crawling races and toddler gymnastics, proudly dons a tiny New York Yankees jersey and waves at televised games, and they find
    reassurance in group activities that buffer their occasional stress about new challenges.
  arts: Lance Morgan, a curious infant, spends hours watching the animated series "Bluey" and listening to Raffi’s "Baby Beluga", often dancing with a plush rabbit while they hum along, and they seek comfort
    in familiar melodies when feeling overwhelmed.
  travel: Lance Morgan, an infant explorer, has taken family road trips to the grandparents’ farm in Ohio and a weekend beach visit to the Outer Banks, marveling at sand between tiny toes, and they cling
    to a favorite soft blanket on unfamiliar rides to ease their worries.
  culinary: Lance Morgan, a one‑year‑old food adventurer, favors mashed sweet potatoes and avocado, practices self‑feeding with a small spoon, and they experience occasional frustration when the texture
    is too thick, prompting patient encouragement from caregivers.
  core: Lance Morgan, a one‑year‑old blend of structured curiosity, sociable energy, caring nature, and occasional fussiness, navigates tidy toy rows, baby‑sized money games, eczema routines, mini sports
    cheers, animated stories, family road‑trip wanderings, and messy spoon adventures, and they embody a uniquely organized yet compassionate outlook.
background:
  cultural: Lance comes from a white Southern family in Morristown, Tennessee. His upbringing reflects the region's emphasis on Southern hospitality, close‑knit community values, and family‑centered gatherings.
    He is regularly exposed to church‑related activities, country and Appalachian folk music, and local traditions such as county fairs and community picnics. These cultural influences foster his cooperative
    nature, respect for routine, and enjoyment of shared group experiences.
