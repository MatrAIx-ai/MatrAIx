persona_description: A translator who is familiar with the principles and theories of register analysis and has experience in using this approach in translation studies. They are well-versed in the work
  of Halliday and his followers, and are able to apply the register analysis framework to assess and evaluate texts. They have a strong interest in the relevance of register analysis to translation and
  are familiar with the use of register analysis as a tool in translation analysis. They are also skilled in the use of the systemic functional model and are able to apply it to the analysis of texts.
