  career_goals: Although retired, Alicia aims to continue contributing to her community by mentoring young women in STEM, supporting local science education through volunteer work at the Elkhart public
    library and the regional science museum, and establishing a modest scholarship for high‑school seniors pursuing technical degrees. She also wishes to stay intellectually active by taking online courses
    on emerging technologies such as artificial intelligence and renewable energy, and hopes to document her life experiences in a memoir that highlights the evolution of women in engineering over the past
    six decades.
