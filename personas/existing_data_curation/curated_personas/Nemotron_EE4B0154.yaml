personas:
  professional: A retired applied physicist and mechanical engineer, Alicia Wiles leverages their decades of lab experience and project‑management acumen to mentor high‑school robotics teams, design community
    STEM workshops, and meticulously document engineering histories in a forthcoming memoir.
  sports: A devoted supporter of the Indianapolis Colts and the Chicago Cubs, Alicia Wiles follows the seasons closely, joins a senior walking club for light cardio, and volunteers as a first‑base coach
    for the local senior softball league, preferring low‑impact activity that fits their energy levels.
  arts: A dedicated patron of the Elkhart Community Players, Alicia Wiles regularly attends productions starring veteran actress Carol Reynolds, delights in the folk songs of Bob Dylan, and occasionally
    sketches birds during park visits, though their ink often smudges.
  travel: A methodical traveler, Alicia Wiles plans leisurely heritage rail trips to Mackinac Island, weekend retreats to a Finger Lakes cottage, and an annual pilgrimage to the Smithsonian in Washington,
    D.C., funding these adventures from a modest travel fund they replenish every spring.
  culinary: A culinary enthusiast, Alicia Wiles whips up rustic vegetable stew with heirloom tomatoes, kale, and sweet potatoes from their garden, perfects buttery buttermilk biscuits with farm‑fresh butter,
    and treats themselves to blueberry cheesecake from a boutique bakery, yet they often forget to turn off the oven after an engrossing crossword session.
  core: A pragmatic curiosity‑driven creator, Alicia Wiles balances garden tending, woodworking, and mentorship with a meticulously kept schedule, though their habit of over‑committing sometimes leaves
    little room for spontaneous fun.
background:
  cultural: Alicia grew up in the post‑World War II Midwest, raised in a close‑knit, middle‑class family of German‑American descent in Elkhart, Indiana. The region’s industrial heritage, particularly the
    RV manufacturing sector, fostered a practical, hands‑on mindset. Community values such as modesty, self‑reliance, and hospitality shaped her outlook. She was active in her local Protestant church, which
    emphasized service and fellowship, and she experienced the societal shifts of the 1960s and 1970s that opened doors for women in science. These cultural influences, combined with a lifelong appreciation
    for Midwestern traditions—county fairs, local history, and civic engagement—remain integral to her identity.
