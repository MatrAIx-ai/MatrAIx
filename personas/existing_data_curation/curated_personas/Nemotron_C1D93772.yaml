    documentation reading'', ''Bilingual communication (Spanish/English)'']'
  hobbies: '[''Classic car restoration'', ''Model railroading'', ''Woodworking'', ''Fishing in Laguna Madre'', ''Cooking traditional Mexican dishes'', ''Listening to traditional Mexican music'', ''Playing
    acoustic guitar'', ''Reading technical manuals and historical printing literature'', ''Participating in small community gatherings (church events, cultural festivals)'']'
  career_goals: Cruz aspires to transition into a senior supervisory role, such as Production Manager, where he can codify his high‑standard processes across the entire shop. He aims to earn a recognized
    industry certification (e.g., Printing Industry Certified Technician) within the next year to formalize his expertise. He plans to adopt emerging digital finishing technologies—like 3D printed book
    covers and advanced UV embossing—to keep his services competitive. Over the next two years, he targets a 15 % improvement in production efficiency through lean initiatives he designs and implements.
    In the longer term, he envisions opening a boutique binding studio that offers custom, high‑quality projects for local businesses, cultural organizations, and family commissions, allowing him to mentor
    apprentices and pass on his craftsmanship. He also seeks to secure a stable financial base for retirement while maintaining part‑time consultancy on process improvement.
