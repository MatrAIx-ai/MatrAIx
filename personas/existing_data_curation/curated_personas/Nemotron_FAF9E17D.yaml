  career_goals: Over the next five years, Mark aims to earn tenure by completing a doctoral degree in American Studies, publishing a monograph on 20th‑century literary modernism, and expanding his course
    offerings to include interdisciplinary environmental humanities and digital media classes. He seeks to assume a program‑coordinator role, launch community‑based learning projects that partner students
    with local cultural organizations, and become a recognized mentor for emerging scholars. Long‑term, he envisions achieving full professorship, shaping departmental strategy, and championing inclusive,
    experiential pedagogy at his institution.
