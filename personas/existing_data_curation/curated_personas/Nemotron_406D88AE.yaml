personas:
  professional: Saleta Hagen is a high‑school sophomore who thrives on the stage of school drama productions, channeling their talkative, competitive spirit into captivating performances while simultaneously
    applying the same structured, goal‑oriented mindset to managing the varsity basketball team’s logistics and their freelance social‑media design gigs.
  sports: Saleta Hagen is a guard on the high school varsity basketball team, fiercely competitive on the court, cheering for the Chicago Bulls and the WNBA’s Chicago Sky, while also training with the local
    youth hoops club and participating in summer basketball camps to sharpen their game.
  arts: Saleta Hagen merges their love for drama with a flair for digital media, producing short TikTok‑style videos starring themselves in quick skits inspired by the works of Lin‑Manuel Miranda and the
    choreography of Beyoncé, while experimenting with fashion trends from designers like Virgil Abloh and curating Instagram feeds that showcase eclectic playlists featuring Ariana Grande and BTS.
  travel: Saleta Hagen prefers meticulously planned weekend getaways, often visiting nearby amusement parks like Six Flags with friends, dreaming of a spring trip to New York City’s Broadway district, and
    drafting detailed itineraries that balance photo‑ops for social media with time for spontaneous street‑food hunts.
  culinary: Saleta Hagen enjoys a mix of high‑energy meals such as grilled chicken wraps and quinoa bowls to fuel basketball practice, while indulging in late‑night pizza slices and mastering the art of
    avocado toast, using a modest kitchen toolkit and a YouTube tutorial habit to experiment with new recipes.
  core: Saleta Hagen is a charismatic, structure‑loving teen who balances the spotlight of drama and basketball with a competitive edge, a penchant for meticulous budgeting, and a habit of snapping selfies
    mid‑practice to capture every triumph.
background:
  cultural: Saleta grew up in a white, middle‑class family in South Bend, Indiana, immersed in Midwestern values of hard work, community involvement, and modesty. Her family’s cultural traditions include
    attending local church services (likely Protestant), celebrating typical American holidays, and participating in community events such as county fairs and high‑school sports nights. The proximity to
    the University of Notre Dame and the city’s industrial‑to‑service‑economy transition have exposed her to a blend of academic and working‑class perspectives, shaping her pragmatic outlook and appreciation
    for organized community life.
