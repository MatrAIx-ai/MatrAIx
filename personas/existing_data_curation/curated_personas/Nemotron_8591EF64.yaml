  career_goals: Cassie aims to achieve tenure within the next three years while establishing an interdisciplinary data‑science program that bridges computer science, mathematics, and applied engineering.
    She seeks to secure multi‑year research grants that allow her to develop industry‑relevant course modules and to publish in peer‑reviewed journals on effective STEM pedagogy. In the longer term, she
    aspires to serve as department chair, using her competitive drive to elevate program rankings and student outcomes, and to launch a consultancy that advises colleges on curriculum redesign and assessment.
