persona_description: A marine scientist working for the National Oceanic and Atmospheric Administration (NOAA) in the Great Lakes region, responsible for conducting research on the ecological forecasting
  model for the Great Lakes. The ROV (remotely operated vehicle) is used to gather data in the underwater environment and analyze the impact of biological, chemical, physical, and human-induced changes
  on the ecosystem and its components. The ROV is equipped with a high-resolution video camera, LED lights, and a wide-angle camera for underwater exploration and inspection. The ROV operator is responsible
  for the inspection and recovery of current meter moorings and the exploration and study of shallow water sediments.
