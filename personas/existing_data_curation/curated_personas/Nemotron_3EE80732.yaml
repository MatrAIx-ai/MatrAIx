  hobbies: '[''Reading historical fiction'', ''Crocheting and needlework'', ''Gardening (flowers and vegetables)'', ''Genealogy research'', ''Attending church choir events'', ''Volunteering as a literacy
    tutor'', ''Walking local nature trails'', ''Participating in a senior book club'', ''Seasonal Southern cooking'', ''Visiting family in nearby states'']'
  career_goals: Although retired, Janice aims to stay actively engaged by leading adult literacy workshops at the local library, documenting and preserving Villa Rica’s local history, and mentoring new
    teachers on a volunteer basis. She wishes to learn digital photography to capture community events, write a memoir of her teaching career for future generations, and practice mindfulness techniques
    to better manage her worry and stress. Financially, she seeks to ensure her family’s stability while prioritizing health and quality time with her husband.
