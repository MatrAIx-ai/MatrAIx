personas:
  professional: Janice Newman, a retired elementary teacher with decades of curriculum development and literacy advocacy experience, now channels her curiosity and practical mindset into leading adult literacy
    workshops at the local library, mentoring new teachers, and documenting Villa Rica’s local history, while they navigate their relaxed, somewhat disorganized approach by relying on flexible schedules
    and a love for small‑group collaboration.
  sports: Janice Newman enjoys leisurely walks along the nearby nature trails with her husband and follows the Atlanta Braves, Atlanta Falcons, and the University of Georgia Bulldogs for a sense of community
    spirit, while they occasionally join a senior walkers’ club that meets for low‑impact aerobic sessions at the local park.
  arts: Janice Newman cherishes her role in the church choir, often humming hymns of the Mormon Tabernacle Choir and listening to the blue‑grass stylings of Alison Krauss, while at home they stitch crocheted
    blankets inspired by historic Southern quilt patterns and read historical fiction by authors like Philippa Gregory and Ken Follett, finding solace in these creative pursuits.
  travel: Janice Newman prefers relaxed, road‑trip style travel with her husband, revisiting family in North Carolina and exploring historic sites in Charleston, Savannah, and Nashville, while they plan
    future visits to the Great Smoky Mountains to combine gentle hiking with photo‑opportunities, all on a modest budget that prioritizes family time over luxury.
  culinary: Janice Newman delights in seasonal Southern cooking, preparing comfort classics such as fried chicken, collard greens, peach cobbler, and shrimp and grits using fresh garden harvests of tomatoes,
    okra, and herbs, while they occasionally experiment with a cast‑iron skillet for cornbread and admit to over‑seasoning with salt when stressed.
  core: Janice Newman blends a lifelong dedication to education with a love for solitary hobbies, a gentle worry about health, and a flexible, sometimes chaotic, approach to life that keeps them both grounded
    and delightfully eclectic.
background:
  cultural: Janice grew up in rural Georgia, shaped by Southern hospitality, a strong sense of community, and deep involvement in church life. Her white Southern heritage includes traditions of modesty,
    family loyalty, and a work ethic rooted in agricultural and small‑town values. Experiencing the social changes of the 1960s and 1970s as an educator, she blends respect for longstanding customs with
    a curiosity for new ideas, resulting in a balanced outlook that honors both tradition and progress.
