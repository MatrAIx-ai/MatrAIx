  career_goals: Sun aims to translate her curiosity and practical experience into a senior management role within the retail sector. She plans to earn a retail‑management certification, take on assistant‑store‑manager
    responsibilities, and ultimately become a store manager who leverages data‑driven strategies to exceed sales targets. Long‑term, she aspires to a regional training position where she can mentor emerging
    talent and introduce emerging retail technologies such as AI‑based inventory systems. Parallel to her professional trajectory, Sun is considering launching a boutique that curates high‑quality East‑Asian
    tech and lifestyle products, allowing her to blend her cultural heritage with entrepreneurial ambition.
