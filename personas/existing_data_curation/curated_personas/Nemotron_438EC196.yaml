personas:
  professional: Sun Zhang, a 56‑year‑old retail veteran with a STEM bachelor’s degree, leverages data‑driven visual merchandising, bilingual communication in Mandarin and English, and a knack for mentoring
    to boost store sales, even as their relaxed approach to planning sometimes leads to last‑minute rushes.
  sports: Sun Zhang, an energetic participant in weekly Zumba and line‑dance classes, regularly cheers for the hometown baseball team, the Springfield Sluggers, joins a casual pick‑up volleyball league
    at the community center, and uses a fitness tracker to log steps, blending group enthusiasm with personal competition.
  arts: Sun Zhang, a karaoke enthusiast who loves belting out Whitney Houston’s I Will Always Love You, regularly attends live shows by The Lumineers, and immerses themselves in science‑fiction novels by
    Liu Cixin and Isaac Asimov, lets music and literature fuel their spontaneous social gatherings.
  travel: Sun Zhang, whose travel planning oscillates between spontaneous bookings and cultural curiosity, has toured Tokyo, Seoul, and Hong Kong to reconnect with family, dreams of strolling through Suzhou’s
    classical gardens, and occasionally escapes to Napa Valley for weekend wine tastings despite a modest travel budget.
  culinary: Sun Zhang, who finds creative fulfillment in cooking traditional dishes like kung pao chicken, mapo tofu, and scallion pancakes using Sichuan peppercorns, fermented bean paste, and fresh scallions,
    experiments with a smart sous‑vide machine, and enjoys sharing samplings at karaoke nights with friends.
  core: Sun Zhang is a sociable, data‑savvy retail leader who fuses a love of gadgets, karaoke, and spontaneous travel with a relaxed, sometimes disorganized outlook, creating a vibrant yet occasionally
    chaotic life.
background:
  cultural: Sun Zhang was born to Chinese immigrant parents and grew up in a bilingual household where Mandarin and English were spoken daily. Her family places strong value on education, respect for elders,
    and cultural traditions such as celebrating Lunar New Year and the Mid‑Autumn Festival. Living in Las Vegas, she blends these customs with the city’s vibrant, multicultural scene, often sharing Chinese
    cuisine and customs with coworkers and friends. Sun maintains close ties with relatives in Beijing and Shanghai, frequently video‑calling them and sending gifts during holidays. This bicultural experience
    shapes her worldview, fostering both a respect for her heritage and an adaptive, open‑minded approach to American life.
