personas:
  professional: Corey Mcwilliams, a 20‑year‑old pharmacy technician, brings meticulous record‑keeping and a curiosity for drug mechanisms, they use assertive yet cooperative communication to verify prescriptions,
    compound sterile preparations, and streamline pharmacy workflow through DIY coding scripts.
  sports: Corey Mcwilliams, a 20‑year‑old outdoor enthusiast, hikes solo along Texas Hill Country trails, they follow Austin FC in Major League Soccer and the Texas Rangers in baseball, and adhere to a
    disciplined cardio routine that alternates weekend trail runs with occasional gym sessions for strength training.
  arts: Corey Mcwilliams, a 20‑year‑old lover of narrative, immerses themselves in science‑fiction literature by authors such as Neal Stephenson and Margaret Atwood, they enjoy the atmospheric scores of
    Vangelis, play narrative‑rich RPGs like The Witcher 3, and find quiet inspiration in the folk music of Sufjan Stevens and the paintings of Andrew Wyeth.
  travel: Corey Mcwilliams, a 20‑year‑old planner of solitary getaways, creates meticulous itineraries, they have explored Enchanted Rock in Texas, backpacked the Rocky Mountains in Colorado, and dream
    of witnessing the Northern Lights in Iceland and the ancient temples of Kyoto, Japan.
  culinary: Corey Mcwilliams, a 20‑year‑old home chef, enjoys preparing simple yet flavorful meals, they often make avocado toast with chili flakes, chicken enchiladas with homemade salsa, and matcha smoothies,
    favoring ingredients like turmeric, cilantro, smoked paprika, and occasional sriracha for a kick.
  core: Corey Mcwilliams, a 20‑year‑old methodical introvert, balances scientific curiosity with a quiet, organized lifestyle, they punctuate their days with solo hikes, puzzle‑solving, and a meticulous
    budgeting habit.
background:
  cultural: Corey grew up in a middle‑class, white family in the suburban community of Leander, Texas. His upbringing reflects the values of the Central Texas region—self‑reliance, modesty, and a respect
    for hard work. He was exposed to a blend of traditional Southern hospitality and the pragmatic, forward‑looking culture of a growing Austin‑metro area. The local community’s emphasis on health and family‑friendly
    living shaped his decision to pursue a career in pharmacy. While his family’s cultural traditions are rooted in mainstream American Anglo‑heritage, he also appreciates the diverse influences of the
    broader Texan environment, including the importance of community service and a laid‑back lifestyle.
attributes:
  skills: '[''Prescription verification'', ''Medication compounding'', ''Pharmacy inventory management'', ''Drug interaction knowledge'', ''Pharmacy software operation (e.g., QS/1)'', ''Medical terminology'',
    ''Insurance claim processing'', ''Customer service basics'', ''Data entry accuracy'', ''Quality control'']'
  hobbies: '[''Reading science-fiction novels'', ''Solo hiking in the Hill Country'', ''Playing single-player RPG video games'', ''DIY electronics projects'', ''Studying pharmacology through online courses'',
    ''Puzzle solving (crosswords, Sudoku)'', ''Listening to medical research podcasts'', ''Journaling and habit tracking'']'
  career_goals: Corey aims to transition from a pharmacy technician to a fully licensed pharmacist within the next five years. He plans to complete his remaining prerequisites and enroll in a Doctor of
    Pharmacy program at a Texas university. In the interim, he intends to earn the Certified Pharmacy Technician (CPhT) credential, specialize in sterile compounding, and seek management experience in a
    community pharmacy. Ultimately, Corey envisions opening a small, quiet pharmacy in Leander, where he can provide personalized care while maintaining a low‑stress, organized environment.
