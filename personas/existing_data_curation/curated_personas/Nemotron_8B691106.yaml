    and succession planning"]'
  hobbies: '["Abstract watercolor painting", "Experimental cooking blending Southeast Asian and Tex‑Mex flavors", "Visiting art museums and galleries", "Attending jazz and world‑music concerts", "Practicing
    tai chi", "Reading philosophy and science‑fiction literature", "Urban gardening", "Collecting vintage vinyl records", "Volunteering as an English tutor for immigrants", "Traveling to ancestral homeland
    in Southeast Asia"]'
  career_goals: Looking ahead, Agapito aims to transition from daily floor supervision to a mentorship and consulting role, sharing his compassionate leadership philosophy with emerging retailers. He plans
    to open a boutique that blends Southeast Asian artistry with contemporary fashion, providing a platform for local artisans and showcasing cultural heritage. He also envisions developing a training program
    focused on inclusive, harmony‑driven retail practices and dedicating more time to volunteer as a career coach for younger community members. Through these efforts, he hopes to leave a lasting legacy
    of collaborative, culturally rich retail environments.
