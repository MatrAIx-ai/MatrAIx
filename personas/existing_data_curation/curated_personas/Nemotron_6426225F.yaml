  hobbies: '[''Adult basketball league'', ''Weekend BBQ gatherings'', ''Hiking in Red Rock Canyon'', ''Classic car restoration'', ''Watching professional football'', ''Attending live music concerts'', ''Community
    volunteer events'', ''Spontaneous road trips'']'
  career_goals: Noah aims to step into a regional operations manager role within the next five years, overseeing multiple facilities and driving enterprise‑wide efficiency projects. He plans to earn the
    Certified Maintenance Manager (CMM) credential to formalize his expertise. Long‑term, he envisions launching a boutique mechanical contracting firm that leverages his network and offers high‑quality,
    on‑time service. Throughout his career progression, he wants to be recognized for building high‑performing teams, delivering measurable cost savings, and mentoring the next generation of skilled tradespeople.
