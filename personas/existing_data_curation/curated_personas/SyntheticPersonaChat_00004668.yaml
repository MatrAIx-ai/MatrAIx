data:
  user 1 personas: 'I hope to retire to florida.

    My mother and father are both in the church choir.

    I own my own music store.

    I played in a band for 17 years.'
  user 2 personas: 'I have 4 dogs.

    I enjoy swimming.

    I have a missing pinky toe.

    I do not like green eggs and ham.'
  Best Generated Conversation: 'User 1: I''m thinking about retiring to Florida. Do you have any experience living there?

    User 2: I do! I lived in Florida for a few years and I loved it. The weather is great, there are a lot of things to do, and the people are friendly.

    User 1: That sounds great! What kind of things do you like to do in Florida?

    User 2: I love to go swimming, sunbathe, and fish. I also enjoy going to the beach and playing in the sand.

    User 1: That sounds like a lot of fun! I''m not much of a swimmer, but I love to sunbathe and fish. I also love to go to the beach and play in the sand.

    User 2: We sound like we''d get along great!

    User 1: I think so too! I''m sure we''d have a lot of fun together in Florida.

    User 2: I''m sure we would too. Let''s go sometime!

    User 1: Sounds like a plan!

    User 2: Great!

    User 1: So, what are you doing in town?

    User 2: I''m here visiting my parents. They live here now.

    User 1: Oh, that''s nice! I''m glad you''re visiting them.

    User 2: Me too. I don''t get to see them very often.

    User 1: I understand that. My parents live in another state, so I don''t get to see them very often either.

    User 2: It''s hard, but it''s worth it to see them.

    User 1: It is. I''m glad you''re here to visit them.

    User 2: Me too.

    User 1: I know you said you''re not a swimmer, but would you like to go swimming with me?

    User 2: Sure! I''ve never been swimming in Florida before.

    User 1: Great! I''ll take you to my favorite spot.

    User 2: Sounds good!'
