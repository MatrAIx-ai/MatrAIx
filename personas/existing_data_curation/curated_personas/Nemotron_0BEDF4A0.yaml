  career_goals: Approaching retirement, Julian aims to transition from full‑time labor to a part‑time supervisory and consulting role. He hopes to start a small, owner‑operated remodeling business that
    specializes in senior‑friendly home modifications, allowing him to apply his practical expertise while reducing physical strain. He also plans to mentor apprentices, share his knowledge through informal
    workshops, and eventually compile a guide on traditional construction techniques blended with modern sustainable methods. Giving back to the Walsenburg community through volunteer building projects
    and local trade schools remains a key ambition.
