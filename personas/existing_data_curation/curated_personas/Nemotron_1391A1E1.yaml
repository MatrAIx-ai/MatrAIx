  career_goals: Cynthia aims to channel her analytical strengths and practical ingenuity into a senior administrative or data‑analysis role within a government agency or nonprofit organization in the Washington,
    D.C. area. She aspires to lead small projects that improve office efficiency, mentor new clerical staff, and eventually develop a part‑time consultancy helping small businesses streamline their data
    processes before she retires. While she values stability, she also wishes to stay intellectually engaged by learning advanced data‑visualization tools and possibly earning a certification in business
    analytics.
