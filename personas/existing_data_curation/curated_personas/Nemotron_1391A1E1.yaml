  hobbies: '[''Reading (science‑fiction, popular science)'', ''Puzzle solving (crosswords, Sudoku, logic games)'', ''Gardening (vegetables, herbs)'', ''Bird‑watching'', ''Astronomy club meetings'', ''Piano
