personas:
  professional: Cynthia Wentzy is a data‑savvy administrative professional in the Washington, D.C. area who blends STEM training with a penchant for flexible, ad‑hoc process improvements, using Excel, Access,
    and Python scripts to streamline office workflows while eye‑balling senior roles that let they mentor staff and eventually launch a part‑time consultancy for small‑business data efficiency.
  sports: Cynthia Wentzy follows the Washington Capitals and Washington Wizards avidly, participates in the DC Seniors Walking Club for weekly strolls through Rock Creek Park, and enjoys occasional light
    tennis at a local community court, balancing low‑impact activity with a love for team spirit.
  arts: Cynthia Wentzy nurtures a quiet artistic side by playing piano pieces by Beethoven in a sunlit corner, attending Smithsonian exhibitions featuring Ansel Adams photography, and devouring science‑fiction
    novels by Ursula K. Le Guin while sipping Aeropress coffee.
  travel: Cynthia Wentzy prefers purpose‑driven travel, such as weekend trips to the Shenandoah Valley for bird‑watching, annual visits to the International Dark‑Sky Park in New Mexico with the astronomy
    club, and carefully planned tours of historic libraries in Oxford, balancing curiosity with budget‑conscious itineraries.
  culinary: Cynthia Wentzy delights in home‑brewed coffee, experimenting with pour‑over and Aeropress methods using Guatemalan beans, while cooking garden‑fresh roasted zucchini, beet salads, and occasional
    ratatouille, showcasing a modest but precise culinary skill set.
  core: Cynthia Wentzy is a curious, competitive, solitary problem‑solver who excels at data puzzles, embraces flexibility over strict deadlines, and occasionally lets a love of coffee and crossword races
    dominate their day.
background:
  cultural: Cynthia identifies as a White American with deep roots in the Mid‑Atlantic region. Raised in a suburban environment near Washington, D.C., she was exposed to a blend of traditional American
    values—self‑reliance, pragmatism, and respect for community institutions—alongside the intellectual currents of nearby universities and cultural venues. Her upbringing emphasized education, hard work,
    and civic responsibility, which continue to shape her balanced, practical outlook and her appreciation for both established methods and new ideas.
