personas:
  professional: Geovanny Perez is a seasoned warehouse logistics specialist whose hands‑on expertise with forklift operation, inventory management, OSHA safety compliance, and bilingual communication fuels
    a collaborative, data‑driven approach as they pursue a shift‑lead role and formal logistics certifications.
  sports: Geovanny Perez channels their energetic, sociable nature into weekend intramural soccer at the local recreation center, early morning runs with the Saturday Morning Run Club, and enthusiastic
    support for San Antonio FC and the Spurs, blending competitive play with a community‑focused fitness mindset.
  arts: Geovanny Perez’s cultural heartbeat resonates through Tejano and cumbia playlists—ranging from Selena to Los Tigres del Norte—sparking spontaneous dances at Fiesta San Antonio, regular attendances
    at community theater productions, and a keen appetite for transportation‑history documentaries.
  travel: Geovanny Perez favors road‑trip adventures across Texas, having explored the vineyards of Fredericksburg, the sandy shores of South Padre Island, and the lively street art scene of Austin, while
    dreaming of a summer getaway to the Pacific Northwest for hiking and kayaking, always planning trips around work schedules and family commitments.
  culinary: Geovanny Perez balances weekend family cooking sessions where they expertly marinate pork al pastor with achiote and pineapple, steam corn husks for tamales, and craft fresh salsa verde with
    cilantro and tomatillos, while also enjoying brisket tacos from local food trucks, showcasing a comfort‑level that ranges from home‑cooked staples to exploring new flavor pairings.
  core: Geovanny Perez blends a practical logistics mind with a lively community spirit, juggling forklift duties, soccer, family taco nights, and a steady march toward a supervisory role—all while habitually
    falling asleep to the hum of warehouse radios.
background:
  cultural: Geovanny is a second‑generation Mexican‑American born and raised in San Antonio. His parents emigrated from the state of Jalisco, and he grew up bilingual, speaking Spanish at home and English
    at school. Family gatherings center around shared meals, music, and celebrations such as Día de los Muertos and Christmas posadas, which have shaped his sense of community and hospitality. He identifies
    strongly with the vibrant cultural tapestry of South Texas, where he participates in local parades, supports the San Antonio Spurs, and enjoys the city’s blend of Mexican culinary traditions and American
    lifestyle. His cultural roots inform his collaborative spirit, respect for elders, and the importance he places on maintaining harmony in both personal and professional settings.
attributes:
  skills: '["Certified forklift operation", "Pallet jack and hand‑truck handling", "Inventory management and cycle counting", "Warehouse safety and OSHA compliance", "Basic equipment maintenance and troubleshooting",
    "Warehouse Management System (WMS) proficiency", "Bilingual communication (Spanish/English)", "Team coordination and conflict resolution", "Load planning and logistics optimization"]'
  hobbies: '["Intramural soccer", "Saturday Morning Run Club", "Tejano and cumbia dancing at festivals", "Cooking traditional Mexican/Tex‑Mex dishes", "Mentoring youth in hands‑on workshops", "Reading logistics
    and transportation literature", "Watching documentaries on transportation history"]'
  career_goals: Geovanny’s primary ambition is to move into a supervisory position within the warehouse, such as shift lead or operations supervisor, over the next three to five years. He plans to earn
    a Certified Logistics Associate credential and a Commercial Driver’s License (CDL) to expand his skill set. He is keen on learning lean‑manufacturing principles and applying data‑driven process improvements,
    with the long‑term vision of managing a regional distribution center or launching his own moving and storage business that serves the San Antonio community. His curiosity drives him to stay updated
    on emerging warehouse technologies, like automated inventory scanners and voice‑directed picking systems.
