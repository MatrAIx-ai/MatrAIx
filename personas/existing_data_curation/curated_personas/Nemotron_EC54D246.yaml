  hobbies: '[''Yoga'', ''Reading (English/Spanish)'', ''Poetry writing'', ''Cooking Mexican cuisine'', ''Collecting Mexican folk art'', ''Gardening (xeriscape)'', ''Volunteer financial education'', ''Desert
    hiking'']'
  career_goals: Cecilia aims to advance to a senior executive role, such as Chief Financial Officer, where she can design and embed robust financial controls and ethical governance across the organization.
    She is driven to lead a digital transformation of the finance function, integrating modern analytics tools while maintaining rigorous oversight. In the longer term, she plans to launch a boutique consulting
    firm focusing on financial inclusion for Hispanic‑owned small businesses, offering culturally informed advice and mentorship. To support these goals, she intends to pursue an executive MBA and obtain
    a Certified Public Accountant (CPA) designation, enhancing both her strategic acumen and credibility.
