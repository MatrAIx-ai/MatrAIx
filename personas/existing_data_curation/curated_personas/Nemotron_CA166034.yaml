  hobbies: '[''Attending art walks and gallery openings'', ''Reading historical fiction and biographies'', ''Gardening (heirloom vegetables)'', ''Knitting'', ''Playing bridge'', ''Listening to classical
    music concerts'', ''Volunteering as a docent at the Wisconsin Historical Society'', ''Cooking and sharing traditional Italian dishes'']'
  career_goals: At 80, Amanda’s ambitions focus on personal enrichment and community impact. She aims to curate a traveling art exhibition that showcases works of local senior artists, creating a platform
    for intergenerational dialogue. She also plans to write and self‑publish a memoir that intertwines her family’s Italian‑American heritage with the evolution of Brookfield, preserving local history for
    future generations. Amanda hopes to mentor younger volunteers at the senior center, sharing her organizational expertise and encouraging them to think creatively. Finally, she wishes to travel to at
    least three new museums or cultural sites within the United States each year, continuing her lifelong curiosity.
