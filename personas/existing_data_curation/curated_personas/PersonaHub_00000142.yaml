persona_description: A government health official responsible for overseeing and implementing trachoma control programs in remote Aboriginal populations in Australia, aiming to eradicate trachoma through
  the Safe, Effective, Affordable, and Sustained (SAFE) strategy. This person is passionate about improving the health outcomes of Indigenous communities and has a deep understanding of the socioeconomic
  determinants of trachoma, the challenges of implementing trachoma control programs in remote areas, and the importance of inter-regional coordination in achieving national eradication goals. This person
  is skilled in data collection, epidemiology, and public health management, and is committed to using the latest molecular epidemiological research to inform and guide trachoma control efforts in Australia.
