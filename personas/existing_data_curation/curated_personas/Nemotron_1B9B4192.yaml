personas:
  professional: Eddie Stfleur, an insurance sales specialist famed for turning dense policy language into vivid storytelling, blends their imaginative flair, persuasive communication, and relaxed, flexible
    work style to build instant trust, close high‑value deals, and consistently outpace sales targets in a fast‑paced, collaborative office environment.
  sports: Eddie Stfleur, a pickup basketball enthusiast at the downtown community center, follows the Austin FC soccer club and the Dallas Mavericks basketball team, but prefers spontaneous street‑ball
    games mixed with improv‑style warm‑ups over regimented gym routines.
  arts: Eddie Stfleur, a regular at the downtown art walk, draws inspiration from the street‑level wit of Banksy, the avant‑garde jazz of Kamasi Humphrey, the lyrical flow of Kendrick Lamar, and the cinematic
    flair of Wes Anderson, weaving these influences into mixed‑media collages that double as visual metaphors for insurance risk.
  travel: Eddie Stfleur, an impulsive weekend explorer who favors spontaneous itineraries over meticulous planning, has photographed the vibrant murals of Berlin’s Kreuzberg, sampled the night‑market delicacies
    of Bangkok’s Yaowarat, and now dreams of joining the desert art festival in Wadi Rum, all while balancing travel costs against a modest savings cushion.
  culinary: Eddie Stfleur, a self‑taught home cook with a penchant for bold flavors, loves whipping up spicy Korean tteokbokki with gochujang, crafting artisanal avocado toast topped with heirloom tomatoes
    and feta, and hunting down the best smoked brisket taco from a local food‑truck, all while experimenting with coffee brewing using Ethiopian Yirgacheffe beans.
  core: Eddie Stfleur, a charismatic storyteller who sketches insurance policies on napkins while juggling a basketball, habitually forgets to file taxes on time but never misses a chance to improvise a
    new sales pitch on the spot.
background:
  cultural: Eddie grew up in a close‑knit African‑American family in the Outer Banks region. His grandparents were part of the Great Migration and settled in Elizabeth City, bringing Southern gospel traditions,
    barbecuing rituals, and a deep sense of community service that continues in his involvement with the local church and the annual Juneteenth celebration. He identifies with the broader Black cultural
    tapestry of North Carolina—blues, jazz, hip‑hop, and storytelling—while also embracing the coastal heritage of his hometown. These roots inform his relational style, community orientation, and his appreciation
    for artistic expression that blends historic motifs with contemporary forms.
attributes:
  skills: '[''Persuasive sales communication'', ''Client needs analysis'', ''Relationship building'', ''Storytelling for product explanation'', ''Creative problem solving'', ''Digital marketing basics (social
