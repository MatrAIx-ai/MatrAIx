  hobbies: '[''Sketching and mixed‑media art'', ''Improvisational theater'', ''Pickup basketball'', ''Live music (jazz, hip‑hop) attendance'', ''Food truck exploration'', ''Speculative fiction reading'',
    ''Tech and insurance podcasts'', ''Urban photography'']'
  career_goals: Short‑term, Eddie aims to break the top‑sales record at his branch and earn the regional “Rising Star” award. He wants to obtain additional licensing for commercial and cyber insurance so
    he can expand his portfolio. Within five years, he envisions moving into a senior sales manager role, leading a team of agents and designing a mentorship program that uses storytelling and role‑play
    to accelerate new hires’ learning. Long‑term, he aspires to open his own boutique agency focused on innovative, niche policies for small businesses and creative professionals, integrating technology
    platforms that simplify policy management.
