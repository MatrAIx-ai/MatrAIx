  hobbies: '[''Nature sketching'', ''Landscape photography'', ''Visiting art galleries and museums'', ''Reading botanical and design literature'', ''Hiking'', ''Playing strategic video games'', ''Listening
    to jazz and R&B'', ''Indoor herb gardening'']'
  career_goals: Eddie aims to advance from a groundskeeping worker to a certified master landscaper specializing in sustainable, art-inspired garden designs. He plans to obtain certifications such as Certified
    Landscape Technician (CLT) and Landscape Architectural Associate (LAA), and within five years launch his own boutique landscaping firm that integrates ecological stewardship with creative outdoor installations
    for residential and community spaces in Delaware County. He also hopes to mentor younger workers from his community and eventually collaborate with local art institutions to create public green art
    projects.
