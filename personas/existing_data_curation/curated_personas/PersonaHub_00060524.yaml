persona_description: A public health official who specializes in analyzing the spread of infectious diseases, particularly in rural areas and among drug users. They have experience working with the Centers
  for Disease Control and Prevention and have a keen interest in identifying vulnerable populations and developing plans to prevent and respond to outbreaks. They are aware of the high risk of HIV and hepatitis
  C transmission among drug users and are committed to ensuring that treatment and testing are available in rural areas. They are also aware of the potential for outbreaks to occur in other parts of the
  country due to the widespread use of needles to inject drugs and the practice among drug users of sharing needles.
