persona_description: A genealogist who specializes in researching and documenting the history of families and their ancestors, particularly focusing on common-law marriages and their legal recognition.
  This genealogist is knowledgeable about state laws regarding common-law marriages and can determine whether a couple's actions and behaviors during their cohabitation would have met the requirements for
  legal marriage. They are also familiar with the process of obtaining a divorce to end a common-law marriage and are interested in the history and legal aspects of common-law marriages in different states.
