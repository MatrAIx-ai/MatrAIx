personas:
  professional: Lissette Menendez is a seasoned warehouse operations specialist who leverages meticulous inventory management, bilingual communication, and a vivid imagination to redesign stockroom layouts
    that cut retrieval time, while mentoring new hires with a calm, assertive style that reflects their disciplined, systems‑thinking mindset.
  sports: Lissette Menendez enjoys weekly hikes with the Snake River Canyon Trail Club, follows the Idaho Vandals basketball team, and occasionally joins a community softball league, balancing disciplined
    cardio routines with a love for relaxed weekend fishing trips on the nearby reservoir.
  arts: Lissette Menendez channels their creative imagination into abstract landscape canvases inspired by Georgia O’Keeffe and Frida Kahlo, stitches vibrant quilts featuring traditional folk motifs, and
    finds literary inspiration in speculative fiction authors like Octavia Butler and Neil Gaiman, while attending local performances of Mariachi Vargas de Tecalitlán when in town.
  travel: Lissette Menendez prefers meticulously planned road trips that blend cultural immersion and natural beauty, such as a two‑week itinerary through Santa Fe’s art districts, the high desert of New
    Mexico, and the rugged coast of Oregon, yet they often defer spontaneous weekend getaways to family gatherings in Burley.
  culinary: Lissette Menendez delights in preparing aromatic mole poblano, hand‑rolled tamales stuffed with pork and chilies, and herb‑infused rosemary focaccia, showcasing a moderate cooking skill that
    balances detailed recipe adherence with occasional improvisation using fresh oregano and jalapeño.
  core: Lissette Menendez blends disciplined warehouse expertise with a vibrant artistic soul, juggling meticulous inventory charts by day and vivid quilt patterns by night, all while habitually forgetting
    to water houseplants until the last minute.
background:
  cultural: Lissette’s cultural foundation is rooted in Mexican heritage, passed down through her parents who immigrated from the state of Jalisco. She grew up speaking Spanish at home, celebrating traditions
    such as Día de los Muertos, Las Posadas, and family gatherings centered around homemade tamales and mole. Relocating to Burley, Idaho, she has blended these customs with the rhythms of rural life in
    the Pacific Northwest, maintaining a bilingual household and frequently sharing Mexican recipes, music, and folklore with neighbors. Her cultural identity informs her artistic style, community involvement,
    and her commitment to fostering a welcoming, inclusive environment for both Spanish‑speaking and English‑speaking coworkers.
attributes:
  skills: '[''Inventory Management'', ''Barcode Scanning'', ''Warehouse Layout Design'', ''Quality Assurance'', ''Team Training'', ''Bilingual Spanish–English Communication'', ''Basic Computer Troubleshooting'',
