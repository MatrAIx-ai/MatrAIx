  hobbies: '[''Abstract painting'', ''Embroidery and quilting'', ''Reading speculative fiction and poetry'', ''Short creative writing'', ''Hiking local trails'', ''Herb and native flower gardening'', ''Participating
    in cultural festivals and art fairs'']'
  career_goals: Lissette aims to advance to a supervisory role in the distribution center within the next two years, seeking an OSHA certification and a forklift operator license to broaden her qualifications.
    She is also planning to complete a GED program and enroll in a community college graphic-design course, with the long-term ambition of opening an online boutique that sells handcrafted Mexican-inspired
    textiles and artwork. Additionally, she hopes to mentor younger employees, lead a continuous-improvement project that further cuts order-picking time, and become a recognized champion of workplace safety
    and cultural inclusion within her company.
