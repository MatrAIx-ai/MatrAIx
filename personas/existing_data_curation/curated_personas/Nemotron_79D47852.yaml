personas:
  professional: Betty Pustizzi, an aspiring junior engineer, channels her love for building intricate LEGO mechanisms and sketching fairy‑tale characters into early experiments with simple robotics kits,
    applying her curiosity and practical mindset while often forgetting to tidy their workbench.
  sports: Betty Pustizzi, who roams the neighborhood park for impromptu bike rides in summer, plays on the local youth soccer team called the Trailblazers, and cheerfully supports the New York Knicks and
    New York Yankees, though they often prefer wandering the woods for fun over formal practice.
  arts: Betty Pustizzi, an avid young artist, spends afternoons drawing enchanted castles inspired by the illustrations of Mary GrandPré and listening to the piano lullabies of Yiruma, while also delighting
    in the animated films of Studio Ghibli and the whimsical songs of Disney’s 'Frozen' soundtrack.
  travel: Betty Pustizzi, whose favorite adventure is exploring the forest trails behind their home and weekend trips to the nearby lake, dreams of visiting the Grand Canyon and the castles of Scotland,
    but their family’s modest budget means most vacations are short day trips to the local aquarium and state park.
  culinary: Betty Pustizzi, who enjoys helping in the kitchen, can confidently whip up a peanut‑butter‑jelly sandwich and a simple spaghetti‑meatball plate, loves the bright flavor of fresh basil on pizza,
    and eagerly savors the sweet crunch of apple slices with caramel dip.
  core: Betty Pustizzi, a curious yet often scattered eight‑year‑old, balances boundless imagination in LEGO creations with a habit of misplacing their sketchbooks, and worries about tiny things like missing
    a step in a building instruction.
background:
  cultural: Betty Anne was raised in Stoughton, Wisconsin, a small Midwestern town with a strong German‑American heritage. Her family participates in community traditions such as the Stoughton Poultry Festival
    and attends local church gatherings that emphasize kindness, hard work, and service. Growing up in a predominantly white, rural environment, she has been exposed to seasonal outdoor activities like
    hiking, fishing, and community potlucks. Her cultural upbringing values practicality, modesty, and a close‑knit family network, all of which shape her outlook and daily routines.
attributes:
  skills: '["Reading fluency (grade‑2)", "Basic writing and storytelling", "Simple arithmetic (addition/subtraction)", "LEGO building and basic engineering", "Elementary computer navigation (educational
