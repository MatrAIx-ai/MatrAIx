  hobbies: '["Exploring nature (collecting leaves, stones)", "LEGO building with moving parts", "Reading adventure and fairy‑tale books", "Sketching characters and wildlife", "Playing beginner piano pieces",
    "Caring for family dog", "Participating in library craft club"]'
  career_goals: Betty Anne dreams of a future where she can combine her love for animals with her practical problem‑solving skills. She often says she wants to become a veterinarian so she can care for
    pets and farm animals, helping them stay healthy. She also imagines herself as a teacher, sharing her curiosity about the natural world with younger children. Her career aspirations reflect a desire
    to be useful, compassionate, and to turn her questions into real‑world solutions.
