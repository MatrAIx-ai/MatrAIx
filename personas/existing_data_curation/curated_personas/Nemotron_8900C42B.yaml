personas:
  professional: Maria Rodriguez is a meticulous molecular biologist who merges a pragmatic bench approach with a magnetic mentorship style, and they lead diagnostic assay development while championing reproducible
    workflows and cross‑functional collaboration.
  sports: Maria Rodriguez enjoys weekend hikes through Congaree National Park, competes fiercely in local tennis club matches, roots for the Carolina Panthers and the Atlanta Braves, and they channel their
    competitive drive into both trail runs and court rallies, often staying after practice to fine‑tune their serve.
  arts: Maria Rodriguez channels their sociable energy into salsa dancing, frequently performing to the rhythms of Celia Cruz, Marc Anthony, and Rubén Blades, and they curate playlists that blend classic
    salsa with modern Latin pop, turning every community event into a lively cultural showcase.
  travel: Maria Rodriguez prefers active travel itineraries that mix hiking in the Blue Ridge Mountains, exploring the colorful markets of Oaxaca, and relaxing on the sun‑kissed beaches of Cartagena, and
    they meticulously plan trips on a modest budget while seeking authentic local experiences.
  culinary: Maria Rodriguez delights in preparing bandeja paisa and empanadas, skillfully cooking chorizo, simmering beans, and frying arepas with fresh cilantro, plantain, and avocado from their herb garden,
    and they often host potluck gatherings where friends sample these flavorful dishes alongside experimental side salads.
  core: Maria Rodriguez is a high‑energy molecular biologist whose love for salsa, competitive tennis, and meticulous lab work is balanced by a restless mind that they soothe through yoga and relentless
    curiosity.
background:
  cultural: Maria was born to Colombian parents and grew up speaking both Spanish and English. Her family maintains strong ties to Colombian traditions—celebrating Carnaval de Barranquilla, sharing música
    vallenata, and gathering for festive meals centered on arepas and empanadas. While living in Columbia, SC, she blends these customs with Southern hospitality, participating in local festivals and community
    service. Her Catholic upbringing emphasized communal responsibility and close family bonds, values she carries into her professional collaborations. Maria’s bicultural identity informs her perspective
    on health equity, motivating her to pursue diagnostic solutions that benefit both her Colombian heritage and the broader community.
attributes:
  skills: '[''DNA extraction and purification'', ''Polymerase Chain Reaction (PCR) and quantitative PCR (qPCR)'', ''Next‑generation sequencing (NGS) library preparation'', ''Cell culture and aseptic techniques'',
    ''ELISA and immunoassay development'', ''Operation of spectrophotometer, flow cytometer, and automated liquid handler'', ''Data analysis using Python and R'', ''Statistical quality control and validation'',
    ''Laboratory safety, GLP/CLIA compliance'', ''Technical documentation and SOP writing'', ''Team training and mentorship'', ''Effective scientific communication and presentation'']'
  hobbies: '[''Salsa dancing'', ''Cooking Colombian cuisine'', ''Yoga and mindfulness meditation'', ''Hiking in Congaree National Park'', ''Maintaining a herb garden'', ''Participating in trivia nights'',
    ''Playing tennis'', ''Volunteering for science outreach programs'']'
  career_goals: Maria aims to leverage her technical expertise and leadership abilities to become a senior scientific lead within a biotech company focused on molecular diagnostics. Over the next five years
    she plans to earn a certification as a Clinical Laboratory Scientist (ASCP) and complete a master’s degree in Biotechnology Management. She aspires to head projects that translate novel genomic insights
    into affordable diagnostic tools for infectious diseases prevalent in Latin America, thereby bridging her professional work with her cultural heritage. Ultimately, Maria envisions managing a multidisciplinary
    team, driving innovation while establishing robust, reproducible workflows that balance cutting‑edge research with practical application.
