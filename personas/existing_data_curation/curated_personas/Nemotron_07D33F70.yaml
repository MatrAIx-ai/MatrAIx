personas:
  professional: Tetiana Hazeltine, a budding sustainable product designer in the making, leverages their knack for hands‑on tinkering, graphic‑design flair, and introductory coding to create environmentally‑friendly
    prototypes, all while balancing curiosity with a laid‑back, flexible approach that lets projects evolve organically.
  sports: Tetiana Hazeltine, an enthusiastic hiker who spends weekends trekking the trails of Hunterdon County and cycles to school, supports the New York Giants and the New York Knicks, occasionally joins
    the high school cross‑country team in the fall and practices yoga at a local studio in winter, and they approach fitness with a flexible, curiosity‑driven mindset that balances structured training with
    spontaneous outdoor exploration.
  arts: Tetiana Hazeltine, a diligent art‑club member who co‑creates community murals inspired by street artists like Banksy and likes listening to indie folk icons such as Bon Iver while sketching botanical
    details, often channels the expressive color palettes of Van Gogh into digital graphics for school projects, and they find solace in playing acoustic guitar to songs by Joni Joplin.
  travel: Tetiana Hazeltine, who plans trips with a mix of spontaneity and online DIY guides, enjoys weekend getaways to nearby state parks like the Delaware Water Gap, has taken a school field trip to
    Washington, D.C., dreams of backpacking through Iceland’s volcanic landscapes, and they balance their love for nature with a limited budget that favors hostels and campgrounds over luxury lodging.
  culinary: Tetiana Hazeltine, an aspiring home cook who experiments with traditional dumplings such as varenyky stuffed with potatoes, cheese, or sautéed mushrooms, perfects garden‑fresh pesto using basil,
    tomatoes, and pine nuts, and they casually blend flavors by adding smoked paprika to roasted carrots, all while maintaining a beginner‑to‑intermediate skill level that delights family members with improvisational
    meals.
  core: Tetiana Hazeltine, a curious, laid‑back teen who juggles robotics, sketchbooks, and a backyard garden, often leaves homework for the last minute, forgets to water plants during a video‑edit binge,
    yet they always find time to strum a guitar chord progression at sunset.
background:
  cultural: Tetiana’s family traces its roots to Ukraine, and she grew up hearing folk songs, celebrating Ukrainian holidays such as Christmas Eve with homemade paska, and attending the local Ukrainian
    church in nearby Morristown. Living in the small, nature‑oriented community of Milford, New Jersey, she also embraces the rhythms of a rural Mid‑Atlantic lifestyle—summer county fairs, farmers’ markets,
    and volunteer projects at the town animal shelter. This blend of Ukrainian cultural values—emphasis on family, resilience, and craftsmanship—with the laid‑back, community‑focused environment of her
    hometown informs her perspective on sustainability, creativity, and the importance of giving back.
attributes:
  skills: '["Graphic design (Canva, basic Photoshop)", "Video editing (iMovie, Premiere Rush)", "Photography (wildlife, composition, lighting)", "DIY carpentry (birdhouse building, bike maintenance)", "Gardening
    (plant care, composting)", "Basic coding (Scratch, introductory Python)"]'
  hobbies: '["Hiking and nature photography", "Robotics club projects", "Community mural painting (art club)", "Cooking (Ukrainian dishes and recipe experimentation)", "Gardening (vegetable patch and composting)",
    "Acoustic guitar playing", "Creative writing (short stories)", "Online DIY and environmental activism communities"]'
  career_goals: Tetiana aims to combine her artistic flair with her love for the outdoors by pursuing a career in sustainable product design or environmental media. After completing her high‑school equivalency,
    she plans to enroll in a community college program in environmental science or industrial design, where she can deepen her technical skills while staying grounded in practical projects. In the long
    term she envisions working for a green‑tech startup or a wildlife rehabilitation center, creating visual content, designing educational materials, and developing eco‑friendly solutions that protect
    local ecosystems. She also hopes to maintain a flexible freelance graphic‑design side gig to fund her studies and preserve the freedom to explore nature on her own schedule.
