  hobbies: '[''building LEGO structures from instruction manuals'', ''playing Little League baseball'', ''reading adventure books (e.g., Magic Tree House)'', ''playing Minecraft with structured builds'',
    ''collecting and sorting baseball cards'', ''biking around the neighborhood'']'
  career_goals: Lorenzo imagines a future where he can combine his love for routine, helping others, and competition. He often talks about becoming a firefighter, attracted by the clear schedules, teamwork,
    and the chance to protect his community. At the same time, his competitive streak fuels a dream of playing professional baseball, where he can hone his skills, follow structured training programs, and
    test himself against peers. He also mentions an interest in working with cars or machinery, reflecting a practical, hands‑on career path.
