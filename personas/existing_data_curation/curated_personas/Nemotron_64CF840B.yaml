  hobbies: '[''Gardening'', ''Hiking Appalachian foothills'', ''Woodworking'', ''DIY home improvement'', ''Reading historical fiction'', ''Church volunteer work'', ''Attending high school football games'',
    ''Mentoring youth in technical clubs'']'
  career_goals: She aims to advance to a senior lead mechanic or maintenance manager role within the next five years, earning certifications such as the Certified Maintenance & Reliability Technician (CMRT)
    and specialized refractory welding credentials. Colleen also hopes to mentor apprentices and eventually open a small independent shop focused on custom furnace refurbishments, allowing her to combine
    her technical expertise with her desire for a flexible schedule that supports her family life.
