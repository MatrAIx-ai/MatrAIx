personas:
  professional: Colleen Ingram leverages a calm, methodical problem‑solving style honed by years of diagnosing hydraulic and pneumatic systems, excelling at MIG/TIG refractory welding and preventive maintenance
    planning, while they assertively mentor junior technicians and pursue CMRT and advanced refractory welding certifications to step into a senior lead mechanic or maintenance manager role.
  sports: Colleen Ingram embraces the outdoors through seasonal hikes with the local Appalachian Trail Conservancy club, supports the Appalachian State Mountaineers and high‑school football tailgate gatherings
    with spirited chants, and they keep fit by joining the community center’s Saturday 5 K “Run for the Youth” and occasional weekend pick‑up softball games.
  arts: Colleen Ingram finds quiet escape in historical fiction by Hilary Mantel and Ken Follett, while their evenings often feature folk‑rock duo The Avett Brothers and occasional trips to the regional
    community theater for productions of classic plays, and they channel this creative spark into woodworking projects.
  travel: Colleen Ingram prefers spontaneous road trips that blend adventure with family flexibility, having recently explored Shenandoah National Park’s Skyline Drive, planning a future pilgrimage to York,
    England to walk historic streets that echo their love of historical novels, and they keep a well‑worn hiking‑ready backpack ready for weekend getaways.
  culinary: Colleen Ingram enjoys farm‑to‑table cooking, often turning garden tomatoes, zucchini, basil, and rosemary into fresh caprese salads or rustic ratatouille, while they also master slow‑roasted
    pork shoulder for tailgate feasts and savor Southern collard greens seasoned with smoked ham hocks.
  core: Colleen Ingram blends a calm, hands‑on mechanical mastery with a love of gardening, hiking, and historical tales, navigating life with relaxed planning, occasional disorganization, and a steadfast
    resolve to mentor others while they build their own furnace‑refurbishment shop.
background:
  cultural: Colleen grew up in a working-class, white Southern family in Alabama, where community, family loyalty, and modest hospitality are core values. Her upbringing in Albertville exposed her to a
    blend of traditional Southern customs such as church gatherings, county fairs, and Southern cuisine, while also fostering a practical work ethic and a respect for hands-on craftsmanship. These cultural
    influences shape her collaborative yet self-reliant personality, her calm resilience, and her appreciation for both new ideas and established methods.
attributes:
  skills: '[''Industrial machinery maintenance'', ''Refractory furnace repair'', ''Hydraulic system troubleshooting'', ''MIG/TIG welding'', ''Blueprint reading'', ''Preventive maintenance planning'', ''Safety
