  hobbies: '[''building block towers'', ''drawing and coloring'', ''listening to lullabies and Mexican folk music'', ''reading picture books'', ''solo nature walks and collecting/sorting natural objects'',
    ''helping in the kitchen with simple cooking tasks'']'
  career_goals: Even at three, Maria talks about what she wants to be when she grows up. She envisions a future where she can work in a predictable, caring environment that allows her to help others while
    keeping a clear daily schedule. Her favorite idea is to become a kindergarten teacher, because she loves the idea of guiding young children through structured activities, reading stories, and creating
    a calm, orderly classroom. She also dreams of helping families in a community kitchen, preparing familiar Mexican dishes, which would combine her love of routine, practical tasks, and cultural heritage.
    In all her ambitions, Maria seeks roles that offer stability, clear responsibilities, and opportunities to be kind and cooperative.
