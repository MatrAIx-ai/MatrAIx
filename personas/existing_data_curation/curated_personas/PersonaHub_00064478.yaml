persona_description: A teacher who is adapting and delivering LifeSkills lessons to students with special educational needs and disabilities (SEND) or alternative learning needs (ALN) in a school setting.
  The teacher is using the ten adapted LifeSkills lessons to help students identify and build personal skills that are important to employers. The teacher is also using a navigation guide to explore the
  full range of SEND and ALN adapted LifeSkills resources. The teacher is interested in learning more about the free account, which gives access to all educator content, tools, and resources, and is looking
  for ways to improve the lesson plan pack. The teacher is also interested in feedback on the lesson plan pack and is seeking ways to continue creating relevant content for the teacher.
