  hobbies: '[''Church Choir'', ''Community Event Organizing'', ''Fishing'', ''Hunting'', ''Gardening'', ''Listening to Classic Rock and Bluegrass'', ''Attending Local Concerts'', ''Reading Appalachian History'',
    ''Woodworking'', ''Bridge Club'']'
  career_goals: Mark aims to transition into a supervisory or lead role within the next two years, leveraging his experience to become a shift leader or safety coordinator for his warehouse. He plans to
    obtain a Certified Supply Chain Professional (CSCP) credential to deepen his knowledge of logistics and position himself as a mentor for younger workers. Long‑term, he hopes to secure a stable, predictable
    schedule that allows more time for family and community involvement, and he is open to consulting for local small‑business owners on inventory best practices after retirement.
