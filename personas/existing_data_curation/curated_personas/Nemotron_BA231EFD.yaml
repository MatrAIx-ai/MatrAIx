  career_goals: Although still a toddler, Andrew frequently pretends to be a builder or a firefighter during play, expressing a budding ambition to "fix things" and "help people" when he grows up. His competitive
    streak shows when he races toy cars against friends, and his practical nature steers his imagination toward roles that involve clear, predictable tasks, such as constructing towers with blocks or rescuing
    stuffed animals. These early aspirations reflect his preference for structure, focus on immediate realities, and desire for tangible outcomes.
