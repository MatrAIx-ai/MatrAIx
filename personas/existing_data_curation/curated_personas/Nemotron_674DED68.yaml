  hobbies: '[''Acrylic painting'', ''Visiting art museums and galleries'', ''Playing the djembe'', ''Community choir singing'', ''Cooking soul food and experimenting with world cuisines'', ''Volunteering
    as art mentor for youth'', ''Gardening in community plot'', ''Walking the Ohio River Trail'', ''Watching Bengals games with friends'', ''Attending open‑mic poetry nights'']'
  career_goals: Helen aims to move from a production worker to a shift supervisor within the next two years, leveraging her strong safety record and mentorship experience. She plans to earn certified credentials
    for CNC operation and forklift driving, then pursue a GED program to improve her literacy and open pathways to technical courses at a local community college. Long‑term, she envisions starting a small
    side business selling acrylic paintings and hand‑crafted quilts at Cincinnati’s arts fairs, blending her love of art with entrepreneurship. Helen also hopes to become a mentor for at‑risk youth in her
    community, using her production experience to teach workplace readiness and inspire confidence. Ultimately, she wants to be a voice for equitable hiring and advancement opportunities for underrepresented
    workers in the manufacturing sector.
