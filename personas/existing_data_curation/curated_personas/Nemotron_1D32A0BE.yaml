  hobbies: '[''watercolor painting'', ''DIY woodworking'', ''photography'', ''hiking on local trails'', ''visiting art galleries'', ''reading historical fiction'', ''gardening'', ''cooking experimental
    recipes'', ''attending community theater'', ''participating in women\''s trade association'', ''learning sustainable building practices'', ''volunteering at community garden'']'
  career_goals: Cynthia aims to earn a journeyman contractor certification and eventually obtain a state‑licensed general contractor license. She plans to launch a small, family‑owned fencing business that
    emphasizes high‑quality craftsmanship and environmentally friendly materials, such as reclaimed wood and recycled metal. Her long‑term ambition is to expand the company’s services to include custom
    landscape design and sustainable hardscaping, blending her artistic interests with functional outdoor structures. She also hopes to become a mentor for other women entering the trades, serve as a safety
    trainer for local construction crews, and eventually take on a regional project‑management role that lets her oversee larger multi‑disciplinary construction projects.
