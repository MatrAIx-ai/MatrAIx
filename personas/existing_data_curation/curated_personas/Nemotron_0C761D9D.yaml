  hobbies: '["Gardening", "Cooking Southern cuisine", "Reading wellness books", "Church choir participation", "Community volunteering", "Gentle yoga", "Nature walks", "Quilting"]'
  career_goals: Danesia aims to become a Certified Dental Assistant (CDA) with a radiology specialization within the next two years, then transition into a dental office manager role to leverage her organizational
    strengths for clinic efficiency. She plans to design and lead a mentorship program for new assistants, improve patient‑flow processes, and increase overall patient satisfaction. Long‑term, she envisions
    earning a degree in health administration to launch a community‑focused dental outreach center serving underserved neighborhoods in Williamson County, all while seeking professional recognition through
    continuing‑education courses and employee‑of‑the‑year awards.
