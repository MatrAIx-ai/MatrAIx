  career_goals: Although retired from formal employment, Jordan aims to establish a community learning hub in Enola that blends arts, history, and lifelong education, offering free workshops and lecture
    series for seniors and youth alike. He aspires to mentor emerging teachers through a mentorship program in the Cumberland County school district and to publish a collection of essays on local heritage
    and art appreciation. Jordan also hopes to become a featured speaker at regional senior forums and to create a traveling exhibition that showcases the work of local artists, thereby fostering greater
    cultural engagement in his hometown.
