  career_goals: Lourdes aims to re‑enter the workforce in a role that blends her love of art with her organizational strengths. She plans to enroll in a part‑time associate’s program in Arts Administration
    or Cultural Studies to gain formal credentials. Her short‑term goal is to secure a part‑time position as a program assistant or community‑outreach coordinator at a local museum, gallery, or nonprofit,
    where she can help design inclusive art workshops and cultural events. Long‑term, she hopes to launch a home‑based business offering Cuban cooking classes and cultural experiences, using her culinary
    skills and community connections to create a sustainable source of income while preserving her heritage. She also aspires to develop leadership skills that will allow her to mentor other women re‑entering
    the workforce after life transitions.
