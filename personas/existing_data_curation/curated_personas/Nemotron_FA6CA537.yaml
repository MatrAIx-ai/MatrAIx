personas:
  professional: Lourdes Benitez, an aspiring arts administrator with a knack for event coordination and bilingual outreach, channels her methodical planning and curiosity into designing inclusive community
    workshops at Denver museums, while leveraging basic tech tools to manage budgets and schedules.
  sports: Lourdes Benitez stays active with sunrise yoga sessions, weekend hikes in the Rockies, and cheering on the Denver Broncos during football season, while occasionally joining a local adult recreational
    soccer league for a dose of friendly competition.
  arts: Lourdes Benitez immerses herself in Denver's vibrant art scene, frequenting the Museum of Contemporary Art Denver and the RiNo Art District, drawing inspiration from artists like Yayoi Kusama and
    Banksy, and documenting cultural moments through a photography blog that showcases street‑art installations.
  travel: Lourdes Benitez prefers thoughtfully planned cultural trips, having explored the historic streets of New Orleans and the bustling markets of Barcelona, while dreaming of a summer trek through
    Patagonia's Torres del Paine, balancing a modest travel budget with a love for authentic local experiences.
  culinary: Lourdes Benitez enjoys crafting aromatic island‑inspired dishes such as slow‑cooked pork with citrus glaze, black beans, and plantain fritters, often seasoning them with fresh cilantro and lime,
    and they frequently share these meals at neighborhood potlucks and pop‑up food events hosted in local galleries.
  core: Lourdes Benitez blends a meticulous planner’s mind with a free‑spirit’s heart, juggling community art projects, yoga mats, and a habit of staying up late binge‑reading fiction until dawn.
background:
  cultural: Lourdes is a first‑ or second‑generation Cuban‑American who grew up in a household where Spanish was spoken daily and Cuban traditions were celebrated. Family gatherings often featured music
    genres such as son, salsa, and timba, and she learned to dance and cook classic dishes like ropa vieja, arroz con pollo, and flan. The values of hospitality, resilience, and community service that are
    central to Cuban culture have shaped her outlook and her willingness to volunteer. Living in Denver, she has blended these roots with the city’s multicultural vibe, participating in local festivals,
    embracing the outdoors, and adopting Colorado’s environmental consciousness. Her bilingual ability and cultural fluency enable her to act as a bridge between the Cuban diaspora and the broader Denver
    community.
