persona_description: A conservation biologist who studies the behavior, ecology, and conservation of marine birds in the Salish Sea region, focusing on understanding the drivers of their declines and proposing
  solutions to address these threats. This individual has extensive experience working with wildlife agencies from the U.S. and Canada, combining data from public health trends, bird surveys, and scientific
  studies to develop a comprehensive risk assessment for the birds. They are also known for their expertise in the study of forage fish, particularly Pacific herring, and their role in proposing that changes
  in the availability of forage fish are contributing to the declines of diving birds.
