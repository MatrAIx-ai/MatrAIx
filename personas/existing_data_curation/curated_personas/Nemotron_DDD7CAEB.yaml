  career_goals: Brent aims to move into a supervisory or lead‑operator role within his manufacturing plant and earn a certified welding instructor credential. He plans to pursue a bachelor’s degree in industrial
    engineering and acquire Six Sigma Green Belt certification so he can spearhead lean initiatives that cut waste and boost productivity. Ultimately, he envisions opening a boutique metal‑fabrication shop
    that creates custom automotive and industrial parts, leveraging his technical expertise and competitive drive to become a recognized leader in efficient manufacturing while providing financial stability
    for his family.
