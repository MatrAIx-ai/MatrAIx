personas:
  professional: Brent Hollingsworth, a 28-year-old manufacturing technician with expertise in CNC machining, MIG/TIG welding, and Lean-manufacturing, leverages his hands-on curiosity and competitive drive
    to lead small teams, conduct ISO 9001 quality audits, and continuously optimize shop-floor processes while balancing practical problem-solving with innovative CAD/CAM design.
  sports: Brent Hollingsworth stays active by playing pickup basketball at the local park, competing in the Milwaukee Ultimate Frisbee Club’s summer league, fishing for walleye on Lake Michigan’s shoreline,
    and cheering on the Milwaukee Bucks, Green Bay Packers, and Chicago Cubs, while approaching fitness with a pragmatic mix of HIIT circuits and weekend road-bike rides.
  arts: Brent Hollingsworth immerses himself in classic rock, blasting the Rolling Stones, Led Zeppelin, and AC DC while restoring cars, frequently attends live shows at the House of Blues Milwaukee, and
    appreciates the storytelling of Clint Eastwood’s westerns and the visual grind of automotive design exhibitions at the Petersen Museum.
  travel: Brent Hollingsworth prefers self-planned road trips that blend automotive culture with scenic fishing spots, having already explored Detroit’s Motor City Museum, the German Auto Expo in Frankfurt,
    and weekend escapes to Mackinac Island, while dreaming of a future excursion to Japan’s Takumi workshops in Toyama.
  culinary: Brent Hollingsworth enjoys cooking outdoors, expertly smoking brisket with hickory wood, brewing craft-beer-infused BBQ sauces featuring chipotle, brown sugar, and fresh rosemary, and pairing
    his meals with local Chicago-style deep-dish pizza and fresh lake-caught perch, all while mastering a modest DIY kitchen setup.
  core: Brent Hollingsworth blends a meticulous, competition-driven mindset with a love for hands-on tinkering, making him a restless problem-solver who balances precision work, social barbecue gatherings,
    and an appetite for classic rock and high-performance machinery.
background:
  cultural: Brent was raised in a middle‑class, white Midwestern family in the Chicago suburbs, with ancestral roots in German and Irish immigrant communities that settled in Cook County in the early 1900s.
    The local culture emphasized a strong work ethic, practical skills, and loyalty to neighbors and extended family. He attended public schools, earned an associate’s degree in industrial technology from
    a community college, and maintains close ties with family through regular holiday gatherings and support for local sports teams. His worldview blends traditional Midwestern values of self‑reliance and
    community involvement with an openness to new ideas sparked by his technical vocation.
