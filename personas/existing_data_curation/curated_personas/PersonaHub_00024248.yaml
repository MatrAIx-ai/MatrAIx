persona_description: A dental professional who is interested in advancing oral health care through research and technology. This individual is likely to be a professor or researcher at the University of
  Michigan School of Dentistry, where they have expertise in periodontal disease diagnosis and treatment. They are interested in developing new methods to analyze saliva samples, such as the saliva test
  device described in the text, and are working with U-M's Dr. William Giannobile and Dr. Anup Singh of Sandia National Laboratories. They are also collaborating with Mark Burns, professor with the U-M
  College of Engineering, and Dr. Christoph Ramseier and Janet Kinney, both MCOHR research fellows. The individual is also likely to have a background in microfluidic technology and is interested in using
  it to develop new diagnostic tools for oral health.
