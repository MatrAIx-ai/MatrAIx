personas:
  professional: Jonathan Jaffess, a six-year-old aspiring naturalist, blends a fascination for animals and outer space with the meticulousness of LEGO construction, turning neighborhood explorations into
    mini-field studies that they eagerly share during school drama club presentations.
  sports: Jonathan Jaffess is a lively junior cyclist who rides the Boise River Greenbelt after school, cheers for the Boise State Broncos football team on weekends, plays catch with the local kids' T-ball
    league, and they proudly wear a miniature Boise State orange jersey during practice.
  arts: Jonathan Jaffess, a budding illustrator, spends afternoons sketching fantastical animals inspired by Dr. Seuss books and the whimsical murals at the Boise Art Museum, strums simple chords on a small
    ukulele while humming songs by Disney's Frozen soundtrack, and they love watching animated shorts by Studio Ghibli for artistic inspiration.
  travel: Jonathan Jaffess dreams of backpacking through Yellowstone's geysers after collecting postcards from family trips to Crater Lake and Portland, plans weekend outings with colorful magnet stickers
    on a map of the Northwest, and they eagerly anticipate a future visit to Washington, D.C.'s National Air and Space Museum despite the limited vacation days.
  culinary: Jonathan Jaffess delights in creating peanut butter and banana sandwiches, helping whisk chocolate chip cookies with Mom, and they often request a side of sliced strawberries and cheddar cubes,
    savoring the bright flavors of local Idaho potatoes and fresh blueberries while proudly displaying a Chef badge on a sticker.
  core: Jonathan Jaffess is a six-year-old curiosity engine who doodles dinosaurs, builds brick towers, pedals the Greenbelt, belts out ukulele tunes, and never misses a chance to polish their allowance
    chart, even if that sometimes leaves a sticky residue on their sketchbook.
background:
  cultural: Jonathan was born and raised in Boise, Idaho, within a family of European‑American heritage that values education, outdoor recreation, and community involvement. His parents encourage curiosity
    and artistic expression, frequently taking him to local cultural venues such as the Boise Art Museum and the Idaho State Historical Museum. Growing up near the Boise River Greenbelt and the surrounding
    foothills, he is accustomed to exploring nature, which is a common thread in the regional lifestyle. While his household celebrates traditional American holidays like Thanksgiving and the Fourth of
    July, he also experiences cultural diversity through school events, friends from various backgrounds, and community festivals, fostering an inclusive outlook. This blend of suburban Pacific‑Northwest
    culture, appreciation for the arts, and exposure to the natural environment shapes his worldview and personal identity.
attributes:
  skills: '[''early reading'', ''storytelling'', ''creative drawing and painting'', ''collaborative play leadership'', ''basic addition and subtraction'', ''puzzle solving'', ''digital literacy with tablets'',
