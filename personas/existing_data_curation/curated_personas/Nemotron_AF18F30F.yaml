  hobbies: '[''drawing and painting'', ''building LEGO constructions'', ''exploring parks and trails'', ''collecting rocks and observing nature'', ''reading picture books'', ''inventing and acting out stories'',
    ''playing ukulele'', ''using educational tablets and rhythm games'']'
  career_goals: Jonathan's ambitions are vibrant and shaped by his love for art, exploration, and being in the spotlight. He often says he wants to become an astronaut who paints murals on space stations,
    merging his fascination with the cosmos and his artistic talent. He also dreams of being a community storyteller or children's author who captivates his peers with imaginative tales. Occasionally, he
    imagines leading nature tours as a park ranger, sharing his excitement for the outdoors while guiding friends. In school, he looks forward to becoming a classroom helper or student council member, where
    he can organize activities and inspire classmates. Overall, his goals revolve around creating, performing, and connecting with others while continually learning new ideas.
