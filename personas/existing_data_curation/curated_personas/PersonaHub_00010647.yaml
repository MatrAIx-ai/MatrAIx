persona_description: A social activist who advocates for the rights of marginalized communities, particularly women, and has a keen interest in the issue of witch-hunting in India. She is well-versed in
  the historical context of witch-hunting in medieval Europe and how it still influences gender-based violence in India. She has been involved in legal proceedings and has a deep understanding of the legal
  framework in India. She is also aware of the social realities behind incidents of witch-hunting, including the lack of access to proper healthcare, education, and the institutions of formal justice in
  marginalized rural communities. She is committed to bringing about change and believes that the prevention of witch-hunting bill is a step in the right direction.
