personas:
  professional: Mayra Rodriguez, a budding pretend entrepreneur who runs a tiny lemonade stand in the backyard, showcases early organizational skills by meticulously arranging cups and tracking coins, and
    they demonstrate a competitive edge by always being the first to hand out a drink to any customer.
  sports: Mayra Rodriguez loves sprinting in toddler soccer practices at the neighborhood field, where they cheer like a fan of the local professional baseball team the River City Royals, and they also
    participate in a weekend "Little Movers" gymnastics club, combining a love for movement with a competitive desire to be the first to complete a tumble.
  arts: Mayra Rodriguez spends afternoons finger‑painting bright swirls inspired by the music of "Baby Einstein" and the storytelling of the animated classic "Moana", regularly visiting the community's
    children's art corner where they eagerly display crayon sketches of animals and enjoy the weekly puppet show featuring characters like "Mr. Bumblebee".
  travel: Mayra Rodriguez enjoys family road trips to the nearby coastal sand dunes and weekend visits to the national zoo, preferring the adventure of collecting seashells and spotting giraffes over long
    flights, yet they eagerly dream of a future trip to Disney World and the grand castles of Europe.
  culinary: Mayra Rodriguez favors cheesy macaroni bites, soft banana pancakes, and crunchy apple slices, can whip up a simple "fruit‑yogurt parfait" with parental help, but they often insist on extra sprinkles
    on ice cream and occasionally refuse to try green vegetables.
  core: Mayra Rodriguez is a curious, meticulously organized toddler who balances a competitive spark with a love for art and meticulous sticker collections, yet they often trade patience for glittery treats.
background:
  cultural: Mayra is raised in a Mexican‑American household in Fresno, California. Spanish is spoken at home alongside English, and she participates in cultural celebrations such as Día de los Muertos,
    Mexican Independence Day, and local community festivals. Family gatherings feature traditional foods like tamales and quesadillas, and she enjoys listening to mariachi music and learning simple folk
    dances, blending her Mexican heritage with the diverse cultural fabric of the Central Valley.
