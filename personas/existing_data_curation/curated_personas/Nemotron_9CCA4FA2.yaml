  career_goals: Even though she is still very young, Mayra often pretends to be a teacher, an artist, or a community helper during play. She expresses a desire to "teach" her stuffed animals new words,
    to "paint" big colorful pictures for her family, and to "help" in the kitchen, reflecting an early ambition to share knowledge and create beautiful things for others.
