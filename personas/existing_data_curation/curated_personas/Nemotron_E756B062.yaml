  hobbies: '[''Abstract watercolor painting'', ''Chinese calligraphy'', ''Reading poetry and literature'', ''Genealogy research'', ''Traditional Chinese cooking'', ''Herb gardening'', ''Crossword and sudoku
    puzzles'', ''Classical music listening'', ''Museum and gallery visits'', ''Small-group tea-ceremony gatherings'']'
  career_goals: Wen's current ambitions focus on personal enrichment and cultural legacy. She aims to complete a memoir that weaves her family's migration story with reflections on art and identity, and
    to curate a small exhibition of her watercolors at the local senior center. She also plans to develop an intergenerational art workshop that pairs senior participants with local schoolchildren to explore
    calligraphy and abstract painting. Additionally, she wishes to continue volunteering as a cultural liaison for the Chinese community association, assisting with event coordination and language support.
    Maintaining her health and mental well-being through regular artistic practice and gentle gardening remains a guiding goal.
