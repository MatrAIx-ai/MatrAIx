persona_description: A geologist or geoscientist who specializes in the study of geological sequestration (GS) operations, specifically in the detection and monitoring of CO2 and brine leakage. They are
  interested in developing practical design strategies for monitoring schemes, including quantitative estimation of increased probability of leak detection per added observation well. They are skilled in
  solving complex system of equations using the superposition principle and an approximation to the well function, which is essential for detecting leakage in GS operations. They are also aware of the limitations
  of using pressure-monitoring wells due to the high uncertainty in the nature and location of leakage pathways, and are seeking to optimize the objective of a monitoring scheme.
