persona_description: A Somali-American woman who is the first Somali-American legislator in the country, and the first Somali-American woman to run for public office in the United States. She is a political
  columnist, and she writes about politics and gender equality. She is known for her work with the Women Organizing Women Network and for advocating for marginalized communities of women. She is interested
  in increasing the representation of women in politics and providing support and resources for women who are interested in running for office.
