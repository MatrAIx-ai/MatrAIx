personas:
  professional: A toddler named Jesus Arocena imagines themselves as a future builder who constructs block towers with methodical precision, they balance a love for exploring new shapes with the comforting
    routine of cleaning up, showing an early mix of curiosity and practicality despite a tendency to leave toys scattered.
  sports: A toddler named Jesus Arocena loves splashing in the backyard sprinkler and toddling around the local Tiny Tots Soccer Club's mini-field, they cheer on the Miami Heat during family watch parties
    and mimic basketball dribbles with a soft ball, showing a playful yet unstructured approach to early fitness.
  arts: A toddler named Jesus Arocena delights in the lively rumba and salsa beats that fill family gatherings, they sway to the rhythms of Celia Cruz and Luis Fonsi while finger-painting bright circles
    on paper, and they giggle at the antics of the animated series "Paw Patrol", illustrating an early, music-driven artistic sensibility.
  travel: A toddler named Jesus Arocena enjoys brief car rides to the nearby Miami Beach shoreline where they build sand castles and chase waves, they have also visited the magical world of Disney in Orlando
    with a guided stroller tour, and they dream of feeling the warm air of the Bahamas while their parents hand-hold them, preferring relaxed, sensory-rich trips over long flights.
  culinary: A toddler named Jesus Arocena prefers the comforting aroma of arroz con pollo and sweet fried plantains at family meals, they eagerly mash ripe bananas with a tiny fork and love sipping warm
    chicken broth, yet they stubbornly reject broccoli florets, revealing a simple palate anchored in familiar, home-cooked flavors.
  core: Jesus Arocena, a two-year-old explorer, balances boundless curiosity with a delightfully messy play style, prefers quiet corners over noisy crowds, and habitually hides socks behind cushions for
    later retrieval, they often surprise caregivers with spontaneous bursts of giggles.
background:
  cultural: Jesus comes from a Cuban‑American family that maintains strong ties to its heritage while living in Homestead, Florida. Spanish is spoken at home alongside English, and he is exposed to Cuban
    traditions such as celebrating Cuban Independence Day, enjoying classic dishes like arroz con pollo, plantains, and black beans, and hearing rumba and salsa rhythms. Family gatherings often feature
    music, dancing, and storytelling in both languages, fostering his bilingual development and cultural pride. The multicultural environment of South Florida further enriches his upbringing, allowing him
    to observe and appreciate diverse customs while rooted in his Cuban identity.
