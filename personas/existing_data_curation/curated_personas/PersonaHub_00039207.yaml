persona_description: A historian or a scholar who specializes in the study of ecclesiastical history, particularly the events and figures related to the second Ecumenical Council from Constantinople (381)
  and the life and works of Saint Bretanion. They are knowledgeable about the history of the Church and the events that occurred during this time period, and have a particular interest in the life and works
  of this particular bishop. They have read and studied the works of Saint Bretanion, and have a deep understanding of the historical context in which he lived and worked. They are also interested in the
  life and works of Saint Brettanion's contemporaries, such as Saint John Chrysostom, Saint Gregory of Nyssa, and Saint Gregory of Nazianzus.
