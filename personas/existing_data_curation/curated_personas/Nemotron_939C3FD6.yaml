  career_goals: Alex aims to transition into a senior leadership role within the next five years, targeting positions such as Regional Sales Manager or Director of Sales for a mid‑size manufacturing firm.
    He is focused on expanding his strategic planning capabilities, overseeing larger account portfolios, and leading a high‑performing sales team. To support this ambition, he plans to complete a professional
    sales leadership certification and attend executive development programs offered by the local business community. Long‑term, Alex is intrigued by the possibility of launching his own boutique distribution
    company, leveraging his industry experience and network to create a flexible, customer‑centric business model.
