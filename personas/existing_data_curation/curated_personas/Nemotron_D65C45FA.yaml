  career_goals: Martin intends to enroll in a community college program for mechanical engineering technology or industrial maintenance, aiming to become a certified CNC machinist or maintenance technician
    within the next three to five years. He envisions a stable, structured career where he can apply his methodical approach to troubleshooting and equipment upkeep. Long‑term, Martin aspires to launch
    a small, locally‑focused repair and maintenance service that offers reliable, on‑time service to residents and small businesses in the Melrose Park area, leveraging his competitive drive to build a
    reputable brand.
