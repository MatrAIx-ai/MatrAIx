  career_goals: Dang aims to advance to an operations manager role within the next five years, overseeing multiple production lines and driving strategic initiatives such as automation integration and sustainability
    programs. He plans to obtain Six Sigma Black Belt certification and further his expertise in advanced manufacturing technologies. A key ambition is to create a workplace culture that balances high performance
    with employee well‑being, reducing stress and fostering collaboration. Ultimately, he envisions a senior leadership position where he can mentor future supervisors and shape company‑wide continuous‑improvement
    strategies.
