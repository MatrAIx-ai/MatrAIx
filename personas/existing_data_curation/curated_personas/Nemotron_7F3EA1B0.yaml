  career_goals: Bow is pursuing CPA certification within the next year and aims to advance to senior auditor and audit manager roles at his firm. He aspires to specialize in sustainability reporting and
    integrate AI‑driven analytics into audit processes, positioning himself as a thought leader in tech‑enabled assurance. Long‑term, he envisions becoming a partner in a public‑accounting practice or transitioning
    to a CFO position at a growth‑stage tech startup, where he can leverage his blend of analytical rigor and strategic thinking. Additionally, he plans to launch a side consulting service focused on financial‑literacy
    education for immigrant and underserved communities in Los Angeles.
