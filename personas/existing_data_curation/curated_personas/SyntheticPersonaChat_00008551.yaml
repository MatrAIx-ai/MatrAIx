    User 2: I''ve heard good things about that game. I''ve never played it, but I''ve seen some gameplay videos. It looks really cool.


    User 1: It is. It''s one of the best open-world games I''ve ever played.


    User 2: I''m not really a fan of open-world games. I prefer games that have a more linear story.


    User 1: I can understand that. Open-world games can be a little overwhelming sometimes.


    User 2: Yeah, they can be. But I do like the freedom to explore and do whatever you want.


    User 1: That''s one of the things I love about open-world games. You can just wander around and see what you can find.


    User 2: Yeah, it''s a lot of fun.


    User 1: So, what do you do for fun?


    User 2: I like to play video games, go to concerts, and hang out with my friends.


    User 1: That sounds like a lot of fun. I like to do a lot of the same things.


    User 2: Cool. We should hang out sometime.


    User 1: That would be fun.


    User 2: Great. I''ll PM you my number.'
