  career_goals: Although retired, Alexander remains driven to stay intellectually active and to give back to his community. He aims to mentor high‑school students in local STEM clubs, volunteer as a technical
    advisor for the Annapolis Historical Society’s preservation projects, and complete a personal woodworking series of heirloom furniture for his grandchildren. He also hopes to finish restoring his 1957
    Chevrolet, maintain a disciplined daily walking routine to support his health, and reduce his chronic worry through mindfulness practices and regular social engagement with his wife and close friends.
