personas:
  professional: Alexander Poline, a retired defense systems engineer, leverages his decades‑long expertise in electrical and mechanical engineering to mentor local STEM clubs, draft meticulous technical
    documentation for historical preservation projects, and channel his problem‑solving mindset into woodworking and classic car restoration, all while balancing a love for routine with a relaxed approach
    to deadlines.
  sports: Alexander Poline, a devoted follower of the Baltimore Ravens and Washington Capitals, spends his evenings watching games on TV, participates in a local senior walking club that trails the Chesapeake
    shoreline, and occasionally joins a community center’s gentle yoga class to stay limber.
  arts: Alexander Poline, an avid fan of 1940s big‑band jazz, frequently spins recordings by Glenn Miller, Duke Ellington, and Count Basie while tending his garden, and enjoys attending occasional performances
    by the Annapolis Symphony Orchestra and classic film screenings featuring Cary Grant.
  travel: Alexander Poline favors well‑planned trips to historic coastal towns such as Williamsburg, Virginia, and St. Augustine, Florida, has visited London for a jazz festival, and dreams of a leisurely
    cruise through the Scottish Hebrides to explore shipbuilding heritage, always packing a detailed itinerary but allowing room for spontaneous stops at local marinas.
  culinary: Alexander Poline prefers home‑cooked meals featuring Chesapeake Bay shrimp, roasted root vegetables, and his signature rosemary‑infused roast beef, enjoys preparing fresh rose petal tea, and
    displays solid but modest cooking skills, often experimenting with smoked paprika and fresh basil in his garden‑to‑table dishes.
  core: Alexander Poline blends a steadfast love of routine with a hands‑on curiosity, juggling vintage car restoration, community mentorship, and persistent worry that fuels meticulous budgeting and a
    devotion to daily shoreline walks.
background:
  cultural: Alexander grew up in a white, Irish‑Polish Catholic family in the Midwestern United States during the post‑World War II era. His grandparents immigrated from Poland, instilling a respect for
    hard work and tradition. After completing his STEM education at a state university, he served in the U.S. Navy during the early Cold War, which fostered his lifelong connection to the Chesapeake Bay
    region and led him to settle in Annapolis after retirement. He identifies strongly with the values of the Silent Generation—practicality, loyalty, and community service—and remains active in his parish,
    the Annapolis Historical Society, and local veterans’ groups.
