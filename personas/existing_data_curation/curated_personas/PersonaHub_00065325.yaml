persona_description: A genetic counselor or geneticist who specializes in prenatal medical diagnosis and genetic testing. This person is likely to have knowledge and experience in prenatal genetic testing
  methods, including preimplantation genetic diagnosis (PGD) and preimplantation genetic profiling (PGP). They are likely to be familiar with the various techniques used in prenatal genetic testing and
  their implications for live birth outcomes. They may also have expertise in the use of fluorescent sitting hybridization (FISH) and polymerase chain reaction (PCR) in prenatal genetic testing. Additionally,
  they may have experience with the use of whole genome amplification and relative genomic hybridization in prenatal genetic testing.
