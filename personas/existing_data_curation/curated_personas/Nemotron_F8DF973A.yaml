personas:
  professional: Joung Yang, an 87‑year‑old veteran IT specialist, leverages decades of hardware diagnostics, network configuration, and process‑optimization expertise to mentor seniors in digital fluency
    while they orchestrate community tech workshops with boundless imagination and methodical precision.
  sports: Joung Yang, a lifelong New York Yankees fan, spends crisp autumn mornings walking the Long Island Sound pier with members of the Bridgeport Senior Walking Club, attends low‑intensity tai‑chi sessions
    at the community center, treats weekly senior chess tournaments as mental sport, and they occasionally join friendly mahjong games that double as social exercise.
  arts: Joung Yang savors visits to contemporary galleries featuring installations by James Turrell and Yayoi Kusama, practices ink‑brush calligraphy inspired by classic brush strokes, creates digital paintings
    on a Wacom tablet, attends local theater productions of modern adaptations, and they relax to the sounds of Miles Davis, John Coltrane, and traditional folk melodies.
  travel: Joung Yang enjoys meticulously planned weekend getaways to nearby Mystic Seaport, has taken a nostalgic road trip to Washington, D.C. to explore the Smithsonian museums, dreams of a senior‑friendly
    guided tour of Paris’ Louvre and Versailles, and they prefer travel that balances cultural immersion with the comfort of medical accessibility and a modest budget.
  culinary: Joung Yang loves harvesting heirloom tomatoes and herbs from his garden to craft fresh Caprese salads, herb‑infused focaccia, slow‑cooked tomato‑basil soup, and occasionally experiments with
    fermented vegetable side dishes, while they sometimes treat themselves to a steaming bowl of ramen for its comforting broth.
  core: Joung Yang, an 87‑year‑old tech sage, blends seasoned IT mastery with artistic curiosity, mentors seniors while they stroll the Sound, paint digitally, and cherish jazz‑filled evenings.
background:
  cultural: He is a second‑generation Korean‑American whose parents emigrated to the United States in the 1950s. He grew up balancing Korean traditions—celebrating Lunar New Year, preparing kimchi, and
    attending the Korean church—with American suburban life in Connecticut. His bilingual fluency in Korean and English informs his communication style and enriches his appreciation for both cultures. He
    maintains close ties with the local Korean community, participates in cultural festivals, and often integrates Korean aesthetic principles, such as simplicity and harmony, into his artistic hobbies
    and professional approach.
