  hobbies: '[''Contemporary art gallery visits'', ''Ink brush calligraphy'', ''Digital painting'', ''Science-fiction reading'', ''Local theater attendance'', ''Senior chess club'', ''Mahjong'', ''Volunteer
    computer-skills teaching'', ''Shoreline walks'', ''Gardening'', ''Listening to Korean folk music and jazz'']'
  career_goals: At 87, his primary goal is to leave a lasting legacy by mentoring the next generation of IT professionals, especially seniors seeking digital fluency. He aims to develop a community outreach
    program that offers free tech workshops for older adults in Bridgeport, integrating his business insight with his technical skills. He also aspires to author a memoir or series of blog posts reflecting
    on the evolution of technology from the mainframe era to modern cloud computing, and to experiment with AI‑assisted creative projects such as generative art.
