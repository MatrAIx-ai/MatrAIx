personas:
  professional: Braxton Sullivan, a 15‑year‑old aspiring mechanical engineer and indie game modder, channels their skeptical, methodical mindset into hands‑on motorcycle restoration, precision woodworking,
    and coding custom game‑mod scripts, constantly iterating prototypes to balance innovative ideas with proven engineering practices.
  sports: Braxton Sullivan dominates the community center basketball courts three evenings a week, modeling their play after the Miami Heat’s fast‑break tactics, follows the Detroit Pistons and the local
    high‑school soccer team for inspiration, and supplements their routine with strength‑training sessions at home and weekend fishing trips that double as low‑impact cardio and patience drills.
  arts: Braxton Sullivan expresses creativity through hand‑painted wooden scale‑models while blasting classic rock legends like Led Zeppelin and country icons such as Dolly Parton, often sketching design
    variations to classic motorcycle lines while listening to film composer Hans Zimmer for cinematic inspiration.
  travel: Braxton Sullivan prefers road‑trip itineraries that marry practical stops with hobby exploration—having driven to the Harley‑Davidson Museum in Milwaukee and spent a weekend fishing the Adirondack
    lakes, they now aspire to a spring journey along Route 66 to the Toyota Motor Museum in Texas and, ultimately, a cultural deep‑dive at Kawasaki’s headquarters in Japan to study cutting‑edge bike engineering.
  culinary: Braxton Sullivan is a self‑taught cook whose go‑to dishes include pepperoni pizza with extra mozzarella, grilled salmon topped with honey‑glazed teriyaki, and hearty BBQ ribs seasoned with a
    secret rub learned from their dad, while they enjoy spicing up meals with fresh herbs like rosemary and cilantro, though they often skip vegetables in favor of carbs after late‑night coding sessions.
  core: Braxton Sullivan, a 15‑year‑old skeptical tinkerer, blends hands‑on motorcycle repairs, competitive basketball, and classic rock head‑banging into a pragmatic yet curiosity‑driven worldview, occasionally
    succumbing to impulsive micro‑purchases in video games.
background:
  cultural: Braxton grew up in Vance, a small town in Tuscaloosa County, within a close‑knit white, Southern‑American family that values community, self‑reliance, and faith. Family gatherings often revolve
    around church events, backyard barbecues, and local high‑school football games. The region’s emphasis on practical skills, such as farming, hunting, and hands‑on trades, shapes his appreciation for
    tangible results. While respecting traditional values, he also embraces modern technology, reflecting the blend of heritage and forward‑looking curiosity common among rural teens in the American South.
