  career_goals: Braxton aims to turn his mechanical curiosity into a career as an automotive technician or a mechanical engineer, with a long‑term ambition to open his own custom motorcycle shop. He plans
    to attend a technical college after high school, earn certifications in automotive repair, and later pursue an engineering degree if he decides to specialize in design. In the short term, he wants to
    earn his driver’s license, secure a part‑time apprenticeship at a local garage, and enter statewide technology competitions to bolster his résumé.
