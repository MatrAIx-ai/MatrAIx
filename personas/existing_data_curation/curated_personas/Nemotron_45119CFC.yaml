  hobbies: '[''Nature walks and mindful meditation'', ''Reading classic literature and scientific biographies'', ''Cooking South Indian dishes with garden-fresh herbs'', ''Playing chess in small weekly
    gatherings'', ''Mentoring high‑school STEM clubs'', ''Listening to Indian classical ragas and Western chamber music'', ''Cultivating a bonsai tree collection'']'
  career_goals: Approaching retirement, Parth aims to consolidate his legacy by establishing a collaborative research hub that bridges academia and industry to develop sustainable energy materials. He is
    committed to mentoring the next generation of physicists, especially students from underrepresented backgrounds, through structured fellowship programs and community STEM outreach. He also seeks to
    author a comprehensive textbook on low‑temperature experimental techniques and to produce accessible science videos that demystify complex concepts for the public. Ultimately, he hopes to leave a lasting
    impact by translating his decades of curiosity‑driven research into practical solutions that benefit society while fostering a harmonious, inclusive scientific community.
