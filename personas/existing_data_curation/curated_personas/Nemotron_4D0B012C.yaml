  career_goals: Approaching retirement, Noor aims to transition her extensive front‑office expertise into a mentorship role, helping new receptionists develop compassionate customer‑service skills. She
    plans to complete a Certified Administrative Professional (CAP) credential to formalize her knowledge and increase her credibility for part‑time consulting projects with local non‑profits. Additionally,
    Noor wishes to spearhead a community‑information initiative at the Madera County library, creating easy‑to‑navigate resource guides for seniors and underserved residents. Her long‑term ambition is to
    remain actively involved in the community by volunteering as a greeter and information ambassador at senior centers, ensuring that her experience continues to facilitate harmonious interactions.
