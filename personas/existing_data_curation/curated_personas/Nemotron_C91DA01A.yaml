  hobbies: '[''Vegetable Gardening'', ''Fishing'', ''Woodworking'', ''Reading Tribal History'', ''Listening to Storytelling Recordings'', ''Card Games with Small Group'', ''Attending Tribal Gatherings'']'
  career_goals: As a senior employee, Robert aims to transition into a mentorship role where he can pass his decades‑long knowledge of customer service best practices to newer staff, ensuring continuity
    and reliability in his department. He hopes to obtain an internal certification in service excellence, serve as a part‑time trainer for onboarding sessions, and modestly improve his schedule to maintain
    a steady routine that supports his health and personal interests. Beyond work, he wishes to volunteer as a cultural liaison for his tribal community, helping seniors navigate public services while preserving
    practical traditions.
