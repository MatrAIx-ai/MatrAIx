personas:
  professional: Amanda Lee is a budding junior engineer who channels their love for organized play into meticulous LEGO constructions and model kits, demonstrating early technical problem‑solving skills
    and a calm, reliable work ethic that makes them a go‑to helper for school science projects.
  sports: Amanda Lee enjoys hiking the local Pine Ridge Trail and participates in a junior equestrian club, they cheer for the hometown minor league baseball team the River City Racers, and they occasionally
    join a community soccer league, balancing outdoor adventure with structured practice.
  arts: Amanda Lee dedicates three evenings a week to piano, playing pieces by Ludwig van Beethoven and contemporary composer Yiruma, while also attending weekend LEGO fan conventions where they admire
    the works of master builders like Nathan Sawaya, feeding their creative imagination.
  travel: Amanda Lee loves weekend road trips to nearby state parks such as Redwood National Park and dreams of a school‑led field trip to the ancient ruins of Machu Picchu, and they plan each journey with
    a checklist and a reusable water bottle to stay organized.
  culinary: Amanda Lee prefers simple, hands‑on meals like homemade spaghetti carbonara and fish tacos, enjoys snacking on trail mix with dried cranberries, and they occasionally experiment with making
    rock candy, showcasing a budding curiosity in the kitchen.
  core: Amanda Lee blends a love for structured creativity with calm resilience, turning LEGO bricks into engineering practice, budgeting their allowance like a tiny accountant, and tackling hobbies with
    quiet determination.
background:
  cultural: Amanda was raised in American Fork, Utah, a suburban community known for its close‑knit families, outdoor recreation, and emphasis on community service. Her family participates in local traditions
    such as holiday potlucks, seasonal festivals, and weekend activities like ski trips to the nearby Wasatch Mountains. The cultural environment values education, self‑reliance, and volunteering, which
    have shaped Amanda’s balanced view of personal responsibility and compassion. While her household reflects mainstream American cultural practices, the region’s connection to the natural landscape influences
    her love for nature and wildlife.
