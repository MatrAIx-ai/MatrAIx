  career_goals: Amanda is fascinated by living things and hopes to become a wildlife biologist or veterinarian, where she can apply her practical mindset and structured approach to caring for animals. She
    also enjoys building and designing, so she occasionally imagines a future as a civil engineer, creating safe community spaces. She is exploring these possibilities through science clubs and classroom
    projects, aiming to study biology and engineering in high school and beyond.
