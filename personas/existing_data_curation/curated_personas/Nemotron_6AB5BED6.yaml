personas:
  professional: Augusto Rios, a 21‑year‑old STEM undergraduate turned freelance tech tinkerer, blends Python, C++, and CAD expertise to deliver rapid‑prototype data‑analysis scripts and Arduino sensor rigs
    for local Auburn businesses, thriving on the competitive pressure of online hackathons while favoring autonomous, project‑based work over rigid corporate hierarchies.
  sports: Augusto Rios spends weekends hiking the Androscoggin River Valley trails, occasionally joins a local amateur soccer team called the Auburn Aces, follows the Boston Red Sox and New England Patriots
    for a dose of competitive spirit, and maintains a modest cardio regimen that balances his love for solitary outdoor exercise with occasional group runs at the Grafton Notch trailhead.
  arts: Augusto Rios draws creative inspiration from sci‑fi author William Gibson, indie folk band Arcade Fire, ambient composer Brian Eno, and the cinematic worlds of Bong Joon‑ho and Guillermo del Toro,
    often attending intimate open‑mic nights at a downtown coffee house where he shares his own algorithmic music experiments.
  travel: Augusto Rios has trekked the moss‑laden streets of Valparaíso, explored the historic neighborhoods of Boston, and toured Portland’s food scene, while dreaming of a rugged adventure in Patagonia’s
    Torres del Paine and a selfie‑stop at Iceland’s Jökulsárlón glacier lagoon.
  culinary: Augusto Rios frequently prepares hand‑rolled empanadas with pino filling and pastel de choclo for friends, seasons home‑grown basil, cilantro, and oregano in a small indoor herb garden for fresh
    sauces, and balances his palate with occasional grilled sardines drizzled with a cilantro‑lime vinaigrette.
  core: Augusto Rios is a curious, competitive solo tinkerer who balances frugality with gadget addiction, prefers quiet hikes over crowds, and channels his upbringing’s mix of resilience and individualism
    into a relentless DIY spirit.
background:
  cultural: Augusto was born and raised in Chile, where he grew up immersed in a family culture that values education, resilience, and a strong connection to the natural landscape of the Andes and the coast.
    He carries this cultural heritage with him in Maine through his love of Chilean cuisine—preparing empanadas and pastel de choclo for himself and friends—and his appreciation for outdoor activities,
    mirroring the South American tradition of hiking and nature appreciation. Bilingual in Spanish and English, he often switches languages for personal reflection or when engaging with Chilean expatriate
    communities online. While he maintains a pragmatic, individualistic outlook shaped by his personal ambitions, he also respects the Chilean value of "compadre" solidarity, which surfaces in his occasional
    mentorship of younger students at the local university’s tutoring center.
