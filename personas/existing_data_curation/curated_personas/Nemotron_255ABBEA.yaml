  career_goals: Marilyn aims to advance to a department leadership role, such as STEM Department Chair, where she can shape district‑wide curriculum and secure grant funding for a maker‑space. She plans
    to pursue a master's in Educational Leadership within the next two years to qualify for an administrative track, eventually targeting a Vice‑Principal position. Additionally, she hopes to become a recognized
    presenter at regional STEM education conferences, showcasing successful robotics programs and data‑focused teaching methods, while maintaining a stable, predictable daily routine that aligns with her
    practical outlook.
