personas:
  professional: Marilyn Guzman, a seasoned secondary‑school STEM teacher, blends meticulous curriculum design, data‑driven assessment, and technology integration with their cautious, competitive nature,
    steering the classroom toward measurable success while mentoring robotics and coding clubs.
  sports: Marilyn Guzman plays on a local co‑ed softball league, avidly supports the Seattle Mariners and the WNBA’s Seattle Storm, and stays fit through community Zumba sessions, weekend hikes in nearby
    state parks, and occasional participation in a family‑friendly cycling club.
  arts: Marilyn Guzman devotes evenings to a mystery‑thriller book club featuring authors like Gillian Flynn and Tana French, enjoys listening to Taylor Swift and the classic scores of Hans Zimmer, and
    attends the community theater’s productions of works such as Arthur Miller’s *The Crucible*.
  travel: Marilyn Guzman prefers meticulously planned family trips that balance relaxation with adventure, having recently explored the geysers of Yellowstone National Park, the historic streets of Savannah,
    Georgia, and dreaming of a spring visit to the cherry blossoms in Kyoto, Japan.
  culinary: Marilyn Guzman, a confident home cook, delights in baking chocolate chip cookies, crafting garden‑fresh herb pesto pasta, and preparing hearty lasagna with locally sourced vegetables, while
    occasionally treating the family to sushi rolls from a nearby bistro.
  core: Marilyn Guzman is a routine‑driven, competitive STEM educator who channels their anxiety into disciplined teaching, meticulous budgeting, and a blend of family‑centered fitness and creative hobbies.
background:
  cultural: Marilyn grew up in a middle‑class, predominantly white suburban neighborhood in Bergen County, New Jersey. Her family values emphasized education, hard work, and community involvement, with
    a strong sense of tradition and practicality. She was raised in a Protestant household that celebrated holidays with family gatherings and community service. The multicultural fabric of Lodi and surrounding
    towns exposed her to a variety of cultural perspectives, fostering a respectful but cautious approach to new ideas. Her upbringing reinforced a belief in stable routines, self‑reliance, and the importance
    of contributing to local schools and civic organizations.
