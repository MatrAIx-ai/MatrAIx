  career_goals: Although retired from the formal workforce, Victor aims to deepen his impact on the Rockford community. He plans to expand his volunteer mentorship program for at‑risk youth, lead a senior
    advocacy group that works on age-friendly city policies, and organize intergenerational cultural exchange events that celebrate African‑American history. He also hopes to write and self‑publish a memoir
    that captures his experiences from the civil‑rights era to the present, preserving stories for future generations. Supporting his grandchildren’s education and serving as a trusted advisor to local
    non‑profits are central to his ambitions.
