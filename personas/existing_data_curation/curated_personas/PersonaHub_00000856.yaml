persona_description: A conservation biologist who is dedicated to the protection and restoration of St Helena's unique flora and fauna, specifically the St Helena ebony. This person is skilled in the use
  of propagation techniques for conservation, particularly with the use of cuttings from remaining wild shrubs. They are knowledgeable about the removal of wild goats from the island and the establishment
  of the ebony in cultivation at two key sites. This individual is also familiar with the hybrid species 'Rebony' and the potential threat of introgression. They are also involved in the cultivation of
  the ebony in private gardens, using clonal material from the upper cliff plant.
