  career_goals: Short‑term, Edward aims to solidify his academic standing and finish high school, seeking to improve his math and science grades to qualify for a trade apprenticeship. He hopes to secure
    a part‑time mentorship at a local auto shop to gain real‑world experience. In the medium term, he plans to enroll in a vocational program focusing on automotive technology or electrical work, earn ASE
    or journeyman certifications, and build a reputation as a dependable technician. Long‑term, Edward envisions either running his own automotive repair business or joining a skilled trades union, providing
    a stable, predictable career path that leverages his practical strengths. He also keeps the option open of enlisting in the military’s technical corps after graduation, which aligns with his desire
    for structured environments and a clear progression.
