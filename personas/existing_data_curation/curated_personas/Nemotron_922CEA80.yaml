personas:
  professional: Edward Do, a 15‑year‑old aspiring robotics engineer, combines a love for precise scale‑model construction, strategic simulation gaming, and hands‑on tinkering to excel in his school’s robotics
    club, where they demonstrate reliable teamwork, assertive problem‑solving, and a practical focus on turning complex plans into functional prototypes.
  sports: Edward Do plays point guard for the Frederick High School basketball team, follows the Washington Wizards and Washington Capitals avidly, hikes the Catoctin Mountain trails with a local Boy Scouts
    outdoor club, and fishes at nearby streams as part of a youth angling group, balancing competitive team sport with solitary outdoor recreation.
  arts: Edward Do channels a meticulous eye for detail into painting scale models with Tamiya lacquer paints, enjoys video game soundtracks by Christopher Tin and Jeremy Soule, watches classic sci‑fi films
    like "The Martian," and follows hobby YouTubers such as Linus Tech Tips for inspiration, merging artistic appreciation with technical pursuits.
  travel: Edward Do prefers meticulously planned getaways, having visited Washington, D.C.’s National Air and Space Museum and Shenandoah National Park, and dreams of a future trip to Japan’s aviation museums
    while budgeting travel funds through part‑time lawn‑mowing gigs, blending adventure with a focus on cost‑effectiveness.
  culinary: Edward Do favors straightforward meals such as homemade pizza and grilled cheese, enjoys preparing trail‑mix snacks for hikes, can confidently bake model‑themed cupcakes with buttercream frosting,
    and occasionally experiments with simple sushi rolls after watching tutorial videos, reflecting a modest yet growing cooking confidence.
  core: Edward Do is a methodical teen who fuses a love for structured hobbies—model building, strategy gaming, and robotics—with a practical approach to money, health, and outdoor adventure, while occasionally
    slipping into spontaneous gaming marathons and snack binges.
background:
  cultural: Edward was raised in Myersville, a small community in Frederick County, Maryland, within a middle‑class, white American family. His upbringing reflects the values of the Mid‑Atlantic region—emphasis
    on hard work, community involvement, and practical self‑reliance. He grew up attending a local public high school, participating in school sports and extracurricular clubs, and taking part in regional
    traditions such as the county fair and seasonal outdoor activities like hiking on the Appalachian Trail. His family’s cultural practices include regular attendance at community gatherings, a respect
    for local history, and an appreciation for regional foods such as crab cakes and Maryland‑style barbecue. This environment has reinforced Edward’s preference for structure, responsibility, and collaborative
    community life while allowing space for personal exploration.
