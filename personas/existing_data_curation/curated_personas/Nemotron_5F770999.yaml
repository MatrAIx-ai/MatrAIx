  hobbies: '[''Fishing'', ''Snowmobiling'', ''Woodworking'', ''Community theater'', ''Senior center bingo'', ''Genealogy research'', ''Church choir'', ''Reading technology magazines'', ''Hunting'', ''Gardening'']'
  career_goals: Although retired from formal employment, Sean aims to channel his experience into legacy‑building activities. He plans to complete a community‑college course on regional history, then spearhead
    a local heritage project that documents the stories of Itasca County's early settlers. He also aspires to mentor high‑school students interested in trades such as mechanics and carpentry, offering practical
    workshops at the senior center. Additionally, Sean hopes to write a memoir that blends his personal adventures with reflections on the evolving rural Midwest, hoping it will inspire future generations
    to balance curiosity with practicality.
