  career_goals: Hang aims to expand his impact from department‑level training to strategic, organization‑wide learning leadership. Over the next five years, he envisions moving into a senior director or
    VP role overseeing a holistic learning strategy that integrates emerging technologies such as AR/VR and AI‑driven personalization. He is pursuing professional certifications like the ATD Certified Professional
    in Learning and Performance (CPLP) and plans to earn a graduate certificate in Organizational Development to strengthen his strategic planning skills. Ultimately, he hopes to launch his own consultancy
    focused on multicultural workforce development, helping companies create inclusive learning environments that respect his East Asian heritage and American corporate culture.
