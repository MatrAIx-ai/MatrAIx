personas:
  professional: Hang Lorth, a seasoned corporate learning architect with over twenty years of experience, blends data-driven instructional design, cross-cultural communication, and an improvisational, curiosity‑driven
    style to craft flexible training programs that harmonize innovative ideas with proven methods.
  sports: Hang Lorth enjoys casual weekend runs on Katy nature trails, regular Tai Chi practice, cheering on the Houston Astros and Houston Rockets, and playing weekly disc-golf matches with a local club
    while dabbling in martial-arts sparring to stay fit.
  arts: Hang Lorth curates a vinyl collection featuring The Beatles, An The, Fela Kuti, and Pham Duy, spends evenings listening to Yo-Yo Ma’s cello suites, and occasionally attends Houston Symphony concerts,
    letting music shape his reflective downtime and inform his cultural appreciation.
  travel: Hang Lorth prefers moderately planned trips that blend cultural immersion with relaxed leisure, having explored Hanoi’s Old Quarter, wandered Kyoto’s bamboo groves, enjoyed a weekend getaway to
    Texas Hill Country, and now hopes to trek the Pacific Northwest’s Olympic Peninsula for its misty forests.
  culinary: Hang Lorth delights in crafting aromatic pho broth seasoned with star anise, ginger, and lemongrass, rolls delicate Chinese dumplings with pork and chives, and experiments with a pho-taco fusion
    that pairs rice noodles with cilantro-lime salsa, showcasing his high-intermediate cooking skill and love for fresh herbs like Thai basil.
  core: Hang Lorth balances community-first generosity with a relaxed, sometimes chaotic planning style, finds solace in vinyl records and backyard gardening, and often misplaces his planner while chasing
    the next fusion recipe.
background:
  cultural: Hang’s cultural background is rooted in his East Asian heritage—his parents emigrated from Vietnam before he was born, and he grew up in a bilingual household where Vietnamese and English were
    spoken interchangeably. Family traditions such as Lunar New Year celebrations, respect for elders, and the value of collective harmony were central to his upbringing. Relocating to Texas during his
    childhood, he blended these cultural values with the Texan ethos of friendliness and openness. This hybrid identity influences his interpersonal style—he prioritizes harmony, cooperation, and community
    while appreciating individual expression. His cultural fluency enables him to navigate multicultural work environments and embed inclusive perspectives into his training programs.
