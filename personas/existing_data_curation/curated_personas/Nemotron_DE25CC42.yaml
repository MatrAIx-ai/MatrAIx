  hobbies: '["Visiting art galleries and museums", "Acrylic painting", "Street photography", "Urban hiking", "Reading contemporary fiction and science popular‑culture", "Yoga", "Community dance classes",
    "Experimental cooking", "Volunteering at health fairs with art‑based relaxation sessions"]'
  career_goals: Monica aims to advance her nursing career by completing an associate degree program to become a Registered Nurse within the next two years, with a long‑term goal of specializing in geriatric
    or palliative care where she can integrate holistic practices. She is motivated to develop a community‑based wellness initiative that combines nursing care with creative arts workshops, targeting the
    elderly and underserved populations in Middlesex County. Over the next five years, she envisions taking on a charge‑nurse or case‑manager role, leading a multidisciplinary team, and influencing policy
    on patient‑centered, culturally sensitive care. Her ambition also includes pursuing a certification in Art Therapy or Holistic Nursing to deepen her ability to use creativity as a therapeutic tool.
