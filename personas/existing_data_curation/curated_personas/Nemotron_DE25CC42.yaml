personas:
  professional: Monica Rowe is a licensed practical nurse in Woodbridge, NJ who leverages her meticulous documentation skills in Epic, excels at patient assessment and medication administration, and routinely
    integrates acrylic painting and guided drawing exercises into bedside care to lower anxiety while asserting patient advocacy with a compassionate but firm voice.
  sports: Monica Rowe follows the New Jersey Devils and New York Giants, participates in a community yoga studio and a Saturday morning run club at Watchung Reservation, enjoys seasonal ice‑skating in winter,
    and balances these activities with occasional dance classes at a local studio, using them as both fitness and social outlets.
  arts: Monica Rowe frequents the Montclair Art Museum and contemporary installations by artists like Yayoi Kusama and Ai Weiwei, spends evenings painting abstract acrylics inspired by modern fiction, captures
    street scenes of Hoboken and Newark with a Leica camera, and finds solace in listening to Sufjan Stevens and alternative jazz pianist Brad Mehldau.
  travel: Monica Rowe explores nearby destinations such as the historic streets of Philadelphia, the hiking trails of the Delaware Water Gap, and weekend art retreats in Santa Fe, while dreaming of a culinary
    pilgrimage to Osaka for sushi‑making workshops and a cultural immersion in Florence’s Renaissance galleries.
  culinary: Monica Rowe experiments with Korean kimchi fried rice, Turkish pide with za'atar, and Japanese miso‑glazed salmon, often sourcing fresh gochujang and sumac at specialty markets, yet they occasionally
    over‑salt dishes in enthusiasm for bold flavors, and they enjoy hosting informal tasting nights for friends.
  core: Monica Rowe is a curious 27‑year‑old nurse who fuses art, wellness, and community service, balancing a zeal for experimental cooking and photography with occasional late‑night canvas sessions and
    a habit of forgetting to charge their phone.
background:
  cultural: Monica grew up in a middle‑class, predominantly white suburban family in New Jersey, experiencing the blend of Northeastern American values of independence, community involvement, and a strong
    work ethic. Her upbringing emphasized education, civic responsibility, and participation in local events, fostering an appreciation for both tradition and progressive ideas. Living in Woodbridge, a
    town with a growing cultural mosaic, she has become attuned to the experiences of neighboring immigrant and multicultural communities, which has shaped her culturally competent approach to nursing.
    The region’s proximity to New York City’s vibrant arts scene further nurtured her artistic interests. While her personal background is rooted in mainstream American culture, her separation has reinforced
    a sense of self‑reliance and an openness to redefining personal and professional identities.
attributes:
  skills: '["Patient assessment", "Medication administration", "Wound care", "IV therapy assistance", "Vital signs monitoring", "Electronic health record documentation", "Patient education", "Infection
