  career_goals: Although officially retired, Randy aims to deepen his contribution to the Noblesville community by establishing a monthly ‘Art & Storytelling’ series at the senior center, where he can combine
    his visual art, writing, and musical abilities. He hopes to publish a small collection of poems and short reflections inspired by his Midwestern upbringing, targeting a regional literary journal. Randy
    also aspires to become an active volunteer docent at the local historical museum, leveraging his genealogy expertise to guide visitors through personal narratives of the area. In the longer term, he
    wishes to mentor a handful of young adults interested in pursuing creative careers, offering guidance on portfolio development and interdisciplinary thinking.
