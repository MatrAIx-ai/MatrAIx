  hobbies: '[''Gardening (vegetable and heirloom varieties)'', ''Cooking traditional Southern and soul‑food dishes'', ''Listening to Chicago blues and jazz'', ''Volunteer STEM mentorship for local high‑school
    students'', ''Fishing at Lake Michigan shoreline'', ''Reading biographies of engineering pioneers and civil‑rights leaders'', ''Attending church choir rehearsals'']'
  career_goals: Approaching retirement, Herbert aims to shift from full‑time project delivery to a consulting and mentorship role that lets him focus on community‑centered infrastructure projects in Chicago.
    He wants to establish a mentorship program through the local chapter of the National Society of Black Engineers, guiding high‑school and early‑college students toward engineering careers. Additionally,
    he hopes to influence his firm’s policies to improve work‑life balance and stress management for senior staff, while still contributing his practical expertise to ensure safe, reliable public works.
