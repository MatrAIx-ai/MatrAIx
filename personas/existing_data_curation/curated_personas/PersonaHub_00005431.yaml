persona_description: A green and environmentally-friendly architectural façade cladding project designer who is interested in terracotta panel technology and its comparable strengths, particularly in terms
  of fire safety, acid and alkali resistance, scratch and wear resistance, high compressive strength, thermal insulation, sound insulation, ventilation, moisture removal, and anti-seismic performance. This
  persona values sustainable and eco-friendly building materials and their impact on indoor temperature environment in Summer. They are interested in the specific open installation method, water resistance,
  anti-collision design, pressure-proof and anti-seismic performance, and self-cleaning feature of terracotta panels. They are also interested in the ease of installation, quicker construction progress,
  and the ability to replace broken terracotta panels without affecting the whole panel.
