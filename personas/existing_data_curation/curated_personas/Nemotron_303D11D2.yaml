  hobbies: '[''Digital illustration and sketching'', ''Creative writing (short stories, poetry)'', ''Science club projects (robotics, experiments)'', ''Soccer'', ''Folk dancing (Mexican traditional dances)'',
    ''Listening to Latin pop and indie music'', ''Volunteering at the community library'', ''Exploring nature trails in the Rio Grande Valley'']'
  career_goals: Giselle aims to study visual arts and computer science at a top university, with the long-term ambition to become a multimedia concept artist or UI/UX designer for interactive media, where
    she can merge her love for storytelling, abstract concepts, and technology. She also hopes to win national art and robotics competitions, secure scholarships that recognize both her artistic and STEM
    achievements, and eventually mentor younger Mexican-American students in her hometown, creating a community art-tech hub.
