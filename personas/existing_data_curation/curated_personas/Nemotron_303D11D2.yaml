personas:
  professional: Giselle Garcia, a 13‑year‑old aspiring comic‑book artist and budding robotics enthusiast, channels her vivid imagination and meticulous organization into daily sketches on a tablet and constructing
    simple robots for school fairs, while their competitive spirit drives them to constantly refine their craft and outshine peers.
  sports: Giselle Garcia plays forward for the South Valley Youth Soccer Club, trains three times a week with teammates, idolizes the Houston Dynamo, and balances competition with a love of outdoor hiking
    on the Rio Grande Valley trails, which they treat as both recreation and a stress‑relief outlet.
  arts: Giselle Garcia spends evenings drawing comic‑style heroes inspired by Stan Lee and Marjane Satrapi, experiments with Procreate on her tablet while listening to the indie sounds of Clairo and the
    Latin pop rhythms of Bad Bunny, and they often attend local art fairs to showcase their work and absorb influences from Studio Ghibli films.
  travel: Giselle Garcia dreams of attending the San Diego Comic‑Con with friends after saving for travel, eagerly plans family road trips to Big Bend National Park for trail hikes, and they keep a scrapbook
    of past visits to nearby nature preserves in the Rio Grande Valley, balancing the excitement of new destinations with the comfort of familiar hometown spots.
  culinary: Giselle Garcia enjoys crafting simple dishes like chicken fajitas with homemade guacamole and baking chocolate chip cookies, delights in experimenting with fresh mango salsa for snacks, but
    they tend to over‑season food when excited, reflecting their artistic flair in the kitchen.
  core: Giselle Garcia is a hyper‑creative, highly organized 13‑year‑old who juggles comic art, robotics, soccer and folk dancing, they fuel everything with a competitive edge, worry about perfection, yet
    constantly sketch new worlds to escape stress.
background:
  cultural: Giselle is a second-generation Mexican-American raised in Edinburg, Texas, a vibrant border city. At home, Spanish is spoken alongside English, and family gatherings feature traditional dishes
    like tamales and pozole, as well as celebrations of Dia de los Muertos and Mexican Independence Day. Her community values familismo and strong intergenerational ties, which shape her sense of responsibility
    and pride in her heritage. She frequently participates in local cultural festivals, attends a bilingual elementary school, and enjoys both Mexican folk music and contemporary American pop culture, creating
    a bicultural identity that informs her artistic and academic pursuits.
attributes:
  skills: '[''Digital illustration'', ''Sketching and traditional drawing'', ''Creative writing'', ''Basic coding (Scratch, introductory Python)'', ''Advanced mathematics (pre-algebra, geometry)'', ''Scientific
