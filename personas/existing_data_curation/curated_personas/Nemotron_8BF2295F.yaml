personas:
  professional: Jeffrey Bartels, a detail‑driven warehouse stocker who leverages inventory‑control expertise, forklift certification, and warehouse‑management‑software fluency to streamline operations,
    channels their curiosity for art and disciplined organization into a budding supply‑chain career aimed at supervising logistics for a museum or art‑supply retailer.
  sports: Jeffrey Bartels thrives on the camaraderie of weekly pickup basketball games, follows the Arkansas Razorbacks for college hoop action and roots for the St. Louis Cardinals during spring, and spends
    weekends hiking Ozark trails, treating fitness as both social outlet and personal discipline.
  arts: Jeffrey Bartels spends weekends wandering local galleries and photographing street murals, sketches scenes in a worn sketchbook, curates playlists of Sufjan Stevens, The Lumineers, and Father John
    Misty, and volunteers to set up school art shows, finding inspiration in both Banksy’s urban stencils and the vivid colors of regional muralists.
  travel: Jeffrey Bartels prefers budget‑friendly road trips, having explored Hot Springs National Park, Austin’s music scene, and a weekend stint in New Orleans, while dreaming of a springtime art pilgrimage
    to Berlin’s street‑art districts and a summer museum tour of Paris’s Louvre, always planning itineraries on Google Maps and sharing routes with friends.
  culinary: Jeffrey Bartels enjoys a low‑key culinary routine of grilling Arkansas‑style barbecue ribs, whipping up avocado toast with poached eggs, and experimenting with garlic‑parmesan gnocchi, while
    their palate also appreciates the smoky bite of local craft beers like Stone and the occasional shrimp‑and‑grits brunch at a downtown café.
  core: Jeffrey Bartels blends meticulous spreadsheets with spontaneous sketchbooks, steering life with disciplined logistics and an unabashed love for indie art, even if they sometimes procrastinate on
    paperwork until the last minute.
background:
  cultural: Jeffrey grew up in Hartsburg, a small town in Boone County, Missouri, within a predominantly white, Midwestern community. His family’s roots trace back to German and Irish ancestors, and he
    was raised with values of hard work, modesty, and community service. He attended the local high school, participated in football and the art club, and was involved in church gatherings and county fairs.
    The region’s agricultural heritage and close‑knit small‑town culture have shaped his practical mindset, while exposure to local folk art, regional festivals, and Midwestern music nurtured his curiosity
    for varied artistic expression.
attributes:
  skills: '["Inventory management", "Order fulfillment", "Warehouse Management System (WMS) operation", "Forklift operation", "Time management", "Team coordination", "Basic graphic design (Canva)", "Photography",
    "Customer service", "Problem solving"]'
  hobbies: '["Visiting art galleries", "Sketching", "Photography", "Pickup basketball", "Hiking", "Listening to indie/folk music", "Reading science fiction", "Volunteering at community events"]'
  career_goals: Jeffrey aims to pursue a supply chain management certification and eventually become a logistics supervisor, preferably overseeing distribution for a cultural institution such as a museum
    or an art‑supply retailer. He plans to enroll in a community college program, obtain a CPIM certification, and gain experience in inventory analytics. Long‑term, he dreams of opening a small boutique
    that blends his logistical expertise with his passion for art by offering curated art supplies and local artists' work.
