  skills: '[''home maintenance'', ''woodworking'', ''garden planning'', ''small-engine repair'', ''budgeting and bookkeeping'', ''event coordination'', ''basic computer usage'']'
  hobbies: '[''fishing'', ''gardening'', ''woodworking'', ''watching Green Bay Packers football'', ''reading historical nonfiction'', ''playing bridge'', ''church volunteering'', ''genealogy research'']'
  career_goals: 'Although retired, George aims to remain active and purposeful: he wants to complete a handcrafted oak dining table for his wife, compile a memoir that captures his family’s history for
    future generations, mentor younger seniors at the local community center, and maintain financial stability for his household. He also aspires to learn digital photography to document his fishing trips
    and gardening successes, and to ensure his home remains safe and well‑maintained for the years ahead.'
