personas:
  professional: David Batista, a seasoned handyman and aspiring home‑based caterer, they blend bilingual fluency with a relaxed, improvisational style to turn everyday repairs and family‑style meals into
    informal service opportunities, while their occasional disorganization fuels a drive to earn a GED and secure a part‑time role at a local hardware store.
  sports: David Batista, an avid soccer fan in Santa Ana, they cheer for Club América and the LA Galaxy, never miss a local MLS match at Dignity Health Sports Park, track Liga MX scores while flipping tamales,
    and supplement their fandom with occasional pickup games at the community field and a Sunday jog to the hardware store for fresh air.
  arts: David Batista, who finds artistic expression through his acoustic guitar, they often strum folk ballads inspired by Juan Gabriel and Lila Downs during family gatherings, adorn their living room
    with prints of Frida Kahlo, and spend evenings browsing DIY craft videos and short histories that blend creativity with cultural storytelling.
  travel: David Batista, a spontaneous road‑tripper, they love taking the kids on weekend drives to the redwoods of Northern California and the beaches of Catalina Island, while dreaming of a culinary pilgrimage
    to Oaxaca’s bustling markets, balancing a modest travel budget with a habit of last‑minute packing and a penchant for discovering new flavors.
  culinary: David Batista, a proficient home chef, they revel in crafting mole poblano and hand‑rolled tamales, seasoning them with garden‑fresh chilies, oregano, and a whisper of cacao, and delight in
    pairing these dishes with homemade salsa verde and fresh tortillas, often improvising with leftovers to keep the flavors lively.
  core: David Batista, blending handyman pragmatism with culinary passion, they navigate life with a laid‑back, improvisational flair, a love for family‑centered celebrations, occasional disorganization,
    and a habit of juggling tools and spice jars in equal measure.
background:
  cultural: David is a first-generation Mexican American whose family migrated from Jalisco to California in the 1970s. Raised in the working-class neighborhoods of Santa Ana, he grew up speaking Spanish
    at home while learning English through school and community interactions. His upbringing was shaped by strong familismo, reverence for Catholic traditions, and a deep appreciation for Mexican cuisine
    and celebrations. He maintains close ties with extended family, often gathering for large meals and holiday rituals such as Día de los Muertos altars. The vibrant Mexican community in Orange County,
    with its markets, festivals, and churches, continues to influence his daily life, blending Mexican heritage with the diversity of Southern California.
attributes:
  skills: '[''Basic handyman (electrical, plumbing, carpentry)'', ''Bilingual Spanish-English communication'', ''Cooking authentic Mexican cuisine'', ''Community mediation and conflict resolution'', ''Basic
    digital literacy (email, social media)'', ''Garden cultivation (vegetables, herbs)'', ''Basic automotive maintenance'', ''DIY project planning and improvisation'']'
  hobbies: '[''Cooking traditional Mexican dishes (tamales, mole, salsas)'', ''Watching and discussing soccer (Liga MX, MLS)'', ''Gardening (chilies, tomatoes, herbs)'', ''Playing acoustic guitar'', ''DIY
    home improvement projects'', ''Participating in community festivals (Cinco de Mayo, Día de los Muertos)'', ''Reading Mexican cultural history and DIY guides'']'
  career_goals: David aims to obtain his GED within the next year to open up modest employment opportunities. He dreams of turning his cooking passion into a modest home-based catering service focused on
    traditional Mexican dishes for family gatherings and community events. He also wants to launch a small community garden project in his neighborhood, providing fresh produce and a gathering space for
    locals. Volunteering at the Santa Ana cultural center as a language assistant and event organizer is another goal, allowing him to combine his bilingual skills with his love for cultural celebrations.
    Over the medium term, he hopes to secure a part-time role at a local hardware store where his handyman expertise can be valued, while maintaining the flexibility to spend time with his family and personal
    projects.
