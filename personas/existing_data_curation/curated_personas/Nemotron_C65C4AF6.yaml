  career_goals: He hopes to pursue a career that combines his love for animals and his interest in structured, quiet work environments. He dreams of becoming a wildlife biologist or a veterinarian, aiming
    to help animals and protect natural habitats. He also imagines a future role in a research lab or a library, where he can work with data, literature, and specimens in a calm setting. To reach these
    goals, he plans to study biology or environmental science in high school and college, and he intends to volunteer at local animal shelters to gain hands‑on experience.
