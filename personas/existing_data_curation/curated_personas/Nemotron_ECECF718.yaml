personas:
  professional: Data-driven talent manager Frederick Mincey leverages his graduate training in data science and engineering to streamline artist and athlete representation through analytical contract negotiations,
    predictive financial forecasting, and systematic process design, all while nurturing empathetic client communication and conflict resolution.
  sports: Outdoor-oriented Frederick Mincey hikes the Hill Country trails most weekends, belongs to the Hill Country Trail Runners club, follows the Dallas Stars hockey team and the Austin FC soccer club,
    and uses chess puzzles as a mental-sport workout to sharpen strategic thinking.
  arts: Culture-savvy Frederick Mincey attends intimate live-music shows featuring emerging folk artists like S. G. Goodman and indie acts such as The War on Drugs, while his nature photography draws inspiration
    from Ansel Adams and Vivian Maier, often displaying his prints at local coffee-shop galleries.
  travel: Meticulous planner Frederick Mincey constructs weekend itineraries that blend hiking the red rocks of Sedona, exploring the historic missions of San Antonio, and tasting street tacos in Mexico
    City, always securing flights and boutique accommodations months in advance to balance adventure with budget constraints.
  culinary: Amateur Tex-Mex chef Frederick Mincey delights in crafting chicken enchiladas topped with homemade salsa verde, roasted poblano peppers, fresh cilantro, and a splash of lime, but his habit of
    over-salting dishes often triggers a self-critical post-meal debrief.
  core: Frederick Mincey merges analytical precision with quiet introspection, channeling structured talent management into solitary hikes, mindful meditation, and a penchant for over-seasoned Tex-Mex cooking.
background:
  cultural: Frederick grew up in a middle‑class family on the outskirts of Austin, Texas, where his parents—both engineers—encouraged a strong work ethic and a love for STEM. The Texan cultural mix of hospitality,
    outdoor recreation, and a vibrant live‑music scene shaped his appreciation for community and the arts. His upbringing emphasized reliability, modesty, and cooperation, values he carries into his professional
    life while embracing the diverse, creative energy of Austin's cultural landscape.
attributes:
  skills: '[''Data analysis (Python, SQL, Tableau)'', ''Financial modeling and budgeting'', ''Contract negotiation'', ''Strategic planning and market research'', ''Digital marketing and social media analytics'',
