    communication and active listening'', ''Time management and scheduling'']'
  hobbies: '[''Hiking and trail biking in the Hill Country'', ''Nature photography'', ''Reading non‑fiction (psychology, economics, personal development)'', ''Chess and strategic board games'', ''Attending
    intimate live‑music shows'', ''Cooking and experimenting with Tex‑Mex recipes'', ''Meditation and mindfulness practice'', ''Journaling'', ''Volunteering as a math tutor for local high‑school students'']'
  career_goals: Frederick aims to become a senior director at a leading talent agency, where he can shape a data‑centric approach to artist and athlete representation. In the long term, he plans to launch
    his own boutique agency that prioritizes ethical management, sustainable career development, and transparent, structured processes for clients. He seeks to be recognized as a trusted, results‑focused
    professional who balances rigorous analytics with genuine care for his clients' well‑being.
