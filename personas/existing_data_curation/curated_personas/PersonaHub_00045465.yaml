persona_description: A Costa Rican entomologist who specializes in the study of ants and their biology, particularly in the southern part of the country. He has extensive experience collecting and analyzing
  ant specimens in Costa Rican forests and has a deep understanding of the complex relationships between different ant species. He is particularly interested in the classification and taxonomy of ants,
  and has conducted extensive research on the evolution and distribution of ant species in Costa Rica. He is also a recognized authority on the ant genus Ponera, with a particular focus on the species Ponera
  tornata, for which he has provided detailed taxonomic information and has conducted extensive fieldwork in Costa Rican rainforests.
