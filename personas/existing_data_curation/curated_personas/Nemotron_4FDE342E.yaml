    at the Auburn library'', ''Teaching basic computer skills to seniors'']'
  career_goals: Rafael's primary ambition is to stay engaged and meaningful in his community while continuing to broaden his horizons. He aims to complete a small classic‑car restoration project that combines
    his love of mechanics and nostalgia. He plans to launch a weekly cooking workshop where he teaches traditional Mexican recipes to neighbors, fostering cultural exchange. He also wants to volunteer as
    a mentor at the local senior center, offering practical advice on home repairs and basic computer use. A personal milestone he hopes to achieve is a reunion trip to his native town in Michoacán to reconnect
    with extended family and celebrate cultural traditions. Additionally, Rafael dreams of compiling his life stories and family recipes into a memoir‑style blog that can be shared with his grandchildren.
