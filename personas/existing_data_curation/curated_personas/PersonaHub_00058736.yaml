persona_description: A professional audio post-production master who specializes in preparing and transferring recorded audio from a source containing the final mix to a data storage device, using digital
  masters. The persona is highly skilled in the process of mastering audio, and is likely to have a deep understanding of the format of choice for digital masters, such as digital audio workstations (DAWs)
  and digital audio formats (such as Pro Tools or Logic Pro). The persona is also likely to have experience with various audio editing and mastering software, as well as the ability to edit and enhance
  audio tracks to achieve the desired radio quality sound. The persona is likely to have a strong understanding of the importance of mastering audio for competitive radio airplay and is likely to have experience
  with the pricing of mastering services.
