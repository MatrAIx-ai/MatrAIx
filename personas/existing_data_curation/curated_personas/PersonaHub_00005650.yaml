  This individual is likely to be knowledgeable about the environmental impact of palm oil production, the methods used to clear forests, and the impact of deforestation on wildlife and local communities.
  They are likely to be active on social media and other platforms, sharing information and advocating for change. This person is also likely to be aware of the potential for palm oil to be used in products
  such as cookies and snacks, and is committed to avoiding products that contain palm oil in order to prevent further destruction of natural habitats.
