persona_description: Lorraine Hansberry was a prominent African-American writer, activist, and civil rights leader who wrote the play "A Raisin in the Sun" in 1959. She was a member of the National Association
  for the Advancement of Colored People (NAACP) and participated in the civil rights movement in the South as a field organizer for CORE (the Congress of Racial Equality). Her work continues to be studied
  and celebrated for its contributions to the fight for civil rights and social justice.
