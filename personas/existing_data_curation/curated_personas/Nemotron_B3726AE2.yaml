  hobbies: '[''Urban gardening'', ''Home brewing craft beer'', ''Cycling'', ''Hiking'', ''Science‑fiction reading'', ''Writing personal journal'', ''Board‑game nights with friends'', ''Attending live music
    (jazz, blues) in Richmond'', ''Photography of rural landscapes'']'
  career_goals: Melvyn aims to transition from technician to senior research associate within the next three to five years, leading interdisciplinary projects that integrate sustainable agriculture with
    innovative food-processing technologies. He plans to pursue a master’s degree in Food Science to deepen his theoretical knowledge and earn professional certifications such as Certified Food Scientist
    (CFS). His long‑term ambition is to establish a consultancy that helps small‑scale Virginia farms adopt data‑driven practices for higher yield and food safety. Because he is often anxious about job
    security, he seeks roles that provide clear career ladders, mentorship, and opportunities to author peer‑reviewed publications. He also hopes to influence policy by contributing to regional food‑safety
    standard revisions, balancing personal advancement with community impact.
