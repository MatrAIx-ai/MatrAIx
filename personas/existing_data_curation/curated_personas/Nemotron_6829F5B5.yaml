  career_goals: Henry aims to transition from his current managerial role into senior leadership within a cultural institution or arts‑focused nonprofit in the Twin Cities. He envisions directing a museum’s
    education and community engagement department, establishing an interdisciplinary arts incubator that merges business innovation with creative expression, and championing diversity initiatives that amplify
    Black artists’ voices. Over the next decade, Henry also hopes to mentor emerging Black professionals in the arts sector and eventually serve on boards that shape cultural policy at the regional level.
