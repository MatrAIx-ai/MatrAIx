persona_description: A scientist and researcher working on environmental impacts of military conflicts and munitions dumping, particularly focusing on the Baltic Sea region. This individual is likely to
  be familiar with the research project "Towards the Monitoring of Dumped Munitions Threat" (MODUM) and the documentary "Deadly Depths". They have expertise in environmental science, particularly in the
  field of oceanography and toxicology, and have a deep understanding of the environmental impacts of military actions, including the contamination of landscapes and the release of hazardous substances
  into the ocean. They have experience in mapping munitions dump sites and have a keen interest in the research on munitions dumping off the US coast.
