personas:
  professional: Richard Mckissick, a seasoned postsecondary educator, blends cutting‑edge digital pedagogy with time‑tested instructional design, assertively leading faculty committees while fostering inclusive,
    empathetic classrooms that prioritize student mental well‑being.
  sports: Richard Mckissick, a devoted member of the Boundary Waters Hiking Club, spends weekends trekking the North Shore and fly‑fishing on Lake Vermilion, supports the Minnesota Timberwolves and Wild
    as a loyal fan, and practices yoga twice weekly to balance the physical demands of woodworking and the emotional strain of academic leadership.
  arts: Richard Mckissick plays acoustic guitar in a local folk trio covering artists like Gillian Welch and The Avett Brothers, captures sunrise landscapes in the style of Ansel Adams through nature photography,
    and regularly attends productions at the Guthrie Theater, finding creative solace that tempers their intense emotional reactivity.
  travel: Richard Mckissick meticulously plans wilderness retreats, having hiked the Canadian Rockies, photographed the fjords of Iceland, and dreams of a summer expedition to Patagonia’s Torres del Paine,
    while balancing travel costs with a disciplined savings plan and occasional family obligations.
  culinary: Richard Mckissick enjoys cooking hearty Midwest dishes such as pan‑fried walleye with dill, wild rice soup seasoned with thyme, and homemade apple crisp, often preparing meals over a wood‑fired
    stove using fresh herbs like rosemary and sage, while their woodworking hobby sometimes leads to improvised serving boards.
  core: Richard Mckissick is a methodical educator‑musician who channels anxiety into solitary outdoor pursuits, meticulous budgeting, and compassionate teaching, while occasionally indulging in impulsive
    gear purchases and overlooking dental appointments.
background:
  cultural: Richard grew up in a small‑town, Midwestern environment in Minnesota, steeped in values of self‑reliance, modesty, and community service typical of white, often Lutheran families of German and
    Scandinavian ancestry. His upbringing emphasized the importance of education as a pathway to personal and communal advancement. Living in Crow Wing County, he is aware of the region’s indigenous Ojibwe
    heritage and maintains a respectful appreciation for cultural diversity while holding onto the pragmatic, down‑to‑earth sensibility characteristic of the Upper Midwest.
