    ''Volunteering (Guatemalan cultural association)'']'
  career_goals: Looking ahead, Wilmarie aims to move into a senior leadership role such as Senior Management Analyst or Director of Business Insight within the next five years. She plans to deepen her analytical
    expertise by earning a PMP certification and pursuing a Lean Six Sigma Black Belt, enabling her to lead enterprise‑wide transformation projects. She is passionate about mentoring junior analysts, building
    a culture of data literacy, and championing initiatives that improve operational efficiency while preserving work‑life balance. A long‑term ambition is to establish a cross‑functional center of excellence
    that embeds structured decision‑making processes across the organization, and to use her position to advocate for inclusive practices that recognize the contributions of diverse cultural backgrounds.
