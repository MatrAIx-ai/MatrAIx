  hobbies: '["Trail hiking", "Weekend camping", "Cooking Mexican cuisine", "Listening to Latin rock and cumbia", "Yoga and mindfulness breathing", "Reading non-fiction on science and technology", "Bike
    riding", "Volunteer fire safety education"]'
  career_goals: Saray aims to advance to a station captain within the next three years, seeking leadership training and a bachelor's degree in fire science. She aspires to become a certified fire inspector,
    leveraging her curiosity for new safety technologies while applying practical field knowledge. Additionally, she wants to develop a fire prevention program targeting Spanish‑speaking communities, blending
    her cultural background with her professional expertise. Long‑term, she envisions a role in fire department administration where she can influence policy and mentor younger firefighters. Her competitive
    drive pushes her to pursue these milestones despite occasional procrastination.
