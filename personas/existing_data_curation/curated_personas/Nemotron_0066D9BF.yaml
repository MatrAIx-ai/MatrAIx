  career_goals: Approaching traditional retirement age, Eddie aims to transition from full‑time clinical practice to a role that amplifies his impact on health equity in Brooklyn. He plans to launch a community
    health hub that integrates chronic disease prevention, nutrition education, and arts‑based wellness workshops. He also aspires to author a book that weaves together patient stories with reflections
    on the medical humanities, and to serve as a guest lecturer in medical humanities courses at local medical schools. Additionally, Eddie intends to mentor a pipeline program for Black and Caribbean medical
    students and to advocate for policy changes that dismantle systemic barriers to care in minority neighborhoods.
