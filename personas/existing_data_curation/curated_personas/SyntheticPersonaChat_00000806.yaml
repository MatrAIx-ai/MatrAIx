    User 1: So, what do you like to do outside of hockey?

    User 2: I like to hang out with my friends, play video games, and go fishing.

    User 1: Oh, I love to fish too! What''s your favorite fish to catch?

    User 2: I like to catch bass.

    User 1: Bass are great! They''re so delicious.

    User 2: Yeah, they are!

    User 1: So, where do you like to fish?

    User 2: I like to fish at the lake.

    User 1: Oh, me too! I love the peace and quiet of the lake.

    User 2: Yeah, it''s really relaxing.

    User 1: So, what else do you like to do?

    User 2: I like to watch movies and play video games.

    User 1: Oh, I love to watch movies too! What''s your favorite movie?

    User 2: I like the movie "The Godfather".

    User 1: Oh, that''s a great movie! I love that movie too.

    User 2: Yeah, it''s so good.

    User 1: So, what''s your favorite video game?

    User 2: I like the game "Call of Duty".

    User 1: Oh, I love that game too! I''m so bad at it though.

    User 2: Yeah, it''s a hard game.

    User 1: So, what do you like to do on the weekends?

    User 2: I usually hang out with my friends, play video games, and go fishing.

    User 1: Oh, I like to do the same things!

    User 2: Yeah, we sound like we have a lot in common.

    User 1: Yeah, we do!'
