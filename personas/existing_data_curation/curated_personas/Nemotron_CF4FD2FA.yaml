  hobbies: '["Visiting art galleries and museums", "Nature walks and birdwatching", "Digital photography", "Woodworking projects", "Gardening", "Reading (art history, mystery novels)", "Listening to jazz
    and folk music", "Small book club participation", "Volunteer work with community arts programs"]'
  career_goals: Matthew aims to turn his woodworking and photography interests into a modest home‑based venture, such as selling handmade furniture pieces and printed photographs through an online platform.
    He plans to complete a GED and enroll in part‑time courses in small business management or community development to strengthen his entrepreneurial skills. In the longer term, he hopes to take on a leadership
    role with the local arts council, helping to organize exhibitions and workshops that bring new ideas to Eagle Grove while preserving its small‑town character.
