personas:
  professional: Matthew Broome, a 32-year-old aspiring home-based entrepreneur, fuses his woodworking craftsmanship, digital photography talent, and knack for organized community event planning into a modest
    business model that reflects his reliable, collaborative personality and love for small-scale, hands-on projects.
  sports: Matthew Broome enjoys weekend hikes with the Eagle Grove Hiking Club, tracks birds in nearby state parks, follows the Iowa Hawkeyes football team and the Green Bay Packers, and plays casually
    in a co-ed adult softball league, reflecting a laid-back but consistent approach to fitness.
  arts: Matthew Broome spends evenings at local galleries, reads mystery novels by Agatha Christie and draws inspiration from the impressionist works of Monet, while listening to Miles Davis on jazz records
    and Bob Dylan folk songs, and volunteers as a docent for community arts workshops, weaving visual and auditory art into his identity.
  travel: Matthew Broome favors low-key road trips to Midwestern nature reserves, has trekked the Great River Road along the Mississippi, dreams of photographing the canals of Amsterdam and the Renaissance
    art of Florence, and plans trips with meticulous itineraries that balance budget constraints with his love for quiet, culturally rich destinations.
  culinary: Matthew Broome delights in farm-to-table meals, frequently cooks grilled trout seasoned with fresh dill from his garden, prepares rustic rosemary roasted potatoes, bakes apple crisp using heirloom
    apples, and experiments with a modest kitchen skill set that includes using a cast-iron skillet and occasional espresso while preferring simple, hearty dishes.
  core: Matthew Broome is a quietly ambitious craftsman-photographer who budgets prudently, tends his garden, and channels his love for art into a modest home-based venture while occasionally succumbing
    to tool-shopping impulses.
background:
  cultural: Matthew comes from a white Midwestern background rooted in German‑Scandinavian farming families that settled in Iowa generations ago. Raised in Eagle Grove, he grew up with values of self‑reliance,
    neighborly cooperation, and modesty, often participating in county fairs, church potlucks, and community service. This heritage instills a practical outlook and respect for tradition, while his natural
    curiosity drives him toward artistic experiences and unconventional ideas, creating a blend of rural steadiness and open‑minded exploration.
attributes:
  skills: '["Carpentry", "Small‑engine repair", "Gardening", "Personal budgeting", "Community event organization", "Digital photography", "Photo editing (Lightroom)", "Conflict mediation", "Basic computer
