  hobbies: '["Drama club", "Youth soccer", "LEGO building", "Family gardening", "Community clean-up", "Reading Magic Tree House", "Baking with mother", "Puzzle solving", "School event organization"]'
  career_goals: Heidi’s long-term ambition is to become an elementary school teacher, a role that combines her love for routine, practical teaching methods, and the opportunity to work closely with groups
    of children. She envisions herself creating structured, engaging lessons, organizing classroom activities, and supporting her future students’ learning journeys. In the short term, she aims to be a
    class monitor, help organize school events, and continue developing her leadership and organizational skills.
