  career_goals: Although currently not in the workforce, Arron aims to formalize his education by obtaining a high‑school equivalency diploma (GED) and pursue a certification in community health outreach
    or volunteer management. He aspires to volunteer more intensively, eventually coordinating a neighborhood resource hub that offers peer support, food assistance, and skill‑sharing workshops. He also
    hopes to mentor younger volunteers and perhaps start a small community garden project.
