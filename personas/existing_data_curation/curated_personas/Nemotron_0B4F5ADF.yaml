  career_goals: Justin aims to become a licensed clinical social worker or mental health counselor, using his compassionate nature to help others manage stress and anxiety while leveraging his practical
    tech skills to develop digital tools for mental‑health outreach. He plans to enroll in a community college program for an associate degree in psychology, then transfer to a university for a bachelor
    of social work, and ultimately pursue a master’s in social work. Alongside his formal education, he intends to continue volunteering at local shelters and to create an online peer‑support platform for
    young adults in Bakersfield. His ambition balances intellectual curiosity about human behavior with pragmatic, direct service, while also maintaining personal well‑being and stress management.
