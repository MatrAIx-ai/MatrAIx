persona_description: A teacher who is interested in improving the effectiveness of online learning by designing courses with well-structured dialogue and high levels of structure, in order to reduce transactional
  distance and improve learning outcomes. This teacher is familiar with transactional distance theory and other online learning theories, and is actively seeking ways to design courses that enable students
  to ask questions, engage in discussions, receive and give feedback, and actively participate in class activities. This teacher is also interested in attending to the design components of dialogue and
  structure, as proposed by transactional distance theory and other online learning theories, in order to reduce transactional distance and improve learning outcomes.
