  career_goals: Earlene aims to re‑enter the workforce in a part‑time role that capitalizes on her organizational strengths and desire to help others, such as a community outreach coordinator for a local
    non‑profit. She also intends to complete her degree in social work to become a licensed counselor, and she dreams of launching a small home‑based business selling homemade preserves and crafts. A personal
    ambition is to build resilience and effective coping strategies for her anxiety, possibly by becoming a peer‑support facilitator in her community.
