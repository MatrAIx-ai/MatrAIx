  career_goals: Robert aims to move into a technical leadership position within the next three to five years, targeting roles such as Lead Engineer or Engineering Manager where he can mentor junior developers
    and shape product strategy. He is interested in spearheading innovative projects that merge technology with artistic expression, such as interactive media platforms or generative art tools. Long‑term,
    he aspires to become a Chief Technology Officer or launch his own startup that leverages AI‑driven creativity. He also hopes to gain recognition in the tech community through speaking at conferences,
    publishing open‑source libraries, and contributing to industry standards, while maintaining a healthy work‑life balance.
