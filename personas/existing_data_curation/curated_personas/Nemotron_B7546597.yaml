  hobbies: '[''Model train building'', ''Vegetable gardening'', ''Historical biography reading'', ''Scientific literature reading'', ''Chess'', ''Early morning walks along Chesapeake Bay'', ''Birdwatching'',
    ''Community science volunteering'']'
  career_goals: Approaching retirement, Brian aims to bring his long‑term immunotherapy research program to a definitive conclusion, secure a patent for a novel therapeutic platform, and negotiate a licensing
    deal that translates his work into clinical impact. He is determined to mentor the next generation of investigators, establishing a formal apprenticeship track within his department. Brian also seeks
    to influence public health policy by serving on Virginia’s state advisory panels for vaccine development, author a comprehensive review book on modern vaccine strategies, and endow a scholarship fund
    for local STEM students pursuing medical research.
