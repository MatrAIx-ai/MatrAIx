  career_goals: Jose aims to advance into a senior leadership role such as Chief Network Officer or VP of Architecture within a Fortune-500 organization, where he can shape enterprise-wide networking strategy
    around security, sustainability, and cloud transformation. He plans to achieve the Cisco CCIE certification and publish a whitepaper on green networking practices. Additionally, he is driven to mentor
    emerging Latino engineers through formal mentorship programs and potentially launch his own consultancy focused on secure, energy-efficient network designs for mid-size companies.
