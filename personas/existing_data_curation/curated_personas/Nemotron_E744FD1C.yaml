  hobbies: '[''Visiting museums and galleries'', ''Street mural tours'', ''Watercolor painting'', ''Mixed‑media collage'', ''Digital photography'', ''Reading art criticism and philosophy'', ''Attending
    art lectures'', ''Traveling to art festivals'', ''Community art volunteering'', ''Gardening'', ''Cooking Philadelphia cuisine'']'
  career_goals: Carol aims to re‑enter the workforce in a part‑time role that bridges her love of art with community service. Her primary ambition is to establish a neighborhood art studio and gallery that
    offers workshops, exhibition space, and mentorship for underserved youth in Philadelphia. She also hopes to author a guidebook on appreciating modern art for adult learners and to become a cultural
    liaison for local nonprofits, leveraging her organizational skills and calm resilience to bring new programs to life.
