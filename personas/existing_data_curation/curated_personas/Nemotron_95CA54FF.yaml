  career_goals: Looking ahead, Pravinkumar aims to leverage his business education and extensive retail experience to move into a supervisory or managerial role within the store chain. He plans to obtain
    a retail management certification and develop a formal mentorship program for new cashiers. Ultimately, he dreams of opening his own small convenience store that also serves as a cultural hub, offering
    local Indian snacks, a mini‑gallery of regional artwork, and space for community gatherings. This venture would allow him to combine his passion for commerce, art, and community building.
