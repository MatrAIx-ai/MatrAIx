personas:
  professional: Liping Yang is an aspiring junior programmer and interactive storyteller who channels a pragmatic curiosity into Scratch projects that blend adventure sci‑fi themes with organized, step‑by‑step
    coding, and they demonstrate a reliable yet flexible approach to digital creation.
  sports: Liping Yang is a spirited member of the Coastal Bay Junior Soccer Club who idolizes the local professional team, the Coastal Bay Sharks, spending weekends practicing drills on the sand and racing
    along nature trails for fitness, balancing structured training with spontaneous beach games.
  arts: Liping Yang immerses themselves in drawing detailed sea‑life sketches inspired by the fluid lines of marine artist Wyland and the vibrant colors of Claude Monet, while practicing piano pieces from
    Lang Lang and listening to the storytelling songs of Taylor Swift, weaving these influences into their own imaginative narratives.
  travel: Liping Yang prefers family‑oriented, semi‑planned trips that blend adventure with relaxation, having explored the nearby Sunny Cove beach and the forested trails of Green Valley, and they dream
    of visiting the historic temples of Kyoto and the coral reefs of the Great Barrier Reef when older.
  culinary: Liping Yang enjoys helping family in the kitchen to whip up simple dishes like egg fried rice, vegetable spring rolls, and sweet rice balls flavored with red bean paste, delighting in the aroma
    of garlic and soy sauce while they practice their budding chopping skills.
  core: Liping Yang is a curiosity‑driven, organized ten‑year‑old who balances adventure with practicality, yet occasionally forgets to finish homework after a thrilling gaming session.
background:
  cultural: Liping was born to Chinese‑American parents who maintain strong ties to their East Asian heritage while embracing life in Lake Worth, Florida. She speaks Mandarin at home and English at school,
    celebrating holidays such as Lunar New Year and the Mid‑Autumn Festival with family gatherings, special foods, and lantern making. The family's values of education, respect for elders, and communal
    harmony influence her cooperative demeanor and practical approach to learning. At the same time, growing up in a multicultural Floridian community exposes her to diverse perspectives, fostering curiosity
    and a balanced worldview.
