  career_goals: Liping dreams of becoming a marine biologist who can protect ocean ecosystems and educate others about environmental stewardship. She also envisions herself as a community mentor, sharing
    her love of science and helping younger kids discover their curiosity. Her long‑term ambition is to combine scientific research with public outreach, creating hands‑on learning experiences that foster
    harmony between people and nature.
