personas:
  professional: Cory Mann, a seasoned construction supervisor with three decades of hands‑on expertise, translates intricate blueprints into clear work plans, deftly manages schedules with Microsoft Project
    and Primavera, enforces OSHA safety standards, and infuses inventive, design‑driven problem solving into every crew meeting, all while mentoring apprentices with a compassionate yet assertive style
    that reflects their imaginative curiosity.
  sports: Cory Mann enjoys low‑impact fitness through regular hikes on Walnut Creek Trail, participates in a senior bowling league each winter, follows the Dallas Cowboys and Texas Rangers avidly, and occasionally
    joins a community kayaking group when the Texas lakes are warm, blending seasonal outdoor activity with hometown team loyalty.
  arts: Cory Mann channels creative energy into watercolor sketches of historic Texas barns, captures sunrise over rolling hills in black‑and‑white photography inspired by Ansel Adams, crafts custom furniture
    while listening to folk legends like The Avett Brothers and country storyteller Sturgill Simpson, and finds artistic inspiration in the works of Claude Monet and John Constable.
  travel: Cory Mann prefers thoughtfully planned road trips that combine painting sessions at Hill Country vistas with weekend visits to historic sites such as the Alamo, dreams of a springtime sketch‑tour
    of Tuscany’s medieval towns, and balances these aspirations against a modest retirement budget that favors stay‑cations and occasional excursions to nearby Oklahoma’s prairie landscapes.
  culinary: Cory Mann’s palate leans toward Texas‑style barbecue and farm‑to‑table fare, expertly seasons brisket with paprika, garlic, and chipotle, enjoys cooking fresh vegetable medleys featuring heirloom
    tomatoes, jalapeños, and sweet corn from his garden, and showcases a solid intermediate skill level in grilling and rustic bread baking.
  core: Cory Mann blends rugged construction expertise with a vivid artistic imagination, habitually worries about project details yet finds solace in sketching historic scenes, and balances disciplined
    financial planning with occasional splurges on handcrafted woodwork.
background:
  cultural: Cory was raised in a small‑town Texas community where a blend of Midwestern Anglo‑American heritage and the independent frontier spirit of the Lone Star State shaped his worldview. His family’s
    roots trace back to English and German immigrants who settled in Texas during the early 20th century, instilling values of hard work, self‑reliance, and community service. Growing up, he participated
    in local traditions such as county fairs, Fourth of July celebrations, and church gatherings, while also developing an appreciation for the region’s natural landscapes and ranching culture. Though he
    embraces classic Texas hospitality and enjoys activities like barbecuing and outdoorsmanship, Cory’s curiosity for the arts and abstract ideas sets him apart, leading him to pursue creative hobbies
    and a lifelong commitment to learning. This cultural mosaic—grounded in traditional Texan values yet open to artistic exploration—continues to inform both his professional ethic and personal passions.
attributes:
