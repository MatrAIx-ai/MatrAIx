  career_goals: Edoardo aims to advance to a district manager role within the next five years, overseeing multiple stores and driving regional sales growth through data‑driven strategies. He aspires to
    design and implement a standardized mentorship program for frontline supervisors, positioning himself as a catalyst for talent development. In the longer term, he envisions opening a boutique that fuses
    his retail expertise with his passion for the arts, creating a curated space for local artisans. To support these ambitions, he plans to enroll in an executive MBA program focusing on operations and
    entrepreneurship, and to earn certification in retail merchandising.
