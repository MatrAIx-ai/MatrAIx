  career_goals: Hector, despite his young age, already expresses a desire to explore many worlds when he grows up. He enjoys pretend play as a teacher who helps friends learn, and he is fascinated by the
    idea of creating beautiful pictures that bring joy to others. He often says he wants to be an artist or a community helper who brings people together, reflecting his desire for harmony and flexibility.
    In the immediate term, his goals focus on learning to count, recognizing letters, and drawing more complex shapes.
