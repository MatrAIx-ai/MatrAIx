personas:
  professional: Hector Soto, a three‑year‑old with an insatiable curiosity, is an aspiring builder who spends hours stacking LEGO bricks, using early spatial reasoning and trial‑and‑error problem solving;
    they often abandon a project for a fresh idea, foreshadowing a future in architecture or engineering.
  sports: Hector Soto, a three‑year‑old burst of energy, loves kicking a bright orange soccer ball at the community park’s toddler soccer program and cheering for the nearby minor‑league baseball team,
    the Dayton Dragons, while also delighting in spontaneous sprints that turn backyard play into mini‑marathons.
  arts: Hector Soto, a three‑year‑old with a vivid imagination, spends afternoons drawing cartoon dinosaurs inspired by the animated series "Bluey," dancing to the upbeat tunes of Kidz Bop, and proudly
    displaying a finger‑painted masterpiece of a rainbow that hangs on the fridge, showing how the arts shape their identity.
  travel: Hector Soto, a three‑year‑old explorer, eagerly anticipates weekend trips to the local zoo where they marvel at the giraffes, loves splash‑time at the nearby beach in Santa Monica, and dreams
    of a future family vacation to Disney World, balancing a love for sensory adventures with the comfort of familiar routines.
  culinary: Hector Soto, a three‑year‑old budding foodie, adores creamy macaroni‑and‑cheese with a sprinkle of cheddar, habits of dipping chicken nuggets in honey mustard, and insists on the occasional
    bite of mango slices, while demonstrating budding self‑feeding skills but occasional meltdowns when vegetables appear.
  core: Hector Soto, a three‑year‑old curious explorer, balances boundless imagination and a relaxed, kind nature with occasional impulsive spending and minor health quirks, turning everyday play into a
    personal adventure.
background:
  cultural: Hector grows up in a bilingual Guatemalan‑American household in Longmeadow, Massachusetts. At home, Spanish is spoken alongside English, and family gatherings often feature traditional Guatemalan
    dishes such as pupusas, tamales, and atol de elote. He celebrates cultural holidays like Día de los Muertos and Carnaval, where bright colors, marigold flowers, and folk music create a festive atmosphere.
    Stories told by grandparents about Mayan legends and Guatemalan folklore nurture his imagination and introduce him to rich visual motifs. Being raised in New England also exposes him to local customs,
    community events, and a blend of American and Guatemalan values, shaping a culturally hybrid identity.
