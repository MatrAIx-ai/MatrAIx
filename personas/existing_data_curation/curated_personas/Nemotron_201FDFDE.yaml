  career_goals: James's primary career goal is to secure a stable, structured job that offers a predictable schedule and reliable income, which will help alleviate his anxiety and support his family. He
    plans to enroll in a community college trade program to earn an HVAC or electrical maintenance certification within the next two years. Upon certification, he aims to obtain a position as a maintenance
    technician with the Salina municipal utilities department or a local manufacturing plant. He also hopes to gradually develop a small, home‑based handyman service that provides flexible hours, allowing
    him to balance work with his mental‑health needs.
