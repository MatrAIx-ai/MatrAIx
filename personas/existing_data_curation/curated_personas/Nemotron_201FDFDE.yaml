personas:
  professional: James Porch, a 38‑year‑old aspiring maintenance technician, blends their practical carpentry, automotive repair, and budgeting talents with a cooperative, harmony‑seeking nature, channeling
    their preference for predictable schedules into a goal of securing a municipal utilities position while planning a future home‑based handyman service.
  sports: James Porch follows the Kansas State Wildcats football team with weekly game‑day gatherings, participates in the Salina Outdoor Club’s spring hikes, and joins a casual church softball league every
    Friday night, blending their love of community sports with their appreciation for the outdoors.
  arts: James Porch’s evenings often echo classic rock legends such as Led Zeppelin, The Who, and Pink Floyd while they occasionally attend community theater productions of American classics and draw design
    inspiration from Grant Wood’s regionalist paintings for their woodworking projects.
  travel: James Porch prefers low‑key road trips to Midwest treasures like the Badlands, the Ozarks, and a weekend in Colorado Springs, plans trips around school holidays to minimize work disruption, and
    harbors a long‑standing wish to tour Ireland’s countryside, though anxiety sometimes stalls the final booking.
  culinary: James Porch enjoys cooking hearty Midwestern meals such as chicken fried steak, garden‑fresh chili with tomatoes, and buttery cornbread, skillfully incorporates rosemary, garlic, and home‑grown
    vegetables into their dishes, yet often over‑salts when distracted by multitasking.
  core: James Porch balances a steady, community‑focused life with a restless mind that keeps a toolbox nearby, a thriving garden, and a habit of over‑thinking schedules while still finding calm in classic
    rock riffs.
background:
  cultural: James grew up in Salina, Kansas, in a white, middle‑class, likely Protestant family rooted in the Midwestern heartland. The local culture emphasized hard work, modesty, community involvement,
    and a close relationship with the land. He participated in high school sports, church activities, and county fairs, internalizing values of self‑reliance, hospitality, and respect for tradition. These
    Midwestern cultural influences shape his cooperative nature, preference for stability, and desire to contribute positively to his family and community.
