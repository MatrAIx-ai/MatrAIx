personas:
  professional: Mercedes Santiagoperez, a budding coder who designs simple Scratch games, channels their competitive drive and love for clear rules into disciplined programming sessions, treating each project
    like a strategic chess match and striving for flawless execution.
  sports: Mercedes Santiagoperez, a disciplined member of the school swim team, follows a regimented training schedule, idolizes Olympic swimmer Katie Ledecky, and occasionally watches the Seattle Seahawks
    for competitive inspiration while cheering on the local high school soccer club, the Chargers.
  arts: Mercedes Santiagoperez, a dedicated piano student, practices daily pieces by Beethoven and Chopin according to a strict lesson plan, enjoys puzzle‑based video game art like "Portal," and admires
    the kinetic sculptures of artist Alexander Calder, finding structure in both music and visual art.
  travel: Mercedes Santiagoperez, a methodical planner, prefers short, well‑organized trips such as a weekend visit to the Space Center Houston and a guided tour of the Monterey Bay Aquarium, always mapping
    itineraries in advance and budgeting each outing with their parents.
  culinary: Mercedes Santiagoperez, an adept junior chef, delights in preparing family recipes like arroz con pollo and empanadas, meticulously measuring ingredients like a scientist, while occasionally
    sneaking extra chocolate chips into brownies despite their disciplined nature.
  core: Mercedes Santiagoperez is a fiercely organized eleven‑year‑old who balances a competitive spirit with a love for structured hobbies, but often wrestles with anxiety, over‑planning, and a secret
    sweet‑tooth habit.
background:
  cultural: Mercedes is the child of Ecuadorian immigrants who maintain strong ties to their heritage. At home, Spanish is spoken alongside English, and she celebrates Ecuadorian holidays such as Independence
    Day and Día de los Difuntos with family gatherings, music, and traditional foods like ceviche, empanadas, and arroz con menestra. She enjoys listening to Ecuadorian folk music and has learned basic
    steps of salsa and cumbia from her parents. Living in Jupiter, Florida, she also participates in local beach activities, community events, and school programs, blending her Latin American roots with
    the coastal lifestyle of her community.
