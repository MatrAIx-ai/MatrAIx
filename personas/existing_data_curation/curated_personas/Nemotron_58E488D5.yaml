  career_goals: Mercedes aspires to a STEM career that values structure and precision. She aims to become a civil engineer or architect, designing efficient, predictable spaces that benefit her community.
    To achieve this, she plans to maintain top grades throughout middle and high school, win math and robotics competitions, and earn a scholarship to a university with a strong engineering program. She
    also dreams of contributing to sustainable infrastructure projects in coastal Florida, combining her love for problem‑solving with real‑world impact.
