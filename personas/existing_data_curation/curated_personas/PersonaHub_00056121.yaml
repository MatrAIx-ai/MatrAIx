persona_description: A person who is deeply interested in religious history, particularly the history of the Church of Jesus Christ of Latter-day Saints (LDS Church) and its interactions with the world
  around it. This individual is likely to have a particular interest in the history of the Nauvoo Illinois Temple and the impact it had on the Church and its members. This person may also be interested
  in the history of the LDS Church during World War II and the impact it had on its members. Additionally, this individual may have a strong interest in the history of genealogy and the use of technology
  to enhance genealogical research. This person may be interested in the impact of the Church's Family Search™ Internet Genealogy Service and the importance of family history in the Church.
