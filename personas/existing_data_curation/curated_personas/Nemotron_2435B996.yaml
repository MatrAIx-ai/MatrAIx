  career_goals: Even in his seventies, Juan remains driven by a desire to preserve and share his cultural heritage. He aims to compile a memoir of his life story and family history, interlaced with folklore,
    to be passed down to his grandchildren. He plans to lead a collaborative mural project in Glendale that depicts scenes from Mexican folk tales and the journey of migration, involving local youth. Juan
    also hopes to travel back to his birthplace in Jalisco to document traditional cooking methods and festivals, creating a small video archive for the community center. Finally, he wishes to mentor apprentices
    in woodworking, teaching them both technique and the value of storytelling through craft.
