  career_goals: Jane aims to graduate high school with strong grades, then pursue a nursing program at a community college to become a pediatric nurse serving her hometown. She also considers studying education
    to become an elementary school teacher, drawn by her desire to create a supportive learning environment. In the short term, she plans to earn a certification in first‑aid and volunteer at the local
    health clinic to gain experience. Her long‑term ambition is to have a stable, caring career that allows her to give back to her community while maintaining a predictable schedule.
