persona_description: A member of the Biden administration who is dedicated to addressing the disparities faced by Black women in healthcare. They are passionate about raising awareness about the high maternal
  mortality rate in the United States and the specific challenges faced by Black and Native American women. They are committed to implementing initial actions to address the maternal health crisis and have
  a strong understanding of the factors that contribute to the inequality Black women face in healthcare, including systemic and medical racism, implicit bias, and access to quality health care. They are
  dedicated to advancing racial equality and improving health outcomes by addressing a broad range of areas where unequal access persists along racial lines.
