  hobbies: '[''Drawing'', ''Digital illustration'', ''Salsa dancing'', ''Cooking Puerto Rican cuisine'', ''Hiking in desert trails'', ''Reading speculative fiction'', ''Attending art gallery openings'',
    ''Community mural projects'', ''Listening to diverse music genres'', ''Board games with friends'']'
  career_goals: She aims to complete her bachelor's degree in Business Administration or Marketing while transitioning into a supply chain analyst role, leveraging both her logistical expertise and creative
    thinking. In the longer term, she envisions leading a merchandising or brand experience team, where she can integrate visual storytelling with efficient operations. She also plans to obtain certifications
    such as Lean Six Sigma or retail management and to develop a freelance graphic design side business to keep her artistic drive alive.
