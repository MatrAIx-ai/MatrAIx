personas:
  professional: Dhankumarie Ramos leverages their inventory management experience and bilingual communication skills to excel in fast-paced retail logistics, while channeling their imagination into visually
    striking merchandising displays and aspiring to become a supply chain analyst who blends data-driven efficiency with creative storytelling.
  sports: Dhankumarie Ramos enjoys weekend desert hikes with the local Trailblazers Club, follows the Phoenix Suns and Arizona Cardinals, and participates in a community salsa dance league that doubles
    as cardio, while occasionally joining a recreational soccer pickup game.
  arts: Dhankumarie Ramos immerses themselves in drawing, digital illustration, and community mural projects, draws inspiration from artists like Banksy and Frida Kahlo, tunes into Bad Bunny and Tame Impala
    while sketching, and regularly attends gallery openings featuring emerging creators.
  travel: Dhankumarie Ramos prefers spontaneous road trips that combine desert trekking with cultural stops, has already explored New Mexico’s Santa Fe art scene, dreams of hiking Machu Picchu and attending
    the Barcelona Street Art Festival, and plans trips around festival dates to maximize exposure to music and dance.
  culinary: Dhankumarie Ramos loves cooking arroz con gandules and mofongo, carefully seasons with sofrito, plantains, and cilantro, experiments with homemade adobo marinades, and enjoys sharing these dishes
    at potluck gatherings, though they occasionally forget to chill the dough for empanadas.
  core: Dhankumarie Ramos is a 21‑year‑old who blends a love for salsa dancing, spreadsheets, and spontaneous mural painting, often juggling deadlines with late-night art sessions and a habit of over-caffeinating
    before morning hikes.
background:
  cultural: Dhankumarie's Puerto Rican heritage is a cornerstone of her identity. Raised in a bilingual household, she grew up celebrating traditions such as the annual Fiesta de San Juan, Christmas with
    lechón asado, and the rhythmic beats of bomba and plena. Family gatherings often revolve around music, dance, and communal meals, fostering a strong sense of community and hospitality. In Henderson,
    she stays connected to the Hispanic community through local cultural festivals, Spanish-language church services, and a volunteer group that promotes Latin American arts. Her cultural roots influence
    her artistic expression, culinary interests, and her commitment to maintaining close family ties.
attributes:
  skills: '[''Inventory management'', ''Order fulfillment'', ''POS and scanner operation'', ''Spreadsheet data entry'', ''Customer service'', ''Team collaboration'', ''Bilingual communication (English/Spanish)'',
