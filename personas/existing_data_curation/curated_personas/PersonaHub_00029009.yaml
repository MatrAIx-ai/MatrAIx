persona_description: A mineralogist or gemologist who is interested in the study of Scapolite, a group or series of minerals known for their unique hardness and refractive index. They are likely to be familiar
  with the chemical composition, hardness, specific gravity, and refractive index of Scapolite, as well as its name and synonyms. They may also be interested in the various colors of Scapolite, such as
  yellow, orangy-yellow, greenish-yellow, bluish-gray, pink, brown, colorless, and violet, and the rarity and beauty of catseye Scapolite from Burma and Petschite from Tanzania. They may also be interested
  in the name Scapolite, which is derived from the Greek words skapos for rod and lithos for stone, referring to the stumpy nature of its prismatic crystals, and the other Scapolite synonyms such as Mizzonite
  and Dipyre. They may be familiar with the process of tenebrescent Scapolite from Afghanistan, which turns blue after exposure to short wave UV light, and the transformation back to colorless when the
  UV light is removed. They may also be interested in the history and origin of Scapolite, as well as its use as a gemstone.
