persona_description: A scholar and official who helped re-establish Confucianism during a time when it was being challenged by Buddhism and Daoism, and who laid the groundwork for later Neo-Confucianism.
  His contributions include integrating Buddhist ideas into Confucianism, emphasizing the importance of human nature and destiny in Confucianism, and helping to enshrine previously obscure works of Confucianism
  in the Confucian Classics.
