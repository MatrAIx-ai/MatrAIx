persona_description: A microbiologist who specializes in the study of the Helicobacter pylori bacterium and its interactions with the human immune system. He has a keen interest in the rate of mutation
  accumulation in the genome of H. pylori during the acute phase of infection, which is the initial, early phase of infection when the immune response is still developing. His research focuses on understanding
  the mechanisms behind the selective pressure on H. pylori to survive the immune response, and the impact of this selective pressure on the rate of genomic change. He is particularly interested in the
  role of outer-membrane proteins in the evasion of the immune system and the ways in which mutations in these proteins can help the bacteria evade recognition by antibodies.
