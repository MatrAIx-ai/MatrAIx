  hobbies: '[''Sketching and painting (traditional and digital)'', ''Visiting museums and local art galleries'', ''Salsa and rumba dancing'', ''Playing on the school soccer team'', ''Reading graphic novels
    and science‑fiction'', ''Maintaining an art blog with tutorials and reviews'', ''Volunteering at Cuban cultural festivals'', ''Listening to Cuban music and learning rhythms'']'
  career_goals: Lenya aims to attend a specialized high‑school art program and later earn a degree in Fine Arts or Art History. She dreams of becoming a professional illustrator and eventually a curator
    who highlights Cuban‑American artists in major museums. In the short term, she plans to win local art contests, secure a mentorship with a Miami gallery, and launch a monthly online showcase that blends
    her artwork with cultural storytelling. Long‑term, she hopes to open a community art space where youth can explore creative expression while learning about their heritage, and to use her skills to advocate
    for mental‑health awareness through art therapy.
