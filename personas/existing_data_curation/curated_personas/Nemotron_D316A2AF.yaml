personas:
  professional: A teenage digital illustrator and emerging content creator, Lenya Fernandez blends vibrant street-art influences with methodical planning for a weekly art blog, critically evaluates trends,
    competes with peers to push their creative boundaries, and navigates the social dynamics of high school.
  sports: A forward on the high-school soccer team, Lenya Fernandez trains twice weekly, follows Inter Miami CF and the Miami Heat, and also participates in a local youth futsal club, where their competitive
    drive fuels relentless drills even as they occasionally clash with teammates over strategic choices.
  arts: An avid visual artist, Lenya Fernandez sketches vibrant murals inspired by the bold colors of local street art, creates digital illustrations influenced by Frida Kahlo’s surrealism and Banksy’s
    stencil work, and attends salsa and rumba classes that feed their rhythmic creativity, all while they maintain a meticulous blog schedule featuring tutorials and exhibition reviews.
  travel: A curious explorer, Lenya Fernandez has toured Miami’s Art Deco district, visited the Museum of Modern Art in New York City, and dreams of wandering Barcelona’s La Rambla and Havana’s historic
    waterfront, planning each trip with detailed itineraries and budgeting spreadsheets, though they sometimes feel anxious about unfamiliar airports.
  culinary: A budding home cook, Lenya Fernandez loves preparing arroz con pollo, sweet fried plantains, and café con leche, experimenting with garlic, cumin, lime zest, and occasionally adding mango salsa
    to dishes, while they juggle homework and often burn the edges of a pan when rushing between assignments.
  core: Lenya Fernandez is a vibrant teen artist and soccer enthusiast whose meticulous planning clashes with intense anxiety, driving fierce creativity, a competitive spirit, and occasional impulsive splurges
    on art supplies, and they channel that energy into both the canvas and the field.
background:
  cultural: Lenya was born and raised in Miami’s vibrant Little Havana neighborhood to Cuban immigrant parents. Her household is bilingual, speaking Spanish at home and English at school, and family gatherings
    are filled with classic Cuban dishes like arroz con pollo, plantains, and café con leche. She grew up immersed in Afro‑Cuban rhythms, participating in community celebrations such as Carnaval Miami and
    the Calle Ocho Festival, which reinforced a strong sense of cultural pride. The close‑knit Cuban community emphasizes mutual support, storytelling, and artistic expression, all of which have shaped
    Lenya’s identity and her deep appreciation for her heritage.
