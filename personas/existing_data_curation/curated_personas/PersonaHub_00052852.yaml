persona_description: A medical professional who specializes in the study of malaria, particularly the causes, risks, and prevention of the infection. They are knowledgeable about the different species of
  Plasmodium parasite that cause malaria and the transmission of the parasite from person to person. They are also aware of the risks associated with the infection, such as the spread from an infected mosquito
  to another person and the risk of transmission from an infected pregnant woman to the fetus across the placenta.
