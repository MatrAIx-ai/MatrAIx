personas:
  professional: Kaitlyn Odell, a budding junior illustrator, showcases early drawing talent and storytelling flair while keeping her crayons neatly sorted, reflecting a balance of organization and flexible
    imagination in creative play.
  sports: Kaitlyn Odell, a proud member of the Little Lions T‑ball squad, cheers for the New York Yankees on family game nights, and spends weekends at the community pool practicing beginner freestyle strokes.
  arts: Kaitlyn Odell, an avid fan of Disney’s Frozen soundtrack, spends afternoons drawing inspired by the vibrant scenes of Mickey Mouse Clubhouse and occasionally mimics Bob Ross’s soothing brushstrokes
    while watching his kids’ episodes on PBS.
  travel: Kaitlyn Odell, who recently explored the magic of Walt Disney World in Orlando with her family and marveled at the giant dinosaur fossils at the Smithsonian National Museum of Natural History,
    dreams of a future trip to the Grand Canyon’s rim.
  culinary: Kaitlyn Odell, who adores cheesy macaroni, delights in spreading peanut butter and strawberry jam on whole‑grain toast, and insists on sprinkling fresh blueberries over her morning yogurt, often
    experimenting with a dash of cinnamon for extra flavor.
  core: Kaitlyn Odell is a curious, organized 5‑year‑old who balances imaginative play with tidy habits, thrives on creative arts, and navigates the world with a gentle, harmony‑seeking spirit, occasionally
    forgetting bedtime.
background:
  cultural: Kaitlyn grows up in a multicultural Southern California environment while belonging to a White, middle‑class American family. Her daily life blends the relaxed coastal lifestyle of San Diego
    – trips to the beach, visits to the local museum, and community festivals – with the values of kindness, cooperation, and curiosity emphasized at her preschool. Exposure to diverse families in the neighborhood
    and frequent family outings to art galleries and nature parks shape her open‑minded, art‑appreciating worldview.
