  career_goals: Kaitlyn loves imagining her future. She often says she wants to become a teacher who can share knowledge kindly, an artist who can paint bright pictures, or a marine biologist who explores
    the ocean near her home. Her ambition to help others, create beautiful art, and discover new ideas reflects her curious and caring personality.
