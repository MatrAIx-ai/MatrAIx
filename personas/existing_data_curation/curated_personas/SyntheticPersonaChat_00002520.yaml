    User 2: Oh, that''s cool.

    User 1: Yeah, I''m not very good at coming up with my own recipes.

    User 2: Well, you''re doing a great job with the cakes you''ve made so far.

    User 1: Thanks, I appreciate that.

    User 2: So, what''s your favorite thing to make?

