    User 2: Oh, those are always so beautiful.

    User 1: Thanks, yeah, I love making them.

    User 2: So, what''s your favorite part about your job?

    User 1: I love seeing the look on people''s faces when they see their cake.

    User 2: That''s so sweet.

    User 1: Yeah, it''s the best.

    User 2: So, what are your plans for the weekend?

