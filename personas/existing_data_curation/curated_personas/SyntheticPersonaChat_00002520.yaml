    User 1: Oh, that sounds fun. Who are you going to see?

    User 2: I''m going to see Drake.

    User 1: Oh, that''s awesome. I love Drake.

    User 2: Yeah, he''s so good.

    User 1: So, what''s your favorite song by him?

    User 2: I love "Hotline Bling."

    User 1: Oh, that''s a good one.

    User 2: Yeah, it''s so catchy.

    User 1: So, do you want to go to dinner together?

    User 2: Sure, that sounds like fun.

    User 1: Great, I''ll pick you up at 7.

    User 2: Okay, see you then.'
