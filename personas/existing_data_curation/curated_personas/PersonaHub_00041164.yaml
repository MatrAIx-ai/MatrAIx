persona_description: A salesperson who is skilled in persuasion techniques and has a natural ability to understand and manipulate human psychology. They are adept at framing arguments, mirroring body language,
  using scarcity to make opportunities seem more appealing, and using reciprocation to build relationships. They are also skilled in timing and using fluid speech to make their points more persuasive. They
  are comfortable with the idea of using a handshake as a way to signal a closed deal and are aware of the effects of interjections and hesitant phrases on their persuasive ability. They are also aware
  of the concept of herd behavior and how it can affect their ability to persuade others.
