persona_description: A researcher and inventor from Massachusetts Eye and Ear, a teaching hospital of Harvard Medical School, who has developed a new smartphone-based system for capturing high-quality retinal
  images in ophthalmology clinics. The system uses an iPhone 4 or iPhone 5 with an advanced smartphone app called "Filmic pro" to independently control focus, exposure, and light intensity during filming.
  The system has already been tested on children under anesthesia, awake adults, and rabbits, and the team concludes that it is able to take consistently high-quality fundus photographs in patients and
  animals using readily available instruments that are portable with simple power sources. The system has already proved useful in the emergency department, in consultations with in-patients, and during
  exams under anesthesia. The team says even first-year ophthalmology residents were able to master the new system quite quickly. The system has the potential to bring the advantages of affordable telemedicine
  to ophthalmology clinics.
