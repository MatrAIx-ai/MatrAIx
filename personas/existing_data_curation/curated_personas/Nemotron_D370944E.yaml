  career_goals: Yoanys aims to advance beyond his current guard role into a senior surveillance analyst position, eventually leading a security team at a major casino or transitioning into a law‑enforcement
    career. He plans to earn his GED within the next year, then enroll in a community‑college criminal‑justice program to obtain an associate degree. Concurrently, he intends to secure a private security
    license and pursue certifications in cyber‑security and advanced video‑analytics. Long‑term, he envisions opening a boutique security consulting firm that blends traditional physical safeguards with
    cutting‑edge monitoring technology, giving him both professional autonomy and a platform to apply his competitive drive.
