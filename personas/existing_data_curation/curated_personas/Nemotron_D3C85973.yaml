    literacy (email, internet browsing, social media)"]'
  hobbies: '["Recreational fishing at Nehalem Bay","Hiking the Oregon Coast Trail and forest paths","Woodworking projects (handcrafted furniture, repairs)","Cooking with locally sourced cheese and seasonal
    produce","Birdwatching and wildlife photography","Reading nonfiction (history, nature, technology)","Listening to classic rock and folk music","Gardening (vegetable and herb garden)","Volunteering at
    community events and county fairs"]'
  career_goals: Although currently out of the formal workforce, Carlos hopes to translate his practical skills into a low-stress, flexible side venture that fits his desire for autonomy. He aims to start
    a small-scale handyman service or a weekend workshop offering custom wood pieces and occasional cheese-related culinary classes for locals and tourists. Additionally, he wants to deepen his technical
    knowledge through community-college courses in carpentry and marine safety, and to take on a mentorship role with younger community members, sharing his experience while building personal confidence
    and reducing his chronic worries about financial stability.
