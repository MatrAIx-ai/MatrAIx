  career_goals: Approaching retirement, Tiffany aims to transition from daily field work to a mentorship and safety oversight role. She plans to obtain a certified Master Equipment Operator credential and
    leverage it to become a part‑time safety trainer for her company, helping younger workers develop both technical skill and confidence. A secondary ambition is to start a small consulting service that
    advises subcontractors on equipment maintenance schedules and safety protocol implementation, allowing her to maintain a structured work rhythm while reducing the physical strain and anxiety of high‑pressure
    site operations.
