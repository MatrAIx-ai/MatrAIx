    apprentices'']'
  hobbies: '[''Volleyball'', ''Hiking'', ''Dancing (line and social)'', ''DIY home improvement projects'', ''Interior design experimentation'', ''Cooking (Southern‑Vietnamese fusion)'', ''Reading mystery
    novels'', ''Watching home renovation shows'', ''Attending local music festivals'', ''Socializing with friends'']'
  career_goals: Donna aims to become a certified flooring specialist by earning NWFA (National Wood Flooring Association) credentials and later a journeyman‑level certification in tile installation. She
    plans to pursue a bachelor’s degree in construction management to broaden her expertise and eventually move into supervisory roles on larger remodeling projects. In the medium term, she hopes to launch
    her own eco‑friendly flooring business that prioritizes low‑VOC adhesives and reclaimed wood, serving the Gulf Coast region. Mentoring younger workers and promoting safe, high‑quality workmanship are
    also central to her long‑term vision.
