personas:
  professional: Donna Nguyen is an 18‑year‑old apprentice flooring specialist who expertly installs carpet, hardwood, laminate, vinyl, and ceramic tile, mentors younger workers, and they blend curiosity
    for sustainable materials with a relaxed, sometimes disorganized approach to project planning as they work toward NWFA certification and an eco‑friendly flooring startup.
  sports: Donna Nguyen spikes the ball for the local women's volleyball team, the ‘River Runners,’ hikes the Wetumpka Creek Trail each weekend, and they cheer on the Birmingham Barons during the baseball
    season, balancing competitive spirit with a preference for group activities.
  arts: Donna Nguyen fuels their creative side by binge‑watching home‑renovation shows like "Fixer Upper", dancing at county fairs to country‑rock acts such as "Jason Isbell", and they devour mystery novels
    by "Tana French", which together shape their appreciation for storytelling through both space and sound.
  travel: Donna Nguyen plans spontaneous road trips to nearby spots like Gulf Shores for reclaimed wood tours, enjoys annual visits to New Orleans for its music and food festivals, and they keep a travel
    journal of hikes in the Appalachian Trail, favoring affordable, group‑friendly adventures over meticulously scheduled itineraries.
  culinary: Donna Nguyen whips up Southern‑inspired comfort dishes such as shrimp and grits seasoned with lemongrass and a drizzle of hoisin, they bake collard‑green‑filled biscuits infused with ginger,
    and they experiment with ingredients like fish sauce and kaffir lime to create fusion meals they proudly share at neighborhood potlucks.
  core: Donna Nguyen blends hands‑on flooring expertise with an insatiable curiosity for sustainable design, they thrive on group energy while occasionally misplacing schedules and tools in a charmingly
    chaotic fashion.
background:
  cultural: Donna was born and raised in Wetumpka, Alabama. While her surname reflects her Vietnamese ancestry—her grandfather arrived from Vietnam in the late 1970s—she grew up in a predominantly white
    Southern community. Her family preserves select Vietnamese traditions, such as celebrating Tet and preparing pho, alongside Southern customs like church gatherings, high‑school football weekends, and
    backyard barbecues. This blended heritage gives her a multicultural outlook, combining Southern hospitality and community focus with an appreciation for the resilience and culinary richness of her Vietnamese
    roots.
