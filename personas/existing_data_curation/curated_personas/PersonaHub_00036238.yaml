persona_description: A conservationist who is passionate about protecting mangrove ecosystems and their unique symbiotic relationship with coral reefs. They are interested in the interconnectivity between
  these two ecosystems and the role they play in our oceans' power. They are also aware of the critical importance of mangroves to the health of coral reefs and the need to protect both ecosystems. They
  are motivated to contribute to coral reef restoration and protection by donating a portion of proceeds from the "Coral Restoration Octamang Collection" and participating in the "Buy One. Plant One." initiative.
