    ''Interpersonal teamwork'', ''Art appreciation'', ''Photography basics'']'
  hobbies: '[''Live‑music concerts'', ''Community softball league'', ''Volunteer at local festivals'', ''Photography (landscape and industrial)'', ''Visiting art galleries and museums'', ''Food‑truck festivals'',
    ''Fishing trips'', ''Hiking in the Hill Country'', ''Hunting outings'', ''DIY vintage farm equipment restoration'', ''Road trips exploring Texas'']'
  career_goals: Austin aims to advance from his current operator role to a senior equipment supervisor position within the next five years, overseeing a fleet of industrial vehicles at a regional distribution
    center. He plans to earn a Class A commercial driver’s license, obtain advanced certifications such as OSHA 30‑hour, ASE equipment certification, and training in autonomous tractor technology. His long‑term
    ambition is to become a plant manager or launch his own equipment leasing and maintenance business. He also hopes to merge his artistic interests with his career by leading workplace safety initiatives
    that incorporate visual storytelling and by offering professional photography services for company projects and local events.
