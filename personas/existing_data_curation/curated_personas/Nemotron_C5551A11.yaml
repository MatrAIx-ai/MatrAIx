  hobbies: '[''Sketching and comic drawing'', ''Digital painting'', ''Playing Minecraft'', ''Nature hiking and photography'', ''Reading sci‑fi and graphic novels'', ''LEGO building'', ''Baking with family'']'
  career_goals: Charles dreams of turning his love for art and technology into a career as a multimedia artist or concept designer, eventually creating visual assets for video games, animated films, or
    interactive media. He hopes to attend a specialized high‑school art program, study graphic design or animation at a university, and later work on collaborative creative teams that value harmony and
    innovative thinking. He also imagines one day sharing his knowledge by mentoring younger students in community art workshops.
