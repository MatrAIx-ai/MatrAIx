  hobbies: '[''Gardening (vegetable and herb garden)'', ''Cooking traditional Vietnamese dishes'', ''Church choir singing'', ''Senior group outings and social events'', ''Book club (historical and mystery
    novels)'', ''Playing bridge'', ''Walking and senior yoga classes'', ''Knitting and crocheting'']'
  career_goals: Although retired, Marialuisa remains eager to contribute to her community. She aims to lead the cultural preservation committee at the local Vietnamese community center, organizing workshops
    on language, cooking, and holiday celebrations for younger generations. She plans to compile a family history scrapbook that includes stories of her parents' migration, photographs, and cherished recipes.
    Maintaining her health and independence is a priority, so she intends to continue attending senior fitness classes, daily walks, and yoga. She also seeks to coordinate volunteer efforts for local food
    drives, using her organizational strengths to match volunteers with needs. Ultimately, her ambition is to leave a legacy of cultural continuity, kindness, and active community service.
