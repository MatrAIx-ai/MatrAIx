  hobbies: '[''Mexican cooking'', ''Desert gardening'', ''Volunteer work at community center'', ''Hiking and birdwatching'', ''Reading mystery novels'', ''Playing card games'', ''Crocheting'', ''Attending
    cultural festivals'']'
  career_goals: Alexis aims to transition into a senior office manager role where she can design more efficient filing and digital archiving systems for the local tribal administration. She is motivated
    to mentor younger administrative staff, especially those from underrepresented backgrounds, and to spearhead community liaison initiatives that bridge Mexican cultural celebrations with Navajo traditions.
    Long‑term, she hopes to launch a part‑time consulting service offering organization and record‑keeping workshops for small businesses and community groups in the region, leveraging her extensive experience
    and compassionate leadership style.
