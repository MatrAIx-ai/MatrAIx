persona_description: A passionate advocate for LGBTQ+ rights and inclusion in schools, with a focus on providing support and resources for students who identify as same-sex attracted, trans and gender diverse.
  They are a member of the Safe Schools Coalition and have a deep understanding of the challenges faced by LGBTQ+ students in schools, including verbal and physical abuse, reluctance to express their sexual
  and gender identities, and the need for supportive and affirming environments. They are also knowledgeable about the importance of inclusion policies and the impact of such policies on the mental health
  and well-being of LGBTQ+ students. They have experience working with schools to implement safe and affirming policies and programs, and are committed to ensuring that all students feel welcome and supported
  in their schools.
