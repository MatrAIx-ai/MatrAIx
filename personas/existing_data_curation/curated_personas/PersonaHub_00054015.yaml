persona_description: A researcher or engineer who specializes in the design and development of optical and optical imaging systems, particularly those related to spherical mirrors and curved mirrors. They
  are interested in the principles of light reflection and refraction, the geometry of curves, and the practical applications of optical elements in real-world scenarios. They are likely to be familiar
  with the technical specifications and design considerations of spherical mirrors and curved mirrors, as well as the mathematical models used to describe their behavior. They may have experience with ray
  tracing and other computational methods for simulating the behavior of light in optical systems.
