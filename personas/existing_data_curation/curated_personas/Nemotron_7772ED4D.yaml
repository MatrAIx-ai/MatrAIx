  career_goals: After completing his associate’s degree in Business Administration at Stanly Community College, Jonathan aims to secure a stable, entry‑level position in office administration or logistics
    at a local manufacturing firm. He values predictable schedules and clear expectations, hoping to build a career where he can eventually manage inventory processes or become an office manager. In the
    longer term, he dreams of opening his own small home‑repair and maintenance service, allowing him to combine his mechanical aptitude with his organizational strengths while providing steady income for
    his family.
