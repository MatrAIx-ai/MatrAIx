  hobbies: '["Single‑player video gaming (strategy)", "Digital comic creation", "Reading dystopian/speculative fiction", "Listening to jazz and Midwest hip‑hop", "Digital drawing/illustration", "Puzzle
    solving (crosswords, logic puzzles)", "Journaling and reflective writing", "Solo nature walks in Indianapolis parks"]'
  career_goals: Roneka aspires to become a software developer, with a particular interest in game development and cybersecurity, fields that combine her love for structured problem‑solving and competitive
    environments. She plans to attend a STEM‑focused high school, subsequently pursuing a Computer Science degree. Long‑term, she hopes to create interactive narratives that amplify underrepresented voices,
    and she values the possibility of remote work to maintain the solitude and flexibility she prefers.
