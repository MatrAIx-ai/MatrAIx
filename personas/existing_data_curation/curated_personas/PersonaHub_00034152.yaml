persona_description: A concerned citizen who is deeply concerned about the environmental and social impacts of proposed hydropower dams on the Mekong River, particularly in the Lao People's Democratic Republic
  (Laos). They are aware of the importance of the Mekong River for agriculture, fisheries, and flood control, and are concerned about the potential loss of biodiversity and the negative impacts on local
  communities. They are also aware of the economic benefits that dams may bring, but are concerned about the potential environmental and social costs. They are dedicated to educating others about the importance
  of protecting the Mekong River and its inhabitants.
