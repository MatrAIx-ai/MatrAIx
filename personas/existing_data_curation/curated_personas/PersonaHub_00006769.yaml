persona_description: A language enthusiast who is passionate about the Japanese language and its writing system, specifically the Onyomi and Kunyomi of the kanji. They have a deep understanding of the linguistic
  and cultural aspects of Japanese language, and are skilled at recognizing and understanding kanji that are not directly associated with their meaning. They are also familiar with the concept of "mikoto"
  or "mikou", which refers to the relationship between a kanji and its meaning. They are likely to have a strong interest in Japanese literature and have a good grasp of the traditional Japanese culture.
