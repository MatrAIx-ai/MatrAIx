  career_goals: Hector aspires to combine his love for art and social harmony into a career that lets him tell stories and raise awareness. His long-term goal is to study graphic design or multimedia arts
    in college, eventually working as a concept artist or visual storyteller who creates culturally resonant content, perhaps focused on environmental or community themes. He also envisions mentoring younger
    students in his community, helping them use art and technology to express their identities.
