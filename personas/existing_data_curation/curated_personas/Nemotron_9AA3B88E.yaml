personas:
  professional: Hector Pulido, a 13‑year‑old aspiring visual storyteller, blends manga‑style illustration with a keen eye for indie game narrative, using their organized yet flexible approach to create
    detailed storyboards for class projects and the after‑school art club.
  sports: Hector Pulido, who enjoys weekend bird‑watching hikes in the Texas Hill Country and follows the Dallas Cowboys for football and the Texas Rangers for baseball, occasionally joins the school’s
    track club for sprint drills, but prefers solitary nature walks over organized team sports.
  arts: Hector Pulido, a manga‑enthusiast who studies the works of Osamu Tezuka, Makoto Shinkai, and Studio Ghibli while collaborating on murals with peers at the after‑school art club, frequently references
    the vibrant color schemes of folk textiles in their own comic panels, and listens to the ambient scores of composers like Yoko Kanno while drawing.
  travel: Hector Pulido, who plans trips using detailed Google Maps itineraries, favors adventure‑filled outings like hiking in Big Bend National Park and exploring the historic missions of San Antonio
    over crowded beach vacations, and dreams of visiting Kyoto’s Gion district to study traditional woodblock prints.
  culinary: Hector Pulido, who helps prepare pupusas with fresh corn masa, queso fresco, and sautéed loroco, enjoys experimenting with spice levels in salsa verde, and spends free evenings perfecting a
    simple yet flavorful chicken tinga, though they sometimes over‑season dishes in pursuit of bold flavors.
  core: Hector Pulido, a curious and reserved teen, channels their love for storytelling and nature into manga art, indie game analysis, and quiet hikes, while juggling a modest allowance, mild allergies,
    and a penchant for spicy pupusas.
background:
  cultural: Hector is a second‑generation Salvadoran‑American raised in Pleasanton, Atascosa County, Texas. At home, Spanish is spoken daily, and his family maintains Salvadoran traditions such as celebrating
    Día de la Independencia (September 15) and preparing pupusas, yuca frita, and tamales with his grandmother. He attends a local Catholic parish where community festivals blend Salvadoran music like cumbia
    and reggaeton with Texan country sounds. The rural Texas setting offers him access to outdoor activities, while his Salvadoran heritage provides a rich tapestry of language, food, and values—particularly
    the emphasis on family cohesion, respect, and community harmony—that shape his worldview.
