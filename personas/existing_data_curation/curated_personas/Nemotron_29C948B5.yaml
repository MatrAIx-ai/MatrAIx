personas:
  professional: Felix Garay is a 24-year-old aspiring automotive and HVAC technician whose hands-on expertise in car repair, basic plumbing, and computer hardware is paired with a meticulous, systematic
    approach that occasionally clashes with their spontaneous side, and they are pursuing ASE certification while planning a mobile bilingual repair service for the Jacksonville area.
  sports: Felix Garay enjoys pickup soccer at the Baptist Sports Complex, regular basketball games at the local community center, follows the Jacksonville Jaguars in the NFL and the Jacksonville Armada
    FC in NISA, and they spend relaxed weekends fishing for snook on the St. Johns River when the season permits.
  arts: Felix Garay appreciates contemporary Latin music, blasting Bad Bunny and J Balvin while cooking, attends occasional Mexican-themed film nights featuring directors like Guillermo del Toro, and their
    walls are adorned with vibrant street murals inspired by local artists, all of which shape their creative outlook.
  travel: Felix Garay prefers short, budget-friendly road trips that blend adventure and family ties, having explored the historic streets of Mexico City during a quinceanera celebration, fished off Cabo
    San Lucas, and road-tripped the Gulf Coast, they now dream of hiking the Grand Canyon and savoring Barcelona's tapas scene.
  culinary: Felix Garay loves preparing traditional Mexican dishes such as carnitas with orange-scented chipotle, chiles en nogada spiced with cinnamon and pomegranate seeds, and homemade salsa verde with
    jalapenos and cilantro, and they balance cooking for family gatherings with occasional outings to Jacksonville's taco trucks for al pastor tacos.
  core: Felix Garay is a pragmatic, hands-on 24-year-old who balances structured career ambitions with spontaneous gaming marathons, fierce competition, and a deep love for family-centered traditions, often
    juggling car repairs, soccer drills, and late-night tacos while wrestling with occasional disorganization.
background:
  cultural: Felix grew up in a Mexican‑American household where Spanish was spoken daily and Mexican traditions—such as Día de los Muertos, quinceañera celebrations, and family recipes—were central to his
    upbringing. Living in Fleming Island, Florida, he blends these roots with Southern coastal culture, participates in local Hispanic festivals, and maintains strong ties to his extended family across
    Texas and California.
attributes:
  skills: '[''Automotive maintenance'', ''Basic home repair (plumbing, electrical, carpentry)'', ''Computer hardware troubleshooting'', ''Bilingual Spanish–English communication'', ''DIY woodworking'',
