  hobbies: '[''Competitive video gaming (Call of Duty, FIFA)'', ''Pickup soccer and basketball'', ''Fishing in the St. Johns River'', ''Car tinkering and maintenance'', ''Cooking Mexican cuisine'', ''Woodworking
    DIY projects'', ''Reading tech blogs'']'
  career_goals: Felix aims to secure a technical apprenticeship in automotive or HVAC services within the next year, earn relevant certifications such as ASE or HVACR, and eventually launch a mobile repair
    business that serves both English‑ and Spanish‑speaking customers in the Jacksonville area. He also plans to take community‑college courses in business management to support his entrepreneurial ambitions.
