persona_description: A scientist who specializes in the study of metal-based substances and their potential applications in the treatment of Alzheimer's disease. The scientist has conducted research on
  hydrolysis of amyloid-beta proteins using a crystal structure called tetra-N methylated cyclam (TMC) and has developed a cobalt-based metal complex (Co(II)(TMC)) that has shown potential in penetrating
  the blood-brain barrier and directly interacting with amyloid-beta protein in the brain. The scientist has also published a study on the mechanism of the metal-mediated hydrolysis of amyloid-beta peptides
  in the Journal of the American Chemical Society (JACS).
