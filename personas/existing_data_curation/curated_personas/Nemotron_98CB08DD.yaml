personas:
  professional: Carlita Washington, an aspiring comic book illustrator, blends a vivid imagination for superhero narratives with a disciplined habit of daily sketch-booking, and they channel their curious,
    organized yet flexible mindset into creating bold panels that they eagerly share with friends at the school art club.
  sports: Carlita Washington dashes around the field as a forward for the Midtown Meteors U8 soccer club, practices three times a week, and they cheer loudly for the New York Red Bulls while balancing energetic
    play with mindful stretches to keep their mild asthma in check.
  arts: Carlita Washington immerses themselves in bright watercolor landscapes inspired by the works of Mary Blair, sketches comic heroes reminiscent of Stan Lee’s creations, and sings along to the pop
    anthems of Taylor Swift while dancing to choreography from the latest Disney Channel musical specials.
  travel: Carlita Washington prefers spontaneous day-trips to nearby nature trails like the Blue Ridge Parkway where they collect pine cones, yet they dream of a future family vacation to Tokyo's Akihabara
    district to explore manga stores and the magical world of Studio Ghibli.
  culinary: Carlita Washington delights in assembling their own margherita pizza with fresh basil and mozzarella, whipping up strawberry-banana smoothies with a splash of almond milk, and they proudly showcase
    their budding kitchen skills by mastering the art of perfect pancake flips on weekend brunches.
  core: Carlita Washington is a whirlwind of curiosity and color, sketching superheroes between soccer drills, obsessively tracking their allowance in a pink notebook, yet often losing their pencils in
    the back of the soccer bag and fretting over imagined worst-case scenarios.
background:
  cultural: Carlita is an African‑American girl growing up in San Bernardino, California. Her family celebrates Black cultural traditions through music, food, and community gatherings, often attending church
    events and local festivals that showcase African‑American art and history. She enjoys learning about the contributions of Black artists and scientists, and her parents encourage her to explore her heritage
    while also embracing the multicultural vibe of Southern California. This blend of cultural pride and regional diversity influences her artistic style, her curiosity about the world, and her desire to
    share stories that reflect her community.
