  career_goals: Carlita dreams of exploring big ideas and hopes one day to become a museum curator who can share art from diverse cultures, or an astronaut who discovers new worlds and tells the stories
    behind them. She also imagines being a teacher or youth mentor, using her love of storytelling and art to inspire other kids. Her ambitions are shaped by her curiosity about the world, her love of creativity,
    and her desire to help her community feel proud of its heritage.
