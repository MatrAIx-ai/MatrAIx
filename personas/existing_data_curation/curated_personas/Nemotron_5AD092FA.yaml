  hobbies: '[''Reading non-fiction (sociology, tech)'', ''Hiking local trails'', ''Yoga and mindfulness practice'', ''Cooking Salvadoran cuisine'', ''Journaling'', ''Strategy board games (Catan)'', ''Puzzle‑solving
    video games'']'
  career_goals: She aims to leverage her bilingual and analytical abilities to secure a data analyst or market research position within a company that serves diverse communities, ideally in the Texas Gulf
    Coast region. In the next five years, Adriana plans to complete her bachelor's degree in Business Analytics, obtain a professional certification such as Google Data Analytics, and build a portfolio
    of projects that demonstrate her capacity to translate data into actionable insights. She also hopes to lead outreach initiatives that connect Salvadoran entrepreneurs with larger market opportunities.
