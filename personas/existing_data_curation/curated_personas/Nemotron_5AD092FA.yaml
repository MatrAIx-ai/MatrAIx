personas:
  professional: Adriana Hernandez is a budding data analyst who blends bilingual communication and Python‑powered statistical chops with a methodical yet adaptable approach to market research, leveraging
    their knack for clear reporting and Canva graphics to serve diverse community‑focused firms on the Texas Gulf Coast.
  sports: Adriana Hernandez hikes the Woodland Park trails with the Huntsville Hiking Club during the cooler months, squeezes in weekly yoga sessions, and follows the Alabama Crimson Tide football and Nashville
    Predators hockey teams for a competitive dose of sport without joining large‑scale leagues.
  arts: Adriana Hernandez unwinds by listening to the reflective folk tones of Sufjan Stevens and the lyrical storytelling of Lin‑Manuel Miranda, revisits classic cinema through the works of Alfonso Cuarón,
    and occasionally sketches minimalist infographics inspired by the design of Banksy for community newsletters.
  travel: Adriana Hernandez prefers meticulously planned weekend getaways on a student budget, having backpacked through New Orleans’ French Quarter and the historic streets of San Antonio, they now long‑await
    a solo trip to Oaxaca’s markets and a nature‑focused adventure in Costa Rica’s Monteverde cloud forest.
  culinary: Adriana Hernandez, a confident home chef, rounds out their weekly menu with hand‑pressed pupusas filled with loroco and mozzarella, crispy yuca frita drizzled with lime, and experiments with
    avocado‑lime salsa while still craving a perfectly seared salmon with miso glaze at local eateries.
  core: Adriana Hernandez is a data‑driven curiosity seeker who balances meticulous analysis with a skeptical, slightly anxious streak, channeling stress into yoga, puzzle‑game streams, and a habit of obsessively
    tracking every coffee purchase for future investment.
background:
  cultural: Adriana was raised in a Salvadoran‑American household in Huntsville, Texas. Her parents emigrated from El Salvador in the early 1990s, and she grew up speaking Spanish at home and English at
    school. Family celebrations often revolve around Salvadoran traditions such as Semana Santa processions, festive tamales, and the weekly sharing of pupusas. While she embraces the close‑knit community
    values of her heritage—family loyalty, respect for elders, and collective support—she also navigates the broader Southern Texan culture, attending local fairs and integrating into her school’s multicultural
    clubs. This dual cultural lens informs her worldview, making her particularly attuned to the challenges faced by immigrant communities.
attributes:
  skills: '[''Bilingual communication (English/Spanish)'', ''Intermediate Python programming'', ''Data cleaning and basic statistical analysis'', ''Excel spreadsheet modeling'', ''Graphic design using Canva'',
