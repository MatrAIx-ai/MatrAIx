  career_goals: Although retired, Hugh aims to keep contributing by mentoring young engineers through local STEM outreach, documenting and preserving Shepherdstown’s architectural heritage, and supporting
    his grandchildren’s education. He also aspires to publish a memoir that weaves together his technical career and community experiences, and to be recognized for his volunteer service with a local civic
    award.
