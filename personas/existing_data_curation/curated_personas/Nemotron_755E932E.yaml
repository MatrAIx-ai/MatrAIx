personas:
  professional: Sarah Youngs, a 21‑year‑old cosmetology professional, blends meticulous hair‑cutting and coloring expertise with a curiosity for emerging trends, delivering calm, one‑on‑one salon experiences
    while efficiently managing appointments and inventory.
  sports: Sarah Youngs, an avid solo hiker, regularly explores the Wasatch foothills and follows the Utah Jazz and BYU Cougars football, while belonging to the Wasatch Hiking Club and joining seasonal yoga
    sessions for flexibility.
  arts: Sarah Youngs indulges in contemporary fiction by Celeste Ng, draws inspiration from Ansel Adams’ black‑and‑white photography, practices calligraphy while listening to Sufjan Stevens, and spends
    evenings knitting to indie folk playlists featuring Joni Mitchell.
  travel: Sarah Youngs prefers low‑key, nature‑focused getaways, having trekked Zion and Arches National Parks, dreaming of Iceland’s geothermal baths and Kyoto’s zen gardens, and they plan trips meticulously
    using spreadsheet itineraries while adhering to a student‑friendly budget.
  culinary: Sarah Youngs enjoys preparing wholesome quinoa bowls with roasted vegetables, whipping up mushroom risotto, and brewing matcha lattes, favoring ingredients like kale, chickpeas, and fresh herbs,
    and they experiment with plant‑based cooking at an intermediate skill level.
  core: Sarah Youngs is a solitary‑driven, detail‑obsessed cosmetology student who channels quiet creativity into hair art, mindful health routines, and nature‑infused hobbies, yet occasionally procrastinates
    on paperwork.
background:
  cultural: Sarah grew up in a predominantly white, middle‑class family in the suburbs of Provo, Utah. The local culture emphasizes family ties, community involvement, and a modest, service‑oriented ethos,
    shaped by the region's strong LDS presence. While she respects these values, her personal blend of curiosity and practicality leads her to seek continuous learning and efficient execution in her work.
    The surrounding mountainous landscape fostered her love of solitude and outdoor activity, influencing both her aesthetic sensibility and her preference for a calm salon atmosphere. Her early marriage
    aligns with local norms of early family formation, yet she balances this with independent personal growth and self‑directed hobbies.
