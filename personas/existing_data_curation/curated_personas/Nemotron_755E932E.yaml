  hobbies: '[''Reading contemporary fiction'', ''Hiking in the Wasatch Mountains'', ''Mindfulness meditation'', ''Houseplant care'', ''Knitting scarves'', ''Indoor photography'', ''Journaling'', ''Basic
    calligraphy'']'
  career_goals: Sarah aims to complete her full cosmetology license within the next year and pursue advanced certifications in color theory. Her long‑term ambition is to open a boutique salon in Provo that
    offers a tranquil, private environment—catering to clients who appreciate a calm, one‑on‑one experience. She also hopes to develop a line of hypoallergenic hair products that reflect her meticulous
    attention to safety and quality. Alongside her professional growth, she plans to study business management part‑time to ensure she can sustain her salon while preserving ample time for personal solitude
    and family life.
