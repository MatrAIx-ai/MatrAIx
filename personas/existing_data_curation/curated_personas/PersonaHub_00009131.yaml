persona_description: A law professor who specializes in civil procedure law, particularly the concepts and principles related to subject matter jurisdiction and the principles of correct substantive and
  remedial decision-making. His research interests include, but are not limited to, the application of the principles of subject matter jurisdiction and correct decision-making in court decisions, the distinction
  between mistaken-but-valid injunctions and void ones, and the implementation of Chafee's "bright line" and "first things first" policies in court decisions.
