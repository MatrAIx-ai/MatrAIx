    User 1: That''s a great movie! I love the story and the characters.

    User 2: Me too! I''ve watched it so many times, but it never gets old.

    User 1: I''m glad I met you! You seem really cool.

    User 2: Thank you! You seem cool too.

    User 1: Maybe we can hang out sometime and go for a hike.

    User 2: That would be fun! I''d love to.

    User 1: Great! I''ll send you my number.'
