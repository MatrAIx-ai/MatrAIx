persona_description: A scientist who specializes in the study of fast radio bursts (FRBs), a mysterious and enigmatic class of radio signals that have been detected from various galaxies in the universe.
  He is particularly interested in the possibility that these signals may be the result of extraterrestrial civilizations sending signals to us. He has been involved in the discovery of several FRBs and
  is currently working on identifying the source of these signals and the galaxy they originate from.
