personas:
  professional: James Brown is a vocational instructor who designs and delivers hands-on curricula for automotive repair, small-engine maintenance, and basic construction, blending adult-learning theory
    with a methodical, curiosity-driven approach; they organize detailed lesson plans, write technical manuals, and mentor adult learners with a reserved yet supportive demeanor, all while planning a future
    maker-space laboratory and apprenticeship pipeline.
  sports: James Brown enjoys low-impact outdoor activities such as weekend hikes on local nature trails and fishing trips on nearby lakes, is a fan of the Chicago Cubs and Chicago Bears, follows the NASCAR
    Cup Series cheering for Kyle Busch, and occasionally joins a community pickup basketball game; they belong to the county fishing club where they practice catch-and-release techniques.
  arts: James Brown finds creative inspiration in classic rock and folk music, regularly listening to Bob Dylan, Muddy Waters, and Johnny Cash while restoring a 1950s Chevrolet, enjoys watching This Old
    House and documentary series about engineering history, and occasionally attends a local community theater production of Our Town starring veteran actors; they appreciate the craftsmanship of woodworking
    and occasionally dabble in pottery.
  travel: James Brown prefers meticulously planned road trips that combine scenic hiking, automotive history, and gardening stops, having driven to Yellowstone National Park, toured the Mercedes-Benz Museum
    in Stuttgart, and explored the Blue Ridge Parkway; they dream of completing Route 66 in a restored classic car and attending the International Auto Show in Detroit, budgeting travel by staying in campgrounds
    or budget motels and bringing heirloom tomatoes for fresh roadside salads.
  culinary: James Brown enjoys cooking farm-to-table meals that showcase seasonal produce, especially heirloom tomatoes and pumpkins from their garden, often preparing roasted tomato pasta with fresh basil,
    pumpkin soup with sage, and grilled trout seasoned with lemon and dill; they are an intermediate home chef who follows food blogs, experiments with spice blends like smoked paprika and cumin, and occasionally
    bakes sourdough bread on weekends.
  core: James Brown is a methodical, hands-on vocational instructor whose curiosity fuels a love of vintage cars, gardening, and precise budgeting, yet worry often shadows their otherwise steady outlook.
background:
  cultural: James was raised in a midsized, white, working‑class family in rural Indiana. His ancestry is predominantly German and Irish, reflected in the community’s tradition of county fairs, church gatherings,
    and local high‑school sports. The cultural ethos emphasizes self‑reliance, modesty, and a strong work ethic, values that James carries into his teaching and personal life. While he respects the longstanding
    Midwestern customs of neighborly support and communal responsibility, his natural curiosity drives him to explore broader ideas through reading and practical experimentation. This blend of traditional
    roots and an openness to new knowledge shapes his identity as a reliable, community‑focused educator.
attributes:
  skills: '[''Curriculum development for technical trades'', ''Adult learning facilitation'', ''Mechanical troubleshooting and repair'', ''Technical writing and assessment creation'', ''Classroom management
