persona_description: A global ocean governance expert who is interested in the potential for international public finance to mobilize revenues for ocean resources. This person is knowledgeable about the
  Law of the Sea Convention and the potential for tax and fee-based systems to manage and develop ocean resources. They are also familiar with the challenges and inadequacies of current resource mobilization
  patterns and the need for a more systematic and predictable approach to funding ocean governance and development. This individual is interested in exploring the potential for a multisectoral oceans organization
  or institutional arrangement to help mobilize funds and manage their expenditure.
