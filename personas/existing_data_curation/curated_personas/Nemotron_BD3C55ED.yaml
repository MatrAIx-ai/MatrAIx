personas:
  professional: Kayla Lujan, a retired community arts coordinator, blends her watercolor mastery with event‑planning savvy to run weekly art workshops at the local senior center, channeling her love of
    abstract color theory into shared creative experiences.
  sports: Kayla Lujan, a devoted Green Bay Packers fan, joins the Stratford Senior Hiking Club’s weekly nature walks, follows the Wisconsin Badgers women's volleyball matches on television, and prefers
    leisurely birdwatching hikes over high‑intensity sports.
  arts: Kayla Lujan, an avid watercolorist and poetry enthusiast, draws inspiration from Georgia O'Keeffe’s natural motifs and Wassily Kandinsky’s abstract forms, while listening to Johann Sebastian Bach’s
    cello suites and Max Richter’s contemporary piano works during sketch sessions, and regularly attends the Glenwood Folk Ensemble concerts at the local community hall.
  travel: Kayla Lujan, an adventurous yet budget‑conscious traveler, loves loosely planned road trips through the Great Lakes region, revisits Mackinac Island’s historic inns, explores the Finnish‑inspired
    summer festivals of Minnesota’s Boundary Waters, and dreams of a quiet cabin retreat in the Canadian Rockies.
  culinary: Kayla Lujan, a home cook who favors seasonal garden produce, often prepares beet and cucumber salads with goat cheese and dill, bakes hearty sauerkraut pierogi for family gatherings, and treats
    themselves to fresh salmon glazed with rosemary and lemon on special occasions.
  core: Kayla Lujan is a gentle‑spirited retiree whose imagination fuels a lifelong devotion to watercolor, community art, and nature‑inspired living, tempered by a relaxed approach to schedules and a tendency
    to procrastinate on mundane tasks.
background:
  cultural: Kayla grew up in the rural heart of Marathon County, Wisconsin, in a family of German‑Scandinavian ancestry that valued community, self‑reliance, and a deep connection to the land. The region's
    agrarian traditions, seasonal celebrations, and strong church ties shaped her sense of belonging and nurtured her cooperative spirit. Proximity to the North Woods instilled an appreciation for nature's
    cycles, later informing her artistic and gardening pursuits. Local culture emphasizing modesty, volunteerism, and mutual support reinforced her tendency to prioritize harmony and others' needs in group
    settings. While she identifies as white and bears the Lujan surname through marriage, she embraces a multicultural small‑town environment where Finnish, German, and Polish neighbors contribute to a
    shared heritage of folk music, craft, and hearty cuisine—subtly influencing her creative expression.
