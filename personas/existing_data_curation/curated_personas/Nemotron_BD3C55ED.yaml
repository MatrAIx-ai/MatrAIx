  hobbies: '["Watercolor painting", "Reading literary fiction and poetry", "Gardening", "Knitting and crocheting", "Birdwatching", "Listening to classical music", "Attending small local concerts", "Hiking
    in the North Woods"]'
  career_goals: Although retired, Kayla continues to set personal ambitions that align with her imaginative nature. She hopes to curate a small exhibition of her watercolors that captures the changing Wisconsin
    landscapes and abstract interpretations of memory. She aspires to self‑publish a collection of her poems and short stories, weaving together reflections on her hometown, the natural world, and the people
    she cherishes. Kayla also aims to launch a collaborative community art garden with fellow retirees, blending horticulture and public art to foster intergenerational connections and provide a shared
    space for creative expression. Lastly, she seeks to mentor younger participants in the senior center's art workshops, passing on her techniques and encouraging others to pursue curiosity-driven projects.
