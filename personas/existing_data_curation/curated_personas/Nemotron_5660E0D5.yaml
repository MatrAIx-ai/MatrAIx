  career_goals: Milton imagines a future where he can design and build things that help his community. He dreams of becoming a civil engineer or an architect, creating safe playgrounds and sturdy buildings
    in Brooklyn. He also likes the idea of working as a teacher or mentor, sharing his love of learning and helping younger kids succeed. He hopes to stay involved in community projects, join a local robotics
    or STEM club in middle school, and continue developing his practical, methodical skills.
