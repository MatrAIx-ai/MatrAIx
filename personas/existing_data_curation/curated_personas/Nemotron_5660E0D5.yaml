personas:
  professional: Milton Greenjohnson is a budding LEGO architect and young coder who channels their love for structure into designing complex builds, leading school STEM projects with meticulous planning
    and a calm, methodical approach.
  sports: Milton Greenjohnson drills with the Pine Grove Youth Basketball Club, idolizes the NBA’s Chicago Bulls and their star player Zach LaVine, and spends Saturday afternoons perfecting a jump shot
    while also cheering for the local high‑school soccer team, the Riverside Falcons.
  arts: Milton Greenjohnson sketches comic‑strip style cartoons inspired by Matt Groening, binge‑watches animated series like SpongeBob SquarePants, and sings along to classic kid‑friendly songs by The
    Beatles, especially “Yellow Submarine,” which fuels their creative storytelling.
  travel: Milton Greenjohnson dreams of a road trip to the Grand Canyon after a memorable family vacation to Disney World, enjoys exploring the local science museum in their hometown, and prefers itineraries
    that blend hands‑on science workshops with plenty of playground time.
  culinary: Milton Greenjohnson is a budding junior chef who loves making spaghetti with marinara sauce, whipping up homemade pizza topped with pepperoni and bell peppers, and mastering the perfect grilled
    cheese using sharp cheddar and buttery sourdough, following step‑by‑step recipes with meticulous care.
  core: Milton Greenjohnson is a structured, LEGO‑loving nine‑year‑old who balances methodical problem‑solving with a knack for snack‑time mischief, often leaving crumbs on the living‑room floor after a
    victorious building session.
background:
  cultural: Milton is a Black child growing up in Brooklyn’s vibrant, multicultural neighborhoods. His family celebrates African‑American traditions and holidays such as Kwanzaa, and they often gather for
    soul‑food meals, music, and storytelling that connect him to his heritage. He participates in local community events, visits neighborhood museums, and hears a rich mix of cultural voices on the streets,
    shaping a strong sense of identity, pride, and community responsibility.
