  career_goals: As he approaches retirement, Donald aims to solidify the security program at his facility by implementing updated technology and tighter standard operating procedures. He seeks to earn a
    recognized security certification (such as CPP) to formalize his knowledge, and he hopes to mentor younger supervisors, passing on his pragmatic approach to safety. Ultimately, he envisions transitioning
    to a part‑time consultant role where he can advise small businesses in the Rome area on security best practices while maintaining a steady presence in his community.
