  career_goals: Jannice aims to advance to a supervisory role within the next two years, targeting promotion to sergeant and eventually lieutenant. She is pursuing additional certifications in digital forensics
    and cybercrime investigation to transition into a specialized investigative unit. Long‑term, she hopes to implement a data‑driven policing framework for her precinct, improve inter‑agency collaboration
    on complex cases, and establish a formal mentorship program that prepares junior officers for leadership positions. Continuing her education toward a bachelor's degree in public administration is also
    part of her roadmap.
