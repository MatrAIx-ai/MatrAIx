personas:
  professional: A budding engineer‑in‑the‑making and imaginative problem‑solver named Pelayo Garay spends hours building LEGO cityscapes and crafting intricate Minecraft realms, channeling a practical,
    organized mindset while still dreaming up sci‑fi stories that fuel a future in robotics and space exploration.
  sports: A neighborhood soccer enthusiast named Pelayo Garay practices with the Lancaster Youth Soccer Club on weekends, idolizes the LA Galaxy, and hones dribbling skills with a bright orange ball, preferring
    small‑team pick‑up games over large school matches for the comfortable, close‑knit feel.
  arts: A creative cartoonist and graphic‑novel aficionado named Pelayo Garay spends afternoons sketching original characters inspired by the colorful panels of “Amulet” and the whimsical humor of Bill
    Watterson, while listening to traditional folk melodies that set the rhythm for ink‑filled pages.
  travel: An adventurous road‑trip explorer named Pelayo Garay has trekked the sandstone formations of Joshua Tree, collected desert rocks on a family outing to the Mojave, and dreams of visiting the Kennedy
    Space Center and the bustling streets of San Francisco, favoring short drives with siblings over long flights due to school schedules.
  culinary: A budding home‑chef named Pelayo Garay loves the bold flavors of tacos with seasoned beef, hand‑rolled tamales wrapped in corn husks, and warm atole spiced with cinnamon, often helping a parent
    mash avocados for guacamole, yet occasionally trades a vegetable snack for a bag of chips during video‑game breaks.
  core: Pelayo Garay is an eight‑year‑old dreamer who balances a love for building, sci‑fi storytelling, and careful allowance tracking with a tendency to worry, over‑indulge in sweet treats, and occasionally
    forget daily vitamins.
background:
  cultural: Pelayo is raised in a bicultural Mexican‑American household in Lancaster, California. At home, his family primarily speaks Spanish and celebrates Mexican traditions such as Día de los Muertos,
    Cinco de Mayo, and family gatherings centered around foods like tacos, tamales, and atole. He attends a public elementary school where English is the main language of instruction, allowing him to navigate
    both cultural worlds comfortably. The desert environment of Lancaster nurtures an appreciation for the natural landscape, while the broader Los Angeles County Latino community connects him to cultural
    festivals, music, and community events. His upbringing blends Mexican family values of close‑knit support, respect for heritage, and communal celebrations with American emphasis on education, individual
    achievement, and practical skill development.
