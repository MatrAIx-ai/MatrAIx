  career_goals: Pelayo dreams of becoming an astronaut or aerospace engineer, inspired by his fascination with rockets and space exploration. He envisions designing sustainable spacecraft that could one
    day help protect the environment. To prepare, he plans to continue strengthening his math and science skills, participate in school STEM clubs, and attend a middle‑school program focused on robotics
    and engineering. He also hopes to work on small, collaborative projects that allow him to apply his practical problem‑solving abilities while staying in supportive team settings.
