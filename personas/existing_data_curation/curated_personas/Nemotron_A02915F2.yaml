  hobbies: '[''Fishing'', ''Gardening'', ''DIY home repairs'', ''Reading practical non-fiction'', ''Playing the cuatro'', ''Cooking Puerto Rican cuisine'', ''Walking/hiking in the mountains'', ''Attending
    local patron saint festivals'']'
  career_goals: While comfortable in his current supervisory role, Luis aims to step into a plant‑manager or operations‑manager position within the next three to five years. To prepare, he plans to earn
    a Six Sigma Green Belt and take a short‑term management certification offered by a local university. He also wants to mentor younger technicians, formalizing a training program for new hires to preserve
    institutional knowledge. Looking beyond his career, he envisions eventually opening a small agrotourism guesthouse in the countryside of Villalba, combining his love for the land with his practical
    skills.
