  career_goals: Seeking to channel his curiosity and practicality into a career that balances social interaction with tangible problem‑solving, Aidan plans to complete an associate degree in Business Administration
    or Communications while building a portfolio of freelance digital‑marketing and DIY project work. He aspires to become a community‑oriented marketing specialist or brand manager for a tech start‑up
    or local enterprise, eventually launching his own venture—such as a custom bike‑repair shop combined with an online media presence. Recognizing his difficulty with organization, he intends to adopt
    structured productivity tools and earn a certification in project basics (e.g., CAPM) to strengthen his ability to meet deadlines. Concurrently, he wants to incorporate mental‑health advocacy into his
    professional life, using his personal experience with stress to mentor peers and promote well‑being in the workplace.
