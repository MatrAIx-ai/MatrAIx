persona_description: A woman who was a prominent activist, advocate, and leader in the women's rights movement in the United States, particularly in the state of West Virginia. She was involved in the suffrage
  movement, the Woman's Christian Temperance Union, and the Republican Party. She was the first woman to hold various positions in the West Virginia Republican Party and the first woman to serve on the
  State Board of Education and on the West Virginia Wesleyan board of trustees. She was also a leader in the West Virginia suffrage movement and lobbied for the 19th Amendment, which granted women the right
  to vote nationally.
