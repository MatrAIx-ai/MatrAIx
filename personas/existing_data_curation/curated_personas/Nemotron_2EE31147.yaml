  career_goals: Angela aims to advance within the administrative field, targeting roles such as senior executive assistant, office manager, or project coordinator within the next five years. She plans to
    earn the Certified Administrative Professional (CAP) credential and enroll in an associate’s degree program in Business Administration. By deepening her knowledge of project management and data analysis,
    she intends to become a strategic partner to senior leadership, streamlining office operations and supporting decision‑making. Long‑term, she envisions leading an administrative team, mentoring new
    staff, and championing efficiency initiatives across the organization.
