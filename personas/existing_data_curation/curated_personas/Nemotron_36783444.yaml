  hobbies: '[''Painting'', ''Watercolor Sketching'', ''Cooking Colombian dishes'', ''Salsa dancing'', ''Gardening'', ''Reading literary fiction'', ''Community theater attendance'', ''Mindfulness meditation'',
    ''Walking in local parks'']'
  career_goals: Violeta aims to step into a supervisory position within her rental company, seeking certification in inventory-management software and a small-business leadership course to prepare for team
    oversight. In the longer term, she envisions merging her passion for the arts with her retail experience by opening a community-focused art-supply studio that offers equipment rentals, workshops, and
    cultural events. She also hopes to establish a more structured work schedule that supports her emotional wellbeing while providing greater financial stability for herself and her family.
