personas:
  professional: Carole Bridges, a 15-year-old aspiring engineer, blends their curiosity for Arduino electronics with a pragmatic bent, turning sci-fi sketches into functional plant-watering prototypes for
    their school's eco-club while navigating a habit of last-minute tinkering and a delightfully disorganized workspace.
  sports: Carole Bridges spends weekends playing casual soccer with friends at the Hargus Park Flyers club and hiking the Hargus Lake trails for cardio, while rooting for the Seattle Seahawks during NFL
    season, balancing a love for relaxed outdoor activity with occasional attempts at structured workouts that often get postponed due to spontaneous tinkering.
  arts: Carole Bridges channels their love for sci-fi storytelling into sketching characters inspired by Moebius and Katsuhiro Otomo, curates lo-fi study beats alongside upbeat pop from Olivia Rodrigo,
    and spends quiet evenings re-watching Hayao Miyazaki animations, letting these artistic influences shape both their journal entries and Arduino project designs.
  travel: Carole Bridges prefers spur-of-the-moment weekend trips, often backpacking to nearby state parks like the Whispering Pines Reserve or taking day hikes around Hargus Lake, while dreaming of a future
    tech-tour of Tokyo's Akihabara district and a pilgrimage to NASA's Kennedy Space Center, balancing limited teenage budget constraints with a thirst for both nature immersion and space-centric culture.
  culinary: Carole Bridges, a self-taught kitchen experimenter, frequently whips up quick veggie stir-fry with soy sauce, ginger and broccoli, perfects protein-packed smoothie bowls featuring mango, chia
    seeds and coconut flakes for study sessions, and enjoys snacking on homemade trail mix of almonds, dried cranberries and dark chocolate chips, though they often neglect cleanup, leaving dishes piled
    in the sink.
  core: Carole Bridges is an endlessly curious teen who stitches sci-fi imagination with practical electronics, thrives on spontaneous adventures, and habitually misplaces the very Arduino boards they're
    most eager to tinker with.
background:
  cultural: Carole was raised in London, Ohio, a small‑town setting in the Midwest. Her family’s traditions reflect a blend of Midwestern values—self‑reliance, community involvement, and modesty—and common
    American cultural touchstones such as celebrating Thanksgiving and Fourth of July with neighborhood picnics and sports events. The local school encourages participation in clubs and community service,
    fostering a sense of belonging and mutual support. While her ethnic background is white American, her upbringing includes exposure to both rural and suburban influences, from family farm outings to
    weekend trips to Columbus for concerts and museums. This environment has shaped her appreciation for practical work, community connection, and curiosity about the wider world.
attributes:
  skills: '["Basic computer literacy (Microsoft Word, Excel, PowerPoint)", "Introductory Python programming", "Troubleshooting household electronics", "DIY crafts and basic woodworking", "Simple cooking
    techniques", "Collaborative teamwork and clear communication", "Adaptable time-management"]'
  hobbies: '["Building Arduino projects", "Sketching and drawing", "Reading sci‑fi and non‑fiction books", "Exploring local nature trails and hiking", "Playing casual soccer with friends", "Board games
    and strategy games", "Curating music playlists", "Journaling and reflective writing"]'
  career_goals: Carole envisions a career that lets her keep exploring how things work while producing tangible results. She is leaning toward fields such as mechanical engineering, renewable‑energy technology,
    or culinary arts—areas that combine scientific curiosity with practical outcomes. She hopes to attend a technical college or university where she can gain hands‑on experience through labs and internships.
    Long‑term, she aims for a role in product design or a small‑scale manufacturing business where she can lead projects, mentor peers, and maintain a flexible schedule that still offers stability. She
    also wants to give back to her community by organizing workshops that teach practical STEM skills to younger students, blending her cooperative spirit with her assertive drive to make a difference.
