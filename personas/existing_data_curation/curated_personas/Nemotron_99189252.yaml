personas:
  professional: Thomas Sousa is an eager junior coder who merges his love for LEGO engineering with Scratch programming to craft simple interactive games, and his organized, methodical nature ensures he
    follows step‑by‑step tutorials while his competitive streak pushes him to showcase his projects at school tech clubs.
  sports: Thomas Sousa thrives in the spring youth soccer league with the San Antonio FC Juniors, idolizes the San Antonio FC men’s team and the Dallas Cowboys, and stays active by practicing dribbling
    drills after school and joining family bike rides along the River Walk on weekends.
  arts: Thomas Sousa channels curiosity into drawing comic‑style superheroes inspired by Stan Lee and Marvel, painting vibrant Texas landscapes after trips to the San Antonio Museum of Art, and regularly
    watches Pixar films like 'The Incredibles' for storytelling inspiration.
  travel: Thomas Sousa enjoys weekend excursions to the Alamo and the River Walk, dreams of exploring Big Bend’s desert trails and the historic streets of Mexico City, and prefers itineraries that blend
    guided museum tours with hands‑on Lego workshops, balancing parental supervision with their own adventurous spirit.
  culinary: Thomas Sousa loves grabbing tacos with queso and fresh avocado at local taquerías, enjoys making simple homemade quesadillas using shredded cheddar and corn tortillas, and delights in sweet
    treats like chocolate chip cookies, though they frequently forget to wash their hands before meals.
  core: Thomas Sousa is a meticulous LEGO architect who balances a competitive love of soccer with a skeptical eye toward new friends, and despite a penchant for spending allowance on glittery bricks, they
    keep a secret stash of comic sketches under their pillow.
background:
  cultural: Thomas is a White child raised in the diverse city of San Antonio, Texas. His family’s Anglo‑American roots, combined with a Portuguese surname (Sousa), give him a mix of European heritage,
    while the vibrant Hispanic culture of Bexar County shapes his everyday life. He learns basic Spanish at school, enjoys Tex‑Mex dishes like tacos and queso, and participates in local festivals such as
    Fiesta, which expose him to music, dance, and colorful parades. At home, he celebrates traditional American holidays like Thanksgiving and the Fourth of July, and his parents occasionally share Portuguese
    customs during family gatherings. This blend of Southern, Anglo, and Hispanic influences creates a rich cultural backdrop for his upbringing.
