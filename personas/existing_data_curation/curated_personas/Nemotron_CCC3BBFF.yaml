  career_goals: Although retired, Wade remains driven to share his knowledge and leave a lasting impact. He aims to mentor emerging engineers through university outreach, establish a community scholarship
    for under‑represented STEM students, and author a memoir that weaves together his technical career and lifelong love of art. He also plans to complete a comprehensive family genealogy archive and curate
    a modest modern‑art collection for his home, ensuring his legacy of curiosity and disciplined excellence endures.
