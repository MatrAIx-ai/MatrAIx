personas:
  professional: Loretta Maryanov is an aspiring hospitality manager who blends her hands‑on experience running school volleyball meet‑ups, cooking affordable Instagram‑friendly meals, and using Canva to
    design event flyers, all while navigating a teen’s preference for flexible schedules and occasional procrastination.
  sports: Loretta Maryanov passionately follows the Philadelphia Eagles, plays on the school’s outdoor volleyball team, streams Rutgers Scarlet Knights basketball games on weekends, participates in community
    center dance cardio classes, and balances her competitive streak with a relaxed habit of cheering from the couch while munching on pepperoni pizza.
  arts: Loretta Maryanov channels creativity by sketching downtown Glassboro street scenes in a well‑worn sketchbook, attending hip‑hop dance workshops at the community center, curating a TikTok feed that
    blends music from Billie Eilish, Bad Bunny, and Lil Nas X, and regularly catching free film screenings at Rowan University featuring directors like Greta Gerwig.
  travel: Loretta Maryanov enjoys weekend getaways to Atlantic City's boardwalk, annual family road trips to Washington, D.C.’s monuments, occasional day trips to New York City for authentic New York‑style
    pizza, and dreams of a future culinary tour of Prague, all while keeping travel plans modest due to a teen budget and school responsibilities.
  culinary: Loretta Maryanov loves cooking on a shoestring budget, frequently whipping up quick borscht using canned beetroot and broth, homemade pierogi stuffed with potato and cheese, one‑pan chicken
    teriyaki with frozen stir‑fry vegetables, and perfecting avocado toast topped with smoked salmon, sharing each vibrant dish on Instagram with Canva collages.
  core: Loretta Maryanov is a socially vibrant teen who balances a love for structured event planning with a laid‑back, sometimes procrastinating lifestyle, channeling her culinary curiosity and community
    spirit into a budding personal brand.
background:
  cultural: Loretta grew up in the suburban town of Glassboro, New Jersey, in a household that blends typical American middle‑class customs with subtle Eastern European roots hinted by her family name.
    Her parents celebrate standard U.S. holidays—Thanksgiving, Fourth of July, Christmas—while also occasionally preparing Slavic dishes such as borscht and pierogi during family gatherings. The community’s
    proximity to Philadelphia influences her sports fandom (e.g., the Eagles) and her exposure to diverse cultural events at Rowan University’s public programs. Overall, her cultural identity is rooted
    in a white American upbringing enriched by an awareness of her possible Russian/Ukrainian ancestry.
