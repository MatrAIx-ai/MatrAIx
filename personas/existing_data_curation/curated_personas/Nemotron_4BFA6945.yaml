  career_goals: Loretta’s immediate goal is to earn her GED within the next year and then enroll in a vocational program focused on hospitality management or culinary arts. In the longer term, she envisions
    opening a community‑focused café that doubles as a venue for local music and art gatherings, allowing her to blend her love for people with her knack for organizing events. She also hopes to develop
    a personal brand on TikTok that showcases quick‑cook tutorials and event‑planning tips, turning her social media savvy into a modest side venture.
