personas:
  professional: Charles Williams is a 17‑year‑old aspiring automotive technician who merges his farm‑grown mechanical know‑how with a budding talent for Python scripting, using his curiosity to tinker with
    car diagnostics while quietly mediating peer disputes at school.
  sports: Charles Williams enjoys fishing at Clear Lake, hikes the rolling prairie trails near Readlyn, plays on the Readlyn Wildcats varsity baseball team, follows the Iowa Cubs and Iowa State Cyclones,
    and volunteers with the local 4‑H club’s agri‑sports program during the summer.
  arts: Charles Williams immerses himself in Brandon Sanderson’s sci‑fi epics, builds detailed scale model airplanes and farm equipment kits, strums acoustic covers of Johnny Cash and The Beatles on his
    guitar, and draws inspiration from Austin Wintory’s video‑game scores while crafting his own simple game mods.
  travel: Charles Williams favors low‑key road trips across the Midwest—spending weekends exploring the Badlands, touring Wisconsin’s Door County, and hiking in Colorado’s Rocky Mountain National Park—while
    dreaming of a summer visit to farm museums in the northern United States that showcase traditional stave barns and harvest festivals that echo his community’s harvest traditions.
  culinary: Charles Williams enjoys hearty Midwestern dishes like skillet‑seared pork chops with apple butter, homemade corn chowder with fresh corn and dill, rye‑bread sandwiches piled with locally cured
    sausage, and often experiments by adding smoked paprika and garlic to his own herb rubs.
  core: Charles Williams is a quietly curious teen whose late‑night sci‑fi binge, disorganized project schedule, and relentless tinkering on engines and models give him a pragmatic yet imaginative lens
    on life.
background:
  cultural: 'Charles was raised in a predominantly white, Midwestern community with deep German‑Scandinavian roots common to many families in Bremer County. His upbringing reflects classic Iowa values:
    modesty, self‑reliance, hard work, and a strong sense of community. He grew up attending local church services, participating in county fair activities, and helping neighbors during harvest seasons.
    While his environment has been largely homogenous, his natural curiosity has exposed him to a broader range of ideas through the internet, allowing him to balance his traditional background with an
    openness to new technologies and perspectives.'
attributes:
  skills: '["Basic auto mechanics (oil changes, brake pad replacement)", "Farm equipment maintenance (tractors, mowers)", "Woodworking with power tools", "Basic Python programming and scripting", "Troubleshooting
    simple electronics", "Effective listening and conflict mediation"]'
  hobbies: '["Reading sci‑fi and fantasy novels", "Building scale model kits (airplanes, cars, farm equipment)", "Coding simple video games and Minecraft mods", "Playing acoustic guitar", "Fishing at local
    lakes", "Hiking prairie trails"]'
  career_goals: Charles hopes to enroll in a community college automotive technology program to become a certified automotive technician. He envisions working at a local repair shop after graduation, eventually
    saving enough to open his own small garage that also offers basic farm‑equipment services. In the longer term, he imagines diversifying his income by managing a modest hobby farm or offering custom
    woodworking pieces to neighbors, blending his mechanical skills with his love for tangible, practical work.
