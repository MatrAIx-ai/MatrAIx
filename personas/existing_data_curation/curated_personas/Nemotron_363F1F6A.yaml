  hobbies: '[''Live music concerts'', ''Improv comedy shows'', ''Art gallery visits'', ''Watercolor painting'', ''Pickup basketball'', ''Community theatre participation'', ''Fishing'', ''Hiking'', ''Experimental
    cooking'', ''Traveling to regional art festivals'', ''Podcast listening'']'
  career_goals: Looking ahead, Douglas aims to transition from frontline extraction work to a supervisory role, pursuing certification as a Site Safety Manager and eventually becoming a foreman or operations
    manager. He hopes to leverage his curiosity and artistic sensibility to introduce innovative, efficiency‑boosting processes that reduce environmental impact. Parallel to his professional ascent, Douglas
    nurtures a long‑term ambition to open a community art space in Matawan—a coffee shop/gallery hybrid where locals can gather, showcase art, and attend informal workshops—blending his love of sociable
    environments with his appreciation for creativity. He also envisions mentoring apprentices through local trade programs, sharing his practical expertise while encouraging unconventional thinking in
    the next generation of workers.
