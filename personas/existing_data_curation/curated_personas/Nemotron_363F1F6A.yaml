personas:
  professional: Douglas Screws, a seasoned extraction worker with a knack for hydraulic rig maintenance and crisis management, leverages their calm under pressure and artistic eye to lead small crews while
    improvising safety‑focused solutions that often incorporate eco‑friendly tweaks, all while eyeing a site‑safety manager certification.
  sports: Douglas Screws, a regular in the Watchung Meadows pickup basketball league, roots for the New York Knicks and the New Jersey Devils, mixes weekend fishing trips on the Raritan River with occasional
    hikes up the Watchung Mountains, and they treat their fitness routine as a social outlet rather than a strict regimen.
  arts: Douglas Screws, a devoted patron of New York City’s jazz scene at venues like The Blue Note and an improv comedy enthusiast at the Upright Citizens Brigade, often sketches watercolors of works at
    the Montclair Art Museum, collects prints from local street artists, and envisions curating a coffee‑gallery hybrid where the community can gather and create.
  travel: Douglas Screws, a spontaneous road‑tripper, fills their calendar with weekend drives to regional art festivals such as Asbury Park’s First Fridays and the Hudson Valley Folk Festival, dreams of
    soaking up the music and cuisine of New Orleans’ French Quarter, and prefers flexible itineraries over rigid travel plans, even if it means last‑minute bookings.
  culinary: Douglas Screws, an experimental home cook, loves fusing Irish stout‑braised short ribs with Korean gochujang, whipping up saffron‑infused risotto with locally caught Raritan trout, and perfecting
    the ultimate New York bagel stacked with smoked salmon, capers, and a smear of herb‑cream cheese.
  core: Douglas Screws blends a hard‑working extraction background with a restless love for art, music, and community, thriving on spontaneity, talkative energy, and a calm resilience that makes them both
    a reliable crew leader and a budding local cultural hub.
background:
  cultural: Douglas grew up in a suburban New Jersey environment, raised in a middle‑class family with Irish and German ancestry. His upbringing combined the traditional Mid‑Atlantic values of hard work,
    community involvement, and modest family gatherings with exposure to the rich cultural diversity of the Greater New York metropolitan area. While holiday traditions like Thanksgiving and Fourth of July
    barbecues remain central, he also embraces the multicultural art scene, jazz clubs, and ethnic food festivals that characterize the region. This blend of suburban American roots and a broad, inclusive
    appreciation for varied cultural expressions shapes his worldview and informs both his professional demeanor and personal passions.
attributes:
  skills: '[''Heavy equipment operation'', ''Hydraulic drilling'', ''Equipment maintenance'', ''Safety compliance'', ''Technical blueprint reading'', ''Crew leadership'', ''Crisis management'', ''Effective
