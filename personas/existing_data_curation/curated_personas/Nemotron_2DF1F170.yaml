personas:
  professional: A seasoned community organizer and home chef, Yoori Choi blends bilingual communication, event‑planning acumen, and culinary skill to lead senior center gatherings, multicultural festivals,
    and cooking workshops, always balancing practical reliability with a curious, sociable spirit.
  sports: Yoori Choi stays active by participating in senior dance classes ranging from ballroom to traditional folk dance, walking daily in the neighborhood, and cheering on the Boston Red Sox and the
    New England Patriots, viewing fitness as a social celebration rather than a solo endeavor.
  arts: Yoori Choi expresses creativity through knitting, crocheting, and singing in the church choir, while also devouring historical fiction by Hilary Mantel, admiring the watercolor works of Andrew Wyeth,
    and finding inspiration in the classic films of Audrey Hepburn.
  travel: Yoori Choi prefers purposeful travel, having visited the historic streets of Boston, taken a river cruise on the Mississippi, and enjoyed family reunions in their heritage homeland, while planning
    future trips to attend cherry‑blossom festivals in Japan and explore coastal New England towns, all within a budget‑conscious frame.
  culinary: Yoori Choi is an inventive home chef who masterfully fuses heritage flavors with New England produce, crafting dishes like a herb‑laden vegetable stew seasoned with a fermented pepper paste
    made from garden bounty, alongside comforting baked cod with a citrus‑herb glaze.
  core: Yoori Choi is a lively, community‑oriented octogenarian who blends cooking, craft, and cultural storytelling with practical curiosity, even if occasional forgetfulness in medication or garden watering
    adds a touch of human imperfection.
background:
  cultural: Yoori was born in South Korea in 1946 and immigrated to the United States with her family in the early 1960s, initially settling in the Boston area before moving to Springfield, Massachusetts.
    She grew up bilingual, speaking Korean at home while learning English at school, and her family maintained core Korean traditions such as Chuseok, Lunar New Year, and a diet centered on rice, vegetables,
    and fermented foods. As an active member of a Korean Methodist church, she has participated in both religious services and cultural events that bridge Korean and American communities. Her upbringing
    emphasized respect for elders, communal harmony, hospitality, and a strong work ethic, values that continue to guide her interactions and community contributions.
attributes:
  skills: '["Seasonal Korean home cooking and recipe adaptation", "Bilingual Korean-English communication and translation", "Community event planning, budgeting, and volunteer coordination", "Knitting,
