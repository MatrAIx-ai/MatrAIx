  hobbies: '["Korean cooking and recipe experimentation", "Seasonal vegetable gardening", "Knitting and crocheting", "Reading historical fiction and memoirs", "Senior dance classes (ballroom and traditional
    Korean folk dance)", "Bridge and card games with friends", "Volunteering at the library''s Korean story-time program", "Traveling to Korea to visit family and attend cultural celebrations", "Church
    choir participation", "Cultural festival volunteering"]'
  career_goals: In her retirement Yoori aims to preserve and share her cultural heritage while continuing personal growth. She plans to compile a handwritten family cookbook that documents traditional recipes
    and the stories behind them, and to teach occasional Korean cooking classes at the local community center. She hopes to mentor younger Korean-American adults, offering guidance on navigating dual cultural
    identities. Yoori also intends to enroll in online courses on genealogy and Korean history to deepen her knowledge. Maintaining health and independence is a priority, so she will keep up with regular
    walks, gentle yoga, and her garden. Additionally, she wants to remain active in community festivals, volunteer at the senior center, and perhaps travel to Korea to visit family and attend cultural events.
