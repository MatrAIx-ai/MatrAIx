personas:
  professional: Pura Castro is a cleaning associate who applies systematic cleaning protocols, bilingual Spanish-English communication, and OSHA-compliant safety practices to keep facilities spotless, while
    their competitive, structure-loving nature fuels a drive to train new staff and ascend to a shift-lead or facilities-management position within three years.
  sports: Pura Castro plays co-ed soccer with the Ventura County Strikers, joins the Oxnard Beach Volleyball Club for weekly matches, hikes the Santa Monica Mountains on weekends, and roots for the Los
    Angeles Lakers, Dodgers, and LA Galaxy, balancing competitive play with community fandom.
  arts: Pura Castro thrills at community festivals dancing cumbia and salsa to the beats of Celso Piña and Marc Anthony, enjoys live performances by the local folkloric group Baila Con Salsa, and frequently
    watches films by Guillermo del Toro for their vibrant storytelling.
  travel: Pura Castro prefers weekend road trips to coastal towns like Santa Barbara and adventurous getaways to Mexico City or Barcelona, plans itineraries using a spreadsheet to balance group activities
    with budget constraints, and dreams of hiking Patagonia's Torres del Paine.
  culinary: Pura Castro whips up chilaquiles, carnitas, and fresh guacamole using home-grown cilantro, jalapeños, and lime, demonstrates intermediate cooking skills by perfecting salsa verde, and delights
    friends with potluck nights featuring homemade tortillas and mole.
  core: Pura Castro blends meticulous organization with a lively social spirit, channeling competitive drive into community-focused leadership while never missing a chance to dance, cook, or volunteer.
background:
  cultural: Pura comes from a Mexican-American family that settled in Oxnard, California. She grew up in a bilingual household where Spanish and English were spoken interchangeably, and she celebrates Mexican
    traditions such as Día de los Muertos, La Quinceañera, and the Feast of Our Lady of Guadalupe. Her cultural identity blends Mexican customs—family gatherings, traditional cuisine, and music—with the
    coastal, multicultural lifestyle of Southern California. Catholic values and a strong sense of community have shaped her outlook, emphasizing hard work, respect for elders, and giving back through local
    volunteering.
attributes:
  skills: '["Systematic cleaning protocols", "Time management and scheduling", "Inventory tracking and procurement", "Bilingual communication (Spanish/English)", "OSHA safety compliance", "Eco-friendly
    cleaning techniques", "Basic building maintenance", "Team training and mentorship"]'
  hobbies: '["Cumbia and salsa dancing", "Cooking Mexican cuisine", "Co-ed soccer league", "Hiking Ventura County trails", "Beach volleyball", "Volunteering at church/community events", "Neighborhood clean-up
    initiatives", "Gardening (herbs and chilies)"]'
  career_goals: Pura aims to advance from a cleaning associate to a supervisory role within the next three years, seeking a shift-lead or facilities-management position where she can oversee a team and
    implement efficiency programs. She plans to obtain a Certified Facility Manager (CFM) credential and OSHA certification to strengthen her qualifications. Long-term, she dreams of launching her own small
    cleaning business that emphasizes sustainable practices and reliable service for local businesses and residential clients, providing a stable income for her family and creating job opportunities for
    her community.
