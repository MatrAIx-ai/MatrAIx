    data analysis'']'
  hobbies: '[''Hiking'', ''Softball league'', ''Bowling nights'', ''Trivia competitions'', ''Woodworking'', ''Gardening'', ''Technology podcasts'', ''Volunteer fire department service'']'
  career_goals: At 57, Evert aims to transition from hands‑on measurement work to a senior supervisory role where he can shape quality‑assurance strategy for his plant. He wants to lead the implementation
    of a fully integrated digital measurement system that reduces error rates by at least 15% and improves traceability. Evert is also motivated to mentor the next generation of technicians, establishing
    a formal training program that reflects his blend of curiosity and practicality. Long‑term, he envisions consulting for small‑to‑mid‑size manufacturers on measurement compliance and process optimization,
    leveraging his competitive drive to earn industry recognition such as a Quality Excellence Award.
