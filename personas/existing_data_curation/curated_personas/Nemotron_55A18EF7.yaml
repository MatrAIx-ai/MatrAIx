personas:
  professional: Evert Geoghagan is a veteran precision‑measurement specialist who blends a data‑driven, meticulous quality‑assurance mindset with a competitive spirit, leveraging their curiosity for emerging
    tools while championing rigorous compliance and mentorship as they eye a senior supervisory role.
  sports: Evert Geoghagan fuels their competitive drive through community softball with the Lake Stevens Hawks, a weekly Thursday bowling league at Bellevue Lanes, and rugged weekend hikes up Mount Si,
    while cheering for the Seattle Seahawks and Seattle Mariners as their favorite professional teams.
  arts: Evert Geoghagan nurtures their creative side by crafting hand‑built furniture inspired by the practical wooden‑cottage tradition of their region, leading pub trivia nights that channel their love
    for eclectic knowledge, and enjoying the folk‑rock sounds of Neil Young, the storytelling cinema of Clint Eastwood, and the meticulous woodcarving exhibited in local artisan exhibitions.
  travel: Evert Geoghagan prefers low‑key, nature‑focused trips, having explored the rugged coastline of Oregon, the volcanic landscapes of Iceland, and the serene alpine trails of Banff, yet their travel
    planning often falls into a last‑minute, checklist‑driven approach that reflects their organized yet flexible mindset.
  culinary: Evert Geoghagan delights in hearty cabin‑style meals—grilled cedar‑plank salmon seasoned with dill, roasted carrots and parsnips from their own garden, and a well‑executed lefse—while their
    cooking skill is solid, they frequently cut corners by over‑salting their stew when stressed.
  core: Evert Geoghagan is a meticulous, competition‑driven quality‑assurance veteran who balances curiosity with caution, yet they habitually worry about setbacks, splurge on woodworking gear, and sometimes
    neglect stress management.
background:
  cultural: Evert is a second‑generation American of Northern European (Scandinavian) descent whose family settled in the Pacific Northwest in the early 1900s. Raised in a modest, working‑class household
    near the Cascades, he grew up with a deep appreciation for the outdoors, self‑reliance, and community involvement. The regional culture’s blend of practical, no‑nonsense attitudes and a growing tech‑oriented
    economy shaped his decision to pursue a STEM degree and a career in precision measurement. Local traditions of volunteerism and small‑town camaraderie reinforced his sociable, competitive spirit, while
    the emphasis on regulatory compliance and safety informed his meticulous, pragmatic approach to both work and personal life.
attributes:
