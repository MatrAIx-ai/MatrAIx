persona_description: 'A children''s book illustrator and author who focuses on the African-American experience and has received numerous awards for his art in children''s picture books. His most famous
  work is The Middle Passage: White Ships/Black Cargo, illustrated by Tom Feelings. He has also worked as an artist in residence and professor of art at the University of South Carolina in Columbia, SC.
  Feelings was born in Brooklyn, New York, and died in 2003, in Mexico, where he had been receiving treatment for cancer.'
