  career_goals: Shirley aims to become a director of research and development within a company focused on sustainable energy materials, where she can shape long‑term scientific strategy while leveraging
    her business expertise. She seeks to secure larger federal and industry grants to build a multidisciplinary team that bridges lab discoveries with marketable products. Mentoring emerging scientists—particularly
    women in STEM—is a personal priority, and she envisions developing outreach programs that link her research institute with local schools in Armstrong County. Ultimately, she aspires to a senior executive
    role such as Chief Innovation Officer, where she can balance high‑impact scientific leadership with responsible, community‑oriented stewardship.
