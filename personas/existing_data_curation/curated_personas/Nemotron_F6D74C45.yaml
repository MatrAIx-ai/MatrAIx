  career_goals: Kenneth aims to move from an individual contributor role to a product architect or tech lead position where he can shape innovative, user‑focused experiences that blend technology and art.
    Over the next five years, he wants to lead a small R&D team at a startup or launch his own indie studio focused on experimental interactive media, such as generative art platforms or immersive storytelling
    tools. He also seeks mentorship opportunities that let him share his creative coding knowledge while preserving the flexibility to explore personal side projects.
