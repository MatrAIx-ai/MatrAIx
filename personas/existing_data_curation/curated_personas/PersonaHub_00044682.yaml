persona_description: A researcher or educational consultant specializing in the field of engineering education, particularly focused on the study of career preferences and interest development among middle
  school students. They are interested in exploring gender differences in engineering and science career interests and how these differences can be addressed to increase the number of diverse students pursuing
  engineering careers. They are likely to be familiar with the latest research in the field, have a strong background in education and psychology, and are interested in the development of STEM education
  programs. They may also have experience in conducting surveys and analyzing data to understand the trends and patterns in student interest and career preferences.
