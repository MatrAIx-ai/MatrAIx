personas:
  professional: A retired educator and curriculum designer, David Decardenas leverages his imaginative curiosity and disciplined organization to craft interdisciplinary lesson plans that fuse abstract art
    concepts with STEM, while mentoring teachers with a collaborative yet assertive style.
  sports: David Decardenas, a steadfast Detroit Tigers and Michigan Wolverines fan, stays active by walking the neighborhood trails, attending weekly senior squash sessions at the local YMCA, and participating
    in a community garden’s weekly far‑row stretching class, while occasionally joining a recreational bowling league.
  arts: David Decardenas immerses himself in abstract painting, drawing inspiration from Jackson Pollock and Mark Rothko, while curating a vintage jazz vinyl collection featuring Miles Davis, John Coltrane,
    and Thelonious Monk, attends regional exhibitions like the Michigan Fine Arts Festival, and reads art theory from Rosalind Krauss and philosophy by Albert Camus.
  travel: David Decardenas enjoys curated travel, planning modest trips to the Museum of Modern Art in New York, the Musée d'Orsay in Paris, and the annual Ann Arbor Art Fair, balancing a love of cultural
    immersion with a fixed travel budget and a preference for guided museum tours over spontaneous wanderings.
  culinary: David Decardenas, an adept home gardener, frequently prepares dishes like roasted beet and goat‑cheese salad with freshly harvested Michigan cherries, enjoys simmering mushroom risotto with
    rosemary, and treats themselves to occasional dinner at upscale farm‑to‑table restaurants featuring seasonal ingredients.
  core: David Decardenas blends a lifelong educator’s discipline with an abstract artist’s curiosity, juggling vintage jazz vinyl binges, garden‑to‑plate meals, and a penchant for late‑night chess, all
    while habitually misplacing their glasses on the canvas.
background:
  cultural: David was raised in a middle‑class family in the Detroit‑area suburbs of Michigan, absorbing the region’s blend of Midwestern pragmatism and a strong emphasis on education. While his surname
    reflects Spanish ancestry, his cultural identity is rooted in the values of the American Midwest—community involvement, modesty, and a reverence for lifelong learning. He grew up attending a Protestant
    (Methodist) congregation, participating in local civic events, and cherishing seasonal festivals and high school sports traditions. These experiences foster a respect for both individual self‑reliance
    and collective responsibility, which he expresses through his devotion to the arts, volunteerism, and mentorship.
