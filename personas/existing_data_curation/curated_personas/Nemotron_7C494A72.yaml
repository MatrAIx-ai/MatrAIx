    (English/Vietnamese)'']'
  hobbies: '[''Hiking in the Cascade foothills'', ''Kayaking on Lake Washington'', ''Cooking Vietnamese dishes (pho, bun cha, spring rolls)'', ''Playing badminton'', ''Reading business and tech ethics books'',
    ''Participating in Tet celebrations'', ''Volunteering with local immigrant support groups'']'
  career_goals: Phuc aims to advance from his current compliance officer role to a senior compliance manager position within the next three years, positioning himself for a future chief compliance officer
    role at a technology‑focused organization. He plans to earn professional certifications such as the Certified Information Privacy Professional (CIPP/US) and Certified Regulatory Compliance Manager (CRCM)
    to deepen his expertise in data privacy and regulatory strategy. He is passionate about building automated compliance monitoring systems that integrate with existing tech stacks, improving efficiency
    while preserving robust controls. Additionally, Phuc aspires to mentor junior colleagues, fostering a supportive and inclusive compliance culture that reflects his cooperative nature. Balancing career
    progression with family life, he seeks roles that offer flexibility for family commitments and opportunities to contribute to community outreach programs that educate local businesses on compliance
    best practices.
