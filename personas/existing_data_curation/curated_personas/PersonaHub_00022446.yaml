persona_description: A scientist and inventor who worked on the development of the Holter Monitor, a portable device for continuously monitoring heart activity. His contributions included developing the
  radioelectrocardiographic means and bringing the overall size of the device down to less than a cigarette package size, making it wearable inside a man's jacket handkerchief pocket. He also invented the
  Electrocardiographic Means patent in 1965 and was issued US Patent 3,215,136 for the device. His work on the Holter Monitor and his contributions to the diagnostic industry led to the development of an
  entire diagnostic industry.
