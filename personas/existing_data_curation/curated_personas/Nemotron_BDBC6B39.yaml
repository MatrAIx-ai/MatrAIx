personas:
  professional: Scott York is an aspiring junior robotics engineer who translates their methodical love of step‑by‑step LEGO builds into designing, programming, and testing simple competition robots, consistently
    applying a meticulous planning process and assertive problem‑solving while volunteering to mentor younger club members.
  sports: Scott York plays midfield for their community youth soccer team, the 'Eagles', in the fall and guards the point guard position for the middle‑school basketball squad during winter, balances rigorous
    practice with a personal fitness routine of twice‑weekly jogging, and follows the professional teams Los Angeles Lakers and Seattle Seahawks for strategy inspiration.
  arts: Scott York channels their creative side by admiring the architectural designs of Zaha Hadid, listening to the cinematic scores of Hans Zimmer while building LEGO models, binge‑watching the sci‑fi
    series 'The Expanse', and collecting limited‑edition LEGO Architecture sets featuring famous landmarks like the Eiffel Tower.
  travel: Scott York loves meticulously planning weekend trips, having already visited the Kennedy Space Center and the Smithsonian’s National Air and Space Museum, while dreaming of a future backpacking
    adventure through Japan’s robotics museums and a European tour of medieval castles, always drafting detailed itineraries with cost breakdowns before departure.
  culinary: Scott York enjoys cooking simple, structured meals such as spaghetti carbonara with pancetta, homemade pizza topped with mozzarella and pepperoni, and LEGO‑inspired sugar cookie designs, preferring
    precise recipes they can follow step‑by‑step, yet they often forget to preheat the oven on busy evenings, leading to slightly undercooked crusts.
  core: Scott York blends a compulsive love of order with boundless curiosity, building robots by day, LEGO skyscrapers by night, and budgeting finances with spreadsheet precision while they occasionally
    splurge on impulse purchases.
background:
  cultural: 'Scott was raised in a middle‑class, White family in Maumee, Ohio, a suburb of Toledo in the Midwest. His upbringing reflects typical Midwestern values: hard work, modesty, community involvement,
    and a respect for practical skills. His family participates in local traditions such as county fairs, community sports leagues, and seasonal church activities, which foster a sense of belonging and
    civic responsibility. The local school district emphasizes STEM education and extracurricular clubs, reinforcing his interest in structured, hands‑on learning.'
attributes:
  skills: '["Organized note‑taking", "Project planning for school assignments", "Basic Python programming", "Robotics club projects", "Model building (LEGO, model kits)", "Time management", "Team collaboration
    in sports", "Problem solving"]'
  hobbies: '["Building LEGO models", "Assembling model kits", "Robotics club activities", "Playing soccer", "Playing basketball", "Strategy video games (Minecraft, SimCity)", "Reading non‑fiction engineering
    books", "Volunteering with scouting events"]'
  career_goals: Scott aspires to a career that blends his love for structure, problem‑solving, and community impact. He dreams of becoming a civil engineer who designs safe, sustainable infrastructure such
    as bridges, roads, and community facilities in the Midwest. In the short term, he aims to join a STEM‑focused high‑school program, earn a scholarship for engineering studies, and eventually attend a
    university with a strong civil engineering department. His ambition also includes leading a robotics team or a community service project, allowing him to apply his organizational strengths to real‑world
    challenges.
