  hobbies: '[''drawing and coloring'', ''building with Duplo blocks'', ''collecting and sorting seashells'', ''reading picture books'', ''pretend play with stuffed animals'', ''riding a tricycle'', ''preschool
    storytime and music circles'']'
  career_goals: Carissa often says she wants to be a teacher because she likes helping friends learn, a veterinarian because she loves caring for animals, or an astronaut to explore space and discover new
    things. She also mentions wanting to grow up to work with the ocean, imagining herself as a marine biologist studying sea turtles on the New Jersey shore. Her ambitions reflect her curiosity about how
    things work and her desire to bring order and care to the world.
