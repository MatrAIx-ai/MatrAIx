  career_goals: She aspires to become an artist‑illustrator who captures wildlife and nature scenes, or a science communicator who uses story and visual media to explain complex ideas to others. She dreams
    of attending a specialized art or STEM summer program, contributing to community art projects, and eventually publishing illustrated books or documentaries that inspire curiosity and environmental stewardship.
