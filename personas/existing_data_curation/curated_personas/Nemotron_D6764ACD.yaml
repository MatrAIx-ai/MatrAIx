  career_goals: Joseph is drawn to careers that blend practicality, clear routines, and tangible outcomes. He is fascinated by engineering—particularly civil and mechanical fields—because they allow him
    to design and build structures that serve the community. He aims to join his middle school's robotics club, pursue a technical high‑school program, and eventually study engineering in college. He also
    entertains the idea of a public‑service role such as firefighting or police work, attracted by the structured schedules, teamwork, and direct impact on local safety.
