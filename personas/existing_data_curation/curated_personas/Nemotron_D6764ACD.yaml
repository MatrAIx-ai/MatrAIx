personas:
  professional: Joseph Wessels is a budding robotics enthusiast who leverages his methodical approach to building LEGO structures and model airplanes to develop Python scripts for his school club, signaling
    a future ambition to become a mechanical engineer.
  sports: Joseph Wessels pitches for the Midvale Little League Tigers, follows a regimented practice schedule that mirrors his love of routine, and is a devoted fan of the Chicago Cubs, often tracking player
    statistics and attending local high-school baseball games on weekends.
  arts: Joseph Wessels blends his technical creativity with artistic appreciation, building detailed LEGO city models while listening to the cinematic scores of Hans Zimmer, watching Studio Ghibli classics
    like 'Spirited Away', and drawing inspiration from the vivid illustrations in the graphic novel 'Amulet' by Kazu Kibuishi.
  travel: Joseph Wessels treats travel like a well-planned project, having mapped family trips to the Smithsonian National Air and Space Museum in Washington, D.C., a camping weekend in the Great Smoky
    Mountains, and now yearning to explore the Osaka Science Museum in Japan during a future summer vacation.
  culinary: Joseph Wessels, an eager beginner in the kitchen, enjoys crafting homemade pepperoni pizza topped with mozzarella, oregano, and sliced bell peppers, and occasionally tries a simple spaghetti
    carbonara with pancetta and grated Parmesan, always cleaning up meticulously afterward.
  core: Joseph Wessels is a methodical 12-year-old who channels his love of routine into building LEGO replicas, coding robots, and saving for future projects, while balancing a disciplined health regimen
    and a playful curiosity about the world.
background:
  cultural: Joseph was raised in a white, middle‑class family in Bedford, Virginia, with ancestry tracing back to German and Dutch roots. His household values punctuality, craftsmanship, and practical problem
    solving, traits often highlighted in his family's weekend projects and seasonal traditions. The Southern Appalachian setting influences his upbringing through participation in local events such as county
    fairs, high‑school football games, and church gatherings, fostering a sense of community and service. This cultural mix blends a respect for routine and tradition with a modest, down‑to‑earth outlook
    on personal and professional ambitions.
