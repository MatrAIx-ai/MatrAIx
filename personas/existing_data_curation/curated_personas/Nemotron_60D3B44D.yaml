personas:
  professional: Johnny Genry is a small-retail operations manager who blends meticulous budgeting and team scheduling with a relaxed approach to day-to-day chaos, using bilingual French-Creole phrases to
    smooth customer interactions and community events, and they are eyeing a regional manager role while pursuing a master’s in public administration to champion development that honors local traditions.
  sports: Johnny Genry is an avid early-morning fisherman on the Vermilion River, a weekend hiker on the Gulf Coast Trail, and a loyal fan of the New Orleans Saints and LSU Tigers, they occasionally join
    the local Vermilion River Kayak Club and play in a casual softball league at the community center.
  arts: Johnny Genry is a passionate amateur photographer who captures sunrise over the marshes, a regular attendee of the Delcambre library book club where they discuss works by William Faulkner and Kate
    Chopin, and a volunteer art-workshop facilitator who draws inspiration from regional zydeco legends like Clifton Chenier and the acoustic stylings of local folk groups.
  travel: Johnny Genry is a road-trip enthusiast who plans spontaneous weekend getaways to coastal cabins in Grand Isle, has visited New Orleans for Mardi Gras celebrations, and they dream of exploring
    the historic streets of Quebec City, preferring low-cost stays and flexible itineraries over rigid tour packages.
  culinary: Johnny Genry is an intermediate home chef who loves simmering seafood gumbo with shrimp, crab, Andouille sausage, bell peppers, onions, celery, and filé powder, enjoys making blackened catfish
    and beignets with chicory coffee, and they frequently source fresh fish at the local market while occasionally burning the roux in their enthusiastic experiments.
  core: Johnny Genry blends a structured work ethic with a laid-back love of bayou sunrise photography, spontaneous fishing trips, and community art workshops, they occasionally misplace schedules and indulge
    in extra-spicy gumbo.
background:
  cultural: Johnny grew up in Delcambre, a small town in Vermilion Parish, immersed in the unique blend of Anglo‑American and Cajun‑Creole cultures that defines south‑central Louisiana. His family has lived
    in the region for generations, working in agriculture and later in local small‑businesses. He was raised with Southern hospitality, Catholic traditions, and an appreciation for the region’s music, food,
    and festivals such as Mardi Gras and the Gumbo Festival. While ethnically white, Johnny’s daily life is shaped by the bilingual (English‑French) environment, local folklore, and a strong sense of community
    responsibility.
