  hobbies: '[''Fishing'', ''Bayou photography'', ''Reading Southern history'', ''Cooking Cajun cuisine'', ''Volunteer community center work'', ''Hiking coastal trails'', ''Woodworking'']'
  career_goals: He aims to become a regional manager overseeing multiple locations in south Louisiana within the next five years, hoping to implement more structured operational processes while preserving
    the flexibility his team values. Johnny also plans to pursue a master's in public administration to transition into a leadership role in community development, focusing on preserving local cultural
    heritage and supporting small business growth.
