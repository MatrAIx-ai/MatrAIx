  hobbies: '[''Church choir singing'', ''Morning walks around Lake Eola'', ''Line dancing classes'', ''Financial‑literacy tutoring for youth'', ''Southern cooking workshops'', ''Reading contemporary African‑American
    novels'', ''Book club participation'', ''Attending Orlando Magic basketball games'', ''Community gardening at local urban farm'']'
  career_goals: Approaching the culmination of a long career, Rakayla’s primary ambition is to transition from pure sales to a legacy‑building role that blends her competitive drive with community impact.
    Over the next two years she aims to secure the regional “Top Performer” award for revenue generation while simultaneously developing a mentorship program that equips at least ten junior agents with
    her routine‑focused sales methodology. She also plans to launch a boutique advisory service tailored to underserved Black families and retirees in Orange County, leveraging her practical financial knowledge
    to improve wealth accumulation and financial literacy. By the time she fully retires, she hopes to have delivered a series of free community workshops on retirement planning, and to be recognized as
    a trusted financial educator within the local African‑American community.
