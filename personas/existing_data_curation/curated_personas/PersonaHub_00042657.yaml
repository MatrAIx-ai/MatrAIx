persona_description: A neuroscientist who specializes in the study of Alzheimer's disease and its impact on familial inheritance. She is particularly interested in the genetic factors that contribute to
  the development of the disease and how they can be used to identify individuals at risk for the disease. She is also interested in the use of imaging techniques to detect the presence of amyloid plaques
  in the brain of asymptomatic individuals with a familial history of Alzheimer's disease.
