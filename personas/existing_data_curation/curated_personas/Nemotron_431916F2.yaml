  career_goals: Maria aspires to combine her love for the ocean and her desire to help others. She plans to attend community college after high school, majoring in environmental science or public health,
    with the long‑term goal of becoming a marine conservationist or a community health worker. In the meantime, she hopes to build a portfolio of digital content that could support a nonprofit focused on
    coastal preservation, and she envisions using her communication skills to raise awareness and inspire local action.
