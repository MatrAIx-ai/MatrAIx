personas:
  professional: Rola Thompson, a retired engineer with a STEM bachelor’s degree, leverages their analytical expertise to mentor middle‑school girls in STEM, coordinate community theater events, and translate
    complex science into accessible talks for senior‑center audiences, all while their competitive streak fuels a relentless drive in bridge tournaments and a delightfully chaotic approach to project planning.
  sports: Rola Thompson stays active leading senior‑center dance evenings, playing bridge competitively twice weekly, strolling the local park while tending a vegetable garden, and rooting for the River
    City Sluggers minor‑league baseball team whenever televised games appear.
  arts: Rola Thompson immerses themselves in community theater productions of classics like 'Our Town,' devours historical fiction by Ken Follett and Philippa Gregory, and fills the evenings with the soulful
    sounds of Johnny Cash and the sweeping orchestral works of Gustav Mahler, often humming melodies while pruning garden rows.
  travel: Rola Thompson dreams of visiting Yellowstone’s geysers, the Grand Canyon’s rim, and Acadia’s coastal cliffs, preferring organized group tours with flexible pacing that accommodate garden breaks
    and nighttime sky‑gazing sessions with their amateur astronomy club.
  culinary: Rola Thompson cultivates heirloom tomatoes, carrots, and beans in a modest raised‑bed garden and delights in simmering a vegetable ratatouille, baking a spiced apple crumble, and whipping up
    a hearty lentil stew, though they sometimes forget to turn off the oven in the excitement of a bridge victory.
  core: Rola Thompson is a curious, competitive 81‑year‑old whose love of community, hands‑on problem solving, and unrestrained curiosity is constantly balanced by restless anxiety and a relaxed, somewhat
    disorganized approach to life.
background:
  cultural: Rola grew up in a mid‑century white, middle‑class family in the Oklahoma plains, where the values of self‑reliance, practicality, and community fellowship were deeply ingrained. Raised during
    the post‑war boom, she experienced the state’s oil‑driven economic growth and the close‑knit atmosphere of small‑town life, including church gatherings and county fairs. Her pursuit of a STEM degree
    in the 1960s reflected a progressive family emphasis on education and breaking gender norms. Today, she blends the modest, down‑to‑earth sensibilities of her Oklahoma heritage with a lifelong curiosity
    about science and a commitment to sharing that knowledge across generations.
attributes:
  skills: '[''Engineering problem solving'', ''Mathematics tutoring'', ''DIY home repair'', ''Computer literacy and basic scripting'', ''Community event coordination'', ''Strategic board game strategy'']'
  hobbies: '[''Bridge (card game)'', ''Gardening'', ''Community dance nights'', ''Volunteer science outreach'', ''Reading historical fiction'', ''Amateur astronomy'', ''Community theater'']'
  career_goals: Although retired, Rola aims to stay intellectually engaged by completing a memoir that captures her life as a woman in STEM during the 1960s, volunteering as a STEM mentor for local middle‑school
    girls, and writing occasional opinion pieces for the community newspaper to counteract misinformation. She also hopes to travel to a few national parks she has long read about, maintain her health through
    regular activity so she can continue leading senior‑center dance nights, and ultimately be recognized as a trusted elder who bridges generations through knowledge and curiosity.
