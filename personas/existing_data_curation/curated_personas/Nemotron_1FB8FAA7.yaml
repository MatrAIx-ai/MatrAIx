  hobbies: '["Reading mystery and non-fiction books", "Fishing on the Atlantic coast", "Weightlifting at the gym", "Cycling on local trails", "Playing chess and strategic board games", "Online tactical
    video gaming", "Cooking and grilling healthy meals", "Participating in a small book club"]'
  career_goals: Michael aims to become a Certified Public Accountant (CPA) within the next two years, leveraging his associate's degree and work experience to qualify for the exam. He aspires to advance
    to a senior auditor role at a reputable regional firm, eventually moving into an accounting manager or forensic accounting specialist position where his competitive drive and skeptical analytical style
    can be fully utilized. In the longer term, he envisions establishing his own boutique accounting practice focused on small businesses in South Florida, offering personalized audit and tax services that
    prioritize accuracy and integrity.
