personas:
  professional: Michael Dennis is a meticulous financial accountant whose expertise in GAAP‑compliant audits, advanced Excel modeling, and risk assessment is complemented by a competitive, skeptical mindset
    that drives them to uncover hidden discrepancies and champion procedural precision.
  sports: Michael Dennis fuels their fitness routine with weightlifting at the downtown gym, weekend cycling trips with the Miami Bike Club, and early‑morning fishing expeditions on the Atlantic coast,
    while they cheer on the Miami Heat during the NBA season and the Miami Dolphins on Sundays.
  arts: Michael Dennis unwinds with the cerebral twists of Agatha Christie’s mysteries and Gillian Flynn’s thrillers, finds inspiration in John Coltrane’s saxophone improvisations, and appreciates the visual
    storytelling of Alfred Hitchcock, which together shape their methodical yet imaginative outlook.
  travel: Michael Dennis favors low‑key, meticulously planned getaways, often spending weekends fishing off the Florida Keys or exploring coastal towns in the Bahamas, while they dream of a future solo
    road trip across the Pacific Northwest to discover secluded salmon streams.
  culinary: Michael Dennis enjoys cooking simple, health‑focused dishes such as grilled salmon topped with lemon‑dill sauce, quinoa‑avocado salads, and seasoned sweet‑potato wedges, honing their grilling
    technique with precision while they occasionally indulge in a protein‑packed stir‑fry to fuel their workout regimen.
  core: Michael Dennis balances a disciplined, data‑driven career with a solitary love for strategic games and early‑morning fishing, though their tendency to over‑analyze can turn routine decisions into
    marathon mental workouts.
background:
  cultural: Michael identifies as a White American with Midwestern family roots, having grown up in a middle‑class household that valued hard work, self‑reliance, and modest community involvement. Relocating
    to Boynton Beach, FL, he has absorbed the coastal lifestyle of South Florida, blending a practical, no‑nonsense work ethic with an appreciation for outdoor recreation common in Palm Beach County. His
    upbringing included regular attendance at a local Protestant church, shaping a worldview that emphasizes responsibility, integrity, and modesty. While primarily influenced by mainstream American cultural
    norms, Michael is also open to the diverse multicultural atmosphere of his region, which subtly informs his social interactions and professional approach.
attributes:
  skills: '["Financial statement preparation", "GAAP and GAAS compliance", "External and internal audit execution", "Advanced Microsoft Excel (pivot tables, macros)", "QuickBooks and Xero proficiency",
