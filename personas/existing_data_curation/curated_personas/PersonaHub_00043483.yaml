persona_description: A nutritionist who works in nursing care facilities, outpatient care centers, hospitals, and physicians and health practitioners offices. They provide food guidelines to help prevent
  and treat illnesses, recommend dietary modifications, and promote healthy eating habits. They plan and conduct nutritional programs or food service, supervise meal preparation, and conduct nutritional
  research. They work to alleviate health problems related to poor eating habits, such as diabetes, hypertension, and obesity, through educating the public, promoting sensible eating habits in schools,
  hospitals, clinics, communities, prisons, and nursing homes. They advise people on matters of nutrition and often work together with family physicians to provide health modification information to a patient.
