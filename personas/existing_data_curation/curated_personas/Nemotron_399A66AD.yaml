personas:
  professional: David Parrish is an aspiring robotics engineer who spends after‑school hours soldering custom circuits, coding autonomous behaviors for his LEGO‑based bots, and entering regional STEM competitions,
    where their meticulous planning, competitive drive, and skeptical eye for flaws set a high bar for performance.
  sports: David Parrish is a dedicated cross‑country runner who logs consistent 5‑mile workouts aiming for regional qualifying times, and a midfielder on the varsity soccer team who idolises L.A. Galaxy
    forward Javier Hernández, while they also cheer for the New York Yankees as their favorite baseball franchise.
  arts: David Parrish is a hobbyist model builder and sci‑fi aficionado who sketches futuristic vehicle concepts inspired by Syd Mead, devours the works of Isaac Asimov and William Gibson, and unwinds to
    the cinematic scores of Hans Zimmer and the ambient textures of Brian Eno, weaving these artistic influences into their LEGO Technic creations.
  travel: David Parrish meticulously plans family getaways, having explored the Smithsonian National Air and Space Museum in Washington, D.C., and spent a summer at the Tech Museum of Innovation in San
    Jose, while dreaming of a future trip to Tokyo’s Miraikan museum and a trek through the Swiss Alps to examine cutting‑edge engineering marvels.
  culinary: David Parrish gravitates toward quick, high‑protein meals such as chicken teriyaki bowls with jasmine rice, homemade banana‑spinach whey smoothies, and occasional pepperoni pizza after marathon
    chess sessions, while they experiment with building their own energy bars using oats, honey, and peanut butter.
  core: David Parrish is a disciplined, curiosity‑driven teen whose relentless pursuit of technical mastery is balanced by a competitive streak, an undercurrent of anxiety, and a habit of over‑planning
    every hobby from robotics to running, and they often schedule each free minute in a notebook.
background:
  cultural: David grew up in a middle‑class, predominantly white suburban community in Bristow, Virginia, within Prince William County. His family values education, civic responsibility, and community involvement,
    typical of the region’s proximity to Washington, D.C. He celebrates traditional American holidays and frequently participates in local scouting programs and school volunteer initiatives. The multicultural
    environment of Northern Virginia, coupled with exposure to federal government and military influences nearby, subtly shapes his perspective on public service and technological innovation.
attributes:
