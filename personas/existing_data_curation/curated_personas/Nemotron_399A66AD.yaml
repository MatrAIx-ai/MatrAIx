  hobbies: '["Robotics club (building and programming robots)", "Strategy video games (e.g., Civilization, StarCraft)", "Chess", "Model building (airplanes, LEGO Technic)", "Reading (science fiction, technology
    non-fiction)", "Running (cross‑country training)", "Journaling/mindfulness", "Team sports (soccer)"]'
  career_goals: David aims to attend a top-tier university to study engineering, preferably mechanical or computer engineering, with a focus on robotics and aerospace applications. He envisions a career
    as a robotics engineer or aerospace engineer, contributing to innovative technologies for space exploration or autonomous systems. He also aspires to launch a tech startup while in college, leveraging
    his coding and design skills. His competitive drive pushes him to seek leadership roles in student engineering societies and secure internships at high‑tech firms. Ultimately, he hopes to combine his
    technical expertise with disciplined project management to lead large‑scale engineering projects.
