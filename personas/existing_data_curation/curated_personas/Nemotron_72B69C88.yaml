personas:
  professional: Derrick Batts, an aspiring graphic designer and freelance photographer, channels their Photoshop basics and Canva flair into crafting social‑media graphics for the community center while
    building a portfolio of weddings and portrait sessions, all as they pursue an associate degree in visual communications.
  sports: Derrick Batts, a dedicated member of the North Pine Trails Hiking Club, follows the Mississippi Braves baseball season with devotion and incorporates weekend hikes through the local woodlands
    into their fitness routine, favoring steady cardio over high‑intensity gym workouts.
  arts: Derrick Batts, an avid photographer and acoustic‑guitar player, draws inspiration from BB King’s blues riffs, Miles Davis’s modal jazz, and Anderson Paak’s contemporary R&B while penning poetry
    that echoes the speculative worlds of NK Jemisin and Brandon Sanderson, often sharing their visual and lyrical creations at community‑center art nights.
  travel: Derrick Batts, a budget‑conscious traveler, frequently takes day trips to New Orleans and Nashville to soak in live music scenes, plans annual hikes in the Great Smoky Mountains, and dreams of
    a future weekend in New York City’s gallery district once their freelance income stabilizes.
  culinary: Derrick Batts, a competent home cook, delights family gatherings with fried catfish seasoned with cayenne, buttery collard greens simmered with smoked turkey, and homemade buttermilk cornbread,
    while occasionally experimenting with spicy shrimp‑and‑okra gumbo inspired by YouTube tutorials.
  core: Derrick Batts, a quietly ambitious 19‑year‑old who channels worry into art, balances late‑night guitar sessions with meticulous budgeting, and dreams of a community studio that amplifies local voices.
background:
  cultural: Derrick is a Black American raised in Sontag, Mississippi, deeply rooted in the region’s rich African‑American heritage. Growing up in a close‑knit church family, he was exposed early to gospel
    music, oral storytelling, and a strong sense of communal responsibility. The local blues legacy—echoing the historic juke‑joints and river‑bank gatherings—has shaped his musical taste and his appreciation
    for improvisation. Family gatherings often revolve around Southern comfort food and shared histories of resilience during the civil‑rights era, fostering a respect for cultural memory and collective
    harmony. This background informs his artistic sensibilities, his commitment to community service, and his desire to uplift Black creative voices in his rural surroundings.
attributes:
  skills: '["Digital Media Editing (Adobe Photoshop, Canva)", "Photography (portrait and nature)", "Graphic Design Basics", "Acoustic Guitar (intermediate)", "Creative Writing (poetry, short stories)",
    "Community Event Planning", "Basic Computer Literacy (Microsoft Office, Google Suite)", "Problem Solving", "Time Management"]'
  hobbies: '["Photography (landscape and portrait)", "Sketching and drawing", "Acoustic guitar playing", "Creative writing (poetry, short stories)", "Reading science‑fiction and fantasy", "Listening to
    blues and jazz", "Hiking and exploring nature", "Cooking Southern cuisine", "Volunteering at the community center"]'
  career_goals: Derrick aims to enroll in a community college program to earn an associate degree in graphic design or visual communications, while simultaneously building a freelance photography portfolio
    focused on local events, weddings, and portrait work. He hopes to combine his artistic talents with his collaborative nature by working as a youth arts coordinator for a community center, eventually
    creating a safe creative space where peers can explore music, visual art, and writing. Long‑term, he envisions opening a modest studio/gallery in Lawrence County that showcases regional Black artists
    and offers workshops that foster artistic expression and community cohesion.
