persona_description: A scientist who is interested in the history and practices of ancient writing and has expertise in the analysis of ink compositions, particularly in relation to the ancient Egyptian
  writing traditions. They have conducted research on the composition of red and black inks in ancient Egyptian papyri and have published findings on the use of lead as a dryer rather than a pigment in
  the ancient Egyptian ink. They have a keen interest in the scientific methods used to study ancient artifacts and have contributed to the field of ancient Egyptian studies through their research.
