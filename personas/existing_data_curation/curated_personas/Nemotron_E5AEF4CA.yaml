  hobbies: '[''Gardening'', ''Knitting & Crocheting'', ''Reading (Theology & Science)'', ''Puzzle Solving (Crosswords, Sudoku)'', ''Astronomy Club'', ''Walking/Hiking'', ''Cooking & Baking'', ''Small‑Group
    Bible Study'']'
  career_goals: Betty aims to advance to a senior leadership position within her denomination, such as Director of Faith Formation for the regional diocese, where she can shape structured, achievement‑oriented
    educational programs that bridge scientific literacy and spiritual growth. She envisions establishing a community health outreach initiative that leverages her STEM background to provide evidence‑based
    counseling and wellness workshops. Long‑term, she hopes to mentor emerging church staff, build a cohesive small‑group ministry network across Mercer County, and eventually serve as a senior associate
    minister, guiding the congregation with the same disciplined, harmonious approach that defines her work today.
