persona_description: A historian who specializes in the study of medieval Jewish law and finance, particularly the relationship between借贷行为和税收负担。他的研究兴趣包括借贷行为的历史、借贷行为和税收负担的关系、借贷行为的法律和道德后果以及借贷行为对中世纪犹太社会的影响。他特别关注借贷行为在中世纪犹太社会中的历史、法律和道德意义，以及借贷行为和税收负担之间的关系。
