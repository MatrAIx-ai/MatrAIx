  career_goals: Zoraida aims to pursue a PhD in STEM Education with a focus on inclusive pedagogy, ultimately securing a tenure‑track faculty position where she can develop interdisciplinary curricula that
    support underrepresented students, especially Latinx learners. In the short term, she plans to obtain teaching certification, lead grant‑driven community STEM outreach programs in Cabarrus County, and
    publish research on the impact of bilingual instruction in science courses. Long‑term, she envisions establishing a research lab on STEM learning, authoring open‑access teaching resources, and serving
    as a department chair who champions diversity, equity, and innovative teaching practices.
