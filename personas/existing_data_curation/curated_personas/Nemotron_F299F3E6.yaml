personas:
  professional: Zoraida Avilarodriguez is a dynamic STEM teaching assistant who blends deep expertise in biology, physics, and data analysis with bilingual communication skills, leveraging their curiosity‑driven
    yet practical approach to design inclusive curricula while thriving in the flexible, often improvisational pace of laboratory instruction.
  sports: Zoraida Avilarodriguez fuels their energetic lifestyle by playing recreational soccer with the Charlotte Copperheads, cheering on the Carolina Panthers and Charlotte Hornets, and hiking the trails
    of Crowders Mountain State Park on weekends, because they thrive on both team camaraderie and solo adventure.
  arts: Zoraida Avilarodriguez expresses artistic passion through salsa and folklorico dancing, strumming acoustic guitar to songs by Juan Luis Guerra and Los Tigres del Norte, and attending live performances
    by local indie bands and the annual Charlotte Salsa Festival, while slipping in sci‑fi movie marathons featuring directors like Ridley Scott, and they often host themed music nights for friends.
  travel: Zoraida Avilarodriguez prefers spontaneous, culturally immersive trips, often booking last‑minute flights to Mexico to celebrate family holidays, while also exploring nearby Asheville for mountain
    retreats and occasionally planning weekend road trips to Austin for music festivals, and they balance a limited budget with a love for authentic experiences.
  culinary: Zoraida Avilarodriguez boasts a strong cooking skill level, regularly preparing tamales, mole with dark chocolate and ancho chilies, and street‑style tacos al pastor at home, while savoring
    fresh cilantro, corn masa, and Oaxacan cheese, and they relish dining out at local taco trucks to compare flavors.
  core: Zoraida Avilarodriguez blends a flexible, sociable spirit with a penchant for organized chaos, juggling STEM mentorship, salsa nights, and impromptu hikes while sometimes neglecting strict budgeting
    and dental care.
background:
  cultural: Born to Mexican parents, Zoraida was raised in a bilingual household where Spanish was spoken at home and English at school. Her family instilled the values of close kinship, hospitality, and
    a strong work ethic, celebrating traditions such as Día de los Muertos, Las Posadas, and quinceañeras. Living in Concord, NC, she navigates a bicultural identity, actively participating in the local
    Mexican‑American community through cultural festivals, community kitchens, and language exchange groups. Her heritage informs her inclusive teaching style, encouraging respect for diverse perspectives
    and fostering a sense of belonging for Latinx students in STEM.
