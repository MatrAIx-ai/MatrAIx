personas:
  professional: Genevieve Warnock, a retired school secretary now serving as a part‑time archivist for the Excelsior Springs Historical Society, applies her meticulous record‑keeping, budgeting acumen,
    and curiosity‑driven research methods to preserve community heritage while mentoring volunteers with disciplined yet compassionate guidance.
  sports: Genevieve Warnock, a loyal fan of the St. Louis Cardinals and a regular participant in the local senior walking club at the community center, embraces daily morning strolls along the nearby trail
    for gentle cardio, enjoys birdwatching as a calming sport, and attends a weekly senior yoga class at the church hall to maintain flexibility.
  arts: Genevieve Warnock, an avid watercolorist whose landscapes echo the serenity of Monet and the bold colors of Georgia O'Keeffe, frequents the Springfield Art Museum to study regional folk art, reads
    poetry from Emily Dickinson and W. B. Yeats, and engages in intimate community lectures where she often quotes T.S. Eliot, while also crafting intricate knitted scarves inspired by classic patterns.
  travel: Genevieve Warnock, who prefers meticulously planned journeys with printed itineraries, chooses escorted senior tours to historic sites such as Williamsburg, Virginia and the Scottish Highlands,
    loves leisurely road trips to the Ozark National Scenic Riverways for birdwatching, and dreams of a springtime train ride through the Canadian Rockies, all while balancing a modest travel budget and
    the need for comfortable accommodations.
  culinary: Genevieve Warnock, a garden‑to‑table enthusiast who tends rosemary, basil, and thyme in her backyard, delights in preparing herb‑infused roasted chicken with honey‑mustard glazed carrots, fresh
    garden salad with balsamic vinaigrette, and a classic apple crumble scented with cinnamon, while modestly experimenting with digital photography of her dishes for her family’s cookbook.
  core: Genevieve Warnock, an 82‑year‑old organizer with a Midwestern work ethic and boundless curiosity, channels precision into archiving local history, guards her finances with disciplined budgeting,
    nurtures quiet artistic pursuits, and wrestles with a habit of over‑worrying and occasional stubbornness when changing knitting patterns.
background:
  cultural: Genevieve was born in the mid‑1940s to a white, middle‑class family of German‑English ancestry in the American Midwest. Raised in Missouri during the post‑World War II era, she absorbed regional
    values of modesty, hard work, community service, and a subtle Methodist influence. Her cultural identity reflects Midwestern hospitality, a deep appreciation for local history, and a lifelong respect
    for the arts and education.
