  career_goals: Although retired, Genevieve aims to compile a comprehensive family history manuscript, serve as a part‑time archivist for the Excelsior Springs Historical Society, and mentor younger volunteers
    in community project planning. She also aspires to maintain mental acuity by enrolling in senior art classes, attending digital photography workshops, and continuing her lifelong learning of unconventional
    ideas through local lecture series.
