personas:
  professional: Geneva Magana, a 23‑year‑old front‑end developer turned UX researcher, leverages fluent JavaScript and a literary background to design accessible, narrative‑driven interfaces, and they channel
    the intense anxiety that can accompany tight deadlines into meticulous prototype refinements, often accompanied by late‑night coffee binges.
  sports: Geneva Magana cheers for the Baltimore Ravens on Sundays, follows the Orioles’ spring training, participates in a local hiking group on the Patapsco Valley trails, and attends weekly yoga classes
    at a community studio, where they blend competitive fandom with low‑impact fitness.
  arts: Geneva Magana immerses in the local arts scene by attending gallery showings of contemporary painter Amy Sherald, streaming Sufjan Stevens on vinyl while sketching, and catching indie film screenings
    of directors like Greta Gerwig, and they let these experiences feed the storytelling flair that powers their digital narratives.
  travel: Geneva Magana prefers short, budget‑friendly escapes to nearby Washington, D.C. museums, weekend hikes in Shenandoah National Park, and a year‑old dream of exploring Lisbon’s street‑art districts,
    and they balance meticulous itinerary planning with spontaneous photo walks when anxiety eases.
  culinary: Geneva Magana enjoys experimenting with home‑cooked ramen broth flavored with miso and tare, whipping up Mediterranean shakshuka with fresh cumin and coriander, yet they occasionally set off
    the smoke alarm while attempting to flambé desserts for friends.
  core: Geneva Magana is a creatively wired, anxious 23‑year‑old designer who channels intense emotions into inclusive digital art while they battle coffee‑driven late nights and occasional overspending
    on art supplies.
background:
  cultural: Geneva grew up in a middle‑class suburban family in Howard County, Maryland. Her ancestry includes German and Irish roots, while her paternal lineage carries the Hispanic surname Magana, giving
    her a subtle blend of Anglo‑American and Latin cultural influences. The proximity to Washington, D.C., exposed her to a vibrant arts and museum scene, progressive social values, and diverse communities.
    She identifies with mainstream American cultural norms but also values the storytelling traditions and visual art heritage associated with her European and Hispanic background, which inform her appreciation
    for literature, music, and community engagement.
