  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting'', ''Sketching and illustration'', ''Reading contemporary fiction and poetry'', ''Creative writing and journaling'', ''Attending
    indie film screenings'', ''Playing acoustic guitar'', ''Yoga and mindfulness meditation'', ''Hiking in Patapsco Valley State Park'', ''Experimental cooking'', ''Photography (street and nature)'', ''Participating
    in hackathons and tech meetups'', ''Volunteering for community art projects'']'
  career_goals: Geneva aspires to become a senior UX researcher and design lead who creates culturally resonant, inclusive digital products. She aims to work on interdisciplinary projects that merge technology
    with the arts—such as interactive museum installations, digital archives, or mental‑health platforms that incorporate creative expression. Over the next three to five years, she plans to earn a UX certification,
    contribute to open‑source accessibility tools, and develop a boutique consultancy that offers user‑centered design services to nonprofit arts organizations. She also hopes to mentor emerging designers,
    especially those navigating high‑anxiety environments, fostering supportive, collaborative workplaces.
