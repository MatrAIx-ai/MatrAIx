  hobbies: '[''Abstract painting'', ''Photography'', ''Reading speculative fiction'', ''Co‑hosting a book club'', ''Organizing neighborhood potlucks'', ''Volunteering at blood drives'', ''Walking San Diego
    coastal trails'', ''Gardening native succulents'', ''Practicing yoga'', ''Community theater narration'']'
  career_goals: Looking ahead, Mary aims to transition into a mentorship and training role, becoming a lead trainer for phlebotomy novices at her clinic and local community colleges. She hopes to design
    a series of art‑infused educational modules that blend abstract visuals with clinical instruction, making the learning process more engaging. While planning for a phased retirement, Mary envisions staying
    active in the regional blood‑donation network, potentially spearheading a senior‑focused health‑fair program that combines wellness screenings with interactive art activities. Her ultimate ambition
    is to leave a legacy of compassionate, patient‑centered care enhanced by creative communication.
