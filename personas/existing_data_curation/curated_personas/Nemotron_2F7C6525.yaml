personas:
  professional: Mary Teitsch, a veteran phlebotomist who blends meticulous specimen handling with vivid storytelling, uses their imaginative flair to create art‑infused training modules, mentors junior
    staff with compassion, and organizes community blood drives with charismatic energy.
  sports: Mary Teitsch, a dedicated walker and yoga enthusiast, frequents the Torrey Pines Coastal Trail with the local Senior Hiking Club, cheers for the San Diego Padres during spring training, and participates
    in a community adult softball league each summer.
  arts: Mary Teitsch, an abstract painter inspired by the sweeping hues of the Pacific and a sunrise photographer who emulates Ansel Adams' dramatic lighting, also curates a book club around speculative
    fiction authors like N.K. Jemisin and shares a love of Jackson Pollock's splatter technique and the melodic storytelling of Sufjan Stevens.
  travel: Mary Teitsch, an adventurous yet modest planner, prefers scenic road trips along the California coast to places like Big Sur and Carmel, has a bucket‑list of sunrise photography excursions in
    Kyoto and Iceland, and often packs a portable easel to sketch on the beach during relaxed getaways.
  culinary: Mary Teitsch, a confident home cook who delights in preparing fresh fish tacos with charred corn tortillas, mango salsa, and cilantro, savors the tang of citrus‑marinated grilled shrimp, and
    occasionally over‑salts their signature avocado‑lime hummus for the potlucks they host.
  core: Mary Teitsch, a 63‑year‑old phlebotomy mentor whose days oscillate between soothing anxious patients with whimsical sketches and accidentally mixing up their paint colors, embodies a rare blend
    of scientific precision and boundless creativity.
background:
  cultural: Mary’s heritage traces back to German ancestors, reflected in her surname Teitsch, but she was raised in a quintessential Southern Californian environment. Growing up in a middle‑class, post‑World‑War‑II
    American household, she internalized values of hard work, community service, and self‑reliance. Her cultural identity blends mainstream American traditions—celebrating holidays like Thanksgiving and
    Independence Day—with an appreciation for the diverse tapestry of San Diego County, including its vibrant Latino and Asian influences. Mary’s lifelong exposure to the region’s art scene, outdoor lifestyle,
    and multicultural community has shaped a worldview that values inclusivity, creativity, and collaborative harmony.
