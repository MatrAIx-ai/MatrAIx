  hobbies: '[''Walking Club'', ''Mystery Novel Book Club'', ''Gardening'', ''Cooking'', ''Tennis (Doubles)'', ''Yoga'', ''Mindfulness Meditation'', ''Science Podcasts'', ''Volunteer at Community Garden'',
    ''Local Theater'', ''Travel to Cultural Festivals'', ''Board Games with Friends'', ''Digital Photography'']'
  career_goals: Malika aims to move into a senior leadership role within the regional health system, such as Director of Integrated Community Health Services, where she can design and scale evidence‑based
    programs for underserved populations. She plans to pursue a Master’s in Public Health to deepen her policy expertise and to obtain LCSW certification to broaden her clinical scope. Long‑term, she hopes
    to establish a nonprofit that provides holistic health and social support for seniors in Allegheny County, leveraging data analytics to demonstrate impact and secure sustainable funding. Her competitive
    nature pushes her to set measurable outcomes, while her practical mindset ensures that innovations are realistic and community‑focused.
