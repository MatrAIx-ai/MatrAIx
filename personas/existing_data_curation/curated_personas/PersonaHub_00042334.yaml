persona_description: A researcher and conservationist interested in the impact of agri-environment schemes on biodiversity and the conservation of natural habitats. This person is particularly interested
  in the effects of hedgerows and field margins on the number and diversity of larger moths, and the role of these features in adapting to climate change. They are also interested in the potential of hedgerow
  trees as stepping stones for some species and in the importance of a landscape-scale conservation approach to agri-environment schemes. This person is likely to have a background in biology, ecology,
  or conservation science and is interested in exploring the complex interplay between human activities and the natural environment.
