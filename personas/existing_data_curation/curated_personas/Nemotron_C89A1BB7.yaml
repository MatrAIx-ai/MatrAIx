personas:
  professional: Dana Bowers, a retired community organizer and senior‑center mentor, leverages her event‑planning, budgeting, and oral‑history skills to coordinate intergenerational workshops and digitize
    local archives, balancing a curiosity for new technology with practical, hands‑on leadership that they apply whenever possible.
  sports: Dana Bowers, a devoted fan of the Oklahoma City Thunder and the Tulsa Roughnecks, joins the local senior walking club, attends weekly low‑impact aerobics at the community center, and participates
    in seasonal line‑dance socials that blend fitness with her love of church fellowship.
  arts: Dana Bowers, an avid gospel choir member, regularly listens to Mahalia Jackson and Kirk Franklin, attends live performances by The Blind Boys of Alabama, and collects biographies of civil‑rights
    leaders like John Lewis, letting the soulful melodies and stories shape their daily moments.
  travel: Dana Bowers enjoys weekend road trips along historic Route 66, day excursions to the Oklahoma City National Memorial, and dreams of a heritage pilgrimage to Ghana’s coastal towns, though travel
    plans are balanced with limited stamina, the need to coordinate volunteer schedules, and a modest travel budget.
  culinary: Dana Bowers, an experienced home cook, prepares soul‑food staples such as smoked collard greens, fried catfish, cornbread, and sweet potato pie using garden‑grown tomatoes and herbs, while experimenting
    with lower‑sodium versions for seniors and occasionally over‑indulging in extra butter during holiday feasts.
  core: Dana Bowers blends a lifelong love of community storytelling, gospel music, and hearty cooking with a practical, organized spirit and a slightly forgetful habit of misplacing glasses, making every
    day a lively mix of service, laughter, and resilient optimism.
background:
  cultural: Dana was raised in an African‑American family with deep roots in Oklahoma, a state known for its historic Black towns and close‑knit church communities. Growing up during the civil‑rights era,
    she attended a historically Black Baptist church where gospel music, communal meals, and fellowship were central. Her family preserved traditions of soul‑food cooking, oral storytelling, and celebrating
    Juneteenth and other cultural milestones. Dana’s cultural identity is shaped by a blend of Southern Black heritage, Oklahoma’s frontier resilience, and a lifelong commitment to community service, intergenerational
    solidarity, and the preservation of African‑American history in the Heartland.
