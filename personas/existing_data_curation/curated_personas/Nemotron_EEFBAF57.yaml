    shift leadership", "Adaptability to new cooking trends (fermentation, plant‑based cuisine)"]'
  hobbies: '["Experimenting with fusion recipes at home", "Visiting local farmers'' markets and food festivals", "Food photography", "Playing competitive video games", "Basketball with friends", "Practicing
    Tai Chi", "Traveling to explore regional cuisines", "Gardening herbs for fresh cooking", "Watching cooking shows and cooking competitions", "Reading culinary history books"]'
  career_goals: Chun aims to earn a culinary diploma within the next two years and advance to a sous‑chef position at a reputable farm‑to‑table restaurant in the Cleveland area. Ultimately, he envisions
    opening his own East‑Asian‑American fusion eatery that showcases local Ohio produce alongside traditional Chinese flavors. Competing in regional cooking contests and developing a line of signature sauces
    that reflect his heritage are key milestones on his path to culinary recognition.
