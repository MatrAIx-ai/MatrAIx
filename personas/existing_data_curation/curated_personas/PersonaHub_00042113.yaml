persona_description: A team of psychologists and economists who specialize in applying insights and methods from behavioral science to the design of policies, with a focus on low- or no-cost interventions
  that can have a rapid and significant impact. The team aims to use the principles of behavioral economics to positively shape government policy and shape public behavior for the better. The team is well-funded,
  well-integrated with a broad spectrum of government departments covering a number of important policy areas, and is known for its success in improving tax repayment rates, reducing repossession interventions
  by bailiffs, and increasing organ donation rates. The team's work has been endorsed by the Prime Minister and has expanded to take on a wider range of projects, including work for foreign governments,
  the World Bank, and the UN.
