  career_goals: Even in retirement, Dawn aims to leave a lasting legacy by compiling her memoirs and a practical guide to small‑business finance for future generations. She wishes to establish a modest
    scholarship fund for high‑school seniors in Houston’s African‑American community, continue her mentorship of Black entrepreneurs through the local senior center, and preserve her family’s heritage by
    completing a detailed genealogy archive. Maintaining her health and independence while contributing volunteer hours remains a central ambition.
