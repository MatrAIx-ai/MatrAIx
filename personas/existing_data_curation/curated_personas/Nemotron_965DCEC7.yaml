  hobbies: '[''Reading historical fiction'', ''Herb gardening'', ''Knitting and crocheting'', ''Crossword puzzles'', ''Jazz and gospel music'', ''Birdwatching'', ''Cooking Southern cuisine'', ''Church attendance'',
