persona_description: A teacher who is passionate about supporting English Language Learners (ELLs) in mastering academic language and is looking for effective teaching tools to help them achieve their goals.
  They are interested in using the TEAM Toolkits, which provide structured activities in listening, reading, writing, and speaking to help ELLs develop grade-level academic language used in classroom instruction.
  The teacher values flexibility of use and can adapt the kits for tutoring sessions after school, ELL pull-out groups, or mini-units based on specific skills that address gaps in student learning. The
  teacher also appreciates the teacher resources found in the kits, which are easy to follow and provide teaching strategies for every lesson.
