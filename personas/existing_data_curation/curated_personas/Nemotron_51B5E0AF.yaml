  career_goals: Paige aims to transition from full‑time engineering roles into strategic consulting, focusing on sustainable product design for small‑scale manufacturers in the Triangle region. She seeks
    to champion gender equity in STEM by establishing mentorship programs and speaking at industry conferences. Over the next five years, she plans to lead a community‑based renewable‑energy project, author
    a technical guide on low‑carbon mechanical systems, and eventually serve as an adjunct professor at a local university, sharing her blend of practical experience and curiosity‑driven innovation with
    the next generation.
