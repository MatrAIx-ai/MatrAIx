personas:
  professional: Paige Marriott, a seasoned mechanical engineer specializing in advanced CAD modeling, finite element analysis, and sustainable product design, leverages their curiosity‑driven precision
    and balanced pragmatism, and they lead cross‑functional teams and mentor junior staff while transitioning toward strategic consulting for low‑carbon manufacturing.
  sports: Paige Marriott hikes the Blue Ridge Mountains year‑round, supports the Carolina Hurricanes and the Durham Bulls, and participates in a local women's climbing club that meets at Triangle Rock Club,
    and they blend seasonal outdoor pursuits with community‑based fitness.
  arts: Paige Marriott immerses themselves in Carrboro’s vibrant arts scene, attending monthly performances at the Lincoln Theatre, collecting prints by Shepard Fairey, and finding inspiration in the music
    of Joni Mitchell and Leon Bridges while sketching designs for new woodworking projects, and they view these experiences as extensions of their engineering creativity.
  travel: Paige Marriott prefers thoughtfully planned road trips with a focus on nature and cultural immersion, having explored Asheville’s craft breweries, the historic streets of Kyoto for Zen garden
    study, and dreaming of a future sailing excursion in the Greek Islands, and they balance adventure with a budget-conscious mindset.
  culinary: Paige Marriott enjoys cooking seasonal, locally sourced meals such as roasted heirloom carrots with rosemary, grilled trout with lemon‑dill sauce, and a spicy kimchi‑infused quinoa bowl, displaying
    advanced culinary skills and a penchant for farm‑to‑table ingredients like heirloom tomatoes and fresh basil, and they often share these dishes at community potlucks.
  core: Paige Marriott blends engineering rigor with artistic curiosity, balancing meticulous project leadership and community mentorship while occasionally hoarding wood scraps and overcommitting to volunteer
    initiatives, and they consider each new project an opportunity to merge function with sustainability.
background:
  cultural: Paige was raised in a middle‑class white family in the Mid‑Atlantic region and later moved to North Carolina for graduate studies. Her upbringing combined the American emphasis on individual
    initiative and self‑reliance with a deep appreciation for community involvement typical of the Southern research towns. Living in Carrboro, a progressive enclave near the University of North Carolina,
    she has embraced a culture that values sustainability, arts, and inclusive education. These influences shape her pragmatic yet open‑minded worldview, her respect for both tradition and innovation, and
    her commitment to giving back through mentorship and local civic projects.
