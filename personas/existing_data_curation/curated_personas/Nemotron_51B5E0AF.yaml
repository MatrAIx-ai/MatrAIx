  hobbies: '[''Hiking'', ''Vegetable Gardening'', ''Woodworking'', ''Reading (Science Non‑fiction and Contemporary Fiction)'', ''Book Club Participation'', ''STEM Outreach Volunteering'', ''Maker Space
