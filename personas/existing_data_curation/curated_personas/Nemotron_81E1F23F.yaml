    organizations'']'
  career_goals: Concepcion aims to earn her PMP certification within the next year and transition to a senior project manager role overseeing multi‑million‑dollar technology initiatives. She aspires to
    become a program director, leading a portfolio of cross‑functional projects that integrate innovative tools while maintaining strong governance. Long‑term, she envisions launching her own consultancy
    focused on helping Latinx‑owned businesses adopt scalable project frameworks. Her competitive nature fuels a desire for measurable success, yet she also seeks to develop robust stress‑management practices
    and mentorship skills to support team wellbeing.
