  hobbies: '[''Hiking in local nature trails'', ''Vegetable gardening'', ''Knitting and crochet'', ''Reading historical fiction and self‑improvement books'', ''Cooking New England seafood dishes'', ''Participating
    in a small book club'', ''Volunteering for community budgeting workshops'', ''Singing in church choir'', ''Playing board games with family and close friends'']'
  career_goals: Joy aims to earn the Certified Financial Planner (CFP) designation within the next two years and expand her client base to serve more small‑business owners and retirees across York County.
    She envisions launching her own boutique advisory practice that emphasizes transparent, fee‑only services and community financial education. In the longer term, Joy plans to develop a series of workshops
    on budgeting and retirement for local seniors, create a mentorship program for junior advisors, and become a recognized resource for financial literacy in her hometown while preserving a balanced work‑life
    schedule.
