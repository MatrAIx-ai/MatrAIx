personas:
  professional: Joy Ahn, a seasoned financial planner specializing in budgeting, cash‑flow analysis, and fee‑only portfolio construction, distills complex concepts into step‑by‑step client plans while leveraging
    tools like MoneyGuidePro and eMoney to foster trust‑based relationships in her rural community.
  sports: Joy Ahn, an avid hiker of Bradbury Mountain trails, also follows the Portland Sea Dogs baseball team and the New England Revolution soccer club, participates in a seasonal community walking group,
    and prefers low‑impact cardio over high‑intensity workouts, favoring consistency and routine.
  arts: Joy Ahn, a choir member who loves singing hymns by Thomas Moore, enjoys crocheting scarves inspired by the patterns on Winslow Homer paintings, and reads historical fiction authors like Ken Follett
    and Mary Robinette Kowal, finds artistic outlets essential to balancing her analytical work.
  travel: Joy Ahn plans trips with a careful spreadsheet, favoring modest‑budget escapes to coastal New England towns like Bar Harbor and historic sites such as Quebec City, while dreaming of a road‑trip
    through the Canadian Maritimes to connect with family traditions she heard about in grandparents’ stories.
  culinary: Joy Ahn cooks classic New England seafood fare—clam chowder, lobster roll, and baked cod with fresh thyme—using vegetables from her garden, and while she masters the perfect butter‑based sauce,
    she sometimes over‑salts the broth in her quest for richer flavor.
  core: Joy Ahn blends her New England work ethic, love for structured financial plans, and quiet hobbies like hiking and knitting into a life that values community stewardship, practical simplicity, and
    occasional over‑thinking of details.
background:
  cultural: Joy was born and raised in the rural parts of York County, Maine, into a family with deep New England roots that include French‑Canadian ancestry from the early 20th‑century lumber boom. Growing
    up in a close‑knit, predominantly white working‑class community, she internalized values of self‑reliance, modesty, and civic responsibility. The town’s seasonal festivals, church gatherings, and strong
    volunteer ethic shaped her preference for intimate social settings and her commitment to helping neighbors manage their finances. Although she left formal schooling before ninth grade, she benefitted
    from local mentorship, adult‑learning programs, and on‑the‑job training, reflecting the region’s pragmatic, hands‑on approach to skill development.
