  career_goals: Migdalys aims to transition into a supervisory role within the next two years, leveraging her reliability and leadership instincts to become a shift manager or senior cashier mentor. She
    plans to complete a GED program to formalize her education and to attend a short certification in retail management offered by a local community college. Long-term, she hopes to open a modest weekend
    food stall in the market, sharing traditional Ecuadorian dishes with the local community, while also volunteering as a Spanish-language liaison at the nearby senior center to help elderly residents
    navigate city services.
