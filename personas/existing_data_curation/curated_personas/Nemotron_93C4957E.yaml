personas:
  professional: Dunia Villar, an 18‑year‑old budding multimedia artist, fuses digital illustration, abstract painting, and bilingual storytelling into freelance projects for cultural nonprofits, leveraging
    their Adobe Photoshop/Illustrator expertise, improvisational flair, and relaxed‑but‑energetic work style to turn community briefs into vibrant visual narratives.
  sports: Dunia Villar keeps the sunshine of Boca Raton's beaches in a rotating routine of summer beach volleyball with the local Sand & Spike Club, winter yoga at the Boca Raton Yoga Collective, and weekly
    salsa socials through the Boca Raton Salsa Society, while they cheer on the Miami Heat, the Miami Marlins, and the Miami Dolphins as their favorite professional teams.
  arts: Dunia Villar immerses themselves in the avant‑garde, drawing inspiration from abstract expressionist Mark Rothko, the ambient soundscapes of Brian Eno, the street murals of Shepard Fairey, and the
    experimental theater of The Wooster Group, while regularly contributing to Boca Raton's art walks and open‑mic nights.
  travel: Dunia Villar prefers spontaneous weekend getaways, often booking last‑minute rides to Miami’s Art Basel, weekend road trips along the Florida Keys, and occasional cultural tours of Cartagena,
    Medellín, and Madrid, balancing a love for adventure with a modest student budget and a habit of overpacking their sketchbook.
  culinary: Dunia Villar, a confident home chef, loves crafting traditional arepas, hallacas, and empanadas with twists like avocado‑lime crema, plantain‑infused masa, and smoked pork in the filling, while
    also experimenting with local seafood chowders and tropical fruit salsa, showcasing both respect for heritage and a playful palate.
  core: Dunia Villar is a free‑spirited visual storyteller who trades late‑night sketch marathons for occasional missed deadlines, thrives on spontaneous community art projects, and never says no to a salsa
    dance off, even if it means sacrificing a night of sleep.
background:
  cultural: Dunia was raised in a Venezuelan household that preserved many of the country's vibrant customs. Her parents emigrated to Florida in the early 2000s, bringing with them the sounds of joropo
    and salsa, the aromas of arepas and pabellón, and a reverence for family gatherings during holidays like Día de los Santos Inocentes and Venezuelan Independence Day. Growing up in Boca Raton, she was
    exposed to a multicultural environment, yet her family remained active in the local Venezuelan community, participating in cultural festivals, Semana Santa processions, and charity events for recent
    arrivals. This bicultural experience cultivated her fluency in Spanish and English, a deep appreciation for Latin American art, and a commitment to sharing her heritage through creative expression.
attributes:
  skills: '[''Digital illustration'', ''Graphic design (Adobe Photoshop, Illustrator)'', ''Abstract painting'', ''Mixed-media collage'', ''Street photography'', ''Bilingual communication (Spanish–English)'',
