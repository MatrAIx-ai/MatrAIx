  hobbies: '[''abstract painting'', ''digital illustration'', ''experimental music production'', ''yoga'', ''salsa dancing'', ''street photography'', ''attending art walks and festivals'', ''cooking Venezuelan
    cuisine'', ''improvisational theater'', ''volunteering for community murals'', ''reading sci‑fi graphic novels'']'
  career_goals: Dunia aspires to build a career that fuses her love for abstract art, digital media, and her Venezuelan roots. She envisions working as a freelance multimedia artist and creative content
    strategist, producing visual narratives for cultural organizations, advertising agencies, or independent publishers that celebrate Latin American stories. In the medium term, she plans to complete a
    BFA in Visual Arts, followed by a master's degree in Arts Administration or Cultural Studies to equip herself for curatorial work. Ultimately, she hopes to launch a community‑centered art space in South
    Florida where immigrant youth can explore contemporary art, collaborate on public murals, and share their cultural heritage. Flexibility and the ability to set her own schedule remain core to her professional
    vision.
