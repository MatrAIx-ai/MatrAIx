  career_goals: Juan aims to move into a senior director or regional vice-president role within the next five years, overseeing multiple locations in the Northeast and expanding the company’s footprint
    into Latin American markets. He is committed to leading a digital-transformation agenda that modernizes inventory and customer-insight systems while maintaining operational reliability. A parallel ambition
    is to launch a family-owned import business that brings premium Ecuadorian coffee and artisanal foods to the New York market, leveraging his cultural networks and business acumen. To support these goals,
    Juan plans to enroll in an executive MBA program part-time and to develop a mentorship pipeline for underrepresented employees in his organization.
