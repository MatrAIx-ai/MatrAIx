    ''Sketching and mixed‑media art'']'
  hobbies: '[''Acrylic painting'', ''Watercolor sketching'', ''Mixed‑media collages'', ''Visiting local art museums and galleries'', ''DIY home‑improvement projects'', ''Photography of Michigan landscapes'',
    ''Reading art and design books'', ''Nature walks'', ''Yoga'', ''Journaling'']'
  career_goals: In the short term, Brenda aims to earn a journeyman certification in painting and paperhanging and to build a reputation as a reliable, detail‑oriented professional in Ottawa County. She
    plans to attend evening trade courses to deepen her knowledge of specialty finishes such as faux painting and decorative plaster. Over the next five years, she hopes to specialize in custom mural work
    and high‑end residential projects, developing a portfolio that blends her technical skill with her artistic sensibility. Ultimately, Brenda envisions launching her own small painting and interior‑decor
    business that offers both traditional services and bespoke artistic finishes, providing a stable income for her family while allowing her to pursue creative commissions and mentor apprentices.
