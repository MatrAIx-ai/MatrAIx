  hobbies: '[''Gardening'', ''Reading historical fiction'', ''Knitting'', ''Hiking in local nature preserves'', ''Cooking'', ''Puzzle solving (crosswords, Sudoku)'', ''Attending quiet art exhibits'', ''Volunteering
