  career_goals: Carmen aims to advance to a regional sales director role within the next three to five years, where she can shape broader sales strategies while preserving a structured, low‑stress environment
    for her team. She is focused on creating a replicable sales process that emphasizes routine, clear expectations, and data‑driven decision‑making. Long‑term, she hopes to transition into a mentorship
    or consulting capacity that allows her to share her practical expertise with emerging sales professionals, particularly women seeking balanced, career‑friendly pathways.
