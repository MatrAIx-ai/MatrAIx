  career_goals: Although retired, Brandi aims to channel her competitive spirit and love of novelty into a senior‑center art program she will design and lead, culminating in a public exhibition of her abstract
    works. She also plans to compile a written memoir and family genealogy book, learning new digital publishing tools along the way. Beyond personal creation, she aspires to mentor younger artists, win
    a local bridge tournament, and travel to art festivals across Florida to stay inspired and socially engaged.
