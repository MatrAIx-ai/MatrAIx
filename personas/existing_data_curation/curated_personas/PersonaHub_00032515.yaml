persona_description: A cranial osteopath who is interested in the subtle changes in motion, tension, and tissue quality in the body, and uses their highly developed palpation skills to diagnose and treat
  problems. They are particularly interested in the gentle and effective treatment of babies, children, older individuals, and those who are anxious about more physical treatment. They are trained in the
  specialized field of cranial osteopathy and have completed the rigorous and extensive training required to achieve registration with the General Osteopathic Council (GOsC) as an osteopath.
