persona_description: A researcher at the Telethon Institute for Child Health Research who specializes in the study of neurodevelopmental disorders, specifically Rett syndrome. Her focus is on identifying
  the mechanisms behind the high incidence of fractures in girls with Rett syndrome and developing strategies to prevent them. She is also interested in the impact of fractures on the quality of life and
  care needs of girls with Rett syndrome and their families. Her research has been funded by the National Institutes of Health (USA) and the National Health and Medical Research Council (NHMRC).
