  hobbies: '[''Sketching'', ''Acrylic painting'', ''Reading science fiction and philosophy'', ''Stargazing'', ''Cooking Mexican dishes'', ''Acoustic guitar'', ''Attending small community art events'']'
  career_goals: Grabiel aims to advance to a supervisory or lead role in the warehouse, where he can mentor newer staff and help improve workflow flexibility. He also hopes to enroll in a GED program to
    formalize his education, and eventually start a small side business selling his own artwork or handcrafted items at local markets, blending his love of creativity with community connection. He dreams
    of a stable, harmonious work‑life balance that allows time for his artistic pursuits and to deepen ties with his local Mexican community.
