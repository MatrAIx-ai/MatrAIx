  hobbies: '[''Restoring classic cars'', ''Model kit building'', ''Basketball'', ''Fishing'', ''Strategy video games'', ''Science-fiction reading'', ''County fair volunteering'']'
  career_goals: Stanley plans to obtain his GED within the next year and then enroll in a technical apprenticeship program, preferably in automotive technology or HVAC systems. He aims to become a certified
    mechanic or HVAC technician, gaining enough experience to eventually open a small, community‑focused repair shop in Findlay. While pursuing his trade, he hopes to take evening courses in basic computer
    networking and electric‑vehicle systems to stay current with emerging technologies. His long‑term ambition is financial stability, the ability to support his family, and contributing reliable, skilled
    services to his hometown.
