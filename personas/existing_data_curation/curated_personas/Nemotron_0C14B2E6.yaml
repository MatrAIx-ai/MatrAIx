  career_goals: Hugo aims to transition into a technology leadership role, such as a Chief Technology Officer or senior architect, where he can blend his business acumen with his software expertise to drive
    innovative product lines. He envisions launching his own SaaS startup that empowers small Mexican‑American businesses with intuitive digital tools, integrating cultural storytelling and artistic interfaces.
    Hugo also seeks to become a recognized advocate for diversity in tech, mentoring underrepresented developers and sponsoring community hackathons. He values flexible, remote‑friendly work arrangements
    that preserve creative freedom, and he plans to deepen his knowledge of AI, AR, and immersive media to stay at the forefront of emerging technologies.
