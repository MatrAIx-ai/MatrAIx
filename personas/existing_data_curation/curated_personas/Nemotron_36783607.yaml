  hobbies: '[''Sketching'', ''Photography'', ''Visiting art galleries'', ''Reading art history and psychology'', ''Gardening'', ''Hiking'', ''Listening to jazz and classical music'', ''DIY woodworking'',
    ''Glass marbling workshops'']'
  career_goals: Henry plans to deepen his professional credentials by earning a Certified Nursing Assistant (CNA) certification and pursuing an associate’s degree in health sciences. He aspires to transition
    into a supervisory role within a home‑health agency, where he can mentor newer aides and implement quality‑improvement initiatives. Inspired by his appreciation for art, he hopes to develop a small
    art‑therapy program for clients that blends creative expression with personal care. Over the next five years, he aims to achieve financial stability that supports independent living, and to eventually
    establish a community‑focused care consultancy that emphasizes evidence‑based practices and holistic well‑being.
