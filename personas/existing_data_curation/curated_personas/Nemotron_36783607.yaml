personas:
  professional: Henry Yao is a seasoned personal care aide with a meticulous eye for clinical detail, who blends precise hygiene support, vital sign monitoring, and rigorous documentation with a curiosity
    for evidence‑based caregiving and a budding ambition to launch an art‑therapy program for his clients.
  sports: Henry Yao follows the Kansas City Chiefs and the Kansas City Royals from his living room, joins a local weekend hiking club for brisk walks through Tallgrass Prairie, and plays competitive pickleball
    on Tuesday evenings with a small circle of workshop mates.
  arts: Henry Yao spends weekends wandering Kansas museums, sketching prairie vistas in a weather‑worn notebook, capturing sunset light over the Flint Hills with a vintage 35 mm camera, and listening to
    Miles Davis and Debussy while experimenting with glass marbling in a tight‑knit craft group.
  travel: Henry Yao prefers solitary road trips to quiet natural destinations, has driven the Badlands and the Black Hills for sunrise photography, dreams of a spring visit to Paris’s Musée d’Orsay, and
    meticulously plans itineraries using pen‑and‑paper maps to avoid overcrowded tourist hubs.
  culinary: Henry Yao cultivates heirloom tomatoes, carrots, and kale in a modest garden, loves whipping up a roasted beet and goat‑cheese salad with walnut vinaigrette, and on occasion treats himself to
    a slow‑cooked chicken fricassée seasoned with fresh rosemary from his plot.
  core: Henry Yao balances a methodical, competitive work ethic with a solitary, art‑driven soul, often sketching at dusk while meticulously tracking finances and habitually double‑checking every detail.
background:
  cultural: Henry grew up in Gardner, a small town in Miami County, Kansas, within a predominantly white, Midwestern community that values self‑reliance, modesty, and hard work. His family heritage traces
    back to German and Irish immigrants who settled the region in the late 19th century, imparting a respect for tradition and community gatherings such as county fairs and church picnics. The local culture
    emphasizes practical skills, neighborly support, and a quiet appreciation for the natural landscape, all of which have shaped Henry’s reserved demeanor and his affinity for solitary, nature‑focused
    activities. Though divorced, he maintains close ties to a small circle of longtime friends and to the broader Gardner community through volunteer work at the senior center.
