personas:
  professional: Dana Hassan is a retired research engineer who now channels her quantitative expertise and disciplined project-management style into community STEM-arts initiatives, designing data-driven
    exhibition experiences, leading senior coding workshops, and consulting museums on integrating interactive technology while maintaining meticulous documentation.
  sports: Dana Hassan enjoys low-impact fitness such as brisk walks through Prospect Park, weekend tai chi classes at the Brooklyn Public Library, and follows the Brooklyn Nets, New York Knicks, and New
    York Yankees, while occasionally indulging in competitive trivia nights that feel like mental sport.
  arts: Dana Hassan immerses themselves in the visual arts by painting oil landscapes in the style of Claude Monet, curating small exhibitions inspired by the works of Kehinde Wiley and Julie Mehretu, attending
    artist talks at the Met and MoMA, and collecting limited-edition prints from contemporary illustrator James Jean, all of which fuel their interdisciplinary creativity.
  travel: Dana Hassan's travel style blends structured itineraries with spontaneous museum visits, having explored the Louvre in Paris, the Uffizi Gallery in Florence, the Alhambra in Granada, and the Kyoto
    National Museum, while dreaming of a future trip to the Smithsonian's National Air and Space Museum and the ancient ruins of Petra.
  culinary: Dana Hassan approaches cooking as a disciplined experiment, perfecting dishes like coq au vin, ratatouille, and hand-pulled ramen through precise measurements and timed steps, while maintaining
    a well-stocked spice rack that includes sumac, saffron, and smoked paprika, and occasionally over-salts a sauce when excitement overtakes caution.
  core: Dana Hassan blends scientific rigor with artistic curiosity, organizes every aspect of life with meticulous precision, and remains calm and resilient, even when a misplaced brushstroke or a miscalculated
    budget throws a tiny wrench into their orderly world.
background:
  cultural: Dana grew up in a middle-class white American family in the Northeastern United States during the post-war era. Her upbringing emphasized education, civic duty, and appreciation for cultural
    diversity, values that were reinforced after moving to Brooklyn, a borough celebrated for its multicultural vibrancy. While she identifies with her European-American heritage, she has embraced the rich
    tapestry of cultures around her, allowing this inclusive outlook to shape her collaborative, harmony-seeking personality and her commitment to community enrichment.
attributes:
  skills: '[''Quantitative data analysis'', ''Programming (Python, MATLAB)'', ''Experimental design'', ''Technical writing and grant preparation'', ''Project management'', ''Mentorship and teaching'', ''Curriculum
