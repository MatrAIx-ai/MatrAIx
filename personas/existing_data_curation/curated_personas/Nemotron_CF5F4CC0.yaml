  hobbies: '[''Oil painting'', ''Visiting art galleries and museums'', ''Reading scientific journals and classic literature'', ''Gardening'', ''Calligraphy'', ''Volunteering at community science center'',
    ''Leading senior coding workshops'', ''Cooking experimental dishes'', ''Traveling to cultural and historic sites'', ''Attending artist talks and lectures'', ''Photography'', ''Puzzle solving'']'
  career_goals: 'Although retired from formal employment, Dana remains goal-oriented. She aspires to channel her analytical rigor and high standards into community-focused initiatives: establishing a STEM-arts
    mentorship program for seniors, authoring a memoir that weaves scientific insights with personal narratives, and advising local museums on integrating technology into exhibits. She is driven to leave
    a lasting legacy of interdisciplinary collaboration, encourage lifelong learning, and serve as a calm, resilient role model for future generations.'
