  career_goals: Wesley aims to obtain his Certified Public Accountant (CPA) license within the next year, then move into a senior audit manager role where he can lead teams serving Napa‑area wineries and
    agribusinesses. Over the next five to seven years he plans to pursue a partnership track at his firm or transition to a CFO position at a mid‑size wine or hospitality company, integrating data‑analytics‑driven
    finance strategies. He is committed to maintaining a work‑life balance that supports his marriage, continuing professional development through advanced accounting courses, and mentoring the next generation
    of accountants. Additionally, he hopes to expand his community involvement by leading financial‑literacy workshops for local residents.
