  hobbies: '[''Hiking in Napa hills'', ''Wine tasting at boutique vineyards'', ''Farm‑to‑table cooking'', ''Reading economic history'', ''Playing acoustic guitar'', ''Yoga'', ''Cycling along the Bay'',
