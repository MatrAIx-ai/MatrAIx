  career_goals: Although retired, Jason aims to compile and self‑publish a memoir that captures the cultural shifts of Appalachia and his own life story, preserving the memories of his late wife and their
    community. He intends to establish a modest scholarship fund in his wife's name to support local high‑school students pursuing the arts. He also hopes to travel to Washington, D.C., to visit the Smithsonian
    American Art Museum and to attend the annual Mountain Folk Festival in nearby West Virginia. Maintaining health and independence remains a priority, as does continuing to give talks at the local historical
    society and mentoring younger volunteers.
