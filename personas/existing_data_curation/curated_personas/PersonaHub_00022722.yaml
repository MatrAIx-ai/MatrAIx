persona_description: A college professor who specializes in the study of second language acquisition, particularly in the field of Japanese as a second language. He/she is knowledgeable about metacognitive
  and cognitive strategies used in ESL instruction and has conducted research on the effectiveness of these strategies in learning Japanese. The professor is interested in linking specific learning tasks
  with cognitive strategies and instructional level, and has developed a strategy classification scheme based on the distinction between cognitive and metacognitive strategies. The professor has experience
  teaching students at different proficiency levels and has observed patterns in the use of metacognitive and cognitive strategies in their reading and writing.
