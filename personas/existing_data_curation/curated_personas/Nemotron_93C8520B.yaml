personas:
  professional: Tomoko Maer draws on their curiosity and sociable energy to lead sustainable, parametric architecture projects, skillfully wielding BIM tools like Revit and Grasshopper while fostering interdisciplinary
    workshops that blend meticulous organization with creative flexibility.
  sports: Tomoko Maer spends Saturdays hiking the Loess Hills with the Iowa Nature Trail Club, cheers on the Iowa Hawkeyes football team and the Chicago Cubs, and balances high‑intensity interval workouts
    with yoga, but occasional anxiety can cause them to skip a session.
  arts: Tomoko Maer immerses themselves in the Des Moines Art Center, community theater productions, and seasonal art festivals, drawing inspiration from photographers like Andreas Gursky, architects such
    as Tadao Ando, and the subtle aesthetics of origami, while also volunteering as a docent to share their love of cultural heritage.
  travel: Tomoko Maer prefers curated road trips that mix Midwestern scenic hikes, boutique agritourism stays in Minnesota, and cultural immersion visits to Kyoto’s tea houses and Taiwan’s night markets,
    balancing a moderate travel budget with a desire for both adventure and reflective relaxation.
  culinary: Tomoko Maer enjoys crafting miso‑glazed salmon paired with Iowa corn succotash, pumpkin‑infused ramen broth, and matcha‑spiked herb vinaigrette using basil and shiso harvested from their garden,
    cooking at an intermediate skill level while frequently dining at the farm‑to‑table restaurant The Farmhouse for inspiration.
  core: Tomoko Maer is a curiosity‑driven architect whose vibrant love of art, yoga, and experimental cooking coexists with occasional anxiety‑induced impulsivity, shaping a life that blends meticulous
    design with community‑focused creativity.
background:
  cultural: Tomoko’s family emigrated from Japan and Taiwan to the United States in the early 1970s, settling in the Midwest. Growing up in a bicultural household, she learned Japanese and Mandarin dialects,
    traditional crafts, and the values of harmony, respect, and meticulous attention to detail. These cultural influences shape her architectural ethos, leading her to favor minimalistic aesthetics, natural
    materials, and designs that encourage communal interaction. While she fully embraces the friendly, collaborative spirit of Coralville and the broader Iowa community, she also integrates East Asian sensibilities—such
    as spatial fluidity and an emphasis on nature—into her projects, creating a unique cross‑cultural design language.
attributes:
  skills: '[''Architectural Design'', ''BIM Modeling (Revit, ArchiCAD)'', ''Parametric Design (Grasshopper)'', ''Sustainable Design (LEED AP)'', ''3D Modeling (SketchUp, Rhino)'', ''Construction Documentation'',
    ''Midwestern Building Codes'', ''Project Management'', ''Client Relations'', ''Interdisciplinary Workshop Facilitation'', ''Structural Analysis Basics'', ''Digital Fabrication'', ''Design Research'']'
  hobbies: '[''Art Gallery Visits'', ''Theater Participation'', ''Community Art Festivals'', ''Japanese Tea Ceremony'', ''Origami'', ''Fusion Cooking'', ''Architectural Photography'', ''Hiking'', ''Gardening'',
    ''Yoga'', ''Meditation'', ''Mindfulness Groups'', ''Design Meetups'', ''Neighborhood Improvement Volunteering'']'
  career_goals: Tomoko aims to become a senior design director at a regional architecture firm, leading large‑scale public and civic projects that blend East Asian aesthetic principles with Midwestern community
    values. She aspires to open her own boutique practice focused on culturally responsive, environmentally sustainable design, and to earn multiple regional awards for innovation in public spaces. Additionally,
    she hopes to mentor emerging architects, particularly women and those from underrepresented backgrounds, and to contribute scholarly articles on integrating parametric methods with traditional building
    practices.
