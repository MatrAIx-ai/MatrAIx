  career_goals: Yiling aims to progress from a general office clerk to a senior administrative assistant or office manager within the next five years, focusing on roles that value meticulous organization
    and quiet leadership. She seeks to acquire certifications in office administration and bookkeeping to broaden her responsibilities, while also exploring remote data‑entry opportunities that would grant
    her a more flexible schedule to support her family. Long‑term, she hopes to mentor newer staff members, fostering a collaborative and harmonious workplace without sacrificing the solitude she values.
