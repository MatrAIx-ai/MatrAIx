  career_goals: Roberto aims to secure a position as a data scientist or UX researcher where he can merge his analytical expertise with his artistic sensibility to solve complex, real‑world problems. He
    is driven to work on projects that blend technology and creativity, such as interactive data visualizations for cultural institutions or immersive digital installations. In the long term, he envisions
    launching a multidisciplinary startup that leverages AI and design to preserve and showcase Puerto Rican heritage both in Philadelphia and on the island. He plans to earn certifications in machine learning
    and human‑computer interaction, build a professional reputation that satisfies his competitive nature, and transition from a period of unemployment to a stable, challenging role that also supports his
    personal growth.
