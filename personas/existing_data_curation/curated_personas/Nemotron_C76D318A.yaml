personas:
  professional: Roberto Rivera, an aspiring data scientist and UX researcher, fuses advanced Python analytics, statistical modeling, and rigorous quality assurance with a keen eye for visual storytelling,
    and they channel their curiosity and competitive drive into interactive data visualizations for cultural institutions while maintaining a flexible yet organized project workflow.
  sports: Roberto Rivera, an avid fan of the Philadelphia Eagles and the Philadelphia 76ers who also joins pick‑up basketball games at the local park, balances their competitive streak with regular yoga
    classes and weekend runs along the Schuylkill River Trail, and they use these activities to manage stress and maintain fitness.
  arts: Roberto Rivera, a street‑photography enthusiast who frequents the Mural Arts Philadelphia exhibitions and the Philadelphia Museum of Art, spends evenings strumming guitar to the sounds of Chucho
    Valdés and Gregory Porter, and they curate a personal collection of digital art inspired by contemporary murals and jazz improvisation.
  travel: Roberto Rivera, a budget‑conscious explorer, meticulously plans weekend trips to New York’s Lower East Side galleries and long‑haul flights to Barcelona for its vibrant street‑art scene, and they
    dream of a future cultural immersion visit to San Juan to deepen their culinary roots.
  culinary: Roberto Rivera, a home‑cooking aficionado, regularly prepares arroz con gandules and mofongo using family‑passed recipes and fresh cilantro, plantains, and sofrito, yet they admit to ordering
    pizza late at night when deadlines overwhelm them.
  core: Roberto Rivera is a creatively driven data enthusiast who balances analytical rigor with artistic pursuits, yet they often wrestle with anxiety, caffeine cravings, and an uncompromising competitive
    streak.
background:
  cultural: Roberto grew up in a bilingual Puerto Rican household in Philadelphia, immersed in the vibrant Nuyorican community. Family traditions such as cooking arroz con gandules, celebrating Día de San
    Juan, and listening to salsa, bomba, and plena have shaped his cultural identity. He maintains strong ties to his heritage through participation in local Puerto Rican festivals, community organizations,
    and regular communication with relatives in Puerto Rico. This background fuels his appreciation for rhythmic music, storytelling, and visual art, and inspires his desire to integrate technology with
    cultural preservation.
