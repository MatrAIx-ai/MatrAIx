  hobbies: '[''abstract painting'', ''speculative fiction reading'', ''gardening'', ''quilting'', ''community storytelling'', ''volunteering at food pantry'', ''book club participation'']'
  career_goals: Mary aims to earn a certified logistics supervisor credential within two years, positioning herself for a supervisory role focused on safety training and process improvement. She wishes
    to become a union representative to advocate for fair treatment of her colleagues, while also developing a small side business selling her abstract paintings and hand‑stitched quilts. Her long‑term
    ambition is to secure a comfortable retirement that still allows her to mentor younger workers and lead community arts workshops.
