personas:
  professional: Eric Bass is a retired handyman who now runs a modest side‑business offering home‑repair services to fellow retirees while mentoring neighbors in carpentry and small‑engine maintenance,
    applying their quiet curiosity for new DIY techniques within a practical, organized workflow.
  sports: Eric Bass tracks the Baltimore Orioles and Washington Nationals on TV, participates in the local senior softball league each spring, and spends their Saturdays crabbing, kayaking, and birdwatching
    on the Chesapeake Bay, viewing these activities as essential to staying fit and connected to their coastal roots.
  arts: Eric Bass enjoys the folk blues of The Carolina Chocolate Drops, the maritime paintings of Winslow Homer, and regularly attends period productions at the historic St. Mary’s County theater, finding
    that music and visual art deepen their appreciation for the region’s heritage.
  travel: Eric Bass prefers purposeful short trips, such as weekend sailing to the historic town of St. Michaels, a nostalgic drive along the Eastern Shore to Annapolis for its colonial architecture, and
    an annual pilgrimage to Washington, D.C.’s national museums, meticulously planning each outing using online research to maximize cultural immersion within their modest travel budget.
  culinary: Eric Bass relishes preparing crab cakes seasoned with Old Bay, steaming freshly caught blue crabs, and cooking garden harvests like heirloom tomatoes and sweet corn into simple stews, while
    occasionally indulging in a bottle of Maryland’s sparkling apple cider for special gatherings they host.
  core: Eric Bass, a pragmatic 66‑year‑old retiree, blends steadfast self‑reliance, quiet curiosity, and a subtle competitive streak in DIY projects while maintaining a frugal, health‑focused lifestyle
    rooted in Chesapeake Bay traditions they cherish.
background:
  cultural: Eric is a white American who grew up in the rural-suburban communities of Calvert County, Maryland. His family's roots trace back to early English settlers on the Eastern Shore, and the region's
    maritime and agricultural traditions have shaped his values of self-reliance and respect for the land and water. He was raised in a modest Methodist household that emphasized hard work, community service,
    and modest celebrations of local holidays. The Chesapeake Bay's fishing culture, local fairs, and county-wide historic preservation events have been a constant backdrop to his life, influencing both
    his practical skills and his appreciation for preserving local heritage.
