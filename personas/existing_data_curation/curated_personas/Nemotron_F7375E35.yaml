  career_goals: Although retired, Eric aims to stay independent and purposeful. He plans to mentor younger neighbors in basic home-maintenance skills, document his family's fishing and gardening traditions
    in a small memoir, and contribute to the local historical society's oral-history project. He also hopes to expand his modest side-business offering occasional handyman services for fellow retirees,
    and to preserve his health through regular outdoor activity and community involvement.
