persona_description: A researcher and inventor who specializes in the study of soft-robotic systems, particularly those that use decentralized sensory information sharing. She has a background in fluid
  dynamics, system theory, and machine learning, and has worked on projects related to droplet interactions and the design of optimal controllers for spatially distributed systems. She is interested in
  bridging the gap between machine autonomy, systems theory, and organic intelligence, and is currently pursuing a two-year Schmidt Science Fellowship to further her research in this area.
