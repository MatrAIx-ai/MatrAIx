  hobbies: '[''Gardening'', ''Hiking'', ''Historical Fiction Reading'', ''Cooking Southern Cuisine'', ''Volunteering at Church Food Bank'', ''Quilting'', ''Attending Local Farmer’s Markets'', ''Genealogy
    Research'', ''Online Business Courses'']'
  career_goals: Martha aims to advance from first‑line supervisor to a district manager role within the next five years, overseeing multiple stores across the Mid‑Atlantic region. She seeks to implement
    standardized best‑practice frameworks that blend proven operational methods with innovative ideas, positioning the company for sustained growth. Long‑term, she aspires to become a regional director,
    shaping corporate strategy and mentoring the next generation of retail leaders. Concurrently, she is exploring the possibility of opening a boutique specialty shop that leverages her expertise in customer
    experience and community engagement.
