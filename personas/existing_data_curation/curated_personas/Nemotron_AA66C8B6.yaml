personas:
  professional: Roy Toney is a veteran industrial boiler engineer who leverages three decades of hands‑on maintenance, blueprint reading, and OSHA/EPA compliance expertise to streamline plant operations,
    while they keep junior technicians motivated through hands‑on mentorship despite occasionally misplacing paperwork due to a laid‑back approach to admin.
  sports: Roy Toney is a steadfast Atlanta Braves supporter who catches weekend games at the stadium when possible, cheers on high school football Fridays with the community, and participates in a local
    hunting club, though they rarely stick to a strict workout regimen beyond occasional fishing trips that double as low‑key cardio.
  arts: Roy Toney immerses in Southern classic rock and country, frequently playing Lynyrd Skynyrd and Johnny Cash on the old record player while they craft wooden tables at the woodworking club, turning
    each piece into a functional artwork that reflects the rhythms of the Ogeechee River and the local church choir.
  travel: Roy Toney prefers relaxed, road‑trip style vacations that blend fishing excursions in the Florida Keys with cultural stops at Savannah’s historic squares, savoring spontaneous detours over rigid
    itineraries, yet they dream of visiting Patagonia for a once‑in‑a‑lifetime trout fly‑fishing adventure.
  culinary: Roy Toney loves Southern barbecue, mastering smoked pork shoulder with a dry rub of brown sugar, paprika, and mustard, pairing it with collard greens cooked with smoked turkey, and they are
    adept at grilling on a charcoal kettle, though they occasionally over‑season dishes in pursuit of that perfect flavor punch.
  core: Roy Toney is a pragmatic, community‑oriented boiler veteran who counters work‑related worries with fishing, barbecue, and a habit of misplacing their maintenance log, yet they always greet every
    challenge with a warm smile.
background:
  cultural: Roy was raised in the modest, tight‑knit community of Springfield, Georgia, within a family that values Southern hospitality, church involvement, and a strong work ethic. His white Southern
    heritage influences his appreciation for local traditions such as community barbecues, high school football Fridays, and church potlucks. He identifies with the region’s emphasis on personal responsibility,
    friendliness, and a deep respect for the land, reflected in his love for fishing, hunting, and outdoor recreation. While embracing these cultural roots, Roy also stays open to broader perspectives through
    his work in industrial engineering and his youthful social circle.
