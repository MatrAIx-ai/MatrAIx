  career_goals: As he approaches retirement, Roy aims to attain the Certified Plant Engineer (CPE) credential and transition into a senior supervisory role where he can mentor the next generation of technicians.
    He is interested in expanding his knowledge of renewable‑energy integration, particularly solar‑thermal augmentation of boiler plants, and hopes to lead a pilot project at his facility. Ultimately,
    he wishes to secure a stable, well‑pensioned position that allows him to leave a legacy of safety and operational excellence for his colleagues and the community.
