persona_description: A medical oncologist who specializes in the treatment and management of salivary gland tumors, particularly acinic cell carcinoma (ACC). She has extensive knowledge and experience in
  the diagnosis, treatment, and follow-up of patients with ACC, as well as in the development of new treatments and therapies for this rare and complex tumor. She is known for her expertise in the use of
  surgery, radiation therapy, and chemotherapeutic agents to treat ACC, as well as for her role in the development of tumor molecular profiling and the initiation of clinical trials for patients with ACC.
