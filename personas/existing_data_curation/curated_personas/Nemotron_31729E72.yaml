personas:
  professional: Myrtle Deeb, a budding concept artist and aspiring visual designer, leverages a disciplined, methodical workflow—honed through competitive chess and meticulous note‑taking—to blend traditional
    sketching, watercolor, and digital illustration using Procreate and Photoshop, while channeling an imaginative curiosity into speculative storyboards aimed at video game studios.
  sports: Myrtle Deeb, an enthusiastic weekend hiker and competitive chess player, joins the local Rocky Mountain Trail Club for monthly treks through the foothills, follows the Colorado Avalanche and Denver
    Broncos for a dose of team spirit, and incorporates a concise interval‑training routine to balance endurance with the mental stamina required for chess tournaments.
  arts: Myrtle Deeb, a passionate visual storyteller, draws inspiration from the vibrant colors of James Gurney, the cinematic world‑building of Hayao Miyazaki, and the dynamic digital brushwork of Ross
    Tran, regularly attends openings at the Colorado Springs Museum of Contemporary Art, and curates a personal blog where they publish original illustrations, speculative flash fiction, and reflections
    on abstract concepts.
  travel: Myrtle Deeb, an adventure‑leaning yet budget‑savvy teen, plans meticulous day‑trips to nearby destinations like Rocky Mountain National Park, Breckenridge, and the historic towns of Durango, while
    dreaming of a future art‑focused pilgrimage to Kyoto, balancing detailed itinerary spreadsheets with spontaneous sketch‑breaks at scenic overlooks.
  culinary: Myrtle Deeb, a curious home chef, blends a love for fresh, vibrant flavors by crafting avocado‑toast topped with feta and cherry tomatoes, mastering a quick miso‑ramen recipe for rainy evenings,
    and experimenting with homemade pesto pasta using basil, pine nuts, and Parmesan, all while keeping a pantry stocked with quality watercolor‑grade sketch pencils for creative plating.
  core: Myrtle Deeb, a 16‑year‑old concept‑art prodigy, balances meticulous organization with boundless imagination, channeling competitive drive into chess, hiking, and nightly sketch marathons, all while
    managing a modest budget and occasional sleep‑deprived indulgences.
background:
  cultural: Myrtle comes from a white, multi‑generational European‑American family—primarily German and Italian ancestry—raised in the suburban environment of Aurora, Colorado. Her upbringing reflects typical
    middle‑class Mid‑American values, with celebrations of holidays such as Thanksgiving, Christmas, Easter, and occasional ethnic traditions like St. Patrick's Day. Growing up near Denver's vibrant arts
    scene and the Colorado outdoors, she blends a love for communal cultural events (local art fairs, community theater) with a deep appreciation for the region's natural landscape. While she identifies
    with mainstream American culture, her daily life is enriched by the diverse neighboring communities of Arapahoe County, shaping an inclusive yet personally grounded worldview.
attributes:
  skills: '[''digital illustration (Procreate, Photoshop)'', ''traditional sketching and watercolor'', ''creative writing (short stories, poetry)'', ''basic Python programming for generative art'', ''critical
    thinking and debate'', ''chess strategy'', ''project planning and time management'', ''piano (intermediate)'']'
  hobbies: '[''digital drawing and painting'', ''creative writing (fantasy, sci‑fi)'', ''chess'', ''hiking and exploring nature'', ''playing piano'', ''generative art coding'', ''attending art workshops
    and local galleries'', ''watching sci‑fi movies'', ''curating a personal blog for art and thoughts'']'
  career_goals: Myrtle aims to complete her high school education (through a GED or alternative pathway) and earn a place at a specialized art institute where she can refine her illustration and concept‑art
    skills. She envisions a career as a professional concept artist or visual designer for video games, animation studios, or interactive media companies. Building a strong portfolio, winning youth art
    competitions, and showcasing work in local galleries are short‑term milestones. Long‑term, she hopes to blend her analytical mindset with her creative talents to lead innovative visual storytelling
    projects, possibly as a freelance illustrator or creative director, while continuing to explore the intersection of art, technology, and abstract ideas.
