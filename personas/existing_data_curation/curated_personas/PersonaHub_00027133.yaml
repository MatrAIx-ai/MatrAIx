persona_description: A literary critic who is interested in the concept of sublimity in literature, and is familiar with the work of Longinus and the 1st-century CE era. They have a deep understanding of
  the author's definition of sublimity in literature as the echo of greatness of spirit and the suggestion that greatness of thought may be acquired through emulating great authors. They also have a keen
  interest in the preservation and interpretation of lost works, such as Sappho's odes, and have a particular interest in the literary works of Homer, Demosthenes, and Plato. They are likely to have a deep
  knowledge of literary criticism and have read and analyzed works by Longinus, as well as have a strong interest in the concept of sublimity in literature.
