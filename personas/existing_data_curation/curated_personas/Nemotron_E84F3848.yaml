  hobbies: '["Painting", "Photography", "Acoustic guitar playing", "Reading science‑fiction and fantasy novels", "Escape rooms", "Strategy board games (e.g., Catan, Pandemic)", "Basketball", "Hiking", "Community
    theater set design volunteering", "Mindfulness meditation", "Yoga", "Journaling"]'
  career_goals: Richard aims to advance to the rank of sergeant within the next four years and ultimately become a lieutenant, steering his precinct toward a model of innovative community policing. He plans
    to pursue a bachelor’s degree in criminal justice and specialized certifications in behavioral analysis and digital forensics, allowing him to lead a specialized investigative unit. Passionate about
    integrating art and youth engagement into public safety, he intends to launch a city‑wide youth arts program that uses creative workshops to deter crime and strengthen community bonds. Additionally,
    he seeks to develop a peer‑support and resilience training curriculum for officers to address stress and mental‑health challenges, positioning himself as a leader in both operational excellence and
    officer welfare.
