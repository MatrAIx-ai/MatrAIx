personas:
  professional: Cheyenne Donahue is a veteran hospitality manager with over twenty years of expertise in day-to-day hotel operations, front-desk oversight, OPERA and Maestro reservation systems, and crisis
    response, channeling their curiosity into testing service concepts while their practical streak keeps budgets tight and staff coordination smooth.
  sports: Cheyenne Donahue enjoys low-key fitness like weekend hikes with the Ozark Trail Association, follows the Oklahoma City Thunder for basketball thrills, joins a local community softball league in
    spring, and fits occasional yoga sessions to counterbalance their woodworking-induced back tension.
  arts: Cheyenne Donahue finds creative release in reviving vintage furniture while sipping live-jazz at a downtown Oklahoma café, where the repertoire often includes Miles Davis, Norah Jones, and the local
    Midnight Quartet, and they unwind with historical fiction by Ken Follett and true-crime narratives by Sonia Purnell.
  travel: Cheyenne Donahue prefers spontaneous, solo road trips that weave through the winding roads of the Ouachita and Ozark regions, snapping 35mm film of sunrise vistas, while dreaming of future visits
    to Marfa’s art installations and the vineyards of Napa Valley when the inn’s finances allow.
  culinary: Cheyenne Donahue cultivates heirloom tomatoes, purple carrots, and sweet corn in a modest backyard garden, then transforms them into a rustic grilled corn salad with fresh basil, lime‑juice
    vinaigrette, and a dollop of homemade goat‑cheese spread, proudly serving the dish at their inn’s breakfast table.
  core: Cheyenne Donahue blends a pragmatic hospitality mind with an adventurous, solitary spirit, often juggling vintage camera rolls, garden beans, and a fierce dislike for tight schedules.
background:
  cultural: Cheyenne comes from a multi‑generational white Midwestern family with roots in German and Irish ancestry. She was raised in a small town near Tulsa, where community values, self‑reliance, and
    a strong work ethic were emphasized. Her upbringing combined Midwest practicality with Southern hospitality, shaping her approach to both personal interactions and professional service. Though she identifies
    with the cultural traditions of the heartland—such as local festivals, church gatherings, and regional cuisine—she maintains an independent outlook shaped by her separation and a lifelong curiosity
    about new ideas.
attributes:
  skills: '[''Hotel operations management'', ''Front‑desk and reservations systems (OPERA, Maestro)'', ''Budgeting and cost control'', ''Vendor negotiation and contract management'', ''Crisis and emergency
    response'', ''Staff scheduling and training'', ''Guest relations and complaint resolution'', ''Data‑driven occupancy analysis'', ''Local tourism knowledge'', ''Marketing and online presence management'']'
  hobbies: '[''Spontaneous road trips to scenic Oklahoma and Arkansas locales'', ''Landscape and architectural photography'', ''Gardening (heirloom vegetables and herbs)'', ''Reading historical fiction
    and true‑crime novels'', ''DIY home‑improvement and woodworking'', ''Attending small‑group live‑music events (jazz and folk)'']'
  career_goals: Cheyenne aims to transition from managing a single property to overseeing a small portfolio of boutique inns across Oklahoma, leveraging her practical insights to standardize high‑service
    standards while allowing each location its unique local flavor. She is interested in incorporating sustainable practices—such as energy‑efficient upgrades and locally sourced amenities—into her properties.
    A long‑term ambition is to open her own family‑run inn that blends historic Oklahoma architecture with modern comforts, where she can mentor emerging hospitality professionals and foster a competitive
    yet collaborative culture.
