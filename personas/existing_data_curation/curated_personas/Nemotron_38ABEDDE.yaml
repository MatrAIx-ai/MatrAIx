  arts: Joseph Kemph, a creative LEGO builder and avid fan of sci‑fi animation, spends evenings watching Pixar films like 'Wall‑E' and listening to Imagine Dragons, and they sketch futuristic vehicle designs
    that fuel their imagination for robotics projects.
  travel: Joseph Kemph, whose desert explorations with family have taken them to Red Rock Canyon and Joshua Tree National Park, dreams of visiting the Kennedy Space Center in Florida and the Natural History
    Museum in London to deepen their fascination with geology and space.
  culinary: Joseph Kemph, who occasionally helps in the kitchen, loves assembling customizable tacos with ground beef, cilantro, and lime, enjoys cooking spaghetti with meatballs for the family, and they
    delight in snack‑time rock‑shaped gummy candies that echo their rock‑collecting hobby.
  core: Joseph Kemph is a calm, methodical ten‑year‑old who blends a curiosity for engineering with a love of LEGO, soccer, and quiet reflection, often balancing structured projects with spontaneous desert
    adventures.
