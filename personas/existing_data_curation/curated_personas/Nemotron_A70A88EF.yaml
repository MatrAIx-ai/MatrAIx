  career_goals: Max aims to transition from frontline courier work to a supervisory role within the next three years, leveraging his deep knowledge of local routes and logistics to lead a team of drivers.
    He plans to complete a certification in supply-chain management at a community college, which will equip him with advanced inventory and fleet-management skills. Ultimately, Max envisions starting his
    own small courier service that specializes in handling high-value and artistic items, combining his logistical expertise with his passion for the arts. He also hopes to mentor younger employees, fostering
    a collaborative and harmonious work environment.
