personas:
  professional: Max Rojas, a veteran courier with over two decades mastering Dallas‑Fort Worth routes, leverages meticulous planning, real‑time navigation, and a friendly, community‑oriented demeanor to
    guarantee on‑time deliveries while cultivating repeat client trust.
  sports: Max Rojas, who plays forward for the Irving Community Basketball League, cheers on the Dallas Mavericks during NBA season, follows the Texas Rangers in the summer, and joins weekend hikes with
    the North Texas Trail Club, maintains fitness through daily road‑warm‑ups and occasional CrossFit classes.
  arts: Max Rojas, an avid patron of the Dallas Museum of Art and regular attendee of Deep Ellum concerts featuring Leon Bridges and St. Vincent, immerses themselves in street‑photography of urban murals
    and leads art‑based after‑school workshops, letting the city's multicultural vibe shape their aesthetic sensibility.
  travel: Max Rojas, who favors spontaneous weekend road trips to Hill Country vineyards and annual cultural pilgrimages to Oaxaca, balances a modest travel budget with a love for discovering off‑the‑beaten‑path
    art districts, and dreams of an immersive stay in Marrakech’s medina to photograph bustling souks.
  culinary: Max Rojas, an intermediate home chef who delights in slow‑smoked brisket tacos, homemade guacamole with fresh cilantro and chipotle, occasional sushi rolls featuring tuna and avocado, and experiments
    with truffle oil and cumin, often explores food halls like Legacy West for diverse palate experiences.
  core: Max Rojas, the ever‑curious courier who alternates between meticulous route mapping and impulsive camera‑gear splurges, blends a community‑first mindset with a relentless appetite for art, food,
    and new experiences.
background:
  cultural: Max comes from a White, Anglo-American background with family roots in the Midwest and the South. Raised in a suburban neighborhood of Irving, Texas, he grew up in a culturally diverse environment
    that exposed him to a blend of American traditions, Mexican-influenced cuisine, and a thriving local arts scene. His upbringing emphasized hard work, community involvement, and respect for different
    cultures, shaping his cooperative and harmonious nature. While he identifies with mainstream American values, Max’s daily life reflects the multicultural tapestry of Dallas County, from celebrating
    holidays with neighbors of varied backgrounds to supporting local cultural festivals.
attributes:
