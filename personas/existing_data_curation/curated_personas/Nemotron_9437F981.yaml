  career_goals: Although retired from formal employment, Joshua remains purpose‑driven. He aims to continue mentoring future engineers through local workshops and senior‑college partnership programs, document
    his life story and engineering experiences in a memoir for his grandchildren, and serve on the board of the Sterling Heights Historical Society. He also aspires to stay physically active, maintain his
    health to enjoy family gatherings, and contribute his organizational abilities to charitable initiatives in his community.
