persona_description: A researcher and conservationist who specializes in the study of food tree species, particularly Blighia sapida (ackee). They are interested in developing low-cost vegetative propagation
  techniques, improving the processing, storage, and packaging of arils, determining the number of viable populations in protected natural areas, investigating the impact of bark harvest on the viability
  of populations, and developing ex situ conservation methods. They are also interested in determining genetic variation in drought tolerance and location of important sources of variation, genetic variation
  in tree growth and fruit production, and pollinator species, investigating effective pollen flow and determining threats to pollinator species, investigating effectiveness of seed dispersal and degree
  of dependence on fauna that are rare or threatened, and determining effective population sizes in seminatural farmland populations and minimum viable populations for conservation and long-term sustainable
  use.
