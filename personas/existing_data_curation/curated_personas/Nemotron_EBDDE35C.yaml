personas:
  professional: Sarena Lee is a retired administrative professional who leverages her organized, methodical mindset to coordinate senior‑center events, manage the finances of a community garden project,
    and lead a technology workshop for older adults, always balancing curiosity about new tools with pragmatic solutions and a calm, assertive advocacy when needed.
  sports: Sarena Lee enjoys daily walks along the Columbia River trail, seasonal moderate hikes in the Gorge, and occasionally cheers on the Portland Trail Blazers and Timbers with the local senior sports
    club, blending low‑impact exercise with community camaraderie.
  arts: Sarena Lee is an active participant in community theater productions, a book‑club facilitator who favors historical fiction like "The Nightingale" and biographies of social pioneers, and a dedicated
    knitter who creates charity blankets while listening to folk legends such as Joan Baez.
  travel: Sarena Lee plans structured trips to the Columbia River Gorge and the Oregon Coast, prioritizing nature photography opportunities and senior‑friendly itineraries, while also dreaming of a week‑long
    tour of historic coastal towns like Astoria and a spring visit to the Japanese garden in Portland when budget allows.
  culinary: Sarena Lee delights in cooking garden‑fresh ratatouille, herb‑infused salmon, and marionberry crumble, skillfully using rosemary, thyme, and locally sourced pantry staples, though they occasionally
    indulge in rich chocolate cake for book‑club celebrations.
  core: Sarena Lee blends a lifelong curiosity with disciplined pragmatism, turning garden experiments, community service, and quiet reading into a purposeful, well‑organized tapestry of senior life.
background:
  cultural: Sarena Johnson Lee is a white American of English and Irish ancestry whose upbringing in the Midwest during the post‑World War II era instilled values of self‑reliance, modesty, and community
    service. Relocating to the Pacific Northwest in the early 1970s, she embraced the region’s strong environmental ethic, outdoor lifestyle, and progressive civic culture. Her family traditions include
    celebrating Thanksgiving, Christmas, and the Fourth of July, while also participating in local Oregon events such as the Portland Rose Festival and Gresham’s Riverfront Festival. Over the decades, Sarena
    has witnessed and supported social changes—from the women’s liberation movement to increased awareness of environmental conservation—shaping a worldview that balances respect for tradition with openness
    to new ideas. Her marriage of over fifty years and close relationships with children and grandchildren further reinforce a multigenerational perspective that values both familial bonds and community
    involvement.
