  hobbies: '["Gardening (vegetable and flower)", "Birdwatching", "Reading (historical fiction, biographies, gardening books)", "Knitting and crocheting", "Hiking in Columbia River Gorge", "Cooking farm‑to‑table
    meals", "Volunteering at senior center", "Leading a book club", "Attending community theater"]'
  career_goals: Although retired from formal employment, Sarena remains driven by a desire to contribute meaningfully to her community and to continue personal growth. She aims to spearhead the creation
    of a sustainable neighborhood garden that provides fresh produce for seniors and educational workshops on urban farming. She hopes to expand the senior technology club she volunteers with, offering
    structured classes that empower older adults to use digital tools confidently. Sarena is also passionate about preserving Gresham’s local history; she plans to compile oral histories from longtime residents
    and assist the historical society in curating an exhibit. On a personal level, she aspires to travel to the Columbia River Gorge and the Oregon Coast, to develop her skills in nature photography, and
    to complete a memoir that interweaves family genealogy with reflections on the social changes she has witnessed.
