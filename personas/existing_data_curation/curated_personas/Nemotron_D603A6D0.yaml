    programming", "Gardening", "Family cooking", "Library volunteer organizing"]'
  career_goals: Mary aspires to pursue a career in environmental science or wildlife biology, focusing on the conservation of Georgia’s forests and waterways. She plans to attend a STEM‑focused high school,
    earn a degree in environmental studies, and eventually work with the Georgia Department of Natural Resources or as a park ranger. In the meantime, she aims to lead a school‑wide recycling initiative
    and organize community nature walks, blending her curiosity with practical action.
