personas:
  professional: Mary Collins, a budding junior naturalist and avid citizen‑scientist, blends meticulous rock‑cataloguing with interactive Scratch storytelling to explore ecology, turning weekend hikes into
    data‑rich field projects for her school’s science club.
  sports: Mary Collins enjoys hiking the Dahlonega trails, participates in the middle‑school cross‑country team, cheers for the Atlanta Braves and Atlanta Hawks, and volunteers with the local Girl Scouts
    hiking crew, preferring low‑impact endurance activities over team sports.
  arts: Mary Collins channels her creative spark into Scratch interactive stories, sketches detailed bird illustrations, and listens to folk artists like the Avett Brothers and the local Chestnut Ridge
    Players, regularly attending the Dahlonega Playhouse’s community‑theatre nights.
  travel: Mary Collins favors planned nature getaways, having camped in the Chattahoochee National Forest, visited the Great Smoky Mountains, and dreamed of exploring Yellowstone’s geysers, always mapping
    routes in her nature journal before each trip.
  culinary: Mary Collins loves helping cook Southern comfort meals, especially sweet‑potato biscuits, peach cobbler, and chili simmered with locally foraged mushrooms, and enjoys experimenting with wild
    honey and heirloom tomatoes from the family garden.
  core: Mary Collins is a methodical, nature‑obsessed pre‑teen who balances quiet curiosity with a disciplined routine, often cataloguing rocks while humming folk tunes, yet secretly hoards glittering minerals
    despite a tight allowance.
background:
  cultural: Mary was born and raised in Dahlonega, White County, Georgia, a region that blends Appalachian foothill traditions with contemporary Southern values. Her family has deep roots in the area, with
    stories of the historic gold‑rush era and a close relationship to the nearby Chattahoochee National Forest. Community life revolves around local schools, church gatherings, county fairs, and environmental
    stewardship projects, all of which have emphasized self‑reliance, respect for nature, and service to others. These influences have nurtured Mary’s pragmatic curiosity, organized approach to tasks, and
    preference for small, supportive social circles while fostering an appreciation for the natural landscape of her region.
attributes:
  skills: '["Organizational planning", "Project scheduling", "Scientific observation", "Basic programming (Scratch)", "Pet care", "Garden maintenance", "Research and fact-checking", "Puzzle solving"]'
