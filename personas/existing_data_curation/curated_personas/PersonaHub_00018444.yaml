persona_description: A historian or researcher who is passionate about the history of the Underground Railroad and its impact on the abolitionist movement. They are interested in the detailed documentation
  and artifacts related to the movement, particularly those housed at the New-York Historical Society. They are likely to be familiar with the history of slavery and resistance, and have a keen interest
  in understanding the complex relationships between the Underground Railroad and the broader abolitionist movement. They may have a background in social sciences or history, and are interested in using
  the N-YHS' collection to deepen their understanding of the Underground Railroad's history.
