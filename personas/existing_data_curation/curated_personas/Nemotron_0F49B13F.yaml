    ''attending community festivals'']'
  career_goals: Suzanne dreams of turning her love for art and technology into a career as a multimedia artist or graphic designer. She hopes to attend a specialized high‑school art program, earn a scholarship
    to study visual communication or animation in college, and eventually create digital illustrations for video games or animated films. In the short term, she wants to win regional art competitions, build
    a portfolio of her digital work, and volunteer to lead youth art workshops in her community, combining her sociable spirit with her organizational skills.
