personas:
  professional: Suzanne Fletcher is a budding digital artist and junior robotics enthusiast who channels their curiosity and methodical planning into sketching characters, creating interactive stories on
    Scratch, and designing simple mechanisms for their school’s robotics club, all while confidently presenting ideas to their student council peers.
  sports: Suzanne Fletcher thrills in weekend soccer matches with the local Girls’ Soccer League, follows the Dallas Cowboys and FC Dallas with fervor, and channels the high‑energy beats of hip‑hop dance
    into cardio workouts, while keeping a disciplined training log that reflects their organized and competitive spirit.
  arts: Suzanne Fletcher immerses themselves in the works of Vincent van Gogh and contemporary street artist Banksy at the Dallas Museum of Art, draws inspiration from Billie Eilish, Mumford & Sons, and
    The Beatles for their sketchbook characters, and passionately shares weekly art critiques with friends, using their outgoing nature to lead collaborative drawing sessions.
  travel: Suzanne Fletcher dreams of exploring the historic streets of London’s British Museum and the vibrant markets of Mexico City, while cherishing past family trips to the Dallas Zoo, the Space Center
    Houston, and a weekend getaway at the Texas Hill Country’s Enchanted Rock, always planning itineraries with a blend of structured research and spontaneous art‑inspired detours for themselves.
  culinary: Suzanne Fletcher enjoys crafting homemade tacos with cilantro, lime, and grilled chicken, experiments with rainbow fruit smoothies featuring mango and strawberries, and is mastering the art
    of quick stir‑fry noodles, though their tendency to leave a trail of splattered paint on the kitchen counter reveals a quirky blend of creativity and mess.
  core: Suzanne Fletcher is an energetic, organized 12‑year‑old whose curiosity drives a love for digital art, robotics, and hip‑hop, yet they often juggle a chaotic stack of sketchbooks and a habit of
    staying up late to perfect their latest creation.
background:
  cultural: Suzanne was raised in Garland, Texas, a suburb of Dallas that blends Southern hospitality with a vibrant, multicultural urban atmosphere. Her family is of Anglo‑American descent with Midwestern
    roots and practices a moderate Protestant faith that emphasizes community involvement and education. Texas culture influences her love for community events like county fairs, barbecues, and occasional
    Tex‑Mex meals with friends. Exposure to Dallas County's diverse neighborhoods has broadened her appreciation for different artistic traditions and languages, fostering an open‑minded outlook that aligns
    with her curiosity and sociable nature.
