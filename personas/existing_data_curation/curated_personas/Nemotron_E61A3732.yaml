  hobbies: '["Visiting local museums and galleries", "Sketching and watercolor painting", "Landscape photography on hikes", "Reading art history and philosophy books", "Gardening herb and flower beds",
    "Solo hiking on regional trails", "Yoga and meditation", "Crossword puzzles and Sudoku", "Baking pastries", "Listening to classical and jazz music"]'
  career_goals: Shirley aims to advance to a senior bookkeeping or accounting supervisor role within the next three years, pursuing the Certified Bookkeeper (CB) credential to formalize her expertise. Long‑term,
    she aspires to combine her financial acumen with her passion for the arts by securing a finance position at a nonprofit gallery or museum, or by launching a freelance bookkeeping service that caters
    to artists and small creative businesses. She values flexibility, so any step toward more autonomous work schedules—such as remote bookkeeping or part‑time consulting—is a priority. She also hopes to
    reduce stress by mastering time‑management techniques and eventually completing a community college associate degree in accounting.
