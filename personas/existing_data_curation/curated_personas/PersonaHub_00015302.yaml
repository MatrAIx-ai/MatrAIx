persona_description: A high school teacher who is passionate about teaching students about health and wellness. This individual is knowledgeable in the field of health education and has experience teaching
  students in a high school setting. They have a deep understanding of the National Health Education Standards and the Mississippi Contemporary Health (K-8) Framework, and they are dedicated to promoting
  health literacy and healthy behaviors among their students. They are skilled in developing hands-on experiences and classroom activities that help students acquire the knowledge, attitudes, and skills
  necessary for making health-promoting decisions, achieving health literacy, adopting health-enhancing behaviors, and promoting the health of others.
