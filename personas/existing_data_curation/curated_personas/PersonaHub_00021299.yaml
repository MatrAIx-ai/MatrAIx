persona_description: A mechanical engineer who specializes in the design and analysis of aerospace structures, civil engineering structures, and periodic structures used for health monitoring. They have
  experience with friction-stir-welding, reinforced concrete beams, and slabs, and have conducted experiments on the guided wave propagation through corrugated plates with periodic boundaries, comparing
  experimental results with theoretical predictions. They have published a paper in the Journal of the Acoustical Society of America in 2006, demonstrating the ability to accurately model the elastic wave
  propagation in slightly corrugated plates.
