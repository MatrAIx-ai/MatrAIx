  hobbies: '[''Sketch-journaling'', ''Digital painting'', ''Visiting galleries and murals'', ''Photography'', ''Reading speculative fiction and poetry'', ''Journaling for mental health'', ''Listening to
    indie and Mexican folk music'', ''Hiking in Riverside County'', ''Baking traditional Mexican pastries'', ''Maintaining an art blog'']'
  career_goals: Maria aims to enroll in a local community college’s art program to build a formal portfolio and then transfer to a four‑year university for a Bachelor of Fine Arts. Her ambition is to become
    a professional concept artist for video games or an independent comic‑book creator, leveraging her Mexican cultural heritage to develop distinctive visual storytelling. She plans to build a freelance
    illustration business, secure commissions for murals that blend modern abstract styles with traditional Mexican motifs, and eventually curate a community exhibition that celebrates Mexican‑American
    art. Achieving a reputable platform will allow her to support herself financially and give back to her family.
