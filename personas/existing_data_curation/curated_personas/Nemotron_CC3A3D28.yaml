  hobbies: '[''Gardening (sustainable methods)'', ''Cooking & Recipe experimentation (Latin American cuisine)'', ''Reading historical fiction and genealogy'', ''Latin dance classes'', ''Volunteering at
    community literacy program'', ''Knitting'', ''Walking in nature parks'']'
  career_goals: Although currently not in the formal workforce, Rosilla aims to deepen her impact on the local community by leading a senior‑center gardening program and obtaining a certification in elder
    care. She hopes to mentor younger volunteers, especially those from Hispanic backgrounds, sharing her organizational expertise and cultural insights. Long‑term, she envisions launching a small home‑based
    catering service that showcases traditional family recipes, while completing the remaining coursework toward an associate degree in nonprofit management.
