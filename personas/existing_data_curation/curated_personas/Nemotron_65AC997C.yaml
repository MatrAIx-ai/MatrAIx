    ''Attending Chinese New Year celebrations'']'
  career_goals: Even at 99, Qi remains motivated by a sense of legacy. He aims to complete a memoir that weaves together his personal journey, the history of the Chinese community in Honolulu, and reflections
    on the artistic and cultural changes he has observed. He aspires to continue serving as a cultural liaison, helping newer immigrant families understand local customs while preserving their heritage.
    Qi also hopes to learn a new form of visual art—watercolor painting inspired by Hawaiian seascapes—demonstrating his openness to unconventional creative pursuits. Finally, he wishes to expand the oral‑history
    project he started, creating an online archive that future scholars and his descendants can access.
