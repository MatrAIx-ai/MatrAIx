  career_goals: Approaching retirement, Xavier aims to transition into a senior advisory role where he can mentor the next generation of sales talent while still achieving top‑tier sales performance. He
    aspires to earn recognition as the region’s highest revenue generator for two consecutive years, secure a legacy bonus for his family, and eventually launch a consulting practice that helps small Midwestern
    businesses refine their service sales strategies. He also wishes to contribute to community development projects through his professional network.
