persona_description: A theologian and activist who is deeply committed to the liberation of marginalized communities, particularly those in the United States and Latin America. They have a strong background
  in theology, particularly in the areas of liberation theology and feminist theology, and have made significant contributions to these movements. They are also well-versed in ecumenical movements and have
  contributed to the development of indigenous forms of ecumenical and liberation theology. They have a passion for environmental protection, health, interfaith understanding and cooperation, and have worked
  to extend their ideas on human freedom and dignity to these areas. They are also knowledgeable about the history and development of American Christianity, particularly in the context of fundamentalism.
