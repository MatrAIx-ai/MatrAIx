  career_goals: Although retired, Mabel aims to remain an active pillar of her Cullman community. She aspires to lead a senior craft club, mentor younger volunteers at the senior center, and preserve local
    heritage by compiling oral histories and a family‑recipe collection for a community cookbook. She also hopes to write a memoir reflecting her life in small‑town Alabama, stay connected with her grandchildren
    through video calls and social media, and remain physically healthy enough to enjoy short road trips to nearby historic sites and family gatherings.
