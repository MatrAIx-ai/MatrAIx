  career_goals: Geralyn aims to become a store manager within the next two years, leveraging her curiosity for retail technologies and her practical approach to operations. She plans to complete a bachelor's
    degree in Business Administration, earn a retail management certification, and deepen her expertise in data‑driven decision making. Long‑term, she envisions progressing to a district manager role or
    moving into corporate training for retail staff, with an eventual ambition to open her own boutique that blends curated fashion with innovative e‑commerce solutions, all while maintaining a flexible
    work‑life balance.
