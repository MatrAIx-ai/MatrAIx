persona_description: A state official or professional involved in highway safety, specifically focusing on implementing and overseeing the Strategic Highway Safety Plan (SHSP) in Illinois. This person likely
  has a background in engineering, safety engineering, or transportation and has experience in designing and implementing safety programs to reduce fatal and serious injury crashes on Illinois roadways.
  They are knowledgeable in data-driven strategies, traffic operations, and emergency response, and have a strong understanding of the SHSP's ten emphasis areas and how they can be implemented to improve
  road safety performance. They are also likely to have a strong focus on reducing fatalities and life-altering injuries on Illinois roadways, and have a desire to continuously improve and enhance their
  work.
