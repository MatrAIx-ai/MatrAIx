personas:
  professional: George Davis is a budding young engineer who spends hours constructing LEGO models, meticulously following instruction manuals, and dreams of designing space rockets after reading picture
    books about the cosmos.
  sports: George Davis enjoys organized play with the local San Bernardino Kids Soccer Club, cheered on by their family during weekend matches, and they idolize the Los Angeles Dodgers, often mimicking
    baseball drills after school to stay active during the spring.
  arts: George Davis delights in drawing dinosaurs with crayon sets, listening to the whimsical tunes from Disney’s 'Frozen' soundtrack, and watching Pixar’s 'Finding Nemo', which together shape their imaginative
    storytelling during playtime.
  travel: George Davis loves short family getaways, having explored the desert trails of Joshua Tree, the excitement of Disneyland’s Main Street, and the historic ships at San Diego Bay, preferring trips
    that fit the school calendar and end with a familiar bedtime routine.
  culinary: George Davis prefers simple, kid‑friendly meals like buttery macaroni and cheese, chicken nuggets with honey mustard, and builds his own tacos with shredded lettuce, cheese, and mild salsa,
    often proudly assembling the ingredients on the kitchen counter.
  core: George Davis blends a love for orderly LEGO construction with a steadfast allowance‑saving habit, a keen eye for dinosaur sketches, and a reliable routine that turns every day into a predictable
    adventure.
background:
  cultural: George comes from a white, middle‑class family living in San Bernardino, California. His upbringing reflects typical suburban American culture, with participation in school activities, celebration
    of national holidays such as Independence Day and Thanksgiving, and occasional exposure to the diverse community events of the Inland Empire region. The family's values emphasize routine, responsibility,
    and modest independence, which align with his personality traits.
attributes:
  skills: '[''Reading simple sentences'', ''Basic addition and subtraction'', ''Following step‑by‑step instructions'', ''Organizing personal belongings'', ''Puzzle solving'']'
  hobbies: '[''LEGO building'', ''Jigsaw puzzles'', ''Reading picture books'', ''Short nature walks'', ''Board games (checkers, Connect Four)'']'
  career_goals: George imagines a future where he designs and builds things, so he dreams of becoming an astronaut or a civil engineer. He is also fascinated by animals and sometimes mentions wanting to
    be a veterinarian. His aspirations reflect his love for structure, problem‑solving, and the idea of contributing to real‑world projects in a systematic way.
