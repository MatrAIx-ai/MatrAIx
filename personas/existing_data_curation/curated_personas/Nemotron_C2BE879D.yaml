  career_goals: Lloyd aims to advance within the Berkeley Fire Department by obtaining an EMT‑Paramedic certification and a Firefighter I/II specialist badge in hazardous‑material operations. Over the next
    five years he hopes to be promoted to fire captain, where he can lead a battalion and integrate data‑driven tools such as drone‑assisted scene assessments and predictive fire‑modeling software. He also
    aspires to develop a city‑wide fire‑prevention outreach program that blends his community‑focused personality with his curiosity for new safety initiatives, eventually positioning himself for a future
    role as a battalion chief or fire‑service administrator.
