personas:
  professional: Brett Sanders, a 20‑year‑old budding reliability engineer in training, blends hands‑on mechanic expertise with an artist’s eye for custom tooling, meticulously documenting each intervention
    and skeptically questioning conventional maintenance practices to craft data‑driven solutions that boost equipment uptime.
  sports: Brett Sanders, at 20, follows the Detroit Lions and the Chicago Blackhawks from the comfort of their apartment, participates in the local cycling club "Gearheads" for early‑morning rides, and
    prefers solitary strength‑training sessions at the gym where they meticulously log each lift.
  arts: In his early twenties, Brett Sanders draws artistic inspiration from the kinetic sculptures of Arthur Ganson, the industrial aesthetic of Bauhaus architect Walter Gropius, and the sci‑fi concept
    art of Syd Mead, while his playlist often spins the atmospheric soundscapes of Pink Floyd and the experimental electronica of Aphex Twin during late‑night metal‑patina projects.
  travel: Brett Sanders, a 20‑year‑old who prefers meticulously planned solo trips, has already toured the Deutsches Museum in Munich and the Henry Ford Museum in Dearborn, and they dream of a future expedition
    to Stuttgart’s automotive factories and Iceland’s geothermal geysers to study industrial steam in natural settings.
  culinary: At 20, Brett Sanders enjoys hearty, protein‑rich meals such as a perfectly seared ribeye steak with rosemary‑infused butter, smoky brisket seasoned with coffee grounds and brown sugar, and homemade
    ramen broth simmered with dashi, miso, and a splash of soy, while they often experiment with sous‑vide techniques and pair courses with craft IPAs featuring citrus hops.
  core: Brett Sanders merges meticulous mechanical precision with a vivid artistic imagination, thrives in solitary, detail‑focused environments, and channels a competitive, skeptical mindset into both
    their engineering pursuits and personal hobbies.
background:
  cultural: Brett grew up in Beverly, a historic coastal town in Essex County, Massachusetts, within a predominantly white, middle-class New England family. His upbringing reflects the region's traditional
    work ethic, emphasis on self-reliance, and appreciation for maritime and industrial heritage. Family gatherings often featured stories of early settlers and local shipbuilding, fostering a quiet reverence
    for craftsmanship. The local culture of modesty and practicality shaped his organized, reliable nature, while the proximity to Boston's vibrant arts scene exposed him to contemporary visual art and
    avant-garde aesthetics, fueling his imaginative side. Brett identifies with New England values of independence, community responsibility, and a measured, thoughtful approach to life.
attributes:
  skills: '[''Industrial machinery maintenance'', ''Hydraulic and pneumatic system troubleshooting'', ''Preventative maintenance scheduling'', ''Technical schematic interpretation'', ''CNC milling and lathe
    operation'', ''MIG/TIG welding'', ''Precision measurement and laser alignment'', ''Basic electrical diagnostics'', ''CAD modeling (SolidWorks)'', ''3D printing and rapid prototyping'', ''Maintenance
    documentation and inventory management'']'
  hobbies: '[''Scale model steam engine building'', ''3D printing and rapid prototyping'', ''Abstract mechanical sketching'', ''Metal art and welding projects'', ''Reading speculative fiction and philosophy'',
    "Puzzle solving (Rubik''s Cube, logic puzzles)", ''Arduino micro-controller programming'', ''Listening to ambient and experimental music'']'
  career_goals: Brett aims to become the lead reliability engineer for a cutting-edge manufacturing facility, leveraging his hands-on mechanic experience and growing analytical skills. He plans to complete
    his associate degree in mechanical engineering, earn certifications such as the Certified Maintenance & Reliability Professional (CMRP) and deepen his knowledge of data-driven predictive maintenance.
    Over the next five years, he hopes to lead a small team, improve equipment uptime by at least 15% through innovative maintenance strategies, and introduce custom-built tooling that blends functional
    engineering with artistic design. He approaches each improvement proposal with rigorous data analysis, often questioning established maintenance practices to ensure they meet his high standards. In
    the longer term, his ambition is to open his own boutique workshop where he can design and fabricate bespoke industrial equipment or artistic metal installations, merging his love for novelty, abstract
    concepts, and mechanical precision.
