persona_description: A historian who specializes in the study of medieval and early modern history, particularly the events and conflicts that took place in the Great Alföld region of Hungary and its surroundings
  during the 13th century. This historian is particularly interested in the impact of the Mongol invasions on the region and how they changed the landscape, leading to the transformation of the Alföld into
  a steppe region. This historian is also interested in the role of the Alföld in the history of Europe, as it was a major invasion route to Europe.
