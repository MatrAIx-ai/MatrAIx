persona_description: A psychologist who specializes in the study of forgiveness, particularly in its relationship with religious variables. She is interested in the cognitive and emotive uses of forgiveness
  in the treatment of anger, and the development of a forgiveness scale. Her research interests include the effects of forgiveness on health outcomes, the relationship between forgiveness and religious
  involvement, and the measurement of forgiveness in different populations. She is also interested in the role of religion in the healing paradox of forgiveness and the interaction effects in multiple regression.
