    ''Advanced Excel Modelling'', ''Public Speaking'', ''Team Leadership'', ''Event Planning'']'
  hobbies: '[''Cricket (playing and watching)'', ''Cooking Indian and fusion recipes'', ''Hiking in the Santa Cruz Mountains'', ''Exploring smart-home technology'', ''Attending tech and real-estate networking
    events'', ''Yoga and meditation'', ''Volunteering at community festivals and HOA events'', ''Photography (architectural)'']'
  career_goals: Juan aims to become a regional director of property management within the next five years, overseeing a portfolio of multifamily and mixed‑use assets across the Bay Area. He intends to earn
    the Certified Property Manager (CPM) credential and possibly pursue an MBA focused on real‑estate finance. He is driven to implement technology‑enabled sustainability programs that reduce energy consumption
    and enhance resident wellbeing. In the longer term, he dreams of launching his own boutique property‑management firm that blends data‑analytics, community‑centric services, and culturally inclusive
    practices, providing stable housing solutions for diverse families while fostering vibrant, harmonious neighborhoods.
