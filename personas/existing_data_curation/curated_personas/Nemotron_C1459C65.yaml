  hobbies: '[''Soccer'', ''LEGO building'', ''Drawing cartoons'', ''Reading picture books'', ''Listening to hip‑hop, R&B, and calypso music'', ''Swimming'', ''Collecting seashells'', ''Helping in the kitchen'']'
  career_goals: Quan dreams of becoming a firefighter because he admires the clear training steps, teamwork, and the chance to help his community. He also imagines himself as a soccer star, attracted by
    the structured practice schedule and the excitement of scoring goals. Both ambitions reflect his desire for predictable pathways where he can be assertive, cooperative, and make a concrete impact.
