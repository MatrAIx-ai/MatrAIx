personas:
  professional: Quan Quinn is a budding little engineer who spends afternoons constructing elaborate LEGO skyscrapers, applying practical problem‑solving skills while thriving on the predictable snap‑fit
    structure of each brick.
  sports: Quan Quinn dashes across the local park’s soccer field for the ‘Mighty Kicks’ youth league, splashes in the community pool’s junior swim club, and proudly wears a jersey of the city’s professional
    soccer team, FC City, while balancing structured practice drills with improvisational games that satisfy their love for flexibility.
  arts: Quan Quinn fills sketchbooks with vibrant drawings of cartoon heroes like SpongeBob and Mo Willems’ characters, grooves to the beats of Beyoncé, Drake, and Harry Belafonte’s calypso classics, and
    marvels at the animated adventures of Adventure Time, weaving those inspirations into LEGO recreations of iconic movie scenes.
  travel: Quan Quinn loves family beach trips to the nearby shoreline where they collect seashells, dreams of exploring the Great Barrier Reef’s coral gardens, and prefers short, well‑planned excursions
    that include a clear schedule of sandcastle building and snack breaks, yet they occasionally yearn for spontaneous road trips to a nearby amusement park.
  culinary: Quan Quinn enjoys mixing batter for fluffy banana pancakes, relishes cheesy macaroni, delights in the crunch of fresh pineapple chunks, and proudly states they can assemble a perfect LEGO‑shaped
    sandwich, though they often sneak an extra cookie when Mom isn’t looking.
  core: Quan Quinn combines meticulous LEGO building with a delightfully chaotic love of seashell hunting, swapping structure for spontaneous snack raids, and navigates life with a steady smile and a habit
    of forgetting to put away their crayons.
background:
  cultural: Quan is an African American boy raised in Miami’s vibrant, multicultural neighborhoods. His family blends Southern soul traditions with Caribbean influences from relatives who celebrate events
    like Juneteenth and Carnival. Spanish is heard on the streets and in school, giving him exposure to bilingual interactions. Church gatherings, family cookouts featuring collard greens and fried plantains,
    and rhythmic music from the block all shape his sense of identity, fostering community pride and a respect for diverse cultural expressions.
