  career_goals: Yohannes hopes to attend a community college or a vocational art program to study graphic design or multimedia arts. He aspires to become a freelance visual artist/illustrator and a digital
    content creator who can blend art and technology. He dreams of using his work to highlight the stories of Buffalo’s Black community, possibly opening a community art space or curating public mural projects.
    Long‑term, he envisions collaborating on interactive installations that merge coding, sound, and visual art, while also earning enough to support himself and give back to his neighborhood.
