personas:
  professional: Yohannes Haynes is a budding visual artist and multimedia creator who fuses hand‑drawn sketches with Photoshop and simple Python‑driven interactive pieces, embraces a curious yet flexible
    work style, and dreams of freelancing to illuminate his neighborhood’s stories while navigating a relaxed, sometimes chaotic schedule.
  sports: Yohannes Haynes tracks the Buffalo Bills in the fall, joins pickup basketball games at the community center in winter, skates in the summer at the local skate park, and maintains a casual jogging
    routine to capture city textures for their photo walks.
  arts: Yohannes Haynes immerses themselves in a soundtrack of Miles Davis, Kendrick Lamar, and Sufjan Stevens, sketches vibrant street murals inspired by Jean‑Michel Basquiat, and frequently participates
    in open‑mic nights and local gallery showings, letting these eclectic influences shape their mixed‑media aesthetic.
  travel: Yohannes Haynes favors spontaneous day trips to Niagara Falls, a yearly family excursion to Dublin’s coastal villages to explore ancestral music, and occasional urban explorations of New York
    City’s street‑art districts, budgeting each adventure around school and part‑time gigs.
  culinary: Yohannes Haynes enjoys cooking brunches of fluffy Irish soda bread with honey, hearty collard greens seasoned with smoked paprika, and spiced tacos with cumin, while regularly grabbing Buffalo
    wings and experimenting with homemade hot sauce for that perfect kick.
  core: Yohannes Haynes is a curious, sketch‑obsessed teen whose spontaneous creativity coexists with a delightfully disorganized routine, a habit of bouncing between digital beats and street photography,
    and a relentless drive to spotlight community stories through art.
background:
  cultural: Yohannes is an African American teenager raised in Buffalo’s East Side, a neighborhood shaped by the legacy of the Great Migration and a vibrant Black community known for its activism, gospel
    churches, and street art. His family’s roots trace back to Southern states where his grandparents sought industrial work in the early 20th century. The "Mcduffie" in his name reflects an Irish strand
    in his ancestry, adding a mixed‑heritage dimension that influences his appreciation for both African‑American and Celtic cultural traditions. At home, music ranges from gospel and soul to contemporary
    hip‑hop, and family gatherings are filled with storytelling about resilience and community. This blend of Black and Irish cultural elements informs his artistic tastes, his curiosity about diverse narratives,
    and his desire to celebrate multicultural expressions through his work.
