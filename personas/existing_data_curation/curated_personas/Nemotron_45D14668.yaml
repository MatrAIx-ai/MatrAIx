personas:
  professional: Arcely Maldonado is a budding architect of imagination, meticulously building elaborate LEGO cities and wooden block structures with a methodical, organized mind, channeling their competitive
    curiosity and preference for solitary creation into every design, and they proudly display each completed project on a dedicated shelf.
  sports: Arcely Maldonado enjoys sprinting around the backyard obstacle course she designed herself and plays forward on the Pixley Little Soccer Club during spring, cheering loudly for the Fresno State
    Bulldogs during football season, yet they prefer short, solo play sessions over extended team drills.
  arts: Arcely Maldonado spends afternoons sketching bright animal portraits inspired by the vivid colors of Frida Kahlo and humming traditional tunes like 'Cielito Lindo' while listening to piano pieces
    by Ludovico Einaudi, turning each page of their notebook into a personal gallery of imagination.
  travel: Arcely Maldonado loves family road trips to Yosemite National Park and the sandy shores of Santa Barbara, dreams of exploring the ancient ruins of Teotihuacan, and always insists on a carefully
    plotted itinerary with frequent rest stops so they can enjoy quiet moments and avoid sensory overload.
  culinary: Arcely Maldonado delights in the warm flavors of homemade tamales and mole, helps roll fresh corn tortillas seasoned with cilantro and cheese, and savors sweet churros dusted with cinnamon,
    though they can be fussy about trying unfamiliar vegetables.
  core: Arcely Maldonado is an imaginative, organized six‑year‑old who builds solitary LEGO kingdoms, sketches vibrant art, battles intense anxiety, and guards a meticulous coin stash with fierce devotion,
    and they often retreat to their sketchbook when feelings run high.
background:
  cultural: Arcely grew up in a Mexican‑American household in Pixley, where Spanish is spoken at home and family gatherings revolve around traditional foods like tamales, mole, and fresh corn tortillas.
    She celebrates Día de los Muertos with altars adorned with papel picado and learns the stories behind each sugar skull. Her parents instilled pride in her heritage, encouraging her to attend local community
    festivals and to learn Mexican folk dances and songs. The agricultural landscape of Tulare County shapes her appreciation for the land, and she often helps her family with garden chores, learning the
    rhythms of farm life while maintaining a strong connection to her cultural roots.
