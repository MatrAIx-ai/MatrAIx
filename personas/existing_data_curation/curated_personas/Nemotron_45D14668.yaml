  career_goals: Arcely dreams of becoming someone who creates worlds—whether as an astronaut exploring distant planets, an illustrator bringing imaginative stories to life, or a scientist uncovering the
    secrets of the universe. She imagines herself designing rockets, painting murals that blend Mexican motifs with futuristic scenes, and writing adventure books that inspire other quiet, curious kids.
    Her ambition is guided by a desire to solve puzzles, discover new ideas, and share her vision through art and science.
