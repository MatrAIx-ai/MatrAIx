personas:
  professional: At 33, Alexis Matos is an elementary and middle school teacher who blends curriculum design expertise, bilingual instruction, and tech integration with pragmatic curiosity, leading classroom
    projects that fuse multicultural storytelling and data-driven assessment while mentoring peers through collaborative SEL initiatives.
  sports: At 33, Alexis Matos is an avid hiker on the Bluegrass region's trails, a member of the Lexington-based Bluegrass Trail Club, a seasonal runner who signs up for the Kentucky Derby Run, a fan of
    the Louisville Cardinals basketball team, and enjoys occasional pickup soccer games at the community park to stay active.
  arts: At 33, Alexis Matos dances at local folk-dance gatherings, curates potluck playlists that swing between Santana's Latin rock and Bill Monroe's bluegrass, regularly attends performances by the Kentucky
    Repertory Theatre, and devotes book-club evenings to historical fiction by Hilary Mantel and education research by Linda Darling-Hammond.
  travel: At 33, Alexis Matos plans trips with a mix of detailed itineraries and spontaneous detours, having explored Asheville's art scene, trekked the Great Smoky Mountains, and dreaming of tasting street
    tacos in Oaxaca and jazz in New Orleans, while balancing family visits in Kentucky with modest budgets that prioritize culinary experiences.
  culinary: At 33, Alexis Matos enjoys cooking at an intermediate-high level, perfecting authentic Mexican dishes such as pork carnitas, chiles en nogada, and homemade salsa verde, while experimenting with
    Southern comforts like bourbon-glazed pork chops and shrimp-and-grits, often seasoning with chipotle, smoked paprika, and fresh cilantro, and loves hosting potluck nights where these flavors mingle.
  core: At 33, Alexis Matos blends pragmatic curiosity with community-centric energy, turning classrooms, kitchens, and hiking trails into collaborative spaces where multicultural learning, mindful living,
    and spontaneous joy intersect.
background:
  cultural: Alexis was raised in a Mexican‑American household where Spanish was spoken alongside English, and family traditions such as Día de los Muertos, posadas, and communal meals remain central. Though
    she lives in Lexington, Kentucky, she maintains strong ties to the local Hispanic community, participating in cultural festivals and bilingual outreach. Her upbringing instilled a respect for education,
    collective responsibility, and a blend of Mexican and Southern hospitality, which she weaves into her teaching philosophy and community involvement.
attributes:
  skills: '[''Classroom Management'', ''Curriculum Development'', ''Differentiated Instruction'', ''Bilingual Education (Spanish/English)'', ''Technology Integration (Google Classroom, iPad tools)'', ''Project‑Based
    Learning'', ''Social‑Emotional Learning Facilitation'', ''Assessment Design'', ''Parent‑Teacher Communication'', ''Community Outreach and Partnerships'']'
  hobbies: '[''Cooking (Mexican & Southern cuisine)'', ''Folk dance (salsa, folklórico)'', ''Hiking and nature walks'', ''Yoga'', ''Volunteer tutoring at the library'', ''Book club (education research &
    historical fiction)'', ''Music appreciation (Latin and bluegrass)'', ''Organizing community potlucks'']'
  career_goals: She aims to earn a master's degree in Educational Leadership within the next two years and move into a curriculum coordinator role, where she can champion multicultural and bilingual programs
    across the district. Alexis also aspires to develop a school‑wide SEL framework, mentor novice teachers, and eventually become an assistant principal. She hopes to lead a Spanish‑immersion initiative
    that blends her Mexican heritage with Kentucky’s community, and to influence district policy to support inclusive teaching practices.
