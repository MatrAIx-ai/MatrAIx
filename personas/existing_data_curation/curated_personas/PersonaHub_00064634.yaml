persona_description: A Chief Resilience Officer who is responsible for preparing, mitigating, and responding to multiple, overlapping hazard events in cities, particularly in New York, US, and The Hague,
  Netherlands, and is also concerned with the potential for compounding risks during the ongoing Covid-19 pandemic. This person is knowledgeable about the early steps in recognizing the co-occurrence of
  different natural hazards, using data and time to plan for these risks, and collaborating with local government bodies, NGOs, and experts to inform local action on the impacts of water shortages, power
  losses, and climate change. This person is also interested in disaster risk during Covid-19 and the need to understand the concept of compound risk in the context of natural hazards and pandemics.
