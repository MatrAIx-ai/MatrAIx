  career_goals: Samantha dreams of a future where she can combine her love of art, technology, and strategic thinking. In the short term, she aims to win a state-level digital art competition, earn a leadership
    role in her school’s robotics club, and secure a spot on the varsity chess team. Over the next few years, she plans to attend a specialized high‑school program focused on STEM and visual arts, where
    she can deepen her skills in graphic design and game development. Her long‑term ambition is to become a digital artist or video‑game designer, creating immersive visual experiences that challenge conventional
    storytelling. She also envisions pursuing a college degree in interactive media or graphic design, ultimately securing a position at a leading game studio or creative agency.
