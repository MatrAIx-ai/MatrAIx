  career_goals: Although retired from formal employment, Hien aims to expand her volunteer leadership by establishing a community garden that serves as a living classroom for intergenerational learning.
    She plans to launch a storytelling project that records the experiences of Southeast Asian elders in Los Angeles, preserving their narratives for future generations. Hien also hopes to mentor younger
    volunteers in event organization, ensuring that cultural festivals remain vibrant and inclusive. Her overarching ambition is to foster a sense of belonging and resilience within the local Vietnamese
    and broader multicultural community while maintaining her personal growth through continuous learning.
