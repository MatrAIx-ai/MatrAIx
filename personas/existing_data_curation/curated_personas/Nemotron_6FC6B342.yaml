personas:
  professional: Kevin Wright, a senior lecturer in electrical engineering at a regional university, embodies Southern hospitality by greeting students with a warm handshake and a home‑cooked muffin, and
    blends rigorous lab design with improvisational teaching, leveraging Python, MATLAB, and hands‑on troubleshooting to create flexible curricula while wrestling with deadline pressures.
  sports: Kevin Wright, a devoted fan of the Dallas Cowboys and the Tyler High School Panthers, joins a local over‑60 walking club that meets for brisk hikes through the Piney Woods, plays casual pickup
    basketball at the community center on weekends, and enjoys seasonal fishing trips on Lake Tyler.
  arts: Kevin Wright, a blues‑guitar enthusiast who regularly performs with friends covering Stevie Ray Vaughan and B.B. King, participates in a community theater troupe starring in productions like “Our Town,”
    and attends live shows by local folk singer Robert Murray, all while sharing stories over a barbecue pit after rehearsals.
  travel: Kevin Wright, an adventure‑leaning traveler who plans spontaneous weekend road trips to music festivals such as Austin City Limits and impromptu getaways to the Hill Country’s wineries, also enjoys
    relaxed cruises to the Gulf Coast with his wife when the budget permits, and keeps a scrapbook of postcards from New Orleans and Big Bend.
  culinary: Kevin Wright, a competent home chef, loves preparing Tex‑Mex dishes like chicken enchiladas with homemade salsa, grilling carne asada seasoned with cumin and fresh cilantro, experimenting with
    a slow‑cooker brisket that often ends up a little too smoky, and sharing freshly baked cornbread at church potlucks.
  core: Kevin Wright, a 60‑year‑old engineer‑educator who balances structured lab work with spontaneous blues jams, community service, and a penchant for last‑minute planning, all while managing modest
    health concerns and a scattered filing system.
background:
  cultural: Kevin grew up in East Texas, deeply rooted in Southern hospitality, community involvement, and a pragmatic work ethic inherited from a modest, middle‑class family. His white heritage aligns
    with the regional cultural mosaic of Texas, where he blends traditional values—such as respect for family, faith, and local customs—with the forward‑looking mindset of an academic STEM professional.
    This dual influence informs his balanced approach to structure and flexibility, his collaborative spirit, and his commitment to giving back through education and community service.
attributes:
