  hobbies: '["Hiking", "Fishing", "Volunteering at science fairs", "Community theater", "Blues guitar", "Cooking Tex‑Mex cuisine", "Attending high‑school football games", "Spontaneous road trips to music
    festivals", "Gardening"]'
  career_goals: Kevin aims to advance from teaching assistant to a senior lecturer or adjunct professor role, where he can lead a cross‑disciplinary STEM outreach program for K‑12 schools in East Texas.
    He also hopes to author a practical textbook on applied robotics, secure a regional grant to build community lab spaces, and mentor emerging faculty members. While he values the stability of a structured
    academic path, he remains open to pioneering new teaching methods and eventual transition to an emeritus position that lets him continue contributing to his community.
