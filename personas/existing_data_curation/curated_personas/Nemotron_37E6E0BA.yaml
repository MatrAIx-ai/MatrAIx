personas:
  professional: Yuliet Ortizfernandez is a production floor specialist who pairs CNC machinery expertise with bilingual fluency to translate safety protocols into vivid visual signage, coaching new teammates
    through hands‑on training while championing inclusive, art‑infused team‑building activities that keep the shop floor both efficient and culturally vibrant.
  sports: Yuliet Ortizfernandez embraces the outdoors by hiking with the Sangre de Cristo Trail Club, cheering on Santa Fe FC during the soccer season, and rotating between weekend yoga classes at a local
    studio and spontaneous zapateado practice that keeps them agile, while they keep a modest step count goal of 10,000 to balance the physically demanding production job.
  arts: Yuliet Ortizfernandez weaves artistic expression into daily life, teaching Zapateado at a community center, crafting pottery inspired by Frida Kahlo’s vivid colors and Georgia O’Keeffe’s desert
    forms, and attending poetry readings that feature the verses of Octavio Paz, all while curating a playlist that mixes traditional folk songs with contemporary indie Latinx artists.
  travel: Yuliet Ortizfernandez plans travel with a blend of adventure and cultural immersion, favoring road trips to New Mexico’s Taos Pueblo and the Great Sand Dunes, dreaming of a culinary pilgrimage
    to Oaxaca’s markets, and using a detailed spreadsheet to balance work‑shift coverage with a modest vacation fund that allows two week‑long getaways each year.
  culinary: Yuliet Ortizfernandez delights in cooking family recipes, expertly preparing tamales with masa and pork, simmering mole de pasilla with cocoa and ancho chiles, and ladling hearty pozole with
    hominy and cilantro, while experimenting with locally sourced prickly pear glaze on pottery‑inspired desserts, though they sometimes over‑season dishes in the excitement of flavor.
  core: Yuliet Ortizfernandez blends meticulous production expertise with a vibrant community spirit, juggling CNC precision, salsa steps, and a high‑interest savings habit, all while occasionally forgetting
    to stretch after long shifts.
background:
  cultural: Yuliet is a second‑generation Mexican American who grew up in a bilingual household in Santa Fe, NM. Her parents immigrated from Michoacán, bringing with them deep-rooted customs such as Día
    de los Muertos altars, quinceañera celebrations, and devotion to the Virgin of Guadalupe. She identifies strongly with both Mexican traditions and the multicultural tapestry of the Southwest, participating
    in local festivals that fuse Pueblo, Hispanic, and contemporary arts. Fluent in Spanish and English, Yuliet balances Catholic rituals with community‑oriented practices, often volunteering at church‑based
    food drives and cultural workshops. Her cultural identity informs her compassion, collaborative spirit, and commitment to preserving and sharing heritage within her workplace and the broader community.
