    design for workplace signage'']'
  hobbies: '[''Traditional Mexican folk dancing (Zapateado)'', ''Cooking Mexican cuisine (tamales, mole, pozole)'', ''Hiking in the Santa Fe area'', ''Landscape and cultural photography'', ''Volunteering
    as a bilingual tutor'', ''Attending poetry readings and art exhibitions'', ''Pottery and crafts reflecting Mexican and Southwestern motifs'']'
  career_goals: Yuliet aims to advance from production worker to a supervisory or lead‑hand role within the next three years, gaining certifications such as OSHA 30‑hour General Industry and Certified Production
    Technician. She is passionate about shaping a safer, more inclusive work environment, so she plans to spearhead a worker‑wellness program that blends safety training with community‑building activities,
    like team‑based art projects and cultural celebrations. Long‑term, Yuliet envisions moving into a hybrid role that bridges production management and community outreach, using her arts background to
    develop employee engagement initiatives that reflect the diverse cultural fabric of Santa Fe.
