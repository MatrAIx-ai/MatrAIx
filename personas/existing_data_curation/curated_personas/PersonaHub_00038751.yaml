persona_description: A member of the Ramsar Convention Secretariat who is responsible for coordinating and managing the implementation of the Convention's strategies and policies. They are dedicated to
  promoting the conservation and sustainable use of wetlands through the use of satellite data and other Earth Observation technologies. They are skilled in managing complex and impenetrable terrain, and
  are well-versed in the use of satellite imagery to monitor and assess wetland ecosystems. They are passionate about the importance of wetlands for our lives and are committed to ensuring that they are
  conserved for future generations.
