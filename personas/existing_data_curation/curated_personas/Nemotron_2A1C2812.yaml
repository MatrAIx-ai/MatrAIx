personas:
  professional: Jesse Hartwell, a 22‑year‑old aspiring creative technologist, merges Python, JavaScript, C++ and Blender skills to prototype interactive generative art installations, leading hackathon teams
    with a relaxed, improvisational style while fiercely competing to turn abstract ideas into polished UX/UI experiences.
  sports: Jesse Hartwell, who regularly paddle‑boards on Lake Sumter, cycles the nature trails of The Villages, joins the local Lake Pilots Paddle Club, plays pickup basketball with friends, and follows
    the Orlando Magic and Tampa Bay Buccaneers, approaches fitness with a socially driven, low‑pressure routine that still embraces friendly competition during weekend soccer matches.
  arts: Jesse Hartwell immerses themselves in experimental digital art, crafting generative visuals with code while drawing inspiration from Refik Anadol’s installations, listening to Aphex Twin and Thao & The Get‑Together,
    performing improv at The Villages Community Theater, and playing narrative‑rich indie games like Oxenfree and Outer Wilds, which together shape their eclectic creative identity.
  travel: Jesse Hartwell prefers impromptu road trips across the Southeast, from weekend escapes to Asheville’s craft beer scene to music‑filled drives to Nashville, while also setting sights on a future
    solo adventure to Berlin for a tech art festival and a dream visit to Reykjavik’s northern lights, balancing limited student finances with a love for cultural immersion.
  culinary: Jesse Hartwell enjoys cooking shrimp‑and‑grits and blackened catfish at home with a moderate skill level, frequently grabs falafel wraps and mango‑banana smoothies from local food trucks, and
    treats occasional upscale dining outings to The Villages’ fine‑dining spots for dishes like seared scallops with a beurre blanc, reflecting a blend of Southern comfort and adventurous palate.
  core: Jesse Hartwell is a 22‑year‑old inventive technologist who flips between relaxed, disorganized spontaneity and fierce competition, spends freely on creative gear while juggling modest savings, tackles
    seasonal allergies with tech‑savvy remedies, and fuels a life of paddle‑boarding, generative art, and spur‑of‑the‑moment travel.
background:
  cultural: Jesse comes from a middle-class White American background, raised in the southeastern United States where a strong emphasis on individual achievement, STEM education, and community involvement
    shaped his worldview. Growing up with access to both traditional American cultural touchstones—such as sports, outdoor recreation, and local festivals—and the digital culture of online gaming, open-source
    communities, and indie art scenes, he blends a conventional work ethic with a progressive, curiosity-driven mindset. Residing in The Villages, FL, he experiences a unique intergenerational environment
    that informs his appreciation for diverse perspectives while maintaining core values of personal freedom and creative expression.
