  career_goals: Jesse aims to build a career at the intersection of technology and art, aspiring to become a creative technologist or UX/UI designer for immersive experiences. He envisions joining a forward-thinking
    startup or launching his own venture that creates interactive installations, AR/VR products, or AI-driven creative tools. To deepen his expertise, he plans to pursue a master's program in Human-Computer
    Interaction or Computational Creativity while developing a strong freelance portfolio that showcases his ability to turn abstract concepts into usable, visually compelling solutions.
