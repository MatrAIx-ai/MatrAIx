personas:
  professional: Joe Price, a 21‑year‑old bellhop with a business degree, blends meticulous organization and flexible problem‑solving to deliver polished guest experiences while quietly battling anxiety,
    and they use their marketing savvy to upsell amenities as they aim to become a front‑desk supervisor within two years.
  sports: Joe Price, a 21‑year‑old outdoor enthusiast, spends weekends hiking Congaree National Park, plays pickup basketball at the local community center, follows the Charleston Battery soccer team and
    the South Carolina Gamecocks football, and they belong to a casual running club that meets for sunrise jogs in the Lowcountry.
  arts: Joe Price, a 21‑year‑old amateur photographer, roams Charleston’s art galleries, captures historic architecture, draws inspiration from jazz legends like Miles Davis and blues icons such as B.B. King,
    and they frequently quote the muralist “Mister Cartoon” while curating a personal Instagram feed of street art.
  travel: Joe Price, at 21, prefers weekend road trips to nearby historic towns like Savannah and Asheville, meticulously plans itineraries using travel forums, balances a modest budget with a craving for
    cultural immersion, and they dream of a future immersion trip to Paris to study museum architecture, all while juggling work shifts.
  culinary: Joe Price, a 21‑year‑old home cook, loves preparing Southern comfort foods like shrimp and grits, fried green tomatoes, and collard greens, experiments with smoked paprika and okra, enjoys the
    occasional bourbon‑glazed ribs, but they often over‑season dishes in an anxious rush to impress guests.
  core: Joe Price, a 21‑year‑old anxious bellhop with a passion for art and Southern cuisine, dreams of a boutique hotel while juggling mindfulness practices, impulse camera purchases, and a habit of over‑thinking
    every guest interaction.
background:
  cultural: Joe is a white South Carolinian raised in Graniteville, Aiken County, where Southern hospitality and community ties run deep. He grew up attending a Baptist church, participating in local festivals,
    and learning about the region's equestrian and agricultural traditions. His family values emphasize kindness, cooperation, and respect for harmony, while his university education at USC‑Aiken exposed
    him to broader cultural perspectives. He appreciates the rich African‑American musical and culinary heritage of the Lowcountry and integrates that appreciation into his personal and professional life,
    blending traditional Southern values with an open‑minded curiosity for new ideas and artistic expression.
