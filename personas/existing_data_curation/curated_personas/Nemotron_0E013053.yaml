  career_goals: Joe aims to move from his current bellhop position to a front‑desk supervisor within the next two years, then progress to hotel manager. He plans to earn a hospitality‑management certification
    and eventually open a boutique hotel in the Lowcountry that showcases local art and offers community‑focused events. His long‑term ambition is to blend his business acumen with his love of art, creating
    a space where travelers experience Southern culture in an innovative, inclusive way while he continues developing coping strategies for his anxiety and emotional reactivity.
