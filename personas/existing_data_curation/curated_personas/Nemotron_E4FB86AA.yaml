personas:
  professional: Kenneth Wilmot, an 11‑year‑old budding robotics enthusiast, channels their curiosity and practical mindset into designing intricate Scratch games and assembling LEGO robotics kits, often
    leading their school's robotics club projects with a blend of methodical planning and improvisational tinkering.
  sports: Kenneth Wilmot, an 11‑year‑old who loves biking on the Lake Mills Trail system and fishing at Lake Mills Reservoir, follows the local youth soccer team Lake Mills Soccer Club and enjoys watching
    the Milwaukee Brewers on TV, preferring low‑impact exercise that fits their quiet, structured routine.
  arts: Kenneth Wilmot, an 11‑year‑old sci‑fi bibliophile, spends afternoons reading the works of Becky Chambers and Orson Scott Card, building LEGO representations of alien worlds while listening to the
    ambient scores of Hans Zimmer, and attends the monthly Kids' Creativity Night at the Lake Mills Public Library where they showcase their Scratch animations.
  travel: Kenneth Wilmot, an 11‑year‑old explorer, plans weekend trips to the nearby state park's hiking trails and has a bucket‑list entry for the Apostle Islands National Lakeshore, while dreaming of
    distant adventures to Kyoto's bamboo forests and the Aurora Borealis over Tromsø, balancing family‑approved budgets with a yearning for quiet natural retreats.
  culinary: Kenneth Wilmot, an 11‑year‑old budding chef, favors simple, nature‑inspired meals such as grilled trout with dill, garden salad with cucumbers and cherry tomatoes, and homemade pizza topped
    with mozzarella and basil, often practicing cooking under the watchful eye of a parent, though they sometimes forget to clean up the kitchen afterward.
  core: Kenneth Wilmot, an inquisitive yet cautious 11‑year‑old, blends a love of structured creative projects with a tendency to overthink, turning solitary pursuits like LEGO building and chess into both
    a sanctuary and a source of occasional anxiety.
background:
  cultural: Kenneth comes from a white, Midwestern American family with German‑Scandinavian roots, raised in the small‑town community of Lake Mills, Wisconsin. The local culture emphasizes self‑reliance,
    practical problem‑solving, and a deep connection to the outdoors—values reflected in the county fair, church gatherings, and family traditions of gardening and fishing. This environment has fostered
    his practical curiosity, reserved demeanor, strong work ethic, and respect for nature.
