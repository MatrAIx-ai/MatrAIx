persona_description: A Texas state legislator who is dedicated to improving the education system and ensuring that Texas public schools are prepared to meet the changing demands of the workforce. They are
  aware of the importance of core education and believe that it is not feasible to sacrifice core education in the name of career-ready technical skills. They are also aware of the need for the private
  sector to retrain employees on new technology every few years and are committed to finding ways to support this process. They are interested in innovative and effective ways to improve education and are
  open to new ideas and approaches.
