personas:
  professional: Gloria Blanco, an 8‑year‑old budding coder and aspiring marine explorer, blends a love for Scratch programming with an inquisitive fascination for tide‑pool ecosystems, channeling their
    practical mindset and competitive spirit into solving mini‑science puzzles and designing interactive LEGO‑based habitats.
  sports: Gloria Blanco enthusiastically plays for the Tacoma Youth Soccer League, idolizing Seattle Sounders FC and mimicking their tactics on the field, while also enjoying after‑school swimming at the
    local pool to balance competitive soccer drills with low‑impact cardio.
  arts: Gloria Blanco's artistic side shines through dancing to upbeat tracks by Daddy Yankee and classic merengue beats, diving into mystery adventures like the Nancy Drew series, and constructing elaborate
    LEGO cityscapes inspired by favorite animated adventure movies.
  travel: Gloria Blanco prefers weekend adventures that blend beachcombing on Puget Sound with short family road trips to the San Juan Islands, while dreaming of a future vacation to the historic streets
    of Old San Juan to explore forts and sample authentic pastelitos.
  culinary: Gloria Blanco delights in helping their family prepare a creamy mashed plantain dish topped with sautéed onions—a beloved breakfast they call mangú—and enjoys snacking on crunchy pastelitos
    filled with sweet cheese, though they often forget to finish their vegetables after a vigorous soccer match.
  core: Gloria Blanco is a curious, competitive eight‑year‑old who blends coding, soccer, and Caribbean rhythms into a vibrant, organized life full of tide‑pool discoveries and LEGO marvels.
background:
  cultural: 'Gloria’s Dominican heritage shapes her daily life: she speaks Spanish at home, celebrates Dominican holidays such as Independence Day with traditional foods like mangú and pastelitos, enjoys
    Caribbean music and family gatherings, and shares stories from her culture; living in Tacoma, she blends these traditions with the Pacific Northwest lifestyle, participating in community events, outdoor
    activities, and school programs that reflect both her cultural roots and her surroundings.'
