persona_description: A healthcare professional who works in the field of neurology and specializes in the diagnosis and treatment of multiple sclerosis (MS). They are familiar with the latest research and
  guidelines for the management of MS, and have experience with various types of MRI scans used in MS diagnosis and follow-up. They are aware of the potential risks associated with gadolinium contrast agents
  used in MS imaging and are knowledgeable about the safety guidelines set by the FDA and the Consortium of MS Centers. They are interested in the latest research and developments in the field of MS and
  are committed to providing the best possible care for their patients.
