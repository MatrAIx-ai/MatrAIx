personas:
  professional: Cherrie Wilson, a seasoned administrative supervisor with three decades of frontline experience, applies their meticulous scheduling, budget tracking, and conflict‑resolution expertise to
    streamline office operations while quietly competing to integrate the latest productivity tools, all guided by a skeptical yet curious mindset that fuels their mentorship program and upcoming PMP certification.
  sports: Cherrie Wilson stays active by walking the nearby foothills on weekends with the Silicon Valley Hiking Club, cheering on the San Jose Sharks during NHL season and the San Jose Earthquakes in the
    MLS, and occasionally joining a low‑impact senior yoga class at the community center to maintain flexibility.
  arts: Cherrie Wilson finds inspiration at the San Jose Museum of Art, where they study works by contemporary masters such as Kehinde Wiley and Jacob Lawrence, enjoy listening to Miles Davis and Nina Simone
    while painting watercolor garden scenes, and practice knitting and crocheting patterns inspired by the geometric designs of African‑diaspora textiles.
  travel: Cherrie Wilson prefers thoughtfully planned trips, having explored the historic art districts of Santa Fe, the vineyards of Napa Valley, and a weekend pilgrimage to Paris’s Louvre, while their
    modest budget leads them to seek out off‑peak travel deals for future visits to Italy’s Tuscan countryside.
  culinary: Cherrie Wilson delights in cooking with garden‑fresh vegetables, often preparing a classic ratatouille with zucchini, eggplant, bell peppers, and fresh herbs, while also savoring soul‑comfort
    dishes like shrimp‑and‑grits and baking cinnamon‑swirl coffee cake on Sundays.
  core: Cherrie Wilson combines a lifelong knack for meticulous organization with a quiet competitiveness, an ever‑present undercurrent of worry, and a love for art‑filled solitude that fuels both their
    professional consulting dreams and habit of over‑stocking craft supplies.
background:
  cultural: Raised during the civil‑rights era, Cherrie’s African‑American heritage informs her values of resilience, community, and self‑improvement. She grew up attending a historically Black church where
    gospel music and fellowship fostered a strong sense of identity. After moving to the Bay Area, she embraced the multicultural tapestry of San Jose while maintaining ties to Black cultural organizations,
    often attending Juneteenth celebrations and local heritage festivals. Her background shapes her appreciation for artistic expression, her commitment to mentoring younger generations, and her cautious
    yet competitive outlook in professional settings.
attributes:
