personas:
  professional: Jerry Driver, a seasoned diesel mechanic with over a decade of experience servicing heavy‑duty buses and trucks across rural New England, leverages their methodical, organized nature and
    strong interpersonal skills to run precise diagnostics using JPRO, Cummins ISB, and Detroit DTS, while training apprentices, maintaining meticulous parts inventory, and documenting service records to
    meet tight deadlines safely.
  sports: Jerry Driver, a regular on the Bennington County Adult Basketball League and an avid snowmobiler during winter, stays fit by hitting the courts three times a week, supports the Boston Celtics,
    Boston Red Sox, and New England Patriots, and follows the Vermont Lake Monsters for local baseball excitement.
  arts: Jerry Driver, who frequently visits live‑music nights at the Bennington County Fairgrounds, draws creative energy from classic rock legends like Bruce Springsteen and folk storytellers such as Bob
    Dylan, and enjoys community theater productions of 'Our Town', weaving these artistic experiences into their woodworking and diesel‑truck restoration projects.
  travel: Jerry Driver, an adventure‑oriented road‑tripper who meticulously plans each itinerary, spends weekends hiking the Green Mountains and snowmobiling the White Mountains, has road‑tripped to the
    Adirondacks and dreams of trekking the Canadian Rockies’ Banff National Park, yet balances these excursions against the need to allocate funds for tools and the upcoming shop launch.
  culinary: Jerry Driver, a competent home cook with a penchant for hearty New England fare, often prepares maple‑glazed pork chops, smoked trout from Lake Champlain, Vermont cheddar‑topped mashed potatoes,
    and a signature wood‑fire pizza topped with locally sourced mushrooms and rosemary, while sipping a strong dark roast coffee during early‑morning diagnostic sessions.
  core: Jerry Driver, a 33‑year‑old diesel specialist who blends meticulous precision with rugged outdoor hobbies, channels stress into woodworking and community fire‑service, yet battles a habit of over‑planning
    and occasional worry about hitting career milestones.
background:
  cultural: Jerry grew up in a small, close‑knit town in southern Vermont within a family of second‑generation, white, Anglo‑American working‑class residents. The local culture emphasizes self‑reliance,
    modesty, and a strong sense of community participation, reflecting the historic New England values of hard work and neighborly support. He was raised in a Protestant environment that celebrated seasonal
    town events, agricultural fairs, and an appreciation for the natural landscape, all of which have shaped his practical outlook and his love for outdoor recreation.
attributes:
  skills: '[''Diesel Engine Diagnostics'', ''Heavy‑Vehicle Preventive Maintenance'', ''Fuel Injection System Repair'', ''Turbocharger Overhaul'', ''Emission Control Maintenance'', ''Hydraulic Transmission
    Service'', ''Electrical System Troubleshooting'', ''Welding and Fabrication'', ''Parts Inventory Management'', ''Safety and Regulatory Compliance'', ''Customer Service and Communication'', ''Apprentice
    Training and Mentorship'']'
  hobbies: '[''Hiking'', ''Snowmobiling'', ''Community Basketball League'', ''Fishing'', ''Woodworking'', ''Classic Truck Restoration'', ''Volunteer Fire Department'', ''Gym/Weight Training'', ''Live Music
    Shows'', ''Model Diesel Engine Building'']'
  career_goals: Jerry aims to earn the ASE Master Diesel Technician certification within the next two years and to be promoted to lead shop foreman, where he can shape maintenance protocols for a regional
    fleet. In the longer term, he hopes to open his own specialty diesel‑repair shop that serves the Vermont and neighboring New Hampshire counties, providing reliable service to rural transport operators.
    He also plans to develop a formal mentorship program for young mechanics, emphasizing structured learning and stress‑management techniques, and to pursue a certification in fleet management to broaden
    his career options.
