  career_goals: Scott aims to become a journeyman carpenter within the next two years and then pursue an associate degree in construction management. His long‑term ambition is to transition into a site
    supervisor role, eventually launching his own construction firm that specializes in environmentally sustainable projects with artistic design elements. He envisions integrating public art installations
    into residential and commercial builds, leveraging his appreciation for unconventional ideas to differentiate his business in the Midwest market.
