personas:
  professional: Scott Savoie, a 22‑year‑old construction worker on the cusp of journeyman status, leverages OSHA‑10 certification, blueprint‑reading acumen, and a habit of meticulous project scheduling
    to deliver eco‑friendly builds, while his artistic curiosity pushes him to incorporate reclaimed materials and subtle public‑art elements into each site.
  sports: Scott Savoie fuels fitness by hitting the local gym’s power‑lifting area three times a week, hiking the nearby nature preserve trails on weekends, and cheering for the Chicago Bulls and the Milwaukee
    Brewers, while they also belong to a community boxing club that satisfies their competitive streak.
  arts: Scott Savoie nurtures their creative side through sketching urban skylines, photographing construction sites, and frequent visits to the Art Institute of Chicago and local galleries, while they
    experiment with DIY woodworking, collecting vintage architectural magazines, and drawing inspiration from photographers like Andreas Gursky and painters like Edward Hopper.
  travel: Scott Savoie prefers road‑trip adventures that blend outdoor challenge with design inspiration, such as camping in the Badlands, exploring the sustainable‑architecture campus of the University
    of Wisconsin‑Madison, and planning a future visit to Barcelona’s modernist structures, all while budgeting carefully to keep travel costs within a modest annual allowance.
  culinary: Scott Savoie enjoys hearty Midwestern fare like roasted root vegetable grain bowls, homemade smoked chicken, and occasional deep‑dish pizza, but they also love experimenting with seasonal ingredients—such
    as beet hummus and heirloom tomatoes—while honing a decent level of cooking skill on a modest kitchen setup built from reclaimed wood.
  core: Scott Savoie is a methodical, art‑infused construction enthusiast who balances competitive ambition with a love for sustainable design, weekend hikes, and the occasional late‑night gaming binge.
background:
  cultural: Scott grew up in Fenton, Michigan, a small Midwestern town characterized by close‑knit neighborhoods and a strong work ethic rooted in the region's manufacturing history. His family, of white
    American descent, emphasized self‑reliance, reliability, and community involvement, values reflected in his organized and methodical nature. While he participates in typical Michigan traditions—high
    school football, county fairs, and local church gatherings—he also embraces a broader cultural curiosity, seeking out contemporary art, indie music, and innovative design trends. The blend of traditional
    Midwestern values and an openness to new ideas shapes his personal and professional outlook.
