  career_goals: Arielle aims to obtain her RN licensure within the next year and secure a full‑time staff nurse position at the Rensselaer County Hospital. She dreams of progressing to a charge nurse role
    within three to five years, where she can mentor newer staff and help streamline unit workflows. Long‑term, she hopes to specialize in oncology nursing, drawn by a desire to support patients through
    challenging treatments, and eventually pursue a Bachelor of Science in Nursing to qualify for a nurse educator position. Throughout her career, she will prioritize work‑life balance and develop personal
    coping strategies to manage stress.
