personas:
  professional: Arielle Youngman, a 23‑year‑old nursing student on the brink of RN licensure, blends meticulous electronic health record documentation with compassionate patient education, excelling in
    IV therapy and wound care, while their love of flexibility sometimes leads to last‑minute shift swaps with colleagues.
  sports: Arielle Youngman enjoys weekend hikes with the Hudson Valley Hiking Club in Taconic State Park, practices gentle yoga three times a week at home, and follows the New York Knicks during basketball
    season, preferring low‑impact outdoor activities over high‑intensity gym workouts.
  arts: Arielle Youngman spends evenings knitting scarves while listening to indie folk artist Phoebe Bridgers, devours contemporary novels by Sally Rooney, and attends monthly screenings at the Albany
    Institute of History and Art, where they especially admire the work of Edward Hopper.
  travel: Arielle Youngman favors spontaneous weekend trips to Finger Lakes wineries and the scenic trails of Acadia National Park, planning travel on a shoestring budget while they dream of a future solo
    backpacking journey across the European Alps.
  culinary: Arielle Youngman, an intermediate home cook, delights in creating nutrient‑dense meals like roasted vegetable quinoa bowls with kale and chickpeas, simmered Thai green curry with coconut milk,
    and occasionally treats friends to homemade avocado‑lime salsa wrapped in whole‑grain tacos they prepare with meticulous care.
  core: Arielle Youngman is a compassionate, structure‑loving nursing student who calms themselves with yoga and hiking, yet often succumbs to last‑minute disorganization and worry‑driven impulsive yarn
    shopping.
background:
  cultural: Arielle was raised in a middle‑class white family in the small town of Petersburg, upstate New York. Her upbringing reflected the close‑knit, community‑oriented values typical of the region,
    including participation in local events such as town fairs, church gatherings, and volunteer service. Family traditions emphasize respect for personal space, self‑reliance, and practical problem‑solving,
    which align with her pragmatic personality. The cultural milieu of the Mohawk Valley, with its mix of agricultural heritage and modest suburban life, has instilled in her a sense of duty to help neighbors,
    as seen in her nursing career and community‑garden involvement.
