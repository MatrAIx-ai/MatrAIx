  hobbies: '[''Woodworking'', ''Gardening (heirloom tomatoes, native plants)'', ''Birdwatching'', ''Appalachian History Research'', ''Fishing'', ''Bridge'', ''Cooking Southern and Latin‑inspired meals'',
    ''Church choir participation'', ''Nature walking'']'
  career_goals: Although retired, Roger aims to mentor younger volunteers at the Lenoir community center, teaching them practical home‑repair skills and fostering a culture of self‑reliance. He plans to
    document his family’s Appalachian history in a memoir and publish a concise home‑maintenance guide for seniors. Maintaining physical health through regular gardening and walking, as well as adopting
    simple stress‑reduction routines, are also central to his personal objectives.
