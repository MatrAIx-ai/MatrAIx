persona_description: A cardiologist who is an expert in the field of sudden cardiac death and has conducted research on the prevalence and risk factors for this condition in high school athletes. He is
  interested in the effectiveness of electrocardiograms (EKGs) as a screening tool for sudden cardiac death and is advocating against widespread EKG screenings for high school athletes. He is also interested
  in the development of emergency plans for high schools in case of sudden cardiac arrest and the equipement of all high schools with automatic external defibrillators (AEDs).
