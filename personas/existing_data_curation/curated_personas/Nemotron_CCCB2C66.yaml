personas:
  professional: Jonah Mcclinton, a retired building maintenance professional, translates decades of hands‑on experience in electrical, plumbing and HVAC systems into volunteer advisory work at the senior
    center, where they apply their methodical planning and mentorship style to streamline safety inspections and apprentice training.
  sports: Jonah Mcclinton, a lifelong Seattle sports fan, never misses a Seahawks Sunday game, follows the Mariners during spring training, and participates in the senior center's weekly walking club and
    the local senior bowling league, which they attend regularly, balancing passive fandom with light physical activity.
  arts: Jonah Mcclinton, an avid jazz aficionado, fills evenings with Miles Davis’s “Kind of Blue,” John Coltrane’s “A Love Supreme,” and classic soul from Aretha Franklin and Marvin Gaye, while also carving
    small wooden stools in their workshop, which they craft with a quiet appreciation for tactile craftsmanship.
  travel: Jonah Mcclinton, who enjoys purposeful travel, has toured the historic Freedom Trail in Boston, explored the cherry‑blossom gardens of Vancouver, and dreams of a genealogy pilgrimage to Savannah,
    Georgia, and they plan trips around senior discounts and modest travel budgets.
  culinary: Jonah Mcclinton, a modest home cook, frequently prepares roasted heirloom carrots, sautéed kale with garlic, and a quinoa‑and‑black‑bean salad using fresh produce from their garden, while also
    indulging in a slice of homemade cornbread with honey butter, which they savor as a comforting treat, reflecting a blend of health‑focused and comfort food tastes.
  core: Jonah Mcclinton, a meticulous 73‑year‑old with a penchant for gardening, jazz, and community service, balances careful planning with occasional worry‑driven overthinking, and they often channel
    that anxiety into detailed checklists.
background:
  cultural: Jonah identifies as African‑American and grew up in the Pacific Northwest, where he experienced a blend of Black cultural traditions and the region’s progressive community values. His family
    roots trace back to the South, bringing stories of migration, church involvement, and resilience that shape his worldview. He remains connected to the local Black churches and cultural organizations
    in Lynnwood and Seattle, which celebrate African‑American heritage through music, storytelling, and community service. His cultural background influences his emphasis on mentorship, community stewardship,
    and preserving family history.
