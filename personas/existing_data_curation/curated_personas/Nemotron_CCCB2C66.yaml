  hobbies: '["Gardening", "Historical reading", "Genealogy research", "Woodworking", "Chess club", "Church community activities", "Neighborhood clean‑up volunteering", "Listening to jazz and soul music"]'
  career_goals: Although retired, Jonah seeks to stay purposeful by contributing his experience to the community. He aims to volunteer as a facilities advisor for the local senior center, mentor apprentices
    through the union’s apprenticeship program, and lead a neighborhood garden project that combines his organizational skills with his love for nature. He also hopes to document his family’s history in
    a memoir, taking a structured approach to research and writing. Maintaining his health, supporting his spouse, and continuing lifelong learning through occasional community‑college classes in local
    history or horticulture are key personal ambitions.
