  hobbies: '[''Gardening (vegetables and flowers)'', ''Cooking traditional South Asian dishes'', ''Reading historical non-fiction and biographies'', ''Walking in local parks'', ''Volunteering at food banks
    and community centers'', ''Attending cultural festivals and performances'', ''Playing chess at the senior center'', ''Mindfulness meditation'']'
  career_goals: Although no longer in the formal workforce, Bin seeks to channel his expertise into meaningful volunteer leadership. He aims to become a regular facilitator for local senior‑youth mentorship
    programs, using his practical knowledge to support career development and life skills. He also aspires to help coordinate intergenerational cultural workshops that celebrate South Asian heritage while
    fostering community harmony. In his personal growth, he hopes to deepen his understanding of digital tools to stay connected with family and to document his life experiences in a memoir that can serve
    as a resource for future generations.
