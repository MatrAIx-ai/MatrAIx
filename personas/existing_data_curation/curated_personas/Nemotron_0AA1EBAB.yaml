personas:
  professional: Keith Jones, a 19‑year‑old junior software developer, marries full‑stack JavaScript expertise with generative art in p5.js, leading rapid‑prototype sprints for indie‑tech startups while
    channeling their vivid imagination into interactive, visually rich web experiences.
  sports: Keith Jones fuels their high‑energy vibe by competing in a co‑ed ultimate frisbee league, shooting hoops at the community gym, and cheering loudly for the local basketball team, the Chicago Bulls,
    treating each match as both a workout and a friendly rivalry.
  arts: Keith Jones immerses themselves in indie games like *Outer Wilds* and *Return of the Obra Dinn*, draws inspiration from electronic pioneers such as Aphex Twin and Daft Punk while shredding electric
    guitar riffs à la Jimi Hendrix in a garage band, and showcases their own generative art at local open‑mic nights.
  travel: Keith Jones prefers spur‑of‑the‑moment hackathon road trips, having trekked to Seattle for a JavaScript summit, explored Tokyo’s Akihabara for gaming inspiration, and dreams of a future backpacking
    stint across the European art capitals of Berlin and Barcelona.
  culinary: Keith Jones balances late‑night coding marathons with a love for junk‑food comforts, often ordering spicy chicken tacos or ultra‑crispy ramen, yet occasionally flexes their modest kitchen chops
    by whipping up a homemade Margherita pizza topped with fresh basil and a drizzle of olive oil.
  core: Keith Jones is a 19‑year‑old creative technologist who stitches together code, guitar, and improv humor into a restless, slightly chaotic pursuit of novelty, constantly juggling projects while never
    quite mastering the art of punctuality.
background:
  cultural: Raised in Lexington, North Carolina, Keith grew up in a tight‑knit Southern community where hospitality, family gatherings, and high‑school sports were central. His family’s roots in the Piedmont
    region instilled a respect for self‑reliance, community service, and local traditions such as barbecue and folk music. Simultaneously, the town’s emerging tech scene and his online connections exposed
    him to global developer culture, digital art movements, and contemporary music. This blend of Southern cultural heritage and modern, internet‑driven creativity gives him a grounded yet forward‑looking
    perspective, influencing both his collaborative demeanor and his drive to innovate at the intersection of art and technology.
