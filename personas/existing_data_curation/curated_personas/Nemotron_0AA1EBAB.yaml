  career_goals: He aims to transition from a junior developer to a full‑stack lead within a fast‑growing tech startup that blends art and technology. In the next 1‑2 years he wants to secure a full‑time
    role, contribute to open‑source projects, and build a portfolio of interactive, visually rich web apps. Long‑term, he dreams of launching his own creative‑tech platform that uses AI to generate visual
    and musical content, positioning himself as a thought leader in generative media. Alongside his career, he plans to pursue a Computer Science degree part‑time, mentor junior coders, and eventually run
    hackathon teams to foster collaborative innovation.
