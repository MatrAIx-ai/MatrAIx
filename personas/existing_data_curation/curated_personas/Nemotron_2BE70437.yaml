  hobbies: '["drawing", "watercolor painting", "photography", "reading contemporary fiction", "writing poetry", "listening to indie folk music", "visiting local art galleries", "bicycle riding on countryside
    trails", "urban sketching", "experimenting with cooking", "volunteering at community art workshops"]'
  career_goals: Francelina aims to pursue a Bachelor of Fine Arts with a focus on illustration and visual storytelling, eventually establishing herself as a freelance illustrator and designer for independent
    publishers and community art initiatives. She envisions working part‑time at a local art center where she can mentor younger artists, while maintaining the flexibility to travel and explore new cultural
    experiences. Over the next five years, she hopes to build a robust online portfolio, secure recurring commissions, and possibly launch a small collective that merges art with social activism, aligning
    her compassionate values with entrepreneurial ambition.
