  hobbies: '[''Visiting local art galleries and mural tours'', ''Live music and community festivals'', ''Fusion cooking (Asian‑Tex‑Mex dishes)'', ''Fishing at Laguna Madre'', ''Metal tinkering and small‑scale
    sculpture'', ''Calligraphy'', ''Storytelling at senior clubs'', ''Playing darts'', ''Texas hold ’em'', ''Dancing to regional music (cumbia, zydeco)'']'
  career_goals: He aims to move into a foreman or shop‑supervisor role within the next few years, leveraging his technical mastery to lead larger projects. Simultaneously, he dreams of establishing a small
    boutique metal‑art studio where he can produce and sell bespoke sculptures and functional art pieces for local businesses and community spaces. He plans to mentor apprentices, especially those from
    immigrant backgrounds, and hopes to be recognized as a bridge between the traditional trade and contemporary artistic expression. Financially, he seeks to secure a comfortable retirement while maintaining
    an active workshop.
