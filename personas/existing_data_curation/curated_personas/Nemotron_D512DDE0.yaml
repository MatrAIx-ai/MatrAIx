    resolution", "precision agriculture techniques"]'
  hobbies: '["vegetable gardening", "heirloom seed experimentation", "hydroponic herb cultivation", "reading agricultural journals", "reading Black history literature", "listening to blues and gospel music",
    "cooking farm-to-table meals", "fishing", "woodworking", "photography of farm landscapes", "volunteering for youth gardening programs", "church fellowship gatherings"]'
  career_goals: Adrian aims to transform his current farm into a diversified, sustainable operation that balances profitability with environmental stewardship. Over the next five years he plans to obtain
    organic certification and develop a Community Supported Agriculture (CSA) program to supply fresh produce and grass‑fed meat to Louisville neighborhoods. He intends to complete a bachelor’s degree in
    agricultural science or agribusiness, integrate precision‑farming technologies such as drone scouting and sensor‑driven irrigation, and increase the farm’s annual revenue by 30%. Long‑term, he aspires
    to mentor other young Black farmers, lead a regional cooperative of small‑scale producers, and influence agricultural policy at the state level to promote equity and sustainable practices.
