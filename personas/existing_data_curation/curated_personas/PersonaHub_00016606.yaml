persona_description: A science educator who is interested in the implementation and adoption of the Next Generation Science Standards (NGSS) and is looking for resources to help them navigate the complex
  document. They are looking for guides, tools, and cheat sheets that will help them understand and implement the NGSS effectively. They are familiar with the concepts of practices, core ideas, and crosscutting
  concepts and are interested in comparing the NGSS with other standards such as the Common Core State Standards, Mathematics, and English Language Arts. They are also interested in learning about the connections
  between the NGSS and engineering, technology, and applications of science, as well as the connections to the nature of science.
