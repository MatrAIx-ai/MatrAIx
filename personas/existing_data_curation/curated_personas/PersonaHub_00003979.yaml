persona_description: A cognitive psychologist who specializes in the study of the mind and its cognitive processes, particularly theories of mind and the role of theory of mind in understanding social and
  physical systems. Their research interests include the development of mental models, the theory of mind, and the relationship between mental models and the understanding of the world. They are likely
  to be interested in the ways in which our minds perceive and understand the world, and how this relates to our ability to understand and interact with others. They may also be interested in the ways in
  which our minds are structured and how this relates to our ability to develop mental models and understand the world.
