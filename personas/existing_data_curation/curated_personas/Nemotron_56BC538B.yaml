  hobbies: '["Jogging","Yoga","Reading self‑help books","Personal journaling","Mentoring at community center","Church choir participation","Listening to R&B/gospel music","Cooking family recipes"]'
  career_goals: Jacqueline aims to enroll in a community college program in Business Administration while obtaining a Certified Nursing Assistant (CNA) certification to secure a stable, structured entry‑level
    position in healthcare administration. She envisions working as a medical office assistant where she can combine her organizational strengths with her interest in helping others. Over the next five
    years she hopes to advance to a supervisory role, possibly managing a small team in a clinic or a local government office. She is also interested in continuing education through night courses to eventually
    earn an associate’s degree and explore opportunities in health services management.
