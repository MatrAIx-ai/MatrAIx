personas:
  professional: Jose Ramos is a seasoned janitor who excels at efficient cleaning, basic building maintenance, and bilingual communication, and they channel their organizational skills toward a goal of
    facility management certification and launching a green‑cleaning service that also offers mural painting side gigs.
  sports: Jose Ramos plays forward for the Pearland Power community soccer league, drums up team spirit with cumbia playlists, and they follow the Houston Dynamo and Houston Astros avidly, often wearing
    the teams' colors on match days.
  arts: Jose Ramos engages in acrylic painting, sketches urban Houston skylines, creates digital art on their tablet, collaborates on community murals inspired by Frida Kahlo’s vibrant colors, and they
    regularly attend workshops featuring local muralists like Shepard Fairey’s Houston protégé.
  travel: Jose Ramos prefers a blend of cultural immersion and adventure, having explored San Miguel de Allende’s historic plazas, road‑tripping through Austin’s live‑music scene, savoring the jazz streets
    of New Orleans, and they are planning a future eco‑tour of Costa Rica’s rainforests.
  culinary: Jose Ramos is an intermediate home‑cook who delights in preparing tamales with masa and pork, simmering pozole with hominy and pasilla chilies, and assembling chiles en nogada with roasted poblano
    peppers, fresh cilantro, and a walnut‑pomegranate sauce for family feasts, and they often share these meals at community gatherings.
  core: Jose Ramos melds disciplined janitorial expertise with boundless artistic imagination, balancing a love for community service, vibrant mural creation, and occasional late‑night sci‑fi reading marathons
    that keep their mind as fresh as their cleaning supplies, and they never miss a chance to add a splash of color to a dull hallway.
background:
  cultural: Jose was born to Mexican immigrant parents and grew up in a bilingual household in Texas. His upbringing blended traditional Mexican customs—such as celebrating Día de los Muertos, enjoying
    mariachi music, and preparing home-cooked family meals—with the multicultural dynamics of Pearland and the broader Houston metro area. He maintains close ties with his extended family, often visiting
    relatives in Mexico and participating in church gatherings. His cultural identity informs his values of community, hospitality, and hard work, and he takes pride in his ability to navigate both Spanish
    and English social contexts. He actively engages in local Hispanic community events, supporting cultural preservation while also embracing the diverse influences of his Texan environment.
attributes:
  skills: '[''Cleaning and Sanitation'', ''Facility Maintenance'', ''Inventory Management'', ''Organizational Skills'', ''Bilingual Communication (Spanish/English)'', ''Customer Service'', ''Safety Protocols'',
