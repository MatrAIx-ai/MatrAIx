  hobbies: '[''Acrylic Painting'', ''Sketching'', ''Digital Art'', ''Cooking Mexican Cuisine'', ''Soccer'', ''Dancing (Cumbia/Salsa)'', ''Community Festival Participation'', ''Science Fiction Reading'',
    ''Astronomy Podcasts'', ''Mural Projects'']'
  career_goals: Jose aims to advance within facility management, seeking a supervisory or lead caretaker role within the next five years. He plans to leverage his on-the-job experience and some college
    coursework in environmental health to obtain certifications such as Certified Professional Cleaner and Facility Management Professional. He also dreams of starting his own modest cleaning business focused
    on eco-friendly services for residential and small commercial clients in the Houston area. In addition, he hopes to integrate his passion for art by offering mural painting services as a side venture,
    combining his cleaning expertise with creative expression.
