personas:
  professional: A budding mechanical engineer in training, Ryan Proctor channels their love for clear rules, precise assembly, and measurable progress into building LEGO Technic masterpieces, and they apply
    a methodical, competitive mindset that drives them to master complex mechanisms and document each build with meticulous notes.
  sports: An enthusiastic junior hiker, Ryan Proctor spends weekends trekking the Dixie National Forest with a parent and members of the local after‑school hiking club, while they cheer for the Utah Jazz
    during basketball season and occasionally tag along with the youth soccer team of the St. George Lions, balancing solitary trail exploration with occasional team sport camaraderie.
  arts: A curious cultural explorer, Ryan Proctor mixes their love for structured play with artistic appreciation by building narrative LEGO dioramas while they listen to Hans Zimmer's film scores, attending
    the Utah Shakespeare Festival to see productions of "Macbeth", and replaying video‑game soundtracks from Minecraft and Puzzle Quest, a blend that fuels their creative imagination.
  travel: A detail‑oriented young traveler, Ryan Proctor prefers short, planned excursions like weekend hikes in Zion National Park and family road trips to the Grand Canyon, while dreaming of a future
    visit to the LEGO House in Billund, Denmark, and a science‑focused tour of the Kennedy Space Center, and they always map their routes and pack checklists in advance.
  culinary: A budding kitchen experimenter, Ryan Proctor enjoys assembling homemade pepperoni pizza with extra mozzarella and sprinkling crushed tortilla chips on top, while also crafting trail mix with
    almonds, dried cranberries, and chocolate chips for their LEGO sessions, and they show a preference for familiar comfort foods with a crunchy twist.
  core: Ryan Proctor, an 11‑year‑old LEGO strategist, balances a competitive, rule‑loving mind with a shy, worry‑prone nature, often obsessively tracking progress yet occasionally neglecting hydration during
    marathon gaming sessions, which shows how they juggle focus and fatigue.
background:
  cultural: Ryan was raised in Cedar City, a small town in southwestern Utah with strong ties to both the outdoor recreation culture of the Intermountain West and the community‑centered traditions of the
    region. His family participates in local events such as the Utah Shakespeare Festival, county fairs, and church gatherings, reflecting a blend of mainstream American and regional values. The area's
    emphasis on self‑reliance, respect for the natural landscape, and close‑knit community life informs his practical outlook and his appreciation for structured activities.
