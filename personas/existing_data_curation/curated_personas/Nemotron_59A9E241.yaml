  career_goals: He aims to become a civil engineer or architect who designs practical, sustainable structures for his community, especially projects that manage water resources in the arid Utah landscape.
    Ryan hopes to attend a STEM‑focused high school and later a university engineering program, eventually working on public infrastructure that improves daily life for residents of Cedar City.
