  career_goals: Although retired from full‑time employment, Kam aims to stay productive by mentoring younger volunteers in practical trades, completing a personal woodworking project—a handcrafted bench
    for his granddaughter’s garden—and contributing to Seattle’s community garden program. He also hopes to document his life experiences and the history of his Seattle neighborhood in a memoir, while maintaining
    his health through regular walking and low‑impact exercise. His ambition is to combine his curiosity for local history with his pragmatic skill set to leave a tangible, lasting contribution to his community.
