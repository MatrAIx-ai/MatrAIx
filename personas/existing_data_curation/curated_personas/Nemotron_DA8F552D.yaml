  hobbies: '["Cooking traditional Dominican cuisine", "Dancing merengue and bachata", "Senior Zumba classes", "Balcony gardening", "Church choir singing", "Reading Spanish-language magazines", "Volunteering
    at senior center (bingo)", "Walking in local parks", "Attending cultural festivals"]'
  career_goals: Cindy aims to formalize her culinary knowledge by completing a GED and enrolling in a local adult‑education class on small‑business entrepreneurship. She dreams of launching a weekend pop‑up
    stall at the Bronx street fair offering her homemade Dominican pastries and sauces, which would allow her to share her heritage while generating supplemental income. Additionally, she hopes to take
    on a leadership role in the local Dominican cultural organization, organizing youth mentorship programs and health‑education workshops. Maintaining her health and staying active for her grandchildren
    also remain central goals.
