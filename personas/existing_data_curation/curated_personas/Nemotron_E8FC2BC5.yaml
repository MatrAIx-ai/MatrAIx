    and methodical work ethic'']'
  hobbies: '[''Digital painting and sketching'', ''Photography of landscapes and industrial scenes'', ''Reading science‑fiction and philosophy'', ''Listening to logistics and design podcasts'', ''Bicycle
    riding and fishing on Lake Michigan'', ''Hiking in Wisconsin state parks'', ''Model‑train building'']'
  career_goals: Edward aims to leverage his hands‑on driving experience into a supervisory role within a logistics firm, with the long‑term goal of establishing his own boutique freight company that specializes
    in transporting high‑value or artistic goods. He plans to complete his associate degree in logistics and obtain certifications such as Certified Transportation Professional (CTP) and a Commercial Driver’s
    License endorsement for hazardous materials. Over the next five years he hopes to become a regional operations manager, overseeing a small fleet, while also developing a side business offering mobile
    art exhibitions on his trucks, combining his love of novelty, art, and transportation.
