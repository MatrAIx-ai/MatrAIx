personas:
  professional: Edward Hebb is a methodical driver‑sales specialist, blending hands‑on long‑haul expertise with an imaginative eye for logistics, who leverages GPS platforms, spreadsheet analytics, and
    persuasive customer communication to streamline freight operations while mapping out a future boutique company focused on high‑value artistic cargo.
  sports: Edward Hebb is an avid weekend cyclist who logs long rides with the Lakefront Riders club, casts for perch on Lake Michigan in the early mornings, hikes the dunes of Indiana Dunes State Park each
    fall, and follows the Chicago Cubs, Chicago Bears, and Milwaukee Brewers with the same meticulous game‑day planning they apply to route optimization.
  arts: Edward Hebb is a solitary digital painter who channels the abstract color fields of Jeremy Mann and the bold lines of Ross Tran into landscape sketches of highway horizons, captures the stark geometry
    of steel mills in the style of Andreas Gursky through lake‑front photography, curates model‑train dioramas inspired by mid‑century industrial design, and spends evenings immersed in podcasts about creative
    design and logistics innovation.
  travel: Edward Hebb is a methodical road‑tripper who prefers solo, meticulously plotted itineraries—like a summer ride along the Great Lakes to Detroit’s auto plants, a weekend detour to Rotterdam’s port
    for its modern freight hubs, and a coveted future voyage to Tokyo’s industrial districts—balancing a love of industrial photography with a modest budget that still allows for occasional boutique hotel
    stays.
  culinary: Edward Hebb is a pragmatic home‑cook who favors fresh catches from Lake Michigan—preparing grilled perch with lemon‑dill butter, white‑fish tacos seasoned with smoked paprika and lime, and hearty
    bean‑chili stews—with a side appetite for a well‑crafted espresso shot and the occasional indulgence in a Chicago‑style deep‑dish pizza after a long haul.
  core: Edward Hebb is a methodical, imagination‑driven logistics driver who blends precise route planning with a passion for industrial art, solitary creativity, and a steady march toward a boutique freight
    venture.
background:
  cultural: Edward grew up in Kenosha, Wisconsin, a Midwestern city with a strong manufacturing heritage and a mix of German, Polish, and other Northern European influences. The region’s work‑centric, modest,
    and community‑oriented culture shaped his reliable and methodical personality. He attended local public schools and pursued some college coursework at a nearby community college, reflecting the area’s
    emphasis on practical education and upward mobility. The close‑knit nature of the Kenosha community, combined with the proximity to Chicago’s cultural scene, fostered his appreciation for both steady,
    dependable work and exposure to artistic novelty. His upbringing in a predominantly white, middle‑class, Protestant‑cultural environment reinforced values of independence, modesty, and a preference
    for small‑group interactions.
attributes:
  skills: '[''Commercial driving (Class A CDL)'', ''Route optimization and logistics planning'', ''Vehicle maintenance and troubleshooting'', ''Customer relationship management'', ''Sales negotiation and
