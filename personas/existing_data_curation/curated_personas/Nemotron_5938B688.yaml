  career_goals: Lilia aspires to a career that blends her curiosity about science with her deep desire to help others. She dreams of becoming a pediatric nurse or pediatrician, motivated by the chance to
    support children's health and well‑being. At the same time, she is intrigued by environmental science and hopes to study ecology or conservation to protect natural habitats she loves exploring. Lilia
    plans to attend a high‑school with strong STEM and health‑science programs, earn scholarships, and eventually pursue a degree in health sciences or environmental studies, aiming for a stable, impactful
    profession that serves her community.
