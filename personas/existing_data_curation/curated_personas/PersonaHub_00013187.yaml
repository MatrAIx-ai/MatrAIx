persona_description: A researcher from the social sciences who is interested in conducting experiments on the views of the general population towards immigrants, particularly regarding the opposition to
  Muslim and Christian immigrants. They are looking for a study that uses a list experiment design to control for social desirability bias and test whether views towards immigrants depend on the religion
  of the immigrant group. They are interested in conducting the study on a representative sample of the population and are looking for a study that uses a probability-based sample to achieve this. They
  are also interested in the use of a web-based survey design to minimize social desirability bias and ensure the anonymity of the responses.
