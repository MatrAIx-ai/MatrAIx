  career_goals: Sheila aims to transition her artistic practice into a sustainable independent career. Over the next five years she plans to curate a series of solo exhibitions in Brooklyn galleries, publish
    a limited‑edition illustrated poetry collection, and secure a grant from a local arts council to fund a community workshop series on abstract art techniques. She also aspires to win regional art competitions,
    build a modest online following, and eventually open a small studio space where she can teach intimate classes and collaborate with like‑minded creators on experimental projects.
