personas:
  professional: Sheila Rabasco is a self‑taught multidisciplinary visual artist who blends digital illustration, experimental painting, and poetry into immersive narrative installations, channeling their
    deep curiosity and competitive drive into solo studio sessions that prioritize spontaneity over strict scheduling, while their calm resilience allows them to navigate ambiguous briefs without anxiety.
  sports: Sheila Rabasco enjoys low‑key fitness routines such as morning yoga in Prospect Park, occasional pickup basketball games at a community center, and follows the Brooklyn Nets and New York Yankees
    with a casual, almost spectator‑like enthusiasm, preferring personal sweat sessions over organized team sports.
  arts: Sheila Rabasco immerses herself in Brooklyn’s avant‑garde scene, curating visits to galleries featuring works by Yayoi Kusama and Banksy, composing ukulele‑accompanied verses inspired by Allen Ginsberg,
    and drawing visual inspiration from the surrealist films of David Lynch and the ambient sounds of Björk, all of which shape their collage‑rich, introspective artistic voice.
  travel: Sheila Rabasco prefers spur‑of‑the‑moment urban explorations, having wandered through Berlin’s street‑art alleys and Reykjavik’s volcanic landscapes on modest budgets, while dreaming of a future
    immersion in Tokyo’s contemporary art districts and Marrakech’s colorful souks, always packing a sketchbook for impromptu visual journaling.
  culinary: Sheila Rabasco gravitates toward eclectic cuisine, regularly crafting avocado‑toast topped with roasted cherry tomatoes and feta, savoring a steaming bowl of miso ramen with silky pork belly,
    and experimenting with homemade sourdough starter infused with rosemary, while often dining at small, dimly lit Brooklyn cafés that serve craft coffee and artisanal pastries.
  core: Sheila Rabasco is a calm, competitively spirited 35‑year‑old visual artist who thrives on solitary, spontaneous creation, balances quirky disorganization with relentless curiosity, and channels
    a skeptical yet resilient outlook into every canvas.
background:
  cultural: Sheila grew up in a middle‑class white family in Brooklyn, New York, where the city’s cultural mosaic exposed her to a wide range of artistic movements from street art to contemporary museum
    exhibitions. Her parents encouraged independence and curiosity, providing access to public libraries and community art programs. The neighborhood’s eclectic mix of cultures, historic brownstones, and
    vibrant nightlife shaped her appreciation for novelty and abstract expression while reinforcing a pragmatic, self‑reliant outlook typical of urban New Yorkers.
