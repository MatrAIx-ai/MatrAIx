personas:
  professional: Marie Matthew, an aspiring young technologist, merges their curiosity for LEGO engineering and beginner robotics with a disciplined, organized mindset, turning every play session into a
    hands‑on lesson in problem‑solving and teamwork.
  sports: Marie Matthew dazzles as a forward for the Midtown Rangers youth soccer club, balances rigorous weekly drills with energetic hip‑hop dance classes that keep them flexible, and passionately cheers
    for the professional City United FC during weekend broadcasts.
  arts: Marie Matthew channels creativity through hip‑hop dance routines set to Ariana Grande’s chart‑topping hits, devours adventure series by Rick Riordan and sci‑fi favorites such as Ender’s Game, and
    delights in designing Minecraft skins inspired by the visual style of Studio Ghibli’s Spirited Away.
  travel: Marie Matthew enjoys family road trips to the state science museum and a sunny weekend at the coastal aquarium, and they dream of traveling to Tokyo’s Miraikan museum to explore cutting‑edge robotics
    and to the Grand Canyon for a breathtaking hike.
  culinary: Marie Matthew favors a classic pepperoni pizza and cheesy macaroni with extra cheese, loves helping their mom whisk chocolate chip pancakes on Saturday mornings, and insists on adding a splash
    of hot sauce to their homemade tacos for a bold flavor punch.
  core: Marie Matthew is a competitively curious 11‑year‑old who transforms soccer matches, LEGO builds, and strategic gaming into arenas for testing their skills, even if it sometimes means skipping a
    stretch before a game.
background:
  cultural: Marie lives in Haslet, a suburban community in Tarrant County, Texas. Her family is part of the broader white middle‑class American culture typical of the region, blending traditional Texan
    values such as community involvement, friendliness, and a modest rural‑suburban lifestyle with contemporary influences like school‑based STEM programs and youth sports leagues. She attends a public
    elementary school where multicultural events and Texan heritage celebrations expose her to a mix of local traditions, including barbecue gatherings, county fairs, and holiday parades. Her upbringing
    emphasizes independence, a strong work ethic, and respect for personal responsibility while encouraging participation in group activities and community service.
