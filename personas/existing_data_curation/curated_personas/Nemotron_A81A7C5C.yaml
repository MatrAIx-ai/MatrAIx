    ''Analytical software (Excel, Tableau, Python)'', ''Customer segmentation'']'
  hobbies: '[''Vegetable and rose gardening'', ''Hiking on Zumbro River Trail'', ''Reading non-fiction and marketing literature'', ''Knitting and quilting'', ''Cooking and baking'', ''Volunteering at health-education
    events'', ''Participating in a local book club'', ''Solving crosswords and sudoku puzzles'']'
  career_goals: Looking ahead, Patricia aims to transition into a senior executive role such as Vice President of Marketing where she can shape organization-wide, data-driven strategies. She seeks to champion
    mentorship programs that cultivate the next generation of marketers, embed sustainability and inclusive messaging into campaigns, and deepen the integration of analytics across all channels. Over the
    next 3-5 years she plans to lead a major digital transformation initiative for her company while also building a consulting practice focused on helping small Midwestern businesses adopt evidence-based
    marketing. Ultimately she envisions retiring with a legacy of empowered teams and a modest philanthropic portfolio that supports community education and health initiatives.
