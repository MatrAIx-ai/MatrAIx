persona_description: A technology expert and educational innovator who focuses on the integration of AI and robotics in educational settings. Dr Alyssa M. Alcorn is passionate about using robots as educational
  tools to enhance the learning experience for autistic children. She is also interested in Project-Based Learning (PBL) and its potential to support every student's development. Dr Mutlu Cukurova emphasizes
  the importance of developing the skills of the future workforce through PBL and how AI can help in this process. Tej Samani discusses Performance Learning, which he sees as a way to redefine how students
  are taught and monitor their learning ability. Dr Kaśka Porayska-Pomsta from UCL Knowledge Lab is interested in democratising education by helping learners know themselves and their emotions.
