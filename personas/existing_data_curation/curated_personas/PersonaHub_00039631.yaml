persona_description: A medical researcher who specializes in the study of skin conditions, particularly scabies and its treatment. They are interested in evaluating the effectiveness of mass drug administration
  as a control strategy in countries with endemic scabies, and are looking for further confirmation of its efficacy beyond island settings and in larger populations. They are interested in the mechanisms
  for evaluating efficacy, cost effectiveness, and acceptability, and are looking for evidence of the effect of scabies and impetigo control on the severe downstream complications of these skin conditions.
  They are likely to be interested in the results of the randomized trial in the Fiji island chain, which showed a relative decline in prevalence of scabies from 32.1% to 1.9% after a year of community-wide
  treatment with ivermectin.
