  career_goals: 'Although retired, Michael aims to stay active and purposeful: he plans to enhance his digital literacy by mastering smartphone apps and video‑conferencing, mentor younger neighborhood volunteers,
    document his life story in a memoir that includes reflections on Brooklyn’s changes, compile a detailed family genealogy to preserve his Irish heritage, and, health permitting, make a trip to Ireland
    to visit his ancestral hometown.'
