personas:
  professional: Justin Crawford, a senior investment strategist at a regional asset manager, blends rigorous quantitative finance expertise with a creative flair for visual storytelling, leveraging Python,
    R, and advanced Excel automation to design AI‑driven ESG portfolios while mentoring junior analysts through hands‑on workshops.
  sports: Justin Crawford, they are a member of the Springfield Tennis Club, playing competitive ladder matches in the spring, hiking the Ozark trails throughout summer, chanting for the St. Louis Cardinals
    during baseball season, and supporting the Kansas City Chiefs in the fall, while occasionally joining a local adult recreational softball league in winter.
  arts: Justin Crawford, they spend weekends immersed in abstract painting inspired by Jackson Pollock, experiment with long‑exposure photography echoing the visual style of William Eggleston, strum acoustic
    renditions of Joni Mitchell and B.B. King on their guitar, and attend live shows by indie folk artist Phoebe Bridgers and blues legend Keb’ Mo’ whenever possible.
  travel: Justin Crawford, they have hiked the Ozark National Scenic Riverways, taken a weekend road trip to the Lake of the Ozarks, visited the musically rich city of New Orleans, explored the historic
    canals of Bruges, and are plotting a future pilgrimage to Dublin to soak in its literary pubs.
  culinary: Justin Crawford, they love sampling seasonal craft brews while perfecting their own peppercorn bratwurst, create a weekly Sunday batch of homemade sourdough using rye and whole wheat, experiment
    with a mushroom‑bourguignon made with locally sourced button mushrooms and a splash of red wine, and occasionally indulge in a decadent tiramisu topped with espresso‑soaked ladyfingers.
  core: Justin Crawford, they weave together a disciplined analytical mind, a yearning for artistic expression, and a Midwestern community spirit, all while juggling a budget‑focused lifestyle, occasional
    back‑pain neglect, and a habit of midnight guitar sessions that keep the imagination humming.
background:
  cultural: Justin was raised in a middle-class white family in Greene County, Missouri. His upbringing reflects Midwestern values of hard work, reliability, and community spirit, with strong emphasis on
    education and practical problem solving. He grew up in a culturally mixed environment that blends traditional American Midwest customs - such as an appreciation for local sports, country and blues music,
    and community festivals - with exposure to broader national and global influences through his college STEM education and his career in finance. His family's heritage includes German and Irish roots,
    and his social circles in Republic and nearby Springfield have fostered a polite, outgoing demeanor and an openness to diverse ideas, especially in the arts and emerging technologies.
