  career_goals: Justin aims to progress to senior investment strategist and eventually become a chief investment officer within a top asset management firm. He aspires to lead a multidisciplinary team that
    integrates AI and machine learning into portfolio construction, to develop innovative ESG-focused investment products. In the longer term, he envisions launching his own boutique investment advisory
    that leverages data-driven insights while maintaining a client-centric, community-oriented approach. He also seeks to mentor emerging analysts and contribute thought leadership through industry conferences
    and publications.
