  skills: '[''Python'', ''JavaScript (React, Node.js)'', ''AWS/GCP cloud services'', ''Full‑stack web development'', ''Agile project management'', ''Technical writing and documentation'', ''User‑centred
    design'', ''Automated testing (unit, integration)'', ''Continuous integration/continuous deployment (CI/CD)'', ''Data analytics'', ''API design (REST, GraphQL)'', ''Mentoring and team leadership'']'
  hobbies: '[''Hiking'', ''Cycling'', ''Community theater acting'', ''Acoustic guitar'', ''Board game nights'', ''Gardening'', ''Reading contemporary literature'', ''Meditation'', ''Yoga'']'
  career_goals: William aims to transition from senior developer to technology leader within the next five years, ideally as a Chief Technology Officer of a small firm that creates digital solutions for
    rural communities like Platina. He wants to launch a platform that provides affordable tele‑health and remote‑education services, leveraging his software expertise and humanities perspective to ensure
    the tools are culturally resonant and accessible. Simultaneously, he intends to formalize a mentorship program for under‑represented coders in Shasta County and to author a book on integrating humanistic
    thinking into software development. Balancing his ambition with his tendency toward worry, he is also focused on building sustainable work habits and stress‑management practices that keep his high standards
    without compromising personal well‑being.
