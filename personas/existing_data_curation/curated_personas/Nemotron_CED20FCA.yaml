  hobbies: '[''Gardening'', ''Reading (Literary Classics, Cognitive Science)'', ''Puzzle Solving (Sudoku, Crosswords)'', ''Knitting'', ''Birdwatching'', ''Journaling'', ''Yoga and Meditation'']'
  career_goals: She aims to transition into a district‑level STEM curriculum specialist role where she can shape instructional practices across multiple schools. Leveraging her curiosity for emerging pedagogical
    research, she plans to secure grant funding for a regional robotics and environmental science program. Additionally, she aspires to earn a master’s degree in Educational Leadership, ultimately positioning
    herself for an assistant principal or department‑head position that would allow her to champion student well‑being and stress‑reduction initiatives.
