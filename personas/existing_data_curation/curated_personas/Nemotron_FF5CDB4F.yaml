  hobbies: '["Vintage motorcycle restoration", "Amateur radio (ham) operation", "Fishing at local lakes", "Attending Atlanta Braves baseball games", "Competitive strategy video gaming (StarCraft)", "DIY
    home repair projects", "Grilling Southern barbecue"]'
  career_goals: Horace aims to secure a stable, routine‑driven position that leverages his practical technical skills, such as a field service technician or maintenance supervisor for a manufacturing firm
    in the Atlanta area. He is pursuing certifications (e.g., CompTIA A+, Cisco CCT) to improve his job prospects and plans to build a reputation for reliability and efficiency. Long‑term, he hopes to transition
    into a small, owner‑operated repair business—perhaps focusing on home appliance or computer repair—where he can set his own schedules, maintain a predictable workflow, and apply his competitive nature
    to grow a loyal client base. He also intends to improve his organizational habits to better meet deadlines and increase his professional resilience.
