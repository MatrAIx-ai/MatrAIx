personas:
  professional: Rena Bussue, a budding LEGO architect, channels their intense imagination and meticulous organization into constructing elaborate, story‑driven LEGO cityscapes, applying an early‑stage mastery
    of spatial planning and color‑coding while proudly meeting the high standards they set for each masterpiece.
  sports: Rena Bussue, a spirited participant in their town’s Little League baseball team, the Cubs, and a seasonal snowflake‑shaped member of the local junior gymnastics club, delights in weekend nature
    hikes with the Girl Scouts, cheers for the hometown professional basketball team, the Eagles, while maintaining a disciplined practice schedule that mirrors their organized LEGO building sessions.
  arts: Rena Bussue, an enthusiastic watercolor painter, fills sketchbooks with myth‑inspired constellations and forest scenes, avidly listens to children’s storytellers like They Might Be Giants and Raffi,
    and curates a personal gallery of leaf collages, often reenacting the tales they read with imaginative role‑play games.
  travel: Rena Bussue, an inquisitive junior explorer, plans weekend trips to the nearby state park’s pine grove and the city science museum with the precision of a scrapbook entry, dreams of visiting the
    Grand Canyon and the historic ruins of Machu Picchu, and prefers guided nature walks that balance adventure with structured photo‑journal documentation.
  culinary: Rena Bussue, a budding kitchen helper, loves making peanut butter‑banana sandwiches, sprinkling cinnamon on oatmeal, and experimenting with bright fruit smoothies, proudly declares spaghetti
    with marinara as their favorite dinner, yet often sneaks extra gummy bears into their lunchbox despite their parents’ gentle reminders.
  core: Rena Bussue is a meticulously organized six‑year‑old whose boundless curiosity fuels elaborate LEGO worlds, disciplined saving habits, and a playful yet structured approach to health, sports, arts,
    travel, and food, all colored by a few cheeky sweet‑tooth indulgences.
background:
  cultural: Rena is a Black child growing up in Waldorf, Maryland, a suburban community near Washington, D.C. Her family embraces African‑American heritage through weekly gatherings that feature gospel
    music, storytelling, and traditional dishes. She participates in community events such as the Maryland African American Festival and school programs that highlight Black history and culture. These experiences
    nurture her appreciation for rhythmic music, oral narratives, and the strength of community bonds, influencing both her creative pursuits and her collaborative spirit.
