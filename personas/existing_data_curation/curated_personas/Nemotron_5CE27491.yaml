  career_goals: She aspires to become an astronaut or a museum curator who designs interactive exhibits, dreaming of exploring space and sharing scientific wonders through art. Rena wants to blend her love
    of science, imagination, and meticulous planning into a future career that creates novel learning experiences for children worldwide, ultimately leading projects that inspire curiosity and discovery.
