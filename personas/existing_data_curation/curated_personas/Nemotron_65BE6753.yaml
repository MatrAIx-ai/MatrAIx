personas:
  professional: Ramoncito Dang, a statistical analyst who leverages Bayesian inference and time‑series modeling to translate complex health data into actionable policy recommendations, balances their curiosity
    for innovative methods with a pragmatic, results‑focused mindset, and leads cross‑functional teams with organized yet flexible project management.
  sports: Ramoncito Dang, an avid basketball player at the West Hollywood Community Court, roots for the Los Angeles Lakers and LA Galaxy, and supplements team play with weekend hikes in the Santa Monica
    Mountains, using trail runs to maintain cardio fitness.
  arts: Ramoncito Dang, a photography enthusiast who captures LA’s neon‑lit streets with a Sony A7 III, draws aesthetic inspiration from Henri Cartier‑Bresson and Edward Burtynsky, and relaxes by listening
    to Tame Impala, Bonobo, and indie folk artist Phoebe Bridgers.
  travel: Ramoncito Dang, who blends family obligations with wanderlust, frequently flies to Ho Chi Minh City and Bali to visit relatives, has trekked the rice terraces of Ubud, and dreams of exploring
    Iceland’s geothermal landscapes while balancing travel costs with a disciplined savings plan.
  culinary: Ramoncito Dang, a home‑chef who enjoys reimagining traditional laksa and pho with smoked tofu, kaffir lime, and miso‑infused broth, experimentally layers Asian spices with Mediterranean herbs,
    and often cooks together with their spouse while streaming cooking shows on the Food Network.
  core: Ramoncito Dang embodies data‑driven curiosity tempered by practical discipline, balancing a love for urban photography, basketball, and experimental cooking with a steady march toward senior analytics
    leadership.
background:
  cultural: Ramoncito is a first‑generation American of Southeast Asian descent; his parents immigrated from the Philippines and maintained close ties to their cultural heritage. Growing up in the San Fernando
    Valley, he was raised bilingual in English and Tagalog, celebrating both American holidays and Filipino traditions such as Sinulog and the Feast of the Black Nazarene. The familial emphasis on education
    and community service shaped his collaborative yet self‑driven work ethic. He participates in local cultural festivals, supports Filipino community organizations, and incorporates the values of respect,
    resilience, and collective well‑being into both his personal and professional life.
attributes:
  skills: '[''Statistical modeling (regression, Bayesian inference, time‑series)'', ''Experimental design and survey methodology'', ''Python programming'', ''R programming'', ''SQL data extraction and manipulation'',
    ''Data visualization (Tableau, Power BI, ggplot2)'', ''Statistical software (SAS, SPSS, Stata)'', ''Data cleaning and preprocessing'', ''Machine‑learning basics (classification, clustering)'', ''Data
    storytelling and presentation'', ''Project management'', ''Collaborative teamwork'']'
  hobbies: '[''Hiking in the Santa Monica Mountains'', ''Yoga and meditation'', ''Cooking Southeast Asian cuisine with modern twists'', ''Playing basketball at local courts'', ''Board‑game nights with friends'',
    ''Urban photography'', ''Traveling to visit family in Southeast Asia'', ''Volunteering data analysis for community‑health nonprofits'', ''Reading non‑fiction on psychology and data ethics'']'
  career_goals: Ramoncito aims to advance to a senior analytics leadership role within the next five years, where he can shape data‑driven strategies for public‑health or technology organizations. He plans
    to complete a master’s degree in Biostatistics or Data Science to deepen his methodological expertise, and he intends to earn the ASA Certified Statistician credential. He is passionate about mentoring
    junior analysts, building robust analytical pipelines, and translating statistical insights into policies that improve community health outcomes. Balancing career growth with family life, he seeks opportunities
    that allow remote flexibility and meaningful impact.
