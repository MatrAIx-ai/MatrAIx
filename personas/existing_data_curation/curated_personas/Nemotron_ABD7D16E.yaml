personas:
  professional: Brianna Hamilton, a diligent 13‑year‑old student and aspiring field hockey captain, leverages their methodical planning skills and love of puzzles to excel in school projects, coordinate
    Girl Scout service initiatives, and embody the community‑oriented work ethic of their hometown.
  sports: Brianna Hamilton plays midfield on their high‑school field hockey team, follows the Indiana Pacers and Chicago Cubs as favorite professional franchises, and spends weekends jogging at the community
    park and practicing drills with the local Girl Scouts’ outdoor adventure club, demonstrating a team‑oriented mindset and disciplined fitness routine.
  arts: Brianna Hamilton, an avid piano player, frequently practices Beethoven’s "Für Elise" and contemporary pieces by Ludovico Einaudi, while devouring mystery series like "The Mysterious Benedict Society,"
    and finding inspiration in the works of painter Claude Monet and the performances of Broadway star Lin‑Manuel Miranda.
  travel: Brianna Hamilton enjoys day trips to the nearby Elkhart County Fairgrounds and weekend getaways to Cedar Point amusement park, dreams of exploring the historic sites of Washington, D.C., and hopes
    to one day experience the canals of Amsterdam, balancing a love of local community events with a budding curiosity for international culture.
  culinary: Brianna Hamilton loves baking chocolate chip cookies and vanilla cupcakes with family, frequently adds fresh strawberries to desserts, experiments with Midwestern comfort foods like cornbread
    and apple pie, and enjoys preparing simple meals featuring chicken tenders, cheddar cheese, and seasonal vegetables, reflecting a practical yet enthusiastic approach to cooking.
  core: Brianna Hamilton is a structured, community‑focused teen who balances disciplined school and sports commitments with a love of puzzles, piano, and baking, while occasionally indulging in spontaneous
    video‑game marathons.
background:
  cultural: Brianna was raised in Goshen, Indiana, a small Midwestern town known for its close-knit community, agricultural heritage, and a blend of German-American and broader Anglo-American cultural influences.
    Her family participates in local traditions such as the Elkhart County Fair, community church events, and high-school sports gatherings. Growing up in this environment, she values hard work, modesty,
    and community service, often volunteering at churches and local charities. The regional culture emphasizes family meals, seasonal celebrations like Thanksgiving and Fourth of July parades, and a supportive
    school community, all of which have shaped Brianna’s respectful and cooperative outlook.
