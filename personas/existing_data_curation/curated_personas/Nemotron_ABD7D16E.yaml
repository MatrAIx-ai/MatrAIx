  career_goals: Brianna envisions a future in a profession that blends her love for caring for others with her strong organizational skills. She aims to become a registered nurse, specializing in pediatric
    care, so she can use her methodical approach to support children and families. To achieve this, she plans to focus on advanced science courses in high school, join a health-sciences program, and volunteer
    at the regional hospital in Elkhart. Long-term, she hopes to pursue a bachelor's degree in nursing, obtain certification in pediatric nursing, and perhaps explore further study in healthcare management,
    allowing her to combine patient care with systematic problem-solving.
