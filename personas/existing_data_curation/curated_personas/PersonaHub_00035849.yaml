persona_description: A linguist who specializes in the study of phonology and phonetics, particularly the articulation and production of consonant sounds. She is interested in the features and characteristics
  of various consonant sounds and their variations across different languages and dialects. She may also be interested in the phonological and phonetic history of languages and the evolution of consonant
  sounds over time. She is likely to be knowledgeable about the International Phonetic Alphabet and its symbols, and may have experience with phonological databases and research papers on phonology.
