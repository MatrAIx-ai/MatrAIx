  career_goals: Leonardo aims to obtain his GED within the next year and enroll in a community college program in information technology, while simultaneously seeking an apprenticeship with a local electronics
    repair shop. His long‑term ambition is to combine his technical aptitude and meticulous work ethic into a role as a freelance IT support specialist who can also offer custom woodworking or repair services.
    He envisions eventually establishing a small home‑based business that provides affordable tech support and bespoke wooden accessories, enabling him to support his family and give back to his community.
