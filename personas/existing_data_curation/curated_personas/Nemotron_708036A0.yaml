personas:
  professional: Annette Arauz, a retired K‑12 educator turned community mentor, leverages three decades of curriculum design, grant writing, and teacher mentorship to methodically guide new teachers, lead
    genealogy workshops, and shape senior‑wellness initiatives with the same organized precision she once applied to lesson planning.
  sports: Annette Arauz stays fit through daily lakeside walks in The Villages, participates in a senior pickleball league at the community center, and cheers on the Orlando Magic and the local The Villages
    Lions baseball team, while avoiding high‑impact activities that could aggravate their arthritis.
  arts: Annette Arauz finds solace in classic literature, regularly rereading Jane Austen and Laura Hillenbrand, enjoys listening to Beethoven's Symphony No. 9 while quilting, and attends community theater
    productions of "Our Town" featuring local actors like Susan Whitaker.
  travel: Annette Arauz plans leisurely, historically‑rich trips, having explored Colonial Williamsburg, Savannah's riverfront, and the historic districts of St. Augustine, while dreaming of a future pilgrimage
    to Seville, Spain, to trace distant family roots discovered through genealogy research.
  culinary: Annette Arauz delights in baking family‑heritage desserts such as lemon chiffon cake and apple crumble, seasons herb‑roasted chicken with fresh rosemary and thyme from their garden, and enjoys
    preparing classic comfort meals like chicken noodle soup, all with a confident yet modest kitchen skill set.
  core: Annette Arauz, a methodical 70‑year‑old retiree, blends routine‑driven gardening, quilting, and genealogy with a quiet determination to mentor educators and support senior wellness, all while occasionally
    misplacing their reading glasses during bridge games.
background:
  cultural: Annette is a third‑generation American of Irish and German ancestry, raised in a Midwestern small town where Protestant (Methodist) values emphasized community service, modesty, and practicality.
    Her upbringing instilled a respect for tradition, a strong work ethic, and an appreciation for routine. After a lifelong career in education, she relocated to The Villages, Florida, where she blends
    her Midwestern roots with the Southern hospitality and active‑adult culture of her retirement community.
