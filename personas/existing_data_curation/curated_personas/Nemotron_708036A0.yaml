  hobbies: '[''Gardening'', ''Quilting'', ''Reading classic literature'', ''Genealogy research'', ''Bridge (card game)'', ''Church study group'', ''Volunteer literacy tutoring'', ''Cooking family recipes'',
    ''Walking'']'
  career_goals: Although retired, Annette aims to stay active in education by mentoring newly qualified teachers through a local teachers’ association, volunteering as a literacy tutor at the senior center,
    and leading a genealogy outreach program at the community library. She also hopes to author a memoir that captures her experiences in the classroom and her family’s heritage, and to serve on the board
    of a nonprofit focused on senior wellness and lifelong learning.
