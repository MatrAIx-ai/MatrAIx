    at senior center'']'
  career_goals: Barbara aims to transition from front‑line serving to a supervisory role within the next two to three years, seeking a position such as shift manager or food‑service coordinator that offers
    a more predictable schedule and greater responsibility. She plans to obtain a certified food‑safety supervisor credential and to develop leadership skills through on‑the‑job training and a short community‑college
    management course. Long‑term, she hopes to mentor new staff members, improve operational efficiency at her workplace, and secure a stable income that will support a comfortable retirement while allowing
    her to reduce daily stressors.
