personas:
  professional: Manuel Perezperez, a 24‑year‑old civil engineering graduate, harnesses AutoCAD, Revit, MATLAB, and Python to devise sustainable infrastructure designs, and they apply their methodical, detail‑oriented
    mindset and bilingual communication skills to project scheduling and client liaison, and they hope to mentor fellow engineers from underrepresented backgrounds.
  sports: Manuel Perezperez embraces solo hikes in the Rocky Mountains and weekly trail runs with the Denver Hiking Club, and they cheer on the Colorado Avalanche and Denver Broncos as their favorite professional
    teams.
  arts: Manuel Perezperez captures dramatic landscape photos inspired by Ansel Adams, strums acoustic guitar renditions of Bob Dylan and Ed Sheeran, and they unwind with sci‑fi novels by William Gibson
    and binge‑watching 'The Expanse'.
  travel: Manuel Perezperez meticulously plans photo‑centric trips, having trekked through Zion, Bryce Canyon, and Yosemite, and they aspire to explore Patagonia’s Torres del Paine and Iceland’s glacier‑filled
    terrain.
  culinary: Manuel Perezperez routinely prepares homemade pupusas filled with fresh cheese, beans, and loroco, crafts tamales using masa, pork, and spicy salsa verde, and they experiment with locally sourced
    corn and herbs to elevate traditional flavors.
  core: Manuel Perezperez balances a precise engineering mindset with sunrise hikes, late‑night guitar sessions, and a habit of forgetting to water houseplants until the soil cracks dry.
background:
  cultural: Manuel is a second‑generation Salvadoran‑American who grew up bilingual, speaking Spanish at home and English at school. He celebrates Salvadoran holidays such as Día de la Independencia with
    family, participates in a local Catholic parish, and maintains strong ties to relatives in El Salvador. His cultural heritage informs his collaborative and family‑oriented values, which he blends with
    the outdoor, active lifestyle of Denver.
attributes:
  skills: '[''AutoCAD'', ''Revit'', ''MATLAB'', ''Python (basic)'', ''Structural analysis'', ''Project scheduling'', ''Technical documentation'', ''Bilingual communication (Spanish/English)'']'
  hobbies: '[''Hiking'', ''Landscape photography'', ''Cooking Salvadoran cuisine'', ''Acoustic guitar'', ''Science‑fiction reading'', ''Community volunteering (computer literacy)'']'
  career_goals: Manuel aims to finish his bachelor's degree in civil engineering, pass the Fundamentals of Engineering exam, and earn his Professional Engineer (PE) license. Over the next five years he
    hopes to specialize in sustainable infrastructure, such as green building and water management projects, and to move into a project‑manager role where he can lead community‑focused initiatives. He also
    aspires to mentor other Latino engineers and promote greater diversity within his field.
