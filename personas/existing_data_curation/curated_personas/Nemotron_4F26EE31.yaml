personas:
  professional: Mayra Campos, a retired bilingual community arts facilitator, channels their methodical planning, imaginative flair, and competitive edge into creating senior‑focused art workshops at the
    San Bernardino Community Center that fuse folk motifs with contemporary abstract techniques, ensuring every class runs on schedule and attracts top‑scoring participants.
  sports: Mayra Campos maintains fitness through Saturday walking tours of historic San Bernardino neighborhoods, supports the Los Angeles Dodgers in spring and the LA Lakers during basketball season, and
    participates in low‑impact tai chi sessions at the senior center, favoring gentle movement over competitive sports.
  arts: Mayra Campos finds inspiration in the vibrant murals of Maya Ramirez, the lyrical ballads of singer‑songwriter Jorge Alvarez, and the evocative performances of actress Sofia Ortega, regularly attending
    the San Bernardino Arts Walk and curating community exhibitions that showcase local folk‑art and contemporary abstracts.
  travel: Mayra Campos favors thoughtfully scheduled cultural voyages, often blending a pilgrimage to their ancestral hometown in Jalisco with relaxed beach retreats in Cabo, while also enjoying weekend
    road trips to Joshua Tree National Park and the historic missions of San Juan Capistrano.
  culinary: Mayra Campos excels at preparing aromatic mole negro using ancho chilies, dark chocolate, and roasted sesame, loves to infuse tamales with fresh epazote from their balcony garden, and delights
    in experimenting with smoky chipotle‑infused salsa verde, all served at lively community potlucks.
  core: Mayra Campos is a fiercely organized, creatively curious retiree who channels competitive energy into senior arts mentorship, habitually hoards extra paint tubes, and sometimes forgets to water
    their herb garden during long photography outings.
background:
  cultural: Mayra was born to Mexican immigrant parents who settled in the Inland Empire during the 1960s. Raised in a bilingual household, she grew up celebrating Día de los Muertos, Las Posadas, and quinceañeras,
    and the Catholic faith played a central role in family life. The values of communal reciprocity and respect for tradition were reinforced by close ties to the local Mexican‑American community in San
    Bernardino, where she still attends the parish and neighborhood festivals. While she has embraced many aspects of American culture, her Mexican heritage remains a daily presence through language, cuisine,
    music, and the stories of her ancestors from Jalisco. This blend of cultures informs her identity and fuels her desire to preserve and share Mexican traditions with younger generations.
