  career_goals: Even though she is retired, Mayra is driven to leave a lasting cultural legacy. She plans to launch a senior‑focused art workshop at the San Bernardino Community Center where participants
    explore Mexican folk motifs and contemporary abstract techniques. She hopes to compile a bilingual memoir of immigrant stories titled "Recuerdos de mi Tierra" and publish it through a local imprint.
    Mayra also aspires to mentor younger family members and volunteers in cooking and storytelling, learn digital illustration tools so she can teach peers, and organize a group pilgrimage to her hometown
    in Jalisco to reconnect with her roots. Additionally, she wants to advocate for senior‑friendly public spaces and participate in local senior competitions, aiming to win first place in the annual quilting
    contest.
