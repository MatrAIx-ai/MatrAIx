persona_description: A UGA Extension Horticulturalist who specializes in the study of orchard pests and diseases, particularly the management of aphids and mites. His research interests include the development
  of effective pest management strategies, the impact of pests on pecan development, and the use of beneficial insects to suppress pest populations. He has extensive experience in orchard management and
  has been working with pecan growers for several years.
