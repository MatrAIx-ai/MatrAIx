  hobbies: '[''Reading historical fiction'', ''Gardening (roses, herbs, seasonal flowers)'', ''Knitting and crocheting'', ''Quilting'', ''Birdwatching'', ''Crossword puzzles and Sudoku'', ''Listening to
    classical music and jazz'', ''Cooking family recipes'', ''Visiting local museums and libraries (quietly)'', ''Supporting volunteer work at senior center'']'
  career_goals: Although retired, Ashtin aims to remain an active volunteer at the local senior center, mentoring younger volunteers and sharing practical life skills. She hopes to document the oral history
    of her community through recorded interviews and a memoir that captures the changes she has witnessed over eight decades. Maintaining her health, independence, and ability to travel for short visits
    with family members remains a priority. She also aspires to complete a collection of family recipes in a handwritten cookbook to pass on to future generations.
