personas:
  professional: A seasoned healthcare social worker, Lanel Acosta leverages bilingual communication and trauma‑informed case management to empower underserved clients while navigating high‑stress crises,
    yet occasional disorganization in documentation reveals a tension between curiosity for innovative therapies and a practical, results‑oriented mindset that they strive to balance.
  sports: Lanel Acosta finds solace in solitary morning hikes along the foothills, practices yoga twice weekly at a nearby studio, and they quietly support the San Francisco Giants while participating in
    a community walking group, balancing a low‑key fitness routine with an occasional reluctance to join organized team sports.
  arts: Lanel Acosta, an avid reader of contemporary Latin American literature and psychology, channels curiosity into nature photography, devotes evenings to mental‑health podcasts, and they draw artistic
    inspiration from the poetry of Jorge Luis Borges, the guitar virtuosity of Andrés Segovia, and the films of Wim Wenders.
  travel: At 46, Lanel Acosta prefers low‑traffic, nature‑focused trips such as weekend escapes to Yosemite, a mindful retreat in Sedona, and a planned cultural tour of Lima’s historic districts, and they
    balance a thirst for exploration with a cautious budget and an aversion to crowded airports.
  culinary: Lanel Acosta experiments with traditional family recipes like mole sauce, tamales, and atole, while they tend a modest herb garden that flavors their meals, yet occasional forgetfulness leads
    to burned dishes and a fallback on quick‑cook staples like canned beans and rice.
  core: Lanel Acosta blends relentless curiosity with a laid‑back, sometimes disorganized demeanor, and they navigate a demanding social‑work career and personal anxiety through mindfulness, gardening,
    and spontaneous culinary experiments.
background:
  cultural: Lanel grew up in a bicultural Mexican‑American family in the Bay Area, speaking both Spanish and English at home. Her upbringing emphasized close family ties, respect for elders, and community
    solidarity, values that continue to shape her professional ethos. She celebrates Mexican traditions such as Día de los Muertos and the culinary heritage of her parents, while also navigating the broader
    American cultural landscape of San Jose. This dual perspective fuels her commitment to addressing health disparities that disproportionately affect Latino populations, and informs her culturally sensitive
    approach to social work.
attributes:
  skills: '["Case Management", "Crisis Intervention", "Bilingual Spanish-English Communication", "Community Resource Navigation", "Cultural Competency in Latino Health", "Trauma-Informed Care", "Support
