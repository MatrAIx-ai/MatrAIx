  hobbies: '["Reading (psychology, health policy, Mexican literature)", "Cooking traditional Mexican dishes", "Gardening", "Walking/hiking in local parks", "Yoga and meditation", "Participating in small
    community support groups", "Nature photography", "Listening to podcasts on mental health and social work", "DIY home organization projects"]'
  career_goals: Lanel aims to earn a bachelor’s degree in Social Work within the next two years, progressing toward licensure as a clinical social worker (LCSW). She envisions leading a community‑based
    mental health program that offers culturally tailored services for Mexican‑American families in the Bay Area. Her long‑term ambition is to influence public health policy to reduce healthcare inequities
    for undocumented immigrants, while also establishing a supportive network that fosters her own emotional resilience and work‑life balance.
