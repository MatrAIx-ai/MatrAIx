  career_goals: Randall aspires to bridge technology and artistic expression in a role that fuels innovation. In the short term, he aims to secure a position as a product designer or innovation strategist
    at a forward‑thinking tech company, where he can lead cross‑functional teams to develop immersive, user‑centred experiences. Over the next five years, he envisions launching his own creative‑tech startup
    focused on VR/AR storytelling platforms that empower independent artists and educators. He also plans to deepen his expertise through a part‑time master's program in Human‑Computer Interaction and to
    become a recognized thought leader in the creative coding community, speaking at conferences and contributing to open‑source projects.
