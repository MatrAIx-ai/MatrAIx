  hobbies: '[''Heirloom gardening'', ''Birdwatching'', ''Historical mystery novels'', ''Quilting and patchwork'', ''Genealogy research'', ''Hiking local Appalachian trails'', ''Fishing'', ''Bridge (card
    game)'', ''Crossword puzzles'', ''Local craft fairs'']'
  career_goals: Approaching retirement, Glori aims to transition into a supervisory role where she can formalize her mentorship of younger employees and champion safety and efficiency initiatives. She plans
    to earn an OSHA 30‑hour certification and lead a small continuous‑improvement team that implements low‑cost process tweaks. In the longer term, she hopes to leverage her production knowledge into a
    modest home‑based venture—such as crafting custom quilts or garden accessories—allowing her to stay productive while enjoying the flexibility she values.
