personas:
  professional: Glori Fitzgerald, a 58‑year‑old production floor veteran, leverages decades of hands‑on machinery expertise and data‑driven lean‑manufacturing instincts to mentor newcomers, champion safety,
    and systematically hunt for low‑cost process improvements, all while preferring flexible, unstructured problem‑solving over rigid planning.
  sports: Glori Fitzgerald enjoys low‑key outdoor pursuits, hiking local Appalachian Trail segments each spring, fishing the nearby Shenandoah River for largemouth bass, follows the Pittsburgh Steelers
    and West Virginia Mountaineers with a competitive edge, and belongs to the Appalachian Trail Conservancy hiking club, preferring a leisurely cadence over intense training.
  arts: Glori Fitzgerald finds inspiration in Appalachian folk arts, weaving historic quilting patterns drawn from Mary Bird’s folk designs, listening to mandolin‑driven ballads by Doc Watson and modern
    folk singer Rhiannon Giddens while browsing the East Tennessee Folk Art Fair, and immersing themselves in the historical mystery novels of Ellis Peters and C.J. Sansom for narrative intrigue.
  travel: Glori Fitzgerald favors solitary, flexible travel itineraries that blend heritage and nature, often planning week‑long road trips to sites like the Blue Ridge Parkway, Colonial Williamsburg, and
    Savannah’s historic district, while budgeting modestly from a dedicated travel fund and allowing spontaneous detours to craft fairs or bird‑watching hotspots when curiosity strikes.
  culinary: Glori Fitzgerald delights in cooking garden‑fresh dishes, regularly preparing heirloom tomato gazpacho, sautéed collard greens with smoked ham hocks, and blackberry crumble using home‑grown
    berries, while their modest culinary skill keeps brunch gatherings comfortable but occasionally results in over‑seasoned dishes due to their habit of measuring spices by intuition rather than precision.
  core: Glori Fitzgerald blends relentless curiosity with practical hands‑on expertise, prefers solitary, flexible pursuits, and channels a skeptical, competitive edge into mentoring and modest home‑based
    ventures.
background:
  cultural: Glori was raised in the rural Appalachian region of Tennessee, a cultural setting marked by self‑reliance, close‑knit family ties, and a strong work ethic rooted in the area's historic coal‑mining
    and farming communities. The local church and community events have reinforced a respect for tradition while also fostering a pragmatic outlook on life. This background has shaped her practical approach
    to work, her preference for small, familiar gatherings, and her appreciation for the simple, hands‑on activities that connect her to the land and her heritage.
attributes:
  skills: '[''Machinery operation (CNC, stamping presses)'', ''Preventive maintenance and minor repairs'', ''Quality control inspection'', ''Lean manufacturing principles'', ''Process troubleshooting'',
