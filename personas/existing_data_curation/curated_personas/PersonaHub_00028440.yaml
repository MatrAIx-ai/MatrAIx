persona_description: A researcher from the University of California at Santa Cruz who specializes in developing smartphone apps for partially-sighted users. The app they developed, called "Photo Guide,"
  helps users take perfect photographs without needing to see what's in front of them, by guiding them through the process of framing the shot. The app is voice-controlled and uses audio cues to count the
  number of people in the frame before the shot is taken, allowing the user to get everyone in shot and explain whether the subjects are in focus. The app also records the user within that 30 second window
  and the user can choose to save that audio file in combination with the photo to help with organization or photo sharing. The app hasn't been made available to the public yet, but the UCSC research team
  will present the findings of their study at the Pervasive Technologies Related to Assistive Environments conference in Rhodes, Greece, later this month.
