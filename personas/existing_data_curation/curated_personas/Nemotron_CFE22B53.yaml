  hobbies: '[''Hiking'', ''Gardening'', ''Photography (black-and-white portrait)'', ''Yoga and Pilates'', ''Reading (science non-fiction, historical novels)'', ''Book club participation'', ''Volunteering
    at community health fairs'', ''Cooking healthy meals'']'
  career_goals: Gena aims to advance into a supervisory or managerial role within her radiology department, overseeing operations, staff development, and quality assurance programs. She plans to obtain
    advanced certifications in MRI and mammography, and is pursuing a Master's degree in Health Physics to deepen her expertise in radiation safety. Gena is interested in leading research initiatives focused
    on dose reduction and imaging workflow efficiency, and aspires to contribute to professional societies, present at conferences, and eventually mentor the next generation of technologists through adjunct
    teaching positions.
