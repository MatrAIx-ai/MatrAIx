personas:
  professional: Gena Crowe, a certified radiologic technologist with a mastery of X‑ray, CT, MRI, and mammography, leverages their meticulous organization and curiosity to lead quality‑improvement initiatives
    and mentor junior staff while pursuing a Master’s in Health Physics.
  sports: Gena Crowe enjoys seasonal coastal hikes on the Connecticut shoreline, is a member of the Westport Hikers Club, follows the New England Patriots and Boston Red Sox for their community spirit,
    and practices yoga and Pilates twice weekly at a local studio to maintain flexibility and core strength.
  arts: Gena Crowe finds creative release in black‑and‑white portrait photography, inspired by Ansel Adams and Diane Arbus, spends evenings reading historical novels by Ken Follett, and attends local performances
    of the theater troupe that stages Shakespeare’s plays in the town’s historic hall.
  travel: Gena Crowe prefers well‑planned weekend getaways that mix nature and cultural depth, having explored the lighthouses of Maine, ski‑tripped to Stowe, Vermont, and visited Kyoto for its serene gardens,
    while always reserving a future visit to Dublin to trace family anecdotes shared at town gatherings.
  culinary: Gena Crowe cooks a seasonal garden‑to‑table menu centered on roasted beet and goat‑cheese salads, grilled salmon with rosemary, and classic New England clam chowder, yet admits a guilty pleasure
    of ordering take‑out sushi on rainy evenings when the garden is too damp.
  core: Gena Crowe blends disciplined professionalism with quiet curiosity, balancing meticulous work in radiology with a love for photography, garden‑grown meals, and community service, while occasionally
    surrendering to the allure of a weekend cheese board.
background:
  cultural: Gena grew up in a middle-class New England family of English and Irish ancestry. The cultural values of her community—emphasis on education, self-reliance, and civic responsibility—have shaped
    her disciplined work ethic and commitment to public service. Living in Westport, a historically affluent town in Fairfield County, she is influenced by a culture that values professionalism, modesty,
    and active community involvement. Her upbringing combined a respect for scientific inquiry with a strong sense of neighborhood cooperation, which informs her balanced approach to both personal and professional
    life.
attributes:
