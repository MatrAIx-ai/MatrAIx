personas:
  professional: Jacqueline Cooper, a veteran statistician and data strategist, leverages forty years of expertise in experimental design, predictive modeling, and data visualization using R, SAS, SQL, Tableau,
    and Power BI to mentor emerging analysts and lead community data initiatives, applying her structured yet adaptable mindset and compassionate, collaborative style.
  sports: Jacqueline Cooper stays active through daily walks with the local bird‑watching club, occasional light jogging, and gentle yoga at the senior center; they cheer on the Nebraska Cornhuskers football
    team and attend Lincoln Saltdogs baseball games with friends, following a structured yet flexible fitness schedule that accommodates joint pain and prioritizes low‑impact activities over high‑intensity
    sports.
  arts: Jacqueline Cooper weaves cultural heritage into quilting, creating intricate panels inspired by historic storytelling, while devouring historical fiction and biographies by authors such as David McCullough
    and Philippa Gregory; they unwind listening to jazz piano legends Bill Evans and Duke Ellington, and attend community theater productions starring local actors like Marisa Ortiz, which fuels their creative
    spirit and connects them to a broader artistic community.
  travel: Jacqueline Cooper’s travel style blends meticulous planning with a love for spontaneous detours, favoring road trips across Nebraska to places like the Sandhills and historic sites in Savannah,
    Georgia, while dreaming of a culinary pilgrimage to the Tuscan countryside and a scenic retreat in the Scottish Highlands; budget constraints and health considerations keep trips under a week, but they
    relish each destination’s local food markets and historic museums.
  culinary: Jacqueline Cooper delights in cooking soulful Southern dishes such as fried chicken, collard greens, cornbread, and sweet potato pie, often incorporating fresh herbs—basil, thyme, and rosemary—from
    her garden; their cooking skill is advanced, yet they sometimes over‑salt the stew when anxious, and they enjoy sharing meals with bridge club friends, turning dinner into a communal storytelling event.
  core: Jacqueline Cooper blends disciplined analytical expertise with a garden‑scented, quilting‑rich life, navigating worry‑filled moments through community, compassion, and a steady rhythm of data mentorship,
    seasonal sports, and soulful cooking.
background:
  cultural: Jacqueline grew up in the Midwest during the post‑World War II era, immersed in a close‑knit Black community that emphasized mutual support, church involvement, and cultural pride. Her parents
    instilled in her the values of hard work, education, and collective responsibility, which guided her pursuit of a business degree and a career in statistics—a field where she could contribute to societal
    progress. Experiencing the civil‑rights movement firsthand shaped her deep compassion and commitment to equity, evident in her ongoing volunteer work and mentorship. In her daily life, she weaves cultural
    traditions—such as gospel music, soul food cooking, and storytelling—into family gatherings and community events, preserving her heritage while fostering intergenerational bonds. Her marital partnership,
    spanning decades, reflects a shared dedication to stability and community service, reinforcing her preference for structured yet adaptable living.
attributes:
  skills: '[''Statistical analysis'', ''Predictive modeling'', ''R programming'', ''SAS'', ''SQL'', ''Advanced Excel'', ''Data visualization (Tableau, Power BI)'', ''Experimental design'', ''Project management'',
    ''Mentoring and coaching'', ''Community data outreach'']'
  hobbies: '[''Gardening'', ''Quilting'', ''Reading historical fiction and African-American biographies'', ''Bridge'', ''Community volunteering'', ''Cooking traditional Southern cuisine'', ''Birdwatching'']'
  career_goals: At this stage of her life, Jacqueline aims to pivot from full‑time employment to a mentorship‑focused role, offering guidance to emerging statisticians through workshops and one‑on‑one coaching.
    She is passionate about applying her analytical skills to benefit local non‑profits, especially those addressing health disparities and educational equity in Lincoln and surrounding Lancaster County.
    Her long‑term ambition includes establishing a community data‑literacy program that empowers residents to interpret local statistics, thereby fostering informed civic participation. She also hopes to
    co‑author a reflective memoir that weaves together her professional journey with the social changes she has witnessed, inspiring future generations of Black women in STEM.
