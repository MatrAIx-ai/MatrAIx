  career_goals: Tayla aims to progress into a senior leadership role such as Director of Investment Strategy or Chief Investment Officer within the next five years, where she can shape sustainable investment
    policies and mentor a diverse team of analysts. She is passionate about championing inclusive finance initiatives that address under‑served communities in the South, and she envisions launching a regional
    impact‑investment fund that leverages her expertise in ESG and community development. Additionally, she aspires to earn the CFA charter and contribute thought leadership through industry publications
    and speaking engagements at finance conferences.
