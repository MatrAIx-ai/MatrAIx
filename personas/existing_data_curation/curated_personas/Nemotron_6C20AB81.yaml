personas:
  professional: Beauford Muco, an 81‑year‑old retired handyman who now mentors seniors, weaves their woodworking, garden, and troubleshooting skills into lively community workshops and informal consulting
    for local small‑business owners, even though their spontaneous nature sometimes clashes with the need for structured planning.
  sports: Beauford Muco is a devoted supporter of the Portland Timbers and Trail Blazers, hikes the Columbia River Gorge with the Columbia Gorge Explorers club every weekend, and treats the weekly senior
    bridge tournament as their mental sport, all while occasionally joining the local senior softball league for summer fun.
  arts: Beauford Muco regularly visits Mississippi Studios to catch live shows by The Decemberists and local folk acts, spins their collection of Bob Dylan vinyl on a vintage turntable, enjoys streaming
    productions from the National Theatre, and ends their evenings with classic jazz albums by Miles Davis.
  travel: Beauford Muco favors relaxed road trips in their vintage sedan, has already explored Cannon Beach on the Oregon Coast and the waterfalls of Crater Lake, dreams of a guided Yellowstone wildlife
    safari with their spouse, and plans each outing around their bridge club’s schedule to avoid conflicts.
  culinary: Beauford Muco, an avid gardener‑chef, revels in making fresh heirloom tomato gazpacho, pairs their smoked salmon toast with Deschutes Black Butte IPA, experiments with homemade pickles and kimchi,
    yet often over‑season dishes with extra chili flakes in their enthusiasm.
  core: Beauford Muco is a gregarious, garden‑loving octogenarian who blends spontaneous storytelling with a habit of procrastination, turning every community gathering into a lively, slightly chaotic celebration.
background:
  cultural: Beauford is a white American who grew up in the post‑war Midwest before relocating to Portland in his mid‑forties. His upbringing emphasized a Protestant work ethic, self‑reliance, and a do‑it‑yourself
    mindset. In Portland, he adopted the city’s progressive, environmentally aware culture, becoming an active participant in community initiatives and embracing the region’s appreciation for artisanal
    food and outdoor recreation, while still valuing the practical, straightforward approach of his earlier years.
attributes:
  skills: '["Home repair", "Woodworking", "Gardening", "Basic mechanical troubleshooting", "Business advising", "Public speaking", "Event hosting", "Mentoring", "Storytelling", "Cooking"]'
