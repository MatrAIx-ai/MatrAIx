  career_goals: Even though he is retired, Beauford remains goal‑oriented. He aims to document his life story in a memoir, learn digital storytelling tools, and develop a small blog for sharing his gardening
    tips. He also wants to expand his volunteer leadership at the local senior center, champion accessible public spaces in Portland, and travel with his wife to a few national parks each year, especially
    the Oregon Coast and Yellowstone.
