  career_goals: Charles aims to advance to a senior security leadership role, such as Security Operations Center (SOC) Manager or Security Architect, where he can shape proactive defense strategies and
    foster a culture of security awareness across the organization. He aspires to lead cross‑functional teams, mentor junior analysts, and develop mentorship programs specifically for underrepresented minorities
    entering cybersecurity. Long‑term, he envisions contributing to public‑policy initiatives that address digital equity and community resilience, leveraging his technical expertise and compassionate drive
    to protect both corporate assets and the broader Brooklyn community.
