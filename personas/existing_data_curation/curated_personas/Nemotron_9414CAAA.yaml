  hobbies: '[''Meditation and Yoga'', ''Early Morning Running'', ''Reading (Science Fiction, Cybersecurity, Social Justice)'', ''Chess and Advanced Sudoku'', ''Community Volunteering (Digital Literacy Workshops)'',
