persona_description: A Gastroenterologist is a healthcare professional who specializes in the diagnosis, treatment, and prevention of diseases of the digestive system. They are concerned with the normal
  function of the digestive system and are trained in performing tests and interpreting results to diagnose and treat various digestive disorders. A Gastroenterologist is likely to work in a clinic, hospital,
  or private practice and may specialize in colon screening, intestinal dilation, and polypectomies. They may also perform endoscopic procedures such as colonoscopies to diagnose and treat conditions of
  the digestive tract.
