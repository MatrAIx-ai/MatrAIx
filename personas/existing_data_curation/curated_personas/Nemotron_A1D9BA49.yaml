  career_goals: Bernard aims to transition from frontline retail to a leadership role that blends his educational background with his sales experience. In the short term, he seeks an Assistant Store Manager
    position at a boutique art‑supplies retailer, where he can oversee staff training, visual merchandising, and sales performance. Over the longer term, he aspires to become a Retail Education Manager
    or Training Director for a cultural institution or specialty retailer, designing instructional programs for employees and customers, launching community workshops, and integrating technology‑enhanced
    learning. To support these ambitions, he plans to earn a professional certification in instructional design and eventually pursue a master’s degree in education leadership.
