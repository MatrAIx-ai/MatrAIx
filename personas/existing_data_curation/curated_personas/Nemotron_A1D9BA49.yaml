  hobbies: '[''Art gallery and museum visits'', ''Sketching'', ''Photography'', ''Reading philosophy and non-fiction'', ''Chess club'', ''Hiking'', ''Biking'', ''Volunteer tutoring'', ''Experimental cooking'',
