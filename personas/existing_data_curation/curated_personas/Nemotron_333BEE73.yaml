personas:
  professional: Cristina Cabrera, a seasoned facility caretaker, merges her meticulous cleaning and maintenance expertise with a curious, art‑inspired mindset, using bilingual communication and eco‑friendly
    practices to oversee inventory, conduct safety inspections, and coordinate minor repairs while envisioning community murals that brighten the spaces she tends.
  sports: Cristina Cabrera stays fit by walking with a local park club at White Rock Lake, dancing lively cumbia at neighborhood festivals, and cheering on the Dallas Cowboys and Mavericks on game nights,
    preferring low‑impact cardio to intense gym sessions that would clash with her already packed schedule.
  arts: Cristina Cabrera nurtures her artistic side by sketching the vibrant exhibits at the Dallas Museum of Art, attending photography workshops that echo Annie Leibovitz’s portrait style, dancing to
    Los Tigres del Norte while cooking, and volunteering to paint community murals inspired by Frida Kahlo’s bold colors.
  travel: Cristina Cabrera favors short, budget‑friendly road trips to culturally rich spots like Marfa’s art installations, the historic streets of San Antonio, and Oaxaca’s culinary festivals, planning
    each adventure through community forums and often traveling with friends from her walking club to blend exploration with social connection.
  culinary: Cristina Cabrera, an enthusiastic home cook, regularly prepares authentic Mexican delights such as mole poblano, chiles en nogada, and street‑style tacos al pastor, perfecting her salsa verde
    with fresh tomatillos, cilantro, and a hint of chipotle, while occasionally indulging in costly specialty chilies that test her budget.
  core: Cristina Cabrera balances a meticulous, eco‑conscious cleaning career with a vibrant passion for art and community, yet her chronic worry often leads to late‑night over‑planning and impulsive purchases
    of craft supplies.
background:
  cultural: Cristina is a first‑generation Mexican American whose parents emigrated from Jalisco. She grew up bilingual, speaking Spanish at home and English in school and the broader community. Mexican
    traditions such as Día de los Muertos, Semana Santa, and family gatherings centered around shared meals remain central to her identity. Living in Mesquite, Texas, she blends these traditions with broader
    Texan culture, participating in local Hispanic festivals, attending the nearby Catholic parish, and enjoying regional foods like tacos al pastor and tamales. Her cultural background emphasizes community,
    hospitality, a strong work ethic, and respect for elders, all of which shape her approach to both her personal life and her work as a janitor.
