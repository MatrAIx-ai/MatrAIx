  career_goals: Cristina aims to move into a supervisory or lead custodian role within the next two to three years, overseeing a team and coordinating facility operations. She plans to complete her GED
    and obtain a certification in facilities management, with a long‑term goal of becoming a facilities coordinator or launching her own small cleaning business that serves local community centers, churches,
    and schools. She also hopes to incorporate her love for art by helping to design and maintain community murals and public art installations in the buildings she maintains.
