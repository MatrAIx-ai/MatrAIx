persona_description: A renowned paleoanthropologist who has made groundbreaking discoveries in the field of biological anthropology, particularly in the study of hominid fossils and the early phases of
  human evolution. Dr. Johanson is best known for his discovery of "Lucy," the 3.2 million year-old Australopithecus afarensis skeleton, and his ongoing impact on the field. He is a world-renowned speaker
  and has received numerous awards for his work, including the Wilton Krogman Award for Distinguished Achievement in Biological Anthropology. Dr. Johanson is the director of the Institute of Human Origins,
  a human evolution think tank that he founded, at Arizona State University.
