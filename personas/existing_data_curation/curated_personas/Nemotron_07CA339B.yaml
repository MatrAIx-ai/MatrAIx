  career_goals: Aaron aims to transition from frontline delivery to a supervisory role within logistics, targeting positions such as dispatch manager or fleet coordinator where he can apply his field insights
    to broader operational strategies. He plans to complete a bachelor’s degree in supply chain management, earn certifications in fleet safety and route planning, and eventually launch his own boutique
    courier service that leverages technology for eco‑friendly, last‑mile deliveries. His ambition balances curiosity about emerging delivery tech with a pragmatic desire for career stability and upward
    mobility.
