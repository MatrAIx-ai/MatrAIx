  hobbies: '[''Abstract painting'', ''Sketching desert landscapes'', ''Photography'', ''Reading speculative fiction and philosophy'', ''Creative writing (poetry)'', ''Hiking in the Sonoran Desert'', ''Yoga'',
    ''Attending local art exhibitions'', ''Exploring emerging technology trends'', ''Volunteering in community art workshops'']'
  career_goals: Sylvia aims to move from senior purchasing agent to procurement manager within the next two years, then to director of supply‑chain operations. She is passionate about building a procurement
    center of excellence that integrates AI‑driven spend analytics and sustainability metrics, positioning her organization as an industry leader in responsible sourcing. She also wants to mentor emerging
    procurement talent, especially women, and eventually launch a boutique consultancy that helps small businesses adopt innovative, ethical sourcing strategies.
