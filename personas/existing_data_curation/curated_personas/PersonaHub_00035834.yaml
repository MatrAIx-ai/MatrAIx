persona_description: A development finance professional at the World Bank who is responsible for managing and implementing projects that aim to address climate change and promote sustainable development
  in developing countries. This individual is highly knowledgeable about the Clean Development Mechanism (CDM) of the Kyoto Protocol, which allows industrialized countries and companies to fulfill some
  of their greenhouse gas reduction commitments through the purchase of carbon credits in clean-and-green projects in developing countries. They are skilled at negotiating and facilitating financial rewards
  through carbon credits for the reduction of greenhouse gas emissions by emitters in developing countries, such as the Philippines, through the World Bank's carbon finance activities and projects. This
  individual is passionate about promoting sustainable development and reducing the negative impacts of livestock waste on water, air, human health, and the climate, not just in the Philippines but throughout
  the region.
