  career_goals: Bradley dreams of turning his love for art and structured problem‑solving into a career that blends creativity with design. He aspires to become a video game designer or architect, envisioning
    spaces and interactive worlds that inspire imagination. He plans to pursue advanced art and technology courses in high school, eventually studying design or computer science at a university known for
    innovation. Alongside his creative ambitions, he hopes to use his empathy to mentor younger students and promote mental‑wellbeing in school environments.
