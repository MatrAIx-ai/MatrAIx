personas:
  professional: An aspiring junior illustrator and robotics hobbyist, Bradley Taylor, channels their curiosity into comic panels, digital art, and building LEGO and robotics kits, approaching each creative
    project with methodical planning and a keen eye for detail.
  sports: A budding athlete, Bradley Taylor, plays forward for the Howard Soccer Club in spring, cheers for the Baltimore Ravens on Sundays, and joins the local junior ice‑skating class during the winter,
    balancing team spirit with a love for solo trail hikes.
  arts: A creative enthusiast, Bradley Taylor, draws comic panels inspired by Alex Ross and Stan Lee, paints small landscapes echoing Van Gogh’s color palette, frequents the Howard County Museum of Art,
    and listens to the scores of Jeremy Soule while sketching, weaving visual art and music into their daily routine.
  travel: A curious explorer, Bradley Taylor, plans family trips with meticulous checklists, has visited the Smithsonian museums in Washington, D.C., the historic streets of Philadelphia, and dreams of
    Tokyo’s anime districts, balancing adventure with the comfort of familiar holiday traditions.
  culinary: A modest kitchen experimenter, Bradley Taylor, enjoys crafting macaroni‑and‑cheese topped with bacon, mastering a simple stir‑fry of chicken teriyaki with broccoli, and savoring their grandma’s
    pumpkin pie during Thanksgiving, while preferring to snack on fruit gummies between study sessions.
  core: Bradley Taylor is an organized, anxiety‑prone 11‑year‑old whose art, robotics, and meticulous planning fuse curiosity with a tendency to overthink, leading to bursts of creative energy punctuated
    by occasional emotional meltdowns.
background:
  cultural: Bradley grew up in the suburban community of Ellicott City, Maryland, within a middle‑class, predominantly white American environment. His family participates in typical U.S. holidays such as
    Thanksgiving, Christmas, and the Fourth of July, and they value education and community involvement. The proximity to historic sites in Howard County and access to local libraries, museums, and youth
    programs have fostered his appreciation for art, history, and diverse experiences. While maintaining core American cultural values of individuality and self‑reliance, Bradley also benefits from the
    region's emphasis on civic engagement and cultural enrichment.
