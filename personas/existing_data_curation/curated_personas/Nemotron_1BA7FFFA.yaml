  hobbies: '[''Gardening and orchard care'', ''Fishing'', ''Reading historical biographies and local archives'', ''Volunteer work at the Island County Historical Society'', ''Model ship building'', ''Walking
    along the shoreline and tide‑pool exploration'', ''Community checkers games'', ''Storytelling sessions with family'']'
  career_goals: Even at 93, Dan remains driven to leave a lasting imprint. He aims to complete a handwritten memoir that blends his personal life with the broader narrative of Coupeville, ensuring it becomes
    a reference point for future generations. He plans to donate his extensive photo archive and research notes to the Island County Historical Society, where he hopes his contributions will be recognized
    as among the most comprehensive local records. Dan also seeks to mentor a few interested younger neighbors in woodworking and marine maintenance, setting personal challenges that reflect his competitive
    nature—such as building a model sailboat to win the next community exhibition. Maintaining his health to attend the annual Whidbey Island Fair with his wife and grandchildren is also a key personal
    ambition.
