  hobbies: '["Community theater acting", "Coaching youth basketball", "Hiking in the Great Smoky Mountains", "Gardening (vegetable garden)", "Woodworking", "Reading historical nonfiction", "Traveling to
    educational conferences", "Cooking Southern recipes", "Playing acoustic guitar", "Participating in a Toastmasters club"]'
  career_goals: Daniel aims to solidify his tenure at the college and step into a department chair role within the next five years, leveraging his competitive drive to enhance program reputation and student
    success rates. He plans to expand his research portfolio by publishing a textbook on applied instructional design and obtaining a major federal grant to develop a statewide community‑college teacher‑preparation
    initiative. Mentoring junior faculty and establishing a faculty‑learning community remain priorities, as does fostering stronger partnerships with local industries to create internship pipelines. In
    the longer term, Daniel aspires to influence state education policy through advisory boards or consulting, ensuring that structured, practical learning experiences become a hallmark of Tennessee’s postsecondary
    system.
