personas:
  professional: An experienced higher-education professional, Daniel Daniels leverages two decades of instructional design expertise and data-driven curriculum development to create structured, industry-aligned
    programs, while their talkative, stage-confident demeanor energizes faculty workshops and student mentorships.
  sports: A devoted advocate of community athletics, Daniel Daniels coaches a youth basketball team, frequently plays pick-up games at the local YMCA, follows the Tennessee Titans football and Nashville
    Predators hockey teams with fervor, and reserves Saturday mornings for brisk hikes in the Great Smoky Mountains to maintain stamina.
  arts: Passionate about performance, Daniel Daniels stars in regional productions of Tennessee Williams's 'The Glass Menagerie' and Arthur Miller's 'Death of a Salesman', strums acoustic renditions of
    Johnny Cash and Gillian Welch at neighborhood gatherings, and curates a personal collection of Appalachian folk art that fuels their storytelling onstage.
  travel: A conference-centric traveler, Daniel Daniels has journeyed to Austin, Texas for a national teaching symposium, explored the historic streets of Charleston, South Carolina for culinary inspiration,
    and hopes to attend a Montessori education summit in Barcelona, Spain, while always planning trips around the academic calendar to maximize networking opportunities.
  culinary: A seasoned home cook, Daniel Daniels masterfully prepares Southern staples like shrimp and grits, buttermilk-fried chicken, and collard greens seasoned with smoked paprika, often sourcing fresh
    tomatoes and corn from their own garden to enhance flavor and showcase farm-to-table authenticity.
  core: Daniel Daniels combines a structured, competitive mindset with a love for public storytelling, balancing rigorous academic pursuits with weekend theatrical flair, yet habitually postpones dental
    appointments and occasionally splurges on vintage tools.
background:
  cultural: Daniel grew up in the Appalachian foothills of East Tennessee, where a blend of Southern hospitality, deep community ties, and a strong work ethic shaped his worldview. His family’s Anglo‑American
    roots and church involvement instilled values of reliability, modesty, and a pragmatic approach to problem‑solving. The region’s storytelling tradition and respect for practical skills influenced his
    teaching philosophy, emphasizing real‑world applicability and clear structure. As a widower, he draws support from local faith communities and civic organizations, reinforcing his sociable nature and
    commitment to service. While he identifies with mainstream white American culture, his experiences in a historically rural, close‑knit community inform his dedication to fostering inclusive, community‑oriented
    educational environments.
attributes:
  skills: '["Curriculum development", "Instructional design", "Educational technology integration", "Student advising and mentorship", "Assessment and evaluation design", "Public speaking and facilitation",
