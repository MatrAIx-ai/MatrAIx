  career_goals: Joshua aims to be promoted to store manager within the next two years, using his current supervisor experience as a stepping stone. He plans to complete a Business Administration degree
    at a local community college while continuing to work, with the long‑term ambition of becoming a district manager for a regional retail chain. Ultimately, he hopes to combine his love of art and retail
    by launching his own boutique that showcases emerging artists alongside curated fashion pieces, leveraging his creative merchandising skills and leadership experience. Throughout his career, he is driven
    to achieve top sales performance, earn industry certifications, and mentor younger employees toward similar growth.
