personas:
  professional: Jeffrey Decost, an 11‑year‑old aspiring visual storyteller, combines a love for watercolors, LEGO architecture, and Minecraft world‑building with a natural flair for leadership in their
    school's drama club, hinting at a future career in interdisciplinary media design, and they often mentor younger classmates in basic sketch techniques.
  sports: Jeffrey Decost, a forward on the neighborhood Maplewood Youth Soccer Club, dazzles teammates with quick footwork inspired by watching FC Barcelona matches, while cheering for the local high school
    team, the Maplewood Tigers, every Saturday, and they often organize post‑game snack runs for the squad.
  arts: Jeffrey Decost immerses themselves in the world of visual arts, drawing inspiration from the bold lines of comic artist Alex Ross, the soft palettes of watercolorist Winslow Homer, and the storytelling
    of Studio Ghibli films, often showcasing their own creations at community art workshops and school exhibitions, and they love explaining the techniques behind each piece to curious peers.
  travel: Jeffrey Decost enjoys weekend excursions to the city’s hands‑on science museum and the historic downtown art district, has taken a family road trip to Washington, D.C. to see the National Gallery,
    and dreams of exploring Tokyo’s manga cafés and the sunrise at Machu Picchu, and they often draft detailed sketch maps of each destination.
  culinary: Jeffrey Decost favors simple yet adventurous eats—spaghetti carbonara with pancetta, homemade peanut butter and jelly sandwiches on whole‑grain bread, and occasional sushi rolls featuring salmon
    and avocado—often attempting to recreate these dishes after school in the kitchen with sibling supervision, and they sometimes burn the toast when distracted by a new LEGO project.
  core: Jeffrey Decost is a charismatic, curiosity‑driven 11‑year‑old who balances a bustling social life with meticulous creative projects, yet can be a bit forgetful about homework when a new LEGO set
    arrives, and they often compensate by writing detailed to‑do lists that stay unfinished.
background:
  cultural: Jeffrey was raised in Elmwood Park, a suburban community in Cook County, Illinois, surrounded by a predominantly middle‑class Anglo‑American environment. His family embraces Midwestern values
    such as community involvement, politeness, and a strong work ethic, while also exposing him to the cultural richness of nearby Chicago—museums, festivals, and a vibrant arts scene. Holidays and local
    events often include neighborhood block parties, school fairs, and trips to the Art Institute, which have nurtured his appreciation for diverse artistic expressions.
