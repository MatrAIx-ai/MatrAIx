  career_goals: He dreams of one day turning his love for drawing into a career as a comic book illustrator or animation artist, and imagines creating his own online channel where he shares art tutorials
    and stories. He is also interested in working in community art programs that bring creativity to other kids, and hopes to develop his coding skills further to design interactive games.
