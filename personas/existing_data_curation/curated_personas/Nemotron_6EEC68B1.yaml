  career_goals: Although retired, Lena remains driven to leave a lasting impact. She aims to establish a scholarship fund for Sioux City high-school seniors pursuing vocational training, drawing on her
    budgeting expertise. She plans to lead an intergenerational mentorship program at the local community center, guiding younger adults in practical life skills. Completing a personal memoir and a detailed
    family genealogy is a top priority, preserving her Norwegian heritage. Lena also intends to earn a certification in archival preservation from a nearby community college to enhance her contributions
    to the Sioux City Historical Society. Finally, she is committed to maintaining her garden and health to sustain her independence.
