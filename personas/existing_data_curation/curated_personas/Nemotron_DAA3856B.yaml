personas:
  professional: Victoria Mulling is an aspiring junior scientist, harnessing their love for the school science club and LEGO architecture to explore how nature's designs inspire innovative problem‑solving,
    while their preference for structure and solitary work lets them dive deep into experiments without the chaos of larger teams.
  sports: Victoria Mulling follows the local high school soccer team, the Riverdale Rovers, enjoys weekend walks around Little Lake Marsh for birdwatching, and participates in a community yoga class for
    kids to maintain flexibility, preferring low‑impact activities over competitive sports.
  arts: Victoria Mulling finds solace in sketching woodland scenes inspired by Monet’s water lilies, practices beginner piano pieces by Beethoven’s “Für Elise,” and delights in reading novels by Neil Gaiman,
    while their favorite songs include Taylor Swift’s “Cardigan,” blending classic and contemporary influences into their creative expression.
  travel: Victoria Mulling dreams of a family road trip to Yellowstone National Park to photograph bison and explore geysers, while they have already visited the nearby state museum and a weekend camping
    site at Pine Ridge, favoring nature‑focused destinations over bustling city tours.
  culinary: Victoria Mulling loves baking chocolate chip cookies with extra dark chocolate chunks and vanilla cupcakes topped with buttercream swirls, often forgetting to pre‑heat the oven in their enthusiasm,
    but they delight in sharing the treats with Luna the cat and their classmates.
  core: Victoria Mulling is a quietly curious 13‑year‑old who blends solitary study, gentle creativity, and a touch of organized chaos into a life balanced between books, birds, and baked goods.
background:
  cultural: Victoria comes from a middle-class white American family that has lived in the suburban community of Oviedo, Florida for several generations. Her upbringing reflects typical US cultural traditions
    such as celebrating Thanksgiving, Independence Day, and Halloween, while also being exposed to the diverse cultural influences of Central Florida, including local Hispanic and Caribbean foods, festivals,
    and a multicultural school environment. She attends a public middle school in Seminole County, where the community values both academic achievement and community service.
