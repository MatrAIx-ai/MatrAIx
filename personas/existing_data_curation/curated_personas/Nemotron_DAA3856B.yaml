  career_goals: Victoria hopes to attend a high school with strong STEM and science programs, improve her grades in biology, and eventually pursue a degree in veterinary medicine or wildlife rehabilitation,
    where she can combine her love for animals with her desire to help others. In the short term she aims to volunteer at the local animal shelter, earn a science fair award, and develop the academic foundation
    for a future career in animal health and environmental stewardship.
