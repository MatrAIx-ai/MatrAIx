    at community youth center"]'
  career_goals: Jasmine hopes to pursue a career that lets her support other young people, such as becoming a school counselor, a community health worker, or a social worker. She is fascinated by how mental
    health resources can help students manage stress, and she wants to study psychology in college. Although she enjoys creative work, she values the stability of a role that combines structure with helping
    others, and she dreams of one day leading youth programs in her Cleveland neighborhood.
