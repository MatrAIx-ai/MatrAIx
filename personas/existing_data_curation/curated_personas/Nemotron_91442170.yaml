personas:
  professional: Jasmine Graham, a 13‑year‑old budding coder who leads her school’s Scratch game‑creation club, combines a love for clear step‑by‑step logic with a laid‑back attitude toward deadlines, often
    mapping out game mechanics on paper before improvising the final code and using their natural assertiveness to guide peers while still handling occasional stress‑induced writer’s blocks.
  sports: Jasmine Graham, an enthusiastic member of the neighborhood youth basketball league, drills at the local park after school, follows the Cleveland Cavaliers and Browns loyally, and blends structured
    practice routines with spontaneous street‑ball games, yet often forgets to stretch, leading to occasional sore knees.
  arts: Jasmine Graham, an avid digital sketcher who fills their tablet with vibrant cartoon characters inspired by anime and classic Pixar, also curates playlists featuring H.E.R., J. Cole, and SZA while
    attending community art workshops, using their creative outlet to unwind from school stress and express their love for storytelling.
  travel: Jasmine Graham dreams of visiting the historic jazz clubs of New Orleans and exploring the sci‑fi exhibits at the Smithsonian in Washington, D.C., but prefers short road trips to nearby Detroit
    for a weekend coding camp, favoring planned itineraries that include free time for spontaneous photo‑ops, all while budgeting carefully given their modest allowance.
  culinary: Jasmine Graham, a budding home chef, loves whipping up mac and cheese with a breadcrumb topping, experimenting with collard greens seasoned with smoked paprika, and blending smoothie bowls with
    banana, spinach, and chia seeds, though they often forget to clean up fully, leaving a trail of dishes that reflects their occasional disorganization.
  core: Jasmine Graham balances a vivid imagination and a disciplined love of coding with a tendency to procrastinate, an impulse for sneakers, and a nervous habit of over‑thinking every new challenge.
background:
  cultural: Jasmine comes from an African‑American family that has lived in Cleveland’s East Side for several generations. Her family places a strong emphasis on community, faith, and education; they attend
    a local Baptist church on Sundays and celebrate cultural events such as Juneteenth and Kwanzaa with food, music, and storytelling. She is proud of the legacy of resilience and activism in her community,
    often hearing stories about the Great Migration and the role of historically Black colleges and universities in shaping her relatives’ lives. This cultural heritage influences her values of collective
    responsibility, perseverance, and pride in her identity.
attributes:
