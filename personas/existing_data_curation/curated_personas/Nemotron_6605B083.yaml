personas:
  professional: Jacqueline Kretzmer, a curious three‑year‑old who pretends to be a preschool teacher, blends imaginative play with a surprisingly practical approach to organizing crayons, yet often resists
    the structured schedule of nap time.
  sports: Jacqueline Kretzmer, a lively three‑year‑old who loves the local toddler gymnastics class and cheers loudly for the Chicago Cubs on TV, dashes to the playground with boundless energy, although
    her spontaneous nature sometimes leads her to forget her water bottle.
  arts: Jacqueline Kretzmer, a three‑year‑old who sings along to Raffi and Disney soundtracks while finger‑painting rainbows, finds joy in bright colors and rhythmic claps, but she often insists on finishing
    a drawing before moving on, revealing a balance of creativity and practicality.
  travel: Jacqueline Kretzmer, a three‑year‑old who relishes family road trips to the zoo and a recent visit to Disneyland, prefers short, supervised adventures over long flights, yet she constantly asks
    "when do we get to the playground?" and worries about missing a favorite snack.
  culinary: Jacqueline Kretzmer, a three‑year‑old who adores mac and cheese, apple slices with peanut butter, and chocolate pudding, helps stir batter with a tiny wooden spoon and can be picky about broccoli,
    often negotiating extra cheese as a bargaining chip.
  core: Jacqueline Kretzmer, a three‑year‑old bundle of curiosity and spontaneity, constantly balances wonder with worry, turning everyday moments into playful lessons while secretly fearing the loss of
    her favorite crayons.
background:
  cultural: 'Jacqueline was raised in Franklin, Tennessee, a suburban community known for its Southern hospitality and strong sense of family. Her upbringing reflects typical Southern cultural values: attending
    church services on Sundays, celebrating holidays such as Thanksgiving and the Fourth of July with family gatherings, and enjoying local foods like fried chicken and biscuits. She is exposed to regional
    music traditions, including country and gospel songs, which she often sings during play. The local preschool emphasizes early literacy, polite manners, and community awareness, providing her with a
    gentle introduction to broader cultural diversity while maintaining the comforting rhythms of a small‑town Southern environment.'
