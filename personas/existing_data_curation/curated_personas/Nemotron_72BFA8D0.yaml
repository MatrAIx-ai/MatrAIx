personas:
  professional: Scott Simon, a curious two‑year‑old in a play‑based preschool who loves exploring tactile books and open‑ended building blocks, often improvises imaginative scenarios that defy the structured
    curriculum, balancing cooperative play with occasional assertive claiming of favorite toys as they navigate the day.
  sports: Scott Simon, a budding little athlete who attends a weekend toddlers' motor skills class at the local community center and proudly carries a miniature soccer ball emblazoned with the ‘Little Lions’
    club logo, while they also cheer on the Chicago Cubs with a tiny cap during family TV time.
  arts: Scott Simon, an appreciative mini‑art enthusiast who spends afternoons finger‑painting bright abstracts, mimics the rhythmic chants of "The Wheels on the Bus", and sings along to Raffi’s "Baby Beluga"
    while they cling to a plush dinosaur, showcasing a natural openness to unconventional creative expression.
  travel: Scott Simon, an adventurous stroller‑rider who has explored Grandma’s countryside cottage, delighted in a weekend trip to the zoo, and marveled at the fireworks of a family vacation to Disney
    World, favoring spontaneous pit‑stops at playgrounds over rigid itineraries as they bounce between curiosity and occasional fatigue.
  culinary: Scott Simon, a selective eater who adores creamy mac and cheese, crunchy peas, and the occasional dab of peanut butter on toast that they happily smear across the high chair, yet steadfastly
    refuses broccoli, turning mealtime into a playful negotiation as they test the limits of their palate.
  core: Scott Simon, a two‑year‑old curiosity‑driven whirlwind who blends artistic exploration with spontaneous play, displays sweet picky eating habits, and often insists on stickers during snack time,
    showing they balance wonder with occasional assertiveness.
