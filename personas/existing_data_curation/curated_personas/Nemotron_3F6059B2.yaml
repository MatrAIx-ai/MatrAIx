  hobbies: '[''Museum and Gallery Visits'', ''Murals and Street Art Tours'', ''Folkloric Dance'', ''Mexican Cooking'', ''Gardening (Herbs & Vegetables)'', ''Volunteering at Youth Art Workshops'', ''Reading
    Historical Fiction'', ''Community Potluck Hosting'']'
  career_goals: Gisela aims to advance to a supervisory or lead custodian role where she can design and implement greener cleaning protocols for the entire building complex. She is pursuing a Green Cleaning
    Certification to bolster her expertise and hopes to spearhead a mentorship program for younger custodial staff, especially those from the local Hispanic community. Long‑term, she envisions combining
    her love for art with her profession by becoming a facilities coordinator for a community art center, overseeing both the upkeep of the space and the logistical support for art events and workshops.
