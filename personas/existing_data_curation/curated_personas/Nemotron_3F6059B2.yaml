personas:
  professional: Gisela Guerrero, a 62‑year‑old veteran custodian with three decades of advanced cleaning expertise, leverages their meticulous problem‑solving, bilingual communication, and calm crisis management
    to mentor staff, champion green‑cleaning protocols, and advise on preservation‑friendly upkeep of public art installations.
  sports: Gisela Guerrero stays active by practicing folkloric dance with a community troupe, walking the Katy Trail three times weekly, and cheering on the Dallas Cowboys and Mavericks while occasionally
    joining a senior soccer league at the local recreation center.
  arts: Gisela Guerrero engages deeply with the arts by attending Dallas Museum of Art exhibitions featuring Frida Kahlo and Kehinde Wiley, participating in mural tours that showcase Alejandro de la Fuente’s
    public works, and dancing to Lila Downs and Carlos Santana at neighborhood gatherings, letting these experiences shape their cultural identity and community storytelling.
  travel: Gisela Guerrero prefers immersive cultural trips, having explored historic neighborhoods of Mexico City and Oaxaca on extended stays, while also savoring weekend road trips to the Hill Country
    wineries and annual visits to the Santa Fe art markets, planning each journey through detailed itineraries rather than spontaneous bookings.
  culinary: Gisela Guerrero, a confident home chef, delights in crafting authentic mole poblano, handmade tamales, and fresh pico de gallo flavored with garden‑grown cilantro and epazote, often perfecting
    each recipe over generations while sharing generous portions at weekly potluck gatherings.
  core: Gisela Guerrero blends relentless curiosity, a competitive streak, and unflappable calm into a vibrant life of art‑filled community service, even as they occasionally over‑schedule their social
    calendar, leaving little room for rest.
background:
  cultural: Gisela was born in Jalisco, Mexico, and moved to Irving, Texas, with her family as a teenager. She grew up in a close‑knit Mexican‑American community, retaining strong ties to Mexican customs
    such as Día de los Muertos, Semana Santa, and traditional family meals centered around corn‑based dishes and mole. Fluent in Spanish, she often acts as a cultural bridge for her neighbors, translating
    for Spanish‑speaking residents and helping newcomers settle in the area. While she embraces the Texan influence—enjoying Tex‑Mex cuisine and local football culture—she also preserves her heritage through
    music, dance, and cooking. Her Catholic upbringing provides a foundation for annual celebrations, while her participation in local Hispanic community events reflects a dual identity that blends Mexican
    roots with the vibrancy of the Dallas-Fort Worth metropolitan region.
attributes:
  skills: '[''Commercial Cleaning'', ''Facility Maintenance'', ''Chemical Safety'', ''Equipment Operation'', ''Bilingual Communication (Spanish/English)'', ''Inventory & Supply Management'', ''Scheduling
