persona_description: A drilling professional who is interested in understanding the operation and function of solid control equipment, particularly desilters. They are familiar with the basic principles
  of hydrocloning and centrifugal force, and are interested in the specific details of desilters and their role in drilling operations. They are also interested in the installation and maintenance of desilters,
  as well as the types of solids that are removed by them. They may have experience working with drilling rigs and the surface mud system, and are interested in the specific size range of sand and silt
  that is removed by desilters.
