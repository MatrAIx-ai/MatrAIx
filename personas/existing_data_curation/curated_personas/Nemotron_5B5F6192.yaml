personas:
  professional: Robert Hanley is a soon‑to‑be HVAC apprentice who blends their solid carpentry background, methodical troubleshooting skills, and deep sense of community into a reliable home‑repair service
    that prioritizes neighborly assistance and flexible scheduling.
  sports: Robert Hanley spends their free weekends fishing on neighboring lakes, hiking the Ice Age Trail in early summer, and cheering on the Green Bay Packers and Milwaukee Brewers while occasionally
    joining a local pick‑up basketball game at the community center.
  arts: Robert Hanley immerses their mind in science‑fiction novels like 'The Expanse' and DIY technology books, listens to folk‑rock artists such as The Avett Brothers and The Lumineers, and curates low‑key
    board‑game nights that showcase their appreciation for strategy and storytelling.
  travel: Robert Hanley enjoys budget‑friendly road trips to Door County’s shoreline, a memorable week‑long tour of the Badlands National Park, and occasional city escapes to Chicago for concerts, while
    they dream of a future cross‑country camping adventure through the Rocky Mountains.
  culinary: Robert Hanley loves experimenting with farm‑to‑table meals, frequently cooking dishes such as cheese‑curd‑topped bratwurst, miso‑glazed trout with fresh garden carrots, and hearty root‑vegetable
    chili using locally sourced kale, honey, and rye flour for homemade sourdough, and they often finish a dinner with a slice of their own sourdough bread.
  core: Robert Hanley is a pragmatic, curiosity‑driven 22‑year‑old who balances quiet woodworking, community service, and careful budgeting with a deep love for nature, simple pleasures, and neighborly
    goodwill, and they approach life with quiet confidence.
background:
  cultural: 'Robert grew up in Jefferson, Wisconsin, a small Midwestern town with a largely white population of German and Scandinavian ancestry. His family traditions reflect the region’s agricultural
    roots: seasonal planting, county‑fair participation, and backyard barbecues. The local community emphasizes modesty, hard work, and neighborly assistance, values reinforced by the town’s Protestant
    church where he and his wife are active members. These cultural influences have shaped his practical outlook, his cooperative nature, and his commitment to contributing to the well‑being of his close
    community.'
attributes:
  skills: '["Basic carpentry and home repair","Computer troubleshooting and network setup","Meal planning and home cooking","Gardening and horticulture","Event organization for small groups","Conflict mediation
