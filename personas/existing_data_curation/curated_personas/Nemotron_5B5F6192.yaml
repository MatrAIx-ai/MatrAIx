    pantry and community service drives"]'
  career_goals: Robert aims to translate his practical skills into a stable career that also aligns with his desire to help others. He plans to enroll in a community‑college apprenticeship program for a
    trade such as HVAC or electrical maintenance, with the goal of obtaining certification within two years. After gaining experience, he hopes to launch a modest home‑repair and maintenance service that
    can serve local families while allowing flexible hours to spend time with his wife. Additionally, he is interested in completing a short certification in social services or community outreach, so he
    can volunteer in a more formal capacity at the local food bank or senior center.
