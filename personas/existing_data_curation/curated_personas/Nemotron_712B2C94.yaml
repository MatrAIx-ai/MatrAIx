  career_goals: Michael aims to re‑enter the workforce within the next year by launching a boutique digital marketing and sales consultancy that helps local small businesses increase their online visibility
    and revenue. He plans to earn a Project Management Professional (PMP) certification to formalize his coordination skills and to build a portfolio of successful client projects. Over the next five years,
    he hopes to grow his consultancy into a small agency, take on a senior consulting role, and mentor younger entrepreneurs in the community. He also wants to maintain enough flexibility to support his
    family and continue his personal development in technology and public speaking.
