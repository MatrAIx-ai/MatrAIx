  career_goals: Though still in preschool, Tiffany often talks about what she wants to be when she grows up. She imagines herself as an artist who paints bright, imaginative scenes, a teacher who helps
    other children learn and feel safe, and sometimes a veterinarian who cares for animals. Her dreams reflect her love of creativity, her desire to help others, and her curiosity about the world. She hopes
    to keep exploring new ideas and sharing her kindness with many people.
