personas:
  professional: Tiffany Bouchette, a budding mini‑architect in her preschool’s block corner, they meticulously plan towering structures from colorful blocks, channeling their curiosity and methodical nature
    into play while quietly savoring the sense of accomplishment that comes from a well‑organized creation.
  sports: Tiffany Bouchette, a tiny gymnast who attends a Tuesday‑Thursday preschool gymnastics class, they eagerly watch the Boston Red Sox on family evenings, prefer small‑group games like tag and hula‑hooping
    for fitness, and delight in the seasonal excitement of spring kite‑flying at the park.
  arts: Tiffany Bouchette, an inquisitive little artist, they spend afternoons finger‑painting with bright hues inspired by Henri Matisse, sing along to Disney classics like 'Let It Go' from Frozen, and
    proudly display their crayon sketches of the Moon on the refrigerator.
  travel: Tiffany Bouchette, an adventurous preschooler, they love family road trips to the beach in Maui and magical days at Disneyland, prefer the comfort of their travel‑size stuffed bunny in the car,
    and eagerly point out tall palm trees and sparkling castle turrets with a budding curiosity.
  culinary: Tiffany Bouchette, a budding foodie, they delight in creamy macaroni and cheese, help stir batter for banana pancakes with a plastic spoon, and savor the sweet crunch of strawberry slices, while
    occasionally insisting on a drizzle of honey over their toast.
  core: Tiffany Bouchette, a methodical mini‑architect who they nickname 'Crayon Queen', hoards crayons for perfect drawings, saves pennies in a pink piggy bank, forgets their eczema cream after play, and
    quietly revels in glitter stickers and plush bear hugs.
background:
  cultural: Tiffany is raised in a white, middle‑class family in Michigan City, Indiana. Her family celebrates familiar Midwestern holidays such as Thanksgiving, Christmas, and Independence Day, and they
    attend a local preschool that emphasizes community, kindness, and early learning. The Bouchette family acknowledges a French‑Canadian heritage reflected in occasional family stories and a few traditional
    dishes, while primarily embracing the values of modesty, politeness, and cooperation common in the region. Access to the nearby Lake Michigan shoreline and local nature trails nurtures her appreciation
    for the outdoors and for creating art inspired by the natural scenery.
