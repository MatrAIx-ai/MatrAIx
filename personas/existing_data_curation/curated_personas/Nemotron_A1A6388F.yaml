personas:
  professional: Karina Parra, a master automotive service technician with 25 years of hands‑on experience on gasoline, hybrid and electric vehicles, they apply their relentless organization, diagnostic
    acumen, and bilingual communication to mentor junior staff, streamline parts inventory, and drive the shop toward higher efficiency and inclusive hiring.
  sports: Karina Parra stays fit by joining the Hill Country Hikers club for weekend treks through the Texas Hill Country, and they cheer on the Dallas Cowboys on Sundays while playing pickup volleyball
    with the Austin Boys Club league in the summer, blending outdoor endurance with community team sports.
  arts: Karina Parra immerses themselves in creative expression through restoring mid‑century modern furniture inspired by Charles and Ray Eames, they photograph classic cars with a nod to the style of
    Ansel Adams, and they debate mystery novels by Agatha Christie and Gillian Flynn at a bilingual book club, while occasionally indulging in classic cinema from directors like Alfred Hitchcock.
  travel: Karina Parra plans meticulous road‑trip itineraries that combine weekend hikes in Big Bend National Park, culinary tours of Oaxaca’s mole markets, and relaxing stays at a family‑run B&B in Austin,
    and they balance limited vacation days with a desire for both adventure and cultural immersion.
  culinary: Karina Parra blends garden‑fresh herbs with traditional flavors to craft mole, tamales, and smoky salsa using chilies, roasted tomatillos, and locally sourced corn masa, often experimenting
    with a modern twist like adding roasted pumpkin puree, and they enjoy sharing these dishes at community festivals while occasionally over‑spicing to satisfy their palate.
  core: Karina Parra is a pragmatic, detail‑driven auto technician who balances a love for vintage cars, gardening, and woodworking, but they can be guilty of over‑watering plants and hoarding spare parts.
background:
  cultural: Karina was raised in a close‑knit Mexican‑American family in the Dallas‑Fort Worth area, where Spanish was spoken at home and cultural celebrations like Día de los Muertos, Cinco de Mayo, and
    traditional holiday meals were central to family life. Her heritage informs her values of family solidarity, respect, and community service. She frequently participates in local Mexican cultural events,
    prepares traditional foods for neighborhood gatherings, and maintains strong ties with the Hispanic community, using her bilingual abilities to bridge cultural gaps both within her workplace and in
    her volunteer activities.
