  hobbies: '["Gardening (vegetables & herbs)","Cooking Mexican cuisine with contemporary twists","Woodworking and furniture restoration","Hiking in Texas Hill Country","Bilingual book club (mystery & historical
    fiction)","Volunteer work at community health fairs and cultural festivals","Classic‑car photography","DIY home improvement projects"]'
  career_goals: Karina aims to advance to a lead or shop‑manager role where she can shape service standards and mentor the next generation of technicians, especially women and Hispanic workers. She plans
    to obtain additional certifications in electric‑vehicle systems and eventually open her own community‑focused auto repair shop that offers affordable services, language‑accessible customer care, and
    apprenticeships for underrepresented groups. Long‑term, she wishes to develop a curriculum for local technical schools that blends practical shop skills with emerging automotive technologies.
