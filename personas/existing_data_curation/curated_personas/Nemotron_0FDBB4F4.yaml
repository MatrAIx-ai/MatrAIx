personas:
  professional: Steven Rubini, a 34‑year‑old aspiring handyman‑guide, leverages hands‑on carpentry, small‑engine repair, and seasoned fishing expertise to provide informal home‑repair services and guided
    bayou fishing trips, all while they improvise solutions with a relaxed, sociable attitude that turns community gatherings into networking opportunities.
  sports: Steven Rubini, a devoted fan of the New Orleans Saints, the LSU Tigers, and the New Orleans Pelicans, spends weekends hunting deer in the woods, casting catfish lines in the bayous, and they occasionally
    suit up for the local Bayou Brawlers softball league, all while preferring informal, social competition over rigid training regimens.
  arts: Steven Rubini, an avid admirer of zydeco legend Clifton Chenier and Cajun band BeauSoleil, frequently dances at Festival Acadiens et Créoles, captures the mystic hues of the bayou in his own photography,
    and they say the soulful strains of Kermit Ruffins on a trumpet echo the rhythms of their everyday life.
  travel: Steven Rubini, who favors low‑cost, flexible road trips, routinely drives to New Orleans for Mardi Gras, camps on the Atchafalaya Basin for weekend fishing, and they hope to someday fund a salmon‑fishing
    expedition in British Columbia and a cultural food tour of Quebec City.
  culinary: Steven Rubini, an accomplished Cajun cook, delights friends with authentic gumbo thickened with file powder, smoky étouffée featuring fresh catfish, and homemade boudin stuffed with Andouille
    sausage and okra, while they constantly tweak spice blends and experiment with open‑fire cooking on their backyard grill.
  core: Steven Rubini blends a laid‑back, community‑focused spirit with a knack for fixing anything on the spot, a habit of humming zydeco while grilling jambalaya, and an amusing tendency to leave their
    toolbox on the dock after each fishing trip, and they often forget it until they need it the next day.
background:
  cultural: Steven is a white Southern male raised in Abbeville, Louisiana, a region steeped in Cajun and Creole heritage. Although his family is of French‑Acadian descent, he grew up in a predominantly
    English‑speaking environment while still absorbing the local customs, cuisine, and Catholic traditions. He participates in community rituals such as Mardi Mardi celebrations, the Festival Acadiens,
    and church gatherings, and he values the hospitality and close‑knit neighborliness that characterize life in Vermilion Parish. His cultural identity blends traditional Southern values with the vibrant,
    music‑filled, food‑centric culture of the Louisiana bayou.
