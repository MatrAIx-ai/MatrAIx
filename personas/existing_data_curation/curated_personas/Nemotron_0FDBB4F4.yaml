  career_goals: Steven wants to earn his GED within the next year to open up more formal employment options. He hopes to obtain a commercial fishing license or a certification in small‑engine repair so
    he can start a part‑time side business offering handyman services and guided fishing trips. Over the next five years he envisions launching a modest food‑truck or pop‑up stand that sells his favorite
    Cajun dishes at local festivals and markets, providing steady income while keeping the flexibility he values. He also aims to become a volunteer coordinator for his church’s outreach programs, blending
    his love for community service with a more structured role.
