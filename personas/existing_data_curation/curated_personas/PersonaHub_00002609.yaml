persona_description: A marine biologist who specializes in the study of marine mammals, particularly the effects of human activities on their behavior and survival. This individual has extensive experience
  in conducting research on the impacts of seismic surveys on marine mammals and has developed a deep understanding of the biology and ecology of these animals. They have a keen interest in developing mitigation
  strategies for these surveys to minimize their negative effects on marine mammals and have published research on this topic. This individual is highly knowledgeable about the effects of underwater noise
  on marine mammals and has a passion for conservation.
