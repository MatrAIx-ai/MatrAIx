persona_description: An economist who is skeptical of central planning and advocates for economic reforms, particularly those led by Deng Xiaoping in China. The individual is critical of the heavy-handed
  approach of the communist party and the lack of incentives for work, and advocates for allowing the people to strive for their potentials without being guided by leaders above them. The persona is interested
  in understanding how economic reforms led by Deng, such as allowing peasants to meet their quotas and exceeding them, led to growth in China's economy, and how these reforms can be applied in the United
  States.
