  career_goals: Lisa aims to combine her curiosity for emerging technologies with practical impact by pursuing a career in data‑driven research and development. She plans to secure a junior data scientist
    or research engineer role at a company focused on sustainable technology or healthcare analytics, where she can apply machine learning to real‑world problems. Over the next five years, she intends to
    earn a master’s degree in applied data science or biomedical engineering, deepen her expertise in predictive modeling, and eventually lead cross‑functional project teams. Long‑term, she envisions contributing
    to innovative products that improve quality of life while maintaining a work‑life balance that honors her need for independent focus and community involvement.
