personas:
  professional: Thelma Albarracin is a budding robotics enthusiast who blends a love for LEGO construction with early coding experiments, demonstrating the curiosity‑practical balance of a future engineer,
    while they channel their outgoing nature into collaborative projects in school clubs.
  sports: Thelma Albarracin plays for the Northside Youth Soccer Club, spends weekend afternoons sprinting across the local park, and passionately roots for the Seattle Seahawks in football and the Seattle
    Sounders FC during the soccer season, balancing team play with individual fitness drills.
  arts: Thelma Albarracin fills sketchbooks with comic strips inspired by Stan Lee’s heroes, dances to Bad Bunny’s reggaeton beats and Shakira’s salsa rhythms at family gatherings, and spends free time
    building LEGO mosaics that echo the vibrant scenes of their favorite Pixar movies.
  travel: Thelma Albarracin loves planning weekend trips to the local community fair, dreams of strolling the historic Freedom Trail in Boston and hiking the cliffs of Acadia National Park, and already
    documents a memorable family vacation to Orlando’s theme parks, illustrating a mix of local adventure and big‑city curiosity.
  culinary: Thelma Albarracin enjoys helping their mother bake empanadas stuffed with seasoned beef and cheese, mixes batter for chocolate cupcakes with a generous splash of vanilla extract, and proudly
    prepares a homemade mac and cheese using sharp cheddar and a pinch of paprika, showcasing a budding chef’s love for both traditional and kid‑friendly flavors.
  core: Thelma Albarracin is a lively nine‑year‑old who juggles soccer, salsa dancing, LEGO engineering, and comic drawing with a pocket‑full of candy‑induced splurges, an ever‑present health journal, and
    a penchant for leaving LEGO bricks scattered across the living room.
background:
  cultural: Thelma is a first‑generation Colombian‑American raised in Queens Village, New York. At home, Spanish is spoken alongside English, and her family celebrates Colombian holidays such as Día de
    la Independencia and Carnaval de Barranquilla with music, food, and storytelling. She enjoys traditional dishes like arepas and empanadas, often prepared together with her mother, which reinforces her
    connection to Colombian culture. Living in a multicultural borough, she also embraces the diverse influences of New York City, attending a bilingual elementary school that encourages cultural exchange.
    Her upbringing blends Colombian family values—strong emphasis on close kinship and communal support—with the dynamic, inclusive spirit of her urban environment.
