  career_goals: Thelma dreams of a future where she can combine her love for people, animals, and problem‑solving. She aspires to become a bilingual teacher or a veterinarian, envisioning a role where she
    can help children learn and care for pets in her community. Her curiosity drives her to explore science and technology, so she also entertains the idea of working in a STEM field that creates practical
    solutions for everyday challenges. She aims to stay connected to her Colombian roots while pursuing higher education in the United States, hoping to one day mentor younger kids from diverse backgrounds.
