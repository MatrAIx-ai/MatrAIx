    live jazz performances'']'
  career_goals: Herbert aims to become the lead pastor of a multi‑site congregation that integrates arts and faith, launch a regional arts‑and‑spirituality center, and author a book on contemporary theological
    interpretations of visual culture. He aspires to teach at a seminary, develop a digital platform for interfaith dialogue, and become a recognized thought‑leader in progressive theological circles, securing
    speaking engagements at national conventions and winning grants for innovative ministry projects.
