  career_goals: Franklin dreams of becoming an astronaut or a firefighter, inspired by his fascination with space and admiration for local community heroes. He also imagines teaching one day, enjoying the
    idea of helping classmates learn new concepts. His ambition centers on roles that combine service, teamwork, and problem‑solving, allowing him to make a positive impact on his neighborhood.
