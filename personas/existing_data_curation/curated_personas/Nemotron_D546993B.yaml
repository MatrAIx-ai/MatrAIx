    festival volunteering'', ''DIY home improvement'']'
  career_goals: Matthew aims to move into a senior analyst or team‑lead role where he can shape routine IT processes and mentor newer staff. He plans to earn advanced certifications such as CompTIA Security+,
    Cisco CCNA, and a Microsoft Azure Administrator credential to broaden his technical credibility. His competitive drive pushes him to achieve measurable performance improvements—reducing incident resolution
    times and streamlining system maintenance—so he can be recognized as a reliable, results‑focused leader. In the longer term, he envisions launching a small consulting practice that offers practical,
    cost‑effective IT solutions to local businesses in Gratiot County.
