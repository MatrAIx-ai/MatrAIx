  hobbies: '["Digital painting", "Traditional craft (lantern making)", "Cooking Southeast Asian cuisine", "Hiking", "Yoga", "Reading speculative fiction", "Creative writing", "Volunteering at community
    centers", "Board games", "Attending art exhibitions", "Participating in cultural festivals"]'
  career_goals: Baongoc aims to advance from her current cashier role into retail management, seeking a supervisory position where she can mentor staff and oversee store operations. She plans to obtain
    a retail management certification and leverage her business degree to improve operational efficiency. Long‑term, she aspires to launch her own boutique that blends contemporary design with Southeast
    Asian cultural motifs, using her artistic talents and entrepreneurial drive. She also envisions leading community outreach programs that support immigrant families and promote cultural arts.
