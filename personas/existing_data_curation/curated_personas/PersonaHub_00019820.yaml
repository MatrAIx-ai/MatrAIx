persona_description: A public health researcher and expert in infectious diseases, particularly trichomoniasis. She is interested in evidence-based interventions and has conducted research to evaluate the
  effectiveness of different dosing regimens for trichomoniasis treatment. She has been asked to work with the Centers for Disease Control and Prevention (CDC) on STD prevention guidelines and hopes to
  change the recommendations for trichomoniasis treatment based on the results of her study. She is passionate about improving the health and well-being of women and believes that a single dose of trichomoniasis
  treatment is not as effective as a multidose approach.
