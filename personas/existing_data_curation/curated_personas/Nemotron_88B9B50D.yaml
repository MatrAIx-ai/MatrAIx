personas:
  professional: Christian Shanley is a middle‑school teacher who blends hands‑on, inquiry‑driven STEM projects with solid classroom management, leveraging Google Classroom and interactive whiteboards while
    embracing a flexible, low‑stress approach that lets lessons evolve organically.
  sports: Christian Shanley spends weekends trail‑hiking in the Cascades, participates in a local hiking club that meets monthly, roots for the Seattle Seahawks and follows the Seattle Sounders FC, and
    occasionally joins a community cycling group for casual rides through the Puget Sound region.
  arts: Christian Shanley strums an acoustic guitar to folk classics by Bob Dylan and Joni Mitchell, captures misty forest scenes inspired by Ansel Adams with a DSLR on weekend treks, hosts board‑game nights
    featuring Catan and Carcassonne, and enjoys occasional local theater productions as a relaxed audience member.
  travel: Christian Shanley favors spontaneous weekend escapes to nearby gems like the San Juan Islands, Olympic National Park, and a yearly road trip to Vancouver, Canada, while dreaming of a longer adventure
    trekking New Zealand’s South Island once finances and family commitments allow.
  culinary: Christian Shanley delights in cooking garden‑fresh meals such as roasted beet and kale salad with goat cheese, pan‑seared salmon topped with dill pesto, and homemade mushroom risotto, boasting
    a solid but occasionally haphazard kitchen routine that sometimes leaves vegetables over‑cooked when a project deadline looms.
  core: Christian Shanley is a curiosity‑driven, easy‑going educator who balances hands‑on learning with flexible planning, an occasional disorganized budget, and a love for the Pacific Northwest’s trails,
    garden, and guitar strings.
background:
  cultural: Christian's cultural background reflects a mid‑west, Anglo‑American upbringing that values community service, self‑reliance, and practical problem‑solving. After moving to the Pacific Northwest,
    he has embraced the region's outdoor lifestyle and multicultural community ethos while maintaining family traditions centered on modest holiday celebrations, teamwork, and a pragmatic outlook.
attributes:
  skills: '["Classroom management", "Differentiated instruction", "Project‑based learning", "Educational technology integration (Google Classroom, interactive whiteboards)", "Curriculum planning and alignment",
    "Student assessment and data analysis", "Parent‑teacher communication", "Conflict resolution and SEL facilitation", "Outdoor and experiential learning", "Spontaneous lesson improvisation"]'
  hobbies: '["Hiking in the Cascades", "Gardening (vegetable and native plants)", "Playing acoustic guitar", "Reading historical non‑fiction", "Volunteering for after‑school tutoring", "Board game nights",
    "DIY woodworking projects", "Landscape photography"]'
  career_goals: He aims to deepen his expertise in interdisciplinary STEM curricula and obtain a formal teaching credential to qualify for a lead teacher or curriculum coordinator role. Over the next five
    years, Christian hopes to mentor new teachers, lead professional‑development workshops, and champion flexible, inquiry‑based learning environments within his school district, while also balancing his
    family life.
