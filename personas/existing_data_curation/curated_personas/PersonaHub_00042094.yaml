persona_description: A legal scholar who is interested in the impact of immigration policies on family migration and how they reflect changing family norms in different nations. They are familiar with the
  techniques of power used to enforce family migration policies and how they relate to the broader perspective of globalisation. They have a background in immigration law and are interested in how family
  migration policies have evolved from a system premised on male breadwinner-citizen's right to domicile to one granting and restricting freedom of movement according to individual merit. They are also
  interested in the techniques of power used to enforce the emerging distinctions of a globalising world and how they relate to the study of immigration law.
