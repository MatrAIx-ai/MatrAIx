  hobbies: '[''Abstract painting'', ''Industrial landscape photography'', ''Reading speculative fiction'', ''Chess'', ''Woodworking'', ''Hiking'', ''Gardening'', ''Volunteering at local museum'', ''Jazz
    concerts'']'
  career_goals: Looking ahead, Richard aims to transition into a senior strategic advisory role where he can guide midsize manufacturing and service firms through digital transformation and data-driven
    decision making. He intends to mentor the next generation of analysts by establishing a formal training program and serving as a thought leader by publishing a guide on creative problem-solving in management.
    Additionally, he aspires to contribute to his community by joining the board of the Beaver County Economic Development Council and supporting local arts initiatives. Over the longer term, he envisions
    a part-time consultancy that blends his analytical expertise with his passion for innovative, design-oriented solutions.
