  career_goals: Consuelo dreams of a career that lets her combine her love of animals, her desire to help others, and her enjoyment of structured environments. She aims to become a veterinarian, hoping
    to study biology in high school and later attend veterinary school. At the same time, she is intrigued by teaching and imagines one day leading a classroom where she can use her communication strengths.
    She also entertains the idea of organizing community events, such as school fundraisers, to bring people together. Although she worries about balancing academic pressure, she is motivated to develop
    strong study habits to achieve these goals.
