personas:
  professional: Consuelo Poll is a budding animal‑welfare advocate who channels their practical, team‑oriented mindset from school soccer into leading the middle school’s environmental club, while their
    spontaneous bursts of energy drive them to organize impromptu shelter fund‑raisers, though they often forget to file the paperwork on time, leading to mild stress.
  sports: Consuelo Poll is a starting midfielder on the middle school soccer team, a dedicated member of a local youth dance troupe, and an avid fan of the Louisville Cardinals football and Louisville Bats
    baseball, often cheering at weekend games while they practice dribbling tricks after school, though their tendency to procrastinate on homework sometimes cuts into practice time.
  arts: Consuelo Poll draws intricate animal sketches inspired by visits to the local shelter, frequently sketching corgis and tabby cats while listening to the soundtracks of the Harry Potter series and
    the pop hits of BTS, and they enjoy attending community art fairs where they admire works by local painter Mary Beth Heffernan, balancing structured dance choreography with spontaneous improv.
  travel: Consuelo Poll loves weekend road trips to Mammoth Cave National Park and spontaneous visits to the Kentucky Derby festivities, and they dream of exploring the streets of Paris and the neon lights
    of Tokyo, though their tendency to over‑pack and forget school assignments sometimes forces them to cancel trips.
  culinary: Consuelo Poll favors classic Southern comfort foods like fried chicken, buttery biscuits, and creamy mac and cheese, often helping mom bake homemade cornbread with jalapeños and enjoys crafting
    simple snacks like cheese‑filled mini quesadillas, while they occasionally indulge in sugary milkshakes after long video‑game sessions.
  core: Consuelo Poll is a socially vibrant 12‑year‑old who balances a love for structure with spontaneous creativity; they juggle soccer, shelter volunteering, and anxious perfectionism.
background:
  cultural: Consuelo grows up in a white, middle-class family in Louisville, Kentucky. Her household reflects Southern hospitality and community-oriented values, with regular family gatherings that feature
    regional foods like fried chicken and biscuits. She attends a public middle school that celebrates local traditions, such as the Kentucky Derby and local music festivals, and she participates in church
    youth activities that emphasize service and fellowship. These cultural influences give her a strong sense of belonging to the Kentucky community while exposing her to diverse Southern and Midwestern
    customs.
