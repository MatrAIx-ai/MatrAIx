personas:
  professional: Toni Darby is a budding arts administrator who leverages their event‑planning expertise, digital photography and graphic design skills, and methodical project scheduling to coordinate community
    workshops, while their outgoing and cooperative nature ensures volunteer teams feel supported and inspired.
  sports: Toni Darby enjoys playing recreational soccer with the McHenry County YMCA league in spring, skiing with friends at Wisconsin’s Cascade Mound in winter, and cheering for the Chicago Bears and
    Chicago Cubs, often watching games at the local sports bar.
  arts: Toni Darby immerses themselves in the Chicago art scene, sketching watercolors inspired by Kara Walker’s installations, attending live shows by Chance the Rapper, and supporting community theater
    productions at the Steppenwolf Theatre Company, shaping their identity with a blend of contemporary visual and performing arts.
  travel: Toni Darby prefers meticulously planned weekend getaways, having explored Chicago’s Museum Campus, biked along Lake Michigan’s shoreline, visited Asheville’s vibrant arts district, and dreams
    of a summer art residency in Florence, Italy, while preserving a travel fund for future adventures.
  culinary: Toni Darby enjoys cooking experimental dishes like mac and cheese infused with harissa and cheddar‑filled ravioli topped with a sweet corn salsa, skillfully blending Midwestern comfort with
    global spices such as cumin, miso, and fresh basil.
  core: Toni Darby is a curious, organized social butterfly who channels their love for art into community events while occasionally overcommitting and forgetting to hydrate.
background:
  cultural: Toni grew up in a small Midwestern town in Illinois, raised in a white family with German‑Irish roots. Her upbringing emphasized community involvement, hard work, and appreciation for seasonal
    celebrations like the county fair, Fourth of July parades, and local holiday markets. She was encouraged to explore the arts through school programs and church choirs, which fostered her curiosity about
    diverse perspectives. The supportive, cooperative spirit of her neighborhood, combined with a love for the region’s natural landscapes, shapes her values of harmony, inclusivity, and a desire to bring
    cultural experiences to her community.
attributes:
  skills: '[''Event planning'', ''Volunteer coordination'', ''Digital photography'', ''Basic graphic design (Canva, Photoshop)'', ''Social media content creation'', ''Research and critical analysis of visual
