  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting and sketching'', ''Digital photography of nature and urban scenes'', ''Attending live music and theater'', ''Participating in community
    theater/improv'', ''Volunteering at local museum and festivals'', ''Cooking and experimenting with recipes'', ''Reading contemporary fiction and art theory'', ''Hosting board‑game nights'']'
  career_goals: Toni aims to pursue a bachelor’s degree in Arts Management or Communications within the next two years, leveraging her associate’s background. She aspires to work in arts administration,
    ideally as a program coordinator for a regional museum or cultural center, where she can design community‑focused art workshops and exhibitions. In the longer term she hopes to lead grant‑writing initiatives
    to secure funding for youth art programs in McHenry County and eventually move into a senior role overseeing public‑engagement strategy for a nonprofit arts organization.
