  career_goals: Now approaching retirement, Jin’s primary ambition is to transition from corporate management to a mentorship and advisory role. He aims to coach the next generation of IT professionals,
    particularly those from underrepresented communities, and to volunteer his expertise to local non‑profits that preserve Polynesian cultural heritage through digital archiving and interactive media.
    He also hopes to establish a boutique consulting practice focused on sustainable, low‑impact IT solutions for small businesses and community organizations, while staying abreast of emerging technologies
    such as artificial intelligence and edge computing.
