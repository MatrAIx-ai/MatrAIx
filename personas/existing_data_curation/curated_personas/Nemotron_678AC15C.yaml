personas:
  professional: Jorge Santamaria, a seasoned small‑town operations manager, leverages bilingual communication, meticulous inventory control, and process‑improvement expertise to keep the local business
    running like clockwork while mentoring younger staff for a smooth succession.
  sports: Jorge Santamaria stays active by fishing on the Mississippi River with the Oquawka Anglers Club, hiking the nearby bluffs each fall, and faithfully following the Chicago Cubs and St. Louis Cardinals
    during baseball season, while keeping a disciplined weekly schedule of light resistance training to manage his arthritis.
  arts: Jorge Santamaria enjoys singing in the church choir, often performing hymns alongside traditional mariachi tunes by Los Camperos, studies the works of Frida Kahlo for inspiration in his folklórico
    dance classes, and occasionally acts in local productions of Arthur Miller’s ‘Death of a Salesman’.
  travel: Jorge Santamaria prefers well‑planned trips that blend cultural immersion with relaxation, having toured Mexico City’s Día de los Muertos celebrations and the historic streets of San Miguel de
    Allende, while his bucket list includes a slow‑paced pilgrimage to the basilica in Lourdes and a leisurely cruise along the Danube.
  culinary: Jorge Santamaria, a confident home cook, prepares authentic mole poblano and handmade tamales using garden‑grown oregano, poblano peppers, and heirloom corn masa, and delights in sharing these
    meals at neighborhood potlucks, though he occasionally burns the edges of his churros when distracted by a phone call.
  core: Jorge Santamaria blends meticulous organization with warm community spirit, balancing a disciplined routine of inventory audits and garden care with spontaneous card games and a love for festive
    celebrations, even if he forgets to water his succulents on rainy days.
background:
  cultural: Jorge is the son of Mexican immigrants who settled in the Midwest, and he grew up speaking both Spanish and English at home. His cultural identity blends traditional Mexican customs—such as
    celebrating Día de los Muertos, enjoying mariachi music, and preparing family recipes—with the values of Midwestern small‑town life, including neighborliness, self‑reliance, and community service. He
    remains active in the local Catholic parish, where he helps organize bilingual events that connect the town’s Hispanic residents with the broader community. His heritage influences his culinary interests,
    his dedication to family‑like bonds with coworkers, and his commitment to preserving cultural traditions in his new home.
attributes:
