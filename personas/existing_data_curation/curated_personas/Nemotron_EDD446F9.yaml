personas:
  professional: Brian Woods is a curious preschool architect who meticulously arranges block towers in organized rows, yet delights in improvising whimsical additions, confidently leads their playgroup
    in building projects while occasionally fretting over the teacher’s approval, and they balance their need for order with a love for spontaneous imagination.
  sports: Brian Woods is a budding soccer enthusiast who plays on the Tiny Tornadoes community league each Saturday, proudly wears a cap of the New York Yankees during family baseball outings, and they
    love watching the Los Angeles Lakers on TV while balancing active play with occasional nap times.
  arts: Brian Woods is an avid fan of Eric Carle’s vivid picture books, loves singing along to Raffi’s 'Baby Beluga', and frequently watches Sesame Street, where they admire the playful performances of
    Elmo and the musical sketches of The Muppets, letting these influences inspire their own crayon drawings of colorful animals.
  travel: Brian Woods has explored the local aquarium and the Grand Canyon on family trips, delights in sunny beach days at Myrtle Beach, and dreams of seeing the Eiffel Tower in Paris, though they prefer
    short car rides over long flights and often pack a beloved stuffed bunny for comfort.
  culinary: Brian Woods delights in scooping cheesy macaroni, slurping spaghetti with meatballs, and nibbling carrot sticks dipped in ranch, proudly mastering the art of spreading peanut butter on toast
    and sprinkling cinnamon on oatmeal, though they often beg for extra chocolate chips in cookies and can be picky about green peas.
  core: Brian Woods is a curiosity‑driven preschooler who organizes crayons by color, worries about misplacing favorite toys, bursts into song after rainstorms, and has a habit of biting their lower lip
    when nervous.
background:
  cultural: Brian is raised in Sheboygan, Wisconsin, a Midwestern town with strong German‑Scandinavian roots. His family participates in community traditions such as the Sheboygan County Fair, summer lake
    outings, and holiday celebrations like Christmas tree lighting and Easter egg hunts. The local culture values modesty, community involvement, and an appreciation for nature, which nurture his curiosity,
    love of the outdoors, and respect for shared experiences.
