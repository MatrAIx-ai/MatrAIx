  career_goals: Brian often imagines himself as a future artist who paints bright murals, an astronaut who explores distant planets, and a caring firefighter who helps others. He also dreams of being a
    teacher who shares stories and a scientist who discovers new creatures, reflecting his wish to combine creativity, adventure, and compassion.
