  career_goals: Pedro aims to transition into a supervisory or training lead role within his dispatch center, where he can formalize his experience into a mentorship program for new hires. He is passionate
    about integrating emerging technologies—such as AI‑assisted routing and real‑time data visualization—while remaining cautious about their impact on staff wellbeing. Leveraging his love of unconventional
    thinking, he hopes to design more intuitive dashboard interfaces that incorporate visual art cues to reduce cognitive load during high‑stress incidents. Pedro also plans to advocate for stronger mental‑health
    supports for dispatch personnel, using his own experience with stress to shape agency policy before he eventually retires and possibly consults on dispatch best practices for municipal agencies.
