personas:
  professional: A seasoned photographic lab technician named Dustin Hubbard exploits two decades of analog processing expertise, deftly maintaining C‑41 and E‑6 machines while integrating digital pre‑press
    workflows, and they channel their practical curiosity into mentoring junior staff and spearheading a boutique specialty print service.
  sports: An ardent Bills supporter named Dustin Hubbard joins his local ice‑fishing club each winter, follows the Sabres and Bisons on TV, and they proudly wear the team’s colors at tailgate parties, never
    missing a home game even when it conflicts with workshop projects.
  arts: An analog photography enthusiast and amateur woodworker named Dustin Hubbard explores cyanotype prints inspired by Ansel Adams, collects vintage lenses, attends exhibitions featuring Diane Arbus,
    and they regularly enjoy live gigs by local blues trio The Jiggs & The Junes.
  travel: A practical explorer named Dustin Hubbard favors weekend getaways to the Finger Lakes, Adirondack hiking trails, and occasional trips to Dublin, Ireland, they prefer spontaneous planning over
    rigid itineraries while balancing family duties with a modest travel fund.
  culinary: A culinary enthusiast named Dustin Hubbard loves devouring Buffalo‑style chicken wings, cheese curds, and fresh fish tacos paired with his own home‑brewed IPA, they experiment in the kitchen
    with a modest skill set, often crafting cedar‑plank salmon using ingredients like maple syrup and rosemary.
  core: Dustin Hubbard is a resilient, curiosity‑driven analog photographer who blends old‑school craftsmanship with modern tech, values community above all, and habitually misplaces tools while still delivering
    flawless prints.
background:
  cultural: Dustin grew up in a working‑class, white family with Irish‑Polish roots in the Buffalo suburbs. The city's industrial heritage and harsh winters shaped his practical, resilient outlook. He attended
    Buffalo public schools through high school and entered the local photographic lab trade straight out of graduation, reflecting a tradition of skilled trades in the region. His upbringing in a close‑knit
    Catholic community emphasized cooperation, humility, and the importance of helping neighbours, which aligns with his kind and considerate nature. Local customs—such as sharing wings on game nights,
    winter ice‑fishing on Lake Erie, and the pride in Buffalo’s sports teams—have been a steady cultural backdrop throughout his life, reinforcing a strong sense of place and community.
attributes:
  skills: '[''Photographic processing machine operation'', ''Color film development (C‑41, E‑6)'', ''Black‑and‑white film processing'', ''Darkroom printing and proofing'', ''Equipment maintenance and troubleshooting'',
    ''Color calibration and quality control'', ''Digital imaging workflow (Photoshop, Lightroom)'', ''Inventory management and supply ordering'', ''Laboratory safety and compliance'', ''Alternative photographic
    processes (cyanotype, silver gelatin)'']'
  hobbies: '[''Film photography (35mm and medium format)'', ''Alternative photographic processes (cyanotype, gum bichromate)'', ''Woodworking and small furniture making'', ''Ice‑fishing on Lake Erie'',
    ''Home‑brewing craft beer'', ''Buffalo Bills fan and occasional game‑day attendee'', ''Reading science and technology magazines'', ''Volunteer teaching basic photo‑development to youth'']'
  career_goals: He aims to advance to a senior technician or supervisory role within the lab, where he can mentor newer staff and lead initiatives to modernize the workflow, integrating more digital pre‑press
    tools while preserving the lab's analog strengths. Dustin also hopes to develop a niche boutique service offering specialty analog prints and custom alternative processes, eventually opening a small
    storefront that caters to local photographers and art collectors. He plans to acquire certifications from professional photographic societies and attend workshops to stay current with emerging printing
    technologies, all while maintaining a balanced schedule that allows time for family and personal projects.
