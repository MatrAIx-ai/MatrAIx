personas:
  professional: Amarilys Gomez, an aspiring junior architect, converts their love for building elaborate LEGO cities into a developing talent for spatial design, leveraging their imaginative curiosity and
    competitive drive to refine each structure with meticulous planning while maintaining the flexibility to tweak ideas on the fly.
  sports: Amarilys Gomez, a lively participant in after-school soccer practice, channels their competitive spirit into the local youth team the Riverdale Rockets, avidly follows the regional basketball
    franchise the Metro Sharks, and spends weekends riding a bike along the park’s nature trail, balancing team play with solitary exercise to recharge.
  arts: Amarilys Gomez revels in drawing fantastical creatures inspired by the whimsical worlds of Studio Ghibli’s Spirited Away and Dr. Seuss’s illustrations, synchronizes their creative process to the
    upbeat merengue and bachata rhythms they hear at family gatherings, and often mimics the vibrant choreography of performers like Juan Luis Guerra, blending visual and musical arts into a personal storytelling
    style.
  travel: Amarilys Gomez has explored the interactive exhibits of the local science museum and taken a family road trip to the seaside boardwalk, now dreams of riding the roller coasters at Disney World
    in Orlando and wandering the historic streets of Edinburgh, planning each adventure with hand-drawn maps and a colorful checklist of must-see attractions.
  culinary: Amarilys Gomez delights in the creamy comfort of mac and cheese topped with extra cheddar, creates mini pizzas stacked with pepperoni, pineapple, and mozzarella, can single-handedly assemble
    a perfect peanut butter and jelly sandwich on whole-grain bread, and occasionally sneaks a bite of chocolate chips hidden in the batter of their homemade banana muffins, showcasing a playful yet discerning
    palate.
  core: Amarilys Gomez is a fiercely imaginative six-year-old whose competitive streak fuels endless LEGO city constructions, impromptu merengue dances, and midnight sketching marathons, all while never
    missing a chance to question the rules.
background:
  cultural: Born to Dominican parents, Amarilys grows up bilingual, speaking Spanish at home and English at school. Family gatherings are punctuated by traditional dishes such as mangú and sancocho, and
    celebrations of holidays like Dominican Independence Day and Día de los Reyes. The vibrant rhythms of merengue and bachata are woven into her daily life through music and dance classes, while the multicultural
    atmosphere of Elmhurst, Queens, adds layers of Asian, Latin, and African influences that broaden her curiosity and appreciation for diverse cultures.
