  career_goals: Ying Mo dreams of becoming a scientist or engineer who creates useful inventions, reflecting her love for experimenting and solving puzzles. She also expresses a desire to be a teacher because
    she enjoys helping friends understand new ideas, and she occasionally imagines herself as an astronaut exploring space. In the near term, she aims to master reading fluently, win a school spelling bee,
    and complete a simple science project at her after‑school program, showing her competitive spirit and focus on tangible achievements.
