personas:
  professional: Ying Mo is a budding junior engineer in preschool, adept at assembling LEGO creations with precise instructions, applying their curiosity and methodical planning to solve puzzles, and often
    challenging peers to see whose structure can hold the most weight.
  sports: Ying Mo is a lively participant in the Tiny Tigers Soccer Club, practicing dribbling drills after school and proudly cheering for the New York Yankees, while their competitive drive pushes them
    to aim for the top scorer badge each season.
  arts: Ying Mo is an enthusiastic fan of the animated series "Bluey" and loves drawing colorful characters with Crayola markers, often performing spontaneous dance routines to the songs of The Wiggles
    and singing along to "Baby Shark" with friends, reflecting their sociable and creative energy.
  travel: Ying Mo is an adventurous child who enjoys weekend trips to the local science museum and has already visited Disneyland in Anaheim, planning future family vacations to the Grand Canyon while preferring
    itineraries that include interactive exhibits and play areas.
  culinary: Ying Mo is a picky eater who delights in chicken nuggets with honey mustard, spaghetti with tomato sauce, and strawberry yogurt, can proudly spread peanut butter on toast unaided, but consistently
    refuses broccoli, often bargaining for dessert after meals.
  core: Ying Mo is a methodical yet energetic five‑year‑old who balances curiosity with a love for competition, organizing toys into perfect rows, saving pennies for LEGO, tackling allergies head‑on, and
    turning every playdate into a structured adventure.
background:
  cultural: 'Ying Mo belongs to an East Asian family of Chinese heritage that settled in Bloomington, Indiana. Her household is bilingual, with Mandarin spoken at home and English used at school and in
    the community. Her parents celebrate Lunar New Year, the Mid‑Autumn Festival, and other traditional holidays, often sharing stories, dumplings, and cultural music. They also encourage participation
    in local Midwestern events, such as county fairs and community picnics, fostering a blend of cultural values: respect for education, modesty, and family cohesion from her East Asian roots, combined
    with the outgoing, community‑focused spirit of the Midwest. This multicultural environment shapes her worldview, curiosity, and interpersonal style.'
