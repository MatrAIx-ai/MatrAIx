  hobbies: '[''finger painting'', ''playing with water and sand'', ''listening to nursery rhymes and gospel music'', ''dance and movement to music'', ''storytime at the library'', ''building block towers'',
    ''group playdates'', ''sorting colored toys'', ''exploring textured sensory bins'', ''watching animated art videos'']'
  career_goals: While still early, Tariq frequently expresses fascination with artists and performers he sees in picture books and videos. He often says he wants to 'draw big pictures', 'make music', or
    'be a hero who helps people'. His parents note his budding ambition to become an artist, a musician, or a community helper like a firefighter. These simple aspirations reflect his curiosity about creative
    expression and his desire to be noticed in group settings.
