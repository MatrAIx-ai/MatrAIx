personas:
  professional: Tariq Williams, a two-year-old who loves arranging their toy blocks with meticulous order yet can improvise new structures on a whim, already displays the organizational and creative problem‑solving
    skills that foreshadow a future career in architecture or engineering.
  sports: Tariq Williams is an enthusiastic member of the Little Sprinters toddler soccer club, cheers for the local professional baseball team the River City Mariners, and loves sprinting in the park with
    neighborhood kids, channeling their energetic and competitive spirit into every game.
  arts: Tariq Williams, a two-year-old with a keen eye for color, loves finger‑painting to the tunes of Baby Mozart and sings along with Raffi’s Baby Beluga, turning each art session into a lively performance
    that satisfies their curiosity and love for varied experiences.
  travel: Tariq Williams prefers family outings to the nearby botanical garden and the interactive children’s museum, but dreams of seeing the Eiffel Tower in Paris and the Great Wall of China as future
    adventures, blending their love for new ideas with a desire for varied experiences.
  culinary: Tariq Williams enjoys mashed avocado with a pinch of lemon, devours banana pancakes topped with blueberries, and can assemble a simple cheese‑and‑cracker plate almost as well as they can stack
    their blocks, though they often spill the milk in excitement.
  core: Tariq Williams is a curious, competitive two‑year‑old who organizes toys with precision, trades stickers like a tiny investor, channels boundless energy into art and play, yet sometimes resists
    bedtime and bursts into spontaneous giggles.
background:
  cultural: Tariq is raised in an African‑American family in Florence, South Carolina. His upbringing is shaped by a close‑knit extended family and a community that values storytelling, music, and intergenerational
    connection. Weekly church gatherings expose him to gospel choirs and rhythmic clapping, while family meals feature traditional Southern dishes prepared with love. Community events like the local Juneteenth
    celebration and neighborhood block parties provide opportunities for Tariq to experience cultural art, dance, and communal support, reinforcing a sense of identity and belonging.
