personas:
  professional: Kawanna Belk, a 55-year-old seasoned tradesperson, leverages three decades of plumbing, HVAC and electrical expertise to diagnose and fix systems while informally mentoring apprentices,
    and now eyes a supervisory role where their blend of practical know-how and curiosity about green technologies guides a small crew in a union-affiliated contracting firm.
  sports: Kawanna Belk enjoys watching the hometown basketball team, the Metro City Monarchs, and the regional baseball squad, the River Valley Raptors, while staying active through a weekly walking group
    with the church fellowship and occasional light weight-training at the community gym.
  arts: Kawanna Belk finds solace in intimate blues and gospel shows, often attending performances by artists such as a B.B. King tribute band, an Etta James posthumous tour, and modern soul-blues singer
    Gary Clark Jr., while also savoring novels that chronicle pioneering women in history.
  travel: Kawanna Belk prefers low-key, self-driven road trips that blend historical sites with nature, having explored the cobblestone streets of Savannah, the jazz-laden neighborhoods of New Orleans,
    and the vineyards of Napa Valley, while dreaming of a leisurely pilgrimage to the castles of Scotland and a quiet retreat in the lavender fields of Provence.
  culinary: Kawanna Belk delights in cooking with the fresh rosemary, thyme, and basil from their garden, often preparing herb-infused jambalaya with smoked sausage, collard greens seasoned with paprika,
    and a Sunday-morning stack of fluffy buttermilk pancakes topped with maple syrup.
  core: Kawanna Belk is a hands-on veteran of the trades who balances a love for vintage radios and classic cars with a quiet, flexible lifestyle, occasionally misplacing tools but always finding time to
    mentor younger women in the field.
background:
  cultural: Kawanna is an African‑American woman rooted in Jacksonville’s historic black neighborhoods. She grew up in a close‑knit extended family where church, music, and community service were central,
    instilling values of cooperation, resilience, and pride in cultural heritage. Her upbringing exposed her to both the challenges and strengths of black working‑class life in the South, shaping her pragmatic
    approach to problem‑solving and her commitment to uplifting others. She celebrates African‑American traditions through food, gospel music, and participation in local Juneteenth events, while also embracing
    the Southern hospitality and the diverse cultural tapestry of Duval County.
attributes:
  skills: '["Plumbing installation and repair","HVAC system maintenance and troubleshooting","Electrical wiring and circuit repair","Blueprint reading and schematics interpretation","Use of hand and power
