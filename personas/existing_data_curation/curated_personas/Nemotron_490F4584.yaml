  hobbies: '["Reading historical fiction and biographies","Restoring vintage radios and classic cars","Gardening and urban farming","Community home‑repair volunteer work","Attending blues and gospel concerts","Walking
    along Jacksonville Riverwalk","Cooking traditional Southern soul food"]'
  career_goals: Kawanna aims to transition from frontline field work to a supervisory role within the next five years, overseeing a small team of technicians at a local union‑affiliated contractor. She
    desires to formalize her knowledge of green building practices, obtain a certification in energy‑efficient HVAC systems, and eventually become a mentor for younger women—especially those from the African‑American
    community—who are entering the trades. While she values flexibility and prefers a less rigid schedule, she hopes to balance this with steady income and a pathway to a portable retirement plan that will
    support her family’s long‑term stability.
