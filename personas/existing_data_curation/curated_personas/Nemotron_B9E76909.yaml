personas:
  professional: Jorge Laguer is a methodical automotive technician in Las Vegas who leverages his bilingual communication and inventory‑management skills to keep the workshop running like a well‑oiled machine,
    and he meticulously plans each repair while pursuing certification in vehicle maintenance.
  sports: Jorge Laguer plays midfield for a local amateur soccer league, follows international matches with a particular loyalty to Club América and Los Angeles FC, hikes the trails of Red Rock Canyon on
    weekends, and cheers for the Las Vegas Golden Knights during the NHL season.
  arts: Jorge Laguer relaxes after a shift by listening to classic salsa legends like Celia Cruz and modern Latin pop star Carlos Vives, attends occasional open‑mic nights at a community venue featuring
    folk guitarist Andrés García, and collects vintage vinyl records of regional folk music.
  travel: Jorge Laguer prefers road trips that blend nature and culture, having explored the Grand Canyon and San Diego’s coastal trails, while dreaming of a deep‑sea dive in the Galápagos Islands and a
    culinary tour of Spain’s coastal towns.
  culinary: Jorge Laguer is a competent home chef who skillfully prepares seafood dishes such as ceviche with lime, cilantro, and red onions, and encebollado with fish stock and plantains, often pairing
    meals with cumin‑spiced rice and a cold local craft beer.
  core: Jorge Laguer is a disciplined, competition‑driven technician who balances wrench‑tightening precision with a love for soccer, puzzles, and the perfect pinch of lime in a ceviche, all while meticulously
    tracking every dollar toward a future food import venture.
background:
  cultural: Jorge grew up in an Ecuadorian household and retains strong ties to his heritage. He speaks Spanish at home and celebrates Ecuadorian holidays such as Carnaval, Día de los Difuntos, and the
    feast of the Virgin of the Immaculate Conception with family and the local diaspora. Traditional music, dance, and cuisine are important parts of his identity, and he frequently shares these customs
    with friends in Las Vegas. While integrating into American life, he navigates the immigrant experience by blending the values of hard work and community support from his Ecuadorian roots with the pragmatic,
    structured lifestyle he values.
attributes:
  skills: '["Automotive mechanical repair", "Basic electrical troubleshooting", "Inventory management", "Bilingual communication (Spanish/English)", "Scheduling and logistics", "Time management", "Computer
    literacy (Microsoft Office, basic POS systems)"]'
  hobbies: '["Playing soccer", "Cooking traditional Ecuadorian cuisine", "Hiking in Nevada desert trails", "Solving puzzles (Sudoku, crosswords)", "Reading self‑improvement books", "Volunteering at local
    Latino community center"]'
  career_goals: Jorge is focused on establishing a stable, structured career. His short‑term goal is to earn his GED and obtain a certification in vehicle maintenance or warehouse logistics. He aims to
    secure a full‑time role as an automotive technician or warehouse supervisor where he can apply his methodical approach and reliability. In the longer term, he hopes to launch a small business importing
    authentic Ecuadorian food products to the Las Vegas market, leveraging his cultural knowledge and competitive drive.
