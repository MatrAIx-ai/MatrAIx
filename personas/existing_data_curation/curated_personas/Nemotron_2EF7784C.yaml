personas:
  professional: Brian Ray, a 4‑year‑old aspiring builder, loves snapping together chunky wooden blocks and LEGO bricks into towering structures, and they use a natural blend of organization and imagination
    while eagerly inviting peers to co‑construct, reflecting a cooperative spirit and curiosity for new ideas.
  sports: Brian Ray, a budding soccer fan, chases a soft ball around the neighborhood park, they proudly wear a miniature Indianapolis Colts jersey, and they cheer loudly for the Purdue Boilermakers during
    family basketball nights, while also dabbling in preschool gymnastics classes.
  arts: Brian Ray, an enthusiastic little artist, spends Saturday mornings at the South Bend Museum of Art’s kids’ corner copying the bold colors of Henri Matisse’s cut‑outs, they fill sketchbooks with
    crayons, and they hum the catchy tunes of They Might Be Giants while proudly displaying their creations on the refrigerator.
  travel: Brian Ray enjoys short family road trips to Michigan’s Upper Peninsula for lake‑side picnics, they cherish annual Fourth of July fireworks in downtown South Bend, and they dream of a future visit
    to Disney World’s Magic Kingdom, preferring itineraries that include familiar snacks and a favorite stuffed animal for comfort.
  culinary: Brian Ray, a picky eater who secretly loves honey‑glazed carrots and strawberry slices, delights in helping Mom whisk pancake batter on weekend mornings, they can be coaxed to try new foods
    when they’re shaped like dinosaurs, though they often protest broccoli with a dramatic pout.
  core: Brian Ray, a curious 4‑year‑old with an innate drive to help friends, balances bright imagination with occasional bedtime resistance, and they turn everyday moments into playful learning adventures.
background:
  cultural: Brian is raised in a middle‑class white family in South Bend, Indiana, where Midwestern values of politeness, community participation, and modesty are emphasized. His family celebrates traditional
    holidays like Thanksgiving and the Fourth of July, attends a local church, and often visits the South Bend Museum of Art and community festivals. Exposure to the city's industrial heritage and the nearby
    university environment nurtures his curiosity for new ideas while grounding him in a caring, cooperative community atmosphere.
