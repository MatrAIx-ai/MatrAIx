    clean‑up'']'
  career_goals: Eva aims to remain active and valuable in her community. She hopes to expand her volunteer work at the local senior center, perhaps leading a weekly knitting circle and assisting with the
    library's intergenerational reading program. She wishes to continue learning, including taking a community college class on digital photography to document family history. Eva also dreams of taking
    a short road trip to visit her grandchildren in neighboring states and to attend the annual Nebraska State Fair, reflecting her love of community celebrations.
