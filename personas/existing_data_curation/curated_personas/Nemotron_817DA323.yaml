  career_goals: He imagines a future where he explores the ocean and draws the sea creatures he discovers, hoping to become a marine biologist who also illustrates marine life. He also dreams of traveling
    to space and sketching planets, reflecting his love for both science and art. These ambitions are guided by his curiosity, appreciation for new ideas, and desire to combine discovery with creative expression.
