personas:
  professional: Manuel Medina is a meticulous facilities maintenance professional in New Orleans who leverages his systematic sanitation protocols, floor‑care expertise, and bilingual communication to keep
    galleries and public venues pristine, while integrating eco‑friendly cleaning practices and an aesthetic eye that reflect his curiosity for art, all as he works toward OSHA certification and a future
    as a certified facilities manager.
  sports: Manuel Medina plays pick‑up basketball at his neighborhood park, follows the New Orleans Pelicans and the Saints with fervor, participates in a community soccer league each spring, and incorporates
    second‑line dancing into his cardio routine, showcasing his energetic, sociable nature and love for team spirit.
  arts: Manuel Medina frequently visits the New Orleans Contemporary Arts Center and the Ogden Museum, where he sketches vibrant street murals and draws inspiration from jazz legends like Wynton Marsalis
    and visual artists such as Kehinde Wiley, while also volunteering to curate community art installations that blend traditional storytelling with contemporary expression.
  travel: Manuel Medina prefers meticulously planned weekend getaways to local gems like the Gulf Coast’s coastal towns and cultural trips to Oaxaca, while also dreaming of exploring the ancient ruins of
    Tikal, balancing his love for adventure with a modest budget that guides his choice of off‑peak flights and boutique B&B stays.
  culinary: Manuel Medina is an intermediate home chef who often fuses classic tamales and pepian flavors with Creole staples like gumbo and jambalaya, relishing ingredients such as ancho chilies, andouille
    sausage, okra, plantains, and fresh cilantro, and he delights in hosting dinner parties where friends sample his signature chili‑infused étouffée paired with local craft beer.
  core: Manuel Medina blends methodical professionalism, artistic curiosity, and community‑centered generosity, all while maintaining a calm, resilient outlook and an occasional habit of night‑time jazz
    listening and last‑minute salsa dancing.
background:
  cultural: He was born to Guatemalan immigrant parents who settled in New Orleans when he was a child, growing up bilingual in Spanish and English. His family maintained traditional Guatemalan customs—celebrating
    Semana Santa, cooking dishes like tamales and chiles rellenos, and sharing stories of Maya heritage—while also embracing the rhythms of New Orleans life, from Mardi Gras parades to jazz funerals. Manuel
    identifies strongly with both cultures; he participates in local Guatemalan community events at the city’s cultural centers and enjoys the city’s Creole festivals, music, and cuisine. This bicultural
    experience shapes his worldview, fostering an appreciation for diverse artistic expressions and a commitment to community solidarity.
attributes:
  skills: '[''Professional cleaning and sanitation'', ''Floor care (carpet, hardwood, tile)'', ''Chemical safety and eco‑friendly practices'', ''Equipment operation and maintenance'', ''Minor repairs (plumbing,
    electrical, carpentry)'', ''Inventory control and supply ordering'', ''Schedule planning and time management'', ''Health and safety compliance'', ''Bilingual communication (Spanish/English)'', ''Customer
    service and teamwork'', ''Event setup and venue preparation'', ''Art‑aware custodial care'']'
  hobbies: '[''Visiting art galleries and museums'', ''Street and architectural photography'', ''Live music attendance (jazz, blues, zydeco)'', ''Salsa and second‑line dancing'', ''Cooking Guatemalan and
    Creole cuisine'', ''Volunteer community clean‑up projects'', ''Playing pick‑up basketball'', ''Reading art history and sustainable design'', ''Balcony gardening (herbs, chilies)'', ''Sketching and drawing'']'
  career_goals: Eager to advance beyond his current role, Manuel aims to become a certified facilities manager, overseeing larger commercial properties and leading a maintenance team. He plans to complete
    his college coursework and obtain OSHA and sustainability certifications, positioning himself for supervisory responsibilities. Long‑term, he envisions launching a boutique cleaning service that specializes
    in art galleries, museums, and cultural venues, merging his expertise in meticulous custodial work with his passion for art preservation. He also hopes to mentor younger staff, contribute to community
    beautification projects, and achieve financial stability that would allow him to purchase a home in New Orleans.
