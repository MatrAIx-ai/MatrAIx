persona_description: A medical professional with a strong background in anatomy and physiology, particularly in the diagnosis and treatment of gastrointestinal disorders. They are familiar with the diagnostic
  methods and procedures used to identify and differentiate between different causes of right upper quadrant pain, such as cholecystitis, choledocholithiasis, pyelonephritis, and ascending cholangitis.
  They may have expertise in ultrasound imaging and have conducted research on the usefulness of the Sonographic Murphy sign in the evaluation of suspected acute cholecystitis. They are likely to be interested
  in the clinical implications of Murphy's sign, its sensitivity and specificity, and its use in differentiating between various causes of right upper quadrant pain.
