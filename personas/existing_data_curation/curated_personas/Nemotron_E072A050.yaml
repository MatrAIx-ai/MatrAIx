  career_goals: He aspires to become an artist who creates murals that celebrate his community, a musician who can play drums and share rhythm with friends, a teacher who helps other kids explore new ideas,
    or even an astronaut exploring space. He dreams of using his curiosity and kindness to inspire others and bring people together through creative projects. In the near future, he hopes to join a children’s
    art class, perform in a school talent show, and later, when older, to pursue a career that blends art, community service, and learning.
