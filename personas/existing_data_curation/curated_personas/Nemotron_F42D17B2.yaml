personas:
  professional: Sean Kuo, a veteran construction supervisor, blends three decades of hands‑on building experience, OSHA safety expertise, and a vivid imagination for incorporating traditional beadwork‑inspired
    motifs into modern projects, meticulously coordinating multidisciplinary crews, mentoring junior workers, and championing harmonious, culturally resonant work environments.
  sports: Sean Kuo stays active by hiking the Wichita Mountains with the Oklahoma Trail Runners, moderating his weekly weight‑training at a community gym, cheering the Oklahoma City Thunder during basketball
    season, and they schedule morning jogs along local prairie trails to balance the physical demands of his construction work.
  arts: Sean Kuo channels his imaginative curiosity into photography of Oklahoma plains reminiscent of Ansel Adams, watercolor paintings inspired by Georgia O’Keeffe’s desert hues, handcrafted wooden furniture
    with beadwork patterns, powwow drumming with the Red River Drummers, and evenings lost in speculative fiction by Neil Gaiman and Brandon Sanderson, shaping a vibrant artistic identity.
  travel: Sean Kuo prefers meticulously planned road trips that blend photography hikes in the Badlands and cultural immersion at the Santa Fe Indian Market, while dreaming of a summer pilgrimage to the
    Scottish Highlands to study ancient stonework, and they balance these trips with a modest household budget and occasional work‑related travel.
  culinary: Sean Kuo enjoys cooking over a backyard smoker, mastering Texas‑style brisket and corn‑bread while incorporating native Oklahoma ingredients such as pecans, wild onions, and prairie turnip into
    seasonal stews, and they often pair meals with a glass of locally brewed amber ale while savoring the process as a creative extension of their woodworking artistry.
  core: Sean Kuo, a 54‑year‑old construction veteran with a photographer’s eye and a restless imagination, balances meticulous project management with a habit of over‑committing to community art projects,
    often staying up late editing photos while worrying about deadlines.
background:
  cultural: Sean is a member of the Muscogee (Creek) Nation, with deep roots in the tribal communities of central Oklahoma. Growing up in Sand Springs, he was immersed in traditional stories, ceremonies,
    and the communal ethos of his ancestors, which emphasized harmony with the land and collective responsibility. His family includes artisans who practiced beadwork and woodworking, influencing his own
    creative pursuits. Sean’s cultural identity shapes his values of cooperation, respect, and stewardship, which he brings to his professional life by integrating tribal design elements into construction
    projects and advocating for Native American representation in the trades. He remains fluent in some Muscogee language phrases, participates in annual tribal powwows, and supports initiatives that preserve
    and revitalize indigenous heritage in the region.
