  career_goals: Looking ahead, Sean aims to transition into senior project management, overseeing larger commercial and community‑focused builds that prioritize sustainable practices and culturally resonant
    design. He plans to earn an OSHA Trainer certification and a Project Management Professional (PMP) credential to formalize his expertise. A long‑term ambition is to launch a consulting firm that partners
    with tribal communities to develop apprenticeship pipelines for Native American youth, blending modern construction techniques with traditional knowledge. Sean also seeks to become a mentor and mental‑health
    advocate within his crew, introducing stress‑management workshops and fostering a supportive workplace culture that mitigates the intense anxiety he’s personally experienced.
