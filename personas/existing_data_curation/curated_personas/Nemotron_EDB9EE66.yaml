personas:
  professional: Miguel Kreisel, a seasoned physical scientist at a research university, couples rigorous experimental design and materials characterization using SEM, X‑ray diffraction, and spectroscopy
    with flexible computational modeling in MATLAB and Python; they excel at interdisciplinary project coordination and mentoring undergraduates, yet their love of spontaneity sometimes leaves their lab
    notebook a bit chaotic.
  sports: Miguel Kreisel, an avid surfer who catches gentle swells at Swami’s Beach and a dedicated hiker on the Torrey Pines trails, also practices yoga three times a week, follows the San Diego Padres
    and the San Diego Wave FC, and participates in a local surf club and Sierra Club hiking outings.
  arts: Miguel Kreisel, a photography enthusiast who captures Pacific sunrises with a Nikon DSLR in an Ansel Adams‑inspired style, strums acoustic guitar to the tunes of Bob Dylan and Joan Baez at weekend
    gatherings, and regularly attends performances by the San Diego Symphony and the Old Globe Theatre, drawing creative inspiration from both visual and musical masters.
  travel: Miguel Kreisel, who balances meticulous itinerary planning with a love for spontaneous detours, often escapes on weekend road trips along the Pacific Coast Highway to Big Sur and has backpacked
    in Patagonia, while dreaming of photographing the Northern Lights in Iceland and surfing the cliffs of Portugal, always keeping an eye on travel costs and family time.
  culinary: Miguel Kreisel, an advanced home chef who meticulously prepares mole, tamales, and pozole using dried chiles de árbol, masa harina, and fresh cilantro, while also experimenting with Mediterranean
    dishes like grilled branzino with olives and lemon, enjoys sourcing ingredients at farmers markets and occasionally improvises when a sauce over‑reduces or a meat cut is forgotten in the freezer.
  core: Miguel Kreisel blends scientific rigor with a laid‑back surf‑side lifestyle, juggling meticulous research, green‑energy ambitions, and family‑centric cooking, all while battling occasional disorganization
    and stress‑driven worries.
background:
  cultural: Miguel grew up in a tight‑knit Mexican‑American family in Southern California, where Spanish was spoken at home and English at school. Family gatherings centered around shared meals, mariachi
    music, and traditions like Día de los Muertos, Semana Santa, and festive Christmas posadas. His parents emphasized education, community service, and respect for cultural roots, fostering his sense of
    responsibility to give back. He maintains strong ties with relatives in Mexico, traveling there during holidays and incorporating Mexican culinary and celebratory customs into his daily life in Encinitas.
    This bicultural identity informs his collaborative approach, his dedication to diversifying STEM, and his love for blending coastal Californian lifestyle with Mexican heritage.
