  hobbies: '[''Surfing at Swami’s Beach'', ''Coastal hiking (Torrey Pines)'', ''Native succulent gardening'', ''Cooking Mexican cuisine'', ''Landscape photography'', ''Acoustic guitar playing'', ''Reading
    historical biographies'', ''Science outreach workshops for youth'', ''Mindfulness breathing exercises'', ''Yoga'']'
  career_goals: Miguel aims to lead a multidisciplinary research team focused on developing sustainable materials for renewable energy applications, securing a major federal grant such as a DOE award to
    propel large‑scale experimentation. He aspires to publish high‑impact papers, mentor underrepresented students—particularly from the Mexican‑American community—and build partnerships with local clean‑tech
    companies to translate research into real‑world solutions. Additionally, he hopes to launch a scholarship and mentorship program that bridges his cultural heritage with STEM pathways, and to improve
    his lab’s organizational systems to reduce stress and enhance overall productivity while maintaining a healthy work‑life balance.
