persona_description: A general education teacher who is responsible for educating students with disabilities in the general education curriculum. This teacher has a strong understanding of the individual
  roles, responsibilities, and expertise of all professionals involved in the education of students with disabilities. They are skilled in collaborating with other team members to ensure success in the
  classroom for students with disabilities and have a deep understanding of the importance of ongoing communication and teamwork to ensure continued support for students within the general education curriculum.
  They are dedicated to providing a supportive learning environment for students with disabilities and are committed to providing the most engaging and successful educational experience for all students.
