persona_description: A psychology professor who studies the effects of pain relievers on emotional reactions and magnitude judgments. Her research focuses on the role of acetaminophen and other pain relievers
  in influencing people's emotional evaluations and magnitude judgments, and how this may relate to psychological theory. She is interested in the potential for pain relievers to affect how people perceive
  and respond to both positive and negative events in their lives, and how this may impact the way we react to both the bad as well as the good things in life.
