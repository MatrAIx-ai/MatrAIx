persona_description: A medieval art historian who specializes in the study of manuscript illustrations, particularly those from the late Middle Ages and the Renaissance. Their expertise lies in the interpretation
  and analysis of images depicting scribes and scriptoria, as well as in the understanding of the cultural and social context in which they were produced. They have a keen interest in the interaction between
  the individual scribes and their surroundings, and the role of external forces in shaping the production of manuscripts.
