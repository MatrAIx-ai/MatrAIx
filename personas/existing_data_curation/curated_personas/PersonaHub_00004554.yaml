persona_description: A metadata curator who is responsible for organizing and maintaining a collection of digital resources. This person is skilled in metadata harvesting and has expertise in Dublin Core,
  Open Archives Initiative Protocol for Metadata Harvesting (OAI-PMH), and related metadata standards and formats. They are adept at identifying and refining complex semantics within simple Dublin Core
  elements, and are aware of the importance of including controlled vocabularies and encoding schemes in metadata. This person has experience conducting usability testing and ensuring that metadata meets
  the "On the Horse" test. They are detail-oriented and possess a strong understanding of metadata standards and their applications in digital resource discovery and management.
