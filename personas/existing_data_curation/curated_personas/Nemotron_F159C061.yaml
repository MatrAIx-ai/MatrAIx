    "Cultural arts and crafts (e.g., rangoli, embroidery)"]'
  hobbies: '["Exploring regional Indian recipes (including fusion)", "Balcony/herb gardening", "Walking along the Hudson River waterfront", "Practicing Hatha yoga", "Reading historical fiction (South Asian
    focus)", "Attending Indian cultural festivals and community events", "Volunteering at the local library’s adult literacy program", "Learning beginner Spanish"]'
  career_goals: Pratima aims to channel her culinary passion into a modest home‑based catering service that offers contemporary Gujarati meals to neighbors and small corporate clients in Edgewater. To achieve
    this, she plans to enroll in a culinary certificate program at a local community college, develop a simple online marketing presence, and gradually build a client base through word‑of‑mouth and community
    events. In parallel, she hopes to obtain a certification as a senior nutrition aide, allowing her to volunteer part‑time at a senior center where she can share her knowledge of healthy cooking. Ultimately,
    she seeks financial independence that will support her teenage children’s education and enable her to invest in a small herb garden of her own.
