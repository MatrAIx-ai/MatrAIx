personas:
  professional: Pratima Gosein leverages her meticulous household management and community volunteering to launch a modest home‑based catering service, blending pragmatic budgeting with creative recipe
    development, while they confidently coordinate small events and handle DIY tasks as needed.
  sports: Pratima Gosein walks the Hudson River waterfront three times a week, practices Hatha yoga at a local studio, follows the New York Knicks and the New York City FC women's soccer team, and they
    occasionally join a community walking group for seniors.
  arts: Pratima Gosein reads historical fiction by authors like Amitav Ghosh, listens to classical sitar concerts by Anoushka Shankar, enjoys Bollywood dance performances at local festivals, and they attend
    Edgewater library poetry nights, letting artistic narratives shape their worldview.
  travel: Pratima Gosein prefers short, budget‑friendly trips to the Hudson Valley and Finger Lakes, dreams of exploring Barcelona's culinary markets after beginning Spanish lessons, and they balance family
    obligations with weekend getaways to Philadelphia's historic districts.
  culinary: Pratima Gosein experiments with Gujarati staples such as dhokla and khandvi, infusing them with Mediterranean herbs like basil and mint for low‑cost fusion twists, skillfully prepares weekly
    meal plans that feed family, neighbors, and potential catering clients, and they maintain a balcony herb garden for fresh ingredients.
  core: Pratima Gosein is a pragmatic, curiosity‑driven community‑spirit, balancing detailed budgeting, herb‑filled cooking experiments, and a steady routine of river walks, yoga, and volunteer work, all
    while juggling teenage kids, occasional spice‑spree temptations, and a budding culinary ambition.
background:
  cultural: Pratima was born in New Jersey to Gujarati parents who immigrated from India in the early 1970s. She grew up speaking Gujarati at home while attending public schools, which gave her fluency
    in both Gujarati and English. Family life centered around Hindu traditions—celebrating Diwali, Navratri, and Uttarayan—along with a strong emphasis on hospitality, especially through food. Although
    rooted in her Indian heritage, she has adopted many aspects of American culture, such as celebrating Thanksgiving and participating in community activities in Edgewater. This blend of South Asian values
    and New Jersey suburban life shapes her worldview, interpersonal relationships, and daily practices.
attributes:
  skills: '["Meal planning and preparation (traditional & modern Gujarati dishes)", "Household budgeting and finance management", "Community event coordination", "Basic computer and internet navigation",
