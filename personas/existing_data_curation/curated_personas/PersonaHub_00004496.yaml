persona_description: A team of engineers and researchers at De Montfort University in Leicester, United Kingdom, who are developing a high-performance 3D printer for manufacturing complex plastic components.
  They are collaborating with manufacturing specialists from MTT Technology, Renishaw, and Parker KV to develop the core technology of selective laser printing (SLP), an additive manufacturing process for
  high-performance polymer materials. The team aims to develop a machine capable of printing complex components in less than 20 minutes at speeds comparable to a desktop printer.
