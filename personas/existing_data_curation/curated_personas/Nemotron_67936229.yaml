  hobbies: '[''Visiting Art Galleries & Museums'', ''Listening to Jazz and Soul Music'', ''Cooking and Exploring World Cuisines'', ''Volunteering for Youth Mentorship'', ''Playing Basketball'', ''Gardening'',
    ''Woodworking'', ''Traveling to Cultural Festivals'']'
  career_goals: Ivan aims to advance to a regional sales director role within the next five years, where he can shape broader market strategies and champion the integration of digital sales tools across
    the territory. He is passionate about increasing market share for sustainable manufacturing products while establishing mentorship programs that uplift underrepresented talent in sales. Long‑term, he
    envisions launching his own boutique distribution firm focused on eco‑friendly goods, securing industry recognition for both sales excellence and community impact.
