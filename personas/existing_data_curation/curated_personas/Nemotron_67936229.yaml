personas:
  professional: Ivan Allen, a veteran wholesale sales representative with over three decades of experience in manufacturing distribution, leverages meticulous territory planning, advanced Excel analytics,
    and Salesforce CRM to exceed targets while weaving cultural events into product launches, positioning themselves as a disciplined yet creatively strategic leader aiming for a regional sales director
    role.
  sports: Ivan Allen stays active by joining weekday pick‑up basketball games at his local community center, competing in the Capital City Basketball League, cheering the Washington Wizards and Baltimore
    Ravens, and supplementing his routine with weekend gardening and occasional jogs along the Patuxent River trail.
  arts: Ivan Allen is a lifelong art enthusiast who frequents the Carroll County Historical Museum and Baltimore Museum of Art, collects Gordon Parks vintage photographs, attends live jazz shows featuring
    Kamasi Washington and classic soul tributes to Nina Simone, and regularly participates in cultural festivals like Harlem Week and local Juneteenth celebrations.
  travel: Ivan Allen plans trips around cultural festivals, having explored New Orleans for its jazz heritage, New York City’s Harlem Week, Savannah’s Gullah festivities, and Cartagena’s Caribbean cuisine,
    while balancing family commitments with occasional spontaneous weekend getaways to nearby historic towns.
  culinary: Ivan Allen enjoys experimenting in the kitchen, regularly preparing jambalaya with home‑grown okra, Ethiopian injera with berbere‑spiced lentils, and Korean bibimbap featuring fresh sweet potatoes
    from his garden, showcasing a moderate cooking skill level that blends global flavors with familiar comfort foods.
  core: At 54, Ivan Allen balances disciplined sales mastery with a vibrant passion for jazz, vintage photography, and multicultural cooking, mentors at‑risk youth, and maintains a calm resilience punctuated
    by a quirky habit of collecting vintage cameras.
background:
  cultural: Ivan is an African‑American who grew up in suburban Maryland, part of a family that migrated north during the Great Migration. His upbringing blended the close‑knit community values of the Black
    church with the industrious spirit of the Mid‑Atlantic region. He actively participates in local cultural traditions, celebrating Juneteenth, supporting Black artists, and attending community soul‑food
    gatherings. This heritage instills in him a strong sense of resilience, calm composure, and a commitment to uplifting his community, all of which inform his professional demeanor and personal passions.
attributes:
  skills: '[''Negotiation'', ''Strategic Account Management'', ''Territory Planning'', ''Data-driven Sales Forecasting'', ''CRM Proficiency (Salesforce)'', ''Manufacturing Product Knowledge'', ''Public
