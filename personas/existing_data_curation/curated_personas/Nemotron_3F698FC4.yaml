  hobbies: '[''Hiking'', ''Group Fitness (Zumba/Yoga)'', ''Cooking and Recipe Experimentation'', ''Gardening'', ''Volunteering at Food Bank'', ''Attending Farmers’ Markets'', ''Community Festival Participation'',
    ''DIY Home Improvement'', ''Reading Mystery Novels'']'
  career_goals: Jayne aims to transition back into the workforce within the next 12‑18 months, targeting a role that leverages her organizational and community‑engagement strengths, such as a program coordinator
    or outreach manager for a nonprofit or a small‑business office manager. She plans to complete a bachelor’s degree in business administration or social work to broaden her qualifications. In the longer
    term, she hopes to launch a boutique event‑planning service that specializes in community festivals and sustainable gatherings, providing both a steady income and a platform for her passion for community
    building. Financial independence and serving as a role model for her family are central motivations.
