personas:
  professional: Jayne Dehaven, a 39‑year‑old community‑oriented organizer, leverages their meticulous budgeting, event‑planning expertise, and social‑media savvy to coordinate nonprofit programs, while
    their blend of curiosity and practicality drives innovative yet reliable project outcomes.
  sports: Jayne Dehaven, an avid hiker of the Sierra foothills and regular participant in Zumba and yoga classes, follows the Sacramento Kings and the San Jose Earthquakes, and is a member of the Sierra
    Trails Hiking Club, which they join for weekly group treks.
  arts: Jayne Dehaven, a devoted fan of community theater and live music, eagerly attends local festivals featuring the folk group The Mountainbeats, regularly watches productions such as 'Our Town' at
    the downtown playhouse, and unwinds with mystery novels by Agatha Christie and Tana French, while their Spotify playlists often include classic rock icons like Fleetwood Mac.
  travel: Jayne Dehaven enjoys thoughtfully planned weekend getaways to nearby Yosemite and Napa Valley, balances adventure with relaxation, and dreams of a sustainable eco‑tour of the Tuscan countryside
    and a cultural immersion trip to Kyoto, all while budgeting travel expenses through a dedicated fund.
  culinary: Jayne Dehaven, an enthusiastic home cook with intermediate skills, loves crafting seasonal dishes like roasted heirloom tomato quinoa bowls, spicy lentil chili, and fresh garden‑grown herb pesto,
    frequently experiments with aromatics such as smoked paprika and fresh basil, and indulges in culinary workshops to master sourdough baking.
  core: Jayne Dehaven blends pragmatic organization with a zest for community, turning every garden harvest, festival plan, and mystery novel into a lively, purpose‑driven adventure, even if they occasionally
    forget to water their succulents on a busy week.
background:
  cultural: Jayne grew up in the suburban neighborhoods of Sacramento County, a region characterized by a blend of agricultural heritage and growing urban influence. As a white, middle‑class Californian,
    her cultural upbringing reflects mainstream American values such as self‑reliance, community service, and celebration of traditional holidays. She was raised in a Protestant family that emphasized church
    involvement and volunteerism, which continues to shape her commitment to local nonprofits. Living in Elk Grove has exposed her to a multicultural environment, influencing her appreciation for diverse
    cuisines and community events, while her personal identity remains rooted in the practical, down‑to‑earth sensibilities of the Central Valley.
attributes:
  skills: '[''Event Planning'', ''Project Coordination'', ''Volunteer Recruitment'', ''Budget Management'', ''Microsoft Office Suite'', ''Google Workspace'', ''Social Media Management'', ''DIY Home Improvement'',
