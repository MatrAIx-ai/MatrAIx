  hobbies: '[''Chess'', ''Bridge'', ''Woodworking'', ''Gardening'', ''Computer tutoring'', ''Trivia nights'', ''Genealogy research'', ''Community theater'', ''Gospel music'', ''Blue‑grass festivals'']'
  career_goals: Although retired, Jonathan is driven to transform his decades of experience into lasting community impact. He aims to mentor high‑school students in robotics and engineering through the
    local school’s STEM program, author a memoir that chronicles the evolution of manufacturing in the South, and help his Rotary Club secure funding for neighborhood infrastructure improvements. He also
    prioritizes staying physically active, preserving cognitive health, and traveling to spend time with his grandchildren.
