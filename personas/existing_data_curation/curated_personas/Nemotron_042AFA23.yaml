  hobbies: '["Visiting Art Galleries", "Listening to Merengue & Bachata", "Cooking Dominican Cuisine", "Social Dancing", "Balcony Gardening", "Podcast Listening (Design & Culture)", "Reading Fashion Magazines",
    "DIY Home Décor Projects", "Volunteering at Community Cultural Center", "Attending Caribbean Festivals"]'
  career_goals: Wilmary aims to move into a supervisory or store‑manager position where she can influence visual presentation and mentor newer staff. She plans to earn a retail‑management certificate or
    complete a GED to formalize her knowledge. Long‑term, she dreams of opening a small boutique that showcases Dominican crafts, music, and cuisine, merging her love of art with her cultural heritage.
    In the meantime, she seeks leadership roles on visual‑merchandising projects to build a portfolio and demonstrate her creative vision.
