personas:
  professional: Wilmary Rosario is a seasoned retail associate with a knack for visual merchandising, fluent in both Spanish and English, who leverages her curious eye for design and calm problem‑solving
    style to train new staff and drive sales, all while dreaming of stepping into a store‑manager role.
  sports: Wilmary Rosario stays fit by dancing merengue and bachata at neighborhood festivals and by joining a community soccer league in the spring, while cheering on the Philadelphia Eagles and the New
    York Yankees during the season, preferring spontaneous group workouts over rigid gym routines.
  arts: Wilmary Rosario immerses herself in the local art scene, drawing inspiration from muralist Fernando Lavín and the bold colors of Frida Kahlo, while listening to the smooth crooning of Juan Luis
    Guerra and reading Vogue for trend ideas, allowing her visual flair to spill over into store displays and DIY home projects.
  travel: Wilmary Rosario favors relaxed getaways that blend culture and leisure, such as weekend trips to Puerto Rico’s historic Old San Juan, spontaneous road trips to the Appalachian Trail’s scenic overlooks,
    and occasional city breaks in Barcelona, always planning just enough to secure a good deal while leaving room for spontaneous detours.
  culinary: Wilmary Rosario loves cooking beloved Caribbean dishes like mangú, sancocho, and maduros, seasoning them with cilantro, oregano, and a splash of lime, while experimenting with infused olive
    oils and occasionally over‑salting her soups in the pursuit of the perfect flavor balance.
  core: Wilmary Rosario blends vibrant Caribbean roots, retail savvy, a love for art, and an adaptable, easy‑going nature, even as she wrestles with occasional disorganization and late‑night snack cravings.
background:
  cultural: Wilmary grew up in a Dominican immigrant family in Trenton, where Spanish is spoken at home and Caribbean traditions are celebrated regularly. The rhythms of merengue, the flavors of home‑cooked
    meals, and the close‑knit family network shaped her identity. Although she left formal schooling early, she values the resilience and generosity of her community, often participating in neighborhood
    gatherings, religious celebrations, and local Dominican festivals. Her bicultural experience gives her a unique perspective that she brings to her retail role, allowing her to connect with a wide range
    of customers and infuse her work with a touch of Caribbean vibrancy.
attributes:
  skills: '["Customer Service", "Sales", "Bilingual Communication (Spanish/English)", "Visual Merchandising", "Inventory Management", "Point-of-Sale System Operation", "Cash Handling", "Team Training",
