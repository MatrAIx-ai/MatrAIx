persona_description: A public health official or a government official responsible for controlling and managing outbreaks of diseases, particularly cholera. This person is aware of the complex dynamics
  of disease control and prevention, including the impact of social, economic, and political factors on disease control efforts. They have experience in implementing and evaluating prevention and control
  measures, as well as understanding the limitations and potential harm of such measures. They are likely to be familiar with the WHO's guidelines and recommendations for disease control and are aware of
  the history of using disease outbreaks as a pretext for implementing new policies.
