  career_goals: Although Shruti is not currently employed, she aims to deepen her contribution to the Bellevue community. She plans to complete a volunteer certification in geriatric care so she can support
    seniors more formally at the local senior center. Shruti hopes to launch a small, informal cooking workshop where she teaches families how to prepare healthy South Asian dishes, preserving cultural
    heritage while promoting nutrition. She also aspires to travel to India to reconnect with extended family and document her family’s migration story in a memoir that can be shared with younger generations.
    Maintaining her health and financial independence, she wishes to continue building her garden, practice yoga regularly, and mentor younger women from similar cultural backgrounds on balancing tradition
    with modern life.
