personas:
  professional: Shruti Maiava, a meticulous community volunteer with a flair for budgeting and senior‑center logistics, channels their love of structure and caring nature into coordinating geriatric programs,
    preparing detailed volunteer schedules, and ensuring every event runs smoothly.
  sports: Shruti Maiava enjoys low‑impact fitness, attending a Wednesday evening yoga class at the Bellevue Community Center, cheering on the Seattle Seahawks during football season, and joining the local
    “Walk with a Buddy” group that explores Pacific Northwest trails on weekends, which they consider a gentle way to stay active.
  arts: Shruti Maiava finds solace in listening to sitar virtuoso Ravi Shankar, binge‑watching classic Bollywood dramas starring Amitabh Bachchan, and devouring biographies of trailblazing women such as
    Michelle Obama and Malala Yousafzai, which shape their weekend evenings.
  travel: Shruti Maiava prefers carefully planned trips that blend cultural immersion with family connection, organizing a modest‑budget pilgrimage to Delhi and Varanasi next spring while favoring short
    weekend getaways to nearby Bellingham and the San Juan Islands for leisurely lake walks, which they schedule months in advance to avoid last‑minute stress.
  culinary: Shruti Maiava expertly transforms traditional dishes such as aloo gobi and dal into heart‑healthy meals by swapping ghee for olive oil, layering spices like turmeric, cumin, and fenugreek, and
    frequently hosting pot‑luck gatherings where their signature low‑sugar mango lassi becomes the crowd’s favorite.
  core: Shruti Maiava, a detail‑oriented garden‑loving mentor who battles chronic worry with yoga, can spend hours perfecting a spice blend yet often forgets to water their tomatoes on rainy days.
background:
  cultural: Shruti comes from a South Asian background, originally raised in a close‑knit Indian family that emphasized education, respect for elders, and hospitality. She grew up celebrating festivals
    such as Diwali, Holi, and Navratri, where food, music, and community gatherings played central roles. While she has embraced American life in Bellevue, she maintains bilingual fluency in English and
    her native language, uses traditional cooking techniques, and participates in local South Asian cultural events to stay connected to her heritage. Her cultural values of harmony, cooperation, and caring
    for family continue to shape her daily interactions and community involvement.
