  career_goals: Deborah aims to transition from her current clerk role into a senior information management position within the next five years. She plans to earn a bachelor's degree in Information Management
    and obtain the Certified Records Manager (CRM) designation. Her ambition is to lead a digital archiving initiative for a cultural institution—such as a museum or historic society—in the Denver region,
    integrating AI‑assisted metadata tagging and workflow automation. Additionally, she seeks to mentor junior staff, shape organization‑wide records policies, and contribute to community arts programs
    through her expertise in documentation and event coordination.
