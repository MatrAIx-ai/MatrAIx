personas:
  professional: Deborah Mcdonald, a meticulous information management specialist, leverages advanced Excel, SharePoint, and basic SQL to streamline archival workflows while channeling their curiosity for
    art into leading community documentation projects and mentoring junior staff, and they consistently use their public speaking prowess to advocate for better records policies with calm, methodical confidence.
  sports: Deborah Mcdonald, an avid hiker, conquers Rocky Mountain trail loops on weekends, runs occasional 5K races, follows the Colorado Avalanche and Denver Broncos fervently, and participates in a local
    women’s climbing club, using physical activity as moving meditation that balances their dynamic schedule, and they relish the camaraderie of the club.
  arts: Deborah Mcdonald, a devoted patron of Littleton’s cultural scene, attends gallery openings featuring mixed‑media works by contemporary artists like Yayoi Kusama, photographs exhibitions of Ansel
    Adams at the local museum, and volunteers with the Littleton Arts Council to organize public art events, and they often quote Maya Angelou during themed dinner gatherings.
  travel: Deborah Mcdonald plans travel with bullet‑journal exactness, favoring weekend hikes in Rocky Mountain National Park, cultural excursions to Santa Fe’s art districts, and dreaming of a spring trip
    to Kyoto’s historic temples, all while they balance travel costs with a disciplined savings plan.
  culinary: Deborah Mcdonald crafts themed menus such as Mediterranean mezze with hummus, marinated artichokes, rosemary‑infused lamb, and garden‑fresh quinoa salads with heirloom tomatoes, delighting guests
    at weekly dinner parties, while they occasionally splurge on a tasting menu at Denver’s Rioja for inspiration.
  core: Deborah Mcdonald is a calm, curious, and socially vibrant information manager who blends meticulous organization with artistic enthusiasm, and they often juggle bullet‑journal projects, community
    events, and spontaneous culinary experiments.
background:
  cultural: Deborah is a white American raised in the suburban Front Range community of Colorado. Her upbringing blended classic Midwestern values of friendliness and reliability with the Colorado ethos
    of outdoor appreciation and environmental stewardship. She celebrates mainstream American holidays while also engaging in regional traditions such as local art festivals, mountain hiking excursions,
    and summer community concerts. The diverse artistic landscape of the Denver metropolitan area, combined with a strong sense of neighborly collaboration in Littleton, has shaped her appreciation for
    both cultural expression and civic involvement.
