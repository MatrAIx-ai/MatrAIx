personas:
  professional: Michael Wilkerson, a detective in San Juan County, leverages solid evidence collection, forensic photography, and basic digital forensics skills while allowing their imaginative, flexible
    mindset and occasional disorganization to drive unconventional, lateral approaches to cold‑case and missing‑person investigations.
  sports: Michael Wilkerson, a member of the Kirtland Trail Hiking Club, enjoys weekend hikes in remote canyons, follows the New Mexico State Aggies football team, cheers for the Denver Broncos as a regional
    NFL fan, and regularly participates in local 5 k fun runs to stay fit.
  arts: Michael Wilkerson channels a love for abstract desert vistas into acrylic canvases reminiscent of Georgia O'Keeffe, captures the New Mexico sky through a Nikon D850 with tonal mastery akin to Ansel
    Adams, crafts non‑linear crime flash fiction inspired by David Lynch, and strums acoustic renditions of Bob Dylan and Neil Young at local open‑mic nights, weaving these influences into a distinctive
    artistic identity.
  travel: Michael Wilkerson, who prefers loosely planned road trips peppered with spur‑of‑the‑moment detours, has trekked the Grand Canyon, explored Mesa Verde's ancient ruins, dreamt of photographing the
    midnight sun in Iceland, and hopes to someday journey across the Sahara desert for an immersive desert‑painting retreat, all while balancing a modest detective salary with occasional budget‑friendly
    travel hacks.
  culinary: Michael Wilkerson, a moderately skilled home cook, favors Southwestern flavors such as green chile stew, roasted corn tortillas with carne asada, and hearty quinoa salads dressed with lime,
    cilantro, and avocado, often pairing meals with a meticulously brewed pour‑over coffee and experimenting with smoky chipotle‑infused BBQ ribs on the grill.
  core: Michael Wilkerson is a detective‑turned‑artist who solves crimes with a paintbrush in one hand and a cryptic crossword in the other, thriving on late‑night caffeine, occasional disorganization,
    and a relentless curiosity for the abstract.
background:
  cultural: Michael grew up in a white, Anglo‑American family in Kirtland, New Mexico, a town that sits on the edge of the Navajo Nation. His upbringing blended the modest, self‑reliant ethos of rural New
    Mexico with exposure to the rich tapestry of Southwestern cultures, including Pueblo and Navajo traditions as well as Mexican influences that permeate the region. Family gatherings often featured local
    folk music and community fairs, instilling in him a strong sense of place and a respect for the land. His marriage to a local schoolteacher deepened his engagement with community life, and he frequently
    participates in county events that celebrate regional heritage while maintaining a broad, curious outlook toward diverse perspectives.
attributes:
  skills: '[''Criminal investigation'', ''Evidence collection and preservation'', ''Forensic photography'', ''Interviewing and interrogation'', ''Surveillance techniques'', ''Digital forensics basics'',
    ''Database query and analysis'', ''Pattern recognition'', ''Creative problem solving'', ''Report writing'', ''Community liaison'', ''Basic Spanish communication'']'
  hobbies: '[''Abstract painting'', ''Landscape photography'', ''Writing short crime fiction'', ''Solving puzzles and riddles'', ''Escape‑room challenges'', ''Hiking and desert camping'', ''Stargazing'',
    ''Playing acoustic guitar'', ''Board‑game nights with spouse'', ''Reading speculative fiction'']'
  career_goals: Michael aims to advance from his current detective role to become a lead investigator, focusing on cold‑case and missing‑person files where his imaginative perspective can shine. He hopes
    to develop a specialized unit that integrates creative analytical methods, such as narrative reconstruction and visual mapping, to solve complex crimes. In the long term, he envisions establishing a
    consulting practice that offers investigative training to smaller jurisdictions and producing a crime‑fiction series that draws on his real‑world experiences. He also wants to mentor new officers, emphasizing
    flexibility, curiosity, and cultural sensitivity in investigative work.
