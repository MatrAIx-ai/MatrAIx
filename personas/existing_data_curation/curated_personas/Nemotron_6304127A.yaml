  career_goals: Cameron dreams of a future where he can explore the stars as an astronaut while also creating the worlds he imagines through art and interactive media. He often talks about wanting to design
    video games that let players go on adventures, and he imagines himself as a professional soccer player who competes at high levels. His competitive spirit drives him to set ambitious goals, such as
    winning a science fair with a project about space travel or earning a spot on his school’s varsity soccer team when he’s older.
