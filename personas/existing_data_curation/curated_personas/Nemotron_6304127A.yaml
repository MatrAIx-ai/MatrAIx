personas:
  professional: Cameron Waters, an aspiring junior inventor who blends storytelling, LEGO architecture, and hands‑on science experiments, shows natural talent for spatial reasoning, sketching, and problem‑solving,
    yet their love of spontaneity often leaves projects half‑finished as they chase the next spark of curiosity.
  sports: Cameron Waters sprints across the field as a forward for the Brookside Strikers U9 soccer team, idolizes FC Barcelona and mimics its star moves, while also joining the local youth hiking club
    to explore the nearby woods during weekends, balancing competitive play with a love for nature.
  arts: Cameron Waters draws inspiration from manga master Osamu Tezuka, watches Pixar’s Toy Story for storytelling cues, and listens to Imagine Dragons for energetic beats, channeling these influences
    into weekly comic‑book sketches, elaborate LEGO creations, and occasional attendance at the town’s community theatre performance of The Lion King.
  travel: Cameron Waters loves spur‑of‑the‑moment road trips to nearby state parks like Yosemite and the Blue Ridge Mountains, where they collect rocks and leaves, and dreams of a future family vacation
    to the Kennedy Space Center and the Alpine peaks of Switzerland, balancing limited family budget with an appetite for exploration.
  culinary: Cameron Waters favors pepperoni pizza, cheesy macaroni, and crunchy tacos, often helping to assemble the meals like LEGO blocks, can confidently bake sugar‑cookie rounds using flour, butter,
    sugar, and chocolate chips, yet frequently forgets to wash hands before cooking and can’t resist a side of gummy bears.
  core: Cameron Waters is an eight‑year‑old curiosity‑driven whirlwind who sketches comic heroes, builds LEGO fortresses, dominates the neighborhood soccer field, and hoards rocks for the next sketch, all
    while juggling a competitive streak and a pocketful of snack crumbs.
background:
  cultural: Cameron grows up in Luther, Oklahoma, a small community that blends Midwestern values with a strong sense of local tradition. His family participates in community events such as county fairs,
    seasonal festivals, and school activities, fostering a connection to the region's agricultural and cowboy heritage. While primarily exposed to mainstream American culture—through school curricula, popular
    media, and local sports—he also experiences the rich cultural mosaic of Oklahoma, including occasional visits to museums that celebrate Native American history and regional art. This environment nurtures
    his curiosity, appreciation for art, and love of group activities, while also instilling a modest, down‑to‑earth perspective.
