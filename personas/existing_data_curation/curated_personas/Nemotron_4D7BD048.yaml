  hobbies: '[''Reading mystery novels'', ''Automotive tinkering'', ''Model kit building'', ''Hiking in nature'', ''Acoustic guitar playing'', ''Gardening'', ''Board‑game nights with close friends'', ''Community
    volunteer clean‑up events'']'
  career_goals: Randy aims to secure a stable, structured career that builds on his practical strengths and desire for predictability. He plans to finish his high‑school diploma and then enroll in a community‑college
    apprenticeship program in automotive technology or HVAC maintenance. His long‑term ambition is to become a certified technician and eventually manage a small service shop, allowing him to provide for
    his family while maintaining a balanced, low‑stress work environment. He also hopes to develop coping strategies for worry and stress so he can stay reliable and supportive in the workplace.
