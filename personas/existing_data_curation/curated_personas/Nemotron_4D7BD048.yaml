personas:
  professional: Randy Goetz is an aspiring automotive technician who combines their hands‑on experience fixing the family pickup with a knack for meticulous record‑keeping and a preference for predictable,
    structured work environments, making them a reliable future shop manager.
  sports: Randy Goetz enjoys hiking the trails of Shawnee National Forest and playing pickup basketball on weekends, follows the Chicago Bears in football and the St. Louis Cardinals in baseball, and they
    are a member of the local volunteer trail‑maintenance crew that doubles as a low‑impact fitness club.
  arts: Randy Goetz finds quiet solace in playing acoustic guitar renditions of John Prine and Bob Dylan, devouring mystery novels by Agatha Christie and Gillian Flynn, and attending occasional community‑theater
    productions of classic plays like ‘Our Town,’ which they see as shaping their reflective yet structured creative outlet.
  travel: Randy Goetz prefers meticulously planned road trips, having already mapped a weekend drive along historic Route 66 to Oklahoma City and hoping to camp in Yellowstone National Park, and they balance
    their love of nature with a modest budget and a habit of packing a detailed itinerary.
  culinary: Randy Goetz enjoys home‑cooked meals centered on garden‑fresh tomatoes and corn, skillfully preparing chicken‑and‑vegetable skillet, hearty chili, and occasional BBQ ribs, while they indulge
    in craft IPA beers and treat themselves to a slice of apple‑pie after a long hike.
  core: Randy Goetz is a detail‑obsessed 18‑year‑old who blends solitary tinkering with a quietly restless mind, often over‑budgeting for tools while they battle lingering anxiety.
background:
  cultural: Randy was raised in Mount Vernon, Illinois, a small‑town community in Jefferson County with strong Midwestern values. His family’s heritage is typical of the region, with German and Irish ancestry,
    and they practice a Protestant Christian faith that has shaped his emphasis on cooperation, humility, and community service. The local culture emphasizes a solid work ethic, respect for tradition, and
    close‑knit social networks, all of which have reinforced Randy’s preference for structure, reliability, and harmonious relationships.
attributes:
  skills: '[''Time management'', ''Basic computer operation (MS Office, Google Suite)'', ''Automotive maintenance and basic repairs'', ''Handyman skills (carpentry, minor electrical work)'', ''Organizational
