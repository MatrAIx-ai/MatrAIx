persona_description: An aerospace engineer specializing in the design and optimization of primary mirror assemblies for ground-based telescopes. This persona is responsible for developing lightweight mirror
  designs, optimizing mounting interfaces, and conducting finite element and wavefront error analysis to improve the optical performance of the primary mirrors. They are skilled in using optimization algorithms
  to reduce the weight and stiffness of the mirrors while maintaining high optical quality. This persona is likely to be involved in the development of advanced optical remote sensing instruments and is
  focused on reducing the weight and improving the performance of large aperture mirrors.
