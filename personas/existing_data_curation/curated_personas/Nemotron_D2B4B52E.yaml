personas:
  professional: Alejandro Rivas, a postsecondary instructor of Mexican and Latin American literature, blends rigorous literary theory with spontaneous, student‑centered curricula, leveraging their bilingual
    pedagogy, grant‑writing expertise, and public‑speaking flair while wrestling with tight deadlines due to a lingering worry‑driven perfectionism.
  sports: Alejandro Rivas, a member of the Franklin Mountains Hiking Club, embraces solitary desert treks as primary fitness, occasionally joins pickup soccer games with friends to support El Paso Locomotive
    FC, and follows the El Paso Chihuahuas for a seasonal dose of minor‑league baseball enthusiasm.
  arts: Alejandro Rivas, an avid poet and classical guitarist, regularly performs original verses in Spanish at intimate cafés while drawing artistic inspiration from the works of poet Octavio Paz, guitarist
    Andrés Segóvia, and filmmaker Alfonso Cuarón, shaping a creative identity that balances introspection with spontaneous public expression.
  travel: Alejandro Rivas prefers carefully curated, culturally immersive trips, having explored Oaxaca’s culinary markets and Veracruz’s coastal towns, while dreaming of a literary pilgrimage to Barcelona’s
    Gothic Quarter and a solitary desert retreat in Morocco’s Sahara, all planned around modest academic sabbatical windows.
  culinary: Alejandro Rivas, a home‑cook with a knack for regional Mexican flavors, expertly prepares mole negro with chocolate and chilhuacle peppers, tlayudas topped with queso Oaxaca and asiento, and
    cochinita pibil marinated in achiote, often experimenting with heirloom corn varieties and fresh epazote to deepen each dish’s authenticity.
  core: Alejandro Rivas is a 30‑year‑old academic who channels their introspective worry into poetic guitar sessions, meticulous lesson plans, and spontaneous culinary experiments, balancing a structured
    career path with a penchant for solitary desert hikes and occasional impulsive splurges.
background:
  cultural: Born to Mexican immigrant parents in El Paso, Alejandro grew up in a bilingual household where Spanish was spoken at home and English at school. His upbringing is steeped in Mexican traditions
    such as Día de los Muertos, quinceañeras, and the culinary heritage of northern Mexico. He identifies strongly with the borderland culture, navigating the fluid identities of both Mexican and American
    societies. This bicultural perspective informs his teaching and research, allowing him to connect students to the lived experiences of Mexican-American communities while honoring the broader Mexican
    cultural legacy.
attributes:
  skills: '[''Mexican and Latin American literature'', ''Literary theory and criticism'', ''Bilingual Spanish‑English instruction'', ''Curriculum design'', ''Academic advising'', ''Research methodology'',
    ''Grant writing'', ''Intercultural communication'', ''Classroom facilitation'', ''Mentoring'']'
  hobbies: '[''Reading poetry and Mexican literature'', ''Creative writing (poetry)'', ''Classical guitar'', ''Cooking traditional Mexican cuisine'', ''Hiking in the Franklin Mountains'', ''Mindfulness
    meditation'', ''Yoga'', ''Attending small literary readings'']'
  career_goals: Alejandro aims to secure tenure at his university within the next five years, building a distinguished research profile on the literary production of Mexican diasporic communities in the
    U.S.-Mexico border region. He plans to publish a monograph on contemporary Chicano poetry, obtain a major grant from the National Endowment for the Humanities, and develop interdisciplinary courses
    that connect literature with social justice and community engagement. In the longer term, he envisions taking on a leadership role as department chair, where he can advocate for inclusive hiring practices
    and expand study‑abroad opportunities for students in Mexico.
