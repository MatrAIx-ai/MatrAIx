personas:
  professional: An experienced senior graphic designer, Mary Grooms blends two decades of Adobe mastery with a humanities‑infused storytelling sensibility, delivering meticulous print and digital branding
    while navigating last‑minute client changes with calm flexibility; her collaborative nature and practical mindset position her for a future creative director role mentoring junior talent.
  sports: A dedicated weekend pickleball enthusiast, Mary Grooms regularly joins the Cape May County Senior League and follows the Philadelphia Eagles, Phillies, and the New York Knicks, balancing casual
    morning walks with a modest yoga practice that she sometimes skips in favor of extra quilting time.
  arts: An avid gallery‑goer and amateur photographer, Mary Grooms finds inspiration in Edward Hopper’s quiet scenes, Ansel Adams’ landscapes, and Joan Baez’s folk ballads, often volunteering at local art
    workshops where she shares her love for quilting patterns and historic portraiture.
  travel: A relaxed road‑trip planner, Mary Grooms revels in weekend getaways to Cape May’s Victorian seaside, summer visits to the historic streets of Savannah, and has long‑dreamed of a cultured escape
    to London’s museum district, always balancing family obligations with spontaneous detours to local farmers markets.
  culinary: A home‑cooking aficionado, Mary Grooms perfects rosemary‑infused roasted carrots, classic chicken pot pie, and strawberry shortcake with fresh garden berries, occasionally experimenting with
    sourdough starter while occasionally over‑salting a sauce when juggling multiple projects.
  core: Mary Grooms, a 52‑year‑old design veteran, blends methodical craftsmanship with a relaxed, sometimes chaotic, scheduling style, juggling a love for quilting and garden‑soothing moments while secretly
    hoarding vintage camera accessories.
background:
  cultural: Mary comes from a middle‑class, Anglo‑American family that grew up in the Mid‑Atlantic region. Raised in suburban New Jersey, she was immersed in traditional American values, strong community
    ties, and a modest appreciation for the arts. Her bachelor's degree in humanities deepened her knowledge of Western literature, history, and cultural narratives, which continue to inform both her professional
    design work and personal interests.
