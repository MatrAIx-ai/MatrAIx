  hobbies: '[''Gardening'', ''Quilting'', ''Historical Fiction Reading'', ''Visiting Art Galleries'', ''Local History Research'', ''Volunteer Art Workshops'', ''Photography'', ''Cooking/Baking'', ''Hiking
    in New Jersey Trails'', ''Attending Live Music at Local Venues'']'
  career_goals: Mary aims to step into a senior or creative director role within the next five years, leading a small team at a community‑focused agency in South Jersey. She seeks to mentor junior designers,
    broaden her expertise in UI/UX and motion graphics, and earn an Adobe Certified Expert credential. Parallel to her career advancement, she plans to launch a freelance practice that supports local non‑profits
    and cultural institutions, enabling her to balance professional growth with family commitments and a flexible schedule.
