  hobbies: '["Painting (watercolor)", "Photography (urban and fire scenes)", "Visiting art galleries and museums", "Reading art history and philosophy", "Playing the tabla", "Hiking (Shenandoah trails)",
    "Cooking traditional South Asian dishes", "Exploring diverse cuisines", "Volunteering in community mural projects", "Attending cultural festivals"]'
  career_goals: Sahid aims to advance to the rank of fire captain within the next three years, focusing on leading high‑risk incidents and mentoring younger firefighters. Over the longer term, he aspires
    to become fire chief, where he plans to pioneer the integration of data analytics, drone surveillance, and virtual reality training to enhance operational efficiency. He also seeks to earn a bachelor’s
    degree in fire science or public administration to broaden his strategic leadership skills. Additionally, he intends to develop a community outreach initiative that blends fire safety education with
    local art projects, leveraging his appreciation for creativity to foster public engagement and cultural awareness.
