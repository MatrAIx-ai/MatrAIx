    safety protocols'']'
  hobbies: '[''Urban gardening'',''Experimental cooking and recipe development'',''Reading popular science and local history'',''Listening to soul and jazz music'',''Volunteering at senior center food program'',''Puzzle
    solving (crosswords, Sudoku)'',''Journaling'',''Walking along the Monocacy River'']'
  career_goals: Renel aims to leverage her competitive drive to become a regional operations manager within the next five years, while also preparing to launch a community‑based food‑safety consultancy
    that offers workshops for small‑scale restaurants in Frederick County. She plans to earn a Certified Culinary Trainer (CCT) credential, mentor emerging Black chefs and supervisors, and eventually transition
    to a part‑time advisory role that balances her desire for flexibility with her commitment to professional growth.
