  hobbies: '[''Gardening'', ''Historical reading'', ''Photography'', ''Jazz and blues music'', ''Cooking Southern cuisine'', ''Chess'', ''Volunteer youth education'', ''Walking nature trails'', ''Church
    choir participation'']'
  career_goals: Tyrone aims to expand his influence in cultural tourism by launching a boutique travel agency that offers curated, small‑group experiences highlighting African‑American history throughout
    Texas. Over the next five years he plans to obtain the Certified Tour Professional (CTP) credential, publish a guidebook on Dallas’s hidden heritage sites, and develop a community training program to
    mentor emerging guides. He also hopes to partner with local museums to create immersive, interactive tours and eventually serve as a consultant for city‑wide heritage tourism initiatives.
