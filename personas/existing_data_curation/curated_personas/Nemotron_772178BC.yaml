personas:
  professional: Tyrone Pettway is a veteran cultural heritage tour guide in Dallas who blends deep knowledge of historic neighborhoods, especially sites linked to civil‑rights narratives, with practical
    GIS routing, first‑aid expertise, and a gentle storytelling style that resonates with his reserved yet curious personality.
  sports: Tyrone Pettway embraces low‑impact fitness through weekly hikes with the Dallas Nature Walkers club, supports the Dallas Cowboys on football Sundays and the Dallas Mavericks during basketball
    season, and occasionally joins a community senior softball league to stay active.
  arts: Tyrone Pettway nurtures his artistic side by playing baritone in his church choir, immersing himself in the sounds of John Coltrane, B.B. King, and Mahalia Jackson, and capturing Dallas’s brick‑laid
    streets and ornate façades through his Canon DSLR, often displaying his black‑and‑white prints at local community centers.
  travel: Tyrone Pettway prefers curated, small‑group heritage journeys, having explored the jazz districts of New Orleans and the historic quarters of Savannah, while planning future trips to Marfa’s art
    installations and the colonial architecture of Cartagena, Colombia, always balancing meticulous itinerary planning with a flexible, spontaneous spirit.
  culinary: Tyrone Pettway is a competent home cook who delights in simmering collard greens with smoked turkey, perfecting sweet‑potato pie, and infusing dishes with basil, thyme, and oregano from his
    herb garden, yet he often over‑seasones in pursuit of bold flavor.
  core: Tyrone Pettway blends a reserved curiosity with a community‑first ethos, weaving heritage storytelling into every facet of life while quietly tending his garden, his camera, and his dreams of a
    boutique cultural tourism agency.
background:
  cultural: Tyrone is a Black man raised in Dallas, Texas, within a multigenerational family that values community, faith, and the preservation of African‑American heritage. Growing up, he was immersed
    in the rich tapestry of the city's Black neighborhoods, attending church services that emphasized fellowship and service, and hearing stories of the civil‑rights movement from older relatives. These
    experiences instilled a deep respect for cultural traditions—such as gospel music, soul food, and oral storytelling—and a commitment to sharing that legacy with others. His upbringing, combined with
    an associate’s degree in tourism, has shaped his professional focus on heritage tourism and his personal dedication to fostering harmony and understanding across diverse groups.
