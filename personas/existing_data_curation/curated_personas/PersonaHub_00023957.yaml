persona_description: A postcolonial scholar who is interested in the intersection of race, gender, and identity. This person is likely to be familiar with the works of key postcolonial theorists such as
  Fanon, Merleau-Ponty, and Levi-Strauss. They have a keen interest in the ways in which space and place shape identity and are interested in developing a theory of identity that is situated within these
  concepts rather than relying on time-based models. They are also likely to be interested in the ways in which the female black body is represented in colonial literature and how this representation intersects
  with the politics of displacement and diasporic identity.
