personas:
  professional: Connie Garcia is a budding digital comic artist who leverages a love of structure to meticulously outline panel layouts, and they channel their competitive spark into winning every school
    art contest while embracing the spontaneous flair for improvisational storytelling cultivated in drama club.
  sports: Connie Garcia is a forward on the San Antonio community soccer league, thriving on the fast-paced, competitive matches that satisfy their drive to outscore opponents, idolizing San Antonio FC’s
    midfield play while also cheering for the Texas Rangers during baseball season, and they attend after-school conditioning sessions twice a week to stay sharp.
  arts: Connie Garcia is a drama club enthusiast and digital illustrator who draws comic-strip narratives inspired by Stan Lee’s bold storytelling, Naoko Takeuchi’s expressive panels, and the lyrical vibes
    of Taylor Swift, using their outgoing energy to lead improv sketches while they channel intense emotions into vivid digital art on a tablet.
  travel: Connie Garcia prefers spontaneous weekend getaways with friends, exploring nearby Austin’s music scene or the historic Alamo in San Antonio, and they occasionally dream of a family road trip to
    Disney World’s Magic Kingdom, balancing limited allowance constraints with a love for discovering new murals and hidden coffee shops.
  culinary: Connie Garcia enjoys cooking simple Tex-Mex dishes like sizzling beef tacos with corn tortillas, fresh cilantro, lime wedges, and homemade salsa, and they love whipping up guacamole with ripe
    avocados and jalapeños while sharing the meals with family to unwind after a busy soccer practice.
  core: Connie Garcia is a high-energy teen who blends competitive soccer drive, dramatic flair, and vivid comic art to channel intense emotions, and they juggle spontaneous spending with diligent anxiety-management
    rituals.
background:
  cultural: 'Connie was raised in a predominantly white, middle‑class suburb of Medina County just outside San Antonio, Texas. Her family celebrates traditional American holidays such as Thanksgiving, Christmas,
    and the Fourth of July, while also embracing regional Texan customs like watching high school football games, attending local rodeos, and enjoying barbecue gatherings. Living in South Texas, she has
    been exposed to the vibrant Hispanic influence that surrounds the area: she enjoys Tex‑Mex cuisine, participates in community festivals such as Fiesta San Antonio, and knows basic Spanish phrases spoken
    by friends and neighbors. This multicultural environment has shaped her appreciation for both Anglo‑American and Latino cultural elements, fostering a sense of pride in her Texan identity while remaining
    open to diverse traditions.'
