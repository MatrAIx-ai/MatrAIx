  career_goals: Connie envisions a future where she can combine her love for animals, her desire for a structured yet flexible career, and her competitive drive. She aims to become a veterinary technician
    after completing a community college program, eventually pursuing a bachelor's degree to qualify as a veterinarian. In parallel, she wishes to stay connected to soccer by coaching a youth team in her
    hometown, using the sport as a platform to teach teamwork and resilience. Her personal experience with anxiety motivates her to advocate for mental‑health awareness among her peers, and she hopes to
    incorporate that advocacy into her veterinary work by promoting humane, stress‑free care for both animals and the families that care for them.
