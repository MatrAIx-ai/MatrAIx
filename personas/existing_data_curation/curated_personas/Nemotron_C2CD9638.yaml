personas:
  professional: Anna Gebbia is an office administrator who leverages meticulous scheduling and travel coordination skills to keep teams on track, and their competitive streak drives them to exceed performance
    targets even as they embrace a flexible, sometimes chaotic, workflow.
  sports: Anna Gebbia is a co‑ed softball enthusiast in the Gulf Coast Softball League, roots for the New Orleans Saints and Pelicans, and squeezes in morning jogs along the bayou during spring, balancing
    competitive play with a relaxed approach to fitness.
  arts: Anna Gebbia sings in their church choir, devours mystery novels by Tana French and Agatha Christie, and enjoys the soulful sounds of Zydeco legend BeauSoleil at local festivals, letting music and
    suspense shape their weekend leisure.
  travel: Anna Gebbia favors spontaneous weekend road trips to nearby gems like Savannah, GA, Asheville, NC’s mountain retreats, and occasional cross‑border jaunts to Quebec City, planning routes loosely
    while keeping an eye on budget and family preferences.
  culinary: Anna Gebbia loves cooking Southern comfort dishes such as fried chicken with buttermilk, creamy collard greens, and peach cobbler, often experimenting with smoked paprika and okra in new recipes,
    though they sometimes over‑salt the gravy in their enthusiasm.
  core: Anna Gebbia blends a structured, efficiency‑driven work ethic with a love for community, spirited competition, and a tendency to juggle plans haphazardly, making them a sociable yet occasionally
    skeptical planner who never says no to a good casserole.
background:
  cultural: Anna grew up in the Deep South, raised in a close-knit, predominantly white community in the Bogalusa area of Louisiana. Her cultural upbringing blends traditional Southern values of hospitality,
    family-centric gatherings, and a strong sense of community. Influenced by regional traditions, she enjoys local music, food, and celebrations such as Mardi Gras and regional festivals. Her background
    includes participation in church life and a respect for the blend of cultural influences present in Louisiana, while maintaining a pragmatic, self-reliant outlook shaped by her upbringing and lifelong
    residence in the area.
