  hobbies: '[''Watercolor painting'', ''Abstract art'', ''Speculative fiction reading'', ''Philosophy'', ''Hiking'', ''Landscape photography'', ''Guitar playing'', ''Creative writing'', ''Sustainable living
    projects'', ''DIY home décor'']'
  career_goals: Roger aims to leverage his cleaning expertise into a supervisory position within a reputable cleaning firm, seeking certification in green cleaning and professional home-organization. His
    long-term ambition is to launch a boutique cleaning and home-staging business that blends meticulous service with artistic touch, providing a niche for clients who value both cleanliness and aesthetic
    refinement. He also aspires to achieve a healthier work-life balance to reduce stress for himself and his family, and to pursue occasional art workshops to keep his creative curiosity active.
