personas:
  professional: Roger King is a detail‑obsessed cleaning specialist who turns every client site into a pristine canvas, leveraging his green‑clean certification prep, handyman acumen, and an eye for interior
    styling to deliver services that feel both spotless and gallery‑ready.
  sports: Roger King finds solace in seasonal hiking trips across the Rocky Mountains and belongs to the Denver Alpine Club, while cheering on the Denver Broncos in football season and the Colorado Rockies
    in baseball, and they supplement outdoor pursuits with weekend spin classes at a local boutique studio.
  arts: Roger King spends evenings painting watercolor abstractions inspired by the ethereal tones of Mark Rothko, strumming simple guitar melodies reminiscent of Nick Drake, and reading speculative fiction
    by Ted Chiang, while finding artistic kinship with the surreal narratives of Haruki Murakami.
  travel: Roger King prefers low‑key, self‑planned escapes, having trekked the glacial trails of Banff, mapped the geothermal wonders of Iceland, and day‑tripped to the historic streets of Kyoto, yet they
    often delay longer trips due to work commitments and a desire to keep their herb garden thriving at home.
  culinary: Roger King enjoys crafting herb‑infused dishes like rosemary‑scented roasted potatoes and lavender‑honey chai, cooks at a semi‑professional level using a cast‑iron skillet and a small home garden
    of basil and thyme, and frequents farm‑to‑table pop‑ups that serve seasonal beet carpaccio.
  core: Roger King is a meticulous cleaner with an artist’s soul, juggling green‑clean ambitions, anxiety‑driven perfectionism, and a habit of hoarding watercolor supplies in the attic.
background:
  cultural: Roger was raised in a middle-class Anglo-German family in the Mountain West, where mainstream American values blend with a strong appreciation for the outdoors and self-reliance characteristic
    of Colorado culture. His upbringing emphasized hard work, community involvement, and respect for the natural environment, influencing his adoption of eco-friendly practices. He participates in regional
    traditions such as county fairs, Fourth of July celebrations, and local environmental volunteer events, while also maintaining a personal connection to the rugged landscape that shapes his identity
    and interests.
