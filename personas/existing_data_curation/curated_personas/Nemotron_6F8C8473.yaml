  hobbies: '[''Watercolor painting'', ''Quilting and textile crafting'', ''Gardening (perennials)'', ''Reading classic literature and art books'', ''Attending community theater'', ''Storytelling circles
    at senior center'', ''Leading a weekly book club'', ''Genealogy research'', ''Cooking and sharing local Wisconsin dishes'', ''Participating in local festivals and potluck gatherings'']'
  career_goals: Ashley remains driven to shape her community's cultural legacy even at 83. She hopes to curate a traveling exhibition that showcases senior artists from Marathon County while also compiling
    a written memoir that intertwines her personal stories with local history. She aspires to earn a certificate in digital archiving through a community college program, enabling her to preserve oral histories
    in an online repository. Additionally, she wishes to mentor younger volunteers, fostering their leadership skills and encouraging them to explore unconventional creative projects.
