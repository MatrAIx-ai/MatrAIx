personas:
  professional: Ashley Bost, an 83‑year‑old community arts organizer, leverages meticulous planning, calm mediation, and assertive facilitation to curate senior art exhibitions, lead intergenerational workshops,
    and they champion digital archiving initiatives, all while drawing on their boundless curiosity for new ideas.
  sports: Ashley Bost, a devoted fan of the Green Bay Packers and Milwaukee Brewers, participates in the senior walking club at sunrise, enjoys seasonal pickleball matches at the county recreation center,
    and they regularly volunteer as a scorekeeper for local high‑school basketball games during winter, bringing their sociable energy and assertive encouragement to teammates.
  arts: Ashley Bost enriches their creative life by painting Wisconsin lake vistas in the style of Winslow Homer, quilting patterns inspired by Georgia O'Keeffe's bold colors, attending performances of
    Our Town at the Colby community theater, and they listen to folk legends like Joan Baez and contemporary painter Kehinde Wiley, all of which inform their eclectic artistic sensibility.
  travel: Ashley Bost favors meticulously planned road trips, and they have explored Door County’s cherry orchards, the historic streets of Madison, a nostalgic weekend at Chicago’s Art Institute, and they
    dream of a future pilgrimage to the Tuscan countryside to trace family roots and sketch rolling hills, balancing curiosity with a calm, methodical travel style.
  culinary: Ashley Bost delights in preparing hand‑battered Wisconsin cheese curds with smoked paprika, simmering garden‑fresh zucchini and heirloom tomatoes into a rustic ratatouille, mastering the perfect
    butter‑based crust for their beloved rhubarb crumble, yet they often forget to refrigerate leftovers, leading to occasional pantry mishaps that they humorously attribute to their busy schedule.
  core: Ashley Bost, the ever‑curious octogenarian who balances meticulous community leadership with late‑night quilting marathons, and they occasionally misplace their spectacles on the easel, showcasing
    a quirky blend of organization and absent‑mindedness.
background:
  cultural: Ashley grew up in the heart of rural Wisconsin, surrounded by a community shaped by German and Scandinavian settlers. The values of self‑reliance, modesty, and neighborly cooperation typical
    of the Midwestern Midwest were instilled in her from an early age, as were traditions such as church gatherings, county fairs, and an appreciation for local foods like cheese curds and fresh potatoes.
    Her upbringing emphasized the importance of community service, storytelling, and preserving local heritage, which continues to inform her active involvement in Colby's senior programs and historical
    initiatives. Though she identifies as white American, she embraces the region's multicultural tapestry, respecting the contributions of nearby Polish and Norwegian families while maintaining her own
    family's German‑American customs.
