persona_description: A facility maintenance worker who is responsible for ensuring the safety and security of employees and visitors by setting up and using ladders correctly, climbing and descending safely,
  and preventing falls from ladders. The worker must be knowledgeable about the proper use of ladders, including choosing the right ladder for the job, setting up ladders correctly, climbing and descending
  safely, and preventing falls. They must also be aware of any accidents that have occurred on stairs in the facility and take steps to prevent future accidents. The worker's expertise in ladder safety
  is critical to the success of the facility's maintenance and safety programs.
