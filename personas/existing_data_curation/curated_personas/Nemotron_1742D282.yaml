personas:
  professional: Kayoko Zhang, a retired community arts volunteer, channels their curiosity and collaborative spirit into mentoring younger members of a local cultural association, using their Mandarin and
    Japanese language skills, culinary knowledge, and watercolor and calligraphy talents, while they keep a relaxed, occasionally disorganized approach that makes each workshop and event feel like a spontaneous,
    harmonious gathering.
  sports: Kayoko Zhang, an avid supporter of the Auburn Tigers football team, stays active through a weekly walking club, gentle yoga sessions, and occasional community tai-chi classes, preferring low-impact,
    social exercise over competitive sports while they relish the camaraderie of group walks.
  arts: Kayoko Zhang nurtures their artistic soul by painting watercolors of native blossoms, practicing calligraphy of traditional characters, regularly attending local theater productions featuring works
    by Meryl Streep, and volunteering at the Auburn Museum of Art, where they find inspiration in Monet's Impressionist canvases and community art talks.
  travel: Kayoko Zhang prefers thoughtfully paced travel, often planning short, relaxed trips to nearby cultural sites like Charleston's historic district and Savannah's riverfront, while they dream of
    a modest pilgrimage to the art districts of Shanghai and Kyoto once health and finances allow.
  culinary: Kayoko Zhang delights in melding traditional Mandarin and Japanese recipes with Southern staples, skillfully preparing dishes like dumpling-filled collard-green bao and miso-infused shrimp gumbo,
    while they savor herb-laden teas of basil and lemongrass and enjoy occasional lunches at local eateries serving kimchi-topped fried chicken.
  core: Kayoko Zhang is a 74-year-old retired arts enthusiast who blends heritage flavors with Southern comfort, pursues gentle yoga and daily walks, mentors community members, and navigates life with a
    curious, kind heart while they occasionally misplace paintbrushes and forget bill due dates.
background:
  cultural: Kayoko was born to parents who emigrated from China and Japan in the post‑World War II era. Raised in a bilingual household, she celebrated Chinese New Year, the Mid‑Autumn Festival, and Japanese
    Obon, absorbing Confucian values of harmony and respect. After moving to Alabama in early adulthood, she blended these traditions with Southern hospitality, participating in local church gatherings
    and community events. Her cooking fuses Sichuan spices with Southern comfort dishes, and she remains active in the Auburn Chinese‑American Association, helping to bridge her East Asian heritage with
    the cultural fabric of the American South.
attributes:
