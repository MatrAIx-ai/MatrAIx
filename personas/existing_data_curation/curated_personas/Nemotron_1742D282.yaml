  hobbies: '["Watercolor painting", "Calligraphy", "Gardening (herbs and native flowers)", "Reading (historical fiction, art history)", "Attending local theater and concerts", "Exploring diverse cuisines",
    "Volunteering at Auburn Museum of Art", "Family storytelling and genealogy research", "Yoga and gentle walking", "Silk‑screen printing"]'
  career_goals: Although retired, Kayoko aims to deepen her artistic practice by taking a short watercolor workshop at the local community college and exploring new printmaking techniques. She plans to
    compile a family recipe book that blends East Asian flavors with Southern comfort food, preserving her heritage for future generations. Kayoko hopes to mentor younger members of the Auburn Chinese‑American
    Association, sharing her cooking and calligraphy skills. If health permits, she dreams of a modest pilgrimage to the historic art districts of Shanghai and Kyoto, and she is determined to maintain her
    vitality through daily walks, gentle yoga, and regular participation in community cultural festivals.
