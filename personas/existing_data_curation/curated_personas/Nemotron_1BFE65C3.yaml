personas:
  professional: Zoie Mccall, a veteran mental-health counselor with over two decades of rural Arkansas experience, integrates CBT, DBT, and motivational interviewing with expressive-arts techniques—using
    watercolors and abstract sketches as therapeutic tools—while meticulously documenting outcomes, training junior staff, and strategically expanding telehealth services, they embody a methodical, competitive
    drive to pioneer a replicable rural creative-arts therapy model.
  sports: Zoie Mccall, an avid hiker who follows the Arkansas Razorbacks and the Dallas Cowboys, belongs to the Carroll County Trail Hikers club, spends weekends trekking wooded trails near Alpena, and
    prefers low-impact cardio like brisk walking and yoga over high-intensity gym workouts, they approach fitness with methodical pacing and a critical eye on progress metrics.
  arts: Zoie Mccall, a dedicated watercolorist and abstract sketcher, draws inspiration from Claude Monet's landscapes and Wassily Kandinsky's color theory, reads speculative fiction by Octavia Butler and
    poetry by Mary Oliver, composes short stories during quiet evenings, and attends intimate community art workshops featuring local musicians like Jason Isbell, they channel their imaginative curiosity
    into both creation and critique, often scrutinizing their own work with a skeptical, competitive edge.
  travel: Zoie Mccall, a meticulous planner, prefers solo retreats to cabins in the Great Smoky Mountains and cultural excursions to Bruges, Belgium, crafts detailed itineraries, uses travel reward points
    for flights, and balances modest budgeting with occasional splurges on art-themed tours, they seek both inspiration for their practice and therapeutic quiet, avoiding crowded tourist hotspots.
  culinary: Zoie Mccall, a competent home cook, delights in herb-infused dishes such as rosemary-roasted chicken, basil pesto pasta, and fresh garden ratatouille, often incorporates zucchini blossoms and
    heirloom tomatoes from her own herb garden, experiments with lavender shortbread for dessert, and enjoys pairing meals with pinot noir, they approach cooking methodically, yet sometimes over-season
    in their quest for bold flavors.
  core: Zoie Mccall blends a methodical, competitive mindset with a vivid imagination, turning solitary art and mindful hikes into a therapeutic practice that fuels both personal growth and professional
    innovation, while occasionally indulging in impulsive brush-spending sprees.
background:
  cultural: Zoie grew up in a white, working‑class family on a small farm in Carroll County, Arkansas. The region’s Southern‑Midwestern culture instilled values of self‑reliance, modesty, and close‑knit
    community ties, often centered around church gatherings and local fairs. While she respects these traditions, her innate curiosity has led her to explore broader artistic and intellectual horizons beyond
    the county’s borders. Her background combines a deep appreciation for the rhythms of rural life with a desire to bring innovative mental‑health practices to her community.
