  career_goals: Zoie aims to earn a master’s degree in clinical mental‑health counseling within the next three years, followed by full state licensure, positioning her to become a clinical director of the
    region’s community mental‑health center. She is passionate about expanding telehealth services in Carroll County to reduce access barriers, and she hopes to design a rural‑focused creative‑arts therapy
    program that can be replicated statewide. Additionally, she plans to present her work on integrating abstract art techniques into trauma treatment at regional conferences and publish a peer‑reviewed
    article. Mentoring emerging counselors and leading a multidisciplinary team are also long‑term ambitions.
