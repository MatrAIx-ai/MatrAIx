  career_goals: Billy aims to enroll in a vocational program in HVAC or automotive technology within the next year, acquire industry certifications, and secure a stable technical position that offers clear
    advancement pathways. Over the next five years, he hopes to become a lead technician, develop a reputation for reliability, and eventually launch his own small‑scale repair business, leveraging his
    meticulous planning skills to manage operations and finances. He is motivated by the desire for financial independence, job security, and the ability to work autonomously rather than in large corporate
    environments.
