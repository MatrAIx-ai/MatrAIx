personas:
  professional: Billy Cox is an aspiring HVAC technician who uses his strong organizational abilities and methodical troubleshooting skills to diagnose mechanical systems, while his competitive nature pushes
    him to earn industry certifications faster than his peers.
  sports: Billy Cox follows the New Mexico Lobos men’s basketball, trains with the Albuquerque Strength and Conditioning Club, and complements weight‑training with weekend desert trail hikes that serve
    as both cardio and navigation practice.
  arts: Billy Cox creates drone photography inspired by Ansel Adams, curates playlists featuring The Mountain Goats and Bon Iver, and occasionally visits the Albuquerque Museum of Art to stay connected
    to the local creative scene.
  travel: Billy Cox prefers meticulously planned road‑trip adventures, having mapped solo GPS waypoints across the Organ Mountains, and dreams of backpacking the sandstone canyons of Moab, Utah, as well
    as capturing sunrise over Sedona, Arizona.
  culinary: Billy Cox enjoys cooking a spicy green‑chile shakshuka and a perfectly seared flank steak with chimichurri, showcasing a competent home‑cooking skill set that blends bold New Mexican flavors
    with experimental plating inspired by their drone photography.
  core: Billy Cox is a methodical desert explorer whose curiosity for electronics is tempered by constant undercurrents of anxiety, leading them to obsess over spreadsheets while occasionally losing sleep
    over competitive video‑games.
background:
  cultural: Billy grew up in Las Cruces, a city in the high desert of southern New Mexico where Anglo‑American and Hispanic cultures intersect. His family’s roots trace back to early settlers of the Southwest,
    and he was raised with an appreciation for the region’s emphasis on self‑reliance, outdoor recreation, and modest community values. The local environment—characterized by wide open skies, the nearby
    Organ Mountains, and the Rio Grande—has fostered a pragmatic relationship with nature that informs his hobbies and work ethic. While primarily identifying with a white, middle‑class background, Billy
    is regularly exposed to bilingual interactions, regional festivals, and culinary traditions such as Tex‑Mex cuisine, which have subtly shaped his cultural perspective. The presence of nearby military
    installations and the campus culture of New Mexico State University contribute to a diverse yet close‑knit community, reinforcing his preference for small‑group connections over large social gatherings.
