personas:
  professional: Janice Mclellan is a retail sales specialist who leverages exceptional customer service, meticulous inventory management, and data‑driven visual merchandising to lead teams, while their
    calm resilience and sociable energy enable them to navigate high‑pressure sales periods without anxiety and pursue a path toward store and regional management.
  sports: Janice Mclellan stays active by hiking the Sam Houston National Forest on weekends, dancing in a community line‑dancing club, and following the Houston Astros, Rockets, and Dynamo, while they
    balance cardio with strength‑building sessions at the YMCA to maintain the stamina needed for their energetic lifestyle.
  arts: Janice Mclellan sings in their church choir, revels in live jazz and blues shows featuring artists like B.B. King and Norah Jones, draws inspiration from soul legends such as Aretha Franklin, and
    supplements their artistic appetite with business and self‑development reads from Simon Sinek and Carol Dweck, while they often volunteer to organize community music events.
  travel: Janice Mclellan prefers well‑planned road trips that blend cultural immersion with family relaxation, having explored Austin’s music scene, New Orleans during Mardi Gras, and a weekend getaway
    to Galveston, while they dream of a culinary tour of Oaxaca, Mexico, and a sunny retreat in Aruba for future vacations.
  culinary: Janice Mclellan enjoys cooking soulful collard greens and smoked turkey with a side of cornbread, while they experiment with Tex‑Mex fusion dishes like chipotle‑lime shrimp tacos and black‑bean
    enchiladas, favoring ingredients such as smoked paprika, fresh cilantro, and jalapeños, and they rate themselves as an intermediate home chef who loves hosting potlucks.
  core: Janice Mclellan is a methodical, community‑focused retail leader who balances data‑driven ambition with a love for choir, line‑dancing, and experimental cooking, yet they can’t resist a midnight
    taco binge after a long day of inventory checks.
background:
  cultural: Janice is an African‑American woman raised in Houston's vibrant Black community. Her upbringing was steeped in Southern Black traditions—gospel music, church involvement, soul‑food cooking,
    and a strong emphasis on family and neighborhood support. She values the cultural heritage of resilience and collective progress, participating in block parties, social‑justice initiatives, and local
    cultural events. Living in a multicultural city, she blends African diaspora influences with Texan hospitality and contemporary urban culture, reflecting both her heritage and the diverse environment
    of Houston.
attributes:
  skills: '["Customer Service", "Sales Strategy", "POS System Operation", "Inventory Management", "Visual Merchandising", "Team Training & Leadership", "Conflict Resolution", "Sales Data Analysis", "Event
    Planning", "Community Outreach"]'
  hobbies: '["Church Choir", "Community Volunteering", "Dancing", "Cooking", "Reading Business Books", "Gardening", "Attending Cultural Festivals", "Jazz & Blues Concerts", "Family Hiking"]'
  career_goals: Janice aims to advance from her current retail sales role to store manager within two years, then progress to district and regional manager positions. She plans to earn a bachelor's degree
    in Business Administration to strengthen her strategic skills. Long‑term, she dreams of opening a boutique that showcases African‑American heritage and local Houston artisans, while mentoring new associates
    and implementing data‑driven sales improvements across the company.
