  hobbies: '[''Salsa dancing'', ''Pickup basketball'', ''Cooking traditional Mexican dishes'', ''Watching boxing matches'', ''Exploring street art / murals'', ''Playing video games (FIFA, NBA 2K)'', ''Creating
    social media content'', ''Attending community festivals'', ''Celebrating Día de los Muertos'']'
  career_goals: Javier aims to transform his street‑level expertise into a sustainable business. His primary ambition is to launch a food‑truck that serves authentic Mexican street tacos, leveraging his
    cooking skills, bilingual communication, and social‑media savvy to attract a loyal customer base. He also wants to become a recognized community organizer within the Los Angeles Latino neighborhood,
    using his networking abilities to coordinate local events and support youth mentorship programs. While his lack of formal education presents a barrier, he plans to supplement his knowledge through short
    vocational courses in food safety and small‑business management. Ultimately, he seeks financial stability, personal pride, and the chance to prove that his practical experience can rival traditional
    credentials.
