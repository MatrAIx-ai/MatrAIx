personas:
  professional: Carlos Cotto, a budding LEGO engineer, channels their curiosity and practical mindset into designing moving mechanisms with bricks, thriving on spontaneous play sessions that often end in
    a chaotic but impressive masterpiece, even if they sometimes forget to tidy up the pieces afterward.
  sports: Carlos Cotto, who idolizes Real Salt Lake in the MLS and cheers for the Utah Jazz, spends his weekends in pick‑up soccer matches at the North Salt Lake park, trains with the North Salt Lake U-12
    Soccer Club, and channels competitive energy into mastering penalty kicks while occasionally boasting a badge from the local youth sports league.
  arts: Carlos Cotto fills his room with the sounds of folk melodies performed by regional musician Diego Lemos, practices traditional dance steps taught by his parents, and loses himself in adventure comics
    like Amulet by Kazu Kibuishi and the classic Bone series, often mimicking the heroics in his own LEGO creations.
  travel: Carlos Cotto loves spontaneous family hikes along the North Salt Lake trail system and has already explored Zion National Parks Narrows, while his imagination dreams of a future trip to the historic
    streets of Barcelona, though planning usually relies on his parents' schedule and budget constraints.
  culinary: Carlos Cotto delights in homemade chicken tacos seasoned with cilantro and lime, cheesy empanadas packed with ham and mozzarella, and classic peanut butter‑jelly sandwiches, yet they habitually
    leave a trail of crumbs around the kitchen and sometimes skip the vegetables on their plate.
  core: Carlos Cotto is a ten‑year‑old explorer who blends a love for soccer, LEGO mechanics, folk rhythms, and comic adventures into a vibrant, slightly chaotic life, marked by fierce competitiveness,
    a relaxed attitude toward rules, and a habit of forgetting where they put their favorite toy.
background:
  cultural: Carlos comes from an Argentine family that maintains strong cultural ties while living in North Salt Lake, Utah. At home, Spanish is spoken daily, and family meals often feature Argentine dishes
    such as milanesa and empanadas, giving him a taste of his heritage. He celebrates Argentine holidays like Día de la Tradición with storytelling and traditional music, and he participates in a local
    cultural club that offers tango basics and Spanish language activities. This blend of Argentine customs and American community life shapes his identity, fostering bilingualism, a love for soccer, and
    a respect for both his roots and his Utah surroundings.
attributes:
  skills: '["basic Scratch coding","science experiment kits","soccer ball control and teamwork","bilingual Spanish‑English communication","creative storytelling and improvisation"]'
  hobbies: '["playing soccer with friends","building LEGO creations","strategic video gaming","hiking and nature exploration","listening to Argentine folk music and dancing"]'
  career_goals: Carlos dreams of turning his love for soccer into a professional career, hoping one day to play for a top Argentine club and represent his country on the international stage. At the same
    time, his fascination with technology leads him to imagine becoming a video‑game designer or a junior robotics engineer, creating games that blend fun challenges with educational content. He sees himself
    as someone who can merge his practical tinkering skills with his competitive spirit to innovate in sports and tech.
