personas:
  professional: Wendy Diazrivera, a 29‑year‑old operations research specialist, leverages their expertise in mathematical modeling, integer optimization, and stochastic simulation to design cost‑effective,
    sustainability‑focused logistics solutions, while balancing a competitive drive to publish and a relaxed, sometimes disorganized, approach to project timelines.
  sports: Wendy Diazrivera enjoys low‑key fitness activities like weekend hikes with the Shenandoah Hiking Club and gentle yoga at Sunrise Studio, supports the Washington Capitals for hockey and DC United
    for soccer, and they occasionally join a local pick‑up basketball game despite their preference for solitary pursuits.
  arts: Wendy Diazrivera immerses themselves in speculative fiction by N.K. Jemisin and the rhythmic sounds of classic Cuban jazz icons like Benny Moré and Celia Cruz, while they also attend occasional
    indie theater productions of plays such as 'The Flick' and curate a personal playlist that blends science‑fiction soundtracks with traditional son.
  travel: Wendy Diazrivera prefers meticulously planned yet flexible weekend getaways, having explored Havana's historic districts, trekked the Blue Ridge Parkway, and camped in Shenandoah National Park,
    while they dream of a solo trek through Patagonia's Torres del Paine and a cultural immersion in Kyoto's tea houses.
  culinary: Wendy Diazrivera cooks Cuban staples such as ropa vieja, yuca con mojo, and plantain tostones with a moderate skill level, often experimenting with fresh cilantro, garlic, and lime zest, and
    they delight in pairing these dishes with a strong cafecito while occasionally treating friends to homemade pastelitos.
  core: Wendy Diazrivera blends a relentless curiosity for complex puzzles with a pragmatic, sometimes disorganized, work ethic, channeling competitive ambition into green logistics while they savor quiet
    evenings of Cuban cuisine, yoga, and low‑key board‑game nights.
background:
  cultural: Wendy was raised in Richmond by Cuban immigrant parents, giving her a bicultural identity that blends Caribbean warmth with Southern openness. She grew up bilingual, speaking Spanish at home
    and English in school, and participates in community celebrations such as Día de la Cultura Cubana and local salsa nights. Culinary traditions—like making pastelitos, café con leche, and festive feasts—are
    central to her family life, and she often incorporates these flavors into her cooking experiments. The rhythmic heritage of Cuban music and dance informs her appreciation for collaborative yet intimate
    gatherings. This cultural foundation enriches her perspective, allowing her to approach analytical problems with a sensitivity to diverse stakeholder values and to serve as a bridge between multicultural
    teams in her professional environment.
attributes:
  skills: '[''Mathematical modeling'', ''Linear and integer optimization'', ''Nonlinear optimization'', ''Stochastic simulation'', ''Statistical inference'', ''Python programming'', ''R programming'', ''MATLAB'',
    ''SQL'', ''Gurobi/CPLEX solvers'', ''Tableau'', ''PowerBI'', ''Supply chain network design'', ''Decision analysis'', ''Pragmatic problem-solving'', ''Adaptable workflow management'']'
  hobbies: '[''Puzzle solving (Sudoku, logic grids)'', ''Algorithmic coding challenges'', ''Reading speculative fiction and systems-thinking non-fiction'', ''Cooking Cuban cuisine (ropa vieja, yuca con
    mojo)'', ''Listening to Cuban jazz and son'', ''Yoga'', ''Hiking in Shenandoah region'', ''Board-game nights (Settlers of Catan, Azul)'', ''Small data-science meetups'']'
  career_goals: Wendy’s career ambition is to become a recognized leader in operations research, steering high-impact optimization projects that deliver measurable cost savings and sustainability gains.
    Over the next three to five years she plans to earn the INFORMS Certified Analytics Professional credential, lead a cross-functional analytics team within a major logistics firm or a state transportation
    agency, and champion initiatives that integrate green logistics practices. She aspires to a Director-level role where she can shape strategic decision-making, mentor junior analysts, and build a reputation
    for delivering innovative yet practical solutions. Wendy’s competitive drive pushes her to publish case studies in industry journals and to present at conferences, positioning herself as a go-to expert
    while maintaining flexibility in how projects are executed.
