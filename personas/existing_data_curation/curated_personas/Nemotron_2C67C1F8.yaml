personas:
  professional: Walt Wells, a 52-year-old stocker and order filler with over two decades of warehouse experience, leverages their meticulous inventory management, safety‑first mindset, and methodical work
    pace to keep the floor running smoothly, while quietly positioning themselves as a reliable candidate for a supervisory role.
  sports: Walt Wells, 52, is an avid follower of college football, regularly gathering with close friends to watch the Tennessee Volunteers play, while also enjoying quiet mornings casting a line on Duck
    River, and they belong to a local recreational fishing club.
  arts: Walt Wells, 52, finds artistic solace in reading historical non‑fiction by authors such as David McCullough, listening to classic folk singer Johnny Cash, and attending occasional performances at
    the local Methodist church choir, shaping their appreciation for narrative and tradition.
  travel: Walt Wells, 52, prefers low‑key, well‑planned road trips to nearby historic sites like the Natchez Trace Parkway and the Great Smoky Mountains, often traveling with their spouse in a modest sedan,
    balancing a desire for quiet discovery with budget constraints.
  culinary: Walt Wells, 52, delights in cooking garden‑fresh meals, frequently preparing grilled trout with lemon, roasted zucchini, and a hearty vegetable chili featuring tomatoes, beans, and cumin, while
    their cooking skill remains comfortable but not professional, and they occasionally treat themselves to a local BBQ joint's smoked brisket.
  core: Walt Wells, a 52‑year‑old warehouse veteran, blends a steady, detail‑driven work ethic with solitary hobbies, cautious finances, and a quietly nurturing spirit that masks a lingering worry about
    the future.
background:
  cultural: 'Walt grew up in a modest, white working‑class family in rural Middle Tennessee. His upbringing was steeped in Southern traditions—strong community bonds, a Methodist faith that emphasizes hospitality
    and service, and an appreciation for country music, church potlucks, and seasonal agricultural rhythms. He identifies with the values of the Appalachian foothills region: self‑reliance, practical problem‑solving,
    and a preference for straightforward, predictable living. These cultural influences shape his emphasis on responsibility, kindness to neighbors, and desire for a stable, orderly life.'
attributes:
  skills: '[''Inventory management'', ''Order picking and fulfillment'', ''Warehouse safety compliance'', ''Basic forklift operation'', ''Physical stamina'', ''Attention to detail'', ''Time management'',
