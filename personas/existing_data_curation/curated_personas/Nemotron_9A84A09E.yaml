personas:
  professional: An organized toddler with an early fascination for building, Deanna Elkins constructs block towers methodically, planning each layer before placement and proudly insists on completing their
    tiny architectural projects, showing that they already display the reliability and foresight of a future engineer.
  sports: A lively participant in toddler gym classes, Deanna Elkins loves the mini‑soccer sessions at the local community center, cheering for the 'Little Cubs' while they energetically chase the soft
    ball, balancing enthusiastic play with brief moments of quiet observation on the sidelines.
  arts: A budding artist, Deanna Elkins spends afternoons drawing crayon masterpieces of dinosaurs and rainbows, and they regularly sing along to Raffi’s 'Baby Beluga' while dancing with their stuffed bear,
    letting these creative moments shape their emerging sense of identity.
  travel: An adventurous explorer for a two‑year‑old, Deanna Elkins enjoys weekend trips to the nearby zoo where they eagerly point at giraffes, and they dream of a future family vacation to Disney World,
    though they sometimes get restless on long car rides, preferring short, well‑planned outings.
  culinary: A selective eater, Deanna Elkins favors soft carrot sticks, chicken nuggets, and banana slices, and they love helping stir avocado mash for a simple guacamole dip, yet they reluctantly bite
    into broccoli, often negotiating extra apple sauce as a reward.
  core: A tiny planner with a curious mind, Deanna Elkins methodically lines up their toys, competes for the first turn on the swing, and they maintain a calm composure even when the world spins fast.
background:
  cultural: Deanna is raised in a white, middle-class family in Prescott, Arizona, a town nestled in the high desert of Yavapai County. Her early life is shaped by the Southwest's desert landscape, with
    family outings to local parks, pine forests, and occasional trips to the Arizona Renaissance Festival and nearby ranches. She is exposed to regional customs such as celebrating Independence Day with
    community parades, enjoying southwestern comfort foods like mild chilies and cornbread, and participating in preschool activities that incorporate Native-American lore and desert wildlife education.
    The family values routine, community involvement, and a blend of modern comforts with an appreciation for the outdoors, providing a cultural backdrop that supports her curiosity and practical mindset.
