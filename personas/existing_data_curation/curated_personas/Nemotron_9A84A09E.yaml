  career_goals: Although still only two years old, Deanna is already forming vivid fantasies about her future. She frequently points to picture books of rockets and says she wants to become an astronaut,
    imagining travelling among the stars. She also shows a tender affection for animals, especially ranch dogs and desert wildlife, expressing a desire to be a veterinarian who helps creatures in the desert.
    These early aspirations are driven by her curiosity about the world and her desire to master challenging tasks, leading her to set simple personal goals such as completing a new puzzle each week and
    learning to count to ten.
