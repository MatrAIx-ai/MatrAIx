  career_goals: Although still nine, Barry envisions a future where he can blend his love for art, technology, and the natural world. He dreams of becoming an illustrator or animator who creates characters
    for books or video games, or perhaps a designer of interactive digital experiences. He is also fascinated by the idea of being an environmental storyteller—using visual art and simple coding to raise
    awareness about local wildlife. In the near term, he hopes to win his school science fair with a project that mixes art and simple robotics, and to have one of his drawings displayed at the community
    center.
