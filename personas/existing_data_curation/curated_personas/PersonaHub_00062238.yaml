persona_description: A control system engineer with expertise in regulating water levels in multiple coupled tank systems. The engineer is interested in designing controllers to regulate the water levels
  in Tank 1 and Tank 2 in a state coupled and input coupled SISO system, and is looking for a challenge to expand their knowledge and skills in this area. They are looking for a control system that can
  be configured into different configurations to explore various parameters, and are eager to learn from the original experiments taught by KTH in Sweden.
