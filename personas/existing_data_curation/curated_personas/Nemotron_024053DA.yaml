  hobbies: '[''Watercolor painting'', ''Visiting art galleries'', ''Reading contemporary fiction'', ''Hiking'', ''Photography'', ''Cooking experiments'', ''Attending indie concerts'', ''Traveling to cultural
    festivals'', ''Volunteering at local museum'', ''Yoga'']'
  career_goals: Mary aims to become a senior market research manager within the next five years, leading a team that integrates advanced analytics and AI‑driven predictive models to shape brand strategy
    for mid‑size consumer brands in Texas. She plans to pursue a Master’s degree in Marketing Analytics to deepen her technical expertise, and she aspires to publish thought‑leadership pieces on emerging
    consumer trends in industry journals. Long‑term, she envisions founding a boutique consultancy that helps regional businesses harness data‑driven storytelling to connect with diverse audiences, while
    also mentoring junior analysts and championing ethical research practices.
