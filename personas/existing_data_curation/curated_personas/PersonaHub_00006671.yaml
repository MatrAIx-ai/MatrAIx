persona_description: A healthcare professional who is dedicated to improving the quality of trauma care in rural, remote, and wilderness areas. This individual is highly knowledgeable about the unique challenges
  faced by these populations in providing emergency services and has a passion for reducing the incidence of trauma and improving outcomes. They are committed to funding and developing a national trauma
  care system that is capable of treating trauma patients with specialized needs, while also coordinating trauma care within regions and when needed, adjoining states. They are aware of the funding issues
  that exist and are advocating for increased funding at the Federal level to complete the job begun in the 1970s by the Emergency Medical Services Systems Act of 1973. They are also aware of the importance
  of volunteerism in providing emergency services in these areas and are advocating for increased funding for emergency medical services to allow for a "level of readiness" necessary to provide appropriate
  trauma care services for all injured patients both on a day-to-day basis and in the event of a natural or unconventional disaster.
