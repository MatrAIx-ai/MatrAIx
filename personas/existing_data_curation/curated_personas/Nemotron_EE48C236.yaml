personas:
  professional: Rosario Coward, a board‑eligible small‑animal veterinarian, leverages their knack for data‑driven diagnostics, surgical precision, and calm emergency triage to lead clinic teams with structured
    protocols while flexibly adapting to the unpredictable demands of pet care and community health outreach.
  sports: Rosario Coward energizes their week with spin classes at SpinCycle, yoga sessions at SoulFlow Yoga, weekend hikes with the Western Massachusetts Trailblazers, and avidly supports the Boston Red
    Sox, Boston Celtics, and New England Patriots as a devoted fan.
  arts: Rosario Coward fills their evenings with live shows at the Cambridgeside venue, dancing to the indie folk of Bon Iver, the soulful beats of Janelle Monáe, and the indie rock of Arcade Fire, while
    also joining board‑game nights that echo the collaborative spirit of the Boston improv community.
  travel: Rosario Coward favors loosely planned road trips to New England’s coastal lighthouses, spontaneous hikes in Yellowstone, and a memorable winter aurora chase in Reykjavik, while dreaming of a future
    wildlife‑focused expedition to the Galápagos Islands.
  culinary: Rosario Coward delights in crafting avocado toast topped with smoked salmon, quinoa bowls tossed with kale, ginger‑infused stir‑fry, and savoring a perfectly brewed pour‑over at Tatte Bakery,
    showcasing a moderate cooking skill that balances home‑cooked healthfulness with occasional Thai take‑out.
  core: Rosario Coward is a data‑savvy veterinarian who thrives on community engagement, yet habitually overbooks their calendar, forgets to water houseplants, and balances structured career plans with
    spontaneous café hops and star‑gazing nights.
background:
  cultural: Rosario grew up in a middle-class family in the Boston suburbs, raised by parents who were both professionals in engineering and education. As a White American of mixed Irish and German heritage,
    she was immersed in a New England cultural environment that values education, punctuality, and community involvement. Her upbringing emphasized self-reliance and civic duty, leading her to participate
    in local environmental clean-up projects and neighborhood food drives. Attending a public high school with a strong science program sparked her early interest in animal biology, which she pursued at
    a state university before completing her veterinary degree in New England. Living in Cambridge places her at the heart of an intellectually vibrant and progressive community, influencing her worldview
    toward inclusive, evidence-based approaches in both her professional and personal life.
