  hobbies: '["Spin class", "Yoga", "Hiking", "Animal shelter volunteering", "Community pet-health workshops", "Coffee shop socializing", "Live music attendance", "Board game nights", "Public science lectures",
    "Amateur astronomy"]'
  career_goals: She aims to become a lead veterinarian at a forward-thinking animal clinic in the Boston area, where she can shape practice standards to balance high-quality care with flexible, team-oriented
    scheduling. In the medium term, Rosario plans to open her own community-focused veterinary practice that integrates one-health initiatives, offering low-cost services for underserved pet owners and
    partnering with local public-health agencies. She also aspires to contribute to veterinary research on emerging zoonoses, publish in peer-reviewed journals, and teach clinical skills to veterinary students
    at Tufts University, leveraging her sociable nature to mentor the next generation.
