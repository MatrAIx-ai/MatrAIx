persona_description: A professional with expertise in child welfare policy and practice, specifically in the area of LGBTQ youth in child welfare settings. They have a strong interest in improving the well-being
  and outcomes of LGBTQ youth and have developed a new initiative called get R.E.A.L. (Recognize. Engage, Affirm. Love.) to address the challenges facing this population. They have experience working with
  organizations and agencies to develop policy and practice models and technical assistance programs to support the implementation of systems change and improve outcomes for all youth in the area of healthy
  sexual and identity development. They are committed to sharing information and best practices through the CSSP website and other resources.
