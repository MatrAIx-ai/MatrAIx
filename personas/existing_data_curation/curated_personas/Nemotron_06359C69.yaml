personas:
  professional: Shanel Brock is a 25‑year‑old founder and CEO of a sustainable community‑focused services firm who leverages sharp strategic planning, market research, and solid financial acumen while channeling
    her curiosity‑driven yet relaxed, occasionally disorganized workflow into agile decision‑making, empowering cross‑functional teams with a people‑first but assertive leadership style.
  sports: Shanel Brock is a devoted fan of the Richmond Kickers soccer team and the Washington Commanders football franchise, while as a member of the Richmond Road Runners club she tackles weekend trail
    runs and weekly yoga sessions, balancing a relaxed approach to exercise with a personal commitment to stay active on local hiking paths like the James River Park System.
  arts: Shanel Brock cultivates a quiet appreciation for live jazz and R&B, frequenting intimate Richmond venues such as The Camel and The National where she soaks in the sounds of Gregory Porter and Esperanza
    Spalding, while she collects vinyls of Nina Simone and keeps a notebook of lyrical reflections that inspire her entrepreneurial storytelling.
  travel: Shanel Brock favors solo, loosely planned adventures that mix purposeful retreats with spontaneous detours—having trekked the Blue Ridge Mountains, explored Cape Town’s food markets, and spent
    a weekend in Asheville’s craft scene—she dreams of a future culinary immersion in Oaxaca while balancing a modest travel budget and occasional family‑oriented trips to Virginia’s historic sites.
  culinary: Shanel Brock delights in experimental Southern‑African fusion cooking, confidently whipping up bobotie‑stuffed sweet potatoes, peri‑peri collard greens, and chakalaka‑topped shrimp and grits,
    while she relies on a modest rooftop herb garden of basil, cilantro, and rosemary to add fresh aromatics to every dish.
  core: Shanel Brock is a curiosity‑driven, quietly ambitious entrepreneur whose love of solo creativity, occasional disorganization, and devotion to community mentorship define a life balanced between
    strategic growth and spontaneous self‑care.
background:
  cultural: Shanel’s cultural identity is rooted in the African‑American experience of the Mid‑Atlantic South. Growing up in Virginia, she was shaped by a close‑knit extended family, church community gatherings,
    and the rich culinary traditions of Southern cooking blended with African influences passed down through generations. Her upbringing emphasized resilience, community support, and the importance of carving
    out space for Black excellence. These values inform her leadership style and entrepreneurial drive, as she seeks to honor her heritage while forging innovative pathways. She remains engaged with local
    cultural events, supports Black‑owned businesses, and actively mentors emerging Black leaders, reflecting a deep commitment to both her personal roots and broader societal impact.
