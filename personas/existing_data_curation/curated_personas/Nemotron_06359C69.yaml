  hobbies: '[''Reading nonfiction and biographies'', ''Journaling'', ''Southern‑African fusion cooking'', ''Rooftop herb gardening'', ''Yoga and meditation'', ''Hiking local trails'', ''Listening to jazz
    and R&B'', ''Volunteering at youth mentorship workshops'']'
  career_goals: 'Shanel aims to scale her current venture into a regional leader in sustainable community‑focused services, targeting a 200% revenue growth within the next five years. She envisions launching
    a mentorship program that empowers young Black women entrepreneurs in the Richmond area and hopes to secure an MBA in entrepreneurship to deepen her strategic toolkit. Long‑term, she aspires to join
    corporate boards that champion diversity and social impact, while also positioning her company as a model of inclusive, socially responsible growth.


    Her ambitions are guided by a desire to blend innovative ideas with proven business fundamentals, ensuring that expansion does not sacrifice the flexibility and community roots that define her leadership
    style.'
