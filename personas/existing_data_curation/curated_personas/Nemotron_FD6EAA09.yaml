personas:
  professional: Jian Gale is a budding builder who loves arranging wooden blocks in neat towers, displaying a love for structure and a practical focus on immediate realities while happily sharing creations
    with peers.
  sports: Jian Gale is an enthusiastic participant in the neighborhood toddler soccer group, often cheering for the local professional team the City Lions, while also enjoying weekly infant gymnastics classes
    at the community center.
  arts: Jian Gale delights in drawing with thick crayons, especially creating bright suns inspired by the children's songs of Raffi, and often watches the playful puppet show at the local library featuring
    classic characters like Elmo, which shapes their imaginative play.
  travel: Jian Gale loves family trips to the nearby city zoo, where they eagerly watch the playful otters, and dreams of a future vacation to the sandy beaches of Costa Rica, balancing the excitement of
    adventure with a need for familiar bedtime routines.
  culinary: Jian Gale favors mac and cheese with a sprinkle of cheddar and loves munching banana slices, but often turns mealtime into a mess, enthusiastically flinging peas on the floor while proudly 'helping'
    stir the pot with a plastic spoon.
  core: Jian Gale is a structure‑loving yet flexible toddler who balances compassionate sharing with occasional chaotic food battles, always seeking predictable routines while delighting in spontaneous
    giggles.
background:
  cultural: Jian’s family is of Hispanic/Latino heritage, speaking both Spanish and English at home. They celebrate traditional holidays such as Día de los Muertos, Cinco de Mayo, and family gatherings
    with dishes like tamales, enchiladas, and atole. Growing up in Carlsbad, New Mexico, he is also exposed to the desert landscape, local wildlife, and the community spirit of a small town. The blend of
    Mexican-American customs with New Mexican influences, including occasional Catholic traditions and local festivities at Carlsbad Caverns, shapes his worldview. This multicultural environment nurtures
    his compassion and cooperative nature, encouraging him to help others and maintain harmony.
