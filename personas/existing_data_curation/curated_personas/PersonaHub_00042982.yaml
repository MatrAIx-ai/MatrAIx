persona_description: Julian Ashton, an influential Australian artist who specialized in drawing and painting, particularly known for his work in the Sydney art scene. He was trained in London and arrived
  in Melbourne in 1878 to work as an artist for the Illustrated Australian News. He moved to Sydney in 1883 and founded an art school there, where he encouraged students to sketch outdoors and focused on
  drawing as a basis for art. Ashton soon became influential in the Sydney art scene, as a teacher and as a trustee of the Art Gallery of New South Wales (1889–99).
