  hobbies: '["Sketching and drawing plants", "Abstract painting", "Urban photography of street art and murals", "Reading speculative fiction and philosophy", "Exploring Philadelphia’s street‑art scene",
    "Community gardening", "Listening to jazz, hip‑hop, and reggae", "Writing short stories and poetry", "Playing narrative‑driven video games", "Attending live music events"]'
  career_goals: Franklin aims to evolve from a hands‑on groundskeeper to a recognized landscape designer who merges ecological function with artistic expression. Over the next few years he plans to complete
    a professional certification in horticulture and sustainable design, build a portfolio of inventive garden installations that incorporate abstract art and community storytelling, and eventually launch
    his own boutique landscaping firm in Philadelphia. His business model will prioritize flexible scheduling, collaborative projects with local schools and nonprofits, and the creation of green spaces
    in underserved neighborhoods. He also hopes to mentor young people of color interested in green careers, using his own journey as a guide.
