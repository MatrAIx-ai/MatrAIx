personas:
  professional: Franklin Hunter, a 31‑year‑old Philadelphia groundskeeper who is channeling his solid horticultural expertise—soil testing, irrigation system installation, and sustainable garden construction—into
    a budding career as a landscape designer, leverages his love for abstract art to sketch conceptual garden layouts, and embraces a flexible, sometimes disorganized workflow that prioritizes client harmony
    and creative storytelling.
  sports: Franklin Hunter, a weekend participant in pick‑up basketball games with the Xtreme Hoops league and a regular runner along the Schuylkill River Trail, avidly supports the Philadelphia Eagles,
    Phillies, and 76ers, and occasionally practices yoga to counterbalance the physical demands of his landscaping work.
  arts: Franklin Hunter, an avid explorer of street‑art, frequently photographs Shepard Fairey‑style murals, paints to the rhythms of Miles Davis, Kendrick Lamar, and Bob Marley, and draws abstract inspiration
    from Kandinsky while curating a personal library of speculative fiction and philosophy books that fuel his artistic projects.
  travel: Franklin Hunter, preferring spontaneous, low‑budget escapes, has trekked the Pocono Mountains, soaked in New Orleans’ jazz heritage, studied Kyoto’s zen gardens for design ideas, and now dreams
    of an immersive terraced‑garden tour of Italy’s Amalfi Coast.
  culinary: Franklin Hunter, a competent home cook, delights in farm‑to‑table dishes like heirloom tomato bruschetta with fresh basil, roasted beet and goat‑cheese salads, and occasional sushi rolls, seasoning
    with rosemary and dill harvested from his community garden, and relishes exploring the diverse stalls of Philadelphia’s Reading Terminal Market.
  core: Franklin Hunter, a 31‑year‑old ground‑keeper‑artist, cultivates living canvases and abstract sketches alike, juggling a passion for sustainable design, chronic worry, and impulsive art‑supply splurges.
background:
  cultural: Franklin grew up in West Philadelphia in a close‑knit African‑American family that celebrated the city’s rich black heritage. His mother’s family traces roots to the Southern United States,
    while his father’s side carries Caribbean influences, reflected in his middle name “Samoa.” He was immersed in church choirs, soul and R&B music, and community gatherings such as block parties, Juneteenth
    celebrations, and local BBQs. These cultural experiences nurtured his love for rhythm, storytelling, and communal spaces, which he often seeks to embed in his landscaping designs through collaborative
    projects and culturally resonant plant selections.
