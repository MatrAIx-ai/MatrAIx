  career_goals: Terry aspires to become a senior full‑stack engineer who leads cross‑functional teams to build technology solutions that blend creativity with social impact. He envisions moving into a tech‑lead
    or product‑manager role where he can champion inclusive design, mentor diverse developers, and spearhead projects that serve community organizations or non‑profits. Over the next decade, he hopes to
    shape a product portfolio that reflects his curiosity for unconventional ideas while maintaining a harmonious, collaborative work environment.
