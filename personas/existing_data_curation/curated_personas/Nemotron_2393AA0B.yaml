personas:
  professional: Terry Holmes, a full‑stack web engineer with fluency in Python, React, TypeScript and Docker, channels a love of experimental UI design into collaborative sprints, mentors junior developers
    with compassionate code reviews, and dreams of steering socially‑impactful tech products as a future tech‑lead while embracing a flexible, people‑first workflow.
  sports: Terry Holmes, an avid weekend hiker in the Appalachian foothills, supports the Atlanta Braves, Atlanta Falcons and Atlanta United, joins a local hiking club for monthly trail outings, participates
    in casual pickup soccer games at the community park, and balances cardio with a weekly yoga class to maintain flexibility and core strength.
  arts: Terry Holmes, a digital illustrator and landscape photographer, curates playlists featuring Bon Iver, Animal Collective, and Japanese indie band Fujifabric, draws inspiration from Ansel Adams' chiaroscuro
    and James Turrell's light installations, spends Friday evenings strumming acoustic Nick Drake covers, and hosts intimate board‑game nights with friends playing Catan and Azul while swapping art print
    ideas.
  travel: Terry Holmes prefers low‑key, self‑planned trips that blend creative inspiration with eco‑friendly exploration, having trekked the Blue Ridge Parkway, photographed Iceland's South Coast under
    the midnight sun, and dreaming of a culinary pilgrimage through Oaxaca's mezcal markets, all while budgeting travel with a points‑earned credit card and staying in boutique hostels or campgrounds.
  culinary: Terry Holmes, a moderately skilled home chef, experiments with global flavors by preparing Korean kimchi‑fried rice with gochujang, Ethiopian injera‑wrapped veggie medleys, and Japanese miso‑glazed
    eggplant, relishes the bright crunch of sumac‑dusted roasted carrots, and often uses a sous‑vide device to achieve perfect protein textures while swapping fusion recipes on indie food forums.
  core: Terry Holmes is a curiosity‑driven, art‑obsessed full‑stack developer who blends flexible work habits with compassionate mentorship, chases light in Appalachian hikes and flavors in experimental
    dishes, and occasionally misplaces bills amid a relaxed, disorganized routine.
background:
  cultural: Raised in Dallas, Georgia, Terry grew up in a small‑town environment rooted in Southern hospitality, community gatherings, and a strong sense of belonging. His family values emphasized modesty,
    hard work, and helping neighbors, which nurtured his compassionate and cooperative disposition. While the local culture celebrates traditions like church potlucks and high school football, Terry's curiosity
    led him to seek broader horizons through technology and the arts. He blends these influences, cherishing the supportive community spirit of Paulding County while actively engaging with contemporary
    digital culture and global ideas.
