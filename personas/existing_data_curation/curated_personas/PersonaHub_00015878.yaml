persona_description: A CEO and technology entrepreneur who is passionate about disrupting the transportation industry and accelerating the transition to electric aviation. He is dedicated to developing
  and testing new electric aircraft, such as the Cessna 208B Grand Caravan, which can carry between 9-14 people and can cruise up to 214 miles per hour. His goal is to make electric commercial aircraft
  more affordable, with zero emissions, and enable the offering of flying services of people and packages in a way previously not possible. He is looking for ways to reduce the carbon footprint of the aviation
  industry and is open to exploring alternative modes of transportation, such as rail and road.
