personas:
  professional: Jaclyn Shenoy, a 50‑year‑old surveillance specialist, leverages her education background and meticulous attention to detail to design and oversee casino security operations, while training
    staff with clear, standards‑driven protocols and championing innovative safety‑arts outreach programs.
  sports: Jaclyn Shenoy energizes her week with Zumba and aerobics classes at the community center, hikes the Trail of Tears State Park with friends each spring, and roots passionately for the St. Louis
    Cardinals while occasionally joining a local recreational softball league.
  arts: Jaclyn Shenoy curates intimate exhibitions at the downtown art gallery, paints tranquil watercolors of the Missouri Bootheel inspired by the palette of Claude Monet, acts in community theater productions
    of Arthur Miller plays, and delights in live shows by folk singer Gregory Alan Isakov and the local jazz trio Blue River Band.
  travel: Jaclyn Shenoy prefers meticulously planned cultural trips, having explored New Orleans’ music scene, wandered the galleries of Paris, and trekked the hiking trails of the Great Smoky Mountains,
    while dreaming of a future visit to Kyoto’s historic temples and tea houses.
  culinary: Jaclyn Shenoy enjoys mastering international cuisines, frequently preparing Thai green curry with fresh lemongrass, Indian butter chicken seasoned with garam masala, and Mexican mole poblano,
    while experimenting with locally sourced pumpkin and sage in her signature watercolor‑inspired dessert.
  core: Jaclyn Shenoy blends a security professional’s precision with an artist’s curiosity, balancing disciplined surveillance work, community art advocacy, and a love of group fitness, while they occasionally
    indulge in spontaneous culinary experiments.
background:
  cultural: Jaclyn was raised in the Midwest, specifically in Kennett, Missouri, where small‑town values of community, hard work, and resilience are deeply embedded. Her white, Midwestern upbringing emphasized
    practicality, politeness, and a strong sense of civic responsibility, while her college education broadened her worldview and sparked an enduring curiosity for diverse ideas and artistic expression.
    The blend of rural cultural roots with exposure to broader educational and professional environments has shaped her balanced perspective—combining traditional Midwestern reliability with an openness
    to unconventional thinking and cultural enrichment.
attributes:
