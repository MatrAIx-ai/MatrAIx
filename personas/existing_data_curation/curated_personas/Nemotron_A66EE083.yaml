    Footage'', ''Team Leadership and Scheduling'', ''Integration of Emerging Technologies in Security'']'
  hobbies: '[''Local Art Gallery Volunteering'', ''Watercolor Painting'', ''Community Theater Acting'', ''Live Music Attendance'', ''Zumba/Aerobics Group Classes'', ''Weekly Book Club'', ''Cooking International
    Cuisine'', ''Hiking Local Trails'', ''Podcast Listening on Psychology and Art'', ''Traveling with Small Groups'']'
  career_goals: Jaclyn aims to advance to a supervisory or management role within the security and surveillance sector, ideally overseeing a regional team at a casino or entertainment complex. She plans
    to obtain professional certifications such as the Certified Protection Professional (CPP) and a Master’s in Security Management to deepen her strategic expertise. Long‑term, she envisions creating a
    specialized training program that merges her educational background with security best practices, fostering a culture of continuous learning and innovation. Additionally, she hopes to champion community
    outreach initiatives that combine safety education with local arts programming, reflecting her curiosity and appreciation for unconventional collaborations.
