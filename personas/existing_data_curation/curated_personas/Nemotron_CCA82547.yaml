  career_goals: Even at his young age, Manuel talks about what he wants to become when he grows up. He imagines himself as a painter who creates bright, unconventional pictures that make people think, or
    as an engineer who builds clever gadgets from building blocks. He also mentions wanting to be a scientist who discovers new ideas, reflecting his competitive streak and love for solving problems. These
    aspirations are framed in the language of a child, but they echo his organized, critical, and creative personality.
