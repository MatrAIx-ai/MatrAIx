personas:
  professional: Manuel Herrera, a budding LEGO architect, blends meticulous planning and methodical building with a curious eye for novel designs, often critiquing fellow kids' constructions while they
    prefer quiet, solo play.
  sports: Manuel Herrera cheers for FC Barcelona and Manchester United on TV, attends a local toddler soccer circle on Saturdays, and delights in sprinting around the playground with the mini-track team
    at preschool while they love watching the ball roll.
  arts: Manuel Herrera adores the animated worlds of Pixar’s Toy Story and Disney’s Frozen, loves drawing with Crayola crayons, and mimics the playful songs of singer-songwriter Jack Johnson during playtime,
    and they often reenact scenes with stuffed animals.
  travel: Manuel Herrera revels in weekend trips to the city zoo, enjoys a family vacation at a coastal beach resort in Florida, and dreams of exploring the neon lights of Tokyo’s kid-friendly museums,
    and they collect postcards from each place.
  culinary: Manuel Herrera prefers cheesy macaroni, chicken nuggets seasoned with sweet paprika, and freshly sliced strawberries, often helping stir the batter for banana pancakes with a wooden spoon, and
    they proudly present the finished dish to their parents.
  core: Manuel Herrera is a meticulous, curiosity-driven four-year-old whose love for organized play, worry-laden imagination, and occasional sticker-splurging makes every day a tiny adventure, and they
    often wonder about the world.
background:
  cultural: Manuel grows up in a bilingual Mexican‑American household in El Cajon, California. His family celebrates traditional Mexican holidays such as Día de los Muertos and Las Posadas, and he regularly
    helps prepare dishes like tamales and quesadillas. He attends a local preschool where both Spanish and English are spoken, which reinforces his cultural identity. Community events at the nearby Mexican
    cultural center expose him to folk art, mariachi music, and dance, shaping his appreciation for art and unconventional ideas while grounding him in a rich, dual‑heritage environment.
