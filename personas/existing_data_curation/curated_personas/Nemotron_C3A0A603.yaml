  hobbies: '["Recreational soccer", "Cooking traditional Mexican food", "Home rooftop gardening", "Listening to mariachi and regional Mexican music", "Attending cultural festivals", "Fishing in the Gulf
    Coast", "Classic car appreciation", "Community volunteer clean‑ups and tree planting"]'
  career_goals: Tomas aims to advance to a crew foreman role within the next two years, pursuing a Certified Landscape Technician (CLT) credential to formalize his expertise. In the longer term, he plans
    to launch his own landscaping business focused on eco‑friendly, low‑water designs for Houston neighborhoods, leveraging his structured planning abilities. He also hopes to lead community green‑space
    projects, mentor younger workers, and give back to the local Mexican‑American community through sustainable landscaping initiatives.
