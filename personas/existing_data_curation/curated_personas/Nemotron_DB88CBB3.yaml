    History Talks"]'
  career_goals: Gladys aims to deepen her involvement in community service by taking on a leadership role in the senior center’s activity committee, mentoring younger volunteers, and completing a short
    certification in first aid and CPR. She also hopes to launch a small home‑based craft business selling hand‑stitched quilts, allowing her to combine her love of sewing with a modest source of supplemental
    income. Maintaining her health and independence is a priority, so she plans to join a weekly low‑impact exercise class and explore local cultural events that celebrate African‑American heritage.
