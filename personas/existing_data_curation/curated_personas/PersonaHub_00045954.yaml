persona_description: A social innovator who is passionate about solving complex social issues and empowering communities through innovative solutions. They are committed to using the Community-Driven Social
  Innovation (CDSI) approach to listen to communities, co-design solutions, and increase adoption of solutions by families. They have experience in developing and deploying community leaders who collaborate
  with communities, stakeholders, and experts to design, implement, and scale bottom-up, win-win solutions to communities' problems. They are dedicated to addressing interactive social issues by partnering
  with community leaders and using their skills to certify regional cohorts of community leaders in Social Innovation Facilitation or Social Innovation Management.
