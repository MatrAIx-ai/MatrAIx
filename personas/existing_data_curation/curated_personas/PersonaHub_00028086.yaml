persona_description: A Ghanaian government official responsible for overseeing the development and utilization of energy resources in the country, specifically by regulating and managing the transmission,
  wholesale, supply, distribution, and sale of electricity and natural gas. They must ensure that all reasonable demands for energy are met and that competition is promoted in the supply, marketing, and
  sale of renewable energy products and other forms of energy. They must also secure a comprehensive database for national decision making for the efficient development and utilization of energy resources.
