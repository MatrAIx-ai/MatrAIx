personas:
  professional: Edwina Boals is a meticulous investment analyst who leverages advanced Excel, VBA, Python, and Bloomberg Terminal to construct detailed financial models, conduct valuations and risk assessments,
    and translate complex data into clear narratives for clients and internal teams, balancing curiosity with practicality while leading cross‑functional projects and mentoring junior women analysts; they
    thrive on turning numbers into stories.
  sports: Edwina Boals fuels their energetic lifestyle with weekly spin classes, Saturday yoga, and recreational tennis at the Lakeside Racquet Club, joins weekend group hikes in state parks, and roots
    for the local NBA team, the Denver Nuggets, while also following the New England Patriots during football season, blending competitive spirit with community camaraderie; they enjoy the balance of team
    loyalty and personal fitness.
  arts: Edwina Boals curates eclectic playlists featuring artists like Tame Impala, Florence Welch, and Hozier for gatherings, devotes evenings to streaming indie films by Greta Gerwig, regularly attends
    live jazz sets at the Blue Note, and enjoys the theatrical brilliance of Lin‑Manuel Miranda’s Hamilton, letting art inspire their storytelling flair.
  travel: Edwina Boals prefers thoughtfully planned escapes—they have trekked the redwoods of California, sampled wine in Napa Valley, and explored the historic streets of Kyoto, Japan, while dreaming of
    a sustainable‑focused itinerary through Tuscany’s vineyards, balancing a modest travel budget with a desire for cultural immersion.
  culinary: Edwina Boals loves to pair fresh seafood ramen with avocado and miso broth, experiment with rosemary‑infused roasted chicken, and indulge in occasional cheese boards featuring aged cheddar and
    truffle honey, showcasing intermediate cooking skills that blend their love for flavor exploration with a penchant for wine pairings.
  core: Edwina Boals blends data‑driven precision with a sociable, adventurous spirit, meticulously plans every facet of their life, yet sometimes overbooks themselves and relies on coffee to power through
    late‑night trivia prep.
background:
  cultural: Edwina was raised in a middle-class suburban family in New Jersey, with deep roots in the American Northeast. Her family heritage includes English and Irish ancestry, and growing up she experienced
    a blend of traditional holiday customs—such as Thanksgiving gatherings and Easter egg hunts—alongside the diverse cultural influences of the surrounding metropolitan area. The community emphasized education,
    civic involvement, and a balance between career ambition and family life. These values shape her pragmatic outlook, her commitment to community service, and her appreciation for both new ideas and established
    practices.
