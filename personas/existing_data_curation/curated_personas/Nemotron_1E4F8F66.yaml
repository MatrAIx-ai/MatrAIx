  hobbies: '[''Group hiking'', ''Spin classes'', ''Yoga'', ''Recreational tennis'', ''Wine tasting'', ''Restaurant exploration'', ''Hosting trivia nights'', ''Volunteering at food bank'', ''STEM mentorship'',
    ''Playlist curation for gatherings'']'
  career_goals: Edwina aims to become a senior investment analyst within the next three years, followed by a portfolio manager role. She is committed to earning the Chartered Financial Analyst (CFA) designation
    and pursuing an MBA with a focus on sustainable finance. She aspires to lead a cross-functional analytics team, integrate ESG considerations into investment strategies, and eventually launch a boutique
    fund that leverages data-driven insights. Additionally, she hopes to mentor junior analysts, especially women, and contribute to community financial education programs.
