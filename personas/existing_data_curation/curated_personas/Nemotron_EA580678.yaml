    ''Using a tablet for educational apps and coding puzzles'']'
  career_goals: Bryan dreams of turning his natural curiosity into a future career as an engineer or astronaut, hoping to design inventions that help his community. He loves competitions and imagines winning
    science fairs or math contests, which fuels his ambition to become a problem‑solver. At the same time, his energetic and competitive nature drives a desire to excel in sports, envisioning himself as
    a professional basketball player or a community firefighter who protects his hometown. Ultimately, Bryan wants a career that blends teamwork, practical skills, and the chance to make a positive impact
    on the people around him.
