personas:
  professional: Jacqueline Colangelo is a seasoned librarian and media collections specialist who combines their meticulous cataloguing expertise with a pragmatic, low‑stress approach, mentoring emerging
    librarians while championing a flexible, community‑driven digital archive of Collier County’s history.
  sports: Jacqueline Colangelo enjoys early morning walks along Naples Beach as low‑impact cardio, participates in a senior‑friendly beach volleyball league with the Naples Beach Volleyball Club, and roots
    for the Miami Heat, balancing their love of the sea with occasional weekend kayaking trips.
  arts: Jacqueline Colangelo regularly attends the Naples Art Festival, cherishes the romantic violin concertos of Antonio Vivaldi, finds inspiration in the paintings of Georgia O’Keeffe, and participates
    in a weekly bridge club that doubles as a social gathering for live acoustic performances by local folk singer Maya Ladd.
  travel: Jacqueline Colangelo prefers thoughtfully planned cultural trips, having already visited the historic streets of Matera and the coastal towns of Amalfi, while dreaming of a leisurely cruise to
    the Greek islands and a weekend getaway to Savannah’s historic district, always arranging senior‑friendly accommodations and travel insurance.
  culinary: Jacqueline Colangelo blends garden rosemary, basil, and lemon verbena with fresh Gulf shrimp to craft authentic spaghetti alle vongole, masters the art of risotto al limone, and indulges in
    occasional homemade tiramisu while keeping their cooking skill at an eager intermediate level.
  core: Jacqueline Colangelo is a detail‑oriented librarian who balances a love of structured digital archiving with a relaxed, garden‑centred lifestyle, often worrying about finances and health yet finding
    calm in yoga, bridge, and seasonal seafood dishes.
background:
  cultural: Jacqueline comes from an Italian‑American family that settled in the Midwest before she moved to Naples, Florida after marrying. Her upbringing included Catholic traditions, strong family ties,
    and a love for Mediterranean cuisine. In her new community, she embraces the relaxed coastal lifestyle while preserving her heritage through cooking, participation in local Italian cultural events,
    and sharing family stories with younger generations. She values the blend of Midwestern work ethic and Southern hospitality that characterizes the Naples area.
attributes:
  skills: '[''cataloguing and classification (Dewey Decimal, Library of Congress)'', ''digital preservation and metadata management'', ''reference and information literacy instruction'', ''community outreach
    and programming'', ''collection development and acquisition'', ''integrated library systems (Koha, SirsiDynix) operation'', ''copyright and licensing knowledge'', ''archival practices and preservation'',
    ''staff training and mentorship'', ''user experience design for library spaces'']'
  hobbies: '[''gardening (native Floridian plants)'', ''cooking Italian and Southern seafood dishes'', ''reading historical fiction and memoirs'', ''walking on the beach at sunrise'', ''volunteering at
    the local historical society'', ''bridge club'', ''genealogy research'', ''attending art and music festivals'', ''gentle yoga and meditation'']'
  career_goals: At this stage, Jacqueline aims to transition into a part‑time advisory role that allows her to mentor emerging librarians in Naples while maintaining a manageable workload. She is passionate
    about creating a comprehensive digital archive of Collier County’s local history, preserving photographs, oral histories, and newspaper clippings for future generations. She also hopes to expand senior‑focused
    information literacy workshops, secure additional funding for media resources, and streamline library workflows to reduce stress for herself and her colleagues. Ultimately, she wants her legacy to be
    a more resilient, community‑connected library that balances structure with the flexibility patrons need.
