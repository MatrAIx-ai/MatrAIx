persona_description: A French nuclear power expert who specializes in cost analysis and the study of nuclear technology. This persona is interested in understanding the factors that contribute to the cost
  escalation of nuclear power plants in France and has experience with the French nuclear power fleet. They are knowledgeable about the French nuclear power industry and have conducted research on the topic,
  including reexamining the cost escalation drivers for the French nuclear power fleet using actual construction costs published by the Cour des Comptes in 2012. They are looking for recommendations to
  overcome the nuclear cost escalation curse and have a special interest in the scale-up strategy and the learning curve within the same size and type of reactors.
