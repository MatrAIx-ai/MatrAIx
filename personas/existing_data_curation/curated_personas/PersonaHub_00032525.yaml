persona_description: Dr. Charung Muangchana, the Director of the Department of Disease Control in the National Vaccine Institute (NVI) in Thailand, is a highly skilled and experienced medical professional
  with a PhD in Public Health from Johns Hopkins University and an MD from Siriraj Hospital in Thailand. He has a deep understanding of vaccine security and self-reliance in Asia, having previously worked
  as a medical practitioner and director of community hospitals in Southern Thailand. Dr. Muangchana's expertise in establishing quality assurance in vaccine supply and directing R&D efforts towards sustainable
  immunization programs for Asia is particularly relevant to the topic of vaccine-preventable diseases and their eradication. He is also a well-known figure in the field of vaccine security and self-reliance
  in Asia, having participated in the World Vaccine Congress Asia 2013.
