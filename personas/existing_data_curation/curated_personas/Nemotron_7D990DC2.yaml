personas:
  professional: Octavia Timol, a construction technician proficient in concrete forming, framing, blueprint interpretation, and OSHA safety compliance, they use their methodical organization and calm, solution‑focused
    demeanor to keep crews on schedule, and they aim to become a foreperson within three years.
  sports: Octavia Timol, an avid hiker and cyclist, regularly tackles the coastal trails of Montana de Oro State Park, rides the scenic roads near San Luis Obispo, joins the San Luis Obispo Trail Runners
    club for weekend runs, supports the Cal Poly Mustangs football and the San Francisco Giants, and they occasionally play beach volleyball with friends at Avila Beach.
  arts: Octavia Timol, a woodworker and model‑kit collector, draws creative inspiration from Ansel Adams’ black‑and‑white landscapes, listens to Fleet Foxes and Iron & Wine while shaping timber, and they
    attend performances at the Pacific Conservatory of the Performing Arts for a regular dose of live theatre.
  travel: Octavia Timol, a purposeful traveler who prefers road‑trip planning and eco‑friendly lodging, has explored Yosemite’s redwoods, the coastal beauty of Big Sur, and they dream of trekking Iceland’s
    geothermal sites and attending a sustainable architecture symposium in Copenhagen next summer.
  culinary: Octavia Timol, a seasonal home‑cook, enjoys preparing roasted beet and goat‑cheese salad, grilled trout with lemon‑dill, sourdough bread using locally sourced kale and heirloom tomatoes, experiments
    with a spicy tofu stir‑fry to break the routine, and they often pair meals with a glass of local Chardonnay.
  core: Octavia Timol, the organized builder who swaps a hard‑hat for a yoga mat on Sundays, hoards tiny model‑kit parts like treasures, never skips a safety briefing, and sometimes forgets to reapply sunscreen
    before a hike.
background:
  cultural: Octavia comes from a white, middle‑class Californian family whose roots trace back to the Midwest, but who settled in San Luis Obispo County in the early 1990s. Growing up in this Central Coast
    community, she was exposed to a mix of agricultural, academic, and coastal cultures that value sustainability, outdoor recreation, and collaborative projects. The region’s emphasis on environmental
    stewardship and community‑oriented building initiatives (such as local Habitat for Humanity chapters) reinforced her cooperative, practical outlook. Her brief college experience at a nearby state university
    broadened her perspective, introducing her to diverse ideas while reinforcing a pragmatic, inclusive approach to work and life.
attributes:
  skills: '[''Concrete forming'', ''Framing and basic carpentry'', ''Small equipment operation (backhoe, skid‑steer)'', ''Blueprint reading'', ''OSHA safety compliance'', ''Project scheduling (MS Project,
    Excel)'', ''Materials inventory management'', ''Team coordination and conflict resolution'', ''Basic welding'', ''Safety training'']'
  hobbies: '[''Hiking coastal trails'', ''Cycling'', ''Volunteer construction with Habitat for Humanity'', ''Woodworking hobby projects'', ''Model kit building'', ''Reading sustainable architecture'', ''Podcasts
    on innovative building materials'', ''Yoga'', ''Cooking with local, seasonal ingredients'']'
  career_goals: Octavia aims to leverage her hands‑on experience and organizational strengths to move into a supervisory role within the next three years, targeting a foreperson or crew lead position on
    commercial or sustainable residential projects. She plans to complete a construction‑management certification (NCCER or OSHA 30‑hour) and finish her associate degree in construction technology. Long‑term,
    she hopes to become a certified construction manager specializing in green building practices, eventually overseeing projects that incorporate energy‑efficient designs and locally sourced materials,
    or possibly starting her own small contracting firm focused on eco‑friendly construction in the Central Coast region.
