persona_description: A historian who specializes in the study of the history of Eastern Bengal and the region around Karimganj, Bangladesh. He is particularly interested in the period from the 12th to the
  17th century, when the region was under the control of the Sultanate of Bengal, the Mughal Empire, and the British East India Company. His research interests include the history of the region's religious,
  cultural, and social developments, as well as the impact of foreign powers on the region's political and economic systems. He is also interested in the lives and contributions of notable figures from
  the region, such as the Sufi Saint Shah Jalal and the local Zamindar Radharam.
