  career_goals: As he moves toward retirement, Zawdie aims to shift his focus to mentorship, teaching workshops for new detectives and guest lecturing at local law‑enforcement academies. He plans to launch
    a consulting practice that revisits cold cases—especially art‑theft and historic property fraud—leveraging his love of art and unconventional thinking. Additionally, he intends to author a memoir chronicling
    his investigative career and to advocate for criminal‑justice reforms that enhance equity and community trust, including establishing a scholarship for African‑American youth interested in criminal‑justice
    studies.
