personas:
  professional: Zawdie Green, a veteran Houston detective with three decades of investigative experience and a business degree, merges meticulous forensic expertise with a curious, organized, and calm demeanor
    to solve cold cases—especially art-theft crimes—while mentoring junior officers through structured workshops and thoughtful guidance.
  sports: Zawdie Green, an avid supporter of the Houston Astros, Rockets, and Dynamo, maintains his fitness through weekly senior tennis matches at the local YMCA, brisk morning walks around Hermann Park,
    and occasional participation in a senior softball league, while never missing a game day at Minute Maid Park during the baseball season.
  arts: Zawdie Green deeply engages with the arts by touring the Museum of Fine Arts, Houston to study works by Kerry James Marshall and Jacob Lawrence, attending intimate jazz performances by Wynton Marsalis
    at local venues, and curating a personal collection of vintage street-photography prints that capture Houston's evolving neighborhoods.
  travel: Zawdie Green favors meticulously planned cultural trips, such as his recent art-focused weekend in Mexico City and a leisurely road-trip through the Texas Hill Country, while dreaming of future
    visits to Florence's Renaissance galleries and a forensic-science conference in Tokyo, balancing his modest retirement budget with occasional family vacation expenses.
  culinary: Zawdie Green, a competent home chef, delights his family with authentic Tex-Mex dishes like chicken enchiladas topped with fresh cilantro, roasted poblano peppers, and homemade salsa verde crafted
    from garden-grown jalapeños, while also experimenting with spice blends and occasionally ordering take-out due to time constraints.
  core: Zawdie Green, a methodical retired detective turned art-crime consultant, balances his love for vintage street photography and Tex-Mex cooking with a habit of over-organizing his bookshelf and occasionally
    neglecting his own dentist appointments.
background:
  cultural: Born in 1960 and raised in Houston's historic Third Ward, Zawdie grew up during the later years of the Civil Rights Movement, shaped by a close‑knit African‑American church community and the
    vibrant cultural tapestry of the city. His heritage blends Southern Black traditions—gospel music, soul food, storytelling—and the multicultural influences of Houston's diverse neighborhoods, including
    Latino and Caribbean flavors. He celebrates Juneteenth, values family and community service, and carries a strong sense of resilience and pride that informs both his personal life and his work as a
    detective, where cultural sensitivity and empathy are essential.
