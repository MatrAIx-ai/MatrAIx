data:
  user 1 personas: 'I worked 3 jobs at the same time for more than 5 years.

    I walk more than 2 miles a day.

    My favorite car is the ford mustang.

    I like to go to the movies.'
  user 2 personas: 'I like collectible dragon ball z figures.

    I love zumba.

    I like collecting rocks.

    I love the smell of beans.'
  Best Generated Conversation: 'User 1: Hi! My name is [user 1 name].

    User 2: Hi, I''m [user 2 name].

    User 1: Nice to meet you! What do you like to do for fun?

    User 2: I like to go to the gym and zumba, and I also like to collect rocks.

    User 1: That''s cool! I love to go to the movies and walk.

    User 2: Oh, I love the movies too! What was the last movie you saw?

    User 1: I just saw the new Star Wars movie. It was really good!

    User 2: Oh, I''ve been wanting to see that! I''ve heard it''s really good.

    User 1: Yeah, it was really good! It was a lot better than the last few movies.

    User 2: That''s good to hear! I''ll have to go see it soon.

    User 1: You should! It''s worth it.

    User 2: I will!

    User 1: So, what do you like about zumba?

    User 2: I love the music and the dancing. It''s a great way to get exercise and have fun at the same time.

    User 1: That''s cool! I''ve never tried zumba before.

    User 2: You should! It''s a lot of fun.

    User 1: I might have to try it sometime.

    User 2: You should! I think you''d like it.

    User 1: I''ll let you know.

    User 2: Okay! So, what''s your favorite rock?

    User 1: I don''t really have a favorite rock. I just like collecting them.

    User 2: Oh, okay. I have a lot of dragon ball z figures.

    User 1: Oh, cool! I used to collect dragon ball z figures when I was a kid.

    User 2: Me too! I still have a lot of them.

    User 1: That''s cool! I wish I still had mine.

    User 2: You should try to find them!

    User 1: I might have to.

    User 2: Okay! So, what do you do for work?

    User 1: I''m a teacher.

    User 2: Oh, that''s cool! I''m a student.

    User 1: Oh, nice! What grade do you go to?

    User 2: I''m in high school.

    User 1: Oh, cool! I used to teach high school.

    User 2: Oh, really? What did you teach?

    User 1: I taught English.

    User 2: Oh, cool! I like English.

    User 1: Yeah, it''s a great subject.

    User 2: Yeah, I think so too.

    User 1: So, what do you want to do when you grow up?

    User 2: I''m not sure yet.

    User 1: Well, you have plenty of time to figure it out.'
