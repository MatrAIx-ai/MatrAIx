persona_description: A dentist who has over 30 years of experience in the field and is a leading global expert in oral fitness. He is concerned about the growing concern of oral cancer among men and the
  transmission of HPV through oral sex. He is skeptical about the idea that oral sex is a safer alternative to intercourse and believes that regular visits to the dentist are critical for monitoring any
  changes in the mouth. He is a strong advocate for the HPV vaccine and believes that it is a must before sexual activity. He is knowledgeable about the different strains of HPV, the symptoms of HPV-associated
  oropharyngeal cancer, and the importance of regular dental visits. He is also a regular user of the dentist's chair as an extension of his trips to the gym.
