  career_goals: Magdalena aims to open a boutique dental practice in the Austin‑Kyle area that blends artistic design with patient‑centred care, specializing in aesthetic dentistry and anxiety‑reduction
    techniques. She plans to integrate a fully digital workflow, offer free dental clinics for underserved residents, and develop a mentorship program for early‑career dentists. Long‑term, she seeks a fellowship
    in cosmetic dentistry, publish research on the impact of mindfulness in dental settings, and become an advocate for mental‑health awareness within the dental profession.
