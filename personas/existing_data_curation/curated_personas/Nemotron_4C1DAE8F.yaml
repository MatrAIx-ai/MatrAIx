personas:
  professional: Magdalena Perona, a 33‑year‑old dentist, blends their expertise in preventive and aesthetic dentistry with digital CAD/CAM workflows and a mindfulness‑first approach, leveraging their empathetic
    yet highly reactive nature to calm anxious patients while occasionally battling the disorganization that comes from a love of flexibility.
  sports: Magdalena Perona hikes the Texas Hill Country with the Austin Trail Riders, practices yoga three times a week, and roots for the Texas Longhorns football team, while occasionally joining a community
    volleyball league, embodying their love for balanced, low‑impact fitness and seasonal camaraderie.
  arts: Magdalena Perona immerses themselves in Austin’s vibrant art scene, sketching dental‑inspired line drawings after viewing exhibitions by local muralist Alexi Pinkham, while strumming acoustic renditions
    of John Mayer’s “Gravity” at intimate house concerts, highlighting their blend of visual curiosity and musical expression.
  travel: Magdalena Perona favors spontaneous, soul‑nourishing trips— they’ve trekked the red rocks of Sedona, savored weekend art festivals in Marfa, and dream of meditative mornings in Kyoto’s Zen gardens,
    balancing modest travel budgets with a yearning for cultural immersion.
  culinary: Magdalena Perona enjoys crafting farm‑to‑table meals such as herb‑crusted salmon with locally sourced honey‑glazed carrots, often sourcing heirloom vegetables from the Texas farmers market and
    experimenting with fresh basil, cilantro, and smoked paprika to create wholesome, aromatically rich dishes.
  core: Magdalena Perona is an emotionally intense, art‑loving dentist who blends meticulous digital craftsmanship with mindfulness‑driven patient care, while navigating the chaotic dance of spontaneity
    and occasional disorganization.
background:
  cultural: Magdalena is a white American who grew up in central Texas within a middle‑class suburban family. Her upbringing combines traditional Texan values of hospitality, community involvement, and
    self‑reliance with exposure to the eclectic, progressive arts and music scene of nearby Austin. She likely has European ancestry common among white Texans (e.g., German, Irish) and participates in local
    customs such as barbecue, live music festivals, and occasional rodeo events. Her cultural identity reflects a blend of mainstream American traditions, regional Texan pride, and an appreciation for the
    diverse artistic influences that shape the Austin‑Kyle corridor.
