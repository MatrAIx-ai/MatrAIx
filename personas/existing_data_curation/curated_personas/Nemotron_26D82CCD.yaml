  career_goals: Denise aims to transition from a driver‑sales hybrid to a leadership role within logistics. She plans to earn a logistics certification and eventually become a fleet manager, overseeing
    route optimization and driver mentorship. In parallel, she dreams of launching a boutique delivery service that emphasizes artistic branding—using her photography to differentiate the company. Long‑term,
    she envisions owning a small fleet that serves niche markets, such as art‑supply shipments for local galleries, merging her love of novelty with her commercial expertise. She seeks positions that allow
    autonomy, strategic decision‑making, and room for creative expression.
