  hobbies: '[''hiking'', ''wildlife photography'', ''volunteering at animal shelters'', ''yoga'', ''mindfulness meditation'', ''beach volleyball'', ''community dance classes'', ''gardening native plants'',
    ''crafting pet accessories'', ''baking treats for adoption events'', ''listening to indie music'', ''reading nature magazines'']'
  career_goals: Katherine aims to earn a certification as a veterinary technician within the next two years and eventually pursue an associate degree in animal science. Her long‑term ambition is to become
    a licensed wildlife rehabilitator, focusing on native desert species, and to establish a community‑based sanctuary that offers educational programs and volunteer opportunities. She also hopes to take
    on a supervisory role at the animal care facility where she works, using her practical skills and people‑oriented approach to improve animal welfare standards and staff cohesion.
