personas:
  professional: Manisha Ibanez is an aspiring art therapist who blends her psychology coursework with digital illustration skills, meticulously planning community art workshops while eagerly incorporating
    therapeutic techniques to help peers manage anxiety.
  sports: Manisha Ibanez enjoys weekend hikes in the Wasatch Range, participates in a local rock‑climbing club, follows the Utah Jazz and Real Salt Lake soccer teams, and occasionally joins a casual 5‑k
    run organized by her high‑school cross‑country squad.
  arts: Manisha Ibanez is a budding digital illustrator who spends evenings at open‑mic nights strumming a ukulele, draws inspiration from Frida Kahlo’s emotive portraits and Bon Iver’s atmospheric soundscapes,
    and volunteers at the Roy Community Art Center where she helps curate youth exhibitions.
  travel: Manisha Ibanez prefers thoughtful travel itineraries, having trekked Zion and Bryce Canyon with a meticulously prepared checklist, dreaming of a solo backpacking trip through the Scottish Highlands
    and a cultural immersion week in Oaxaca while balancing a modest travel budget with student‑loan concerns.
  culinary: Manisha Ibanez loves cooking nutrient‑dense meals like quinoa bowls with roasted sweet potatoes, kale, avocado, and tahini, delights in matcha green‑tea lattes, and eagerly samples street‑food
    staples such as fish tacos, ramen, and churros at local food festivals.
  core: Manisha Ibanez is a curious, organized 18‑year‑old who channels intense anxiety into art, balances community service with solo hikes, and occasionally splurges on craft supplies despite a tight
    student budget.
background:
  cultural: Manisha is a White American raised in Roy, Utah, a small town with strong community ties and a predominantly Latter‑Day Saints cultural environment. Her family heritage includes European roots—primarily
    Irish and English—along with a Spanish surname (Ibanez) that reflects a modest Hispanic lineage, though her cultural identity is largely shaped by mainstream American traditions. She celebrates holidays
    such as Thanksgiving, Fourth of July, and family gatherings that often involve potlucks and church events. The expansive Utah outdoors have fostered her appreciation for nature, hiking, and environmental
    stewardship. While she values her local community’s emphasis on reliability and service, her curious personality drives her to seek broader artistic and intellectual experiences, exposing her to diverse
    cultural perspectives through school programs, travel, and digital media.
