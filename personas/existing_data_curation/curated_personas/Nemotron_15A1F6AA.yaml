  hobbies: '[''Hiking'', ''Nature photography'', ''Visiting art galleries'', ''Sketching'', ''Digital illustration'', ''Reading contemporary fiction'', ''Philosophy'', ''Psychology'', ''Yoga'', ''Mindfulness
    meditation'', ''Journaling'', ''Open‑mic performances'', ''Ukulele playing'', ''Volunteering at art center'', ''DIY crafts (pottery, crochet)'', ''Trying new cuisines'']'
  career_goals: Manisha aims to complete a bachelor’s degree in psychology with a minor in art history, followed by a master’s in art therapy or counseling. In the short term, she plans to secure internships
    at community mental‑health centers and local museums to blend therapeutic practices with creative programming. Long‑term, she envisions establishing a nonprofit that offers art‑based workshops for youth
    dealing with anxiety and depression, while also advocating for broader integration of creative therapies in school curricula. She hopes to become a licensed art therapist who can design evidence‑based,
    culturally sensitive interventions that empower individuals to process emotions through artistic expression.
