  hobbies: '[''Visiting art galleries'', ''Street mural tours'', ''Live theater and music shows'', ''Yoga and mindfulness meditation'', ''Photography'', ''Creative writing'', ''Experimental cooking'', ''Volunteering
    at community centers'', ''Improv comedy workshops'']'
  career_goals: Ann aims to build a career that merges her love for the arts with her talent for connecting people. She plans to complete her bachelor's degree in communications or arts administration within
    the next two years and pursue a role as an arts program coordinator or community engagement manager for a cultural nonprofit in Los Angeles. Her long‑term ambition is to design inclusive, mental‑health‑aware
    artistic initiatives and eventually lead a regional cultural department that champions diverse artistic expression and community well‑being.
