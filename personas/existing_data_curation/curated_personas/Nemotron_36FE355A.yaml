  career_goals: Andrew aims to transition from senior engineer to engineering leadership, targeting roles such as Principal Engineer or Engineering Manager within Walmart's Global Tech division. He aspires
    to spearhead innovative projects that fuse technology with artistic experiences, such as immersive retail platforms. His competitive drive pushes him to become a recognized thought leader, presenting
    at industry conferences and publishing articles on creative engineering practices. In the longer term, he envisions founding a startup that leverages AI‑driven design tools for small businesses, blending
    his technical expertise with his passion for art. He also plans to augment his STEM background with an MBA to broaden his strategic and business acumen, ensuring he can navigate corporate politics and
    secure resources for ambitious initiatives.
