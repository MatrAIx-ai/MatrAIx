personas:
  professional: Andrew Sommer, a 34-year-old senior full‑stack engineer at Walmart Global Tech, merges his meticulous systems‑architecture skill set with a designer’s eye, leading agile, cross‑functional
    squads to build scalable, immersive retail platforms while maintaining rigorous documentation and risk assessment.
  sports: Andrew Sommer regularly hikes the Ozark trails with the local Ozarks Trail Club, joins a community adult basketball league that roots for the Arkansas Razorbacks, and follows the St. Louis Cardinals
    baseball season, using weekend runs to counteract desk‑bound stress.
  arts: Andrew Sommer immerses in the regional art scene, curating digital illustrations inspired by James Turrell’s light installations, photographing experimental pieces reminiscent of Ai Weiwei’s work,
    strumming acoustic jams of Bob Dylan at open‑mic nights, and sharpening improv skills at workshops echoing Second City’s style.
  travel: Andrew Sommer prefers meticulously planned weekend road trips that blend architecture tours of Kansas City’s Art Deco districts with culinary stops for smoked brisket, while dreaming of a longer
    immersive stay in Barcelona to study Gaudí’s organic forms and a solo spring retreat in Kyoto’s temples for creative renewal.
  culinary: Andrew Sommer enjoys cooking farm‑to‑table dishes like quinoa‑seeded salad with sumac‑spiced grilled chicken, occasionally over‑seasoning his Sunday roasted brussels sprouts, and indulges in
    regional BBQ brisket paired with craft IPA, while savoring specialty coffee beans from Ethiopian Yirgacheffe.
  core: Andrew Sommer is a methodical yet talkative engineer who fuses tech leadership ambitions with an avant‑garde artistic pulse, balancing competitive drive with anxiety‑induced over‑planning.
background:
  cultural: Andrew grew up in a middle‑class family in the American Midwest, with ancestral roots tracing back to German and Irish immigrants. He internalized the region’s values of hard work, self‑reliance,
    and community involvement, which continue to shape his disciplined work ethic and his commitment to mentorship. Relocating to Bentonville placed him at the crossroads of traditional Southern hospitality
    and a rapidly evolving tech hub anchored by Walmart’s corporate presence. This environment nurtured his appreciation for both conventional craftsmanship and cutting‑edge innovation, informing his desire
    to blend artistic expression with engineering solutions. His educational journey through a STEM graduate program at a research‑intensive university further broadened his worldview, encouraging him to
    adopt a global perspective while maintaining his Midwestern pragmatism.
