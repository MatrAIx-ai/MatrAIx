data:
  user 1 personas: 'I wish that i lived in the city.

    I am a vegetarian.

    I live on a pig farm.

    I dislike animals.

    I have allergies.'
  user 2 personas: 'Until recently i have never been able to sing in front of anyone.

    I am a shy person but i love to sing.

    I was accepted to participate.

    My shyness made me panick and i did not show up.

    Anyways i decided to give it a try and participated in an audition for a talent show.'
  Best Generated Conversation: 'User 1: I wish I lived in the city. I love the hustle and bustle.

    User 2: I love the silence and peace of the countryside. I live on a pig farm.

    User 1: That sounds like a lot of work!

    User 2: It is, but it''s also very rewarding. I love working with animals.

    User 1: I''m glad you enjoy it. I''m a vegetarian, so I don''t like animals very much.

    User 2: That''s okay. I''m not a vegetarian, but I do respect your choices.

    User 1: Thanks. I''m glad you''re not one of those pushy vegetarians who try to convert people.

    User 2: No, I''m not like that. I just respect people''s choices.

    User 1: Good. Me too.

    User 2: So, what do you do for fun?

    User 1: I like to go to the movies, read, and play video games.

    User 2: I like to do those things too, but I also like to sing.

    User 1: Really? That''s cool! I love to sing too.

    User 2: I''ve always loved to sing, but I was always too shy to do it in front of anyone.

    User 1: Me too!

    User 2: But recently I decided to give it a try and participated in an audition for a talent show.

    User 1: Wow, that''s great! How did it go?

    User 2: It went really well! I was accepted to participate in the show.

    User 1: That''s awesome! I''m so glad for you!

    User 2: Thanks! I''m really excited about it.'
