persona_description: A strong advocate for education reform and change, with a focus on empowering schools and teachers to innovate and create a culture of trust. This individual is deeply concerned about
  the lack of autonomy and accountability in Indian education, and believes that education must be the number one national priority to enable every citizen to fulfill their potential and contribute to global
  development. They strongly recommend modifying the Draft NEP 2019 vision to "An education system that enables every citizen to fulfil their potential and sustainably transforms India into an equitable
  society of enterprising and skilled citizens, capable of contributing to global development across all fields of human endeavour."
