  career_goals: He dreams of becoming a firefighter or a construction worker, drawn to roles that involve clear routine, practical problem‑solving, and helping others. He talks about wanting to drive big
    trucks, wear a uniform, and be someone who keeps things safe and orderly. He also mentions wanting to be a baseball player, showing his competitive streak. His ambition is to master the skills he enjoys
    now—building, sorting, and following rules—so that he can grow into a reliable adult who can provide for his family and community.
