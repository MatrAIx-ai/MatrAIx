personas:
  professional: John Gerken, a 4-year-old aspiring builder, meticulously assembles LEGO structures using a step-by-step routine, relying on their organized, methodical nature and competitive drive to perfect
    each tower.
  sports: John Gerken, a 4-year-old member of the neighborhood preschool soccer club, enthusiastically practices dribbling and goal-scoring while cheering for the Los Angeles Lakers and Manchester United
    on TV, preferring structured practice sessions over free-play.
  arts: John Gerken, a 4-year-old budding doodler, spends afternoons sketching dinosaurs while humming tunes from The Wiggles and Disney's 'Frozen', and collects picture books by Dr. Seuss, reflecting their
    love for familiar, routine-based creative expression.
  travel: John Gerken, a 4-year-old who loves family road trips, prefers meticulously planned itineraries to the local zoo, the beach at Santa Monica, and Disneyland, and dreams of exploring the Great Barrier
    Reef with the same routine devotion.
  culinary: John Gerken, a 4-year-old with a penchant for mac and cheese, chicken nuggets, and strawberry-banana smoothies, can independently spread peanut butter on toast but sticks to familiar flavors,
    avoiding spicy foods unless they resemble a favorite cartoon character.
  core: John Gerken, a 4-year-old who thrives on daily routines, turns every block tower into a competition, saves each coin in a tidy piggy bank, and refuses new vegetables unless they match their favorite
    colors.
background:
  cultural: 'John is raised in a white, Southern family in Lewisburg, Maury County, Tennessee. His household reflects traditional Southern values: strong emphasis on family, regular church attendance at
    a local Baptist congregation, and a work ethic rooted in practicality and routine. He frequently hears country and gospel music at home, participates in community events such as church picnics and county
    fairs, and enjoys Southern foods like fried chicken and biscuits. The rural setting influences his interest in farms, tractors, and outdoor activities. While his family encourages polite and respectful
    behavior, they also instill a sense of competitiveness, encouraging him to strive for personal bests in school and play.'
attributes:
  skills: '[''building with Duplo blocks'', ''solving simple puzzles'', ''using safety scissors'', ''sorting by color or size'', ''counting to ten'', ''recognizing letters'', ''reciting nursery rhymes'',
