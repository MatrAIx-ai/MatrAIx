personas:
  professional: Nathan Sibley is a curious two-year-old exploring the world through tactile play and early language bursts, demonstrating a budding problem-solving mindset that hints at future creative
    research as they experiment with stacking blocks.
  sports: Nathan Sibley is a boundless energy-seeker who loves scooting around the playground, dribbles mini soccer balls with the local Little Sprinters Club, cheers on the New York Yankees during family
    TV nights, and eagerly joins in bubble-popping games that blend organized play with spontaneous fun as they learn teamwork and coordination.
  arts: Nathan Sibley is an early art enthusiast who delights in the bright colors of Eric Carle's 'The Very Hungry Caterpillar', hums along to Raffi's 'Baby Belugaboo', watches animated sketches by Hayao
    Miyazaki, and insists on finger-painting every surface with washable paints, showing a surprisingly refined appreciation for creative expression as they experiment with colors and textures.
  travel: Nathan Sibley is a wide-eyed explorer who has visited Grandma's sunny Florida beach house, enjoyed a day at the San Diego Zoo, dreams of a trip to Disneyland in California, and imagines an adventure
    to the Eiffel Tower, always traveling with a stuffed bunny for comfort as they imagine new horizons.
  culinary: Nathan Sibley is a developing food adventurer who favors soft banana slices, mild mac and cheese, chicken nuggets with ketchup, loves swinging a plastic spoon to stir applesauce, and is currently
    learning to toast mini cheese-filled quesadillas under close supervision, delighting in the sensory experience as they explore new flavors.
  core: Nathan Sibley is a sociable, curious two-year-old whose organized play, love for art and music, and occasional chaotic moment of scattered coins create a charmingly unpredictable little personality
    as they navigate growing independence.
background:
  cultural: Nathan is being raised in Carriere, a small community in Pearl River County, Mississippi. The Southern setting influences his upbringing with strong family ties, frequent gatherings at church
    or community picnics, and exposure to regional customs such as gospel music, Southern hospitality, and seasonal events like church potlucks and local fairs. His family values community, politeness,
    and respect for tradition, while also encouraging curiosity and openness to new ideas. The rural surroundings provide ample natural play spaces, from pine forests to creek banks, fostering an early
    appreciation for the outdoors.
