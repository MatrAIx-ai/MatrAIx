personas:
  professional: Jose Colon, a veteran plumber, pipefitter, and steamfitter, leverages his meticulous blueprint‑reading and systematic diagnostic routines to lead crews through complex installations while
    his relaxed attitude toward scheduling keeps morale high.
  sports: Jose Colon competes in a local adult soccer league with the 'Eastside Strikers' and cheered on by his devotion to the Los Angeles Galaxy, while also supporting the Los Angeles Dodgers and enjoys
    informal pick‑up games at the community park.
  arts: Jose Colon immerses himself in the music of Carlos Santana and classic rock bands like The Rolling Stones, follows the works of street‑artist Banksy, and attends community theater productions, finding
    the creative energy of live performance fuels his mentorship workshops.
  travel: Jose Colon prefers road‑trip adventures along the Pacific Coast Highway, having explored Big Sur, the Redwood forests, and a memorable weekend in Oaxaca, while dreaming of a future sailing getaway
    to the Greek islands once his business stabilizes.
  culinary: Jose Colon delights in crafting rich mole sauces with dried chilies, cacao, and spices, grilling street‑style tacos with corn tortillas, chorizo, and fresh cilantro, and often experiments with
    smoked pork shoulder for his barbecue club gatherings.
  core: Jose Colon blends hands‑on technical mastery with a sociable, flexible spirit, navigating anxiety through community, while juggling classic car hobbies, passionate cooking, and a vision of leading
    a sustainable plumbing firm.
background:
  cultural: Jose was born to Mexican immigrant parents and grew up bilingual, speaking both Spanish and English fluently. He maintains strong ties to Mexican traditions, celebrating Día de los Muertos,
    Semana Santa, and various regional festivals with food, music, and dance. Family and community (la comunidad) shape his sense of identity, and he often incorporates cultural values such as respeto (respect)
    and personal responsabilidad into both his work ethic and personal relationships. While he has never married, he remains closely connected to an extended network of cousins, friends, and neighbors who
    share his cultural heritage, providing a supportive backdrop for his professional and personal life. His upbringing instilled a deep appreciation for craftsmanship, a trait that resonates in his meticulous
    approach to pipefitting and his desire to pass on technical skills to the next generation.
attributes:
  skills: '[''Blueprint reading'', ''Pipe layout and routing'', ''Welding and soldering'', ''Hydraulic and steam system troubleshooting'', ''HVAC installation'', ''Safety code compliance'', ''Preventive
    maintenance planning'', ''Customer communication'', ''Conflict resolution'', ''Apprentice mentorship'']'
  hobbies: '[''Community soccer'', ''Weekend barbecue club'', ''Mexican cooking (mole, tacos, tamales)'', ''Classic car restoration'', ''Mindfulness group'', ''Youth mentorship in trade skills'']'
  career_goals: Jose aims to become a certified master pipefitter and eventually transition into a supervisory role where he can design project schedules that balance structure with flexibility for his
    crew. He hopes to earn a California Specialty Contractor License, allowing him to start his own small contracting firm focused on sustainable plumbing solutions for residential and commercial clients
    in the Los Angeles area. Additionally, he aspires to mentor younger tradespeople from the local Mexican community, providing both technical training and emotional support, recognizing his own experiences
    with anxiety and the need for a supportive work environment.
