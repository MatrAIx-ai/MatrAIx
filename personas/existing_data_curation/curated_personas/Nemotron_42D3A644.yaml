personas:
  professional: Tammy Mehm, a veteran painter and paperhanger with over forty years of hands‑on experience, blends meticulous surface preparation, historic restoration acumen, and a steady mentorship of
    apprentices into a boutique studio vision that they deliver through custom murals and sustainable finishes, balancing organized project budgeting with the flexibility of creative problem‑solving.
  sports: Tammy Mehm enjoys leisurely morning walks along the St. Clair riverfront, participates in a local senior canoeing club on Lake St. Clair, and cheers for the Detroit Tigers and Detroit Red Wings
    from their porch, while occasionally joining the community's senior softball league for gentle competition.
  arts: Tammy Mehm immerses themselves in watercolor and acrylic seascapes of Lake St. Clair, studies Monet and Georgia O'Keeffe for inspiration, attends folk‑art workshops featuring artists like Grandma
    Moses, and devotes evenings to photographing local birds while listening to recordings of Bob Dylan and Yo‑Yo Ma.
  travel: Tammy Mehm prefers slow‑travel road trips, often exploring nearby historic towns such as Mackinac Island and Saugatuck, while dreaming of a summer pilgrimage to Provence’s lavender fields, yet
    their travel plans are carefully paced to accommodate joint health appointments and the budget for a modest RV rental.
  culinary: Tammy Mehm cultivates a modest herb garden of thyme, rosemary, and basil, using those fresh flavors to season pan‑seared perch from Lake St. Clair, homemade herb‑infused olive oil, and a signature
    beet and goat cheese salad, though they have a guilty pleasure for an extra slice of cherry pie on Sunday afternoons.
  core: Tammy Mehm is a curious, meticulous craftsperson‑artist who balances solitary brushstrokes with hands‑on restoration work, habitually over‑preparing surfaces yet occasionally overlooking their own
    need for rest.
background:
  cultural: Tammy was born and raised in the Upper Midwest, growing up in a small town near the Great Lakes. Her family’s roots are in the early‑20th‑century farming and manufacturing communities of Michigan,
    reflecting a Midwestern ethos of hard work, self‑reliance, and modesty. The region’s strong seasonal cycles and close‑knit neighborhoods fostered a deep appreciation for local history and natural beauty,
    which later informed her career in preserving historic homes. Though she identifies as White American, Tammy’s cultural identity is shaped by the blend of traditional Protestant community gatherings,
    post‑war optimism, and the cultural shifts of the 1960s that encouraged her to pursue a trade traditionally dominated by men. Her lifelong engagement with community events, local museums, and the lakeside
    lifestyle defines her cultural perspective.
attributes:
  skills: '[''Surface preparation (scraping, sanding, priming)'', ''Accurate measurement and layout planning'', ''Color mixing and matching'', ''Decorative/faux finishing techniques'', ''Wallpaper selection
    and installation'', ''Historical home restoration methods'', ''Project budgeting and time management'', ''Client consultation and design interpretation'', ''Small team coordination and mentorship'',
    ''Tool maintenance and safety protocols'', ''Problem solving and troubleshooting'']'
  hobbies: '[''Watercolor painting of local landscapes'', ''Acrylic canvas painting and experimental techniques'', ''Birdwatching at St. Clair County wetlands'', ''Photography of historic architecture'',
    ''Reading art history and memoirs'', ''Attending small community art workshops'', ''Herb and flower gardening'', ''Knitcraft and crocheting'', ''Evening walks along Lake St. Clair'', ''Volunteering
    with the Algonac Historical Society'']'
  career_goals: Tammy aims to transition from full‑time contract work to a boutique studio where she offers custom mural and historic‑restoration services, while training a small group of apprentices from
    the Algonac community. She hopes to exhibit her personal watercolor paintings at regional galleries, publish a collection of photographs and stories documenting the architectural heritage of St. Clair
    County, and secure a steady part‑time consultancy that supports her retirement while keeping her creatively engaged. Additionally, she dreams of leaving a documented set of best‑practice guides for
    sustainable painting and paper‑hanging techniques for future local tradespeople.
