personas:
  professional: Henry Coker, an aspiring robotics engineer who channels their methodical problem‑solving and love for routine into designing competition‑ready bots for their school robotics club, reliably
    leading the team’s programming schedule while keeping teammates on track.
  sports: Henry Coker, a high school sophomore who plays forward on the Lakeside Tigers basketball team and midfield for the Metro Youth Soccer Club, follows the Los Angeles Lakers and Real Madrid for inspiration,
    and they follow a strict weekly conditioning plan that blends early‑morning drills with weekend pick‑up games, all while coaching younger Scouts in basic fitness drills.
  arts: Henry Coker, an avid pop‑culture fan who streams concerts by Taylor Swift and Kendrick Lamar between robotics meetings, cites the Marvel Cinematic Universe as a source of storytelling inspiration
    for their occasional comic sketches, and they curate soundtrack playlists featuring The Legend of Zelda for their gaming sessions.
  travel: Henry Coker, an organized traveler who prefers meticulously planned road trips, has visited Orlando’s theme parks and Yellowstone National Park with their Scout troop, dreams of exploring Tokyo’s
    tech districts and the historic streets of Prague, and they always book budget‑friendly lodging well in advance to accommodate their school calendar.
  culinary: Henry Coker, a moderately skilled home cook who can whip up a pepperoni pizza with extra cheese from scratch, loves devouring nachos topped with jalapeños and cilantro while gaming, and they
    often experiment with making sushi rolls for friends during movie night, though they still rely heavily on instant ramen for late‑night study snacks.
  core: Henry Coker, a routine‑loving, competitively‑driven teen who meticulously plans every activity, over‑commits to club leadership roles, and they secretly hoard snack wrappers in their locker as a
    quirky reminder of missed breaks.
background:
  cultural: Henry grew up in Downingtown, a suburban community in Chester County, Pennsylvania, within a middle‑class, predominantly white family rooted in the region’s historical agricultural and manufacturing
    heritage. His family values hard work, practicality, and community involvement, often participating in local church gatherings (Methodist/Episcopal) and neighborhood traditions such as the annual Spring
    Festival and community service days. The area’s strong emphasis on education, extracurricular activities, and organized civic life shapes Henry’s routine‑oriented, reliable, and socially engaged personality.
attributes:
  skills: '[''Organizational planning'', ''Time management'', ''Team leadership'', ''Mechanical troubleshooting'', ''Strategic gaming'', ''Clear communication'', ''Event coordination'', ''Reliability'']'
