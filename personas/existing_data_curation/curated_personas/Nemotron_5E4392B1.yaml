  career_goals: Henry aims to pursue a career that blends his love of structure, practicality, and teamwork. He is interested in studying civil engineering or construction management to design and oversee
    functional infrastructure projects, with a long‑term goal of becoming a project manager who ensures projects are completed on schedule and within budget. He also considers a future in law enforcement,
    attracted by the clear hierarchy, routine, and community service aspects of the profession. In the short term, he plans to earn strong grades, join a high‑school apprenticeship program, and secure a
    sports scholarship to support his academic goals.
