personas:
  professional: Sawyer Everett is an aspiring part‑time handyman entrepreneur and volunteer coordinator who melds solid carpentry, plumbing, and light‑electrical expertise with a deeply compassionate, community‑focused
    ethos, using their preference for structure to craft reliable service schedules for senior residents while tolerating occasional disorganization in paperwork and marketing.
  sports: Sawyer Everett enjoys early‑morning fishing on the Yakima River, weekend hikes in the Cascade foothills with the local Trailblazers Hiking Club, is a faithful fan of the Seattle Seahawks and Seattle
    Mariners, and joins a community‑center pick‑up basketball game each summer to keep fit.
  arts: Sawyer Everett’s artistic side shines through building model‑ship kits while listening to classic rock legends like Led Zeppelin and The Rolling Stones and country icons such as Johnny Cash, indulging
    in mystery novels by Agatha Christie and Michael Connelly, and regularly competing in Settlers of Catan nights at the town coffee shop.
  travel: Sawyer Everett prefers road‑trip adventures that blend flexible planning with a love for the Pacific Northwest, having driven up to Crater Lake and Yellowstone, dreaming of trekking Patagonia’s
    Andes, and always keeping a spare tire and a stash of trail mix for spontaneous detours.
  culinary: Sawyer Everett cooks with a garden‑to‑table mindset, frequently chopping home‑grown tomatoes, jalapeños, and basil into fresh salsa, grilling trout caught from the river, and perfecting a pepper‑laden
    chili that often boasts a dash of smoked paprika and a side of cornbread.
  core: Sawyer Everett balances a structured, community‑centric work ethic with a relaxed, sometimes scatter‑brained approach to paperwork, channeling a love for hands‑on projects, mystery stories, and
    board games into a life that values practical kindness over perfect order.
background:
  cultural: Sawyer comes from a white, multigenerational American family with deep roots in the Pacific Northwest. His grandparents settled in the Yakima Valley in the 1950s, drawn by the region’s agricultural
    opportunities. Growing up in Grandview, he was immersed in a tight‑knit, small‑town culture that values self‑reliance, community service, and a close connection to the land. His upbringing was shaped
    by the agricultural rhythms of the area, local church gatherings, and seasonal community events such as the Yakima County Fair. While he identifies as culturally mainstream American, he respects the
    region’s Native American heritage and occasionally participates in local heritage celebrations.
