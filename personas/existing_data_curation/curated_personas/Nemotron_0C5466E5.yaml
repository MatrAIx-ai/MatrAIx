  career_goals: Sawyer aims to re‑enter the workforce by leveraging his hands‑on abilities and community‑service mindset. He plans to launch a part‑time handyman service focused on senior residents in Grandview,
    while taking on a volunteer coordinator role at the local food bank. Over the next two years he hopes to obtain a certified handyman license and eventually expand into a small cooperative that offers
    affordable home‑repair services. His long‑term ambition is to create a stable, flexible livelihood that allows him to stay active in his community and support his family.
