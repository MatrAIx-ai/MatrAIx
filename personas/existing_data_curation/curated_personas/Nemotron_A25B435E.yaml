  hobbies: '[''Gardening'', ''DIY home improvement projects'', ''Quilting'', ''Bird watching'', ''Reading mystery novels'', ''Cooking Pennsylvania Dutch cuisine'', ''Volunteering at local community center'',
    ''Attending Amish market tours'', ''Walking local trails'', ''Collecting vintage tools'']'
  career_goals: Ilene aims to transition into a supervisory maintenance role within the next two years, leveraging her extensive practical knowledge to bring greater structure and predictability to the
    facility’s upkeep. She plans to earn an OSHA-certified Safety Officer credential and an HVAC technician certification to solidify her expertise. Long‑term, she hopes to mentor younger apprentices, implement
    a robust preventive maintenance program that reduces unexpected breakdowns, and eventually move into a part‑time consulting role that lets her balance work with personal projects before retirement.
