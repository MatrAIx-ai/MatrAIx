personas:
  professional: Nina Jones is a licensed aircraft pilot and flight engineer who leverages their methodical planning, advanced navigation expertise, and crew resource management skills to excel in both fixed‑wing
    and turboprop operations, while steadfastly pursuing a senior captain seat on a major commercial jet and a future as a master instructor, and they dedicate countless hours to mentorship and safety initiatives.
  sports: Nina Jones paddles the Ashepoo River with a local kayaking club each summer, casts a line for bass fishing in fall, hits the line‑dancing floor at community socials year‑round, and they root for
    the Carolina Panthers in football season while cheering on the Charleston Battery soccer team.
  arts: Nina Jones sings soprano in the Walterboro community choir, captures aerial photographs reminiscent of Ansel Adams' landscapes, delights in the blues of BB King, the storytelling of Dolly Parton,
    and the mystery films of Agatha Christie adaptations starring Kenneth Branagh, and they often share these works with friends at potluck gatherings.
  travel: Nina Jones prefers meticulously planned road trips that blend adventure and family time, having explored Savannah’s historic squares, the jazz‑filled streets of New Orleans, and a recent aerial
    photography expedition to the Bahamas, while they daydream about an Icelandic glacial trek that would combine their love of rugged landscapes with their piloting prowess.
  culinary: Nina Jones cooks lowcountry classics such as shrimp and grits, she‑crab soup, and a spicy okra gumbo using fresh Gulf shrimp, stone‑ground grits, and heirloom tomatoes from her garden, and they
    proudly host potluck nights where guests swap recipes over plates of buttery biscuits and mustard‑glazed collard greens.
  core: Nina Jones blends cockpit precision with Southern hospitality, meticulously budgeting every flight hour while never missing a line‑dance after sunset, even if that means arriving at the deli with
    a spatula still in hand, and they remain unfazed by the occasional budget overrun for a new flight jacket.
background:
  cultural: Nina was raised in a close‑knit, middle‑class family in the Lowcountry of South Carolina, where classic Southern values such as hospitality, strong community ties, and family devotion are emphasized.
    She grew up attending a Baptist church and participating in local traditions like church picnics, high‑school football games, and shrimping festivals. While her cultural environment stressed practicality
    and tradition, Nina’s passion for aviation led her to break gender norms in a region where the field is traditionally male‑dominated. She combines respect for Southern heritage with a forward‑looking
    mindset, often championing women’s participation in STEM and serving as a role model within her community.
attributes:
  skills: '[''Commercial Pilot License (CPL) with Instrument Rating'', ''Flight Engineer certification for turboprop aircraft'', ''Advanced instrument navigation (IFR) and area navigation (RNAV)'', ''Aircraft
    systems troubleshooting (avionics, propulsion, hydraulic, electrical)'', ''Flight planning and weather analysis'', ''FAA regulations and compliance (Part 91, Part 121)'', ''Crew Resource Management
    (CRM) and leadership'', ''Emergency procedures and safety management'', ''Aircraft performance calculations'', ''Maintenance documentation and technical reporting'', ''Mentoring and training of junior
    crew'', ''Precision approach and landing techniques (ILS, RNAV approaches)'']'
  hobbies: '[''Group flight outings with local flying club'', ''Volunteer at Walterboro Airfest'', ''Kayaking on the Ashepoo River'', ''Fishing trips'', ''Community choir participation'', ''Cooking Lowcountry
    cuisine'', ''Hosting potluck gatherings'', ''Line dancing'', ''Aerial photography'', ''Vegetable gardening'', ''Reading mystery novels'', ''Historical preservation society involvement'']'
  career_goals: Nina’s primary career ambition is to become a senior captain on a major commercial jet fleet, obtaining type ratings for aircraft such as the Boeing 737 or Airbus A320. She aims to complete
    a Master Instructor Certificate to train and mentor future pilots, and to pursue an FAA aviation safety fellowship or a degree in aviation management that would qualify her for senior leadership roles
    like chief pilot or director of flight operations. Over the next five years, Nina also intends to develop a community outreach program in Walterboro that offers flight experiences and STEM workshops
    for high school students, with a focus on encouraging more women to pursue careers in aviation.
