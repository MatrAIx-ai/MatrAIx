personas:
  professional: Theresa Hogan is a charismatic community outreach assistant in training who leverages a natural gift for storytelling and spontaneous event coordination to excel as a part‑time social media
    coordinator for a local non‑profit, and they secretly plot to launch a boutique event‑planning and lifestyle‑brand consultancy that merges DIY décor flair with curated experiences, despite a habit of
    skipping detailed checklists.
  sports: Theresa Hogan is a weekend softball enthusiast who plays in a co‑ed league, follows the Dallas Cowboys and the Dallas Mavericks, and squeezes in weekly yoga classes to counteract stress, though
    they sometimes skip workouts when a new event idea consumes their schedule.
  arts: Theresa Hogan is a vivacious participant in Dallas’ open‑mic scene, a karaoke‑night regular, and an avid follower of indie pop trio Haim, country legend Dolly Parton, and street‑art muralist Shepard
    Fairey, curating Instagram reels that mash up fashion, interior styling, and pop‑culture references.
  travel: Theresa Hogan is an impulsive road‑tripper who spends long weekends cruising to Waco’s Magnolia Market, the Texas Hill Country for wine tasting, and once booked a spontaneous solo trip to Barcelona
    to chase the city’s street‑art vibe, all while juggling a modest travel budget and a desire to explore more of the Southwest.
  culinary: Theresa Hogan is a creative baker who loves whipping up churro‑topped cinnamon rolls and avocado‑lime cupcakes, experiments with Tex‑Mex staples like chipotle‑marinated chicken tacos, and sources
    fresh cilantro and jalapeños at the local farmers market, yet they habitually burn the edges of pastries when distracted by new event ideas.
  core: Theresa Hogan is a sociable, slightly disorganized 26‑year‑old who fuels community‑driven ambitions with a mix of DIY flair, relentless curiosity, and a penchant for stress‑induced over‑planning.
background:
  cultural: Theresa grew up in a middle‑class, predominantly Anglo‑American family in the Dallas‑Fort Worth metro area. Her upbringing blended the South‑Texas mix of Southern hospitality and Texan independence.
    She was exposed to a range of cultural influences—from classic country music and rodeo events to the growing multicultural scene of Dallas, including Tex‑Mex cuisine and urban art. While her family
    attended a non‑denominational Christian church, she identifies more with a secular, community‑oriented outlook that values personal expression, flexibility, and the informal networking culture common
    in suburban Texas.
attributes:
  skills: '[''Interpersonal communication'', ''Public speaking'', ''Informal event coordination'', ''DIY home décor'', ''Social media content creation'', ''Basic digital marketing'', ''Social cue reading'',
