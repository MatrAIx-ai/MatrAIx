  hobbies: '[''Open‑mic nights'', ''Improv theater'', ''Karaoke'', ''Charity fundraising events'', ''DIY home‑decor'', ''Baking'', ''Instagram fashion & interior reels'', ''Reality TV & true‑crime shows'',
    ''Board games (e.g., Scrabble, Catan)'', ''Softball'', ''People‑watching at cafés'']'
  career_goals: Theresa aims to turn her sociable strengths into a flexible career. In the short term she wants to secure a part‑time role as a community outreach assistant or social media coordinator for
    a local non‑profit or small business, where she can run events and engage audiences. Long‑term, she dreams of launching her own boutique event‑planning and lifestyle‑brand consultancy that blends DIY
    aesthetics with curated experiences for weddings and corporate gatherings. She plans to earn a certification in event management and grow a personal influencer platform focused on approachable creativity
    and authentic community building.
