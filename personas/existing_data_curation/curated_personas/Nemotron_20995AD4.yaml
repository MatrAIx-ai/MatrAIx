  hobbies: '[''Reading (non‑fiction)'', ''Journaling'', ''Puzzle solving (crosswords, Sudoku)'', ''Model building (LEGO, scale kits)'', ''Gardening'', ''Introductory coding (Python)'']'
  career_goals: Terrie aspires to a stable, structured career that lets her work independently while applying her methodical strengths. She is interested in roles such as a veterinary laboratory technician,
    a data analyst, or a technical writer, where precision and routine are valued. Her plan is to complete high school, enroll in a community college for an associate degree in biology or information technology,
    and obtain relevant certifications (e.g., Certified Veterinary Technician or Data Analyst certification). She hopes this pathway will provide a predictable schedule, clear expectations, and limited
    high‑stress social demands.
