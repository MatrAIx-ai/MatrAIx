personas:
  professional: Terrie Derst, a fourteen‑year‑old aspiring software tinkerer, channels their love of order and step‑by‑step instruction into Python projects that automate garden watering and LEGO inventory,
    applying the same methodical mindset that makes them excel at crosswords and meticulous journaling.
  sports: Terrie Derst follows the local high school cross‑country team, participates in a community swimming club for solitary laps, cheers for the Seattle Seahawks and the U.S. Women’s National Soccer
    Team, and prefers structured solo jogs through the neighborhood park over crowded team sports.
  arts: Terrie Derst enjoys instrumental music by Ludovico Einaudi and ambient tracks from Brian Eno while building LEGO sets, watches documentaries by Ken Burns, appreciates the minimalist illustrations
    of Shaun Tan, and occasionally sketches botanical drawings inspired by their garden, finding creative expression in quiet, purposeful moments.
  travel: Terrie Derst dreams of a precisely planned trip to Nagoya, Japan to explore Legoland and historic Shiroyama Park, values organized itineraries over spontaneous adventures, has taken family day
    trips to the National Museum of Natural History and a nearby state park, and prudently saves allowance money for future travel.
  culinary: Terrie Derst favors home‑cooked meals drawn from their garden harvest, such as quinoa salad with roasted carrots, zucchini, and cherry tomatoes seasoned with basil, can whip up a simple vegetable
    stir‑fry using bell peppers, broccoli, and soy sauce, and rarely indulges in sugary snacks, opting instead for a banana with almond butter after school.
  core: Terrie Derst is a methodical fourteen‑year‑old who finds comfort in order, turning solitary puzzles, Python scripts, and garden routines into a disciplined yet quietly anxious worldview.
background:
  cultural: Terrie comes from a white Midwestern family rooted in Ogle County, Illinois, with ancestral ties to early German and English settlers. The community emphasizes practicality, self‑reliance, modesty,
    and a strong work ethic—values that reinforce her preference for structure and predictability. Local cultural practices include church gatherings, community fairs, and a deep appreciation for the agricultural
    landscape, all of which foster a reverence for routine and quiet spaces. This background shapes her tendency toward solitude, her organized approach to tasks, and her desire for a career that offers
    stability and clear expectations.
attributes:
  skills: '[''Organizational skills'', ''Time management'', ''Meticulous note‑taking'', ''Systematic problem solving'', ''Basic spreadsheet proficiency (Excel/Google Sheets)'', ''Introductory Python programming'',
