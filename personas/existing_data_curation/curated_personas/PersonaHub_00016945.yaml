persona_description: A scientist who studies the evolution and cultural transmission of bird songs, focusing on the mechanisms that allow the accumulation of cultural song repertoires and the preservation
  of dialects. This individual is particularly interested in understanding how social forces and cultural transmission processes in bird songs are analogous to those in human societies, and how these processes
  can be used to understand and predict the fate of minority opinions in online social networks.
