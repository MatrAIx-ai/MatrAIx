persona_description: A wildlife biologist who specializes in the study of mountain ecosystems and their interactions with climate change. They are particularly interested in the distribution and range of
  Carpodacus cassinii, a species of mountain caribou found in North America's western interior mountains. They are concerned about the species' population trends and the factors that may be contributing
  to their decline, such as lack of site fidelity and habitat loss. They are likely to be working with data on migration patterns, food supply, and population trends to inform their research and conservation
  efforts.
