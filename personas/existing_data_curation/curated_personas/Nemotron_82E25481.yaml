personas:
  professional: Francisco Zuniga, an aspiring digital illustrator and street‑art enthusiast who spends afternoons sketching in Dallas’s Deep Ellum, curating Instagram galleries of neighborhood festivals,
    and responsibly balancing school assignments with freelance commissions for classmates’ birthday cards.
  sports: Francisco Zuniga, a casual participant in the local Dallas youth soccer league with FC Dallas academy friends, a fan of the Dallas Mavericks and Dallas Stars, who enjoys weekend pick‑up basketball
    games in the community center and follows the national soccer team from his ancestral roots during World Cup qualifiers.
  arts: Francisco Zuniga, a devoted fan of graphic novels like Neil Gaiman’s Sandman and Art Spiegelman’s Maus, who mixes traditional mariachi tunes from Vicente Fernández with modern Latin pop from Bad
    Bunny while shredding an acoustic guitar, and frequently studies the murals of local artists like Luis Ortiz in Deep Ellum for inspiration.
  travel: Francisco Zuniga, who has explored the Day of the Dead celebrations in Oaxaca, the vibrant street art districts of a historic city renowned for its mural tradition, and the historic River Walk
    of San Antonio, and dreams of a future backpack trip to Barcelona’s mosaic‑filled streets and a weekend road‑trip to New Mexico’s al fresco art festivals.
  culinary: Francisco Zuniga, an enthusiastic home‑cook who perfects family‑hand tamales with chipotle salsa verde, crafts fresh guacamole with ripe avocados and lime, and experiments with ramen broth after
    watching cooking shows, yet frequently burns toast when multitasking between drawing and gaming.
  core: Francisco Zuniga is a quietly inventive teen who blends street‑art swagger with family‑rooted traditions, balancing meticulous savings with spontaneous sketch‑sessions, all while navigating teenage
    life with an easygoing calm and a love for late‑night taco runs.
background:
  cultural: Francisco was raised in a close‑knit Mexican‑American family in Dallas, Texas. His household preserves many traditions from his ancestral roots, such as celebrating Día de los Muertos, preparing
    homemade tamales, and speaking Spanish at home. The vibrant Mexican community in Dallas, combined with the city's diverse arts scene, has shaped his identity and artistic perspective. He balances the
    values of respect, harmony, and family responsibility inherited from his heritage with the curiosity and openness to new ideas fostered by his upbringing in a multicultural urban environment.
attributes:
  skills: '["Sketching", "Digital illustration", "Bilingual communication (Spanish/English)", "Basic photo and video editing", "Self‑directed learning of graphic‑design software", "Time management", "Community
    volunteering"]'
  hobbies: '["Drawing and sketching", "Digital painting", "Street photography", "Listening to and playing music", "Cooking Mexican dishes", "Reading graphic novels", "Playing acoustic guitar", "Attending
    local cultural festivals"]'
  career_goals: Francisco dreams of turning his passion for art into a professional career as a graphic designer and muralist who highlights Mexican‑American heritage in public spaces. He plans to earn
    a GED, attend a community‑college art program or a vocational apprenticeship in visual communications, and build a freelance portfolio that includes commission work for local businesses and cultural
    festivals. Long‑term, he hopes to create large‑scale murals in Dallas neighborhoods that merge traditional Mexican motifs with contemporary urban aesthetics, while also offering workshops for younger
    kids interested in art.
