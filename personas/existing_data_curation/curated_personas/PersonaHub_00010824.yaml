persona_description: A gastroenterologist who specializes in the study of the gut microbiota and its relationship with digestive diseases, particularly irritable bowel syndrome (IBS). He has a strong background
  in clinical medicine, gastroenterology, and probiotics, and has published extensively in the field of gastroenterology journals. He is known for his expertise in the use of probiotics in the treatment
  of IBS and other gastrointestinal disorders. Dr. Floch is also a professor at Yale University, a Fellow of the American College of Gastroenterology (MACG), and a recipient of several prestigious awards
  from the American Gastroenterology Association (AGA) and the American College of Gastroenterology (ACG).
