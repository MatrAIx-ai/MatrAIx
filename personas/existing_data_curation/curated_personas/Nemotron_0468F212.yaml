  career_goals: Though retired from formal employment, Joan has channelled her competitive drive and high standards into a series of legacy projects. Her primary ambition is to create a publicly accessible
    digital archive that documents the artistic, cultural, and genealogical heritage of Westmoreland County, complete with high‑resolution images, searchable metadata, and scholarly commentary. She also
    aims to author a memoir and a collection of essays that weave personal narrative with reflections on the region’s evolving art scene. In the longer term, Joan hopes to establish a small scholarship
    fund for local students pursuing studies in art history or archival science, thereby cementing her contribution to future generations.
