  career_goals: Although retired from formal employment, Tavares aims to deepen his mentorship role within the Bronx senior community. He plans to conduct informal workshops on home‑maintenance basics and
    budgeting for younger residents, volunteer as a safety liaison at his church, and collaborate with the local historical society to document the neighborhood’s evolution. He also wishes to learn basic
    computer skills so he can stay connected with his grandchildren and assist them with technology, while continuing to lead the organization of block‑party festivities that celebrate local culture.
