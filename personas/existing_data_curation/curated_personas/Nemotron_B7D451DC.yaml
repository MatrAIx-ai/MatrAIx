personas:
  professional: An experienced mental health counselor, Tomas Ayabarreno blends evidence‑based CBT and solution‑focused therapy with expressive arts techniques, uses bilingual Spanish‑English communication
    and rigorous risk assessment, and balances meticulous documentation with flexible treatment planning as they develop community outreach programs aimed at immigrant communities.
  sports: Tomas Ayabarreno enjoys a balanced athletic routine, joining neighborhood soccer matches with the Bronx River Runners on Saturdays, hiking the Bronx River Trail for solo photography treks in the
    spring, and cheering on the New York Mets and New York City FC, while approaching fitness with a pragmatic mix of competitive spirit and community camaraderie.
  arts: Tomas Ayabarreno immerses themselves in the arts by reading Gabriel García Márquez and Daniel Kahneman, capturing wilderness moments with a Canon EOS on weekend hikes, dancing bachata and merengue
    at community gatherings, and attending productions at the Hudson Valley Shakespeare Festival and a local gallery showcasing works by Frida Kahlo‑inspired artists.
  travel: Tomas Ayabarreno prefers thoughtfully planned getaways that blend adventure and cultural immersion, having photographed the misty cliffs of Iceland, explored the historic streets of Lisbon, and
    taken weekend trips to the Hudson Valley’s wineries, while dreaming of a future retreat to a Caribbean island where their culinary roots could be further explored.
  culinary: Tomas Ayabarreno’s culinary passion centers on preparing traditional dishes like sancocho and mangú, skillfully chopping yuca, plantains, and cilantro to create fragrant sofrito, while experimenting
    with fusion plates that pair these flavors with Mediterranean olive oil, often hosting dinner nights for friends to share both food and stories.
  core: Tomas Ayabarreno is a pragmatic yet curious counselor who balances meticulous documentation with expressive creativity, competes softly in community soccer, splurges on photography gear, and cooks
    soulful meals while cautiously navigating finances and occasionally over‑committing to volunteer work.
background:
  cultural: Tomas was born to Dominican parents who immigrated to the United States in the early 1980s. Raised in a bilingual household, he grew up celebrating Dominican traditions such as Carnaval, Día
    de la Independencia, and family-centric gatherings that emphasize respeto and solidaridad. His Catholic upbringing, combined with the vibrant rhythms of merengue and bachata, shaped a strong sense of
    cultural identity. Living in Bronxville, he navigates an intersection of Dominican heritage and suburban American life, maintaining close ties to the Dominican community in New York City while contributing
    his cultural perspective to his counseling practice. This bicultural experience informs his commitment to culturally competent care and his desire to bridge gaps between immigrant families and mental‑health
    resources.
attributes:
  skills: '[''Active listening'', ''Cognitive Behavioral Therapy (CBT)'', ''Solution‑focused counseling'', ''Crisis intervention'', ''Case management'', ''Group facilitation'', ''Bilingual communication
    (Spanish‑English)'', ''Boundary setting and risk assessment'', ''Program development and community outreach'', ''Outcome evaluation (quantitative & qualitative)'', ''Electronic health record (EHR) management'']'
  hobbies: '[''Reading Latin American literature'', ''Studying contemporary psychology'', ''Photography walks in Westchester'', ''Cooking Dominican cuisine'', ''Dancing bachata and merengue'', ''Volunteering
    at community mental‑health clinics'', ''Attending theater productions'', ''Hiking the Bronx River Trail'', ''Playing soccer in local leagues'']'
  career_goals: Tomas aims to become a certified clinical supervisor and eventually open a private practice that blends traditional counseling with expressive arts therapy, serving the Dominican and broader
    immigrant communities in Westchester. He seeks to publish a culturally adapted mental‑health guide, present at national counseling conferences, and mentor emerging counselors. Over the next five years,
    he plans to earn a doctorate in counseling psychology to enhance his research credentials and lead a community mental‑health initiative that offers low‑cost services and culturally relevant workshops.
