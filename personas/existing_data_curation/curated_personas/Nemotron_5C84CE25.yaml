  career_goals: Ying aims to transition into a senior GIS consultancy role that couples her technical expertise with public engagement. She hopes to lead a community‑based mapping program for Gwinnett County
    that documents local cultural landmarks, supports sustainable development, and fosters citizen participation. She also aspires to mentor emerging Asian‑American professionals in the geospatial field,
    publish a guide on artistic map design, and deliver workshops that blend creativity with spatial analysis for schools and community groups. Completing a bachelor’s degree in Geography or GIS is another
    milestone she plans to achieve to broaden her academic foundation.
