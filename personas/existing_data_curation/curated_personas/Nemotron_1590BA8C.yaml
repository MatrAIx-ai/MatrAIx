  hobbies: '["Cooking traditional Puerto Rican dishes", "Baking pastries", "Dancing bomba and plena", "Gardening tropical plants", "Crocheting", "Reading historical fiction", "Church choir singing", "Walking
    on the beach", "Genealogy research", "Participating in community meetings"]'
  career_goals: Although retired from formal employment, Judith is driven to remain an influential pillar in Yabucoa. She aspires to lead volunteer initiatives that support senior residents, organize intergenerational
    cooking workshops that preserve culinary heritage, and champion community health programs that address stress and emotional well‑being. She hopes to mentor younger women on balancing cultural traditions
    with modern responsibilities, and eventually compile a memoir that celebrates the stories of Puerto Rican women of her generation.
