  hobbies: '[''Gardening'', ''Orchid cultivation'', ''Fishing'', ''Historical research'', ''Writing local history articles'', ''Woodworking'', ''Raspberry Pi tinkering'', ''Home automation projects'', ''Chess'',
    ''Community volunteering'']'
  career_goals: As he approaches retirement, Michael aims to transition into a mentorship and consulting role where he can share his decades‑long expertise with emerging IT professionals. He plans to obtain
    the ITIL 4 Managing Professional certification and a PMP credential to formalize his project management knowledge before stepping back from daily operations. Michael also hopes to spearhead a digital‑literacy
    outreach program for seniors in Clay County, leveraging his humanities background to design user‑friendly learning materials. Ultimately, his ambition is to leave a lasting, organized IT infrastructure
    for his organization while contributing to his community’s tech empowerment.
