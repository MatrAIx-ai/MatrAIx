personas:
  professional: A seasoned IT specialist and mentor, Michael Anderson weaves three decades of hardware troubleshooting, Windows networking, and Azure cloud management with their humanities perspective,
    delivering systematic, well-documented solutions while guiding junior staff toward ITIL 4 and PMP-certified best practices.
  sports: An avid early-morning fisherman on the St. Johns River, Michael Anderson also follows the Jacksonville Jaguars, supports the Florida Gators, belongs to the local Bass Anglers Club, and plays weekly
    pickleball matches at the community center to stay fit.
  arts: A devoted member of the Clay County Historical Society, Michael Anderson writes regional heritage articles, enjoys the Jacksonville Jazz Festival featuring Snarky Puppy, appreciates Winslow Homer's
    watercolors, and finds quiet satisfaction crafting classic wooden furniture inspired by the work of Norm Abram.
  travel: Michael Anderson prefers meticulously planned road trips, having revisited St. Augustine's historic district and the Savannah Riverwalk, while dreaming of a senior-friendly cruise through the
    Caribbean islands and a future pilgrimage to the historic sites of Europe's Renaissance capitals.
  culinary: An enthusiastic home gardener, Michael Anderson often cooks fresh garden vegetable stew seasoned with thyme and garlic, prepares grilled catfish with citrus glaze, and indulges in key lime pie
    made with locally sourced key limes, while occasionally experimenting with orchid-infused herbal teas.
  core: Michael Anderson blends meticulous IT expertise, a love for structured garden cycles, and a penchant for classic woodworking, all while juggling gentle health quirks and a disciplined, yet occasionally
    splurging, retirement budget.
background:
  cultural: Michael was raised in a middle‑class, Anglo‑American family in the southeastern United States. Growing up in Florida, he absorbed the region’s emphasis on community, hospitality, and an appreciation
    for outdoor recreation. His parents valued education and civic involvement, which encouraged him to pursue a liberal arts degree before entering the tech field. He identifies with Southern cultural
    traits such as a pragmatic work ethic, respect for tradition, and a love of local history, while also embracing the broader American ethos of continuous learning and self‑reliance.
attributes:
  skills: '[''IT support'', ''Network administration'', ''Windows Server management'', ''Microsoft 365/Azure administration'', ''Technical troubleshooting'', ''PowerShell scripting'', ''Python scripting'',
