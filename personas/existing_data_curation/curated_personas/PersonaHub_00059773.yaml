persona_description: A researcher from Sandia National Laboratories who specializes in thermoelectric materials and their application in energy conversion and storage. He is interested in the development
  of new thermoelectric materials and their commercialization. He has a deep understanding of the challenges in creating an electrical contact and studying the thermal electric properties of thermoelectric
  arrays. He is looking for further funding to solve the problem of successfully making contacts and to characterize the thermal electric properties of arrays. He is a strong advocate for entrepreneurship
  and is seeking to foster a culture of innovation and commercialization within the national labs.
