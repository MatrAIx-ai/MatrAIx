  hobbies: '[''Hip‑hop dancing'', ''Karaoke nights'', ''Cooking and recipe experimentation (soul food and Caribbean fusion)'', ''Fashion styling and thrifting'', ''Social media content creation (TikTok,
    Instagram)'', ''Volunteering at community youth centers'', ''Attending live music events'', ''Recreational basketball'', ''Listening to cultural and self‑development podcasts'']'
  career_goals: Yvonnie aims to formalize her natural talent for bringing people together by first earning her GED and then pursuing a certificate or associate degree in hospitality management or community
    development at a local community college. In the short term she plans to secure a part‑time position in event planning or a community center where she can apply her outreach and coordination skills.
    Long‑term, she envisions launching a weekend pop‑up kitchen that showcases traditional African‑American dishes with contemporary twists, while also building a modest social‑media presence that highlights
    her cooking, fashion, and community event experiences. Ultimately she hopes to become a community outreach coordinator or event manager, combining her love for cultural celebration with a stable career.
