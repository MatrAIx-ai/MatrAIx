  career_goals: Although currently not in the formal workforce, Louis aims to channel his curiosity and artistic drive into a series of personal projects. He plans to build a cohesive portfolio of watercolor
    and photography work, pursue a community‑based art exhibition, and volunteer as a docent at the Hagerstown Historical Society to share local stories. Additionally, he hopes to launch a small pop‑up
    shop featuring his artwork and vintage finds, write a memoir of his life in Washington County, and develop better organizational habits to bring his ideas to fruition.
