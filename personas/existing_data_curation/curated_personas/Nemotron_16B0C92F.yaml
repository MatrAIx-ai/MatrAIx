  career_goals: Brandy aims to become a leading specialist in missing-person and corporate fraud investigations within the Mid-Atlantic region. She plans to earn advanced certifications such as Certified
    Professional Investigator (CPI) and Certified Fraud Examiner (CFE) within the next two years. Her long-term ambition is to launch her own boutique investigative firm that offers tailored services to
    educational institutions, nonprofits, and small businesses, emphasizing preventive security and rapid response. She also aspires to develop a community outreach program that trains local volunteers
    in personal safety and situational awareness, and to author a guidebook on investigative best practices for non-law-enforcement professionals.
