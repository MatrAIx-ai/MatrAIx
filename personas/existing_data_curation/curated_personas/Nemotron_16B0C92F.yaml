  hobbies: '[''Improv comedy'', ''Soccer league'', ''Mystery dinner theater'', ''Escape rooms'', ''Community Watch volunteer'', ''Hiking'', ''Krav Maga training'', ''Street photography'', ''True-crime reading'',
