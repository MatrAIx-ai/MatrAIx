  career_goals: Juan aims to transform his family’s farm into a model of sustainable, technology‑enhanced agriculture in the Great Lakes region. Over the next five years he plans to adopt precision‑agriculture
    tools such as drone scouting and variable‑rate fertilization, earn a certification in sustainable farm management, and expand the operation to include a community‑supported agriculture (CSA) program.
    He envisions eventually establishing a cooperative that helps nearby smallholders access markets and training, while also pursuing a part‑time degree in agribusiness to deepen his business acumen. His
    long‑term ambition is to secure a stable livelihood for his family, mentor the next generation of farmers, and contribute to regional food security.
