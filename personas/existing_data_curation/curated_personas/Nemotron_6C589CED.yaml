personas:
  professional: Juan Valdes, a 22‑year‑old precision‑agriculture specialist, blends hands‑on livestock and crop management with GIS mapping, drone scouting, and farm‑management software, leading a crew
    of five with organized, methodical planning while staying curious about new sustainable practices.
  sports: Juan Valdes plays midfield for the Lake County Riverside Strikers in a local amateur soccer league, enjoys early‑morning trail runs along the dunes for fitness, follows the Green Bay Packers (NFL)
    and Milwaukee Bucks (NBA) closely, and spends weekend evenings fishing on inland lakes to unwind after matches.
  arts: Juan Valdes captures sunrise over his fields with a DSLR, draws inspiration from folk singer Vicente Fernández and contemporary guitarist Natalia Lafourcade, frequents the annual regional folk festival,
    curates a small photo exhibit at the community garden center, and occasionally experiments with light painting during night shoots.
  travel: Juan Valdes favors road trips across the Great Lakes, with recent visits to Door County's shoreline villages and a weekend retreat in the Upper Peninsula's Porcupine Mountains, plans a future
    backpacking expedition through the Canadian Shield, and dreams of studying sustainable vineyards in Tuscany’s Chianti region.
  culinary: Juan Valdes prepares traditional tamales and hearty pozole using heirloom corn, locally raised pork, dried chilies like guajillo and ancho, and fresh garden vegetables, enjoys tweaking recipes
    with smoked paprika and a splash of lime, but has a habit of over‑salting when fatigued after long days in the field.
  core: Juan Valdes merges farmer’s grit with tech‑savvy precision, captures sunrise photography, leads a disciplined crew, and never leaves a woodworking project without a stash of extra glue in the toolbox.
background:
  cultural: Juan is a Mexican‑American raised in a bilingual household in Lake County, Illinois. He celebrates Mexican holidays such as Día de los Muertos and Cinco de Mayo with family gatherings, while
    also participating in Midwestern traditions like county fairs and harvest festivals. His cultural identity blends the collectivist values, hospitality, and culinary heritage of Mexico with the pragmatic,
    independent work ethic of the Great Lakes farming community. Fluent in both Spanish and English, he often serves as a cultural bridge in the local agricultural network, helping Spanish‑speaking workers
    and suppliers integrate into the regional market. His upbringing instilled a strong sense of family responsibility, respect for tradition, and an openness to new ideas, all of which shape his approach
    to farming and community involvement.
