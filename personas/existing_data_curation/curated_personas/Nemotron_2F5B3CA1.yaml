  career_goals: Although retired from formal employment, Minh is committed to making a lasting impact in his community. He aims to develop a financial‑literacy workshop series for seniors at the Plano Senior
    Services Center, mentor local immigrant entrepreneurs through the Collin County Small Business Development Center, and document his family’s migration story in a bilingual memoir. He also hopes to serve
    on the board of the Plano Vietnamese Cultural Association to preserve and share traditional customs.
