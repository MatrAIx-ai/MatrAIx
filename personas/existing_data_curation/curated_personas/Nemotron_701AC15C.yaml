personas:
  professional: A veteran secondary‑school educator, Stephanie Morgan, has spent over three decades mastering classroom management, curriculum design, and data‑driven instruction, blending her preference
    for structure with a flexible, student‑centered ethos; they now channel that expertise into mentoring new teachers, leading professional‑development workshops, and steering district‑wide curriculum
    coordination, all while applying a practical, results‑oriented mindset that tempers their occasional worry about meeting standards.
  sports: Stephanie Morgan, an active outdoor enthusiast from the Ozarks, hits the trails on Saturday mornings to hike the Benton and Petit Jean routes while cheering on the Arkansas Razorbacks basketball
    team and the St. Louis Cardinals during the baseball season; they belong to the Russellville Senior Walking Club, indulge in low‑impact cardio through gentle yoga, and prefer walking over competitive
    sports, though they occasionally join community softball games for fun.
  arts: Stephanie Morgan, a dedicated craftsperson, weaves her love of Southern literature—favoring authors like Margaret Mitchell and Flannery O'Connor—into quilting patterns inspired by historic motifs,
    while she finds solace in the melodies of Alison Krauss and the classic films of Audrey Hepburn; they regularly attend the Little Rock Shakespeare Festival and support the local community theater, often
    quoting lines from ‘To Kill a Mockingbird’ during book‑club discussions, and their creative outlets provide a structured escape from daily stress.
  travel: Stephanie Morgan, a reflective road‑trip planner, enjoys leisurely drives along the Blue Ridge Parkway and weekend getaways to historic Charleston, South Carolina, where they explore antebellum
    architecture and sample shrimp‑and‑grits; they dream of a literary pilgrimage to Bath, England, to walk the streets that inspired Jane Austen, but their travel plans are tempered by a fixed retirement
    budget and the desire to stay close to family, leading them to prioritize short, well‑structured trips over spontaneous overseas adventures.
  culinary: Stephanie Morgan, a seasoned Southern cook, excels at slow‑cooking collard greens with smoked turkey, perfecting biscuits with buttermilk and honey, and concocting peach cobbler topped with
    a crunchy oat crumble; they relish sourcing heirloom tomatoes and fresh okra from the local farmer’s market, yet their meticulous nature sometimes results in over‑seasoning dishes, and they habitually
    taste‑test multiple times, using a vintage cast‑iron Dutch oven for comfort‑food staples while occasionally experimenting with Mediterranean dishes like grilled halloumi to broaden their palate.
  core: Stephanie Morgan, a 61‑year‑old educator turned curriculum champion, balances meticulous planning, community service, and a love for gardening and crafts with a lingering worry‑driven need for control,
    creating a steady yet slightly anxious outlook on life.
background:
  cultural: Stephanie was raised in a small, close‑knit town in central Arkansas, immersed in the cultural traditions of the American South. Her family’s values emphasize community service, faith, and family
    togetherness, reflected in regular involvement with the local Baptist church, county fairs, and church potlucks. She grew up with an appreciation for Southern hospitality, country and bluegrass music,
    and regional culinary heritage. These influences continue to shape her worldview, fostering a strong sense of responsibility toward her students, a respect for tradition, and a commitment to preserving
    local customs and histories.
