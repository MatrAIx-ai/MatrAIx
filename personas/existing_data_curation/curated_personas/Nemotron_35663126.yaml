  career_goals: Hai Ho aims to advance to a senior loan manager or branch director position within the next three years, leveraging his analytical expertise to implement AI‑assisted underwriting processes
    that improve efficiency and reduce default rates. He plans to obtain the Certified Mortgage Banker (CMB) designation and lead a cross‑functional team focused on financial education outreach for underserved
    communities in San Diego County. Long‑term, he aspires to transition into a consulting role where he can advise fintech startups on integrating disciplined risk‑management frameworks while maintaining
    a balanced lifestyle that allows ample time for his artistic interests and family.
