persona_description: A government official or policy analyst who is responsible for overseeing and implementing statistical area definitions, particularly those related to metropolitan and micropolitan
  statistical areas, as well as rural and small-town areas. This person must have a deep understanding of statistical methodologies, economic integration, and population dynamics to ensure the accuracy
  and relevance of the definitions. They must also be familiar with the changes and shortcomings of traditional definitions and be able to apply HAC's alternative residence definition to establish a more
  precise measure of rural character. Additionally, they must have a keen eye for detail and the ability to identify and address any inconsistencies or errors in the definitions.
