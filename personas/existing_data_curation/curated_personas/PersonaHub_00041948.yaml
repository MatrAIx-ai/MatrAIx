persona_description: A researcher and extension soil fertility specialist at the University of Minnesota, focusing on the long-term effects of nutrient rotation on soil nutrient levels and the environmental
  benefits of maintaining a nutrient balance. Specializes in studies on sulphur deficiency and the role of organic matter in crop sensitivity, with a focus on the need for sulphate-sulphur in poorly drained
  soils. Has experience with micronized elemental sulphur products and has completed studies on elemental and sulphate-sulphur in poorly drained soils to evaluate the need for sulphur in soils with high
  organic matter.
