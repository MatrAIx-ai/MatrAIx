  career_goals: While still a toddler, Elizabeth often imagines adult roles while playing. She expresses strong curiosity about how things work, frequently taking apart simple toys to examine their parts.
    She dreams of becoming a scientist or engineer who designs practical solutions, motivated by her love for building tall block structures that stand sturdy. Her competitive streak makes her eager to
    excel in preschool activities, aiming to be top in matching games. She also shows an early interest in caregiving, occasionally role‑playing as a doctor, reflecting a desire to help others in tangible,
    hands‑on ways.
