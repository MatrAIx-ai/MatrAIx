  hobbies: '[''Reading across genres'', ''Visiting art galleries'', ''Attending theatre productions'', ''Cycling'', ''Hiking in prairie preserves'', ''Journaling'', ''Photography'', ''Farm‑to‑table cooking'',
    ''Volunteering at public libraries'', ''Book‑exchange club'']'
  career_goals: Caroline aims to publish a debut novel that weaves together contemporary social issues with lyrical prose, establishing herself as a voice of thoughtful, character‑driven fiction. She also
    plans to author a series of educational resources that integrate narrative techniques into classroom learning, bridging her passions for writing and teaching. In the next five years, she hopes to secure
    a literary fellowship, lead a community writing workshop in Champaign, and expand into multimedia storytelling through podcasts or audio‑drama adaptations of her work. Ultimately, Caroline envisions
    a balanced career where her authorial pursuits and educational contributions reinforce each other, allowing her to mentor emerging writers while maintaining a steady publication schedule.
