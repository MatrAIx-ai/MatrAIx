  career_goals: Murray aims to translate his practical expertise into formal leadership within the welding industry. Over the next five years he plans to earn his Certified Welding Inspector (CWI) credential
    and complete the remaining coursework toward an associate degree in welding technology. He envisions advancing to a foreman or shop-supervisor role in an aerospace or renewable-energy fabrication plant,
    where he can oversee quality-control programs and mentor junior welders. In the longer term, Murray aspires to launch a small, family-run welding and metal-fabrication business that serves the growing
    demand for solar-panel frames and custom metal art in the Albuquerque market. Throughout these ambitions he remains committed to maintaining a stable work-life balance, ensuring financial security for
    his wife and supporting his community through volunteer training workshops.
