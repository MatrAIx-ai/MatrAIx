personas:
  professional: Kay Nerbun, a seasoned education specialist with a graduate degree in curriculum development, leverages their methodical, data‑driven mindset and love of structured projects to design meticulous
    adult‑learning programs, write grant proposals, and coordinate community tutoring initiatives in Greene County.
  sports: Kay Nerbun stays active through weekly hill walks, a senior‑center yoga class, and cheering on the Tennessee Titans during football season while also competing in chess tournaments at the local
    senior center, blending low‑impact physical activity with a love of mental competition.
  arts: Kay Nerbun, an avid quilter and mystery‑novel aficionado, draws creative energy from Faith Ringgold’s patchwork artistry, the moody scores of Ennio Morricone, and community theater productions starring
    local talent like James Earl Jones, weaving these influences into their own patterned quilts.
  travel: Kay Nerbun prefers meticulously planned road trips that mix horticultural tours and historic sites, having explored the Blue Ridge Parkway and the Royal Botanic Gardens at Kew, while dreaming
    of a spring getaway to the lavender fields of Provence to spark fresh quilting ideas.
  culinary: Kay Nerbun, a competent home chef, transforms garden harvests into hearty ratatouille, pickled cucumbers, and rosemary‑infused chicken pot pie, and occasionally treats themselves to shrimp and
    grits at a downtown eatery, always insisting on fresh, seasonal ingredients.
  core: Kay Nerbun blends the precision of a curriculum architect with a quiet competitive streak, channeling garden‑grown order into quilting masterpieces, disciplined budgeting, and relentless crossword
    challenges, all while wrestling with a tendency to over‑worry.
background:
  cultural: Kay grew up in Midway, a small rural community in Greene County, Tennessee. Her family’s roots are in the Appalachian region, where values of self‑reliance, hard work, and close‑knit community
    ties are emphasized. Though identified as white, her cultural identity is shaped by Southern hospitality, a strong connection to local traditions such as church gatherings, county fairs, and country‑bluegrass
    music. The modest, agrarian upbringing fostered a practical outlook and a respect for structure, which continues to influence her educational philosophy and personal routines.
attributes:
  skills: '[''Curriculum design'', ''Lesson planning'', ''Educational assessment'', ''Classroom management'', ''Project coordination'', ''Grant writing'', ''Budgeting'', ''Data analysis (educational metrics)'',
