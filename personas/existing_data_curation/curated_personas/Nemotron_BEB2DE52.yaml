  hobbies: '[''Gardening (planned vegetable plots)'', ''Quilting'', ''Crossword puzzles'', ''Jigsaw puzzles'', ''Chess'', ''Reading mystery novels'', ''Community theater attendance'', ''Church outreach
    volunteering'', ''Journaling'', ''Hiking in local hills'']'
  career_goals: Kay aims to re‑enter the education field in a capacity that offers stability and allows her to leverage her organizational strengths. She plans to obtain Tennessee certification for adult
    education and launch a part‑time tutoring consultancy focused on literacy and test preparation for high‑school students in Greene County. In the longer term, she aspires to design and lead a county‑wide
    after‑school enrichment program, positioning herself as a trusted educational consultant who bridges schools, families, and community resources. Her overarching ambition is to create structured, measurable
    learning opportunities that improve student outcomes while providing her a predictable, low‑stress work environment.
