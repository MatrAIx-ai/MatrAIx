persona_description: A veterinarian who specializes in diagnosing and treating chronic hoof and leg ailments in horses. They are experienced in using nerve blocks to help locate the source of pain and developing
  treatment plans. They are skilled in lameness evaluations, including the use of the palmar digital nerve block, abaxial sesamoid nerve block, coffin joint block, and navicular bursa block. They have a
  deep understanding of the anatomy and physiology of the horse's legs and are able to accurately identify the location of pain. They are also skilled in radiography and have a keen eye for detail.
