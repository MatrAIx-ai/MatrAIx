personas:
  professional: Dara Kennedy, a frontline surveillance officer at a Michigan casino, leverages meticulous real‑time video analysis, rigorous incident reporting, and a methodical, structure‑driven mindset
    to enforce gambling regulations while laying the groundwork for a senior security analyst career.
  sports: Dara Kennedy, an enthusiastic runner with the Ann Arbor Trail Runners club, regularly hikes Michigan’s state parks, follows a disciplined weight‑training routine, and avidly supports the Detroit
    Lions, Detroit Pistons, and Michigan Wolverines.
  arts: Dara Kennedy, a nature photographer inspired by Ansel Adams, curates playlists featuring Sufjan Stevens and The National, frequents the Ann Arbor Film Festival for Christopher Nolan’s latest releases,
    and occasionally sketches landscapes during trail breaks.
  travel: Dara Kennedy prefers meticulously planned road trips, having trekked the dunes of Sleeping Bear and Pictured Rocks, and now eyes a solo adventure to Iceland’s volcanic fields and a future backpacking
    trek through the Canadian Rockies.
  culinary: Dara Kennedy, a competent home cook, favors protein‑packed dishes like grilled salmon with rosemary‑infused quinoa, indulges in Detroit‑style pizza topped with pepperoni on cheat days, and routinely
    snacks on roasted chickpeas seasoned with smoked paprika.
  core: Dara Kennedy, a detail‑obsessed security analyst‑in‑training, balances a love for chess and Raspberry Pi tinkering with a habit of over‑organizing playlists, often staying up late reviewing surveillance
    footage for fun.
background:
  cultural: Raised in Almont, a small town in Lapeer County, Michigan, Dara grew up in a predominantly white Midwestern community where practicality, a strong work ethic, and community involvement are highly
    valued. Her family’s roots in local manufacturing and agriculture fostered an appreciation for modest living and self‑reliance. She attended the local public high school, participating in community
    events such as town fairs, high school sports, and church gatherings, which reinforced regional traditions. While she identifies as white, Dara is aware of the growing diversity in the broader Detroit
    metropolitan area and respects multicultural perspectives.
attributes:
  skills: '[''Surveillance camera operation'', ''Real-time video analytics'', ''Incident reporting and documentation'', ''Risk assessment and threat identification'', ''Physical self‑defense and emergency
