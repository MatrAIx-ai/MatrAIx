    and CPR'', ''Conflict de‑escalation'', ''Effective written communication'', ''Attention to detail'']'
  hobbies: '[''Hiking and trail running in state parks'', ''Nature photography'', ''Chess and strategy board games'', ''Logic puzzles and brainteasers'', ''DIY electronics and Raspberry Pi projects'', ''Gym
    workouts (weight training and cardio)'', ''Volunteering to teach basic computer skills'']'
  career_goals: Dara aims to advance from a front‑line surveillance officer to a senior security analyst within a regional casino network. Over the next five years she plans to earn the Certified Protection
    Officer (CPO) credential and pursue a master’s degree in cybersecurity. Her long‑term ambition is to lead a security operations center, overseeing risk management, fraud detection, and the integration
    of AI‑driven monitoring technologies. Ultimately, she hopes to transition into a cybersecurity consultancy role focused on the gaming industry.
