personas:
  professional: Sandra Uebele, a meticulous facility services professional with an associate degree in business administration, leverages her expertise in floor care, inventory management, and OSHA‑compliant
    safety protocols to streamline cleaning operations while fostering a cooperative team environment that thrives on routine and reliability.
  sports: Sandra Uebele enjoys weekly nature‑trail walks with her husband, participates in a local community softball league affiliated with the Pine Grove Recreation Club, and avidly supports the Atlanta
    Falcons (NFL) and the Atlanta Braves (MLB), blending casual cardio with team spirit as part of her balanced fitness routine.
  arts: Sandra Uebele weaves her love for knitting into community service while humming classic gospel tunes from Mahalia Jackson, enjoying contemporary folk storytelling by Brandi Carlile, and savoring
    the soulful melodies of vintage country legend Dolly Parton during church socials, reflecting a deep appreciation for music that inspires her crafts.
  travel: Sandra Uebele prefers short, purposeful road trips that combine family visits and church events, having explored Charleston, South Carolina, and Savannah, Georgia, while dreaming of a pilgrimage
    to the historic sites of Williamsburg, Virginia, and planning future journeys around her work schedule and modest budget.
  culinary: Sandra Uebele, an intermediate home chef, delights in perfecting Southern comfort dishes such as shrimp and grits, slow‑cooked collard greens seasoned with smoked turkey, and sweet peach cobbler
    topped with a buttery biscuit crust, often incorporating ingredients like buttermilk, okra, and sweet potatoes, and eagerly shares these meals at church potlucks and neighborhood gatherings.
  core: Sandra Uebele balances a love for routine and community service with a penchant for over‑packing her gardening tote, an occasional habit of mumbling song lyrics while cleaning, and a stubborn refusal
    to delegate the final stretch of floor‑waxing, showcasing a diligent yet endearingly meticulous spirit.
background:
  cultural: Sandra was raised in a modest, white, rural family in western Kentucky, reflecting the Appalachian cultural heritage of the area. Her upbringing emphasized hard work, self‑reliance, regular
    church attendance, and close‑knit community relationships. She celebrates Southern customs such as Sunday family meals, community festivals, and seasonal gardening. While holding traditional values
    rooted in her hometown’s culture, she also embraces the inclusive and cooperative spirit fostered by her local church and civic groups, prioritizing harmony and helping others.
attributes:
  skills: '[''Commercial cleaning'', ''Floor care (stripping & waxing)'', ''Restroom sanitation'', ''Hazardous material handling'', ''Inventory control'', ''Time management'', ''Team leadership'', ''Customer
    service'', ''Safety compliance (OSHA)'', ''Basic maintenance (light bulb replacement, minor repairs)'']'
  hobbies: '[''Gardening'', ''Knitting'', ''Bible study group'', ''Community volunteer work'', ''Local history club'', ''Walking on nature trails'', ''Cooking family recipes'']'
  career_goals: Sandra aims to advance into a supervisory position within facility services, such as Lead Janitor or Facilities Coordinator, where she can oversee a cleaning team, develop efficient protocols,
    and contribute to budgeting and supply planning. She plans to earn a Certified Professional Cleaner (CPC) credential and eventually complete a bachelor's degree in facilities management to qualify for
    a Facilities Manager role. In the longer term, Sandra envisions launching a family‑run cleaning business that serves local schools, churches, and small businesses, leveraging her reliable reputation
    and strong community connections.
