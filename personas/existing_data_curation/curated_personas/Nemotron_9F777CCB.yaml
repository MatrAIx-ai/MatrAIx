  professional: Omar Diaz, a curious one‑year‑old who already organizes his colorful stack of blocks while remaining flexible enough to let his younger cousin rearrange them, hints at a future in early
    childhood education or design where their practical curiosity and cooperative nature can thrive.
  sports: Omar Diaz, a lively toddler who loves crawling across the community park’s grass, attends baby swim classes at the local Aquatics Center, and cheers on the Los Angeles Dodgers during family outings,
    embodying early enthusiasm for physical activity and team spirit.
  arts: Omar Diaz, enchanted by the gentle strums of a guitarra during family gatherings and the vibrant colors of finger‑paint sessions, frequently hums lullabies by Lila Downs and enjoys watching the
    animated film Coco, weaving cultural music and visual art into their daily play.
  travel: Omar Diaz, who has already taken short road trips to Disneyland, visited the beach in San Diego, and dreams of a future family vacation to Mexico City to explore historic altar traditions and
    taste authentic tamales, balances a love for familiar family outings with a budding curiosity for new horizons.
  culinary: Omar Diaz, with a developing palate that favors soft avocado mash, sweet corn tamales, and fresh fruit purees, delights in being fed by their mother’s kitchen aromas and occasionally attempts
