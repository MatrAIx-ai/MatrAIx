personas:
  professional: An aspiring young comic‑strip creator, Andrew Pratt merges his love for drawing, LEGO architecture, and Scratch programming into weekly animated stories, and they apply a meticulous schedule
    and high standards that make each panel a polished mini‑project.
  sports: Andrew Pratt pedals his bike through the Willow Brook Trail with the Palmyra Trail Riders club, cheers for the Philadelphia Eagles on Sundays, roots for the New York Yankees when baseball season
    rolls around, and they occasionally join the town’s youth soccer practice for a quick sprint.
  arts: Andrew Pratt devotes after‑school hours to sketching comic panels inspired by Stan Lee and Neil Gaiman, constructs elaborate LEGO scenes while listening to Beethoven’s Moonlight Sonata, and they
    relish visits to the Philadelphia Museum of Art to study impressionist works.
  travel: Andrew Pratt spends summer vacations exploring the Philadelphia Museum of Art and the Smithsonian in Washington, D.C., enjoys weekend trips to Atlantic City’s boardwalk for cotton‑candy, and they
    day‑dream about a future visit to Tokyo’s Akihabara district to soak up manga culture.
  culinary: Andrew Pratt prefers pepperoni pizza, cheesy macaroni‑and‑cheese, and chicken nuggets, often mixing trail‑mix with pretzels and dried fruit for a snack, and they dabble in baking chocolate chip
    cookies using butter and vanilla extract under their mom’s guidance.
  core: Andrew Pratt is a quiet, hyper‑organized 11‑year‑old who channels boundless curiosity into comic‑strip storytelling while obsessively scheduling every sketch, bike ride, and savings goal.
background:
  cultural: Andrew grows up in a middle‑class, white family in Palmyra, New Jersey, a quiet suburban borough in Burlington County. His upbringing reflects typical Mid‑Atlantic American culture, with family
    traditions that include celebrating national holidays such as Thanksgiving and Fourth of July, enjoying seasonal community events like the Palmyra summer fair, and occasional trips to cultural institutions
    in nearby Philadelphia. The local public school system provides a supportive academic environment, and the community emphasizes both civic involvement and access to regional art and science resources.
attributes:
  skills: '[''Organizational planning'', ''Visual drawing and sketching'', ''Scratch programming'', ''Introductory Python'', ''Research and synthesis'', ''Small‑group coordination'']'
  hobbies: '[''Drawing and comic‑strip creation'', ''LEGO model building'', ''Scratch game coding'', ''Science‑fiction/fantasy reading'', ''Cycling and nature walks'', ''Piano practice'', ''Journaling'',
    ''Museum visits'']'
  career_goals: Andrew aspires to a career that integrates his love of art with his disciplined approach, such as architecture, graphic design, or video‑game development. He aims to attend a STEM‑focused
    high school where he can build a robust portfolio of design work, deepen his coding skills, and participate in design‑related extracurriculars. Ultimately, he hopes to earn a degree in a design or engineering
    field and create aesthetically compelling, functional spaces or interactive experiences.
