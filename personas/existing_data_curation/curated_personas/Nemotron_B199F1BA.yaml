  career_goals: Looking ahead, Lionel aims to grow his boutique brokerage while laying the groundwork for a smooth transition into retirement. He plans to diversify his services by adding property‑management
    offerings and specializing in senior‑housing referrals, reflecting both his practical mindset and his consideration for the community’s needs. Mentorship remains a key ambition; he wants to formalize
    a succession plan that equips younger agents with the skills and ethical foundation he values. Embracing emerging technologies—such as AI‑driven market analytics and immersive virtual tours—he seeks
    to keep his firm competitive. Lionel also hopes to contribute to local affordable‑housing initiatives, ensuring his legacy supports harmony and stability for future generations.
