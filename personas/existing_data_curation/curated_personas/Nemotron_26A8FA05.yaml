personas:
  professional: David Long is a residential carpenter who excels at structural framing, blueprint reading, and meticulous finish work, channeling his disciplined, organized nature into tight project schedules
    and flawless measurements while navigating client expectations with assertive yet cooperative communication.
  sports: David Long maintains a regular weight‑lifting regimen at the local gym, participates in community baseball leagues, and avidly follows the New York Yankees, New Jersey Devils, and New York Giants,
    using the structure of team schedules to complement his disciplined fitness routine.
  arts: David Long finds creative fulfillment in woodworking, drawing inspiration from craftsmen like Sam Maloof, while enjoying folk music from artists such as Bob Dylan and attending occasional local
    art fairs to broaden his aesthetic sensibilities.
  travel: David Long prefers meticulously planned weekend getaways, often driving up the Garden State Parkway to explore the historic streets of Philadelphia or hiking the Delaware Water Gap, while dreaming
    of a future trip to Scandinavia to study renewable building practices.
  culinary: David Long enjoys cooking fresh‑caught salmon with lemon‑dill sauce, preparing hearty vegetable stew from his garden’s tomatoes and carrots, and is comfortable with intermediate‑level grilling
    and sautéing, yet admits to over‑indulging in take‑out pizza after long workweeks.
  core: David Long blends disciplined carpentry mastery with a solitary love for fishing, gardening, and woodworking, balancing meticulous planning with occasional stress‑driven insomnia and a cautious,
    goal‑focused financial outlook.
background:
  cultural: David grew up in a middle-class, white working-family environment in Monmouth County, New Jersey, where the practical values of the region's industrial and maritime heritage shaped his outlook.
    His family emphasized hard work, reliability, and community involvement, traditions reflected in local celebrations like Fourth of July barbecues and seasonal seafood feasts. Attending a high school
    that offered a carpentry apprenticeship program introduced him early to the skilled-trade culture of the Northeast. As a married young adult, he blends these regional American working-class influences
    with his personal commitment to stability and structure.
attributes:
  skills: '[''Structural framing'', ''Blueprint reading'', ''Finish carpentry'', ''Material estimation'', ''Tool maintenance'', ''Safety compliance (OSHA)'', ''Project scheduling'', ''Team coordination'',
