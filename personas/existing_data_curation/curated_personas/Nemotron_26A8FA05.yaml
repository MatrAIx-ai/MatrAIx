  hobbies: '[''Fishing'', ''Gardening'', ''Handcrafted woodworking projects'', ''Weightlifting'', ''Board game nights'', ''Community baseball'']'
  career_goals: David aims to achieve journeyman carpenter certification within the next two years, followed by a crew lead position on larger residential remodels. He plans to specialize in sustainable
    building practices, obtaining Green Building certification, and ultimately launch his own small contracting business focused on high-quality, energy-efficient home renovations. In the medium term, he
    seeks to increase his annual income to support his growing family and purchase a home in the Keyport area, while maintaining the structured, high-standard work environment he values.
