  hobbies: '[''Fishing'', ''Attending Kentucky Derby events'', ''Bluegrass music festivals'', ''Bourbon tasting'', ''Woodworking'', ''Reading true‑crime books'', ''Gym workouts'', ''Family gatherings'',
