persona_description: A rural landowner and naturalist who has experience with cane toads and their impact on goannas in the Cooper district. He is concerned about the long-term impacts of the cane toads
  on the ecosystem and the need for close, intense study to understand the full extent of the impacts. He is also interested in the potential for the cane toads to adapt to the aridity of the region and
  is hopeful that the goannas and other frog eating animals will gradually learn to leave them alone over time.
