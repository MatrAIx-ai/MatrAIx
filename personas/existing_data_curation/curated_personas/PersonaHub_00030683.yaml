persona_description: A historian who specializes in the study of the Quaker movement, particularly its history, social impact, and contemporary issues. He or she is knowledgeable about the key figures,
  events, and movements of the Quaker community, and is interested in the impact of the Quaker movement on American society and politics. The person is also interested in the history of the Quaker movement
  in England, and may have a particular interest in the Quaker Crusade against slavery. They may have a strong commitment to peace and social justice, and may be interested in the role of Quakers in promoting
  these values.
