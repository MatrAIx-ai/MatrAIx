  hobbies: '[''Woodworking'', ''Model train building'', ''Fishing'', ''Hiking'', ''Reading non-fiction (engineering/history)'', ''Volunteer tutoring'', ''Classic car restoration'', ''Garden maintenance'']'
  career_goals: Approaching retirement, Jordan aims to transition from full‑time floor work to a mentorship and advisory role within his plant. He hopes to formalize his informal coaching into a part‑time
    safety‑and‑training specialist position, where he can pass on his hands‑on knowledge to younger workers and champion a culture of continuous improvement. He also dreams of consulting part‑time for small
    local manufacturers, helping them adopt simple, low‑cost efficiency upgrades. On a personal level, Jordan wants to ensure his family’s financial security and leave a modest legacy of safer, more reliable
    production practices.
