  hobbies: '["Watercolor painting", "Abstract art appreciation", "Reading (classic literature, speculative fiction)", "Herb gardening (medicinal plants)", "Puzzle solving (crosswords, Sudoku)", "Acoustic
    music gatherings", "Mindfulness journaling", "Woodworking", "Volunteer health education"]'
  career_goals: Ashley aims to transition into a clinical leadership role within her community, such as Director of Nursing for a regional health clinic, where she can champion telehealth expansion for
    rural Jasper County residents. She is determined to publish research on the integration of expressive arts into nursing care, establishing herself as an innovator at the intersection of science and
    creativity. Mentoring emerging nurse practitioners and developing a boutique integrative health practice that blends evidence‑based medicine with artistic therapeutic modalities are also key ambitions,
    reflecting her competitive drive to pioneer novel care models.
