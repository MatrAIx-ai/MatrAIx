persona_description: A historian who specializes in the study of prehistoric human societies, particularly those of the Neolithic period in Africa. Their research interests include the dietary habits, agricultural
  practices, and cultural innovations of hunter-gatherers during this time period. They are particularly interested in the emergence of cooking and preparing vegetables in clay pots, and the impact of this
  innovation on the development of human societies.
