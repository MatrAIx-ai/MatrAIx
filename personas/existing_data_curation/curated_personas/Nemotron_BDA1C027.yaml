personas:
  professional: Michael Brown is a retail salesperson who leverages expert POS handling, upselling acumen, and conflict‑resolution skills, while their calm, sociable nature and flexible attitude keep the
    store floor friendly and adapt to shifting schedules.
  sports: Michael Brown is a die‑hard fan of the Kentucky Wildcats basketball team, follows the Nashville Predators for hockey, plays pickup basketball at the Fulton gym three times a week, spends weekends
    fishing on the Tennessee River, and joins the local YMCA’s Sunday morning 5K run club when the weather permits.
  arts: Michael Brown strums an acoustic guitar for a weekend band, covering songs by Chris Stapleton, Dolly Parton, and John Prine, while also soaking up live performances at the county fair and binge‑watching
    classic country films starring Gena Rowlands, which fuel their storytelling flair.
  travel: Michael Brown loves spontaneous road trips that blend outdoor adventure with low‑cost stops, having already explored the music scene of Nashville, the historic river towns of Memphis and Paducah,
    and dreaming of a future camping excursion in the Great Smoky Mountains or a beach getaway to the Florida Panhandle.
  culinary: Michael Brown is a proficient home‑cook who perfects smoked pork ribs with a brown‑sugar, apple‑cider‑vinegar glaze, crafts buttermilk fried chicken seasoned with paprika and cayenne, and regularly
    tosses coleslaw with poppy‑seed dressing, while occasionally over‑indulging in late‑night snack chips during retail shifts.
  core: Michael Brown is a calm, sociable retail professional who balances a love for structured store management with a laid‑back habit of spontaneous BBQ experiments and occasional missed schedule details.
background:
  cultural: Michael grew up in Fulton, a small town in western Kentucky, steeped in Southern and Appalachian traditions. He was raised in a working-class family that emphasized practicality, self-reliance,
    and hospitality. Community life revolves around local churches, high-school sports, county fairs, and outdoor activities like hunting and fishing. The cultural fabric includes a love of country music,
    home-cooked meals such as fried chicken and BBQ, and a strong sense of neighborly support. While his background is rooted in these rural Southern values, Michael is also open to contemporary influences
    and enjoys blending them with modern hobbies and career aspirations.
