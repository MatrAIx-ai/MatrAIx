  career_goals: Michael’s career plan combines his desire for clear structure with the flexibility he values. In the near term, he intends to earn his GED and complete a retail-management certificate at
    a nearby community college. He aims to be promoted to assistant manager within the next two years and to become a store manager within three to five years, where he can shape scheduling and staff development
    in a way that balances predictability with team autonomy. Over the longer term, he hopes to leverage his entrepreneurial spirit and community ties to open a small, family-friendly convenience store
    or neighborhood café that serves as a gathering spot for Fulton residents.
