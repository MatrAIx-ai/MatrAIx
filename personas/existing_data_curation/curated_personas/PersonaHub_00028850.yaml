persona_description: A historian who is interested in the history of the Jewish community in Savannah, Georgia, particularly during the American Revolution and the period following the ratification of the
  Treaty between Great Britain and the United States. The individual is knowledgeable about the history of the Mickwa Israel congregation and the contributions of its leaders, such as Mordecai Sheftall.
  They are also interested in the economic and religious prosperity of the community, and the impact of the American Revolution on its growth.
