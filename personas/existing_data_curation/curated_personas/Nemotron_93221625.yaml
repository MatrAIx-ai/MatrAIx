personas:
  professional: Maxwell Jones, a CPA-aspiring senior auditor, merges their advanced financial reporting, SAP-driven audit planning, and Excel modeling prowess with a pragmatic, routine-focused approach
    and an outgoing, competitively driven energy that fuels client relationship building and mentorship of junior staff, and they consistently deliver clear presentations that blend data rigor with personable
    flair.
  sports: Maxwell Jones anchors the forward position for the Keene United adult soccer league, bowls competitively with their Thursday crew at the Keene Lanes, tracks the New England Patriots and Boston
    Bruins, leads family hikes up Mount Monadnock, and they often organize charity runs that blend their love of competition with community service, reflecting their love of team camaraderie, strategic
    play, and seasonal outdoor challenges.
  arts: Maxwell Jones finds artistic respite in the folk-rock sounds of The Avett Brothers and the indie lyricism of Bon Iver, attends regional theater productions featuring the works of Lin-Manuel Miranda,
    relishes exploring visual storytelling at the New Hampshire Art Association, and they channel these inspirations into creative brewing experiments and strategic board-game tactics.
  travel: Maxwell Jones prefers meticulously planned weekend getaways to New England's coastal towns like Portsmouth and Portland, while dreaming of a summer family road trip through the Scottish Highlands—including
    Edinburgh Castle—and they balance their love of adventure with a budget-conscious approach that limits longer international excursions.
  culinary: Maxwell Jones, an avid home brewer, cooks confidently, often pairing their own IPA with beef brisket rubs and beer-braised pork belly, while also mastering New England clam chowder with fresh
    clams and potatoes and savoring farm-to-table salads featuring heirloom tomatoes and arugula, and they enjoy experimenting with seasonal ingredients to refine both flavor and brewing techniques.
  core: Maxwell Jones blends competitive drive with routine-loving pragmatism, channeling their sociable energy into soccer, beer brewing, and meticulous audit work, and they obsessively track their blood
    pressure and budget every spare penny.
background:
  cultural: Maxwell was raised in a traditional New England white American household, with deep ties to the cultural values of self‑reliance, modesty, and civic responsibility that characterize the region.
    His family has generational roots in New Hampshire dating back to early settlers, fostering a respect for local history and community involvement. He grew up attending a Protestant church, which reinforced
    a work‑ethic centered on practicality and service. The confluence of New England's pragmatic sensibility, the emphasis on community participation, and his own competitive, routine‑oriented personality
    shapes his worldview, blending a respect for tradition with a drive for personal achievement.
attributes:
