  hobbies: '[''Adult Soccer League'', ''Weekly Bowling Night'', ''Fantasy Football'', ''Hiking (Mount Monadnock)'', ''Family Camping Trips'', ''Strategy Board Games (Settlers of Catan, Risk)'', ''Volunteer
