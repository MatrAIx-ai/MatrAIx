persona_description: A scientist or researcher studying atmospheric physics, particularly lightning and its phenomena, such as the charge separation within a thunderstorm that leads to lightning. They are
  interested in understanding the physical and electrical processes that occur within thunderstorms and how they contribute to the occurrence of lightning. They are likely to be involved in studying the
  mechanisms of charge separation, the transfer of electrons between ice crystals and graupel, and the resulting electrical discharge that results in lightning. They may also be interested in studying the
  implications of these phenomena for weather forecasting and the potential for human-made lightning strikes.
