personas:
  professional: Linda Fraley, a seasoned sheet‑metal fabricator in commercial construction and ship‑building, leverages two decades of precision welding, CNC plasma cutting, blueprint mastery, and AutoCAD
    design to create functional metal art while mentoring apprentices, and they ambitiously pursue a lead fabricator role and a certified welding instructor credential.
  sports: Linda Fraley, an avid hiker and weekend kayaker, regularly joins the Palmetto Trail Guild for group treks, follows the Charleston Battery soccer matches, tailgates for the RiverDogs baseball games,
    and they maintain a balanced fitness routine that mixes cardio hikes with occasional weight‑lifting in the shop.
  arts: Linda Fraley, a community‑oriented metal sculptor and improvisational dancer, contributes set pieces to the Charleston Stage, strums acoustic guitar at jam sessions featuring The Avett Brothers'
    repertoire, draws inspiration from sculptor Richard Serra and folk musician Gillian Welch, and they spend evenings immersed in speculative fiction by Neil Gaiman.
  travel: Linda Fraley, a mix‑of‑adventure and relaxation traveler, plans trips with detailed itineraries that balance cultural immersion and outdoor exploration, having trekked the Blue Ridge Parkway,
    explored Savannah's historic district, savored tapas in Barcelona, and they dream of kayaking the Norwegian fjords while keeping family commitments and workshop deadlines in mind.
  culinary: Linda Fraley, an experimental home chef, blends coastal‑fusion flavors by preparing shrimp‑and‑grits spiced with Thai basil, low‑country gumbo infused with Moroccan ras el hanout, and fried
    chicken accompanied by kimchi slaw, and they showcase intermediate cooking skills and a love for bold, multicultural ingredients.
  core: Linda Fraley, a charismatic 44‑year‑old fabricator‑artist, juggles metal workshops, jam sessions, and spontaneous board‑game nights, often forgetting to stretch after long welds but they never miss
    a chance to turn a scrap piece of steel into a conversation‑starter sculpture.
background:
  cultural: Linda grew up in a working‑class family in the Charleston metropolitan area, immersed in Southern hospitality and the close‑knit community ethic of Dorchester County. Her upbringing featured
    church gatherings, family barbecues, and frequent exposure to the Lowcountry’s maritime heritage and its eclectic arts scene. While she identifies as white, she has long been influenced by the region’s
    multicultural tapestry, including African‑American musical traditions, coastal cuisine, and the historic ship‑building culture that values skilled craftsmanship. This blend of Southern values, communal
    celebration, and a thriving creative environment shapes her outlook on work, art, and social engagement.
attributes:
  skills: '[''Sheet metal fabrication'', ''Blueprint reading'', ''CNC plasma cutting'', ''MIG/TIG welding'', ''Metal sculpture design'', ''AutoCAD and SketchUp drafting'', ''OSHA safety compliance'', ''Team
    leadership and mentorship'', ''Inventory and logistics management'', ''Creative problem solving'', ''Basic electrical wiring for metal installations'']'
  hobbies: '[''Metal sculpture creation'', ''Community theater set building'', ''Improvisational dance'', ''Group hiking'', ''Acoustic guitar jam sessions'', ''Southern fusion cooking'', ''Attending local
    art festivals'', ''DIY electronics with Arduino'', ''Reading speculative fiction'', ''Board game nights'']'
  career_goals: Linda aims to advance to a lead fabricator or shop supervisor role where she can influence workflow efficiency and safety culture. She plans to earn a certified welding instructor credential
    to teach apprentices and give OSHA training workshops. Over the next five years, she hopes to launch a side studio that creates bespoke metal art installations for local restaurants, event venues, and
    community public‑art projects, blending functional metalwork with her artistic vision. Ultimately, she wants to be recognized as a bridge between industrial craftsmanship and the vibrant Charleston
    arts scene.
