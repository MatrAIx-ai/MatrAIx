  hobbies: '[''hiking'', ''watercolor painting'', ''yoga'', ''group dance classes'', ''board games'', ''cooking'', ''community theater volunteering'', ''art walk participation'', ''photography'', ''mindfulness
    meditation'']'
  career_goals: Jonnie aims to advance from a janitorial role to a supervisory position in facilities management within the next three years. She plans to obtain a certification in Occupational Safety and
    Health Administration (OSHA) and to complete a bachelor’s degree in Facilities Management or Business Administration. Her long‑term ambition is to become a facilities manager for a cultural institution—such
    as a museum, gallery, or community arts center—where she can blend her expertise in building upkeep with her passion for art. She also hopes to start a small consulting business that helps small businesses
    maintain clean, safe, and visually engaging spaces, and to develop a mentorship program for younger workers in her community.
