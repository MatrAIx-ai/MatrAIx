  hobbies: '[''Knitting'', ''Gardening'', ''Crossword puzzles'', ''Historical fiction reading'', ''Jazz and blues listening'', ''Walking in Urbana Arboretum'', ''Cooking soul‑food'', ''Book club participation'',
    ''Volunteer food pantry work'']'
  career_goals: Evana aims to shift into a mentorship‑focused advisory role that leverages her expertise while reducing daily pressures. She plans to launch a part‑time consulting practice that offers financial
    literacy workshops for seniors and minority‑owned small businesses in the Champaign‑Urbana region. A long‑term ambition is to endow a scholarship for Black students pursuing business or finance degrees
    at the University of Illinois. She also seeks to secure a low‑stress, financially stable retirement that allows her to devote time to community service and personal well‑being.
