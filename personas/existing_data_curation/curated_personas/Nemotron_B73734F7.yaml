personas:
  professional: Evana Jones, a seasoned financial specialist with over thirty years of experience in corporate and nonprofit budgeting, risk assessment, and tax planning, channels her practical, structured
    mindset into clear, data‑driven reports and mentorship, while seeking a low‑stress, part‑time advisory role that lets her balance predictability with the flexibility she values.
  sports: Evana Jones enjoys gentle walks through the Urbana Arboretum three times a week, follows the Illinois Fighting Illini basketball team and the Chicago Cubs, and participates in a low‑impact senior
    yoga class at the community center, preferring structured yet low‑intensity activities that align with her desire for routine and predictability.
  arts: Evana Jones finds solace in classic jazz and blues, frequently listening to recordings by John Coltrane, Ella Fitzgerald, and B.B. King while knitting, and she engages in thoughtful discussions
    at her senior book club about historical fiction and biographies of influential leaders, shaping her evenings with a rich cultural soundtrack.
  travel: Evana Jones prefers carefully planned weekend getaways to historic destinations such as Philadelphia’s Independence Hall or a river cruise on the Mississippi, balancing a love of structured itineraries
    with the flexibility to linger over a favorite restaurant, yet she remains mindful of her health and modest budget, limiting trips to the Midwest and occasional visits to family in Chicago.
  culinary: Evana Jones delights in preparing traditional comfort dishes—collard greens simmered with smoked turkey, sweet‑potato casserole, and cornbread—using fresh vegetables from her garden, and she
    enjoys experimenting with spices like smoked paprika and cayenne, though she sometimes forgets to label leftovers, leading to occasional food waste.
  core: Evana Jones blends three decades of meticulous financial expertise with solitary, structured pastimes, navigating late‑life anxiety through disciplined budgeting, gentle exercise, and soulful jazz,
    while embracing community service and occasional indulgences.
background:
  cultural: Born and raised in a tight‑knit African‑American family in the Midwest, Evana grew up immersed in church community life, where service, storytelling, and musical heritage were emphasized. Her
    parents instilled the value of education and financial self‑reliance, guiding her toward a business degree. Living in Urbana, she stays active in the local NAACP chapter, the Black Women’s Alliance
    at the University of Illinois, and participates in citywide Juneteenth celebrations and Kwanzaa gatherings. Her cultural heritage shapes her cooking, music preferences, and dedication to mentoring Black
    youth in financial literacy.
