personas:
  professional: Linh Nguyen, a 28‑year‑old music director and composer, orchestrates classical, contemporary, and electronic works for small ensembles, leveraging expertise in Ableton Live, Logic Pro, and
    traditional instrumentation while embracing a flexible, curiosity‑driven process that often leaves deadlines to the last minute.
  sports: Linh Nguyen runs with the Hoboken Runners Club, avidly follows the New York Knicks in basketball and the New Jersey Devils in hockey, and squeezes in weekend paddle‑boarding on the Hudson, though
    their competitive edge sometimes leads them to replace scheduled yoga sessions with extra practice on a new beat.
  arts: Linh Nguyen immerses themselves in the downtown art scene, attending live jazz at the Blue Note, experimental concerts by artists like Julia Holter and Nils Frahm, snapping urban moments at the
    Whitney Biennial, and volunteering at local arts festivals where they share piano improvisations on analog synths.
  travel: Linh Nguyen craves music‑centric journeys, taking spontaneous flights to the Harbin Ice and Snow Festival and the Sapporo Summer Music Festival, while also fitting quick weekend getaways to New
    Orleans for jazz, Asheville’s mountain retreats for reflection, and the Champlain Valley’s folk fairs, all planned on a flexible, last‑minute basis.
  culinary: Linh Nguyen delights in a fusion of flavors, savoring steaming bowls of pho, crafting banh mi‑inspired avocado toast, experimenting with bánh xèo home‑cooked on a portable stove, and pairing
    craft coffee from Jersey City’s Cafe Grumpy with seasonal cheese plates at farmer’s markets.
  core: Linh Nguyen is a genre‑blending composer whose restless curiosity, anxiety‑fuelled creativity, and love for spontaneous collaboration drive a career of experimental scores, late‑night studio marathons,
    and a habit of leaving paperwork for tomorrow.
background:
  cultural: Linh is a first‑generation Vietnamese American raised in a bilingual household in the New York metropolitan area. Her family maintains traditional customs, such as celebrating Tet and listening
    to Vietnamese folk songs, while also embracing the multicultural vibrancy of Jersey City. This dual cultural lens informs her musical voice, allowing her to merge the melodic contours of ca trù and
    quan họ with contemporary Western compositional techniques. She feels a strong sense of responsibility to represent her heritage in her work and to mentor other Asian‑American musicians navigating similar
    identities.
