  career_goals: Linh aims to establish a signature cross‑cultural ensemble in the New York‑New Jersey area that blends Vietnamese folk motifs with modern orchestral and electronic textures. She plans to
    release a debut concept album within the next three years, secure commissions from regional symphonies, and create a sustainable income through film scoring and commercial work. Long‑term, she envisions
    founding a community arts program that mentors emerging composers, especially from underrepresented backgrounds, and eventually taking on an artistic director role at a local performing arts center.
