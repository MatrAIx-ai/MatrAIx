  hobbies: '[''Drawing with crayons and markers'', ''Storytime listening at the library'', ''Building with wooden blocks'', ''Dancing to Latin music'', ''Exploring backyard nature'', ''Pretend doctor play'',
    ''Watching educational cartoons'', ''Participating in community cultural festivals'', ''Making simple crafts (paper‑mâché, collage)'', ''Collecting leaves and rocks'']'
  career_goals: Sophy dreams of becoming an artist who paints bright pictures that celebrate stories and her Salvadoran heritage. She also imagines herself as a teacher who guides other curious children
    and as an explorer who discovers new things about the world, even picturing a future trip to space to see the Earth from above. Her ambition to help others and her love of creativity shape these early
    aspirations.
