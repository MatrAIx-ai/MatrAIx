personas:
  professional: A curious budding explorer, Sophy Ochoa spends their mornings arranging crayons by hue before freely doodling imaginative worlds, balancing a natural love for organization with spontaneous
    creativity, and often asks a flurry of “why?” questions while occasionally worrying whether their pictures are “good enough.”
  sports: A member of the Little Lions Preschool Soccer team, Sophy Ochoa sprints after the bright orange ball with gusto, proudly wears their team’s blue jersey adorned with stickers, and balances high‑energy
    play with quiet puzzle building sessions when they need a calm break.
  arts: A budding artist, Sophy Ochoa delights in finger‑painting with vivid blues and greens, sings along to Raffi’s “Baby Beluga,” and can recite the chorus of “Let It Go” from Frozen, letting music and
    color fuel their imaginative storytelling.
  travel: A curious little traveler, Sophy Ochoa squealed with delight on a family trip to Santa Monica’s beach, marveling at the tide pools, and now daydreams about holding a tiny Eiffel Tower souvenir
    from Paris to add to their growing collection of travel postcards.
  culinary: A picky yet enthusiastic eater, Sophy Ochoa adores creamy macaroni and cheese, loves dipping apple slices in peanut butter, proudly helps whisk pancake batter with their mother, but stubbornly
    refuses broccoli, insisting it’s “green and scary.”
  core: Sophy Ochoa is a bright‑eyed four‑year‑old whose boundless curiosity fuels artistic doodles, careful savings in a pink piggy bank, and occasional worries that turn snack cravings into tiny meltdowns,
    often prompting them to clutch their beloved stuffed rabbit.
background:
  cultural: Sophy grows up in a Salvadoran household in Hyattsville, MD, where Spanish is spoken alongside English. Her parents keep traditions alive by celebrating Semana Santa, cooking pupusas and tamales,
    and playing cumbia and reggae en Español at home. The family participates in local Salvadoran community gatherings at nearby cultural centers and attends festivals that showcase Salvadoran dances, folklore,
    and music. Living in the diverse Prince George's County, Sophy also experiences a variety of cultures, which broadens her appreciation for art, ideas, and new experiences while reinforcing her strong
    sense of identity rooted in her Salvadoran heritage.
