  career_goals: Antonio aims to turn his practical skills into a modest, family‑run handyman service that serves the Newark neighborhood, allowing him to generate a steady supplemental income while staying
    close to home. He plans to enroll in a GED program and pursue a vocational certification in residential maintenance to formalize his expertise. Long‑term, he hopes to become a trusted mentor for local
    youth, offering workshops on basic home repairs and financial literacy, and to contribute to community improvement projects that celebrate his Mexican heritage.
