persona_description: A public health researcher who studies the impact of copayments on antibiotic resistance in low- and middle-income countries. They are interested in understanding the drivers of antibiotic
  resistance and the role of out-of-pocket health expenditures in promoting overuse of medications in the private sector. They are also interested in the potential consequences of high copayments on the
  global burden of infectious diseases and the need for international collaboration to address this issue.
