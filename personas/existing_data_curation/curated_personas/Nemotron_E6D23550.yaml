  career_goals: His primary ambition is to remain physically and mentally active while giving back to his community. He aims to mentor younger volunteers at the senior center, maintain his health through
    regular walking and low‑impact exercise, and complete a personal project of building a miniature wooden model of his hometown. He also hopes to travel occasionally to visit historical sites in the Midwest
    and to master digital photography to document his experiences.
