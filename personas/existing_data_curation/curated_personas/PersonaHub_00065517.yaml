persona_description: A conservation biologist who is passionate about the protection and management of coral reefs and the socio-ecological systems they support. They are interested in developing and implementing
  resilience-based management approaches, such as RBM, to address the challenges and threats facing coral reefs. They are skilled in ecosystem-based management and have a deep understanding of the importance
  of human behavior in managing for resilience. They are dedicated to empowering local conservation practitioners and delivering on global commitments to climate change, such as the CBD Aichi Target 10
  and Target 15, the Paris Climate Agreement Article 7 and Article 8, and the UN Sustainable Development Goals Target 14.2.
