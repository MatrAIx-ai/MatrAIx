persona_description: A researcher and scientist who specializes in the study of human brain development, particularly the role of brain structure and asymmetry in shaping human behavior and cognitive functions.
  They are particularly interested in the role of LRRTM1, a protein involved in brain development, and how it may contribute to the development of neuropsychiatric disorders. They are also interested in
  environmental factors that may influence human handedness and their impact on brain structure and development.
