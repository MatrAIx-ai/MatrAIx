  hobbies: '[''Basketball (pickup games at community center)'', ''Building LEGO and model kits'', ''Basic bicycle and tool repair'', ''Reading graphic novels and comics'', ''Sketching and doodling'', ''After-school
    robotics club'']'
  career_goals: Deshawn dreams of a career that combines his love of routine, practical problem‑solving, and community service. He aspires to become an automotive technician or electrician, envisioning
    a path that begins with a technical high‑school program and leads to an apprenticeship in Detroit’s auto repair industry. He also expresses interest in joining the city’s fire department in the future,
    valuing the structured, team‑oriented environment and the chance to help others. His short‑term goal is to maintain strong grades, stay involved in his school’s STEM club, and secure a summer internship
    with a local garage.
