personas:
  professional: Jacky Beasley, a budding junior farmer who helps feed chickens, water calves, and harvest vegetables on the family farm, shows remarkable organization in chore checklists, reliable attention
    to detail, and a competitive drive to finish tasks first, reflecting their love of structure and practicality.
  sports: Jacky Beasley plays Pee‑Wee soccer with the Little Lions club, cheers for the Kentucky Wildcats basketball team, and competes in sprint races at the county fair, always aiming to outrun peers
    despite occasional post‑game frustrations.
  arts: Jacky Beasley delights in drawing farm animals while humming Dolly Parton tunes, sings in the Sunday school choir, and watches the Muppets, weaving these artistic moments into daily play and community
    gatherings.
  travel: Jacky Beasley loves structured family road trips to the Great Smoky Mountains and spontaneous outings to the local county fair, dreams of visiting Disney World, and proudly sticks illustrated
    travel stickers on a notebook to catalog each destination.
  culinary: Jacky Beasley favors buttery biscuits, chicken‑and‑dumplings, apple pie, can assemble a perfect peanut‑butter‑and‑jelly sandwich, and often leaves a trail of crumbs in the kitchen, reflecting
    an enthusiastic yet messy cooking style.
  core: Jacky Beasley, a five‑year‑old farm‑helper with a competitive edge, meticulous allowance routine, love for country music, and a habit of leaving crumb trails, navigates life with structure, occasional
    skepticism, and boundless curiosity.
background:
  cultural: Jacky is raised in a close-knit rural community in western Kentucky. Her family places value on modesty, church participation, and community gatherings such as Sunday school, potluck meals,
    and the county fair. Local traditions include outdoor play, helping on family farms, and involvement in youth programs like 4-H. This environment provides a practical, community-oriented backdrop that
    shapes her everyday experiences.
