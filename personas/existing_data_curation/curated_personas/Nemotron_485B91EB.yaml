    in preschool group activities'', ''Collecting stickers'', ''Exploring nature (collecting leaves and rocks)'']'
  career_goals: Jacky often talks about growing up to be a teacher because she loves creating organized classrooms where everyone knows what to do. She also imagines caring for animals as a veterinarian,
    seeing it as a way to use her practical skills and help living things. Both ideas reflect her desire for structure, responsibility, and achieving clear goals.
