persona_description: A Latin@ peer youth educator from Casa de Esperanza who specializes in engaging Latin@ youth in preventing and intervening in teen dating violence. They have extensive experience in
  working with Latin@ youth and understand the unique challenges they face, including navigating between their parents' values and culture and the pressure of assimilating to mainstream culture. They are
  passionate about providing culturally specific prevention and intervention strategies to effectively engage Latin@ youth in responding to teen dating violence.
