  career_goals: Having retired from full‑time work, Jose Carlos aims to stay financially secure while giving back to his community. He hopes to mentor younger entrepreneurs through a local small‑business
    incubator, offering practical advice drawn from his years of hands‑on experience. He also dreams of launching a modest consulting side‑practice, providing budget reviews for nearby family‑run stores
    on a part‑time basis. Maintaining a predictable routine and a steady supplemental income are central to his sense of stability and purpose.
