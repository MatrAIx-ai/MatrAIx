  hobbies: '[''Gardening'', ''Crocheting'', ''Quilting'', ''Reading (historical fiction, mystery)'', ''Walking with dog'', ''Genealogy research'', ''Attending community theater'']'
  career_goals: Judith aims to transition into a mentorship role within her company, guiding newer representatives and leading onboarding training sessions. She seeks to deepen her technical proficiency
    with emerging customer support tools and to eventually move into a part‑time advisory consultant position as she approaches retirement. Additionally, she is interested in volunteering for community
    outreach programs that help seniors navigate digital services and improve their online experiences.
