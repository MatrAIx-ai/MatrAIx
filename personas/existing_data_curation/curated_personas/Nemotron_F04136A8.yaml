personas:
  professional: Maria Molina, a 42‑year‑old STEM tutor and emerging curriculum developer, leverages bilingual fluency, data‑driven assessment design, and educational technology to craft flexible, culturally
    responsive lesson plans, while their organized yet adaptable work style and gentle assertiveness keep small‑group workshops on track.
  sports: Maria Molina, an avid hiker of local nature reserves and a member of a weekend walking club, follows the Boston Red Sox and the New England Patriots, squeezes in morning jogs along the Charles
    River, and occasionally attends local pick‑up soccer games with a small group of fellow educators.
  arts: Maria Molina, who finds solace in the rhythms of salsa and plena while cooking, enjoys listening to artists like Celia Cruz and Rubén Blades, reads science‑fiction works by Isaac Asimov and Octavia
    Butler, attends community theater productions featuring plays by Lin‑Manuel Miranda, and occasionally sketches botanical illustrations of herbs from their garden.
  travel: Maria Molina, who prefers thoughtfully planned, low‑key trips, has explored the historic streets of Boston, the misty cliffs of the White Mountains, the vibrant markets of Oaxaca, and the serene
    temples of Kyoto, and dreams of a quiet retreat in the Tuscan countryside that balances cultural immersion with opportunities for garden‑inspired photography.
  culinary: Maria Molina, an enthusiastic home chef, blends garden‑fresh herbs like cilantro, oregano, and rosemary into island‑inspired dishes such as plantain‑based mofongo, sofrito‑rich arroz con pollo,
    and ginger‑pepper fish tacos, experiments with spice combinations while maintaining modest confidence in their cooking, though they sometimes over‑salt a sauce when trying new recipes.
  core: Maria Molina, a detail‑oriented yet flexible STEM educator, balances a methodical love of data with spontaneous garden experiments, occasional spice‑over‑seasoning, and a quiet, resilient spirit
    that thrives in small‑group learning circles.
background:
  cultural: Maria was raised in a Puerto Rican household where family gatherings, music, and traditional cuisine were central to daily life. She carries the island's values of community, perseverance, and
    respect for elders into her work, often incorporating bilingual communication to support Spanish‑speaking families in Attleboro. While fully integrated into the New England environment, she maintains
    strong ties to her heritage through holiday celebrations, cooking dishes like arroz con gandules, and participating in local Puerto Rican cultural events, using these experiences to enrich her tutoring
    approach and foster cultural pride among her students.
attributes:
  skills: '["Mathematics tutoring (Algebra, Calculus, Statistics)", "Physics instruction (Mechanics, Electricity & Magnetism)", "Curriculum design for K-12 STEM programs", "Educational technology integration
    (LMS, virtual classrooms)", "Assessment creation and data analysis", "Bilingual communication (English-Spanish) for immigrant families", "Individualized learning plan development", "Project management
    and scheduling", "Mentoring and coaching students", "Professional development workshop facilitation"]'
  hobbies: '["Reading scientific literature and popular science books", "Gardening and growing herbs", "Cooking Puerto Rican cuisine", "Walking and hiking in local nature trails", "Participating in small
    book clubs focused on STEM topics", "Volunteering as a mentor for underrepresented students", "Practicing yoga and meditation", "Listening to salsa and plena music", "DIY home improvement projects"]'
  career_goals: Maria aims to expand her impact beyond one‑on‑one tutoring by leading curriculum development for a regional STEM outreach program targeting underrepresented youth. She plans to pursue a
    master's in Educational Technology to deepen her expertise in digital pedagogy, and eventually launch a community‑based tutoring center that blends rigorous STEM instruction with culturally responsive
    teaching. Balancing professional growth with her family life, Maria also seeks to mentor aspiring Latina educators, fostering a supportive network that bridges her Puerto Rican heritage with her New
    England community.
