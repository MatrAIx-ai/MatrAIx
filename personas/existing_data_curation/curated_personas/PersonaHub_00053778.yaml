persona_description: A scientist or researcher who is interested in the study of hard tissues of organisms, particularly those of mollusks and corals, and how they can be used to infer information about
  the age and environment of the organism. This person may be a paleontologist, a biologist, or a geologist. They are likely to be interested in dendrochronology, the study of annual rings in trees, as
  it is analogous to sclerochronology. They may also be interested in the field of biochronology, which studies the fossil record of organisms to infer their life histories and environmental conditions.
