  career_goals: Although retired from formal employment, Edwin aims to leave a lasting impact on his community by establishing a sustainable bilingual arts program that pairs senior artists with youth in
    local schools. He hopes to author a memoir that weaves his Argentine roots with his experiences in American education, using it as a teaching tool for cultural empathy. Additionally, he seeks to serve
    on the Bucks County Board of Education advisory panel to advocate for inclusive curricula and to mentor emerging teachers through a senior‑teacher fellowship he plans to launch. His competitive streak
    drives him to organize an annual inter‑generational art competition that showcases both traditional Argentine crafts and contemporary American art forms.
