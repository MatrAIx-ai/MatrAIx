  career_goals: Maileen is exploring career paths that fuse her interest in technology with a desire to help others. She hopes to attend a community college to study information technology or computer science,
    aiming long‑term to become a software developer who creates tools for mental‑health support. She also contemplates a role in counseling or social work, valuing a stable, people‑focused profession that
    lets her apply her compassion and practical mindset.
