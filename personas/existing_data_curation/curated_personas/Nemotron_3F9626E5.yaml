personas:
  professional: Maileen Boggs is a high‑school junior who blends self‑taught Python scripting with meticulous calendar management to prototype mental‑health support tools, reflecting her balanced curiosity
    for technology and compassion‑driven career ambitions.
  sports: Maileen Boggs spends weekends hiking the wooded trails around New Albany, often photographing native birds for a local nature club, while cheering on the Cincinnati Bengals on Sundays and occasionally
    joining the school’s cross‑country team for light competition.
  arts: Maileen Boggs nurtures her creative side by sketching character concepts for her short stories, devouring graphic novels like ‘Saga’, listening to the ambient piano works of Ólafur Arnalds, and
    attending community theater performances of Shakespearean plays, all of which fuel her imaginative storytelling.
  travel: Maileen Boggs prefers low‑key road trips, having explored Chicago’s museums and the historic streets of Washington, D.C., while dreaming of a future backpacking adventure through Japan’s cherry‑blossom
    season and a summer hike in the Great Smoky Mountains.
  culinary: Maileen Boggs balances her love of science with a sweet tooth, often experimenting with sourdough starter, perfecting chocolate‑chip cookies and lemon‑blueberry muffins, and adding a pinch of
    sea‑salt caramel to her cream‑cheese frosting for that extra scientific twist.
  core: Maileen Boggs is a meticulously organized teen who channels her curiosity for tech and art into coding mental‑health tools, yet wrestles with persistent anxiety that drives both her productivity
    rituals and occasional over‑spending on gaming comforts.
background:
  cultural: Maileen grew up in New Albany, Ohio, a suburban community known for its planned neighborhoods, strong emphasis on education, and active civic involvement. Her white Midwestern background includes
    participation in local church activities, community service projects, and cheering for Ohio State sports. The region’s values of reliability, modesty, and community support shape her outlook, while
    the proximity to Columbus offers exposure to diverse cultural events and technology opportunities.
