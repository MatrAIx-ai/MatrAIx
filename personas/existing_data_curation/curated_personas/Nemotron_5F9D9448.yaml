personas:
  professional: Nicholas Barnard is a mechanical and industrial engineer who leverages expert SolidWorks and PLC programming skills to design lean, art‑infused public installations, applying their methodical,
    curiosity‑driven approach and reliable project execution to bridge functionality with aesthetic appeal.
  sports: Nicholas Barnard is a dedicated runner who joins the Kankakee Trail Runners club for sunrise jogs, cheers on the Chicago Cubs in baseball season, follows the Chicago Bears for football, and incorporates
    weekend cycling on the Kankakee River Trail as part of his disciplined fitness routine.
  arts: Nicholas Barnard immerses himself in contemporary art by sketching Chicago’s skyline, attending installations by James Turrell, collecting limited‑edition prints from Banksy, and supporting the
    Kankakee Community Theatre’s productions of plays like “A Streetcar Named Desire,” allowing his engineering precision to mingle with artistic inspiration.
  travel: Nicholas Barnard plans his trips meticulously in a bullet‑journal, favoring weekend road trips to Midwestern gems like Door County and the Amish Country of Lancaster while dreaming of a summer
    adventure in Iceland’s geothermal landscapes, balancing modest travel budgets with occasional splurges on boutique hostels for immersive cultural experiences.
  culinary: Nicholas Barnard enjoys cooking farm‑to‑table meals, often preparing a smoked pork shoulder with a dry rub of smoked paprika and local honey, pairing it with a side of heirloom tomato salad
    drizzled with basil‑infused olive oil, while also indulging in a perfectly crisp apple‑cinnamon galette at the local farmer’s market bistro.
  core: Nicholas Barnard balances a razor‑sharp engineering mind with a restless artistic curiosity, yet habitually forgets to water his houseplants while obsessively updating his bullet‑journal for every
    project.
background:
  cultural: Nicholas grew up in the small-city environment of Kankakee, Illinois, where Midwestern values of hard work, humility, and community stewardship are deeply ingrained. His family's heritage traces
    back to German and Irish immigrants who settled in the region during the early 20th century, bringing a blend of cultural traditions that include seasonal festivals, farm-to-table cooking, and an appreciation
    for pragmatic craftsmanship. The local culture—characterized by modesty, a strong sense of neighborliness, and a practical approach to problem-solving—has shaped his reliable and organized nature. While
    he respects these roots, his curiosity drives him to seek out diverse artistic experiences, from regional theater productions to contemporary installations, reflecting a balance between traditional
    Midwestern sensibilities and a desire for innovative, unconventional thinking.
attributes:
  skills: '[''Mechanical design'', ''SolidWorks CAD'', ''AutoCAD drafting'', ''PLC programming (Allen-Bradley, Siemens)'', ''Python for data analysis'', ''Excel modeling'', ''Lean manufacturing'', ''Troubleshooting
    complex systems'', ''Technical writing'', ''Quality assurance'', ''Structural analysis basics'']'
  hobbies: '[''Visiting art galleries'', ''Sketching urban landscapes'', ''Arduino/Raspberry Pi projects'', ''DIY electronics'', ''Hiking and nature photography'', ''Maker-space participation'', ''Reading
    science-fiction'', ''Bullet-journaling'', ''Attending engineering meet-ups'']'
  career_goals: Nicholas aims to earn a professional engineering license within the next three years while completing an associate degree in engineering technology. He envisions advancing to a senior engineer
    role where he can lead multidisciplinary projects that integrate functional design with aesthetic considerations, such as public installations or sustainable infrastructure in the Kankakee region. In
    the longer term, he hopes to launch his own consulting firm that advises midsize manufacturers on process optimization and environmentally responsible design, and to become a recognized speaker at industry
    conferences on the fusion of art and engineering.
