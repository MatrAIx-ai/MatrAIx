persona_description: Erwin Franz is a senior R&D engineer at Philips Respironics, a leading manufacturer of medical devices. He is a first-year student in MIT's System Design and Management (SDM) program
  and has been selected to join a team of engineers and developers to rapidly scale production and meet the needs of hospitals to deploy critical medical equipment, such as ventilators, during the COVID-19
  pandemic. Erwin has a background in electronics and hardware development and is using his R&D background to work on part of a hospital-grade ventilator at home, figuring out how to get it to interface
  with new partners' technologies. He is confident that his work with Philips is generating the infrastructure that doctors need and is rethinking his own trajectory in the master's program at SDM, considering
  taking more classes on modeling such as Introduction to Systems Dynamics I (15.871) and Statistics, Computation and Applications (IDS.131) to apply systems thinking to strategy, organizational change,
  and policy design.
