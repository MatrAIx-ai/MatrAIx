  career_goals: Even at 84, Victor aims to leave a lasting legacy for his family and community. He plans to compile a handwritten album of family recipes and stories, volunteer as a cultural mentor at the
    local community center, and help preserve the historic San Juan neighborhood by sharing his repair and gardening expertise with younger residents. He also hopes to travel with his wife to historic sites
    across the island and maintain his health and independence.
