persona_description: 'A scientist or engineer who specializes in nanotechnology, specifically in the field of nanoparticle printing. They are interested in developing new printing processes that enable
  the precise and accurate placement of nanoparticles, with the goal of controlling the growth and properties of nanoscale devices. They have expertise in materials science, surface science, and nanotechnology,
  and are skilled in designing and building nanoparticle templates. They have experience in the development of high-resolution particle printing techniques and have demonstrated control over three key aspects:
  accurate assembly of the nanocrystals, control of the particle transport towards the assembly sites on the template, and tuning of particle adhesion for an efficient transfer. They have successfully demonstrated
  their control over the placement of catalytic seed particles for the growth of semiconductor nanowires, which is one of the great challenges in nanoelectronics applications.'
