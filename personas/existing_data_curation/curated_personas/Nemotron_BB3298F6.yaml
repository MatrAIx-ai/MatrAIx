personas:
  professional: Craig Beaver, a veteran middle‑school teacher and instructional designer, leverages his love of curiosity and practicality to craft data‑driven lesson plans, integrates Google Classroom
    and interactive whiteboards, and uses his talkative, competitive edge to lead engaging staff development workshops and district teaching contests.
  sports: Craig Beaver, a regular at the West Des Moines Rec Center, joins pickup basketball games for the Thursday night league, avidly follows the Iowa Hawkeyes men’s basketball and the Des Moines Menace
    soccer team, and seasons his fitness regimen with weekend fishing trips to Saylorville Lake.
  arts: Craig Beaver, a devoted improv performer at the West Des Moines Community Theatre, draws inspiration from Amy Poehler’s sketch work, quotes lines from the TV series "The Office" in everyday conversation,
    and devours mystery novels by James Patterson while mentoring fellow toastmasters on stage presence.
  travel: Craig Beaver prefers structured weekend getaways, often hiking the Loess Hills or casting lines at Lake Okoboji, but his long‑term dream is a meticulously planned two‑week tour of New Zealand’s
    South Island to combine trekking and craft‑beer tasting, budgeting each stop in his travel app.
  culinary: Craig Beaver, a self‑taught grill master, perfects Texas‑style brisket with a dry rub of smoked paprika, brown sugar, and coffee grounds, brews his own hoppy IPA to marinate fish tacos, and
    regularly hosts backyard barbecues where he experiments with smoked jalapeño salsa and artisanal cheddar.
  core: Craig Beaver is a competitive, sociable educator who can’t resist a good mystery novel, a perfectly smoked steak, or an improv spotlight, yet he often battles spreadsheet overload and a lingering
    habit of checking the grill temperature too often.
background:
  cultural: Craig is a white Midwestern American who grew up in a small Iowa farming community. His upbringing emphasized hard work, modesty, and strong neighborly ties. He identifies with the values of
    Midwestern hospitality, practical problem‑solving, and community service. While he respects local Protestant traditions common in the region, his cultural identity centers on secular civic engagement—participating
    in local schools, churches, and neighborhood events. This background informs his collaborative yet competitive spirit and his dedication to fostering inclusive, community‑focused learning environments.
attributes:
  skills: '[''Instructional Design'', ''Curriculum Development'', ''Classroom Management'', ''Educational Technology Integration'', ''Assessment Design'', ''Data‑Driven Decision Making'', ''Public Speaking'',
    ''Teacher Mentorship'', ''Community Outreach'', ''Competitive Teaching Awards Participation'']'
  hobbies: '[''Improv Comedy'', ''Pickup Basketball'', ''Toastmasters Club'', ''Hiking'', ''Fishing'', ''Home Brewing'', ''Reading Mystery Novels'', ''Grilling'', ''Food Bank Volunteering'']'
  career_goals: Craig aims to progress from classroom teacher to a district‑level instructional leader. Over the next five years, he plans to earn a master’s degree in Educational Leadership, become a curriculum
    coordinator, and eventually serve as a school principal. He is passionate about launching a multidisciplinary STEM program in his school, publishing articles on innovative teaching practices in education
    journals, and speaking at regional conferences. Craig also hopes to be recognized with state teaching awards and to mentor a cohort of emerging educators through a formal mentorship program.
