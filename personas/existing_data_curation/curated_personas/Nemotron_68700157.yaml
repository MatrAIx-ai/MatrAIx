  hobbies: '["Herb gardening", "Canning and preserving produce", "Quilting", "Birdwatching", "Reading historical biographies", "Genealogy research", "Playing bridge", "Volunteering at animal shelter"]'
  career_goals: As she approaches the later stage of her career, Elizabeth aims to transition into a mentorship‑focused role, establishing a structured apprenticeship program for recent veterinary graduates
    in Oklahoma County. She plans to spearhead a regional preventive health initiative for livestock that integrates data analytics with on‑farm consultations. Over the next five years, she hopes to author
    a field guide on prairie‑based animal health practices, launch a scholarship for students from rural backgrounds pursuing veterinary medicine, and continue volunteering her expertise for local animal
    shelters while scaling back her clinical hours to part‑time consulting.
