  career_goals: Faiz aspires to turn his technical interests into a career that offers structure, stability, and the possibility of remote work. He aims to pursue a degree in computer science or software
    engineering, hoping to become a software developer who can design and maintain applications with clear logical architecture. He is also intrigued by the idea of combining technology with the outdoors,
    such as developing software tools for wildlife monitoring or environmental data analysis. Over the next decade, he envisions enrolling in a technical college or university, obtaining certifications
    in programming and network security, and eventually securing a position as a remote developer or a tech consultant for environmental agencies. He values career paths that allow independent work while
    providing a reliable income, reducing his stress about future uncertainties.
