persona_description: Katie Parsons, a researcher and educational expert who conducted a study on parental attitudes towards learning outdoors, particularly in the early years. She is interested in exploring
  the disconnect between parents' perceptions of outdoor play and the value of these spaces to the learning and development of their children. Katie is passionate about ensuring that children have access
  to the outdoor environment as a learning space and is committed to promoting research and sharing her findings to encourage others to publish their own research.
