  career_goals: Rhonda dreams of a future where she can combine her love for art and science. In the short term she aims to win her school’s science fair, earn a place in a competitive summer art camp,
    and build a portfolio of digital concepts. Long‑term, she aspires to become a concept artist for video games or scientific visualizations, a robotics designer, or a STEM educator who inspires other
    curious kids. She envisions studying at a university that encourages interdisciplinary projects and eventually leading innovative design teams.
