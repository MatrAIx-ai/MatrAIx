personas:
  professional: A budding robotics and digital illustration enthusiast named Rhonda Long merges methodical LEGO Mindstorms programming with vibrant tablet drawing to prototype interactive story experiences,
    showcasing her organized, curious, and competitive drive.
  sports: A soccer-enthusiast named Rhonda Long plays forward for the local Canyon United Soccer Club, roots for the Sacramento Republic FC and the San Francisco Giants, and spends afternoons sprinting
    on the trails by the Sacramento River, reflecting her competitive yet sociable nature.
  arts: A budding visual storyteller named Rhonda Long fills sketchbooks with fantasy scenes inspired by Studio Ghibli, syncs her digital art sessions to Taylor Swift’s pop anthems, and rehearses dramatic
    monologues from school plays derived from classic fantasy novels, weaving her imaginative curiosity into everyday creativity.
  travel: A weekend adventurer named Rhonda Long loves spontaneous road trips to Yosemite National Park and the coastal trails of Point Reyes, dreams of exploring the neon streets of Tokyo and the geysers
    of Iceland, and plans each outing with a doodle map and a checklist of must-see landmarks.
  culinary: A budding home chef named Rhonda Long whips up cheesy macaroni, sprinkles pepperoni on pizza, and experiments with avocado toast, savoring fresh basil and mozzarella while mastering the art
    of mixing chocolate chips into cookie dough during after-school cooking sessions.
  core: Rhonda Long, an imaginative 11-year-old with a competitive edge, balances meticulous LEGO robotics projects, a secret stash of comic books, and a habit of doodling battle plans on every spare piece
    of paper.
background:
  cultural: Rhonda comes from a white, middle‑class family with mixed German and Irish ancestry, raised in the suburban community of Vacaville, California. Her family values education, community involvement,
    and outdoor recreation, often taking weekend trips to the nearby Sacramento River and regional parks. Growing up in the diverse cultural landscape of the Bay Area’s periphery, she has been exposed to
    a variety of cultural festivals, sustainability initiatives, and multicultural viewpoints, which shape her open‑minded yet competitive outlook.
