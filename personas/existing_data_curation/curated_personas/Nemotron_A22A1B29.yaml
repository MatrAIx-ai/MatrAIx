personas:
  professional: Frank Myers is a 19-year-old aspiring visual content creator who blends street-photography, graphic design, and community-driven curation, leveraging their curiosity and competitive edge
    to lead informal art workshops while battling a habit of procrastination and stress-induced bursts of productivity.
  sports: Frank Myers follows the St. Louis Cardinals in baseball, cheers for the St. Louis Blues in hockey, and occasionally joins casual pick-up basketball games at the local community center, preferring
    spontaneous weekend jogs over regimented gym routines, though their competitive streak sometimes leads to over-exertion and missed recovery days.
  arts: Frank Myers immerses themselves in St. Louis's mural culture while sketching coffee-shop scenes, draws inspiration from street artists like Shepard Fairey, listens to jazz greats such as Miles Davis
    at Blueberry Hill and indie acts like The Nightlands, and devotes weekends to improv comedy workshops that fuel their love for spontaneous performance.
  travel: Frank Myers favors spontaneous weekend trips, often hopping on a train to explore the murals of Detroit, the craft beer scene of Portland, or the historic jazz clubs of New Orleans, while dreaming
    of a month-long street-art tour through Berlin and the alleys of Lisbon, balancing their limited student budget with a penchant for affordable hostels and couch-surfing.
  culinary: Frank Myers enjoys devouring St. Louis-style barbecue ribs, shrimp po' boys, and deep-dish pizza, experiments with making their own espresso-infused vanilla latte at home, yet their culinary
    skill caps at a respectable fried egg and avocado toast, though they relish pairing meals with craft IPA selections from local breweries.
  core: Frank Myers is a curiosity-driven, socially magnetic 19-year-old who oscillates between artistic bursts and procrastination, channeling competitive nerves into creative projects while wrestling
    with stress-induced overthinking and an occasional inability to keep a tidy schedule.
background:
  cultural: Frank grew up in a middle‑class, mixed‑European (predominantly German‑Irish) family in the urban core of St. Louis, Missouri. The city’s rich musical heritage—blues, jazz, and a thriving indie
    scene—combined with its vibrant mural culture and annual festivals have shaped his artistic sensibilities. While his household emphasized traditional Midwestern values of community, self‑reliance, and
    modesty, his exposure to the city’s diverse neighborhoods and university environment has broadened his worldview, fostering openness to unconventional ideas and multicultural expression.
