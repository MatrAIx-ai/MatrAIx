  hobbies: '[''photography'', ''street art exploration'', ''live music attendance'', ''board game nights'', ''improv comedy'', ''sketching'', ''creative writing'', ''volunteering at youth art workshops'',
    ''guitar playing'', ''urban hiking in St. Louis'']'
  career_goals: Frank aims to turn his passion for art and community into a sustainable creative career. In the next few years he hopes to build a strong portfolio of photography and graphic design that
    will enable him to secure freelance work and eventually land a role as a content curator or social media strategist for a progressive arts organization in St. Louis. He also dreams of launching a pop‑up
    gallery that showcases emerging local talent, giving him a platform to experiment with unconventional programming. While his competitive nature drives him to be recognized as a leading voice among his
    peers, he remains mindful of his tendency toward stress and plans to develop healthier work‑life boundaries.
