  hobbies: '[''Building blocks'', ''Coloring and drawing'', ''Singing favorite songs'', ''Improvisational dancing'', ''Pretend play with dolls or stuffed animals'', ''Collecting leaves and stones'', ''Visiting
    farm animals'', ''Simple jigsaw puzzles'', ''Storytime at the local library'', ''Participating in community fairs and picnics'']'
  career_goals: In her imaginative world Summer dreams of becoming a veterinarian who cares for the farm animals she loves, a preschool teacher who leads lively storytimes, and a community event organizer
    who helps plan the town's fairs and market days. She also enjoys pretending to be a dancer who can make up moves on the spot. These aspirations blend her curiosity about living things with a practical
    desire to help others in her hometown.
