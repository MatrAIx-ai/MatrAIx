personas:
  professional: Summer Montoya is a budding mini‑engineer who spends afternoons turning building‑block creations into practical problem‑solving experiments, blending relentless curiosity with a surprisingly
    practical knack for organizing parts, even as they impulsively rearrange the setup for the fun of it.
  sports: Summer Montoya darts around the neighborhood park playing soccer with the Tiny Turtles Kids’ Soccer Club and splashing in the community pool during swim time, while they cheer loudly for the local
    minor‑league baseball team, the River City Rookies, in every televised game.
  arts: Summer Montoya delights in finger‑painting with bright crayons, dancing along to Raffi’s "Baby Beluga," and reenacting favorite scenes from the Sesame Street series, often inviting friends over
    for impromptu pretend‑theater productions where they star as the lead.
  travel: Summer Montoya has already visited Disneyland Resort, chased waves at a sunny beach town in Florida, and picnicked beside the towering red rocks of Sedona, dreaming of an upcoming family trip
    to the snowy slopes of a nearby mountain resort where they hope to build a snowman.
  culinary: Summer Montoya savors creamy macaroni and cheese, crunchy chicken nuggets, and fresh strawberry slices with a swirl of whipped cream, proudly stirring the pancake batter with a wooden spoon,
    yet stubbornly refusing peas, insisting they’re "tiny green monsters".
  core: Summer Montoya is a curious, calm, and sociable four‑year‑old who turns play‑time into miniature adventures, balancing imagination with a surprisingly practical outlook while never losing their
    easygoing grin.
background:
  cultural: Summer is raised in Shipshewana, Indiana, a small Midwestern town known for its close ties to Amish country and its annual agricultural fairs. Her family identifies as White and carries the
    Montoya surname, reflecting a blend of European-American and Hispanic ancestry, though English is the primary language spoken at home. She experiences mainstream American traditions such as Thanksgiving,
    Fourth of July, and Halloween, alongside local customs like the Amish Country Farm and Flea Market, church gatherings, and community picnics. The rural setting fosters an early appreciation for nature,
    farm life, and neighborly cooperation, shaping her calm and resilient demeanor. Occasionally, Spanish words from extended relatives add a subtle multicultural layer to her upbringing.
attributes:
  skills: '[''Letter recognition'', ''Counting to 20'', ''Fine-motor craft skills'', ''Building block construction'', ''Cooperative play'', ''Conflict mediation'', ''Animal identification'', ''Storytelling'',
