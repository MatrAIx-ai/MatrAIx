  career_goals: Emelda plans to shift from full‑time floor nursing to a part‑time clinical preceptor role within the next 12‑18 months, aiming to obtain Certified Nurse Educator (CNE) and Gerontological
    Nursing Specialty Certification. She also aspires to lead a quality improvement initiative focused on reducing medication errors in her unit, leveraging her competitive nature to achieve measurable
    outcomes. Long‑term, she is considering a supervisory position that would allow her to influence staffing and patient care standards while maintaining a predictable schedule.
