  hobbies: '[''Block stacking'', ''Jigsaw puzzles'', ''Picture books about marine life and space'', ''Shell collecting at the beach'', ''Listening to classical music'', ''Introductory calligraphy practice'']'
  career_goals: Although still a toddler, Tu is already expressing a fascination with how things work. She often asks her parents why bridges stand and what makes boats float, hinting at an early ambition
    to become an engineer or a marine biologist. Her practical side leads her to set tiny, achievable goals, such as mastering the alphabet, building taller block towers, and learning to write her name,
    all stepping stones toward a future career in designing structures or studying the Gulf Coast ecosystem.
