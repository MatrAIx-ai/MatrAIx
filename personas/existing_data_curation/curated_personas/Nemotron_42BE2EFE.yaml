personas:
  professional: Janet King, a kindergarten class monitor who loves making daily schedules and leading morning circles, brings her love of structure, reliability, and talkative confidence to help teachers
    keep the classroom predictable and engaging.
  sports: Janet King, an enthusiastic member of the Papillion community soccer team who cheers for the Nebraska Cornhuskers football and the Omaha Storm women's basketball during family TV nights, spends
    her afternoons sprinting across the school playground and practicing dribbling drills at the local recreation center.
  arts: Janet King, a budding fan of The Wiggles and Disney sing-along videos, spends weekends drawing bright pictures of farm animals, dressing up for the library’s story-time puppet shows, and proudly
    displays a homemade glitter crown inspired by a favorite Paw Patrol episode.
  travel: Janet King, a curious explorer who loves family road trips to the Omaha Henry Doorly Zoo, the Nebraska State Fair, and seasonal weekend visits to the Sandhills, plans each outing with a crayon-drawn
    map and insists on packing extra snacks for the journey.
  culinary: Janet King, a selective yet adventurous eater who adores cheese-filled macaroni, chicken nuggets with honey mustard, and sweet corn on the cob, enjoys helping her mom melt cheddar for homemade
    grilled cheese, and always requests a drizzle of ketchup on her fries.
  core: Janet King blends a love for orderly routines with boundless chatter, worries about little mishaps, and turns every playground game, snack, and storytime into a meticulously planned adventure.
background:
  cultural: Janet grows up in a middle‑class white family in Papillion, a suburban community in the Omaha metropolitan area of Nebraska. The local culture emphasizes Midwestern values such as neighborly
    friendliness, community involvement, and participation in school and extracurricular activities. Her family likely celebrates American holidays like Thanksgiving and Christmas, attends community events
    such as the county fair and library story times, and values polite behavior, education, and outdoor play. This environment blends suburban comfort with open spaces, fostering a sense of safety, routine,
    and social engagement.
