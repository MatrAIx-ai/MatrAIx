  career_goals: Cesar envisions a future where he can blend his desire to help others with his interest in technology and health. He aims to earn a high school diploma with a strong focus on science and
    mathematics, join the school’s robotics club, and secure a summer internship at a local health clinic. Long‑term, he hopes to pursue a degree in public health or nursing, becoming a community health
    worker who designs health‑education programs for underserved neighborhoods. He also dreams of launching a youth mentorship initiative that combines tech workshops with cultural activities, giving Puerto
    Rican youth in Indiana a supportive network.
