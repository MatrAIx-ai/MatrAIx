  career_goals: Will aspires to turn his love for visual storytelling into a career as a multimedia artist or concept designer for video games and independent films. He hopes to earn a scholarship to a
    community college art program, build a portfolio of digital and street‑art commissions, and eventually launch an online shop selling prints and custom designs. Long‑term, he dreams of using his art
    to uplift his neighborhood—creating murals that celebrate local history and inspire youth—while maintaining the freedom to explore unconventional ideas.
