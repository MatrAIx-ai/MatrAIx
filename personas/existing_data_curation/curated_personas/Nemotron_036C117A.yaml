personas:
  professional: Will Whitfield is a self‑taught teenage visual storyteller who merges hand‑drawn urban sketches with digital illustration and basic Python‑driven interactive art, using free graphic‑design
    software to craft concept art for indie video games and short video narratives, while their curious, open‑minded yet spontaneously disorganized nature forces them to rely on calm resilience and last‑minute
    bursts of creativity to meet school and freelance deadlines.
  sports: Will Whitfield spends weekends at the Barstow Skate Club shredding ramps in the style of Nyjah Huston, follows the LA Lakers for basketball inspiration, and occasionally joins a local intramural
    soccer pick‑up, preferring fluid, self‑directed sessions over structured training regimens.
  arts: Will Whitfield draws artistic fuel from street‑artist Shepard Fairey’s bold murals, Kendrick Lamar’s lyrical storytelling, Miles Davis’s spacious jazz, lo‑fi beats by J Dilla, and graphic novels
    like Saga and Maus, channeling these eclectic influences into their own digital collages, sketchbooks, and community mural projects that double as visual dialogues across cultural lines.
  travel: Will Whitfield cherishes spontaneous desert road trips—already catching sunrise at Joshua Tree and camping near the Grand Canyon—while dreaming of a low‑budget art pilgrimage to Santa Fe’s galleries
    and a Manhattan museum crawl, preferring loosely sketched itineraries that leave room for impromptu sketch‑sessions at unexpected locales.
  culinary: Will Whitfield enjoys the smoky kick of chipotle‑marinated BBQ ribs, the comforting spice of Cajun jambalaya, and the vibrant flavors of tacos al pastor topped with fresh cilantro and lime,
    often attempting to recreate them in a modest home kitchen where their relatively decent cooking chops are balanced by a habit of over‑seasoning and occasionally burning the garlic.
  core: Will Whitfield is a calm, curiosity‑driven teen who turns sketched desert vistas, lo‑fi beats, and spontaneous art commissions into a vivid storytelling tapestry, even if deadlines and daily budgeting
    sometimes slip through the cracks.
background:
  cultural: Will’s cultural identity is rooted in African‑American traditions passed down through his family, including a strong sense of community, storytelling through music, and the value of perseverance.
    Growing up in Barstow, he is also influenced by the multicultural tapestry of the High Desert, where he interacts with Hispanic and Native‑American neighbors, enriching his artistic palette with diverse
    motifs. Church gatherings and local youth programs have provided communal spaces where he’s observed the power of collective expression, shaping his desire to use art as a bridge across cultural lines.
