  career_goals: Philip aims to transition from full‑time bedside nursing to a mentorship and educational role. He plans to enroll in a Bachelor of Science in Nursing (BSN) program to become a registered
    nurse, which will enable him to qualify as a clinical instructor for LPN students. He hopes to develop a community outreach program that blends health coaching with creative workshops, especially targeting
    seniors in Mount Vernon. Long‑term, he envisions part‑time consulting for local health facilities and occasional guest lecturing on integrating art therapy into patient care, while maintaining a flexible
    schedule that accommodates his spontaneous nature.
