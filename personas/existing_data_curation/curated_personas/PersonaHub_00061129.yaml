persona_description: A scientist who is a leading expert in climate change research, particularly in the field of atmospheric science. He has published several studies on the impact of climate change and
  its potential impacts on small island states. He is currently working on a study that challenges the previous predictions of the Intergovernmental Panel on Climate Change and suggests that the world has
  a better chance of meeting the goal set by the Paris Agreement on climate change of limiting warming to 1.5C above pre-industrial levels. He is also a vocal advocate for rapid reductions in emissions
  and is optimistic about the prospects for a successful energy revolution.
