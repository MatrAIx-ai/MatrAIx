personas:
  professional: Robert Frank, a 64-year-old senior intellectual-property litigator with a solid STEM background, couples razor-sharp legal research, courtroom advocacy, and negotiation expertise with a
    curious, compassionate demeanor that drives his mentorship focus, pro-bono commitment, and ambition to shape technology and environmental policy.
  sports: Robert Frank enjoys leisurely kayaking on the Kalamazoo River each summer, walks the riverfront to stay active, and follows the Kalamazoo Wings hockey team and the Detroit Tigers with a quiet,
    fan-at-home loyalty.
  arts: Robert Frank frequents the Kalamazoo Institute of Arts to admire works by Georgia O'Keeffe and Ansel Adams, attends intimate chamber music concerts featuring the Kronos Quartet, and relaxes at his
    piano playing Debussy's Prelude in C-major, all of which deepen his appreciation for visual and auditory art.
  travel: Robert Frank prefers low-key, culturally immersive trips, having taken weekend excursions to the Louvre in Paris and a guided historical tour of Detroit’s waterfront, and now dreams of a photographic
    pilgrimage to the Scottish Highlands to capture mist-shrouded lochs.
  culinary: Robert Frank delights in farm-to-table cooking, often preparing roasted beet and goat-cheese salad with Michigan cherries, a seared salmon with dill and lemon, and a weekend homemade rosemary-infused
    focaccia, reflecting his modest culinary skill and love for fresh, seasonal ingredients.
  core: Robert Frank is a meticulous, art-loving attorney who balances rigorous legal work with quiet mentorship, garden-to-table cooking, and a habit of over-booking kayaking trips while occasionally neglecting
    dental check-ups.
background:
  cultural: Raised in a middle-class family in Michigan with ancestry that includes German and Irish immigrants, Robert embodies Midwestern values of hard work, practicality, and community involvement.
    He grew up in a region that emphasizes civic duty, modesty, and hospitality, which shaped his compassionate and cooperative nature. He regularly participates in local cultural events such as the Kalamazoo
    Art Fair and the Michigan State Fair, enjoys seasonal traditions like autumn apple picking and winter ice-fishing outings, and values the region's strong support for education and volunteerism.
attributes:
  skills: '["Legal research", "Legal analysis", "Intellectual property law", "Technology and data privacy law", "Environmental law", "Litigation strategy", "Courtroom advocacy", "Negotiation", "Mediation",
