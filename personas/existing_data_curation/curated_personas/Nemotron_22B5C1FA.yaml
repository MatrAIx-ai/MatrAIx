  hobbies: '["Visiting art museums and galleries", "Attending theater and chamber music performances", "Reading philosophy, science fiction and contemporary literature", "Playing piano", "Landscape photography",
    "Kayaking", "Gardening", "Woodworking", "Book club", "Mentoring high-school students", "Exploring regional history tours"]'
  career_goals: Robert plans to gradually shift his focus from full-time litigation to mentorship, thought leadership, and community service. He aims to mentor younger attorneys through a formal fellowship
    program, expand his pro-bono work for low-income clients, and influence state policy on emerging technologies and environmental protection. He aspires to author a book on the intersection of law and
    technology, develop a continuing-education series for Michigan lawyers, and serve on the board of a local legal-aid nonprofit, while maintaining a balanced lifestyle that allows time for his artistic
    pursuits.
