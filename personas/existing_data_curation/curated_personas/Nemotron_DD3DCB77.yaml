  career_goals: Mark aspires to study visual arts and computer science at a university, aiming to become a concept artist or narrative designer for video games and animated media. He also dreams of creating
    his own webcomic series that blends science‑fiction with Southern folklore. In the longer term, he hopes to mentor younger students in his community, introducing them to digital art and coding, and
    possibly contribute to local cultural projects that celebrate his town’s heritage.
