personas:
  professional: Mark Ferriter is a budding tech‑creative who blends sketching of fantastical beasts with hands‑on Raspberry Pi sensor projects, leveraging his vivid imagination, organized yet flexible mindset,
    and reliable attention to detail to prototype interactive art installations that amaze his peers.
  sports: Mark Ferriter follows the Alabama Crimson Tide football team and the Atlanta Braves baseball club, plays midfield for the Willow Creek Junior Soccer Club during the spring season, and joins the
    school's cross‑country team in the fall, while spending weekends hiking the Sipsey Wilderness with his camera at the ready.
  arts: Mark Ferriter draws inspiration from J.R.R. Tolkien’s epic lore, Hayao Miyazaki’s enchanted animation, and H.R. Giger’s surreal biomechanics, channeling his acoustic guitar practice into acoustic
    covers of Bob Dylan and Jack Johnson, and showcases his own illustrations at the school art club’s monthly exhibit.
  travel: Mark Ferriter has explored the Gulf Shores beach boardwalk, visited Washington, D.C. on a school field trip, and dreams of backpacking through Kyoto’s historic shrines, balancing meticulous planning
    with spontaneous weekend trips to nearby state parks whenever his school schedule permits.
  culinary: Mark Ferriter favors homemade pepperoni pizza topped with fresh mozzarella, basil, and a drizzle of garlic oil, crafts spicy chicken tacos with cilantro, lime, and jalapeño, and experiments
    with chocolate chip cookies that incorporate dark cocoa nibs for an extra crunch.
  core: Mark Ferriter is a relentless imagination‑driven teen who juggles drawing, coding, and guitar strings while meticulously budgeting for LEGO bricks and occasionally neglecting bedtime, all with a
    habit of leaving sketchbooks scattered across his room.
background:
  cultural: Mark grew up in Georgiana, a small town in Conecuh County, Alabama. His family has deep roots in the rural South, with generations of farmers and community volunteers shaping a strong sense
    of local identity. The culture emphasizes Southern hospitality, church involvement—he regularly attends a Baptist congregation—and community events such as the county fair and high‑school football games.
    Traditional Southern foods like fried catfish, collard greens, and sweet tea are staples at family gatherings, and his musical tastes blend country, blues, and contemporary pop. While his upbringing
    instills responsibility, humility, and respect for tradition, his avid internet use exposes him to global art, technology, and storytelling, giving him a hybrid identity that merges his Southern heritage
    with modern creative influences.
