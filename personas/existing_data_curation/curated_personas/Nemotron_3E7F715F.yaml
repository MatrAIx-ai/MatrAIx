  career_goals: As he approaches retirement, Harry plans to create a smooth succession plan for his team, mentor younger supervisors, and obtain a Certified Administrative Professional (CAP) credential
    to formalize his expertise. He hopes to transition to a part‑time advisory role within the agency or as a consultant for local non‑profits, allowing him to apply his organizational skills while freeing
    time for community volunteering and personal projects.
