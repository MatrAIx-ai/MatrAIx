  hobbies: '[''Watercolor painting'', ''Piano improvisation'', ''Improv theater'', ''Astrophotography'', ''Urban photography'', ''Arduino and maker projects'', ''Science‑fiction book club'', ''Hiking'',
    ''Experimental cooking'', ''Hosting dinner parties'']'
  career_goals: James aims to expand his impact on higher education by establishing a flagship interdisciplinary STEAM program that bridges physics, engineering, and visual arts at his university. He seeks
    to secure a major research grant to investigate computational modeling of artistic phenomena and to author a textbook on creative approaches to teaching complex STEM concepts. Over the next five years,
    he aspires to assume a departmental leadership role—such as chair or associate dean—to mentor faculty in innovative pedagogy, while also building community‑outreach initiatives that bring science‑and‑art
    workshops to local schools and senior centers. Ultimately, he envisions a legacy of fostering curiosity, imagination, and inclusive learning environments before transitioning to a semi‑retired consultant
    role.
