    Workflow"]'
  hobbies: '["Salsa and Cumbia dancing", "Cooking traditional Mexican cuisine", "Family gatherings and hosting", "Knitting and crochet circles", "Home gardening (tomatoes, peppers)", "Bilingual literacy
    volunteer work", "Attending Greeley Summer Fest and community events", "Watching telenovelas"]'
  career_goals: Marisol aims to transition from front‑line sales to a supervisory role within the next two years, hoping to become an assistant manager who can shape staff schedules, drive sales strategies,
    and mentor younger employees. She is also interested in developing a small community‑focused pop‑up shop that showcases Mexican artisanal foods and crafts, allowing her to blend her retail expertise
    with cultural heritage. Ultimately, she wants a stable position that offers a clear path to retirement while leaving a legacy of strong teamwork and customer loyalty.
