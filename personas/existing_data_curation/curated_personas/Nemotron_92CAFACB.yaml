personas:
  professional: Marisol Galeano is a seasoned retail specialist with three decades of bilingual customer‑service, POS mastery, visual merchandising, and staff‑training expertise, who now leverages her structured,
    detail‑oriented mindset and natural charisma to lead store events and mentor teams as she pursues an assistant‑manager role.
  sports: Marisol Galeano stays fit by dancing salsa and cumbia three times a week at the senior center, joining a weekend community walking group, and cheering for the Colorado Rockies and Denver Broncos,
    preferring activities that blend social interaction with light exercise.
  arts: Marisol Galeano immerses themselves in the arts by attending Greeley Summer Fest performances featuring bands like Los Lobos, enjoying nightly telenovela marathons starring stars such as Maite Perroni,
    and crafting intricate knit pieces while listening to the timeless salsa rhythms of Celia Cruz.
  travel: Marisol Galeano prefers carefully planned road trips that blend scenic nature with family meals, often exploring Colorado's Rocky Mountain trails, a weekend escape to Santa Fe's historic plaza,
    and occasional visits to San Antonio's River Walk, always budgeting travel costs to protect retirement savings while using a travel journal to track favorite recipes discovered on the road.
  culinary: Marisol Galeano is a seasoned home cook who expertly prepares tamales, pozole, and fresh salsas using garden‑grown tomatoes, jalapeños, and cilantro, delights in experimenting with homemade
    masa and slow‑cooked pork, yet sometimes over‑spices meals in their quest for bold flavor.
  core: Marisol Galeano is a vibrant, structure‑loving community champion whose talkative spirit fuels salsa‑filled evenings, meticulous retail expertise, and a steadfast plan to retire on their own terms
    while never missing a chance to share a home‑cooked feast.
background:
  cultural: Marisol was born in a small town in the state of Jalisco, Mexico, and moved to the United States in her early twenties. She grew up in a close‑knit Mexican‑American neighborhood in Greeley,
    where Spanish was spoken at home and community events celebrated holidays such as Día de los Muertos, Cinco de Mayo, and La Posada. Her upbringing emphasized family, respect for elders, and the sharing
    of food and stories. Although she did not complete formal schooling beyond eighth grade, she learned to navigate both Mexican and American cultures, becoming fluent in both languages. Today, she balances
    her heritage with her Colorado lifestyle, participating in Catholic church celebrations, supporting local Mexican market stalls, and preserving traditional recipes while also embracing the diverse,
    multicultural fabric of the Greeley community.
attributes:
  skills: '["Bilingual Customer Service (English/Spanish)", "Product Knowledge (Apparel, Home Goods, Seasonal Merchandise)", "POS System Operation and Cash Handling", "Inventory Management and Stock Organization",
