persona_description: A knowledgeable and experienced professional from the U.S. Fish and Wildlife Service, specializing in wildland fire management and oil spill response. They have experience in developing
  common terminology, discussing appropriate methods for cleaning up oil spills, and working with federal agencies, the EPA, and the Coast Guard to manage large emergency incidents. They are familiar with
  the Incident Command System, wildland fire risk analysis, and decision-making processes, and have a deep understanding of the oil industry's responsibilities for handling oil spills and cleanups. They
  are interested in sharing their expertise and developing forward-looking plans to advance the use of in-situ burning policy.
