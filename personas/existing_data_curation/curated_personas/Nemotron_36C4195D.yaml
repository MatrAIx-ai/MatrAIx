  hobbies: '[''Jogging'', ''Weightlifting'', ''Competitive online gaming'', ''Cooking Vietnamese cuisine'', ''Reading business/non‑fiction books'', ''Watching American football'', ''Participating in cultural
    festivals'', ''Organized volunteer work at food bank'']'
  career_goals: Liem aims to advance from his current sales representative role to a senior sales manager within the next three years, targeting leadership of a high‑performing service sales team. He plans
    to earn a bachelor's degree in Business Administration and obtain professional certifications such as Certified Professional Sales Person (CPSP) and Salesforce Administrator. Long‑term, he envisions
    becoming a regional sales director, overseeing multiple markets, and eventually launching his own boutique consultancy that helps small businesses optimize their service offerings. Throughout his career,
    he seeks consistent quota attainment, recognition as a top performer, and opportunities to mentor junior sales staff.
