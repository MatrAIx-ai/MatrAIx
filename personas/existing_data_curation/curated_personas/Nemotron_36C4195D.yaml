personas:
  professional: Liem Suazo is a sales representative who excels at B2B prospecting, consultative selling, and CRM analytics, leveraging their disciplined, routine‑driven mindset and competitive edge to
    consistently exceed quotas and craft data‑backed forecasts while mentoring junior colleagues.
  sports: Liem Suazo jogs five mornings a week with the Bay Area Runners club, lifts at Gold’s Gym, follows the San Francisco 49ers and Golden State Warriors, and competes in strategy‑focused eSports tournaments
    with Team Liquid, blending physical competition with tactical gaming.
  arts: Liem Suazo devours business strategy books by Michael Porter and Malcolm Gladwell, enjoys the live jazz sessions at local venues, attends periodic cultural festivals featuring lantern parades and
    traditional music, and is an avid fan of the filmography of Christopher Nolan and the animated works of Hayao Miyazaki.
  travel: Liem Suazo prefers meticulously planned weekend getaways to nature‑rich destinations like Yosemite and coastal towns in Oregon, has explored culinary hotspots in Bangkok and Kyoto, uses TripIt
    for itinerary management, and dreams of a culinary tour through Italy’s Tuscany region while balancing travel costs with career ambitions.
  culinary: Liem Suazo cooks aromatic pho broth with star anise, lemongrass, and fish sauce, masterfully rolls fresh banh mi with pork and pickled vegetables, frequently shares these meals at communal gatherings,
    and experiments with pressure‑cooker shortcuts while occasionally over‑seasoning in pursuit of perfect flavor balance.
  core: Liem Suazo blends a competitive, routine‑focused drive with a love for strategic gaming, disciplined fitness, and culinary heritage, yet sometimes lets skepticism delay personal help‑seeking.
background:
  cultural: Liem is a second‑generation Southeast Asian American of Vietnamese descent, raised in the diverse communities of Oakland and Orange County, Florida. His family places a strong emphasis on respect
    for elders, hard work, and preserving cultural traditions such as Tet celebrations and Vietnamese culinary practices. Bilingual in English and Vietnamese, Liem navigates both American and Vietnamese
    cultural norms, blending modesty and community orientation with a competitive drive fostered by his upbringing. He identifies with the values of practicality and routine inherited from his family while
    also embracing the multicultural environment of his hometown.
