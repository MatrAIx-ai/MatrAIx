  career_goals: As he approaches retirement, John aims to leave a lasting legacy by institutionalizing a telehealth program that expands specialty care to remote communities across Coos County. He plans
    to mentor the next generation of health managers through a regional apprenticeship network and to serve on the board of a nonprofit focused on rural health equity. Leveraging his artistic curiosity,
    he hopes to launch a community‑wide “Healing Arts” initiative that commissions local Indigenous and contemporary artists for hospital and clinic spaces. Additionally, John is working toward a smooth
    leadership transition that safeguards financial stability while positioning the organization to adopt emerging technologies such as AI‑driven predictive analytics.
