personas:
  professional: Mae Dorlean, a seasoned high school business teacher, designs meticulously structured curricula that blend real‑world case studies with data‑driven assessments, while their competitive drive
    fuels a push for district‑wide teaching awards and a mentorship network linking local professionals with students.
  sports: Mae Dorlean stays active through daily walks along the Myrtle Beach boardwalk, a weekly Pickleball session at the local senior club, and cheering for the Charleston Battery soccer team, while
    also participating in a community senior softball league each spring.
  arts: Mae Dorlean immerses themselves in the arts by attending live jazz sets featuring Miles Davis tributes at the city’s historic theater, collecting vinyl records of Ella Fitzgerald, and exploring
    local gallery exhibitions showcasing Southern folk art, which feed both their cultural curiosity and quiet contemplation.
  travel: Mae Dorlean prefers well‑planned road trips along the Atlantic seaboard, having explored historic towns like Charleston, Savannah, and New Orleans, while dreaming of a spring pilgrimage to the
    Royal Botanic Gardens, Kew, balancing a modest travel budget with occasional family visits to the Blue Ridge Mountains.
  culinary: Mae Dorlean hones their Southern culinary roots by perfecting recipes such as smoked collard greens with ham hocks, honey‑glazed sweet potatoes, and buttermilk fried chicken, often incorporating
    garden‑fresh herbs like rosemary and thyme, and enjoys occasional dining at the farm‑to‑table spot Sea Harvest for scallop risotto.
  core: Mae Dorlean is a structured, competition‑driven educator who channels their love for garden order, jazz improvisation, and meticulous budgeting into a life that balances community service with a
    penchant for occasional indulgence and a healthy dose of skepticism.
background:
  cultural: Mae is a Black woman raised in the Lowcountry of South Carolina, where family, church, and community have long been cornerstones of cultural identity. Her grandparents instilled a deep respect
    for education and self-reliance, urging her to pursue higher learning despite societal challenges. Active involvement in the historically Black Baptist church shaped her values of service, resilience,
    and collective uplift. Mae celebrates African American traditions such as Juneteenth, storytelling, and soul-food cooking, while also honoring regional customs like Gullah-inspired dishes and coastal
    festivals. Her connection to the local Black professional network fuels her commitment to mentorship and equity in education. These cultural influences inform her teaching philosophy, which emphasizes
    culturally responsive pedagogy, community partnership, and the empowerment of Black youth to thrive academically and economically.
attributes:
  skills: '["Curriculum development for business subjects", "Classroom management", "Instructional technology integration", "Data-driven assessment design", "Student mentorship", "Business fundamentals
    instruction", "Budget planning for school events", "Grant writing and fundraising", "Community partnership development", "Public speaking and presentation", "Conflict resolution", "Collaborative team
    leadership"]'
  hobbies: '["Gardening (vegetable and native plants)", "Cooking Southern and soul-food recipes", "Reading business and personal development books", "Volunteering in youth mentorship and church outreach",
    "Walking along Myrtle Beach boardwalk", "Playing chess at the community center", "Attending jazz and blues performances", "Knitting and crocheting", "Participating in a book club on African American
    literature", "Genealogy research"]'
  career_goals: Mae aims to advance into a leadership role within her school, such as department chair of Business and Economics, where she can shape the curriculum and champion an entrepreneurship program
    that provides hands-on experience for students. She plans to pursue a master's degree in Educational Leadership to qualify for assistant principal positions, with the long-term ambition of becoming
    a principal who emphasizes equity and culturally responsive teaching. Mae also seeks to establish a mentorship network linking local Black professionals with high-school students, thereby creating pathways
    for college and career success. Her competitive nature drives her to achieve district-wide recognition for instructional excellence and to secure sustainable funding for community-based projects.
