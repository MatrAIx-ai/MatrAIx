personas:
  professional: Dee Thomas, a seasoned restaurant operations manager with two decades of front‑of‑house and back‑of‑house expertise, leverages a structured, cost‑focused mindset while flexibly adapting
    to unexpected staffing or supply challenges, using modern POS and inventory software to streamline multi‑site performance as they prepare for a regional manager role.
  sports: Dee Thomas enjoys hiking the Allegheny Trail, follows the Buffalo Bills and participates in a local adult softball league, balancing weekend cardio with occasional yoga sessions to maintain flexibility
    while sometimes opting for spontaneous nature walks instead of a structured workout plan.
  arts: Dee Thomas immerses themselves in classic rock legends like Bruce Springsteen and country icons such as Johnny Cash, fuels book‑club discussions with Agatha Christie mysteries and historical fiction,
    and knits themed scarves for friends while listening to vinyl on Friday nights, blending structured book‑club meetings with spontaneous music listening.
  travel: Dee Thomas prefers short, well‑planned road trips that blend natural scenery and culinary exploration, having visited the Finger Lakes wine region, Niagara Falls, and a farmhouse stay in Vermont,
    yet they sometimes impulsively detour to a local farmers market when a new harvest catches their eye.
  culinary: Dee Thomas crafts rustic pies—apple crumble, blueberry buckthorn tart—and preserves heirloom tomatoes, while tending a vegetable garden that supplies fresh ingredients for seasonal menu experiments,
    balancing structured garden schedules with spontaneous recipe innovations.
  core: Dee Thomas blends structured efficiency with spontaneous adaptability, juggling restaurant leadership, garden‑to‑table cooking, and a love for classic rock while occasionally letting paperwork slip.
background:
  cultural: Dee Marie Thomas is a white American who grew up in a small‑town setting in western New York. Her family traces its roots to German and Irish immigrants who settled the region during the late‑19th
    century, bringing with them a work‑ethic centered on practicality and community involvement. The cultural fabric of Cattaraugus County—characterized by seasonal agricultural cycles, a strong sense of
    local identity, and an appreciation for self‑reliance—has shaped her values. She identifies with the region’s traditions of supporting local farms, participating in community events, and maintaining
    a balance between modest ambition and a relaxed, down‑to‑earth lifestyle.
attributes:
  skills: '[''Food safety compliance'', ''Team leadership and supervision'', ''Scheduling and labor management'', ''Inventory control and ordering'', ''Cost budgeting and profit analysis'', ''Menu planning
