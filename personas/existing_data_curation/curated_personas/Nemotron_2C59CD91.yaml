    preparation'', ''Operational flexibility and problem‑solving'']'
  hobbies: '[''Hiking and nature walks'', ''Gardening (vegetables and herbs)'', ''Baking pies and preserving'', ''Reading mystery and historical fiction'', ''Book club participation'', ''Volunteer cooking
    classes'', ''Listening to classic rock and country music'', ''Knitting and handcrafted gifts'', ''Attending farmers markets and craft fairs'']'
  career_goals: She aims to formalize her expertise by earning a ServSafe Manager certification and completing an associate degree in hospitality management at a nearby community college. Over the next
    five years, she hopes to move into a regional manager role overseeing multiple locations in the Southern Tier, where she can implement standardized procedures while still encouraging local creativity.
    Long‑term, Dee dreams of opening a modest farm‑to‑table bistro that showcases produce from Cattaraugus County farms, paired with a mentorship program for young hospitality workers. She also wants to
    refine her organizational skills through professional development workshops, ensuring she can meet deadlines without sacrificing her adaptable approach.
