  career_goals: Seeking to solidify his expertise and advance his career, Lester aims to obtain certifications such as ITIL Expert and PMP within the next two years, positioning himself for senior analyst
    or IT manager roles. He aspires to lead initiatives that automate routine processes, improve system reliability, and reduce operational costs for his organization. Leveraging his organized, reliable
    nature, he plans to mentor junior analysts and build a stable, long-term career path that balances professional growth with his family's need for stability. Ultimately, he hopes to transition into a
    consulting capacity serving small businesses in rural Georgia, providing practical, technology-driven solutions that respect traditional work practices.
