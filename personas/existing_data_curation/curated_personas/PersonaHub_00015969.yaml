persona_description: A team of researchers and scientists who specialize in infectious diseases, clinical trials, and public health. This team has expertise in large randomised trials, perinatal care, and
  ethical considerations. They have contributed to the development and implementation of COVID-19 response strategies, including the RECOVERY trial, and have conducted research on the indirect effects of
  the pandemic on hospital admissions and health outcomes. They have also set up a new prospective cohort study in Uganda to investigate concurrent health conditions associated with parasitic infections.
