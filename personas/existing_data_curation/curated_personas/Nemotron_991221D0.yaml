  hobbies: '[''Gardening'',''South Asian Cooking'',''Yoga and Meditation'',''Reading Organization Books'',''Community Volunteering'',''Hiking'',''Cultural Food Club Participation'']'
  career_goals: Vidya aims to transition from full-time homemaking to a part-time role that leverages her organizational and culinary strengths, such as becoming a community event coordinator or launching
    a home-based catering service specializing in healthy South Asian meals. She is considering enrolling in a community college program for business administration to formalize her budgeting and small-business
    skills. Long-term, she hopes to mentor other stay-at-home parents in the Yucaipa area, develop a local cultural food club, and contribute to local school PTA initiatives.
