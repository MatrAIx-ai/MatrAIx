personas:
  professional: Vidya Doobay is a budding part‑time community event coordinator who leverages years of home‑management expertise, meticulous budgeting, and a flair for crafting healthy vegetarian menus
    to streamline local cultural festivals and neighborhood potlucks.
  sports: Vidya Doobay enjoys weekend hikes in the San Bernardino foothills, practices yoga three times a week for flexibility, and idly follows the Los Angeles Lakers during basketball season while cheering
    on the local youth soccer league as a volunteer coach.
  arts: Vidya Doobay finds creative renewal in listening to classical sitar performances by Ravi Shankar, attending Pasadena Playhouse productions of contemporary dramas, and curating a rotating bookshelf
    of self improvement titles like Atomic Habits and The Life Changing Magic of Tidying Up.
  travel: Vidya Doobay prefers short well planned road trips that combine culinary exploration and nature, having recently road tripped to Santa Barbara for fresh seafood paella, dreaming of a future pilgrimage
    to the spice markets of Marrakech and a hiking adventure in the Canadian Rockies.
  culinary: Vidya Doobay excels at turning traditional vegetarian curries such as chana masala and aloo gobi into fusion creations like quinoa biryani bowls and cauliflower tikka tacos, regularly seasoning
    dishes with cilantro, mint and roasted cumin while hosting weekly dinner parties that showcase her garden harvested herbs.
  core: Vidya Doobay is a calm hyper organized home chef who turns every garden harvest into a meticulously planned dinner party, yet secretly hoards excess herbs for future experiments.
background:
  cultural: Vidya comes from a South Asian (Indian) family that immigrated to the United States in the 1990s. She grew up speaking Hindi at home while attending American schools, integrating both cultures.
    Traditional celebrations such as Diwali, Holi, and Navratri are important to her family, and she maintains cultural practices like preparing festive meals, participating in local Indian community events,
    and teaching her children about their heritage. The blend of Indian values—respect for elders, emphasis on family cohesion, and community service—combined with her Californian upbringing shapes her
    worldview.
attributes:
