persona_description: A teacher who uses technology to personalize learning in a classroom environment, with a focus on visual learners and those with visual impairments. She uses Explain Everything App
  to save and share board work, and iPad and Chromebook technology to allow her students to access material and work on projects. She is passionate about collaborative learning and uses it to engage her
  students and provide them with opportunities for extension activities. She is excited about the level of engagement and ownership her students feel towards their learning, and is always on the lookout
  for new tools to accommodate different learning styles and needs.
