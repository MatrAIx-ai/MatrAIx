  career_goals: Rodrique aims to re‑enter the workforce in a role that blends his love of art, community, and flexibility. He is working toward a part‑time position as a community arts coordinator for a
    Chicago nonprofit, where he can curate exhibitions, run workshops, and mentor youth. Simultaneously, he plans to launch a small side business that offers culturally inspired catering and handcrafted
    décor, allowing him to monetize his culinary and artistic talents while retaining a flexible schedule. He also hopes to pursue a bachelor's degree in Cultural Management or Fine Arts within the next
    three years, deepening his expertise and opening doors to freelance event‑planning projects that support his family and enrich his neighborhood.
