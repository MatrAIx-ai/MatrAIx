personas:
  professional: Rodrique Ellis transforms their curiosity and improvisational mindset into a dynamic part‑time community arts coordinator role, using self‑taught graphic design and social‑media savvy to
    curate neighborhood exhibitions while they embrace a fluid schedule that accommodates occasional disorganization.
  sports: Rodrique Ellis stays active by cycling with the Chicago Cycling Club on weekend mornings, cheering the Chicago Bulls during basketball season and the Chicago White Sox in summer, occasionally
    joining pickup basketball games at the local Y, while they prefer low‑key workouts that fit around their flexible schedule.
  arts: Rodrique Ellis immerses themselves in Chicago’s cultural pulse, regularly visiting the Art Institute to study works by Kerry James Marshall, attending live sets by jazz greats like Wynton Marsalis
    and blues legend Buddy Guy, documenting street‑art murals through photography, and they find inspiration in graphic novels such as ‘Sandman’ and ‘Maus.’
  travel: Rodrique Ellis prefers purposeful travel that blends culinary discovery with cultural immersion, having explored New Orleans during Mardi Gras, trekked through Oaxaca’s markets to study regional
    spices, and they dream of a serene pilgrimage to Kyoto’s tea gardens while balancing a modest budget and family commitments.
  culinary: Rodrique Ellis channels their culinary curiosity into soul‑food fusion, perfecting dishes like collard greens sautéed with Korean gochujang, shrimp and grits seasoned with miso and coriander,
    and sweet potato pie infused with cardamom, while they host weekly dinner gatherings that showcase these experimental flavors.
  core: Rodrique Ellis, a 40‑year‑old Chicagoan, navigates life with an endlessly curious mind, a love for art and flavor, a habit of juggling too many projects at once, and they rely on spontaneity over
    strict planning.
background:
  cultural: Rodrique is an African‑American Chicago native whose family arrived from the South during the Great Migration. He grew up in the South Side, immersed in the rhythms of gospel, soul, jazz, and
    the communal spirit of local churches and barbershops. Family gatherings centered around soul‑food cooking, storytelling, and celebrations of Juneteenth and Kwanzaa, reinforcing a deep pride in his
    heritage. He maintains strong ties to the city's Black cultural institutions, volunteering at the DuSable Museum and supporting emerging Black artists through community projects. While rooted in these
    traditions, his curiosity drives him to explore contemporary and cross‑cultural art forms, blending the legacy of his community with a forward‑looking, inclusive outlook.
