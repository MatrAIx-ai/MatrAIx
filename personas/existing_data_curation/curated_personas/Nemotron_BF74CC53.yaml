personas:
  professional: Juan Cortes, a 74‑year‑old retired handyperson, channels his methodical woodworking and repair expertise into mentoring younger volunteers at the senior center, where his practical, step‑by‑step
    approach and calm reliability make him the go‑to person for community‑wide maintenance projects.
  sports: Juan Cortes enjoys leisurely walks on community trails with the Senior Strollers Club and faithfully attends Saturday afternoon games of the local minor‑league baseball team, the Tulsa Thunder,
    where he cheers from the stands while occasionally joining a light‑hearted shuffleboard league at the community center.
  arts: Juan Cortes spends evenings listening to the vibrant brass sounds of mariachi ensembles like Mariachi Vargas de Tecalitlán and delving into historical fiction by authors such as Ken Follett, while
    his appreciation for striking murals by celebrated artists like Diego Rivera inspires his own modest sketching of garden scenes.
  travel: Juan Cortes prefers well‑planned, low‑key trips, having organized annual weekend getaways to the colonial town of Puebla and an extended family reunion cruise to the Caribbean islands of Cozumel
    and Roatán, yet he dreams of exploring the historic ruins of Machu Picchu someday.
  culinary: Juan Cortes, a seasoned home‑cook, expertly prepares family‑style dishes such as tamales, mole poblano, and carne asada using fresh garden tomatoes, corn masa, and a variety of dried chiles,
    and he delights in sharing step‑by‑step cooking sessions with his grandchildren every Sunday.
  core: Juan Cortes blends a disciplined handyman’s precision with a gardener’s patience, a chef’s love for bold flavors, and a storyteller’s warmth, all while occasionally misplacing his glasses on the
    workbench and insisting on measuring every screw twice.
background:
  cultural: Juan was raised in a Mexican household where Spanish was spoken daily and Catholic traditions were observed. He carries forward practices such as Día de los Muertos altars, family‑centred celebrations,
    and the preparation of dishes like tamales and pozole. Since relocating to Brookfield, Massachusetts, he has blended his heritage with his New England surroundings, participating in local cultural events
    while keeping his Mexican identity alive through language, cuisine, and community mentorship.
