  career_goals: Although retired from formal employment, Juan aims to remain a useful and organized presence in his community. He plans to mentor younger volunteers at the senior center, teach his grandchildren
    authentic Mexican cooking techniques, and continue improving his garden to provide fresh produce for his family and neighbors. Maintaining his health, preserving his cultural heritage, and fostering
    a calm, predictable routine are his guiding ambitions.
