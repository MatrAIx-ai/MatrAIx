persona_description: A geriatrician who specializes in the study of physical function and exercise in the elderly population. The person is interested in understanding the genetic factors that influence
  how seniors respond to exercise and how to develop more effective exercise recommendations for improving physical function and preventing disability. They are likely to be familiar with the research on
  the ACE I/D gene and its impact on exercise outcomes among mobility-limited older adults.
