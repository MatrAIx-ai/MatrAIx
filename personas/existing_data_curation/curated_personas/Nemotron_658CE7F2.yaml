    selection and maintenance"]'
  hobbies: '["Travel photography across Texas and northern Mexico", "Cooking traditional Mexican dishes", "Listening to and dancing to mariachi and norteño music", "Hiking and birdwatching in local nature
    preserves", "Playing amateur soccer", "Mentoring youth in photography workshops", "Reading historical non‑fiction about Mexican diaspora and Texas", "Maintaining a photography blog"]'
  career_goals: Laurentino aims to transform his photography practice into a multifaceted platform that merges art, education, and cultural preservation. Over the next five years he plans to open a dedicated
    studio/gallery in College Station that showcases his work and serves as a community hub for workshops and collaborative projects. He is driven to publish a coffee‑table book documenting the everyday
    lives of Mexican‑American families across the Brazos Valley, blending his curiosity with a practical storytelling approach. Seeking broader recognition, he targets top placements in national photography
    competitions and gallery exhibitions, leveraging his competitive nature to push creative boundaries. He also intends to develop a partnership with Texas A&M's continuing education program to teach advanced
    photography courses, and long‑term he envisions establishing a nonprofit archive that collects and digitizes historic photographs of Mexican heritage in Texas, ensuring his visual contributions support
    a lasting cultural legacy.
