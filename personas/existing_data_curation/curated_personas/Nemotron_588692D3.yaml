personas:
  professional: Linda Jackson, a seasoned butcher with decades of expertise in meat processing and seafood preparation, they leverage their meticulous USDA‑compliant approach, organized inventory management,
    and vivid imagination to create artistic charcuterie displays and experimental flavor pairings while mentoring new staff in a bustling New England market.
  sports: Linda Jackson, an active community member, they enjoy low‑impact fitness like morning walks along the Brockton River and seasonal bird‑watching hikes, while cheering for the Boston Red Sox, Celtics,
    and Patriots, and they play in a local senior softball league that meets at the town’s community field each summer.
  arts: Linda Jackson, an avid creative, they channel their energy into abstract watercolor paintings inspired by the New England shoreline, attend folk music gatherings featuring Bob Dylan and Joan Baez,
    devour historical novels by Hilary Mantel, and volunteer at a community art workshop where they share their love of sketching and knitting.
  travel: Linda Jackson, an enthusiastic traveler, they prefer meticulously planned road trips to coastal New England towns like Cape Cod and Newport, occasionally indulge in a modest cruise to the Azores,
    and dream of a pilgrimage to the historic sites of the Emerald Isle, all while balancing a modest travel budget with their retirement income.
  culinary: Linda Jackson, a culinary enthusiast, they delight in perfecting clam chowder, lobster rolls, and baked beans, seasoning their dishes with rosemary, thyme, and sage from their herb garden, while
    crafting avant‑garde charcuterie boards that blend locally sourced pork belly with abstract plating techniques.
  core: Linda Jackson, a 63‑year‑old butcher turned artistic culinary mentor, they balance a methodical work ethic with whimsical watercolor bursts, occasional crossword‑puzzle procrastination, and a relentless
    curiosity for blending flavor and visual art.
background:
  cultural: Linda is a lifelong resident of Brockton, Massachusetts, rooted in a white New England working‑class community with Irish and Italian ancestry. Raised in a modest Catholic household, she values
    hard work, community solidarity, and the region's practical ethos. Brockton's history as an industrial hub and its proximity to coastal fishing towns have shaped her familiarity with both meat processing
    and seafood traditions. She participates in local festivals such as St. Patrick's Day parades and town fairs, and she holds a deep appreciation for regional cuisine like clam chowder, lobster rolls,
    and baked beans. Linda's cultural identity blends the modest, diligent spirit of New England's working class with a personal passion for the arts, literature, and nature.
