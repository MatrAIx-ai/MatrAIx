personas:
  professional: A seasoned Project Management Specialist named Tashia Terry leverages her expertise in curriculum design, stakeholder communication, risk assessment, and data‑driven outcome measurement
    to guide K‑12 education projects, routinely structuring detailed plans in Microsoft Project while occasionally letting her preference for flexibility cause minor schedule slip‑ups, and they balance
    a cooperative leadership style with assertive conflict resolution to keep cross‑functional teams on track while mentoring emerging project managers.
  sports: A nature‑loving fitness enthusiast named Tashia Terry fills weekends with walks along Orlando’s Lake Eola Loop, cheerfully supports the Orlando Magic (NBA) and Orlando City SC (MLS), occasionally
    joins a local adult volleyball league, and balances these activities with a gentle yoga routine that doubles as stress relief, while they cherish the calm it brings after a hectic week.
  arts: An avid cultural consumer named Tashia Terry curates a soundtrack of classic soul and contemporary R&B—spinning Marvin Gaye, Aretha Franklin, H.E.R., and SZA—while cooking Southern‑inspired meals,
    leads a modest book club devoted to historical fiction and biographies, and regularly attends community theater productions such as the Orlando Shakespeare Company’s summer play, allowing them to weave
    storytelling into everyday life.
  travel: A thoughtful explorer named Tashia Terry plans trips that blend heritage and relaxation, having toured the historic districts of Charleston and Savannah, dreaming of a culinary pilgrimage to Oaxaca,
    Mexico, and often balances travel budgeting with family commitments by reserving weekday getaways to nearby Florida state parks, while they ensure each journey fits within a carefully managed schedule.
  culinary: A garden‑to‑table home chef named Tashia Terry harvests basil, thyme, and cilantro from a balcony garden to flavor Southern staples like shrimp and grits, collard greens with smoked turkey,
    and sweet tea, while occasionally experimenting with banana bread and fried chicken, showcasing a moderate cooking skill set that marries tradition with fresh, herb‑infused creativity, and they delight
    in sharing these meals with family and friends.
  core: Tashia Terry is a routine‑driven project manager who calms her intense anxiety with gardening, soulful R&B, and yoga, yet lets spontaneous herb‑spice experiments and occasional budget slip‑ups inject
    pleasant chaos into an otherwise structured life.
background:
  cultural: Tashia is a second-generation African American who grew up in the suburbs of Orlando after her parents relocated from the Midwest during the 1980s. Her family maintains strong ties to the Black
    church and community organizations, where celebrations of heritage – such as Juneteenth and Black History Month – are integral to her identity. Her upbringing emphasized the value of education as a
    vehicle for upward mobility, shaping her decision to pursue graduate studies in education. Tashia's cultural experience blends Southern culinary traditions with the vibrant multicultural atmosphere
    of Central Florida, influencing her love for soulful music, communal gatherings, and community service. She actively participates in local African American professional networks and mentors young women
    seeking careers in education and project management.
