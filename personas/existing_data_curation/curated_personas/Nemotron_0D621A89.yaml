  hobbies: '[''Urban Gardening'', ''Soul and R&B Music'', ''Cooking Family Recipes'', ''Reading Historical Fiction'', ''Yoga'', ''Journaling'', ''After-school Tutoring Volunteer'', ''Community Workshop
    Facilitation'', ''Walking in Parks'', ''Knitting'']'
  career_goals: Looking ahead, Tashia aims to leverage her experience to step into a senior leadership position within the education sector, such as Director of Project Management for a large school district
    or a nonprofit focused on school improvement. She hopes to obtain her PMP certification and further her expertise in strategic program planning, enabling her to design and oversee multi-year initiatives
    that address equity gaps in underserved communities. Over the next five years, she envisions guiding a portfolio of projects that integrate technology into classrooms, while also mentoring emerging
    project managers, especially women of color. Ultimately, she dreams of establishing her own consulting practice that partners with schools and community organizations to develop culturally responsive
    curricula and sustainable project frameworks.
