personas:
  professional: Hae Moy, a seasoned cashier with expert POS, inventory, and bilingual communication skills, applies their meticulous organization and vibrant imagination to craft eye‑catching visual merchandising
    displays while mentoring teammates, positioning themselves for a future boutique manager role.
  sports: Hae Moy supports the Columbus Blue Jackets and follows Ohio State Buckeyes football, while carving out time for weekly kick‑baseball games with friends and early morning jogs along the Scioto
    River to clear the mind after long shifts.
  arts: Hae Moy channels the bold patterns of Yayoi Kusama and the streetwise wit of Banksy into abstract digital illustrations, draws narrative inspiration from speculative author N.K. Jemisin, and finds
    solace listening to Sufjan Stevens and traditional pansori recordings during late‑night studio sessions at the local art studio.
  travel: Hae Moy prefers thoughtfully planned, budget‑conscious journeys that blend culture and nature, having explored the lantern‑lit streets of Jeju Island and the misty trails of Shenandoah National
    Park, while dreaming of an artistic retreat in Kyoto’s historic Gion district.
  culinary: Hae Moy, a moderately skilled home cook, delights in Korean‑American fusion dishes like kimchi‑fried rice tacos drizzled with gochujang mayo, handmade mandu dumplings, and a side of buttery
    Ohio cheese curds, frequently seasoning meals with fresh heirloom tomatoes, basil, and a dash of sesame oil.
  core: Hae Moy, a 34‑year‑old visual merchandiser‑in‑training, balances a cooperative, imaginative spirit with a habit of over‑thinking both art projects and bills, often staying up late perfecting sketches
    while secretly snacking on leftover kimchi.
background:
  cultural: Hae’s family emigrated from South Korea to the United States in the early 1990s. She grew up in a bilingual household in Columbus, Ohio, where Korean customs such as Lunar New Year celebrations,
    traditional foods, and language lessons were woven into daily life. This East Asian heritage instilled values of family harmony, respect for elders, and collective responsibility, which align with her
    cooperative nature. At the same time, she has embraced Midwestern American culture—participating in local festivals, community volunteerism, and the region’s straightforward communication style—creating
    a blended cultural identity that informs her worldview and social interactions.
attributes:
  skills: '[''Cash Handling'', ''POS System Operation'', ''Customer Service'', ''Basic Bookkeeping'', ''Inventory Tracking'', ''Bilingual Communication (English/Korean)'', ''Digital Illustration'', ''Photo
