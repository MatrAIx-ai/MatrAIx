  hobbies: '[''Painting'', ''Sketching'', ''Digital Illustration'', ''Visiting Museums'', ''Attending Craft Workshops'', ''Korean-American Fusion Cooking'', ''Reading Speculative Fiction'', ''Philosophy'',
    ''Photography'', ''Mindfulness Meditation'', ''Yoga'', ''Volunteering at Community Art Programs'']'
  career_goals: Hae aims to transition from cashier to a role that merges her retail experience with her creative passions, such as visual merchandising or store management. She plans to enroll in a community‑college
    program in graphic design or business administration within the next year to gain formal credentials. In the short term, she wants to develop a side line of hand‑painted merchandise sold online and
    to lead small visual display projects in her current store. Long‑term, she hopes to become a boutique manager or visual merchandiser who curates artistic product displays, mentors new staff, and balances
    financial stability with creative expression for her family.
