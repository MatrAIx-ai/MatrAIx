  career_goals: Zacarias aspires to pursue a stable, community‑focused career that blends his love for routine, practicality, and service. He plans to attend a community college to study public administration
    or emergency services, aiming to become a firefighter or an EMT with the New York City Fire Department. In the long term, he envisions a role where he can organize disaster‑response drills, mentor younger
    youth, and perhaps lead a neighborhood safety initiative. He also hopes to support his family’s small business by applying his organizational and logistical skills, ensuring a reliable source of income
    for future generations.
