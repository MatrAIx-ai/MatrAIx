personas:
  professional: Zacarias Lerman is a diligent middle‑school student who channels their organized, routine‑loving nature into coordinating the soccer team’s practice schedule, managing after‑school basketball
    drills, and helping run community salsa nights, proving that youthful leadership can thrive in structured group settings.
  sports: Zacarias Lerman thrives on the soccer field with the Metro City Strikers and on the basketball court for the Metro City Hoops junior league, follows a strict training routine that includes three
    weekly practices, weekend matches, and seasonal conditioning, and passionately roots for the local professional soccer team Metro City FC while streaming NBA games featuring the Miami Heat.
  arts: Zacarias Lerman expresses creativity by mastering salsa steps at the community center, curating playlists that mix Celia Cruz, Marc Anthony, and contemporary Latin pop, and drawing inspiration from
    DIY YouTube tutorials and the vibrant street art of nearby coastal towns, all while proudly showcasing handcrafted dance costumes.
  travel: Zacarias Lerman prefers organized weekend trips, often planning day excursions to the nearby coastal town of Playa Azul for its lively festivals, while dreaming of summer adventures in Barcelona
    to explore its famous architecture and street music scene, all within a modest family travel budget.
  culinary: Zacarias Lerman enjoys cooking family recipes such as arroz con gandules, mofongo, and plantain tostones, skillfully blends homemade adobo seasoning, and frequently hosts potluck gatherings
    where friends taste his experimental fusion dishes that combine traditional flavors with a modern twist.
  core: Zacarias Lerman combines a love for structured group activities with a calm, reliable demeanor, yet secretly hoards extra LEGO pieces for late‑night builds, making them both a community pillar and
    a quiet perfectionist.
background:
  cultural: Zacarias grew up in a close‑knit Puerto Rican family on Staten Island, where Spanish is spoken at home and family gatherings revolve around food, music, and the celebration of cultural holidays
    like Nochebuena and the annual Puerto Rican Parade. He maintains strong ties to his heritage through regular visits to his grandparents' home, participation in the local Puerto Rican Association's events,
    and by preserving culinary traditions such as cooking mofongo and arroz con gandules with his mother. While he embraces the values of family, community, and resilience that are central to Puerto Rican
    culture, he also navigates the diverse multicultural environment of Staten Island, learning to bridge his heritage with the broader American context. This bicultural experience informs his desire to
    give back to both his immediate neighborhood and the larger Puerto Rican diaspora in New York.
