personas:
  professional: Vi Wiggins, a budding miniature architect who spends hours meticulously arranging colorful building blocks into structured towers, demonstrates early organizational prowess and a love for
    routine while occasionally flexing creative improvisation when a block tumbles, reflecting a toddler’s emerging professional mindset.
  sports: Vi Wiggins, a lively member of the Little Rangers preschool soccer league at the community center, eagerly practices dribbling and scoring under Mom’s guidance, cheers on the Cincinnati Bengals
    during family football nights, and stretches like a tiny gymnast during weekly parent‑child yoga sessions, showing a balanced love for active play and team spirit.
  arts: Vi Wiggins, an enthusiastic little performer who belts out The Wiggles’ “Fruit Salad,” dances to Sesame Street’s “Can You Tell Me How to Get to Sesame Street,” and flips through Eric Carle’s vivid
    picture books, letting these bright melodies and illustrations shape their imaginative play.
  travel: Vi Wiggins, a curiosity‑driven explorer who loves short car trips to Grandma’s countryside farm and sunny beach days at Myrtle Beach, giggles through the stroller‑friendly rides at Disneyland,
    and dreams of a family vacation to Paris’s Eiffel Tower and Japan’s cherry‑blossom parks, all while relying on parents’ careful itinerary planning.
  culinary: Vi Wiggins, a selective eater who adores creamy macaroni and cheese, smooth avocado mash, banana slices, and peanut butter‑jelly sandwiches, can deftly spread peanut butter with a small plastic
    spoon but insists on plain cheddar over spicy foods, turning every mealtime into a predictable yet comforting ritual.
  core: Vi Wiggins, a routine‑loving toddler who balances playful curiosity with an orderly world, throws a brief tantrum at disruptions but quickly returns to their beloved block‑building and coin‑saving
    rituals.
background:
  cultural: Vi is raised in Cadiz, a small town in Caldwell County, Kentucky, where Southern and Appalachian traditions shape daily life. Her family values practicality, routine, and close-knit community
    ties, emphasizing family togetherness, respect for elders, and a strong work ethic. Activities such as attending a local church nursery, participating in community picnics, and helping with chores on
    a family farm are common. The region’s folk music, church gatherings, and seasonal events like the Caldwell County Fair contribute to her cultural upbringing, fostering a blend of traditional values
    and compassionate community spirit.
