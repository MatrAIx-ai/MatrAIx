  career_goals: Vi is already showing early ambitions to be helpful and caring. She enjoys dressing herself, speaking clearly, and contributing to the household by tidying her toys. She often tells her
    parents she wants to be a teacher or a caretaker when she grows up, expressing a desire to guide other children and support her community. In the near term, her goals focus on mastering basic self-care
    tasks, expanding her vocabulary, and continuing to assist with simple chores at home.
