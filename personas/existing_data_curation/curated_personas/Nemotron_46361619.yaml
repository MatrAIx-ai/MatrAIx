  career_goals: Lyris aspires to attend a high school with a strong STEM focus and eventually study biomedical engineering. She dreams of designing affordable medical devices that could help children in
    underserved communities, drawing from both her curiosity for science and desire for practical impact. In the shorter term, she aims to lead her middle school robotics team to a regional competition,
    earn a leadership role on her soccer team, and maintain top grades to qualify for future scholarship opportunities. She also entertains the idea of starting a small online shop selling her digital artwork
    to support her family's vacation trips.
