personas:
  professional: Lyris Consuegra is an aspiring young game developer who writes small Python and Arduino‑based games, channeling her curiosity and methodical planning into code while competitively testing
    her creations with friends on weekend game nights.
  sports: Lyris Consuegra is a competitively driven midfielder on her school’s soccer team, training three times a week, cheering for Los Angeles FC in the MLS, and playing for the Sunrise Youth Soccer
    Club’s Saturday futsal squad.
  arts: Lyris Consuegra blends digital sketching of sci‑fi landscapes with a soundtrack that jumps from Bad Bunny’s reggaeton beats to Queen’s classic rock anthems, while also losing herself in mystery
    novels like Agatha Christie’s And Then There Were None and sci‑fi epics such as Dune.
  travel: Lyris Consuegra prefers structured family road trips to places like the Grand Canyon and Orlando’s theme parks, using a travel journal to plan itineraries, yet dreams of navigating the bustling
    streets of Barcelona on a future solo adventure.
  culinary: Lyris Consuegra enthusiastically helps craft homemade tamales and fresh salsa, mixes in extra chilies for a personal heat kick, and experiments with digital‑tablet recipes that fuse traditional
    corn‑based dishes with modern twists like queso fresco topping.
  core: Lyris Consuegra is a methodical, curiosity‑driven twelve‑year‑old who balances late‑night mystery reads, competitive soccer, and budding game development, all while meticulously budgeting her allowance
    and spicing up family meals.
background:
  cultural: Lyris comes from a Mexican-American family that maintains strong cultural traditions while adapting to life in Pasco, Washington. She grew up speaking both Spanish and English at home, celebrating
    holidays such as Día de los Muertos, Las Posadas, and Mexican Independence Day with vibrant altars, traditional foods, and family gatherings. Her family's values emphasize respect for elders, gratitude,
    and community support. Living in the Tri-Cities area, she experiences a blend of rural agricultural life and growing urban diversity, often participating in local Hispanic community events, school multicultural
    fairs, and occasional church services. These influences shape her identity, infusing her daily life with a love for Mexican cuisine, bilingual communication, and a sense of pride in her heritage.
