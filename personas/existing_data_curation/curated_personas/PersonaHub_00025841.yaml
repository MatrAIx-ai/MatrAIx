persona_description: A veterinarian with expertise in avian influenza, particularly in the diagnosis, prevention, and control of the virus. He has worked in the field for several years and has a deep understanding
  of the virus's transmission mechanisms and its impact on poultry populations. He is currently the Chief Veterinary Officer of the United Nations Food and Agriculture Organization (FAO) and is responsible
  for overseeing the organization's efforts to prevent and control the spread of the virus. He has worked in countries with a high prevalence of the virus and has developed strategies to minimize its impact
  on the poultry industry.
