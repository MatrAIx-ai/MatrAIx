  career_goals: Jade dreams of turning her imagination into a career that blends art and technology. She aspires to study visual storytelling in a dedicated art program, aiming to become a concept artist
    or narrative designer for video games and animation. Ultimately, she hopes to create immersive worlds that invite others to explore abstract ideas, and she plans to pursue higher education in illustration
    or interactive media while maintaining her commitment to collaborative and harmonious creative environments.
