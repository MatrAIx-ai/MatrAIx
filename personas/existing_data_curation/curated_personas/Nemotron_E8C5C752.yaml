personas:
  professional: Jade Conyers, a fourteen‑year‑old budding speculative‑fiction author and visual storyteller, channels their vivid imagination into journal‑bound tales and digital sketches, using a drawing
    tablet to bring fantasy worlds to life while balancing school assignments with disciplined creative sessions.
  sports: Jade Conyers prefers low‑key physical activity, joining the school’s cross‑country team for weekly runs and spending weekends kayaking on the local river, while they cheer for the nearby baseball
    club, the Springfield Spiders.
  arts: Jade Conyers curates indie‑music playlists featuring Phoebe Bridgers, Mitski, and Tame Impala, and they strum basic guitar chords in the evenings, sketch atmospheric scenes inspired by N.K. Jemisin
    and Neil Gaiman, and follow graphic‑novel artists like Kazu Kibuishi for visual inspiration.
  travel: Jade Conyers dreams of swapping weekend orchard strolls for a trek through the misty fjords of New Zealand, while also planning a school‑group visit to Kyoto’s bamboo forest, yet they currently
    favor day trips to the nearby state park for sketching sessions.
  culinary: Jade Conyers enjoys preparing quick trail snacks such as honey‑drizzled granola with dried berries, experiments with garlic‑ginger vegetable stir‑fry after watching cooking videos, and they
    delight in occasional family meals of homemade sushi rolls and fresh orchard apples.
  core: Jade Conyers is a quietly ambitious teen who fuses speculative storytelling, indie music, and nature‑inspired art into a disciplined yet flexible creative life.
background:
  cultural: Jade is raised in Corning, a close‑knit agricultural town in Tehama County, California. Her family’s roots trace back several generations to Midwestern settlers who moved west for farming, giving
    her a heritage of modest, community‑oriented values. Growing up amid rice fields and orchards, she has an intimate connection to the rhythms of rural life and the seasonal harvest festivals that bring
    the town together. While her household celebrates traditional American holidays, she also participates in local multicultural events, such as the county’s harvest fair, where she interacts with the
    diverse Latino farm‑worker community that enriches the area’s cultural tapestry. This environment nurtures her sense of harmony, cooperation, and respect for varied perspectives, all of which inform
    her artistic sensibilities.
