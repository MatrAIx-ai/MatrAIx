personas:
  professional: An emerging teenage visual artist and writer, Janice Glanton channels curiosity and compassion into community projects, blending watercolor landscapes of Union County with lyrical poetry
    that reflects the rhythms of her church choir, while they balance school responsibilities with a knack for organizing art displays at the local library.
  sports: An enthusiastic weekend hiker, Janice Glanton treks the Union County Trail network with the local Magnolia Trail Club, follows the Arkansas Razorbacks football team and the Dallas Cowboys, and
    occasionally joins the school’s cross‑country practice, while they cheer on the Dallas Mavericks for basketball thrills.
  arts: A passionate creator, Janice Glanton sketches and paints vivid watercolors inspired by Frida Kahlo’s bold colors and Banksy’s street wit, writes poetry echoing the soulful verses of Maya Angelou,
    and sings gospel harmonies alongside her church choir, all while they draw inspiration from Billie Holiday’s jazz recordings and the contemporary R&B sounds of H.E.R.
  travel: A modest‑budget explorer, Janice Glanton has road‑tripped to Memphis for blues festivals, spent a family weekend in New Orleans soaking in jazz and beignets, and dreams of strolling the historic
    streets of Savannah; they prefer structured itineraries for day‑hikes but delight in spontaneous detours to local farmer’s markets when time allows.
  culinary: A budding home‑cook, Janice Glanton loves Southern comfort foods like shrimp and grits, collard greens, and pecan pie, experiments with seasoning watercress salads with fresh thyme and lemon
    zest, and although they can flawlessly whisk a batch of cornbread, they occasionally scorch cupcakes when their mind wanders to a new painting concept.
  core: Janice Glanton is a creatively curious, compassion‑driven teen who balances art, community service, and a gentle anxiety with a love for gospel music, hiking, and Southern flavors, while they occasionally
    splurge on supplies and juggle budget worries.
background:
  cultural: Janice was raised in Magnolia, a small town in Union County, Arkansas, within a close‑knit African‑American community where family, church, and community gatherings are central to daily life.
    Her upbringing blends Southern traditions with the rich heritage of African‑American storytelling, music, and visual arts. She regularly attends a local Baptist church, where gospel music and communal
    support shape her values and provide opportunities for artistic expression through the choir. Community events such as church picnics, local festivals, and family reunions expose her to Southern cooking,
    folk crafts, and oral histories that reinforce a strong sense of identity and collective responsibility. These cultural influences inform her compassionate outlook, appreciation for artistic expression,
    and desire to give back to her community.
attributes:
