  hobbies: '["Sketching", "Watercolor Painting", "Digital Art", "Poetry Writing", "Reading", "Jazz and Gospel Music Listening", "Church Choir", "Library Volunteering", "Nature Hiking", "Podcast Listening",
    "Documentary Watching"]'
  career_goals: Janice envisions a future where she can merge her compassion with her artistic talents to help others heal and express themselves. She aims to pursue a college degree in art therapy, counseling,
    or a related field, ultimately becoming a licensed art therapist or school counselor who uses creative processes to support youth mental health. In the near term, she hopes to secure mentorships with
    local artists or mental‑health professionals, attend art workshops, and expand her volunteer work in community outreach programs to build relevant experience.
