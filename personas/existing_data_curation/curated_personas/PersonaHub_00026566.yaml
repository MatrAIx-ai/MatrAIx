persona_description: A chiropractor who specializes in the treatment of muscular, nervous, and skeletal problems, particularly the spine. They use their hands to manipulate various parts of the body to
  promote healing and wellness. Chiropractors are known for their ability to correct misalignments of the spine, which are called subluxations, and provide a range of treatments including electric muscle
  stimulation, exercise programs, heat/cold therapy, herbal therapy, lifestyle and nutrition counseling, manipulation under anesthesia, physical rehabilitation, stress management, and sports medicine. They
  are best known for their treatment of back and neck pain and sometimes specialize in areas such as orthopedics, neurology, nutrition, internal disorders, and diagnostic imaging.
