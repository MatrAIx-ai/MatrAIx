  hobbies: '[''Sketching comics'', ''Digital art creation'', ''Playing indie video games'', ''Coding small projects'', ''Skateboarding'', ''Basketball'', ''Improvisational theater'', ''Listening to diverse
    music'', ''Attending art festivals'', ''Reading about tech trends'']'
  career_goals: Tal dreams of turning his love for art and technology into a career as an indie video‑game designer and digital artist. He aims to create immersive, visually striking games that blend storytelling
    with innovative mechanics. In the longer term, he hopes to launch his own multimedia studio where he can oversee projects from concept to release. He also envisions becoming a recognized content creator
    on platforms like YouTube, sharing tutorials, design insights, and behind‑the‑scenes looks at his creative process. Competitively, he aspires to win regional robotics or game‑design contests, proving
    his ideas can stand out among peers. Throughout, he seeks a balance between artistic freedom and the challenge of bringing ideas to market.
