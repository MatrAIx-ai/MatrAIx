personas:
  professional: Jazzmin Phillips, a tiny budding engineer in the realm of toddler play, showcases early spatial reasoning and methodical planning by carefully arranging stacking rings, balancing curiosity
    with practicality while silently competing with peers to build the tallest tower, all with a calm, reserved demeanor.
  sports: Jazzmin Phillips, a devoted participant in toddler gymnastics at the Little Sprinters Club, delights in the rhythmic tumble of soft mats while quietly cheering for the New York Yankees during
    spring broadcasts, preferring solo play on padded floors over crowded playground games.
  arts: Jazzmin Phillips, enchanted by the vivid illustrations of Eric Carle and the gentle lullabies of Raffi, spends early mornings humming along while leafing through picture books and often attempts
    clumsy finger-painting sessions that echo the bold colors of Van Gogh's sunflowers.
  travel: Jazzmin Phillips, after a family road trip to the local botanical garden where they marveled at blooming roses and a tiny waterfall, now dreams of feeling sand between tiny toes at the Florida
    Gulf Coast beaches, favoring short stroller-friendly excursions over long flights.
  culinary: Jazzmin Phillips, an enthusiastic little eater, savors pureed carrots, ripe bananas, and occasional avocado toast, meticulously arranging peas in neat rows on the high-chair tray before picking
    them up with chubby fingers, and shows a budding curiosity for the texture of soft cheese.
  core: Jazzmin Phillips merges toddler curiosity with a surprisingly methodical streak, meticulously arranging toys while quietly questioning adult motives, turning everyday routines into tiny competitive
    challenges.
background:
  cultural: Jazzmin comes from an African-American family rooted in the Midwest, residing in the small community of Constantine, Michigan. Her household reflects a blend of traditional Black cultural expressions—such
    as occasional church gatherings, soulful music, and home-cooked soul food—combined with Midwestern values of modesty, self-reliance, and close-knit family ties. Her parents emphasize education, community
    involvement, and the importance of routine, all of which reinforce her organized and stable disposition. The local church and community center provide a safe, supportive environment where she experiences
    both cultural heritage and the close community spirit characteristic of Cass County.
