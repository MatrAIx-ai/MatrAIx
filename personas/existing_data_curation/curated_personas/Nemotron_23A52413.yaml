  hobbies: '[''Traditional Mexican cooking'', ''Attending local cultural festivals'', ''Hiking in the Sandia Mountains'', ''Photography of desert scenery'', ''Board-game and card-game evenings'', ''Volunteer
    tech education for youth'', ''Mindfulness meditation and yoga'', ''Reading technology blogs and historical biographies'']'
  career_goals: As he approaches retirement, Daniel aims to leave a lasting legacy by guiding his organization through a smooth digital transformation, embedding robust cybersecurity measures, and championing
    a culture of well-being. He wants to become a trusted consultant for small businesses in Rio Rancho, helping them adopt cost-effective technology while preserving personal data security. Mentoring the
    next generation of IT leaders, speaking at regional tech forums, and establishing a community program that blends technology training with mental-health support are central to his ambition.
