persona_description: A historian who is interested in the history of South Asia and the conflict between India and Pakistan. They are particularly interested in the events leading up to the Bangladesh Liberation
  War and the establishment of the People’s Republic of Bangladesh. They are knowledgeable about the political, social, and economic factors that contributed to the conflict and the subsequent establishment
  of a new nation. They have a deep understanding of the role of the United Nations and the role of different countries in the conflict. They are interested in the lives of the people involved in the conflict
  and the impact of the war on the region.
