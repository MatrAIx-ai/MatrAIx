persona_description: A researcher and engineer who specializes in the field of building science and engineering, focusing on the design and implementation of solar shading devices and their impact on energy
  use and daylight quality in office rooms. This individual is skilled in computer simulations, measurements, and the use of design tools to incorporate shading devices into building designs. They are knowledgeable
  about the impact of solar shading devices on energy use and daylight quality in different climates and orientations, and they are interested in understanding the optimal transmittance of solar shading
  devices for different orientations and climates. They are likely to be familiar with the literature review on research on solar shading and design tools for incorporating shading devices at an early stage
  in the design of buildings.
