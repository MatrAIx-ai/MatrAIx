  career_goals: Cameron aims to progress from his current entry‑level sales role to a regional sales manager within the next five years, overseeing a team of representatives and shaping sales strategies
    for the Midwest. He aspires to deepen his expertise in supply‑chain logistics to become a trusted advisor for manufacturing clients. Ultimately, he hopes to launch his own small‑scale distribution business,
    leveraging his network and practical experience while maintaining a stable work‑life balance. His motivations include professional growth, financial independence, and making a positive contribution
    to his community.
