personas:
  professional: A future engineer already mastering cause‑and‑effect puzzles, Andrew arranges his building blocks with methodical precision, turning each play session into a miniature design project while
    their curiosity about how things work fuels endless experimentation.
  sports: Andrew's budding athletic interests are nurtured by a weekly parent‑child swim class at the community pool and enthusiastic TV nights cheering for the Dallas Cowboys, while their curiosity drives
    them to toddle after a soft ball during backyard play.
  arts: Andrew's artistic curiosity blossoms during Sunday storytime at the local library, where they marvel at picture books by Eric Carle and sway to the gentle strumming of Willie Nelson when family
    gatherings play classic Texas country tunes.
  travel: Andrew's travel experiences include weekend road trips to Zilker Park in Austin and family vacations to the sandy shores of Galveston, sparking a love for open spaces and laying the groundwork
    for future adventures to the Grand Canyon, where they point excitedly at distant horizons.
  culinary: Andrew's evolving palate savors sweet potato puree, banana mash, and cheese‑infused macaroni, while their curious nature leads them to tap the spoon against a dish before a new bite, showing
    an early appreciation for varied flavors.
  core: An inquisitive 1‑year‑old named Andrew blends Southern hospitality, methodical play, early skepticism of strangers, and a fledgling competitive streak into a tiny yet determined personality, and
    they approach each new experience with a thoughtful tilt.
background:
  cultural: Andrew is raised in Denton, Texas, within a white, middle‑class family that values community, education, and creativity. English is the household language, and family life includes regular church
    attendance, seasonal celebrations such as Thanksgiving and Fourth of July barbecues, and weekly trips to the local library and community art events. The family embraces Southern hospitality, a love
    for Texas music (including country and folk), and a strong emphasis on early childhood development through structured play and exposure to local cultural resources.
