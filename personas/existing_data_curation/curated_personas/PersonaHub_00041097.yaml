persona_description: An archaeologist with a special interest in pre-Columbian cultures of the Americas, particularly the Olmec civilization. They have a strong background in anthropology, archaeology,
  and the study of pre-Columbian art and architecture. They are particularly interested in the symbolism and meaning behind the Olmec stone heads and other artifacts found at La Venta and other sites in
  the region. They have a keen eye for detail and a strong understanding of the context in which these artifacts were created, allowing them to interpret their meaning and significance. They are also knowledgeable
  about the history of pre-Columbian contact between the Old-world and New-world, and have a deep interest in the possibility that the Olmec civilization was influenced by Negroid Africans and Middle-eastern
  Caucasians.
