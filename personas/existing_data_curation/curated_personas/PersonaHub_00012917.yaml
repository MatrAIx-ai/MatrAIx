persona_description: A microbiologist and chemist who specializes in the analysis and characterization of bacterial lipids, particularly lipid A. They are skilled in the use of mass spectrometry (MS) for
  identification and quantification of lipid A molecules, as well as in the isolation and characterization of lipid A from bacterial cells. They also have expertise in the use of TLC for rapid characterization
  of lipid A molecules. They are interested in the use of ultraviolet photodissociation (UVPD) and collision-induced dissociation (CID) methods for the analysis of lipid A molecules, and have developed
  new protocols for this purpose. They are also knowledgeable in the use of radioisotopic labeling and isolation of lipid A from bacterial cells for analysis by TLC. They are interested in the use of fluorescence
  enzyme assays to measure soil microbial enzyme activity, and have developed a method for measuring this activity in soil slurries.
