  career_goals: Short-term, Ayhan aims to secure an internship or entry-level position in arts administration, museum education, or nonprofit program management within the Long Island region. He wants to
    apply his research and communication strengths to develop public outreach programs and grant proposals. Over the next five years he plans to pursue a master's degree in museum studies or cultural heritage
    management, with the ambition of becoming a curator or education coordinator at a regional museum or cultural institution. He also envisions eventually leading community-based cultural projects that
    integrate local history with contemporary storytelling, using his organizational skills to build sustainable programs.
