personas:
  professional: Matthew Kurtz, a facilities‑management hopeful with a methodical knack for property upkeep, carpentry, and logistics coordination, leverages his Excel mastery, meticulous scheduling, and
    inventory‑tracking skills to keep every maintenance task on a strict timetable, reflecting his love of routine and reliability.
  sports: Matthew Kurtz, a weight‑training enthusiast who jogs the St. Lucie Trail each weekend, roots for the Tampa Bay Buccaneers and the Miami Marlins, and plays in a local adult basketball league whenever
    his schedule permits, balancing his competitive nature with a disciplined fitness routine.
  arts: Matthew Kurtz, a solitary fan of classic American literature, regularly revisits Mark Twain’s *Adventures of Huckleberry Finn* and Ernest Hemingway’s *The Old Man and the Sea*, listens to Bob Dylan’s
    folk catalog, and engages in strategic board‑game evenings with friends playing Twilight Struggle, finding comfort in individual artistic pursuits.
  travel: Matthew Kurtz, a meticulous road‑trip planner, has explored the historic streets of Savannah, the wilds of Everglades National Park, and the sun‑kissed Florida Keys, and dreams of tasting Napa
    Valley’s vineyards, always budgeting each journey in his spreadsheet to maintain financial discipline.
  culinary: Matthew Kurtz, a competent home cook, frequently grills his river‑caught snapper with lemon‑garlic butter, tosses garden‑fresh tomatoes into a basil pesto pasta, and perfects a hearty vegetable
    chili, favoring simple, fresh ingredients over elaborate culinary experiments.
  core: Matthew Kurtz, a routine‑driven handyman‑in‑training, converts every spare moment into a checkbox on a to‑do list, competes fiercely in strategy board games, never skips a budget line, and occasionally
    hoards unused tools, all while keeping a stoic calm under pressure.
background:
  cultural: Matt grew up in a middle-class, white, suburban family in the Midwest before moving to Stuart, Florida as a young adult. His upbringing emphasized traditional values, self-reliance, and a strong
    work ethic, with influences from Protestant Christian teachings and community involvement. In Florida, he has adopted aspects of the coastal lifestyle, such as fishing and a laid-back attitude toward
    leisure, while maintaining his pragmatic, routine-oriented mindset. He identifies with the local old-school working-class culture that values reliability, personal responsibility, and straightforward
    communication.
