  career_goals: He aims to secure a stable, routine-oriented full-time role in facilities management or logistics coordination, where his methodical approach can be leveraged. He plans to complete his associate
    degree in Business Administration and obtain a certified facilities manager credential within the next two years. Long-term, he envisions starting his own small handyman service that provides reliable,
    scheduled maintenance for residential clients, emphasizing punctuality and quality. He also wants to build a modest savings portfolio to ensure financial independence.
