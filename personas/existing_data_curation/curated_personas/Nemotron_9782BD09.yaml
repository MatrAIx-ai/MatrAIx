personas:
  professional: Rosa Vichot, a seasoned pipefitter and aspiring master plumber in Los Angeles, leverages their expert knowledge of blueprints, California plumbing codes, and bilingual communication to lead
    small crews with disciplined precision while energizing teams through their lively, talkative demeanor.
  sports: Rosa Vichot, an avid fan of the Los Angeles Dodgers and the LA Galaxy, maintains their fitness by joining a weekend co‑ed soccer league, attending salsa‑dance cardio sessions, and hiking the Santa
    Monica trails during cooler months, while they occasionally warm up at the local gym for strength training.
  arts: Rosa Vichot, who regularly immerses themselves in the rhythms of Celía Cruz and Carlos Vives at local salsa nights, they appreciate the vibrant murals of the Great Wall of Los Angeles, and they
    cite Frida Kahlo’s fearless self‑portraiture as artistic inspiration for their own creative problem‑solving.
  travel: Rosa Vichot, who plans their vacations with meticulous itineraries, favors cultural immersion trips to a Semana Santa celebration in a Central American city, revitalizes their cooking in Oaxaca,
    and enjoys weekend road trips to the Santa Barbara wine country and the coastal hikes of Big Sur, balancing adventure with the comfort of familiar family traditions.
  culinary: Rosa Vichot, an enthusiastic home cook, they often prepare aromatic pepian simmered with roasted tomatoes, chile de árbol, and a blend of spices, roll fresh tamales stuffed with pork and wrapped
    in banana leaves, stir sweet atol de elote with cinnamon and vanilla, while sprinkling home‑grown cilantro and oregano from their garden into each dish.
  core: Rosa Vichot, a meticulous pipefitter who channels their love for community into lively salsa nights, battles chronic worry through detailed budgeting, and sometimes forgets to schedule their own
    medical checkups while obsessively polishing their toolbox for hours.
background:
  cultural: Rosa hails from a Guatemalan family that immigrated to Los Angeles when she was a child. She grew up in a tight-knit, bilingual household where Spanish was spoken daily, and Catholic traditions
    such as Semana Santa and Dia de Los Muertos were celebrated with food, music, and community gatherings. The emphasis on family loyalty, mutual support, and respect for elders shaped her cooperative
    yet assertive demeanor. She maintains strong ties to the Central American diaspora, regularly participating in local Guatemalan festivals, patronizing family-run businesses, and serving as a cultural
    liaison at her workplace, often translating technical information for Spanish-speaking clients and coworkers. Her heritage influences her commitment to community service, love for traditional cuisine,
    and pride in representing women in a traditionally male-dominated trade.
attributes:
  skills: '[''Blueprint reading and schematic interpretation'', ''Pipe installation and repair (water, gas, steam)'', ''Pipe cutting, threading, welding, soldering, brazing'', ''Knowledge of California
    Plumbing Code and International Plumbing Code'', ''Pressure testing and leak detection'', ''Use of power tools and specialized pipefitting equipment'', ''Safety compliance and OSHA standards'', ''Project
    planning and scheduling'', ''Inventory and material management'', ''Bilingual client communication (English/Spanish)'', ''Apprentice training and crew supervision'', ''Problem solving and troubleshooting'',
    ''Water conservation and sustainable plumbing practices'', ''Customer service and relationship building'']'
  hobbies: '[''Salsa and bachata dancing'', ''Attending Guatemalan cultural festivals'', ''Volunteering at a community center (Spanish-language workshops)'', ''Cooking traditional Guatemalan dishes (pepian,
    tamales, atol)'', ''Gardening (herbs and vegetables)'', ''Reading plumbing trade magazines'', ''Mentoring apprentices'', ''Organizing neighborhood block parties'', ''Listening to marimba music'']'
  career_goals: Rosa aims to secure a California Master Plumber license within the next two years, positioning herself for senior supervisory roles on large commercial projects. She aspires to lead a multidisciplinary
    crew, overseeing the planning, execution, and quality control of complex pipefitting and steamfitting installations. Long-term, she envisions opening her own bilingual plumbing service that specializes
    in sustainable, water-saving solutions for residential neighborhoods in Los Angeles. Rosa also hopes to mentor more women and Spanish-speaking apprentices, contributing to union training programs and
    community outreach initiatives that promote diversity in the skilled trades.
