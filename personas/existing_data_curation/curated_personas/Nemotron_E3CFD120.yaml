personas:
  professional: Ellie Lanier leverages a blend of curiosity and practicality to design inquiry‑based STEM curricula for elementary and middle school students, turning classroom walls into interactive whiteboard
    canvases, guiding coding workshops, and coordinating community partnerships—while their relaxed approach to scheduling sometimes leads to last‑minute lesson tweaks.
  sports: Ellie Lanier energizes their weekends by leading a local hiking club through the Savannah River foothills, participates in community 5K runs, streams Atlanta Falcons games on Sundays, and holds
    a casual membership with the regional trail‑running group that meets at the nearby state park.
  arts: Ellie Lanier brings the same enthusiasm to community theater as they do to STEM, starring in indie productions, quoting lines from plays by August Wilson, and unwinding with contemporary fiction
    by Sally Rooney and Celeste Ng while listening to folk‑rock band Fleet Foxes during rehearsal breaks.
  travel: Ellie Lanier enjoys spontaneous weekend getaways, favoring flexible itineraries that combine hiking in the Great Smoky Mountains, a quick culinary tour of farm‑to‑table eateries in Asheville,
    and a dream trip to Iceland's volcanic trails—though their habit of delaying bookings sometimes means they miss early‑bird deals.
  culinary: Ellie Lanier cooks with an experimental flair, perfecting dishes like roasted beet and goat‑cheese salad, pan‑seared trout with almond‑pistachio crust, and homemade sourdough, while their pantry
    brims with fresh herbs—rosemary, thyme, and cilantro—and they often share these creations at theater potlucks and library outreach events.
  core: Ellie Lanier is a sociable, slightly disorganized STEM educator who swaps lesson plans for hiking trails, theater scripts for farm‑to‑table recipes, and balances curiosity with a love for flexible,
    people‑centered experiences.
background:
  cultural: Ellie grew up in a traditional Southern white family in Georgia, where church, hospitality, and strong community ties were daily staples. Her upbringing emphasized respect for local traditions
    while encouraging curiosity and educational achievement, shaping her belief in supportive, inclusive classrooms. Living in Augusta’s Columbia County, she blends Southern gentility with progressive educational
    values, often participating in local festivals, volunteering for city beautification projects, and celebrating regional culinary heritage.
attributes:
  skills: '[''Lesson Planning'', ''STEM Curriculum Design'', ''Classroom Technology Integration'', ''Differentiated Instruction'', ''Project‑Based Learning'', ''Formative Assessment'', ''Classroom Management'',
