  hobbies: '[''Community theater'', ''Hiking and nature walks'', ''DIY science kit crafting'', ''Reading contemporary fiction'', ''Farm‑to‑table cooking'', ''Volunteering at library STEM outreach'', ''Traveling
    with family'', ''Participating in local maker fairs'']'
  career_goals: Ellie aims to become a lead teacher or STEM curriculum coordinator within her district, championing district‑wide project‑based learning initiatives. She plans to pursue a master’s degree
    in educational leadership to eventually move into an instructional coach role, where she can mentor new teachers and shape policy. Additionally, she hopes to launch a regional after‑school robotics
    club that connects students with local tech companies and university partners.
