  hobbies: '[''Volleyball league participation'', ''Hiking (Kalalau Trail, Waimea Canyon)'', ''Sailing on Kauai’s coast'', ''Tai chi practice'', ''Cooking Chinese–Hawaiian fusion meals'', ''Playing ukulele
    in community jam sessions'', ''Volunteering at local health fairs and science education events'', ''Gardening tropical herbs and fruits'']'
  career_goals: Jie Hua aims to transition into a senior leadership role as Laboratory Manager for the Kauai community hospital, where he can oversee the entire clinical laboratory operation and ensure
    the highest standards of patient safety and diagnostic accuracy. He plans to champion the implementation of new point‑of‑care testing technologies and expand molecular diagnostic capabilities to better
    address emerging infectious diseases in the islands. He also aspires to develop a structured mentorship program that pairs experienced technologists with new graduates, fostering a culture of continuous
    learning. Long‑term, he envisions establishing a consulting practice that assists small hospitals across Hawaii in achieving accreditation, optimizing workflow efficiency, and integrating sustainable
    laboratory practices.
