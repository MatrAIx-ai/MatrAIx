persona_description: A SoC implementation team who is responsible for physically designing and implementing a circuit or digital block based on a design in the gate-level netlist. They are tasked with ensuring
  that the final design meets all design rules, layout requirements, and other specifications. They are often working with a team of engineers, including designers, physical implementers, and QA teams,
  to achieve this goal. The team is responsible for identifying and resolving any design roadblocks, such as lithographic hotspots, to ensure the final product meets the desired specifications.
