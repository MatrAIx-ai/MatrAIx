  hobbies: '[''LEGO Technic building'', ''Arduino and simple robotics projects'', ''Competitive video gaming (Rocket League, Fortnite)'', ''Basketball at community center'', ''Reading sci‑fi and adventure
    novels'', ''Creative writing and journaling'', ''Hiking and fishing with family'', ''Beginner guitar practice'']'
  career_goals: James imagines a future where he can combine his love for tinkering, coding, and practical problem‑solving. He dreams of designing and programming robots or automated tools that help local
    farms and small businesses in Centralia, seeing this as a way to make a tangible difference in his community. In the near term, he wants to join his middle‑school robotics club, win regional competitions,
    and earn a scholarship that will let him study mechanical engineering or computer science with a focus on robotics or automotive technology. He also hopes his career will allow him to create user‑friendly
    digital tools that support peers who experience anxiety, giving them reliable resources they can trust.
