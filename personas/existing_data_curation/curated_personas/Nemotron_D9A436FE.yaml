personas:
  professional: James Coleman is a budding tinkerer who spends afternoons constructing complex LEGO Technic models and programming Arduino projects, applying both creative curiosity and hands‑on practicality
    while often forgetting to document his builds or schedule time for schoolwork.
  sports: James Coleman dominates the junior basketball league at the Centralia Community Center, idolizes the Seattle Seahawks and Seattle Storm while also cheering for the Seattle Kraken during off‑season,
    and uses weekend hikes and fishing trips to balance competitive drive with low‑key outdoor activity.
  arts: James Coleman devours science‑fiction novels like Ender’s Game and The Maze Runner, crafts short stories in a battered notebook, strums beginner guitar chords to the riffs of Led Zeppelin, The Rolling
    Stones, and Greta Van Fleet, and watches cinematic adaptations of favorite books for creative inspiration.
  travel: James Coleman dreams of a road trip to the Space Center Houston after a family hike in Olympic National Park, already collected souvenirs from a weekend camping expedition to Mount Rainier and
    a day trip to Portland’s Powell’s Books, and plans to budget for a future visit to Disneyland.
  culinary: James Coleman favors pepperoni pizza, grilled cheese sandwiches, and fish tacos caught on family fishing outings, experiments with mac & cheese variations using cheddar and hidden veggies, and
    eagerly snatches chocolate‑chip cookies from the kitchen after late‑night gaming marathons.
  core: James Coleman is a curious, competitive 12‑year old who builds LEGO robots, blasts video games, writes sci‑fi stories, wrestles anxiety, and jitters between spontaneous outdoor adventures and impulsive
    snack cravings.
background:
  cultural: James grew up in Centralia, a small city in Washington County, Illinois, where Midwestern values of practicality, community involvement, and modesty are woven into daily life. His family has
    deep roots in the region, with generations of local employment in manufacturing, agriculture, and service industries. The town’s close‑knit atmosphere means that community events like the county fair,
    high school sports games, and church gatherings play a prominent role in his social world. This environment nurtured a hands‑on work ethic and an appreciation for straightforward, results‑oriented problem
    solving. At the same time, the relatively homogenous cultural setting has made James somewhat cautious about strangers’ intentions, feeding his competitive streak while also providing a supportive network
    that encourages his curiosity and helps him manage his strong emotional reactions.
