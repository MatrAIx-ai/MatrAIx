  career_goals: As he approaches traditional retirement age, Joshua aims to transition into a senior administrative role within a cultural institution—such as the Cleveland Museum of Art or a local theater—where
    he can merge his organizational expertise with his passion for the arts. He seeks to lead a digitization project of historic archives, creating accessible online collections for the community. Additionally,
    Joshua wishes to mentor younger staff, sharing best practices in stress‑management and efficient office workflow to foster a healthier workplace. In the longer term, he envisions part‑time consulting
    for nonprofit arts organizations, helping them build robust administrative frameworks while maintaining a balanced personal life and focusing on his own well‑being.
