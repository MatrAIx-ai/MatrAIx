persona_description: A political figure from India who is opposed to the US proposal to phase out the use of highly polluting chemicals under the Montreal Protocol. The individual believes that HFCs should
  be regulated under the UN Framework Convention on Climate Change and the Kyoto Protocol instead of under the Montreal Protocol, citing India's concerns about the financial and legal implications of regulating
  HFCs under the latter. The individual is also concerned about the reluctance of developing countries to take on binding commitments and the financial burden of regulating HFCs under the Montreal Protocol.
