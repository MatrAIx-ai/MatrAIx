  hobbies: '["traditional Mexican cooking", "dance (folkloric and salsa)", "gardening", "church volunteer work", "attending cultural festivals", "reading Mexican literature", "community outreach"]'
  career_goals: Ana aims to move into a supervisory or safety‑lead role within the next two years, seeking OSHA forklift certification and formal training in workplace safety. She wants to use her extensive
    experience to mentor younger coworkers, improve operational efficiency, and nurture a harmonious and supportive work environment. While securing a stable income for her upcoming retirement, she also
    hopes to eventually launch a small home‑based Mexican catering service, offering traditional dishes for community events and church gatherings.
