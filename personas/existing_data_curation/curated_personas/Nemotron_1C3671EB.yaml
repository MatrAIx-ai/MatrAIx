personas:
  professional: Tonya Brown, a customer service representative with a talent for active listening and empathy, they leverage their expertise in Zendesk and Salesforce to de-escalate tense calls, employ
    structured checklists and flexible time-blocking to meet metrics, and quietly channel their curiosity for visual design into occasional Canva graphics while eyeing a future supervisory role.
  sports: Tonya Brown, a low-key fitness enthusiast who favors solo morning walks along the Mississippi River and community yoga classes, they follow the St. Louis Cardinals and Memphis Grizzlies, and quietly
    participate in the Marion Walking Club’s biweekly hikes.
  arts: Tonya Brown, a solitary creative soul who paints river landscapes in a Monet-inspired watercolor style, creates digital illustrations echoing Yuko Nagayama, curates a personal photography series
    of Marion’s historic streets, they find inspiration listening to Nina Simone, Miles Davis, and reading Maya Angelou’s poetry.
  travel: Tonya Brown, a reflective solo traveler who meticulously plans trips to art-rich destinations like New Orleans, Santa Fe, and Paris, they prefer quiet boutique hotels near museums, travel during
    off-peak seasons to stretch limited vacation days, and dream of sketching the Seine’s banks at sunrise.
  culinary: Tonya Brown, a modest home cook who balances comfort and creativity by preparing shrimp and grits with fresh basil, roasted beet salad with goat cheese, and an occasional pecan pie, they experiment
    with smoked paprika and fresh thyme in exploratory baking projects.
  core: Tonya Brown, an introspective customer-service professional who channels anxiety into watercolor river scenes, they rigorously budget every dollar, and habitually loop jazz playlists while occasionally
    postponing paperwork.
background:
  cultural: Tonya comes from a Black Southern family that has deep ties to the Arkansas Delta’s cultural traditions. Growing up in Marion, she was immersed in the rhythms of gospel music at church, the
    storytelling traditions of family gatherings, and community events like Juneteenth celebrations that highlight African‑American artistic expression. These experiences fostered an appreciation for visual
    and musical arts and a strong sense of communal responsibility. She also draws on the resilience and adaptability characteristic of many Black families in the region, balancing pride in her heritage
    with a curiosity about broader artistic movements. Tonya’s cultural identity informs her desire to promote inclusive arts programming that reflects the history and contemporary voices of Black Arkansans.
attributes:
  skills: '[''Active listening'', ''Empathetic communication'', ''Conflict de‑escalation'', ''CRM software (Zendesk, Salesforce)'', ''Data entry'', ''Time management and scheduling'', ''Adaptability to
