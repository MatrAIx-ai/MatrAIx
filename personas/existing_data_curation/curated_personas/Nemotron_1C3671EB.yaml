  hobbies: '[''Watercolor sketching'', ''Digital illustration (Canva, Procreate)'', ''Reading (fiction, art history, psychology)'', ''Photography'', ''Journaling and poetry'', ''Meditation and yoga'', ''Listening
    to jazz, soul, and blues'', ''Volunteer work at library art displays'']'
  career_goals: Tonya aspires to advance beyond front‑line support into a supervisory or training role where she can mentor newer agents and shape service policies. She hopes to earn a supervisory certification
    and complete a community‑college associate degree in communications or arts administration, which would enable her to pivot toward customer‑focused roles in cultural institutions, such as a museum outreach
    coordinator or community‑arts program liaison. She values a work environment that respects mental‑health boundaries, so she aims to negotiate flexible hours and incorporate regular stress‑management
    practices. Long‑term, Tonya envisions leading a small team that connects local residents with art initiatives, using her service experience to foster inclusive, welcoming community events.
