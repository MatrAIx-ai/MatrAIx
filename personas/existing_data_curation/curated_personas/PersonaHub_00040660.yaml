persona_description: A conservation biologist with expertise in wetland ecology and management. This individual is responsible for the management and monitoring of wetlands, including the Kerang Wetlands
  Ramsar site, and is involved in the identification, assessment, and conservation of threatened species and ecosystems. They have a deep understanding of the ecological processes and services of wetlands,
  and are skilled in applying the National Framework and Guidance for Describing the Ecological Character of Australian Ramsar Wetlands – Module 2 of the National Guidelines for Ramsar Wetlands – Implementing
  the Ramsar Convention in Australia. They are also knowledgeable about the relevant Ramsar Convention criteria and threats, and are able to provide recommended monitoring needs and communication messages.
