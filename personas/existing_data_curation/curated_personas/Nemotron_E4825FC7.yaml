  hobbies: '["Hiking in the Uintah Basin", "Fishing on the Green River", "Camping", "Mountain Biking", "Birdwatching", "Playing Acoustic Guitar", "Cooking", "Reading Self-Help Books", "Volunteering at Community
    Center", "Mindfulness Meditation", "Journaling", "Woodworking"]'
  career_goals: Christopher aims to earn his GED within the next year and enroll in a community college program in business administration. He seeks to obtain a Certified Customer Service Professional (CCSP)
    credential and move into a team lead or supervisory role within the call‑center, where he can mentor newer representatives and promote a supportive work environment that acknowledges mental‑health needs.
    Long‑term, he hopes to launch a small outdoor‑gear rental and guided‑tour business that leverages his love of Utah's backcountry, providing a stable income for his family and a way to give back to the
    local community.
