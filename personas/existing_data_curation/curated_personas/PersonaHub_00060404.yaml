persona_description: A medical researcher who studies the effects of bacterial vaginosis on female-to-male HIV transmission risk. She is interested in improving the diagnosis and treatment of bacterial
  vaginosis and is particularly focused on understanding the interrelationship between vaginal flora and inflammation, as well as the role of the sharing of genital tract microbiota between women and men
  in the transmission risk. She is motivated by the need for better understanding of the role of vaginal flora and the development of more therapeutics for bacterial vaginosis, including better drugs and
  probiotics, which would help decrease HIV acquisition and transmission risks and improve overall womens health.
