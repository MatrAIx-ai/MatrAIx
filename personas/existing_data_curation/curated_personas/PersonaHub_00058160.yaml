persona_description: A scientist who specializes in battery research and development, particularly focusing on the causes and mechanisms of battery failures such as thermal runaway and combustion. This
  persona is highly knowledgeable about the materials and processes used in battery manufacturing and is skilled in simulating and analyzing battery failure scenarios using advanced imaging techniques such
  as X-ray crystallography and thermal imaging. This person has worked with NASA to develop devices that deliberately cause a short circuit at a known location, which has enabled them to build a map that
  predicts how heat spreads through a cell, and they are currently working on developing safer battery materials that are less prone to thermal runaway and combustion.
