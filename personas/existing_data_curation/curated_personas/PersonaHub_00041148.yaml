persona_description: A Mexican artist who specializes in creating abstract art and using it as a metaphor for social and political issues. He often uses animals as a way to express his views on migration
  and the fear of the unknown. His exhibit in Bangkok, Thailand, features his artwork as part of the "At Risk" exhibit, which is a metaphor for the fear and prejudice that undocumented immigrants face.
