persona_description: A professional involved in the development and implementation of transport standards for unmanned systems in the aerospace industry. This individual is responsible for understanding
  the needs and requirements of the Joint Architecture for Unmanned Systems (JAUS) and contributing to the development of transport standards that support the rapid and cost-effective development and maintenance
  of unmanned systems. The persona is knowledgeable about the characteristics and concerns relevant to the design of transport standards for JAUS messages between JAUS-compliant entities. They have experience
  in the use of unmanned systems and are aware of the importance of an open standard for unmanned systems to support the development of new unmanned systems. The persona is skilled in the design and implementation
  of transport standards and is constantly looking for ways to improve and expand the JAUS standards into new areas.
