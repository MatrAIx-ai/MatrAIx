personas:
  professional: Kehinde Bartley, a retired logistics supervisor turned senior advisory board chair, leverages methodical project planning, meticulous budgeting, and a competitive drive to organize community
    events with precision, while cautiously vetting volunteers to ensure reliability.
  sports: Kehinde Bartley enjoys daily walks with their spouse, participates in senior‑friendly hikes at the nearby state park, and faithfully cheers on the local baseball team, the River Valley Hawks,
    while occasionally playing a friendly bridge tournament in the community center lounge.
  arts: Kehinde Bartley sings in the church choir, immerses themselves in the sounds of Nina Simmons, John Coltrane, and Aretha Franklin, and attends quarterly local theater productions featuring works
    by August Wilson, which shape their sense of community and identity.
  travel: Kehinde Bartley prefers structured, senior‑discount travel itineraries, having explored New Orleans for its jazz heritage, Washington DC for its historic monuments, and the Great Smoky Mountains
    for tranquil hikes, while planning a future pilgrimage to the birthplace of civil‑rights activism, Selma.
  culinary: Kehinde Bartley excels at cooking classic Southern comfort foods such as fried catfish, collard greens, sweet potato pie, and cornbread, often seasoning with smoked paprika and fresh herbs,
    and enjoys sharing these dishes with family during weekend gatherings.
  core: Kehinde Bartley blends a structured, competitive mindset with a warm community spirit, balancing meticulous planning, financial caution, health vigilance, and a love for music, food, and history
    while occasionally succumbing to worry and a stubborn streak.
background:
  cultural: Kehinde is an African‑American who grew up in the South during the civil‑rights era, a background that instilled a deep sense of resilience, community, and faith. The traditions of his family—Sunday
    church services, gospel and soul music, and cooking hearty Southern meals—continue to shape his daily life. After moving to Phoenix, he became an active participant in the city’s black cultural scene,
    joining Juneteenth festivals, supporting local NAACP initiatives, and fostering connections within the African‑American senior community. His cultural heritage informs his values of reliability, mentorship,
    and a structured approach to both work and recreation.
