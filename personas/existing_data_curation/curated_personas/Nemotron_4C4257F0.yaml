  career_goals: Even at three, Hollis has expressed whimsical yet purposeful aspirations. He often says he wants to become a firefighter because he likes the idea of helping people and using the big red
    truck he sees in the neighborhood. He also enjoys pretending to be a teacher, sharing storybooks with his friends at preschool. Occasionally he talks about building houses like the ones he constructs
    with blocks, hinting at a future interest in architecture. These goals reflect his balance of curiosity about the world and a practical desire to be useful in his community.
