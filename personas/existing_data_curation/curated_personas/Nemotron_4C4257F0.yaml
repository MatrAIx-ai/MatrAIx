personas:
  professional: Hollis Proffitt, a three‑year‑old budding architect of block towers, applies methodical planning, practical curiosity, and a surprisingly reliable follow‑through to every construction project,
    often organizing the playroom layout before peers even start their own builds and they eagerly manage each step with competitive enthusiasm.
  sports: Hollis Proffitt, a three‑year‑old energetic dynamo, spends mornings at a preschool soccer club, proudly wears a Chicago Cubs jersey while practicing dribbling, and after rainy days they mix competitive
    tag games with organized obstacle courses, showing an unmistakable competitive spirit even in simple playground races.
  arts: Hollis Proffitt, a three‑year‑old, delights in drawing vibrant dinosaurs inspired by Mo Willems picture books, sings along to the upbeat tunes of Raffi and Sesame Street’s “Rubber Duckie,” and when
    watching TV they eagerly request repeats of “Bluey,” weaving these artistic influences into daily pretend‑play performances.
  travel: Hollis Proffitt, a three‑year‑old explorer, loves the short road trips to Grandma’s farm in the Catskills, enjoys the splashy water play at the local aquarium, and dreams of the colorful rides
    at Disneyland in Anaheim, preferring parent‑planned itineraries that balance nap times with ample snack breaks.
  culinary: Hollis Proffitt, a three‑year‑old foodie, swears by creamy mac and cheese sprinkled with tiny broccoli florets, insists on crunchy apple slices dipped in peanut butter, and can’t resist a chocolate‑yogurt
    parfait topped with granola and gummy bears.
  core: Hollis Proffitt, the three‑year‑old who balances relentless curiosity with unshakable practicality, organizes toys like a tiny CEO, competes fiercely in sandbox games, hoards spare change, and occasionally
    refuses bedtime to finish a tower of blocks.
background:
  cultural: 'Hollis was raised in a white, Southern family in Halifax County, Virginia. His household reflects typical rural Virginian values: close‑knit family ties, regular attendance at a local Baptist
    church, and participation in community events such as county fairs and church picnics. Family meals feature Southern staples like biscuits and fried chicken, and gatherings often include storytelling
    and music, reinforcing a sense of hospitality and community. This environment nurtured his sociable and outgoing nature while also providing structured routines that support his methodical and reliable
    traits.'
