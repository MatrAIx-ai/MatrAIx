  hobbies: '[''Long-distance road trips'', ''Motorcycle maintenance'', ''Fishing'', ''Hiking'', ''Home brewing'', ''Strategic board games (chess)'', ''Vintage car restoration'', ''Reading non-fiction (economics,
    logistics, technology)'', ''Photography'']'
  career_goals: Maxwell aims to move from a driver‑sales hybrid role into a regional logistics supervisory position within the next three years, earning a Certified Transportation Professional designation
    and completing a business management certificate. He is motivated to lead a team that implements data‑driven efficiency improvements and to achieve a zero‑incident safety record. Ultimately, he aspires
    to launch his own mid‑size freight brokerage serving the New England market, leveraging his combined expertise in driving, sales, and logistics to build a competitive, customer‑focused operation.
