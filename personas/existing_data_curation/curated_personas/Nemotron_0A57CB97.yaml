  career_goals: Chong aims to become a Board‑Certified Clinical Pharmacotherapy Specialist with a focus on personalized medicine and pharmacogenomics. He plans to lead a multidisciplinary pharmacy department
    at a major health system in the Washington, D.C. area, integrating AI‑driven medication safety platforms. He also envisions launching a community‑focused wellness pharmacy that blends evidence‑based
    Western practices with culturally informed herbal knowledge from his heritage. Over the next five years, he wants to present research at national pharmacy conferences, publish articles that illustrate
    complex drug mechanisms through visual art, and mentor junior pharmacists in both clinical expertise and creative thinking. Long‑term, he hopes to earn a PhD in pharmacogenomics and author a book that
    bridges pharmacology, art, and patient empowerment.
