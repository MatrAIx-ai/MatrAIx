personas:
  professional: A data entry specialist named Nikki Runnion thrives on designing airtight SOPs, leveraging 80-wpm typing and advanced Excel functions while they channel their competitive edge into relentless
    error-reduction projects.
  sports: A methodical sports fan named Nikki Runnion follows the Chicago Cubs and Chicago Blackhawks, they play in a co-ed adult soccer league on Saturdays, and they keep fit with twice-weekly Pilates
    at the CoreFlow studio.
  arts: A disciplined arts enthusiast named Nikki Runnion immerses themselves in Philip Glass's minimalist piano works, binge-watches Christopher Nolan's structurally intricate films, they attend monthly
    board-game nights featuring Terraforming Mars, and their soundtrack often includes Explosions in the Sky.
  travel: A planner-centric traveler named Nikki Runnion crafts detailed bullet-journal itineraries, they've explored Kyoto's temples, Iceland's glaciers, and Copenhagen's design districts, but they prefer
    short, budget-friendly weekend trips to Shenandoah National Park.
  culinary: A systematic home cook named Nikki Runnion batch-preps quinoa grain bowls with roasted sweet potatoes, chickpeas, tahini, they perfect stovetop risotto using Arborio rice, white wine, and Parmesan,
    and they meticulously follow a classic French onion soup recipe featuring caramelized onions and Gruyere.
  core: Nikki Runnion is an orderly, anxiety-prone data analyst who turns their competitive drive into flawless data work, strict budgeting, and meticulously planned hobbies while battling occasional perfectionist
    paralysis.
background:
  cultural: Nikki grew up in a middle‑class white family in the Mecklenburg County area of North Carolina, where Southern values of politeness, hard work, and community are woven into daily life. Her upbringing
    emphasized reliability, modesty, and a respect for tradition, which reinforced her preference for structure and predictability. While she participates in local customs such as occasional church gatherings
    and community festivals, she tends to keep her social circles small and private. The region’s emphasis on stability and clear expectations mirrors her own disciplined personality, and her cultural roots
    subtly influence her tastes in music (classic country and Southern rock) and her appreciation for local outdoor spaces, which she visits for quiet reflection.
attributes:
  skills: '[''Fast typing (80+ wpm)'', ''Data entry accuracy (99.9%)'', ''Microsoft Excel (advanced formulas & pivot tables)'', ''Database basics (SQL queries)'', ''Data validation & quality control'',
