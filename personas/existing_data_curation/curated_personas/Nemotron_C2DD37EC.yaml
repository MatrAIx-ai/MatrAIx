  career_goals: Nikki aspires to transition from a data entry keyer to a senior data quality analyst and eventually a team lead responsible for overseeing data integrity across the organization. She plans
    to earn certifications such as Microsoft Office Specialist and the Certified Data Management Professional (CDMP) to bolster her technical credentials. Her ambition includes spearheading process‑improvement
    projects that reduce entry errors and increase throughput, as well as mentoring new hires to uphold the high standards she values. A structured, supportive work environment that offers clear performance
    metrics and mental‑health resources is essential to her long‑term career satisfaction.
