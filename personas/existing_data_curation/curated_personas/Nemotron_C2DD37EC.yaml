  hobbies: '[''Bullet journaling'', ''Sudoku and crossword puzzles'', ''Yoga and Pilates'', ''Cooking and meal prepping'', ''Reading non‑fiction (productivity, psychology)'', ''Small‑group board games (e.g.,
