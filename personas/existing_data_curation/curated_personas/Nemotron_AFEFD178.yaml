  hobbies: '[''Cooking Dominican cuisine'', ''Salsa dancing'', ''Yoga and mindfulness meditation'', ''Reading historical fiction'', ''Gardening'', ''Volunteering at community center'', ''Hiking'', ''Journaling'']'
  career_goals: Blanca aims to earn a Master’s in Educational Leadership within the next three years, positioning herself for a department chair role in English. She wants to launch a bilingual literacy
    initiative across Berks County schools and create a mentorship program for new teachers that emphasizes collaborative planning. Long‑term, she envisions becoming a professional development facilitator
    focused on culturally responsive teaching and inclusive classroom practices.
