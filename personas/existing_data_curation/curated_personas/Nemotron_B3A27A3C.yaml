  hobbies: '[''Visiting art galleries and museums'', ''Woodworking and DIY projects'', ''Cooking and recipe experimentation'', ''Chess'', ''Mexican folk dancing'', ''Live music attendance'', ''Gardening'',
    ''Reading historical biographies'', ''Coastal trail walking'', ''Card games and storytelling with friends'']'
  career_goals: Although retired, Jorge aims to leave a lasting legacy by documenting his family’s migration story and contributing to the preservation of Mexican heritage in Quincy. He plans to volunteer
    as a cultural mentor at the local public library and senior center, help organize an annual Mexican heritage festival, and collaborate with art museums to curate exhibitions on Mexican folk art. A personal
    ambition is to travel back to his hometown in Mexico to reconnect with relatives and bring authentic stories and recipes back to his community. He also hopes to author a memoir that blends personal
    anecdotes with reflections on cultural identity and lifelong learning.
