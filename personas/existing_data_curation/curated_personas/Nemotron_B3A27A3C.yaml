personas:
  professional: Jorge Martinez, a retired master woodworker and cultural liaison, they bring their meticulous project planning and bilingual skills to restore historic furniture, mentor volunteers and curate
    folk art workshops for local museums, balancing a competitive drive to perfect each piece with a methodical approach to community service.
  sports: Jorge Martinez maintains fitness through daily walks along the New England coastline, periodic low‑impact tai chi at the Quincy Senior Center Wellness Club, and avidly follows the Boston Red Sox,
    Boston Celtics and New England Patriots, while they also join a local senior bocce league for social competition.
  arts: Jorge Martinez immerses themselves in the Boston Museum of Fine Arts to study works by Frida Kahlo and Diego Rivera, attends Boston Symphony Orchestra concerts featuring Beethoven and Tchaikovsky,
    and volunteers to lead workshops on traditional folk music with a regional Mariachi ensemble, allowing their curiosity and competitive edge to shine as they curate culturally resonant exhibitions.
  travel: Jorge Martinez plans a nostalgic trip to their parents’ hometown in Jalisco to reconnect with relatives and gather authentic recipes, while also enjoying short coastal getaways to Cape Cod and
    a cultural tour of the Smithsonian in Washington, D.C., they favor organized itineraries and modest travel budgets.
  culinary: Jorge Martinez delights in crafting mole poblano with roasted chilies and chocolate, experimenting with chipotle‑infused quinoa tacos, and perfecting tamales using heirloom corn masa, they often
    pair their creations with fresh cilantro, lime, and avocado slices for family gatherings.
  core: Jorge Martinez blends methodical craftsmanship with a boundless curiosity for art and heritage, they channel a competitive spirit into community mentorship while habitually double‑checking every
    wood joint and never missing a Sunday chess match, even if it means postponing their afternoon nap.
background:
  cultural: Jorge is a first‑generation Mexican American whose parents emigrated from Jalisco in the 1950s. Growing up in Boston’s vibrant Latino neighborhoods, he was raised bilingual and immersed in traditional
    customs such as Día de los Muertos, quinceañera celebrations, and communal cooking. While honoring his Mexican roots—through cuisine, music, and art—he also embraced New England values of punctuality,
    community service, and civic participation. His cultural identity blends Mexican familial warmth and reverence for heritage with the organized, collaborative spirit of his Massachusetts community.
attributes:
  skills: '[''Furniture restoration'', ''Traditional Mexican cooking'', ''Electrical troubleshooting'', ''General home repair'', ''Community event coordination'', ''Bilingual communication (Spanish/English)'',
