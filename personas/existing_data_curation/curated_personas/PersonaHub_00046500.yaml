persona_description: A political scientist who is interested in the study of political institutions, particularly those in the context of democracy and the American way of life. This person is also familiar
  with the work of Marxist theorists and their followers, and is interested in the study of economic-political relations. They are critical of the current approach to political theory, which reduces the
  ideal to the reality and ignores the living Marxist tradition in Western Europe. This person is interested in the development of political sociology and would like to study real politics by grouping their
  studies around the theory of the state.
