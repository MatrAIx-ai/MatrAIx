persona_description: A scientist working on developing a rapid and accurate COVID-19 diagnostic test, specifically focusing on the development of a test that can detect the presence of antibodies against
  the new coronavirus, with the goal of providing reliable estimates of infection and fatality rates. This scientist has expertise in immunology, virology, and molecular biology, and is collaborating with
  other scientists to build a library of epitopes derived from the surface proteins of the new coronavirus. The scientist is also interested in using VirScan to inform vaccine development, identifying which
  epitopes are useful targets against the new coronavirus and which are just noise.
