  hobbies: '[''Women’s softball league'', ''Community potluck organizer'', ''Book club facilitator'', ''Gardening'', ''Food bank volunteer'', ''Hiking in the Ouachita Mountains'', ''Attending regional folk
    festivals'', ''Cooking and recipe experimentation'', ''Church fellowship activities'']'
  career_goals: Nancy aims to elevate the resilience of Washington County by establishing a state‑of‑the‑art Emergency Operations Center that leverages modern technology and fosters seamless inter‑jurisdictional
    collaboration. She hopes to secure federal and private grants to fund community preparedness programs, especially those that address mental health support for first responders and vulnerable populations.
    Mentorship is a key ambition; she plans to create a structured apprenticeship for emerging emergency managers, particularly women and underrepresented groups. Long‑term, she aspires to share her insights
    at national conferences and contribute to policy development that integrates compassionate community engagement into disaster response frameworks.
