persona_description: A historian who specializes in the history of the Holocaust, particularly the events that took place at Auschwitz-Birkenau. She is deeply interested in the architectural and spatial
  design of the crematoria and the role they played in the mass murder of Jews and other persecuted groups during World War II. She is particularly interested in the role of the Commandant of Auschwitz,
  Rudolf Hoss, in overseeing the use of the crematoria and the impact it had on the lives of the victims.
