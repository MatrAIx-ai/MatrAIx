persona_description: A marine scientist who is passionate about understanding the complex marine ecosystem of Puget Sound and the impacts of human activities on the marine environment. They are dedicated
  to conducting research, monitoring, and data analysis to identify trends and changes in the water exchange and circulation between Puget Sound and the Pacific Ocean. They are interested in measuring water
  velocity, understanding the influence of low-oxygen water and corrosive water with very low pH, and increasing understanding about the transport of toxic chemicals and ocean acidification. They are open
  to innovative and cost-effective solutions and partnerships to achieve their research goals.
