persona_description: A fisheries and conservation advisor for WWF Canada who has worked with fish harvesters and processors to develop and implement sustainable fishing practices, particularly in the Grand
  Banks area. She is knowledgeable about the collapse of the cod fishery in the 1960s and 1990s, and has helped to revitalize the industry through the creation of the Newfoundland and Labrador Groundfish
  Industry Development Council. She is interested in the ongoing efforts to rebuild the cod fishery and believes that a cautious return to cod fishing will benefit coastal communities across Newfoundland
  and Labrador.
