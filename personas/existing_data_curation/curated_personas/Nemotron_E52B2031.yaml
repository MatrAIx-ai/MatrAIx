personas:
  professional: David Miller, a 35‑year‑old facilities operations manager, merges their meticulous organization and empathetic leadership to oversee HVAC, electrical, plumbing, and mechanical systems, applying
    data‑driven decision‑making for energy optimization while flexibly adapting to unexpected maintenance challenges.
  sports: David Miller, who rides with the Philadelphia Cycling Club on weekend trails, hikes the waterfalls of Ricketts Glen State Park during summer, and follows the Philadelphia 76ers passionately, they
    structure cardio workouts into a weekly schedule to offset a desk‑bound job and relieve stress.
  arts: David Miller, an avid fan of classic rock legends like The Rolling Stones and indie filmmaker Wes Anderson, they attend monthly screenings at the Philadelphia Film Forum, enjoy Broadway‑style performances
    starring Meryl Streep on streaming platforms, and occasionally dabble in watercolor painting to unwind.
  travel: David Miller, who meticulously plans trips months ahead to fit a busy schedule, they favor weekend escapes to historic Charleston, South Carolina and longer adventures to Iceland’s Golden Circle,
    opt for eco‑friendly lodgings, and balance a modest travel budget with a desire for experiential learning.
  culinary: David Miller, a confident home cook, they enjoy mastering Mediterranean dishes such as grilled lamb with rosemary and roasted vegetable quinoa, source fresh basil and heirloom tomatoes from
    the local farmer’s market, and occasionally indulge in a perfectly seared steak at a neighborhood gastropub for a change of pace.
  core: David Miller, a detail‑obsessed facilities expert who worries about every leak yet they can’t resist late‑night pizza rolls while binge‑watching Philadelphia 76ers highlights, blends structured
    planning with a hands‑on DIY curiosity.
background:
  cultural: David grew up in a middle‑class White American family in the suburban corridor between Wilmington and Philadelphia. His upbringing was shaped by the Mid‑Atlantic emphasis on community, a strong
    work ethic, and modest conservative values. He was exposed to Protestant (Methodist) traditions and celebrates holidays such as Thanksgiving and the Fourth of July with his extended family. The region's
    blend of industrial heritage and coastal recreation fostered his practical problem‑solving mindset and respect for regulations. As a married resident of Claymont, DE, he participates in local neighborhood
    events, values family cohesion, and maintains ties to the broader cultural fabric of New Castle County.
