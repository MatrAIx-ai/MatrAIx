  hobbies: '["DIY Home Improvement Projects", "Gardening (vegetable and ornamental)", "Cycling on local trails", "Hiking in state parks", "Reading non-fiction (self‑improvement, management)", "Cooking and
    experimenting with recipes", "Volunteering with community organizations", "Watching basketball (Philadelphia 76ers)"]'
  career_goals: David aims to progress to a senior regional facilities director role overseeing multiple sites across the Mid‑Atlantic, where he can lead a strategic sustainability transformation to achieve
    net‑zero energy operations. He plans to earn LEED AP and Certified Facility Manager credentials, mentor emerging facilities professionals, and develop a comprehensive resilience plan for critical infrastructure.
    Long‑term, he envisions launching a consulting practice that helps organizations improve operational efficiency and emergency preparedness while preserving a healthy work‑life balance.
