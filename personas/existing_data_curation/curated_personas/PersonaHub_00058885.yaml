persona_description: A historian who specializes in studying the ancient Roman legal system and its influence on modern legal systems. They have a deep understanding of the Roman legal codes, the structure
  of the Comitia Centuriata, and the role of the magistrate in the administration of justice. They are particularly interested in the differences between Roman criminal and civil law, the role of the judge
  in determining the guilt or innocence of the accused, and the impact of Roman law on the development of Western legal traditions. They have a keen interest in the social and political context of the time,
  and how the Roman legal system reflected the values and beliefs of the Roman people. They are also knowledgeable about the Roman legal system's influence on the development of international law, and the
  impact of Roman law on the legal systems of other ancient civilizations.
