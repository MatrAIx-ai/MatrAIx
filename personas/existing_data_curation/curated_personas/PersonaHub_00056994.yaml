persona_description: A historian or political scientist who is interested in the history of indigenous movements in Mexico, the role of the federal government in controlling these movements, and the impact
  of these movements on the social, political, and economic life of Mexico. They are also interested in the fluid and evolving power relationships between indigenous leaders and government officials, and
  the ways in which these movements redefined the ways in which indigenous communities engaged with governments. They are likely to be familiar with the work of Maria L. O. Munoz and the topics covered
  in her book "Stand up and Fight" and "Participatory Indigenismo, Populism, and Mobilization in Mexico, 1970-1984".
