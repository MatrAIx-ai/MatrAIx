personas:
  professional: John Green, a four‑year‑old with a budding fascination for building tiny block cities, turns playtime into a micro‑enterprise by meticulously sorting LEGO pieces while still allowing spontaneous
    redesigns, and they often fiercely compete with their stuffed animals for the title of ‘Chief Architect.’
  sports: John Green, a four‑year‑old who prefers quiet corners but occasionally joins the neighborhood tee‑ball squad, cheers for the Springfield Starlings, and they practice solo obstacle‑course drills
    in the backyard while competitively racing their cat for supremacy.
  arts: John Green, a four‑year‑old enchanted by Dr. Seuss’s vivid illustrations, the playful melodies of Disney’s 'Frozen' soundtrack, and the tactile sculptures at the Children’s Museum, spends solitary
    afternoons drawing dinosaurs on recycled paper, and they cherish the unconventional, color‑burst world that fuels their endless curiosity.
  travel: John Green, a four‑year‑old who relishes family trips to the serene lakeside cabin in the Adirondacks and the bustling interactive exhibits at the London Science Museum, favors early‑morning nature
    walks over crowded amusement parks, and they meticulously draw simple maps of each destination before setting off.
  culinary: John Green, a four‑year‑old who adores creamy mac and cheese, crunchy carrot sticks, and the sweet aroma of cinnamon‑sprinkled pancakes they help stir with a wooden spoon, yet they stubbornly
    refuse peas, and they delight in arranging food into smiley faces on their plate.
  core: John Green is a curious, solitary four‑year‑old whose competitive spirit and vivid imagination are balanced by frequent anxiety and a love for quiet, self‑directed play, and they often retreat to
    their own world for comfort.
background:
  cultural: John is raised in a white American family in Fort Worth, Texas. His family values Southern hospitality, community involvement, and early childhood education. Regular visits to local museums,
    art centers, and the public library nurture his appreciation for art and new ideas, while weekend family outings to nearby parks and community festivals expose him to a variety of experiences that shape
    his curiosity.
attributes:
  skills: '["Color and shape recognition", "Basic letter identification", "Fine motor coordination with crayons and building blocks", "Storytelling through pictures", "Simple puzzle assembly", "Following
    short instruction sequences"]'
  hobbies: '["Drawing and coloring", "Building with blocks", "Backyard nature exploration", "Listening to storybooks", "Solving simple puzzles", "Sandplay in a quiet area"]'
  career_goals: John often talks about becoming an astronaut who can explore space, an artist who can paint big pictures, or a wildlife explorer who discovers animals. He also hopes to make people smile
    by drawing pictures and wants to keep learning new things from books and the world around him.
