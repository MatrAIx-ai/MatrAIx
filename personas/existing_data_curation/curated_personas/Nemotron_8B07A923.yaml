  career_goals: Jill often says she wants to be a teacher because she likes clear schedules, helping children learn, and creating a tidy classroom where everyone knows what to do. She also imagines caring
    for animals as a veterinarian, reflecting her love for pets and a desire to provide structured, compassionate care.
