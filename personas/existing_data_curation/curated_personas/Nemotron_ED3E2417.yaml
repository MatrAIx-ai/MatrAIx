  career_goals: Diana aims to lead a forward‑looking compensation strategy for a mid‑size technology firm, integrating data‑driven equity metrics and diversity‑focused pay structures. She aspires to publish
    research on compensation fairness within multicultural workplaces and to mentor the next generation of HR analysts, especially women and Hispanic professionals. In the next five years, she plans to
    transition into a senior advisory role, offering consultancy to small businesses seeking sustainable benefits programs, while also establishing a scholarship that supports Mexican‑American students
    pursuing studies in HR or the arts.
