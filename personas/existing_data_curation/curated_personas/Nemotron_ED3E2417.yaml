personas:
  professional: Diana Orozco is a seasoned compensation and benefits specialist who leverages three decades of job analysis expertise, advanced Excel and statistical modeling in Python and R, and bilingual
    fluency to craft equitable pay frameworks for tech firms, and they blend analytical rigor with artistic curiosity to design data‑driven equity metrics and mentor emerging HR analysts.
  sports: Diana Orozco finds her primary athletic outlet in solo hikes through Los Padres National Forest, is a member of the Ventura Trail Conservancy hiking club, follows the Los Angeles Dodgers baseball
    season and the LA Galaxy soccer matches on television, and they incorporate light yoga and weekly strength‑training sessions to manage knee osteoarthritis while preserving the solitude they cherish.
  arts: Diana Orozco channels her curiosity into watercolor paintings that blend folk motifs with California vistas, regularly attends LACMA and MOCA exhibitions, studies the works of Georgia O'Keeffe,
    Ansel Adams, and Yayoi Kusama for inspiration, practices classical guitar pieces by Andrés Segovia and John Williams in quiet evenings, and they volunteer weekly to teach basic drawing techniques to
    local youth, infusing each lesson with their methodical yet inventive spirit.
  travel: Diana Orozco designs her travel adventures with meticulous itineraries, favoring off‑season solo trips to serene destinations like Big Sur, the Sequoia groves, and the Japanese zen gardens of
    Kyoto, while also penciling in dream visits to Barcelona’s art districts and the historic streets of Granada, balancing a modest retirement budget with a yearning for culturally enriching experiences.
  culinary: Diana Orozco delights in preparing authentic family recipes such as chilaquiles with smoky chipotle salsa, carnitas braised in ancho chile, and hand‑made tamales stuffed with heirloom corn masa,
    while they constantly harvest rosemary, sage, and prickly pear from their modest native‑plant garden, and they enjoy pairing these dishes with fresh guacamole and homemade aguas frescas made from hibiscus
    and tamarind.
  core: Diana Orozco blends analytical precision with artistic yearning, thriving on solitary hikes and watercolor sessions, yet they sometimes procrastinate on dental appointments and indulge in spontaneous
    art‑supply splurges, embodying a disciplined yet quietly rebellious spirit.
background:
  cultural: Diana is a second‑generation Mexican‑American who grew up in a bilingual household in Southern California. Her family traditions—celebrating Día de los Muertos, preparing tamales, and listening
    to mariachi—have shaped her identity and aesthetic sensibility. Fluent in both Spanish and English, she maintains strong ties to the Mexican community in Ventura County, participating in cultural festivals
    and supporting local Mexican arts initiatives. Her heritage informs her compassionate yet methodical approach to work, blending Mexican values of family and community with an analytical mindset honed
    through her STEM education.
