  hobbies: '["LEGO DUPLO building", "Drawing and coloring", "Preschool group sing‑along and storytime", "Soccer at the local park", "Participating in traditional Guatemalan music and dance", "Helping prepare
    family foods (e.g., tamales)", "Collecting and organizing stickers"]'
  career_goals: Roxana often talks about growing up to help others. She dreams of becoming a teacher who can teach both Spanish and English, allowing children to share stories from her Guatemalan heritage.
    She also imagines exploring space as an astronaut, fascinated by the stars she sees in the night sky. Occasionally she mentions wanting to be a pediatric doctor, inspired by her calmness when caring
    for her stuffed animals. Her long‑term ambition includes leading community projects in West Covina, such as organizing neighborhood clean‑up days and cultural festivals, reflecting her competitive drive
    to make a visible impact.
