personas:
  professional: Roxana Gonzalez, a budding mini‑architect, transforms LEGO bricks into precise floor plans, displaying methodical organization and a competitive edge as they chart out elaborate playroom
    layouts and eagerly showcase their designs to peers.
  sports: Roxana Gonzalez, an energetic participant in the West Covina Youth Soccer Club, idolizes the LA Galaxy and eagerly practices dribbling and scoring during weekend games, while also cheering for
    the Los Angeles Dodgers and Los Angeles Lakers on family TV nights, balancing a love for team competition with a skeptical eye toward sharing the ball.
  arts: Roxana Gonzalez, a spirited fan of lively marimba rhythms and a frequent karaoke performer of Shakira’s 'Waka Waka' and Disney’s 'Let It Go', delights in watching the animated adventures of Moana
    while enthusiastically mimicking the folk dances taught at the local cultural center, showing a competitive flair for mastering choreography.
  travel: Roxana Gonzalez, an adventurous planner who loves drawing colorful itineraries, enjoys family trips to the San Diego Zoo and Disneyland, dreams of exploring ancient Mayan ruins at Tikal and building
    sandcastles on the beaches of Cancun, and prefers a blend of fast‑paced amusement and relaxed beach downtime, albeit with occasional picky‑eater attitudes on airplane meals.
  culinary: Roxana Gonzalez, a budding kitchen helper who expertly spreads guacamole on tortilla chips and tosses cheese‑filled corn cakes with fresh cilantro, insists on adding a sprinkle of queso fresco
    to her quesadillas, eagerly orders chicken nuggets with ketchup at restaurants, and frequently requests a side of sliced mango, yet sometimes refuses to try new vegetables, showcasing a confident yet
    selective palate.
  core: Roxana Gonzalez, a calm yet competitively spirited five‑year‑old, organizes playdates with meticulous charts, saves every spare coin in a bright piggy bank, and stubbornly refuses broccoli while
    expertly negotiating game rules.
background:
  cultural: Roxana comes from a Guatemalan immigrant family that preserves strong ties to its roots while embracing life in West Covina, California. At home, Spanish is spoken daily, and she learns traditional
    Guatemalan customs such as celebrating Día de los Muertos with altars and sharing pupusas during family gatherings. Her Catholic upbringing includes attending local Mass and observing Semana Santa processions
    with her grandparents. She participates in community events hosted by the local Hispanic cultural center, where she learns folk dances like the marimba and learns the history of the Maya. This blend
    of Guatemalan heritage, bilingual environment, and Californian multicultural exposure shapes her values of family solidarity, respect for elders, and a love for sharing cultural stories with friends.
attributes:
  skills: '["Bilingual Spanish–English communication", "Early literacy (letter recognition, simple reading)", "Counting to 100 and basic addition/subtraction", "Fine motor coordination (drawing, cutting,
