  career_goals: Goldie aspires to become a professional illustrator or concept artist for video games and animated films, and hopes to attend an arts-focused high school that can nurture her talent. She
    is interested in studying graphic design and visual communication at a university, aiming to blend art with technology as a UX designer or creative director. Her competitive nature drives her to seek
    recognition in local and state art competitions and earn scholarships that will support her education. She also dreams of creating a digital portfolio that showcases her work and connects her with mentors
    in the creative industry.
