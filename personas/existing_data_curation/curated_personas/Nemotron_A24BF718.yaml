personas:
  professional: Goldie Skinner is a budding multimedia creator who blends theater improv, digital illustration, and photography to craft narratives, using their curiosity and competitive streak to push
    artistic boundaries while maintaining organized project timelines.
  sports: Goldie Skinner plays forward for the town’s recreational soccer league, idolizes St. Louis City SC’s attacking style, drills every Saturday at the community field, and balances a competitive drive
    with a love for team banter, though they sometimes argue over positions during practice.
  arts: Goldie Skinner curates an Instagram art portfolio featuring sketches inspired by the Missouri countryside, admires the street‑art provocations of Banksy and the vibrant installations of Yayoi Kusama,
    syncs their creative sessions to indie playlists by Tame Impala and Phoebe Bridgers, and spends spare time hand‑crafting beaded jewelry while photographing local museum exhibits at the Saint Louis Art
    Museum.
  travel: Goldie Skinner prefers family road trips that blend adventure and low‑budget exploration, having trekked the Ozark hills, photographed the historic caves at Meramec, and dreaming of a future backpack
    journey to Kyoto’s bamboo forest, all while juggling schoolwork and a tight allowance.
  culinary: Goldie Skinner enjoys whipping up Kansas City‑style BBQ ribs with a sweet‑and‑spicy glaze, perfecting avocado toast topped with heirloom tomatoes and fresh basil, and experimenting with vegan
    chocolate chip cookies for school bake sales, all while swapping recipes with friends over Instagram DMs.
  core: Goldie Skinner is a restless teen artist whose competitive spark fuels a relentless quest for creative expression, even if it means occasional procrastination and a skeptical eye on every new opportunity.
background:
  cultural: Goldie was raised in Scott City, a small Midwestern town in Missouri where community ties, school involvement, and outdoor activities are valued. Her family emphasizes self‑reliance, modesty,
    and a strong work ethic, reflecting the region’s agricultural heritage. Frequent participation in local events such as county fairs, church youth groups, and school clubs has shaped her sociable and
    outgoing nature. The cultural mix of traditional Midwestern values and exposure to regional arts and music informs her appreciation for both classic and contemporary creative expressions.
