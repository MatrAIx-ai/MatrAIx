  career_goals: Maria aims to move into a supervisory role within the billing department of a regional healthcare network. She plans to earn a Certified Professional Coder (CPC) credential to deepen her
    technical expertise and position herself as a go‑to resource for complex claim issues. Over the next five years, she hopes to lead a team of clerks, implement efficiency‑boosting workflows, and serve
    as a trainer for new hires. Maria also envisions transitioning to a remote or hybrid work model that offers greater flexibility while still allowing her to apply her competitive drive to achieve departmental
    performance goals.
