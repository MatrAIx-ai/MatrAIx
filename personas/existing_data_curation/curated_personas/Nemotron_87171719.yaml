    analysis and reporting'', ''Customer service excellence'', ''Conflict resolution and employee relations'']'
  hobbies: '[''Visiting art galleries and studying Latin American modern art'', ''Sketching plating designs and food presentation concepts'', ''Cooking traditional Guatemalan dishes and experimenting with
    fusion recipes'', ''Specialty coffee brewing and tasting'', ''Reading historical biographies and culinary literature'', ''Solving jigsaw puzzles and playing chess'', ''Herb gardening on his patio'',
    ''Weekend hikes in the San Gabriel Mountains'', ''Volunteering at local Guatemalan cultural festivals'']'
  career_goals: Jovanni aims to leverage his extensive operational experience to open a boutique restaurant that showcases authentic Guatemalan dishes alongside creative, art‑inspired presentations, providing
    a cultural bridge for the Pomona community. He is also pursuing a culinary certificate and plans to earn his GED within the next year to formalize his education. In the medium term, he hopes to become
    a regional manager for a multi‑unit hospitality group, where he can implement standardized training programs and operational best practices across locations. Long‑term, he envisions establishing a community
    culinary apprenticeship program that mentors young adults from immigrant backgrounds, combining his competitive drive with a desire to give back.
