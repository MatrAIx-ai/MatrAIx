persona_description: Colleen Chambers and Callie Leonard, two friends from Northeast Ohio who are on a mission to raise awareness about Type 1 diabetes. They grew up in the same area and met at a diabetes
  camp in 2009. Chambers and Leonard are part of the nonprofit "Beyond Type 1" diabetes awareness campaign to educate others about the disease. They want to spread the word about the symptoms and signs
  of type one diabetes, which is a condition where the immune system attacks the cells in the pancreas that make insulin, a hormone that regulates blood sugar. They are working to reduce the stigma around
  diabetes and are now excelling in medical careers, with Chambers working as a nurse practitioner and Leonard working to improve the treatment of diabetes through technology like wireless insulin pumps
  and glucose monitors.
