personas:
  professional: Jay Hallett is an aspiring robotics engineer who spends after‑school hours building and coding LEGO‑based robots for the middle school robotics club, applying methodical planning and calm
    resilience to troubleshoot challenges while a competitive streak pushes them to win every local contest.
  sports: Jay Hallett plays midfield for the Coastal Rangers youth soccer team, follows the Seattle Seahawks and Golden State Warriors with avid enthusiasm, combines weekday after‑school drills with weekend
    hikes along the Atlantic shoreline, and tracks steps and sprint intervals on a smartwatch, showcasing their energetic, competitive, and organized fitness routine.
  arts: Jay Hallett sketches coastal cliffs, creates digital paintings inspired by Studio Ghibli’s Spirited Away, strums acoustic renditions of Ed Sheeran’s Shape of You, collects graphic novels like Saga
    and Watchmen, and posts short TikTok videos set to Bad Bunny tracks, reflecting their artistic curiosity and competitive drive for likes.
  travel: Jay Hallett dreams of backpacking the Pacific Coast Highway, plans weekend trips to the nearby Cape Cod seashore and summer camps in Yosemite, favors adventure over relaxation, saves allowance
    for a youth travel pass to visit Tokyo’s Akihabara for robotics expos, yet balances family constraints by limiting trips to school breaks.
  culinary: Jay Hallett favors quick, flavorful meals like pepperoni pizza, sushi rolls with avocado and cucumber, and homemade banana pancakes, enjoys experimenting with bright food coloring in snack‑time
    treats, and can confidently whip up a grilled cheese while listening to their favorite video game soundtrack, showing a playful yet modest cooking skill level.
  core: Jay Hallett is a curious, calm twelve‑year‑old who blends competitive robotics, sketching, and soccer with a habit of hoarding trading cards and a skeptical eye for shortcuts, always planning the
    next project while forgetting to tidy their room.
background:
  cultural: Jay is a white New Englander growing up in Hampton, a coastal community in Rockingham County, New Hampshire. His family traces its roots to early Anglo‑Saxon settlers and Irish immigrants, and
    he was raised in a middle‑class suburban environment that values community involvement and self‑reliance. He attends a public middle school where participation in extracurriculars like sports, arts,
    and scouting is encouraged. Local traditions such as the July 4th fireworks over the Atlantic, Thanksgiving gatherings, and annual town fairs shape his sense of place, while the nearby Portsmouth Museum
    of Art and the New England coastline nurture his appreciation for history and natural beauty. The region’s emphasis on education, outdoor recreation, and modest competition informs both his personality
    and his aspirations.
