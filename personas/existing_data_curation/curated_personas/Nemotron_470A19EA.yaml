  career_goals: Jay dreams of turning his love for art and technology into a career as a game designer or interactive media developer, where he can create visually striking, story‑driven games. He also
    imagines studying architecture to blend his methodical planning with creative design. In the shorter term, he aims to lead his school's robotics team to regional finals, earn a varsity spot on the soccer
    team, and secure a scholarship to a summer art camp. Over the next decade, he hopes to launch a youth creativity club that combines competitive challenges with collaborative projects, and eventually
    travel abroad to study diverse art traditions and wildlife photography.
