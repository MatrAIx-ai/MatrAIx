personas:
  professional: Zhen Lu is a 36‑year‑old mechanical engineer who transforms abstract concepts into manufacturable designs, directing cross‑functional automotive and renewable‑energy R&D teams with a disciplined
    project‑management style, leveraging Six Sigma and data‑driven problem solving while they mentor junior engineers, file patents, and speak at industry conferences to blend technical precision with artistic
    imagination.
  sports: Zhen Lu cycles the nearby trails with the Midwest Velocity Cycling Club each weekend, follows the Cleveland Browns in the fall and the Chicago Cubs during baseball season, and attends local indoor
    rock‑climbing sessions for winter conditioning, though they sometimes skip workouts when project deadlines trigger heightened stress.
  arts: Zhen Lu channels their imagination into abstract canvases inspired by Kandinsky and Jackson Pollock, performs in community theater productions such as 'Our Town,' curates interactive engineering
    demos at cultural festivals, and hones storytelling skills at Toastmasters, often quoting lines from classic films by Akira Kurosawa and local playwrights.
  travel: Zhen Lu plans trips that balance adventure and relaxation, using a travel‑rewards credit card to book weekend road trips to Chicago’s museums, Milwaukee’s lakeshore, and the Rocky Mountain National
    Park, while dreaming of an immersive cultural tour of Kyoto’s historic shrines and the geothermal landscapes of Iceland once their consultancy takes off.
  culinary: Zhen Lu enjoys cooking a hybrid menu that blends pork bao and shrimp dumplings seasoned with ginger and soy sauce alongside Midwest comfort foods like slow‑cooked beef stew with smoked paprika,
    and they experiment with molecular gastronomy techniques such as agar‑based consommés while maintaining an intermediate skill level in the kitchen.
  core: Zhen Lu is a disciplined engineer with a vivid artistic soul, who balances meticulous project leadership with spontaneous abstract painting, relentless community involvement, occasional over‑thinking,
    and a love for cycling, cooking, and cultural celebration.
background:
  cultural: Zhen is a first‑generation American of East Asian descent, raised in a bilingual household that emphasized respect for tradition, hard work, and collective well‑being. While his family preserves
    cultural practices such as celebrating Lunar New Year and preparing traditional cuisine, Zhen has also fully embraced Midwestern values of community involvement and neighborly cooperation. This blend
    of cultural influences shapes his collaborative work style, his reverence for both artistic expression and technical precision, and his dedication to fostering harmony within his professional and local
    communities.
attributes:
  skills: '["SolidWorks", "AutoCAD", "ANSYS Mechanical", "CFD (Fluent)", "CNC machining", "Rapid prototyping", "Geometric Dimensioning & Tolerancing (GD&T)", "Six Sigma Green Belt", "Project Management
    (MS Project, Primavera)", "Data analysis (MATLAB, Python)", "Technical Writing", "Team Leadership", "Cross‑functional Collaboration"]'
  hobbies: '["Abstract painting", "Conceptual sketching", "3D‑printed mechanical models", "Maker space workshops", "Community theater acting", "Toastmasters public speaking", "Volunteer at cultural festivals",
    "Cycling on local trails", "Mindfulness meditation", "Reflective journaling"]'
  career_goals: Zhen aims to become a principal mechanical engineer leading innovative product development initiatives within the automotive or renewable‑energy sectors. He plans to earn his professional
    engineer (PE) license and acquire a Six Sigma Black Belt to deepen his expertise in process optimization. Over the next five years, he hopes to spearhead a multidisciplinary R&D team that files patents
    for novel mechanical solutions, while also mentoring junior engineers and presenting at industry conferences. Ultimately, Zhen envisions launching his own consultancy that blends cutting‑edge engineering
    with artistic design, helping manufacturers bring imaginative concepts to market while maintaining rigorous quality standards.
