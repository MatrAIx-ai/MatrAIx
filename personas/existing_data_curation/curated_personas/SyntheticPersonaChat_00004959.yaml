    User 1: That''s really cool. I''ve always wanted to learn how to draw.

    User 2: It''s not as hard as you think. You just need to practice a lot.

    User 1: I''ll keep that in mind. Thanks for the tip!

    User 2: No problem!

    User 1: So, what do you like to do for fun?

    User 2: Besides drawing, I love to play music. I play the piano and the guitar.

    User 1: That''s awesome! I love to play music too. I play the guitar and the drums.

    User 2: That''s great! We should jam sometime.

    User 1: I''d love that!

    User 2: Cool! I''ll bring my guitar and you bring your drums.

    User 1: Sounds like a plan!

    User 2: So, what are you up to this weekend?

    User 1: I''m volunteering at the Red Cross. I do that every weekend.

    User 2: That''s really cool! I''ve always wanted to volunteer, but I''ve never had the time.

    User 1: It''s really rewarding. I love helping people.

    User 2: I can imagine. I''m sure you make a big difference in people''s lives.

    User 1: I hope so!

    User 2: You''re so nice. I''m glad I met you.

    User 1: Me too! It was nice talking to you.'
