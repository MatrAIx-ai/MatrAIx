  career_goals: Aurea aims to become a regional director of community association management, overseeing multiple HOAs across the Pacific Northwest while championing sustainable, tech‑enabled community
    living. She plans to earn the Certified Manager of Community Associations (CMCA) credential and pursue an MBA to blend her technical expertise with strategic leadership. In the longer term, she envisions
    launching her own boutique property management firm that focuses on affordable, eco‑friendly housing solutions for growing families. Aurea also aspires to mentor emerging Latinx women in real estate
    and serve on local advisory boards to influence affordable‑housing policy in Chelan County.
