persona_description: A woman who is known for her contributions to the spiritual life, particularly in the field of prayer and the interior life. She is a reformer and founder of the Discalced Carmelite
  order, and her work has had a significant impact on the Church and the spiritual life of individuals. Her book, The Interior Castle, is a guide to the stages of the spiritual life and the goal of union
  with God. She is also the first woman Doctor of the Church and the first woman to be canonized by the Catholic Church.
