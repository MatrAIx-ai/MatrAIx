persona_description: A marine archeologist who specializes in the study of shipwrecks and the artifacts found on them, particularly those from the 19th century. He or she is knowledgeable about the history
  of the American whaling industry and the contributions of the Nantucket whaling ship Two Brothers to the industry. The person is skilled in excavating and analyzing artifacts, and is passionate about
  preserving historical sites. They have a keen eye for detail and are detail-oriented. The persona is likely to be interested in the history of the Pacific and the role of the United States in expanding
  its economic and political influence in the region.
