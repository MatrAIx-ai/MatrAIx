  career_goals: Timothy dreams of becoming an astronaut who can explore space and bring back stories for his classmates, and he also imagines being a mural artist who can brighten his community. He loves
    the idea of helping other children feel safe and happy, so he sometimes talks about being a teacher or a community organizer when he grows up. He is motivated to keep learning so he can turn his curiosity
    about the world into real adventures.
