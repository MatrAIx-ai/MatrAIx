  hobbies: '[''Softball league'', ''Fishing'', ''Hiking on local trails'', ''Classic rock music'', ''DIY woodworking'', ''Model train building'', ''Attending community festivals'', ''Reading about transportation
    technology'', ''Volunteer driver for senior center'']'
  career_goals: Derek aims to transition into a supervisory role within the local transit authority, such as a driver trainer or route manager, where he can mentor new drivers and improve operational efficiency.
    Over the next five years, he plans to earn a certification in transportation safety, contribute to route optimization projects, and eventually serve on the regional transportation planning committee
    while preparing for a comfortable retirement.
