  career_goals: Over the next five years Charlie plans to move into a senior operations director role, overseeing multiple facilities across the Gulf Coast. To support this ambition he is pursuing a PMP
    certification and a Lean Six Sigma Black Belt, focusing on data‑centric process redesign that reduces variability. He also hopes to mentor emerging Black professionals, building an inclusive leadership
    pipeline while implementing wellness initiatives that help his teams cope with the high‑pressure environment he knows all too well.
