  hobbies: '[''Corporate basketball league'', ''DIY home‑improvement'', ''Southern‑style cooking'', ''Gym weightlifting'', ''Listening to R&B/gospel/hip‑hop'', ''Mindfulness meditation'', ''Reflective journaling'',
