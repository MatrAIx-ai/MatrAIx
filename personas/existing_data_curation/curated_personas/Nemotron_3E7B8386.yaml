  hobbies: '[''Visiting Art Museums and Galleries'', ''Photography (Architecture & Street)'', ''Collecting Vintage Posters'', ''Backyard Gardening'', ''Fishing (Galveston Bay)'', ''Cooking (Barbecue & Smoked
    Cuisine)'', ''Community Theater Set Design Volunteering'', ''Live Jazz Concert Attendance'', ''Puzzle Solving (Jigsaw, Sudoku)'']'
  career_goals: Mario aims to advance to a regional operations director role, overseeing multiple facilities across Texas, where he can implement innovative process improvements and mentor emerging leaders.
    He also aspires to integrate his passion for the arts by spearheading corporate‑sponsored community art initiatives, creating a bridge between his company's logistical expertise and Houston's cultural
    scene. In the longer term, he envisions transitioning to a part‑time consulting position that allows him to support small businesses while dedicating more time to his artistic pursuits and family.
