  career_goals: Betzaida aims to complete her GED within the next year and enroll in a community college program focused on hospitality management or culinary arts. In the short term, she seeks part‑time
    employment at a Las Vegas resort or restaurant where she can apply her bilingual customer service skills and learn industry standards. Long‑term, she envisions becoming a hospitality manager or opening
    her own boutique catering business that blends Mexican traditional cuisine with contemporary American flavors. She also aspires to use her social media expertise to promote her culinary ventures and
    serve as a cultural liaison, helping bridge gaps between the Mexican community and the broader tourism industry in Nevada.
