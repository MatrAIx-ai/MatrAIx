    to detail'']'
  hobbies: '[''Visiting art galleries'', ''Watercolor painting'', ''Pottery classes'', ''Experimenting with new recipes'', ''Hiking local trails'', ''Yoga and mindfulness meditation'', ''Reading contemporary
    fiction and science articles'', ''Participating in book clubs'', ''Attending live music and theater shows'', ''Volunteering at community health fairs'', ''Exploring new restaurants'']'
  career_goals: Kimberly aims to become a certified pharmacy technician (CPhT) and eventually pursue a bachelor’s degree in pharmaceutical sciences to qualify for supervisory roles. She is interested in
    specializing in clinical pharmacy support, such as oncology or geriatric medication management, and hopes to lead community health outreach programs that improve medication adherence and health literacy.
    Long‑term, she envisions a leadership position within a retail or hospital pharmacy where she can mentor new staff, integrate health education initiatives, and incorporate creative approaches—like art‑based
    patient wellness activities—into the pharmacy setting.
