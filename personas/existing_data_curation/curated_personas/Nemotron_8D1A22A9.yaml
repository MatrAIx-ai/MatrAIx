  hobbies: '[''building wooden block towers'', ''reading picture books with caregiver'', ''drawing with crayons'', ''listening to soothing music (lullabies, jazz instrumentals)'', ''exploring backyard garden'',
    ''playing with stuffed animals'', ''quiet pretend play'']'
  career_goals: Reginald, though still very young, often expresses a wish to become someone who helps others in a calm setting. He frequently says he wants to be a doctor who takes care of children, or
    a librarian who keeps books organized and provides a quiet space for reading. His desire for structured, predictable environments and his preference for solitude steer his aspirations toward roles that
    combine caring for others with a peaceful, orderly atmosphere.
