personas:
  professional: Reginald Anderson, a three‑year‑old aspiring firefighter, spends mornings lining up his toy fire trucks in perfectly ordered rows and reenacting rescue drills, showcasing a love for structure
    while also allowing the spontaneous imagination of play to break the routine.
  sports: Reginald Anderson enjoys sliding down the local park’s wooden slide, kicking a soft foam ball at the Westside Kiddie Kickers club, and eagerly cheering for the nearby minor‑league Springfield
    Cardinals during Saturday morning broadcasts.
  arts: Reginald Anderson delights in drawing bright dinosaurs with chunky crayons, dancing to songs by Laurie Berkner and the Sesame Street cast, and staging miniature puppet shows featuring Elmo and Dora,
    all in quiet, solitary bursts of creativity.
  travel: Reginald Anderson’s favorite family outings include a short road trip to a nearby lake for shallow water splashing, a weekend visit to the state capital’s children’s museum, and a long‑awaited
    vacation to Walt Disney World, where predictable itineraries with built‑in nap times keep him comfortable.
  culinary: Reginald Anderson prefers soft foods like mac and cheese, banana slices, and peanut butter‑jelly sandwiches, often helps stir batter with a plastic spoon, and shows particular fondness for bright
    orange carrots and the comforting scent of cinnamon in oatmeal.
  core: Reginald Anderson, a three‑year‑old who thrives on routine, loves quiet corners, builds perfect block towers before abandoning them for snacks, and hoards every spare coin for a future LEGO set.
background:
  cultural: Reginald is a Black American child born and raised in Houston, Texas. His family blends African-American cultural traditions—such as gospel music, church community, celebrations of Juneteenth,
    and Southern culinary customs—with subtle nods to West African heritage reflected in his middle name Olatunji, which connects him to Yoruba roots. Growing up in a close‑knit neighborhood, he is exposed
    to a rich tapestry of cultural expressions, including neighborhood block parties, family gatherings centered around shared meals, and storytelling that emphasizes respect, cooperation, and community
    harmony.
attributes:
  skills: '[''expressive language (simple sentences)'', ''following two-step instructions'', ''color recognition'', ''shape recognition'', ''counting to ten'', ''fine-motor skills (stacking blocks, drawing
