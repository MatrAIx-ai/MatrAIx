  career_goals: Garrett often talks about becoming a "builder" when he grows up, a dream that aligns with his love of structure and clear steps. He imagines future roles such as a civil engineer, architect,
    or even a firefighter—careers that combine orderly planning, predictable tasks, and a sense of helping others, all of which resonate with his practical, organized personality.
