personas:
  professional: Garrett Catambay, a preschool explorer with a budding talent for sorting blocks and puzzles, demonstrates remarkable organization and methodical thinking as they arrange daily classroom
    activities, eagerly planning playtime schedules and reliably completing cooperative projects.
  sports: Garrett Catambay enjoys the rhythm of Friday night family viewings of the Utah Jazz while also participating in a local kids’ soccer club, RiverMouth SC, where they cheerfully run midfield drills
    during the spring season and prefer the structured routine of organized practice over large, chaotic playground games.
  arts: Garrett Catambay delights in drawing vibrant dinosaurs and singing along to Raffi’s “Baby Beluga,” often mimicking the characters from Sesame Street, and their evenings are filled with family movie
    nights featuring classic Disney animated films like “Frozen,” which shape their vivid imagination.
  travel: Garrett Catambay’s travel adventures include family road trips to the red sandstone cliffs of Zion National Park, a thrilling day at Disneyland in Anaheim, and seasonal visits to grandparents’
    home for Thanksgiving, reflecting a love for both awe‑inspiring nature and festive, familiar celebrations.
  culinary: Garrett Catambay favors buttery mac and cheese, crunchy chicken nuggets, and sweet strawberry‑topped pancakes, proudly practicing budding culinary skills by stirring batter under adult supervision
    and insisting on adding a pinch of cinnamon to their morning oatmeal.
  core: Garrett Catambay is a methodical four‑year‑old who thrives on routine, meticulously organizes toys, safeguards allowance in a piggy bank, and finds joy in dinosaurs, soccer drills, and family celebrations,
    albeit occasionally forgetting to wear their allergy mask.
background:
  cultural: Garrett’s cultural background reflects a predominantly white, Western‑European heritage common in Utah. Raised in Saint George, his family participates in community traditions such as church
    gatherings (the majority faith in the area is The Church of Jesus Christ of Latter‑day Saints), local festivals, and holiday celebrations like Thanksgiving and the Fourth of July. Emphasis on family
    cohesion, modesty, and community service shapes his upbringing, providing a stable and predictable environment that aligns with his personality.
