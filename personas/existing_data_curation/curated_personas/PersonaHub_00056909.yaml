persona_description: A daredevil and innovator in the field of vehicle dynamics, William F. Milliken Jr. was a master of disaster who is best known for inventing the field of vehicle dynamics and authoring
  the definitive textbook on using advanced mathematics to model and improve how cars handle on the road. He was also a race-car driver and had a number of close shaves in his side career. Milliken's expertise
  in vehicle dynamics made him a sought-after advisor for ordinary drivers, and his advice on how to survive a skid while coming around a hairpin turn on the road is still relevant today.
