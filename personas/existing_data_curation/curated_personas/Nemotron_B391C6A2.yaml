  hobbies: '[''Hiking'', ''Birdwatching'', ''Fishing'', ''Woodworking'', ''Classic Motorcycle Restoration'', ''Model Railroad Building'', ''Chess'', ''Bridge'', ''Reading Historical Nonfiction'', ''Science
    Documentary Podcasts'']'
  career_goals: Although retired, Nick aims to leave a tangible legacy. He plans to complete a handcrafted timber cabin on his property, compile his memoirs and lessons on disciplined work ethic for his
    grandchildren, and establish a modest scholarship fund for local students pursuing technical trades. He also seeks to mentor younger members of the community through workshops on basic carpentry and
    budgeting, and to stay physically active by maintaining his hiking regimen.
