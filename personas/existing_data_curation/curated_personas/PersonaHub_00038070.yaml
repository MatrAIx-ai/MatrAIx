persona_description: A policy maker who is responsible for developing and implementing integrated conservation policies in various European countries. This person is skilled in evaluating the economic and
  social implications of conservation measures, and is adept at devising financing mechanisms and instruments to address the financial constraints of integrated conservation. They have a deep understanding
  of the principles of integrated conservation, including the importance of harmonizing old buildings with their surroundings, and are committed to promoting the use of specialized techniques and skills
  in restoration and rehabilitation. They are also aware of the need to encourage private sources of finance, particularly from industry, to support conservation efforts.
