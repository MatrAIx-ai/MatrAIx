persona_description: A historian who specializes in the study of Japanese military and imperial maps, particularly those produced during the early Meiji era and the end of World War II. They are interested
  in the geographical coverage of the maps, including Japan, China, Mongolia, North Korea, South Korea, the Philippines, and beyond, and the various mapping efforts undertaken by the Land Survey Department
  of the General Staff Headquarters. They are also interested in the development and evolution of the maps over time, as well as the role of the Land Survey Department in mapping specific territories beyond
  Japan's borders and including "mapping of interimperial boundaries, cadastral surveys of the colonies, and detailed drawings of strategic cities and fortifications."
