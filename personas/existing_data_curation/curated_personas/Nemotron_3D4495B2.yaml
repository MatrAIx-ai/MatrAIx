  hobbies: '["Recreational softball", "Hiking and kayaking along the Susquehanna River", "Cooking and experimenting with new recipes", "Amateur photography", "Volunteering at a local animal shelter", "Attending
    live music shows and local festivals"]'
  career_goals: Patricia aspires to advance to the rank of fire captain within the next three years, focusing on developing leadership and incident command capabilities. She also aims to obtain paramedic
    certification to expand her medical response scope, and to lead community risk reduction programs, including fire safety workshops for schools and senior citizens. Long term, she envisions moving into
    a fire marshal role or establishing a fire safety consulting firm that helps local businesses improve emergency preparedness.
