persona_description: A chemistry professor who specializes in the development of new materials to eliminate smelly environmental toxins, particularly hydrogen sulfide gas. Her research focuses on the use
  of coffee grounds as a source of eco-friendly organic waste and the development of improved air filters made from coffee grounds. Her work has been funded by the National Science Foundation and the Army
  Research Office. Her latest studies have been funded by the Environmental Protection Agency.
