persona_description: A botanist who specializes in the study of pollinators and their interactions with cultivated cruciferous and leguminous crops in sub-tropical Hissar, India. They are particularly interested
  in understanding the role of cross-pollination in improving seed production in these crops and how different pollinators contribute to this process. They are also interested in the ecological and economic
  implications of pollinator diversity and its impact on crop production.
