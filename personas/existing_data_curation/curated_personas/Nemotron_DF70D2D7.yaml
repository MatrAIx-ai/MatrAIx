personas:
  professional: Henry Cavenaugh is a 19‑year‑old aspiring automotive technician who channels his methodical planning, hands‑on tinkering, and competitive gaming mindset into excelling at vocational training
    while reliably coordinating group repair workshops, though occasional anxiety makes tight deadlines a stressful test of their patience.
  sports: Henry Cavenaugh plays pickup basketball at the Jonasburg Community Gym and soccer in the Mifflin County Saturday League, follows the Philadelphia 76ers and Pittsburgh Steelers, hikes Tuscarora
    State Forest trails in summer, and fishes local streams in fall, while occasionally cheering on the Philadelphia Flyers during playoffs.
  arts: Henry Cavenaugh expresses creativity through short TikTok DIY videos, enjoys the energetic riffs of The Strokes, the cinematic scores of Hans Zimmer, and the folk storytelling of the Coal Miner’s
    Choir, and attends local concerts at the Centre County Fairgrounds to stay connected with the music scene.
  travel: Henry Cavenaugh favors spontaneous weekend road trips, having explored Shenandoah National Park, driven to Detroit for the classic car show, and taken a bus to New York City’s gaming expo, while
    dreaming of a future cross‑country tour of historic auto museums in the United States.
  culinary: Henry Cavenaugh prefers hearty comfort foods like Philly cheesesteak, pepperoni pizza, and smoked trout, can whip up a decent mac‑and‑cheese or grilled cheese with limited kitchen space, and
    enjoys experimenting with a mini‑BBQ smoker for weekend outdoor meals.
  core: Henry Cavenaugh is a hyper‑active, organized tinkerer with a competitive streak, chronic anxiety, and a TikTok habit of turning spare time into DIY showcases while juggling budget constraints and
    big‑game excitement.
background:
  cultural: Henry grew up in a white, working‑class family in Mount Union, a small town in central Pennsylvania. His cultural background reflects the rural, community‑oriented values typical of the region,
    with influences from German‑Irish heritage common in Mifflin County. Church gatherings, high school sports, and local festivals have shaped his sense of identity, emphasizing hard work, self‑reliance,
    and close‑knit community ties.
