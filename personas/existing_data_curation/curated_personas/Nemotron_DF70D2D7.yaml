  hobbies: '[''basketball'', ''pickup soccer'', ''competitive online gaming (e.g., Call of Duty, League of Legends)'', ''car tinkering and restoration'', ''DIY woodworking'', ''hiking'', ''fishing'', ''attending
    local fairs and concerts'', ''social media content creation (TikTok videos)'']'
  career_goals: Henry plans to obtain his GED within the next year and enroll in a vocational program for automotive technology or a related skilled trade. He aims to become a certified mechanic or maintenance
    technician, securing a stable, well-paid job that offers routine and predictability to help manage his anxiety. In the longer term, he hopes to combine his organizational talent and love of community
    by managing or directing programs at the local recreation center, or by running a small side business that offers custom bike and car modifications. He also intends to continue developing his stress-management
    practices to sustain his mental well‑being.
