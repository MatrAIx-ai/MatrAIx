  hobbies: '[''Soccer'', ''Pick-up basketball'', ''Bomba and plena dancing'', ''Multiplayer video gaming (FIFA, NBA 2K)'', ''Skateboarding'', ''Cooking traditional Puerto Rican dishes'', ''Playing congas'',
    ''Attending local festivals (Ponce Carnival)'', ''Socializing at the town plaza'']'
  career_goals: Christian dreams of turning his love for soccer into a professional career. In the short term, he aims to earn a spot on the Ponce youth soccer academy, secure a scholarship to a high school
    with a strong sports program, and improve his technical skills to become a starting midfielder. He also hopes to combine his practical mindset with his cultural roots by eventually studying culinary
    arts to help his family run a local restaurant or become a sports trainer for younger kids in his community. His ultimate ambition is to represent Puerto Rico on a national or international soccer stage
    while staying connected to his community.
