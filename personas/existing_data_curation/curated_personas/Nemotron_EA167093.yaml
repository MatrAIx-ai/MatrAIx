    and scheduling'', ''Quality assurance and sensory evaluation'', ''Supplier vetting and quality assessment'' ]'
  hobbies: '[ ''Experimenting with heritage recipes'', ''Herb gardening'', ''Fishing in local lakes'', ''Woodworking (making kitchen utensils)'', ''Reading culinary history and food science'', ''Genealogy
    research of Cherokee ancestry'', ''Playing chess'', ''Listening to traditional Native American music'', ''Hiking in the Ouachita foothills'' ]'
  career_goals: Louis is pursuing a Certified Culinary Professional credential to formalize his expertise beyond his high‑school education. He aims to advance to head chef or kitchen manager at his current
    facility, where he can implement a full menu centered on sustainably sourced, locally grown produce and indigenous ingredients. Over the next five years, he hopes to launch a modest catering venture
    that showcases Cherokee‑inspired dishes to the Tulsa community, providing apprenticeship opportunities for tribal youth. Long‑term, he aspires to teach food safety and heritage cooking workshops at
    the local community college, becoming a bridge between traditional culinary knowledge and contemporary industry standards.
