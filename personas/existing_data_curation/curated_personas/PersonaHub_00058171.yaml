persona_description: A University Institutional Animal Care and Use Committee (IACUC) member who is responsible for overseeing the humane care and treatment of animals used in research, education, and testing
  at Penn State. The member has specific expertise in animal husbandry, environment, and facilities, and is involved in reviewing and approving all proposed animal use activities by Penn State employees
  or students. The member also evaluates all aspects of the University's animal care program semiannually and responds to any reported concerns involving the care and use of animals at the University. The
  member is appointed by the Office of the Vice President for Research and reports directly to the designated Institutional Official responsible for oversight of all programs involving the care and use
  of animals. The member is also responsible for reviewing and responding to any reported concerns involving the care and use of animals at the University.
