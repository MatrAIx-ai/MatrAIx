personas:
  professional: A budding LEGO architect and junior problem‑solver, Yoseline Valdes channels their competitively curious mind and practical organization into designing intricate builds that fuse adventurous
    storytelling with precise engineering, and they eagerly test each creation for stability.
  sports: Yoseline Valdes energizes weekends by playing forward for the Greenfield Strikers youth soccer club, keeping a keen eye on match statistics and competing fiercely with friends, while also rooting
    for the County Crushers professional baseball team, and they balance their drive with a practical routine of dynamic warm‑ups and post‑game stretches to prevent injuries.
  arts: Yoseline Valdes dives into the worlds of comic series such as 'Guardians of the Galaxy' and 'My Hero Academia', dances exuberantly to pop hits by Taylor Swift and rhythmic traditional folk songs,
    idolizes the animated storytelling of Pixar’s 'Inside Out', and they channel that vibrant imagination into sketching their own superhero LEGO creations during free time.
  travel: Yoseline Valdes prefers family‑guided mini‑adventures, having explored the rocky trails of Sierra Vista State Park and the bustling boardwalk of Santa Monica, dreaming of a future road trip to
    the Grand Canyon to hunt for unique rocks and insects, and they keep a careful eye on their allowance budget while planning each outing.
  culinary: Yoseline Valdes, a budding kitchen assistant, loves helping their mother prepare tacos with seasoned carne asada and chicken tamales wrapped in corn husks, savoring the fresh flavors of cilantro,
    lime, and smoky chipotle, and they experiment by adding a pinch of cheese to the guacamole whenever they feel adventurous.
  core: Yoseline Valdes is a curious, competitively spirited 8‑year‑old who builds LEGO kingdoms, scrambles for soccer glory, and secretly hoards paperclips in their backpack for impromptu inventions, and
    they often daydream about turning everyday objects into clever gadgets.
background:
  cultural: Yoseline is a Mexican‑American growing up in Mathis, Texas, a town with a strong Hispanic presence. Her family celebrates traditional holidays such as Día de los Muertos, Mexican Independence
    Day, and Christmas with a blend of Catholic customs and Texan influences. She speaks both English and Spanish at home, enjoys listening to regional music like norteño and cumbia, participates in community
    events like the annual Fiesta del Pueblo, and helps preserve family recipes that blend Mexican flavors with local Texan ingredients.
