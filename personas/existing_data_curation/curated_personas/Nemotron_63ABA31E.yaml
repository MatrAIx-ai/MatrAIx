  career_goals: Yoseline dreams of one day becoming a veterinarian because she loves animals and enjoys learning how things work, a goal that ties her curiosity with a practical desire to help her community.
    She also imagines herself as a teacher who can share knowledge with other kids, reflecting her competitive spirit to excel and be a role model. In the short term, she aims to win her school’s science
    fair and earn a spot on the soccer team’s starting lineup.
