persona_description: A historian who specializes in the history of the American West, particularly the history of the Great Plains. Their research interests include the development of the transcontinental
  railroad, the history of the Union Pacific Railroad, and the role of the Green River townsite in the growth and decline of the town. They are particularly interested in the history of the town during
  the late 19th and early 20th centuries, including the role of the Union Pacific Railroad in shaping the town's development and the impact of the gold rush on the town's economy.
