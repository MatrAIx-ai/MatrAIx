  hobbies: '[''Surfing'', ''Hiking'', ''Yoga'', ''Meditation'', ''Cooking Hawaiian fusion dishes'', ''Reading mystery novels'', ''Photography'', ''Beach clean‑up volunteering'']'
  career_goals: Jennifer aims to become a Certified Public Accountant (CPA) within the next year and transition into a senior audit manager role at her firm, leading multi‑state audit engagements. She is
    interested in developing a niche in forensic accounting to help uncover financial fraud, especially for small businesses in Hawaii. Long‑term, she dreams of launching her own boutique accounting practice
    that blends rigorous audit standards with personalized financial consulting for local entrepreneurs, while also mentoring younger professionals and contributing to community financial literacy programs.
