personas:
  professional: Anne Abbott, a 16‑year‑old future software developer, channels their strategic gaming mindset and meticulous research skills into building intuitive UI prototypes with Python and Canva,
    while their competitive edge and reserved nature drive them to excel in the school's robotics club and seek collaborative yet low‑key team environments.
  sports: Anne Abbott follows the Detroit Lions and Detroit Pistons with avid fandom, participates in the high school cross‑country team during the fall, and practices yoga three times a week to balance
    competitive gaming intensity with mindful movement, and they prefer solo runs in local parks over team sports.
  arts: Anne Abbott immerses themselves in the worlds of Brandon Sanderson and Studio Ghibli, draws elaborate character sketches inspired by H.R. Giger’s biomechanical aesthetic, and regularly curates digital
    mood boards on Canva featuring artwork by Lisa Frank and Syd Mead.
  travel: Anne Abbott prefers meticulously planned weekend getaways, having explored the Upper Peninsula’s shoreline and dreaming of a future trip to Tokyo’s Akihabara district to dive into anime culture,
    while they balance a modest travel budget with school responsibilities.
  culinary: Anne Abbott enjoys crafting simple meals like avocado toast with lime‑sprinkled chili flakes and occasional homemade ramen broth, while they delight in the occasional indulgence of a chocolate
    lava cake after intense gaming sessions, reflecting a mix of health‑conscious and comfort‑food cravings.
  core: Anne Abbott is a high‑school tech enthusiast who balances a fierce competitive edge and anxiety‑driven introspection with a love for sci‑fi worlds, strategic gaming, and meticulous planning, yet
    they often procrastinate on health check‑ups in favor of late‑night coding marathons.
background:
  cultural: Anne Mary grew up in Taylor, Michigan, a suburban community within Wayne County that blends Midwestern values of hard work, modesty, and community involvement with the diverse cultural tapestry
    of the Greater Detroit area. Her family, of European descent, celebrates typical American holidays like Thanksgiving and the Fourth of July, while also participating in local traditions such as community
    fairs and high school sports events, though she prefers quieter activities. The proximity to the automotive industry has exposed her to technological advancements and a practical work ethic, influencing
    her interest in tech careers. Access to public libraries, local parks, and school clubs has shaped her intellectual curiosity and love for solitary, focused pursuits, while the multicultural environment
    of the region encourages an awareness of different perspectives without defining her identity.
