  career_goals: Anne Mary aspires to pursue a degree in Computer Science or Software Engineering, aiming to become a software developer with a focus on user‑experience design. She is drawn to roles that
    blend her curiosity for new technologies with practical, real‑world applications, such as developing intuitive interfaces for automotive tech companies in the Detroit area. She envisions starting her
    career in a collaborative yet modest team environment, eventually moving toward remote work that allows her to work independently and maintain a balanced lifestyle. Long‑term, she hopes to launch a
    freelance consultancy offering UI/UX design and custom web solutions, providing both creative fulfillment and financial stability.
