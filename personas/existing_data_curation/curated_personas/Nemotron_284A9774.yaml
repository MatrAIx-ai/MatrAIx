  career_goals: Jennifer aims to complete her high‑school diploma and pursue an associate degree in Business Administration or Office Management, with a long‑term goal of becoming an office manager or project
    coordinator in a stable, reputable organization. She is drawn to careers that blend her curiosity for learning new processes with practical, results‑oriented work, such as administrative support, data
    entry, or customer service for bilingual communities. Over time, she hopes to specialize in financial bookkeeping or human‑resources coordination, allowing her to apply her organizational strengths
    while supporting her family’s economic security.
