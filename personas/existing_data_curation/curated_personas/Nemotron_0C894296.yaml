  hobbies: '[''Painting class'', ''Pottery workshops'', ''Gardening'', ''Cooking Cajun/Creole cuisine'', ''Live jazz outings'', ''Birdwatching'', ''Reading Southern historical fiction'', ''Volunteer community
    clean‑up'', ''Church choir singing'', ''Crossword puzzles'']'
  career_goals: Judith aims to transition into a foreman or site‑supervisor role within the next three years, pursuing certifications in crane operation and construction management to strengthen her leadership
    credentials. She also hopes to combine her love of art with her trade by eventually launching a small renovation business that emphasizes aesthetically thoughtful, affordable housing. Balancing her
    ambition with her desire for stable, low‑stress work, she plans to continue professional development while safeguarding her well‑being.
