persona_description: A political scientist who specializes in analyzing the impact of government policies on the economy and society, with a particular focus on the effects of climate change policies on
  different states and industries. They are interested in the EPA's carbon emission plan and its implications for the states that rely heavily on coal-fired energy plants. They want to know how the plan
  will affect their state's carbon pollution output and what actions they can take to comply with the new emissions reduction goals. They are also interested in the broader implications of the plan for
  the country's efforts to combat climate change and reach the 17% emissions reduction goal set by President Obama.
