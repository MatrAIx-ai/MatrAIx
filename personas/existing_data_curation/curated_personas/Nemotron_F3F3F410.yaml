personas:
  professional: John Holliday is a 7‑year‑old aspiring young engineer who combines their love of LEGO building, nature journaling, and beginner coding apps into disciplined projects, often sketching museum
    exhibits as blueprints for future inventions.
  sports: John Holliday is a lively member of the Linwood Youth Soccer Club, cheering for the Carolina Panthers on game nights, practicing drills after school, and spending weekends playing catch with friends
    while also following the Atlanta Braves and Charlotte Hornets on television.
  arts: John Holliday delights in wandering through the local art museum, carefully copying Monet’s Water Lilies and drawing sketches of exhibits, while humming along to classic bluegrass tracks by Bill
    Monroe and enjoying the whimsical illustrations of Dr. Seuss during quiet reading time.
  travel: John Holliday loves planning weekend road trips with a crayon‑drawn map, frequently visiting the Great Smoky Mountains for leaf‑collecting adventures, dreaming of a future family visit to Washington
    D.C.’s museums, and cherishing annual trips to the county fair in nearby town.
  culinary: John Holliday prefers buttery corn on the cob, crispy fried chicken, and sweet apple pie, enjoys helping mom stir pancake batter (though they often leave a crumb trail), and savors the seasonal
    treat of pumpkin‑spiced muffins during autumn festivals.
  core: John Holliday is a curious, organized, and energetic 7‑year‑old who blends a love for LEGO engineering, nature journals, and community arts into a disciplined yet playful pursuit of mastery.
background:
  cultural: John was raised in Linwood, a small town in Davidson County, North Carolina. His family’s cultural traditions include attending local community festivals, Sunday gatherings at a Methodist church,
    and seasonal activities such as pumpkin picking and county fair attendance. Growing up in the American South, he values close‑knit community ties, hospitality, and a strong emphasis on education and
    extracurricular involvement. Exposure to both rural landscapes and small‑town school programs has fostered his appreciation for nature, teamwork, and artistic expression.
