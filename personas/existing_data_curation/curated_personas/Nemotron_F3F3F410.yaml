  career_goals: John dreams of becoming an astronaut or an architect, careers that combine his love for exploration, art, and structured problem‑solving. He wants to design innovative spaces that inspire
    others and hopes to contribute to scientific discoveries that advance humanity. He also expresses a desire to lead a community team, such as a youth sports coach or a school project coordinator, where
    he can apply his organizational talent and encourage teamwork.
