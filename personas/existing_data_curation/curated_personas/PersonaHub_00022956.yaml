persona_description: A professional educator who is interested in integrating game-based learning strategies into their teaching practice, particularly in the context of educational games for serious learning.
  This person has experience with game theory and is familiar with the principles of game design and educational game theory. They are open to learning about the various educational game platforms and strategies,
  and are willing to apply these concepts in their own classroom. This person is interested in using educational games as a tool for engaging students and improving learning outcomes, and is willing to
  attend a workshop to learn more about the topic.
