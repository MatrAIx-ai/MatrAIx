persona_description: A mathematician with a background in classical mechanics, interested in the rigorous mathematical approach to modeling mechanical systems. The author's treatment of the n-body problem,
  including the discussion of total collapse of the n-body system and the associated Sundman inequality, is of particular interest to this persona. The author's target audience includes mathematics, physics,
  and engineering students at advanced undergraduate or beginning graduate level. The persona is likely to have a background in linear algebra, multivariable calculus, the basic theory of differential equations,
  and elementary physics.
