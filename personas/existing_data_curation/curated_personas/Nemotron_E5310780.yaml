  hobbies: '[''Watercolor painting'', ''Pottery and ceramics'', ''Digital photography'', ''Hiking'', ''Book clubs (art & philosophy)'', ''Community theater acting/directing'', ''Karaoke and singing'', ''Hosting
    dinner parties'', ''Visiting art galleries and museums'', ''Traveling to cultural festivals'']'
  career_goals: Debra aims to remain an active cultural catalyst in Ogden by leading a senior‑focused arts council, mentoring younger volunteers, and launching a community‑run gallery that showcases emerging
    local artists. She hopes to curate traveling exhibition tours, author a series of blog posts on art and aging, and eventually serve as a docent at the Hill Aerospace Museum, sharing her love of history
    and creativity with visitors.
