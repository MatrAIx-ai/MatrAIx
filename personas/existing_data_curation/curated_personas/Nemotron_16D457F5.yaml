personas:
  professional: Jon Hopkins, an aspiring marine explorer, channels their curiosity about tide pools into building intricate LEGO models of coral reefs, sketches shell collections with meticulous detail,
    and approaches these solo projects with a competitive edge that drives them to outdo their friends' creations, while they eagerly document each new find in a journal.
  sports: Jon Hopkins swims with the Kaneohe Junior Surf Club, cheers for the University of Hawaii Rainbow Warriors football team, and channels their competitive spirit into timed tide‑pool scavenger hunts
    rather than organized team sports, while they occasionally join sandcastle contests at the beach.
  arts: Jon Hopkins draws inspiration from the vibrant murals of local artist Riri Hana, the soothing ukulele sounds of Israel Kamakawiwoʻole, the cinematic storytelling of Disney’s ‘Moana’, and the calming
    brushstrokes of Bob Ross, incorporating these influences into detailed sketchbooks of ocean scenes, and they often share their artwork with family and friends.
  travel: Jon Hopkins delights in weekend visits to the Makapuʻu Lighthouse trail on Oʻahu and annual family trips to Hawaiʻi Volcanoes National Park on the Big Island, while dreaming of snorkeling the
    Great Barrier Reef in Australia, balancing adventurous tide‑pool explorations with the comforting rhythm of familiar beach sand, and they eagerly plan each outing with a handwritten checklist.
  culinary: Jon Hopkins enjoys assembling snack plates of spam musubi, fresh pineapple chunks, and cheesy macaroni, experiments with kid‑safe huli‑huli chicken nuggets in the kitchen, and sometimes trades
    their beloved pineapple‑glazed loco moco for tacos when friends visit, while they proudly report their culinary creations to proud parents.
  core: Jon Hopkins is a curious, solitary seven‑year‑old explorer of tide pools and LEGO worlds, whose intense emotional swings and occasional candy‑driven impulse buys keep them both focused and unpredictable,
    and they often switch between intense focus and sudden mood changes.
background:
  cultural: Jon grew up in Kaneohe, a community on the windward side of Oʻahu, where the natural landscape and ocean culture are part of everyday life. While his family background is white and they celebrate
    typical American holidays, he participates in local events such as school hula performances, island festivals, and beach clean‑ups. Exposure to Hawaiian language lessons at school and occasional visits
    to cultural centers have given him an appreciation for the local heritage, even as his household maintains its own traditions. This blend of mainland and island influences shapes his worldview and informs
    his interests in marine life and Hawaiian art.
