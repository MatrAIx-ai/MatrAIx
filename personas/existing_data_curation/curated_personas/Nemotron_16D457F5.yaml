    piano'']'
  career_goals: Jon often talks about becoming an astronaut or a marine biologist, inspired by the ocean near his home in Kaneohe. He imagines designing cool gadgets or creating video games that let players
    explore the sea. While his ambitions are still playful, he expresses a strong desire to be the best at school projects and science fairs, hoping to win awards and be recognized for his ideas. He also
    dreams of creating his own comic book characters, combining his love for art and storytelling.
