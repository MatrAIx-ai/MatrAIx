persona_description: A local historian who is passionate about the history and culture of the East and West Hanney villages. They are interested in the agricultural history of the area, the impact of the
  Black Death on the community, and the changes in the economy and society over time. They enjoy walking in the villages and exploring the evidence of medieval ploughing and the development of the local
  economy. They are also interested in the local crafts and trades, such as carpentry, leatherwork, and blacksmithing, and how they have evolved over time. They are knowledgeable about the local landmarks,
  such as the Letcombe and Childrey Brooks, and the history of the Wilts and North Berks Canal. They are also interested in the role of water in the community economy and the impact of the coming of the
  railway on the village economy.
