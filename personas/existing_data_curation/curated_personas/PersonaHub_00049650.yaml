persona_description: A scientist with expertise in virology, particularly in the field of AIDS research. She has conducted research on the missing link between the virus that causes AIDS and the one that
  kills millions of people. Her studies have led to the discovery of a virus that is killing chimpanzees in the wild, which is the first primate besides man shown to get sick in significant numbers from
  a virus related to HIV. She is a professor of medicine at the University of Alabama at Birmingham and has published her findings in the journal Nature. Her research has implications for understanding
  the transmission and spread of the virus and could potentially be applied to humans.
