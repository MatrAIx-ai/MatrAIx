    community events'']'
  hobbies: '[''Reading historical fiction and philosophy'', ''Visiting art galleries and museum exhibitions'', ''Gardening (especially bonsai and vegetable patches)'', ''Practicing calligraphy and brush
    painting'', ''Listening to classical and traditional East Asian music'', ''Attending small cultural festivals and tea gatherings'', ''Watching documentaries on science and art'', ''Walking in local
    parks and birdwatching'']'
  career_goals: Although retired, Hai Sung aims to leave a lasting legacy by mentoring younger members of his community, documenting and teaching traditional arts and health practices, volunteering as a
    cultural liaison at the local senior center, and ensuring his grandchildren have access to educational resources. He aspires to organize intergenerational workshops that blend art, cooking, and storytelling,
    fostering cultural continuity and social harmony.
