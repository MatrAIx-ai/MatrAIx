personas:
  professional: Sammy Reavis, a 19‑year‑old waitstaff with a knack for curating pop‑up art displays, blends personable service with a burgeoning eye for exhibition design, using their Photoshop skills to
    craft thematic menus while juggling tables and occasional schedule chaos.
  sports: Sammy Reavis enjoys wandering the Illinois River Trail for casual photography walks, roots for St. Louis City SC soccer matches, and participates in intramural ultimate frisbee when the schedule
    permits, preferring low‑key, community‑oriented activity over competitive sports.
  arts: Sammy Reavis spends weekends sketching cityscapes in watercolors, flips through graphic novels like 'Saga' and 'Maus', digs for indie folk gems by Bon Iver and alternative tracks from Radiohead
    at the Third Mood record store, and contributes to community mural projects, often citing Frida Kahlo and Edward Hopper as stylistic inspirations.
  travel: Sammy Reavis favors spontaneous weekend getaways by bus to St. Louis for its street‑art scene, Nashville for live music, and dreams of a spring trip to Paris’s Musée d’Orsay, balancing limited
    student funds with a love for cultural immersion and vintage shop hunting.
  culinary: Sammy Reavis, a seasoned server, excels at crafting latte art with a splash of cinnamon, enjoys cooking avocado toast with smoked paprika and poached eggs at home, and has a soft spot for shrimp
    tacos topped with fresh cilantro and lime, though their kitchen experiments sometimes end in over‑cooked pasta.
  core: Sammy Reavis, a 19‑year‑old art‑obsessed hospitality worker, flits between sketchpads and coffee orders, battling anxiety with curiosity and a penchant for spontaneous creative projects.
background:
  cultural: Sammy was raised in Edwardsville, Illinois, a modest Midwestern city adjacent to St. Louis. His family has deep regional roots, with parents who worked in local education and manufacturing,
    embodying the community-oriented values of politeness, reliability, and a strong work ethic. The area’s seasonal farmer's markets, community theater, and proximity to St. Louis's museums and music scene
    exposed him to both traditional Midwestern customs and broader artistic influences. This blend nurtured a respect for hospitality, a curiosity about diverse cultural expressions, and a desire to contribute
    to community-based arts initiatives.
attributes:
  skills: '[''Customer service'', ''Effective verbal communication'', ''POS system operation'', ''Cash handling'', ''Food safety compliance'', ''Multitasking under pressure'', ''Basic visual design (Adobe
