  hobbies: '[''Sketching'', ''Watercolor painting'', ''Visiting art galleries'', ''Listening to indie folk music'', ''Reading graphic novels'', ''Street photography'', ''Volunteering for community murals'',
    ''Attending open-mic poetry events'']'
  career_goals: Sammy aims to blend his love for the arts with his hospitality experience by pursuing a career in cultural venue operations. In the next few years he plans to complete a bachelor's degree
    in Art History or Museum Studies while gaining experience as a café manager in a museum or gallery. His short-term goal is to secure a position that allows him to design visitor experiences and assist
    with exhibition setups. Long-term, he envisions leading a community art space that combines a café, gallery, and workshop program, fostering inclusive cultural engagement and providing a platform for
    emerging artists.
