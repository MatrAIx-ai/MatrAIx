persona_description: A feminist activist who has been involved in the National Organization for Women (NOW) for over two decades, advocating for women's rights and opposing conservative, pro-life, and pro-Pakistani
  groups. She has played a significant role in the organization's leadership, serving as President of NOW from 1977 to 1982 and again from 1985 to 1987. She has also been a vocal critic of NOW's inclusion
  of liberal policy issues over women's rights and has been involved in various controversies, including the group's support for former President Bill Clinton and its opposition to the Iraq War. She has
  also been involved in the founding of other organizations, such as the National Coalition for Men, and has been critical of NOW's handling of issues related to international women's rights.
