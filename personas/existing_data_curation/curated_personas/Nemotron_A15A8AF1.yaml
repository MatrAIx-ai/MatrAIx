  hobbies: '[''Reading science and nature books'', ''LEGO building'', ''Nature hikes and wildlife observation'', ''Rock and mineral collecting'', ''Sketching and doodling'', ''Journaling (homework and feelings)'',
    ''Educational video games (Scratch, Minecraft)'', ''Family board games'', ''Gardening'']'
  career_goals: He dreams of becoming an engineer—ideally a civil or environmental engineer—who designs safe bridges, playgrounds, and community parks that reflect the natural landscape of Connecticut.
    Justin also imagines a future where he could combine this with conservation work, protecting the local wildlife he loves to observe. He plans to study hard, earn good grades, and eventually attend a
    university with strong engineering and environmental science programs.
