persona_description: A researcher who studies mosquito-host interactions, particularly focusing on the unique scent composition of human sweat and its effect on mosquito-host interactions. They are interested
  in developing mosquito traps and repellants, understanding the chemical attractants humans create, and developing mosquito traps and repellants to stop infectious disease in its tracks. They are also
  interested in the connection between the way we smell and the bacteria that live on our skin, and the importance of understanding how skin microbes match up with mosquito meal preferences.
