  hobbies: '["scribbling with crayons", "building block towers", "pretend play with stuffed animals", "listening to Mexican lullabies", "exploring sand and shells at the beach", "flipping through picture
    books", "singing simple songs", "solving simple puzzles"]'
  career_goals: Although only two years old, Maria often points to picture books and says she wants to "make pictures" and "tell stories," showing an early fascination with art and storytelling. Her parents
    nurture this by providing drawing supplies and cultural storybooks, hoping she may pursue a future as a painter, illustrator, or writer. As she grows, her love for quiet, solitary creative work could
    also lead her toward roles that value imagination and focused exploration, such as a researcher or musician.
