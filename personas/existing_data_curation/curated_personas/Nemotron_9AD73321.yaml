personas:
  professional: Maria Restrepo is an inquisitive tiny marine explorer who transforms daily beach outings into hands‑on investigations of shells and tides, demonstrating early observational skills and vivid
    imagination while delightfully eschewing structured schedules in favour of spontaneous play.
  sports: Maria Restrepo delights in splashing at the local kids’ surf program and proudly waves a tiny San Diego Wave FC scarf, while also joining the toddler division of the Oceanside Little Turtles Soccer
    Club during spring, treating movement as playful exploration rather than structured training.
  arts: Maria Restrepo finds endless joy in finger‑painting to the whimsical tunes of Juanes and the soothing lullabies of Natalia Lafourcade, while occasionally watching Pixar’s animated classic 'Coco'
    that mirrors the vibrant family celebrations they cherish.
  travel: Maria Restrepo loves short family road trips to the tide‑pools of La Jolla and day‑long sand escapades at Laguna Beach, relishes the sensory wonder of Disneyland’s parades, and, through storybooks,
    imagines a future adventure to the festive shores of Mazatlán.
  culinary: Maria Restrepo shows a discerning palate for soft carnitas tacos, sweet corn tamales, and refreshing agua de jamaica, often clapping with delight when avocado slices are mashed for them, while
    their tiny hands eagerly help stir batter for homemade churros under careful supervision.
  core: Maria Restrepo is a sun‑kissed, shell‑collecting dreamer who turns ordinary moments into vivid stories, yet habitually leaves a trail of scattered crayons wherever they wander.
background:
  cultural: Maria is raised in a Mexican‑American household in Oceanside, California. Spanish is spoken at home, and her family celebrates Mexican traditions such as Día de los Muertos, Las Posadas, and
    enjoys foods like tacos, tamales, and aguas frescas. The coastal community adds a love for the ocean, seashell collecting, and beach outings. This blend of Mexican heritage and Southern Californian
    lifestyle shapes her values, daily routines, and the cultural stories that fuel her imagination.
attributes:
  skills: '["fine motor coordination", "scribbling with crayons", "stacking blocks", "basic vocabulary", "color recognition", "shape identification", "pretend play with stuffed animals", "rhythmic clapping
