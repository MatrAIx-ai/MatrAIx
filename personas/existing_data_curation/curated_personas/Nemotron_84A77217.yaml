  hobbies: '[''Soccer'', ''Mexican folk dance (ballet folklórico)'', ''Drawing and coloring'', ''Reading adventure books'', ''LEGO building'', ''Helping with family cooking (making guacamole, tacos)'',
    ''Puzzles (jigsaw and age‑appropriate brain teasers)'']'
  career_goals: Angel dreams of becoming an elementary school teacher because she loves the idea of creating a calm, organized classroom where every child feels supported. She also imagines caring for animals
    as a veterinarian, drawn by her gentle nature and love for pets. At this stage she enjoys learning about these professions through books and school projects, and she hopes to study education or veterinary
    science when she grows older.
