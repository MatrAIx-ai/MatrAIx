personas:
  professional: Angel Rivera, a pragmatic and organized nine‑year‑old, envisions a future as a soccer coach who blends disciplined training drills with creative teamwork, and they channel their love for
    structure into coaching strategies.
  sports: Angel Rivera, a dedicated member of the town’s under‑12 soccer club, the Greenfield Hawks, practices after school, watches the national women’s soccer team for inspiration, and they eagerly follow
    LA Galaxy matches on weekends while proudly wearing the team’s jersey during games.
  arts: Angel Rivera, an enthusiastic drawer, spends evenings coloring cartoon characters inspired by the works of Mo Willems and Disney’s classic animation, and they frequently attend the community art
    center’s sketch workshops where they experiment with bright markers and watercolors.
  travel: Angel Rivera, who loves organized family outings, has explored the nearby coastal state park on a day trip, dreams of visiting the Grand Canyon and Washington, D.C., and they prefer itineraries
    that balance outdoor adventure with scheduled snack breaks.
  culinary: Angel Rivera, a kitchen helper, enjoys assembling fresh guacamole with ripe avocados, lime juice, cilantro and salt, and making pico de gallo with tomatoes, onions, jalapeños, and cilantro,
    and they also love to help bake homemade cheese pizza topped with mozzarella, pepperoni, and oregano, showcasing a budding knack for mixing simple flavors.
  core: Angel Rivera blends the discipline of a soccer player with the imagination of a cartoonist, they organize every day with a bright‑colored planner while occasionally losing track of time in LEGO
    builds.
background:
  cultural: Angel’s family celebrates Mexican traditions while living in Avondale, Arizona. She grows up speaking both Spanish at home and English at school, giving her a bilingual advantage. Cultural celebrations
    such as Día de los Muertos, Las Posadas, and Mexican Independence Day are important family events, involving food, music, and storytelling. She enjoys Mexican cuisine like tacos, tamales, and homemade
    salsa, and she often helps prepare these dishes. The local Hispanic community and the desert landscape of the Southwest influence her appreciation for outdoor activities and community gatherings at
    the local park and cultural center.
attributes:
  skills: '[''Reading comprehension (4th‑grade level)'', ''Basic arithmetic (addition, subtraction, multiplication)'', ''Bilingual communication (English and Spanish)'', ''Organizational skills (keeping
