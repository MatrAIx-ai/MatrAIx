personas:
  professional: Anneke Thomaston, a 16‑year‑old aspiring concept artist, blends watercolor techniques, digital illustration in Procreate, and Python generative scripts to craft immersive visual narratives
    for indie game prototypes, while balancing high‑school coursework and occasional freelance commissions, reflecting their meticulous organization and love for solitary, imaginative work.
  sports: Anneke Thomaston finds physical activity in solitary pursuits, regularly hiking the Marin County trails and completing weekend yoga sessions at a local studio; they cheer for the Golden State
    Warriors and the San Francisco Giants from the comfort of their room, and belong to the Marin Trail Runners club, preferring quiet endurance over team sports.
  arts: Anneke Thomaston immerses themselves in creative expression, sketching wildlife inspired by John James Audubon, experimenting with watercolor palettes reminiscent of Claude Monet, crafting digital
    collages using Canva, and drawing narrative influence from speculative authors like N.K. Jemisin and poets such as Ocean Vuong; on the acoustic guitar they practice fingerpicking songs by Sufjan Stevens,
    and they admire the visual storytelling of Hayao Miyazaki.
  travel: Anneke Thomaston prefers low‑key travel, revisiting the misty Redwood National Park and the alpine vistas of Yosemite on school breaks, while dreaming of an immersive study trip to Kyoto to explore
    Japanese animation studios and VR art exhibits; they also keep a travel journal for planned future visits to Reykjavik to witness the northern lights.
  culinary: Anneke Thomaston enjoys simple, plant‑based cooking, often preparing avocado toast with radish slices, miso ramen with tofu, and rhubarb crumble for dessert, while occasionally experimenting
    with fermented kimchi; they favor the seasonal farmers’ market for fresh herbs and brew pour‑over coffee at home, but admit to a dislike for overly spicy dishes.
  core: Anneke Thomaston, a 16‑year‑old solitary visionary, fuses watercolor dreams, digital collage, and generative code into immersive art while juggling teenage anxieties, frugal finances, and a quiet
    love of solo hikes.
background:
  cultural: Anneke grew up in a suburban, predominantly white community in Novato, California, where progressive values and artistic exposure are common. Her family emphasizes individuality, self‑expression,
    and environmental stewardship, reflecting broader Marin County cultural norms that blend tech‑savvy attitudes with a strong appreciation for nature and the arts. She has been influenced by the region's
    vibrant creative scene—local galleries, community art workshops, and proximity to the San Francisco Bay Area's multicultural artistic movements—while also embracing a quiet, introspective lifestyle
    that aligns with her preference for solitude.
