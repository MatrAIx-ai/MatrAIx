  career_goals: Anneke aspires to attend a specialized art high school or early college program where she can deepen her skills in concept art and visual design. Her long‑term ambition is to become a concept
    artist for interactive media—such as video games or virtual reality experiences—where she can blend her love of abstract ideas with visual narrative. She also envisions creating a personal graphic novel
    series that explores speculative themes, and she hopes to integrate user‑experience design principles to craft immersive storytelling environments. Ultimately, she aims to combine artistic expression
    with technology to produce innovative, emotionally resonant work that stands out for its originality.
