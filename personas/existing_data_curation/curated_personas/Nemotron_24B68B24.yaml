  hobbies: '[''Reading science‑fiction'', ''Playing chess'', ''Jogging'', ''DIY electronics projects'', ''Photography'', ''Listening to jazz and hip hop'', ''Volunteering at local science museum'', ''Attending
    small study groups'']'
  career_goals: Joel aims to secure a full‑time research position that bridges basic science with practical applications, such as renewable‑energy technologies or advanced materials. He plans to pursue
    a Ph.D. in physics or materials science within the next two years, focusing on experimental techniques that yield tangible, industry‑relevant outcomes. Long‑term, he envisions leading a research team,
    obtaining competitive grants, and publishing in high‑impact journals, while also mentoring other young scientists from under‑represented backgrounds.
