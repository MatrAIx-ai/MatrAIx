personas:
  professional: Joel Wright, a budding experimental physicist with a knack for turning complex lab data into clear, actionable insights, blends meticulous experimental design with a competitive edge that
    drives them to push the boundaries of renewable‑energy research while engaging small groups with concise scientific demos.
  sports: Joel Wright, a member of the Haines City Jogging Club and the local chess league, routinely logs five‑kilometer runs through Central Florida parks while cheering for the Orlando Magic and the
    Tampa Bay Rays, balancing low‑key competition on the board with cardio fitness.
  arts: Joel Wright, whose evenings often involve capturing the golden hour over the Kissimmee River with a Canon EOS R5, draws inspiration from Ansel Adams’ composition, unwinds listening to Hans Zimmer’s
    scores, and occasionally attends local gallery openings featuring contemporary Floridian painters like Emily Cole.
  travel: Joel Wright, who has explored the Kennedy Space Center and hiked the Grand Canyon during summer breaks, now dreams of visiting the aurora‑lit skies of Iceland and the CERN laboratory in Geneva,
    planning trips around academic conferences and preferring budget airlines that allow flexible itineraries.
  culinary: Joel Wright, a modest home cook who favors quick, sustainable meals like quinoa‑black bean bowls with avocado and grilled mahi‑mahi, relishes the tang of fresh key lime pie, and occasionally
    experiments with sous‑vide techniques to perfect the texture of their fish, all while relying on a trusty cast‑iron skillet and a well‑worn copy of The Joy of Cooking.
  core: Joel Wright, a calm, intellectually curious twenty‑year‑old physicist who thrives on solitary problem‑solving, strategic chess matches, and meticulously balanced budgets, channels competitive drive
    into renewable‑energy research while navigating occasional sleep‑deprived nights and a penchant for high‑end camera gear.
background:
  cultural: Joel grew up in a close‑knit African‑American community in Central Florida, where family gatherings, church celebrations, and a strong emphasis on education were central to his upbringing. His
    parents, both community activists and educators, instilled a sense of perseverance and self‑reliance that shapes his calm, resilient demeanor. While he values the cultural heritage of soul music, gospel,
    and regional traditions, he also navigates the broader societal challenges faced by black youth, fostering a pragmatic outlook that balances cultural pride with a focus on personal achievement.
attributes:
  skills: '[''Experimental physics'', ''Data analysis (Python, MATLAB)'', ''Statistical modeling'', ''Instrumentation calibration'', ''Scientific writing'', ''Problem solving'', ''Project management (small‑scale)'',
