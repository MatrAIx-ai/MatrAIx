    and nature walks for reflection'']'
  career_goals: Elyse intends to transfer to a four‑year university to earn a BFA in Graphic Design with a minor in Human‑Computer Interaction. She aspires to work as a user experience designer or creative
    director at a socially conscious agency, creating inclusive digital products that blend art and technology. In the short term, she aims to secure an internship at a Philadelphia design studio, build
    a robust portfolio of interactive artwork, and continue volunteering as an art mentor for youth. Long‑term, she envisions launching her own freelance studio that partners with nonprofit organizations
    to develop visual campaigns promoting community well‑being and cultural dialogue.
