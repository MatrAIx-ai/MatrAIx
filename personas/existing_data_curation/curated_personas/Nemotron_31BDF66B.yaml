personas:
  professional: Elyse Morrison, a diligent community college art student with a knack for digital illustration and front‑end web basics, channels their organized, imaginative nature into building interactive
    portfolio pieces and coordinating a weekly youth drawing workshop, aiming for a BFA in Graphic Design and a UX career at a socially conscious agency.
  sports: Elyse Morrison, a casual fan of the Philadelphia Eagles and a participant in a local community center's Saturday yoga class, occasionally joins pick‑up basketball games at the park, and follows
    the WNBA's Chicago Sky for inspiration in teamwork and empowerment.
  arts: Elyse Morrison, an avid admirer of surrealist painters like Salvador Dalí and contemporary digital artists such as Bee Bee Dragons, routinely attends Philadelphia Museum of Art exhibitions, screens
    indie films like Moonlight, and follows musicians Mitski and James Blake, integrating these influences into their speculative fiction and mixed‑media sketches.
  travel: Elyse Morrison, who favors meticulously planned trips using Trello boards, has explored New York City’s gallery districts, ventured to the desert art installations of Joshua Tree, and dreams of
    a springtime road trip to New Orleans for its jazz heritage, all while budgeting as a student and balancing family commitments.
  culinary: Elyse Morrison, a self‑taught home cook, loves experimenting with unexpected flavor pairings like matcha‑infused black bean tacos and miso‑caramel shortbread, often sourcing fresh herbs from
    the local farmer’s market, yet admits to occasional midnight cravings for greasy cheesesteak fries.
  core: Elyse Morrison blends boundless imagination with meticulous organization, creating surreal digital art while juggling a student budget, health rituals, and a love for eclectic culture that fuels
    both creative projects and quirky late‑night snack runs.
background:
  cultural: Elyse grew up in Riverton, a small suburban borough in Burlington County, New Jersey, within a middle‑class, predominantly white community that values education and civic involvement. Her family
    traces its roots to Irish and German ancestry, preserving traditions such as celebrating Thanksgiving, Fourth of July festivities, and modest holiday observances of Christmas. Proximity to Philadelphia
    exposed her to a diverse cultural scene, including museums, live music, and multicultural festivals, broadening her appreciation for artistic expression beyond her immediate background. Her upbringing
    emphasized community service, punctuality, and a collaborative spirit, reflecting broader Northeastern American cultural norms while fostering an open‑minded, globally aware perspective.
