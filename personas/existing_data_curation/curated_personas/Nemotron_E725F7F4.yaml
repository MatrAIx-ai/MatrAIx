    operations and scheduling", "Basic videography and editing"]'
  hobbies: '["Salsa and bachata dancing", "Cooking Puerto Rican cuisine", "Kayaking on the Gulf Coast", "Yoga and mindfulness practice", "Visiting art galleries and museum exhibitions", "Street photography
    outings", "Reading contemporary photography books", "Volunteer photography for community events", "Traveling to discover new cultural perspectives", "Attending music festivals and live performances"]'
  career_goals: Aurea aims to transition from a freelance photographer to the owner of a boutique studio in the Tampa Bay area that specializes in high‑end portrait and lifestyle work for both individuals
    and brands. She wants to publish a coffee‑table book that celebrates the Puerto Rican diaspora in Southwest Florida, showcasing her storytelling strengths. In the next five years, she plans to secure
    collaborations with regional magazines, win regional photography awards, and develop a mentorship program for emerging photographers from under‑represented backgrounds. She also envisions expanding
    her brand into digital content creation, offering online photography courses, and building a strong Instagram presence that leverages her sociable personality and competitive drive.
