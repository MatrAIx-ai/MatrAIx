personas:
  professional: Aurea Azarcon is a freelance photographer who blends portrait, lifestyle, and nature expertise with advanced Photoshop retouching, channeling a competitive, talkative edge into relentless
    networking and high‑end brand development while balancing meticulous organization with the flexibility required to pivot between client shoots, Instagram content creation, and planning for a future
    boutique studio in Tampa Bay.
  sports: Aurea Azarcon channels their high energy into weekend paddles with the Fort Myers Kayak Club, maintains flexibility through thrice‑weekly yoga, roots for the Tampa Bay Buccaneers in the NFL and
    the Miami Heat in the NBA, and joins a seasonal beach‑volleyball league, approaching each workout with the same meticulous framing they apply to a photograph.
  arts: Aurea Azarcon immerses themselves in the arts, frequenting gallery openings that showcase the bold brushstrokes of local muralist Carlos Alvarez, drawing technical inspiration from the lighting
    mastery of Annie Leibovitz and the emotive storytelling of Sebastião Salgado, while dancing to the salsa rhythms of Celia Cruz at bachata nights and dissecting Susan Sontag’s ‘On Photography’ on late‑night
    study sessions.
  travel: Aurea Azarcon plans excursions with a photographer’s precision, balancing curated itineraries—like a sunrise shoot in Key West and a culinary street‑food tour of Cartagena—with spur‑of‑the‑moment
    photo walks through Savannah’s historic squares, budgeting carefully around freelance deadlines and eyeing a future immersive assignment in Barcelona’s bustling La Rambla.
  culinary: Aurea Azarcon enjoys cooking at an advanced home‑chef level, mastering traditional island staples such as plantain‑based mofongo and crispy tostones, while pioneering fusion twists like tuna‑taco
    lettuce wraps seasoned with adobo and finished with a tangy passion‑fruit glaze, often incorporating fresh cilantro, lime, and a splash of coconut milk into sauces.
  core: Aurea Azarcon is a fiercely competitive, socially magnetic photographer who constantly juggles creative projects, late‑night caffeine‑fuelled edits, and spontaneous adventures, all while occasionally
    over‑committing to events and neglecting self‑care.
background:
  cultural: Aurea is a first‑generation American of Puerto Rican heritage. Raised in a bilingual household, she grew up with the rhythms of salsa, plena, and reggaetón, and the flavors of mofongo, arroz
    con gandules, and tostones. Family gatherings emphasized storytelling and visual expression, sparking her early interest in capturing moments. While she embraces her Caribbean roots, she also identifies
    with the multicultural tapestry of Southwest Florida, participating in local Puerto Rican festivals such as Carnaval de Puerto Rico and contributing her photography to community celebrations. Her cultural
    identity informs her artistic vision, driving her to represent the richness of Puerto Rican culture within the broader American context.
attributes:
  skills: '["Portrait photography", "Lifestyle photography", "Nature and landscape photography", "Event photography (weddings, festivals)", "Studio lighting design", "Natural light mastery", "Adobe Photoshop",
