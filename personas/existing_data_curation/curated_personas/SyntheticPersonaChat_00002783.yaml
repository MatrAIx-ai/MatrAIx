  Best Generated Conversation: 'User 1: Hi, what''s your name?

    User 2: Hi, my name is John.

    User 1: Nice to meet you, John. What do you do for fun?

    User 2: I like to play video games, take cold showers, and sing in the shower.

    User 1: I like video games too! What games do you like to play?

    User 2: My favorite game is Halo 3. I love the multiplayer.

    User 1: I''ve never played Halo 3, but I''ve heard good things about it.

    User 2: It''s a lot of fun. You should try it sometime.

    User 1: I will. I''m always looking for new games to play.

    User 2: So, what else do you do for fun?

    User 1: I like to go snowboarding. I''ve been snowboarding since I was a kid.

    User 2: I''ve never been snowboarding. Is it fun?

    User 1: It''s a lot of fun. It''s a great way to get exercise and have some fun at the same time.

    User 2: I might have to try it sometime.

    User 1: You should. It''s a lot of fun.

    User 2: So, you have a daughter?

    User 1: Yes, I have one daughter. She just graduated from college.

    User 2: Congratulations!

    User 1: Thank you.

    User 2: What does she do for a living?

    User 1: She''s a teacher.

    User 2: That''s great.

    User 1: Yeah, I''m really proud of her.

    User 2: I''m sure she''s proud of you too.

    User 1: Thanks.

    User 2: So, what else do you like to do?

    User 1: I like to run. I run more than 2 miles a day, even though I hate it.

    User 2: Why do you hate it?

    User 1: I don''t know. I just don''t like running.

    User 2: Well, it''s good for you.

    User 1: I know.

    User 2: So, you''ve been in 3 triathlons?

    User 1: Yeah, I have.

    User 2: That''s impressive.

    User 1: Thanks.

    User 2: So, what are you doing this weekend?

    User 1: I''m not sure yet. What are you doing?

    User 2: I''m going to play video games.

    User 1: That sounds fun.

    User 2: Yeah, it is.

    User 1: Well, I''m going to go now. It was nice talking to you.

    User 2: You too.

    User 1: Bye.

    User 2: Bye.'
