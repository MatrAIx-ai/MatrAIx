personas:
  professional: Ricardo Acebal, a 20‑year‑old production planning clerk, leverages his mastery of SAP and Excel macros to keep the manufacturing floor humming, applying his disciplined, detail‑oriented
    mindset and bilingual communication skills to bridge teams and preempt bottlenecks.
  sports: Ricardo Acebal combines a disciplined weightlifting routine at his local gym with weekend trail runs through the Columbia River Gorge, cheers for the Portland Timbers and the Oregon Ducks football
    team, and is a member of a community cycling club that meets every Saturday.
  arts: Ricardo Acebal unwinds by strumming acoustic guitar to the rhythms of classic mariachi legends like José Alfredo Jiménez and contemporary indie folk artists such as Fleet Foxes, while attending
    local cultural festivals that showcase traditional dance and modern street art.
  travel: Ricardo Acebal prefers structured, budget‑conscious trips, planning weekend road trips along the Oregon Coast, dreaming of a future immersive visit to Oaxaca’s markets and colonial plazas, and
    using a detailed itinerary app to balance sightseeing with time for quiet reflection.
  culinary: Ricardo Acebal relishes cooking elaborate mole poblano and hand‑rolled tamales, meticulously measuring each spice and using fresh corn masa, while also experimenting with sous‑vide techniques
    for precision and occasionally swapping recipes with friends from his cultural club.
  core: Ricardo Acebal is a highly organized 20‑year‑old who blends methodical problem‑solving with a love for cultural traditions, balancing disciplined work and fitness routines with creative pursuits
    like guitar and cooking, all while maintaining a calm, cooperative demeanor.
background:
  cultural: Ricardo is a first‑generation Mexican‑American whose family maintains strong ties to Mexican traditions, language, and communal values. Growing up, he celebrated Día de los Muertos, Semana Santa,
    and shared family meals that emphasized respect, humility, and collective well‑being—traits that echo in his cooperative and harmony‑oriented personality. Bilingual in Spanish and English, he bridges
    cultural contexts at work and in his Lake Oswego community, often serving as a cultural liaison for Spanish‑speaking colleagues. His immigration heritage has instilled a pragmatic work ethic and resilience,
    complementing his calm demeanor and preference for predictable, structured environments. He embraces the Pacific Northwest lifestyle while preserving his Mexican heritage through food, music, and participation
    in local Latino cultural events.
attributes:
  skills: '[''Production scheduling'', ''Materials expediting'', ''Inventory control'', ''ERP system navigation (SAP, Oracle NetSuite)'', ''Advanced Excel (pivot tables, macros)'', ''Data analysis & forecasting'',
    ''Process optimization'', ''Supply chain coordination'', ''Bilingual communication (Spanish/English)'', ''Time management'', ''Problem solving'']'
  hobbies: '[''Strategy video gaming (Factorio, Civilization)'', ''Weightlifting and fitness'', ''Trail hiking in Columbia River Gorge'', ''Cooking Mexican cuisine (mole, tamales)'', ''Woodworking'', ''Reading
    non‑fiction (productivity, supply‑chain)'', ''Playing acoustic guitar'', ''Volunteer work at cultural festivals and food drives'']'
  career_goals: Ricardo aims to complete his bachelor's degree in Supply Chain Management or Industrial Engineering within the next three years while continuing to gain hands‑on experience. He plans to
    earn APICS CPIM and CSCP certifications to deepen his expertise in production planning and logistics. In the medium term, he aspires to move into a senior production planner or supply chain analyst
    role, leading cross‑functional projects that improve lead times and reduce waste. Ultimately, he envisions a managerial position—such as Operations Manager or Director of Supply Chain—where he can apply
    his structured, high‑standard mindset to drive strategic improvements and mentor junior staff.
