personas:
  professional: Addie Viktora, at 33, is a radiologic technologist with expert‑level proficiency in digital radiography, CT, and fluoroscopy, who leverages a calm yet competitive mindset to streamline workflows,
    mentor junior staff, and turn unexpected equipment glitches into opportunities for process improvement while blending strict safety protocols with flexible, on‑the‑fly problem solving.
  sports: Addie Viktora, at 33, fuels their fitness through weekly 5K runs with the Pikes Peak Runners Club, seasonal hikes up the Front Range foothills, and passionate support for Colorado’s professional
    teams—the Denver Broncos, Colorado Avalanche, and Colorado Springs Switchbacks FC—while they treat strategic board‑game nights like low‑impact sport, preserving a competitive edge without overcommitting
    their schedule.
  arts: Addie Viktora, age 33, channels a love of mystery into devouring novels by Gillian Flynn and Tana French, captures sunrise vistas in the style of Ansel Adams with a Nikon D850, relaxes to indie
    folk like Mumford & Sons and the smooth tones of jazz guitarist Pat Metheny, and sharpens their strategic mind during small‑group Settlers of Catan sessions.
  travel: Addie Viktora, at 33, prefers self‑planned, low‑key trips that blend scenic photography with modest adventure, having captured the turquoise waters of Lake Louise, trekked Iceland’s Reykjanes
    Peninsula basalt columns, and earmarked a solo pilgrimage to Japan’s cherry‑blossom festivals in Kyoto for a future photographic expedition.
  culinary: Addie Viktora, now 33, cooks with disciplined yet experimental flair, often whipping up quinoa bowls with roasted sweet potatoes, kale, feta, and a drizzle of tahini, mastering pad Thai with
    shrimp, peanuts, and tamarind, while also savoring a perfectly balanced cup of ginger‑lemon tea after a knitting session.
  core: Addie Viktora balances a structured, detail‑oriented career in medical imaging with a relaxed, competitive zest for hiking, puzzles, and strategic games, all while maintaining disciplined finances
    and health habits that occasionally slip when dental appointments loom.
background:
  cultural: Addie was raised in a middle‑class white family on the outskirts of Colorado Springs, Colorado. Her upbringing emphasized self‑reliance, practicality, and a strong work ethic, reflecting the
    region’s blend of suburban values and outdoor enthusiasm. Family traditions include holiday gatherings with extended relatives, participation in community events like farmers’ markets, and a shared
    appreciation for the Rocky Mountain lifestyle. Though she completed some college coursework, she values hands‑on experience and continuous learning, a perspective shaped by the pragmatic, independent
    ethos of the American West.
