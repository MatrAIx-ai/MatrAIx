  hobbies: '["Hiking", "Nature photography", "Mystery novels", "Knitting", "Strategic board games", "5K races", "Puzzle solving", "Gardening", "Yoga"]'
  career_goals: Addie aims to earn full ARRT certification in advanced imaging modalities and specialize in CT and MRI. She aspires to become a lead technologist or shift supervisor, overseeing quality
    improvement projects and workflow optimization. Over the next five years she plans to complete a bachelor’s degree in health sciences or radiologic technology management. Long‑term, she is interested
    in transitioning into radiology informatics or launching a freelance mobile imaging consultancy that offers flexible services to rural clinics.
