  hobbies: '[''Cooking traditional Guatemalan dishes'', ''Gardening/maintaining vegetable garden'', ''Playing acoustic guitar'', ''Watching soccer (Guatemala national team)'', ''Reading mystery novels'',
    ''Playing chess or crosswords'', ''Volunteering at community garden'']'
  career_goals: David’s primary ambition is to convert his practical skills into a modest, reliable source of income that can support his family while providing the structure he values. He hopes to obtain
    a local certification in home‑maintenance trades (e.g., HVAC or plumbing) to formalize his expertise and gain credibility. At the same time, he wants to build a small network of regular clients in Sparks,
    allowing him to work on his own schedule and maintain the flexibility he prefers. He also aims to improve his emotional wellbeing by establishing a stable routine and possibly volunteering at a community
    garden, which would blend his desire for cooperation with personal growth.
