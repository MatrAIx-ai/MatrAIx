personas:
  professional: James Harbin is an aspiring junior illustrator who transforms the fantastical creatures from their imagination onto paper with meticulous shading, while their love for organized LEGO builds
    sharpens their ability to plan complex artistic projects, and they channel a competitive streak into entering local art contests despite a preference for solitude.
  sports: James Harbin is a solitary bike enthusiast who pedals the bayou trail after school, watches the New Orleans Saints with a tactical eye, and when not riding, practices batting drills with the Opelousas
    Fireflys youth baseball team, channeling their competitive nature into personal performance metrics rather than team camaraderie, and they keep a journal of sprint times and batting averages.
  arts: James Harbin draws creative energy from the zydeco rhythms of BeauSoleil and the sweeping orchestral scores of Jeremy Soule, channeling that inspiration into sketches of winged dragons and elaborate
    LEGO dioramas while they devour the latest Harry Potter novel to fuel their storytelling, and they often replay instrumental tracks as a soundtrack for their artistic sessions.
  travel: James Harbin dreams of wandering the vibrant streets of New Orleans during Mardi Gras and splashing in the surf at Grand Isle, planning each outing on a hand‑drawn map while balancing parental
    budget constraints that limit family trips to Orlando’s theme parks each summer, and they eagerly collect postcards from every destination as a tangible record of their adventures.
  culinary: James Harbin’s palate gravitates toward rich Cajun staples like gumbo and crawfish étouffée, and while they’re still mastering the art of a perfect roux under their mother’s watchful eye, they
    take pride in sprinkling fresh herbs onto homemade beignets and adding a dash of hot sauce to every snack.
  core: James Harbin is a quiet imagination engine, building fantastical worlds with LEGO and Minecraft while wrestling with worry‑driven perfectionism and a fierce competitive streak that fuels both art
    contests and personal challenges.
background:
  cultural: James was raised in Opelousas, a small town in Evangeline Parish, Louisiana, where Southern and Cajun influences intertwine. His family, of primarily Anglo-American ancestry, lives in a close-knit
    community that values family gatherings, church participation, and regional traditions such as Mardi Gras celebrations, zydeco music, and Creole cuisine. Although his cultural roots are largely white
    Southern, exposure to French-derived Cajun language fragments and local festivals enriches his artistic perspective and storytelling sensibility.
attributes:
  skills: '["Traditional sketching","Digital illustration (tablet)","Creative writing","Basic Scratch coding","Puzzle solving","Chess strategy","Nature observation and journaling"]'
