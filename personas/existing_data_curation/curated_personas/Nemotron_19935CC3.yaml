personas:
  professional: Alejandro Perez, a budding little engineer who spends preschool afternoons building towers with interlocking blocks, demonstrates an early knack for spatial reasoning and problem‑solving;
    their curiosity drives them to test how structures hold up, while a surprisingly organized approach—sorting blocks by color and size—keeps the play area tidy, yet they remain flexible enough to reshape
    creations when peers suggest new ideas.
  sports: Alejandro Perez loves the rhythm of tiny soccer drills with the Kennett Square Kids Soccer Club, eagerly chasing a soft ball during outdoor play, while also cheering for the Philadelphia Eagles
    on family TV nights; in winter, they bundle up for occasional ice skating sessions at the local rink, balancing high‑energy games with periods of quiet observation on the sidelines.
  arts: Alejandro Perez shows a playful artistic side, often drawing vibrant pictures of brightly colored maracas and ribboned sombreros inspired by the mariachi songs they hear at home, while their favorite
    screen performances include the animated adventures of Pocoyo and the lively tunes of Luis Miguel, which shape their imagination and provide a soundtrack for their crayon‑filled creations.
  travel: Alejandro Perez enjoys short car trips that end at the family’s farm stand where they can pick fresh strawberries, and they eagerly anticipate a future visit to the historic sites of Philadelphia’s
    Independence Hall and the children’s museum in Pittsburgh; their travel style is guided by a love for familiar routines, but the excitement of a weekend ferry ride to a nearby island keeps their curiosity
    alive.
  culinary: Alejandro Perez has a palate that lights up for soft chicken tacos with avocado slices, the sweet chew of tamales with masa, and the bright flavor of mango‑studded fruit salad; they like to
    help stir batter for corn pancakes and proudly garnish a plate with a sprinkle of cheese, though they often bite into the corner of a cookie before the rest of the snack is fully prepared.
  core: Alejandro Perez is a worry‑prone but endlessly curious three‑year‑old who balances meticulous toy organization with spontaneous mess‑making, asserts their wants politely, yet sometimes erupts in
    tears over minor setbacks.
background:
  cultural: Alejandro grows up in a bilingual Mexican-American household in Kennett Square, Pennsylvania. At home, Spanish is spoken alongside English, and family traditions such as celebrating Día de los
    Muertos, sharing tacos and tamales, and listening to mariachi music are woven into daily life. His parents emphasize the values of family closeness, respect for elders, and a strong work ethic, while
    also encouraging curiosity and education. He attends a local preschool where he interacts with peers from diverse backgrounds, giving him exposure to a mix of cultural customs. The combination of his
    Mexican heritage and his upbringing in a rural Pennsylvania community shapes his identity, fostering an appreciation for both his cultural roots and the broader American culture.
