personas:
  professional: Heather Perez, a one‑year‑old with a natural penchant for arranging her building blocks in precise patterns and systematically sorting her toys, already displays the organized, methodical
    curiosity and competitive streak that foreshadow a future as a meticulous project manager or design engineer; they often march their stuffed animals into neat rows.
  sports: Heather Perez, a curious toddler with boundless energy, enjoys weekly toddler gymnastics classes and a local Lil’ Kickers soccer program, cheers on the Atlanta Braves during family backyard games,
    and they favor playful crawling races over structured team drills, embodying a competitive yet solitary approach to fitness.
  arts: Heather Perez, a bright one‑year‑old, delights in the melodic lullabies of Disney’s ‘Frozen’ soundtrack, the rhythmic storytelling of Raffi’s ‘Baby Beluga,’ and the vibrant artwork at the annual
    Alpharetta community fair, and they often sway to Beyoncé’s ‘Halo’ while finger‑painting bright splatters, weaving music and visual art into her early identity.
  travel: Heather Perez, an adventurous infant, has already explored the Georgia Aquarium in Atlanta, a beach day in Savannah, and a family road trip to Asheville’s Blue Ridge Mountains, and they love the
    comfort of car‑seat rides with soft blankets, preferring relaxed, sensory‑rich excursions over high‑energy adventures.
  culinary: Heather Perez, a discerning one‑year‑old palate, prefers soft mashed sweet potatoes, creamy mac & cheese, small bites of collard greens seasoned lightly, and occasional peach puree, and they
    proudly grasp a spoon to feed themselves, while family gatherings showcase her love for southern comfort foods like fried chicken and pimento cheese.
  core: Heather Perez, a one‑year‑old raised amid Southern traditions, combines organized curiosity, a competitive edge, and a hint of skepticism toward new faces, balancing lively play with treasured quiet
    moments and a budding habit of sorting snack portions.
background:
  cultural: Heather is being raised in Alpharetta, Georgia, in a predominantly white, middle‑class Southern‑US environment. Her family participates in typical American traditions such as Thanksgiving, Christmas,
    and Fourth of July celebrations, while also embracing local customs like attending community fairs and enjoying Southern cuisine. This blend of mainstream American culture and regional Southern influences
    shapes her early experiences and values.
