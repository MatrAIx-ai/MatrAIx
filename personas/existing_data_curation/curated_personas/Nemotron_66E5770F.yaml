  hobbies: '["Visiting art galleries and museums", "Attending theater and live music events", "Watercolor painting", "Street photography", "Book club participation", "Gardening", "Hiking and nature walks",
    "Yoga and mindfulness practice", "Hosting dinner parties", "Collecting limited‑edition prints"]'
  career_goals: Katherine aims to progress from her current first‑line supervisor role to a district manager position overseeing multiple stores in Western Massachusetts within the next three to five years,
    allowing her to shape regional retail strategies and mentor emerging leaders. She also plans to open a boutique that blends retail with local art exhibitions after retirement, leveraging her expertise
    in visual merchandising and her love for the arts. Additionally, she aspires to develop a formal mentorship program within her company that supports women and younger employees, reflecting her cooperative
    yet assertive nature.
