personas:
  professional: Katherine Fletcher, a veteran front‑line retail supervisor with three decades of experience, leverages a talkative, sociable leadership style and a keen eye for visual merchandising to coach
    high‑performing teams, analyze sales data in Excel, and design unconventional store layouts inspired by her love of art, all while maintaining calm composure during peak holiday periods.
  sports: Katherine Fletcher enjoys hiking the Connecticut River Trail in fall, practices yoga three times a week, supports the Boston Red Sox and New England Revolution, and participates in a local walking
    club that meets at the Westfield community center, blending low‑impact fitness with regional team loyalty.
  arts: Katherine Fletcher, an avid watercolorist and street photographer, collects limited‑edition prints by contemporary artists such as Olafur Eliasson and local painter Sarah Whitaker, attends community
    theater productions starring regional talents, and frequently cites inspiration from musicians like Norah Jones and folk band The Lone Bellow during her creative sessions.
  travel: Katherine Fletcher prefers curated art‑focused trips, having recently explored the Museum of Fine Arts in Boston, the historic streets of Charleston, South Carolina, and the vineyards of Tuscany,
    while maintaining a habit of spontaneous weekend getaways to nearby New England towns like Portland, Maine, where she blends sightseeing with sketch‑in‑the‑park moments.
  culinary: Katherine Fletcher delights in cooking seasonal New England dishes—such as lobster bisque, herb‑crusted cod, and blueberry crisp—using locally sourced herbs, farm‑fresh vegetables, and occasional
    foraged mushrooms, while hosting storytelling‑rich dinner parties where she pairs each course with a thoughtfully selected wine from the Finger Lakes region.
  core: Katherine Fletcher melds a calm, resilient demeanor with a gregarious, art‑driven curiosity, turning every retail challenge, garden plot, and dinner gathering into an opportunity for creative problem‑solving
    and vibrant social exchange.
background:
  cultural: Katherine was raised in a middle‑class white family in the Pioneer Valley of Western Massachusetts. Her parents, of Anglo‑American heritage, emphasized hard work, self‑reliance, and the importance
    of education, leading her to attend a community college where she earned an associate’s degree in Business Administration. The region’s strong sense of community, historic colonial roots, and vibrant
    seasonal arts scene have shaped her appreciation for both tradition and contemporary culture. Although she grew up in a Methodist household, she now identifies as culturally secular, embracing the progressive
    and inclusive values common in New England. Her lifelong independence, reflected in her decision never to marry, aligns with the New England ethos of individualism balanced by active civic participation.
attributes:
  skills: '["Retail Operations Management", "Team Leadership and Coaching", "Customer Service Excellence", "Visual Merchandising", "Inventory Control", "Sales Data Analysis", "POS System Administration",
