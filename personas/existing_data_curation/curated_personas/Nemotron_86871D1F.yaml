personas:
  professional: Johnetta Kay, a 53‑year‑old community‑oriented horticulturist and genealogy enthusiast, leverages their hands‑on gardening expertise, budgeting acumen, and knack for organizing local history
    projects to develop a seasonal stall at the Anderson Farmer’s Market while designing workshops that teach seniors how to trace their ancestry.
  sports: Johnetta Kay enjoys low‑impact cardio by walking sunrise trails along the Big Walnut Creek, plays senior‑league pickleball at the Anderson YMCA, and fervently roots for the Indianapolis Colts,
    Indiana Pacers, and Indiana Hoosiers during game weekends, while they occasionally join the Anderson Walking Club for group hikes.
  arts: Johnetta Kay spends quiet evenings quilting while listening to folk legend Gillian Welch and classic country icon Johnny Cash, flips through Agatha Christie mysteries, and captures garden light
    in photographs reminiscent of Ansel Adams’ black‑and‑white style, often sharing their work at the local community center.
  travel: Johnetta Kay prefers unhurried road trips that blend scenic photography stops with historic pit stops, having driven Ohio’s Amish Country backroads and explored Savannah’s historic district, while
    their bucket list includes a summer visit to England’s Cotswolds to photograph English gardens and a fall hike in the Great Smoky Mountains.
  culinary: Johnetta Kay, an adept home cook, builds meals around garden harvests, crafting heirloom tomato gazpacho, rosemary‑infused roasted chicken, and strawberry‑vintage jam, while they treat Sunday
    picnics to fresh corn on the cob, homemade apple butter, and farm‑to‑table recipes that pair locally sourced honey with sharp cheddar.
  core: Johnetta Kay is a curiosity‑driven yet pragmatic gardener who balances meticulous seed‑saving with a habit of misplacing keys in the vegetable patch, turning each day into a blend of quiet solitude,
    competitive organization, and love for the small wonders of rural life, while they keep a spare notebook of ideas tucked under a potting shed.
background:
  cultural: Johnetta grew up in a modest, middle‑class white family in rural Madison County, Indiana. The Midwestern culture of her upbringing emphasized self‑reliance, practical stewardship of the land,
    and a strong sense of community involvement. Traditions such as family picnics, seasonal harvest celebrations, and local historical storytelling shaped her appreciation for both established methods
    and a curiosity about new ideas. These values continue to influence her life choices, from gardening to her interest in preserving local history.
