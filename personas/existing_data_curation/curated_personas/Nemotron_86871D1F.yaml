  hobbies: '[''Gardening'', ''Genealogy research'', ''Quilting'', ''Birdwatching'', ''Reading historical biographies and mystery novels'', ''Nature photography'', ''Cooking with home‑grown produce'', ''Walking
    local nature trails'', ''Attending small community workshops'']'
  career_goals: Johnetta hopes to turn her passion for gardening into a small seasonal stall at the Anderson Farmer's Market, selling fresh produce and homemade preserves to generate supplemental income.
    She also aims to complete a comprehensive family genealogy chart and launch a community workshop that teaches seniors how to trace their ancestry, satisfying her competitive drive to lead a well‑organized
    program. Additionally, she plans to take a basic computer literacy course to strengthen her digital skills and secure greater financial independence in retirement.
