personas:
  professional: Justine Nazario, a 59-year-old full‑stack software developer, blends pragmatic Python, JavaScript, and React expertise with bilingual communication to mentor junior coders, lead community
    tech workshops, and drive accessible UI design, balancing curiosity with practical solutions while navigating leadership through organized flexibility and assertive collaboration.
  sports: Justine Nazario, an avid hiker of the Sangre de Cristo Mountains and member of the Alto Trail Runners Club, stays fit through weekly salsa dance sessions, cheers on the New Mexico United soccer
    team in the spring and the Albuquerque Isotopes baseball club in the summer, and incorporates weekend 5K charity runs into her routine.
  arts: Justine Nazario, a salsa‑dance circle leader, finds inspiration in the music of Celia Cruz, Carlos Santana, and Lila Downs, enjoys sci‑fi novels by Octavia Butler and N.K. Jemisin, and regularly
    attends local theater productions featuring regional playwrights, letting these artistic experiences shape her community‑centric worldview.
  travel: Justine Nazario plans trips with a mix of detailed itineraries and spontaneous detours, favoring adventurous road‑trips through New Mexico’s high desert and cultural pilgrimages to Oaxaca, while
    dreaming of trekking Patagonia’s glaciers once her retirement savings allow a longer journey.
  culinary: Justine Nazario, an advanced home‑cook, regularly prepares traditional dishes such as mole poblano, chiles en nogada, and tamales using ingredients like ancho chilies, masa harina, fresh epazote,
    and Mexican chocolate, while also experimenting with fusion recipes and savoring farm‑to‑table meals at Santa Fe’s The Farmhouse.
  core: Justine Nazario, a community‑driven tech mentor who salsa‑dances her way through code reviews, tracks her blood pressure like a stock ticker, and never misses a Saturday board‑game night, embodies
    pragmatic curiosity and organized flexibility.
background:
  cultural: Justine’s Mexican heritage is a central part of her identity. Raised in a bilingual household, she celebrates Día de los Muertos, Mexican Independence Day, and local New Mexican traditions,
    blending them with the broader community culture of Alto. Her family gatherings emphasize sharing homemade foods, music, and stories, fostering a strong sense of community and intergenerational respect.
    This cultural foundation informs her collaborative work style, her commitment to community service, and her passion for preserving and sharing cultural culinary practices.
