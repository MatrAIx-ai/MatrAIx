  career_goals: Justine aims to transition from day‑to‑day coding to a leadership role that blends technology with community development. She plans to mentor emerging developers through a local coding bootcamp,
    spearhead digital‑inclusion projects for small businesses in Lincoln County, and develop open‑source tools that help local farmers manage crop data. Over the next five years, she hopes to become a senior
    technical lead or consultant, championing projects that improve access to technology for underserved populations while continuing to grow her expertise in cloud services and data analytics.
