    "Fashion design"]'
  career_goals: Valerie aims to complete her bachelor's degree in communications or marketing while securing internships that bridge classroom learning with real‑world campaigns. She aspires to start her
    career as a marketing coordinator, leveraging her competitive drive to excel in data‑driven projects and brand strategy. Long‑term, she envisions advancing to a brand manager role and eventually launching
    her own event‑planning consultancy focused on culturally resonant experiences for the African American community. Throughout her professional journey, she seeks opportunities that combine creativity,
    leadership, and measurable impact.
