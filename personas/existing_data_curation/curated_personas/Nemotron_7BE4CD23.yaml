personas:
  professional: Valerie Mccluney, a 21‑year‑old communications major, channels their outgoing charisma and strong event‑planning expertise into leading vibrant campus marketing projects, rigorously applying
    data‑driven analysis while flexibly adapting to last‑minute changes— they balance their competitive edge with a healthy dose of skepticism toward vague briefs.
  sports: Valerie Mccluney stays active in intramural volleyball and regular dance workshops, while cheering on the St. Louis Cardinals, Chicago Bears, and Southern Illinois Salukis during the baseball,
    football, and basketball seasons, preferring high‑energy group workouts that fulfill their sociable nature, and they occasionally skip scheduled gym sessions in favor of spontaneous social plans.
  arts: Valerie Mccluney immerses themselves in the arts by photographing campus gatherings, experimenting with avant‑garde fashion pieces inspired by Alexander McQueen, and attending live shows featuring
    Anderson .Paak, Janelle Monáe, and the local indie band The Blindsharks, while also diving into contemporary literature that explores identity and social themes, shaping a vibrant creative identity,
    and they regularly share their work on social media to spark dialogue.
  travel: Valerie Mccluney prefers spontaneous weekend road trips to culturally rich nearby cities such as New Orleans, Savannah, and Charleston, while dreaming of a future spring‑break backpacking adventure
    through the Appalachian Trail and a summer getaway to Lisbon, balancing a tight student budget with a hunger for authentic experiences, and they often budget carefully to stretch each trip.
  culinary: Valerie Mccluney enjoys mastering Southern comfort classics like fried chicken, collard greens with smoked turkey, buttery cornbread, and shrimp‑and‑grits, often adding a dash of cayenne and
    a swirl of sweet‑potato mash for a twist, while also seeking out campus food trucks for creative tacos and vegan ramen, reflecting a moderately skilled home cook who loves to blend tradition with experimental
    flavor pairings, and they often host potluck dinners for friends.
  core: Valerie Mccluney, a 21‑year‑old communications student, blends boundless social energy with a habit of double‑booking events, wielding a competitive streak that drives them to excel in data‑heavy
    marketing while still battling occasional procrastination and impulsive concert splurges, and they often find themselves negotiating deadlines at the last minute.
background:
  cultural: Valerie identifies as a Black woman raised in the Midwest, with family roots that trace back to the Southern United States. Growing up in Carbondale, she has been shaped by a blend of local
    Midwestern values and the vibrant cultural traditions of African American communities, including church gatherings, gospel music, and annual heritage festivals. Her upbringing fostered a strong sense
    of resilience and an appreciation for collective storytelling, which informs both her personal interests and her professional ambition to create culturally resonant experiences.
