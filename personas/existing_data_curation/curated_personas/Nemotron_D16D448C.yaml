  career_goals: Ninette aims to transition into senior leadership, targeting a Director of Engineering role where she can steer innovative product development in aerospace or sustainable technologies. She
    plans to launch her own consultancy focused on eco‑friendly mechanical design that merges engineering precision with artistic expression. Over the next five years, she intends to file at least two patents,
    pursue a PhD or advanced certification in sustainable engineering, and become a recognized speaker at international conferences on integrating art and engineering. Additionally, she is committed to
    mentoring Hispanic women in STEM through SWE and local community programs, and she seeks to influence corporate sustainability initiatives toward net‑zero product lifecycles.
