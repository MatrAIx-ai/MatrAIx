personas:
  professional: Ninette Arceo, a senior mechanical engineer and design strategist, channels her vivid imagination and meticulous project‑management expertise into leading cross‑disciplinary aerospace prototypes
    while demanding high standards and fostering a competitive yet supportive team culture.
  sports: Ninette Arceo, an avid outdoor enthusiast based in Florida, spends weekends kayaking the Everglades and hiking the Ocala Trail while cheering for the Miami Heat and Tampa Bay Rays, and they integrate
    their competitive streak into a disciplined cross‑training regimen at the local YMCA marathon club.
  arts: Ninette Arceo, a mixed‑media sculptor and abstract painter, draws inspiration from the kinetic installations of Alexander Calder, the improvisational flair of Latin jazz icon Tito Puente, and the
    emotive piano interpretations of Martha Argerich, frequently visiting the Pérez Art Museum Miami to stay attuned to contemporary visual trends.
  travel: Ninette Arceo prefers meticulously planned itineraries that blend cultural immersion with hands‑on workshops, having explored the aerospace museums of Toulouse and the sustainable design labs
    of Copenhagen, while dreaming of a month‑long retreat in the Patagonian Andes to sketch and prototype in solitude.
  culinary: Ninette Arceo, a passionate home chef, masters traditional mofongo with plantain and pork, experiments with saffron‑infused seafood paella, and meticulously seasons dishes with smoked paprika
    and fresh cilantro, often pairing meals with a glass of aged rum.
  core: Ninette Arceo blends relentless engineering precision with a free‑spirited artistic flair, obsessively collects vintage mechanical watches, yet cannot resist binge‑reading sci‑fi epics late into
    the night, sometimes sacrificing sleep for the next prototype.
background:
  cultural: Born and raised in San Juan, Puerto Rico, Ninette grew up in a bilingual household that emphasized family ties, resilience, and cultural pride. She moved to Orlando for her undergraduate and
    graduate studies in mechanical engineering, maintaining fluency in both Spanish and English. Ninette actively participates in the local Puerto Rican community, celebrating festivals such as Noche de
    San Juan and the Puerto Rican Day Parade, and she supports cultural organizations like the Puerto Rican Chamber of Commerce. Her culinary practices blend traditional Puerto Rican flavors with Floridian
    influences. She draws on her heritage to mentor young Puerto Rican women in STEM, bringing a culturally diverse perspective to her engineering projects and fostering inclusive innovation.
