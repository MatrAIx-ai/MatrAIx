personas:
  professional: Nohemy Guirguis, an aspiring digital illustrator and budding interactive storyteller, blends hand‑sketching with Procreate and beginner Python scripts to prototype simple games for the school
    art club; their curiosity fuels constant experimentation with new techniques while their organized approach ensures deadlines are met and volunteer commitments at the library are fulfilled.
  sports: Nohemy Guirguis channels a love for the outdoors into weekend hikes through the Wasatch Range, capturing nature photography for art projects, and competes in the school’s cross‑country club training
    for district meets; they cheer loudly for the Utah Jazz during NBA nights and wear a Real Salt Lake scarf for MLS games, while also playing on a local Ultimate Frisbee league that meets after school.
  arts: Nohemy Guirguis thrives in the art club, merging traditional sketching with digital tools like Photoshop to create sci‑fi themed character designs inspired by Hayao Miyazaki and contemporary illustrator
    Loish; they write short stories while listening to indie musicians such as Phoebe Bridgers and Tame Impala, and regularly volunteer at the library’s summer reading program, recommending graphic novels
    by N.K. Jemisin and other speculative fiction authors.
  travel: Nohemy Guirguis prefers road‑trip adventures, planning weekend getaways to Utah’s national parks—Zion, Bryce, and Arches—using a handwritten notebook to sketch routes and photo hotspots; they
    dream of a backpacking journey through the Japanese Alps to study ukiyo‑e prints, but budget constraints keep the focus on nearby state parks and occasional visits to the rain‑soaked forests of the
    Pacific Northwest.
  culinary: Nohemy Guirguis enjoys crafting simple yet vibrant meals, often preparing avocado toast with cherry tomatoes, sea salt, and a drizzle of sriracha, and cooking veggie stir‑fry with tofu, soy
    sauce, ginger, and broccoli; their favorite comfort dish is a buttery cinnamon muffin baked for library volunteers, though they sometimes burn the edges when distracted by a new art concept.
  core: Nohemy Guirguis is a curious teen artist who balances meticulous planning with spontaneous creativity, habitually doodles in margins, is disciplined about savings yet occasionally splurges on indie
    music, and tackles acne and allergies with a proactive yet sometimes forgetful health routine.
background:
  cultural: Nohemy grew up in the modest, close‑knit community of Tremonton, Utah, where many families share a heritage rooted in the Intermountain West. Her cultural environment emphasizes self‑reliance,
    volunteerism, and strong family ties, with frequent community events such as county fairs, local clean‑up projects, and school gatherings. While she identifies as white, her upbringing reflects a blend
    of traditional values and contemporary influences, encouraging both appreciation for local customs and openness to diverse artistic and intellectual ideas.
