    volunteer work'', ''Scratch game design'', ''Board games'', ''Journaling'']'
  career_goals: Nohemy aspires to attend a university with a reputable visual arts and digital media program, aiming to become a multimedia artist or user experience designer who crafts accessible, socially
    conscious digital experiences. She hopes to blend her artistic talents with technology to tell compelling stories that raise awareness about environmental and community issues. In the longer term, she
    dreams of mentoring younger students in her hometown by establishing an after-school art and tech workshop.
