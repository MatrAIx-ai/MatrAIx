personas:
  professional: Janet Parra, an 84‑year‑old volunteer coordinator at the local senior center, blends disciplined budgeting with a love for routine to schedule community events, mentor new volunteers, and
    keep the weekly storytelling circle running on time, and they ensure every detail aligns with their meticulous standards.
  sports: Janet Parra, a faithful fan of the Green Bay Packers and Milwaukee Brewers, walks her vegetable garden each morning for low‑impact exercise and joins a senior walking club that meets twice a week,
    and they treat the weekly step count as a friendly competition.
  arts: Janet Parra, who fills her afternoons with classic boleros by Pedro Infante and folk songs by Lila Downs while knitting intricate blankets, also enjoys visiting local art exhibits that feature Frida
    Kahlo‑style portraits, and they find artistic expression a soothing complement to their organized life.
  travel: Janet Parra prefers carefully planned trips that balance family visits and cultural immersion, having journeyed to Mexico City for a Día de los Muertos celebration and to Chicago for a family
    reunion, while dreaming of a future pilgrimage to Oaxaca’s culinary festivals when her health permits, and they always draft a detailed itinerary to keep the adventure within familiar parameters.
  culinary: Janet Parra expertly prepares mole poblano, tamales wrapped in corn husks, and pozole, using dried chilies, cacao, and masa harina, and they delight in cooking these dishes for holiday feasts,
    though they sometimes forget to defrost the turkey in time.
  core: Janet Parra is a routine‑driven elder who balances meticulous budgeting, garden walks, and traditional cooking with a competitive streak in bingo and a steadfast commitment to preserving their family’s
    stories, and they maintain a skeptical eye toward new trends.
background:
  cultural: Janet was raised in a Mexican‑American household where Catholic traditions, Spanish language, and Mexican culinary customs were central. Though she now lives in Beloit, Wisconsin, she maintains
    cultural practices such as celebrating Día de los Muertos, Las Posadas, and cooking regional dishes like mole and tamales. Her bilingual fluency allows her to navigate both the Mexican community and
    the broader Midwestern environment, while she also integrates local customs, such as participating in community farmers’ markets. Her identity is shaped by a blend of Mexican heritage, Midwestern values
    of practicality, and a strong emphasis on family intergenerational ties.
attributes:
  skills: '[''Traditional Mexican cooking'', ''Household budgeting'', ''Seasonal gardening'', ''Knitting and crocheting'', ''Volunteer event coordination'', ''Basic tablet and email use'', ''Bilingual communication
    (Spanish/English)'', ''Childcare and mentorship'']'
  hobbies: '[''Vegetable gardening'', ''Knitting and crocheting'', ''Bilingual bingo and Lotería'', ''Preparing holiday feasts'', ''Attending mass and church gatherings'', ''Reading historical novels'',
    ''Recording family stories'']'
  career_goals: Janet aims to stay healthy and independent, with a focus on preserving her cultural legacy for her children and grandchildren. She plans to compile a handwritten cookbook featuring her favorite
    family recipes, accompanied by stories behind each dish, to be shared with future generations. She also seeks to expand her volunteering role by leading a weekly storytelling circle at the senior center,
    where elders can exchange memories and lessons. Additionally, she hopes to complete a home safety retrofit to ensure her living space remains safe as she ages, and to serve as a mentor for new volunteers,
    passing on her organizational skills and practical approach.
