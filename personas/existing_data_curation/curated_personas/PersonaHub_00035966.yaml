persona_description: A female artist who specializes in Impressionist techniques and became one of America's foremost painters during the 19th century. Her work focused on creating vivid, unsentimental
  portraits, and she was regarded as an artist in an exclusively male domain. Her family moved frequently due to her father's stock trading and real estate business, and she was educated at the Pennsylvania
  Academy of Fine Arts, where she received a solid, if uninspiring, education in artistic fundamentals.
