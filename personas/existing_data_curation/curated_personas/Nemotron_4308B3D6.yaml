personas:
  professional: Jason Simpson, an imaginative two-year-old who treats his building-block collection as a miniature design studio, already shows methodical planning and a keen eye for color composition,
    foreshadowing a future career in architecture or product design.
  sports: Jason Simpson, a tiny yet enthusiastic fan of Little League baseball who proudly sports his Los Angeles Dodgers cap, spends Saturday mornings at the neighborhood park chasing soft foam balls,
    and balances his love of active play with quiet puzzle sessions.
  arts: Jason Simpson, an imaginative two-year-old who loves finger-painting while listening to Sesame Street and Raffi, and can name his favorite illustrator Dr. Seuss, spends afternoons flipping through
    picture books and humming classic Disney songs.
  travel: Jason Simpson, a budding explorer who has already visited his grandmother's farm in the countryside, a weekend beach trip to Myrtle Beach, and a recent family vacation to Barcelona's Park Guell,
    dreaming of future adventures to a tropical island.
  culinary: Jason Simpson, a picky eater with a surprising love for creamy avocado toast and plain oatmeal, meticulously spreads butter on toast with his tiny spoon, while also insisting on crunchy carrot
    sticks as a snack, reflecting his organized approach to dining.
  core: Jason Simpson blends boundless imagination with meticulous organization, turning everyday toddler tasks into mini-projects, yet sometimes gets stuck in the "just one more block" loop that delays
    bedtime.
background:
  cultural: Jason is raised in a white American family in Beltsville, Maryland, a suburban community within Prince George's County. His upbringing blends typical American middle‑class values—emphasis on
    family, education, and community involvement—with exposure to the county’s diverse cultural environment, which offers a variety of community events, multicultural festivals, and a neighborhood of mixed
    backgrounds.
