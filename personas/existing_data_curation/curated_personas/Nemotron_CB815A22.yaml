  hobbies: '[''Hip-hop Dance'', ''Basketball'', ''TikTok Content Creation'', ''Cooking Creole Dishes'', ''Youth Outreach Volunteering'', ''Neighborhood Clean-ups'', ''Bayou Trail Exploration'']'
  career_goals: Marietta dreams of turning her love for community interaction and digital storytelling into a career that amplifies the voices of youth in Lake Charles. She envisions studying communications
    or public health after high school, aiming to become a community health advocate who uses social media to promote wellness, local culture, and civic engagement. In the short term, she hopes to create
    a weekly online series spotlighting local musicians, neighborhood heroes, and DIY projects, while also planning to launch a mentorship program that pairs high‑school seniors with middle‑school students.
    Ultimately, she aspires to combine her practical mindset and creative curiosity to lead initiatives that improve health outcomes and provide positive outlets for her peers.
