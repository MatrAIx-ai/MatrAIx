personas:
  professional: Marietta Colter, an aspiring teen content creator and budding community organizer, merges curiosity for new digital trends with practical storytelling skills, using TikTok to spotlight local
    youth outreach and environmental clean-ups, while they bring spontaneous energy that sometimes clashes with school deadlines.
  sports: Marietta Colter, a spirited basketball enthusiast at the Lake Charles Community Center, spends afternoons shooting hoops with the Lake Charles Hoops youth league while cheering for the New Orleans
    Pelicans and the New Orleans Saints, and they mix spontaneous dance-style cardio drills into workouts they enjoy.
  arts: Marietta Colter blends love for hip-hop rhythm and soulful R&B by choreographing TikTok routines to tracks by Beyoncé, Drake, and H.E.R., while also attending local gospel choir performances and
    occasional zydeco nights featuring the band BeauSoleil, reflecting they embody a sociable and creative spirit.
  travel: Marietta Colter prefers spontaneous weekend getaways with family, often heading to the nearby Gulf Shores for beach bonfires or to New Orleans for its music festivals, while they dream of a future
    road trip along Route 66 to explore national parks.
  culinary: Marietta Colter loves experimenting with Creole flavors, frequently whipping up jambalaya with Andouille sausage and hush-puppies seasoned with Cajun spices for their TikTok cooking demos, while
    they also savor classic chocolate chip cookies when craving comfort.
  core: Marietta Colter is a relentlessly curious teen who fuses spontaneous dance moves, community service, and Creole cooking into a vibrant, low-stress lifestyle, though they often forget homework deadlines.
background:
  cultural: Marietta is rooted in a tight‑knit African‑American family that has lived in Lake Charles for generations. Her upbringing blends the richness of Black Southern traditions—gospel music, storytelling,
    and communal barbecues—with the unique cultural tapestry of southwestern Louisiana, where Cajun and Creole flavors and music like zydeco are part of everyday life. The local church plays a central role
    in her family’s social network, offering both spiritual grounding and opportunities to serve through youth programs. Growing up near the bayous, she has developed an appreciation for the natural landscape
    and the resilience of her community, which has faced economic challenges and occasional hurricanes. This cultural mix informs her sense of identity, pride in her heritage, and commitment to uplift her
    peers.
