personas:
  professional: Raymond Lima, a veteran outpatient clinic support specialist, leverages three decades of meticulous patient‑transfer, EHR documentation, and equipment‑sterilization expertise to create reliable,
    step‑by‑step workflows, and their preference for routine and quiet enables them to mentor new staff with calm authority.
  sports: Raymond Lima, a dedicated early‑morning beach walker, enjoys low‑impact cardio on the Laguna shoreline, follows the Los Angeles Dodgers and Anaheim Ducks, and participates in the Mission Viejo
    Senior Cycling Club’s weekend rides, preferring routine over high‑intensity gym sessions.
  arts: Raymond Lima, an avid reader of historical nonfiction, finds solace in classic cinema by Frank Capra, listens to Frank Sinatra’s crooning, and collects prints of Norman Rockwell, often attending
    the Laguna Art Museum’s exhibitions on American realism.
  travel: Raymond Lima, a methodical planner, favors leisurely road trips along the Pacific Coast Highway to historic towns like Carmel and Santa Barbara, and has a bucket‑list of visiting the historic
    sites of England’s Tudor era, though they avoid crowded tours in favor of quiet, off‑peak travel.
  culinary: Raymond Lima, a modest home cook, often prepares simple Mediterranean‑style dishes such as grilled salmon with a rosemary‑basil rub and tomato‑basil spaghetti, relying on fresh produce from
    their garden and rarely experimenting beyond familiar recipes.
  core: Raymond Lima, a quietly disciplined 58‑year‑old who treasures routine, finds peace in solitary gardening, model‑ship building, and precise work, yet secretly hoards extra model‑ship glue and occasionally
    skips dentist appointments to finish a crossword.
background:
  cultural: Raymond grew up in a middle‑class, white, suburban community in Southern California, where traditional values and a strong work ethic were emphasized. His family attended a Protestant church
    (Methodist) regularly, instilling a sense of community service and respect for routine. The cultural milieu of Orange County—family‑oriented, relatively conservative, and focused on stability—has shaped
    his practical outlook and preference for familiar, structured environments. He identifies with mainstream American cultural norms, cherishes the independence taught by his parents, and maintains close
    ties to his spouse and extended family, often participating in community volunteer events at the local church and senior center.
attributes:
  skills: '[''Patient assistance'', ''Vital signs monitoring'', ''Electronic health record documentation'', ''Medical equipment sterilization'', ''Medication preparation assistance'', ''HIPAA compliance'',
