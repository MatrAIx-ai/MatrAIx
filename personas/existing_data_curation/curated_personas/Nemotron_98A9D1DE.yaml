  hobbies: '[''Vegetable gardening'', ''Early morning beach walks'', ''Birdwatching'', ''Scale model ship building'', ''Classic car restoration'', ''Reading historical nonfiction'', ''Reading classic literature'',
    ''Jigsaw puzzles'', ''Crossword puzzles'', ''Simple home cooking'']'
  career_goals: Approaching retirement, Raymond’s primary ambition is to secure a senior supervisory position within his clinic, where he can codify the efficient workflows he has refined over years and
    mentor the next generation of support workers. He plans to obtain a Certified Nursing Assistant (CNA) refresher certification and complete a short leadership training program offered by the healthcare
    system, positioning himself to oversee a small team and ensure a smooth hand‑over before he fully steps back. He also hopes to contribute to a quality‑improvement committee, applying his practical,
    data‑driven mindset to reduce errors and streamline patient‑care processes. Ultimately, his goal is a stable, low‑stress transition into part‑time consulting or volunteer health‑education work after
    retirement.
