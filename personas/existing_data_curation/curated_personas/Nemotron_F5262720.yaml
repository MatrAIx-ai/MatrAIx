personas:
  professional: Delroy Calahan is a high‑school sophomore who channels their hands‑on curiosity into building scale model cars and tinkering with small mechanical projects, positioning themselves as a budding
    engineer who balances schoolwork with consistent involvement in the church youth band’s drumming crew, demonstrating reliability and a structured approach to learning.
  sports: Delroy Calahan is a dedicated point guard for their school’s basketball team, cheering for the Chicago Bulls and the local youth league’s “Riverdale Raptors,” while also enjoying weekend fishing
    trips at Willow Creek and participating in a community fitness club that emphasizes structured drills and team cohesion.
  arts: Delroy Calahan immerses themselves in music, regularly listening to Kendrick Lamar, H.E.R., and Kirk Franklin, drumming in their church’s youth band, sketching pastoral landscapes inspired by countryside
    walks, and drawing inspiration from classic video game soundtracks to fuel their creative projects.
  travel: Delroy Calahan prefers short, cost‑effective trips that combine adventure with learning, having explored the historic streets of Savannah, the hiking trails of the Great Smoky Mountains, and dreaming
    of a future spring break in New Orleans to experience its live jazz scene, all while balancing school commitments and a limited travel budget.
  culinary: Delroy Calahan enjoys cooking simple yet flavorful meals such as garlic‑infused fried fish, spaghetti bolognese, and spicy chicken wraps, often experimenting with hot sauce and fresh herbs while
    helping prepare family gatherings, though they sometimes forget to clean up the kitchen after cooking marathons.
  core: Delroy Calahan is a structured, community‑focused teen who blends engineering curiosity, basketball leadership, and a love for music, yet they occasionally succumb to snack cravings and forget to
    tidy up after culinary experiments.
background:
  cultural: Delroy is rooted in a Black Southern community in Magnolia, Amite County, Mississippi. He was raised in an extended family where church attendance and community gatherings form the weekly rhythm
    of life. The local Baptist church, with its gospel choir and youth programs, provides both spiritual guidance and a venue for social interaction. Family traditions emphasize soulful cooking—fried chicken,
    collard greens, cornbread—and shared meals that reinforce communal bonds. Stories of civil‑rights activism and the legacy of African‑American resilience in the rural South are part of his upbringing,
    fostering a strong sense of pride and perseverance. Local customs, such as attending high‑school football games, participating in neighborhood barbecues, and helping neighbors with yard work, reinforce
    values of mutual aid and respect for elders. These cultural influences shape his worldview, nurturing an appreciation for hard work, reliability, and community service.
attributes:
  skills: '[''Organized note‑taking'', ''Time management'', ''Basic arithmetic and reading comprehension'', ''Structured problem‑solving'', ''Basic automotive maintenance (oil changes, fluid checks, minor
    diagnostics)'', ''Power‑tool usage for yard work and home repairs'', ''Digital communication (social media) and basic computer troubleshooting'', ''Teamwork and cooperative communication (sports, youth
    group)'', ''Public speaking (church youth meetings)'', ''Basic first aid'']'
  hobbies: '[''Basketball (school and neighborhood courts)'', ''Listening to hip‑hop, R&B, and gospel music'', ''Playing drums in church youth band'', ''Building scale model cars'', ''Strategy and sports
    video gaming'', ''Volunteering at the community food‑bank'', ''Helping prepare family meals (Southern cooking)'', ''Fishing at the nearby creek'', ''Sketching rural landscapes'']'
  career_goals: Delroy aims to finish high school and enroll in a vocational training program for automotive technology. He plans to earn an ASE certification, secure a stable position at a local repair
    shop, and eventually open his own family‑run garage in Magnolia. He values predictable, hands‑on work where he can apply his systematic problem‑solving skills. Additionally, he is exploring the possibility
    of joining the U.S. Army Reserve to gain disciplined technical training, tuition assistance, and a reliable career path. His long‑term ambition is to become a trusted service provider in his community
    while maintaining a steady income that supports his family.
