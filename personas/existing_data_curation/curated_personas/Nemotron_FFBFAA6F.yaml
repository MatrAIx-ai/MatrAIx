personas:
  professional: Carolyne Elas, a budding junior roboticist, channels her love of step‑by‑step LEGO building and puzzle‑solving into designing and programming simple robots in her school’s robotics club,
    displaying methodical planning, reliability, and a preference for clear, structured tasks.
  sports: Carolyne Elas, a midfielder for the local ‘Red Rovers’ youth soccer league, drills with the same disciplined routine she applies to LEGO building, enjoys watching the U.S. Women’s National Team
    and Manchester United matches on TV, and uses after‑school cardio sessions to channel nervous energy into structured fitness.
  arts: Carolyne Elas, who takes weekly piano lessons focusing on Beethoven’s ‘Für Elise’ and sings gospel harmonies with her family choir, also delights in listening to contemporary pop artist Taylor Swift
    and watching Disney’s animated films featuring voice actor Idina Menzel, weaving these varied musical influences into her creative play.
  travel: Carolyne Elas, whose travel plans are drafted in her scrapbook with color‑coded stickers, prefers short, well‑structured weekend trips like the family’s recent visit to the Grand Canyon and a
    school field trip to the Smithsonian, while dreaming of a future vacation to Legoland Billund in Denmark and a summer camp adventure at Lake Tahoe.
  culinary: Carolyne Elas, who can confidently whip up a peanut‑butter‑banana sandwich and bake chocolate chip cookies with Mom, favors bright flavors like strawberry‑filled pancakes, cheesy pizza slices,
    and crunchy carrot sticks, but often skips vegetables in favor of sweet treats, revealing a developing palate mixed with selective healthy choices.
  core: Carolyne Elas is a meticulous ten‑year‑old who transforms every hobby—from LEGO builds to soccer drills—into a structured adventure, yet battles a constant undercurrent of worry that fuels her journal‑filled
    evenings.
background:
  cultural: Carolyne comes from a Black family rooted in Tallahassee’s historic African-American community. Her mother works as a nurse at Tallahassee Memorial Hospital and her father is a public-school
    teacher, both emphasizing education and service. The family attends a historically Black Baptist church where gospel music, community outreach, and celebrations of events like Juneteenth and Kwanzaa
    are central. They frequently participate in cultural activities at nearby Florida A&M University, enjoy traditional soul-food dishes such as collard greens and sweet-potato pie, and share stories of
    the civil‑rights legacy of Leon County. This cultural environment nurtures her sense of resilience, collective support, and pride in her heritage.
