  career_goals: She aspires to a career in the health-care field, hoping to become a pediatric nurse or doctor because the profession offers a clear, structured pathway and the chance to help children,
    which aligns with her caring nature. To prepare, she aims to attend a STEM-focused middle and high school, participate in science camps, and eventually study at a university with a strong health-sciences
    program. Long-term, she also sees herself mentoring younger students through community programs like the Girl Scouts, using her organized skills to teach routines and confidence.
