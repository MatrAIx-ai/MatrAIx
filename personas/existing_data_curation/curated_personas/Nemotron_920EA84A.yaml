  hobbies: '[''Gardening'', ''Cooking Mexican cuisine'', ''Yoga and meditation'', ''Journaling'', ''Hiking local trails'', ''Reading mystery novels'', ''Volunteering at a food pantry'', ''Small-group board
    game nights'']'
  career_goals: Angel aims to deepen her impact in student housing by moving into a senior residential manager role within the next three to five years. She plans to pursue a bachelor's degree in social
    work or community development, obtain certifications in Mental Health First Aid and trauma‑informed care, and eventually oversee a department that integrates mental‑health support into residential life.
    Long‑term, she envisions establishing a culturally responsive housing program that specifically supports first‑generation Mexican‑American students and launching a community outreach initiative in Riverside
    County that provides safe, supportive housing for vulnerable families.
