personas:
  professional: An organized residential advisor, Angel Correa leverages their bilingual fluency, meticulous documentation, and calm conflict‑mediation style to craft predictable daily schedules for students,
    while quietly championing mental‑health resources and fostering a low‑key community atmosphere that reflects their love of routine and compassion.
  sports: Angel Correa enjoys weekend hikes in the San Gorgonio foothills with the local Rancho La Sierra Hiking Club, follows the Los Angeles Dodgers for baseball and the LA Lakers for basketball, and
    maintains a modest cardio routine of brisk walks to manage anxiety, preferring low‑key, nature‑based activity over competitive sports.
  arts: Angel Correa relaxes with mystery novels by Agatha Christie and John le Carré, attends occasional local art walks featuring muralists, and fills their garden evenings with the soulful guitar of
    Juan Dos and the classic croon of Frank Sinatra, allowing artistic narratives to soothe their emotional intensity.
  travel: Angel Correa prefers low‑stress, nature‑focused getaways, planning modest weekend trips to places like Sedona, Arizona and Joshua Tree National Park, while dreaming of a culturally immersive stay
    in Oaxaca, Mexico, and always books travel through a methodical spreadsheet to keep anxiety at bay.
  culinary: Angel Correa, an intermediate home chef, delights in turning garden harvests into vibrant Mexican staples such as chile rellenos, pozole, and fresh salsa verde, while also experimenting with
    roasted cauliflower tacos and avocado‑lime guacamole, treating each meal as a therapeutic ritual to channel both creativity and routine.
  core: Angel Correa blends a love for orderly routines with a deep well of compassion, navigating anxiety through gardening, yoga, and community service while occasionally yielding to impulsive cravings
    for fresh herbs and spontaneous acts of kindness.
background:
  cultural: Angel was born to Mexican‑American parents who settled in the Inland Empire. She grew up speaking Spanish at home and celebrating cultural traditions such as Día de los Muertos, Las Posadas,
    and family reunions centered around food. The blend of her Latino heritage and the close‑knit community of Yucaipa instilled a deep respect for family, collectivism, and hospitality. Her Catholic upbringing
    emphasized service and compassion, which now drive her commitment to helping others. She remains connected to her roots through weekly visits to a local Mexican cultural center, participation in Spanish‑language
    parish groups, and incorporating traditional recipes into her cooking.
attributes:
  skills: '[''Resident support and counseling'', ''Conflict mediation'', ''Crisis intervention'', ''Bilingual communication (Spanish/English)'', ''Organizational and time-management skills'', ''Event planning
