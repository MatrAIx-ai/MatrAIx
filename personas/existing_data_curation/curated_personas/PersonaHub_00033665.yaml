persona_description: A social scientist who is interested in understanding how people value things in relative terms and how marketers learn to exploit consumer behavior. This person is likely to have a
  background in psychology or sociology and is familiar with concepts such as valuation theory, relative valuation, and defaults. They are also likely to have a strong interest in literature and how it
  reflects these concepts, particularly in works that explore the decisions of protagonists based on the opinions of others. This person may also have a background in psychology or sociology and is familiar
  with concepts such as the mind's division between conscious and automatic processes, the rider on the back of an elephant metaphor, and the difficulty of deviating from the status quo.
