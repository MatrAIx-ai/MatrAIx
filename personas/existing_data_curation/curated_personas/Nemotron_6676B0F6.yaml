personas:
  professional: Tika Hardouin is a 21‑year‑old aspiring arts administrator who channels their waitstaff experience and meticulous scheduling into supporting museum educators, coordinating community workshops,
    and designing small‑scale exhibitions; they blend Midwestern humility with the Pacific Northwest’s progressive creativity.
  sports: Tika Hardouin is an avid hiker who spends weekends traversing the Palouse trail network with the Pullman Trail Hiking Club, and they attend weekly yoga classes at a local studio for flexibility,
    cheerfully follow the Washington State Cougars men’s basketball and the Seattle Seahawks as a fan, and occasionally join a recreational volleyball league at the campus recreation center.
  arts: Tika Hardouin immerses themselves in Pullman's indie‑arts scene, strolling through the Palouse Discovery Arts Museum, curating an Instagram feed of seasonal nature photography inspired by Ansel
    Adams and contemporary photographer Tyler Mitchell, organizing pop‑up exhibitions featuring works that echo Georgia O'Keeffe’s color palette, reading Walter Benjamin’s *The Work of Art in the Age of
    Mechanical Reproduction*, and they perform original poetry at the Boon coffee house open‑mic nights.
  travel: Tika Hardouin prefers thoughtfully planned, budget‑conscious trips that balance adventure and cultural immersion, such as weekend hikes in Oregon’s Columbia River Gorge, a spring art museum tour
    of Portland’s galleries, a summer backpacking trek through the Swiss Alps, and a future literary pilgrimage to Edinburgh, and they always book hostels or college‑rate lodges to stretch their modest
    student funds.
  culinary: Tika Hardouin enjoys experimenting with seasonal, farm‑to‑table dishes—such as rosemary‑roasted potatoes, beet and goat‑cheese salad, and hand‑rolled sourdough—while honing plating aesthetics
    inspired by Japanese kaiseki, and they often share these creations at potluck gatherings featuring fresh local berries and lavender‑infused honey.
  core: Tika Hardouin is a curious, organized art enthusiast who balances a part‑time waitstaff job with hiking, photography, and community volunteering, yet habitually over‑commits to projects while never
    skipping their morning latte, and they always carry a sketchbook in their backpack.
background:
  cultural: Tika identifies as a white American with French‑Canadian ancestry reflected in her surname Hardouin, and her family roots trace back to the Midwest, where she grew up in a modest, close‑knit
    community. Relocating to Pullman for college introduced her to the Pacific Northwest’s cultural milieu, fostering an appreciation for environmental stewardship, progressive social values, and a thriving
    independent‑arts scene. She blends the Midwestern emphasis on humility and hard work with the Northwest’s openness to unconventional ideas, which is evident in her curiosity about art, willingness to
    try new experiences, and preference for small, meaningful social circles. The regional emphasis on outdoor recreation and community engagement informs her hobbies and her desire to contribute to local
    cultural initiatives.
attributes:
  skills: '[''customer service'', ''order memorisation'', ''POS operation'', ''cash handling'', ''food safety compliance'', ''multitasking'', ''time management'', ''effective communication'', ''conflict
    resolution'', ''team collaboration'', ''attention to detail'', ''inventory tracking'', ''basic graphic design'', ''digital photography'', ''schedule management'']'
  hobbies: '[''visiting local art museums and galleries'', ''sketching the Palouse landscape'', ''digital and analogue photography'', ''reading contemporary fiction and art theory'', ''participating in
    small book clubs'', ''hiking regional trails'', ''yoga and mindfulness practice'', ''volunteering at community art workshops'', ''writing poetry and short stories'', ''experimental cooking'']'
  career_goals: Tika aspires to combine her love of the arts with her hospitality experience by pursuing a career in arts administration or museum education. She plans to complete her undergraduate degree
    in liberal arts with a focus on art history and museum studies, leveraging her proven reliability and organizational talent to work as a gallery assistant or museum docent. In the medium term she hopes
    to earn a graduate certificate in arts management, positioning herself for a leadership role that curates community‑focused exhibitions and educational programs. Long‑term, Tika envisions opening a
    small café‑gallery hybrid in Pullman, where local artists can showcase work while visitors enjoy curated coffee experiences. She also aims to develop her own visual portfolio, hoping to exhibit a series
    of photographs inspired by the Palouse landscape at regional art shows.
