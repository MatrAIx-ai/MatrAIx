  hobbies: '[''Visiting museums and galleries'', ''Photography'', ''Sketching and digital collage'', ''Reading literary fiction and art theory'', ''Yoga and mindfulness practice'', ''Cooking Filipino cuisine'',
    ''Attending cultural festivals'', ''Volunteering as art workshop instructor'']'
  career_goals: Danilo aspires to re‑enter the professional world by securing a curatorial or program‑director role at a museum or cultural institution in Southern California. He aims to develop and lead
    community‑focused art initiatives that highlight Southeast Asian diaspora narratives. Over the next five years he plans to complete a Master’s in Museum Studies, launch an online platform showcasing
    local artists, and publish scholarly articles on contemporary art. Ultimately, he envisions establishing his own cultural center that serves as a hub for interdisciplinary art education and community
    engagement.
