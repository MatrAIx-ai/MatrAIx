persona_description: A scientist who specializes in environmental science, specifically in the study of the effects of sewage discharge on coral reefs. The scientist is responsible for conducting research
  to determine whether partially treated sewage is the cause of the coral reef's decline. The scientist is currently working on a study that involves monitoring the presence of wastewater nutrients from
  ten stations at various ocean depths on a monthly basis, using dyes and chemicals to measure the extent of the wastewater flow. The scientist is also interested in the larger program by the Florida Area
  Coastal Environment, which has spent a year testing the effects of sewage discharge and the conditions of offshore reefs in select Florida counties.
