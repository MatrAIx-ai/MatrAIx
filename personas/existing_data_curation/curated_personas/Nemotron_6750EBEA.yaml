personas:
  professional: James Watrous is a highly organized IT support specialist who leverages deep expertise in Windows and macOS administration, network security, PowerShell and Bash automation, and ITIL service‑management
    to streamline ticket workflows, while they apply their competitive drive to document every process meticulously and their occasional skepticism to rigorously validate solutions.
  sports: James Watrous is an avid long‑distance cyclist who rides the rolling trails of the Bay Area with the East Bay Velo Club, hikes the East Bay hills on weekends, and cheers for the Golden State Warriors,
    San Francisco 49ers, and Oakland Athletics while they occasionally join pickup basketball games at the local community center.
  arts: James Watrous unwinds by immersing themselves in strategic board games like Terraforming Mars, listening to indie folk artist Ben Harper, attending the San Francisco Symphony’s classical concerts,
    and binge‑watching period dramas starring Benedict Cumberbatch, allowing their analytical mind to explore creative narratives.
  travel: James Watrous plans trips with spreadsheet precision, favoring active adventures such as cycling the Tuscan countryside and hiking Patagonia’s Torres del Paine after having explored Yosemite,
    Portland, and a tech‑focused tour of Tokyo, yet they balance this wanderlust with family commitments and a savings goal for their future consulting firm.
  culinary: James Watrous enjoys cooking Mediterranean dishes like grilled salmon with dill and lemon, homemade pesto pasta, and slow‑roasted lamb, pairing them with locally roasted coffee and occasional
    indulgent take‑out mapo tofu, while they maintain a proficient home‑chef skill level and meticulously track nutrition using a food‑logging app.
  core: James Watrous blends a competitive, detail‑oriented IT mindset with a love for endurance cycling, disciplined finances, proactive health monitoring, and a penchant for strategic games, all while
    wrestling with chronic worry and a habit of over‑documenting every aspect of life.
background:
  cultural: James grew up in a suburban, middle‑class family in the San Francisco Bay Area, immersed in a culture that blends the West Coast's tech‑savvy, progressive mindset with a traditional American
    work ethic. His family’s roots trace back to the Pacific Northwest, fostering values of self‑reliance, practical problem‑solving, and modest competitiveness. Living in Walnut Creek, he has been influenced
    by the region's emphasis on outdoor recreation, community involvement, and a balanced, pragmatic approach to career and personal life.
attributes:
  skills: '[''Hardware diagnostics'', ''Software troubleshooting'', ''Windows OS administration'', ''macOS support'', ''Network configuration'', ''Active Directory management'', ''Scripting (PowerShell,
    Bash)'', ''ITIL Service Management'', ''CompTIA A+ certification'', ''CompTIA Network+ certification'', ''Customer service'', ''Process documentation'']'
  hobbies: '[''Cycling'', ''Hiking'', ''Home automation projects'', ''Raspberry Pi tinkering'', ''Strategic board games'', ''Chess'', ''Reading non-fiction (technology and science)'', ''Mindfulness meditation'',
    ''Reflective journaling'']'
  career_goals: James aims to transition from a hands‑on support role to a senior IT service management position where he can lead a team and drive strategic improvements. He plans to earn ITIL Expert and
    PMP certifications within the next two years to strengthen his project‑leadership credentials. His long‑term ambition is to design and implement automated support workflows that reduce resolution times,
    and eventually launch a boutique consulting firm that helps mid‑size companies optimize their IT service desks while maintaining rigorous security standards.
