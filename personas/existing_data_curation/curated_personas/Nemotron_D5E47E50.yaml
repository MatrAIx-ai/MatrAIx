personas:
  professional: Jesus Chidiaz is a certified radiologic technologist who expertly operates X‑ray, CT, and MRI equipment, leverages PACS and basic Python scripting to streamline image workflows, and translates
    their spontaneous curiosity into pioneering AI‑driven diagnostic projects despite occasional struggles with strict deadlines.
  sports: Jesus Chidiaz enjoys early‑morning runs with the NYC Road Runners, follows the New York Knicks and New York Mets closely, and plays pick‑up basketball at a Queens community gym on weekends, preferring
    low‑intensity endurance to high‑impact competition.
  arts: Jesus Chidiaz finds inspiration in Ansel Adams’ black‑and‑white landscapes, the modernist installations of Ai Weiwei, the soulful melodies of Nina Simone, and the improvisational flair of Wynton Marsalis,
    integrating these influences into their own fingerstyle guitar renditions of Latin jazz standards.
  travel: Jesus Chidiaz prefers spontaneous, low‑key travel that blends quiet nature with cultural immersion, often escaping to the Catskill Mountains for weekend hikes, dreaming of a future trip to the
    historic streets of Seville, and savoring brief visits to local Queens festivals that echo hometown celebrations.
  culinary: Jesus Chidiaz cooks traditional mofongo and arroz con gandules at home, relishing the tactile ritual of mashing plantains with garlic‑infused sofrito, while also seeking out upscale farm‑to‑table
    restaurants that showcase seasonal corn and tropical fruits.
  core: Jesus Chidiaz is a solitary, curiosity‑driven technologist who balances quiet introspection with sudden bursts of artistic fervor, often trading late‑night photo edits for occasional coffee‑shop
    anxieties and a penchant for hoarding vintage camera lenses.
background:
  cultural: Jesus was born to Puerto Rican parents who immigrated to New York, and he grew up in a bilingual household in Queens. His upbringing blended Caribbean customs—such as celebrating Noche Buena,
    listening to plena and bomba, and preparing family meals—with the multicultural vibrancy of New York City. He maintains strong ties to the local Puerto Rican community, volunteering at health fairs
    where he offers bilingual education about radiologic safety. While he embraces his heritage, he also integrates the artistic and intellectual diversity of his urban environment, which fuels his curiosity
    and creative outlook.
attributes:
  skills: '["X-ray operation", "CT scanning", "MRI operation", "Radiation safety compliance", "Patient positioning", "PACS image management", "Image quality assurance", "Basic Python scripting for image
