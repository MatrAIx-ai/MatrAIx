  hobbies: '["Black-and-white photography", "Visiting art museums and galleries", "Reading philosophy, poetry, and science nonfiction", "Fingerstyle guitar (Latin jazz)", "Cooking traditional Puerto Rican
    cuisine", "Solo nature walks in local parks", "Experimenting with AI image processing scripts", "Listening to ambient and Latin music"]'
  career_goals: Jesus aspires to become a senior imaging specialist who leads the integration of AI‑driven diagnostic tools into routine radiology practice. He plans to pursue a master’s degree in biomedical
    imaging or health informatics within the next three years, focusing on low‑dose imaging protocols and workflow optimization that reduce patient exposure and improve efficiency. He also wishes to transition
    to a tele‑radiology role that offers greater flexibility and a quieter work environment, allowing him to balance his professional growth with his need for solitude and mental well‑being. In the longer
    term, he envisions mentoring junior technologists, especially those from underrepresented backgrounds, and contributing to community health education programs that demystify radiologic procedures.
