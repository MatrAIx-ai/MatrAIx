  hobbies: '[''watercolor painting'', ''digital sketching'', ''reading fantasy and historical fiction'', ''journaling'', ''listening to classical music'', ''bird watching'', ''nature photography'', ''puzzle
    solving'', ''Scratch coding'', ''introductory Python'']'
  career_goals: She aspires to combine her love of art and inquiry by pursuing a career as a museum curator or art historian, dreaming of one day creating exhibitions that blend visual storytelling with
    scientific themes. She also envisions studying environmental science to investigate nature, inspired by her bird‑watching hobby. In the short term, she aims to earn a place in a specialized high‑school
    arts program, win regional art competitions, and build a portfolio that could lead to a scholarship. Her ultimate ambition is to publish a graphic novel that reflects her deep curiosity and organized
    approach.
