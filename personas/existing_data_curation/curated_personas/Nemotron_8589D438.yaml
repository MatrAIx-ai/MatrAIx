personas:
  professional: Sarah Phelps, an aspiring game developer and visual storyteller who blends her love of sketching, bird‑watching detail, and logical puzzle‑solving into interactive Python stories, channels
    her disciplined organization into tight project timelines, and uses quiet reflection to fuel creative breakthroughs while battling occasional self‑critical worry.
  sports: Sarah Phelps, an enthusiastic participant in the local youth swimming club who prefers solitary early‑morning laps and weekend nature hikes in the Hocking Hills State Park, cheers for the Cincinnati
    Bengals and Cincinnati Reds from home, and incorporates bird‑watching walks as her informal cardio routine.
  arts: Sarah Phelps, a dedicated young artist who regularly sketches in the quiet corner of her room to the sound of Bach and Debussy, draws inspiration from Claude Monet’s water lilies and Georgia O’Keeffe’s
    desert flowers, attends the Cincinnati Art Museum’s family workshops featuring works by Vincent van Gogh, and watches performances by the Cincinnati Ballet to fuel her imagination.
  travel: Sarah Phelps, a thoughtful planner who dreams of visiting the Smithsonian Museums in Washington D.C. and the Louvre in Paris, yet prioritizes low‑stress weekend trips to nearby state parks like
    Great Smoky Mountains, uses detailed maps and a scrapbook to chronicle each journey, and often worries about crowded tourist spots, leading her to schedule visits during off‑peak hours.
  culinary: Sarah Phooks, a budding home chef who enjoys crafting simple vegetable stir‑fry with broccoli, carrots, and soy sauce, mastering homemade pesto on toasted baguette, relishes homemade mac and cheese
    with a sprinkle of cheddar, and experiments with sushi rolls using avocado and cucumber, yet sometimes skips meals when caught up in art projects.
  core: Sarah Phelps, a disciplined 12‑year‑old artist‑coder whose quiet curiosity fuels sketches, Python stories, and journal entries, though her habit of over‑analyzing often spirals into worry that shadows
    her achievements.
background:
  cultural: Sarah grew up in a middle‑class white family in Batavia, a small town in Clermont County, Ohio. The community’s culture emphasizes modesty, self‑reliance, and strong family ties typical of the
    Midwest. Her parents value education, punctuality, and hard work, and they nurture her artistic curiosity through visits to nearby cultural venues such as the Cincinnati Art Museum and participation
    in local art fairs. The region’s seasonal traditions—county fairs, holiday parades, and outdoor activities like hiking in Hocking Hills—shape her appreciation for nature and community. While her upbringing
    includes elements of mainstream American Protestant culture, her household encourages open inquiry and supports her unconventional interests.
attributes:
  skills: '[''meticulous note‑taking'', ''time management'', ''research methods'', ''digital illustration'', ''watercolor painting'', ''creative writing'', ''basic Python programming'', ''Scratch coding'',
