personas:
  professional: Miguel Garcia, a 19‑year‑old construction laborer in Edinburg, blends solid OSHA‑compliant site safety expertise, concrete finishing, and emerging sketching skills with a curious, competitive
    drive, and they envision structures that integrate community murals and public art.
  sports: Miguel Garcia dominates local pickup soccer games at Edinburg's Main Park, swears allegiance to the Houston Dynamo and the Edinburg Cougars youth soccer club, and they hit the CrossFit box three
    times weekly to maintain stamina for their labor‑intensive job.
  arts: Miguel Garcia dives into urban art by touring murals by local artist Jona LaFara and the famed Taller 19 collective, sketches scenes with a pocket sketchbook, studies the vibrant works of Frida
    Kahlo and the graffiti of Banksy, and they capture architectural lighting in photographs inspired by Steve McCurry.
  travel: Miguel Garcia has road‑tripped to San Antonio's River Walk, explored Santa Fe's art districts, and they dream of backpacking through Oaxaca's markets and the historic streets of Mexico City, preferring
    spontaneous itineraries that balance low cost with cultural immersion.
  culinary: Miguel Garcia experiments in the family kitchen with homemade carne asada tacos, chiles rellenos stuffed with queso fresco, and cilantro‑lime rice, seasoning dishes with chipotle adobo and fresh
    lime, and they occasionally over‑indulge in deep‑fried churros during festivals.
  core: Miguel Garcia fuses a gritty construction work ethic with a vibrant love for mural art, juggling heavy‑lifting, soccer, and Minecraft design, and they budget for future certification while dreaming
    of a community‑focused contracting firm.
background:
  cultural: 'Miguel grows up in a bicultural Mexican‑American household in Edinburg, Texas, where Spanish is spoken at home and English dominates school and work. His family observes traditional Mexican
    celebrations such as Día de los Muertos, quinceañeras, and festive Semana Santa processions, while also embracing local Tex‑Mex cuisine and frontier folklore. The cross‑border rhythm of the Rio Grande
    Valley influences his worldview: he values community solidarity, hard work, and the blending of artistic expression with everyday life. This heritage fuels his appreciation for murals and public art
    that tell local stories, and it reinforces his commitment to giving back to the neighborhood that shaped him.'
attributes:
  skills: '[''Site Safety and OSHA compliance'', ''Concrete mixing and finishing'', ''Basic carpentry and framing'', ''Operating hand and power tools'', ''Reading simple construction drawings'', ''Team
    coordination and communication'', ''Bilingual Spanish/English communication'', ''Basic sketching and visual layout'', ''Use of mobile construction apps'', ''Physical endurance and heavy lifting'']'
  hobbies: '[''Playing pickup soccer'', ''Listening to regional Mexican music'', ''Attending mural tours and sketching urban scenes'', ''Photography of architectural details'', ''Volunteering for community
    clean‑up projects'', ''Cooking Tex‑Mex dishes'', ''Celebrating Día de los Muertos'', ''Playing Minecraft and exploring virtual design'', ''Weightlifting at the gym'', ''Socializing at local BBQ gatherings'']'
  career_goals: Miguel aims to earn a certification in construction management within the next two years and move into a foreman role on larger mixed‑use projects. His long‑term ambition is to launch his
    own contracting firm that specializes in community‑focused builds, particularly those that incorporate public art, murals, and culturally resonant design. He envisions blending his love of visual art
    with his construction expertise to create spaces that reflect the heritage of the Rio Grande Valley. Along the way, he hopes to mentor other young workers from his community and eventually obtain a
    General Contractor license.
