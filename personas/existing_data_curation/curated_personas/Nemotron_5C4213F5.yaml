  career_goals: Jose plans to enroll in a Business Administration or Marketing program at a California state university or community college, seeking a scholarship that rewards both academic performance
    and community involvement. In the short term, he aims to secure an internship with a local media or marketing firm to apply his social‑media savvy and event‑coordination experience. Long‑term, he envisions
    a career as a marketing coordinator or community‑outreach specialist for a regional business, leveraging his sociable nature, disciplined work ethic, and bilingual skills. Ultimately, he dreams of launching
    his own family‑owned Mexican restaurant or event‑planning company that celebrates cultural heritage while providing jobs for peers from his community. He also hopes to mentor younger students, fostering
    leadership and academic excellence within his neighborhood.
