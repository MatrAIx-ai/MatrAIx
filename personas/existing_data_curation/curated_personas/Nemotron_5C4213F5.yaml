  hobbies: '[''Soccer'', ''Social Media Content Creation (TikTok/Instagram)'', ''Cooking Mexican Cuisine'', ''Volunteer Event Organization'', ''Listening to Music (Regional Mexican & Pop)'', ''DIY Automotive
