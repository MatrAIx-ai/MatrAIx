personas:
  professional: Jose Restrepo is an aspiring marketing coordinator and event‑planner who channels their disciplined organization, bilingual communication, and charismatic public‑speaking into leading school
    dances, charity drives, and community festivals while turning creative ideas into concrete results on the soccer field and beyond.
  sports: Jose Restrepo plays varsity soccer for Apple Valley High, organizes weekend pickup games, follows the LA Galaxy in MLS and the Los Angeles Dodgers in MLB, and trains year‑round at the Apple Valley
    Soccer Club, using their team‑player mindset to stay fit, disciplined, and socially engaged on and off the field.
  arts: Jose Restrepo curates a vibrant online feed featuring music from Los Tigres del Norte, Banda el Recodo, Billie Eilish, and Taylor Swift while screening indie films by directors like Pedro Almodóvar
    and debating the latest Marvel releases, reflecting how their sociable, talkative nature fuels a constant exchange of cultural and artistic inspiration.
  travel: Jose Restrepo loves planning detailed road trips along the Pacific Coast Highway, has already explored Joshua Tree National Park and the Grand Canyon, and dreams of backpacking through Thailand
    and hiking the fjords of Norway, balancing meticulous itineraries with spontaneous detours to satisfy both their adventurous spirit and disciplined nature.
  culinary: Jose Restrepo shares their love of cooking family recipes like tacos al pastor, tamales, and guacamole, perfecting each with fresh cilantro, lime, and chipotle, while also experimenting with
    fusion twists for TikTok videos that showcase both skillful plating and the sizzling sounds of the grill.
  core: Jose Restrepo is a hyper‑social, organized teen who blends disciplined leadership, a flair for content creation, and a passion for community cooking, all while juggling school, soccer, and a growing
    collection of DIY tech projects.
background:
  cultural: Jose is a first‑generation Mexican‑American whose parents emigrated from Jalisco. Raised in a bilingual household, he navigates seamlessly between Spanish and English, preserving family traditions
    while embracing Southern California’s multicultural environment. He actively celebrates Mexican holidays such as Día de los Muertos, Cinco de Mayo, and quinceañera gatherings, often helping prepare
    traditional foods and decorations. Family and community are central to his identity; he participates in a local Catholic parish, attends neighborhood festivals, and contributes to a vibrant Latino community
    within Apple Valley. His cultural pride influences his daily life—from the music he listens to, to the recipes he cooks, and the way he engages with peers—making him a bridge between his heritage and
    the broader American society.
