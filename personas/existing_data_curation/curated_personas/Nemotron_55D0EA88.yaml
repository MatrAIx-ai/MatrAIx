  career_goals: Aida aims to move into a senior leadership role where she can shape product strategy for next‑generation IoT and edge‑computing devices. Over the next five years she plans to earn professional
    certifications (e.g., IEEE Advanced Systems Design, Cisco Certified Network Professional) and to lead a multidisciplinary hardware team that delivers reliable, cost‑effective solutions on schedule.
    She also hopes to introduce more systematic design‑review processes that reduce last‑minute stress for her team while preserving the flexibility she values. To counter her natural worry, Aida intends
    to embed regular mindfulness and stress‑management practices into her work routine. Long‑term, she envisions launching a consulting boutique that supports small businesses in hardware prototyping, blending
    technical expertise with her passion for mentoring and community outreach.
