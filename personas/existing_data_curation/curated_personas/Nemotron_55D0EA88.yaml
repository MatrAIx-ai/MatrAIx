personas:
  professional: Aida Gomez is a seasoned computer hardware engineer who leads complex schematic design and PCB layout projects, leveraging Altium Designer and KiCad while mentoring junior engineers; their
    blend of structured workflow and spontaneous flexibility helps them manage shifting deadlines, though their tendency to worry sometimes drives them to over‑document every detail.
  sports: Aida Gomez enjoys staying active by salsa dancing socially and playing weekend co‑ed volleyball with a local community league, while cheering on the Los Angeles Lakers, Dodgers, and LA Galaxy,
    and they incorporate yoga sessions for stress relief, though they often skip scheduled runs when work deadlines loom.
  arts: Aida Gomez’s artistic palate includes dancing to the rhythms of Celia Cruz and Marc Anthony, devouring mystery novels by Agatha Christie and Gillian Flynn, and attending local theater productions
    of Lin‑Manuel Miranda’s works, all of which feed their love for vibrant storytelling and performance.
  travel: Aida Gomez prefers immersive, culturally rich trips that blend tech conferences and culinary exploration, having recently visited Tokyo for a robotics expo and a destination famed for its mole
    tradition to learn traditional preparation, while they dream of hiking the Patagonian Andes and weekend getaways to the nearby Sierra Nevada for a change of pace.
  culinary: Aida Gomez is an enthusiastic home chef who masterfully prepares mole, tamales, and fresh ceviche, often seasoning with dried chilies, epazote, and cilantro, and while their cooking skill is
    advanced, they sometimes over‑spice dishes when experimenting, turning each potluck into a lively tasting adventure.
  core: Aida Gomez combines a meticulous engineering mind with a love for salsa, mindfulness, and spontaneous generosity, yet their chronic worry and occasional disorganization make them both a dependable
    leader and a chronically over‑booked multitasker.
background:
  cultural: Aida’s Mexican heritage is a central part of her identity. Raised in a bilingual household, she is fluent in Spanish and English, which enriches her professional communication and allows her
    to bridge cultural gaps in collaborative settings. Family gatherings, Día de los Muertos altars, and the celebration of Mexican holidays such as Las Posadas are important traditions she maintains with
    her husband and extended family in Florida. The warmth, hospitality, and strong sense of community she learned from her upbringing influence her sociable nature and her commitment to volunteering in
    local Hispanic organizations. Her love for Mexican cuisine, music, and dance not only provides personal joy but also serves as a cultural bridge when she introduces these traditions to friends and colleagues.
