  career_goals: Although currently not in the formal workforce, Robert aspires to channel his talents into a community‑focused role. He hopes to establish a small nonprofit art and cultural center in Pierce
    County that offers workshops in painting, woodworking, and storytelling for seniors and youth. He also aims to become a certified volunteer coordinator, leading outreach programs that address food insecurity
    and mental‑health support in his town. Long‑term, he envisions authoring an illustrated chronicle of Alma’s history, preserving memories for future generations while using his artistic skills to bring
    the narrative to life.
