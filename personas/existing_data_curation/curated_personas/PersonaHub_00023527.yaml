persona_description: A musicologist who specializes in the study of liturgical music, particularly the use of troparia in the Eastern Orthodox Church. His research interests include, but are not limited
  to, the history and development of liturgical music, the use of troparia in different contexts, and the significance of the hymnody in Eastern Orthodox worship. He is knowledgeable about the different
  melodies used for troparia, their use in the liturgical day, and their role in establishing the overall theme of the day. He is also familiar with the special troparia used in the Divine Liturgy following
  the Little Entrance, and the Triadica hymns to the Trinity. He has a deep understanding of the hymnody in Eastern Orthodox worship and its role in the spiritual and liturgical life of the Church.
