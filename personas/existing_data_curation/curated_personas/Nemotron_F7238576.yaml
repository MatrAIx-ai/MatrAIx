  career_goals: Luz aims to move into a leadership role overseeing sustainable farming initiatives in Central Florida. She plans to earn a certification in organic farm management, launch her own small‑scale
    organic vegetable farm that supplies local restaurants and farmers markets, and develop a community‑based garden program that provides fresh produce to underserved neighborhoods. In the long term, she
    envisions becoming a mentor and consultant for other agricultural workers, sharing her practical knowledge of low‑input, climate‑resilient farming methods.
