personas:
  professional: Glenn Sellers, a budding junior engineer, channels their methodical mindset into constructing intricate LEGO models, and they apply step‑by‑step planning with creative improvisation while
    sharpening problem‑solving skills.
  sports: Glenn Sellers, a dedicated member of the Eastside Youth Soccer Club, they thrive on the competitive rush of weekend matches, follow the local professional baseball team with enthusiasm, and combine
    their love of sport with cataloguing baseball cards as part of their routine.
  arts: Glenn Sellers, an avid collector of LEGO sets and baseball cards, they find inspiration in the animated adventure of "The LEGO Movie," the soaring music of Imagine Dragons, the magical world of
    J.K. Rowling’s Harry Potter series, and the pixelated landscapes of Minecraft, often recreating scenes from these media in their own builds.
  travel: Glenn Sellers, a curious explorer, they enjoy planning weekend family trips that blend excitement and education, having recently visited Disney World in Orlando and hiked the Grand Canyon, and
    they dream of touring historic European castles and the neon streets of Tokyo once their next LEGO masterpiece is complete.
  culinary: Glenn Sellers, a budding kitchen assistant, they love assembling homemade pepperoni pizza, mixing colorful fruit kebabs, and perfecting chocolate chip cookies, and they meticulously record exact
    measurements on a laminated cheat‑sheet they keep in the fridge.
  core: Glenn Sellers is a methodical 9‑year‑old; they love building, strategy games, and meticulous collections, and their curiosity drives disciplined learning and a competitive edge.
background:
  cultural: Glenn grew up in Kalamazoo, Michigan, a Midwestern city known for its blend of small‑town community spirit and industrial heritage. His family values hard work, reliability, and community involvement,
    which align with typical Midwestern cultural traits. He participates in school and neighborhood events, such as the annual fall fair and local youth sports leagues. The region’s automotive history and
    proximity to manufacturing plants have sparked his interest in machines and engineering, while seasonal activities—like fishing in summer and building snow forts in winter—add a classic Michigan flavor
    to his upbringing. His cultural background combines these Midwestern values with exposure to modern technology and media.
attributes:
  skills: '["Reading comprehension", "Basic arithmetic", "Logical reasoning", "LEGO model construction", "Scratch programming", "Strategic board game playing", "Organized note‑taking", "Time management
    for school projects"]'
  hobbies: '["LEGO building", "Chess", "Soccer", "Reading adventure and science books", "Simple chemistry experiments", "Minecraft", "Collecting baseball cards", "DIY robotics kits"]'
  career_goals: Glenn dreams of turning his love for building and problem‑solving into a future career as a robotics or mechanical engineer, hoping one day to design machines that could help his community.
    He is especially inspired by Michigan’s automotive legacy and wants to create sustainable vehicle technology. In the short term, he aims to win his school’s science fair and earn a spot on a youth robotics
    team, seeing these achievements as stepping stones toward a career in engineering or possibly space exploration.
