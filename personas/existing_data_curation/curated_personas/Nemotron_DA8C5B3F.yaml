  career_goals: Jimmy aims to graduate high school and enroll in a vocational program for automotive technology or mechanical trades. He hopes to secure an apprenticeship as an auto mechanic, eventually
    opening a small garage serving his Los Angeles neighborhood. Long‑term, he envisions mentoring younger kids through after‑school programs and possibly joining the city fire department to give back to
    his community.
