  career_goals: Dana often talks about becoming a teacher because she loves helping classmates learn new things, or a veterinarian because she enjoys caring for pets. She also dreams of exploring space
    like an astronaut, reflecting her curiosity. She sets small, achievable goals now, such as reading a new picture book each week and learning how to care for a class hamster. These aspirations combine
    her love of people, animals, and discovery with her practical desire to learn step by step.
