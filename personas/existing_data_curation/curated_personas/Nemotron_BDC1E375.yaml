personas:
  professional: Dana Copeland is an aspiring junior architect who channels a blend of curiosity and practicality into daily LEGO builds, methodically planning each piece like a blueprint, and they bring
    that organized, reliable approach to school projects and group art activities.
  sports: Dana Copeland loves sprinting around the community park for soccer matches with the local Kid’s Soccer Club, zooming on a blue bike along the neighborhood trail, and cheering for the New York
    Giants on Sundays, and they always perform a quick warm‑up routine before play, reflecting the organized and energetic spirit they bring to group activities.
  arts: Dana Copeland delights in drawing vibrant animal illustrations inspired by Eric Carle’s picture books, dancing to Disney’s ‘Let It Go’ from Frozen in after‑school movement class, and constructing
    elaborate LEGO scenes while humming The Wiggles’ ‘Fruit Salad,’ showcasing a blend of boundless curiosity and systematic creativity.
  travel: Dana Copeland’s travel adventures include annual visits to the Liberty Science Center in Jersey City, weekend beach trips to Ocean City, a family road‑trip to Washington, D.C.’s Smithsonian museums,
    and a budding dream of exploring the Grand Canyon, always packing a small backpack of snacks and a map to stay organized and ready for discovery.
  culinary: Dana Copeland enjoys cheesy pizza slices, spaghetti with meatballs, and apple wedges with peanut butter, proudly washing carrots and broccoli with a child‑safe colander for dinner, and eagerly
    helps decorate sugar‑sprinkled cookies during Christmas, reflecting a practical yet enthusiastic approach to food and cooking.
  core: Dana Copeland is a meticulous, sociable six‑year‑old who balances a boundless curiosity for building LEGO worlds with a reliable, organized routine, occasionally misplacing their inhaler after tag
    but always returning to structured play.
background:
  cultural: 'Dana grows up in a white, middle‑class family in Sicklerville, New Jersey. Her household reflects typical suburban American culture: celebrating holidays such as Thanksgiving, Christmas, and
    the Fourth of July, attending a local community church on Sundays, and participating in neighborhood events at the community center. Her parents encourage education, punctuality, and community involvement,
    which aligns with the broader cultural values of the region.'
