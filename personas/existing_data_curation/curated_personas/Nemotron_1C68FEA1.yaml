  hobbies: '[''Reading speculative fiction'', ''Abstract drawing'', ''Acoustic guitar'', ''Landscape photography'', ''Model kit building'', ''Hiking'', ''Exploring experimental music'', ''Journaling'',
    ''DIY home projects'']'
  career_goals: Ali aims to obtain OSHA certification and a commercial forklift license within the next year, positioning himself for promotion to warehouse supervisor. Over the next three to five years,
    he plans to enroll part‑time at Collin County Community College to study logistics and supply‑chain management, with the long‑term ambition of transitioning into a supply‑chain analyst role where his
    analytical mindset and creative problem‑solving can be fully leveraged. Parallel to his career trajectory, he hopes to integrate his artistic interests by contributing to workplace safety‑sign design
    projects or eventually opening a small studio where he can blend functional design with abstract art.
