personas:
  professional: Jonathan Ledbetter is a 16‑year‑old peer organizer at their high school, using their natural charisma and hands‑on knack for fixing skateboards and bikes to coordinate skate‑park meetups
    while producing short, humor‑filled TikTok videos that showcase their budding video‑editing skills and introductory HTML/CSS portfolio, all in preparation for a future blend of automotive‑technology
    certification and digital‑media work, which they aim to pursue after graduation.
  sports: Jonathan Ledbetter spends weekends skating at the local skate park with the crew called Pacific Rollers, playing pickup basketball at the community center, catching waves at Huntington Beach,
    and they root for the Los Angeles Lakers, Dodgers, and LA Galaxy while also following professional skateboarding events like the X‑Games.
  arts: Jonathan Ledbetter channels their outgoing energy into creating short, humorous TikTok clips set to tracks by Bad Bunny, J Balvin, and Arctic Monkeys, enjoys attending street‑art festivals featuring
    murals by local graffiti collectives, and spends free time riffing on the guitar to covers of Paramore and The Strokes, letting music and visual art shape their teenage identity, which they find empowering.
  travel: Jonathan Ledbetter prefers spontaneous weekend getaways, such as road‑tripping to Santa Cruz for surf sessions, spending a day at Disneyland, and dreaming of a future backpacking trip through
    the Pacific Northwest, all while balancing a modest travel fund that they top up with birthday money and part‑time earnings.
  culinary: Jonathan Ledbetter loves the bold flavors of fish tacos with cilantro and lime, the cheesy goodness of pupusas topped with curtido, occasionally attempts to recreate them at home using a basic
    skillet, and they enjoy snacking on avocado toast with jalapeño slices while listening to reggaetón playlists.
  core: Jonathan Ledbetter is a restless, socially driven teen who toggles between skate‑park thrills, digital storytelling, and a roller‑coaster of anxiety, often juggling impulsive spending with a flexible
    approach to both work and play, a balancing act they manage with high energy.
background:
  cultural: Jonathan grew up in a middle‑class white family in Norwalk, California, where mainstream American traditions such as Thanksgiving, 4th of July barbecues, and high‑school sports are part of his
    upbringing. Living in Los Angeles County, he is regularly exposed to the city’s cultural mosaic, especially the large Hispanic community that surrounds his neighborhood. This environment influences
    his food preferences (tacos, pupusas) and music tastes (reggaetón, Latin pop), while he still identifies strongly with typical suburban American values. The blend of his family’s conventional customs
    and the multicultural vibe of his city gives him a broadly inclusive, but predominantly American, cultural outlook.
