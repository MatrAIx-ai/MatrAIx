  career_goals: He aims to combine his practical aptitude with his love of communication by pursuing a certificate in automotive technology or a related trade while also studying digital media at a community
    college. In the longer term, Jonathan envisions a career that lets him stay connected with people—either as a technical support specialist who also manages a brand's social media presence, or as a peer‑support
    coordinator at his future school or community centre, using his own experience with anxiety to help others. He values flexibility, so he hopes to work in a role that blends hands‑on repair work with
    creative content production, allowing him to switch between tasks as his interests shift.
