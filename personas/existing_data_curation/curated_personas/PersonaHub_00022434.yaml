persona_description: A birder who has a keen eye for identifying and recognizing bird species, especially those of the Harlan's Hawk subspecies. This person has a deep understanding of the characteristics
  and distinguishing features of Harlan's Hawks, including the white lores and flecking against a dark background on the plumage. They have a unique ability to recognize Harlan's Hawks from a distance and
  have a knack for breaking down the bird's overall plumage into various factors that contribute to its identification. This person is also fascinated by the tail of Harlan's Hawks, which they consider
  the most mysterious and awe-inspiring trait. They have a strong interest in bird identification and have a deep knowledge of the various factors that contribute to bird identification, including study,
  exposure, and the overall impression of the bird.
