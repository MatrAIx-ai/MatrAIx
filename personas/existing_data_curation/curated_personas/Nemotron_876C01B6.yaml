personas:
  professional: Eric Guthrie is an aspiring junior comic artist who blends vivid watercolor experiments with simple tablet animations, channeling boundless curiosity into sketching characters while sometimes
    losing track of deadlines due to a relaxed attitude toward obligations.
  sports: Eric Guthrie is a lively member of the under‑11 soccer squad at the local community field, idolizes Manchester United for their teamwork, also joins casual basketball pick‑up games after school,
    and proudly wears a club‑branded wristband while cheering for the school’s track‑and‑field meets.
  arts: Eric Guthrie immerses themselves in comic‑style drawing inspired by Noelle Stevenson and Studio Ghibli, attends weekly community art workshops where they experiment with watercolors, and shines
    on stage as a supporting cast member in the school drama club’s production of "The Lion King."
  travel: Eric Guthrie enjoys family trips to the local science museum, weekend outings at the state park’s nature trails, dreams of visiting the Louvre in Paris and Disney World in Florida, and prefers
    spontaneous road trips over meticulously planned itineraries.
  culinary: Eric Guthrie delights in pizza topped with extra cheese, crafts banana‑strawberry smoothies with a splash of spinach, and occasionally helps make simple sushi rolls for fun, though they often
    make a mess with flour and end up with watercolor‑like splatters on their shirt.
  core: An imaginative 10‑year‑old who fuses comic‑book storytelling with soccer teamwork, habitually forgets chores yet turns every day into a sketch‑filled adventure.
background:
  cultural: Eric grew up in the suburban community of Colonia, New Jersey, a multicultural area within Union County. His family is of European‑American heritage, with traditions that blend typical American
    holidays such as Thanksgiving, Christmas, and Fourth of July celebrations with occasional cultural recipes passed down from his grandparents, who immigrated from Ireland. The diverse neighborhood exposes
    him to a variety of cultures, and family outings often include trips to nearby New York City museums, the Liberty Science Center, and local community festivals. His upbringing emphasizes curiosity,
    community involvement, and a balance between individual expression and collaborative activities, reflecting broader American values of independence and teamwork.
