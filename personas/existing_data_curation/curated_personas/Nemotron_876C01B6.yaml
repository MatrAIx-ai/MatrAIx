  career_goals: Looking ahead, Eric imagines a future where he can blend his love of art, technology, and people. He dreams of becoming a video game designer or interactive artist who builds imaginative
    worlds that others can explore. He also sees himself as a museum guide or community arts coordinator, sharing new ideas and creative experiences with peers. Because he values flexibility, he hopes to
    work in roles that let him move between projects, such as a freelance illustrator or a youth workshop leader. His interest in storytelling also leaves the door open to a career as a children's author
    or educator.
