    communication'', ''Team coordination and training'']'
  hobbies: '[''Classic car restoration'', ''Woodworking and furniture making'', ''Fishing'', ''Historical non‑fiction reading'', ''Local theater attendance'', ''Chess club participation'', ''Target shooting'',
    ''Poker nights'', ''Gardening'']'
  career_goals: Robert aims to advance to a senior surveillance manager position within a major casino, where he can shape operational protocols and mentor junior officers. He is pursuing the Certified
    Protection Professional (CPP) designation to formalize his expertise and increase his competitiveness for leadership roles. Over the next five years, he hopes to lead a department-wide initiative to
    integrate advanced analytics into surveillance workflows, and eventually consider starting a boutique security‑consulting firm focused on gambling establishments.
