personas:
  professional: Evangelina Ramirez, an aspiring junior soccer team captain and diligent student, leverages their organized mindset to coordinate practice schedules and school projects with methodical precision.
  sports: Evangelina Ramirez, a vibrant member of the local Under-10 soccer league Little Eagles, regularly trains on Saturdays, admires professional team FC Barcelona for their youthful academy, and also
    enjoys dance class routines that improve their agility, exemplifying an energetic commitment to team sports.
  arts: Evangelina Ramirez, an enthusiastic drawer and dancer, fills sketchbooks with bright comic-style illustrations inspired by Dr. Seuss and Studio Ghibli, attends weekly ballet and hip-hop classes,
    and reads adventure stories by Rick Riordan, showing how creative expression fuels their imagination.
  travel: Evangelina Ramirez, who prefers well-planned family trips, loves visiting theme parks like Disneyland Paris, exploring national parks such as Yellowstone, and dreams of a future adventure to the
    colorful streets of Barcelona, always packing a checklist to ensure nothing is forgotten.
  culinary: Evangelina Ramirez, a junior kitchen helper, delights in preparing family-favorite tamales and fresh guacamole, expertly zesting lime and chopping cilantro, and enjoys tasting homemade quesadillas
    topped with melted cheese, reflecting a confident yet playful approach to cooking.
  core: Evangelina Ramirez is a structured, outgoing eight-year-old who balances soccer drills, vibrant art projects, and meticulous allowance budgeting, all while charming friends with boundless energy
    and occasional sticker hoarding.
background:
  cultural: Evangelina is rooted in a Mexican heritage that emphasizes family closeness, respect, and cultural traditions. She grows up in a bilingual household where Spanish is spoken daily, and she celebrates
    holidays such as Día de los Muertos and Cinco de Mayo with lively gatherings, music, and food. Living in Escalon, a small agricultural community in San Joaquin County, she is part of a vibrant Mexican‑American
    community where neighbors often share produce, cultural stories, and mutual support. Her upbringing blends the values of Mexican culture—hospitality, cooperation, and pride in heritage—with the multicultural
    environment of California.
