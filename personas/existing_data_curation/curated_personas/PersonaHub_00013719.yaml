persona_description: A GIS analyst who is experienced in ArcGIS and wants to learn how to visualize, edit, model, and analyze GIS data within a 3D context. They are looking to create, manage, analyze, and
  share 3D data, and are interested in incorporating 3D into their GIS workflows. They are familiar with ArcScene and ArcGlobe, and are looking for guidance on how to navigate a scene, view a scene from
  multiple perspectives, and work with 3D data. They are also interested in visualizing temporal data in 3D and creating 3D animations. They want to optimize 3D performance and solve problems with 3D GIS.
