personas:
  professional: Maureen Rifkin, a 30‑year‑old full‑stack software developer, writes clean Python, JavaScript, and C# code while merging her methodical, organized mindset with a passion for creative coding,
    leveraging her reliable, collaborative nature to mentor junior engineers, drive Agile product teams, and pursue AWS Solutions Architect certification to lead tech‑art initiatives.
  sports: Maureen Rifkin hikes the Hill Country trails with the Georgetown Hiking Club during spring, follows the Dallas Cowboys and Texas Rangers for weekend game‑day camaraderie, blends weekly Vinyasa
    yoga sessions at a local studio with occasional mountain‑bike rides, and diligently logs her workouts in Strava to maintain a balanced, health‑focused lifestyle.
  arts: Maureen Rifkin paints acrylic canvases inspired by Georgia O'Keeffe's bold palettes, frequents the Georgetown Art Center to admire Refik Anadol's immersive digital installations, captures sunrise
    landscapes with her DSLR, composes generative music‑visual pieces that echo the glitch‑art aesthetics of Bee Bee Bee, and unwinds at the piano playing Nina Simone while sketching algorithmic motifs.
  travel: Maureen Rifkin prefers meticulously planned road trips that fuse artistic discovery with natural solitude, such as her recent solo drive through the Texas Hill Country to attend a modern‑art workshop
    in Marfa, while also day‑dreaming about a week‑long cultural immersion in Kyoto’s craft districts and a weekend escape to Austin’s South‑Congress Avenue for live music, BBQ, and street art.
  culinary: Maureen Rifkin spends weekends mastering Texas‑style BBQ, smoking brisket over mesquite wood chips and crafting fresh tomato‑coriander salsa for her signature pulled‑pork tacos, experiments
    with adding smoked paprika to pepperoni pizza for a creative twist, and regularly hosts friends for spicy chili bowls topped with shredded cheddar and jalapeños.
  core: Maureen Rifkin, a 30‑year‑old full‑stack developer, fuses disciplined code craftsmanship with spontaneous acrylic splashes, budgets meticulously but occasionally trades sleep for late‑night BBQ
    and code, and constantly seeks the next tech‑art crossover.
background:
  cultural: Maureen grew up in a close‑knit community in central Texas, where Southern hospitality, family gatherings, and a love for country music and BBQ shaped her early values. Her upbringing emphasized
    reliability, modesty, and a strong work ethic. Attending a state university for her STEM degree exposed her to diverse ideas, modern art, and multicultural perspectives, broadening her worldview. Living
    in Georgetown, Williamson County, she blends traditional Texan sensibilities with the progressive, collaborative culture of the tech industry, allowing her to appreciate both local heritage and global
    artistic trends.
