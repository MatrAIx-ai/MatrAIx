  career_goals: In the near term, Maureen aims to become a senior software engineer, lead a cross‑functional product team, and earn an AWS Solutions Architect certification. She wants to deepen her expertise
    in machine‑learning‑driven creative tools and increase her visibility as a speaker at tech‑art conferences. Long‑term, she envisions moving into an engineering‑lead or CTO role where she can shape the
    strategic direction of products that empower artists and creators. Ultimately, Maureen hopes to co‑found a startup that provides intuitive digital platforms for visual artists, while championing inclusive
    workplace cultures and mentoring the next generation of developers.
