  hobbies: '[''Reading Korean and American literature'', ''Calligraphy'', ''Balcony herb gardening'', ''Visiting museums and galleries'', ''Cooking Korean cuisine'', ''Small book club'', ''Watching foreign
    films'', ''Walking in Flushing Meadows Corona Park'', ''Listening to jazz and Korean folk music'']'
  career_goals: She aims to re-engage with the workforce in a part‑time capacity that leverages her cultural bridging skills and love for art. She hopes to become a docent at a local museum, offering tours
    that highlight Korean artists and Asian art. She also wishes to develop a weekly cooking class for seniors that combines cultural storytelling with Korean cuisine, and eventually publish a memoir reflecting
    her bicultural life. Long‑term, she aspires to serve as a cultural liaison between the Queens Korean community and broader city arts initiatives.
