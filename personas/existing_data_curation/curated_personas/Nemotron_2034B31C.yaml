  hobbies: '["Watercolor painting", "Reading historical fiction", "Gardening (rose and vegetable beds)", "Bird watching", "Attending local art exhibitions", "Bridge and card games at the senior center",
    "Crocheting and knitting", "Listening to jazz and classical music", "Walking nature trails", "Trying new cooking recipes", "Genealogy research"]'
  career_goals: Although retired, Julia aims to leave a lasting mark on her community. She plans to compile a multigenerational family history and publish it through the local historical society. She wishes
    to mentor younger volunteers at the senior center, helping them develop leadership and organizational skills. Julia hopes to establish a modest scholarship for local high‑school students interested
    in visual arts, reflecting her lifelong love of creativity. She also aspires to continue learning—perhaps taking a short course on modern art trends or a beginner’s language class—to keep her mind active
    and engaged.
