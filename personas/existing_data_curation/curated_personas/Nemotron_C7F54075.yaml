  career_goals: Charles dreams of turning his love of art and technology into a career that lets him create immersive stories. He hopes to study graphic design or animation in high school and later pursue
    a degree in multimedia arts or game development. He imagines working as a concept artist, illustrator, or indie game creator, and he also wants a chance to mentor younger students in art clubs, combining
    his cooperative nature with his creative ambitions.
