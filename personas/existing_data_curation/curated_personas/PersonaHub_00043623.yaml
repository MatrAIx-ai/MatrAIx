  the economic and social factors that contributed to the development of the slave trade, as well as the ways in which it shaped the Dutch economy and the global economy. They would be interested in studying
  the economic data and statistics related to the slave trade and its impact on the Dutch economy, as well as the broader implications of the trade for the global economy. They would be interested in reading
  about the economic effects of the slave trade on Walcheren and the wider region, and would be interested in studying the ways in which the trade influenced the development of the Dutch economy and the
  broader global economy.
