personas:
  professional: David Landry, a senior full‑stack developer who melds object‑oriented mastery with a keen artistic eye, uses their curiosity and competitive streak to craft scalable cloud‑native web applications
    and intuitive UIs, while their relaxed attitude toward formal planning often means they sprint through prototypes and rally junior developers in collaborative hackathons.
  sports: David Landry, an avid hiker of the Mahoning River trails and weekend basketball player in the local Mahoning Valley Rec League, roots for the Cleveland Browns in football season and the Cleveland
    Cavaliers in the NBA, while their competitive edge pushes them to log weekly cardio miles but their laid‑back scheduling sometimes leads to missed gym days.
  arts: David Landry, a digital painter inspired by Edward Hopper’s industrial vistas and a photography hobbyist capturing rust‑streaked factory silhouettes, regularly performs in community improv nights
    and roots for the sonic storytelling of The War on Drugs and St. Vincent, weaving these artistic influences into their code‑driven projects.
  travel: David Landry, a spontaneity‑driven traveler who prefers weekend road trips to nearby cultural hubs like Cleveland and Detroit and occasional international tech‑art festivals in Berlin and Barcelona,
    often books flights last‑minute to satisfy their competitive curiosity, yet their relaxed planning sometimes leads to packed itineraries and forgotten luggage.
  culinary: David Landry, a self‑taught home cook who relishes experimenting with fusion dishes such as pulled‑pork ramen and beet‑and‑goat‑cheese salads seasoned with smoked paprika, frequents neighborhood
    food fairs for street‑taco tacos al pastor and craft brews, and balances their moderate culinary skills with a penchant for trying avant‑garde gastronomy.
  core: David Landry, a curiosity‑fueled full‑stack engineer whose competitive spirit and love for art drive them to blend code with creativity while navigating life with a relaxed, occasionally disorganized
    rhythm.
background:
  cultural: David grew up in the Rust Belt heartland of Youngstown, Ohio, a region shaped by manufacturing heritage and a resilient Midwestern spirit. He traces his family roots to French‑Canadian ancestors,
    which adds a subtle cultural layer of bilingual traditions and a modest Catholic upbringing. The neighborhood values of self‑reliance, community solidarity, and pragmatic optimism have informed his
    pragmatic yet curious outlook. He embraces the region's gritty artistic revival—supporting local murals, indie music, and grassroots tech meetups—while maintaining a flexible, independent lifestyle
    that reflects both his Midwestern upbringing and his openness to unconventional ideas.
