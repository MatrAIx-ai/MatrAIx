  career_goals: David aspires to transition into a senior technical leadership role—such as Lead Engineer or Software Architect—where he can steer product strategy that merges technology with artistic expression.
    He dreams of launching a startup that provides digital platforms for local artists in Youngstown, speaking at regional tech‑art conferences, and earning recognition in national hackathons. Long‑term,
    he envisions moving into a CTO position or becoming a community tech‑entrepreneur, leveraging his competitive drive to build innovative, socially impactful solutions.
