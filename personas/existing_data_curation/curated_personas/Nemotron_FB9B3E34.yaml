  hobbies: '[''Gardening (chilies, tomatoes, herbs)'', ''Cooking traditional Mexican dishes'', ''Sewing, quilting, and hand-embroidery'', ''Listening to regional music (banda, norteña)'', ''Walking in local
    parks'', ''Participating in small church prayer groups'', ''Reading short stories in Spanish'', ''Sharing recipes with neighbors'']'
  career_goals: Although Carmen is not currently in the formal workforce, she remains motivated to contribute to her community and to grow personally. She hopes to expand the neighborhood garden she helps
    maintain, inviting more families to share produce and gardening knowledge. She also aspires to compile a small family‑recipe book that preserves her culinary heritage for future generations. Carmen
    plans to improve her reading and digital skills through adult‑education classes, enabling her to better manage her family’s finances online and stay connected with her grandchildren. Her long‑term ambition
    is to become a trusted mentor for younger mothers in her church, offering guidance on cooking, budgeting, and caregiving while fostering a supportive, harmonious environment.
