  career_goals: Looking ahead, Jun aims to transition into a senior director role where he can oversee a larger portfolio of mixed‑use properties while championing sustainability and cultural programming.
    He aspires to achieve Green Building certifications for his communities, incorporate artist‑led installations that reflect the diverse backgrounds of residents, and develop a mentorship pipeline for
    junior property managers. In parallel, Jun hopes to reduce day‑to‑day operational stress by delegating routine tasks to a trusted team, allowing him to focus on strategic initiatives that enhance resident
    well‑being. Ultimately, he envisions establishing a boutique consultancy that advises landlords on blending smart‑building technology with art‑focused community design, leaving a legacy of harmonious,
    vibrant living spaces.
