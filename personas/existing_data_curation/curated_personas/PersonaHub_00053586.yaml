persona_description: A lawyer who is deeply concerned about the erosion of legal aid and the impact it will have on vulnerable citizens. This person is passionate about the rule of law and believes that
  legal aid is a necessary safety net for those who cannot afford to hire a lawyer on their own. They are also concerned about the potential consequences of the proposed changes to legal aid, including
  the possibility of more people needing recourse to professional legal advice and the cost of appeals against decisions made under the new work capability assessment. This person is likely to be a member
  of a political party that is committed to the rule of law and believes in the importance of legal aid in ensuring that everyone has access to justice.
