  hobbies: '[''Kayaking'', ''Rooftop gardening'', ''Reading science fiction'', ''Board game nights'', ''Beach clean-ups (volunteering)'', ''Acoustic guitar playing'', ''Cooking Italian dishes'', ''Visiting
    art galleries'', ''Coastal sunset photography'', ''Weekend nature trips'']'
  career_goals: Hope aims to become a principal investigator who leads multidisciplinary projects at the intersection of computational science and coastal environmental stewardship. Over the next five years
    she hopes to secure a major grant to develop open‑source tools for analyzing marine ecosystem data, publish high‑impact papers, and mentor junior researchers. She is eager to foster collaborative partnerships
    among academia, government agencies, and industry, cultivating a team culture that values harmony, flexibility, and shared decision‑making. At the same time, she prioritizes a work‑life balance that
    allows her to support her family and maintain the relaxed, adaptable schedule that aligns with her personal values.
