  career_goals: Kent wants to blend his love for technology and helping others by becoming a software developer who creates educational apps for middle‑school students, especially those in underserved urban
    neighborhoods. He also envisions serving as a youth mentor or after‑school club leader, leveraging his communication skills to inspire peers. In the longer term, he aims to earn a degree in computer
    science or educational technology and possibly teach computer classes at a high school, becoming a role model for future generations. Additionally, he hopes to take part in community advocacy projects
    that improve recreational spaces and expand technology access in Yonkers.
