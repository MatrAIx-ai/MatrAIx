personas:
  professional: Kent Sam is a budding robotics enthusiast who mixes curiosity with practicality, building Scratch projects and basic electronic circuits in the school club while leveraging their sociable,
    talkative nature; they often lead group brainstorming sessions and keep projects on schedule.
  sports: Kent Sam is an avid street‑basketball player who practices daily at the Yonkers Recreation Center, follows the New York Knicks and Brooklyn Nets, and belongs to a local youth league where they
    prioritize teamwork and flashy dribbling drills.
  arts: Kent Sam creates upbeat TikTok videos that blend basketball trick shots with improvised rap verses, draws inspiration from artists like Kendrick Lamar, Drake, and classic soul legends such as Marvin
    Gaye, and they explore neighborhood street‑art murals for visual ideas.
  travel: Kent Sam prefers short, action‑packed trips with friends, having explored Coney Island’s boardwalk, taken a weekend road‑trip to Niagara Falls, and dreaming of a future summer visit to Los Angeles
    to see hip‑hop culture sites, always planning itineraries through group chats; they thrive on collaborative planning.
  culinary: Kent Sam enjoys devouring pepperoni pizza, chicken nuggets, and mac and cheese, often adding hot sauce for an extra kick, and they can whip up simple skillet quesadillas with help from a parent,
    though they tend to snack on chips while gaming.
  core: Kent Sam is a sociable teen who balances a love for basketball, gaming, and creative content with a practical streak; they occasionally overindulge in snacks and sneakers, yet stay organized enough
    to keep sports, school, and community volunteer commitments on track.
background:
  cultural: Kent is a Black American teenager raised in Yonkers, New York, a city known for its cultural diversity and strong African‑American community. His parents are second‑generation African‑American
    professionals who emphasize education, community service, and cultural pride. The family regularly attends a local Baptist church where gospel music and sermons reinforce a sense of belonging. They
    celebrate Black cultural holidays such as Juneteenth and Kwanzaa and often gather for family barbecues featuring soul food. The neighborhood's street art, block parties, and local basketball leagues
    provide a vibrant backdrop to his daily life, and he frequently engages with peers at community centers that host after‑school programs and cultural events. These experiences shape his identity, fostering
    a deep appreciation for his heritage while also exposing him to the broader multicultural fabric of the greater New York metropolitan area.
