personas:
  professional: Sandra Duffield is an aspiring illustrator and budding game developer who channels a curious eye for detail and methodical sketchbook organization into watercolor landscapes and Scratch‑based
    mini games, while their intense emotions give depth to the characters they draw.
  sports: Sandra Duffield enjoys low‑impact cardio through weekend bike rides along the creek, plays forward for the Eastside Youth Soccer Club in the spring, practices basic swimming strokes at the community
    pool during summer, watches the Chicago Bulls for basketball and the Chicago White Sox for baseball, and balances activity with quiet nature hikes that satisfy their curiosity while keeping anxiety
    at bay.
  arts: Sandra Duffield spends afternoons sketching countryside vistas inspired by Claude Monet’s pastel tones and Studio Ghibli’s Hayao Miyazaki character designs, savors museum visits showcasing Georgia
    O’Keeffe’s desert flowers, practices beginner piano pieces by Ludwig van Beethoven and Yiruma, curates school art shows that feature peer creations alongside prints of contemporary illustrator Aaron
    Blaise, and finds solace in humming the melodic hooks of Taylor Swift while doodling in their nature journal.
  travel: Sandra Duffield prefers meticulously planned weekend getaways, often hiking the nearby Blue Ridge Trail while documenting flora in a watercolor journal, has visited the historic Williamsburg colonial
    town and the coastal boardwalk of Ocean City, dreams of trekking the ancient ruins of Machu Picchu and strolling through the lavender fields of Provence, and always packs a sketchpad to capture spontaneous
    inspirations, balancing school deadlines and family budget limits.
  culinary: Sandra Duffield enjoys whipping up simple veggie sushi rolls with cucumber, avocado, and carrot sticks, bakes strawberry shortcake topped with fresh berries and whipped cream for family celebrations,
    loves classic mac and cheese seasoned with smoked paprika, experiments with homemade fruit smoothies using banana, mango, and almond milk, yet sometimes over‑salts the soup when their excitement for
    a new recipe overwhelms them.
  core: Sandra Duffield is a curiosity‑driven sketch artist whose methodical notebooks hide a whirl of anxiety, a secret stash of glitter pens, and an unmistakable habit of humming piano melodies while
    day‑dreaming about distant landscapes.
background:
  cultural: 'Sandra comes from a white, Midwestern family in Lamar, Missouri, a small agricultural town in Barton County. Her upbringing reflects the values of close‑knit community life typical of rural
    America: a strong emphasis on family, church involvement (she attends a local Protestant congregation), and participation in community events such as the county fair and the public library’s summer
    reading program. The region’s modest, pragmatic culture encourages hard work, self‑reliance, and modesty, while the local school system provides opportunities for extracurricular arts programs that
    have nurtured her creative interests. Growing up amidst open fields and the Missouri River’s tributaries has fostered her appreciation for nature and outdoor exploration.'
