  career_goals: Sandra aspires to pursue a career that merges her love for art with helping others manage emotions. She dreams of becoming a child psychologist who uses expressive art therapy, or alternatively
    a museum curator or illustrator who can inspire curiosity in young visitors. She is determined to study psychology or fine arts in college, and envisions creating a community program that combines art
    workshops with mental‑health support for peers.
