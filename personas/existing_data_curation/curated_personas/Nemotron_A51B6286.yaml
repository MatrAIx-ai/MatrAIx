personas:
  professional: Carmen Couri, a 19‑year‑old visual arts associate turned aspiring multimedia curator, blends digital illustration, beadwork, and storytelling to create immersive installations that champion
    indigenous voices, channeling their vivid imagination and talkative confidence while wrestling with a habit of leaving projects unfinished due to a relaxed, flexible work style.
  sports: Carmen Couri hikes the forests of Shawano County with the local Trails & Tails club, follows the Green Bay Packers and Milwaukee Bucks loyally, and occasionally joins an intramural co‑ed volleyball
    league, treating fitness as a flexible outlet that satisfies their competitive streak while rarely adhering to a strict training schedule.
  arts: Carmen Couri immerses themselves in abstract digital art using Procreate, draws inspiration from Yayoi Kusama’s pattern work, Beeple’s glitch aesthetics, and the ambient soundscapes of Aphex Twin
    and Tim Hecker, while also crafting bead jewelry reminiscent of tribal motifs that they proudly showcase at community powwows and pop‑up exhibitions.
  travel: Carmen Couri’s wanderlust has already taken them to Santa Fe’s art market, a weekend road‑trip through the Pacific Northwest’s rain‑soaked cities, and a pilgrim’s visit to Oaxaca’s weaving workshops,
    and they dream of trekking Patagonia’s glaciers and attending the Burning Man desert gathering, preferring spontaneous, low‑budget itineraries over rigid planning.
  culinary: Carmen Couri enjoys cooking wild‑rice salads with dried cranberries, toasted pecans, and a splash of apple cider vinaigrette, experiments with beet hummus and matcha‑infused smoothies, but their
    culinary skill hovers at a confident home‑cook level, often sacrificing meal prep for late‑night art sessions and gaming bursts.
  core: Carmen Couri is a vivid, socially magnetic 19‑year‑old artist who channels relentless imagination and competitive drive into cultural storytelling while juggling anxiety, spontaneous spending, and
    a habit of leaving plans half‑drawn.
background:
  cultural: Carmen identifies as a member of the Menominee Nation, growing up on the Menominee reservation outskirts of Shawano, Wisconsin. Her family has kept alive the traditions of oral storytelling,
    seasonal ceremonies, and the Menominee language, which she studied in community classes. This cultural grounding informs her artistic vision, as she frequently incorporates tribal symbols, natural motifs,
    and the concept of 'mishomis (grandfather) wisdom' into her work. At the same time, she navigates the dual world of a small Midwestern town, blending contemporary pop culture with indigenous heritage.
    She participates regularly in tribal gatherings, powwows, and community service projects, and she feels a responsibility to use her creative talents to promote cultural preservation and inter‑generational
    knowledge sharing.
