    comedy'', ''Hiking in Wisconsin forests'', ''Reading speculative fiction'', ''Journaling for stress management'', ''Exploring ambient and experimental music'']'
  career_goals: Carmen aspires to turn her passion for art and cultural storytelling into a career that amplifies indigenous voices. In the short term, she plans to transfer to a four‑year university to
    earn a BFA in Indigenous Visual Arts while continuing to curate pop‑up exhibitions in Shawano that showcase contemporary Native American creators. She envisions establishing a community arts hub that
    offers free workshops in digital media, beadwork, and storytelling for tribal youth, fostering both cultural pride and modern creative skills. Long‑term, Carmen aims to become a multimedia curator and
    cultural liaison for regional museums or nonprofit organizations, producing immersive installations that blend digital technology with traditional motifs. She also hopes to leverage her sociable personality
    to become a speaker and advocate for mental‑health awareness among Native American students, using her own experiences with stress and worry as a platform for resilience.
