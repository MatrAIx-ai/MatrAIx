data:
  user 1 personas: 'I wish i made more money.

    I wish i did not have to work.

    I enjoy writing for long periods of time.

    I like to think about what it would be like to be an artist.

    I have a strange obsession with pens.'
  user 2 personas: 'Pizza is my most favorite thing.

    I enjoy taking late night walks when its completely dark.

    I like being by myself.

    My favorite band is dream theater.'
  Best Generated Conversation: 'User 1: Hi, I''m [user 1''s name]. What''s your name?

    User 2: Hi, I''m [user 2''s name].

    User 1: Nice to meet you! What are you up to today?

    User 2: Not much, just enjoying a late night walk.

    User 1: Oh, that sounds nice. I love taking walks at night too.

    User 2: Me too, it''s so peaceful and quiet.

    User 1: Yeah, it''s the perfect time to think.

    User 2: I know, right? I love coming up with new ideas when I''m taking a walk.

    User 1: Me too! I''m actually a writer, and I do most of my writing at night.

    User 2: Oh, that''s cool! I love writing too, but I don''t do it as much as I''d like to.

    User 1: You should! It''s so much fun.

    User 2: I know, I know. I''ll try to get back into it.

    User 1: Good! You won''t regret it.

    User 2: Thanks for the encouragement!

    User 1: You''re welcome! So, what do you do for work?

    User 2: I''m a teacher.

    User 1: Oh, that''s great! I''ve always wanted to be a teacher.

    User 2: It''s a lot of work, but it''s also very rewarding.

    User 1: I can imagine. So, what''s your favorite thing about teaching?

    User 2: I love getting to see my students learn and grow.

    User 1: That''s so nice! I''m sure it''s a great feeling.

    User 2: It is! It''s the best part of my job.

    User 1: Well, I''m sure you''re a great teacher. Thanks for talking to me!

    User 2: No problem! It was nice meeting you too.'
