  career_goals: He aims to transition from a high‑performing sales representative to a regional sales manager within the next three years, then ultimately to a director‑level role overseeing multiple territories.
    He seeks to develop innovative sales strategies that integrate digital tools and data‑driven insights, positioning himself as a thought leader in the wholesale manufacturing sector. Long‑term, he envisions
    launching his own consultancy that helps manufacturers design training programs that fuse his educational expertise with sales performance optimization. His competitive drive pushes him to exceed revenue
    targets, earn recognition as a top performer, and mentor emerging sales talent.
