persona_description: A biologist interested in studying the effects of different fertilization methods on freshwater mussel survival, particularly focusing on the growth and survival of Fat Muck (Lampsilis
  siliquoidea) mussels in two different mussel species, Black Sandshell (Ligumia recta) and Plain Pocketbook (Lampsilis cardium), in hatchery ponds. The persona is also interested in improving the management
  of ponds for both fish and mussel production concurrently, and is looking for ways to culture sand grain-sized juvenile mussels past the first, sensitive life stage in hatchery ponds instead of in unpredictable
  Mississippi River conditions, which will help to make future mussel production more effective and reliable.
