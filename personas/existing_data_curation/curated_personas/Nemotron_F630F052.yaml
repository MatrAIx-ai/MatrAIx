  hobbies: '[''abstract painting'', ''philosophical reading'', ''cooking Salvadoran cuisine'', ''museum visits and gallery tours'', ''street photography'', ''herb gardening'', ''chess'', ''volunteering
    as cultural docent'']'
  career_goals: Although officially retired, Abel aims to channel his lifelong curiosity into legacy‑building projects. He plans to curate a traveling exhibition of Salvadoran‑inspired artworks that blend
    traditional motifs with abstract, modern concepts, hoping to educate both the Hispanic community and a broader audience in Houston. He also seeks to mentor emerging artists through a weekly workshop
    at the local cultural center, offering guidance on both technique and professional organization. Long‑term, Abel aspires to author a memoir interwoven with reflections on art, migration, and personal
    resilience, complemented by a collection of poetry translated between Spanish and English. He envisions these endeavors as a way to preserve his cultural heritage while fostering creative novelty in
    his community.
