personas:
  professional: Abel Iglesias, a retired community outreach specialist turned cultural curator, leverages meticulous project planning, bilingual communication, and artistic expertise to organize traveling
    exhibitions and mentor emerging artists, embodying an imaginative yet methodical approach to preserving heritage through modern art.
  sports: Abel Iglesias, a devoted fan of the Houston Astros, Rockets, and Dynamo, joins a local senior walking club for weekly brisk walks in Hermann Park, attends seasonal community baseball games, and
    practices gentle yoga at a community center to keep flexible for painting, balancing low‑impact activity with occasional casual pickleball matches.
  arts: Abel Iglesias, who sketches street scenes after visiting Houston's Museum District, draws inspiration from the bold colors of Frida Kahlo, the abstract forms of Georgia O'Keeffe, and the lyrical
    poetry of Pablo Neruda, while listening to Leonard Cohen and Miles Davis during studio sessions, embedding these influences into their own abstract landscape paintings.
  travel: Abel Iglesias, who prefers meticulously planned trips that blend cultural immersion with artistic exploration, enjoys weekend drives to Austin for live music, has visited the historic plazas of
    Granada, Spain, and hopes to journey to Oaxaca, Mexico to study traditional weaving techniques, balancing a modest travel budget with a desire for enriching experiences.
  culinary: Abel Iglesias, an avid home cook with intermediate skills, delights in preparing pupusas stuffed with loroco and cheese, slow‑cooking tamales seasoned with chipotle and fresh cilantro, and experimenting
    with heirloom tomatoes in salsa verde, often pairing meals with a glass of locally sourced white wine.
  core: Abel Iglesias, a methodical yet adventurous retiree, channels boundless imagination into art and community mentorship while balancing disciplined finances, occasional health complacency, and a penchant
    for late‑night sketching after a glass of wine.
background:
  cultural: Abel was born in El Salvador and emigrated to the United States in his early twenties, settling in Houston’s vibrant Hispanic corridor. His Salvadoran roots are central to his identity; he grew
    up speaking Spanish at home, celebrating traditions such as Día de los Farolitos and the annual Feria de San Salvador, and preserving culinary customs like making pupusas with his mother. In Houston,
    he has woven his heritage into the city’s multicultural fabric, maintaining close ties with a tight‑knit Salvadoran community, participating in local church festivals, and contributing to cultural preservation
    efforts at the Salvadoran Heritage Center. His bilingual fluency enables him to bridge generational gaps, offering translation and storytelling for older immigrants while introducing younger Houstonians
    to Salvadoran art and history. The interplay of his Latin American upbringing and exposure to the diverse artistic scene of Houston has shaped a worldview that values both collective memory and individual
    creative exploration.
