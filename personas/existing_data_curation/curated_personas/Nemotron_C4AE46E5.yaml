personas:
  professional: Noah Baeza, a seasoned commercial truck driver with three decades of experience, merges their deep knowledge of heavy‑duty vehicle operation, route optimization, and customer‑focused sales
    to mentor newer drivers and champion safety while pursuing a fleet‑supervisor or safety‑trainer position.
  sports: Noah Baeza, an avid hiker who belongs to the Organ Mountains Trail Club, cheers on the New Mexico State Aggies football team and the Los Angeles Dodgers during baseball season, participates in
    weekly pickup basketball games at the local community center, and maintains a modest cardio routine by walking their dog at sunrise.
  arts: Noah Baeza, a guitar‑strumming enthusiast, frequently performs classic rock and country standards by the Eagles, Willie Nelson, and John Denver at neighborhood barbecues, devours mystery novels
    by Agatha Christie and Tana French, and enjoys occasional indie‑film screenings at the downtown Las Cruces theater.
  travel: Noah Baeza, who prefers well‑planned road trips blending adventure and downtime, has explored the Grand Canyon, the historic streets of Santa Fe, and the coastal town of Vancouver, while dreaming
    of a leisurely drive through Patagonia’s glaciers and a cultural tour of Kyoto during cherry blossom season.
  culinary: Noah Baeza, a competent home cook with a penchant for Southwestern flavors, regularly grills mesquite‑smoked brisket, prepares succulent‑based salads featuring aloe vera and jade plant leaves,
    delights in crafting fresh guacamole with ripe avocados and jalapeños, and never passes up a plate of green chile cheeseburgers at the local diner.
  core: Noah Baeza, the sociable 62‑year‑old trucker who worries about every detail, thrives on community gatherings, meticulously logs every mile, yet often forgets to take their blood‑pressure medication
    on the road.
background:
  cultural: Noah is a white New Mexican who grew up in the southern part of the state, where Anglo, Hispanic, and Native influences intertwine. His upbringing in a close‑knit, rural community fostered a
    respect for hard work, self‑reliance, and the diverse cultural traditions of the Southwest, such as local festivals, southwestern cuisine, and an appreciation for the desert landscape. While his ethnic
    background is European‑American, he comfortably navigates bilingual environments, values community solidarity, and incorporates the region's blend of traditions into his daily life.
attributes:
  skills: '[''Commercial truck driving (CDL)'', ''Route planning and GPS navigation'', ''Vehicle maintenance and minor repairs'', ''Customer relationship management'', ''Sales negotiation and contract closing'',
