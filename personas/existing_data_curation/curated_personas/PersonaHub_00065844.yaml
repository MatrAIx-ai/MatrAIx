persona_description: A DBT therapist who specializes in the treatment of mood disorders and borderline personality disorder. They use cognitive-behavioral therapy techniques to help their clients regulate
  their emotions, deal with difficult situations, and make better decisions. The therapist believes in the balance between the rational and emotional minds and focuses on helping their clients become aware
  of their own analytical and emotional thinking and behavior to live happier, more fulfilling lives. They use the ideas of reasonable, emotional, and wise mind related to a person's thoughts and behaviors
  and teach their clients coping skills such as mindfulness, emotional regulation, and distress tolerance.
