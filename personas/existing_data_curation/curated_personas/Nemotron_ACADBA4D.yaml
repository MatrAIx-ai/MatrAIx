  career_goals: Looking ahead, Hollis aims to transition into a senior advisory role where he can mentor emerging logisticians and lead sustainability initiatives that reduce the carbon footprint of regional
    supply chains. He also hopes to author a guide that merges artistic thinking with logistics strategy, and to contribute to community projects that improve food distribution in the Trussville area, all
    while preserving time for his solitary creative pursuits.
