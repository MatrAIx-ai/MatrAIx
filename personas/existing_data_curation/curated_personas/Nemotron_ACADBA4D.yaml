personas:
  professional: A senior logistics consultant who blends engineering precision with an artist’s eye, Hollis Perez leverages Lean Six Sigma, SAP, and design-thinking to craft low-carbon supply-chain networks
    while mentoring emerging logisticians, leading sustainability initiatives, and deliberately maintaining a flexible schedule that respects their preference for creative freedom.
  sports: A weekend fisherman and casual jogger, Hollis Perez belongs to the Trussville Anglers Association, enjoys early‑morning runs along the Cahaba River, and follows the Alabama Crimson Tide, Birmingham
    Barons, and Atlanta Falcons, treating fitness as a gentle complement to solitary outdoor pursuits.
  arts: A solitary creator of oil‑painted Southern vistas, Hollis Perez draws inspiration from John Constable and Edward Hopper, captures regional light with a Nikon DSLR reminiscent of Ansel Adams’ tonal
    mastery, and finds solace listening to Beethoven’s Ninth Symphony and Miles Davis’s Kind of Blue while sketching poetry in a worn notebook.
  travel: A relaxed explorer who favors quiet historic towns, Hollis Perez has wandered the Blue Ridge Parkway, strolled Savannah’s riverfront, and photographed the adobe structures of Taos, while dreaming
    of a slow-paced culinary tour of Tuscany and a reflective hike through the Scottish Highlands, planning trips by loosely penciling itineraries in a sketchbook rather than strict schedules.
  culinary: A modest home chef who treasures garden‑to‑table meals, Hollis Perez skillfully prepares dishes like roasted beet and goat‑cheese salad, Cajun‑spiced catfish, and a ratatouille brimming with
    heirloom tomatoes, thyme, and rosemary, pairing them with a crisp local white wine and occasionally savoring a well‑aged Bordeaux after a day in the studio.
  core: Hollis Perez is a contemplative logistics veteran who fuses artful curiosity with methodical efficiency, preferring solitary creativity, gentle sustainability, and a flexible approach to life’s
    obligations.
background:
  cultural: Hollis grew up in the American South, raised in Trussville, Alabama, within a family of mixed European (Irish and Italian) and Hispanic (Perez) ancestry, though he identifies as white. His upbringing
    blended Southern traditions—church attendance, hospitality, and regional cuisine—with an awareness of broader cultural influences from his family’s Hispanic roots. This background shapes his respect
    for community, his pragmatic yet curious outlook, and his appreciation for both local heritage and global artistic ideas.
