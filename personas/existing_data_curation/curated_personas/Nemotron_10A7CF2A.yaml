personas:
  professional: Sara Jones is a self‑taught digital illustrator and aspiring art therapist who fuses watercolor techniques with empathetic community outreach, leveraging their meticulous research skills
    and flexible organization to design therapeutic workshops for local youth while building a freelance portfolio.
  sports: Sara Jones hikes the Columbia River Gorge trails each weekend with the Kennewick Hiking Club, balances a home yoga practice for flexibility, and roots for the Tri‑Cities Dust Devils baseball team,
    while occasionally joining community pickup soccer games when friends invite them.
  arts: Sara Jones immerses herself in watercolor painting inspired by Claude Monet, curates mini‑exhibits at the Spero Arts Center, devours contemporary poetry by Rupi Kaur and listens to lo‑fi beats from
    Nujabes while sketching, and channels these influences into digital illustrations created with Krita for local nonprofit events.
  travel: Sara Jones prefers low‑key, nature‑focused travel, planning budget‑friendly weekend getaways to the Oregon Coast, Idaho’s hot springs, and the volcanic landscapes of Mount St. Helens, using a
    spreadsheet to track expenses, and dreaming of an extended road trip through the American West’s national parks once financial stability allows.
  culinary: Sara Jones delights in cooking seasonal dishes sourced from the Tri‑Cities farmers market, perfecting an asparagus‑and‑goat‑cheese tart, a rosemary‑infused roasted carrot medley, and a quinoa‑fruit
    salad featuring fresh figs, while experimenting with spice blends as a creative outlet during anxious evenings.
  core: Sara Jones blends quiet creativity with purposeful empathy, navigating a world of art, anxiety, and modest ambition while occasionally succumbing to midnight sketch marathons and an over‑reliance
    on caffeine.
background:
  cultural: Sara was born and raised in Kennewick, Washington, a small city in the Tri‑Cities region along the Columbia River. Her family has deep roots in the area's agricultural community; her grandparents
    worked in fruit orchards and her father was employed at a local shipping yard. While growing up, she participated in community programs at the Tri–Cities Art Center and volunteered at the Johansson
    Cultural Center, which sparked her lasting appreciation for visual and literary arts. The Pacific Northwest’s cultural emphasis on self‑reliance, environmental stewardship, and a laid‑back, inclusive
    ethos has shaped her worldview. As a white American, she identifies with mainstream cultural norms but also feels a strong connection to the region’s natural landscape and the community‑oriented values
    that prioritize collaboration and respect for individuality.
attributes:
  skills: '[''Basic computer literacy (Microsoft Office, Google Workspace)'', ''Social media project management'', ''Self‑taught digital illustration (Krita, GIMP)'', ''Research and information synthesis'',
    ''Small‑event planning and volunteer coordination'', ''Empathetic listening and peer support'', ''Basic first‑aid certification'', ''Mindfulness and stress‑management practices'']'
  hobbies: '[''Watercolor painting'', ''Digital illustration'', ''Reading contemporary fiction and poetry'', ''Visiting local art galleries and museums'', ''Attending small poetry readings'', ''Hiking in
    the Columbia River Gorge'', ''Exploring farmers markets'', ''Yoga and mindfulness meditation'', ''Cooking with locally sourced ingredients'']'
  career_goals: Sara aims to complete a GED within the next year and then enroll in a community college program, either in graphic design or counseling. She aspires to combine her artistic talents with
    a helping profession, envisioning a future as an art therapist or community outreach coordinator for a nonprofit that offers therapeutic workshops to youth and adults. In the short term, she plans to
    build a portfolio of digital illustrations, take a few freelance commissions, and volunteer at local art‑therapy sessions to gain experience. Ultimately, she hopes to secure stable employment that aligns
    with her values, provides a creative outlet, and offers a supportive environment for her mental‑well‑being.
