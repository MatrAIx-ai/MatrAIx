persona_description: A functionalist who is interested in the positive functions and roles of the family, particularly those related to sexual, reproductive, economic, and educational functions. They are
  likely to be a sociologist or anthropologist who studies the family in a functionalist perspective, focusing on the role of marriage, cohabitation, divorce, and family diversity. They may also be a feminist
  who argues that women suffer injustices in society because of their gender and supports the emergence of new family types such as single-parent and gay families. They may also be a social worker or psychologist
  who works with families to promote positive socialization and provide support for families in need.
