    ''Comic‑style drawing'']'
  career_goals: Lindolfo dreams of a career that offers clear structure and tangible results. He is drawn to fields where he can work with concrete problems, such as computer programming, network support,
    or technical trades like automotive mechanics. He hopes to finish high school, earn a certification in a technical discipline, and eventually secure a stable job that provides predictable daily routines
    and a steady income to support his family and ease his anxiety. He also entertains the idea of becoming a professional gamer or esports competitor, leveraging his competitive drive, but sees a reliable
    technical career as his primary goal.
