  hobbies: '[''Cooking (Honduran‑Tex‑Mex fusion)'', ''Hiking and mountain biking'', ''Pickup basketball'', ''Arduino/Raspberry Pi DIY projects'', ''Reading science‑fiction'', ''Volunteering and mentoring
    in STEM'', ''Attending and organizing cultural events'', ''Yoga and mindfulness'']'
  career_goals: Hector aims to progress from his current managerial role to senior leadership, such as Director of Operations or Vice President of Engineering, where he can steer large‑scale technology
    initiatives that blend innovation with operational stability. He plans to earn an MBA or relevant executive certification to broaden his strategic acumen. A core ambition is to champion diversity and
    inclusion within the tech sector, building mentorship pipelines for underrepresented groups, especially the Honduran and broader Latinx community in Dallas. He also envisions launching a nonprofit program
    that provides STEM education and career development resources to youth in underserved neighborhoods.
