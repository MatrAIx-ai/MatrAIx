personas:
  professional: Janet Artiaga combines a meticulous inventory‑control mindset with a competitive drive, excelling at rapid picking and packing while constantly tweaking shelving layouts, and now leverages
    that blend of curiosity and practicality to pursue a shift‑lead role and a forklift certification.
  sports: Janet Artiaga finds solace in early‑morning fishing at Lake Willow and weekend hikes on the Blue Ridge Trail, while cheering for the local minor‑league baseball team the River City Raptors and
    occasionally joining a community softball league that practices on Saturdays.
  arts: Janet Artiaga nurtures her creative side through a close‑knit quilting circle that meets twice a month, devours mystery novels by Agatha Christie, and unwinds to the soulful strums of Chris Stapleton
    and the classic harmonies of The Eagles.
  travel: Janet Artiaga prefers low‑key road trips with a well‑planned itinerary, having already explored the historic streets of Savannah, the mountain vistas of Asheville, and dreaming of a quiet cabin
    retreat in the Adirondacks for a future solo getaway.
  culinary: Janet Artiaga delights in baking Southern biscuits, collard greens, and peach cobbler, confidently seasoning with buttermilk, smoked paprika, and a pinch of cayenne, while her modest garden
    yields fresh tomatoes and basil that frequently star in her family's dinner plates.
  core: Janet Artiaga blends a pragmatic, competitive work ethic with solitary, hands‑on hobbies, balancing meticulous inventory mastery with a love for fishing, quilting, and Southern baking, all while
    keeping a tight budget and a watchful eye on her health.
background:
  cultural: Janet was born and raised in Pembroke, a small town in Christian County, Kentucky. The community reflects Southern Appalachian culture, emphasizing self‑reliance, close family ties, church involvement,
    and a pragmatic work ethic. Although her surname hints at distant Spanish ancestry, she identifies with the predominantly white, rural Kentucky heritage of her surroundings. Growing up, she attended
    local Baptist services, participated in community events, and learned the value of hard work from the agricultural and retail environment that shaped the region. These cultural influences have instilled
    modesty, respect for tradition, and a quiet curiosity about the wider world.
attributes:
  skills: '[''Inventory control'', ''Shelf stocking'', ''Order picking and packing'', ''Barcode scanning'', ''Warehouse safety compliance (OSHA)'', ''Physical stamina for lifting and standing'', ''Time
    management during shifts'', ''Basic computer operation (inventory software)'', ''Problem solving with equipment'', ''Performance metric tracking'']'
  hobbies: '[''Gardening'', ''Woodworking'', ''DIY home repairs'', ''Reading practical guides and mystery novels'', ''Fishing'', ''Hiking'', ''Baking Southern recipes'', ''Quilting (small group)'']'
  career_goals: Janet aims to advance from a stocker to a supervisory role, such as shift lead or inventory manager, where she can oversee a team and implement efficiency improvements. She plans to obtain
    forklift certification and learn advanced inventory software to broaden her expertise. Long‑term, she envisions opening a small family‑run convenience store or a home‑based craft business that leverages
    her practical skills and community ties. Janet also hopes to mentor new employees, using her competitive drive to set high performance standards while fostering a reliable, accountable work environment.
