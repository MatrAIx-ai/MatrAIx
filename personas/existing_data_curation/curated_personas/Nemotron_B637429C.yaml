  career_goals: Although retired, Mary aims to leave a lasting intellectual legacy for her family and community. She is working on a comprehensive memoir that weaves together her personal story with the
    transformation of Howard County over the past eight decades. She hopes to publish a concise guide to the historic neighborhoods of Columbia, MD, and to contribute regularly to the county historical
    society’s oral‑history archive. Mary also envisions establishing an intergenerational mentorship program that pairs seniors with local youth to share storytelling, gardening, and craft skills. Continuing
    her curiosity, she plans to enroll in occasional community‑college seminars on digital archiving and regional history, and she is contemplating a small scholarship fund to support students pursuing
    humanities studies.
