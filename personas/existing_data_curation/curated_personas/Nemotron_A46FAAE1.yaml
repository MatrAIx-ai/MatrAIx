  hobbies: '["Sketching and painting", "Reading science‑fiction and fantasy novels", "Playing the ukulele", "Photographing desert landscapes", "Volunteering at community cultural events", "Cooking traditional
    Mexican dishes with family", "Learning basic coding and creating simple games", "Attending art workshops and museum visits", "Journaling"]'
  career_goals: Yovana envisions pursuing higher education in visual arts and digital media, aiming to become a multidisciplinary designer who blends Mexican cultural motifs with contemporary digital storytelling.
    She aspires to work for community arts organizations or museums, creating inclusive exhibitions and educational programs that celebrate her heritage while fostering cross‑cultural dialogue. Over the
    long term, she hopes to lead projects that empower youth through art and technology, bridging creativity with community development.
