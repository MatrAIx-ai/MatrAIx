personas:
  professional: Yovana Juarez is a high-school sophomore who blends a love for desert-inspired sketching with budding coding skills, designing simple indie games that incorporate folk-art visual palettes
    and sci-fi storytelling.
  sports: Yovana Juarez enjoys early-morning trail runs that coincide with sunrise photography, plays on the school's cross-country team in the fall, and follows the Arizona Diamondbacks and Phoenix Suns,
    balancing a love for low-impact cardio with occasional weekend hikes in the Sonoran desert.
  arts: Yovana Juarez immerses themselves in creative expression by sketching desert vistas, painting folk-art motifs, strumming soothing ukulele chords after reading novels by Neil Gaiman and Ursula K.
    Le Guin, and capturing sunrise shots inspired by Ansel Adams, while drawing artistic inspiration from Frida Kahlo and Tame Impala.
  travel: Yovana Juarez prefers meticulously planned road trips to capture sunrise over the Grand Canyon and the red rocks of Sedona, while dreaming of a future cultural exchange in Kyoto to photograph
    cherry blossoms, balancing school obligations with family-approved weekend getaways to nearby national parks.
  culinary: Yovana Juarez assists with family cooking sessions, skillfully preparing tamales, chilaquiles with salsa verde, and handmade corn tortillas, while also experimenting with avocado toast and seasonal
    fruit salads during art-themed dinner parties.
  core: Yovana Juarez is a methodical teen artist who chronically sketches at sunrise, strings ukulele chords between coding sessions, hoards glitter pens, and keeps a secret stash of sugary snacks for
    late-night gaming.
background:
  cultural: Yovana was raised in a Mexican‑American household in the Phoenix‑area suburb of Wittmann. At home, Spanish is spoken daily, and family gatherings often feature traditional celebrations such
    as Día de los Muertos and Las Posadas, accompanied by regional music and cuisine. Growing up near a vibrant Hispanic community, she regularly attends cultural festivals and participates in a weekend
    Spanish language program, nurturing her bilingual fluency and a deep appreciation for Mexican folk art, including papel picado and Talavera pottery. These experiences have instilled values of family
    cohesion, respect for elders, and a strong sense of community service.
