  career_goals: Kohl aims to advance into a senior engineering management role where he can lead cross‑functional teams on sustainability and energy‑efficiency projects for regional manufacturers. He plans
    to obtain a Professional Engineer (PE) license and pursue certifications in lean manufacturing. Over the next five years, he wants to spearhead continuous‑improvement initiatives that integrate emerging
    technologies like additive manufacturing, while also establishing a mentorship program to support younger engineers in the Springfield area.
