personas:
  professional: Kohl Clark is a seasoned mechanical engineer who leverages AutoCAD and SolidWorks expertise to turn practical ideas into robust prototypes, while mentoring junior staff and championing lean,
    sustainability-driven projects that reflect a balance of curiosity and disciplined execution.
  sports: Kohl Clark plays third base for the Springfield Softball League, hikes the Sangamon River trail with the local Springfield Hikers Club, and cheerfully roots for the Chicago Cubs and Chicago Bulls,
    occasionally joining pick-up soccer matches on weekend afternoons.
  arts: Kohl Clark strums rhythm guitar in a weekend cover band that rocks classic rock staples like The Rolling Stones and Stevie Ray Vaughan, attends the annual Illinois Blues Festival, and finds artistic
    fulfillment in handcrafted woodworking pieces that echo the aesthetics of Midwestern artisans.
  travel: Kohl Clark favors weekend road trips in his restored 1967 Mustang, often heading to Nashville for live music, exploring Asheville's craft brewery scene, and has a bucket-list pilgrimage to the
    Italian countryside of Tuscany to savor farm-to-table cuisine and classic car culture.
  culinary: Kohl Clark enjoys grilling Kansas City-style burnt ends, perfecting shrimp etouffee with fresh paprika and thyme, and experimenting with homemade gnocchi topped with sage-brown butter, showcasing
    an intermediate cooking skill that shines at his socially vibrant potluck gatherings.
  core: Kohl Clark blends mechanical precision with a love for communal music, cooking, and classic cars, yet their habit of juggling too many DIY projects often leaves the garage a half-finished mess.
background:
  cultural: Kohl grew up in the Midwestern heartland, surrounded by the values of hard work, modesty, and community that characterize much of Springfield, Illinois. His family’s heritage includes German
    and Irish roots, common in the region, which have fostered an appreciation for traditional celebrations like Thanksgiving, Fourth of July parades, and local county fairs. He identifies with the Midwestern
    ethos of practicality paired with friendly openness, and he actively contributes to local civic events, embodying the cooperative spirit of his cultural upbringing.
