  hobbies: '[''Gardening'', ''Woodworking'', ''Shuffleboard'', ''Gospel choir singing'', ''Bridge club'', ''Cooking Southern cuisine'', ''Reading African‑American history'', ''Genealogy research'', ''Volunteer
    work at food bank'', ''Fishing'', ''Attending local festivals'']'
  career_goals: Although retired, Derek aims to deepen his community impact by expanding the local community garden into a hub for intergenerational learning, establishing a formal mentorship pipeline that
    connects retired tradespeople with high‑school apprentices, and leading an oral‑history initiative that records stories of Black families in Grady County. He hopes to serve as a senior advisor on the
    town council’s aging‑population committee, ensuring policies support both older residents and vibrant community life. Derek also aspires to author a modest memoir that intertwines his family’s migration
    story with reflections on rural Oklahoma life, preserving cultural memory for future generations.
