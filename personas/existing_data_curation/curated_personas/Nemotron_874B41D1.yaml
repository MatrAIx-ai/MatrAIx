  hobbies: '[''Journaling'', ''Budgeting'', ''Home Organization'', ''Cooking'', ''Gardening'', ''Reading'', ''Church activities'', ''Knitting'', ''Hiking'', ''Puzzle solving'']'
  career_goals: Opal aims to advance from her current sales associate role to a supervisory position within the next two years, eventually achieving a store manager title. She plans to enroll in an associate
    degree program in Business Administration to deepen her understanding of retail management and finance. Long‑term, she dreams of opening a boutique that blends contemporary fashion with her cultural
    heritage, creating a community space that offers both employment opportunities and cultural events.
