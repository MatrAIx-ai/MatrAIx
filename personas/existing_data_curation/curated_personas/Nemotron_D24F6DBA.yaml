  hobbies: '[''Bridge'', ''Senior bingo'', ''Community dancing'', ''Church choir'', ''Gardening'', ''Baking'', ''Knitting and quilting'', ''Birdwatching'', ''Reading mystery novels'', ''Local historical
    walking tours'']'
  career_goals: Although retired, Sandra's ambitions focus on staying active, independent, and engaged. She intends to maintain her physical health through regular gardening and walking, continue volunteering
    at the local senior center, and expand her role as a mentor for younger volunteers. Sandra hopes to finish a written memoir of her family's history and share it with her grandchildren, while also mastering
    video-calling platforms to keep close contact with distant relatives. She aims to remain a competitive bridge player in senior tournaments and to lead intergenerational workshops that pass on her cooking
    and gardening knowledge.
