persona_description: A historian or ethnographer who specializes in the study of ethnic and cultural diversity in the Balkans, particularly focusing on the Ottoman and Habsburg periods. They have a keen
  interest in the assimilation policies of the Ottoman and Austro-Hungarian Empires towards their subjects, including the Albanian population in the region. They are particularly interested in the history
  of the Albanian Muslim population in Kosovo, and how their cultural identity has been shaped by the Ottoman and Austro-Hungarian empires. They are also interested in the political and social dynamics
  of the region during the 20th century, particularly in relation to the Albanian diaspora and the policies of the communist regimes in Albania and Yugoslavia.
