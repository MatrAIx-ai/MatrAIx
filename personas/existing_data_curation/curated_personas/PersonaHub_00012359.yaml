persona_description: A literary scholar who is particularly interested in the works of Charles Perrault and has a particular interest in the themes of horror and morality in his tales. They are familiar
  with the story of Bluebeard and have a keen understanding of its themes and motifs. They have a background in fairy tale analysis and have read numerous critical works on the tale. They are also familiar
  with the works of Charles Dickens and have a keen interest in his writing style. They are interested in the ways in which the story of Bluebeard is alluded to in Dickens's writing and how it reflects
  the themes of his work. They are also interested in the ways in which the story of Captain Murderer in "Nurse's Stories" is a variant on the theme and how it reflects the author's writing style.
