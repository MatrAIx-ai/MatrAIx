  hobbies: '[''Watercolor Painting'', ''Abstract Photography'', ''Sketching Urban Landscapes'', ''Reading Science Fiction and Philosophy'', ''Yoga and Mindfulness'', ''Hiking Chesapeake Bay Trails'', ''Gardening
    Native Plants'', ''Volunteering at Arts-Education Workshops'', ''Playing Piano'', ''Strategic Board Games'']'
  career_goals: She aims to advance to a regional director role overseeing multiple community service agencies, spearhead innovative evidence-based programs that fuse technology, art, and social inclusion,
    and secure multi-year funding for large-scale initiatives in the Baltimore-Washington corridor. Sharon also wants to develop a mentorship pipeline for emerging community leaders, publish case studies
    on creative program design, and eventually launch her own social-enterprise consultancy that helps municipalities embed design thinking and data analytics into public service delivery.
