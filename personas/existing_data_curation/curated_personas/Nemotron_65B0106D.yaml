personas:
  professional: Sharon Smith, an innovative community program designer in the Baltimore‑Washington corridor, blends data‑driven decision making with creative problem‑solving—leveraging Excel, R, GIS, and
    workshop facilitation—to craft evidence‑based initiatives that reflect their methodical planning, imaginative curiosity, and collaborative spirit.
  sports: Sharon Smith enjoys seasonal hiking on the Chesapeake Bay trails with the local Trailblazers Outdoor Club, follows the Baltimore Orioles in spring baseball, the Washington Capitals in winter hockey,
    and they maintain a weekly yoga practice for flexibility and stress management.
  arts: Sharon Smith engages in watercolor painting inspired by Georgia O'Keeffe, captures abstract urban moments reminiscent of Ansel Adams, plays piano pieces by Philip Glass on quiet evenings, and attends
    performances by the Baltimore Symphony Orchestra, and they draw creative energy that fuels both personal art and community program design.
  travel: Sharon Smith prefers meticulously planned trips that combine cultural immersion and quiet retreat, having explored the art districts of Barcelona, the Zen gardens of Kyoto, and the historic streets
    of Philadelphia, while they dream of a future solo hike through the Blue Ridge Mountains during the fall foliage season.
  culinary: Sharon Smith enjoys farm‑to‑table cooking with a moderate skill level, favoring dishes like seared Maryland crab cakes with a drizzle of lemon‑herb aioli, quinoa salads tossed with locally sourced
    cilantro, basil, and heirloom tomatoes, and they often experiment with native herbs from their garden such as sage and rosemary.
  core: Sharon Smith is a methodical yet wildly imaginative community strategist who balances data analytics with watercolor brushes, practices yoga to stay grounded, and they habitually over‑organize their
    calendar while occasionally neglecting sleep for late‑night art projects.
background:
  cultural: Sharon was raised in a middle-class, predominantly white suburb of the Mid-Atlantic United States, with roots tracing back to English and Irish ancestry. Her family emphasized education, civic
    responsibility, and community involvement, shaping her early participation in school volunteer clubs and local environmental clean-ups. Growing up near the Chesapeake Bay, she developed an appreciation
    for the region’s maritime heritage, seasonal festivals, and the seasonal harvest of seafood, which inform her current community programming. While culturally aligned with broader American suburban values—self-reliance,
    optimism, and a collaborative spirit—she also embraces the diverse fabric of Anne Arundel County, actively learning from the multicultural residents and incorporating inclusive practices into her professional
    work.
attributes:
  skills: '[''Strategic Planning'', ''Program Development and Evaluation'', ''Grant Writing'', ''Budget Management'', ''Data Analysis (Excel, R, Python)'', ''GIS Mapping'', ''Stakeholder Engagement'', ''Conflict
