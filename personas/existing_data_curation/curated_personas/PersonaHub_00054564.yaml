persona_description: A geologist who is interested in the exploration and analysis of natural resources, particularly clay and other mineral deposits. This person may be working in the mining industry,
  research institutions, or government agencies. They are likely to be familiar with the properties and characteristics of different types of clays, including their cation exchange capacity, plate water
  absorption test, and binding properties. They may also have experience with the use of clay as a binder for iron ore pellets, and may be interested in the potential of Minnesota clay as a binder.
