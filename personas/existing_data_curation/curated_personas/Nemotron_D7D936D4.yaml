personas:
  professional: Mariarowena Vu merges a science‑backed approach with artistic flair as a certified nail technician, employing data‑driven inventory controls, evidence‑based nail health protocols, and intricate
    designs that weave traditional motifs, while her competitive streak and meticulous organization drive her strategic plan to launch a tech‑enabled boutique studio in San Jose within five years.
  sports: Mariarowena Vu enjoys weekend hikes with the East Bay Hiking Club through the Santa Cruz foothills, follows the San Jose Sharks for hockey and the San Jose Earthquakes for soccer, and incorporates
    a daily yoga flow to balance the physical demands of her nail work.
  arts: Mariarowena Vu channels her curiosity into digital illustration inspired by the intricate line work of James Jean, sketches nail art influenced by the bold colour palettes of Yayoi Kusama, and unwinds
    by devouring science‑fiction novels by N.K. Jemisin and watching the cinematic visions of director Denis Villeneuve.
  travel: Mariarowena Vu prefers meticulously planned weekend getaways to coastal spots like Big Sur and spontaneous spring trips to cherry‑blossom festivals in Kyoto, balancing her love of nature with
    a desire to experience vibrant cultural scenes while staying mindful of her limited student budget.
  culinary: Mariarowena Vu relishes cooking her family’s aromatic broth‑based noodle soup and fresh rice paper rolls for gatherings, flashes a modest skill level in the kitchen but confidently experiments
    with spice blends and seasonal vegetables, and always keeps a jar of fermented seafood sauce on hand for that signature umami kick.
  core: Mariarowena Vu is a 21‑year‑old analytical creator who balances a competitive drive with a penchant for solitude, obsessively tracks every nail design in a spreadsheet, worries over every detail,
    yet finds calm in yoga and sci‑fi worlds.
background:
  cultural: Born to Vietnamese immigrant parents in San Jose’s Little Saigon, Mariarowena grew up bilingual in English and Vietnamese. Her family places high value on education, which led her to pursue
    a STEM degree, while also encouraging the preservation of cultural traditions such as celebrating Tet, cooking pho and bánh chưng, and participating in community festivals. She often incorporates traditional
    Vietnamese patterns and colors into her nail art, bridging her heritage with contemporary Californian aesthetics. The blend of collectivist family values and the entrepreneurial spirit of the Bay Area
    informs her competitive yet community‑oriented outlook.
