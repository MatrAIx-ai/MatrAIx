  career_goals: She aims to open a boutique nail studio in San Jose that merges technology, health‑focused products, and culturally inspired design. Over the next five years, Mariarowena plans to develop
    a proprietary line of hypoallergenic, sustainably sourced nail polishes, integrate an AI‑driven booking system that offers personalized treatment recommendations, and become a certified instructor to
    mentor other technicians. Her long‑term ambition includes scaling the brand to multiple locations while maintaining strict quality standards, reflecting her competitive drive and practical planning.
