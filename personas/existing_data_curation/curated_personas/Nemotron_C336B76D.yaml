personas:
  professional: Audrey Pattison, a retired school‑library assistant turned community horticulturist and amateur genealogist, blends meticulous research skills with a practical green thumb, often channeling
    her competitive spirit into the county garden contest while volunteering to teach seniors basic computer use.
  sports: Audrey Pattison enjoys gentle walks with the Cass County Senior Walking Club, participates in a low‑impact chair‑yoga class, and passionately follows the Minnesota Twins and Minnesota Wild while
    cheering her local high‑school football team on Saturdays.
  arts: Audrey Pattison spends afternoons knitting intricate blankets, competing at the town craft fair, reads the works of Laura Ingalls Wilder and Willa Cather, and listens to folk classics by Bob Dylan
    and Joni Mitchell while bird‑watching along the lakeshore.
  travel: Audrey Pattison favors relaxed road trips to nearby natural sites like the Apostle Islands and Voyageurs National Park, has taken a summer visit to the historic streets of St. Paul, and hopes
    to someday explore the coastal charm of New England’s Cape Cod without sacrificing her garden responsibilities.
  culinary: Audrey Pattison prides herself on canning heirloom tomato sauce, dill pickles, and huckleberry jam, often preparing rustic corn chowder and wild‑rice pilaf with fresh herbs from her garden,
    and enjoys the aroma of fresh dill and honey in her kitchen experiments.
  core: Audrey Pattison is a meticulous garden‑enthusiast with a competitive edge, a wary spender who trusts proven routines, a gentle worrier who balances curiosity with practicality, and a quiet creator
    who finds comfort in knitting, history, and the rhythms of rural life.
background:
  cultural: Audrey was born and raised in a predominantly white, Midwestern community of Finnish‑Swedish descent in northern Minnesota. Her family follows Lutheran traditions, emphasizing self‑reliance,
    modesty, and respect for the natural environment. Growing up during the post‑World War II era, she absorbed a strong work ethic and a practical approach to life, while stories of her grandparents’ immigrant
    journeys fostered a curiosity about personal and regional history. The close‑knit rural culture, seasonal rhythms, and a shared sense of community responsibility continue to shape her values, balancing
    curiosity with practicality and a measured skepticism toward outside influences.
