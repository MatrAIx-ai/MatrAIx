  career_goals: Although retired, Audrey is driven to stay intellectually active and socially useful. She aims to finish a memoir that captures her family’s multigenerational story and the changes in rural
    life in Cass County. She plans to volunteer occasionally at the local senior center, teaching basic computer literacy to fellow seniors. Expanding her garden into a modest community‑share plot that
    supplies fresh produce to neighbors is a practical goal, and she hopes to master video‑calling platforms to maintain closer ties with her grandchildren. Maintaining health and independence is central,
    so she intends to join a gentle walking group and follow a low‑impact exercise routine. She also enjoys competing in the annual county garden contest, where her practical horticultural skills give her
    a modest edge.
