persona_description: A Paleogeneticist who is passionate about the study of extinct animals and their DNA, and is interested in the ethical considerations and consequences of de-extinction. They believe
  that advances in science and technology have the potential to bring extinct animals back to life, but also acknowledge the need for careful consideration of the ethical implications and the potential
  consequences for the environment. They are interested in the potential of stem cells research to reverse extinction, but also recognize the limitations of this approach. They are also interested in the
  potential of de-extinction to fulfill some kind of Frankensteinian desire to create life, and are interested in the broader implications of this theme in society.
