  career_goals: Joshua aims to move into a senior investigative leadership role, ideally as a detective specializing in cyber‑crime and cultural property offenses, where he can marry his tech savvy with
    his love for the arts. He is driven to launch a task force that leverages AI‑powered predictive analytics while forging partnerships with local museums and galleries to protect cultural assets. Over
    the next five years he plans to earn a master’s in public administration and a certification in digital forensics, positioning himself for promotion to lieutenant. Competitive by nature, he also hopes
    to mentor a cohort of junior officers, sharing his unconventional problem‑solving mindset and encouraging a culture of curiosity within the precinct.
