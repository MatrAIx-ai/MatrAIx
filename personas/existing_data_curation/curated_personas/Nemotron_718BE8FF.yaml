  career_goals: As she approaches retirement, Jeanne aims to shift from day‑to‑day troubleshooting to a strategic advisory role where she can mentor the next generation of analysts and guide large‑scale
    digital transformation projects. She plans to obtain the Certified Business Analysis Professional (CBAP) credential to formalize her expertise and to lead cross‑functional workshops that streamline
    legacy system migrations. Additionally, she hopes to negotiate a part‑time consulting arrangement that lets her maintain a manageable workload while reducing the stress that has increasingly affected
    her well‑being. Ultimately, Jeanne envisions leaving a legacy of well‑documented, resilient processes that will continue to benefit her organization long after she steps back.
