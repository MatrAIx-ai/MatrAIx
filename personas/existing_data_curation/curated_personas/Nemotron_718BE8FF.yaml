personas:
  professional: Jeanne Ogden is a veteran computer systems analyst who blends three decades of expertise in SQL, ERP, and agile project management with a curiosity for creative problem‑solving, turning
    complex technical requirements into clear roadmaps for non‑technical stakeholders, and they quietly champion meticulous documentation and mentorship for younger analysts.
  sports: Jeanne Ogden is an avid hiker of the Kettle Moraine State Forest and a dedicated member of a local walking club, who also faithfully cheers for the Green Bay Packers, Milwaukee Brewers, and Milwaukee
    Bucks, balancing seasonal sports fandom with a gentle fitness routine that includes weekly yoga and occasional solo jogs, and they view each hike as both a physical challenge and a quiet meditation.
  arts: Jeanne Ogden immerses themselves in the Milwaukee Art Museum’s rotating exhibitions, often finding inspiration in the works of Monet and Georgia O'Keeffe, and they nurture their own creative spark
    by attending a weekly watercolor class with friends, while quietly listening to folk legends like John Prine and contemporary jazz pianist Brad Mehldau during their sketching sessions.
  travel: Jeanne Ogden prefers thoughtfully planned road trips that blend cultural curiosity with comfort, having explored Door County’s historic lighthouses and the Austrian Alps on a guided tour, while
    they dream of a leisurely culinary excursion to Tuscany’s vineyards, all arranged around a modest travel budget and a desire for low‑stress itineraries.
  culinary: Jeanne Ogden relishes Wisconsin’s farm‑fresh cheese curds, artisan cheddar, and garden‑grown heirloom tomatoes, which they toss into homemade basil‑pesto pasta, while their cooking skill sits
    comfortably at the home‑cook level, allowing them to host intimate dinner parties featuring roasted root vegetables, barley soup, and seasonal apple crisp.
  core: Jeanne Ogden is a meticulously organized yet quietly curious analyst whose love of art, nature, and community is balanced by a tendency to worry and a habit of over‑planning every detail, and they
    often find themselves double‑checking spreadsheets late into the night.
background:
  cultural: Jeanne was raised in a mid‑western family of German‑American descent in a small town near Milwaukee, where community gatherings, modesty, and a strong work ethic were everyday values. Her upbringing
    emphasized punctuality, respect for others, and an appreciation for regional traditions such as the Waukesha County fair and the Wisconsin cheese festivals. While she identifies with the broader white
    American culture, she also cherishes the blend of Lutheran heritage and the inclusive, cooperative spirit of her neighborhood, which has shaped her balanced approach to both personal and professional
    life.
