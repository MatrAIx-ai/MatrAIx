persona_description: A scholar and professor who specializes in the study of 20th century European, Russian, and Jewish history and culture, with a focus on the emergence of new forms of Judaism in America
  from the post-World War II period. David Shneer is known for his groundbreaking research and has been called a "pathbreaking" scholar by the Frankfurter Allgemeine Zeitung. He is a professor of history
  and chair of the Jewish Studies program, lecturing nationally and internationally and authoring numerous books and articles about contemporary Jewish identity. Shneer serves as a consultant to numerous
  Jewish agencies and co-founded Jewish Mosaic, the first national Jewish LGBT organization, which merged with Keshet in 2010. He consults with non-profit organizations around issues of integrating post-Soviet
  Jews into Jewish communal life, serving as co-chair of Limmud Colorado and vice-chair of Keshet, and working with Facing History and Ourselves, a global non-profit dedicated to fostering a democratic,
  human-rights oriented education in high schools.
