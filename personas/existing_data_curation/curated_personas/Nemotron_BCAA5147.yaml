personas:
  professional: Brent Dennis, an 8‑year‑old budding LEGO architect, translates their love of detailed building kits and Scratch Jr. coding into methodical problem‑solving projects, planning each build step
    by step and treating every brick like a component in a miniature engineering design.
  sports: Brent Dennis, an 8‑year‑old member of the Riverside Rangers youth soccer team who also swims regularly at the community pool, cheers for FC Barcelona and the New York Yankees, follows their match
    schedules, and they maintain a weekly log of kick precision drills and swim lap counts to monitor improvement.
  arts: Brent Dennis, an 8‑year‑old comic‑drawing enthusiast, spends afternoons sketching structured panels inspired by Stan Lee and Mo Wanda, reads adventure series like 'Percy Jackson' and 'The Hardy
    Boys', and collects LEGO art sets while occasionally performing improvised voice‑over scenes for their own comic characters.
  travel: Brent Dennis, an 8‑year‑old beach‑combing explorer who carefully charts each trip with a colored map, has vacationed at the family‑friendly sands of Santa Barbara, visited the interactive exhibits
    at the San Diego Children’s Museum, and dreams of a future trip to Yellowstone National Park’s geysers to add new volcanic “LEGO‑inspired” rock samples to their collection.
  culinary: Brent Dennis, an 8‑year‑old budding chef who favors cheesy mac and cheese, pepperoni pizza, and strawberry‑banana smoothies, can confidently assemble a peanut‑butter‑oat no‑bake cookie with
    a kid‑safe kitchen set, and often requests fresh seashell‑shaped pasta to echo their shell‑collecting hobby.
  core: Brent Dennis, an 8‑year‑old who brings a methodical builder’s mindset to every hobby, schedules LEGO builds like school projects, obsessively sorts soccer socks by color, and they never start a
    game without first checking the weather forecast for allergies.
background:
  cultural: Brent comes from a white, middle‑class family living in Miami‑Dade County. While his heritage aligns with typical suburban Florida background, his daily life is shaped by the city’s vibrant
    multicultural atmosphere. He celebrates traditional American holidays such as Thanksgiving and Independence Day, and his family often joins community events that feature the diverse Latino and Caribbean
    cultures of Miami, like local food festivals and beach clean‑up days. The family places a strong emphasis on order, punctuality, and community involvement, which reinforces Brent’s preference for structure
    and predictability.
