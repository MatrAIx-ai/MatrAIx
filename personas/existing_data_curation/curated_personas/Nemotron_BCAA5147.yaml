  career_goals: Brent dreams of becoming an engineer or architect, fascinated by how structures are designed and built. He also shows curiosity about marine biology because he lives near the ocean and enjoys
    beach outings. His long‑term ambition is to design safe, fun playgrounds and community spaces for kids, using his methodical nature to solve practical problems. He looks forward to attending science
