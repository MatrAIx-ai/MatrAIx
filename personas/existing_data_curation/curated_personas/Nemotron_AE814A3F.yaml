  hobbies: '[''basketball'', ''hip‑hop dance'', ''food bank volunteering'', ''hiking'', ''cooking family recipes'', ''listening to R&B and gospel music'', ''reading YA fiction'', ''creating TikTok content'']'
  career_goals: Sabrina aims to enroll in a community college nursing program to become a Certified Nursing Assistant (CNA) and later a Registered Nurse (RN). She is motivated to work in community health,
    especially serving underserved rural populations in upstate New York. Long‑term, she hopes to become a health outreach coordinator, developing preventative health education programs that address disparities
    affecting Black residents in the region. Alongside her clinical aspirations, Sabrina seeks to cultivate mentorship skills, planning to mentor younger students from her hometown and help them navigate
    post‑secondary education.
