personas:
  professional: Sabrina Moment, a 19‑year‑old part‑time grocery cashier with strong teamwork and organizational abilities, is preparing to enroll in a community‑college nursing program where they aim to
    apply their practical mindset and compassionate communication to improve health outcomes for underserved rural populations.
  sports: Sabrina Moment, a 19‑year‑old basketball enthusiast, hits the local gym three times a week, follows the New York Knicks for NBA inspiration, joins a community hiking club to explore Catskill trails
    in the summer, and they balance cardio with occasional pick‑up games, embodying a disciplined yet social fitness routine.
  arts: Sabrina Moment expresses creativity through weekly hip‑hop dance classes, crafts short TikTok videos set to tracks by H.E.R. and Anderson .Paak, and they relax with R&B legends like Mary J. Blige
    while devouring contemporary YA novels by Angie Thomas, weaving modern pop culture into daily life.
  travel: Sabrina Moment prefers budget‑friendly weekend getaways, meticulously planning trips on Google Maps, and they have explored New York City’s museums, a backpacking stint in the Adirondacks, while
    dreaming of a spring road‑trip to Savannah’s historic district and a future summer festival in Austin, Texas.
  culinary: Sabrina Moment, an aspiring home chef, perfects family comfort dishes such as smoked pork stew, seasoned collard greens, and buttery cornbread using fresh sweet potatoes and smoked paprika,
    while they also experiment with TikTok‑inspired one‑pot pasta and spicy ramen bowls, reflecting a blend of tradition and trend.
  core: Sabrina Moment balances a pragmatic drive toward a nursing career with a lively social streak, channeling energy into basketball, dance, and TikTok, yet sometimes they overcommit to extracurriculars,
    leading to late‑night study marathons and a habit of binge‑watching series before bed.
background:
  cultural: Sabrina is the daughter of African‑American parents who moved from New York City to Cobleskill for a quieter, close‑knit community. Her upbringing blends rural upstate life with strong Black
    cultural traditions. The family attends a historically Black Baptist church, where gospel music, choir participation, and weekly fellowship shape her values. Holiday celebrations include Kwanzaa and
    honoring African heritage through storytelling and cuisine, especially soul‑food meals like collard greens, fried chicken, and sweet potato pie. Sabrina stays connected with a broader Black network
    through annual trips to Albany’s cultural festivals and maintaining relationships with relatives in the city. This dual exposure gives her a nuanced sense of identity that honors both her local roots
    and her African‑American heritage.
