  hobbies: '[''gardening'', ''quilting'', ''cooking Southern cuisine'', ''birdwatching'', ''hiking'', ''bridge'', ''crossword puzzles'', ''STEM outreach volunteering'', ''reading historical fiction'', ''church
    choir'']'
  career_goals: Euda aims to channel her technical background into service for her community by volunteering on the advisory board of Fayetteville's school STEM program, tutoring aspiring engineers, and
    authoring a practical guide on sustainable home maintenance for the Washington County senior network. She also seeks to stay mentally active by competing in local bridge tournaments and contributing
    oral histories to the Washington County Historical Society. Maintaining good health, traveling to historic sites across the South, and completing a memoir of her engineering career are personal milestones
    she hopes to achieve in the coming years.
