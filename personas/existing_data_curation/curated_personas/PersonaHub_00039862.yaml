persona_description: A team of scientists who specialize in genetic engineering and animal husbandry. The team is focused on developing new breeds of pigs that are more resistant to African Swine Fever,
  a highly contagious disease that affects pigs. The team uses advanced genetic techniques to modify pig genes, including the RELA gene, to produce pigs with a different version of the gene that is associated
  with African Swine Fever. The research is funded by the Biotechnology and Biological Sciences Research Council (BBSRC) and involves collaboration with scientists at The Roslin Institute and Sangamo Biosciences
  Inc. The team's goal is to improve the welfare of farmed pigs around the world, making them healthier and more productive for farmers.
