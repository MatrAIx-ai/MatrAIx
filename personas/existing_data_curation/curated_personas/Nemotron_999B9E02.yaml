  hobbies: '[''Community gardening'', ''Church choir singing'', ''Book club reading'', ''Genealogy research'', ''Local history exploration'', ''Yoga and tai chi'', ''Walking with friends'', ''Bridge'',
    ''Arts and crafts volunteering'']'
  career_goals: Although no longer employed full‑time, Edna aims to remain a vital educational presence in her community. She plans to mentor early‑career teachers through a local teachers’ alliance, develop
    a series of reading‑and‑storytelling workshops for senior centers, and author a practical guide on embedding cultural heritage into elementary curricula. Additionally, she hopes to spearhead a neighborhood
    garden project that doubles as a hands‑on learning space for children and adults, combining her love of gardening with her commitment to lifelong learning.
