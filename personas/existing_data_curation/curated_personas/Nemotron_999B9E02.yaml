personas:
  professional: Edna Mekonen, a retired elementary literacy educator with over three decades of classroom experience, channels their curriculum-development expertise and empathic facilitation skills into
    mentoring early-career teachers and running intergenerational storytelling workshops, balancing curiosity for new pedagogical ideas with practical organization.
  sports: Edna Mekonen begins each day with a leisurely waterfront walk alongside a local senior walking club, joins a weekly tai chi circle at the community center, and avidly follows the San Francisco
    Giants and Golden State Warriors, even volunteering as a scorekeeper for the senior softball league at the nearby park, where they cheer on teammates and enjoy the camaraderie.
  arts: Edna Mekonen sings in a church choir, draws creative inspiration from Nina Simone's soulful jazz and Maya Angelou's resonant poetry, and leads weekly craft sessions featuring watercolor painting
    and knitting, while they regularly attend performances by the San Francisco Symphony and the Berkeley Repertory Theatre.
  travel: Edna Mekonen favors relaxed, culturally rich getaways, often planning weekend trips to Napa's vineyards and historic Sonoma, and dreams of a longer pilgrimage to Ghana's Cape Coast Castle to explore
    diaspora roots and a literary tour of Dublin's James Joyce sites, where they hope to connect with local storytellers.
  culinary: Edna Mekonen enjoys preparing vibrant garden-to-table meals such as heirloom tomato ratatouille with fresh basil, quinoa-kale salad tossed in lemon vinaigrette, and occasional miso-infused soups,
    showcasing their modest yet confident cooking skills that celebrate seasonal vegetables and aromatic herbs.
  core: Edna Mekonen channels a lifelong curiosity into community teaching while juggling a mild worry-prone nature, a habit of over-watering their garden, and an infectious laugh that energizes every book
    club gathering.
background:
  cultural: Edna grew up in a close‑knit African‑American family in the Bay Area, with deep ties to community churches and civil‑rights activism of the 1960s and 70s. Her family’s roots trace back to East
    Africa, and she has preserved traditions such as storytelling, soul and gospel music, and cooking favorite dishes like collard greens and jollof rice. These cultural influences shape her emphasis on
    communal support, intergenerational learning, and the celebration of heritage in both her professional work and personal life.
attributes:
  skills: '[''Curriculum development'', ''Differentiated instruction'', ''Adult literacy tutoring'', ''Classroom management'', ''Conflict mediation'', ''Public speaking'', ''Community event coordination'',
