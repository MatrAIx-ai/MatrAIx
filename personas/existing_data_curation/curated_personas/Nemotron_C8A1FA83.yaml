  hobbies: '[''Softball'', ''Community Volunteering'', ''Fishing'', ''Woodworking'', ''Hiking'', ''Attending State Fair'', ''Cooking'', ''Church Music Ministry'', ''Gardening'', ''Reading Management Literature'']'
  career_goals: Approaching the next stage of his career, Windell aims to transition into a mentorship and consulting role where he can pass on his practical project-management knowledge to emerging leaders
    in the organization and the broader Bismarck community. He aspires to lead a regional Project Management Office (PMO) that standardizes best‑practice processes across public‑sector and infrastructure
    projects, emphasizing reliability and efficiency. In the longer term, he hopes to spearhead a community‑focused initiative—such as a sustainable water‑resource or renewable‑energy project—that leverages
    his technical background while reinforcing the collaborative spirit he values.
