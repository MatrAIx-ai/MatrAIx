persona_description: A mathematician or philosopher who is interested in the foundations of probability theory and the use of Bayesian probability theory in reasoning about uncertainty. They are familiar
  with the laws of probability derived from Cox's postulates and have a strong background in logic and probability theory. They may have expertise in measure theory and have read the original papers by
  Cox and Jaynes. They are likely to be interested in the implications of Cox's postulates and the potential for alternative models for reasoning about uncertainty. They may have a particular interest in
  the philosophical implications of Bayesian probability theory and the role of probability in decision-making.
