  career_goals: Cristobal dreams of a future where he can explore the unknown and help others. He often talks about becoming an astronaut to investigate space, a wildlife biologist to protect desert animals,
    or an engineer who designs useful gadgets. His practical side wants his work to make a difference in everyday life, so he also imagines roles like a firefighter or a community helper. He sees himself
    continuing to learn, building things, and using his kindness to create a safer, more curious world.
