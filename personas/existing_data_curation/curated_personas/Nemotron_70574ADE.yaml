personas:
  professional: Britton Murray is a hands‑on tech tinkerer who blends a love of automotive mechanics with a budding talent for digital media, turning DIY repairs into clear, step‑by‑step video guides while
    their spontaneous, curiosity‑driven mindset keeps their content fresh but occasionally scattered.
  sports: Britton Murray spends weekends at the local skate park honing tricks, cheers on the nearby high school basketball team and the Denver Broncos, and follows the NBA’s Los Angeles Lakers, balancing
    casual skate sessions with a structured but flexible fitness routine that includes weekend bike rides.
  arts: Britton Murray curates personal indie‑rock playlists featuring Arcade Fire, Tame Impala and The Strokes, reads Neil Gaiman and Brandon Sanderson novels, and admires the pixel art of the indie game
    'Hyper Light Drifter', letting these influences bleed into their own game mod designs.
  travel: Britton Murray prefers spontaneous road trips to nearby national parks like Yosemite and cultural city breaks to Tokyo, where they can explore automotive museums and anime districts, yet they
    often need reminders to pack their drone gear and chargers.
  culinary: Britton Murray enjoys crafting loaded pepperoni pizza with extra mozzarella and sriracha drizzle, can whip up a basic ramen bowl using miso paste and soft‑boiled eggs, and is learning to balance
    flavors by experimenting with avocados and fresh cilantro in homemade tacos.
  core: Britton Murray is a curious, hands‑on teen who merges mechanical know‑how with creative video storytelling, often juggling projects with a love for skateboarding, indie rock, and spontaneous tech
    tinkering.
background:
  cultural: Britton grew up in Grand Blanc, Michigan, a suburb in the Midwestern United States. His family’s heritage traces back to Northern European immigrants, and the local culture emphasizes modesty,
    hard work, and neighborly support. The region’s strong automotive legacy, love for high school sports, and active community events have shaped his practical outlook and cooperative nature. He experiences
    typical Midwestern traditions—family dinners, county fairs, and a focus on education and self‑reliance—while also being exposed to the growing cultural diversity of a suburban community.
attributes:
  skills: '[''Computer troubleshooting'', ''Basic video editing'', ''Minecraft world building'', ''Basic automotive maintenance'', ''Collaborative problem solving'', ''Empathetic communication'']'
