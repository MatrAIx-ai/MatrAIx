    tech workshops'', ''Listening to indie rock and creating playlists'']'
  career_goals: Britton plans to finish his high school education by earning a GED and then enroll in a technical college or trade school where he can study automotive technology or digital media production.
    He dreams of becoming an automotive technician who also produces instructional videos for a YouTube channel, merging his mechanical know‑how with his creativity. Alternatively, he is interested in video
    game design with a focus on realistic vehicle physics. He seeks a career that allows him to work with others, help people solve practical problems, and keep learning new skills.
