  hobbies: '[''reading fantasy and science books'', ''drawing and sketching'', ''Lego building'', ''nature exploration'', ''playing beginner piano'', ''puzzles (jigsaw, logic)'', ''watching educational
    videos about space and art'']'
  career_goals: Dana dreams of one day becoming an astronaut to explore space, an illustrator who brings imaginative worlds to life, or a scientist who discovers new ideas. She also hopes to lead a community
    art‑science project that merges creativity with her organized, methodical planning, reflecting her desire to blend novelty with reliability.
