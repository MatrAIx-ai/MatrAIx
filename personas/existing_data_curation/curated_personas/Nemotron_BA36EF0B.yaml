personas:
  professional: Dana Macleod is an aspiring junior astronomer who devours science books and builds Lego rockets, channeling their vivid imagination into methodical experiments and detailed observation logs
    that they help their parents organize.
  sports: Dana Macleod is a member of the Stillwater Sprouts youth soccer team, cheers for the Seattle Kraken during school breaks, belongs to the Stillwater Explorers club for weekend hikes, and spends
    Saturday mornings collecting rocks and bugs for their personal "Nature Museum".
  arts: Dana Macleod spends afternoons drawing elaborate fantasy scenes inspired by Studio Ghibli films and the illustrated worlds of J.K. Rowling, while practicing beginner piano pieces by Yann Tiersen,
    and they can recite the lyrics to 'Let It Go' from Frozen with perfect pitch.
  travel: Dana Macleod dreams of camping under the night sky at Grand Canyon National Park, has already explored the nearby State Forest for bug‑collecting expeditions, and they hope to attend a child‑focused
    astronomy camp at the Kennedy Space Center next summer.
  culinary: Dana Macleod loves homemade pizza topped with pepperoni and olives, builds snack plates that look like miniature Lego structures, and can whip up a quick fruit salad using strawberries, blueberries,
    and a sprinkle of cinnamon, though they often forget to clean up the crumbs.
  core: Dana Macleod blends boundless curiosity with a tidy, methodical streak, turning every Lego set, bug hunt, and piano practice into a mini‑adventure while secretly hoarding glitter stickers in their
    notebook.
background:
  cultural: Dana lives in Stillwater, Minnesota, a small Midwestern town with a historic riverfront and tight‑knit community. Her family shares Northern European roots common in the region, reflecting Swedish
    and Norwegian heritage, and they celebrate traditions such as Midsommar, Thanksgiving, and local winter festivals. The local culture emphasizes outdoor activities like sledding, ice skating, and nature
    walks, as well as values of independence, hard work, and community involvement, all of which shape her organized and reliable nature.
