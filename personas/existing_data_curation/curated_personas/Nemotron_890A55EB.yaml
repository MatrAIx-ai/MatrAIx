  career_goals: Enrique aims to move into a senior leadership role within the next five years, targeting a position such as Audit Manager or CFO of a tech-driven mid-size firm where he can blend his accounting
    expertise with data science. He aspires to spearhead digital transformation initiatives that streamline audit workflows using AI and machine learning. Additionally, he hopes to mentor junior accountants,
    champion diversity and inclusion within the firm, and eventually launch a boutique consultancy that offers financial literacy workshops for the Mexican-American community in Central Texas.
