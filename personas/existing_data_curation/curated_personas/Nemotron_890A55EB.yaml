  hobbies: '[''Visiting art galleries and mural tours'', ''Watercolor painting'', ''Playing guitar (Mariachi and acoustic)'', ''Cooking Mexican cuisine'', ''Hiking in Texas Hill Country'', ''Landscape photography'',
