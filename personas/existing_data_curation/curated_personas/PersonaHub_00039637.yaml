persona_description: A historian who specializes in the study of the Moroccan Crisis of 1905 and 1911, particularly the events that led to the crisis and the actions taken by Britain and France to resist
  German attempts to increase their power in Morocco. The historian is interested in the complex relationships between Britain, France, and Germany during this period, and the ways in which they navigated
  the tension over Moroccan independence and the potential for increased French power. The historian is also interested in the economic and political motivations behind the crises, and the ways in which
  they impacted the global balance of power.
