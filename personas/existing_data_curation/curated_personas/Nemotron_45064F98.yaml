    books'', ''Exploring urban gardening in his backyard'']'
  career_goals: Pramod aims to transition from a senior designer role to leading a multidisciplinary creative studio that specializes in culturally inclusive branding and immersive experiences. He plans
    to deepen his expertise in emerging technologies such as augmented reality and motion graphics to offer clients cutting‑edge storytelling tools. Over the next five years, he hopes to mentor junior designers
    from diverse backgrounds, publish a guide on integrating South Asian aesthetics into contemporary design, and eventually launch his own boutique firm that partners with nonprofit and community organizations
    to amplify underrepresented voices through design.
