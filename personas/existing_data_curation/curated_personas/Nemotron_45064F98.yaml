personas:
  professional: Pramod Singh is a senior visual designer who blends rigorous mastery of industry-standard tools with a natural flair for cultural storytelling, leading collaborative workshops that feel
    more like lively jam sessions than rigid meetings, and channeling their relaxed, sociable nature into vibrant, inclusive brand experiences that weave traditional motifs into modern digital formats.
  sports: Pramod Singh enjoys a casual mix of weekend soccer matches with a local Baltimore club, early‑morning yoga classes at a community studio, and cheering on the Washington Capitals and Baltimore
    Ravens, believing that movement and fandom alike keep their social energy flowing.
  arts: Pramod Singh spends evenings curating street‑photography exhibits at the Baltimore Museum of Art, mentoring emerging creators in a vibrant arts collective, and drawing inspiration from the haunting
    melodies of Ravi Shankar, the provocative street tags of Banksy, and the cinematic storytelling of Bollywood classics.
  travel: Pramod Singh favors spontaneous, culturally immersive trips, having explored historic temples and bustling markets in northern India, wandered the Renaissance galleries of Florence, and trekked
    the ancient streets of Istanbul, while always planning the next weekend getaway to a nearby heritage town to fuel fresh design ideas.
  culinary: Pramod Singh expertly prepares butter chicken, paneer tikka, and saffron‑infused biryani at home, often experimenting with fusion twists like curry‑spiced ramen or cilantro‑lime quinoa salads,
    and delights in hosting multi‑course dinner parties where cardamom, garam masala, and fresh cilantro take center stage.
  core: Pramod Singh is a talkative, culturally‑savvy designer who blends traditional motifs with cutting‑edge tech, loves hosting vibrant dinner gatherings, occasionally misplaces deadlines due to a laid‑back
    schedule, and balances a steady investment strategy with a passion for community‑driven creativity.
background:
  cultural: Pramod was raised in a bilingual household where his parents, who emigrated from the Punjab region of India in the early 1980s, spoke Punjabi and English. His upbringing blended South Asian
    traditions—celebrating Diwali and Holi, listening to classical ragas, and savoring home‑cooked meals—with the multicultural environment of the Baltimore–Washington corridor. This dual exposure cultivated
    a deep respect for community and harmony, shaping his collaborative design ethos. He remains active in a local South Asian arts collective, where he mentors young artists and helps organize cultural
    showcases that bridge his heritage with contemporary American creativity.
