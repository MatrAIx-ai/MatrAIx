  hobbies: '[''Street Art Tours'', ''Gallery Visits'', ''Afrobeat Dance Classes'', ''Improvisational Theater'', ''Pick-up Basketball'', ''Reading Speculative Fiction'', ''Book Club Discussions'', ''Volunteer
    Mentoring for Youth Arts Programs'', ''Cooking Fusion Cuisine'', ''Traveling to Cultural Festivals'', ''Urban Photography'', ''Podcast Listening (Design, Innovation, Art)'']'
  career_goals: Annie aims to earn her PMP certification and eventually pursue an MBA to position herself for senior program‑manager or director‑of‑innovation roles. She is driven to lead large‑scale, interdisciplinary
    projects that fuse technology, community development, and the arts—particularly initiatives that empower Brooklyn’s youth through creative entrepreneurship. In the long term, she envisions launching
    a nonprofit incubator that supports emerging Black artists and designers, while also influencing city policy to promote inclusive, culturally‑rich urban development.
