personas:
  professional: A seasoned handyman and budding consultant named Sam Plater leverages decades of residential maintenance expertise—including plumbing, electrical repair, carpentry, and HVAC troubleshooting—to
    launch a part‑time handyman consulting business serving senior homeowners in Waconia, meticulously budgeting each project, coordinating schedules, and mentoring a junior apprentice.
  sports: Sam Plater is a loyal Minnesota Vikings fan who also enjoys weekend fishing trips on Lake Waconia, participates in the local senior softball league with the Waconia Senior Sox, and keeps fit with
    daily walks along the lakeshore.
  arts: Sam Plater immerses himself in classic R&B and jazz, frequently listening to Miles Davis, Aretha Franklin, and Sam Cooke while attending the Minneapolis Jazz Festival, local cultural fairs, and
    community theater performances.
  travel: Sam Plater prefers well‑planned road trips that blend nature and history, such as weekend drives to the North Shore of Lake Superior, extended tours of Revolutionary‑war sites in New England,
    and occasional overseas trips to Dublin for its folk music scene, always budgeting each outing carefully.
  culinary: Sam Plater delights in home‑brewing a seasonal IPA and cooking garden‑fresh meals like grilled trout with lemon‑dill sauce, roasted sweet potatoes, and a hearty black‑bean chili, skillfully
    blending fresh herbs, smoked paprika, and locally sourced honey.
  core: Sam Plater blends a pragmatic, hands‑on work ethic with a deep community spirit, balancing meticulous project planning with a love of woodworking, jazz, and occasional forgetfulness about medication
    on busy days.
background:
  cultural: Sam is an African American who grew up in the Twin Cities region and now lives in Waconia, Minnesota. While Black residents are a minority in the state, Sam’s family has deep roots in the local
    church and community organizations, fostering a blend of African American cultural traditions and Midwestern values of hard work, self‑reliance, and civic responsibility. He participates in regional
    Juneteenth events, mentors youth through after‑school programs, and maintains close ties with broader Black networks across Minnesota. His cultural identity informs his commitment to community service,
    his appreciation for music and history, and his desire to preserve and share his family's legacy.
