personas:
  professional: James Wales, a retired project coordinator with decades of event‑planning and budgeting expertise, now volunteers as a senior advisor for local nonprofits, applying his methodical, routine‑driven
    approach to oversee community garden projects while their competitive streak ensures every fundraiser outperforms the previous target.
  sports: James Wales enjoys weekly rounds of golf at Meadowbrook Country Club, participates in Saturday night bowling leagues at Riverside Lanes, plays bridge at the senior center, walks daily with the
    local senior walking club, and proudly cheers for the hometown baseball team, the River City Runners, while maintaining a competitive edge in each activity.
  arts: James Wales supports local theater productions such as the community staging of "Our Town," collects classic vinyl records by Frank Sinatra and Nat King Cole, appreciates Norman Rockwell paintings,
    and enjoys attending performances by the regional symphony, allowing their sociable nature to mingle with fellow arts enthusiasts.
  travel: James Wales plans meticulously for short road trips to historic sites like Colonial Williamsburg and the Rocky Mountain National Park, dreams of a genealogical pilgrimage to the British countryside,
    prefers comfortable accommodations over backpacking, and balances travel expenses with a modest yearly travel fund.
  culinary: James Wales takes cooking classes to perfect dishes like beef bourguignon, classic chicken pot pie, and rosemary‑infused roast lamb, enjoys using garden‑fresh herbs, prefers home‑cooked comfort
    meals over fast food, but occasionally over‑spices in a bid to impress fellow club members.
  core: James Wales blends a lifelong love of organized community service with a competitive spirit, a penchant for classic car restoration, a disciplined yet occasionally skeptical approach to health and
    finances, and an energetic sociability that keeps their senior years vibrant and routine‑driven.
background:
  cultural: James grew up in a middle‑class white American family during the post‑war era, absorbing a traditional, practical ethos rooted in suburban life. He identifies with mainstream American culture,
    valuing self‑reliance, routine, and community involvement. Raised in a Protestant household, service and modesty were emphasized. After relocating to Tempe, Arizona, he embraced the regional culture
    of outdoor recreation while maintaining ties to the largely Anglo‑American social circles of the area.
