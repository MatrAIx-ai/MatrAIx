  career_goals: Vanessa dreams of becoming a teacher or pediatric nurse who can support children’s health and emotional well‑being. She also imagines organizing community workshops where she can teach art,
    basic coding, and healthy cooking to younger kids, especially those from immigrant families. Her ultimate ambition is to combine creativity, problem‑solving, and compassion in a career that helps others
    thrive while allowing her to stay flexible and adaptable.
