persona_description: A complex systems scientist and designer who specializes in the reconstruction of the dynamics of observed systems from data, particularly in the fields of aeronautics, pharmaceutics,
  computing, interior design, fashion design, electrical and electronic engineering, mechanical engineering and mechatronics, aerospace design, automobile design, city planning, and policy design. He/she
  is also a master of complexity and deals with clients who don't know what they want or what is possible within their constraints. The persona has a unique knowledge and skills in community led design,
  complexity in manufacturing design, policy design, design of complex systems, design of complex multilevel land use transportation systems, energy, design and innovation, and art, design and complexity.
  The persona is a founder member of the UNESCO Complex Systems Digital Campus UniTwin and a founding member of the Centre for Complexity and Design.
