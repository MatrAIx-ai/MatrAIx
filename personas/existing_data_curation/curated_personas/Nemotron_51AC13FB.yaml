  hobbies: '[''Gardening'', ''Baking and Southern cooking'', ''Quilting and crochet'', ''Bridge club'', ''Walking and fitness groups'', ''Community theater'', ''Genealogy research'', ''Senior center dance
    nights'', ''Reading mystery novels'', ''Volunteer activities at local events'']'
  career_goals: Although currently not in the formal workforce, Sandra aims to deepen her impact on the Bethlehem community. She plans to become the lead volunteer coordinator at the local community center,
    launch a neighborhood garden project, and earn a certification in horticulture to enhance her gardening expertise. Sandra also hopes to start a small home‑based baked‑goods business, using her competitive
    edge to win local cooking contests and funding for community events. Additionally, she envisions mentoring youth through after‑school programs and eventually serving as president of the Bethlehem Senior
    Citizens Association, where she can shape cultural and recreational initiatives for her peers.
