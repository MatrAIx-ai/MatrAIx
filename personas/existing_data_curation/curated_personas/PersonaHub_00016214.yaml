persona_description: A public health official or a medical expert who is responsible for planning and preparing the state or country for a potential influenza pandemic. They are likely to be familiar with
  the latest research on pandemic influenza, including the emergence and spread of new strains, the effectiveness of different antiviral medications, and the importance of effective pandemic planning. They
  may also be involved in developing strategies for allocating resources, such as ventilators, for use during a pandemic.
