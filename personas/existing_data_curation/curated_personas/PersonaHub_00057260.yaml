persona_description: A neuroscientist who specializes in the study of decision-making processes in the brain, particularly in the prefrontal cortex and basal ganglia. She is interested in developing behavioral
  tasks that can be learned by non-human primates and using multi-channel recording techniques and machine learning algorithms to investigate the functions of multiple brain areas involved in decision making.
  Her research interests include temporal and numerical cognition, reinforcement learning, and token-based decision making tasks.
