personas:
  professional: Frank Mars is a retired handyman‑turned‑volunteer coordinator who leverages his carpentry, small‑engine repair, and event‑planning expertise to lead community projects, mentor younger tradespeople,
    and maintain a structured, competitive edge in bridge and chess.
  sports: Frank Mars is a regular at the River City Rapids baseball games, a member of the Midtown Seniors Bowling League, and a seasonal participant in community fishing tournaments, using their competitive
    streak to chase high scores and perfect casts.
  arts: Frank Mars cultivates a quiet artistic side through digital photography of sunrise over the lake, an appreciation for Ansel Adams' black‑and‑white vistas, a fondness for folk legends like Woody
    Guthrie and Johnny Cash, and regular viewings of classic films starring Humphrey Bogart, which they discuss at bridge club gatherings.
  travel: Frank Mars prefers road‑trip adventures that blend heritage and nature, having driven to Yellowstone, the historic streets of Charleston, and the Kenai Peninsula in Alaska for salmon runs, while
    budgeting carefully to fund annual visits to family in nearby towns and a dream pilgrimage to their ancestors' village in County Mayo, Ireland.
  culinary: Frank Mars enjoys cooking the fresh trout they catch, pan‑seared with lemon butter, dill, and a side of garden‑grown ratatouille featuring zucchini, bell peppers, and thyme, while also mastering
    hearty chicken pot pie and a seasonal apple crumble spiced with cinnamon and nutmeg.
  core: Frank Mars is a structured yet sociable retiree who channels a competitive spirit into woodworking, bridge, and community volunteering, while balancing a calm demeanor with a penchant for occasional
    splurges on fishing gear and vintage cameras.
background:
  cultural: Frank comes from a white family with German and Irish roots that settled in the anthracite region of Pennsylvania in the early 20th century. Growing up in Tunkhannock, he absorbed the Appalachian
    work ethic, a strong sense of community, and the values of self‑reliance and frugality common to the area. His upbringing was shaped by local traditions, church gatherings, and seasonal outdoor activities,
    all of which fostered his practical mindset and sociable nature. These cultural influences continue to inform his daily routines, community involvement, and appreciation for the region’s history.
