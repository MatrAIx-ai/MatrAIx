  hobbies: '[''Fishing'', ''Woodworking'', ''Gardening'', ''Bridge'', ''Chess'', ''Local History Reading'', ''Genealogy Research'', ''Volunteer Community Clean-up'', ''Bowling League'', ''Digital Photography'']'
  career_goals: Although officially retired, Frank aims to stay actively engaged in his community. He aspires to lead more volunteer projects—especially a senior‑center garden and a local history preservation
    initiative—while mentoring younger volunteers in practical trades. He also hopes to complete a handcrafted dining table as a personal woodworking milestone and to write a memoir that captures his family’s
    story and the region’s heritage. Maintaining good health and a sense of purposeful structure remain central to his ambitions.
