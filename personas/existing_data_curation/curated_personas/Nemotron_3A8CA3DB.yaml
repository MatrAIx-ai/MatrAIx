  career_goals: Laura aims to secure a full‑time administrative position in a stable sector such as healthcare or municipal government, where her love of structure and predictability can thrive. She plans
    to complete an associate’s degree in Business Administration while gaining certification as a Professional Administrative Assistant. In the longer term, she dreams of opening a boutique home‑bakery
    that blends her Italian heritage with Midwestern flavors, allowing her to combine her competitive drive with creative entrepreneurship while providing a reliable income for her growing family.
