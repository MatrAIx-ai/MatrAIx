personas:
  professional: Maria Mota is a seasoned carpenter poised to launch a boutique, sustainably‑focused renovation studio, leveraging three decades of structural framing, finish carpentry, and custom cabinetry
    expertise—combining mortise‑and‑tenon joinery with CNC inlays—to lead small crews with a critical eye for quality, negotiate supplier contracts, and mentor aspiring women apprentices, and they pride
    themselves on precise cost estimations.
  sports: Maria Mota is an enthusiastic hiker who explores DeSoto National Forest’s trails on weekends, volunteers as a water‑carrier for the local high‑school cross‑country team, and follows the Birmingham
    Barons minor‑league baseball and Alabama Crimson Tide football with the same competitive zeal she brings to her woodworking contests, and they often incorporate the rhythm of their hikes into joyful
    community dance gatherings.
  arts: Maria Mota is a cultural aficionado who spends evenings watching Matt Skill’s woodworking tutorials, attends first‑Friday gallery openings featuring local painter Sarah Homan, and dances cumbia
    to Los Ángeles Azules and zydeco rhythms by Clifton Chenier at town festivals, letting music and visual art fuel their creative projects and they regularly share these inspirations with apprentices.
  travel: Maria Mota is a purposeful traveler who favors budget‑friendly road trips to historic craft towns like Asheville, NC, and the renowned wood‑carving workshops of Oaxaca, Mexico, while dreaming
    of the Milan International Furniture Fair but postponing the trans‑Atlantic flight until their boutique studio reaches financial stability, and they meticulously plan each itinerary around work commitments
    and community events.
  culinary: Maria Mota is a weekend chef who layers complex mole with dried ancho chilies, rolls tender pork‑filled tamales, simmers hearty pozole, and balances these Mexican classics with slow‑smoked applewood
    brisket, all seasoned with fresh cilantro, oregano, and a dash of smoked paprika harvested from their herb garden, and they love sharing these meals at community potlucks to showcase cultural flavors.
  core: Maria Mota is a detail‑obsessive carpenter whose competitive nature drives flawless craftsmanship while a lingering worry‑prone mindset fuels relentless planning, and they approach every project
    with cautious precision and an eye for sustainable innovation.
background:
  cultural: Maria is a first‑generation Mexican‑American who grew up in a bilingual household in Mississippi. She carries forward Mexican traditions such as Día de los Muertos altars, Christmas posadas,
    and family gatherings centered around shared meals, while also embracing Southern customs like church fellowship, community picnics, and hospitality. Fluent in both Spanish and English, she often switches
    languages at family events and when negotiating with suppliers. Her cultural identity informs her cooking, storytelling, and the rhythmic cadence of her work—blending the meticulous craftsmanship valued
    in Mexican artisan traditions with the practical, hands‑on spirit of Southern trade work. Maria’s dual heritage enriches her social circles, allowing her to bridge cultures within Marion’s tight‑knit
    community.
