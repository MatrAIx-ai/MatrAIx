  career_goals: Maria aims to transition from employee to owner of a boutique carpentry business that specializes in sustainably sourced reclaimed wood and energy‑efficient renovations. Within the next
    two years she plans to obtain a Green Builder certification and to establish a modest workshop space where she can produce custom furniture for local galleries and teach practical woodworking classes.
    Her ambition includes mentoring at least three female apprentices each year, raising the profile of women in the trade within her community. She also hopes to secure recognition from the Lauderdale
    County Chamber of Commerce for her contributions to historic home restorations, providing both financial stability for her family and a lasting legacy of craftsmanship.
