persona_description: A geologist who is interested in the study of river systems, particularly the formation and evolution of river valleys and the role of secondary flows in shaping river patterns. They
  are particularly interested in the interaction between primary and secondary flows and the effects of these flows on river morphology, such as the formation of point bars, oxbow lakes, and other features.
  They are also interested in the role of secondary flows in the formation of oxbow lakes and the impact of secondary flows on the evolution of river systems.
