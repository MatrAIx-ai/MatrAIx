persona_description: A paleontologist who specializes in the study of prehistoric flora and fauna, particularly in the Arctic region. They are particularly interested in the flora and fauna that lived during
  the Maastrichtian period, and have conducted extensive research on the flora and fauna of North Slope. They are also interested in the climate and environmental conditions of the region, and have conducted
  research on the effects of the permanent cloud cap on the flora and fauna of the region. They are known for their detailed and educated guesswork in interpreting the fossil pollen record and the climate
  conditions of the region.
