  hobbies: '[''Reading contemporary fiction and self‑help books'', ''Cooking Southern comfort food'', ''Digital photography of urban landscapes'', ''Yoga and mindfulness practice'', ''Volunteering at a
    community center tutoring program'', ''Exploring Trenton’s historic sites and museums'', ''Listening to R&B, neo‑soul, and jazz music'', ''Learning graphic design with Canva'']'
  career_goals: Quiana plans to leverage her associate’s degree in Business Administration to pursue a bachelor’s in Business Management within the next three years. She aims to move from a representative
    role to a team lead position, eventually becoming a Customer Experience Manager where she can design training programs and improve service workflows. Long‑term, she hopes to start her own consultancy
    focused on customer experience strategy for small Black‑owned businesses, while also mentoring youth in her community.
