personas:
  professional: Quiana Codner is a front‑line customer support specialist who leverages active listening, Salesforce expertise, and a curiosity for product details to resolve issues swiftly while crafting
    adaptable scripts that reflect both practical efficiency and innovative problem‑solving.
  sports: Quiana Codner enjoys low‑impact fitness, attending community‑center volleyball leagues, cheering for the New York Giants and the New York Knicks, and practices yoga three times a week to stay
    flexible, while occasionally slipping into binge‑watching sports highlight reels on rainy evenings.
  arts: Quiana Codner is an avid listener of R&B, neo‑soul, and jazz, drawing inspiration from artists like H.E.R., Anderson .Paak, and Nina Simone for their digital photography projects that capture Trenton’s
    gritty skyline in monochrome, and spends weekend evenings experimenting with Canva to design mood‑board collages of urban art.
  travel: Quiana Codner prefers purposeful short trips, having road‑tripped to the Pocono Mountains for a weekend hike, visited Washington D.C.’s museums for historical insight, and dreaming of a future
    culinary tour of Savannah while also yearning to explore Barcelona’s architecture on a tight student budget.
  culinary: Quiana Codner loves Southern comfort cooking, mastering fried chicken with buttermilk brine, collard greens seasoned with smoked paprika, and sweet‑potato mash, while often improvising with
    okra and hot sauce to give classic dishes a personal twist, though they sometimes over‑salt recipes in the pursuit of bold flavor.
  core: Quiana Codner blends a quiet curiosity with disciplined organization, channeling empathetic listening into customer care, mindful yoga into daily balance, and a love for Southern food and urban
    photography into a uniquely grounded yet adventurous outlook.
background:
  cultural: Quiana is a second‑generation African American raised in Trenton, New Jersey. Her family maintains strong ties to Southern cultural traditions, especially through cuisine, music, and church
    gatherings. Growing up in a close‑knit Black neighborhood, she was influenced by local community organizations that emphasize mutual support and education. She celebrates Juneteenth and participates
    in annual cultural festivals that blend historic Black heritage with contemporary urban expression. These influences shape her values of resilience, communal responsibility, and a prideful acknowledgment
    of her roots while navigating a modern, diverse environment.
attributes:
  skills: '[''Customer Service'', ''Active Listening'', ''Empathy'', ''Conflict Resolution'', ''CRM (Salesforce/Zendesk) Management'', ''Data Entry'', ''Basic Technical Troubleshooting'', ''Time Management'',
