personas:
  professional: An experienced dental hygienist, Katie Lopez integrates meticulous clinical expertise in periodontics, radiography, and patient education with a competitive drive for excellence, guiding
    junior staff, spearheading community oral‑health workshops, and they are positioning themselves for a lead dental hygienist or office manager role.
  sports: A dedicated low‑impact athlete, Katie Lopez walks weekly with the Harbor Beach Walking Club, paddles a kayak on Lake Huron each summer, and they rally behind the Detroit Lions in the fall while
    occasionally joining a senior bowling league at the local community center.
  arts: A passionate watercolorist, Katie Lopez creates luminous coastal and botanical scenes inspired by Claude Monet, John James Audubon, and Georgia O’Keeffe, and they regularly share their work at intimate
    showings at the Saginaw Art Museum and the Detroit Institute of Arts while integrating artistic illustrations into patient education materials.
  travel: A meticulous traveler, Katie Lopez prefers carefully planned small‑group tours that blend cultural history and nature, such as weekend trips to Mackinac Island, a spring excursion to the historic
    waterways of the Upper Peninsula, and a future guided lake‑region itinerary through the French Alps, all balanced against a modest retirement budget, and they ensure each itinerary aligns with their
    love for quiet, nature‑focused experiences.
  culinary: A garden‑to‑table culinary enthusiast, Katie Lopez harvests rosemary, thyme, and basil from their backyard to craft herb‑infused vinaigrette, grilled trout with lemon‑dill sauce, and fresh tomato‑basil
    pasta, and they consider their cooking skill intermediate, often experimenting with seasonal Michigan produce.
  core: Katie Lopez, a 59‑year‑old meticulous dental hygienist with a competitive edge, channels their curiosity into watercolor painting, organized community outreach, and disciplined financial planning,
    while quietly juggling mild health concerns and a love for low‑impact fitness; they approach each new challenge with a methodical, competitive spirit.
background:
  cultural: Katie is a third‑generation Midwesterner of Italian and Anglo‑American descent. Growing up in Harbor Beach, she absorbed the region’s coastal‑town values of self‑reliance, community service,
    and a deep respect for nature. Her family’s Italian heritage is reflected in occasional celebrations of Catholic holidays, the enjoyment of Mediterranean cooking, and an emphasis on family cohesion.
    Simultaneously, the broader white Midwestern culture shaped her pragmatic, organized outlook and her participation in local festivals, historical societies, and the close‑knit community of Sanilac County.
attributes:
