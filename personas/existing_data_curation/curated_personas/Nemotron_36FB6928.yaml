    materials", "Illustration for patient education materials"]'
  hobbies: '["Watercolor painting (coastal and botanical subjects)", "Jigsaw puzzles (500+ piece), especially scenic images", "Gardening (native flowers, herbs)", "Birdwatching along Lake Huron", "Reading
    historical nonfiction about the Great Lakes", "Attending small-group art exhibitions", "Volunteering in community oral‑health outreach", "Cooking traditional Midwestern recipes", "Walking the Harbor
    Beach shoreline at sunrise", "Knitting (fingerless gloves)"]'
  career_goals: Katie aims to transition from a seasoned practitioner to a leadership role within her practice, such as Lead Dental Hygienist or Office Manager, where she can shape workflow efficiency and
    quality standards. She plans to obtain an Advanced Dental Hygiene certification in Periodontics and pursue a certificate in Public Health to broaden her impact on community oral health. Over the next
    five years, she wishes to develop a quarterly oral health workshop series for seniors in the Sanilac County area, leveraging her competitive drive to become a recognized speaker at regional dental conferences.
    Long‑term, she envisions mentoring the next generation of hygienists through part‑time teaching at a nearby community college and possibly authoring a guidebook on evidence‑based preventive dentistry.
