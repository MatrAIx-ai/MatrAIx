persona_description: A neurologist and philosopher who specialized in phylogenetical studies and developed an interest in localizing the "source of genius". He was one of the neurologists asked to consult
  on Lenin's illness and obtained his brain for histological study after Lenin's death. His work became better known, leading to the establishment of a neurological institute in 1915. He was forced to retire
  from the directorship of his institute in 1936 due to opposition to the Nazis, but he and his wife built a small private institute, the Institut für Hirnforschung und Allgemeine Biologie, in the Schwarzwald
  in 1937.
