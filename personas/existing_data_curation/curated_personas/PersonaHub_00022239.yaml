persona_description: A Genre Fantasy author who specializes in creating world-building based on historical figures and their folklore, often drawing on multiple historical sources to create a unique and
  imaginative Fantasyland. This author is skilled at combining different historical figures into a cohesive and coherent narrative, often with an emphasis on the figure of the minstrel. They are likely
  to have a deep understanding of the historical context and cultural significance of these figures, and use this knowledge to create engaging and immersive worlds. They may also have a preference for creating
  a default setting that draws on all of these historical figures without much thought, treating minstrelsy as a Template attribute which moves a protagonist around from location to location. This author
  is likely to have a special knowledge and expertise in creating fictional worlds based on historical figures and their folklore, and may have a particular interest in the figure of the minstrel.
