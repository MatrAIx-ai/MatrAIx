  hobbies: '["Reading adventure and animal books", "Drawing and sketching wildlife", "Exploring local parks and bird‑watching", "Building LEGO models", "Creating games with Scratch", "Pet care (dog walking,
    feeding)", "Simple cooking and baking", "Home science experiments", "Playing the ukulele", "Collecting and cataloguing nature observations"]'
  career_goals: Although only nine, Sandra already dreams of a future where she can combine her love for animals, nature, and helping others. She imagines becoming a wildlife biologist or veterinarian,
    spending her days observing animals in Minnesota’s lakes and forests, conducting field research, and caring for injured wildlife. She also envisions herself as a teacher or mentor for younger children,
    sharing her curiosity about the natural world through hands‑on lessons and nature walks. Her long‑term ambition is to pursue a science education that balances discovery with practical problem‑solving,
    allowing her to work in a flexible, discovery‑driven environment that respects her preference for small groups and quiet, focused work.
