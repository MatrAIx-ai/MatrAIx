personas:
  professional: A budding junior engineer named Sandra Suttles merges their love of wildlife with hands‑on creativity by designing LEGO habitats for forest animals and building simple Scratch games that
    simulate bird migrations, showing a practical eye for detail while they often favor spontaneous play over rigid deadlines.
  sports: A nature‑oriented athlete named Sandra Suttles enjoys casual dog‑walks through Como Park, cheers for the Minnesota Twins baseball team and the Minnesota Vikings football team, and participates
    in a neighborhood kids’ soccer clinic, yet they prefer low‑key activity and avoid intense competition.
  arts: An imaginative creator named Sandra Suttles devours the Magic Tree House series, sketches detailed owls and squirrels inspired by National Geographic Kids, strums simple chords on their ukulele
    to songs by The Wiggles and Jack Johnson, and watches Pixar animated films, letting these artistic influences shape their storytelling and play.
  travel: A curious explorer named Sandra Suttles has trekked through the Como Park Zoo and Conservatory, navigated the tunnels of the Minnesota History Center, shopped at the Mall of America, paddled modestly
    in the Boundary Waters during a family weekend, and dreams of seeing the Grand Canyon, preferring day‑trips that mix nature discovery with familiar comforts.
  culinary: A budding chef named Sandra Suttles loves mixing butter, flour, brown sugar, and chocolate chips to bake chewy chocolate chip cookies, whips up peanut‑butter‑banana smoothies, and delights in
    topping homemade mini‑pizzas with bell peppers and mushrooms, although they sometimes skip washing their hands before cooking.
  core: Sandra Suttles is a curious nine‑year‑old who blends scientific experiments, LEGO engineering, bird‑watching sketches, and quiet ukulele sessions into daily adventures, and they approach each new
    challenge with quiet determination despite occasional sweet‑tooth cravings.
background:
  cultural: Sandra comes from a white, Midwestern family with deep roots in Minnesota’s Scandinavian and German heritage. Growing up in Saint Paul, she experiences the region’s distinct seasons—from snowy
    winters to warm summers—shaping her love for outdoor activities like park hikes and ice skating. Her household observes traditional Upper‑Midwest customs, celebrating holidays such as Thanksgiving and
    Christmas with family gatherings, seasonal foods, and community volunteering, often through her church’s outreach programs. The community’s emphasis on education, nature appreciation, and modest, cooperative
    values influences Sandra’s respectful demeanor and her interest in caring for animals and the environment. While English is her primary language, she has been introduced to basic Spanish in school,
    reflecting the growing cultural diversity of the Twin Cities.
