  hobbies: '[''Watercolor painting'', ''Gardening'', ''Birdwatching'', ''Attending local theater'', ''Reading historical novels'', ''Genealogy research'', ''Volunteer workshop facilitation'', ''Book club
    participation'', ''Exploring new recipes'']'
  career_goals: Although retired, Abigail aims to deepen her contributions to the Clayton community by curating a traveling exhibition of local history and art for schools and senior centers. She aspires
    to mentor younger volunteers in archival practices and grant writing, and plans to author a memoir that intertwines her personal journey with the cultural evolution of Johnston County. Additionally,
    she seeks to explore advanced digital art techniques and to travel to regional museums and cultural festivals to broaden her artistic perspective.
