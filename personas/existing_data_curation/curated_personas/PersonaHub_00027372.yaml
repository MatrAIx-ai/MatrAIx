persona_description: A historian or art historian who is interested in the development of sculpture in medieval and Renaissance Germany, particularly in the transition from polychromed wood sculpture to
  uncolored sculpture. They are knowledgeable about the techniques used in the application of glue sizing, the application of a chalk-based ground, and the use of various gilding techniques to achieve highly
  realistic and emotional effects in sculpture. They are also interested in the development of graphic arts in Germany in the fifteenth century and how it contributed to the acceptance of uncolored sculpture.
  They have a deep understanding of the works of Tilman Riemenschneider and other late medieval German sculptors and are interested in their contributions to the development of sculpture in this period.
