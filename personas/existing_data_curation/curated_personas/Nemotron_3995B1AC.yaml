personas:
  professional: Peter Rich, an enthusiastic toddler who channels their love for structure into arranging building blocks into meticulous towers before delightfully toppling them, often declares they are
    the captain of the construction crew, inviting other children to join their playful project.
  sports: Peter Rich, a lively member of the neighborhood toddler soccer group that practices on Saturday mornings at the community park, cheers for the local baseball team on TV, and loves chasing soft
    foam balls in the backyard, reflects they thrive on group activities and energetic play.
  arts: Peter Rich, an avid fan of Sesame Street’s catchy tunes and a budding crayon drafter who splashes bright colors on every available surface, often reenacts their favorite characters for the family
    and delights in the rhythmic clapping of nursery rhymes, indicating they find joy in creative expression and shared performance.
  travel: Peter Rich, who has already enjoyed family outings to the nearby zoo, a weekend beach trip to the coast, and a magical day at the local children’s museum, prefers short car rides with familiar
    lullabies and predictable routines, yet occasionally dreams of a future adventure to Disney World, showing they balance curiosity with the need for structure.
  culinary: Peter Rich, who delights in buttery macaroni and cheese, prefers apple slices with a dip of peanut butter, and expertly smudges vanilla yogurt on their bib, navigates mealtime with enthusiasm
    for familiar flavors but also occasional picky refusals of broccoli, illustrating they negotiate food with both curiosity and routine.
  core: Peter Rich, a two‑year‑old bundle of organized chaos who flips between meticulous block‑building and spontaneous play, treasures routine yet craves companionship, worries over minor changes, and
    negotiates the world with a blend of charm, impatience, and a persistent love for stickers, revealing they are a delightful yet sometimes anxious explorer.
background:
  cultural: Peter grows up in Perth Amboy, New Jersey, a town known for its cultural diversity and close‑knit community atmosphere. Though his family identifies as white, with roots in Mid‑Atlantic American
    traditions, they regularly participate in community events that celebrate a wide range of cultures, such as annual street fairs and multicultural festivals. This exposure provides Peter with early experiences
    of varied foods, languages, and customs, fostering an inclusive worldview even at a young age. The family’s values emphasize friendliness, cooperation, and modest religious practices, often attending
    a local Methodist church that reinforces community service and kindness.
