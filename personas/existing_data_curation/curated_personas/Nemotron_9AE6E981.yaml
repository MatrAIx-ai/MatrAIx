personas:
  professional: Joseph Parker is a methodical DIY tech enthusiast who leverages his hands‑on experience assembling computers, performing basic automotive maintenance, and crafting small woodworking projects
    to offer neighborhood fix‑it services while preparing for a GED and an apprenticeship in automotive technology.
  sports: Joseph Parker cycles the River Valley Trail weekly with the Valley Riders Cycling Club, follows the Portland Sea Dogs minor‑league baseball team and the local high‑school soccer squad, and supplements
    his low‑intensity endurance rides with occasional strength training sessions at the school gym, preferring personal fitness over competitive sports.
  arts: Joseph Parker enjoys assembling Airfix model kits of vintage aircraft, spends evenings listening to classic rock legends like Led Zeppelin and jazz greats such as Miles Davis, and draws design inspiration
    from Leonardo da Vinci sketches he studies at the downtown art library, weaving these influences into his woodworking creations.
  travel: Joseph Parker approaches travel like a DIY project, drafting detailed itineraries on graph paper, favoring affordable road trips to destinations such as Detroit's automotive museums, the Grand
    Canyon’s South Rim for hiking, and, in his long‑term plan, a study‑tour of Japan’s carpentry and car manufacturing hubs like Kanazawa and Toyota City.
  culinary: Joseph Parker’s culinary repertoire includes crafting homemade pizza topped with fresh mozzarella, sun‑dried tomatoes, and basil, whipping up quick stir‑fried ramen with sliced pork and bok
    choy, and perfecting a classic grilled cheese with aged cheddar and a smoked bacon strip from the local deli, all while budgeting carefully for ingredients.
  core: Joseph Parker, a 17‑year‑old solitary tinkerer, balances a relentless curiosity for how things work with a meticulous, budget‑savvy routine, often losing sleep over perfecting gear ratios but never
    skipping a step in documenting each project.
background:
  cultural: Joseph grew up in the middle‑class, predominantly white suburb of Saint Charles, Illinois, where Midwestern values of self‑reliance, practicality, and community involvement are emphasized. His
    family’s Protestant roots instilled a strong sense of responsibility, punctuality, and modesty. Frequent exposure to local schools, the public library, and community centers nurtured his curiosity about
    how things work while reinforcing the region’s work ethic. The cultural environment encourages modest achievements, participation in small community gatherings, and a respect for hands‑on, skilled labor,
    all of which have shaped Joseph’s outlook and aspirations.
