  career_goals: Joseph aims to obtain his GED within the next year and pursue an apprenticeship in automotive technology, with the long‑term goal of becoming a certified automotive technician and eventually
    opening his own small repair shop. He also considers a parallel path in carpentry, seeking a trade certification that would allow him to take on independent woodworking contracts. In the short term,
    he plans to offer neighborhood home‑repair services, leveraging his practical skills to build a modest client base and gain real‑world experience. His overarching ambition is to master a skilled trade
    that combines his curiosity about how things work with his reliable, organized work ethic.
