personas:
  professional: An aspiring marine biologist named Brian Wells, they eagerly sort seashells into color‑coded rows, channeling their strong organizational instinct and boundless curiosity into a fledgling
    habit of scientific observation while routinely questioning the validity of storybook facts with a skeptical grin.
  sports: A budding athlete named Brian Wells, they enthusiastically attend toddler swim sessions at the Sitka Community Center, toddle around on a mini snowshoe during winter hikes, cheer for the Seattle
    Seahawks on game night, and are enrolled in the Sitka Spruce Trail Kids Soccer Club where they practice dribbling with a competitive sparkle that belies their tender age.
  arts: A tiny creative spirit named Brian Wells, they delight in drawing bright fish and spruce trees with chunky crayons, sing along to The Wiggles and Raffi’s 'Baby Beluga', watch animated tales like
    'Molly of Denali' that weave local stories, and attend weekly storytelling circles at the Sitka Heritage Museum where they eagerly mimic the expressive gestures of local storytellers, channeling their
    imaginative curiosity into a vivid artistic outlet.
  travel: A curious explorer named Brian Wells, they embark on family road trips to Juneau’s whale‑watching spots and weekend hikes in the Tongass National Forest, love the gentle rhythm of stroller rides
    along the Sitka waterfront, and daydream about a future adventure to Disney World in Florida, balancing their love for familiar coastal scenery with a budding appetite for far‑flung wonder.
  culinary: A budding gourmand named Brian Wells, they relish buttery salmon flakes mixed into creamy macaroni and cheese, gulp down warm blueberry pancakes drizzled with maple syrup, eagerly help stir
    potions in the kitchen with a plastic wooden spoon, and are fascinated by the bright orange of carrots and the sweet crunch of dried salmon jerky, reflecting a palate shaped by coastal flavors and toddler‑friendly
    comfort foods.
  core: Brian Wells, a two‑year‑old with a boundless imagination, a competitive streak, and a gentle wariness of stress, navigates his world of seaside stories and colorful play with a meticulous eye for
    detail and a habit of questioning everything, even the simplest bedtime tale.
background:
  cultural: Brian is raised in a white American family living in Sitka, Alaska. His upbringing blends mainstream U.S. traditions—celebrating holidays like Thanksgiving and Christmas and enjoying popular
    children's media—with the unique coastal and Indigenous influences of the region. He is regularly exposed to local Tlingit stories, community events such as the Sitka spruce festival, and the rhythms
    of a fishing‑focused town. This combination fosters a respect for nature, an appreciation for maritime culture, and a familial environment that values curiosity, independence, and creative expression.
