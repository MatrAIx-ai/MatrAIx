  hobbies: '[''Photography (transportation and street life)'', ''Attending live music concerts'', ''Visiting art galleries and museums'', ''Cooking Southern barbecue'', ''Community theater participation'',
    ''Volunteering for local arts outreach'', ''Hiking in nearby parks'', ''Watching Atlanta Falcons games'', ''Reading historical non-fiction'', ''Collecting vintage travel posters'']'
  career_goals: David aims to advance into a supervisory or dispatch role within his company, eventually moving toward a logistics manager position where he can shape fleet operations and safety culture.
    He plans to earn a Certified Transportation Professional (CTP) credential and complete a specialized course in supply‑chain management to complement his practical experience. Long‑term, he hopes to
    launch a small, community‑focused transport service that partners with local arts organizations to deliver artwork and cultural events across the region, combining his love for transportation with his
    appreciation for the arts.
