persona_description: A researcher interested in the study of dyscalculia and its impact on Mathematics performance in public primary schools in Starehe, Nairobi City County, Kenya. The researcher is likely
  to be a psychologist or a teacher who is dedicated to improving the learning experiences of dyscalculic learners and enhancing their overall performance in Mathematics. The researcher is interested in
  understanding the underlying factors that contribute to persistent underperformance in Mathematics among learners with dyscalculia and the effectiveness of various interventions in addressing these factors.
  The researcher is also interested in exploring the impact of teacher factors, teaching methods, learner characteristics, and availability of teaching and learning resources on Mathematics performance
  among dyscalculic learners in public primary schools in Starehe.
