    Europe'', ''Reading architectural theory'', ''Playing bridge'', ''Board game nights'']'
  career_goals: At this stage, Bart aims to transition from full‑time practice to a mentorship‑focused consultancy, guiding emerging architects while continuing to shape projects that revitalize historic
    downtown areas with sustainable, community‑centered design. He aspires to publish a monograph on integrating New England craft traditions into contemporary architecture and to establish a small boutique
    studio that partners with local artisans and civic groups. Bart also plans to teach a design studio at the nearby community college, sharing his wealth of experience and encouraging unconventional thinking
    among the next generation of designers.
