personas:
  professional: Priscilla Maley, a 16‑year‑old aspiring concept artist, blends digital illustration, sketching, and folk storytelling into a unique visual style while leading brainstorming sessions in her
    school art club and posting daily works on TikTok to attract commissions.
  sports: Priscilla Maley, a cross‑country runner on her high school team who also enjoys weekend hikes in the pine‑forested hills near De Berry, roots for the Dallas Cowboys and Houston Astros, and occasionally
    joins a local youth soccer club, approaches fitness with a relaxed, nature‑focused mindset rather than structured gym routines.
  arts: Priscilla Maley, an avid sketcher and digital painter who admires the whimsical line work of Loish, the narrative depth of Neil Gaiman, and the folk melodies of Townes Van Zandt, channels Southern
    storytelling into her mixed‑media collages while sharing short‑form videos of her ukulele improvisations on TikTok.
  travel: Priscilla Maley, who prefers spontaneous weekend road trips over meticulously planned vacations, has explored Austin’s live‑music scene, camped by the Clear Cypress lakes, dreams of wandering
    the ancient streets of Kyoto for manga inspiration, and saves her modest allowance by couch‑surfing with friends or staying in budget hostels.
  culinary: Priscilla Maley, a self‑taught home cook who loves crafting smoky BBQ‑rubbed chicken, whipping up pimento cheese toast, and experimenting with matcha‑infused smoothies for late‑night sketch
    sessions, balances her appetite for bold Southern flavors with a curiosity for Japanese ramen and Mexican tamales, often plating dishes as colorful collages.
  core: Priscilla Maley, a 16‑year‑old daydreamer who drifts between pine‑scented sketchbooks and TikTok beats, habitually misplaces her art supplies while obsessively curating a growing online portfolio.
background:
  cultural: Priscilla grew up in De Berry, a small rural community in Panola County, Texas. Her family’s heritage reflects traditional Southern and Texan values—strong family ties, church gatherings, and
    community events—while also embracing creative expression. The region’s storytelling tradition, folk music, and appreciation for outdoor life have influenced her artistic sensibility. At the same time,
    exposure to broader digital culture through the internet has expanded her influences beyond the local environment, fostering a blend of rural heritage and contemporary artistic exploration.
attributes:
  skills: '[''digital illustration'', ''sketching'', ''creative writing'', ''basic photo editing'', ''self-directed learning'', ''critical thinking'', ''storytelling'', ''music composition'']'
  hobbies: '[''sketching'', ''digital painting'', ''creative writing'', ''photography'', ''nature walks'', ''mixed-media collage'', ''music composition'', ''TikTok content creation'', ''community theater
    workshops'', ''reading speculative fiction'']'
  career_goals: Priscilla aims to turn her creative passions into a professional career as a concept artist for video games or film, and eventually as a freelance illustrator and graphic novelist. She plans
    to complete her GED within the next year, then enroll in a community‑college associate program in visual arts. Building an online portfolio on platforms like Instagram and ArtStation is a priority,
    as is securing commission work. In the long term, she hopes to publish a graphic novel series that blends fantasy with Southern folklore and to mentor other young creators through workshops.
