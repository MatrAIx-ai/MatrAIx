  hobbies: '[''Watercolor painting'', ''Traditional sketching'', ''Reading speculative fiction'', ''Listening to philosophy podcasts'', ''Hiking'', ''Analog photography'', ''Strategic board games (e.g.,
    Settlers of Catan)'', ''Creative writing (poetry and short stories)'', ''DIY upcycling projects'', ''Collecting vintage postcards'']'
  career_goals: Leslie aims to launch a freelance concept‑art practice that secures commissions for video‑game studios, graphic‑novel publishers, and independent creators. She plans to enroll in a community‑college
    art program to earn a formal credential and expand her portfolio. Long‑term, she envisions curating a traveling exhibit that fuses visual art, speculative storytelling, and interactive media, positioning
    herself as a competitive figure in the indie art scene while maintaining the disciplined, organized workflow that she values.
