persona_description: A census bureau director who is responsible for overseeing the development and implementation of the U.S. Census Bureau's national content test, which involves evaluating and comparing
  different versions of questions to ask in the 2020 census, as well as encouraging households to respond to the census online, the cheapest and most efficient option. The persona is likely to have experience
  and knowledge in conducting surveys and experiments, as well as a deep understanding of the U.S. census process and its importance in collecting detailed information on ethnic and racial groups. They
  may also have expertise in data analysis and interpretation, and be familiar with the latest research and trends in demographic and racial data collection.
