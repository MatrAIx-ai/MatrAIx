  career_goals: Ricardo aims to progress into a senior leadership role such as Director of Project Management Office or Program Manager for a nonprofit or cultural organization where his love of the arts
    and community impact can align. He plans to earn a PMP certification (if not already held) and pursue a Master’s in Project Management to deepen his strategic expertise. Over the next five years he
    wants to lead multi‑year, high‑visibility initiatives that improve regional arts infrastructure and foster cross‑sector collaboration in the Shenandoah Valley. He is also passionate about mentoring
    junior project managers, building high‑performing, harmonious teams, and championing sustainable, stress‑aware work practices that reduce burnout for himself and his colleagues.
