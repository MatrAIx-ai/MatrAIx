persona_description: A researcher from the University of Manchester who specializes in the study of materials science, particularly the properties and applications of phyllosilicate minerals such as mica.
  This researcher is particularly interested in the discovery of new materials with high conductivity, particularly in the field of 2D materials and devices related to hydrogen. The researcher is known
  for their expertise in the study of proton conductors and is excited by the discovery of mica's ability to be an excellent conductor of protons, despite being 10 times thicker than graphene.
