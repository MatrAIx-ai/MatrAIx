  career_goals: John aspires to move from frontline material moving to a supervisory role within the next three years. He plans to earn a Certified Materials Handler credential and a Lean Six Sigma Green
    Belt, positioning himself for a warehouse manager position. Long-term, he envisions launching a small logistics consultancy that helps regional businesses streamline their supply chains while maintaining
    high safety and efficiency standards. He also considers taking evening courses toward an associate degree in logistics or supply chain management to broaden his expertise.
