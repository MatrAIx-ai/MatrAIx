  hobbies: '["Group hiking in the Berkshires", "Birdwatching with local naturalist club", "Community gardening", "Playing acoustic guitar", "Attending jam sessions", "Board-game nights", "Yoga and meditation",
    "Wildlife photography", "Volunteer teaching at animal-shelter events", "Cooking with home-grown herbs"]'
  career_goals: Joshua aspires to move into a supervisory role within animal welfare, aiming to become a program director for a regional wildlife rehabilitation center or a lead caretaker at a nonprofit
    sanctuary. Over the next three to five years, he plans to obtain a Certified Veterinary Technician credential and complete advanced coursework in wildlife management to deepen his scientific knowledge.
    He also intends to expand the educational outreach component of his work, designing curricula for school groups and creating community workshops that promote humane animal treatment. Ultimately, Joshua
    hopes to combine his practical caregiving experience with his passion for public education to influence local animal‑policy initiatives and possibly launch his own community‑focused animal rescue organization.
