persona_description: A veterinarian who specializes in the diagnosis and treatment of Bovine Viral Diarrhea Virus (BVDV) infections in cattle, goats, sheep, and llamas. This individual has experience working
  with and analyzing BVDV isolates, including the BVDV1 and BVDV2 strains, using diagnostic tests, polymerase chain reaction (PCR) tests, and monoclonal antibodies. They are knowledgeable in the molecular
  and antigenic differences between these strains and are skilled in differentiating between BVDV1 and BVDV2. They have likely contributed to the understanding of BVDV epidemiology, vaccine development,
  and the management of BVDV infections in cattle.
