personas:
  professional: Terry Cousineau, an aspiring young storyteller and fledgling coder, weaves boundless imagination into school projects by sketching fantastical creatures, building elaborate LEGO kingdoms,
    and tinkering with simple tablet apps, turning their cooperative yet sometimes anxious nature into collaborative problem‑solving and narrative creation.
  sports: Terry Cousineau sprints around the neighborhood in the Baxley Tigers youth soccer league, cheers for the Georgia Bulldogs during football season, and uses tag games as a high‑energy outlet while
    occasionally forgetting to stretch, resulting in minor knee scrapes that remind them to balance excitement with caution.
  arts: Terry Cousineau avidly draws dragons inspired by Pixar’s "Monsters, Inc." and sketches whimsical characters after watching "Adventure Time," hums along to Dolly Parton’s "Jolene" and Taylor Swift’s
    "Shake It Off," and reenacts scenes with friends, letting these creative sparks fuel their storytelling and LEGO narratives.
  travel: Terry Cousineau has explored the historic streets of Savannah, splashed in the water parks of Orlando, and dreams of hiking the Great Smoky Mountains and spotting geysers in Yellowstone, preferring
    family road trips with spontaneous stops at roadside diners and the occasional county fair.
  culinary: Terry Cousineau’s palate swings between cheesy macaroni, crispy fried chicken, and sweet tea, loves to experiment by adding gummy bears to homemade ice cream sundaes, and occasionally overindulges
    in sugary snacks after a long LEGO build, despite parents reminding them to balanced meals.
  core: Terry Cousineau is an imaginative, sociable eight‑year‑old who balances boundless creativity with occasional worry, turning LEGO bricks and storybooks into endless adventures while habitually juggling
    allowance, allergies, and a love for soccer.
background:
  cultural: Terry is a white boy growing up in Baxley, a small town in Appling County, Georgia. He is raised in a close‑knit Southern community where family gatherings, church youth events, and school activities
    shape his social world. Local traditions like country music, community fairs, and storytelling evenings influence his appreciation for narrative and oral creativity. The relaxed, slower pace of rural
    life nurtures his preference for flexible schedules, while the supportive community environment encourages his outgoing, cooperative nature.
