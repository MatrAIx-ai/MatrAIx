  career_goals: Terry dreams of one day becoming a creator of worlds—whether as an animator, video game designer, or concept artist—where he can blend his love for art, novelty, and abstract ideas. He also
    imagines exploring space as an astronaut or designing futuristic inventions, inspired by his fascination with science and the unknown. While his ambitions are still playful, he consistently expresses
    a desire to turn his imaginative projects into a career that lets him bring joy to others.
