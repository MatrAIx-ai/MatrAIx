  career_goals: Ashley aims to secure a senior scientist position leading independent research projects focused on sustainable materials and renewable energy technologies. She aspires to publish high‑impact
    papers, obtain patents for innovative instrumentation, and acquire competitive research funding. While preferring solitary work, she seeks to mentor a select few junior researchers and gradually build
    a small, highly efficient team. Long‑term, she envisions transitioning to a consultancy role that allows her to apply her expertise across industry and academia while maintaining control over her research
    agenda.
