personas:
  professional: Hanh Legaspi, a procurement specialist with five years of strategic sourcing experience, blends their love for visual arts and cross‑cultural communication into innovative, aesthetically‑driven
    supplier solutions while they navigate SAP and Oracle with a relaxed, flexible mindset.
  sports: Hanh Legaspi hikes the Cascades on weekends, practices yoga thrice weekly, and occasionally joins a local adult softball league, while they cheer for the Seattle Seahawks during the football season.
  arts: Hanh Legaspi, an avid watercolorist and frequent gallery‑goer, draws inspiration from contemporary artists who fuse traditional motifs with modern abstraction, and they often curate pop‑up exhibits
    that blend their procurement insights with artistic flair.
  travel: Hanh Legaspi favors culturally immersive trips, revisiting the places tied to their family’s ancestral homelands to reconnect with culinary and artistic traditions, while also planning spontaneous
    weekend escapes to nearby national parks and European art festivals, and they cherish the juxtaposition of familiar flavors and new vistas.
  culinary: Hanh Legaspi delights in cooking aromatic broth‑based soups with lemongrass and fish sauce and slow‑braised stews flavored with tamarind and soy, and they experiment with flavors while hosting
    intimate dinner gatherings for friends.
  core: Hanh Legaspi is a procurement pro who trades spreadsheets for watercolor splashes, balances sustainable sourcing ambitions with a penchant for leaving coffee mugs on the counter, and they find harmony
    in art, food, and mindful movement.
background:
  cultural: Hanh is a first‑generation American of mixed Vietnamese and Filipino descent. Raised in a bilingual household, she grew up celebrating Tet, Vietnamese New Year, and Filipino festivals such as
    Sinulog, while also participating in the broader Pacific Northwest community. Her family’s emphasis on respect for elders, communal meals, and hospitality informs her compassionate and cooperative nature.
    She maintains strong ties to the local Asian‑American community in Seattle and Pierce County, attending cultural events, language classes, and supporting fellow immigrants. This rich cultural tapestry
    blends collectivist values with the American emphasis on individual achievement, shaping her worldview and professional ethos.
attributes:
  skills: '["Strategic sourcing", "Vendor negotiation", "Cost analysis", "Inventory management", "Supply chain optimization", "Contract management", "ERP systems (SAP, Oracle)", "Advanced Excel", "Market
