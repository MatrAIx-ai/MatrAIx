  hobbies: '["Visiting local art galleries", "Sketching and watercolor painting", "Cooking traditional Vietnamese and Filipino dishes", "Hiking in the Cascade foothills", "Practicing yoga and mindfulness
    meditation", "Volunteering at community food bank", "Reading contemporary fiction and philosophy", "Participating in small book clubs", "Exploring sustainable living and upcycling projects", "Traveling
    to Southeast Asia to connect with cultural roots"]'
  career_goals: Hanh aims to advance into a senior procurement or supply chain management role where she can lead a team and champion sustainable, ethically sourced products. She plans to obtain CPSM certification
    and deepen her expertise in integrating design thinking into procurement, aspiring to work for a company that values creativity and community impact. Long‑term, she envisions establishing a boutique
    procurement consultancy that supports small businesses and artisans, especially those from Southeast Asian backgrounds, while maintaining a balanced lifestyle that prioritizes family and personal well‑being.
