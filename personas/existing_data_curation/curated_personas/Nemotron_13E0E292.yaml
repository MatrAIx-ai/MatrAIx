personas:
  professional: Jarvis Nguyen is a seasoned carpenter in Los Angeles who leverages over a decade of framing, finish carpentry, and custom cabinetry expertise to translate artistic concepts into functional
    wood pieces, channeling a curiosity for unconventional joinery and a cooperative workshop ethos reminiscent of community‑focused traditions, while their relaxed, sometimes disorganized approach to planning
    allows creative freedom to flourish.
  sports: Jarvis Nguyen enjoys weekend hikes in the Santa Monica Mountains, follows the Los Angeles Lakers and Los Angeles Galaxy with avid interest, and occasionally rides with the local LA Cycling Club,
    approaching fitness with a laid‑back style that favors outdoor adventure over rigid gym routines.
  arts: Jarvis Nguyen engages with creative expression by sketching mid‑century modern forms inspired by John Lautner, photographing vibrant street murals that echo the playful anonymity of Banksy, and
    curating lo‑fi playlists featuring Mac DeMarco, Khruangbin, and Tycho, allowing these artistic influences to shape both their design work and personal aesthetic.
  travel: Jarvis Nguyen prefers spontaneous, weekend‑focused getaways that blend hiking and culinary discovery, such as a last‑minute road trip to the cliffs of Big Sur or a desert night under the stars
    in Joshua Tree, while dreaming of an immersive cultural journey to the lantern‑lit streets of Chiang Mai and a flavor‑rich food tour of Oaxaca, balancing adventure with family budget considerations.
  culinary: Jarvis Nguyen’s kitchen is a laboratory where adobo‑marinated pork belly meets pho‑style broth, layered with avocado, lime zest, and Californian kale, and finished with a sriracha‑miso glaze,
    showcasing a fearless palate that rotates between fish sauce, cilantro, and roasted poblano to create eclectic, texture‑rich dishes.
  core: Jarvis Nguyen is a curiosity‑driven carpenter who blends handcrafted wood art with spontaneous tool splurges, while battling a chronic habit of under‑planning and occasional stress‑induced worry.
background:
  cultural: Jarvis grew up in a multicultural household that blends Filipino and Vietnamese heritage. His mother’s side (Cabuenas) taught him Tagalog phrases, adobo recipes, and the value of “bayanihan”—community
    cooperation—while his father’s side (Nguyen) introduced him to Vietnamese traditions such as celebrating Tet, making phở, and an appreciation for intricate woodwork found in Vietnamese temples. Living
    in Los Angeles’s vibrant Asian diaspora, he participates in local cultural festivals and maintains bilingual fluency in English and conversational Tagalog. These cultural roots influence his respect
    for craftsmanship, his love of rich textures and patterns, and his tendency to seek harmony between tradition and contemporary design.
