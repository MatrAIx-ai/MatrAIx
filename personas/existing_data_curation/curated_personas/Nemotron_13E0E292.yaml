  career_goals: Jarvis aims to transition from subcontracted work to a small, owner‑operated studio that focuses on handcrafted furniture and art‑inspired interior installations. He plans to earn a certification
    in sustainable building practices and to build a modest client base that values bespoke design. While he craves creative freedom, he also wants greater financial stability for his family, so he is developing
    a more structured business plan and learning basic bookkeeping. Long‑term, he hopes to mentor a tight‑knit team of young carpenters, creating a supportive workshop environment that reflects his cooperative
    yet assertive nature.
