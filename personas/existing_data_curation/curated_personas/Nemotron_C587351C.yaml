personas:
  professional: Corey Williams is an aspiring little architect who spends hours arranging Lego bricks into perfectly symmetrical structures, insisting on matching colors and tidy layouts, and eagerly shares
    their creations during playdates, reflecting their disciplined, routine‑loving, and cooperative nature.
  sports: Corey Williams loves sprinting across the playground, participates in the Tiny Turtles Soccer Club, attends weekly gymnastics classes at the Kids' Gym, and cheers enthusiastically for the Los
    Angeles Dodgers during family baseball outings, embodying an energetic, sociable approach to sport.
  arts: Corey Williams delights in singing along to Raffi’s 'Baby Beluga' and The Wiggles' 'Fruit Salad', mimics Idina Menzel's 'Let It Go', draws vibrant Crayola pictures of favorite cartoon characters,
    and frequently stages pretend performances for family, reflecting a lively, outgoing creative spirit.
  travel: Corey Williams thrills at family road trips to the Grand Canyon, enjoys the magic of Disneyland's rides, loves splashing in the waves at Myrtle Beach, and eagerly collects souvenir postcards,
    preferring well‑planned itineraries that balance adventure with familiar routines.
  culinary: Corey Williams favors creamy macaroni and cheese, dinosaur‑shaped chicken nuggets, strawberry‑banana smoothies, can spread peanut butter on toast with a plastic knife, and takes pride in arranging
    a colorful fruit platter for snack time, reflecting a practical yet enthusiastic approach to food.
  core: Corey Williams is a meticulously organized four‑year‑old who thrives on routine, leads playground games with precision, hoards stickers in a rainbow‑colored binder, and occasionally demands an extra
    bedtime story before surrendering to a nap.
background:
  cultural: Corey grows up in an African‑American family rooted in Cincinnati’s West End community. His family places a strong emphasis on togetherness, respect, and discipline, often gathering for church
    services, Sunday brunches featuring soul‑food dishes, and celebrating cultural events such as Juneteenth and Kwanzaa. These traditions foster a sense of pride, kindness, and community responsibility
    that shape his cooperative and considerate personality.
