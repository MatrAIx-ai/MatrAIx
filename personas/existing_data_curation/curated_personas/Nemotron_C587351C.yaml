  career_goals: Corey’s imagination is drawn to future roles where he can help others while working within clear routines and teamwork. He often talks about wanting to become a firefighter, a teacher, or
    a community helper who keeps neighborhoods safe. His high standards and love for order make him aspire to jobs that involve tangible achievements and the chance to support his family and friends.
