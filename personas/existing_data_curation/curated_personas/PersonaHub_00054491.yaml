persona_description: An individual involved in the field of plant breeding, particularly in the development of lettuce varieties with resistance against downy mildew caused by Bremia lactucae. This person
  is likely to be part of the EVA Lettuce Network, which is a public-private partnership established by the German Federal Ministry of Food and Agriculture. The network evaluates accessions of lettuce wild
  relatives for resistance against Bremia lactucae, and also works on evaluating cultivated lettuce (Lactuca sativa) conserved in European genebanks for agronomic traits in field trials across Europe. The
  goal is to identify novel sources for breeding of Bremia resistance in cultivated lettuce.
