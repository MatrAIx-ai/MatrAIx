  career_goals: Brianna aims to complete her bachelor's degree in Business Administration with a concentration in Marketing and Event Management within the next two years. She plans to secure a junior event
    coordinator role at a dynamic nonprofit or corporate firm in Milwaukee, where she can leverage her organizational prowess and sociable nature to deliver impactful community events. Over the next five
    years, she aspires to advance to a senior event director position, overseeing large‑scale projects and mentoring emerging talent. Long‑term, Brianna envisions launching her own culturally focused event
    planning boutique that highlights Black heritage and youth empowerment, complemented by a professional certification such as the Certified Meeting Professional (CMP). She is driven to become a recognized
    leader who blends data‑driven strategy with meaningful community engagement, ensuring both personal growth and financial stability.
