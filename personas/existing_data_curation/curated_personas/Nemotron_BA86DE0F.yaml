personas:
  professional: Brianna Mckee, a 19‑year‑old Business Administration student concentrating on Marketing and Event Management, combines their methodical planning expertise with a flair for public speaking
    to orchestrate campus events, draft data‑rich reports in Excel, manage social‑media campaigns, and negotiate vendor contracts, all while applying a competitive edge and a relentless attention to timelines
    in pursuit of a junior event coordinator role.
  sports: Brianna Mckee, a 19‑year‑old avid runner who logs weekly 5K mileage with the Milwaukee Run Club, they cheer for the Milwaukee Bucks, attend Milwaukee Brewers games on summer evenings, follow the
    Marquette Golden Eagles during the college season, and channel their competitive spirit into winning the campus Settlers of Catan league, balancing team loyalty with personal fitness goals.
  arts: Brianna Mckee, a 19‑year‑old hip‑hop dancer who refines routines to the beats of Kendrick Lamar and Missy Elliott, they deliver slam poetry inspired by Saeed Jones at open‑mic nights, hone improv
    skills through Second City's online workshops, curate playlists featuring Anderson .Paak and Lauryn Hill, and document creative sparks in a sketch‑journal, merging performance with visual expression.
  travel: Brianna Mckee, a 19‑year‑old who designs travel itineraries with the same precision as their event plans, they spend weekend getaways exploring Chicago’s comedy clubs, hiking the Wisconsin Dells,
    and soaking in New Orleans’ spoken‑word scene, while budgeting for a future solo backpacking adventure across European capitals such as Berlin, Barcelona, and Budapest.
  culinary: Brianna Mckee, a 19‑year‑old who confidently cooks collard greens with smoked turkey, sweet‑potato pie, and spicy jambalaya for family gatherings, they experiment with heirloom hot sauces and
    freshly ground spices, enjoy sourcing ingredients at local farmers’ markets, yet admit to late‑night cravings for chicken‑and‑waffle deliveries after intense rehearsal sessions.
  core: Brianna Mckee, a 19‑year‑old meticulously organized event‑planning student with a high‑energy hip‑hop and poetry side, they turn anxiety into journaled insights, mix competitive board‑game strategy
    with community‑focused leadership, and balance soulful cooking with occasional impulse fashion buys.
background:
  cultural: Brianna is rooted in a vibrant African‑American heritage that traces back to her grandparents' migration from the Deep South during the Great Migration, settling in Milwaukee's historic Bronzeville
    neighborhood. Her family maintains strong ties to the local church, where she participates in gospel choirs and community outreach. Growing up, she attended Juneteenth celebrations, Black History Month
    events at the Wisconsin Black Historical Society, and regularly visited the Milwaukee Public Museum’s African‑American exhibits. These experiences have instilled in her a deep appreciation for Black
    artistic expression, musical traditions, and social justice activism. She is attuned to the challenges faced by Milwaukee's Black community, which informs her competitive drive to succeed and her desire
    to give back through culturally relevant events and youth mentorship initiatives.
