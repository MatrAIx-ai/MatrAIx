  hobbies: '[''Cooking Guatemalan dishes'', ''Listening to Latin music'', ''Attending church services'', ''Playing community soccer'', ''Volunteering for immigrant support'', ''Fishing'', ''Walking along
    the Providence waterfront'', ''Reading historical fiction'', ''Assembling model airplanes'', ''Hiking in state parks'']'
  career_goals: Ryan aims to advance to a shift supervisor position within the next two years, where he can apply his organizational strengths to staff scheduling and training. He plans to enroll in a retail
    management certification program at a local community college to pave the way toward a store manager role. Alongside his career progression, he hopes to launch a weekend side business selling traditional
    Guatemalan foods at local farmers' markets, balancing his desire for stability with an entrepreneurial venture that honors his cultural heritage.
