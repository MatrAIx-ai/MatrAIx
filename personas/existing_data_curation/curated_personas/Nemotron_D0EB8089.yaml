  hobbies: '[''Watercolor painting'', ''Sketching landscapes'', ''Photographing historic buildings'', ''Reading art history'', ''Woodworking'', ''Gardening'', ''Chess'', ''Historical society volunteering'',
    ''Listening to blues music'', ''Cooking Southern cuisine'']'
  career_goals: Approaching the later stage of his career, Chad aims to transition from full‑time practice to a mentorship and consultancy role, guiding younger architects in integrating cultural heritage
    and sustainability. He aspires to lead a community‑wide historic preservation project in Carroll County, securing funding to restore a landmark building and repurpose it as a public arts venue. Additionally,
    he hopes to author a monograph on Southern vernacular architecture and to achieve LEED‑Gold certification for at least two local projects before retirement.
