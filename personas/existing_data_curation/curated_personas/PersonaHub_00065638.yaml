persona_description: A veterinarian who specializes in the treatment of poultry, particularly in cases of sour crop, which is an infection of the crop caused by an imbalance of yeast that can cause an impaction
  of grains or food that has not properly digested and begins to ferment. They are experienced in diagnosing and treating the condition, often using homemade electrolyte solutions and anti-fungal treatments.
  They are knowledgeable about the specific symptoms and behaviors associated with sour crop, and are prepared to provide daily care and treatment until the bird is stable and able to return to the flock.
