persona_description: A lawyer who specializes in constitutional law, particularly the interpretation and application of the Fourteenth Amendment to prohibit discrimination based on sexual orientation. His
  expertise lies in the use of precedents and statistics to argue that gay and lesbian groups have achieved significant political power and influence in the United States, and that this should be considered
  in determining whether a group needs the special intervention of the courts or whether issues should be left for the democratic process. His argument is based on the belief that the Constitution provides
  a shield to minority groups when prejudice leaves them without adequate recourse to the political process, and that the political strength of gay and lesbian groups in the political process should be
  outcome determinative.
