personas:
  professional: Miguel Armas, a seasoned small‑scale farmer and handyman, leverages decades of hands‑on problem‑solving to run a community workshop series on gardening, basic carpentry, and traditional
    cooking at the local senior center, and they balance their love of routine with occasional spontaneous improvisations.
  sports: Miguel Armas stays active by strolling the historic San Germán plaza and joining the town’s senior walking club, while cheering on the Indios de Mayagüez baseball team each spring, and they occasionally
    enjoy community‑organized pickleball sessions at the local park.
  arts: Miguel Armas finds inspiration in the rhythmic bomba of Rafael Cepeda and the soulful plena of Ismael Rivera on their vintage radio, while losing themselves in historical novels by Luis Rafael Sánchez
    and sketching the colonial facades of San Germán’s churches, and they occasionally dabble in watercolor to capture the town’s pastel hues.
  travel: Miguel Armas prefers low‑key, well‑planned trips, often taking day‑long drives to nearby towns like Ponce for historic tours, while dreaming of a leisurely cultural cruise to Barcelona to explore
    Gaudí’s architecture and revisit the warmth of Mediterranean plazas, and they cherish the quiet excitement of planning each journey.
  culinary: Miguel Armas, an accomplished home chef, effortlessly combines plantain, sofrito, and adobo in classic arroz con gandules, experimenting with subtle soy sauce and ginger for a gentle Chinese‑fusion
    twist, and they relish sharing these dishes at family gatherings over fresh cilantro and ripe mango.
  core: Miguel Armas is a gentle, routine‑loving gardener who secretly hoards extra plantain leaves for midnight snacks, battles occasional anxiety with breathwork, and they find joy humming bomba tunes
    while fixing a squeaky chair.
background:
  cultural: 'Miguel was born and raised in San German, a municipality in the western part of Puerto Rico known for its colonial plaza, vibrant festivals, and strong Catholic traditions. His family reflects
    the island’s multicultural tapestry: his paternal line includes Chinese immigrants who arrived in the early 20th century, contributing subtle culinary influences to the household, while his maternal
    heritage is rooted in the island’s Spanish and Afro‑Caribbean lineage. Growing up, he absorbed the values of family solidarity, respect for elders, and community harmony that characterize Puerto Rican
    culture. The rhythms of bomba and plena, the flavors of arroz con gandules, plantains, and the community’s emphasis on mutual assistance have shaped his identity and daily life.'
attributes:
  skills: '[''Small‑scale agriculture (vegetable gardening, fruit‑tree pruning, composting)'', ''Basic carpentry and furniture repair'', ''Maintenance of small engines and household equipment'', ''Traditional
    Puerto Rican cooking'', ''Empathetic listening and informal mediation'', ''Household budgeting and record‑keeping'']'
  hobbies: '[''Backyard gardening (plantains, tomatoes, herbs)'', ''Listening to and humming bomba and plena music'', ''Traditional cooking and occasional Chinese‑Puerto Rican fusion experiments'', ''Walking
    historic plaza and local cafés'', ''Playing dominoes with a small group of friends'', ''Reading Puerto Rican historical novels'', ''Sketching colonial architecture'', ''Practicing breathing exercises
    and mindfulness'']'
  career_goals: Miguel aims to channel his practical knowledge into community mentorship, offering informal workshops on gardening, basic repairs, and traditional cooking at the local senior center. He
    hopes to create a structured yet adaptable program that meets the needs of younger neighbors while allowing flexibility for spontaneous learning. He also seeks to strengthen his role as an emotional
    support for his wife and extended family by practicing stress‑reduction techniques and pursuing counseling to better manage his anxiety. Ultimately, he wishes to preserve and pass on his cultural heritage—family
    recipes, gardening practices, and stories of San German—to his grandchildren.
