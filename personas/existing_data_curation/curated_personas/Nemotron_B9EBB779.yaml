personas:
  professional: Kimberly Haralson, a veteran humanities educator with a knack for interdisciplinary curriculum design, uses spontaneous lesson adaptations and one‑on‑one mentorship to foster critical inquiry,
    while her reserved demeanor ensures thoughtful dialogue even as she occasionally battles deadline pressure.
  sports: Kimberly Haralson, a dedicated bird‑watcher and desert hiker, participates in the Desert Trails Club for early‑morning treks, follows the Phoenix Suns and Arizona Cardinals from a senior‑friendly
    seat, and occasionally plays casual pickleball at the community center to stay limber.
  arts: Kimberly Haralson regularly visits the Phoenix Art Museum to study works by Georgia O'Keeffe and Jackson Pollock, paints watercolors of desert landscapes inspired by Ansel Adams, and finds solace
    reading Mary Oliver’s poems while listening to Joan Baez’s folk ballads.
  travel: Kimberly Haralson prefers meticulously planned road trips to Sedona, the Grand Canyon, and the Baja Peninsula, while also dreaming of a spring pilgrimage to Kyoto’s historic temples, balancing
    her love of desert solitude with occasional cultural immersion abroad.
  culinary: Kimberly Haralson enjoys moderate cooking, often preparing enchiladas with nopales, cilantro‑lime rice, and rosemary‑infused lamb, while sipping sage‑and‑oregano tea brewed from garden herbs,
    and delights in experimenting with cactus fruit marmalade.
  core: Kimberly Haralson blends scholarly curiosity with desert‑plant patience, mentors with quiet intensity, splurges on poetry books despite a tight budget, and occasionally forgets deadlines while nurturing
    succulents.
background:
  cultural: Kimberly identifies with mainstream Midwestern American culture, raised in a small town in Iowa before relocating to Arizona in her thirties. Her upbringing emphasized self‑reliance, community
    service, and appreciation for the arts, values that continue to shape her worldview. She participates in a non‑denominational community church and celebrates traditional American holidays, while also
    embracing the multicultural influences of the Southwest through local festivals, cuisine, and the diverse student population she serves.
attributes:
  skills: '["Curriculum Development", "Interdisciplinary Teaching", "Student Mentorship", "Historical Research", "Digital Literacy", "Small Group Facilitation", "Adaptability", "Collaborative Project Management",
    "Creative Writing", "Community Outreach"]'
  hobbies: '["Reading Classic Literature", "Poetry Writing", "Watercolor Painting", "Desert Gardening", "Bird Watching", "Visiting Art Galleries", "Museum Docent Volunteering", "Small Book Club Participation",
    "Exploring Historical Sites"]'
  career_goals: Kimberly aims to transition into a mentorship‑focused role, developing interdisciplinary humanities workshops for adult learners and fellow educators in the Phoenix metro area. She plans
    to author a book that blends personal memoir with pedagogical reflections on teaching literature and history, and hopes to secure a part‑time adjunct position that offers flexibility while allowing
    her to shape curricula. Long‑term, she envisions serving on the local school board or a community‑college advisory committee to influence humanities education policy, while preparing for a gradual retirement
    that still includes occasional guest lecturing.
