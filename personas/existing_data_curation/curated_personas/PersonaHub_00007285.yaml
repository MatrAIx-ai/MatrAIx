persona_description: A school leader or teacher who is interested in enhancing the learning experience of students in a digital age, particularly in the use of deep learning techniques and the development
  of inquisitive, creative, and effective learners. The individual is likely to be familiar with the Science of Learning Research Centre at The University of Queensland and the K-12 Education Leadership
  Series, and has a desire to adopt and implement powerful teaching techniques that foster deep learning. The persona is interested in understanding the neurological theory behind how students learn, study,
  and remember in a digital age and is looking for a course that will enable them to develop a layered and nuanced understanding of deep learning from a psychological, neurological, and educational perspective.
  The individual is interested in real classroom examples of teachers facilitating and students engaging in deep learning, with outcomes aimed at providing authentic learning activities to assist students
  to become independent thinkers, innovative creators, and effective communicators.
