    task coordination'']'
  hobbies: '[''Pickup basketball'', ''Listening to R&B, gospel, and hip‑hop'', ''Fishing'', ''Gardening'', ''Southern cooking'', ''Reading self‑improvement books'', ''Watching college football'']'
  career_goals: Andre is determined to enhance his professional credentials by earning a Certified Nursing Assistant (CNA) certification within the next year, followed by enrollment in a practical nursing
    program. He aspires to move into a lead‑home health aide position where he can mentor newer staff and shape patient‑care protocols. In the longer term, he hopes to open his own home‑health agency that
    emphasizes consistent scheduling, clear procedures, and a supportive environment for both clients and caregivers.
