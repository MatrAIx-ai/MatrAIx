  career_goals: Cuong aims to leave a lasting legacy by publishing a memoir‑cookbook that weaves his Vietnamese heritage with the diverse flavors of Southern California. He plans to open a boutique culinary
    studio where he can mentor emerging chefs—especially those from immigrant backgrounds—and teach sustainable cooking practices. He also hopes to partner with local artists for pop‑up dining events that
    fuse visual art and cuisine, and to implement a kitchen‑wide composting program to reduce waste.
