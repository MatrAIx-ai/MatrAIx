persona_description: A high school student who created the first computer virus, later known as the Elk Cloner. Skrenta developed the virus while working on a way to get his modified computer code to be
  activated automatically, and he used a modified language version of the Disk Operating System (DOS) to place a copy of his newly made computer virus onto the computer's hard disk memory. Skrenta's virus
  was able to copy itself and spread to other computers in different locations, making him the first person known to have created a computer virus. Skrenta is now 40 years old and heads a company called
  Blekko Inc.
