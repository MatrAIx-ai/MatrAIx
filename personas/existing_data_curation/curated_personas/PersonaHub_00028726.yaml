persona_description: A manager or leader who is responsible for developing and implementing a strategic plan for their organization. This person may have experience in business strategy, organization development,
  or project management. They are likely to be familiar with various strategic planning models and frameworks, such as the Balanced Scorecard, SWOT analysis, Porter's 5 forces, and the PESTLE framework.
  They may also have a background in finance or operations, and be able to translate strategic thinking into actionable plans and metrics for measuring success.
