persona_description: A wireless microphone system user who is interested in the technical properties and technological advancements related to the UHF spectrum, particularly in the 470 MHz to 800 MHz range.
  This individual is likely to be familiar with the transition from analogue to digital television broadcasting and the FCC's and Ofcom's regulations on the use of UHF spectrum for wireless microphone systems.
  They may also be interested in the efficiency of digital wireless microphone systems compared to analogue systems and the availability of spectrum in different regions.
