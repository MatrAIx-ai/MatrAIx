persona_description: A geologist who specializes in the study of volcanic landscapes, particularly in the analysis of hydrologic evolution and the role of volcanic architecture, climate-driven processes,
  and water-rock interactions in shaping landscape topography. Their research interests include the use of conceptual models to explain the evolution of young volcanic landscapes, as well as the identification
  and interpretation of hydrologic chronosequences in volcanic landscapes. They are particularly interested in the effects of explosive volcanic activity on landscape evolution, the role of groundwater
  perching in volcanic landscapes, and the interaction between hydrology and topography in volcanic environments. They have experience in using examples from the High Cascades, Galapagos, and elsewhere
  to illustrate the trajectories and timescales of hydrologic evolution.
