  hobbies: '[''Co‑ed softball league'', ''Community theater'', ''Design workshops at local library'', ''Historical neighborhood photography'', ''Gardening'', ''Italian cooking'', ''Bicycle riding along
    Hudson River trail'', ''Weekend camping trips with family'', ''Visiting art museums'', ''Woodworking'']'
  career_goals: George aims to transition from senior designer to design director within the next three years, overseeing a small team that delivers cohesive visual solutions for local businesses in Westchester.
    He plans to open his own boutique design studio focused on heritage branding and sustainable packaging for family‑owned enterprises, while also mentoring junior designers. He is committed to building
    long‑term client relationships and establishing a reputation for reliable, practical design that balances aesthetic appeal with functional performance.
