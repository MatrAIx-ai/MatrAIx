  skills: '[''Graphic Design'', ''Brand Identity Development'', ''Typography'', ''Layout and Print Production'', ''Adobe Photoshop'', ''Adobe Illustrator'', ''Adobe InDesign'', ''UI/UX Design'', ''Figma'',
