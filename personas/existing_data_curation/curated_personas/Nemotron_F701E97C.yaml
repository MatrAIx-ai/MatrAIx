personas:
  professional: Candice Axon is an aspiring junior illustrator who spends afternoons turning blank sketchbooks into kaleidoscopic worlds, meticulously planning each page with the same disciplined focus
    she applies to her Lego constructions, and they dream of one day illustrating their own picture books about space‑faring kittens.
  sports: Candice Axon is a lively participant in the Brookside Kids Soccer Club, proudly wearing the red jersey while cheering on the Seattle Mariners during family game nights, and they spend weekends
    splashing around in the local community pool’s mini‑learn-to‑swim class, relishing the feeling of coordinated movement after quiet sketching sessions.
  arts: Candice Axon dazzles classmates by recreating Dr. Seuss’s whimsical creatures with bold strokes reminiscent of Henri Matisse’s cut‑out palette, and when they sit at the toy keyboard they splash
    out simple melodies from Disney’s ‘Moana’ soundtrack, blending visual and auditory art in ways that keep their imagination humming.
  travel: Candice Axon has explored the towering redwoods of California’s Evergreen State Park, marveled at the glittering lights of Disney World in Florida, and they daydream of visiting the Eiffel Tower
    in Paris and the Great Barrier Reef in Australia, always packing a small sketchbook to capture new scenery on the go.
  culinary: Candice Axon loves twirling spaghetti with a bright tomato‑basil sauce, munching on crunchy carrot sticks dipped in hummus, and experimenting with banana‑pancake batter topped with fresh strawberries,
    often insisting on helping stir the batter with a glitter‑sprinkled spoon.
  core: Candice Axon blends meticulous organization with boundless curiosity, turning every doodle, puzzle, and nature walk into a disciplined adventure while occasionally hoarding crayons and chasing the
    perfect shade.
background:
  cultural: Candice is raised in a middle‑class, predominantly White American family in Norman, Oklahoma. Her upbringing reflects typical Mid‑Southern cultural values, including participation in community
    events such as school performances, local fairs, and holiday celebrations like Thanksgiving and Fourth of July. Her family attends a local church and values kindness, cooperation, and respect for others,
    while also exposing her to diverse ideas through school curricula and library programs.
