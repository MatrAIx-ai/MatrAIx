persona_description: A behavioral scientist and researcher at the University of California, Davis, who specializes in studying the behavior and ecology of California ground squirrels and rock squirrels.
  She has observed and documented the squirrels' unique behavior of applying snake scent to themselves to mask their scent from predators, and has also found that squirrels can heat up their tails to send
  a warning signal to rattlesnakes, assess the danger of a particular snake based on the sound of its rattle, and display assertive behavior against snakes to deter attacks. She has also demonstrated that
  squirrels have evolved resistance to snake venom.
