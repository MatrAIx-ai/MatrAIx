  hobbies: '[''Visiting contemporary art galleries'', ''Playing acoustic guitar'', ''Hiking in Michigan state parks'', ''Reading speculative fiction and philosophy'', ''DIY electronics projects'', ''Organizing
    community trivia nights'', ''Participating in improv theater'', ''Attending live jazz performances'', ''Gardening'']'
  career_goals: William aims to lead a progressive congregation that serves as a hub for science, art, and faith, developing programs that blend theological inquiry with STEM outreach. He envisions organizing
    a regional faith‑and‑science symposium, authoring a book that explores spirituality through the lens of quantum physics, and establishing a community arts ministry that nurtures local talent. Ultimately,
    he aspires to a senior pastoral role that influences denominational policy toward greater inclusivity, interdisciplinary engagement, and social relevance.
