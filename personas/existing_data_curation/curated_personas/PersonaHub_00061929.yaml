persona_description: A businessman who is interested in reducing energy waste and generating heat and power together through waste heat-to-power technology. This individual is familiar with the concept
  of waste heat-to-power technology and has seen its use in NASA's space program. They are aware of the resolution commending Baltimore Gas and Electric Co. for their efforts to meet Maryland's energy efficiency
  targets by offering incentives for combined heat and power units. This individual is also aware of the efficiency and cost drawbacks of thermoelectric generators, but is willing to invest in them for
  the long haul to generate recycled electricity for years to come.
