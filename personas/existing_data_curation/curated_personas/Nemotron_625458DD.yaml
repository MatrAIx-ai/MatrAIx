personas:
  professional: Donnie Edwards is a detail-oriented humanities graduate who leverages their research, project management, and grant-writing skills to coordinate community-focused cultural preservation programs,
    weaving rigorous historical analysis into engaging public history initiatives.
  sports: Donnie Edwards hits the Blue Ridge foothills on weekend hikes, follows the Charlotte Hornets for basketball, roots for the Carolina Panthers during football season, and keeps their mind sharp
    with weekly chess matches at the local community center.
  arts: Donnie Edwards immerses themselves in jazz legends like Miles Davis and blues icons such as B.B. King while capturing the quiet elegance of historic neighborhoods through monochrome photography
    reminiscent of Walker Evans, and channels those influences into creative writing for their blog.
  travel: Donnie Edwards prefers purposeful travel, often planning trips to archival hotspots such as Charleston's historic district, the National Archives in Washington, D.C., and, on a dream itinerary,
    a research-focused pilgrimage to the British Library in London, balancing limited vacation days with a desire to enrich their oral-history work.
  culinary: Donnie Edwards enjoys cooking soulful Southern dishes like crisp fried catfish, buttery collard greens seasoned with smoked turkey, and sweet potato pie, experimenting with heirloom cornmeal
    for hush-puppies while meticulously documenting each recipe in a handwritten journal.
  core: Donnie Edwards is a methodical, curiosity-driven historian who balances solitary research with community-oriented projects, budget-conscious living, and a quiet love for jazz, photography, and Southern
    cooking, and they approach each endeavor with disciplined patience.
background:
  cultural: Donnie is an African‑American from the Charlotte metropolitan area, born to parents whose families migrated from the rural South during the Great Migration and later settled in Cabarrus County.
    His upbringing combined the traditions of Southern Black churches, community festivals such as Juneteenth and the Charlotte Black History Month celebrations, and a strong emphasis on education and family
    cohesion. He maintains close ties to local cultural institutions like the Levine Museum of the New South and the Carolina Folk Heritage Museum, where he volunteers on occasional projects. This background
    informs his appreciation for the resilience and creativity of Black communities in the South, and shapes his desire to preserve and share that heritage for future generations.
attributes:
  skills: '["Historical research", "Critical analysis", "Expository writing", "Public speaking", "Project management", "Event coordination", "Community outreach", "Digital archiving", "Grant writing", "Budget
