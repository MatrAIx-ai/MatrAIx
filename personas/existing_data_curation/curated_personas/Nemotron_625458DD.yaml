  hobbies: '["Reading historical non-fiction", "Creative writing", "Photography", "Genealogy research", "Cooking Southern and African American cuisine", "Chess", "Hiking local trails", "Volunteer tutoring",
    "Listening to jazz and blues", "DIY home improvement"]'
  career_goals: Looking to re-enter the workforce, Donnie aims to leverage his humanities background into a role that blends cultural preservation with community engagement. Over the next three years, he
    plans to complete a master’s program in public history or library and information science, after which he hopes to secure a position as a program coordinator at a local museum or cultural center in
    Charlotte. His long‑term ambition is to develop and lead oral‑history projects that document the experiences of African‑American families in Cabarrus County, and eventually to establish a nonprofit
    dedicated to preserving and sharing that heritage. He also aspires to author a collection of essays reflecting on the intersection of Southern Black history and contemporary life.
