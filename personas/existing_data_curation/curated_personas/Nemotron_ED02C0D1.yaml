personas:
  professional: Alex Carlson, a senior program director in New York City’s social service sector, blends two decades of frontline social work with a STEM‑based skill set in statistical analysis, GIS mapping,
    and evidence‑based intervention design, channeling their disciplined organization and competitive drive into building data‑driven mental‑health platforms that deliver measurable outcomes.
  sports: Alex Carlson, who favors structured solo fitness, runs three times a week with the New York Road Runners, follows the New York Knicks and New York Rangers with data‑driven enthusiasm, and joins
    a competitive summer intramural tennis league at a Queens club, treating each workout as a metric for stress reduction.
  arts: Alex Carlson, a regular visitor to MoMA, immerses themselves in abstract expressionist works, listens to minimalist compositions by Philip Glass and classic jazz by Miles Davis while cooking, and
    seeks inspiration from indie films directed by the Coen brothers, allowing artistic nuance to inform their data visualizations.
  travel: Alex Carlson meticulously plans trips using spreadsheet itineraries, favoring a mix of cultural immersion and low‑key relaxation, having explored historic Edinburgh, the zen gardens of Kyoto,
    and policy conferences in Washington, D.C., and now aspires to witness Reykjavik’s aurora borealis and trek Patagonia’s glaciers within a modest budget.
  culinary: Alex Carlson, an exacting home chef, experiments with sous‑vide salmon glazed in miso, perfects mushroom risotto with foraged chanterelles, and delves into molecular gastronomy using agar‑agar
    and spherification kits, though occasional over‑spicing reveals a restless quest for novel flavors.
  core: Alex Carlson merges a data‑driven, competitively disciplined mindset with a deep commitment to social justice, channeling meticulous organization into impactful mental‑health initiatives while battling
    intense anxiety that fuels both relentless productivity and impulsive coffee splurges.
background:
  cultural: Alex grew up in a middle‑class white American family in the Northeast, where academic achievement and self‑reliance were emphasized. His upbringing combined traditional New England pragmatism
    with exposure to progressive social values through his university experience. Relocating to New York City broadened his worldview, immersing him in a multicultural environment that reinforced his commitment
    to social justice while retaining his rational, evidence‑based approach. He identifies as secular, drawing cultural influences from both his Mid‑Atlantic roots and the diverse, activist‑oriented community
    of urban social work.
attributes:
