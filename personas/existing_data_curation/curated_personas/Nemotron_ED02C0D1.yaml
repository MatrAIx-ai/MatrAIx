  hobbies: '[''Chess'', ''Sudoku'', ''Reading scientific non‑fiction'', ''Social‑policy research'', ''Personal data‑visualization projects'', ''Mindfulness meditation'', ''Journaling'', ''Walking in Central
    Park'', ''Experimental cooking'']'
  career_goals: Alex aims to become a senior program director or policy innovator within New York City’s social service sector, leading a flagship evidence‑based mental‑health initiative that demonstrably
    reduces homelessness and improves client outcomes. He seeks to secure major grant funding to develop a tech‑enabled platform that integrates predictive analytics with real‑time case management. Over
    the next five years, he plans to publish research articles bridging STEM methodologies and social work practice, earn a doctoral degree in social work, and be recognized as a thought leader who sets
    new standards for data‑informed service delivery.
