personas:
  professional: Hannah Rozell, a 22‑year‑old aspiring residential service technician, blends their hands‑on technical expertise in appliance, HVAC, and electrical repair with a calm, structured approach
    to customer interactions, while their relaxed attitude toward obligations lets them improvise creative solutions on the job.
  sports: Hannah Rozell follows the Miami Dolphins and Orlando Magic while hitting the trails with the Suncoast Hiking Association, joins a weekend adult softball league in the summer, and treats fitness
    as a flexible routine that fits between home‑improvement projects and campus volunteer shifts.
  arts: Hannah Rozell unwinds with mystery novels by Agatha Christie, streams southern blues legends like B.B. King, attends occasional performances at the Orlando Museum of Art, and even sketches DIY furniture
    designs, letting creative expression color their practical mindset.
  travel: Hannah Rozell favors budget-friendly road trips to Florida’s state parks like Everglades National Park, dreams of hiking Iceland’s geothermal trails, and plans vacations around seasonal work windows,
    mixing adventure with a love for local comfort food stops.
  culinary: Hannah Rozell, an avid home chef, perfects Southern comfort dishes such as shrimp‑and‑grits, fried chicken with buttermilk brine, and collard greens seasoned with smoked paprika, often using
    fresh herbs from their garden to elevate simple meals.
  core: Hannah Rozell, a pragmatic DIY enthusiast who can troubleshoot a refrigerator while humming a southern gospel tune, often forgets to water their herbs on rainy days but never skips a podcast episode
    on the latest trade tech.
background:
  cultural: Hannah was raised in the Tallahassee area of Florida, growing up in a middle‑class white family with deep Southern roots. Her upbringing emphasized community, hospitality, and a strong work
    ethic, values that were reinforced by participation in local events, family gatherings, and occasional church activities. The university town atmosphere exposed her to diverse perspectives, fostering
    an appreciation for inclusivity while still cherishing traditional Southern customs such as a love for home‑cooked meals and outdoor recreation. This blend of Southern cultural heritage and modern,
    community‑focused values shapes her cooperative and considerate personality.
attributes:
  skills: '[''Residential appliance installation and service'', ''Basic electrical wiring and troubleshooting'', ''HVAC system basics and EPA 608 refrigerant handling'', ''Plumbing repair and pipe fitting'',
    ''Minor carpentry and fixture installation'', ''Interpretation of technical schematics and blueprints'', ''Hand and power tool operation'', ''OSHA safety compliance'', ''Preventive maintenance planning
    and documentation'', ''Work order software proficiency'', ''Customer service and communication'', ''Team collaboration and mentorship'']'
  hobbies: '[''Gardening'', ''DIY home improvement projects'', ''Hiking'', ''Cooking'', ''Listening to technology and trade podcasts'', ''Community clean‑up volunteering'', ''Casual video gaming'', ''Reading
    mystery novels'']'
  career_goals: Hannah aims to deepen her technical expertise and move into a certified journeyman role within the next three years. She plans to earn the EPA 608 certification for refrigerant handling
    and complete a state‑licensed HVAC or electrical apprenticeship. Her short‑term goal is to become a lead technician or maintenance supervisor for a large property‑management firm or the facilities department
    at Florida State University, where she can mentor newer workers and streamline preventive‑maintenance programs. Long‑term, Hannah hopes to launch her own residential service business focused on energy‑efficient
    home upgrades, combining her practical skills with a commitment to sustainable practices.
