  career_goals: Approaching retirement, Jose aims to transition into a part‑time consultancy where he can apply his curiosity for emerging sustainable technologies without the pressure of large‑scale deadlines.
    He aspires to mentor the next generation of engineers in Kansas City, develop a guide on low‑impact infrastructure design, and become a recognized speaker at regional engineering conferences. Ultimately,
    he hopes to leave a legacy of resilient, community‑focused projects that reflect both his Mexican heritage and Midwestern values.
