personas:
  professional: Gilma Diaz is a bilingual facilities cleaning specialist who leverages her fluency in Spanish and English, OSHA safety expertise, and knack for turning routine cleaning into eco‑friendly
    operations, while her outgoing nature makes her the de‑facto morale officer on the crew, even as her tendency toward loose planning sometimes leads to last‑minute supply runs.
  sports: Gilma Diaz is a fan of the Houston Astros and Houston Rockets, joins the local women’s running club for weekend 5K runs, and participates in a community salsa dance group that doubles as a low‑impact
    cardio class, balancing her love for team spirit with her preference for social, lively exercise.
  arts: Gilma Diaz enjoys listening to the soulful ballads of Luis Miguel and the vibrant beats of Bad Bunny, frequents live performances by local mariachi ensembles, and is a regular at the Miller Outdoor
    Theatre where she watches shows featuring performers like Lin‑Manuel Miranda, feeding her love for music and theatrical storytelling.
  travel: Gilma Diaz dreams of a weekend getaway to Austin’s food‑truck scene, has already explored San Antonio’s River Walk and a family‑rooted trip to the historic city of Guanajuato, and hopes to someday
    wander the lantern‑lit streets of Kyoto for its blend of tradition and modernity.
  culinary: Gilma Diaz excels at making tender tamales filled with pork and chilies and simmering hearty pozole with hominy and fresh cilantro, frequently experiments with a Texas‑style brisket‑taco fusion,
    and loves to pair her meals with avocado‑lime salsa and roasted corn on the cob.
  core: Gilma Diaz is a socially magnetic, eco‑conscious cleaning professional who channels her anxiety into creative cooking and community volunteering, while her relaxed approach to schedules sometimes
    leaves her scrambling for supplies at the last minute.
background:
  cultural: Gilma grew up in Houston as a first‑generation Mexican‑American, raised by parents who emigrated from the state of Jalisco. Her household blends Mexican traditions—such as celebrating Día de
    los Muertos, sharing family meals centered around corn‑based dishes, and speaking Spanish at home—with the multicultural rhythm of Houston. She participates in local Mexican cultural organizations,
    attends community events along the Avenida Houston corridor, and maintains strong ties to an extended family that values collectivism, respect, and mutual support. Her Catholic upbringing influences
    her observance of religious holidays, while her daily life reflects the bilingual, bicultural identity common among Mexicans in Texas. This cultural foundation informs her warmth, hospitality, and dedication
    to fostering harmony in both personal and professional settings.
attributes:
  skills: '[''Commercial cleaning and sanitation'', ''Industrial cleaning equipment operation'', ''Green cleaning techniques'', ''Bilingual communication (Spanish/English)'', ''Customer service'', ''Inventory
    management'', ''OSHA safety compliance'', ''Basic plumbing and electrical troubleshooting'', ''Team coordination and staff training'', ''Conflict resolution'']'
  hobbies: '[''Salsa dancing and community dance classes'', ''Cooking Mexican cuisine and experimenting with fusion dishes'', ''Karaoke and Latin music listening'', ''Socializing at block parties and neighborhood
    events'', ''Journaling for emotional regulation'', ''Gentle yoga and aromatherapy'', ''Volunteering at cultural festivals (Cinco de Mayo, Día de los Muertos)'', ''Attending green cleaning workshops'',
    ''Exploring Houston’s food markets and festivals'']'
  career_goals: Gilma aims to move from front‑line cleaning work to a supervisory position within facilities management. She plans to complete her associate degree in Business Administration or Hospitality
    Management, earn certifications such as Certified Professional Cleaner (CPC) and an OSHA 30‑hour safety course, and deepen her expertise in sustainable, green facility operations. In the medium term,
    she hopes to become a facilities supervisor overseeing a team of cleaners, where she can apply her empathy and leadership to create a supportive, harmonious workplace. Long‑term, Gilma dreams of launching
    her own small eco‑friendly cleaning business that serves residential and commercial clients across Houston. She also seeks a work environment that prioritizes employee well‑being, allowing her to continue
    mentoring new staff while developing personal coping strategies to manage her anxiety and emotional reactivity.
