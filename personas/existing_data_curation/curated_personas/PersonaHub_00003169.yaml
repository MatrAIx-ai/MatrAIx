persona_description: A technologist who is deeply concerned about the potential consequences of censorship on the Internet and its impact on technological innovation. They are particularly concerned about
  the potential for these bills to cause entire domains to vanish from the web, not just infringing pages or files. They are also concerned about the potential for these bills to create an environment of
  tremendous fear and uncertainty for technological innovation, and that they will risk fragmenting the Internet's global domain name system (DNS) and have other capricious technical consequences. They
  are also concerned about the potential for these bills to cause engineers who build Internet systems or offer services that are not readily and automatically compliant with censorship actions by the US
  Government to be targeted.
