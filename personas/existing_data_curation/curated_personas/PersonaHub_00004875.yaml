persona_description: A professional in the field of environmental radiochemistry, specifically in the laboratory of the Kansas Department of Health and Environment, who is responsible for conducting radioanalytical
  testing of public drinking water samples and providing radioanalytical support for monitoring Wolf Creek Nuclear Power Generating Station. This persona is skilled in the use of instrumentation and methodology
  to perform radiochemical analyses, and is experienced in the development of rapid radiochemical methods for analyzing environmental emergency and radio-bioassay samples. They are also familiar with the
  Environmental Radiation Ambient Monitoring System (ERAMS) and the Food Emergency Response Network (FERN) programs, and have participated in past FEMA graded exercises to test their ability to properly
  receive, prepare, and analyze nuclear emergency samples.
