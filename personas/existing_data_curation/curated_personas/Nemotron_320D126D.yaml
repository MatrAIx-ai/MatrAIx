personas:
  professional: Jonathan Deminico, a two‑year‑old with a keen eye for order, transforms playtime into a miniature construction firm by carefully sorting and stacking colorful wooden blocks into precise
    patterns, guiding peers in the sandbox as a self‑appointed foreman and delighting in the predictable outcomes of his tiny architectural plans.
  sports: Jonathan Deminico, pumped with boundless energy, captains his daycare’s little‑league soccer matches, emulating the moves of the New York Red Bulls during play, and proudly wears a tiny jersey
    of the local YMCA 'Little Sprinters' club, always insisting on clear rules before the game begins.
  arts: Jonathan Deminico, a bright‑eyed explorer of sound and color, repeats the catchy chorus of Disney’s ‘Let It Go’ alongside the upbeat numbers of The Wiggles, showers his playroom walls with crayon
    sketches of dinosaurs and rockets, and eagerly joins preschool sing‑along sessions that fuel his vivid imagination.
  travel: Jonathan Deminico, thriving on meticulously planned outings, delights in weekend trips to the nearby aquarium where he watches sea turtles glide through the touch‑pool, and eagerly counts down
    to the family vacation at Disney World, savoring the predictable schedule of character meet‑and‑greet sessions and parade times.
  culinary: Jonathan Deminico, a picky yet adventurous eater, prefers buttery toast with strawberry jam, devours bite‑sized roasted sweet potato cubes, enjoys small meatball morsels, and—even though broccoli
    often meets resistance—brightens up breakfast by helping stir pancake batter with a plastic whisk.
  core: Jonathan Deminico, a two‑year‑old with a calm, competitive streak, thrives on routine, leads playtime with energetic organization, and quietly masters the balance between predictability and spontaneous
    fun.
background:
  cultural: 'Jonathan grows up in a middle‑class, suburban family in Riverside, California. His household reflects mainstream American cultural practices: weekend outings to the local park, picnics along
    the Santa Ana River, and participation in community events such as the Riverside Festival of Arts. The city’s diverse population provides him with exposure to a variety of languages and cuisines, though
    his immediate family primarily observes traditions common among many white American families, such as celebrating Thanksgiving with a turkey dinner and decorating the house for Christmas. The warm climate
    encourages outdoor play year‑round, shaping his love for playgrounds, bike rides, and nature walks.'
