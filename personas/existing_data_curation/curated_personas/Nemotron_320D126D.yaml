  hobbies: '["Building block towers","Group playdates at local park","Riding tricycle","Dancing to cartoon music","Exploring Riverside riverbank","Collecting toy fire trucks","Listening to children''s songs"]'
  career_goals: Although only two, Jonathan already shows budding aspirations. He frequently points to fire trucks and says he wants to "help people" when he grows up, indicating an early interest in firefighting.
    His love for stacking blocks and arranging them in neat rows fuels a nascent desire to become an architect or builder. He also enjoys singing the theme songs of his favorite cartoons and sometimes imagines
    performing on stage, hinting at a possible future in music or performance. His competitive streak makes him aim to be "the fastest" at running races in the playground, reflecting a drive to excel in
    physical activities.
