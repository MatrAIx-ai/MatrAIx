personas:
  professional: Antonio Robinson is a seasoned master woodworker and cabinetmaker whose meticulous project budgeting, expert joinery, and methodical client communication reflect they are structured, reliable,
    and competitive, and who is now channeling that precision into launching a reclaimed‑wood furniture storefront in Louisville while mentoring aspiring apprentices.
  sports: Antonio Robinson follows the Louisville Bats baseball team and the Kentucky Wildcats basketball program, participates in a local adult softball league on weekends, and balances leisure with a
    disciplined fitness routine of early morning walks along the Ohio River, reflecting their competitive yet structured approach to staying active.
  arts: Antonio Robinson finds solace in the blues of B.B. King, the improvisations of Miles Davis, and the gospel hymns of Mahalia Jackson, frequently attending intimate church music sessions and the Actors
    Theatre of Louisville productions, letting the rhythm of these performances inspire the cadence of their woodworking designs.
  travel: Antonio Robinson prefers meticulously planned road trips to culturally rich destinations such as the Mississippi Delta’s blues trail, Asheville’s mountain craft fairs, and New Orleans’ jazz districts,
    but balances these journeys with the financial realities of expanding their business, often opting for weekend stays at nearby cabins that double as fishing retreats.
  culinary: Antonio Robinson enjoys mastering Southern BBQ, regularly smoking pork shoulder with a cedar finish, perfecting a dry rub for Memphis‑style ribs, and pairing the meat with collard greens and
    cornbread, while their modest cooking skill level is elevated by a love for experimenting with wood‑infused flavors from their workshop.
  core: Antonio Robinson blends a disciplined, competitive spirit with a quiet love for handcrafted art, often found fiddling with a new joinery technique while humming a blues riff and meticulously tracking
    every expense.
background:
  cultural: Antonio grew up in Louisville's historically Black neighborhoods, where church, family, and community traditions forged his values of self‑reliance and craftsmanship. He carries forward Southern
    African‑American cultural practices, including gospel music, storytelling, and a strong emphasis on resilience in the face of socioeconomic challenges. The city's rich blues heritage and local culinary
    customs influence his leisure activities, while his pride in his heritage fuels his ambition to mentor the next generation of Black woodworkers and contribute to the cultural fabric of his community.
attributes:
  skills: '[''Custom furniture design'', ''Cabinetmaking'', ''Advanced joinery'', ''Wood restoration'', ''Tool maintenance'', ''Blueprint reading'', ''Project budgeting'', ''Inventory management'', ''Client
