  hobbies: '[''Personal woodworking projects'', ''Furniture restoration'', ''Fishing'', ''Listening to blues, jazz, and gospel music'', ''Church community events'', ''Southern BBQ cooking'', ''Reading African
    American history'', ''Chess'']'
  career_goals: Antonio aims to expand his workshop into a small storefront that showcases his reclaimed‑wood furniture line, targeting boutique hotels and local restaurants in Louisville. He plans to hire
    and mentor apprentices, especially aspiring Black woodworkers, to build a sustainable team. Over the next five years, he hopes to achieve a steady increase in revenue that secures his family's financial
    future, obtain certifications in sustainable woodworking practices, and become recognized regionally for his craftsmanship while establishing a retirement fund for long‑term stability.
