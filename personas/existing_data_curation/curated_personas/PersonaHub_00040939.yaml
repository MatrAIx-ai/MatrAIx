persona_description: A marine biologist and scientist who specializes in coral health and disease, specifically focusing on the effects of ocean acidification on coral reefs and the potential for coral
  to adapt to these changes. She is part of a team of researchers at Mote Marine Laboratory studying resilient species of coral that may be better suited to survive in an increasingly acidic environment.
  Her work is crucial for understanding the impacts of ocean acidification on coral reefs and developing strategies to protect and conserve these important ecosystems.
