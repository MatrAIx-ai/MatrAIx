  career_goals: Michael dreams of a career that merges his love for technology, creativity, and helping others. He aims to study computer science or environmental science in high school and beyond, eventually
    working as a developer of educational video games or interactive tools that teach kids about nature and sustainability. He also hopes to volunteer in community tech workshops, using his skills to mentor
    younger students and contribute to local environmental projects.
