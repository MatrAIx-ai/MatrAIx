personas:
  professional: Michael Yates is a budding technologist who spends his afternoons constructing elaborate redstone circuits in Minecraft and experimenting with Arduino robotics kits, channeling their love
    for structure into meticulously planned builds while the occasional deadline slip reveals their laid‑back, flexible attitude toward obligations.
  sports: Michael Yates practices forward midfield with the Orlando City SC Academy Junior soccer team, swims laps with the Florida Sharks Swim Club, roots for Inter Miami CF in MLS and the Miami Dolphins
    in the NFL, and applies their observant birdwatching patience to reading the game and maintaining endurance during workouts.
  arts: 'Michael Yates devours graphic novels such as ‘The Sandman’, ‘Saga’, and ‘Batman: The Killing Joke’, reads the ‘Dog Man’ series aloud to younger library patrons, admires the storytelling of Neil
    Gaiman and the art of Jim Lee, and often combines their love for pixel art with listening to chiptune soundtracks from classic games like Super Mario Bros.'
  travel: Michael Yates spends weekends trekking the trails of Wekiwa Springs State Park, kayaking on Lake Eola, and birdwatching at the Audubon Center, while dreaming of a family road trip to Yellowstone
    National Park and a future summer camp adventure in the Adirondacks, balancing their love for nature with the practical need for parental permission and school schedules.
  culinary: Michael Yates favors pepperoni pizza, chicken nuggets with honey‑mustard dipping sauce, and homemade peanut butter banana smoothies, can whip up a crispy grilled cheese with sharp cheddar and
    tomato soup, but often skips breakfast in favor of sugary cereal, reflecting their occasional disorganization when it comes to regular meals.
  core: Michael Yates blends a meticulous, structure‑driven approach to Minecraft engineering with a relaxed, cooperative attitude toward school and friends, turning their love for detail into collaborative
    library storytelling sessions and improvised robotics projects.
background:
  cultural: Michael grew up in a predominantly white, middle‑class neighborhood in Lakeland, Florida. His family values community, hospitality, and outdoor recreation, reflecting the laid‑back Southern
    influence of Polk County. He celebrates traditional holidays like Thanksgiving and Fourth of July with family barbecues and local fireworks. Exposure to Florida's abundant lakes and wildlife has fostered
    his interest in nature and conservation. While his upbringing includes typical American pop‑culture influences—movies, video games, and sports—his parents encourage academic curiosity and participation
    in community service, shaping his cooperative and harmony‑seeking personality.
