  career_goals: Angelita aims to complete her GED within the next year and leverage her strong interpersonal skills to secure a role as a community health worker or a certified nursing assistant, where
    she can combine her practical mindset with her desire to help others. She dreams of eventually opening a small family‑run café that showcases traditional Spanish dishes, providing a gathering place
    for her neighborhood. In the long term, she envisions mentoring younger teens in her community, using her experience to guide them toward educational and professional success.
