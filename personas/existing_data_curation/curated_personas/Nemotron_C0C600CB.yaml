  career_goals: Mario aims to advance from Purchasing Manager to Director of Procurement within the next five years, eventually positioning himself for a Chief Supply Chain Officer role. He plans to champion
    sustainability initiatives that cut procurement carbon footprints by 30% and integrate AI‑driven spend analytics across the organization. To support his trajectory, he is pursuing a Certified Professional
    in Supply Management (CPSM) certification and enrolling in an executive MBA with a focus on operations strategy. He also aspires to mentor emerging procurement talent and promote greater supplier diversity,
    especially for Latino‑owned businesses.
