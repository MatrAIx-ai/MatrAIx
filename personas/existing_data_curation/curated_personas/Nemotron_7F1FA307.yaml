personas:
  professional: Nicole Cooper is a budding soccer team captain at the Lakeland Raiders youth club, demonstrating leadership and teamwork while juggling school projects and Girl Scout badge activities, and
    they channel their practical, energetic nature into organizing practices and encouraging teammates.
  sports: Nicole Cooper plays on the Lakeland Raiders soccer team, cheers for the Orlando City SC MLS club and the Florida Gators women's soccer program, and they spend afternoons swimming with the Lakeland
    Aquatics Club, favoring pool laps over open water, while also enjoying weekend bike rides along Lake Hancock Trail.
  arts: Nicole Cooper draws colorful wildlife scenes inspired by National Geographic Kids and the illustrations of Shaun Tan, listens to upbeat hip‑hop tracks by artists such as BTS and Ariana Grande while
    practicing dance moves from the weekly hip‑hop class, and they love attending local art fairs at the Lakeland Civic Center during the Florida Citrus Festival.
  travel: Nicole Cooper has visited the Walt Disney World Resort in Orlando and the Kennedy Space Center on family trips, dreams of exploring the Everglades on a guided airboat tour, and they enjoy planning
    future adventures to Tokyo Disneyland and the Grand Canyon, balancing their love for theme parks with a curiosity about natural wonders.
  culinary: Nicole Cooper prefers classic kid‑friendly dishes like cheesy macaroni, chicken nuggets, and citrus‑infused fruit smoothies made with orange juice and fresh strawberries, often helping her mom
    slice ripe Florida oranges for a snack, and they enjoy experimenting with building LEGO‑shaped pancakes on Saturday mornings.
  core: Nicole Cooper is an energetic, structure‑loving seven‑year‑old who blends soccer leadership with creative doodles, a love for hip‑hop dance, and a habit of stashing allowance coins into a chaotic
    but colorful savings system.
background:
  cultural: 'Nicole comes from a middle‑class white family living in Lakeland, Florida. Her upbringing reflects typical Central Florida suburban life: frequent participation in school and community events,
    outdoor activities like swimming and biking, and family traditions that celebrate holidays such as Independence Day, Thanksgiving, and local festivals like the Florida Citrus Festival. Her parents emphasize
    education, friendliness, and community involvement, encouraging her to join school clubs, sports leagues, and service groups like Girl Scouts, which shape her social outlook and values.'
attributes:
  skills: '[''reading fluently (second‑grade level)'', ''basic addition and subtraction'', ''drawing and coloring'', ''bicycle riding'', ''independent swimming'', ''digital literacy with educational apps'',
    ''group game coordination'', ''memorizing short songs and poems'']'
  hobbies: '[''soccer'', ''swimming'', ''dance class'', ''drawing and painting'', ''LEGO building'', ''reading adventure books'', ''Minecraft'', ''Girl Scouts'']'
  career_goals: Nicole dreams of a future where she can help others and work with things she loves. She often says she wants to become a teacher because she enjoys sharing stories and helping friends learn,
    and she also imagines being a veterinarian to care for animals. Occasionally she talks about exploring outer space as an astronaut or studying marine life as a biologist, reflecting her curiosity about
    the world. In the short term, her goals are to win her school’s spelling bee, learn to play a simple piece on the piano, and become a team captain on her soccer squad.
