persona_description: A physicist or engineer who specializes in electrostatics and capacitors, particularly in the study of capacitance and its applications in real-world scenarios. This person is familiar
  with the traditional construction of capacitors as long strips of tinfoil and wax paper and is comfortable with the concept of capacitance as a measure of the ability of an object to store charge. They
  are interested in understanding how the capacitance of a free object changes when the surfaces of the plates are not parallel and how this affects the charge on the object. They are also interested in
  the practical implications of these calculations in real-world applications, such as the measurement of capacitance of a VanDegraff generator with a spherical top.
