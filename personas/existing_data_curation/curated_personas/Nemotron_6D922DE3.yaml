  hobbies: '[''Home Cooking (Southeast Asian cuisine)'', ''Herb Gardening'', ''Hiking'', ''Reading (technology, philosophy, culinary science)'', ''Chess'', ''Podcast Listening (food tech, entrepreneurship,
