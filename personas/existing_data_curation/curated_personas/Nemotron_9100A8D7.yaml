    research'']'
  career_goals: Randy aims to advance from first‑line supervisor to precinct captain and eventually deputy chief within the Steele County Sheriff's Office. He envisions creating a dedicated data‑analytics
    unit that uses his business expertise to allocate resources more efficiently and reduce crime hotspots. He also seeks to complete a master's degree in public administration to deepen his policy knowledge
    and to attend the FBI National Academy for advanced leadership training. A personal goal is to mentor a new generation of officers, especially those interested in integrating technology with community‑focused
    policing, while maintaining a flexible schedule that allows quality time with his family.
