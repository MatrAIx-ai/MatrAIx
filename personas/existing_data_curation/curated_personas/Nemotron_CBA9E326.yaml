personas:
  professional: Pang Bernal is a traffic safety specialist who combines STEM‑driven curiosity with practical engineering to conduct rapid on‑site risk assessments, maintain flagger equipment, and design
    data‑backed pedestrian crossing improvements, while their reserved yet assertive demeanor ensures clear communication with motorists and diverse road users alike.
  sports: Pang Bernal cycles with the Fort Lauderdale Beach Cyclists, follows the Miami Dolphins and Miami Heat, joins monthly snorkeling outings with the South Florida Reef Club, and participates in a
    community 5K run for road safety, balancing solitary workouts with occasional team‑sport viewings.
  arts: Pang Bernal enjoys the rhythmic sounds of Buena Vista Social Club and the ambient electronica of Bonobo, reads Wired and MIT Technology Review for inspiration, attends performances at the Broward
    Center for the Performing Arts, and collects street‑art photographs from Wynwood, finding creative release in precise yet expressive musical and visual experiences.
  travel: Pang Bernal plans meticulous weekend trips to the Florida Keys and the Bahamas for snorkeling, has explored Havana and New York for culture and tech conferences, and dreams of hiking Patagonia
    and wandering Barcelona’s architecture, balancing budget constraints with a desire for both adventure and relaxation.
  culinary: Pang Bernal cooks traditional Cuban dishes like Ropa Vieja, Arroz Congri, and Tostones for family gatherings, using fresh plantains, mojo sauce, pork shoulder, and citrus from their urban garden,
    while occasionally experimenting with sous‑vide techniques and savoring the occasional sushi night.
  core: Pang Bernal blends curiosity‑driven tinkering, practical safety expertise, and a quiet love for Cuban flavors, all while occasionally staying up late on Arduino projects and forgetting to take out
    the trash.
background:
  cultural: Born to Cuban immigrant parents, Pang grew up in a bilingual household where Spanish was spoken at home and English in school. He celebrates Cuban cultural traditions such as Carnival de la
    Florida, enjoys Afro‑Cuban music and salsa dancing in intimate family settings, and maintains strong family ties rooted in Catholic practices. The vibrant Cuban community in South Florida influences
    his culinary preferences, festive celebrations, and his commitment to giving back through community safety initiatives.
attributes:
  skills: '[''Traffic Safety Management'', ''Risk Assessment'', ''First Aid & CPR'', ''Bilingual Communication (English/Spanish)'', ''Basic Engineering Principles'', ''Data Entry and Reporting'', ''Conflict
