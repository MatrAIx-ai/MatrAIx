  hobbies: '[''DIY Electronics'', ''Reading Science & Technology Magazines'', ''Chess'', ''Cooking Cuban Cuisine'', ''Urban Gardening'', ''Cycling'', ''Snorkeling'', ''Community Safety Volunteering'']'
  career_goals: Pang aims to obtain the Professional Traffic Operations Engineer (PTOE) certification within the next three years and transition into a supervisory role within the Broward County Department
    of Transportation. He envisions leading a team of flaggers and safety educators, developing community outreach programs on road safety, and eventually founding a consulting firm that offers data‑driven
    traffic safety solutions for municipalities and private developers.
