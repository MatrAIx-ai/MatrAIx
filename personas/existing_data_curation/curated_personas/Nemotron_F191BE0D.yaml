  hobbies: '[''Watercolor and Acrylic Painting'', ''Knitting and Crocheting'', ''Visiting Art Galleries and Museums'', ''Community Theater Attendance and Participation'', ''Reading Contemporary Fiction'',
    ''Cooking Southern Cuisine'', ''Gardening'', ''Volunteering at Church Food Pantry'', ''Hosting Dinner Parties'', ''Listening to Podcasts on Psychology and Creativity'']'
  career_goals: Sybil aims to transition her passion for community service into a part‑time role that leverages her organizational talent and compassion, such as a volunteer coordinator at a local nonprofit
    or community arts center. Over the next two years she plans to complete an online certificate in nonprofit management and gain experience in grant writing. Long‑term, she hopes to lead a community outreach
    program that uses arts‑based activities to support seniors and at‑risk families. Parallel to this, she envisions launching a small home‑based boutique offering handcrafted décor, merging her artistic
    interests with entrepreneurship while maintaining flexibility for her family.
