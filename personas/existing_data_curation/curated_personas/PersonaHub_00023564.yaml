persona_description: A researcher at the ATLAS collaboration, specifically interested in the search for new forces beyond the Standard Model, particularly in the context of the LHC data. This persona is
  knowledgeable in particle physics, specifically the study of particle interactions and their detection using detectors like the ATLAS detector. They have a keen interest in the search for new bosons and
  the interpretation of their decay products to determine the mass of the boson. They are also interested in the study of heavy resonances decaying to a photon and a hadronically decaying Z/W/H boson, which
  is a unique aspect of the ATLAS measurement.
