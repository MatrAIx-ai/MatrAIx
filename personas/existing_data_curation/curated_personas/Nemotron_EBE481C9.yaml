personas:
  professional: A forward‑thinking design professional, Dnea Moody channels expertise in the Adobe Creative Suite, UI/UX research, and typographic precision into brand identity work that marries data‑driven
    iteration with experimental visual concepts, while their disciplined project management keeps creative risk in check.
  sports: An outdoor‑oriented athlete, Dnea Moody tackles the rugged trails of Wisconsin’s Ice Age Trail in the summer, joins a local climbing club that meets at a Milwaukee gym, follows the Milwaukee Brewers
    and the Green Bay Packers avidly, and balances an otherwise sedentary design career with seasonal snowshoeing and occasional pickup basketball at a community center.
  arts: A dedicated gallery‑hopper, Dnea Moody frequents the Milwaukee Art Museum and the Walker Art Center, curates a personal collection of vintage design magazines, practices analog photography of rural
    landscapes, and draws inspiration from contemporary artists such as James Turrell, Olafur Eliasson, and graphic designer Stefan Sagmeister, while their evening chess sessions echo a strategic appreciation
    for visual composition.
  travel: Meticulously organized, Dnea Moody maps out road‑trip itineraries that weave through Midwestern art festivals, has already explored Chicago’s Design Week, the historic streets of Prague for its
    Bauhaus legacy, and dreams of a winter immersion in Reykjavik’s design scene, balancing budget constraints with a quest for immersive creative experiences.
  culinary: An experimental home cook, Dnea Moody enjoys crafting artisanal cheese dishes such as smoked cheddar mac & cheese and goat‑cheese crostini with rosemary, frequently incorporates locally sourced
    Wisconsin cheddar and fresh herbs into meals, and while their cooking skills hover between adept and amateur, they sometimes order takeout after late‑night design sessions.
  core: Creative strategist Dnea Moody fuses disciplined project management with an insatiable curiosity for avant‑garde design, all while juggling a penchant for vintage magazine hoarding, occasional coffee‑induced
    insomnia, and a relentless drive to out‑design the competition.
background:
  cultural: Dnea grew up in Cedarburg, a small town in Ozaukee County with strong German‑American heritage. His upbringing emphasized Midwestern values of reliability, modesty, and community involvement,
    while also exposing him to local traditions like cheese making, craft brewing, and seasonal festivals. Though raised in a fairly traditional setting, his education in humanities and his career in graphic
    design have broadened his cultural outlook, allowing him to blend pragmatic work ethics with an appreciation for avant‑garde art and global design trends.
attributes:
