  hobbies: '[''Visiting contemporary art galleries'', ''Analog photography'', ''Reading design theory and philosophy'', ''Hiking local trails'', ''Playing chess'', ''Exploring indie video games'', ''Collecting
    vintage design magazines'', ''Watercolor sketching'', ''Attending intimate live music events'', ''Experimenting with artisanal cooking'']'
  career_goals: Dnea aims to transition from tactical design work to strategic creative leadership, targeting a senior art director role within a forward‑thinking agency or launching his own boutique studio
    that blends graphic design with emerging technologies such as AR and interactive media. He is driven to win national design awards, build a distinctive portfolio recognized for unconventional concepts,
    and mentor junior designers while maintaining a balanced lifestyle with his spouse in Cedarburg.
