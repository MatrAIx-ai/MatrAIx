  career_goals: Lana seeks to build a stable, long‑term career within the financial sector, aiming to move from her current clerk position to a senior accounting or supervisory role within the next five
    years. She plans to complete a bachelor’s degree in accounting part‑time and earn the Certified Bookkeeper (CB) credential to deepen her technical knowledge. Her ambition includes leading a small team
    of clerical staff, streamlining the office’s financial processes, and eventually contributing to budgeting and financial planning for the local municipality or a regional credit union. Lana values job
    security and the opportunity to mentor newer employees, reflecting her commitment to reliability and harmony in the workplace.
