personas:
  professional: Lana Brettin, a meticulous accounting clerk at a regional credit union, leverages QuickBooks and advanced Excel macros to streamline accounts payable, while eyeing a senior accounting role
    where they can mentor a small team and design efficient budgeting processes.
  sports: Lana Brettin spends most weekends trekking solo along the driftless area’s forest trails, proudly roots for the Green Bay Packers and the Milwaukee Brewers, and volunteers with the local Trailkeepers
    Club, where they help maintain signage and map routes for fellow hikers.
  arts: Lana Brettin immerses in 19th‑century Midwestern historical fiction—favoring authors like Sarah Addison Allen and Susan Vreeland—while channeling that narrative love into cross‑stitch patterns inspired
    by folk artist Aaron Burris and quilting evenings listening to Bon Iver and John Prine, where they find calm precision.
  travel: Lana Brettin prefers self‑planned, low‑stress trips, having explored the rolling hills of Door County and the vibrant streets of New York City, they now dream of a quiet week in the Icelandic
    highlands to photograph basalt formations, but family obligations keep most vacations within the Upper Midwest's accessible lakes and state parks.
  culinary: Lana Brettin cultivates a modest vegetable garden producing heirloom carrots, purple beets, and kale, which they incorporate into a meticulously timed sourdough loaf, often adding a swirl of
    caramelized onions and rosemary for flavor, and they take pride in mastering the precise hydration ratios and proofing schedules required for perfect crust.
  core: Lana Brettin is a calm, detail‑driven planner who transforms structure into thriving garden rows, error‑free ledgers, and solitary hikes, while they occasionally succumb to the irresistible pull
    of rare seed collections.
background:
  cultural: Lana grew up in Blair, a small town in Trempealeau County, Wisconsin, in a family of German‑Scandinavian heritage common to the region. Raised in a modest, middle‑class household, she attended
    the local public schools and participated in church activities at the town’s Lutheran congregation. The Midwestern values of hard work, modesty, and community service shaped her worldview. Her family’s
    roots in agriculture and small‑business ownership instilled a practical, no‑nonsense approach to life, while her upbringing in a predominantly white, rural community reinforced a strong sense of local
    identity and appreciation for seasonal rhythms.
