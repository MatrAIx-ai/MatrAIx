personas:
  professional: Suresh Soto, a 24‑year‑old aspiring digital‑media assistant, blends nascent Photoshop and Canva skills with a fluent command of Spanish and English to craft inclusive promotional graphics
    for a local cultural center while juggling volunteer art‑workshop coordination.
  sports: Suresh Soto enjoys hiking the trails of Griffith Park, occasionally joins pickup basketball games at a community center, cheers for the LA Lakers and LA Galaxy, and participates in the Los Angeles
    Hiking Club's monthly weekend treks.
  arts: Suresh Soto roams the murals of Downtown LA, drawing inspiration from Shepard Fairey’s street graphics and Frida Kahlo’s vivid storytelling, captures the city’s color palette through photography
    and quick sketches, and volunteers to lead youth art workshops at a community center.
  travel: Suresh Soto frequently escapes to Joshua Tree for sunrise hikes, has taken weekend road trips to Santa Barbara, dreams of exploring Oaxaca’s culinary markets, and prefers low‑cost, culturally
    immersive travel experiences over luxury resorts.
  culinary: Suresh Soto’s modest kitchen whips up homemade tamales with masa harina, slow‑cooked pozole brimming with hominy and pork, and festive chiles en nogada garnished with roasted poblano peppers
    and walnut‑pomegranate sauce, showcasing a budding yet authentic Mexican culinary flair.
  core: Suresh Soto is a curious, compassionate 24‑year‑old who blends artistic spontaneity with community‑driven purpose, yet often lets disorganization and occasional anxiety color their day‑to‑day rhythm.
background:
  cultural: Suresh grew up in a Mexican‑American household in East Los Angeles, where Spanish was spoken at home and English at school. Family traditions such as Día de los Muertos celebrations, gathering
    around homemade tamales, and listening to mariachi and regional Mexican music have instilled a deep appreciation for his roots. At the same time, the multicultural environment of Los Angeles exposed
    him to a broad spectrum of artistic expressions—from Chicano mural art to contemporary installations—shaping his open‑minded and eclectic taste. He identifies strongly with the values of community solidarity
    and mutual support that are central to many Latino neighborhoods, which fuels his desire to give back through volunteer work. This blend of cultural pride, bilingual fluency, and urban diversity informs
    his worldview and creative outlook.
attributes:
  skills: '[''Bilingual Spanish-English communication'', ''Basic graphic design (Photoshop, Canva)'', ''Photo and video editing for social media'', ''Street photography and sketching'', ''Visual storytelling'',
