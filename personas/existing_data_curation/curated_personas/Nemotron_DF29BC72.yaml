  hobbies: '[''Street mural exploration and photography'', ''Sketching and drawing in cafés'', ''Visiting galleries and museums'', ''Cooking Mexican cuisine'', ''Salsa and bachata dancing'', ''Volunteering
    for art workshops at community centers'', ''Hiking in Griffith Park'', ''Watching indie films and art documentaries'', ''Listening to podcasts about art and culture'', ''Playing narrative-driven video
    games'']'
  career_goals: Motivated by his love for art and his commitment to community, Suresh aims to build a career that merges creativity with social impact. He plans to enroll in a community‑college program
    in graphic design or cultural communications while continuing to volunteer with nonprofit arts groups. In the short term, he hopes to secure a digital‑media assistant role at a cultural center, creating
    promotional materials that celebrate Latino heritage. Over the longer term, he envisions becoming a community‑arts coordinator or outreach manager, designing inclusive programs that give young people
    in Los Angeles access to artistic experiences and mentorship. He also dreams of launching a modest online platform where he shares Mexican recipes, cultural stories, and visual art to foster cross‑cultural
    dialogue.
