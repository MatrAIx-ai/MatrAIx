  hobbies: '[''Scale model building'', ''Woodworking'', ''Vegetable gardening'', ''Reading practical non-fiction'', ''Hiking'', ''Fishing'', ''Strategy board games'', ''Puzzles'']'
  career_goals: Selestino aims to re-enter the workforce in a role that values reliability and structure, such as logistics or warehouse supervision, where his organizational talent and practical skills
    can be applied. He plans to obtain a forklift‑operator certification and complete a short‑term certificate in supply‑chain management at a community college. Long‑term, he hopes to launch a small handyman
    service that offers routine maintenance for neighbors, providing a stable income while allowing him to stay close to family. He also wishes to take on a leadership position within his local community
    center, coordinating volunteer programs and family‑oriented events.
