persona_description: A UK-based team of engineers and chemists working on a project to develop a microwave-based system that can generate supercritical water, a high-pressure, high-temperature form of water
  that can be used to dissolve hazardous organic materials. The team aims to unlock further applications for supercritical fluids and is looking into using the technology for defense and chemical warfare
  applications, as well as in organic chemistry labs. The project is a significant step into the unknown, and the team is planning to have a prototype device ready by the end of next year.
