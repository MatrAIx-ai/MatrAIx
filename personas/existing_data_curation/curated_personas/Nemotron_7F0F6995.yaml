personas:
  professional: Thamar Poteat, a seasoned metal fabricator with advanced mechanical assembly and blueprint interpretation skills, channels a methodical, organized mindset and a relentless curiosity for
    new welding and CNC techniques into meticulous workflow improvements, while their innate skepticism drives them to double‑check every process as they aim for a lead supervisor position.
  sports: Thamar Poteat jogs the C&O Canal trail three times a week, trains with the DC Road Runners club for local 5K races, and supports the Washington Capitals, Wizards, and DC United, while their competitive
    streak compels them to log every mile and aim for personal bests each season.
  arts: Thamar Poteat frequents DC art galleries showcasing contemporary artists such as Banksy, Georgia O'Keeffe, and James Turrell, sketches metal sculpture concepts between visits, and unwinds listening
    to jazz legends Miles Davis and John Coltrane, allowing their curiosity and organized mind to blend visual and auditory inspiration.
  travel: Thamar Poteat prefers meticulously planned weekend getaways to Shenandoah National Park and historic Annapolis, while also dreaming of an immersive study tour of Japan’s precision machining workshops,
    balancing a modest travel budget with a yearning for cultural adventure.
  culinary: Thamar Poteat experiments in the kitchen with fusion dishes like spiced lamb tagine paired with citrus‑infused quinoa and roasted cauliflower with harissa, wielding coriander, smoked paprika,
    and pomegranate molasses to create bold flavors that echo their family’s culinary heritage.
  core: Thamar Poteat fuses exacting metal craftsmanship with an inquisitive, slightly skeptical outlook, channeling a disciplined yet stress‑prone nature into art, finance, and health while occasionally
    succumbing to caffeine‑fueled over‑analysis.
background:
  cultural: Thamar’s cultural background as a Black woman raised in the Washington, D.C., metropolitan area has shaped her identity and worldview. Growing up in a community with deep African American roots,
    she was exposed to the city’s rich history of civil rights activism, music, and visual arts, which fostered her appreciation for creative expression. Family gatherings often featured stories of resilience,
    self‑reliance, and communal support, instilling a strong work ethic and a competitive drive to excel in fields where Black women are underrepresented. She draws inspiration from the legacy of African
    American artisans and the vibrant local art scene, integrating these influences into both her professional craftsmanship and personal artistic pursuits.
attributes:
  skills: '["Mechanical assembly", "Metal fabrication", "Blueprint and schematic interpretation", "Quality inspection", "Tool and equipment maintenance", "Safety compliance (OSHA)", "Inventory management",
    "Basic CNC operation", "Problem solving", "Training and mentoring"]'
  hobbies: '["Visiting art galleries (especially African American art)", "Sketching and drawing", "DIY metal sculpture and jewelry making", "Attending maker workshops and tech talks", "Reading science and
    design publications", "Jogging in Rock Creek Park and along the C&O Canal", "Listening to jazz and blues", "Cooking experimental dishes rooted in family recipes"]'
  career_goals: Thamar aims to transition into a lead fabricator or production supervisor role, where she can apply her detail‑oriented mindset to oversee a team and improve workflow efficiency. She is
    pursuing a GED and plans to obtain certifications in welding and CNC machining to broaden her technical credentials. In the longer term she envisions launching a small side business creating custom
    metal artworks that blend her technical skills with her love of art, providing both creative fulfillment and additional income for retirement security.
