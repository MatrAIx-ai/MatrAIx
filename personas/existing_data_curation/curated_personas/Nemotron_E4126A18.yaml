  hobbies: '["reading speculative fiction", "digital painting", "film photography", "diorama building", "ambient music composition", "small‑group book clubs", "gallery visits", "star‑gazing meetups"]'
  career_goals: Baldev aspires to transition from his current informal lifestyle into a sustainable freelance career centered on visual and literary arts. He aims to build a modest online portfolio that
    showcases his digital paintings, photographic series, and self‑published stories, eventually attracting commissions from indie game studios and niche publishing houses. To support this, he plans to
    enroll in a community‑college workshop on graphic design and to network within Charlotte's small‑scale art collectives. Over the next five years, he hopes to establish a personal brand that allows him
    to work on passion projects while maintaining the flexibility and low‑stress environment he values.
