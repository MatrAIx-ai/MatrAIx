personas:
  professional: A maintenance technician at a commercial facility in Bexar County, Cynthia blends meticulous documentation with hands‑on problem solving, using her step‑by‑step mindset to keep HVAC, electrical,
    and plumbing systems running smoothly while working toward EPA Section 608 certification and a future supervisory role that will let her create the predictable schedule she craves.
  sports: Cynthia favors solitary early‑morning walks in nearby parks for cardiovascular health, supports the Dallas Cowboys and the San Antonio Spurs as her local professional teams, and occasionally joins
    a community softball league at summer's end, preferring low‑key, structured activity over crowded gyms.
  arts: Cynthia relaxes by knitting intricate traditional patterns while listening to folk musicians like Lila Downs, Victor Jara, and contemporary singer‑songwriter Natalia Lafourcade, allowing the rhythmic
    melodies to complement her methodical craft.
  travel: Cynthia plans trips with meticulous itineraries, favoring short road trips to historic towns in the Southwest such as Santa Fe and Tucson for their cultural festivals, while dreaming of a future
    visit to a coastal village known for its artisanal markets, balancing her love of structure with a desire for quiet exploration.
  culinary: Cynthia excels at cooking labor‑intensive dishes like peppery pepian stew, hand‑rolled tamales, and sweet atole, relying on her indoor herb garden for fresh basil, cilantro, and oregano, and
    approaches each meal as a step‑by‑step project that connects her to family traditions and provides comforting routine.
  core: Cynthia is a detail‑oriented maintenance professional who channels her love of routine into structured work, careful budgeting, and soothing solitary hobbies, while battling anxiety that she manages
    through mindfulness, journaling, and creative crafts.
background:
  cultural: Cynthia is the daughter of Guatemalan immigrants and grew up bilingual, speaking Spanish at home and English in school. Her family maintains strong ties to Guatemalan traditions, celebrating
    Semana Santa with family gatherings, preparing festive foods, and honoring the indigenous Maya heritage through occasional participation in cultural workshops. Catholic values of community service and
    humility influence her cooperative yet assertive work style. While living in Converse, Texas, she stays connected to a close‑knit Latinx community, often sharing traditional recipes and craft techniques
    with neighbors. Her cultural background instills a respect for practical, hands‑on skills and a deep appreciation for routine, both of which shape her professional reliability and personal coping strategies.
