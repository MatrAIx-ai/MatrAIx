  hobbies: '[''indoor herb gardening'', ''knitting traditional patterns'', ''cooking Guatemalan cuisine'', ''reading technical manuals'', ''watching DIY repair videos'', ''journaling'', ''early‑morning
    nature walks'', ''mindfulness meditation'', ''listening to Guatemalan folk music'', ''learning basic Kaqchikel phrases'']'
  career_goals: In the short term, Cynthia aims to earn an EPA Section 608 certification and complete the OSHA 10‑hour safety course, boosting her credibility and opening pathways to more specialized roles.
    Over the next three years, she aspires to transition into a supervisory position where she can lead a small, tightly coordinated maintenance team, creating a structured work environment that aligns
    with her need for predictability. Long‑term, she envisions launching a modest, community‑focused home‑repair business that serves the Guatemalan and broader Latinx neighborhoods of Converse, emphasizing
    reliable, scheduled appointments and eco‑friendly practices. These goals reflect her desire for stable income, clear routines, and the ability to balance personal compassion with professional self‑interest.
