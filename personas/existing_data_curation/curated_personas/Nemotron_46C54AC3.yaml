  career_goals: At 86, Richard’s ambitions focus on staying active, connected, and useful. He plans to keep volunteering at the local senior center and his church, sharing his practical knowledge with younger
    volunteers. He hopes to learn to use a tablet or computer more confidently so he can video-chat with his grandchildren and preserve his family’s oral histories in digital form. He aims to expand his
    vegetable garden, document the history of Botetourt County through a small memoir, and maintain his health to remain independent for as long as possible.
