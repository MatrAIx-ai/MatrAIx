personas:
  professional: Donald Byron, a seasoned construction manager with deep expertise in BIM‑driven multi‑story projects, blends rigorous schedule control, cost mastery, and a refined aesthetic sense to lead
    cross‑functional teams that deliver landmark Chicago developments while navigating competitive office dynamics.
  sports: Donald Byron, a regular jogger on the Lakefront Trail who follows the Chicago Bulls and Chicago White Sox, participates in a local running club, squeezes in weekend half‑marathons to counteract
    work stress, but they often push themselves too hard after long meetings, occasionally risking injury.
  arts: Donald Byron, a frequent visitor of the Art Institute of Chicago and contemporary galleries, sketches cityscapes, captures street scenes with a Nikon, draws inspiration from artists like Kerry James
    Marshall and Theaster Gates, immerses themselves in Beethoven symphonies and Miles Davis albums, and they attend intimate artist talks to deepen their understanding of the creative process.
  travel: Donald Byron, whose travel itinerary is meticulously planned, includes art‑centric trips to the Venice Biennale, Barcelona’s Modernist architecture, a weekend hike in the Michigan Upper Peninsula,
    and they balance these escapes with budgetary constraints and a preference for short, focused stays.
  culinary: Donald Byron, who enjoys Chicago‑style deep‑dish pizza, a classic Chicago hot dog from Portillo’s, experimenting with rosemary‑infused wood‑fired chicken in the home workshop, savoring artisanal
    espresso, and they often pair meals with a selection of local craft beers to unwind after demanding project days.
  core: Donald Byron balances a demanding construction career with a quiet passion for art and mindful self‑care, channeling a competitive edge into meticulous project leadership while wrestling with lingering
    stress and occasional over‑planning.
background:
  cultural: Donald was raised in a middle‑class white family in the Chicago suburbs, where his parents emphasized both practical trades and liberal arts education. He graduated from a public high school
    with a strong arts program and earned a B.A. in Art History and Philosophy from the University of Illinois at Chicago. Growing up amidst the city’s diverse neighborhoods gave him an appreciation for
    multicultural influences while reinforcing a Midwestern work ethic and independent mindset. He celebrates traditional American holidays such as Thanksgiving and the Fourth of July, but also actively
    participates in the city’s cultural calendar, including the Chicago Architecture Biennial and local art festivals.
attributes:
  skills: '["Construction Project Management", "Budgeting and Cost Estimation", "Schedule Development and Critical Path Management", "Building Code Compliance (Chicago)", "Sustainable Building Practices",
