    Coordination", "Risk Assessment & Mitigation", "Technical Documentation", "Conflict Resolution"]'
  hobbies: '["Art museum visits", "Gallery tours", "Urban sketching", "Photography", "Reading art history and philosophy", "Attending small artist talks", "Woodworking", "Jogging along Lakefront Trail",
    "Meditation", "Chess", "Listening to classical and jazz music", "Volunteer mural painting"]'
  career_goals: He aims to become a senior director of construction for a firm renowned for culturally significant and sustainable projects, ultimately overseeing flagship developments that incorporate
    public art installations. Donald plans to obtain Certified Construction Manager (CCM) and Project Management Professional (PMP) credentials, publish thought pieces on the intersection of art and construction,
    and mentor emerging managers. He also seeks to build a more collaborative work culture despite his naturally competitive streak, and to implement strategies that reduce work‑related stress and improve
    his work‑life balance.
