  career_goals: Linda aims to attend a four‑year college where she can major in art history or museum studies, with the long‑term goal of becoming a museum curator or cultural program manager. She is also
    interested in combining her love of nature and art by working in environmental education, perhaps as an interpretive guide at a local nature center. Ultimately, she hopes to use her organized, detail‑oriented
    nature to lead community arts initiatives that bring small groups together and help preserve the cultural heritage of her hometown.
