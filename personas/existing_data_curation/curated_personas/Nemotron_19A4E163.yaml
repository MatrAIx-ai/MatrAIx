personas:
  professional: Robert Rubin is a budding robotics hobbyist who channels his love for LEGO Technic and strategic chess into designing functional mechanisms for his school's robotics club; they apply methodical
    planning and a competitive mindset to every prototype.
  sports: Robert Rubin pitches for his high school baseball team, follows the New York Yankees' pitching rotations, and spends Saturday mornings at the local Little League club, balancing rigorous bullpen
    drills with cardio runs to maintain durability; they also track personal stats on a mobile app.
  arts: Robert Rubin channels his creative precision into LEGO constructions while appreciating the intricate compositions of Hans Zimmer and the kinetic art of Rube Goldberg, often watching Studio Ghibli
    films for inspiration on narrative engineering; they keep a sketchbook of design ideas alongside game strategy notes.
  travel: Robert Rubin prefers meticulously planned trips, having explored Yosemite National Park on a family hike and dreaming of a future visit to the LEGO House in Billund, Denmark, where they can combine
    a love of travel with hands‑on building experiences; they maintain a travel journal with maps and route calculations.
  culinary: Robert Rubin enjoys cooking simple yet precise meals like ramen with perfectly timed soft‑boiled eggs and homemade garlic butter pizza, experimenting with exact ingredient ratios, though they
    often forget to clean the kitchen before the next gaming session; they keep a notebook of favorite recipes.
  core: Robert Rubin balances methodical LEGO builds and strategic gaming with a competitive streak, a knack for budgeting his allowance, minor allergy quirks, and an occasional habit of leaving pizza crusts
    on their desk.
background:
  cultural: Robert grew up in Joliet, a mid‑south suburb of Chicago in Will County, Illinois. His family is of German‑Polish ancestry, reflecting the common immigrant heritage of the region. He was raised
    in a middle‑class household that values hard work, self‑reliance, and community involvement, typical of Midwestern culture. The family celebrates traditional American holidays such as Thanksgiving and
    Christmas, often with a Catholic background that includes attending church services regularly. The industrial history of Joliet and the surrounding area has given him an appreciation for practical trades
    and a pragmatic outlook on life.
