  career_goals: Robert aims to pursue a career in engineering, preferably civil or mechanical engineering, focusing on designing infrastructure that improves his hometown of Joliet. He plans to attend a
    STEM‑focused high school, earn a scholarship to a university with a strong engineering program, and eventually work on large‑scale public works projects. In the meantime, he is interested in a summer
    apprenticeship with a local construction firm to gain hands‑on experience. He also hopes to become a leader in engineering clubs and contribute to community service projects that involve building or
    repairing local facilities.
