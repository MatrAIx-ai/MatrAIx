  hobbies: '[''Visiting art museums and galleries'', ''Watercolor painting and mixed-media art'', ''Pottery classes'', ''Listening to art-history podcasts'', ''Attending public lectures and seminars'',
    ''Spontaneous weekend travel to cultural festivals'', ''Cooking and exploring new cuisines'', ''Gardening (vegetable and herb garden)'', ''Yoga'', ''Bridge (card game) club'', ''Reading contemporary
    fiction and business innovation books'', ''Volunteering as a museum docent'']'
  career_goals: Carmen aims to transition from a supporting role to a leadership position within adult education, ideally spearheading a community‑college program that integrates business acumen with visual
    arts and design thinking. She plans to earn a master’s degree in educational technology or interdisciplinary studies to deepen her expertise in blended learning. Over the next five years, she intends
    to develop and pilot an elective course titled "Artistic Entrepreneurship" that equips students with creative branding and marketing skills. Carmen also aspires to mentor junior faculty, contribute
    to curriculum committees, and eventually retire from formal teaching while maintaining an active role as a consultant for local museums and nonprofits seeking to design engaging educational outreach.
