personas:
  professional: Carmen Weed is a seasoned adult education specialist with two decades of teaching assistant experience, adept at designing interdisciplinary curricula that fuse business concepts with visual
    arts, leveraging Canvas and Tableau, while their spontaneous, flexible style fuels creative lesson plans but sometimes clashes with tight deadlines.
  sports: Carmen Weed enjoys a balanced fitness routine that includes sunrise yoga sessions at the local community center, casual tennis matches at the Dearborn Tennis Club, and avidly follows the Detroit
    Tigers and Red Wings while occasionally joining a weekend walking group along the River Walk.
  arts: Carmen Weed immerses themselves in the Detroit art scene, sketching museum exhibits, painting watercolors inspired by Georgia O'Keeffe and Kehinde Wiley, attending pottery classes, and curating
    a personal playlist that features jazz pianist Brad Mehldau and folk singer Joni Mitchell.
  travel: Carmen Weed favors spontaneous weekend getaways to cultural festivals such as Ann Arbor's Art Fair, has explored Oaxaca's vibrant markets and the historic streets of Kyoto, and dreams of attending
    the Edinburgh Fringe while balancing travel with limited retirement savings.
  culinary: Carmen Weed delights in garden‑to‑table cooking, frequently preparing heirloom tomato gazpacho, zucchini lasagna with fresh basil, and experimenting with Middle Eastern dishes like chickpea
    falafel, while occasionally indulging in a homemade pistachio baklava for special occasions.
  core: Carmen Weed blends artistic curiosity with business savvy, navigating retirement finance with occasional splurges, managing health conditions through proactive monitoring yet skipping some routine
    care, and balancing a competitive edge in bridge with a love for spontaneous cultural adventures.
background:
  cultural: Carmen identifies as a white Midwestern American with deep roots in the Great Lakes region. Her family lineage includes German and Irish ancestors who settled in Michigan during the early 20th
    century. Growing up in the Detroit suburbs, she absorbed the region’s blend of industrial heritage, blue‑collar work ethic, and rich cultural tapestry—exposed to Motown music, vibrant immigrant communities,
    and a strong tradition of civic involvement. She was raised in a Methodist household, which emphasized community service and lifelong learning. This background informs her appreciation for both the
    practical side of business and the expressive power of the arts, and it motivates her commitment to fostering inclusive, interdisciplinary education within her community.
