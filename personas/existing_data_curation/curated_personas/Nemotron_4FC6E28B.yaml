  career_goals: Sylvia aims to advance from her current secretarial role to an executive assistant position within the next three years, obtaining a Certified Administrative Professional (CAP) credential
    along the way. She hopes to later transition into office management, where she can design efficient administrative processes and mentor junior staff. In the longer term, she is interested in pursuing
    a bachelor's degree in Business Administration to open opportunities in project coordination or small‑business consulting, combining her practical experience with strategic planning skills.
