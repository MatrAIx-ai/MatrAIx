personas:
  professional: Alexander Cotten, an eager budding comic artist, channels a vivid imagination and meticulous LEGO‑building skills into crafting intricate storyboards, while their relaxed approach to deadlines
    lets spontaneity steer each panel.
  sports: Alexander Cotten, a budding swimmer who spends afternoons at the community pool and cycles around Grosse Ile, roots for the Detroit Tigers, practices with the Grosse Ile Swim Club, and lets spontaneous
    water games replace regimented drills, reflecting a love of fun over strict training.
  arts: 'Alexander Cotten, an avid comic‑book creator who draws inspired by the dynamic panels of Stan Lee and the whimsical worlds of Studio Ghibli, attends weekend art workshops where they experiment
    with watercolors, and fills spare moments humming the soundtrack of Spider‑Man: Into the Spider‑Verse by Daniel Pemberton.'
  travel: Alexander Cotten, whose curiosity fuels weekend trips to nearby Mackinac Island for its historic forts and occasional family vacations to Disneyland, dreams of exploring the Grand Canyon’s cliffs,
    and prefers spur‑of‑the‑moment bike rides over meticulously planned itineraries.
  culinary: Alexander Cotten, who relishes pepperoni pizza, cheesy macaroni, and homemade banana muffins, can whisk together a simple peanut‑butter‑jelly sandwich unaided, and delights in tasting the tangy
    crunch of fresh strawberries and cucumber slices, though they often forget to finish vegetables before dessert.
  core: Alexander Cotten, an imaginative eight‑year‑old whose sketchbook is never far from reach, turns every riverbank walk into a treasure hunt, yet sometimes lets anxiety hijack playtime, prompting sudden
    retreats to the comfort of a favorite LEGO set.
background:
  cultural: Alexander is a white American growing up on Grosse Ile, a quiet suburb of Detroit in Michigan. His family observes typical Midwestern traditions such as Thanksgiving, the Fourth of July, and
    Christmas, and participates in community events like the Grosse Ile Riverfest. He regularly visits the Detroit Institute of Arts on school trips, exposing him to a diverse range of artistic styles.
    Proximity to the Detroit River gives him a strong connection to water‑based recreation, including boating, fishing, and nature walks. His upbringing reflects a blend of suburban family values, a supportive
    school environment, and the cultural influence of the broader Detroit metropolitan area, including exposure to Motown music, local sports teams, and regional culinary favorites like Derry potatoes and
    cherry pie.
