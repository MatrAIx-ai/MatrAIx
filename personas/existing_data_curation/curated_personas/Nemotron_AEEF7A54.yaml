  career_goals: Alexander dreams of becoming an animator who can bring his vivid imagination to life, or a marine explorer who studies the wildlife of the Great Lakes. He also imagines designing inventions
    that solve everyday problems, blending his love for art, science, and helping others. He hopes to work in a role that lets him collaborate with people and spread kindness, such as a community artist,
    teacher, or creative technologist.
