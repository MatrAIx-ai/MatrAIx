personas:
  professional: Brian Bollen, a retired community‑center volunteer coordinator, leverages their hands‑on carpentry, gardening, and empathetic listening skills to mentor younger volunteers and design art‑infused
    sustainable garden projects, all while staying delightfully flexible about deadlines and embracing unconventional ideas.
  sports: Brian Bollen enjoys watching the Kansas City Chiefs on Sundays and cheering for the Kansas City Royals during baseball season, participates in the Mound City Senior Softball League each summer,
    and maintains personal fitness through daily morning walks around the town’s historic district and occasional gardening—viewed as both exercise and a creative outlet for them.
  arts: Brian Bollen paints Kansas plains landscapes inspired by Georgia O'Keeffe’s color palettes, plays acoustic renditions of Bob Dylan and The Avett Brothers at community potlucks, volunteers at the
    local theater to set up lighting for productions of Arthur Miller, and cites the folk festival performances of Bill Monroe as a catalyst for their storytelling gatherings.
  travel: Brian Bollen favors spontaneous road trips in their beloved pickup, has already explored historic Dodge City, the Mark Twain Museum in Hannibal, MO, and the sandstone canyons of Sedona, Arizona,
    and hopes to someday visit the coastal art colonies of Santa Cruz, California, always prioritizing budget‑friendly motels and local diners over rigid itineraries.
  culinary: Brian Bollen excels at comfort cooking, often preparing their family’s Sunday pot roast with rosemary, thyme, and heirloom carrots harvested from their garden, whips up buttery cornbread with
    buttermilk, and experiments with seasonal vegetable ratatouille, while occasionally over‑salting their chili in enthusiasm.
  core: Brian Bollen is a 66‑year‑old retired volunteer whose curiosity fuels art, gardening, and storytelling, whose relaxed, slightly disorganized nature leads to spontaneous community projects, and whose
    generous spirit sometimes forgets to floss, even as they keep the community humming.
background:
  cultural: Brian grew up in a mid‑Midwestern, white farming family in Bourbon County, Kansas, where community, hard work, and self‑reliance are core values. His upbringing was shaped by small‑town traditions,
    church involvement, and seasonal agricultural rhythms. While rooted in these conventions, Brian has always been open to broader cultural influences, embracing art, music, and ideas beyond his immediate
    environment. He identifies strongly with the modest, neighborly spirit of rural Kansas, yet his curiosity drives him to explore diverse artistic expressions and to blend them into his own community
    life.
