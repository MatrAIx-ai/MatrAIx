personas:
  professional: Geneva Symoens is a veteran casino surveillance officer whose razor‑sharp observational skills, expertise in CCTV analytics, and methodical risk‑assessment approach are amplified by a competitive
    streak and a New England‑rooted sense of duty, driving her toward a supervisory role that blends mentorship with cutting‑edge security technology.
  sports: Geneva Symoens is an avid hiker of the White Mountains, a dedicated rifle‑shooting enthusiast at the local range, and a loyal fan of the Boston Red Sox and New England Patriots, often joining
    the Barnstead community softball league and volunteering as a safety monitor for the regional 5K race.
  arts: Geneva Symoens immerses herself in strategic board games like Settlers of Catan and classic chess nights, solves daily crosswords and Sudoku to keep her mind sharp, enjoys the folk melodies of the
    Wailin' Jennys, and attends the seasonal Barnstead barn‑raising concerts where local bluegrass bands play.
  travel: Geneva Symoens prefers meticulously planned weekend getaways to rustic cabins in the Adirondacks, a nostalgic road trip to Portland, Maine for its historic lighthouse tours, and a yearly pilgrimage
    to the historic battlefields of Gettysburg, balancing her love of nature with a modest travel budget and a desire for low‑key relaxation.
  culinary: Geneva Symoens delights in hearty New England cuisine, often preparing clam chowder, maple‑glazed pork chops, and blueberry oat muffins, while her garden supplies fresh herbs for her signature
    roasted chicken, and she enjoys pairing meals with locally brewed craft ales from nearby breweries.
  core: Geneva Symoens blends New England self‑reliance, competitive precision, and a love of puzzles into a pragmatic life where community safety, meticulous planning, and occasional worry-driven overthinking
    define her daily rhythm.
background:
  cultural: Geneva is a White American raised in the small towns of central New Hampshire. Her family has deep roots in the region, tracing back to early 20th‑century settlers who worked in manufacturing
    and forestry. The New England ethos of self‑reliance, modesty, and respect for privacy shaped her values. She grew up attending a Protestant church and participates in local community events like town
    meetings, fall festivals, and the annual barn‑raising. Her marriage to a fellow security professional has reinforced a pragmatic, teamwork‑oriented household. Living in Barnstead, she is attuned to
    the seasonal rhythms of the area and the close‑knit nature of Belknap County's communities, which influence her sense of duty and stewardship.
attributes:
  skills: '["CCTV operation and monitoring", "Video analytics", "Risk assessment", "Incident reporting", "First aid and CPR", "Conflict de‑escalation", "Investigative techniques", "Gaming compliance knowledge",
    "Hardware/software troubleshooting", "Organizational workflow management", "Attention to detail", "Stress-resilient decision making"]'
  hobbies: '["Crossword puzzles", "Sudoku", "Hiking", "Bird‑watching", "Board games (chess, Settlers of Catan)", "Rifle shooting", "Knitting", "Neighborhood watch volunteering"]'
  career_goals: Geneva aims to transition from front‑line surveillance to a supervisory role within the next three years. She plans to earn the Certified Protection Officer (CPO) credential and complete
    advanced training in fraud detection and cyber‑security for gambling operations. Her long‑term ambition is to become a security operations manager for a regional casino network, overseeing a team of
    guards, developing training programs, and implementing modern surveillance technologies. She also hopes to mentor younger officers and eventually consult on security protocol design for smaller venues
    across New England, allowing her to leverage her practical experience while achieving a better work‑life balance.
