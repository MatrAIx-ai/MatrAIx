personas:
  professional: Amity Boswell, a veteran customer service specialist with three decades of mastery over Zendesk, Salesforce and Freshdesk, leverages their keen empathy, disciplined record-keeping and conflict-de-escalation
    talent to turn challenging calls into loyal clients, and now channels that organized, sociable energy into designing training modules that empower new agents with both technical fluency and compassionate
    problem-solving.
  sports: Amity Boswell, an ardent supporter of the Tampa Bay Buccaneers and Rays, attends weekend stadium games when possible, participates in a senior yoga class twice a week, and joins a Saturday morning
    walking and bird-watching group that doubles as low-impact cardio to offset the strains of a high-stress career.
  arts: Amity Boswell, a watercolor enthusiast who frequents the Tampa Museum of Art and nearby galleries, draws creative fuel from the vibrant palettes of Georgia O'Keeffe and the impressionist brushstrokes
    of Claude Monet, and regularly showcases her tropical-plant inspired sketches at community art nights, blending curiosity with a love for unconventional expression.
  travel: Amity Boswell, who plans each excursion with the precision of a project schedule, has explored historic St. Augustine and Savannah, savoring their cobblestone charm, dreams of a leisurely Caribbean
    cruise to Key West and the Bahamas, yet occasionally abandons the itinerary to linger at an unexpected bird-watching sanctuary she discovers en route.
  culinary: Amity Boswell, a culinary aficionado who merges her gardening hobby with fresh Floridian flavors, often prepares citrus-infused grilled grouper topped with mango salsa, a stovetop stone-crab
    bisque seasoned with tarragon, and a signature key-lime tart that becomes the highlight of her impromptu dinner gatherings.
  core: Amity Boswell is a meticulously organized, art-curious senior whose sociable energy fuels a career in empathetic customer service, yet a lingering thread of worry drives them to seek harmony through
    gardening, watercolor, and community involvement.
background:
  cultural: Amity identifies as a white American who grew up in a modest, middle‑class family in the Midwest before relocating to the Tampa Bay area in her early forties. Her upbringing emphasized a strong
    work ethic, community involvement, and modesty—values that blend with the Southern hospitality she embraced after moving to Florida. Living in Brandon, Florida, she participates in local festivals,
    supports the city’s growing multicultural arts scene, and enjoys the relaxed yet vibrant lifestyle of Hillsborough County. While she retains some Midwestern traditions, such as close family holiday
    gatherings and an appreciation for classic American cuisine, she also embraces the diverse culinary and cultural offerings of the region, reflecting an open‑minded, integrative cultural identity.
attributes:
  skills: '[''Customer Service Communication'', ''Active Listening'', ''Conflict De‑escalation'', ''CRM Software (Zendesk, Salesforce, Freshdesk)'', ''Data Entry & Documentation'', ''Time Management'',
