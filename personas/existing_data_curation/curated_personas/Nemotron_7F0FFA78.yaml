  hobbies: '[''Watercolor Painting'', ''Sketching'', ''Visiting Art Galleries'', ''Reading (Book Club)'', ''Gardening (tropical plants & vegetables)'', ''Cooking (Floridian cuisine)'', ''Bird‑watching'',
    ''Travel to historic towns'', ''Volunteer Literacy Tutoring'', ''Attending Live Theater'']'
  career_goals: Amity aspires to transition into a supervisory or training role within the customer experience department, leveraging her organizational strengths and passion for mentorship to shape the
    next generation of agents. She plans to obtain a certification in Customer Experience Management to formalize her expertise and to spearhead initiatives that streamline call‑center workflows. Over the
    next few years she hopes to lead a team, develop training modules that incorporate creative problem‑solving and empathy, and champion a workplace culture that prioritizes employee well‑being—reflecting
    her own sensitivity to stress. As she approaches retirement, Amity intends to shift to part‑time consulting or volunteer work, possibly assisting local nonprofits with customer outreach strategies while
    staying actively engaged with the arts community.
