persona_description: A geneticist and anthropologist who specializes in the study of domesticated cattle and their genetic history, particularly the admixture and interbreeding between African and other
  breeds. They have completed a comprehensive genetic history of 134 cattle breeds from around the world and have found that ancient African cattle originated in the Fertile Crescent, proving that they
  were brought to Africa as farmers migrated south. They are interested in understanding the diversity of the species and improving cattle for agricultural purposes, such as breeding more disease-resistant
  animals or finding ways to increase dairy or beef production.
