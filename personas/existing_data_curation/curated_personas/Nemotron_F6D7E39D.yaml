  career_goals: Linda aims to advance into senior leadership within the nonprofit sector, ultimately serving as a Director of Community Services or Executive Director of a regional social service organization.
    She plans to obtain the Certified Community Service Manager (CCSM) credential and pursue a master's-level certification in nonprofit management. Her long-term ambition is to launch a community hub that
    fuses social services with arts programming, providing innovative mental-health and empowerment resources for underserved populations in Atlanta. She also seeks to influence local policy on mental-health
    funding and to mentor emerging social-service professionals.
