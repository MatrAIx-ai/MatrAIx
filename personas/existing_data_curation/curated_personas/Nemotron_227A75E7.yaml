  career_goals: Otto aspires to turn his creative talents into a freelance career as a graphic designer and concept artist, focusing on indie video games and online media. He plans to build a strong portfolio
    that will allow him to secure remote commissions and eventually launch his own small studio. To bridge the gap between his informal learning and professional work, he aims to enroll in a community college
    or vocational program in visual arts or digital media. Alongside this, he hopes to deepen his coding skills to develop interactive art installations and potentially create a YouTube channel where he
    shares tutorial content and his artistic process.
