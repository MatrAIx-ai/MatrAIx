personas:
  professional: Otto Hartner, a 16‑year‑old aspiring freelance graphic designer and concept artist, channels a self‑reliant, improvisational workflow into surreal digital illustrations created with free
    tools like Krita and GIMP, while they draw on their competitive gaming mindset to fuel strategic client pitches and tight‑deadline problem‑solving despite occasional disorganization.
  sports: Otto Hartner enjoys solitary hikes along the vast Nebraska prairies, participates in the high‑school cross‑country team, follows the Nebraska Cornhuskers football and the Kansas City Chiefs, cheering
    quietly from home, and maintains a casual membership in a local community basketball league that they attend when the weather permits.
  arts: Otto Hartner draws inspiration from the surreal canvases of Salvador Dali, the digital hyperrealism of Beeple, and the ambient soundscapes of Brian Eno and Aphex Twin, frequently attending the county’s
    community theater productions and local art shows to quietly absorb new ideas while they sketch in cramped bedroom corners.
  travel: Otto Hartner prefers low‑cost, off‑season road trips that blend solitary photography hikes in the Badlands and a weekend art‑focused visit to Chicago’s Museum of Contemporary Art, planning routes
    in spreadsheets that they adjust last minute based on weather forecasts and budget constraints.
  culinary: Otto Hartner favors hearty Midwestern staples like corn on the cob, ranch‑style baked beans, and pepperoni pizza, but occasionally experiments with quick ramen upgrades—adding soft‑boiled eggs,
    sriracha, and frozen peas—while they rely on a modest set of kitchen tools and a well‑worn cast‑iron skillet for late‑night gaming snacks.
  core: Otto Hartner is a self‑reliant, anxiety‑prone teen who blends surreal digital art with competitive gaming strategy, drifting between meticulous creation and casual chaos, and they often find solace
    in solitary hikes and ambient soundtracks.
background:
  cultural: Otto was raised in a small‑town Midwestern setting in Lancaster County, Nebraska. His family’s lineage includes German and Irish roots, reflecting the common heritage of the region. He grew
    up with typical Midwestern values of self‑reliance, modesty, and community participation, often attending local county fairs, community theater productions, and high‑school art clubs. While rooted in
    these local traditions, Otto’s exposure to the internet and global media has broadened his cultural outlook, fostering an appreciation for diverse artistic movements and unconventional ideas. This blend
    of rural Nebraska ethos and wide‑reaching artistic curiosity shapes his identity.
