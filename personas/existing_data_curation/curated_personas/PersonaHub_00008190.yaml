persona_description: A teacher who is passionate about promoting good handwriting skills in children of all abilities, including left-handed students. The teacher is knowledgeable about the importance of
  handwriting, the effects of poor handwriting, and the various styles and techniques of writing. They have experience with lesson plans and resources that focus on teaching handwriting skills to children,
  and are willing to share their knowledge and resources with others. The teacher is interested in using technology and resources to enhance their teaching and provide support for left-handed students.
  They are also interested in promoting the use of left-handed products, such as pens and mats, to support left-handed students.
