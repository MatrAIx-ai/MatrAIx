  hobbies: '[''Gardening'', ''Knitting'', ''Reading historical fiction'', ''Small book club participation'', ''Volunteer story-time at the library'', ''Yoga and meditation'', ''Birdwatching'', ''Local history
    museum visits'']'
  career_goals: Sheila aims to transition into a leadership role within her school district—such as curriculum coordinator or lead teacher—where she can formalize systematic practices that enhance predictability
    and support for both children and staff. She also hopes to design a community-based early literacy program for families in Hayward, author a guide on integrating arts into early childhood education,
    and eventually shift to part‑time consulting to maintain a steady income while reducing stress as she approaches retirement.
