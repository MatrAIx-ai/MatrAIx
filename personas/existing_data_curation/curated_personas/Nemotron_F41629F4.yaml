  career_goals: She aims to build a competitive portfolio that will earn her a place in a specialized arts high school in New York City, and later pursue a BFA in illustration or visual arts at a top college.
    Long‑term, Jacqueline dreams of working as a freelance illustrator for graphic novels and games, while also training as an art therapist to support peers dealing with anxiety and depression through
    creative workshops. She is committed to continually refining her technical skills, seeking mentorship, and eventually exhibiting her own work in galleries.
