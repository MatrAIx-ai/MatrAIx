personas:
  professional: Jacqueline Rhodes is a budding visual artist who blends watercolor, sketching, and digital illustration into a meticulously curated online portfolio, leveraging their organized, methodical
    nature to meet school art club deadlines while assertively seeking admission to competitive summer art programs.
  sports: Jacqueline Rhodes follows the New York Knicks and the Long Island Ducks baseball team, participates in the school's track‑and‑field club for sprint drills, and balances competitive spirit with
    a love for yoga classes at the local community center.
  arts: Jacqueline Rhodes immerses themselves in visual and literary arts, drawing inspiration from Frida Kahlo, Georgia O'Keeffe, indie musicians like Mitski and Tame Impala, and graphic novels such as
    'Saga' and 'Watchmen,' while regularly visiting the Metropolitan Museum of Art and local galleries.
  travel: Jacqueline Rhodes enjoys weekend explorations of Manhattan's museum district, family road trips to the Hamptons and Washington, D.C., and dreams of studying art in Paris and wandering the streets
    of Kyoto, prioritizing experiences that fuel their creative curiosity despite parental budget constraints.
  culinary: Jacqueline Rhodes prefers comfort foods like pepperoni pizza and avocado toast, experiments with homemade ramen and shakshuka on lazy Saturdays, and enjoys crafting smoothies with frozen berries
    and almond milk as a soothing post‑yoga snack.
  core: Jacqueline Rhodes is a hyper‑curious teen artist whose meticulous planning collides with waves of anxiety, prompting bursts of creative output and occasional impulsive spending on art supplies and
    music merch.
background:
  cultural: Jacqueline was raised in Jericho, a suburban community on Long Island that blends a predominantly middle‑class Anglo‑American upbringing with easy access to the cultural diversity of nearby
    New York City. Her family values education, personal responsibility, and artistic exploration, celebrating traditional American holidays while encouraging participation in community arts programs and
    museum outings. This environment has fostered a sense of curiosity about broader cultural perspectives while grounding her in the local suburban customs.
