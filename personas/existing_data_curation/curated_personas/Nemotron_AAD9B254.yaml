personas:
  professional: Victoria Bertoch, a seasoned English teacher and curriculum innovator, blends her curiosity for interdisciplinary literature with pragmatic project‑based units, deftly navigating spontaneous
    classroom pivots while mentoring new teachers, even as her tendency toward last‑minute planning sometimes challenges her organizational bandwidth.
  sports: Victoria Bertoch combines weekend hikes in the Marin Headlands with a membership in the Marin Trail Runners, cheers on the San Francisco Giants in baseball season and the Golden State Warriors
    during NBA playoffs, and squeezes in evening yoga sessions at a downtown studio to keep her stamina balanced.
  arts: Victoria Bertoch immerses herself in the works of Toni Morrison, Haruki Murakami, and Ocean Vuong, while her evenings often feature vinyl spins of Nina Simone and Bon Iver, and she attends quarterly
    screenings of Greta Gerwig’s films at the nearby independent cinema.
  travel: Victoria Bertoch prefers spur‑of‑the‑moment weekend getaways to nearby gems like Napa Valley vineyards and Yosemite trails, yet she meticulously saves for annual trips abroad, dreaming of wandering
    Kyoto’s historic temples and Barcelona’s bustling markets as a quiet escape from her structured teaching life.
  culinary: Victoria Bertoch, an avid home chef, delights in crafting miso‑glazed salmon paired with sumac‑spiced roasted carrots, whipping up kimchi‑taco bowls that mingle fermented tang with avocado,
    and occasionally treats herself to a lavender‑infused panna cotta topped with fresh figs, though she sometimes over‑season in her experimental zeal.
  core: Victoria Bertoch navigates life with a curious, solitary spirit that thrives on spontaneous literary and culinary experiments, yet their habit of procrastinating paperwork often leaves them scrambling
    at deadlines.
background:
  cultural: Victoria is a white American with European ancestry, raised in a suburban community in the Bay Area before moving to San Francisco. Her family emphasized education, the arts, and independent
    thought, fostering her curiosity and appreciation for both tradition and innovation. Living in one of the nation’s most culturally diverse cities, she actively incorporates multicultural perspectives
    and social‑justice awareness into her teaching. While she values her own heritage, she seeks to understand and celebrate the varied cultural narratives of her students, reflecting a progressive, inclusive
    ethos shaped by her upbringing and the vibrant San Francisco environment.
attributes:
  skills: '[''English literature instruction'', ''Composition and writing instruction'', ''Project‑based curriculum design'', ''Differentiated instruction'', ''Formative and summative assessment development'',
