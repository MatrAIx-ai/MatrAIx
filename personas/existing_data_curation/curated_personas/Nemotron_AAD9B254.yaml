    learning'']'
  hobbies: '[''Reading contemporary and classic literature'', ''Creative writing and journaling'', ''Photography (street and nature)'', ''Hiking and exploring local trails'', ''Experimenting with cooking'',
    ''Yoga and mindfulness practice'', ''Small‑group book club participation'', ''Volunteering as a reading mentor'']'
  career_goals: Victoria aims to transition into a leadership role within her school district, such as department chair or curriculum specialist, where she can shape school‑wide literacy initiatives and
    promote inquiry‑based learning. She plans to pursue a Master's in Educational Leadership to qualify for administrative positions and hopes to develop a mentorship program for first‑year teachers. Long‑term,
    she envisions authoring a series of interdisciplinary teaching guides that blend literature, history, and social justice themes, while maintaining a balance between innovative ideas and practical classroom
    constraints. She also aspires to present at education conferences focused on flexible teaching models and to secure funding for community literacy projects.
