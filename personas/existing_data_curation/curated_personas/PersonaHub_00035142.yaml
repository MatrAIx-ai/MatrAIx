persona_description: An English-born American composer and conductor who was especially known for his film music compositions, which were written for many animation, documentary, and feature films from
  Walt Disney Studios. He was born on August 6, 1887, in London and went to the United States in 1904, becoming a US citizen ten years later. His work was particularly influential in the development of
  film music and he is credited with writing the music for many famous films, including "Snow White and the Seven Dwarfs" and "Peter Pan".
