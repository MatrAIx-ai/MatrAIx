  hobbies: '["Exploring local craft breweries", "Kayaking on Lake Michigan", "DIY electronics and Raspberry Pi projects", "Urban photography", "Reading science‑fiction novels", "Puzzle solving (crosswords,
    Sudoku)", "Volunteering in STEM outreach programs", "Gardening"]'
  career_goals: Melissa aims to move from store‑level supervision to a district‑level management role, where she can apply advanced analytics to improve sales performance across multiple locations. She
    plans to earn Six Sigma Green Belt certification and a retail management credential to strengthen her process‑improvement expertise. Long‑term, she envisions launching a consulting practice that helps
    mid‑size retailers integrate technology solutions and data‑driven decision making, merging her technical background with her retail leadership experience.
