  career_goals: Marquis dreams of becoming an artist or designer who blends creativity with technology, such as a video‑game illustrator, comic‑book creator, or museum exhibit curator. He also envisions
    leading community art projects, like youth workshops that combine art and education. As he grows, he hopes to develop his leadership skills further, perhaps one day mentoring younger students or becoming
    a teacher who inspires curiosity and creativity in others.
