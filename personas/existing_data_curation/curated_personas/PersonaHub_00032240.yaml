persona_description: A healthcare worker who has been exposed to SARS patients and is currently monitoring and managing the outbreak. They are familiar with the rapidly changing epidemiology of the infection
  and are responsible for collecting serum from healthcare staff exposed to SARS patients. They are responsible for maintaining a high index of suspicion and are aware of the importance of early diagnosis
  in minimizing transmission and minimizing the risk of healthcare workers contracting the virus. They are also responsible for implementing strict infection control measures involving use of N95 masks,
  gown, gloves, and handwashing before and after patient contact. They are aware of the importance of early diagnosis in minimizing transmission and minimizing the risk of healthcare workers contracting
  the virus.
