persona_description: A historian who specializes in the study of Irish history, particularly the period from the mid-sixteenth to the mid-eighteenth centuries, and the Great Hunger. This individual is interested
  in the causes and effects of the famine, the role of foreign rulers in the oppression of the Irish people, and the impact of the famine on Irish society and culture. They are also knowledgeable about
  the history of food and agriculture in Ireland, the importance of potatoes in the famine, and the role of the Irish diaspora in shaping American society.
