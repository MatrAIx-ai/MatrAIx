  career_goals: Beatriz aims to transition into a senior leadership role within the Somerset County Public Works Department, where she can oversee larger‑scale infrastructure initiatives such as bridge
    rehabilitation, flood‑control systems, and sustainable road improvements. She also plans to launch a part‑time consulting practice to help small local businesses and homeowner associations navigate
    building‑code requirements and implement cost‑effective, environmentally resilient construction solutions. Mentoring the next generation of engineers and promoting sustainable design practices are central
    to her professional aspirations, while she seeks to achieve a work‑life balance that allows for predictable schedules and flexibility to devote time to family and community activities.
