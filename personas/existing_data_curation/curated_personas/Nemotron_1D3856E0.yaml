  career_goals: Kelly imagines a future where she can blend art and invention—she hopes to become an architect‑designer of imaginative play spaces or a science illustrator who creates vivid visual explanations
    for young readers. Her competitive streak pushes her to win school science fairs and art contests, and she envisions herself leading projects that combine creativity with problem solving.
