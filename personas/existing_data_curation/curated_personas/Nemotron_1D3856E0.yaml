personas:
  professional: Kelly Smith, an 8‑year‑old budding game creator, mixes vivid sci‑fi storytelling with Scratch programming to design interactive adventures, while their competitive drive pushes them to out‑solve
    peers in logic puzzles and their organized approach keeps code tidy.
  sports: Kelly Smith, a member of the Midtown Youth Soccer League, cheerfully practices dribbling after school, idolizes the local soccer team the Riverdale Rovers, and balances energetic weekend gymnastics
    classes with occasional indoor climbing at the community center.
  arts: Kelly Smith, an avid young illustrator, draws inspiration from the whimsical art of Shaun Tan, the magical realms of J.K. Rowling’s illustrated editions, and the animated world of Studio Ghibli’s
    Spirited Away, while regularly attending storytime sessions at Holden Public Library and sketching museum exhibits.
  travel: Kelly Smith dreams of a family trip to the Natural History Museum in Washington, D.C., loves revisiting the nearby Oakwood State Park for insect spotting, and hopes to someday explore the neon
    streets of Tokyo’s Akihabara district, mixing curiosity with a love for imaginative settings.
  culinary: Kelly Smith prefers pizza topped with extra cheese and pineapple, loves the buttery crunch of homemade LEGO‑shaped cookies, and eagerly helps melt chocolate for molten lava cake, while occasionally
    snacking on sugary cereals that fuel late‑night coding marathons.
  core: Kelly Smith, an imaginative 8‑year‑old with a competitive edge, transforms curiosity into LEGO cities, Scratch stories, and pocket‑sized savings, all while juggling allergies, soccer drills, and
    a sweet tooth for pizza.
background:
  cultural: Kelly is a white American girl raised in Holden, a suburban town in Worcester County, Massachusetts. The New England community emphasizes independence, modesty, and active participation in local
    events. She regularly attends the Holden Public Library story time, joins the town's after‑school art club, celebrates seasonal traditions like leaf‑raking in autumn and Fourth of July picnics, and
    lives in a family that values education, self‑reliance, and responsible responsibility.
