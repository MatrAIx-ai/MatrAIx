  hobbies: '["Fishing trips", "Woodworking projects", "Herb gardening", "Reading science and leadership non‑fiction", "Arduino and Raspberry Pi tinkering", "Golf with colleagues", "Watching professional
    basketball", "Mentoring high‑school robotics club", "Cooking Texas‑style barbecue", "Attending community festivals"]'
  career_goals: Joseph aims to advance to a district‑manager position within the next four to five years, overseeing multiple retail locations and applying his analytical skills to drive consistent sales
    growth. He plans to earn a Certified Supply Chain Professional (CSCP) credential and possibly an MBA to complement his technical background. Long‑term, he envisions a regional operations director role
    or launching his own consultancy that helps midsize retailers adopt data‑centric and technology‑enabled practices, such as AI‑based inventory optimization. Throughout his career progression, he remains
    committed to maintaining work‑life balance, fostering a supportive team culture, and mentoring future retail leaders.
