personas:
  professional: Timothy is a budding interactive storyteller who combines his love of drawing and methodical mind to create Scratch games that turn his nature‑walk observations into digital adventures,
    eagerly sharing his projects with classmates and teachers while honing problem‑solving skills.
  sports: Timothy plays forward for the Maple Grove Strikers youth soccer league, attends after‑school practices three times a week, cheers for the professional Manchester United team on weekends, and treats
    each match as a chance to channel their energetic, sociable spirit into teamwork and friendly competition.
  arts: Timothy delights in sketching whimsical creatures inspired by Dr. Seuss and the vibrant worlds of Hayao Miyazaki’s Spirited Away, frequently visits the county art museum to study Monet’s water lilies,
    and spends evenings rereading adventure classics by Roald Dahl, letting those influences fuel their own imaginative drawings.
  travel: Timothy enjoys weekend nature hikes to the nearby Willow Creek State Park, explores the hands‑on exhibits at the Regional Science Museum with their family, dreams of a summer trip to the Grand
    Canyon, and meticulously draws a map of each destination before departure to keep their organized mind satisfied.
  culinary: Timothy loves helping in the kitchen, especially when whipping up spaghetti with meatballs, cheese pizza topped with pepperoni and extra mozzarella, and chocolate‑chip pancakes, but insists
    on adding a swirl of ketchup to fries and will trade any snack for a handful of gummy bears.
  core: Timothy is a curious, organized nine‑year‑old who blends art, coding, and soccer into daily adventures, though they can’t resist an extra cookie before bedtime.
background:
  cultural: Timothy grew up in North Wilkesboro, a small town in the foothills of the Blue Ridge Mountains of North Carolina. His family reflects typical Southern values of close-knit community, church
    involvement, and a respect for local traditions. He has been exposed to Appalachian folk music, regional crafts, and community festivals that celebrate local heritage. The rural setting fosters an appreciation
    for outdoor activities like hiking and nature observation, which often inspire his artistic creations. His school and neighborhood emphasize cooperation, courtesy, and a strong sense of belonging, shaping
    his sociable and cooperative personality while also encouraging independent curiosity and creativity.
