  career_goals: Martha aims to transition from head cook to owning a community‑focused farm‑to‑table restaurant that highlights locally sourced seafood and produce from Essex County. She plans to earn a
    Certified Executive Chef credential and eventually publish a cookbook that blends New England tradition with the multicultural influences of Lawrence’s neighborhoods. Additionally, she aspires to launch
    a series of cooking workshops for emerging chefs and local residents, fostering a collaborative culinary ecosystem.
