personas:
  professional: Martha Wallace, a 35-year-old head cook known for turning high-volume, fast-paced kitchens into efficiently choreographed operations, blends precise inventory control, cost-effective menu
    design, and a leadership style that marries clear structure with the flexibility to mentor junior staff while maintaining a calm service flow.
  sports: Martha Wallace leads weekly group hikes along the coastal trails of Essex County, is a member of a local running club that trains for the Boston Marathon qualifiers, cheers for the New England
    Patriots on Sundays, and enjoys occasional paddle-boarding sessions at nearby lakes to complement her outdoor fitness routine.
  arts: Martha Wallace, an avid acoustic-guitar player, frequently attends folk and indie shows featuring artists like The Avett Brothers, Brandi Carlile, and Sufjan Stevens, and volunteers at community
    music festivals where she helps organize "cook-and-listen" pop-ups that blend culinary demos with live performances.
  travel: Martha Wallace prefers weekend road trips that blend culinary exploration with scenic hikes, having recently visited the lobster shacks of Portland, Maine, the historic vineyards of the Finger
    Lakes, and dreaming of a spring pilgrimage to the tulip fields of Holland, all while budget-conscious enough to fund her future restaurant venture.
  culinary: Martha Wallace thrives on seasonal New England flavors, crafting dishes like cedar-plank salmon with maple-glazed carrots, pairing them with her own spring-grapefruit IPA, while her home-brewing
    experiments range from pumpkin ale to a lemon-herb saison that she proudly serves at family gatherings, though she sometimes over-spice dishes in the excitement of a new flavor fusion.
  core: Martha Wallace is a structure-obsessed, community-driven chef who balances meticulous kitchen precision with spontaneous home-brewing, leading hikes, concerts, and aspiring to launch a farm-to-table
    hub that fuses New England tradition with multicultural flair.
background:
  cultural: Martha is a third‑generation white American with deep roots in New England. Raised in a modest household in the Greater Boston area, she grew up with traditional New England customs—seasonal
    seafood, apple orchards, and an appreciation for punctuality and practicality. Living and working in Lawrence, a city rich in Portuguese, Haitian, and Somali communities, she has absorbed a wide palette
    of cultural flavors and values community collaboration. This blend of classic New England upbringing and exposure to Lawrence’s diverse culinary landscape informs her cooking style, interpersonal approach,
    and community‑oriented aspirations.
