  career_goals: Alisha aims to move into a senior director or vice‑presidential role where she can shape company‑wide operational strategy, champion digital transformation, and embed sustainable practices
    across the supply chain. She hopes to mentor emerging women leaders and launch a corporate leadership development program within her organization. In the longer term, she envisions founding a boutique
    consulting firm that helps mid‑size businesses improve operational efficiency while fostering inclusive workplace cultures.
