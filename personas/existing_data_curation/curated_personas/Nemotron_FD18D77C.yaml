personas:
  professional: Margarita Gomez, a budding architect‑in‑the‑making, transforms every box of building blocks into sprawling cityscapes, showcasing an innate talent for spatial reasoning, storytelling, and
    abstract design while they delight in the freedom to improvise rather than follow rigid plans.
  sports: Margarita Gomez, a tiny dynamo who gleefully sprints around the backyard while cheering for the Los Angeles Dodgers on family TV nights, they attend the ‘Mini Movers’ gymnastics club twice a week,
    and enjoy seasonal splash pads in summer, showing a playful yet enthusiastic approach to staying active.
  arts: Margarita Gomez, who spends afternoons humming Raffi’s 'Baby Beluga' while coloring scenes from Monet’s Water Lilies, they watch the animated adventures of Disney’s Frozen starring Idina Menzel,
    and proudly display hand‑drawn portraits of their favorite Sesame Street characters, letting these vibrant artistic experiences shape their vivid imagination.
  travel: Margarita Gomez, who loves spontaneous family road trips to the nearby city zoo and weekly beach outings at Sunset Bay, they daydream about future adventures to the Eiffel Tower in Paris and the
    Great Barrier Reef, preferring the comfort of familiar sandcastles now while keeping a tiny scrapbook of postcards for later wanderlust.
  culinary: Margarita Gomez, who eagerly devours buttery mac‑and‑cheese sprinkled with sharp cheddar and peas, they delight in banana slices topped with smooth peanut butter, and giggle when tasting bright
    strawberry‑kiwi fruit salads, often trying to 'cook' their own pretend meals with plastic pots and wooden spoons.
  core: Margarita Gomez is a three‑year‑old dreamer who builds imaginary cities from blocks, hoards shiny coins in a piggy bank, battles occasional eczema, and can’t resist the lure of sticker impulse buys,
    all while they thrive on spontaneous play and occasional mess‑making.
background:
  cultural: 'Margarita grows up in a vibrant Mexican‑American household in Brownsville, Texas, where Spanish and English flow together at the kitchen table. Family celebrations blend traditions: Día de
    los Muertos altars, Cinco de Mayo parades, and festive Christmas gatherings featuring tamales, posole, and pan dulce. She often wears bright embroidered dresses for festivals and enjoys tasty tacos
    from local taquerías. The close border community means she frequently hears bilingual lullabies, sees colorful papel picado decorations, and experiences the warm hospitality of extended family who visit
    from Mexico. This rich cultural tapestry nurtures her love for music, storytelling, and colorful art, shaping her sense of identity and curiosity.'
attributes:
  skills: '["bilingual (Spanish/English) basic communication","abstract drawing and color exploration","fine‑motor coordination with crayons and blocks","curiosity‑driven questioning","early rhythmic movement
    and dancing"]'
  hobbies: '["crayon drawing and color mixing","building block construction","listening to bilingual children''s songs","dancing to music","make‑believe exploration and treasure hunts","reading picture
    books about space and fantasy","outdoor sand and water play"]'
  career_goals: 'Even at three, Margarita imagines big futures: she often declares she wants to be a painter who fills the world with bright, imaginative pictures, an astronaut exploring the stars she reads
    about in picture books, or a storyteller who shares magical tales with her stuffed animal audience. Her ambitions are guided by a love of novelty, art, and the wonder of abstract ideas, and she dreams
    of growing up in a role that lets her keep creating and discovering.'
