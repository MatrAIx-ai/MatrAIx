    Infrastructure Design'', ''Mentoring and Team Leadership'']'
  hobbies: '[''Gardening'', ''Walking and Sketching in Nature'', ''Reading Historical Non‑Fiction'', ''Listening to Salsa and Bomba Music'', ''Playing Chess in a Small Group'']'
  career_goals: Approaching the twilight of his formal career, Victor aims to transition into a consulting role that lets him focus on legacy projects emphasizing climate resilience and community benefit,
    such as storm‑water upgrades in underserved Staten Island neighborhoods. He aspires to establish a scholarship fund for Puerto Rican students pursuing STEM degrees, reflecting his desire to give back
    and alleviate the stress he feels by seeing his heritage under‑represented in engineering. Additionally, he hopes to author a series of practical guidebooks on integrating sustainability into urban
    civil works, merging his curiosity for new ideas with his practical experience, while maintaining a lighter workload that supports his health and well‑being.
