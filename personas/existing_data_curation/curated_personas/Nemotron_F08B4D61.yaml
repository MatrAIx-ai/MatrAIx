personas:
  professional: Sophear Nguyen, a licensed civil engineer with deep expertise in structural design, sustainable construction, and smart‑city technologies, balances curiosity and practicality by rigorously
    applying building codes while eagerly testing modular green material innovations; they excel at stakeholder communication, mentor junior engineers with compassion, and aim to lead large‑scale urban
    infrastructure projects that embed resilience and equity, all while managing the stress of tight deadlines with a calm, organized mindset.
  sports: Sophear Nguyen spends weekend mornings hiking the Palisades cliffs, participates in a local running club that meets for 5‑kilometer loops, and supports the New York Knicks and New York Mets as
    their favorite professional teams; they also enjoy occasional pick‑up soccer games at the community center, viewing sport as both recreation and a way to stay socially connected.
  arts: Sophear Nguyen regularly attends exhibitions at the Metropolitan Museum, finds inspiration in the brushwork of Claude Monet and the storytelling of Hilary Mantel’s historical novels, and enjoys
    the performances of the New York Philharmonic featuring works by Yo‑Yo Ma’s cello collaborations; they also join a weekly book club that discusses a mix of non‑fiction urban design texts and classic
    literature, weaving artistic appreciation into their analytical mind.
  travel: Sophear Nguyen prefers thoughtfully planned journeys that combine architectural exploration with culinary discovery, having trekked the historic temples of Kyoto, sampled street food in Chiang
    Mai, and navigated the coastal trails of New Zealand’s South Island; they balance family time and budget constraints by booking off‑season flights, using travel reward points, and creating detailed
    itineraries that leave room for spontaneous garden tours in regional towns.
  culinary: Sophear Nguyen spends evenings perfecting a fragrant broth for phở, rolling delicate bánh xèo filled with locally sourced corn and shrimp, and crafting a fusion bun cha that pairs Pacific Northwest
    salmon with traditional rice noodles, all while harvesting basil, cilantro, and mint from their balcony garden to infuse fresh herbal notes into each dish.
  core: Sophear Nguyen, a 41‑year‑old civil engineer, blends meticulous project leadership with a passion for herbal‑infused cooking, yoga‑driven stress relief, and a habit of double‑checking every detail
    driven by a quiet worry that fuels both ambition and meticulousness.
background:
  cultural: Sophear is a first‑generation Vietnamese‑American whose parents immigrated to the United States after the Vietnam War. Raised in a bilingual household, she speaks both Vietnamese and English
    fluently and maintains strong ties to her heritage through family traditions, Tet celebrations, and active participation in the local Vietnamese diaspora community in Jersey City. Her cultural values
    emphasize family cohesion, respect for elders, collective responsibility, and a deep commitment to helping others, which shape both her professional collaborations and community service endeavors.
