  career_goals: Sophear aims to become a lead project manager overseeing large‑scale urban infrastructure projects that embed green building standards and smart technology. She strives to influence municipal
    planning policies to improve resilience, accessibility, and environmental performance, especially for underserved communities in the New York metropolitan area. Over the next decade she plans to obtain
    her Professional Engineer (PE) license, pursue a master’s degree in sustainable engineering, and launch a mentorship program that supports women and minorities entering the engineering field.
