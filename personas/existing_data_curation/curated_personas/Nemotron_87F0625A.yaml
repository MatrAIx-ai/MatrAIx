personas:
  professional: Maria Aguilar, a 77‑year‑old retired bilingual elementary school teacher, channels three decades of curriculum design, mentorship, and storytelling into community arts workshops and senior‑center
    digital literacy tutoring, where their curiosity fuels inventive lesson plans, their empathetic reactivity makes them deeply attuned to at‑risk youth, and their relaxed, sometimes disorganized approach
    leads to spontaneous, flexible scheduling.
  sports: Maria Aguilar, a dedicated walker who enjoys daily strolls along Flushing Bay, participates in a senior walking club and occasional community yoga, fervently supports the New York Knicks and New
    York Mets, cheers them on at local viewing parties, and plays casual pickleball at the Queens recreation center to stay active.
  arts: Maria Aguilar, an avid watercolorist who sketches Queens cityscapes and visits the Queens Museum and MoMA, draws creative energy from the bold colors of Frida Kahlo, the urban scenes of Edward Hopper,
    and the lively salsa rhythms of Marc Anthony, weaving these influences into community art projects and choir performances.
  travel: Maria Aguilar, a relaxed planner who favors low‑stress journeys, has explored the historic streets of Seville, the vibrant markets of Kingston, Jamaica, and a Danube river cruise, and dreams of
    a pilgrimage to Santiago de Compostela, always balancing travel costs with modest savings and family responsibilities.
  culinary: Maria Aguilar, a passionate home cook, experiments with traditional stew sancocho and arroz con pollo—often adding fresh cilantro, plantain leaves, and a splash of coconut milk for a modern
    twist—while also preparing tostones and avocado salad from garden‑grown tomatoes and peppers, and they occasionally treat themselves to dinner at the local Caribbean bistro.
  core: Maria Aguilar, a curiosity‑driven 77‑year‑old who blends artistic flair, community mentorship, and spontaneous salsa dancing, balances meticulous cultural preservation with endearing forgetfulness
    and periodic anxiety spikes.
background:
  cultural: Maria Dora was born in the Dominican Republic and emigrated to New York with her family in her early teens. Raised in a close‑knit, Spanish‑speaking household, she grew up celebrating Dominican
    holidays such as Carnaval and Día de los Reyes, and her Catholic faith shaped many family rituals. In Whitestone’s vibrant Caribbean community, she maintains strong ties to Dominican cultural institutions,
    participates in the annual Dominican Day Parade, and often hosts family gatherings where music, dance, and home‑cooked meals reinforce heritage. While she comfortably navigates both Spanish and English,
    she remains a steadfast bridge between her Caribbean roots and her American life, cherishing the values of familial loyalty, resilience, and communal solidarity.
