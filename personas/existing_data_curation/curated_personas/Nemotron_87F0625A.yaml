  career_goals: Although retired, Maria Dora aims to continue nurturing curiosity and cultural pride in her community. She plans to volunteer as a senior‑center mentor and arts workshop leader, write a
    memoir that weaves her Dominican roots with her Queens experiences, and launch a series of cooking classes that teach younger families traditional recipes. She also hopes to advocate for better mental‑health
    resources for older adults in the Dominican diaspora and enroll in a community‑college digital photography course to document family histories.
