  hobbies: '[''Visiting food markets'', ''Collecting spices'', ''Playing the cuatro'', ''Salsa dancing'', ''Hosting dinner gatherings'', ''Reading culinary history'', ''Watching cooking documentaries'',
    ''Herb gardening'', ''Fishing'', ''Street photography'']'
  career_goals: Gregorio aims to evolve from a line cook to the owner of a modest, community‑focused eatery—such as a food truck or a small bodega—in Miami that showcases Venezuelan street food with inventive
    twists. He seeks to win local cook‑off contests to gain recognition, and within the next five years he hopes to publish a cookbook titled "Sabores de Mi Tierra" that documents his innovative recipes.
    Additionally, he intends to mentor aspiring chefs from the Venezuelan diaspora, building a supportive network while pursuing the title of "Best Latin Fusion Chef" in regional culinary awards.
