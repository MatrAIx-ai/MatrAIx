  hobbies: '[''Gardening'', ''Traditional Honduran Cooking'', ''Bridge'', ''Chess'', ''Yoga'', ''Journaling'', ''Dancing'', ''Reading Historical Fiction'', ''Community Volunteering'']'
  career_goals: Although retired from formal teaching, Rocio aims to continue shaping education within her local Hispanic community. She plans to create a bilingual adult‑literacy curriculum and launch
    it through the Port Charlotte senior center, while also volunteering as a tutor for Spanish‑speaking seniors. Rocio seeks formal certification in stress‑management facilitation so she can lead mindfulness
    workshops for older adults, and she hopes to earn recognition through a community service award. Additionally, she aspires to write a memoir that chronicles her teaching experiences and the cultural
    bridge she has built between Honduras and the United States.
