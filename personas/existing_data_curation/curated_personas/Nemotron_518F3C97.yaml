  career_goals: Marile dreams of using her love for people and animals to make a difference. She imagines herself as a pediatric nurse who can comfort children in hospitals, or as a veterinarian who cares
    for neighborhood pets. Inspired by her curiosity about how things work, she also thinks about becoming a science teacher who can spark the same wonder in other kids. Her short‑term goal is to join the
    school science club and lead a project that helps keep the school garden healthy, laying the groundwork for her future in caring professions.
