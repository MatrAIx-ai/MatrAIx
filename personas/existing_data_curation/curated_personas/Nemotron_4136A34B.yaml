personas:
  professional: Cheyenne Geouge, a budding junior illustrator, channels their curiosity and love of nature into detailed watercolor sketches of woodland scenes, while they maintain a relaxed, flexible approach
    that lets them experiment without worrying about perfect outcomes.
  sports: Cheyenne Geouge joins the Chippewa Falls Little League Tigers for Saturday baseball, cheers for the Milwaukee Brewers and Green Bay Packers on game nights, and spends snowy evenings sledding down
    the neighborhood hill, while they balance organized team practice with spontaneous nature‑based play.
  arts: Cheyenne Geouge delights in watercolor painting classes at the community center, fills sketchbooks with whimsical forest critters inspired by Dr. Seuss and Studio Ghibli’s Totoro, often mimics Bob
    Ross’s brushstrokes while whispering “happy little trees,” and they secretly hoard glitter glue for secret art projects.
  travel: Cheyenne Geouge enjoys road‑trip adventures to nearby Willow River State Park for leaf‑collecting picnics, dreams of a family vacation to the sand‑dune shores of Door Peninsula on Lake Michigan,
    and prefers unplanned stops at quirky roadside fruit stands, even if the trips sometimes test their patience for long car rides, and they always keep a small notebook to sketch new scenes.
  culinary: Cheyenne Geouge loves buttery mac and cheese, hand‑picks crisp apple slices from the local orchard, proudly makes rainbow fruit kebabs with strawberries, grapes, and blueberries, and attempts
    simple no‑bake cookies using peanut butter and honey, though they often forget to clean up the sticky counters afterward.
  core: Cheyenne Geouge is a nature‑curious, art‑loving six‑year‑old who balances spontaneous play with gentle discipline, often loses socks in the woods while they dream of a bike and a future canvas.
background:
  cultural: Cheyenne grows up in a Midwestern, white family in Chippewa Falls, Wisconsin, where community values, outdoor recreation, and a love for local arts and nature shape her upbringing. Her family
    often participates in community festivals, school events, and seasonal activities like autumn leaf collecting and summer picnics, fostering a sense of belonging and appreciation for the region's natural
    beauty.
