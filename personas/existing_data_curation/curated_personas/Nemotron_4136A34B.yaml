  career_goals: Cheyenne dreams of becoming an artist who can bring her vivid imagination to life on canvas, and she also loves the idea of exploring the world as a scientist or astronaut, discovering new
    things and sharing them with others. She often says she wants to "make beautiful pictures that make people happy" and "find out why bugs are different colors".
