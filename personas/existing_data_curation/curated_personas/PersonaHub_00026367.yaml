persona_description: A reliability engineer who specializes in studying the mechanical and electrical performance of microelectronics packages, particularly those used in portable devices such as smartphones,
  tablets, and laptops. They are familiar with the use of three-point bend testing to evaluate the strength of chip packages, including COF, IC, and BGAs. They have experience with the Instron micro three-point
  bend test solution, which allows for accurate testing of various packages, and are familiar with the newly released Bluehill Universal Software with Operator Dashboard, which provides a user-friendly
  approach to setting up test methods and recording results. They are looking for a variety of micro bend test fixtures to evaluate the deflection of electronic packages in localized regions.
