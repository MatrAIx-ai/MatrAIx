  career_goals: Neil aims to transition his practical skill set into a part‑time handyman business that serves the Flat Rock and greater DeKalb County area, allowing him to blend his love for hands‑on work
    with his desire to help neighbors. He plans to enroll in a local trade program or obtain certification in residential carpentry and HVAC basics to formalize his expertise. While maintaining his current
    lifestyle, he hopes to gradually increase his client base, eventually offering specialized services like custom woodworking pieces. Alongside his professional aspirations, Neil is interested in mentoring
    younger community members through workshops at the local community center, sharing his knowledge of basic repairs and project management.
