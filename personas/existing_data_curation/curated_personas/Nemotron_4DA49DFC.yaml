personas:
  professional: Neil Potu is an aspiring part‑time handyman who blends his solid automotive maintenance know‑how, carpentry and woodworking craftsmanship, and home‑network troubleshooting into reliable,
    neighbor‑focused services, while his balanced curiosity and practical mindset keep him open to new trade techniques without compromising his steady, organized work ethic.
  sports: Neil Potu enjoys weekend hikes in the Appalachian foothills, early‑morning fishing trips, follows the Atlanta Braves and the Alabama Crimson Tide with devoted fanfare, and participates in the
    Flat Rock Outdoor Club that organizes monthly bike rides and a community softball league where they play third base.
  arts: Neil Potu spends evenings swapping playlists featuring Chris Stapleton, Sturgill Simpson, and traditional Appalachian fiddle tunes, attends the annual Carolina Folk Festival to admire the Avett
    Brothers, and volunteers at the local community theater, often helping build sets while appreciating films starring Robert Duvall and Meryl Streep.
  travel: Neil Potu favors low‑key road trips that blend scenic drives along the Blue Ridge Parkway with visits to historic towns like Charleston and Savannah, has already explored Great Smoky Mountains
    National Park on a solo hiking adventure, and dreams of a longer journey to the Scottish Highlands to trace the roots of early American settlers.
  culinary: Neil Potu’s comfort‑food repertoire centers on crispy fried catfish, buttery biscuits, and peach cobbler spiced with cinnamon, and while they consider themselves an adept home cook who can coax
    a perfect gravy from scratch, they frequently over‑salt their dishes and love experimenting with jalapeño‑infused hush‑puppies and locally sourced collard greens.
  core: Neil Potu blends small‑town humility with restless curiosity, turning wood shavings into gifts, hoarding receipts for every purchase, and never missing a sunrise fishing trip even after a late night
    at the local fiddlers’ jam.
background:
  cultural: Neil was raised in a white, Southern family rooted in the traditions of rural Alabama. His upbringing emphasized self‑reliance, hospitality, and a respect for community and family ties. He grew
    up attending local church gatherings, participating in seasonal events like harvest festivals, and enjoying regional cuisine such as fried catfish, biscuits, and peach cobbler. While valuing these traditions,
    Neil also embraces the evolving cultural landscape of Flat Rock, engaging with a diverse set of neighbors through volunteer work and community projects. His background blends a reverence for Southern
    heritage with an openness to new ideas and practical innovation.
