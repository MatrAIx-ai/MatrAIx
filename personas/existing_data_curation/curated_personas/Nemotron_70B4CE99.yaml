  career_goals: Cristina aims to transition into an HR Director or Vice President of People role within the next five years, leveraging her analytical mindset to lead a data-driven HR transformation. She
    is passionate about building inclusive workplace cultures, expanding DEI programs, and integrating innovative talent development frameworks. Additionally, she aspires to mentor emerging HR professionals
    and potentially launch a consulting practice focused on strategic HR solutions for tech-driven organizations in the Northern Virginia corridor.
