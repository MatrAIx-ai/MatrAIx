  career_goals: Katie aims to advance to an HR Manager or Director position within the next three to five years, where she can lead a team, drive strategic workforce planning, and champion comprehensive
    employee mental‑health initiatives. She plans to obtain her SHRM‑CP certification, spearhead a company‑wide HR technology upgrade, and mentor junior HR professionals. Additionally, she aspires to develop
    a robust employee assistance program that offers resources for anxiety and stress management, drawing on her personal experiences to create a supportive workplace culture.
