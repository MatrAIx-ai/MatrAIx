personas:
  professional: Katie Haslacker, a meticulous HR specialist with deep expertise in employee relations, recruitment, benefits administration and HRIS implementation, uses their methodical, structured mindset
    to streamline compliance, design data‑driven workforce plans, and competitively champion employee‑wellness programs that reflect their personal battle with anxiety.
  sports: Katie Haslacker plays competitive tennis at the Pikes Peak Tennis Club, regularly hikes the Colorado Springs foothills with a structured weekly schedule, and roots for the Colorado Springs Switchbacks
    FC during the soccer season, blending social sport with disciplined fitness.
  arts: Katie Haslacker enjoys swing dancing to the big band sounds of Count Basie, attends Colorado Springs Philharmonic concerts featuring Beethoven, and participates in a book club that reads contemporary
    novels by Ann Patchett and Margaret Atwood, weaving music, literature, and community dance into their social life.
  travel: Katie Haslacker plans meticulously organized road trips to destinations like Aspen, Banff and Santa Fe, favors scenic mountain drives and budget‑friendly lodgings, and dreams of a leisurely Mediterranean
    cruise after retirement, balancing adventure with structured itineraries.
  culinary: Katie Haslacker, a proficient home cook, delights in crafting hearty quinoa‑vegetable stew, rosemary‑roasted chicken with garden‑fresh tomatoes, carrots, and kale, and a signature chili served
    at neighborhood potlucks, showcasing their love for nutritious, convivial meals.
  core: Katie Haslacker blends an organized, competitive mindset with a sociable, anxiety‑driven focus on structure, channeling their energy into methodical HR work, regular hikes, yoga, and bustling potluck
    gatherings, while occasionally overcommitting to social obligations.
background:
  cultural: Katie is a White American of German and Irish ancestry, raised in a Midwestern, middle‑class community that emphasized hard work, self‑reliance, and community service. After moving to Colorado
    Springs, she embraced the region's active, outdoors‑focused lifestyle while retaining her Midwestern values of reliability, practicality, and structured planning. She identifies with broader American
    cultural themes of individual achievement and competitiveness, yet she actively participates in local traditions such as the Colorado State Fair and mountain festivals, and volunteers in community initiatives
    that reflect her commitment to service.
