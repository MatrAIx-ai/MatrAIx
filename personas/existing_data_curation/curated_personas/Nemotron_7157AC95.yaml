personas:
  professional: Leona Obriant, a full‑stack web developer, blends a relentless curiosity for emerging tech with a practical delivery mindset, leveraging React, Node.js, TypeScript, Docker, and rigorous
    CI/CD pipelines while channeling a competitive, detail‑oriented nature to champion accessibility and performance standards in every project.
  sports: Leona Obriant, a solo hiker on the Appalachian Trail and member of the Charleston Hiking Society, complements trail runs with weekend yoga at a local studio, roots for the Charleston Battery soccer
    team and the South Carolina Gamecocks during football season, and participates in a monthly “Catan‑and‑Climb” board‑game night that keeps their strategic mind sharp.
  arts: Leona Obriant finds inspiration in the stark landscapes captured by Ansel Adams, unwinds listening to Tycho’s ambient electronica while coding, and indulges in board‑game evenings featuring titles
    like Azul and Terraforming Mars, all of which feed the sci‑fi narratives of Neal Stephenson that dominate their reading list.
  travel: Leona Obriant prefers meticulously planned micro‑adventures, such as a two‑day trek through the Blue Ridge Parkway in Virginia, a weekend photo‑expedition to the cliffs of Acadia National Park,
    and a dream to hike New Zealand’s Milford Track, balancing the desire for solitude with budget constraints that keep international travel on a wish list rather than a frequent reality.
  culinary: Leona Obriant experiments with farm‑to‑table cooking, perfecting dishes like roasted heirloom beet salad with goat cheese, wild mushroom risotto flavored with thyme and sage, and hand‑crafted
    sourdough loaf, while their curiosity drives them to tinker with sous‑vide setups, though they sometimes over‑season in an attempt to “make it pop” as they binge‑watch cooking shows.
  core: Leona Obriant is a competitively curious full‑stack developer who channels their love of solitary hikes, precise budgeting, and methodical problem‑solving into a life of code, photography, and farm‑to‑table
    experiments—though they sometimes get lost in endless spreadsheet tweaks and over‑seasoned sauces.
background:
  cultural: Leona was raised in a small, close‑knit community in Lincoln County, West Virginia, where her family’s roots trace back to Irish and German settlers who have lived in the Appalachian region
    for generations. Her upbringing emphasized self‑reliance, a strong work ethic, and a deep appreciation for the outdoors, traditions that continue to shape her values. While she grew up attending local
    community events and family gatherings centered around homemade meals and folk music, she also gravitated toward technology early on, pursuing a STEM degree and joining Charleston’s emerging tech scene.
    Today, she blends the modest, community‑focused ethos of her Appalachian heritage with the innovative, collaborative culture of modern web development, and actively participates in regional women‑in‑tech
    meetups.
