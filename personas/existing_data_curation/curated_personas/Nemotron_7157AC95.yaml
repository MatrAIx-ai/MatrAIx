  career_goals: Leona aims to evolve from a hands‑on full‑stack developer to a technical leader within the next five years. She seeks a senior‑engineer or lead‑engineer role where she can architect scalable
    web platforms, integrate progressive technologies such as AI‑enhanced user experiences, and champion accessibility and performance standards. Driven by a competitive spirit, she plans to contribute
    to high‑impact open‑source projects and publish technical articles that showcase innovative solutions. Leona also aspires to mentor junior developers—particularly women entering tech—in her community,
    fostering a supportive network while positioning herself for eventual responsibilities as a principal architect or CTO of a mid‑size software company.
