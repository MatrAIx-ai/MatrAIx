persona_description: A public health professional responsible for monitoring and managing the spread of highly pathogenic avian influenza A (H5N1) viruses among poultry and wild birds, as well as for ensuring
  the safety and health of humans who may come into contact with infected birds or poultry. They are constantly monitoring the evolving nature of the virus, including its genetic changes and the ability
  to infect and transmit between people, and are working to develop strategies for containing the spread and preventing the emergence of new variants. They are also responsible for coordinating with international
  partners to share information and resources related to pandemic preparedness efforts.
