personas:
  professional: Angela Alli, a 13‑year‑old budding game strategist and LEGO architect at her middle school, channels her curiosity and practical mindset into dissecting video‑game mechanics, leading a peer‑run
    game‑design club, and building intricate LEGO models that double as mini engineering projects, all while tolerating a relaxed attitude toward schedules that sometimes leaves projects half‑finished.
  sports: Angela Alli competes on the East Providence Firebirds U‑14 soccer team, cycles the Blackstone River trail on weekends, and cheers for the New England Revolution and Boston Red Sox, preferring
    high‑energy play and a competitive edge over casual pick‑up games, though they stay calm under pressure and rarely get discouraged by a loss.
  arts: Angela Alli dives into science‑fiction novels by Isaac Asimov and N. K. Jemisin, writes short stories peppered with realistic scientific details, listens to video‑game composer Nobuo Uematsu and
    indie band Imagine Dragons, and admires LEGO artist Nathan Sawaya, while occasionally attending local screenings of Studio Ghibli films and the Providence Children’s Museum exhibitions.
  travel: Angela Alli loves spontaneous family road trips to Block Island and Mystic, Connecticut, has visited Washington, D.C.’s Smithsonian museums, and dreams of attending the Tokyo Game Show in Japan,
    favoring a mix of planned landmarks and unstructured exploration, though they often rely on their parents’ budget constraints to shape itinerary choices.
  culinary: Angela Alli enjoys pepperoni pizza, sushi rolls—especially California rolls with avocado and cucumber—and whipping up mini LEGO‑themed cupcakes iced with chocolate ganache and rainbow sprinkles,
    mastering simple dishes like scrambled eggs while rarely tackling full‑course meals, and they favor cheese, chocolate, and fresh strawberries as go‑to ingredients.
  core: Angela Alli, a fiercely curious 13‑year‑old who blends strategic gaming, LEGO engineering, and animal‑shelter volunteerism into a competitive yet laid‑back lifestyle punctuated by spontaneous spending
    sprees and occasional disorganization.
background:
  cultural: Angela's cultural background is rooted in Anglo‑American traditions typical of suburban Providence County, Rhode Island. She grew up in a middle‑class family that values education, community
    involvement, and seasonal celebrations such as local Fourth of July parades and harvest festivals. Her household embraces a blend of New England customs, including a love for coastal activities and
    a strong emphasis on civic responsibility, which is reflected in her volunteer work and participation in school and community events.
