  career_goals: Angela aims to pursue a career that merges technology and problem solving. She envisions herself studying computer science or engineering in college, hoping to develop innovative software
    solutions that address real‑world challenges, such as environmental monitoring tools. She is motivated to compete in regional coding competitions and eventually intern at a tech firm, where she can
    apply her practical skills to collaborative projects. Long‑term, she aspires to lead a development team that creates user‑friendly applications that make everyday life more efficient.
