  hobbies: '["gardening","birdwatching","fishing","boating","reading historical non-fiction","reading mystery novels","bridge card game","woodworking","volunteering at food bank","walking in wetlands"]'
  career_goals: Looking ahead, Michael aims to transition from full-time stocking to a part-time mentorship role where he can share his practical knowledge with younger workers while maintaining a flexible
    schedule. He hopes to deepen his involvement with the local senior center, leading a weekly 'Handyman Help' session for neighbors who need assistance with small repairs or moving items. He also wants
    to become proficient in modern digital inventory software, learning at his own pace to stay relevant. Ultimately, his ambition is to combine his work experience with his compassionate nature to continue
    serving his community, preserve his independence, and create a lasting, supportive network for fellow retirees.
