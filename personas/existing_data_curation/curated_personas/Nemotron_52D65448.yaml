  hobbies: '["Watercolor painting", "Sketching", "Gardening", "Visiting art museums and galleries", "Reading literary fiction and art history", "Book club participation", "Volunteer work at the local library",
    "Community theater involvement", "Knitting and quilting", "Birdwatching", "Crossword puzzles", "Learning pottery"]'
  career_goals: Although retired, Piper aims to leave a lasting legacy by curating a traveling exhibit of senior artists from Chautauqua County, mentoring younger volunteers in both arts and local history,
    and compiling a memoir that weaves together personal stories with the region's cultural heritage. She also aspires to learn digital photography to enhance her archival work and to continue attending
    workshops that broaden her artistic perspective.
