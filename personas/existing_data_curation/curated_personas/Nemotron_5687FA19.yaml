personas:
  professional: Michelle Sullivan, a budding illustrator and aspiring storyteller, blends watercolor sketches of Nebraska’s prairie landscapes with digital illustrations on Scratch, channeling curiosity
    and a meticulous balance of organization and flexibility into school art club projects, and they often share their work online for peer feedback.
  sports: Michelle Sullivan, a nature‑oriented casual athlete, enjoys weekend bird‑watching hikes on the Nebraska prairie, participates in the school’s after‑school run‑club, and they cheer enthusiastically
    for the Nebraska Cornhuskers football team while occasionally joining a local youth soccer league for fun.
  arts: Michelle Sullivan, an enthusiastic young visual creator, spends hours experimenting with watercolor in the style of Claude Monet, studies the vibrant color palettes of Mary Blair, watches Studio
    Ghibli films by Hayao Miyazaki for storytelling cues, and they also play simple piano pieces by Ludwig van Beethoven to unwind.
  travel: Michelle Sullivan, an imaginative wanderer, loves exploring the wide‑open Nebraska prairie and has dreamed of visiting the towering cliffs of the Badlands and the luminous galleries of the Louvre
    in Paris, yet they prefer short road trips to nearby state parks where they can collect pressed flowers for art, balancing their love of adventure with a modest family budget.
  culinary: Michelle Sullivan, a budding home chef, enjoys crafting strawberry‑shortcake sandwiches and experimenting with herb‑infused avocado toast using fresh basil and mint from the garden, and they
    also savor classic grilled cheese with a sprinkle of smoked paprika, reflecting a playful palate and modest cooking skills.
  core: Michelle Sullivan, a curious, solitary sketch‑artist who balances diligent saving for art supplies with occasional late‑night drawing marathons, turns prairie walks into watercolor inspiration,
    and they occasionally neglect sleep and chores, showcasing a blend of disciplined creativity and teenage quirks.
background:
  cultural: Michelle was raised in a white, Midwestern family in Ceresco, Nebraska, with roots in Irish and German ancestry typical of the region. The small‑town environment emphasizes community involvement,
    modesty, and a strong work ethic, values reinforced by her parents and local school. She grew up participating in community events such as the county fair, library reading programs, and a youth art
    club at the town community center. The rural setting nurtured her appreciation for nature and agriculture, while her school and family encouraged curiosity, artistic expression, and academic responsibility.
    This blend of traditional Midwestern community values and exposure to contemporary art and technology shapes her cultural identity.
