  hobbies: '[''drawing'', ''watercolor painting'', ''digital illustration'', ''reading fantasy and science-fiction books'', ''nature walks and bird watching'', ''basic Scratch coding'', ''creative writing'',
    ''playing piano'', ''visiting art museums'', ''collecting pressed flowers'']'
  career_goals: She aspires to become a professional visual artist or illustrator, dreaming of creating children's books, graphic novels, or animated stories that blend imaginative worlds with thoughtful
    messages. Michelle also imagines a future in museum curation or art education, where she could share her love of art and history with others. Long‑term, she hopes to study graphic or environmental design,
    using her creative talents to address social and ecological challenges. She wants to give back to her community by leading youth art workshops and possibly establishing a small art collective for peers
    in Ceresco.
