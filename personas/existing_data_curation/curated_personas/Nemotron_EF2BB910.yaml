  hobbies: '["Reading non-fiction (economics, science, history)", "Hiking local trails", "Cycling on Madison bike paths", "Nature photography", "Woodworking", "Home brewing", "Solving puzzles (Sudoku, chess)",
    "Gardening", "Data analysis projects (personal interest)"]'
  career_goals: Timothy aims to become a senior partner at his advisory firm, eventually launching his own boutique practice focused on serving STEM professionals and tech entrepreneurs in the Madison area.
    He plans to earn the CFP® and CFA designations to deepen his expertise, publish a quarterly column on data-driven financial planning, and develop a proprietary risk-assessment framework that leverages
    his programming skills. He also seeks to mentor junior advisors, while preserving a balanced schedule that allows for his personal pursuits.
