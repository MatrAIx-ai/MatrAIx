personas:
  professional: Thomas Hunter is a budding wildlife storyteller who channels his love for adventure books, detailed animal sketches, and LEGO constructions into early practice of narration and visual design,
    and they apply their preference for structure by meticulously mapping out storyboards while remaining flexible enough to improvise plot twists.
  sports: Thomas Hunter enjoys youth soccer with the Riverside Rovers during the fall, cheers on the hometown baseball team the City Hawks, and they also love fishing trips with dad on Lake Silver, balancing
    organized team practices with spontaneous outdoor recreation.
  arts: Thomas Hunter finds inspiration in wildlife artist John James Audubon, enjoys listening to the melodic arrangements of The Piano Guys, and they spend weekends drawing animal sketches while occasionally
    watching animated adventures starring actor Chris Pratt.
  travel: Thomas Hunter loves family road trips to nearby state parks like Redwood Forest, has visited the county fair in Springfield, and they dream of exploring Yellowstone National Park’s geysers and
    the ancient castles of Scotland during future school field trips.
  culinary: Thomas Hunter prefers classic kid‑friendly meals like cheesy macaroni, enjoys assembling homemade turkey sandwiches with lettuce and mustard, and they delight in the sweet taste of blueberry
    pancakes topped with maple syrup, often helping whisk batter.
  core: Thomas Hunter is a solitary, puzzle‑loving eight‑year‑old who meticulously builds LEGO worlds, keeps a secret stash of candy, and secretly forgets to tidy up their art supplies after each adventure.
background:
  cultural: Thomas grew up in Frenchburg, a small town nestled in the Appalachian region of eastern Kentucky. His family reflects a traditional, white, rural Appalachian heritage, characterized by strong
    ties to church, community events such as county fairs, and a close‑knit extended family. The local culture emphasizes self‑reliance, hospitality, and respect for nature, which shapes his appreciation
    for outdoor activities like fishing and gardening. While his household maintains conservative values and a sense of modesty, Thomas also benefits from the supportive school environment typical of Menifee
    County, which encourages practical learning and community involvement.
attributes:
  skills: '[''Reading'', ''Basic arithmetic'', ''Following instructions'', ''LEGO building'', ''Simple woodworking'', ''Pet care'', ''Garden chores'', ''Digital literacy'']'
  hobbies: '[''Reading adventure books'', ''Drawing wildlife'', ''Puzzle games on tablet'', ''LEGO building'', ''Board games'', ''Fishing with dad'', ''Attending Sunday school'']'
  career_goals: Thomas dreams of becoming a firefighter because he is attracted to the clear routines, teamwork, and the chance to help his community in tangible ways. He also imagines himself as a veterinarian,
    inspired by his love for the family dog and other animals. He expresses a desire to attend a high school with a strong trade program and eventually enroll in an apprenticeship for emergency services
    or animal care.
