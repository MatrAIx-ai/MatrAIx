  career_goals: Silvia dreams of a future where she can help others in a structured and caring environment. She often talks about becoming a teacher because she likes the idea of organizing a classroom,
    creating predictable lesson plans, and supporting classmates in understanding new concepts. She also expresses interest in becoming a veterinarian, imagining a calm, orderly setting where she can care
    for animals with kindness and precision. Ultimately, she hopes to contribute to a harmonious community by combining her love for order with her desire to help others.
