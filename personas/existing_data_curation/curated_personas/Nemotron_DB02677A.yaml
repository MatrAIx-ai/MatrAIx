personas:
  professional: Silvia Kedzierski is a budding LEGO architect who meticulously follows step‑by‑step building manuals, enjoys simple science experiment kits, and envisions herself as a future engineer, and
    they keep all their creations neatly sorted by color and size.
  sports: Silvia Kedzierski is a member of the Campbell Little League baseball team, attends weekly swimming lessons at the community pool, and cheers enthusiastically for the San Jose Sharks while they
    participate in a seasonal youth soccer clinic with the local club.
  arts: Silvia Kedzierski delights in drawing with color‑by‑number kits, reads picture books by Dr. Seuss and early chapter adventures, listens to classic Disney soundtracks and Polish folk music during
    family gatherings, and they often perform impromptu storytelling sessions for their rabbit.
  travel: Silvia Kedzierski has explored the Monterey Bay Aquarium, enjoyed a weekend snow‑play adventure at Lake Tahoe, and dreams of visiting the historic castles of Europe, preferring trips that follow
    a clear itinerary with scheduled nature walks and designated snack breaks, and they always bring a small notebook to sketch observations.
  culinary: Silvia Kedzierski enjoys helping bake pierogi with family for holidays, savors macaroni and cheese with hidden veggies, loves strawberry‑banana smoothies, and they often arrange their meals
    into colorful bento‑style boxes that highlight each ingredient separately.
  core: Silvia Kedzierski is a methodical seven‑year‑old who thrives on routines, loves color‑by‑number artwork, meticulously organizes their toys, and can get a brief temper when a LEGO piece doesn’t fit
    as expected.
background:
  cultural: Silvia comes from a white American family with roots in Polish heritage, reflected in occasional family traditions such as baking pierogi during holidays and listening to Polish folk music.
    Growing up in Campbell, California, she experiences a culturally diverse suburban environment, attending a public elementary school that celebrates multicultural events and encourages inclusivity. Her
    family places a strong emphasis on education, community involvement, and maintaining an orderly home, values that align closely with Silvia's own preference for structure, predictability, and harmonious
    relationships.
