  hobbies: '[''Gardening'', ''Knitting and crocheting'', ''Church choir participation'', ''Community outreach'', ''Cooking soul‑food recipes'', ''Reading historical fiction'', ''Listening to R&B and gospel
    music'', ''Walking in local parks'', ''Playing bingo at senior center'']'
  career_goals: Gerica hopes to formalize her extensive experience by obtaining a Certified Nursing Assistant (CNA) credential within the next year, which would allow her to take on more clinical responsibilities
    and mentor newer staff. She aspires to become a lead nursing assistant or a patient‑care coordinator at her current facility, where she can help design and maintain consistent care routines for residents.
    Maintaining a stable and predictable work schedule is essential for her, so she prefers part‑time or shift work that balances her need for routine with occasional flexibility. Additionally, she dreams
    of eventually starting a small community‑based home‑care service that offers culturally sensitive support to senior members of the local Black community.
