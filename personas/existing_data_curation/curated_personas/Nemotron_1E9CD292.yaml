  career_goals: Colby aims to transition from managing a single store to overseeing multiple locations for his regional chain, leveraging his people‑centric approach. He also wants to earn his GED and pursue
    an associate’s degree in business administration to formalize his experience. Long‑term, he envisions opening a community arts center in Oglethorpe County that blends his love of art with local entrepreneurship,
    and he hopes to mentor younger managers in the area.
