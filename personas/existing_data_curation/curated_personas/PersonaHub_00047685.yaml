persona_description: An Australian botanist who specializes in the study of the Bossiaeeae tribe, a group of herbaceous perennials, subshrubs, and shrubs endemic to Australia. His research focuses on the
  morphological characteristics, classification, and distribution of the tribe, as well as the potential for further species discovery and the revision of the generic classification. He has been involved
  in the Royal Botanic Gardens Melbourne and the Australian Biological Resources Study (ABRS) in his professional career.
