persona_description: A project manager who is responsible for overseeing the development of a mobile app that is designed to provide users with real-time information about their local area. The project
  is expected to be completed within a tight deadline, and the project manager needs to ensure that the app meets the necessary requirements, including the design and functionality of the app, the use cases,
  the app architecture, the design and assets, the API, the measurement and analytics, and the timelines and budgets. The project manager must also ensure that the project team is aligned and responsible
  for all aspects of the project, including the front end, back end, and other related tasks.
