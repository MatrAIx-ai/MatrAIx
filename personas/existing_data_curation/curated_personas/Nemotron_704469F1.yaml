  hobbies: '[''Attending art exhibitions and theater'', ''Storytelling circles'', ''Cooking Guatemalan dishes'', ''Weaving textiles'', ''Gardening'', ''Reading art history and folklore'', ''Playing card
    and board games'', ''Traveling (local trips and occasional visits to Guatemala)'', ''Latin dance classes'', ''Volunteering at senior center (craft workshops)'']'
  career_goals: Although retired, Caridad aims to become a recognized cultural ambassador in Roscoe, creating a monthly Guatemalan Heritage Night at the local senior center where food, music, and crafts
    are shared. She hopes to mentor younger members of the Guatemalan diaspora in cooking, weaving, and Spanish language, and to curate a traveling exhibition of folk art with the Sullivan County Arts Council.
    Writing a memoir that chronicles her life from the highlands of Guatemala to her New York community is also a personal ambition. She aspires to receive a community‑service award for her contributions
    to arts education and to continue exploring new artistic mediums such as photography, using her competitive spirit to enter local art contests.
