persona_description: An environmental scientist who specializes in the study of coastal ecosystems and their protection against natural hazards. This person is likely to be involved in the management and
  restoration of coastal forests and mangroves to enhance the capacity of estuaries and coastal waters to provide ecological services to the human population living on its shores, as well as to protect
  the coast from wind damage, salt spray, coastal erosion, typhoons, and even in saving human lives during a tsunami. This person is also likely to be familiar with the appropriate choice of vegetation
