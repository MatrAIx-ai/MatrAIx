personas:
  professional: Kevin Chisholm, a meticulous aspiring carpenter with a strong background in hands‑on woodworking and systematic problem‑solving, leverages their disciplined organization and pragmatic curiosity
    to design and execute home‑improvement projects with exacting standards, while remaining skeptical of shortcuts and aiming to secure a carpentry trade certification to launch a small, locally‑focused
    business.
  sports: Kevin Chisholm enjoys low‑impact outdoor activities such as weekend fishing trips on the Susquehanna River and seasonal hikes with the local Appalachian Trail club, while cheering on the Pittsburgh
    Steelers and they keep a modest routine of weight‑training at the community recreation center to maintain functional strength.
  arts: Kevin Chisholm finds leisure in building detailed model railroad layouts while listening to the folk storytelling of Joanie Madden and the acoustic guitar work of Tommy Emmanuel, and they regularly
    visit the local heritage museum to admire historic Pennsylvania German woodworking exhibits.
  travel: Kevin Chisholm prefers budget‑friendly road trips, meticulously planning itineraries on Excel, and they have explored the Pennsylvania countryside and the historic streets of Williamsburg, Virginia,
    while dreaming of a hands‑on apprenticeship tour of the timber‑frame workshops in Black Forest, Germany.
  culinary: Kevin Chisholm’s culinary routine centers on hearty, home‑cooked fare—such as skillet‑seared trout with lemon‑butter, pork and sauerkraut skillet, and homemade apple crumble—reflecting their
    solid (though not gourmet) cooking skills and a preference for simple, locally sourced ingredients, and they often pair meals with a cold craft beer.
  core: Kevin Chisholm combines a relentless spreadsheet‑obsessed discipline with a solitary love for model railroads, often over‑planning projects to the point of procrastination while they still manage
    to sneak in late‑night strategy gaming sessions.
background:
  cultural: Kevin hails from a predominantly white, rural community in Cecil, Washington County, Pennsylvania. His family roots trace back to Northern European ancestors—primarily Irish and German—who settled
    in the Appalachian region generations ago. The local culture emphasizes self‑reliance, frugality, and a strong work ethic, values that have shaped his pragmatic outlook. Community life revolves around
    small gatherings, church events, and seasonal outdoor activities, reinforcing his preference for intimate social settings and a reverence for tradition combined with modest openness to new ideas.
attributes:
