  hobbies: '[''Woodworking'', ''Fishing'', ''Hiking'', ''Model Railroad Building'', ''Reading Non-Fiction (Engineering, History)'', ''Strategic Video Gaming'']'
  career_goals: Kevin aims to secure a trade certification—preferably in carpentry or electrical work—to transition from his current hiatus into a stable, self‑directed career that leverages his disciplined
    work ethic. He envisions eventually launching a small‑scale home‑improvement business that allows him to apply his practical skills, maintain high standards, and compete for local contracts. Building
    a reliable income stream is a priority as he plans for long‑term family security, and he intends to gradually expand his technical expertise through evening courses and hands‑on apprenticeships.
