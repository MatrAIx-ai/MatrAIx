  hobbies: '["Acoustic guitar", "Hiking", "Community theater", "Debate club", "Video gaming", "Woodworking", "Cooking", "Photography", "Podcast listening"]'
  career_goals: Austin aims to complete a Bachelor’s degree in Business Administration with a concentration in Marketing or Community Development, building on his current coursework at a regional college.
    He envisions a career where he can blend his sociable nature and practical mindset by leading outreach programs for a regional agricultural cooperative or a non‑profit focused on sustainable farming.
    In the longer term, he hopes to launch his own agritourism venture that showcases Minnesota’s rural heritage while providing educational experiences for visitors. He is also interested in gaining experience
    in digital marketing and event management to broaden his skill set.
