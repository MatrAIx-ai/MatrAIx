personas:
  professional: An aspiring community outreach coordinator, Austin Demarino leverages their organized, methodical approach, strong public speaking and event planning skills, and sociable, talkative nature
    to design and promote sustainable agritourism programs while effortlessly captivating audiences and rallying volunteers.
  sports: An outdoor enthusiast, Austin Demarino roots for the Minnesota Twins and the Minnesota Wild, runs with the Morris Trail Running Club in spring, joins pickup basketball games at the college gym
    during winter, and balances these activities with weekend hikes in local forests while sometimes skipping leg day workouts after busy event planning weeks.
  arts: As a versatile creator, Austin Demarino strums acoustic covers of John Denver and Ed Sheeran at community coffeehouses, acts in and stages set designs for local theater productions, draws inspiration
    from Lin-Manuel Miranda's storytelling, and curates a shared Spotify playlist featuring Mumford & Sons to foster a collaborative vibe among friends.
  travel: Fueled by curiosity and a modest student budget, Austin Demarino has backpacked the Boundary Waters, visited Duluth's North Shore, dreams of exploring Iceland's volcanic terrain and New Zealand's
    vineyards, prefers spontaneous road trips with friends over rigid itineraries, and often chooses hostels or Airbnb rooms to stretch every dollar.
  culinary: In the kitchen, Austin Demarino enjoys medium-skill experiments like pan-seared walleye with corn succotash and wild rice pilaf, incorporates locally sourced honey, blueberries, and heirloom
    carrots, and frequently adds a dash of smoked paprika to honey-glazed oat pancakes for a unique twist.
  core: Austin Demarino blends organized curiosity with gregarious energy, turning community theater rehearsals, acoustic guitar sessions, and sustainable marketing plans into a lively tapestry of teamwork,
    occasional spreadsheet procrastination, and a habit of humming folk tunes while budgeting.
background:
  cultural: Austin grew up in Morris, Minnesota, a small Midwestern town with deep agricultural roots. His family’s ancestry includes German and Scandinavian immigrants who settled the region in the late
    19th century. The community’s emphasis on cooperation, modesty, and “Minnesota nice” hospitality shaped his values of kindness, reliability, and harmony. He was raised in a Lutheran household, celebrating
    traditional holidays and participating in local events such as the county fair and volunteer clean‑up days. This cultural milieu combined with the rural environment influences his appreciation for community
    service, outdoor activities, and the practicality of sustainable living.
attributes:
  skills: '["Public speaking", "Event planning", "Project management", "Team coordination", "Social media marketing", "Data analysis (Excel)", "Customer service", "Basic agricultural economics", "Set design
