background:
  cultural: Ignacio was born to Guatemalan parents who preserve their cultural heritage while living in West Palm Beach, Florida. The household speaks both Spanish and English, celebrates Guatemalan holidays
    such as Dia de la Independencia (September 15) and Dia de Los Muertos, and incorporates traditional foods like tamales and atole into family meals. He is exposed to the vibrant multicultural environment
    of Palm Beach County, attending community events that blend Caribbean, Latin American, and Southern US influences. This dual cultural immersion shapes his identity, providing a strong sense of family
    cohesion, respect for tradition, and openness to the diverse world around him.
