personas:
  professional: Johnny Gomez, a nine‑year‑old aspiring inventor, channels their curiosity and practical mindset into building elaborate LEGO structures, designing sprawling Minecraft worlds, and conducting
    quick vinegar‑baking‑soda rockets, yet often abandons plans mid‑project because they resist rigid schedules.
  sports: Johnny Gomez kicks the ball for the Rochester Youth Soccer Club, idolizes Manchester United midfielders, roots for the Rochester Americans during hockey season, and prefers spontaneous backyard
    games over regimented practice, reflecting their love of teamwork and flexible approach to fitness.
  arts: Johnny Gomez spends afternoons sketching original comic strips inspired by Marvel heroes, devouring adventure novels by Rick Riordan, and blasting Imagine Dragons while dancing in the kitchen, weaving
    these influences into a vibrant, imaginative personal style.
  travel: Johnny Gomez loves spontaneous family road trips to nearby Niagara Falls and the Adirondacks, dreams of exploring Disney World’s Magic Kingdom and the Grand Canyon, and often sketches travel itineraries
    in his notebook, balancing a limited allowance with big‑screen adventure fantasies.
  culinary: Johnny Gomez enjoys helping prepare pepperoni pizza, cheesy quesadillas, and chocolate‑chip pancakes on weekends, proudly mastering the art of flipping a pancake and sprinkling shredded cheese,
    though they sometimes sneak extra chocolate chips when no one’s watching.
  core: Johnny Gomez is a curious, spontaneous nine‑year‑old who blends LEGO engineering, soccer, and comic art into a lively imagination while juggling a playful approach to money and occasional allergy
    hiccups.
background:
  cultural: Johnny grows up in a middle‑class, suburban neighborhood of Rochester, New York, attending a public elementary school. His family celebrates typical American holidays such as Thanksgiving and
    Fourth of July, and they often visit local community events like the Rochester Lilac Festival and the Rochester Museum & Science Center. While his heritage is primarily white, the family occasionally
    incorporates Spanish language greetings and dishes, reflecting a subtle Hispanic influence from his surname, which gives Johnny a modest multicultural exposure alongside his mainstream American upbringing.
