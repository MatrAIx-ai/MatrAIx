    care with the family dog'']'
  career_goals: In the short term, Mary Louise hopes to win her school’s science fair by presenting a project about local wildlife habitats. Looking ahead, she dreams of becoming a wildlife biologist or
    veterinarian, combining her love of animals with the practical desire to help them heal. She also imagines one day mentoring younger kids in a community nature club, where she can share her curiosity
    while using her cooperative and occasionally assertive leadership style.
