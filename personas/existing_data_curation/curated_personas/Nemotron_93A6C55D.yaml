personas:
  professional: Mary Raudebaugh is a budding junior explorer who melds their curiosity for the natural world with practical problem‑solving skills learned from LEGO building, approaching each outdoor discovery
    with a relaxed, flexible mindset that values both new ideas and proven methods.
  sports: Mary Raudebaugh enjoys playing soccer with the Bowling Green Junior Strikers, participates in a community swim club at the local YMCA, and roots for the Kentucky Wildcats basketball team and the
    Cincinnati Reds during televised games, treating physical activity as a relaxed yet purposeful routine rather than a competitive focus.
  arts: Mary Raudebaugh channels their artistic side by sketching wildlife like deer and frogs on the margins of adventure books, playing the ukulele to tunes from Disney’s "Moana" and pop hits by Taylor Swift,
    and drawing inspiration from the vivid storytelling of J.K. Rowling and the naturalist illustrations of John James Audubon.
  travel: Mary Raudebaugh loves weekend day trips to Mammoth Cave National Park and seasonal camping at the Land Between the Lakes, dreams of a family vacation to Iceland’s volcanic landscapes, and prefers
    informal, low‑budget travel planning that leaves plenty of room for spontaneous bug‑collecting expeditions.
  culinary: Mary Raudebaugh favors simple, hands‑on meals like homemade macaroni and cheese with a sprinkle of cheddar, enjoys helping to bake pizza topped with pepperoni, mushrooms, and olives, and delights
    in snack‑time fruit salads featuring strawberries, blueberries, and banana slices.
  core: Mary Raudebaugh is a quiet, curiosity‑driven nine‑year‑old who blends a love for solitary nature‑explorations and LEGO problem‑solving with a relaxed, occasionally disorganized approach to obligations,
    often forgetting to tidy their study area but never missing a chance to sketch a passing butterfly.
background:
  cultural: 'Mary Louise comes from a white, middle‑class family rooted in Simpson County, Kentucky. Her upbringing reflects Southern hospitality and community traditions: weekly church youth activities,
    family gatherings centered around hearty meals like biscuits and gravy, and annual participation in the local county fair and Kentucky Derby viewing parties. She hears Appalachian folklore from her
    grandparents and enjoys country and bluegrass music, which occasionally influences her ukulele practice. The rural‑suburban setting fosters a close relationship with nature, farming rhythms, and neighborly
    neighborly support.'
