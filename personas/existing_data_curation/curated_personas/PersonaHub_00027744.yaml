persona_description: A public health professional who is interested in the effects of lead exposure on human health. This persona is likely to be involved in the NHMRC's lead exposure and health effects
  review in Australia, which focuses on the toxic effects of lead exposure on both adults and children, particularly the nervous system. They are also likely to have expertise in environmental health and
  jurisdictional advice, as evidenced by their involvement on the Lead Working Committee. This persona would be interested in the public comment period and the release of the NHMRC's assessment of the evidence
  related to exposure to lead, as well as the public consultation process.
