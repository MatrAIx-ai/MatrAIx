  career_goals: Marquez aims to graduate high school with solid grades in math and science, then enroll in a community college engineering program leading to a bachelor's degree in civil or electrical engineering.
    He envisions a career that offers clear structure, long‑term stability, and the ability to contribute tangible projects to his community—such as designing sustainable infrastructure in the Medford area.
    In the short term, he hopes to secure a summer internship with a local construction firm or a technical lab to gain hands‑on experience, and he aspires to eventually become a licensed professional engineer
    who can mentor younger students from similar backgrounds.
