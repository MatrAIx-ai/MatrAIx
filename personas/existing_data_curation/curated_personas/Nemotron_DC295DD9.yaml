  career_goals: She dreams of becoming an artist who tells stories through pictures, perhaps a children's book illustrator or an animation designer. She also loves the idea of exploring new ideas, so she
    imagines being a scientist or inventor who creates fun experiments for kids. In school she enjoys helping friends understand lessons and thinks she could be a teacher or community organizer when she
    grows up. Her biggest ambition right now is to create a comic book featuring her own characters and share it with her classmates.
