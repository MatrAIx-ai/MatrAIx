personas:
  professional: Izabella Anderson is an aspiring junior storyteller and budding watercolor artist who channels her boundless curiosity and spontaneous imagination into creating illustrated adventure tales
    during school projects and Girl Scout badge activities, often delighting classmates with vivid characters drawn on notebook margins.
  sports: Izabella Anderson thrives on the soccer field with the Norman Youth Soccer Club, cheering for the Oklahoma City Thunder during family TV nights, and they eagerly join tag games at the neighborhood
    park, often leading impromptu races that showcase their energetic, sociable nature.
  arts: Izabella Anderson immerses herself in watercolor painting inspired by the vibrant works of Claude Monet and the whimsical animation of Disney, frequently visiting the Sam Noble Oklahoma Museum of
    Natural History to sketch fossils and dinosaurs, and they love reenacting favorite scenes from Pixar movies during dance class routines.
  travel: Izabella Anderson loves spontaneous family road trips that blend holiday traditions—like a Thanksgiving feast in a cabin near the Ozarks—with visits to the Grand Canyon, and they dream of exploring
    the historic streets of Washington D.C. and the magical kingdom of Disneyland, always packing a sketchbook for on‑the‑go doodles.
  culinary: Izabella Anderson enjoys crafting kid‑friendly kitchen experiments like volcano eruptions made from baking soda, but their favorite real meals are macaroni‑and‑cheese topped with a sprinkle
    of cheddar and strawberry‑topped pancakes, and they often help stir batter for homemade pizza while humming the soundtrack from their favorite animated film.
  core: Izabella Anderson is a curious, art‑loving eight‑year‑old who flips between Lego worlds and watercolor dreams, savors every slice of adventure—whether on the soccer field or a family road trip—while
    juggling a tiny allowance, mild allergies, and an endless supply of glittery stickers.
background:
  cultural: Izabella was born and raised in Norman, Oklahoma, a suburban community with strong Midwestern and Southern American influences. Her family is of European descent, with roots in Irish and German
    ancestry, and they celebrate traditional holidays such as Thanksgiving, Christmas, and Fourth of July with community gatherings and school events. Growing up near the University of Oklahoma, she is
    exposed to a culturally diverse environment, including local Native American heritage and nearby museum programs that spark her interest in art and natural history. Her upbringing blends suburban family
    values, church community participation, and the vibrant educational resources of a college town.
