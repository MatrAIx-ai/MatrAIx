  career_goals: She dreams of becoming an elementary school teacher or a school counselor, envisioning a future where she can combine her love for structure, her talent for organizing lessons, and her desire
    to help classmates feel supported. She also imagines working as a community event coordinator, planning local festivals by the lake, because she enjoys bringing people together.
