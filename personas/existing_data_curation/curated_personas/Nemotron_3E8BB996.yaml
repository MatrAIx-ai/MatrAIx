personas:
  professional: Stacey Lewis is a junior book‑club coordinator who leverages their methodical planning, love of adventure stories such as the Magic Tree House series, and natural charisma to schedule weekly
    reading circles, keep attendance logs meticulously, and ensure every meeting runs on time, turning the school library into a well‑ordered hub of storytelling.
  sports: Stacey Lewis rides their bright red bike on the weekend trails around Shell Lake with the Shell Lake Kids Cycling Club, cheers passionately for the Minnesota Twins during baseball season, joins
    the Lakeside Elementary co‑ed soccer team for after‑school practice, and they occasionally help their dad fish at the lake, balancing structured activity with their love of being in the spotlight.
  arts: Stacey Lewis delights in performing the role of Snow White in the school drama club’s production of Disney’s Frozen, spends their free time sketching scenes inspired by Hayao Miyazaki’s animated
    films, and they hum along to Taylor Swift’s upbeat pop songs while crafting friendship bracelets, letting the arts shape their confidence and social connections.
  travel: Stacey Lewis plans trips with a color‑coded itinerary, enjoys structured weekend camping excursions to the Boundary Waters and family road‑trips to Mackinac Island, dreams of visiting the ancient
    temples of Kyoto, Japan, and they hope to one day explore the magical castles of Europe, balancing adventure with the comfort of familiar routines.
  culinary: Stacey Lewis loves whipping up fluffy blueberry pancakes on Saturday mornings, adds crunchy pine nuts to their homemade trail mix for a forest‑themed snack, enjoys classic chicken nuggets with
    ketchup, and they often treat themselves to a slice of pepperoni pizza after a successful choir recital, though they occasionally overindulge in sugary gummy bears when stress spikes.
  core: Stacey Lewis is a meticulously organized nine‑year‑old who thrives on leading friends in crafts and performances, yet they secretly battle a worry‑filled mind that fuels both their precise planning
    and occasional over‑snacking on gummy bears.
background:
  cultural: Stacey comes from a White, Midwestern family in Shell Lake, Wisconsin. Her upbringing reflects the region’s emphasis on community, modesty, and a close connection to nature. Family traditions
    include attending a local Lutheran church, participating in seasonal events like the county fair, and engaging in lake activities such as ice fishing in winter and swimming in summer. The community
    values hard work, politeness, and helping neighbors, which have shaped Stacey’s cooperative and considerate demeanor.
attributes:
  skills: '[''Organizational skills'', ''Basic reading comprehension'', ''Elementary math'', ''Peer tutoring'', ''Public speaking'', ''Group facilitation'', ''Empathy and conflict mediation'']'
