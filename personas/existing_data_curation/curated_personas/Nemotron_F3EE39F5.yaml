  hobbies: '[''Thai cooking'', ''Home gardening'', ''Badminton'', ''Fishing'', ''Community temple festivals'', ''Watching baseball'']'
  career_goals: Looking ahead, Chamnan aims to move into a supervisory role on the packaging floor within the next two years, leveraging his reliability and process‑oriented mindset to oversee shift operations
    and mentor newer workers. He is planning to complete a Certified Packaging Technologist (CPT) program offered by a local community college, which would broaden his understanding of packaging engineering
    and sustainability practices. In the longer term, he hopes to transition into a logistics coordinator position where he can apply his inventory expertise to improve throughput and reduce waste, ultimately
    providing greater stability and advancement opportunities for his family.
