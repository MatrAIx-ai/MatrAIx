  career_goals: Gizella aims to advance to a senior supervisory role within the Riverside County Building Department, where she can influence policy updates and champion the adoption of sustainable building
    practices. She plans to obtain the Certified Building Official (CBO) credential to formalize her expertise. Over the next five years, she hopes to lead a team of inspectors, develop training modules
    for new hires, and eventually launch a boutique consulting firm that assists small contractors with compliance and green‑building certifications. Her ambition is to leave a lasting impact on building
    safety standards while maintaining the high personal standards that drive her daily work.
