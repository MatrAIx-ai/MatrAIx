personas:
  professional: Four‑year‑old Jonathan Lambert, a budding LEGO architect, blends a natural curiosity for new building techniques with a practical eye for structural stability, spontaneously inventing designs
    that delight classmates while sometimes losing track of the instruction manual, and they proudly showcase each creation during playtime.
  sports: Four‑year‑old Jonathan Lambert participates in the neighborhood Soccer Sprouts club, idolizes the hometown baseball team the River City Rapids, and eagerly mimics their moves during backyard play,
    showing a competitive spark even in casual games.
  arts: Four‑year‑old Jonathan Lambert delights in drawing vibrant characters from Disney's Frozen and Pixar's Toy Story, sings along with the soundtrack of Moana, and enthusiastically performs impromptu
    dance routines to BTS's kid‑friendly tracks, weaving their talkative nature into lively artistic expression.
  travel: Four‑year‑old Jonathan Lambert loves spontaneous family trips, having recently explored Disneyland in Anaheim and a weekend camping adventure at Pine Ridge State Park, and they dream of returning
    to the coastal beaches of Maui for more sandcastle building, preferring experiences that blend excitement with familiar faces.
  culinary: Four‑year‑old Jonathan Lambert prefers finger foods like chicken nuggets, macaroni‑and‑cheese, and strawberry slices, can flawlessly assemble a peanut‑butter‑and‑jelly sandwich with a bit of
    mess, and they often negotiate extra dessert by charmingly recounting bedtime stories to parents.
  core: Four‑year‑old Jonathan Lambert is a talkative, curiosity‑driven firecracker who loves building LEGO kingdoms, trading stickers, and debating the best superhero, yet their spontaneous streak often
    leaves toys scattered and piggy banks half‑full.
background:
  cultural: Jonathan grows up in Radcliff, Kentucky, a small community near Fort Knox with a blend of Southern hospitality and a modest military presence. His family participates in local traditions such
    as county fairs, church gatherings, and community picnics, while also benefiting from the diverse cultural influences of military families stationed nearby. This environment fosters a balance of traditional
    Southern values—like close‑knit family ties and community involvement—and exposure to a broader range of perspectives, supporting his curious and sociable nature.
