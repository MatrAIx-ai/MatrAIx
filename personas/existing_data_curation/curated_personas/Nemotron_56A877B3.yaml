  career_goals: Even at age four, Jonathan dreams of becoming someone who can make a big impact. He frequently talks about wanting to be a firefighter who helps people, an astronaut who explores space,
    or a scientist who builds cool inventions. His blend of curiosity and practicality fuels ambitions to design things that work and to be the best at any challenge he takes on, whether that's building
    the highest tower in a playroom or leading a group in a make‑believe rescue mission.
