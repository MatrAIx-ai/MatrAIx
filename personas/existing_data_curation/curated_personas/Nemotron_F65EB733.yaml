  hobbies: '[''Hiking'', ''Yoga and Meditation'', ''Reading (fiction and sci‑fi)'', ''Cooking (Asian‑fusion)'', ''Playing Guzheng'', ''Gardening'', ''STEM Outreach Volunteering'', ''Attending Cultural Festivals'',
    ''Pottery'']'
  career_goals: Tin aspires to become the STEM department head at her school, where she can shape interdisciplinary curricula that blend science, technology, engineering, and mathematics with mindfulness
    practices to support students’ mental health. She plans to pursue a Master’s degree in Educational Leadership to gain the administrative expertise needed for school‑wide program development. Tin hopes
    to champion district‑level initiatives that integrate AI‑driven adaptive learning platforms, expand extracurricular STEM opportunities, and embed emotional‑wellness resources into the school culture.
    Long‑term, she envisions authoring a guidebook on compassionate, curiosity‑driven teaching and presenting her work at national education conferences.
