personas:
  professional: An accomplished food production specialist, Dola Iannone leverages meticulous HACCP compliance, precise batch scaling, and strong team communication to drive efficiency on the line while
    they channel their theatrical confidence into leading shift briefings and mentorship sessions.
  sports: An avid member of the Birmingham Running Club and weekend yoga enthusiast, Dola Iannone cheers on Aston Villa while also playing recreational softball, balancing a love for low‑impact cardio with
    the seasonal excitement of local summer sand volleyball tournaments, and they prioritize hydration after each run.
  arts: Immersed in Birmingham’s vibrant creative circuit, Dola Iannone regularly attends gallery openings featuring contemporary artists like 'Banksy', stars in community theater productions of Lin‑Manuel
    Miranda’s works, and contributes to collaborative mural projects that celebrate the city’s street‑art heritage, while they often stay after shows to discuss staging nuances with fellow actors.
  travel: Preferring spontaneous road trips over rigid itineraries, Dola Iannone spends weekends exploring regional food festivals such as the Asheville Harvest Fair and New Orleans’ Food & Wine Expo, while
    they dream of a culinary pilgrimage to the Tuscan countryside for its famed markets and carefully budget each outing to balance adventure with savings.
  culinary: An experimental home chef, Dola Iannone delights in pairing smoky paprika‑infused chicken with black garlic risotto, plating dishes like miso‑glazed shrimp and grits alongside basil‑infused
    honey beignets, yet they often leave the kitchen in disarray while juggling multiple flavor trials.
  core: Balancing rigorous production discipline with a flair for theatrical performance, Dola Iannone thrives on center‑stage moments—from leading factory shifts to dazzling supper‑club guests—while they
    habitually over‑season dishes and over‑commit to community projects.
background:
  cultural: Born and raised in Birmingham, Alabama, Dola comes from a second‑generation Italian‑American family that settled in the South decades ago. Her household blended Italian culinary traditions—hand‑made
    pasta, family sauces—with Southern staples like collard greens and fried chicken, shaping her palate and appreciation for food as cultural expression. Growing up in a close‑knit church community reinforced
    values of hospitality, communal gatherings, and storytelling. The Southern emphasis on friendliness and community events, combined with her Italian heritage’s emphasis on family meals and celebration,
    informs her sociable personality, love for shared meals, and respect for both regional and ancestral customs.
attributes:
  skills: '["Large‑scale food batch production", "HACCP and GMP compliance", "Recipe scaling and batch record documentation", "Equipment operation and maintenance", "Quality assurance and sensory evaluation",
    "Inventory management", "Process improvement and continuous‑learning initiatives", "Shift scheduling and staff training", "Data analysis and performance reporting", "Effective communication and team
    leadership"]'
  hobbies: '["Visiting art galleries and mural projects", "Experimental cooking and artistic plating", "Community theater performances", "Participating in competitive bake‑offs", "Volunteering at local
    food bank", "Attending regional food festivals", "Practicing yoga for mental resilience", "Hosting a supper club for friends", "Reading food science and art magazines", "Exploring Southern and Italian
    culinary traditions"]'
  career_goals: Aiming to advance from batchmaker to production supervisor within the next two years, Dola plans to earn a Certified Food Safety Manager credential and complete a culinary arts certificate
    to broaden her technical foundation. Her long‑term ambition is to become a plant manager overseeing multiple production lines, driving efficiency and innovation. Parallel to her corporate path, she
    dreams of launching a boutique line of ready‑to‑eat, artfully presented meals that blend her Italian heritage with Southern flavors, positioning herself as a creative leader in the specialty food market.
