  hobbies: '[''Visiting art galleries and museums'', ''Landscape photography'', ''DIY woodworking and 3D‑printing projects'', ''Hiking in state parks'', ''Yoga and mindfulness meditation'', ''Volunteering
    for STEM outreach'', ''Cooking experimental recipes'', ''Reading contemporary fiction and sci‑fi novels'', ''Playing acoustic guitar'', ''Traveling to cultural festivals'']'
  career_goals: Abigail aims to move into senior engineering management within the next five years, overseeing multidisciplinary teams that develop sustainable consumer‑technology products. She plans to
    earn a master's degree in Engineering Management to deepen her strategic skills, champion innovative, eco‑friendly design practices, and expand mentorship programs for women and underrepresented groups
    in STEM. Ultimately, she envisions launching her own consultancy that blends rigorous engineering with creative design thinking to help companies deliver high‑impact, socially responsible products.
