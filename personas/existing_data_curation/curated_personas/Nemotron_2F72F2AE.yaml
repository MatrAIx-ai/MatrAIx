personas:
  professional: Abigail Norwood is a seasoned mechanical engineer; they meld advanced 3D modeling, finite‑element analysis, and Six Sigma process optimization with an artistic sensibility, assertively championing
    eco‑friendly design standards while leading agile, cross‑functional teams to develop sustainable consumer‑technology products and mentoring underrepresented talent.
  sports: Abigail Norwood spends Saturday mornings hiking the rugged trails of Pennsylvania’s state parks, attends a weekly yoga class at a boutique studio, and supports the Philadelphia Eagles and Phillies;
    they often meet up with a local hiking club for seasonal multi‑day treks.
  arts: Abigail Norwood routinely visits the Philadelphia Museum of Art and the Institute of Contemporary Art, draws creative fuel from the immersive installations of Yayoi Kusama and the evocative photography
    of Gregory Crewdson, and they proudly experiment with unconventional lighting techniques in their own photography to capture sunrise landscapes in the Pocono Mountains with a full‑frame DSLR.
  travel: Abigail Norwood prefers meticulously planned weekend getaways to U.S. national parks like Acadia and Yosemite, but they also relish spontaneous cultural trips to Kyoto for its design heritage
    and Barcelona for modernist architecture, balancing travel with a modest budget bolstered by a travel‑rewards credit card.
  culinary: Abigail Norwood loves experimenting with global cuisines, mastering dishes such as Ethiopian injera, Korean kimchi, and Peruvian ceviche, and they frequently employ sous‑vide, fermentation,
    and a well‑stocked spice rack—including sumac, garam masala, and smoked paprika—to push the boundaries of home cooking.
  core: Abigail Norwood is a curiosity‑driven engineer‑artist who balances rigorous technical leadership with a love for hiking, yoga, and experimental cooking, even as they indulge in occasional impulse
    buys of vintage tools and binge‑watch sci‑fi marathons.
background:
  cultural: Abigail grew up in a middle‑class, white family with German‑Irish roots in suburban Pennsylvania. Her upbringing emphasized education, self‑reliance, and community involvement, values reinforced
    by a supportive church and local volunteer groups. Proximity to Philadelphia exposed her to a rich tapestry of cultural events, museums, and diverse culinary scenes, shaping an appreciation for artistic
    expression and multicultural experiences. Family traditions include annual holiday gatherings, a love of outdoor recreation in the nearby countryside, and a strong work ethic that guided her pursuit
    of a STEM degree and an engineering career.
