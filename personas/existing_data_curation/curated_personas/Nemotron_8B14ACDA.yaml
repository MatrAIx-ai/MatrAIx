  career_goals: Patricia aims to earn her CPA designation within the next year and advance to a senior auditor role, eventually becoming an audit manager and partner at her firm. She is drawn to integrating
    data‑analytics and sustainability reporting into traditional audit practices, and she hopes to lead a technology‑enabled audit team that sets innovative industry standards. Long‑term, she envisions
    taking on a CFO position or launching her own boutique consulting practice focused on financial strategy and nonprofit advisory. Throughout her career she plans to mentor junior accountants, champion
    inclusive workplace culture, and contribute pro‑bono financial expertise to community organizations.
