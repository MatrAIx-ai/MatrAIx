  hobbies: '[''Basketball'', ''Gym workouts'', ''Fishing on the Chesapeake Bay'', ''Live music concerts'', ''Playing acoustic guitar'', ''Volunteering at the local food bank'', ''Attending community festivals'',
    ''Reading leadership and business books'', ''Watching NFL and college football games'', ''Exploring coffee shops'']'
  career_goals: Frederick aims to become a store manager within the next two years and eventually advance to a district or regional manager role overseeing multiple locations in the Hampton Roads area.
    He plans to complete his bachelor's degree in business administration and earn a Certified Retail Manager credential. His long‑term ambition includes implementing innovative retail technologies—such
    as AI‑driven inventory systems—to improve efficiency and sales performance. He also hopes to mentor emerging talent, build a high‑performing team culture, and one day own a franchise or launch his own
    e‑commerce venture focused on local products.
