personas:
  professional: Jimmy Henderson, a 25-year-old automotive technician, blends his methodical mechanical aptitude with a talkative, customer-focused demeanor, excelling at OBD-II diagnostics, engine overhauls,
    and meticulous service logging while often leading shop meetings to keep the team organized.
  sports: Jimmy Henderson, a 25-year-old car enthusiast, follows the NASCAR Cup Series and the Atlanta Hawks, regularly attends events of the Georgia Classic Car Club, and maintains his fitness by alternating
    between weight-training at the local gym and weekend fishing trips with the Newnan Anglers Association.
  arts: Jimmy Henderson blends his love for electric guitar jam sessions with a playlist that rolls from classic rock legends like Led Zeppelin and Lynyrd Skynyrd to modern country stars such as Luke Bryan,
    often citing the storytelling of John Steinbeck as inspiration while attending live shows at the local venue where he also watches performances by contemporary blues guitarist John Mayer.
  travel: Jimmy Henderson prefers road-trip adventures that combine his love for classic cars with scenic routes, planning weekend getaways to Asheville, NC, and the Blue Ridge Parkway, while dreaming of
    a cross-country cruise to the Pacific Coast Highway in California, but his budget and upcoming shop responsibilities keep most trips short, carefully plotted with a spreadsheet.
  culinary: Jimmy Henderson enjoys grilling smoked brisket and barbecuing peach-glazed chicken on his patio, boasts a decent skillet-cook skill set that lets him whip up a perfectly seared ribeye with garlic-herb
    butter, and frequently pairs his meals with homemade coleslaw and a cold draft from his favorite local craft brewery.
  core: Jimmy Henderson is a hyper-social, detail-obsessive automotive whiz who channels his stress into precise car restorations, loudly debates NASCAR stats at backyard barbecues, and occasionally forgets
    to log his own health metrics.
background:
  cultural: Jimmy grew up in a small‑town Southern community in Georgia, steeped in White, Baptist traditions. His family emphasized hard work, self‑reliance, and hospitality, values that are reflected
    in his reliable work ethic and friendly demeanor. He was raised on Southern cuisine—fried chicken, biscuits, and BBQ—and enjoys community events like church gatherings, high school football games, and
    local festivals. The regional car culture and love of country music have shaped his interests, while the close‑knit nature of his hometown fosters his preference for structure, predictability, and strong
    social connections.
attributes:
  skills: '[''Automotive diagnostics and troubleshooting'', ''Engine overhauls and rebuilds'', ''Brake and suspension repair'', ''Electrical system diagnostics'', ''Preventive maintenance scheduling'',
    ''Customer service and communication'', ''Shop workflow organization'', ''Inventory management'', ''Mentoring apprentices'', ''Team leadership'']'
  hobbies: '[''Car restoration projects'', ''Attending local car shows'', ''Motorsport watching (NASCAR, IndyCar)'', ''Playing electric guitar'', ''Country and classic rock music'', ''Fishing in local lakes'',
    ''Hiking in nearby trails'', ''Barbecue and tailgate gatherings'', ''Volunteer at community youth program'', ''Racing simulator gaming'']'
  career_goals: Jimmy aims to become an ASE‑certified Master Technician within the next three years and to move into a shop manager role shortly thereafter. He plans to specialize in hybrid and electric
    vehicle repairs as the market shifts, positioning himself as a go‑to expert in his region. Long‑term, he dreams of opening his own auto‑repair shop in Newnan, offering a structured, customer‑focused
    environment while providing a stable income that will eventually allow him to buy a home and start a family.
