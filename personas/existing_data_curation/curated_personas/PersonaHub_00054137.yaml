persona_description: A finance professor who specializes in the theory of efficient markets, particularly in the application of this theory to securities class action litigation. His research interests
  include, but are not limited to, the efficiency of stock market prices, the calculation of damages in securities class actions, and the use of empirical evidence to support securities class action litigation.
  He is likely to have a strong understanding of mathematical concepts related to finance, such as probability theory, statistics, and game theory. He may also have expertise in econometrics, financial
  modeling, and econophysics.
