personas:
  professional: Rishikesh Patel, a budding tech enthusiast, leverages their knack for hands‑on problem solving and spontaneous curiosity to assemble custom PC rigs, script Python automations, and troubleshoot
    hardware on the fly, while their cooperative nature makes them a natural peer mediator in a part‑time apprenticeship at a local repair shop.
  sports: Rishikesh Patel, who enjoys occasional pickup cricket in spring and jogs around Detroit's Riverwalk to stay limber, roots for the Detroit Lions, Pistons, and Red Wings, and while they prefer low‑key,
    self‑guided workouts over formal gym sessions, they join a local teen coding club’s weekly basketball scrimmage for camaraderie.
  arts: Rishikesh Patel, a sci‑fi aficionado who devours novels by Isaac Asimov and Liu Cixin, unwinds to the beats of Daft Punk and Indian classical sitarist Shivkumar Sharma, and cites actors Riz Ahmed
    and Priyanka Chopra as inspirational figures, weaving these influences into their own creative coding projects.
  travel: Rishikesh Patel prefers spontaneous road trips with friends over meticulously planned tours, has explored the historic streets of Ahmedabad during a family visit, dreams of a solo backpacking
    adventure through Japan’s Akihabara district, and looks forward to a future pilgrimage to the Great Rift Valley for stargazing.
  culinary: Rishikesh Patel, an enthusiastic home‑cook, perfects Gujarati staples such as fluffy dhokla and crisp fafda using gram flour and yogurt, experiments with spice blends like green chili‑garam
    masala, and balances these traditional flavors with occasional attempts at crafting the perfect pepperoni pizza on a custom-built pizza oven.
  core: Rishikesh Patel thrives on the thrill of building fast PCs and cracking code, yet despite their cooperative spirit they often lose track of deadlines, leaving their gaming sessions to spill into
    late‑night snack marathons.
background:
  cultural: Rishikesh was born to Gujarati immigrant parents who moved from the state of Gujarat, India, to the United States in the early 2000s. At home, Gujarati and Hindi are spoken alongside English,
    and the family observes Hindu festivals such as Diwali, Navratri, and Holi, often hosting community celebrations at their home in Wixom. He belongs to a local Gujarati cultural association that offers
    language classes, traditional dance workshops, and volunteer outreach for seniors. While he embraces American customs and participates in typical suburban activities, his Indian heritage remains a core
    part of his identity, influencing his food, music, and the value he places on family cohesion and community service.
attributes:
  skills: '[''computer hardware troubleshooting'', ''PC building and upgrading'', ''basic Python scripting'', ''home networking setup'', ''Gujarati cooking'', ''peer conflict mediation'', ''team collaboration'']'
  hobbies: '[''custom PC building'', ''Arduino electronics projects'', ''video gaming'', ''Gujarati cooking'', ''Garba dancing'', ''reading sci‑fi novels'', ''watching science documentaries'', ''cricket'']'
  career_goals: Rishikesh aims to earn his GED within the next year and pursue a certificate in information technology, such as CompTIA A+ or a community‑college program in network administration. In the
    short term, he wants to secure a part‑time apprenticeship at a local computer repair shop to gain real‑world experience. His longer‑term ambition is to launch his own tech‑support and consulting service
    that helps small family‑owned businesses in the Detroit metro area, especially those in the Indian diaspora, and to create bilingual online tutorials that blend his cultural background with his technical
    expertise.
