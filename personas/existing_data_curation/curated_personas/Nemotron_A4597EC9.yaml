personas:
  professional: Andrew Green is a detail‑oriented ASE‑certified automotive technician who excels at diagnosing diesel and gasoline engines, welding, and using diagnostic software, balancing his curiosity
    for electric‑vehicle powertrains with a practical, organized workflow that lets him adapt to unexpected shop challenges while keeping meticulous service records.
  sports: Andrew Green follows the Atlanta Falcons and the Atlanta Braves, plays pick‑up basketball at the local community center on Saturdays, hikes the Chattahoochee National Forest for cardio, and spends
    quiet weekends fishing on the Savannah River, which doubles as low‑impact exercise and stress relief.
  arts: Andrew Green has a deep appreciation for classic rock legends like Led Zeppelin and Lynyrd Skynyrd, country icons such as Johnny Cash and Dolly Parton, and regularly attends live performances at
    the Savannah River Landing music venue, while their woodworking hobby reflects a respect for craftsmanship as an art form.
  travel: Andrew Green enjoys weekend road trips to Asheville’s Blue Ridge Parkway and the historic streets of Charleston, dreams of attending the Frankfurt Motor Show to explore the latest EV technologies,
    and prefers self‑planned itineraries that balance scenic drives with budget‑conscious lodging to fund future workshop investments.
  culinary: Andrew Green favors hearty Southern fare—grilled ribeye, smoked catfish, and a tangy homemade BBQ sauce—often cooking on a portable grill after a day of fishing, and pairs meals with a cold
    craft beer or a strong cup of black coffee to stay alert during late‑night diagnostics.
  core: Andrew Green is a meticulous mechanic with a love for classic cars, a cautious financial planner who occasionally splurges on tools, and a stress‑prone perfectionist who balances hands‑on hobbies
    with quiet fishing retreats.
background:
  cultural: Andrew grew up in a small town in the Georgia Piedmont region, raised in a working‑class family that valued hard work, self‑reliance, and community. He was immersed in Southern traditions such
    as church gatherings, local festivals, and hospitality. While his upbringing emphasized practical skills and a conservative work ethic, his curiosity has led him to embrace modern technologies, especially
    in automotive fields. He identifies with Southern values of friendliness and respect for tradition, yet remains open to progressive ideas about sustainable transportation and personal growth.
attributes:
  skills: '[''Automotive engine repair'', ''Diesel engine diagnostics'', ''Hydraulic and pneumatic system maintenance'', ''Electrical wiring and diagnostic software'', ''Welding (MIG/TIG)'', ''Mobile equipment
    servicing (forklifts, ATVs)'', ''Preventive maintenance scheduling'', ''Customer communication and service documentation'']'
  hobbies: '[''Classic car restoration'', ''Woodworking'', ''Fishing'', ''Hiking'', ''Community volunteer teaching automotive basics'', ''Car club gatherings'', ''Driving simulation video games'', ''Listening
    to classic rock and country music'']'
  career_goals: Andrew aims to become a lead technician or service manager at a reputable shop, eventually opening his own mechanic workshop that focuses on hybrid and electric vehicle conversions and sustainable
    mobility solutions. He plans to earn additional certifications, such as ASE Master Technician and EV technician credentials, and may pursue a bachelor’s degree in mechanical engineering or business
    management to support the entrepreneurial side of his future business. A key ambition is to achieve a better work‑life balance, reducing stress by moving into a role with more predictable hours while
    still applying his technical expertise.
