  toxic chemical assessment process, reducing pollution in waterways, addressing the cost and pace of cleanup at hazardous waste sites, and addressing the agency's emerging role in climate change issues.
  This persona is well-versed in EPA policies and programs, and is committed to ensuring that the agency is effective in protecting human health and the environment.
