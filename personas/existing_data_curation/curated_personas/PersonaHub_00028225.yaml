persona_description: Aeronautical engineer who specializes in the design and optimization of aircraft, particularly focusing on the range, payload, and operational efficiency of large commercial airplanes
  like the Boeing 787 and Airbus A380. This persona is knowledgeable about the iterative process of designing aircraft, considering factors such as weight, aerodynamics, engines, and regulatory constraints.
  They are also aware of the importance of economic performance and the role of multidisciplinary design optimization in aircraft design. This persona likely has experience in conducting parametric studies
  and has knowledge of recent research in aircraft design, particularly in the area of simultaneous aircraft design.
