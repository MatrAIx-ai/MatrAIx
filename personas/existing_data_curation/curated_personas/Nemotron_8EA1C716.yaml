  hobbies: '[''Vegetable gardening'', ''Crocheting'', ''Crossword and Sudoku puzzles'', ''Reading historical biographies'', ''Journaling'', ''Traditional Bengali cooking'', ''Listening to classical Indian
    ragas'', ''Quiet nature walks'', ''Genealogical research'']'
  career_goals: Although retired from formal employment, Sufia remains driven by the desire to preserve her family's financial security and cultural legacy. She aims to keep her household finances orderly,
    ensuring that medical, estate, and insurance affairs are up-to-date. She wishes to mentor her grandchildren in practical life skills—budgeting, cooking, and responsible use of technology—so they carry
    forward the disciplined habits she values. Sufia also hopes to document her family's migration story and recipes in a personal memoir, which she sees as a lasting contribution to both her lineage and
    the broader South Asian community in her town. Finally, she aspires to enhance the senior center's emergency-preparedness program, applying her competitive drive to develop the most reliable safety
    protocol in Lancaster County.
