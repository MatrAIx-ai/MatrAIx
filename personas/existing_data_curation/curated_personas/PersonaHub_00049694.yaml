persona_description: Kiya Riverman is a Penn State graduate student who studies glacial hydrology in Svalbard, a remote chain of islands halfway between Norway and the Arctic. She is interested in outdoor
  experiences and enjoys spending time in the wilderness. Her research focuses on studying the hydrology of glaciers in the area, which involves studying the physical record of climate patterns over several
  previous millennia. Kiya is passionate about her work and is dedicated to her research, often spending long hours in the field collecting data. She is also interested in sharing her knowledge with others
  and has presented her research at conferences and workshops.
