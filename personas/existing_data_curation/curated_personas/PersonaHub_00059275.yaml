persona_description: A scientist who is passionate about sustainable agriculture and ecosystem services, particularly in the context of road electrification and monoculture impacts on pollinator species
  and crop yields. They are interested in understanding the relationship between biodiversity, ecosystem services, and agricultural production, and are seeking innovative solutions to reconcile the protection
  of biodiversity and the production of food for increasing human populations. They are likely to be involved in research and development projects related to sustainable transportation and agriculture,
  and are interested in the potential benefits of new pathways to sustainable agriculture that aim to reconcile the protection of biodiversity and the production of food for increasing human populations.
