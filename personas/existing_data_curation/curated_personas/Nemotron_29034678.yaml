  career_goals: Even in retirement, Martha’s primary ambition is to maintain her independence and self‑reliance. She aims to stay in her Bellingham home as long as health permits, ensuring her finances
    remain secure and her living environment remains safe. She hopes to compile a memoir that weaves together personal stories with the town’s history, preserving her legacy for future generations. Martha
    plans to volunteer intermittently with the Bellingham Historical Society, offering guided talks on local landmarks when she feels up to it. She also aspires to mentor a few younger neighbors in sustainable
    gardening, sharing her practical knowledge while keeping interactions limited and low‑key. Maintaining physical health through regular walks and managing stress through journaling are also central to
    her personal goals.
