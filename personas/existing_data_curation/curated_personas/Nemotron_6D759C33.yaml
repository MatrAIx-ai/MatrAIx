personas:
  professional: Deneb Lenis, an 18‑year‑old bilingual personal care assistant, blends hands‑on grooming expertise with a relaxed, flexible work style, quickly switching between hair‑washing, basic skincare,
    and cash‑handling while still managing to ask assertive questions when client safety feels uncertain.
  sports: Deneb Lenis spends weekends skateboarding at the local park and is a loyal fan of the FC Dallas soccer team, regularly playing FIFA with friends, while also belonging to a casual skate crew that
    meets for weekly sessions at the city skate‑park.
  arts: Deneb Lenis sketches bustling street scenes in a battered notebook, draws inspiration from the rhythmic beats of banda groups like Banda El Recodo, and unwinds by watching health‑focused documentaries
    that fuel both artistic curiosity and a practical outlook on wellness.
  travel: Deneb Lenis prefers spontaneous road trips to nearby state parks such as Big Bend and the Hill Country, balancing a love for adventure with a tight budget, and dreams of a future backpacking tour
    through the Pacific Northwest after completing college.
  culinary: Deneb Lenis enjoys cooking tacos al pastor with pineapple, cilantro, and a splash of lime, honing a moderate skill level that lets them host family gatherings, while also experimenting with
    homemade guacamole and occasionally ordering pizza while gaming.
  core: Deneb Lenis is an 18‑year‑old bilingual caregiver with a relaxed yet curious approach to life, juggling skateboarding, gaming, and cooking ambitions while constantly worrying about the future and
    battling occasional disorganization.
background:
  cultural: Deneb is a second‑generation Mexican‑American raised in a bilingual household in Celina, Texas. His family maintains strong ties to Mexican traditions, celebrating Día de los Muertos, quinceañeras,
    and holiday feasts with couscous and tamales. He grew up attending a local Hispanic church, where community gatherings reinforced values of family solidarity, respect for elders, and mutual support.
    While navigating a predominantly suburban Texan environment, Deneb blends the collectivist ethos of his Mexican roots with the individualistic, flexible lifestyle of his peers, shaping his identity
    and outlook on work and community.
attributes:
  skills: '["Bilingual communication (English/Spanish)", "Customer service", "Basic personal care techniques", "Hair washing and styling assistance", "Basic first aid awareness", "Sanitation and infection
