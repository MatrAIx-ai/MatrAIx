  hobbies: '["Playing video games (FIFA, Call of Duty)", "Skateboarding at local park", "Cooking Mexican cuisine", "Listening to regional Mexican music", "Watching health and wellness documentaries", "Sketching
    street scenes", "Mindfulness breathing exercises"]'
  career_goals: Deneb aims to earn a Certified Nursing Assistant (CNA) credential within the next two years while simultaneously completing an associate degree in health services at a community college.
    He hopes to combine his practical grooming experience with formal health training to offer mobile personal‑care services for seniors in the Celina area. Long‑term, he envisions opening a small wellness
    hub that blends health care, grooming, and cultural community events, allowing him to stay grounded in his Mexican heritage while providing stable, flexible employment for himself and others.
