  career_goals: Ana Maria aims to turn her passion for art and cultural advocacy into a career that amplifies indigenous Latin American voices. Her primary goal is to become a curator or program director
    at a museum or community arts center in San Francisco that focuses on indigenous art, where she can design exhibitions and educational programs. She also plans to launch a multimedia storytelling platform—combining
    video, photography, and writing—to raise awareness about mental health and cultural identity among young people. Pursuing a graduate degree in Museum Studies or Cultural Anthropology is on her radar
    to deepen her expertise. In the short term, she hopes to organize an annual multicultural art festival in the Mission District, secure scholarships for indigenous art students, and work as a freelance
    graphic designer for socially‑impactful campaigns.
