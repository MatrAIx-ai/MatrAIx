persona_description: A ceramicist who is interested in the properties and uses of feldspar in stoneware glazes. They are particularly interested in understanding the unique ability of feldspars to form
  a glossy, white surface at stoneware firing temperatures and the potential for adding small quantities of limestone or calcium minerals to increase the melt at stoneware temperatures and eliminate the
  craze/crackle network. They are also interested in the overall characteristics of feldspars and how they contribute to the composition of granites and the basis of most of our ceramic materials.
