  career_goals: Michael aims to transition into a lead engineering role within the next two years, where he can shape technical strategy and mentor a growing team. He envisions heading a product development
    group that leverages cloud‑native microservices and AI‑assisted features. Long‑term, he is interested in launching his own SaaS startup focused on workflow automation for midsize manufacturers, combining
