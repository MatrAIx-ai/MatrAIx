personas:
  professional: Wanda Wikarek, a veteran community corrections officer, leverages three decades of conflict‑de‑escalation, crisis‑intervention, and detailed case‑management skills, channeling a calm, resilient
    demeanor into structured supervision plans while allowing the flexibility needed to navigate the unpredictable realities of probation work and mentor junior staff.
  sports: Wanda Wikarek enjoys hiking the rolling hills of Hickman County with their local walking club, plays a weekly round of golf at the nearby country club, avidly follows the Tennessee Volunteers
    football team and the Nashville Predators hockey club, and occasionally joins a senior softball league, balancing low‑impact exercise with community spirit.
  arts: Wanda Wikarek finds creative solace in quilting with their craft circle, devouring mystery novels by Agatha Christie and Tana French on quiet evenings, attending blue‑grass sessions at the community
    hall featuring fiddler Sam Bush, and cheering on performances at the local repertory theater, letting these artistic outlets knit together social ties and personal reflection.
  travel: Wanda Wikarek prefers relaxed, road‑trip style vacations that blend scenic drives through the Great Smoky Mountains, weekend stays at a family‑run B&B in Asheville, and occasional pilgrimages
    to New Orleans for its jazz heritage, planning itineraries loosely around church gatherings and family events rather than rigid schedules.
  culinary: Wanda Wikarek delights in cooking classic Southern dishes—crispy fried chicken, collard greens simmered with smoked ham hocks, buttery cornbread, and peach cobbler—using garden‑fresh tomatoes,
    sweet corn, and herbs like basil and dill, boasting a comfortable skill level that lets them host weekly family potlucks and volunteer soup‑kitchen nights with a focus on comfort and hospitality.
  core: Wanda Wikarek blends structured, calm leadership in community corrections with a flexible, garden‑to‑table hospitality, turning resilient composure into both restorative justice initiatives and
    warm, community‑centered gatherings.
background:
  cultural: Wanda was raised in a rural, white Southern family in Tennessee, where Methodist church life and community gatherings were central. The region’s Appalachian heritage instilled values of self‑reliance,
    hospitality, and respect for tradition. While she honors these cultural roots—celebrating country holidays, enjoying local music, and maintaining close family ties—her professional experience has broadened
    her perspective, encouraging a pragmatic approach to social services and criminal justice reform.
