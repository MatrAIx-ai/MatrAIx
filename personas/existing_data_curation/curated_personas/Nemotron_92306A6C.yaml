  career_goals: Wanda aims to move into a supervisory role within the county probation department, where she can shape policy and oversee a team of officers. She is pursuing a certification in correctional
    counseling to expand her treatment expertise and plans to launch a restorative‑justice program that partners with local faith‑based groups. Long‑term, she hopes to mentor retiring officers and eventually
    transition to a part‑time consulting position that supports rural community‑based correctional initiatives.
