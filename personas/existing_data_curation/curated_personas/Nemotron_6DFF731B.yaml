  career_goals: She aspires to pursue a career in engineering or environmental science, hoping to design sustainable solutions. She envisions attending a STEM‑focused high school and eventually a university
    where she can combine her curiosity about how things work with practical impact, perhaps becoming a robotics engineer, renewable energy analyst, or research scientist.
