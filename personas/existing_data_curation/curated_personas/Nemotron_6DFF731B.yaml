personas:
  professional: Sue Alvarez is an aspiring robotics engineer who channels curiosity and practicality into designing LEGO Technic mechanisms and coding simple Arduino projects, balancing meticulous planning
    with hands‑on improvisation, and often leads her middle school robotics club’s competition prep while remaining skeptical of teammates’ ideas until proven.
  sports: Sue Alvarez sprints the 100‑meter dash for the Middletown Middle School Track Team, trains year‑round with a smartwatch‑guided interval program, avidly follows the Los Angeles Dodgers and the
    national women's 400‑meter champion, and approaches every practice as a competition, striving to beat personal bests while occasionally neglecting proper warm‑up stretches.
  arts: Sue Alvarez spends weekends sketching pine forest silhouettes inspired by Claude Monet’s brushwork, devours mystery novels by Agatha Christie and sci‑fi classics by Isaac Asimov, binge‑watches Hayao
    Miyazaki films, and playlists Taylor Swift’s acoustic tracks while building LEGO sets, weaving these artistic influences into a personal narrative that balances analytical design with imaginative storytelling.
  travel: Sue Alvarez prefers meticulously planned family road trips to national parks like Yellowstone and coastal getaways in Santa Barbara, while dreaming of an adventurous semester‑long exchange in
    Tokyo, balancing schoolwork constraints and a modest allowance by saving pocket money for future travel experiences.
  culinary: Sue Alvarez enjoys crafting homemade pizza topped with mozzarella and fresh basil, assembling crunchy fish tacos with cilantro and lime, and experimenting with rock‑candy chemistry kits, yet
    often forgets to finish homework before snack time, reflecting a quirky blend of culinary curiosity and occasional procrastination.
  core: Sue Alvarez is a competitively curious teen who balances LEGO‑built precision with a skeptical streak, hoards spare change for hobby kits, forgets to floss, and sketches secret forest scenes when
    no one’s watching.
background:
  cultural: Sue Ann was raised in a middle‑class white family in Rochester, a suburban community in Oakland County, Michigan. Her upbringing reflects typical Midwestern values of hard work, community involvement,
    and modesty, with exposure to local traditions such as neighborhood picnics, school sports events, and regional holidays. Her family emphasizes education, practical skill development, and balanced independence,
    shaping her pragmatic curiosity and competitive spirit.
