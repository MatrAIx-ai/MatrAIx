personas:
  professional: Rachel Santiago, an aspiring classroom organizer, they use their disciplined eye for detail to arrange books, crayons, and play stations at the preschool, thriving on predictable routines
    while delightfully inviting peers to join in group projects, yet sometimes feel anxious when unexpected changes disrupt the schedule.
  sports: Rachel Santiago, an enthusiastic junior fan of the Los Angeles Dodgers and the Golden State Warriors, they cheer loudly during game day at snack time, while also participating in a community‑center
    gymnastics class that teaches basic tumbling and balance, and they love racing around the playground during summer yard games.
  arts: Rachel Santiago, a lively little performer, they delight in singing the catchy tunes of Luis Miguel’s "Cielito Lindo" and Selena’s "Baila Esta Cumbia" while mastering the art of cutting colorful
    papel picado during preschool art time, and they never miss a new episode of Plaza Sésamo where they mimic the bright‑colored characters.
  travel: Rachel Santiago, an adventurous family explorer, they eagerly look forward to the yearly summer drive to their aunt’s beach house in Santa Barbara, the occasional weekend trip to see grandparents
    in Los Angeles, and a treasured short vacation to Monterrey, Mexico, where they helped roll tamales with their tía and marveled at bright papel picado displays.
  culinary: Rachel Santiago, a curious junior chef, they love the warm taste of chicken tamales and the playful crunch of fresh guacamole dip, often assisting grandma by sprinkling shredded cheese onto
    quesadillas and carefully rolling tiny corn masa balls, while their favorite snack after playtime is a cinnamon‑sugar churro dipped in chocolate.
  core: Rachel Santiago balances an obsessive love for tidy play areas and group storytelling with vivid bursts of anxiety when routines shift, they always buzz with energy, friendship, and a fondness for
    colorful crafts and sweet treats.
background:
  cultural: Rachel is raised in a Mexican‑American household in Dos Palos, a close‑knit agricultural community in Fresno County. Spanish is spoken at home, and she participates in cultural traditions such
    as celebrating Día de los Muertos with homemade papel picado, cooking tamales with her grandparents, and attending local Cinco de Mayo festivals. Her family observes Catholic practices, attending weekly
    Mass and observing Holy Week traditions. She enjoys Mexican children’s programs like "Plaza Sésamo" and loves sharing stories of abuelos and tías with her friends at preschool. The blend of Mexican
    heritage and Californian upbringing shapes her bilingual fluency, love for communal celebrations, and strong sense of family values.
attributes:
  skills: '[''Basic counting (1‑10)'', ''Letter recognition (A‑Z in English and Spanish)'', ''Color and shape identification'', ''Bilingual Spanish‑English vocabulary'', ''Fine‑motor tasks: coloring, puzzle
