  hobbies: '[''Building with wooden blocks and LEGO Duplo'', ''Completing simple jigsaw puzzles'', ''Drawing and coloring pictures'', ''Singing Spanish‑English nursery rhymes'', ''Dancing to Mexican folk
    music'', ''Playing on the playground with peers'', ''Pretend cooking and helping set the table'', ''Participating in group games that require turn‑taking'']'
  career_goals: Although only four, Rachel often talks about helping others and keeping things tidy. She imagines herself as a teacher or classroom aide who creates organized learning stations, leads fun
    group activities, and makes sure every child feels cared for. She also dreams of being a community organizer for school events, where she can plan celebrations that bring families together, reflecting
    her love for structure, achievement, and supporting others.
