persona_description: A high-level official from the US chemical and plastics industry, specifically Exxon Mobil, Chevron, Shell, and Dow Chemical, who is interested in promoting US exports of chemicals
  and plastics to Africa, particularly Kenya, to counteract the growing regulation worldwide. They are also advocating for the US to ratify the Basel Convention, which would make it harder for affluent
  countries to send their waste to less affluent countries, and to ban the use of single-use plastics. They are also concerned about the effect of industry lobbying on trade talks, particularly in Mexico
  and Canada in 2018.
