personas:
  professional: Baron Medrano is an emerging community project manager who leverages meticulous organization, polished public‑speaking, and a talent for networking to design and run youth workshops, charity
    drives, and nonprofit events, while balancing a curiosity for digital tools with a pragmatic, results‑oriented mindset.
  sports: Baron Medrano thrives on outdoor activity, joining the River Falls Trail Bikers club for weekend rides along the Kinnickinnic River, hiking local state‑park trails in the summer, cheering on the
    Green Bay Packers during football season and the Milwaukee Brewers in baseball, while occasionally playing pickup basketball at the community center.
  arts: Baron Medrano channels creativity through an improv comedy troupe that meets at the local theater, drawing inspiration from performers like Tina Fey and the sketch style of The Second City, while
    also enjoying indie folk concerts featuring Sufjan Stevens and catching indie‑film screenings at the downtown cinema.
  travel: Baron Medrano prefers road‑trip adventures with friends, meticulously planning routes on Google Maps and sharing itineraries on Discord, having already explored the Upper Peninsula, Chicago, and
    a Mardi Gras weekend in New Orleans, and dreaming of a future hike in Yellowstone and a cultural immersion in Barcelona once college is completed.
  culinary: Baron Medrano favors hearty Midwestern fare—cheese curds, bratwurst, and apple pie—while experimenting with homemade nachos topped with jalapeños and cilantro, enjoys cooking simple meals for
    game nights, and treats coffee lattes with oat milk as a daily ritual to boost focus.
  core: Baron Medrano is a socially‑charged organizer who blends meticulous planning with a relentless curiosity, yet battles frequent worry and a tendency to overcommit, turning everyday interactions into
    finely‑tuned, high‑energy projects.
background:
  cultural: Baron grew up in River Falls, a small Midwestern city in Wisconsin, within a predominantly white community. His family's roots trace back to Northern European immigrants who settled in the Upper
    Midwest, combined with distant Hispanic ancestry reflected in his surname. The local culture emphasized neighborliness, community involvement, and modest, hard-working values. These influences, along
    with the region's strong emphasis on education, public schools, and extracurricular activities, have shaped his pragmatic yet curious outlook. He regularly attends community festivals and church gatherings,
    which reinforce his sense of belonging and his desire to maintain harmonious relationships.
