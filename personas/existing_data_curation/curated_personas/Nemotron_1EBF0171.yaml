personas:
  professional: Maria Santos, a 20‑year‑old retail supervisor in Los Angeles, leverages bilingual fluency, POS expertise, and a people‑first leadership style to drive store performance while balancing a
    love for spontaneous social events with a preference for clear operational structures.
  sports: Maria Santos follows the LA Galaxy and LAFC fervently, attends community soccer watch parties every weekend, participates in informal pick‑up games at local parks, and balances these social sports
    activities with regular yoga sessions to stay flexible.
  arts: Maria Santos immerses herself in the vibrant arts scene, dancing to Marc Antonio at salsa nights, admiring mural works by local street artist Shepard Fairey, and staying up‑to‑date with fashion
    influencers like Aimee Song while catching live shows by Bad Bunny.
  travel: Maria Santos prefers spontaneous weekend getaways, often traveling to nearby destinations like San Diego’s beach boardwalk or taking budget flights to Guatemala City to reconnect with family roots,
    while meticulously planning her annual trip to New York City’s fashion week to scout trends.
  culinary: Maria Santos enjoys cooking traditional baleadas with refried beans, cheese, and crema, experimenting with plantain‑based tamales, while also indulging in LA’s food festivals for tacos al pastor,
    sushi rolls, and artisanal avocado toast.
  core: Maria Santos blends a pragmatic retail mindset with an exuberant social life, juggling spreadsheets and salsa steps while occasionally forgetting to pay a utility bill until the last minute.
background:
  cultural: Maria is a first‑generation Honduran‑American who grew up in a bilingual household in Los Angeles. At home, Spanish is spoken and Honduran traditions such as Semana Santa celebrations, family
    meals, and folklore music are cherished, keeping her connected to her heritage. The vibrant Central American community in Los Angeles provides a supportive network, and the city's multicultural environment
    has broadened her perspective. Her cultural background informs her warm, community‑oriented approach in both her professional and personal life.
attributes:
  skills: '["Team leadership", "Customer service", "Bilingual communication (Spanish/English)", "POS system operation", "Inventory management", "Visual merchandising", "Sales data analysis", "Conflict resolution",
    "Staff training and development", "Scheduling and shift planning", "Retail operations management", "Basic financial reporting"]'
  hobbies: '["Salsa and bachata dancing", "Community soccer watch parties", "Exploring food festivals", "Cooking Honduran dishes (baleadas, tamales)", "Street art tours", "Live music concerts", "Following
    fashion trends", "Yoga", "Journaling"]'
  career_goals: Maria aims to advance from her current first‑line supervisory role to store manager within the next 2‑3 years, and later to a district manager overseeing multiple locations. She plans to
    complete her bachelor's degree in business administration and earn retail management certifications to deepen her strategic expertise. Long‑term, Maria dreams of opening her own boutique that blends
    contemporary fashion with Honduran cultural motifs, and she hopes to mentor other young immigrants entering the retail workforce.
