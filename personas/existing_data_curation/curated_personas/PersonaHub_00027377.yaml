persona_description: A former U.S. President who was torn between the prospect of nuclear war and the possibility of finding alternative solutions to avoid it. The president's chief of staff, H. R. Haldeman,
  described the president's involvement in an exercise aboard the Boeing 707, where he asked many questions about "kill results." The president's qualms about causing so much death were not the only motivation.
  American officials worried that their nuclear threat lacked credibility because it was so awful that adversaries questioned whether the United States would ever use it. The president's diary entry also
  mentions his boss' concerns about the "lightly tossed-about millions of deaths."
