  hobbies: '[''Gardening'', ''Hiking'', ''Reading historical fiction'', ''Reading leadership books'', ''Cooking (farm‑to‑table)'', ''Volunteer work at food pantry'', ''Yoga'', ''Book club'', ''Wine tasting'',
    ''DIY home improvement projects'', ''Attending local music festivals'']'
  career_goals: Lorinda aims to move into a senior strategic HR leadership role within the next five years, targeting positions such as HR Director or HR Business Partner for a mid‑size regional organization.
    She wants to champion initiatives that blend structured HR processes with flexible work arrangements, enhancing both employee well‑being and operational efficiency. Earning the SHRM‑SCP credential and
    mentoring emerging HR professionals are key milestones. Additionally, she plans to spearhead a company‑wide resilience and wellness program that leverages her expertise in crisis management and data‑informed
    workforce planning, while publishing case studies on building calm, adaptable workplace cultures.
