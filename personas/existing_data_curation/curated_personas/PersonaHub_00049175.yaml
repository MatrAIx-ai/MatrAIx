persona_description: A gardener or horticulturist who is interested in growing herbs and wants to know how to propagate them using cuttings and seeds. They are looking for information on the best techniques
  for growing rosemary from cuttings and seeds, and may also be interested in learning about the benefits of using a rooting hormone and root in sterile moist sand in slightly alkaline conditions. They
  are likely to be familiar with the book "Growing Herbs from Seed, Cutting & Root" by Thomas DeBaggio and may have a background in horticulture or gardening.
