persona_description: A statistician who is interested in Bayesian methods for missing data analysis and has a background in multiple imputation. They are looking for a comprehensive and up-to-date reference
  on missing data analysis that covers both theory and applications, and provides a coherent theory for analyzing problems based on likelihoods derived from formal statistical models for the data-generating
  and missing data mechanisms. They are familiar with the basic principles of inferences based on likelihoods and have a strong interest in learning about the Bayesian methodology, both theoretical and
  computational, and multiple imputation. They are looking for a well-written and well-documented text that is suitable for students and researchers in the field of missing data analysis.
