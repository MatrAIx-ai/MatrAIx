  hobbies: '[''Gardening'', ''Reading (business and literature)'', ''Cooking Southern cuisine'', ''Hiking'', ''Yoga'', ''Quilting'', ''Volunteering at food bank'']'
  career_goals: Paula aims to advance to a senior program‑manager role within the next three years, eventually leading a corporate Project Management Office (PMO) that drives strategic initiatives across
    multiple business units. She plans to obtain her PMP and Lean Six Sigma Black Belt certifications to deepen her expertise in process improvement. Long‑term, she envisions founding a boutique consultancy
    that helps small and mid‑size companies in the Memphis region streamline operations while preserving a collaborative, people‑first culture. Mentoring junior women in project management and championing
    inclusive leadership practices are also central to her professional aspirations.
