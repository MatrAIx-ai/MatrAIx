  hobbies: '[''Group Fitness Classes'', ''Hiking'', ''Kayaking'', ''Snowshoeing'', ''Book Club'', ''Volunteer Event Coordination'', ''Cooking/Baking'', ''DIY Home Décor'', ''Mindfulness Meditation'', ''Journaling'']'
  career_goals: Catherine aims to re‑enter the workforce by leveraging her organizational talent in a professional setting. Over the next two years she plans to earn a project management certification and
    secure a role as a project coordinator or event manager at a regional non‑profit or small business. Long‑term, she aspires to lead a community development program in Isanti County, overseeing grant‑funded
    projects that enhance local infrastructure and recreational services. She also hopes to launch a side consultancy offering event planning and budget optimization services to local organizations, establishing
    herself as a recognized leader in efficient community project delivery.
