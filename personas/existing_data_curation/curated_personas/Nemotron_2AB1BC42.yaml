personas:
  professional: Catherine Williams is a budding project coordinator who leverages their associate degree in Business Administration, sharp budgeting expertise, and data‑driven problem solving to streamline
    nonprofit events, while their competitive streak pushes them to exceed every timeline.
  sports: Catherine Williams fuels their fitness with spin, Zumba, and weekend snowshoeing, follows the Minnesota Vikings and Minnesota Timberwolves, and belongs to the Isanti Ride & Hike Club, where they
    lead sunrise cycling sessions.
  arts: Catherine Williams curates their cultural intake with visits to the Minnesota Orchestra, binge‑watching Greta Gerwig films, and reading diverse titles like ‘Homegoing’ by Yaa Gyasi for their book
    club, while humming along to Taylor Swift’s latest album.
  travel: Catherine Williams plans meticulous road trips to the Great Lakes—spending a summer weekend kayaking the Apostle Islands and a fall retreat in Door County—while pinning Iceland’s volcanic landscapes
    on their vision board for a future adventure.
  culinary: Catherine Williams dazzles friends with a signature wild‑rice and mushroom casserole, perfects blueberry muffin batches using locally sourced honey and cinnamon, and balances their cooking confidence
    with occasional over‑salting, which they laugh off after a quick taste test.
  core: Catherine Williams is a hyper‑organized, high‑energy community catalyst who channels competitive perfectionism into every project, while wrestling with chronic worry and a habit of over‑committing
    their packed schedule.
background:
  cultural: Catherine was raised in North Branch, a small town in Isanti County, Minnesota, where Midwestern values such as community involvement, self‑reliance, and modesty are central. Her family’s heritage
    traces back to German‑Scandinavian ancestry, reflected in local traditions like community potlucks, church gatherings, and a strong appreciation for the outdoors. The region’s emphasis on practicality,
    hard work, and volunteerism shaped her disciplined and organized nature, while the tight‑knit social fabric nurtured her sociable, outgoing side. She identifies with the broader white, middle‑class
    demographic of the area and regularly participates in county fairs, church events, and neighborhood improvement projects.
attributes:
  skills: '[''Project Management'', ''Event Coordination'', ''Budgeting'', ''Advanced Excel'', ''Microsoft PowerPoint'', ''Google Workspace'', ''Community Outreach'', ''Conflict Resolution'', ''Public Speaking'',
