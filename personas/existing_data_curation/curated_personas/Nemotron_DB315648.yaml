  career_goals: She hopes to deepen her artistic practice by experimenting with watercolor and digital art, to compile and self‑publish a family cookbook that blends recipes with personal stories, to serve
    as a volunteer art guide at the local museum, to mentor younger volunteers at the senior center in community outreach, to learn digital photography and share her images online, and to maintain her health
    and independence through regular activity and balanced stress management.
