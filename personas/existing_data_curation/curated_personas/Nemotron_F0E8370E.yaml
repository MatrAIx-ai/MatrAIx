  hobbies: '["Soccer (playing and watching)", "Cooking Mexican cuisine", "Fishing at the Rio Grande", "Video gaming (FPS and strategy)", "Hiking the Franklin Mountains", "Model building (airplane kits)",
    "Community volunteering at local festivals", "Weightlifting at the gym"]'
  career_goals: Looking ahead, Osniel aims to solidify his technical expertise and move into a supervisory role. Over the next two years he plans to earn an industrial maintenance certification and enroll
    in part-time courses in supply-chain management at a community college. He aspires to become a shift leader, eventually overseeing an entire production line, which would provide more predictable scheduling
    and greater responsibility. Financially, he hopes to purchase a home in El Paso to improve his stability, and personally he seeks to develop coping strategies for anxiety, such as counseling and mindfulness,
    to enhance his performance and well-being.
