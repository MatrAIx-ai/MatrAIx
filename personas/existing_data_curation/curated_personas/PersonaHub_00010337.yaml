persona_description: A scientist who specializes in the study of sediment cores, specifically those collected from Musky Bay, Lac Courte Oreilles, Wisconsin. Their research interests include determining
  the water quality of Musky Bay over the past several decades, reconstructing sedimentation rates, analyzing nutrient, trace-element, and biogenic silica profiles, and identifying historical changes in
  input of organic carbon, nitrogen, phosphorus, and sulfur to the bay. Their expertise includes using lead radioisotope models and cesium-137 profiles to reconstruct historical sedimentation rates. They
  are likely to be interested in the ecological history of Musky Bay and the impact of human activity on its water quality.
