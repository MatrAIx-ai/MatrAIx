personas:
  professional: Juan Spence, a 20-year-old management analyst who blends advanced Excel modeling, SQL data extraction, and Power BI visualizations to craft clean workflow solutions, consistently delivers
    succinct reports under tight deadlines, and leads small project teams with a calm, methodical demeanor.
  sports: Juan Spence, an avid hiker of the Loess Hills trails who joins the Des Moines Trail Runners for weekend 5k runs, quickly logs mileage in a personal app, and roots for the Iowa Hawkeyes in both
    football and basketball, preferring low-impact activities that fit a structured weekly routine.
  arts: Juan Spence, an acoustic-guitar enthusiast who unwinds during weekly jazz-listening sessions, dissects the improvisations of Miles Davis, John Coltrane, and Esperanza Spalding, and occasionally
    visits the Des Moines Art Center to explore contemporary exhibitions, using music as a quiet backdrop to their analytical mind.
  travel: Juan Spence, a planner-type traveler who prefers meticulously mapped itineraries, has explored Chicago's architectural tours, trekked the Grand Canyon's South Rim, and dreams of a quiet week in
    Kyoto's historic Gion district to study Japanese tea-ceremony rituals, always budgeting travel expenses in a spreadsheet before booking.
  culinary: Juan Spence, an efficient home-cook who masters meal-prep with quinoa-rosemary bowls, miso ramen with shiitake mushrooms, and pan-seared salmon with lemon-dill sauce, relishes single-origin
    pour-over coffee each morning, and keeps a recipe inventory in a tidy digital notebook.
  core: Juan Spence, a structure-obsessed analyst who schedules every hour, solves a Sudoku before bedtime, budgets with spreadsheets, and never lets a puzzle or deadline go unsolved, even if it means cancelling
    a spontaneous outing.
background:
  cultural: Juan grew up in a close‑knit African American family in South Sioux City, where church gatherings, soul‑food meals, and storytelling were central to family life. His grandparents were part of
    the Great Migration and passed down values of perseverance, education, and mutual support. He celebrates cultural milestones such as Juneteenth and participates in local African American community events,
    often volunteering at the community center. While his upbringing reflects Midwestern modesty and practicality, his heritage also influences his love for gospel music, rhythmic poetry, and a strong sense
    of communal responsibility.
attributes:
  skills: '[''Data analysis'', ''Microsoft Excel (advanced)'', ''SQL'', ''Python (basic)'', ''Power BI'', ''Process mapping'', ''Report writing'', ''Stakeholder communication'', ''Project coordination'',
    ''Time management'', ''Critical thinking'', ''Conflict resolution'']'
  hobbies: '[''Reading non-fiction'', ''Puzzle solving (Sudoku, crosswords)'', ''Board games (Catan, chess)'', ''Hiking'', ''Acoustic guitar'', ''Jazz listening'', ''Coding practice (Python)'', ''Community
    mentorship'']'
  career_goals: Juan aims to complete a bachelor’s degree in Business Analytics within the next two years and earn professional credentials such as the Certified Business Analysis Professional (CBAP) and
    Project Management Professional (PMP). He envisions moving from a junior analyst to a senior management analyst, eventually taking on a strategic consulting role focused on operational efficiency for
    regional businesses and public agencies. Long‑term, Juan hopes to lead a data‑driven team, mentor emerging analysts from underrepresented backgrounds, and perhaps launch a boutique consulting practice
    that helps community nonprofits streamline their operations.
