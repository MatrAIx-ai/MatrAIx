personas:
  professional: Kenneth Swan, a 28‑year‑old commercial landscaper with expertise in turf management, irrigation installation, and crew coordination, employs their methodical and safety‑first mindset to
    deliver reliable, eco‑friendly projects while mentoring junior crew members and maintaining meticulous client records.
  sports: Kenneth Swan enjoys playing pickup basketball at the local community center, cheers for the Charlotte Hornets and the North Carolina State Wolfpack football team, and regularly tailgates with
    friends, all while staying fit through weekend volunteer park clean‑ups that double as informal cardio sessions.
  arts: Kenneth Swan immerses themselves in classic rock and country radio, citing artists like Lynyrd Skynyrd, Johnny Cash, and Dolly Parton, and frequently joins the town’s bluegrass jam sessions, where
    they occasionally pick up a mandolin to add a rustic harmony to the gatherings.
  travel: Kenneth Swan prefers road‑trip itineraries planned on their habit app, favoring nearby escapes such as Asheville’s craft breweries, the Outer Banks’ beaches, and the Great Smoky Mountains’ hiking
    trails, while dreaming of a horticulture‑focused study tour of the Dutch flower fields.
  culinary: Kenneth Swan enjoys cooking with fresh garden harvests, often whipping up heirloom tomato bruschetta with basil and garlic, pairing it with smoky pulled pork and collard greens, and experiments
    with new spice blends like smoked paprika and chipotle, though they sometimes forget to defrost meat in time.
  core: Kenneth Swan is a detail‑driven, socially active landscaper who balances a structured work ethic with a love for community music, sports, and garden‑to‑table cooking, while wrestling with occasional
    anxiety and a tendency to over‑commit.
background:
  cultural: Kenneth grew up in Raeford, a small town in Hoke County, North Carolina, immersed in a tight-knit Southern working-class community. His family has deep roots in the region's agricultural and
    manual-labor traditions, and he was raised with the values of hard work, humility, and hospitality that are hallmarks of the rural South. Local customs - Sunday church services, community barbecues,
    and high-school football Saturdays - have shaped his social outlook, fostering a strong sense of belonging and a preference for face-to-face interaction. The region's natural landscape, with its pine
    forests and rolling fields, sparked his early interest in outdoor work and cultivated his appreciation for preserving the local environment.
attributes:
  skills: '[''turf management'', ''irrigation system maintenance'', ''landscape equipment operation'', ''safety compliance'', ''pesticide application'', ''work scheduling'', ''team coordination'', ''customer
