  hobbies: '[''basketball'', ''volunteer park clean-ups'', ''bluegrass music'', ''gardening'', ''high-school football tailgating'', ''listening to classic rock and country'', ''mindfulness walking'', ''DIY
    home projects'']'
  career_goals: Kenneth aims to obtain his GED within the next year and enroll in a community-college horticulture program to earn an associate degree in landscape technology. He aspires to become a certified
    grounds manager and secure a supervisory role overseeing municipal park maintenance in Hoke County. In the longer term, he hopes to launch his own eco-focused landscaping business that emphasizes native
    plantings and water-conserving designs, while also mentoring apprentices from the local workforce.
