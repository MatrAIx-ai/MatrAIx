personas:
  professional: Ngan Lin is an aspiring young robotics builder who channels their love for LEGO and Scratch programming into designing and testing small competition robots for their school club, applying
    a methodical, plan‑ahead mindset to every build.
  sports: Ngan Lin loves playing weekend soccer with the Long Beach Lightning U10 team, idolizes the New York Red Bulls, and balances a disciplined practice schedule with occasional video game marathons,
    though they sometimes skip stretching after matches.
  arts: Ngan Lin devotes three evenings a week to piano, favoring upbeat pieces like Yiruma's "River Flows in You" and the "Super Mario" theme, draws original cartoon strips inspired by "Adventure Time"
    and Marvel heroes, and enjoys family movie nights featuring animated classics such as "Spirited Away."
  travel: Ngan Lin's travel style blends school‑planned field trips to places like the American Museum of Natural History and family vacations to Disneyland and Washington, D.C., while day‑dreaming about
    a future trip to see giant pandas in Chengdu, preferring itineraries that mix hands‑on activities with plenty of photo opportunities.
  culinary: Ngan Lin enjoys the comforting taste of pork and chive dumplings they help roll each Lunar New Year, loves pizza topped with extra cheese, and has mastered making peanut butter‑banana toast,
    while eagerly trying the spicy Sichuan noodles they saw on a cooking show.
  core: Ngan Lin is a methodical nine‑year‑old who blends a love for building robots, disciplined piano practice, and a structured allowance routine, all while navigating school life with an eye for harmony
    and occasional forgetfulness about vitamins.
background:
  cultural: Ngan Lin belongs to a Chinese‑American family that settled in Long Beach, Nassau County. His parents speak Mandarin at home and maintain cultural traditions such as preparing dumplings for Lunar
    New Year, visiting the local Chinese cultural center, and attending weekend Chinese language school. He grows up navigating both American school life and his family’s cultural heritage, which instills
    values of respect for elders, community harmony, and academic diligence. The diverse environment of Long Beach also exposes him to a multicultural community, shaping an inclusive worldview while preserving
    his Chinese roots.
