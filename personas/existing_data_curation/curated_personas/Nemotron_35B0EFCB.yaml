  career_goals: He dreams of a future where he can design and build things that help people. Inspired by his love for LEGO and robotics, he hopes to become a civil engineer or architect, creating safe,
    well‑organized spaces for his community. He also expresses an interest in science, imagining a role as a researcher who solves real‑world problems. His caring nature leads him to consider volunteering
    as a mentor for younger kids, reflecting his desire to support others and foster cooperation.
