  career_goals: Mariagloria aims to advance to a regional sales manager position within the next three years, overseeing multiple supervisory teams across Brevard County. She plans to complete her bachelor’s
    degree in Business Administration, focusing on strategic management, to supplement her practical experience. Her long-term ambition is to become a director of sales operations, where she can shape company-wide
    sales strategies and mentor emerging female leaders. She also seeks to earn certification in advanced analytics (e.g., Tableau) to enhance data-driven decision-making, while maintaining the structured,
    routine-oriented work environment she thrives in.
