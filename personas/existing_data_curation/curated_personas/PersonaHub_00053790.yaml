persona_description: A geneticist who is interested in the interactions between genetic variants and their effects on human traits. They are curious about the role of non-additive interactions between genetic
  mutations and how they can be used to predict an individual's phenotype. They are also interested in the mathematical modeling of genetic interactions and the impact of non-additive interactions on the
  average effect of genetic variants across the population. They are likely to have expertise in genome-wide association studies and have a deep understanding of the statistical methods used to analyze
  genetic data. They are also likely to be interested in the implications of non-additive interactions for the development of personalized medicine and the use of genetic information for disease prediction.
