personas:
  professional: Steven Kitterman, a 24‑year‑old aspiring project coordinator, blends methodical planning with a curious tech‑savvy mindset, using Trello, Google Workspace and basic Python scripts to streamline
    small‑scale initiatives while they leverage strong public‑speaking and interpersonal skills to rally volunteer teams and navigate stakeholder negotiations.
  sports: Steven Kitterman, a 24‑year‑old energised by weekend pickup basketball at a local gym and Saturday hikes in the San Gabriel Mountains, they follow the Los Angeles Lakers and LA Galaxy, they join
    an intramural soccer club in the spring, and they maintain a disciplined fitness routine that blends cardio, strength training and regular stretching.
  arts: Steven Kitterman, a 24‑year‑old avid concertgoer, they regularly attend live shows by artists like Tame Impala, Anderson .Paak and The Strokes, explore film screenings at the Los Angeles Film Festival,
    and channel their creative side into DIY home‑improvement projects inspired by design influencers such as Joanna Gaines.
  travel: Steven Kitterman, a 24‑year‑old who balances a busy schedule with a love for spontaneous road trips, they have explored the desert trails of Joshua Tree, spent a long weekend in Mexico City savoring
    street food, and are saving for a future adventure to Tokyo and the ice‑capped landscapes of Iceland, preferring a mix of planned itineraries and last‑minute detours.
  culinary: Steven Kitterman, a 24‑year‑old home‑cook who likes to host dinner nights, they specialize in assembling carne asada tacos with fresh cilantro, lime and roasted corn, dabble in Korean bibimbap
    using gochujang and sesame oil, and consider themselves an enthusiastic but occasionally messy amateur chef who loves experimenting with seasonal herbs and fresh produce.
  core: Steven Kitterman, a 24‑year‑old project‑minded social‑butterfly, they juggle volunteer work, basketball, and late‑night gaming while habitually forgetting to water their houseplants, yet they channel
    that restless energy into building community‑focused tech solutions.
background:
  cultural: Steven grew up in Temple City, a suburban enclave in Los Angeles County known for its cultural diversity. While his family background is white American and likely middle class with roots in
    the post war Midwest, his upbringing was shaped by the multicultural fabric of Southern California. He was exposed to a variety of cuisines such as Mexican tacos, Korean barbecue, and Japanese sushi,
    and participated in community events like Lunar New Year celebrations and local cultural fairs. This environment fostered a broad worldview and a respect for different traditions, while his household
    emphasized values of hard work, education, and community service.
