  career_goals: Steven aims to complete his bachelor's degree in business administration or communications within the next two years while gaining practical experience through internships in project management
    or community outreach. He envisions starting as a junior project coordinator at a tech startup or a nonprofit organization, rapidly advancing to a project manager role. Over the longer term, he aspires
    to lead a department that designs and implements community focused programs, eventually launching his own social enterprise that empowers underserved youth in Los Angeles through mentorship and skill
    building workshops.
