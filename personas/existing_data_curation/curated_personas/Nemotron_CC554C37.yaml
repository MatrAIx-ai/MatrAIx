  hobbies: '[''Church choir participation'', ''Knitting and quilting circles'', ''Community gardening'', ''Cooking and recipe sharing'', ''Listening to blues and soul music'', ''Family storytelling and
    genealogy research'', ''Community bingo nights'', ''Attending local festivals'']'
  career_goals: Although retired, Yolanda aims to deepen her impact on the local community. She plans to launch a mentorship program at her church that pairs senior volunteers with younger members to share
    life skills and stories. She hopes to expand the neighborhood food‑bank initiative she helped start, making it more flexible and responsive to the needs of families. Yolanda is also eager to document
    her family’s genealogy and publish a small memoir online, using her growing comfort with digital tools. Maintaining her health and independence so she can continue attending community events and support
    her husband remains a central personal ambition.
