personas:
  professional: Yolanda Dupre, a retired community volunteer coordinator, blends their expertise in event planning, conflict mediation, and intergenerational mentorship with a sociable, compassionate spirit
    and a curiosity‑driven, practical mindset as they launch a senior‑youth mentorship program at their church.
  sports: Yolanda Dupre, a devoted fan of the Memphis Redbirds minor league baseball team and the University of Tennessee Volunteers football, stays active by walking the neighborhood greenway three times
    a week, participates in the local Silver Sneakers senior fitness class, and enjoys low‑impact yoga, all while they cheer for their teams at community watch parties.
  arts: Yolanda Dupre, an enthusiastic gospel choir member who loves listening to B.B. King and Aretha Franklin at the downtown blues bar, channels creativity through quilting circles that showcase patterns
    inspired by Nancy Crow, and frequently visits the regional art museum for exhibitions featuring contemporary painters like James Garvin, blending music and visual arts into their daily life, which they
    cherish.
  travel: Yolanda Dupre, who favors short, well‑planned trips with grandchildren, has enjoyed day excursions to the Great Smoky Mountains National Park and the historic town of Natchez, dreams of a relaxed
    Mississippi River cruise, and aims to visit the Smithsonian in Washington, D.C., while they budget carefully to keep travel affordable.
  culinary: Yolanda Dupre, an adept home cook who perfects healthier twists on classic Memphis dishes such as low‑sodium dry‑rubbed pork ribs, grilled salmon seasoned with garden‑fresh basil and thyme,
    and sweet potato casserole with a crisp oat topping, delights in swapping recipes at community cooking classes while they always keep pantry staples like canned tomatoes, dried beans, and fresh herbs
    on hand.
  core: Yolanda Dupre is a fiercely compassionate 82‑year‑old community stalwart who transforms gatherings with song, quilting, and fresh garden produce, yet they habitually misplace their glasses and sometimes
    dominate phone conversations with enthusiastic anecdotes.
background:
  cultural: Yolanda was born in the early 1940s into a white Southern family in Memphis, Tennessee. Raised in a close‑knit community centered around church, family gatherings, and Southern hospitality,
    she embodies the values of generosity, mutual support, and respect for tradition. Memphis’s rich musical heritage, especially blues and soul, shaped her love for live music and communal dance. Her upbringing
    in the post‑war South, combined with experiences during the civil‑rights era, gave her a nuanced appreciation for social harmony and a compassionate outlook toward all neighbors. She carries forward
    Southern culinary customs, such as slow‑cooked barbecues and baked cornbread, while also embracing the evolving cultural tapestry of modern Memphis.
