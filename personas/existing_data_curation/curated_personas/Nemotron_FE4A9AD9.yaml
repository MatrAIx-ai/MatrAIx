  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting'', ''Reading contemporary fiction and non‑fiction'', ''Nature photography'', ''Gardening (heirloom vegetables)'', ''Experimenting
    with fusion cooking'', ''Yoga and mindfulness meditation'', ''Attending small live‑music performances'', ''Volunteering at community health fairs'']'
  career_goals: Katherine plans to return to school to complete her Bachelor of Science in Nursing and then pursue a Master’s degree to become a Nurse Practitioner with a focus on holistic and integrative
    health. She hopes to lead a hospital‑based wellness program that weaves artistic expression into patient recovery pathways, aiming to improve mental health outcomes alongside physical healing. Long‑term,
    she envisions mentoring new nurses, championing evidence‑based practices that incorporate creative therapies, and possibly establishing a community health clinic in Athens that offers low‑cost art‑focused
    health workshops. Her ambition balances professional advancement with maintaining the flexibility she values in her personal life.
