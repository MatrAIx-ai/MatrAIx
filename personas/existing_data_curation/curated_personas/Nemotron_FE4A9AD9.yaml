personas:
  professional: Katherine Price is a seasoned registered nurse who pairs meticulous clinical skills—patient assessment, IV therapy, wound care, and EMR proficiency—with a curiosity‑driven penchant for weaving
    art‑therapy into treatment plans, using their compassionate yet assertive voice to champion patient safety and holistic recovery.
  sports: Katherine Price is a casual fitness enthusiast who practices yoga three times a week, joins the Nashville Road Runners for spring trail runs, plays pickup volleyball at the community center, and
    cheers for the Nashville Predators and the Tennessee Volunteers during the football season.
  arts: Katherine Price is an avid watercolorist who captures the sunrise over the Tennessee River with a style inspired by Claude Monet and Georgia O’Keeffe, curates nature photographs for local museum
    exhibits, and finds solace in intimate acoustic sets by Nick Drake, Margo Price, and the folk trio The Duggans at downtown coffee houses.
  travel: Katherine Price is a purposeful wanderer who plans trips around sunrise photography, having explored the Natchez Trace, the Great Smoky Mountains, and a meditation retreat in Kyoto, while dreaming
    of a weekend getaway to the Amalfi Coast and balancing a modest travel budget with spontaneous roadside discoveries.
  culinary: Katherine Price is an intermediate home cook who blends Southern comfort food with global twists—misoy‑glazed shrimp and grits, fried green tomatoes seasoned with Szechuan pepper, and collard
    greens simmered with kimchi—while favoring heirloom tomatoes, fresh okra, smoked paprika, and rosemary in their experimental kitchen.
  core: Katherine Price is a curious, art‑infused nurse who balances compassionate patient advocacy with a relaxed, slightly disorganized lifestyle, often swapping a clinical chart for a watercolor sketch
    during a break.
background:
  cultural: Katherine grew up in a close‑knit Southern family in Limestone County, where church gatherings, high‑school football games, and family barbecues formed the backdrop of her early life. This upbringing
    instilled a strong sense of community, hospitality, and respect for tradition. While she cherishes Southern cuisine and folk music, her college years sparked a broader curiosity about the arts, world
    literature, and unconventional ideas, leading her to blend her heritage with a more eclectic worldview. Living in Athens—home to Auburn University’s vibrant campus—has further exposed her to diverse
    cultural events, academic discourse, and a thriving local arts scene. She maintains ties to her roots through seasonal participation in town festivals and by supporting local artisans, while also embracing
    the progressive, collaborative spirit of her professional nursing community.
attributes:
  skills: '[''Patient assessment'', ''Medication administration'', ''IV therapy'', ''Wound care'', ''Chronic disease management'', ''Electronic medical record (EMR) navigation'', ''Health education and
