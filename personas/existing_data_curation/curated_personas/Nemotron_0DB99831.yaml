  career_goals: Though only two, Dexter’s curiosity and love for art and music point toward future aspirations. He often dreams aloud about drawing big pictures, making music that makes people dance, and
    exploring the world like a little explorer. As he grows, he aims to become an artist or musician who blends vibrant colors and rhythmic sounds, possibly sharing stories and songs that celebrate his
    community and the natural world around him.
