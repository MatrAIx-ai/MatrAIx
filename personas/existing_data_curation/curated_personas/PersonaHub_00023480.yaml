persona_description: A geologist who is interested in national and international geology data, GIS data, and maps. They are looking for comprehensive and up-to-date information on geologic maps, stratigraphic
  naming conventions, and mineral resources. They are also interested in the U.S. Geological Survey's Geology Map Catalog, Mineral Resources On-Line Spatial Data, and the National Cooperative Geologic Mapping
  Program (NCGMP). They are likely to be familiar with the U.S. Bureau of Land Management's interactive web maps and the A Tapestry of Time and Terrain map that combines geology and topography.
