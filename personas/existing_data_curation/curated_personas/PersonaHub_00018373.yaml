persona_description: A teacher and author who specializes in mindfulness practices and their role in social change. They have a passion for exploring the connection between inner practices and outer activism,
  and have written books and shared teachings on this topic. They have a deep understanding of the importance of personal practices in nurturing resilience, compassion, and empathy, and how they can be
  used to sustain action in the world. They are also knowledgeable about the role of meditation, yoga, and other inner practices in dealing with challenging emotions and dealing with the suffering in the
  wider world. They have a unique perspective on how mindfulness and compassion practices can offer a window into new perspectives of interconnection and interconnectedness, and how they can be a gateway
  to deeply experiencing connection in themselves, their movements, and with the natural world of which they are all a part. They are also skilled in using mindfulness and compassion practices to sustain
  hope in challenging times.
