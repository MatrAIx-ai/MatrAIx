  hobbies: '[''Cooking soul‑food inspired meals'', ''Backyard gardening'', ''Playing acoustic guitar'', ''Listening to jazz and blues'', ''Watching Houston Astros and Rockets games'', ''Playing in a community
    basketball league'', ''Volunteering as a youth tutor'', ''Traveling to Texas state parks and historic sites'', ''Maintaining a travel blog'']'
  career_goals: Michael aims to expand his influence beyond the classroom by developing a signature interdisciplinary program that merges entrepreneurship with social impact, targeting underrepresented
    students in the Houston metropolitan area. He plans to complete a bachelor's degree in education within the next two years and eventually pursue a master's to qualify for a department chair position.
    Additionally, he aspires to lead a regional mentorship network that connects industry professionals with community college learners, fostering hands‑on experiences while preserving his commitment to
    work‑life balance and personal flexibility.
