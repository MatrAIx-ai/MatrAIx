personas:
  professional: Michael Duggins, a seasoned community college professor in technology and business, blends curiosity-driven experimentation with practical, data‑driven curriculum design to craft flexible,
    project‑based courses, while their cooperative nature shines in mentoring junior faculty and nurturing inclusive, community‑oriented initiatives.
  sports: Michael Duggins fuels his competitive spirit by cheering for the Houston Astros and Rockets each season, dribbling with the Houston Central Community Basketball League every Thursday night, and
    occasionally tossing a football with friends during fall weekends while balancing his love for low‑key, social fitness over rigorous training regimens.
  arts: Michael Duggins channels creativity into acoustic‑guitar sessions at neighborhood barbecues while soaking up the soulful rhythms of John Coltrane, B.B. King, and contemporary blues artist Gary Clark
    Jr., and finds inspiration in the cinema of Spike Lee and the poetry of Maya Angelou that often echo in their cooking improvisations.
  travel: Michael Duggins, an avid road‑tripper, plots spontaneous weekend routes across Texas state parks like Big Bend, Enchanted Rock, and Guadalupe Mountains while documenting each campsite and historic
    site on a modest blog, and dreams of extending the trail to New Mexico’s Carlsbad Caverns and Louisiana’s Cajun country when budget and family schedules allow.
  culinary: Michael Duggins, a self‑taught home chef, whips up soul‑food‑inspired creations such as smoked brisket glazed with rosemary‑infused bourbon, collard greens sautéed with garden‑fresh thyme and
    smoked turkey, and spicy shrimp étouffée seasoned with cayenne, paprika, and locally grown okra, often experimenting with unexpected flavor pairings while sharing generous plates with friends and family.
  core: Michael Duggins blends a curiosity‑driven love for jazz, garden‑fresh cooking, and flexible teaching with a delightfully disorganized habit of juggling multiple projects while never missing a chance
    to play guitar at a neighborhood gathering.
background:
  cultural: Michael grew up in a close‑knit African‑American family in the Greater Houston area, where church gatherings, family reunions, and storytelling were central to his upbringing. These experiences
    instilled a deep respect for community, resilience, and cultural heritage. He celebrates his roots through music, food, and participation in local cultural events, while also embracing the diversity
    of Pearland's growing multicultural landscape. Michael actively incorporates African‑American perspectives into his teaching, highlighting contributions in technology and entrepreneurship, and he mentors
    students from underrepresented backgrounds, reflecting his commitment to equity and cultural competency.
attributes:
  skills: '[''Curriculum design'', ''Instructional technology integration'', ''Project‑based learning'', ''Adult education pedagogy'', ''Mentoring and faculty advising'', ''Data‑driven assessment'', ''Community
