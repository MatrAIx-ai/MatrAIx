personas:
  professional: Peggy Speed, a one‑year‑old budding explorer, engages in highly structured block‑building sessions that nurture early spatial reasoning and fine‑motor coordination, reflecting a practical
    and competitive streak that foreshadows a future career in engineering or design.
  sports: Peggy Speed, an energetic toddler, enjoys watching the Chicago Cubs on family TV and participates in a weekly baby gymnastics class where they competitively chase after foam balls, yet also values
    solo crawling drills that provide structured movement.
  arts: Peggy Speed, with an innate love for melody, frequently sings along to Disney’s “Let It Go” and Sesame Street’s “C Is for Cookie”, mimicking rhythmic claps and swaying to the beat, which shapes
    their early artistic expression.
  travel: Peggy Speed, who prefers predictable outings, frequently visits the local zoo and the family’s beloved beach resort, planning each trip with a strict schedule that includes nap times, snack breaks,
    and a beloved stuffed rabbit for comfort.
  culinary: Peggy Speed, displaying a distinct palate, eagerly devours sweet pureed carrots and mashed sweet potatoes while consistently rejecting peas and broccoli, often using a small wooden spoon and
    creating a predictable mess on the high‑chair tray.
  core: Peggy Speed is a one‑year‑old whose love for routine, competitive curiosity, and selective tastes combine into a charming yet occasionally stubborn toddler personality.
background:
  cultural: Peggy is raised in a white, Midwestern family in Festus, Missouri. Her family participates in community church events, celebrates holidays with family gatherings, and engages in local traditions
    such as picnics and nature walks. The upbringing emphasizes politeness, modesty, love of outdoor activities, and a strong sense of community.
