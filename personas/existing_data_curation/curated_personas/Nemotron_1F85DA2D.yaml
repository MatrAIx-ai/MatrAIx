personas:
  professional: Alberto Sarria, a 28‑year‑old aspiring certified HVAC technician, leverages their methodical organization, bilingual fluency, and hands‑on troubleshooting expertise to diagnose climate systems
    efficiently while reliably meeting project deadlines and collaborating in small service teams, and they take pride in earning a reputation for reliability among clients and coworkers.
  sports: Alberto Sarria fuels their love of the outdoors by weekly hikes in the Franklin Mountains, supports the El Paso Chihuahuas and El Paso Locomotive FC as a devoted fan, balances cardio with occasional
    weight‑lifting sessions to maintain the stamina needed for both trail climbs and seasonal pickup basketball games, and they often log their workouts in a simple spreadsheet to track progress.
  arts: Alberto Sarria captures the stark border‑landscape with a DSLR, drawing inspiration from Ansel Adams' black‑and‑white vistas while winding down to the norteño sounds of Los Tigres del Norte and
    the brass‑rich melodies of Banda El Recodo, and they regularly host Settlers of Catan evenings that blend strategy with a love for visual storytelling.
  travel: Alberto Sarria plans trips with meticulous spreadsheets, preferring structured weekend getaways to nearby gems like Carlsbad Caverns and the wine‑rich Texas Hill Country, while dreaming of a cultural
    immersion tour of Oaxaca and a rugged trek through Patagonia, balancing adventure with the financial reality of supporting family back home, and they budget each journey carefully to ensure feasibility.
  culinary: Alberto Sarria whips up authentic carnitas, hand‑rolled tamales, and smoky pozole using fresh chiles, corn masa, and cilantro, showcasing a home‑cook skill level that blends precise timing with
    improvisational flair, and they relish the occasional pop‑up food‑cart experiment that pairs their culinary creations with locally sourced craft beer.
  core: Alberto Sarria blends methodical precision with a restless curiosity, keeping a meticulously organized budget while secretly hoarding extra screws and spare parts in a shoebox under the bed, and
    they never pass a scenic overlook without snapping a photo.
background:
  cultural: Alberto grew up in a Mexican‑American household in El Paso, Texas, where his parents, originally from Jalisco, instilled both Mexican and American cultural values. He is bilingual, celebrates
    Día de los Muertos, quinceañeras, and Mexican national holidays alongside U.S. traditions like Thanksgiving and Independence Day. Frequent cross‑border visits to relatives in Ciudad Juárez keep his
    ties to Mexico strong. This bicultural environment has shaped his respect for family, community solidarity, and the rich culinary and musical heritage of his Mexican roots.
attributes:
  skills: '[''Automotive maintenance'', ''Basic electrical work'', ''HVAC troubleshooting'', ''Bilingual communication (Spanish/English)'', ''Microsoft Office'', ''Basic web design'', ''Digital photography'',
