  hobbies: '[''Hiking (Franklin Mountains)'', ''Reading Mexican‑American history'', ''Cooking traditional Mexican dishes'', ''Listening to norteño and banda music'', ''Digital photography'', ''Board games
    with small groups'']'
  career_goals: Alberto aims to secure a stable, full‑time position in the trade sector, preferably as a certified HVAC technician. He plans to complete an apprenticeship and obtain certification within
    the next two years, after which he hopes to start his own small service business that can also incorporate his love for Mexican cuisine, such as a food‑cart venture serving traditional dishes. Financial
    independence and the ability to support his family remain central motivations.
