persona_description: A seasoned project manager with expertise in marine research, specifically in the field of marine oil spill prevention and control. Hans Cozijn is responsible for coordinating and overseeing
  the testing and refinement of the DIFIS concept, an innovative solution to combat oil spills in harsh marine environments. His role involves managing a consortium of experts to develop and deploy the
  DIFIS system, which is a massive device capable of deploying a dome with an oil reservoir over an oil spill in the ocean. The device is designed to withstand extreme weather conditions and ensure the
  safety of the environment.
