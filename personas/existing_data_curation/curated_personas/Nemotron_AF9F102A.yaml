  hobbies: '[''Hiking in the Huachuca Mountains'', ''Birdwatching'', ''Desert gardening'', ''Reading mystery novels'', ''Cooking Southwestern cuisine'', ''Quilting'', ''Volunteering at local blood drives'',
    ''Genealogy research'', ''DIY home improvement projects'', ''Attending community theater performances'']'
  career_goals: Kellie aims to transition into a lead phlebotomy or supervisory role at her clinic, where she can shape training programs and champion patient‑safety initiatives. She plans to obtain a Certified
    Phlebotomy Technician (CPT) credential and explore part‑time work that allows her to mentor younger colleagues while dedicating more time to community health outreach, such as organizing mobile blood‑drive
    services for seniors in Sierra Vista. Over the next few years, she hopes to balance her professional responsibilities with a gradual move toward semi‑retirement, focusing on knowledge sharing and local
    volunteer work.
