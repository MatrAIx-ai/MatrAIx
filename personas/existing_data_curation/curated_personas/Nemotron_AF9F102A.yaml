personas:
  professional: Kellie is a veteran phlebotomist with over three decades of expertise in venipuncture, infection‑control, and staff training, who blends practical curiosity with a relaxed, flexible approach
    to workflow, allowing them to calmly troubleshoot bottlenecks and champion patient‑safety initiatives as they pursue a supervisory role.
  sports: Kellie embraces the outdoors through weekly hikes with the Sierra Vista Trail Club and a senior walking group, occasionally catching Arizona Diamondbacks baseball games on TV and cheering for
    the Phoenix Suns, while they maintain a relaxed, low‑impact fitness routine.
  arts: Kellie weaves her creativity into hand‑stitched quilts and devours mystery novels by Agatha Christie, while they regularly attend performances at the Sierra Vista Community Theatre and unwind to
    the twang of Willie Nelson and local folk bands.
  travel: Kellie favors flexible road trips that blend nature and culture, such as weekend drives to the Grand Canyon and Sedona or attending the Tucson Gem & Mineral Show, while they dream of exploring
    Santa Fe’s historic plaza and the Yucatán ruins on a future vacation.
  culinary: Kellie delights in cooking southwestern staples like green chile stew and prickly pear jam, often infusing fresh desert herbs from her garden and mastering the art of perfectly rolled tortillas,
    though they sometimes over‑season in enthusiasm.
  core: Kellie blends three decades of phlebotomy precision with a love for desert gardening and mystery novels, navigating life with calm pragmatism, occasional disorganization, and a habit of juggling
    quilting needles while planning the next blood‑drive.
background:
  cultural: Kellie grew up in a middle‑class, white American family in the Midwest before relocating to Arizona in her twenties. She carries traditional values of hard work, self‑reliance, and community
    service. Living in Sierra Vista, she has embraced the Southwest’s blend of Native American, Hispanic, and military influences, celebrating holidays like Thanksgiving and the Fourth of July while also
    enjoying local festivals and supporting the regional veterans’ community. Her cultural identity is rooted in a pragmatic, friendly, and inclusive outlook that reflects both her upbringing and the diverse
    environment of Cochise County.
