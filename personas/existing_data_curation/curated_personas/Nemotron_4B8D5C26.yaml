  hobbies: '[''Gardening'', ''Birdwatching'', ''Historical Fiction Reading'', ''Quilting'', ''Cooking Traditional Recipes'', ''Bridge'', ''Church Senior Fellowship'', ''Library Story‑time Volunteering'',
    ''Beach Walks'']'
  career_goals: Although formally retired, Jenny aims to stay actively involved in her community. She plans to volunteer as a mentor for retired educators, contribute oral histories to the local historical
    society, and possibly compile a memoir of her teaching career. Maintaining her health through daily walks on the beach and regular gardening is a top priority, as is continuing to support her husband
    and nurture relationships with her grandchildren. She also hopes to lead a small book‑club focused on historical fiction at the senior center.
