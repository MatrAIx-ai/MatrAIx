personas:
  professional: Jenny Lyons, a retired elementary school teacher with three decades of classroom expertise, now leads the senior center’s activity calendar, volunteers in community literacy programs, and
    offers basic computer tutoring, and they blend a routine‑driven mindset with a relaxed approach to obligations, ensuring every event feels familiar yet welcoming.
  sports: Jenny Lyons stays active through daily shoreline walks, informal yoga sessions at the senior center, and occasional bird‑watching excursions, cheering on the Tampa Bay Buccaneers and the Miami
    Heat while they belong to the Edgewater Senior Fitness Club’s walking group, preferring low‑impact exercise that fits their routine‑centric lifestyle.
  arts: Jenny Lyons expresses her creative side through intricate quilting, often inspired by the patterns of Georgia O’Keeffe’s floral paintings, and enjoys reading historical fiction by Ken Follett and
    Hilary Mantel, while they attend community theatre productions of classic plays and listen to the timeless croons of Frank Sinatra and Doris Day.
  travel: Jenny Lyons favors leisurely, well‑planned trips such as a recent cruise to the Caribbean and a nostalgic road‑trip along the historic Gulf Coast to Mobile and New Orleans, preferring guided tours
    that fit their routine and allow them to spend quality time with grandchildren, and they keep a travel journal of each destination.
  culinary: Jenny Lyons delights in cooking classic comfort dishes like chicken and dumplings, pot roast with rosemary, and key lime pie, often using fresh citrus from their own trees and herbs like basil
    and thyme, and they regularly prepare homemade marmalade and preserves for family gatherings.
  core: Jenny Lyons blends a steadfast love for routine with a gentle, flexible spirit, balancing community service, gardening, quilting, and a penchant for occasional forgetfulness while they cherish quiet
    mornings with a cup of tea.
background:
  cultural: Jenny grew up in a mid‑century American household with roots in the Midwest, raised in a Protestant, middle‑class family that emphasized hard work, community service, and respect for tradition.
    Her cultural identity reflects mainstream American values, with a strong appreciation for family gatherings, church community, and seasonal celebrations. Relocating later in life to Edgewater, Florida,
    she has incorporated the coastal lifestyle while maintaining her traditional outlook and practical, routine‑oriented approach to daily life.
attributes:
  skills: '[''Lesson Planning'', ''Hands‑On Instruction'', ''Classroom Management'', ''Teacher Mentoring'', ''Community Literacy Coordination'', ''Senior Center Activity Scheduling'', ''Volunteer Coordination'',
