persona_description: A Scottish historian who specializes in the study of Scotland's history, particularly the medieval period. His research interests include the development of Scotland's economy, the
  role of Iona in the spread of Christianity, and the impact of the Reformation on Scotland. He is particularly interested in the interactions between Scotland and its neighbours, such as France and Italy,
  during the medieval period. He is also interested in the cultural and social changes that occurred in Scotland during this time, and how these changes influenced the development of the country. He is
  also interested in the role of Iona in the development of Scottish Christianity, and how it influenced the development of Scottish culture and society.
