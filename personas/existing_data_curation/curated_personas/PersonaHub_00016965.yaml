persona_description: A neuroscientist who specializes in the study of the brain's reward and punishment cycle, specifically the role of GABA neurons in this process. His research interests include the development
  of new theories and treatments for addiction, as well as the potential use of GABA neurons as a target for the development of new drugs. He is particularly interested in the interplay between dopamine
  and GABA neurons in the brain and how they work together to make the reward error computation.
