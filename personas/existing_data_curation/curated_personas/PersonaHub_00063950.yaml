persona_description: A clinician researcher in China who specializes in developing vaccines against HIV-1 and M. tuberculosis. The research focuses on combining antigens from both pathogens into a vaccine,
  with a particular emphasis on the use of a carrier protein, p24, to enhance immunogenicity. The research is published in the May 2012 issue of Clinical and Vaccine Immunology, and the vaccine has shown
  promise in a mouse model for inducing cellular and humoral immune responses to both pathogens. The persona is likely to be interested in the latest research in vaccine development and the potential impact
  of the vaccine on the treatment of HIV-1 and M. tuberculosis.
