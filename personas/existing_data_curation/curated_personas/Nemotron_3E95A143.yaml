  hobbies: '["Gardening (vegetable garden)","Fishing (Frio River trips)","Chess (local club)","Cooking Spanish cuisine (paella, tortilla española)","Reading non-fiction (economics, history, self-improvement)","Listening
    to music (flamenco, classic rock)","Hiking (Hill Country trails)","Community volunteering (financial literacy workshops)"]'
  career_goals: Marcio aims to become a Certified Financial Planner (CFP) within the next two years and later obtain the Chartered Financial Analyst (CFA) designation to deepen his expertise. He envisions
    expanding his client base to serve small businesses and the Hispanic community in South Texas, eventually launching his own boutique advisory firm that emphasizes straightforward, actionable financial
    guidance. Additionally, he seeks personal financial independence, plans to purchase a home in Beeville, and hopes to travel to Spain to connect with his cultural roots.
