  hobbies: '[''Hiking on local trails'', ''Rose and herb gardening'', ''Reading mystery novels'', ''Participating in a book club'', ''Volunteering for Red Cross disaster preparedness'', ''Practicing yoga
    for stress relief'', ''Attending local wine tastings'', ''DIY home improvement projects'']'
  career_goals: Meredith aims to advance from her current driver/attendant role to become a certified paramedic within the next three years, supplementing her high school education with an accredited EMS
    program. She is also interested in taking on supervisory responsibilities, such as leading a shift team or overseeing ambulance fleet operations, where she can apply her organizational strengths to
    improve response efficiency and safety protocols. Long‑term, she hopes to contribute to community outreach by developing training workshops for volunteers and first‑responders, integrating new medical
    technologies while ensuring pragmatic, evidence‑based practices.
