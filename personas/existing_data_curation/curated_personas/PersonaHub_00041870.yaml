persona_description: An environmental scientist who specializes in stream ecology and stream restoration, with a focus on identifying and managing migratory obstructions and land cover changes in stream
  systems. This person has experience working with RVCA staff to collect and analyze data on fish species, habitat types, and land cover changes in the Barbers Creek catchment, and has a keen interest in
  understanding how these factors impact fish populations and stream health. This person is knowledgeable in the use of spatial analysis tools and has experience working with GIS data to identify and map
  key features such as beaver dams, riparian restoration opportunities, and land cover changes.
