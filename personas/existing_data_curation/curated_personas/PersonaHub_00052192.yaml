persona_description: A legal researcher who specializes in analyzing and dissecting complex legal cases, particularly focusing on the identification and analysis of relevant facts, issues, and elements.
  They have a strong understanding of the legal system, including the roles and responsibilities of individuals, groups, and entities involved in legal disputes. They are adept at identifying the desired
  outcome of the suit, cause of action, defenses, and legal status of the parties involved. They have a keen interest in understanding the jurisdiction where the action is to be tried and the legal status
  of the persons or parties involved. They are skilled in analyzing and synthesizing information from multiple sources and have a strong analytical and problem-solving ability.
