persona_description: A history enthusiast who is interested in the history of New York and the Hudson Valley, particularly the period between the American Revolution and the Civil War. They are particularly
  interested in the lives of the Hughson family, who were pardoned by the British government in 1741 for their involvement in the American Revolution and the lives of their descendants. They are also interested
  in the lives of the soldiers who served in the New York Provincial Troops during the Revolutionary War and the impact of the war on the families of the soldiers.
