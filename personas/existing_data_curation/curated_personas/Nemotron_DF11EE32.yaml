  hobbies: '[''Urban Running'', ''Business & Self‑Development Reading'', ''Live Jazz & R&B Concerts'', ''Cooking Soul Food'', ''Mentoring High‑School Students'', ''Yoga'', ''Photography of Cityscapes'']'
  career_goals: As an ambitious and competitive professional, Raquel aims to step into a regional sales manager role within three years, expanding her oversight to multiple territories and larger teams.
    She plans to earn an MBA focused on strategic management to deepen her analytical expertise. Her long‑term vision is to become a director of sales or chief revenue officer, shaping enterprise‑wide sales
    strategy, championing data‑driven decision‑making, and mentoring emerging talent. Additionally, she seeks to lead diversity and inclusion initiatives that increase the representation of Black professionals
    in senior sales leadership.
