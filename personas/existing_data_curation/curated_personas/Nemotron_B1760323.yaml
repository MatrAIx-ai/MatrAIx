  hobbies: '["Visiting art galleries and museums","Painting and watercolor sketches","Quilting and textile crafts","Gardening (herbs and native flowers)","Reading novels and poetry by Black authors","Attending
    live jazz, blues, and gospel performances","Photography of community events","Participating in local book clubs","Volunteering at the senior center","Exploring genealogy and family history"]'
  career_goals: Although retired from formal employment, Annie aims to channel her passion for art and community into a volunteer leadership role. She plans to launch an intergenerational art workshop at
    the local senior center, where elders and teens co‑create murals and crafts. She also hopes to serve on the board of a DeKalb County cultural nonprofit, mentor young Black women interested in entrepreneurship,
    and write a memoir that weaves together her life experiences, Southern Black heritage, and love of creativity. Learning digital media tools to document community stories is a personal ambition that
    she pursues in her spare time.
