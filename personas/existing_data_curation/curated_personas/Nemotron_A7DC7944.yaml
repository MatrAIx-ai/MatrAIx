personas:
  professional: Fabian Moralesramos is a community-driven muralist and cultural organizer who leverages bilingual storytelling and improvisational problem‑solving to lead spontaneous art workshops, despite
    a habit of shunning rigid deadlines.
  sports: Fabian Moralesramos enjoys weekend pickup soccer with the Edinburg FC Dragons, follows the Houston Astros in baseball and the Dallas Cowboys in football, and keeps fit by joining the local sunrise
    yoga circle at Rio Grande Valley Park, though they admit to skipping workouts when a new mural commission arises.
  arts: Fabian Moralesramos immerses themselves in creating large‑scale murals inspired by the abstract splatters of Jackson Pollock and the storytelling boldness of Diego Rivera, while strumming acoustic
    folk‑rock riffs à la Neil Young and Bob Dylan, and finds inspiration from the cinematic narratives of Guillermo del Toro and the theatrical flair of Lin‑Manuel Miranda.
  travel: Fabian Moralesramos prefers impromptu road trips to border towns like San Antonio and culturally rich cities such as Oaxaca, Madrid, and New Orleans, often hitchhiking or using budget rideshares
    to stretch a modest travel fund while gathering stories for future murals.
  culinary: Fabian Moralesramos loves crafting regional dishes like chicken pozole, pork carnitas, and elote, frequently improvising with smoked chipotle, fresh cilantro, and toasted pepitas, and they treat
    each kitchen experiment as a canvas, though they sometimes over‑season in the heat of creativity.
  core: Fabian Moralesramos is a spontaneous, fiercely creative community artist who blends abstract vision with storytelling, navigates life with a budget‑tight yet generous heart, and battles the tug‑of‑war
    between structure and improvisation.
background:
  cultural: Born to Mexican parents and raised in the Rio Grande Valley, Fabian embodies a bicultural Mexican‑American identity. He is fluent in Spanish and English, and his daily life reflects a blend
    of traditional Mexican customs—such as Día de los Muertos altars, folklórico music, and communal cooking—and the Texan border community’s vibrant, fast‑paced social scene. Family ties are central, and
    weekend gatherings often revolve around shared meals, music, and storytelling. His Catholic upbringing is interwoven with secular celebrations, and he takes pride in preserving regional folklore while
    also embracing contemporary cultural influences that flow across the border.
