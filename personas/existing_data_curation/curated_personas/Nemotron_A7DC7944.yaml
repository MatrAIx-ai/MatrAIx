  hobbies: '[''Painting (abstract & mural)'', ''Wood carving'', ''Acoustic guitar playing'', ''Cooking traditional Mexican dishes with creative twists'', ''Attending local dance and music gatherings'',
    ''Reading speculative fiction and philosophy'', ''Volunteer event setup'', ''Storytelling circles'', ''Experimenting with new art techniques'']'
  career_goals: Fabian aims to establish a community‑run cultural studio in Edinburg where local youth can learn mural techniques, traditional crafts, and storytelling. He hopes to curate an annual “Border
    Canvas” art festival that showcases innovative works blending Mexican heritage with contemporary concepts, positioning himself as a mentor and catalyst for creative exchange. Over the next five years,
    he also plans to publish an illustrated collection of folk stories re‑imagined through an abstract lens, turning his passion for art and narrative into a modest entrepreneurial venture.
