persona_description: A geotechnical engineer who specializes in the design and analysis of earthworks, buildings, structures and developments. They are skilled in conducting subsurface investigations through
  boreholes and test pits to understand the existing subsurface conditions and provide engineering design advice for shallow and deep foundations, slope stability and retaining wall design, consolidation
  and settlement, seismic design parameters, and construction considerations. They are also experienced in providing advice on site grading and staging, bedding and backfill for site servicing, and pavement
  design structures.
