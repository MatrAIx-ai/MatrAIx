  career_goals: Although he is not formally employed, Zachary seeks to channel his skills into meaningful community contributions. He aims to volunteer as a docent at the local historical society, lead
    a senior gardening club at the community garden, and eventually launch a small side‑business selling handcrafted wooden shelves and birdhouses. He also hopes to earn a certificate in horticulture from
    a local extension program, giving him formal recognition for his gardening expertise. Long‑term, he aspires to compile a memoir of his life in New England, weaving personal anecdotes with the region’s
    history, and to travel to key sites of the American Revolution.
