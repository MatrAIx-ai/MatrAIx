personas:
  professional: Alfred Casey, a fifteen‑year‑old concept artist and budding interactive storyteller, blends meticulous charcoal sketches of urban Belleville streets with sci‑fi and fantasy worldbuilding,
    using their methodical workflow that harnesses coding basics, digital photography, and poetic narrative to craft immersive visual stories while staying organized and self‑directed.
  sports: Alfred Casey, an avid skateboarder, spends Saturday mornings at the local Belleville skate park mastering new tricks, watches Paris Saint‑Germain matches on TV for a dose of excitement, and joins
    the Belleville Basketball Association for occasional pickup games, preferring low‑intensity solo activities over competitive team sports, and they relish the quiet focus these pursuits bring.
  arts: Alfred Casey, a self‑taught sketcher and poet, fills their notebooks with charcoal studies of Belleville’s brick alleys, draws inspiration from the graphic novels of Moebius, the anime worlds of
    Hayao Miyazaki, and the street installations of JR, curates playlists that blend Miles Davis, Erykah Badu, and Kendrick Lamar, and channels these influences into their emerging sci‑fi short stories.
  travel: Alfred Casey, a curious teenager with a modest family budget, dreams of exploring Kyoto’s bamboo forest and the futuristic skyline of Tokyo, but currently maximizes their time by taking weekend
    trips to nearby Paris museums like the Centre Pompidou and occasional school‑organized excursions to the Loire Valley, balancing wanderlust with financial constraints.
  culinary: Alfred Casey, an experimental home‑cook, favors quick ramen bowls, avocado toast topped with smoked salmon, and charcoal‑grilled eggplant, often seasoning dishes with sesame oil and soy sauce
    while listening to lo‑fi hip‑hop beats during their late‑night study sessions.
  core: Alfred Casey, a methodical dreamer, balances disciplined sketchbooks, meticulous budgeting, occasional acne flare‑ups, and solitary skate sessions, always humming jazz while plotting the next sci‑fi
    narrative for their next project.
background:
  cultural: Alfred is a second‑generation African‑American who grew up in Belleville, a culturally diverse part of Essex County. His family maintains strong ties to the Black church and community gatherings,
    celebrating traditions such as Juneteenth, soul‑food meals, and spoken‑word poetry sessions. The vibrant Black arts scene in nearby Newark—its murals, jazz clubs, and community theaters—has shaped his
    aesthetic sensibilities. He identifies with the resilience and creativity of his ancestors, and often incorporates themes of Black identity, social justice, and urban life into his artistic work, while
    also drawing on the multicultural influences present in the broader New Jersey community.
attributes:
  skills: '[''Digital illustration'', ''Creative writing (short stories & poetry)'', ''Basic Python programming (interactive narratives)'', ''Chess strategy'', ''Organizational planning and time management'']'
  hobbies: '[''Sketching'', ''Reading science‑fiction & fantasy'', ''Playing chess'', ''Listening to jazz & hip‑hop'', ''Digital photography of urban scenes'', ''Coding simple interactive stories'', ''Writing
    poetry'']'
  career_goals: Alfred aims to complete his high school equivalency and earn a scholarship for a fine arts or media design program. He aspires to work as a concept artist or UX designer for interactive
    media, where he can merge his love for art and technology. He also hopes to publish a collection of speculative fiction and to lead community art projects that celebrate Black cultural narratives and
    empower other youth in his neighborhood.
