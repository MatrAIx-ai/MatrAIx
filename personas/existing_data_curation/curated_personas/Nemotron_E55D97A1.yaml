personas:
  professional: Ian Lee is an aspiring comic‑book illustrator who spends hours sketching superhero characters, channeling their boundless curiosity and spontaneous imagination into detailed panels while
    often abandoning deadlines in favor of new story ideas.
  sports: Ian Lee enjoys informal desert hiking with the Franklin Mountains Youth Club, occasionally joins the El Paso Chihuahuas' junior baseball clinic, and roots for the El Paso Locomotive FC soccer
    team, preferring solo or small‑group activities over organized school sports.
  arts: Ian Lee immerses themselves in graphic novels by Stan Lee and Jim Lee, draws inspiration from the vibrant murals at the El Paso Museum of Art, and follows the music of Los Tigres del Norte and Billie
    Eilish, which often soundtrack their LEGO creations during weekend art workshops.
  travel: Ian Lee dreams of desert expeditions to Carlsbad Caverns and a family road trip to Santa Fe, while also longing to cross the border for a weekend in Ciudad Juárez to taste authentic tacos, planning
    trips around school holidays and parents’ vacation budget.
  culinary: Ian Lee prefers bold Tex‑Mex flavors, proudly assembling chicken fajitas with corn tortillas, chipotle salsa, and fresh avocado at home, yet can barely boil pasta without burning it, making
    macaroni‑and‑cheese their fallback comfort food.
  core: Ian Lee is a curious, solitary nine‑year‑old who blends desert adventures with comic‑book creations, often sacrificing structure for spontaneity while juggling a love of LEGO, tacos, and occasional
    candy‑driven impulse buys.
background:
  cultural: Ian was born and raised in El Paso, Texas, a city that blends American Southwest and Mexican cultural traditions. Although his family’s ethnic background is white Anglo‑American, his daily life
    includes exposure to bilingual signage, Spanish language lessons at school, and the region’s desert landscape. He often visits the El Paso Museum of Art and participates in local festivals like Fiesta
    de las Flores, enjoys Tex‑Mex foods such as tacos and chile, and celebrates both national holidays and community events that reflect the city’s multicultural spirit.
