  career_goals: Ian dreams of turning his love for drawing and storytelling into a future career as an illustrator or concept artist for books and video games. He also imagines working as a wildlife educator
    or park ranger, where he can share his curiosity about nature. He aspires to keep growing his creativity, problem‑solving skills, and ability to help others understand the world around them.
