  career_goals: Regina dreams of becoming a teacher because she loves sharing stories and enjoys being the center of attention during classroom activities. She also wishes to be a veterinarian to care for
    animals she often pretends to rescue, and she imagines performing as a singer or actress, reflecting her talkative, energetic nature. At the same time, she hopes to help friends feel safe and happy,
    showing her compassionate side. Her aspirations combine curiosity about the world with a desire to make a positive, practical impact on others.
