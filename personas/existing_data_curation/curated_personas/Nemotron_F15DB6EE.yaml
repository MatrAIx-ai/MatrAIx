personas:
  professional: Regina Brown is a budding kindergarten class leader who channels their curiosity and practicality into organizing playtime activities, often taking charge of story circles and making sure
    everyone gets a turn while confidently speaking to the class and thriving as the center of attention.
  sports: Regina Brown is a member of the Little League Tots Soccer Club, loves watching the City Cubs baseball team, and enjoys practicing beginner gymnastics moves at the community center, always eager
    to bounce between organized drills and free play.
  arts: Regina Brown spends afternoons drawing colorful scenes inspired by Disney's 'Moana' and singing along to Raffi's 'Baby Beluga', often putting on impromptu concerts for family and friends and relishing
    the attention of their audience.
  travel: Regina Brown loves family road trips to the nearby seaside town of Seaside, dreams of visiting Disney World in Florida, and eagerly anticipates weekend stays at grandparents' farm, balancing excitement
    for new sights with a healthy dose of worry about packing and staying safe.
  culinary: Regina Brown delights in making peanut butter and banana sandwiches, whisking quick macaroni and cheese, and helping their parent crush fresh strawberries for a strawberry shortcake, showing
    a budding culinary curiosity despite occasional chocolate‑syrup spills and a penchant for snacking on gummy bears.
  core: Regina Brown radiates boundless energy and loves the spotlight, balancing meticulous toy‑organizing with spontaneous storytelling, yet often frets about new experiences and clings to a beloved comfort
    blanket.
background:
  cultural: Regina is a white American child raised in a middle‑class family in Falls Church, Virginia. Her family celebrates traditional holidays such as Thanksgiving, Christmas, and the Fourth of July,
    and participates in community events throughout Fairfax County. She attends a local preschool where she interacts with a diverse group of children, exposing her to multicultural influences. The household
    includes occasional Sunday school attendance and values curiosity, community involvement, politeness, and a balanced mix of classic and contemporary American practices. Her suburban environment provides
    access to parks, libraries, and children's programs that shape her social and educational experiences.
