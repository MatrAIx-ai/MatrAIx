personas:
  professional: Shannon Johnson, a self-appointed classroom schedule keeper, demonstrates an early penchant for organizing daily activities, following meticulously written stickers on the board, and ensuring
    peers stick to a structured routine, reflecting their methodical and reliable nature even at five.
  sports: Shannon Johnson, a participant in the Bright Minds Gymnastics club, loves practicing routines twice a week and regularly cheers for the Miami Heat, finding comfort in the familiar cadence of games
    rather than the roar of massive stadium crowds.
  arts: Shannon Johnson delights in drawing Dr. Seuss-inspired illustrations while singing along to The Wiggles, and they often re-enact scenes from Pixar's Toy Story, letting music and color structure
    their imaginative play.
  travel: Shannon Johnson has explored the wonders of the San Diego Zoo and the bright lights of Disneyland during family vacations, but they dream of a calm seaside stay in the Bahamas, favoring itineraries
    with clearly scheduled meals and nap times to keep stress at bay.
  culinary: Shannon Johnson relishes cheesy macaroni, crispy chicken nuggets, and strawberry-topped pancakes, often helping mash bananas for banana bread while stubbornly refusing broccoli, making meals
    a predictable ritual anchored by familiar flavors.
  core: Shannon Johnson, a five-year-old with an uncanny love for order, stacks crayons by hue, frets over lost socks, and clings to bedtime routines, yet secretly hoards glitter stickers and embarrasses
    themselves by humming the same song on repeat.
background:
  cultural: Shannon comes from a white, middle‑class family that has lived in the Fort Gibson area of Cherokee County for several generations. Her parents were raised in rural Oklahoma, where tight‑knit
    community life, church attendance, and respect for routine are valued. The family celebrates typical American holidays and regularly attends a local Methodist church, where Sunday school and community
    service reinforce values of kindness and cooperation. Growing up in a small town, Shannon is familiar with regional traditions such as the Cherokee County Fair and school field trips to nearby historic
    sites that teach about the Cherokee Nation’s heritage. At home, daily schedules, chores, and organized play are emphasized, reflecting a Midwestern work ethic that dovetails with her personal preference
    for structure and predictability.
attributes:
  skills: '[''Sorting crayons by color'', ''Arranging toys in designated spots'', ''Counting to 20'', ''Alphabet recognition'', ''Reading sight words'', ''Completing 12‑piece jigsaw puzzles'', ''Setting
    the table'', ''Feeding a pet rabbit'', ''Folding laundry'']'
  hobbies: '[''Coloring within lines'', ''Wooden block building'', ''Jigsaw puzzles'', ''Sticker collecting and sorting'', ''Reading picture books'', ''Caring for a pet rabbit'', ''Nature walks and leaf
    cataloguing'', ''Singing lullabies'', ''Playing Memory board game'']'
  career_goals: Although only five, Shannon already expresses a desire to pursue a future where she can help others and keep environments tidy. She often says she wants to become a teacher because she loves
    guiding younger children through structured lessons, or a veterinarian to care for animals gently. She also shows interest in becoming a librarian, drawn to the idea of organizing books and sharing
    stories. These aspirations reflect her caring nature and preference for orderly, harmonious settings.
