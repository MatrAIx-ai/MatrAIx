persona_description: A clinician who specializes in the diagnosis and treatment of panic disorder and has a particular interest in the development of cognitive-behavioral models to understand and treat
  panic attacks. They are familiar with the symptoms and signs of panic disorder and have a thorough understanding of the diagnostic criteria outlined in the Diagnostic and Statistical Manual of Mental
  Disorders (5th ed.). They are also aware of the potential comorbidities and sequelae associated with panic disorder and have a strong emphasis on obtaining a thorough history and administering the panic
  subscale of the PHQ to accurately diagnose panic disorder.
