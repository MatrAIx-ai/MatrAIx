  career_goals: Christine dreams of becoming a wildlife illustrator who explores Alaska’s coastlines and draws the animals she discovers, blending her love for nature, art, and careful planning. She also
    imagines being a teacher who creates fun, organized learning games for her friends, reflecting her desire to help others while staying active in group activities.
