personas:
  professional: Lorraine Angle is a methodical full‑stack engineer whose curiosity drives her to design clean, secure backend services in Python, Java, and C++, while they ensure meticulous documentation,
    test‑driven development, and steady leadership in agile teams.
  sports: Lorraine Angle is a dedicated trail runner who frequents Rocky Mountain National Park, follows the Denver Broncos and Colorado Rockies, and participates in the Colorado Trail Club’s weekend hike‑and‑run
    meetups, while they also enjoy occasional pick‑up soccer matches with a local co‑ed league.
  arts: Lorraine Angle immerses themselves in indie folk, often covering Bon Iver and Iron & Wine on acoustic guitar, while they devour cyber‑punk novels by William Gibson and attend intimate film screenings
    of Ex Machina and local gallery openings featuring emerging digital artists.
  travel: Lorraine Angle prefers meticulously planned solo trips that blend nature and tech culture, having explored the neon streets of Tokyo for cyber‑punk inspiration, trekked Shenandoah’s fall foliage,
    and now daydreams about photographing the aurora borealis over Iceland’s remote fjords, while they rely on budgeting apps to keep expenses in check.
  culinary: Lorraine Angle is an enthusiastic home baker who perfects sourdough starters using spelt and rye, crafts rustic ciabatta with high‑hydration dough, and pairs her breads with farm‑fresh cheeses,
    heirloom tomatoes, and homemade olive oil spreads, while they occasionally experiment with flavored doughs like rosemary‑infused loaves.
  core: Lorraine Angle is a quietly curious software craftsman who balances meticulous backend architecture with a habit of losing sleep over midnight crossword puzzles and a love for artisanal bread baking,
    while they often forget to water their houseplants.
background:
  cultural: Lorraine is a white American of Irish‑New England ancestry, raised in the suburban town of Vernon, Connecticut. Her parents, both educators, instilled a strong value for learning, community
    service, and practical problem‑solving. Growing up she participated in local traditions such as farmer’s markets, autumn leaf‑watching festivals, and Thanksgiving family gatherings, which fostered a
    sense of modesty, independence, and cooperation. The New England emphasis on education and civic responsibility shaped her organized, reliable nature and her preference for small‑group interactions.
    She is engaged with the regional tech ecosystem, attending intimate meetups at local coworking spaces, and she often mentors youth through community coding programs, reflecting her cultural emphasis
    on giving back and building harmonious relationships.
