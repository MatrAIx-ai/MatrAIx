  career_goals: Over the next few years Lorraine aims to become a lead software engineer and eventually a software architect, guiding a small agile team toward building reliable, high‑performing products.
    She plans to deepen her expertise in cloud architecture by earning the AWS Solutions Architect certification and to explore machine‑learning integration for fintech solutions. She also intends to pursue
    a part‑time master’s degree in computer science to stay current with emerging technologies. Long‑term, Lorraine envisions launching a consultancy that helps local small businesses implement secure,
    maintainable software systems while continuing to mentor junior developers and support community coding initiatives.
