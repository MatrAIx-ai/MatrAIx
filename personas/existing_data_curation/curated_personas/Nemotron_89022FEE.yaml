  career_goals: Kristin aims to advance into a supervisory role within the Rochester International Airport security team, such as Shift Lead or Training Coordinator, where she can shape policies and mentor
    the next generation of screeners. She plans to obtain the Certified Transportation Security Professional (CTSP) credential and deepen her expertise in biometric and AI‑based screening technologies.
    Long‑term, she envisions contributing to state‑wide transportation security initiatives as a consultant, leveraging her practical experience and analytical skills to improve safety standards. While
    pursuing these professional milestones, she also seeks to balance work with increased flexibility for family time, community volunteering, and personal hobbies, ensuring her career growth aligns with
    her value of harmony and wellbeing.
