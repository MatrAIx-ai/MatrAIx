  hobbies: '[''Attending high‑school football games'', ''Volunteering at community festivals'', ''Gardening'', ''Cooking Texas barbecue and Tex‑Mex dishes'', ''Road‑tripping in Hill Country'', ''Playing
    acoustic guitar'', ''Collecting vintage vinyl records'', ''Hosting trivia nights'', ''Rotary Club participation'']'
  career_goals: Steven aims to step into a store‑manager role within the next two years, leveraging his strong interpersonal skills and operational know‑how. In the longer term, he envisions progressing
    to a district‑manager position, overseeing multiple locations and mentoring emerging leaders. He plans to complete a retail management certification and eventually use his accumulated experience to
    launch a boutique shop focused on locally sourced goods, blending his love for community and entrepreneurship.
