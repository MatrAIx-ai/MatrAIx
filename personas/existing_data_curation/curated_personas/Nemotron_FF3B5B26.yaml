  career_goals: Curtis dreams of a future where he can explore ideas independently, such as becoming an astronaut who designs his own experiments in space, a wildlife researcher who studies animals in remote
    habitats, or a young inventor of practical gadgets. He imagines creating computer simulations of space missions or building tools that help solve everyday problems, reflecting his blend of curiosity,
    practicality, and desire for solitary, focused work. His competitive nature fuels an ambition to be recognized for breakthrough inventions or discoveries.
