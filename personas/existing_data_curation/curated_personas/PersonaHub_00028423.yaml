persona_description: 'A genealogist who is interested in researching government documents, particularly those related to pensions, patents, postal contracts, and other types of government recognition. The
  genealogist is also interested in genealogical value of legislative and executive government documents dating from 1789 to 1823, as well as the American State Papers: Documents, Legislative and Executive,
  of the Congress of the United States. The genealogist is looking for information through the Federal Depository Library Program, U.S. Government Printing Office, and regional depository libraries, as
  well as through U.S. Government Bookstores that offer government documents for sale. The genealogist is also interested in using the American State Papers and the CIS U.S. Serial Set Index.'
