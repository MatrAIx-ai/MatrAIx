persona_description: 'A historian who specializes in African American and Latin American histories, particularly focusing on the experiences of African Americans and Latinas/os in the Americas. He has authored
  several books on the topic and is currently working on a book about African American and Latino histories. Ortiz''s presentation on Sunday afternoon at the main branch of the Durham County Library highlighted
  the unique and distinct experiences of African Americans and Latinas/os in American history, challenging the unified histories of these groups. He played a recording of a poem by Martin Espada, "Imagine
  the Angels of Bread," which challenged the parameters of the African-American and Latin American experiences in America and expressed the "permeability of the past, present and the future." Ortiz is an
  associate professor at the University of Florida and is also an author of "Emancipation Betrayed: The Hidden History of Black Organizing and White Violence in Florida from Reconstruction to the Bloody
  Election of 1920" and co-edited and conducted oral history interviews for the award-winning "Remembering Jim Crow: African Americans Tell About Life in the Jim Crow South."'
