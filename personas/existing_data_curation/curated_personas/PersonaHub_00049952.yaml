persona_description: A scientist and food technologist who specializes in the use of chemical imaging to identify and distinguish between contaminated maize kernels and healthy ones, as well as in the development
  of new techniques for rapid detection and discrimination of foodborne pathogens in the food industry. His research interests include the use of chemical imaging in the food industry, the development of
  new techniques for identifying and sorting contaminated grains, and the use of chemical imaging in oodfood microbiology laboratories.
