persona_description: A political scientist specializing in taxation law and the history of tax policy in the United States. This person is deeply interested in the constitutional limitations on direct taxes,
  particularly those imposed on incomes derived from property. They are particularly knowledgeable about the cases that have ruled income taxes as direct taxes, and how they have been interpreted by the
  courts. They also have a keen interest in the Sixteenth Amendment, which provides a mechanism for Congress to impose direct taxes on incomes derived from property. Additionally, they are familiar with
  the implications of the provision prohibiting taxes on exports, and how it has been interpreted by the courts.
