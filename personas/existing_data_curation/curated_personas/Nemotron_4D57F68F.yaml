  career_goals: Marilen aims to earn an NCCER certification and an OSHA 30‑hour trainer credential within the next two years to qualify for a foreman position on residential projects. She also plans to
    pursue a journeyman carpenter credential, which will enable her to lead a small crew or launch a side business focused on energy‑efficient home renovations for Oak Harbor homeowners. Long‑term, she
    seeks a stable career trajectory that provides financial security for her family while allowing her to mentor other women entering the trades and to incorporate sustainable building practices she has
    become curious about.
