personas:
  professional: Daryl Dupart is an aspiring junior animator and LEGO city architect who blends a love for graphic novels, Scratch coding, and street‑art color studies, channeling their spontaneous curiosity
    and competitive streak into projects that burst into life without rigid deadlines.
  sports: Daryl Dupart dominates the neighborhood basketball court on weekends, channeling a competitive edge into fast‑break drills with the Williamsburg Youth Basketball League while they cheer for the
    Brooklyn Nets and idolize NBA star Jayson Tatum.
  arts: Daryl Dupart devotes afternoons to sketching the vivid colors of Bushwick murals, immersing in graphic novels by Stan Lee, vibing to Kendrick Lamar and Miles Davis on family’s record player, and
    crafting Scratch animations that echo Jean‑Michel Basquiat’s layered style as they explore digital storytelling.
  travel: Daryl Dupart loves spontaneous day trips to Coney Island’s boardwalk, dreams of exploring the interactive exhibits at Washington, D.C.’s National Air and Space Museum, and hopes to one day visit
    Walt Disney World’s Magic Kingdom, all while they balance family budget constraints and a school schedule.
  culinary: Daryl Dupart enjoys crafting peanut‑butter‑and‑jelly sandwiches, baking cheese pizza topped with pepperoni, and experimenting with fresh strawberries in yogurt parfaits, showing a budding cooking
    skill that blends simple home‑cooking with a love for bold, bright flavors as they experiment.
  core: Daryl Dupart is a fiercely curious eight‑year‑old who flits between LEGO city building, basketball showdowns, and hip‑hop beats, often losing track of deadlines and misplacing socks while they dream
    up the next comic‑book hero.
background:
  cultural: Daryl is an African‑American boy raised in the vibrant, multicultural neighborhoods of Brooklyn. His family celebrates traditional holidays like Juneteenth and incorporates Caribbean influences
    from relatives who emigrated from Jamaica, bringing food, music, and storytelling into daily life. He grew up hearing the rhythms of hip‑hop, soul, and jazz, which shape his artistic tastes. Community
    events such as the local block parties, summer street festivals, and the Brooklyn Children’s Museum’s outreach programs expose him to a wide range of cultural expressions. Strong family ties and an
    emphasis on resilience within the community provide Daryl with a grounding sense of identity while encouraging him to explore his own creative voice.
