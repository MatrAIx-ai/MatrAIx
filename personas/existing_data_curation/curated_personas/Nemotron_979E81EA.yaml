  career_goals: Daryl dreams of turning his love for drawing into a career, imagining himself as a comic‑book artist or a video‑game designer who creates worlds for other kids to explore. He also talks
    about becoming an astronaut or a scientist who discovers new things, reflecting his curiosity about space and technology. While he enjoys competitive video‑gaming tournaments, he hopes one day to win
    a national youth basketball championship, showing his desire for recognition and achievement. His long‑term ambition is to combine art and technology, perhaps by designing interactive installations
    that let viewers experience stories in new ways.
