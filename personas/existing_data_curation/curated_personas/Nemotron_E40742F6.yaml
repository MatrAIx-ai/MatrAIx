  career_goals: Maria aims to become a licensed Professional Engineer (PE) within the next three years, leveraging her hands‑on experience to qualify for the exam. She aspires to lead a multidisciplinary
    engineering team on sustainable product development projects, focusing on low‑cost, energy‑efficient solutions for both the U.S. and Mexican markets. To support this, she plans to complete a Bachelor
    of Science in Mechanical Engineering through a regional university while obtaining PMP certification. Long‑term, Maria envisions founding her own consulting firm that blends cutting‑edge design with
    culturally informed manufacturing practices, allowing her to channel her curiosity and competitiveness into creating socially impactful engineering solutions.
