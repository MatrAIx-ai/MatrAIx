personas:
  professional: Maria Aymat, a 35‑year‑old mechanical engineer, combines eight years of product design expertise—mastery of SolidWorks, ANSYS, and Python automation—with a data‑driven, competitive mindset
    that fuels relentless workflow optimization and positions them for future PE licensure and multidisciplinary team leadership.
  sports: Maria Aymat’s athletic outlet centers on weekly Ozark foothill hikes, salsa‑dance cardio sessions at the community center, and cheering for the St. Louis Cardinals and Arkansas Razorbacks, while
    they also belong to a local running club that meets every Saturday morning.
  arts: Maria Aymat finds creative resonance in salsa dancing to the rhythms of Celia Cruz, curating a playlist that also features Frida Kahlo’s biographical documentaries and the sci‑fi soundtracks of
    Hans Zimmer, which together shape their aesthetic sensibility and inspire weekend gadget‑making sessions.
  travel: Maria Aymat’s travel style blends purposeful weekend escapes to the Ozarks with annual trips to Mexico City for culinary immersion and a bucket‑list pilgrimage to Kyoto’s tech districts, all planned
    around a modest vacation budget and the need to fit in tutoring commitments.
  culinary: Maria Aymat’s kitchen experiments fuse traditional mole with Arkansas heirloom tomatoes, craft peach‑salsa‑topped tacos using local peaches and jalapeños, and perfect corn‑husks‑wrapped tamales
    filled with sweet‑potato, reflecting their intermediate cooking skill and penchant for flavor‑focused ingenuity.
  core: Maria Aymat is a data‑obsessed engineer who balances competitive workflow perfection with spontaneous salsa spins, tech tinkering, and a love for fusion cooking—often fueled by copious coffee and
    occasional deadline‑driven neglect of self‑care.
background:
  cultural: Maria identifies as Mexican‑American, having grown up in a bilingual household that celebrated Día de los Muertos, Cinco de Mayo, and other Mexican traditions. She maintains close ties with
    her extended family in Mexico, visiting regularly and supporting them financially. Her cultural upbringing instilled a strong sense of family loyalty, community involvement, and appreciation for Mexican
    cuisine, music, and folklore. In Arkansas, she blends these traditions with the pragmatism of Midwestern life, participating in local festivals while also integrating Mexican culinary flavors into regional
    gatherings. This dual heritage shapes her worldview, giving her a unique perspective that values both cultural heritage and practical innovation.
