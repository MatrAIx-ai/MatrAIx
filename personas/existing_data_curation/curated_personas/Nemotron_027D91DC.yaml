  hobbies: '[''Group fitness classes (Zumba, spin)'', ''Hiking on local trails in Allegheny County'', ''Playing acoustic guitar'', ''Exploring new recipes and cooking'', ''Volunteering at community health
    fairs'', ''Attending live music concerts and festivals'', ''Participating in intramural sports leagues'', ''Traveling to nearby cities for cultural experiences'', ''Photography of urban and natural
    scenes'', ''Reading popular science and health literature'']'
  career_goals: Ethel aims to become a lead sonographer in her department, overseeing workflow and mentoring junior staff. She plans to earn advanced certifications in echocardiography and musculoskeletal
    ultrasound, expanding her expertise into cardiac and sports medicine imaging. Over the next five years, she hopes to enroll in a bachelor's program in health sciences, positioning herself for future
    roles in imaging administration or clinical education. Ethel is also interested in participating in research on AI‑assisted ultrasound interpretation, attending professional conferences, and contributing
    to quality‑improvement initiatives that enhance patient outcomes and departmental efficiency.
