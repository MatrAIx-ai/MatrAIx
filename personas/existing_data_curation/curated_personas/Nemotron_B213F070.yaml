  career_goals: Gilberto aspires to pursue a career in engineering—particularly mechanical or environmental engineering—where he can apply his practical problem‑solving skills to sustainable technology
    projects. He also dreams of developing bilingual educational software that helps Spanish‑speaking students succeed in STEM subjects. In the short term, he plans to lead his middle‑school robotics club,
    earn a scholarship to a university with a strong engineering program, and secure a summer internship that blends his technical curiosity with community impact.
