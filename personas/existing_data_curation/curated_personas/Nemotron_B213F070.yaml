personas:
  professional: Gilberto Batres is a budding teen technologist who channels an organized curiosity into building intricate LEGO models, programming Python scripts, and crafting Arduino prototypes, while
    leading collaborative Minecraft modding sessions and tutoring younger students, showcasing a reliable, methodical approach to problem‑solving.
  sports: Gilberto Batres plays midfield for the Brooklyn Blitz youth soccer club, draws tactical inspiration from New York City FC in the MLS, and keeps a weekly routine of pick‑up games after school,
    balancing teamwork with personal fitness.
  arts: Gilberto Batres immerses in the rhythms of reggaeton, bomba, and plena by artists like Bad Bunny and Ivy Queen while devouring science‑fiction classics such as Dune and Neuromancer, a blend that
    fuels both his coding creativity and reflective journal entries.
  travel: Gilberto Batres has explored the colorful streets of San Juan and the museum‑rich neighborhoods of New York City, dreams of a tech‑focused adventure in Tokyo’s Akihabara district, and plans a
    future family trip to Barcelona’s Gaudí‑laden avenues, balancing cultural curiosity with a modest travel budget.
  culinary: Gilberto Batres often prepares traditional mofongo with mashed plantains, garlic‑infused sofrito, and crispy chicharrón, while also experimenting with arroz con pollo seasoned with sazón and
    perfecting golden tostones, showcasing a growing confidence in the kitchen.
  core: Gilberto Batres is a meticulous teen tinkerer whose notebook‑filled mind balances LEGO masterpieces with anxious overthinking, occasional procrastination on homework, and an insatiable craving for
    late‑night gaming sessions.
background:
  cultural: Gilberto is a second‑generation Puerto Rican living in Middletown, Ohio. At home, Spanish is spoken alongside English, and his family celebrates Puerto Rican traditions such as San Juan festivities,
    arroz con gandules, and bomba dancing. He participates in a local Puerto Rican cultural group that organizes concerts and food festivals, allowing him to stay connected to his Caribbean heritage while
    navigating a Midwestern environment. This bicultural experience shapes his values of family cohesion, community service, and a strong work ethic.
