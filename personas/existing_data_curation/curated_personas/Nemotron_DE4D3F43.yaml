  hobbies: '[''Reading historical non-fiction'', ''Gardening'', ''Birdwatching'', ''Woodworking'', ''Model train hobby'', ''Crossword puzzles'', ''Attending senior group meetings'', ''Genealogy research'']'
  career_goals: Although retired, Justin aims to remain actively engaged in his community by mentoring younger entrepreneurs and helping them navigate the practicalities of running a small business. He
    wishes to document and preserve the local history of Spicer and Kandiyohi County through oral histories and a personal memoir. Ensuring financial stability for his children and grandchildren, supporting
    his spouse's health and well‑being, and maintaining a structured daily routine to manage his anxiety are also central to his personal ambitions.
