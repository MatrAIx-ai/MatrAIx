  career_goals: Although retired from formal employment, Marivel aims to deepen her artistic practice by mastering advanced watercolor techniques and producing a portfolio for a local senior-artist exhibition.
    She hopes to compile and publish a memoir of her family's history, drawing on her genealogical research. Additionally, she plans to volunteer as a docent at the nearby art museum, mentor younger volunteers
    at the senior center, and take weekend trips to major art institutions in Philadelphia, Washington, D.C., and New York.
