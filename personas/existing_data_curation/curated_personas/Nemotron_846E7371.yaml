personas:
  professional: Courtney Erten, a veteran commercial and personal lines underwriter with three decades of experience, combines razor‑sharp data modeling in SAS and the language R with empathetic client
    communication to craft precise pricing structures while mentoring junior staff and steering the pursuit of the CPCU designation.
  sports: Courtney Erten, a member of the San Bernardino County Senior Walkers Club, stays fit through daily nature trail walks, gentle yoga, and weekly birdwatching hikes, while cheering on the Los Angeles
    Dodgers in spring, the Los Angeles Lakers during the NBA season, and the LA Galaxy in the summer, preferring low‑impact, routine exercise over high‑intensity sports.
  arts: Courtney Erten, a devotee of historical fiction by Hilary Mantel and Ken Follett, finds solace in listening to Beethoven’s symphonies and Joni Mitchell’s folk melodies while knitting scarves for
    charity, frequently visits the San Bernardino Museum of Art for exhibitions of Monet and Van Gogh, and enjoys classic films starring Katharine Hepburn.
  travel: Courtney Erten, who prefers meticulously planned, low‑key getaways, spends her weekends tasting wines in Temecula Valley and Napa, has explored Santa Barbara’s coastal charms, dreams of a quiet
    retreat in Tuscany’s Chianti region, and selects destinations that offer gentle walks, garden tours, and opportunities for solitary reflection.
  culinary: Courtney Erten, a modest home cook, delights in preparing roasted salmon with garden‑fresh asparagus, quinoa salad with feta and cherry tomatoes, and herb‑infused olive oil vinaigrettes, often
    seasoning dishes with rosemary, thyme, and garlic harvested from her own vegetable garden, while occasionally treating herself to a glass of Pinot Noir from a local vineyard.
  core: Courtney Erten, a data‑driven, compassionate underwriter in her early sixties, balances meticulous analysis with quiet, solitary hobbies, navigates anxiety through structure and mindfulness, and
    quietly mentors the next generation while planning a serene, financially secure retirement.
background:
  cultural: Courtney grew up in post‑war suburban Southern California, the daughter of parents of English‑German ancestry who emphasized self‑reliance, education, and community service. Her family’s modest
    middle‑class upbringing instilled a practical, down‑to‑earth outlook, while the multicultural environment of Chino Hills exposed her to a broad range of cultural practices, from neighborhood farmers’
    markets to volunteer initiatives with local charities. As a woman entering a STEM field in the early 1970s, she experienced the era’s growing emphasis on gender equality, which shaped her commitment
    to mentoring other women in finance and insurance. Her values reflect a blend of traditional American individualism with a Californian appreciation for environmental stewardship and civic participation.
