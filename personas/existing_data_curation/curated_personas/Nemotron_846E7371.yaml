    data science advancements'', ''Visiting local vineyards (quiet tasting)'']'
  career_goals: Looking ahead, Courtney aims to deepen her expertise by attaining the Chartered Property‑Casualty Underwriter (CPCU) designation and to lead a small advisory team that provides tailored
    underwriting solutions for non‑profit and small‑business clients in the San Bernardino region. She is driven to create more structured, transparent underwriting guidelines that simplify decisions for
    agents and reduce client stress. Additionally, she hopes to mentor the next generation of underwriters, especially women entering the field, and to champion workplace initiatives that support mental‑health
    resilience among staff. While planning a gradual transition toward part‑time consulting, she also wants to secure enough financial stability to fund her retirement and continue community volunteer work.
