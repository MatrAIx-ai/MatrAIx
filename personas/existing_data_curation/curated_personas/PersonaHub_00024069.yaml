persona_description: A historian who specializes in the study of demographic changes and their impact on social policy, particularly focusing on the role of old age pensions in shaping social security systems.
  She is particularly interested in understanding the changes in the weight of AHV and pension funds in the system of old age provision over the 20th century and how these changes have influenced the structure
  and development of Swiss social security systems. She also has a keen interest in the introduction of the BVG and its impact on old age provision, particularly in terms of the demographic shifts that
  led to its introduction and the changes in the provision of old age pensions that it brought about.
