  hobbies: '[''Gardening (vegetable and flower)'', ''Knitting and crocheting'', ''Church attendance and choir participation'', ''Book club reading'', ''Historical fiction reading'', ''Listening to classic
    country and gospel music'', ''Walking nature trails'', ''Volunteering at the food pantry'', ''Family genealogy research'']'
  career_goals: Mary’s current ambitions focus on maintaining her health and independence while deepening her legacy within her family and community. She aims to stay physically active through regular walks
    and gardening, to document and pass down family recipes and stories, to complete a written memoir of her life experiences, to continue volunteering at her church’s outreach programs, and to finalize
    a family genealogy project that connects younger relatives to their roots. Additionally, she hopes to learn quilting as a new craft and, when possible, travel to visit her children and grandchildren.
