personas:
  professional: Mary Merna is a seasoned community organizer and volunteer coordinator who channels their decades of budgeting, event planning, and caregiving expertise into running the church’s outreach
    programs with meticulous structure and a warm, adaptable touch, and they consistently ensure every fundraiser stays on schedule while keeping the budget balanced.
  sports: Mary Merna stays active by strolling the nearby nature trail each morning with the town’s senior walking club, cheering on the Carolina Panthers on Sundays, and they occasionally join a gentle
    yoga class at the church fellowship hall, though their favorite pastime remains a leisurely game of shuffleboard at the local senior center.
  arts: Mary Merna enjoys classic country and gospel music, often humming Dolly Parton, Johnny Cash, and Mahalia Jackson while knitting, and they also love reading historical fiction by Philippa Gregory
    and Margaret Mitchell, attending choir rehearsals at the Methodist congregation, and they find creative solace in crocheting intricate designs inspired by folk crafts.
  travel: Mary Merna prefers road‑trip travel that blends family visits with quiet exploration, having driven to Charleston, South Carolina and the Blue Ridge Parkway, dreaming of a pilgrimage to Washington,
    D.C.’s National Archives, and they plan each journey with a handwritten itinerary while budgeting carefully to keep trips affordable.
  culinary: Mary Merna excels at Southern cooking, perfecting collard greens simmered with smoked ham hocks, biscuits with buttermilk, and peach cobbler spiced with cinnamon, and they delight in using garden‑fresh
    tomatoes, pecans, and sweet potatoes in family meals, though they sometimes over‑salt the stew in their zeal for flavor.
  core: Mary Merna is a ritual‑driven retiree who knits by the window, budgets like a spreadsheet, and embraces community service, yet they occasionally forget medication doses and can be stubborn about
    trying new recipes, embodying a blend of steadfast tradition and gentle curiosity.
background:
  cultural: Mary is a white Southern American who grew up in rural North Carolina. Her upbringing was shaped by Methodist church traditions, a strong emphasis on family cohesion, hospitality, and community
    service. The local culture values self‑reliance, seasonal farming cycles, and close‑knit relationships with neighbors, which have informed her practical outlook, respect for routine, and dedication
    to preserving regional customs such as Southern cuisine and folk crafts.
attributes:
  skills: '[''Home budgeting and financial management'', ''Traditional Southern cooking'', ''Seasonal gardening'', ''Event planning and volunteer coordination'', ''Family caregiving and tutoring'', ''Knitting
