  hobbies: '["Visiting art galleries (especially African‑American art)", "Reading art and cultural history books", "Listening to jazz and blues", "Playing piano (self‑taught)", "Street and nature photography",
    "Rooftop gardening (herbs, tomatoes)", "Soul‑food cooking experiments", "Crossword puzzles", "Online chess", "Attending local history talks"]'
  career_goals: Michael aims to channel his curiosity and artistic appreciation into a meaningful legacy. He plans to compile a memoir of his experiences and the cultural shifts he witnessed, illustrated
    with his own photographs. He hopes to volunteer as a docent or mentor at a local museum or community center, sharing his knowledge of Black art history with young people. He also aspires to organize
    a small, rotating exhibition of his photography and curated art prints in his building’s lobby. Finally, he wishes to travel to a few regional art festivals and to maintain his health so he can continue
    participating in community events.
