personas:
  professional: Michael Harper, a retired handyperson who now channels their decades of DIY expertise into curating community art programs, uses their visual composition knack and spontaneous, unstructured
    approach to organize informal museum docentship and a rotating photography exhibition in their building's lobby, despite often neglecting strict deadlines.
  sports: Michael Harper enjoys low‑impact fitness through daily neighborhood walks and a seasonal membership in a community walking club, casually follows the local NFL team (the Chicago Bears) and the
    MLB club (the Chicago Cubs), and they occasionally join a senior‑friendly pickleball league, keeping their competitive edge alive without formal gym routines.
  arts: Michael Harper immerses themselves in the arts by frequenting galleries featuring works by Jacob Lawrence and Romare Bearden, listening to Miles Davis and B.B. King on vinyl, playing piano improvisations
    by ear, and curating a personal collection of prints that reflect the evolution of contemporary cultural narratives.
  travel: Michael Harper prefers purposeful travel that blends art and leisure, having attended the New Orleans Jazz & Heritage Festival and the Santa Fe Indian Market, and they dream of visiting the Getty
    Center in Los Angeles and the historic French Quarter, planning trips through local community board flyers rather than using complex travel apps.
  culinary: Michael Harper delights in soul‑food cooking, mastering dishes like smothered pork chops, collard greens seasoned with smoked turkey, and tomato‑basil bruschetta from their rooftop garden herbs,
    yet their habit of over‑seasoning can leave guests reaching for water.
  core: Michael Harper blends a lifelong curiosity for Black art and music with a hands‑on, slightly disorganized DIY spirit, savoring jazz while coaxing herbs from a rooftop garden, all while fiercely
    guarding their independence and occasionally over‑committing to community projects.
background:
  cultural: Michael Harper is a Black American who grew up in Harlem during the 1960s and 1970s, a period marked by vibrant cultural activism, the legacy of the Civil Rights Movement, and the rise of soul,
    jazz, and early hip‑hop. His parents were part of the Great Migration from the rural South, bringing with them stories, gospel music, and culinary traditions that shaped his household. Throughout his
    life, he has been a regular member of a Baptist church, which reinforced community solidarity and oral storytelling. His identity is rooted in the African‑American experience in New York City, reflected
    in his appreciation for Black visual arts, his devotion to preserving cultural memory, and his commitment to mentoring younger members of his community.
attributes:
  skills: '["General home maintenance", "Basic carpentry", "Simple electrical troubleshooting", "Low‑tech gardening", "Photography (self‑taught)", "African‑American art appreciation", "Chess and strategic
