personas:
  professional: Ashleigh Muller, a veteran front‑line cashier with three decades of precision in cash handling and POS systems, leverages their methodical, organized nature to streamline checkout workflows
    and is poised to transition into a shift‑supervisor role where they mentor new staff and implement efficiency upgrades.
  sports: Ashleigh Muller enjoys low‑impact fitness, strolling the Cuyahoga River Trail three times a week, cheering the Cleveland Browns and Guardians from the living room, and participates in a senior‑friendly
    bowling league at the local community center on Saturday evenings.
  arts: Ashleigh Muller finds creative solace in knitting intricate Fair Isle patterns while listening to the vocal harmonies of the Cleveland Symphony Chorus, devouring classic mystery novels by Agatha
    Christie, and cherishing the timeless films of John Ford, especially The Grapes of Wrath.
  travel: Ashleigh Muller prefers relaxed road trips that blend history and nature, having explored the historic streets of Amish Country, the lakeside charm of Mackinac Island, and dreaming of a pilgrimage
    to the Irish countryside that inspired their ancestors.
  culinary: Ashleigh Muller delights in preparing hearty family meals such as rosemary‑seasoned roast turkey with sage stuffing, garden‑fresh ratatouille, and buttery pierogi filled with potato and cheddar,
    while their knitty‑gritty habit of over‑seasoning sometimes leaves the kitchen smelling of thyme for days.
  core: Ashleigh Muller is a methodical, community‑oriented retiree who balances disciplined budgeting, diligent health monitoring, and a love for knits and classic mysteries, all while occasionally hoarding
    pantry excess and over‑seasoning dishes.
background:
  cultural: Ashleigh grew up in a middle‑class white family in the Greater Cleveland area, with roots tracing back to German and Irish immigrants who settled in the Midwest during the early 20th century.
    Her upbringing emphasized hard work, community involvement, and family traditions such as celebrating Thanksgiving, Christmas, and local sports events. She has long been affiliated with a Protestant
    church, which reinforces her values of cooperation and service. The cultural fabric of Cleveland—its industrial heritage, diverse neighborhoods, and strong sense of local pride—shapes her worldview,
    fostering a pragmatic, community‑oriented outlook.
