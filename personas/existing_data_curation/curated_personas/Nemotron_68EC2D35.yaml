  hobbies: '[''vegetable gardening'', ''knitting'', ''reading historical fiction'', ''book club'', ''community choir'', ''walking (Cuyahoga River Trail)'', ''volunteering at food bank'', ''cooking family
    meals'']'
  career_goals: In the next few years Ashleigh aims to secure a shift‑supervisor position at her store, allowing her to mentor newer cashiers and improve workflow efficiency. She also plans to complete
    a short certification in retail management to broaden her skill set. As she approaches retirement, her primary goal is to achieve a smooth financial transition, ensuring she can support her family's
    future needs while maintaining a modest supplemental income through part‑time consulting or community volunteer leadership. Additionally, she hopes to become more involved in local senior‑center programs,
    possibly leading a budgeting workshop for fellow retirees.
