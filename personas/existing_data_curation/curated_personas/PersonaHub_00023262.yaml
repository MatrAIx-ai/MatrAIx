persona_description: A power system engineer who is interested in the detailed modeling and analysis of power transmission lines, transformers, and the sequence aspects of static apparatus. They are knowledgeable
  about the advantages of using per unit system and the mathematical modeling of transmission lines and transformers. They have experience in analyzing and troubleshooting power system problems and are
  familiar with the principles of mutual coupling between transmission lines and transformers. They are also familiar with the use of ground impedances in the modeling of static apparatus.
