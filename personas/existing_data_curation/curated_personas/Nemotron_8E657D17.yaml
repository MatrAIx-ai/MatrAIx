  hobbies: '[''playing basketball at the community gym'', ''building projects in the school robotics club'', ''listening to hip‑hop, R&B, and gospel music'', ''video gaming (e.g., Minecraft)'', ''sketching
    comic strips'', ''volunteering at the local food bank'', ''reading graphic novels'', ''watching Michigan sports teams'', ''attending church youth group events'']'
  career_goals: Warith aspires to pursue a career in engineering—preferably mechanical or automotive engineering—so he can work with tangible projects and systematic problem‑solving. He also envisions mentoring
    younger students in STEM through tutoring or youth programs, blending his love for structure with his desire to foster harmony and support within his community.
