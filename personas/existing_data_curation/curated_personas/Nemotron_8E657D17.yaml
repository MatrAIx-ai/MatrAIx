personas:
  professional: Warith Oliver, a budding robotics enthusiast and junior coder, leads their school robotics club’s programming squad by applying a love for structured problem‑solving, a practical mindset,
    and sociable leadership—though their tendency to over‑plan sometimes fuels anxiety before competitions.
  sports: Warith Oliver devotes afternoons to shooting hoops with friends at the local YMCA, follows the Detroit Pistons and the Michigan Wolverines football team for inspiration, and embraces a structured
    fitness routine that balances team practice with personal conditioning, even if pre‑game nerves sometimes hold them back.
  arts: Warith Oliver channels creative energy into comic‑style sketches and playlists that swing from Kendrick Lamar’s hip‑hop beats to Kirk Franklin’s gospel hymns, while avidly reading graphic novels
    like 'Saga' and 'Maus' and occasionally performing with the church youth choir.
  travel: Warith Oliver dreams of exploring the natural beauty of Sleeping Bear Dunes during summer road trips, has already visited Washington, D.C. on a school field trip, and hopes to save for a future
    travel adventure to Tokyo, all while meticulously planning itineraries and fretting over budget constraints.
  culinary: Warith Oliver enjoys crafting homemade pizza topped with pepperoni and fresh basil, mastering a simple guacamole recipe with ripe avocados and lime, and often experiments with soulful collard
    greens at church potlucks, though they tend to over‑season dishes in an attempt to impress friends.
  core: Warith Oliver is a structurally minded, socially vibrant teen who balances robotics, basketball, and community service with a habit of over‑thinking and a love for both hip‑hop beats and gospel
    harmonies.
background:
  cultural: Warith grows up in a close‑knit African‑American family in Muskegon, Michigan. His household blends Midwestern values with cultural traditions such as soulful family meals, church involvement,
    and music that spans gospel, hip‑hop, and contemporary R&B. The local Black community provides a supportive network that emphasizes education, resilience, and mutual aid. These influences shape his
    sense of identity, his respect for community harmony, and his commitment to giving back to the neighborhood.
