  career_goals: Susan aims to channel her curiosity and practicality into a career that blends community impact with technical design. In the short term, she plans to lead her school's robotics and debate
    teams, earn top honors in regional science fairs, and secure a leadership role in the student council. Long-term, she aspires to study civil engineering or urban planning at a top university, obtain
    internships that involve sustainable infrastructure projects, and eventually design livable, green neighborhoods—perhaps even contributing to the future growth of Peachtree City.
