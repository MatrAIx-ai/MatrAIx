personas:
  professional: Susan Keighron, a budding robotics enthusiast and debate team member, combines methodical coding skills with a competitive edge, channeling curiosity into designing autonomous soccer bots
    for school competitions while maintaining a meticulous schedule that balances practice, programming, and research.
  sports: Susan Keighron plays forward for the Peachtree City Youth Soccer club, runs the 800‑meter dash for their middle school track team, cheers for the Atlanta Falcons and Atlanta Braves, and spends
    weekends biking the Peachtree City greenway with friends from the local outdoor club.
  arts: Susan Keighron devours mystery novels by Agatha Christie, writes short sci‑fi stories inspired by Neil Gaiman, captures sunrise landscapes with a DSLR, and draws creative inspiration from photographer
    Annie Leibovitz and pop musician Billie Eilish’s music videos.
  travel: Susan Keighron prefers short, budget‑friendly road trips to nearby natural spots like the Blue Ridge Mountains and the Georgia Aquarium, while dreaming of attending an international robotics competition
    in Tokyo, planning each itinerary with a detailed spreadsheet shared with their friends.
  culinary: Susan Keighron enjoys whipping up homemade mac and cheese with sharp cheddar, experimenting with blueberry pancakes on Saturday mornings, and swapping recipes for trail‑mix snacks featuring
    almonds, dried cranberries, and dark chocolate during club meetings.
  core: Susan Keighron balances a fierce competitive streak with meticulous organization, turning curiosity into code and debate, yet can be skeptical of teammates’ motives and sometimes trades sleep for
    late‑night tinkering.
background:
  cultural: Susan grows up in Peachtree City, a planned suburban community in Fayette County, Georgia, where Southern hospitality, neighborly involvement, and a love of the outdoors shape daily life. Her
    family values emphasize reliability, hard work, and community service, aligning with the region’s emphasis on school spirit, high-school sports, and local festivals. The city’s extensive trail system
    and biking culture have encouraged her active lifestyle, while the school’s diverse extracurricular options have nurtured her curiosity and competitive drive. These influences combine to give her a
    blend of traditional Southern upbringing and modern, forward-looking perspectives.
