personas:
  professional: David Huntley, a 21-year-old power line technician apprentice, leverages their meticulous organization, high-voltage expertise, and love for teamwork to excel in installing and maintaining
    transmission lines while mentoring peers and dreaming of leading a smart-grid crew.
  sports: David Huntley, an avid participant in Southern California community basketball leagues and the San Diego Flying Disc Club for ultimate frisbee, follows the Los Angeles Lakers and San Diego Loyal
    SC, and they stick to a disciplined routine of early-morning jogs and weekend hikes in Cleveland National Forest to balance competitive play with outdoor fitness.
  arts: David Huntley, a fervent live-music fan, regularly attends shows at the House of Blues featuring artists like Billie Eilish, The Strokes, and local indie band Hail the Sun, and they spend downtime
    remixing drone footage to the beats of electronic producer ODESZA, feeding their creative side between work shifts.
  travel: David Huntley, an adventure-seeking planner, prefers short road trips to nearby Joshua Tree and Big Bear for weekend hikes, dreams of backpacking through Kyoto’s temples and hiking the Swiss Alps,
    and always books accommodations with strong Wi-Fi so they can stream board-game sessions for friends.
  culinary: David Huntley, who rates their cooking skill as functional, frequently whips up fish tacos with fresh cilantro and lime, perfects a quick ramen bowl using miso paste and soft-boiled eggs, and
    they enjoy grilling kebabs on a portable gas grill while still craving late-night pizza slices after marathon gaming sessions.
  core: David Huntley, a sociable, hyper-organized 21-year-old technician, blends curiosity with practicality, thrives on leading crew drills and community games, yet they constantly battle worry over both
    work safety and personal finances.
background:
  cultural: David grew up in Menifee, a suburban community in Riverside County that blends agricultural roots with rapid residential development. His family background reflects a typical middle‑class white
    Californian upbringing, emphasizing hard work, education, and community involvement. He was raised with traditional American values such as self‑reliance, respect for authority, and civic responsibility,
    while also absorbing the multicultural atmosphere of Southern California, which has shaped his inclusive and cooperative outlook. He celebrates holidays like Independence Day and Thanksgiving with family
    gatherings, participates in local events such as the Riverside County Fair, and enjoys the diverse culinary and cultural offerings of the broader Inland Empire region.
attributes:
  skills: '[''High‑voltage line installation'', ''Electrical blueprint reading'', ''Safety compliance (OSHA)'', ''Cable splicing and terminations'', ''Troubleshooting and diagnostics'', ''Hand and power
    tool operation'', ''Smart‑grid technology basics'', ''Team coordination'', ''Project scheduling and documentation'', ''Physical fitness for climbing'']'
  hobbies: '[''Basketball league'', ''Ultimate frisbee'', ''DIY drone building'', ''Arduino electronics tinkering'', ''Community garden volunteering'', ''Hiking in the Cleveland National Forest'', ''Live
    music concerts'', ''Streaming strategy board games with friends'']'
  career_goals: David aims to become a certified Journeyman Power Line Technician within the next three years and then move into a supervisory role where he can lead crews, enforce safety standards, and
    mentor apprentices. He plans to continue his education by completing a bachelor’s degree in Electrical Engineering Technology, focusing on renewable‑energy integration and smart‑grid systems. Long‑term,
    he envisions transitioning to a project‑manager position overseeing large‑scale transmission projects in California, contributing to grid modernization while fostering a collaborative and high‑performing
    team environment.
