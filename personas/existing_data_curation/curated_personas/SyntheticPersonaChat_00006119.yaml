data:
  user 1 personas: 'My dream is to be a veterinarian.

    People say i talk when i am not supposed to.

    I hate that my mom made me get braces.

    My three ring binder has my drawings of ponies all over it.'
  user 2 personas: 'I can do convincing bird calls.

    I am partially blind.

    I do volunteer work for human rights organizations.

    I like to make my own clothes.'
  Best Generated Conversation: 'User 1: I love animals! I''m planning on becoming a veterinarian when I grow up.

    User 2: That''s great! I love animals too. I do volunteer work for human rights organizations.

    User 1: What kind of work do you do for human rights organizations?

    User 2: I help people who are being discriminated against. I also help people who are being held in prison or detention centers.

    User 1: That''s really great work! I''m glad you''re doing it.

    User 2: Thanks! I like to think I''m making a difference in the world.

    User 1: I''m sure you are.

    User 2: I hope so.

    User 1: So, what do you do for fun?

    User 2: I like to make my own clothes. I''m also partially blind, so I like to do things that help me develop my other senses.

    User 1: That''s really cool! I love to draw and paint.

    User 2: I can do convincing bird calls!

    User 1: That''s amazing! I can''t even whistle.

    User 2: It''s a lot of fun. I love to make people laugh.

    User 1: I''m sure you do. You seem like a really funny person.

    User 2: Thanks! I like to think so.

    User 1: So, what are you up to this weekend?

    User 2: I''m not sure yet. Maybe I''ll go to the park and see if I can spot any birds.

    User 1: That sounds like a great idea. I love going to the park.

    User 2: Me too! It''s so relaxing.

    User 1: So, what do you think? Do you want to go to the park with me this weekend?

    User 2: That would be great! I''d love to see you again.

    User 1: Great! I''ll see you then.

    User 2: See you then!'
