  hobbies: '[''drawing'', ''LEGO building'', ''creative writing'', ''reading fantasy books'', ''watching science cartoons'', ''outdoor exploration'', ''soccer'', ''simple science experiments'', ''Minecraft'',
    ''organizing group games'']'
  career_goals: Vaughn dreams of growing up to be an artist or a video‑game designer who can create whole worlds for others to explore. He imagines himself designing colorful illustrations for books, inventing
    new games that bring friends together, or even becoming an astronaut who can turn the wonder of space into art. His underlying ambition is to use his imagination to make people smile and to share his
    creations with a wide audience.
