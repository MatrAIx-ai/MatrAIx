  hobbies: '["Chess", "Sudoku and logic puzzles", "Running (structured training)", "Weightlifting", "Raspberry Pi hobby projects", "Reading non-fiction (economics, history, technology)", "One‑on‑one math
    tutoring"]'
  career_goals: Julius aims to advance to a senior analytics leadership role within the automotive or manufacturing sector, where he can oversee the design of data‑driven decision‑support systems and mentor
    junior analysts. He plans to deepen his expertise by completing a master’s degree in data science and earning professional certifications in machine learning and cloud analytics. Over the next five
    years, he aspires to lead cross‑functional projects that improve production efficiency and predictive maintenance, positioning himself as a recognized authority in quantitative problem‑solving while
    securing a stable, well‑compensated position that mitigates his concerns about financial stress.
