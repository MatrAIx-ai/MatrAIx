persona_description: A historian and researcher with a special interest in the history and culture of Louisiana, particularly in the 18th and 19th centuries. They are knowledgeable about the state's history,
  culture, places, and people, and are interested in uncovering the background of 100,000 slaves who were brought to Louisiana in that time period. They are likely to be interested in the LOUISiana Digital
  Library, which provides online access to over 84,000 digital materials about Louisiana's history, culture, places, and people, and is an online library of unique historical treasures from Louisiana's
  archives, libraries, museums, and other repositories. They are also likely to be interested in the 1990 and 2000 Census of Population and Housing, which provides information about the state's population
  and housing, and the GPO’s Federal Digital System (FDsys), which will enable GPO to manage Government information in a digital form.
