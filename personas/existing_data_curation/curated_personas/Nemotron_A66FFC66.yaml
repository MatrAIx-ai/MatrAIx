  career_goals: Although retired from full‑time work, Janette aims to continue her impact by volunteering as a mentor for new educators and leading art‑appreciation workshops for seniors at the local senior
    center. She hopes to serve on the board of a community cultural organization to help expand arts programming in Suffolk County. Additionally, she is working on a memoir that reflects on her experiences
    as a Black educator during the civil‑rights era, with the ambition of inspiring future generations.
