personas:
  professional: Janette Bennett is a retired educator who channels decades of curriculum development expertise into mentoring new teachers and leading art‑appreciation workshops for seniors, blending meticulous
    organization with a curious, sociable flair that makes every community event feel both structured and warmly inclusive.
  sports: Janette Bennett stays active by strolling the trails of the Theodore Roosevelt Nature Preserve with the St. James Senior Walking Club, joining a weekly pickleball league at the local community
    center, and cheering for the New York Mets in spring and the Long Island Nets during the basketball season, viewing gentle exercise as both social communion and health maintenance.
  arts: Janette Bennett expresses their artistic soul through watercolor paintings inspired by Jacob Lawrence’s narrative color and Monet’s light, regularly attending exhibitions at the Long Island Museum
    of Art, performing gospel hymns in their church choir, and savoring the storytelling of August Wilson’s plays at the Suffolk County Playhouse.
  travel: Janette Bennett enjoys meticulously planned weekend getaways to historic gems such as Monticello, Natchez, and Savannah, as well as relaxing seaside retreats in Cape May, often traveling with
    adult children on a modest budget that balances cultural immersion with the comfort of familiar lodging.
  culinary: Janette Bennett delights in preparing soulful comfort meals like smoked collard greens seasoned with smoked paprika, sweet potato pie with a flaky crust, and crab cakes infused with fresh dill,
    showcasing a competent yet relaxed kitchen style that shines most brightly during church potlucks.
  core: Janette Bennett is a curious, community‑driven septuagenarian who harmonizes art, mentorship, and a love for jazz‑infused soul‑food, while occasionally misplacing their glasses and losing track
    of appointments amidst a calendar brimming with volunteer events.
background:
  cultural: Janette is an African‑American woman whose family traces its roots to the Great Migration, moving from the Southern United States to New York in the early 20th century. Growing up in the post‑civil‑rights
    era, she was shaped by a community that valued education, church fellowship, and artistic expression. She draws on the rich traditions of Black music, gospel, and visual art, while also embracing the
    diverse cultural fabric of Suffolk County. Her cultural identity informs her commitment to community service, intergenerational mentorship, and the preservation of Black artistic heritage.
