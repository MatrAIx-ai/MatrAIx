    and entrepreneurship podcasts", "Mentoring youth in local entrepreneurship programs", "Attending live music and theater performances", "Exploring regional cultural festivals"]'
  career_goals: Jason aims to advance into senior sales leadership within the next five years, targeting a regional sales manager role that oversees multiple territories in Oklahoma and neighboring states.
    He aspires to become a top‑performing sales director, driving revenue growth through innovative service offerings and data‑driven sales strategies. Leveraging his curiosity for new ideas, he plans to
    spearhead the adoption of AI‑powered sales tools to enhance prospecting efficiency. Jason also envisions completing his bachelor's degree in business administration to complement his practical experience.
    Long‑term, he is interested in founding a boutique sales consultancy that helps small‑to‑mid‑size businesses design creative go‑to‑market strategies, integrating his passion for art and storytelling
    into compelling brand narratives.
