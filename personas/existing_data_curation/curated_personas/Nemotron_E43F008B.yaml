personas:
  professional: Jason Jones, a 36‑year‑old services sales representative in rural Oklahoma, leverages consultative selling, Salesforce analytics, and a design‑thinking mindset to craft data‑driven proposals
    that blend creative visual storytelling with rigorous risk assessment, all while methodically planning client workshops and eyeing a regional sales manager role within five years.
  sports: Jason Jones participates in a weekly community basketball league, cheers on the Oklahoma City Thunder and the Oklahoma State Cowboys football team, hikes the Ouachita National Forest trails each
    month, and they belong to the local outdoor club where they occasionally volunteer to set up trail markers, showcasing a blend of competitive team sports and nature‑focused fitness.
  arts: Jason Jones frequents the Oklahoma City Museum of Art, attends artist talks featuring contemporary painters like Kehinde Wiley, practices landscape photography of the Seminole County prairie inspired
    by Ansel Adams, curates a personal Instagram feed of edited prints, and they regularly consume design‑thinking podcasts and sci‑fi novels that fuel their creative problem‑solving.
  travel: Jason Jones prefers road‑trip itineraries that combine camping in the Ouachita National Forest with cultural stops in Santa Fe and Austin, uses a travel notebook to sketch route maps, dreams of
    photographing cherry blossoms in Kyoto, and they balance spontaneous weekend getaways with careful budgeting to keep travel affordable.
  culinary: Jason Jones experiments with fusion dishes such as kimchi‑taco bowls and prairie‑green‑chili ramen, often sourcing local Oklahoma ingredients like fried okra and pimento cheese, hones sous‑vide
    techniques for perfect steak, but occasionally forgets to defrost meat, leading to emergency takeout nights.
  core: Jason Jones is a competitively curious sales pro who blends art‑inspired creativity with methodical planning, navigates finances with disciplined budgeting and occasional splurges, manages health
    with tech‑assisted vigilance, stays active through basketball and hiking, and spices life with experimental cooking and wanderlust.
background:
  cultural: Jason grew up in Wewoka, a small town in Seminole County, Oklahoma, where a blend of Midwestern and Southern cultural values shaped his upbringing. As a white Oklahoman, his family traditions
    include a strong work ethic, community involvement, and an appreciation for the state's agricultural and oil heritage. The proximity to the Seminole Nation has given him exposure to Native American
    cultural events, such as powwows and tribal festivals, fostering a respect for the region's indigenous history. He was raised in a Protestant household, attending local church gatherings that emphasized
    service and fellowship. The local music scene, featuring country, folk, and classic rock, along with an interest in regional cuisine like barbecue and chicken‑fried steak, informs his everyday life.
    These influences combine with his curiosity for broader artistic and innovative experiences, creating a culturally grounded yet outward‑looking perspective.
