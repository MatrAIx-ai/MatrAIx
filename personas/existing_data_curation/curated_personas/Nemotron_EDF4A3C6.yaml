  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting'', ''Reading (art history, educational theory, fiction)'', ''Gardening (vegetable and flower beds)'', ''Baking and cooking'', ''Volunteer
    tutoring at after-school programs'', ''Small book club meetings'', ''Walking on nature trails'', ''Listening to podcasts about creativity and pedagogy'', ''Puzzle solving (crosswords, jigsaw)'']'
  career_goals: Lisa aims to transition from retail to a full-time role in education within the next three years. She plans to obtain her state teaching certification and pursue a master's degree in curriculum
    and instruction, with a focus on integrating visual arts into community learning programs. Her short-term goal is to secure a part-time position as a teaching assistant or after-school program coordinator
    at a local elementary school, allowing her to apply her lesson-planning skills while maintaining family stability. Long-term, she envisions leading art-based outreach initiatives at a regional museum
    or developing a nonprofit that offers affordable art workshops for underserved youth.
