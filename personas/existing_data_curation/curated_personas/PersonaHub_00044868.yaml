persona_description: A professional entomologist with expertise in the management of aphid pests in winter wheat. This individual is knowledgeable in the use of insecticides to control aphid populations,
  particularly bird cherry oat aphids (BCOA). They have conducted research on the effects of BCOA on wheat yield and have developed a method to effectively scout for BCOA using the Glance n’ Go sampling
  technique. The persona is also skilled in estimating yield loss and crop value based on aphid infestations, and is familiar with the use of registered insecticides and application rates. They have a deep
  understanding of the principles of group theory and its applications in the study of finite groups, representation theory of groups, isomorphism problems, and the theory of group automorphisms.
