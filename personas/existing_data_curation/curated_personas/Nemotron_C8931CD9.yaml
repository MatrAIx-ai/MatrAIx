  career_goals: Although approaching retirement, George aims to shift from full‑time labor to a mentorship role. He plans to become a certified safety trainer for local contractors, volunteer as a woodworking
    instructor at the community center, and document the region’s labor history for the local historical society. He also wants to ensure his family’s financial security and maintain an active, healthy
    lifestyle.
