personas:
  professional: Corey Porter is an aspiring junior scientist‑engineer who channels their boundless curiosity and practical mindset into building intricate LEGO space stations, conducting backyard baking‑soda
    volcano experiments, and piecing together detective puzzle clues, all while embracing a relaxed, occasionally disorganized approach to school assignments.
  sports: Corey Porter is a lively forward for the Modesto Youth Soccer Club’s “River Raptors” after‑school league, avidly follows the Modesto Nuts minor‑league baseball team, and dreams of one day cheering
    in the stands at a San Francisco 49ers game, bringing a competitive spark to every match.
  arts: Corey Porter is an imaginative LEGO architect who draws creative fuel from the vivid colors of The Lego Movie, the epic scores of Hans Zimmer, and the adventurous spirit of Pixar’s Toy Story, often
    sketching their own mini‑figures while humming the iconic Star Wars theme.
  travel: Corey Porter is a weekend explorer who has taken the family train to San Francisco, hiked the granite cliffs of Yosemite National Park, camped along the Modesto River trail, and now daydreams
    about backpacking through the Grand Canyon on a future family vacation, balancing boundless excitement with parental budget limits.
  culinary: Corey Porter is a budding kitchen helper who loves whipping up creamy macaroni‑and‑cheese with extra cheddar, assembling homemade pizza topped with pepperoni and pineapple, sipping strawberry‑banana
    smoothies, yet they have the quirky habit of sprinkling LEGO‑shaped cereal over their breakfast bowl for extra crunch.
  core: Corey Porter is a curious, energetic 7‑year‑old who builds LEGO worlds, scores goals on the soccer field, solves puzzles with a competitive edge, and navigates daily life with occasional worries
    and a delightfully messy planning style.
background:
  cultural: Corey grew up in Modesto, California, a city in the agriculturally rich Central Valley. His family’s routine includes school‑year activities like youth sports leagues, weekend trips to nearby
    farms where he helps pick strawberries or watches tractors, and participation in community events such as the Modesto County Fair and Fourth of July fireworks. He celebrates common American holidays—Thanksgiving,
    Christmas, and Halloween—with his extended family, often enjoying traditional foods and seasonal decorations. The local school emphasizes fundamental literacy and numeracy, while extracurricular programs
    encourage teamwork and outdoor exploration. Media influences include popular children's TV shows, space documentaries, and video games like Minecraft, which reflect both his curiosity and his love for
    building. This blend of suburban California life, agricultural surroundings, and family‑centered traditions shapes Corey's cultural background.
