  career_goals: Corey dreams of turning his curiosity into a future career. He often talks about becoming an astronaut because he loves space documentaries and wants to explore the unknown, but he also
    imagines building rockets or machines, hinting at a future engineer or inventor. In a more grounded vein, he would like to be a wildlife biologist to study animals he sees on local hikes, and he sometimes
    says he wants to be a professional soccer player because he enjoys competition. His practical side also leads him to consider helping his family with home repairs, picturing himself as a handyman who
    can fix things for neighbors. These ambitions blend his love of discovery with a desire to be useful in his community.
