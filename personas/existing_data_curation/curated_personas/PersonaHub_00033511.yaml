persona_description: A component software developer who is trusted to write 'from' addresses for any user at the component's hostname. The component is used by server administrators to ensure that the component
  software is trusted and that the 'from' addresses are correct. The component is responsible for sending and receiving stanzas through the server, and the 'from' addresses must match the hostname of the
  component. The component may send stanzas from any user at the component's hostname, as long as the 'from' address is correct. The component is maintained by the XMPP Standards Foundation and is based
  on the Extensible Messaging and Presence Protocol (XMPP).
