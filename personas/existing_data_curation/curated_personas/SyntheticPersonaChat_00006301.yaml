    User 2: Really? What was that like?

    User 1: It was a lot of fun! I got to see a lot of movies for free.

    User 2: That''s awesome! I love seeing movies.

    User 1: So, what do you do when you''re not working or making short films?

    User 2: I hang out with my friends, go to the movies, and watch a lot of TV.

    User 1: Me too! I love to watch TV.

    User 2: What''s your favorite TV show?

    User 1: I don''t know, there are so many good ones. But I really like Game of Thrones.

    User 2: That''s a good one! I also like The Walking Dead and Stranger Things.

    User 1: Those are both great shows! I love the Walking Dead.

    User 2: Me too! It''s so suspenseful.

    User 1: So, what are you looking forward to in the future?

    User 2: I''m looking forward to finishing my short films and getting them into festivals.

    User 1: That''s great! I''m sure they''ll be amazing.

    User 2: Thanks! I hope so.'
