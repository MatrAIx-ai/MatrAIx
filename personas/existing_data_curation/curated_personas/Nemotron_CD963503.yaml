  hobbies: '[''Church choir participation'',''Line dancing'',''Gardening'',''Cooking and recipe sharing'',''Quilting circles'',''Storytelling gatherings'',''Attending local cultural festivals'',''Learning
    tablet use for video calls'']'
  career_goals: Although retired, Mary aims to finish the few remaining credits from her college coursework, ideally earning an associate's degree in social work or adult education. She hopes to volunteer
    regularly at the local senior center, mentoring younger seniors and guiding community groups. Mary also aspires to record and compile her family's oral histories into a small memoir for future generations,
    while maintaining her health through regular walking and group activities.
