personas:
  professional: Mary Wahid, a seasoned community mentor who channels their listening skills, gardening expertise, and Southern‑Tex‑Mex cooking flair into leading inclusive neighborhood gatherings, mentoring
    younger seniors at the local senior center, and pursuing an associate’s degree in social work while remaining a bright, curious presence in the community.
  sports: Mary Wahid, an avid participant in age‑friendly line‑dancing at the community center and a regular member of the neighborhood walking group, cheers enthusiastically for the Houston Astros and
    enjoys friendly bocce games at the senior center during winter months.
  arts: Mary Wahid, a gospel choir enthusiast who delights in singing hymns by Mahalia Jackson, swaying to jazz legends like Ella Fitzgerald and blues icons such as B. B. King, while also quilting with
    a circle of friends and attending multicultural festivals that showcase vibrant music, dance, and artisan crafts.
  travel: Mary Wahid, a cautious yet curious traveler, prefers low‑key road trips to nearby historic towns like New Orleans for jazz festivals and seasonal family visits in the Texas Hill Country, while
    budgeting for occasional senior‑friendly cruises that blend relaxation with group activities.
  culinary: Mary Wahid, a master of hearty Southern comfort foods infused with Tex‑Mex flair, routinely prepares collard greens with smoked ham, spicy chicken enchiladas, and homemade cornbread, seasoning
    with cilantro and jalapeños harvested from their garden, yet they sometimes over‑salt their dishes out of habit.
  core: Mary Wahid, with their boundless energy for group gatherings, gardening, and cooking, balances curiosity and practicality while their relaxed, sometimes disorganized habits add a charming quirk
    to everyday life.
background:
  cultural: Mary is an African‑American woman who grew up in the South before moving to El Paso, Texas. Her life reflects a blend of Southern Black traditions—like soulful church services, Juneteenth celebrations,
    and family storytelling—and the vibrant Mexican‑American culture of her current community. She honors Black history while also embracing local Hispanic holidays and food customs, creating a rich, multicultural
    tapestry that informs her values, social connections, and daily practices.
attributes:
  skills: '[''Community mentorship'',''Informal caregiving'',''Southern‑Tex‑Mex cooking'',''Gardening'',''Storytelling and oral history preservation'',''Basic digital literacy (email, video calls, social
