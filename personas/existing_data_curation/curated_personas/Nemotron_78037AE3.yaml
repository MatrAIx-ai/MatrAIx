personas:
  professional: Hector Barzola is a 17‑year‑old aspiring automotive technician who combines his hands‑on mechanical skill, disciplined organization, and analytical mindset to excel in GED coursework and
    a vocational automotive technology program, while simultaneously sharpening his computer repair abilities for a CompTIA A+ certification and experimenting with streaming competitive video‑game coaching
    as a side hustle.
  sports: Hector Barzola is a basketball enthusiast who hones his shooting at a local park, follows the Miami Heat for inspiration, engages in one‑on‑one drills, and complements his training with solitary
    beach jogs at sunrise, while also cheering for the Miami Marlins during baseball season.
  arts: Hector Barzola immerses himself in an eclectic music mix that includes salsa legends like Celia Cruz, reggaetón hits from Bad Bunny, and classic Latin tunes, while fueling his imagination with science‑fiction
    novels by Isaac Asimov and Liu Cixin, and occasionally watches indie films at local festivals with close friends.
  travel: Hector Barzola prefers low‑cost weekend getaways, planning trips to nearby Key West for its beach vibe, dreaming of a future visit to Tokyo’s Akihabara district for gaming culture, and often explores
    a vibrant neighborhood known for its street‑food markets and live music, balancing his student budget with a love for both relaxation and tech‑focused adventure.
  culinary: Hector Barzola enjoys cooking family‑style meals such as arroz con pollo and crispy tostones, mastering the balance of garlic, cumin, and plantain flavors, while experimenting with simple plating
    techniques and occasionally ordering pizza for a quick break from his disciplined kitchen routine.
  core: Hector Barzola is a structured yet competitive teen who juggles automotive tools, gaming rigs, and family recipes, often staying up late perfecting a shot or a code, yet occasionally forgets to
    recharge his phone and relies on caffeine to power through marathon sessions.
background:
  cultural: Hector was raised in a tightly‑knit Cuban‑American family in Miami Beach, where Spanish is spoken at home and English is used in school and the community. He grew up attending local Catholic
    services and participating in traditional celebrations such as Carnaval Miami and the Fiesta of San José, which emphasized family gatherings, music, and food. The flavors of his heritage—plantains,
    black beans, and roast pork—are a staple in his household, and he learned to cook many of these dishes from his mother and grandparents. The Cuban diaspora’s emphasis on hard work, resilience, and respect
    for elders has shaped his values, while his daily life in a multicultural city exposed him to diverse influences, from Afro‑Caribbean rhythms to mainstream American pop culture.
attributes:
  skills: '[''Automotive maintenance (oil changes, tire rotations, minor repairs)'', ''Computer hardware troubleshooting and upgrades'', ''Bilingual communication (Spanish/English)'', ''Cooking traditional
