  hobbies: '[''Competitive video gaming (Valorant, FIFA)'', ''Basketball shooting drills and pick‑up games'', ''Cooking Cuban dishes'', ''Building and customizing PC rigs'', ''Listening to salsa, reggaetón,
    and Cuban music'', ''Reading science‑fiction novels'', ''Beach jogging and swimming'']'
  career_goals: Hector plans to earn his GED within the next year and enroll in a vocational automotive technology program at a community college in Miami‑Dade. His goal is to become a certified automotive
    technician and eventually secure a stable job in a reputable garage, with a long‑term ambition of opening his own small car‑service shop. Recognizing his passion for gaming and technology, he also intends
    to develop his computer repair skills further, aiming for a CompTIA A+ certification, and explore streaming or coaching in competitive video games as a supplemental income stream. Ultimately, he wants
    to achieve financial independence to support his family and maintain a structured, reliable career path.
