  career_goals: Although retired, William aims to leave a durable legacy in Algona. He plans to complete a memoir that weaves his family’s story with the town’s history, and to establish a small scholarship
    for local students pursuing humanities studies. He also hopes to expand the community oral‑history project by training volunteers, and to serve as a consultant for the Algona Historical Museum’s upcoming
    exhibit on Mid‑Century farm life.
