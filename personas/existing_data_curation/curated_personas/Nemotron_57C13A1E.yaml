  hobbies: '[''Gardening'', ''Birdwatching'', ''Reading Historical Fiction'', ''Writing Memoirs'', ''Volunteering at Library'', ''Community Theater Attendance'', ''Chess'', ''Fishing'', ''Woodworking'',
