personas:
  professional: Michael Wilson, a veteran industrial welder and OSHA‑approved safety trainer, leverages three decades of expertise in MIG, TIG, SMAW and brazing to enforce meticulous quality‑control, schedule
    crews with clockwork precision, and mentor apprentices while channeling their competitive drive toward record‑low defect rates and continuous process improvement.
  sports: Michael Wilson, a dedicated member of the Golden State Strikers bowling league, enjoys weekly lanes with friends, follows the Los Angeles Dodgers and San Francisco 49ers avidly, participates in
    seasonal coastal fishing trips during spring and early summer, and maintains light fitness through weekend walks and occasional woodworking‑related strength work.
  arts: Michael Wilson, who frequently attends live performances at the local Troubadour venue, treasures classic rock icons like Bruce Springsteen and The Rolling Stones, enjoys listening to blues guitarist
    Stevie Ray Vaughan while restoring vintage cars, and finds artistic fulfillment in woodworking projects inspired by Mid‑Century modern design.
  travel: Michael Wilson, an enthusiastic road‑tripper, has driven the Pacific Coast Highway multiple times to explore Monterey Bay’s fishing spots, dreams of a guided Alaskan salmon‑fishing expedition,
    and prefers meticulously planned trips that balance budget constraints with the desire for family‑friendly coastal destinations such as Santa Barbara and San Diego.
  culinary: Michael Wilson, a competent grill master, favors hearty American fare like smoked brisket, classic cheeseburgers, and fresh fish tacos seasoned with lime, cilantro, and chili powder, enjoys
    preparing side dishes of roasted garlic potatoes and corn on the cob, and often showcases their woodworking skill by crafting custom cutting boards for family barbecues.
  core: Michael Wilson, the meticulous welder who never misses a bowling night, channels their routine‑driven, competitive spirit into flawless metalwork while constantly worrying about the next deadline
    and the health of their joints.
background:
  cultural: Michael's cultural background is rooted in a midwestern-origin white working-class American family that settled in Southern California after World War II. Raised in the suburbs of Los Angeles
    County, he grew up in a household that emphasized hard work, self-reliance, and practical values. His family's traditions include regular church attendance (Protestant), community involvement, and strong
    family ties. Living in Whittier, he is part of a close-knit, multicultural neighborhood, yet his personal identity reflects the traditional, practical ethos of post-war American middle-class culture,
    with a focus on routine, achievement, and community service.
attributes:
  skills: '["Industrial welding", "Precision soldering", "Brazing", "Blueprint and schematics interpretation", "Welding equipment maintenance", "Safety compliance (OSHA)", "Welding inspection and quality
