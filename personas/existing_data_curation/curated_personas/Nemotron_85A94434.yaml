  hobbies: '["Bowling league", "Classic car restoration", "Woodworking", "Fishing", "Community volunteer projects (Habitat for Humanity)", "Attending live music at local venues", "Family barbecues", "Playing
    cards with friends", "Neighborhood association events"]'
  career_goals: Michael aims to transition into a supervisory role over the next few years, obtaining a Certified Welding Supervisor certification and eventually becoming a foreman or shop manager. He plans
    to mentor a new generation of apprentices, improving overall shop productivity and safety metrics. Long-term, he hopes to start a small, family-owned welding and metal-fabrication business that can
    provide steady work for his children and secure a comfortable retirement. He is also focused on achieving recognition for his low defect rates, receiving a company safety award, and maintaining financial
    stability for his family.
