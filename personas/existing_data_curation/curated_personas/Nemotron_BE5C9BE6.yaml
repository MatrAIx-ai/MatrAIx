personas:
  professional: Tiyanna Prabhakar, a retired research scientist turned community mentor, leverages her analytical expertise in statistical analysis, early FORTRAN programming, and meticulous report writing
    to design highly structured coding workshops for local youth, yet she often lets her relaxed attitude toward deadlines and occasional disorganization bleed into the scheduling of sessions, revealing
    a blend of methodical precision and flexible pragmatism.
  sports: Tiyanna Prabhakar enjoys low‑impact beach walks each sunrise, joins the Coastal Seniors walking club for occasional group strolls, participates in senior‑friendly yoga classes at the local senior
    center, and cheerfully supports the New York Yankees and New Jersey Devils, embodying a gentle fitness routine that balances solitary activity with modest team fandom.
  arts: Tiyanna Prabhakar finds solace in the smooth sounds of Miles Davis and John Coltrane while knitting, immerses herself in classic literature such as Toni Morrison, James Baldwin, and Maya Angelou,
    and attends matinee performances at the nearby community theater, weaving together jazz, poetry, and stage drama into a personal tapestry of cultural appreciation.
  travel: Tiyanna Prabhakar prefers thoughtfully planned, low‑stress excursions to historic locales like Independence Hall in Philadelphia, the Ellis Island Immigration Museum, and the cobblestone streets
    of Savannah, often traveling with a senior‑friendly tour group that respects her need for comfort, routine, and brief yet meaningful adventures.
  culinary: Tiyanna Prabhakar delights in preparing soul‑food staples such as collard greens simmered with smoked ham hocks, sweet‑potato pie spiced with cinnamon, and baked catfish flavored with fresh
    basil and thyme from her garden, showcasing a cooking style that blends comforting tradition with the bounty of seasonal produce.
  core: Tiyanna Prabhakar is a methodical, garden‑loving, jazz‑infused octogenarian who balances a structured mind with occasional anxiety‑driven impulsivity and a deep commitment to preserving heritage
    through mentorship and memoir writing.
background:
  cultural: Tiyanna was born and raised in a Black American family that settled in New Jersey after her parents migrated from the Caribbean, where her paternal ancestors were part of the Indo-Caribbean
    community. Growing up, she was immersed in the church, gospel music, and the civil rights activism of the 1960s, which instilled a strong sense of community and pride in Black heritage. While her surname
    reflects her South Asian lineage, her cultural identity is primarily shaped by African-American traditions—storytelling, soul food, jazz, and a deep respect for education. She honors both strands of
    her heritage through family celebrations, culinary fusions, and a lifelong commitment to mentoring the next generation.
attributes:
  skills: '[''Advanced mathematics'', ''Statistical analysis'', ''Technical writing'', ''Mentoring youth in STEM'', ''Laboratory instrumentation troubleshooting'', ''Curriculum development'', ''Genealogical
    research'', ''Community organizing'']'
  hobbies: '[''Gardening'', ''Reading classic African-American literature'', ''Knitting'', ''Bird watching'', ''Jazz music appreciation'', ''Cooking soul-food dishes'', ''Volunteer book-discussion group'',
    ''Beach walks'']'
  career_goals: Although retired, Tiyanna is focused on leaving a lasting legacy. She intends to compile a memoir and a detailed family genealogy that highlights the experiences of Black women in science
    during the civil rights era. She aims to mentor a small group of high-school and college students from her community, offering structured workshops that teach basic coding and data analysis. Tiyanna
    also hopes to serve as a senior advisor for the local historical society, helping preserve oral histories of Monmouth County's Black residents. Her personal ambition includes maintaining her health
    and emotional well-being through a steady daily routine that supports her anxiety-prone nature.
