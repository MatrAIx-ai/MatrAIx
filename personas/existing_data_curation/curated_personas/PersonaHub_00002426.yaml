persona_description: A geoscientist or geographer interested in the study of icebergs, their movements, and their impact on the environment. They are particularly interested in the Erebus Ice Tongue and
  the Erebus Glacier, and the risks associated with large icebergs breaking off and drifting in the McMurdo Sound. They are also interested in the history of icebergs in the area and the potential effects
  of climate change on icebergs and the environment. They may have a background in satellite imagery analysis and may have a particular interest in the satellite imagery of McMurdo Sound and the Erebus
  Ice Tongue.
