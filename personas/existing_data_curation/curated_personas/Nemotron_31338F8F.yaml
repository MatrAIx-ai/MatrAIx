personas:
  professional: Johnny Gonzalez, an organized and imaginative graphic design student, blends his digital illustration skills in Photoshop, Illustrator, and Procreate with meticulous project planning to
    create socially resonant visual campaigns for community art workshops, while pursuing an internship at a local studio and mentoring youth at Moreno Valley cultural festivals.
  sports: Johnny Gonzalez, a soccer‑enthusiast who plays weekly with the Moreno Valley Strikers, follows the Los Angeles Galaxy and the Los Angeles Lakers, hits the local gym for functional training in
    the off‑season, and treats each salsa class as cardio, though they occasionally skip leg day after a long night of music composition.
  arts: Johnny Gonzalez, a mixed‑media artist who draws abstract digital paintings inspired by Yayoi Kusama and Beeple, writes acoustic songs blending contemporary indie folk with traditional Latin rhythms
    reminiscent of Lila Downs, and channels the energy of live performances by listening to Carlos Santana and Tash Sultana while actively curating community art workshops.
  travel: Johnny Gonzalez, an avid road‑tripper, enjoys weekend escapes to the desert landscapes of Joshua Tree, has backpacked through Barcelona’s art districts, plans to attend the AR/VR Expo in Tokyo,
    and prefers budget hostels over luxury hotels, often using travel apps to find free community events.
  culinary: Johnny Gonzalez, a confident home‑cook, perfects family recipes like tamales and chiles rellenos using fresh corn masa and poblano peppers, experiments with spicy mole sauces, and enjoys pairing
    dishes with craft ales, though they sometimes forget to clean the kitchen until the next morning.
  core: Johnny Gonzalez, a methodical dreamer, merges bright digital art with community activism, fuels creativity with late‑night guitar jams, and can’t resist a fresh batch of tamales even when it means
    skipping sleep.
background:
  cultural: Johnny is a second‑generation Mexican‑American raised in Moreno Valley, California. He grew up bilingual, speaking Spanish at home and English at school, and his family maintains traditions
    such as Día de los Muertos altars, quinceañera celebrations, and holiday gatherings centered on Mexican cuisine. The vibrant Latino community in Riverside County has shaped his sense of identity, fostering
    a deep respect for family, collective responsibility, and cultural pride. While he honors his Catholic upbringing, Johnny also embraces a broader, inclusive worldview, often participating in multicultural
    events that celebrate the fusion of Mexican heritage with contemporary American life.
