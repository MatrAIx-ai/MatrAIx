  career_goals: In the short term, Johnny plans to enroll in a community college program focused on graphic design or visual communication, securing an internship at a local studio to apply his skills in
    a professional setting. He also aims to volunteer as a design mentor for youth programs within the Moreno Valley Latino community. Over the longer horizon, Johnny aspires to become a creative director
    for a nonprofit organization that blends art and social impact, eventually launching his own agency that produces culturally resonant visual campaigns and offers art‑therapy workshops for underserved
    populations. His ambition is to merge his artistic passion with his desire to help others, leveraging his bilingual background to bridge gaps between communities.
