personas:
  professional: Farhad Taylor, an aspiring game developer and junior robotics hobbyist, channels a blend of curiosity and competitiveness into designing Scratch animations and leading neighborhood video‑game
    tournaments, even though they often leave their LEGO builds in disarray and forget to schedule practice sessions.
  sports: Farhad Taylor plays point guard for the Eastside Eagles youth basketball league, rides with the Parkside Skate Crew at the downtown skate park, and roots for the Los Angeles Lakers, favoring high‑energy
    pick‑up games over regimented drills, and they thrive on the social buzz of the court and ramp.
  arts: Farhad Taylor curates playlists of Kendrick Lamar and SZA, devours graphic novels like Saga and Ms. Marvel, and regularly supports friends at the community talent showcase where freestyle rap battles
    echo the energy of local street art, and they often use these influences to inspire their Scratch animations.
  travel: Farhad Taylor prefers spontaneous weekend road trips to nearby state parks such as Zion, relishes annual family visits to Orlando’s Disney World, and dreams of a future backpacking adventure through
    Tokyo’s Akihabara district, balancing budget limits with a love for immersive pop‑culture experiences, and they plan each trip with a mix of loose itineraries and last‑minute stops at comic book stores.
  culinary: Farhad Taylor enjoys devouring pepperoni pizza and chicken teriyaki ramen, can whip up a decent batch of homemade nachos with jalapeños and cheddar, and often experiments with mango‑chili salsa
    on tacos, though they rarely clean the kitchen afterward.
  core: Farhad Taylor is a hyper‑social, competition‑driven 12‑year‑old who juggles LEGO masterpieces, video‑game victories, and basketball drills, but habitually leaves projects half‑finished and forgets
    to tidy up, and they rarely notice the mess until someone points it out.
background:
  cultural: Farhad grew up in a close‑knit African‑American family in the Muncie‑Blackford County area. His parents, originally from the Southern United States, brought traditions of church gatherings,
    gospel music, and soulful family cookouts. The local Black community places a strong emphasis on basketball, music, and mentorship through youth programs, which have shaped Farhad's social life and
    interests. He celebrates Juneteenth, participates in Saturday basketball leagues, and enjoys the rich storytelling found in rap and spoken‑word performances. Contemporary Black creators in technology
    and media serve as role models for his aspirations, reinforcing his belief that he can blend his cultural heritage with his future career goals.
attributes:
  skills: '[''Public Speaking'', ''Strategic Gaming (Chess, eSports)'', ''Basic Coding (Scratch)'', ''DIY Electronics (Kits)'', ''Organizing Peer Activities'', ''Team Sports Coordination (Basketball)'',
    ''Critical Problem Solving'', ''Creative Storytelling'']'
  hobbies: '[''Basketball'', ''Competitive Video Gaming'', ''LEGO Building'', ''Scratch Programming'', ''Listening to Hip‑Hop and R&B'', ''Community Talent Shows'', ''Skateboarding'', ''Graphic Novels'',
    ''DIY Electronics'']'
  career_goals: In the short term, Farhad wants to lead his school's gaming club, improve his coding projects, and launch a YouTube channel where he reviews tech gadgets and shares gaming strategies. Long‑term,
    he dreams of becoming a professional esports athlete or a commentator, and eventually founding a startup that creates educational gaming software for kids. He also sees himself as a community influencer
    who can inspire other kids in his neighborhood to explore tech and sports.
