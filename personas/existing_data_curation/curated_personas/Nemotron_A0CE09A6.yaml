    scenes'', ''Listening to classical music'', ''Exploring historic architecture'']'
  career_goals: Patricia intends to leverage her unique blend of financial acumen and passion for the arts to move into a senior leadership role that bridges both worlds. Over the next five years she aims
    to transition into a chief financial officer position at a cultural nonprofit or community foundation, where she can design sustainable funding models, oversee large‑scale arts initiatives, and mentor
    emerging finance professionals. She plans to obtain a Certified Public Accountant (CPA) credential, deepen her expertise in nonprofit accounting, and actively serve on the board of a local arts organization.
    Long‑term, she hopes to establish a scholarship fund that supports emerging artists in the Northampton region, thereby leaving a lasting legacy that combines fiscal responsibility with artistic enrichment.
