persona_description: A anthropologist who is interested in the study of body types and anthropometric measurements. They are particularly interested in the Brugsch's Index and its application in identifying
  body types, particularly in New Guineans and Japanese populations. They are likely to be interested in the mathematical aspects of the index, particularly the multiplication of chest circumference by
  100 and dividing the product by the height. They may also be interested in the broader implications of the index in anthropology and its application in other areas of research.
