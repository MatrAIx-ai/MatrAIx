personas:
  professional: Jesus Stoll, a 17‑year‑old aspiring heavy‑equipment operator, combines his practical carpentry, mechanical aptitude, and reliable organization to coordinate community trail‑maintenance projects,
    thriving on structured tasks while channeling his competitive energy into effective teamwork.
  sports: Jesus Stoll plays basketball and soccer at the Missoula Community Center, frequents the local skate park, and follows the Montana Grizzlies football and Missoula PaddleHeads baseball teams, approaching
    fitness with competitive intensity and a preference for structured team drills over casual recreation.
  arts: Jesus Stoll engages in traditional drumming and powwow gatherings, admires the rhythmic storytelling of R. Carlos Nakai and the modern indie folk sounds of Sufjan Stevens, and spends free time crafting
    wooden birdhouses inspired by the woodworking aesthetics of Norm Abram.
  travel: Jesus Stoll prefers a blend of detailed itinerary planning and spontaneous camping nights, having trekked Yellowstone and Glacier National Parks and dreaming of kayaking the fjords of Norway and
    hiking the Inca Trail in Peru.
  culinary: Jesus Stoll favors hearty mountain fare like grilled trout with huckleberry glaze, bison burgers topped with sweet onion jam, and home‑cooked campfire beans seasoned with smoked paprika, while
    often attempting to perfect a traditional fry‑bread recipe during family gatherings.
  core: Jesus Stoll is a structure‑loving, competitively spirited teen who balances tribal drumming, skateboarding, and a future in heavy‑equipment work, all while juggling a modest budget and occasional
    bouts of procrastination.
background:
  cultural: Jesus is a member of the Confederated Salish and Kootenai tribal community that surrounds Missoula, Montana. Raised in a household that blends English with Salish language snippets, he has been
    immersed in cultural practices such as seasonal ceremonies, storytelling, and traditional crafts. The tribe’s strong emphasis on land stewardship has shaped his respect for the natural environment and
    guided his interest in outdoor occupations. He regularly attends tribal gatherings, including annual powwows where he drums, dances, and connects with extended family. Through participation in youth
    mentorship programs run by the tribe, he balances modern pursuits with a deep sense of responsibility toward preserving his heritage for future generations.
