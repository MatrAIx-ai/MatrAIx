  hobbies: '[''basketball'', ''soccer'', ''skateboarding'', ''traditional drumming'', ''powwow participation'', ''tribal language study'', ''hiking'', ''fishing'', ''camping'', ''competitive video gaming'',
    ''first‑person shooter streaming'', ''woodworking projects'', ''kayak building'']'
  career_goals: Jesus aims to first secure his high school equivalency credential within the next year, then enroll in a vocational apprenticeship that aligns with his love of structure and outdoor work,
    such as heavy‑equipment operation or welding. He envisions a short‑term role maintaining trails and recreation facilities for the Missoula County Parks or the tribal forest department, where his practical
    skills and reliability are valued. Long‑term, he aspires to become a park ranger or natural‑resource manager, protecting the lands his ancestors have stewarded and guiding other Native youth toward
    similar careers. He also hopes to lead cultural‑heritage projects, such as coordinating powwow logistics or teaching traditional crafts, merging his organizational talents with his community’s cultural
    priorities.
