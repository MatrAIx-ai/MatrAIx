personas:
  professional: John Stilwell is a budding automotive technician who leverages his hands‑on woodworking and model‑car building expertise, Excel‑savvy budgeting, and self‑taught Python scripts to diagnose
    vehicle issues systematically, preferring organized, repeatable processes that satisfy his competitive drive to outperform peers in the shop.
  sports: John Stilwell incorporates disciplined weight‑lifting sessions at the neighborhood gym, studies the Detroit Lions’ defensive statistics each NFL season, and competes in a weekend bass‑fishing
    league on nearby lakes, where their competitive nature drives them to chase personal best catches.
  arts: John Stilwell channels their structural creativity into building scale model cars while listening to the precise instrumental rock of Steve Reich and the high‑octane guitars of AC/DC, and they spend
    evenings dissecting the visual storytelling of classic automotive films by James Cameron.
  travel: John Stilwell prefers meticulously planned road trips that blend scenic fishing spots with automotive heritage tours, having spent last summer at Lake Superior’s shoreline and dreaming of future
    pilgrimages to the Porsche Museum in Stuttgart and the Toyota Commemorative Museum in Nagoya, all while staying within a modest student budget.
  culinary: John Stilwell favors high‑protein meals such as grilled chicken breast with quinoa and steak‑fajita wraps, cooks simple weekend barbecues of spare‑rib pork, and often snacks on protein bars
    while they meticulously log their calorie intake to complement their weight‑lifting regimen.
  core: John Stilwell is a structure‑obsessed, competitively driven teen who balances meticulous automotive ambitions with organized gaming, fitness, and occasional impulsive gear splurges, all while navigating
    minor health niggles and a disciplined budgeting habit.
background:
  cultural: John grew up in a middle‑class, white family in Wayne County, Michigan. His upbringing reflects typical Midwestern values of hard work, self‑reliance, and practicality. Family gatherings often
    revolve around Sunday meals and community events, and he was raised with a modest appreciation for local traditions such as high‑school sports and neighborhood festivals. The region’s automotive heritage
    and a culture that emphasizes reliable, hands‑on skills have shaped his interests and career aspirations.
attributes:
  skills: '[''Microsoft Office (Excel, Word)'', ''Basic automotive repair'', ''Woodworking'', ''Mechanical troubleshooting'', ''Time management'', ''Problem solving'', ''Introductory Python (scripting)'']'
  hobbies: '[''Model car building'', ''Competitive strategy video games'', ''Weightlifting'', ''Fishing'', ''Reading technical manuals and automotive magazines'', ''Woodworking'']'
  career_goals: John plans to enroll in a community‑college automotive technology program and pursue an apprenticeship with a local repair shop. He aims to earn a certified automotive technician credential
    within two years, with the longer‑term ambition of managing a service department or eventually opening his own garage. He also considers a possible future in CNC machining, valuing the clear, structured
    career path and the opportunity to apply his technical skills competitively.
