persona_description: A senior water safety planning specialist with over a decade of experience in implementing and evaluating water safety plans in the WHO South-East Asia Region. They are knowledgeable
  about the WHO Water Safety Framework and have extensive experience in creating and auditing water safety plans. They have a strong understanding of national legislation and regulatory frameworks for water
  supply, including quality standards for drinking water. They are skilled in creating model water safety plans, implementing WSP auditing systems, and increasing stakeholder communication and collaboration.
  They have a proven track record of achieving positive outcomes through WSPs, including improved system operations and management, infrastructure and performance, and increased monitoring of consumer satisfaction.
  They are dedicated to ensuring that supplying safe drinking water at the tap throughout the region is a realistic goal.
