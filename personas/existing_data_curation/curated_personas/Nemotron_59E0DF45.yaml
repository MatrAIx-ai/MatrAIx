personas:
  professional: Jorge Wells is a budding robotics enthusiast who, at 12, programs Scratch animations and assembles LEGO Mindstorms bots, leveraging a practical, structured mindset while tolerating the occasional
    disorganization of school projects.
  sports: Jorge Wells rides a mountain bike around the neighborhood on weekends, cheers for the Cincinnati Reds and Bengals on game days, and participates in the school’s intramural soccer league, preferring
    small‑team drills that mirror their love for teamwork in robotics, and is a member of the Cincy Kids Cycling Club.
  arts: Jorge Wells sketches comic‑strip characters in a spiral‑bound notebook while listening to classic rock legends like The Beatles, Queen, and The Rolling Stones, and pop hits from Taylor Swift, often
    drawing inspiration from the Cincinnati Art Museum’s rotating exhibitions.
  travel: Jorge Wells loves road trips that blend family time with game‑day pilgrimages, having visited the Indianapolis Motor Speedway and the Columbus Sci‑Tech Museum, dreaming of a future adventure to
    New York’s Museum of Natural History and a summer camp in the Appalachian Mountains, but always drafts a simple itinerary to keep the chaos under control.
  culinary: Jorge Wells enjoys the tangy swirl of Cincinnati chili on spaghetti, German pretzels with mustard from Oktoberfest fairs, and classic pepperoni pizza, and can mix a decent grilled cheese using
    sharp cheddar, though they rarely venture beyond microwave popcorn without adult supervision.
  core: Jorge Wells is a methodical, curiosity‑driven pre‑teen who balances a love for building robots and comic art with a penchant for spontaneous video‑game purchases and occasional bike‑induced back
    aches.
background:
  cultural: Jorge comes from a middle‑class white family in Cincinnati, Ohio, a city known for its blend of Midwestern values and urban diversity. His upbringing reflects the region’s emphasis on community,
    hard work, and modesty. He has been exposed to local traditions such as attending Cincinnati Reds baseball games with his family, participating in community festivals like Oktoberfest Zinzinnati, and
    celebrating holidays with extended relatives. The city’s strong manufacturing and tech sectors have influenced his interest in engineering and robotics, while the public school system has provided opportunities
    for extracurricular activities like the robotics club. His cultural environment encourages self‑reliance, respect for teamwork in small groups, and a balanced view of personal ambition and community
    contribution.
attributes:
  skills: '[''LEGO construction'', ''Basic bike repair'', ''Scratch programming'', ''Strategic video gaming'', ''Problem solving (puzzles)'', ''Small‑group collaboration'', ''Spatial reasoning'']'
  hobbies: '[''Strategic video gaming'', ''LEGO building'', ''Scratch programming'', ''Reading adventure novels'', ''Sketching comics'', ''Bicycle riding'', ''Robotics club participation'', ''Collecting
    trading cards'', ''Listening to music'']'
  career_goals: Jorge envisions a future where he can blend his love for hands‑on building with technology. He aspires to become a robotics engineer or a video‑game developer—roles that would let him design
    interactive systems and solve concrete problems. He is motivated by the idea of creating tools that make everyday tasks easier for people, and he sees himself eventually studying engineering or computer
    science in college. While he values practical outcomes, he also wants a career that allows for creative freedom and the chance to work in small, focused teams, ideally within the vibrant tech and manufacturing
    community of Cincinnati.
