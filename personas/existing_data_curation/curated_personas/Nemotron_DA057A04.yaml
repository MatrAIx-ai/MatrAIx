  hobbies: '[''miniature furniture making'', ''reading Midwestern history'', ''birdwatching'', ''vegetable gardening'', ''fly fishing'', ''model train layout building'']'
  career_goals: As he approaches retirement, Bassam aims to transition from full‑time site work to a boutique furniture studio where he can create high‑quality, heirloom pieces for the local market. He
    plans to develop a small apprenticeship program to pass on his methodical trade skills, and to volunteer as a construction‑safety instructor for the county’s vocational school. He also hopes to compile
    his decades of experience into a practical guide for Midwest carpenters, preserving traditional techniques while emphasizing modern safety standards.
