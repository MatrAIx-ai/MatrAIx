  career_goals: Rosalind aims to lead a regional health network that expands telehealth services to improve access for underserved rural populations. Over the next five years she plans to spearhead a community
    health initiative that reduces chronic disease rates, mentor emerging health managers, and establish a legacy of high patient satisfaction and staff retention. Ultimately she hopes to transition to
    a consultancy role where she can share her expertise nationwide while continuing to advocate for sustainable rural healthcare models.
