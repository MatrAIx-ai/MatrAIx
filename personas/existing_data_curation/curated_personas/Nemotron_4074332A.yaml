  career_goals: Dorothy aims to transition from front‑line service to a supervisory or managerial role within her restaurant, using her organizational talent to train new staff and improve operational efficiency.
    She plans to complete her remaining college credits in hospitality management, which would open possibilities for a part‑time position at the local community center, overseeing volunteer schedules and
    nutrition programs. Long‑term, she hopes to combine her love of cooking and community service by offering small‑scale catering or cooking classes for senior groups, while ensuring a stable retirement
    through careful financial planning.
