  hobbies: '[''Gardening'', ''Golf'', ''Reading historical non-fiction'', ''Birdwatching'', ''Volunteer work at senior center'', ''Bridge'', ''Cooking'', ''Nature walks'', ''Community theater attendance'']'
  career_goals: Although retired, Patrick aims to remain active in education by mentoring novice teachers, volunteering to lead intergenerational learning workshops at local community centers, and serving
    on the board of a nonprofit focused on early childhood literacy. He hopes to author a concise guide on practical teaching strategies for adult learners, continue his own lifelong learning through online
    courses in environmental history, and support his grandchildren’s academic pursuits.
