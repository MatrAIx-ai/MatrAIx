  career_goals: Jennie aims to ascend to a senior executive role—such as Director of Operations or Vice President of Innovation—where she can shape company‑wide strategies that integrate technology with
    creative initiatives. She plans to earn an MBA to deepen her business acumen and to spearhead interdisciplinary programs that encourage artistic expression within a tech environment. Mentoring emerging
    women in STEM, championing mental‑health‑friendly workplace policies, and eventually launching her own consultancy focused on innovation and organizational well‑being are also central to her long‑term
    vision.
