persona_description: A medical researcher who specializes in the study of bacterial pathogens, particularly the S. sonnei strain and its resistance mechanisms. She is particularly interested in macrolide
  resistance and the mechanisms by which macrolides are inactivated. Her research interests include the development of new macrolide antimicrobial agents, the identification of new macrolide-resistant bacterial
  strains, and the characterization of macrolide resistance mechanisms. She has published numerous articles on macrolide resistance in S. sonnei and has received grants for her research.
