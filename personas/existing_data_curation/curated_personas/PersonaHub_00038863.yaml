persona_description: Jane Graydon was a prominent abolitionist, advocate for African-American issues, and Civil War nurse who also served as a Civil War nurse and helped found the Indianapolis Home for
  Friendless Women. She was born in 1802 in Wilmington, Delaware, and married Alexander Graydon in 1822, moving to Indianapolis in 1843. She was involved in the Presbyterian Church and was an ardent abolitionist.
  Her home was reputed to be a station of the Underground Railroad, and she served as a Civil War nurse. She also founded the Indianapolis Home for Friendless Women, a safe haven for destitute women and
  children.
