persona_description: A historian and anti-communist who specializes in studying the events of the Soviet Union, focusing on the Great Purge and the subsequent terror under Yeltsin. They are knowledgeable
  about the victims of the Great Terror, including the number of people who were accused and convicted of crimes against the state and the number of people who were arrested and exterminated during the
  Great Terror. They are also familiar with the various political tendencies that support the myth of the victims being innocent of any crimes and believe that the victims were victims of Stalin's paranoia.
  They have a deep understanding of the case of David Landau and the scientific community's response to the accusations against him.
