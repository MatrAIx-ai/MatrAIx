personas:
  professional: Ian Moore, a budding architect in the making, spends preschool recess sketching detailed floor plans for imaginary treehouses, layering LEGO bricks with precise symmetry, and never leaves
    a project unfinished, delighting teachers with their methodical approach while they sometimes worry the structures will collapse.
  sports: Ian Moore, a small‑group enthusiast in sport, drills with the Fontana Youth Soccer Club's kindergarten team on Saturday mornings, cheers for the Los Angeles Dodgers on game nights, and spends
    afternoons on a blue BMX bike exploring the neighborhood cul‑de‑sac, balancing their love of structured play with solitary rides and they eagerly narrate each adventure to their parents.
  arts: Ian Moore, an imaginative little creator, fills sketchbooks with swirling dinosaurs inspired by Doctor Seuss's whimsical lines, mimics the bright colors of Disney's 'Moana', and eagerly watches
    Pixar shorts at the local library's storytime, often insisting they can paint a masterpiece using finger paints before bedtime.
  travel: Ian Moore, a cautious explorer, loves to chart family road trips to Disneyland and the San Diego Zoo on paper maps peppered with stickers, prefers short drives over long flights, and often asks
    whether they'll have enough time to play in the splash zone before the journey begins.
  culinary: Ian Moore, a selective eater with a growing palate, relishes cheesy mac and cheese, chicken nuggets with a side of carrot sticks, and helps whisk batter for banana pancakes, yet often panics
    if their cherished dinosaur‑shaped crackers disappear from the snack drawer, and they might whine loudly until a replacement is offered.
  core: Ian Moore, a five‑year‑old dreamer, combines boundless imagination with meticulous planning, worries over tiny setbacks, and they find comfort in solitary creation while quietly thriving in small‑group
    play.
background:
  cultural: Ian grows up in a middle‑class, suburban family in Fontana, California. His household observes typical American holidays such as Thanksgiving, the Fourth of July, and birthday celebrations,
    often with cake and family gatherings. He attends a local public preschool that emphasizes inclusive, multicultural curricula, exposing him to diverse cultural celebrations and languages common in the
    Inland Empire region. Family outings frequently include trips to nearby museums, art galleries, and community festivals, giving him a modest exposure to the broader cultural fabric of Southern California
    while maintaining a generally Western, Anglo‑American upbringing.
attributes:
