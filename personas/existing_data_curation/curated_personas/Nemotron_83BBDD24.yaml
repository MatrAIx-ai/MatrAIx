    ''solitary play'', ''small‑group collaborative building'', ''nature walks and collecting natural objects'']'
  career_goals: Ian dreams of exploring new frontiers and creating beautiful things. He often talks about becoming an astronaut who discovers distant planets, an artist who paints his vivid imaginations,
    or a scientist/engineer who designs inventions to help people. He also expresses a desire to be a teacher or caretaker who can make others feel safe and less worried, reflecting his compassionate side
    and his wish for a calm, organized world.
