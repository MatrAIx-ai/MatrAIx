  career_goals: Although no longer part of the formal workforce, Adnan aims to channel his expertise into meaningful community roles. He plans to mentor younger volunteers at the local fire‑auxiliary, eventually
    serving on its advisory board. He hopes to achieve a certification in CPR/First Aid to enhance his emergency response capabilities. Competitive drive pushes him to improve his chess rating and lead
    his senior bowling team to a league championship. He also envisions launching a modest home‑based handyman consultancy that helps fellow seniors with home repairs, allowing him to stay active while
    managing his stress levels. In parallel, he seeks to complete an introductory coding course to keep up with his grandchildren’s digital world and to satisfy his curiosity about programming.
