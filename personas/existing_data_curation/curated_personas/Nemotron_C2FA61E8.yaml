  career_goals: Carolyn dreams of turning her artistic passion and communication strengths into a career that blends creativity with storytelling. She aspires to study visual communications or multimedia
    journalism in college, aiming to become a visual storyteller, digital content producer, or eventually a creative director for a media or advertising agency. She also imagines working with museums or
    cultural institutions to design engaging exhibits that make art accessible to diverse audiences, and she hopes to travel to gather fresh inspiration for her work.
