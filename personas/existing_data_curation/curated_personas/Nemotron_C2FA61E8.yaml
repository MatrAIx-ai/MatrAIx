personas:
  professional: Carolyn Henry, a 14‑year‑old aspiring digital artist and museum volunteer, blends curiosity with a competitive edge, channeling hours of sketching, Photoshop experiments, and photo essays
    into a budding portfolio that impresses curators at the Indianapolis Museum of Art; they regularly organize school debate arguments with the same precision they apply to curating virtual exhibitions.
  sports: Carolyn Henry, a soccer enthusiast who plays on the local co‑ed Saturday league and frequents the Broad Ripple skate park, roots for the Indianapolis Colts and Indiana Pacers, bringing the same
    competitive spirit to the field as they do to debate; they keep a training log but often skip warm‑ups when rush‑hour calls after school.
  arts: Carolyn Henry, an avid creator who draws inspiration from the vibrant murals of Indianapolis and the fantastical worlds of Brandon Sanderson and N.K. Jemisin, spends weekends sketching at the Indianapolis
    Museum of Art, curates a personal blog featuring their digital paintings, and cites musician Tame Impala and actor Lin‑Manuel Miranda as sources of artistic motivation; they love photographing street
    scenes, always hunting for the perfect sunrise over Monument Circle.
  travel: Carolyn Henry, a teen traveler with a penchant for road trips, has explored the Indiana Dunes’ sandy trails and the bustling streets of Chicago, dreaming of a future visit to New York’s Broadway
    district to see a live musical; they plan trips using Pinterest boards and Google Maps, balancing family‑budget constraints with a desire for adventure and often persuade friends to join for group outings.
  culinary: Carolyn Henry, a budding food explorer, adores classic Midwestern fare like pork tenderloin sandwiches and sweet‑potato casserole, yet they also experiment with sushi rolls—favoring the California
    roll—and love whipping up homemade brownies for Thanksgiving potlucks; they often improvise with jalapeño poppers and pride themselves on a growing Pinterest collection of teen‑friendly recipes.
  core: Carolyn Henry, a 14‑year‑old artistic whirlwind, balances a competitive drive with community‑centered curiosity, turning every sketch, debate, and soccer match into a chance to shine while occasionally
    overspending on the latest tech gadget.
background:
  cultural: Carolyn grew up in a middle‑class family in Indianapolis, Indiana, where Midwestern values of friendliness, community involvement, and a balanced work‑life outlook are part of daily life. Her
    family celebrates traditional holidays such as Thanksgiving and Fourth of July with community potlucks and local fireworks, reflecting a blend of broader American culture and regional customs. Exposure
    to the city’s diverse cultural venues—museums, public art installations, and music festivals—has nurtured her appreciation for the arts while reinforcing a sense of belonging to the Indianapolis community.
