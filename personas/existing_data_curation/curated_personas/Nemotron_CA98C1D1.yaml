personas:
  professional: Brody Poonoi, a 21‑year‑old business operations specialist, leverages their methodical Excel, SQL, QuickBooks, and Dynamics Business Central expertise, along with a calm, organized demeanor
    and a collaborative spirit, to map and optimize workflows, while charting a Lean Six Sigma Black Belt path and part‑time BBA studies to become an operations manager in a Gulf‑Coast manufacturing firm.
  sports: Brody Poonoi, a forward for the Lake Jackson Strikers adult soccer league, combines high‑energy training with weekly fishing trips on Galveston Bay, supports the Houston Dynamo and the Texas Rangers,
    and maintains a disciplined fitness routine that includes interval drills and weekend jogs along the coastline.
  arts: Brody Poonoi unwinds by listening to tech and business podcasts, classic rock from AC DC, cinematic epics directed by Christopher Nolan, and joining co‑op video‑game sessions with friends, weaving
    these influences into a creative outlook that fuels both their problem‑solving at work and classic‑car restoration projects.
  travel: Brody Poonoi prefers road‑trip itineraries that blend coastal relaxation with hands‑on experiences, having already explored Galveston, New Orleans’ French Quarter, and the Texas Hill Country,
    while dreaming of a weekend sailing getaway to the Florida Keys and a cultural immersion tour of San Antonio’s River Walk.
  culinary: Brody Poonoi cooks Tex‑Mex staples such as chicken fajitas, homemade guacamole, and chili‑lime grilled shrimp caught on Galveston Bay, displaying confident skillet skills yet a habit of over‑spicing
    recipes until friends beg for a milder batch.
  core: Brody Poonoi merges a relentlessly organized, calm mindset with a love for community soccer, classic‑car tinkering, and strategic problem‑solving, while occasionally overcommitting to side projects.
background:
  cultural: Brody grew up in a white, middle‑class family in Lake Jackson, Texas, where Southern hospitality, a strong work ethic, and community involvement are core values. His upbringing blended suburban
    life with the Gulf Coast’s outdoor traditions, giving him an appreciation for fishing, barbecues, and local festivals. The region’s conservative but pragmatic outlook shaped his balanced curiosity and
    practicality, while his church‑based community reinforced kindness, cooperation, and consideration for others. These cultural influences are reflected in his collaborative work style, dedication to
    local service, and respect for both established methods and innovative ideas.
attributes:
  skills: '[''Process mapping'', ''Workflow optimization'', ''Inventory control'', ''Microsoft Excel (pivot tables, macros)'', ''Basic SQL querying'', ''QuickBooks'', ''Microsoft Dynamics Business Central'',
