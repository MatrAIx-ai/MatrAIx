  hobbies: '[''Adult soccer league'', ''Fishing at Galveston Bay'', ''Volunteer work at local food bank'', ''Classic car restoration'', ''Tech and business podcasts'', ''Reading business strategy books'',
    ''Co‑op video gaming'', ''Cooking Tex‑Mex cuisine'']'
  career_goals: Brody aims to progress from his current business operations specialist role to an operations manager position within the next five years, ideally in a mid‑size manufacturing or logistics
    firm serving the Gulf Coast region. He plans to earn a Lean Six Sigma Black Belt and complete a part‑time Bachelor of Business Administration to deepen his strategic and analytical capabilities. Long‑term,
    he envisions launching his own consultancy that helps small Texas businesses streamline processes, reduce waste, and improve profitability while staying rooted in his community through mentorship and
    local economic development initiatives.
