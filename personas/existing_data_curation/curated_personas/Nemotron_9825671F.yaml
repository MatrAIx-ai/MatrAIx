    and small‑scale carpentry"]'
  hobbies: '["Landscape painting","Botanical sketching","Macro photography of plants and trees","Reading natural‑history and horticulture books","Cooking traditional Mexican cuisine","Playing acoustic guitar","Gardening
    (herb and shade garden)","Cultivating bonsai trees","Journaling and reflective writing","Meditation and mindfulness exercises"]'
  career_goals: Looking ahead, Rafael aims to transition from full‑time field work to a mentorship and consulting role as he approaches retirement. He plans to offer workshops on safe pruning techniques
    and tree health for community garden volunteers, curate a small guidebook that blends scientific pruning advice with artistic sketches, and occasionally take on selective consulting projects for boutique
    orchards. His ambition is to leave a lasting legacy of both practical expertise and creative appreciation for trees, while ensuring a steady, low‑stress income stream that supports his family's future
    and his personal projects.
