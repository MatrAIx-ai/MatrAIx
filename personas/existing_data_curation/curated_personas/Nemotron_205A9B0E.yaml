personas:
  professional: Jose Casanova, a 21-year-old aspiring concept artist, leverages his bilingual fluency, Photoshop mastery, and strategic chess mindset to generate surreal visual narratives for indie video-game
    studios, while balancing disciplined project planning with spontaneous creative bursts.
  sports: Jose Casanova supports the Rio Grande Valley FC Toros and the Dallas Cowboys while squeezing in weekly pick-up basketball at a local gym, a solo jog along the Rio Grande at sunrise, and occasional
    weekend soccer matches with friends, using these activities as both a competitive outlet and a stress-relief ritual.
  arts: Jose Casanova immerses himself in the mural-rich streets of Brownsville, draws inspiration from indie Mexican rock groups like Zoé and Café Tacvba as well as the surreal poetry of Octavio Paz, and
    routinely studies the works of contemporary illustrators such as Alex Ross and Hayao Miyazaki to refine his own hybrid visual language.
  travel: Jose Casanova habitually plans low-cost road trips to nearby cultural hubs like San Antonio's River Walk and the historic town of Laredo, dreams of a future backpacking adventure through Mexico
    City's street-art scene and Kyoto's animation studios, and balances his wanderlust with a scholarship-focused budget that limits spontaneous overseas travel.
  culinary: Jose Casanova enjoys cooking homestyle tamales al vapor and exploring the complex flavors of chiles en nogada, while also experimenting with fusion dishes like mole-infused ramen, often sourcing
    fresh corn, epazote, and miso to create vibrant plates that echo his love for bold, contrasted color palettes.
  core: Jose Casanova is a hyper-creative, anxiety-prone 21-year-old who transforms border-town vibes into surreal concept art, obsessively budgets every cent, meticulously tracks health triggers, and channels
    competitive instincts into both chess and indie-game storytelling.
background:
  cultural: Jose grew up in Brownsville, Texas, a city that lies on the U.S.–Mexico border, within a Mexican‑American family where Spanish and English were spoken interchangeably. Family gatherings featured
    traditional dishes like tamales and pozole, and celebrations such as Día de los Muertos infused his personal art with symbolic motifs of skulls and marigolds. The vibrant mural tradition of the Rio
    Grande Valley, the blend of Tejano, norteño, and contemporary indie music, and the everyday cross‑border dynamics have shaped his aesthetic sensibility. He is attuned to the social and political issues
    affecting his community, and he often reflects themes of identity, migration, and resilience in his creative work while maintaining close ties to his family and local cultural network.
attributes:
  skills: '[''Digital illustration'', ''Concept art'', ''Graphic design (Adobe Photoshop, Illustrator)'', ''Creative writing'', ''Bilingual communication (Spanish/English)'', ''Basic Python programming'',
    ''Photography'', ''Critical analysis of literature and visual media'', ''Strategic thinking (chess)'', ''Self‑directed learning'']'
  hobbies: '[''Digital sketching'', ''Reading speculative fiction'', ''Photography of border landscapes'', ''Writing poetry and journaling'', ''Playing chess'', ''Listening to indie Mexican rock and son
    jarocho'', ''Playing narrative video games'', ''Meditation and breathwork'', ''Attending small local art exhibitions'']'
  career_goals: Jose aspires to earn a scholarship to a BFA program in visual arts, focusing on concept illustration and narrative design. He aims to work as a freelance concept artist for indie video‑game
    studios, creating immersive worlds that reflect his interest in novel, abstract ideas. Long‑term, he plans to launch a digital storytelling platform that amplifies voices from the US‑Mexico border region,
    blending visual art, poetry, and short film. He also hopes to develop community workshops where he can mentor other young artists and integrate art‑therapy techniques to help peers cope with anxiety
    and emotional distress.
