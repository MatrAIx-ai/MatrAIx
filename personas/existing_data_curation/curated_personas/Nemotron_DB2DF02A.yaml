  career_goals: John aims to build a stable, upward‑moving career within retail. Over the next few years he plans to earn a shift‑manager certification, advance to store supervisor, and eventually become
    a store manager at a regional grocery chain. He is considering part‑time courses in business management at a community college to broaden his leadership skills. Long‑term, he hopes to leverage his experience
    to open a small, family‑friendly convenience store that serves his local community, providing a dependable workplace for others.
