personas:
  professional: Alberta Almquist, a ten‑year‑old with a knack for building intricate Minecraft realms and a love for soccer, imagines a future as a community‑focused game developer who blends structured
    problem‑solving with the collaborative spirit they hone in Girl Scouts and on the field.
  sports: Alberta Almquist sprints across the community field each afternoon as a midfielder on the Riverdale Girls Soccer Club, they cheer for the Washington Capitals during winter, and eagerly track the
    Baltimore Orioles' games on Saturdays, blending a love for active play with team loyalty.
  arts: Alberta Almquist spends weekend afternoons sketching comic‑style panels inspired by Studio Ghibli films and the adventurous mysteries of Nancy Drew, while listening to the upbeat tunes of pop star
    Taylor Swift and attending library storytimes that feature local author readings, they let creative expression color their social world.
  travel: Alberta Almquist explores nearby Washington, D.C. museums on school field trips, vacations at Ocean City’s beaches in summer, and dreams of a future family road trip to the historic castles of
    Europe, they balance spontaneous day‑out plans with a parental budget that prioritizes educational experiences.
  culinary: Alberta Almquist delights in frosting chocolate cupcakes with rainbow sprinkles for holiday gatherings, whips up quick mac 'n' cheese after school, and occasionally experiments with cinnamon‑sugar
    rolls learned from community cooking classes, they showcase a budding yet slightly mess‑prone kitchen enthusiasm.
  core: Alberta Almquist is a ten‑year‑old who mixes high‑energy social play with a love for structured creativity, they often juggle spontaneous fun with the occasional mess of unfinished projects.
background:
  cultural: Alberta is raised in a white, middle‑class family in Riverdale, Maryland. While her family’s Swedish‑origin surname reflects Northern European roots, she grows up surrounded by the multicultural
    environment of Prince George’s County, celebrating mainstream American holidays and also learning about the diverse traditions of her neighbors through school programs, community events, and local library
    activities.
