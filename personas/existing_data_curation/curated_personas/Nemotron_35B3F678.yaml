  hobbies: '[''Watercolor painting'', ''Acrylic painting'', ''Botanical sketching'', ''Bird‑watching'', ''Nature trail walking'', ''Reading art history and classic literature'', ''Genealogy research'',
    ''Gardening native plants'', ''Attending small gallery openings and art lectures'', ''Traveling to regional museums and historic sites'']'
  career_goals: Although retired from formal employment, Jennifer remains goal‑oriented in her personal pursuits. She aims to curate a seasonal art exhibition at the local community center that showcases
    both her own work and that of other senior artists, fostering intergenerational dialogue. Over the next five years she plans to complete a series of watercolor studies inspired by Florida's wildlife
    and publish a small memoir that interweaves these artworks with stories of her family heritage. Jennifer wishes to deepen her photographic skill by completing an online course and to volunteer as a
    docent at a nearby museum, sharing her love for art and history with occasional visitors. Travel goals include visiting three major art museums—such as the Getty Center, the Smithsonian American Art
    Museum, and the National Gallery of Art—to broaden her artistic perspective.
