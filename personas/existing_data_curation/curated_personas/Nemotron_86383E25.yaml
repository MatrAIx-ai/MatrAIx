  career_goals: In retirement, Samantha aims to channel her lifelong dedication to education into purposeful community service while maintaining a predictable schedule that eases her tendency toward worry.
    She plans to volunteer as a literacy mentor at a local elementary school, serve on the advisory board of a Bronx senior center, and design a series of intergenerational learning workshops that pair
    retirees with students for skill exchange. To deepen her impact, she hopes to earn a short certification in gerontology, allowing her to address seniors' health and stress concerns more effectively.
    Additionally, Samantha aspires to compile a memoir that records her experiences as a Black educator navigating the evolving landscape of New York City public schools, preserving both personal and communal
    histories for future generations.
