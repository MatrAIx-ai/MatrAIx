persona_description: A marine biologist who specializes in the study of jellyfish populations, particularly their impact on the marine ecosystem and the factors that contribute to their expansion. Their
  research interests include the effects of anthropogenic factors, such as fertiliser and sewage, on jellyfish populations, and the role of carbon in aiding jellyfish growth. They have expertise in the
  field of oceanography, with a focus on the ocean's response to climate change and its impact on marine life. They are also knowledgeable about the impact of overfishing on jellyfish populations and the
  role of non-indigenous species in exacerbating the situation.
