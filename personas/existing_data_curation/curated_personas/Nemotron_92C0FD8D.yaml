  career_goals: Daniel dreams of a future where he can blend his imagination with technology. He aspires to become a video game designer or comic book artist, creating worlds that spark curiosity in others.
    He also imagines himself as an astronaut or environmental scientist, exploring unknown frontiers and solving big problems. In the short term, he aims to win his school’s science fair, lead his chess
    team to a championship, and perform a solo in the upcoming school play, viewing each achievement as a stepping stone toward his larger creative and exploratory ambitions.
