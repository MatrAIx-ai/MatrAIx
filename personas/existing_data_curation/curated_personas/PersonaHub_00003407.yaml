persona_description: A concerned citizen who is passionate about the environment and wildlife, particularly the Niagara Escarpment. They are aware of the potential benefits and drawbacks of wind energy
  development, and are concerned about the impact on the natural scenery, sensitive features, and heritage sites. They are also aware of the potential risks to wildlife, particularly the little brown bat,
  and are concerned about the impact of wind turbines on this species. They are interested in learning more about the latest research on wildlife mortality caused by wind turbines and are open to new techniques
  and approaches for reducing the incidence of wildlife mortality.
