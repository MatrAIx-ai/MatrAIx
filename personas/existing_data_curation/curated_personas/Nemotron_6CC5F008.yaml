  career_goals: Edicta aspires to blend her love for science, technology, and helping others into a career that makes a tangible difference. In the short term she plans to excel in high school by taking
    advanced STEM courses, joining competitive robotics teams, and pursuing leadership roles in school clubs. Long term she envisions studying biomedical engineering or computer science at a university,
    with a focus on developing affordable medical devices or educational software for children. She is also motivated by her bilingual background and hopes to work on projects that serve diverse communities,
    potentially as a researcher or engineer who bridges technical innovation with cultural awareness. Ultimately she aims to contribute to improving children's health and education while staying connected
    to her Spanish heritage.
