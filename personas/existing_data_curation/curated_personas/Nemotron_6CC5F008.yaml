personas:
  professional: Edicta Yanes, a 14‑year‑old student with a budding passion for robotics, combines methodical problem‑solving and teamwork from soccer to design and program autonomous kits for the school’s
    robotics club, while also mentoring younger teammates in a reliable, organized manner, and they always keep a detailed project log.
  sports: Edicta Yanes, a dedicated midfielder on the Mukilteo High School soccer team and member of the local youth soccer club, follows the Seattle Sounders FC with fervor, incorporates weekend trail
    hikes for endurance, and occasionally joins beach volleyball games at the waterfront during summer, and they relish the camaraderie of mixed‑sport gatherings.
  arts: Edicta Yanes, who spends afternoons sketching sci‑fi protagonists and practicing piano pieces ranging from Mozart’s Sonata K.331 to Ariana Grande’s ‘Positions,’ also enjoys flamenco dance workshops
    where the rhythms of Paco de Lucía inspire their movements, and they watch anime series like ‘Attack on Titan’ for visual storytelling cues.
  travel: Edicta Yanes plans trips with a blend of curiosity and practicality, having visited the coastal town of San Sebastián for a family holiday of paella cooking, dreaming of exploring Barcelona’s
    Gothic Quarter and the Olympic National Park’s Hoh Rainforest on a school field‑trip, while budgeting each journey through their savings account, and they eagerly map out itineraries on a shared family
    travel board.
  culinary: Edicta Yanes enjoys experimenting in the kitchen, skillfully preparing a saffron‑infused seafood paella with shrimp, mussels, and chorizo, while also mastering homemade tortilla de patatas with
    potatoes, onions, and olive oil, and they love pairing these dishes with fresh Pacific salmon from local markets.
  core: Edicta Yanes, a pragmatic yet curious teen, balances robotics tinkering, soccer drills, and flamenco rhythms, all while juggling an allowance‑driven habit of impulsive snack buys and a tendency
    to procrastinate on school homework, and they often rely on music to refocus.
background:
  cultural: Edicta is a second-generation Spanish American whose family maintains strong ties to their heritage. At home Spanish is spoken daily, and she celebrates traditional holidays such as Día de los
    Reyes, Semana Santa, and Navidad with family gatherings, paella, and flamenco music. Her parents encourage her participation in local Hispanic community events, including cultural festivals and Spanish
    language school, reinforcing a sense of pride in her roots. Growing up in Mukilteo Washington she also embraces the Pacific Northwest lifestyle—outdoor activities like hiking, beachcombing, and environmental
    stewardship are part of her routine. This blend of Spanish family customs and American coastal culture shapes her worldview, fostering both a respect for tradition and an appreciation for community
    and nature.
