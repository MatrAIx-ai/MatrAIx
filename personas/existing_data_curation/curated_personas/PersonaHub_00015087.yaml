persona_description: A highly skilled and accomplished animal sculptor who is known for his detailed and powerful treatment of large and small game animals, as well as domestic animals and private commissions.
  His works are characterized by a sense of pride and romanticism, with a focus on the individual character of each animal. He is considered by many to be the finest animal sculptor of the late Animalier
  period. His works have been exhibited at the Salon des Artistes Frances and culminated in a Grand Prix at the 1900 Exposition Universelle. He is documented in several books on the history of animal sculpture,
  including "Les Animaliers" by Jane Horswell, "The Animaliers" by James Mackay, and "Animals in Bronze" by Christopher Payne.
