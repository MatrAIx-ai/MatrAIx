personas:
  professional: Anesha Dorsey is a senior financial advisor with three decades of experience in financial planning, risk assessment, and nonprofit budgeting, leveraging advanced Excel modeling, SQL queries,
    and SAP to design efficient financial processes, mentor emerging leaders, and channel her curiosity for the arts into strategic grant support for cultural projects.
  sports: Anesha Dorsey follows the Milwaukee Brewers and the Green Bay Packers with loyal enthusiasm, participates in a weekly senior bowling league at the Racine Community Center, and joins a seasonal
    walking group that explores the Lake Michigan shoreline each summer.
  arts: Anesha Dorsey immerses herself in the visual and performing arts by painting watercolors of Riverside Park, attending jazz concerts featuring the Waukesha Jazz Collective and paying tribute to Ella
    Fitzgerald, and serving on the board of the Racine Arts Alliance to ensure sustainable funding for exhibitions.
  travel: Anesha Dorsey enjoys thoughtfully planned road trips, favoring destinations like Door County’s cherry orchards, the historic French Quarter of New Orleans for its jazz heritage, and yearly visits
    to Chicago’s Art Institute, while balancing travel with her community responsibilities and a modest travel budget.
  culinary: Anesha Dorsey delights in cooking soul‑inspired dishes such as collard greens with smoked turkey, sweet potato pie, and cornbread, while also experimenting with Mediterranean mezze like hummus
    and feta salad, often sourcing fresh herbs from her community garden and occasionally over‑salting her stews.
  core: Anesha Dorsey is a curious, organized senior advisor who blends financial expertise with a passion for art, community mentorship, and soulful cooking, all while navigating the occasional worry that
    fuels her meticulous planning.
background:
  cultural: Raised in the Midwest during the civil rights era, Anesha’s upbringing was steeped in a strong Black community ethos centered on church, education, and mutual support. Her family stressed the
    importance of academic achievement and civic engagement, which shaped her passion for STEM and financial empowerment. She maintains close ties to African American cultural traditions, including gospel
    music, soul cooking, and storytelling, and actively participates in Racine’s Black History Society. These experiences fostered a deep sense of resilience, pride, and a commitment to uplifting future
    generations through mentorship and community service.
attributes:
  skills: '["Financial planning and analysis", "Risk assessment and mitigation", "Budget development and monitoring", "Advanced Excel modeling", "SQL data querying", "SAP and QuickBooks proficiency", "Regulatory
