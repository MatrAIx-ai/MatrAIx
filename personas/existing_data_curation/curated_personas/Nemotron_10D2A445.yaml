  hobbies: '["Watercolor painting", "Visiting art museums", "Attending jazz and blues concerts", "Continuing education in fintech", "Reading biographies of Black pioneers", "Senior book club", "Community
    garden volunteering", "Financial literacy instruction", "Mindfulness meditation", "Journaling", "Crossword puzzles"]'
  career_goals: At 70, Anesha aims to transition from full‑time financial management to a senior advisory role, focusing on mentorship and legacy building. She plans to establish a community scholarship
    fund to support Black students pursuing STEM fields, and to serve on the board of a local arts nonprofit to ensure sustainable financing for cultural programs. Anesha also seeks to author a guide on
    financial resilience for seniors, integrating her expertise with her personal experience of managing stress and worry. Ultimately, she hopes to leave a lasting impact on Racine’s financial literacy
    landscape and foster economic empowerment within the Black community.
