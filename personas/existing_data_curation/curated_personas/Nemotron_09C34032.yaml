personas:
  professional: Stacie Scott is a veteran waitress with over a decade of high‑volume diner experience, whose knack for precise order taking, diligent cash handling, and meticulous station organization fuels
    a competitive edge they channel into consistently surpassing sales targets, while their preference for structure drives them to push for a shift‑manager role where they can codify efficient workflows
    and mentor staff through rigorous SOPs.
  sports: Stacie Scott is a dedicated member of the Lakefront Walking Club, follows the Chicago Cubs and Minnesota Vikings religiously, participates in a low‑key Tuesday night bowling league at the local
    alley, and squeezes in weekend yoga sessions to stay limber, because they favor solitary, low‑impact activities over competitive team sports.
  arts: Stacie Scott is a devoted jazz and neo‑soul aficionado, often streaming Nina Simone, D'Angelo, and Kamasi Washington while preparing meals, and they unwind with classic mystery novels by Agatha
    Christie and historical nonfiction by Erik Larson, occasionally attending intimate performances at the Green Mill jazz club and the local theater’s monthly Shakespeare in the Park.
  travel: Stacie Scott prefers meticulously planned, low‑key getaways that blend nature and cultural history, such as a solo weekend retreat at Door County’s lighthouse cottages, a road trip through the
    historic towns of the Ohio River Valley, and a future dream to explore Kyoto’s tranquil temples, and they always budget carefully to keep travel stress minimal.
  culinary: Stacie Scott channels creativity into healthy soul‑food experiments, regularly whipping up baked collard‑green quinoa bowls, sweet‑potato black‑eyed pea stew, and blueberry oat muffins spiced
    with smoked paprika and a touch of maple, favoring ingredients like kale, chickpeas, and almond flour while they stream Miles Davis to set the kitchen mood.
  core: Stacie Scott is a structure‑driven, introverted hospitality professional who curates calm through puzzles, solitary cooking, and disciplined routines while battling a competitive streak and persistent
    anxiety, and they constantly seek order to soothe their mind.
background:
  cultural: Stacie is an African‑American woman raised in the Midwest, whose family roots trace back to the Great Migration. Growing up in Kenosha, she was shaped by the close‑knit Black community and the
    traditions of the local church, which emphasized resilience, mutual support, and soulful music. Her cultural heritage informs her culinary tastes—soul‑food flavors blended with Midwestern simplicity—and
    her appreciation for community gatherings like Juneteenth picnics and neighborhood block parties. While she values the Midwestern emphasis on punctuality, thrift, and straightforward communication,
    her Black identity also brings a strong sense of perseverance, family solidarity, and pride in cultural heritage that she carries into her professional and personal life.
attributes:
  skills: '["Order taking", "Cash handling", "Point-of-sale operation", "Inventory management", "Workstation organization", "Opening and closing procedures", "Customer service", "Conflict resolution", "Upselling
    and sales strategy", "Staff training and mentorship"]'
  hobbies: '["Reading mystery novels", "Crossword puzzles", "Sudoku", "Vegetable gardening", "Home cooking and baking", "Listening to jazz and neo-soul music", "Mindfulness meditation", "Gentle yoga", "Lakefront
    evening walks"]'
  career_goals: Stacie aims to move into a supervisory role within the hospitality industry, seeking a shift manager position that offers clear responsibilities, consistent schedules, and the ability to
    implement systematic improvements. She wants to develop expertise in back-of-house operations and eventually transition to a restaurant manager role where she can design and enforce efficient workflows.
    Long-term, she envisions opening a small, community-focused café that combines her love for food with a structured, low-stress environment, allowing her to control staffing, menu planning, and operating
    hours.
