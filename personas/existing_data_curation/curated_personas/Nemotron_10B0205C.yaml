  career_goals: Lewis aims to secure a role as a product manager or project lead in a technology company that focuses on sustainable solutions. He wants to leverage his technical background and organized
    work style to drive product development from concept to launch, ensuring high standards and user-friendly designs. In the long term, he aspires to earn an MBA and eventually lead a cross-functional
    team that creates tech products improving community well‑being and environmental impact. He values career stability, clear objectives, and opportunities to mentor younger teammates, aligning with his
    desire for harmony and purposeful achievement.
