  hobbies: '["visiting art galleries and festivals", "photography and sketching", "improv comedy", "karaoke", "pickup basketball", "hiking in the Sierra Nevada", "reading science‑fiction novels", "competitive
    trivia nights", "online multiplayer gaming", "journaling and mindfulness"]'
  career_goals: David aims to transform his hands‑on retail experience into a formal career in supply chain and operations management. He plans to complete his associate degree in Business Administration
    and later earn a bachelor's in Supply Chain & Logistics, targeting a managerial role within a major retailer in the next five years. As a department manager, he hopes to lead inventory strategy, optimize
    store layouts, and mentor new associates, leveraging his competitive drive to achieve measurable performance gains. Parallel to his corporate aspirations, David nurtures an entrepreneurial ambition
    to launch an online boutique that curates affordable art supplies and showcases work from emerging Nevada artists. Ultimately, he envisions opening a combined gallery‑café space in Reno that serves
    as a cultural hub, marrying his logistical expertise with his passion for art and community engagement.
