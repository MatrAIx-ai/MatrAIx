persona_description: A materials engineer who specializes in the design and selection of PCB materials for RoHS compliant lead-free soldering processes. They have extensive knowledge of the Glass Transition
  Temperature (TD) and Decomposition Temperature (TG) of different materials, and are well-versed in the high re-flow temperatures associated with lead free soldering. They are responsible for selecting
  materials that not only meet the RoHS requirements but also ensure the circuit board withstands the higher temperatures without permanent damage. They are also aware of the importance of using material
  with a TD above 340C and TG above 170C, as exceeding these values can result in permanent damage to the circuit board.
