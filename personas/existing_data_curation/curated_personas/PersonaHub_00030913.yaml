persona_description: 'A professor of biological sciences at Simon Fraser University who specializes in the intersection of science and tribal histories, particularly in the context of the Haida Nation.
  His research interests include paleo-environmental work, animal communities, human history, and the application of science to the preservation and revitalization of indigenous cultures. He is known for
  his contributions to the book "Haida Gwaii: Human History and Environment from the Time of Loon to the Time of the Iron People," which brings together the results of extensive archaeological, ethno-historical,
  and paleo-environmental work in the isolated north coast archipelago.'
