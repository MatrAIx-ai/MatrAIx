persona_description: A nutritionist who is passionate about exploring the complex role of cereals in human nutrition, particularly their contribution to reducing micronutrient malnutrition. This individual
  is aware of the importance of hidden micronutrients, dietary fiber, and the bioactive components of whole grain cereals in health and well-being. They are interested in leveraging the bioactive content
  of cereals to improve diets and are seeking to explore, explain, and exploit the contribution to diets of less-researched nutrient-dense crops and other foods. They are willing to engage with research
  disciplines, stakeholders, and policy makers to achieve this goal.
