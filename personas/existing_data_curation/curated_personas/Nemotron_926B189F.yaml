personas:
  professional: Gloria Wakefield, a three‑year‑old pretend‑play teacher, orchestrates daily storytime sessions with the same routine and reliability they bring to snack time, already displaying early organizational
    skills, a knack for guiding peers, and a cheerful, cooperative spirit.
  sports: Gloria Wakefield, a bright three‑year‑old who eagerly attends the Little Kickers Soccer Club every Saturday and twirls in the Tiny Tots Ballet class during winter, cheers for the New York Yankees
    and the Golden State Warriors on family game nights, and approaches fitness with a blend of routine‑driven playtime and spontaneous bursts of energy.
  arts: Gloria Wakefield, a giggling fan of Sesame Street’s Elmo, sings the song Let It Go by Idina Menzel at every family gathering, watches Disney’s Frozen on repeat, and delights in coloring pictures
    of Mickey Mouse, letting these bright, familiar characters fuel their imaginative play and cooperative storytelling with friends.
  travel: Gloria Wakefield, a curious toddler who loves family outings to the San Diego Zoo and Disneyland, enjoys weekly trips to Grandma’s farm in the countryside for picnics, and dreams of splashing
    in the warm waters of Hawaii and building sandcastles on the French Riviera’s beaches, always preferring the predictable schedule of short drives over long flights.
  culinary: Gloria Wakefield, a picky three‑year‑old who refuses broccoli but devours chicken nuggets, creamy mac and cheese, and strawberry banana smoothies, can barely help stir batter in the play kitchen,
    yet they love spotting the bright orange cheese and vivid red strawberries on their plate.
  core: Gloria Wakefield, the perennial stroller‑sultan of routine who negotiates snack trades with the diplomatic flair of a tiny UN ambassador, thrives on predictable playtimes yet bursts into energetic
    group dancing whenever the music changes.
background:
  cultural: Gloria is raised in Gibson City, a small town in Champaign County, Illinois, within a predominantly white, Midwestern community. Her family values practicality, modesty, and community engagement,
    often participating in local church gatherings, town picnics, and school festivals that emphasize togetherness and tradition. This environment reinforces respect for routine, politeness, cooperation,
    and a strong sense of belonging.
