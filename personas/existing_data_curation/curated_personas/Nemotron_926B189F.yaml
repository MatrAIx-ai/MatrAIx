  career_goals: Gloria enjoys helping others and often says she wants to be a teacher or a caretaker when she grows up. In the near term, her personal ambitions include learning to write her name, counting
    to twenty, mastering potty training, and being able to help set the table during family meals. She aspires to continue developing her social, practical, and routine‑following skills so she can become
    a reliable, caring member of her community.
