    ''Project management'', ''Social media strategy'', ''Mental health first aid'', ''Fundraising and donor relations'']'
  hobbies: '[''Visiting art galleries and mural tours'', ''Salsa dancing'', ''Cooking traditional Mexican and fusion cuisine'', ''Hiking in the San Bernardino National Forest'', ''Yoga and mindfulness meditation'',
    ''Journaling'', ''Photography of community events'', ''Reading social‑justice literature'', ''Volunteering at community gardens'', ''Organizing pop‑up cultural events'']'
  career_goals: Angel aims to earn a bachelor's degree in Social Work or Public Administration within the next three years, followed by certification in trauma‑informed care. She envisions advancing to
    a director‑level role at a regional nonprofit focused on supporting immigrant youth and families, where she can institutionalize art‑based therapeutic programs. Long‑term, she hopes to influence county
    policy on equitable access to mental health and cultural services, and eventually launch her own community‑driven organization that combines social services with creative expression to foster resilience
    and empowerment.
