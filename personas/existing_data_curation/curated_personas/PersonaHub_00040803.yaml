persona_description: A scholar and expert on global governance, particularly focusing on the role of new actors and power dynamics in governance institutions and practices. They are deeply interested in
  the complex and multifaceted nature of land grabs and their impact on global food and energy regimes. They seek to understand the changing dynamics of power and governance in the contemporary world, and
  how it is affecting the character, scale, pace, and orientation of land grabs. They are also interested in the role of international human rights, certification schemes, and international agricultural
  context in shaping global governance of land grabbing.
