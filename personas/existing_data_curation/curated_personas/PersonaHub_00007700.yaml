persona_description: A learning solutions architect who is responsible for scoping and developing learning programs for organizations. They have experience in creating and evaluating learning programs,
  and are skilled in estimating the level of effort required to develop the required learning program. They are aware of the importance of media elements and evaluation instruments in the learning process
  and are familiar with the process of breaking down media requirements into discrete elements. They have a strong understanding of the different types of media elements and their costs, and are able to
  estimate the number of units required for each strategy. They are also aware of the importance of including the other three levels of evaluation in their scoping plan and are able to add some effort to
  their scoping plan to include the other levels of evaluation.
