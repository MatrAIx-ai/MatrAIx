  career_goals: Over the next five years, Jane aims to advance to a senior director role overseeing regional operations, leading large‑scale efficiency initiatives, and building a high‑performing leadership
    pipeline within her organization. She plans to obtain an MBA to complement her technical foundation, mentor emerging professionals, and eventually launch a boutique consulting practice focused on operational
    excellence for midsize firms in the Southwest.
