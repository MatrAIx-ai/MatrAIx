personas:
  professional: An operational leader with a STEM foundation, Jane Harbin drives cross‑functional efficiency by marrying data‑driven process optimization with a structured, yet adaptable, routine, and leverages
    their charismatic, talkative presence to rally teams and stakeholders toward regional senior‑director ambitions.
  sports: On weekends, Jane Harbin tackles the Sonoran Desert’s sunrise trail loops, joins the Scottsdale Women’s Golf Club for competitive rounds at Desert Springs Golf Course, cheers the Arizona Cardinals
    during football season, and they routinely fit a 30‑minute yoga stretch after each hike to keep their back from gardening‑induced strains.
  arts: Passionate about visual storytelling, Jane Harbin captures the stark beauty of Arizona’s mesas with a Nikon D850, draws inspiration from Ansel Adams and local photographer Chris McCarthy, curates
    a seasonal rotating exhibit of their prints at the Scottsdale Museum of Contemporary Art, and they unwind by listening to classic rock icons like Fleetwood Mac and modern indie folk artist Brandi Carlile.
  travel: Jane Harbin prefers meticulously planned road trips that blend business conferences with weekend escapes to iconic Southwest sites such as Sedona’s red rock formations, a glass‑blowing workshop
    in Santa Fe, and they keep a running list of overseas dreams like New Zealand’s Milford Track, though family responsibilities often condense travel to long‑holiday windows.
  culinary: Renowned among friends for hosting lavish dinner soirées, Jane Harbin expertly grills marinated flank steak with chipotle‑lime rub, whips up fresh guacamole with ripe avocados and prickly‑pear
    salsa, pairs dishes with a bold Tempranillo from Arizona’s Sonoita Vineyards, but they sometimes over‑salt their sauces when excited about entertaining a full house.
  core: Jane Harbin blends analytical precision with gregarious charm, living by routines that shepherd both desert hikes and bustling dinner parties, while occasionally trading well‑planned spreadsheets
    for spontaneous pastry indulgences.
background:
  cultural: Jane comes from a white, middle‑class Midwestern upbringing, where practicality and community were emphasized. After relocating to Scottsdale, she has blended her Midwestern work ethic with
    the relaxed, outdoors‑oriented lifestyle of the Southwest. She maintains family traditions such as holiday gatherings and community involvement, while embracing Arizona’s cultural diversity through
    local events, volunteer work, and regional cuisine.
