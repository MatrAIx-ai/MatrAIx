personas:
  professional: Amy Anzardo is a dynamic registered nurse who pairs solid clinical assessment, venous access, wound‑care expertise and emergency triage acumen with her spontaneous, people‑centered energy,
    using her calm under pressure to lead ad‑hoc multidisciplinary teams while juggling her plan to finish a BSN and earn an emergency‑care certification.
  sports: Amy Anzardo fuels her love for spontaneous fitness by joining pick‑up basketball games, hiking with the Defiance Trail Club, and cheering for the Cleveland Browns, Cleveland Cavaliers, and Columbus Blue Jackets
    whenever she can.
  arts: Amy Anzardo channels her creative spark into improvisational theater at the Gateway Playhouse, snapping candid photos of sunsets in the style of Ansel Adams, and vibing to live sets by The Lumineers
    and Phoebe Bridgers, often sharing playlists with friends after gigs.
  travel: Amy Anzardo prefers spontaneous, weekend‑style escapes, hitching rides to Hocking Hills, cruising the Lake Erie shoreline, and dreaming of a music‑laden road trip to Austin, Texas, all while balancing
    her modest student budget.
  culinary: Amy Anzardo’s kitchen experiments range from mastering Pad Thai with tamarind paste and fresh cilantro to baking pierogies stuffed with potato‑cheddar filling, always seasoning with a pinch
    of smoked paprika and documenting the process on Instagram.
  core: Amy Anzardo is a vibrant, curiosity‑driven nurse who thrives on spontaneous group fun, merges her clinical calm with a knack for last‑minute budgeting, and habitually forgets to renew prescriptions
    until the last minute.
background:
  cultural: Amy grew up in a mid‑Midwestern, predominantly white community in Defiance, Ohio, where values such as self‑reliance, modesty, and neighborly support are common. Her family emphasized hard work,
    community involvement, and a balance between tradition and openness to new ideas. These cultural influences have shaped her pragmatic outlook while encouraging a friendly, collaborative spirit that
    she brings to both her professional nursing practice and her social life.
attributes:
  skills: '[''Clinical assessment'', ''IV insertion and medication administration'', ''Wound care and dressing changes'', ''Patient education and health counseling'', ''Electronic health record (EHR) documentation'',
    ''Emergency triage and rapid decision-making'', ''Team coordination and shift handoff'', ''Stress management and coping strategies'', ''Conflict resolution'', ''Community health outreach'']'
  hobbies: '[''Hiking local trails'', ''Pick‑up basketball games'', ''Live music concerts'', ''Volunteering at community health fairs'', ''Improvisational theater'', ''Photography'', ''Cooking experimental
    recipes'']'
  career_goals: She aims to upgrade her credentials by completing a Bachelor of Science in Nursing within the next two years, followed by a certification in emergency or critical care nursing. Over the
    next five years, she envisions stepping into a charge nurse role, leading shift teams, and mentoring new nurses. Long‑term, Amy hopes to design a community wellness program in Defiance that offers preventive
    health workshops and mobile screening services, blending her curiosity for new health approaches with practical community needs.
