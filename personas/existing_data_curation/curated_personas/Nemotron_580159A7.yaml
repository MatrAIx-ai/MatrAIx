personas:
  professional: A budding multimedia designer and interactive artist, Luis Wheelock merges self‑taught graphic design with beginner Python scripts to craft immersive digital installations for school clubs,
    orchestrating projects with meticulous planning and a natural knack for rallying peers, and they thrive on turning abstract ideas into collaborative experiences.
  sports: A dedicated skateboarder who spends afternoons carving the Cupertino bike paths with the local Cupertino Skate Club, Luis Wheelock also follows the Golden State Warriors in basketball season and
    the San Jose Sharks in hockey, treating each session as both a workout and a creative outlet.
  arts: An avid explorer of contemporary art, Luis Wheelock spends weekends wandering galleries showcasing works by Banksy and Yayoi Kusama, while their acoustic guitar sessions echo the indie vibes of
    Tame Impala and The Strokes, and they often sketch urban skylines inspired by Wes Anderson’s color palettes.
  travel: A budget‑savvy teen explorer, Luis Wheelock plans weekend getaways to San Francisco’s street art districts and coastal hikes in Big Sur, while dreaming of an immersive trip to Berlin’s techno
    scene and Tokyo’s Shibuya crossing, balancing school commitments with a yearning for global cultural immersion.
  culinary: A moderately skilled home chef, Luis Wheelock whips up quick carne asada tacos, craftily layers avocado toast with smoked salmon, and occasionally experiments with spicy ramen broth infused
    with miso and chili oil, favoring fresh cilantro and lime as essential ingredients.
  core: Luis Wheelock is a 17‑year‑old sketch‑loving coder who juggles skateboarding, acoustic guitar, and a relentless stream of anxious thoughts, soothing them with meditation and meticulous project planning.
background:
  cultural: Luis grew up in the multicultural environment of Cupertino, a city known for its blend of tech-driven innovation and diverse communities. While his family identifies as white and holds middle-class
    values typical of suburban California—emphasizing education, self-reliance, and community involvement—he has been shaped by the region's emphasis on creativity, technology, and progressive social ideals.
    Exposure to a wide array of cultural festivals, international cuisine, and bilingual peers has broadened his appreciation for varied perspectives, fostering an open-minded outlook that influences both
    his artistic pursuits and his collaborative approach to projects.
