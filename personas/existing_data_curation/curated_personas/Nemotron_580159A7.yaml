  career_goals: Luis aspires to combine his artistic passion with technology by pursuing a career in multimedia production or interactive design. He envisions working for a creative agency or a tech company
    where he can develop immersive digital experiences, such as interactive installations, educational video content, or user-centered design projects. In the long term, he hopes to lead a creative team
    that blends storytelling, visual art, and emerging tech, while also advocating for mental health awareness and stress-management resources within the workplace to support peers facing similar emotional
    challenges.
