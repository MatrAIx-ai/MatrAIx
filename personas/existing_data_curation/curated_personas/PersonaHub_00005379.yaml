persona_description: A software engineer who specializes in the design, development, and programming of microprocessor-based computers and microcontrollers. He has a strong background in microprocessor
  architecture, operation, flow of digital signals, assembly programming, instruction sets, formats and addressing modes, input-output concepts, microprocessor arithmetic, and laboratory experience programming
  the Texas Instruments MSP430 16-bit microcontroller in assembly and in C. He is likely to be highly skilled in programming languages such as C and has a deep understanding of the Texas Instruments MSP430
  microcontroller. He is likely to have a passion for technology and a strong interest in the design and development of microprocessors.
