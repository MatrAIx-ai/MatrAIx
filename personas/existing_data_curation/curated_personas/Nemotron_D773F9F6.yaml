  career_goals: Stacy aims to transition into a leadership role where she can shape regional wildlife conservation strategies. In the next five years she plans to earn a Ph.D. in wildlife behavior, focusing
    on the impact of urban environments on native species. She envisions directing a wildlife rehabilitation center that integrates scientific research with community art programs to raise awareness. Long‑term,
    she hopes to establish a nonprofit sanctuary that offers both high‑quality animal care and immersive educational experiences, leveraging her creative skills to develop interactive exhibits and collaborative
    projects with local schools and artists.
