personas:
  professional: Stacy Harris, an experienced wildlife caretaker with a graduate background in animal physiology, blends meticulous record‑keeping and habitat design with a flair for creative outreach, using
    watercolor sketches and macro photography to educate school groups while steadily preparing for a Ph.D. in urban wildlife behavior.
  sports: Stacy Harris, a regular participant in the Huron River Trail Runners club, enjoys weekend hikes that double as bird‑watching expeditions, supports the Detroit Tigers and the Michigan Wolverines,
    and occasionally joins community pick‑up soccer games to stay active, balancing endurance training with mindful nature immersion.
  arts: Stacy Harris, an avid watercolorist and wildlife photographer, draws inspiration from Ansel Adams and the speculative worlds of Neil Gaiman, plays acoustic renditions of classic folk songs by Joan
    Baez on weekends, and volunteers backstage at the Ann Arbor Community Theater, where they also contribute set designs.
  travel: Stacy Harris, an intentional traveler who meticulously plans itineraries, prefers eco‑focused trips to national parks like Isle Royale and international destinations such as Costa Rica’s Monteverde
    Cloud Forest, but also squeezes spontaneous weekend getaways to nearby star‑gazing sites in the Upper Peninsula, balancing a modest travel budget with a passion for biodiversity exploration.
  culinary: Stacy Harris, a garden‑to‑table enthusiast, grows heirloom tomatoes, purple carrots, and heritage beans, enjoys crafting dishes like rosemary‑infused grilled vegetable medley and wild mushroom
    risotto using locally sourced mushrooms, and has a moderate skill level that shines during community potlucks where they share their homemade fermented pickles.
  core: Stacy Harris merges scientific rigor with artistic imagination, turning wildlife care into storytelling while juggling a disciplined budget, occasional health quirks, and a love for nature‑driven
    adventures.
background:
  cultural: Stacy grew up in the suburban setting of Lake Orion, Michigan, where Midwestern values of community service, modesty, and a strong connection to the natural environment shaped her worldview.
    Her family’s heritage traces back to German and Irish immigrants, and she celebrates a blend of traditions, from hearty Thanksgiving feasts to local Fourth of July fireworks by the lake. The region’s
    emphasis on outdoor recreation—fishing, boating, and seasonal festivals—instilled an early appreciation for wildlife and conservation. Attending a state university broadened her exposure to diverse
    cultures and scientific perspectives, reinforcing a collaborative and inclusive ethos that she now brings to her professional and personal endeavors.
