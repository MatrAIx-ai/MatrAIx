personas:
  professional: Jayne Mina, a budding visual storyteller, leverages their curiosity and methodical planning to create comic-style illustrations that blend watercolor textures with digital techniques, often
    collaborating with classmates on school art projects, and they consistently seek new artistic challenges.
  sports: Jayne Mina, a lively member of the Sunrise Soccer Academy and their middle-school varsity team, combines their love of group activity with weekend practices, cheers passionately for the San Antonio
    Spurs, and they incorporate hip-hop dance drills into their fitness routine to stay agile on the field.
  arts: Jayne Mina, an avid creator of comic-style characters, draws inspiration from Jim Lee's dynamic panels, Hayao Miyazaki's whimsical storytelling, Neil Gaiman's rich fantasy worlds, and the rhythmic
    beats of Bad Bunny and Maluma, and they channel these influences into both watercolor experiments and digital illustrations.
  travel: Jayne Mina, who loves to map out adventures with a colorful notebook, enjoys revisiting local gems like the Grand Canyon on family road trips, dreams of exploring the neon streets of Tokyo and
    the historic plazas of Barcelona, and they balance their curiosity with the practical constraints of school schedules and parental budgeting.
  culinary: Jayne Mina, a budding home-chef, alternates between mastering traditional tamales with masa, pork, and chilies and crafting golden-browned empanadas filled with cheese and spinach, using fresh
    cilantro, lime, and smoked paprika to enhance flavor, and they often share the meals with friends during after-school gatherings.
  core: Jayne Mina, a curious 12-year-old artist, balances a fierce love of comics with a notorious habit of leaving paintbrushes in the laundry basket, turning every day into a colorful quest for creativity,
    and they never miss a chance to sketch a new character during a break.
background:
  cultural: Jayne is raised in a vibrant Hispanic household in Homestead, Florida, where Spanish is spoken daily alongside English. Her family’s roots trace back to a mix of Central American and Caribbean
    ancestors, which gives her exposure to a blend of traditions such as celebrating Día de los Muertos, enjoying salsa and reggaetón music, and participating in community festivals that showcase Latin
    dance, food, and art. The multicultural atmosphere of Miami‑Dade County reinforces her appreciation for diversity, while her family's emphasis on community service and family gatherings shapes her sense
    of identity and responsibility.
attributes:
  skills: '["Hand drawing and painting", "Basic digital illustration (Procreate/Sketchbook)", "Scratch visual programming", "Introductory Python (Kids edition)", "Bilingual Spanish‑English communication",
