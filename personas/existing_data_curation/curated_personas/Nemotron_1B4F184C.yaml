  hobbies: '["Hand drawing and comic illustration", "Watercolor painting", "Digital art on tablet", "Reading fantasy and sci‑fi graphic novels", "Playing soccer", "Latin pop and hip‑hop dancing", "Cooking
    traditional Hispanic dishes with family", "Volunteering at the library’s art program"]'
  career_goals: Jayne dreams of a future where she can combine her love for art and technology to create visual stories that inspire others. She envisions studying graphic design, animation, or interactive
    media in college and eventually working as a multimedia artist or creative director. In the meantime, she hopes to earn a scholarship that lets her attend a specialized arts high school, deepen her
    coding skills, and develop a portfolio that showcases her cultural heritage. Long‑term, she also wants to mentor younger students in her community, helping them discover the power of creative expression
    and bilingual communication.
