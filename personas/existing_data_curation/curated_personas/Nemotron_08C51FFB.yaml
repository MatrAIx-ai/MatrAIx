personas:
  professional: Henry Wright, a budding builder who loves assembling block towers, balances curiosity with practicality by testing which designs stay upright while still inventing new structures, even as
    they resist the rigid schedules of preschool.
  sports: Henry Wright, an enthusiastic participant in the Little Cubs Soccer Club, frequently dribbles a mini soccer ball at the park, and as a tiny fan of the Chicago Cubs they proudly wear their cap
    while cheering during game‑day broadcasts.
  arts: Henry Wright, a joyous doodler who fills sketchbooks with crayon portraits of Olaf from Frozen and sings along to The Wiggles, finds comfort in the melodic storytelling of Disney movies and they
    often reenact scenes with their stuffed animals.
  travel: Henry Wright, a curious explorer who prefers short, parent‑guided outings, has delighted in weekend trips to the city aquarium and a family vacation to Walt Disney World, and they now dream of
    traveling to the giant redwoods of California for a nature‑filled adventure.
  culinary: Henry Wright, a picky yet adventurous eater who adores chicken nuggets, macaroni‑and‑cheese, and strawberry‑banana smoothies, and they proudly “cooks” by stirring cereal into milk, insisting
    on adding a dash of honey to every bite.
  core: Henry Wright, a curious yet anxious little builder who favors solitary play, competes silently with peers over block towers, and they secretly hoard crayons in their backpack for comfort.
background:
  cultural: Henry is raised in a typical middle‑class white family in Marietta, GA. His upbringing reflects Southern United States cultural influences, such as family BBQs, church‑related Sunday school,
    and celebrations of holidays like Thanksgiving, Christmas and the Fourth of July with community parades. Access to the Cobb County public library and local parks provides him with opportunities for
    early literacy and outdoor play. The neighborhood’s diverse yet predominantly suburban setting offers occasional exposure to various cultural traditions, subtly shaping his social awareness.
attributes:
  skills: '["Fine motor coordination", "Basic numeracy (counting to 20)", "Sorting and categorization", "Block building and spatial reasoning", "Cause-and-effect experimentation", "Self-dressing", "Following
    two-step instructions", "Competitive task completion"]'
  hobbies: '["Building with Duplo/LEGO", "Drawing and coloring vehicles and animals", "Backyard nature exploration (bug watching)", "Simple puzzles (jigsaw, shape sorting)", "Water play", "Watching educational
    cartoons (space, animals)", "Reading picture books", "Small-group building games"]'
  career_goals: Henry’s imagination is already forming future ambitions. He frequently talks about soaring in a plane, becoming a pilot or astronaut, and also dreams of helping animals as a veterinarian.
    He expresses a practical desire to "fix things" and keep people safe, hinting at a future firefighter or builder. His competitive nature fuels a wish to be the best at whatever role he chooses, while
    his cautious side worries about whether he can handle the responsibility, so he often asks adults how to prepare.
