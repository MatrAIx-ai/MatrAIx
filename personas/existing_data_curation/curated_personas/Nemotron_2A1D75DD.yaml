    "Electronic health record (EHR) management"]'
  hobbies: '["Gardening (vegetable and herb)", "Bird watching", "Reading historical fiction and biographies", "Knitting scarves and shawls", "Hiking local trails (Middlesex Fells)", "Yoga and mindfulness
    meditation", "Cooking seasonal, farm‑to‑table meals", "Participating in a small book club", "Volunteering at a community garden"]'
  career_goals: Looking ahead, Angela aims to transition into a senior leadership role within a regional addiction treatment network, where she can shape policies that improve access to care for older adults.
    She plans to develop a evidence‑based, age‑specific treatment program that integrates medical, psychological, and social support components. A longtime advocate for professional standards, she is pursuing
    Certified Addiction Counselor (CAC) credentialing and hopes to author a peer‑review article on the effectiveness of short‑term mindfulness interventions for clients with co‑occurring anxiety and substance
    use disorders. Angela also envisions mentoring a cohort of early‑career counselors through a structured fellowship, ensuring the next generation inherits her blend of scientific rigor and compassionate
    practice. Ultimately, she seeks to leave a lasting impact on the Massachusetts behavioral health system while maintaining a balanced lifestyle that safeguards her own wellbeing.
