personas:
  professional: Angela Murphy is a seasoned addiction counselor with two decades of experience designing evidence‑based treatment plans, whose methodical organization and reserved compassion enable her
    to lead intimate therapy groups while meticulously tracking outcomes, and whose practical curiosity drives her to integrate mindfulness techniques despite occasional self‑doubt.
  sports: Angela Murphy enjoys low‑impact fitness, trekking the Middlesex Fells trails and joining a senior walking club while faithfully cheering the Boston Red Sox and Boston Celtics, and she occasionally
    practices gentle yoga at a nearby community studio to balance her stress.
  arts: Angela Murphy indulges in historical fiction by authors such as Ken Follett and Hilary Mantel, knits scarves while listening to the Boston Symphony Orchestra’s performances of Vivaldi’s Four Seasons,
    and she regularly shares insights at a close‑knit book club of four friends.
  travel: Angela Murphy prefers purposeful travel, planning serene road trips to the leaf‑covered White Mountains and historic coastal towns like Cape Cod, visiting colonial sites such as Plymouth, and
    nurturing a longstanding curiosity about the historic monasteries of Greece, all while choosing modest inns that accommodate her need for quiet and careful budgeting.
  culinary: Angela Murphy crafts farm‑to‑table meals featuring New England clam chowder, roasted pumpkin soup, and apple crisp seasoned with garden‑grown sage and locally sourced honey, often pairing them
    with a crisp Sauvignon Blanc and occasionally hosting intimate dinner gatherings for family and close friends.
  core: Angela Murphy blends meticulous counseling expertise with a garden‑scented routine, balancing a penchant for data‑driven care and quiet mindfulness, while her worry‑prone heart finds solace in knitting,
    birdwatching, and a modest bench in her backyard.
background:
  cultural: Angela grew up in a middle‑class, New England family of Irish‑English ancestry, where education, self‑reliance, and community service were core values. Her upbringing in the Boston suburbs instilled
    a pragmatic worldview, coupled with an appreciation for the region's seasonal rhythms and historic heritage. While identifying as culturally white American, she is keenly aware of the diverse populations
    served in Massachusetts, and she integrates cultural humility into her counseling practice. Angela celebrates traditional holidays such as Thanksgiving and Independence Day, often incorporating communal
    meals and reflection. She maintains ties to her family's Methodist roots, which emphasize compassion and stewardship, though her personal spirituality is more eclectic, drawing on mindfulness and nature‑based
    perspectives. This blend of heritage, regional identity, and professional exposure informs her balanced approach to both personal life and client work.
attributes:
  skills: '["Motivational Interviewing", "Cognitive Behavioral Therapy (CBT)", "Dialectical Behavior Therapy basics", "Substance abuse assessment and diagnosis", "Case management and care coordination",
