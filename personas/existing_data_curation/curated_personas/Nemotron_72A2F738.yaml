  career_goals: Kevin aims to progress from his current compliance officer role to a senior compliance manager position within the next three years, eventually targeting a Chief Compliance Officer role
    at a mid‑size to large corporation. He is driven to shape enterprise‑wide compliance strategies that incorporate innovative technologies like AI‑driven monitoring tools. Additionally, Kevin aspires
    to mentor junior compliance professionals, contribute to industry standards committees, and balance his career advancement with a healthy family life in Norfolk.
