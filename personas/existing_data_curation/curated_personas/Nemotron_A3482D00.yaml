personas:
  professional: Mariela Nieto, a seasoned human‑resources leader with deep expertise in talent acquisition, employee wellness design, and strategic workforce planning, channels her curiosity and love of
    artistic expression into innovative, flexible policies that feel more like collaborative art projects than rigid procedures.
  sports: Mariela Nieto fuels her active lifestyle with weekly hikes on Cleveland National Forest trails as part of the Cleveland Trails Hiking Club, practices sunrise yoga in their backyard, and cheers
    on the Los Angeles Lakers in basketball season and the Anaheim Ducks during hockey, while occasionally joining a local adult volleyball league to stay socially fit.
  arts: Mariela Nieto immerses herself in creative pursuits, painting acrylic pieces that echo the bold colors of modern muralists, strumming acoustic guitar tunes inspired by folk traditions, and savoring
    evening listening sessions that range from John Coltrane’s saxophone improvisations to the hypnotic rhythms of Tinariwen.
  travel: Mariela Nieto favors loosely planned getaways that blend nature and culture, having trekked the red rocks of Sedona, savored coastal sunsets in Santa Barbara, explored the vineyards of Napa Valley,
    and dreaming of hiking the fjords of New Zealand’s South Island and wandering the historic temples of Kyoto on a future trip.
  culinary: Mariela Nieto, an enthusiastic home chef, masters both time‑honored family recipes—like smoky mole‑marinated chicken with ancho chilies and hand‑rolled corn masa dumplings—and inventive fusion
    experiments such as avocado‑lime quinoa bowls with roasted poblano and cilantro, all seasoned with fresh herbs from their succulents and garden.
  core: Mariela Nieto blends seasoned HR expertise with an artist’s curiosity, turning boardroom strategies into flexible, culture‑rich experiences, while habitually juggling a thriving garden, a half‑finished
    acrylic canvas, and an ever‑growing list of weekend hikes.
background:
  cultural: Mariela is a first‑generation Mexican‑American who spent her early childhood in a small town near Guadalajara before moving to California as a teenager. She grew up bilingual, immersed in Mexican
    family traditions such as celebrating Día de los Muertos, sharing meals of mole and tamales, and attending local church festivals. In Orange County, she maintains strong ties to the Mexican diaspora,
    participating in community events and supporting cultural preservation initiatives. Her cultural identity informs her approach to HR, emphasizing respect for family obligations, collective well‑being,
    and inclusive communication. While she honors her Mexican heritage, she also embraces the multicultural milieu of Southern California, incorporating diverse perspectives into both her personal life
    and professional practice.
