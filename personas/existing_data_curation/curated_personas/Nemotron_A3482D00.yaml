  career_goals: Mariela aims to advance to a senior HR leadership role, such as HR Director or Vice President of People, where she can shape company culture through inclusive and creative policies. She
    seeks to champion flexible work arrangements and integrate arts-based employee engagement initiatives that boost morale and creativity. Over the next five years, she plans to obtain the SHRM-SCP certification,
    lead a company-wide diversity and inclusion program, and mentor emerging HR professionals, especially those from underrepresented backgrounds. In the longer term, she envisions launching her own boutique
    HR consultancy focused on helping small businesses in Orange County develop culturally responsive talent strategies.
