personas:
  professional: Mohammad Miller blends a Class A CDL driving career with a flair for visual storytelling, using their knack for logistics and sales to propose art‑themed delivery routes while juggling flexible
    schedules that often leave paperwork in the back of the truck.
  sports: Mohammad Miller is a regular on the community basketball league and joins a weekend ultimate frisbee team, while they proudly root for the Chicago Bulls in the NBA and the Chicago White Sox in
    MLB, often tailgating with teammates after games.
  arts: Mohammad Miller spends weekends wandering regional galleries, sketching cityscapes in a battered Moleskine, and experimenting with digital photography, drawing inspiration from artists like Banksy,
    photographer Annie Leibovitz, and indie musician Bon Iver.
  travel: Mohammad Miller prefers spontaneous road trips that blend scenic drives through the Southwest with stops at off‑beat art festivals, having already toured Austin, New Orleans, and Santa Fe, and
    they dream of a future photo‑expedition to Barcelona and Kyoto.
  culinary: Mohammad Miller enjoys cooking Middle Eastern dishes like falafel, hummus, and shakshuka, mixing them with occasional Thai pad thai experiments, and they consider themselves a competent home
    chef who loves sourcing fresh herbs and spices at farmer’s markets.
  core: Mohammad Miller navigates life with a truck‑full of curiosity, an ever‑growing stack of unfinished sketches, a habit of overcommitting to group outings, and a chronic tendency to forget to pay the
    parking ticket until it’s too late.
background:
  cultural: Mohammad grew up in Manhattan, Kansas, a small Midwestern town with a predominantly white community, but his family’s name reflects a multicultural heritage that has exposed him to a blend of
    traditions. While he identifies with classic Midwestern values such as friendliness, hard work, and community involvement, he also embraces cultural curiosity, celebrating holidays like Thanksgiving,
    Christmas, and occasionally Ramadan with his extended family. This mixed cultural backdrop nurtured an appreciation for diverse art, music, and cuisine, and encouraged him to stay open‑minded and inclusive
    in his social circles.
attributes:
  skills: '["Commercial Driving (Class A CDL)", "Vehicle Maintenance & Safety Inspection", "Customer Service & Sales", "Negotiation & Persuasion", "Route Planning & GPS Navigation", "Fleet Management Software",
