  hobbies: '["Sketching and Drawing", "Digital Photography", "Visiting Art Galleries", "Playing Basketball", "Ultimate Frisbee", "Attending Music Festivals", "Cooking International Cuisine", "Listening
    to Creative Podcasts", "Volunteer Delivery Driving"]'
  career_goals: Mohammad aims to advance from driver‑sales work to a supervisory position in logistics, eventually earning a logistics‑manager certification and overseeing a fleet of trucks. He envisions
    starting his own small transportation business that could also serve as a mobile platform for showcasing local arts, merging his love for art with his profession. To support these goals, he plans to
    enroll in a community‑college program in supply‑chain management and acquire additional endorsements on his CDL, such as hazardous‑materials and tank‑vehicle certifications. He also hopes to build a
    network of fellow drivers and artists, creating partnerships that promote community events and charitable deliveries.
