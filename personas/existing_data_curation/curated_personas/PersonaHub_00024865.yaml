persona_description: A teacher who is passionate about improving students' English language skills through hands-on activities and practical resources. The teacher has experience in using tactile and kinesthetic
  resources in the classroom to enhance students' spelling ability and pronunciation awareness. They are also skilled in motivating students to learn and in conducting action research to improve their teaching
  methods. The teacher's research interests include the impact of tactile and kinesthetic resources on students' readiness in starting the lesson and their activeness during teaching and learning process.
