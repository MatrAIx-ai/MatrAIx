  career_goals: Gipsy aims to launch her own boutique detective agency in Charlotte that specializes in corporate fraud, cybercrime, and missing‑person cases, leveraging her curiosity for new ideas and
    her competitive drive. She plans to earn the Certified Professional Investigator (CPI) credential and pursue advanced cyber‑forensics certification. Long‑term, she hopes to author a memoir detailing
    her most challenging investigations, become a sought‑after speaker at national security and law‑enforcement conferences, and mentor emerging women investigators while maintaining a healthy work‑life
    balance that mitigates her natural tendency toward worry and stress.
