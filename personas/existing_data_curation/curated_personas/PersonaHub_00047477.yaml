persona_description: A highly educated and informed Australian who is passionate about science and technology. This person is likely to be a scientist, technologist, or policy-maker who is actively involved
  in the scientific community and the development of technological advancements in Australia. They are likely to have a strong sense of national identity and pride in Australia's achievements in science
  and technology, and are concerned about the potential negative impacts of technological change on the distribution of benefits. This person is likely to be aware of the challenges and limitations of expressing
  support for science within the context of revealed preferences and economic considerations, and is likely to be actively engaged in efforts to maintain public confidence in science and its role in informing
  public debate and policymaking.
