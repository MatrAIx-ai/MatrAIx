personas:
  professional: Angel Villegas, a seasoned retail cashier with expertise in cash handling, POS systems, and bilingual customer service, leverages their methodical organization and compassionate demeanor
    to train new staff, and they aim for a supervisory role while planning to earn a retail management certification.
  sports: Angel Villegas, an enthusiastic fan of the Los Angeles Dodgers and the LA Galaxy, attends weekend games when possible, participates in a church‑organized walking club that meets thrice weekly,
    and occasionally joins a local recreational volleyball league, reflecting their preference for team spirit and moderate physical activity, and they feel most energized after a group walk.
  arts: Angel Villegas, who finds solace in listening to the emotive ballads of Juan Gabriel and the vibrant rhythms of Carlos Santana, attends monthly community theater performances featuring classics
    like *West Side Story*, enjoys reading romance novels by Nora Roberts, and they integrate these artistic experiences into their social gatherings.
  travel: Angel Villegas, who prefers meticulously planned trips that blend cultural immersion with relaxation, has explored the historic markets of Oaxaca, the coastal charm of Puerto Vallarta, and European
    cities such as Barcelona and Seville, while dreaming of a future pilgrimage to the basilica in Lourdes, all while budgeting travel expenses to accommodate family obligations.
  culinary: Angel Villegas, an adept home cook, specializes in crafting tamales with masa and pork filling, simmering complex mole sauce using dried chilies, chocolate, and spices, and experimenting with
    garden‑fresh herbs like cilantro and epazote, often sharing these dishes at neighborhood potlucks, and they hope to turn the catering side‑business into a reliable source of supplemental income.
  core: Angel Villegas merges meticulous retail expertise with warm community spirit, channels stress into organized cooking and volunteering, and balances cautious financial planning with a love for lively
    music and cultural travel, all while they remain vigilant about maintaining personal well‑being.
background:
  cultural: Angel is a first-generation Mexican-American whose family roots trace back to the state of Jalisco. Growing up in a bilingual household, she speaks fluent Spanish and English, and her daily
    life blends Mexican traditions with Southern hospitality. She celebrates holidays such as Día de los Muertos and Cinco de Mayo with family gatherings, traditional foods, and vibrant music, while also
    partaking in local Southern customs like barbecue cookouts and community parades. Her Catholic faith, inherited from her family, shapes her values of compassion and service. Living in Columbia, SC,
    Angel engages with a diverse community, often bridging cultural gaps through her warm personality and bilingual communication skills.
attributes:
  skills: '[''Cash handling and register reconciliation'', ''POS system operation (multiple platforms)'', ''Customer service and conflict resolution'', ''Inventory tracking and restocking'', ''Shift scheduling
    and organizational planning'', ''Bilingual communication (Spanish/English)'', ''Staff training and mentorship'', ''Community event coordination'']'
  hobbies: '[''Cooking Mexican cuisine'', ''Participating in church choir and service projects'', ''Gardening (vegetable and herb gardening)'', ''Dancing to regional Mexican music'', ''Attending cultural
    festivals'', ''Reading romance novels'', ''Volunteering at community food bank'']'
  career_goals: Angel aims to advance to a supervisory or assistant manager position within the retail sector, leveraging her organizational strengths and bilingual abilities to lead a team and improve
    store operations. She plans to obtain a retail management certification or complete an associate degree in business administration to solidify her credentials. Additionally, she aspires to develop a
    side venture offering Mexican culinary catering for local events, integrating her cultural heritage and passion for community service. A long-term goal is to achieve financial stability that allows
    her to support her extended family and reduce work‑related stress, while also pursuing opportunities for personal growth and stress‑management training.
