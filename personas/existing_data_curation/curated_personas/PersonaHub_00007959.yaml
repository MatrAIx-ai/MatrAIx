persona_description: A materials scientist specializing in wood and plant fiber processing, with a focus on the chemistry and processing of wood and plant fibrous materials. They are knowledgeable in the
  extraction, processing, and utilization of wood and plant fibers for various applications such as construction, furniture, and packaging. They have experience in the development of new wood and plant
  fiber-based materials and processes. They are also skilled in the use of advanced analytical techniques such as direct AMS and carbon dating to identify and evaluate the quality of wood and plant fibers.
