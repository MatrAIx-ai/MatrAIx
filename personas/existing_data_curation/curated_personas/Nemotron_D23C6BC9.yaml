  hobbies: '[''Hiking'', ''Cycling'', ''Photography'', ''Cooking experimental dishes'', ''Reading science and social‑justice books'', ''Attending tech meetups'', ''Volunteering at community garden'', ''Yoga'',
    ''Board games'', ''Learning new programming libraries'']'
  career_goals: Ellen aims to become a leading program director for a regional nonprofit or government agency that creates evidence‑based services for marginalized communities in the Sacramento area. She
    plans to pursue a Master’s in Public Health or Social Work to deepen her knowledge of health equity and policy, and to obtain certification in mental health first aid. Over the next five years, she
    hopes to secure larger grant funding, implement a data‑driven community health initiative that reduces barriers to care, and mentor junior staff on integrating analytical tools with community outreach.
    Long‑term, she envisions influencing local policy to embed data‑informed decision‑making into all municipal social service programs.
