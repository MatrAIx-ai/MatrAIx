personas:
  professional: Ellen Somers, a data‑driven community development analyst in Sacramento, blends her expertise in GIS mapping, statistical modeling, and grant writing with a compassionate, assertive style
    to design evidence‑based programs that serve marginalized neighborhoods while juggling a habit of double‑checking every spreadsheet before coffee.
  sports: Ellen Somers cycles the American River Trail several times a week, hikes the Sierra foothills on weekends, and cheers for the Sacramento Republic FC while also playing on a local co‑ed soccer
    league team affiliated with the community garden, embodying her love for both solo outdoor fitness and team camaraderie.
  arts: Ellen Somers captures sunrise landscapes with a DSLR inspired by Ansel Adams, listens to indie folk bands like Fleet Foxes and Bon Iver, attends performances at B Street Theatre, and hosts board‑game
    nights featuring Catan and Ticket to Ride, weaving creative expression into her social routine.
  travel: Ellen Somers prefers budget‑friendly adventure trips, having explored Yosemite, the San Juan Islands, and a food‑focused weekend in Mexico City, while planning a future pilgrimage to Kyoto’s temples,
    balancing careful itinerary planning with spontaneous detours for local hikes.
  culinary: Ellen Somers enjoys experimental cooking, frequently whipping up miso‑glazed salmon, mole poblano, and fermented kimchi using fresh farmer’s‑market produce, and experiments with sous‑vide techniques,
    though she often forgets to label leftovers, leading to occasional culinary mishaps.
  core: Ellen Somers is a curiosity‑driven data analyst with a habit of photographing clouds, an obsessive spreadsheet checker, and a love for hiking that sometimes turns into a shoe‑shopping spree.
background:
  cultural: Ellen is a White American raised in a middle‑class family on the outskirts of Sacramento. Her parents, of mixed Irish and English ancestry, emphasized education, civic responsibility, and environmental
    stewardship. Growing up in California’s diverse cultural milieu, she was exposed to a wide range of traditions and perspectives, which fostered her respect for cultural diversity and inclusion. Her
    family’s involvement in local volunteer projects and community events nurtured her early interest in service. Ellen’s cultural identity is shaped by a blend of traditional Mid‑western values—hard work,
    reliability, and modesty—and the progressive, multicultural ethos of the Bay and Sacramento regions, informing her commitment to equitable, data‑driven community development.
