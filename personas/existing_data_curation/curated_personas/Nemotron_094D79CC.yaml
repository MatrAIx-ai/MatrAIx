  career_goals: Pedro aims to obtain his Professional Engineer (PE) license within the next three years and advance to a senior project engineer role where he can lead multimillion‑dollar infrastructure
    projects in upstate New York. He is motivated to specialize in sustainable design and smart‑city infrastructure, eventually founding his own consultancy that blends cutting‑edge engineering with practical,
    cost‑effective solutions for municipal clients. His competitive nature fuels a desire to be recognized as a top performer in his firm and to mentor junior engineers, fostering a high‑performing team
    environment.
