  hobbies: '[''basketball'', ''soccer'', ''theater improv'', ''DIY electronics kits'', ''photography'', ''mystery novels'', ''competitive video gaming'', ''creating TikTok videos'', ''hiking'', ''baking'']'
  career_goals: Teresa wants to explore career paths that blend her love of people, competition, and curiosity. She envisions herself as a future science communicator or tech-savvy journalist who can turn
    complex ideas into exciting stories for her peers, perhaps through a YouTube channel or a high-school newspaper. She also dreams of staying active in sports, aiming to play varsity basketball and eventually
    coach or mentor younger players. In the longer term, she hopes to study communications, media production, or engineering at a university, using her practical mindset to create projects that both entertain
    and solve everyday problems.
