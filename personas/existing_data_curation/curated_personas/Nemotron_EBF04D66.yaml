personas:
  professional: Teresa Lett, an aspiring teen technologist and varsity athlete, blends their curiosity for DIY electronics with the practical discipline of basketball and soccer, channeling a competitive
    edge into leading the school robotics club while they often skim over deadlines due to spontaneous habits.
  sports: Teresa Lett, a point guard on the Findlay High School varsity basketball team and a midfielder for the Buckeye United Soccer Club, trains five days a week with a competitive mindset, idolizes
    the Cleveland Cavaliers, Browns, and Guardians, and they spend weekends cheering at local games or hiking with teammates at Hocking Hills.
  arts: Teresa Lett, an improv enthusiast in the school drama club who films TikTok skits and captures sunrise shots at Riverside Park, draws creative inspiration from Taylor Swift’s storytelling, Billie
    Eilish’s moody aesthetics, and the cinematic flair of Marvel films, while they occasionally binge‑watch the sitcom 'Brooklyn Nine‑Nine' for comedic timing.
  travel: Teresa Lett, who dreams of spontaneous weekend road trips, often explores nearby Cedar Point and Hocking Hills with friends, has visited Chicago’s Navy Pier and Washington, D.C.’s museums on school
    field trips, and they look forward to attending a regional Oktoberfest celebration that showcases traditional music and bratwurst, preferring group travel that balances adventure with affordable stays
    in youth hostels.
  culinary: Teresa Lett, an eager home‑chef who experiments with TikTok food hacks, regularly bakes chocolate chip cookies and perfects a tangy sauerkraut‑and‑sausage skillet, mixes classic American BBQ
    ribs with a seasonal apple‑cinnamon crumble, and they can whip up a quick Irish‑style shepherd’s pie using ground beef, potatoes, and carrots for family gatherings.
  core: Teresa Lett, a hyper‑social, curiosity‑driven 13‑year‑old who juggles varsity sports, tech tinkering, and TikTok fame, they burst with spontaneous energy but often struggle to keep their schedule
    tidy.
background:
  cultural: Teresa comes from a white, Midwestern family in Findlay, Ohio, where community ties and small-town traditions shape everyday life. Her upbringing includes participation in church youth groups,
    weekend family barbecues, and local events such as the Hancock County Fair. The region's emphasis on public-school sports, volunteerism, and hands-on learning influences her practical curiosity and
    love of group activities. While she enjoys classic American holidays like Thanksgiving and the Fourth of July, she also carries traces of her family's German-Irish heritage through occasional cultural
    foods and storytelling.
