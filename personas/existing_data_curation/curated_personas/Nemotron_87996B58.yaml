personas:
  professional: Charles Dunbar, a 12‑year‑old robotics club member, blends his curiosity for new tech with a methodical, organized approach to building simple programmable robots and already envisions designing
    autonomous drones for marine rescue missions.
  sports: Charles Dunbar, an energetic 12‑year‑old, plays point guard for his Middle School Eagles basketball squad, practices swimming drills with the Gulf Coast Aquatics Club where he models his stroke
    technique after Olympic champion Michael Phelps, and enjoys weekend fishing trips that echo the traditions of the New Orleans Pelicans’ community outreach, all while rooting for the Houston Rockets
    as his favorite NBA team.
  arts: Charles Dunbar, a creative 12‑year‑old, channels his love for rhythm through hip‑hop routines inspired by the choreography of Jabbawockeez, devours adventure classics like Jules Verne’s 'Around
    the World in 80 Days' and the graphic novel 'Bone', and spends evenings programming whimsical story‑driven games on Scratch, often borrowing musical motifs from Kendrick Lamar’s beats.
  travel: Charles Dunbar, who eagerly anticipates summer, prefers family‑oriented road trips that blend relaxed fishing on the Gulf’s mangrove waterways with brief detours to explore nearby wildlife reserves
    such as Everglades National Park, but dreams of saving enough allowance to one day visit the coral reefs of the Bahamas and the historic streets of New Orleans.
  culinary: Charles Dunbar, a budding home chef, loves the fresh taste of grilled snapper seasoned with garlic and lemon from his family’s Gulf fishing trips, delights in assembling simple fish tacos with
    cilantro, lime, and crunchy slaw, and hones his baking skills by perfecting chocolate chip cookies at the church’s community kitchen, though he often forgets to set timers, resulting in occasional over‑baked
    treats.
  core: Charles Dunbar, a calm and methodical 12‑year‑old who balances his love for robotics, basketball, and community service with a disciplined allowance budget and a penchant for over‑baking cookies,
    embodies a curious yet practical worldview that fuels his resilient, outgoing spirit.
background:
  cultural: Charles is an African‑American youth raised in Gulfport, Mississippi. His family blends Southern coastal traditions with African‑American cultural practices, emphasizing church participation,
    community solidarity, and education. He grows up hearing stories of the civil‑rights movement, celebrates holidays such as Juneteenth, and enjoys regional foods like shrimp and grits. His social circles
    include school friends, church youth groups, and neighbors who share a love for the Gulf’s natural environment. This combination of Southern hospitality, maritime life, and African‑American heritage
    shapes his values of resilience, cooperation, and giving back to his community.
