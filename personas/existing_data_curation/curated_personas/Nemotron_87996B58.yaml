  career_goals: Charles envisions pursuing a career that combines his love for the ocean and his knack for problem‑solving. He hopes to study marine biology or environmental engineering in college, aiming
    to work on coastal conservation projects that protect Gulf ecosystems. He also aspires to stay connected to his community, perhaps by volunteering as a mentor for middle‑school STEM clubs or by teaching
    science outreach programs.
