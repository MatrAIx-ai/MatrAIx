  hobbies: '[''Target shooting'', ''Fishing'', ''Weight training'', ''Hiking'', ''Reading true-crime books'', ''Participating in tribal powwows'', ''Traditional drumming'', ''Crafting Native art'', ''Playing
    strategic video games'']'
  career_goals: Dean aims to advance into a supervisory role within casino security, targeting a surveillance manager position in the next three years. He plans to earn certifications such as Certified
    Protection Officer and a Texas private investigator license, and to complete an associate degree in security management. His competitive drive pushes him to lead a team, mentor new officers, and eventually
    oversee security operations across multiple locations, ensuring stable income for his family and continued professional growth.
