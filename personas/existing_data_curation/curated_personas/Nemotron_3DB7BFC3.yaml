personas:
  professional: Tonya Penn is a senior HR strategist who blends analytical rigor with artistic imagination to craft inclusive talent programs, leveraging HRIS data and DEI frameworks while mentoring emerging
    professionals, and she consistently channels her organized, compassionate nature into building harmonious workplace cultures.
  sports: Tonya Penn enjoys a weekly yoga practice, participates in the Atlanta Women’s Running Club’s Saturday 5K runs during spring, plays recreational tennis at the local community center in summer,
    and roots for the Atlanta Falcons and the Atlanta Hawks, embodying a balanced, community‑focused fitness lifestyle.
  arts: Tonya Penn paints abstract canvases inspired by exhibitions at the High Museum of Art, reads philosophy from Simone de Beauvoir and modern fiction by Toni Morrison, attends performances of August
    Wilson’s plays at the Alliance Theatre, and curates playlists featuring John Coltrane, Erykah Badu, and OutKast, letting creative expression color her personal and professional life.
  travel: Tonya Penn plans purposeful trips to cultural festivals such as the New Orleans Jazz & Heritage Festival, Ghana’s Chale Wote Street Art Festival, and the Caribbean Carnival in Trinidad, mixing
    structured itineraries with spontaneous explore‑sessions, while also taking weekend escapes to Asheville’s art scene, balancing adventure with family commitments.
  culinary: Tonya Penn delights in fusion Southern cuisine, often preparing shrimp and grits with miso glaze and collard greens with kimchi, relishes dishes like sweet potato pie with ginger, enjoys cooking
    with smoked paprika, harissa, and fresh okra, and frequents Atlanta’s Staplehouse for innovative dining experiences.
  core: Tonya Penn blends analytical HR expertise with artistic flair, budgets meticulously yet splurges on creative passions, monitors health with disciplined mindfulness, stays active through yoga and
    community runs, and constantly curates a soundtrack of jazz, neo‑soul, and hip‑hop while humming in the kitchen.
background:
  cultural: Tonya was raised in Atlanta’s vibrant Black community, absorbing the city’s rich legacy of the Civil Rights Movement, Southern Gospel, and the flourishing arts scene of the historically Black
    neighborhoods. Her family traditions blend Southern soul food, church fellowship, and storytelling, while her professional life is informed by the city’s emphasis on entrepreneurship and community uplift.
    She identifies with the African-American experience of resilience and collective progress, celebrates Juneteenth and Black History Month with community events, and draws inspiration from the music of
    Atlanta’s hip‑hop and R&B icons. This cultural tapestry shapes her values of harmony, compassion, and a commitment to fostering opportunities for the next generation.
