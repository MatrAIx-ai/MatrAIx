  career_goals: Tonya aspires to progress into a senior leadership role, such as HR Director or Chief Human Resources Officer, within a mid- to large-size organization that values innovation and inclusivity.
    She aims to shape a culture of continuous learning and creative problem-solving, champion groundbreaking DEI programs that lift underrepresented talent, and integrate advanced HR technologies to enhance
    employee experience. She also envisions mentoring emerging HR professionals, especially women of color, and establishing community partnership pipelines that connect local educational institutions with
    corporate talent pipelines in Atlanta.
