persona_description: A mechatronics researcher and technologist who specializes in the development and application of automated systems in agriculture. He is known for leading the world-first Hands Free
  Hectare project at Harper Adams University and Precision Decisions, which aims to demonstrate that automated farming can be done without operators on the machines and agronomists in the field. He has
  presented his research at international conferences and has received funding from the AHDB and the continued support of industry sponsors. His work has attracted global attention and has been recognized
  for its innovative approach to automation in agriculture.
