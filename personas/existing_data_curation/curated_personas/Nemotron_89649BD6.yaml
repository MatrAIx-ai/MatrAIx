personas:
  professional: Lucy Gallagher is a budding junior explorer who blends curiosity about science with practical LEGO engineering, often designing mini experiments while sketching animal habitats, yet frequently
    loses track of her project timelines.
  sports: Lucy Gallagher powers through weekend matches with the Riverdale Rovers youth soccer team, cheering for the local professional squad, the Metro City Falcons, while also enjoying spontaneous kick‑about
    games at the neighborhood park.
  arts: Lucy Gallagher fills sketchbooks with detailed animal drawings inspired by National Geographic Kids and draws parallels to the whimsical storytelling of Roald Dahl, often humming the soundtrack
    of Disney's 'Moana' while building LEGO castles.
  travel: Lucy Gallagher loves exploring nearby creek trails in Willowbrook Park and dreams of camping in Yellowstone National Park, balancing spontaneous day trips with the careful planning of Girl Scouts
    badge trips to the state museum.
  culinary: Lucy Gallagher delights in baking chocolate chip cookies with her mother, perfecting the crumbly texture by adding a pinch of sea salt, and enjoys munching on dinosaur‑shaped chicken nuggets
    and carrot sticks during snack time.
  core: Lucy Gallagher is a curious, spontaneous nine‑year‑old who toggles between LEGO construction and cookie baking, often forgetting deadlines but always ready for the next adventure.
background:
  cultural: Lucy is raised in a predominantly white, middle‑class suburban community in Savage, Maryland. Her family has Irish‑American roots, which are celebrated through occasional traditions like St.
    Patrick’s Day, while she also participates in broader American customs such as Fourth of July fireworks and school multicultural events. She attends a public elementary school where she experiences
    a diverse peer group, shaping a balanced cultural perspective.
