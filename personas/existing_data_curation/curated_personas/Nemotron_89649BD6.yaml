  career_goals: Lucy dreams of exploring the natural world as a future veterinarian or wildlife biologist, hoping to combine her love for animals with her curiosity about science. She also imagines writing
    a children's book about animals and nature, and wants to contribute to her community by sharing knowledge and caring for local wildlife.
