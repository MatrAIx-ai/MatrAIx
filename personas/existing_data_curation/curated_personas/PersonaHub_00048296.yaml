persona_description: A researcher and scientist who specializes in the study of wildlife, particularly the Eurasian otter (Lutra lutra). The individual is experienced in non-invasive genetic methods, specifically
  the use of microsatellite genotyping and genetic mark-recapture techniques. They have conducted previous research on the otter population dynamics, including the collection and analysis of faecal samples,
  and have published several papers on the topic. The persona is knowledgeable about the otter's preferred habitats and future dispersal routes, and has developed a spatio-temporal dispersal model for Saxony
  using available distribution and land use data. The individual is also skilled in creating and applying a road map for non-invasive genetic CMR, as demonstrated in previous research.
