  career_goals: Even at five, Jeffrey imagines himself in roles that combine order, service, and helping others. He often says he wants to be a firefighter because the job follows clear procedures and protects
    the community. He also dreams of becoming a teacher or a park ranger, where he can keep things organized and ensure safety for children and animals. His ultimate ambition is to have a career where he
    can maintain structure while caring for people.
