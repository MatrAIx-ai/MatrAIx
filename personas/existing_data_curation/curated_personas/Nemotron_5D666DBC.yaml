personas:
  professional: Vernon Shiplett, a retired hospital maintenance supervisor, channels their decades of hands‑on expertise in electrical wiring, plumbing, and HVAC into becoming the neighborhood’s dependable
    handyman, applying their methodical yet flexible problem‑solving style while savoring the quiet pride of fixing small projects rather than pursuing high‑visibility leadership roles.
  sports: Vernon Shiplett follows the Carolina Panthers and the South Carolina Gamecocks with steady loyalty, attends occasional Columbia Fireflies baseball games, and stays active by fishing on Lake Murray
    and participating in the Lake Murray Senior Walking Club’s gentle morning walks, preferring low‑intensity, small‑group fitness over competitive sports.
  arts: Vernon Shiplett enjoys classic black‑and‑white cinema such as "Casablanca" and "The Grapes of Wrath," immerses themselves in the music of Willie Nelson, Dolly Parton, and Bill Monroe, and reads
    Southern literary staples by Harper Lee and William Faulkner, allowing these artistic traditions to shape their reflective evenings and inspire their woodworking designs.
  travel: Vernon Shiplett prefers low‑stress, well‑planned trips that balance family visits and modest adventure, having enjoyed weekend drives to historic Charleston and Asheville and a leisurely cruise
    to Savannah, while dreaming of a guided tour of Washington, D.C.’s monuments and a relaxed fishing lodge stay in the Florida Keys, all within a budget that keeps their retirement savings intact.
  culinary: Vernon Shiplett delights in cooking with garden‑fresh tomatoes, peppers, and herbs, frequently preparing shrimp and grits, fried green tomatoes, and a slow‑cooked pork barbecue served with collard
    greens and peach cobbler, showcasing a competent home‑cook level that blends practical skill with a love for time‑honored flavors and seasonal ingredients that they often share at family gatherings.
  core: Vernon Shiplett is a pragmatic, hands‑on mentor who blends structured problem‑solving with a relaxed, improvisational approach to life, sprinkling their days with gardening, fishing, and classic
    car polishing while quietly anchoring their community with reliable expertise and occasional stubbornness about routine.
background:
  cultural: Vernon grew up in Columbia, South Carolina, in a working‑class white family with deep Southern roots. Raised in a Methodist household, church participation and community service were integral
    parts of his upbringing. The regional values of hospitality, respect for tradition, and a strong sense of duty shaped his pragmatic, no‑nonsense outlook. His formative years spanned the civil‑rights
    era and a shift in the local economy from agriculture to manufacturing, reinforcing a practical, adaptable mindset. Vernon embraces Southern culinary traditions, enjoys local festivals, and maintains
    close ties with family across the state, reflecting the cultural continuity of his community.
