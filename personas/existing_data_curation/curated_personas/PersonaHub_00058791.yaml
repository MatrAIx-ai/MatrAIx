persona_description: A medical researcher who specializes in the study of child development, particularly in the field of trauma and injury. Their research interests include the patterns and causes of physical
  and sexual abuse in children, as well as the long-term effects of these injuries on the physical and mental health of children. They are interested in using statistical data and case studies to better
  understand the prevalence and distribution of physical and sexual abuse in children, as well as the factors that contribute to the occurrence of these injuries. They are also interested in exploring the
  link between physical and sexual abuse in the domestic setting and the potential for child death.
