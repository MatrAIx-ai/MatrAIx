  career_goals: Azad is driven to ascend to senior leadership within operations. Over the next five years, he aims to secure a Director of Operations role where he can spearhead enterprise‑wide transformation
    projects that embed automation and data‑driven decision‑making. He plans to earn a Lean Six Sigma Black Belt and pursue an executive MBA to complement his technical expertise with strategic acumen.
    Long‑term, Azad dreams of launching his own consultancy focused on sustainable, technology‑enabled operational excellence for mid‑market manufacturers, leveraging his competitive edge to build a reputation
    for delivering measurable performance gains.
