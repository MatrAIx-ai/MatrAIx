  career_goals: Bryan aims to move into a senior operations leadership role where he can shape strategic initiatives and mentor junior staff. He seeks to deepen his expertise in organizational design and
    digital transformation, eventually becoming a chief operating officer in a mid‑size technology firm. His long‑term ambition includes developing a structured mentorship program that promotes collaboration
    and well‑being, reflecting his commitment to harmony and support for colleagues while maintaining high performance standards.
