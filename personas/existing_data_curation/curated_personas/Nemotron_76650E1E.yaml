  hobbies: '[''Watercolor painting'', ''Photography'', ''Reading speculative fiction'', ''Improvisational theater'', ''Strategic board games (e.g., Settlers of Catan, Pandemic)'', ''Hiking in Connecticut
    state parks'', ''Cooking experimental recipes'', ''Volunteer tutoring at community centre'', ''Attending live music concerts'', ''Exploring local art galleries and museums'']'
  career_goals: Cassandra aims to earn her Certified Public Accountant (CPA) license within the next three years while completing a bachelor's degree in accounting. She envisions transitioning from an accounting
    clerk to a senior accountant or audit supervisor, eventually leading a finance team. Driven by her love of novelty and the arts, she hopes to specialize in financial management for creative organisations—such
    as galleries, theaters, or nonprofit arts groups—where she can blend rigorous financial control with innovative budgeting for projects. Additionally, she plans to champion the adoption of automation
    tools and data‑analytics practices within her department to improve efficiency and strategic insight.
