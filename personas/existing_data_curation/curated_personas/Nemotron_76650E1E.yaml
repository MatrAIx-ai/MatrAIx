personas:
  professional: Cassandra Downs, a 37‑year‑old bookkeeping specialist, leverages her meticulous ledger expertise, QuickBooks mastery, and love of visual storytelling to streamline month‑end close processes
    while translating financial data into vivid narratives for cross‑functional colleagues.
  sports: Cassandra Downs enjoys weekend hikes in the Appalachian Trail sections of Connecticut state parks, follows the Hartford Yard Goats and the Hartford Wolf Pack for baseball and hockey respectively,
    and participates in a local recreational soccer league during the summer months.
  arts: Cassandra Downs draws creative fuel from the surreal paintings of Yayoi Kusama, the indie folk of Sufjan Stevens, and the improvisational humor of The Second City, regularly attending Hartford gallery
    openings, open‑mic nights, and community theater improv workshops.
  travel: Cassandra Downs prefers spontaneous weekend escapes to historic New England towns like Salem and Portland, while dreaming of an artist‑focused summer in Barcelona’s vibrant street‑art districts,
    balancing limited vacation days with a thirst for fresh visual inspiration.
  culinary: Cassandra Downs, an adventurous home cook, experiments with fermented kimchi tacos, saffron‑infused paella, and mushroom risotto, often sourcing fresh herbs from the local farmer’s market to
    enhance their eclectic palate.
  core: Cassandra Downs blends razor‑sharp analytical precision with a flamboyant creative streak, juggling CPA study sessions and midnight watercolor projects, and can’t resist a marathon of strategy board
    games even if it means sacrificing a few hours of sleep.
background:
  cultural: Cassandra is a white American with Iberian roots—her paternal surname Rivera reflects a Spanish lineage, while her mother’s family background includes Portuguese ancestry. Raised in Hartford,
    she grew up immersed in New England’s cultural traditions yet was also exposed to Hispanic customs, such as celebrating Día de los Muertos with extended family and enjoying Mediterranean culinary traditions
    at home. She identifies with the broader Connecticut community, participating in local festivals, supporting regional arts institutions like the Wadsworth Atheneum, and maintaining close ties to her
    multicultural heritage through language, food, and occasional trips to Spain and Portugal to visit relatives.
attributes:
  skills: '[''Bookkeeping'', ''Accounts Payable/Receivable'', ''General Ledger Management'', ''QuickBooks'', ''Xero'', ''Microsoft Excel (advanced)'', ''Financial Reporting'', ''Audit Trail Documentation'',
