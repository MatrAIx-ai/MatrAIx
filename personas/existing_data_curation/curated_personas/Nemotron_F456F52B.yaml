personas:
  professional: Nester Roman, an aspiring interdisciplinary design student with a talent for digital illustration, Python prototyping, and project coordination, channels their vivid imagination into structured,
    narrative-driven multimedia concepts while they balance meticulous organization with the freedom to experiment.
  sports: Nester Roman, a dedicated member of the Davis Cycling Club and occasional participant in UC Davis Aggies intramural soccer, spends weekends hiking the Pleasant Hill Hills and follows the San Jose
    Earthquakes, and they blend cardio with a love for nature’s scenery while they cheer on the Earthquakes whenever a match airs.
  arts: Nester Roman draws inspiration from speculative graphic novelist Shaun Tan, visual artist James Jean, indie folk band Bon Iver, and local performers like The Daylight People, and they weave this
    aesthetic into sketchbooks, digital paintings, and occasional live-music collaborations.
  travel: Nester Roman favors budget-friendly road trips to Yosemite and Portland, sketching on the train and staying in hostels, yet they dream of attending the Tokyo VR Art Festival to merge their love
    of travel, technology, and immersive storytelling.
  culinary: Nester Roman enjoys experimenting with unconventional recipes such as miso-infused ramen, avocado toast topped with sumac-spiced smoked salmon, and turmeric-laden vegan brownies, and they often
    over-cook the dishes due to being distracted by a new sketch idea.
  core: Nester Roman, an 18-year-old creative polymath, balances a vivid imagination with meticulous organization, constantly oscillating between sketching bus stops and debugging Python scripts, and they
    occasionally neglect sleep to finish a digital illustration.
background:
  cultural: Nester grew up in a middle‑class, white family with mixed European roots in the progressive, bike‑friendly town of Davis, California. His parents, both college‑educated professionals, emphasized
    education, the arts, and environmental awareness. The university‑centered community exposed him to a wide range of cultural and social perspectives, fostering an appreciation for diversity, sustainability,
    and creative expression that blends his Midwestern upbringing with the liberal, environmentally conscious ethos of the West Coast.
attributes:
  skills: '["Digital illustration", "Graphic design", "Conceptual art", "Basic Python programming", "Creative writing", "Critical analysis of visual media", "Video editing", "Project coordination"]'
  hobbies: '["Sketching and digital painting", "Reading speculative and graphic fiction", "Playing acoustic guitar", "Cycling and hiking", "Experimenting with cooking", "Attending art shows and indie concerts",
    "Exploring VR experiences"]'
  career_goals: He aims to pursue a bachelor’s degree in interdisciplinary design or interactive media, eventually working as a multimedia artist or user experience designer who creates immersive, narrative‑driven
    experiences. Long‑term, Nester hopes to lead collaborative projects that merge art, technology, and environmental activism, possibly founding a studio that produces experimental digital installations
    and socially‑conscious games.
