  hobbies: '[''Visiting art galleries'', ''Watercolor painting'', ''Reading historical biographies'', ''Crossword puzzles'', ''Bridge'', ''Organic gardening'', ''Attending local theater performances'',
    ''Collecting vintage postcards'']'
  career_goals: While no longer pursuing formal employment, Denise aims to deepen her influence in Buffalo's cultural scene. She aspires to volunteer as a mentor for younger members of the local historical
    society, sharing her research methods and storytelling skills. Denise also hopes to curate a small traveling exhibition of local artists' work for senior centers, blending her love of art and community
    service. On a personal level, she plans to complete a series of watercolor paintings inspired by the city's waterfront and to embark on a short trip to the Smithsonian museums in Washington, D.C., fulfilling
    a long‑held desire to explore national art collections.
