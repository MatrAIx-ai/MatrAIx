personas:
  professional: Sheila Williams is a health information management specialist who leverages her mastery of Epic and Cerner, deep knowledge of HL7/FHIR, and Lean Six Sigma expertise to design precise data
    governance frameworks, while using her calm, organized nature to mentor staff and steer multi‑site interoperability projects toward strategic goals.
  sports: Sheila Williams enjoys low‑impact fitness through weekly yoga sessions and weekend hikes on Sonoma’s Redwood trails, participates in the local Sonoma Trailwalk Club, roots for the San Francisco
    49ers in football season and the Golden State Warriors in basketball, and occasionally joins a weekend adult basketball league at the community center.
  arts: Sheila Williams cultivates a quiet artistic side by photographing native birds with a Nikon D750, unwinding with the classical piano works of Ludovico Einaudi and the operatic tones of Andrea Bocelli,
    and reads historical biographies by Ron Chernow while knitting scarves inspired by the patterns of traditional Mediterranean textiles.
  travel: Sheila Williams plans meticulously for weekend getaways, favoring serene wine destinations like Napa’s boutique vineyards and Mediterranean‑inspired retreats in Tuscany, while budgeting for occasional
    international trips to Provence’s lavender fields, always traveling with a small circle of friends and a reusable water bottle.
  culinary: Sheila Williams, an adept home chef, transforms garden harvests of rosemary, basil, and heirloom tomatoes into Mediterranean staples such as grilled sea bass with lemon‑olive oil, chickpea falafel,
    and ratatouille, pairing these dishes with carefully selected Sonoma pinot noirs and a splash of aged balsamic vinegar.
  core: Sheila Williams blends methodical expertise in health informatics with a calm, garden‑rooted lifestyle, balancing data‑driven precision and leisurely Mediterranean flavors while nurturing community
    ties through quiet generosity.
background:
  cultural: Sheila was raised in a middle‑class family in Northern California with ancestral ties to English and Scottish heritage. Her upbringing emphasized education, self‑reliance, and civic participation,
    which are reflected in her dedication to public health and community volunteerism. Residing in Petaluma, she lives within a culturally diverse region that values the wine‑growing tradition and progressive
    environmental stewardship. While she celebrates mainstream American holidays such as Thanksgiving and the Fourth of July, her daily life is shaped by the Californian focus on wellness, outdoor recreation,
    and sustainable living.
attributes:
  skills: '["Electronic Health Record (EHR) system administration (Epic, Cerner)", "Medical coding and terminology (ICD-10, CPT)", "HIPAA compliance and health information privacy", "Data analysis and reporting
    (SQL, Excel, Tableau)", "Health information governance and data quality auditing", "Process improvement (Lean Six Sigma)", "Clinical documentation improvement (CDI)", "Interoperability standards (HL7,
    FHIR)", "User training and support for clinical staff", "Project coordination for health IT initiatives"]'
  hobbies: '["Gardening (vegetables and herbs)", "Wine tasting at local vineyards", "Hiking Sonoma County trails", "Reading historical biographies", "Cooking Mediterranean meals", "Yoga and guided meditation",
    "Volunteer health‑literacy workshops", "Birdwatching and nature photography", "Knitting and handcrafts"]'
  career_goals: Sheila aims to progress into a senior health information management role where she can shape data governance strategies for a multi‑site health system. She plans to earn the Registered Health
    Information Administrator (RHIA) credential and complete a Master’s degree in health informatics to enhance her strategic expertise. Over the next five years, she hopes to lead the implementation of
    interoperable data exchange platforms across Sonoma County providers, mentor emerging health‑information professionals, and contribute to community health‑data initiatives, all while preserving a structured
    and balanced work schedule.
