    and eco‑friendly practices'', ''Traveling to nearby cities for museum visits and cultural festivals'', ''Volunteering for community clean‑up and beautification projects'']'
  career_goals: Tami aims to leverage her extensive custodial experience into a supervisory or facilities‑management role within a larger organization, such as a school district or regional hospital. She
    plans to obtain Certified Professional Cleaner (CPC) and OSHA Safety Trainer certifications within the next two years, and to introduce greener cleaning practices at her workplace. Her competitive drive
    fuels a long‑term ambition to launch her own small cleaning business focused on eco‑friendly services for local businesses and community venues. Additionally, she hopes to be recognized as Employee
    of the Year by her employer and to mentor younger custodial staff, sharing her expertise and passion for efficient, high‑quality service.
