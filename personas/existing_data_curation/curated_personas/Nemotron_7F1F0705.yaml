personas:
  professional: Tami Hill is a twenty‑year veteran building custodian in rural Georgia who blends meticulous floor‑care expertise with a fierce drive for eco‑friendly process improvements, mentoring new
    staff while positioning themselves for a supervisory role in a larger institution.
  sports: Tami Hill energizes their weekends with early‑morning walks to the community garden, joins the local senior joggers club for Saturday runs, supports the Atlanta Falcons, Braves, and Hawks, and
    occasionally plays recreational tennis at the county recreation center, preferring low‑impact cardio that balances their busy schedule.
  arts: Tami Hill immerses themselves in the local arts scene, attending gallery openings featuring works by contemporary Southern artists like Mickalene Thomas and Seth Wulsin, acting in community theatre
    productions of Neil Simon’s ‘The Odd Couple’, and channeling their vocal flair into karaoke renditions of Beyoncé’s ‘Halo’ and classic show tunes by Andrew Lloyd Webber.
  travel: Tami Hill prefers short, purpose‑driven weekend getaways, meticulously planning road trips to Atlanta’s High Museum of Art and Savannah’s historic squares, while keeping a bucket‑list entry for
    a week‑long cultural immersion in Kyoto, Japan, where they hope to study traditional tea‑ceremony aesthetics and sustainable living practices.
  culinary: Tami Hill delights in crafting herb‑infused dishes from their garden, whipping up rosemary‑garlic roasted chicken, basil pesto pasta, and fragrant lavender‑lemon shortbread, while also indulging
    in Southern staples like shrimp and grits with a side of collard greens, and they’ve become adept at upcycling stale bread into hearty crouton salads.
  core: Tami Hill is a talkative, art‑obsessed custodian who channels competitive curiosity into green‑cleaning innovations, garden‑to‑table cooking, and weekend theater, all while balancing meticulous
    budgeting with occasional splurges on supplies that fuel their creative spark.
background:
  cultural: Tami grew up in Fitzgerald, a close‑knit community in Wilcox County, where Southern hospitality, church life, and small‑town traditions shape daily interactions. Her family celebrated local
    festivals such as the annual Pecan Festival and community picnics, and Sunday mornings were often spent at a Methodist church that emphasized service and fellowship. The town’s modest downtown, historic
    homes, and nearby pine forests fostered an appreciation for simple, hands‑on work and a deep connection to the natural environment. While rooted in traditional Southern values of reliability, modesty,
    and community support, Tami also embraces modern influences through exposure to regional art scenes in nearby cities like Atlanta and Savannah, blending a respect for heritage with an openness to new
    ideas and cultural experiences.
