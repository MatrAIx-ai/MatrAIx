  career_goals: Lisa aspires to turn her artistic passions into a future career. She dreams of attending a community college program in graphic design or fine arts, eventually working as a freelance illustrator
    or a junior designer for a small studio where she can balance independent creation with occasional collaborative projects. She also hopes to contribute her art to local community initiatives, such as
    creating murals for town events or designing programs for youth art workshops, allowing her to stay connected to her hometown while pursuing personal growth.
