    "Graphic‑design basics for newsletters", "Inventory procurement", "Time management"]'
  hobbies: '["Art gallery and museum visits", "Live music concerts", "Hiking and biking in desert landscapes", "Social dancing (salsa, ballroom)", "Reading art‑history and design books", "Painting and pottery
    workshops", "Volunteering at community festivals and charity events", "Board game nights with friends", "Cooking experimental Southwestern and international dishes"]'
  career_goals: Michelle aims to advance from her current administrative assistant role to an office manager or executive assistant position within the next three years, seeking a Certified Administrative
    Professional (CAP) credential to formalize her expertise. She is also interested in transitioning into project coordination, where she can leverage her organizational talent and competitive drive to
    lead cross‑functional initiatives. Long‑term, Michelle hopes to combine her love of the arts with her administrative strengths by overseeing community‑based cultural programs or corporate art‑event
    planning, and she plans to take evening courses in event management and basic graphic design to broaden her qualifications.
