personas:
  professional: Michelle Centeno is an administrative professional who blends meticulous calendar coordination, expert Microsoft Office and Google Workspace skills, and a talent for graphic‑design newsletters
    to keep office operations humming, while channeling their competitive drive into leading event planning initiatives, they are also pursuing a Certified Administrative Professional credential.
  sports: Michelle Centeno is an avid hiker on Red Rock Canyon trails, a frequent cyclist around Lake Mead, a member of the Desert Trailblazers hiking club, a dedicated supporter of the Las Vegas Raiders
    and the Vegas Golden Knights, and a regular participant in weekend salsa and ballroom dance classes that double as cardio workouts, they proudly cheer for their teams at every game.
  arts: Michelle Centeno immerses herself in Henderson’s vibrant art district, attending monthly gallery openings featuring emerging talents like Maya Gonzalez, studying iconic works by Frida Kahlo and
    Ai Weiwei at the local museum, joining group drumming circles that explore Afro‑Cuban rhythms, and dedicating evenings to painting small acrylic landscapes and throwing pottery at community workshops,
    while they also catch live shows ranging from indie band The Strokes to classic rock legends The Rolling Stones.
  travel: Michelle Centeno crafts travel plans that blend meticulous itineraries for Southwest adventures—such as a week‑long hike in Zion National Park and a weekend road‑trip to Santa Fe—with spontaneous
    culinary detours, dreams of an immersive food tour in Oaxaca, and a relaxed art‑focused getaway to Florence, and they balance a modest travel budget with occasional splurges on concert‑linked trips.
  culinary: Michelle Centeno delights in cooking Southwestern‑infused dishes like green‑chile‑marinated pork tacos, chipotle‑ginger ramen, and cumin‑spiced lamb braised with pomegranate, often sourcing
    fresh Hatch chilies, avocados, and heirloom tomatoes at the farmer’s market, exhibiting a solid intermediate skill level, though they sometimes leave the kitchen a mess after an enthusiastic late‑night
    cooking session.
  core: Michelle Centeno is a detail‑oriented, art‑loving office dynamo whose competitive spirit fuels flawless event coordination and relentless creative pursuits, even if that sometimes means they sacrifice
    sleep for a late‑night pottery spin.
background:
  cultural: Michelle is a White American whose family roots trace back to the Midwest, where she grew up in a close‑knit suburban community before moving to the Southwest for work. Living in Henderson,
    Nevada, she has embraced the region’s blend of desert lifestyle, family‑oriented values, and a growing appreciation for local art and multicultural festivals. Her upbringing emphasized self‑reliance,
    community involvement, and traditional American holidays, while her adult life exposes her to the diverse cultural tapestry of the Greater Las Vegas area, including Native‑American influences, Hispanic
    culinary traditions, and a vibrant entertainment scene. These experiences shape her worldview, fostering an openness to new ideas and artistic expression while maintaining a pragmatic, organized approach
    to daily life.
attributes:
  skills: '["Microsoft Office Suite (Word, Excel, PowerPoint, Outlook)", "Google Workspace and Slack", "Calendar and travel coordination", "Meeting and event planning", "Data entry and database management",
