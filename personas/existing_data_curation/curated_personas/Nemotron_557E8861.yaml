personas:
  professional: Mary Wilkerson, a licensed personal financial advisor with a graduate business degree, blends rigorous investment analysis, tax‑efficient planning, and behavioral finance counseling into
    vivid, client‑focused visual roadmaps, leveraging modern fintech tools while sometimes letting their artistic spontaneity cause missed deadlines, yet they consistently turn client meetings into storytelling
    sessions that demystify complex concepts.
  sports: Mary Wilkerson, a lover of low‑impact fitness, follows the Carolina Panthers on Sundays, participates in a weekly sunrise yoga class on Wrightsville Beach, joins the local Beach Volleyball League
    and the Wrightsville Beach Paddleboard Club for weekend sessions, and occasionally runs with the Wilmington Running Club for 5K workouts, preferring solitary or small‑group activity over crowded gyms,
    which they find more harmonious with their introverted nature.
  arts: Mary Wilkerson, an abstract painter who channels the bold color fields of Mark Rothko and the kinetic energy of Jackson Pollock, regularly visits contemporary exhibitions at the Cameron Art Museum
    showcasing artists like Kehinde Wiley and Yayoi Kusama, and finds inspiration while listening to Björk’s avant‑garde albums and the improvisational jazz of The Bad Plus during their studio sessions.
  travel: Mary Wilkerson, a spontaneous yet budget‑aware explorer, frequently escapes to the Outer Banks for weekend sunrise beach walks, has trekked the mural‑rich streets of Lisbon’s Alfama district,
    immersed themselves in the tea‑house serenity of Kyoto’s Uji neighborhood, and plans future retreats to the sweeping dunes of the Sahara, booking flexible dates through Skyscanner and opting for curated
    Airbnbs that double as creative studios, which they consider essential for nurturing their artistic soul.
  culinary: Mary Wilkerson, an enthusiastic home chef who cultivates basil, thyme, and rosemary in their sun‑lit herb garden, delights in crafting herb‑infused Mediterranean dishes such as lemon‑rosemary
    grilled salmon with quinoa tabbouleh and zucchini‑basil pasta, enjoys making beet‑cured tuna tartare at Wilmington’s Chef’s Table for special occasions, and occasionally treats themselves to avant‑garde
    tasting menus at renowned restaurants, blending their love of flavor with a painter’s eye for color.
  core: Mary Wilkerson, a creatively driven financial advisor who blends abstract art with wealth planning, finds balance in meditative beach walks yet often procrastinates on paperwork, turning their work
    into vibrant storytelling sessions that they share with clients.
background:
  cultural: Mary is a white American who grew up in a middle‑class family with subtle Protestant roots that emphasized stewardship, community service, and hospitality. Relocating to Wilmington, North Carolina,
    she has absorbed the region's blend of Southern warmth, coastal heritage, and a burgeoning arts and tech scene driven by the local film industry. This cultural tapestry shapes her respectful, collaborative
    demeanor and her openness to novelty, allowing her to bridge traditional values with innovative, artistic expressions in both her personal life and professional practice.
