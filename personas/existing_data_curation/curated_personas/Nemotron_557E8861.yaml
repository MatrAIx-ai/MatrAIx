    in a small book club'', ''Volunteering for financial‑literacy workshops'', ''Exploring emerging fintech tools'', ''Creative writing and journaling'']'
  career_goals: Mary aspires to become a senior partner at a boutique wealth‑management firm that values creative, socially responsible investing and deep client education. She aims to develop a proprietary
    "financial storytelling" framework that blends abstract visual art techniques with long‑term wealth planning, author thought‑leadership pieces on the intersection of imagination and finance, and mentor
    junior advisors while preserving a flexible schedule that supports her personal artistic pursuits. Additionally, she hopes to expand community outreach by leading financial‑literacy workshops for underserved
    families in Wilmington.
