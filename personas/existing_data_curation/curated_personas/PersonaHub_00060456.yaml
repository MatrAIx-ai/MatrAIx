persona_description: A healthcare professional who is interested in evidence-based medicine and is advocating for patients to be informed about the efficacy of new medications. They believe that the current
  FDA approval process for new drugs does not adequately reflect the actual efficacy of these products, and they propose that the FDA require drug manufacturers to state how new medications compare with
  similar, existing treatments. They also believe that the FDA's primary role is informing the public about the safety of drugs and devices, and they advocate for developing more informative labels to improve
  patient outcomes.
