  career_goals: Nisha’s primary career goal is to move into a supervisory or team‑lead role within her insurance agency, where she can mentor new clerks and help refine routine workflows for greater efficiency.
    She plans to obtain a GED and pursue an industry certification such as the Associate in Claims (AIC) to solidify her expertise. While she values the stability of a predictable schedule, she also hopes
    to influence policy‑processing standards that reduce errors and improve claimant satisfaction. Long‑term, she envisions leading a small team that balances routine operations with a supportive, people‑focused
    environment, and she would like to contribute to community outreach programs that educate local South Asian residents about insurance options.
