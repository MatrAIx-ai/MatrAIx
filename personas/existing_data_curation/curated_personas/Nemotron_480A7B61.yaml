personas:
  professional: Kevin Britt is a budding visual storyteller who combines self‑taught sketching, analog photography, and basic graphic design to curate intimate art displays at the local library, and they
    are seeking a part‑time apprenticeship in exhibit design to eventually launch a freelance career that balances creative freedom with low‑stress work.
  sports: Kevin Britt enjoys low‑impact outdoor activities like weekend hikes on the nearby Appalachian Trail and casual cycling through White Bluff, follows the local high school cross‑country team and
    the regional minor‑league baseball club, and they occasionally attend yoga classes at the community center to counterbalance long hours of sketching.
  arts: Kevin Britt draws deep inspiration from folk legends like Gillian Welch, blue‑grass virtuoso The Punch Brothers, and indie acoustic songwriter Iron & Wine, while regularly visiting the regional
    art gallery to study works by painter Sarah Haines, and they spend evenings strumming a battered acoustic guitar in the quiet of their backyard.
  travel: Kevin Britt prefers spontaneous, low‑budget getaways to serene locales such as the Shenandoah Valley, the quiet villages of the Cotswolds, and the Japanese countryside near Kyoto, planning trips
    on a whim using a travel app that highlights off‑season deals, but they often curtail longer journeys due to modest finances and a desire to stay close to the community garden they tend.
  culinary: Kevin Britt loves farm‑to‑table meals, frequently cooking simple dishes like roasted beet and goat‑cheese salad, sautéed kale with garlic, and fresh garden‑picked tomato bruschetta, and while
    their cooking skills are modest, they take pride in home‑preserving summer zucchinis into pickles.
  core: Kevin Britt is a quiet creative soul who channels curiosity into sketching, music, and gardening, yet they struggle with organization and occasional anxiety, balancing modest spending with occasional
    artistic splurges.
background:
  cultural: Kevin grew up in White Bluff, a small Appalachian‑influenced community in Cheatham County, Tennessee. His upbringing was steeped in Southern rural traditions—family gatherings at the local church,
    county fairs, and a strong sense of neighborly reciprocity. While his family values modesty, humility, and self‑reliance, Kevin’s curiosity has led him to explore broader artistic and philosophical
    ideas beyond his immediate surroundings. He identifies with the blend of traditional Southern hospitality and a quiet, introspective temperament common among many youth in his town.
attributes:
  skills: '[''Sketching'', ''Analog Photography'', ''Basic Photo Editing'', ''Graphic Design (Adobe Photoshop basics)'', ''Woodworking'', ''Gardening'', ''Handyman Repairs'', ''Empathetic Listening'', ''Conflict
