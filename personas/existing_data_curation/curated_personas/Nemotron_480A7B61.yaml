  hobbies: '[''Sketching landscapes'', ''Analog photography'', ''Acoustic guitar playing'', ''Reading philosophy and poetry'', ''Hiking'', ''Community library volunteering'', ''Vegetable gardening'', ''Listening
    to folk/blue‑grass music'']'
  career_goals: Kevin aspires to turn his artistic passions into a sustainable livelihood while maintaining a flexible, low‑stress schedule. He hopes to secure a part‑time apprenticeship with a local art
    studio or museum to develop curatorial and exhibit‑design skills, eventually working as an independent freelance visual artist or photographer. He also plans to obtain a certification in horticulture
    to combine his love for gardening with a small‑scale landscape‑design business that offers tranquil outdoor spaces for the community. Long‑term, Kevin envisions creating a quiet, community‑focused creative
    space—a modest gallery and workshop—to foster artistic expression among other introverted youth in White Bluff.
