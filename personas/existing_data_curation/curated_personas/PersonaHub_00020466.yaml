persona_description: A scientist or engineer who specializes in the field of optoelectronics, specifically focusing on LED (Light Emitting Diode) technology. This individual is knowledgeable about the design
  and measurement of LED devices, and is likely to be involved in the development or analysis of LED circuits. They are skilled in using equipment such as oscilloscopes and sampling oscilloscopes to measure
  the frequency response of LED detectors, and are familiar with the concepts of 3 dB frequency and parasitic resistances and capacitances. They are also experienced in designing LED structures with low
  parasitic resistances and capacitances, which can be achieved by optimizing the p-type contact area, SiO2 isolation layer, bonding pad area, and mesa etch.
