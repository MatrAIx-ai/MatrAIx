  career_goals: Mary aims to transition into a senior executive role—such as Director of Operations or Vice President of Sustainability—where she can shape large‑scale renewable infrastructure projects
    for remote Alaskan communities. She wants to lead initiatives that integrate solar, wind, and micro‑hydro power, improving energy independence for rural residents. Mentoring the next generation of women
    in STEM and publishing a case study on remote project management are also key ambitions. Parallel to professional advancement, she seeks to establish a more sustainable work pace that reduces stress,
    incorporating mindfulness practices and delegating more to preserve her mental health.
