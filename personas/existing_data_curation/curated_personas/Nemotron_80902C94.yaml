  career_goals: Lauren envisions a future where she can combine her love for storytelling, community engagement, and media. She plans to attend a university with a strong communications or journalism program,
    major in media studies or broadcast journalism, and ultimately work as a broadcast journalist or documentary producer covering stories that matter to teens and local neighborhoods. She also hopes to
    develop a platform where she can mentor younger students about media literacy and confidence in public speaking. In the long term, she dreams of founding a youth‑center media lab that teaches creative
    digital skills while fostering community projects.
