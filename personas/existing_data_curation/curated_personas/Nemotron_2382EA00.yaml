  hobbies: '["Sketching and drawing","Watercolor painting","Collage art","Photography","Attending gallery openings and cultural festivals","Listening to Latin American and indie music","Cooking Peruvian
    cuisine","Mentoring younger students in art programs"]'
  career_goals: Eleonor aspires to turn her passion for art and community into a career that blends creativity with cultural advocacy. She plans to complete her GED, then enroll in a community college program
    in graphic design or visual arts, eventually earning a bachelor’s degree in art education or museum studies. Her long‑term goal is to become a cultural program director for a nonprofit that creates
    art workshops for Latinx youth in the Midwest, or to work as a graphic designer who incorporates Peruvian motifs into modern branding. She also envisions developing her own online platform showcasing
    emerging artists from diverse backgrounds.
