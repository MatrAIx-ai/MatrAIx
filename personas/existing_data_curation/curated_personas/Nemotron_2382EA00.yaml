personas:
  professional: Eleonor Rodriguez, a high school senior who blends digital illustration with community event planning, leverages their organizational flair and sociable energy to coordinate school art fairs
    and lead mural projects while honing Adobe Photoshop and Illustrator skills.
  sports: Eleonor Rodriguez, an enthusiastic runner who jogs along Omaha's riverfront three times a week and joins a weekend community soccer league, roots for the Omaha Storm Chasers and tracks the Nebraska
    Cornhuskers football season, and balances workouts with occasional yoga sessions at the local studio.
  arts: Eleonor Rodriguez, a mixed-media enthusiast, frequently visits gallery openings featuring works by Banksy and Frida Kahlo, joins community theater productions of contemporary pieces like 'Rent,'
    and curates playlists that blend J Balvin's Latin beats with Bon Iver's indie folk, letting these influences shape their sketchbook and digital illustrations.
  travel: Eleonor Rodriguez, an adventurous yet budget-conscious traveler, plans trips using student discounts, has explored nearby Chicago's art museums and Denver's mountain trails, dreams of backpacking
    through the Andean highlands of Cusco, and prefers itineraries that combine cultural festivals with opportunities to photograph urban street life.
  culinary: Eleonor Rodriguez, a budding home chef, loves preparing fresh ceviche with lime, cilantro, and a hint of ají, cooks lomo saltado featuring ají amarillo and soy sauce, experiments with homemade
    pasta sauces using basil and garlic, and often invites friends over to share these dishes while learning new flavor pairings.
  core: Eleonor Rodriguez, a curious 17-year-old artist with an organized yet flexible mindset, balances a passion for cultural advocacy with occasional procrastination on schoolwork and a habit of collecting
    vintage camera lenses.
background:
  cultural: Eleonor’s Peruvian heritage is a core part of her identity. She grew up speaking Spanish at home and celebrating traditional holidays such as Día de la Canción Criolla and Inti Raymi, which
    have shaped her appreciation for vibrant colors, rhythmic music, and storytelling. The family’s recipes—ceviche, causa, and suspiro a la limeña—connect her to her roots, while her parents’ emphasis
    on education and community service inspires her to give back. Living in Omaha, she blends her Latin American background with Midwestern values, participating in local cultural exchange events and fostering
    a bridge between Peruvian traditions and the diverse communities of Nebraska.
