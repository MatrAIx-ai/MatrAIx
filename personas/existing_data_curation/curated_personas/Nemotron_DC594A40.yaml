personas:
  professional: Janika Taylor is an experienced electronics assembler who excels at reading schematics, precision soldering both surface‑mount and through‑hole components, and applying lean manufacturing
    principles, while they blend curiosity with practicality to experiment with process improvements and mentor peers toward Industry 4.0 adoption.
  sports: Janika Taylor stays active by walking the Detroit Riverfront three times a week, cheering on the Detroit Lions in the fall, the Pistons during the NBA season, and occasionally joining the local
    cycling club “River Riders” for weekend rides, while they also practice gentle yoga at a community studio to counterbalance the physical demands of their assembly work.
  arts: Janika Taylor nurtures their creative side through a love of jazz legends like Miles Davis and Motown icons such as Stevie Wonder, and they attend intimate concerts at Detroit’s Blue Fish Club,
    read science‑fiction works by Isaac Asimov and N.K. Jemisin, and unwind knitting while listening to classic film scores by John Williams.
  travel: Janika Taylor prefers carefully planned trips that blend technology‑focused exploration with relaxed cultural immersion, having visited the Maker Faire in Tokyo last year and a weekend road trip
    to the Upper Peninsula’s winery region, while they dream of a future summer in the Italian Amalfi Coast to study historic craftsmanship and savor Mediterranean cuisine.
  culinary: Janika Taylor enjoys cooking family recipes like herb‑roasted chicken with sweet potatoes, occasionally experimenting with Ethiopian injera using a sourdough starter, and delights in pairing
    their meals with a glass of local Michigan Riesling while they still hone their pastry skills for weekend croissant attempts.
  core: Janika Taylor is a meticulous yet inquisitive electronics hobbyist who grooves to Motown on the workbench, tends a rooftop garden to balance screen‑time, hoards vintage radios despite limited storage,
    and they often stay up past midnight troubleshooting circuits, a habit that sometimes leaves them short‑changed on sleep.
background:
  cultural: Janika is an African‑American woman raised in Detroit’s historic Black neighborhoods. Her family’s roots trace back to the Great Migration, and she grew up immersed in the city’s rich musical
    heritage—Motown, jazz, and hip‑hop—alongside a strong sense of community solidarity. Values of perseverance, mutual support, and collective uplift, reinforced by church involvement and family traditions,
    shape her outlook. She celebrates cultural milestones such as Juneteenth and Kwanzaa and actively mentors young Black youth in STEM, reflecting the legacy of Detroit’s industrial workforce and its ongoing
    transformation.
attributes:
  skills: '["PCB assembly", "Surface‑mount soldering", "Through‑hole soldering", "Interpretation of electrical schematics", "Circuit testing and troubleshooting", "Use of multimeter and oscilloscope", "Microcontroller
    prototyping (Arduino, Raspberry Pi)", "Mechanical sub‑assembly integration", "Quality control and inspection", "Lean manufacturing principles", "Process documentation", "Team collaboration in small
    production groups", "Equipment maintenance", "Safety compliance (OSHA)", "Basic PLC programming"]'
  hobbies: '["DIY electronics projects (Arduino, Raspberry Pi)", "Reading science‑fiction novels and tech magazines", "Rooftop gardening", "Cooking family recipes", "Walking along the Detroit Riverfront",
    "Listening to jazz and Motown music", "Volunteer tutoring at local youth STEM program", "Small book club participation", "Knitting and crochet", "Restoring vintage radios"]'
  career_goals: Janika aims to advance to a lead assembler or supervisory role within the next two years, pursuing certifications such as IPC‑SAB (Solderability) and Certified Quality Technician to deepen
    her expertise. She plans to complete her associate’s degree in Electrical Engineering Technology part‑time, positioning herself for a future transition into process engineering or technical training.
    Ultimately, she hopes to mentor other women of color entering manufacturing and to help her plant adopt Industry‑4.0 technologies that blend her curiosity with practical workflow improvements.
