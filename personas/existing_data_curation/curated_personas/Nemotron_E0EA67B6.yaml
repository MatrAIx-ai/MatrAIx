  career_goals: Short‑term, Connie aims to earn a bachelor’s degree in Information Systems and obtain PMP and CISSP certifications, positioning herself for broader strategic responsibilities. She plans
    to lead a company‑wide digital transformation project that integrates AI‑driven analytics and enhances cybersecurity posture. Connie also seeks to expand her mentorship role, establishing a women‑in‑tech
    network within her organization. Long‑term, she envisions progressing to an IT Director or Chief Technology Officer role, where she can shape enterprise‑wide technology strategy, drive innovative solutions,
    and champion inclusive workplace cultures. She is interested in eventually launching a consultancy that helps small nonprofit organizations adopt secure, cost‑effective technology solutions while maintaining
    a healthy work‑life balance for tech professionals.
