personas:
  professional: Connie Garcia, a 31‑year‑old IT infrastructure lead at a mid‑size firm, blends a pragmatic cost‑focus with a curiosity for emerging tech, overseeing cloud migrations to AWS and Azure while
    championing inclusive mentorship and employee well‑being.
  sports: Connie Garcia fuels their energetic routine with weekly spin sessions at SoulCycle, sunrise yoga at a local studio, weekend hikes through Watchung Reservation, and cheering for the New York Knicks
    and New Jersey Devils, while they belong to the Bergen County Hiking Club.
  arts: Connie Garcia immerses themselves in the arts through sci‑fi novels by Margaret Atwood, indie rock by Tame Impala, weekly visits to the off‑Broadway production of Hamilton, and occasional painting
    sessions inspired by contemporary abstract artist Julie Mehretu.
  travel: Connie Garcia enjoys meticulously planned trips with their spouse to culturally rich destinations like Kyoto, Florence, and Mexico City, while also indulging in spontaneous weekend getaways to
    nearby Hudson Valley wineries, aspiring next year to explore Marrakech and the Andes.
  culinary: Connie Garcia, an enthusiastic home chef, experiments with Mediterranean mezze, Korean bibimbap, and Southern barbecue, favoring fresh basil, lemongrass, and smoked paprika, often hosting dinner
    parties featuring homemade gnocchi with sage butter and finishing with a triple‑chocolate mousse.
  core: Connie Garcia, a 31‑year‑old IT strategist, balances meticulous planning with an insatiable curiosity, turning stress into spin‑class sprints, garden‑fresh meals, and a relentless drive to mentor
    women in tech.
background:
  cultural: Connie was raised in a middle‑class family in suburban New Jersey. Although she identifies primarily as White American, her surname reflects a Spanish‑heritage lineage that she honors through
    occasional celebrations of Hispanic holidays and family recipes. Growing up in Bergen County exposed her to a multicultural environment, shaping an inclusive outlook and appreciation for community diversity.
    She actively participates in neighborhood events, supports the annual county fair, and volunteers at local community centers. Her cultural identity blends the pragmatic values of her suburban upbringing
    with a modest appreciation for her ancestral traditions, creating a balanced perspective that informs both her personal and professional life.
