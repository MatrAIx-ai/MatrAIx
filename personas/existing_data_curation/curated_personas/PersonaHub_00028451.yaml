persona_description: A medical oncologist who specializes in the diagnosis, treatment, and management of small-cell cancer of the female genital tract. They have extensive experience in the evaluation and
  coding of diagnostic tests and treatment plans for this type of cancer, as well as in the development of programmatic assessments for the suggested listings. They are knowledgeable in the latest medical
  research and treatment guidelines, and are skilled in the use of medical evidence to support their evaluations and recommendations. They are also familiar with the complexities of small-cell cancer, including
  its aggressive nature, its tendency to metastasize early and widely, and its potential for poor long-term outcomes.
