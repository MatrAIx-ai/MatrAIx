persona_description: A young researcher who is passionate about developing wireless technologies for novel implantable devices and improving healthcare quality and efficacy. She is interested in cardiovascular
  implants and ingestible capsules for gastro intestinal problems. She is looking for a unique opportunity to acquire diverse skills and acquire privileged positions to join and promote EU leadership in
  ICT for Health. She is excited about the chance to work with two reference hospitals, two medical device manufacturers, and three top ranked universities in Europe to cover complementary aspects of the
  in-body wireless device field.
