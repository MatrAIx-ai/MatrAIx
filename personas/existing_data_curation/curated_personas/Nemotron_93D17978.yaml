  career_goals: Even at four, Edith expresses a dream of becoming a creator—she talks about wanting to be an artist, a storyteller, or a teacher who shares pictures and stories with younger children. She
    imagines a future where she can design colorful books, paint vibrant pictures, and use her calm, caring nature to help others feel safe and happy through creative play.
