personas:
  professional: A budding junior storyteller, Edith Perez loves to invent elaborate narratives with her building blocks, channeling her intense curiosity about abstract concepts into early storytelling
    sessions. Their natural organization keeps plot arcs tidy, though they sometimes refuse to share storybooks with peers.
  sports: A playful member of the Little Sprouts Soccer Club, Edith Perez loves kicking a ball at the nearby community park and cheers for the local professional team the Boston Red Sox. While preferring
    small-group play, they sometimes refuse to sit out during tag games, chasing after the bright orange frisbee with unbridled energy.
  arts: A tiny art aficionado, Edith Perez spends afternoons drawing whimsical creatures after listening to The Wiggles and watching Pixar short films such as Piper, idolising the collage style of Eric
    Carle. They can get stubborn about using only their favorite crayon colors, yet they eagerly experiment with mixing textures.
  travel: An inquisitive little explorer, Edith Perez enjoys family road trips to the Grand Canyon and beach days in San Diego, preferring meticulously planned itineraries with picture books of the destination.
    They often bring along their stuffed llama for comfort and dream of seeing the Eiffel Tower someday.
  culinary: A selective eater, Edith Perez adores cheesy macaroni, banana slices, and strawberry smoothies, and can whip up a simple peanut butter sandwich by herself. They refuse to eat anything green
    unless it’s cut into star shapes, and often sneak a bite of chocolate pudding before dinner.
  core: Edith Perez, a four-year-old dreamer, balances meticulous organization with boundless imagination, quietly curating her world of stories, savings, and snacks while radiating calm and kindness.
background:
  cultural: Edith is raised in a Mexican‑American household in Santa Maria, California, a town known for its agricultural heritage and lively Latino community. At home she hears both Spanish and English,
    celebrates Día de los Muertos with colorful altars and marigolds, and enjoys family gatherings featuring tamales, pozole, and other traditional foods. Community events like the Santa Maria Mexican Fiesta
    expose her to music, dance, and cultural crafts. The family emphasizes respect, harmony, and close‑knit relationships, reinforcing her kind, cooperative, and considerate personality.
