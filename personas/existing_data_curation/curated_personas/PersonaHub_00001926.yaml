persona_description: A scientist and researcher in the field of plant pathology, particularly focusing on the development of living defenses against powdery scab and root-knot nematodes. Tanaka and Gleason
  are exploring new molecular and living defenses against these pests, with a focus on developing a biodegradable vaccine that can be delivered to the rhizosphere to protect yields and keep fields in production,
  while helping farmers cut down on costly, often ineffective fungicides. Their work involves developing a rod-shaped bacterium that colonizes the rhizosphere and secretes a compound that deters powdery
  scab, as well as studying the molecular mechanisms of the root-knot nematode to find new, gene-based defenses.
