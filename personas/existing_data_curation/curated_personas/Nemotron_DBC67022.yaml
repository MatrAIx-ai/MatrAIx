personas:
  professional: Brian Myles, a seasoned community volunteer coordinator, leverages their associate's degree in Business Administration, meticulous budgeting skills, and hands‑on expertise in facility maintenance
    to design structured youth mentorship programs and senior wellness initiatives with unwavering reliability.
  sports: Brian Myles, an avid early‑morning angler on the St. Lucie River and a dedicated fan of the Miami Dolphins and Miami Heat, participates in a local senior softball league each spring and maintains
    fitness through daily stretching and weekend bike rides along the Indian River.
  arts: Brian Myles, a devoted admirer of gospel legends like Mahalia Jackson and the literary mastery of Toni Morrison, spends evenings listening to soulful hymns and reading classics, while occasionally
    crafting wooden sculptures inspired by the rhythm of oral storytelling traditions.
  travel: Brian Myles, an occasional traveler who favors low‑key road trips, has explored the historic streets of Savannah, the tranquil beaches of the Florida Keys, and dreams of attending the vibrant
    Mardi Gras celebrations in New Orleans and the cultural festivals of Cartagena, Colombia.
  culinary: Brian Myles, a proficient home cook, delights in preparing soul‑food staples such as collard greens simmered with smoked turkey, crispy fried catfish, and buttery cornbread, seasoning dishes
    with fresh okra, sweet potatoes, and a dash of hot sauce, while occasionally over‑salting the gumbo in his quest for bold flavor.
  core: Brian Myles, a methodical, community‑centered retiree, balances a love for solitary woodworking and fishing with a steadfast commitment to mentoring youth, all while navigating health checks and
    cautious finances with quiet determination.
background:
  cultural: Brian was raised in a tight-knit African-American community in coastal Florida, where church, family, and local traditions shaped his values. Growing up during the civil-rights movement, he
    internalized a strong sense of collective responsibility and humility. His cultural identity blends Southern Black culinary traditions, gospel music, and a deep respect for oral storytelling. He maintains
    close ties to his extended family and local church, participating in community events that celebrate Black heritage in Fort Pierce.
attributes:
  skills: '[''Budgeting'', ''Inventory Management'', ''Small-Engine Repair'', ''Woodworking'', ''Event Coordination'', ''Record-Keeping'', ''Basic Microsoft Office'', ''Community Outreach'', ''Mentorship'',
