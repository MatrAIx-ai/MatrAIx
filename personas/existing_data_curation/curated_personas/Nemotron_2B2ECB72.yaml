personas:
  professional: Richard Proenza, a seasoned facilities manager whose methodical nature drives the creation of rigorous standard operating procedures, leverages deep HVAC, electrical, and plumbing expertise
    to oversee preventative maintenance schedules with clockwork precision while their competitive edge pushes cost‑saving vendor negotiations and a relentless pursuit of operational efficiency, and they
    start each workday with a strong cup of black coffee, a habit cherished since their apprenticeship.
  sports: Richard Proenza, an avid hiker who logs weekly treks through Red Rock Canyon, holds season tickets for the Vegas Golden Knights, belongs to the Las Vegas Shooting Sports Club where they practice
    marksmanship in disciplined small groups, and occasionally joins a local trail‑running meetup for early‑morning runs, preferring solitary endurance over team sports, and they never miss the community’s
    annual outdoor adventure fair each fall.
  arts: Richard Proenza, a meticulous model‑railroad enthusiast who crafts a scaled desert line inspired by historic US railways, draws creative inspiration from the precise compositions of Johann Sebastian
    Bach during chess study, and enjoys classic rock icons like The Rolling Stones while grilling, finding that the rhythm of music mirrors the cadence of their maintenance routines, and they attend the
    monthly downtown art walk to stay connected to the local creative scene.
  travel: Richard Proenza, a methodical planner who prefers low‑key road trips in his meticulously restored 1970s Camaro, has explored the Grand Canyon, Zion National Park, and Sedona’s red rocks, and dreams
    of a solo drive along Route 66 to capture sunrise over the Southwest, favoring itineraries that blend hiking trails with boutique inns over crowded resorts, while they meticulously map each waypoint,
    and they uphold the tradition of visiting a new national park each year.
  culinary: Richard Proenza, an exacting grill master, follows a precise rub recipe of smoked paprika, brown sugar, garlic powder, and black pepper for a perfect Texas‑style brisket, uses mesquite wood
    chips to achieve a consistent smoky flavor, meticulously documents cooking times and internal temperatures, and, though they occasionally over‑smoke a rib rack when eager to impress friends, always
    strives for repeatable, restaurant‑quality results, and they uphold the Sunday family barbecue tradition by inviting neighbors to share the feast.
  core: Richard Proenza, a 42‑year‑old facilities guru who channels a love for routine, precision, and solitary mastery into everything from HVAC audits to restoring a classic Camaro, grilling flawless
    brisket, and plotting energy‑saving initiatives, all while they balance a competitive streak with a tendency to defer personal health check‑ups.
background:
  cultural: Richard grew up in a middle‑class, predominantly Anglo‑American family in the greater Nevada area, attending a local high school where he learned the value of hard work and self‑reliance. His
    upbringing emphasized practical skills, community responsibility, and respect for tradition, shaping his conventional outlook. While he does not actively practice a specific religion, the cultural influence
    of a modest, family‑oriented environment is evident in his disciplined lifestyle. Living in Las Vegas, he is familiar with the city’s hospitality and service culture, but his personal identity aligns
    more with the quieter desert lifestyle, valuing routine, reliability, and a straightforward approach to both work and leisure.
attributes:
  skills: '[''Standard Operating Procedure Development'', ''Preventive Maintenance Scheduling'', ''Team Supervision and Scheduling'', ''Vendor Management and Contract Negotiation'', ''HVAC and Building
    Systems Knowledge'', ''Safety Audits and OSHA Compliance'', ''Emergency Response Planning'', ''Budgeting and Cost Control'', ''Inventory and Asset Management'', ''Project Management for Facility Upgrades'']'
  hobbies: '[''Hiking in Red Rock Canyon'', ''Classic Car Restoration (1970s Chevrolet Camaro)'', ''Model Railroad Building'', ''Grilling and Smoking Meats'', ''Solo Chess Practice'', ''Small‑Group Shooting
    Range Sessions'', ''Reading DIY Home Improvement Guides'']'
  career_goals: Richard aims to obtain the Certified Facility Manager (CFM) credential within the next two years to formalize his expertise. He seeks promotion to a senior facilities director role overseeing
    multiple properties in the Las Vegas region, where he can implement systematic energy‑saving initiatives and reduce operational costs by at least 15%. Long‑term, he envisions establishing a small consulting
    firm that offers tailored maintenance optimization services to boutique hotels and commercial complexes, leveraging his reputation for reliability and practical problem‑solving. He also hopes to mentor
    junior maintenance staff, creating a structured apprenticeship program to sustain high standards of work.
