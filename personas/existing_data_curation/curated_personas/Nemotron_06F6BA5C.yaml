  hobbies: '[''Drawing and painting'', ''Reading fantasy and science books'', ''Building LEGO sets'', ''Playing soccer'', ''Piano practice'', ''Visiting museums and art galleries'', ''Nature walks and wildlife
    observation'', ''Strategic board games'']'
  career_goals: Jonathan dreams of turning his love for art and curiosity about the world into a future career. He imagines himself as a wildlife illustrator who combines scientific accuracy with vivid,
    imaginative artwork, or as a museum curator who designs interactive exhibits that inspire other kids. He is also fascinated by space and sometimes talks about becoming an astronaut or a scientist who
    discovers new ideas. Ultimately, he hopes to help others—whether through teaching art, creating educational experiences, or caring for animals—so his ambitions blend creativity, knowledge, and service.
