personas:
  professional: Jonathan Ferguson, an eight-year-old budding visual storyteller, blends watercolor painting with a methodical love for LEGO architecture, and they turn every school project into a miniature
    exhibition that showcases their curious mind and organized approach.
  sports: Jonathan Ferguson loves playing soccer with friends after school in the Long Island United youth league, they also root for the New York Knicks and follow the New York Mets during baseball season,
    and they approach each practice with energetic teamwork and meticulous preparation.
  arts: Jonathan Ferguson immerses themselves in artistic expression by recreating Claude Monet’s water lilies in watercolors, listening to the classical piano works of Yo‑Yo Ma, and they often request
    Studio Ghibli films like ‘Spirited Away,’ blending their imaginative curiosity with an appreciation for diverse cultural creations.
  travel: Jonathan Ferguson dreams of hiking the trails of Acadia National Park and exploring the British Museum in London, yet they usually travel with family on weekend trips to nearby Long Island beaches
    and the Smithsonian in Washington, balancing adventurous imagination with the practical limits of school schedules.
  culinary: Jonathan Ferguson favors homemade macaroni and cheese with a generous sprinkle of cheddar, enjoys crafting fruit kebabs with strawberries, bananas, and grapes, and they love experimenting with
    simple pancake batter, though they sometimes sneak extra chocolate chips into the mix, revealing a sweet tooth and methodical kitchen curiosity.
  core: Jonathan Ferguson is an eight‑year‑old curious explorer who channels their organized mind into art, LEGO, and soccer, yet they often worry about missing details and have a habit of over‑packing
    their backpack with crayons and spare rocks.
background:
  cultural: Jonathan was born and raised in Oakdale, a suburban community in Suffolk County, New York. His family belongs to the broader white, European‑American demographic typical of the area, and they
    embrace mainstream American customs such as celebrating Thanksgiving, Christmas, and the Fourth of July. He attends a local public elementary school where community values emphasize education, extracurricular
    participation, and cooperation. Proximity to New York City provides occasional exposure to diverse cultural institutions—museums, theaters, and music venues—that have nurtured his appreciation for art
    and unconventional ideas. Family routines include library visits, community fairs, and involvement in neighborhood programs, reinforcing his sociable and community‑oriented nature.
