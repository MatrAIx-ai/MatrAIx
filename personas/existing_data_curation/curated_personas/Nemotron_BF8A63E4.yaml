  career_goals: Enid aspires to pursue a career that combines her love for helping others with her knack for structure and organization. She dreams of becoming an elementary school teacher, where she can
    create a supportive, orderly classroom environment and mentor younger students. In the short term, she aims to excel in high school, earn a scholarship, and gain leadership experience through student
    council and volunteer tutoring. Ultimately, she hopes to attend a university with a strong education program, obtain a teaching credential, and perhaps later specialize in special education to support
    students with diverse learning needs.
