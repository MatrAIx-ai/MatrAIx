  career_goals: Hannah dreams of becoming a teacher one day, picturing a classroom where she can create predictable daily schedules, help children learn, and nurture a caring community. She also imagines
    working as a veterinarian because she loves animals and wants to care for them. Occasionally, she expresses fascination with astronauts and space exploration, seeing it as a far‑off adventure she might
    explore when she’s older.
