personas:
  professional: Hannah Smiley, a junior student council representative at their elementary school, harnesses their love of routine and practical mindset to organize weekly class meetings, ensure craft stations
    are set up efficiently, and lead peers with a blend of assertive confidence and compassionate cooperation.
  sports: Hannah Smiley, a spirited member of the Willow Creek Youth Soccer Club, thrives on after‑school drills and friendly matches, cheers for the Los Angeles Dodgers during baseball season and the Seattle
    Sounders in soccer, and balances their athletic routine with weekly dance class cardio, always approaching competition with pragmatic optimism.
  arts: Hannah Smiley, an enthusiastic sketchbook artist, fills pages with vivid animal scenes inspired by the vibrant worlds of Disney’s “The Lion King” and Studio Ghibli’s “My Neighbor Totoro,” while
    humming pop tunes from Ariana Grande and Taylor Swift, turning each drawing session into a personal gallery displayed on their bedroom wall.
  travel: Hannah Smiley, a curious young traveler, prefers structured family road trips to familiar spots like the nearby state park’s nature trail and the local beach resort, while dreaming of a future
    adventure to Disney World’s Magic Kingdom and the ancient ruins of Machu Picchu that captivate their after‑school reading.
  culinary: Hannah Smiley, a budding kitchen helper, delights in preparing cheesy macaroni, strawberry‑banana smoothies, and crispy chicken nuggets, loves sprinkling colorful sugar crystals on cupcakes,
    and enjoys arranging fruit kebabs with pineapple and grapes during weekend family meals.
  core: Hannah Smiley, a routine‑loving, socially vibrant seven‑year‑old, channels boundless creativity into drawing and soccer while battling intense bouts of anxiety that make bedtime routines both a
    refuge and a challenge.
background:
  cultural: Hannah comes from a White, Midwestern American background, growing up in Columbus, Ohio. Her family embraces typical Midwestern values such as friendliness, community involvement, and a strong
    work ethic. They celebrate American holidays like Thanksgiving, the Fourth of July, and enjoy seasonal events such as the Ohio State Fair and local church gatherings. These cultural experiences, combined
    with suburban family life and school community participation, shape her sense of tradition, belonging, and practicality.
