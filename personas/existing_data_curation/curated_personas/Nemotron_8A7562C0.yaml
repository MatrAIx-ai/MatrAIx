  career_goals: James dreams of a future where he can work independently while expressing his love for art and discovery. He often says he wants to become a children's book illustrator so he can bring his
    quiet observations to life on the page without needing to be in bustling office settings. He also imagines becoming a wildlife photographer, spending solitary hours in nature capturing moments that
    speak to his curiosity about the natural world. Occasionally, he talks about designing his own video game that encourages creativity, merging his drawing skills with the coding basics he enjoys. Overall,
    his ambitions center on careers that offer solitude, flexibility, and the freedom to explore unconventional ideas.
