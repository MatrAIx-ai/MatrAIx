personas:
  professional: Maricruz Soto is a bilingual office administrator who applies her curiosity‑driven problem‑solving and practical mindset to streamline data entry, scheduling and bookkeeping with Microsoft
    Office, Google Workspace, and QuickBooks, while preferring a flexible, loosely‑structured environment that lets her balance occasional disorganization with a collaborative, supportive style as she prepares
    to step into an office manager role.
  sports: Maricruz Soto enjoys weekend walks and light jogs on the scenic trails of Point Defiance Park, participates in the local Puget Sound Hiking Club, and avidly follows the Seattle Seahawks in the
    fall and the Seattle Kraken during the winter hockey season.
  arts: Maricruz Soto relaxes to a blend of regional folk tunes and contemporary Spanish‑language pop from artists like Bad Bunny and Karol G, devours personal‑development titles such as "The Power of Now,"
    and occasionally joins community cultural festivals featuring traditional dance and live music.
  travel: Maricruz Soto prefers loosely planned road trips that combine photography with relaxation, having explored the rugged coastline of Olympic National Park, the culinary scene of Portland, and the
    historic waterfront of Vancouver, while keeping an eye on family budget constraints.
  culinary: Maricruz Soto delights in preparing comforting dishes like tamales, pozole, and mole—using masa corn, dried chilies, and a hint of chocolate—and channels that passion into a small home‑based
    bakery that sells sweet breads and pastries at Tacoma’s farmers markets.
  core: Maricruz Soto balances a curious, practical outlook with a love for tradition, a flexible yet occasionally chaotic work style, and a growing entrepreneurial drive fueled by a stress‑prone but resilient
    spirit.
background:
  cultural: Maricruz was raised in a Mexican‑immigrant family that settled in the Puget Sound region when she was a child. Raised bilingual, she grew up speaking Spanish at home and English at school, preserving
    many Mexican traditions such as Día de los Muertos, family‑centered celebrations, and weekly cooking of heritage recipes. While she embraces her Mexican heritage, she also identifies with the Pacific
    Northwest lifestyle, enjoying the region’s natural beauty and community events. This bicultural experience shapes her work ethic—valuing hard work, respect for hierarchy, and close family ties—while
    informing her social life, which often revolves around Mexican‑American gatherings in Tacoma’s vibrant cultural scene.
