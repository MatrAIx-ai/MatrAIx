  career_goals: She aims to transition from her current clerical role to an office manager or operations coordinator position within the next three to five years. To achieve this, she plans to enroll in
    a certificate program in administrative leadership or project management, strengthening her organizational and supervisory skills. Maricruz also hopes to improve her personal stress management by incorporating
    mindfulness techniques into her routine, allowing her to handle the pressures of a higher‑level role. In parallel, she dreams of launching a small home‑based business selling authentic Mexican baked
    goods at Tacoma’s farmers markets, blending her cultural roots with entrepreneurial curiosity.
