persona_description: A professor at the Technical University of Munich (TUM) who specializes in the study of river and stream ecology, particularly the impact of human activities such as intensive agriculture
  and erosion on aquatic habitats and the need for more space, diversity, and freedom for rivers. The professor's research focuses on the extent and causes of siltation in headwater stream beds, the importance
  of natural change in riverbed dynamics, and the need for river floodplains to be off-limits for human intervention. The professor's expertise lies in the analysis of riverbed samples over the course of
  several years, and he warns that humans must give rivers the freedom to determine their own shape and shape renaturation measures.
