personas:
  professional: Corazón Alonso, a seasoned radiologic technologist with three decades of hands‑on experience across X‑ray, CT, and MRI, merges their meticulous safety expertise and artistic composition
    skills to mentor newcomers, lead radiation‑safety committees, and spearhead community health‑screening events as they prepare to head a radiology education program at the local college.
  sports: Corazón Alonso stays active by attending weekly salsa dancing classes, leading a senior walking club through the Everglades trails, playing low‑impact tennis at the local YMCA senior league, and
    cheering for the Miami Heat while they occasionally join Tampa Bay Buccaneers fan watch parties during football season.
  arts: Corazón Alonso nurtures their artistic soul through watercolor portraits of Floridian sunsets inspired by Monet and O'Keeffe, curates community photography walks featuring native Everglades flora,
    and sings in a local choir interpreting pieces by Carlos García Vives, while they regularly attend gallery openings showcasing works by contemporary artists such as Alma López.
  travel: Corazón Alonso prefers meticulously planned road trips that blend photography excursions and cultural immersion, having explored the Everglades, the historic streets of San Antonio, and the art‑laden
    alleys of Barcelona, while they dream of a future pilgrimage to Oaxaca’s ancient ruins and the vibrant markets of Puebla, all balanced by a modest travel budget and occasional family commitments.
  culinary: Corazón Alonso channels their culinary passion into seasoned mole poblano, tender tamales wrapped in corn husks, and herb‑infused ceviche, skillfully blending fresh epazote, chiles ancho, and
    garden‑grown cilantro, while they savor occasional farm‑to‑table brunches at local bistros and share their homemade feast with friends during community gatherings.
  core: Corazón Alonso, a vivacious 65‑year‑old radiology veteran, fuses scientific precision with an artist’s eye, swivels through salsa routines between safety briefings, keeps an ever‑growing stash of
    watercolor paints on the kitchen counter, and they habitually postpone their own dental check‑ups for the sake of community projects.
background:
  cultural: Corazón was born in Jalisco, Mexico, and moved to Florida with her husband in her early thirties. She maintains strong ties to her Mexican heritage through language, cuisine, and celebrations
    such as Día de los Muertos and Las Posadas, which she observes with family and the broader Mexican‑American community in DeSoto County. Fluent in both Spanish and English, she often serves as a cultural
    liaison at the clinic, ensuring that Hispanic patients feel respected and understood. Catholic traditions and a deep sense of family loyalty shape her values, and she frequently participates in community
    festivals that showcase Mexican folk music, dance, and art. Her bicultural experience informs her empathetic approach to patient care and fuels her commitment to preserving and sharing her cultural
    legacy through cooking, storytelling, and artistic expression.
attributes:
  skills: '["Conventional X‑ray imaging", "Digital radiography (DR) operation", "Computed Tomography (CT) scanning", "Basic Magnetic Resonance Imaging (MRI) assistance", "Radiation safety and dose optimization",
    "Quality control and image quality assurance", "Patient positioning and communication", "Medical terminology and anatomy knowledge", "Bilingual communication (Spanish/English)", "Mentoring and training
    of junior technologists", "Community health‑screening coordination", "Introductory photography for medical documentation", "Basic digital image editing (e.g., Photoshop, Lightroom)"]'
  hobbies: '["Watercolor painting", "Nature photography", "Visiting museums and art galleries", "Traditional Mexican cooking", "Salsa dancing", "Herb gardening", "Volunteering at local senior center", "Reading
    biographies of artists and medical pioneers", "Community choir singing", "Organizing photo‑walks for seniors"]'
  career_goals: Hoping to transition into a mentorship‑focused role, Corazón aims to lead a radiology education program at the local community college, where she can share her decades of expertise with
    aspiring technologists. She plans to attain the Advanced Imaging certification through the American Registry of Radiologic Technologists (ARRT) to stay current with emerging modalities such as PET/CT.
    Within her department, she aspires to chair the radiation safety committee, championing the adoption of low‑dose protocols and patient‑centered imaging practices. Outside the clinic, she envisions launching
    a volunteer‑driven art‑and‑healing project that brings curated local artwork and photography exhibitions to the waiting rooms of healthcare facilities in DeSoto County, enhancing patient comfort and
    community connection.
