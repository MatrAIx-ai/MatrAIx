    cybersecurity awareness and incident response'', ''accessibility support for users with disabilities'', ''team mentorship and onboarding'']'
  hobbies: '[''swing dancing'', ''herb gardening'', ''historical fiction reading'', ''digital literacy volunteering'', ''soul food cooking'', ''community festival attendance'', ''genealogy research'', ''quilting'',
    ''walking with dog'', ''traveling to historic sites'']'
  career_goals: Even at 82, Theresa aims to leave a lasting legacy in the tech community. She plans to formalize a mentorship program that pairs senior IT professionals with emerging talent, especially
    from underrepresented backgrounds. She also wants to expand her volunteer work by establishing a free digital‑literacy clinic at a local community center, helping seniors bridge the digital divide.
    Additionally, she hopes to author a practical guide titled “Aging Gracefully with Technology,” capturing her decades of experience and tips for staying resilient in a rapidly changing tech landscape.
    Her ambition includes staying current with emerging tools like AI‑driven assistants to better serve her clients and community.
