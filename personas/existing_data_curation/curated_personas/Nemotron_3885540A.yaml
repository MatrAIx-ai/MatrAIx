personas:
  professional: Theresa Eaddy is a seasoned IT consultant renowned for diagnosing hardware failures with razor‑sharp efficiency, translating complex tech jargon into clear guidance for small businesses
    and community groups, and channeling an organized ticket‑management style and calm resilience into every support call.
  sports: Theresa Eaddy stays active by walking her golden retriever through City Park five mornings a week, joining a senior swing‑and‑jazz dance circle that meets on Thursdays, and cheering passionately
    for the Denver Broncos and Colorado Rockies while occasionally playing gentle tennis at the Denver Senior Recreation Club.
  arts: Theresa Eaddy expresses creativity through a vibrant quilting circle that reimagines classic patterns inspired by Faith Ringgold and Jacob Lawrence, while also delighting in swing dancing to the
    timeless sounds of Ella Fitzgerald and Duke Ellington at community festivals.
  travel: Theresa Eaddy prefers thoughtfully planned trips that blend heritage and relaxation, having toured the civil‑rights landmarks of Selma and Montgomery, the historic Gullah‑Geechee villages of South
    Carolina, and now dreaming of a guided tour of the National Museum of African American History and Culture in Washington, D.C., while always budgeting each journey in a detailed spreadsheet.
  culinary: Theresa Eaddy, an adept home chef, pairs her herb garden’s basil, rosemary, and thyme with classic soulful dishes like smoked collard greens and baked mac and cheese, reinventing them with roasted
    sweet potatoes, quinoa, and reduced‑sodium sauces to keep meals nutritious yet comforting.
  core: Theresa Eaddy blends razor‑sharp tech expertise, a steadfast calm under pressure, and a love for swing dancing into an 82‑year‑old’s mission to bridge generations through mentorship, all while fiercely
    guarding her step‑by‑step financial spreadsheets and occasionally forgetting to water her basil.
background:
  cultural: Theresa was raised in a close‑knit African‑American family that valued education, community service, and cultural pride. Growing up during the civil‑rights movement, she witnessed the power
    of collective action, which informs her competitive yet collaborative spirit today. In Denver, she remains active in the local Black community, attending church gatherings, celebrating Juneteenth, and
    participating in African‑American cultural workshops. Her culinary traditions—especially soulful cooking—serve as a bridge between generations, and she often shares stories of her ancestors while mentoring
    younger professionals. This rich cultural foundation fuels her resilience, calm demeanor, and dedication to uplifting others through technology and community engagement.
attributes:
  skills: '[''hardware diagnostics'', ''software troubleshooting'', ''network configuration and troubleshooting'', ''remote support (screen sharing, remote desktop)'', ''operating system administration
