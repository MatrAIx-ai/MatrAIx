personas:
  professional: Orestes Rendon, an inquisitive 10‑year‑old who spends his afternoons sketching cartoons and engineering red‑stone contraptions in Minecraft, shows budding problem‑solving skills and, through
    their cooperative spirit, foreshadows a future as a creative technologist.
  sports: Orestes Rendon, a 10‑year‑old hobbyist soccer player who organizes impromptu matches at the neighborhood park and plays for the Powder Springs Youth Soccer Club, idolizes Atlanta United and dribbles
    like a junior Messi, yet often leaves his cleats at home because of a relaxed attitude toward obligations.
  arts: 'Orestes Rendon, a 10‑year‑old who devours graphic novels such as \"Batman: Year One\" by Frank Miller, emulates the dynamic lines of Stan Lee, sketches cartoons inspired by \"Adventure Time\",
    and builds pixel‑perfect structures in Minecraft after watching YouTubers like Mumbo Jumbo, channels that fuel their creative imagination.'
  travel: Orestes Rendon, a 10‑year‑old explorer who spends weekends wandering the Powder Springs trails, has taken family road trips to the Georgia Aquarium and the historic streets of Savannah, dreams
    of camping under the stars in Yellowstone, and prefers spontaneous day trips over meticulously planned vacations, often relying on his parents to handle logistics.
  culinary: Orestes Rendon, a 10‑year‑old kitchen assistant who can whisk together guacamole with ripe avocados, lime juice, cilantro, and a pinch of jalapeño, helps roll fresh tortillas for tacos al pastor,
    and, despite occasional messes from over‑enthusiastic mixing, enjoys the hands‑on experience of creating flavorful snacks for family gatherings.
  core: Orestes Rendon, a curious yet laid‑back 10‑year‑old who builds red‑stone marvels in Minecraft, scores goals at the park, and worries over forgotten tasks, blends boundless imagination with a tendency
    to misplace his own soccer cleats.
background:
  cultural: Orestes is a Mexican‑American raised in Powder Springs, GA. At home Spanish is spoken and family traditions such as Día de los Muertos, quinceañera celebrations, and cooking of tacos and tamales
    are cherished. In the broader community he experiences Southern hospitality, school activities, and a growing local Hispanic network. His bicultural upbringing blends Mexican values of family, respect,
    and community with the friendliness and outdoor lifestyle of the American South.
