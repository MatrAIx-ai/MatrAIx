  hobbies: '[''Soccer'', ''Minecraft'', ''Cooking Mexican dishes'', ''Graphic novels'', ''Drawing'', ''Nature documentaries'', ''LEGO building'', ''Exploring local parks'']'
  career_goals: He dreams of becoming an engineer or inventor who creates tools that make everyday life easier for his family and community. He also imagines someday coaching a youth soccer team or sharing
    his love of Mexican cuisine as a chef, blending his curiosity for how things work with a desire to help others and maintain harmony in his surroundings. While he worries about meeting expectations,
    he sees these goals as ways to combine his practical side with his creative interests.
