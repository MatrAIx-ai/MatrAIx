personas:
  professional: Maliha Khan, a front‑desk coordinator with a calming presence and a keen eye for arranging informational displays, leverages multilingual communication and conflict‑de‑escalation skills
    to enhance visitor experiences while quietly planning a transition into cultural programming and museum outreach.
  sports: Maliha Khan, a dedicated yoga practitioner who occasionally jogs at Klyde Warren Park and follows the Dallas Cowboys and Texas Rangers, channels calm focus into weekly sessions at the Breathe
    & Flow studio while maintaining a casual interest in intramural volleyball.
  arts: Maliha Khan, an avid patron of Denton’s galleries and the Dallas Museum of Art, fills sketchbooks with watercolor studies inspired by Frida Kahlo and Yayoi Kusama, captures candid street scenes
    with a DSLR reminiscent of Walker Evans, and curates playlists ranging from Sufi chants to indie folk artists such as Sufjan Stevens.
  travel: Maliha Khan, who prefers spontaneous weekend getaways over rigid itineraries, often explores art‑centric destinations like Austin’s street‑art district and the historic mission neighborhoods of
    San Antonio, while dreaming of immersive trips to Mexico City’s museum scene and Tokyo’s contemporary galleries.
  culinary: Maliha Khan, a culinary experimenter who blends heritage‑inspired spice blends of cumin, coriander, and turmeric with Tex‑Mex staples, frequently whips up chana masala quesadillas, biryani‑style
    tacos, and vibrant mango‑cilantro salsa.
  core: Maliha Khan, a calm‑yet‑curious 20‑year‑old art enthusiast, balances a relaxed, slightly disorganized lifestyle with a deep commitment to community‑driven cultural projects and creative expression.
background:
  cultural: Maliha is a second‑generation Pakistani‑American whose family maintains strong cultural traditions while embracing life in Texas. She grew up speaking Urdu at home and English at school, celebrating
    Islamic holidays such as Eid al‑Fitr and Eid al‑Adha, observing Ramadan, and marking Pakistan’s Independence Day with family gatherings. The Khan household emphasizes hospitality, respect for elders,
    and communal meals, often featuring biryani, samosas, and regional sweets. Exposure to South Asian poetry, music, and calligraphy sparked her early love for the arts. In Denton, she is active in the
    local South Asian Student Association, attending cultural festivals, sharing Pakistani cuisine, and helping organize events that introduce South Asian heritage to the broader community.
attributes:
  skills: '["Customer service", "Effective verbal communication", "Active listening", "Bilingual (English and Urdu)", "Data entry", "Appointment scheduling", "Office software (Microsoft Office, Google Workspace)",
