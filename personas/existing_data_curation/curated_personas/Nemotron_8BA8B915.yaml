  hobbies: '["Visiting art galleries and museums", "Sketching and watercolor painting", "Cooking South Asian and fusion dishes", "Reading contemporary literature and philosophy", "Photography (street and
    portrait)", "Listening to world music and indie podcasts", "Attending local cultural festivals", "Practicing yoga and mindfulness", "Volunteering at community centers", "Participating in South Asian
    student association events"]'
  career_goals: Maliha aims to transition from a receptionist role into a position that blends public engagement with cultural programming. She plans to complete a bachelor's degree in Communications or
    Arts Administration while continuing her work, then pursue a graduate certificate in Cultural Management. Her long‑term ambition is to become a community outreach coordinator for a local art museum
    or cultural center in the Dallas‑Fort Worth area, where she can curate inclusive events that highlight South Asian and other underrepresented artists. She also hopes to launch an online platform that
    documents and promotes multicultural artistic projects across Texas.
