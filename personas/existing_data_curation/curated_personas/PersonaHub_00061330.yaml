persona_description: A web developer who is designing and styling a website for the first time. The developer is a self-taught web developer with a passion for creating visually appealing and user-friendly
  websites. The developer is looking to create a website that is easy to navigate and has a clear purpose. The developer is interested in using user-centered design principles and task-based organization
  to create effective web documents. The developer is also interested in conducting user tests and using clear headings, link texts, and minimum number of links per page. The developer is looking for a
  professional graphics designer to help design the website's graphics and a standard set of graphical elements. The developer is also interested in developing standard page layouts and using headings,
  lists, and horizontal rules to make the information visually apparent to the student. The developer is also interested in aggressive maintenance of the focus of the website and moving secondary information
  to separate pages or removing it entirely.
