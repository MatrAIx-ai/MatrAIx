  career_goals: In retirement, Kelvin’s primary ambition is to give back to the community that supported his journey. He aims to establish a scholarship for Black high‑school students pursuing STEM, volunteer
    as a coding mentor at the local library, and partner with Bay Area tech firms to create internship pipelines. He also plans to author a memoir chronicling his experiences as a Black engineer during
    the civil‑rights era, preserving that history for future generations. Maintaining personal health is another goal—he intends to stay active through a senior walking club, regular health screenings,
    and mindfulness practices to manage his natural tendency toward worry. Finally, Kelvin hopes to serve on the board of a senior‑advocacy nonprofit, championing mental‑health resources for older adults.
