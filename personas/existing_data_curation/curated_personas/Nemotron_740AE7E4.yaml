personas:
  professional: Carlos Soto, a seasoned electrical and electronics engineer with over three decades of experience designing high‑density printed circuit boards, complex power distribution systems, and renewable‑energy
    integrations, they blend curiosity with pragmatism to deliver code‑compliant, client‑focused solutions while thriving as the sociable hub of multidisciplinary project teams.
  sports: Carlos Soto hikes the Watchung Mountain trails each weekend, volunteers as an assistant coach for a local youth soccer team, follows the New York Giants and the New York Knicks with enthusiastic
    weekly viewing parties, and they enjoy occasional pickleball matches at the community center to stay active.
  arts: Carlos Soto plays acoustic guitar at community gatherings, dances salsa to the rhythms of Rubén Blades and Marc Anthony, appreciates marimba performances at local cultural festivals, maintains a
    vinyl collection featuring Carlos Vives and The Beatles, and they often hum the tunes while troubleshooting circuitry.
  travel: Carlos Soto’s travel style blends curiosity and comfort, having explored the rainforests and beach towns of his ancestral homeland, toured renewable‑energy sites in Iceland, taken a road trip
    through the historic streets of Seville, and they are currently planning a tech‑focused visit to Japan’s smart‑grid innovation hubs.
  culinary: Carlos Soto cooks gallo pinto, ceviche, and arroz con pollo with generous portions of black beans, lime, cilantro, and ripe mango, experimenting with a cast‑iron skillet and occasionally over‑salting
    the rice, and they love pairing each meal with freshly squeezed mango juice or a cold craft cerveza.
  core: Carlos Soto is a sociable, curiosity‑driven engineer who balances green‑tech ambition with community‑centric hobbies, occasional financial splurges, and a handful of health quirks, and they approach
    life with an optimistic, collaborative spirit.
background:
  cultural: Carlos grew up in a bilingual Costa Rican household, absorbing the 'pura vida' philosophy that emphasizes optimism, hospitality, and community harmony. His parents instilled in him a deep respect
    for collective well‑being, which is reflected in his compassionate approach to teamwork and volunteerism. He celebrates Costa Rican traditions such as Día de los Faroles, enjoys the rhythms of marimba
    and salsa, and frequently prepares dishes like gallo pinto and ceviche for his New Jersey friends. While fully integrated into the cultural mosaic of Clinton, NJ, Carlos maintains strong ties to the
    Costa Rican diaspora, participating in local cultural festivals and serving as a bridge between his heritage and his American professional life.
attributes:
  skills: '["Electrical power system design", "Printed circuit board (PCB) layout and fabrication", "Renewable energy integration (solar PV, battery storage)", "Industrial automation and PLC programming",
    "Embedded systems development (C, Python)", "Project management and scheduling", "Technical troubleshooting and root‑cause analysis", "Regulatory compliance (NEC, IEC)", "Cross‑functional team leadership",
    "Mentoring and training junior engineers", "IoT and smart device integration", "Data analysis and visualization"]'
  hobbies: '["Hiking the Watchung Mountains", "Birdwatching", "STEM mentorship at local high school", "Playing acoustic guitar", "Salsa dancing", "Cooking traditional Costa Rican meals", "Attending tech
    meetups and seminars", "Reading science‑fiction literature", "Woodworking", "Organic vegetable gardening", "Traveling to Central America", "Participating in community environmental clean‑up events"]'
  career_goals: Looking ahead, Carlos aims to transition into a consulting role where he can guide municipalities and small businesses in New Jersey toward sustainable energy solutions and smart‑grid upgrades.
    He plans to earn a PMP certification and a LEED Green Associate credential to strengthen his project and sustainability expertise. Parallel to his consultancy work, he wants to establish a community‑focused
    STEM outreach program that pairs high‑school students with real‑world engineering projects, leveraging his network to secure volunteer mentors and industry partnerships. Over the next five years, Carlos
    envisions publishing a series of technical articles on renewable integration and serving as a speaker at regional engineering conferences, thereby shaping the next generation of engineers while contributing
    to the resilience of his local community.
