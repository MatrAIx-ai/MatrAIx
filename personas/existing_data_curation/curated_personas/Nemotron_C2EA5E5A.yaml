personas:
  professional: Liliana Pace, a 14‑year‑old budding robotics enthusiast, merges her love for speculative science‑fiction with hands‑on LEGO and Scratch projects, entering school robotics competitions with
    a methodical yet adaptable mindset that mirrors her blend of curiosity and practicality.
  sports: Liliana Pace is a dedicated skateboarder at the Modesto Skatepark, a regular participant in the local youth roller‑derby league, enjoys weekend hikes in the Sierra foothills, follows the Modesto
    Nuts minor‑league baseball team for community spirit, and keeps an eye on the Sacramento Kings for basketball inspiration.
  arts: Liliana Pace immerses herself in sci‑fi literature by reading Octavia Butler and Neal Stephenson, listens to the indie rock band Paramore and classic film scores by Ennio Morricone, and enriches
    her performance skills through the school drama club, where she recently portrayed Hermia in a production of 'A Midsummer Night's Dream'.
  travel: Liliana Pace’s travel experiences blend local adventure with broader horizons, having hiked the trails of Yosemite National Park, explored the historic gold‑rush town of Columbia, and planning
    a family trip to Florence to trace the roots of her Sunday pasta tradition, while also hoping to attend San Diego Comic‑Con for her sci‑fi fandom.
  culinary: Liliana Pace’s palate reflects Sunday family pasta rituals, favoring spaghetti carbonara with pancetta and pecorino, enjoys homemade margherita pizza fresh with basil, and often crafts protein‑rich
    smoothies of banana, almond milk, and spinach after skate sessions.
  core: Liliana Pace is a pragmatic, curiosity‑driven teen who balances high‑tech tinkering with community traditions, competes fiercely in robotics, safeguards a modest allowance for future gadgets, and
    occasionally procrastinates on schoolwork in favor of building LEGO sets.
background:
  cultural: Liliana comes from a middle‑class, Italian‑American family rooted in Modesto, California. Her family traditions include Sunday pasta meals, Catholic celebrations, and community involvement in
    local festivals. Growing up in Stanislaus County, she is exposed to a blend of agricultural heritage and a diverse, multicultural neighborhood, which informs her practical outlook and appreciation for
    both established customs and innovative ideas.
attributes:
  skills: '["Critical thinking and skepticism","Project organization and time‑management","Basic coding with Scratch","Robotics prototyping","Google Workspace proficiency","Strategic teamwork in soccer","Stress‑resilient
    collaboration"]'
  hobbies: '["Science‑fiction reading","LEGO and robotics building","Scratch coding projects","Skateboarding","Hiking and cycling","School debate club","Online 3D‑printing design"]'
  career_goals: Liliana aims to enroll in a high‑school STEM magnet program that will deepen her knowledge of engineering and computer science. She envisions a future as a civil or environmental engineer,
    motivated by a desire to design sustainable infrastructure for California’s Central Valley. Alongside this, she plans to develop a small online business selling custom‑designed 3D‑printed accessories,
    merging her competitive spirit with practical entrepreneurship. Her ultimate ambition is to earn a scholarship to a state university, where she can blend innovative ideas with proven methods to address
    real‑world challenges.
