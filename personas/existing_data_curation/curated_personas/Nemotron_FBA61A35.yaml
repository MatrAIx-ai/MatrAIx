  career_goals: Mohammed aims to move into a supervisory role within his venue, overseeing a team of attendants and training new staff in both service excellence and cultural sensitivity. He hopes to develop
    a small side program that organizes monthly cultural nights showcasing Central Asian music, dance, and cuisine for the Houston community. Long‑term, he envisions mentoring younger workers, creating
    a network that blends entertainment expertise with his love for art and multicultural exchange, while securing a stable income that eases his anxiety about financial uncertainty.
