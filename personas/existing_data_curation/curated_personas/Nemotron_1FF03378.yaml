personas:
  professional: Claudia Zevallos is a veteran bilingual call‑center specialist whose 25‑year track record of calm de‑escalation, meticulous CRM documentation, and rigorous schedule management drives her
    ambition to design a structured onboarding program that slashes turnover and boosts service quality, while her competitive streak pushes her to mentor newcomers and prove she can lead a team.
  sports: Claudia Zevallos follows professional soccer, cheering for Club América each weekend while balancing weekly bridge matches at the local community center with her husband, and she enjoys occasional
    walking laps at the nearby park to keep her joints from stiffening.
  arts: Claudia Zevallos spends evenings knitting intricate blankets for parish fundraisers, finds solace in listening to the piano ballads of Ludovico Einaudi, and appreciates the bold colors of Frida
    Kahlo’s canvases that inspire her own creative patterns.
  travel: Claudia Zevallos prefers meticulously planned trips, often revisiting historic sites like Santa Fe’s Plaza and dreaming of a cultural weekend in Oaxaca, while balancing her limited retirement
    budget by opting for short road trips to nearby national parks rather than overseas cruises.
  culinary: Claudia Zevallos enjoys preparing classic dishes such as tamales, pozole, and enchiladas, skillfully grinding fresh corn masa, chopping jalapeños and cilantro, and relishes hosting family feasts
    where she serves homemade salsa verde alongside the main course.
  core: Claudia Zevallos is a methodical, competition‑driven call‑center veteran whose love for structured routines, gardening, and knitting tempers her high‑stress job, even as she wrestles with worries
    and occasional splurges on specialty foods.
background:
  cultural: Claudia’s upbringing in a Mexican-American family on the El Paso border has instilled a deep respect for Mexican traditions, Catholic faith, and the value of close-knit family ties. She grew
    up speaking Spanish at home and English at school, giving her a bicultural perspective that informs her communication style and work ethic. Family celebrations, such as Dia de los Muertos and religious
    holidays, remain central to her life, and she regularly shares these customs with her neighbors and coworkers. Her cultural identity blends the warmth of Mexican hospitality with the practical resilience
    required to thrive in a border-city environment.
attributes:
  skills: '[''Bilingual customer support (Spanish/English)'', ''Conflict resolution and de-escalation'', ''CRM and ticketing system management'', ''Data entry and order processing'', ''Schedule planning
