personas:
  professional: Kayla Dzafic, a 29‑year‑old electrical engineer with deep expertise in power electronics, PCB layout, and embedded systems, channels their routine‑oriented, detail‑driven mindset into meticulous
    Altium and MATLAB designs, rigorous UL/IEEE compliance, and clear technical documentation, enabling them to lead cross‑functional teams with confident, pragmatic decision‑making toward senior‑level
    project responsibility.
  sports: Kayla Dzafic maintains a weekly routine of morning runs along Chicago’s Lakefront Trail, participates in a local adult softball league during summer, and roots for the Chicago Cubs, Blackhawks,
    and Bears, balancing structured cardio with casual team sports to sustain both physical health and community connection.
  arts: Kayla Dzafic captures Chicago’s historic architecture through street photography inspired by Vivian Maier, enjoys live blues at Kingston Mines featuring B.B. King tributes, and unwinds with classic
    literature like Jane Austen’s *Pride and Prejudice*, weaving these artistic pursuits into their calendar of weekend leisure.
  travel: Kayla Dzafic plans trips with meticulous itineraries, favoring short weekend getaways such as Door County’s cherry orchards and Milwaukee’s craft breweries, while dreaming of a sustainable European
    tour to Amsterdam and Copenhagen to explore renewable energy innovations, balancing budget constraints with a desire for cultural immersion.
  culinary: Kayla Dzafic prefers cooking simple, seasonal meals—like roasted beet and kale salad with goat cheese, lentil soup, and occasional homemade deep‑dish pizza—leveraging fresh produce from the
    local farmers market and enjoying the ritual of kneading sourdough starter on quiet evenings.
  core: Kayla Dzafic blends a love for routine, technical precision, and community mentorship with a quiet curiosity for outdoor photography and blues music, habitually scheduling every hour of the day
    yet sometimes forgetting to water their balcony garden after an overtime sprint.
background:
  cultural: Kayla was raised in a middle‑class white family in the suburbs of Chicago, with Central European (German‑Polish) ancestry. Her upbringing emphasized Midwestern values of practicality, reliability,
    and community involvement. She celebrates traditional American holidays such as Thanksgiving and the Fourth of July, and maintains a connection to her family’s cultural traditions through occasional
    trips to relatives in the Upper Midwest. Growing up in a diverse city, she appreciates multicultural perspectives and is comfortable speaking basic Spanish, which she uses in community outreach programs.
    Her cultural identity blends mainstream American norms with a strong sense of civic responsibility and a pragmatic outlook on life.
