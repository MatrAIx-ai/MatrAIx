  career_goals: Kayla aims to advance to a senior electrical engineer position within the next three years, leading high‑impact power electronics projects for electric vehicles and renewable energy integration.
    She plans to obtain her Professional Engineer (PE) license and deepen her expertise in system‑level architecture, positioning herself for future roles as a project manager or technical director. Kayla
    is also committed to mentoring junior engineers, especially women entering STEM fields, and to contributing to sustainable technology initiatives that benefit the Chicago community.
