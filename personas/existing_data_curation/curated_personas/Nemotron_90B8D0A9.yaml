  career_goals: Matthew dreams of a future where his love of technology and nature intersect. He aspires to become a robotics or software engineer who designs tools for environmental monitoring, such as
    autonomous drones that track wildlife or water quality. He wants to attend a STEM‑focused high school and eventually a university with strong engineering and computer science programs. While he values
    practical outcomes—creating devices that solve real problems—he also hopes to keep room for creative experimentation and flexibility in his career path, allowing him to explore new ideas as they arise.
