personas:
  professional: Matthew Walle is an aspiring young game modder who blends sci‑fi storytelling with practical redstone engineering in Minecraft, leveraging their curiosity and hands‑on LEGO expertise while
    navigating a delightfully disorganized workflow that values flexibility over strict planning.
  sports: Matthew Walle enjoys weekend bike rides with the Cedar Ridge Trail Club, plays midfield for the local youth soccer team the Oakwood Tigers, and cheers for the River City Royals baseball squad
    on TV, preferring spontaneous outdoor activity over regimented gym routines.
  arts: Matthew Walle channels their love for nature into detailed sketches inspired by Vincent van Gogh’s brushwork while blasting pop hits from Taylor Swift and rock anthems by Imagine Dragons, and they
    unwind with strategy board games like Catan, forging a creative identity that blends visual art, music, and tactical play.
  travel: Matthew Walle favors spontaneous weekend escapades to nearby state parks such as Redwood National Park and dreams of night‑time stargazing in Chile’s Atacama Desert, while family road trips to
    the annual County Fair and a summer visit to Yosemite National Park provide the structured social breaks they appreciate.
  culinary: Matthew Walle delights in crafting homemade mini‑pizzas topped with pepperoni, mushrooms, and a sprinkle of mozzarella, rolls simple sushi with avocado and cucumber after watching online tutorials,
    and can whip up a classic grilled cheese, though they often skip balanced meals when engrossed in marathon Minecraft sessions.
  core: Matthew Walle is a curious 12‑year‑old builder who juggles LEGO towers, Minecraft mods, and starlit sketches, but frequently misplaces their notebook in the backyard and forgets to do homework on
    time.
background:
  cultural: Matthew is a White American raised in Ballwin, a suburban community in St. Louis County, Missouri. He comes from a middle‑class family that places a strong emphasis on education, community involvement,
    and modest, polite interaction—traits often associated with Midwestern culture. He regularly participates in local traditions such as county fairs, Fourth of July fireworks, and holiday gatherings centered
    around family BBQs. While his household reflects the diverse European ancestry common to the region (including German and Irish roots), his upbringing blends respect for tradition with an encouragement
    to pursue STEM interests, creating a balanced cultural foundation that supports both curiosity and practicality.
