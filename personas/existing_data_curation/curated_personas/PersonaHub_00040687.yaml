persona_description: A school district leader who is passionate about leveraging school libraries to support digital transition and professional development. This person is knowledgeable about digital content,
  research, and digital citizenship. They are dedicated to supporting teachers, students, and administrators in their digital learning journey. They recognize the importance of the school library as a flexible
  space and learning hub, and are committed to sharing best practices and leading by example. They understand the potential of the library itself as a digital learning hub and are actively working towards
  supporting, creating, or transforming the school librarian's role to incorporate professional development and coaching for teachers.
