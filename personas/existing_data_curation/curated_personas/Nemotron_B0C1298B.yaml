personas:
  professional: James Mediavilla is an experienced full-stack developer who leverages 15 years of self-taught expertise in JavaScript, React, Python, and .NET to translate concrete business needs into clean,
    maintainable code, while their pragmatic, structured mindset balances Agile rigor with a flexible daily workflow, and they thrive on mentoring junior coders toward collaborative, goal-driven success.
  sports: James Mediavilla dominates the local basketball league as a point guard, cheers loudly for the Dallas Cowboys on Friday night and supports the Texas Legends, regularly hikes around Lake Nasworthy,
    and heads out on deer-hunting trips each fall, all while they keep a competitive edge by tracking personal stats on a fitness app.
  arts: James Mediavilla curates weekend barbecues featuring live sets from Texas blues legend Charlie Sexton and occasional opera arias, throws immersive strategy board game nights with Settlers of Catan
    and Risk, and keeps a curated vinyl collection that spans The Beatles to contemporary indie folk, reflecting their love for communal creativity, and they often host impromptu jam sessions that blend
    acoustic guitar with classic Italian folk tunes.
  travel: James Mediavilla prefers weekend road trips that blend rugged outdoor adventure with cultural flavor, having camped in Big Bend, explored the vineyards of Tuscany, and hiked the Hill Country's
    Enchanted Rock, while they plan future trips to New Zealand's fjords and the Italian Amalfi Coast, always balancing work deadlines with the urge for spontaneous detours.
  culinary: James Mediavilla excels at cooking hearty, family-style meals - hand-rolling spaghetti carbonara, grilling brisket with a secret dry rub of smoked paprika and garlic, and topping homemade pizza
    with fresh mozzarella and basil - while they gamble on a weekend BBQ pit investment and indulge in craft beers, but they often forget to defrost meat in time, leading to last-minute improvisation.
  core: James Mediavilla is a 41-year-old full-stack developer who mixes Texas pragmatism with an Italian-inspired love of communal cooking, thrives on competition in sports and code, and balances a structured
    work ethic with a relaxed, sometimes disorganized, approach to life, and they often switch between meticulously planning a sprint and improvising a weekend BBQ.
background:
  cultural: James was born and raised in San Angelo, Texas, to a family of Italian‑American heritage. His grandparents emigrated from Southern Italy, and while the family has largely assimilated into West
    Texas culture, the influence of Italian cuisine, occasional Sunday pasta meals, and a sense of close‑knit family gatherings remains strong. Growing up in the Texas Panhandle instilled values of self‑reliance,
    hospitality, and a love for community events like county fairs and high‑school sports. He identifies with the friendly, rugged spirit of Texas while also cherishing his Italian roots, which surface
    in holiday traditions, a preference for hearty home‑cooked meals, and an appreciation for craftsmanship—both in cooking and in coding.
