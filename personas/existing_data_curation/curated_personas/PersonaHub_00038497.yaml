persona_description: A composer who has written music for Hollywood films and has also composed for the stage, earning an Oscar for his original music to the 1952 film 'Limelight'. He is also known for
  his composition of waltzes in the F key and for his interest in the works of Leo Tolstoy, a Russian literary figure who also dabbled in composition. He is a polymath and has written a string quartet for
  3 violins and cello that calls for each performer to retune to different pitches. He has also been a guest on television and has composed a number of works, including a large number of pieces for piano.
