  career_goals: Maria aims to advance to a supervisory position within the casino’s security department, where she can mentor junior officers and lead the implementation of upgraded surveillance systems.
    She is working toward the Certified Protection Officer (CPO) credential to formalize her expertise. In the longer term, Maria hopes to establish a small consulting firm that advises regional casinos
    on best‑practice security and risk management, while also creating a retirement plan that balances her need for financial stability with reduced workplace stress.
