personas:
  professional: Alonso Camacho, a bilingual library services specialist who blends meticulous metadata cataloging with imaginative exhibit design, leverages their methodical planning and artistic curiosity
    to craft community programs that preserve diaspora narratives and inspire young readers.
  sports: Alonso Camacho, a sports‑savvy yet low‑key enthusiast, supports Inter Miami CF and the Miami Heat, joins the Miami Striders running club for weekend 5K jogs, and practices yoga twice weekly to
    balance a sedentary desk job.
  arts: Alonso Camacho, an ardent creator who paints abstract watercolors inspired by Frida Kahlo’s color palettes, strums improvisations over son riffs à la Rubén González, curates street‑photography exhibits
    echoing the energetic style of Banksy, and regularly reads poetry by José Martí and contemporary Cuban voices, weaving these influences into workshops for local youth.
  travel: Alonso Camacho, an adventure‑seeker with a modest travel budget, has explored Havana’s historic Old Town and New Orleans’ French Quarter, dreams of strolling Barcelona’s Gothic Quarter and Oaxaca’s
    markets, plans trips around community grant windows, and prefers flexible itineraries punctuated by spontaneous street‑food stops.
  culinary: Alonso Camacho, a passionate home chef, perfects ropa vieja with slow‑cooked beef, crisp tostones brushed with garlic‑mojo, and experimental mole‑inspired sauces seasoned with cumin and bitter
    orange, while occasionally over‑salting the rice but always serving generous portions to friends.
  core: Alonso Camacho, a methodical dreamer, balances an organized library career with nightly watercolor sessions, a habit of over‑packing for spontaneous trips, and an occasional inability to say no
    to a last‑minute festival ticket.
background:
  cultural: Alonso grew up in a bilingual Cuban‑American household in Miami, where Spanish was spoken at home and English dominated school and work environments. His family maintains strong ties to Cuban
    traditions—music, dance, food, and storytelling—while also embracing the multicultural vibrancy of South Florida. This duality has shaped his worldview, fostering a deep respect for heritage alongside
    a curiosity for novel ideas. He participates in local Cuban community festivals, values intergenerational connections, and draws inspiration from the diaspora’s resilience. His cultural lens informs
    his professional focus on preserving and sharing Cuban narratives within broader educational contexts.
attributes:
  skills: '[''Cataloging and Classification'', ''Bilingual Reference Services (English/Spanish)'', ''Digital Archiving'', ''Curriculum Development for Youth Programs'', ''Research Assistance'', ''Project
    Planning and Event Coordination'', ''Community Outreach and Partnerships'', ''Creative Content Curation'', ''Graphic Design Basics for Educational Materials'', ''Public Speaking (Small Group Workshops)'']'
  hobbies: '[''Reading contemporary Cuban literature'', ''Painting abstract watercolors'', ''Playing guitar (son and salsa improvisations)'', ''Cooking traditional Cuban dishes'', ''Urban photography of
    Miami street art'', ''Writing poetry and short stories'', ''Volunteering for youth literacy workshops'']'
  career_goals: Alonso aspires to advance to a senior program coordinator role at a multicultural library or community learning center in Miami, where he can shape inclusive educational initiatives that
    blend art, literature, and technology. He plans to earn a Master’s degree in Library and Information Science to deepen his expertise in digital preservation and information access. Long‑term, he envisions
    leading a city‑wide project to create an open‑access digital archive of Cuban diaspora oral histories and artistic expressions, fostering cross‑generational dialogue and cultural pride. He also hopes
    to mentor emerging librarians from underrepresented backgrounds, championing equitable access to knowledge.
