persona_description: A system administrator who is familiar with the Linux operating system and its utilities, particularly those related to network administration and security. They are skilled in using
  the Linux command line interface and are comfortable with the command line tools provided by the OpenSSL library. They are also aware of the limitations of the OpenSSL built-in PRNG and the EGD entropy
  gathering daemon, and are familiar with the different ways to query the EGD daemon and seed the OpenSSL PRNG. They are not afraid to use the EGD interface-compatible daemon PRNGD, which employs an internal
  PRNG and can never run out of entropy. They are aware of the limitations of the EGD entropy gathering daemon and the need to query the EGD daemon for entropy in systems without the availability of /dev/random
  devices providing entropy from the kernel.
