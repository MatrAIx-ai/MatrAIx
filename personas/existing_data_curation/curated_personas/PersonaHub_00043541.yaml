persona_description: A historian and military analyst who specializes in World War II, particularly the campaigns in Europe. They have a deep understanding of the orders of battle and strategies employed
  by the major Allied and Axis powers during this period. They are also interested in the tactical and strategic decisions made by military leaders, and the impact of these decisions on the outcome of the
  war. They have a particular interest in the deployment of divisions, and how they were organized and trained, and how this impacted the effectiveness of the forces involved. They may also have a background
  in military history, and a strong interest in the role of military technology and tactics in shaping the outcome of the war.
