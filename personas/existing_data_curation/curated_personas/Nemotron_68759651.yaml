  career_goals: Dennis aims to translate his practical know‑how into a certified trade, targeting an apprenticeship in HVAC or electrical work. He plans to obtain his GED within the next year and enroll
    in a community‑college program that leads to an industry‑recognized certification. His long‑term ambition is to launch a small home‑renovation business that balances reliable service with innovative
    DIY solutions, providing steady income and growth opportunities for his family. He also hopes to become a respected community organizer, leveraging his sociable nature to lead local neighborhood initiatives.
