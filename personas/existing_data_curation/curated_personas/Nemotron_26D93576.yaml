  hobbies: '[''abstract painting'', ''reading speculative fiction and philosophy'', ''listening to jazz and blues'', ''playing chess'', ''gardening'', ''creative writing/poetry'', ''attending small art
    talks and book clubs'', ''collecting vintage vinyl records'', ''museum visits and sketching'']'
  career_goals: Kevin aims to curate a solo exhibition of his abstract paintings at a local community center within the next two years, and to author a memoir that intertwines his life story with reflections
    on African‑American art and philosophy. He hopes to develop a regular column in the Danbury library newsletter where he shares insights on abstract thought and cultural heritage. Mentoring is a priority;
    he plans to guide at least three emerging young artists from the Danbury area, helping them build portfolios and find exhibition opportunities. He also aspires to travel to major art institutions such
    as the Metropolitan Museum of Art, MoMA, and the Smithsonian’s National Museum of African American History and Culture to deepen his exposure to diverse art movements. Finally, he wishes to volunteer
    as a docent for local history tours, offering perspectives on Black heritage in Fairfield County.
