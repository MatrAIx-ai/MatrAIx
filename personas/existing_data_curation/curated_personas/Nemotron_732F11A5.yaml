  hobbies: '[ ''Reading historical fiction'', ''Gardening (perennials)'', ''Knitting and crocheting'', ''Birdwatching'', ''Walking rescue dog'', ''Volunteering at local hospice'', ''Small book club meetings'',
    ''Cooking seasonal meals'' ]'
  career_goals: Julee aims to transition into a charge nurse position on her medical‑surgical unit within the next two years, leveraging her organizational strengths and advocacy skills. She plans to obtain
    Certified Wound Care Nurse and Gerontological Nursing certifications to deepen her clinical expertise. Inspired by her curiosity for new technologies, she hopes to develop a patient education program
    focused on chronic disease self‑management that integrates digital tools. Long‑term, she envisions a role in nursing informatics or unit management where she can guide practice improvements while maintaining
    a balance between reliable procedures and innovative solutions.
