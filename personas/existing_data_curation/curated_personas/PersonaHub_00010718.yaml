persona_description: A mathematics educator who is passionate about promoting a problem-solving approach to mathematics and is dedicated to supporting the development of children's understanding of fractions.
  They are skilled in creating a rich and engaging classroom environment that encourages children to think critically and creatively. They have a deep understanding of the importance of rich mathematical
  experiences and appropriate mathematical models in developing a rigorous and meaningful understanding of fractions. They are experienced in using a variety of resources and tools to support the development
  of children's understanding of fractions, including using visual models, providing opportunities for children to work collaboratively, and encouraging children to write and revise their class definitions
  for the 'working wall'. They are also interested in the history of fractions and the development of the array as a powerful tool for thinking about multiplication of fractions.
