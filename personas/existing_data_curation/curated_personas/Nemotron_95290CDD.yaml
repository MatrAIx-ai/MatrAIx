  hobbies: '[''Oil painting'', ''Sketching'', ''Visiting local art galleries'', ''Reading contemporary philosophy and art history'', ''Gardening'', ''Birdwatching'', ''Playing chess'', ''Hiking with spouse'',
    ''Volunteering as a museum docent'']'
  career_goals: He aims to become department chair within the next five years, to lead a cross‑disciplinary program that integrates visual arts into liberal arts curricula. He wants to secure a statewide
    grant to develop an arts‑infused teaching fellowship, publish a series of peer‑reviewed articles on experiential learning, and expand community outreach by partnering with local museums and galleries.
    He also aspires to mentor emerging educators and to complete a master’s in educational leadership, building on his organized, forward‑planning mindset.
