  hobbies: '[''Reading non‑fiction (history, biographies)'', ''Woodworking'', ''Fishing'', ''Chess'', ''Walking/jogging'', ''Listening to classic R&B and jazz'', ''Gardening'', "Cooking traditional Southern
    dishes", ''Model train building'', ''Community volunteer (neighborhood watch)'']'
  career_goals: Approaching retirement age, Berthard aims to secure a senior supervisory role that leverages his decades of practical knowledge while offering a stable routine. He plans to obtain a Certified
    Security Manager (CSM) credential within the next year, positioning himself for a shift‑lead or training coordinator position at the local casino. Long‑term, he hopes to mentor younger guards, streamline
    surveillance procedures, and eventually transition into a part‑time security consultant role that allows him to maintain a predictable schedule and reduce workplace stress.
