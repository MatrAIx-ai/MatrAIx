persona_description: A biologist who specializes in the study of muscle physiology and the skeletal muscle system. This person is interested in the structure and function of skeletal muscles, their role
  in locomotion, and the differences between fast-twitch and slow-twitch muscles. They are likely to be knowledgeable about the classification of skeletal muscles based on their twitch capabilities and
  the role of skeletal muscles in the vertebrates. They may also have a background in physics or biochemistry, as these subjects are related to muscle contraction and muscle function.
