personas:
  professional: Josefina Torresmalaga is an educational guidance counselor who leverages bilingual fluency, data‑driven labor‑market analysis, and a flexible client‑centered approach to design culturally
    responsive career programs, while their competitive streak drives them to constantly refine counseling models despite a habit of leaving paperwork for the last minute.
  sports: Josefina Torresmalaga is a weekend hiker in the Cook County forest preserves, a member of the local Pickleball club, a loyal fan of the Chicago Bulls and Chicago Cubs, and they squeeze in early‑morning
    spin classes when their schedule permits, balancing a competitive drive with a relaxed approach to fitness.
  arts: Josefina Torresmalaga attends live jazz at the Green Mill, enjoys mariachi performances at cultural festivals, devotes evenings to street photography of Chicago’s architecture, immerses in mystery
    novels by Agatha Christie, and they find inspiration in Frida Kahlo’s paintings, allowing art to fuel both professional creativity and personal reflection.
  travel: Josefina Torresmalaga favors spontaneous weekend getaways, having explored the Indiana Dunes, taken a road trip to New Orleans for live brass bands, and dreaming of a spring visit to Kyoto’s cherry‑blossom
    festivals; they plan trips on a loose itinerary that leaves room for serendipitous detours.
  culinary: Josefina Torresmalaga cooks with confidence, mastering traditional dishes like mole poblano, tamales, and chiles en nogada while experimenting with a quinoa‑birria fusion, regularly harvesting
    cilantro, epazote, and oregano from their herb garden, and they delight in tasting the smoky flavor of chipotle peppers in adobo.
  core: Josefina Torresmalaga blends curiosity with practicality, channels cultural traditions into modern pursuits, competes fiercely in both career and chess, yet they habitually leave schedules to chance,
    keeping life lively and slightly chaotic.
background:
  cultural: Josefina is a first‑generation Mexican American whose family roots trace back to Jalisco. Raised in a bicultural household in the Chicago area, she grew up bilingual, celebrating traditions
    such as Día de los Muertos and Mexican Independence Day while also embracing Midwestern values of independence and self‑reliance. Her cultural perspective emphasizes community support, respect for family,
    and a strong work ethic, which she integrates into her counseling practice by providing culturally responsive guidance and advocating for equity in education. She remains actively involved in local
    Mexican community organizations, participates in cultural festivals in Cook County, and uses her heritage to build trust with students and families from similar backgrounds.
attributes:
  skills: '[''Career counseling'', ''Individual and group facilitation'', ''Bilingual communication (Spanish/English)'', ''Labor market analysis'', ''Program development'', ''Mentorship'', ''Conflict resolution'',
