  hobbies: '[''Cooking Mexican cuisine'', ''Exploring Chicago neighborhoods'', ''Attending live music'', ''Reading mystery novels'', ''Gardening'', ''Hiking'', ''Yoga'', ''Volunteering at community centers'',
    ''Street photography'', ''Studying Indigenous Mexican history'', ''Playing chess'']'
  career_goals: Josefina aims to complete a Master’s in Counseling to deepen her clinical expertise and eventually become the Director of Career Services for the Cook County School District. She envisions
    launching a community outreach program that provides career‑readiness workshops for Mexican‑American youth and mid‑career professionals. She also wants to develop an online resource hub featuring bilingual
    guides on emerging industries, publish a guidebook on navigating college and career pathways for bicultural families, and present her innovative counseling models at national conferences. Over the long
    term, she hopes to establish a private consulting practice focused on career transitions for adults in their 40s and 50s.
