  career_goals: Maria aims to advance to a senior leadership role such as Director of Community Development within a progressive property management firm, where she can champion sustainable and affordable
    housing initiatives in the Bay Area. She plans to earn a LEED Accredited Professional credential and deepen her expertise in smart-home technology to create energy-efficient communities. Over the next
    five years, she envisions managing a portfolio of mixed-use developments that incorporate artist-led public spaces, reflecting her love of art and unconventional ideas. Additionally, Maria hopes to
    mentor emerging property managers, particularly women and members of the Latino community, and eventually launch her own boutique firm that blends culturally responsive community management with innovative
    design solutions.
