  hobbies: '[''Painting (watercolor)'', ''Visiting Local Art Galleries'', ''Cooking Mexican Cuisine'', ''Hiking Bay Area Trails'', ''Yoga and Mindfulness Practice'', ''Rooftop Gardening'', ''Reading Science
