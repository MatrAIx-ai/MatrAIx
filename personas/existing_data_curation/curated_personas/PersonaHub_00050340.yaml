persona_description: A food safety manager who is responsible for ensuring that food businesses comply with relevant legislation and best practice guidelines to prevent food poisoning, food spoilage, food
  contamination, allergic reactions, loss of productivity, pest infestations, prosecution for contravention of food safety legislation, and closure of catering operations by enforcement authorities. This
  persona is likely to have a strong background in food science, food safety management, and regulatory compliance. They are responsible for conducting audits of food safety documentation, practices, and
  procedures, and ensuring that food businesses are compliant with relevant legislation and best practice guidelines.
