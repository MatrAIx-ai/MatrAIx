persona_description: A group of scientists studying the processing of nutrients in large rivers, specifically focusing on nitrogen and phosphorus, and their impact on aquatic life. They are using sensors
  to measure nutrient uptake and retention in the rivers, and are collecting data on the biologically reactive nature of these pipes. The team is studying five rivers in two states over three weeks, and
  is using a nomadic lifestyle to collect data. Their goal is to determine how well these rivers remove or retain nutrients from the water and manage them for their nutrient uptake.
