  hobbies: '[''Book club'', ''Senior‑center dance classes'', ''Urban gardening'', ''Knitting and crocheting'', ''Walking on Revere Beach'', ''Visiting maritime museums'', ''Church volunteer work'', ''Genealogy
    research'']'
  career_goals: Although retired from formal employment, Cristy aims to deepen her impact in the Revere community. She plans to lead a neighborhood garden project that brings together seniors and youth,
    serve as a mentor for new volunteers at the local senior center, and organize intergenerational events that celebrate local history. She also aspires to learn more about digital storytelling so she
    can record and share her family's genealogy for future generations, and hopes to travel with a small group of friends to historic sites along the New England coast.
