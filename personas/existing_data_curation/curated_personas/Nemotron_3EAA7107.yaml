personas:
  professional: Demetrice Whiting, a veteran material-handling specialist with decades of forklift and inventory management experience, blends a meticulous eye for safety with a practical curiosity about
    conveyor mechanics as they transition toward an OSHA-30-certified supervisory role that lets them mentor younger workers while reducing physical strain.
  sports: Demetrice Whiting spends weekends hiking the Santa Fe foothills with the local Trailblazers Hiking Club, follows New Mexico United soccer and the Denver Broncos football teams, occasionally joins
    a community fly-fishing group on the Rio Grande, and prefers low-impact cardio over gym workouts to maintain flexibility without overexertion.
  arts: Demetrice Whiting captures the desert's muted palette through analog photography while listening to classic jazz icons such as Miles Davis and R&B legends like Otis Redding, occasionally dabbles
    on the harmonica in homage to Little Walter, and attends quarterly exhibitions at the Santa Fe Plaza featuring artists like Georgia O'Keeffe and contemporary Pueblo pottery, allowing music and visual
    art to color their solitary reflections.
  travel: Demetrice Whiting prefers thoughtfully planned road trips that blend photography and quiet contemplation, having visited Arches and Zion National Parks for sunrise shoots, a weekend fishing retreat
    on Lake Powell, and dreaming of a spring visit to Kyoto's historic temples to capture cherry-blossom shadows, all while balancing a modest budget and a desire for low-stress itineraries.
  culinary: Demetrice Whiting enjoys cooking garden-fresh roasted carrots, corn-salsa quinoa, and pan-seared trout caught on local waters, seasoning with cumin, cilantro, and smoked paprika, while their
    modest culinary skill shines in simple, wholesome meals paired with a robust espresso and occasional indulgence in New Mexican green chile stew at a neighborhood taqueria.
  core: Demetrice Whiting is a detail-oriented, solitary problem-solver who balances a love of desert photography, jazz, and gardening with a lingering worry about safety and a habit of over-planning every
    project.
background:
  cultural: Demetrice is a second‑generation African American who grew up in the modest Black community of Santa Fe. His parents migrated from the South during the mid‑1970s, bringing with them the soul
    food cuisine, gospel music, and a strong sense of community responsibility that continue to shape his identity. Living in a city where Hispanic and Native American cultures are prominent, he has woven
    elements of New Mexican traditions—such as the love of chilies, local art, and communal festivals—into his daily life. This blended heritage informs his respect for both his Black roots, with its emphasis
    on perseverance and solidarity, and the broader multicultural tapestry of Santa Fe, fostering a deep appreciation for diverse perspectives and a commitment to nurturing harmony within his surroundings.
attributes:
