personas:
  professional: Shannon Leever, a licensed clinical psychologist with a robust STEM background, blends evidence‑based CBT, neuropsychological assessment, and advanced statistical analysis to design flexible,
    community‑driven mental‑health programs while juggling a spontaneous work style that often clashes with academic deadlines, and they regularly adapt their methods to meet the unpredictable needs of
    their clients.
  sports: Shannon Leever leads spontaneous group hikes in nearby mountain ranges, attends Vinyasa yoga sessions at a local studio, roots for the Seattle Seahawks each fall, and they join a casual co‑ed
    volleyball league organized by the community theater group on weekends.
  arts: Shannon Leever hosts monthly improv comedy nights, directs community theater productions of classics like 'A Streetcar Named Desire', leads a book club that spends evenings dissecting works by Maya
    Angelou and Haruki Murakami, records a podcast featuring guests such as Dr. Oliver Sacks and comedian John Mulaney, and they find constant inspiration in the music of Nina Simone and the paintings of
    Vincent van Gogh.
  travel: Shannon Leever prefers spur‑of‑the‑moment road trips, often filling the car with friends for drives along the Pacific Coast Highway, exploring Portland’s food carts, hiking the Grand Tetons, and
    they dream of a future retreat in Sedona, balancing a modest budget and occasional work‑related travel constraints.
  culinary: Shannon Leever experiments in the kitchen with a moderate skill level, frequently whipping up Thai green curry with fresh lemongrass and chilies, mastering Ethiopian injera, crafting Mediterranean
    mezze plates featuring olives and roasted eggplant, and they insist on adding garden‑grown basil to any pasta sauce, though they sometimes burn the garlic when multitasking.
  core: Shannon Leever is a curiosity‑driven, socially vibrant psychologist who channels spontaneous energy into community mental‑health innovation while juggling anxiety‑fuelled stress, occasional financial
    procrastination, and a love of improv, hikes, and experimental cooking, and they constantly seek new ways to blend science with art.
background:
  cultural: Shannon grew up in a small Midwestern town in Indiana, where community ties, modesty, and practicality were emphasized. Her family valued education and self‑reliance, fostering a pragmatic yet
    curious worldview. The regional culture’s friendly, direct communication style shaped her sociable demeanor. While she identifies with a white, Midwestern heritage, she actively incorporates multicultural
    perspectives into her practice, recognizing the diversity of her clients and advocating for culturally competent care.
attributes:
  skills: '["Cognitive Behavioral Therapy", "Neuropsychological Assessment", "Statistical Analysis", "Research Design", "Psychometrics", "Crisis Intervention", "Group Facilitation", "Client Rapport Building",
    "Interdisciplinary Collaboration", "Mindfulness-Based Interventions", "Telehealth Delivery", "Program Development", "Grant Writing", "Data-Driven Decision Making"]'
  hobbies: '["Improv Comedy", "Community Theater", "Group Hiking", "Gardening", "Yoga", "Cooking Experimentation", "Traveling", "Book Club", "Podcast Hosting", "Volunteering at Youth Centers"]'
  career_goals: Shannon aims to integrate her research background with clinical practice by launching a community‑focused mental‑health program that targets stress and anxiety in adults and adolescents.
    She aspires to become director of a county mental‑health clinic, mentor early‑career psychologists, and publish a series of peer‑reviewed articles on spontaneous, flexible therapeutic approaches for
    high‑stress populations. Additionally, she hopes to develop a digital self‑help platform that combines mindfulness and CBT techniques, and to secure funding for longitudinal studies on the impact of
    community engagement on mental well‑being.
