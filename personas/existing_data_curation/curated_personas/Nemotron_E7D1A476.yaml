  hobbies: '["Adult basketball league", "Hiking in Balcones Canyonlands", "Volunteering at Georgetown Food Bank", "Playing acoustic guitar", "Attending live music concerts", "Car tinkering and DIY projects",
    "Reading nonfiction on entrepreneurship and logistics", "Mindfulness breathing exercises"]'
  career_goals: Steven is motivated to advance beyond the day‑to‑day courier role into a leadership position within the logistics sector. Over the next three to five years, he plans to obtain a Professional
    Transport and Logistics Certification and transition to a logistics coordinator role where he can design route structures for a team of couriers. He envisions eventually becoming an area manager for
    a regional courier company, overseeing operations across multiple counties, or launching a small independent same‑day delivery business that leverages his network and knowledge of the Hill Country market.
    His ambition balances practical career stability with the curiosity to explore innovative delivery technologies, such as electric vehicle fleets and data‑driven route optimization.
