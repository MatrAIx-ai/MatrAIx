personas:
  professional: Steven Feo, a seasoned same‑day courier in Georgetown, blends practical route‑optimization skills with calm, customer‑focused communication, and is actively pursuing a logistics certification
    to transition into a coordinator role overseeing a team of drivers across the Hill Country.
  sports: Steven Feo, a regular on the Georgetown Dribblers adult basketball league, also hikes the Balcones Canyonlands on weekends, follows the Dallas Cowboys and Austin FC, and they proudly wear a vintage
    Texas Rangers cap while volunteering as a water‑station volunteer for the local 5K run.
  arts: Steven Feo, an acoustic‑guitar enthusiast who jams at Georgetown Square after gigs, draws inspiration from Willie Nelson, Kacey Musgraves, and local folk group The Hill Country Ramblers, and they
    attend the annual Georgetown Art Festival to support regional painters and craftspeople.
  travel: Steven Feo prefers road‑trip adventures that blend nature and local flavor—recently exploring the vineyards of Fredericksburg and the limestone caves of New Braunfels, while they dream of a weekend
    getaway to Santa Fe for its art markets and a future cruise along the Gulf Coast.
  culinary: Steven Feo, a devoted fan of authentic Texas barbecue, savors slow‑smoked brisket seasoned with hickory wood and Chatka rub, enjoys cooking chili con carne with jalapeños and cumin on weekend
    cook‑outs, and they never pass up a slice of pecan pie at the annual Hill Country Festival.
  core: Steven Feo merges a community‑centered, hands‑on work ethic with a calm, tech‑savvy curiosity, juggling a love for outdoor teamwork, meticulous financial planning, and a penchant for late‑night
    guitar sessions.
background:
  cultural: Steven comes from a middle‑class white Texan background, raised in the Georgetown area of Williamson County. His upbringing reflects a blend of Southern hospitality, a strong community ethic,
    and the independent spirit typical of the Texas Hill Country. He grew up with a respect for hard work, self‑reliance, and a love for the outdoors, which is evident in his appreciation for local ranches,
    barbecue culture, and regional festivals. Though he attended some college, he has remained rooted in the local community, drawing on the region’s values of practicality and adaptability. His divorce
    has further shaped his independent outlook, emphasizing personal responsibility and resilience.
attributes:
  skills: '["Route planning and optimization", "GPS navigation proficiency", "Time management and scheduling", "Customer service and communication", "Conflict resolution", "Physical stamina and safe driving",
