  hobbies: '[''gardening'', ''quilting'', ''reading historical novels'', ''cooking Southern cuisine'', ''bird-watching'', ''genealogy research'', ''church community events'', ''volunteering at local animal
    shelter'', ''visiting state parks'']'
  career_goals: Tierra aims to deepen her contribution to her community by mentoring younger volunteers at the local animal shelter, documenting her family's oral history and creating a digital archive
    for future generations, and learning new skills such as digital photography to capture local life. She wishes to travel to historic sites across the Southeast, attend workshops on advanced horticulture,
    and eventually author a small cookbook blending traditional Southern recipes with the fresh produce from her garden.
