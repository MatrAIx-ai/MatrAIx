persona_description: A person who is passionate about health and wellness, particularly the fight against HIV/AIDS. They are interested in the Affordable Care Act and its impact on access to healthcare
  coverage and health insurance options for individuals at risk for and living with HIV/AIDS. They are knowledgeable about the Medicaid expansion and its importance for individuals who were previously ineligible
  for Medicaid but remain the population most affected by the HIV epidemic. They are also interested in the ACA's provisions related to prescription drug costs for Medicare recipients, particularly those
  living with HIV and AIDS.
