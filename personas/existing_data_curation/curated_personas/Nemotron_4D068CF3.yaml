  career_goals: He aspires to become a certified food‑safety manager within the next two years, using his associate’s foundation and on‑the‑job experience to move into a kitchen supervisor role. Over the
    next five years, he hopes to transition to a line‑cook position, eventually achieving the title of sous‑chef in a mid‑scale seafood restaurant that reflects the local Pacific‑Northwest terroir. He also
    dreams of opening a modest family‑run café that doubles as a gallery space for local artists, blending his love of food and visual art. Financially, his goal is to provide a comfortable retirement for
    his wife and maintain a stable income while pursuing these culinary milestones.
