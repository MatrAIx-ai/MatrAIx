  hobbies: '[''Playing Soccer'', ''Cooking Traditional Mexican Cuisine'', ''Family Hiking Trips'', ''Participating in Church Choir'', ''Volunteer Health Workshops for Hispanic Community'', ''Reading Historical
    Nonfiction'', ''Gardening'', ''Listening to Mexican Regional Music'', ''Meditation and Yoga'']'
  career_goals: Jorge aims to advance his career by completing an Associate Degree in Nursing (ADN) and becoming a licensed practical nurse (LPN) within the next two years, ultimately progressing to a registered
    nurse (RN) specializing in geriatric and community health. He dreams of leading a multicultural health‑education program that empowers Spanish‑speaking seniors in Cook County to manage chronic conditions.
    Balancing his practical side with his curiosity, he plans to obtain certifications in patient safety and wound management, and to develop leadership skills so he can supervise a team of nursing assistants.
    In the long term, Jorge envisions opening a community health clinic that combines clinical services with culturally tailored wellness workshops.
