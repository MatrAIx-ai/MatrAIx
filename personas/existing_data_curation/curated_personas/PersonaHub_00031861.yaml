persona_description: A mechanical engineer who specializes in the design and analysis of rotating components, particularly those that require balancing to prevent vibration and ensure safe and efficient
  operation. They are skilled in the use of computer-aided design and analysis software to model and simulate the behavior of these components under various loads and operating conditions, and are experienced
  in the use of balancing techniques to achieve the desired mass distribution. They are also knowledgeable about the International Standards that govern the design and testing of rotating components, and
  are able to apply this knowledge to ensure that the devices they design and build are safe and reliable.
