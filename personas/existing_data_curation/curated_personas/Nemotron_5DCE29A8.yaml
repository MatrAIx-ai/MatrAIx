personas:
  professional: Michael Honeycutt, a budding young engineer, loves building intricate LEGO cityscapes and programming simple games in Scratch, using their methodical planning and curiosity to turn imaginative
    ideas into concrete designs.
  sports: Michael Honeycutt plays midfield for the neighborhood youth soccer club at the local park, follows the national soccer team’s World Cup matches and roots for their hometown’s minor league baseball
    team during baseball season, and stays fit by doing daily bike rides and weekly swimming lessons.
  arts: Michael Honeycutt draws comic strips inspired by the whimsical storytelling of Dr. Seuss and the vibrant panels of Stan Lee, enjoys watching Pixar animations like The Incredibles for creative ideas,
    and collects LEGO art sets featuring famous artworks such as Van Gogh’s Starry Night.
  travel: Michael Honeycutt loves family road trips to national parks like Yellowstone and the Grand Canyon, has a bucket list that includes a museum visit in Paris and a beach vacation in Hawaii, prefers
    itineraries that mix hiking adventures with snack breaks, and saves pocket money for a future solo camping experience.
  culinary: Michael Honeycutt enjoys helping in the kitchen by making homemade pizza topped with mozzarella, pepperoni, and fresh basil, loves crunchy carrot sticks from the garden they tend, and experiments
    with simple chocolate chip cookies where they carefully measure each ingredient.
  core: Michael Honeycutt is a curiosity‑driven LEGO architect who balances meticulous planning with spontaneous snack raids, turning everyday adventures into tiny inventions.
background:
  cultural: 'Michael comes from a white, Midwestern family in Fairmont, Minnesota. His upbringing reflects typical rural Minnesota values: a strong sense of community, respect for hard work, and appreciation
    for the outdoors. Family gatherings often involve potluck meals, church activities, and seasonal events like the county fair and winter snow festivals. He attends a local elementary school where community
    service projects and school sports are emphasized. This cultural environment fosters reliability, modesty, and a balanced view of individuality and teamwork.'
