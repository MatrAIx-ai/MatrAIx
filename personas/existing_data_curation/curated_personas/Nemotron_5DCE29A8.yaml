  career_goals: Michael aspires to become an inventor or engineer who creates useful gadgets that help people in his community. He imagines designing a robot that could assist on a farm or building new
    playground equipment. He also hopes to be recognized for his reliability and leadership at school, perhaps serving as class representative. In the longer term, he is fascinated by careers that combine
    his love of nature and technology, such as environmental engineering or wildlife conservation.
