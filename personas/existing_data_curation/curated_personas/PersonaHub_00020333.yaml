persona_description: Dr. Steven Bradfute, a virologist who specializes in the study of Ebola virus and other hemorrhagic fever viruses. His research focuses on investigating the immunology of viral hemorrhagic
  fevers, including Ebola and Lassa fever, using mouse models. His recent publication in The Journal of Virology is the first to demonstrate the infection of non-adapted Ebola virus in mice, using humanized
  NSG™-A2 (NOD.Cg-Prkdcscid Il2rgtm1Wjl Tg(HLA-A2.1)1Enge/SzJ (009617)) mice engrafted with human CD34+ hematopoietic stem cells. Dr. Muñoz-Fontela's perspective about how mouse models are contributing
  to the diagnosis and treatment of diseases affecting humans right now is likely to be of interest to Dr. Bradfute.
