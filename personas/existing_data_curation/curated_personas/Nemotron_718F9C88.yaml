personas:
  professional: Kagan Fernandes, a 17‑year‑old aspiring automotive technician, leverages their love for routine and hands‑on problem solving by performing oil changes, tire rotations, and simple diagnostics
    for friends and neighbors, while also mediating youth group disputes—a skill set they aim to translate into a reliable apprenticeship at a family‑owned auto shop.
  sports: Kagan Fernandes enjoys playing football and racing simulators on their console, channels that enthusiasm by cheering for the Kentucky Wildcats basketball team, following the Kentucky Derby each
    spring, and spending weekends cycling the local trail network and fishing at nearby lakes.
  arts: Kagan Fernandes unwinds to classic rock legends such as Led Zeppelin and country staples from Johnny Cash while fine‑tuning model airplanes, appreciating the meticulous detail that echoes their
    hands‑on hobby, and they occasionally attend local community‑theater shows featuring country‑themed productions.
  travel: Kagan Fernandes prefers low‑cost road trips with friends, often hopping into a family car to explore nearby state parks, dreams of attending the Kentucky Derby in Louisville and touring the Corvette
    Museum in Bowling Green, and hopes to someday embark on a solo bike adventure along the Blue Ridge Parkway.
  culinary: Kagan Fernandes enjoys the comforting flavors of classic American fare—pepperoni pizza, grilled cheese, and bourbon‑glazed chicken wings—while occasionally cooking their catch of catfish on
    a portable grill and experimenting with backyard barbecues featuring sweet corn and coleslaw.
  core: Kagan Fernandes is a routine‑loving, hands‑on teen who blends a love for cars, classic tunes, and community harmony with a relaxed attitude toward obligations and a penchant for weekend bike rides
    and model‑kit building.
background:
  cultural: Kagan grew up in Lexington, Kentucky, a city known for its Southern hospitality, horse-racing heritage, and a strong sense of community. His white, working-class background reflects values of
    modesty, practicality, and respect for tradition. The local culture emphasizes loyalty to friends, involvement in church and neighborhood events, and a passion for college basketball and the Kentucky
    Derby. These influences shape his modest lifestyle, his preference for routine, and his appreciation for collaborative, community-focused activities.
attributes:
  skills: '[''Basic automotive maintenance'', ''Handyman tasks (lawn mowing, minor carpentry)'', ''Computer literacy (internet browsing, word processing)'', ''Conflict mediation and interpersonal communication'',
