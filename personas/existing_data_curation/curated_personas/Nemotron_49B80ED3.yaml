  career_goals: Looking ahead, Samantha aims to obtain a Certified Food Safety Manager credential to deepen her expertise and qualify for an operations manager role within her current restaurant group.
    She also hopes to mentor younger supervisors through a regional training program and, eventually, open a modest community‑focused café that emphasizes locally sourced produce and a predictable, comforting
    menu for longtime residents of Land O’ Lakes. These ambitions align with her desire for routine, practical impact, and lasting contribution to her workplace and neighborhood.
