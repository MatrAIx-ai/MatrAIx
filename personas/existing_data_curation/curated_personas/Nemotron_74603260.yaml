personas:
  professional: Joann Mccoy, a budding young illustrator in kindergarten, channels a curious and organized mind into drawing and crafting, meticulously arranging supplies before each art session yet delighting
    in spontaneous doodles, showcasing early professional skills like fine motor coordination and visual storytelling, and they approach each project with a joyous sense of discovery.
  sports: Joann Mccoy enthusiastically joins the local Little Stars soccer team and the community swim club, cheers on the hometown Tigers baseball squad during weekends, and at the playground loves racing
    on a tricycle, balancing a love for team sports with solitary active play, and they eagerly high‑five teammates after every goal.
  arts: Joann Mccoy immerses themselves in art and music, drawing inspiration from the vivid colors of Van Gogh’s ‘Starry Night’ and the playful rhythms of Sesame Street, singing nursery rhymes with friends
    and attending weekend art workshops where they proudly showcase their handcrafted collages, and they often share their favorite songs with classmates.
  travel: Joann Mccoy enjoys family road trips to nearby museums like the Natural History Museum and whimsical destinations such as the local aquarium, often packing a small backpack with crayons and a
    stuffed hamster for imaginative adventures, favoring short, structured excursions over long, unplanned travels, and they love documenting each visit with doodles in a travel journal.
  culinary: Joann Mccoy loves a bright plate of mac and cheese topped with cheddar, bites of strawberry‑filled yogurt, and homemade peanut‑butter sandwiches, and while their cooking skills are limited to
    mixing batter under parental supervision, they eagerly indulge in tasting fresh carrot sticks and apples, and they often request extra sprinkles for desserts.
  core: Joann Mccoy is a curious, organized six‑year‑old who blends creativity with social cheer, charmingly oscillating between disciplined art projects and spontaneous playground games, all while guarding
    a modest stash of allowance and a tiny hamster, and they radiate a warm, inclusive energy wherever they go.
background:
  cultural: Joann comes from a White, middle‑class family living in the diverse borough of New York County. While her household observes traditional American holidays such as Thanksgiving and Christmas,
    growing up in the multicultural city of New York exposes her to a wide array of cultural experiences—from museum visits and community festivals to a variety of cuisines and languages. Her parents encourage
    curiosity, artistic expression, and social cooperation, reflecting both their cultural heritage and the inclusive, vibrant environment of the city.
