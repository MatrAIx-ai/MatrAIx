  career_goals: She dreams of growing up to be an artist who creates colorful drawings and paintings, or a teacher who shares her love of art and learning with other kids. She also imagines becoming a veterinarian
    to care for animals and occasionally thinks about being an astronaut, reflecting her curiosity and openness to unconventional possibilities.
