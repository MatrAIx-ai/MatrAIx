  hobbies: '[''Visiting art galleries and museums'', ''Sketching and watercolor painting'', ''Street photography of Houston neighborhoods'', ''Listening to Mexican folk and indie music'', ''Cooking traditional
    Mexican dishes for small gatherings'', ''Reading speculative fiction and philosophy'', ''Meditation and mindfulness practice'', ''Journaling'', ''Participating in small‑group book clubs or poetry readings'',
    ''Volunteering at local cultural festivals'']'
  career_goals: Bernardo intends to convert his curiosity about art and his desire to help others into a career that bridges cultural heritage and mental‑health advocacy. In the next two years he plans
    to complete a certificate in Museum Studies or Arts Administration, secure an internship at a Houston museum (such as the Menil Collection or the Museum of Fine Arts) focusing on Latinx collections,
    and launch a small community‑based pop‑up gallery that showcases emerging Mexican‑American artists while providing a safe space for discussions about anxiety and emotional wellbeing. His long‑term ambition
    is to become a senior curator or public program director who designs exhibitions and workshops that celebrate Mexican cultural narratives and promote mental‑health awareness through creative expression.
