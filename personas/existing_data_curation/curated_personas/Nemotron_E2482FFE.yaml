personas:
  professional: Bernardo Germosen is a 24-year-old art‑researcher and budding museum professional who blends methodical project‑management with a passion for contemporary works from their heritage, producing
    bilingual grant proposals, curating micro‑exhibitions, and translating anxiety‑awareness themes into public programs.
  sports: Bernardo Germosen enjoys casual soccer matches with a local community league, follows the Houston Astros and Houston Rockets, participates in weekend group runs at Buffalo Bayou Park, and practices
    yoga at a boutique studio to balance anxiety and flexibility.
  arts: Bernardo Germosen immerses themselves in Houston’s art scene, drawing inspiration from muralist José Parlá, following contemporary photographer Carrie Mae Weems, listening to traditional folk music
    alongside indie band Arcade Fire, and contributing sketches to community murals while curating a pop‑up gallery for emerging artists.
  travel: Bernardo Germosen prefers meticulously planned weekend getaways, often traveling to Austin for its live‑music venues, exploring the historic streets of San Antonio, dreaming of a cultural pilgrimage
    to Mexico City’s Museo Frida Kahlo, and balancing budget constraints by staying in boutique hostels and using point‑reward airline miles.
  culinary: Bernardo Germosen cooks with confidence, mastering the slow‑cooked complexities of mole poblano with ingredients like ancho chilies and Mexican chocolate, perfecting hand‑rolled tamales with
    masa and pork, and pairing dishes with fresh cilantro, lime, and homemade salsas, while also experimenting with occasional fusion dishes like mole‑glazed grilled cheese.
  core: Bernardo Germosen is a meticulously organized, anxiety‑aware art enthusiast who channels their love of cultural expression into curated community projects, disciplined budgeting, and a balanced
    lifestyle peppered with yoga, soccer, and soulful cooking.
background:
  cultural: Bernardo is a second‑generation Mexican American raised in a bilingual household in Houston’s vibrant East End. His parents emigrated from Jalisco, bringing celebrations like Día de los Muertos,
    Las Posadas, and traditional cuisine into their home. He grew up navigating the dual identities of Mexican heritage and American urban life, which shaped his worldview and artistic sensibility. He feels
    a strong connection to Mexican artistic icons such as Frida Kahlo and contemporary street muralists, and he participates in community events at local cultural centers like Casa de Amigos. While familismo
    and communal support are core values, he also confronts the stigma surrounding mental health in his community, motivating his desire to integrate cultural preservation with mental‑health advocacy.
attributes:
  skills: '[''Art historical research'', ''Digital illustration'', ''Graphic design (Adobe Photoshop, Illustrator)'', ''Photography'', ''Bilingual written communication (Spanish, English)'', ''Content creation
