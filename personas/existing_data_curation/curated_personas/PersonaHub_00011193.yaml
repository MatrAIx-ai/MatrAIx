persona_description: A highly skilled and experienced astronaut who was a member of the Apollo 15 mission. He was responsible for deploying booms and instruments to measure the moon's atmosphere and search
  for radiation, as well as taking panoramic photographs of the moon's surface. Worden also performed the first deep space extravehicular activity (EVA) on the moon, which was a significant achievement
  in the history of space exploration. His work on the Apollo 15 mission was crucial for the mission's success and his contributions were recognized with the Presidential Medal of Freedom.
