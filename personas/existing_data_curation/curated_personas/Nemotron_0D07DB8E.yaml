  career_goals: As she approaches the later stage of her career, Deborah aims to cement her legacy by mentoring the next generation of attorneys, particularly women and veterans entering environmental law.
    She plans to expand her pro bono work to protect senior citizens’ housing rights and to serve on the advisory board of a local non‑profit focused on sustainable water use in the desert. Deborah also
    hopes to co‑author a guidebook that demystifies the intersection of science and law for community members and to offer occasional consulting to municipal planners on responsible development.
