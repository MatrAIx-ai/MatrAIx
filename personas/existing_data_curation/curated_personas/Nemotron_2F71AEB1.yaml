personas:
  professional: Pok Li, an 18‑year‑old aspiring multimedia creator who is set to earn a GED before enrolling in a community‑college graphic‑design program, blends English‑Korean bilingual fluency with budding
    Photoshop, Illustrator, Premiere, and Python skills to craft culturally resonant digital illustrations while casually leading peer brainstorming sessions and mediating group projects.
  sports: Pok Li, a dynamic midfielder for the New Lenox United Soccer Club who thrives on team camaraderie, regularly cheers on the Chicago Bears and Chicago Bulls at the neighborhood sports bar, and joins
    a weekend running group that explores prairie trails while occasionally hitting the gym for strength training.
  arts: Pok Li, an energetic TikTok content creator who captures Chicago’s vibrant street‑art scenes, rehearses K‑pop choreography, practices calligraphy during quiet moments, and draws inspiration from
    artists like Shepard Fairey and indie film directors showcased at the Chicago International Film Festival, weaving these influences into Adobe Photoshop and Illustrator projects.
  travel: Pok Li, a spontaneous traveler who prefers impulsive road trips to Chicago’s lakefront beaches, weekend camping in Michigan’s Upper Peninsula, and an upcoming dream visit to the cherry‑blossom
    festival in Washington, D.C., plans journeys using cheap flight alerts and rideshare apps while balancing a hectic school schedule and group outings.
  culinary: Pok Li, a budding home chef who alternates between preparing spicy kimchi and marinated bulgogi for family gatherings and enjoying Chicago‑style deep‑dish pizza topped with sausage and mozzarella,
    loves experimenting with garlic‑infused ramen broth and perfecting rice‑ball shapes, yet occasionally skips recipe steps when exhausted and resorts to takeout.
  core: Pok Li is a curiosity‑driven, socially vibrant teen who fuses Midwestern spontaneity with traditional festive flavors, constantly juggling creative hustle and impromptu living while occasionally
    misplacing their planner.
background:
  cultural: Pok is a second‑generation Korean‑American raised in New Lenox, Illinois. At home, his family maintains traditional customs such as celebrating Lunar New Year, preparing kimchi and bulgogi,
    and speaking Korean, while his outward life reflects the multicultural vibe of the Midwest. This dual exposure nurtures a hybrid aesthetic—melding the bold colors and storytelling of East Asian art
    with the eclectic, community‑focused spirit of Midwestern culture. His bicultural identity informs his creative work, giving him a unique lens through which he interprets and fuses diverse artistic
    influences.
