  career_goals: Pok plans to obtain his GED within the next year and then enroll in a community college program focused on graphic design and multimedia production. He envisions a flexible career that blends
    art and technology—ranging from freelance digital illustration and content creation to a role in a forward‑thinking marketing agency. Long‑term, he hopes to launch his own small studio that specializes
    in culturally resonant branding for emerging businesses, allowing him to work on projects that celebrate both his East Asian heritage and Midwestern roots while maintaining a schedule that supports
    his love of spontaneous, collaborative experiences.
