persona_description: A person who is interested in public health, particularly in the field of infectious diseases and their transmission. They are particularly interested in norovirus, a highly contagious
  virus that causes severe gastrointestinal illness. They are knowledgeable about the virus's characteristics, including its ability to survive on surfaces for weeks, its short-lived immunity, and its ability
  to cause projectile vomiting. They are also interested in outbreaks of the virus, including those on cruise ships, in hotels, and in hospitals, and the response to these outbreaks. They are also interested
  in the potential for a vaccine for norovirus, which is years away.
