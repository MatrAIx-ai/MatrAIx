persona_description: A conservation biologist who has traveled extensively to study and understand the complex interactions between people and wildlife in developing countries, particularly those facing
  human-wildlife conflict. She is skilled in developing innovative solutions and strategies to address the issue, including predator compensation programs, wildlife product development, and education programs
  to change people's perceptions of wildlife as "pests" to one of a valued commodity. She is also interested in understanding the underlying factors that contribute to human-wildlife conflict in these regions,
  such as poverty, lack of law enforcement, and cultural attitudes towards wildlife.
