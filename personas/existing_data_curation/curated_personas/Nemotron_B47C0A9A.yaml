  hobbies: '[''Painting (acrylic and watercolor)'', ''Digital illustration'', ''Sketching'', ''Poetry and short story writing'', ''Reading speculative fiction and philosophy'', ''Visiting art galleries
    and folk‑art fairs'', ''Photography of rural landscapes'', ''Playing acoustic guitar'', ''Yoga and meditation'', ''Hiking local trails'', ''Strategic board games (chess, Settlers of Catan)'', ''Volunteer
    tutoring'']'
  career_goals: Jacqueline intends to complete a Bachelor of Arts in Education with a focus on Fine Arts and secure her teaching certification within the next two years. Her short‑term goal is to become
    a high‑school English and Art teacher at a progressive school in Pennsylvania, where she can implement innovative, novelty‑driven curricula that fuse visual creativity with literary analysis. Over the
    next five to ten years, she aims to develop a signature interdisciplinary program recognized for fostering imaginative thinking, publish articles on creative pedagogy in education journals, and compete
    in national teaching awards. Long‑term, Jacqueline aspires to transition into curriculum design or instructional technology, earning a Master’s in Education to specialize in designing digital learning
    experiences that empower other educators to adopt flexible, inquiry‑based teaching methods. Ultimately, she envisions leading a department or a district‑wide initiative that mentors new teachers and
    promotes a culture of competitive excellence and continuous innovation in education.
