personas:
  professional: Brittany Thompson, an aspiring teen eco‑illustrator, blends her love of hiking local trails and bird‑watching with digital illustration skills to create nature‑focused artwork for her school’s
    environmental club, even though she often procrastinates on deadlines because she prefers spontaneous bursts of creativity over rigid schedules.
  sports: Brittany Thompson, a member of the Sandpoint Trail Club who relishes weekend hikes in the Selkirk Mountains and occasionally joins Sandpoint High School’s cross‑country practice, roots for the
    Idaho Vandals basketball team and cheers on the local youth soccer league’s ‘Trail Blazers’ during the spring season.
  arts: Brittany Thompson, a fan of Studio Ghibli’s whimsical animation and Hayao Miyazaki’s watercolor style, spends evenings sketching fantasy characters while listening to Tessa Violet and improvising
    ukulele chords with friends, and she regularly attends the community center’s art‑and‑craft nights inspired by the music of indie band Tash Sultana and the poetry of Maya Angelou.
  travel: Brittany Thompson, who prefers spontaneous road trips over rigid itineraries, loves day‑long drives to Coeur d’Alene’s lakefront, dreams of hiking Yellowstone’s Grand Canyon of the Yellowstone,
    and saves a portion of her allowance for family vacations while balancing school obligations and the desire for adventure.
  culinary: Brittany Thompson, a self‑taught baker who perfects chocolate chip cookies with sea‑salt caramel swirls and red‑velvet cupcakes topped with fresh strawberries, often incorporates garden‑grown
    herbs like basil and rosemary into her occasional savory pies, yet she frequently forgets to set timers, resulting in slightly over‑browned treats.
  core: Brittany Thompson walks the line between routine‑loving garden caretaker and spontaneous sketch‑minded teen, hoarding glitter pens in a secret drawer while regularly losing track of school assignments
    because they find comfort in the familiar hum of backyard bees.
background:
  cultural: Brittany grew up in a predominantly white, middle‑class family in Sandpoint, Idaho, a small town known for its scenic lakes, mountains, and outdoor lifestyle. The community emphasizes self‑reliance,
    modesty, and active participation in local events such as school functions, church gatherings, and volunteer projects. Family traditions include seasonal celebrations like Fourth of July picnics, Thanksgiving
    dinners with extended relatives, and yearly trips to nearby ski resorts. These influences foster a practical, nature‑oriented worldview that values harmony, cooperation, and community service.
