  career_goals: Brittany aspires to a career that blends routine, practical work with helping others. She is drawn to roles such as a kindergarten teacher, a veterinary assistant, or a community health
    worker. In the short term she plans to volunteer at the local animal shelter, deepen her cooking skills, and participate in her school's gardening club. Long‑term, she hopes to attend a college with
    strong education or health‑science programs and eventually secure a stable, people‑focused job that lets her contribute to her community.
