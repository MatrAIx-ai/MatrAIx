  career_goals: Over the next few years, Andrew aims to move from frontline sales toward a mentorship and advisory capacity, eventually becoming a senior regional manager overseeing the Northeast market.
    He plans to develop a training program that integrates creative thinking and abstract concept visualization into sales techniques. Additionally, he aspires to launch a modest side venture curating works
    by local artists for corporate environments, blending his commercial acumen with his passion for the arts. His overarching ambition is to leave a legacy of innovative, curiosity‑driven sales practices
    while supporting the growth of younger sales professionals.
