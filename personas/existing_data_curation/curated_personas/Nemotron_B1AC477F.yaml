  career_goals: Gustavo aims to advance to a senior executive role—such as Director of Operations or VP of Technology—where he can shape company-wide innovation strategies. He plans to earn a certification
    in Agile and Lean Management to formalize his practical expertise, and he is interested in mentoring younger engineers, especially those from underrepresented backgrounds. In the medium term, he envisions
    leading a pilot program that integrates smart-city technologies into Cape Coral’s infrastructure, leveraging his STEM background to improve municipal services while balancing fiscal responsibility.
