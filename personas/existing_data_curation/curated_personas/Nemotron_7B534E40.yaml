  career_goals: Teresa aims to complete a memoir that intertwines her personal narrative with the evolution of the New England art scene, seeking publication through a regional press. She plans to curate
    a community exhibition titled 'Echoes of Imagination' that showcases senior artists’ abstract works, while also integrating a small virtual gallery using beginner‑level VR tools to reach a wider audience.
    Additionally, she wants to establish a mentorship program pairing senior creators with young writers and visual artists through the Stamford Public Library, and to contribute her research on local cultural
    history to the city’s archival collection. Finally, she hopes to continue lifelong learning by enrolling in online courses on contemporary art theory and digital media.
