persona_description: A cardiologist who specializes in the study of the heart's function, particularly the mechanisms that affect the heart's ability to pump blood effectively. They are knowledgeable about
  the relationship between the heart's contractile force, afterload, and the pressure that the heart must overcome to pump blood. They are also aware of the role of vascular impedance in afterload and how
  it differs from other afterload forces. They may be involved in the development and implementation of treatment plans for heart failure patients.
