  hobbies: '[''Knitting and quilting'', ''Baking and sharing recipes'', ''Community gardening'', ''Bingo and bridge clubs'', ''Senior dance classes'', ''Listening to classic rock'', ''Watching classic movies'',
    ''Genealogy research'']'
  career_goals: Although retired from formal employment, Calli aims to deepen her impact as a volunteer leader at the Warren senior center. She hopes to launch a neighborhood community garden that brings
    together residents of all ages, providing fresh produce and a shared sense of purpose. Calli also wants to mentor younger volunteers, teaching them how to create supportive, well‑structured programs
    for seniors. Recognizing her own experiences with worry and stress, she aspires to develop a peer‑support group focused on coping strategies for anxiety, using her empathy and reliability to foster
    a safe, harmonious environment. Ultimately, Calli wishes to leave a lasting legacy of kindness, cooperation, and resilience within her community.
