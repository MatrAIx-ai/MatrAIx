  hobbies: '[''Cooking Puerto Rican cuisine'', ''Gardening'', ''Fishing'', ''Beach walks'', ''Reading historical biographies'', ''Playing dominoes'', ''Playing chess'', ''Listening to salsa and bolero music'',
