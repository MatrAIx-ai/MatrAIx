personas:
  professional: Juan Santiagofigueroa leverages decades of production planning, inventory control, and ERP expertise to volunteer as a logistics advisor for local nonprofits, where they blend meticulous
    Excel‑driven analysis with a flexible, pragmatic approach that encourages both structured problem‑solving and improvisation.
  sports: Juan Santiagofigueroa enjoys leisurely beach walks and regular early‑morning fishing trips off the Gulf Coast, follows the Tampa Bay Buccaneers and the Tampa Bay Lightning, and participates in
    the Sunrise Senior Walking Club, while they occasionally play chess tournaments at the senior center as a mind‑sport.
  arts: Juan Santiagofigueroa’s cultural palate includes salsa legends like Celia Cruz, bolero maestro Armando Manzanero, and contemporary Puerto Rican singer‑songwriter Bad Bunny, and they channel that
    love into digital photography, capturing coastal sunsets and family gatherings with a vintage Leica.
  travel: Juan Santiagofigueroa prefers low‑key, family‑oriented travel, having revisited Old San Juan in Puerto Rico and explored the historic streets of Savannah, Georgia, while they dream of a leisurely
    cruise to Cartagena, Colombia, yet they often delay booking due to a tendency to procrastinate on travel paperwork.
  culinary: Juan Santiagofigueroa, a seasoned home chef, perfects mofongo with crispy plantains, garlic, and chicharrón, adds a twist to arroz con gandules by mixing in coconut milk and fresh cilantro,
    and they delight in seasoning dishes with adobo and sazón while nurturing a small herb garden of basil, oregano, and tropical peppers.
  core: Juan Santiagofigueroa balances curiosity and practicality, volunteering their logistics wisdom, experimenting in the kitchen, and snapping photos, all while they occasionally misplace bills and
    forget to stretch after beach walks.
background:
  cultural: Born to Puerto Rican parents, Juan was raised in a bilingual Spanish‑English household steeped in the island’s Catholic traditions, family gatherings, and vibrant music and food culture. After
    moving to Florida, he integrated into the Puerto Rican diaspora community in Pinellas County, maintaining strong ties with relatives back in Puerto Rico. His cultural identity shines through his love
    of Puerto Rican music, cuisine, storytelling, and the value he places on hospitality, community service, and preserving heritage for his grandchildren.
