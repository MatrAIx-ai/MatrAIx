  career_goals: Now retired, Juan aims to stay mentally sharp and socially engaged by volunteering as a logistics advisor for local non‑profits, mentoring younger workers on practical planning techniques,
    and sharing his cultural knowledge. He is curious about digital photography and wants to document his family's stories and Puerto Rican heritage. He also hopes to make occasional trips to Puerto Rico
    to reconnect with extended family and to attend cultural festivals, preserving the island’s traditions for future generations.
