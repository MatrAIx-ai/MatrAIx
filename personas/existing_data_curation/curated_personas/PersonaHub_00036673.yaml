persona_description: A policy analyst and education researcher who is interested in the measurement and evaluation of educational outcomes, particularly in the context of the Millennium Learning Goal. They
  are familiar with the MDG for primary schooling completion and are advocating for a shift towards measuring learning achievement as a more important goal. They are aware of the challenges faced by countries
  in meeting the MDG, including the lack of adequate competencies in mathematics and other subjects, and are advocating for a focus on improving learning achievement in order to ensure that all youth are
  adequately equipped for full participation in society.
