personas:
  professional: Robert Minto is a budding block engineer who spends hours arranging Lego towers, narrating elaborate construction stories, and whose early curiosity and love for unconventional play shape
    a nascent professional persona.
  sports: Robert Minto loves the energetic chaos of toddler soccer with the Little Sprouts Club, cheers loudly for the Chicago Cubs during family TV evenings, and spends rainy afternoons building forts
    in the backyard, embodying a playful yet modest athletic spirit.
  arts: Robert Minto delights in finger‑painting swirls of color to the tunes of Raffi and the gentle cello of Yo‑Yo Ma, often reenacting scenes from Sesame Street with stuffed friends, a clear sign that
    his early artistic appetite is both immersive and whimsical.
  travel: Robert Minto’s favorite adventures include weekend trips to the local zoo, a sun‑soaked day at Disney World’s Magic Kingdom, and a family road‑trip to the Grand Canyon, where his love for novelty
    and new experiences shines through his endless questions and wide‑eyed wonder.
  culinary: Robert Minto favors cheesy macaroni, crunchy carrots with ranch dip, and sweet strawberry‑banana mash, occasionally attempting to ‘cook’ his own snack by sprinkling cheese on a tiny plate, showing
    a delightfully messy yet curious approach to food.
  core: Robert Minto is a three‑year‑old explorer whose boundless curiosity, love for art, and occasional disorganized habits blend into a charmingly singular outlook on life.
background:
  cultural: Robert is raised in a White, Midwestern family in Wichita, Kansas, where community values emphasize friendliness, personal independence, and a modest appreciation for the arts. His household
    often visits the local public library and community center, exposing him to storybooks, children's art programs, and neighborhood events. The family's connection to the surrounding prairie landscape
    offers gentle exposure to farming and outdoor activities, while the school's early childhood curriculum encourages curiosity and open‑ended play, reinforcing his relaxed, flexible approach to learning
    and interactions.
