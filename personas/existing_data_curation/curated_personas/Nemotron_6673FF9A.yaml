  hobbies: '[''Acrylic painting'', ''Ceramics'', ''Photography (interior and nature)'', ''Collecting vintage furniture'', ''Visiting art galleries'', ''Hiking in the Appalachians'', ''DIY home‑decor projects'',
    ''Reading about abstract art and design theory'', ''Indoor plant gardening'', ''Attending local craft fairs'']'
  career_goals: Al aims to establish her own boutique design studio in the Fairview region that showcases bold, imaginative interiors inspired by both modern aesthetics and Appalachian heritage. She plans
    to earn NCIDQ certification and enroll in advanced design courses to complement her high‑school background. Long‑term, she hopes to author a coffee‑table book on innovative interior spaces, speak at
    regional design conferences, and mentor emerging designers, positioning herself as a leading creative force in the Appalachian design community.
