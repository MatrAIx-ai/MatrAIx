personas:
  professional: Kim Cooke is a retail floor supervisor at a bustling Seattle boutique, blending strong storytelling and data‑driven sales analysis with a laid‑back, people‑first leadership style that keeps
    the team motivated while they flexibly pivot between proven merchandising tactics and experimental tech tools.
  sports: Kim Cooke enjoys weekend hikes in the Cascades, joins a Seattle cycling club that rides the waterfront trail, and roots for the Seattle Seahawks and the Seattle Sounders, while they favor low‑impact
    gym classes like Pilates over high‑intensity weightlifting.
  arts: Kim Cooke spends evenings at the Seattle Art Museum, devouring the work of local painter James H. Kelleher and catching live shows by indie folk band The Head and the Heart, while they also host
    board‑game nights that double as improv storytelling sessions with friends.
  travel: Kim Cooke prefers spontaneous weekend getaways to nearby nature spots like the San Juan Islands and Olympic National Park, while they dream of a summer trip to the historic streets of Dublin and
    a winter hike in New Zealand’s South Island, always balancing travel expenses with their commitment to community volunteering.
  culinary: Kim Cooke is a self‑taught home chef who enjoys crafting seasonal dishes such as cedar‑plank salmon with dill and roasted root vegetables, experimenting with matcha‑infused desserts, and they
    regularly scout independent cafés for single‑origin pour‑over brews topped with a splash of oat milk.
  core: Kim Cooke is a sociable, curiosity‑driven retail leader who thrives on community connections, occasionally forgets to file expense reports, but always bounces back with a fresh cup of coffee and
    a smile.
background:
  cultural: Kim is a white American whose family lineage traces back to Irish and German ancestors who settled in the Pacific Northwest early in the 20th century. Raised in a middle‑class Seattle suburb,
    she grew up immersed in the region’s emphasis on environmental stewardship, outdoor recreation, and a progressive, inclusive community ethos. Her upbringing blended traditional western holidays with
    Seattle’s multicultural fabric, fostering an appreciation for diversity, the local coffee culture, and the arts. This background informs her collaborative work style, her commitment to creating welcoming
    spaces for colleagues and customers, and her preference for flexible, people‑centered approaches.
