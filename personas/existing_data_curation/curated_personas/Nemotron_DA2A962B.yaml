  career_goals: Kim aims to step up to a store‑manager position within the next two years, targeting a flagship Seattle location where she can shape the customer experience and mentor a larger team. She
    plans to enroll in a part‑time MBA program to deepen her strategic and financial expertise, with a long‑term ambition to become a regional retail manager overseeing multiple stores and championing sustainable,
    community‑focused retail practices. Ultimately, she dreams of launching her own boutique that blends design, local artisans, and inclusive customer service while preserving the flexibility she values
    in her work style.
