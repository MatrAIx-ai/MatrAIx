personas:
  professional: Nannette Wheaton, a senior parking attendant in Henry County, blends precise schedule coordination, conflict resolution, and a customer‑centric mindset with a calm, resilient demeanor, aiming
    to lead the parking team, implement digital ticketing systems, and mentor newcomers.
  sports: Nannette Wheaton passionately supports the Atlanta Falcons and Atlanta Braves, participates in a local senior softball league, and maintains fitness through weekly line‑dancing workouts and garden‑yard
    stretches, scheduling her weekend games around church gatherings.
  arts: Nannette Wheaton enjoys a blend of gospel choir performances at her church, country classics from Dolly Parton and Luke Bryan, Southern rock anthems by Lynyrd Skynyrd, and often quotes literary
    passages during her book‑club meetings while attending seasonal productions at the Walnut Street Theatre.
  travel: Nannette Wheaton prefers road‑trip itineraries that include historic Southern towns like Savannah, Asheville, and Charleston, favoring comfortable inns and well‑planned stops at local festivals,
    while budgeting to save for a once‑in‑a‑lifetime Caribbean cruise.
  culinary: Nannette Wheaton’s kitchen showcases her mastery of fried chicken, collard greens simmered with smoked pork, peach cobbler crowned with buttery crust, and shrimp & grits seasoned with a pinch
    of cayenne, though she sometimes leaves a stubborn burnt edge on her cast‑iron skillet dishes.
  core: Nannette Wheaton is a pragmatic, community‑oriented planner who balances a structured work ethic with warm hospitality, an unshakeable calm, and a love for line‑dancing, occasionally overcommitting
    to volunteer shifts but always keeping a garden‑gnome collection on hand.
background:
  cultural: Raised in suburban Henry County, Georgia, Nannette grew up immersed in Southern hospitality, church involvement, and a strong sense of community. Her white Southern heritage includes traditions
    of family gatherings, seasonal festivals, and an appreciation for local cuisine and music, shaping her values of reliability, friendliness, and pragmatic optimism.
attributes:
  skills: '[''Customer Service'', ''Vehicle Guidance'', ''Cash Handling'', ''Conflict Resolution'', ''Knowledge of Parking Regulations'', ''Safety and Emergency Procedures'', ''Basic Equipment Maintenance'',
    ''Shift Scheduling'', ''Team Coordination'', ''Local Area Navigation'']'
  hobbies: '[''Community Event Volunteering'', ''Southern Cooking'', ''Backyard Gardening'', ''Line Dancing'', ''Book Club'', ''Neighborhood Potlucks'', ''Senior Center Volunteering'', ''Local Sports Tailgating'']'
  career_goals: She aims to advance to a supervisory or lead attendant role within the county's parking operations, seeking certification in Facility Management and safety compliance. Nannette also hopes
    to mentor newer staff, integrate digital parking management tools to improve efficiency, and secure a stable income that supports her retirement plans while remaining engaged in community service.
