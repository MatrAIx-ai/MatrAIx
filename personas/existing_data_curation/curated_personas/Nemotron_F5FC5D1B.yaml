  career_goals: As a 23‑year‑old secondary school teacher, Leonardo aims to solidify his professional credentials by completing a bachelor’s degree in education and pursuing a Master’s in Educational Leadership
    within the next three years. He aspires to be recognized as a teacher of the year, lead curriculum innovation projects, and eventually step into a department head or assistant principal role. Long‑term,
    he dreams of shaping school‑wide policies that promote student‑centered learning and cultural inclusivity, and possibly author a guidebook on blending practical teaching techniques with creative classroom
    experiments.
