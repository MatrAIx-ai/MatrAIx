personas:
  professional: Carman Kilgore, a budding engineer‑in‑training who turns LEGO blocks and science kits into mini‑inventions, channels their boundless curiosity and easy‑going nature into hands‑on problem‑solving,
    often preferring spontaneous tinkering over rigid project plans.
  sports: Carman Kilgore darts around the schoolyard playing soccer with the Dearborn Youth Soccer Club and joins after‑school tag games, cheering on the Detroit Lions on Sundays and the Detroit Tigers
    during baseball season, while embracing the energy of spontaneous playground races.
  arts: Carman Kilgore pours imagination onto sketchbooks, paints vibrant canvases inspired by the swirling colors of Monet and the whimsical worlds of Disney, and delights in performing in school theatre
    productions that showcase songs by Lin‑Manuel Miranda and dances to the upbeat rhythms of Arabic pop heard at Arabfest.
  travel: Carman Kilgore loves weekend road trips to Mackinac Island for its historic car‑free streets, has explored the bustling Arabfest market in Dearborn, and dreams of flying to Paris to see the Eiffel
    Tower and to Cairo to taste authentic koshari, all on a family‑planned itinerary that balances adventure with school schedules.
  culinary: Carman Kilgore enjoys mixing up a plate of hummus with warm pita alongside classic mac‑and‑cheese, can whip a simple fruit kebab with strawberries and grapes, and eagerly samples falafel and
    rainbow veggie wraps at local festivals, though they sometimes forget to clean up the kitchen afterward.
  core: Carman Kilgore is a curious, art‑loving ten‑year‑old who blends spontaneous LEGO engineering with a love for multicultural festivals, has a half‑organized piggy bank habit, and occasionally neglects
    routine health checks in favor of playtime.
background:
  cultural: Carman is a white American girl raised in Dearborn, Michigan, a city known for its rich Arab‑American community and diverse cultural landscape. While her family’s heritage is rooted in Midwestern
    Anglo‑American traditions—celebrating holidays like Thanksgiving, Halloween, and Easter—her daily life is flavored by the multicultural environment of her neighborhood and school. She regularly encounters
    a variety of foods, languages, and cultural events, which broaden her worldview and nurture her appreciation for varied experiences. This blend of Midwestern values and exposure to a vibrant, multicultural
    setting shapes her open‑minded, sociable, and flexible personality.
attributes:
  skills: '[''Reading comprehension'', ''Basic arithmetic'', ''Sketching and watercolor painting'', ''Crafting with mixed media'', ''Basic coding with Scratch'', ''Public speaking (class presentations)'',
