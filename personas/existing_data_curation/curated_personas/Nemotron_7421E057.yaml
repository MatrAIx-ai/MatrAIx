  hobbies: '[''Sketching and painting'', ''DIY crafts'', ''Science kits'', ''LEGO building'', ''Educational video games'', ''School theatre'', ''Dance club'', ''Soccer'', ''Attending multicultural festivals'']'
  career_goals: Carman dreams of a future where she can turn her love of art and ideas into a career that lets her share stories and experiences with others. She imagines becoming a multimedia artist, a
    video‑game designer, or a museum curator who creates interactive exhibitions. She also enjoys the thought of teaching art to inspire other kids, reflecting her cooperative nature, and she is open to
    exploring a range of creative fields as she grows.
