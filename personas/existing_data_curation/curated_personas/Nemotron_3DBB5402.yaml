    hip‑hop and gospel music'', ''Community art workshops'', ''Cooking soul food'']'
  career_goals: Terrel dreams of turning his love for art and technology into a future career, hoping to become a graphic designer or animator who creates stories that inspire others. He is also fascinated
    by animals and nature, considering a path as a wildlife biologist or environmental educator. He aspires to develop interactive educational games that teach kids about science and culture, and he wants
    to give back to his community by mentoring younger students in art and coding.
