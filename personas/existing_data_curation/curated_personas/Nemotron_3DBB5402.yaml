personas:
  professional: Terrel Abraham is an aspiring comic artist and junior game developer who fuses watercolor illustrations with Scratch programming, channeling their curiosity and balanced approach to turn
    school projects into interactive storytelling experiences.
  sports: Terrel Abraham plays point guard for the Henry County Youth Basketball League, idolizes Atlanta Hawks star Trae Young, cheers for the Hawks during games, and spends weekends joining pick‑up matches
    at local parks while listening to high‑energy hip‑hop tracks to stay motivated.
  arts: Terrel Abraham creates comic strips inspired by Stan Lee and Jim Lee, paints watercolors reminiscent of Claude Monet’s landscapes, sings in the school choir covering classics like Aretha Franklin’s
    'Respect' and modern soul hits by Leon Bridges, and frequently attends community art workshops where they experiment with mixed‑media collages.
  travel: Terrel Abraham loves exploring the nearby Flint River wetlands and the historic Savannah Riverfront, has taken day trips to the Georgia Aquarium in Atlanta, and dreams of visiting Tokyo’s Akihabara
    district to experience manga culture and the museums of Washington, D.C. for a mix of history and sci‑fi inspiration.
  culinary: Terrel Abraham helps the family prepare classic soul‑food dishes such as fried catfish, collard greens seasoned with smoked turkey, buttery cornbread, and sweet‑potato pie, while also experimenting
    with watermelon‑infused smoothies and adding fresh basil and lemon zest to homemade cupcakes, though they often sneak extra bites of mac and cheese when no one is looking.
  core: Terrel Abraham is a curious, art‑obsessed ten‑year‑old who balances disciplined sketching and coding with spontaneous LEGO builds, a habit of saving loose change for comic projects, and a gentle,
    harmony‑seeking nature that bridges school, sports, and family life.
background:
  cultural: Terrel is an African‑American boy growing up in Stockbridge, GA, a community with deep Southern Black traditions. His family values church gatherings, storytelling, and communal support, which
    foster his cooperative nature. He is exposed to gospel and soul music at home and at local events, enjoys soul‑food dishes like collard greens and fried chicken, and learns about African‑American history
    and civil‑rights movements at school. The cultural emphasis on harmony, respect, and community service shapes his considerate and emotionally stable personality.
