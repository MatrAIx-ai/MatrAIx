persona_description: An educator with extensive experience in reading instruction, particularly with black adolescent males. Alfred Tatum is a black male who has worked as a middle school teacher, reading
  specialist in an urban elementary school, and staff developer in classrooms across the nation. He has first-hand insights into the challenges faced by black adolescent males in achieving literacy and
  has developed a new book titled "Teaching Reading to Black Adolescent Males" that offers practical suggestions for providing reading strategy instruction and assessment that is explicit, meaningful, and
  culturally responsive. His book aims to help middle school and high school teachers, reading specialists, and administrators move towards the essential goal of literacy achievement for all.
