personas:
  professional: Levern Jones, a budding graphic designer-in-training, leverages their strong drawing skills, digital illustration proficiency in Procreate and Photoshop, and basic web design knowledge to
    create polished visual assets for local businesses while channeling their curious and organized yet flexible mindset into meeting project deadlines and experimenting with new design trends.
  sports: Levern Jones, an avid fan of the Detroit Pistons and Detroit Tigers, spends winter weekends watching basketball games, plays pick‑up basketball at the local community center, and occasionally
    joins the Waterford Youth Soccer Club's Saturday scrimmages, while preferring low‑key fitness routines like daily jogs along the RiverWalk to stay active.
  arts: Levern Jones, a dedicated visual arts enthusiast, draws inspiration from muralist Banksy, the graphic storytelling of Alan Moore, the soulful beats of Kendrick Lamar, the improvisational jazz of
    Miles Davis, and the cinematic worlds of Miyazaki, regularly curating playlists and visiting the Detroit Institute of Arts to fuel their own sketchbook and digital creations.
  travel: Levern Jones, who plans trips with meticulous research on art hotspots, has explored nearby Mackinac Island’s historic sites and taken day trips to Chicago’s museum district, while dreaming of
    an immersive visit to Tokyo’s Akihabara and Kyoto’s traditional shrines to merge their love for gaming culture and classical art.
  culinary: Levern Jones, a self‑taught home cook, favors quick yet flavorful meals like pepperoni pizza with extra mozzarella, chicken teriyaki bowls with jasmine rice, and banana‑spinach smoothies with
    almond milk, while occasionally whipping up ramen with soft‑boiled eggs and experimenting with DIY avocado toast topped with feta and chili flakes.
  core: Levern Jones blends a tech‑savvy artistic flair with disciplined organization, turning sketchbooks into digital portfolios while juggling freelance gigs, modest savings, and a quiet quest for creative
    growth amid teenage life.
background:
  cultural: Levern is a Black teenager raised in Waterford, Michigan, a suburb of Detroit. His family traces its roots to the Great Migration, with grandparents who moved from the Southern United States
    to the industrial Midwest seeking opportunity. Growing up, he was immersed in the rich musical and artistic traditions of African‑American culture—hip‑hop, soul, spoken‑word poetry—while also absorbing
    Midwestern values of community involvement and modesty. He attends a local African‑American Baptist church where fellowship and music play central roles, and participates in community events that celebrate
    Black heritage, such as Juneteenth festivals and neighborhood art showcases. This cultural foundation shapes his artistic voice, prompting him to create work that reflects the blend of urban Detroit
    influences and suburban life, and to explore themes of resilience, belonging, and cultural pride.
