  hobbies: '[''sketching in a personal notebook'', ''digital art on a tablet'', ''listening to hip‑hop, jazz, and R&B music'', ''visiting local art museums and galleries'', ''photography of urban and natural
    scenes'', ''reading graphic novels and sci‑fi literature'', ''writing poetry for a small circle of friends'', ''participating in a makerspace for robotics and 3D printing'', ''volunteering to lead art
    workshops for younger kids'']'
  career_goals: Levern aims to turn his artistic passion into a sustainable career. In the short term, he plans to earn his GED and enroll in a community‑college program or vocational certificate in graphic
    design, while building a professional portfolio through freelance projects for local small businesses and community mural commissions. Over the longer term, he aspires to work as a UI/UX designer or
    visual artist for a gaming studio, merging his love of technology and storytelling. He also hopes to give back by mentoring younger teens in his neighborhood, using art workshops to foster creativity,
    cultural pride, and self‑confidence.
