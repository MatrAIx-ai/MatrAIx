personas:
  professional: Curtis Williams, a 33‑year‑old land surveyor and GIS specialist, blends technical mastery of UAV‑LiDAR, ArcGIS Pro, and AutoCAD Civil 3D with an artistic eye for cartographic storytelling,
    leading multidisciplinary mapping projects while embracing flexibility over rigid schedules.
  sports: Curtis Williams enjoys weekend group hikes with the Mid‑Atlantic Trailblazers, regular kayaking on the Chesapeake, casual rides with the Norfolk Bicycle Club, and they avidly follow the Norfolk
    Tides and Washington Commanders, favoring variety over a single sport to keep fitness fun and social.
  arts: Curtis Williams finds inspiration in the photographic landscapes of Ansel Adams, the impressionist brushstrokes of Monet, and the folk‑rock sounds of The Avett Brothers, and they often sketch urban
    scenes after local theater productions, integrating these artistic influences into their cartographic visual designs.
  travel: Curtis Williams favors spontaneous weekend getaways to historic river towns like Savannah and Charleston as well as occasional overseas adventures to Reykjavik and Lisbon, and they plan the basics
    but leave room for impromptu photo walks and drone flights, all while balancing travel costs with a modest savings plan.
  culinary: Curtis Williams, an adventurous home cook, loves whipping up eclectic dishes such as saffron paella, shrimp and grits with a kick of Old Bay, and homestyle kimchi, and they often experiment
    with fresh herbs from their balcony garden while occasionally overcooking a soufflé.
  core: Curtis Williams is a curious, art‑infused GIS wizard who balances a penchant for spontaneous adventures and occasional disorganization with a steady, friendly demeanor, and they make every mapping
    project feel like a collaborative creative expedition.
background:
  cultural: Curtis grew up in a middle‑class, predominantly white neighborhood in Chesapeake, Virginia. The region’s maritime heritage, proximity to the Chesapeake Bay, and Southern hospitality shaped his
    values of community, cooperation, and appreciation for the outdoors. Local traditions such as seafood festivals, crab‑picking outings, and high school football gatherings were integral to his upbringing.
    His family emphasized practical trades and solid education, encouraging him to pursue a STEM degree while also fostering an openness to arts and diverse experiences. This blend of coastal Southern culture,
    a collaborative community spirit, and an environment that values both technical skill and creative expression informs his worldview and personal pursuits.
