  hobbies: '[''Urban sketching'', ''Landscape photography'', ''Drone flying'', ''Hiking'', ''Kayaking'', ''Cycling'', ''Community theater'', ''Live music concerts'', ''Board game nights'', ''Geocaching'',
    ''Traveling to new cities'', ''Cooking experimental dishes'', ''Visiting art galleries'', ''Volunteering for local clean-up events'']'
  career_goals: Curtis aims to advance into a senior GIS analyst or survey project manager role where he can lead multidisciplinary teams and shape large‑scale mapping projects. He plans to obtain professional
    certifications such as the GIS Professional (GISP) credential and a state surveying license. Over the next five years, he hopes to spearhead innovative geospatial solutions for environmental monitoring
    and sustainable land‑use planning in the Chesapeake region, while also integrating artistic elements into cartographic products to make data more accessible to the public. Long‑term, he envisions launching
    a consulting practice that blends technical surveying expertise with community‑focused planning and heritage preservation, allowing him to work flexibly and pursue varied experiences.
