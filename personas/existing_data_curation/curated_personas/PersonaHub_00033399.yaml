persona_description: A Costa Rican engineer and professor who specializes in the development and testing of new technologies for disinfection and sterilization, particularly for medical equipment and personal
  protective equipment against the new coronavirus. He is involved in the development of a prototype device that uses ultraviolet radiation and plasma treatment to disinfect disposable N95 masks, which
  are in short supply in Costa Rica. The project is funded by the social security fund of Costa Rica and is being tested by an international laboratory approved by the World Health Organization (WHO). The
  device has already passed national testing and is being used by a dentist in San José to ensure the sterilization and control of infectious agents in the current pandemic.
