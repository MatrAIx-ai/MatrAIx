  hobbies: '["Watercolor Painting", "Street Photography", "Hiking", "Gardening", "Experimental Cooking", "Acoustic Guitar", "Reading Philosophy", "Journaling", "Visiting Art Galleries", "Community Theater",
    "Volunteering at Community Center"]'
  career_goals: Theodore hopes to advance from his current floor‑supervisor role into district or regional management, where he can mentor multiple store leaders and shape broader retail strategies. He
    is also drawn to visual merchandising and envisions leading a brand‑wide design team. If his entrepreneurial spirit aligns with his love of art, he contemplates opening a small boutique or community
    art‑café that blends retail with local cultural events. Throughout, he seeks roles that provide flexibility, foster collaborative team environments, and allow him to continue learning new ideas.
