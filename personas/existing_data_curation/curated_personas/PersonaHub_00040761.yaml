persona_description: A geneticist who specializes in DNA sequencing technology, particularly Whole Genome Sequencing (WGS) and Whole Exome Sequencing. She is familiar with the process of gene sequencing
  and its applications in determining genetic information and identifying changes in genes that may cause disease or predispose individuals to certain traits. She is also aware of the various products and
  services offered by Mapmygenome, including the Genomepatri test, which offers insights into genetic traits and predispositions, and the ability to order international DNA sequencing kits. She is interested
  in the various pricing options and special offers available for corporates and special days, and is willing to take advantage of these opportunities.
