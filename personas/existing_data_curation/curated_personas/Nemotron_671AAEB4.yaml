  career_goals: Lina aims to advance to a senior engineering technologist or lead technician role where she can shape process improvements and mentor newer team members. She plans to obtain professional
    certifications such as Certified Automation Professional and to specialize further in renewable energy integration within manufacturing. Balancing her desire for structure with a need for flexibility,
    she also envisions transitioning to part‑time consulting later in her career to achieve a more predictable schedule that reduces stress and supports her personal well‑being.
