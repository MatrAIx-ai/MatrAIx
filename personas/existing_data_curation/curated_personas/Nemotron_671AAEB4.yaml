personas:
  professional: Lina Lacorte, a seasoned engineering technologist specializing in industrial automation, blends precise PLC programming and CNC machine expertise with a cooperative mentoring style, navigating
    their love for structured process improvement while tolerating occasional disorganization and a desire for flexible work rhythms.
  sports: Lina Lacorte enjoys weekend hikes on local nature trails with a close friend, supports the Boston Celtics as a dedicated fan, and participates in a bi‑monthly community gardening fitness group
    that provides light strength training and social connection, reflecting their preference for small‑group activities.
  arts: Lina Lacorte immerses themselves in classic science‑fiction novels by Isaac Asimov and Arthur C. Clarke, listens to Ennio Morricone’s film scores while preparing traditional Italian meals, and attends
    occasional local theater productions of Federico Fellini’s films, all of which deepen their appreciation for narrative structure and artistic nuance.
  travel: Lina Lacorte favors purposeful yet flexible travel, relishing short trips to the Tuscan countryside to explore vineyards and historic farms, planning an upcoming adventure to Iceland’s geothermal
    energy sites, and dreaming of a serene hike through the Canadian Rockies, all balanced against their mid‑life schedule and modest budget.
  culinary: Lina Lacorte delights in cooking traditional Italian dishes such as handmade tagliatelle al ragù, eggplant parmigiana, and bruschetta topped with garden‑grown tomatoes, fresh basil, extra‑virgin
    olive oil, and aged Parmigiano‑Reggiano, showcasing a high level of culinary skill that blends heritage flavors with their own garden harvest.
  core: Lina Lacorte, a 43‑year‑old engineering technologist, balances a knack for precise automation with a love for solitary gardening, sci‑fi daydreams, and an undercurrent of worry that fuels their
    meticulous yet occasionally disorganized lifestyle.
background:
  cultural: Lina is a white Midwestern American of Italian descent, raised in a small‑town Catholic family in Indiana. Her upbringing blended Italian family traditions—especially food, close‑knit extended
    relatives, and a respect for heritage—with the Midwestern values of practicality, modesty, and community involvement. This cultural mix informs her emphasis on teamwork, her appreciation for modest,
    well‑structured routines, and her desire to maintain harmony in both work and personal life.
