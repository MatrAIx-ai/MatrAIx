persona_description: Monica Ramunda, a licensed professional counselor with more than 16 years of experience in therapy and counseling, specializes in helping children with anxiety issues. She provides
  therapy both in person at her Louisville, CO office and online. Her expertise includes teaching tolerance, setting expectations, respecting children's feelings, and considering therapy for childhood anxiety.
  Monica is a registered play therapist and offers coping mechanisms for both parents and children.
