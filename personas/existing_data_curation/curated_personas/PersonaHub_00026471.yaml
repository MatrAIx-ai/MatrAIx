persona_description: A defensive line coach who specializes in the 4-3 and 3-4 defensive line formations, and has experience with applying pressure to the quarterback through the use of the defensive line.
  The coach is skilled in setting up and adjusting defensive line formations to match up with the offensive line and contain the run game. The coach has a deep understanding of the concepts and responsibilities
  of each position on the defensive line, including the nose tackle, defensive tackle, and defensive end, and how they work together to create a strong defensive line. The coach has experience with using
  bull rushes to get to the quarterback and has a keen eye for identifying and evaluating defensive line talent.
