personas:
  professional: Laura Patton, a 20‑year‑old EMT‑Basic with a meticulous record‑keeping habit, leverages her structured mindset and BLS expertise to excel in high‑stress emergency calls while quietly aiming
    to become a paramedic and future flight medic.
  sports: Laura Patton hikes the Santa Fe trail system with the Santa Fe Hiking Club, follows the New Mexico Lobos football team for weekend motivation, and streams New Mexico United soccer matches when
    time permits, always logging her runs on Strava to maintain a disciplined fitness routine.
  arts: Laura Patton captures the stark desert light in photographs inspired by Ansel Adams, unwinds listening to Bon Iver and the folk trio The Staves, and attends intimate performances at the Santa Fe
    Playhouse, while board‑game nights feature strategic titles like Catan and Pandemic that satisfy her love for structured challenges.
  travel: Laura Patton plans trips with a mix of detailed research and spontaneous spur‑of‑the‑moment decisions, having trekked to the Grand Canyon, explored the historic streets of Santa Fe’s Plaza, and
    dreaming of backpacking the Inca Trail to Machu Picchu while balancing a limited budget and semester schedules.
  culinary: Laura Patton enjoys cooking wholesome meals such as quinoa‑black‑bean salads with fresh cilantro and lime, roasted sweet potatoes seasoned with cumin and smoked paprika, and occasionally prepares
    spicy chicken posole, all while perfecting their cold brew coffee ritual and experimenting with seasonal desert herbs.
  core: Laura Patton is a detail‑obsessed EMT who balances rigorous emergency duties with a love for structured puzzles, desert photography, and a habit of hoarding hiking gear while still struggling to
    maintain consistent sleep.
background:
  cultural: Laura grew up in a middle‑class white family that valued community service and practical education. Relocating to Santa Fe for her college studies exposed her to the city’s rich blend of Hispanic,
    Pueblo, and Anglo‑American histories. She embraces the adobe architectural aesthetic, enjoys the region’s seasonal chile cuisine, and participates in local festivals that celebrate both Native and Spanish
    traditions. Her work as an EMT has heightened her awareness of health disparities in these communities, motivating her to pursue culturally competent care and to support outreach programs that honor
    the diverse cultural fabric of Santa Fe.
