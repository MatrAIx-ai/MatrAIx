  hobbies: '[''Hiking on the Santa Fe trail system'', ''Landscape photography'', ''Reading medical journals'', ''Puzzle solving'', ''Yoga and meditation'', ''Small‑group board games'', ''Volunteering with
    local CERT'', ''Learning basic Spanish'', ''Cooking wholesome meals'', ''Attending local art exhibitions'']'
  career_goals: Laura aims to transition from EMT‑Basic to a fully certified paramedic within the next two years, completing a rigorous paramedic program at a local community college. She envisions eventually
    becoming a flight medic or an EMS educator, mentoring new EMTs and contributing to community emergency preparedness initiatives. Long‑term, Laura is interested in pursuing a bachelor’s degree in Emergency
    Management or Public Health to combine her hands‑on experience with strategic planning for disaster response, especially in underserved Pueblo and Hispanic communities around Santa Fe.
