  career_goals: Emogene aims to move from his current dispatcher role to a senior dispatcher position and eventually become a communications center supervisor in Jasper County. He plans to obtain Incident
    Command System (ICS) and emergency-management certifications while pursuing an associate degree in public safety or criminal justice at a community college. Long-term, he hopes to influence the design
    of dispatch technology and protocols, integrating his appreciation for visual communication to improve situational awareness displays. He also envisions launching a community-focused art-based stress-relief
    program for first-responders, combining his love of art with his public-service experience.
