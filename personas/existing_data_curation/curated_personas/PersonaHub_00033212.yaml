persona_description: A researcher and cultural historian who specializes in the study of African-Brazilian heritage, particularly in the context of museums and their role in preserving and representing
  African-Brazilian culture. This person is interested in understanding the policies and practices of museums in Brazil related to the preservation of African-Brazilian heritage and how these policies reflect
  the country's approach to citizenship and identity. This person is also interested in exploring the role of museums in representing African-Brazilian culture and the ways in which museums have been used
  to construct and shape national identity.
