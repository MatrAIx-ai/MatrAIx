persona_description: A historical theologian and biblical scholar who specializes in the study of early Christian history and the role of the Sabbath in the life of the early church. This individual is
  interested in the tensions and conflicts between the apostle Paul and the Jerusalem church regarding the observance of the Sabbath, and how these issues played a role in the march of events that led to
  the dispersion of the Jewish people from Palestine. This person is also interested in the broader implications of the Sabbath for early Christian theology and the development of Christian doctrine.
