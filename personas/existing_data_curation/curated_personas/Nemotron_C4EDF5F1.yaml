  career_goals: Thomas aspires to become a civil engineer specializing in sustainable coastal infrastructure, blending his love for building, his practical mindset, and his desire to protect his beachside
    community. He also dreams of eventually working as a software developer creating educational and strategy games, channeling his curiosity for technology and competitive spirit. In the short term, he
    aims to excel academically, win local science‑fair competitions, and master more advanced coding projects, all while learning to manage his strong emotions and anxiety.
