persona_description: A researcher at the Yale School of Medicine who specializes in the study of addiction genetics, particularly the role of the NLGN4X gene in alcoholism. The person is interested in developing
  new treatments for alcoholism through targeted genetic interventions. They are particularly focused on understanding the genetic underpinnings of sex differences in addiction and the potential impact
  of social factors on alcohol consumption. The person is highly knowledgeable about genetics and the brain, and is eager to continue their research with a larger subject population.
