  career_goals: Gerald imagines himself as a future engineer or inventor who designs gadgets that make life easier. He also dreams of being a detective, because his skeptical nature makes him love solving
    mysteries. Though he is only eight, he often talks about wanting to win science fairs, lead a robotics team, or become a professional soccer player, reflecting his competitive drive.
