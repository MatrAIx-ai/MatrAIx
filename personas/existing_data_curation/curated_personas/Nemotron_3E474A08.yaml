  hobbies: '[''DIY home improvement'', ''Gardening (vegetables & roses)'', ''Early‑morning jogging'', ''Kick‑boxing'', ''Church choir singing'', ''Southern cooking (collard greens, black‑eyed peas)'', ''Technical
    reading'', ''Motorcycle restoration'', ''Community potlucks'']'
  career_goals: Beatrice aims to move from her current maintenance worker role to a supervisory position within the next five years, targeting a role as Maintenance Foreman or Reliability Engineer. She
    plans to complete an associate degree in Industrial Maintenance and earn certifications such as the Certified Maintenance & Reliability Technician (CMRT) and forklift operator certification. Her long‑term
    ambition is to lead a maintenance team at a regional distribution center, implementing structured preventive‑maintenance programs that reduce equipment downtime. She also hopes to mentor other women
    and minority workers in the trade and eventually open a small independent equipment‑repair shop serving local farms and small businesses.
