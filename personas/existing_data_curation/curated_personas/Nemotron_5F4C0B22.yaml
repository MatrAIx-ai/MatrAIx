  career_goals: Although only three years old, Dwayne already talks about future roles that provide clear structure and the chance to help others, such as becoming a firefighter or a teacher. He also admires
    his grandparents who tell tribal stories and says he would like to be a storyteller who shares his community's oral traditions. In the short term his ambitions focus on mastering new preschool milestones
    – writing his name, washing his hands independently, and participating proudly in community cultural events.
