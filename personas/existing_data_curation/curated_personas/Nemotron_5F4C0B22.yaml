personas:
  professional: A mini‑project manager in the making, Dwayne Rattani loves arranging blocks into neat rows and guiding peers through preschool clean‑up routines; they channel their preference for structure
    into organized play while still encouraging group games.
  sports: An enthusiastic little kicker, Dwayne Rattani proudly wears the jersey of the local Little Strikers Soccer Club and practices dribbling with a foam ball after preschool; they thrive on the predictable
    routine of weekly practice while cheering for the senior city team, the River City Raptors, during televised matches.
  arts: A budding music lover, Dwayne Rattani sings along to the catchy tunes of The Wiggles and Disney’s Let It Go from Frozen, often staging impromptu dance performances for their family; they collect
    stickers of beloved characters like Mickey Mouse and enjoy drawing colorful pictures of these heroes, using the structure of coloring books to calm their heightened emotions.
  travel: A curious junior explorer, Dwayne Rattani has already visited Disneyland in Anaheim and a sunny beach resort in Myrtle Beach, delighting in the predictable schedule of ride queues and sandcastle
    building; they love packing their tiny suitcase with favorite plush toys and insist on a bedtime story before every road trip.
  culinary: A tiny gourmand, Dwayne Rattani’s favorite meals include cheesy macaroni, peanut butter‑banana sandwiches, and bite‑sized carrot sticks with ranch dip; they often help stir batter for banana
    muffins under close supervision, and they show a distinct dislike for brussels sprouts, dramatically refusing them with an exaggerated face.
  core: Energetic yet methodical, Dwayne Rattani, a 3‑year‑old, transforms their love for order into daily toy‑sorting marathons while battling fierce waves of anxiety that make bedtime a high‑stakes ritual.
background:
  cultural: Dwayne is raised in an American Indian household that traces its heritage to the Eastern Band of Cherokee families in North Carolina. His family lives in Fayetteville, NC, where they blend contemporary
    urban life with cultural traditions such as speaking bits of the Cherokee language at home, attending local powwows, and preserving oral histories through storytelling. The family places a strong emphasis
    on respect for nature, community interdependence, and sharing cultural songs and dances. These influences give Dwayne a grounded sense of identity, a love for communal gatherings, and an early appreciation
    for the rhythms and narratives of his tribal heritage.
