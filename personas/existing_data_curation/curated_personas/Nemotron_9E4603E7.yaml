personas:
  professional: An experienced office clerk, Angela Houslin leverages her meticulous record‑keeping, advanced Microsoft Office expertise, and creative problem‑solving to streamline workflows while channeling
    her curiosity into monthly office art displays that brighten the workplace.
  sports: An enthusiastic follower of the River City Royals baseball team, Angela Houslin joins a senior walking group each spring, attends community‑center yoga sessions on Tuesdays, and plays casual pickleball
    at the neighborhood park during the summer.
  arts: Deeply immersed in visual and musical arts, Angela Houslin visits downtown galleries showcasing emerging artists like Maya Torres and Leon Cheng, attends jazz nights featuring the Velvet Blues Ensemble,
    and curates a monthly office art spotlight featuring contemporary painters.
  travel: Balancing adventure with relaxation, Angela Houslin schedules weekend trips to historic New England villages, dreams of attending the cherry‑blossom festivals in Kyoto, Japan, and adheres to a
    disciplined travel budget that favors off‑season airfare and modest accommodations.
  culinary: An enthusiastic home chef, Angela Houslin delights in cooking Southern comfort dishes such as shrimp étouffée, collard greens with smoked turkey, and sweet‑potato pie, often enhancing recipes
    with fresh herbs from her backyard garden and hosting potluck gatherings for friends.
  core: Angela Houslin blends disciplined organization with restless curiosity, turning office tables into mini‑exhibitions while secretly hoarding a stash of vintage coffee beans for long data‑entry nights.
background:
  cultural: Angela was born and raised in the African‑American community of Huntsville, Alabama, during a period of significant social change. Her upbringing was shaped by the close‑knit network of the
    local Black church, where gospel music, fellowship, and community service were integral. She grew up hearing stories of the civil‑rights movement from older relatives, fostering a strong sense of resilience
    and pride in her heritage. Family gatherings often feature soul food, storytelling, and the celebration of African‑American holidays such as Juneteenth. Angela maintains connections to historic Black
    neighborhoods in Madison County and actively supports local Black artists and cultural events. Her identity is informed by both Southern traditions and the broader African‑American experience, influencing
    her appreciation for art, community, and intergenerational mentorship.
