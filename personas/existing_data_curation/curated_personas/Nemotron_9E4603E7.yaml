    and family history'']'
  career_goals: Angela aims to move from her current clerk position to a supervisory or office manager role within the next few years. She plans to obtain a Certified Administrative Professional (CAP) credential
    to formalize her expertise and strengthen her qualifications. Leveraging her love of art, Angela hopes to coordinate office cultural initiatives, such as monthly art displays and creative workshops,
    to enrich the workplace environment. Long‑term, she envisions a gradual transition to part‑time consulting for small businesses, focusing on office organization and efficiency, while dedicating more
    time to volunteering with local arts organizations and mentoring younger employees. Financially, she is focused on building a secure retirement fund that will allow flexibility for travel, community
    involvement, and continued artistic pursuits.
