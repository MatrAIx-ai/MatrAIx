personas:
  professional: Judy Hartley, a 69‑year‑old community‑center volunteer with a bachelor’s degree in a STEM field, applies her Excel, Python, and VBA expertise to design data‑driven workshops, meticulously
    plan senior art exhibitions, and mentor high‑school students in analytical thinking, all while weaving her art‑history knowledge into accessible curatorial projects.
  sports: Judy Hartley stays active by joining the Bellflower Senior Walking Club for daily coastal‑trail walks, practicing weekly Tai Chi at the community center, cheering on the Los Angeles Dodgers during
    baseball season, and playing light pickleball in a seniors’ league at the local recreation center.
  arts: Judy Hartley immerses herself in the arts by visiting the Getty Center’s monthly exhibitions, painting watercolors inspired by Claude Monet and Georgia O’Keeffe, listening to Debussy’s piano preludes
    while knitting, and leading senior workshops that spotlight Henry Moore’s sculpture and the photography of Ansel Adams.
  travel: Judy Hartley plans her travel around curated cultural itineraries, having already toured the Museum of Modern Art in New York and the National Gallery of Art in Washington, D.C., while dreaming
    of a pilgrimage to the Musée d’Orsay in Paris and a road‑trip through Yosemite and Grand Canyon National Parks, favoring organized group tours that balance comfort with intellectual enrichment.
  culinary: Judy Hartley, an avid home gardener, loves preparing fresh garden salads with heirloom tomatoes, basil, and mozzarella, cooking classic Baja‑style fish tacos with cilantro‑lime slaw, and baking
    a nostalgic apple pie spiced with nutmeg and cinnamon, all while maintaining a confident hobby‑cook level that encourages occasional experimentation with new herbs.
  core: Judy Hartley blends meticulous spreadsheet planning with a love for watercolor, turning every senior‑center activity into a well‑orchestrated art‑venture, even if they sometimes misplace their glasses
    on the beach walk.
background:
  cultural: Judy’s cultural background stems from a mid‑century white American suburban upbringing. Born in the late 1950s, she experienced the social transformations of the 1960s and 70s, which fostered
    a strong belief in education, hard work, and civic responsibility. Relocating to Southern California introduced her to a vibrant, multicultural environment that deepened her appreciation for diverse
    artistic expressions and new ideas. Her long‑standing involvement in local church and community groups reinforced values of fellowship, service, and harmony.
