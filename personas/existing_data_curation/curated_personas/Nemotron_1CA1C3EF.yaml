  career_goals: Judy aims to stay intellectually active and socially engaged by volunteering at the Bellflower community center, mentoring high‑school students in STEM subjects, and leading art‑appreciation
    workshops for seniors. She plans to complete a personal memoir documenting her family’s history and create a photo archive for future generations. Travel to major art museums and national parks is high
    on her list, as is deepening her knowledge of astronomy through local night‑sky observation groups. Ultimately, she hopes to serve on the board of the Bellflower Art Council to promote accessible arts
    education and community outreach.
