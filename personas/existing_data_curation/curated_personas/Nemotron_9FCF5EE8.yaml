personas:
  professional: John Ferrara, an aspiring LEGO architect and budding coder, channels their practical mindset into designing intricate brick structures while experimenting with simple programming puzzles,
    and they thrive on collaborative projects that let them bounce ideas off friends.
  sports: John Ferrara drills at the Rome Youth Soccer Club every Saturday, idolizes the Pittsburgh Steelers during football season, and keeps fit by sprinting through the woods after fishing trips, preferring
    spontaneous play over regimented workouts.
  arts: John Ferrara jams to The Beatles and Queen on family road trips, re-creates iconic album covers with LEGO bricks, and sketches characters from their favorite video games during quiet evenings, letting
    the music shape their imaginative builds.
  travel: John Ferrara loves weekend camping trips to state parks in the Alleghenies, day trips to the historic streets of Philadelphia, and dreams of a summer adventure in Rome, Italy, where they hope
    to sample authentic pasta while exploring ancient ruins, all while balancing their family’s modest travel budget.
  culinary: John Ferrara enjoys devouring spaghetti with meatballs smothered in homemade tomato sauce seasoned with garlic and basil, loves biting into crisp cannoli filled with sweet ricotta, and often
    helps dad grill pepperoni pizza topped with mozzarella, though they rarely try cooking for themselves.
  core: John Ferrara is a sociable, structure-loving 11-year-old who balances a love for group play and LEGO building with a habit of worrying about money and health, often forgetting responsibilities but
    always returning to the comfort of family meals and friends’ laughter.
background:
  cultural: John comes from an Italian-American family with deep roots in the small, close-knit community of Rome, Pennsylvania. Family gatherings often feature traditional dishes like spaghetti and meatballs,
    homemade tomato sauce, and cannoli, reflecting his heritage. Though primarily English-speaking, occasional Italian phrases and celebrations, such as Festa di San Giuseppe, are part of his upbringing.
    The town's modest, rural setting reinforces values of hard work, community support, and modesty, which blend with his family's cultural traditions to shape his identity.
