  career_goals: John dreams of a future where he can help people directly and work within a clear, organized framework. He imagines becoming a firefighter because he admires the bravery, teamwork, and structured
    training of his local fire department. He also thinks about coaching a youth soccer team or becoming a teacher, roles that let him combine his love for group activities, his supportive nature, and his
    desire for a predictable daily routine. While he sometimes worries about living up to expectations, he is motivated to develop the skills needed for a community-focused career.
