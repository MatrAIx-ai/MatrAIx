personas:
  professional: Kendall Morris, a budding soccer captain and LEGO strategist, blends organized planning with a competitive edge, leading drill sequences on the school field while using Scratch to prototype
    simple games, and they relish the spotlight of the bleachers.
  sports: Kendall Morris darts across the local Junior Strikers soccer field, dreaming of emulating Megan Rapinoe on the US Women's National Soccer Team while cheering for Manchester United Women during
    weekend viewings, and they approach fitness with a disciplined drill routine balanced by playful tag games after practice.
  arts: Kendall Morris lights up in school theater productions like Matilda the Musical, idolizes performer Lin‑Manuel Miranda’s energy, endlessly flips through Nancy Drew mystery books, and sings along
    to Taylor Swift’s catchy pop anthems while secretly practicing a dramatic monologue in front of the bathroom mirror.
  travel: Kendall Morris has already explored the thrills of Disney World in Florida, hiked the kid‑friendly trails of the Grand Canyon’s South Rim, and spent sunny weekends at Lake Tahoe, while dreaming
    of future adventures to Paris’s Eiffel Tower and Japan’s Kyoto temples, planning each trip with detailed map stickers and a spirited itinerary.
  culinary: Kendall Morris, a budding junior baker, loves mixing chocolate chips, butter, and brown sugar into chewy cookies, conjures mozzarella and pepperoni on homemade pizza dough, and proudly adds
    rainbow sprinkles to cupcakes, while often over‑seasoning their mac and cheese with extra cheddar, delighting in the mess of flour on the kitchen floor.
  core: Kendall Morris is a structured yet sociable eight‑year‑old who turns every game, LEGO set, and story into a competitive stage, balancing meticulous planning with a love for the spotlight, while
    occasionally forgetting to pause and breathe.
background:
  cultural: Kendall comes from a middle‑class family in Oakville, a small town in New Haven County, Connecticut. Her upbringing reflects typical New England values that emphasize education, community involvement,
    and seasonal outdoor activities. Her parents maintain a structured home routine that includes regular homework time, family meals, and weekend chores, while also encouraging independent thinking and
    social interaction. She attends a public elementary school that values academic achievement and extracurricular participation, and she frequently takes part in local events such as the town’s fall harvest
    festival, library storytimes, and community sports leagues. Family traditions include celebrating holidays like Thanksgiving and Christmas with traditional meals, summer trips to nearby coastal areas,
    and autumn walks to enjoy the changing foliage. This blend of structured family life, community engagement, and seasonal traditions shapes Kendall’s cultural background.
