  career_goals: Kendall dreams of a future where she can combine her love for structure, people, and leadership. In the short term, she aims to become class monitor and win a regional spelling bee. Looking
    ahead, she envisions herself as a teacher who creates organized, engaging lessons for young learners, or even a school principal who designs supportive learning environments. She also expresses interest
    in becoming a pediatric nurse or doctor, where she can apply her practical, caring nature within a well‑structured healthcare setting. Ultimately, she wants a career that lets her guide and inspire
    others while maintaining clear routines and goals.
