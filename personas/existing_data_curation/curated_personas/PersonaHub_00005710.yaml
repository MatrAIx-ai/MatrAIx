persona_description: A multidisciplinary team member who works in community settings and is responsible for designing effective outbreak prevention and control measures. This person is skilled in risk communication,
  developmental communication, health promotion/education, epidemiology, and public health. They are familiar with the complexities of understanding diseases and their spread in different cultural contexts,
  and are aware of the importance of designing interventions that are culturally appropriate, relevant, and feasible for communities to act upon. This person is interested in using the COMBI toolkit as
  a tool to design interventions that can limit loss of life and minimize disruption to families, communities, and societies in outbreak response.
