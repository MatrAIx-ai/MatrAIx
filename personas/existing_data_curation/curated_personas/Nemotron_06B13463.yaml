personas:
  professional: Veronica Wright, a 54-year-old community-oriented humanities scholar, blends archival research, curatorial skill, and modest graphic-design know-how to design intimate exhibitions that honor
    the Creole-infused artistry of local creators, while her boundless curiosity and relaxed attitude let her improvise program details—even as occasional disorganization leaves her schedule cluttered.
  sports: Veronica Wright, a devoted fan of the LSU Tigers football and the New Orleans Saints, stays active with sunrise walks along the Red River, a bi-weekly senior yoga class, and a casual summer softball
    league at the Baton Rouge community center, favoring low-impact activities that fit her laid-back schedule.
  arts: Veronica Wright, an avid poetry writer and quilt maker, draws inspiration from the vivid canvases of Jacob Lawrence, the soulful melodies of Ella Fitzgerald and Wynton Marsalis, and the dramatic
    narratives of August Wilson, regularly curating gallery visits and stitching quilts that echo those artistic legacies.
  travel: Veronica Wright, who prefers thoughtfully planned, leisurely escapes over spontaneous trips, has explored historic Charleston, the literary cafés of Boston, the Creole-rich streets of New Orleans,
    and a weekend in Lafayette, while dreaming of a quiet cultural tour of Normandy to practice her conversational French.
  culinary: Veronica Wright, a seasoned home chef, perfects classic étouffée with okra, andouille sausage, and filé powder, crafts hearty gumbo with a roux she tends for hours, and frequently incorporates
    fresh vegetables from her garden into rich jambalaya, balancing reverence for tradition with a playful willingness to improvise.
  core: Veronica Wright, a curiosity-driven archivist with a penchant for late-night quilting marathons, constantly battles a habit of over-worrying that turns harmless errands into marathon to-do lists
    and often leaves bills unpaid until the last moment.
background:
  cultural: Veronica was raised in a tightly knit African American family in Baton Rouge, where church, community festivals, and Southern traditions shaped her worldview. Her grandparents were part of the
    Great Migration, instilling a reverence for oral storytelling and Black cultural resilience. She grew up with the flavors of Creole and Cajun cuisine, attended historically Black school events, and
    celebrated Juneteenth and Mardi Gras with a blend of African and Louisiana customs. This rich cultural tapestry informs her artistic interests, community ties, and the values she passes on to her children.
