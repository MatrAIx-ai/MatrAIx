  hobbies: '[''Art gallery visits'', ''Reading literary fiction'', ''Poetry writing'', ''Quilting'', ''Gardening'', ''Creole cooking'', ''Jazz and blues listening'', ''Small book club gatherings'', ''Church
    choir participation'']'
  career_goals: Veronica hopes to translate her lifelong curiosity into meaningful community engagement. She aims to volunteer as a docent at the Baton Rouge Museum of Art, develop a traveling exhibit showcasing
    local Black artists, complete a memoir that weaves personal narratives with cultural history, and launch a modest online boutique featuring hand‑stitched quilts that incorporate African motifs. These
    goals allow her to stay flexible, work at her own pace, and contribute without the pressures of a formal employment schedule.
