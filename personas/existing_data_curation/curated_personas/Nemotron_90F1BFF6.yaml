personas:
  professional: Susan Repasz, a 63‑year‑old veteran home health aide with three decades of hands‑on experience, blends pragmatic routine‑building with compassionate assertiveness as they mentor new aides,
    pursue a CNA credential, and plan to launch a family‑run senior‑care service in Wharton County.
  sports: Susan Repasz stays active by walking their beagle along the Blanco River five times a week, joins the local senior walking club, follows the Houston Astros and the Dallas Cowboys on TV, and they
    cheer on the Texas Longhorns women's soccer team during the spring season.
  arts: Susan Repasz finds creative fulfillment quilting colorful blankets for seniors, singing gospel hymns with the Baptist church choir, reading historical fiction by Ken Follett and Philippa Gregory,
    and they listen to classic country artists like Willie Nelson and Dolly Parton while cooking, all of which stitch together their sense of community, nostalgia, and personal expression.
  travel: Susan Repasz prefers low‑key weekend getaways, often road‑tripping to Hill Country vineyards or the Gulf Coast for family reunions, but they also harbor a long‑standing wish to see the Grand Canyon
    and the historic sites of Savannah, balancing careful budgeting with occasional splurges on a modest cruise with their adult children.
  culinary: Susan Repasz cooks with a blend of Texas barbecue mastery and Tex‑Mex flair, regularly smoking brisket, grilling jalapeño‑stuffed peppers, simmering chicken‑fried steak with creamy gravy, and
    tossing fresh garden tomatoes into zesty salsa, while they proudly source herbs from their backyard and treat themselves to occasional visits to Pete’s BBQ for a side of smoked ribs.
  core: Susan Repasz, a 63‑year‑old home‑care veteran with a penchant for garden‑fresh salsa, quilting marathons, and a surprisingly lax filing system, balances structured caregiving with a love‑of‑flexibility
    that sometimes leaves receipts buried under fabric scraps.
background:
  cultural: Susan was raised in a multigenerational Anglo‑American family in small‑town Texas, where Southern hospitality, a strong Baptist faith, and close community ties were central. Her parents owned
    a modest family farm and emphasized hard work, self‑reliance, and caring for elders, values that continue to inform her caregiving philosophy. Living in El Campo, she participates in regional traditions
    such as Fourth of July fireworks, the State Fair, and communal barbecues. While English is her primary language, she has picked up basic Spanish phrases through interactions with the diverse local population.
    Her cultural identity blends practicality with compassion, a respect for tradition with openness to change, and a commitment to serving the community that shaped her.
attributes:
  skills: '[''personal hygiene assistance'', ''mobility support and safe transfers'', ''medication reminder and management'', ''basic wound care'', ''chronic disease monitoring'', ''patient documentation
    and record‑keeping'', ''care routine development'', ''infection control practices'', ''knowledge of anatomy and nutrition'', ''understanding of Medicare/Medicaid regulations'', ''household budgeting
    and meal planning'', ''community resource coordination'', ''effective communication with families and providers'', ''assertive boundary setting'', ''flexible problem‑solving'']'
  hobbies: '[''gardening'', ''cooking Texas and Tex‑Mex cuisine'', ''quilting'', ''church choir singing'', ''volunteering at senior center'', ''walking beagle along river'', ''reading historical fiction'',
    ''attending Wharton County Fair'', ''bird‑watching'', ''knitting'']'
  career_goals: Susan aims to finish her Associate’s degree in Health Sciences within the next two years and obtain a Certified Nursing Assistant (CNA) credential to broaden her clinical skill set. She
    plans to pursue a Home Health Aide Supervisor certification, positioning herself for a lead‑aide role at her local home‑care agency where she can mentor newer aides and help shape care protocols. Long‑term,
    she envisions launching a small family‑run home‑care service tailored to seniors in Wharton County, emphasizing structured yet personalized care plans. Additionally, she hopes to volunteer as a health‑literacy
    educator at her church, sharing practical wellness tips with the broader community.
