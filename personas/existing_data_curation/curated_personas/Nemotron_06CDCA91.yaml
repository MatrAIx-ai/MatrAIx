  career_goals: Although she is only eight, Barbara already has ambitious ideas about her future. She dreams of becoming an astronaut or space scientist, fascinated by the cosmos and determined to contribute
    to future space missions. She also envisions a career as an illustrator or concept artist, hoping to merge her love of art with scientific storytelling. Her competitive nature fuels a desire to win
    top honors in academic competitions and eventually attend a prestigious STEM‑focused high school and university. In the long term she hopes to lead research projects that blend art and science, such
    as designing visualizations for scientific data.
