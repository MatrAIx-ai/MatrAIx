  career_goals: Kameron aims to channel his curiosity and practical mindset into a future career in engineering, with a particular interest in robotics or aerospace technology. He hopes to attend a STEM‑focused
    high school, earn a scholarship, and eventually earn a degree in mechanical or aerospace engineering. Alongside his technical ambitions, he wants to give back to his community by mentoring younger students,
    possibly coaching a youth basketball team, and participating in outreach programs that introduce science and technology to local schools.
