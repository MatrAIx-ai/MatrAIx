personas:
  professional: A budding robotics enthusiast and junior coder, Kevin Patilla channels their methodical curiosity into building LEGO Mindstorms projects, writing Python scripts to modify video games, and
    documenting each step with precise logs, blending innovative tinkering with disciplined organization.
  sports: A low‑key fitness enthusiast, Kevin Patilla prefers solo activities like weekend trail running with a local running club and occasional swimming at the community pool, while passionately cheering
    for the Chicago Cubs and Chicago Bulls, and tracks personal performance metrics with a smartwatch app.
  arts: A quiet creative mind, Kevin Patilla sketches native birds and insects in a well‑worn sketchbook, listens to the electronic symphonies of Daft Punk and the orchestral scores of Hans Zimmer, and
    frequently re‑watches sci‑fi classics such as 'The Expanse' and the original 'Star Wars' trilogy for inspiration.
  travel: A detail‑oriented planner, Kevin Patilla enjoys short road trips to nearby science museums like the Smithsonian Air & Space Museum in Washington D.C., dreams of stargazing in Chile's Atacama Desert
    and touring the Kennedy Space Center, and meticulously maps itineraries on Google Earth while budgeting each outing.
  culinary: A modest yet adventurous eater, Kevin Patilla favors homemade pepperoni pizza, spicy miso ramen with boiled eggs, and baking chocolate chip cookies with dark chocolate chunks, skillfully following
    YouTube tutorials to prepare simple dishes while occasionally experimenting with edible glitter for a playful twist.
  core: Kevin Patilla is a methodical, solitary teen whose curiosity drives meticulous hobby projects, disciplined budgeting, proactive health habits, and a quiet passion for sci‑fi and stargazing, even
    if they sometimes get lost in endless coding loops.
background:
  cultural: 'Kevin grew up in Benton, a small town in Grant County, Arkansas, immersed in a Southern‑Midwestern cultural setting. His family background reflects typical values of the region: a strong emphasis
    on self‑reliance, community involvement, and modest, family‑centered life. Local traditions such as attending church services, celebrating holidays like Thanksgiving and Fourth of July with community
    events, and participating in outdoor activities like hunting, fishing, and exploring the nearby Ozark foothills have shaped his appreciation for quiet, natural environments. While he respects these
    conventional roots, Kevin also accesses a broader digital culture through online forums, coding tutorials, and gaming communities, blending his rural upbringing with a modern, technology‑focused perspective.'
