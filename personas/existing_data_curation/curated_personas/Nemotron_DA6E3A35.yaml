  career_goals: Kevin aims to turn his passion for technology and engineering into a career in software or aerospace engineering. In the short term, he plans to master advanced programming concepts, compete
    in regional robotics and model‑rocket contests, and secure a summer internship or mentorship with a local university's engineering department. He hopes to attend a specialized STEM high‑school program,
    earn scholarships for his academic achievements, and eventually pursue a bachelor's degree in computer science or aerospace engineering at a research university. Long‑term, Kevin envisions working on
    the development of autonomous drones or space exploration technologies, contributing to innovative projects that combine his methodical problem‑solving style with his competitive drive.
