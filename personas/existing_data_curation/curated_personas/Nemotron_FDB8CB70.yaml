  hobbies: '["Church choir and outreach volunteering", "Cooking Southern cuisine", "Gardening (vegetables and herbs)", "Jazz and blues music listening", "Reading African‑American history and biographies",
    "Crossword puzzles and Sudoku", "Walking historic districts in Fayetteville", "Genealogy research", "Mild woodworking projects", "Volunteer tutoring youth at the local community center"]'
  career_goals: Thurnell aims to transition into a senior administrative or office‑manager role within the next two years, leveraging his associate’s coursework in business administration to qualify for
    higher‑level responsibilities. He plans to earn a certification in Office Management and to lead a project that digitizes the county’s public information kiosk, improving response times and accessibility
    for residents. His competitive drive pushes him to be recognized as the top performer on his team, while his practical curiosity motivates him to adopt new technologies that reduce clerical errors and
    enhance overall efficiency. Ultimately, he hopes to mentor younger employees, sharing his methodical approach and fostering a culture of reliability and continuous improvement.
