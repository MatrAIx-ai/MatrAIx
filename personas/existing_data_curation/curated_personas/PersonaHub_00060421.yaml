persona_description: A digital humanities instructor who teaches undergraduate students about the theory and practice of digital markup, interface design, and text analysis. They have experience teaching
  within an undergraduate literature seminar and are familiar with the literary terminology used in close readings of poems. They are also familiar with the contemporaneous textual situations of texts and
  the editorial or digital culture surrounding them. They have experience with digital humanities projects and have a deep understanding of the importance of self-reflexive editing and interpretation practices.
  They are also familiar with the concept of textual indeterminacy and its implications for analyzing and interpreting texts.
