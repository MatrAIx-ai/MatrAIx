    User 1: I can see why. It is a cheerful color.

    User 2: Yes, it is.

    User 1: So, what do you like to do for fun?

    User 2: I like to read, watch movies, and spend time with my family.

    User 1: That sounds nice. I like to do those things too.

    User 2: We should get together sometime and do something fun.

    User 1: That would be fun.

