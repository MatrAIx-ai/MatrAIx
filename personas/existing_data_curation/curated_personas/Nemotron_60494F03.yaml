  career_goals: Even in retirement, Nathalie remains driven by a desire to leave a lasting, positive impact. She aims to establish a mentorship program that pairs senior volunteers with high‑school students
    interested in STEM, using her structured planning skills to create sustainable curricula. She also hopes to author a memoir that chronicles her experience as a woman in engineering during the 1960s,
    preserving personal and historical insights for future generations. Maintaining her health and mental well‑being is a personal ambition, as is continuing to serve as a trusted advisor for community
    projects that promote education, environmental stewardship, and intergenerational harmony.
