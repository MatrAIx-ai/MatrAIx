personas:
  professional: Brandon Willis, a budding technophile and aspiring game developer, merges strategic thinking from Civilization and StarCraft with hands‑on Arduino programming, while their need for both
    structure and spontaneous improvisation drives them to prototype indie games during quiet evenings.
  sports: Brandon Willis maintains fitness through solo trail runs along the Norwalk River and occasional skateboarding at the local skate park, participates in the Norwalk Youth Running Club’s weekend
    meet‑ups, and avidly follows the New England Patriots in football and the New York Yankees in baseball.
  arts: Brandon Willis, an acoustic‑guitar enthusiast who models John Mayer’s fingerpicking and Andy McKee’s percussive style, draws visual inspiration from H.R. Giger’s sci‑fi art, creates digital illustrations
    during late‑night sessions, and edits short narrative videos set to Daft Punk’s synth‑driven scores, sharing the work anonymously on niche online forums.
  travel: Brandon Willis prefers low‑key, self‑planned trips that blend nature and technology, having hiked the Connecticut section of the Appalachian Trail, explored Boston’s Freedom Trail, and day‑tripped
    to Montreal’s Old Port, while dreaming of a solo trek across Iceland’s volcanic landscape and a tech‑focused visit to Tokyo.
  culinary: Brandon Willis, a modest home‑cook, reliably prepares pepperoni pizza and instant ramen, experiments with avocado toast topped with smoked salmon, and has even built an Arduino‑controlled spice
    dispenser for crafting a personalized chicken curry, favoring bold ingredients like chili flakes and cilantro.
  core: Brandon Willis is a solitary strategist who fuses video‑game tactics with Arduino tinkering, yet habitually procrastinates on school projects while obsessively arranging guitar picks by size.
background:
  cultural: Brandon grows up in a typical middle‑class White family in Norwalk, Connecticut, a suburban community in Fairfield County. His cultural upbringing blends mainstream American values—individualism,
    self‑reliance, and a respect for personal privacy—with New England’s understated work ethic and an appreciation for the region’s colonial history. Family celebrations revolve around holidays such as
    Thanksgiving, Christmas, and the Fourth of July, often featuring traditional foods like turkey, apple pie, and barbecue. He’s familiar with the local sports culture, especially the New York Yankees
    and New England Patriots, and enjoys community events like the Norwalk Oyster Festival. His parents’ background is of mixed European descent (Irish and German), which subtly influences his food preferences
    (e.g., comfort foods like meatloaf) and occasional family stories about ancestors who settled in New England during the 1800s.
