  hobbies: '[''Strategy video gaming (Civ, StarCraft)'', ''Reading science‑fiction/fantasy novels'', ''Acoustic guitar practice'', ''Arduino tinkering and home‑automation projects'', ''Hiking and nature
    sketching along the Norwalk River'', ''Digital photography and video editing'', ''DIY woodworking projects'']'
  career_goals: He aims to turn his technical interests into a career. In the short term, he plans to earn industry certifications (CompTIA A+, Cisco CCENT) and secure an apprenticeship in IT support or
    computer repair, where he can work independently and apply his problem‑solving skills. Long‑term, he envisions becoming a software developer or cybersecurity analyst, focusing on backend systems that
    require methodical, structured work, while still allowing the flexibility to work remotely or freelance. He also entertains the idea of running his own small‑scale tech repair business that serves the
    Norwalk community.
