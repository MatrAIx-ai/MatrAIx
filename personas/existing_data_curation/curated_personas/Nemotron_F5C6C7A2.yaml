personas:
  professional: Carina Rodrigues, an 8‑year‑old student who already leads their school's Eco‑Crew, applies their love of soccer teamwork and ballet discipline to organize recycling projects with a methodical
    checklist, showing reliable, structured leadership in a playground‑sized office.
  sports: Carina Rodrigues charges across the soccer field as a forward for the local Little Tigers team, cheers on FC Barcelona during family game nights, and joins tag sprint races at recess, blending
    their love for fast‑paced play with a disciplined training routine.
  arts: Carina Rodrigues expresses themselves in ballet pirouettes, colorful Mexican folk dance steps, and vibrant sketches of Magic Tree House heroes, while humming Disney soundtracks by Idina Menzel and
    collecting stickers of artist Yayoi Kusama.
  travel: Carina Rodrigues prefers weekend road trips to nearby state parks like Yellowstone, where they document wildlife in their notebook, and dreams of a future family vacation to Disney World’s Magic
    Kingdom, balancing adventure with their love for organized itineraries.
  culinary: Carina Rodrigues happily mashes ripe avocados for guacamole, assembles taco shells with shredded cheese and cilantro, and perfects their pancake art by arranging blueberries into smiley faces,
    though they often leave a trail of flour on the kitchen counter.
  core: Carina Rodrigues is a spirited, organized eight‑year‑old who juggles soccer, ballet, LEGO building, and a meticulous allowance ledger, occasionally forgetting to tidy up their creative messes.
background:
  cultural: Carina is a Mexican‑American raised in Riverside’s vibrant Latino community. At home she hears Spanish, celebrates traditions such as Día de los Muertos, Cinco de Mayo, and family gatherings
    with music, papel picado, and homemade tamales. Her family blends Mexican values of family closeness, respect for elders, and communal celebration with the multicultural environment of Southern California.
    She attends a bilingual elementary program that reinforces both languages and cultural stories. This mixed heritage influences her love for Mexican cuisine, folk dance, and her desire to be bilingual,
    while also giving her a strong sense of belonging to both her Mexican roots and her American neighborhood.
attributes:
  skills: '[''Reading fluently (grade‑level)'', ''Basic arithmetic (addition and subtraction)'', ''Bilingual communication (Spanish and English)'', ''Organizational skills (checklists, tidy supplies)'',
