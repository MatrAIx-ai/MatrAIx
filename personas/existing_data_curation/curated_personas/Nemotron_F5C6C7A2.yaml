  hobbies: '[''Soccer'', ''Tag and group playground games'', ''Ballet and Mexican folk dance'', ''Reading adventure books (e.g., Magic Tree House)'', ''Drawing and sketching'', ''Building LEGO sets'', ''Puzzle
    solving'', ''Helping with simple cooking (guacamole, tacos)'', ''School Eco‑Crew club participation'']'
  career_goals: Carina dreams of a future where she can combine her love of structure, helping people, and bilingual abilities. She often talks about becoming a teacher, especially one who can teach both
    English and Spanish to younger children, so she can create a well‑organized classroom where every student feels supported. She also envisions working in community health or a neighborhood youth program,
    using her reliability and compassion to guide kids in safe, fun activities. Her long‑term ambition is to be a role model who bridges her Mexican heritage and American community.
