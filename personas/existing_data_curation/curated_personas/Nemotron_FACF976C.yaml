personas:
  professional: Mia Davis, a retired community organizer in Washington, channels their decades of public‑speaking and event‑planning expertise into leading senior‑center arts workshops, curating civil‑rights
    era histories for the town museum, and mentoring younger adults and grandchildren, all while they thrive as the charismatic hub of any gathering.
  sports: Mia Davis enjoys gentle morning walks with the local seniors’ walking club, participates in weekly community tai‑chi classes, and passionately roots for the Washington Capitals, Washington Wizards,
    and Washington Nationals, while they occasionally join a recreational bridge league that keeps both mind and body active during the winter months.
  arts: Mia Davis, an avid patron of the arts, frequently visits galleries showcasing works by Jacob Lawrence and local muralists, delights in community theater productions of August Wilson plays, and draws
    inspiration from the soulful sounds of Ella Fitzgerald, Miles Davis, and the gospel harmonies of The Blind Boys of Alabama, all of which they incorporate into their own quilting and painting projects.
  travel: Mia Davis prefers purposeful travel that blends cultural discovery with family bonding, often planning trips to historic sites like Gettysburg, Monticello, and the civil‑rights museum in Birmingham,
    while they also cherish annual visits to New Orleans for jazz festivals and weekend getaways to the Shenandoah Valley, balancing adventure with the practicalities of traveling with grandchildren.
  culinary: Mia Davis, a modestly skilled home cook, infuses soul‑food classics such as collard greens simmered with smoked turkey, tomato‑based gravy over cornbread, and sweet potato pie into family meals,
    often seasoning dishes with fresh herbs from their garden, and occasionally forgets to turn off the stove while chatting enthusiastically about recipes, which they lovingly correct with a pinch of patience.
  core: Mia Davis is a charismatic, community‑focused mentor who blends artistic passion, gentle humor, and a habit of over‑chatting into every gathering, leaving a trail of vibrant quilts, lively stories,
    and slightly over‑cooked casseroles.
background:
  cultural: Mia was raised in a tight‑knit African‑American community in the rural South during the height of the civil‑rights movement. Her family placed great emphasis on church participation, oral storytelling,
    and the preservation of cultural traditions such as music, cuisine, and handcrafts. Growing up, she witnessed the power of collective action and community resilience, which shaped her dedication to
    harmony, service, and intergenerational connectivity. Today, she continues to honor that heritage by actively engaging in church activities, championing local African‑American history, and passing on
    cultural knowledge through mentorship, cooking, and the arts.
