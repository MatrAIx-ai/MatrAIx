  hobbies: '["Visiting art galleries and museums","Attending community theater and live music events","Quilting and knitting","Painting landscapes","Gardening (vegetables and herbs)","Cooking traditional
    Southern and soul‑food dishes","Reading African‑American literature in a book club","Volunteering as an art instructor at the senior center","Singing in the church choir","Traveling to historic sites
    and cultural festivals"]'
  career_goals: Although retired from formal employment, Mia aims to deepen her impact on the Washington community. She aspires to lead a senior‑center arts program that bridges generations, document and
    curate local African‑American histories for the town museum, and author a memoir capturing her experiences from the civil‑rights era to present day. Mia also hopes to travel to major art exhibitions
    and historic sites across the United States, expanding her cultural horizons while sharing her insights with neighbors. Ultimately, she wants to leave a lasting legacy of cultural preservation, intergenerational
    mentorship, and vibrant community engagement.
