persona_description: A healthcare professional who specializes in cardiology and electrophysiology, particularly in the diagnosis and management of arrhythmias and heart rhythm disorders. They are skilled
  in interpreting and analyzing ECGs, particularly those that show trigeminy, and have expertise in the diagnosis and treatment of PVCs, including the use of pharmacological and surgical interventions.
  They are also knowledgeable in the study of cardiac electrophysiology, including the identification and characterization of abnormal heart rhythms, and the development of new diagnostic and treatment
  strategies.
