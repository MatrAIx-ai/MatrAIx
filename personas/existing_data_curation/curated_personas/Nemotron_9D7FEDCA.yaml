personas:
  professional: Lorne Wright leverages an active CDL and an associate’s degree in Business Administration to operate as an independent sales‑driven truck driver, expertly conducting vehicle inspections,
    on‑the‑fly route optimization and freight negotiations while channeling their curiosity and love of art into meticulous handling of delicate cargo, they thrive in solitary long‑haul environments and
    make rapid decisions in extreme weather, yet their resistance to rigid structures occasionally leads to missed paperwork deadlines.
  sports: Lorne Wright, a solitary runner, logs early‑morning jogs at truck stops, they train intermittently with the Grand Forks Running Club for local 5‑k races, they follow the Minnesota Vikings in the
    NFL and the Minnesota Wild in the NHL for a touch of team spirit, and they unwind by shooting hoops at a rest‑area gym during off‑season layovers.
  arts: Lorne Wright immerses themselves in artistic creation, sketching prairie horizons on a Wacom tablet, they curate playlists that blend John Coltrane, Erykah Badu, Brian Eno and Kendrick Lamar, they
    photograph historic train stations with a Nikon D3500, and they regularly attend Indigenous art fairs and the North Dakota Museum of Art to draw inspiration from both contemporary and traditional works.
  travel: Lorne Wright embraces spontaneous road trips that blend strategic museum stops at the North Dakota Heritage Center with scenic detours to the Badlands, Glacier National Park and a weekend trek
    through Taos, they dream of future art deliveries in Paris and Kyoto, and they balance a tight budget with occasional splurges on unique lodging experiences along the way.
  culinary: Lorne Wright, a modest home‑cook, favors quick road‑trip meals such as bison burgers topped with smoked paprika aioli and roasted sweet potatoes, they experiment on longer stays with chipotle‑infused
    gnocchi and brew a perfect pour‑over coffee, yet they often resort to instant ramen when a delivery deadline looms.
  core: Lorne Wright is a solitary, art‑obsessed trucker who channels a competitive drive into a vision of delivering masterpieces across America, and they balance impulsive spending on creative gear with
    meticulous planning for future ownership.
background:
  cultural: Lorne is a Black American whose family has a long tradition of service in the U.S. Air Force, leading to frequent relocations and exposure to diverse regional cultures. He grew up listening
    to a broad spectrum of African‑American musical traditions—from gospel and soul to contemporary hip‑hop—shaping his deep appreciation for rhythm, storytelling, and artistic innovation. Family gatherings
    and seasonal church events keep him connected to his cultural roots, while his awareness of social‑justice issues informs his perspective on community and identity. Living at Minot Air Force Base has
    introduced him to Midwestern customs and the artistic expressions of the local indigenous communities, which he approaches with genuine curiosity and respect. The combination of a military upbringing,
    frequent moves, and a strong personal interest in art and new ideas creates a unique cultural blend that influences his worldview and personal pursuits.
attributes:
  skills: '[''Commercial driving (CDL)'', ''Vehicle inspection & basic maintenance'', ''Route optimization under variable conditions'', ''Customer negotiation and sales'', ''Basic logistics & inventory
    management'', ''Quick problem solving'', ''Independent work discipline'', ''Adaptability and resilience'']'
  hobbies: '[''Sketching and digital illustration'', ''Landscape photography'', ''Reading science‑fiction and philosophy'', ''Listening to jazz, soul, and ambient music while driving'', ''Exploring local
    art galleries and indigenous art fairs during stops'', ''Playing strategy video games'']'
  career_goals: Lorne aims to transition from employee driver to owner‑operator, eventually acquiring his own truck and establishing a niche logistics service that specializes in transporting artwork and
    other delicate items—combining his love for art with his driving expertise. He plans to complete a bachelor’s degree in Business Management and earn a supply‑chain certification within the next five
    years to broaden his managerial capabilities. In the medium term, he hopes to take on a senior driver‑lead role that allows him to mentor new drivers while preserving the autonomy he values. Long‑term,
    he envisions a small, employee‑owned company that prioritizes sustainable practices and provides curated art‑delivery experiences across the United States.
