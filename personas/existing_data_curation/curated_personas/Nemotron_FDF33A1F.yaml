personas:
  professional: Kyung Kang, a 42‑year‑old teaching assistant with deep expertise in art history and digital visual analysis, channels their curiosity and balanced organization into designing interdisciplinary
    seminar modules that fuse heritage-inspired calligraphy, contemporary digital media, and inclusive pedagogy while assertively mentoring a diverse student cohort.
  sports: Kyung Kang, an avid hiker who joins the East Bay Hiking Association for weekend treks, supports the Golden State Warriors in basketball, follows the San Jose Earthquakes for soccer, and integrates
    weekly yoga and occasional trail runs into a balanced fitness routine.
  arts: Kyung Kang, who regularly visits contemporary galleries featuring artists like Yayoi Kusama and Mark Rothko, spends evenings painting watercolors inspired by Anselm Kiefer, practicing heritage‑inspired
    brush calligraphy, and attending live shows ranging from indie folk acts such as Fleet Foxes to eclectic percussion ensembles like World Percussion Ensemble, channeling these influences into their own
    creative practice.
  travel: Kyung Kang prefers thoughtfully planned journeys that blend cultural immersion with natural scenery, having explored the redwood forests of Northern California, the historic temples of Kyoto,
    and the cliffside villages of Santorini, while budgeting for weekend getaways that align with their academic calendar and modest savings.
  culinary: Kyung Kang, an enthusiastic home chef, blends heritage‑inspired fermented sauces with fresh Californian produce to create dishes like miso‑glazed salmon tacos topped with avocado and citrus,
    masters watercolor‑like plating, and delights in sourcing seasonal heirloom tomatoes and shiso leaves from the local farmer’s market.
  core: Kyung Kang, a 42‑year‑old art historian whose curiosity fuels a balance of meticulous project planning and spontaneous watercolor sessions, often juggles late‑night grant applications with impromptu
    hikes, and habitually collects vintage museum catalogs that clutter their apartment.
background:
  cultural: Kyung is a second‑generation Korean American raised in the vibrant Korean diaspora of Fremont, California. At home she spoke Korean and celebrated traditional holidays such as Chuseok and Seollal,
    fostering a strong sense of heritage and familial responsibility. Simultaneously, she grew up immersed in the multicultural fabric of the Bay Area, which cultivated an appreciation for diverse artistic
    perspectives and a commitment to inclusive community engagement. Her bicultural identity informs her collaborative teaching style, her interest in cross‑cultural artistic narratives, and her dedication
    to bridging Korean cultural practices with contemporary American contexts.
