  hobbies: '[''Watercolor painting'', ''Korean calligraphy'', ''Gallery hopping'', ''Hiking'', ''Urban gardening'', ''Cooking fusion cuisine'', ''Reading speculative fiction'', ''Yoga and meditation'',
    ''Volunteering at cultural festivals'', ''Listening to live music'']'
  career_goals: Kyung aims to transition from her current teaching assistant role to a full‑time adjunct or tenure‑track position in art history, ultimately pursuing a PhD to deepen her scholarly credentials.
    She envisions creating interdisciplinary courses that blend Asian art, digital technology, and contemporary theory, and she hopes to lead community outreach programs that bring art education to under‑served
    neighborhoods in the Bay Area. Long‑term, she aspires to curate major exhibitions that highlight transnational artistic dialogues and to assume a leadership role such as department chair or program
    director, where she can influence inclusive curriculum design and mentor emerging scholars, especially those from multicultural backgrounds.
