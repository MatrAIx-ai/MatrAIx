personas:
  professional: Dolin Calhoun, a retired mechanical‑engineer turned community‑center mentor, they channel decades of hands‑on troubleshooting, carpentry, and STEM teaching into workshops for seniors and
    high‑school students, while they bring a spontaneous, compassionate nature that often leads them to improvise lesson plans on the fly, occasionally struggling with paperwork deadlines and organization.
  sports: Dolin Calhoun, an active member of the Corydon Senior Walking Club who enjoys casual disc‑golf in the fall, regularly follows the Indianapolis Colts and the Indiana Hoosiers, and prefers low‑impact
    morning walks through the woods for birdwatching over high‑intensity sports, they maintain fitness through gentle exercise and occasional community basketball bingo games.
  arts: Dolin Calhoun spends evenings listening to the blues of B.B. King and folk storytelling of Joan Baez while restoring vintage radios and carving wooden chess pieces, they find inspiration in Andrew
    Wyeth’s pastoral paintings and frequently attend performances at the local community theater, allowing their curiosity for history and science to intertwine with artistic appreciation.
  travel: Dolin Calhoun favors leisurely road trips to historically rich destinations such as Gettysburg, the National Mall, and the Great Smoky Mountains, often traveling with a small group of senior friends
    or grandchildren, they plan itineraries using printed maps and handwritten notes (a habit that sometimes clashes with their spontaneous side) and harbor a long‑standing dream of visiting Edinburgh to
    trace ancestral migration routes.
  culinary: Dolin Calhoun, a competent home cook who favors hearty Midwestern fare, habitually prepares a vegetable stew with heirloom tomatoes, carrots, and fresh rosemary from their garden, delights in
    smoking a ham glazed with maple syrup and apple cider, and regularly preserves pickles and fruit jams for the church food‑bank, they sometimes forget to clean the kitchen promptly after woodworking,
    leaving resin residue on countertops.
  core: Dolin Calhoun blends a lifelong curiosity for how things work with a deep, sometimes overwhelming compassion for neighbors, they channel spontaneous energy into hands‑on mentorship while battling
    chronic worry and a stubborn habit of misplacing important papers.
background:
  cultural: Dolin is a white Midwesterner who grew up in post‑war Indiana. His upbringing emphasized modesty, hard work, community solidarity, and a stoic, self‑reliant ethic typical of his generation.
    He was raised in a Protestant‑influenced household where church and local civic groups played central roles. These cultural roots have shaped his collaborative spirit, his commitment to helping neighbors,
    and his preference for practical, down‑to‑earth solutions. Living his entire adult life in Harrison County, he internalizes the region’s values of humility, respect for tradition, and openness to incremental
    change.
attributes:
  skills: '[''mechanical troubleshooting'', ''basic carpentry and woodworking'', ''applied problem‑solving'', ''digital literacy (email, video‑calls, office software)'', ''First Aid and CPR certification'',
    ''volunteer coordination'', ''budgeting and financial planning for community projects'', ''mentoring and tutoring in STEM'', ''conflict mediation'', ''gardening and horticultural knowledge'']'
  hobbies: '[''woodworking'', ''model airplane building and vintage radio restoration'', ''gardening (heirloom vegetables and native plants)'', ''birdwatching'', ''reading history and science non‑fiction'',
    ''chess at the senior center'', ''genealogy research'', ''volunteering at church food‑bank and senior outreach'']'
  career_goals: Although retired, Dolin is driven to remain a productive force in Corydon. He aims to formalize a mentorship program that pairs senior volunteers with high‑school students interested in
    STEM, and to expand weekly workshops at the community center that teach practical skills such as basic home repairs, computer basics, and gardening. He plans to obtain a senior‑caregiver certification
    so he can provide more specialized assistance to his wife's aging relatives and neighbors. Dolin also hopes to document his life experiences in a memoir that highlights the intersection of technical
    curiosity and community service, and to help launch a neighborhood garden that supplies fresh produce to local families.
