personas:
  professional: Henry Worthy, a 21‑year‑old visual communication student, blends graphic design, analog photography, and front‑end coding to craft culturally‑rich digital experiences, leveraging their curiosity,
    competitive drive, and a balance of organization and flexibility to push narratives that celebrate community history.
  sports: Henry Worthy, who joins a weekly neighborhood basketball pick‑up league and follows the Houston Rockets, the Astros, and the Texans, mixes cardio jogging through mural districts with occasional
    pickup soccer, and approaches fitness as a competitive outlet they take seriously without making it a strict routine.
  arts: Henry Worthy, an avid chronicler of Houston's street‑art scene, attends low‑key jazz nights featuring Kamasi Washington and neo‑soul sessions with Anderson .Paak, sketches inspired by muralists
    like Tosha, and draws influence from contemporary writers such as N. K. Jemisin, channeling their curiosity and reserved nature into a personal visual diary they update weekly.
  travel: Henry Worthy, who prefers spontaneous weekend road trips, has explored New Orleans for its jazz clubs, visited Santa Fe for its art markets, and dreams of a summer in Berlin’s street‑art districts,
    balancing travel with a modest student budget they meticulously track.
  culinary: Henry Worthy, whose kitchen blends Southern comfort with experimental flavors, frequently cooks fried catfish with collard greens and sweet potato pie while experimenting with smoked paprika,
    hot sauce, and occasionally ramen broth, though they often skip meals when immersed in a project, a habit they recognize as both a productivity boost and a health risk.
  core: Henry Worthy, a curious yet competitively driven 21‑year‑old creator, navigates life with disciplined focus on art, budget‑conscious habits, and a solitary streak that fuels both productivity and
    occasional neglect they readily acknowledge.
background:
  cultural: Henry was raised in a predominantly Black neighborhood in Houston’s Third Ward, a community known for its rich musical legacy, vibrant street art, and strong ties to African‑American history.
    His family traditions blend Southern cuisine—such as fried catfish, collard greens, and sweet potato pie—with celebrations of Juneteenth and local church gatherings that emphasize gospel music and communal
    support. Growing up amid Houston’s multicultural environment, Henry absorbed influences from the city’s blues and hip‑hop scenes, as well as the artistic activism of local muralists who address social
    justice themes. This cultural tapestry informs his worldview, artistic sensibilities, and his desire to represent Black narratives within his creative work.
attributes:
  skills: '["Graphic Design (Adobe Photoshop, Illustrator)", "Photography and Photo Editing (Lightroom)", "Front‑End Web Development (HTML, CSS, JavaScript)", "Research and Critical Analysis", "Written
    Communication", "Project Management and Time Management"]'
  hobbies: '["Street Art Exploration and Sketching", "Analog Photography", "Listening to Jazz, Hip‑Hop, and Neo‑Soul", "Reading Speculative Fiction and African‑American Literature", "Playing Chess", "Coding
    Small Interactive Art Projects", "Weekend Basketball with Close Friends"]'
  career_goals: Henry aims to transition from his current academic phase into a professional creative career. Over the next two years, he plans to complete his associate degree in Visual Communication,
    build a polished portfolio showcasing graphic design, illustration, and interactive web projects, and secure a summer internship at a design studio or digital marketing firm in Houston. He aspires to
    leverage his competitive drive to become a junior UI/UX designer, eventually leading projects that blend cultural storytelling with modern digital experiences. In the longer term, Henry hopes to launch
    a freelance design practice that highlights African‑American cultural motifs and supports community art initiatives.
