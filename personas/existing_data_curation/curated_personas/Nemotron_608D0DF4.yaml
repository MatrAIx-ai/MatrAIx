  hobbies: '[''Gardening'', ''Cooking and preserving'', ''Birdwatching'', ''Nature walks'', ''Historical fiction reading'', ''Quilting'', ''Volunteering at the library'', ''Fishing'', ''Church potluck events'',
    ''Classic movies'']'
  career_goals: Although Dorsa is not currently part of the formal workforce, she is eager to deepen her community involvement. She plans to obtain a Certified Nursing Assistant (CNA) credential to enhance
    her caregiving role at the senior center and hopes to become a regular volunteer coordinator for local events. Dorsa also dreams of publishing a small cookbook featuring her family's traditional recipes
    and offering occasional cooking workshops for neighbors. Long-term, she would like to serve on the Citrus County Community Association board, where she can bring her practical experience and organizational
    skills to local decision-making.
