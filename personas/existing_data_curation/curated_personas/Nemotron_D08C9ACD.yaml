  career_goals: Kaitlyn aims to advance into senior executive roles within a regional health system, targeting positions such as Director of Operations or Vice President of Clinical Services. She plans
    to augment her business degree with a Master of Health Administration to deepen her strategic acumen. Her long‑term ambition is to lead the launch of a state‑of‑the‑art outpatient facility that integrates
    cutting‑edge technology, where she can drive both operational excellence and patient‑centered outcomes while demonstrating her competitive edge in the healthcare industry.
