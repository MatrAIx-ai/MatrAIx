persona_description: A landscape designer or horticulturist who specializes in using ornamental grasses in gardens and landscapes. They are knowledgeable about the different types, heights, colors, and
  textures of ornamental grasses and are skilled in their use for erosion control, height, color, contrast, wildlife shelter, spiky accents, feathery waves, and low-growing clumps. They are also aware of
  the challenges associated with grouping ornamental grasses and are mindful of their space requirements. They are familiar with the best time to plant new stands of ornamental grasses and are aware of
  the challenges that can arise with certain grasses, such as root invasion. They are also aware of the popularity of ornamental grasses in warmer states and are aware of the potential for increased use
  in many northern climates. They are aware of the nutritional value of ornamental grasses as cereal grains and their popularity as ornamentals in the Orient and Edwardian England. They are aware of the
  popularity of ornamental grasses in the U.S. market and their popularity in warmer states. They are aware of the drought, insect, and deer resistance of ornamental grasses and are aware of the importance
  of ensuring that the grasses they buy are suited to their hardiness zone.
