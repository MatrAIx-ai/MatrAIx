personas:
  professional: Brandel Becker is an aspiring teenage software tinkerer who transforms their love of solitary strategic gaming into coding Arduino gadgets and creating game mods, applying a structured yet
    flexible approach to problem‑solving while occasionally letting the relaxed attitude toward deadlines cause a messy desk of prototype parts.
  sports: Brandel Becker enjoys solitary hikes in Red Rock Canyon with the local youth hiking club, follows the Vegas Golden Knights and the Las Vegas Raiders with a modest enthusiasm, and occasionally
    joins a weekend pickup basketball game at the community center despite a preference for low‑stimulus activities.
  arts: Brandel Becker immerses themselves in fantasy worlds through Brandon Sanderson and N.K. Jemisin novels, sketches sprawling landscapes in a battered notebook, strums acoustic guitar to the mellow
    melodies of Nick Drake and instrumental scores by Hans Zimmer, and curates a playlist of video‑game soundtracks from The Legend of Zelda series for creative inspiration.
  travel: Brandel Becker prefers spontaneous weekend drives to natural wonders like the Grand Canyon or Zion National Park, dreams of a future trip to Kyoto to explore anime culture, but balances these
    impulses with parental budget limits, planning trips using a simple spreadsheet and a travel app that highlights quiet, less‑crowded spots.
  culinary: Brandel Becker favors simple comfort foods such as pepperoni pizza, chicken quesadillas, and homemade ramen, enjoys experimenting with an Arduino‑controlled temperature sensor to perfect the
    boil for noodles, and often snacks on trail mix while sketching, though they tend to skip breakfast in favor of late‑night gaming sessions.
  core: Brandel Becker is a quiet 15‑year‑old tech enthusiast who channels solitary gaming into code, carefully saves for future gadgets while occasionally splurging, monitors health with a smartwatch,
    hikes desert trails, devours fantasy literature, and dreams of quiet travel adventures.
background:
  cultural: Brandel grew up in a middle‑class suburb of Las Vegas, Nevada, within a predominantly white, Anglophone community. His family’s cultural habits blend typical American suburban values—emphasis
    on personal responsibility and self‑reliance—with the eclectic influences of a city known for its entertainment industry and diverse visitor population. He has been exposed to a mix of local desert
    culture, casino‑driven technology, and mainstream American media, shaping his interest in tech‑focused careers while maintaining a preference for quiet, solitary pursuits.
attributes:
  skills: '[''Basic computer hardware troubleshooting'', ''Introductory Python programming'', ''JavaScript fundamentals'', ''Spreadsheet data organization'', ''Arduino electronics kits'', ''Bicycle and
