  hobbies: '[''Single‑player video gaming'', ''Science‑fiction and fantasy reading'', ''Coding game mods'', ''Arduino hobby projects'', ''Sketching fantasy art'', ''Hiking in Red Rock Canyon'', ''Listening
    to instrumental music'', ''Acoustic guitar practice'']'
  career_goals: Brandel aspires to turn his tech‑savvy hobby into a full‑time career. He aims to become a software developer or a technical specialist for the gaming and entertainment industry, ideally
    working on the backend systems that power casino slot machines and online gaming platforms. He values roles that provide clear, repeatable processes while allowing independent problem‑solving. In the
    next five years, he hopes to earn a professional certification in programming or network systems and secure an apprenticeship with a local IT firm that services casino technology, leveraging the stable
    routine and structured environment he enjoys.
