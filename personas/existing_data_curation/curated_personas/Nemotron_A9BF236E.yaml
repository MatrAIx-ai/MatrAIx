personas:
  professional: Lewis Calvert, a 21‑year‑old construction laborer who excels at operating power tools, reading simple blueprints, and maintaining OSHA standards, combines his love for routine with a practical
    mindset, and they readily step into supervisory roles on site while working toward a journeyman carpenter apprenticeship.
  sports: Lewis Calvert, an avid weightlifter at Sioux Falls Weightlifting Club, a dedicated fan of the Minnesota Vikings and local Sioux Falls Storm arena football team, spends Saturdays fishing at Lake
    Okoboji, joins friends for seasonal hunting excursions, and they squeeze in a pick‑up basketball game at the community center whenever the weather permits.
  arts: Lewis Calvert, a fan of classic rock legends like Bruce Springsteen and country staples such as Luke Bryan, enjoys watching the home‑renovation series 'This Old House', attends the annual Sioux
    Falls Art Fair to scout handcrafted furniture, and they channel their appreciation for craftsmanship into DIY woodworking projects as a creative outlet.
  travel: Lewis Calvert, who prefers road‑trip adventures that blend fishing, hunting, and scenic drives, has tackled a weekend pilgrimage to the Black Hills and dreams of a guided hunt in Montana, while
    budgeting travel around long weekends and they often plan trips using a printable checklist to keep the itinerary practical and low‑stress.
  culinary: Lewis Calvert, a practical cook who favors hearty Midwest fare, regularly grills his lake‑caught catfish with lemon‑pepper rub, prepares slow‑cooked BBQ ribs on weekends, and they whip up a
    classic skillet‑seared pork chop with sautéed onions and mashed potatoes, though they occasionally over‑season their chili in a quest for extra heat.
  core: Lewis Calvert blends a routine‑driven, hands‑on work ethic with a love for outdoor sport, practical budgeting, and modest creative pursuits, and they balance social gatherings with needed alone
    time.
background:
  cultural: Lewis comes from a Midwestern white family with German and Norwegian ancestry, common in Sioux Falls and the surrounding Great Plains region. Raised in a modest, Protestant (Lutheran) household,
    he was taught the values of hard work, humility, and community service. Local traditions such as county fairs, church potlucks, and seasonal outdoor activities have shaped his appreciation for the outdoors,
    teamwork, and practical craftsmanship. These cultural influences reinforce his preference for routine, reliability, and cooperative interaction in both his personal and professional life.
attributes:
  skills: '["Operating power tools", "Concrete mixing", "Basic blueprint reading", "OSHA safety compliance", "Team coordination", "Equipment maintenance", "Basic carpentry", "Physical stamina"]'
  hobbies: '["Fishing", "Hunting", "Weightlifting", "Video gaming (strategy and simulation)", "DIY home improvement projects", "Watching NFL games", "Community volunteer work (local clean‑ups)", "Attending
    church gatherings"]'
  career_goals: Lewis aims to advance from laborer to a certified journeyman carpenter within the next three years, pursuing an apprenticeship and the associated state licensing exams. He plans to enroll
    in evening courses at a local community college to study construction management, with the long‑term ambition of becoming a foreman or site supervisor. Ultimately, he hopes to start a modest, family‑run
    contracting business that emphasizes quality workmanship and reliable service for the Sioux Falls community.
