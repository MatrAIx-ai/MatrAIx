personas:
  professional: James Lowery, a 71‑year‑old heritage guide who blends deep regional history expertise with a relaxed, off‑the‑cuff storytelling style, they navigate the Congaree area’s roads in their self‑maintained
    tour vehicle, offer first‑aid certified on‑the‑spot assistance, and prioritize harmonious interactions with small groups despite informal planning.
  sports: James Lowery, an avid early‑morning walker along the Congaree River who enjoys leisurely catfish fishing, they cheer on the Carolina Panthers during football season, and participate in a senior
    walking club sponsored by the local community center.
  arts: James Lowery, a baritone choir member who spends evenings immersed in the soulful sounds of B.B. King, Muddy Waters, and the cool improvisations of Miles Davis and John Coltrane, they occasionally
    attend acoustic performances at the historic Columbia Theatre while drawing inspiration for their storytelling from biographies of notable figures.
  travel: James Lowery, a spontaneous road‑tripper who prefers flexible itineraries, they often drive to Civil War battlefields in Virginia, explore Savannah’s historic district on weekend getaways, avoid
    air travel, and relish unplanned detours that reveal hidden local histories.
  culinary: James Lowery, a modest‑skilled home cook who cultivates heirloom tomatoes, collard greens, and sweet potatoes in their garden, they delight in preparing shrimp and grits, black‑eyed pea Hoppin’ John,
    and smoked pork‑infused collard greens, and treat each dinner as a living tribute to family recipes.
  core: James Lowery, a curious yet laid‑back 71‑year‑old who roams riverbanks with a camera, they nurture an heirloom garden, mentor budding guides, and habitually misplace the keys to their tour van.
background:
  cultural: James is a lifelong resident of Heath Springs, a small town in Lancaster County with a historically significant African American community. Raised during the civil‑rights era, he grew up in
    a close‑knit church family and witnessed the transition from sharecropping to modern employment. His heritage blends Gullah traditions of the Lowcountry with the Upstate’s farming culture, giving him
    a strong sense of community stewardship. He draws on this background in his tours, highlighting African American contributions to the region’s agriculture, music, and civil‑rights history, and he remains
    active in local cultural‑preservation initiatives.
attributes:
  skills: '[''Historical storytelling'', ''Regional history expertise'', ''Guided tour navigation'', ''First aid and CPR certification'', ''Vehicle maintenance'', ''Customer service'', ''Naturalist knowledge'',
