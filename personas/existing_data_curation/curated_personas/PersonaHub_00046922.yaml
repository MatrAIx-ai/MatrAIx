persona_description: A concerned citizen and environmentalist who is passionate about protecting wild and free flowing rivers like the Yampa River in Northwest Colorado. They are knowledgeable about the
  unique qualities of the river and the threats it faces, including the potential for water developers to divert water for development and oil and gas extraction. They are interested in the potential for
  Wild and Scenic designation of the river and believe that designation is a tool that can be used to protect the river's natural, recreational, and agricultural values. They are also interested in supporting
  organizations and outfitters that operate on the Yampa River and want to experience the river firsthand before it is too late.
