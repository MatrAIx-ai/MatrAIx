persona_description: Robert Page, a professor at the University of Colorado Skaggs School of Pharmacy and Pharmaceutical Sciences in Aurora, Colorado, who has recently served as chair of an American Heart
  Association writing group that found cannabis use shows substantial risks and no benefits for cardiovascular health. His expertise lies in the study of group theory, particularly subgroup and isomorphism
  concepts, and his research interests include the structure of finite groups, representation theory of groups, isomorphism problems, and the theory of group automorphisms.
