personas:
  professional: Sagarkumar Maharaj is a budding junior architect who eagerly follows LEGO building instructions, applying meticulous step‑by‑step focus, coordinating peers during play, and using a natural
    knack for clear communication to keep group games orderly, reflecting how they blend structured thinking with sociable leadership.
  sports: Sagarkumar Maharaj zealously participates in the community after‑school soccer club, leads organized games of Duck, Duck, Goose on the playground, proudly wears a jersey of the local Metro United
    football team, and they watch the national cricket team’s matches with friends, balancing active play with team spirit.
  arts: Sagarkumar Maharaj spends afternoons sketching vibrant characters inspired by Dr. Seuss and the animated film Moana, sings along to classic children’s tunes by The Wiggles and Raffi, and they delight
    in school performances of Peter Pan, allowing their love for storytelling and bright visuals to shape a playful identity.
  travel: Sagarkumar Maharaj loves weekend family trips to the nearby botanical garden and the city zoo, eagerly plans a future visit to Disneyland Paris after hearing about the magical rides, and they
    daydream about exploring historic castles abroad, blending a love for short local adventures with big‑picture wanderlust.
  culinary: Sagarkumar Maharaj enjoys assembling a mini pizza topped with tomato sauce, mozzarella and pepperoni, helps whisk pancake batter with eggs, milk and a dash of vanilla, savors a sweet mango lassi
    after meals, and they sometimes sneak extra chocolate chips into their cookies, revealing a budding palate and hands‑on kitchen curiosity.
  core: Sagarkumar Maharaj merges a love for structured LEGO building, lively group games, and caring teamwork, yet they often forget to put away pieces, leaving a small, colorful mess that they happily
    reassemble later.
background:
  cultural: Sagarkumar comes from a South Asian Muslim family originally from India. At home, Urdu and English are spoken, and his family celebrates Eid with festive meals and also participates in Diwali
    gatherings with relatives, reflecting a blended cultural tradition. Living in Herndon, Virginia, he attends a local mosque for Sunday school and a community center that hosts cultural programs for South
    Asian children. His upbringing emphasizes respect for elders, the importance of education, and community harmony, all of which shape his daily life and values.
