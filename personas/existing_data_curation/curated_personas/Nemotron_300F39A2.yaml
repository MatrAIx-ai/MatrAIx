  career_goals: Sagarkumar frequently talks about growing up to help other kids. He imagines himself as a teacher who can organize fun yet orderly lessons and make every child feel included, or as a pediatrician
    who cares for children's health with kindness. He also likes the idea of being a community volunteer who coordinates neighborhood events, reflecting his love for structure, social interaction, and compassion.
