personas:
  professional: Connie Lawley, a 17‑year‑old aspiring health‑information administrator, channels her knack for organizing school events, first‑aid certification, and confident public speaking into a growing
    portfolio of volunteer coordination at the animal shelter, laying groundwork for a future role as a project coordinator in a local healthcare setting.
  sports: Connie Lawley, a 17‑year‑old recreational soccer enthusiast with the Waukegan Youth Soccer Club, routinely tunes into Chicago Bears football and Chicago Cubs baseball, joins local beach volleyball
    pick‑up games in the summer, and balances weekend soccer practice with morning jogs along the Lake Michigan shoreline.
  arts: Connie Lawley, a 17‑year‑old drama‑club performer and budding photographer, finds creative fuel in Lin‑Manuel Miranda’s lyrical storytelling, Annie Leibovitz’s portraiture style, and Taylor Swift’s
    narrative songwriting, which she weaves into TikTok DIY tutorials and school productions.
  travel: Connie Lawley, a 17‑year‑old who spends summer days at Lake Michigan’s beaches and takes weekend road trips to Chicago’s art museums and Milwaukee’s historic breweries, dreams of backpacking through
    the national parks of the American West and eventually studying abroad in London to explore theatre culture.
  culinary: Connie Lawley, a 17‑year‑old self‑taught baker who perfects double‑chocolate brownies with a dash of espresso powder and experiments with rosemary‑infused focaccia, balances comfort foods like
    mac and cheese with a growing curiosity for plant‑based dishes such as chickpea “tuna” salads, and often incorporates fresh basil and lemon zest into her summer picnics.
  core: Connie Lawley, 17, merges methodical planning with spontaneous creativity, juggling drama rehearsals, weekend soccer, and TikTok DIY projects while habitually binge‑watching true‑crime podcasts
    late into the night, a quirky habit that sometimes steals sleep from her early‑morning study sessions.
background:
  cultural: Connie was raised in a middle‑class white family in Waukegan, Illinois, a city on the shores of Lake Michigan within the greater Chicago metropolitan area. Her upbringing reflects typical Midwestern
    values of community involvement, practicality, and modesty. She participates in local traditions such as summer lake outings, neighborhood block parties, and school‑spirit events. Her family attends
    a Protestant church, and she benefits from a close‑knit neighborhood network while also being exposed to the diverse cultural influences of the surrounding region.
