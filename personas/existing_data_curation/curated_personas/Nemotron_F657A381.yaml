  career_goals: Connie aims to complete her GED within the next year and then enroll in a community‑college program focused on health information management or business administration. She wants to leverage
    her organizational strengths and people‑skills to become an administrative assistant or project coordinator in a local healthcare setting. Long‑term, she envisions opening a community center that offers
    after‑school programs and mentorship for youth in Waukegan.
