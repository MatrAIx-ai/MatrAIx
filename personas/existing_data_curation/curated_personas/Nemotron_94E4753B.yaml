personas:
  professional: Christina Gleaton is a seasoned Buffalo taxi driver who leverages her encyclopedic knowledge of the city's streets and vibrant art scene to turn everyday rides into impromptu cultural tours,
    while also mentoring younger drivers with humor and patience.
  sports: Christina Gleaton follows the Buffalo Bills, enjoys cheering at Buffalo Sabres games, participates in a senior walking club along the Erie Canal in spring, and occasionally joins a community softball
    league for fun, preferring the social camaraderie over intense competition.
  arts: Christina Gleaton immerses herself in the local arts by attending openings at the Albright‑Knox Art Gallery, listening to Muddy Waters blues nights at Buffalo Music Hall, quoting contemporary poet
    Ocean Vuong to passengers, and capturing candid street photographs in a style reminiscent of Vivian Maier, all of which fuel her own storytelling flair.
  travel: Christina Gleaton favors spontaneous weekend getaways, often driving to Niagara Falls for the misty vistas, planning low‑cost trips to Toronto's Distillery District for its galleries, and dreaming
    of a summer cultural tour of Paris, while balancing her modest driver’s income with occasional travel grants from community arts programs.
  culinary: Christina Gleaton delights in cooking eclectic dishes like rosemary‑infused roast chicken, homemade pierogi with sweet‑potato filling, and seasonal apple crisp, frequently sourcing fresh produce
    from the Buffalo State Farmers Market and sharing her experimental treats with friends at community center potlucks.
  core: Christina Gleaton is a 65‑year‑old taxi driver‑turned‑cultural ambassador whose love of art, music, and food makes every ride a lively lesson, even if she occasionally misplaces her keys and forgets
    appointments.
background:
  cultural: Christina grew up in a working‑class, white family in the Buffalo suburbs, of mixed Irish‑German ancestry. Her upbringing in the industrial heart of Western New York exposed her to a blend of
    Midwestern values—hard work, modesty, and community solidarity—and a rich tapestry of immigrant cultures that settled in the region. Though she completed only a high‑school education, she has always
    been drawn to the city's artistic scene, which she discovered through school field trips and local festivals. The close‑knit nature of her neighborhood, the harsh winters, and the pride of Buffalo's
    sports and cultural institutions have shaped her identity. She embraces the local dialect, enjoys the regional cuisine of chicken wings and beef on weck, and feels a deep loyalty to the city's resilience
    and cultural renaissance.
