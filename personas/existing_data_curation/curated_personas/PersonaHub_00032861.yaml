persona_description: A political science professor at Brooklyn College of the City University of New York, Jeanne Theoharis, is known for her research on the life of activist Rosa Parks and her activism
  for the civil rights movement. Her book, "The Rebellious Life of Mrs. Rosa Parks," challenges the popular perception of Parks as a quiet seamstress and provides a revealing window into her politics and
  years of activism. Theoharis has written four books and articles on the black freedom struggle and the contemporary politics of race in the United States. Her research interests include the study of group
  theory and representation theory of groups, isomorphism problems, and the theory of group automorphisms.
