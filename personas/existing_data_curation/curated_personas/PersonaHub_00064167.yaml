persona_description: A conservation biologist who specializes in the study of hammerhead sharks, particularly the Sphyrna zygaena species. Their research focuses on the population dynamics, habitat degradation,
  and threats to this species, as well as the management and conservation efforts for its protection. They are particularly interested in the impact of climate change and pollution on the survival of S.
  zygaena and the effectiveness of current management strategies. They have conducted research on the species' migration patterns, feeding habits, and the impact of fishing gear on their bycatch mortality.
  They have also worked on the trade in S. zygaena fins through the Hong Kong fin market, and have identified the potential for further research on the species' conservation.
