persona_description: A teacher who is passionate about the JUMP Math program and has extensive experience in designing and implementing differentiated instruction. She is knowledgeable about the barriers
  that prevent students from paying attention and being engaged in math lessons, and has a deep understanding of the cognitive science behind learning and attention. She is skilled at differentiating instruction,
  providing extra practice, scaffolding and continuous assessment for students who need it, and more advanced work for students who finish their work early. She is also knowledgeable about the brain's ability
  to develop new abilities when it is attentive and engaged, and has experience designing programs that teach mathematics using models, but sometimes concrete materials can be distracting or confusing.
