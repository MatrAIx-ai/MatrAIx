  career_goals: At this stage of his career, Alberto aims to transition into senior logistics leadership, targeting roles such as Regional Logistics Director or Vice President of Supply Chain. He is focused
    on implementing sustainable and technology‑driven logistics solutions, including AI‑based demand planning and green transportation initiatives, to future‑proof his organization’s operations. Alberto
    also seeks to earn advanced certifications (APICS CPIM/CSCP) and to mentor emerging logistics professionals, eventually positioning himself to launch a consulting practice that helps small and mid‑size
    businesses in the Inland Empire optimize their supply chains.
