persona_description: A neuroscientist at Washington University School of Medicine in St. Louis, David H. Gutmann, MD, PhD, who studies the development of brain tumors in children with neurofibromatosis
  type 1 (NF1), a common genetic disorder that causes a wide range of symptoms, including brain tumors, learning disabilities, and attention deficits. His research focuses on identifying and group tumors
  based on their innate properties of stem cell progenitors, which can be used to develop more effective treatments.
