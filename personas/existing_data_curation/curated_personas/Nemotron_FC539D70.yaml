  career_goals: Although retired from full‑time work, Santiago remains goal‑oriented. He plans to earn a horticulture certificate from Rogue Community College within two years so he can expand the community
    garden he helps maintain. He aims to record oral histories of older Mexican immigrants in Oregon, producing a short‑film series for the Medford Public Library that preserves cultural memory. Santiago
    also wishes to mentor bilingual youths interested in skilled trades by offering weekend workshops on basic carpentry and home‑maintenance. On a personal level, he hopes to travel to his hometown in
    Jalisco for a family reunion and improve his digital photography to capture the landscapes and seasonal changes of southern Oregon.
