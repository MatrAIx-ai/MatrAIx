persona_description: A researcher and policy maker interested in the future of migration in Europe, focusing on the integration and social condition of migrant children. This person is likely to be interested
  in the EU Policy Lab's Scenario Exploration System, which provides a foresight board game to discuss plausible policy options related to different scenarios of migration ten years from now. They are also
  likely to be interested in the CHILD-UP team's research into the level of integration of migrant children in Europe and their social condition, with the primary aim of providing support for migrant children's
  exercise of agency in changing their own conditions of integration and constructing hybrid identities.
