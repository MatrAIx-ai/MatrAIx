persona_description: A historian who specializes in the exploration and settlement of the Carolina coast by English colonists in the 17th century, particularly focusing on the activities of individuals
  like Erasmus Harfleet and William Reed. His research interests include the impact of English shipping on the area, the settlement of Hatteras Island, and the role of early English colonists in the development
  of the Carolina coast as a maritime hazard, entrepôt, whaling and porpoise center, and supply station for shipping all along the eastern seaboard.
