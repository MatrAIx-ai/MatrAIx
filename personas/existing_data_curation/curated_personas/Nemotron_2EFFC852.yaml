personas:
  professional: Maureen Kuhn, a hands‑on electromechanical assembler in a mid‑size manufacturing plant, combines a restless curiosity for micro‑controller projects with a pragmatic dedication to OSHA safety
    standards, often guiding teammates through soldering challenges while they occasionally miss tight production deadlines due to a spontaneous problem‑solving style.
  sports: Maureen Kuhn enjoys casual weekend basketball games at the community center, cheers on the New Orleans Pelicans during the NBA season and the Saints on Sundays, and belongs to a local cycling
    club that rides the levee trail in spring, using these activities as both social bonding and stress relief.
  arts: Maureen Kuhn decorates their workshop with album covers from Louis Armstrong, Wynton Marsalis, and Trombone Shorty, regularly attends live performances at Preservation Hall, and channels their artistic
    side into sketching street scenes of the French Quarter after shows.
  travel: Maureen Kuhn favors spontaneous weekend getaways to nearby Gulf Coast towns like Biloxi and Pensacola, dreams of a road trip through the historic routes of the Deep South, and their limited budget
    pushes them to leverage points from a travel rewards credit card to plan a future visit to Montreal's renowned jazz festivals.
  culinary: Maureen Kuhn, a self‑taught home chef, passionately experiments with Creole staples—simmering gumbo with okra and andouille sausage, layering jambalaya with shrimp and catfish, and perfecting
    beignets dusted in powdered sugar—while they often improvise with local market finds like fresh crawfish and filé powder.
  core: Maureen Kuhn is a jittery yet inventive electronics tinkerer who balances a love for vintage radios and jazz with a habit of over‑committing to projects and they frequently wrestle with deadline
    anxiety.
background:
  cultural: Maureen was raised in a white, middle‑class family in New Orleans, Louisiana. Her ancestry includes German and Irish roots that settled in the Gulf South in the early 1900s. Raised Catholic,
    she celebrated traditional holidays such as Easter and Christmas with family gatherings and also embraced the city’s vibrant cultural traditions, including Mardi Gras parades and second‑line celebrations.
    The multicultural atmosphere of New Orleans—its music, cuisine, and French‑Creole heritage—has shaped her deep appreciation for jazz, gumbo, and community festivals. She identifies strongly with Southern
    hospitality, valuing kindness, cooperation, and maintaining harmony within her social circles and workplace.
attributes:
  skills: '[''Soldering (tin‑lead and lead‑free)'', ''Surface‑mount technology (SMT) board placement'', ''Reading wiring diagrams'', ''Continuity and voltage testing'', ''Quality inspection and documentation'',
    ''Basic electrical theory'', ''OSHA electrical safety compliance'', ''Team collaboration and communication'', ''Problem‑solving under time pressure'', ''DIY microcontroller prototyping'']'
  hobbies: '[''DIY electronics (Arduino, Raspberry Pi)'', ''Listening to jazz and blues'', ''Attending live music events in the French Quarter'', ''Cooking Creole and Cajun cuisine'', ''Journaling and sketching'',
    ''Volunteering at community garden'', ''Mentoring high‑school STEM outreach'']'
  career_goals: Maureen aims to deepen her technical knowledge and earn certifications such as a Journeyman Electrician license and the IPC‑A‑610 (Acceptability of Electronic Assemblies) certification.
    Over the next three to five years she hopes to move from assembly work to a supervisory role, becoming a lead assembler or floor supervisor where she can mentor newer workers and champion a safety‑focused,
    harmonious work environment. She also plans to enroll in an associate‑degree program in electromechanical technology or electrical engineering to broaden her career options and eventually transition
    into design or field‑service positions. While she values stability and teamwork, she is actively working on improving her time‑management and organizational skills to reduce stress and meet production
    targets more confidently.
