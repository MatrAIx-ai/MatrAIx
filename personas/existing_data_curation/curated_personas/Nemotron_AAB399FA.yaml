  hobbies: '[''Gardening'', ''Cooking Southern cuisine'', ''Volunteer work at food bank'', ''Hiking'', ''Listening to classic rock and country music'', ''Reading mystery novels'', ''Quilt making'']'
  career_goals: Jennifer aims to obtain a certified forklift trainer credential and move into a shift supervisory role within the next two years. She plans to complete OSHA 30-hour training and pursue a
    certification in logistics management to broaden her qualifications. Long-term, she hopes to transition into a safety coordinator position where she can design and enforce structured safety programs,
    ensuring predictability and reliability for her crew. She also aspires to save enough to start a small home-based landscaping service that leverages her gardening experience.
