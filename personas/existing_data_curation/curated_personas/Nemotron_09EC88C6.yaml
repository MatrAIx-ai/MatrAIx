personas:
  professional: Mary Boggs is a seasoned mason with a knack for blending historic restoration techniques and eco‑friendly materials, leveraging their hands‑on expertise in brick, block, and stone while
    navigating projects with a critical eye, a competitive spirit, and a relaxed, often improvisational approach to scheduling.
  sports: Mary Boggs enjoys hiking the Portage Lake trails and casting lines on local lakes, is a member of the Lake Michigan Hiking Club, follows the Detroit Lions and Detroit Tigers fervently, and occasionally
    joins a weekend recreational volleyball league at the community center.
  arts: Mary Boggs spends evenings strumming acoustic guitar to the tunes of Bob Dylan and Joni Mitchell, draws inspiration from the photography of Ansel Adams, attends local craft fairs where they admire
    the work of ceramicist Betty Wood, and watches documentaries on sustainable architecture featuring architect Renzo Piano.
  travel: Mary Boggs favors road trips that combine historic masonry research and outdoor adventure, having driven to Charleston, South Carolina to study colonial brickwork, to Portland, Maine for its renovated
    stone warehouses, and dreaming of a future sailing voyage along the Mediterranean’s limestone coasts, all while balancing family time and project budgets.
  culinary: Mary Boggs experiments in the kitchen with brick‑oven style sourdough pizza topped with heirloom tomatoes, smoked trout, and fresh basil, often preparing farm‑to‑table salads featuring locally
    sourced radicchio and goat cheese, and while their cooking skills are solid, they occasionally over‑season dishes due to their competitive quest for flavor depth.
  core: Mary Boggs is a rugged, curious mason who balances a love for historic bricks with an eco‑centric mindset, tends to misplace their favorite hammer, competes fiercely on project bids, and embraces
    spontaneity over strict planning.
background:
  cultural: Mary grew up in the Midwestern town of Jackson, Michigan, in a family with deep roots in the region’s manufacturing and trade traditions, likely of German‑Irish ancestry common in the area.
    The community’s emphasis on hard work, self‑reliance, and pragmatic problem‑solving shaped her practical outlook. Her upbringing in a predominantly white, middle‑class neighborhood exposed her to a
    mix of traditional values and a modest openness to new ideas, fostering her balanced curiosity. While she maintains a strong individualistic streak, she also values the tight‑knit social fabric of small‑town
    life, evident in her participation in local charities and community events.
