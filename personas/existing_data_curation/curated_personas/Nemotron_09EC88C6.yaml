  hobbies: '[''hiking'', ''fishing'', ''DIY home improvement'', ''antique furniture restoration'', ''reading historical architecture'', ''watching documentaries on sustainable building'', ''playing acoustic
    guitar'', ''cooking'', ''volunteering with Habitat for Humanity'', ''attending local craft fairs'']'
  career_goals: Mary aims to attain journeyman certification and become a foreperson within the next three years, eventually establishing her own boutique masonry contracting firm that specializes in historic
    restoration and sustainable building practices. She intends to deepen her knowledge of advanced masonry materials, secure leadership roles in the local union, and gain recognition for high‑quality craftsmanship
    through regional awards. Balancing her independent spirit with a desire for flexible scheduling, she also plans to mentor apprentices, especially women entering the trade.
