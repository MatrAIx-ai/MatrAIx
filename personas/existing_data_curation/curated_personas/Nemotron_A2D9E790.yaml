personas:
  professional: Jodie Vandermark, a Human Resources specialist who blends a data‑driven mindset with a caring, inclusive approach, leverages employee‑engagement analytics to design quiet, flexible benefit
    programs, and uses their spontaneous, outcome‑focused workflow to navigate tight deadlines while championing mental‑wellness initiatives.
  sports: Jodie Vandermark finds fitness in quiet, rhythmic activities—morning walks along the Gulf Coast, weekend kayak trips, and membership in a low‑key community yoga circle—while cheering on the New
    Orleans Saints during football season and following the Houston Astros for summer baseball.
  arts: Jodie Vandermark curates a personal art sanctuary, devouring speculative fiction by N.K. Jemisin and Ted Chiang, sketching watercolor seascapes inspired by Monet, and composing minimalist data visualizations
    set to the ambient sounds of Brian Eno, letting each creative outlet soothe their inner turbulence.
  travel: Jodie Vandermark prefers solitary, nature‑centric getaways, having trekked the Gulf Coast marshes, explored Iceland’s geothermal lagoons, and planning a silent retreat in the Japanese cedar forests
    of Yakushima, always opting for off‑peak travel to keep expenses low and introspection high.
  culinary: Jodie Vandermark enjoys simple, plant‑forward meals—quinoa‑lime salads with avocado, miso‑broth ramen featuring seaweed and tofu, and herbal teas brewed with chamomile and mint—while their modest
    kitchen is stocked with fresh herbs, a trusty cast‑iron skillet, and a collection of succulents that inspire a quiet culinary ritual.
  core: Jodie Vandermark navigates life as a quietly curious analytic, turning solitary walks, meditation, and data‑driven self‑reflection into a resilient, if sometimes anxious, pursuit of balanced well‑being.
background:
  cultural: Jodie is a White American raised in suburban Pinellas County, Florida. Her family’s middle‑class upbringing emphasized education, self‑reliance, and courteous community interaction. Growing
    up near the Gulf Coast exposed her to a blend of Southern hospitality and the multicultural vibrancy of the Tampa Bay area, including subtle influences from the region’s Hispanic and Caribbean communities.
    While she identifies with mainstream White American cultural norms—valuing personal space, modest ambition, and community harmony—she also appreciates Florida’s outdoor lifestyle and the laid‑back,
    flexible attitude that resonates with her own spontaneous nature.
attributes:
  skills: '["HR analytics", "Recruitment and talent acquisition", "Employee relations and conflict mediation", "Benefits administration", "Performance management", "Training facilitation", "Compliance with
