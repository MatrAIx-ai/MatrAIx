  hobbies: '["Nature walks", "Indoor gardening", "Reading sci‑fi & speculative fiction", "Journaling", "Creative coding (data visualizations, small scripts)", "Meditation", "Gentle yoga at home", "Sketching
    and watercolor painting"]'
  career_goals: Jodie aims to transition from an operational HR role to a strategic HR Business Partner position where she can integrate analytics with employee‑wellness initiatives. She plans to earn the
    SHRM‑CP certification and eventually pursue a Master’s in Human Resource Management or Organizational Psychology. Her long‑term ambition is to lead a department that creates flexible, quiet work environments
    and robust mental‑health support systems, aligning corporate objectives with compassionate employee care.
