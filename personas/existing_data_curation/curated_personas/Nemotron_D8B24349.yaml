personas:
  professional: Rosa Betancourt is a high school sophomore who channels her curiosity about biology into a budding science club leadership role, organizing weekly experiments while sketching manga-inspired
    diagrams and quietly practicing the piano as a mental reset, all driven by methodical planning and a desire to prove herself in a small, supportive group.
  sports: Rosa Betancourt enjoys weekend hikes in the nearby state park, where they catalog leaf specimens for their nature journal, participates in the school’s casual running club during the spring, and
    rallies behind the local high school’s varsity soccer team, the Thunderbirds, while occasionally practicing yoga at home to stay limber.
  arts: Rosa Betancourt immerses themselves in creative pursuits by drawing manga-style illustrations inspired by Hayao Miyazaki, playing Beethoven’s “Für Elise” on the piano during quiet evenings, and
    rehearsing traditional folk songs and dances with their family, while also attending monthly community art workshops featuring local painter Sofia Ramirez.
  travel: Rosa Betancourt prefers thoughtfully planned trips that blend nature and culture, having explored the ancient ruins of Copán on a school field trip and dreamed of visiting Kyoto’s bamboo forest
    to study traditional crafts, while they favor budget-friendly hostels and meticulous journaling of each destination’s flora and folklore.
  culinary: Rosa Betancourt loves cooking simple comfort foods like quesadillas with roasted chilies and cheese, experimenting with homemade tamale dough during family gatherings, and perfecting mango‑lime
    smoothies, all while occasionally skipping meals when absorbed in sketching or reading, and they take pride in mastering the art of knitting tea‑cozy patterns that resemble local textile designs.
  core: Rosa Betancourt balances a methodical, curious mind with a quiet, sometimes anxious spirit, turning solitary passions into disciplined projects while occasionally slipping into over‑worry and late‑night
    snack binges.
background:
  cultural: Rosa is a second‑generation Guatemalan American raised in Richmond, Virginia. At home, Spanish is spoken daily, and her family observes Guatemalan traditions such as Día de los Muertos, Semana
    Santa, and the preparation of tamales and atole during holidays. She participates in a local Guatemalan cultural association, where she learns traditional weaving and folk dances, preserving a strong
    sense of heritage while navigating American school life. Her Catholic upbringing and close‑knit family ties emphasize respect for elders and community service, shaping her identity as a bridge between
    two cultures.
