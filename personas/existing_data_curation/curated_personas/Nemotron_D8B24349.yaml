  career_goals: Rosa aspires to become a pediatric nurse, motivated by her desire to care for children and support families within her community, especially those who share her linguistic background. She
    plans to attend a community college for a nursing associate degree and later transfer to a university program, valuing the clear, step‑by‑step path that aligns with her methodical nature. In the longer
    term, she hopes to serve as a health advocate for Spanish‑speaking families, combining her bilingual skills, compassion, and practical problem‑solving abilities.
