personas:
  professional: Melissa Pittman is an aspiring community‑college student in environmental studies who leverages their knack for mediating group discussions and hands‑on gardening to coordinate part‑time
    sustainability projects and mental‑health outreach, while balancing a relaxed attitude toward formal planning with a desire for flexible, reliable income.
  sports: Melissa Pittman enjoys hiking the Green Mountain trails, occasionally joins the local trail‑run club, roots for the Boston Red Sox and the New England Patriots, and balances a love for outdoor
    cardio with occasional weekend yoga sessions to stretch sore muscles.
  arts: Melissa Pittman captures the shifting colors of New England autumn in photographs reminiscent of Ansel Adams, reads contemporary literary fiction by Sally Rooney and Ocean Vuong, strums acoustic
    guitar to the folk sounds of Iron & Wine, sketches landscapes in a pocket notebook, and follows crochet patterns from Ravelry, finding creative solace in these pursuits.
  travel: Melissa Pittman prefers spontaneous weekend getaways to nearby state parks like Acadia and the White Mountains, dreams of backpacking through the Canadian Rockies to study alpine ecosystems, but
    budget constraints keep most trips short and locally focused.
  culinary: Melissa Pittman cooks seasonal meals such as roasted root‑vegetable stew with fresh thyme and rosemary, enjoys experimenting with homemade sourdough bread, and when time‑pressed resorts to instant
    ramen, while often sharing their culinary creations at community potlucks.
  core: Melissa Pittman is a gentle, curiosity‑driven 21‑year‑old who blends a love for nature, creative expression, and community service, yet wrestles with disorganization and worry, making them a warm
    but occasionally frazzled presence.
background:
  cultural: Melissa grew up in Hardwick, a small, close‑knit town in the Green Mountains of Vermont. Her family’s roots lie in the New England Yankee tradition of self‑reliance, community participation,
    and respect for the natural environment. She has been shaped by the town’s farming heritage, local farmer’s markets, and a progressive rural culture that values sustainability, outdoor recreation, and
    mutual aid. While her upbringing reflects traditional white New England customs, she embraces contemporary values of inclusivity and environmental stewardship.
