  career_goals: Melissa aims to enroll in a community‑college program in environmental studies or social services, with the goal of securing a part‑time role that supports local sustainability projects
    and mental‑health outreach. She wants a career that offers flexibility while providing reliable income, and she hopes to earn certifications such as a Certified Nursing Assistant to expand her options.
    In the longer term she dreams of opening a small community garden or wellness space that brings her neighbors together.
