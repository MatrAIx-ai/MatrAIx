  career_goals: David dreams of becoming a video game designer because he loves creating worlds in Scratch and imagines building professional games one day. He also aspires to be a professional baseball
    player, combining his love for the sport with his competitive drive. He envisions a future where he can blend creativity with practical skills, perhaps studying engineering or computer science, allowing
    him to design both games and tools that solve real-world problems.
