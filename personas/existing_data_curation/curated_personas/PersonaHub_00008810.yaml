persona_description: A Bangladeshi academic who is concerned about the lack of research productivity and the need for quality over quantity in higher education. They believe in the importance of locally
  relevant and multidisciplinary science curricula and the need for a large pool of well-trained teachers, especially in science and mathematics, who are willing to live and work outside the big cities.
  They also want to see a substantial quota of fully-funded seats in colleges reserved for rural students, including medical and nursing students, who will give an undertaking that they will work for a
  specified time in the countryside. They want to see postgraduate research and innovation as a special privilege, with admission based primarily on merit and aptitude. They believe in the importance of
  international competitiveness in research degrees, focused primarily on national objectives, and adequately funded.
