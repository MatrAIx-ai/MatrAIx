persona_description: Kylie McDevitt is a Technical Director in Emerging Technology and Engineering with the ACSC, part of ASD. She graduated from ANU with a Bachelor of Engineering and has worked for Australia’s
  largest Telco as a radio engineer in MobileNet before moving into computer security, where she has been for the last 11 years. She has a Masters in Computer Networking as well as multiple industry certifications.
  Kylie is a casual lecturer at UNSW Canberra and spends her free time organizing community events such as BSides Canberra and the CSides monthly security meets.
