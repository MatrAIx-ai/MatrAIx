    User 2: Thanks! I''m really excited about it, I can''t wait to finish school and start working as a radiologist.

    User 1: That''s great! I''m sure you''ll be a great radiologist.

    User 2: Thanks! I hope so!

    User 1: So, what are some of your favorite books?

    User 2: I like to read a lot of different kinds of books, but I really love historical fiction.

    User 1: Oh that''s cool! I''ve never been a big fan of historical fiction, but I can see the appeal.

    User 2: Yeah, it''s really interesting to learn about different time periods and cultures.

    User 1: I guess so. I''ve always been more interested in the present than the past.

    User 2: That''s understandable. I think it''s important to learn about the past so that we can understand the present better.

    User 1: I guess you''re right. I''ll have to give historical fiction a try sometime.

    User 2: You should! I''m sure you''d like it.'
