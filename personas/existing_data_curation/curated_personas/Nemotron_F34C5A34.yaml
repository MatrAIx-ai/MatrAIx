personas:
  professional: Peter Harrell, a three‑year‑old preschooler in early childhood education settings, approaches every activity with boundless curiosity, turning simple playtime into informal experiments,
    mastering block stacking and story‑telling while delightfully negotiating group games with peers.
  sports: Peter Harrell, a three‑year‑old enthusiastic about the neighborhood Tumble Tykes Soccer Club’s mini‑soccer sessions and weekend visits to the community swimming pool, proudly dons a Chicago Cubs
    cap while they dribble a soft basketball, embraces the spirited energy of team play, and energetically cheers for the Chicago Bulls during family game nights.
  arts: Peter Harrell, a three‑year‑old who is fascinated by bright visuals, spends afternoons finger‑painting to Van Gogh’s Starry Night prints, dances along to The Wiggles and Disney’s Frozen soundtrack,
    and they attend weekly story‑time at the public library featuring author Mo Willems, letting imagination shape every playful moment.
  travel: Peter Harrell, a three‑year‑old explorer who delights in family road trips to the nearby zoo and a magical weekend at Disneyland, prefers spontaneous playground stops over rigid itineraries, and
    they daydream about visiting the Great Barrier Reef when they’re older.
  culinary: Peter Harrell, a three‑year‑old with a penchant for cheesy macaroni, banana slices, and occasional adventurous bites of avocado toast, can independently spread butter on toast using a child‑safe
    knife, and they delight in snack time with honey‑drizzled oatmeal and strawberry slices.
  core: Peter Harrell, a three‑year‑old whirlwind of curiosity, they turn every routine into a playful experiment, hoard stickers like treasure, and can’t resist a good nap after an energetic chase.
background:
  cultural: 'Peter was born and raised in Fredonia, a small, close‑knit community in Lyon County, Kentucky. His family’s cultural roots reflect the values of rural Kentucky: a strong sense of community,
    hospitality, and a connection to the outdoors. Regular family gatherings often revolve around church events, local fairs, and backyard barbecues where sharing food and stories is common. These community
    traditions nurture Peter’s sociable, outgoing nature and his appreciation for shared experiences. His upbringing blends Appalachian folklore and contemporary middle‑American influences, providing him
    with a grounding in both local customs and broader cultural narratives.'
