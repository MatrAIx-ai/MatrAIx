  career_goals: Jo aims to move into a leadership position such as charge nurse or nurse manager and is planning to enroll in a Master’s program in Nursing with a focus on education or health policy. She
    hopes to design and lead community‑based health‑literacy programs that incorporate storytelling and the arts, and to mentor new nurses, especially those returning to the workforce after a career break.
    In the long term she envisions influencing regional health policy and becoming a recognized speaker on compassionate, culturally aware nursing practice.
