personas:
  professional: Jo Adi is a veteran bedside nurse with two decades of clinical expertise who blends meticulous assessment skills with a humanities-infused, storytelling approach to patient education, and
    they are now pursuing a Master's in Nursing to step into a charge-nurse or nurse-manager role while championing community health-literacy programs.
  sports: Jo Adi is an avid fan of the Kansas City Chiefs and Royals who jogs with the Wichita Yoga & Running Club, plays occasional pick-up volleyball at the local senior center, and they attend every
    home game of the Wichita State Shockers women's basketball team while balancing a personal habit of weekend hikes through the Flint Hills.
  arts: Jo Adi is a community-theater enthusiast who regularly stages productions with the Lawrence Stage Company, admires the works of Maya Angelou and Lin-Manuel's musical Hamilton, and they unwind by
    listening to Bob Dylan's folk catalog while reading historical fiction by Philippa Gregory.
  travel: Jo Adi is a weekend explorer who has road-tripped to Lindsborg for its Swedish Festival, visited the Kansas City Jazz Festival, dreamt of strolling through New Orleans' French Quarter, and they
    plan a future cultural tour of Edinburgh's book-festivals, always balancing travel costs with a modest savings plan.
  culinary: Jo Adi is a garden-to-table cook who loves harvesting heirloom tomatoes, sweet corn, and zucchini, they excel at making roasted vegetable ratatouille, crisp salads with goat cheese, and they
    often experiment with farm-fresh cornbread topped with honey-butter.
  core: Jo Adi is a socially vibrant, community-driven nurse who balances disciplined health advocacy with occasional spontaneous splurges, thriving on theater, gardening, and Midwestern camaraderie while
    navigating the tension between structure and flexibility, and they rarely miss a chance to quote a favorite line during rounds.
background:
  cultural: Jo grew up in a small‑town, white Midwestern family in Kansas, where community involvement, self‑reliance, and modesty were core values. Her upbringing blended the region’s agricultural heritage
    with a strong emphasis on education and civic service, leading her to pursue a liberal‑arts degree before entering nursing. The Midwestern emphasis on friendliness and practicality informs her collaborative,
    yet assertive, approach to patient care and community engagement. She also draws on her family’s appreciation for the arts—particularly literature and local theater—which continues to shape her holistic
    view of health.
