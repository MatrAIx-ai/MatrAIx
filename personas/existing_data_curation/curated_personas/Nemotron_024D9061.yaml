personas:
  professional: John Bowman is a junior student organizer who spearheads after‑school soccer drills and classroom pet‑care rotations, using their love of structure and compassion to ensure smooth group
    dynamics.
  sports: John Bowman thrives on the soccer field as a forward for the Rocky Valley youth league, cheering for the Seattle Sounders FC during televised matches, and joins their school's seasonal field day
    where they relish relay races and friendly competitions.
  arts: John Bowman sings their heart out in the church children's choir, draws comic‑style heroes inspired by Marvel's Spider‑Man and the animated series Steven Universe, and they regularly watch Pixar's
    Toy Story and listen to The Wiggles for creative inspiration.
  travel: John Bowman loves family road trips to Yellowstone National Park, weekend visits to the local zoo, and dreams of experiencing the magic of Walt Disney World in Orlando, always eager to explore
    new playgrounds and meet new friends alongside them.
  culinary: John Bowman favors pepperoni pizza, chicken nuggets, and mac & cheese, helps whisk batter for pancakes on Sunday mornings, and enjoys snacking on apple slices with caramel dip, though they stubbornly
    resist broccoli.
  core: John Bowman is a seven‑year‑old soccer enthusiast and LEGO architect whose structured yet compassionate nature fuels teamwork, while their occasional candy splurges and forgetful medication habits
    add endearing quirks.
background:
  cultural: John is raised in a close‑knit African‑American family in Eatonton, Georgia. His community places strong emphasis on family bonds, church participation, and local Southern Black traditions,
    such as Sunday gospel services, community picnics, and storytelling about heritage. He celebrates cultural milestones like Juneteenth and participates in school programs highlighting African‑American
    history. Southern cuisine, gospel music, and a supportive extended family network shape his upbringing, reinforcing values of respect, education, and mutual assistance.
