  hobbies: '[''Soccer'', ''LEGO building'', ''Choir'', ''Reading picture books'', ''Classroom pet caretaker'', ''Drawing'', ''Playing group games'']'
  career_goals: John dreams of growing up to be a firefighter or another community helper who keeps people safe and provides assistance during emergencies. He also imagines becoming a teacher one day, sharing
    his love of reading and math with younger children. At school he aims to take on leadership roles such as class monitor or team captain, developing the responsibility and structure he values while continuing
    to support and protect his friends.
