persona_description: A researcher and scientist who specializes in the study of ecological dynamics and their impact on plant communities. They have conducted a synthesis of evidence on the slow adaptation
  of forests to climate change and the challenges of natural forest management. They are aware of the dynamic and out-of-sync nature of plant life and ecosystems in the face of climate change and the importance
  of caution in introducing new species. They are interested in the study of natural regeneration and the potential for new species to spread through human intervention.
