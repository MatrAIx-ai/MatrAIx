  hobbies: '[''Visiting art museums and galleries'', ''Watercolor painting'', ''Landscape photography'', ''Reading (art history, science fiction)'', ''Model‑train hobby'', ''Gardening (vegetable garden)'',
    ''Hiking on local trails'', ''Attending small jazz concerts'']'
  career_goals: Michael aims to transition into a senior advisory role within procurement, focusing on sustainability and green sourcing initiatives that align with his interest in forward‑thinking practices.
    He plans to earn the Certified Professional in Supply Management (CPSM) credential over the next two years and to mentor junior clerks, sharing his blend of analytical rigor and creative problem‑solving.
    As he approaches retirement, Michael hopes to establish a part‑time consulting practice that helps small New England manufacturers streamline their supply chains while integrating artistic branding
    elements. Balancing professional growth with quality time for his family and personal pursuits remains a guiding ambition.
