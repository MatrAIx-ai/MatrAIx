personas:
  professional: Maria Torres is a budding welder and metal artist who combines expert MIG, TIG, and stick welding with basic CAD design and bilingual communication to bring abstract concepts to life, while
    her competitive streak drives participation in regional welding contests and her relaxed, improvisational style lets her devise creative solutions on the fly.
  sports: Maria Torres fuels her fitness through weekly hikes with the SoCal Trailblazers in the Santa Monica Mountains, salsa dancing nights that double as cardio workouts, and cheering on the Los Angeles
    Lakers, Dodgers, and Galaxy, while also training at a local rock‑climbing gym on weekends.
  arts: Maria Torres channels her imagination into small metal sculptures that blend welding precision with abstract design, draws inspiration from contemporary masters like Anish Kapoor and LA muralist
    Shepard Fairey, and energizes her creative evenings with salsa classics from Celia Cruz and modern Latin fusion beats, while regularly attending the downtown LA Art Walk and museum nights.
  travel: Maria Torres prefers spontaneous weekend getaways, having explored Joshua Tree’s desert art installations and San Diego’s vibrant Barrio Logan street murals, while dreaming of an art‑focused pilgrimage
    to Mexico City’s galleries and a future backpacking trek across the Andean highlands to merge hiking, culture, and sketching.
  culinary: Maria Torres cooks with an enthusiastic, occasionally chaotic flair, mastering dishes like carnitas tacos, chiles en nogada, and homemade salsa verde using fresh corn tortillas, roasted tomatillos,
    chipotle, and avocado, often improvising garnish with lime zest and sculptural plating that mirrors her metal art aesthetic.
  core: Maria Torres is a restless creator who fuses welding precision with artistic imagination, juggling competitive drives, spontaneous adventures, and a laid‑back attitude toward obligations.
background:
  cultural: Maria was raised in a Mexican‑American household in Simi Valley, where Spanish was spoken at home and English at school. Her family maintains many traditions—celebrating Día de los Muertos,
    sharing homemade tamales, and attending weekly Mass—while also embracing the multicultural vibe of Southern California. Growing up in a close‑knit Latino community gave her a strong sense of family,
    respect for elders, and an appreciation for communal celebrations such as quinceañeras and local street festivals. These cultural roots influence her love for vibrant colors, rhythmic music, and communal
    cooking, and they shape her work ethic and collaborative style on the shop floor.
attributes:
  skills: '["MIG welding", "TIG welding", "Stick welding (SMAW)", "Brazing of copper and aluminum alloys", "Electronic soldering for PCB assembly", "Blueprint reading and technical drawing interpretation",
    "Metal fabrication and layout", "OSHA safety compliance", "Quality inspection and non‑destructive testing", "Basic CAD drafting for weld designs", "Bilingual communication (Spanish/English)"]'
  hobbies: '["Metal sculpture and DIY art projects", "Salsa dancing and Latin music", "Maker community meetups and hackathons", "Competitive board games (Settlers of Catan, Codenames)", "Strategy video
    games with creative building (Minecraft)", "Hiking and outdoor photography", "Cooking traditional Mexican cuisine", "Attending local art festivals and street fairs"]'
  career_goals: Maria aims to earn her American Welding Society (AWS) Certified Welder credential within the next two years, then advance to a journeyman welder status. She plans to enroll in a community‑college
    welding technology program to deepen her knowledge of advanced metallurgy and robotics‑assisted welding. Long‑term, she dreams of merging her technical skill with her love of art by opening a small
    studio that produces custom metal sculptures and functional art pieces for interior design and public installations. Her competitive streak drives her to participate in regional welding competitions
    and eventually mentor younger welders as an instructor or certified welding inspector.
