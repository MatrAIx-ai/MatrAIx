  career_goals: Tonya plans to earn her GED within the next six months and then enroll in a community-college certificate program for medical office administration. She aims to secure a full-time administrative
    assistant position at a local health-care clinic where the work schedule is predictable and the tasks align with her love of routine. Within three years she hopes to obtain a Certified Medical Administrative
    Specialist (CMAS) credential and move into an office-manager role. In the longer term she dreams of launching a small home-based cleaning and laundry business that would let her apply her meticulous
    organizational skills while providing financial independence.
