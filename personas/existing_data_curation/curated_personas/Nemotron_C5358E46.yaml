  hobbies: '["Pickup Basketball", "Classic Car Restoration", "Texas Car Shows", "Barbecuing", "Fishing", "Listening to Classic Rock & Country Music", "Online Racing Video Games"]'
  career_goals: Edward aims to advance from a lead technician to shop manager within the next three years, leveraging his practical expertise and leadership abilities. He plans to obtain additional ASE
    certifications, especially in hybrid/electric systems, to position himself at the forefront of the industry's shift toward greener technologies. Long‑term, Edward dreams of opening his own family‑run
    garage in Grand Prairie, where he can create a collaborative, flexible work environment that balances his love for hands‑on work with the desire to mentor the next generation of mechanics. He also hopes
    to develop a niche service for custom car restorations, blending his curiosity for new ideas with his practical skill set.
