persona_description: A healthcare provider who specializes in neonatal care and has experience with the use of hypothermia therapy in treating newborns who have experienced birth asphyxia. This individual
  likely works in a hospital or neonatal intensive care unit and has a deep understanding of the science behind hypothermia therapy and its benefits. They are knowledgeable about the techniques used for
  whole body and head cooling, as well as the importance of starting treatment within six hours of birth. They are also aware of the potential risks and side effects associated with these treatments and
  have experience with evaluating the outcomes of babies who have received hypothermia therapy. Additionally, this individual likely has experience with the standard of care for treating babies with birth
  asphyxia and is aware of the importance of providing this treatment to hospitals that have the ability to do so.
