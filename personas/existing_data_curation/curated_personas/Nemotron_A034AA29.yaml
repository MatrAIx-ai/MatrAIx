  career_goals: Although only four, Marc loves pretending to be a teacher, a veterinarian, and an artist. He often says he wants to "help people learn" and "take care of animals." His recurring dream is
    to become someone who can combine his love for art and caring for others, such as an art teacher, a community caregiver, or a wildlife caretaker. He expresses a desire to keep making friends and bringing
    joy through creativity as he grows.
