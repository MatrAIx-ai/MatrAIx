personas:
  professional: Marc Guyett, a four‑year‑old imaginative builder who turns blocks and crayons into collaborative projects, demonstrates natural leadership in playtime, often guiding classmates through story‑based
    adventures while embracing a flexible, unstructured approach.
  sports: Marc Guyett, a four‑year‑old energetic member of the local Tiny Tots Soccer Club, loves chasing after a neon orange ball at the community park, cheers for the nearby City Hawks football team,
    and often organizes impromptu tag games with friends.
  arts: Marc Guyett, a four‑year‑old enthusiastic doodler who idolizes animators like Hayao Miyazaki and loves singing along to Disney’s "Let It Go", spends afternoons creating colorful collages with glitter
    and glue, and frequently stages impromptu puppet shows for his family.
  travel: Marc Guyett, a four‑year‑old explorer who prefers short family road trips to the zoo or the beach over long flights, delights in collecting seashells at the coastal town of Santa Monica, and dreams
    of visiting the magical castles of Disneyland Paris someday.
  culinary: Marc Guyett, a four‑year‑old picky eater who adores chicken nuggets, mac & cheese, and strawberry slices, proudly assists in stirring batter for chocolate chip cookies, yet habitually refuses
    broccoli and often demands extra ketchup on his fries.
  core: Marc Guyett, a four‑year‑old whirlwind of curiosity who blends boundless imagination with a love for sharing, but occasionally misplaces his toys amid the chaos of spontaneous play.
background:
  cultural: Marc is raised in Johnson City, Tennessee, within the Appalachian foothills. His family participates in local traditions such as church gatherings, community festivals like the Blue Plum Festival,
    and family picnics in nearby hills. He is exposed to Southern hospitality, storytelling, and Appalachian folk music, which influence his love for music and narratives. The local school emphasizes kindness,
    cooperation, and appreciation for nature, reinforcing his compassionate personality. His cultural environment blends modern suburban life with regional customs, providing a nurturing backdrop for his
    curiosity and social growth.
