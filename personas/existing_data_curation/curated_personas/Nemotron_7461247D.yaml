    and specimen handling'', ''Troubleshooting and root cause analysis'', ''Statistical data analysis (Excel, R) for test validation'', ''Team communication and training'']'
  hobbies: '[''Basketball'', ''Bachata and merengue dancing'', ''Cooking Dominican cuisine'', ''Attending live music concerts'', ''Hiking in Long Island Pine Barrens'', ''Listening to science and technology
    podcasts'', ''DIY electronics and coding projects'', ''Volunteering at community health fairs'', ''Reading scientific journals'']'
  career_goals: His short‑term goal is to obtain ASCP certification and a senior technologist role at a high‑volume hospital, where he can lead quality‑improvement projects and mentor junior staff. Long‑term,
    Cristian aims to become a laboratory supervisor or manager, specialize in molecular pathology, and eventually pursue a master’s degree in Clinical Laboratory Science or Public Health to drive innovations
    that improve diagnostic turnaround for underserved communities, especially the Dominican diaspora in Long Island.
