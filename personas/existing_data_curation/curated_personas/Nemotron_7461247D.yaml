personas:
  professional: Cristian Rosadocamacho, a clinical laboratory technologist at a high‑volume New York hospital, blends meticulous data analysis, equipment maintenance, and regulatory compliance with strong
    team communication, aiming for ASCP certification and a senior role where they can lead quality‑improvement projects while mentoring junior staff.
  sports: Cristian Rosadocamacho, a regular at the Long Island community center’s basketball league, cheers for the New York Knicks and Long Island Nets, joins weekend hiking groups trekking the Pine Barrens,
    and scrolls through NBA highlights while balancing a love for team sports with personal fitness.
  arts: Cristian Rosadocamacho, a social dancer who masters bachata and merengue at local salsa nights, frequents Brooklyn’s live‑music venues to catch artists like Celia Cruz tributes and indie folk bands,
    and curates weekly playlists that blend Afro‑Caribbean rhythms with contemporary indie pop.
  travel: Cristian Rosadocamacho, an adventurous weekend traveler, has explored the streets of Old San Juan, hiked the Hudson Valley’s Mohonk Preserve, dreams of studying the colonial architecture of Cartagena,
    but often balances travel plans with a full work schedule and a modest travel budget.
  culinary: Cristian Rosadocamacho, a confident home cook, regularly prepares mangú, sancocho, and tostones for friends, experiments with spice blends while occasionally over‑simmering rice, and enjoys
    pairing their meals with locally sourced plantains and fresh avocado.
  core: Cristian Rosadocamacho merges laboratory precision with lively community rhythms, chasing career advancement while dancing, cooking, and budgeting with a blend of curiosity, practicality, and occasional
    perfectionist quirks.
background:
  cultural: Cristian is a first‑generation Dominican‑American, raised in a close‑knit family that blends Caribbean traditions with the vibrant multicultural life of Long Island. Bilingual in Spanish and
    English, he grew up celebrating Dominican holidays, savoring dishes like mangú and sancocho, and participating in local festivals that feature bachata, reggaeton, and Caribbean rhythms. His cultural
    roots instill a strong sense of community, hospitality, and respect for family, which shape his collaborative work style and his commitment to give back through health outreach in the Dominican community.
attributes:
  skills: '[''Hematology and coagulation analysis'', ''Microbiology culture and susceptibility testing'', ''Molecular diagnostics (PCR, qPCR)'', ''Immunoassays (ELISA, chemiluminescence)'', ''Lab instrumentation
