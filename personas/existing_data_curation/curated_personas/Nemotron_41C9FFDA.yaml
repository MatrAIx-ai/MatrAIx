  career_goals: Mary aims to advance from her current first‑line supervisory role to a kitchen manager position within the next two to three years. She plans to earn a Certified Food Safety Manager credential
    to deepen her expertise and increase her marketability. Long‑term, she aspires to launch a boutique catering business that highlights healthy, locally sourced meals for the San Diego community, emphasizing
    seasonal produce and sustainable practices. Additionally, she hopes to mentor younger culinary staff and eventually move into a regional supervisory role overseeing multiple restaurant locations.
