persona_description: A historian or a researcher who is interested in the history of the Middle East, particularly in the period of the British Empire and the Palestine Campaign. They are fascinated by
  the works of William "Crimea" Simpson, the famous illustrator of the Illustrated London News, and are particularly interested in his sketches of Jerusalem during the time of the Palestine Exploration
  Fund. They are also interested in the history of the Suez Canal and its impact on the development of the British Empire.
