    performance optimization'', ''Integration of emerging technologies (thermal imaging, drones, data analytics)'', ''Leadership and mentoring of junior firefighters'']'
  hobbies: '[''Sketching and watercolor painting'', ''Landscape photography'', ''Hiking and trail running'', ''Competitive weightlifting and fitness challenges'', ''Reading science‑fiction and technology
    non‑fiction'', ''Attending local art galleries and community theater'', ''DIY motorcycle restoration and custom painting'', ''Cooking and craft‑beer pairing experiments'']'
  career_goals: Louis plans to earn his Fire Officer I certification and complete an associate degree in fire science within the next two years. His short‑term goal is to be promoted to fire captain and
    eventually to battalion chief for Seward County. He is passionate about spearheading a community outreach program that blends fire‑safety messaging with local art projects, such as public murals that
    both educate and beautify the town. Additionally, Louis wants to champion the adoption of innovative tools—like drone‑assisted situational awareness and predictive analytics—to improve response times
    and officer safety across the department.
