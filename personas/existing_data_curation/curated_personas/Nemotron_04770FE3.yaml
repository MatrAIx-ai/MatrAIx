personas:
  professional: Kaitlin Glawson, an experienced accountant and internal auditor with advanced Excel, SAP, and Power BI skills, leverages a methodical, process‑oriented mindset and strong instructional‑design
    abilities to lead audit engagements, mentor junior staff, and drive compliance improvements while balancing a collaborative team approach with their assertive drive for precision.
  sports: Kaitlin Glawson enjoys weekend hikes in Hoosier National Forest, is a member of the Midwest Hiking Club, follows the Indianapolis Colts and Indiana Pacers faithfully, and plays competitive pickleball
    at the local YMCA league.
  arts: Kaitlin Glawson actively participates in the Clay City Community Theatre, where they have performed in productions like "Our Town", reads mystery novels by Agatha Christie and Tana French, and finds
    solace in the music of Johann Sebastian Bach and contemporary folk duo The Avett Brothers.
  travel: Kaitlin Glawson favors meticulously planned road trips across the Midwest, has embarked on a heritage tour of Bavaria visiting Munich and Nuremberg, and dreams of a leisurely coastal getaway to
    Charleston, South Carolina, while balancing travel expenses with a family budgeting spreadsheet.
  culinary: Kaitlin Glawson delights in baking pretzel rolls and Black Forest cake using family recipes, cooks hearty Midwestern stews with fresh vegetables from their garden, and enjoys experimenting with
    sauerkraut and spaetzle alongside classic dishes like chicken pot pie.
  core: Kaitlin Glawson embodies a disciplined, community‑oriented mindset that blends meticulous professional rigor with a love for gardening, baking, and lifelong learning, all while navigating the occasional
    perfectionist quirks of a planner who still forgets to floss.
background:
  cultural: Kaitlin grew up in Clay City, Indiana, in a middle‑class family with German‑American ancestry. The small‑town Midwestern environment emphasized reliability, modesty, and community service, values
    she internalized through regular involvement in church activities, local fairs, and volunteer projects. These regional cultural traits fostered her preference for structured, collaborative settings
    and reinforced a strong work ethic. While she appreciates the traditional celebrations of Thanksgiving, Independence Day, and local county fairs, she also draws on her family’s heritage—bringing German
    baking traditions and a respect for detailed craftsmanship into her personal life.
attributes:
  skills: '["Financial statement analysis", "GAAP compliance", "Internal audit procedures", "Tax preparation", "Advanced Excel (pivot tables, macros)", "ERP systems (QuickBooks, SAP)", "Data visualization
    (Power BI)", "Risk assessment", "Process improvement (Lean Six Sigma basics)", "Project coordination", "Instructional design", "Report writing", "Effective communication", "Conflict resolution", "Time
    management", "Strategic budgeting", "Regulatory compliance (SOX)", "Public speaking", "Mentorship"]'
  hobbies: '["Gardening (vegetable garden)", "Baking family recipes", "Reading mystery novels", "Crossword puzzles", "Knitting scarves", "Volunteering for adult literacy tutoring", "Hiking local state parks",
    "Genealogy research", "Attending community theater productions", "Book club membership", "Participating in local historical society events"]'
  career_goals: Kaitlin aims to secure her CPA certification within the next two years and add the Certified Internal Auditor (CIA) credential to broaden her audit expertise. Her primary ambition is to
    advance to an audit manager role at a regional firm, where she can lead audit engagements, shape internal control frameworks, and mentor a diverse team of accountants. She also envisions developing
    a hybrid training program that blends her accounting proficiency with her education background to teach financial literacy to adults in her community, possibly serving as an adjunct instructor at a
    nearby community college.
