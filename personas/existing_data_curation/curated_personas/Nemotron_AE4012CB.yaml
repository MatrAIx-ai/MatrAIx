personas:
  professional: Meliton Romaguera is a veteran full‑stack developer who blends three decades of Python, JavaScript, and cloud‑native expertise with a restless curiosity for generative art, allowing them
    to lead agile, art‑tech projects while often sidestepping rigid schedules in favor of spontaneous creative breakthroughs.
  sports: Meliton Romaguera enjoys weekend runs with the Louisville Athletic Club, supports the Kentucky Derby’s horse racing tradition and the Louisville Cardinals basketball team, and they keep fit by
    mixing yoga for flexibility with weekly cycling rides through the Bernheim Arboretum trails, yet they often skip the Thursday night gym class when a new art exhibit opens.
  arts: Meliton Romaguera spends evenings improvising classical guitar pieces inspired by Andrés Segovia while listening to traditional folk songs from their family's homeland, curates generative visual
    installations for local galleries like the Speed Art Museum, and they collect vinyl records ranging from Miles Davis to contemporary indie bands, a habit that sometimes leads to late‑night listening
    sessions that delay their bedtime.
  travel: Meliton Romaguera plans trips like a storyboard, preferring immersive cultural journeys such as a culinary pilgrimage to Lyon, a photography hike in the Canadian Rockies, and a week‑long AR workshop
    in Kyoto, but their budget constraints and family commitments often mean they schedule these adventures during the quieter autumn months.
  culinary: Meliton Romaguera is a confident home chef who reimagines a family mole recipe with bourbon‑marinated pork and chilhuacle chilies, whips up sweet corn masa churros drizzled with honey, and they
    delight in sourcing fresh corn from local farms, though their habit of tasting the sauce straight from the pan sometimes leaves a lingering heat on the countertop.
  core: Meliton Romaguera is a tech‑savvy, art‑obsessed lifelong learner who fuses traditional family flavors with Kentucky bourbon, codes generative visuals on impulse, and balances mindfulness with a
    penchant for late‑night vinyl marathons.
background:
  cultural: Meliton was born in Guadalajara, Jalisco, and moved to the United States with his family at age ten, settling in the Louisville metro area. He grew up bilingual, speaking Spanish at home and
    English at school, and he maintains strong ties to his Mexican heritage through daily language use, family recipes, and community celebrations. He actively participates in Louisville’s vibrant Mexican‑American
    scene, joining annual Día de los Muertos vigils, Cinco de Mayo festivals, and the local Latin dance nights. His cooking routinely blends traditional flavors—such as chilhuacle chilies and fresh corn
    masa—with Kentucky staples like bourbon and locally sourced honey. While he embraces his Mexican roots, Meliton also appreciates Southern hospitality, the region’s love of bourbon, horse racing, and
    the arts. This cultural hybridity informs his creative work, as he often incorporates Mexican motifs and storytelling into the interactive digital experiences he builds for American audiences.
