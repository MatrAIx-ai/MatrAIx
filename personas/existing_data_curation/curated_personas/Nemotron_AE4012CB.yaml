  career_goals: Looking ahead, Meliton wants to channel his lifelong curiosity into projects that blend technology with visual art. He aims to lead a small, agile team that builds interactive installations
    for museums, galleries, and community spaces, allowing him to stay out of rigid corporate hierarchies while still applying his deep technical knowledge. He plans to earn an advanced certification in
    cloud architecture, such as AWS Solutions Architect – Professional, and to deepen his expertise in augmented reality and generative AI, with the ambition of launching a boutique consultancy that helps
    cultural institutions digitize and animate their collections. Mentorship remains a core ambition; he hopes to formalize a mentorship program for underrepresented youth in Louisville, sharing both coding
    skills and his love for creative expression. Ultimately, Meliton envisions authoring a book or online course on Creative Coding for Social Impact that captures his unconventional approach.
