persona_description: A scientist who studies the circadian rhythm, specifically the effects of light on the sleep-wake cycle and the mechanisms of entrainment. They are particularly interested in the role
  of intrinsically photosensitive retinal ganglion cells in the regulation of the circadian clock and have conducted research on the entrainment of animals to different light-dark cycles. They have also
  studied the effects of light exposure on the development of intrinsically photosensitive retinal ganglion cells in the retina of blind individuals.
