  hobbies: '["Graffiti and street art", "Basketball", "Hip hop dancing", "Listening to music (merengue, bachata, hip hop)", "Visiting local museums and galleries", "Building model kits (LEGO, model airplanes)",
    "Urban photography", "Cooking Dominican dishes", "Participating in community workshops", "Playing video games"]'
  career_goals: Nelson aims to transition from basic assembly to a CNC programmer role within the next two years, planning to earn a certification in CNC machining through a community college program. He
    wants to apply his curiosity for new ideas and art by integrating design concepts into manufacturing, eventually leading a small custom‑fabrication workshop that creates functional pieces with an artistic
    flair. Long‑term, he envisions a supervisory position where he can mentor younger workers, improve process efficiency, and champion innovative, design‑oriented projects.
