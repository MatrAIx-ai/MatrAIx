personas:
  professional: Nelson Cruz is a 21‑year‑old assembler in a Bronx manufacturing shop who leverages their methodical, safety‑first mindset and knack for interpreting technical drawings to keep production
    lines humming, while actively pursuing CNC programming certification and dreaming of eventually running a design‑focused custom‑fabrication workshop.
  sports: Nelson Cruz fuels their social side by joining pick‑up basketball games at the local Bronx court, cheering for the New York Knicks and following the Brooklyn Nets, while also dabbling in street‑ball
    tournaments; they view fitness as a group activity rather than a disciplined regimen, often skipping workouts when stressful deadlines loom.
  arts: Nelson Cruz immerses themselves in the Bronx’s vibrant street‑art scene, tagging walls with vivid graffiti inspired by the bold palettes of KAWS and the stencil work of Banksy, while listening to
    the lyrical flow of Kendrick Lamar, the Caribbean rhythms of Bad Bunny, and the classic break‑beats of DJ Premier at home; they regularly attend shows featuring artists like Jean‑Michel Basquiat retrospectives
    and community mural projects.
  travel: Nelson Cruz prefers weekend getaways that blend culture and creation, such as a street‑art tour of Brooklyn, a quick hike in the Catskill Mountains, and a summer trip to Cartagena’s historic old
    town where they can photograph murals and taste local cuisine, but their tight budget often limits overseas travel to saving for future trips to Berlin’s techno scene and the street‑food markets of
    Osaka.
  culinary: Nelson Cruz enjoys cooking home‑style Caribbean dishes like plantain‑based mofongo, yucca mash with garlic sauce, and arroz con gandules, skillfully balancing the bold flavors of cumin, cilantro,
    and panela, while also experimenting with sushi rolls and mastering the perfect espresso shot; they love hosting potluck nights where friends sample their signature tostones with garlic‑lime aioli.
  core: Nelson Cruz is a hyper‑curious, organized hustler who channels stress into street art, hoards espresso cups, over‑plans every project, yet often stays up late worrying about the next move.
background:
  cultural: Nelson was raised in a close‑knit Dominican family in the Bronx, speaking both Spanish and English at home. Dominican cultural traditions—music like merengue and bachata, family gatherings,
    and Catholic holidays—are a core part of his identity, while the multicultural environment of the Bronx has exposed him to Afro‑Caribbean, hip‑hop, and urban art influences. This blend of heritage and
    city life fuels his artistic curiosity, social energy, and respect for community values.
attributes:
  skills: '["Mechanical assembly", "Fabrication", "Use of hand and power tools", "Reading technical drawings", "Basic welding", "CNC machine operation", "Troubleshooting", "Safety compliance", "Inventory
