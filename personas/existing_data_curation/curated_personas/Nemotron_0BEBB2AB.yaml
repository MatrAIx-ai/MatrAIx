  career_goals: He aims to complete his associate's degree in Business Administration and secure an entry‑level position in supply chain or operations management within a regional manufacturing firm. Over
    the next five years, he aspires to obtain a certification such as the Certified Supply Chain Professional (CSCP) and progress to a logistics analyst role where he can apply his analytical and organizational
    strengths. Long‑term, he envisions managing a distribution center, leading a team, and implementing efficiency improvements that are measurable and data‑driven. His competitive drive fuels his ambition
    to exceed performance benchmarks and earn recognition for operational excellence.
