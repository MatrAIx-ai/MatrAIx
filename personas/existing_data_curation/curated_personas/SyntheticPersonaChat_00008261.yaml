data:
  user 1 personas: 'I graduated valedictorian of my high school class.

    I had to drop out of college to help with my grandparents.

    My mother stayed at home all day to raise me and my siblings.

    I can t stand salads.

    My father used to be an insurance salesman.'
  user 2 personas: 'I am always the one who buys the beers.

    I like to smell my own farts.

    I am from san fransico.

    I like to place blame on other people even when i know it is my fault.

    My beer gut is so huge i haven t seen my feet in two years.'
  Best Generated Conversation: 'User 1: Hi there, what''s your name?

    User 2: Hi, I''m [User 2]. What''s your name?

    User 1: My name is [User 1]. It''s nice to meet you.

    User 2: Nice to meet you too.

    User 1: So, what do you do for a living?

    User 2: I''m a software engineer.

    User 1: Oh, that''s cool. I''m a nurse.

    User 2: Wow, that''s a tough job.

    User 1: It can be, but it''s also very rewarding.

    User 2: I''m sure it is.

    User 1: So, what do you like to do for fun?

    User 2: I like to go to the beach, play video games, and drink beer.

    User 1: Oh, I love the beach too. I''m not much of a gamer, but I do enjoy a good beer.

    User 2: We should go to the beach sometime. I''ll buy the beer.

    User 1: That sounds like a plan.

    User 2: Great. I''ll let you know when I''m free.

    User 1: Sounds good.


    (A few days later)


    User 1: Hey, [User 2]. I''m free to go to the beach today if you are.

    User 2: Awesome! I''m free too.

    User 1: Great. I''ll pick you up at 11:00.

    User 2: Sounds good.


    (11:00 AM)


    User 1: I''m here to pick you up.

    User 2: I''m ready.

    User 1: Great. Let''s go.


    (At the beach)


    User 1: This is great.

    User 2: I know, right?

    User 1: So, what do you want to do first?

    User 2: How about we go for a walk along the shore?

    User 1: That sounds good.


    (Walking along the shore)


    User 1: This is nice.

    User 2: I know, right?

    User 1: I''m glad we came.

    User 2: Me too.


    (After a while)


    User 1: I''m starting to get hungry.

    User 2: Me too.

    User 1: Let''s go get some food.

    User 2: Sounds good.


    (At a restaurant)


    User 1: This is good.

    User 2: I know, right?

    User 1: I''m glad we came here.

    User 2: Me too.


    (After eating)


    User 1: I''m full.

    User 2: Me too.

    User 1: That was delicious.

    User 2: It was.


    (Back at the beach)


    User 1: I''m tired.

    User 2: Me too.

    User 1: Let''s go back to my place.

    User 2: Sounds good.


    (At User 1''s place)


    User 1: I''m so glad we went to the beach today.

    User 2: Me too.

    User 1: I had a lot of fun.

    User 2: Me too.

    User 1: I''m glad we met.

    User 2: Me too.

    User 1: I hope we can do it again sometime.

    User 2: Me too.'
