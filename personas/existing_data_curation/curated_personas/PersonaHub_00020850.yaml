persona_description: A county-level economic development analyst who is interested in understanding the localization and specialization of industries in a region, and the impact of regional industries on
  the overall economy. This person is familiar with concepts such as industry specialization, localization, and the role of industries in shaping regional economic growth. They have a strong understanding
  of the regional composition of industries and the interdependencies within these industries, and are able to use these concepts to analyze and interpret data. This person is also aware of the importance
  of open regional economies and the potential for differential growth based on industry mix, and is able to apply these concepts to the county-level context.
