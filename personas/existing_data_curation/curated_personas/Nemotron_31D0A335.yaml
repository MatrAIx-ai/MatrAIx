  hobbies: '[''LEGO building'',''Jigsaw puzzles'',''Drawing superheroes'',''Biking'',''Soccer'',''Watching animated adventure shows'',''Listening to music'',''Family karaoke'']'
  career_goals: Jacklyn dreams of becoming someone who helps keep order and solves problems, such as a firefighter, police officer, or astronaut. He is fascinated by uniforms, clear procedures, and teamwork.
    He also imagines himself as an engineer or video‑game designer who creates structured, rule‑based worlds.
