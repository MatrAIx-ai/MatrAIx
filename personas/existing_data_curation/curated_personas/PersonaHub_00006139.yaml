persona_description: A healthcare economist who studies the affordability and accessibility of medical technologies, particularly gene and cell therapies. They are focused on understanding the pricing strategies
  of pharmaceutical companies and the potential impact on patients who need these treatments. They are knowledgeable about the costs associated with developing and distributing gene and cell therapies,
  as well as the regulatory processes involved. They are also aware of the potential for pharmaceutical companies to profit at the expense of patients, and are advocating for alternative and creative funding
  sources to support innovation.
