persona_description: A nature-oriented outdoor educator who is passionate about designing and remodeling outdoor spaces for children, and is certified as a Nature Explore Classroom. They are knowledgeable
  about the Learning With Nature Idea Book and the ten guiding principles it represents, and are skilled in facilitating nature play space designing. They are also familiar with the Sourcebook and the Families'
  Club Kit, and are committed to involving children and their families in outdoor learning experiences. They are interested in expanding children's experience with nature beyond their neighborhoods and
  are willing to attend educational and environmental conferences to advocate for the Nature Explore mission.
