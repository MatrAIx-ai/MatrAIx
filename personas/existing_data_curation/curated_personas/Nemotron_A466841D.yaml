  career_goals: Geraldine’s current ambitions focus on staying active, giving back, and preserving her legacy. She aims to continue leading the senior‑center’s weekly social‑activity committee, expand the
    local book‑club’s outreach to intergenerational readers, and mentor new volunteers in event planning. She also hopes to write a memoir of her life in Texas, share family recipes, and travel to visit
    her children and grandchildren while maintaining her independence. Strengthening her support network and advocating for senior services in Plano are also high on her short‑term agenda.
