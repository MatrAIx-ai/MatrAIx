  career_goals: Ilkania aims to advance from a general maintenance technician to a certified journeyman in both HVAC and electrical trades. She plans to earn her EPA certification and pursue additional
    coursework to qualify for a supervisory role, eventually becoming a foreman who mentors new hires and leads safety training. Long‑term, she dreams of launching a community‑focused maintenance service
    that offers affordable repairs for low‑income households in Gary and neighboring areas, blending her technical expertise with her deep desire to help others. Balancing career growth with personal well‑being,
    she also intends to develop stress‑management strategies to maintain her emotional health while meeting her professional objectives.
