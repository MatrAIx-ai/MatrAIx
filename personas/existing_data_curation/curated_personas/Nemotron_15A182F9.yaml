  career_goals: Taylor aims to deepen her impact in the human services field by earning a Master of Social Work within the next three years and obtaining clinical licensure. She envisions specializing in
    trauma‑informed care and developing a flexible community outreach hub that blends in‑person support with digital resources. Her ambition includes designing training workshops for volunteers, influencing
    local policy to improve access to services for underserved residents, and eventually leading a community center where collaborative, low‑stress environments empower both staff and clients. Throughout
    her career progression, she seeks to preserve her calm, resilient approach while fostering harmonious teamwork.
