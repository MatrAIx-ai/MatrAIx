personas:
  professional: Stacey Epstein is an aspiring museum curator in the making, leveraging a solid grasp of Adobe Photoshop, Lightroom, Procreate, Illustrator, and basic web design to craft compelling exhibition
    proposals while channeling a competitive yet skeptical eye that drives them to meticulously research and fiercely pitch innovative digital experiences.
  sports: Stacey Epstein enjoys desert hikes, weekly yoga sessions, and pickup basketball games, follows the Phoenix Suns, the Arizona Diamondbacks, and Phoenix Rising FC, and balances a love of low-impact
    cardio with a competitive streak that pushes them to set personal endurance goals each season.
  arts: Stacey Epstein’s artistic world orbits around mixed-media creations inspired by the bold colors of Frida Kahlo, the contemporary commentary of Banksy, and the fluid lines of Ai Weiwei, while they
    regularly attend improv workshops at The Comedy Spot and cite the performances of Lin-Manuel Miranda and the visual storytelling of Wes Anderson as key fuels for their creative energy.
  travel: Stacey Epstein prefers spontaneous weekend road trips to desert getaways like Sedona and cultural festivals in Santa Fe, nurtures a bucket-list of international destinations including the street
    art districts of Berlin and the museums of Kyoto, but balances these wanderlust dreams with a student budget that favors affordable hostel stays and occasional family-sponsored trips to Mexico City.
  culinary: Stacey Epstein, a self-taught home cook, delights in crafting southwestern dishes such as green-chile enchiladas and cactus-infused salads, experiments with avocado-lime sushi rolls, and frequently
    pairs their meals with craft cold brew, yet they often over-season in a quest for bold flavors and rely on takeout burritos when deadlines loom.
  core: Stacey Epstein, an 18-year-old art-obsessed pragmatist, fuses a fierce competitive drive with a chronic worry habit, channeling late-night caffeine binges into mixed-media projects while constantly
    juggling deadlines, social events, and the quest for the perfect exhibition layout.
background:
  cultural: Stacey was raised in a middle‑class, culturally Jewish family in Phoenix. While she celebrates Jewish holidays and traditions, her upbringing also embraced the broader Southwest lifestyle, exposing
    her to the multicultural tapestry of the region, including Hispanic and Native American influences. She participated in community events that highlighted desert ecology and local art scenes. Through
    school and extracurricular activities, she became conversational in Spanish, adding another layer to her cultural awareness.
attributes:
  skills: '[''Visual Storytelling'', ''Digital Illustration'', ''Photo Editing (Adobe Photoshop, Lightroom)'', ''Basic HTML/CSS'', ''Public Speaking'', ''Event Coordination'', ''Research & Analysis'']'
  hobbies: '[''Contemporary Art Exhibitions'', ''Street Photography'', ''Mixed-Media Art'', ''Hiking'', ''Yoga'', ''Improv Comedy'', ''Board Games'', ''Community Arts Volunteering'', ''Journaling'']'
  career_goals: Stacey aims to complete a bachelor’s degree in Visual Arts or Museum Studies and later pursue a graduate program in curatorial practice. Her long‑term ambition is to work as a museum curator
    or creative director for a contemporary art institution, where she can blend traditional exhibition design with innovative digital experiences. She also hopes to launch community‑focused art projects
    that engage diverse audiences and provide platforms for emerging artists.
