  hobbies: '[''Cooking Mexican dishes'', ''Hiking'', ''Acoustic guitar'', ''Reading true‑crime novels'', ''Mindfulness meditation'', ''Intramural basketball'', ''Volunteering at community health fairs'',
    ''Participating in local cooking contests'']'
  career_goals: Jonathan aims to transition from bedside nursing to a supervisory role within the next three years, targeting a charge‑nurse or nursing manager position at his current facility. He plans
    to enroll in an accelerated BSN program to strengthen his clinical expertise and credentials. Long‑term, he envisions leading a community health initiative that bridges the gap between Mexican‑American
    families and local healthcare resources, using his bilingual skills and cultural insight. He also harbors an ambition to mentor newer nurses, fostering a culture of accountability and continuous improvement
    while navigating his own work‑life balance.
