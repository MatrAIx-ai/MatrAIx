personas:
  professional: Kenneth Mosley is a licensed mental‑health counselor who specializes in CBT, DBT, and Motivational Interviewing, delivering evidence‑based therapy with a methodical, organized style that
    blends his compassionate listening with meticulous case documentation and a drive to build supportive community programs.
  sports: Kenneth Mosley channels his sociable energy into a local recreational soccer league with the Anne Arundel Soccer Club, enjoys weekend hikes through Patapsco Valley State Park, and follows the
    Baltimore Ravens, Washington Wizards, and Baltimore Orioles, using his love of team camaraderie to motivate his own fitness routine.
  arts: Kenneth Mosley nurtures his creative side through community‑theater productions of classics like "Our Town" and "The Glass Menagerie," strums acoustic renditions of Neil Young and John Mayer at
    family gatherings, and keeps a curated playlist featuring Sam Smith, Adele, and the folk duo The Avett Brothers, which fuels his appreciation for storytelling across mediums.
  travel: Kenneth Mosley plans trips with the same weekly meal‑prep mindset, favoring a blend of structured itineraries and spontaneous exploration, having hiked the Blue Ridge Mountains, toured the historic
    sites of Washington, D.C., and ventured to Boston’s Freedom Trail, while dreaming of a family pilgrimage to Dublin to trace the roots of the city’s literary history, all within a budget that balances
    family savings goals.
  culinary: Kenneth Mosley delights in farm‑to‑table cooking, regularly harvesting tomatoes, basil, and zucchini from his garden to craft dishes like fresh Caprese salad, roasted vegetable quinoa bowls,
    and herb‑infused grilled chicken, while his moderate culinary skill sees him confidently searing a perfect filet mignon for special occasions and experimenting with homemade pesto using pine nuts and
    Parmesan.
  core: Kenneth Mosley blends disciplined routine with vibrant social energy, meticulously organizing therapy sessions, finances, and family meals while occasionally slipping into board‑game‑night overspending
    and garden‑derived culinary experiments.
background:
  cultural: Kenneth is a White American of Irish‑German ancestry, raised in a stable, middle‑class suburb of Anne Arundel County, Maryland. His upbringing emphasized traditional values, community service,
    and practicality, reinforced by regular church involvement and family gatherings. Proximity to the Chesapeake Bay fostered an appreciation for outdoor recreation and local history. While he identifies
    with mainstream American culture, he respects the diverse cultural mosaic of the Washington‑Baltimore corridor and incorporates that awareness into his counseling practice.
attributes:
  skills: '["Cognitive Behavioral Therapy (CBT)", "Dialectical Behavior Therapy (DBT)", "Motivational Interviewing", "Crisis Intervention", "Group Counseling Facilitation", "Case Management", "Psychiatric
    Assessment", "Individual Counseling", "EMR Documentation and Management", "Program Development", "Community Outreach Coordination", "Conflict Resolution", "Empathy and Active Listening", "Time Management
    and Scheduling", "Regulatory Compliance"]'
  hobbies: '["Gardening", "Weekly family cooking", "Recreational soccer", "Community theater participation", "Board‑game nights", "Hiking in Patapsco Valley State Park", "Volunteering at animal shelter",
    "Reading historical non‑fiction", "Playing acoustic guitar"]'
  career_goals: Kenneth aspires to deepen his clinical impact by earning a Master’s degree in Counseling and a clinical supervisor certification, positioning himself to train future counselors. He plans
    to open a private practice focused on trauma‑informed family therapy, while also seeking a leadership role as director of a community mental‑health center in Anne Arundel County. Additional goals include
    creating a school‑based preventive mental‑health program, authoring a self‑help guide on stress resilience, and advocating for expanded public funding for mental‑health services in the region.
