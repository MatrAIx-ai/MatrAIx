personas:
  professional: William Yates, a 24‑year‑old residential carpenter, combines methodical blueprint‑reading expertise, OSHA‑savvy safety checks, and reliable crew leadership with a genuine concern for teammates'
    well‑being, ensuring projects stay on schedule while they still have time for community volunteer work.
  sports: William Yates plays for the Fremont Flyers adult basketball league, hikes the Oak Openings Preserve with the Fremont Hiking Club, cheers on the Cleveland Cavaliers and Columbus Blue Jackets, and
    follows a structured workout routine that includes weekend runs, though stress sometimes leads them to skip a session.
  arts: William Yates, a classic‑rock aficionado, regularly attends the Fremont Summer Music Series, where they revel in the sounds of Led Zeppelin, The Who, and Foo Fighters, and spends evenings listening
    to vinyl records while crafting custom coffee tables, using music as both inspiration and relaxation.
  travel: William Yates favors short‑term road trips that blend adventure and rest, having explored Mackinac Island’s historic sites, hiked the Cuyahoga Valley’s trails, and planned a future visit to Asheville’s
    craft‑beer scene; they always budget carefully to fit travel around work and volunteer commitments.
  culinary: William Yates enjoys hearty, protein‑rich meals such as grilled ribeye steak with garlic‑rosemary butter, smoked brisket tacos topped with cumin‑spiced salsa, and nightly coffee brewed from
    locally roasted beans, cooking at a competent but occasionally distracted level that sometimes leaves the toast burnt, yet they take pride in feeding friends after a long day on the job.
  core: William Yates, a meticulous 24‑year‑old carpenter, balances a structured work ethic with community‑driven hobbies while wrestling with chronic worry that fuels both ambition and occasional over‑scheduling,
    and they often find solace in late‑night journaling.
background:
  cultural: William grew up in Fremont, a small city on the western edge of Ohio, within a family that traces its roots to German and Irish settlers who arrived in the Midwest in the late 19th century.
    The community emphasized hard work, self‑reliance, and mutual aid, values reinforced by his involvement in the local Methodist church and the 4‑H club during his youth. Midwestern customs—such as attending
    county fairs, supporting high school football, and seasonal outdoor activities—are woven into his identity. This cultural backdrop encourages a pragmatic, community‑oriented outlook that aligns with
    his dependable work ethic and his desire to give back through hands‑on volunteerism.
attributes:
  skills: '[''Residential framing'', ''Finish carpentry'', ''Cabinet making'', ''Blueprint reading'', ''Material estimation'', ''Project scheduling'', ''OSHA safety compliance'', ''Tool maintenance'', ''Team
