  hobbies: '[''Adult basketball league'', ''Hiking in Oak Openings Preserve'', ''Volunteer construction with Habitat for Humanity'', ''Woodworking hobby projects'', ''Classic rock concerts'', ''Vintage
    motorcycle restoration'', ''Journaling'', ''Mindfulness meditation'']'
  career_goals: William aims to become a certified Journeyman Carpenter within the next two years and eventually a Master Carpenter. He plans to obtain the Ohio State Apprenticeship License, followed by
    a construction management certificate. His long‑term ambition is to open a boutique remodeling business that specializes in affordable, energy‑efficient homes for first‑time buyers in the Ottawa County
    region. He also hopes to incorporate a community outreach component, offering free workshops and volunteer build days for local non‑profits such as Habitat for Humanity. Maintaining a stable, predictable
    work schedule that allows him to support his family and continue his community involvement is a core part of his career vision.
