personas:
  professional: Kimberly Merritt, a budding junior engineer at heart, spends afternoons meticulously arranging LEGO bricks into functional machines, balancing a vivid curiosity about how things work with
    a practical need for order, while they subtly withdraw from noisy playgroups to focus on solitary construction projects.
  sports: Kimberly Merritt participates in a toddler gymnastics class at the community recreation center, enjoys splash-in-the-pool time with the local Junior Dolphins swim club, and quietly cheers for
    the nearby professional baseball team, the Seattle Mariners, during family outings, though they prefer to watch from the sidelines.
  arts: Kimberly Merritt delights in finger-painting bright scenes reminiscent of Eric Carle's illustrations, sings along to Raffi's children's songs during playtime, and attends weekly storytime at the
    neighborhood library where they eagerly listen to Dr. Seuss tales.
  travel: Kimberly Merritt adores family road trips to the San Diego Zoo, short stays at the Magic Kingdom in Orlando, and occasional weekend visits to the local aquarium, preferring meticulously planned
    itineraries that include plenty of quiet spots for rest, though they sometimes feel overwhelmed by crowded galleries.
  culinary: Kimberly Merritt favors creamy macaroni and cheese, crispy chicken nuggets, and banana-strawberry smoothies, can confidently stir batter for their weekend banana pancakes, and shows a particular
    fondness for the sharp taste of cheddar cheese sprinkled over their meals.
  core: Kimberly Merritt is a quiet, worry-prone four-year-old who builds solitary LEGO inventions, saves coins in a pink piggy-bank, battles mild eczema, loves toddler gymnastics, adores Eric Carle's picture
    books, cherishes family trips to the zoo, and prefers straightforward meals like mac and cheese, while they frequently worry about whether they've done enough.
background:
  cultural: Kimberly was born into a white, middle‑class family that has lived in Atlanta, Georgia, for several generations. Her family embraces a blend of Southern traditions—such as weekend visits to
    the local farmer’s market, sharing homemade biscuits with honey, and attending community events like the Atlanta Dogwood Festival—while also participating in mainstream holidays like Thanksgiving and
    Christmas, where she enjoys storytime and family meals. She attends a neighborhood preschool that emphasizes inclusive play and occasional field trips to the Atlanta BeltLine and the city's public libraries,
    exposing her to a culturally diverse environment. The family values early education, music lessons, and quiet reading time at home, fostering Kimberly's love for calm, orderly spaces.
