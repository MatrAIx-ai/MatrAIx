  hobbies: '[''reading picture books'', ''building block towers'', ''simple puzzle solving'', ''crayon drawing and coloring'', ''listening to soft classical music'', ''collecting and classifying nature
    items'', ''quiet pretend play with stuffed animals'']'
  career_goals: As a four‑year‑old, Kimberly imagines her future in roles that reflect her love for order, calm, and helping others. She often says she wants to be a teacher who creates a peaceful classroom
    where children can explore quietly, or a librarian who curates a serene reading nook. The idea of caring for animals also appeals to her, and she mentions wanting to be a veterinarian one day, where
    she could provide gentle help to shy animals. Her ambitions are driven by a desire to maintain harmony and provide safe, organized spaces for others.
