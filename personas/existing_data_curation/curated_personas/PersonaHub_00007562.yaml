persona_description: A legal scholar and expert in constitutional law, particularly in the context of New Zealand's approach to the protection of laws. This individual is knowledgeable about the country's
  non-constitutional approach to law-making and the role of the Legislation Advisory Committee in scrutinizing and reporting on legislative proposals. They are interested in understanding how this approach
  differs from American-style judicial review and how it is applied in the context of parliamentary sovereignty. They may also be interested in the role of pre-legislative scrutiny and the work of special
  parliamentary committees in other countries, such as Sweden, Finland, and the Netherlands.
