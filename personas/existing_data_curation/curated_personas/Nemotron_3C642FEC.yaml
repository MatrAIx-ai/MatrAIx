  career_goals: Bruce aims to complete his associate degree in Business Administration and earn a Project Management Professional (PMP) certification within the next two years. He envisions a career as
    an operations or logistics manager in a manufacturing firm in the Birmingham area, where he can apply his structured approach to improve efficiency while contributing to the local economy. Long‑term,
    he hopes to lead a department that balances productivity with community outreach initiatives.
