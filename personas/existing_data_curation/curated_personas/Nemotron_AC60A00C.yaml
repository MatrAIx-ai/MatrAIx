  hobbies: '[''Watercolor painting'', ''Reading historical novels and art books'', ''Cooking traditional Honduran dishes'', ''Gardening (herbs and vegetables)'', ''Listening to classical and Latin American
    music'', ''Walking in local parks'', ''Participating in storytelling circles'', ''Volunteer tutoring at the community center'', ''Attending small art workshops'']'
  career_goals: Although retired, Christina aims to formalize her role as a cultural ambassador for the Honduran community in Trenton. She plans to curate a small traveling exhibit of folk art and photographs
    that showcase the immigrant experience, and to compile an oral‑history book featuring stories of senior residents. She also hopes to mentor a youth arts program in partnership with the local community
    center, fostering creativity and cross‑cultural understanding. Ultimately, Christina wishes to ensure that the traditions she cherishes are preserved for future generations while continuing to support
    seniors through volunteer coordination and companionship.
