  career_goals: Jordan aims to advance within the logistics field by moving into a supervisory or dispatch role, such as a route manager or driver trainer, where he can leverage his organizational strengths
    and supportive nature. He plans to obtain a commercial driver’s license (CDL) endorsement and pursue an associate degree in supply chain management at a nearby community college to broaden his technical
