  hobbies: '[''Abstract Painting'', ''Pottery and Ceramics'', ''Creative Writing (Poetry)'', ''Reading Contemporary Fiction'', ''Nature Photography'', ''Gardening (Herb and Sensory Gardens)'', ''Yoga and
    Mindfulness'', ''Board Games (Strategic)'', ''Music (Piano)'', ''Community Arts Volunteering'']'
  career_goals: Olivia aims to transition from classroom teaching to a leadership role within her district, such as a preschool curriculum specialist or director of early childhood programs. She plans to
    pursue a Master’s degree in Early Childhood Education to deepen her expertise in policy and program evaluation. Long‑term, she envisions launching a community‑based early‑learning center that emphasizes
    arts‑rich pedagogy and offers professional development workshops for teachers across Wisconsin. Additionally, she hopes to author a guidebook on incorporating abstract visual art concepts into preschool
    curricula.
