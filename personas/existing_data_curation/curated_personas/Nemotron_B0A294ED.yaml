personas:
  professional: Benita Mennear, an aspiring interactive storyteller, channels boundless imagination into building digital animations with Scratch and crafting intricate LEGO realms, showcasing early coding
    skills, spatial design talent, and a relaxed, flexible approach that lets creativity flow without rigid schedules.
  sports: Benita Mennear enjoys after‑school swimming at the community pool and plays forward on the River Valley Runners U11 soccer team, cheers for the Toronto Raptors and the Los Angeles Lakers on game
    nights, and prefers inventing backyard obstacle courses over structured drills, reflecting a love of active play that blends imagination with sport.
  arts: Benita Mennear devotes evenings to sketching dragons inspired by the illustrations of Jim Henson’s Dark Crystal, loses themselves in J.K. Rowling’s Harry Potter novels, draws creative influence
    from Hayao Miyazaki’s animated films, and practices origami birds while listening to Yiruma’s piano pieces, letting these artistic sources shape a vivid inner world.
  travel: Benita Mennear cherishes spontaneous weekend hikes to the nearby river gorge where they collect rocks and feathers, dreams of wandering the ancient streets of Kyoto and scaling the heights of
    Machu Picchu, and meticulously maps imagined journeys in a notebook, balancing family‑guided trips with boundless day‑dream travel.
  culinary: Benita Mennear loves crafting whimsical snacks like unicorn toast topped with cream cheese, rainbow sprinkles, and sliced strawberries, routinely bakes chocolate chip cookies with a pinch of
    cinnamon, favors pizza with extra cheese and pepperoni, and occasionally experiments with dragon‑fruit smoothies for a burst of exotic flavor.
  core: Benita Mennear is a ten‑year‑old dreamer who fills notebooks with dragon sketches, trades allowance for LEGO bricks, and habitually forgets to tidy their workspace, living in a world where imagination
    outpaces organization.
background:
  cultural: Benita is a white American girl raised in the small, rural community of Hays, Montana, where agriculture, ranching, and outdoor life shape daily rhythms. The local culture values self-reliance,
    close ties to nature, and community cooperation through events like county fairs and 4-H clubs. While her family’s heritage stems from European settlers, the region’s proximity to the Fort Belknap Indian
    Reservation brings a respectful awareness of Indigenous history and traditions, which she encounters in school and community celebrations. This blend of Midwestern modesty, appreciation for the open
    landscape, and a relaxed pace aligns with Benita’s preference for flexibility, solitary creativity, and small-group interactions.
