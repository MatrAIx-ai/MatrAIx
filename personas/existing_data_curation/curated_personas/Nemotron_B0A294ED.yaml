  career_goals: Benita dreams of becoming a creator who can blend art and imagination. She envisions writing and illustrating her own fantasy books or comic series and hopes one day to design interactive
    stories or games that inspire other children. She also imagines exploring the natural world as a wildlife illustrator or environmental storyteller, using her drawings to raise awareness about local
    ecosystems. While still young, she is motivated to develop her creative and technical skills so she can turn her imaginative ideas into projects that reach a wider audience.
