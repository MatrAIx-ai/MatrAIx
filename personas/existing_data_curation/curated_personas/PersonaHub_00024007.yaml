  in the study of beaked whales, specifically the Porcupine Basin and eastern Rockall Basin, and have made significant contributions to the field by recording numerous sightings of these species. Additionally,
  they have conducted aerial surveys in the Atlantic Margin, which has provided valuable insights into the distribution and abundance of seabirds in the area.
