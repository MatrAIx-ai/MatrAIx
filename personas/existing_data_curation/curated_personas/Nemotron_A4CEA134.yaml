  career_goals: In the next five years, Selena aims to transition from day‑to‑day financial management to a strategic advisory role, leveraging her curiosity for emerging fintech solutions while maintaining
    practical financial stewardship. She aspires to mentor junior finance professionals, champion sustainable investment practices within her organization, and lead a regional finance transformation project
    that automates reporting through advanced analytics. Long‑term, she envisions stepping into a CFO or senior financial director position, or launching a boutique consultancy focused on financial sustainability
    for local nonprofits, all while preserving a balanced work‑life schedule that allows for personal pursuits.
