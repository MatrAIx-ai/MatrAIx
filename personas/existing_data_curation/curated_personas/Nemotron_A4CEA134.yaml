personas:
  professional: Selena Hinton, a senior finance manager who leverages SAP analytics and Lean Six Sigma to streamline corporate budgeting, blends her curiosity for emerging fintech with a pragmatic focus
    on ESG‑driven investment, while her spontaneous, flexible style occasionally challenges strict deadlines but fuels innovative problem‑solving.
  sports: Selena Hinton enjoys low‑impact hiking along the Fort Wayne river trails each spring, participates in a community walking club affiliated with the local YMCA, and follows the Indiana Pacers, Indianapolis
    Colts, and Purdue Boilermakers, cheering them on while occasionally joining a weekend recreational softball league.
  arts: Selena Hinton paints tranquil watercolors of Indiana landscapes inspired by the brushwork of Winslow Homer, frequents folk music concerts featuring artists like Joan Baez and the local group Hoosier
    Roots, and immerses themselves in historical fiction by Hilary Mantel and biographies of Eleanor Roosevelt, allowing these artistic pursuits to color both their evenings and professional creativity.
  travel: Selena Hinton favors spontaneous weekend getaways to charming Midwestern towns such as Madison, Indiana and Nashville, Tennessee, often planning trips on a whim using a mix of last‑minute Airbnb
    finds and modest road‑trip budgets, balancing a desire for adventure with the practical limits of a busy finance schedule.
  culinary: Selena Hinton, an avid home chef, enjoys experimenting with global flavors, mastering dishes like Thai green curry with fresh lemongrass, Spanish paella featuring saffron and mussels, and classic
    Southern biscuits, while they relish sourcing heirloom tomatoes and locally grown herbs from their own garden.
  core: Selena Hinton is a pragmatic yet curious finance leader who blends spontaneous creativity in gardening, art, and cooking with a steadfast commitment to sustainable investing and community mentorship.
background:
  cultural: Selena was raised in a middle‑class, German‑American family in the suburbs of Fort Wayne, Indiana. Her upbringing emphasized Midwestern values of hard work, modesty, community involvement, and
    self‑reliance. Active in her local Protestant church, she participated in community service from a young age and developed a strong sense of responsibility toward family and neighbors. The cultural
    environment of small‑town Indiana, with its emphasis on practicality and friendliness, shaped her pragmatic outlook while her exposure to regional festivals and college courses nurtured a curiosity
    for new ideas.
