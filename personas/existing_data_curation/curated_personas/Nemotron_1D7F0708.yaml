  career_goals: Janelle aims to deepen her involvement with the Owasso senior community by taking on a leadership role in organizing events and outreach programs. She plans to launch a pocket-garden initiative
    that supplies fresh produce to local food banks and senior homes, and to compile a memoir that records her life lessons and family history for future generations. Maintaining her health through daily
    walks, low-impact exercise, and regular medical check-ups is also a top priority, as is taking short trips to historic sites across Oklahoma and neighboring states to stay engaged with regional history.
