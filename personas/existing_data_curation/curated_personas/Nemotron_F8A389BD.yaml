  hobbies: '[''Beachcombing and marine observation'', ''LEGO robotics building and coding'', ''Reading mystery and adventure books'', ''Soccer'', ''Cooking Mexican family recipes'', ''Digital drawing and
    graphic design'', ''Listening to regional Mexican music'', ''Participating in community festivals and cultural celebrations'']'
  career_goals: Clara dreams of turning her love for the Gulf Coast and science into a future as a marine biologist, hoping to study and protect local marine ecosystems. She is motivated to win school science
    fairs and hopes to join a summer marine biology camp to gain real‑world experience. At the same time, she is fascinated by technology and imagines creating educational apps that blend coding with environmental
    education. In the short term, she aims to lead a team in her school's robotics competition, earn a spot in a regional STEM enrichment program, and eventually attend a high‑school with a strong focus
    on marine and environmental sciences.
