personas:
  professional: Clara Lopez is a budding robotics hobbyist who merges her love of marine life with LEGO-based programming projects, crafting seaworthy robot models that satisfy her curiosity while grounding
    her ideas in step-by-step practicality.
  sports: Clara Lopez plays forward on a co-ed youth soccer league, training after school and cheering for the nearby professional team the Dallas FC, while also joining beach volleyball games in summer,
    preferring competitive play over casual pick-up matches.
  arts: Clara Lopez creates digital comic sketches inspired by mystery adventures like Rick Riordan's Percy Jackson series, while listening to the corridos of Los Tigres del Norte and the guitar-driven
    pop of Los Lonely Boys, letting the blend of narrative and music fuel her storytelling.
  travel: Clara Lopez dreams of mapping the Gulf Coast's hidden coves, has already camped on Galveston's shores, and hopes to visit the sea-turtle nesting beaches of Costa Rica next summer, planning trips
    that mix spontaneous day-trips with family-organized vacations within their limited allowance.
  culinary: Clara Lopez delights in hand-rolling tamales with masa, pork filling, and red-chile sauce alongside their mother, proudly scoops fresh avocado for guacamole, and experiments with homemade salsa
    verde using tomatillos, cilantro, and jalapeños, though they often leave the kitchen a bit messy afterward.
  core: Clara Lopez is a curious, competitive 12-year-old who fuses seaside exploration, LEGO robotics, and family cooking into a vibrant quest for discovery, even if spontaneity sometimes leaves chores
    unfinished.
background:
  cultural: Clara grows up in a Mexican‑American household in Corpus Christi, where bilingualism and family traditions shape her daily life. Spanish is spoken at home alongside English at school, giving
    her a fluid "Spanglish" communication style. Her family celebrates Mexican holidays such as Día de los Muertos and Las Posadas, often preparing traditional foods like tamales, pozole, and pan dulce.
    Catholic customs, including attending Mass during important feasts, are part of her upbringing. The coastal Texas environment adds a love for seafood, beach outings, and a respect for the Gulf's natural
    resources, which dovetails with her interest in marine biology. Community ties are strong; she participates in local festivals, school cultural events, and neighborhood gatherings that highlight both
    her Mexican heritage and the broader Texan community.
attributes:
  skills: '[''Bilingual (Spanish/English)'', ''Basic coding (Scratch, introductory Python)'', ''Hands‑on problem solving and improvisation'', ''LEGO robotics construction and programming'', ''Cooking simple
