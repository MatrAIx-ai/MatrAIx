  career_goals: She aspires to turn her artistic talent into a career that heals and empowers others. Chansamone plans to enroll in a bachelor's program in Art Therapy or Community Arts Management, eventually
    obtaining certification as an art therapist. Her long-term ambition is to lead a community art center in Southern California that offers free art-therapy workshops for at-risk youth and seniors. In
    the short term, she aims to secure a part-time role as a program assistant for a local nonprofit, build a portfolio of socially engaged art projects, and launch a modest online shop selling original
    prints that fund her further education.
