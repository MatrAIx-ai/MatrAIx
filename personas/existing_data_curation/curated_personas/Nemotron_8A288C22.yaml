  hobbies: '[''book club'', ''bridge'', ''chess'', ''historical society volunteering'', ''gardening'', ''knitting'', ''baking'', ''coastal walking'', ''genealogy research'', ''crossword puzzles'']'
  career_goals: Although retired from formal employment, Frances aims to deepen her involvement in the Beverly community by serving on the board of the local senior center and by leading a weekly historical
    storytelling series for younger residents. She hopes to complete a short certificate in public history at the community college, publish a collection of personal memoirs that reflect her life in mid‑century
    New England, and mentor new volunteers so that her organizational know‑how endures. Maintaining her health and independence is also a core ambition, so she plans to incorporate daily walks along the
    coastline and regular wellness check‑ups into her routine.
