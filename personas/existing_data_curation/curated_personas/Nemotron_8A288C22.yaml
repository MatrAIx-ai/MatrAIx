personas:
  professional: Frances Theriot, a seventy‑nine‑year‑old retired community organizer in Beverly, MA, channels her methodical budgeting, event‑planning expertise, and warm interpersonal style into leading
    senior‑center board initiatives, orchestrating historic storytelling tours, and mentoring new volunteers with a steadfast commitment to clear schedules and reliable follow‑through.
  sports: Frances Theriot stays fit by walking the Beverly beachfront promenade each morning, joins a senior water‑aerobics class at the community center for low‑impact cardio, and faithfully roots for
    the Boston Red Sox and New England Patriots, never missing a televised home game on Thursday evenings.
  arts: Frances Theriot nurtures her creative soul through knitting intricate blankets while humming Ella Fitzgerald’s "Summertime," regularly attending the Beverly community theater’s productions of classic
    plays like "Our Town" starring local actors, and devoting her book‑club evenings to discussions of Jane Austen’s novels and historical biographies, often quoting lines from Shakespeare in casual conversation.
  travel: Frances Theriot prefers well‑planned, low‑stress itineraries, cherishing weekend getaways to nearby Block Island and a summer retreat in Bar Harbor, Maine, while dreaming of a thoughtfully organized
    pilgrimage to the historic coastal towns of the Mediterranean where her ancestors once lived, all arranged with meticulous advance reservations and travel insurance to keep her worries at bay.
  culinary: Frances Theriot is an accomplished home cook who perfects New England clam chowder with fresh clams, potatoes, and thyme, bakes a hearty baked cod seasoned with garlic, lemon, and parsley, rolls
    up batches of homemade sourdough bread for charity potlucks, and delights in seasonal pies—especially blueberry crumble—while skillfully juggling her garden’s harvest, yet she often over‑snacks on extra
    biscuits while solving crossword puzzles.
  core: Frances Theriot blends meticulous organization, a love for local history, and a community‑focused heart with a chronic tendency to over‑worry, leading her to schedule every minute of her day while
    occasionally getting lost in endless knitting projects and crossword puzzles.
background:
  cultural: Frances grew up in post‑war suburban Boston and identifies strongly with the New England work ethic and community spirit. Her family background is a blend of Irish and Italian immigrant roots,
    reflected in the Catholic traditions she was raised with and the emphasis on family gatherings centered around food. She has lived her entire adult life in Beverly, MA, immersing herself in the town’s
    maritime heritage and supporting local customs such as Fourth‑of‑July parades, town clean‑ups, and seasonal farmers’ markets. This cultural milieu shapes her values of reliability, modesty, and civic
    responsibility while also informing her culinary tastes and love of regional history.
