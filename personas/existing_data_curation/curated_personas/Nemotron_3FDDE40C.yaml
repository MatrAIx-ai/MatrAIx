  career_goals: She aims to advance to a senior office manager or director of administrative services within a regional government agency or healthcare institution in the Hampton area. To support this,
    Crystal plans to obtain the Certified Administrative Professional (CAP) credential and a project management certificate. Her ambition is to lead a team that drives strategic process improvements, reduces
    operational costs, and shapes administrative policies. She also hopes to mentor emerging administrative talent and eventually serve as a recognized authority on office efficiency and compliance.
