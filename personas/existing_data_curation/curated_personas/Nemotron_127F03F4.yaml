  career_goals: Amanda aspires to attend a university with a strong visual-arts or design program, where she can develop a professional portfolio and refine her technical skills. She hopes to become a graphic
    designer or multimedia artist who creates socially conscious campaigns that celebrate her community’s culture and address local issues. Long-term, she envisions leading community-based art projects
    or teaching art workshops, combining her disciplined work ethic with her passion for collaboration and cultural expression.
