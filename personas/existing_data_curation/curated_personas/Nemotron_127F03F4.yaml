personas:
  professional: Amanda Breazeale, a fifteen-year-old aspiring technologist-artist, merges their robotics club experience and digital illustration skills to prototype interactive art installations, applying
    disciplined project management and a curiosity for unconventional ideas while maintaining high standards and collaborative spirit.
  sports: Amanda Breazeale, an avid fan of the Cleveland Browns and Guardians and a regular participant in the school's cross-country team, adheres to a disciplined twice-weekly jogging schedule in the
    city's parks, supplements cardio with weekend bike rides along the Cuyahoga River, but they occasionally skip workouts when robotics competitions demand extra prep time.
  arts: Amanda Breazeale, a dedicated explorer of Cleveland's mural scene and a sketch-enthusiast, draws inspiration from street artists like Shepard Fairey, admires painter Georgia O'Keeffe, listens to
    classic soul legend Aretha Franklin, jazz icon Miles Davis, and contemporary hip-hop visionary Kendrick Lamar, and they curate playlists that echo their interdisciplinary creative drive.
  travel: Amanda Breazeale, who meticulously plans trips using a spreadsheet, enjoys local excursions to Cuyahoga Valley National Park and day trips to Detroit's art museums, dreams of a solo backpacking
    adventure through Kyoto's historic districts, while they balance family budget constraints that limit overseas flights to occasional school-organized exchanges.
  culinary: Amanda Breazeale, a proficient home-chef who favors Mediterranean and Asian flavors, often whips up falafel wraps, shrimp ramen, and avocado toast with fresh basil, enjoys experimenting with
    spices while they track calorie intake for optimal focus, yet they admit to late-night indulgence in gummy candy during exam weeks.
  core: Amanda Breazeale, a disciplined teen who blends tech precision with artistic curiosity, meticulously schedules every project, yet they secretly hoard sugary snacks for late-night coding marathons.
background:
  cultural: Amanda is an African-American teenager raised in Cleveland’s historically Black neighborhoods. Her family’s roots trace back to the Great Migration, and traditions such as church gatherings,
    soul-food meals, and celebrations of Juneteenth and Black History Month are central to her upbringing. The vibrant local Black arts scene—street murals, spoken-word poetry, and jazz clubs—has shaped
    her appreciation for creative expression and community activism. Her parents emphasize education, resilience, and giving back, which fuels her collaborative spirit and desire to use art for social impact.
