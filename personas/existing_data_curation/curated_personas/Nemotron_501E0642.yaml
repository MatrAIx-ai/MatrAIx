personas:
  professional: Angelos Keown is a veteran retail associate in Tulsa who leverages two decades of hands‑on experience in electronics and home goods, strong customer rapport, and a knack for visual merchandising
    to mentor staff and pilot smart‑home tech pilots, while their practical curiosity and organized yet flexible mindset prepares them for a forthcoming shift‑lead role.
  sports: Angelos Keown enjoys low‑impact fitness through early‑morning jogs along the Arkansas River, weekend fishing trips with the local Tulsa Anglers Club, and cheering on the Oklahoma City Thunder,
    Tulsa Drillers, and Oklahoma Sooners, while they occasionally join a casual pick‑up basketball game at the community center to stay active.
  arts: Angelos Keown finds creative release on the acoustic guitar, crafting folk‑style ballads inspired by Bob Dylan, Johnny Cash, and The Milk Carton Kids, and they regularly attend Tulsa Symphony concerts
    and explore regional art exhibitions featuring Grant Wood‑style landscapes, which together shape their appreciation for storytelling through music and visual art.
  travel: Angelos Keown plans trips with a blend of careful budgeting and a love for open‑road discovery, having road‑tripped to Yellowstone, explored Santa Fe’s historic plaza, and taken a weekend getaway
    to the Ozark Mountains, while dreaming of a future visit to Scotland to trace the origins of the global oil industry, all with a preference for relaxed itineraries that accommodate their wife’s pace.
  culinary: Angelos Keown enjoys modest home‑cooking, frequently preparing garden‑fresh roasted vegetables, hearty Oklahoma‑style chicken fried steak with homemade gravy, and fresh fish tacos using catches
    from the river, seasoning dishes with cilantro, lime, and smoky chipotle, while their skill level sits comfortably between confident sautéing and occasional experimental spice blends.
  core: Angelos Keown blends quiet curiosity with pragmatic organization, turning weekend fishing and guitar riffs into gentle escapes, yet habitually procrastinates on paperwork for their degree while
    secretly hoarding smart‑home gadgets for future trials.
background:
  cultural: 'Angelos is a white American whose family roots combine Greek ancestry on his father''s side and Irish heritage on his mother''s side, both of which have been part of Oklahoma life for several
    generations. Raised in Tulsa, he grew up with Midwestern values of modesty, reliability, and community involvement. Family traditions blend Mediterranean flavors—occasional Greek dishes and celebrations—with
    the region’s love for local fairs, high school football, and outdoor recreation. He attended a Methodist church, which reinforced a sense of fellowship and service. His cultural outlook is shaped by
    the blend of these heritages: a respect for family and tradition, an appreciation for Tulsa’s diverse history, and an openness to new ideas while honoring established customs.'
