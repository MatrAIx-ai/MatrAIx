  career_goals: Looking ahead, Angelos aims to step into a supervisory role within the next two years, targeting a shift‑lead or assistant manager position that will allow him to shape store strategy and
    staff development. He plans to complete an associate’s degree in Business Administration and obtain a retail management certification, reinforcing his practical experience with formal credentials. In
    the longer term, he envisions becoming a store manager or regional manager, where he can integrate new technology initiatives—such as omnichannel sales and data‑driven inventory optimization—while ensuring
    a stable, family‑friendly work schedule. Ultimately, he dreams of leveraging his retail expertise to open a small, community‑focused boutique that blends his love for quality home goods with personalized
    customer service.
