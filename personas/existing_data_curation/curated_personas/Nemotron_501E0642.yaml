  hobbies: '[''Reading (Historical Non-Fiction)'', ''Fishing'', ''Gardening'', ''Acoustic Guitar Playing'', ''Woodworking'', ''Model Kit Building'', ''Walking/Hiking'', ''Volunteer Work at Local Food Bank'',
