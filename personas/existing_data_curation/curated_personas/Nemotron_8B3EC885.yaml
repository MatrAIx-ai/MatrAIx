personas:
  professional: Mary Riccio is a first‑line retail supervisor who applies methodical scheduling, visual‑merchandising expertise, and compassionate team leadership to keep store operations smooth and consistently
    exceed sales targets.
  sports: Mary Riccio competes in beach volleyball with the South Bay Spikers, attends weekly Zumba classes, hikes Santa Monica trails each weekend, and avidly supports the Los Angeles Lakers and Dodgers,
    structuring fitness around group activities and team spirit.
  arts: Mary Riccio frequents local music festivals featuring Haim and The Lumineers, devours contemporary novels by Sally Rooney and Ocean Vuong, and curates an indie‑folk vinyl collection, letting artistic
    experiences fuel their DIY home projects.
  travel: Mary Riccio prefers meticulously planned road trips along the Pacific Coast Highway and weekend escapes to the Grand Canyon, while dreaming of Kyoto’s temples, using Airbnb and travel forums to
    maximize experiences without overspending.
  culinary: Mary Riccio bakes family‑recipe chocolate chip cookies, cooks homemade marinara pasta, and experiments with Korean bibimbap using gochujang and fresh basil, demonstrating an intermediate skill
    set that blends comfort food with adventurous flavors.
  core: Mary Riccio is a methodical, sociable go‑getter who channels routine into retail leadership, community volunteering, and a relentless quest for the perfect beach‑volleyball serve—though they can’t
    resist a midnight slice of pizza.
background:
  cultural: Mary was raised in a middle‑class Italian‑American family in Long Beach, California. Her family emphasized traditional values, regular Sunday meals, and a strong sense of community, which shaped
    her practical and routine‑oriented mindset. Growing up in the diverse cultural landscape of Southern California, she also absorbed broader American customs and enjoys the multicultural events the region
    offers. Her heritage influences her love for cooking classic Italian dishes and participating in community celebrations.
