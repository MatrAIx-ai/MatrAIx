  career_goals: Mary aims to advance to a store manager position within the next two years, focusing on improving sales performance and employee engagement. She aspires to become a district manager, overseeing
    multiple locations, and eventually transition into a corporate retail training or operations role where she can design programs that promote teamwork and operational excellence. She also plans to pursue
    a part-time MBA in retail management to broaden her strategic expertise.
