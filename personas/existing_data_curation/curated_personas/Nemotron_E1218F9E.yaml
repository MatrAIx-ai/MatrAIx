  hobbies: '[''Hiking in New Mexico desert trails'', ''Fishing in Pecos River'', ''Cooking traditional Mexican dishes'', ''Playing acoustic guitar'', ''Listening to classic rock and regional Mexican music'',
    ''Watching NFL games'', ''Tinkering with car repairs'', ''Exploring new cooking gadgets and techniques'', ''Attending local festivals'', ''Reading about food entrepreneurship'']'
  career_goals: Erick aspires to move beyond his current role into supervisory positions. In the next two years he aims to become a shift manager, earning a food‑service manager certification and a ServSafe
    certification to bolster his credentials. Long‑term, he dreams of opening a small Mexican‑inspired food truck or a casual eat‑ery that blends traditional family recipes with innovative twists, allowing
    him to channel his curiosity for new culinary ideas while maintaining the practicality of a sustainable business model.
