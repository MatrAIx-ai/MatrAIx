  hobbies: '[''Model train building'', ''Metal sculpting'', ''Woodworking'', ''Cooking Mexican cuisine'', ''Reading (technical and art history)'', ''Photography'', ''Visiting museums'', ''Listening to Mexican
    folk music'', ''Gardening'']'
  career_goals: Heber aims to formalize his CNC expertise by earning an advanced certification (such as NIMS Level III) and transition into a lead technician or shop supervisor role where he can shape production
    processes and mentor younger workers. Parallel to his professional growth, he dreams of launching a modest side business creating custom metal art pieces inspired by Mexican folk motifs, providing an
    additional income stream for his family's future and facilitating a smooth, financially secure retirement.
