personas:
  professional: A seasoned machinist, Heber Colon leverages three decades of CNC and manual machining expertise—programming mills, interpreting complex blueprints, and meticulous precision measurement—while
    channeling their curiosity and solitary focus into crafting bespoke metal art alongside supervising a shop floor.
  sports: A low‑key fitness enthusiast, Heber Colon follows the New York Knicks and Mets passionately, fits quick cardio bursts by sprinting the stairs at the Barracks in Queens during break times, participates
    in the Queens Marathon Training Club on weekends for solitary long runs, and they keep a simple home‑gym routine with free weights to counteract the physical strain from machining.
  arts: A hands‑on creator with a keen eye for detail, Heber Colon spends evenings at the Museum of Modern Art admiring works by Anish Kapoor and Frida Kahlo, draws inspiration from folk‑art motifs while
    crafting metal sculptures, and they capture the gritty textures of Queens’ streets through black‑and‑white photography reminiscent of Diane Arbus.
  travel: An organized wanderer, Heber Colon meticulously plans road trips that blend scenic metalwork fairs in the Pacific Northwest with cultural immersion in Oaxaca during Día de los Muertos, prefers
    off‑peak flights to European art capitals like Florence and Granada, and they keep a travel journal of Queens alleyway photography to later compare with distant streetscapes.
  culinary: A culinary experimenter, Heber Colon skillfully prepares traditional mole poblano with roasted ancho chilies, chocolate, and sesame seeds alongside homemade masa for tamales, regularly seasons
    their workshop with the scent of simmering cumin, and they love pairing dishes with freshly squeezed lime and a splash of mezcal for aromatic depth.
  core: Heber Colon, a 53‑year‑old machinist‑artist, balances methodical metalwork with solitary creative bursts, hoarding morning coffee and late‑night steel scraps, while secretly fearing the chatter
    of large gatherings.
background:
  cultural: Heber was raised in a close‑knit Mexican‑American family that values bilingual communication, Catholic traditions, and strong intergenerational ties. Celebrations such as Día de los Muertos
    and Mexican Independence Day are central to his household, and he carries these customs into his daily life through food, music, and occasional participation in community festivals. Living in Ridgewood,
    Queens, he navigates a multicultural neighborhood that enriches his perspective, while his Mexican heritage remains a guiding influence on his culinary tastes, artistic expressions, and sense of identity.
attributes:
  skills: '[''CNC programming'', ''Manual milling'', ''Lathe operation'', ''Blueprint interpretation'', ''Precision measurement'', ''Machine maintenance'', ''Troubleshooting'', ''Quality control'', ''Industrial
