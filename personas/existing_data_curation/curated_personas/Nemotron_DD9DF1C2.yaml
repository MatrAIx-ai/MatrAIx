personas:
  professional: Dominic Collins is a methodical sales associate at a bustling department store in Smyrna, GA, who leverages strong customer‑service instincts and data‑driven inventory management to consistently
    hit targets while pursuing retail‑management certifications and digital‑marketing courses to prepare for an Assistant Store Manager role within two years.
  sports: Dominic Collins is an avid basketball player for the local community center league and a regular trail runner around Kennesaw Mountain, cheering on the Atlanta Hawks and Atlanta Falcons, and stays
    fit by mixing cardio runs with strength‑training sessions at a nearby gym.
  arts: Dominic Collins is a frequent visitor to local art festivals and street‑art murals, immerses themselves in hip‑hop and R&B playlists featuring Kendrick Lamar and H.E.R., and finds inspiration in
    gospel performances by Kirk Franklin, which together fuel their creative outlook and community engagement.
  travel: Dominic Collins is a budget‑conscious traveler who plans weekend getaways to Atlanta’s food scene, road‑trips to Asheville for mountain hikes, and dreams of exploring New Orleans for jazz and
    Miami for beaches, balancing a structured itinerary with spontaneous discoveries.
  culinary: Dominic Collins is a competent home cook who blends Southern comfort dishes like fried chicken with mango salsa and collard greens spiced with allspice, often incorporating coconut milk and
    Scotch bonnet pepper to give their meals a subtle island‑inspired twist, and enjoys experimenting with plantains and sweet‑potato mash on Sundays.
  core: Dominic Collins is a pragmatic dreamer who channels curiosity into career advancement, manages stress with meditation, balances disciplined budgeting with occasional sneaker splurges, and lives
    for basketball, music, and cooking experiments that fuse comfort with spice.
background:
  cultural: Dominic identifies as African-American and was raised in the greater Atlanta metropolitan area, where Southern traditions intersect with vibrant Black cultural expression. His family celebrates
    church gatherings, gospel music, and community cookouts, which instilled a strong sense of solidarity and respect for collective well-being. Growing up in Cobb County, he experienced the blend of urban
    and suburban life, giving him insight into both the historic civil-rights legacy of the South and contemporary Black entrepreneurship. These influences shape his values of perseverance, community service,
    and an appreciation for both heritage and modern innovation.
attributes:
  skills: '[''Customer Service'', ''Sales Negotiation'', ''Inventory Management'', ''POS System Operation'', ''Merchandising'', ''Data Analysis (basic)'', ''Scheduling'', ''Conflict Resolution'', ''Product
    Knowledge'', ''Time Management'']'
  hobbies: '[''Basketball'', ''Running'', ''Listening to Hip‑Hop and R&B'', ''Cooking Southern and Caribbean dishes'', ''Reading personal development books'', ''Playing video games'', ''Mindfulness meditation'',
    ''Attending local community events'']'
  career_goals: Dominic aims to transition from front-line sales to a supervisory role within the next two years, targeting a position as an Assistant Store Manager. He plans to supplement his on-the-job
    experience with retail-management certifications and short courses in digital marketing, which align with his curiosity about new ideas. In the longer term, he envisions becoming a Store Manager and
    eventually overseeing multiple locations as a District Manager. He is also interested in launching his own boutique that blends contemporary streetwear with Southern-inspired designs, leveraging his
    deep product knowledge and community connections.
