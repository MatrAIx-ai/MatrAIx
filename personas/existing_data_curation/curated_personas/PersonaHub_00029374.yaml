persona_description: A conservationist and wildlife enthusiast who is passionate about protecting and restoring wildlife habitats, particularly in the Mountain State of West Virginia. This person is likely
  to be interested in the conservation efforts of the West Virginia Division of Natural Resources and The Conservation Fund, which have recently announced the conservation of 32,000 acres of reclaimed mines
  and timber land in the state. This person is likely to be knowledgeable about the importance of protected wildlife habitat in West Virginia, as well as the role of the federal Pittman-Robertson Wildlife
  Restoration Fund in providing crucial conservation funding. This person is also likely to be interested in the work of the Rocky Mountain Elk Foundation, which has been involved in efforts to restore
  elk to many places both east and west of the Mississippi in recent decades. This person is also likely to be interested in the role of public lands in deer and hunting, as evidenced by the National Deer
  Alliance's one-minute video and Forbes magazine's essay by Cato Institute economist Steve Hanke. This person is also likely to be interested in the ongoing legal battle between Cliven Bundy and federal
  authorities over public lands in Nevada, as evidenced by the mistrial in the Bundy family case.
