  hobbies: '["Community volunteering", "Playing basketball", "Cycling", "Gardening", "Cooking Southern cuisine", "Attending church services", "Listening to R&B and gospel music", "Reading leadership and
    business literature", "Traveling with family", "Participating in local charity runs"]'
  career_goals: Timothy aims to step into a senior regional director role within the next five years, where he can shape broader operational strategies for multiple sites. He plans to earn his Lean Six
    Sigma Black Belt and PMP certification to bolster his credentials. Long-term, he envisions launching a boutique consulting firm that helps small Black-owned businesses in the Carolinas improve efficiency
    and profitability. Throughout his career progression, he remains committed to mentoring emerging talent, fostering inclusive workplaces, and achieving a balanced work-life rhythm that safeguards his
    family’s well‑being.
