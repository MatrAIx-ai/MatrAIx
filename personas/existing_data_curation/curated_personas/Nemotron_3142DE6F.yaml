    from food trucks'', ''Practicing yoga at home'', ''Playing sandbox video games (e.g., Minecraft)'']'
  career_goals: Arianna’s immediate goal is to obtain a commercial driver’s license (CDL) and secure a full‑time position as a certified truck driver. She plans to use this foundation to transition into
    logistics coordination, with a focus on the transportation of artwork and cultural artifacts, allowing her to merge her logistical skills with her passion for art. Concurrently, she aims to grow a freelance
    side business that offers photography and curated online showcase services for emerging Chicago artists. Long‑term, Arianna envisions leading a regional sales and operations team that prioritizes sustainable,
    creative solutions for the art and design supply chain.
