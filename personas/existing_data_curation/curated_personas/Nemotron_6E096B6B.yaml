  hobbies: '[''Gardening (citrus and roses)'', ''Classic car restoration'', ''Woodworking'', ''Historical non‑fiction reading'', ''Church choir participation'', ''Volunteer tutoring'', ''Nature photography'',
    ''Morning walks with his wife'']'
  career_goals: Although officially retired, Scott’s ambition is to remain a useful and engaged member of his community. He aims to mentor younger engineers and hobbyists through a local senior‑tech club,
    continue tutoring his grandchildren, and document his life stories for future generations. He also hopes to complete the restoration of his 1965 Mustang, plant a sustainable garden that supplies fresh
    produce for his family, and eventually travel with his wife to visit the historic sites they read about in his favorite history books. Maintaining his health through regular walks and staying mentally
    sharp by learning new DIY techniques remain top priorities.
