  hobbies: '[''Visiting art galleries and museums'', ''Sketching and watercolor painting'', ''Photography'', ''Salsa dancing'', ''Cooking modern Mexican cuisine'', ''Hiking the Sierra foothills'', ''Participating
    in trivia nights'', ''Board-game gatherings'', ''Yoga and mindfulness meditation'', ''Journaling'', ''Reading contemporary fiction'', ''Reading science-inspired nonfiction'']'
  career_goals: Iluminada aims to earn her Bachelor of Science in Nursing within the next two years, followed by a Master's degree in Nursing Leadership to transition into a nurse manager role. She is driven
    to specialize in acute care, particularly in the emergency department, where she can apply her quick decision-making and critical thinking skills. Parallel to her clinical aspirations, she plans to
    develop a pilot program that integrates visual art and music therapy into post-operative recovery for Spanish-speaking patients, seeking grant funding and interdisciplinary collaboration. Long-term,
    Iluminada envisions opening a community health center in Tulare County that offers culturally tailored preventive services and creative wellness workshops, positioning herself as a change-agent for
    health equity.
