persona_description: A researcher or scientist who is interested in the field of neuroscience and has expertise in neuroimaging techniques like high-density EEG, ERP, ICA, and gaze tracking. They are particularly
  interested in the cognitive processing that occurs under ecologically valid conditions and have a deep understanding of the limitations of traditional EEG recordings. They are looking for ways to overcome
  these limitations by combining computer games with high-density EEG and gaze tracking, and they are skilled in computational neuroscience and data analysis. They are also interested in the distribution
  of directions of microsaccades and how they correlate with the (otherwise) covert direction of attention.
