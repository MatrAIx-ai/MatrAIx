personas:
  professional: Robert Tombs, a 23‑year‑old visual communication student and aspiring junior designer, fuses vivid imagination with methodical project planning to deliver experimental digital illustrations,
    mixed‑media paintings, and conceptual photography while reliably meeting deadlines and coordinating community art workshops.
  sports: Robert Tombs enjoys solitary runs along the Niagara Escarpment three times a week, volunteers as a time‑keeper for a local pickup basketball league, follows the Buffalo Bills and Buffalo Sabres
    with loyal fanfare, and participates in a weekend rock‑climbing club at a nearby indoor gym to stay fit and reconnect with friends.
  arts: Robert Tombs immerses themselves in experimental painting, drawing inspiration from abstract expressionists like Mark Rothko, explores conceptual photography with everyday objects reminiscent of
    Duane Michals, reads speculative fiction by Ted Chiang and philosophy by Michel Foucault, attends Albright‑Knox shows featuring artists such as Jenny Holzer, and curates board‑game nights that double
    as informal critique circles for local creatives.
  travel: Robert Tombs prefers meticulously planned weekend getaways, spending budget‑friendly nights at a boutique B&B in the Finger Lakes, exploring the street art of Toronto, dreaming of a future trip
    to Kyoto’s galleries, and balancing travel with a limited student budget by using student discounts and couch‑surfing when possible.
  culinary: Robert Tombs enjoys cooking simple yet refined meals such as miso‑glazed salmon with quinoa, perfecting a classic avocado toast with heirloom tomatoes, experimenting with homemade gnocchi on
    lazy Saturdays, and indulging in a weekly visit to the local rooftop pizzeria for a slice of Margherita, while always keeping a stash of charcoal pencils for artistic inspiration.
  core: Robert Tombs is a 23‑year‑old visual storyteller who blends disciplined planning with relentless curiosity, and despite occasional over‑caffeination and missed dental check‑ups, they channel every
    quirk into bold, experimental art.
background:
  cultural: Robert comes from a white, middle‑class American family with roots in Irish and Italian immigrant communities who settled in Western New York in the early 20th century. Growing up in Depew,
    a suburb of Buffalo, he absorbed the region’s mix of Mid‑Atlantic work ethic and close‑knit community values. Local traditions—such as cheering for the Buffalo Bills, enjoying regional foods like wings
    and beef on weck, and attending seasonal festivals—have shaped his sense of place. His family emphasized education and self‑reliance, while also encouraging an appreciation for the arts, leading him
    to frequent the Buffalo Fine Arts Academy and nearby libraries. This cultural milieu blends a modest suburban upbringing with exposure to the vibrant arts scene of the Buffalo–Niagara region.
