  career_goals: Robert aspires to turn his creative talents into a sustainable career. In the near term, he plans to build a professional portfolio and secure a junior designer or content creator role at
    a boutique agency or non‑profit in the Buffalo region. He intends to finish his BFA in Visual Communication through part‑time courses while taking freelance commissions to gain real‑world experience.
    Over the next five years, he aims to become a senior art director or creative strategist, leading interdisciplinary projects that fuse visual storytelling with innovative concepts. Ultimately, he dreams
    of launching his own studio that offers collaborative design services and mentorship for emerging artists.
