persona_description: A anthropologist who specializes in the study of primitive cultures, particularly those of the Americas, and their religious beliefs and practices. His research interests include, but
  are not limited to, the relationship between religion and magic, the concept of magic power, and the role of religion in shaping social structures and norms. He is particularly interested in the beliefs
  and practices of the Indian tribes, and how they relate to their understanding of the world and their place in it. He is also interested in the ways in which religion and magic interact, and how they
  shape the beliefs and behaviors of the people in these cultures.
