persona_description: An individual who is interested in the study of network topology and routing protocols, particularly in the context of the Open Shortest Path First (OSPF) protocol. This person is likely
  to be a network administrator or a network engineer who is responsible for maintaining and configuring the network topology and routing protocols. They are interested in understanding the different types
  of OSPF routers and their functions, as well as the different types of OSPF LSA's and their descriptions. They are also likely to be familiar with the concepts of stub areas and totally stubby areas,
  and how they affect the routing topology and the overhead traffic in the network.
