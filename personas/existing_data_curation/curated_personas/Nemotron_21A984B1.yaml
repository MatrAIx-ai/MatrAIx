  hobbies: '["Soccer (local league)", "Beach volleyball", "Salsa dancing", "Cooking Colombian cuisine", "Volunteering teaching Spanish", "Attending Colombian cultural festivals", "Traveling to Colombia",
    "Reading business strategy", "Listening to sustainability podcasts", "Visiting Miami art museums"]'
  career_goals: As a purchasing agent with a strong record of delivering savings and building supplier partnerships, Hipolito aims to advance to a senior purchasing manager role within the next three years,
    eventually becoming a director of supply chain. He is driven to lead a high-performing procurement team that integrates advanced analytics and sustainability into every sourcing decision. He also aspires
    to develop a mentorship program for emerging Latino procurement professionals and, long-term, launch a consultancy that guides companies in ethical, eco-friendly sourcing across the Americas.
