personas:
  professional: Ronald Beatrous, a 17‑year‑old aspiring concept artist, blends his self‑taught digital illustration prowess, bullet‑journal project planning, and love of speculative storytelling to craft
    atmospheric game art while they methodically build a portfolio aimed at winning a scholarship to a specialized art program.
  sports: Ronald Beatrous, a die‑hard fan of the Cleveland Browns and Cleveland Guardians, spends weekends playing pick‑up basketball at the community center, participates in the Great Lakes Model Rocketry
    Club for seasonal launches, and they occasionally ski at nearby Alpine Valley during winter, balancing team loyalty with solitary strategic games like chess.
  arts: Ronald Beatrous, who draws creative fuel from concept artists Syd Mead and Moebius, the speculative prose of Ursula K. Le Guin, and the ambient soundscapes of Brian Eno, they spend evenings sketching
    galaxy‑themed scenes while dissecting the color palettes of Studio Ghibli films, turning each drawing session into a personal ritual of visual storytelling.
  travel: Ronald Beatrous, an avid night‑sky explorer, meticulously plans trips to dark‑sky sanctuaries such as Cherry Springs State Park and Jasper National Park—while also road‑tripping to Niagara Falls
    and Toronto—and dreams of future voyages to Iceland’s aurora‑rich Highlands, balancing detailed itineraries in their journal while they occasionally embark on spur‑of‑the‑moment weekend getaways with
    friends.
  culinary: Ronald Beatrous, a self‑taught kitchen experimenter, often whips up midnight ramen bowls flavored with miso and chili oil, bakes galaxy‑themed cupcakes using matcha‑colored frosting, and perfects
    a smoky paprika‑infused grilled cheese, always keeping a well‑worn sketchbook of recipe doodles beside their art journal while they experiment with flavors.
  core: Ronald Beatrous channels a restless imagination and competitive edge into a disciplined routine of sketching, stargazing, and meticulous journaling, all while they wrestle with anxiety and a penchant
    for late‑night snack‑fuelled art marathons.
background:
  cultural: Ronald was raised in Ashtabula, Ohio, a small Midwestern city on the shores of Lake Erie known for its close‑knit, working‑class community and maritime heritage. His family’s cultural roots
    trace back to German and Irish immigrants who settled in the region, fostering a blend of modest, self‑reliant values and appreciation for local traditions such as county fairs and community festivals.
    The town’s public library and modest art programs have been pivotal in shaping his intellectual curiosity and artistic development, providing access to resources despite his limited formal education.
    While immersed in the broader Midwestern ethos of reliability and modesty, Ronald also feels a strong personal connection to the lake’s open horizon, which fuels his imaginative pursuits and love for
    abstract concepts.
attributes:
  skills: '["sketching (graphite, charcoal)", "digital illustration (Krita, GIMP)", "abstract conceptual design", "basic Python programming", "creative writing (poetry, speculative fiction)", "project planning
    and bullet journaling", "library research techniques"]'
  hobbies: '["sketching and drawing", "digital painting", "reading speculative fiction", "creative writing (poetry, short stories)", "stargazing and astronomy", "chess", "model building (wooden ships, rockets)",
    "journal keeping", "exploring Lake Erie shoreline"]'
  career_goals: Ronald aspires to earn a GED and enroll in a specialized art program where he can refine his illustration and concept‑design skills, ultimately aiming to work as a concept artist for video
    games or graphic novels. He dreams of gaining recognition for his original visual storytelling, hoping to win regional art competitions and secure a scholarship that will bridge the gap between his
    current educational standing and his creative ambitions. In the longer term, he envisions establishing an independent studio that produces illustrated speculative fiction and offers freelance design
    services, allowing him to merge his artistic passion with his competitive drive for excellence.
