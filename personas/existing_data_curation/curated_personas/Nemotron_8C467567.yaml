personas:
  professional: Jennifer Crowe is an aspiring junior robotics enthusiast who blends their practical curiosity with an energetic love for teamwork, quickly sketching functional designs for school robotics
    clubs and drama stage tech while often losing track of organization and deadlines.
  sports: Jennifer Crowe thrives on the hustle of middle-school soccer matches with the Lafayette Community Soccer Club, proudly cheers on the Purdue Boilermakers football team and the Indianapolis Colts
    on game day, and they prefer spontaneous after-practice dance sessions over regimented personal workouts.
  arts: Jennifer Crowe lights up the drama club’s improvisational productions, draws comic-style panels inspired by Alex Ross and the humor of "Adventure Time," and they spend evenings dancing to Billie
    Eilish and Ariana Grande, weaving these creative outlets into a vibrant, expressive identity that sometimes overwhelms school assignments.
  travel: Jennifer Crowe favors spontaneous family road trips, exploring the Wabash River trails in summer, visiting Chicago’s bustling museums on school breaks, and they dream of a future Disney World
    adventure once their allowance savings grow enough, all while navigating a modest small-town budget.
  culinary: Jennifer Crowe loves experimenting in the kitchen, mastering perfectly cheesy grilled cheese, whipping up homemade pizza topped with fresh local corn and pepperoni, baking apple crumble for
    Thanksgiving, yet they often leave a messy trail of flour and dishes awaiting cleanup.
  core: Jennifer Crowe is a hyper-social, curiosity-driven teen who juggles soccer, drama, and LEGO robotics, thrives on spontaneous group fun, but they struggle with staying organized and frequently leave
    a scattered trail of art supplies and empty snack wrappers.
background:
  cultural: Jennifer was raised in Lafayette, Indiana, a Midwestern community that blends small‑city life with surrounding farmland. Her family observes typical regional traditions such as celebrating Thanksgiving
    with a large gathering of relatives, attending local county fairs, and participating in community service events through her church. The town’s emphasis on neighborliness and modesty has shaped her
    cooperative mindset, while the presence of Purdue University nearby offers exposure to diverse ideas and educational opportunities.
