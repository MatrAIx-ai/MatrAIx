  career_goals: Jennifer is beginning to picture a future where she can combine her love for people with her practical curiosity. She hopes to become a teacher or a community youth coordinator, roles that
    would let her nurture harmony and guide others. She also entertains the idea of working with animals as a veterinary assistant, inspired by her regular volunteer work at the local animal shelter. Over
    the next few years she aims to develop leadership experience through student council and community service, with the long‑term ambition of creating inclusive programs for her peers.
