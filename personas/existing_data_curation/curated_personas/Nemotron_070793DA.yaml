personas:
  professional: Justin Williams, an aspiring junior scientist who loves building LEGO gadgets and conducting kitchen‑lab experiments, channels their curiosity and organized yet flexible mindset into turning
    everyday observations into playful inventions.
  sports: Justin Williams dashes across the local soccer field with the Muscatine Kids Soccer Club, cheers for the Iowa Hawkeyes football team on Saturdays, and idolizes the agility of Lionel Messi, even
    though they sometimes forget to stretch after games.
  arts: Justin Williams fills sketchbooks with cartoon critters inspired by Dr. Seuss, Calvin and Hobbes, and Walt Disney, while their LEGO constructions echo the architectural whimsy of Antoni Gaudí, and
    they proudly showcase their art at school’s art club exhibitions.
  travel: Justin Williams loves weekend adventures along the Mississippi River’s stone‑laden banks, has camped at the Iowa State Fair’s fairgrounds, dreams of visiting the Grand Canyon’s red cliffs, and
    hopes to sprinkle a few days in Tokyo’s futuristic districts for a splash of neon culture, all while they keep a scrapbook of postcards and tickets.
  culinary: Justin Williams prefers classic mac and cheese with a side of crunchy carrot sticks, experiments with peanut‑butter‑and‑jelly roll‑ups, and delights in making banana‑smoothie slushies that they
    declare are their ‘rocket fuel.’
  core: Justin Williams is a boundlessly curious seven‑year‑old whose sketch‑filled mind, LEGO‑strewn bedroom, and habit of turning every snack into a science experiment reveal a vibrant blend of imagination
    and organized mischief, and they often forget to put away the LEGO pieces after play.
background:
  cultural: Justin grows up in Muscatine, Iowa, a small Midwestern community along the Mississippi River. His family embraces typical Midwestern values of friendliness, community involvement, and a love
    of outdoor activities. He often attends local county fairs, church gatherings, and school events that celebrate American holidays. The cultural environment emphasizes teamwork, modesty, respect for
    nature, and a supportive community spirit, which shape his open‑minded yet organized personality.
