  career_goals: Justin dreams of becoming an astronaut who can explore space and draw the planets he visits. He also imagines being a painter who creates murals for his school and a scientist who invents
    cool gadgets. He hopes to lead his soccer team as a captain one day and eventually coach younger kids, showing his leadership and teamwork values while staying curious about how things work.
