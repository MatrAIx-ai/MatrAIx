persona_description: A chemist who is interested in the applications of quantum mechanics to chemistry and has a strong background in quantum mechanics, specifically in the topics of atoms, molecules, and
  the interaction of light with matter on the molecular scale. They have a deep understanding of the historical foundation of quantum mechanics, non-classical quantum phenomena, basic model systems in one
  or more dimensions, angular momentum, the hydrogen atom, and particle interactions. They are familiar with exchange symmetry, the Pauli Principle, atomic He approximation methods, many-electron atoms
  and atomic energy levels, Born-Oppenheimer approximation, molecular hydrogen, molecular virial theorem, photoelectron spectroscopy, and molecular term symbols. They also have knowledge of small molecule
  spectroscopy, diatomic rotation/vibration spectroscopy, polyatomic spectroscopy, electronic spectroscopy, large molecule spectroscopy, density of states, condensed phase spectra, NMR, Fourier transform
  methods, ESR, and quantum mechanics in general.
