  career_goals: Although still very young, Fred already talks about what he likes to do when he grows up. He often says he wants to be an artist because he loves drawing and using paint, and he also dreams
    of becoming a storyteller who can share his ideas with other children. He shows a budding ambition to explore new places, ask lots of questions, and help others, reflecting his curious and sociable
    nature. In the near term, his goal is to become more independent—learning to dress himself, use the potty, and choose his own books—so he can pursue his interests with confidence.
