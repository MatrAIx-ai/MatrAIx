personas:
  professional: Hubert Sarmiento, a 16-year-old with a natural talent for organizing and spreadsheet wizardry, applies the same tactical precision they wield in StarCraft to school accounting projects,
    meticulously mapping out budgets for the family's grocery list and overseeing the library's volunteer cash register, all while planning a future associate degree in accounting and aspiring to become
    a junior accountant whose routine-driven mindset can streamline any organization's financial flow.
  sports: Hubert Sarmiento follows a strict weekly fitness schedule that alternates weightlifting on Monday, Wednesday, and Friday with long-distance runs on Tuesday and Thursday, mirroring the strategic
    cadence of their favorite e-sports titles; they are a member of the high school cross-country team for the spring season, cheer on the Los Angeles Lakers and the local minor-league baseball club the
    Riverside Runners, and they never miss a scheduled workout unless a sudden gaming tournament pushes them to sacrifice a session.
  arts: Hubert Sarmiento unwinds by listening to the cinematic scores of Hans Zimmer and the evocative melodies of Yoko Shimomura while dissecting narrative twists in classic anime series such as Steins;Gate,
    and occasionally creates pixel-art mods for their favorite games, showcasing a quiet appreciation for graphic-novel art from creators like Junji Ito and graphic designer James White, even though they
    rarely share these creations beyond anonymous online forums.
  travel: Hubert Sarmiento prefers meticulously planned getaways, having organized a detailed three-day hike through Yosemite National Park with precise mileage logs and gear checklists, and dreams of a
    future tech-focused tour of Tokyo's Akihabara district to experience the latest gaming hardware, yet they often limit trips to nearby cities like San Francisco where they can attend a weekend coding
    bootcamp, constrained by a modest travel budget and a strict parental curfew.
  culinary: Hubert Sarmiento approaches nutrition like a strategic mission, meal-prepping weekly portions of grilled chicken breast, quinoa, and roasted broccoli seasoned with garlic, chili flakes, and
    olive oil, rewarding themselves after intense gaming sessions with a steaming bowl of spicy miso ramen or a perfectly seared ribeye steak, while their go-to quick post-workout fuel is a peanut-butter-banana
    sandwich, though they sometimes skip breakfast to squeeze in extra gaming time.
  core: Hubert Sarmiento is a 16-year-old strategic gamer whose love of routine, spreadsheets, and disciplined fitness drives a cautious, competitive mindset that they toggle between meticulous planning
    and late-night gaming binges.
background:
  cultural: Hubert was raised in a middle‑class, predominantly white suburban neighborhood in Plano, Texas. The local culture emphasizes self‑reliance, practicality, and a strong work ethic, often reflected
    in community activities such as school clubs, organized sports, and volunteer programs. His family likely adheres to conventional American values, with an appreciation for routine, modesty, and personal
    responsibility. The suburban Texan environment, with its blend of Southern hospitality and extraversion, has reinforced his organized, methodical outlook while offering exposure to technology‑driven
    hobbies that are popular among his peers.
