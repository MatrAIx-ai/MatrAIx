persona_description: A researcher and data analyst who is interested in the historical and seasonal changes in the Arctic sea ice extent in the Russian Arctic region, primarily focusing on the Sea Ice Charts
  of the Russian Arctic in Gridded Format, 1933-2006. They are interested in the spatial and temporal coverage, the available data, and the companion error statistic files to understand the changes in sea
  ice edge locations, extent, and multiyear ice cover over time. They are likely to be a geographer, climatologist, or a data analyst who is interested in the environmental impacts of climate change and
  the Arctic region.
