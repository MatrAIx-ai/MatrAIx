personas:
  professional: Neel Sharpe, a seasoned mixed‑use farm supervisor, blends meticulous production logs with hands‑on equipment upkeep, and they channel their routine‑focused, competitive mindset into streamlining
    crew schedules, enforcing safety protocols, and mentoring new hires.
  sports: Neel Sharpe, an avid Texas sports enthusiast, never misses a Dallas Cowboys game on Friday nights, joins the Lake Worth Anglers Club for weekend fishing tournaments, and they stay fit through
    functional farm labor rather than formal gym workouts.
  arts: Neel Sharpe, a community‑center regular, contributes a pocket harmonica to gospel jam sessions echoing Kirk Franklin and Willie Nelson, attends occasional Dallas theater productions starring local
    talent, and they find artistic expression a vital counterbalance to the farm’s routine grind.
  travel: Neel Sharpe, a seasoned farm overseer, prefers well‑planned road trips that combine hunting in Montana with wine‑tasting in Napa Valley, and they limit travels to long‑weekend getaways to accommodate
    family responsibilities and farm duties.
  culinary: Neel Sharpe, a self‑taught grill master, perfects slow‑smoked brisket and honey‑chipotle pork ribs paired with jalapeño‑cheddar cornbread, sourcing fresh herbs from his own fields, and they
    love hosting backyard barbecues for friends and neighbors.
  core: Neel Sharpe, a routine‑driven farm supervisor with a competitive edge, balances relentless worry over inefficiencies with nightly barbecue gatherings and poker nights, and they never pass up a chance
    to share a harmonica riff at church.
background:
  cultural: Neel’s cultural roots are grounded in his African‑American heritage and the longstanding Black community of the Dallas‑Fort Worth metroplex. Raised on a blend of Southern soul food, gospel music,
    and church fellowship, he carries traditions of communal support, storytelling, and celebration of milestones like Juneteenth. The Texan landscape has added a love for outdoor work, hunting, and the
    regional cuisine, creating a hybrid identity that values hard work, family loyalty, and the practical wisdom passed down through generations.
attributes:
  skills: '[''Team leadership'', ''Shift scheduling'', ''Equipment maintenance'', ''Safety compliance'', ''Production record‑keeping'', ''Workforce training'', ''Performance metric analysis'', ''Pesticide
