  hobbies: '[''Barbecue grilling'', ''Weekend fishing'', ''Playing harmonica'', ''Church gospel singing'', ''Mentoring teens in carpentry'', ''Weekly poker night'', ''Watching Dallas Cowboys football'',
    ''Reading business biographies'']'
  career_goals: Neel aims to move from first‑line supervision to a senior operations manager role within the next five years, seeking to oversee multiple farm sites and introduce modest technology upgrades
    that preserve the reliable, routine‑driven workflow he values. He also dreams of eventually acquiring a modest family plot where he can run a self‑sustaining garden and mentor his grandchildren, blending
    his competitive drive with his desire for a lasting legacy.
