personas:
  professional: Cory Greene, a 24‑year‑old postal service mail carrier, blends his practical route‑planning expertise with a curiosity for logistics technology, delivering with calm resilience while mentoring
    new hires and pursuing a supervisory role within the next five years.
  sports: Cory Greene is an avid participant in pick‑up basketball at the local community center, a member of the county’s amateur baseball league, a frequent hunter of white‑tailed deer and avid fisherman
    on the Cumberland Plateau, cheers on the Nashville Predators and Tennessee Titans, and belongs to the Cumberland Furnace Hiking Club.
  arts: Cory Greene channels his creative side by playing acoustic guitar at church gatherings, covering songs by John Mayer and Bob Dylan, while he enjoys listening to The Avett Brothers and Dolly Parton
    and attends occasional local folk festivals.
  travel: Cory Greene prefers flexible road trips that blend hunting and hiking, having explored the Great Smoky Mountains, the Appalachian Trail, and a weekend getaway to Asheville, while budgeting trips
    with a spreadsheet and dreaming of a future expedition to Patagonia for big‑game hunting.
  culinary: Cory Greene favors Southern comfort food, often grilling fresh trout with rosemary and smoked paprika, whipping up a hearty pulled‑pork sandwich with coleslaw, and baking jalapeño‑cheddar cornbread,
    and their cooking skill sits at a confident home‑chef level.
  core: Cory Greene is a competitive, community‑driven mail carrier who balances curiosity with practicality, staying calm under pressure and always ready for the next outdoor adventure.
background:
  cultural: Cory grew up in Cumberland Furnace, a small town in Houston County, Tennessee, steeped in Southern, Appalachian traditions. As a white, working‑class resident, his upbringing was shaped by close‑knit
    community values, a strong emphasis on family, and a Baptist faith that informs his participation in church activities. The local culture of country and bluegrass music, weekend barbecues, county fairs,
    and outdoor pursuits like hunting and fishing is integral to his identity. His role in the postal service aligns with the region’s respect for reliable, public‑service jobs, and his worldview balances
    the pragmatic sensibilities of rural Tennessee with an openness to new ideas.
attributes:
  skills: '["Route Planning", "Time Management", "GPS Navigation", "Handheld Scanning Operation", "Physical Stamina", "Vehicle Maintenance", "Customer Service", "Interpersonal Communication", "Problem Solving",
