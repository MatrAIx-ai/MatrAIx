  hobbies: '["Pick-up Basketball", "Local Amateur Baseball", "Hunting", "Fishing", "Hiking", "Playing Acoustic Guitar", "Community Volunteering", "Church Youth Group Activities", "Exploring Logistics Technology",
    "DIY Mechanical Projects"]'
  career_goals: Cory aims to climb the USPS ladder by becoming a postal supervisor within the next five years, leading a team of carriers and spearheading efficiency initiatives on his district. He plans
    to earn a logistics management certification through a community college, blending his curiosity for new delivery technologies with practical implementation. His competitive drive pushes him to achieve
    top performance metrics on his route, and he hopes to be recognized as a model employee, eventually moving into a regional operations role where he can influence broader service improvements. Additionally,
    Cory wants to mentor new hires, sharing his calm, resilient approach and reinforcing the importance of community-focused service.
