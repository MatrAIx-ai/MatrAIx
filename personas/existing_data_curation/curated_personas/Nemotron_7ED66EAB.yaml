  career_goals: Christian imagines a future as a firefighter or a construction engineer because both jobs offer clear procedures, teamwork, and a chance to help the community. He is drawn to the structured
    training of firefighting and the tangible results of building safe structures, reflecting his love for predictable, practical tasks and his desire to make a positive impact.
