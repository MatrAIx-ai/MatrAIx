  hobbies: '[''Hiking the Sonoran Desert trails'', ''Landscape photography'', ''Traditional Mexican cooking'', ''Playing acoustic guitar'', ''Attending local festivals (Cinco de Mayo, Día de los Muertos)'',
    ''Watching Arizona Diamondbacks baseball games'', ''Reading mystery novels'', ''Vintage car restoration'', ''Community volunteering at senior center'', ''Exploring new travel gadgets'']'
  career_goals: Orlando aims to transition into a supervisory role within the hotel's front‑desk operations, leveraging his experience to train new staff and oversee guest services. He also aspires to obtain
    a Certified Hospitality Supervisor credential and eventually manage a boutique property, allowing him to shape guest experiences more directly. As he approaches retirement age, he is open to part‑time
    consulting for small hotels or starting a culturally‑focused tour service that highlights Mexican heritage sites in Arizona. He balances his desire for career advancement with his preference for flexibility,
    seeking roles that offer a mix of on‑the‑ground interaction and strategic planning without rigid schedules.
