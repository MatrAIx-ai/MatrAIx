persona_description: A soil scientist who specializes in the study of soil hydrophobicity and its effects on water retention and wettability. Their research interests include the development and evaluation
  of biochar amendments for improving soil water retention capacity in arid conditions, and the characterization of biochar pore structures and their impact on water uptake. They are also interested in
  the effects of biochar hydrophobicity on soil water repellency and the potential for biochar to increase the water retention capacity of hydrophobic soils.
