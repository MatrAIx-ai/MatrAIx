personas:
  professional: Guy Patty, a 39‑year‑old construction manager with a decade of framing, concrete, and drywall expertise, blends meticulous daily logs and OSHA‑compliant safety practices with a keen eye
    for design, using their organized, assertive yet collaborative style to lead crews, advise on finish selections, and mentor junior workers as they work toward a foreman and eventually superintendent
    role.
  sports: Guy Patty competes in the Warsaw Community Softball League each spring, cycles the countryside on summer weekends, follows the Chicago Cubs, Chicago Bulls, and Indianapolis Colts, and they fit
    three weekly workouts—including weight‑training, yoga, and fishing trips—into a tightly organized schedule.
  arts: Guy Patty frequents the Kosciusko County Historical Museum and the Westfield Art Gallery, collects prints by Grant Wood and photographs by Ansel Adams, volunteers as a set designer for community
    theater productions of Arthur Miller’s The Glass Menagerie, and they listen to a rotating playlist of John Prine, Sufjan Stevens, and local folk bands while editing architectural photography.
  travel: Guy Patty plans weekend escapes to design‑centric cities like Chicago’s West Loop, Portland’s Pearl District, and Copenhagen’s Nyhavn, while also exploring nearby attractions such as Brown County
    State Park and the Indiana Dunes, and they prioritize detailed itineraries to balance work commitments with a love for architecture, bike tours, and cultural immersion.
  culinary: Guy Patty experiments with herb‑buttered grilled trout, sweet‑potato mash, hand‑made cornbread, and a rustic lasagna featuring locally raised pork, rosemary, and sage, sourcing ingredients from
    farmer’s markets and regularly hosts dinner parties where they blend Midwestern comfort food with innovative twists.
  core: Guy Patty merges a disciplined construction career with an artistic eye, obsessively cataloguing tools while secretly hoarding vintage woodworking magazines, and they can’t resist a late‑night Sufjan Stevens
    binge after a day on the job site.
background:
  cultural: Guy grew up in a small Midwestern town in Warsaw, Indiana, within a predominantly white community that traces its roots to Anglo‑German and Scandinavian settlers common in Kosciusko County.
    The region’s values of hard work, modesty, and community solidarity shaped his disciplined work ethic and cooperative spirit. Raised in a Protestant household that emphasized family gatherings, service,
    and participation in local events like county fairs and church socials, he internalized a strong sense of civic responsibility. The rural landscape, agricultural heritage, and close‑knit neighborhood
    life fostered his sociable and outgoing nature, while his exposure to Midwest art initiatives and regional museums sparked his curiosity and appreciation for unconventional ideas.
