  hobbies: '[''Visiting art galleries'', ''Attending community theater'', ''Woodworking'', ''Softball league'', ''Habitat for Humanity volunteering'', ''Biking'', ''Fishing'', ''Traveling to architecture‑focused
    cities'', ''Reading design magazines'', ''Hosting dinner parties'']'
  career_goals: Guy aims to transition from laborer to crew foreman and, within the next three to five years, become a site superintendent. He plans to earn his OSHA 30‑hour certification, complete the
    Certified Construction Manager (CCM) credential, and obtain a state contractor’s license. Ultimately, he aspires to launch his own specialty renovation firm that blends solid construction practices
    with artistic interior design, focusing on historic home restorations and sustainable building techniques. He also hopes to mentor younger workers through community programs like Habitat for Humanity.
