  career_goals: Jocelyn is drawn to career paths that combine her love for people with a reliable routine. She dreams of becoming a registered nurse or an elementary school teacher, roles where she can
    help others in a structured environment while staying connected to her community. In the meantime, she plans to volunteer at the local health clinic and assist teachers through tutoring, hoping to build
    experience and confirm her long-term ambition of a caring, service-oriented profession.
