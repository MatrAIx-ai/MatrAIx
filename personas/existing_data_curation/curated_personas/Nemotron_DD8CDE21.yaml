personas:
  professional: Jocelyn Belko is an aspiring young team captain who blends their love of soccer, clarinet, and community gardening into a practical, routine‑driven leadership style that values group cohesion
    and hands‑on problem solving, even if they occasionally forget to complete homework due to a relaxed attitude toward obligations.
  sports: Jocelyn Belko plays midfield for the Midtown Middle School soccer team, volunteers with the community garden’s youth fitness club, and avidly supports the U.S. Women’s National Soccer Team while
    rooting for the local professional soccer side, River City FC, on weekends, showing they thrive on group competition and familiar team rituals.
  arts: 'Jocelyn Belko delights in performing Mozart’s Clarinet Concerto and singing along to Taylor Swift’s latest hits during band practice, spends evenings devouring the Percy Jackson adventure series
    by Rick Riordan, and crafts friendship bracelets set to the soundtrack of Avatar: The Last Airbender, illustrating they blend classic music, modern pop, and creative hands‑on hobbies into their artistic
    identity.'
  travel: Jocelyn Belko prefers family‑planned trips that mix familiar comforts with a splash of adventure, having explored the Grand Canyon on a school field trip and spent a summer weekend at Disneyland,
    while dreaming of a future bike‑tour through the tulip fields of Amsterdam with friends, showing they balance routine itineraries with occasional bursts of wanderlust.
  culinary: Jocelyn Belko loves baking chocolate‑chip cookies with their grandma, often adding toasted marshmallows and a pinch of sea salt for extra crunch, enjoys snacking on fresh garden carrots and
    cucumber sticks, and can whip up a quick mac‑and‑cheese using cheddar, butter, and elbow pasta, though they sometimes burn the cookie edges when distracted.
  core: Jocelyn Belko blends a love of routine with a chaotic flair, thriving on group activities like soccer and band while habitually misplacing homework and over‑seasoning cookies, showing they balance
    order and spontaneity.
background:
  cultural: Jocelyn was raised in a predominantly white, Midwestern community in Cambridge, Ohio. Her family's values emphasize hard work, neighborliness, and participation in local traditions such as the
    county fair, church youth gatherings, and community service projects. The town's blend of rural heritage and small-town resilience shapes her practical outlook, while school and church provide regular
    routines that she finds comforting.
