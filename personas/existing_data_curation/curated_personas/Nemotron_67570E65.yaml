personas:
  professional: Angelina Stouffer, a disciplined IT manager with PMP and CISSP credentials, orchestrates end‑to‑end technology projects by obsessively documenting every step, enforcing rigorous security
    standards, and holding their cross‑functional teams to strict budget and timeline targets.
  sports: Angelina Stouffer follows the Seattle Seahawks and Seattle Mariners avidly, joins the Green Trail Hiking Club for solo weekend hikes, practices yoga twice a week at a downtown studio, and jogs
    through the city park each spring to maintain a steady, low‑key fitness routine.
  arts: Angelina Stouffer finds inspiration in the compositions of Johann Sebastian Bach, the historical dramas of 'The Crown', and the writings of Doris Kearns Goodwin, regularly visiting the local art
    museum to view American Impressionist works by Mary Cassatt and carving out quiet evenings to knit patterned scarves while listening to classical recordings.
  travel: Angelina Stouffer prefers meticulously planned journeys to historic destinations such as Williamsburg, Virginia, the Cotswolds in England, and Kyoto’s temples, travels with a detailed itinerary
    and journal, and dreams of a future solo garden tour across Provence to study lavender fields and regional cuisine.
  culinary: Angelina Stouffer, a skilled baker, consistently perfects sourdough loaves using heritage wheat flour and flaky croissants with butter from a local farm, while also crafting seasonal vegetable
    ratatouille from tomatoes, zucchini, and basil harvested from their own garden.
  core: Angelina Stouffer blends methodical IT leadership with a love for routine‑driven gardening, baking, and puzzle‑solving, all while occasionally over‑caffeinating to power late‑night knitting sessions.
background:
  cultural: Angelina grew up in a small Midwestern town in Illinois, raised in a family that prized self‑reliance, hard work, and community responsibility. Her ancestry includes German and Irish roots,
    reflected in family traditions of seasonal cooking and seasonal holidays. The local culture emphasized practicality, modesty, and a close‑knit neighborhood network, shaping her appreciation for routine,
    order, and quiet personal time. While she participates in her church's charitable outreach, she prefers low‑key involvement that aligns with her introverted disposition. Her marriage reinforces a partnership
    built on shared values of stability, mutual support, and a balanced domestic life.
