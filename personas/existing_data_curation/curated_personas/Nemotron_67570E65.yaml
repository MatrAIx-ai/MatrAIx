  career_goals: Angelina aims to advance from her current managerial role to a senior executive position such as Director of IT Services or Chief Information Officer within the next five to seven years.
    She is focused on building resilient, secure IT infrastructures that support sustainable growth for regional enterprises. Her ambition includes leading digital transformation initiatives that balance
    innovation with the practical, incremental improvements she values, while maintaining a stable work‑life rhythm that accommodates her family and preference for structured routines.
