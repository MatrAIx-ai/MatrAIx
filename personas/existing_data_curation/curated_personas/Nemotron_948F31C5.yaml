  hobbies: '[''Reading literary fiction and historical biographies'', ''Gardening (vegetable and flower beds)'', ''Knitting'', ''Bird watching on local trails'', ''Yoga and mindfulness meditation'', ''Volunteering
    at the Folsom food bank'', ''Participating in the local historical society'', ''Walking the Foothills Trail'']'
  career_goals: Birch’s immediate goal is to advance to a store manager position at her current retail location, obtaining the Certified Retail Manager credential to solidify her leadership credentials.
    In the next five years, she aims to develop a formal mentorship program that pairs experienced associates with new hires, fostering a low‑stress, supportive environment that aligns with her compassionate
    values. Long‑term, Birch envisions transitioning into a part‑time role that blends retail expertise with community development—such as coordinating local cultural events or senior‑focused educational
    workshops—leveraging her arts‑humanities background while maintaining a stable income for her family.
