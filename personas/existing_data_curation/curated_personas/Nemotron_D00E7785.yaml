personas:
  professional: Joshua Ramirezacosta is an aspiring junior coder and LEGO architect whose curiosity drives them to experiment with Scratch projects while their practical side keeps their builds functional,
    and their competitive streak pushes them to win local coding contests despite their occasional disorganization.
  sports: Joshua Ramirezacosta is a lively member of the neighborhood youth soccer club who dribbles the ball with the same enthusiasm they reserve for cheering on FC Barcelona, preferring spontaneous pick‑up
    games over regimented practice, yet their competitive edge sometimes makes them hog the ball during scrimmages.
  arts: Joshua Ramirezacosta delights in dancing to bomba and plena rhythms at family festivals, often mimicking moves from the local brass ensemble "Los Soneros", while also devouring the vibrant LEGO
    stop‑motion videos of creator "The Brick Builder", showing a blend of kinetic and visual artistic appreciation.
  travel: Joshua Ramirezacosta loves weekend escapades to the nearby beach and mangrove boardwalk, dreaming of a future trip to the coral reefs of Belize where they can hunt for exotic shells, yet their
    travel plans are often limited by a modest savings stash and parental permission.
  culinary: Joshua Ramirezacosta enjoys rolling out dough for empanadas with their grandmother on Saturdays, frequently topping them with seasoned beef and raisins, while also craving cheesy pizza slices
    and crunchy tacos al pastor, and they proudly claim the secret to the perfect empanada crust is a dash of cinnamon.
  core: Joshua Ramirezacosta blends boundless curiosity with a competitive spirit, juggling LEGO building, soccer, and coding while often leaving a trail of scattered bricks and half‑finished projects behind,
    yet they always bounce back with an energetic grin.
background:
  cultural: Joshua is raised in Loiza, a town known for its rich Afro‑Puerto Rican heritage, vibrant bomba and plena traditions, and close‑knit community life. He grows up bilingual, speaking Spanish at
    home and English at school, and participates in local celebrations such as the Festival de la Bomba. Family meals often feature dishes like arroz con gandules and alcapurrias, and religious practices
    include attending mass and community events. The blend of Caribbean rhythms, tropical environment, and strong family ties shapes his identity and daily experiences.
