persona_description: A researcher and scientist who specializes in the study of neurobiology, particularly in the field of neurodegenerative diseases such as ALS and FTD. Dr. Donnelly's research focuses
  on uncovering the etiology and pathophysiological mechanisms of action of these diseases, and developing new treatments and therapies for them. He is a postdoctoral fellow with the world-renowned ALS
  expert Jeffrey Rothstein, MD, PhD, at Johns Hopkins University in Baltimore, Maryland, and has recently published a study in Nature that suggests the C9orf72 repeat expansion disrupts nucleocytoplasmic
  transport, potentially making it a potential target for pharmacotherapeutic intervention. Dr. Donnelly is also an assistant professor of neurobiology at the University of Pittsburgh School of Medicine
  and is conducting ongoing research into the HRE pathway and other possible treatment approaches at the Live Like Lou Center for ALS Research.
