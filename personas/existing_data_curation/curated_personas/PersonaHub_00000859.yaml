persona_description: A historian who is interested in the history of air conditioning and its origins in the United Kingdom. This person is likely to be familiar with the history of the United Kingdom and
  its contribution to the development of air conditioning technology. They may also have a background in engineering or architecture, as they would be interested in the context of air conditioning in buildings.
  Additionally, they would be familiar with the works of David Boswell Reid, as the paper aims to demonstrate that air-conditioned buildings first appeared in the United Kingdom in the middle of the nineteenth
  century and that the prime instigator was David Boswell Reid.
