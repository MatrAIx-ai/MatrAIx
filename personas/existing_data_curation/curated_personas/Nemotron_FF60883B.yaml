  hobbies: '[''Landscape Photography'', ''Gallery Visits'', ''Painting Workshops'', ''Book Club'', ''Zumba Classes'', ''Hiking in the Mojave Desert'', ''Volunteering at Cultural Festivals'', ''Russian Cooking'',
    ''Board Games'', ''Neighborhood Potlucks'']'
  career_goals: Isabelle aims to advance within the United States Postal Service by moving into a supervisory role, such as a Post Office Branch Manager or District Operations Supervisor, where she can
    oversee a team of carriers and implement efficiency initiatives. She is also interested in spearheading community engagement programs that blend her love for art with public service, such as organizing
    local art walks or postal-themed exhibitions. Over the next five years, she plans to complete an associate degree in Logistics Management and obtain the USPS Supervisory Training Certification. Ultimately,
    she aspires to become a recognized leader in postal operations who innovates service delivery while fostering cultural enrichment in her community.
