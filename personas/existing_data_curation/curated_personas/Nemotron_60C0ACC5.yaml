personas:
  professional: Wendy Marquis, a seasoned restaurant host with a talent for orchestrating smooth reservation flows, training new staff, and delivering calm, personable service, leverages their love of routine
    and practical problem‑solving to excel as a candidate for floor‑supervisor while dreaming of a community‑focused coffee shop.
  sports: Wendy Marquis, an enthusiastic Indiana Pacers regular who packs a snack for each home game, joins a neighborhood walking club for daily dog walks, and occasionally participates in senior‑friendly
    pickleball leagues at the local community center.
  arts: Wendy Marquis, a classic‑rock aficionado who spins The Rolling Stones and Led Zeppelin while quilting and cooking, engages in a book club that discusses Tolstoy and Austen, and attends community
    theater productions of classic plays, allowing artistic appreciation to weave through their social life.
  travel: Wendy Marquis, a weekend road‑tripper who favors short drives to the Indiana Dunes, seasonal trips to nearby wineries, and annual family visits to Florida, plans vacations around senior‑center
    schedules and a modest budget, balancing relaxation with a love for local farmer’s markets.
  culinary: Wendy Marquis, a comfort‑food cook who transforms garden harvests into hearty chicken pot pies, rosemary‑infused roasted vegetables, and classic meatloaf, while also crafting café‑style espresso
    drinks for friends and perfecting grandma’s apple crumble.
  core: Wendy Marquis blends a love of routine, community hospitality, gardening, classic rock, and volunteerism into a warm, organized, and slightly perfectionist outlook that fuels a plan for a cozy retirement
    coffee shop.
background:
  cultural: Wendy was raised in a middle‑class, white family in Indianapolis, Indiana, where Midwestern values of hard work, practicality, and community shaped her worldview. Her grandparents immigrated
    from Germany and Ireland, and family gatherings often featured home‑cooked meals and holiday traditions reflecting those heritages. A lifelong resident of Marion County, she has been active in her local
    church and neighborhood association, fostering a strong sense of mutual support and a preference for stable, familiar routines. This cultural backdrop contributes to her practical approach to life,
    her sociable nature, and her commitment to community involvement.
attributes:
  skills: '["Customer Service", "Reservation Management", "Seating Coordination", "POS System Operation", "Cash Handling", "Multitasking", "Conflict Resolution", "Team Coordination", "Barista Skills", "Training
    and Mentorship", "Inventory Tracking", "Schedule Management", "Effective Communication"]'
  hobbies: '["Gardening", "Book Club", "Quilting", "Community Volunteering", "Cooking Comfort Food", "Walking Dog", "Attending Local Sports Events", "Visiting Farmers'' Markets", "Listening to Classic Rock",
    "Family Visits in the Midwest"]'
  career_goals: Wendy aims to move into a floor‑supervisor or shift‑manager role at her current restaurant, where she can apply her organizational strengths and mentorship abilities to guide newer staff.
    To support this transition, she plans to enroll in a local hospitality‑management certificate program, deepening her operational knowledge while still maintaining the routine she values. In the longer
    term, she envisions opening a modest, community‑focused coffee shop that would serve as a gathering place for seniors and families, allowing her to blend her love of hospitality, steady routines, and
    neighborhood connection as she approaches retirement.
