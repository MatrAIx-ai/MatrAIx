personas:
  professional: Todd Horrell is a civil engineer who designs climate‑resilient bridges and sewers for coastal communities, leveraging AutoCAD Civil 3D, GIS data, and LEED principles while methodically managing
    projects, balancing curiosity about innovative materials with the practical demands of Washington State codes, and quietly worrying about meeting deadlines.
  sports: Todd Horrell is a dedicated kayaker and hiker who spends weekends paddling the Puget Sound with the Bremerton Kayak Club, trails the Olympic Peninsula, and follows the Seattle Seahawks and Seattle
    Kraken, while also joining a local adult soccer league for summer fitness.
  arts: Todd Horrell captures the misty forests and shoreline in landscape photography, strums acoustic guitar to the tunes of Joni Mitchell and Fleet Foxes, devours science‑fiction by Kim Stanley Robinson
    and engineering classics by John Roark, and attends quarterly exhibits at the Seattle Art Museum featuring Ansel Adams prints.
  travel: Todd Horrell prefers meticulously planned trips that blend adventure and sustainability, having kayaked the San Juan Islands, explored Vancouver’s waterfront, and dreaming of Iceland’s geothermal
    sites, while usually booking eco‑friendly lodgings and using GIS maps to chart off‑the‑beaten‑path routes.
  culinary: Todd Horrell enjoys cooking Pacific Northwest seafood such as cedar‑plank salmon, Dungeness crab bisque, and mussels in a white wine broth, often pairing dishes with fresh dill, thyme, and smoked
    paprika, and while their cooking skill is solid, they sometimes over‑season in an attempt to impress friends.
  core: Todd Horrell blends meticulous engineering rigor with a love for outdoor adventure, constantly worries about deadlines, and balances a frugal financial mindset with occasional splurges on woodworking
    gadgets.
background:
  cultural: Todd grew up in a middle‑class white American family in the Pacific Northwest, with German and Irish ancestry. The maritime culture of Bremerton, home to a major naval base, shaped his appreciation
    for coastal communities and public service. He was raised with the region's strong emphasis on self‑reliance, practicality, and environmental stewardship, values reinforced by frequent outdoor recreation
    in the nearby mountains, forests, and waterways. His community ties include participation in local volunteer projects and a respect for the progressive, sustainability‑focused ethos common in Washington
    State.
attributes:
  skills: '[''Structural Design'', ''Geotechnical Analysis'', ''AutoCAD Civil 3D'', ''Revit'', ''SAP2000'', ''ETABS'', ''GIS Mapping'', ''Project Management (MS Project)'', ''Budgeting and Cost Estimation'',
    ''LEED and Sustainable Design'', ''Regulatory Compliance (ACI, AISC, WA State Codes)'']'
  hobbies: '[''Kayaking'', ''Hiking'', ''Landscape Photography'', ''Woodworking'', ''Acoustic Guitar'', ''Volunteer Construction'', ''Model Bridge Building'', ''Science Fiction Reading'', ''Cooking (Seafood)'']'
  career_goals: Todd aims to obtain his Professional Engineer (PE) license within the next two years and take on lead engineer roles on major coastal infrastructure projects in the Puget Sound region. He
    is driven to integrate sustainable and climate‑resilient design principles into public works, aspiring to become a project manager for the Washington State Department of Transportation or a senior civil
    engineer at a forward‑thinking consultancy. Long‑term, he envisions founding his own engineering firm that specializes in resilient infrastructure for maritime communities while maintaining a healthier
    work‑life balance and developing stronger stress‑management skills.
