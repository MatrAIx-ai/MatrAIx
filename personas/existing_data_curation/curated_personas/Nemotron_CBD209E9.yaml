  career_goals: She aims to become a lead maintenance technician and eventually a maintenance supervisor at the main Honolulu airport, overseeing a team while championing safety culture. Over the next five
    years she plans to earn an FAA Maintenance Management certification and add specialized avionics and electric‑aircraft propulsion qualifications. Mari also aspires to mentor apprentices, develop a training
    program for new mechanics, and eventually open a small, family‑run aircraft service shop that focuses on sustainable maintenance practices and community outreach in Kapolei.
