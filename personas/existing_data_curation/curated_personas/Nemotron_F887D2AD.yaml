  hobbies: '[''Drawing/illustration'', ''Creative writing (short stories)'', ''LEGO building'', ''Puzzle video games (e.g., Portal)'', ''Reading science-fiction and fantasy'', ''Nature walks and outdoor
    sketching'', ''Basic electronics kits (Snap Circuits)'']'
  career_goals: Roger aspires to blend his love of art and abstract ideas into a career that lets him create immersive visual experiences. He hopes to attend a specialized arts high school and later study
    visual arts and computer science, aiming to become a concept artist or multimedia storyteller for video games or graphic novels. He also harbors a curiosity about scientific subjects, especially astronomy,
    and dreams of producing educational illustrations that make complex concepts accessible to younger audiences.
