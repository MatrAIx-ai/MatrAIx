personas:
  professional: Roger Buchanan, an aspiring young technologist and imaginative illustrator, blends methodical planning with boundless creativity by designing intricate LEGO models and building Snap Circuit
    projects, hinting at a future career in game design or robotics engineering.
  sports: Roger Buchanan, who lives on the outskirts of Portland, Oregon, cheers for the Portland Trail Blazers and the Portland Timbers while participating in his middle school's cross-country club, preferring
    solitary trail runs through the pine woods over organized team sports.
  arts: Roger Buchanan, who spends evenings sketching dragons inspired by the ethereal styles of Hayao Miyazaki and Brian Froud, listens to the sweeping scores of Hans Zimmer and Jeremy Soule while drafting
    short stories, and occasionally reenacts scenes from the Harry Potter films, weaving a personal tapestry of visual and auditory inspiration.
  travel: Roger Buchanan, who prefers meticulously planned weekend trips, has explored the towering redwoods of Muir Woods and the historic streets of Boston, and dreams of traveling to the aurora-lit landscapes
    of Iceland and the bustling markets of Kyoto, balancing a love for quiet nature hikes with curiosity about distant cultures.
  culinary: Roger Buchanan, who enjoys crafting a perfect pepperoni pizza from scratch with fresh mozzarella and oregano, experimenting with miso-seasoned ramen broth, and baking chocolate chip cookies,
    shows a budding kitchen confidence while still favoring the occasional snack of gummy bears during marathon gaming sessions.
  core: Roger Buchanan, a solitary dream-weaver, channels boundless imagination into detailed sketches and Snap Circuit inventions, yet can be stubbornly forgetful about chores and tends to binge-play puzzle
    games late into the night.
background:
  cultural: Roger was raised in Athens, Alabama, a small Southern town with strong community ties. His family follows traditional Southern Baptist practices, attends weekly services, and participates in
    local events such as church picnics and county fairs. Southern cuisine, like fried chicken and pecan pie, and regional music, including country and bluegrass, are part of his upbringing. While football
    dominates much of the local high school culture, Roger prefers quieter activities. The surrounding rural landscape, pine forests, and proximity to the Tennessee River have fostered an appreciation for
    nature. This background gives him a sense of belonging and respect for family, while his personal interests push him toward exploring broader artistic and intellectual horizons.
attributes:
  skills: '[''Digital illustration'', ''Traditional drawing (pencil, charcoal)'', ''Creative writing and storytelling'', ''Basic coding in Scratch'', ''Logical puzzles (chess, Sudoku)'', ''Organizational
