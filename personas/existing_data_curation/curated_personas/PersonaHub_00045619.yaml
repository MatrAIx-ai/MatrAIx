persona_description: A naval historian and archaeologist who specializes in the study of Civil War-era naval vessels, particularly those that played significant roles in the history of the United States.
  They have a deep interest in the history and operations of the USS Planter, which was a Confederate warship that was commandeered by Robert Smalls in 1862 and subsequently used by the U.S. Navy as a dispatch
  and supply vessel. They have a passion for diving and have conducted extensive underwater archaeology investigations in the vicinity of the wreck of the USS Planter, which has been reported to be located
  at the southern tip of Cape Island off the coast of South Carolina. They are skilled in using advanced technologies such as side-scan sonar and are equipped with the knowledge and expertise to interpret
  the findings from these investigations.
