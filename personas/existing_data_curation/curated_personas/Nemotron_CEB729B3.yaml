personas:
  professional: Katherine Tiser, a front‑desk operations coordinator with a talent for juggling phone traffic and visitor logs, relies on their love of routine and personable demeanor to create a welcoming
    office atmosphere, even as their occasional disorganization pushes them to design more systematic workflows as they work toward an Office Manager role.
  sports: Katherine Tiser energizes their fitness routine with twice‑weekly Zumba classes, cheers on the Arkansas Razorbacks during college football season, follows the St. Louis Cardinals for baseball,
    and participates in a community garden walking club that doubles as light cardio on weekends.
  arts: Katherine Tiser channels their creative spirit through a local book club where they discuss works by Toni Morrison, delights in quilting patterns inspired by William Morris, and enjoys the soulful
    sounds of Dolly Parton and the folk harmonies of The Avett Brothers during evenings at the community arts center.
  travel: Katherine Tiser prefers low‑key group tours, having explored Asheville’s art scene and Savannah’s historic squares, they dream of a Mediterranean cruise to soak in coastal heritage while managing
    their travel budget by staying with friends and using reward points.
  culinary: Katherine Tiser’s culinary repertoire showcases Southern comfort dishes like chicken‑and‑dumplings, collard greens sautéed with smoked ham, and buttery cornbread, which they refine in weekly
    cooking classes and enjoy sharing at potluck gatherings with friends.
  core: Katherine Tiser balances a warm, community‑focused front‑desk career with a penchant for routine and occasional chaos, nurturing friendships through gardening and Zumba while wrestling with persistent
    worry and a sweet spot for Southern comfort food.
background:
  cultural: Katherine grew up in a small town in the American South and identifies as white. Raised in a Protestant (Baptist) environment, she internalized Southern hospitality, community involvement, and
    traditional family values. Her upbringing emphasized practical manners, respect for routine, and participation in church activities. She celebrates holidays such as Thanksgiving and the Fourth of July
    with community gatherings and enjoys regional dishes like fried chicken, barbecue, and pecan pie. Living in Bentonville, Arkansas, has reinforced her connection to local customs, a preference for familiar
    social rituals, and a courteous, down‑to‑earth demeanor.
