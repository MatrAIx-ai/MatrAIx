  career_goals: Katherine aims to move into a supervisory administrative role, such as Office Manager or Front‑Desk Supervisor, within the next three years. She plans to complete an associate degree in
    Business Administration and obtain a certification in Office Management to strengthen her qualifications. Additionally, she wants to develop more robust organizational systems to reduce her own stress
    and improve overall efficiency. In the long term, she hopes to mentor new reception staff, contribute to a supportive and low‑stress workplace culture, and possibly explore part‑time consulting for
    small businesses on front‑desk best practices.
