  hobbies: '["Book Club", "Community Theater", "Volunteer Work", "Hiking", "Gardening", "Cooking", "Knitting", "Rodeo Attendance", "Yoga", "Meditation"]'
  career_goals: Kristen aims to re‑enter the workforce in a role that merges her educational expertise with community development. She envisions becoming a program director for a local nonprofit or a freelance
    curriculum consultant, creating lifelong‑learning workshops for adults, seniors, and underserved youth in Cheyenne. To enhance her credentials, she plans to obtain a certification in instructional design
    and to build a portfolio of community‑based learning initiatives. Her long‑term ambition is to mentor new teachers, shape inclusive educational policies at the municipal level, and achieve a balanced
    work schedule that mitigates stress while allowing her to contribute meaningfully to her community.
