  Best Generated Conversation: 'User 1: I love shopping.

    User 2: I don''t. I''m lazy and it''s too much work.

    User 1: I guess it can be hard, but I enjoy finding new things.

    User 2: I guess I could see that. I just don''t like spending money.

    User 1: I don''t mind spending money on things I like.

    User 2: I used to be like that, but then I realized that I was spending way too much.

    User 1: I know what you mean. It''s easy to get carried away.

    User 2: So, what do you like to buy when you''re shopping?

    User 1: I like to buy clothes, shoes, and makeup.

    User 2: I don''t really wear makeup.

    User 1: Me neither, but I like to look good.

    User 2: I guess I could see that. I just don''t care about how I look.

    User 1: Well, I do. I like to feel good about myself.

    User 2: That''s fair. I guess I just don''t have the same priorities.

    User 1: That''s okay. Everyone is different.

    User 2: Yeah. So, what else do you like to do besides shopping?

    User 1: I like to go to the pool.

    User 2: I don''t like the pool.

    User 1: Why not?

    User 2: I''m not a very good swimmer.

    User 1: You could always take lessons.

    User 2: I don''t really want to.

    User 1: Well, I love the pool. I go every Thursday for three hours.

    User 2: That''s a lot of time to spend in the pool.

    User 1: I know, but I love it. It''s so relaxing.

    User 2: I guess I could see that. I just don''t like getting wet.

    User 1: Well, you don''t have to swim if you don''t want to. You could just sit on the edge and relax.

    User 2: I might try that.

    User 1: You should! It''s really nice.

    User 2: Okay. I''ll see.

    User 1: Good! I''m sure you''ll like it.'
