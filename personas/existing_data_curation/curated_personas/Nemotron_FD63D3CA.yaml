  career_goals: Guo aims to move into a senior sales leadership role within the next three to five years, targeting a regional sales director position that oversees a team of account managers. He wishes
    to specialize in sustainable and eco‑friendly manufacturing solutions, using his creative mindset to develop innovative go‑to‑market strategies. Long‑term, he dreams of launching his own boutique distribution
    company that bridges U.S. retailers with Southeast Asian producers of ethically sourced goods, integrating artistic branding and storytelling. Alongside professional advancement, Guo prioritizes work‑life
    balance and seeks mentorship and leadership training to better manage stress and improve organizational skills.
