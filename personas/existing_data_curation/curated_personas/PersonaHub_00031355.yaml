persona_description: A scientist or researcher who specializes in the study of insect vision and its impact on the evolution of plant colors. This person is likely to be interested in the wide range of
  flowers in Bjørn Rørslett's UV and infrared catalogue and the Proceedings of the Royal Society B study. They would be fascinated by the idea of insects seeing the world differently from humans and how
  this influences the distribution of pollen by plants. They would also be curious about the parallel evolution of angiosperm color signals and how this is linked to hymenopteran vision.
