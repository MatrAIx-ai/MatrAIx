personas:
  professional: Catrina Harris blends a STEM background with HR expertise to craft data‑driven talent strategies, using advanced Excel and basic SQL to forecast workforce needs, design structured onboarding
    frameworks, and lead DEI initiatives, while their assertive yet compassionate communication style makes them a sought‑after speaker at SHRM events and a mentor within the Kentucky Women in Business
    network.
  sports: Catrina Harris stays active by hiking the Natural Bridge State Park trails on weekends, attending weekly yoga and Pilates sessions, and supporting the Kentucky Wildcats basketball team while participating
    in the Lexington Trail Runners club for occasional 5K races.
  arts: Catrina Harris enjoys evenings at local jazz nights featuring Wynton Marsalis and bluegrass festivals honoring Bill Monroe, while the neighborhood book club they co‑host delves into contemporary
    fiction by Sally Rooney and professional development titles by Brené Brown, shaping their appreciation for storytelling and cultural rhythm.
  travel: Catrina Harris prefers meticulously planned weekend getaways to places like Asheville, NC and Nashville, TN for music and food, while dreaming of a spring wine tour through Bordeaux, France, balancing
    a love for adventure with family and professional commitments.
  culinary: Catrina Harris experiments in the kitchen with Southern comfort dishes such as shrimp and grits, bourbon‑glazed carrots, and pecan pie, pairing each with carefully chosen wines like a buttery
    Chardonnay or a robust Zinfandel, and often shares these meals at community gatherings after a successful garden harvest.
  core: Catrina Harris is a methodical HR strategist who channels their love for community, garden order, and Southern flavors into a balanced life of data‑driven decisions, structured planning, and lively
    social gatherings, though they sometimes forget to schedule routine health check‑ups.
background:
  cultural: 'Catrina grew up in a middle‑class family in Fort Thomas, Kentucky, a suburban community of the Cincinnati metropolitan area. Her upbringing reflects a blend of Southern hospitality and Midwestern
    pragmatism: polite, community‑focused, and practical. Raised in a Protestant (Baptist) household, she participated in church activities and local school events, valuing education and hard work. The
    region’s strong sense of community, love of outdoor recreation, and appreciation for Southern cuisine have shaped her interests in hiking, gardening, and cooking. While rooted in traditional values,
    Catrina embraces progressive ideas, especially around diversity, equity, and inclusion, reflecting the evolving cultural landscape of modern Kentucky.'
attributes:
  skills: '["Talent acquisition", "Employee relations", "Performance management", "HRIS implementation and administration", "Compliance and labor law expertise", "Training and development program design",
    "HR analytics and workforce planning", "Organizational development", "Conflict resolution", "Project management", "Strategic HR partnership", "Leadership coaching", "Policy development", "Public speaking
    and communication", "Advanced Excel and basic SQL for HR reporting"]'
  hobbies: '["Gardening (raised‑bed vegetable and herb garden)", "Hiking on Natural Bridge State Park trails", "Volunteering at the Fort Thomas Food Bank and organizing community charity drives", "Co‑hosting
    a neighborhood book club focused on contemporary fiction and professional development", "Cooking Southern comfort food and experimenting with wine pairings", "Attending local jazz nights and bluegrass
    festivals", "Practicing yoga and Pilates twice weekly", "Mentoring emerging HR professionals through the Kentucky Women in Business network"]'
  career_goals: Catrina aims to earn the SHRM Senior Certified Professional (SHRM‑SCP) credential within the next two years and to advance to a Director of Human Resources role in a regional midsize company.
    She plans to lead a digital transformation of HR processes, integrating AI‑driven recruitment tools and robust analytics dashboards. Elevating DEI initiatives to achieve measurable gains in employee
    engagement scores is a top priority, as is launching a mentorship program that pairs senior leaders with early‑career talent. She aspires to become a recognized thought leader, speaking at national
    HR conferences, publishing articles for SHRM, and eventually consulting with small‑to‑medium enterprises across Kentucky to improve their HR practices.
