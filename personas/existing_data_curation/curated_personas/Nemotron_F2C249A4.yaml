  hobbies: '[''drawing and watercolor painting'', ''reading adventure and science books'', ''exploring nature and birdwatching'', ''collecting shells and rocks'', ''listening to Argentine folk and tango
    music'', ''dancing'', ''cooking traditional Argentine dishes with family'', ''playing with friends'', ''Minecraft creative mode'', ''basic Scratch programming'']'
  career_goals: Maylen dreams of turning her love for art and nature into a future career. She imagines becoming a wildlife illustrator or an environmental educator who uses her drawings to teach others
    about the Everglades and Argentine wildlife. She also hopes to travel, learn new cultures, and perhaps open a small studio where she can create and share paintings inspired by both her Argentine heritage
    and the Florida landscape. While she enjoys learning about marine biology, she is open to exploring other creative fields, such as graphic design or food art, that blend her artistic skills with her
    curiosity for new ideas.
