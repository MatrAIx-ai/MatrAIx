personas:
  professional: Maylen Herrera channels a budding naturalist’s curiosity and artistic flair into detailed watercolor sketches of Everglades wildlife, using a love of science and adventure to power classroom
    projects and to design vibrant Minecraft biomes for friends.
  sports: Maylen Herrera plays for a neighborhood youth soccer club on Saturdays, cheers for the Miami Heat’s fast breaks and the Miami Dolphins on Sundays, and treats weekend hikes through the Everglades—complete
    with birdwatching pauses—as her personal cardio routine.
  arts: Maylen Herrera’s artistic spirit is nurtured by listening to the dramatic accordion riffs of Astor Piazzolla, dancing to folk singer Mercedes Sosa, drawing inspiration from wildlife illustrator
    Guy Coheleach, and watching animated films by Hayao Miyazaki, which together fuel her Scratch animation experiments.
  travel: Maylen Herrera has explored the mangrove canals of the Everglades on family weekend trips and spent sunny days at Miami Beach, while dreaming of trekking Patagonian glaciers, snorkeling the Galápagos
    Islands, and strolling through the historic streets of Buenos Aires.
  culinary: Maylen Herrera loves the doughy crunch of homemade empanadas filled with succulent local shrimp, the bright tang of key lime pie, and experiments by adding sweet plantains to traditional milanesa,
    all while happily chopping cilantro and saffron for a fragrant chimichurri sauce.
  core: Maylen Herrera is a curious ten‑year‑old who blends watercolor wildlife sketches, Minecraft adventures, and family folk rhythms into a lively, slightly disorganized but passionately creative life,
    and they approach each new project with boundless enthusiasm.
background:
  cultural: Maylen comes from an Argentine immigrant family that settled in Immokalee, Florida. At home she speaks Rioplatense Spanish, celebrates Argentine holidays such as Día de la Independencia (July
    9) and Carnaval, and enjoys traditional foods like asado, empanadas, and dulce de leche. The family maintains cultural ties through music, dance, and storytelling, passing down values of community,
    resilience, and a love for the outdoors. Living in Immokalee, a community with a strong agricultural and migrant-worker presence, Maylen also experiences a blend of cultures, including Hispanic, Haitian,
    and local Floridian influences. This multicultural environment enriches her perspective, fostering an appreciation for diverse experiences and fostering her open-minded, unconventional thinking.
attributes:
  skills: '[''bilingual Spanish-English'', ''sketching and watercolor painting'', ''basic Scratch programming'', ''introductory biology and ecology knowledge'', ''storytelling and oral communication'',
