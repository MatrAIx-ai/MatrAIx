  career_goals: Although retired, Antonia aims to create a cross‑disciplinary exhibition that merges her scientific background with abstract visual art, culminating in a gallery show in Phoenix. She aspires
    to author a book that weaves personal reflections on scientific themes with her artwork, and to mentor at a local community college's STEM outreach program for seniors. Additionally, she plans to master
    a new digital art platform such as Blender to produce a short animated film exploring concepts of time and memory, and to lead a community 'Science Meets Art' program in Sun City West.
