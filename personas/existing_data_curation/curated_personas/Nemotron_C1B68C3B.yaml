personas:
  professional: My Kim, a senior supervisor in personal care services with over two decades of experience, leverages an analytical, data‑driven mindset and a practical curiosity to streamline staffing schedules,
    implement telehealth pilots, and mentor staff while fiercely pursuing top quality metrics and preparing for a health‑administration master’s to become a regional director.
  sports: My Kim enjoys hiking the Nebraska Sandhills and joining the local senior center’s walking club in the spring, cheering for the Nebraska Cornhuskers football team while also following the Chicago
    Bulls in the NBA, and participates in a weekend tai‑chi class that balances their need for solitary reflection with low‑impact fitness.
  arts: My Kim practices traditional calligraphy inspired by historic masters, finds solace in the serene works of Japanese garden designer Shigeru Ban, regularly attends Korean cultural festivals featuring
    performances by K‑pop group BTS and folk dancer Jin‑Rae Lee, and unwinds by listening to pianist Ludovico Einaudi’s emotive pieces during evenings of puzzle solving.
  travel: My Kim plans trips with meticulous spreadsheets, preferring a blend of adventure and relaxation such as a summer road‑trip through the Badlands followed by a cultural immersion week in Busan,
    South Korea, while keeping an eye on flight‑deal alerts and balancing travel costs against family responsibilities.
  culinary: My Kim’s culinary repertoire showcases expertly fermented kimchi made with napa cabbage, gochujang, garlic, and radish, succulent bulgogi marinated in soy sauce, sesame oil, and pear, alongside
    garden‑fresh salads of heirloom tomatoes and basil, reflecting a high‑level cooking skill that merges traditional Korean flavors with locally sourced Midwestern produce.
  core: My Kim blends a competitive drive for operational excellence with a love for solitary hikes, experimental kitchen science, and a cautious optimism that sometimes translates into skeptical but data‑backed
    decisions across work and life.
background:
  cultural: My Hlei is a second-generation Korean American who grew up in the Midwest, speaking both Korean and English at home. She embraces Korean traditions such as Chuseok, Seollal, and Korean food
    preparation, while also participating fully in American holidays and community life in Lincoln, NE. Her cultural identity emphasizes respect for elders, education, and collective well-being, which she
    blends with the individualistic and pragmatic values of her Midwestern environment. Active in a local Korean church and cultural association, she navigates a bicultural life that informs her professional
    focus on culturally responsive personal care.
