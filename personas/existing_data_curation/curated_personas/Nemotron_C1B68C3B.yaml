  career_goals: Looking ahead, My Hlei aims to obtain a Master's in Health Administration to qualify for a regional director role overseeing multiple senior-care facilities. She is determined to lead a
    pilot program that integrates telehealth tools into home-care services, improving accessibility for clients while maintaining cost-effectiveness. Her competitive drive pushes her to achieve top-tier
    quality metrics and low staff turnover rates. Additionally, she aspires to mentor the next generation of supervisors, establish a community outreach partnership linking the Korean immigrant community
    with local senior resources, and eventually launch a consultancy focused on culturally responsive care models.
