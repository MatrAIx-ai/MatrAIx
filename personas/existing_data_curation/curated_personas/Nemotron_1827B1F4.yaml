  career_goals: He plans to obtain his GED within the next year, then enroll in the associate‑degree program in Graphic Design at York County Community College. In the short term, he aims to build a professional
    portfolio, master advanced design tools such as Illustrator, and secure a part‑time internship or apprenticeship with a local design studio, museum, or cultural nonprofit. His long‑term ambition is
    to earn a bachelor's degree in Visual Communication, work as a visual designer for a museum or community arts organization, and eventually lead creative projects that blend art, technology, and community
    engagement. He remains open to pursuing a career in web or UX design if relevant opportunities arise.
