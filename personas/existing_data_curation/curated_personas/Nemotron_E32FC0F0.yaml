  career_goals: Maksim dreams of turning his love for gaming and technology into a future where he creates interactive experiences that bring people together. He envisions becoming a video‑game developer
    or a software engineer focused on multiplayer platforms. He also hopes to work on community‑focused tech projects, like coding workshops for younger kids in his neighborhood, blending his desire to
    help others with his practical skill set. In the longer term, he sees himself leading a start‑up that designs accessible educational games or civic‑tech tools for local schools. He is also open to exploring
    roles that combine his love of sports and tech, such as developing apps for youth sports leagues. Throughout, he wants a career that balances creative invention with tangible benefits for his community.
