personas:
  professional: Maria Caraballo is a retired community facilitator who channels her meticulous budgeting skills and bilingual fluency into organizing senior‑center cultural workshops, coordinating volunteer
    schedules, and preserving family histories with disciplined precision, and they always double‑check every deadline.
  sports: Maria Caraballo follows a disciplined daily walking routine of about two miles around the neighborhood, occasionally joins a senior‑friendly gentle yoga class at the community center, and avidly
    supports the local minor‑league baseball team, the Springfield Sluggers, cheering from their usual seat near the snack bar.
  arts: Maria Caraballo finds solace in classic folk ballads from their youth, regularly tunes in to radio programs featuring artists like José José and Lila Downs, and collects vintage postcards of historic
    landmarks, which they display on a mantelpiece in the living room.
  travel: Maria Caraballo prefers low‑key travel, planning trips with a detailed itinerary that balances visiting grandchildren in Florida, day‑tripping to the historic mission town of San Juan, and a yearly
    pilgrimage to a family gravesite in the highlands, all while budgeting carefully and avoiding spontaneous adventures.
  culinary: Maria Caraballo excels at preparing multi‑course holiday feasts featuring traditional recipes such as mole sauce, masa‑based tamales, pan de muerto, and roasted spices, meticulously measuring
    each ingredient and recording the exact proportions in a leather‑bound cookbook for future reference.
  core: Maria Caraballo blends methodical precision with a love for tradition, turning routine budgeting, gardening, and cooking into disciplined rituals while guarding a skeptical edge that sometimes makes
    them overly cautious.
background:
  cultural: Maria was born in a small town in Jalisco, Mexico, and moved to Visalia, California in her early twenties. She grew up in a devout Catholic household, where family meals, religious festivals,
    and community gatherings were central. She maintains fluency in both Spanish and English, and regularly celebrates Mexican holidays such as Día de los Muertos, Cinco de Mayo, and Las Posadas, often
    preparing authentic foods and arranging altars. Her extended family remains close, and she serves as a cultural bridge for younger relatives, ensuring that traditions, language, and values are passed
    down while adapting to life in the United States.
