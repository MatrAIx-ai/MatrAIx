personas:
  professional: Guadalupe Quezada is a meticulous veterinary assistant with over two decades of laboratory animal care experience, who blends methodical record‑keeping, bilingual communication, and a steady
    curiosity for emerging techniques while they train new staff and pursue certification and supervisory leadership.
  sports: Guadalupe Quezada follows the Las Vegas Raiders and the Vegas Golden Knights while participating in the Desert Trail Runners walking club that meets twice weekly for moderate hikes, and they incorporate
    weekly low‑impact cardio sessions to manage joint health.
  arts: Guadalupe Quezada finds artistic solace in knitting designs from yarn influencer Megan Sumer, reading historical fiction by Eduardo Galeano, listening to classical cello performances by Yo‑Yo Ma,
    and they regularly attend local cultural festivals featuring folk dance and traditional music.
  travel: Guadalupe Quezada prefers meticulously planned trips that combine gentle exploration and culinary immersion, such as weekend getaways to Sedona’s red‑rock trails, a historic market town in the
    Southwest known for vibrant farmer’s markets, and a relaxing retreat at a boutique spa in Santa Fe, and they often book well in advance to secure budget‑friendly accommodations while balancing family
    responsibilities.
  culinary: Guadalupe Quezada's culinary repertoire centers on hand‑made pupusas stuffed with cheese and loroco, slow‑cooked sopa de pata brimming with beef‑feet broth, and tamales wrapped in banana leaves,
    all seasoned with garden‑fresh cilantro, tomatillo salsa, and chayote for texture, and they often experiment with heirloom corn varieties for the masa.
  core: Guadalupe Quezada is a methodical, reserved animal‑care professional who balances a quiet love for gardening and traditional cooking, and they maintain a steadfast commitment to community service
    and lifelong learning.
background:
  cultural: Guadalupe was born to Salvadoran immigrant parents and grew up in a household where Spanish was spoken daily and Catholic traditions were observed. Family gatherings often centered around shared
    meals of pupusas and sambuca, reinforcing a strong sense of community and intergenerational support. While living in Las Vegas, she maintains close contact with relatives in El Salvador through regular
    video calls and visits during holidays. The values of resilience, hospitality, and respect for elders from her Salvadoran heritage shape her interpersonal approach, especially in her compassionate care
    for animals and collaborative work style. Guadalupe also participates in local Salvadoran cultural events, such as the annual Feria de la Primavera, where she connects with other expatriates and celebrates
    her roots while blending them with the multicultural environment of Nevada.
attributes:
  skills: '[''Animal Handling'', ''Laboratory Specimen Collection'', ''Basic Clinical Procedures'', ''Health Record Keeping'', ''Laboratory Safety Protocols'', ''Inventory Management'', ''Bilingual Communication
