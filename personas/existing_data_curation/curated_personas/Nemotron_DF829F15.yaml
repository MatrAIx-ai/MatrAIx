  hobbies: '[''Backyard Gardening'', ''Traditional Salvadoran Cooking'', ''Animal Shelter Volunteering'', ''Knitting'', ''Reading Historical Fiction'', ''Morning Desert Walks'', ''Cultural Festival Participation'',
    ''Community Church Involvement'']'
  career_goals: Guadalupe aims to earn a Certified Veterinary Assistant credential within the next year to formalize her expertise. She is interested in advancing to a supervisory role where she can lead
    a team, streamline laboratory procedures, and implement evidence‑based care standards. Additionally, she plans to enroll in part‑time courses toward an associate degree in animal health to broaden her
    knowledge base. Long‑term, Guadalupe hopes to volunteer as a coordinator for animal‑shelter outreach programs, leveraging her experience to improve animal welfare in the Salvadoran community of Las
    Vegas and mentor younger workers from similar cultural backgrounds.
