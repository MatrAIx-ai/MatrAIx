  hobbies: '["Community gardening","Cooking Southern comfort food","Church potlucks and volunteer service","Book club (mystery/historical fiction)","Hiking local nature trails","Karaoke nights (country
    music)","True‑crime podcast listening","Bridge at the community center","Volunteering at the food pantry","Hosting DIY dinner parties"]'
  career_goals: Theresa aims to move into a leadership position within the next five years, ideally as a regional sales manager overseeing a team of representatives. She wants to design and implement a
    mentorship program that helps newer sales staff develop the same balance of curiosity and practicality she values. Pursuing professional certification through the National Association of Sales Professionals
    is also on her agenda, as is obtaining a business‑related associate degree to strengthen her strategic planning skills. Long‑term, she envisions leveraging her experience to launch a small consulting
    firm that assists local businesses in improving their customer service and sales processes, thereby securing financial stability for her family and giving back to the Troy community.
