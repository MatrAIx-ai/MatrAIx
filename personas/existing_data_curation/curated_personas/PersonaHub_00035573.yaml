persona_description: A healthcare professional who is interested in the efficacy and safety of multiple vaccinations and the interactions between the component vaccines. They are likely to be familiar with
  the literature on vaccination and the various combination vaccines licensed in the United States. They may have a background in public health and epidemiology, and are interested in the long-term effects
  of vaccination on public health. They are also likely to be interested in the potential for adverse effects of vaccination and the monitoring systems used to track these effects.
