  hobbies: '[''Reading (Magic Tree House series)'', ''Drawing/sketching'', ''Building LEGO sets'', ''Solving jigsaw and logic puzzles'', ''Playing board games (Connect Four, Checkers)'', ''After‑school
    science club'', ''Ice‑skating lessons'', ''Journaling'']'
  career_goals: She dreams of a future where she can bring order and help others. Hazel is fascinated by the idea of becoming an elementary school teacher because she enjoys a predictable classroom routine
    and the chance to support children’s learning. She also imagines working as a veterinarian or a biomedical engineer, attracted by the practical problem‑solving and clear structure of caring for animals
    or designing solutions. At this stage, her ambition is to explore subjects that combine logic, care, and a well‑defined routine.
