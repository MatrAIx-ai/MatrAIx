personas:
  professional: Hazel Lott, an aspiring junior engineer with a knack for methodical problem‑solving, channels their love for structured LEGO building and after‑school science experiments into disciplined
    experimentation, while their competitive streak pushes them to dominate school science fairs and their skepticism fuels a habit of double‑checking results.
  sports: Hazel Lott, a budding ice‑skater with the junior SparkGlow Skating Club and an avid fan of the Riverdale Rangers hockey team, approaches practice with meticulous precision and a competitive edge,
    feels intense nerves before performances, and channels their skepticism about coaching advice into self‑analysis after each routine.
  arts: Hazel Lott, a devoted sketch artist who models their detailed drawings after Mary Blair’s vibrant Disney concepts, enjoys listening to the Jonas Brothers while sketching scenes from the Magic Tree
    House series, and uses their journal to translate swirling emotions into colorful artwork, occasionally becoming intensely critical of their own work.
  travel: Hazel Lott, a young explorer who favors tightly planned family trips to places like the Grand Canyon, Disneyland, and Edinburgh Castle in Scotland, creates color‑coded itineraries and uses a scrapbook
    to document each adventure, dreams of castle‑sized LEGO builds inspired by travel, yet their anxiety sometimes makes them cling to familiar routines while on the road.
  culinary: Hazel Lott, an enthusiastic home chef, loves preparing mini cheese quesadillas with sharp cheddar, whipping up macaroni and cheese with a buttery breadcrumb topping, flipping banana pancakes
    topped with maple syrup, and crafting personal pizzas sprinkled with mozzarella, fresh basil, and pepperoni, but can be picky about mushy textures, often refusing overcooked vegetables, and their precise
    measuring of ingredients satisfies their need for order.
  core: Hazel Lott is a meticulous, puzzle‑loving eight‑year‑old whose structured play and competitive spirit collide with vivid emotional waves, driving them to master LEGO mechanics, journal anxiously,
    and ice‑skate with disciplined precision.
background:
  cultural: Hazel is raised in a middle‑class white family in Minneapolis, Minnesota. Her family practices a mainstream Protestant tradition, often attending a local Lutheran church, and values community
    involvement, education, and politeness known as Minnesota nice. She participates in neighborhood activities such as the annual Minnesota State Fair, winter ice‑skating programs, and local library reading
    events. The region’s Scandinavian heritage subtly influences family meals and celebrations, and the long winters have fostered a love for indoor, structured activities like reading, crafts, and organized
    sports.
attributes:
  skills: '[''Reading (second‑grade level)'', ''Basic addition and subtraction'', ''Organizing personal items'', ''Following step‑by‑step instructions'', ''Solving puzzles (jigsaw, logic games)'', ''Using
