personas:
  professional: Jose Mendez is a 53‑year‑old front‑of‑house specialist who blends meticulous cash handling and POS expertise with a laid‑back, flexible attitude, making him a natural mentor who can calmly
    resolve staff conflicts while still improvising schedules to accommodate last‑minute changes, positioning him for a floor‑manager role.
  sports: Jose Mendez follows Liga MX and the national soccer team on TV, roots for the local MLS side Houston Dynamo and the Houston Astros, and pitches in for a weekend community soccer league with the
    "Hidalgo FC" amateur club, preferring relaxed pick‑up games to rigorous training schedules.
  arts: Jose Mendez delights in listening to classic mariachi ensembles and corrido ballads, especially the timeless riffs of Mariachi Vargas de Tecalitlán, and he spends evenings reading biographies of
    historical figures like Simón Bolívar, which deepen his appreciation for storytelling through music and literature.
  travel: Jose Mendez prefers a balanced travel itinerary that mixes planned cultural stops with spontaneous road trips, having savored the historic charm of Santa Fe's plaza, the riverfront spirit of San Antonio's
    River Walk, and the vibrant street‑food scene of Barcelona's Gothic Quarter, while dreaming of a culinary pilgrimage to a coastal town famed for its bustling markets and aromatic sauces.
  culinary: Jose Mendez is a confident home cook who whips up sizzling carne asada on the backyard grill, prepares fresh salsa with tomatillos, serrano peppers, cilantro and lime, occasionally bakes tortilla
    sheets, and pairs his dishes with cold cerveza and charred corn, though he sometimes forgets to clean the grill promptly after a lively gathering.
  core: Jose Mendez is a steady, structure‑loving yet easy‑going professional whose habit of juggling shift schedules with spontaneous grill sessions and a reluctant approach to filing receipts paints a
    picture of disciplined flexibility.
background:
  cultural: Jose is a first-generation Mexican-American whose parents immigrated from Jalisco, Mexico. Raised in Houston's vibrant Mexican community, he grew up bilingual and celebrates traditions such
    as Dia de los Muertos, Mexican Independence Day, and family gatherings centered around food and music. His cultural identity shines through his pride in traditional Mexican cuisine, Catholic customs,
    and strong family values, while he also embraces the broader Texan environment of Harris County.
attributes:
  skills: '[''Customer service'', ''Bilingual communication (Spanish/English)'', ''Cash handling and POS operation'', ''Food safety and hygiene'', ''Shift scheduling and staff coordination'', ''Conflict
    resolution'', ''Upselling and menu knowledge'', ''Basic culinary preparation'', ''Inventory management'']'
  hobbies: '[''Cooking traditional Mexican dishes'', ''Watching soccer (Liga MX, Mexican national team)'', ''Reading historical biographies'', ''Gardening (herbs and chilies)'', ''Listening to mariachi
    and corrido music'', ''Volunteering at church food pantry'']'
  career_goals: Jose aims to move from his current front-of-house role to a supervisory position such as floor manager within the next couple of years, using his organizational strengths and experience
    mentoring staff. He also dreams of eventually opening a modest family-run taqueria that showcases authentic Mexican flavors while providing a stable schedule for his family. In the long term, he hopes
    to become a trusted consultant for local restaurants on service efficiency and to mentor younger workers in the industry.
