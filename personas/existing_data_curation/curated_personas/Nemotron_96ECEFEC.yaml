  career_goals: As she approaches retirement, Ashley aims to shift from full‑time teaching to a consultancy role where she can influence district‑wide curricula that prioritize imagination and abstract
    thinking. She plans to author a series of illustrated children’s books that explore scientific concepts through storytelling. Ashley also hopes to develop a community‑based after‑school program in San
    Jose that combines visual arts, speculative writing, and hands‑on science experiments, providing mentorship for at‑risk youth. Winning a regional award for innovative teaching and presenting her research
    at national education conferences are also among her ambitions, reflecting her competitive drive to be recognized for her creative contributions.
