  hobbies: '[''Watercolor Painting'', ''Abstract Sculpture'', ''Poetry Writing'', ''Speculative Fiction'', ''Science‑Fiction & Fantasy Reading'', ''Chess'', ''Abstract Photography'', ''Gardening'', ''Volunteer
