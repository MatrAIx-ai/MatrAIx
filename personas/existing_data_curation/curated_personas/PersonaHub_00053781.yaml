persona_description: A highly qualified and experienced educator who is knowledgeable about the Common Core State Standards (CCSS) and has a deep understanding of the potential for authentic implementation
  of these standards. This individual is passionate about education and has a strong background in curriculum design, instructional methods, and assessment strategies. They have experience in working with
  diverse schools and districts and have a keen interest in alternative approaches to implementing the CCSS that focus on student-based inquiry and formative assessment. This person is also knowledgeable
  about the potential challenges and pitfalls of packaged instructional programs and summative tests associated with the English language arts (ELA) standards, and has a solution-oriented mindset.
