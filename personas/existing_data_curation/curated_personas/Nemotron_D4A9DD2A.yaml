  hobbies: '[''digital drawing'', ''creative writing'', ''playing piano'', ''reading speculative fiction'', ''chess'', ''solving sudoku'', ''3D modeling with Blender'', ''nature sketching'', ''DIY electronics
    (Arduino)'', ''participating in small art workshops'']'
  career_goals: Shane aims to gain admission to a specialized high‑school program with a strong visual‑arts focus, where he can refine his illustration and storytelling skills. He plans to develop a robust
    portfolio that showcases concept art, graphic novels, and small indie game prototypes, targeting scholarships for a BFA in Illustration or a degree in Game Design. Long‑term, Shane envisions working
    as a concept artist for an indie game studio, eventually founding his own small studio that creates narrative‑driven, visually distinctive games. He also hopes to publish a graphic novel that melds
    speculative fiction with his unique visual style, and he seeks opportunities to compete in national art competitions to gain broader recognition.
