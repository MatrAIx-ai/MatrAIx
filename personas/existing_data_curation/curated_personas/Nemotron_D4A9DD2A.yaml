personas:
  professional: Shane Robinson, a 15‑year‑old digital illustrator and aspiring game developer, channels their vivid imagination and methodical planning into intricate character designs and polished Blender
    environments, while their competitive streak fuels participation in online art challenges and their reserved nature drives a preference for solo creative work.
  sports: Shane Robinson enjoys jogging along the Ohio River and shooting hoops at the school gym, follows the Cleveland Browns and Cleveland Guardians with fervor, and plays for a local youth soccer club
    where they apply strategic, chess‑like thinking to game tactics, but their reserved personality makes them favor low‑impact solo workouts over crowded team sports.
  arts: Shane Robinson immerses themselves in the world of indie animation from Studio Ghibli and Laika, draws inspiration from digital artists like Loish and Sakimichan, and finds solace in practicing
    Chopin’s Nocturnes and Debussy’s Claire de Lune on piano, allowing these influences to shape every character sketch, 3D model, and atmospheric landscape they create.
  travel: Shane Robinson prefers meticulously planned short trips, having explored the Art Institute of Chicago, taken a museum‑filled weekend in Washington, D.C., and backpacked through Asheville’s Blue
    Ridge Mountains, while dreaming of a future immersive journey to Tokyo’s Akihabara district and Iceland’s Reykjavik to experience vibrant art scenes and natural wonders.
  culinary: Shane Robinson, an eager home cook, gravitates toward bold flavors such as spicy tuna rolls, pepperoni pizza, and aromatic ramen broth, often mastering straightforward comfort meals like grilled
    cheese with tomato soup or creamy mac and cheese, while occasionally tackling ambitious weekend projects like rolling fresh sushi or crafting homemade gnocchi.
  core: Shane Robinson is a quietly ambitious teen who balances a competitive drive with a love for solitary creativity, obsessively hoarding unused sketchbooks, staying up late perfecting art, and constantly
    seeking novel tech to fuel their imagination.
background:
  cultural: Shane grew up in a middle‑class, white family in Louisville, Kentucky, where Southern hospitality and Midwestern practicality intersect. His heritage includes German and Irish roots, and his
    parents emphasized discipline, education, and self‑reliance. Local traditions such as the Kentucky Derby, bourbon heritage, and community festivals have shaped his appreciation for regional history,
    while the city's vibrant arts scene—museums, street murals, and indie music venues—has nurtured his creative pursuits. He regularly visits the Speed Art Museum and attends library events that expose
    him to diverse artistic mediums. Though he enjoys the quiet of solitary work, Shane values the close‑knit friendships formed in small art clubs and local hobby groups, reflecting the collaborative yet
    individualistic spirit of his hometown.
attributes:
