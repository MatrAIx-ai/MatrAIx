persona_description: A poultry farmer who is interested in improving the health and performance of broiler chickens through the use of probiotics, phytogenic feed additives, and other management practices.
  They are looking for ways to reduce the incidence of necrotic enteritis, a common disease in broiler chickens caused by the accumulation of indigestible dietary protein in the intestinal tract. They are
  seeking information on the factors influencing the development of necrotic enteritis, including the impact of diet on protein digestibility and the role of probiotics and other supplements in reducing
  the negative effects of coccidial infection and mycotoxin exposure.
