  career_goals: Although retired from formal work, Diana’s ambitions focus on staying active and useful in her community. She aims to maintain her health and independence so she can continue supporting
    her family, especially by teaching her grandchildren traditional recipes and gardening techniques. She hopes to document her life stories and family history in a memoir that can preserve local memories
    for future generations. Diana also aspires to mentor new volunteers at the senior center, fostering a sense of belonging and continuity in Sultan's close‑knit community.
