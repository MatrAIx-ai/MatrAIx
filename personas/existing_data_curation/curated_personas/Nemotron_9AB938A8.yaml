  career_goals: Gabriel aims to enroll in a community college or art institute to study graphic design or animation, eventually earning a bachelor's degree in visual communication. He aspires to become
    a professional visual storyteller—working as a graphic designer, animator, or UI/UX designer—who creates culturally resonant work for brands and media. He hopes to launch a personal design studio that
    showcases Mexican‑American art and to use his social‑media and video‑editing skills to build a platform that amplifies underrepresented voices. Ultimately, he seeks financial independence and the ability
    to support his family while pursuing a career that blends creativity, technology, and cultural heritage.
