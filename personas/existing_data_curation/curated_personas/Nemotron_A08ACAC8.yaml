personas:
  professional: Justin Gotay, a 13-year-old self-taught comic illustrator and budding 3D modeler, channels their vivid imagination and curiosity into sketching speculative storyboards, tinkering with Arduino
    gadgets, and experimenting with Blender, yet their spontaneous nature often leads to missed deadlines and a preference for open-ended projects over rigid assignments.
  sports: Justin Gotay, a 13-year-old outdoor enthusiast who spends weekends hiking the Sonoran desert trails with a pocket-sized compass, plays on the local Phoenix youth soccer league's U-14 team, and
    avidly follows the Arizona Cardinals and Phoenix Suns, approaches fitness with a competitive edge but often prefers solo exploration over organized drills.
  arts: Justin Gotay, a 13-year-old comic-book creator who idolizes graphic-novel masters such as Alan Moore and Moebius, draws inspiration from speculative fiction novels like The Hitchhiker's Guide to
    the Galaxy, and devotes free evenings to the ambient electronic beats of Daft Punk and the cinematic scores of Hans Zimmer, shaping their artistic identity.
  travel: Justin Gotay, a 13-year-old with a love for desert landscapes, plans trips around spontaneous road trips to nearby wonders like the Grand Canyon and Sedona, enjoys weekend getaways to San Diego's
    beachfront boardwalk, and dreams of an eventual cultural immersion in Tokyo, balancing limited allowance with the desire for adventure.
  culinary: Justin Gotay, a 13-year-old who loves bold Southwest flavors, frequently whips up homemade chicken tacos with cilantro, lime, and fresh salsa, perfects a crunchy nachos bowl with jalapenos and
    melted cheddar, and enjoys snacking on trail mix with dried mango and pumpkin seeds while occasionally experimenting with 3D-printed cookie cutters for creative desserts.
  core: Justin Gotay, a 13-year-old imagination-driven tinkerer, sketches comic universes on school margins, builds Arduino contraptions that sometimes short-circuit, hoards stray rocks from desert hikes
    for art projects, and habitually forgets to charge their tablet before a deadline, embodying a blend of creative brilliance and lovable disorganization.
background:
  cultural: Justin grew up in a middle‑class family in Phoenix, Arizona. His household reflects typical suburban American culture with an emphasis on education, community involvement, and outdoor recreation.
    The desert landscape and Southwestern climate have shaped his appreciation for natural textures and open skies, which appear in his artwork. He celebrates mainstream American holidays and also participates
    in local events such as the Phoenix Art Festival. His family’s European roots (e.g., Irish and German ancestry) occasionally surface in family recipes and stories, adding a subtle multicultural layer
    to his upbringing.
