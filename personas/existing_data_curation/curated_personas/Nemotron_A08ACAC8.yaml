  career_goals: Justin dreams of turning his imagination into a career that merges art and technology. He envisions becoming a video‑game concept artist or a creative technologist who designs interactive
    experiences. He is also intrigued by architecture or industrial design, where he could shape tangible environments. In the short term, he aims to build a portfolio of illustrations and small coding
    projects, attend a summer youth art‑tech camp, and possibly create a YouTube channel to share his creations. He hopes this will open doors to mentorships and eventually a college degree in a creative
    field.
