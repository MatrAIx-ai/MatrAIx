  career_goals: She aims to turn her passion for art and community into a sustainable career, seeking roles that combine creative programming with people‑focused engagement. Sandra’s primary ambition is
    to become a community arts coordinator or creative outreach manager for a nonprofit or municipal cultural program in Austin, where she can design inclusive events, pop‑up exhibitions, and interactive
    workshops that celebrate diverse artistic expression. In the longer term, she hopes to launch her own pop‑up art space that doubles as a community hub, offering workshops, live performances, and a platform
    for emerging local artists. She also aspires to develop a freelance consulting practice that helps small businesses and cultural organizations craft authentic, audience‑centric storytelling through
    social media and experiential events. Flexibility and spontaneity are essential to her vision, so she prefers positions that value creativity over rigid deadlines.
