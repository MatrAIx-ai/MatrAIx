persona_description: A researcher at St. Michael's Hospital who specializes in mapping and analyzing the prevalence of diabetes in different neighbourhoods of Peel, Ontario. The persona is knowledgeable
  about the factors that contribute to the high rates of diabetes in Peel, including neighbourhood design and ethnic backgrounds, and is interested in developing strategies to improve the overall health
  of the region. The persona has a strong interest in understanding the impact of built environment on health and is working with Peel Public Health and the region's Planning Department to influence policies
  and processes to create healthy, walkable cities.
