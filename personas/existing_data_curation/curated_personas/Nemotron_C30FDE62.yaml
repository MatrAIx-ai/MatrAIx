personas:
  professional: Maria Moreno is an aspiring concept artist and graphic design student whose vivid imagination fuels experimental digital illustrations, while their competitive streak drives them to chase
    art contests and freelance gigs, even though a relaxed approach to deadlines sometimes leaves their portfolio a bit disorganized.
  sports: Maria Moreno enjoys solitary hikes along Chicago’s suburban nature trails, captures abandoned structures with their camera, follows the Chicago Bulls and Chicago Fire, and participates in occasional
    pick‑up basketball games at community courts, preferring low‑key fitness over organized team sports.
  arts: Maria Moreno engages in sketching, mixed‑media collages, and generative Python art while listening to experimental electronic musicians like Aphex Twin and Arca, draws inspiration from magical realism
    authors such as Gabriel García Márquez, and shares their work in intimate storytelling circles and small‑group workshops.
  travel: Maria Moreno prefers weekend road trips to the Great Lakes shoreline and the New Mexico desert, where they photograph weathered architecture and practice plein‑air sketching, planning trips on
    a shoestring budget and avoiding crowded tourist hubs in favor of quiet, off‑beat locales.
  culinary: Maria Moreno experiments with traditional Mexican dishes like chilaquiles and pozole, adding modern plating techniques and unexpected ingredients such as edible flowers and smoked salts, and
    enjoys cooking as a tactile extension of their visual art practice.
  core: Maria Moreno blends a boundless creative imagination with a relaxed, occasionally disorganized work ethic, turning solitary sketching sessions into bold, culturally infused art while fiercely competing
    for recognition.
background:
  cultural: Maria grew up in a bilingual Mexican-American household in Lemont, Illinois. Her parents immigrated from Veracruz, bringing traditions such as Día de los Muertos altars, quinceañera celebrations,
    and a love for regional cuisine, all of which have shaped her aesthetic sensibility. She maintains strong ties to the local Hispanic community, attending cultural festivals, volunteering at a community
    center that offers Spanish-language art classes, and integrating Mexican folk motifs—like papel picado and vibrant color palettes—into her own artwork. At the same time, she navigates Midwestern American
    culture, blending the two worlds in a unique, hybrid identity that informs both her creative output and her personal worldview.
attributes:
  skills: '[''Digital illustration'', ''Watercolor painting'', ''Charcoal sketching'', ''Creative writing'', ''Research and synthesis'', ''Bilingual Spanish-English communication'', ''Photography composition'',
