  hobbies: '[''Sketching in a journal'', ''Reading speculative and magical realism literature'', ''Listening to experimental electronic music'', ''Urban and nature photography'', ''Mixed-media collages'',
    ''Cooking Mexican dishes with artistic plating'', ''Participating in small art workshops'', ''Developing simple narrative game prototypes'']'
  career_goals: Maria aspires to turn her passion for visual storytelling into a professional career. In the short term, she plans to enroll in a community college art program to build a formal portfolio
    and earn an associate's degree in graphic design. She aims to secure internships or freelance assignments that let her experiment with concept art for indie video games and illustration for culturally-focused
    children's books. Long-term, Maria dreams of earning a BFA, establishing herself as a concept artist for a studio that values experimental aesthetics, and eventually curating exhibitions that blend
    Mexican folk motifs with contemporary digital media. She is competitive and seeks recognition through art contests, scholarships, and online platforms, hoping to become a respected voice in the cross-cultural
    art community.
