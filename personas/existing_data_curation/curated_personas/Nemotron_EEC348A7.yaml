  hobbies: '[''Art gallery visits'', ''Live jazz concerts'', ''Museum tours'', ''Bridge'', ''Gardening'', ''Walking in parks'', ''Reading biographies'', ''Historical non‑fiction'', ''Vintage cooking'',
    ''Attending cultural festivals'']'
  career_goals: Even at 91, Lawrence aims to leave a lasting legacy by documenting his memoirs and the cultural history of McKinney, Texas. He aspires to expand his volunteer work with the local arts council,
    curate community exhibitions, and mentor emerging artists and historians. Lawrence also hopes to secure a small scholarship fund for seniors pursuing continuing education, reflecting his lifelong belief
    in curiosity and lifelong learning.
