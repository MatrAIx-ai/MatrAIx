personas:
  professional: Michael Satterly, a retired civil engineer turned marine craft specialist, leverages their analytical precision, skeptical mindset, and competitive drive to meticulously restore a 1950s
    wooden fishing boat while mentoring local high‑school robotics teams and documenting the process with rigorous technical drafts and clear documentation.
  sports: Michael Satterly, a dedicated member of the Amelia Island Yacht Club, spends mornings sailing, follows the Jacksonville Jaguars for football, the Tampa Bay Rays for baseball, and joins a weekly
    dune‑walking fitness group that keeps them active without the intensity of competitive sports.
  arts: Michael Satterly cultivates a quiet artistic side through sunrise coastal photography inspired by Ansel Adams, collects vintage prints of Winslow Homer’s seascapes, and listens to folk legends like
    Joan Baez and the mellow piano works of Erik Satie while reading historical nonfiction, which they find as a soothing complement to their technical mind.
  travel: Michael Satterly prefers low‑key, well‑planned trips to historic seaside towns, having explored Charleston, Savannah, the Bahamas, and a sailing cruise to Bermuda, while dreaming of a Mediterranean
    voyage to study traditional boatbuilding in the Adriatic, which they hope will inspire their restoration guide.
  culinary: Michael Satterly enjoys cooking simple yet fresh dishes such as grilled stone‑crab claws, shrimp étouffée with garden‑grown okra, and key‑lime pie, favoring locally sourced seafood and herbs
    while admitting a habit of over‑salting when testing new marinades, a quirk they shrug off as part of the experimental process.
  core: Michael Satterly, a 72‑year‑old retired engineer, blends meticulous craftsmanship with a restless curiosity, competitive edge, and occasional anxiety, finding solace in sailing, photography, and
    a disciplined routine of garden work and chess.
background:
  cultural: Michael grew up in a middle‑class Anglo‑American family in the southeastern United States during the post‑World War II era. His upbringing emphasized self‑reliance, modesty, and practical knowledge,
    while the coastal culture of Florida later fostered a deep love for the sea, sailing, and the relaxed, community‑oriented lifestyle of small‑town Atlantic communities. He identifies with traditional
    Southern values of politeness, personal responsibility, and respect for privacy, yet maintains a critical, skeptical, and competitive edge cultivated through his engineering education and lifelong involvement
    in technical problem solving.
attributes:
  skills: '[''Mechanical troubleshooting and repair'', ''Electrical wiring and circuitry'', ''Data analysis (Excel, basic Python)'', ''Technical drafting (AutoCAD)'', ''Strategic board game analysis (chess)'',
    ''Digital photography (marine subjects)'', ''Coastal gardening and native plant cultivation'', ''Genealogical research'']'
  hobbies: '[''Boat restoration'', ''Coastal gardening'', ''Birdwatching'', ''Chess (online)'', ''Digital photography'', ''Historical nonfiction reading'', ''Genealogy research'', ''Small book club'']'
  career_goals: 'Though retired, Michael aims to channel his curiosity and practicality into a capstone personal project: restoring a classic 1950s wooden fishing boat to its original condition and publishing
    a detailed guide that blends engineering precision with historical narrative. He also seeks to keep his mind sharp by completing an online data‑visualization certificate, volunteer occasionally as a
    mentor for local high‑school robotics teams, and establish a regular mindfulness routine to better manage his anxiety and emotional reactivity. Maintaining physical health through walking the dunes
    and staying intellectually engaged remain central to his long‑term ambitions.'
