personas:
  professional: Eboni Landrum, a 23‑year‑old warehouse associate, leverages meticulous inventory control, data‑driven Excel reporting, and basic forklift expertise to keep stock accuracy high, while actively
    pursuing a CPIM credential and eyeing a shift‑lead role where they can mentor new hires and streamline processes.
  sports: Eboni Landrum, an energetic fan of group fitness, attends thrice‑weekly Zumba and hip‑hop sessions, plays on a local co‑ed recreational soccer league, and roots for the Los Angeles Lakers and
    the New York Knicks, balancing personal activity with avid spectating of NBA games.
  arts: Eboni Landrum, a lover of rhythm and harmony, sings in a church choir, streams R&B icons like H.E.R., Anderson .Paak, and classic Marvin Gaye while also enjoying hip‑hop playlists, and occasionally
    attends community theater productions featuring local playwrights.
  travel: Eboni Landrum, a budget‑conscious explorer, has road‑tripped to New Orleans for its culinary scene, visited Nashville for live music, dreams of a tech‑focused tour of Tokyo to see automation and
    RFID in action, and plans future group trips with friends when their schedule eases.
  culinary: Eboni Landrum, an inventive home cook, blends soulful Southern staples such as collard greens, cornbread, and sweet‑potato pie with modern twists like quinoa‑stuffed collard rolls and smoked‑paprika‑infused
    baked chicken, frequently using hot sauce and fresh herbs to elevate family meals.
  core: Eboni Landrum, a methodical yet outgoing twenty‑three‑year‑old, fuses meticulous logistics expertise with a love for dance, community service, and soulful cooking, always juggling ambitious career
    goals with vibrant social rhythms.
background:
  cultural: Eboni was raised in a close‑knit African‑American family in Spotsylvania County, where Southern traditions, church life, and family gatherings centered around soul food shaped her upbringing.
    The region’s rich civil‑rights history and her family’s involvement in local community service instilled a deep sense of pride in her heritage. She celebrates Juneteenth and Black History Month with
    friends and family, values education and resilience taught by her parents, and maintains strong ties to the Black church community that reinforces solidarity, compassion, and collective progress.
attributes:
  skills: '[''Inventory Management'', ''Order Picking & Packing'', ''Warehouse Management System (WMS) Operation'', ''Forklift Certification'', ''OSHA Safety Compliance'', ''Data Entry & Excel Reporting'',
    ''Quality Control'', ''Team Communication'', ''Problem Solving'', ''Customer Service'']'
  hobbies: '[''Zumba Classes'', ''Hip‑Hop Dance'', ''Community Volunteering'', ''Church Choir'', ''Soul‑Food Cooking'', ''R&B & Hip‑Hop Music'', ''Personal‑Development Reading'', ''Multiplayer Video Gaming'']'
  career_goals: Eboni aims to transition from a stocker to a supervisory role within the next two years, seeking a shift‑lead position where she can mentor new hires and streamline warehouse processes.
    She plans to complete an associate degree in logistics and obtain a Certified in Production and Inventory Management (CPIM) credential. Long‑term, she aspires to become a logistics coordinator or operations
    manager, leveraging emerging technology (e.g., automation, RFID) while staying grounded in practical, day‑to‑day operations. She also hopes to give back to her community by developing a mentorship program
    for young adults interested in supply‑chain careers.
