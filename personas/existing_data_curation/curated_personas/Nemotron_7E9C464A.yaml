  career_goals: Charles aims to transition into an IT management role where he can formalize structured processes that increase predictability and reduce operational stress for his team. He plans to earn
    an ITIL certification and a PMP to enhance his ability to lead small‑scale projects with clear milestones. Over the next five years, he hopes to mentor junior technicians, introduce automated monitoring
    tools that free up routine workload, and eventually serve as a senior advisor or consultant for regional businesses seeking to align technology with strategic objectives while maintaining a harmonious
    workplace culture.
