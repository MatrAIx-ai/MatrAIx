  career_goals: Humza aims to pursue a career in information technology, ideally as a software developer or IT support specialist. He plans to enroll in a community college after high school to earn an
    associate degree in Computer Science, then transfer to a four‑year university. While he values stable employment, he also wants to maintain a degree of flexibility to keep time for family obligations
    and community involvement. In the longer term, he hopes to combine his technical skills with his cultural background by working on projects that serve the South Asian community in Texas, such as developing
    apps for local businesses or supporting digital initiatives at his mosque.
