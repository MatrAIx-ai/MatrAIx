persona_description: A Ruby on Rails developer who is interested in understanding the role of Cucumber in the framework and how it can be used for functional validation. This persona is likely to be interested
  in learning about the differences between BDD and TDD, and how Cucumber can be used to write test cases in a meaningful English grammar. They may also be interested in learning about the features of Cucumber,
  such as its support for unit testing and the ability to write test cases for UI level test cases. This persona is interested in learning about the practical application of Cucumber in Ruby on Rails and
  how it can be used to improve the quality of the code written.
