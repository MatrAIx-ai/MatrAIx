  career_goals: Abdul hopes to move into a supervisory position within facilities management, such as lead janitor or facilities coordinator, where he can combine his love for structured processes with
    his talent for interacting with people. He plans to earn his GED and obtain a certification in green cleaning to broaden his qualifications. Long‑term, he dreams of starting his own small cleaning business
    that can serve local churches, schools, and small businesses, providing reliable jobs for others in his community. He also wants to mentor younger workers, helping them develop both technical skills
    and confidence in a supportive work environment.
