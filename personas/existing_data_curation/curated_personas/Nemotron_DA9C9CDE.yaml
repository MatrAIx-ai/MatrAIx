  hobbies: '["Church choir", "Quilting", "Gardening", "Reading African-American literature", "Genealogy research", "Walking club", "Cooking Southern cuisine", "Bridge", "Digital photography", "Volunteer
    tutoring"]'
  career_goals: Although retired from formal employment, Renose aims to finish her undergraduate degree in Business Administration as a personal milestone. She hopes to join the board of a local nonprofit
    focused on senior health and cultural preservation, where she can blend her organizational talents with her passion for community advocacy. Renose plans to launch an intergenerational mentorship program
    that pairs seniors with middle‑school students to share life skills, local history, and culinary traditions. She also aspires to expand her digital storytelling project by creating an online blog that
    showcases her family’s recipes, garden tips, and recorded oral histories, strengthening the cultural fabric of Augusta’s Black community. Managing her health and stress, she intends to incorporate regular
    wellness practices, such as gardening and mindfulness, into her daily routine.
