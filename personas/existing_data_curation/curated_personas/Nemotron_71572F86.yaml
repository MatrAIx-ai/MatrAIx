  career_goals: Edgar aspires to become an engineer, ideally focusing on robotics or civil engineering that allows him to design practical solutions for his community. He envisions working on projects that
    blend technology with sustainable infrastructure, such as building automated garden systems or smart city applications. In the short term, he aims to win his school’s robotics competition and earn a
    mentorship with a local engineering firm.
