personas:
  professional: Edgar Savoy, a 12‑year‑old robotics enthusiast, combines meticulous LEGO building skills with his knack for step‑by‑step programming, channeling his love of structure into designing and
    coding school robots while reliably handling team responsibilities.
  sports: Edgar Savoy plays midfield for the Polk County Youth Soccer Club, practices twice weekly, follows Orlando City SC for professional inspiration, and integrates weekend bike rides into his fitness
    regimen to balance structured team play with personal endurance.
  arts: Edgar Savoy devotes free evenings to reading science‑fiction classics like Ender’s Game and listening to the cinematic scores of Hans Zimmer, while also sketching detailed LEGO models inspired by
    the imaginative worlds of Studio Ghibli films.
  travel: Edgar Savoy enjoys day trips to the wetlands of Polk County for wildlife spotting, has toured Disney World in Orlando with his family, and dreams of visiting the interactive tech districts of
    Tokyo’s Akihabara and the natural wonders of Iceland’s geysers.
  culinary: Edgar Savoy prefers quick, handheld meals—pepperoni pizza, chicken nuggets, and sushi rolls—yet occasionally experiments with building his own “robotic” rice bowls, adding soy sauce, edamame,
    and shredded carrots for a burst of flavor.
  core: Edgar Savoy is a detail‑driven 12‑year‑old who balances LEGO precision, soccer teamwork, and a disciplined allowance plan, though he sometimes over‑organizes his schedule at the expense of spontaneous
    fun.
background:
  cultural: Edgar comes from a White American family rooted in central Florida. His upbringing reflects a blend of suburban Mid‑Florida values, including an emphasis on education, community involvement,
    and a moderate, often Protestant‑influenced cultural tradition. He experiences regional cultural events such as local fairs and school sports, and his family participates in community service activities
    typical of the Lakeland area, fostering a sense of civic responsibility and local pride.
attributes:
  skills: '["Organizational skills","Basic coding (Scratch)","Logical problem‑solving","Reading comprehension","Team collaboration"]'
