  career_goals: Although retired, Phat aims to preserve his knowledge by mentoring a small circle of younger enthusiasts in his community, documenting his family's migration story, and achieving recognition
    in the local garden‑show circuit. He also aspires to compile a memoir that blends his Southeast Asian heritage with his experiences in Orange County, ensuring his legacy endures beyond his lifetime.
