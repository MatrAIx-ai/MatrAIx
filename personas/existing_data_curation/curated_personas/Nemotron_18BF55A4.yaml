  hobbies: '[''Community theater'', ''Improv comedy'', ''Debate club'', ''Church outreach volunteering'', ''Tutoring'', ''Yoga'', ''Hiking'', ''Journaling'', ''Cooking Southern dishes'', ''Listening to
    classic rock and country music'']'
  career_goals: Chrystal aims to complete her undergraduate pre‑law studies this year and enroll in a full‑time law program next fall, with a long‑term goal of passing the Tennessee bar exam and establishing
    a private practice in Roane County. She is passionate about providing affordable legal services to her community, especially for youth and low‑income families. In the future, she envisions taking on
    leadership roles within local bar associations, advocating for criminal‑justice reform, and eventually seeking a judgeship to further serve the people of East Tennessee.
