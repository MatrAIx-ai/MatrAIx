  career_goals: Michael is fascinated by space and technology; he often imagines building rockets and exploring planets, and he expresses a long‑term ambition to become an astronaut or aerospace engineer.
    He also admires firefighters and hopes to help others, so he dreams of a career where he can protect and serve his community. He is motivated to excel in school, especially in science and math, and
    plans to join robotics clubs and science fairs to develop the skills needed for future engineering work. While his ideas are imaginative, he understands the importance of studying hard and staying disciplined
    to achieve his goals.
