personas:
  professional: Michael Trahan, at eight, is an aspiring young engineer who leverages their LEGO building and Scratch coding to prototype simple mechanical toys, balancing imaginative tweaks with practical
    step‑by‑step construction while collaborating with friends and independently troubleshooting when needed.
  sports: Michael Trahan, a dedicated member of the Oakwood Youth Soccer Club, practices after school drills under the mentorship of Coach Ramirez, admires the professional team Seattle Sounders FC, and
    spends weekends biking around the neighborhood trail system on a bright blue bike, balancing team camaraderie with solo rides.
  arts: Michael Trahan, an avid cartoonist, sketches daily comic strips inspired by the whimsical storytelling of Bill Watterson's "Calvin and Hobbes" and the dynamic panels of Marvel's Spider‑Man, while
    also enjoying the upbeat pop of kid‑friendly artist JoJo Siwa during art sessions.
  travel: Michael Trahan dreams of exploring the towering red rocks of Sedona, Arizona, after their family’s recent trip to the local science museum sparked a love for geology, and they eagerly plan a weekend
    camping adventure at nearby Pine Grove State Park, where they can collect rocks and build forts while staying within the family’s budget constraints.
  culinary: Michael Trahan loves cooking simple meals like cheesy spaghetti with fresh basil and toasted garlic bread, frequently experimenting with adding crunchy carrots or bell pepper strips to homemade
    pizza, but they have a notorious habit of sneaking extra chocolate chip cookies before dinner.
  core: Michael Trahan blends a LEGO‑engineer’s precision with a comic‑strip imagination, juggling soccer drills, coding experiments, and a sweet tooth, all while staying pragmatically organized and emotionally
    steady.
background:
  cultural: Michael was raised in a middle‑class white family in Fort Mill, South Carolina, a suburb of the Charlotte metropolitan area. His family values education, community involvement, and Southern
    hospitality. They celebrate holidays such as Thanksgiving and the Fourth of July with family barbecues, sweet tea, and shared traditions. Michael attends a local public elementary school where he participates
    in school events and after‑school programs. He occasionally joins his church's youth activities, which emphasize service and fellowship. The community’s love for sports, especially football and soccer,
    and its emphasis on politeness, family time, and regional music (country and classic rock) shape his everyday experiences while allowing room for his personal interests and curiosity.
