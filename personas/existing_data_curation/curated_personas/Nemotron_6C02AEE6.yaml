personas:
  professional: Adel Lawson, a board‑certified internal medicine physician known for meticulous diagnostic reasoning, leads quality‑improvement initiatives at a Sylmar community health center, blends disciplined,
    data‑driven practice with a patient‑centered approach that incorporates basic Spanish and community outreach, mentors junior staff, and relentlessly pursues the latest evidence to meet the high standards
    they set for themselves.
  sports: Adel Lawson, an early‑morning runner who logs 5‑mile routes through the Angeles National Forest, is a member of the local Sierra Club Trail Crew, supports the Los Angeles Dodgers, Los Angeles
    Rams, and follows the LA Galaxy, and occasionally joins a weekend pickup basketball game at the Sylmar community center to stay fit.
  arts: Adel Lawson, an avid landscape photographer who captures the golden light of the San Gabriel Mountains using a Nikon D850, draws artistic inspiration from Ansel Adams and the music of John Coltrane,
    regularly reads historical nonfiction by Doris Kearns Goodwin, and attends the monthly free concert series at the local cultural center featuring mariachi bands, which feeds their creative side.
  travel: Adel Lawson, who prefers meticulously planned road trips, spends long weekends hiking in Yosemite and exploring the redwoods of Big Sur, has a growing wish list that includes a cultural immersion
    tour of Andalusia to practice Spanish, and balances travel aspirations with family responsibilities and a modest travel budget.
  culinary: Adel Lawson, a health‑conscious home cook, frequently prepares low‑sodium grilled salmon with quinoa, kale‑chickpea salads seasoned with turmeric and lime, and homemade avocado salsa using fresh
    cilantro and tomatillos, while experimenting with sous‑vide techniques but occasionally over‑salting a dish in the pursuit of flavor.
  core: Adel Lawson, a disciplined physician‑researcher who blends relentless self‑improvement with a quiet love for woodworking, early‑morning runs, and meticulous budgeting, often channels skepticism
    into high standards while occasionally rewarding themselves with pricey tools.
background:
  cultural: Adel grew up in a working‑class white family in the San Fernando Valley, absorbing Midwestern‑style values of self‑reliance, hard work, and individual responsibility. After leaving school before
    ninth grade, he earned a GED, pursued a community‑college pre‑medical program, and later completed an accelerated MD pathway, demonstrating his competitive, self‑directed learning. Living and practicing
    in Sylmar—a largely Hispanic neighborhood of Los Angeles—has deeply informed his cultural sensitivity; he routinely uses basic Spanish to communicate with patients and incorporates community‑oriented
    perspectives into his care. While he identifies as non‑Hispanic White, his professional life reflects a blend of mainstream American individualism and an inclusive, patient‑centered ethos shaped by
    the region’s diverse cultural mosaic.
attributes:
  skills: '["Clinical diagnosis", "Evidence‑based treatment planning", "Chronic disease management", "Minor procedural skills (joint injections, wound care)", "Electronic medical records (EMR) optimization",
