    "Time management and workflow optimization"]'
  hobbies: '["Early‑morning running", "Hiking in Angeles National Forest", "Woodworking (furniture building)", "Cooking healthy low‑sodium meals", "Landscape photography", "Reading medical journals and
    historical non‑fiction", "Meditation and mindfulness practice", "DIY home improvement projects", "Volunteering at community health workshops", "Playing chess (strategic, competitive)"]'
  career_goals: Adel aims to become the medical director of a community health center in Sylmar, where he can design and implement a comprehensive preventive health program targeting diabetes and cardiovascular
    disease. He wants to publish research on health disparities affecting the local Hispanic population and influence regional health policy through advocacy. Over the next decade, he plans to earn advanced
    certifications, mentor a cohort of physicians, and eventually open a multidisciplinary clinic that integrates primary care, nutrition counseling, and mental‑health services. His ambition is to achieve
    measurable improvements in patient outcomes while maintaining the high standards he sets for himself.
