  career_goals: In the short term, Daphnie aims to earn professional certifications such as OSHA 30‑hour and the ISSA CIMS credential and to advance to a lead janitor or shift supervisor role within her
    current workplace. She wants to develop supervisory skills, mentor a small cleaning crew, and improve operational efficiency. Over the next five years, she plans to enroll in a community‑college associate
    program in facilities management, transition into a facilities coordinator position, and eventually qualify for a facilities manager role overseeing multiple properties. Her long‑term ambition is to
    secure stable, well‑compensated employment that leverages her attention to detail, reliability, and cooperative nature.
