personas:
  professional: Audrey Cook is a meticulous community organizer who leverages her record‑keeping expertise and structured mindset to coordinate senior‑center health workshops, manage event budgets, and
    mentor volunteers with a friendly, hands‑on approach.
  sports: Audrey Cook enjoys daily prairie walks with her dog, participates in the local Prairie Walkers walking club, cheers on the Dallas Cowboys football team and follows the Houston Astros baseball
    season, and occasionally attends community yoga classes to stay limber.
  arts: Audrey Cook spends evenings quilting with friends while listening to Willie Nelson and Alison Krauss, devotes her book‑club evenings to historical fiction authors like Philippa Gregory and Bernard
    Cornwell, and volunteers in the church choir where she often sings traditional gospel hymns.
  travel: Audrey Cook prefers well‑planned road trips to nearby Hill Country vineyards, historic towns like Fredericksburg, and occasional weekend getaways to New Orleans for its music festivals, balancing
    her love of discovery with a modest travel budget and a penchant for visiting local farmers’ markets.
  culinary: Audrey Cook delights in cooking with home‑grown cilantro, oregano, and fiery hatch green chiles to create signature dishes such as spicy pepper jelly, pickled jalapeños, and cinnamon‑apple jam,
    showcasing an intermediate to advanced skill set that blends comfort cooking with experimental preserves.
  core: Audrey Cook blends her love of order, community, and garden‑fresh flavors into a bustling volunteer life, yet often forgets to water her peppers when caught up planning the next senior‑center event.
background:
  cultural: Audrey was raised in a close‑knit, white Protestant family in central Texas and has spent most of her life in small‑town settings like Baird. Her upbringing emphasized Southern hospitality,
    church involvement, and a strong sense of community responsibility. She cherishes Texas traditions such as the state fair, local rodeos, and holiday potlucks, while also valuing the practical, down‑to‑earth
    mindset common to rural Texas life. These cultural roots shape her commitment to helping neighbors, preserving local traditions, and fostering harmony within her community.
