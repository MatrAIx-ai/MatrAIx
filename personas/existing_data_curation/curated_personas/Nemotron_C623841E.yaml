  hobbies: '[''Gardening'', ''Reading (historical fiction)'', ''Quilting'', ''Cooking and baking'', ''Volunteer work at community center'', ''Church choir singing'', ''Walking/hiking'', ''Genealogy research'',
    ''Dog walking'']'
  career_goals: Although currently not in the workforce, Audrey aims to deepen her involvement in community service by taking on a leadership role at the local senior center, organizing health workshops
    and social activities. She hopes to complete a short certification in community health outreach to better serve her neighbors. Audrey also dreams of turning her love of cooking and preserving into a
    small home‑based business selling homemade jams and baked goods at the county fair, providing both supplemental income and a way to share her culinary heritage.
