personas:
  professional: Isabel Baucom, a seasoned waiter in the fast‑paced Bay Area dining scene, leverages her natural curiosity, meticulous organization, and people‑centric flair to keep tables running smoothly
    while covertly sketching menu ideas on napkins, balancing a reliable work ethic with the occasional assertive push for better service standards.
  sports: Isabel Baucom, an avid outdoor enthusiast, is a member of the East Bay Runners club, follows the Golden State Warriors and San Francisco 49ers with weekend watch parties, hikes Mount Diablo every
    other weekend, participates in local pick‑up volleyball games at Lake Merritt, and incorporates sunrise yoga classes into her routine to counter stress from work.
  arts: Isabel Baucom, a watercolor hobbyist who frequents the Oakland Museum of California, draws inspiration from muralist Rich Jacobs and contemporary artist Kiki Smith, volunteers at a neighborhood
    youth arts program where she mentors emerging talent, collects limited‑edition prints from galleries on Telegraph Avenue, and enjoys monthly open‑mic poetry nights at a downtown café.
  travel: Isabel Baucom, a mindful traveler, alternates meticulously planned culinary road trips through Napa Valley and Monterey with spontaneous weekend getaways to Kyoto and Oaxaca, where she seeks authentic
    street food and artisan markets, always packing a sketchbook to capture fleeting street‑art scenes, while balancing a modest travel budget and occasional work‑related constraints.
  culinary: Isabel Baucom, an adventurous home cook, blends Californian avocado toast with a miso‑marinated salmon bowl, perfects homemade ramen broth using kombu and shiitake, experiments with spices like
    sumac and za’atar, whips up handmade gnocchi for Sunday brunch, and often hosts international dinner parties featuring dishes such as Mexican mole poblano and Greek spanakopita, all while occasionally
    over‑salting to satisfy her palate.
  core: Isabel Baucom, the 30‑year‑old Bay Area hospitality pro who channels her artistic curiosity and anxiety‑driven perfectionism into a future café‑gallery while juggling yoga, hiking, and a love for
    global flavors.
background:
  cultural: Isabel comes from a white, middle‑class American background, raised in the Central Valley before moving to the Bay Area. Her upbringing emphasized hard work, community involvement, and a practical
    approach to life. Living in Oakley, a suburb of Contra Costa County, she has been shaped by the region’s blend of agricultural roots and the cosmopolitan cultural currents of nearby Oakland and San Francisco.
    This environment has exposed her to a diverse culinary landscape and a vibrant street‑art scene, fostering her appreciation for both traditional American values and the eclectic artistic expressions
    of the West Coast.
attributes:
  skills: '[''Customer service'', ''Effective communication'', ''Multitasking'', ''Time management'', ''Conflict resolution'', ''Food safety and hygiene'', ''Menu knowledge and wine pairing'', ''Cash handling'',
