  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting'', ''Experimenting with international recipes'', ''Attending live music and theater performances'', ''Participating in trivia nights
    and board‑game groups'', ''Hiking in regional parks (e.g., Mount Diablo)'', ''Practicing yoga and mindfulness'', ''Volunteering at a youth arts program'']'
  career_goals: Isabel aims to move from front‑of‑house service to a supervisory role within the next few years, targeting positions such as restaurant manager or hospitality supervisor. She plans to enroll
    in a community college hospitality management program to gain formal credentials. Long‑term, she dreams of opening a boutique café that doubles as a gallery space for local artists, merging her passions
    for food, community, and visual art. She also seeks to develop leadership and mentorship skills, foster a supportive workplace culture that prioritizes mental well‑being, and achieve a healthier work‑life
    balance.
