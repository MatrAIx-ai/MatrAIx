personas:
  professional: Evana Tompkins leverages over ten years of retail and hospitality management experience to drive team performance, operational budgeting, and community outreach, merging meticulous process‑streamlining
    with a flexible, curiosity‑driven approach that they use to champion an inclusive corporate culture.
  sports: Evana Tompkins joins the Pee Dee Trail Runners Club for weekend hikes, regularly cheers on the Carolina Panthers during football season, and participates in a local adult softball league, balancing
    cardio endurance with friendly competition.
  arts: Evana Tompkins immerses themselves in the Florence County Museum’s rotating exhibitions, follows the work of Kara Walker and Jacob Lawrence, attends live jazz nights featuring Snarky Puppy and Robert
    Glasper, and leads weekend painting workshops inspired by Basquiat’s bold colors, a practice they credit for sustaining their creative spark.
  travel: Evana Tompkins prefers curated road trips that blend Southern charm with artistic discovery, having explored Charleston’s historic districts, Savannah’s riverfront, Asheville’s craft scene, and
    dreaming of a week‑long art immersion in Lisbon, Portugal, a travel style they balance with careful budgeting for the upcoming boutique launch.
  culinary: Evana Tompkins reimagines Southern comfort food by pairing smoked collard greens with miso broth, crafting shrimp‑and‑grits with charred okra, and finishing fried chicken with a maple‑ginger
    glaze, a confident yet experimental cooking approach they share during community potlucks.
  core: Evana Tompkins is a curiosity‑driven manager and artist who balances meticulous budgeting with spontaneous art purchases, thrives on community engagement, and occasionally forgets to floss after
    late‑night jazz sessions.
background:
  cultural: Evana was raised in a close‑knit African‑American family in the Pee‑Dee region of South Carolina. Her upbringing was steeped in church traditions, family reunions, and the culinary and storytelling
    customs of the Gullah/Geechee culture that flourishes along the Lowcountry. She values the communal solidarity, rich oral history, and soul‑food cuisine that define her heritage, while also embracing
    contemporary Black art, music, and entrepreneurial spirit that shape her identity today.
attributes:
  skills: '[''Team Leadership'', ''Customer Service'', ''Operational Budgeting'', ''Scheduling & Staff Coordination'', ''Conflict Resolution'', ''Training & Development'', ''Performance Analytics (Excel)'',
