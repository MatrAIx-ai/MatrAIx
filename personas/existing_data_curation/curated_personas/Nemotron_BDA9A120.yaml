  hobbies: '[''Art Gallery Visits'', ''Painting Workshops'', ''Soul‑Food Cooking'', ''Live Jazz/Funk Dancing'', ''Church Choir Leadership'', ''Volunteering at Cultural Center'', ''Gardening'', ''Hiking'']'
  career_goals: Evana aims to advance to a regional management position within the next five years, where she can mentor a larger team and influence corporate culture toward greater inclusivity. Long‑term,
    she dreams of opening her own boutique that blends fashion retail with an art gallery, providing a platform for local Black artists and designers. She also aspires to lead community‑based programs that
    use entrepreneurship and the arts to empower youth in Florence.
