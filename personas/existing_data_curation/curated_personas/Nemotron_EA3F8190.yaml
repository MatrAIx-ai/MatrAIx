  hobbies: '[''Watercolor painting'', ''Photography'', ''Visiting museums and galleries'', ''Genealogical research'', ''Gardening'', ''Reading (art history, American history, genealogy)'', ''Volunteer work
    at community center and library'', ''Senior book club participation'', ''Attending community theater'', ''Solving puzzles (crosswords, jigsaw)'']'
  career_goals: In his later years, Brandon aims to deepen his contribution to the Oak Lawn community by mentoring younger volunteers in event planning and record-keeping, expanding his art outreach through
    free workshops at the local community center, and compiling a comprehensive oral history of mid-20th-century Oak Lawn residents. He aspires to publish a small illustrated book that pairs his watercolors
    and photographs with historical narratives, preserving the neighbourhood's heritage for future generations. Additionally, he plans to improve his digital archiving skills to digitize family and community
    records, ensuring they remain accessible. While he does not seek paid employment, Brandon remains ambitious about continual learning in art, local history, and community documentation.
