persona_description: A group of brothers who are interested in developing and commercializing fire-battling robots to help out in natural disasters, specifically in the aftermath of the Fukushima disaster.
  They have experience working with the military and understand the importance of having specialized robots for emergency response situations. They are looking to develop and commercialize modular firebots
  that can be used by human firefighters to reduce their exposure to out-of-control fires. They are also interested in developing a remote-controlled fire-fighting robot called the Thermite, which is designed
  to clear paths, pull debris and bodies out of the way, and spray water. They are interested in using the robots to bring the situation under control and assist firefighters in putting out the fire and
  assisting victims.
