  career_goals: Looking ahead, Danny hopes to attend a high‑school health‑science program that blends his interest in biology with his desire to help others. He dreams of eventually working as a community
    health worker or physician assistant, roles where he can apply both his practical problem‑solving skills and his compassionate, cooperative spirit. He also sees himself becoming a mentor for younger
    students, perhaps by leading a robotics club or organizing mental‑health peer support groups, leveraging his curiosity about technology and his personal experience with stress.
