  career_goals: She aims to advance from her current secretary role to an office manager position within the next two years, seeking to oversee a small team and streamline office processes. Long-term, she
    is interested in transitioning into project coordination for community-focused nonprofit organizations, where she can leverage her humanities education and cultural insight. To support this, she plans
    to enroll in a part‑time Master’s program in Public Administration or Business Management. She also hopes to earn professional certifications such as Certified Administrative Professional (CAP) and
    develop a reputation as a reliable, results‑driven leader.
