  hobbies: '[''Reading contemporary African-American literature'', ''Journaling'', ''Sketching'', ''Walking in nature'', ''Cooking Southern dishes'', ''Listening to jazz, neo-soul, and gospel music'', ''Small
    gatherings with close friends'', ''Digital photography'']'
  career_goals: Lendra aims to complete her undergraduate degree, focusing on psychology or social work, and to obtain a certification as a mental-health peer support specialist. She envisions a part-time
    position within a community-based nonprofit where she can combine her empathy and practical problem-solving skills to help individuals coping with anxiety and depression. Parallel to this, she hopes
    to build a modest freelance portfolio in creative writing and photography, providing flexible income that accommodates her need for a low-stress schedule and ample personal time for self-care.
