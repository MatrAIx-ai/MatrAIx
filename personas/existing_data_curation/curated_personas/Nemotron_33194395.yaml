  hobbies: '[''Hiking and birdwatching'', ''Knitting and crochet'', ''Reading mystery and self‑help books'', ''Cooking experimental recipes'', ''Yoga and mindfulness meditation'', ''Volunteering at the
    community food pantry'', ''Nature photography'', ''Puzzle solving (crosswords, Sudoku)'']'
  career_goals: Diane aims to advance within the manufacturing sector by earning certifications such as Certified Production Technician (CPT) and completing an associate degree in manufacturing technology.
    Her short‑term goal is to become a shift supervisor, overseeing a team and implementing process‑improvement initiatives. Long‑term, she aspires to transition into an operations management role where
    she can influence plant efficiency while advocating for a supportive work environment that prioritizes employee well‑being and mental‑health resources.
