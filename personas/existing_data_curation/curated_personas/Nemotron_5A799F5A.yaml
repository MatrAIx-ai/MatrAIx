  career_goals: Although approaching traditional retirement age, Mary aims to transition from full-time guarding to a mentorship role within her casino's security team. She wants to train new officers in
    both technical skills and compassionate engagement, helping to build a culture of safety and harmony. Mary is also interested in developing a community-wide safety outreach program for Cherokee Village
    seniors, offering workshops on personal security, emergency preparedness, and stress-reduction techniques. Her long-term ambition is to leave a legacy of a more humane, technologically adept security
    environment while maintaining her own well-being.
