personas:
  professional: Mary Valle, a seasoned security and gambling surveillance specialist with three decades of experience, blends their keen observational eye and compassionate conflict‑resolution style with
    a curiosity for AI‑driven video analytics, while striving to mentor younger officers and embed a culture of humane safety at their casino.
  sports: Mary Valle cheers for the St. Louis Cardinals and the Kansas City Chiefs on Sundays, plays shuffleboard and bowling with the Cherokee Village senior league each week, and they maintain their fitness
    by walking the local lake trail with the community birdwatching club, all while occasionally joining a light‑hearted senior softball game during the summer.
  arts: Mary Valle finds artistic solace in quilting intricate Appalachian patterns, crocheting blankets inspired by the melodies of Johnny Cash and Loretta Lynn, devouring Agatha Christie mystery novels,
    and they attend the annual Ozark Folk Festival where they watch folk musicians like The Carter Family perform.
  travel: Mary Valle prefers relaxed, self‑drive road trips that blend scenic lake views with nostalgic stops, having enjoyed visits to Hot Springs, Arkansas, Branson, Missouri, and a music‑filled weekend
    in Nashville, Tennessee, while they dream of a future pilgrimage to the Great Smoky Mountains to photograph wildflower blooms along the Appalachian Trail.
  culinary: Mary Valle delights in cooking classic Southern comfort foods—crispy fried catfish with hush puppies, buttery cornbread, and slow‑cooked collard greens flavored with smoked ham hocks—while seasoning
    their garden‑grown tomatoes with fresh basil and sweetening their tea with local wildflower honey, and they occasionally experiment with a peach cobbler for the senior center potluck.
  core: Mary Valle is a compassionate, tech‑curious security veteran who balances garden‑centered serenity with an anxious attention to detail, often juggling a crossword puzzle, a knitting needle, and
    a new AI analytics demo all before dinner, and they never miss a chance to share a friendly smile with a colleague.
background:
  cultural: Mary was raised in a small town in the Arkansas Ozarks, embodying the values of Southern hospitality, community interdependence, and respect for tradition. Her white, working-class background
    is rooted in a family that emphasized hard work, church involvement, and close-knit neighborhood ties. Growing up with the rhythms of seasonal festivals, church potlucks, and local fairs, she developed
    a deep appreciation for the region’s folk music, storytelling, and the natural beauty of the surrounding hills and lakes. While she lives in Cherokee Village, a retirement community named after the
    Cherokee Nation, Mary’s cultural identity remains anchored in her Southern upbringing, blended with a modern curiosity about technology and new ideas.
