persona_description: A scholar who is deeply interested in the history and theology of the Temple Mount in Jerusalem, particularly the Ark of the Covenant and its significance in Jewish and Christian beliefs.
  They are knowledgeable about the Jewish tradition of hiding the Ark during times of war and occupation, and have a keen interest in the archaeological and historical evidence surrounding the Ark's alleged
  location. They also have a strong interest in the theology of the Millennial reign of Christ and the significance of the Ark in this context.
