personas:
  professional: Bianca Allen is an aspiring young robotics tinkerer who blends her space‑fueled curiosity with practical DIY skills, leading her school’s robotics club in building small machines while balancing
    weekend basketball, watercolor art, and a habit of spontaneous sketching.
  sports: Bianca Allen is a lively point guard for the Midtown Youth Basketball League, cheering on the Chicago Bulls as her favorite pro team, and in the summer she swaps the basketball for skateboarding
    at the local skate park, while also joining a community swim club during school breaks.
  arts: Bianca Allen immerses herself in watercolor landscapes and digital illustration, drawing inspiration from graphic novels like 'Ms. Marvel' and 'Nimona', idolizing illustrators such as Rebecca Sugar
    and Loish, and she often watches YouTube art channels like Proko while listening to Kendrick Lamar and SZA.
  travel: Bianca Allen has explored the Kennedy Space Center in Florida, spent a family weekend at Niagara Falls, and after a school field trip to the city museum, she dreams of visiting Tokyo’s Akihabara
    district and Reykjavik’s Northern Lights, though her trips remain limited by school calendars and parental budgeting.
  culinary: Bianca Allen loves pepperoni pizza, chicken nuggets, and homemade banana‑almond milk smoothies, enjoys crafting simple snacks like trail mix with pretzels, dried cranberries, and chocolate chips,
    but often forgets to eat a balanced lunch before basketball practice.
  core: Bianca Allen is a curious, slightly disorganized 12‑year‑old who stitches together space facts, basketball drills, and watercolor dreams while hoarding candy and juggling occasional allergies.
background:
  cultural: Bianca grows up in a vibrant Black community in South Los Angeles, surrounded by close family ties, church gatherings, and neighborhood block parties that celebrate hip‑hop, soul music, and
    African‑American history. Her parents emphasize the importance of education, community service, and staying connected to cultural roots while encouraging her to explore a broad range of interests. She
    participates in cultural events such as Juneteenth celebrations and local street‑art festivals, which expose her to the creativity of Black artists in the city. The multicultural atmosphere of Los Angeles
    also introduces her to diverse cuisines, languages, and perspectives, shaping a worldview that blends pride in her heritage with openness to new ideas.
