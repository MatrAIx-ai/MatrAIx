    to hip‑hop/R&B music"]'
  career_goals: Bianca dreams of turning her love for animals and her knack for explaining things into a future career as a wildlife conservationist or veterinarian. She also envisions creating educational
    videos that blend fun storytelling with scientific facts, which could lead to a path in science communication or digital media production. She plans to keep exploring coding and graphic design through
    school clubs, hoping to build a portfolio that opens doors to a tech‑creative career. Ultimately, she wants a job that lets her stay curious, work with her hands, and give back to her community.
