persona_description: A lawyer who specializes in the area of tax planning and estate management, particularly dealing with the use of deeds of variation to adjust the inheritance tax due on a family's estate.
  She has a deep understanding of the intricacies of wills, trusts, and tax laws, and is skilled in navigating the legal and tax implications of these arrangements. She is experienced in helping families
  and individuals to maximize their wealth through strategic planning and tax-efficient transfers. She is known for her expertise in the use of deeds of variation to address issues of inequality, to supplement
  provisions made by the deceased, and to allocate entitlement to those in need.
