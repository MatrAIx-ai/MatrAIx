  hobbies: '[''fishing'', ''hunting'', ''bowling league'', ''church community events'', ''woodworking'', ''vintage truck restoration'', ''group barbecues'', ''local sports fan'']'
  career_goals: Kevin aims to earn a certified journeyman status in welding and a Lean Six Sigma Green Belt to improve process efficiency at his plant. His short‑term goal is to be promoted to shift supervisor,
    where he can apply his organizational skills and competitive drive to lead a high‑performing crew. Long term, he hopes to transition into a plant manager role or eventually open a small custom metal‑fabrication
    workshop serving local businesses and hobbyists, allowing him to combine his practical expertise with his entrepreneurial ambitions.
