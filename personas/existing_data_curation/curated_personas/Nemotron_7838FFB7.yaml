personas:
  professional: Kevin Gilliam, a veteran metal‑fabrication specialist with 25 years of welding, CNC machining, and sheet‑metal forming expertise, blends a meticulous, process‑driven mindset with a competitive
    drive to lead crews, and they are actively pursuing journeyman certification and a Lean Six Sigma Green Belt to boost their bid for shift supervisor and, ultimately, plant manager.
  sports: Kevin Gilliam, a dedicated bowler in his local league and avid hunter and fisherman in the Ouachita forests, they stay fit by sprinting through wooded trails and shooting practice, cheer on the
    Arkansas Razorbacks during football season, follow the St Louis Cardinals for baseball, and join weekend pick‑up softball games with church friends.
  arts: Kevin Gilliam, who restores vintage pickup trucks and crafts hand‑made furniture in his workshop, they draw inspiration from the rugged aesthetic of Sam Maloof and the raw blues of Stevie Ray Vaughan,
    often listening to Elvis Presley on the radio while sanding, and they make it a point to attend the annual Arkansas Folk Art Festival whenever possible.
  travel: Kevin Gilliam, preferring modest, road‑trip adventures that blend fishing, hunting, and family time, they have mapped out weekend getaways to the Ouachita National Forest and an annual pilgrimage
    to the Canadian Rockies, while dreaming of a cross‑country drive to the Grand Canyon and a fishing expedition on Alaska’s Kenai Peninsula.
  culinary: Kevin Gilliam, a competent grill master who relishes smoking brisket and ribs with a dry rub of paprika, garlic, and brown sugar, they frequently cook trout caught on their own fishing trips,
    enjoy hearty meals like chicken‑fried steak with country gravy, but admit to overindulging in sugary sodas after long work shifts.
  core: Kevin Gilliam, a 50‑year‑old welding veteran whose competitive edge fuels both their leadership ambitions and weekend truck‑restoration races, they balance a structured work ethic with a love for
    outdoor camaraderie, yet can’t resist a second slice of pecan pie at church potlucks.
background:
  cultural: 'Kevin was raised in a close‑knit, white Southern family in rural Bienville Parish, Louisiana. His upbringing reflects traditional Southern values: strong emphasis on family, church involvement,
    and community service. He grew up with a deep appreciation for regional cuisine like gumbo and crawfish boils, and he enjoys the slower‑paced, neighborly lifestyle of small‑town Louisiana. These cultural
    influences shape his practical, reliable character while fostering his outgoing, sociable demeanor.'
attributes:
