personas:
  professional: Katherine Wilson, a seasoned community volunteer and literacy tutor, channels her business administration training and love of local history into meticulously organized library workshops,
    garden tours, and genealogy sessions, where their practical curiosity and gentle reliability inspire both peers and younger relatives.
  sports: Katherine Wilson enjoys gentle morning walks in the garden, follows the County Wildcats high‑school football team, attends River City Reds minor league baseball games, and they participate in
    weekly senior yoga classes at the community center, combining modest fitness with local team spirit.
  arts: Katherine Wilson engages in quilting circles where they replicate traditional patterns and experiment with modern designs inspired by Faith Ringgold, reads historical fiction by Hilary Mantel and
    local histories, listens to Patsy Cline and church gospel choirs, and attends community theater productions of classic plays, weaving creative appreciation into daily life.
  travel: Katherine Wilson favors carefully planned short road trips to historic towns such as Savannah, Asheville, and the state capital, where they explore museums and heritage sites, preferring cozy
    bed‑and‑breakfast inns and family visits over long flights, while their limited mobility guides them toward relaxed, culturally enriching excursions.
  culinary: Katherine Wilson prepares Southern comfort dishes—crispy buttermilk fried chicken, collard greens simmered with smoked turkey, buttery cornbread, and peach cobbler—using garden‑grown heirloom
    tomatoes, okra, and sweet potatoes, showcasing an advanced home‑cooking skill set that blends nostalgia with fresh, sustainable ingredients, and they proudly share these meals with friends and family.
  core: Katherine Wilson blends meticulous budgeting, garden‑fresh Southern cooking, and quiet stewardship of family histories into a purposeful, gently organized life, even though they sometimes misplace
    their glasses and forget a pill or two.
background:
  cultural: 'Katherine is a White American who grew up in the small‑town milieu of eastern Oklahoma. Her upbringing was shaped by Midwestern and Southern values: a strong work ethic, modesty, and a deep
    sense of community. A lifelong member of the local Protestant church, she participates in its traditions and community service. The cultural fabric of Coal County—its agricultural roots, seasonal festivals,
    and close‑knit neighborly ties—has fostered her appreciation for hospitality, seasonal cooking, and preserving family heritage. While she respects the traditions of her ancestors, her curiosity leads
    her to explore new ideas within these cultural boundaries, balancing respect for the past with modest openness to change.'
