  career_goals: Jeidy aims to launch her own culturally infused fashion label that merges modern streetwear with authentic Mexican craftsmanship, establishing a presence in Los Angeles Fashion Week within
    three years. She seeks mentorship from established designers, plans to collaborate with other Latino artists, and hopes to expand her brand to an internationally recognized name for sustainable, inclusive
    design. Long‑term, she wants to open a boutique‑studio in Whittier that offers community workshops for emerging designers, especially women of Latinx backgrounds, and eventually pursue a master’s program
    in sustainable fashion to deepen her expertise.
