personas:
  professional: Jeidy Aguirre, a 25‑year‑old fashion designer in Los Angeles, merges street‑wear silhouettes with traditional embroidery motifs using Adobe Illustrator and sustainable fabrics, channeling
    their curious, sociable nature into collaborative workshops and bold runway presentations.
  sports: Jeidy Aguirre enjoys weekend hikes in the San Gabriel Mountains, follows the Los Angeles Lakers and LA Galaxy, participates in a local salsa dance club that doubles as a cardio workout, and occasionally
    joins a co‑ed indoor climbing league at Planet Granite.
  arts: Jeidy Aguirre draws inspiration from street‑art legends like Shepard Fairey and the vibrant murals of the Arts District, frequently visits LACMA and the Getty to study works by Frida Kahlo and Diego Rivera,
    attends live shows ranging from indie act Phoebe Bridgers to traditional folk ensemble Lila Downs, and enriches their own designs through nightly sketching sessions.
  travel: Jeidy Aguirre favors spontaneous, culturally immersive trips, planning a yearly backpacking adventure to Oaxaca’s textile markets and a weekend escape to the Pacific Coast, while dreaming of a
    future fashion‑inspired pilgrimage to Tokyo’s Harajuku district and a creative retreat in Barcelona’s Gothic Quarter.
  culinary: Jeidy Aguirre enjoys crafting authentic tacos al pastor with pineapple‑marinated pork, simmering rich mole negro infused with sesame and ancho chilies, and experimenting with corn‑masa‑based
    empanadas stuffed with smoked chorizo, while also whipping up fresh avocado‑lime guacamole for friends during design gatherings.
  core: Jeidy Aguirre, a 25‑year‑old designer, blends street‑wear swagger with handcrafted embroidery, thrives on social buzz but often leaves sketches scattered across studio floors, turning coffee‑stained
    notebooks into spontaneous style journals.
background:
  cultural: Jeidy is a first‑generation Mexican‑American raised in a bilingual household in Whittier, California. Her upbringing immersed her in Mexican traditions such as Día de los Muertos, family gatherings
    centered around Mexican cuisine, and folk arts like Otomi embroidery and rebozo weaving. Fluent in Spanish and English, she effortlessly blends her heritage with the multicultural vibe of Los Angeles,
    drawing inspiration from both the vibrant Latino community and the broader Californian arts scene. This dual cultural lens informs her design aesthetic, personal values, and social connections.
