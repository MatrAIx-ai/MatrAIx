  career_goals: Dockie’s primary ambition is to preserve his independence and stay physically active. He aims to complete a personal woodworking project—a handcrafted garden shed—by the end of the year.
    He also wishes to mentor younger neighbors in basic home‑repair skills through informal workshops at the community center. Maintaining his health through regular walks and gardening remains a core goal.
    Additionally, Dockie hopes to document and share oral histories of longtime Billerica residents, contributing to the town’s historical archive. While he does not seek paid employment, he aspires to
    remain a valued volunteer and a source of practical knowledge in his community.
