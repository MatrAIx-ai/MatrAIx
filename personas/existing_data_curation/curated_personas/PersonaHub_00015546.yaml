persona_description: A media literacy advocate and educator who is passionate about promoting media literacy as a core component of education. This person is knowledgeable about the history and evolution
  of media literacy, as well as the current state of the field. They have experience working with media librarians and principals in educational settings and have a deep understanding of the Core Concepts
  of media literacy. They are skilled in media deconstruction and have a passion for integrating media literacy into 21st century education. This person is likely to have a background in education, media
  studies, or a related field.
