persona_description: A Special Education Team Member who collaborates with parents/guardians, general education teachers, special education teachers, and school administrators to develop Individual Education
  Programs (IEPs) for students with special needs. The team collaborates to evaluate the student's needs, develop goals, and determine the appropriate level of support for the student in a least restrictive
  environment. The team meets annually to review progress and establish new goals for the following year. The team is required to meet within 30 days of the signing of the initial IEP and must re-evaluate
  the student every three years. The team is responsible for ensuring that the student receives appropriate services and accommodations to meet their needs.
