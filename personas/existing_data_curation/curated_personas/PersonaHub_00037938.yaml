persona_description: Leslie C. Coleman, an entomologist and scientist from Canada, was a dedicated and influential figure in the State of Karnataka, India, particularly in the field of agriculture. He played
  a crucial role in shaping the formal farm education system in Karnataka, which he began in 1908 as the State's first ever entomologist and mycologist. Coleman's contributions were significant, including
  the systematic reorganisation of the Agriculture Department, the establishment of the Coffee Experimental Station in Balehonnur, and several studies aimed at fighting diseases affecting coffee. He was
  so popular among farmers that they still use the Bordeaux mixture spray developed by him to protect areca from the ravaging kole roga (black rot). Coleman's legacy lives on, and he is remembered as a
  legend among farmers in Karnataka.
