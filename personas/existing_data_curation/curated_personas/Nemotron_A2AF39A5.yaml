    ''Team coordination and peer mentorship'', ''Crisis counseling and victim support'']'
  hobbies: '[''Basketball'', ''Soccer'', ''Salsa dancing'', ''Cooking Ecuadorian cuisine'', ''Hiking'', ''Volunteering at community youth programs'', ''Acoustic guitar playing'', ''Photography'', ''Attending
    cultural festivals'']'
  career_goals: Edinson aspires to advance to a lieutenant position within the next five years, followed by a battalion chief role where he can shape departmental policies. He plans to obtain full paramedic
    certification and later earn an associate degree in fire science to deepen his technical knowledge. A long-term ambition is to become the fire department's primary liaison for the Latinx community,
    creating bilingual safety programs and mentoring at-risk youth who are interested in public-service careers.
