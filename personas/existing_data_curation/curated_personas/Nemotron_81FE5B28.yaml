  hobbies: '[''Sketching'', ''Digital Art'', ''Soccer'', ''Art Club Participation'', ''Visiting Museums and Galleries'', ''Listening to Mexican Folk and Indie Music'', ''Volunteer Work at Cultural Festivals'',
    ''Graphic Novel Reading'', ''Street Photography'', ''Mindfulness Meditation'']'
  career_goals: Heriberto aspires to become a multimedia artist and graphic designer who can blend contemporary visual storytelling with Mexican cultural motifs. He dreams of enrolling in a community college
    art program, earning a scholarship, and eventually working for a museum or cultural nonprofit where he can curate exhibitions that celebrate Mexican heritage and modern design. In the long term, he
    hopes to lead a creative studio that produces socially impactful visual content, while also mentoring other youths from underrepresented backgrounds to pursue artistic careers. He is determined to improve
    his academic standing, obtain a high school diploma, and acquire professional certifications in Adobe Creative Cloud and user‑experience design.
