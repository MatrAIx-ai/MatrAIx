personas:
  professional: Heriberto Tablada is a 17‑year‑old aspiring multimedia artist and graphic designer who skillfully merges digital illustration with traditional Día de los Muertos motifs, leveraging their
    methodical project organization, Procreate and Photoshop proficiency, and outgoing teamwork abilities to produce culturally resonant artwork for school assignments and community festivals.
  sports: Heriberto Tablada plays competitive Saturday‑morning soccer with a local club in Montgomery County, follows the Philadelphia Union in the MLS, and joins pickup games at Wissahickon Park to maintain
    fitness during the school year.
  arts: Heriberto Tablada devotes free time to sketching and digital illustration, drawing inspiration from Diego Rivera’s murals and Frida Kahlo’s symbolism while listening to Natalia Lafourcade, Tame
    Impala, and Odesza, and frequently visits the Philadelphia Museum of Art and community galleries showcasing emerging street artists.
  travel: Heriberto Tablada prefers short, budget‑friendly trips that blend artistic discovery and cultural immersion, spending school breaks roaming Philadelphia’s vibrant mural districts and joining an
    annual family pilgrimage to Oaxaca for Day of the Dead celebrations, while daydreaming about a future semester abroad in Barcelona’s design scene.
  culinary: Heriberto Tablada loves preparing family‑style dishes such as tamales made with masa and chipotle filling, pozole rojo brimming with hominy and ancho chilies, and fresh avocado salsa, while
    also experimenting with quick teen meals like ramen bowls and homemade pizza topped with mozzarella and smoked jalapeño.
  core: Heriberto Tablada is a curious, organized teen who channels anxiety into meticulous art projects, balances a deep reverence for cultural traditions with an ambition to succeed, and occasionally
    procrastinates by scrolling through meme feeds late into the night.
background:
  cultural: Heriberto was raised in a Mexican‑American household where Spanish is spoken at home and family traditions are central. His parents immigrated from Jalisco, and he grew up celebrating Día de
    los Muertos, Las Posadas, and Mexican Independence Day with colorful altars, traditional foods like tamales and pozole, and community gatherings in Montgomery County. He is bilingual, often translating
    for older relatives and helping younger peers with Spanish homework. The vibrant murals of Mexican muralists such as Diego Rivera inspire his art, and he frequently incorporates Mexican iconography—like
    sugar‑skull motifs and cactuses—into his designs. While fully integrated into American school life, he maintains strong ties to his heritage through family storytelling, cooking sessions with his grandmother,
    and participation in local Mexican cultural events.
