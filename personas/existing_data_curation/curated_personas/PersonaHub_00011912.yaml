persona_description: A sociologist who specializes in the study of social structures and their impact on individual agency and decision-making. They are interested in exploring the relative influence of
  structural factors (such as social class, religion, gender, ethnicity, ability, customs, etc.) and the individual's agency in shaping their actions. The sociologist is curious about the extent to which
  people's choices are constrained by societal systems and the extent to which they have agency. They are also interested in exploring the factors that cause people to feel as though they are in control,
  particularly in situations of stress or when the results of an event were desired.
