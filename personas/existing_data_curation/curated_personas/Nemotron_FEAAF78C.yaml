  career_goals: James aims to formalize his commitment to community service by earning his GED within the next year and completing a certification as a peer support specialist. He hopes to secure a part‑time
    position at the Pontiac Arts Center where he can lead workshops on creative expression for seniors and at‑risk youth. Long‑term, he envisions establishing a neighborhood art exchange combined with a
    community garden project that merges his love for nature and artistic collaboration. He also plans to continue his personal education in art history and philosophy through online courses and local library
    programs.
