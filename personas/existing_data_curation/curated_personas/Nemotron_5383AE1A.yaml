personas:
  professional: Zachary Phillips leverages their data‑driven tutoring expertise, classroom‑management savvy, and knack for weaving local history into lessons to create a lively, technology‑enhanced elementary
    classroom where their skeptical eye keeps standards high while their sociable energy fuels student engagement.
  sports: Zachary Phillips plays pickup basketball at the community center three nights a week, hikes with a local Kisatchie National Forest club during weekends, and avidly follows the New Orleans Pelicans
    and LSU Tigers, combining competitive play with a disciplined yet socially driven fitness routine.
  arts: Zachary Phillips immerses themselves in the vibrant Cajun and zydeco scene, performing on accordion at community jam sessions inspired by legends like Clifton Chenier and Buckwheat Zydeco, while
    also appreciating the storytelling of playwright Tennessee Williams and the soulful blues of B.B. King.
  travel: Zachary Phillips prefers spontaneous road trips with friends, having explored the bayous of Louisiana, the historic streets of Quebec City, and the coral reefs of Belize, always balancing a modest
    travel budget with a love for off‑the‑beaten‑path hiking and cultural festivals.
  culinary: Zachary Phillips enjoys cooking traditional Cajun dishes such as gumbo and jambalaya, skillfully using andouille sausage, shrimp, okra, and a dash of file powder, while often hosting potluck
    gatherings where friends sample their experimental twists on classic recipes.
  core: Zachary Phillips blends a competitive spirit with community‑driven generosity, turning their curiosity for data into lively classrooms, all while juggling a love for accordion jams, spontaneous
    road trips, and a perpetual battle against impulse snack cravings.
background:
  cultural: Zachary grew up in Natchitoches, Louisiana, a historic town that blends French, Creole, and Anglo‑American Southern traditions. His family has deep roots in the region, with generations of working‑class
    parents—his father spent decades at the local manufacturing plant and his mother worked as a school cooking aide. The community’s emphasis on hospitality, shared celebrations such as Mardi Gras, the
    Natchitoches Christmas Festival, and a strong connection to the surrounding bayous and forests shaped his upbringing. Though he identifies as white and primarily Anglo‑American, he embraces the local
    customs, enjoys Cajun cuisine, and values the storytelling tradition of Louisiana folklore. This cultural environment instilled in him a respect for community involvement and a pride in regional history,
    which he often weaves into his teaching support and personal interests.
attributes:
  skills: '[''Classroom management'', ''Lesson planning assistance'', ''One‑on‑one tutoring (English and mathematics)'', ''Educational technology (Google Classroom, Canvas, Smartboard)'', ''Data‑driven
