  hobbies: '[''Pickup basketball'', ''Weekly trivia nights'', ''Attending Cajun and zydeco festivals'', ''Playing accordion'', ''Hiking in Kisatchie National Forest'', ''Cooking Cajun cuisine'', ''Volunteering
    as youth sports coach'', ''Leading a debate club'']'
  career_goals: Zachary is determined to turn his hands‑on experience into a full teaching career. Over the next three years he plans to complete a bachelor’s degree in elementary education at a nearby
    community college while continuing his role as a teaching assistant. After obtaining certification, he aims to become a lead classroom teacher at his current school, focusing on integrating technology
    and culturally relevant pedagogy. In the medium term, he hopes to move into curriculum development or instructional coaching, leveraging his practical insights to design resources that reflect Louisiana’s
    history and environment. Zachary also envisions launching a small after‑school tutoring service that offers personalized academic support and enrichment activities. Ultimately, his long‑term ambition
    is to assume a district‑level instructional specialist or administrative role, where he can drive measurable improvements in student achievement and champion innovative, data‑informed teaching practices.
