persona_description: A Peruvian anthropologist who specializes in the study of Andean ethnomedicine and its cultural and ecological significance. Her work focuses on the rich shamanic lore found in the
  Ecuadorian border region, including the "health axis" theory and the Andean folk medical system. She has conducted extensive fieldwork in the region and published her findings in bilingual fieldguides.
  Her research interests also include the role of plants in Andean culture and the impact of globalization on traditional knowledge and practices.
