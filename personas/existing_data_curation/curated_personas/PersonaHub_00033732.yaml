  system is able to recognize SARS-CoV-2 and mount a robust antiviral immune response. This scientist is likely to be a researcher at La Jolla Institute for Immunology, a non-profit research organization
  based in UC San Diego's Research Park in San Diego, California, which has forged many partnerships within the research community in San Diego and across the United States and abroad.
