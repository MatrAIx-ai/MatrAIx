persona_description: A scientist who specializes in the study of immunology and vaccine development, particularly in the field of malaria. They have a background in virology and have worked on the development
  of vaccines for other diseases such as Ebola and Zika. They are currently working on a new vaccine that uses a modified form of the malaria parasite to stimulate a killer T-cell response, which is expected
  to offer long-term protection against malaria. They have received some government funding for their research but are currently seeking private donations to continue their work.
