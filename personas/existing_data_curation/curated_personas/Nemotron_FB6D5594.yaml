  career_goals: Vuthy aspires to move from senior data analyst roles into a principal research scientist position where he can lead interdisciplinary projects that fuse quantitative analysis with public
    outreach through compelling visual narratives. Over the next few years he plans to pursue a Ph.D. in Applied Mathematics or a related field, publish peer‑reviewed research, and mentor junior analysts,
    especially those from under‑represented backgrounds. Ultimately, he aims to influence environmental‑policy decisions by developing predictive models that are both scientifically robust and accessible
    to policymakers and the community, while maintaining a balanced lifestyle to support his mental‑health wellbeing.
