  career_goals: James aspires to turn his curiosity and practicality into a career that builds tangible solutions. He is fascinated by engineering and technology, and hopes to become a civil engineer or
    software developer who designs functional infrastructure or user‑friendly applications. He plans to enroll in a high‑school STEM program, pursue a degree in engineering at a university, and eventually
    contribute to community projects in his hometown, such as creating bike trails or sustainable public spaces. His goal is to be a reliable problem‑solver who balances creative ideas with realistic implementation,
    while also developing strategies to manage his tendency toward worry and stress.
