  career_goals: Although retired from formal employment, Lynette aims to deepen her engagement with the arts and her local community. She hopes to become a volunteer docent at the Allentown Art Museum,
    lead a senior‑focused art and craft club, and expand the community garden she helps maintain. Learning basic computer skills to video‑chat with grandchildren and join online art forums is a personal
    ambition. She also aspires to travel to regional cultural festivals, curate a small photo exhibit of local history, and develop a stress‑relief routine that includes gentle yoga and mindfulness practices.
