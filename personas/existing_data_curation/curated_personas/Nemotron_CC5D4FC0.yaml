  hobbies: '[''Tech meetups and QA roundtables'', ''Basketball league participation'', ''Muay Thai training'', ''Cooking Vietnamese and Filipino cuisine'', ''Hosting dinner parties'', ''Hiking in Timucuan
    Preserve'', ''Landscape photography'', ''Strategy board games'', ''Multiplayer online gaming'']'
  career_goals: Ismael aims to transition from a senior QA analyst to a test architect role, where he can shape enterprise‑wide quality strategies and champion AI‑driven testing frameworks. He plans to
    obtain the ISTQB Advanced Test Manager certification and deepen his expertise in cloud‑native testing on AWS and Azure. Over the next five years, he envisions leading a regional quality engineering
    team in Jacksonville, establishing a local QA community of practice, and mentoring aspiring testers, especially those from underrepresented Southeast Asian backgrounds. Ultimately, he hopes to influence
    organizational culture to prioritize quality as a shared responsibility and perhaps launch a consultancy focused on quality transformation for mid‑size tech firms.
