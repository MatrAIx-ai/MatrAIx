personas:
  professional: Sheena Hines is a community cultural curator in Tuscaloosa who leverages their knack for organizing informal gatherings, storytelling, and intergenerational workshops, using their curiosity
    and relaxed approach to planning to foster vibrant art exhibitions and oral‑history projects while assertively mentoring younger volunteers.
  sports: Sheena Hines stays active by strolling through their vegetable garden and joining the local 'Garden Strolls' senior walking club, occasionally swimming laps at the community center, and cheering
    passionately for the Alabama Crimson Tide football team during fall Saturdays, while they also follow the Tuscaloosa Tens baseball games each summer for a bit of lighthearted competition.
  arts: Sheena Hines immerses themselves in the arts by frequenting new exhibition openings at the Mobile Museum of Art, attending gospel concerts featuring the Alabama Gospel Choir, and drawing inspiration
    from visual artists like Kara Walker and Jacob Lawrence for their quilts, while still keeping a vinyl collection that spins the soulful sounds of Nina Simone and John Coltrane during quiet evenings.
  travel: Sheena Hines approaches travel as a purposeful pilgrimage, meticulously planning weekend trips to historic sites such as the National Civil Rights Museum in Memphis, the Freedom Trail in Montgomery,
    and the historic Sweet Home Café in New Orleans, while they also dream of a future cross‑country rail journey to Washington, D.C., to explore the Smithsonian’s civil‑rights galleries, balancing a modest
    travel budget with a love for guided tours and spontaneous storytelling sessions at each stop.
  culinary: Sheena Hines showcases a seasoned palate by crafting fusion Southern dishes like shrimp‑and‑grits topped with miso glaze, fried chicken with gochujang glaze, and collard greens sautéed with
    smoked tofu, drawing fresh tomatoes, okra, and sweet potatoes from their garden and confidently mixing traditional spice blends with Asian aromatics such as ginger and dried lemongrass.
  core: Sheena Hines is a curious, sociable 76‑year‑old cultural bridge; they blend Southern roots with artistic innovation, mentor their community, and embrace life’s spontaneity despite a charmingly disorganized
    streak.
background:
  cultural: Sheena is a 76‑year‑old African American woman who grew up in Tuscaloosa, Alabama during the height of the civil‑rights movement. Her upbringing was shaped by a close‑knit Black church community,
    Southern family traditions, and a deep appreciation for gospel music, oral storytelling, and Southern cuisine. She carries the legacy of the Great Migration in her family's narratives and values the
    resilience and creativity of Black Southern culture, which she actively celebrates through food, crafts, and community engagement.
attributes:
  skills: '[''Community event planning'', ''Quilting and textile arts'', ''Gardening and horticulture'', ''Southern cooking and recipe adaptation'', ''Basic digital communication (email, video calls, social
    media)'', ''Storytelling and oral history preservation'', ''Public speaking and group facilitation'', ''Volunteer mentoring'']'
  hobbies: '[''Visiting art galleries and exhibitions'', ''Attending gospel and choir concerts'', ''Gardening'', ''Quilting circle'', ''Reading historical fiction and biographies'', ''Traveling to civil
    rights historic sites'', ''Cooking and recipe experimentation'', ''Participating in community storytelling nights'']'
  career_goals: Sheena hopes to deepen her impact as a cultural bridge in Tuscaloosa by curating intergenerational art workshops, documenting and sharing the oral histories of the city's African American
    elders, and collaborating with local museums to feature community‑driven exhibitions. She also aspires to write a memoir that captures her personal journey through the civil rights era and the evolving
    Southern Black experience, and to travel to key historic sites across the South to broaden her own understanding and bring back fresh ideas to her local circle.
