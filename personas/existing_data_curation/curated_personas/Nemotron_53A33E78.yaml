  career_goals: Dennis aims to move into a senior technology leadership role—such as VP of Engineering or CTO—within the next five years, where he can shape product strategy and foster a culture of disciplined
    innovation. He envisions launching a side venture that leverages generative AI to create interactive digital art experiences, merging his technical skill set with his passion for the arts. Mentorship
    is also a core ambition; he plans to formalize a mentorship program for mid‑career engineers and contribute thought leadership on ethical AI at industry conferences. Ultimately, he seeks to leave a
    lasting impact on both the tech ecosystem of Austin and the broader conversation about technology’s creative potential.
