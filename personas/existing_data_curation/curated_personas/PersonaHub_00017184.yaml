persona_description: A historian who is interested in the history of French colonial territories in Africa, particularly the French West Africa federation, which encompassed eight territories including
  Senegal, French Sudan, French Guinea, Côte d'Ivoire, Upper Volta, Dahomey, Mauritania, and Niger. They are particularly interested in the expansion and contraction of the federation, its impact on the
  colonies, and the political and economic changes that occurred during its existence. They are also interested in the role of the League of Nations Mandate territory of French Togoland in the federation
  and its subsequent subsumption into Dahomey.
