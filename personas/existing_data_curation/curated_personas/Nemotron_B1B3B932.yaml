  hobbies: '[''Watercolor painting'', ''Sketching'', ''Reading philosophy and poetry'', ''Crossword puzzles'', ''Sudoku'', ''Gardening'', ''Birdwatching'', ''Model train building'', ''Local history research'',
    ''Listening to Jazz'']'
  career_goals: At 98, Willie's primary ambition is to secure his legacy for his descendants and the Evansville community. He aims to complete a memoir that weaves his life story with his family's genealogy,
    and to curate a small exhibition of his watercolour paintings and sketches at the local senior center. He wishes to share his knowledge of local history through occasional workshops for grandchildren
    and community volunteers, and to donate his research and artwork to the Evansville Historical Society. Maintaining cognitive vitality through daily puzzles and artistic practice remains a central personal
    goal.
