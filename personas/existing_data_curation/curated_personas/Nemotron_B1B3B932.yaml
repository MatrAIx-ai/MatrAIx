personas:
  professional: Willie Rodin, a centenarian community historian and watercolor artist, blends meticulous craftsmanship with an insatiable curiosity to document Evansville’s local history, craft model‑train
    layouts, solve intricate puzzles, and author memoirs while conducting small workshops for seniors, driven by a competitive streak that pushes every brushstroke toward perfection.
  sports: Willie Rodin, a devoted fan of the Evansville Otters baseball club and the University of Evansville Purple Aces basketball team, enjoys low‑impact walking in the nearby park, participates in a
    weekly senior Tai Chi class at the community centre, and treats birdwatching as a gentle sport, occasionally joining a local walking group that meets for a short stroll each Saturday.
  arts: Willie Rodin, an avid watercolor painter inspired by Monet and O'Keeffe, a sketcher of abstract scenes while listening to Miles Davis and John Coltrane, a model‑train enthusiast who meticulously
    builds 1950s steam‑engine layouts, and a poetry lover who recites Rilke and Whitman during community art gatherings, channels their imagination into vibrant canvases and detailed miniatures that reflect
    a lifelong devotion to creative expression.
  travel: Willie Rodin, a careful traveler who favors short, well‑planned trips, has revisited the historic streets of Paris, explored the serene vistas of the Great Smoky Mountains, and now dreams of a
    gentle river cruise along the Mississippi, always using senior discounts, traveling with adult children for support, and packing a compact sketchbook to capture every view.
  culinary: Willie Rodin, a home‑cooking enthusiast who relishes classic Midwestern comfort foods such as chicken pot pie and apple crisp, frequently prepares fresh garden‑harvested rosemary‑infused salmon
    with lemon and dill, enjoys a slice of New York cheesecake on special occasions, and occasionally indulges in a nostalgic bowl of shrimp and grits inspired by jazz‑era Southern cuisine.
  core: Willie Rodin, a 98‑year‑old watercolor painter, meticulous genealogist, and puzzle aficionado, balances a competitive perfectionism, occasional worry, and a deep love for classic jazz into a life
    of quiet creativity, disciplined mental exercise, and a determined quest to leave a lasting legacy.
background:
  cultural: Willie grew up in the heartland of Indiana, immersed in Midwestern values of modesty, self‑reliance, and strong community ties. Raised in a Protestant, small‑town family in Evansville, his upbringing
    emphasized responsibility, punctuality, and respect for neighbors. He witnessed the city’s transformation from an industrial river hub to a diversified community, and his life spanned pivotal eras—from
    the Great Depression and World War II to the civil rights movement and the digital age. While his cultural roots are firmly Midwestern, his lifelong curiosity has led him to embrace broader artistic
    and philosophical currents, integrating them with his local heritage.
