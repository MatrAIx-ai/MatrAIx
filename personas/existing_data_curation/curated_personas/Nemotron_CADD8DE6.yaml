personas:
  professional: Maria Pereira is a high-school senior with a knack for systematic problem‑solving, who leads her debate club and codes simple games, and they envision a future as a network engineer or software
    developer where their methodical planning and competitive drive shape reliable tech solutions.
  sports: Maria Pereira enjoys the rhythmic cardio of salsa dancing with friends, joins the school’s co‑ed volleyball team during the spring season, and they are a dedicated fan of the local professional
    basketball club, cheering from the stands whenever the home games are in town.
  arts: Maria Pereira captures the stark beauty of karst cliffs with a DSLR, curates a school photo exhibit of local landscapes, reads science‑fiction series like The Expanse, and they unwind listening
    to the indie rock band Arcade Fire and the lyrical flow of Latin‑influenced hip‑hop artist Residente.
  travel: Maria Pereira alternates weekend hikes through the island’s limestone caves with dreaming trips to Iceland’s glaciers, and they meticulously plan trips using a spreadsheet, balancing a limited
    travel budget with a desire to explore geological wonders abroad.
  culinary: Maria Pereira regularly prepares traditional island dishes such as arroz con gandules, fried plantains, and seasoned pork shoulder, skillfully seasoning with sofrito and adobo, and they relish
    the tactile process of hand‑mashing the seasoned root vegetables for authentic flavor.
  core: Maria Pereira is a methodical teen who blends a love of geology, coding, and salsa into a disciplined, competitive drive that fuels a future tech venture while juggling school, part‑time work, and
    a habit of over‑planning every hobby.
background:
  cultural: Maria was raised in Camuy, a small municipality in northwestern Puerto Rico known for its karst topography and tight‑knit community. Her family upholds Puerto Rican customs, celebrating fiestas
    patronales, enjoying music such as plena, bomba, and contemporary reggaetón, and preparing dishes like arroz con gandules, lechón asado, and alcapurrias. Bilingual in Spanish and English, she navigates
    both local cultural life and the broader digital world. The island’s resilient spirit, strong family bonds, and emphasis on community responsibility have shaped Maria’s disciplined, competitive, and
    practically oriented personality.
