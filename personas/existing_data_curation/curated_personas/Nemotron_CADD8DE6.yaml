  career_goals: In the short term, Maria aims to complete her GED and enroll in a community college program focused on information technology or engineering, leveraging her curiosity for emerging tech and
    her practical skill set. She aspires to become a network engineer or software developer, seeking roles where she can design reliable systems and solve complex problems. Long‑term, Maria envisions launching
    a tech start‑up that provides digital services and affordable IT support to small businesses in rural Puerto Rico, combining her competitive drive with a desire to uplift her community.
