personas:
  professional: An aspiring museum educator and gallery coordinator, Lauren Lamar blends rigorous humanities research with a knack for crafting compelling exhibition narratives, and they use their critical
    eye and competitive drive to orchestrate community art events while maintaining the flexibility to adapt on the fly.
  sports: A weekend fitness enthusiast, Lauren Lamar enjoys jogging along the Grand River, practices yoga at Breakaway Yoga studio, follows the Grand Rapids Griffins hockey team with fervor, and they join
    pick‑up volleyball games at the community center during summer.
  arts: A dedicated art explorer, Lauren Lamar immerses themselves in the visual world by sketching ArtPrize installations, curating a niche Instagram feed featuring works by Yayoi Kusama, Kehinde Wiley,
    and local painter Jane Doe, and they attend intimate live‑music shows headlined by Sufjan Stevens and The Milk Carton Kids.
  travel: A culturally curious traveler, Lauren Lamar designs itineraries around artistic festivals, having spent a week at Chicago’s Architecture Biennial, a long weekend at New York’s MoMA PS1 Summer
    Warm Up, and a month exploring Portland’s DIY art scene, while they favor budget‑friendly hostels that double as creative co‑working spaces.
  culinary: A farm‑to‑table foodie, Lauren Lamar masters herb‑infused focaccia with rosemary and thyme harvested from their balcony garden, regularly savors pour‑over coffee made with beans from a local
    roaster, and they delight in seasonal beet salads drizzled with pistachio oil.
  core: A restless curator, Lauren Lamar blends a curious mind with a competitive edge, constantly cataloguing art and ideas while they juggle impromptu coffee‑shop sketches, occasional midnight insomnia,
    and a habit of over‑booking their calendar.
background:
  cultural: Lauren was raised in a middle‑class white family in Grand Rapids, Michigan, where Midwestern values of hard work, modesty, and hospitality are deeply ingrained. The city’s strong arts community—highlighted
    by the internationally known ArtPrize festival—exposed her early on to a diverse array of artistic expression and community engagement. Her parents, both educators, emphasized the importance of lifelong
    learning and civic involvement, which nurtured her curiosity and competitive drive. While she identifies with traditional Midwestern cultural norms, she also embraces the city's progressive, creative
    spirit, often blending the two in her personal and professional aspirations.
attributes:
  skills: '[''Critical analysis'', ''Academic research and writing'', ''Art history knowledge'', ''Digital content creation'', ''Social media management'', ''Event planning'', ''Project coordination'',
