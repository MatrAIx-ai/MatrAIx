  hobbies: '[''Visiting museums and galleries'', ''Watercolor painting'', ''Urban photography'', ''Reading contemporary fiction and poetry'', ''Writing an art blog'', ''Attending live music shows'', ''Exploring
    coffee houses'', ''DIY home‑decor projects'', ''Balcony gardening'', ''Traveling to cultural festivals'']'
  career_goals: Lauren aspires to re‑enter the professional world through a role that merges her humanities background with her passion for the arts. She is aiming to secure a part‑time position as a museum
    educator or gallery coordinator in Grand Rapids, leveraging the city’s vibrant ArtPrize scene. In the longer term, she hopes to earn a certificate in museum studies and eventually lead community‑based
    art‑education programs that engage underserved youth. Parallel to this, she dreams of growing her personal art‑blog into a recognized voice for contemporary visual culture, eventually monetizing it
    through freelance writing, curated exhibitions, and collaborations with local artists. Her competitive streak drives her to pursue continuous learning, and she envisions completing an MFA within the
    next five years to deepen her curatorial expertise.
