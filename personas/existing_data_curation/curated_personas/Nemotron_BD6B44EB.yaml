  career_goals: Phillip aims to become a senior marketing leader within the next five years, overseeing multi‑channel campaigns for regional businesses and cultural organizations. He plans to complete a
    bachelor's degree in Marketing or Communications to deepen his strategic knowledge. Long‑term, he dreams of launching his own boutique agency that specializes in innovative, art‑focused brand storytelling
    and experiential marketing, helping local creators reach wider audiences while maintaining a community‑centric ethos.
