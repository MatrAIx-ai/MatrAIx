personas:
  professional: Maria Correa, a veteran commercial truck driver with a spotless safety record, leverages hands‑on heavy‑duty maintenance, bilingual negotiation, and a knack for spotting niche freight like
    art pieces, while her curiosity and spontaneous decision‑making fuel innovative route planning, even as she occasionally wrestles with paperwork organization.
  sports: Maria Correa stays fit through weekly hikes with the Desert Trail Runners club, watches the Arizona Diamondbacks in spring and the Phoenix Suns during basketball season, and joins occasional pickup
    soccer games at local parks, preferring steady, low‑impact exercise over high‑intensity gym routines.
  arts: Maria Correa channels her love of visual storytelling by sketching shifting desert vistas and photographing roadside murals, regularly visits galleries showcasing works by Frida Kahlo and Diego
    Rivera, curates a personal playlist of traditional folk mariachi and contemporary bands like Café Tacuba, and contributes her skill set to community mural projects that blend historic motifs with modern
    flair.
  travel: Maria Correa prefers impromptu road trips that whisk her from the sun‑bleached streets of Tucson to the pastel‑hued adobe towns of Taos, seeking out regional dishes and the quiet charm of roadside
    museums, while dreaming of a future self‑drive expedition across Patagonia’s rugged plains and the historic caravan routes of Morocco.
  culinary: Maria Correa, an adept home chef, turns freshly harvested herbs like cilantro and epazote into vibrant salsa verde, masterfully prepares chiles rellenos and tamales for family gatherings, and
    delights in savoring regional specialties—such as placitas de nopales and cochinita pibil—while occasionally indulging in a late‑night street‑taco fix during road trips.
  core: Maria Correa, a seasoned trucker who sketches desert sunsets between deliveries and hoards vintage car brochures for inspiration, blends spontaneous artistry with disciplined safety standards, even
    if they sometimes let paperwork pile up.
background:
  cultural: Maria was born to Mexican immigrant parents and raised in a bilingual household in the Inland Empire of Southern California. Her upbringing emphasized family solidarity, Catholic traditions,
    and a deep love for Mexican folk arts such as papel picado, Talavera pottery, and regional music. She celebrates Día de los Muertos, Cinco de Mayo, and local community festivals with food, music, and
    dance, weaving these customs into her daily life. While she embraces her Mexican roots, she also navigates the multicultural environment of Ontario, CA, blending the American work ethic with the warmth
    and communal spirit of her heritage.
attributes:
  skills: '["Commercial Driving (CDL)", "Safe Driving Record", "Route Planning & Navigation", "Basic Heavy‑Duty Vehicle Maintenance", "Vehicle Inspection", "Bilingual Communication (Spanish/English)", "Sales
    Negotiation", "Customer Relationship Management", "Logistics Documentation", "Problem Solving Under Pressure"]'
  hobbies: '["Sketching", "Photography", "Visiting Art Galleries", "Spontaneous Road Trips", "Listening to Mariachi and Folk Music", "Cooking Traditional Mexican Cuisine", "Gardening", "Reading Historical
    Novels", "Collecting Vintage Car Memorabilia", "Volunteering at Cultural Festivals"]'
  career_goals: Maria aspires to transition into a supervisory role overseeing a small fleet, where she can blend her driving experience with her sales acumen. She aims to obtain a HAZMAT endorsement and
    complete an associate’s degree in business to broaden her qualifications. Passionate about art, she envisions launching a niche logistics service that specializes in transporting artworks and cultural
    artifacts, leveraging her appreciation for aesthetics and her meticulous handling skills. In the longer term, Maria hopes to mentor younger drivers, promote safety standards within her company, and
    eventually establish a family‑owned transportation firm that reflects both her Mexican heritage and her entrepreneurial spirit.
