personas:
  professional: Katelyn Gautreau commands a two‑decade track record as a hazardous‑materials removal specialist, expertly applying HAZWOPER protocols, OSHA and EPA regulations, and risk‑assessment planning
    while methodically documenting compliance and spearheading the integration of emerging remediation technologies—all in pursuit of a supervisory team‑lead role, a CSP credential, and a future consulting
    firm for Arkansas small businesses.
  sports: Katelyn Gautreau fuels their competitive edge through group cycling and Zumba classes, weekend hikes along the Ozark Trail, and by cheering for the Arkansas Razorbacks football team while also
    participating in a local Little Rock recreational softball league.
  arts: Katelyn Gautreau balances work intensity with creative escape by devouring Agatha Christie mystery novels, binge‑listening to the Safety Tech Today podcast, attending community theater productions
    of classic Southern playwrights, and curating a playlist that mixes John Coltrane jazz with modern pop hits.
  travel: Katelyn Gautreau prefers meticulously planned road trips that blend outdoor adventure with cultural immersion, such as a spring hike in the Great Smoky Mountains followed by a weekend culinary
    tour of New Orleans gumbo and jazz scene, while keeping an eye on budget constraints for future family vacations to the Texas Hill Country.
  culinary: Katelyn Gautreau showcases their love for Southern hospitality by mastering fried catfish, collard greens seasoned with smoked paprika, and peach cobbler, regularly sourcing fresh heirloom tomatoes
    and corn at the Pulaski County farmers' market, yet they occasionally rely on pre‑made spice mixes for convenience.
  core: Katelyn Gautreau blends methodical safety expertise with an energetic love for group fitness, a competitive drive that fuels both career ambition and occasional splurges on the newest workout gear,
    and a pragmatic curiosity that keeps them balancing proven protocols with emerging technologies.
background:
  cultural: Katelyn was raised in a small town in central Arkansas, where her family emphasized hard work, self-reliance, and community involvement. Growing up in a working-class environment, she learned
    the value of practicality and the importance of reliable, methodical effort. Her upbringing included regular participation in local church gatherings and seasonal community festivals, fostering a strong
    sense of Southern hospitality and regional traditions. While she maintains these cultural ties—such as an appreciation for regional foods, outdoor recreation, and close-knit family networks—she also
    embraces curiosity about new ideas, especially those that can improve safety and efficiency in her line of work.
attributes:
  skills: '["Hazardous Materials Identification & Classification", "HAZWOPER and OSHA Compliance", "EPA Regulations & Environmental Reporting", "Risk Assessment & Site Safety Planning", "Decontamination
    Procedures and Waste Disposal", "Emergency Response Coordination", "Safety Training & Crew Leadership", "Protective Equipment Maintenance", "Documentation and Incident Reporting", "Adoption of Emerging
    Remediation Technologies"]'
  hobbies: '["Group fitness classes (cycling, Zumba)", "Hiking in the Ozarks", "DIY home improvement and automotive repair", "Cooking Southern cuisine for family and friends", "Volunteering with local emergency
    response teams", "Attending farmers'' markets and community events", "Reading mystery novels", "Listening to podcasts on environmental technology"]'
  career_goals: Katelyn is focused on advancing to a supervisory HAZMAT Team Lead position within the next few years, earning the Certified Safety Professional (CSP) credential, and developing a regional
    safety-training program for new workers. She aims to achieve a flawless safety record, receive company-wide recognition for excellence, and eventually launch her own environmental-compliance consulting
    firm that assists small Arkansas businesses with hazardous-waste management and regulatory adherence. Her competitive drive pushes her to continually improve processes and mentor others.
