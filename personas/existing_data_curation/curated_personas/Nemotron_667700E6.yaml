personas:
  professional: Jean Mac, a budding space enthusiast who spends weekends constructing Lego rockets and sketching marine creatures, demonstrates early analytical problem‑solving skills while keeping their
    projects practical and modest, and they approach collaborative play with a competitive edge that fuels their curiosity about how things work.
  sports: Jean Mac, who splashes through weekly swim lessons at the Space Coast Sharks Swim Club and practices mini‑soccer with the Cocoa Kids League, cheers for the Miami Marlins during summer outings,
    and they treat each sandcastle competition at the beach as a personal fitness challenge, preferring low‑key outdoor play over structured team drills.
  arts: Jean Mac, who delights in drawing kelp forests inspired by Mary Ann Hoberman's watercolor books, sings along to the Disney soundtrack of "Moana", watches Pixar's stop‑motion shorts for story ideas,
    and they turn beach shells into improvised musical instruments during play, reflecting a quiet yet imaginative creative side.
  travel: Jean Mac, who enjoys spontaneous day trips to Cocoa Beach for shell‑collecting and to the Kennedy Space Center for astronaut tours, dreams of a family vacation to the Bahamas and a future simulated
    astronaut camp at Cape Canaveral, but they usually rely on parents' last‑minute itineraries rather than detailed planning, embodying a relaxed, adventure‑seeking spirit.
  culinary: Jean Mac, who prefers fish sticks with tartar sauce, chicken nuggets, and strawberry smoothies, enjoys sprinkling fresh basil on homemade pizza and is fascinated by tropical fruit salads featuring
    mango, pineapple, and coconut flakes, and they often ask for extra marshmallows on hot chocolate, revealing a love for simple comfort foods with a splash of exotic flavors.
  core: Jean Mac is a calm, curious five‑year‑old who flips between building rockets and collecting seashells, competes quietly in beach races, saves spare change in a piggy‑bank, and prefers solo adventures
    over crowded playdates, all while maintaining an effortlessly resilient demeanor.
background:
  cultural: Jean is a white child raised in Cocoa, Florida, a community close to the Space Coast and the Atlantic shoreline. Her cultural environment blends typical Floridian beach life with the local enthusiasm
    for space exploration due to nearby NASA facilities. Family traditions include summer trips to the beach, attending community fairs, and celebrating holidays with a mix of Southern hospitality and coastal
    leisure. This setting nurtures her interest in marine life, space, and outdoor discovery.
attributes:
  skills: '["letter recognition", "counting to 20", "fine motor coordination (drawing, cutting with safety scissors)", "hand-eye coordination (building blocks, LEGO)", "early scientific curiosity (nature
    observation)", "emotional resilience (calm under stress)"]'
  hobbies: '["building LEGO sets", "drawing and coloring", "collecting shells and rocks", "exploring the backyard or nearby park", "solving simple puzzles", "listening to storybooks"]'
  career_goals: Jean dreams of exploring the world beyond her backyard, aspiring to become a scientist or astronaut one day. She is eager to learn more about space and the ocean, hoping to be the best at
    building and solving puzzles, and aims to develop the knowledge and skills that could lead her to a future career in STEM fields, such as marine biology or aerospace engineering.
