  hobbies: '[''Abstract watercolor painting'', ''Sketching'', ''Reading speculative fiction and philosophy'', ''Gardening (native wildflowers)'', ''Hiking and birdwatching'', ''Volunteering teaching art
    at community center'', ''Upcycling and DIY crafts'']'
  career_goals: Kathleen aims to transition from a line worker to a training and development specialist within the manufacturing sector, where she can blend her educational background with process improvement
    expertise. She hopes to design and lead on‑the‑job training programs that empower workers to adopt lean practices and foster a culture of continuous learning. In the longer term, she envisions opening
    a community workshop that offers vocational training alongside art classes, allowing her to nurture creativity while supporting local economic development.
