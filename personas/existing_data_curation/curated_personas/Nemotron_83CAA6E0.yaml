  career_goals: Although retired from full-time employment, Shirley aims to deepen her engagement with the local arts community, serving on the board of the Downers Grove Historical Society Museum and curating
    a series of interdisciplinary workshops that blend science and art for senior learners. She also aspires to mentor high-school and college students interested in STEM, develop a community garden project
    that doubles as an outdoor classroom, and complete a memoir that reflects on the evolution of women in STEM over the past six decades.
