  hobbies: '[''Backyard vegetable gardening'', ''Woodworking and furniture making'', ''Cooking Filipino dishes'', ''Fishing on local lakes'', ''Cycling on rural trails'', ''Reading non-fiction on sustainability'',
    ''Watching technology documentaries'', ''Participating in community clean‑up events'']'
  career_goals: Kevin aims to formalize his hands‑on skills into a certified contractor license so he can launch a part‑time home‑renovation business that serves the Wright County community. Simultaneously,
    he wants to become a mentor for younger immigrants, offering workshops on DIY home maintenance and basic computer literacy. He envisions expanding his backyard garden into a modest community garden
    plot, promoting food security and sharing traditional Southeast Asian crops. Though currently not in the formal workforce, his ambition is to combine his practical talents with his competitive drive
    to be recognized as a reliable resource in the local area, while ensuring a stable future for his family.
