personas:
  professional: Kevin Phan, a seasoned DIY specialist and community organizer, combines carpentry, basic plumbing, and electrical repair expertise with a curiosity‑driven practicality and competitive drive
    to coordinate home‑renovation projects, mentor immigrant families, and pursue a contractor license, positioning them as a reliable go‑to resource in Wright County.
  sports: Kevin Phan, an avid outdoors enthusiast, spends weekends fishing with the Lake Pat Levis Anglers’ Association, pedals through Wright County’s rural trails with the Community Cycle Collective,
    and roots for the Minnesota Vikings and Twins while maintaining a modest personal fitness regimen of weekend hikes and occasional snowshoeing in winter.
  arts: Kevin Phan, a hands‑on creator, channels artistic sensibility into handcrafted furniture while curating a playlist that ranges from Bob Dylan and The Lumineers to contemporary folk guitarist John
    Gorka, and frequently attends productions by the St. Paul’s Community Theatre, finding inspiration for both their woodworking projects and culinary presentations.
  travel: Kevin Phan, an adventure‑prone planner, organizes low‑key road trips to Minnesota’s North Shore and the Badlands National Park, delights in weekend getaways to Minneapolis for live music and culinary
    festivals, and eyes future overseas visits to Italy’s Tuscan vineyards and Japan’s rural farmsteads to study heirloom vegetable cultivation.
  culinary: Kevin Phan, an advanced home chef, fuses traditional adobo, lumpia, and sinigang with Midwest bounty—using heirloom tomatoes, fresh bok choy, and lake‑caught trout—while experimenting with herbs
    like kaffir lime and smoked paprika, and frequently showcases their creations at community potlucks and family gatherings.
  core: Kevin Phan, a pragmatic tinkerer who balances competitive ambition with community generosity, can spend hours perfecting a woodworking joint but habitually forgets to water their garden during a
    binge of tech documentaries.
background:
  cultural: Kevin was born to Filipino immigrants who settled in Minnesota in the early 1990s. His household blended traditional Filipino customs—such as bayanihan (community cooperation), reverence for
    elders, and Catholic celebrations like Simbang Gabi—with the norms of a Midwestern small town. He grew up speaking Tagalog at home and English at school, giving him a bicultural perspective. Family
    gatherings revolve around shared meals of adobo, lechon, and lumpia, and he still participates in Filipino festivals in the Twin Cities, where he connects with the diaspora. Though he identifies as
    an American, his Southeast Asian roots shape his values of hard work, hospitality, and respect for communal harmony, which he brings to his interactions in Buffalo, MN.
attributes:
  skills: '[''Residential carpentry'', ''Basic plumbing'', ''Basic electrical repairs'', ''Backyard gardening'', ''Filipino cuisine cooking'', ''Bilingual English‑Tagalog communication'', ''Computer troubleshooting'',
