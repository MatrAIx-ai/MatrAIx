    Oracle)'', ''Project Management'', ''Conflict Resolution'', ''Customer Service Excellence'']'
  hobbies: '[''Visiting Art Galleries'', ''Watercolor Painting'', ''Community Theater'', ''Experimental Cooking'', ''Vegetable Gardening'', ''Hiking'', ''Nature Photography'', ''Acoustic Guitar'', ''Regional
    Food Co‑op Participation'', ''Volunteering as Cooking Instructor'', ''Reading Hudson Valley History'']'
  career_goals: Kurt aims to advance to a regional food‑service director position within the next five years, overseeing multiple school districts and shaping district‑wide nutrition policies. He intends
    to pioneer a comprehensive nutrition‑education curriculum that blends culinary arts with classroom learning, leveraging his education background. Long‑term, he envisions launching a consulting firm
    that helps schools adopt sustainable sourcing and innovative menu programs, and eventually opening a community‑focused café that doubles as an art space for local artists and a venue for culinary workshops.
