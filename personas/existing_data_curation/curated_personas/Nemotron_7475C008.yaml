  career_goals: Avery aspires to merge her love for science and art by becoming a research‑oriented product designer or environmental engineer who creates aesthetically compelling, sustainable technologies.
    She hopes to earn a scholarship to a top STEM high school, win regional science‑fair awards, and eventually attend a university renowned for engineering and interdisciplinary design. In the longer term,
    she dreams of developing an app that visualizes real‑time environmental data through interactive graphics, and possibly curating technology‑focused exhibits at a museum to inspire other young innovators.
