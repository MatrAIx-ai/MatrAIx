  career_goals: David aims to obtain a full California contractor's license within the next two years and launch his own boutique painting company that specializes in high‑end residential finishes and custom
    decorative work. He aspires to become the go‑to painter for upscale neighborhoods in San Joaquin County, build a reputation for impeccable craftsmanship, and eventually mentor apprentices from the local
    Vietnamese community. Financial stability and the ability to support a comfortable lifestyle for himself while pursuing personal growth are central to his ambitions.
