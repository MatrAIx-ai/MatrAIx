persona_description: A veterinarian who specializes in the diagnosis and treatment of skin tumors in dogs and cats. They are experienced in performing fine needle aspirates and tissue biopsies to determine
  the type and stage of the tumor, as well as assessing the risk of cancerous cells invading blood vessels or lymphatic vessels. They are knowledgeable in the use of heavy sedation or general anesthesia
  for biopsy procedures, and are skilled in interpreting biopsy results to make an accurate diagnosis. They have a keen interest in the latest diagnostic techniques and are always up-to-date with the latest
  research in the field.
