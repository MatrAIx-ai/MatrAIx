personas:
  professional: A veteran insurance claims specialist, Jorell Jowers leverages deep expertise in property valuation, Xactimate, GIS mapping, and Python-driven data analysis to dissect complex loss cases
    while they naturally apply curiosity and empathetic communication to foster collaborative problem‑solving and mentor junior adjusters.
  sports: An enthusiastic supporter of Charlotte’s sports scene, Jorell Jowers roots for the Panthers and Hornets, joins the Charlotte Running Club for weekend 5‑k runs, and they maintain a low‑impact fitness
    routine of brisk walks and occasional golf rounds at the local country club.
  arts: Deeply immersed in visual arts, Jorell Jowers frequents the Mint and Bechtler Museums, curates a personal collection of contemporary works by artists such as Mark Bradford, Kehinde Wiley, and Julie
    Mehretu, and they find creative refuge in photographing historic neighborhoods while setting classic jazz vinyl by Miles Davis and B.B. King as a soundtrack.
  travel: Balancing a love for Southern charm with a curiosity for global culture, Jorell Jowers has explored Savannah’s historic squares, hiked the Blue Ridge Parkway, and they dream of studying Dutch
    canal architecture in Amsterdam, always planning trips months ahead to secure modest airfare and lodging within a retirement‑friendly budget.
  culinary: A seasoned home cook, Jorell Jowers blends farm‑to‑table freshness from their vegetable garden with soulful Southern flavors, regularly preparing shrimp and grits with Andouille sausage, collard
    greens seasoned with smoked turkey, and they experiment with cracked black pepper and habanero in gumbo.
  core: Jorell Jowers is a meticulous claims analyst who balances data‑driven precision with a quiet passion for art, jazz, and gardening, and they occasionally trade sleepless nights for extra vinyl hunting
    while habitually skipping flossing in favor of late‑night photography.
background:
  cultural: Jorell is a second‑generation African‑American who grew up in the Charlotte area during the post‑civil‑rights era. His family emphasized resilience, education, and community solidarity, values
    that continue to shape his worldview. He maintains strong ties to Southern traditions, including gospel music, church fellowship, and family gatherings centered around soul food. His cultural identity
    is reflected in his pride for African‑American artistic expression and his involvement with local heritage societies and the NAACP chapter. These experiences fuel his commitment to mentorship, equity
    in the workplace, and the preservation of cultural history through his artistic pursuits.
attributes:
  skills: '[''Property valuation'', ''Loss assessment'', ''Forensic claim investigation'', ''Xactimate'', ''Guidewire'', ''GIS mapping'', ''Advanced Excel modeling'', ''SQL query basics'', ''Python for
