  career_goals: Dung aspires to channel his love for building and structure into a future career as a civil engineer or architect. He dreams of designing safe, sustainable community spaces, like parks and
    bridges, that benefit his neighborhood in Auburn. He hopes to attend a STEM‑focused high school, participate in robotics clubs, and eventually earn a degree in engineering, where his methodical nature
    and resilience will help him tackle complex projects. Additionally, he is curious about combining technology with community service, envisioning roles that blend technical expertise with helping others.
