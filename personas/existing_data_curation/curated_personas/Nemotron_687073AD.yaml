personas:
  professional: A budding engineer-in-training, Dung Contractor channels their love for step‑by‑step construction into intricate LEGO builds and model airplane projects, and they apply the discipline learned
    from karate and soccer to meticulously plan and execute each build.
  sports: A committed team player, Dung Contractor stars on the Auburn Hawks youth soccer squad, trains twice weekly at the Westside Karate Club, and they cheer for the Seattle Seahawks and Seattle Sounders
    as their favorite professional sports franchises.
  arts: A creative technologist, Dung Contractor blends love for LEGO architecture with sci‑fi storytelling, quoting Rick Riordan while programming Scratch games set to the beats of Imagine Dragons and
    occasionally performing lion dance routines during Tet celebrations, and they often share their creations with friends online.
  travel: An organized explorer, Dung Contractor enjoys family hikes up Mount Rainier, weekend trips to Seattle’s Pike Place Market, and dreams of a structured cultural immersion tour to Ha Long Bay, always
    preferring itineraries with clear daily checkpoints, and they make detailed checklists for each trip.
  culinary: A budding chef, Dung Contractor delights in simmering phở broth with star anise and ginger during Tet, rolling bánh chưng with sticky rice and mung beans, and mastering simple Western dishes
    like pepperoni pizza and stir‑fried bok choy with soy sauce, and they love to experiment with new flavor combinations.
  core: Dung Contractor merges a structured love of building with calm resilience, turning disciplined play into learning while occasionally forgetting to tidy their LEGO work‑area, and they keep a secret
    stash of extra bricks for late‑night projects.
background:
  cultural: Dung belongs to a Vietnamese‑American family that moved to the Pacific Northwest a generation ago. At home, Vietnamese language and customs are a daily part of life, from speaking Vietnamese
    with his parents to helping prepare traditional dishes like phở and bánh chưng during holidays. The family observes cultural festivals such as Tet, where Dung participates in lion dances and gift‑giving
    rituals. Growing up in Auburn, Washington, he is exposed to a multicultural community, attending a public elementary school with a diverse student body. He values the Vietnamese principles of respect
    for elders, community cooperation, and perseverance, which complement his calm and resilient personality. The blend of his heritage and the broader American environment shapes his worldview, encouraging
    both cultural pride and an openness to new experiences.
