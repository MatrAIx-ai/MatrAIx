  hobbies: '["hiking in the Teton Mountains", "landscape photography", "sketching and drawing", "woodworking", "attending local art exhibitions", "watching indie films", "participating in community theater",
    "vintage car restoration", "home brewing", "DIY home improvement projects", "reading science‑fiction and tech magazines", "playing acoustic guitar"]'
  career_goals: Steven aims to earn EPA-certified technician status and complete an associate degree in mechanical engineering technology within the next three years, positioning himself for promotion to
    plant manager or regional operations supervisor. He dreams of eventually opening his own environmentally‑focused contracting firm that blends traditional mechanical services with renewable‑energy solutions.
    While climbing the corporate ladder, he wants to mentor younger mechanics, fostering a culture of curiosity and continuous learning on his teams. He also hopes to gain recognition for innovative, cost‑effective
    repair strategies that improve service efficiency for clients across Idaho.
