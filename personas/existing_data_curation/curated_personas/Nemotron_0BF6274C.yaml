    projects"]'
  career_goals: Patricia aims to grow her freelance practice into a well‑known boutique studio that serves both editorial and commercial clients in the Chicago area and beyond. She aspires to launch a community‑focused
    photography space where she can host workshops, exhibit emerging artists, and provide mentorship to aspiring photographers, particularly youth from underrepresented backgrounds. Over the next five years
    she plans to publish a photo book that weaves together her travel, nature, and urban portraits, integrating augmented reality elements to enhance viewer interaction. To stay at the forefront of visual
    technology, she intends to pursue advanced training in immersive media and sustainable printing practices, while maintaining a flexible schedule that supports her growing family life. Ultimately, Patricia
    envisions her work as a bridge between art, technology, and community, fostering shared experiences and thoughtful dialogue.
