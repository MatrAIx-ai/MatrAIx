personas:
  professional: Jeanne Chavez is a meticulous aircraft maintenance technician, and they leverage their expertise in composite repairs, FAA Part 43/91 compliance, and diagnostic tools to solve complex mechanical
    puzzles while leading small crews with a competitive edge.
  sports: Jeanne Chavez spends weekends trail‑running the Appalachian ridgelines, follows the Carolina Panthers in the NFL and the Charlotte Hornets in the NBA, and they are a member of the Asheville Trail
    Runners club where they log weekly mileage and occasionally volunteer as a race marshal.
  arts: Jeanne Chavez enjoys classic rock and blues, regularly listening to Led Zeppelin, B.B. King, and The Rolling Stones, and they attend intimate vinyl‑record listening parties and sketch aircraft silhouettes,
    while occasionally visiting the North Carolina Museum of Art to view contemporary installations.
  travel: Jeanne Chavez’s travel style blends aviation‑focused pilgrimages to the Smithsonian’s National Air and Space Museum in Washington, D.C., and the Wichita Aviation Museum, with rugged solo hikes
    to the Great Smoky Mountains, and they favor a mix of meticulously planned itineraries and spontaneous road‑trip detours when a museum exhibit coincides with a weekend.
  culinary: Jeanne Chavez loves cooking regional dishes like shrimp and grits with Andouille sausage, smoked brisket rubbed with cumin and smoked paprika, and homemade cornbread, and they often experiment
    with fresh herbs and hot sauce while perfecting their skillet‑fry technique during small gatherings.
  core: Jeanne Chavez is a detail‑obsessed aviation mechanic with a competitive streak, and they balance a love of solitary tinkering and RC flight with a habit of over‑organizing their toolboxes while
    occasionally forgetting to pay their rent on time.
background:
  cultural: Jeanne grew up in Frostburg, Garrett County, Maryland, a region steeped in Appalachian traditions and a close‑knit rural community. While her family identifies as white, her surname reflects
    a hint of Hispanic ancestry, though her primary cultural affiliation aligns with the mid‑Atlantic/A​ppalachian values of self‑reliance, a strong work ethic, and practical skills. Raised in a household
    that encouraged hands‑on learning, she participated in local 4‑H clubs and community events, fostering an early interest in mechanics and aviation. Her cultural experiences include regular attendance
    at a local church, involvement in county festivals that celebrate regional crafts and outdoor activities, and occasional volunteer work at the nearby small airfield, reinforcing her connection to both
    the community and the aviation world.
attributes:
  skills: '["Aircraft structural inspection", "Powerplant troubleshooting", "Hydraulic system diagnostics", "FAA maintenance regulations compliance", "Composite repair techniques", "MIG/TIG welding and
    sheet‑metal fabrication", "Maintenance software proficiency (CAMP, AeroDocs)", "Precision hand tool operation", "Quality control and documentation", "Methodical problem‑solving under pressure"]'
  hobbies: '["RC model aircraft building and flying", "Hiking and trail running", "DIY woodworking and home improvement", "Flight simulation gaming", "Aviation history reading", "Classic rock and blues
    listening", "Small‑group technical book club", "Cooking regional recipes"]'
  career_goals: Jeanne aims to earn her full FAA Airframe & Powerplant (A&P) certification within the next year and advance to a senior aircraft maintenance technician role with a regional airline, eventually
    leading a small team and overseeing quality assurance. She is keen to specialize in advanced composite repairs for next‑generation aircraft and plans to complete an associate degree in Aviation Maintenance
    Technology to deepen her technical knowledge. Long‑term, she envisions opening her own aviation maintenance shop focused on private and general‑aviation aircraft, while also mentoring aspiring mechanics
    and participating in national technician competitions to benchmark her skills.
