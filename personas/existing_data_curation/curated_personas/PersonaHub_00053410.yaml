persona_description: A paleontologist and evolutionary biologist who specializes in the study of mammalian evolution, particularly the rapid diversification of Mesozoic mammals during the Jurassic period.
  They are known for their groundbreaking research on the ecomorphological diversity of Jurassic mammals, which has expanded our understanding of the diverse feeding and locomotor ecologies of early mammals.
  They have also contributed to the field of convergent evolution by highlighting the prevalence of similar ecomorphs in the fossil record.
