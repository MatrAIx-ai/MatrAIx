personas:
  professional: Curtis Gordon, a 30‑year‑old hospitality supervisor with a bachelor's in education, leverages rapid memory recall, POS mastery, and curriculum‑design expertise to train staff and craft visually
    compelling menu narratives, and they channel their imaginative curiosity and competitive drive into every shift.
  sports: Curtis Gordon follows the Los Angeles Lakers and the New York Yankees, practices yoga three times weekly, joins a community chess league that doubles as a mental sport, and they also play in a
    seasonal recreational soccer league each summer, balancing competitive spirit with mindful movement.
  arts: Curtis Gordon immerses themselves in contemporary art, regularly citing Basquiat and Yayoi Kusama for inspiration, curates a personal gallery of watercolor abstracts, and they find solace listening
    to Radiohead, Aphex Twin, and the poetry of Ocean Vuong while attending off‑beat theater productions starring Jeremy Strong.
  travel: Curtis Gordon prefers meticulously planned trips that blend artistic immersion with culinary adventure, having explored the street food markets of Bangkok, the tea houses of Kyoto, and the mural‑laden
    neighborhoods of Valparaíso, and they dream of a pilgrimage to the art colonies of Provence, all balanced against a modest family budget.
  culinary: Curtis Gordon experiments with flavor pairings like miso‑glazed pork belly with sumac‑infused carrots, uses matcha‑salt finishing on avocado toast, and they document detailed breakdowns of fermented
    black garlic aioli on their personal blog, reflecting a confident home chef who thrives on culinary novelty.
  core: Curtis Gordon is a restless creative mind who channels competitive energy into art and business, yet they often sacrifice sleep for late‑night experiments and battle a persistent undercurrent of
    anxiety.
background:
  cultural: Curtis grew up in a middle‑class family in the suburban towns of New Haven County, Connecticut. His upbringing reflected the New England emphasis on education, self‑reliance, and community involvement.
    Although identifying as white American, his household celebrated a blend of traditional Anglo‑American customs—such as Thanksgiving gatherings, summer barbecues, and a respect for local history—while
    also exposing him to the cultural diversity of the greater New Haven area through school programs and community events. This background fostered a liberal outlook, an appreciation for the arts, and
    a strong work ethic.
