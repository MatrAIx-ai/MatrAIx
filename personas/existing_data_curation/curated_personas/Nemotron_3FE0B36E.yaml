  career_goals: Curtis aims to leverage his bachelor's degree in education to transition into a role that blends teaching and creativity, such as developing arts‑focused curricula for community programs
    or becoming an instructional designer for experiential learning. In the short term, he seeks a supervisory position within hospitality to refine his leadership skills and implement innovative service
    concepts that fuse culinary art with visual storytelling. Over the next five years, he aspires to launch a boutique café‑gallery that serves as a platform for local artists and offers interactive workshops,
    thereby marrying his passions for education, art, and hospitality while providing a stable income for his family.
