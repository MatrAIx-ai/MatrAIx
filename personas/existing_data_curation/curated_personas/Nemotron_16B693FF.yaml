personas:
  professional: Julio Ochoa is a veteran computer support specialist whose three decades of troubleshooting Windows, macOS, and Linux systems, automating with PowerShell and Bash, and documenting processes
    translate into a meticulous, structured approach that makes them a natural candidate for senior technical lead roles, while their competitive streak surfaces in mentoring junior technicians and designing
    efficient support workflows.
  sports: Julio Ochoa is a devoted fan of the Houston Astros and the Dallas Cowboys, holds a season ticket for the Astros, and stays active by competing in weekly chess tournaments, fishing tournaments,
    and as a member of the local Corpus Christi Senior Cycling Club that rides each Saturday morning.
  arts: Julio Ochoa immerses themselves in the arts through evenings listening to Juan Gabriel and Carlos Santana, attending the Corpus Christi Art Center's monthly Mexican folk dance shows featuring performers
    like Mariachi Los Camperos, and indulging in occasional watercolor sketches of their garden, a hobby that satisfies their competitive eye for detail.
  travel: Julio Ochoa prefers low-key road trips planned months in advance, often driving to the Texas Hill Country for vineyard tours, revisiting San Antonio's River Walk, and dreaming of a culinary pilgrimage
    to Oaxaca, all while balancing travel around their consulting commitments and family obligations.
  culinary: Julio Ochoa approaches cooking with the same precision they apply to debugging, mastering mole poblano, pozole, and fresh tacos using home-grown tomatoes, jalapeños, cilantro, and epazote, while
    occasionally over-seasoning the salsa and admitting a guilty pleasure for spontaneous chiles rellenos after a long day.
  core: Julio Ochoa is a disciplined tech veteran who balances methodical work with hands-on hobbies, early-morning fishing, and an unflinching eye for detail in everything from scripts to salsa, even if
    they sometimes over-schedule and forget to take a break.
background:
  cultural: Julio is a first-generation Mexican-American whose parents immigrated from Jalisco, Mexico, and who grew up in Corpus Christi speaking both Spanish and English. He maintains strong ties to Mexican
    traditions—celebrating Día de los Muertos, Easter Semana Santa, and family gatherings centered on food and music—while also embracing the coastal Texas lifestyle, including local seafood cuisine and
    the city’s maritime heritage. His Catholic faith, family-centric values, and bilingual upbringing shape his worldview, fostering a deep respect for hard work, community service, and the blend of Mexican
    and Texan cultural identities.
attributes:
  skills: '[''Windows OS troubleshooting'', ''Linux system administration'', ''Active Directory management'', ''Network configuration and troubleshooting'', ''Hardware diagnostics and repair'', ''Remote
    support tools (TeamViewer, LogMeIn)'', ''Ticketing systems (ServiceNow, Zendesk)'', ''PowerShell and Bash scripting'', ''Data backup and recovery'', ''Basic cybersecurity practices'', ''Technical documentation
    and training'']'
  hobbies: '[''Fishing'', ''Gardening (tomatoes, jalapeños, herbs)'', ''Cooking Mexican cuisine'', ''Restoring a 1965 Chevrolet'', ''Playing chess'', ''Attending Corpus Christi Rodeo'', ''Participating
    in Catholic feast days'', ''Reading historical biographies'', ''Crossword puzzles'', ''Volunteering to teach computer basics'']'
  career_goals: 'Julio aims to leverage his extensive support background to move into a senior technical lead role where he can design support workflows, mentor junior technicians, and oversee service-level
    agreements for his organization. He plans to earn advanced certifications such as Microsoft Certified: Modern Desktop Administrator, CompTIA Security+, and Cisco CCNA to broaden his network and security
    expertise. In the longer term, he envisions launching a freelance consulting practice that offers small businesses in Corpus Christi reliable IT maintenance, cybersecurity assessments, and staff training,
    allowing him to balance work with a gradual transition toward semi-retirement.'
