  career_goals: Nancy aims to complete a Bachelor’s degree in Data Science or Information Systems, targeting a role as a data analyst or UX researcher within the tech corridor of the Research Triangle.
    She plans to earn industry certifications such as Google Data Analytics and to build a portfolio of data‑driven projects that demonstrate her curiosity and practical problem‑solving. Over the next five
    years she hopes to become a top performer in her field, leveraging her competitive drive, and eventually launch a freelance consultancy offering data insights for small businesses, allowing the flexibility
    she values.
