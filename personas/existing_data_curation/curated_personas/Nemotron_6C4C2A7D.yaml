  career_goals: Now retired, Alexander seeks to channel his curiosity and experience into community‑focused endeavors. He aims to mentor younger tradespeople through local workshops, volunteer at the Beaver
    County Historical Society to preserve the region’s industrial heritage, and complete a personal memoir that intertwines his life story with reflections on art and technology. He also aspires to produce
    a series of abstract watercolor paintings for a local gallery exhibition, travel to renowned art museums in Philadelphia and New York, and learn to play the piano to broaden his creative expression.
