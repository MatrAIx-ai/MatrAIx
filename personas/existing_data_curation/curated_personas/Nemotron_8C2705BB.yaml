  career_goals: Even in retirement, Oscar is driven to stay active and purposeful. He aims to launch a weekly woodworking class for seniors at the community center, preserving the craft and fostering intergenerational
    connections. He plans to compile a memoir that weaves his family’s immigrant story with the history of the Redwood Coast, hoping to donate it to the local historical society. Oscar also aspires to serve
    on the town’s advisory board for senior services, influencing policies that promote social inclusion and mental‑health support. He hopes to mentor at least three younger volunteers each year, sharing
    both his practical skills and his love of community storytelling.
