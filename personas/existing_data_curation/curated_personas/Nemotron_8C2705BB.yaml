personas:
  professional: Oscar Kon, a retired timber and maritime specialist now serving as a senior center event coordinator, leverages four decades of carpentry, small‑engine repair, and storytelling to lead workshops,
    mentor volunteers, and champion intergenerational woodworking classes.
  sports: Oscar Kon enjoys fishing for salmon and halibut along the Humboldt coast, hikes the Redwood National and State Parks trails, supports the San Francisco 49ers and Golden State Warriors, and participates
    in a senior volleyball league at the Eureka Recreation Center.
  arts: Oscar Kon frequently acts and crews in community theater productions with the Humboldt Repertory Theatre, reads Agatha Christie mysteries and Doris Kearns Goodwin histories, and admires performers
    like Meryl Streep and musicians such as Joni Mitchell, often quoting Bob Dylan lyrics during social gatherings.
  travel: Oscar Kon favors road trips along the Pacific Coast Highway, weekend getaways to Redwood National Park, annual salmon‑fishing expeditions to Alaska's Kenai River, and cultural visits to the Edinburgh
    International Book Festival, balancing limited senior travel budget with a love for nature and literature.
  culinary: Oscar Kon experiments with seafood dishes like pan‑seared halibut with lemon‑dill sauce, cedar‑plank salmon, and classic clam chowder, grows kale, rosemary, and heirloom tomatoes in his garden,
    and brews a hoppy amber ale using Cascade hops, though they sometimes over‑season and forget to label their batches.
  core: Oscar Kon is a sociable 72‑year‑old retired timber worker who blends curiosity, hands‑on craftsmanship, and community storytelling while juggling worry‑prone finances and a penchant for over‑spicing
    his home‑brews.
background:
  cultural: Oscar is a third‑generation American of German‑Irish descent, raised in a modest working‑class family that settled in the Redwood Coast during the early 1900s. The region’s blend of timber‑industry
    pragmatism, coastal fishing traditions, and progressive environmental values shaped his outlook. He grew up attending local church services, community picnics, and school events that emphasized self‑reliance,
    neighborly cooperation, and respect for the surrounding natural landscape. While he identifies with the broader white American cultural narrative of independence and community service, he also holds
    a deep appreciation for the Indigenous Wiyot and Yurok histories of the area, often supporting preservation initiatives and learning about their cultural heritage.
