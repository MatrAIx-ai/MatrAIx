personas:
  professional: Rosalinda Mercado, a precision instrument repair technician, leverages their methodical mindset and skeptical eye to calibrate laser alignment tools, design preventive‑maintenance schedules,
    and train junior staff, while channeling their competitive drive to push team performance metrics.
  sports: Rosalinda Mercado, a member of the Blue Ridge Hiking Club and a regular participant in the local Saturday night pick‑up basketball league, trains competitively on the court, cheers for the Atlanta
    Hawks and Braves, and schedules weekly hikes in the foothills to balance cardio and stress relief.
  arts: Rosalinda Mercado, a salsa dancer who spins to the rhythms of Celia Cruz and Carlos Santana, devours mystery novels by Agatha Christie and Tana French, and occasionally attends community theater
    productions featuring Lin‑Manuel Miranda’s works, using these creative outlets to unwind after demanding calibration projects.
  travel: Rosalinda Mercado prefers meticulously planned road trips that blend family visits to their sister in New Mexico with culinary tours of New Orleans, has already explored Oaxaca for authentic mole
    recipes, and dreams of hiking the Patagonian Andes, though budget constraints keep international travel occasional.
  culinary: Rosalinda Mercado, an enthusiastic home chef, fuses traditional Mexican dishes like chiles rellenos and pozole with Southern comforts such as collard greens and smoked brisket, frequently preparing
    mole rojo with chipotle and okra, and relishes sourcing fresh heirloom tomatoes, corn masa, and locally smoked paprika from the farmer’s market.
  core: Rosalinda Mercado, a detail‑driven technician with a competitive streak, channels their organized energy into precise instrument repairs, community salsa nights, and meticulously curated family
    feasts, all while wrestling with stress‑fuelled worry and occasional splurges on kitchen gadgets.
background:
  cultural: Rosalinda is a first‑generation Mexican‑American who grew up speaking Spanish at home and maintaining close ties to her extended family’s traditions. She celebrates Dia de los Muertos, Las Posadas,
    and Mexican Independence Day with vibrant gatherings that blend Mexican customs with her Southern Alabama surroundings. Her Catholic faith informs her community involvement, and she often integrates
    Mexican culinary techniques with local ingredients. While she embraces the hospitality and community spirit of the rural South, she also preserves her cultural heritage through language, music, and
    family rituals.
