  career_goals: Although not currently in the workforce, Joan aims to finish the associate coursework she began in college, focusing on gerontology or social work to deepen her caregiving knowledge. She
    hopes to become a certified volunteer caregiver and to lead a peer‑support group for other seniors in her community. Joan also wants to develop a family memoir and a detailed genealogy project that
    preserves her ancestry for future generations. Financially, she plans to work with an estate planner to solidify her family’s long‑term security, and she aspires to start a neighborhood garden program
    that encourages sustainable, structured planting among her neighbors. Finally, she intends to learn mindfulness techniques to better manage her stress and negative emotions.
