personas:
  professional: Joan Flynn is a community-oriented caregiver-in-training who leverages meticulous record-keeping and event-planning skills to coordinate volunteer projects, support senior peer groups, and
    pursue an associate degree in gerontology, all while maintaining a calm, structured approach to small-group leadership.
  sports: Joan Flynn enjoys low-impact fitness through nature walks on the Oak Ridge trail, follows the local senior walking club, cheers for the Springfield Wildcats minor-league baseball team, and participates
    in community garden yoga sessions that emphasize gentle stretching and balance.
  arts: Joan Flynn finds creative fulfillment knitting blankets for charity while listening to the piano sonatas of Chopin and Yeats-inspired readings of Hilary Mantel, participates in a monthly historical-fiction
    book club featuring authors like Ken Follett and Margaret Atwood, and occasionally performs simple melodies on her upright piano to complement the quiet of her garden afternoons.
  travel: Joan Flynn prefers organized, low-stress trips to historic towns such as Williamsburg, Virginia and Salem, Massachusetts, where she can explore colonial architecture and garden heritage sites,
    planning each itinerary with detailed checklists and budget constraints, while dreaming of a future pilgrimage to the vineyards of the Cotswolds in England.
  culinary: Joan Flynn delights in preparing hearty lentil soup and roasted root vegetable stew for the church's soup kitchen, savors fresh basil, thyme, and rosemary harvested from her garden in homemade
    pesto, and loves baking spiced apple crumble with a crisp oat topping, though her meticulous timing sometimes leaves her pastry slightly over-browned.
  core: Joan Flynn blends a love for structured garden rhythms, precise budgeting, and compassionate caregiving into a reliable yet worry-prone senior who finds solace in solitary crafts and small-group
    service.
background:
  cultural: Joan is a white American of Irish and German descent, raised in suburban Chester County, Pennsylvania. Her upbringing was shaped by Protestant (Methodist) values that emphasized modesty, community
    service, and self‑reliance. Growing up in the 1970s and 1980s, she experienced the baby‑boomer cultural shift toward greater educational opportunities for women, which inspired her brief college studies.
    The region’s colonial heritage and nearby historic sites fostered her interest in history and genealogy. Living close to the historically Black institution of Lincoln University has given her a broader
    perspective on cultural diversity, though her own cultural identity remains rooted in mid‑Atlantic, small‑town traditions and a strong work ethic.
