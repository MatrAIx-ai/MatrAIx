persona_description: 'A historian and author who specializes in the study of the exchange of information, food, animals, insects, plants, and viruses between the continents after Columbus'' voyage in 1493.
  His research interests include the Industrial Revolution, the Agricultural Revolution, the rise of the West, and the ''Columbian exchange.'' He has written several books on this topic, including 1491:
  New Revelations of the Americas Before Columbus and Uncovering the New World Columbus Created, and has received the U.S. National Academy of Sciences'' Keck Award for best book of the year.'
