  career_goals: Rodger aspires to become an astronaut, drawn by his fascination with space and engineering, and he dreams of designing rockets and exploring other planets. He also sees himself as a future
    civil engineer, wanting to build bridges and sustainable structures in his hometown. In the short term, he aims to win the regional science fair, earn a spot on the varsity soccer team at his future
    high school, and secure a leadership role in his school's robotics club. His long-term ambition is to combine his love for science, structure, and competition into a career that lets him contribute
    to large-scale engineering projects while inspiring younger students.
