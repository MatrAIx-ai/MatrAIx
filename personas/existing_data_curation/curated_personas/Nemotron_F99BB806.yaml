personas:
  professional: Rodger Howard is an aspiring young robotics programmer who merges his love for building detailed LEGO structures with Scratch coding, creating simple autonomous bots that he tests during
    weekend robotics camps; his methodical nature, competitive drive, and high standards push him to meticulously document each prototype and constantly refine his designs.
  sports: Rodger Howard plays forward for the Riverside Youth Soccer Club, thriving on the regimented practice schedule, the strategic drills, and the competitive edge of match days, while also cheering
    on professional teams like Manchester United and following local club matches on TV; they love weekend pick‑up games at the neighborhood park and organize mini‑tournaments during community clean‑up
    events.
  arts: Rodger Howard channels creative energy into LEGO architecture, crafting intricate cityscapes inspired by the cinematic world of The LEGO Movie and the blocky brilliance of Minecraft creator Grian,
    while devouring adventure novels by Andy Weir and sci‑fi classics like Jules Verne; they also enjoy listening to Imagine Dragons for a boost of motivation and occasional sketch concept art for their
    next LEGO build.
  travel: Rodger Howard prefers family trips with clear itineraries, having spent a week exploring the Smithsonian museums in Washington, D.C., and a thrilling day at Legoland California, and they dream
    of a future road‑trip across the Pacific Northwest to visit national parks where they can combine nature walks with building sand‑castle forts, all while keeping a travel journal organized by date and
    activity.
  culinary: Rodger Howard loves constructing edible projects like layered taco towers and pizza‑pie mosaics, favoring toppings arranged in precise patterns, and they can whip up a simple spaghetti carbonara
    after following a kid‑friendly video tutorial; although they enjoy the taste of chicken nuggets and macaroni‑and‑cheese, they often overlook vegetables unless they can be incorporated into a 'building'
    activity, like veggie sticks forming a train.
  core: Rodger Howard is a ten‑year‑old strategist who mixes a love for structured play—LEGO, chess, and soccer—with a competitive edge, disciplined routines, and a habit of turning everyday tasks into
    meticulously ordered projects.
background:
  cultural: 'Rodger grew up in a middle-class, suburban family in Jackson, New Jersey. His household reflects typical American cultural practices: celebrating holidays such as Thanksgiving, Fourth of July,
    and Christmas with family gatherings and community events. He attends a public elementary school that emphasizes academic achievement and extracurricular participation, which encouraged his involvement
    in sports leagues, a robotics club, and local scouting. The proximity to the Pine Barrens and Atlantic coastline has fostered a love for outdoor activities like camping, fishing trips with his family,
    and nature walks. His cultural background includes the values of independence, structured community involvement, and a strong work ethic common in the northeastern United States.'
