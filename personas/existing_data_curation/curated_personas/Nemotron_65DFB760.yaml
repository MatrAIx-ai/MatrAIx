personas:
  professional: Krystin Franco leverages their solid framing, finish carpentry, and blueprint‑reading expertise to lead small renovation projects, applying a blend of curiosity‑driven design experimentation
    and practical safety compliance while assertively coordinating team tasks and fostering a collaborative workshop atmosphere.
  sports: Krystin Franco regularly plays for the Wasatch Warriors ultimate frisbee squad, hikes the Wasatch foothills every weekend from May through September, and follows the Utah Jazz and Real Salt Lake
    with avid enthusiasm, balancing team‑oriented competition with personal endurance training.
  arts: Krystin Franco channels their love for design into custom furniture projects inspired by Charles Eames and the warm aesthetic of Joanna Gaines, while line‑dancing to country hits by Carrie Underwood
    at community events and unwinding with indie folk tracks from Brandi Carlile, illustrating a multifaceted artistic palate that blends functional craftsmanship with musical enjoyment.
  travel: Krystin Franco prefers weekend road trips that combine outdoor adventure with cultural immersion, often camping in Zion National Park or exploring the red‑rock trails of Arches before planning
    a longer summer getaway to the historic streets of Florence, Italy, balancing budget‑friendly journeys with occasional splurges on unique lodging experiences.
  culinary: Krystin Franco enjoys experimenting in the kitchen, often crafting herb‑crusted roasted chicken with rosemary and smoked paprika or perfecting sourdough bread for avocado toast, while skillfully
    wielding their cast‑iron skillet and regularly incorporating fresh, locally sourced produce from the Mount Pleasant farmers market.
  core: Krystin Franco is a pragmatic yet curious hands‑on creator who mixes social energy with meticulous craftsmanship, often juggling multiple projects while occasionally overbooking their calendar.
background:
  cultural: Krystin grew up in a predominantly white, rural Utah community where self‑reliance, hard work, and close‑knit family ties are emphasized. The local culture values practicality, community service,
    and outdoor recreation, all of which shape her approach to both work and leisure. Her upbringing in Mount Pleasant, with its strong sense of neighborly support and respect for traditional trades, has
    fostered her collaborative spirit while encouraging her curiosity about new building methods and sustainable practices.
