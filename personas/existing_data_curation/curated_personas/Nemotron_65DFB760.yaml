  career_goals: Krystin aims to become a certified journeyman carpenter within the next three years, pursue additional training in sustainable building practices, and eventually launch her own custom furniture
    workshop serving the Mount Pleasant community. Long‑term, she envisions moving into construction management to oversee larger projects and mentor apprentices, combining her practical skills with her
    desire to foster collaborative work environments.
