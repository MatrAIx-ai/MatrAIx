personas:
  professional: Juliana Buhler, a budding visual storyteller, merges their love for fantastical creatures with basic coding skills, creating pixel‑art mods for Minecraft while juggling school projects in
    a delightfully chaotic, free‑form schedule that they navigate with a relaxed, improvisational mindset.
  sports: Juliana Buhler, a member of the Oakwood Junior Soccer Club, enjoys weekend matches, cheers for the hometown basketball franchise the River City Guardians, and spends sunny afternoons exploring
    the local park’s trail, preferring gentle hikes over organized competition because they value low‑pressure activity and a connection with nature.
  arts: Juliana Buhler, an avid fan of Studio Ghibli’s animation, collects sketchbooks showcasing the works of Hayao Miyazaki, listens to the ethereal piano pieces of Ludovico Einaudi while drawing, and
    actively participates in community art fairs where they display their mixed‑media creations inspired by the whimsical designs of artist Tara McPherson.
  travel: Juliana Buhler, a curious explorer who prefers spontaneous day‑trips over meticulously planned vacations, has visited the towering red rocks of Sedona, dreams of wandering the moss‑covered streets
    of Kyoto, and often sketches travel diaries on the family’s weekend road trips, balancing their love for adventure with a modest allowance.
  culinary: Juliana Buhler, a budding kitchen experimenter, loves crafting rainbow veggie pizza topped with fresh basil and mozzarella, often adds crunchy quinoa to their homemade trail mix, and delights
    in making simple cupcakes glazed with vanilla frosting while humming to their favorite tracks, though they occasionally forget to clean up the flour‑filled counter.
  core: Juliana Buhler, a whimsical 11‑year‑old artist who balances boundless imagination with occasional anxiety, a love of mixed‑media creations, and a habit of day‑dreaming through school assignments,
    they navigate life with gentle curiosity and a touch of perfectionism.
background:
  cultural: Juliana grows up in Euless, Texas, a suburban community in Tarrant County with a blend of Southern hospitality and multicultural influences. Her family’s ancestry is primarily German‑American
    and Irish‑American, and they celebrate traditional holidays such as Thanksgiving, Christmas, and Fourth of July with community gatherings and local fairs. She is exposed to Texas cultural staples like
    high‑school football games, county rodeos, and Tex‑Mex cuisine, while also experiencing the diversity of the Dallas‑Fort Worth metroplex through school programs and neighborhood festivals. Her upbringing
    emphasizes kindness, cooperation, and respect for others, reflecting both her family’s values and the broader Texan ethos of neighborliness.
