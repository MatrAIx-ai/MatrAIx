  skills: '[''creative writing'', ''drawing and illustration'', ''digital art using tablets'', ''basic coding with Scratch'', ''storyboarding'', ''empathetic communication'', ''collaborative group work'']'
  hobbies: '[''drawing fantasy art'', ''creative writing'', ''reading sci‑fi and fantasy novels'', ''playing Minecraft'', ''LEGO building'', ''simple robotics kits'', ''attending library art workshops'',
    ''nature walks and collecting natural materials'']'
  career_goals: Juliana dreams of turning her love for imagination and art into a future career. She hopes to become a concept artist or illustrator for fantasy novels and video games, or perhaps a writer
    of her own illustrated stories. She also expresses a desire to combine creativity with helping others, envisioning a role such as a children's book author who promotes kindness and emotional wellbeing.
    In the long term, she aims to study graphic design or visual storytelling in college and use her talents to inspire and comfort people.
