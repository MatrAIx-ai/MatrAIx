personas:
  professional: Angel Serra, a 74‑year‑old retired business administrator turned community arts coordinator, blends bilingual translation, meticulous budget oversight, and event‑planning expertise to launch
    senior‑artist exhibitions, while their competitive drive ensures every detail meets high standards.
  sports: Angel Serra enjoys walking the Everglades trails and playing weekly tennis at the Fort Lauderdale Country Club, follows the Miami Dolphins (NFL) and Miami Heat (NBA) religiously, and participates
    in a senior bridge league that doubles as a mental‑sharpness sport, balancing competitive spirit with a relaxed fitness routine.
  arts: Angel Serra spends afternoons painting coastal scenes in acrylics, curates digital photography exhibits of local wildlife, and draws inspiration from Georgia O'Keeffe, Frida Kahlo, and contemporary
    Floridian painter Jane Doe, while their curiosity pushes them to experiment with mixed media installations for community shows.
  travel: Angel Serra prefers cultural weekend getaways, such as a train ride to historic Savannah, Georgia, a short flight to New Orleans for jazz festivals, and an annual cruise to the Caribbean, while
    dreaming of a scholarly tour of Seville, Spain, to explore its historic patios.
  culinary: Angel Serra expertly prepares traditional family dishes like arepas, hallacas, and empanadas using fresh cornmeal, plantains, and herbs harvested from their rose and herb garden, and they relish
    pairing the meals with homemade chimichurri and a side of herb‑infused tea, though they sometimes over‑salt the stews in their quest for bold flavor.
  core: Angel Serra, a meticulous 74‑year‑old art‑loving gardener, balances disciplined project planning with a habit of over‑checking their roses, never misses a bridge tournament, and occasionally forgets
    a pill when caught up in a new exhibition.
background:
  cultural: Born in Maracaibo, Venezuela, Angel Elena grew up in a household that valued music, storytelling, and Catholic traditions. She emigrated to the United States in the early 1990s, settling in
    Fort Lauderdale where a vibrant Venezuelan diaspora thrives. She remains deeply connected to Venezuelan customs—celebrating Carnaval, preparing family recipes, speaking Spanish at home, and participating
    in the annual Venezuelan Independence Day parade. Her bicultural experience fuels her commitment to cultural exchange, and her Venezuelan heritage informs her artistic tastes, culinary passions, and
    community involvement.
attributes:
  skills: '[''Spanish-English translation'', ''event planning and coordination'', ''budget management'', ''art curation (Latin American art)'', ''digital photography'', ''floral design'', ''Venezuelan cuisine
