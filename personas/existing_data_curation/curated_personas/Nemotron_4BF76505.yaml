  hobbies: '[''painting (acrylic)'', ''visiting art museums and galleries'', ''cooking Venezuelan dishes (arepas, hallacas, empanadas)'', ''gardening (rose and herb garden)'', ''reading historical biographies'',
    ''volunteering at the local Venezuelan cultural association'', ''playing bridge competitively'', ''digital photography of nature'', ''birdwatching in Everglades'']'
  career_goals: Even in retirement, Angel Elena aims to leave a lasting cultural legacy. She plans to launch a community art initiative that showcases senior and emerging artists, curate an annual exhibition
    that bridges Latin American and Floridian artistic dialogues, and publish a memoir that intertwines her Venezuelan heritage with her immigrant journey. Additionally, she seeks to establish a scholarship
    fund for Venezuelan youth pursuing studies in the arts and to mentor volunteers at the local cultural association, ensuring high standards and disciplined execution in all projects.
