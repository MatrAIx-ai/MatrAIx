personas:
  professional: Shiree Rowland is an operations manager who leverages their love for visual arts and collaborative empathy to turn small‑team projects into fluid, community‑focused programs, while their
    preference for flexible scheduling sometimes leads to last‑minute revisions.
  sports: Shiree Rowland enjoys weekend beach volleyball at Gulf Shores, follows the New Orleans Saints for football, occasionally joins a local sunrise running club along the shoreline, yet their laid‑back
    attitude sometimes causes them to skip scheduled workouts and miss the occasional bike ride they had planned.
  arts: Shiree Rowland traverses Mobile’s vibrant art scene, attends the annual Gallery Night mural tours, creates mixed‑media canvases inspired by Gulf hues, devours contemporary fiction by Sally Rooney
    and philosophical works by Alain de Botton, and finds solace in the sounds of Miles Davis and Erykah Badu, all of which fuel their creative identity.
  travel: Shiree Rowland makes spontaneous road trips to New Orleans’ French Quarter, plans a future pilgrimage to the Musée d’Orsay in Paris, and seeks sunrise hikes at Gulf Islands National Seashore,
    balancing limited savings with a desire for culturally rich experiences and often opting for budget‑friendly boutique hotels.
  culinary: Shiree Rowland seeks out hidden eateries where Southern soul food meets seafood—ordering shrimp and grits drizzled with collard‑green pesto, blackened catfish po’boys with pickled okra, and
    enjoying cooking their own jambalaya with fresh Gulf shrimp, cilantro, and smoked paprika, though they frequently rely on take‑out for weekday meals due to their flexible schedule.
  core: Shiree Rowland blends an inquisitive eye for art with a laid‑back, occasionally disorganized lifestyle, constantly juggling community projects, midnight jazz playlists, and the occasional impulse
    to buy a new canvas.
background:
  cultural: Shiree’s cultural background is rooted in the African‑American community of Mobile, Alabama. Growing up, she was immersed in Southern traditions blended with the rich heritage of the Black Gulf
    Coast, including gospel music, storytelling, and community gatherings. Family celebrations such as Juneteenth and local Mardi Gras festivities have shaped her appreciation for music, food, and communal
    harmony. The region’s historic emphasis on resilience and hospitality influences her collaborative work style and her commitment to supporting community-focused initiatives.
