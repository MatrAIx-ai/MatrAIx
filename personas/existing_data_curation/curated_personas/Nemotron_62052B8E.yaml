  career_goals: Shiree aims to advance from her current managerial role to a senior operations or director position within a cultural institution or community-focused organization in the Gulf Coast region.
    She plans to complete her undergraduate degree in Business Administration, pursue an MBA with a concentration in Arts Management, and eventually lead a multidisciplinary team that blends cultural programming
    with community development. Long‑term, she envisions launching a boutique consultancy that helps small nonprofits and artistic ventures optimize their operations while preserving their creative missions.
