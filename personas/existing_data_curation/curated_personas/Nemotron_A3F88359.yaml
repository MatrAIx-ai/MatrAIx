personas:
  professional: William Hunt is an aspiring concept artist who, leveraging their disciplined project planning and digital illustration skills with Procreate and Photoshop, is pursuing a GED and plans to
    enroll in a community‑college graphic design program, aiming to blend storytelling with UI/UX design for indie game studios while coordinating small collaborative art projects in their free time, and
    they often mentor peers in online art challenges.
  sports: William Hunt enjoys shooting hoops at Waterfront Park, follows the Louisville Cardinals men's basketball team and Louisville City FC soccer matches, and participates in the local park’s weekend
    pick‑up basketball leagues, using these activities as both social outings and a way to stay physically active amidst a busy creative schedule, and they often find inspiration for sketches during halftime.
  arts: William Hunt is a dedicated digital illustrator and speculative‑fiction enthusiast who draws inspiration from the surreal sketches of Möbius, the atmospheric concept art of Yoji Shinkawa, and the
    experimental soundscapes of Flying Lotus and Aphex Twin, regularly contributing to online art challenges and attending exhibit openings at the Speed Art Museum, and they frequently share process videos
    on social media.
  travel: William Hunt plans trips with a meticulous spreadsheet, has backpacked through the Red River Gorge and taken a weekend road‑trip to Nashville’s music scene, dreams of visiting Tokyo’s Akihabara
    district to explore Gundam model shops and attend a game‑design conference, and balances school commitments with occasional spontaneous drives along the Ohio River waterfront, and they often capture
    sunrise photos along the river.
  culinary: William Hunt enjoys cooking Southern comfort foods like shrimp and grits and hot browns, experiments with bourbon‑infused marinades, often mixes in fresh basil from their garden into pasta sauces,
    and occasionally treats themselves to sushi rolls after a late‑night gaming session, and they love to host small dinner gatherings for friends.
  core: William Hunt blends meticulous organization with vivid imagination, turning late‑night doodles into freelance gigs while they juggle a love for experimental music, nature photography, and a habit
    of forgetting to set an alarm for school.
background:
  cultural: William grew up in a middle‑class white family in Louisville, Kentucky. His upbringing reflects a blend of Midwestern hospitality and Southern cultural traditions typical of the region. He was
    exposed to local customs such as the Kentucky Derby festivities, southern cuisine, and community church events, while also benefiting from Louisville’s vibrant arts scene, including galleries, live‑music
    venues, and public murals. His family values emphasize self‑reliance, education, and community service, and he has been influenced by the region’s appreciation for storytelling, music, and creative
    expression.
attributes:
  skills: '[''digital illustration (Procreate, Photoshop)'', ''traditional sketching and mixed-media art'', ''creative writing and storyboarding'', ''basic Python programming for interactive projects'',
    ''project planning and time-management'', ''collaborative group art coordination'', ''visual media analysis'', ''beginner photography and photo-editing'']'
  hobbies: '[''digital painting'', ''traditional sketching'', ''speculative fiction reading'', ''short story writing'', ''model kit building (LEGO, Gundam)'', ''acoustic guitar playing'', ''nature photography'',
    ''experimental music listening'', ''online art challenges'', ''game mechanic brainstorming'']'
  career_goals: William aims to earn his GED within the next year and enroll in a community‑college graphic design program, building a strong portfolio of concept art and illustration. He aspires to work
    as a concept artist or UI/UX designer for a video‑game or interactive media studio, eventually establishing his own freelance studio that blends storytelling with visual design. In the long term, he
    hopes to mentor other youth who have taken alternative education paths and to contribute to Louisville’s growing creative community.
