personas:
  professional: Jerly Serna is a meticulous computer support specialist who excels at diagnosing hardware and networking issues, automates routine tasks with PowerShell, leads bilingual training sessions,
    and channels a competitive drive toward earning certifications while balancing a practical need for structure in fast‑paced help‑desk environments, and they consistently exceed service‑level agreements.
  sports: Jerly Serna fuels their high energy by weekend hikes along New England’s coastal trails with the Providence Outdoor Club, cheers the New England Patriots every fall, and finds rhythm in salsa
    and cumbia dancing, treating each session as both cardio and cultural expression, and they also follow the Hartford Yard Goats for a summer baseball fix.
  arts: Jerly Serna channels their sociable spirit through salsa and cumbia nights featuring music from Marc Anthony, classics by Celia Cruz, and local band La Cumbia Manía, while they also dive into the
    gaming world’s narrative art, streaming titles with rich storytelling and curating a playlist of modern Latin pop for their dinner gatherings, and they volunteer to teach dance steps to newcomers in
    community clubs.
  travel: Jerly Serna loves planning weekend escapes to the Cape Cod dunes or Block Island for surf‑side yoga, while their passport holds stamps from vibrant festivals in Oaxaca, the historic streets of
    Cartagena, and a spontaneous road trip through the Blue Ridge Mountains, balancing adventure with a modest travel budget, and they often book budget airlines to stretch their savings.
  culinary: Jerly Serna showcases culinary passion by mastering Guatemalan staples such as pepian, kakʼik, and tamales—spicing them with roasted chilies and coriander—while hosting monthly dinner parties
    that blend traditional aromas with modern twists, and they confidently experiment with sauces like chipotle aioli for their salsa gatherings, often swapping recipes with friends after dancing sessions.
  core: Jerly Serna blends a competitive tech mind with a vibrant social heartbeat, juggling PowerShell scripts, salsa steps, and anxiety‑taming yoga, all while secretly hoarding limited‑edition gaming
    collectibles on a tidy spreadsheet, and they never miss a chance to teach a new dance move.
background:
  cultural: Jerly is a first‑generation Guatemalan‑American who grew up hearing Kʼicheʼ Maya stories from her grandparents while navigating life in the United States. She maintains strong ties to her family
    in Guatemala, regularly video‑chatting with relatives and celebrating cultural holidays such as Día de los Muertos and Semana Santa with traditional foods and music. Bilingual in Spanish and English,
    she blends Guatemalan values of community, resilience, and respect for elders with the individualistic drive of American culture. In Providence, she participates in the Guatemalan diaspora’s cultural
    events, contributes to Spanish‑language community newsletters, and supports initiatives that promote Latinx representation in technology.
attributes:
  skills: '[''Technical troubleshooting'', ''Network configuration and troubleshooting'', ''Help desk ticket management'', ''Bilingual technical support (English/Spanish)'', ''Standard operating procedure
    development'', ''Team training and mentorship'', ''CompTIA A+ certification'', ''CompTIA Network+ certification'', ''ITIL Foundations knowledge'', ''Basic PowerShell scripting'']'
  hobbies: '[''Salsa and cumbia dancing'', ''Cooking Guatemalan cuisine'', ''Hosting communal dinner gatherings'', ''Yoga and mindfulness meditation'', ''Competitive online gaming'', ''Escape‑room puzzles'',
    ''Hiking coastal New England trails'', ''Volunteering at local STEM outreach for youth'']'
  career_goals: Jerly aims to move from individual contributor to a leadership role within IT support, targeting a position as IT Support Team Lead or Service Desk Manager within the next three years. She
    plans to deepen her expertise in network security and cloud services, earn Cisco CCNA and AWS Certified Cloud Practitioner credentials, and spearhead a department‑wide initiative to improve ticket response
    times through data‑driven process refinements. Long‑term, she envisions managing a regional IT operations team, establishing structured training programs for staff, and mentoring other Latino women
    entering the tech field.
