  career_goals: Maria aims to cement her technical foundation by obtaining the Certified Pharmacy Technician (CPhT) credential within the next year. She envisions moving into a supervisory role where she
    can mentor new aides and shape workflow standards that balance structure with the flexibility she values. Long‑term, she hopes to design and lead a bilingual medication‑adherence program for the growing
    Spanish‑speaking population in King County, leveraging her humanities background to create culturally resonant educational materials. To broaden her impact, she plans to earn a certificate in Public
    Health, ultimately transitioning into a community health‑education position that blends pharmacy expertise with outreach and advocacy.
