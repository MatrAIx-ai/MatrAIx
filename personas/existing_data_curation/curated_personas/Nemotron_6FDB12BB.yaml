  hobbies: '[''Cooking traditional Thai dishes'', ''Herb and vegetable gardening'', ''Reading personal development and finance books'', ''Walking in local parks and historic neighborhoods'', ''Knitting
    and crocheting'', ''Attending community cultural festivals'', ''Volunteering at an immigrant support center'']'
  career_goals: Soutchay aims to deepen her expertise in accounting by pursuing a Certified Bookkeeper credential and eventually an associate’s degree in accounting. Over the next few years she envisions
    moving into a senior bookkeeping or accounting supervisor role within a mid-sized firm, where she can lead a team, implement efficient workflow systems, and mentor newer staff. Long‑term, she hopes
    to qualify for a CPA or CMA certification, giving her the flexibility to transition into an internal auditor or finance manager position. Her ambitions are guided by a desire for stable, progressive
    career growth while maintaining a balanced work‑life routine.
