  hobbies: '[''Beadwork'', ''Ivory and bone carving'', ''Traditional cooking'', ''Dog sledding'', ''Snowshoeing'', ''Photography'', ''Community greenhouse gardening'', ''Quilting'', ''Reading mystery novels'',
    ''Attending cultural festivals'']'
  career_goals: Samone aims to earn a Certified Quality Assurance Professional (CQAP) credential and advance to a supervisory or lead inspector role. She wants to introduce lean-process improvements to
    reduce waste and increase efficiency in Arctic testing labs, and develop a mentorship program for younger Alaska Native workers. Long-term, she envisions coordinating a regional safety workshop that
    blends modern inspection techniques with traditional environmental stewardship knowledge.
