personas:
  professional: Alexa Mckelvey, a 28‑year‑old surveillance officer in Fairfield, Ohio, merges meticulous observational skills with a disciplined work ethic, and they interpret CCTV feeds, draft precise
    incident reports, de‑escalate conflicts, and steadily pursue CPO and CFE certifications to advance toward a supervisory role in a major casino security team.
  sports: Alexa Mckelvey, a steady participant in the local Fairfield YMCA’s adult yoga classes and an occasional volunteer referee for youth soccer matches, follows the Cincinnati Bengals for football,
    the Cleveland Guardians for baseball, and they hike the nearby Hueston Woods State Park trail system to stay fit, preferring low‑impact activities over high‑intensity gym sessions.
  arts: Alexa Mckelvey, an avid reader of contemporary fiction such as Sally Rooney’s ‘Normal People’ and a lover of classic literature like Jane Austen, spends Saturday evenings at the Fairfield Public
    Library’s book club, enjoys the photography exhibits at the local art gallery, and they find inspiration in the folk music of artists like Gillian Welch, which often plays softly while they solve crosswords.
  travel: Alexa Mckelvey, who favors structured itineraries over spontaneous trips, has taken weekend road trips to the Amish Country of Lancaster, Pennsylvania, and a summer getaway to Chicago’s Museum
    Campus, and they dream of a carefully planned European tour to historic literary sites in England and Germany, though they keep travel expenses modest to stay within their savings goals.
  culinary: Alexa Mckelvey, a competent home cook who loves preparing hearty Midwestern comfort foods, regularly makes chicken pot pie with flaky crust, experiments with seasonal roasted beet salads featuring
    goat cheese and walnuts, and they indulge in baking chocolate chip cookies whenever they need a soothing break from surveillance duties.
  core: Alexa Mckelvey is a disciplined, detail‑oriented surveillance professional who balances a love for quiet reflection, community service, and meticulous planning with a penchant for crossword puzzles,
    and they have a habit of over‑organizing their calendar.
background:
  cultural: Alexa was raised in a middle‑class suburban family in Fairfield, Ohio, embodying typical Midwestern American values of community, modesty, and self‑reliance. Her ancestry includes English and
    German roots, and she grew up with a blend of cultural traditions such as holiday gatherings, church participation, and local community events like county fairs. The region’s emphasis on practicality
    and hard work shaped her disciplined mindset, while the local arts scene and public libraries nurtured her curiosity and love for literature.
