  career_goals: Alexa aims to progress from her current surveillance officer role to a supervisory position within the next three years, pursuing certifications such as Certified Protection Officer (CPO)
    and Certified Fraud Examiner (CFE). She aspires to lead a security team in a major casino or entertainment venue and eventually transition into corporate risk management. Long‑term, she envisions founding
    a boutique security consulting firm focused on surveillance technology integration and staff training, while mentoring newcomers to promote professionalism and ethical conduct.
