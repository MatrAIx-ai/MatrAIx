    and vegetable garden)'', ''Attending community art workshops'', ''Volunteer work at local senior center'', ''Reading historical fiction'', ''Walking in nature trails'', ''Handcrafts such as crocheting'',
    ''Participating in cultural festivals'']'
  career_goals: Yusleivy aims to advance to a lead supervisory role within her facility, where she can guide a team, implement more efficient cleaning protocols, and champion workplace safety. She plans
    to earn a certification in environmental health and safety from a community college, which would open doors to a possible part‑time instructor position for new hires. Long‑term, she dreams of starting
    a small, family‑run cleaning service that emphasizes eco‑friendly products and cultural sensitivity, allowing her to blend her passion for service with entrepreneurial independence.
