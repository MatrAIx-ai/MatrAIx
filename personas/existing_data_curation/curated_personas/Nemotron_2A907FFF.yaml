personas:
  professional: Yusleivy Cantillo, a seasoned building cleaner steeped in commercial floor care, OSHA‑compliant chemical management, and crew mentorship, channels her curious, relaxed outlook into pioneering
    eco‑friendly cleaning protocols while cultivating a cooperative, harmonious work crew.
  sports: Yusleivy Cantillo enjoys low‑impact fitness by strolling the Blue Ridge Parkway’s scenic trails and participating in a neighborhood walking club, while cheering on the Carolina Panthers on game
    nights and occasionally catching a Charlotte Hornets basketball match when time permits.
  arts: Yusleivy Cantillo expresses her curiosity through watercolor paintings of coastlines and NC hills, drawing inspiration from the lively salsa of Celia Cruz and the traditional rhythms of the local
    bomba ensemble Bomba de Juncos, and she regularly contributes to senior‑center art workshops where she swaps techniques with fellow creators.
  travel: Yusleivy Cantillo favors relaxed, budget‑friendly road trips, delighting in weekend drives across the Blue Ridge Parkway and yearly pilgrimages to San Juan’s historic Old San Juan, while dreaming
    of a future cultural immersion tour of Cartagena, Colombia once her eco‑cleaning venture stabilizes financially.
  culinary: Yusleivy Cantillo, a passionate home chef, lovingly prepares classic mofongo and arroz con gandules using garden‑fresh cilantro, oregano, and ají dulce, masterfully balancing traditional flavors
    with occasional low‑sodium, eco‑friendly twists for her community gatherings.
  core: Yusleivy Cantillo blends a laid‑back curiosity with a devotion to art, community, and eco‑conscious service, often juggling a paintbrush and a mop while occasionally misplacing paperwork in her
    creative clutter.
background:
  cultural: Yusleivy is a first‑generation Puerto Rican American. Raised in a bilingual household, she speaks Spanish fluently at home and English in her community. She proudly celebrates Puerto Rican traditions
    such as Fiesta de San Juan, enjoys bomba and plena rhythms, and prepares island cuisine for family holidays. At the same time, living in Staley, NC, she embraces Southern hospitality, attends local
    fairs, and blends the warmth of Southern culture with her island roots. Her cultural identity informs her love of food, music, and art, and she often shares these aspects of her heritage with coworkers
    and neighbors, fostering a sense of connection across cultures.
