persona_description: A healthcare professional who specializes in the diagnosis and treatment of corneal diseases, particularly those that cause clouding, distortion, and eventual blindness. They are skilled
  in using advanced diagnostic technology, such as slit lamps and corneal topography, to detect early signs of disease and are trained to treat corneal diseases with corneal transplant, as well as other
  measures to prolong vision in the early stages of disease. They have a deep understanding of the causes, symptoms, and treatments of corneal disease, and are committed to providing the best care possible
  to their patients.
