personas:
  professional: A budding LEGO architect named Jesse Ozenne constructs intricate models with step‑by‑step precision, channels that disciplined focus into Scratch coding projects and chess strategies, and
    mirrors the orderly rhythm of Sunday dinner routines and community garden chores, because they thrive on clear structures.
  sports: Jesse Ozenne stays active with the Snellville Tigers Youth Soccer team in the fall, practices Little League baseball in the spring, follows the Atlanta Braves and Atlanta Hawks with a dedicated
    game‑day schedule, and they align each practice and backyard basketball shoot‑around with the same meticulous chore chart that guides their daily routine.
  arts: Jesse Ozenne immerses themselves in adventure stories like the Magic Tree House series, builds narrative worlds through LEGO, grooves to the upbeat tunes of Taylor Swift and Imagine Dragons, and
    they occasionally recite lines from the animated film Moana during family movie nights, weaving these artistic threads into their organized imagination.
  travel: Jesse Ozenne prefers meticulously planned family trips, from exploring the Georgia Aquarium and the historic streets of Savannah on a weekend road‑trip to the dazzling attractions of Disney World
    in Florida, and dreams of a future adventure to London’s Natural History Museum, and they always pack a checklist of snacks, Lego kits, and a map of must‑see landmarks.
  culinary: Jesse Ozenne enjoys the reliability of classic chicken nuggets and creamy macaroni and cheese, proudly helps stir the gravy for Sunday dinner’s turkey and stuffing, whips up banana pancakes
    with a dash of cinnamon, and they often hide a secret cookie in their lunchbox as a sweet rebellion against an otherwise disciplined routine.
  core: Jesse Ozenne is an eight‑year‑old master of order who transforms LEGO blueprints into towering creations, tracks every chore in a color‑coded chart, and they secretly hoard extra puzzle pieces in
    the back of their bookshelf as a quiet rebellion against an otherwise disciplined routine.
background:
  cultural: 'Jesse grows up in Snellville, a suburban community in Gwinnett County, Georgia, within a middle‑class white family that values education, punctuality, and community involvement. His upbringing
    reflects typical Southern cultural norms: respect for elders, participation in local church activities, and celebration of holidays like Thanksgiving and Fourth of July. The family emphasizes routine,
    such as regular Sunday dinners and involvement in school and neighborhood events, which reinforce his preference for structure and predictability.'
attributes:
  skills: '["Reading comprehension", "Basic arithmetic", "Multi-step instruction following", "Puzzle solving", "Beginner chess strategies", "Organizing school projects", "Basic Scratch coding"]'
  hobbies: '["LEGO building", "Jigsaw puzzles", "Reading adventure/mystery books", "Playing chess", "Scratch coding", "Organizing personal space", "Community garden volunteering"]'
  career_goals: Even at eight, Jesse imagines a future where his love for order and achievement leads him to a career that blends precision with helping others. He often talks about becoming a civil engineer
    who designs safe bridges, an astronaut who follows strict mission protocols, or a veterinarian who cares for animals with disciplined care. His immediate ambition is to excel in school, earn recognition
    for his projects, and eventually join a youth robotics or science club that will develop his technical skills.
