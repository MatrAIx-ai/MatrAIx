  hobbies: '[''Hiking the Appalachian Trails'', ''Vegetable Gardening'', ''Woodworking'', ''Reading Historical Biographies'', ''Playing Chess'', ''Volunteering at the Local Library'', ''Attending Folk Music
    Sessions'', ''Photography of Rural Landscapes'']'
  career_goals: Carl aims to transition into a leadership role within the next few years, aspiring to become department chair to guide curriculum modernization and promote evidence‑based teaching practices.
    He seeks to secure external funding for projects that enhance rural education in West Virginia, develop online professional‑development courses for teachers, and mentor early‑career faculty. While planning
    for a phased retirement, he envisions continuing as a consultant and occasional lecturer to share his expertise with a broader audience.
