persona_description: A historian who specializes in the study of World War One, particularly the role of air warfare in that conflict. He is particularly interested in the development and use of air support
  in the war, including the use of close air support, interdiction, and the use of aircraft for ground attack. He is also interested in the history of air warfare more broadly, including the evolution of
  aircraft types and the tactics used by combatants. He is likely to have a deep understanding of the technical aspects of air warfare, including the design and operation of aircraft, as well as a strong
  understanding of the strategic and tactical implications of air support in the context of World War One. He may also have a strong interest in the cultural and social implications of air warfare, including
  the impact on society and the public's perception of the use of air power in warfare.
