persona_description: A scientist who studies the relationship between the environment and the development of the fetus, specifically focusing on the impact of the immune system on the development of the
  brain. She is interested in the link between the brain-reactive antibodies in expectant mothers and the risk of autism in their children, and is exploring ways to optimize prenatal care and diet to reduce
  the risk of autism. She is also looking into the role of valproate and omega-3 fats in preventing autism, and how induced labor affects the risk of autism in children. She is well-versed in research methodologies
  and is looking for evidence that the womb environment may have serious consequences for the development of the fetus, including some cases of autism.
