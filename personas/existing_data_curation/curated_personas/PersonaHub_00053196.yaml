persona_description: A paleontologist who specializes in the study of trilobite faunas and their biogeographical affinities. The person is likely to be interested in the discovery of new trilobite species
  from northern Iran and the implications it has for the Late Ordovician geography of the Alborz terrane. The persona may also be interested in the comparison of the Alborz terrane's position to other known
  terranes in the Late Ordovician and the implications of the presence of certain trilobite genera in Iran, Turkistan, and NW China.
