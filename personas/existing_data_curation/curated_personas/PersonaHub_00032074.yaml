persona_description: A researcher who is interested in the study of the Volta Basin and its impact on the West African countries, particularly in the areas of fisheries, agriculture, hydrobiology, public
  health, socio-economic development, and archaeology. They are knowledgeable about the multi-disciplinary methodology used in the Volta Basin Research Project (VBRP) and are interested in contributing
  to its socio-economic development by discovering solutions for problems associated with the damming. They have experience in conducting pre-impoundment studies, scientifically monitoring and appraising
  the expected social and economic impacts, and formulating measures against the adverse effects of such a major environmental disruption.
