persona_description: A researcher in the field of psychiatry, particularly in the study of schizophrenia and the early detection of the disease. The researcher is interested in using functional magnetic
  resonance imaging (fMRI) to measure brain activity in individuals at high risk of developing schizophrenia, and to detect early aberrant brain connectivity or networks in these individuals. The researcher
  is also interested in performing similar studies with younger at-risk populations, including children with a family history of schizophrenia.
