personas:
  professional: Samara Obrien, a seasoned curriculum designer and instructional technologist, leverages their organized, methodical nature and deep empathy to weave evidence‑based pedagogy with trauma‑informed
    strategies, while channeling curiosity into innovative grant proposals that aim to reshape campus mental‑health policy.
  sports: Samara Obrien maintains fitness through low‑impact activities like walking with the Jefferson County Senior Walking Club, enjoys seasonal lawn‑bowling in summer and curling with friends in winter,
    and passionately follows the Louisville Cardinals basketball team and the Louisville Bats minor‑league baseball club, letting both community sport culture and professional games punctuate their weekly
    routine.
  arts: Samara Obrien immerses themselves in creative pursuits by volunteering in the community theater’s monthly productions, devouring historical novels by Hilary Mantel and listening to the soulful folk
    melodies of The Chieftains, while curating a scrapbook filled with family photos, heirloom seed packets, and Irish‑inspired art that channels emotional intensity into personal expression.
  travel: Samara Obrien prefers thoughtfully planned journeys that blend cultural discovery with gentle activity, having traced ancestral ties during a week‑long stay in Dublin’s historic districts, they
    now long to wander the bamboo groves of Arashiyama in Kyoto, while budgeting travel within a modest annual allowance that balances love of exploration with retirement savings goals.
  culinary: Samara Obrien, an intermediate home cook, transforms garden‑grown heirloom tomatoes, rainbow carrots, and fresh rosemary into a rustic ratatouille, crafts a hearty shepherd’s pie using locally
    sourced lamb and potatoes reminiscent of family traditions, and delights in whipping up a seasonal mango salsa with cilantro and lime whenever the farmers’ market offers ripe fruit, showcasing a blend
    of sustainable sourcing and occasional indulgent flavors.
  core: Samara Obrien orchestrates each day with the precision of a curriculum planner, the patience of a gardener, and the intensity of an anxious mind, often staying up late to perfect grant language
    while simultaneously rereading the same historical novel chapter and forgetting to water succulents.
background:
  cultural: Samara comes from a white, Irish‑American background, with family histories that trace back to Irish immigrants who settled in Missouri during the late 19th century. Raised in the Midwestern
    values of community, modesty, and hard work, she was brought up in a Catholic household that emphasized education, service, and familial ties. Although she now identifies as culturally secular, she
    still celebrates traditional Irish customs like St. Patrick's Day and participates in local heritage festivals. Living in Dittmer, MO, she blends rural Midwestern sensibilities with a scholarly outlook,
    fostering a deep appreciation for both local community cohesion and broader academic inquiry.
attributes:
  skills: '[''Curriculum Design'', ''Instructional Technology Integration'', ''Adult Learning Theory'', ''Assessment Development'', ''Data‑Driven Program Evaluation'', ''Grant Writing'', ''Academic Advising'',
    ''Student Counseling'', ''Faculty Mentorship'', ''Professional Development Facilitation'', ''Trauma‑Informed Teaching'']'
  hobbies: '[''Backyard Gardening'', ''Historical Fiction Reading'', ''Educational Psychology Literature'', ''Genealogy Research'', ''Scrapbooking'', ''Mindfulness Meditation'', ''Yoga'', ''Book Club Participation'',
    ''Volunteer Literacy Tutoring'']'
  career_goals: Samara aims to become a department chair or director of teaching and learning, where she can shape institutional policies that prioritize student mental health and inclusive pedagogy. She
    plans to secure a multi‑year grant to launch a community partnership program that offers non‑credit educational workshops for local adults. Additionally, she hopes to publish a peer‑reviewed article
    on integrating curiosity‑driven learning with practical skill acquisition, and to mentor junior faculty in developing resilient, research‑informed teaching practices.
