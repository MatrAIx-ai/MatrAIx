persona_description: A scientist at NASA's Jet Propulsion Laboratory, specifically a climatologist who specializes in the study of oceanic processes and their impact on climate. He has expertise in monitoring
  and analyzing long-term changes in ocean surface height data, which he uses to predict and forecast weather patterns and climate conditions. He is particularly interested in understanding the interplay
  between El Niño, La Niña, and La Nada states in the Pacific Ocean and how they affect global climate. He is also involved in the development of new satellite altimetry programs, such as Jason-3, which
  will provide detailed measurements of sea level on Earth to gain insight into ocean circulation and climate change.
