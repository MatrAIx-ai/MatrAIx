personas:
  professional: Shirleymae Caldwell, a data‑driven records specialist with a business degree and a knack for turning chaotic filing systems into streamlined digital archives, leverages their strong Excel
    and SQL skills while championing a relaxed, collaborative workplace culture, and they often let curiosity steer process improvements.
  sports: Shirleymae Caldwell, a casual fitness enthusiast who joins the local community center’s Saturday yoga class, follows the Atlanta Falcons in football and the Atlanta Braves in baseball, occasionally
    plays pickup basketball with coworkers, and prefers low‑impact activities like gardening over high‑intensity workouts, yet they still try to jog on breezy evenings when they feel motivated.
  arts: Shirleymae Caldwell, an avid patron of the arts who spends weekends sketching at the city’s contemporary gallery, draws inspiration from the works of Jean‑Michel Basquiat and the soulful blues of
    B.B. King, regularly attends jazz nights featuring local tributes to Nina Simone, and volunteers at community theater productions of 'A Raisin in the Sun,' letting their love of unconventional ideas
    shape their creative expression, and they often incorporate mixed‑media techniques into personal projects.
  travel: Shirleymae Caldwell, an adventure‑curious traveler who prefers flexible, low‑stress itineraries, has explored the historic streets of Savannah, the vibrant music scene of New Orleans, and dreams
    of a solo road trip along the Pacific Coast Highway to photograph coastal cliffs, all while budgeting trips through a mix of discount airfare and occasional stay‑cations with friends, and they relish
    the quiet moments spent journaling in new cities.
  culinary: Shirleymae Caldwell, a Southern‑comfort cook who whips up buttermilk fried chicken, shrimp and grits, and sweet potato pie using pantry staples like Cajun seasoning, cornbread mix, and fresh
    okra, enjoys experimenting with mixed‑media plating while sharing meals at potluck gatherings, yet often forgets to clean up promptly, leaving dishes to soak overnight, and they sometimes over‑season
    dishes in their enthusiasm for bold flavors.
  core: Shirleymae Caldwell blends artistic curiosity with a relaxed, slightly chaotic work style, channeling their love of community, comfort food, and jazz into a life that balances caring mentorship
    with occasional worry‑driven procrastination, and they frequently find themselves day‑dreaming during meetings.
background:
  cultural: Shirleymae is a Black woman raised in the Southern United States, deeply rooted in the African‑American cultural traditions of Arkansas. She grew up attending church, where gospel music and
    community service shaped her values of cooperation and kindness. Family gatherings feature soul food, storytelling, and celebrations of Juneteenth and Kwanzaa, reinforcing a strong sense of heritage.
    She is proud of the legacy of civil‑rights activism in the region and often participates in local Black arts festivals, supporting emerging Black artists. Her cultural identity informs her appreciation
    for music, visual arts, and community advocacy.
attributes:
  skills: '[''Data entry'', ''Records management'', ''Electronic document management (SharePoint)'', ''Microsoft Office Suite (Excel, Word, PowerPoint)'', ''Basic SQL querying'', ''Report generation'',
    ''Financial record-keeping'', ''Process improvement'', ''Customer service'', ''Interpersonal communication'', ''Team collaboration'', ''Adaptability to new software'']'
  hobbies: '[''Visiting art galleries and museums'', ''Sketching and mixed‑media crafts'', ''Attending blues and jazz concerts'', ''Community theater outings'', ''Cooking Southern cuisine'', ''Socializing
    with friends over meals'', ''Journaling and creative writing'', ''Reading contemporary fiction and social‑justice literature'', ''Indoor gardening and plant care'', ''Volunteering at youth mentorship
    programs'']'
  career_goals: She aims to transition from a clerical role to a records manager or information governance specialist, pursuing certifications such as Certified Records Manager (CRM) and a data analytics
    credential. Shirleymae hopes to lead a small team, streamline document workflows, and implement digital archiving solutions for her agency. Long‑term, she envisions contributing to a community nonprofit
    that preserves local African‑American history through digitized archives, blending her business acumen with her passion for culture. She also seeks a work environment that supports flexibility and stress‑reduction,
    such as remote or hybrid options.
