  hobbies: '[''DIY home improvement'', ''furniture refinishing'', ''listening to music'', ''video gaming'', ''skateboarding'', ''biking'', ''photography'', ''following painting tutorials'', ''helping friends
    with repair tasks'']'
  career_goals: Matthew aims to become a certified master painter and eventually launch his own small painting contractor business focused on sustainable, low‑VOC finishes. Over the next few years he plans
    to complete an apprenticeship, earn OSHA and EPA certifications, and take management courses at the local community college. He envisions expanding his services to include decorative wall finishes and
    color‑consulting for homeowners, combining his practical skills with his interest in design. Long‑term, he hopes to build a reputable local brand known for reliability, flexibility, and environmentally
    conscious practices.
