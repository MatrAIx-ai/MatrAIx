personas:
  professional: Matthew Sims is an aspiring master painter who blends solid residential painting techniques with a passion for low‑VOC, eco‑friendly finishes, leveraging their hands‑on DIY experience, basic
    business knowledge, and relaxed, sometimes disorganized approach to planning while aiming to launch a sustainable painting contractor.
  sports: Matthew Sims rides their bike to local parks, occasionally joins the Chicago Skate Collective for weekend sessions, roots for the Chicago Bears and Chicago Cubs, and keeps a casual fitness routine
    of sprinting hill trails with a skateboard, balancing activity with a flexible schedule.
  arts: Matthew Sims captures street murals on their phone, draws inspiration from Chicago’s vibrant wall art scene including works by local artists like Sasha & Kiki, spins classic rock legends like Led
    Zeppelin and indie acts like Arcade Fire while painting, and follows online decorative painting tutorials to experiment with faux finishes.
  travel: Matthew Sims prefers low‑cost road trips to nearby Wisconsin lake towns, dreams of a sustainable paint‑focused workshop tour in Portland, enjoys spontaneous weekend getaways to Chicago’s art districts,
    and rarely plans more than a day in advance, letting curiosity guide their itinerary.
  culinary: Matthew Sims loves whipping up classic Chicago deep‑dish pizza with mozzarella, pepperoni, and oregano, makes occasional grilled cheese with sharp cheddar, experiments with herb‑infused olive
    oil for finishing touches, and despite an enthusiastic amateur skill level, they often order takeout when tired.
  core: Matthew Sims is a hands‑on, eco‑conscious budding painter who balances a love of DIY, classic rock, skateboarding, and spontaneous road trips with a laid‑back, sometimes chaotic lifestyle that includes
    splurging on tools while occasionally forgetting to budget.
background:
  cultural: Matthew grew up in Downers Grove, a suburban community in DuPage County, Illinois, where Midwestern values of hard work, modesty, and community are prominent. His family is of mixed Northern
    European ancestry, with roots in Irish and German immigrant families. He was raised in a middle‑class household, with his father working in the trades and his mother employed in education, giving him
    an early appreciation for both practical skills and lifelong learning. Local traditions, such as the annual St. Patrick’s Day parade and community summer festivals, have shaped his sense of belonging.
    While he identifies with the broader white, suburban American culture, he also enjoys the diverse artistic scene of nearby Chicago, drawing inspiration from its street art and mural culture.
attributes:
  skills: '[''surface preparation'', ''priming'', ''color mixing'', ''brush and roller application'', ''spray painting'', ''safety compliance'', ''equipment maintenance'', ''project estimating'', ''client
