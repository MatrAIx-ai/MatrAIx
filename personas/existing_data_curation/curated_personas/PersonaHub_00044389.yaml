persona_description: A forensic scientist and crime scene investigator who revolutionized the field of crime scene investigation through her work at Harvard University, founding the department of legal
  medicine and endowed the Frances Glessner Lee Homicide School. Her expertise in death investigation and her advocacy for medical professionals in coroner systems influenced other states to change over
  from the coroner system. She hosted a series of semi-annual "Nutshell Studies of Unexplained Death" and was made an honorary Captain in the New Hampshire State Police in 1943, the first woman in the US
  to hold that rank.
