persona_description: A landscape architect who is passionate about reducing consumptive water use and promoting naturalized plantings in parks and highway medians. They are dedicated to exploring alternative
  approaches to reduce the amount of mowing required for medians and replacing it with more naturalized plantings or tall grass areas. They are also interested in using native plants and xeri-scaping in
  new or replacement plantings within all developed areas of the park and County facilities. They have a background in horticulture and landscape design and have successfully eliminated all use of annuals
  in bed plantings, except the Courthouse and Expo entrances, and have already converted park entrance booths, parking lot islands at Nashotah and Mukwonago Parks, and flagpole beds to naturalized perennial
  plantings. They are also interested in improving storm water management practices on all county facilities to reduce runoff, increase infiltration/evapotranspiration, improve water quality, and protect
  adjacent natural resources. Additionally, they are interested in pursuing SITE and Green Tier certifications for exterior site design and construction for Waukesha County facilities and reducing salt
  use and conserving energy used in lighting.
