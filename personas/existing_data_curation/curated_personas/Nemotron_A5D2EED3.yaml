personas:
  professional: Jose Bell is a budding young builder‑engineer who designs elaborate Lego cities, applies basic coding logic on a tablet, and channels a competitive, critical eye into perfecting structural
    stability while balancing creative curiosity with practical step‑by‑step planning.
  sports: Jose Bell plays catch and joins a local Little League baseball team, idolizes the Chicago Cubs as their favorite MLB club, and balances weekend soccer practice with the community youth swimming
    lessons, showing a competitive drive on the field while occasionally preferring solo bike rides through the nearby woods.
  arts: Jose Bell delights in drawing comics inspired by Mo Willems and Adventure Time, sings along to Disney’s Frozen soundtrack, collects dinosaur stickers from the National Geographic Kids series, and
    spends rainy afternoons assembling puzzle pieces of famous paintings like Van Gogh’s Starry Night, reflecting a vivid imagination tempered by a critical eye for detail.
  travel: Jose Bell loves spontaneous family trips to the nearby state park’s nature trail, dreams of visiting the Smithsonian National Air and Space Museum in Washington DC, and hopes to explore the Grand
    Canyon next summer, preferring hands‑on adventures over long car rides and often packing a checklist of favorite Lego bricks.
  culinary: Jose Bell prefers cheesy macaroni, chicken nuggets with honey‑mustard dip, and builds mini pizzas topped with pepperoni and olives, enjoys helping to stir spaghetti Bolognese sauce while carefully
    measuring out strawberry slices for fruit salad, showcasing a playful cooking skill set mixed with a picky palate for familiar flavors.
  core: Jose Bell is a curious, competitive six‑year‑old who balances meticulous Lego engineering with a love for outdoor exploration, yet sometimes forgets to tidy up their sticker collection.
background:
  cultural: Jose was raised in Cartersville, GA, a small city in the foothills of north‑central Georgia. His family follows Southern United States traditions, celebrating community events like the local
    county fair, seasonal festivals, and school gatherings. He attends a public elementary school where he participates in standard curricula and extracurricular activities typical of the region, such as
    after‑school sports and library reading programs. The household values politeness, modesty, and a strong sense of community, while also encouraging curiosity through hands‑on projects and visits to
    nearby nature parks. Although his ethnic background is White American, his upbringing reflects a blend of contemporary suburban life and the neighborly culture of small‑town Georgia.
