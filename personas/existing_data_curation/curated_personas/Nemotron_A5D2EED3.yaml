  career_goals: Jose imagines a future where he can combine his love of building with exploration. He often says he wants to become an astronaut or a robotics engineer, fascinated by rockets and machines.
    He also enjoys competitive sports and dreams of playing baseball at a high level. At school, he aims to lead science projects and win his first spelling bee, viewing these steps as early preparation
    for a career that solves real‑world problems while keeping the sense of adventure alive.
