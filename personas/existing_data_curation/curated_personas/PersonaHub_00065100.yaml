persona_description: An agricultural veterinarian and researcher who studies the mechanisms of resistance to anthelmintics and the ways farmers can minimize the survival of drug-resistant parasites in the
  field. This individual is knowledgeable about the interactions between parasites, hosts, and pesticides, and has experience in developing strategies to combat resistance in animal parasites. They are
  interested in the genetic and environmental factors that contribute to resistance and have a passion for teaching and sharing their knowledge with others.
