    resolution and de‑escalation", "Public speaking and community outreach"]'
  hobbies: '["Gardening (heirloom vegetables and pollinator flowers)", "Quilting and crochet", "Reading historical fiction and Southern literature", "Church choir volunteering", "Local food‑bank service",
