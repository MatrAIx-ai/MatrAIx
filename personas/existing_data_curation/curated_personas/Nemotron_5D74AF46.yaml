    county fairs and festivals"]'
  career_goals: Approaching retirement, Melody plans to shift from active patrol to a senior supervisory and mentorship role. She aims to become a sergeant or lieutenant so she can shape departmental policies
    that strengthen community trust, especially with youth and senior residents. Melody hopes to launch a county‑wide senior‑citizen safety initiative and a youth‑police dialogue program that blends her
    practical experience with her curiosity for innovative outreach methods. After formally retiring, she intends to serve as a volunteer reserve officer and continue coaching new recruits, ensuring her
    decades of knowledge benefit the next generation of officers.
