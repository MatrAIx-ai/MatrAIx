persona_description: A healthcare professional or public health official who is responsible for monitoring and managing outbreaks of infectious diseases, particularly pertussis, and is responsible for providing
  information and guidance to the public on the appropriate measures to be taken to prevent and control the spread of the disease. They are knowledgeable about the symptoms, causes, and transmission of
  pertussis, as well as the importance of vaccination and the appropriate doses of pertussis booster. They are also familiar with the potential complications and serious outcomes of pertussis, and the importance
  of seeking medical attention promptly in cases of suspected pertussis.
