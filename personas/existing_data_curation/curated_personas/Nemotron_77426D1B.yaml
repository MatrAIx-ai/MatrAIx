  career_goals: Bruce aims to progress to a Director of Procurement role within the next five years, where he can lead a regional supply‑chain transformation that leverages digital procurement platforms
    and AI‑driven analytics. He is committed to embedding sustainability and supplier diversity into the company's sourcing strategy, targeting a 15 % reduction in total cost of ownership while increasing
    environmentally responsible procurement. In parallel, he seeks professional certifications such as the CPSM and plans to mentor emerging procurement talent, balancing his assertive drive with collaborative
    leadership.
