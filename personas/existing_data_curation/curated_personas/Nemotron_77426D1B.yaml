personas:
  professional: Bruce Mcnew blends deep strategic sourcing expertise with a humanities‑informed communication style, using data‑driven cost analysis and ethical negotiation to drive measurable savings while
    assertively championing sustainability and supplier diversity on the path toward a Director of Procurement role, and they consistently apply a balanced curiosity‑practicality lens to every challenge.
  sports: Bruce Mcnew shuttles between early‑morning hikes with the Duluth Outdoor Recreation Club, weekend kayak outings through the Lake Superior Kayak Association, and avidly follows the Minnesota Wild,
    Minnesota Vikings, and the Milwaukee Brewers, while they also play in a local recreational softball league each summer.
  arts: Bruce Mcnew stars in community theatre productions at the Lake Superior Community Theatre, channeling an appreciation for playwright August Wilson and classic works like 'The Crucible', while their
    evenings often include listening to folk legends Bob Dylan and John Prine and perusing historical nonfiction by Erik Larson, and they find the stage a vital outlet for their balanced social‑alone time.
  travel: Bruce Mcnew plans trips with a mix of meticulous spreadsheets and spontaneous detours, having backpacked the Boundary Waters, explored the Apostle Islands, and driven the Canadian Rockies, while
    they long to trek Patagonia’s Torres del Paine and soak in Iceland’s geothermal hot springs.
  culinary: Bruce Mcnew enjoys cooking lake trout alfredo with fresh dill and wild mushrooms, perfecting a rustic cedar‑plank smoked salmon, and pairing these dishes with locally sourced cheese boards,
    yet they admit to ordering take‑out pizza after long days when the firewood runs low.
  core: Bruce Mcnew is a data‑driven procurement strategist who channels outdoor solitude into creative theatre roles, balances disciplined budgeting with occasional gear splurges, and they habitually over‑plan
    while still leaving room for spontaneous hikes.
background:
  cultural: Bruce was raised in a middle‑class family in the Upper Midwest, where Midwestern values of modesty, reliability, and community service are deeply ingrained. The Duluth region’s strong Scandinavian
    and Finnish heritage, along with its proximity to the Ojibwe and Dakota peoples, has shaped his appreciation for cultural diversity and environmental stewardship. His humanities education further broadened
    his perspective, fostering a lifelong interest in history, literature, and ethical considerations in business. These influences converge in a worldview that balances practicality with curiosity, and
    individual achievement with collective responsibility.
