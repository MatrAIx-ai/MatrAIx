personas:
  professional: Misa Raines, a budding multimedia storyteller who blends sketching, beginner coding of mini‑games, and piano basics to craft interactive narrative projects, channels their curiosity and
    balanced organization into school assignments and youth art club collaborations, and confidently asserts their creative vision while remaining cooperative with peers.
  sports: Misa Raines, an energetic pick‑up basketball player who spends afternoons shooting hoops at the local park, cheers for the Atlanta Hawks and participates in the Macon Youth Hoops club, balances
    a love for team play with after‑school jogs and weekend family bike rides, and they strive to improve their three‑point accuracy while maintaining a flexible fitness routine that sometimes skips formal
    workouts during exam weeks.
  arts: Misa Raines, an enthusiastic visual artist who draws inspiration from Otis Redding’s soulful rhythms, Beyoncé’s bold visuals, and the dynamic panels of graphic novels like 'Saga' and 'Ms. Marvel',
    frequently visits the Macon Museum of Art and leads projects in the youth art club, blends piano basics to explore music‑driven illustration, and they dream of publishing their own graphic‑novel series
    that reflects local history.
  travel: Misa Raines, a curious explorer who enjoys weekend road trips to historic Savannah and the lively jazz scene of New Orleans, dreams of visiting the Smithsonian museums in Washington, D.C., balances
    family‑budgeted travel with school‑funded cultural excursions, and they prefer a blend of immersive city tours and relaxed beach afternoons on Georgia’s coastal islands.
  culinary: Misa Raines, an aspiring home chef who delights in Southern comfort dishes like fried chicken with honey‑glazed biscuits, collard greens seasoned with smoked ham hocks, and peach cobbler topped
    with vanilla ice cream, enjoys experimenting with fresh Georgia peaches, pecans, and spicy Cajun rubs, and they regularly help their grandmother prepare Sunday brunch while gradually building confidence
    in the kitchen.
  core: Misa Raines, a creatively curious 13‑year‑old who fuses art, music, and coding into vibrant personal projects, balances community spirit with a drive for self‑expression, and sometimes they neglect
    chores in favor of late‑night sketching sessions.
background:
  cultural: Misa comes from a Black Southern family with deep roots in Georgia's rich cultural tapestry. Her grandparents share stories of the Civil Rights movement in Macon, and family gatherings often
    feature soulful gospel music, Southern cooking, and traditional storytelling. She celebrates Juneteenth and honors her heritage through participation in local church events and community festivals.
    The vibrant musical legacy of Macon, home to legends like Otis Redding, influences her love for rhythm and artistic expression, while her neighborhood's emphasis on mutual support shapes her cooperative
    yet assertive outlook.
attributes:
  skills: '[''Digital illustration'', ''Basic Python programming'', ''Creative writing'', ''Middle school math and science'', ''Team collaboration and organization'']'
  hobbies: '[''Sketching and digital illustration'', ''Listening to music (R&B, hip‑hop, Southern soul)'', ''Reading graphic novels and sci‑fi'', ''Playing basketball'', ''Basic piano'', ''Coding mini‑games'',
    ''Visiting museums and art clubs'', ''Volunteer reading for younger children'']'
  career_goals: Misa dreams of pursuing a career that merges her love for art and technology. She aims to attend a high school with a strong visual arts program, earn a scholarship for a college degree
    in multimedia design or visual communication, and eventually work as a graphic designer or digital animator. She also hopes to use her skills to create community‑focused art projects that celebrate
    African‑American culture in Macon and inspire younger students.
