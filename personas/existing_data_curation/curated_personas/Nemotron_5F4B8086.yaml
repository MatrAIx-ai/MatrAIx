personas:
  professional: Maria Hardington, age 6, is a budding builder who delights in constructing stable LEGO towers with precise symmetry, showcasing a meticulous eye for order and a practical mind that treats
    each block like a tiny piece of a larger, predictable design; they approach play with quiet confidence and a sense of responsibility, hinting at a future in architecture or engineering.
  sports: Maria Hardington, age 6, enjoys organized playground games like tag and soccer drills at the community center, is a budding fan of the local minor league baseball team the Durham Bulls, and prefers
    calm walks in the nearby park with a small backpack, reflecting their love for predictable, low‑stress activity; they smile at the steady beat of a baseball chant and find comfort in routine.
  arts: Maria Hardington, age 6, finds joy in coloring within the lines to the rhythm of 'The Wiggles' and 'Sesame Street' songs, adores picture books illustrated by 'Eric Carle', and often arranges her
    LEGO creations as miniature art installations, showcasing her love for structured creativity; they often share their finished pictures with family.
  travel: Maria Hardington, age 6, prefers short, well‑planned trips such as weekend visits to the nearby state park, day trips to the zoo, and family vacations to Disney World, always packing a coloring
    book and a checklist of ‘must‑see’ attractions to maintain a sense of order, and they feel confident when every detail is accounted for.
  culinary: Maria Hardington, age 6, delights in decorating cupcakes with buttercream frosting and rainbow sprinkles, savors peanut‑butter‑and‑jelly sandwiches cut into neat squares, and enjoys apple slices
    sprinkled with cinnamon, often carefully arranging food on her plate as a reflection of her love for tidy presentation; they take pride in the neat rows of sprinkles they create.
  core: Maria Hardington, age 6, balances a love for orderly play—coloring, LEGO, and puzzles—with a gentle, reliable nature, quietly preferring structured routines, modest savings, and tidy meals, while
    they occasionally forget to take their vitamins.
background:
  cultural: Maria is raised in a white family in Chattanooga, Tennessee, where Southern cultural influences are part of daily life. Her family participates in community church activities, emphasizing hospitality
    and mutual support. Family meals often feature homemade Southern dishes, and holidays include gatherings that highlight respect for tradition and orderly customs. Maria has been exposed to regional
    music such as country and bluegrass, and she enjoys local events like Riverfest, which celebrate the city’s river heritage. Her upbringing balances a nurturing, cooperative household with an emphasis
    on responsibility, punctuality, and maintaining a structured environment.
