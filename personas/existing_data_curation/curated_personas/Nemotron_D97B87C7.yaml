personas:
  professional: Grace Gulledge, an enthusiastic preschool class monitor, takes pride in organizing playtime schedules and keeping the toy area tidy, applying a methodical love for routine while they are
    a go‑to helper for classmates due to their sociable nature.
  sports: Grace Gulledge, a member of the neighborhood preschool soccer group, loves dribbling a bright orange ball on sunny afternoons, cheers loudly for the local professional soccer team City FC, and
    they eagerly join weekend family bike rides along the park trail.
  arts: Grace Gulledge, an avid fan of animated storytelling, delights in watching Pixar’s Toy Story and drawing inspired by Eric Carle’s vibrant illustrations, sings along to the catchy tune Let It Go
    from Frozen, and they proudly display a collection of glitter‑covered macaroni art on their bedroom wall.
  travel: Grace Gulledge, a curious little explorer, enjoys family road trips to the nearby aquarium and the state's historic train museum, dreams of visiting Disney World in Florida and seeing the giant
    pandas at Chengdu, and they always pack their favorite stuffed giraffe for comfort.
  culinary: Grace Gulledge, a budding snack connoisseur, adores peanut butter and jelly sandwiches, prefers chicken nuggets dipped in ketchup, helps stir batter for banana muffins on weekends, and they
    sometimes sneak extra raisins into their yogurt when nobody is looking.
  core: Grace Gulledge, a routine‑loving, high‑energy five‑year‑old, can line up blocks by color for hours, but they often forget to brush teeth before bedtime and hide snacks in their toy chest.
background:
  cultural: Grace comes from a middle‑class white American family in Sarasota, Florida. Her upbringing reflects the coastal lifestyle of the Gulf Coast—frequent beach outings, outdoor play, and a love for
    marine life. The family values routine and community, attending local preschool, Sunday school, and neighborhood block parties. Cultural influences include Southern hospitality, a focus on family meals,
    and participation in community events such as the Sarasota Arts Festival, where she enjoys music and crafts.
