personas:
  professional: John Laiche, a budding robotics enthusiast and avid Minecraft architect, leverages his love of structured world‑building and practical tinkering with electronic kits to lead his school’s
    robotics club projects, though they often procrastinate on deadlines, preferring to dive straight into hands‑on building rather than lengthy planning.
  sports: John Laiche, a regular participant in the neighborhood basketball court’s pickup games and a passionate fan of the Los Angeles Lakers, blends their love for teamwork with a preference for clear
    game plans, yet they sometimes overlook bringing water and miss practices due to a relaxed attitude toward scheduling.
  arts: John Laiche, a devoted Minecraft creator and avid reader of adventure series like 'Percy Jackson', draws inspiration from the ambient soundtracks of C418 and cinematic scores by Hans Zimmer, shaping
    evenings with digital building sessions and sketching imagined worlds, though they occasionally skip class to binge YouTube art tutorials.
  travel: John Laiche, who eagerly anticipates the county fair’s midway rides each summer and has already taken a family road trip to the Smithsonian’s National Air and Space Museum in Washington, D.C.,
    dreams of exploring the robotics exhibits at Japan’s Miraikan, preferring spur‑of‑the‑moment travel days over meticulously booked itineraries, though their parents’ budget often curtails their globe‑trotting
    ambitions.
  culinary: John Laiche, a self‑declared pizza aficionado who customizes slices with extra pepperoni and pineapple, can whip up quick mac‑and‑cheese using a microwave, and loves snacking on trail‑mix while
    tinkering with robot kits, yet they often forget to rinse dishes, reflecting a laid‑back approach to kitchen chores.
  core: John Laiche, a 13‑year‑old builder‑at‑heart who navigates life with a love for structured play, occasional procrastination, a worry‑prone mind, and a habit of staying up late crafting digital kingdoms,
    often feels that they are balancing their organized imagination with a laid‑back reality, showcasing a unique blend of order and curiosity.
background:
  cultural: 'John grew up in Evansville, Indiana, a Midwestern city with a strong sense of community and modest, family‑oriented values. His cultural background reflects typical Midwestern white American
