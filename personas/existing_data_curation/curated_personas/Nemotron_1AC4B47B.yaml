  career_goals: Bliss aims to secure a full‑time administrative or bookkeeping position within a small‑to‑medium business in Bay Minette where her routine‑oriented nature can thrive. Over the next two years
    she plans to earn a Certified Bookkeeper credential and later pursue a bachelor’s degree in Business Administration to qualify for office manager roles. While she values job security, she also wants
    to develop leadership skills that will allow her to advance based on merit, reflecting her competitive drive. She seeks a workplace with clear expectations, a predictable schedule, and a supportive
    environment that helps her manage anxiety and stress.
