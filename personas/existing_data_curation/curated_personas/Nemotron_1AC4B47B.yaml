personas:
  professional: Bliss Durst, a 23‑year‑old administrative specialist in Bay Minette, leverages meticulous data‑entry and bookkeeping skills while channeling a routine‑driven, competitive edge into streamlining
    office workflows and exceeding performance metrics.
  sports: Bliss Durst, who follows the Alabama Crimson Tide football team and supports the local Bay Minette High School baseball squad, joins the Sunrise Trailwalkers club for early‑morning nature hikes,
    practices gentle home yoga three times a week, and prefers low‑impact cardio over competitive sports.
  arts: Bliss Durst finds solace in classic literature like Jane Austen’s Pride and Prejudice and Agatha Christie mysteries, knits scarves while listening to Sufjan Stevens and the piano works of Ludovico
    Einaudi, and attends occasional community theater productions of Shakespeare’s comedies.
  travel: Bliss Durst enjoys low‑key, itinerary‑driven road trips, having explored Savannah’s historic squares and Asheville’s Blue Ridge vistas, while dreaming of a relaxed weekend in Charleston’s waterfront
    B&Bs and a spring visit to the Texas Hill Country’s lavender fields.
  culinary: Bliss Durst’s comfort‑food repertoire centers on baking classic apple crumble pie and chicken pot pie, seasoning garden‑fresh zucchini and tomatoes into a summer frittata, and experimenting
    with a pinch of cinnamon in roasted sweet potatoes, though they sometimes over‑bake the crust in their quest for perfection.
  core: Bliss Durst, 23, thrives on structured routines, meticulous bookkeeping, and quiet hobbies, yet battles anxiety and a guilty pleasure for occasional yarn splurges.
background:
  cultural: Bliss was raised in Bay Minette, a small town in Baldwin County, Alabama, within a tight‑knit, predominantly white community that values Southern hospitality, family ties, and modest, tradition‑rooted
    lifestyles. Her family’s ancestry traces back to Scots‑Irish and German settlers, and she grew up attending a local Methodist church, participating in community events such as church socials, county
    fairs, and high‑school football games. The rural surroundings—farmland, pine forests, and nearby coastal marshes—shaped her appreciation for routine, self‑reliance, and a practical, down‑to‑earth worldview.
