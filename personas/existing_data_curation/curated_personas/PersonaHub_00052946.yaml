persona_description: A chemical engineering student who has taken it upon herself to generate positive reactions and improve the quality of life for rural communities in southern India. She is driven to
  help less fortunate people and make a difference. Her research and design work in the anaerobic digestion system shows the feasibility of the project and could become a reality for the community in the
  future. She is planning a three month tour of India with Engineers Without Borders (EWB) to get a first-hand account of sustainable energy's benefit to remote communities.
