  hobbies: '[''Reading Historical Non‑Fiction'', ''Playing Chess'', ''Gardening'', ''Cooking Mexican Cuisine'', ''Woodworking'', ''Desert Hiking'', ''Youth Mentorship Volunteering'', ''Small Family Gatherings'',
    ''Celebrating Mexican Cultural Holidays'']'
  career_goals: In the next two years Jorge aims to complete his bachelor's degree and obtain National Board Certification in his subject area. He aspires to become a grade‑level team leader, mentoring
    new teachers and spearheading curriculum alignment initiatives. Over the next five years, he plans to earn a master's degree in Educational Leadership, positioning himself for a department head or assistant
    principal role. Ultimately, he envisions leading a school as principal, where he can champion bilingual programs and develop community partnership initiatives that support at‑risk students.
