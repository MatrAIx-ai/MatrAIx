personas:
  professional: Jorge Hernandezperez, a veteran middle‑school teacher, blends meticulous lesson planning, data‑driven instruction, and bilingual communication with a disciplined, structured approach, positioning
    themselves as a future grade‑level team leader and eventual principal champion of bilingual education.
  sports: Jorge Hernandezperez devotes Saturday mornings to hiking the Sonoran Desert with their local trail club, roots for the Arizona Diamondbacks and Phoenix Suns, and participates in weekly pick‑up
    soccer games at the community center, balancing their love of endurance with a pragmatic training schedule.
  arts: Jorge Hernandezperez finds creative renewal in woodworking intricate furniture pieces inspired by folk art, unwinds with historical non‑fiction biographies and chess puzzles, and attends monthly
    performances at the local theater featuring classic cinema retrospectives and live Mariachi ensembles.
  travel: Jorge Hernandezperez prefers meticulously planned trips that blend cultural immersion and natural beauty, such as a spring visit to Oaxaca’s colonial architecture, a summer road trip to Grand
    Canyon National Park, and an annual family pilgrimage to their ancestral hometown during Día de los Muertos, all while balancing budget constraints and the school calendar.
  culinary: Jorge Hernandezperez cooks traditional dishes like tamales, pozole, and mole using fresh herbs, chilies, and corn from their garden, demonstrates moderate culinary skill that shines during family
    gatherings, yet admits to over‑salting meals when stressed about grading periods.
  core: Jorge Hernandezperez is a methodical educator‑turned‑leader who channels their love for structure into disciplined lesson plans, precise finances, and a garden‑tended routine, while occasionally
    letting perfectionism dictate sleep and indulging in late‑night woodworking projects.
background:
  cultural: Jorge is a first‑generation Mexican American whose parents immigrated from Jalisco. He grew up in a bilingual household, celebrating traditions such as Día de los Muertos, Las Posadas, and Mexican
    Independence Day. His Mexican heritage informs his values of family cohesion, respect for elders, and a strong emphasis on education as a pathway to opportunity. In Surprise, Arizona, he participates
    in the local Mexican cultural center, contributes to Spanish‑language community events, and integrates cultural elements into his teaching, helping students connect with their heritage while navigating
    the broader American educational system.
attributes:
  skills: '[''Classroom Management'', ''Lesson Planning'', ''Curriculum Development'', ''Data‑Driven Instruction'', ''Differentiated Instruction'', ''Educational Technology Integration'', ''Bilingual (Spanish‑English)
