  hobbies: '[''Hiking local trails'', ''Landscape photography'', ''Reading non-fiction (psychology, business, self‑development)'', ''DIY woodworking'', ''Home‑brewing craft beer'', ''Volunteering at food
    bank (small‑group coordination)'', ''Podcast listening (technology, personal growth)'', ''Casual gaming with a friend'']'
  career_goals: He aspires to move into a sales management role within the next three to five years, where he can shape a team’s culture around cooperation and customer‑centric service. James aims to broaden
    his strategic expertise by pursuing an associate’s degree in business administration and earning certifications in sales leadership. Long‑term, he envisions launching his own boutique distribution company
    that prioritizes fair pricing and sustainable sourcing, allowing him to help smaller manufacturers thrive while fostering stronger community ties.
