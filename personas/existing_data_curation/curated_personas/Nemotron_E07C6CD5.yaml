personas:
  professional: James Baker, a 26‑year‑old B2B sales representative in wholesale manufacturing, blends a curiosity‑driven enthusiasm for product specifications with a relaxed, flexible work style that lets
    them mentor new reps while steadily pursuing a sales‑management role centered on cooperative team culture and sustainable sourcing.
  sports: James Baker spends weekends trekking the Wasatch foothills and occasionally joins a local trail‑running group, while cheering on the Utah Jazz and Real Salt Lake, and they are a member of the
    Orem Hiking Club where they lead small‑group hikes each month.
  arts: James Baker pursues landscape photography inspired by Ansel Adams, devotes evenings to listening to indie folk artists like The Lumineers and Iron & Wine, and occasionally dabbles in sketching while
    camping, which they consider a quiet extension of their appreciation for nature’s textures.
  travel: James Baker favors low‑key nature‑focused trips, having explored Moab’s Arches National Park and taken a road trip through Yellowstone, while dreaming of a future adventure to Iceland’s volcanic
    landscapes, and they plan travel around modest budgets and limited vacation days, opting for DIY itineraries over packaged tours.
  culinary: James Baker enjoys brewing his own IPA using Cascade hops and experimenting with farmhouse ales, while also mastering the art of grilled salmon tacos topped with fresh cilantro, lime, and avocado,
    a culinary pursuit they treat with the same methodical curiosity they bring to their sales work.
  core: James Baker blends a quiet, curiosity‑driven mindset with a laid‑back yet slightly disorganized habit, channeling their compassion into community service, modest spending, and a steady march toward
    a cooperative, sustainable business future, and they never miss a chance to help a colleague.
background:
  cultural: James grew up in Orem, Utah, a predominantly suburban community where family‑oriented values, modesty, and a strong sense of public service are common. His upbringing reflects a blend of typical
    Western American cultural norms—emphasis on self‑reliance, community volunteerism, and appreciation for the natural landscape of the Intermountain West. While his ancestry is primarily European (German
    and Scandinavian roots), his daily life is shaped by the regional culture of Utah County, which encourages outdoor recreation, modest social gatherings, and a respectful, cooperative attitude toward
    neighbors and coworkers.
attributes:
  skills: '[''B2B sales strategy'', ''Customer relationship management'', ''Negotiation and closing techniques'', ''Product knowledge in manufacturing equipment'', ''Supply chain fundamentals'', ''CRM software
