  career_goals: Rodrick dreams of becoming an artist who can illustrate stories that help other children understand their feelings. He also imagines exploring space as an astronaut or inventing gadgets
    that solve everyday problems. While his aspirations are still playful, he hopes one day to combine his love for art, curiosity about science, and desire to help others manage emotions.
