personas:
  professional: Rodrick Webster, a budding young LEGO architect, channels a vivid imagination into intricate brick constructions while navigating a relaxed, spontaneous approach to project planning and
    a competitive drive to out‑build peers.
  sports: Rodrick Webster, a member of the Little Lions youth soccer team, enjoys weekend games and leads hide‑and‑seek drills with friends while cheering for the River Raptors baseball club and the Skyline
    Hawks basketball team, and occasionally competes in Lego building contests that blend physical coordination with creative strategy.
  arts: Rodrick Webster, an avid fan of animated classics such as 'Spirited Away' and 'Moana', spends afternoons sketching fantastical creatures, listening to the soundtracks of Disney movies, and regularly
    visits the city children’s museum to explore hands‑on art exhibits, often mimicking the styles of Hayao Miyazaki and Pixar animators.
  travel: Rodrick Webster, who loves family road trips to the nearby state park and a summer vacation at the coastal aquarium, dreams of exploring the interactive exhibits at the Smithsonian and prefers
    itineraries that include hands‑on activities over long flights, balancing curiosity with frequent snack breaks.
  culinary: Rodrick Webster, who adores pepperoni pizza, chicken nuggets with ketchup, and strawberry shortcake, enjoys helping stir batter for homemade pancakes but often gets distracted doodling on the
    kitchen counter, and prefers crunchy apple slices over vegetables.
  core: Rodrick Webster is a fiercely imaginative seven‑year‑old who blends competitive Lego building with spontaneous art, copes with anxiety through doodling, and navigates a world of vivid colors, sticky
    fingers, and occasional piggy‑bank meltdowns.
background:
  cultural: Rodrick is an African‑American boy growing up in Richmond’s Chesterfield County. He participates in family gatherings featuring Southern cooking and stories of his ancestors, attends a local
    church’s Sunday school, and joins an after‑school arts program that celebrates Black artists. Community events like Juneteenth, trips to the Virginia Museum of Fine Arts’ African‑American exhibits,
    and stories from relatives shape his appreciation for cultural heritage, while his parents emphasize resilience, education, and expressing emotions constructively.
