  career_goals: Although retired, Caleb remains driven to fuse his technical background with his love of art to benefit his community. He aims to establish a free maker‑space at the local community center
    where seniors and youth can collaborate on hands‑on STEM projects and art installations. He also hopes to write a memoir that chronicles the intersection of science, art, and African‑American history,
    and to mentor a small cohort of high‑school students interested in interdisciplinary innovation. Additionally, he wishes to stay engaged with emerging technologies such as generative AI to keep his
    curiosity alive.
