personas:
  professional: Caleb Gillespie, a retired engineer-artist who merges his electrical-mechanical design expertise and Python coding savvy with a love for analog photography and woodworking, channels his
    curiosity and competitive spirit into mentoring and spearheading a community maker-space, even as his spontaneous nature sometimes leads to last-minute project scrambles.
  sports: Caleb Gillespie stays active by strolling the Patuxent River trails with the Charles County Senior Walking Club, dabbling in a light-hearted senior tennis league, and rallying behind the Washington
    Nationals during baseball season.
  arts: Caleb Gillespie, an avid sketcher and analog photographer, finds inspiration in the brushstrokes of Edward Hopper, the black-and-white landscapes of Ansel Adams, and the improvisational brilliance
    of Miles Davis and Mahalia Jackson, regularly attending openings at the Clarendon Visual Arts Center and weaving those influences into custom kinetic wood sculptures.
  travel: Caleb Gillespie embraces spontaneous day-trips to Washington, D.C.’s Smithsonian museums and occasional extended stays at Shenandoah National Park, while dreaming of a future pilgrimage to the
    Met in New York to attend a lecture on generative AI and its artistic implications.
  culinary: Caleb Gillespie, a modestly skilled home cook, delights in turning garden-fresh tomatoes, kale, and carrots into a rustic ratatouille seasoned with rosemary and smoked paprika, pairing the meal
    with a carefully brewed pour-over coffee that they regard as a cherished ritual.
  core: Caleb Gillespie blends a lifetime of engineering rigor with a spontaneous, artist-lover’s heart, juggling vintage camera obsessions, occasional budgeting lapses, and a relentless curiosity that
    keeps them experimenting well into their eighties.
background:
  cultural: Caleb was born in 1944 in Baltimore and grew up during the civil‑rights era, experiencing both the challenges of segregation and the empowerment of community solidarity. His parents were part
    of the Great Migration, and his grandparents traced their roots to the rural South where they worked as sharecroppers before moving north. The family placed a high value on education, encouraging Caleb
    to pursue a STEM degree at a time when few Black students entered such fields. Throughout his life, African‑American cultural traditions—such as the rhythms of jazz, the storytelling of gospel choirs,
    and the visual narratives of artists like Jacob Lawrence—have shaped his worldview. He remains active in the local African‑American church, where he mentors youth and participates in cultural events
    that celebrate Black history and artistic expression. These experiences inform his curiosity, resilience, and commitment to bridging science and art for the benefit of his community.
