persona_description: A University of Texas at Austin aerospace engineering professor who has made significant contributions to the field of applied mathematics, including groundbreaking results in the numerical
  solution of differential equations and the founding of the journal "Applications of Mathematics." He is also the recipient of another unusual honor in 2001, when the Czech Republic's largest newspaper
  cited his birth in Prague as a major historical event for that city. He conducts his research through the University of Texas at Austin-based Texas Institute for Computational and Applied Mathematics
  and holds the Robert B. Trull Chair in Engineering.
