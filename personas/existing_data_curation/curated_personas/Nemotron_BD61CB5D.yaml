  hobbies: '[''Watercolor painting'', ''Museum visits'', ''Contemporary art lectures'', ''Sailing'', ''Gardening'', ''Generative art coding'', ''Genealogy research'', ''Historical society volunteering'',
    ''Bridge (card game)'']'
  career_goals: Judith aims to stay intellectually active by serving on the board of the Grand Haven Arts Council, creating intergenerational art‑science workshops, and establishing a scholarship for women
    pursuing engineering degrees in her region. She also aspires to publish a memoir that weaves her engineering career with her lifelong love of art, and to mentor high‑school students through the local
    STEM outreach program, helping them develop competitive research projects.
