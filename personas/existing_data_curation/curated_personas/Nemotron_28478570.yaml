personas:
  professional: Amelia Francisco is a budding cultural events coordinator who leverages bilingual fluency, meticulous planning, and a competitive edge to streamline community festivals, though her spontaneous
    streak sometimes jeopardizes deadline adherence.
  sports: Amelia Francisco plays forward for a community soccer league in Hidalgo County, follows the Houston Dynamo in MLS and the Dallas Cowboys in the NFL, and blends competitive drills with weekend
    beach volleyball to stay fit.
  arts: Amelia Francisco curates TikTok videos that fuse salsa moves with cooking tutorials, draws inspiration from artists like Celia Cruz, Bad Bunny, and Frida Kahlo, and uses creative expression to channel
    emotional highs.
  travel: Amelia Francisco prefers spontaneous day trips to coastal towns like South Padre Island and cultural retreats in New Mexico, while also planning a future road‑trip across the Southwest to explore
    historic pueblos, balancing budget constraints with a craving for new scenery.
  culinary: Amelia Francisco excels at preparing traditional al pastor tacos and tamales, adding modern twists like pineapple‑infused salsa, and enjoys sourcing fresh cilantro, chipotle, and avocado at
    bustling farmers markets, though they sometimes burn the edges when multitasking.
  core: Amelia Francisco is a high‑energy, bilingual community enthusiast who balances meticulous event planning with spur‑of‑the‑moment salsa nights, all while navigating anxiety through yoga and impulsive
    spending sprees.
background:
  cultural: Amelia is a Mexican‑American raised in McAllen, Texas, a city that straddles the U.S.–Mexico border. Her family maintains strong Mexican traditions, including bilingual communication, celebration
    of Día de los Muertos, Mexican Independence Day, and participation in local events such as Charro Days. She grew up immersed in the flavors of regional Mexican cuisine and the rhythms of Latin music,
    while also navigating the Texan cultural landscape. This bicultural upbringing gives her a fluid identity that blends rural Mexican customs with urban Texan influences, shaping her perspective on community,
    family, and individual ambition. Her experiences reflect a deep appreciation for her heritage, a commitment to her local community, and an awareness of the dynamic cross‑border cultural exchange that
    defines her environment.
