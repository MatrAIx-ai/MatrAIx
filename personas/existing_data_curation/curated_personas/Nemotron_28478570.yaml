  hobbies: '[''Salsa and cumbia dancing'', ''Community soccer league'', ''Cooking traditional Mexican dishes'', ''Volunteering at community center events'', ''Listening to Regional Mexican music'', ''Creating
    TikTok videos'', ''Yoga and mindfulness practices'', ''Exploring local coffee shops'', ''Participating in online debate forums'', ''Spontaneous day trips to South Padre Island'']'
  career_goals: Amelia aims to turn her sociable energy and love for community into a stable career as a cultural events coordinator or community outreach specialist. She plans to enroll in a community
    college program in hospitality management or public administration within the next year to gain formal credentials. Her short‑term goal is to secure an entry‑level position with the Hidalgo County cultural
    affairs office, where she can apply her bilingual communication and event‑planning skills while learning structured project management techniques. Long‑term, she dreams of launching a small catering
    business that focuses on authentic Mexican street food, leveraging her cooking expertise and social media savvy to attract a loyal clientele. Parallel to these ambitions, Amelia is committed to developing
    better time‑management habits and coping strategies for her anxiety, so she can meet deadlines reliably and maintain emotional resilience in a demanding professional environment.
