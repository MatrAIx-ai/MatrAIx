  hobbies: '[''Building LEGO and block structures'', ''Drawing and coloring with outlines'', ''Singing Spanish nursery rhymes'', ''Exploring parks and collecting natural items'', ''Playing with toy cars
    on a road mat'', ''Participating in structured preschool circle time activities'']'
  career_goals: Although still very young, Julio expresses a budding interest in helping people and enjoys the idea of jobs that involve clear roles and routines. He often talks about becoming a firefighter
    because of the organized teamwork, the predictable schedule, and the chance to assist his community. He also imagines being a teacher one day, drawn by the structured classroom environment and the opportunity
    to guide younger children, mirroring his own preschool experiences.
