    simple keyboard'']'
  career_goals: Joseph dreams of becoming an astronaut who can explore space and sketch alien worlds, a museum curator who protects and displays art, or a veterinarian who cares for animals—roles that satisfy
    his curiosity about how things work and his love for art. He also expresses interest in engineering, enjoying the idea of building structures and solving problems. While his imagination is vivid, he
    sometimes feels anxious about whether he'll be good enough, so he aspires to work hard and prove himself in whichever path he chooses.
