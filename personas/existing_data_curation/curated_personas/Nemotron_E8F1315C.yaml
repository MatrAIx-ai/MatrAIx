    to changing priorities'']'
  hobbies: '[''Gardening'', ''Cooking Mexican cuisine'', ''Reading mystery novels'', ''Watching telenovelas'', ''Attending local community festivals'', ''Volunteering at the community center'', ''Walking/hiking
    local trails'', ''Listening to regional music (banda, mariachi)'', ''DIY crafts (quilting, crocheting)'']'
  career_goals: Natalia aims to transition from a general office clerk to a supervisory role, such as Office Manager, within the next three years. To support this goal, she plans to earn a Microsoft Office
    Specialist certification and complete a short bookkeeping course offered by a community college. She also hopes to leverage her bilingual abilities by taking on translation or client‑liaison responsibilities,
    which could eventually lead to a part‑time consulting gig for local businesses. A long‑term ambition is to secure a stable, well‑benefited position that offers a clear path to retirement while allowing
    her flexible hours to pursue personal interests and community involvement.
