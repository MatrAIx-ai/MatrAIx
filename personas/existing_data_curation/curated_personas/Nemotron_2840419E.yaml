  hobbies: '[''Sailing'', ''Kayaking'', ''Beach volleyball'', ''Woodworking (boat building, furniture)'', ''Photography'', ''Beach clean‑up volunteering'', ''Youth STEM outreach'', ''Reading contemporary
    fiction'', ''Attending theater productions'', ''Exploring art festivals'']'
  career_goals: Clark aims to advance to a senior technologist role where he can lead cross‑functional teams on marine‑focused engineering projects. He aspires to obtain certifications such as Certified
    Manufacturing Technologist and to mentor junior technicians, fostering a collaborative culture. Over the next five years, he hopes to spearhead sustainability‑driven initiatives in local infrastructure,
    possibly launching a consultancy that bridges engineering solutions with community development and coastal preservation. While ambitious, he values flexibility and work‑life balance, seeking opportunities
    that allow him to remain actively involved in his local community.
