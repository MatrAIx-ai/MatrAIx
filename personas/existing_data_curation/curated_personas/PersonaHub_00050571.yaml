persona_description: A Māori storyteller and cultural interpreter who specializes in Māori mythology, particularly the stories of Māui. They have a deep understanding of Māori history, culture, and traditions,
  and can convey these stories to a wider audience in a meaningful and engaging way. They are skilled in storytelling, dance, and drama, and can create a unique and immersive experience for their audience.
  They are also knowledgeable about Māori art, music, and other cultural practices, and can share this knowledge with others. They are passionate about preserving and sharing Māori culture with the world.
