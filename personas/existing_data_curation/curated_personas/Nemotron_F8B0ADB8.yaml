personas:
  professional: Mayra Munoz is a budding welder‑artist who leverages MIG and TIG expertise, blueprint reading, and a habit of sketching in a battered notebook to prototype custom metal sculptures, while
    their competitive streak drives them to enter local metal‑working contests despite a sometimes disorganized workflow.
  sports: Mayra Munoz regularly skateboards with the Torrington Skate Crew at the local park, follows the New England Revolution in MLS and the Connecticut Wolves semi‑pro basketball team, and mixes high‑intensity
    interval training with weekend hikes in the nearby state forest to counterbalance the sedentary focus of metal fabrication.
  arts: Mayra Munoz immerses themselves in the vibrant street‑art scene, admiring works by Banksy, Shepard Fairey, and local muralist Lisa Peña, while their soundtrack of cumbia beats from Carlos Vives,
    reggaeton flow from J Balvin, and indie rock from Arctic Monkeys fuels sketch sessions in sketchbooks and inspires their metal‑sculpture concepts.
  travel: Mayra Munoz prefers spontaneous road trips to regional gems like the historic town of Mystic, the bustling art fairs of Portland, Maine, and the vibrant street‑art scene in Barcelona, Spain, balancing
    a limited student budget with a love for immersive, low‑key exploration over meticulous itinerary planning.
  culinary: Mayra Munoz enjoys crafting homemade arepas filled with cheese and beef, frying crisp empanadas, experimenting with turmeric‑spiced metal‑shaped ramekins, and occasionally orders ramen from
    the local Japanese spot, showcasing a versatile palate that blends family recipes with bold flavor experiments.
  core: Mayra Munoz is a curious, competitive teen welder‑artist who balances a love for metal‑making and street art with occasional anxiety, a chaotic schedule, and a habit of turning everyday stress into
    creative metal sculptures.
background:
  cultural: Mayra is the daughter of Colombian immigrants who settled in Connecticut. She grew up speaking Spanish at home and celebrating Colombian traditions such as Día de la Independencia, Carnaval
    de Barranquilla, and family gatherings centered around food, music, and dance. Her cultural identity blends the warmth of Colombian family life—full of lively conversation, salsa and cumbia rhythms,
    and shared meals of bandeja paisa and empanadas—with the pragmatic, community‑oriented values of her New England environment. This dual heritage influences her artistic sensibility, encouraging vivid
    color palettes and rhythmic patterns in her metal art, while her bilingual ability helps her navigate both the local workforce and the broader Colombian community in the state.
attributes:
  skills: '[''MIG welding'', ''TIG welding'', ''Soft soldering'', ''Brazing'', ''Blueprint reading'', ''Metal fabrication'', ''OSHA safety compliance'', ''Basic electrical troubleshooting'', ''Spanish-English
    bilingual communication'', ''Creative design sketching'']'
  hobbies: '[''Visiting art galleries'', ''Sketching design concepts'', ''Creating metal sculptures from reclaimed material'', ''Listening to Colombian cumbia, reggaeton, and indie rock'', ''Playing strategic
    video games'', ''Skateboarding'', ''Reading science-fiction'', ''Mindfulness breathing exercises'', ''Cooking traditional Colombian meals'', ''Volunteering to teach soldering'']'
  career_goals: Mayra aims to earn a Journeyman Welder certification within the next two years, followed by an apprenticeship in industrial design that merges her welding skills with artistic metal sculpture.
    She hopes to eventually open a small studio in Torrington where she can produce custom metal art and furniture, leveraging her Colombian heritage in the designs. She also plans to take evening courses
    in CAD and 3D modeling to broaden her technical repertoire, and she dreams of participating in regional metal‑working competitions, driven by her competitive nature. In the longer term, she envisions
    collaborating with architects on bespoke metal installations and possibly teaching metalworking workshops for young women.
