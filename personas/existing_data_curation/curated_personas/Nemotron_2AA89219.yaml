  hobbies: '[''Bowling League'', ''Library Tech Mentorship'', ''Hiking Club'', ''Classic Literature Reading'', ''Barbecue Cooking'', ''Saratoga Horse Racing'', ''Garden Cultivation'', ''Vintage Computer
    Restoration'']'
  career_goals: Michael aims to transition from his current role as IT Support Manager into an IT Director position within the next five years, overseeing a larger infrastructure while preserving the reliable,
    routine‑driven environment he values. He is focused on strengthening the organization’s cybersecurity posture, streaming help‑desk processes, and mentoring junior staff to build a cohesive, high‑performing
    team. Long‑term, he envisions consulting for small to mid‑size businesses in the upstate New York region, helping them adopt practical technology solutions that support growth without sacrificing stability.
