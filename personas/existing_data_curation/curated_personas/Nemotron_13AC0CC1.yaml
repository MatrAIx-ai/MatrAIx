  career_goals: Looking ahead, Michael aims to transition into a senior advisory role where he can shape IT strategy for local nonprofits and small businesses, leveraging his desire for structured, impact‑driven
    work. He is interested in establishing a community tech‑outreach program that offers free digital literacy classes, reflecting his strong empathy and cooperative spirit. Additionally, Michael hopes
    to earn a Certified Information Systems Manager (CISM) credential to formalize his leadership capabilities and position himself as a trusted consultant for organizations seeking reliable, people‑focused
    technology solutions.
