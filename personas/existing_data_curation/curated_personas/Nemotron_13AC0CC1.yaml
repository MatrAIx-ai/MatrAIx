personas:
  professional: Michael Courtney, a senior systems analyst turning toward community‑focused IT advisory, leverages CompTIA A+, Network+, and ITIL certifications to distill complex technical issues into
    plain language, leads cross‑functional process‑improvement projects with a structured yet adaptable mindset, and they delight colleagues with a talkative, collaborative style.
  sports: Michael Courtney proudly dons the orange and brown of the Cleveland Browns each fall, joins a local senior bowling league for weekday socializing, casts a line at Lake Erie on sunny weekends,
    and follows the Guardians' baseball season, often cheering in the community clubhouse while they balance structured workouts with relaxed, leisurely pursuits.
  arts: Michael Courtney shines on stage with the Beachwood Community Theater, delivering witty monologues that echo their talkative nature, while their evenings unwind with classic mystery novels by Agatha
    Christie and detective radio dramas, and they frequently attend Playhouse Square performances featuring actors like Meryl Streep and live jazz nights honoring Duke Ellington.
  travel: Michael Courtney prefers meticulously planned weekend getaways, such as a sunrise fishing trip to Presque Isle State Park in Pennsylvania and a cultural tour of Asheville’s historic Biltmore Estate,
    while dreaming of a cross‑country road trip to the Pacific Northwest’s Olympic National Park that would combine scenic drives with opportunities to sample local seafood, all within a modest budget that
    respects their retirement savings, and they always pack a portable cooler for the fishing outings.
  culinary: Michael Courtney delights in cooking garden‑fresh tomatoes, bell peppers, and basil into a rustic ratatouille, grilling freshly caught Lake Erie perch with a lemon‑butter glaze, and topping
    the dish with locally sourced cheddar, while their cooking skill hovers between confident home chef and occasional DIY wood‑smoked BBQ experiments that sometimes result in over‑charred vegetables, and
    they proudly serve the creations at neighborhood potlucks.
  core: Michael Courtney is a structured, talkative IT mentor who balances meticulous project planning with spontaneous fishing trips, a penchant for misplacing garden tools, and an unwavering love for
    community theater, and they often brighten meetings with witty anecdotes.
background:
  cultural: Michael grew up in a middle‑class, predominantly white suburb of Cleveland, where Midwestern values of hard work, community involvement, and modesty were emphasized. He was raised in a Protestant
    household that encouraged service to others, a principle that continues to guide his volunteer activities. The cultural milieu of Beachwood—a blend of family‑centric neighborhoods and active civic organizations—has
    shaped Michael's cooperative outlook and his appreciation for structured community events. His background reflects a mix of traditional American suburban life and a modern, tech‑savvy orientation.
