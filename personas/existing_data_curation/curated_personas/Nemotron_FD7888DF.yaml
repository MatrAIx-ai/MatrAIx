personas:
  professional: Tom Kwon is a meticulous physical scientist who blends rigorous experimental design with advanced computational modeling, leveraging Python, MATLAB, and LabVIEW to build custom photonic
    instrumentation while drawing visual inspiration from gallery visits, and they are methodically steering toward an independent principal investigator role and a quantum‑sensing startup.
  sports: Tom Kwon is an avid hiker of the Cascades and a seasonal paddle‑board enthusiast, regularly participates in a local adult soccer league affiliated with the Sounders community, and they cheer for
    the Seattle Seahawks while maintaining a disciplined weekly cardio regimen.
  arts: Tom Kwon’s artistic palate includes regular visits to the Seattle Art Museum where they study the works of Yayoi Kusama and Ansel Adams, they compose acoustic guitar renditions of Bon Iver songs,
    and they channel speculative science‑fiction narratives from authors like Alastair Reynolds into their data visualizations.
  travel: Tom Kwon plans trips with meticulous detail, favoring destinations that combine night‑sky photography and outdoor challenges such as Iceland’s aurora‑lit fjords, New Zealand’s Southern Alps, and
    the Pacific Northwest’s coastal trails, while balancing family obligations and a modest travel budget.
  culinary: Tom Kwon enjoys cooking at an intermediate level, perfecting dishes like kimchi jjigae, bulgogi, and gochujang‑marinated tofu, they love experimenting with fusion flavors using miso and fresh
    Pacific salmon, and they regularly source ingredients from Seattle’s Pike Place Market.
  core: Tom Kwon is a methodical scientist with a photographer’s eye and a competitive spirit, who balances disciplined research with night hikes, guitar jam sessions, and occasional splurges on high‑end
    gear, yet remains skeptical of unverified claims until data convinces them.
background:
  cultural: Tom is a second‑generation Korean‑American whose parents immigrated from South Korea in the early 1990s. Raised in the Seattle suburbs, he grew up bilingual, speaking both English and Korean
    at home, and celebrating Korean holidays such as Chuseok and Seollal. His family placed a strong emphasis on education, discipline, and respect for community, values that inform his methodical work
    ethic and organized approach. While he identifies with the broader multicultural fabric of Seattle, Tom maintains ties to the local Korean community through cultural festivals, occasional Korean language
    meet‑ups, and culinary traditions. His heritage provides a lens through which he appreciates both the precision of scientific inquiry and the expressive nuance of artistic pursuits.
attributes:
  skills: '[''Experimental design'', ''Computational modeling'', ''Data analysis'', ''Scientific programming (Python, MATLAB, LabVIEW)'', ''Laboratory instrumentation'', ''Technical writing'', ''Grant proposal
    preparation'', ''Project management'', ''Statistical analysis'', ''Data visualization'']'
  hobbies: '[''Hiking in the Cascades'', ''Visiting art exhibitions'', ''Photography (nightscapes)'', ''Cooking Korean cuisine'', ''Playing acoustic guitar'', ''Reading science-fiction'', ''Stargazing/Amateur
    astronomy'', ''Puzzle solving (logic puzzles)'', ''Strategy board games'']'
  career_goals: Tom aspires to transition from a staff scientist to an independent principal investigator leading a multidisciplinary research group focused on novel photonic materials. He aims to secure
    a major federal grant within the next three years to fund a cutting‑edge platform for quantum‑enabled sensing. Long‑term, Tom envisions translating his research into a startup that commercializes low‑cost,
    high‑precision optical sensors for environmental monitoring. He also plans to mentor early‑career researchers, fostering a collaborative environment that balances rigorous scientific inquiry with creative
    exploration of unconventional ideas.
