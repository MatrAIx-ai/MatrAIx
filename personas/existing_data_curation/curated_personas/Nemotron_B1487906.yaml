  hobbies: '[''Sketching and painting'', ''Reading fantasy books'', ''Writing short stories and poems'', ''Building LEGO models'', ''Playing Minecraft (creative mode)'', ''Stargazing with telescope'', ''Bird
    watching'', ''Listening to music (classical and indie folk)'', ''Volunteering at animal shelter'']'
  career_goals: Alex dreams of turning his imagination into a career that also helps others. He hopes to become a children's author and illustrator, creating stories that inspire wonder and kindness. He
    is also fascinated by designing educational video games that blend art, science, and problem‑solving for young players. In the longer term, he sees himself working as a youth mentor or community organizer,
    using his creative talents to foster supportive environments for peers. He plans to study art, literature, and psychology in high school and college to build the skills needed for these paths.
