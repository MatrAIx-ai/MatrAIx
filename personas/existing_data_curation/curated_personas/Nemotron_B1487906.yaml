personas:
  professional: Alex Wolfe, a ten‑year‑old budding illustrator and storyteller, channels a vivid imagination into sketching fantasy characters and watercolor landscapes, often organizing their art supplies
    with meticulous care while flexibly improvising new worlds, and they volunteer at the local animal shelter to find inspiration for compassionate narratives.
  sports: Alex Wolfe enjoys weekend hikes, snowshoeing, and ski lessons with the local youth ski club in the Wasatch foothills, they also play on the Sandy Junior Soccer team where they prefer small‑sided
    matches, and they cheer for the Utah Jazz while quietly tracking player stats on their tablet.
  arts: Alex Wolfe spends afternoons listening to indie folk artists like The Lumineers and Bon Iver and classical piano pieces by Debussy, they draw inspiration from Hayao Miyazaki’s films and the whimsical
    worlds of Harry Potter, filling sketchbooks with dragons and elves while humming along to their favorite tunes.
  travel: Alex Wolfe loves family road trips to the Wasatch mountains for camping and bird‑watching, they dream of exploring Zion National Park’s waterfalls, visiting Yellowstone’s geysers, and someday
    traveling to Hogwarts‑inspired sites in the United Kingdom, while balancing school commitments and a limited travel budget.
  culinary: Alex Wolfe delights in homemade pizza topped with pepperoni and extra cheese, they also craft blueberry muffins using fresh berries from the local farmers’ market and experiment with huckleberry
    jam on pancakes, though they sometimes overindulge in sugary snacks like gummy bears after gaming sessions.
  core: Alex Wolfe is a ten‑year‑old dreamer who blends artistic imagination with a caring heart, meticulously organizes their creative tools while anxiously budgeting allowance, and finds solace in starlit
    hikes and sketching fantastical worlds.
background:
  cultural: Alex was raised in Sandy, a suburban city in Salt Lake County, Utah. The community is predominantly white and reflects Intermountain West values such as outdoor recreation, family cohesion,
    and community service. His family celebrates typical American holidays like Thanksgiving and the Fourth of July, and they often take weekend trips to the nearby Wasatch Mountains for hiking, skiing,
    or snowshoeing. While the area has a strong presence of the Church of Jesus Christ of Latter‑day Saints, Alex’s upbringing includes exposure to its emphasis on helping neighbors and volunteering, which
    aligns with his compassionate nature. He also enjoys local traditions such as county fairs, farmers’ markets, and community clean‑up events, shaping his appreciation for nature and community.
