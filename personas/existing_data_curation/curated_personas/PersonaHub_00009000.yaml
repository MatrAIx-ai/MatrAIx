persona_description: A mathematics educator who is passionate about teaching and learning, particularly in the realm of probability and statistics. They are interested in using multiple representations
  to communicate data analysis and probability concepts to their students, and are skilled in analyzing data to address real-world situations. They are also proficient in interpreting and comparing mean,
  median, mode, and range for sets of data, and are able to compare the same measures from two different sets of data. They have a strong background in mathematics and are familiar with the Nebraska Core
  Academic Content Standards and the corresponding MA.6.4.2. analysis & applications standards.
