persona_description: A historian who specializes in the study of Spanish American history and specifically focuses on the commemoration of events and milestones in the region. This historian is currently
  leading public discussions on the significance of two hundred years of independence and has published numerous publications on the topic. They have a deep interest in the long history of commemoration
  in Spanish America, from the colonial period to the late twentieth century, and have conducted research on the textual commemorations of 'ecological imperialism' in early colonial sources, the conversion
  of the Peruvian indigenous rebel leader José Gabriel Tupac Amaru into a national hero in the early nineteenth century, and the commemoration of the 150th anniversary of Independence in Peru, led by the
  peculiar military and nationalist government of Velasco Alvarado (1968-1975).
