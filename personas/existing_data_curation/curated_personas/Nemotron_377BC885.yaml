  hobbies: '[''Gardening'', ''Cooking traditional Midwestern dishes'', ''Book club reading'', ''Community volunteering'', ''Walking/hiking on Scioto River Trail'', ''Church women group activities'', ''Attending
    local festivals'', ''Knitting/crocheting'']'
  career_goals: Hailey aims to advance to a branch manager position within her agency, increasing market share and setting performance benchmarks for her team. She plans to earn the Chartered Property Casualty
    Underwriter (CPCU) and Chartered Life Underwriter (CLU) designations to deepen her expertise. Long‑term, she envisions transitioning to a regional trainer role, mentoring new agents across Ohio, and
    establishing a community‑focused financial literacy program that educates residents on insurance and personal finance. She also hopes to achieve recognition as a top producer in her district while maintaining
    a balanced, stable lifestyle for her family.
