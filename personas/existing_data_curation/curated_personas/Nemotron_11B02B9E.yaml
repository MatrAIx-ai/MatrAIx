  hobbies: '[''Community event planning'', ''Gardening'', ''Book club participation'', ''Weekly women’s basketball league'', ''Quilting'', ''Food pantry volunteering'']'
  career_goals: Britney aspires to move into a supervisory role within the customer service department, aiming to become a team lead or floor manager within the next two to three years. She plans to complete
    her associate degree in Business Administration, leveraging her some‑college coursework, and earn a certification in Customer Service Management. Her long‑term ambition includes shaping service policies
    that enhance customer satisfaction while fostering a supportive, collaborative team culture. Additionally, she hopes to contribute to community outreach programs through her employer, aligning her professional
    growth with her desire to give back to Martinsville.
