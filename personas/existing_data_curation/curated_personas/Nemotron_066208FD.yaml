  career_goals: Although officially retired, Wanda aims to remain an active contributor to her community. She aspires to mentor aspiring teachers through a local school’s internship program, lead an intergenerational
    storytelling workshop that pairs seniors with elementary students, and expand her involvement with the St. Lucie County Senior Services Council to influence policy on transportation and health resources
    for older residents. Additionally, she hopes to establish a modest scholarship fund for students pursuing education degrees, and is considering compiling her memoir to preserve her family's immigrant
    heritage for future generations.
