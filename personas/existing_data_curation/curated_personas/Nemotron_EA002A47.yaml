  career_goals: Huy aspires to obtain his GED and pursue a Certified Bookkeeper credential to formalize his expertise. He aims to advance to a senior clerk or supervisory role within his financial institution,
    where he can lead a team and implement process improvements. Long‑term, he envisions starting a small consulting practice to help local entrepreneurs and community members manage their finances, combining
    his organized skill set with his curiosity for new ideas and community service.
