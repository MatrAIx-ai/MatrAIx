  career_goals: Vladimir aims to advance from an office clerk to an office manager within the next three to five years. He plans to earn a GED and then pursue an associate’s degree in Business Administration
    or Office Management, while also obtaining professional certifications such as Microsoft Office Specialist and Certified Administrative Professional. He hopes to lead process‑improvement projects, mentor
    newer staff, and eventually move into an operations‑supervisor role where he can shape workplace efficiency and contribute to a supportive, inclusive office culture.
