  hobbies: '[''Reading classic novels'', ''Gardening (roses and lavender)'', ''Genealogy research'', ''Nature photography'', ''Volunteering at the Vineyard library'', ''Knitting'', ''Crossword puzzles'',
    ''Hiking on local trails'', ''Attending local history lectures'', ''Mindfulness meditation and gentle yoga'']'
  career_goals: Although retired from formal employment, Marianne aims to leave a lasting intellectual and emotional legacy. She plans to complete and self‑publish a memoir that weaves her personal story
    with the history of Vineyard and its settlers. She hopes to become a regular docent for the Cedar Fort Historical Society, offering guided tours that reflect both scholarly depth and approachable storytelling.
    Additionally, she wishes to launch an intergenerational writing workshop that pairs high‑school students with seniors, fostering mentorship while satisfying her competitive drive in a supportive setting.
    Personal goals include deepening her practice of mindfulness to manage anxiety, ensuring her estate is responsibly set up for her grandchildren, and traveling modestly to historic literary sites in
    the American West.
