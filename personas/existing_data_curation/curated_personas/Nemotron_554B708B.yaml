personas:
  professional: A seasoned HVAC technician named Edwin Mcghee leverages two decades of hands-on experience and a curiosity for smart-home tech to lead a small crew, train apprentices, and integrate energy-efficient
    solutions, and they balance meticulous project planning with a flexible, neighbor-helping mindset.
  sports: Edwin Mcghee is a third-base regular for the Stone County Softball League, avidly follows the St. Louis Cardinals and Kansas City Chiefs, spends weekend mornings fishing Lake Taneycomo and hunting
    deer with the local rifle club, treating each season as both social gathering and low-key fitness routine, and they relish the camaraderie that comes from local team events.
  arts: Edwin Mcghee enjoys the storytelling of classic country legends like Johnny Cash and Merle Haggard, attends the annual Stone County Fair’s folk music stage, watches the local community theater’s
    productions of Our Town, and they find quiet satisfaction carving wooden sculptures inspired by the Ozark landscape.
  travel: Edwin Mcghee favors practical road trips, often cruising the Ozark Scenic Byway to explore hidden waterfalls, has taken a family vacation to the Great Smoky Mountains, dreams of an off-grid eco-tour
    in New Zealand, and they keep travel costs low to safeguard their startup budget while balancing family responsibilities.
  culinary: Edwin Mcghee prefers hearty Midwestern fare – smoked pork ribs, fried catfish, and cornbread – skillfully grilling his own deer venison, experimenting with homemade spice rubs, and they occasionally
    attempt complex woodworking-inspired plating for the kids' birthday parties, despite a tendency to over-salt dishes when experimenting late at night.
  core: A 44-year-old HVAC veteran named Edwin Mcghee blends a relentless work ethic, community-first mentality, and tech-savvy curiosity, yet habitually worries about finances and stress, and they find
    solace in tinkering with smart thermostats late at night.
background:
  cultural: Edwin grew up in a small Midwestern town in southwest Missouri, raised in a family of fourth‑generation tradespeople with German‑American and Irish‑American roots. The community’s emphasis on
    hard work, self‑reliance, and neighborly support shaped his values. He attended the local high school and completed some college coursework in mechanical technology before entering the HVAC field. A
    member of his local Methodist church, Edwin participates regularly in county fairs, community service events, and family reunions, embodying the modesty, hospitality, and strong community ties characteristic
    of rural Missouri culture.
attributes:
  skills: '[''Residential HVAC installation'', ''Commercial HVAC troubleshooting'', ''Refrigerant recovery and handling'', ''Electrical circuitry and low-voltage control systems'', ''Blueprint and schematic
