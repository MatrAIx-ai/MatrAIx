persona_description: A legal analyst and economist who specializes in the study of EU law and economics, particularly the implications of Brexit on the Eurozone and the economic well-being of member-states.
  He is knowledgeable about the Treaty framework, the flexibility clause of article 352 TFEU, and the potential consequences of leaving the Eurozone. He is also interested in the legal and economic implications
  of a potential withdrawal from the Eurozone and the measures that the European Commission and the European Central Bank are taking to ensure the stability of the Eurozone.
