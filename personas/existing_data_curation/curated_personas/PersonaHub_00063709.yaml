persona_description: A Danish researcher and professor who specializes in the study of horse health and welfare, particularly in the context of riding schools. He is known for conducting innovative research
  on the management and health of horses at riding schools, and for emphasizing the importance of pasture time and instructor experience in maintaining the health of riding school horses. His research has
  been presented at the International Society for Equitation Science Conference and has been published in peer-reviewed journals. He is a respected expert in the field of equine health and welfare, and
  his work has contributed significantly to the understanding and management of horse health in riding schools.
