personas:
  professional: Terrence Condrey, a 26‑year‑old professional photographer, merges meticulous technical mastery of DSLR and lighting with a literary‑inspired eye for storytelling, and they run a client‑focused
    boutique studio that balances razor‑sharp organization with spontaneous creative experimentation.
  sports: Terrence Condrey cycles with the Greenwich Wheel Club on weekends, follows the New England Patriots and Hartford Yard Goats, and incorporates bi‑weekly trail runs along the Connecticut shoreline
    into a fitness regimen that balances competitive drive with scenic relaxation.
  arts: Terrence Condrey curates a vinyl collection that features Nick Drake, Sufjan Stevens, and Fleet Foxes, frequents the Yale University Art Gallery for Gregory Crewdson exhibitions, and draws compositional
    inspiration from Wes Anderson’s meticulous framing, while they occasionally stay up all night cataloguing album metadata.
  travel: Terrence Condrey prefers meticulously planned weekend road trips to coastal New England towns like Mystic and Newport, dreams of a spring photography pilgrimage to Provence’s lavender fields and
    Iceland’s rugged cliffs, and they balance a modest budget with a craving for immersive cultural experiences.
  culinary: Terrence Condrey, an enthusiastic home chef, experiments with sous‑vide salmon, crafts hearty New England clam chowder using fresh clams and thyme, perfects duck confit on weekends, and they
    often forget to meal‑prep, opting instead for spontaneous foraging trips to local farmers’ markets.
  core: Terrence Condrey fuses a New England love of order with restless creative curiosity, obsessively cataloguing every shot while habitually binge‑watching vintage camera documentaries into the early
    morning hours.
background:
  cultural: Terrence grew up in a suburban New England family with roots in European (primarily Irish and English) ancestry. His upbringing emphasized self‑reliance, community engagement, and an appreciation
    for the region’s seasonal cycles and historic towns. He attended public schools in Fairfield County, where a liberal arts curriculum nurtured his curiosity, critical thinking, and balanced appreciation
    for both new ideas and established methods. This background blends traditional New England values—practicality, organization, and respect for heritage—with an openness to experimentation, reflecting
    in his artistic pursuits and competitive drive.
attributes:
  skills: '["DSLR/mirrorless camera operation", "studio and natural lighting", "portrait and event photography", "landscape and architectural photography", "Adobe Lightroom and Photoshop editing", "color
