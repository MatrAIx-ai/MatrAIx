  hobbies: '[''abstract painting'', ''generative AI art'', ''speculative fiction reading'', ''philosophy'', ''chess'', ''logic puzzles'', ''solo cycling'', ''cooking Cuban cuisine'', ''listening to Cuban
    jazz'', ''writing poetry'']'
  career_goals: Dante aims to ascend to the role of Director of a global Project Management Office where he can shape large‑scale, technology‑driven initiatives. He intends to develop a proprietary AI‑based
    optimization platform that integrates his analytical and artistic sensibilities, positioning him as a thought leader in next‑generation project management. Achieving advanced certifications such as
    PgMP and Certified Agile Coach is a priority, as is publishing research on the intersection of design thinking and risk management. Long‑term, he envisions founding a boutique consultancy that advises
    on sustainable, culturally inclusive infrastructure projects while mentoring emerging talent from underrepresented backgrounds.
