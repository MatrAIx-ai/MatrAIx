personas:
  professional: Armand Stead, a 23‑year‑old nursing professional, combines a solid biomedical foundation with meticulous clinical skills—sharp assessment, IV therapy, and EHR analytics—and they channel
    a curiosity for tech‑driven care and a competitive drive toward becoming a nursing informatics leader.
  sports: Armand Stead, an avid runner who logs daily miles on the Lakefront Trail, occasionally joins the Chicago Lakeshore Running Club for group intervals, tunes into Chicago Bulls and Blackhawks games,
    and they squeeze in weekend pick‑up basketball at a neighborhood gym to balance cardio with competitive team play.
  arts: Armand Stead, a frequent visitor to the Art Institute and downtown pop‑up galleries, captures Chicago’s skyline in black‑and‑white digital frames inspired by photographers like Vivian Maier, sketches
    urban scenes on the go, and they draw creative fuel from the music of Sufjan Stevens and the immersive installations of James Turrell.
  travel: Armand Stead, a detail‑oriented traveler, meticulously plans trips using travel forums and budget spreadsheets, has already explored Milwaukee’s lakefront festivals, the jazz streets of New Orleans,
    and the geothermal wonders of Reykjavik, and they dream of a minimalist, art‑focused pilgrimage to Kyoto’s historic temples.
  culinary: Armand Stead, an experimental home chef with a solid grasp of molecular gastronomy, frequently prepares spherified balsamic olives, sous‑vide salmon with agar‑based gels, and deconstructed Chicago
    deep‑dish pizza using ingredients like xanthan gum and liquid nitrogen, and they relish pairing these creations with craft microbrews from local breweries.
  core: Armand Stead blends a Midwestern work ethic with a restless curiosity for art and technology, obsessively tracks everything from expenses to run mileage, fuels late‑night coding with caffeine, and
    they channel a competitive streak into both their nursing career and their experimental kitchen experiments.
background:
  cultural: Armand was raised in a middle‑class family in the Chicago suburbs, with ancestry tracing back to Irish and German immigrants. Growing up in the diverse cultural mosaic of the Chicago metropolitan
    area gave him early exposure to a broad spectrum of artistic and culinary traditions, fostering his curiosity for the arts and new ideas. His parents emphasized education and a strong work ethic typical
    of the Midwestern ethos, which combined with the city's vibrant healthcare community to shape his decision to pursue a STEM degree and a career in nursing. Although he identifies with his European heritage,
    he values the multicultural fabric of Chicago and incorporates its inclusive spirit into his worldview.
attributes:
  skills: '[''Clinical assessment'', ''Medication administration'', ''Wound care'', ''IV therapy'', ''Electronic health record (EHR) management'', ''Medical device troubleshooting'', ''Data analysis for
    patient outcomes'', ''Basic life support (BLS) certification'', ''Patient education and counseling'', ''Shift coordination and team leadership'']'
  hobbies: '[''Visiting art museums and galleries'', ''Sketching and digital photography'', ''Reading science fiction and tech non-fiction'', ''Playing chess'', ''Running along the Lakefront Trail'', ''Experimenting
    with molecular gastronomy'', ''Volunteering at community health fairs'']'
  career_goals: Armand aims to transition from LPN to RN within the next two years by completing an accelerated BSN program, leveraging his STEM background to specialize in nursing informatics. He aspires
    to become a senior clinical educator who designs evidence‑based training that blends technology and creative approaches such as art‑based therapeutic interventions. Long‑term, he envisions leading a
    quality‑improvement team in a major hospital or launching a startup that uses data analytics to optimize patient flow. His competitive nature drives him to obtain advanced cardiac life support certification
    and become a recognized expert in patient safety.
