persona_description: A development expert who specializes in cluster development, specifically focusing on the identification, selection, and support of dynamic clusters in developing countries. They have
  extensive experience in conducting diagnostic studies, vision building, and action planning to help clusters achieve high rates of growth and competitiveness. Their approach involves building horizontal
  and vertical networks, providing customized services and assistance to firms within stagnating clusters, and strengthening local institutions' capacity to lead the process of cluster development and support
  firms in their future endeavors. They have a deep understanding of the challenges faced by dynamic clusters in developing countries, including outdated technology, infrastructure limitations, and a lack
  of skilled labor and access to credit and other services.
