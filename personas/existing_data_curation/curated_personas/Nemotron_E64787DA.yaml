personas:
  professional: Susan Travis, a veteran retail merchandiser turned part‑time consultant, blends three decades of visual merchandising expertise with a curious eye for Appalachian folk art, using their calm
    assertiveness and methodical inventory skills to help small businesses create displays that are both meticulously organized and flexibly responsive to seasonal trends.
  sports: Susan Travis fuels their love of the outdoors with weekly hikes along the Appalachian foothills, active membership in the local Appalachian Trail Hikers Association, and a loyal following of the
    Washington Nationals and Washington Capitals, while fitting in weekend yoga sessions at the community center to keep joint stiffness at bay.
  arts: Susan Travis finds artistic inspiration in the folk paintings of Grandma Moses, the haunting bluegrass of Gillian Welch, and the nuanced performances of Meryl Streep, they regularly sketch in museum
    corridors and curate store displays that celebrate both regional crafts and contemporary works.
  travel: Susan Travis prefers thoughtfully planned, low‑key trips that blend art and nature, often spending long weekends exploring the Blue Ridge Parkway, the historic district of Savannah, and Asheville’s
    craft markets, while dreaming of a future summer in Florence, Italy, to study Renaissance frescoes up close.
  culinary: Susan Travis enjoys cooking simple, seasonal meals—such as wildflower‑infused salad with goat cheese, roasted beet and hazelnut quinoa, and a classic chicken pot pie—leveraging a modest yet
    confident kitchen skill set and a fondness for fresh herbs like rosemary, thyme, and lavender.
  core: Susan Travis is a quietly curious curator of community art who balances meticulous retail precision with a habit of hoarding vintage sketchbooks, a penchant for late‑night quilting sessions, and
    an occasional inability to decline unsolicited art‑supply sales pitches.
background:
  cultural: Susan was raised in a modest, white Southern family in the rural outskirts of Franklin County, North Carolina. Her upbringing was shaped by the close‑knit community values, church gatherings,
    and an appreciation for Appalachian folk traditions, such as quilting and bluegrass music. Although her parents emphasized self‑reliance and hard work, they also encouraged curiosity, allowing her to
    explore art and literature beyond the town limits. This blend of traditional Southern hospitality, respect for local craftsmanship, and an open‑minded pursuit of new ideas informs her worldview and
    daily interactions.
