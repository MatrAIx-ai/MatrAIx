  career_goals: Looking ahead, Susan aims to transition from a full‑time retail role to a part‑time consultancy, helping small local businesses improve their merchandising and customer engagement. She dreams
    of opening a boutique that showcases regional crafts, folk art, and the work of emerging artists she admires. Additionally, Susan hopes to mentor younger sales associates, sharing her seasoned perspective
    while continuing to explore her personal interest in art and community outreach. By the time she reaches retirement age, she envisions a modest, community‑focused gallery‑café that blends her retail
    acumen with her love for the arts.
