personas:
  professional: Kristina Christian is a seasoned janitorial specialist turned facilities operations leader who blends meticulous cleaning expertise with an artist’s eye for detail, using their disciplined
    organization and curiosity to devise eco‑friendly maintenance protocols that keep galleries and museums pristine while training staff with a supportive, assertive style.
  sports: Kristina Christian is a dedicated weekend hiker who climbs the Arbuckle Mountains with the local Arbuckle Mountain Hiking Club, supports the Oklahoma City Thunder and the Oklahoma Sooners on game
    nights, attends occasional yoga classes at a nearby studio, and plays casual tennis at the Broken Arrow community courts to balance low‑impact cardio with strength.
  arts: Kristina Christian is an avid art enthusiast who sketches museum exhibits, studies works by Georgia O’Keeffe, Ansel Adams, and Frida Kahlo, listens to folk singer Rhiannon Giddens while painting
    watercolors, attends indie film screenings of Greta Gerwig’s movies, and volunteers at community art festivals to ensure clean, well‑lit spaces for local artists.
  travel: Kristina Christian prefers carefully planned art‑focused getaways, such as weekend visits to Santa Fe’s Canyon Road galleries, cultural tours of Oaxaca’s pottery workshops, a spring trip to Kyoto’s
    temples for inspiration, and a dream itinerary to Florence’s Renaissance museums, balancing these adventures with budget‑conscious choices and occasional family visits to Austin, Texas.
  culinary: Kristina Christian enjoys cooking fresh garden meals, regularly preparing basil pesto pasta, roasted beet and goat‑cheese salad, grilled salmon with lemon‑herb glaze, and peach cobbler using
    home‑grown herbs and seasonal fruit, while also indulging in artisanal coffee at the local indie café and occasionally ordering sushi for a gourmet treat.
  core: Kristina Christian blends disciplined precision with artistic curiosity, turning cleaning routines into eco‑friendly masterpieces while juggling modest finances, health vigilance, and a love for
    solitary hikes, sketchbooks, and garden‑to‑table meals.
background:
  cultural: 'Kristina grew up in a middle‑class, white family in the Oklahoma heartland, where values of hard work, self‑reliance, and community service were emphasized. Her upbringing included regular
    church attendance in a Protestant congregation, reinforcing a sense of compassion, modesty, and stewardship. Living in Broken Arrow—a city that sits on historic Cherokee Nation lands—has given her an
    appreciation for the region’s Native American heritage, which she respects through occasional participation in local cultural events and a personal interest in the history of the area. The Midwestern
    ethos of friendliness combined with a pragmatic approach to life shapes her interpersonal style: cooperative yet capable of assertive leadership when needed. Her widowed status has deepened her empathy
    and resilience, influencing both her career ambitions and her commitment to nurturing supportive networks within her community.'
attributes:
  skills: '[''Commercial floor care (hardwood, tile, carpet)'', ''Restroom sanitation and hygiene compliance'', ''Inventory control and supply ordering'', ''Scheduling and workflow optimization'', ''Safety
    and OSHA compliance'', ''Basic plumbing and electrical troubleshooting'', ''Sustainable cleaning practices'', ''Staff training and team coordination'', ''Art‑aware space maintenance'']'
  hobbies: '[''Sketching and watercolor painting'', ''Visiting art museums and galleries'', ''Reading art history and philosophy'', ''Photography of architecture and nature'', ''Gardening (backyard and
    community garden)'', ''Hiking and nature walks'', ''DIY home organization projects'', ''Online courses on sustainable cleaning and art'']'
  career_goals: Kristina aims to transition from a hands‑on janitorial role into a supervisory or facilities‑management position within the next three to five years. She plans to earn the Certified Professional
    Cleaner (CPC) credential from the International Sanitary Supply Association and complete a community‑college certificate in facilities management. Her long‑term ambition is to launch her own eco‑friendly
    cleaning business that specializes in serving galleries, museums, and cultural venues, where her appreciation for art can be integrated into meticulous space stewardship. She also hopes to mentor other
    women in the cleaning industry, fostering a supportive network that values professionalism, continuous learning, and community impact.
