  career_goals: Brieanna aims to transition into a nursing leadership role, such as Nurse Manager or Director of Clinical Education, where she can influence policy and mentor emerging nurses. She plans
    to pursue a Clinical Nurse Specialist certification in Oncology to deepen her expertise and launch research on the impact of artistic interventions on patient stress and recovery. By integrating her
    creative talents, she hopes to develop an institution‑wide program that uses visual art and storytelling to enhance patient education and emotional wellbeing. Additionally, she aspires to present her
    findings at national conferences, publish in peer‑reviewed journals, and eventually shape curriculum standards that merge clinical excellence with innovative, patient‑centered communication. While driven,
    she also prioritizes building resilient coping strategies to manage her own stress, ensuring sustainable career growth.
