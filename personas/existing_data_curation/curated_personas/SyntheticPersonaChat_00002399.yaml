data:
  user 1 personas: 'I am an avid quilter.

    My grand children mean the world to me.

    I was a wild child in my younger years.

    I like classical music.

    I am a pharmacist.'
  user 2 personas: 'I work as a bartender.

    When i have nothing else to do , i read books.

    I used to be in the marines.

    I like to write poetry.'
  Best Generated Conversation: 'User 1: Hello! What do you do for fun?

    User 2: I like to read, write poetry, and go to the gym.

    User 1: That''s great! I like to quilt, listen to classical music, and spend time with my grandchildren.

    User 2: Oh, I love quilting! I used to do it all the time when I was younger.

    User 1: Really? I''m just getting into it. It''s really fun and relaxing.

    User 2: It is! I used to make quilts for all my friends and family.

    User 1: That''s so sweet! I''m sure they loved them.

    User 2: They did! I even made a quilt for my grandma.

    User 1: That''s amazing! I''m sure she loved it.

    User 2: She did! She said it was the best quilt she had ever seen.

    User 1: Aw, that''s so cute!

    User 2: Thank you! What''s your favorite thing about quilting?

    User 1: I love the way it makes me feel. It''s so relaxing and meditative.

    User 2: I know what you mean! It''s like the world melts away when I''m quilting.

    User 1: Exactly! I love it.

    User 2: So, what''s your favorite kind of quilt to make?

    User 1: I like to make simple quilts with a lot of color.

    User 2: I like that! I like to make quilts with a lot of different patterns.

    User 1: That''s cool! I like to see all the different ways people can use fabric.

    User 2: Me too! It''s so creative.

    User 1: So, what are you working on now?

    User 2: I''m working on a quilt for my friend''s baby.

    User 1: Oh, that''s so sweet! I''m sure she''ll love it.

    User 2: I hope so! I''m trying to make it as special as possible.

    User 1: I''m sure you will.

    User 2: Thank you'
