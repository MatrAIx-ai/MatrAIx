  hobbies: '[''Oil painting and sketching'', ''Playing acoustic guitar'', ''Reading speculative fiction'', ''Visiting art galleries and museums'', ''Cooking traditional Puerto Rican cuisine'', ''Hiking
    in the Catoctin Mountains'', ''Photography of urban and natural scenes'', ''Community volunteering at cultural centers'', ''Woodworking projects'']'
  career_goals: Adalberto aims to progress into a regional sales management role where he can lead a team of representatives and shape strategic sales initiatives across multiple states. He is eager to
    integrate his imaginative approach into data-driven sales strategies, leveraging technology and creative storytelling to open new market segments. In the longer term, he envisions launching his own
    consulting firm that helps small manufacturers build brand identity and adopt innovative sales techniques, while also mentoring emerging sales talent.
