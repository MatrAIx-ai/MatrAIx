    and telematics awareness'']'
  hobbies: '[''Visiting art galleries and painting watercolors'', ''Playing mandolin in bluegrass jam sessions'', ''Hiking and photographing the Appalachian Trail'', ''Fishing in local rivers'', ''Volunteering
    at the Bristol food bank'', ''Participating in community theater'', ''Organizing neighborhood BBQs'', ''Woodworking and building custom furniture'', ''Cooking Southern cuisine'', ''Reading historical
    non‑fiction'']'
  career_goals: Joe aims to transition into a supervisory role where he can shape safety culture and operational efficiency across the plant. He plans to earn an OSHA 30‑hour trainer certification and eventually
    pursue the Certified Safety Professional credential. Leveraging his curiosity, he is interested in integrating eco‑friendly logistics practices, such as using electric‑assist equipment and data‑driven
    route optimization. He also hopes to mentor younger operators, share his knowledge through workshops, and, after securing a stable senior position, launch a small handcrafted furniture side business
    that blends his woodworking hobby with his methodical skill set.
