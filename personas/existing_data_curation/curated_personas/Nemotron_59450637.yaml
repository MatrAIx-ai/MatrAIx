  career_goals: Hansraj aims to transition into senior executive leadership within the next five years, targeting roles such as Director of Operations or Vice President of Community Engagement. He aspires
    to spearhead large‑scale, socially impactful projects that integrate cultural outreach and sustainability. He wants to leverage his South Asian heritage to champion diversity and inclusion initiatives,
    positioning the organization as a benchmark for culturally competent practices. Long‑term, he envisions founding a consulting boutique that advises NGOs and corporations on inclusive leadership, cross‑cultural
    collaboration, and resilient organizational design.
