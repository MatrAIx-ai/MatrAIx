personas:
  professional: John Phelps, a certified personal trainer and group fitness instructor, blends a love for structure with an outgoing nature; they design meticulously planned HIIT, boot‑camp, and circuit‑style
    classes that keep participants motivated, while using their CPR/AED certification and MindBody scheduling skills to maintain a reliable, community‑focused class environment.
  sports: John Phelps embraces the Pacific Northwest outdoors, running with the Chehalis Running Club, cycling the Willapa Hills Trail, hiking Cascade peaks in summer, coaching youth soccer on weekends,
    and cheering on the Seattle Seahawks, Seattle Sounders FC, and Seattle Mariners; they stay fit through HIIT boot‑camp sessions and value the camaraderie of team sports.
  arts: John Phelps unwinds by strumming acoustic guitar to the folk‑rock sounds of Brandi Carlile and Iron & Wine, attends regional music festivals featuring acts like The Lone Bellow, and draws storytelling
    inspiration from classic Tom Hanks films; they incorporate that narrative flair into their fitness workshops to keep participants engaged.
  travel: John Phelps prefers meticulously planned road trips that blend hiking, local cuisine, and community events, having explored the Oregon Coast, taken a weekend getaway to Vancouver, and dreaming
    of trekking the Inca Trail to Machu Picchu and cruising the Norwegian fjords; they balance adventure with careful budgeting and schedule planning to fit their busy professional life.
  culinary: John Phelps, an enthusiastic home cook, masters wellness‑focused meals such as grilled trout with lemon‑dill, roasted beet and quinoa salad, and kale chips seasoned with smoked paprika, often
    harvesting fresh vegetables from their garden and experimenting with sous‑vide techniques; they enjoy sharing these dishes at community potlucks and with clients as post‑workout nutrition ideas.
  core: John Phelps balances a love for structured fitness regimens with a spontaneous habit of impulsively buying new gear at garage sales, and they insist on a perfectly timed morning run before breakfast,
    even when a late‑night woodworking project threatens to shift their schedule.
background:
  cultural: John is a White American with deep roots in the Pacific Northwest. His family heritage includes German and Scandinavian ancestry, typical of many settlers in western Washington. Raised in a
    small‑town environment, he internalized values of self‑reliance, community cooperation, and respect for the outdoors. The regional culture—emphasizing environmental stewardship, active lifestyles, and
    strong local ties—shapes his identity and his commitment to fostering wellness in Chehalis. While he embraces mainstream American ideals of individual responsibility, he also reflects the collaborative,
    inclusive spirit of his Pacific Northwest community.
attributes:
  skills: '[''Certified Personal Trainer (CPT)'', ''ACE Group Fitness Instructor Certification'', ''CPR/AED certification'', ''Exercise program design'', ''Functional movement assessment'', ''High‑intensity
