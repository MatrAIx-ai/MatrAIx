    (MindBody)'', ''Social media promotion for fitness services'']'
  hobbies: '[''Running'', ''Hiking'', ''Cycling'', ''Fishing'', ''Coaching youth soccer'', ''Community volunteer work'', ''Gardening'', ''Healthy cooking'', ''Playing acoustic guitar'', ''Woodworking'',
    ''Reading fitness and personal‑development books'', ''Attending regional music festivals'']'
  career_goals: John aims to transition from being a gym‑based instructor to owning a boutique fitness studio in Chehalis that serves as a community wellness hub. He plans to earn a Certified Strength and
    Conditioning Specialist (CSCS) credential and pursue a degree in kinesiology to deepen his scientific knowledge. Over the next five years, he hopes to launch youth fitness programs, partner with local
    schools and businesses for corporate wellness initiatives, and host regular health‑education workshops. Ultimately, John envisions becoming a recognized leader in small‑town health promotion, blending
    structured program design with the inclusive, energetic atmosphere he values.
