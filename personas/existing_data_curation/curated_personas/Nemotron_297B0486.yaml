    and recipe experimentation","Participating in craft fairs","Volunteering for community STEM programs","Attending local cultural events"]'
  career_goals: Doris aims to transition from front‑line retail work into a position that merges her STEM education with her practical experience, such as a store manager, operations analyst, or community
    STEM outreach coordinator. She plans to enroll in evening courses to earn a certification in data analytics or IT support, which will enable her to take on more analytical responsibilities within the
    retail sector or at a local nonprofit. Long‑term, she envisions opening a small boutique that showcases handcrafted items inspired by both art and science, providing a venue for local makers and offering
    workshops for youth, especially girls, interested in STEM fields. Alongside professional advancement, Doris hopes to develop mentorship skills, lead community education programs, and eventually assume
    a leadership role that allows her to influence workplace culture and community development.
