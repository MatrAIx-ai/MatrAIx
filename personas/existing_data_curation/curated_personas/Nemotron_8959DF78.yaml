personas:
  professional: Song Trujillo, a seasoned quality‑control veteran with four decades of manufacturing experience, leverages a methodical, data‑driven mindset and a vivid imagination to mentor emerging engineers,
    craft innovative sampling strategies, and translate abstract technical challenges into practical, compliant solutions for nonprofit food producers.
  sports: Song Trujillo, an enthusiastic follower of the Cincinnati Reds, Bengals, and FC Cincinnati, spends weekends cheering at the ballpark or stadium, while maintaining personal fitness through weekly
    pickleball matches at the senior community center and gentle yoga sessions in the park.
  arts: Song Trujillo, an abstract painter inspired by Jackson Pollock’s kinetic splashes and Mark Rothko’s color fields, experiments with experimental photography à la Cindy Sherman, regularly volunteers
    for set design in the local community theater’s production of 'Our Town', and finds solace in the works of Philip Glass and the Cincinnati Symphony Orchestra.
  travel: Song Trujillo, who meticulously plans art‑focused trips, has explored the Metropolitan Museum of Art in New York, the Getty Center in Los Angeles, and the Musée d’Orsay in Paris, while dreaming
    of a future pilgrimage to Florence’s Uffizi Gallery and a scenic road‑trip along the Blue Ridge Parkway.
  culinary: Song Trujillo, an avid gardener who transforms home‑grown kale, heirloom carrots, and rosemary into herb‑infused grilled salmon and rustic quinoa bowls, delights in cooking seasonal ratatouille
    with tomatoes and zucchini, and occasionally treats themselves to a sophisticated paella with saffron and fresh mussels after a gallery opening.
  core: Song Trujillo is a meticulous, art‑driven quality‑control mentor whose boundless curiosity coexists with a habit of worry, a love of chess, and a nurturing penchant for garden‑to‑table cooking.
background:
  cultural: Song Lynn grew up in Dayton, Ohio in a predominantly white, Midwestern family with German‑Irish ancestry and a modest Catholic upbringing. After completing some college coursework in chemistry,
    she moved to Cincinnati, where she built her career in manufacturing. Her marriage to a Mexican‑American engineer introduced her to Hispanic cultural traditions, such as celebrating Día de los Muertos
    and cooking family recipes, creating a blended household that values both Midwestern pragmatism and vibrant multicultural expressions. Over the decades, she has become an active participant in Cincinnati’s
    arts community, bridging her industrial background with a love for abstract art and cultural exchange.
