personas:
  professional: Kathryn Barlow, an aspiring teen playwright and story architect, channels her boundless imagination into school drama productions and improvised skits while juggling a chaotic notebook of
    ideas that reflects her love of novelty and flexibility.
  sports: Kathryn Barlow, an enthusiastic member of her school’s hiking club who spends weekends trekking the nearby ridge trails and collecting rocks, stays active by joining after‑school intramural soccer
    while cheering on the River City FC soccer team and the hometown's minor league baseball squad.
  arts: Kathryn Barlow, a dedicated sketch artist and budding poet who curates eclectic playlists featuring indie musicians like Phoebe Bridgers and experimental bands such as Animal Collective, draws inspiration
    from visual legends like Frida Kahlo and the surreal worlds of Hayao Miyazaki, regularly performing improv scenes that blend humor with heartfelt storytelling.
  travel: Kathryn Barlow, a spontaneous teen traveler who prefers impromptu weekend getaways over meticulously planned vacations, has explored the misty waterfalls of the local state park and dreams of
    backpacking through the historic streets of Edinburgh and the vibrant markets of Marrakech.
  culinary: Kathryn Barlow, a fledgling home chef who loves assembling avocado toast topped with smoked salmon and a sprinkle of feta, often orders pepperoni pizza with extra olives on Friday nights, and
    experiments with DIY snack bars using oats, honey, and dried mango while still struggling to master the perfect boiled egg.
  core: Kathryn Barlow is a wildly imaginative, socially vibrant teen who thrives on spontaneous creativity, embraces disorder as a catalyst for new ideas, but occasionally lets the chaos cause missed deadlines
    and half‑finished projects.
background:
  cultural: Kathryn grew up in Lolo, a small town nestled in the Rocky Mountains of western Montana. Her upbringing reflects the region’s blend of independent, outdoors‑oriented values and close‑knit community
    life. Family gatherings, local fairs, and school events emphasize neighborly cooperation and a deep respect for the surrounding wilderness. While her heritage is primarily of European descent common
    to the area, she is also aware of the rich Native American history of Missoula County, which informs her appreciation for storytelling and connection to the land. At the same time, as a modern teenager,
    she is influenced by digital culture, social media, and contemporary music, giving her a hybrid cultural perspective that mixes rural Montana traditions with broader youth trends.
