  career_goals: As she looks toward the future, Kathryn envisions a career that blends her love for art, narrative, and community. She hopes to study visual arts and creative writing in college, with the
    ambition of becoming a concept artist or graphic novelist who can craft immersive worlds. She also dreams of leading youth art workshops in rural Montana, using creative projects to connect peers and
    celebrate the natural environment. Flexibility remains important to her, so she remains open to exploring related fields such as animation, game design, or environmental storytelling.
