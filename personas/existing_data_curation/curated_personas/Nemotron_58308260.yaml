  career_goals: Approaching retirement, Troy aims to leverage his decades of experience by transitioning into a mentorship and consulting role within the manufacturing sector. He plans to obtain a certified
    journeyman supervisor credential, lead small‑scale custom metalwork projects for local artisans, and eventually teach part‑time at the community college where he earned his associate degree. He also
    hopes to document his knowledge in a practical handbook for aspiring fabricators.
