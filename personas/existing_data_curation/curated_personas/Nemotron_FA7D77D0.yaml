  career_goals: Jennifer plans to complete her GED within the next two years and then pursue a certification as a veterinary technician or a community health aide. She wants to combine her love for animals
    with her desire to help people by working at a local animal rescue organization while providing educational outreach to youth about responsible pet ownership. In the longer term, she aims to enroll
    in a community-college program in animal science or public health, allowing her to work in a supportive role that balances independent tasks with occasional teamwork. Additionally, she hopes to develop
    an online resource hub for teens navigating mental-health challenges, using her digital art and writing skills to share compassionate messages.
