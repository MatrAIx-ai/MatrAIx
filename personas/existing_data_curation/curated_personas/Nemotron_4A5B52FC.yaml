  hobbies: '[''Hip‑hop dance'', ''Community volunteering'', ''Pick‑up basketball'', ''Live music concerts'', ''Cooking and recipe experimentation'', ''Photography'', ''Reading contemporary fiction'', ''Exploring
    Black literature'']'
  career_goals: Jessica aims to complete her bachelor's degree in Business Administration within the next three years while advancing within the retail sector. Her short‑term goal is to become a department
    supervisor, gaining leadership experience and overseeing staff performance. Long‑term, she aspires to a store manager position and eventually a regional management role, where she can apply her organizational
    strengths to improve operational efficiency across multiple locations. She also dreams of eventually launching her own boutique that highlights contemporary African‑American fashion designers.
