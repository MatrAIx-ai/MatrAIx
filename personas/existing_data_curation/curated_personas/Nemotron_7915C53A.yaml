  career_goals: John aims to remain self‑sufficient and preserve his historic home while expanding his personal art collection. He aspires to document the oral histories of longtime Duncan residents and
    publish a modest memoir. Enhancing his digital photography skills and showcasing his work at the local community center are also priorities. Additionally, he hopes to win a woodworking prize at the
    annual Stephens County fair, satisfying his competitive nature and love of craftsmanship.
