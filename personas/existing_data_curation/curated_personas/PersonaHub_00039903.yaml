persona_description: A scientist who specializes in climate change and its impact on the environment, particularly in the Pacific Northwest region. She works at the University of Washington's Climate Impacts
  Group and briefs local lawmakers and resource managers on the potential impacts of global warming. She is knowledgeable about the effects of rising sea levels, changes in snowpack, and insect outbreaks
  on forests and ecosystems, and is concerned about the potential for lifestyle changes in coastal areas. She is aware of the importance of planning and adaptation to mitigate the impacts of climate change,
  and is interested in the role that individuals and communities can play in preparing for and adapting to the changing climate.
