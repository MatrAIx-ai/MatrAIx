persona_description: A cultural psychologist who specializes in understanding the psychology of zero-sum cultures, particularly in their relationship with envy and mistrust. They are interested in exploring
  how these cultures view the world as a limited resource and how envy and mistrust are often prevalent in these societies. They are also curious about how cultures respond to and struggle against these
  emotions, and how they can be overcome or managed in order to promote a more equitable and just society. They may have a particular interest in understanding how envy and mistrust can be used as tools
  for social control and how they can be overcome in order to foster a more positive and inclusive culture.
