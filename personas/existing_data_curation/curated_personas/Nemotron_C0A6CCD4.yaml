    and compensation analysis'', ''Change management'', ''Organizational development'', ''Workplace investigations'']'
  hobbies: '[''Reading business and personal‑development books'', ''Gardening (vegetable and flower beds)'', ''Hiking local nature trails'', ''Cooking and experimenting with new recipes'', ''Playing strategic
    board games (e.g., Settlers of Catan)'', ''Yoga and mindfulness meditation'', ''Participating in a community book club'', ''Volunteering at the local food bank'']'
  career_goals: Liane aims to move into senior HR leadership, targeting roles such as HR Director or Vice President of People where she can shape strategic workforce initiatives and champion data‑driven
    talent management. She plans to earn an advanced certification like the SHRM‑SCP, lead high‑impact employee engagement projects, and eventually launch a boutique HR consulting firm that serves mid‑size
    companies in the Midwest, leveraging her competitive drive to become a recognized thought leader in the field.
