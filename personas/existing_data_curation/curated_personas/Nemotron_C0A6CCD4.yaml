personas:
  professional: Liane Harrison, a data‑driven HR strategist, leverages their meticulous project‑management expertise, talent‑acquisition acumen, and competitive edge to design high‑impact workforce initiatives,
    while constantly benchmarking employee‑engagement metrics to prove ROI for senior leadership.
  sports: Liane Harrison, a devoted follower of the Chicago Cubs and Chicago Bulls, joins a local Saturday‑morning hike group, logs their 5 k road‑run times with Strava, and signs up for the annual Chicago
    Marathon, balancing a competitive drive with a practical, schedule‑driven training regimen.
  arts: Liane Harrison finds creative balance by winding down to the soulful tunes of Norah Jones, the intricate storytelling of The Crown, attending live jazz nights at a downtown club, and discussing
    the works of Malcolm Gladwell and the vibrant installations of Yayoi Kusama during their community book‑club gatherings.
  travel: Liane Harrison prefers meticulously planned getaways that blend outdoor adventure with culinary exploration, having trekked the waterfalls of Yellowstone, sampled farm‑to‑table cuisine in Napa
    Valley, and curated a week‑long cultural itinerary through Copenhagen and Kyoto, while balancing professional commitments by scheduling trips during long holiday weekends.
  culinary: Liane Harrison, an enthusiastic home chef with a thriving vegetable garden, regularly crafts vibrant quinoa‑and‑roasted‑beet salads, perfects their sourdough starter for artisanal breads, experiments
    with Thai green curry using fresh basil and lemongrass, and indulges in occasional tasting menus at Chicago’s Alinea for inspiration.
  core: Liane Harrison, who blends a data‑driven, competitive streak with a curiosity for new ideas, orchestrates HR strategies like a chess game while nurturing a vegetable garden and secretly binge‑watching
    true‑crime documentaries at midnight.
background:
  cultural: Liane was raised in the Midwestern United States, near Saint Joseph, Illinois, in a small‑town environment that emphasized hard work, practicality, and community involvement. Her family heritage
    includes German and Irish ancestry, and she grew up with values typical of the region—self‑reliance, respect for tradition, and modesty—while her higher education and professional experiences have fostered
    an openness to new ideas and progressive perspectives.
