personas:
  professional: Gregory Chittenden, a 16‑year‑old high‑school student, channels his love for step‑by‑step model kits and strategic video games into a budding apprenticeship at the local auto‑shop, where
    his methodical approach and reliable execution make him a go‑to for troubleshooting routine maintenance tasks.
  sports: Gregory Chittenden, a regular attendee of Wichita high‑school football games and a season ticket holder for the Kansas City Chiefs, also participates in a structured youth basketball league at
    the local community center and maintains a disciplined home‑gym routine that mirrors the predictability he values in his hobbies.
  arts: Gregory Chittenden, who finds quiet joy in the precise craftsmanship of classic model kits, frequently listens to the orchestral scores of John Williams and the folk‑rock storytelling of John Denver,
    and attends the annual county fair’s art exhibit where he admires the detailed brushwork of regional painters.
  travel: Gregory Chittenden, who plans vacations months in advance, prefers short road trips to nearby state fairs and historic towns such as Lawrence, Kansas, but dreams of a meticulously organized summer
    road trip to the national parks of Colorado, balancing his love for routine with a touch of adventure.
  culinary: Gregory Chittenden, whose cooking skill level matches his methodical nature, enjoys following exact recipes for Kansas‑style barbecue ribs, baked mac and cheese, and homemade apple pie with
    cinnamon, while also appreciating simple meals like grilled cheese and cornbread that provide comfort after long model‑building sessions.
  core: Gregory Chittenden, a 16‑year‑old with a methodical mind, blends his love for structured hobbies, diligent budgeting, and steady health habits into a life guided by routine, reliability, and quiet
    ambition.
background:
  cultural: 'Gregory was raised in a middle‑class, Midwestern family in Wichita, Kansas. His household reflects typical small‑town values: an emphasis on self‑reliance, a strong work ethic, and involvement
    in community traditions such as county fairs, high school sports events, and local volunteer activities. His family’s European ancestry and the region’s cultural norms have instilled in him a respect
    for routine, practicality, and the importance of contributing reliably to both family and community.'
attributes:
  skills: '["Organizational planning", "Basic computer literacy", "Introductory Python coding", "Hand‑tool usage", "Strategic chess play"]'
  hobbies: '["Model kit building", "Strategy video gaming", "Chess", "Puzzle solving", "Reading nonfiction (history and engineering)", "Community clean‑up volunteering"]'
  career_goals: Gregory aims to complete his education by earning a GED and then enroll in a vocational program focused on automotive technology or HVAC maintenance, fields that offer clear procedures and
    predictable career paths. He is drawn to roles that blend hands‑on work with systematic troubleshooting, with the long‑term ambition of becoming a certified technician and eventually a foreman who oversees
    maintenance teams. He also expresses a tentative interest in studying industrial engineering to further apply his organizational strengths to larger‑scale processes.
