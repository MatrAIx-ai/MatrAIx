  to enhance their learning experience. They are interested in the preservation of biodiversity and the importance of sustainable practices. They are also interested in the role of human actions in the
  loss of habitats and the impact of climate change. They are looking for workshops and materials that can help them learn and understand these concepts in a fun and engaging way.
