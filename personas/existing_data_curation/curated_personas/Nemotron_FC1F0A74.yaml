  hobbies: '[''building scale model aircraft'', ''gardening'', ''hiking coastal trails'', ''reading aviation history'', ''learning drone piloting'', ''yoga for stress relief'', ''volunteering at local air
    museum'']'
  career_goals: Looking ahead, Ana hopes to transition from full‑time shop work to a mentorship and consulting role where she can share her practical expertise with the next generation of mechanics, especially
    women and underrepresented groups. She aims to obtain an FAA Airframe & Powerplant (A&P) certification if not already held, and to become a recognized specialist in electric and hybrid aircraft maintenance
    as the industry shifts toward greener propulsion. Eventually she would like to open a small, community‑focused maintenance boutique that emphasizes hands‑on training, flexible scheduling, and a low‑stress
    work environment that reflects her own values.
