  career_goals: Michelle aims to leverage her practical curiosity and disciplined work ethic into a career in operations or project management within the hospitality or nonprofit sector in Sarasota. She
    plans to complete a bachelor’s degree in Business Administration within the next two years, earn a certified Associate Project Manager credential, and secure an entry‑level manager role where she can
    streamline processes, improve service delivery, and lead small teams. Long‑term, she aspires to become a senior operations manager or director, driving strategic initiatives while maintaining a balance
    between innovative ideas and proven methods.
