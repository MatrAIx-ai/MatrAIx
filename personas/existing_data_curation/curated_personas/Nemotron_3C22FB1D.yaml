personas:
  professional: An organized and curiosity‑driven operations enthusiast, Michelle Costa, they leverage their associate’s degree in Business Administration, advanced Excel budgeting skills, and volunteer
    event‑planning experience to streamline processes in Sarasota’s hospitality nonprofits while assertively guiding small teams and constantly seeking practical improvements.
  sports: A summertime beach‑volleyball enthusiast and member of the Sarasota Mangrove Kayak Club, Michelle Costa, they root for the Tampa Bay Buccaneers and Tampa Bay Lightning, fit yoga sessions into
    their schedule, and schedule weekly kayaking trips to stay fit while balancing a demanding study load.
  arts: An avid reader of Sally Rooney and weekend photographer inspired by Annie Leibovitz, Michelle Costa, they enjoy attending performances at the Sarasota Opera, streaming Norah Jones while cooking,
    and quoting Lin‑Manuel Miranda in journal entries, letting the arts shape their creative outlook.
  travel: A budget‑savvy explorer, Michelle Costa, they have kayaked through the mangroves of Sarasota, backpacked in the Bahamian islands, wandered the Gothic Quarter of Barcelona, and dream of sailing
    along the Greek islands, preferring itineraries that blend adventure with sunset beach picnics.
  culinary: A self‑taught home chef, Michelle Costa, they experiment with Spaghetti alle Vongole, grilled sea bass with lemon‑herb butter, and saffron paella, pairing each with crisp Vermentino, and regularly
    host intimate dinner parties for friends, though they occasionally over‑salt the sauce when stressed.
  core: Michelle Costa, they are a meticulously organized 21‑year‑old who balances a love for Mediterranean flavors, anxiety‑driven journaling, and a drive to streamline hospitality operations, all while
    juggling yoga, beach adventures, and occasional impulsive splurges.
background:
  cultural: Michelle’s family traces its roots to Southern Italy and Portugal, reflected in the surname Costa and the family’s tradition of Saturday family meals featuring pasta, seafood, and wine. Raised
    in Sarasota, she grew up with a blend of coastal Floridian lifestyle and Mediterranean hospitality values—emphasizing close‑knit family bonds, respect for elders, and a love for food and celebration.
    She observes Catholic holidays such as Easter and Christmas with extended family gatherings, mixing traditional rituals with local customs like beach picnics. This cultural mix informs her appreciation
    for community, organized celebrations, and a warm, inclusive approach to relationships.
