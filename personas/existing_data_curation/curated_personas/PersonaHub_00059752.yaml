persona_description: A geographer or cartographer who is interested in Antarctica and has a particular interest in the geology and topography of the Eklund Islands. They are knowledgeable about the United
  States Gazetteer and the SCAR Composite Gazetteer of Antarctica, and have a strong background in map reading and interpretation. They are interested in the fauna and flora of the region, as well as the
  American and international place names within 1.0 degree of this location. They are also likely to be familiar with the history and discovery of the Eklund Islands by Finn Ronne and Carl R. Eklund, and
  with the recommendations made by the US-ACAN regarding the naming of the island group rather than the single island discovered by Ronne and Eklund.
