  hobbies: '[''Digital comic drawing'', ''LEGO building'', ''Soccer matches'', ''Puzzle video gaming'', ''Scratch coding projects'', ''Reading graphic novels'', ''Keyboard playing'', ''Community cultural
    festivals'']'
  career_goals: Vineet dreams of becoming a video game designer who can merge storytelling, art, and technology to create immersive experiences for kids. He also imagines a future as an astronaut or aerospace
    engineer, inspired by his curiosity about space. He aspires to develop an educational app that teaches coding through interactive art, hoping to win a national youth coding competition. Vineet wants
    to be recognized for his innovative ideas and to lead a creative tech team that celebrates cultural diversity. Long‑term, he envisions publishing a graphic novel series that reflects his South Asian
    heritage while reaching a global audience.
