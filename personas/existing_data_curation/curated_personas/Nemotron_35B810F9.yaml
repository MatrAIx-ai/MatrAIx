  career_goals: Manuel aims to advance from his current line‑cook position to sous chef and ultimately executive chef at a high‑profile San Diego restaurant known for modern Mexican cuisine. In the next
    five years he plans to earn a Certified Culinarian credential and enroll in a culinary arts program to formalize his knowledge. His long‑term dream is to open a family‑run Mexican‑fusion taqueria or
    food truck that showcases his signature sauces and celebrates his cultural heritage. He also hopes to mentor young cooks from the local community and host cooking workshops that blend traditional recipes
    with contemporary techniques.
