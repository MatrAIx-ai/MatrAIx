personas:
  professional: Lazaro Ardila is a veteran finance leader with over three decades of experience in corporate budgeting, cash flow optimization, and risk assessment, proficient in SAP FICO, Oracle Hyperion,
    and Tableau, who combines rigorous analytical discipline with a collaborative, warm approach to cross‑border financial strategy and is actively steering his organization toward digital finance transformation
    and ESG integration.
  sports: Lazaro Ardila plays forward for the Lake Mary Strikers in a local amateur soccer league, dances salsa three nights a week for cardio, rows a kayak on the nearby lakes each Saturday, and holds
    a membership at the Orlando Country Club where he regularly joins the senior golf league, cheering on the Orlando Magic during NBA season and the Tampa Bay Rays during baseball season.
  arts: Lazaro Ardila immerses himself in the rhythmic beats of cumbia and vallenato, often listening to legends like Joe Arroyo and Carlos Vives while cooking, and attends monthly salsa performances featuring
    dancers like Carlos "El Gallo" Sanchez, while also appreciating the visual arts through visits to the Orlando Museum of Art and the classic films of director Alejandro González Iñárritu.
  travel: Lazaro Ardila plans his travel with a mix of meticulous budgeting and spontaneous adventure, regularly flying to a South American nation to visit his extended family in the bustling capital and
    historic coastal towns, while also taking short road trips to the Florida Keys for kayaking, and indulging in culture‑rich tours of Barcelona and New Orleans, balancing family obligations with a desire
    for new culinary and musical experiences.
  culinary: Lazaro Ardila is an enthusiastic home chef who perfects traditional dishes like ajiaco, empanadas filled with shredded chicken and potatoes, and hazelnut arequipe, skillfully using ingredients
    such as guasca, plantains, and fresh cilantro, and often pairs his meals with a glass of crisp white wine while entertaining friends on the patio.
  core: Lazaro Ardila, a 55‑year‑old finance veteran with a love for soccer, salsa, and sustainable investing, blends disciplined professionalism with a warm, sociable spirit that sometimes leads to late‑night
    karaoke sessions and occasional budget‑friendly splurges on gourmet ingredients.
background:
  cultural: Lazaro is a first‑generation Colombian‑American who grew up in a bilingual household that valued family, tradition, and hard work. He retains strong ties to Colombian culture through language,
    music (cumbia, vallenato), and cuisine, and celebrates holidays such as Día de la Independencia and Christmas with both Colombian and American customs. His heritage informs his collaborative, warm approach
    to relationships and his appreciation for communal gatherings, while his experience living in Florida has blended Southern hospitality with his Latin roots, creating a multicultural perspective that
    enriches both his professional and personal life.
attributes:
  skills: '["Corporate budgeting", "Financial reporting", "Cash flow optimization", "Risk assessment", "Strategic planning", "SAP FICO", "Oracle Hyperion", "QuickBooks Enterprise", "Excel advanced analytics",
    "Tableau", "Power BI", "US GAAP compliance", "SOX internal controls", "Cross-border finance", "Negotiation", "Spanish fluency"]'
  hobbies: '["Soccer", "Salsa dancing", "Cooking Colombian cuisine", "Community gardening", "Kayaking", "Golf", "Reading tech/finance publications", "Traveling to Colombia", "Financial literacy volunteering"]'
  career_goals: Lazaro aims to transition into a senior executive role such as Chief Financial Officer within the next five years, focusing on driving digital transformation of finance functions and integrating
    ESG (environmental, social, governance) metrics into the company's financial strategy. He also aspires to mentor the next generation of finance professionals, particularly those from Hispanic backgrounds,
    and eventually launch a boutique consultancy that helps mid‑size firms navigate cross‑border financial regulations and sustainable investment opportunities.
