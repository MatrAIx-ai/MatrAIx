personas:
  professional: Mitchell Normand, a seasoned painter and paperhanger with over twenty years of expertise in low‑VOC surface finishes, precise faux‑finish techniques, and meticulous color theory, translates
    their calm, compassionate, and curiosity‑driven nature into a boutique contracting venture that merges sustainable craftsmanship with community‑focused artistic installations.
  sports: Mitchell Normand stays fit through weekly hikes with the Huron Trailblazers Hiking Club, a light regimen of resistance bands, and cheering for the Detroit Lions, Michigan Wolverines, and Grand
    Rapids Griffins, they find that community sports gatherings provide a gentle social outlet without draining their quiet reserves.
  arts: Mitchell Normand expresses a quiet yet rich artistic sensibility by painting lakeshore scenes inspired by the impressionist light of Claude Monet and the bold palettes of Georgia O’Keeffe, strumming
    folk blues of Bob Dylan on an acoustic guitar, and attending local gallery openings featuring muralists like Tomory Harte, they let these influences fuel both their fine‑art portfolio and client projects.
  travel: Mitchell Normand prefers low‑key road trips that blend serenity with discovery, often exploring Michigan’s Upper Peninsula—such as Isle Royale’s rugged shorelines and Door County’s historic lighthouses—while
    dreaming of a summer retreat in Scotland’s glacial lochs, they budget these trips carefully to preserve capital for their emerging business.
  culinary: Mitchell Normand delights in simple farm‑to‑table cooking, regularly preparing roasted beet‑goat cheese salads, pan‑seared trout with lemon‑dill butter, and quinoa bowls seasoned with rosemary,
    basil, and garden‑grown tomatoes, they also indulge on occasion in a slice of locally baked cherry pie from a county fair bakery.
  core: Mitchell Normand is a calm, detail‑obsessed painter who finds solace in solitary art, patient teaching, and nature walks, yet they habitually leave brushes drying on the workbench and collect unfinished
    canvases like treasured trophies.
background:
  cultural: Mitchell grew up in a small, close‑knit community in central Michigan, where values of self‑reliance, modesty and neighborly cooperation are deeply rooted. His ancestry traces back to English
    and French‑Canadian settlers who arrived in the Upper Midwest during the late 19th century, instilling an appreciation for hard work and craftsmanship. The region’s connection to the Great Lakes and
    its seasonal rhythms have shaped his respect for nature, reflected in his love of outdoor pursuits and sustainable practices. Local traditions such as county fairs, community potlucks, and support for
    local churches reinforce a cultural identity that balances individual independence with collective responsibility. This Midwestern heritage informs his quiet demeanor, compassionate outlook, and dedication
    to enhancing his surroundings through skilled trade work.
attributes:
  skills: '["Surface preparation and repair", "Interior and exterior paint application", "Wallpaper installation and pattern matching", "Color mixing and theory", "Faux finish techniques (rag rolling, stippling,
    trompe l''oeil)", "Eco-friendly paint selection and application", "OSHA safety compliance", "Project planning and scheduling", "Client consultation and design advisory", "Mentoring apprentices and teaching
    trade skills", "Basic carpentry and drywall repair", "Equipment maintenance and tool selection", "Problem solving for complex surfaces"]'
  hobbies: '["Watercolor and acrylic painting", "Reading art history and design books", "Hiking and nature walks", "Birdwatching", "Landscape photography", "Playing acoustic guitar", "Maintaining a vegetable
    garden", "Restoring vintage paint tools", "Volunteer workshops at senior center", "Attending regional art exhibitions", "Exploring eco-friendly painting techniques", "Meditation and mindfulness practice"]'
  career_goals: Mitchell aims to transition his solo practice into a boutique contracting business known for sustainable finishes and tailored artistic installations. He plans to earn certification in green
    building practices and expand his service offering to include custom murals for schools, churches, and community centers. By securing contracts for historic preservation and community beautification
    projects, he hopes to create a lasting impact on his region while ensuring a stable income for retirement. Mitchell also wishes to develop a personal portfolio of fine‑art works, exhibit occasionally
    at regional galleries, and continue mentoring a new generation of painters, blending his compassion with his love for craft.
