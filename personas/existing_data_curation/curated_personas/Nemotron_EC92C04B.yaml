  hobbies: '[''Reading science‑fiction books'', ''Building LEGO sets'', ''Exploring local nature trails and collecting insects'', ''Playing soccer with a small group of friends'', ''Sketching wildlife and
    nature scenes'', ''Learning basic coding with Scratch'', ''Helping in the kitchen to prepare Mexican dishes'', ''Listening to Mexican folk music'']'
  career_goals: Luis dreams of a future where he can combine his love for nature, his knack for problem‑solving, and his desire to help people. He often talks about becoming a wildlife biologist who studies
    animals in their habitats and works on protecting ecosystems, especially the ones near his hometown in Georgia. He also imagines teaching younger children, perhaps in a bilingual setting, so he can
    share his knowledge of science and Spanish. Ultimately, Luis hopes to pursue a career that lets him use his curiosity and practicality to make a positive, tangible impact on both people and the environment.
