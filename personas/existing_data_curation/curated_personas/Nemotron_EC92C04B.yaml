personas:
  professional: Luis Rios is an aspiring junior coder who uses Scratch to create interactive science‑fiction stories, carefully mapping each block like a miniature project plan, which reflects their blend
    of curiosity and practicality, and they often double‑check their code for bugs, worrying about every detail.
  sports: Luis Rios plays midfield for the Hall County Youth Soccer League’s “Ridge Runners,” enjoys cheering on Atlanta United on weekends, and they supplement team practice with solo jogs along nearby
    nature trails, balancing their love for collaborative play with a need for quiet exercise to manage stress.
  arts: Luis Rios spends afternoons sketching detailed birds and insects observed on local trails, builds elaborate LEGO spacecraft while listening to Mexican folk music from artists like Lila Downs, and
    they devour science‑fiction novels by Isaac Asimov, merging artistic precision with a vivid imagination.
  travel: Luis Rios prefers family road trips to nearby state parks such as Tallulah Gorge, dreams of visiting the ancient ruins of Teotihuacan, and they meticulously plan each itinerary with scheduled
    snack breaks and rest stops to ease their nervousness about unfamiliar places.
  culinary: Luis Rios loves assisting in the kitchen by preparing tacos with seasoned ground beef, fresh cilantro, diced tomatoes, and homemade guacamole made from ripe avocados, and they take pride in
    whisking salsa verde and assembling quesadillas, showing both enthusiasm for traditional flavors and a growing culinary confidence.
  core: Luis Rios is a curious, detail‑obsessive 9‑year‑old who builds LEGO galaxies, sketches wildlife, codes interactive tales, worries about every plan, and they find calm in family cooking and the rhythmic
    beats of folk music.
background:
  cultural: Luis comes from a Mexican‑American family that values both its cultural roots and its new community in Gainesville, Georgia. At home, Spanish is spoken alongside English, and he often helps
    translate for his grandparents. The family celebrates Mexican holidays such as Día de los Muertos and Mexican Independence Day, preparing traditional foods like tamales and pozole, while also participating
    in local Southern events like the Hall County fair. Luis’s parents encourage him to stay connected to his heritage through music, dance, and stories, and they support his involvement in a bilingual
    after‑school program that blends his cultural identity with his school curriculum.
