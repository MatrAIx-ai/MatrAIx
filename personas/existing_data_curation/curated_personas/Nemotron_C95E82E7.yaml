personas:
  professional: Ivan Camacho is a budding junior architect at age four, channeling relentless curiosity into building elaborate block cities, delighting in unconventional designs, and they revel in the
    freedom to rearrange their creations without concern for strict order.
  sports: Ivan Camacho loves kicking a soccer ball with the Little Lions youth club, proudly wearing a miniature jersey of the city’s NBA team, the Thunder, and spends energetic afternoons splashing in
    the community pool’s kids’ swim lessons, reflecting a blend of team spirit and fearless enthusiasm.
  arts: Ivan Camacho spends Saturday mornings with crayons, drawing whimsical creatures inspired by Dr. Seuss illustrations while humming songs by children’s musician Raffi, and they eagerly attend the
    local children’s museum’s interactive art workshops featuring Van Gogh’s Sunflowers reproduced in finger‑painting.
  travel: Ivan Camacho enjoys weekend trips to the nearby beach town of Santa Cruz where they build sandcastles, dreams of visiting the magical Disneyland after spotting it in family photo albums, and eagerly
    looks forward to a future family road trip to the Grand Canyon.
  culinary: Ivan Camacho delights in crunchy apple slices with peanut butter, prefers creamy mac and cheese for dinner, and loves helping stir batter for blueberry pancakes during Sunday pancake breakfasts,
    often requesting a sprinkle of cinnamon on their oatmeal.
  core: Ivan Camacho is a curious, slightly disorganized four‑year‑old who balances boundless imagination with occasional worries, thriving on art, play, and the comfort of familiar routines.
background:
  cultural: Ivan is a Mexican-American child raised in a bilingual home in Dallas, Texas. At home, Spanish is spoken alongside English, and his family celebrates Mexican traditions such as Dia de los Muertos,
    birthdays with piñatas, and special meals like tacos and tamales. He is exposed to a mix of Mexican folk music and contemporary children's songs, and he enjoys both Texan and Mexican foods. The diverse
    Dallas community and his family's cultural practices give him a strong sense of belonging to both his Mexican heritage and the broader American environment, shaping his appreciation for art, music,
    and community gatherings.
