  career_goals: Even at four, Ivan dreams big. He often talks about becoming an astronaut who can explore the stars, an artist who paints giant murals, and a soccer player who scores goals for his favorite
    local team. He also imagines helping others as a teacher or a firefighter, inspired by stories he hears at home. These ambitions reflect his curiosity about the world, love of art, and desire to try
    new experiences while staying close to his family.
