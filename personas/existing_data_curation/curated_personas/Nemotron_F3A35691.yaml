  hobbies: '["sketching and drawing", "visiting museums and galleries", "photography (urban landscapes)", "listening to indie and Latin alternative music", "reading graphic novels", "cooking traditional
    Mexican dishes", "hiking the Bay Trail with friends", "participating in a community art club"]'
  career_goals: Belkis aspires to attend a community college in the Bay Area to study graphic design and visual communication, building a professional portfolio that blends her cultural heritage with contemporary
    digital art. She aims to freelance as an illustrator for children's books and community organizations, and eventually work as a visual designer for a nonprofit focused on arts education. She also hopes
    to mentor younger Latino youth interested in the arts.
