personas:
  professional: Belkis Escamilla, an aspiring graphic designer and visual communicator, leverages Procreate, Photoshop, and beginner web design skills to merge digital illustration with cultural storytelling,
    channeling their curiosity and organized yet flexible work style into freelance commissions for children's books and community nonprofits.
  sports: Belkis Escamilla enjoys weekend hikes along the Bay Trail with a close circle of friends, follows the San Francisco Giants and Golden State Warriors, and participates in a community skateboarding
    club that satisfies their love for urban movement and occasional cardio bursts.
  arts: Belkis Escamilla immerses herself in sketching portraits, photographing urban landscapes, and studying works by Frida Kahlo, Banksy, and Diego Rivera, while their playlists feature indie bands like
    Tame Impala and Latin‑alternative group Café Tacvba, and they draw inspiration from graphic novels such as 'Persepolis' and 'Saga.'
  travel: Belkis Escamilla dreams of exploring the vibrant street art of Barcelona, the historic museums of Washington, D.C., and the coastal cliffs of Big Sur, while they often weekend‑trip to nearby Napa
    Valley and Santa Cruz, balancing school constraints with a modest travel fund set aside from their savings.
  culinary: Belkis Escamilla experiments with family recipes like corn‑masa based tamales and chipotle‑infused stews, sharpening their cooking skills through weekend kitchen sessions that blend traditional
    flavors with fresh cilantro, lime, and roasted chiles, while also enjoying indie café pastries and craft sodas.
  core: Belkis Escamilla is a curious, organized teen who transforms city walks into sketchbooks, balances school with late‑night art projects, and habitually procrastinates by scrolling through indie playlists
    before hitting the pillow.
background:
  cultural: Belkis is a second‑generation Mexican‑American from San Mateo, California. Raised in a bilingual household, she grew up speaking both Spanish and English, celebrating traditions such as Día
    de los Muertos, family gatherings centered around food, and community festivals. Her cultural heritage informs her artistic sensibility, evident in her use of vibrant colors, folklore motifs, and storytelling.
    Living in the diverse Bay Area, she blends these roots with exposure to contemporary art scenes, fostering a hybrid cultural identity that values family, community service, and creative expression.
attributes:
  skills: '["digital illustration (Procreate, Photoshop)", "photography (composition, editing)", "basic HTML/CSS web design", "Spanish-English translation", "small event organization", "creative writing",
