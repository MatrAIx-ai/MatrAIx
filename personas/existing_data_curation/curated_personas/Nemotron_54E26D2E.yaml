personas:
  professional: Frank Evans is a dedicated Helena taxi driver who leverages deep knowledge of the city’s street layout, strong vehicle‑maintenance skills, and calm customer‑service demeanor to deliver reliable
    rides, while their preference for structure and predictability fuels an ambition to become a fleet manager and eventually influence municipal transportation planning.
  sports: Frank Evans spends weekends hiking the Gallatin Trail, fishing for trout at Helena Reservoir, and duck hunting in the fall, while cheering for the Helena Brewers baseball team and participating
    in a local recreational basketball league, reflecting a blend of solitary outdoor pursuits and communal sports fandom.
  arts: Frank Evans finds creative release listening to country‑rock icons like Chris Stapleton, Willie Nelson, and The Avett Brothers while restoring a 1970s Chevrolet Impala, and they unwind with mystery
    novels by Tana French and documentaries on Montana’s mining history, which together shape their appreciation for storytelling and Americana.
  travel: Frank Evans prefers self‑planned road trips that combine scenic drives with outdoor activities, having explored Yellowstone and Glacier National Parks by car and eyeing the Pacific Coast Highway
    for a future cross‑country adventure, while budget constraints keep their journeys largely within the Mountain West region.
  culinary: Frank Evans favors hearty western fare such as grilled trout almondine, bison chili, elk stew, and classic diner burgers, cooking most meals at home with modest skill, yet they indulge in weekend
    bar‑becues where they experiment with spice rubs on pork ribs and smoked duck.
  core: Frank Evans is a methodical, stress‑aware taxi driver who balances a love for classic cars, quiet outdoor pursuits, and meticulous budgeting, all while wrestling with occasional overthinking and
    a penchant for late‑night mystery novels.
background:
  cultural: Frank comes from a white, multi-generational Montana family with roots in farming and small-town trades that value self-reliance, hard work, and community support. Growing up in Helena, he was
    immersed in the state's frontier ethos, where respect for the outdoors and a modest, down-to-earth lifestyle are central. His cultural identity includes a blend of traditional Mid-Western values—such
    as punctuality, modesty, and a preference for practical solutions—with a contemporary appreciation for local heritage, like attending county fairs and supporting regional music. While not strongly religious,
    he was raised attending a local Protestant church, which reinforced a sense of communal responsibility and neighborly help. This background informs his practical approach to work, his respect for routine,
    and his desire to contribute positively to his community.
