  career_goals: Frank aims to transition from a solo driver to a supervisory role within the local taxi cooperative, eventually becoming a fleet manager who schedules drivers, oversees vehicle upkeep, and
    implements safety protocols. He is considering completing his associate degree in Transportation Management to qualify for a municipal transportation planning position, where he could influence city
    traffic policy and improve public transit options in Helena. In the longer term, he hopes to own a small fleet of eco-friendly vehicles, either as a private contractor for rideshare services or as a
    community-focused taxi service that offers stable hours for local workers. Achieving these goals would give him more predictable income, greater job security, and the ability to shape a work environment
    that reduces stress for himself and his colleagues.
