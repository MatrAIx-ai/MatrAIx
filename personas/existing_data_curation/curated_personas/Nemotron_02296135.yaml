personas:
  professional: Eric Soles, a 44‑year‑old library science specialist with a STEM bachelor’s degree, blends digital curation, metadata wizardry, and Python‑driven analytics to design inclusive, technology‑infused
    exhibitions while championing community programming, grant writing, and mentorship in a curious, organized yet flexible manner.
  sports: Eric Soles, an avid runner who logs weekly 5K miles with the Toledo Running Club, follows the Toledo Mud Hens and Ohio State Buckeyes with seasonal enthusiasm, and joins a mid‑week adult basketball
    league at the local YMCA, approaches fitness with a mix of disciplined training and social camaraderie, using their energetic disposition to stay motivated.
  arts: Eric Soles, a dedicated percussionist in a community jazz ensemble who grooves to Miles Davis, Kamasi Washington, and The Roots, regularly attends live jazz, blues, and hip‑hop shows at local venues,
    immerses themselves in speculative fiction titles like 'Saga' and graphic novels such as 'Sandman', and fuels their social evenings with board‑game classics like 'Settlers of Catan' and trivia contests,
    weaving artistic appreciation into every facet of their life.
  travel: Eric Soles, a weekend‑road‑trip enthusiast who meticulously plans itineraries yet embraces spontaneous detours, has explored the Upper Peninsula’s rugged shoreline, savored gumbo and live jazz
    in New Orleans, photographed the Art Deco skyline of Chicago, and dreams of a cultural immersion tour of Ghana’s historic sites, balancing an adventurous spirit with budget‑conscious travel choices.
  culinary: Eric Soles, an intermediate home chef who experiments with soulful Southern dishes such as shrimp‑and‑grits, jambalaya, and fried chicken seasoned with smoked paprika, pairs these with Midwest
    staples like Lake Erie perch and Ohio‑grown sweet potatoes, and delights in sourcing fresh herbs and hot sauces to elevate each plate, while occasionally treating friends to a potluck of creative comfort
    food.
  core: Eric Soles, a 44‑year‑old library‑tech hybrid who blends curiosity‑driven digital curation with a drum‑beat enthusiasm for community, runs, and Southern cooking, yet can’t resist an occasional late‑night
    impulse purchase of a new camera lens.
background:
  cultural: Eric’s cultural background is rooted in African‑American heritage. Raised in Toledo’s historic Old West End, he grew up surrounded by church gospel music, storytelling, and a strong sense of
    community activism. His family traces its lineage to the Great Migration from the Southern United States, bringing traditions of resilience, oral history, and pride in Black culture. Eric actively engages
    with local Black cultural institutions, incorporates African‑American literature, music, and visual art into his professional programming, and advocates for inclusive representation in library collections
    and community events.
attributes:
  skills: '[''Cataloging and metadata management'', ''Digital preservation and digitization'', ''Data analysis using Python and R'', ''SQL database administration'', ''Instructional design for information
    literacy'', ''Public programming and event coordination'', ''Grant writing'', ''Community outreach and partnership building'', ''Art exhibition curation'', ''Leadership and team collaboration'']'
  hobbies: '[''Playing percussion in a jazz band'', ''Urban and nature photography'', ''Attending live music concerts (jazz, blues, hip‑hop)'', ''Mentoring middle‑school STEM clubs'', ''Volunteering at
    the African‑American Cultural Center'', ''Running in local 5K races'', ''Cooking Southern soul‑food recipes'', ''Reading speculative fiction and graphic novels'', ''Participating in board‑game nights'',
    ''Competing in trivia contests'']'
  career_goals: Eric aims to advance to a senior leadership role within the Toledo public library system, overseeing special collections and spearheading a citywide digital archive that foregrounds African‑American
    histories and other underrepresented voices. He plans to secure multi‑year grant funding to integrate immersive technologies such as AR and VR into public programs, launch interdisciplinary initiatives
    that connect STEM learning with the arts, and pursue a Master of Library and Information Science to deepen his expertise. Eric also hopes to mentor emerging librarians from diverse backgrounds and become
    a recognized advocate for inclusive collection development.
