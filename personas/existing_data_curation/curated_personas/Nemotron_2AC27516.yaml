  career_goals: Urania aims to formally certify her caregiving expertise by completing a Certified Nursing Assistant (CNA) program and eventually earning a Licensed Practical Nurse (LPN) credential. She
    hopes to transition into a supervisory role within her agency, where she can mentor younger aides and implement standardized care protocols. Long‑term, she envisions launching a small, community‑focused
    home‑care business that emphasizes structured, high‑quality services for seniors in Prince George’s County. She also wants to develop a quarterly workshop series on elder‑care best practices for African‑American
    families, leveraging her competitive drive to become a recognized leader in local senior‑care advocacy.
