personas:
  professional: Urania Jackson, a seasoned personal care aide in Prince George’s County, leverages their meticulous documentation, structured care plans, and competitive drive to deliver reliable hygiene
    and mobility support while training new aides and preparing for CNA certification and future supervisory roles.
  sports: Urania Jackson, who enjoys strolling the Oxon Hill trails for low‑impact cardio, follows the Washington Commanders and Washington Nationals with avid fandom, participates in a senior bowling league
    at the local community center, and they treat bridge tournaments as a mental sport.
  arts: Urania Jackson, finding creative fulfillment in their weekly gospel choir where they harmonize alongside classics by Mahalia Jackson and Aretha Franklin, also quilts intricate patterns inspired
    by historical fiction narratives, and they regularly read works by authors such as Toni Morrison and Alex Haley, all of which shape their artistic identity.
  travel: Urania Jackson, preferring purposeful travel, often plans weekend trips to historic sites like Colonial Williamsburg and the Smithsonian National Museum of American History, while dreaming of
    a cultural pilgrimage to Accra, Ghana, and a leisurely Caribbean cruise to unwind after community workshops, and they prioritize visits that blend education with relaxation.
  culinary: Urania Jackson, delighted in cooking soulful dishes such as collard greens seasoned with smoked turkey, sweet potato pie, and fried catfish, skillfully combines fresh herbs from their Maryland
    garden with traditional spices, and they frequently host family meals where the aroma of cornbread and mac & cheese becomes the centerpiece.
  core: Urania Jackson blends a competitive, structure‑driven caregiving ethos with a love for garden‑grown comfort food, gospel harmonies, and meticulous budgeting, and they balance occasional stubbornness
    with a warm, community‑centered spirit.
background:
  cultural: Urania is a Black woman raised in the Washington, D.C. metropolitan area, with deep ties to the African‑American community of Prince George’s County. Her upbringing was shaped by church involvement,
    family gatherings, and the rich cultural heritage of the region, including celebrations of Juneteenth and participation in local heritage festivals. She values intergenerational solidarity and draws
    strength from the resilience of her ancestors, which informs her practical, structured approach to caregiving. Her cultural identity influences her culinary preferences, music tastes, and commitment
    to community service, and it guides her desire to mentor younger caregivers and advocate for culturally sensitive elder‑care policies.
