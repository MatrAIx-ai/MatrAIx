personas:
  professional: Bryan Saad is a seasoned construction laborer who excels at operating heavy equipment, interpreting blueprints, and enforcing OSHA safety standards, leveraging his organized, methodical
    nature and competitive streak to keep projects on schedule and win regional quality awards.
  sports: Bryan Saad spends his summers fishing for trout in the Anaconda River and playing pickup basketball with the Whitehall Wildcats, joins the local hunting club for elk season, rides his snowmobile
    with the Montana Snow Riders in winter, and avidly follows the Denver Broncos and Seattle Seahawks.
  arts: Bryan Saad relaxes to classic rock legends like Bruce Springsteen and country icons like Johnny Cash while carving custom wooden furniture inspired by rustic folk art, and occasionally attends the
    Whitehall community fair to watch local musicians and theater troupes.
  travel: Bryan Saad prefers road‑trip adventures that blend work and play, having driven the scenic byways to Yellowstone and the Canadian Rockies, and dreams of a summer cabin retreat in Banff, yet he
    plans trips around the school year to avoid missing his construction certification courses.
  culinary: Bryan Saad enjoys hearty meals such as cedar‑plank trout, elk stew with root vegetables, and bison burgers topped with caramelized onions, cooking with a well‑worn cast‑iron skillet and savoring
    the occasional fish‑and‑chips night at the local diner.
  core: Bryan Saad is a pragmatic, competition‑driven handyman who balances rugged outdoor pursuits with meticulous project planning, but can’t resist a late‑night pizza and a stubborn habit of over‑checking
    blueprints.
background:
  cultural: Bryan’s cultural background is rooted in the rural, Northwestern American tradition of Montana’s small‑town communities. He comes from a family of Northern‑European (German‑Scandinavian) descent
    that settled in the Whitehall region during the early 20th century mining and ranching boom. The local culture emphasizes self‑reliance, hard work, and a pragmatic approach to problem‑solving—values
    that reinforce his organized and methodical personality. Community life revolves around county fairs, high‑school sports, and seasonal outdoor activities, providing a backdrop of rugged individualism
    balanced by a strong sense of neighborly duty. His marriage and involvement in a local church reflect the region’s focus on family and modest social gatherings, while his competitive streak aligns with
    the frontier ethos of striving for personal achievement.
attributes:
  skills: '["Heavy equipment operation", "Blueprint reading", "OSHA safety compliance", "Site logistics management", "Carpentry and framing", "Basic welding", "Concrete finishing", "Cost estimation", "Project
