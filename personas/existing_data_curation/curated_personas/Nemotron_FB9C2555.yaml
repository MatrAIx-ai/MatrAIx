  hobbies: '["Trout fishing in the Anaconda River", "Elk hunting", "Hiking in the Rocky Mountains", "Snowmobiling", "DIY home improvement projects", "Woodworking and custom furniture making", "Restoring
    a vintage 1965 Chevrolet pickup", "Listening to classic rock and country music", "Attending local rodeos and community fairs", "Reading trade magazines about construction technology", "Exploring local
    mining history and museums"]'
  career_goals: Bryan aims to advance from laborer to foreman within the next three years, leveraging his organizational skills and safety knowledge to lead crews on larger residential projects. He plans
    to complete an associate degree in construction management and obtain a state contractor’s license so he can eventually launch his own small general‑contracting firm focused on energy‑efficient homes
    in Whitehall and surrounding communities. He also wants to earn specialized certifications in green building practices and to be recognized in regional construction competitions for quality workmanship
    and innovative problem‑solving.
