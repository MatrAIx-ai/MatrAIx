  career_goals: Although retired from formal employment, Vivian aims to deepen her impact on her community. She plans to lead a weekly cooking class that preserves Mexican culinary traditions, mentor younger
    volunteers at the senior center, advocate for improved senior services in Sacramento, and become proficient with digital tools such as video calling and online banking to stay connected with her extended
    family.
