  hobbies: '[''Visiting art galleries and museums'', ''Amateur photography and sketching'', ''Reading modern art and philosophy books'', ''Playing chess'', ''Gardening (herbs and vegetables)'', ''Cooking
    traditional South Asian dishes'', ''Volunteer teaching basic data‑analysis'', ''Listening to classical Indian music'', ''Exploring DIY electronics projects'', ''Attending small cultural gatherings'']'
  career_goals: Approaching retirement, Shahid aims to transition into a senior consulting role where he can share his expertise with emerging sales professionals in the scientific‑equipment sector. He
    plans to develop a mentorship program that integrates artistic thinking into technical sales, author a guide on "Artful Strategies for Technical Sales," and become a sought‑after speaker at industry
    conferences. Additionally, he seeks to expand his network into South Asian markets, serve on the board of the local cultural arts center, and secure a comfortable retirement that allows him to support
    his grandchildren’s education while remaining active in community art initiatives.
