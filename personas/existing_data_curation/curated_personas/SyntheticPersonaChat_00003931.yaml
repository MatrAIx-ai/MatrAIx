    User 1: That sounds adorable! I love dogs. I have a cat named Mittens. She''s a tabby and she''s a little bit of a diva, but I love her.

    User 2: Cats are great too! I''ve always wanted a cat, but I''m allergic to them.

    User 1: That''s too bad! Cats are so cute.

    User 2: Yeah, they are. But I''m happy with Buddy. He''s the best dog in the world.

    User 1: I''m sure he is!

    User 2: So, where do you live?

