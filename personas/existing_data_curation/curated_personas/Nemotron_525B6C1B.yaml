personas:
  professional: Hoang Nguyen, a diligent 17-year-old aspiring software developer, leverages solid computer literacy, self-taught Python skills, and meticulous organizational abilities to manage school projects
    and volunteer tech tasks, while their methodical nature and concern for reliability shape a practical, detail-oriented approach to problem-solving.
  sports: Hoang Nguyen, a member of the community's Riverside Rovers soccer club, plays midfield during weekend matches when feeling socially energized, supplements training with daily sprint drills in
    the summer, and balances the competitive spirit with a pragmatic routine of stretching and hydration to avoid injuries.
  arts: Hoang Nguyen, an avid manga sketcher and sci-fi novel enthusiast, spends evenings drawing dynamic characters inspired by classic graphic novels and draws creative energy from authors like Isaac
    Asimov and artists such as Yoshihiro Akiyama, while occasionally binge-watching anime series for visual references.
  travel: Hoang Nguyen, a meticulous planner who prefers budget-friendly itineraries, dreams of exploring Tokyo's Akihabara district and Kyoto's historic temples, has previously visited the historic Angkor
    Wat complex in Siem Reap, and saves a portion of each allowance to fund a future solo backpacking adventure across Southeast Asia.
  culinary: Hoang Nguyen, a proficient home cook who enjoys preparing aromatic broth-based noodle soups, caramelized pork with fresh herbs, and savory rice rolls, often experiments with balancing spicy,
    sweet, and sour flavors, yet occasionally overcooks rice during late-night study sessions, reflecting a love for both tradition and culinary experimentation.
  core: Hoang Nguyen, a methodical 17-year-old with a quiet curiosity, balances gaming, sketching, and community service while wrestling with occasional anxiety and a relentless need to plan everything
    down to the last detail.
background:
  cultural: Hoang is a second‑generation Vietnamese‑American raised in Torrance, California, a city with a vibrant Vietnamese community. His household maintains traditional customs such as celebrating Tet,
    preparing phở and bánh mì, and speaking Vietnamese at home, while also embracing mainstream American culture through school activities and media. He attends a local Buddhist temple where he participates
    in community festivals and volunteer work, reinforcing values of respect, harmony, and collective responsibility. This bicultural environment shapes his identity, giving him a strong sense of familial
    duty, an appreciation for both his heritage and the diverse cultural landscape of Los Angeles County.
attributes:
  skills: '["Basic computer literacy (Windows, Google Workspace)", "Introductory Python programming", "Bilingual communication (Vietnamese–English)", "Organizational planning and scheduling", "Volunteer
