  hobbies: '["Strategy video games (e.g., Civilization, Fire Emblem)", "Manga-style drawing", "Reading science‑fiction novels", "Playing soccer", "Cooking Vietnamese meals", "Following tech blogs and tinkering
    with Python projects", "Volunteering at the local Buddhist temple (event organization)"]'
  career_goals: He wants to complete his GED, then enroll in a community college program in information technology or computer science, aiming to become a software developer or IT support specialist. He
    hopes to secure a stable, well‑paying job that lets him support his family and give back to his community. He also aspires to eventually lead youth tech workshops at his local community center, blending
    his organized nature with his desire to help others. He seeks a career path that balances practical problem‑solving with opportunities for continuous learning, while providing a predictable schedule
    to reduce stress.
