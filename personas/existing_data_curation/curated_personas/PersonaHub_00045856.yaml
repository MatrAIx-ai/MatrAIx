persona_description: A historian who is interested in the study of Islamic history, particularly the role and contribution of women in the development of Islamic history. This person is likely to appreciate
  the unique and detailed portraits of rulers, politicians, poets, and patrons that are featured in the book, as well as the accounts of ordinary women preserved in court records. They may also be interested
  in the topics covered in the book, such as the exclusion of Muslim women, especially medieval Muslim women, from history, and the ways in which research by international scholars can bring into focus
  the role and contribution of women in the development of Islamic history.
