personas:
  professional: Matthew Johnson is an aspiring IT support specialist who channels his solid troubleshooting know‑how across Windows and macOS, his beginner‑level Python scripting, and his data‑analysis
    chops into clear, step‑by‑step solutions for friends and small gaming communities, thriving on structured ticket queues while occasionally scrambling due to a relaxed attitude toward deadlines.
  sports: Matthew Johnson channels his competitive edge into weekly hikes up Stone Mountain with the local Stone Mountain Hiking Club, jogging the BeltLine during cooler evenings, and shooting hoops at
    a neighborhood park, while cheering on the Atlanta Falcons in the fall, the Atlanta Hawks during basketball season, and the Atlanta Braves in the summer, preferring solo cardio and low‑key basketball
    scrimmages over organized team sports.
  arts: Matthew Johnson creates digital art in Adobe Photoshop inspired by the hyperrealistic style of Bee Bee Bee, produces ambient beats on Ableton Live that echo the textures of Aphex Twin and Daft Punk,
    and unwinds by devouring contemporary sci‑fi novels from authors like Neal Stephenson, N.K. Jemisin, and Becky Chambers, weaving these influences into occasional soundtrack‑like compositions for his
    board‑game nights.
  travel: Matthew Johnson plans trips with the same meticulous spreadsheets he uses for gaming strategies, favoring budget‑friendly road trips such as a weekend getaway to Asheville, a music‑laden stay
    in New Orleans, and a last‑minute hike in the Blue Ridges, while dreaming of an immersive solo adventure to Japan’s anime districts, an Icelandic Northern‑Lights excursion, and a backpacking trek through
    the Scottish Highlands when finances allow.
  culinary: Matthew Johnson's culinary comfort zone revolves around quick, satisfying dishes like spicy pork‑belly ramen with soft‑boiled eggs, homemade pepperoni pizza topped with fresh basil, and avocado
    toast with poached eggs, and while they can only claim beginner‑level cooking skills, they take pride in mastering the perfect sear on a steak and experimenting with ingredients like miso paste, quinoa,
    and sriracha in simple one‑pan meals.
  core: Matthew Johnson is a competitively‑wired, structure‑loving 19‑year‑old who balances solitary tech tinkering with occasional social gaming, all while juggling anxiety‑driven perfectionism and a penchant
    for last‑minute deadline scrambles.
background:
  cultural: Born and raised in the suburbs of Atlanta, Matthew’s cultural upbringing reflects a blend of Southern hospitality and a modern, tech‑savvy mindset. His family traditions include occasional gatherings
    around classic Southern dishes such as fried chicken and collard greens, while his social circles are shaped by the city’s vibrant music scene—especially indie rock and hip‑hop—and the diversity of
    the Atlanta metropolitan area. Regular attendance at local community events, like seasonal farmers’ markets and street art festivals, has given him a modest appreciation for regional arts and cuisine.
    Though he identifies as a white American, he is conscious of Atlanta’s multicultural landscape and values the inclusive, progressive aspects of the city’s culture.
attributes:
  skills: '[''Computer troubleshooting'', ''Python programming'', ''Data analysis with Excel'', ''Academic writing'', ''Graphic design (Photoshop, Canva)'', ''Productivity tools (Notion, Trello)'']'
  hobbies: '[''Strategy video gaming (Civilization, etc.)'', ''Competitive shooter gaming (Valorant)'', ''Reading sci‑fi and fantasy novels'', ''Digital art and graphic design'', ''Music production (Ableton
    Live)'', ''Hiking and jogging in Atlanta parks'', ''Raspberry Pi and electronics tinkering'', ''Small‑group board game sessions'']'
  career_goals: Matthew aims to secure a role in the technology sector that balances clear, structured responsibilities with the ability to work independently. His immediate goal is to obtain an entry‑level
    position in IT support or as a junior developer, where he can apply his troubleshooting and programming skills while receiving on‑the‑job training. In the longer term, he aspires to earn industry certifications
    such as CompTIA Network+ and Cisco CCNA, and eventually transition to a network administrator or cloud‑ops role that offers greater autonomy and predictable workflow. He also envisions building a modest
    freelance portfolio, creating simple websites or automation scripts for small businesses, giving him the flexibility to manage his own schedule and mitigate the stress of a rigid 9‑to‑5 office environment.
