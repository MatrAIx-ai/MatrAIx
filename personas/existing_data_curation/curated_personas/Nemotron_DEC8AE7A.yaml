personas:
  professional: Windy Romani, a methodical early‑childhood teacher with a biology degree, designs data‑driven STEM lesson plans, orchestrates classroom logistics with precision, and champions low‑stimulus
    learning environments while quietly positioning themselves as a future curriculum specialist.
  sports: Windy Romani enjoys quiet weekend hikes on the Connecticut River Trail, participates in the local Connecticut Trails Club’s organized walks, follows the New England Patriots for football and the
    Boston Red Sox for baseball, and occasionally joins a gentle yoga class at the community center to stay limber.
  arts: Windy Romani captures seasonal landscapes with a Canon EOS 90D, draws inspiration from Ansel Adams and O'Keeffe, curates a small home gallery of botanical prints, relaxes listening to Norah Jones
    and Philip Glass, and attends occasional performances at the Hartford Stage to recharge.
  travel: Windy Romani prefers meticulously planned getaways to serene destinations, has explored the Litchfield Hills and Mystic’s historic seaport in Connecticut, dreams of wandering the lavender fields
    of Provence, and values quiet boutique inns over bustling hotels.
  culinary: Windy Romani, an adept baker, perfects sourdough loaves with a disciplined 24‑hour proof, seasons homemade focaccia with rosemary and thyme, enjoys herb‑infused teas, and treats themselves to
    a monthly brunch at a farm‑to‑table café for a rare social indulgence.
  core: Windy Romani blends a love of routine and order with a quiet passion for nature, turning meticulous lesson planning and precise baking into a calming, if occasionally anxious, daily rhythm.
background:
  cultural: Windy was born and raised in a middle‑class, white family in the Manchester area of Connecticut. Her paternal lineage traces back to Italian immigrants, while her maternal side reflects the
    traditional New England Protestant culture. The family placed a strong emphasis on practicality, punctuality, and self‑reliance, values that are evident in her organized lifestyle. Community events,
    seasonal holidays, and local church gatherings reinforced a sense of quiet, orderly community participation, which she carries into her teaching philosophy and personal life.
attributes:
  skills: '[''Lesson Planning'', ''STEM Activity Design for Young Learners'', ''Early Childhood Curriculum Development'', ''Classroom Management'', ''Organizational Systems'', ''Educational Technology Integration'',
    ''Student Assessment and Progress Tracking'', ''Child Development Knowledge'', ''Safety Protocol Implementation'', ''Quiet Space Design'']'
  hobbies: '[''Reading non-fiction'', ''Herb gardening'', ''Knitting'', ''Crossword and Sudoku puzzles'', ''Baking'', ''Nature walks'', ''Journaling'', ''Mindfulness meditation'', ''Landscape photography'',
    ''Coding educational games'']'
  career_goals: Windy aims to advance to a lead teacher or curriculum specialist role where she can shape a consistent, research‑based early STEM curriculum for her school district. She is considering a
    master's degree in early childhood education or educational leadership to qualify for a director position at a small, boutique preschool that emphasizes structured, low‑stimulus environments. Long‑term,
    she hopes to mentor new teachers and develop a community outreach program that offers quiet, after‑school STEM workshops for children with sensory sensitivities.
