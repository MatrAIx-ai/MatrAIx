persona_description: A scientist who specializes in the study of materials processing and solar materials, particularly in the field of solar materials processing and the development of unique products.
  She has published several papers on the carburization of tungsten with graphite under solar radiation and the formation of mono-carbide and sub-carbide phases in the carburization of tungsten with amorphous
  carbon under solar radiation. She has also built a flux mapping system to measure the flux distribution of dish/Stirling systems in planes perpendicular to the optical axis.
