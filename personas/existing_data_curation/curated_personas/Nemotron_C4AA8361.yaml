  hobbies: '[''Reading practical books'', ''Listening to R&B, gospel, and hip‑hop music'', ''Cooking Southern cuisine'', ''Herb and vegetable gardening'', ''Knitting and crocheting'', ''Participating in
    a church book club'', ''Walking the BeltLine and visiting farmers’ markets'', ''Exploring cleaning technique tutorials online'']'
  career_goals: Cynthia aspires to transition from a frontline maid to a supervisory role within a reputable cleaning service, eventually managing a team of housekeepers. She plans to obtain a professional
    housekeeping certification and deepen her expertise in eco‑friendly cleaning practices, positioning herself as a specialist in green residential care. In the longer term, Cynthia dreams of launching
    her own boutique cleaning and home‑organization business, leveraging her practical skills and client‑focused approach to serve Atlanta neighborhoods. Achieving these goals will provide greater financial
    stability, enable her to support extended family members, and afford her the independence to purchase her own home.
