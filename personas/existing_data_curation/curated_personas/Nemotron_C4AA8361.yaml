personas:
  professional: Cynthia Seward is a diligent residential cleaning specialist whose sharp eye for detail, eco‑friendly product knowledge, and calm, assertive communication style position them to transition
    into supervising a team of housekeepers while they pursue a green‑clean certification.
  sports: Cynthia Seward enjoys gentle exercise by walking the Atlanta BeltLine, cheering on the Atlanta Falcons and Atlanta Hawks, and participating in a community garden fitness club that meets for sunrise
    yoga and occasional weekend runs with a local walking group.
  arts: Cynthia Seward finds artistic fulfillment listening to R&B legend Mary J. Blige, gospel powerhouse Kirk Franklin, and Atlanta hip‑hop icons Outkast and Future, while attending monthly church choir
    performances and the occasional live jazz set at the Tabernacle.
  travel: Cynthia Seward prefers low‑key weekend getaways, often planning trips to historic Southern towns like Savannah, Charleston, and Asheville, balancing careful budgeting with spontaneous day‑trips
    to local farmer’s markets and the Georgia mountains for a brief recharge.
  culinary: Cynthia Seward delights in preparing healthier twists on classic Southern dishes such as baked catfish with lemon‑garlic quinoa, collard greens sautéed with garlic and smoked turkey, and sweet‑potato
    pie flavored with ginger and pecan crumble, while she carefully seasons with locally sourced okra, hot sauce, and fresh herbs from her balcony garden.
  core: Cynthia Seward blends meticulous organization with quiet ambition, constantly refining her eco‑cleaning craft while juggling budget‑tight home‑ownership dreams, a love for low‑waste cooking, and
    a habit of double‑checking every cleaning checklist.
background:
  cultural: As a Black woman raised in Atlanta, Cynthia embodies the rich cultural tapestry of the Southern African‑American community. She grew up attending a historic Black church, where gospel music,
    communal support, and oral storytelling shaped her values. Family gatherings centered around soul food—fried chicken, collard greens, sweet potato pie—instilled a deep appreciation for culinary traditions.
    The city’s legacy of civil‑rights activism and thriving Black arts scene influences her sense of pride and resilience. She is attuned to the nuances of Southern Black etiquette, showing respect through
    hospitality and courtesy. Her cultural heritage also informs her work ethic, emphasizing reliability, community service, and the importance of uplifting her family and neighbors.
