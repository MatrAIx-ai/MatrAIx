  hobbies: '["knitting", "gardening", "reading historical fiction", "birdwatching", "walking nature trails", "cooking Southern dishes", "volunteering at community center", "small book club participation"]'
  career_goals: Karen aims to advance to a shift supervisor role at her laundry facility, where she can oversee daily operations, ensure consistent quality, and mentor newer employees. She plans to earn
    a certification in textile care to deepen her expertise and potentially offer consulting services to local businesses seeking to improve their cleaning processes. As she approaches retirement, she hopes
    to transition to a part‑time schedule that balances steady income with more personal time, while continuing to champion environmentally friendly cleaning practices within her workplace.
