personas:
  professional: Justin Korir, a certified nuclear medicine technologist with a knack for meticulous dose calculations, blends their artistic eye for light with a relentless curiosity for emerging radiopharmaceuticals
    as they pursue a lead dosimetrist role and mentor junior staff, despite their laid‑back approach to scheduling.
  sports: Justin Korir fuels their fitness routine with early‑morning hikes along the Appalachian foothills, occasional trail runs, and a membership in the Oakwood Trail Runners club, while they loyally
    cheer for the Washington Nationals, the Washington Capitals, and the Roanoke Baseball Club, preferring the camaraderie of small, familiar groups over stadium crowds.
  arts: Justin Korir channels their love of visual storytelling into sketching the shifting light of Shenandoah’s ridges, devotes evenings to listening to John Coltrane, Miles Davis, and B.B. King, and
    frequently visits the Virginia Museum of Fine Arts to draw inspiration from the works of Ansel Adams and local folk artists, all while regularly attending the neighborhood gospel choir’s Saturday night
    rehearsals that tie together their literary and musical sensibilities.
  travel: Justin Korir travels with a blend of spontaneity and purpose, often planning weekend trips to nearby Shenandoah National Park or the historic streets of Savannah while they dream of a summer pilgrimage
    to Kyoto’s temples and the frescoed halls of Florence, balancing a modest budget with their desire to photograph natural and cultural landscapes.
  culinary: Justin Korir’s palate favors Southern comfort foods such as smoked brisket, collard greens seasoned with smoked paprika, and fresh cornbread, and their cooking skill comfortably allows them
    to experiment with a rosemary‑infused crab stew or a jalapeño‑spiked shrimp étouffée, all while appreciating a robust cup of black coffee paired with a slice of pecan pie.
  core: Justin Korir is a quietly competitive, art‑infused nuclear imaging specialist who balances a love of solitary hikes with a flexible, occasionally disorganized, approach to life as they drift between
    meticulous work and spontaneous creativity.
background:
  cultural: Justin is an African‑American who grew up in the rural community of Oakwood, Virginia. His family maintains strong ties to Black church traditions and community solidarity, while also embracing
    the Appalachian cultural influences of the region. He values soulful music, storytelling, and a deep respect for nature cultivated by his upbringing. This blended heritage informs his artistic pursuits,
    community volunteering at county health fairs, and his commitment to mentoring youth in STEM fields.
attributes:
  skills: '[''Radiopharmaceutical preparation'', ''Patient imaging (SPECT/CT, PET/CT)'', ''Radiation safety and compliance'', ''Dosimetry calculations'', ''Equipment troubleshooting'', ''Quality assurance
    and control'', ''Regulatory documentation'', ''Patient education'', ''Data analysis'', ''Research protocol development'']'
  hobbies: '[''Sketching'', ''Photography'', ''Reading philosophy and science nonfiction'', ''Listening to jazz and blues'', ''Chess'', ''Hiking in Appalachian foothills'', ''Woodworking'', ''Museum visits'']'
  career_goals: Justin aims to become a lead medical dosimetrist within his regional hospital network, overseeing radiation dose optimization and safety programs. He plans to earn advanced certification
    through the American Registry of Radiologic Technologists, contribute to research on novel radiopharmaceuticals, and eventually mentor junior technologists. Long‑term, he envisions developing community
    outreach workshops on radiation safety and possibly transitioning into an academic role teaching nuclear medicine technology.
