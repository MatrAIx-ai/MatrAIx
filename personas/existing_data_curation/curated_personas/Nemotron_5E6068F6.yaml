personas:
  professional: Stacey Maravilla is a budding robotics enthusiast and software developer who leverages her meticulous organization and competitive spirit to lead the school’s varsity volleyball team, debate
    squad, and robotics club, always seeking efficient, data‑driven solutions while skeptically evaluating teammates' contributions.
  sports: Stacey Maravilla is a starting outside hitter on her high school varsity volleyball team, a fervent fan of the Los Angeles Lakers basketball franchise and the US Women’s National Soccer Team,
    and a regular participant in the community Trailblazers Hiking Club that explores nearby state parks each weekend.
  arts: Stacey Maravilla creates ukulele covers of The 1975’s ‘Somebody Else,’ produces video blogs inspired by Casey Neistat’s cinematic style, and draws artistic inspiration from graphic novelist Raina Telgemeier,
    while occasionally binge‑watching Studio Ghibli films for creative refreshment.
  travel: Stacey Maravilla favors weekend hikes to Zion National Park, dreams of a spring cultural immersion trip to Kyoto, Japan, and meticulously plans each outing using a blend of digital maps and handwritten
    itineraries, balancing school commitments with her wanderlust.
  culinary: Stacey Maravilla relishes crafting spicy chicken ramen from scratch, whipping up avocado toast topped with chili flakes for breakfast, and snacking on trail mix with dried mango and almonds
    during hikes, while occasionally treating herself to pepperoni pizza after a robotics competition.
  core: Stacey Maravilla is a hyper‑organized, competitively driven teen who juggles varsity volleyball, robotics, debate, and vlogging, yet admits to a guilty habit of binge‑watching late‑night shows when
    stress spikes.
background:
  cultural: Stacey grew up in a middle‑class suburban family in Plainfield, Illinois, reflecting typical Midwestern American culture. Her family celebrates holidays such as Thanksgiving, Christmas, and
    the Fourth of July, and maintains community ties through church participation and local events like the Plainfield Summer Festival. With German‑Irish ancestry, she was raised with an emphasis on hard
    work, education, and civic involvement, often engaging in neighborhood block parties and school volunteer programs.
