personas:
  professional: Lisa Green is a veteran flight attendant with an Arts & Humanities degree who blends high‑level in‑flight service, safety expertise, and visual storytelling; her competitive drive pushes
    her to exceed performance metrics while her skeptical eye constantly assesses crew dynamics, and she mentors newer crew members with a pragmatic adaptability that shines when schedules shift.
  sports: Lisa Green is an occasional hiker who tackles the Appalachian Trail’s nearby sections on weekends, follows the Philadelphia Eagles and the York County Running Club, and engages in yoga for flexibility,
    though they admit to missing scheduled runs when flight rosters become unpredictable.
  arts: Lisa Green immerses themselves in the art world by sketching travel scenes, attending openings at the York County Art Association, curating a personal photography portfolio inspired by Steve McCurry,
    and enjoying contemporary fiction by Sally Rooney while quoting lines from Wong Kar‑wai’s vintage films during conversations.
  travel: Lisa Green travels with a spontaneous, photo‑first mindset, favoring last‑minute flight deals to destinations like Barcelona, Kyoto, and Reykjavik, while maintaining a travel blog that chronicles
    each journey; they have a bucket‑list of Sicily’s markets and Patagonia’s glacial lakes but must juggle family commitments during peak holiday seasons.
  culinary: Lisa Green, an intermediate home chef, loves recreating dishes such as Spanish paella, Japanese ramen, and New Mexican green chile stew, often experimenting with fresh basil, saffron, and chilies
    from the farmers’ market, and they frequently host small dinner gatherings where they serve their experimental travel‑inspired meals.
  core: Lisa Green navigates life with restless curiosity, balancing flight‑deck precision and artistic spontaneity while battling a chronic worry loop that fuels both meticulous safety checks and occasional
    over‑thinking.
background:
  cultural: Lisa was raised in Red Lion, Pennsylvania, in a middle‑class family with German and Irish ancestry. Her upbringing blended traditional Pennsylvanian small‑town values—community festivals, county
    fairs, and a strong work ethic—with early exposure to the arts through school theater and museum visits. Her career as a flight attendant has broadened her cultural perspective, giving her first‑hand
    experience of global customs and artistic traditions, which she integrates into her personal interests and professional approach.
attributes:
  skills: '[''Customer Service'', ''In‑flight Safety Management'', ''First Aid & CPR'', ''Conflict De‑escalation'', ''Basic Spanish Communication'', ''Cultural Sensitivity'', ''Art History Knowledge'',
