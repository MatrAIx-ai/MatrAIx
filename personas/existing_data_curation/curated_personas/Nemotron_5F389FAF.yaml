  hobbies: '[''Sketching'', ''Travel Photography'', ''Reading Contemporary Fiction'', ''Writing Travel Blog'', ''Yoga & Mindfulness'', ''Cooking International Cuisine'', ''Hiking'', ''Attending Local Art
    Exhibits'', ''Learning Spanish'']'
  career_goals: Lisa aims to advance to a senior purser role where she can shape crew standards and safety protocols, eventually transitioning into a flight training or safety officer position within the
    airline. Parallel to her aviation aspirations, she hopes to leverage her arts background to curate traveling exhibitions or produce a travel‑focused photography book that merges her love of culture
    and visual storytelling. She also seeks to develop a structured routine that mitigates her stress sensitivity while allowing the flexibility she values.
