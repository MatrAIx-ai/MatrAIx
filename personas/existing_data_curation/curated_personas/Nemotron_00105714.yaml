  career_goals: Diana aims to advance to a supervisory position within the Sarasota County Sheriff’s Office, targeting roles such as Senior Detective or Tactical Team Leader. She plans to complete the state-approved
    Advanced Law Enforcement Training program and obtain a certification in crisis negotiation, followed by a master’s degree in criminal justice to deepen her strategic expertise. Long-term, she envisions
    establishing a community-focused safety initiative that trains local volunteers in emergency preparedness, leveraging her competitive drive to set measurable performance benchmarks and her structured
    mindset to implement sustainable protocols.
