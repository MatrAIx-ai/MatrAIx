personas:
  professional: Diana Savard, a protective service worker with the Sarasota County Sheriff’s Office, applies her STEM‑based analytical rigor to risk assessments, tactical planning, incident investigations,
    and digital forensics while leveraging her strong negotiation and first‑aid skills to lead high‑stakes operations and pursue a supervisory position as Senior Detective.
  sports: Diana Savard fuels her competitive edge with sunrise beach jogs as a member of the Sarasota Beach Runners, sharpens balance on the Gulf with the Sarasota Paddleboard Club, and roots for the Tampa
    Bay Buccaneers and Florida Gators, treating each season like a tactical briefing.
  arts: Diana Savard devours true‑crime works by Ann Rule and Michelle McNamara, votes nightly for investigative documentaries such as 'Making a Murderer' and 'Mindhunter', curates a modest collection of
    noir‑themed art at home, and unwinds to folk‑rock from The National while indulging in occasional local theater productions.
  travel: Diana Savard plans each getaway with military‑style precision, preferring short‑term adventure trips to the Bahamas’ turquoise waters and Costa Rica’s rainforests, while scheduling longer restorative
    road trips to Asheville for mountain hikes, all balanced against her demanding schedule and budget constraints.
  culinary: Diana Savard enjoys cooking nutrient‑dense meals such as grilled gulf shrimp with lemon‑capers, quinoa‑stuffed bell peppers, and kale‑chip salads, relies on fresh avocado and citrus ingredients,
    and alternates home‑cooked dishes with occasional visits to upscale sushi spots for sashimi quality.
  core: Diana Savard blends disciplined law‑enforcement expertise with a methodical love for puzzles, paddleboarding, and community preparedness, channeling competitive drive into meticulous planning while
    guarding a secret habit of sneaking late‑night true‑crime podcasts into her solitary evenings.
background:
  cultural: Diana is a white American with an Anglo-American heritage, raised in the southeastern United States before her family settled in Venice, Florida. Her upbringing blended Midwestern work ethic
    with the laid-back coastal lifestyle of the Gulf Coast. She values personal responsibility, community safety, and the informal hospitality typical of the region, while also appreciating the diverse
    cultural influences of the tourist-driven community. Her family traditions emphasize modest celebrations, a strong sense of duty, and support for public service, which have shaped her pragmatic and
    structured worldview.
