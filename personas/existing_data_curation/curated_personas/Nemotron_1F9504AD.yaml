personas:
  professional: An accomplished retired mechanical and civil engineer, Eulalia Lora applies their AutoCAD, SolidWorks, and statistical analysis expertise to design a sustainable community garden that doubles
    as a hands‑on STEM mentorship hub for local students, while methodically documenting their journey for a forthcoming memoir that highlights their path as a woman in engineering; they balance curiosity
    with practicality in every project.
  sports: Eulalia Lora hikes the Colorado foothills and plains with a camera, follows the Denver Broncos and Colorado Avalanche with spirited discussions at the local sports bar, and competes in senior
    chess tournaments at the regional senior center, all while joining weekly square‑dance events that keep them physically active and socially engaged.
  arts: Eulalia Lora brings their outgoing spirit to community‑theater productions, acting and designing sets inspired by Ansel Adams’ black‑and‑white landscapes, while their square‑dance performances echo
    lively folk reels and their nature photography exhibits showcase vibrant close‑ups of native wildflowers.
  travel: Eulalia Lora prefers meticulously planned road trips that blend scenic adventure with cultural exploration, having already trekked the Grand Canyon, photographed the Great Sand Dunes, and traced
    family roots in a historic border town, with future plans to explore the vineyards of Mendoza and the tranquil coasts of the Pacific Northwest; they balance budget constraints with a desire for meaningful
    experiences.
  culinary: Eulalia Lora delights in preparing complex, spice‑laden dishes such as mole, tamales, and chiles rellenos, skillfully incorporating hydroponically grown cilantro, oregano, and habanero peppers
    from their garden, and showcases these culinary creations at family gatherings and local cultural festivals, while occasionally indulging in extra cheese for comfort.
  core: Eulalia Lora is a methodical, curious retiree who channels their engineering precision into community gardening, theater, and chess, balancing frugality with occasional splurges on photography gear,
    all underscored by a calm, resilient outlook and a healthy skepticism of quick fixes.
background:
  cultural: Eulalia was born to Mexican immigrant parents and grew up bilingual in Spanish and English, preserving a deep connection to Mexican traditions while adapting to life in the United States. She
    celebrates Día de los Muertos, Cinco de Mayo, and other cultural holidays with family, preparing and sharing traditional dishes such as mole, tamales, and pozole. Her upbringing emphasized the values
    of family solidarity, hard work, and education, shaping her lifelong commitment to mentorship and community service. Living for many years in rural Holly, Colorado, she blends her Mexican heritage with
    the resilient, frontier spirit of the West, fostering a unique cultural identity that informs her participation in local events, her dedication to sustainable community projects, and her desire to bridge
    cultural gaps through education and collaboration.
attributes:
  skills: '["Project Management", "CAD (AutoCAD, SolidWorks)", "Structural and Systems Analysis", "Statistical Data Analysis (R, Python)", "Technical Writing", "Community Outreach", "Mentoring", "Budgeting
    and Scheduling", "Problem Solving", "Team Leadership", "Public Speaking"]'
  hobbies: '["Gardening and hydroponics", "Hiking and nature photography", "Square dancing", "Community theater acting and stage design", "Mexican cooking", "Genealogy research", "Volunteering at the local
    library (technology assistance)", "Mentoring youth in STEM", "Competitive chess"]'
  career_goals: Although retired from formal employment, Eulalia aims to extend her engineering legacy by establishing a sustainable community garden that incorporates hydroponic technology and serves as
    a hands‑on learning platform for local students. She seeks to mentor high‑school and middle‑school youth in engineering design, data analysis, and problem‑solving through after‑school workshops and
    summer camps. Eulalia also hopes to contribute to regional water‑conservation projects by applying her technical expertise to improve irrigation efficiency for nearby farms. Additionally, she plans
    to author a memoir highlighting her journey as a Mexican‑American woman in engineering, with the goal of inspiring under‑represented groups to pursue STEM careers.
