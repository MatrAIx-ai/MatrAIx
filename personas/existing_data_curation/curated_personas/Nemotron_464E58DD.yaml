  hobbies: '[''church choir'', ''basketball'', ''community gardening'', ''cooking soul food'', ''digital video editing'', ''reading young-adult novels'', ''jewelry making'']'
  career_goals: Although Mary is currently behind her grade level, she is determined to earn her GED within the next year. She aspires to enroll in a community-college health-sciences program to become
    a certified nursing assistant, eventually pursuing a nursing degree so she can work in the local clinic and support her community's health needs. Mary also dreams of creating a youth mentorship program
    that combines health education with after-school activities, and she hopes to one day open a small catering service that showcases family recipes at community events.
