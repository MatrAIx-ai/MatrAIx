personas:
  professional: Mary Mckinney, a motivated future nursing assistant, blends her methodical planning, clear communication, and first‑aid knowledge with a sociable, assertive style to volunteer at community
    health events and lead youth wellness projects.
  sports: Mary Mckinney enjoys pick‑up basketball at the local park, follows the Westfield Wildcats high school team and the NBA's Miami Heat, and incorporates weekend jogs and community soccer games into
    a routine that values teamwork and energetic activity.
  arts: Mary Mckinney, a gospel choir singer, curates playlists featuring H.E.R., Alicia Keys, and Le’Andria Johnson, reads contemporary YA novels by Becky Albertalli and John Green, and crafts jewelry
    inspired by the vibrant aesthetics of Liza Koshy’s YouTube videos.
  travel: Mary Mckinney prefers short, budget‑friendly road trips, having explored the historic streets of Savannah and the nature trails of Great Smoky Mountains, while dreaming of a future spring break
    in New Orleans to taste authentic Creole cuisine.
  culinary: Mary Mckinney loves experimenting with family recipes such as fried chicken, collard greens, mac and cheese, and sweet potato pie, skillfully seasoning dishes with cumin, smoked paprika, and
    fresh herbs, and delights in sharing homemade meals at community gatherings.
  core: Mary Mckinney is an organized, socially driven teen who balances her love for gospel singing, basketball, and culinary experiments with a disciplined eye on future nursing studies and occasional
    impulsive splurges.
background:
  cultural: Mary's cultural background is rooted in the African-American community of central Arkansas. Her family has lived in Conway for several generations, maintaining strong ties to the local black
    church, which serves as a center for worship, music, and community support. Family gatherings often feature storytelling, gospel singing, and cooking dishes that blend Southern culinary traditions with
    the flavors passed down from her grandparents. The legacy of the civil-rights movement in Arkansas, along with the close-knit neighborly network of black families in Perry County, influences Mary's
    sense of solidarity, resilience, and responsibility to give back. These cultural influences shape her values of cooperation, assertiveness when needed, and an enduring commitment to community uplift.
