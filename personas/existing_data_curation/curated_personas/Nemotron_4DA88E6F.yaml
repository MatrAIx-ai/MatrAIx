personas:
  professional: Maria Chervenak, a 22‑year‑old hairdresser, blends precise cutting, advanced balayage, and makeup artistry with a curiosity for new trends and a disciplined, organized workflow, so they
    consistently deliver high‑end salon experiences while maintaining calm under pressure and fostering warm client relationships.
  sports: Maria Chervenak stays active with sunrise yoga sessions at Soul Flow Yoga, weekend hikes with the Oakley Trailblazers Hiking Club, and follows the Sacramento Kings, Oakland Athletics, and San
    Francisco 49ers as their favorite professional teams, reflecting a balanced love of personal fitness and collective sports spirit.
  arts: Maria Chervenak channels their artistic side through fashion photography of hairstyles at local food festivals and by attending live shows featuring artists like Lizzo, The Weeknd, and Billie Eilish,
    while also drawing inspiration from the cinematography of La La Land for styling concepts.
  travel: Maria Chervenak enjoys planning spontaneous weekend road trips to Napa Valley and Yosemite while meticulously budgeting for longer adventures to Mediterranean destinations such as Santorini, Barcelona,
    and Dubrovnik, aiming to blend cultural immersion with relaxed exploration.
  culinary: Maria Chervenak, an intermediate cook, delights in preparing Mediterranean dishes like Greek moussaka with eggplant and feta, fresh falafel with tahini, and lemon‑infused tortellini, often experimenting
    with olive oil, fresh herbs, and seasonal produce while also seeking farm‑to‑table dining experiences.
  core: Maria Chervenak merges organized ambition with vibrant creativity, thriving on healthy routines, community service, and a touch of spontaneous flair in both their professional salon work and personal
    life.
background:
  cultural: Maria grew up in Oakley, a suburb of the San Francisco Bay Area, where she was exposed to a diverse mosaic of cultures, including strong Latino and Asian influences in the broader Contra Costa
    County. Her family traces its roots to Eastern European ancestors, and she maintains a connection to that heritage through family gatherings and traditional Mediterranean cooking. This multicultural
    environment fostered an appreciation for inclusivity, sustainability, and community involvement—values that shape both her personal life and professional ethos as a hairdresser.
attributes:
  skills: '["Precision haircutting", "Advanced hair coloring (balayage, ombre)", "Event and bridal styling", "Client consultation and personalized service", "Scalp health assessment", "Sanitation and hygiene
    protocols", "Haircare product knowledge and recommendation", "Makeup application for special occasions", "Social media marketing for salon", "Appointment scheduling and inventory management"]'
  hobbies: '["Yoga", "Hiking", "Live music and festival attendance", "Photography", "Community volunteer haircuts", "Cooking Mediterranean cuisine", "Exploring fashion and beauty trends", "Reading beauty
    and wellness blogs", "DIY home décor projects"]'
  career_goals: Maria aims to become a senior stylist at a high‑end salon within the next two years, while pursuing certifications in advanced color theory and hair extensions. She envisions opening her
    own boutique salon in Oakley that offers a holistic beauty experience, integrating hair, makeup, and wellness services. Her long‑term ambition includes developing a personal brand on social media, mentoring
    aspiring stylists, and eventually launching a line of eco‑friendly hair care products that reflect her commitment to sustainability and client well‑being.
