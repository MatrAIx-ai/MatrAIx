persona_description: A scientist who specializes in the field of nanotechnology and chromatography, particularly in the development and optimization of novel separation techniques. The scientist is currently
  working on the practical implementation of shear-driven chromatography in nanochannels, aiming to achieve the theoretical maximum of over 10,000 plates per centimetre in a few seconds. The scientist is
  seeking to overcome experimental difficulties, including the need for a detector miniaturisation that is carried to the extreme combined with very high sampling rates, and is also studying the chemistry
  of the separation surface to improve separation efficiency. The scientist has already carried out a number of mechanical improvements to achieve the desired separation at a distance of 8 mm downstream
  from the injection point, with a plate generation velocity of about 2000–7000 plates per second depending on the sample.
