personas:
  professional: A curious infant who thrives on predictable daily routines, Jessica Callier spends mornings building block towers, demonstrating early problem‑solving skills and a natural inclination to
    help peers in the playroom, signalling a future path in early childhood education; they love structure but also enjoy spontaneous giggles when play gets messy.
  sports: A budding athlete in the realm of infant movement, Jessica Callier attends weekly Mommy‑and‑Me gymnastics classes at the community center, delights in crawling races with fellow tots, proudly
    waves a tiny Chicago Cubs cap when she hears their anthem on TV, and has recently joined a Tiny Tots swim group for occasional splash‑time practice.
  arts: An avid lover of colors and tunes, Jessica Callier giggles to the lullaby ‘Twinkle, Twinkle, Little Star,’ sways to the gentle piano pieces of Yiruma, and is captivated by the bold illustrations
    of Eric Carle’s ‘The Very Hungry Caterpillar,’ often lining up her stuffed animals in a rainbow pattern during playtime.
  travel: A curious explorer on family road trips, Jessica Callier has visited Grandma’s beach house in Florida, taken a brief stroller‑friendly tour of the Grand Canyon’s South Rim, and enjoys looking
    out the car window on drives to the local zoo, while dreaming (in her babble) of someday seeing the lights of Disneyland.
  culinary: A budding foodie, Jessica Callier relishes smooth mashed sweet potatoes, soft avocado cubes, and oatmeal with a hint of cinnamon, delighting in the sweet taste of banana puree, while rejecting
    peas with dramatic grimaces and learning to hold a tiny spoon with wobbly determination.
  core: Jessica Callier, a one‑year‑old who craves routine yet giggles at chaos, clings to her plush blanket for comfort, worries over sudden noises, and constantly seeks to share smiles and toys with anyone
    nearby.
background:
  cultural: Jessica is an African American child growing up in Harrisburg, Pennsylvania. Her family participates in local church gatherings and celebrates African American heritage events such as Juneteenth
    and Kwanzaa. Traditional foods like fried chicken, collard greens, and sweet potato pie are shared during family meals, and the community’s emphasis on collective support, music, and storytelling shapes
    her everyday experiences.
