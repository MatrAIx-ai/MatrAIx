persona_description: A 21st Century Neurologist who is passionate about improving the outcome of patients with neurologic disorders such as stroke, epilepsy, multiple sclerosis, muscular dystrophy, and
  Alzheimer's Disease. They are committed to the future of neurologic care and strive to move the field of Neurology towards more active disease management. They have a unique understanding of the brain
  and nerves, having seen the rapid explosion of technology and therapies that have changed what a neurologist can do. They are skilled in imaging, electrical activity, metabolism, and pharmacologic and
  device therapies, allowing them to accurately identify brain disorders and directly intervene to correct or improve abnormalities.
