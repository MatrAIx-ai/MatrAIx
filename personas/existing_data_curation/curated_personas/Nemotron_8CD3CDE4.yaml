personas:
  professional: Elisa Briggs, a 26‑year‑old underground mining machine operator, blends her practical curiosity with a relaxed, flexible approach to shift work, skillfully handling continuous miners, shuttle
    cars, and hydraulic roof bolters while proactively suggesting process tweaks and assertively championing safety during crew briefings.
  sports: Elisa Briggs spends her weekends fishing the Gulf and hiking the Pascagoula River Wildlife Management Area, while cheering on the New Orleans Saints, following the Biloxi Shuckers, and participating
    in a local outdoor club that organizes monthly trail runs and river clean‑up swims.
  arts: Elisa Briggs unwinds to Southern blues and country at local dive bars, often spinning tracks by B.B. King, Stevie Ray Vaughan, and Chris Stapleton, while she channels that creative energy into DIY
    woodworking projects that echo the raw aesthetic of folk art.
  travel: Elisa Briggs prefers spontaneous, low‑key road trips that blend fishing and hiking, having already explored the Gulf Islands National Seashore and New Orleans, while eyeing a future adventure
    to Yellowstone for its geysers and backcountry trails, all arranged with a quick‑look itinerary on her phone rather than a detailed plan.
  culinary: Elisa Briggs delights in cooking Southern comfort dishes, mastering a richly spiced shrimp étouffée with fresh Gulf shrimp, Cajun holy trinity vegetables, and a dash of smoked paprika, alongside
    buttery cornbread baked with buttermilk and honey, reflecting her blend of practical skill and love for bold flavors.
  core: Elisa Briggs is a pragmatic, curiosity‑driven underground miner who finds balance between quiet Gulf‑side fishing and spontaneous DIY projects, while her laid‑back, sometimes disorganized habits
    surface in late‑night budgeting alerts and occasional missed stretches for back soreness.
background:
  cultural: Elisa was born and raised in a working‑class family in the coastal region of Jackson County, Mississippi. Her heritage is rooted in Southern Anglo‑American culture, with strong emphasis on family,
    community, and a pragmatic work ethic. She grew up attending local church events, participating in community festivals, and learning the value of hospitality through Southern cooking traditions. The
    rhythm of the Gulf Coast—its fishing, church gatherings, and camaraderie among industrial workers—has shaped her worldview, blending a respect for tradition with an openness to new ideas. Her white
    Southern background informs her comfort with close‑knit social networks while also fostering an independent, resilient spirit.
attributes:
  skills: '["Underground mining machine operation", "Mechanical troubleshooting and preventive maintenance", "Equipment diagnostics and data logging", "MSHA safety compliance and emergency response", "Ventilation
    and environmental control management", "Team coordination and shift communication", "Process improvement experimentation", "Basic geology and ore extraction knowledge"]'
  hobbies: '["Fishing on the Gulf Coast", "Hiking in Pascagoula River Wildlife Management Area", "Rock and mineral collecting", "DIY home improvement projects", "Listening to Southern blues and country
    music", "Cooking traditional Southern dishes"]'
  career_goals: Elisa aims to move from front‑line machine operation to a supervisory role within the next three years, targeting a shift foreperson or equipment‑maintenance lead position. She plans to
    obtain an advanced MSHA certification and complete a bachelor's degree in mining engineering or industrial technology, building on her associate’s background. A long‑term ambition is to champion the
    adoption of automated and remotely‑operated equipment at her mine, leveraging her curiosity for new technologies while maintaining practical safety standards. She also hopes to mentor new operators,
    using her cooperative nature to foster a safety‑first culture.
