  career_goals: Marieelena dreams of turning her love for animals and science into a future career as a veterinarian or wildlife biologist, where she can combine her curiosity with practical hands‑on work.
    She also imagines leading community projects, such as organizing neighborhood clean‑ups or starting a school garden, to give back to her Bakersfield community. In the shorter term, she hopes to join
    a summer STEM camp, earn a badge in animal care through the Girl Scouts, and continue improving her cooking skills so she can one day create healthy, culturally inspired meals for friends and family.
