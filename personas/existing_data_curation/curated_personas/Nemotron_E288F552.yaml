personas:
  professional: Marieelena Torres is an aspiring junior game designer who channels her curiosity into building elaborate Minecraft realms while practicing practical coding skills, often stepping up to lead
    the school's after-school coding club even though her notebook is a frequent mess and she sometimes worries about meeting deadlines.
  sports: Marieelena Torres plays forward for the City Kids Soccer Academy, eagerly cheering for Los Angeles FC on TV, hikes local nature trails on weekends for bird-watching, and tries to sprint extra
    laps after practice despite her tendency to forget to stretch and worry about getting tired.
  arts: Marieelena Torres devotes afternoons to sketching comic-style characters inspired by the vibrant panels of Stan Lee, flips through graphic novels by Rebecca Sugar, and sings along to Shakira and
    traditional Mexican lullabies while dancing in the kitchen, a habit that fuels her creative storytelling but sometimes distracts her from school assignments.
  travel: Marieelena Torres loves weekend adventures on local nature trails and dreams of backpacking through Yosemite National Park, exploring the coral reefs of Cancún, and biking along the historic streets
    of Barcelona, planning each trip with a flexible itinerary that lets her improvise when worries about schoolwork arise.
  culinary: Marieelena Torres experiments in the kitchen by blending classic tacos al pastor with homemade salsa made from fresh cilantro, lime, and jalapeño, bakes chocolate chip cookies loaded with dark
    chocolate chunks, and often asks her grandparents to taste-test her guacamole sprinkled with pomegranate seeds, though she sometimes forgets to clean up before dinner.
  core: Marieelena Torres is a curious yet practical twelve-year-old who balances bustling creativity—from Minecraft builds to kitchen experiments—with occasional disorganization and a sensitive streak
    that fuels both imagination and worry.
background:
  cultural: Raised in a Mexican‑American household in Bakersfield, CA, Marieelena’s family maintains strong ties to Mexican traditions. She celebrates Día de los Muertos with homemade ofrendas, participates
    in Las Posadas during the Christmas season, and helps prepare family favorites such as tamales and mole. Her grandparents passed down stories of Mexico, and she speaks Spanish fluently at home while
    attending an English‑dominant school. Community events like the Kern County Fair and local church gatherings reinforce her sense of cultural identity, blending the warmth of Mexican heritage with the
    diverse influences of Southern California.
