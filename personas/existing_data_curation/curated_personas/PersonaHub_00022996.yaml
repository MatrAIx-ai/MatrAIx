persona_description: A scientist who specializes in genetic engineering, particularly in the study of H+-ATPase and its role in cell-cell interactions. She has experience working with Chlamydomonas reinhardtii,
  a green alga, and has successfully cloned the wild-type version of the affected gene. Her ultimate goal is to transform the final wild-type constructs into the mutant Chlamy cells, which will help her
  determine if the wild-type genomic DNA can complement the mutation to allow the cells to mate and how long the genomic DNA needs to be to do this.
