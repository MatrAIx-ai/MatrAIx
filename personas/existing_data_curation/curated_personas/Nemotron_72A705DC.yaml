  hobbies: '[''Mahjong'', ''Tai chi'', ''Karaoke (Mandarin and Hawaiian songs)'', ''Gardening (vegetable garden)'', ''Volunteer work at food bank'', ''Attending Lunar New Year celebrations'', ''Participating
    in Hawaiian cultural festivals'']'
  career_goals: At 77, Tien aims to transition from day‑to‑day operational duties to a mentorship role, helping the next generation of warehouse staff master core logistics skills and safety protocols.
    He hopes to document his workflow knowledge in a concise guide for his department and to serve as a liaison between the inventory team and management, ensuring that employee concerns are heard. Additionally,
    he wishes to volunteer his logistical expertise to local community events, such as coordinating supplies for senior centers and cultural festivals, thereby continuing his lifelong commitment to helping
    others and fostering harmony.
