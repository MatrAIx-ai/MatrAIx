  career_goals: James aspires to channel his competitive drive and love of technology into a future career as a video‑game developer or robotics engineer. He dreams of designing interactive experiences
    that challenge players, and he hopes to win a regional science‑fair award for a robotics project in the next few years. Short‑term, he plans to master Python after mastering Scratch, join his school’s
    robotics club, and improve his basketball skills enough to try out for the district team. His long‑term ambition is to lead a tech startup that creates educational gaming tools, reflecting his blend
    of curiosity and practicality.
