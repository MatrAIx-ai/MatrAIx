personas:
  professional: James Scott, an aspiring junior engineer, channels his curiosity and practicality into building intricate LEGO mechanisms and tinkering with beginner robotics kits, while his spontaneous
    streak and competitive edge often lead him to prototype solutions on the fly rather than follow detailed plans.
  sports: James Scott dribbles for the Tampa Junior Hoopers in the local youth league, idolizes the Tampa Bay Lightning's fast-break style on the ice, and balances his competitive drive on the court with
    weekend hikes along the Alafia River Trail, treating fitness as a mix of sport and adventure.
  arts: James Scott fuels his imagination by sketching sci-fi storyboards while blasting alternative rock like Twenty One Pilots and Paramore, devouring novels such as Ender's Game and The Lightning Thief,
    and re-watching classic sci-fi flicks like Blade Runner and Star Wars, weaving these influences into his own game concepts.
  travel: James Scott prefers spontaneous day-trips to nearby nature spots like Hillsborough River State Park and weekend visits to Orlando's Universal Studios, while dreaming of a future family adventure
    to Japan's Akihabara district to soak in anime culture, all within the modest budget set by his parents.
  culinary: James Scott favors bold, easy-to-grab meals like pepperoni pizza and chicken nuggets, often adds a twist by sprinkling extra jalapeños or cheese, enjoys crafting simple snack-level recipes such
    as DIY nachos with guacamole, and delights in tasting exotic toppings like sushi rolls when a school fundraiser offers them.
  core: James Scott is a competitively curious 12-year-old who builds LEGO inventions, dominates video-game arenas, and balances his love of spontaneous fun with a knack for practical problem-solving, all
    while occasionally forgetting to organize his schoolwork.
background:
  cultural: James was raised in Tampa, Florida, a city known for its blend of Southern hospitality and a multicultural coastal vibe. His family participates in community events, beach outings, and regional
    festivals that feature a mix of American, Latin, and Caribbean influences. He grew up with exposure to mainstream U.S. pop culture—sports, video games, and media—while also experiencing the diverse
    culinary and musical traditions of the Tampa Bay area. This environment has shaped his open‑minded curiosity, his competitive spirit in sports, and his appreciation for both traditional and innovative
    activities.
