personas:
  professional: Wendy Nichols, a seasoned construction professional with decades of framing, masonry, and concrete finishing expertise, blends meticulous safety leadership and a vivid artistic imagination
    to mentor crews, design decorative concrete stamps, and champion sustainable building practices as they pursue OSHA 30‑hour certification and foreperson aspirations.
  sports: Wendy Nichols, who stays fit by strolling the rolling hills with the Choctaw County Walking Club and occasionally joining a community softball league, roots for the Birmingham Barons minor‑league
    baseball team and follows the Atlanta Falcons during football season, using group exercise as both a social outlet and a stress‑relief routine.
  arts: Wendy Nichols, an avid watercolorist who captures Alabama’s pastoral barns, crafts hand‑stitched quilts while listening to Bill Monroe and Alison Krauss, and builds atmospheric sets for the local
    community theater’s production of 'Our Town', channels her creative energy into both visual and performing arts.
  travel: Wendy Nichols, who plans leisurely road trips each spring to music‑rich Nashville, historic Savannah, and the mountain vistas of Asheville, balances a modest travel budget by staying in family‑run
    B&Bs and prefers itineraries that blend cultural festivals with opportunities to sketch landscapes, often coordinating trips with fellow quilting circle members.
  culinary: Wendy Nichols, who cooks at an intermediate level, delights in preparing shrimp and grits with smoked paprika, collard greens simmered with ham hocks, and buttery cornbread infused with fresh
    thyme, while also savoring the occasional bite of spicy jambalaya featuring andouille sausage and okra.
  core: Wendy Nichols blends rugged construction expertise with a vivid artistic soul, championing community harmony while quietly wrestling with chronic stress and a penchant for splurging on watercolor
    supplies.
background:
  cultural: Wendy’s upbringing in Butler, Alabama, has instilled in her a deep appreciation for Southern hospitality, close‑knit community values, and a tradition of self‑reliance. The cultural fabric of
    Choctaw County—marked by church gatherings, local festivals, and intergenerational storytelling—has shaped her cooperative nature and her emphasis on harmony in group settings. While her heritage is
    rooted in the broader white Southern culture, she embraces the region’s artistic legacy, from folk crafts to acoustic music, and integrates these influences into both her work and leisure pursuits.
    This background also informs her practical work ethic, respect for hard labor, and desire to give back to the community that has supported her throughout her life.
attributes:
  skills: '[''Framing'', ''Concrete finishing'', ''Masonry'', ''Power‑tool operation'', ''Blueprint reading'', ''Safety compliance'', ''Team coordination'', ''Creative problem solving'', ''DIY home‑decor
    crafting'', ''Mentorship'']'
  hobbies: '[''Watercolor painting'', ''Community theater set design'', ''Quilting'', ''Neighborhood block parties'', ''Volunteer clean‑up events'', ''Folk and bluegrass music appreciation'']'
  career_goals: Wendy aspires to transition from laborer to foreperson or site supervisor, aiming to earn OSHA 30‑hour certification and a state‑approved construction safety officer credential within the
    next two years. She hopes to leverage her curiosity for sustainable building by learning green construction methods and eventually lead projects that incorporate reclaimed materials and low‑impact designs.
    In the longer term, Wendy envisions starting a small side business offering bespoke home‑renovation services that blend structural work with artistic touches, such as custom‑stamped concrete patios
    and hand‑crafted interior accents. A personal ambition is to become a mentor and advocate for other women entering the construction trades, fostering a supportive community on site.
