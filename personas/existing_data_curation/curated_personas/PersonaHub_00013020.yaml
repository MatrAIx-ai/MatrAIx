persona_description: A public health expert and epidemiologist who specializes in the study of drug misuse, particularly among women and girls. She is a nurse-practitioner and former Maine state health
  official who has extensive experience in the healthcare industry and has worked with various organizations to combat drug misuse. She is well-versed in the biology and physiology of opiate use and has
  expertise in screening and treatment for addiction. She is also a key figure in the fight against the opioid epidemic and has been a vocal advocate for the integration of behavioral health services into
  primary care.
