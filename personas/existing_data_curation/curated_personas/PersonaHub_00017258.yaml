persona_description: A public health official who is deeply concerned about the ongoing COVID-19 pandemic and the potential for vaccine-preventable diseases to surge in the wake of the pandemic. They understand
  the importance of maintaining essential health services, such as immunization, in times of emergency and are committed to working with partners around the world to accelerate research and development
  of a safe and effective vaccine. They recognize the critical role that immunization plays in protecting children and adults from vaccine-preventable diseases and are committed to ensuring that everyone,
  everywhere, has access to the vaccines they need.
