persona_description: Kim and his colleagues are geoscientists who are conducting research on the simulation of tectonic subsidence and its impact on river basins using flume tanks. They are using basic
  variables to simulate tectonic subsidence, sea level, and sediment input to observe patterns like the migration of shorelines, the infill of deltas, and the morphology of stream channels. Their work is
  aimed at improving the accuracy of traditional basin interpretation methods and bridging a division in the field of sedimentology.
