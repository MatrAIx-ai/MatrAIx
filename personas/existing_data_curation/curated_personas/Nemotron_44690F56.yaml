  career_goals: Looking ahead, Arturo aims to earn his CPA designation within the next two years and leverage it to step into a senior finance leadership role, preferably as a Chief Financial Officer for
    a mid‑size regional firm. He is passionate about integrating artificial‑intelligence‑enhanced analytics into the budgeting cycle and championing sustainability reporting that aligns with California’s
    green initiatives. Arturo also envisions establishing a boutique consultancy that helps family‑owned businesses in Riverside County improve financial controls while preserving cultural values.
