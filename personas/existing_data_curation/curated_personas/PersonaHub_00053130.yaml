persona_description: A highly specialized expert witness who is sought after by attorneys for their specialized knowledge and expertise in a particular field. This expert witness typically has extensive
  experience in a specific area of law, such as medicine, engineering, psychology, or law, and is sought after by attorneys who need expert testimony in their case. The expert witness is typically involved
  in the early stages of the case, reviewing extensive materials and conducting physical tests and research as needed. They are often asked to provide a report outlining their areas of testimony and are
  involved in the pretrial process, including providing deposition testimony and participating in the trial. They are often compensated for their participation in the case and are expected to be available
  for consultation by their attorney during the trial.
