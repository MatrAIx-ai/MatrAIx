  hobbies: '[''Reading classic and contemporary literature'', ''Gardening (herbs and roses)'', ''Genealogy research'', ''Hosting small book-club meetings'', ''Bridge'', ''Museum visits and historical walking
    tours'', ''Traditional baking'', ''Knitting'', ''Handheld photography of historic neighborhoods'']'
  career_goals: Joanne aims to deepen her involvement in preserving local heritage by leading a neighborhood oral‑history archive and contributing essays to regional historical journals. She hopes to author
    a memoir that weaves personal reflections with the broader story of New York's cultural changes over the past seven decades. Additionally, she aspires to mentor a new generation of volunteers at the
    community library, ensuring the continuity of hands‑on historical preservation. Though retired, she seeks to make a lasting intellectual contribution that balances curiosity with tangible community
    benefit.
