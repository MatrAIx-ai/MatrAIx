personas:
  professional: Joanne Hamilton, a retired community historian and grant‑writer, blends meticulous archival research with pragmatic project coordination, leading a neighborhood oral‑history archive while
    mentoring volunteers and securing modest foundation funds, and they approach each task with a balance of curiosity and practicality.
  sports: Joanne Hamilton enjoys leisurely morning walks in Central Park, follows the New York Knicks during basketball season and the New York Yankees in the summer, participates in a senior bridge club
    that doubles as a gentle social exercise, and they attend weekly tai chi sessions at the local community center to stay fit.
  arts: Joanne Hamilton curates a home library featuring works by William Faulkner, Toni Morrison, and poems by T.S. Eliot, attends off‑Broadway productions starring Audra McDonald, and they frequently
    listen to folk singer Joan Baez while knitting scarves.
  travel: Joanne Hamilton prefers carefully planned, low‑stress trips that blend historic tours and garden visits, having explored the colonial streets of Williamsburg, the botanical gardens of Kyoto, and
    the historic districts of Boston, while they hope to one day wander the cobblestones of Edinburgh’s Old Town.
  culinary: Joanne Hamilton delights in baking apple‑cinnamon scones and rosemary‑infused focaccia using fresh herbs from her garden, enjoys preparing classic New York‑style bagels topped with smoked salmon
    and capers, and they often savor a simple lemon‑garlic pasta finished with fresh basil.
  core: Joanne Hamilton, a gentle archivist driven by curiosity and practicality, tends to over‑organize her herb garden, forgets to water the roses during rainy weeks, and hums T.S. Eliot verses while
    sorting old photographs.
background:
  cultural: Joanne was raised in mid‑century suburban New York State in a family of English and Irish ancestry. Her upbringing reflected mainstream white American values of self‑reliance, community service,
    and an appreciation for cultural institutions such as libraries and museums. The cultural milieu of post‑war America, with its emphasis on education, civic responsibility, and gradual social change,
    shaped her respect for tradition while nurturing an openness to new ideas. Living in New York City for several decades, she absorbed the city's rich artistic and historical tapestry, which she now integrates
    into her personal and community pursuits.
attributes:
  skills: '[''Archival research'', ''Historical document editing'', ''Grant writing'', ''Community outreach'', ''Project coordination'', ''Budget management'', ''Digital archiving'', ''Literary analysis'',
