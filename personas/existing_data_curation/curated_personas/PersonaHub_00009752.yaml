persona_description: 'A historian who is interested in the early American Republic, particularly Virginia''s role in the Revolution and its early republic. They are a legal scholar with a Juris Doctorate
  from the University of Texas School of Law and a Ph.D. in History from the University of Virginia. They appreciate the importance of Virginia''s role in the formation of the United States and its early
  republic and are familiar with key players such as John Taylor of Caroline, George Mason, and Patrick Henry. They are a fan of Tom Woods and Kevin Gutzman''s book "The American Revolution: A New History"
  and have read other works by the authors. They are also interested in the events of the early American Republic and the first mention of interposition and nullification.'
