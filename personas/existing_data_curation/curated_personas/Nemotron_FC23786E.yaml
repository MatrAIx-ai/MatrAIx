personas:
  professional: Cody Bocwinski, a seasoned HR professional with a STEM background, leverages analytical rigor and interpersonal finesse to optimize HRIS, design equitable compensation frameworks, and mediate
    employee relations while championing data-driven talent strategies and a compassionate workplace culture.
  sports: Cody Bocwinski, an avid beach‑volleyball player at Del Mar and regular surfer with the San Diego Surf Club, spends weekends hiking the coastal trail network, cheers for the San Diego Padres, and
    participates in charity runs organized by local community groups.
  arts: Cody Bocwinski, a frequent patron of the Museum of Contemporary Art San Diego and the Old Globe Theatre, enjoys live acoustic sets by Jack Johnson and Nora En Pure, collects vintage surf‑inspired
    photography, and finds creative inspiration for their wellness workshops in the visual arts.
  travel: Cody Bocwinski, who blends a love for coastal relaxation with a curiosity for Mediterranean culture, plans annual trips to Southern California wine regions like Paso Robles, dreams of exploring
    the Amalfi Coast, and prefers well‑researched itineraries that balance adventure hiking with leisurely beach time while staying within a mid‑range budget.
  culinary: Cody Bocwinski, a self‑taught cook of healthy Mediterranean‑inspired cuisine, regularly prepares grilled branzino with olive‑oil‑lemon drizzle, chickpea‑tabbouleh salads, and pairs meals with
    crisp Sauvignon Blanc or rosé, while experimenting with new spice blends and occasionally indulging in late‑night pizza delivery as a guilty pleasure.
  core: Cody Bocwinski, a data‑driven HR strategist with a sunny‑coast lifestyle, balances a relentless curiosity for tech gadgets and people‑centric compassion with a penchant for worry, beach volleyball,
    and mindful cooking.
background:
  cultural: Cody grew up in a middle‑class, white American family in Southern California during the late 1970s and 1980s, a period marked by rapid technological growth and a burgeoning beach‑side lifestyle.
    His upbringing blended typical West Coast values—individualism, environmental appreciation, and a health‑conscious mindset—with mainstream American cultural traditions such as celebrating Thanksgiving,
    Christmas, and the Fourth of July. Living in Del Mar, he is immersed in the coastal surf culture, enjoys the region's culinary diversity, and often engages with a multicultural community, which has
    broadened his perspective beyond his own heritage. This mixture of regional, professional, and generational influences informs his open, outgoing personality while grounding him in practical, data‑oriented
    thinking.
attributes:
  skills: '["HRIS management", "Data‑driven workforce analytics", "Talent acquisition and sourcing", "Employee relations and conflict mediation", "Performance management system design", "Compensation and
    benefits analysis", "Compliance with California labor law", "Training and development facilitation", "Project and process improvement management", "Change management", "Employee wellness program development",
    "Strategic workforce planning"]'
  hobbies: '["Beach volleyball", "Surfing", "Coastal hiking", "Raspberry Pi electronics projects", "Cooking Mediterranean cuisine", "Wine tasting and pairing", "Mindfulness meditation", "Journaling", "Volunteering
    at community shelters", "Participating in charity runs and local trivia nights"]'
  career_goals: Cody aims to transition from his current HR operational role to a senior strategic position, such as HR Business Partner or Director of People & Culture, where he can influence company‑wide
    talent strategy and embed data‑centric decision‑making throughout the organization. He plans to earn his SHRM‑Senior Certified Professional (SHRM‑SCP) credential and deepen his expertise in HR analytics
    and organizational development. Long‑term, he envisions leading initiatives that improve employee mental health and resilience—areas that personally resonate with his own experience of stress—while
    also mentoring emerging HR professionals in the San Diego region. Ultimately, he hopes to leave a legacy of a more compassionate, yet performance‑focused, workplace culture.
