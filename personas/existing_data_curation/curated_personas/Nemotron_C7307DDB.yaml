personas:
  professional: Nicole Tabor, a budding digital creator and junior LEGO architect, channels curiosity and organized flexibility into designing imaginative Scratch games and intricate brick structures, while
    their cooperative nature makes them a go‑to helper for classmates during art club projects.
  sports: Nicole Tabor, an enthusiastic fan of the New Orleans Saints and LSU Tigers, spends Saturday mornings playing in a local youth soccer league and joins family fishing trips that double as low‑impact
    cardio, while preferring the occasional splash in the community pool over organized drills.
  arts: Nicole Tabor, an avid watercolor painter who studies Monet’s pastel palettes and Frida Kahlo’s bold self‑portraits, dances to Louis Armstrong jazz and Zydeco melodies at family gatherings, and showcases
    handcrafted LEGO sculptures at community craft fairs.
  travel: Nicole Tabor, who dreams of exploring the mangrove swamps of the Atchafalaya Basin, has already toured the historic French Quarter of New Orleans, collected shells on Gulf Coast beaches, and hopes
    to visit Disney World’s Magic Kingdom next summer.
  culinary: Nicole Tabor, a junior baker who loves mixing chocolate chip cookie dough with parents, relishes spicy gumbo and sweet beignets, and delights in decorating plates with fresh basil from the backyard
    garden.
  core: Nicole Tabor blends relentless curiosity with a tidy yet spontaneous spirit, turning every day into a watercolor‑splash of art, code, and outdoor discovery—though they occasionally lose track of
    homework amid cookie crumbs.
background:
  cultural: Nicole was raised in Youngsville, Louisiana, a small town in Vermilion Parish where Southern hospitality and Cajun heritage blend into everyday life. Her family attends a local church and participates
    in community events such as Mardi Gras parades, county fairs, and church picnics. She grew up hearing French‑influenced Cajun music, enjoying dishes like gumbo, jambalaya, and crawfish boils at family
    gatherings, and learning the value of close‑knit neighborhood friendships. While she experiences mainstream American school life, the rhythms of the bayou, the hospitality of her community, and the
    rich cultural traditions of the region shape her worldview and creative expression.
