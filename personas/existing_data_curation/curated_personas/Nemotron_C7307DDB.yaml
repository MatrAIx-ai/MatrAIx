    and community craft fairs'']'
  career_goals: Nicole dreams of becoming an artist who can turn her vivid ideas into paintings and illustrations, and she is also fascinated by science, hoping someday to explore marine life as a marine
    biologist. She values helping others, so she imagines one day teaching kids about art and nature, creating projects that blend creativity with discovery.
