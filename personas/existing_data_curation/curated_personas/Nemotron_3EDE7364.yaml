personas:
  professional: Andrew Alicea is a veteran industrial maintenance specialist who leverages three decades of expertise in high‑temperature refractory equipment, precision welding, and sensor‑driven predictive
    analytics to design rigorous preventive‑maintenance programs, while channeling a disciplined, skeptical eye into training apprentices in both English and Spanish, aiming for a senior technical trainer
    role and NICET Level III certification.
  sports: Andrew Alicea maintains his fitness through disciplined morning walks, weekend woodworking‑related strength training, and a membership in the local senior baseball league while cheering for the
    Houston Astros, following the Dallas Cowboys' season, and occasionally attending Houston Rockets games, reflecting his methodical yet competitive approach to sport.
  arts: Andrew Alicea enriches his evenings with the rhythms of Vallenato and cumbia legends like Carlos Vives and Celso Piña, savoring classic literature from Charles Dickens and Gabriel García Márquez,
    while his hand‑crafted scale models serve as a personal gallery of industrial art that satisfies his curiosity and love of order.
  travel: Andrew Alicea favors well‑planned trips that blend technical curiosity and cultural immersion, having explored the historic steelworks of Bilbao, the colonial architecture of Cartagena, and dreaming
    of a pilgrimage to the precision engineering museums of Tokyo, all while balancing family obligations and a modest travel budget.
  culinary: Andrew Alicea excels at preparing traditional Colombian dishes such as ajiaco, bandeja paisa, and empanadas, meticulously seasoning with cilantro, cumin, and achiote, and enjoys pairing them
    with freshly harvested garden vegetables like okra and plantains, reflecting his disciplined, hands‑on culinary style.
  core: Andrew Alicea is a disciplined, curiosity‑driven mechanic‑teacher who balances competitive ambition with a reserved demeanor, channeling his love of order into meticulous maintenance, precise cooking,
    and strategic financial planning, while occasionally letting skepticism hinder collaboration.
background:
  cultural: Andrew was born to Colombian immigrants who settled in Queens in the early 1970s. Growing up in a bilingual household, he learned Spanish from his parents while navigating the multicultural
    environment of New York City. Family gatherings centered around shared meals of arroz con pollo, arepas, and sancocho, and celebrations of Colombian holidays such as Día de la Independencia and Carnaval
    de Barranquilla. The values of ‘trabajo duro,’ family cohesion, and respect for elders shaped his disciplined work ethic. Although fully integrated into American society, he remains active in the local
    Colombian community, attending cultural festivals, supporting a neighborhood soccer league, and preserving traditional music in his home.
