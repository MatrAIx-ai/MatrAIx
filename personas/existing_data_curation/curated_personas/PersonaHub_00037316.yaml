persona_description: Sir Edward Coley Burne-Jones was a British painter who was known for his work in watercolors and oils, particularly in the Aesthetic Movement, which promoted the art of nature and beauty.
  He was also a skilled designer of ceramic tiles, stained glass, jewelery, tapestries, theater sets, and illustrations. Burne-Jones's work was characterized by his use of imagination and romantic detail,
  and his switch from watercolors to oil was born of accident and necessity, but continued it throughout his life. He was a perfectionist and a bit of a perfectionist, with a love of ancient legend. He
  was under constant pressure of his own ideas and was deeply affected by the death of his friend and colleague William Morris. Burne-Jones was skilled in designing ceramic tiles, stained glass, jewelery,
  tapestries, theater sets, and illustrations. He painted on canvas, but his preliminary drawings were often made on vellum, or animal skin. He became a leader of the new Aesthetic Movement, which promoted
  the art of nature and beauty, with his work The Beguiling of Merlin, and opposed traditional classicism.
