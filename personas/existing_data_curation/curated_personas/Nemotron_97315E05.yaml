personas:
  professional: April Sengupta, an 18-year-old structural steel apprentice, blends rigorous welding expertise (MIG and SMAW) with a keen eye for design, using AutoCAD to draft precise layout plans while
    sketching industrial silhouettes on site, and their methodical, organized approach makes them a natural leader in safety compliance and quality inspection on construction crews.
  sports: April Sengupta, an avid hiker of the Mount Pleasant forest trails, also plays recreational soccer with the local River City Rovers club, follows the Pittsburgh Steelers for NFL action, and supports
    the collegiate Wildcats basketball team, while their training routine combines cardio hikes on weekends with strength workouts using a portable weight set.
  arts: April Sengupta, a charcoal sketcher of industrial vistas and creator of small metal sculptures, frequents the downtown Modern Art Gallery, draws inspiration from Ai Weiwei's steel installations
    and the lo-fi folk sounds of Sufjan Stevens, and is a regular at DIY maker fairs where they collaborate with local ceramicist Maya Rivera.
  travel: April Sengupta, who prefers meticulously planned road trips, has trekked the Grand Canyon's South Rim, explored the steel-rich cityscape of Detroit's Riverfront, and dreams of a summer backpacking
    tour through the Czech Republic's historic metalworking towns, all while budgeting expenses by staying in youth hostels and using ride-share apps.
  culinary: April Sengupta, a home-cooking enthusiast with a knack for smoky flavors, often prepares charcoal-grilled salmon, hand-rolled veggie tacos with chipotle-lime sauce, and a signature roasted beet
    and goat cheese salad, while they experiment with cast-iron skillet souffles and keep a soft-serve vanilla ice cream stash for post-workout treats.
  core: April Sengupta, a steel-savvy art lover, schedules their life like a blueprint, swaps a welding torch for a sketchpad during coffee breaks, and can’t resist a spontaneous hike or a late-night indie
    folk playlist, even if it means a few missed deadlines.
background:
  cultural: April was raised in Mount Pleasant, Michigan, within a family that blends traditional Midwestern white values with subtle South Asian influences reflected in her surname. Her upbringing emphasized
    hard work, community involvement, modesty, and respect for skilled trades, while family stories and occasional celebrations of Indian festivals introduced her to a broader cultural perspective. This
    mix fosters a deep appreciation for craftsmanship, a curiosity toward diverse artistic expressions, and an open‑minded attitude toward unconventional ideas.
attributes:
  skills: '[''MIG and SMAW welding'', ''Blueprint reading and interpretation'', ''Structural steel assembly and erection'', ''CNC plasma cutting operation'', ''AutoCAD drafting and layout'', ''Safety protocols
    and OSHA compliance'', ''Precise measurement and layout'', ''Quality inspection and testing'', ''Team coordination and communication'', ''Project planning and time management'']'
  hobbies: '[''Sketching industrial scenes'', ''Charcoal drawing'', ''Small metal sculpture projects'', ''Visiting local art galleries'', ''Attending DIY maker fairs'', ''Hiking in Michigan forests'', ''Listening
    to indie folk music'', ''Reading speculative fiction'', ''Volunteering at youth STEM outreach'', ''Photography of construction sites'']'
  career_goals: April aims to earn her Certified Structural Steel Inspector (CSSI) credential within the next three years and leverage that qualification to move into a supervisory role on large construction
    projects. In the long term, she envisions founding a boutique metal‑fabrication studio that blends functional structural components with artistic design, collaborating with architects and artists to
    create sculptural steel installations. To support this vision, she plans to pursue a bachelor’s degree in civil or structural engineering while continuing to refine her artistic skills and expand her
    professional network.
