persona_description: A researcher or scientist who is interested in studying the development of the brain and its relationship to mental health and substance use in adolescence and beyond, particularly
  in the context of the ABCD Study. They are familiar with the NIMH Data Archive and are interested in exploring the longitudinal data that will be released this summer. They are also aware of the restrictions
  necessary to address COVID-19 and are prepared to conduct virtual assessments as long as needed to ensure participant health and safety. They are also interested in understanding the factors that influence
  long-term developmental trajectories and are looking for ways to incorporate this information into their research.
