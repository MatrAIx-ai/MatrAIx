personas:
  professional: Michael Samedi, a 29‑year‑old journeyman carpenter in Cassville, Missouri, leverages his strong framing and finish‑carpentry expertise, precise blueprint reading, and quick on‑site problem‑solving
    while channeling his cooperative yet assertive demeanor into coordinating subcontractors and clients, a balance that reflects his preference for structure amid a relaxed attitude toward scheduling as
    he works toward a state‑certified carpentry license and plans to launch his own renovation and bespoke‑furniture business.
  sports: Michael Samedi stays fit by playing pickup basketball at Cassville’s Central Park and joining a weekend recreational soccer league, while also fishing the Ozark streams in spring and hunting with
    a local neighbors’ group in fall, cheering on the St. Louis Cardinals and the Kansas City Chiefs, and occasionally attending Missouri State Bears basketball games.
  arts: Michael Samedi, a gospel choir vocalist at his historic church, frequently improvises on keyboard during jam sessions, draws inspiration from Kirk Franklin and classic blues legends like B.B. King,
    and treats his woodworking projects as functional art, often listening to contemporary folk‑rock duo The Avett Brothers while sanding reclaimed furniture.
  travel: Michael Samedi prefers spontaneous road trips that blend outdoor adventure with cultural immersion, having explored the music scene of Nashville and the culinary heritage of New Orleans, dreaming
    of a future hike through the Canadian Rockies while saving for a workshop‑compatible cabin in the Ozarks.
  culinary: Michael Samedi, an avid home cook, masterfully prepares Southern comfort dishes like fried chicken with hot‑cayenne honey glaze, collard greens slow‑cooked with smoked turkey, and sweet‑potato
    pie spiced with nutmeg, while experimenting with seasonal ingredients such as fresh Ozark trout and heirloom tomatoes, and enjoys sharing these meals at community potlucks.
  core: Michael Samedi, a 29‑year‑old carpenter who juggles gospel singing, impromptu woodworking projects, and a habit of over‑booking social events despite a chronic tendency to misplace tools, approaches
    life with community‑driven generosity and a restless quest for structure.
background:
  cultural: Michael is an African‑American who grew up in Cassville, Missouri, where his family has lived for several generations after the Great Migration. His grandparents carried Southern culinary and
    musical traditions that blend with Midwestern community values. He was raised in a historically Black church that emphasized music, storytelling, and mutual support, shaping his sense of identity and
    responsibility. Though the local Black community is modest in size, it fosters strong family ties, church involvement, and a culture of helping neighbors, influencing Michael's cooperative yet assertive
    personality and his desire to give back through mentorship and community service.
