  career_goals: Michael aims to transition from being a journeyman carpenter to owning a small contracting business that specializes in custom home renovations and bespoke furniture. He plans to earn a
    state‑recognized carpentry certification and eventually become a lead carpenter on larger commercial projects. In parallel, he hopes to establish a mentorship program for local youth interested in trades,
    providing hands‑on training and career guidance. Financially, he seeks stable income to purchase a home in Cassville and build a workshop where he can pursue creative woodworking projects while maintaining
    a flexible schedule that balances work and personal well‑being.
