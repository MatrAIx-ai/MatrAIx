  hobbies: '[''Digital drawing and illustration'',''Robotics club projects'',''Basketball (team sport)'',''Competitive online gaming'',''Reading science‑fiction'',''Listening to technology podcasts'']'
  career_goals: Christopher aims to combine his love for technology and art by eventually becoming a video game designer or interactive media developer, creating games that tell diverse stories and incorporate
    striking visual styles. He also envisions a future where he could lead a multidisciplinary team—perhaps at a tech startup or a creative studio—where his organizational prowess, critical eye, and collaborative
    energy can drive innovative products. In the shorter term, he plans to earn a scholarship to a specialized STEM high school, win regional robotics competitions, and build a strong portfolio of digital
    artwork for college admissions.
