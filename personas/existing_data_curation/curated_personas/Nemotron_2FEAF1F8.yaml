personas:
  professional: Chun Li, a 37‑year‑old commercial driver with a Class A CDL, blends meticulous route‑planning, bilingual customer service, and a flair for visual branding into a career that turns every
    delivery into a safe, efficient, and artistically memorable experience.
  sports: Chun Li passionately follows the Los Angeles Lakers and Dodgers, plays pickup basketball at Pomona’s Fairplex Park on weekends, and supplements their fitness regimen with consistent Tai Chi practice
    as a low‑impact way to stay limber for the road.
  arts: Chun Li is a regular at Los Angeles galleries featuring Julie Mehretu’s abstract paintings and Kelsey Montague’s vibrant street murals, frequently sketching these inspirations to create custom truck
    graphics that merge contemporary art with commercial branding.
  travel: Chun Li favors spontaneous weekend road trips along the Pacific Coast Highway, has explored Portland’s food‑truck scene and Taipei’s night markets, and dreams of a cross‑country drive tracing
    historic Route 66 to the Route 66 Museum in Oklahoma City.
  culinary: Chun Li is a devoted food‑truck connoisseur who samples Korean kimchi tacos, Japanese takoyaki, and Mexican elote, while at home mastering Taiwanese beef noodle soup, braised pork belly (lu
    rou fan), and experimenting with five‑spice‑seasoned quinoa bowls.
  core: Chun Li balances an imaginative drive for artistic branding with impulsive late‑night food‑truck binges, a habit of over‑scheduling community events, and an unwavering commitment to log every mile
    with meticulous detail.
background:
  cultural: Chun Soon Li is a second‑generation Chinese‑American whose parents emigrated from Taiwan to Southern California in the 1980s. Raised in the Inland Empire, he grew up bilingual, speaking Mandarin
    at home and English at school. He observes traditional customs such as Lunar New Year celebrations, mooncake making, and the Mid‑Autumn Festival, while also embracing the multicultural vibrancy of Los
    Angeles County. The Confucian emphasis on harmony, respect for elders, and collective well‑being shaped his cooperative and considerate nature. At the same time, exposure to diverse artistic scenes
    and the entrepreneurial spirit of the region fostered his curiosity for novelty, abstract concepts, and creative expression.
attributes:
  skills: '[''Class A CDL Safe Driving'', ''Route Planning & Optimization'', ''Logistics Coordination'', ''Customer Relationship Management'', ''Sales & Negotiation'', ''Vehicle Maintenance & Inspection'',
