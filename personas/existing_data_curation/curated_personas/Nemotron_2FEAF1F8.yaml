  hobbies: '[''Sketching & Digital Illustration'', ''Street Photography'', ''Exploring Food Trucks & Taiwanese Cuisine'', ''Driving Simulation Video Games'', ''Attending Art Exhibitions'', ''Tai Chi'',
    ''Community Volunteering'', ''Cultural Festival Participation'']'
  career_goals: Chun aspires to transition from hands‑on driving to a leadership role in the transportation industry. His short‑term goal is to earn a Certified Transportation Professional (CTP) credential
    and take on fleet‑supervisor responsibilities, overseeing scheduling, compliance, and driver mentorship. Long‑term, he envisions launching his own eco‑focused logistics start‑up that combines efficient
    last‑mile delivery with artistic branding, turning each truck into a moving canvas that celebrates local culture. He also aims to become a frequent speaker at regional transportation conferences, sharing
    insights on safety, customer service, and creative branding, while mentoring new drivers from immigrant backgrounds.
