  hobbies: '[''Woodworking hobby projects'', ''Fishing'', ''Hunting'', ''Reading historic architecture and sustainability books'', ''Grilling Southern barbecue'', ''Playing acoustic guitar at church gatherings'',
    ''Camping in local state parks'', ''Volunteer work with Habitat for Humanity'', ''Attending small community potlucks'', ''Listening to classic country and blues music'']'
  career_goals: Cameron aims to become a master carpenter and eventually launch his own small contracting firm focused on sustainable, locally sourced building projects in the Webster Parish area. He plans
    to earn NCCT (National Center for Construction Education and Research) certifications and an advanced OSHA certification to enhance his credibility. Over the next five years, he hopes to specialize
    in historic home restoration, combining his practical carpentry skills with his curiosity about traditional building methods. He also aspires to mentor youth through Habitat for Humanity, passing on
    his trade knowledge while strengthening community ties.
