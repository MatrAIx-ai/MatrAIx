  hobbies: '[''Chess'', ''Crossword puzzles'', ''Sudoku'', ''Vegetable gardening'', ''Model train building'', ''Volunteering teaching seniors'', ''Fishing'', ''Hiking Greenbelt trails'']'
  career_goals: 'Looking ahead, Albert aims to transition into a senior IT operations or service‑delivery manager role where he can lead a support team, drive process improvements, and introduce automation
    to reduce ticket resolution times. He plans to earn advanced certifications such as ITIL Expert, Microsoft Certified: Azure Administrator, and CompTIA Security+ to broaden his strategic perspective.
    Mentoring junior technicians and shaping the department’s service standards are also central to his ambition, while he remains open to contributing to larger projects like infrastructure migrations
    for the organization.'
