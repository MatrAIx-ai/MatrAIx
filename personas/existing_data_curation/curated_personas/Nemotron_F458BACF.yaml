personas:
  professional: A 2-year-old named Luis Margarejo, who loves arranging colorful stacking cups and patterning them by size, already demonstrates an emerging knack for organization blended with free-form
    creativity, approaching playtime with the curiosity of a budding designer and the social energy of a little leader in group games, and they gleefully share their creations with peers.
  sports: A 2-year-old named Luis Margarejo darts around the backyard and local park, clutching a red soccer ball while proudly wearing a Manchester United jersey, and regularly joins the Tiny Tots soccer
    club that practices weekly, reflecting his boundless energy and love for teamwork, and they thrive on the camaraderie of group play.
  arts: A 2-year-old named Luis Margarejo spends hours with a set of thick crayons, often recreating the bright animal illustrations from Eric Carle picture books and dancing to the Baby Shark song by Pinkfong,
    illustrating how visual color and rhythmic music shape his joyful play, and they proudly display their artwork on the fridge.
  travel: A 2-year-old named Luis Margarejo enjoys short family road trips to the nearby zoo and a sandy beach, giggling at the sight of giraffes and building sandcastles, and now day‑dreams about a future
    visit to Disneyland in Anaheim, where the promise of castles and rides fuels their imagination, and they often point excitedly at travel brochures with tiny fingers.
  culinary: A 2-year-old named Luis Margarejo favors creamy macaroni-and-cheese, crunchy chicken nuggets dipped in ketchup, and sweet banana slices, eagerly stirring mashed potatoes with a plastic spoon
    while they proudly insist on avoiding the green broccoli florets on the plate, revealing a palate that loves comfort and texture but resists green veggies.
  core: Luis Margarejo, a bubbly 2-year-old with an insatiable curiosity for colors, patterns, and social play, constantly organizes his toys while daringly re-arranging them, and they show both tender
    perseverance and a lovable habit of hiding objects in their pockets for later treasure hunts.
background:
  cultural: Luis is raised in a Mexican‑American household in Sparks, Nevada. Spanish is spoken daily at home, and family gatherings celebrate traditions such as Día de los Muertos, Mexican Independence
    Day, and festive meals of tacos, tamales, and pozole. The family participates in local cultural events at the community center, where Luis learns traditional dances and songs. While he is immersed in
    his Mexican heritage, he also experiences the broader Nevada environment—desert landscapes, winter snow festivals, and the multicultural vibe of the Reno‑Sparks area—creating a bicultural identity that
    blends Mexican roots with the rhythms of his Nevada community.
