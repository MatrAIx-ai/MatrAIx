  career_goals: Although only two years old, Luis already voices simple dreams that blend his love of helping others with his creative spark. He frequently points to fire trucks on the street and says he
    wants to be a firefighter who rescues people. He also enjoys watching adults paint and sometimes declares he wants to be an "artist" who makes big, colorful pictures. In play, he likes pretending to
    be a teacher sharing songs and stories. These nascent ambitions reflect his curiosity about new ideas, his desire to contribute to his community, and his appreciation for artistic expression.
