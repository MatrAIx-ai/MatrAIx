persona_description: Katherine Coleman Goble Johnson, an African-American physicist and mathematician known for her contributions to the United States' aeronautics and space programs with the early application
  of digital electronic computers at NASA, is likely to be interested in the above text. She is an expert in celestial navigation, having conducted technical work at NASA that spanned decades. Her calculations
  were critical to the success of many missions, including the early NASA missions of John Glenn and Alan Shepard, and the 1969 Apollo 11 flight to the Moon. Johnson's expertise in celestial navigation
  and her ability to accurately calculate trajectories, launch windows, and emergency back-up return paths for flights are likely to be of interest to individuals who are passionate about space exploration
  and the development of advanced technologies.
