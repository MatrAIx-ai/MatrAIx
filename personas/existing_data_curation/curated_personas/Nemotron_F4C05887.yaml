  career_goals: He aims to develop a personal portfolio of his photography and organize a small community exhibition that showcases both his images and Mexican folk art. He plans to mentor younger artists
    in his neighborhood by leading a weekly art‑learning circle at the local senior center. He also hopes to compile and self‑publish a family cookbook that blends traditional Mexican recipes with his own
    variations, preserving his cultural heritage for future generations. Maintaining his health is a priority, so he is training for a senior walking challenge and strives to keep his home organized for
    independent living.
