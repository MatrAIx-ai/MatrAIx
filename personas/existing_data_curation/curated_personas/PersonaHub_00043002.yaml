  engine failures and other technical issues. Is well-versed in the latest space exploration technologies and has a keen interest in developing new communication strategies and systems for space missions.
  Is dedicated to saving the Phobos-Grunt mission and is working tirelessly to maintain communication with the spacecraft and gain control over its operations.
