personas:
  professional: Riley Ferretti, a senior computer support specialist with two decades of hands‑on troubleshooting expertise, leverages an organized, cost‑focused mindset and disciplined documentation to
    streamline multi‑site IT services while channeling a competitive drive toward earning ITIL Expert and CCNA certifications and mentoring junior technicians toward pragmatic problem‑solving.
  sports: Riley Ferretti, a dedicated fan of the Cleveland Guardians, Browns, and Cavaliers, hikes regularly with the Cuyahoga Valley Hikers Club and participates in a senior tennis league at the local
    YMCA, approaching fitness with the same disciplined, competitive mindset they apply to classic car restoration.
  arts: Riley Ferretti volunteers backstage at the Lakewood Community Theater, where they help rig lighting for productions of Arthur Miller's Death of a Salesman and Stephen Sondheim's Into the Woods,
    while in their off‑stage hours they cherish the blues of B.B. King, enjoy the films of the Coen brothers, and collect vintage 1960s vinyl records that echo their love of meticulous craft.
  travel: Riley Ferretti prefers methodical road trips across the Midwest, having driven the historic Route 66 from Chicago to Santa Monica, yet dreams of a meticulously planned pilgrimage to the castles
    of Scotland’s Highlands, blending solitary exploration with a budget‑conscious itinerary that leaves room for occasional classic car rallies in Germany.
  culinary: Riley Ferretti’s palate favors hearty Midwestern fare—smoked brisket with a dry rub of smoked paprika, garlic, and brown sugar, a perfectly seared steak with herb butter, and a weekend habit
    of grilling corn on the cob while experimenting with homemade pickles of cucumbers, carrots, and dill—reflecting a practical yet indulgent culinary style.
  core: Riley Ferretti, a disciplined tech veteran with a competitive streak, melds a love for vintage cars, meticulous troubleshooting, and solitary hikes into a life where practicality meets curiosity,
    and occasional skepticism fuels their relentless pursuit of efficiency.
background:
  cultural: Riley is a second‑generation Italian‑American raised in the Rust Belt suburbs of Ohio. His family’s heritage emphasizes strong work ethic, close‑knit family ties, and modest celebration of Catholic
    traditions. Growing up in the Midwest, he absorbed values of practicality, community responsibility, and polite competitiveness. These cultural influences shape his disciplined approach to work, his
    commitment to local volunteer activities, and his appreciation for both new ideas and time‑tested methods.
attributes:
  skills: '[''Hardware diagnostics'', ''Windows and macOS operating systems'', ''Network configuration and troubleshooting'', ''ITIL service management'', ''Cybersecurity fundamentals'', ''Remote support
    tools (e.g., TeamViewer, LogMeIn)'', ''Database query basics (SQL)'', ''Project management (Agile and Waterfall)'', ''Technical documentation and SOP development'', ''Vendor management and procurement'']'
  hobbies: '[''Classic car restoration'', ''Woodworking'', ''Genealogy research'', ''Reading historical non-fiction'', ''Community theater volunteering'', ''Chess'', ''Gardening'', ''Hiking local trails'']'
  career_goals: Riley aims to transition from a senior support role into a leadership position where he can design and implement streamlined support processes across multiple sites. He plans to earn advanced
    certifications (ITIL Expert, Cisco CCNA) and mentor junior technicians, fostering a culture of disciplined problem‑solving. In the longer term, he hopes to launch a boutique consulting firm that leverages
    his business acumen and technical expertise to help small Midwest enterprises adopt cost‑effective digital solutions.
