  hobbies: '[''fishing'', ''small-game hunting'', ''woodworking'', ''reading true-crime nonfiction'', ''law-enforcement literature'', ''target shooting (small group)'', ''youth baseball coaching'']'
  career_goals: He aims to transition into a supervisory role within the next three years, seeking promotion to Sergeant so he can mentor new officers and influence department policies toward proactive
    community policing. He is also interested in earning the state‑approved Crisis Intervention Team (CIT) certification to better support individuals experiencing mental health crises, a goal driven by
    his empathy and desire for harmonious outcomes. Long‑term, he envisions a position as a training officer or a lieutenant overseeing community outreach programs, while maintaining a stable work‑life
    balance that protects his family and reduces stress.
