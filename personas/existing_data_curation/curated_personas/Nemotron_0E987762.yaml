  career_goals: Peter aims for a stable, structured career that leverages his organizational strengths and preference for clear expectations. He plans to complete his GED and pursue a community college
    program in logistics or emergency services. His long‑term ambition is to become a fire safety officer or an operations manager for a municipal service, roles that combine practical problem‑solving,
    teamwork, and community service. He also considers a path in IT support or network administration, attracted by the methodical troubleshooting and reliable service aspects of the job.
