persona_description: A geologist who specializes in monitoring and studying active rockslides in the Alps. He is part of the University of Strasbourg team that is currently monitoring the Pas de l’Ours
  landslide in the Queyras Valley in France. His expertise lies in the field of active rockslide monitoring, particularly in the use of ground-based SAR ( Synthetic Aperture Radar ) to measure the movement
  and deformation of the landslide. He has a strong interest in the potential risks posed by the landslide, such as the possibility of a large part of the mass collapsing suddenly and blocking the Guil
  river in the valley below. His research and monitoring efforts are aimed at ensuring the safety of the local communities and the surrounding areas.
