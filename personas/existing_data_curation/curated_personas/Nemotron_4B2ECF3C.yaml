personas:
  professional: Dale Perry, a budding mini-architect who spends afternoons arranging LEGO bricks into symmetrical towers, demonstrates a practical eye for structure and predictability, and while they take
    pride in completing each meticulously planned build, they can become upset if a piece doesn’t fit exactly as intended.
  sports: Dale Perry, a member of the Tiny Tykes Soccer Club and a devoted fan of Manchester United’s youth academy, practices dribbling a size-3 soccer ball each Saturday, enjoys swimming laps at the community
    pool, and while they cooperate well with teammates, they become frustrated when game rules are changed unexpectedly.
  arts: Dale Perry, an avid fan of animated movies, especially Pixar’s 'Toy Story', loves singing along to its soundtrack, idolizes voice actor Tom Hanks, spends free time drawing crayon sketches of Woody
    and Buzz, and despite their shy nature, they sometimes hide their artwork fearing criticism.
  travel: Dale Perry, an inquisitive traveler who enjoys family road trips to the Grand Canyon, where they meticulously follow a printed route map and count the number of rest stops, dreams of exploring
    Tokyo Disneyland’s colorful attractions, yet they get uneasy on long flights and prefer short drives.
  culinary: Dale Perry, a picky eater with a strong preference for creamy mac and cheese seasoned with sharp cheddar, insists on arranging food into neat rows on the plate, delights in homemade chicken
    nuggets flavored with paprika and carrot sticks, but can become irritable when vegetables are mixed into the dish.
  core: Dale Perry, a five-year-old who craves order in play, savings, and meals, worries over small imperfections, yet their vivid imagination and meticulous habits turn everyday routines into structured
    adventures.
background:
  cultural: Dale is raised in a suburban, middle-class American family in Sammamish, Washington. His household reflects typical Pacific Northwest values, emphasizing education, safety, and an appreciation
    for the outdoors. He celebrates mainstream American holidays such as Thanksgiving, Christmas, and Fourth of July, and participates in community events at the local library and park. The family's cultural
    practices include weekly family meals, a focus on routine schedules, and occasional attendance at a nearby church, providing a stable, structured environment that aligns with Dale's personality.
