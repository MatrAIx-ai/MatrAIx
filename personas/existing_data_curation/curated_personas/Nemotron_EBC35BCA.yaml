personas:
  professional: A future sports analytics enthusiast named Santiago Jones, a 14‑year‑old student, applies the structured discipline of midfield soccer and the quick problem‑solving of strategy video games
    to school projects; they envision turning data‑driven insights into a career in sports performance while balancing a love for routine with a relaxed attitude toward long‑term planning.
  sports: A dedicated midfield soccer player named Santiago Jones, a 14‑year‑old at Crandall Middle School, trains with the school team and local youth club Crandall Strikers, idolizes FC Dallas and the
    Mexico national team, and balances structured practice with spontaneous pickup games; they also follow the NBA’s San Antonio Spurs and cheer for the Dallas Cowboys during football season.
  arts: 'An avid guitarist and graphic‑novel fan named Santiago Jones, a 14‑year‑old, strums acoustic renditions of cumbia classics by Los Ángeles Azules and regional hits by Banda El Recodo while diving
    into graphic novels such as Spider‑Man: Into the Spider‑Verse and Maus; they blend cultural rhythm with visual storytelling, occasionally doodling comic panels during soccer downtime.'
  travel: A curious explorer named Santiago Jones, a 14‑year‑old, blends thoughtful planning with spontaneous road trips, often visiting the historic Mission San Antonio de Valero on weekends and dreaming
    of a family vacation to Oaxaca City for its vibrant markets; they prefer driving with a playlist of home‑grown music while balancing school commitments that limit extended travel.
  culinary: A budding home chef named Santiago Jones, a 14‑year‑old, loves helping prepare tacos al pastor, chicken mole poblano, and sweet tamales, mastering the use of corn masa, chipotle peppers, and
    cinnamon, yet they sometimes over‑salt the salsa when eager to impress friends; they enjoy experimenting with simple recipes while honoring family traditions.
  core: A structure‑loving yet relaxed 14‑year‑old named Santiago Jones mixes soccer strategy, video‑game tactics, and family‑rooted cooking, navigating teen life with a practical mindset, occasional impulsivity,
    and a penchant for balancing chores with creative hobbies.
background:
  cultural: Santiago grew up in a Mexican‑American household in Crandall, Texas, where Spanish is spoken daily alongside English. Family gatherings often center around shared meals of tacos, tamales, and
    mole, reinforcing the value of familismo. He celebrates cultural holidays such as Cinco de Mayo and Día de los Muertos, participating in community festivals that feature música norteña and folklorico
    dance. His parents instilled a strong work ethic and the importance of supporting extended family, while his school environment exposed him to a broader Texan culture. This bicultural upbringing gives
    him a flexible identity, bridging traditional Latino values with the practical, independent spirit of his Texas community.
attributes:
  skills: '[''Basic car maintenance (oil changes, tire rotation)'', ''Troubleshooting video game consoles and PC hardware'', ''Bilingual communication (English/Spanish)'', ''Team collaboration in school
