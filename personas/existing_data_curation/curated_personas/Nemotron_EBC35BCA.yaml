  hobbies: '[''Soccer (midfielder for school team)'', ''Video gaming (strategy and sports titles)'', ''LEGO building (especially Technic sets)'', ''Playing acoustic guitar'', ''Cooking traditional Mexican
    dishes with family'', ''Listening to cumbia and regional Mexican music'', ''Reading graphic novels'']'
  career_goals: Santiago aims to finish high school and earn a GED, then enroll in a vocational program to become a certified automotive technician. He envisions working at a local auto shop where he can
    apply his practical skills, earn a steady income, and eventually save enough to start his own small repair business. He also hopes to use his bilingual abilities to help other Hispanic teens navigate
    education and career pathways, giving back to his community while providing financial stability for his family.
