persona_description: A farmer who has experience with corn production and has conducted research on sulfur deficiency in corn. He is interested in improving corn yields and has found that sulfur applications
  can lead to a one-year increase in corn yield. He has a background in environmental and natural resources and has conducted research on soil type, cropping history, and crop planted to determine which
  acres should be treated with sulfur. He is familiar with the sources of sulfur and the benefits of using gypsum. He is a leader in the field of corn production and has a passion for improving yields through
  research and innovation.
