  hobbies: '["Building towers with chunky blocks","Singing and dancing to R&B and hip‑hop music","Listening to picture‑book stories","Outdoor playground activities (sliding, swinging, chase games)","Finger‑painting
    and simple crafts","Pretend cooking with toy kitchen","Group games with peers","Music and movement sessions"]'
  career_goals: Even at her age, Reshana enjoys imagining future roles. She frequently says she wants to be a teacher so she can share stories and help other kids learn, reflecting her caring nature. She
    also dreams of becoming a dancer, inspired by the rhythmic music she hears at home and in the neighborhood, and sometimes pretends to perform on a makeshift stage. These aspirations combine her love
    for helping others with a practical, hands‑on expression of movement and creativity.
