personas:
  professional: A budding block architect, Reshana Thornhill spends hours constructing elaborate LEGO towers while insisting on following the instruction booklet, balancing their curiosity for new designs
    with a practical need for stability.
  sports: Reshana Thornhill dashes into toddler gymnastics class on Mondays, proudly wears a tiny Los Angeles Dodgers cap inherited from a parent, and cheers loudly for the local community soccer team’s
    weekend matches.
  arts: Reshana Thornhill delights in drawing crayon rainbows while humming 'Baby Shark' and reenacting scenes from Disney’s 'Moana', idolizing the voice of Auli'i Cravalho and the playful choreography
    of the Wiggles.
  travel: Reshana Thornhill’s travel log reads like a series of snack‑filled road trips to the nearby zoo, a weekend stay at grandma’s farm in the countryside, and a magical day at Disneyland, all planned
    with a colorful map of stickers.
  culinary: Reshana Thornhill prefers the comforting blend of melted cheddar in macaroni and cheese, the sweet crunch of sliced strawberries, and insists on stirring the batter for banana muffins with a
    wooden spoon despite frequent splatters on the kitchen floor.
  core: Reshana Thornhill is a joyful, worry‑prone three‑year‑old who blends boundless curiosity with a surprisingly organized routine, often negotiating with stuffed friends over snack choices while keeping
    an eye on their beloved LEGO catalog.
background:
  cultural: Reshana grows up in a Black family rooted in the vibrant Bronx community. Her household blends African‑American traditions with the multicultural flavors of the borough, including the sounds
    of gospel, jazz, and contemporary hip‑hop that fill the home. Family gatherings often feature soulful music, shared meals of classic Southern comfort foods, and storytelling that honors both personal
    and communal histories. The neighborhood’s block parties, community center events, and local murals provide visual and auditory inspiration, reinforcing a sense of pride and belonging. Her parents emphasize
    community support, education, and practical life skills—encouraging Reshana’s curiosity while grounding her in routines like daily meals, bedtime reading, and respectful social interaction. This cultural
    tapestry shapes her worldview, fostering both a love for communal expression and a practical approach to everyday life.
attributes:
  skills: '["Follow simple two‑step instructions","Identify colors, shapes, and numbers up to ten","Use clear language to express needs and feelings","Stack blocks and manipulate small objects","Draw simple
