personas:
  professional: Adam Collier, a 31‑year‑old first‑line supervisor at a busy department store in North Richland Hills, leverages a blend of curiosity for retail technology and a practical, data‑driven approach
    to coaching staff, resolving conflicts, and optimizing daily operations, all while nurturing a compassionate, team‑first atmosphere that reflects their balanced personality.
  sports: Adam Collier enjoys casual basketball at the local park, follows the Dallas Cowboys fervently, roots for the Houston Rockets during NBA season, and joins a community hiking group for Texas Hill
    Country treks, integrating fitness into social outings while balancing team spirit and personal endurance.
  arts: Adam Collier’s evenings often feature the classic rock sounds of Led Zeppelin and The Rolling Stones, while they also attend live performances by local Texan country‑rock bands at community festivals,
    appreciating how music fuels their leadership readings and provides a soundtrack for weekend BBQ sessions.
  travel: Adam Collier prefers short, purposeful road trips that combine hiking in the Texas Hill Country, sampling regional barbecue in Austin, and occasional weekend getaways to New Mexico’s Santa Fe
    for art fairs, balancing a love of adventure with a limited budget and family responsibilities.
  culinary: Adam Collier enjoys mastering Texas‑style barbecue, regularly grilling brisket seasoned with a dry rub of paprika, brown sugar, and cumin over mesquite wood, while also experimenting with side
    dishes like jalapeño‑infused corn salad and homemade sweet tea, showcasing a solid yet playful cooking skill set.
  core: Adam Collier is a compassionate retail leader who balances curiosity with practicality, fuels weekends with hikes and BBQ, and occasionally forgets to log expenses, all while humming classic rock
    and dreaming of a sustainable boutique someday.
background:
  cultural: Adam was raised in a middle‑class suburban family in the Dallas‑Fort Worth metroplex, embodying a blend of Southern hospitality and Midwestern practicality common to many white Texans. His upbringing
    emphasized community service, family gatherings, and a strong work ethic. He grew up attending a local Methodist church, celebrating traditional holidays with a focus on togetherness, and developing
    a love for Texas barbecue, country music, and the outdoors.
