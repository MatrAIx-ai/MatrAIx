    casual basketball'', ''Following the Dallas Cowboys'', ''Attending community festivals'']'
  career_goals: Adam aims to step into a store manager position within the next two years, leveraging his associate's degree in Business Administration to complete a B.S. in Business Management focused
    on retail leadership. Long‑term, he envisions advancing to a district or regional manager role, where he can shape broader organizational culture and mentor emerging leaders. He also harbors an entrepreneurial
    ambition to open a community‑oriented boutique that emphasizes sustainable practices and personalized customer experiences.
