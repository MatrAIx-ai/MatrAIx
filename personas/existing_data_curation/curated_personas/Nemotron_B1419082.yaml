  career_goals: He aims to transition into a regional sales director role within the next three years, overseeing a team that serves luxury lifestyle and technology clients across Southern California. He
    also wants to build a reputation as a mentor, establishing a sales academy for new reps. Long‑term, he envisions launching his own boutique consultancy that helps high‑net‑worth families and businesses
    adopt sustainable purchasing practices, allowing him to balance a predictable income with flexible scheduling to spend more time with his family.
