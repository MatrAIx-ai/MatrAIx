  hobbies: '[''Paddleboarding'', ''Hiking (Santa Monica & Runyon Canyon)'', ''Golf'', ''Reading (fiction, philosophy, business)'', ''Cooking (Mediterranean cuisine)'', ''Wine tasting (California vintages)'',
