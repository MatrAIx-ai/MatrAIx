persona_description: A researcher in the field of electronics and energy, particularly focused on developing low-cost, disposable, and environmentally-friendly microbiobatteries for Internet of Disposable
  Things (IoDT). The researcher has expertise in developing small-size microbial fuel cells and has previously developed a biobattery that was low-cost, disposable, and environmentally-friendly. The researcher
  is currently working on integrating serially connected biobatteries with a DC-DC converter to enhance the power duration and improve the device's functionality. The researcher has received funding from
  the Office of Naval Research to support their research.
