    User 2: Okay, great. I''ll add you.

    User 1: Awesome.

    User 2: So, what else do you like to do for fun?

    User 1: I like to read, go to the movies, and hang out with friends.

    User 2: Nice! I like to do all of those things too.

    User 1: That''s cool.

    User 2: So, what are you doing this weekend?

    User 1: I''m not sure yet. What are you doing?

    User 2: I''m not sure either. We could hang out if you want.

    User 1: That would be fun.

