    User 1: Oh, me too! What do you play?

    User 2: I mostly play League of Legends and Overwatch.

    User 1: Nice! I used to play League of Legends a lot.

    User 2: Oh, really? What''s your rank?

    User 1: I was Diamond IV, but I haven''t played in a while.

    User 2: Oh, that''s cool. I''m Gold I.

    User 1: Nice! Maybe we could play sometime.

    User 2: Sure, that would be fun.

