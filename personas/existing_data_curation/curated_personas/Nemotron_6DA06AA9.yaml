personas:
  professional: Claudia Sierra, a seasoned electrical and electronic engineering technologist with expertise in circuit design, PLC programming, and CAD drafting, channels their innate curiosity and spontaneous
    problem‑solving style into leading interdisciplinary projects that fuse renewable micro‑grids with interactive art installations, while they mentor junior technicians despite a lingering struggle with
    strict organization and deadline management.
  sports: Claudia Sierra, an avid hiker who tackles the rugged trails of the Gila National Forest with the Gila Trail Hikers Club and cheers on New Mexico United during the soccer season while occasionally
    joining a weekend adult soccer league for cardio, balances a love of outdoor endurance with a relaxed attitude toward structured gym routines, and they often schedule hikes on weekends to recharge.
  arts: Claudia Sierra expresses their artistic soul through abstract canvases that weave traditional folk motifs with bold color palettes reminiscent of Frida Kahlo’s work, captures the stark New Mexican
    desert in black‑and‑white photography à la Ansel Adams, and strums the guitar at family gatherings to the rhythm of Carlos Santana, while they regularly attend the Albuquerque International Balloon
    Fiesta to absorb installations by contemporary visual artists such as Judy Baca.
  travel: Claudia Sierra prefers spontaneous, experience‑rich trips that blend hiking adventures with cultural immersion—having trekked the Patagonian Andes and explored the historic streets of Santa Fe,
    they dream of a future culinary‑and‑art pilgrimage to Oaxaca’s markets while balancing travel budgets with their consulting side‑business responsibilities.
  culinary: Claudia Sierra, a confident home cook, delights in reinventing classic dishes such as chiles en nogada and mole by incorporating New Mexican ingredients like roasted Hatch chilies and blue corn
    masa, expertly layering flavors of agave nectar and lime, while also savoring street‑taco‑style al pastor at local festivals and they occasionally treat themselves to gourmet dining at the Hatch Chile
    Farm-to-Table restaurant.
  core: Claudia Sierra blends a restless curiosity for emerging technology with a deep reverence for folk art, often improvising brilliant engineering solutions while they juggle a habit of misplacing project
    paperwork and an insatiable appetite for midnight guitar jams.
background:
  cultural: Claudia’s Mexican heritage is a central thread in her identity. Raised in a bilingual household, she grew up celebrating Día de los Muertos and other traditions that honor family, community,
    and craftsmanship. These cultural values shape her collaborative spirit and her respect for hands‑on work. The vibrant colors and storytelling of Mexican folk art influence her personal painting style
    and inspire her to incorporate cultural motifs into technical designs. Living in Bloomfield, NM, she blends the resilience and hospitality of her Mexican roots with the rugged, independent ethos of
    the Southwest, creating a unique perspective that informs both her professional approach and her community involvement.
attributes:
  skills: '[''circuit design'', ''PLC programming'', ''electrical troubleshooting'', ''instrumentation and sensor integration'', ''CAD drafting (AutoCAD, SolidWorks)'', ''power systems analysis'', ''bilingual
    communication (English/Spanish)'', ''creative problem solving'', ''team leadership and mentorship'', ''technical training'']'
  hobbies: '[''painting (abstract and folk-inspired)'', ''photography (landscape and street)'', ''hiking'', ''guitar playing'', ''cooking Mexican cuisine'', ''attending art festivals'', ''volunteering for
    STEM outreach'', ''reading science fiction'']'
  career_goals: Claudia aims to transition into a senior technologist role where she can lead interdisciplinary projects that blend engineering with artistic expression, such as interactive public installations
    and community‑focused renewable energy systems. She plans to obtain certifications in electrical safety and project management to strengthen her leadership credentials. Over the next five years, she
    hopes to mentor more Mexican‑American women in STEM, launch a consulting side‑business that offers custom electronic solutions for local artists and small businesses, and eventually guide a regional
    initiative to implement solar micro‑grids for off‑grid neighborhoods in southern New Mexico.
