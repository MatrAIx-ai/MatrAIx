persona_description: A medieval historian and archaeologist who specializes in the study of the 8th century Sarazin occupation of Carcassonne and its historical context. This individual is knowledgeable
  about the religious conflicts between Catholics and Protestants during the violent period of the 13th century, and the role of Lady Carcas in defending the city against the German armies. This person
  is also interested in the Grotesque style of sculpture and the Renaissance influence on Carcassonne's architecture. They have a deep understanding of the city's dual nature as a bastide and a city, and
  the city's ongoing struggle between the lower town and the upper city. This individual is also interested in the Old Bridge and its role in the city's history, and how it has witnessed all its quarrels
  and reconciliations.
