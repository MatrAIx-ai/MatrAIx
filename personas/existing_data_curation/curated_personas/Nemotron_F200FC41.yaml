personas:
  professional: A forward-thinking agricultural specialist, Cayce Lee blends meticulous record-keeping with hands-on crop stewardship to lead mixed-crop operations, leveraging precision-ag tech while mentoring
    community volunteers and charting a path toward Certified Professional Agronomist credentials.
  sports: An avid hiker and weekend trail runner, Cayce Lee conquers the rolling hills of Contra Costa County with the East Bay Hiking Club, roots for the Golden State Warriors and the San Francisco Giants,
    and balances cardio sessions with biweekly yoga classes to maintain functional fitness.
  arts: A lover of earth-inspired creativity, Cayce Lee spends evenings listening to folk-rock artists like Sarah Jarosz and Bonnie Raitt, attending local mural tours featuring community muralists who echo
    seasonal cycles, and collecting garden-themed poetry from Mary Oliver to inspire her seasonal recipes.
  travel: Cayce Lee prefers low-impact travel, often road-tripping in an electric vehicle to agritourism sites such as Oregon’s Willamette Valley farms and the organic vineyards of Napa, while dreaming
    of an eco-retreat in New Zealand’s Canterbury plains and a sustainability symposium in Kyoto.
  culinary: A farm-to-table chef in her own right, Cayce Lee crafts dishes like roasted beet and goat cheese salad, kale-pesto quinoa bowls, and fermented garden kimchi using herbs such as rosemary, thyme,
    and cilantro, and delights in hosting community potlucks where her skillful sauté of heirloom tomatoes shines.
  core: Cayce Lee cultivates resilience through soil and season, balancing a disciplined, organized work ethic with a spontaneous love for fresh market finds, occasional seed-spending splurges, and a habit
    of humming garden-inspired tunes while tending rows.
background:
  cultural: Cayce is a White American who grew up in the suburban neighborhoods of the East Bay, where the progressive, environmentally conscious culture of the Bay Area shaped her values. Exposure to a
    diverse community and the region’s strong farm‑to‑table movement fostered her compassion for others and her interest in sustainable agriculture, while her family’s modest exposure to gardening reinforced
    a practical, hands‑on work ethic.
attributes:
  skills: '["Crop cultivation (vegetables and fruit)", "Greenhouse climate control and maintenance", "Irrigation system design and troubleshooting", "Integrated pest management (IPM)", "Soil testing, amendment
    application, and compost production", "Operation and minor repair of farm machinery", "Data logging and farm management software (Excel, AgTrack)", "Regulatory compliance (organic certification, labor
    standards)", "Team coordination, training, and mentorship", "Community outreach and agricultural education"]'
  hobbies: '["Home vegetable gardening", "Hiking in Contra Costa County", "Volunteering at community gardens", "Cooking farm‑to‑table meals", "Reading sustainability and permaculture literature", "Yoga
    and mindfulness practice", "Visiting local farmers'' markets"]'
  career_goals: Cayce aims to transition from a hands‑on agricultural worker to a farm manager or sustainable‑agriculture coordinator, leading a mixed‑crop operation that integrates organic practices and
    precision‑ag tech. She plans to earn a Certified Professional Agronomist credential, launch a small community‑supported agriculture (CSA) program in the East Bay, and mentor new workers, using her organizational
    skills to create a collaborative, resilient farming model.
