personas:
  professional: Bennie Oliveira, an aspiring junior engineer, channels their methodical nature and love for logical sequences into constructing intricate LEGO models, solving chess puzzles, and coding simple
    Scratch stories, and they demonstrate a budding mastery of spatial reasoning and problem solving.
  sports: Bennie Oliveira thrives on the soccer field with the Little Lions Youth Soccer Club, sharpening dribbling skills through daily drills, also enjoys lap swimming at the community pool, cheers on
    the city’s professional baseball team, the River City Raptors, for inspiration, and they eagerly track their personal best times each week.
  arts: Bennie Oliveira spends free evenings reproducing detailed drawings of adventure scenes inspired by the illustrations of Hayao Miyazaki and the vivid colors of Van Gogh, while listening to the lively
    piano pieces of Yiruma, and they occasionally mimic the storytelling style of actor Tom Hanks in their Scratch projects.
  travel: Bennie Oliveira loves weekend excursions to the nearby science museum and a yearly family trip to Disneyland, dreams of exploring the ancient castles of Scotland and the bustling streets of Tokyo,
    and they balance curiosity with the family’s budget and school schedule.
  culinary: Bennie Oliveira enjoys building custom pizza slices with toppings like pepperoni, olives, and fresh basil, can whip up a simple spaghetti Bolognese using ground beef, tomatoes, and garlic, although
    they often forget to season properly and rely on ketchup for extra flavor.
  core: Bennie Oliveira is a fiercely organized eight‑year‑old who turns every hobby—from LEGO building to Scratch coding—into a precise, goal‑driven quest, though they sometimes get stuck on a single detail
    and forget to clean up.
background:
  cultural: Bennie was born and raised in Frisco, a fast‑growing suburb of Dallas, Texas. Her family blends a suburban American lifestyle with subtle Portuguese roots reflected in her surname, Oliveira.
    At home, she sometimes hears Portuguese phrases and enjoys traditional foods like caldo verde during family gatherings. She participates in community events such as the Frisco Fall Festival, attends
    a local public elementary school, and celebrates typical Texas holidays like Fourth of July with fireworks and barbecues. The multicultural environment of the Dallas‑Fort Worth metroplex exposes her
    to diverse friends and cultural experiences while her immediate family emphasizes values of reliability, education, and modest competition.
