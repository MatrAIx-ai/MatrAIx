  career_goals: She dreams of a future where she can work in a structured, purpose‑driven field. Bennie is drawn to becoming a veterinary technician or animal caretaker because it combines her love for
    animals with clear routines. She also imagines herself as a scientist or engineer, designing experiments or building models, and she occasionally mentions wanting to be a teacher to create organized
    learning environments. Her ambitions are fueled by her competitive spirit and desire to excel in a role that offers clear goals and measurable results.
