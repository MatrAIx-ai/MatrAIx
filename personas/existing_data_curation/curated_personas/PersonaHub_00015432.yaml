persona_description: A biologist who studies the relationships between internal parasites and host organisms, particularly brown trout from Montana streams. This persona is interested in the impact of nematode
  infections on the host fish and is particularly focused on the differences in infection rates and intensity between sexually mature female and immature female brown trout. They are likely to be interested
  in the use of data from the study to inform management strategies for brown trout populations in Montana.
