  career_goals: He aims to transition from a journeyman painter to the owner of a boutique contracting firm that specializes in high-end historic restoration projects in Savannah's Victorian and Antebellum
    homes. Over the next five years, Bradley plans to obtain a Georgia state contractor's license and certification in historic preservation painting, allowing him to bid on larger restoration contracts.
    He is competitive about mastering specialty finishes and hopes to be recognized locally for his flawless colour harmonies and low-impact coating solutions. While he values the freedom to set his own
    hours, he also seeks financial stability to buffer his chronic worry about unpredictable workloads, so he intends to build a small, steady client base of property managers and heritage societies.
