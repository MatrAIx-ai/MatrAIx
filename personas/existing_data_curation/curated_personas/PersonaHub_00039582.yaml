  to address power crises. They are also likely to be familiar with the technical and professional organizations responsible for generation, transmission, and distribution, as well as the international
  agencies and training programs that have been established to support energy cooperation. They are also likely to be familiar with the Indian Energy Exchange (IEX) and its impact on power trading in India.
