  hobbies: '[''Cooking Creole cuisine'', ''Attending live jazz performances'', ''Yoga'', ''Cycling along the Mississippi River'', ''Volunteer STEM tutoring'', ''Photography of historic neighborhoods'',
    ''Reading science-fiction novels'']'
  career_goals: Joyce aspires to apply her analytical strengths to environmental resilience work in her hometown, aiming for a role as an environmental data analyst where she can contribute to flood mitigation
    and climate adaptation projects for New Orleans. She plans to pursue a master's degree in environmental engineering or public health to deepen her expertise. Long‑term, she hopes to lead interdisciplinary
    teams that translate data into community‑focused policies and eventually become a senior project manager or policy advisor influencing sustainable urban planning.
