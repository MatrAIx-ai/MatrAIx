personas:
  professional: Joyce Wilson, a budding environmental data analyst with a biomedical engineering background, leverages Python, R, MATLAB, and GIS mapping to turn flood‑risk datasets into actionable community
    policies, balancing their love for structure with a collaborative, community‑focused mindset.
  sports: Joyce Wilson, a dedicated cyclist on the Mississippi River trail and occasional yoga enthusiast, roots for the New Orleans Saints in football season and the Pelicans in basketball, and rides with
    the River City Runners cycling club while squeezing in weekend runs with the NOLA Trail Trekkers.
  arts: Joyce Wilson, a regular at Preservation Hall listening to Wynton Marsalis and Trombone Shorty, cultivates their creative side by reading N.K. Jemisin’s speculative fiction and occasionally sketching
    the city’s wrought‑iron balconies, finding inspiration in the rhythmic improvisation of jazz and the imaginative worlds of modern science‑fiction writers.
  travel: Joyce Wilson, who loves exploring the historic Garden District and the bayous of their hometown, has already taken a solo backpacking trip to Kyoto, Japan, and dreams of hiking the Inca Trail
    to Machu Picchu while balancing future travel against their graduate‑studies budget.
  culinary: Joyce Wilson, an avid home cook whose repertoire includes simmering gumbo with andouille sausage and okra, perfecting jambalaya with shrimp and file powder, and mastering fresh beignets dusted
    with powdered sugar, often pairing these dishes with a chilled Sazerac.
  core: Joyce Wilson balances a data‑driven mind with a love for spontaneous jazz nights, yet can’t resist a midnight coffee while over‑organizing their playlists and to‑do lists.
background:
  cultural: Joyce is an African American raised in the Treme district of New Orleans, a neighborhood steeped in musical heritage, culinary tradition, and civic activism. She grew up immersed in the rhythms
    of jazz, the vibrancy of Mardi Gras, and the strong sense of community forged through local churches and cultural festivals. Her family places importance on education and service, inspiring her participation
    in community outreach and the celebration of Black scientific achievements. Joyce’s cultural identity informs her commitment to leveraging technical expertise for the benefit of her community and preserving
    the city’s unique heritage.
