persona_description: A biologist or entomologist who specializes in studying the biology, ecology, behavior and genetics of beneficial insects, particularly the spined soldier bug Podisus maculiventris.
  This individual is interested in reducing the high costs of mass-producing beneficial insects and is dedicated to understanding the genetic variability within populations of this pest. They are likely
  to have expertise in genetic analysis and population genetics, and are interested in the potential of biological control of insect pests. They are also likely to be interested in the environmental impact
  of classical insecticides and the potential of biological control to reduce pest populations.
