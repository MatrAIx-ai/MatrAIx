    (card game)", "Volunteering at community center", "Tech‑skill workshops"]'
  career_goals: Although retired, Dustin aims to stay active in the STEM community by volunteering as a mentor for local high‑school robotics teams, offering hands‑on workshops at the public library, and
    contributing his experience to the city’s senior innovation hub. He hopes to write a memoir that chronicles the evolution of engineering practice over his lifetime and to support his grandchildren’s
    education through tutoring and scholarship fundraising.
