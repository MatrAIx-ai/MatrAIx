  career_goals: Looking ahead, Kimberly aims to transition into a supervisory or shift-lead role within her store, where she can apply her organizational strengths and mentor younger staff. She plans to
    enroll in a short certification program in retail management offered by a nearby community college, building on her some-college background. Kimberly also hopes to develop a part-time consulting service
    for small local businesses, helping them improve cash-handling procedures and customer-service standards. Ultimately, she seeks a gradual move toward retirement that preserves a steady income while
    allowing her to volunteer more extensively at community centers and her church, maintaining a sense of purpose and connection.
