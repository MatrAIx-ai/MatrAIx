personas:
  professional: Kimberly Earle, a seasoned retail cashier with expert cash handling and POS skills, mentors new hires and now pursues a retail management certification to step into a supervisory role, bringing
    their practical, structured approach and love of organization to the store floor.
  sports: Kimberly Earle enjoys early-morning walks in local nature preserves as their primary fitness routine, follows the Miami Heat and the Tampa Bay Rays on television, and participates in a community
    walking club that meets twice weekly, occasionally joining a senior softball league for friendly competition.
  arts: Kimberly Earle sings in their church’s gospel choir, delighting in classics by Aretha Franklin, Marvin Gaye, and Stevie Wonder, and they spend evenings listening to 70s and 80s R&B hits while also
    attending occasional local theater productions of classic plays like 'A Raisin in the Sun.'
  travel: Kimberly Earle prefers short, well-planned trips that balance relaxation with cultural enrichment, having visited Savannah’s historic district, taken a weekend road trip to the Florida Keys for
    fresh seafood, and dreaming of a future pilgrimage to New Orleans for its music and cuisine, all while keeping travel costs modest.
  culinary: Kimberly Earle loves cooking soulful meals such as collard greens seasoned with smoked turkey, crispy fried chicken, and buttery cornbread, often using fresh basil and thyme from their garden,
    and they enjoy perfecting a signature sweet potato casserole for family gatherings.
  core: Kimberly Earle blends meticulous organization with heartfelt community service, balancing a steady retail career, a budget-conscious yet flavorful home life, and a devotion to gospel music and gardening,
    while they occasionally overwater plants and postpone dental appointments.
background:
  cultural: Kimberly’s cultural background is rooted in African-American traditions that blend Southern heritage with the vibrant community life of Southwest Florida. Growing up, she was immersed in church-centered
    gatherings, where gospel music, storytelling, and communal support shaped her values of kindness and cooperation. Family meals featuring soul food recipes passed down through generations reinforce a
    deep appreciation for culinary heritage. She celebrates cultural milestones such as Juneteenth and Black History Month, often participating in local events that honor African-American history and contributions.
    In her daily life, she draws on the resilience and collective spirit of her community, maintaining strong ties with relatives, neighbors, and church members. This cultural foundation informs her emphasis
    on harmony, service to others, and the preservation of shared traditions.
