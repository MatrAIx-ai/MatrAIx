  career_goals: She aspires to lead an analytics or operations‑research team within a logistics or technology firm, driving sustainable supply‑chain innovations and embedding design‑thinking into data‑driven
    decision‑making. In the next five years, Thu Lin aims to become a senior manager or director, publish thought‑leadership pieces on responsible optimization, mentor emerging analysts, and establish a
    balanced work routine that supports her wellbeing.
