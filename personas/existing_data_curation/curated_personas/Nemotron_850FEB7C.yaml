personas:
  professional: Thu Lin is a 33‑year‑old operations‑research professional who translates complex deterministic and stochastic optimization models into vivid visual narratives, leading cross‑functional analytics
    teams in logistics firms to embed sustainable, design‑thinking driven solutions, all while navigating their laid‑back, sometimes disorganized work style with a curiosity for unconventional problem‑solving.
  sports: Thu Lin is an avid jogger who charts winding routes through Prospect Park, a regular participant in Brooklyn Nets fan watch parties, and a member of a local co‑ed badminton club that meets on
    Saturday evenings, though they often skip scheduled gym sessions when an impromptu board‑game night takes precedence.
  arts: Thu Lin immerses themselves in Brooklyn’s vibrant art scene, attending opening nights for street‑art installations by artists such as KAWS and Swoon, taking improv comedy workshops inspired by The
    Second City’s style, and curating a personal collection of limited‑edition prints from contemporary creators like Ai Weiwei, all of which fuel their creative spark for data storytelling.
  travel: Thu Lin’s travel persona blends a love for short‑haul explorations—like weekend hikes in the Catskills and culinary tours of Portland—with an aspirational penchant for immersive cultural trips
    to places that celebrate Lunar New Year extravagantly, such as Taipei and Seoul, all while balancing a modest travel budget from their freelance consulting side gigs.
  culinary: Thu Lin experiments in the kitchen by fusing traditional mooncake fillings with modern matcha crème, whipping up mapo‑tofu tacos and crafting ramen‑inspired pho, favoring ingredients like ginger,
    yuzu, and fermented bean paste, yet often leaves the mise en place in a chaotic state when their next improv session calls.
  core: Thu Lin is a curiosity‑driven data wizard who balances a love for artistic chaos with a lingering worry that their flexible lifestyle may outpace deadlines, turning stress into spontaneous creative
    bursts while occasionally misplacing spreadsheet tabs.
background:
  cultural: Thu Lin's family originates from East Asia, and she grew up bilingual, speaking both her heritage language and English. Family traditions such as Lunar New Year celebrations, sharing seasonal
    dishes, and regular visits to extended relatives remain meaningful to her. Living in Brooklyn, she blends these cultural roots with the borough's vibrant, multicultural environment—participating in
    community festivals, supporting local Asian art collectives, and engaging with a diverse network of friends. Her upbringing emphasizes educational achievement, communal responsibility, and respect for
    elders, which inform her collaborative yet decisive work style.
