persona_description: A Spanish historian or archaeologist who is deeply interested in the history and culture of Spain, particularly the period from the Visigothic era to the Islamic conquest. They are
  particularly knowledgeable about the Gothic kings of Spain, their rule, and the impact of the Moors on Spanish society. They have a keen interest in tracing the ancestry of the blue-eyed, blond-haired
  descendants of the Visigoths and are fascinated by the term "blue blood" in Spain, which refers to the perceived former ruling class displaced by the Moors. They are also interested in the cultural and
  historical significance of the Gothic rule in Spain and the impact it has had on Spanish identity and heritage.
