personas:
  professional: Carmen Perezalvarez is a budding engineer‑in‑training who transforms beach‑inspired LEGO creations into intricate structures; they channel their organized, achievement‑focused nature into
    meticulous building plans, insist on following step‑by‑step instructions rather than shortcuts, and set high standards for every model to prove themselves to peers.
  sports: Carmen Perezalvarez is a spirited participant in the Dorado Kids Soccer Club, where they practice drills before cheering on the professional team Puerto Rico FC, and they also attend beginner
    salsa dance classes, approaching each activity with a competitive edge that pushes them to outscore teammates, perfect their rhythm, and even question the fairness of referees during games.
  arts: Carmen Perezalvarez delights in drawing vibrant beach scenes, building elaborate LEGO sculptures, and practicing piano scales to the rhythm of Celia Cruz and Ricky Martin, while they also enjoy
    picture books by Eric Carle, and they frequently compare their artwork to classmates’ to ensure they stay ahead in creativity.
  travel: Carmen Perezalvarez loves family trips to the sun‑kissed shores of Playa Dorado and the historic forts of Old San Juan, dreams of visiting the Bahamas’ crystal‑clear waters, and they plan each
    outing with a detailed sand‑castle checklist, packing a small backpack of snacks, a seashell‑collecting kit, and a map, balancing a love of adventure with a cautious need for familiar routines and safety.
  culinary: Carmen Perezalvarez favors the flavors of arroz con gandules, crispy tostones, and sweet mango smoothies, helps stir the pastelón batter with measured precision, and they proudly declare a picky
    aversion to broccoli while eagerly polishing their fork after every bite of their favorite dishes, often worrying that a new vegetable might ruin the perfect taste.
  core: Carmen Perezalvarez is a disciplined, curiosity‑driven six‑year‑old who balances meticulous LEGO engineering with a competitive spirit, a love of beach‑inspired art, and a cautious, well‑budgeted
    approach to money and health; they often double‑check their drawings for perfect symmetry and question new ideas before accepting them.
background:
  cultural: Carmen is a Puerto Rican child raised in Dorado, a coastal municipality known for its beaches and close‑knit community. Her household is bilingual, speaking Spanish at home and English at school,
    which enriches her communication skills. Family gatherings often feature traditional foods such as arroz con gandules, tostones, and pastelón, and music like salsa, plena, and bomba fills celebrations.
    She participates in local traditions such as the Three Kings Day parade and the annual festivals at the Dorado beach. The Catholic faith and strong family ties shape her sense of responsibility and
    respect for elders. The island’s natural environment—warm weather, sea breezes, and nearby mangroves—sparks her interest in marine life and outdoor play.
