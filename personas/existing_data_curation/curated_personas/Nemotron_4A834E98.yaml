  career_goals: Even at six, Carmen dreams big. She hopes to become a pediatrician so she can care for other children, and she is fascinated by the idea of exploring the ocean as a marine biologist, drawing
    on Dorado’s coastal scenery. She also imagines winning science fairs and earning top grades, reflecting her competitive spirit and high standards. In the future she sees herself leading a team of peers
    on school projects, having earned recognition for her disciplined work ethic.
