persona_description: A parasitologist at the University of Georgia who studies the evolution and development of parasitic worms and their resistance to drugs. His research focuses on the natural selection
  process that allows some worms to survive and reproduce through genetic mutations, and how this process has been affected by drug overuse and resistance to multiple drugs. He is concerned about the worldwide
  impact of drug-resistant parasitic worms on livestock and the need for alternative control methods, such as rotating herds and using natural remedies.
