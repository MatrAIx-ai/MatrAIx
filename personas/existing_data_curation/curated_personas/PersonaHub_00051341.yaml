persona_description: A groundwater expert and researcher who has made significant contributions to the understanding and protection of groundwater, particularly through his work in contaminant hydrogeology
  and field experiments. His expertise and knowledge in the field have helped to raise awareness about the global threat to groundwater and the importance of protecting it. Cherry is an adjunct professor
  at the University of Guelph, director at the University's Consortium for Field-Focused Groundwater Research, and associate director of the G360 Institute for Groundwater Research.
