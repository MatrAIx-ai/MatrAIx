  hobbies: '[''Sketching'', ''Street Photography'', ''Attending Art Galleries'', ''Intramural Basketball'', ''Hiking'', ''Museum Docent Volunteering'', ''Live Music Festivals'', ''Community Theater'', ''Weekend
    Trips to NYC Museums'']'
  career_goals: Spencer aims to leverage his retail experience and organizational strengths to secure a store manager position within the next two years, followed by a district manager role at a regional
    level. He plans to complete a bachelor's degree in business administration part‑time to strengthen his leadership credentials. Long‑term, he dreams of opening a boutique that blends retail with an art
    gallery, showcasing local artists while providing curated merchandise, thereby marrying his commercial acumen with his passion for creative expression.
