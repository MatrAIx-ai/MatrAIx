persona_description: 'A writer and feminist, known for her contributions to the literary and feminist movements of the late 19th and early 20th centuries. She attended Newnham College, Cambridge, and became
  the second Jewish woman to attend the institution. Her works include "The Ballad of Ida Grey," "Run to Death: A True Incident in Pre-Revolutionary France," "Xantippe and Other Verse," and "The Romance
  of a Shop." She was also a member of the "A Men and Women''s Club" and frequented the British Museum Library, where she met a circle of women writers, socialists, and social reformers, including Clementina
  Black, Eleanor Marx, Margaret Harkness, Dollie Maitland, Olive Schreiner, and Beatrix Potter. She also wrote translations of poems by Heinrich Heine and Nikolaus Lenau and published her first collection
  of verse, "Xantippe and Other Verse," in 1880.'
