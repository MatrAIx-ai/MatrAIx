persona_description: A geneticist who specializes in the study of human genetics, particularly in the areas of population genetics, genealogy, and genetic genealogy. Their research interests include the
  reconstruction of the evolutionary relationships among various biological species, the analysis of genetic distance between species, and the development of genealogical DNA tests for genetic genealogy
  purposes. They are particularly interested in the study of uncontacted peoples and the existence of isolated populations with no recent "mainland" admixture.
