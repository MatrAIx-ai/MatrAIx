  hobbies: '[''Cooking Mexican and Tex-Mex dishes'', ''Gardening'', ''Recreational softball'', ''Bowling'', ''Crossword puzzles'', ''Sudoku'', ''Reading contemporary fiction'', ''Dog walking'', ''DIY home
    improvement projects'', ''Volunteering at church food bank'']'
  career_goals: Maria’s career ambition is to move from the warehouse floor into a supervisory and strategic role within the supply chain sector. Over the next two to three years she aims to earn a promotion
    to shift supervisor or inventory control specialist, leveraging her competitive drive to implement efficiency initiatives that reduce errors and improve turnaround times. To support this, she plans
    to enroll part‑time in a bachelor’s program in supply chain management and obtain a Certified Logistics Associate credential. Maria also aspires to lead a small team, mentor new hires, and eventually
    qualify for a higher‑paying logistics coordinator position that offers greater responsibility and financial stability, enabling her to secure independence after her separation.
