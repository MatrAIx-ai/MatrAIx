personas:
  professional: Maria Ortega, a seasoned warehouse stocker and order filler, leverages their expertise in inventory management, barcode technology, and bilingual communication to streamline operations,
    while their competitive drive and preference for structure push them to proactively identify workflow bottlenecks and mentor new hires toward efficiency.
  sports: Maria Ortega stays competitive on the field as a shortstop for the Floresville Flyers recreational softball league and unwinds with weekend bowling at the San Antonio Bowling Center, while cheering
    for the Texas Rangers and Dallas Cowboys, embodying their structured yet flexible commitment to regular physical activity.
  arts: Maria Ortega fuels their creative spark by solving crosswords, devouring contemporary novels from authors like Colson Whitehead and Sally Rooney, and immersing themselves in a music mix ranging
    from The Rolling Stones to Selena, plus attending local community theater at the Alamo Theater, reflecting a well‑rounded artistic palate that they cherish on quiet evenings.
  travel: Maria Ortega prefers meticulously planned road trips that balance family bonding with culinary discovery, having driven through the Texas Hill Country to taste local wines in Fredericksburg and
    explored the vibrant streets of New Orleans, while they dream of a future getaway to Seattle’s Pacific Northwest and the historic charm of San Miguel de Allende.
  culinary: Maria Ortega, a confident home chef, delights in perfecting traditional Mexican and Tex‑Mex staples such as carne asada tacos, chicken enchiladas with chipotle sauce, and homemade guacamole
    crowned with fresh cilantro, while regularly experimenting with new spice blends and farm‑grown herbs from their garden to elevate family gatherings.
  core: Maria Ortega blends a competitive, detail‑oriented work ethic with a love for spicy cooking, weekend puzzles, and a habit of over‑scheduling, often leaving their dog waiting for a walk while they
    finish a DIY project.
background:
  cultural: Maria identifies as a Mexican‑American and was raised in a bilingual household where Spanish and English were spoken interchangeably. Her family roots trace back to the state of Jalisco, and
    she maintains strong ties to Mexican cultural traditions, including celebrating Día de los Muertos, Mexican Independence Day, and holding weekly family meals centered around homemade dishes like tamales,
    pozole, and enchiladas. Growing up in the small, predominantly Hispanic community of Floresville, she blends these traditions with local Texan customs, such as attending community festivals, listening
    to norteña and banda music, and participating in Catholic parish activities. Maria’s cultural background influences her daily life, from the language she uses at work to the importance she places on
    family cohesion, hospitality, and community service.
attributes:
