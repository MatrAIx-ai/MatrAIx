  career_goals: Merna aims to obtain her GED in the near future and pursue a certification in administrative support or hospitality. She aspires to a role such as office assistant, front‑desk coordinator,
    or community outreach aide where her love for routine, reliability, and sociable energy can be fully utilized. Long‑term, she hopes to advance into a supervisory position that allows her to design and
    oversee structured programs for community benefit.
