  career_goals: Anthony aims to become a leading partner at a national talent agency, expanding his roster to include high‑profile Latin American performers and elite athletes across the Southwest. He plans
    to launch a boutique management firm in Tulsa that specializes in cross‑border entertainment ventures, leveraging his Colombian heritage to open channels in Bogotá and Medellín. Over the next five years,
    he seeks to increase his clients' combined gross earnings by 40%, secure multi‑year corporate sponsorships, and mentor emerging talent managers. He also envisions completing an executive MBA to deepen
    his strategic expertise and eventually serve on the board of a cultural nonprofit that promotes Latin arts in the Midwest.
