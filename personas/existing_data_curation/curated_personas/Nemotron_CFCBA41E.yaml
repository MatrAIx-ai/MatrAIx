personas:
  professional: Anthony Garciasoto, a 40‑year‑old talent manager, leverages meticulous organization, bilingual fluency, and data‑driven negotiation skills to craft high‑impact contracts and brand strategies
    for artists and athletes, thriving under pressure and maintaining tight budgets.
  sports: Anthony Garciasoto, a regular on a Tulsa expatriate soccer league and a member of the local CrossFit box, follows the Oklahoma City Thunder and Dallas Cowboys, balances weekly weightlifting sessions
    with weekend hikes in the Ouachita National Forest, and treats fitness as a disciplined routine.
  arts: Anthony Garciasoto, an avid concertgoer and salsa enthusiast, mentors budding musicians, draws inspiration from artists like Carlos Vives, Shakira, and the local folk group The Red Dirt Ramblers,
    and curates playlists that blend Latin rhythms with Southern rock for his clients' events.
  travel: Anthony Garciasoto prefers purposeful travel that blends business expansion with cultural immersion, planning trips months ahead to South American capitals and European music festivals while balancing
    a modest travel budget that favors short‑haul flights and occasional road trips to the Great Smoky Mountains.
  culinary: Anthony Garciasoto enjoys cooking arepas and bandeja paisa at home, often experimenting by adding smoked brisket or Cajun spices, while savoring dishes like shrimp étouffée with chorizo and
    seeking out restaurants that fuse Latin flavors with Southern barbecue.
  core: Anthony Garciasoto is a disciplined, socially energized strategist who mixes rigorous data analysis with a love for salsa, soccer, and high‑stakes negotiation, yet sometimes lets competitive instincts
    spill into personal relationships.
background:
  cultural: Anthony was born in Bogotá, Colombia, and moved to the United States with his family at age ten, growing up in a bilingual household that blended Colombian customs with American values. The
    rhythm of cumbia and vallenato, family gatherings centered around shared meals, and the tradition of strong community ties remain central to his identity. He celebrates Colombian holidays such as Día
    de la Independencia and Semana Santa, maintains close ties with the Colombian diaspora in Tulsa, and often incorporates Colombian coffee rituals and culinary heritage into his daily life. His upbringing
    instilled a respect for hard work, resilience, and hospitality, which he brings to his professional relationships while also embracing the Midwestern openness of his Tulsa community.
