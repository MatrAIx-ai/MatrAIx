personas:
  professional: Harold Decossas is an aspiring comic artist and multimedia storyteller who merges hand‑drawn panels with digital painting techniques; they apply a methodical, organized workflow to meet
    deadlines for school art contests while leveraging a competitive edge to constantly out‑do peers’ projects.
  sports: Harold Decossas skates as a forward for the North Ridge Ice‑Hockey Club, idolizes the Minnesota Wild and follows their tactics closely; they also kayak on Lake Mille Lacs during summer trips and
    participate in weekend hikes with the local youth outdoor club.
  arts: Harold Decossas draws inspiration from comic legend Jack Kirby, digital painter Ross Tran, and synthwave composer Perturbator; they devote after‑school hours to sketching superhero arcs, experimenting
    with Photoshop brushes, and editing sci‑fi short videos featuring clips from their favorite strategy games.
  travel: Harold Decossas enjoys rugged getaways, spending summers kayaking on Minnesota’s lakes and fishing for walleye, while dreaming of a road trip to the Pacific Northwest’s coastal trails and an eventual
    visit to San Diego Comic‑Con; they balance budget constraints with school commitments.
  culinary: Harold Decossas favors pizza with pepperoni, tacos al pastor, and freshly caught salmon grilled with lemon‑dill, often cooking simple stir‑fry dishes with soy sauce and ginger; they have a quirky
    habit of keeping a secret stash of gummy bears in their backpack for late‑night study sessions.
  core: Harold Decossas blends a curious, competitive spirit with a methodical approach to art and hockey, juggling creative projects, gaming marathons, and occasional acne‑related frustrations while never
    missing a chance to out‑perform peers.
background:
  cultural: Harold grew up in Maple Grove, a suburban community in Hennepin County with a mix of German, Scandinavian, and other European ancestries common to the region. His family celebrates traditional
    American holidays and local Midwestern customs, such as summer fairs, the Minnesota State Fair, and community potlucks. He attends a public middle school that emphasizes extracurricular involvement,
    and his upbringing reflects the region’s values of community participation, outdoor recreation, and a pragmatic work ethic.
