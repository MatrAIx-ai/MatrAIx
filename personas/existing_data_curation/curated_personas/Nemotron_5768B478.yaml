  career_goals: Harold plans to enroll in a high‑school program that emphasizes both visual arts and technology, aiming to study graphic design or interactive media. His long‑term ambition is to become
    a lead UI/UX designer or concept artist for video games, blending his love of art with his analytical mindset. He also hopes to mentor younger students in creative coding and eventually launch a youth‑focused
    creative studio that produces digital tutorials and indie games.
