persona_description: A nurse aide who works in a hospital or other health care facility, helping with hands-on patient care. They have 0-2 years of work experience and need to speak, read, and write English,
  understand medical terminology, and communicate with patients and medical staff. They need to be strong enough to move patients and comfortable and talk with patients and their families. They also need
  to take notes and write patient reports, and be able to assess patients' needs after speaking with them. They may work in a co-operative work experience program.
