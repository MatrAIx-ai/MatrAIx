  hobbies: '[''Reading (non-fiction & mystery)'', ''Gardening'', ''Birdwatching'', ''Walking/Hiking'', ''Puzzle Solving (crosswords, Sudoku)'', ''Chess'', ''Knitting'', ''Baking Artisan Bread'', ''Genealogy
    Research'']'
  career_goals: Approaching retirement, Yvonne aims to transition into a senior advisory role where she can leverage her decades of experience to mentor emerging leaders and guide executive decision‑making.
    She aspires to attain a Director‑level position in operations before stepping back, ensuring a smooth succession plan for her department. Post‑retirement, she plans to launch a boutique consulting practice
    focused on cost‑efficient process redesign for small‑to‑mid‑size businesses in the Kansas City region. Additionally, she hopes to author a management guide that blends practical frameworks with her
    critical, evidence‑based perspective, leaving a lasting professional legacy.
