  career_goals: Allison aims to secure senior inspector status within the Webb County Building Department and earn the Texas Certified Building Inspector credential. She plans to mentor newer inspectors,
    especially women entering the trades, by offering informal workshops and one‑on‑one guidance. Recognizing her passion for heritage, she intends to develop a niche consulting practice that focuses on
    historic preservation inspections for owners of older homes and commercial landmarks in Laredo. Additionally, she hopes to launch a community outreach program that educates local contractors and homeowners
    about safety standards and energy‑efficient retrofits. Balancing her professional aspirations with personal fulfillment, she seeks a schedule that provides occasional flexibility to pursue her art‑related
    interests and travel to regional architecture exhibitions.
