personas:
  professional: Allison Kelley leverages over three decades of construction inspection expertise, combining meticulous knowledge of the Texas International Building Code with a passion for historic preservation,
    to deliver precise reports, mentor emerging women inspectors, and champion safety and heritage in every project she oversees.
  sports: Allison Kelley stays active by hiking the trails of Amistad National Recreation Area on weekends, supporting the Dallas Cowboys during football season, and participating in a local walking club
    that meets every Saturday morning, though she admits to skipping workouts after long inspection days.
  arts: Allison Kelley immerses herself in Laredo’s vibrant art scene by frequenting the Riverwalk Arts Center, curating a digital portfolio of architectural photographs inspired by Georgia O’Keeffe’s desert
    palettes, and swapping insights with fellow members of a regional photography collective that meets at a nearby café.
  travel: Allison Kelley plans her trips with a blend of detailed itineraries and spontaneous detours, favoring regional architecture tours to Santa Fe and Austin, dreaming of exploring the historic streets
    of Seville, and often balancing travel costs against her commitment to community outreach workshops.
  culinary: Allison Kelley delights in cooking Tex‑Mex and Southern comfort dishes, seasoning homemade enchiladas with fresh cilantro and jalapeños harvested from her garden, perfecting a slow‑cooked chicken
    fried steak, yet she sometimes over‑spices her salsa, leading to a habit of reaching for a glass of lime‑infused water.
  core: Allison Kelley is a detail‑driven inspector and curious photographer who balances heritage preservation with garden‑to‑table cooking, while occasionally indulging in impulse buys and skipping self‑care
    routines.
background:
  cultural: Allison was raised in a working‑class, Anglo‑American family on the outskirts of Laredo, Texas. Growing up along the U.S.–Mexico border, she absorbed a blend of Southwest Texas traditions and
    Mexican cultural influences. Family gatherings featured barbecues, church potlucks, and celebrations of regional festivals such as Charro Days, where she developed a fondness for the music, food, and
    communal spirit. Although her primary cultural identity is rooted in Texan independence, self‑reliance, and a deep respect for the land, she also values the bilingual, multicultural environment of Webb
    County, speaking basic Spanish and engaging with the vibrant Hispanic community. This bicultural backdrop informs her appreciation for historic adobe architecture, community-oriented service, and a
    pragmatic yet open‑minded outlook on life.
