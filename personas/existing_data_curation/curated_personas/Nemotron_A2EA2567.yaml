  hobbies: '[''Abstract painting'', ''Visiting art galleries'', ''Reading speculative fiction'', ''Philosophy'', ''Crossword puzzles'', ''Sudoku'', ''Cooking Mexican cuisine'', ''Fusion cooking experiments'',
    ''Volunteering at Hispanic cultural events'', ''Yoga'', ''Journaling'']'
  career_goals: Maria aims to obtain her Certified Public Accountant (CPA) credential within the next three years and pursue continuing education in financial analysis and forensic accounting. She aspires
    to advance from a clerk position to a senior accountant or audit supervisor role at a larger firm, eventually leading a small team. Embracing technology, she plans to integrate AI‑driven accounting
    tools to increase efficiency and accuracy. Long‑term, Maria envisions launching a boutique consulting service focused on helping Hispanic‑owned small businesses navigate financial compliance, growth
    strategies, and tax planning, while maintaining a balanced lifestyle that reduces stress through structured time management and mindfulness practices.
