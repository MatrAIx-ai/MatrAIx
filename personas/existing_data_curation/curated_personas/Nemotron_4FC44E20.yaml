personas:
  professional: Mario Perez, a four‑year‑old preschool builder, balances curiosity about how blocks fit together with a practical urge to keep structures stable, and they meticulously organize their play
    area while staying flexible enough for spontaneous creativity.
  sports: Mario Perez, a four‑year‑old soccer enthusiast, plays for the Tiny Kickers community league, cheers for the River City Bears baseball team, and they spend Saturday mornings at the neighborhood
    pool mastering basic freestyle strokes.
  arts: Mario Perez, a four‑year‑old who loves drawing dinosaurs with vivid crayons, sings along to Disney's "Let It Go" and Pharrell Williams' "Happy", and they enjoy interactive exhibits at the Children's
    Art Museum, letting music and visual art shape their playful identity.
  travel: Mario Perez, who has explored the nearby city zoo, splashed around at the coastal town of Monterey Bay, and marveled at the Grand Canyon's visitor center during a family road trip, prefers short
    car journeys with planned museum stops and unstructured beach play, and they plan these adventures using picture books and colorful maps.
  culinary: Mario Perez, a four‑year‑old with a developing palate, delights in cheesy macaroni, crunchy carrot sticks, and banana slices, can spread peanut butter on toast unaided, but they often refuse
    peas and tofu, turning dinnertime into a negotiation over vegetables.
  core: Mario Perez is a calm, curious four‑year‑old who builds block cities, saves pocket money for LEGO, manages mild eczema with a smile, scores goals for the Tiny Kickers, sings Disney tunes, enjoys
    family road trips to parks, and they negotiate broccoli at dinner.
background:
  cultural: Mario comes from a Mexican‑American family in Austin, Texas. At home, Spanish and English are spoken interchangeably, and traditions such as Día de los Muertos, Cinco de Mayo, and family gatherings
    around tacos and tamales are celebrated. The multicultural environment of Austin blends his Mexican heritage with local Texan influences, shaping his early experiences, language development, and appreciation
    for both community rituals and everyday practicality.
attributes:
  skills: '[''basic Spanish and English vocabulary'', ''color and shape recognition'', ''counting up to ten'', ''fine‑motor dexterity with crayons and blocks'', ''simple storytelling'', ''following multi‑step
    instructions'', ''cooperative play'']'
  hobbies: '[''building with Duplo blocks'', ''drawing and coloring'', ''listening to storybooks'', ''outdoor play at the park'', ''singing and dancing to Mexican folk songs'', ''pretend role‑play as a
    firefighter or builder'']'
  career_goals: Even at four, Mario imagines future roles where he can help others and create safe spaces, such as a builder, firefighter, or community helper. He shows a budding ambition to understand
    how things work, to be reliable, and to contribute positively to his family and friends.
