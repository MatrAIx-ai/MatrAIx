personas:
  professional: Allene Barnwell is a budding junior architect who transforms LEGO bricks and crayon sketches into miniature cityscapes, applying a practical, structured mindset while delighting in the flexible
    freedom of imaginative play, and they often share their creations with friends at storytime.
  sports: Allene Barnwell loves swinging and sliding at the local playground and has joined the Oak Meadow Peewee Soccer Club where they practice dribbling with a gentle, cooperative spirit, preferring
    team activities that foster harmony over competitive pressure.
  arts: Allene Barnwell spends hours coloring crayon illustrations of animals while humming along to upbeat songs by The Wiggles and Raffi, and they eagerly flip through picture books by Dr. Seuss, allowing
    these artistic influences to fuel their vivid storytelling during pretend play.
  travel: Allene Barnwell prefers short family outings such as nature walks in the nearby Oak Grove Park and weekend trips to the Children's Museum of Indianapolis, enjoying the gentle routine of planned
    departures while dreaming of a future adventure to Disney World where they could explore themed lands with their favorite storybook characters.
  culinary: Allene Barnwell favors bright, simple meals like cheesy macaroni, peanut butter and jelly sandwiches, and apple slices, often helping stir batter for banana muffins with a careful yet occasionally
    messy hand, and they delight in tasting rainbow sprinkles as a special treat after a day of play.
  core: Allene Barnwell is a kind‑hearted, structure‑loving six‑year‑old who balances creative LEGO building with a healthy dose of worry, often misplacing crayons yet never forgetting to smile for a new
    friend, and they bring gentle harmony to every playground.
background:
  cultural: Allene is a Black girl raised in Oak Lawn, Illinois, a suburb of Chicago with a vibrant and supportive Black community. Her family celebrates cultural traditions such as cooking soul‑food meals
    together, listening to gospel music and contemporary R&B, and participating in church gatherings and local African‑American heritage festivals. Through school and library programs that highlight Black
    history and culture, she gains a strong sense of identity and pride. These influences nurture her caring nature, emphasize the importance of community and cooperation, and expose her to rhythmic language
    and music that enhance her interests in singing and dancing.
attributes:
  skills: '[''Reading simple sentences'', ''Basic counting and addition'', ''Fine‑motor skills (drawing, cutting, puzzles)'', ''Cooperative play and peer empathy'', ''Following daily routines and checklists'',
