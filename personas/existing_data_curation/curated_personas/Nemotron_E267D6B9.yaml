  hobbies: '[''Drawing and coloring'', ''Building with LEGO bricks'', ''Listening to music and dancing'', ''Reading picture books'', ''Pretend play with dolls'', ''Playing at the playground'', ''Attending
    Sunday school'', ''Visiting the local library for storytime'']'
  career_goals: Allene dreams of a future where she can help others while working in a predictable, structured environment. She frequently says she wants to become an elementary school teacher because she
    enjoys helping friends learn new things. She also imagines caring for animals as a veterinarian and creating pictures as an artist. Ultimately, she aspires to a career that blends nurturing, creativity,
    and a clear daily routine, such as teaching, pediatric nursing, or working in a community library.
