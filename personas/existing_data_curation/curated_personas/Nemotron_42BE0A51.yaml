personas:
  professional: Teresia Shoemaker, a retired curriculum specialist with decades of classroom experience, channels their methodical organization and competitive spirit into designing community workshops,
    mentoring novice teachers, and spearheading a scholarship fund for underserved students, all while blending curiosity for new pedagogical ideas with the proven practices of Southern education traditions.
  sports: Teresia Shoemaker, a devoted fan of the Memphis Grizzlies and Memphis Tigers, attends home games when possible and supports the local senior walking club that meets for weekly strolls along the
    Mississippi River trail, preferring low‑impact cardio over competitive sports, though they never miss the annual Memphis Marathon charity walk where they hand out water to participants.
  arts: Teresia Shoemaker immerses themselves in Memphis's rich musical tapestry, regularly attending gospel services featuring the Staple Singers' repertoire and blues nights honoring B.B. King, while
    their evenings often include listening to Al Green's soulful albums; their leisure reading ranges from William Faulkner's novels to recent biographies of civil‑rights leaders, shaping their artistic
    sensibility with Southern literary depth.
  travel: Teresia Shoemaker enjoys short, well‑planned road trips to nearby cultural sites like the National Civil Rights Museum in downtown Memphis and the blues heritage trail in Clarksdale, Mississippi,
    and they cherish past trips to New Orleans' French Quarter and the Great Smoky Mountains, while dreaming of a guided genealogy pilgrimage to the Blue Ridge Mountains of Virginia and a brief, senior‑friendly
    cruise to the Caribbean islands.
  culinary: Teresia Shoemaker, an enthusiastic garden‑to‑table cook, harvests heirloom tomatoes and rose petals to flavor homemade gazpacho and rose‑infused jam, while they prepare Southern staples like
    fried catfish with collard greens, buttery cornbread, and peach cobbler, favoring fresh, locally sourced ingredients such as okra, sweet potatoes, and pecans.
  core: Teresia Shoemaker blends a steadfast, methodical spirit with a restless curiosity, channeling their competitive edge into community education projects while juggling a cautious financial strategy,
    a meticulous health routine, a love of Southern music and garden‑fresh cooking, and occasional bouts of worry that keep them ever‑prepared.
background:
  cultural: Raised in a middle‑class Protestant (Methodist) family in Memphis, Tennessee, Teresia's cultural background is shaped by Southern hospitality, the city's rich musical heritage of blues, soul,
    and gospel, and a strong emphasis on community service. She embraces Southern culinary traditions, values self‑reliance, respect for elders, and a diligent work ethic characteristic of the Mid‑South.
    Her family lineage traces back to early 20th‑century Appalachian migrants, and she maintains close ties to the local church and interdenominational community events that celebrate the diverse cultural
    tapestry of Memphis.
attributes:
  skills: '[''Curriculum Development'', ''Instructional Design'', ''Adult Education'', ''Classroom Management'', ''Educational Assessment'', ''Program Evaluation'', ''Public Speaking'', ''Workshop Facilitation'',
