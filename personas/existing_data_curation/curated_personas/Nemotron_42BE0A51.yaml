  hobbies: '[''Heirloom Gardening'', ''Reading Historical Biographies'', ''Bridge (Card Game)'', ''Genealogy Research'', ''Attending Gospel and Blues Concerts'', ''Volunteer Tutoring'', ''Quilting'', ''Crossword
    Puzzles'', ''Walking along the Mississippi River Trail'']'
  career_goals: Although retired, Teresia aims to remain actively engaged in education by establishing a local scholarship fund for underprivileged students, authoring a guidebook on lifelong learning for
    seniors, and volunteering as a mentor for new teachers in the Memphis area. She also aspires to document and preserve the educational history of her community through oral histories and to be recognized
    for her contributions to improving teaching standards. Her competitive streak drives her to ensure her initiatives are impactful and leave a lasting legacy.
