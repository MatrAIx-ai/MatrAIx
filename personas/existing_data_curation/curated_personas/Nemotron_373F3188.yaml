  hobbies: '[''Hiking'', ''Desert photography'', ''Volunteer construction with Habitat for Humanity'', ''Salsa dancing'', ''Community theater'', ''Cooking Southwestern cuisine'', ''DIY home improvement
    projects'', ''Trail running'', ''Succulent gardening'', ''Reading architecture and design books'', ''Attending local music festivals'']'
  career_goals: Eva aims to advance from her current helper role to a certified foreman within the next two years, earning the NCCER Level 2 and LEED Green Associate credentials. She plans to complete her
    associate degree in Construction Management through night courses, positioning herself for a future transition to project manager. Long‑term, Eva envisions launching a small, women‑owned contracting
    firm that specializes in sustainable residential renovations in the Tucson area, while mentoring apprentices and promoting diversity in the trades.
