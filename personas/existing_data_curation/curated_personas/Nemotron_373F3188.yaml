personas:
  professional: Eva Pineiro is a hands‑on construction site helper on a fast‑track to foremanship, melding their OSHA‑30 certification, Procore and Excel‑driven logistics expertise with a curiosity for
    green building technologies and a naturally sociable, assertive leadership style that keeps crews motivated and safety‑compliant.
  sports: Eva Pineiro combines trail‑running along the Sonoran flatlands with membership in the Tucson Track Club, supports the Arizona Diamondbacks and the Tucson Roadrunners, and hits a local CrossFit
    box in winter to balance cardio with strength, while they stay flexible enough to swap a hard run for a morning hike when the desert heat spikes.
  arts: Eva Pineiro expresses their creative side through salsa dancing at Casa de Amigos, starring in community‑theater productions of classic comedies, and capturing the desert’s glow through photography
    inspired by Ansel Adams, while they vibe to the sounds of Celia Cruz, Calexico, and local Southwest painter Maria Bisbee.
  travel: Eva Pineiro favors road‑trip itineraries that mix organized national‑park hikes—like Sedona’s Red Rock trails and the Grand Canyon rim walk—with spontaneous weekend jaunts across the border to
    Sonora, Mexico, dreaming of a future photo‑expedition to Patagonia, all while they balance modest savings and a demanding work schedule.
  culinary: Eva Pineiro delights in mastering Southwestern flavors, slow‑cooking carne asada with ancho chilies and cumin, roasting prickly pear cactus for tacos topped with fresh cilantro and lime, and
    experimenting with mesquite‑smoked beans, though they sometimes overcook the meat when juggling a busy workday.
  core: Eva Pineiro is a desert‑rooted builder with a green‑building curiosity, a talkative leadership flair, a habit of over‑planning budgets, a penchant for salsa spins, and they occasionally tend to
    skip sleep after late‑night photography shoots.
background:
  cultural: Eva grew up in a multicultural household; her father’s Portuguese roots and her mother’s Irish heritage blended with the vibrant Southwest environment of Tucson. Though she identifies as white,
    she is deeply influenced by the city’s Hispanic culture—celebrating local festivals, enjoying Mexican cuisine, and speaking enough Spanish to converse comfortably with neighbors. The community’s emphasis
    on neighborly support and outdoor living shaped her values of teamwork, practicality, and an appreciation for the desert’s natural beauty. These cultural threads inform both her personal life and professional
    approach, fostering a respectful, inclusive attitude on construction sites and in social settings.
attributes:
  skills: '[''Blueprint reading'', ''Concrete finishing'', ''Basic carpentry'', ''Heavy equipment operation'', ''Safety compliance (OSHA 30‑hour)'', ''Construction site logistics'', ''Team leadership'',
