persona_description: An astronomer who is skeptical of the Big Bang theory and believes in the existence of quasars, especially those with redshifts that are unusually high. They are critical of the dominance
  of the Big Bang theory in the astronomical community and believe that more evidence is needed to support the theory. They are open to alternative explanations for the properties of quasars and are willing
  to consider the possibility of exotic mechanisms to explain the energy source of distant quasars. They are also interested in the funding of the astronomical community and the role it plays in the acceptance
  of the Big Bang theory.
