  hobbies: '[''Debate coaching'', ''Fishing'', ''Sailing'', ''Amateur astronomy'', ''Book club hosting'', ''Gardening'']'
  career_goals: Brett aims to transition into a leadership role within his school district, such as department chair or instructional coach, where he can shape school‑wide curriculum and professional development.
    He is passionate about building partnerships with nearby NASA and SpaceX facilities to create experiential STEM programs for students, bridging his curiosity for new ideas with practical community resources.
    Over the next five years, he intends to earn a master's degree in Educational Leadership, author a textbook on integrating local industry into secondary curricula, and mentor a cohort of novice teachers.
    Long‑term, he envisions consulting for other schools in Brevard County, helping them adopt organized, data‑informed instructional practices while maintaining a student‑centered, supportive environment.
