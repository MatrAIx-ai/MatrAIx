personas:
  professional: Brett Lugo, a seasoned secondary science and social studies teacher with over three decades of experience, leverages their methodical lesson planning, data‑driven classroom management, and
    charismatic public speaking to design interdisciplinary STEM curricula that integrate local space‑industry resources, while their sociable, talkative nature makes them a natural mentor and workshop
    facilitator.
  sports: Brett Lugo, a fervent supporter of the Tampa Bay Rays baseball team and the Miami Heat basketball squad, spends their weekends coaching a community youth sailing club on the Indian River, and
    they also join a local over‑50s golf league at Brevard County Golf Club and keep fit with early‑morning jogs along the river trail.
  arts: Brett Lugo, an avid reader and cultural enthusiast, curates their book club around works by David McCullough, Neil deGrasse Tyson, and Doris Kearns Goodwin, and they enjoy evening concerts featuring
    John Coltrane’s recordings and folk singer Joan Baez, while also attending annual performances at the Kennedy Space Center’s Planetarium featuring NASA’s visual artist collaborations.
  travel: Brett Lugo’s travel log includes weekend getaways to Key West’s historic Duval Street, a family road trip to St. Augustine’s colonial forts, a science‑focused pilgrimage to the Kennedy Space Center,
    and a dream itinerary to explore the historic sites of Edinburgh, Scotland, and the astronomy observatories of Chile’s Atacama Desert, and they hope to add a canoe adventure on the Everglades to their
    list.
  culinary: Brett Lugo, a home gardener turned chef, frequently prepares grilled mahi‑mahi tacos with fresh mango salsa, tossed with cilantro and lime, alongside roasted sweet potatoes and a side of quinoa
    salad featuring cherry tomatoes and feta, and they often serve classic Florida key‑lime pie made with real key lime juice at Sunday potlucks.
  core: Brett Lugo blends curiosity‑driven science enthusiasm with methodical planning, thriving as a talkative community mentor who balances disciplined finances, proactive health habits, and a love for
    sailing, stargazing, and home‑grown meals, and they inspire others through their enthusiastic presence.
background:
  cultural: Brett is a white American raised in central Florida, where the blend of Southern hospitality and the high‑tech Space Coast culture shaped his outlook. His family’s roots trace back to mid‑Atlantic
    immigrants of Anglo‑Italian descent, and he grew up celebrating traditional holidays such as Thanksgiving, Fourth of July barbecues, and local customs like the annual Space Coast Festival. The coastal
    environment fostered a love for outdoor recreation, while the proximity to NASA instilled an appreciation for scientific achievement. He identifies with the region’s pragmatic values—self‑reliance,
    community involvement, and respect for established institutions—yet remains open to innovative ideas, reflecting the balance between curiosity and practicality that defines his personality.
