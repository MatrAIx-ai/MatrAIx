    and choir assistance'']'
  career_goals: She aims to earn her GED within the next year, pursue a certification as a Home Health Aide, and eventually secure a part-time position at a local community health center. In parallel, she
    envisions launching a small catering service specializing in soul-food dishes for church gatherings and neighborhood events. Long-term, she hopes to achieve financial independence, gain stable employment,
    and possibly mentor other women in her community who face similar educational and employment barriers.
