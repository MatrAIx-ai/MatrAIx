personas:
  professional: A budding storyteller and LEGO architect, Sherlie Mcclam channels their love of picture books and block‑building into crafting intricate narrative dioramas, meticulously arranging each brick
    while they often feel frustrated when the spontaneous flow of ideas clashes with their desire for order.
  sports: A competitive forward for the Parkside Tigers youth soccer club, Sherlie Mcclam dashes across the field with fierce determination, often practicing drills alone to perfect their footwork (reflecting
    their need for structure) while sometimes feeling overwhelmed by the chaotic cheers of the crowd, and they also love rhythmic dance moves after games to the beats of Missy Elliott.
  arts: An enthusiastic creator, Sherlie Mcclam fills sketchbooks with vibrant drawings inspired by Dr. Seuss’s whimsical worlds and choreographs impromptu dance routines to the lively rhythms of Megan
    Thee Stallion and gospel legend Kirk Franklin, balancing a meticulous eye for detail with sudden bursts of playful spontaneity as they leap from one imagination to the next.
  travel: A curious explorer, Sherlie Mcclam loves carefully planned trips to the local science museum and the nearby botanical garden, yet dreams of a spontaneous adventure to Disneyland in California,
    often drawing route maps on their bedroom wall with crayons while they watch their parents budget for family trips in a vacation savings jar.
  culinary: A picky yet adventurous eater, Sherlie Mcclam prefers classic cheese pizza with pepperoni and a side of carrot sticks, can assemble a peanut‑butter‑and‑jelly sandwich all by themselves, but
    often refuses broccoli unless it’s hidden in macaroni and cheese, and they love sneaking a bite of strawberry yogurt when no one watches.
  core: Sherlie Mcclam is a 7‑year‑old dreamer who builds LEGO kingdoms, battles soccer rivals, and wakes up anxious over tiny catastrophes, yet they find calm humming to hip‑hop beats while secretly hoarding
    loose change in a secret stash under their pillow.
background:
  cultural: Sherlie is a Black child growing up in Houston, Texas, surrounded by a vibrant African‑American community. Family gatherings often feature soulful gospel music, hearty Southern comfort foods,
    and stories of cultural pride. She participates in local community events such as Juneteenth celebrations and church gatherings, where she learns about traditions, resilience, and the importance of
    community support.
attributes:
  skills: '[''Reading'', ''Basic arithmetic'', ''Puzzle solving'', ''LEGO building'', ''Storytelling'', ''Soccer'']'
  hobbies: '[''Reading picture books'', ''LEGO building'', ''Imaginary role‑play'', ''Drawing and coloring'', ''Dancing to hip‑hop and gospel music'', ''Playing soccer'']'
  career_goals: Sherlie dreams of becoming a veterinarian because she loves caring for animals and wants a clear, structured role where she can help. She also imagines being a teacher one day, sharing stories
    and knowledge with younger kids, and appreciates the routine and organization such jobs would provide while still allowing room for creative moments.
