persona_description: A scientist who is interested in understanding the underlying mechanisms of cellular stress and the role of the unfolded protein response (UPR) in protecting cells from damage caused
  by protein folding problems. The individual has a background in cell biology and is particularly interested in the study of fatty liver disease, which is the most common form of liver disease in the Western
  world and may affect as many as one in three American adults. The scientist has a strong background in molecular biology, biochemistry, and cellular physiology, and has a particular interest in the role
  of protein folding in cellular processes and the connection between protein folding problems and cellular stress. The individual is also interested in the potential use of therapeutic interventions aimed
  at improving protein folding in the ER or inhibiting CHOP as potential treatments for fatty liver disease.
