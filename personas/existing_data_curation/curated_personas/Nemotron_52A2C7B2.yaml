  hobbies: '[ ''Mural painting and metal art'', ''Community salsa dancing'', ''Group hiking in Laguna Coast Wilderness Park'', ''Cooking traditional Mexican dishes'', ''Reading about advanced manufacturing
    and Mexican folklore'', ''Photography of industrial and cultural scenes'' ]'
  career_goals: In the next five years, Mariama aims to transition into a foreman or site‑manager role where she can mentor younger tradespeople and shape safety culture. She plans to obtain a Journeyman
    certification and a Lean Six Sigma Green Belt to boost operational efficiency. A long‑term ambition is to launch her own boutique metal‑art studio that creates custom architectural pieces for community
    spaces in Orange County, blending her boilermaking expertise with her passion for culturally resonant public art. She also hopes to be recognized as a spokesperson for women in heavy‑industry trades,
    advocating for more inclusive training programs.
