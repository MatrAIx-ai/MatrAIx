personas:
  professional: Mariama Garcia, a veteran boilermaker with three decades of hands‑on experience, leverages meticulous blueprint reading, precision arc, MIG and TIG welding, and disciplined crew leadership
    to drive safety and efficiency on high‑pressure industrial sites, while they eye a foreman role to mentor younger tradespeople and embed Lean Six Sigma practices.
  sports: Mariama Garcia embraces outdoor fitness through weekly hikes with the Laguna Coast Hiking Club, occasional beach volleyball at Huntington Beach, and they follow the Los Angeles Dodgers, Los Angeles
    Lakers, and LA Rams, integrating a competitive mindset into their cardio routines while balancing a busy work schedule.
  arts: Mariama Garcia frequents the Orange County Museum of Art, draws inspiration from Anish Kapoor’s monumental sculptures and the vibrant mural work of local artist Carlos Reyes, channels that energy
    into reclaimed‑steel installations, while dancing to Celia Cruz at community salsa nights and photographing industrial sites with an eye for chiaroscuro reminiscent of Edward Burtynsky, and they often
    share these images on social media.
  travel: Mariama Garcia plans trips with meticulous spreadsheets, preferring a blend of short weekend getaways to Santa Barbara and Big Sur for landscape photography and longer, purpose‑driven voyages
    to Kyoto’s temples and Iceland’s glaciers, yet they still dream of a road‑trip across the Southwest to explore desert art installations.
  culinary: Mariama Garcia, an adept home chef, perfects traditional mole with ancho chilies, Mexican chocolate and toasted pepitas while hand‑shaping tamales with masa and pork, and they delight fellow
    hikers with protein‑rich quinoa‑black bean salads spiced with cumin and lime, balancing authentic flavors with a pragmatic, batch‑cooking approach.
  core: Energetic, fiercely organized, and endlessly curious, Mariama Garcia channels a competitive edge into welding, metal art, salsa dancing, and meticulous budgeting, yet they occasionally hoard tools
    they never use and battle a stubborn skepticism that colors new collaborations.
background:
  cultural: Mariama is a first‑generation Mexican American whose parents immigrated from Jalisco in the 1970s. Raised in Santa Ana, she grew up bilingual, celebrating Día de los Muertos, Cinco de Mayo,
    and the yearly parish fiesta with the same fervor as her American peers. Her Mexican heritage informs her values of family solidarity, respect for elders, and a deep appreciation for vibrant visual
    traditions, which she weaves into her art and community involvement. While she has integrated into the diverse fabric of Orange County, she remains connected to her roots through regular visits to her
    extended family in Los Angeles, participation in the local Mexican cultural council, and sharing traditional cuisine at neighborhood gatherings. Her marriage and community ties reinforce a sense of
    responsibility to serve as a role model for women pursuing non‑traditional careers in the trades.
attributes:
  skills: '[ ''Blueprint reading'', ''Arc, MIG, and TIG welding'', ''Pipe fitting and assembly'', ''Heavy equipment operation'', ''Safety compliance and OSHA regulations'', ''Project planning and scheduling'',
