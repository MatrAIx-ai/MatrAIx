persona_description: 'A researcher or policy maker interested in understanding the causes and effects of socio-economic inequalities in childhood mortality in low- and middle-income countries, and the potential
  interventions to reduce these inequalities. They are likely to be familiar with the methodologies and findings of the review article "Socio-economic inequalities in childhood mortality in low- and middle-income
  countries: A review of the international evidence" by Houweling and Kunst, published in the British Medical Bulletin in 2010. They may also be interested in exploring the debate around the contribution
  of specific determinants and the effectiveness of targeted or universal interventions to address these inequalities.'
