  career_goals: Although she is no longer employed full-time, Giang is motivated to channel her STEM background into community impact on her own flexible schedule. She aims to launch a neighborhood makerspace
    where seniors and youth can collaborate on small-scale engineering projects, allowing participants to join as their time permits. She also plans to author a memoir that chronicles her journey from a
    Vietnamese refugee to a Bay Area technologist, reflecting on how curiosity and practicality guided her life. Giang seeks to expand her mentorship network by offering informal, low-commitment workshops
    on coding and data literacy for underrepresented students, and hopes to develop a low-cost indoor-air-quality sensor that can be distributed to local senior centers. In the longer term, she envisions
    serving on the board of a nonprofit focused on STEM education equity, contributing her experience in a collaborative yet assertive manner.
