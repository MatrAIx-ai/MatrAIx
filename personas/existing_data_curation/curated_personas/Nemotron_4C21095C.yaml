personas:
  professional: Loi Giang, a retired senior software engineer with over three decades of experience in embedded systems and data analytics, now channels their curiosity and practical mindset into community
    tech workshops; they design low‑cost indoor‑air‑quality sensors for senior centers and lead the creation of a neighborhood makerspace where seniors and youth collaborate on small‑scale engineering projects.
  sports: Loi Giang enjoys solitary morning walks along the Redwood trails of the Peninsula, follows the San Francisco Giants in baseball and the Golden State Warriors in basketball, and they participate
    in a senior softball league at the local community center during spring while practicing tai chi twice a week, treating fitness as a low‑impact, social routine rather than a competitive endeavor.
  arts: Loi Giang collects vintage radios as functional art, listens to classic jazz legends like Miles Davis and contemporary vocalist Norah Jones while working in the garden, and they attend occasional
    performances at the San Francisco Symphony, finding inspiration in the meticulous aesthetics of bonsai and often sketching miniature trees in a small notebook as a quiet artistic outlet.
  travel: Loi Giang prefers road trips that blend scenic nature stops with culinary discoveries, has driven the Pacific Coast Highway to explore Monterey and Big Sur, and they dream of a quiet retreat in
    the Japanese countryside to study bonsai techniques while planning a modest group tour of historic European vineyards next year, balancing travel costs with a fixed retirement budget.
  culinary: Loi Giang’s kitchen serves as a flavor laboratory where they craft heritage‑inspired fusion dishes such as lemongrass‑infused tofu lettuce wraps and miso‑glazed salmon with fresh basil, grow
    hydroponic lettuce, cilantro, and Thai basil for their recipes, pair meals with locally brewed microbrewery IPAs, and add a pinch of Szechuan pepper to give each dish a bold finish.
  core: Loi Giang blends lifelong curiosity for technology with a relaxed, garden‑centered lifestyle, and they juggle vintage radio restoration, community teaching, and inventive fusion cooking while occasionally
    letting disorganization slip into missed appointments.
background:
  cultural: Giang is a first-generation Vietnamese-American. Born in Ho Chi Minh City in 1959, she and her family fled Vietnam during the post-war diaspora and settled in the San Francisco Bay Area in the
    early 1970s. Raised in a bilingual household, she grew up celebrating Tet, preparing traditional dishes like banh xeo and pho, and participating in the close-knit Vietnamese community that values family,
    respect for elders, and education. Her cultural identity blends the Confucian emphasis on perseverance and communal harmony with the American spirit of innovation. She remains actively involved with
    the local Vietnamese cultural association, attending language classes, cultural festivals, and intergenerational storytelling events, and she uses her bilingual skills to mentor younger Vietnamese-American
    students in STEM.
