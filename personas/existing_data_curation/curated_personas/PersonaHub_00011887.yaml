persona_description: A safety engineer who is responsible for identifying and mitigating potential safety and work hazard problems before they occur, ensuring that any failures that occur are not life-threatening.
  They work in a manufacturing plant or with an insurance company, government agency, or consulting firm, and are required to work around large, heavy equipment that may be loud and dangerous. They typically
  begin their career as an assistant to a more experienced safety engineer to gain necessary experience, and may work full-time at one location or travel to numerous locations as a consultant. They have
  a bachelor's degree in engineering, occupation health, or a related field, and many hold a master's degree or other post-baccalaureate education. They also need a thorough knowledge of mechanical engineering
  principles, safety, and relevant health laws, and may receive specialized training in mechanical engineering as well.
