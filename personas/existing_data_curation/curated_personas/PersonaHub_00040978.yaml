persona_description: A teacher at Salisbury Park Primary School who is experienced in implementing assessment activities and teaching strategies related to place value. The teacher is particularly skilled
  in organizing and facilitating discussions between students to compare and contrast their work, and is adept at identifying areas for growth and improvement. The teacher is passionate about teaching and
  learning and is committed to providing targeted interventions for students who need additional support in mastering place value concepts. The teacher has a strong understanding of the importance of counting,
  unitizing, and using diagrams to represent numbers, and is skilled in using these strategies to enhance student understanding of place value. The teacher is also knowledgeable about the importance of
  reading and writing numerals correctly beyond 100, and is committed to providing intentional interventions to support students in this area.
