personas:
  professional: Nahum Barnwell is an aspiring community development student at a Georgia university who leverages strong interpersonal communication and event‑facilitation skills to organize youth arts
    workshops, create digital content for local cultural initiatives, and mediate conflicts, all while balancing meticulous planning with the flexibility needed for spontaneous creative collaborations.
  sports: Nahum Barnwell enjoys playing pickup basketball at the Emory University courts and participates in the Atlanta Youth Basketball League, while cheering for the Atlanta Hawks and Atlanta United,
    and balances regular 5‑kilometer runs with weekly strength‑training sessions, though they sometimes skip workouts after late‑night photography edits.
  arts: Nahum Barnwell immerses in Atlanta’s vibrant street‑art scene, frequently visits the High Museum of Art to view works by Kehinde Wiley and Banksy, attends open‑mic poetry nights at The Porter, curates
    Instagram reels featuring jazz legends like John Coltrane, hip‑hop icons such as Kendrick Lamar, and gospel singers like Tasha Cobbs, and occasionally produces beats on FL Studio for personal creative
    projects.
  travel: Nahum Barnwell prefers budget‑friendly weekend road trips, having explored Savannah’s historic district, the music‑rich neighborhoods of New Orleans, and the mural‑laden streets of Chicago, while
    dreaming of a photography workshop in Mexico City and a DIY art‑fest in Portland, Oregon, and always books travel using student discounts and spontaneous planning.
  culinary: Nahum Barnwell enjoys a mix of Southern comfort foods like shrimp and grits, fried chicken, and peach cobbler, alongside global street dishes such as tacos al pastor and kimchi fried rice, cooks
    modestly at home—often whipping up mac‑and‑cheese with a dash of hot sauce and experimenting with rye flour for homemade bread—and frequently seeks out food trucks at Ponce City Market for their signature
    sweet‑tea‑marinated pork buns.
  core: Nahum Barnwell blends relentless curiosity with community compassion, juggling art, basketball, and activism while habitually forgetting to water houseplants and occasionally overspending on concert
    tickets.
background:
  cultural: Nahum is a Black Atlanta native whose upbringing is steeped in Southern African‑American culture. He grew up attending a local Baptist church, where community service and musical worship were
    central. The city’s rich history of civil rights activism and vibrant Black arts scene—particularly in neighborhoods like Sweet Auburn and the East Atlanta Village—has shaped his identity. He identifies
    with the tradition of storytelling, rhythm, and communal solidarity, and he often draws inspiration from the legacy of artists, activists, and community leaders who have contributed to Atlanta’s cultural
    tapestry.
attributes:
  skills: '[''Interpersonal communication'', ''Group event coordination'', ''Basic graphic design'', ''Social media content creation'', ''Research and information gathering'', ''Conflict mediation'', ''Peer
    counseling'', ''Time management'', ''Community outreach'']'
  hobbies: '[''Street art exploration'', ''Gallery visits'', ''Open mic poetry'', ''Basketball'', ''Community volunteering'', ''After‑school tutoring'', ''Photography'', ''Digital collage creation'', ''Beat‑making'',
    ''Listening to jazz, hip‑hop, and gospel music'']'
  career_goals: Nahum aspires to pursue a degree in community development or arts administration at an HBCU in Georgia, aiming to combine his passion for the arts with community service. He hopes to work
    as a program coordinator for a youth arts nonprofit, designing workshops that foster creative expression and social cohesion. In the long term, he envisions establishing a community cultural hub in
    Atlanta that offers mentorship, art classes, and support services for underserved youth, and possibly obtaining a master's in social work to enhance his impact.
