  hobbies: '[''Urban Photography'', ''Watercolor Painting'', ''Guitar Playing'', ''Reading Speculative Fiction'', ''Attending Art Exhibitions'', ''DIY Home Improvement'', ''Strategy Board Games'', ''Lakefront
    Trail Running'', ''Mindfulness Meditation'', ''Journaling'']'
  career_goals: Jason aims to advance to senior property manager within the next three years, gaining the Certified Property Manager (CPM) credential and a real estate license to broaden his professional
    scope. Long‑term, he envisions owning a small portfolio of multifamily buildings that blend efficient management with artistic and sustainable design, such as integrated community art installations,
    green roofs, and smart‑home amenities. He also aspires to serve on community association boards, championing innovative, resident‑focused programs, and ultimately launching his own boutique property‑management
    firm that emphasizes creativity, resident well‑being, and environmental responsibility.
