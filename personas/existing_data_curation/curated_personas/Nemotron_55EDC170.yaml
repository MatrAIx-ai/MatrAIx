  career_goals: 'Although officially out of the workforce, Shawn aims to stay self‑sufficient and engaged. He plans to complete his GED within the next two years to formalize his knowledge, and he hopes
    to turn his woodworking hobby into a modest side business that provides occasional supplemental income for his family. Volunteering is high on his agenda: he wants to mentor at‑risk youth at the local
    community center, teaching practical skills like tool safety and basic home maintenance. Additionally, Shawn seeks to secure a comfortable, low‑stress retirement by maintaining his health through regular
    fishing trips, staying financially organized with the help of his spouse, and cultivating a small network of trusted friends for social support.'
