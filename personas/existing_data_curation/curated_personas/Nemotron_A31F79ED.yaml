  hobbies: '[''Cooking Mexican Cuisine'', ''Volunteer Teaching Spanish'', ''Organizing Community Cultural Events'', ''Lakefront Walking'', ''Herb and Pepper Gardening'', ''Salsa Dancing'', ''Reading Mexican
    History Novels'', ''Listening to Mariachi Music'']'
  career_goals: Ivette aims to move into a district or regional supervisory role where she can mentor multiple store teams and implement community‑focused sales initiatives. She also wishes to streamline
    her current store's performance metrics to exceed corporate targets, securing a stable retirement while continuing to support her local Mexican‑American community through outreach programs. Ultimately,
    she hopes to leave a legacy of a supportive, inclusive workplace culture.
