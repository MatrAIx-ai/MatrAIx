personas:
  professional: James Carter is an 11‑year‑old budding programmer who designs and iterates Scratch games after school, applying their practical curiosity to troubleshoot bugs while balancing school responsibilities
    with the robotics club’s build‑test cycle.
  sports: James Carter plays midfield for the Hampstead Youth Soccer Club, cheering for Arsenal while practicing weekend kick‑drills at the local park and occasionally joining a junior cricket team during
    the summer, driven by a competitive streak that pushes them to improve their speed and teamwork.
  arts: James Carter is a fantasy‑novel enthusiast who sketches detailed battle scenes inspired by the works of J.K. Rowling and Brandon Sanderson, often listening to the soundtrack of the Harry Potter
    films while doodling characters in the margins of school notebooks.
  travel: James Carter loves weekend outings to the nearby Epping Forest for rock‑collecting expeditions, has visited the historic town of Bath on a school trip, and dreams of camping under the Northern
    Lights in Scandinavia once they can afford the adventure.
  culinary: James Carter prefers homemade pizza topped with mozzarella, pepperoni, and pineapple, enjoys making chocolate chip pancakes for breakfast on rainy days, and can reliably whip up a classic PB&J
    sandwich after watching tutorial videos on YouTube.
  core: James Carter is a competitive, curiosity‑driven 11‑year‑old who balances coding, soccer, and sketching while wrestling with frequent worries that turn even a simple game bug into a personal challenge.
