personas:
  professional: An aspiring junior horticulturist and budding pianist, Ana Garcia channels their methodical nature and love for routine into caring for their family’s tomato and herb garden while they master
    structured piano pieces, demonstrating reliable dedication and compassion toward living things.
  sports: An organized youth swimmer, Ana Garcia belongs to the local AquaKids Swim Club and joins the community’s junior soccer team during spring, favoring solo lap drills and modest weekend matches with
    the River City Runners youth league, which aligns with their preference for small‑group activity and steady fitness.
  arts: A quiet creative soul, Ana Garcia sketches scenic garden views inspired by Monet, knits scarves using wool from their grandparents, crafts friendship bracelets while they listen to Ludovico Einaudi,
    and finds comfort in reading 'Harry Potter' and watching wildlife documentaries, reflecting a blend of visual, tactile, and musical expression.
  travel: A thoughtful explorer, Ana Garcia prefers short, well‑planned family trips to nearby natural sites such as Redwood National Park and the coastal town of Santa Cruz, balancing a love for wildlife
    documentaries with a desire for familiar routines, while they dream of a future school‑organized field trip to the Grand Canyon.
  culinary: A budding home chef, Ana Garcia enjoys preparing simple pasta with fresh tomato sauce, basil, and oregano, savors caprese salads, and practices making herbal tea blends from garden‑grown mint
    and rosemary, demonstrating beginner‑level cooking skills and a fondness for fresh, herb‑centric dishes.
  core: Ana Garcia is a routine‑loving, compassionate 12‑year‑old who channels their worries into journaling, tends to herbs with meticulous care, and occasionally indulges in impulsive board‑game purchases
    when stress peaks.
background:
  cultural: Ana was raised in a predominantly Latter‑Day Saint community in Utah County, where family, service, and modest living are emphasized. Her family participates in weekly church activities, community
    service projects, and local events such as the county fair and holiday parades. While she celebrates mainstream American holidays like Thanksgiving and Christmas with family traditions, she also observes
    cultural customs common in the region, such as potluck gatherings after church and seasonal outdoor activities like hiking and picnics. The community’s focus on reliability, modesty, and helping neighbors
    aligns closely with Ana’s own values of compassion, routine, and harmonious relationships.
