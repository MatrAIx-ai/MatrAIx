  career_goals: Looking ahead, Ana dreams of a career that combines her love for routine, helping others, and working in a structured environment. She is most drawn to becoming an elementary school teacher
    because she enjoys organizing learning activities, fostering a harmonious classroom, and supporting children’s growth. She also imagines a future as a veterinary technician, where she could apply her
    compassion for animals and her methodical approach to care. In both paths, she hopes to create stable, nurturing spaces where she can contribute to the wellbeing of people and pets alike.
