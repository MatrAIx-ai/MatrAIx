  career_goals: Gabriel imagines a future where he can combine his love for order and helping others. He dreams of becoming a veterinarian because he enjoys caring for animals and values a stable, structured
    work environment. He also expresses interest in engineering, attracted by the clear steps and predictable outcomes of building things. As he grows, he hopes to develop skills that allow him to assist
    peers who feel anxious, perhaps as a youth counselor or school support staff, reflecting his kind and cooperative nature.
