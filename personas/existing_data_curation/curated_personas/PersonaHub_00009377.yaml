persona_description: A teacher who uses self-assessment rubrics to grade assignments. The teacher sets up a simple 1-5 scale for each skill or idea to be graded, and students circle the number they feel
  they earned. The teacher then circles the number they feel the student earned when grading the work. This helps students understand how grades are earned and how to focus on specific skills and concepts.
  The teacher uses the rubrics to match their grading with student performance, and to identify areas where students need additional support. The teacher is likely to be a seasoned teacher with experience
  in grading assignments, and is comfortable using self-assessment rubrics as a tool for grading.
