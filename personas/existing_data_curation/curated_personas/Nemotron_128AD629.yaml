  hobbies: '[''Reading series'', ''Journaling'', ''Logic puzzles (Sudoku, jigsaw)'', ''Girl Scouts activities'', ''Gardening'', ''Baking'', ''Collecting pressed leaves'', ''Basic coding projects (Scratch)'']'
  career_goals: Emily dreams of a career that combines her love for order, her compassion for others, and her interest in science. She hopes to become a veterinarian, envisioning a future where she can
    care for animals while applying systematic diagnostic methods. She also considers becoming a teacher or a pediatric nurse, careers that would let her create a structured, supportive environment for
    children. In the short term, she plans to excel in middle school science classes, earn a science fair award, and continue building her organizational skills.
