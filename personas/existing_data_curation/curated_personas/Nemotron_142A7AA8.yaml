  hobbies: '[''Football (team practice and games)'', ''Basketball'', ''Robotics club (building and programming robots)'', ''Strategic video gaming'', ''Chess'', ''Fishing'', ''Collecting baseball cards'',
    ''Reading about space and engineering'']'
  career_goals: Robert aims to earn a scholarship to play football at a college level while studying engineering, hoping to become a mechanical or aerospace engineer who designs high-performance sports
    equipment. In the short term, he wants to be captain of his middle-school football team, win the regional math competition, and lead his robotics club to the state tournament. He envisions a future
    where his disciplined work ethic and competitive drive translate into a career that blends physical performance with technical innovation.
