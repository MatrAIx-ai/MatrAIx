personas:
  professional: Robert Owens is an aspiring robotics engineer who leverages their love for structure and disciplined practice to design competition-ready bots for the school robotics club, while their competitive
    streak drives them to meticulously document each build and strive for top placement in regional contests.
  sports: Robert Owens plays quarterback for the Brookside Middle School football team, practices shooting guard drills with the community center's Junior Warriors basketball squad, follows the professional
    River City Titans football franchise for tactical inspiration, and maintains a rigorous conditioning routine that blends structured drill work with spontaneous pickup games, reflecting their sociable
    yet competitively driven nature.
  arts: Robert Owens immerses themselves in arts by streaming Imagine Dragons and listening to the piano compositions of Yiruma, binge‑watching Marvel Cinematic Universe movies starring Chris Evans, and
    sketching sci‑fi rockets inspired by their space‑engineering books, letting the blend of music, film, and personal drawing fuel their imaginative breaks between sports and robotics.
  travel: Robert Owens prefers meticulously planned weekend getaways, such as fishing trips to Lake Evergreen with their dad and camping excursions in the nearby Pine Ridge State Park, while dreaming of
    a future visit to the Kennedy Space Center in Florida, balancing school schedules with a checklist‑driven approach that satisfies their love of structure and adventure.
  culinary: Robert Owens favors pepperoni pizza with extra mozzarella, enjoys grilling the trout caught on weekend fishing outings, and can whip up a surprisingly decent macaroni‑and‑cheese using sharp
    cheddar and a breadcrumb topping, though they often neglect to wash their hands before cooking, a quirky habit that sometimes irks their parents.
  core: Robert Owens is a hyper‑organized, competition‑driven 12‑year‑old who balances a love for structured robotics and sports with occasional video‑game procrastination and a habit of skipping hand‑washing
    before meals.
background:
  cultural: Robert was raised in Wellford, South Carolina, within a middle-class, Southern-Baptist family that values community, hospitality, and tradition. He grew up attending church youth activities,
    local high-school football games, and neighborhood barbecues, which reinforced his appreciation for teamwork and regional customs. The rural surroundings have fostered a love for outdoor pursuits such
    as fishing and hiking, while the town’s strong emphasis on school sports and academic achievement shaped his competitive mindset. His cultural environment blends Southern hospitality with a focus on
    discipline, education, and family involvement.
attributes:
