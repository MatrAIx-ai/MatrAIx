  career_goals: Mirtha aspires to turn her communication and organizational talents into a career that puts her in the spotlight while delivering tangible results. She is focused on pursuing a degree in
    communications, public relations, or hospitality management, with the long‑term goal of becoming an event director or community outreach specialist. She envisions herself leading large‑scale cultural
    festivals, corporate events, or youth leadership programs that celebrate her Honduran heritage and foster cross‑cultural understanding. Competitive ambition drives her to seek leadership roles early,
    such as student council president or captain of a school team, as stepping stones toward senior managerial positions in the future.
