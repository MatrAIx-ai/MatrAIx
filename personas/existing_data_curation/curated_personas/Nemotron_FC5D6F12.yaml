personas:
  professional: Mirtha Ballesteros is a charismatic high‑school drama club star and budding event coordinator, leveraging their natural public‑speaking talent, bilingual fluency, and detail‑oriented planning
    to orchestrate school productions, community outreach events, and social‑media campaigns with a polished, results‑driven style.
  sports: Mirtha Ballesteros is a dedicated member of her school's varsity girls soccer team, training three times a week and playing as a forward, while also dancing Latin rhythms for cardio, and passionately
    supports the nearby professional soccer club D.C. United, often attending matches on weekends.
  arts: Mirtha Ballesteros energizes the school’s drama club as a lead actor and improv enthusiast, while crafting TikTok videos set to Bad Bunny, J Balvin, and classic Beyoncé tracks, and draws inspiration
    from Lin‑Manuel Miranda’s musical storytelling to blend performance with cultural commentary.
  travel: Mirtha Ballesteros prefers short, well‑planned getaways that blend cultural immersion and social sharing, having explored the historic streets of Old Town Annapolis, taken a weekend surf trip
    to Rehoboth Beach, and dreaming of a future backpacking adventure through Mexico City’s street markets and the Caribbean’s vibrant festivals.
  culinary: Mirtha Ballesteros showcases their love for traditional dishes by mastering pupusas stuffed with cheese and loroco, frying crisp plantain chips, and experimenting with spicy salsa roja, while
    balancing a budding skill set that lets them whip up quick TikTok cooking demos using fresh cilantro, corn masa, and homemade salsa.
  core: Mirtha Ballesteros is a socially driven, fiercely organized teen who channels their competitive spirit into drama, soccer, and event planning, while balancing disciplined budgeting, proactive health
    habits, and a vibrant cultural flair that fuels their creative and community‑focused pursuits.
background:
  cultural: Mirtha was raised in a Honduran immigrant family that maintains strong ties to its Central American roots. Spanish is spoken at home, and family gatherings are marked by traditional foods, music,
    and celebrations such as Semana Santa and Honduran Independence Day. She balances these cultural practices with the influences of her Annapolis community, participating in local festivals while introducing
    peers to Honduran customs through food and dance. Her cultural identity reinforces values of family solidarity, respect for elders, and a pragmatic work ethic, all of which shape her social interactions
    and aspirations. Mirtha actively participates in the local Hispanic outreach program, serving as a cultural liaison and helping newer immigrant families navigate school systems and community resources.
