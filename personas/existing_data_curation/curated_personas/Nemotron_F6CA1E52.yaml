personas:
  professional: Victor Cardenas, a seasoned commercial cleaning and building maintenance specialist with over forty years of hands‑on experience, leverages a meticulous eye for safety, floor‑care expertise,
    and a flair for aesthetic improvement to mentor crews and champion workplace harmony, even as their spontaneous nature sometimes leads to loosely structured schedules.
  sports: Victor Cardenas, an enthusiastic member of the Ponce Senior Walkers Club and a regular participant in the local Salsa Fitness Group, enjoys spontaneous waterfront strolls, dances cardio‑style
    salsa nights, and fervently supports the Leones de Ponce baseball team during spring and summer games.
  arts: Victor Cardenas, a watercolor hobbyist who captures coastal sunsets on paper, frequently visits the Calle Loíza street‑art gallery, draws inspiration from the island’s renowned muralist Kacho, and
    delights in the salsa rhythms of Willie Colón and the classic boleros of Celia Cruz, weaving these influences into their creative evenings.
  travel: Victor Cardenas prefers spontaneous, culturally rich trips, often planning last‑minute getaways to nearby Old San Juan for its historic forts, to the island’s tranquil Culebra beaches, and occasionally
    journeys abroad to Barcelona’s vibrant festivals or Rio de Janeiro’s carnival, balancing travel costs with senior‑discount deals.
  culinary: Victor Cardenas, an intermediate home cook, experiments with traditional dishes like mofongo relleno de camarón, arroz con gandules, and tembleque de coco, seasoning them with freshly harvested
    cilantro, oregano, and mint from their balcony garden, and enjoys sharing these meals at neighborhood potlucks.
  core: Victor Cardenas, a 63‑year‑old cleaning veteran with a love for salsa, watercolor sunsets, and community clean‑up, navigates life with spontaneous creativity, friendly mentorship, and a modest,
    occasionally impulsive, approach to finances.
background:
  cultural: Victor grew up in Mercedita, a historic district of Ponce known for its sugar‑cane heritage and close‑knit community. As a Puerto Rican, he was raised with deep respect for family, music, and
    Catholic traditions, participating in celebrations of Bomba, Plena, and salsa that echo the island’s Afro‑Caribbean roots. The colorful festivals, street art, and communal values of Ponce have shaped
    his sociable and cooperative nature. Fluent in Spanish and comfortable with basic English, Victor bridges generational gaps by sharing stories of local folklore and by helping organize cultural events
    that honor the island’s past while embracing new ideas.
attributes:
  skills: '["Commercial cleaning", "Floor care and polishing", "Basic plumbing and electrical troubleshooting", "Safety inspections and compliance", "Waste management and recycling", "Customer service and
