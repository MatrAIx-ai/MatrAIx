  hobbies: '["Salsa dancing", "Playing bongos", "Watercolor painting", "Balcony gardening", "Attending local festivals (e.g., Carnaval Ponceño)", "Community volunteering (clean-up drives)", "Reading art
    history", "Cooking traditional Puerto Rican recipes", "Walking along the Mercedita waterfront", "Participating in cultural workshops"]'
  career_goals: Victor aims to transition into a senior supervisory role where he can mentor younger cleaners and oversee the quality of large facilities. He hopes to eventually launch a small community‑based
    cleaning service that combines his expertise in maintenance with his love for art by offering occasional workshops on workplace aesthetics and local cultural crafts. Additionally, he wants to volunteer
    as a coordinator for neighborhood clean‑up drives tied to cultural festivals, ensuring that the beauty of his hometown is preserved for future generations.
