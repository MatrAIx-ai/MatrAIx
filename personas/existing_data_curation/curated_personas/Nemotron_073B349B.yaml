  career_goals: Esperanza aims to complete the remaining credits of her college education, focusing on early childhood education or community arts programming. She envisions launching a modest home‑based
    studio where she can sell her handcrafted textiles and offer after‑school art workshops for local children, fostering creativity in a safe, small‑group environment. Over the longer term, she hopes to
    collaborate with the New Braunfels cultural center to develop a monthly pop‑up exhibit that showcases Mexican‑Texan folk art, bridging her heritage with contemporary artistic expression. While staying
    grounded in family responsibilities, she aspires to balance personal fulfillment with modest entrepreneurial growth.
