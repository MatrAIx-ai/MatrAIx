  hobbies: '[''Strategic video gaming'', ''LEGO Technic and model kit building'', ''Basketball'', ''Reading science-fiction and popular science'', ''Coding (Scratch, Python)'', ''Hiking and outdoor exploration'',
    ''Collecting baseball cards'']'
  career_goals: Anthony aims to translate his love for structure and problem-solving into a career in engineering. In the next few years he plans to improve his math grades, earn a spot on his school's
    robotics team, and compete in regional contests. He hopes to secure a scholarship for civil or mechanical engineering at a Texas university such as Texas A&M, eventually working on infrastructure projects
    that have clear, tangible outcomes. Parallel to this, he is intrigued by the growing field of esports and game development, and he aspires to create his own video games or compete professionally, balancing
    his academic path with his competitive interests.
