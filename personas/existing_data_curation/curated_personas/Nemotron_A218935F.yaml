  hobbies: '[''Visiting Art Galleries'', ''Sketching'', ''Digital Photography'', ''Reading Contemporary Fiction and Art Criticism'', ''Indoor Gardening'', ''Cooking Seasonal Dishes'', ''Attending Small
    Jazz Concerts'', ''Volunteering at Community Art Workshops'', ''Participating in a Small Book Club'']'
  career_goals: Cynthia aims to translate her passion for art and community service into a part‑time role as a museum educator or nonprofit arts coordinator. She plans to complete a bachelor’s degree in
    Museum Studies or Arts Administration, earn a certificate in Community Arts Programming, and eventually lead a city‑wide arts outreach initiative that provides free workshops for under‑served neighborhoods.
    In the short term, she hopes to expand her volunteer leadership at the local Art Institute, develop an online gallery blog, and build a professional network in Chicago’s cultural sector.
