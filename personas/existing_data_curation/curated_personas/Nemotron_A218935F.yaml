personas:
  professional: Cynthia Mclarrin is an emerging museum educator and nonprofit arts coordinator who leverages strong organizational abilities, meticulous project-management skills, and deep art-historical
    knowledge to design inclusive community workshops, while they channel their reserved yet collaborative nature into thoughtful program development and smooth stakeholder communication.
  sports: Cynthia Mclarrin follows the Chicago Bulls and Chicago Cubs avidly, runs five-kilometer routes along the Lakefront Trail, attends a weekly beginner yoga session at a West Loop community center,
    and competes in a mixed-gender recreational softball league at Hoffman Field, balancing these pursuits with a structured schedule that leaves room for quiet recovery.
  arts: Cynthia Mclarrin spends weekends sketching Chicago's skyline, curates a blog featuring works by Grant Wood, Georgia O'Keeffe, and contemporary artist Kehinde Wiley, attends intimate jazz performances
    at The Green Mill showcasing classics by Miles Davis and modern sets by Kamasi Washington, and draws inspiration from the narratives of independent filmmaker Kelly Reichardt, weaving these influences
    into her own visual storytelling.
  travel: Cynthia Mclarrin prefers thoughtfully curated weekend getaways, often planning low-key trips to Milwaukee's art museums, the historic streets of Madison, or the serene dunes of Indiana Dunes State
    Park, while dreaming of a spring visit to the Musee d'Orsay in Paris and a cultural immersion in Kyoto's temple gardens, balancing modest travel budgets with occasional splurges on museum passes.
  culinary: Cynthia Mclarrin delights in preparing seasonal Midwestern fare such as creamy corn chowder, smoked pork shoulder with apple glaze, and fresh beet and goat cheese salads featuring locally sourced
    heirloom tomatoes and sweet corn, demonstrates confident home-cooking skills that impress friends at small gatherings, but they sometimes lose track of time while perfecting a caramelized crust, leading
    to late-night dishes.
  core: Cynthia Mclarrin is a quietly curious art enthusiast whose meticulous budgeting and love for sketching cityscapes coexist with a habit of over-collecting vintage gallery postcards and a tendency
    to postpone dentist appointments for the sake of community workshops.
background:
  cultural: Cynthia grew up in a middle‑class white family in the Midwest, steeped in the region’s values of reliability, community involvement, and modesty. Living in Chicago has exposed her to a vibrant,
    multicultural arts scene, shaping her appreciation for diverse artistic expressions. Her upbringing includes traditional American holidays such as Thanksgiving and Christmas and a background of Protestant
    values that emphasize service and cooperation. This blend of Midwestern sensibility and urban cultural immersion informs her identity and perspectives.
