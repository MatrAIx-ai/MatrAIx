  career_goals: Even at four, Charles often talks about his future in terms of helping others within a clear, organized framework. He dreams of becoming a firefighter, drawn to the structured training and
    teamwork involved in protecting his community. He also expresses interest in building—saying he might become a carpenter or construction worker—reflecting his love of constructing things. Occasionally,
