personas:
  professional: Tracy Waddell, a veteran middle-school teacher with over a decade of experience, they channel their curiosity and love for the arts into interdisciplinary STEAM curricula that blend sketching,
    hands‑on projects, and mindfulness, while their relaxed, sometimes disorganized planning style favors spontaneous student‑driven explorations over rigid schedules.
  sports: Tracy Waddell, an avid walker and weekend explorer along the Mississippi River trail, they cheer for the Minnesota Twins at Target Field, attend select Minnesota Timberwolves games, and participate
    in a community yoga class at a local studio while occasionally joining a walking club that meets at Minnehaha Falls.
  arts: Tracy Waddell, a regular at the Minneapolis Institute of Art and local galleries, they sketch scenes in a pocket notebook, draw inspiration from artists like Yayoi Kusama, Georgia O'Keeffe, and
    the music of Sufjan Stevens, and volunteer monthly at a community arts center teaching elementary students to experiment with mixed media.
  travel: Tracy Waddell, a weekend wanderer who balances modest savings with a love for small‑group trips, they enjoy day trips to the North Shore, have visited Duluth and the Apostle Islands, dream of
    a summer art pilgrimage to Florence, Italy, and plan low‑key road trips with a close friend, carefully budgeting each journey.
  culinary: Tracy Waddell, a balcony gardener who harvests basil, mint, heirloom tomatoes, and seasonal herbs, they craft fresh ratatouille and quinoa bowls, bake sourdough bread using a starter nurtured
    over months, and unwind with a cup of herbal tea sweetened with honey, often experimenting with new flavor pairings inspired by the weekly farmers’ market.
  core: Tracy Waddell, a curious and compassionate educator with a habit of misplacing planner pages, they turn everyday stress into mindful growth while constantly seeking art‑infused inspiration.
background:
  cultural: Tracy was born and raised in the Twin Cities region of Minnesota, growing up in a middle-class, predominantly white community with deep roots in the Upper Midwest. Her family heritage blends
    Anglo-Scottish and German ancestry, and the local cultural fabric, characterized by modesty, strong public-school support, love of nature, and a vibrant arts scene, shaped her values. She participated
    in community theater as a teenager and spent summers at local farms and lakes, fostering an appreciation for seasonal rhythms and community cooperation. The region's emphasis on civic engagement and
    collaborative spirit informs her commitment to inclusive education and community outreach. While she identifies as white, she also values the cultural diversity of Saint Paul, regularly engaging with
    multicultural festivals and incorporating diverse perspectives into her teaching.
attributes:
  skills: '[''Curriculum Design'', ''Differentiated Instruction'', ''STEAM Integration'', ''Arts-Based Learning'', ''Social-Emotional Support'', ''Classroom Management'', ''Educational Technology Integration'',
    ''Collaborative Learning Facilitation'', ''Parent and Community Engagement'', ''Inclusive Education Practices'', ''Creative Lesson Planning'', ''Project-Based Learning'']'
  hobbies: '[''Visiting art museums and galleries'', ''Sketching and painting'', ''Reading contemporary fiction and philosophy'', ''Writing short stories and poetry'', ''Balcony gardening'', ''Yoga and
    mindfulness meditation'', ''Walking/hiking in local parks and river trails'', ''Board game nights with close friends'', ''Volunteering at community arts workshops'', ''Experimenting with cooking and
    baking'']'
  career_goals: Tracy aims to broaden her impact beyond her own classroom by moving into a role that blends her love for the arts, curiosity for innovative pedagogy, and commitment to student wellbeing.
    She plans to pursue a master's in curriculum and instruction with a focus on STEAM and social-emotional learning, with the goal of becoming an instructional coach or curriculum specialist who mentors
    teachers in integrating arts across subjects. In parallel, she hopes to author a picture book that celebrates curiosity and gentle resilience for early readers, and eventually launch a community after-school
    arts program offering flexible, project-driven workshops for diverse youth in Saint Paul. Recognizing her sensitivity to stress, she also intends to develop structured organization habits and mindfulness
    practices to sustain her long-term professional growth while maintaining personal wellbeing.
