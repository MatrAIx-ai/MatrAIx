personas:
  professional: Brandon Price is a detail-driven clinical laboratory technologist who leverages meticulous quality-control protocols and statistical analysis expertise to ensure precise test results, while
    their innate curiosity pushes them toward mastering molecular diagnostics and their organized nature keeps the lab's workflow impeccably efficient.
  sports: Brandon Price spends weekends hiking the Niagara escarpment and fishing at Lake Ontario as a member of the Niagara Outdoor Fishing Club, roots for the Buffalo Bills in football season and the
    Buffalo Sabres during hockey, and they balance solitary cardio sessions with occasional pickup basketball games at the local community center.
  arts: Brandon Price captures the micro-world using macro photography inspired by the detailed work of Robert Cheetham, curates playlists featuring Bon Iver and Sufjan Stevens while unwinding after shifts,
    and they occasionally join a board-game night that evolves into low-key improv storytelling performances.
  travel: Brandon Price favors meticulously planned road trips that blend hiking and photography, having recently documented the geysers of Yellowstone and the cliffside trails of Acadia, while dreaming
    of a cross-country adventure through Iceland's volcanic landscapes once they have saved enough from their disciplined budgeting.
  culinary: Brandon Price applies laboratory precision to their kitchen experiments, perfecting sous-vide salmon with a lemon-dill glaze, mastering the chemistry of homemade sourdough using rye flour, and
    they regularly treat friends to macro-styled plating of heirloom tomato gazpacho garnished with basil microgreens.
  core: Brandon Price is a hyper-organized lab technologist who battles chronic worry by cataloguing every hobby from puzzles to fishing gear, yet can't resist binge-watching true-crime documentaries late
    into the night.
background:
  cultural: Brandon grew up in a working‑class, white family in Wilson, NY, with roots in Irish and Italian heritage. The upstate New York environment, characterized by close‑knit community values, a strong
    work ethic, and a practical outlook, shaped his disciplined approach to life. Local traditions such as supporting the Buffalo Bills and participating in community events fostered his sense of belonging
    and cooperation. His upbringing in a modest, family‑oriented setting emphasized responsibility, respect for others, and a balance between self‑reliance and community service.
attributes:
  skills: '[''Specimen collection and processing'', ''Phlebotomy'', ''Microscopy and slide preparation'', ''Clinical chemistry analyzer operation'', ''Quality control and assurance (QC/QA)'', ''Laboratory
    Information System (LIS) data entry'', ''Regulatory compliance (CLIA, CAP)'', ''Instrument troubleshooting and maintenance'', ''Statistical data analysis using Excel'', ''Infection control protocols'']'
  hobbies: '[''Hiking and nature walks'', ''Fishing on Lake Ontario'', ''Macro photography'', ''Jigsaw puzzles and Sudoku'', ''Strategy video gaming'', ''Board games with friends'', ''Home cooking and experimenting
    with recipes'', ''Volunteering at local blood donation drives'']'
  career_goals: Brandon aims to earn his ASCP certification within the next year and pursue an associate’s degree in medical laboratory science to deepen his technical knowledge. He aspires to specialize
    in molecular diagnostics, eventually becoming a senior technologist or laboratory manager where he can lead quality improvement projects and mentor new staff. His long‑term ambition is to contribute
    to patient care by implementing cutting‑edge testing methods while maintaining the high standards he values.
