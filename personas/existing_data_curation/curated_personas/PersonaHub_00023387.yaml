persona_description: A scientist or researcher who is interested in studying and mapping changes on the Earth's surface, particularly in relation to human activities such as groundwater pumping and hydrocarbon
  production. This individual may be working on projects related to mineral and environmental assessments, geochemical data analysis, and the application of geologic mapping, surface processes, remote sensing
  research, ecological processes, and earthquake hazard applications. They are likely to be familiar with satellite interferometric synthetic aperture radar (SAR) technology for measuring and mapping changes
  on the Earth's surface and would be interested in using this technology to study and understand the impact of human activities on the ground. They may also have a background in hydrology, geology, or
  environmental science, and would be interested in using the data from these studies to inform decision-making and manage pesticide application practices to protect drinking water resources and aquatic
  species.
