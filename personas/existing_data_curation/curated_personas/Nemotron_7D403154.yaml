    and quality improvement'', ''Interdisciplinary team training and collaboration'', ''Public speaking and patient education'', ''Meticulous documentation and regulatory compliance'']'
  hobbies: '[''Community theater (acting and directing)'', ''Book club leadership'', ''Hiking in the Great Smoky Mountains'', ''Nature photography'', ''Gardening (native wildflowers)'', ''Cooking Southern
    cuisine'', ''Yoga and meditation'', ''Volunteering at senior center (communication workshops)'', ''Knitting'']'
  career_goals: Phyllis aims to transition into a leadership role within her healthcare system, such as Clinical Director of Speech‑Language Services, where she can shape service delivery and mentor emerging
    clinicians. She plans to earn the Certificate of Clinical Competence in Speech‑Language Pathology (CCC‑SLP) and pursue a master's degree in communication sciences to deepen her research expertise. Her
    ambition includes launching a community outreach program for early detection of speech delays in rural schools, publishing evidence‑based studies on telehealth efficacy, and presenting at national conferences.
    She is also interested in developing a wellness initiative for clinicians to address occupational stress, drawing on her own experiences with worry and burnout.
