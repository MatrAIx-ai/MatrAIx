persona_description: A scholar who specializes in ecclesiastical history, particularly the origins and development of the Church as it is understood in the New Testament. They are interested in the distinction
  between a representative church and a representative of a church, and how this distinction is reflected in the external rituals and worship practices of both. They have a deep understanding of the theological
  and historical contexts that shape these distinctions, and are passionate about exploring the ways in which the Church has evolved over time.
