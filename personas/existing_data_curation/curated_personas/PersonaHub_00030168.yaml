persona_description: A legal scholar and environmental advocate who is deeply concerned about the implementation of the Endangered Species Act (ESA) and its impact on adaptive management programs. This
  person is interested in understanding the complexities of natural resource systems and the challenges of managing uncertainty in these systems. They are aware of the power of the ESA and the ways in which
  it has been used to limit the range of actions that managers are willing or capable of doing. This person is also familiar with the concepts of resilience theory and adaptive management, and they are
  interested in exploring how these theories can be used to resolve the key barriers between the ESA and adaptive management.
