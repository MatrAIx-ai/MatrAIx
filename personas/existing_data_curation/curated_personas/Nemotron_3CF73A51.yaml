  career_goals: Ronald aims to transition into a senior operations role within a cultural institution, such as a community arts center or museum, where he can blend his managerial expertise with his passion
    for the arts. He plans to complete a bachelor's degree in Business Administration and pursue a certificate in Arts Management within the next three years. Long‑term, he envisions leading a multidisciplinary
    team that creates engaging public programs, while also mentoring emerging managers. He hopes to champion initiatives that make arts more accessible in underserved neighborhoods of Brooklyn and eventually
    develop a small combined gallery‑café space that serves both as a community hub and a showcase for local talent.
