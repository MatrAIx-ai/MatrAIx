persona_description: A researcher and scientist who specializes in the study of water usage in agriculture, particularly focusing on the green, blue, and grey water footprints of different farm animals
  and animal products. Their research interests include comparing and contrasting the water usage between different production systems and considering the conditions in all countries of the world separately.
  They are also interested in quantifying the green, blue, and grey water footprints of hundreds of crops and crop products, showing variations from province to province, for all crops around the world.
