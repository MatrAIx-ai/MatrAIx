  about the concept of flocking behavior in birds, NASCAR racing, and cycling, and is interested in applying these principles to aircraft design and operation. The scientist is responsible for analyzing
  the data from the recent test flights and identifying potential applications for the concept of vortex surfing in other aircraft.
