personas:
  professional: Joseph Thornbury, an 82‑year‑old veteran HVAC mechanic, blends six decades of hands‑on system diagnostics, copper‑tube brazing, and smart‑thermostat integration with a mentor’s patience,
    delivering cost‑effective, energy‑efficient solutions to local businesses while championing safety and craftsmanship, and they approach each job with a balance of curiosity and practical know‑how.
  sports: Joseph Thornbury, a steadfast fan of the Clemson Tigers football team and the Atlanta Braves, spends leisurely mornings fishing on Lake Hartwell, participates in the Oconee County Seniors Walking
    Club, joins a local bowling league that meets at the community center each Thursday, and they relish staying active while cheering on their beloved teams.
  arts: Joseph Thornbury, a choir member at their local church, finds solace in classic Southern gospel and the timeless storytelling of Johnny Cash and Dolly Parton, occasionally attends performances at
    the historic Columbia Theatre, and they let music and modest stagecraft enrich their quiet evenings.
  travel: Joseph Thornbury, who prefers road trips in their lovingly restored 1960s Chevrolet, has toured historic Savannah and Charleston, chased sunrise over the Great Smoky Mountains, dreams of a genealogical
    research trip to Washington, D.C., and they balance careful planning with spontaneous detours to roadside diners.
  culinary: Joseph Thornbury, a seasoned home cook who harvests tomatoes, green beans, and sweet potatoes from their garden, delights in cooking shrimp and grits, collard greens simmered with smoked ham
    hocks, and peach cobbler topped with a crunchy crumble, reserves a special place for Saturday barbecues with friends, and they savor each bite as a celebration of simple, hearty flavors.
  core: Joseph Thornbury, an 82‑year‑old HVAC sage who swaps copper pipe for fishing lines, tunes their vintage Chevy while tending a thriving garden, balances relentless curiosity with old‑school practicality,
    and they embody gentle Southern hospitality in every aspect of life.
background:
  cultural: Joseph was born and raised in the foothills of Oconee County, South Carolina, into a white, working-class family with deep roots in the region. His upbringing emphasized southern hospitality,
    church involvement, and the value of hard work in skilled trades. He grew up during the post-World War II era, witnessing the transition from coal-fueled heating to modern electric and gas systems.
    The tight-knit community and traditional values of respect, self-reliance, and neighborly support have shaped his worldview, while his natural curiosity has kept him open to new ideas and technologies.
attributes:
  skills: '[''HVAC system installation'', ''Refrigerant handling and recovery'', ''Preventive maintenance scheduling'', ''Complex system troubleshooting'', ''Energy-efficiency retrofitting'', ''Blueprint
    and schematic reading'', ''Electrical wiring for HVAC'', ''Copper-tube brazing'', ''Apprentice mentorship and training'', ''Customer service and communication'']'
  hobbies: '[''Woodworking'', ''Gardening'', ''Fishing'', ''Model train building'', ''Genealogy research'', ''Church choir participation'', ''Community volunteer work'', ''Classic car restoration'']'
  career_goals: Although officially retired, Joseph aims to continue consulting for local small-business owners and serve as a mentor for the next generation of HVAC technicians. He hopes to document his
    practical knowledge in a handbook for rural technicians, help his community adopt greener heating solutions, and volunteer occasional workshops at the county’s technical school. Maintaining his health
    so he can stay active in the field and preserving his professional legacy are his primary ambitions at this stage of life.
