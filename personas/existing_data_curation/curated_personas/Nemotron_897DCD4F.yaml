  career_goals: Cynthia aims to deepen her expertise in full‑stack development while taking on mentorship roles. Over the next five years she plans to earn a professional certification in web accessibility
    and complete a GED or equivalent. She hopes to lead small development projects for nonprofit organizations serving Utah’s Latino community, ensuring their digital presence is inclusive and culturally
    relevant. Ultimately, she envisions launching her own freelance studio focused on bilingual websites for local businesses, and providing training workshops for other self‑taught developers from underrepresented
    backgrounds.
