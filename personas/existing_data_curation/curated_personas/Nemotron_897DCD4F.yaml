personas:
  professional: Cynthia Rotger, an experienced web developer with over 20 years in front‑end technologies like HTML5, CSS3, JavaScript, and a solid grasp of WordPress and accessibility standards, channels
    her family‑centered values into building bilingual, inclusive websites for local nonprofits and mentors budding coders through patient, hands‑on workshops, balancing methodical analysis with openness
    to new ideas.
  sports: Cynthia Rotger, a weekend hiker of the Wasatch foothills, is a dedicated fan of the Utah Jazz and occasionally joins a local running club to train for 5K races, incorporating gentle yoga for flexibility
    while preferring solitary, low‑key workout sessions over crowded gym environments.
  arts: Cynthia Rotger, a quiet steward of visual and literary arts, captures everyday scenes of West Valley City through photography, curates a personal wall of Frida Kahlo and Diego Rivera prints, reads
    historical novels by Arturo Pérez‑Reverte in a book club, and unwinds knitting while streaming classic mariachi recordings, letting cultural heritage subtly inform her creative moments.
  travel: Cynthia Rotger, who values cultural immersion and reflective retreats, has explored Oaxaca's culinary markets, trekked Kyoto's serene temples, and plans a scenic drive along California's Pacific
    Coast Highway, always crafting detailed itineraries that balance budget constraints with spontaneous photo opportunities.
  culinary: Cynthia Rotger, a passionate home chef, expertly prepares mole using chilhuacle and ancho chilies, slow‑cooks tamales for family gatherings, experiments with quinoa‑infused pozole, and meticulously
    selects fresh cilantro, cinnamon, and corn husks at the farmer’s market, though they sometimes over‑season dishes while juggling code debugging sessions.
  core: Cynthia Rotger is a diligent, community‑oriented web developer who balances methodical coding with solitary gardening, knitting, and cooking, often fueled by late‑night coffee and a habit of double‑checking
    emails before bed.
background:
  cultural: Cynthia’s Mexican heritage is a central thread in her life. Born to first‑generation immigrants from Jalisco, she grew up bilingual, speaking Spanish at home and English in school. Family gatherings,
    Dia de los Muertos altars, and traditional foods remain important traditions. She maintains strong ties to the local Mexican‑American community in West Valley City, often attending cultural festivals,
    supporting a church that emphasizes communal service, and assisting neighbors with translation or tech help. The values of familismo and personalismo shape her caring, cooperative nature and her desire
    to create digital tools that serve and empower her community.
