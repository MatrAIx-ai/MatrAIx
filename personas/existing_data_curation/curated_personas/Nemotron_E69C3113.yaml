  career_goals: Deatrice aims to earn her GED within the next six months and enroll in a community college program focused on marketing and nonprofit management. She aspires to become a community outreach
    coordinator for a local youth center, leveraging her sociable nature to design programs that empower other young adults. In the long term, she dreams of launching her own boutique that blends urban
    fashion with culturally inspired designs, using her practical business sense and competitive drive to build a sustainable brand.
