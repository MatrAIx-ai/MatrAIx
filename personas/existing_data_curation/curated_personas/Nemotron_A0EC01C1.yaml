personas:
  professional: Roman Burdette is a veteran facilities cleaning specialist with 25 years of expertise in floor care, eco-friendly agent protocols, OSHA compliance, and staff training, whose methodical,
    organized approach and deep compassion for tenants drive them to meticulously schedule cleanings, double-check inventory, and mentor new crew members while quietly battling a lingering worry about overlooked
    details as they pursue a supervisory role.
  sports: Roman Burdette stays active by fishing the Mississippi River in the early mornings, cheering on the St. Louis Cardinals and St. Louis Blues as a devoted fan club member, and joining the St. Louis
    Senior Walking Club for twice-weekly walks, preferring practical, low-impact exercise over high-intensity gym workouts.
  arts: Roman Burdette relaxes after work by listening to the timeless jazz of Miles Davis and the blues of B.B. King, attending live sets at the historic Jazz Club at the Chosen Vale, and drawing inspiration
    from the woodworking exhibitions of local artist Mary Klein and the historical documentaries of Ken Burns, which together shape their quiet yet rich artistic sensibility.
  travel: Roman Burdette plans vacations with the same meticulous checklists they use at work, favoring weekend getaways to the Riverfront Trail in Illinois, yearly trips to Hermann's Oktoberfest-style
    celebrations, and a long-standing dream of a summer road trip through the Moselle Valley vineyards in Germany, balancing a modest travel budget with a desire for cultural immersion.
  culinary: Roman Burdette enjoys cooking hearty Midwestern dishes, often crafting sauerkraut and bratwurst from locally sourced pork and cabbage, perfecting pretzel dough for Oktoberfest gatherings, pairing
    meals with crisp Riesling, and occasionally whipping up fish tacos using Mississippi-caught catfish and fresh cilantro, reflecting both modest home-cooking skill and a love for flavorful, seasonal ingredients.
  core: Roman Burdette is a methodical, community-focused caretaker who balances a quiet passion for model railways and gardening with a persistent worry about missed details, a habit of double-checking
    every checklist, and a steadfast commitment to sustainable, compassionate service.
background:
  cultural: Roman was raised in a German-American family in St. Louis County, where his parents emphasized hard work, modesty, and community involvement. Family traditions include celebrating Oktoberfest
    with homemade pretzels, attending local German cultural festivals, and volunteering at the neighborhood church. Growing up in the Midwest, he absorbed the region's Midwestern nice ethos - politeness,
    reliability, and a strong sense of civic duty - while also developing an appreciation for the city's diverse cultural heritage, from its historic French roots to the vibrant African-American music scene
    that he occasionally explores through local jazz clubs.
attributes:
  skills: '[''Commercial cleaning'', ''Floor care and polishing'', ''Eco-friendly cleaning methods'', ''OSHA safety compliance'', ''Inventory management'', ''Minor building maintenance'', ''Staff training
    and mentorship'', ''Scheduling and workflow optimization'', ''Customer service and conflict resolution'']'
  hobbies: '[''Model railroading'', ''Historical reading'', ''Fishing'', ''Gardening'', ''Woodworking'', ''Volunteer work at food pantry'', ''Church small-group charity projects'', ''Crossword puzzles'',
    ''Sudoku'']'
  career_goals: Roman aims to transition into a supervisory role as a lead facilities coordinator within the next three years, obtaining the Certified Professional Cleaner (CPC) credential and pursuing
    a bachelor's degree in facilities management. He hopes to introduce more sustainable cleaning practices at his workplace, mentor younger staff, and eventually establish a small niche cleaning service
    focused on historic homes in St. Louis, ensuring stable retirement income for his family.
