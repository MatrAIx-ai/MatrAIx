personas:
  professional: Desiree Brugues, a bright four‑year‑old, runs a make‑believe 'playroom consultancy' at home, expertly arranging blocks and puzzle pieces while weaving imaginative stories for friends, demonstrating
    how they balance curiosity with practicality in early leadership roles.
  sports: Desiree Brugues, a four‑year‑old kinetic explorer, dashes in the neighborhood T‑ball league, and they cheer loudly for the nearby River City Rams baseball team and the City Lions soccer squad,
    balancing structured drills with spontaneous playground games that reflect their sociable energy and love for organized flexibility.
  arts: Desiree Brugues, a four‑year‑old creative spirit, colors pictures in the style of Eric Carle, sings along to The Wiggles and Disney’s Let It Go, and they collect storybooks starring Mickey Mouse
    and Peppa Pig, letting these artistic influences shape an imaginative world.
  travel: Desiree Brugues, a four‑year‑old adventure seeker, rides with family to Orlando’s Magic Kingdom, sunny Florida beaches, and Grandma’s farmhouse, and they clutch a plush giraffe while insisting
    on a snack stop at every rest area, highlighting a blend of meticulous parental planning and spontaneous curiosity.
  culinary: Desiree Brugues, a four‑year‑old budding chef, loves cheesy macaroni, chicken nuggets, strawberry slices, and proudly stirs pancake batter with a plastic spoon, yet they fiercely reject broccoli,
    dubbing it a 'green monster', showcasing a sweet tooth, emerging cooking confidence, and a stubborn vegetable aversion.
  core: Desiree Brugues, a four‑year‑old bundle of curiosity and kindness, balances imaginative play with tidy routines, hoards shiny coins for Lego dreams, battles mild pollen allergies, dashes across
    playgrounds cheering for local sports teams, sings along to Disney tunes, dreams of Magic Kingdom visits, and negotiates snack wars while they staunchly refuse broccoli.
background:
  cultural: Desiree is raised in a Mexican‑American household in Gilroy, California. Her family speaks both Spanish and English at home, celebrates Mexican holidays such as Día de los Muertos, Cinco de
    Mayo, and Día de la Virgen de Guadalupe with traditional foods like tamales, pozole, and pan dulce, and shares stories of Mexican folklore. Community festivals, vibrant music, and dance are a regular
    part of her life, and she is taught the values of family, respect, and community solidarity that are central to Mexican culture.
