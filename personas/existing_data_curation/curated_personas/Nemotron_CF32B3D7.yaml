  career_goals: Andre often talks about what he wants to be when he grows up in a way that reflects his love of discovery and art. He dreams of becoming an ocean explorer who sketches sea creatures, an
    artist who paints giant murals, or a scientist who studies rocks and shells on the Monterey Bay shore. He also imagines being a superhero who helps animals, showing his desire to combine imagination
    with caring for the natural world. These ambitions are fluid and change as he learns new things, illustrating his open-minded and flexible outlook.
