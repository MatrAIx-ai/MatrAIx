personas:
  professional: Andre Aparicio, a curious five‑year‑old who dreams of becoming a junior marine biologist, spends afternoons at the shoreline building sand‑castle labs to track tide patterns, and they eagerly
    invite friends to explore their discoveries, reflecting a relaxed yet cooperative learning style.
  sports: Andre Aparicio loves splashing in the surf at the local pier, proudly kicks a ball for the preschool soccer league, and they cheer on the Los Angeles Dodgers during weekend family movie nights,
    showing a playful, low‑key enthusiasm for team sports and ocean‑side activity.
  arts: Andre Aparicio often sings along to lively mariachi tunes while drawing colorful sugar‑skull designs, and they can recite lyrics from Disney’s 'Moana' with enthusiastic confidence, blending musical
    curiosity with a vivid artistic streak.
  travel: Andre Aparicio’s travel adventures consist of spontaneous weekend sandcastle building at Santa Barbara Beach, an excited boat ride to Catalina Island where they collected seashells, and imaginative
    daydreams of exploring the historic missions of San Diego, reflecting a relaxed, curiosity‑driven approach to travel.
  culinary: Andre Aparicio delights in assembling mini taco plates with shredded chicken, fresh cilantro, and a squeeze of lime, while they eagerly munch on butter‑fried shrimp at family picnics, showcasing
    a budding love for both familiar comfort foods and fresh seaside flavors.
  core: Andre Aparicio, a five‑year‑old beach‑loving explorer, trades piggy‑bank coins for seashells, draws vibrant sugar‑skull art, and sings folk tunes while they navigate a carefree, curious world.
background:
  cultural: Andre lives in Marina, California, but his household is steeped in Mexican traditions. At home he hears Spanish spoken alongside English, and his family celebrates Día de los Muertos with altars
    and sugar skull decorations, and enjoys festive meals like tacos and tamales during holidays. He is exposed to Mexican music, such as mariachi and regional folk songs, which he often sings along to.
    The coastal Californian environment adds a love for the ocean, beach outings, and fresh seafood, blending seamlessly with his Mexican heritage. Family gatherings emphasize respect, storytelling, and
    a strong sense of community, shaping Andre’s cooperative yet confident personality.
