  hobbies: '[''Art gallery visits'', ''Book club'', ''Historical society volunteering'', ''Gardening'', ''Cooking'', ''Quilting'', ''Jazz and soul music'', ''Traveling'', ''Bridge'']'
  career_goals: Although retired, Melissa is driven to leave a lasting legacy by mentoring youth and grandchildren, documenting the African‑American history of Dayton through oral histories, and curating
    community art exhibitions that showcase local talent. She aspires to volunteer as a guide at the local senior center, write a memoir reflecting her life’s journey and cultural heritage, and support
    educational scholarships for aspiring artists in her community.
