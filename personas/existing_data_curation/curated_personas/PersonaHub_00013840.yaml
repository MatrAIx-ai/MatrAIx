persona_description: A Malaysian researcher with the United Nations University in Tokyo who specializes in oceanographic conditions in the eastern Indian Ocean, particularly the Indian Ocean Dipole (IOD),
  and its effects on weather patterns and the occurrence of severe droughts. He has studied the IOD and its impact on the weather and the environment extensively and has a unique understanding of the region's
  climate and weather patterns. He is currently using satellite images to monitor the development of the IOD and its effects on Malaysia.
