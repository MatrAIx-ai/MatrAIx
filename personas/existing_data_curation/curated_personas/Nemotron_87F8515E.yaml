personas:
  professional: Ashley Bonawitz, a budding teen content creator and aspiring event coordinator, blends their love for routine and practical planning with a relaxed, improvisational style to produce TikTok
    videos and organize spontaneous movie nights and beach outings, using their cheerleading confidence to be the charismatic host while occasionally forgetting to send follow‑up invitations.
  sports: Ashley Bonawitz channels athletic energy through high school cheerleading and beach volleyball on the Gulf Coast, avidly cheering for the New Orleans Saints and the Houston Astros while maintaining
    a seasonal habit of weekend runs along the shoreline.
  arts: Ashley Bonawitz thrives in the arts through drama club performances, TikTok fashion vlogs inspired by Taylor Swift and Ariana Grande, crafting friendship bracelets while listening to Billie Eilish,
    and devouring teen romance novels like Sarah Dessen’s *The Truth About Forever*.
  travel: Ashley Bonawitz prefers budget‑friendly road trips to nearby Gulf Coast beaches and occasional family visits to Disney World, yet they daydream about a future fashion‑focused adventure to Paris
    and a summer stint at a Broadway‑themed camp in New York City.
  culinary: Ashley Bonawitz delights in cooking comfort food, perfecting a buttery baked mac & cheese with sharp cheddar and panko topping, soft chocolate chip cookies dotted with sea‑salt, and quick mini
    apple crumble pies, often filming bite‑size TikTok tutorials that blend culinary skill with playful storytelling.
  core: Ashley Bonawitz is a sociable, routine‑loving teen who balances cheerleading stardom, TikTok creativity, and a passion for comfort cooking while occasionally juggling disorganization and late‑night
    screen time.
background:
  cultural: Ashley was raised in Daphne, a suburban community in Baldwin County, Alabama, just outside the historic city of Mobile. Her family follows a traditional Southern, Protestant upbringing, with
    regular Sunday dinners, church attendance, and participation in local community events like the annual Fall Fest and high school football games. The Gulf Coast lifestyle—seafood dishes, beach trips,
    and a strong sense of Southern hospitality—has shaped her values of practicality, routine, and friendliness. Growing up in a predominantly white, close‑knit neighborhood, she has absorbed a blend of
    classic Southern customs and contemporary teenage culture, balancing respect for tradition with the desire for social connection.
