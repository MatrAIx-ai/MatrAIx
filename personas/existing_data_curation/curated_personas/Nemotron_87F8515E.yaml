  hobbies: '[''Hosting sleepovers and movie nights'', ''Cheerleading'', ''Drama club performances'', ''Social media content creation (Instagram/TikTok)'', ''Baking and cooking family recipes'', ''Crafting
    friendship bracelets'', ''Playing social video games (e.g., Fortnite)'', ''Reading teen romance novels'', ''Volunteering at church youth events'', ''Beach outings along the Gulf Coast'']'
  career_goals: Ashley plans to finish high school and attend a community college where she hopes to study hospitality management or culinary arts. She envisions starting as a front‑desk associate at a
    local hotel or a server at a beachfront restaurant, gaining experience in guest services and daily operations. Long‑term, she dreams of managing or owning a family‑run café or bakery that can serve
    as a community gathering spot. At the same time, she wants to stay involved in her hometown by coordinating volunteer events for her church or local nonprofits, blending her love for people with practical,
    stable work.
