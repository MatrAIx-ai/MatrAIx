  career_goals: Richard aims to advance to a senior systems analyst role within the next three years, focusing on leading large-scale modernization projects for enterprise environments. He plans to earn
    a Certified Information Systems Analyst (CISA) certification and later transition into a solution architect position where he can design end-to-end, scalable architectures. Long-term, he aspires to
    launch an independent consultancy that offers data-driven process improvement services to midsize firms, leveraging his methodical expertise and competitive drive to deliver measurable ROI.
