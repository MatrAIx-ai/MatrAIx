    ''PowerPoint'', ''CRM Systems'']'
  hobbies: '[''Reading (financial and literary)'', ''Hiking in local trails'', ''Landscape Photography'', ''Playing Acoustic Guitar'', ''Cooking Traditional Puerto Rican dishes'', ''Chess'', ''Journaling'']'
  career_goals: Andres aspires to advance from his current credit counselor role to senior loan officer and eventually branch manager within his regional bank. He plans to obtain Certified Financial Planner
    (CFP) certification and pursue a master’s degree in finance to deepen his expertise. Long‑term, he hopes to launch a community‑focused financial literacy program that leverages his education background,
    delivering workshops in schools and community centers across Morovis and Vega Alta. His ambition is to blend practical financial services with educational outreach, empowering residents to make informed
    economic decisions.
