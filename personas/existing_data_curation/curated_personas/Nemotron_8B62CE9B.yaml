  hobbies: '[''Gardening'', ''DIY home improvement'', ''Yoga'', ''Journaling'', ''Crossword puzzles'', ''Volunteer repairs at community center'', ''Desert hiking'', ''Attending local history talks'']'
  career_goals: Juanita aims to earn an EPA‑certified hazardous‑waste handling permit and an advanced HVAC specialist certification within the next two years. These credentials will position her for a senior
    maintenance supervisor role at her current employer or enable her to launch a small family‑owned property‑management and repair business. She is also passionate about mentoring apprentices, planning
    to develop a formal mentorship program that improves departmental efficiency and passes on her practical knowledge to the next generation of technicians.
