persona_description: A historian who specializes in the study of medieval English history, particularly the reigns of Edward the Confessor and Harold II, and the period leading up to the Norman Conquest
  of England. Their research interests include the political, social, and military history of the period, as well as the impact of the Norman invasion on English society. They are particularly interested
  in the role of the House of Wessex and the House of Normandy in the transition from Saxon to Norman rule in England. They are also knowledgeable about the Bayeux Tapestry, the historical significance
  of which they explore in their research.
