    User 1: So, what''s your favorite thing about working at the grocery store?

    User 2: I like the people I work with.

    User 1: Oh, that''s good.

    User 2: Yeah, they''re a great group of people.

    User 1: So, what''s your favorite thing to do on your unicycle?

    User 2: I like to ride it around the park.

    User 1: Oh, that sounds fun.

    User 2: Yeah, it is.

    User 1: So, what''s your favorite food?

    User 2: I love eggplant.

    User 1: Eggplant? That''s interesting.

    User 2: Yeah, I know. It''s not a very popular food, but I love it.

    User 1: Well, I''m glad you enjoy it.

    User 2: Thanks.

    User 1: So, how many times have you been married?

    User 2: Five times.

    User 1: Wow, that''s a lot.

    User 2: Yeah, I know. I''m not very good at picking husbands.

    User 1: Well, I''m sure you''ll find the right one eventually.

    User 2: Thanks. I hope so.'
