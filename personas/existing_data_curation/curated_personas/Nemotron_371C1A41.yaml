  career_goals: Although retired, Moisés aims to stay intellectually active and give back to his community. He plans to lead a local senior technology workshop, mentor high‑school students interested in
    engineering, and document his family's migration story for future generations. His ambition is to preserve his professional legacy while ensuring his health and his marriage remain vibrant.
