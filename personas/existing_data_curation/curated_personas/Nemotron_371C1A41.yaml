personas:
  professional: Moises Cruz, a retired mechanical engineer with 35 years of experience in mechanical systems and electrical troubleshooting, now channels his systematic mindset into leading senior technology
    workshops, mentoring high‑school engineering students, and documenting his family's migration story, all while applying his reliable, organized nature to community projects.
  sports: Moises Cruz follows the Philadelphia Eagles and Phillies with spirited enthusiasm, participates in a local senior softball league, takes daily morning walks around the community garden, and attends
    weekly low‑impact yoga sessions at the YMCA, using salsa dancing as an extra cardio boost.
  arts: Moises Cruz spends his evenings dancing salsa at the cultural center, listening to classic timba and salsa legends like Celia Cruz and Hector Lavoe, volunteering as a set builder for neighborhood
    theater productions, and displaying a quiet appreciation for island‑inspired paintings that hang in his living room.
  travel: Moises Cruz prefers meticulously planned trips, often using spreadsheets to map itineraries that include historic Pennsylvania towns like Gettysburg and Lancaster, enjoys an annual cruise to the
    island where he grew up for Nochebuena celebrations, and balances his love of cultural immersion with the need to manage arthritis flare‑ups.
  culinary: Moises Cruz is renowned for preparing aromatic arroz con gandules, flaky pasteles, and succulent pernil, mastering his homemade sofrito with fresh cilantro and recao, generously sharing his
    dishes at neighborhood potlucks, yet occasionally over‑salts the rice and forgets to pre‑heat the oven on time.
  core: Moises Cruz blends an engineered precision with lively community spirit, rigorously budgeting, vigilantly managing health, and celebrating cultural rhythms through salsa, gardening, and storytelling,
    even as he sometimes misplaces his glasses or overcommits to projects.
background:
  cultural: Moises was born and raised in Puerto Rico before moving to the mainland United States in his thirties. He carries the island’s emphasis on family, celebration, and music, speaking fluent Spanish
    and maintaining strong ties to the Puerto Rican community in the Philadelphia region. He celebrates traditional holidays like Nochebuena and the Puerto Rican Day Parade, incorporates bomba y plena rhythms
    in his dance, and shares family recipes such as arroz con gandules and pasteles with his neighbors. His heritage informs his collaborative spirit and his commitment to mentoring younger Puerto Rican
    professionals.
