persona_description: A post-doctoral researcher in Chemical Sciences, specifically focusing on the development of organic capsules for the improvement of cement properties, particularly by adding silica
  nanocapsules filled with organic materials. This research aims to create new hybrid construction materials with unique properties and to repair cracks in cement, reducing the environmental impact of concrete
  production. The researcher is also exploring the potential use of these materials to store energy and improve the efficiency of buildings in terms of heating and cooling needs.
