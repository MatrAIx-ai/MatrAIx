  career_goals: Martin aims to complete his high school education through a GED program and then enroll in a vocational training course in automotive technology or electrical work. He hopes to secure a
    stable trade job that provides a reliable income and allows him to support his family. In the longer term, he dreams of starting his own small handyman or lawn‑care business, giving him the flexibility
    to balance work with community involvement.
