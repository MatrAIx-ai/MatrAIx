personas:
  professional: Felix Segarra is a budding LEGO architect who channels their curiosity and practical mindset into designing intricate structures, balancing meticulous planning with spontaneous creativity,
    and often leads group builds with quiet confidence, showing they can both organize and improvise.
  sports: Felix Segarra is a spirited midfielder for the Oakridge Youth Soccer League, cheering on the LA Galaxy and joining the neighborhood Eco Explorers club for weekend hikes on Dry Creek Trail, blending
    competitive play with a love for outdoor adventure, and they enjoy the camaraderie of team practice.
  arts: Felix Segarra draws inspiration from Disney’s Mickey Mouse and Marvel’s Spider‑Man while sketching original cartoon characters, and their budding drumming echoes the simple beats of The Beatles’
    early songs, merging visual and auditory creativity, and they love experimenting with rhythm on their small drum set.
  travel: Felix Segarra loves weekend family road trips to Yosemite National Park and occasional beach stays in Cabo San Lucas, favoring flexible itineraries that allow spontaneous drawing sessions and
    LEGO builds, and they relish the mix of discovery and downtime.
  culinary: Felix Segarra enjoys helping mash ripe avocados for guacamole and shaping masa for homemade tamales, proudly mastering the art of sprinkling cheese on quesadillas and adding a squeeze of lime,
    while their cooking skills remain enthusiastic but still beginner level, and they love sprinkling extra cheese for fun.
  core: Felix Segarra is a curious, organized seven‑year‑old who builds elaborate LEGO worlds, sketches cartoons, scores goals on the soccer field, and never misses a chance to cook tamales with their grandmother,
    all while they balance spontaneous creativity with a steady sense of responsibility.
background:
  cultural: Felix grows up in a Mexican‑American household in Livermore, where Spanish is spoken daily and Mexican traditions are celebrated. He participates in Día de los Muertos altar making with his
    family, enjoys Mexican holidays like Cinco de Mayo, and helps prepare traditional dishes such as tamales and pozole. His cultural identity blends Mexican heritage with the multicultural environment
    of the Bay Area, giving him a bilingual advantage and a strong sense of family and community.
