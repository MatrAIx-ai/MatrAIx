  hobbies: '[''Museum and gallery visits'', ''Listening to jazz, blues, and gospel music'', ''Church choir participation'', ''Reading biographies and watching documentaries on African-American history and
    art'', ''Urban gardening'', ''Sketching and digital photo collage creation'']'
  career_goals: Although retired, Tasha is dedicated to leaving a lasting legacy for her grandchildren and community. Her primary ambition is to compile a handwritten and digital archive of her family's
    oral histories, intertwined with the broader narrative of African-American life in Pacoima. She hopes to mentor younger members of the local senior center’s art program, encouraging them to explore
    unconventional art forms such as mixed-media collage and digital storytelling. Tasha also aspires to expand the community garden she helps maintain, introducing heirloom vegetables and native herbs
    that reflect her cultural heritage. Finally, she dreams of organizing a small intergenerational gallery exhibit showcasing the crafts and stories of neighborhood elders.
