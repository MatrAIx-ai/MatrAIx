  career_goals: Javon aims to transition from routine residential jobs to a niche market that blends his painting craft with artistic design. He dreams of opening a small studio in Los Angeles that offers
    custom decorative finishes, workshops on faux painting, and collaborations with local artists on community mural projects. Financial stability after his divorce is a priority, so he seeks higher‑margin
    contracts and mentorship opportunities to train aspiring painters, especially from underrepresented backgrounds. Ultimately, he hopes to be recognized as a respected craftsman who bridges practical
    trades with the aesthetics of fine art, contributing to the cultural tapestry of his city.
