  career_goals: Gilberto aims to lead a secure, cloud‑enabled transformation of his organization’s IT infrastructure while ensuring data compliance with local regulations. He plans to obtain advanced certifications
    such as Cisco CCNP and Microsoft Azure Administrator to stay ahead of emerging technologies. A core ambition is to mentor and develop the next generation of IT talent from the Laredo community, establishing
    a formal apprenticeship program. He also seeks to launch a community computer‑literacy initiative for seniors and underserved residents, positioning himself for a consulting advisory role before retirement
    to ensure a smooth knowledge transfer and lasting impact.
