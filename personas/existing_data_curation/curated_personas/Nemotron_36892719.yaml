personas:
  professional: Erika Vega, a seasoned custodial supervisor with over 30 years of experience in commercial and residential building maintenance, leverages her meticulous scheduling, bilingual communication,
    and hands‑on expertise in floor care, plumbing, and electrical troubleshooting to create predictable, low‑stress work environments, while assertively mentoring new staff and championing safety standards.
  sports: Erika Vega enjoys low‑impact fitness, taking early morning walks in Rock Creek Park while belonging to the local senior walking club, follows the Washington Capitals for winter ice hockey, the
    Washington Wizards during the basketball season, and prefers casual games of pickleball at the community center over high‑intensity sports.
  arts: Erika Vega finds solace in the sounds of Vicente Fernández and Lila Downs, watches classic telenovelas like “María la del Barrio” and historical dramas starring Gael García Bernal, and spends evenings
    crocheting intricate shawls inspired by traditional Mexican textile patterns, allowing artistic expression to weave together heritage and personal calm.
  travel: Erika Vega plans trips with meticulous itineraries, favoring quiet, culturally rich destinations such as Oaxaca’s Monte Albán ruins, a weekend retreat in Asheville’s Blue Ridge Mountains, and
    hopes to one day explore the historic streets of San Miguel de Allende, always balancing travel costs with her retirement budget.
  culinary: Erika Vega’s cooking balances comfort and tradition, skillfully preparing mole poblano using dried chilies, chocolate, and spices from her balcony garden, hand‑rolling tamales for family gatherings,
    and savoring fresh tomato‑herb salads, while often treating herself to a simple avocado toast with lime zest for everyday meals.
  core: Erika Vega is a methodical, solitary caretaker who blends a lifelong devotion to building upkeep with a quiet love of garden herbs, crochet, and classic Mexican melodies, all while quietly battling
    hypertension and a tendency to over‑organize her schedule.
background:
  cultural: Erika was born to Mexican immigrant parents who settled in the Midwest during the 1960s. Growing up in a bilingual household, she learned Spanish at home and English at school, absorbing both
    Mexican customs and Midwestern values. Family gatherings centered around traditional foods such as tamales, pozole, and pan dulce, and the celebrations of Día de los Muertos and Mexican Independence
    Day remained important cultural touchstones. The Catholic faith, with regular Mass attendance at a local parish that served a sizable Mexican‑American congregation, provided a sense of community and
    spiritual grounding. Though she now lives in Kansas City’s Clay County, Erika maintains close ties to the Mexican community through her church’s charity events, occasional visits to family in Texas,
    and by preserving Mexican culinary and musical traditions in her daily life. Her cultural background informs her strong work ethic, respect for elders, and the value she places on self‑reliance and
    modest humility.
