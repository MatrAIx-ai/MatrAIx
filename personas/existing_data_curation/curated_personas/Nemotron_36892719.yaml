  career_goals: Erika’s primary career ambition is to secure a lead‑janitor or supervisory position that offers a predictable, daytime shift, allowing her to apply her extensive experience while maintaining
    a low‑stress environment. She plans to obtain a Certified Professional Cleaner credential to formalize her skills, and she hopes to mentor younger custodial staff, passing on best practices and safety
    awareness. Financially, Erika aims to build a modest retirement nest‑egg through consistent savings and a potential part‑time consulting role in building maintenance after she reduces her physical workload.
    She also wishes to contribute to her community by volunteering for the local senior center’s facility‑upkeep program, where her expertise can be used without demanding extensive social interaction.
