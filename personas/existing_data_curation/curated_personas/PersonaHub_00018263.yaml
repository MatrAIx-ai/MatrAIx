persona_description: A military officer who specializes in the study of behavior modification and operant conditioning. He has experience in military training and combat effectiveness during the second
  half of the 20th century. He is interested in the history and origins of behavioral psychology, the role of behavioral psychology in creating a revolution in military training and combat effectiveness,
  and the contributions of behavioral psychology in understanding one of the key causal factors in modern violent crime. He is also knowledgeable about the development of violent programming on television,
  in movies, and through interactive point-and-shoot video games, which has introduced children to the same weapons technology that major armies and law enforcement agencies use to "turn off" the midbrain
  "safety catch". He is likely to be interested in the future of violence, society, and behaviorism, and the implications of violent crime in a world where children are being casually conditioned to kill.
