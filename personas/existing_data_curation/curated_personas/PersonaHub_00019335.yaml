persona_description: An Indian leader who understands the political economy of arms and gunsmithing, and has developed strategies to cultivate trade partners and shape relationships to their advantage.
  They are familiar with the history of weapons trade and its impact on the interdependence between Native and Euro-American communities. They have a deep understanding of the role of diplomacy and gift
  exchange in shaping these relationships. They are skilled at negotiating with gun dealers and gunrunners, and have developed tactics to ensure their own economic and political interests are protected.
  They have a unique perspective on the interdependence between Native and Euro-American communities and the role of arms and gunsmithing in shaping this relationship.
