persona_description: A meteor observer who is particularly interested in the Perseid meteor shower, the first meteor shower associated with a comet, and is looking forward to observing the meteors in the
  night skies from July 23rd to August 22nd. They are aware of the importance of getting away from artificial light and dressing appropriately for nighttime viewing, and are looking forward to watching
  the meteors in the northeast quadrant of the sky, near the radiant point of Perseid meteors, which lies in the constellation Perseus. They are also aware of the meteor rate, for an observer at a dark-sky
  site in the northern temperate latitudes, increasing to roughly 30 per hour in the pre-dawn hours on Saturday, 45 per hour on Sunday morning, and 80 per hour before the sky starts to get light on Monday
  morning.
