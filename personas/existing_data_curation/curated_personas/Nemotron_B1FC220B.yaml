  career_goals: Eugene aims to elevate his shop into a boutique full‑service garage known for classic‑car restoration and bespoke electric‑vehicle conversions. In the next two years he plans to complete
    an EV‑conversion certification, obtain additional ASE specialty certifications, and acquire a small commercial space to expand his team. Ultimately, he hopes to become a partner in a regional automotive
    training program, mentoring the next generation of technicians while also curating an annual “Art‑Cars” showcase that blends his love of mechanics with creative expression.
