  hobbies: '[''sketching'', ''digital painting'', ''photography'', ''reading philosophy'', ''reading psychology'', ''chess'', ''gallery visits'', ''Día de los Muertos workshops'', ''cooking Mexican cuisine'',
    ''desert hiking'', ''street mural exploration'', ''experimental music production'']'
  career_goals: Pablo aims to turn his creative and technical skill set into a sustainable freelance career as a brand designer and visual artist, eventually launching a boutique studio that serves small
    businesses and cultural organizations in the Imperial Valley. In the next two years he plans to expand his professional portfolio, secure paid commissions, and enroll in a four‑year program to earn
    a BFA in Graphic Design. His long‑term ambition is to become a creative director who blends contemporary design with Mexican‑American cultural motifs, positioning himself as a competitive leader in
    the regional art‑and‑branding market.
