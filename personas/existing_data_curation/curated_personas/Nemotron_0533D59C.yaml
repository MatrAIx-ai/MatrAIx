personas:
  professional: Pablo Paniagua, an aspiring freelance brand designer and visual artist, merges disciplined project management with a curiosity for avant‑garde theory, delivering sleek logos and culturally
    resonant graphics while they meticulously track deadlines with digital Kanban boards.
  sports: Pablo Paniagua, a dedicated desert hiker and member of the Imperial County Trail Club, follows the San Diego Padres and Los Angeles Lakers with analytical enthusiasm, runs a weekly 5‑k mile route
    through the Sonoran landscape, and keeps a disciplined strength‑training schedule that they rarely skip despite a reserved social demeanor.
  arts: Pablo Paniagua, a digital illustrator who frequents intimate gallery openings, draws inspiration from norteña bands like Los Tigres del Norte and street artists such as Shepard Fairey, immerses
    themselves in avant‑garde texts, and creates experimental music collages using Ableton, all while they prefer solitary studio sessions over large crowds.
  travel: Pablo Paniagua, a self‑planned explorer, has trekked the dunes of the Imperial Valley, visited Tijuana and Mexico City for cultural immersion, camped in Joshua Tree, and dreams of studying the
    artisan markets of Oaxaca and the design museums of Barcelona, balancing modest budgets with a thirst for authentic experiences.
  culinary: Pablo Paniagua, an enthusiastic home cook, perfects carnitas tacos with crisp pork, cilantro, and roasted chilies, crafts chiles en nogada featuring poblano peppers and walnut sauce, experiments
    with epazote in soups, and enjoys pairing their dishes with craft cerveza, though they often over‑season in the name of flavor.
  core: Pablo Paniagua blends disciplined solitude, strategic curiosity, and a penchant for integrating border‑region folk motifs into modern design, while they habitually fuel late‑night creative marathons
    with espresso and occasionally neglect social invitations.
background:
  cultural: Pablo was raised in El Centro, California, to Mexican immigrant parents and grew up bilingual, comfortably navigating both Mexican and American cultural spheres. He celebrates traditional festivities
    such as Día de los Muertos and enjoys regional music like norteña and banda. The proximity to the U.S.–Mexico border and the agricultural backdrop of Imperial County have instilled in him a deep appreciation
    for Mexican artistic heritage—from folk motifs to contemporary Chicano street art—while also fostering a strong sense of independence and self‑reliance. His cultural identity influences his aesthetic
    sensibility and fuels his desire to integrate Mexican‑American visual elements into modern design work.
