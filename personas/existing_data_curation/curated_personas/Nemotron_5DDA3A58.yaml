  career_goals: Theresa dreams of turning her love for art and curiosity about the natural world into a future career as an environmental illustrator or a museum curator, where she can create displays that
    inspire others. In the short term, she wants to improve her sketching skills, join the school's art club, and learn more about wildlife through a local nature program. She also hopes to develop confidence
    in managing stress so she can eventually mentor younger kids and perhaps become a youth counselor who uses creativity to help others cope with worries.
