personas:
  professional: Theresa Wood is a budding junior programmer who blends their love for storytelling with a curious eye for nature, crafting Scratch games that feature hand‑drawn mountain scenes while they
    juggle school projects with a relaxed, sometimes disorganized approach to deadlines.
  sports: Theresa Wood is an energetic member of the Castle Rock Youth Soccer Club who cheers for the Colorado Rapids during the MLS season, dreams of playing on the school varsity team, and spends snowy
    weekends cross‑country skiing with friends, and they frequently lose track of homework after games due to their boundless enthusiasm.
  arts: Theresa Wood is a creative force in the school drama club, drawing inspiration from Disney’s animated classics and the pop sounds of Taylor Swift and Billie Eilish while they often sketch mountain
    landscapes during lunch, practice ukulele chords after school, and binge‑watch Studio Ghibli films for artistic ideas.
  travel: Theresa Wood loves weekend road trips to Rocky Mountain National Park and annual family visits to Disneyland, while they yearn to explore the glaciers of Iceland and the wildlife of Yellowstone,
    preferring a mix of parent‑planned itineraries and spontaneous hikes that fit within their school calendar and modest family budget.
  culinary: Theresa Wood enjoys cooking bite‑size spinach and cheese stuffed pretzels, whipping up strawberry‑banana smoothies, and perfecting a family‑favorite chicken tacos with fresh avocado, though
    they often skip breakfast and rely on sugary granola bars before soccer practice.
  core: Theresa Wood is a curious, arts‑loving 11‑year‑old who balances mountain adventures with sketchbooks and ukulele strings, and they often worry about staying organized.
background:
  cultural: Theresa is a white American growing up in the suburban town of Castle Rock, Colorado. Her family lives in a middle-class household that values education, outdoor recreation, and community involvement.
    She enjoys the Colorado lifestyle of weekend hikes, snow days, and local festivals, while also sharing in mainstream American traditions such as celebrating Thanksgiving, Halloween, and holiday gatherings
    with extended family. Her school and neighborhood expose her to a mix of cultural influences, from western frontier history to modern arts, fostering both a respect for her regional heritage and an
    openness to diverse ideas.
