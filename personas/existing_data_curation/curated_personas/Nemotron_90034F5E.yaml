personas:
  professional: Brandon Mcintyre, a retired handyman and community volunteer, they apply their decades of hands‑on expertise in small‑engine repair, woodworking, and gardening to provide reliable, routine‑driven
    services to neighbors, mentor youth at the local 4‑H club, and document regional oral histories.
  sports: Brandon Mcintyre enjoys seasonal hunting and fishing as primary sports, they root for the Carolina Panthers on Sundays, follow the Wilmington Blue Rocks during summer, and maintain fitness through
    regular walks along the Neuse River and occasional deer hunting outings.
  arts: Brandon Mcintyre immerses themselves in Civil War history through books by James McPherson and Shelby Foote, they listen to gospel classics by The Carter Family while woodworking, and they appreciate
    classic Southern storytelling in the films of John Wayne, which often inspire decorative motifs on their wooden birdhouses.
  travel: Brandon Mcintyre prefers low‑key, budget‑friendly road trips, they visit coastal spots like the Outer Banks and Kure Beach, make occasional pilgrimages to historic sites in Washington, D.C., and
    enjoy weekend getaways to the Blue Ridge Mountains around Asheville, where quiet scenic drives and modest cabins suit their love of solitude.
  culinary: Brandon Mcintyre delights in Southern comfort cooking, they regularly prepare fried catfish with cornmeal crust, simmer collard greens with smoked turkey, bake sweet potatoes topped with butter
    and honey, and experiment with home‑brewed craft beers using local hops, malt, and a splash of orange zest.
  core: Brandon Mcintyre, a methodical retiree with a love for quiet craftsmanship, they blend routine‑driven handyman work, solitary hobbies, and a deep respect for local traditions into a life that values
    self‑reliance, community quietly, and an ever‑growing model‑train layout.
background:
  cultural: Brandon grew up in a white, working‑class family in rural eastern North Carolina, steeped in the traditions of the American South. Raised in a Protestant (Baptist) household, church life and
    community gatherings have shaped his sense of duty, modesty, and respect for tradition. The culture of Grifton emphasizes self‑reliance, close ties to the land and water, and a practical, straightforward
    worldview. Local customs such as seasonal fishing and hunting, participation in county fairs, and sharing of family stories over meals are integral to his identity. While he values the familiar comforts
    of his community, his quiet demeanor reflects the Southern value of humility and a preference for personal reflection over overt social displays.
attributes:
