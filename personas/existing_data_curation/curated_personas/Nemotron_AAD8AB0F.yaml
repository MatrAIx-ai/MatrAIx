personas:
  professional: Yun Lu is a seasoned full‑stack architect who leverages two decades of Java, C++, Python and TypeScript expertise to design cloud‑native microservices on AWS and Azure, while juggling a
    love of spontaneous brainstorming sessions with a need for structured Agile processes and mentoring junior engineers with a blend of assertiveness and empathy.
  sports: Yun Lu dominates the local Saturday night basketball league as a forward for the River City Raptors, coaches their children’s youth team, hikes with the Summit Trail Club during spring and fall,
    and fervently supports the Los Angeles Lakers and the New England Patriots as their go‑to professional teams.
  arts: Yun Lu curates lively board‑game evenings featuring titles like Catan and Terraforming Mars, sings karaoke renditions of Beyoncé and Bon Jovi, attends indie film screenings spotlighting directors
    such as Bong Joon‑ho and Greta Gerwig, and collects limited‑edition prints from contemporary street artists like KAWS.
  travel: Yun Lu prefers family‑focused weekend getaways with a mix of short hikes in the Blue Ridge Mountains and culinary tours of Seattle’s Pike Place Market, while also day‑dreaming about a summer road
    trip along the Icelandic Ring Road and a cultural immersion trip to Kyoto during cherry‑blossom season.
  culinary: Yun Lu enjoys mastering pan‑fried pork mandu, marinating bulgogi for Korean BBQ nights, and experimenting with kimchi fried rice, while also seeking out neighborhood eateries such as the renowned
    dumpling house Din Tai Fung and a hidden‑gem sushi spot called Sashimi House, often sharing the resulting feasts with their spouse and kids.
  core: Yun Lu is a tech veteran who balances methodical engineering leadership ambitions with spontaneous family adventures, a penchant for karaoke power‑ballads, and a habit of impulsively buying the
    latest kitchen gear.
background:
  cultural: Yun is a second-generation East Asian American of Chinese heritage. Raised in a bilingual household where Mandarin was spoken at home, he was taught the importance of education, family responsibility,
    and respect for elders—values that continue to shape his work ethic and collaborative style. He celebrates Lunar New Year and the Mid-Autumn Festival with his family, preparing traditional dishes like
    dumplings and mooncakes. Living in Deerfield, Illinois, he blends these cultural traditions with Midwestern openness, actively participating in community events and embracing a sociable, outward-facing
    personality.
