  career_goals: Yun aims to transition into an engineering leadership role where he can shape product strategy around emerging AI-driven services while preserving a balance between structured processes
    and creative flexibility. He aspires to build high-performing, collaborative teams that embrace both rigorous engineering standards and rapid prototyping, champion diversity and inclusion, and contribute
    to open-source projects. In the long term, he envisions founding a consultancy that helps midsize companies adopt modern cloud-native practices while retaining a people-centric culture.
