personas:
  professional: Patrick Foran, a 27‑year‑old aspiring solo handyman, combines his DIY expertise in carpentry, basic electrical work, and amateur electronics with a spreadsheet‑driven, checklist‑centric
    workflow, and they apply their competitive, methodical mindset to deliver precise, on‑time home repairs while minimizing client chit‑chat.
  sports: Patrick Foran enjoys early‑morning fishing at Lake Lewisville with the local angling club, tracks scores for the Dallas Cowboys and Texas Rangers on game night, and they maintain functional fitness
    through occasional home‑based weight training focused on core strength for lifting projects.
  arts: Patrick Foran draws artistic inspiration from the minimalist furniture of George Nakashima, the ambient soundscapes of Brian Eno, and the classic westerns of John Wayne, and they often listen to
    these while sanding wood or solving a crossword.
  travel: Patrick Foran prefers low‑key, self‑planned road trips that map out scenic routes on paper, has already explored the Texas Hill Country and the Oregon coast, and they dream of traveling to Japan’s
    Tōkaidō corridor to study traditional joinery techniques.
  culinary: Patrick Foran favors home‑cooked meals featuring garden‑fresh zucchini sautéed with garlic, rosemary‑seasoned roasted chicken, and grilled trout caught on local lakes, and they experiment with
    spice rubs while maintaining a moderately skilled, hands‑on cooking style.
  core: Patrick Foran is a solitary, checklist‑obsessed craftsman who can spend hours perfecting a circuit board but often forgets to water houseplants when a new project takes over.
background:
  cultural: Patrick grew up in a suburban, middle‑class white family in Lewisville, Texas, a region marked by a blend of Southern hospitality and Midwestern practicality. His upbringing emphasized self‑reliance,
    hard work, and modest conservatism, shaped by regular attendance at a local Baptist church and community gatherings that value family cohesion and respect for tradition. The Texan culture of independence
    and straightforward communication has reinforced his preference for solitude, methodical planning, and a competitive drive to prove personal competence.
attributes:
  skills: '["DIY home repair", "Basic carpentry", "Furniture making", "Automotive maintenance", "Amateur electronics", "Gardening and landscape upkeep", "Personal finance management", "Systematic problem
