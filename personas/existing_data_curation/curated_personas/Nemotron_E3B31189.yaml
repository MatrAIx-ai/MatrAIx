  hobbies: '["Woodworking", "Electronics tinkering", "Motorcycle restoration", "Technical reading", "Documentary watching", "Puzzle solving", "Gardening", "Fishing", "Solo strategy gaming"]'
  career_goals: Patrick plans to translate his practical skill set into a sustainable home‑based business. His short‑term goal is to launch a solo handyman service in the Lewisville area, offering reliable
    repairs, custom carpentry, and small‑scale renovations. He aims to obtain a Texas state certification in HVAC or electrical work within the next two years to broaden his service offerings and increase
    credibility. Long‑term, he envisions expanding into a modest contracting firm with a small crew, focusing on custom woodwork and energy‑efficient home upgrades, thereby providing a stable income for
    his family while preserving his preference for independent, well‑planned work.
