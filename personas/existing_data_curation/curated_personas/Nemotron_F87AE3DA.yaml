personas:
  professional: George Anderson, a 15-year-old budding robotics enthusiast, balances curiosity and practicality by channeling his love for strategy video games and coding into the school’s robotics club,
    where they design, program, and troubleshoot competition-ready bots while keeping a tidy schedule for homework and weekend guitar practice.
  sports: George Anderson plays forward on the Northern Virginia United youth soccer team, trains three times a week, hikes the Shenandoah National Park trails on weekends, and follows the Washington Capitals
    and Washington Wizards, balancing competitive play with low-intensity cardio to keep stress levels manageable.
  arts: George Anderson finds creative release in strumming acoustic covers of John Mayer and The Beatles on guitar, devouring sci-fi novels by Isaac Asimov and Neal Stephenson, and building intricate LEGO
    Technic Porsche 911 models, all of which shape their identity and offer a calm counterpoint to the rigors of robotics.
  travel: George Anderson enjoys weekend road trips to Washington, D.C. museums and annual family camping excursions in Shenandoah, while dreaming of a spring backpacking adventure in Kyoto’s bamboo forests,
    planning itineraries with a mix of structured research and spontaneous detours to local food stalls.
  culinary: George Anderson prefers simple yet flavorful meals like pepperoni pizza, ramen with soft-boiled eggs, and spaghetti carbonara, experimenting with basil and soy sauce in the kitchen, but their
    beginner cooking skills sometimes lead to burnt toast and a messy stovetop.
  core: George Anderson, a 15-year-old tech-savvy idealist, juggles robotics projects, soccer drills, and nightly journaling, often worrying about perfection while secretly hoarding limited-edition LEGO
    sets.
background:
  cultural: George grows up in a middle‑class suburban family in Leesburg, Virginia, reflecting a typical American upbringing in the Mid‑Atlantic. His family values education, community involvement, and
    respect for tradition, celebrating holidays such as Independence Day and Thanksgiving with gatherings and local events. He attends a public school that serves a diverse student body, exposing him to
    a range of cultural perspectives while maintaining a primarily Anglo‑American household environment. This setting blends suburban American customs with the region’s historic ties to agriculture and
    the growing tech‑oriented community of Northern Virginia.
