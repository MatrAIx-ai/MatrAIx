persona_description: A researcher who specializes in energy poverty and vulnerability analysis, focusing on developing quantitative measurement tools and methodologies to identify and address energy poverty
  in vulnerable populations. They have published research on the vulnerability index for energy poverty and have presented a novel approach for determining energy poverty. They have experience in developing
  stochastic models of energy poverty, conducting sensitivity analysis and pareto analysis, and employing optimization techniques to improve their analysis. Their work has been published in a respected
  academic journal, Energy & Buildings, and has been widely cited in the field of energy poverty research.
