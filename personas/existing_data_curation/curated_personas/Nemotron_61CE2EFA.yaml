  hobbies: '[''Reading contemporary and classic literature'', ''Creative writing (short stories, poetry)'', ''Watercolor sketching'', ''Cooking Vietnamese cuisine'', ''Yoga and mindfulness meditation'',
    ''Volunteering as a tutor for immigrant youth'', ''Exploring educational technology tools'', ''Playing strategy board games'', ''Hiking local trails in Orange County'']'
  career_goals: Thuy aims to obtain a Master’s degree in Curriculum and Instruction within the next three years, positioning herself for a lead teacher role where she can design culturally responsive curricula
    for elementary grades. She aspires to become an instructional coach or assistant principal, championing evidence‑based practices and mentoring novice teachers. Ultimately, she hopes to publish a guide
    on integrating multicultural literature into early‑grade teaching and earn recognition through district‑wide teaching awards.
