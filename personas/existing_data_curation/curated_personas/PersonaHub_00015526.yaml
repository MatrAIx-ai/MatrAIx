persona_description: An electrical and electronics engineer who is interested in the development and application of novel actuator technologies. They are particularly drawn to the mechatronic approach and
  the potential of emerging actuators for applications in motion control systems. They are also interested in the characteristics and performance of these technologies, and how they can be scaled to micro
  and nano domains. They are likely to be familiar with the principles of piezoelectricity, shape memory actuators, electro-active polymers, magnetostrictive actuators, and electro- and magnetorheological
  actuators, and are looking for a comprehensive overview of these technologies and their applications. They may also be interested in the potential of these technologies for developing novel applications
  in fields such as robotics, aerospace, and medical devices.
