  hobbies: '["Herb gardening", "Farmers market browsing", "Neighborhood potluck clubs", "Volunteering at the local food bank", "Community theater improv", "Recreational softball", "Road‑trip food tours",
    "Food photography", "Cooking workshops"]'
  career_goals: Amie aspires to become a head chef at a well‑known community restaurant or to open her own casual eatery that blends Midwestern classics with global twists. She plans to earn an associate
    degree in culinary arts and pursue advanced certifications such as Advanced Food Safety and Certified Culinary Professional. Building a reputable local catering brand that emphasizes flexible, community‑focused
    menus is a key goal, as is hosting monthly cooking workshops to share her love of experimenting with new flavors while fostering a supportive food‑lover network.
