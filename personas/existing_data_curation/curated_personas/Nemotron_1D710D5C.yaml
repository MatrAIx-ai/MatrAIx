personas:
  professional: Michael Maiden, a detail‑oriented building cleaner in Plant City, follows rigorous cleaning checklists, mentors new staff on OSHA safety, and is actively pursuing CPC and FMP certifications
    to step into a supervisory facilities‑management role, and they apply a systematic mindset to orchestrate multi‑floor cleaning schedules with clockwork precision.
  sports: Michael Maiden enjoys early‑morning lake fishing with a private tackle box, roots for the Tampa Bay Buccaneers and the Rays, belongs to a local fishing club that meets bi‑weekly, and they do light
    cardio by walking the perimeter of their garden, preferring low‑impact activities that fit their structured routine.
  arts: Michael Maiden spends Friday evenings watching classic films like Casablanca and The Maltese Falcon, collects recordings of Frank Sinatra, attends occasional community theater productions at the
    local church hall, and they draw creative inspiration for their model‑train builds from the cinematic storytelling.
  travel: Michael Maiden plans meticulous weekend road trips, favoring destinations like Clearwater Beach for its predictable sunrise schedule and the historic Strawberry Festival in Plant City, dreams
    of a guided tour of a historic European castle region to broaden their perspective, and they always pack a checklist of fishing gear and a notebook for local history tidbits.
  culinary: Michael Maiden favors key‑lime pie made with fresh Florida limes, grills caught grouper with a simple lemon‑butter glaze, cultivates basil and tomatoes in their garden for homemade salsa, and
    they follow step‑by‑step recipes, though they occasionally forget to preheat the oven due to their preoccupation with the next model‑kit assembly.
  core: Michael Maiden is a methodical, competition‑driven janitor‑turned‑facility‑manager hopeful who balances their love of puzzles, fishing, and classic films with a penchant for over‑thinking finances
    and health, and they never miss a detail on their cleaning checklist.
background:
  cultural: Michael is a white Floridian who grew up in Plant City, a community known for its close‑knit, Southern‑influenced culture and the annual Strawberry Festival. His family background is primarily
    of Irish and English ancestry, and he was raised with values emphasizing reliability, a strong work ethic, and modesty. He identifies with the gentle Southern hospitality of central Florida—polite,
    community‑oriented, and often connected to a local Baptist church where he occasionally participates in small gatherings. He enjoys regional foods like key‑lime pie and fresh seafood, and he balances
    the laid‑back rural atmosphere of Plant City with the urban influences of nearby Tampa. This cultural mix informs his practical, structured outlook and his comfort in routine, community‑rooted settings.
attributes:
  skills: '[''Commercial cleaning'', ''Floor‑care equipment operation'', ''Basic plumbing and electrical repairs'', ''Health & safety compliance (OSHA/EPA)'', ''Inventory management'', ''Schedule planning
    and time management'', ''Team training and supervision'']'
  hobbies: '[''Model train building'', ''Fishing'', ''Gardening'', ''Puzzle solving (Sudoku, crosswords)'', ''Reading nonfiction/technical manuals'', ''Classic film watching'']'
  career_goals: Michael aspires to move from frontline cleaning to a supervisory role in facilities management. He plans to obtain certifications such as Certified Professional Cleaner (CPC) and Facility
    Management Professional (FMP) and to complete an associate’s degree in facilities management. His short‑term goal is to become a shift lead or facilities coordinator for a larger campus, where he can
    apply his systematic approach to larger operations. Long‑term, he hopes to manage multiple sites or launch his own small commercial cleaning business, leveraging his competitive drive and meticulous
    work style.
