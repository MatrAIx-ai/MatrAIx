personas:
  professional: Christine Trammell, a budding LEGO architect, channels her love for step‑by‑step instructions and spontaneous redesigns into creating intricate play structures, showing early signs of practical
    problem‑solving tempered by a frequent craving for free play.
  sports: Christine Trammell darts between the community pool’s blue lanes and the neighborhood soccer field, cheering for the local Gulf Coast Suns junior team while also joining a weekend beach‑shell
    scavenger club that doubles as a light cardio adventure.
  arts: Christine Trammell delights in drawing sun‑kissed shoreline scenes inspired by the works of Mary Blair and the animated adventures of Pixar’s "Finding Nemo", often humming the movie’s soundtrack
    while blending crayons with bright beach‑sand textures.
  travel: Christine Trammell’s travel style balances parent‑planned beach trips to Destin, Florida with spontaneous day‑long road adventures to the nearby Gulf Islands National Seashore, where they collect
    shells and request a "secret" family photo spot each time.
  culinary: Christine Trammell loves the crunchy snap of carrot sticks dipped in ranch, the cheesy pull of mozzarella sticks, and the salty tang of shrimp gumbo, often insisting on helping stir the pot
    while sneaking extra sprinkles onto cupcakes.
  core: Christine Trammell blends a love for structured LEGO builds with an impulsive urge for free‑form art, worries about small changes, and alternates between meticulous saving in a piggy bank and sudden
    splurges on glittery treats.
background:
  cultural: Christine is raised in a middle‑class, white American family in Naples, Florida. Her household celebrates common U.S. holidays such as Thanksgiving, Christmas, and Easter, and they often enjoy
    summer traditions like beach picnics, barbecues, and fireworks displays along the Naples Pier. The multicultural flavor of Southwest Florida exposes her to Spanish words and diverse foods, though English
    remains her primary language. Her family values community involvement, attending local festivals, and visiting the nearby nature preserves. The warm coastal climate and proximity to the Gulf influence
    her love of swimming, shell hunting, and outdoor play.
