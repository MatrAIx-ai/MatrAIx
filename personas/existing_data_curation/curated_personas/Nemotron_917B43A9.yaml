  career_goals: Christine dreams of a future where she can help living things and share knowledge. She often tells adults she wants to become a veterinarian because she loves animals and wants to care for
    them when they’re sick. She also imagines being a teacher, guiding younger children through lessons and creating a friendly classroom environment. Occasionally, she mentions wanting to be a community
    helper like a firefighter, inspired by the bright fire trucks she sees in Naples. These aspirations blend her caring nature with a desire for clear, organized roles that allow her to make a positive
    impact.
