persona_description: A scientist and researcher who specializes in microbiology, particularly in the field of gut microbiome and its impact on pregnancy and fetal development. Her research interests include
  the role of the maternal microbiome in pregnancy disorders, the impact of probiotics on the placenta and fetus, and the development of new strategies for improving the maternal gut microbiome. She has
  published several papers in top-tier scientific journals and has received funding from the Wellcome Trust and the Biotechnology and Biological Sciences Research Council for her research.
