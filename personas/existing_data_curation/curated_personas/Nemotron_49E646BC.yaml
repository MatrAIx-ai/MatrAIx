personas:
  professional: Jovan Harris, a budding architect of imagination, spends hours arranging block towers while narrating their purpose with precise, organized detail; they blend a love for novelty with a comfortable,
    solitary workflow that hints at a future career in design.
  sports: Jovan Harris, an enthusiastic toddler who proudly wears a miniature Houston Astros baseball cap while watching game replays with family, joins the Humble Little Kicks Soccer Club for gentle kick‑about
    sessions every Saturday, and gleefully mimics the quarterback moves of the Houston Texans during playtime, reflecting a budding love for team spirit across seasons; they cheer loudly whenever their
    favorite team scores.
  arts: Jovan Harris, an earnest connoisseur of soulful sounds, sways to the gospel hymns sung every Sunday at the local church, sings along to Beyoncé’s latest hits in the car, and twirls to Misty Copeland’s
    ballet excerpts from the TV, letting rhythm and movement shape their early sense of identity and creative expression; they often attempt to recreate the dance steps with stuffed animals as partners.
  travel: Jovan Harris, a tiny globetrotter who has already taken a sunny road trip to Galveston’s beach boardwalk for a sand‑castle afternoon, enjoyed a vibrant Juneteenth parade in Austin, and dreams
    of the sparkling lights of Disney World in Orlando, yet prefers the comfort of a car seat window view over multi‑hour flights, balancing curiosity with a need for familiar routine; they point excitedly
    at passing scenery, especially when they spot a train or a bright-colored sign.
  culinary: Jovan Harris, a picky eater who delights in scooping creamy mac and cheese drizzled with a touch of cheddar, reaches for the buttery crumble of homemade cornbread, revels in sweet potato mash
    with a sprinkle of cinnamon, insists on helping stir the pot of simmering collard greens, yet refuses plain peas, showcasing both adventurous palate moments and classic toddler selectivity; they proudly
    claim the “big spoon” during family meals.
  core: Jovan Harris, an imaginative two‑year‑old who balances meticulous crayon organization with boundless curiosity, finds comfort in gospel melodies while hoarding pennies in a church‑shaped piggy bank,
    and navigates occasional eczema flare‑ups with a mix of proactive self‑care and occasional resistance, embodying a tiny yet complex blend of cultural roots, creative spirit, and tender quirks; they
    often pause to stare at shadows on the wall, pondering their shape.
background:
  cultural: Jovan is raised in an African‑American household in Humble, Texas, where Southern hospitality and Black cultural traditions intertwine. His family celebrates community events at the local church,
    participates in Juneteenth and Kwanzaa, and enjoys music ranging from gospel choirs to classic soul and contemporary hip‑hop. Family meals feature Southern soul food such as collard greens and cornbread,
    and storytelling—both oral histories and picture‑book narratives—plays a central role in preserving cultural heritage. This environment fosters his imaginative spirit, provides secure communal support,
    and offers exposure to the rich artistic and musical legacies of Black Texan culture.
attributes:
  skills: '[''basic language development'', ''fine motor coordination'', ''stacking blocks'', ''color and shape recognition'', ''simple pretend play'', ''early musical rhythm awareness'', ''routine following'',
