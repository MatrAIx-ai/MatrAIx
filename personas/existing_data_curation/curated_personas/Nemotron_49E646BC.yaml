  hobbies: '[''building block towers'', ''scribble drawing'', ''listening to music'', ''exploring sensory bins'', ''storytelling with toys'', ''nature walks'', ''watching imaginative animated shows'', ''playing
    with water and sand'']'
  career_goals: Even at two, Jovan exhibits a nascent sense of purpose. He often says he wants to make big pictures and to find out why things go. Guided by caregivers, he dreams of one day becoming an
    artist who uses colors to tell stories, a scientist who explores how things work, or a storyteller who shares imaginative tales. His future ambitions are rooted in his love for novelty, abstract concepts,
    and creating order from curiosity.
