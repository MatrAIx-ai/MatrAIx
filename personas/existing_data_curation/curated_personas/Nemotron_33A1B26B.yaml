  career_goals: Nicole aims to earn her GED and pursue a college degree in communications, public relations, or community arts management. She envisions a career that blends her love for art and people,
    such as becoming a cultural event coordinator, museum educator for youth programs, or social media strategist for a nonprofit organization. Long‑term, she hopes to create inclusive community spaces
    that foster artistic expression and mental‑wellness support, while continually developing her leadership and creative skills.
