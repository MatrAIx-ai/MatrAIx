    hip-hop'', ''hiking in nearby parks'', ''streaming gameplay on Twitch'']'
  career_goals: Matthew's immediate goal is to earn his GED within the next year. After that he plans to enroll in a community-college automotive technology apprenticeship, aiming to obtain ASE certification
    and eventually open a small, family-run garage in St. Louis County. He also considers enlisting in the Army after high school to experience a highly structured environment and receive technical training,
    though he remains cautious about long-term commitments. In the short term, he wants to improve his competitive gaming profile, stream regularly, and attract sponsorships. He prefers clear milestones
    and stepwise progress, setting concrete targets for each stage of his plan.
