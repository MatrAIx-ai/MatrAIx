  career_goals: Howard aims to compile his lifelong reflections and artistic explorations into a published memoir-essay collection that intertwines philosophy, art theory, and personal narrative. He also
    aspires to curate a solo exhibition of his abstract paintings at a regional gallery in North Carolina and to launch an online platform where he can share curated lectures on critical thinking and art
    appreciation. Although retired from formal employment, he hopes to mentor emerging local artists through occasional workshops, while maintaining a disciplined schedule that balances creative work with
    his need for quiet, low-stress environments.
