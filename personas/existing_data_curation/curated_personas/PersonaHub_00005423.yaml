persona_description: A toxicologist and chemist who specializes in the study of endocrine disruptors and their harmful effects on wildlife and human fertility. She is a signatory of the Prague Declaration
  and is concerned about the lack of scientific evidence and the potential for delayed political action on the safe use of chemicals. She believes that a more systematic approach is needed to identify and
  control the use of endocrine disrupters and that regulatory action should go beyond labelling to include banning.
