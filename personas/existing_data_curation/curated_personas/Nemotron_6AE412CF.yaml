  career_goals: Although retired, Erick aims to channel his expertise into mentorship and cultural preservation. He aspires to document the oral histories of Buda’s early Mexican‑Texan families, creating
    a digital archive for future generations. Erick also seeks to volunteer as a language buddy, helping younger community members improve their Spanish conversational skills. He hopes to lead a weekly
    cooking workshop that blends traditional Mexican recipes with modern health considerations, thereby staying socially active and intellectually engaged. Another personal ambition is to master using a
    tablet for video calls with his grandchildren, allowing him to stay connected while alleviating his worry about losing touch with family. Through these pursuits, Erick wants to remain a central, supportive
    presence in his community while managing his stress through purposeful activity.
