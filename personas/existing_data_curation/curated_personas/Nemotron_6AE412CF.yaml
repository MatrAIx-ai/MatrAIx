personas:
  professional: Erick Gomez, a retired handyman and community organizer, channels decades of carpentry, basic automotive repair, and bilingual translation expertise into mentoring seniors, coordinating
    lively events at the local senior center, and documenting oral histories, all while leveraging a talkative curiosity and a pragmatic balance of organization and flexibility.
  sports: Erick Gomez enjoys low‑impact fitness through the senior center’s walking group and gentle yoga, attends Austin FC soccer matches on game nights, follows the Texas Longhorns football season, and
    participates in occasional community dance classes, preferring activities that keep them socially engaged while respecting limited mobility.
  arts: Erick Gomez, a lifelong lover of classic cinema and boleros, routinely tunes into radio stations playing artists such as Javier Solís, watches black‑and‑white films like "Casablanca" at community
    screenings, and joins folk‑dance lessons that teach traditional steps, letting rhythm and nostalgic storytelling shape their relaxed evenings.
  travel: Erick Gomez favors short, well‑planned trips that accommodate a slower pace, such as day outings to the historic Austin Capitol building, weekend visits to Hill Country wineries, and an annual
    pilgrimage to a family reunion in San Antonio, while dreaming of a tranquil Mississippi River cruise to experience new landscapes without stressful logistics.
  culinary: Erick Gomez, an accomplished home‑cook, tends a small garden of cilantro, jalapeños, and rosemary, using these herbs to flavor festive dishes like mole, tamales, and menudo; they experiment
    with low‑sodium adaptations for health, delight neighbors with holiday spreads, and maintain a handwritten recipe journal that blends traditional flavors with modern twists.
  core: Erick Gomez, at 94, blends talkative curiosity, hands‑on practicality, and a gentle worry about health and money into a community‑centered life that celebrates stories, flavors, and modest movement.
background:
  cultural: Erick was born to Mexican parents who immigrated to Texas during the mid‑20th century. He grew up in a bilingual household where Catholic traditions, Mexican folk songs, and stories of the land’s
    migration shaped his identity. His family celebrated both Mexican holidays such as Día de los Muertos and American holidays, blending rituals like altar building with Thanksgiving meals. The culinary
    practices he learned from his mother—using local Texan ingredients to recreate authentic Mexican flavors—remain central to his cultural expression. Living in Buda, TX, Erick has embraced the Texan spirit
    of independence while maintaining strong ties to his Mexican heritage, often acting as a cultural bridge for younger residents of his community.
