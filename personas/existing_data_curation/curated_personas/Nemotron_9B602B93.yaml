personas:
  professional: Carrie Block, a three-year-old aspiring doctor who spends hours sorting toy medical kits by color and size, showcases methodical organization and reliable follow‑through in pretend surgeries,
    and they proudly announce each successful "cure" with a serious tone.
  sports: Carrie Block, a three-year-old who enjoys weekly toddler gymnastics classes at the community center, cheers for the local MLB team the Chicago Cubs on TV, and they love the simple joy of kicking
    a bright orange soccer ball in the backyard.
  arts: Carrie Block, a three-year-old drawn to colorful picture books and the upbeat songs of Disney’s 'Frozen', often imitates Elsa’s voice while drawing snowflakes, and they proudly display their crayon
    masterpieces on the fridge.
  travel: Carrie Block, a three-year-old who has visited Grandma’s farm in Iowa, delighted in the hands‑on dinosaur exhibit at the local museum, and they eagerly anticipate a family road trip to Disneyland
    next summer, dreaming of meeting Mickey Mouse.
  culinary: Carrie Block, a three-year-old with a refined palate for creamy mac and cheese, crunchy apple slices, and buttery toast, can skillfully spread peanut butter with a small plastic knife but they
    stubbornly refuse broccoli, leading to occasional dinner negotiations.
  core: Carrie Block, a three‑year‑old who thrives on routine, worries about tiny disruptions, and mixes meticulous play with occasional meltdowns over spilled milk.
background:
  cultural: Carrie comes from a white, middle‑class family in Pleasant Grove, a small agricultural community in Sutter County, California. The town values practicality, seasonal farming cycles, local fairs,
    and church gatherings. Her family celebrates traditional American holidays, participates in community potlucks, and enjoys gardening and fruit‑picking trips. These rural‑suburban influences blend with
    modern children’s media, giving her a balanced cultural exposure grounded in routine, community, and down‑to‑earth activities.
attributes:
  skills: '["Sorting toys by color", "Stacking blocks", "Reciting nursery rhymes", "Following daily routines", "Drawing basic shapes"]'
  hobbies: '["Building block towers", "Puzzle sorting", "Listening to bedtime stories", "Pretend cooking", "Collecting and categorizing natural objects", "Quiet coloring"]'
  career_goals: 'When asked about the future, Carrie expresses a simple yet telling ambition: she wants to be a teacher or caregiver who helps children keep things tidy and follow a schedule. She says she
    would love to "help kids learn and keep their rooms clean" and imagines leading a classroom where everyone sings the same song at the same time.'
