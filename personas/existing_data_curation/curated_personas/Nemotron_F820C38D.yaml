  hobbies: '["Community Gardening","Cooking Southern-Inspired Cuisine","Reading Historical Nonfiction and Biographies","Volunteering with Habitat for Humanity","Walking and Light Hiking on Potomac Trails","Attending
    Jazz and Gospel Concerts","Exploring Local History Museums"]'
  career_goals: Felicie aims to advance to a regional director role overseeing multiple community-association portfolios, while obtaining the Certified Property Manager (CPM) and Certified Community Association
    Manager (CCAM) credentials. She aspires to launch her own boutique property-management firm focused on affordable, sustainably managed housing in Prince William County. Additionally, she seeks to mentor
    emerging Black women professionals in real estate, contribute to local housing policy discussions, and implement green-building initiatives across her managed properties.
