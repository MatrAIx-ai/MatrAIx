personas:
  professional: Felicie Blake, a seasoned community-association manager with three decades of expertise in budgeting, vendor negotiations, and sustainable property practices, leverages their curious yet
    practical mindset to blend innovative green-building solutions with proven regulatory compliance, while their calm, critical demeanor keeps complex stakeholder disputes well-controlled.
  sports: Felicie Blake stays active through daily walks along the Potomac River Trail and participation in the local Potomac River Trail Running Club, enjoys seasonal pickleball matches in winter, joins
    a summer community soccer league, and avidly follows the Washington Capitals, Wizards, Commanders, and D.C. United while cheering the teams from the sidelines at home games.
  arts: Felicie Blake regularly attends jazz concerts featuring artists like Wynton Marsalis and Kamasi Washington at the Kennedy Center, finds solace in gospel performances by Marvin Sapp and Kirk Franklin,
    and delves into historical nonfiction by authors such as Isabel Wilkerson and Henry Louis Gates Jr., allowing music and literature to shape both their leisure time and community mentorship ethos.
  travel: Felicie Blake blends meticulous planning with a love for spontaneous discovery, favoring sustainable tourism in heritage-rich destinations like Charleston, Savannah, and Asheville, while also
    exploring historic European towns such as Heidelberg, and balances these trips with family commitments by often traveling with adult children or close friends.
  culinary: Felicie Blake, an adept home chef, delights in preparing Southern-inspired dishes like smoked turkey collard greens, gumbo with okra, and sweet-potato cornbread, experimenting with fresh herbs
    from their garden and premium ingredients such as sorghum and locally sourced seafood to fuse tradition with contemporary flavors.
  core: Felicie Blake exemplifies a calm, curious professional who fuses sustainable property expertise with community-centric mentorship, all while balancing disciplined finances, proactive health stewardship,
    and a vibrant love for Southern cuisine, jazz, and heritage travel.
background:
  cultural: Felicie's cultural background is rooted in the African-American community of the Mid-Atlantic, with family histories that trace back to the Great Migration from the South. Growing up in a close-knit,
    church-centered neighborhood, she absorbed values of resilience, communal support, and a commitment to education. Her experiences as a Black professional in the Washington-DC metropolitan area have
    shaped a perspective that balances pride in her heritage with a pragmatic approach to navigating corporate and community spaces. Felicie actively participates in local Juneteenth celebrations, supports
    Black-owned businesses, and mentors youth through community outreach programs, reflecting a blend of tradition and contemporary civic engagement.
attributes:
  skills: '["Property Management","Community Association Governance","Financial Planning and Budgeting","Vendor Negotiation","Regulatory Compliance (Fair Housing, HOA Laws)","Risk Management","Lease Administration","Tenant
