personas:
  professional: Wanda Kohler, a 23‑year‑old insurance sales specialist, combines a curious appetite for learning with a methodical, data‑driven approach to match clients with auto, home, and health policies,
    leveraging their strong organization and clear communication to consistently exceed sales targets and lay the groundwork for a future senior consultant role.
  sports: Wanda Kohler enjoys weekend hikes along Gulf Coast trails, participates in a local sunrise yoga class, follows the Tampa Bay Buccaneers and the Florida State Seminoles football teams, and they
    run with the Panama City Runners club to stay fit.
  arts: Wanda Kohler devotes evenings to a close‑knit book club where they dissect historical fiction by Philippa Gregory and self‑improvement titles by James Clear, while they unwind to folk‑rock artist
    Brandi Carlile and occasional classical piano recitals streamed from the local symphony.
  travel: Wanda Kohler prefers meticulously planned road trips that blend coastal scenery with quiet retreats, they have recently explored Iceland’s Ring Road and Charleston’s historic districts, and they
    long to hike Norway’s fjords on a future adventure.
  culinary: Wanda Kohler experiments with farm‑to‑table recipes, often preparing roasted beet and kale quinoa bowls with feta, whisking shrimp tacos with avocado‑lime crema, and they regularly harvest fresh
    herbs from their own garden to elevate each dish.
  core: Wanda Kohler is a perennially organized 23‑year‑old who balances a love for quiet reflection with a drive for professional growth, they tend to over‑journal every insight and occasionally procrastinate
    on big life decisions.
background:
  cultural: Wanda was raised in a middle-class, white family in the Florida Panhandle. Her upbringing blended the laid-back coastal lifestyle of Panama City with traditional Southern values of hard work,
    self-reliance, and community involvement. While her household reflected mainstream American customs—celebrating holidays like Thanksgiving and Fourth of July, attending a local Protestant church, and
    emphasizing practical education—she also absorbed the multicultural flavor of the Gulf Coast, where Hispanic and Caribbean influences are part of everyday life.
attributes:
  skills: '[''Insurance product knowledge (auto, home, health)'', ''Risk assessment and underwriting basics'', ''Customer relationship management'', ''CRM software proficiency (Salesforce)'', ''Effective
    communication and negotiation'', ''Data analysis and Excel'', ''Regulatory compliance awareness'', ''Organizational and time-management skills'', ''Problem solving and cross-selling'']'
  hobbies: '[''Reading historical fiction and self-improvement books'', ''Yoga and mindfulness practice'', ''Gardening (vegetable and herb garden)'', ''Hiking coastal trails'', ''Cooking and experimenting
    with new recipes'', ''Puzzle solving (crosswords, sudoku)'', ''Small-group book club'', ''Volunteering at the local animal shelter'']'
  career_goals: Wanda aims to leverage her curiosity and practical mindset to become a senior insurance consultant within the next three years, earning professional designations such as the CPCU (Chartered
    Property Casualty Underwriter). She aspires to lead a small sales team in the Bay County office, focusing on tailored solutions for small-business owners and families. In the longer term, she envisions
    opening her own boutique agency that emphasizes transparent policies and community education, while continuing her personal development through a Bachelor's degree in Business Administration.
