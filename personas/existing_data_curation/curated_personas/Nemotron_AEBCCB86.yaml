  hobbies: '["Baking pies and breads", "Knitting and crocheting circles", "Quilting classes", "Community vegetable gardening", "Church gospel choir and bluegrass sing-alongs", "Playing bridge and canasta",
    "Genealogy research", "Walking her terrier in the woods", "Attending local craft fairs", "Storytelling gatherings"]'
  career_goals: Even though she is retired, Gina remains focused on staying active and useful within her community. She hopes to continue volunteering at the Oak Hill United Methodist Church by teaching
    quilting and sewing to younger women, and to lead a monthly storytelling circle that preserves the town’s oral history. She aspires to write a short memoir of her family’s coal‑mining roots to share
    with grandchildren and local schools. Maintaining her health and independence is a central ambition; she plans to join a gentle yoga class at the senior center to help manage her anxiety. Lastly, she
    would like to become a peer‑support volunteer for the local mental‑health outreach program, offering a listening ear to seniors who struggle with loneliness or worry.
