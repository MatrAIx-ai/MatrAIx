persona_description: A political analyst and historian who specializes in the study of the Israeli-Palestinian conflict, particularly the events leading up to the establishment of the State of Israel and
  the subsequent wars and conflicts between Israel and its Arab neighbors. His research interests include the role of the United Nations in the conflict, the role of the United States in the conflict, and
  the impact of the conflict on the Middle East region as a whole. He is particularly interested in the role of key figures such as David Ben-Gurion, Menachim Begin, and Yasser Arafat in the conflict and
  their impact on the development of the Israeli-Palestinian relationship. He is also interested in the impact of the conflict on the wider region and the world, including the role of the United Nations
  and the United States in mediating the conflict and the role of other countries in the conflict. He is a member of the Israeli Knesset and served as a member of the Knesset's Foreign Affairs and Defense
  Committee.
