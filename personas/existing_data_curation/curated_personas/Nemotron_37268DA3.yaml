personas:
  professional: Gregory Poe, a 12‑year‑old aspiring mechanical tinkerer and junior horticulturist, channels their love of detailed model airplanes, cars, and tractor mechanics into meticulous 4‑H projects,
    approaching each task with structured curiosity while often drifting into relaxed, flexible scheduling and occasional disorganization.
  sports: Gregory Poe, a 12‑year‑old who spends calm mornings fishing at the creek behind their house and weekends playing in the town’s youth baseball league, roots for the nearby River Valley Raiders
    high‑school baseball squad and idolizes MLB star Mike Trout, while preferring low‑key, routine exercise over intense competition and often worries about meeting performance expectations.
  arts: Gregory Poe, a 12‑year‑old comic‑style illustrator, draws panels inspired by Jeff Smith’s *Bone* and Stan Sakai’s *Usagi Yojimbo*, devours fantasy novels by J.K. Rowling and Rick Riordan, and hums
    the whimsical scores of John Williams, allowing their creative outlet to balance the structured routine of their daily hobbies.
  travel: Gregory Poe, a 12‑year‑old who prefers low‑key, family‑oriented trips, eagerly anticipates the annual summer camp at Lake Willow State Park where they fish and build model boats, and dreams of
    a future weekend backpacking in the Great Smoky Mountains, though limited allowance and school schedules keep their wanderlust modest.
  culinary: Gregory Poe, a 12‑year‑old with a palate for simple, handheld meals, often snacks on cheese pizza, chicken nuggets, and peanut‑butter‑jelly sandwiches while building models, yet enjoys helping
    their mother fry catfish with cornmeal and relish home‑grown tomatoes from their 4‑H garden, showcasing a budding cooking skill that mixes comfort foods with fresh produce.
  core: Gregory Poe, a detail‑obsessed 12‑year‑old who alternates between methodical model building and scattered forgetfulness, navigates the world with quiet curiosity, a tendency to worry, and a penchant
    for dragging their fishing line into every thoughtful moment.
background:
  cultural: 'Gregory was raised in Mc Rae Helena, a small, predominantly white community in Telfair County, Georgia. His upbringing reflects traditional Southern rural culture: regular attendance at a local
    Baptist church, involvement in school and community events like the county fair, and a family lifestyle centered on farming and small‑scale animal husbandry. The region’s values of self‑reliance, hospitality,
    and respect for nature shape his worldview, while the close‑knit community provides him with a sense of belonging even as his reserved nature leads him to seek out smaller, familiar groups.'
