  career_goals: Gregory aims to build a future around stable, hands‑on work that offers clear procedures and predictable outcomes. He hopes to become an automotive or farm‑equipment technician after completing
    a junior mechanics apprenticeship, valuing the structured problem‑solving aspect of the trade. At the same time, he dreams of expanding his coding skills to eventually work in tech support or software
    development, seeing it as a low‑stress, organized career path. In the short term, he plans to join his school’s 4‑H club for youth agricultural projects, earn a basic auto‑repair certification, and
    complete more advanced Scratch and Python tutorials.
