  hobbies: '[''Watercolor Painting'', ''Digital Illustration'', ''Reading Philosophy'', ''Speculative Fiction'', ''Visiting Art Galleries'', ''Attending Poetry Readings'', ''Experimental Cooking'', ''Yoga'',
    ''Meditation'', ''Succulent Gardening'', ''Prairie Walking'', ''Listening to Indie Folk'']'
  career_goals: She aims to complete her associate degree in Graphic Design or Art History, leveraging her methodical study habits. In the medium term, she hopes to transition into a role that blends hospitality
    with the arts, such as managing a café‑gallery or serving as an assistant curator at a local museum. Ultimately, Gila envisions establishing a freelance illustration business and possibly opening a
    boutique studio where she can showcase her own artwork and host intimate workshops. She also plans to develop personal strategies for stress management to sustain her creative output.
