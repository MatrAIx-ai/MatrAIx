personas:
  professional: Gila Domingue, a hospitality‑savvy arts enthusiast, leverages their keen organizational instincts and imaginative eye for design to excel as a shift manager at a downtown café‑gallery, blending
    meticulous inventory control with curatorial insight while quietly navigating the bustling floor with the calm of a seasoned mediator.
  sports: Gila Domingue, an avid yoga practitioner who also follows the Tulsa Roughnecks FC, attends thrice‑weekly Vinyasa classes at a downtown studio, participates in the seasonal Tulsa Trail Runners
    group for weekend prairie runs, and winds down on Sundays with a casual viewing of Oklahoma City Thunder games, balancing low‑impact movement with a modest sports fandom.
  arts: Gila Domingue, a solitary creator of surreal watercolors, immerses themselves in the Tulsa Arts District, drawing inspiration from the works of Georgia O'Keeffe and local Indigenous beadwork, curating
    nightly playlists of Bon Iver and Sufjan Stevens while devouring speculative fiction and art criticism by Jerry Saltz, and they often contribute small‑scale digital illustrations to community zines.
  travel: Gila Domingue, a methodical itinerant who prefers self‑planned weekend road trips that balance artistic exploration with nature, has recently driven to Santa Fe’s Canyon Road for its galleries,
    trekked the Badlands for its stark horizons, and dreams of an Icelandic summer to photograph volcanic landscapes while still budgeting for a modest Airbnb stay.
  culinary: Gila Domingue, a curious home cook, experiments with flavors like sumac‑spiced roasted cauliflower, miso‑glazed carrots, and a quinoa‑black bean salad topped with pickled jalapeños, often sourcing
    fresh herbs and heirloom tomatoes from the Tulsa Farmers Market, while occasionally treating themselves to a classic chicken‑fried steak on a lazy Sunday.
  core: Gila Domingue, a disciplined dreamer who channels meticulous planning and lingering anxiety into vibrant abstract art, yoga, and a carefully balanced life of work, study, and solitary creativity.
background:
  cultural: Gila is a second-generation white American raised in Tulsa, Oklahoma. Her family traces its roots to English and German ancestors and grew up in a middle-class, modest household that emphasized
    hard work, community responsibility, and self-reliance—values typical of the Midwest. While she identifies with mainstream American culture, she has been deeply influenced by Tulsa's growing arts scene,
    including the Philbrook Museum of Art and the Tulsa Arts District. Exposure to local Native American art, regional folk traditions, and a vibrant indie music community has broadened her aesthetic sensibilities.
    Her upbringing balances conventional Midwestern values with an exploratory curiosity for abstract and novel artistic expressions.
attributes:
  skills: '[''Customer Service'', ''POS System Operation'', ''Food & Beverage Knowledge'', ''Conflict Resolution'', ''Time Management'', ''Shift Scheduling'', ''Inventory Management'', ''Event Coordination'',
