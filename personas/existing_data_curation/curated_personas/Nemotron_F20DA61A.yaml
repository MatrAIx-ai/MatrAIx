  hobbies: '[''Running (structured training schedule)'', ''Puzzle solving (jigsaw, logic puzzles)'', ''Meal planning and cooking'', ''Community gardening'', ''Local trivia nights'', ''Reading technical
    and non‑fiction books'']'
  career_goals: Starr aims to advance to a lead machine technician role within the next two years, leveraging her hands‑on expertise to oversee a small team of operators. She plans to obtain certifications
    in CNC machining and Six Sigma Yellow Belt to broaden her process‑improvement capabilities. Long‑term, she aspires to become a production supervisor or plant maintenance manager, where she can apply
    her organized, results‑driven approach to optimize operational efficiency and safety standards. Additionally, Starr is interested in pursuing further education in industrial engineering to solidify
    a pathway toward a technical management career.
