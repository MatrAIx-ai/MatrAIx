personas:
  professional: Starr Lefler is a detail‑oriented machine technician at a mid‑size manufacturing plant, applying strong mechanical aptitude and precise documentation to keep extruding, forming, pressing,
    and compacting lines running on schedule while assertively training new operators and championing safety compliance.
  sports: Starr Lefler logs weekly runs along the St. Lucie River, targets a 30‑mile monthly mileage goal, competes in local 5K events organized by the Treasure Coast Runners Club, and follows the Miami
    Heat and Tampa Bay Rays for weekend sports inspiration.
  arts: Starr Lefler enjoys solving intricate jigsaw puzzles featuring the work of M.C. Escher, unwinds at trivia nights with friends while listening to indie folk artist Phoebe Bridgers, and occasionally
    attends community theater productions of Shakespeare’s comedies.
  travel: Starr Lefler prefers well‑planned weekend getaways, often renting a cabin in the Ocala National Forest for hiking and puzzle‑solving retreats, while also dreaming of a spring trip to Kyoto’s historic
    gardens to combine cultural immersion with a structured itinerary.
  culinary: Starr Lefler follows a weekly meal‑prep routine centered on balanced quinoa bowls with roasted salmon, broccoli, and a lemon‑garlic vinaigrette, perfecting the seasoning each week, and occasionally
    treats themselves to a spicy chicken tikka masala from a beloved local Indian restaurant.
  core: Starr Lefler blends a disciplined, puzzle‑loving mindset with a runner’s dedication, turning every work shift and weekend into a meticulously planned quest for efficiency, even if it means obsessively
    aligning their sock colors each morning.
background:
  cultural: Starr was raised in a middle‑class, white family in central Florida, where her parents emphasized a strong work ethic, punctuality, and community involvement. Her upbringing included regular
    participation in church youth groups and local volunteer events, fostering a sense of responsibility and cooperation. While her ancestry includes Irish and German roots, her cultural identity is primarily
    shaped by the Floridian coastal lifestyle—appreciating outdoor activities like beach outings and river walks—combined with the region’s emphasis on friendly, down‑to‑earth social interactions. This
    background has reinforced her practical, organized approach to both work and personal life.
attributes:
  skills: '[''Extruding and press machine operation'', ''Mechanical troubleshooting and repair'', ''Interpretation of technical drawings and work orders'', ''Routine preventive maintenance'', ''Production
