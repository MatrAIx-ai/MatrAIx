persona_description: A literary scholar who specializes in the study of Greek and French classical literature, particularly in the works of Euripides, Racine, and Corneille. Their expertise includes the
  role of the confidant in their plays, the significance of the confidant in Western literature, and the evolution of the role of the confidant in French tragic drama from the 17th to the 19th century.
  They are also knowledgeable about the works of Shakespeare, the duologue of personal encounter, and the structure of the first plays of Racine.
