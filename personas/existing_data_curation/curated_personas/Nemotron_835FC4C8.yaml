  hobbies: '[''Gardening'', ''Volunteer work at food bank'', ''Community outreach'', ''Attending theater productions'', ''Visiting art exhibitions'', ''Book clubs (mystery/historical fiction)'', ''Hiking
    on local trails'', ''Cooking and recipe sharing'', ''Hosting game nights'', ''Participating in community festivals'']'
  career_goals: Looking ahead, Whitney aims to deepen her supervisory expertise by earning a Certified Administrative Professional (CAP) credential and pursuing a short course in human resources management
    at a local community college. She hopes to mentor younger employees formally, implement a streamlined workflow system for her department, and eventually step into a middle‑management role overseeing
    multiple support teams. Whitney also wishes to champion a workplace wellness initiative that integrates flexible scheduling and mental‑health resources, reflecting her compassionate nature and desire
    to foster a harmonious work environment.
