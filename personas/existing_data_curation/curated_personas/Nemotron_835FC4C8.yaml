personas:
  professional: Whitney Pennington is a seasoned office supervisor with three decades of experience coordinating administrative teams, leveraging strong interpersonal communication, conflict mediation,
    and practical problem‑solving while infusing a compassionate, flexible leadership style that values team harmony over rigid procedures.
  sports: Whitney Pennington enjoys weekend hikes on the Mount Nittany and Bald Eagle State Park trails as part of the Centre County Hiking Club, cheers on the Penn State Nittany Lions football team in
    fall and the Pittsburgh Steelers during football season, and occasionally joins a casual pick‑up softball league with coworkers.
  arts: Whitney Pennington regularly attends Penn State campus art exhibitions featuring works by Georgia O'Keeffe‑inspired local artists, enjoys community theater productions of Arthur Miller's 'The Crucible',
    and participates in a mystery‑fiction book club that often discusses Agatha Christie and Ken Follett, all of which enrich their appreciation for storytelling and visual arts.
  travel: Whitney Pennington prefers moderately planned road trips that blend cultural history and relaxation, having recently explored Gettysburg National Military Park and Charleston, South Carolina,
    while dreaming of a leisurely wine‑tasting tour in Napa Valley and a nostalgic visit to the historic streets of London with their siblings.
  culinary: Whitney Pennington, an avid home cook, delights in preparing family‑passed roasted chicken seasoned with rosemary and thyme, herb‑infused ratatouille using fresh basil, sage, and oregano from
    their garden, and a warm apple‑cinnamon pie that often becomes the centerpiece of weekend gatherings.
  core: Whitney Pennington is a compassionate, community‑oriented office leader who balances a love for gardening, theater, and hiking with a delightfully relaxed approach to planning, occasional forgetfulness,
    and a habit of sharing homegrown herbs and homemade treats with everyone around them.
background:
  cultural: Whitney was raised in a tight‑knit, middle‑class community in central Pennsylvania, where family ties and local traditions play a central role. Her upbringing emphasized hard work, self‑reliance,
    and community service, values she carries into her professional and personal life. Though she identifies as white American, her family heritage includes roots in the Pennsylvania Dutch region, giving
    her an appreciation for regional customs such as seasonal festivals and community potlucks. Her involvement in a local church and long‑standing friendships reflect a cultural backdrop that values cooperation,
    hospitality, and collective well‑being.
attributes:
  skills: '[''Office operations management'', ''Team leadership and mentorship'', ''Staff scheduling'', ''Interpersonal communication'', ''Conflict resolution'', ''Basic budgeting and expense tracking'',
