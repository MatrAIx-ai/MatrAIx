  career_goals: Jesse aims to become a senior full‑stack engineer within the next three years, followed by a technical lead role where he can shape product direction for user‑centric, art‑focused applications.
    He is passionate about integrating technology and creativity, so he hopes to spearhead projects that blend interactive media, generative art, and immersive experiences. Long‑term, he envisions launching
    a boutique studio that delivers innovative digital experiences for museums, galleries, and cultural institutions. He also plans to deepen his expertise through a master’s degree in computer science
    and by earning advanced cloud architecture certifications, while continuing to mentor emerging developers and contribute to open‑source communities.
