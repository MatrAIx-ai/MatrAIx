personas:
  professional: Johnathan Garrett, a secondary school teacher in Jackson County, blends methodical lesson planning with a curiosity for art and technology, using differentiated instruction, Google Classroom,
    and SMART Boards to craft interdisciplinary units that weave visual arts and digital media while mentoring new teachers and leading professional‑development workshops, reflecting they are organized
    yet collaborative in nature.
  sports: Johnathan Garrett enjoys solo trail runs and weekend hikes with the Wichita Mountains Outdoor Club, follows the Oklahoma City Thunder for basketball, cheers for the Oklahoma Sooners during football
    season, and participates in a co‑ed softball league at the local community center, preferring low‑impact cardio over high‑intensity gym sessions.
  arts: Johnathan Garrett channels curiosity into sketching and acrylic painting inspired by the bold colors of Van Gogh and the serene vistas of the Hudson River School, attends weekly gallery openings
    featuring local artists, strums acoustic arrangements of Sufjan Stevens and Iron & Wine on their guitar, and regularly watches Wes Anderson films for their whimsical storytelling.
  travel: Johnathan Garrett plans trips with the same precision used for lesson plans, favoring road‑trip adventures to national parks like Grand Canyon and Zion, cherishes a weekend art retreat in Santa
    Fe, and dreams of a solo photography pilgrimage through the misty streets of Kyoto and the vibrant murals of Valparaíso, balancing budget constraints with a longing for cultural immersion.
  culinary: Johnathan Garrett’s culinary experiments range from whipping up succulent smoked brisket with a dry rub of paprika and brown sugar to mastering a fragrant Thai green curry with coconut milk,
    kaffir lime, and fresh basil, while a weekend hobby of arranging sushi rolls with ginger and wasabi showcases moderate cooking skill and love for bold, fresh ingredients.
  core: Johnathan Garrett is a methodical, art‑infused educator who meticulously plans every lesson yet sometimes forgets to water houseplants, balancing disciplined budgeting with occasional impulsive
    splurges on vintage guitars.
background:
  cultural: Johnathan grew up in the small‑town, Midwestern culture of southwestern Oklahoma, where community ties, modesty, and a strong work ethic are valued. Influenced by the nearby Altus Air Force
    Base, he respects the disciplined, service‑oriented mindset of the area, while also cherishing the region’s love for high‑school sports, country music, and local folk traditions. His family’s heritage
    includes German and Irish roots, which manifest in holiday customs and a respect for storytelling, and he incorporates this blend of rural Americana and openness to new ideas into his teaching and personal
    life.
attributes:
  skills: '["Classroom Management", "Lesson Planning", "Curriculum Development", "Differentiated Instruction", "Educational Technology Integration", "Student Assessment", "Conflict Resolution", "Collaborative
