  hobbies: '["Sketching", "Acrylic Painting", "Visiting Art Galleries", "Reading Literary Fiction", "Philosophy Essays", "Landscape Photography", "Hiking in Wichita Mountains", "Acoustic Guitar", "Experimental
    Cooking", "Tabletop Role-Playing Games"]'
  career_goals: Johnathan aims to earn a bachelor's degree in education within the next two years and later pursue a master's in educational leadership, positioning himself for a department head role or
    curriculum specialist position within the Jackson County school district. He hopes to champion an arts‑infused STEM program and eventually transition into school administration as a vice‑principal,
    where he can shape district‑wide instructional policies that emphasize creativity and student‑centered learning.
