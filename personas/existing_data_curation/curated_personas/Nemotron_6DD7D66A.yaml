personas:
  professional: Colleen Overman combines deep hands‑on expertise with a humanities‑sharp analytical lens, using her curiosity‑driven problem‑solving and relaxed, flexible approach to troubleshoot CNC routers,
    enforce ISO‑9001 quality standards, and mentor new hires while eyeing a shift‑lead supervisory role within two years.
  sports: Colleen Overman walks the Dallas Arboretum trails with the local Dallas Walking Club, cheers on the Dallas Cowboys and Mavericks, and participates in a weekend recreational tennis league, approaching
    fitness with steady, low‑key dedication rather than intense regimens.
  arts: Colleen Overman immerses herself in historical biographies, enjoys the storytelling of folk singer Joan Baez, attends the Dallas Theater Center’s productions of classic plays, and curates a small
    vinyl collection featuring Willie Nelson and Stevie Ray Vaughan, letting the arts shape her reflective evenings.
  travel: Colleen Overman favors spontaneous weekend road trips to Hill Country vineyards, long‑planned visits to Santa Fe’s art scene, and occasional cultural excursions to San Miguel de Allende, balancing
    a relaxed itinerary with a curiosity for regional history and cuisine.
  culinary: Colleen Overman loves crafting Tex‑Mex dishes like chicken enchiladas with homemade chipotle salsa, experimenting with cumin‑coriander blends, and hosting intimate dinner parties where she showcases
    her knack for balancing bold flavors with practical, budget‑friendly cooking.
  core: Colleen Overman blends a hands‑on curiosity with laid‑back practicality, turning woodworking projects, historical biographies, and Tex‑Mex flavors into a uniquely resilient, slightly skeptical,
    yet warmly social life.
background:
  cultural: Colleen grew up in a middle‑class suburban neighborhood on the outskirts of Dallas, immersed in the cultural mix of Texas‑Southern hospitality and a strong sense of community. Her family’s traditions
    included regular church attendance, holiday gatherings featuring classic Southern comfort food, and an appreciation for local music such as country and blues. As a white Texan, she identifies with the
    “big‑hearted” Texas ethos—practical, self‑reliant, yet courteous. Her humanities degree introduced her to broader artistic and literary traditions, giving her a layered perspective that balances regional
    pride with an openness to diverse ideas. The divorce in her early 40s reinforced a pragmatic, independent outlook, while her career in manufacturing reinforced the value of hard work and teamwork.
attributes:
  skills: '[''Machine operation (CNC, hydraulic presses)'', ''Assembly line coordination'', ''Quality inspection (ISO‑9001)'', ''Safety compliance (OSHA)'', ''Lean manufacturing (value‑stream mapping, 5S)'',
