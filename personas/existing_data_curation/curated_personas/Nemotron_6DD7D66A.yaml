  hobbies: '[''DIY home improvement (woodworking, furniture restoration)'', ''Reading historical non‑fiction and biographies'', ''Book‑club participation'', ''Cooking Tex‑Mex cuisine'', ''Casual dinner
    hosting'', ''Walking at Dallas Arboretum'', ''Photography (Texas landscapes)'', ''Bridge (card game)'', ''Online puzzle games'']'
  career_goals: While she enjoys the tangible nature of floor work, Colleen is aiming to move into a supervisory role within the next two years, focusing on process improvement and team development. She
    hopes to become a shift lead or production supervisor where she can apply her curiosity for new technologies while maintaining practical, proven workflows. Long‑term, she envisions transitioning into
    a training specialist or safety coordinator position that lets her combine her humanities background—particularly her skill in clear communication and critical thinking—with her industry experience.
    Ultimately, she seeks a stable, respected role that offers a pathway to mentorship before she plans a phased retirement around age 65.
