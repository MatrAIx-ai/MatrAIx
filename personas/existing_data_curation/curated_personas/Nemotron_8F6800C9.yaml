personas:
  professional: Crystal Rimmer, a seasoned geriatric home‑health nurse with over forty years of bedside expertise, combines meticulous patient assessments, wound‑care precision, and adept IV therapy with
    a forward‑looking embrace of telehealth tools, allowing them to mentor LPNs and lead safety‑focused quality‑improvement projects while balancing curiosity for new technology with a steadfast practicality.
  sports: Crystal Rimmer stays active through early‑morning walks with the Brentwood Walking Club, cheers season tickets for the Nashville Predators and the Tennessee Titans, and joins a casual community
    softball league for seniors each summer, allowing them to blend low‑impact cardio with a love for local team spirit.
  arts: Crystal Rimmer immerses themselves in the lyrical storytelling of Dolly Parton, revisits the timeless novels of Margaret Mitchell, attends seasonal productions at the Tennessee Repertory Theatre,
    and knits while humming the melodies of the Carter Family, letting these artistic touchstones shape their quiet evenings and inspire their garden designs.
  travel: Crystal Rimmer prefers thoughtfully planned road trips to historic towns like Savannah and Asheville, enjoys weekend retreats to the Great Smoky Mountains for birdwatching, savors the slower pace
    of a Charleston carriage ride, but avoids long‑haul flights unless traveling with adult grandchildren to visit family in Edinburgh, allowing them to balance a love for gentle adventure with budget‑conscious
    family priorities.
  culinary: Crystal Rimmer cooks classic Southern fare such as slow‑cooked collard greens seasoned with smoked ham hocks, buttery homemade biscuits, and peach cobbler drizzled with bourbon, sources heirloom
    tomatoes from their garden for fresh salsa, and delights in occasional visits to farm‑to‑table eateries for fresh catfish, all while experimenting with new spice blends that they meticulously note in
    a recipe journal.
  core: Crystal Rimmer blends a lifelong devotion to community care with a quiet curiosity that fuels garden experiments, occasional late‑night biscuit baking, and a habit of double‑checking medication
    labels, while they juggle mentorship ambitions and a slight tendency to over‑schedule their book club meetings.
background:
  cultural: Crystal was raised in a middle‑class, Protestant (Methodist) family in rural Tennessee, embodying Southern hospitality and strong community ties. Her white Southern heritage emphasizes family,
    church involvement, and respect for tradition, while also valuing self‑reliance and practical problem‑solving. Living in Brentwood, an upscale suburb of Nashville, she blends classic Southern values
    with exposure to broader cultural influences through her nursing career and community service. This background informs her compassionate bedside manner, dedication to community health, and appreciation
    for modest, purposeful leisure activities.
attributes:
