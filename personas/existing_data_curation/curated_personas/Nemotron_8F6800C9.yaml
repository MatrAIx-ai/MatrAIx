  hobbies: '[''gardening'', ''birdwatching'', ''knitting'', ''reading historical fiction'', ''cooking Southern cuisine'', ''walking nature trails'', ''volunteering at local senior center'', ''small community
    book club'']'
  career_goals: Approaching retirement, Crystal aims to transition into a mentorship and consultant role. She plans to become a certified preceptor for LPN students, obtain a Certified Geriatric Nurse credential,
    and help her local health department develop a community‑based telehealth program for seniors. Additionally, she hopes to volunteer her expertise at the Brentwood senior center, guiding caregivers on
    best practices and patient safety.
