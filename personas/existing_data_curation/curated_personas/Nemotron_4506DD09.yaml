  hobbies: '[''Gardening (herbs and vegetables)'', ''Traditional Mexican cooking'', ''Reading (medical history, science, literature)'', ''Walking and birdwatching'', ''Chess'', ''Wine tasting (local wines)'',
    ''Volunteer health‑education workshops'']'
  career_goals: Approaching retirement, Omar aims to transition from daily dispensing to mentorship and community health leadership. He plans to mentor younger pharmacists through formal preceptorships,
    develop a medication‑safety workshop series for seniors in Yamhill County, and author practical articles on geriatric pharmacotherapy for regional pharmacy journals. Omar also hopes to serve as a consultant
    for local clinics, helping them integrate evidence‑based prescribing practices while respecting the practical constraints of a small‑town setting. His long‑term ambition is to leave a legacy of improved
    medication literacy among the Hispanic community and to ensure a smooth succession for his pharmacy team.
