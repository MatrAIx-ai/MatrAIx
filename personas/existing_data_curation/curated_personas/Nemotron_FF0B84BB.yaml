personas:
  professional: Donald Wiggins, a 28‑year‑old pipefitter and steamfitter, combines his expertise in reading complex mechanical blueprints and precision welding with a natural flair for communication, turning
    each installation project into a collaborative showcase that often includes custom‑fabricated metal art pieces for clients.
  sports: Donald Wiggins rides a mountain bike along the Lake Michigan shoreline each weekend, pitches for the local beer‑league softball team the Milwaukee Hops, and cheers loudly for the Milwaukee Brewers
    and Milwaukee Bucks, balancing competitive drive on the field with a laid‑back bike‑riding cadence.
  arts: Donald Wiggins spends afternoons at the Milwaukee Art Museum and wanders downtown to study street murals, where they sketch ideas for functional metal sculptures while listening to drumming legends
    like John Bonham and contemporary indie group The War on Drugs, letting visual and musical inspiration feed their next DIY welding project.
  travel: Donald Wiggins prefers road‑trip adventures that mix craft‑beer pilgrimages and metal‑working workshops, having already toured the breweries of Portland Oregon, the historic taverns of Dublin
    Ireland, and the industrial design museum in Chicago, while dreaming of a summer retreat in the Upper Peninsula’s Lake Superior shoreline to combine fishing, biking, and sketching.
  culinary: Donald Wiggins loves brewing experimental ales and incorporates spent grain into hearty dishes like bratwurst‑and‑grain skillet, enjoys a perfect cheese‑curd platter with a side of pickled vegetables,
    and boasts a modest kitchen skill set that can whip up a solid carbonara while they perfect an IPA’s hop profile.
  core: Donald Wiggins is a pipefitting virtuoso who channels a competitive, talkative energy into artful metalwork, craft‑beer experiments, and community‑driven projects, all while balancing disciplined
    finances with occasional indulgent splurges.
background:
  cultural: Donald grew up in a working‑class, white Midwestern family in the suburbs of Milwaukee. His family’s roots trace back to Polish and German immigrants who settled in the city’s historic neighborhoods,
    giving him a cultural connection to the region’s strong brewery tradition, hearty foods like bratwurst and cheese curds, and a reverence for community gatherings. He was raised with a pragmatic work
    ethic and a sense of civic pride, often attending local high‑school sports events and community festivals. Though he does not practice a religion actively, his upbringing involved occasional church
    gatherings that emphasized neighborliness and mutual support. The multicultural tapestry of Milwaukee, with its vibrant arts scene and lake‑front lifestyle, has shaped his appreciation for both traditional
    craftsmanship and contemporary creative expression.
attributes:
  skills: '["Industrial pipefitting and steamfitting", "Blueprint and schematic reading", "MIG/TIG welding", "Hydraulic and pneumatic system troubleshooting", "Wisconsin plumbing code compliance", "Preventive
    maintenance and inspection", "Project scheduling and coordination", "Team leadership and apprentice training", "Customer liaison and technical consulting", "Basic AutoCAD drafting for pipe layouts"]'
  hobbies: '["Visiting Milwaukee Art Museum and local galleries", "Sketching and designing metal art sculptures", "Playing drums in a garage band", "Weekend bike rides along Lake Michigan", "Participating
    in beer‑league softball", "Homebrewing craft beers", "Attending craft‑beer and maker festivals", "DIY metalworking and welding projects", "Reading engineering and sustainability podcasts", "Exploring
    city street murals and public art installations"]'
  career_goals: Donald aims to become a master pipefitter within the next five years, earn the Certified Waterworks Apprentice Professional (CWAP) certification, and eventually launch his own boutique contracting
    firm that specializes in high‑efficiency, eco‑friendly steam and water systems for commercial buildings. He intends to integrate his artistic interests by offering custom metal‑fabricated fixtures and
    decorative piping solutions. Long‑term, he envisions teaching in a trade apprenticeship program, shaping the next generation of skilled tradespeople, and serving on industry committees that promote
    innovative, sustainable plumbing standards.
