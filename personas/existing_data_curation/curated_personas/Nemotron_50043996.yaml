personas:
  professional: Ricardo Jones, a budding eSports strategist and junior game designer, channels spontaneous tactics and curiosity into mastering Fortnite builds and crafting Minecraft mods, yet often lets
    school deadlines slip because they resist rigid structure, thriving when improvising under pressure.
  sports: Ricardo Jones, a regular at the neighborhood park basketball hoop, joins the Saturday Skate & Dunk Club, idolizes the Los Angeles Lakers while shooting three-pointers, and mixes skateboarding
    tricks with conditioning drills, though they sometimes skip warm-ups in their spontaneous style.
  arts: Ricardo Jones, an avid comic-style sketcher and beat maker, draws inspiration from Stan Lee, Kendrick Lamar, and Skrillex, spends evenings layering tracks on the GarageBand app, and fills their
    tablet with superhero-flavored characters that blend pop culture and personal humor.
  travel: Ricardo Jones favors spontaneous weekend road trips to the nearby state park for skateboarding trails, has visited Disneyland and the Grand Canyon with family, dreams of exploring Tokyo's Akihabara
    district for anime, but travel plans depend on parents' budget and school calendar.
  culinary: Ricardo Jones loves quick, flavor-packed meals like pepperoni pizza, cheese quesadillas, and banana-nut smoothies, can whip up a decent burrito with extra cheese, but often skips vegetables
    and occasionally binge-eats sugary cereal while gaming.
  core: Ricardo Jones blends a fierce competitive edge in video games with a love for spontaneous skateboarding, yet constantly battles a chronic messiness that leaves school assignments scattered across
    their room.
background:
  cultural: Ricardo is rooted in the African‑American community of Missouri City, Texas, where family gatherings, church life, and neighborhood block parties shape his daily rhythm. He celebrates traditions
    such as Juneteenth with local parades and enjoys the blend of Southern hospitality and multicultural flavors that Fort Bend County offers. Hip‑hop, R&B, and gospel music are the soundtrack of his life,
    influencing both his beat‑making hobby and his sense of identity. The strong emphasis on community resilience, respect for elders, and a love for sports—especially basketball—provide a cultural foundation
    that informs his values, aspirations, and the way he interacts with peers.
