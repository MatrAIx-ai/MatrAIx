  career_goals: Ricardo dreams of turning his love for technology and games into a career as a software developer or game designer, where he can create experiences that blend creativity with practical mechanics.
    He also imagines launching a YouTube channel that showcases his basketball drills and digital art tutorials, hoping to inspire other kids in his neighborhood. In the longer term, he wants to give back
    by mentoring younger students in a community tech club, using his curiosity and practical know‑how to help them explore STEM fields.
