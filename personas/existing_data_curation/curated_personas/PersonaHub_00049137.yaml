persona_description: A historian who specializes in the study of early American and Southern history, particularly the development of the steamboat industry and its impact on commerce and migration. His
  research interests include legal challenges faced by the industry early on, the establishment and competition of independent companies, and the cultural influence of steamboats on American music. He is
  an expert on the development of flatboats and their limitations in comparison to steamboats. He is also an advocate for the revival of steamboat tourism as a new form of tourism and travel.
