  hobbies: '[''journaling'', ''mindfulness meditation'', ''reading non-fiction (productivity, psychology, urban development)'', ''puzzle solving (Sudoku, crosswords)'', ''strategy board games (Settlers
    of Catan, Ticket to Ride)'', ''running'', ''cycling'', ''cooking (following recipes)'', ''volunteering as peer mentor'', ''attending campus lectures on sustainability'']'
  career_goals: Naveed aims to complete a bachelor's degree in Business Administration with a concentration in Project Management, then secure a role as a project coordinator in a technology or public‑sector
    organization where his systematic approach can deliver reliable outcomes. Over the next five years he plans to earn the Project Management Professional (PMP) certification and advance to a senior project
    manager position, ideally overseeing community‑focused infrastructure projects in Champaign. He is motivated to integrate his commitment to social harmony by championing mental‑health awareness initiatives
    within his workplace, using his personal experience with anxiety to create supportive, structured environments for colleagues.
