    library", "Reading contemporary art and psychology books", "Weekend dance classes", "Group hiking"]'
  career_goals: She aims to complete her high school education - either through a traditional diploma or a GED - so she can enroll in a community college program in graphic design or visual communications.
    Over the next five years, Mary hopes to secure an apprenticeship with a local art studio or museum, where she can blend her artistic talent with her organizational strengths to manage exhibitions and
    community outreach programs. Ultimately, she envisions launching her own boutique design consultancy that serves small businesses in rural Pennsylvania, using her ability to generate fresh ideas and
    execute projects efficiently.
