persona_description: A pediatric optometrist who specializes in assessing and managing visual impairment in children, particularly those with inherited or congenital eye diseases, traumatic injury, or acquired
  vision loss. They are skilled in identifying appropriate visual aids and environmental modifications to support the child's independence and safety in the home and school environment. They are knowledgeable
  in low vision rehabilitation techniques and electronic magnification systems, and are able to provide customized recommendations and support to maximize a child's vision and quality of life.
