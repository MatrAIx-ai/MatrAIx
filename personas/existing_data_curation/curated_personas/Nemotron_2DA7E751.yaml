personas:
  professional: Roger Dor, a budding 6‑year‑old artist and storyteller, merges watercolor splashes with Lego constructions, and they often narrate whimsical tales to accompany each creation.
  sports: Roger Dor, a 6‑year‑old soccer enthusiast, darts across the park for tag and practices dribbling with the Little Stars Youth Soccer Club, cheering for the national Under‑17 team while they idolize
    Lionel Messi’s footwork.
  arts: Roger Dor, an imaginative painter and Lego builder, spends afternoons mixing watercolors to capture lush backyard scenes, constructs elaborate brick castles, dances to gospel tunes like Oh Happy
    Day and kids’ pop hits from Kidz Bop, and they often hum rhythmic beats on a small drum while sketching new characters.
  travel: Roger Dor, a curious traveler in the making, loves planning weekend trips with a crayon‑drawn map, has visited the local zoo and a sandy beach resort in Florida, dreams of exploring the Smithsonian
    in Washington, D.C., and they eagerly pack a small backpack with snacks, a magnifying glass, and a sketchbook for each adventure.
  culinary: Roger Dor, an enthusiastic junior chef, prefers bright, finger‑friendly foods like rainbow fruit kebabs, cheese‑filled mini quesadillas, and strawberry‑banana smoothies, often helps stir batter
    for pancakes, and they occasionally sneak extra chocolate chips into cookies despite parental reminders to balance sweets with veggies.
  core: Roger Dor, the colorful, curiosity‑driven six‑year‑old who blends art, science, and sport with a dash of messy imagination, constantly asks why and leaves a trail of crayons, Lego bricks, and half‑finished
    experiments wherever they go.
background:
  cultural: Roger grows up in Swainsboro, a small town in Emanuel County, Georgia, within a close‑knit African‑American family. His family’s roots trace back to the Southern Black tradition of church, storytelling,
    and community gatherings. Sundays are often spent at a local Baptist church where he sings in the children’s choir and listens to gospel music, which nurtures his love of rhythm and melody. Family reunions
    feature soul food, lively conversation, and the sharing of family histories, connecting him to his ancestors’ experiences. The community celebrates Juneteenth and Kwanzaa, giving him exposure to African
    heritage and pride. Local events like the county fair, high school football games, and neighborhood block parties provide opportunities for him to play with peers, learn about teamwork, and see role
    models from his own community. These cultural influences shape his values of respect, perseverance, and a strong sense of belonging.
attributes:
  skills: '[''Reading simple picture books'', ''Basic arithmetic (counting to 100, addition/subtraction)'', ''Creative drawing and painting'', ''Lego building and puzzle solving'', ''Basic tablet navigation
    for educational apps'', ''Responsibility for tidying up toys'', ''Cooperative play and sharing'', ''Clear verbal expression'']'
  hobbies: '[''Drawing and painting'', ''Lego building'', ''Reading picture books'', ''Exploring nature and insects'', ''Playing soccer and tag'', ''Listening to music and dancing'', ''Singing along to
    songs'', ''Simple science experiments'', ''Jigsaw puzzles'', ''Storytelling and imagination games'']'
  career_goals: Roger imagines a future where he can explore the world with curiosity. He dreams of becoming an astronaut who can travel to space and paint the stars, a scientist who discovers new ways
    to understand nature, and an artist who brings his vibrant imagination to life on canvas. He also expresses an interest in helping animals as a veterinarian and sharing his love of learning as a teacher,
    reflecting his desire to combine creativity, exploration, and service to others.
