  career_goals: Michael aspires to become a professional who can merge creativity with practical problem-solving. He is fascinated by architecture and hopes to design buildings that are both functional
    and artistic, perhaps incorporating sustainable materials. He also imagines working with technology to create interactive museum exhibits that inspire other young minds. In the long term, he sees himself
    studying at a university that offers strong programs in design, engineering, and the arts, and eventually contributing to projects that improve his community.
