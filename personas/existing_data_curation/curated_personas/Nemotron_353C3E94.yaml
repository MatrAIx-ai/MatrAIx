  career_goals: Although retired from formal employment, Mohamad aims to remain an active contributor to his community. He hopes to expand his volunteer work at the local senior center by mentoring new
    volunteers and leading workshops on basic home‑maintenance skills. He also plans to complete a written memoir that weaves together his personal history with the story of Marianna and the surrounding
    county, preserving local memories for future generations. Finally, he wishes to stay physically and mentally fit by learning a short online course on digital archiving, enabling him to help the local
    historical society digitize old photographs and documents.
