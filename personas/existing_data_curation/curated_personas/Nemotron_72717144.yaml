  hobbies: '[''Visiting Art Galleries'', ''Sketching'', ''Reading Contemporary Fiction and Non-fiction'', ''Yoga and Mindfulness Meditation'', ''Cooking Venezuelan Cuisine'', ''Salsa Dancing'', ''Walking
    on Miami Beach'', ''Photography'', ''Volunteering at Immigrant Support Organizations'']'
  career_goals: Ernestina aims to formalize her education by completing a GED and pursuing an associate degree in Business Administration, positioning herself for promotion to Regional Sales Manager within
    the next three years. She envisions building a supportive network for other women in sales, eventually transitioning into a corporate training role where she can design mentorship programs. Parallel
    to her corporate ambitions, she dreams of opening a small community art space in Miami that showcases emerging Latino artists and offers workshops, merging her love for art with community empowerment.
    Her career plan is anchored by clear milestones, regular self‑assessment, and a proactive approach to professional development.
