  career_goals: George aims to consistently exceed his sales quotas and earn recognition as a top performer within his company. In the next two years, he plans to advance to a senior sales role where he
    can manage larger accounts and mentor junior reps. Over the next five years, his goal is to become a sales manager, leading a small team and shaping regional sales strategy. To support this progression,
    he intends to supplement his associate’s degree with a bachelor’s in business administration, obtain certifications such as the Certified Professional Sales Leader (CPSL), and deepen his knowledge of
    supply‑chain management. Long‑term, George envisions moving into a regional director position or launching his own distribution venture that leverages his industry experience and professional network.
    Throughout his career trajectory, he prioritizes developing stress‑management techniques—like mindfulness practice and regular exercise—to sustain high performance in the high‑pressure sales environment.
