    hikes"]'
  career_goals: Driven by her desire to help others and create a stable, predictable environment, Sara aims to obtain her GED within the next two years and then enroll in a community college program focused
    on mental health counseling or nursing. She aspires to work in a supportive role—such as a school counselor aide, community health worker, or psychiatric technician—where she can apply her natural compassion
    and structured approach to assist individuals coping with anxiety and emotional distress. Long‑term, she envisions advancing her qualifications to become a licensed mental health counselor, allowing
    her to design and implement programs that foster emotional well‑being among teens in her hometown.
