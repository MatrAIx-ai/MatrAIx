personas:
  professional: Monica Leblanc is an information security analyst who excels at vulnerability assessments, penetration testing, SIEM monitoring with Splunk and QRadar, and scripting automation in Python
    and PowerShell, while their preference for structure blends with a relaxed approach to deadlines, allowing them to adapt quickly to emerging threats and translate technical concepts into clear guidance
    for non‑technical stakeholders.
  sports: Monica Leblanc enjoys hiking the trails of Codorus State Park, practices yoga twice a week, belongs to the Lancaster Trails hiking club, and follows the Philadelphia Eagles and Pittsburgh Penguins,
    cheering them on during the NFL and NHL seasons while also participating in local 5K charity runs.
  arts: Monica Leblanc immerses themselves in indie folk music from Bon Iver and Sufjan Stevens, devours contemporary novels like 'Klara and the Sun' and 'The Midnight Library,' captures nature photography
    on weekend hikes, and frequents Philadelphia gallery openings featuring emerging local artists.
  travel: Monica Leblanc prefers spontaneous weekend road trips, planning loosely with Google Maps, has explored New York City, Washington D.C., Shenandoah National Park, and dreams of seeing the northern
    lights in Iceland while balancing limited vacation days with their commitment to family gatherings.
  culinary: Monica Leblanc experiments with sous‑vide salmon, homemade kimchi, and ramen broth, whips up mushroom risotto and shakshuka for board‑game nights, sources heirloom tomatoes and fresh basil from
    farmer's markets, and enjoys crafting latte art while still relying on take‑out pizza when time runs short.
  core: Monica Leblanc balances a methodical security career with a love for impromptu hiking, board‑game hosting, budget‑savvy yet occasional splurges, health‑conscious routines, and a friendly, cooperative
    spirit that often masks a tendency to procrastinate on personal organization.
background:
  cultural: Monica grew up in a middle‑class family in Mechanicsburg, PA, where her French‑Canadian heritage—hinted at by her surname Leblanc—has contributed to a subtle appreciation for bilingualism and
    cultural traditions. Raised in a community that blends Pennsylvania Dutch and broader Appalachian influences, she partook in local festivals, church gatherings, and seasonal family celebrations. Her
    upbringing emphasized community involvement, cooperation, and modesty, which align with her considerate and harmonious personality. The region’s mix of suburban convenience and access to natural spaces
    has fostered her love for outdoor activities and community service.
attributes:
  skills: '["vulnerability assessment", "penetration testing", "risk analysis", "security monitoring (SIEM)", "incident response", "firewall configuration", "network segmentation", "NIST/ISO 27001 compliance",
    "Python scripting", "PowerShell scripting", "secure code review", "security awareness training", "cross‑functional communication"]'
  hobbies: '["hiking", "nature photography", "board games", "cooking", "volunteering at animal shelter", "yoga", "reading contemporary fiction", "following technology blogs"]'
  career_goals: Monica aims to progress to a senior security analyst role within the next three years, leveraging her practical experience to lead larger security projects. She plans to earn CISSP and CISM
    certifications and eventually specialize in cloud security architecture for AWS and Azure environments. Long‑term, Monica aspires to become a security architect who integrates security into business
    processes, mentor junior analysts, and potentially pursue a master's degree in cybersecurity to deepen her strategic expertise. She envisions herself shaping a culture of security awareness and resilience
    across her organization while maintaining a balanced, people‑focused leadership style.
