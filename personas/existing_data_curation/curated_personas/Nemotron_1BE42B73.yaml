    cost control'', ''Continuous improvement methodologies'', ''Risk assessment and mitigation'', ''Cross‑functional collaboration'']'
  hobbies: '[''Rotary Club involvement'', ''Hosting Mexican culinary gatherings'', ''Volunteering at cultural festivals (Día de los Muertos, Cinco de Mayo)'', ''Hiking in local parks'', ''Gardening'', ''Playing
    acoustic guitar'', ''Weekly chess matches at senior center'', ''Reading industrial biographies'', ''DIY woodworking'', ''Mentoring young engineers'']'
  career_goals: As he approaches retirement, Fernando aims to secure a smooth transition of operational leadership while leaving a lasting legacy of efficiency and safety. He plans to establish a mentorship
    program within his plant and partner with the local community college to teach industrial engineering fundamentals to emerging talent. Fernando is also passionate about steering his facility toward
    greener practices, targeting a 20% reduction in material waste and energy use through sustainable process redesign. Ultimately, he envisions serving as an industry consultant and advisory board member
    for regional manufacturing associations, sharing his competitive edge and calm resilience to help other companies achieve operational excellence.
