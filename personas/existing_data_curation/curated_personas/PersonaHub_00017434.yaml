persona_description: A conservationist working for the Woodland Park Zoo in Seattle, USA. Lisa Dabek has dedicated her career to the protection of rare animals and their habitats, particularly tree kangaroos.
  She has worked with local communities in Papua New Guinea to establish the YUS Conservation Area, which covers 187,000 acres and aims to lock away 13 million tons of carbon. Dabek's work is part of a
  larger effort to protect the remote eastern Huon Peninsula and its biodiversity, including the endangered Matschie's tree kangaroo. She has collaborated with Conservation International and National Geographic
  to develop a community program to protect the forests and has pledged to set the rules for the conservation area in return for aid for education, health, and alternative livelihoods.
