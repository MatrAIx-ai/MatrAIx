  hobbies: '[''DIY woodworking'', ''Fishing'', ''Gardening'', ''Cooking Mexican cuisine'', ''Church choir participation'', ''Attending community festivals'', ''Watching sustainable building documentaries'',
    ''Reading Spanish‑language news'']'
  career_goals: Pedro aims to move from laborer to foreman within the next few years, pursuing OSHA 30‑hour safety certification and a journeyman carpenter credential. He wants to lead crews with a focus
    on safety, harmony, and skill development, mentoring younger workers while reducing the stress of unpredictable tasks. In the longer term, he hopes to launch a small subcontracting business that offers
    affordable, high‑quality renovations for homeowners in Bartow, leveraging his practical knowledge and community connections. He also plans to complete a GED or take community‑college courses in construction
    management to strengthen his qualifications.
