personas:
  professional: A seasoned construction specialist, Pedro brings over three decades of expertise in concrete finishing, framing, and blueprint interpretation, and leverages their bilingual communication
    and safety‑first mindset to mentor crews while balancing curiosity about sustainable materials with a pragmatic focus on timely, quality work.
  sports: Pedro enjoys weekend fishing at Lake Eloise, follows the Tampa Bay Buccaneers and Orlando Magic with fervor, participates in a local senior softball league during spring, and they integrate daily
    morning walks with a light resistance‑band routine to stay fit despite a busy construction schedule.
  arts: Pedro finds solace in singing hymns with the church choir, dancing to traditional mariachi tunes at community festivals, and listening to the soulful guitar work of Carlos Santana and the storytelling
    lyrics of Juan Gabriel, which shape their appreciation for music and cultural storytelling.
  travel: Pedro favors road trips to historic towns like St. Augustine and family reunions in the Southwest, meticulously plans itineraries around affordable motels and scenic routes, but they dream of
    exploring the ancient ruins of Oaxaca and the vineyards of Napa Valley when finances allow.
  culinary: Pedro is a skilled home cook who expertly prepares tamales, pozole, and fresh salsa using heirloom chiles and homestyle masa, enjoys grilling locally caught grouper with a citrus‑avocado glaze,
    and they value communal meals that blend traditional family recipes with fresh Floridian ingredients.
  core: Pedro is a diligent, family‑oriented builder who balances a love for sustainable construction with a penchant for cooking elaborate Mexican dishes, while they wrestle with chronic back pain and
    a cautious, sometimes overly analytical, approach to money.
background:
  cultural: Pedro was born to Mexican parents who immigrated to the United States when he was a child. He grew up speaking Spanish at home and maintaining many Mexican customs, from celebrating Día de los
    Muertos to preparing family recipes that have been passed down through generations. The strong emphasis on family, community, and hard work shaped his values and his cooperative nature. Living in Bartow,
    Florida, he has blended his heritage with Southern American influences, taking part in local church activities and community events while preserving his Mexican identity through language, music, and
    cuisine.
attributes:
  skills: '[''Concrete mixing and finishing'', ''Framing and carpentry'', ''Operating power tools'', ''Reading construction blueprints'', ''Site safety compliance'', ''Bilingual communication (Spanish/English)'',
