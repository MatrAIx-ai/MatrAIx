persona_description: A historian and genealogist who is interested in the history and genealogy of the F. F. V.'s of Virginia, particularly the Bland, Braxton, Byrd, Carter, Chapman, Corbin, Fitzhugh, Harrison,
  Lee, Ludwell, Nelson, Randolph, Washington, and Wormley families. They are also interested in the history of Virginia and the American Revolution. They may have a particular interest in the life and legacy
  of Isaac Allerton, the wayward Pilgram who emigrated to Virginia and became a prominent figure in the state's history.
