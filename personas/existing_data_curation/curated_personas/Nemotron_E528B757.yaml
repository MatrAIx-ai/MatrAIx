    shelters"]'
  career_goals: Geni aims to advance from her current driver‑sales role to a senior logistics coordinator or fleet manager position within the next five years, leveraging her expertise in both operations
    and client relations. She plans to obtain a commercial driver’s license with hazardous‑materials endorsement and pursue a certified supply‑chain management credential. Ultimately, she aspires to lead
    a team that implements eco‑friendly practices, such as integrating electric trucks, and may one day launch her own boutique logistics service focused on reliable, community‑oriented freight solutions.
