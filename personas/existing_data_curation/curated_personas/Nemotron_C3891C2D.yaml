personas:
  professional: Armando Flores is a psychiatric technician who leverages their keen imagination, bilingual fluency, and natural charisma to design and lead creative therapeutic art and music sessions while
    excelling in patient assessment, crisis de‑escalation, and meticulous documentation, paving the way toward a future as a licensed art therapist and community mental‑health program director.
  sports: Armando Flores enjoys hiking the Ouachita foothills with the local Outdoor Adventure Club, cheers on the Arkansas Razorbacks basketball team, participates in a weekend amateur salsa‑dance fitness
    class, and occasionally joins a community softball league that meets at the county park.
  arts: Armando Flores spends evenings painting vibrant murals inspired by Frida Kahlo and Diego Rivera, strums acoustic versions of Carlos Santana and Los Lobos songs on guitar, and loses themselves in
    the worlds of Octavia Butler and J.R.R. Tolkien, while also attending improv theater workshops led by local performers such as Amy Harper.
  travel: Armando Flores prefers road‑trip adventures that blend nature and culture, having hiked the Scottish Highlands, explored the historic streets of Guanajuato for mural inspiration, and taken a weekend
    getaway to New Mexico’s Santa Fe to attend a folk‑art festival, all while planning future visits to the vibrant street‑art districts of Medellín.
  culinary: Armando Flores loves cooking traditional dishes like chilaquiles with green salsa, homemade mole poblano, and sweet tamales, often experimenting with fresh corn, cacao, and ancho chilies, and
    they relish the occasional taco night where they pair the meals with homemade salsa verde and a side of grilled elote.
  core: Armando Flores blends a vivid artistic soul with a compassionate clinical mind, juggling a love for murals, guitar, and salsa dancing while habitually over‑booking community events and indulging
    in impulsive art‑supply splurges.
background:
  cultural: Armando was raised in a Mexican-American household where family gatherings, music, and traditional cuisine were central to daily life. He celebrates Día de los Muertos and other Mexican holidays,
    and he incorporates bilingual communication and cultural values of respect and community into his work. Living in Kiefer, Oklahoma, he blends his heritage with the local Midwest culture, fostering connections
    across diverse groups and serving as a bridge between Mexican-American families and regional mental-health resources.
attributes:
  skills: '[''Patient assessment'', ''Crisis de-escalation'', ''Therapeutic communication'', ''Medication administration'', ''Electronic health record documentation'', ''Bilingual Spanish-English communication'',
    ''Art therapy facilitation'', ''Music and improvisational activity leadership'', ''Community outreach coordination'', ''Public speaking'', ''Team collaboration'', ''Cultural competency'']'
  hobbies: '[''Painting'', ''Playing acoustic guitar'', ''Salsa dancing'', ''Cooking Mexican dishes'', ''Reading science-fiction and fantasy'', ''Hiking'', ''Nature photography'', ''Volunteering at mental-health
    outreach events'', ''Improvisational theater'', ''Gardening'']'
  career_goals: Armando aims to advance his career by completing an associate degree in mental health counseling and eventually becoming a licensed counselor or art therapist. He hopes to develop a community-based
    mental-health program in Creek County that integrates creative arts, culturally informed practices, and peer support. Long-term, he envisions taking on a supervisory role where he can mentor new technicians,
    influence policy on patient-centered care, and expand outreach to underserved Mexican-American families in the region.
