personas:
  professional: Malori Miller, a veteran construction equipment operator with over three decades of excavator, bulldozer, and skid‑steer expertise, channels their practical curiosity and spontaneous leadership
    into clear crew communication, safety advocacy, and on‑the‑fly problem solving, preparing them for a foreman or equipment‑manager role.
  sports: Malori Miller fuels their competitive spirit on the Easley Softball League’s Thursday night games and rallies at Greenville Drive minor‑league baseball while cheering the Carolina Panthers on
    Sundays, and they lace up hiking boots for seasonal treks in the Blue Ridge foothills, treating each climb as a personal cross‑training session.
  arts: Malori Miller finds creative release in line‑dancing to Dolly Parton and Luke Bryan at the church hall, swapping stories over classic country vinyls while occasionally attending the Pickens County
    fair’s bluegrass stage headlined by The Avett Brothers, and they keep a battered notebook of DIY project sketches inspired by folk‑art motifs.
  travel: Malori Miller prefers spontaneous road‑trip getaways in their vintage pickup, charting routes through Asheville’s mountain trails and Charleston’s historic streets, while long‑term dreams include
    a weekend drive to the Great Smoky Mountains and an occasional Mardi Gras escapade in New Orleans, balancing budget constraints with a love for on‑the‑fly discovery.
  culinary: Malori Miller enjoys mastering Southern barbecue, slow‑smoking pork shoulder with a coffee‑infused rub and hickory chips, pairing it with garden‑fresh collard greens cooked with smoked turkey,
    and they treat each potluck as a tasting lab for perfecting peach cobbler and homemade biscuits, though occasional over‑salting reveals a need for more precise seasoning.
  core: Malori Miller, a 54‑year‑old equipment veteran who swaps construction sites for backyard grills, blends spontaneous road‑tripping with an unshakable work ethic, yet habitually misplaces the wrench
    they just used and juggles deadlines like an extra‑inning softball game.
background:
  cultural: Malori grew up in a modest, working‑class family in the Upstate region of South Carolina, where Southern hospitality, church involvement, and community loyalty are core values. Her upbringing
    emphasized self‑reliance, respect for tradition, and a love for the outdoors. She identifies strongly with the cultural fabric of Easley—participating in local church events, high‑school sports traditions,
    and regional celebrations like the county fair. While her heritage is primarily Anglo‑American, she embraces the blend of Appalachian folk music, Southern cuisine, and the close‑knit, neighbor‑helping‑neighbor
    ethos that characterizes Pickens County.
attributes:
  skills: '[''Excavator operation'', ''Bulldozer operation'', ''Skid‑steer loader operation'', ''Backhoe operation'', ''Equipment maintenance'', ''Basic mechanical troubleshooting'', ''Site safety compliance'',
