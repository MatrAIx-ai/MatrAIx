    tool management'']'
  hobbies: '[''Community softball league'', ''Country line dancing'', ''Gardening (vegetables and herbs)'', ''Hiking local trails'', ''Volunteer work at church food pantry'', ''Hosting potluck gatherings'',
    ''DIY home improvement projects'', ''Barbecue cooking and recipe experimentation'', ''Reading practical how‑to books'', ''Attending Pickens County fair and festivals'']'
  career_goals: Malori aims to transition into a supervisory role, such as foreman or equipment manager, where she can mentor younger operators and shape safety practices for her crew. She plans to obtain
    NCCER certification and complete a commercial driver’s license (CDL) to broaden the range of equipment she can operate. Over the next few years, she hopes to earn her high‑school equivalency diploma,
    positioning herself for potential part‑time instruction at a local trade school. Ultimately, Malori envisions starting a small equipment‑rental venture with her husband, leveraging her expertise and
    community connections to serve local contractors while maintaining a stable work‑life balance.
