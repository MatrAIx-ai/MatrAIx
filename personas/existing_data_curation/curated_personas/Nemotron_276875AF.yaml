personas:
  professional: Ellen Willis, a retired community organizer turned historic preservation steward, channels her meticulous record‑keeping, budgeting expertise, and competitive drive into leading archival
    projects for Port Townsend, while mentoring junior society members with a structured, sometimes skeptical, but consistently reliable approach.
  sports: Ellen Willis, a devoted member of the Port Townsend Walking Club and occasional participant in senior tai‑chi sessions, follows the Seattle Mariners baseball season religiously, keeps a spirited
    rivalry with her neighbor over the Seattle Seahawks football games, and spends crisp spring mornings bird‑watching along the Sound, treating each outing as low‑impact exercise.
  arts: Ellen Willis, an avid knitter who reveres patterns from Ravel Yarns, finds solace in reading historical biographies by Doris Kearns Goodwin, enjoys the maritime paintings of Winslow Homer displayed
    at the Olympia Art Museum, and attends quarterly performances of the Port Townsend Symphony featuring Beethoven’s Ninth, weaving these cultural threads into her own scrapbook legacy.
  travel: Ellen Willis prefers meticulously planned road trips that balance heritage exploration with comfortable pacing, having charted pilgrimages to the historic waterfront of Victoria, BC, the San Juan
    Islands’ lighthouse tours, and a nostalgic visit to Savannah’s antebellum districts, yet she hesitates to venture far beyond the Pacific Northwest without a detailed itinerary and backup accommodations.
  culinary: Ellen Willis, a competent home cook, delights in preparing pan‑seared Dungeness crab with a butter‑lemon‑garlic glaze, cooks rustic mushroom‑and‑lavender risotto using herbs harvested from her
    garden, and pairs meals with locally sourced pinot noir, while occasionally succumbing to a comforting slice of pumpkin pie during holiday gatherings.
  core: Ellen Willis is a detail‑obsessed archivist‑gardener who channels lifelong caution and competitive spirit into preserving Port Townsend’s past, even as she battles chronic worries that keep her
    meticulously organized but occasionally restless.
background:
  cultural: Ellen grew up in a mid‑western white American family that relocated to the Pacific Northwest during the 1950s. Her upbringing emphasized self‑reliance, community service, and respect for the
    natural environment of the Puget Sound region. She embodies the small‑town values of Port Townsend—practicality, modesty, and a strong sense of local heritage—while also maintaining the work‑ethic and
    structured approach typical of her generation. Her cultural outlook blends traditional American middle‑class values with a deep appreciation for the maritime and historic character of her coastal community.
