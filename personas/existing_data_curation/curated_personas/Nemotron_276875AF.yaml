  career_goals: Although Ellen is retired, she aims to continue contributing to her community by leading historic preservation initiatives in Port Townsend, mentoring junior members of the local historical
    society, and creating a structured legacy scrapbook documenting family and town history. She aspires to maintain her mental acuity through ongoing learning, such as completing an online certificate
    in archival studies, and to foster intergenerational connections through organized workshops.
