  career_goals: Gerald aims to achieve Fellowship status with the Society of Actuaries within the next two years and subsequently transition into a senior leadership role such as Chief Actuarial Officer.
    He is driven to spearhead the development of innovative insurance products that blend rigorous quantitative methods with emerging market trends. Gerald also aspires to become a frequent speaker at industry
    conferences and to mentor the next generation of actuaries, leveraging his charisma to shape thought leadership in the actuarial community while maintaining a balanced family life.
