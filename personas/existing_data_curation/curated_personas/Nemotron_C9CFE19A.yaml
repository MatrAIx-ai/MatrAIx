  career_goals: Yinet aims to leverage her decades of field experience to advance into a supervisory or managerial role within the United States Postal Service, such as a shift supervisor or postmaster
    for her Queens district. She plans to complete a USPS Leadership Development program and obtain a GED to qualify for higher-responsibility positions. Over the next five years, she hopes to mentor new
    carriers, improve route efficiency through data-driven methods, and ultimately achieve a stable, well-compensated position that allows her to retire with financial security while still having time to
    pursue her artistic interests.
