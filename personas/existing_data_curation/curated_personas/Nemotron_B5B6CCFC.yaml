personas:
  professional: Donald Rich is a seasoned property maintenance veteran who leverages four decades of HVAC, plumbing, electrical, and carpentry expertise to mentor junior technicians, consult on green retrofits
    for senior housing, and author a forthcoming guidebook, all while balancing their curiosity for renewable energy with a methodical, responsible work ethic.
  sports: Donald Rich maintains fitness through daily shoreline walks with the Scituate Shoreline Walkers club, a weekly senior yoga session at the community center, and enthusiastic support of the Boston
    Red Sox, Boston Celtics, and New England Patriots during the respective seasons, which they consider a balanced mix of community and recreation.
  arts: Donald Rich channels creative energy into playing harmonica to folk legends like Bob Dylan, Joan Baez, and Woody Guthrie while restoring vintage hand tools, and regularly attends maritime heritage
    talks hosted by the local historical society, enriching their appreciation for craftsmanship and storytelling.
  travel: Donald Rich prefers low‑stress, heritage‑focused trips such as weekend visits to Mystic, Connecticut, lighthouse tours of Cape Cod, and a long‑standing desire to explore Dublin’s maritime museums,
    planning each journey with meticulous itineraries that balance curiosity and comfort, which they find soothing.
  culinary: Donald Rich enjoys preparing herb‑infused meals like rosemary‑roasted chicken, thyme and basil pesto, and garden vegetable stew, demonstrating an intermediate cooking skill that blends practicality
    with a love for fresh, locally‑grown ingredients, which they often share with neighbors.
  core: Donald Rich blends meticulous handyman expertise with a restless, anxiety‑prone mind, calming themselves through meditation while they obsessively hunt for the perfect vintage tool to restore.
background:
  cultural: Donald grew up in a working‑class White family in coastal New England, with deep roots in the early Anglo‑American settlement of Massachusetts. The community emphasized self‑reliance, craftsmanship,
    and civic responsibility, values that shaped his practical outlook. Scituate's maritime heritage and close‑knit neighborhood culture fostered a sense of collective wellbeing; local events, town meetings,
    and volunteer fire‑department activities were regular fixtures in his life. Though he never married, his family and neighbors formed a supportive social network that reinforced his cooperative and kind
    nature. He identifies with the modest, egalitarian ethos of Massachusetts, appreciating both individual initiative and communal harmony. His cultural experience blends traditional New England stoicism
    with an openness to progressive ideas, reflecting the balance of curiosity and practicality in his personality.
