  career_goals: Donald is focused on transitioning his expertise into a mentorship and consulting role as he approaches retirement. He aims to obtain an EPA certification for handling refrigerants and a
    recognized renewable‑energy installer credential, enabling him to advise small businesses on green retrofits. He hopes to start a part‑time independent maintenance consultancy, offering tailored services
    to local senior housing and historic properties. He also wants to volunteer as a maintenance advisor for the Scituate community center, sharing his hands‑on knowledge with volunteers. In the longer
    term, he would like to author a practical guidebook on affordable home upkeep for older adults, combining his curiosity for new methods with his pragmatic experience. Maintaining financial stability
    for a comfortable retirement and preserving his physical health through regular activity are also central goals.
