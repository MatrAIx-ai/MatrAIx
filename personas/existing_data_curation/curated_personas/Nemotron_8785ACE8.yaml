  career_goals: Preston aims to earn his GED within the next year and then enroll in a trade program that blends his hands‑on mechanical aptitude with his interest in community interaction, such as automotive
    technology or agricultural equipment maintenance. In the short term, he hopes to secure a part‑time position at the local feed store to gain work experience and steady income. Long‑term, he envisions
    running his own small repair shop that serves ranchers and hobbyists while also leveraging his social‑media skills to promote the business and share rural lifestyle content, eventually turning his online
    presence into a supplemental revenue stream.
