  hobbies: '[''Hunting and fishing'', ''Horseback riding'', ''Camping and hiking'', ''Playing guitar'', ''Creating TikTok videos'', ''Skateboarding'', ''Video gaming (Fortnite, Minecraft)'', ''Drone photography'',
