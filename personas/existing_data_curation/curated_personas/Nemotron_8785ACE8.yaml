personas:
  professional: Preston Salem is a 16-year-old aspiring automotive and agricultural equipment technician who blends their talent for hands-on repairs, natural charisma, and love for community storytelling
    to lead small projects at the local feed store while captivating peers with on-the-spot demos.
  sports: Preston Salem stays active by riding horses for the Lusk High School rodeo team, skateboarding at the county park on Saturdays, hunting trips in the summer, and cheering loudly for the Denver
    Broncos and the Wyoming Cowboys while occasionally joining the local equestrian club for trail rides.
  arts: Preston Salem channels their creative energy by strumming acoustic covers of Johnny Cash and Garth Brooks on guitar, filming TikTok skits that lampoon small-town life, and devouring graphic novels
    such as Saga and The Walking Dead for visual storytelling inspiration.
  travel: Preston Salem prefers spontaneous, budget-friendly road trips that blend camping under starry skies with a love for Western vistas, having explored Yellowstone, the Badlands, and a weekend getaway
    to Jackson Hole, and they dream of a cross-country ride to Alaska once they save enough from their part-time job.
  culinary: Preston Salem enjoys hearty, rustic fare such as campfire-grilled ribeye steak with peppercorn butter, bison chili simmered with beans, jalapeños, and smoked paprika, and classic s'mores made
    with marshmallows, graham crackers, and dark chocolate, while their modest cooking skills keep them comfortable whipping up quick skillet mac & cheese after a long day.
  core: Preston Salem is a talkative, risk-loving teen who juggles a love for rugged ranch life and viral TikTok fame, yet constantly battles worry-induced over-thinking and the occasional impulse-driven
    splurge.
background:
  cultural: Preston grew up in Lusk, Wyoming, a tight‑knit rural community where ranching, farming, and a strong connection to the land shape daily life. His family’s roots trace back to early settlers
    of the Great Plains, and the local culture emphasizes self‑reliance, neighborly cooperation, and appreciation for outdoor pursuits. Community gatherings such as the Niobrara County Fair, local rodeos,
    and high school sports are central to the town’s identity. While the population is predominantly white and Protestant, the values of hard work, hospitality, and a respect for the Western heritage are
    central to Preston’s upbringing.
