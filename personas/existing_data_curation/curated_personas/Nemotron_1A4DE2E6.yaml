  career_goals: Konrad aims to enroll in a community college or university program in computer science or electrical engineering within the next two years. He plans to acquire industry certifications such
    as CompTIA A+ and Cisco CCNA to strengthen his employability. His long-term ambition is to work as a software developer or systems engineer where he can design practical solutions that merge his curiosity
    for new technologies with his preference for reliable, well-structured approaches. He also envisions eventually starting a small tech-focused freelance business, allowing him to work independently while
    taking on competitive challenges that push his skill set.
