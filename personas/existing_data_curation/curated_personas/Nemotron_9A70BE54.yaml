  career_goals: Charlie aspires to become a multimedia artist who blends visual storytelling with interactive technology. He hopes to study graphic design and computer science in high school, eventually
    working as a concept artist or game developer who creates immersive worlds that challenge conventional narratives. He also aims to compete in state‑level coding contests and earn recognition for innovative
    digital projects that combine art and code.
