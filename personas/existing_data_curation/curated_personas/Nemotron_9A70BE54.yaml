personas:
  professional: A budding concept artist named Charlie Robinson blends street‑level sketching with a curiosity for game mechanics, using free‑hand drawings of Kissimmee’s downtown to prototype environments
    for Minecraft and Fortnite while honing digital illustration skills in after‑school workshops.
  sports: An enthusiastic basketball player named Charlie Robinson spends Saturday mornings shooting hoops at the Kissimmee Community Center, plays on the local youth league team the Kissimmee Knights,
    and roots for the Orlando Magic and Orlando City SC while also dabbling in swimming at the municipal pool.
  arts: An avid visual creator named Charlie Robinson frequents the annual Kissimmee Art Walk, draws inspiration from muralist CoCo Lacy, listens to Kendrick Lamar and Miles Davis while sketching, and admires
    the street art of Banksy, treating each piece as a dialogue between jazz improvisation and hip‑hop rhythm.
  travel: A curious explorer named Charlie Robinson enjoys weekend trips to Orlando’s theme parks and the Gulf Coast’s Clearwater Beach, dreams of visiting New York City’s Museum of Modern Art and the historic
    streets of Savannah, and plans trips around school breaks, often mapping itineraries on Google Maps while balancing parental budgeting concerns.
  culinary: A budding food enthusiast named Charlie Robinson loves the comfort of fried chicken with collard greens, experiments with homemade mac and cheese using a blend of sharp cheddar and pepper jack,
    and enjoys snapping photos of mango‑studded smoothie bowls with chia seeds, while occasionally sneaking extra hot Cheetos into their lunchbox.
  core: Charlie Robinson is a quietly competitive teen who channels curiosity into sketching cityscapes, masters gaming strategies, saves half of every allowance, and can’t resist the midnight snack of
    extra‑spicy chips.
background:
  cultural: Charlie is a Black youth raised in Kissimmee, Florida, where Southern African‑American traditions intersect with a vibrant multicultural community. He grew up attending church services featuring
    gospel music, while his family also celebrates Juneteenth and other events honoring African‑American history. The local art scene—mural projects, community festivals, and youth workshops—has nurtured
    his love for visual expression. At home, storytelling from older relatives and exposure to both Southern cuisine and the diverse flavors of Central Florida have shaped his identity, giving him a strong
    sense of heritage while encouraging openness to new ideas.
