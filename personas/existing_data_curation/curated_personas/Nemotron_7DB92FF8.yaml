  career_goals: Milvia aims to advance from front‑line cashier to a supervisory or assistant manager position within the next three years, leveraging her organizational strengths and people‑focused approach.
    She plans to earn her GED and enroll in a community‑college business administration program to gain formal credentials. Long‑term, she envisions opening a small convenience store that emphasizes community
    outreach, providing affordable essentials and a welcoming space for fellow immigrants and local families. She also hopes to mentor other single‑parent or divorced workers, helping them navigate stable
    employment paths.
