persona_description: A scientist and leader in the field of chemistry, particularly in the areas of medicinal chemistry, macromolecular structure, and protein engineering. She has a track record of supporting
  high-risk, high-reward science through the launch of the Sarafan ChEM-H Knowledge Centers, which have supported 112 researchers across campus, fostered 103 collaborations, resulted in 53 published research
  papers, led to the filing of eight patents, and helped launch three startups outside Stanford. She is known for her commitment to advancing diversity in science and has a special focus on recruiting students
  from different backgrounds, with more than 50 faculty from 20 departments serving as mentors to graduate students in the Chemistry/Biology Interface (CBI) training program, which is an interdisciplinary
  approach that encourages novel collaborations beyond a student's initial area of research. She is also the acting dean of research at Stanford and the Frank Lee and Carol Hall Professor.
