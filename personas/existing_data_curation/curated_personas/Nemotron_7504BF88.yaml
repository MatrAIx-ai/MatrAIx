  career_goals: Sang Ian Ha dreams of a future where he can both explore new ideas and create useful solutions. He often talks about becoming an astronaut who discovers new worlds, a scientist who builds
    robots that help people, or a veterinarian who cares for animals. These ambitions blend his curiosity about space and nature with a practical desire to help others. He also expresses interest in becoming
    a teacher, sharing knowledge with younger children, reflecting his cooperative and supportive nature.
