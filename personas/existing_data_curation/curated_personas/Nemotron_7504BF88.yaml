personas:
  professional: Sang Ha, a precocious preschooler who loves building elaborate LEGO structures, combines meticulous following of instruction manuals with spontaneous redesigns, showing early engineering
    curiosity and a balanced practical‑creative mindset, and they often ask why? before starting a new project.
  sports: Sang Ha, an eager member of the Bothell Youth Soccer Club, cheers for the Seattle Sounders FC and the Seattle Mariners, practices dribbling with a mini‑ball after school, enjoys riding a scooter
    on weekends, occasionally skips the warm‑up stretches before games, and they love shouting go team! from the sidelines.
  arts: Sang Ha, a budding doodler who paints bright mandu‑shaped characters aka dumpling heroes, listens to upbeat pop tracks from kid‑friendly artists like KIDZ BOP and watches traditional dance performances
    at the community center, sometimes crumples sketches in frustration before starting anew, and they often display their artwork on the refrigerator.
  travel: Sang Ha, a small‑scale explorer who delights in weekend trips to the Bellevue Botanical Garden and the Seattle Aquarium, dreams of seeing the cherry blossoms in Washington DC, prefers short museum
    stops over long car rides, occasionally protests staying in the back seat, and they keep a scrapbook of ticket stubs and leaf rubbings.
  culinary: Sang Ha, a tiny chef in training who stirs the colorful bibimbap mix, reaches for crunchy carrots and rice, loves peanut‑butter banana sandwiches, sneaks a bite of mandu when no one’s looking,
    proudly declares strawberry yogurt as a favorite snack, and they gladly help set the table after meals.
  core: Sang Ha blends early curiosity with disciplined routine, juggling playful imagination, modest savings, and family celebrations while they navigate the vibrant world of preschool life.
background:
  cultural: Sang Ian Ha comes from an East Asian (Korean) family that balances traditional Korean heritage with life in Bothell, Washington. At home, he hears both Korean and English, celebrates Chuseok
    and Lunar New Year, and enjoys Korean dishes like bibimbap and mandu alongside typical American meals. His family participates in a local Korean community center and a multicultural preschool, exposing
    him to both cultural traditions and the diverse Pacific Northwest environment. This blend of cultures nurtures his respect for family customs while encouraging the curiosity and adaptability valued
    in his community.
