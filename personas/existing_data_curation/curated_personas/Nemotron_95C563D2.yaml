  hobbies: '[''Recreational softball'', ''Group hiking'', ''Cooking classes'', ''Potluck gatherings'', ''Scrapbook crafting'', ''Reading science‑fiction'', ''Volunteering at food bank'', ''Home gardening'']'
  career_goals: Jodi aims to transition from an LPN to a Registered Nurse within the next two years by completing an RN bridge program. She aspires to specialize in pediatric primary care, motivated by
    her compassionate nature and desire to support families. Long‑term, she envisions becoming a nurse practitioner focused on community health, implementing telehealth initiatives that blend her curiosity
    for technology with practical patient care. She also hopes to mentor new nursing staff, lead workshops on stress‑resilience for healthcare workers, and spearhead a local health‑education outreach program
    for underserved populations in St. Charles County.
