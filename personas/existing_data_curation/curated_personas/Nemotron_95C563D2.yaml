personas:
  professional: Jodi Carroll, a 31‑year‑old licensed practical nurse, blends solid clinical competencies in patient assessment, IV therapy, wound care, and health informatics with a naturally compassionate
    bedside manner and a laid‑back attitude toward scheduling, making them a go‑to mentor for new staff while juggling a demanding shift roster and pursuing an RN bridge program.
  sports: Jodi Carroll enjoys playing on a local co‑ed softball league for the St. Charles County Softball Club, joins weekend group hikes with friends along the Catoctin Mountains, and cheers on the Washington
    Nationals and Washington Capitals, while also being a member of the Washington Trails Club, where they often volunteer as a trail‑maintenance helper.
  arts: Jodi Carroll devotes evenings to crafting elaborate scrapbooks, draws inspiration from the vivid worlds of sci‑fi authors like N.K. Jemisin and Andy Weir, streams Tame Impala’s psychedelic pop for
    background music, and occasionally attends performances at the Strathmore Arts Center featuring the National Symphony Orchestra, where they often sit in the balcony to absorb the acoustics.
  travel: Jodi Carroll prefers spontaneous road trips to nearby nature spots like Shenandoah National Park and the Chesapeake Bay for weekend hikes, but also dreams of an immersive sci‑fi convention in
    Seattle and a culinary pilgrimage through Oaxaca, Mexico, balancing budget‑conscious choices with occasional splurges on guided gardening tours in England, and they often pack a reusable water bottle
    and a notebook for sketching new locales.
  culinary: Jodi Carroll, an enthusiastic home chef, delights in whipping up Mediterranean‑inspired ratatouille with fresh basil and goat cheese, experiments with fermented kimchi using cabbage from their
    garden, showcases new recipes at potluck parties, while still relying on quick stir‑fry meals and pre‑made sauces when overtime leaves them too fatigued to chop, and they love pairing dishes with a
    crisp Sauvignon Blanc.
  core: Jodi Carroll’s compassionate heart, curiosity‑driven mind, and habit of juggling multiple passions often leave them delightfully disorganized and prone to late‑night worry, yet they thrive on community
    connections and spontaneous adventures.
background:
  cultural: Jodi grew up in a modest, middle‑class white family in the Midwestern heartland, where community ties, self‑reliance, and a pragmatic work ethic are deeply valued. Her upbringing in St. Charles
    County exposed her to a blend of traditional Midwestern customs—annual county fairs, local church gatherings, and strong neighborhood support networks. These cultural influences have shaped her practical
    outlook, her love for group activities, and her dedication to helping others. While she respects the region’s heritage, her STEM education and curiosity encourage her to explore diverse perspectives
    and integrate modern approaches into her everyday life.
attributes:
