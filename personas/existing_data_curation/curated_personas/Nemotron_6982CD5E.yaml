  career_goals: Looking ahead, Jose aims to build a stable, community‑focused career that honors his Mexican heritage and practical mindset. He envisions completing high school, learning bilingual skills,
    and entering a vocational program that leads to a role such as a community health worker or a small‑business owner of a family taquería. His organized and reliable traits drive him to seek a profession
