persona_description: A researcher or artist who is interested in exploring the relationship between art and science, particularly through the lens of the sketchbook as a tool of artistic enquiry. This person
  is likely to be drawn to the idea that the sketchpad can be a site for experimentation and discovery, and they are interested in understanding how the scientific model can be applied to this context.
  They may be drawn to the idea of the sketchpad as a provisional, yet unimaginable space for knowledge and creativity, and they may be interested in exploring how this might be reflected in the work of
  artists. They may also be interested in the ways in which the sketchpad can be used to explore the sensuous knowledge, slippage, searching, and resistance to resolution of drawing.
