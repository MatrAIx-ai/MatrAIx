personas:
  professional: Xao Tran is an aspiring communications student who leverages bilingual fluency, self‑taught graphic design expertise, and event‑coordination experience to craft culturally‑infused social‑media
    campaigns, and they thrive as the charismatic lead in group projects and community festivals.
  sports: Xao Tran follows the Los Angeles Lakers and LA Galaxy passionately, joins weekly pick‑up basketball games at a local park, and they unwind by skateboarding along downtown murals after a long day
    of designing.
  arts: Xao Tran immerses themselves in LA’s street‑art scene, photographing murals by artists like Banksy and Shepard Fairey for Instagram, attends indie concerts featuring Mitski and Tame Impala, and
    they play traditional drums at community festivals, blending old rhythms with modern beats.
  travel: Xao Tran prefers short, spontaneous road trips along the Pacific Coast, has already driven to Santa Barbara and San Diego, and they dream of backpacking through Bangkok and the Mekong Delta to
    capture vibrant street food markets.
  culinary: Xao Tran experiments with fusion dishes such as pho‑taco bowls and bánh mì sliders topped with avocado and sriracha mayo, using fresh cilantro, lemongrass, and locally sourced sourdough, and
    they love cooking for friends during Tet gatherings while they sometimes order sushi for convenience.
  core: Xao Tran is a curiosity‑driven, talkative 21‑year‑old who blends family culinary roots with California street culture, channels that fusion into bold graphic designs, and they keep a late‑night
    Instagram scrolling habit that often cuts into sleep.
background:
  cultural: Xao is a second-generation Vietnamese-American raised in Panorama City, a neighborhood with a dense Southeast Asian community. His parents immigrated after the Vietnam War, and he grew up bilingual,
    celebrating Tet, cooking pho and bánh mì at home, and attending Vietnamese community events. While deeply rooted in Vietnamese traditions, he also embraces the multicultural tapestry of Los Angeles,
    often blending his heritage with contemporary American arts and social scenes.
