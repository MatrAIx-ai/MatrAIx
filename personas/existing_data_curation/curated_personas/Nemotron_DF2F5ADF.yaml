  hobbies: '[''Street‑Art Exploration'', ''Urban Photography'', ''Live Music Concerts'', ''Fusion Cooking'', ''Community Cultural Festivals'', ''Traditional Vietnamese Drumming'', ''Online Multiplayer Gaming'']'
  career_goals: He aims to enroll in a bachelor’s program in Communications or Marketing within the next year, seeking internships at digital-creative agencies to apply his design and content-creation skills.
    Long-term, Xao aspires to become a creative director or community arts coordinator, launching a boutique studio that produces culturally-infused campaigns and supports local street-art initiatives in
    Los Angeles.
