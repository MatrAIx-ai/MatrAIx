  career_goals: Brittany aims to transition from working on individual jobs to leading a small crew of finishing specialists, eventually launching her own painting and paperhanging business focused on residential
    and historic‑home restoration. She plans to obtain certification in eco‑friendly painting methods and complete additional coursework in interior design to expand her service offerings. Over the next
    five years she hopes to be recognized locally for high‑quality, detail‑oriented finishes, to secure repeat clientele, and to mentor new apprentices, blending her practical skills with her creative curiosity.
