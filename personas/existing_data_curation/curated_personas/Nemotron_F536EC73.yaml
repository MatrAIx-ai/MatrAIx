personas:
  professional: Brittany Gillespie, a 36‑year‑old painter and paperhanger, blends meticulous color theory expertise with a spontaneous, people‑centric approach to leading finishing crews while juggling
    scheduling challenges.
  sports: Brittany Gillespie enjoys kayaking on the St. Johns River every Saturday, cheers for the Orlando Magic during the NBA season, and participates in a local co‑ed recreational softball league that
    meets at the community park.
  arts: Brittany Gillespie volunteers painting sets at the local community theater, immerses herself in music festivals like the Savannah Music Festival, and draws continuous inspiration from Southern gospel
    legends like Johnny Cash and contemporary muralist Maya Lin.
  travel: Brittany Gillespie prefers spontaneous road trips, having explored Savannah’s historic squares, the culinary delights of New Orleans, the coastal charm of Charleston, and the wild wetlands of
    Everglades National Park, always fitting a new adventure into a gap in her calendar.
  culinary: Brittany Gillespie delights in cooking Southern comfort staples—slow‑cooked pork shoulder, shrimp and grits, fried green tomatoes—enhanced with fresh basil, rosemary, and thyme harvested from
    her own garden, and she often experiments with low‑VOC infused marinades for an eco‑friendly twist.
  core: Brittany Gillespie is a 36‑year‑old eco‑savvy finishing specialist who swaps paint rollers for paddleboards, thrives on last‑minute plans, and battles chronic disorganization with a contagious laugh.
background:
  cultural: Brittany is a white American who grew up in the South and now lives in Green Cove Springs, Florida. Her upbringing reflects a blend of traditional Southern hospitality, a strong sense of community,
    and an appreciation for the outdoors. She celebrates regional customs such as backyard barbecues, holiday fireworks displays, and local festivals, while also being influenced by broader American cultural
    trends through media and travel. Her cultural outlook combines a respect for family and community values with an openness to new ideas, mirroring the dynamic, coastal lifestyle of Putnam County.
