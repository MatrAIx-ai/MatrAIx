persona_description: A scientist specializing in dark matter research, particularly in the use of silicon charge-coupled devices (CCDs) for detecting potential ionization signals from dark matter interactions.
  They have expertise in low-mass dark matter detectors and have published results from the DAMIC (Dark Matter in CCDs) experiment at SNOLAB, as well as from "Skipper" instrumented CCDs, which have demonstrated
  a resolution of 0.07 e-. The persona is knowledgeable about the unique spatial resolution of these devices and how it allows for effective identification and mitigation of environmental backgrounds.
