  hobbies: '["Gardening", "Book club reading", "Bridge (card game)", "Quilting", "Baking and cooking", "Church choir singing", "Volunteering at senior center", "Genealogy research", "Traveling to historic
    sites", "Listening to classic rock music"]'
  career_goals: Although retired from formal employment, Monica remains driven to make a lasting impact in her community. She aspires to lead the senior center’s volunteer program, serve on the board of
    the local non-profit food pantry, mentor younger volunteers, and compile a memoir of her community service experiences to inspire future generations. She also hopes to expand intergenerational programs
    that connect seniors with schoolchildren in Franklin.
