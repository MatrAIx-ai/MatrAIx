persona_description: A transition specialist who is responsible for planning and implementing transition services for students with disabilities, particularly focusing on the early identification and intervention
  of students with disabilities to ensure they have access to appropriate support services and opportunities. This individual is knowledgeable about the Individuals with Disabilities Act (IDEA) and its
  requirements, and is skilled in conducting assessments, developing plans, and communicating with stakeholders to ensure that students with disabilities receive the necessary support to succeed in their
  post-school activities. This persona is likely to be a teacher, special education teacher, or administrator who is responsible for planning and implementing transition services for students with disabilities,
  particularly those who may benefit from early intervention services.
