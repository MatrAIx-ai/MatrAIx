persona_description: An exploration geologist who specializes in the discovery and evaluation of skarn deposits, particularly those found in sedimentary rocks. They are skilled in identifying and interpreting
  the general zoning pattern of skarn deposits, understanding the chemistry of granite, and using geophysical methods to locate them. They have experience with magnetic surveys and are familiar with the
  common ore minerals found in skarn deposits, including magnetite, scheelite, and pyrrhotite. They are adept at recognizing and interpreting the distinctive features of skarn deposits, including fluid
  escape structures and isotopic haloes. They are also knowledgeable about the history and characteristics of skarn deposits in different parts of the world, including their abundance and distribution,
  and the major skarn deposits found in China.
