  hobbies: '[''Surfing'', ''Acoustic guitar'', ''Photography'', ''Beach clean‑ups'', ''Hiking'', ''Improvisational theater'', ''Plant‑based cooking'', ''Music festivals'', ''Social media content creation'']'
  career_goals: Betty aims to convert her sociable nature and practical curiosity into a career that blends community engagement with creative outreach. She plans to complete her associate degree in communications
    or sustainable tourism and pursue a role as a social‑media manager or community‑program coordinator for a coastal nonprofit or eco‑tourism company. In the longer term, she dreams of launching a boutique
    surf‑and‑wellness brand that promotes environmentally responsible lifestyle choices while offering workshops, events, and online content. Betty values flexibility, wants a job that keeps her connected
    with friends and the outdoors, and seeks ongoing learning opportunities that allow her to balance new ideas with proven methods.
