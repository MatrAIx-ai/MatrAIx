personas:
  professional: Betty Roberts blends beginner‑level Adobe Creative Suite abilities, strong interpersonal communication, and a natural talent for rallying volunteers to craft vibrant Instagram campaigns
    and coordinate beach‑cleanup events for a coastal nonprofit, while their spontaneous streak often leads to missed deadlines and last‑minute schedule changes.
  sports: Betty Roberts rides the waves at local breaks like Sunset Beach with their surf club, follows the San Diego Wave FC and the LA Dodgers for seasonal soccer and baseball thrills, hits the gym for
    functional fitness, but their spontaneous nature means they sometimes miss scheduled training sessions.
  arts: Betty Roberts strums acoustic renditions of Jack Johnson and Maggie Rogers around campfires, curates sunset photo essays on Instagram inspired by Chris Burkard, and hones quick‑thinking skills in
    improvisational theater workshops echoing The Second City style, though they often procrastinate on posting content.
  travel: Betty Roberts prefers spur‑of‑the‑moment surf trips to Maui, Bali, and Costa Rica, enjoys weekend hikes in the Santa Monica Mountains, and books budget hostels on a student allowance, yet they
    sometimes overlook visa requirements due to last‑minute planning.
  culinary: Betty Roberts experiments with plant‑based jackfruit tacos, cauliflower buffalo wings, and vegan sushi rolls, seasoning with nutritional yeast and coconut aminos, and proudly shares the colorful
    plates on Instagram, though they occasionally forget to defrost ingredients, leading to improvised meals.
  core: Betty Roberts is an outgoing, surf‑loving 18‑year‑old who blends spontaneous creativity with community activism, even if they occasionally miss deadlines and skip dentist appointments.
background:
  cultural: Betty grew up in a middle‑class, white family in the Central Coast region of California, absorbing the West‑Coast blend of environmental awareness, progressive social values, and a laid‑back
    beach lifestyle. Her community emphasizes outdoor recreation, sustainability, and inclusive community events, shaping her appreciation for collaborative projects and her commitment to preserving the
    coastal environment. While her heritage is broadly American, she identifies strongly with the local surf culture, the regional emphasis on ecological stewardship, and the diverse, open‑minded ethos
    of Santa Cruz County.
attributes:
  skills: '[''Interpersonal communication'', ''Event coordination'', ''Basic graphic design'', ''Social media content creation'', ''Introductory marketing'', ''Surf safety and first aid'', ''Team facilitation'',
