personas:
  professional: Lianna Storkson, a retired community arts advocate, channels their lifelong curiosity and gentle mediating style into curating traveling folk art exhibitions for senior centers while drafting
    a memoir that intertwines poetry, family recipes, and translated oral histories, all despite a spontaneous resistance to strict deadlines.
  sports: Lianna Storkson maintains fitness through daily garden walks and low‑impact yoga sessions at the senior center, and follows the Baltimore Orioles and Washington Capitals for community spirit,
    preferring solitary movement over competitive sports.
  arts: Lianna Storkson spends solitary afternoons painting flower studies inspired by O'Keeffe, weaving intricate textiles that echo the patterns of traditional papel picado, crafting pottery at a local
    studio, and sharing original verses at intimate poetry circles, all while curating a personal collection of folk art pieces by artists such as Diego Rivera and contemporary fiber artist Faith Ringgold,
    channeling their deep love for storytelling through every brushstroke.
  travel: Lianna Storkson prefers low‑key, spontaneous getaways, often visiting nearby historic towns famed for vibrant textile markets and folk festivals—such as Santa Fe and the hill‑top villages of the
    highlands—while documenting gardens and art projects with their new digital camera, yet occasionally postpones larger trips due to anxiety about travel logistics.
  culinary: Lianna Storkson delights in preparing tamales wrapped in corn husks and simmering mole with chocolate, dried chilies, and cumin, seasoning dishes with garden‑grown cilantro and oregano, and
    while their cooking skill borders on masterful, they sometimes over‑salt or forget to label leftovers, leading to occasional kitchen mishaps.
  core: Lianna Storkson, a 76‑year‑old retired arts mentor, blends their solitary creativity, cultural storytelling, and gentle empathy into a life of spontaneous projects, mindful journaling, and occasional
    anxiety‑driven quirks.
background:
  cultural: Lianna was born to Mexican immigrant parents and grew up immersed in vibrant traditions of music, dance, and folklore. Her family preserved Spanish language use and celebrated Día de los Muertos
    and other cultural holidays, fostering a deep appreciation for Mexican art forms such as papel picado, Talavera pottery, and Oaxacan textiles. Relocating to Maryland in her adult years, she blended
    these traditions with Mid-Atlantic community life, becoming an active participant in local cultural festivals while maintaining strong ties to her heritage through food, storytelling, and bilingual
    communication.
attributes:
  skills: '["Mexican folk art techniques", "Art history knowledge", "Spanish-English translation", "Creative writing and poetry", "Textile crafts (weaving, crocheting)", "Pottery", "Gardening", "Empathetic
    listening", "Community storytelling"]'
  hobbies: '["Painting and mixed-media art", "Gardening with native and heirloom plants", "Poetry reading circles", "Cooking traditional Mexican cuisine", "Volunteer Spanish language tutoring", "Attending
    museum talks and art workshops", "Journaling and mindfulness exercises"]'
  career_goals: Although retired, Lianna aspires to curate a small traveling exhibition of Mexican folk art pieces at local community centers and senior centers in Carroll County. She dreams of compiling
    a memoir that intertwines her personal narrative with family recipes, poems, and translated stories, preserving her cultural heritage for future generations. Additionally, she hopes to learn basic digital
    photography and photo editing to document her garden and art projects, and to share them online with a close circle of friends.
