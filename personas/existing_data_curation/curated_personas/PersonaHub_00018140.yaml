persona_description: A music professor who specializes in the study of 18th century ballet music and its arrangement by Igor Stravinsky. His research interests include the approach Stravinsky took in arranging
  these works, the suitability of Stravinsky's music for the grotesquely caricatured characters of the Commedia del'arte ballet, and the extent to which Pulcinella is a Neo-Classical piece. He is particularly
  skilled in analyzing texture features and is known for his ability to add bells and whistles to compositions, as demonstrated in worksheet 20.
