personas:
  professional: Rebecca Culy, a veteran biomedical equipment specialist in San Bernardino County, blends meticulous device maintenance with a flair for visual storytelling, leading cross-functional technology
    rollouts while designing calming art installations for hospital waiting rooms.
  sports: Rebecca Culy hikes the high desert trails of Joshua Tree with the Desert Explorers club, roots for the Los Angeles Dodgers, Los Angeles Lakers, and LAFC, joins the community Run-4-Health 5K every
    spring, and admits to skipping warm-ups after late-night improv rehearsals.
  arts: Rebecca Culy paints abstract watercolors inspired by Jackson Pollock, captures Mojave light in photographs, performs improv sketches with the San Bernardino Community Players, strums a ukulele at
    open-mic nights where Miles Davis and John Coltrane vinyl spin, and always ends the night with a cup of espresso.
  travel: Rebecca Culy plans spontaneous road trips that weave through Sedona, the Grand Canyon, and Iceland's volcanic fields, balances a modest travel fund with meticulous spreadsheet planning, and dreams
    of a cultural immersion tour of Kyoto's art districts.
  culinary: Rebecca Culy enjoys crafting Mediterranean-fusion meals like shakshuka with roasted eggplant, miso-glazed salmon, and succulent-leaf salads seasoned with sumac, keeps a pantry stocked with fresh
    basil, cilantro, and preserved lemons, yet often over-salts dishes when multitasking in the kitchen.
  core: Rebecca Culy, a 45-year-old biomedical technologist with a vivid imagination, balances precise equipment stewardship with weekend watercolor bursts, community theatre antics, and a penchant for
    over-committing to projects while still finding time for jazz vinyl and succulent care.
background:
  cultural: Rebecca was raised in Victorville, a suburban desert city in San Bernardino County with a strong military presence and a diverse population that includes a significant Hispanic community. Her
    family’s European‑American roots emphasized hard work, community service, and self‑reliance, values that were reinforced by the region’s rugged landscape and close‑knit neighborhood culture. Growing
    up, she celebrated traditional American holidays such as Thanksgiving and the Fourth of July while also participating in local multicultural festivals, where she learned basic Spanish phrases and embraced
    regional cuisines. Her career in health technology brought her into daily contact with patients and colleagues from varied cultural backgrounds, sharpening her cultural competence and reinforcing her
    commitment to compassionate, inclusive care. The blend of southwestern desert aesthetics, military‑town discipline, and Southern Californian openness shapes her worldview and informs both her personal
    and professional life.
attributes:
  skills: '[''Biomedical equipment maintenance'', ''Medical imaging system operation'', ''Equipment troubleshooting and calibration'', ''Regulatory compliance (OSHA, HIPAA)'', ''Patient education and communication'',
    ''Staff training and mentorship'', ''Health informatics data management'', ''Creative health‑education material design'', ''Project planning and scheduling'', ''Infection control protocols'']'
  hobbies: '[''Abstract watercolor painting'', ''Landscape photography'', ''Community theater acting'', ''Ukulele playing'', ''Hiking in the high desert'', ''Volunteering at health fairs'', ''DIY health‑education
    crafts'', ''Reading science fiction'', ''Puzzle solving (crosswords, Sudoku)'', ''Succulent gardening'', ''Book club participation'', ''Improv comedy workshops'', ''Experimental cooking'', ''Jazz listening'']'
  career_goals: Rebecca aims to obtain advanced certification as a Certified Clinical Engineer and move into a senior biomedical equipment manager role within the next five years. She hopes to lead a community‑focused
    health‑technology outreach program that provides low‑cost equipment training and wellness workshops to underserved neighborhoods in San Bernardino County. Leveraging her love for art, she plans to develop
    interdisciplinary projects that integrate visual art installations into hospital waiting areas to reduce patient anxiety. Long‑term, she envisions founding a nonprofit that mentors aspiring health technologists,
    especially women, and promotes culturally responsive health‑technology solutions. She also intends to pursue an associate degree in health‑technology management to broaden her leadership expertise.
