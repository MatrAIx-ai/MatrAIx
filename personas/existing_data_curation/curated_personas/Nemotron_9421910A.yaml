  hobbies: '["Sketching/Mixed Media", "Reading Speculative Fiction", "Creative Writing/Poetry", "Solo Hiking in Wilderness", "Listening to Experimental/Electronic Music", "Philosophy Book Collecting", "Meditation/Mindfulness",
    "Digital Art Creation", "Art‑House Film Analysis", "Journaling"]'
  career_goals: Joyce aspires to build a career that combines her love for imagination and scholarly rigor. Her short‑term goal is to complete an undergraduate degree in liberal arts while developing a
    portfolio of interdisciplinary art projects that explore philosophical themes. She aims to pursue a Master of Fine Arts in Visual Arts or a graduate program in Philosophy, ultimately seeking a position
    as an independent conceptual artist and writer. Joyce envisions publishing a novel of speculative fiction, curating immersive installations that integrate digital media, and securing commissions that
    allow her to work autonomously. She is also driven to gain recognition through exhibitions, literary awards, and academic publications, positioning herself as a thought‑leader at the intersection of
    art and ideas.
