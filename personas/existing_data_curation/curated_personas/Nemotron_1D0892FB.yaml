    (English, Korean)'']'
  hobbies: '[''Contemporary Art Gallery Visits'', ''Architectural Photography'', ''Hiking and Nature Exploration'', ''Cooking Korean and Fusion Cuisine'', ''Reading Urban Design and Sustainable Architecture'',
