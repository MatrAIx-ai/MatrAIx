  career_goals: Michael dreams of one day becoming an engineer or scientist who creates useful inventions that help people in everyday life. In the near term, he aims to win his school’s science fair with
    a project that combines his love of LEGO building and simple coding, to join the after‑school robotics club, and to keep improving his Scratch programming skills. He imagines designing a practical device—like
    a bike‑lock alarm or a water‑conservation gadget—when he’s older, blending his curiosity about how things work with a desire for real‑world impact. Michael also hopes to stay involved in community STEM
    programs in Utica, seeing them as stepping stones toward a future career in technology or environmental engineering.
