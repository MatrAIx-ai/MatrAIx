  hobbies: '["Visiting art galleries", "Photography of architecture", "Watercolor painting", "Jazz and blues concerts", "Basketball", "Hiking", "Woodworking", "Arduino/electronics tinkering", "Cooking Southern
    cuisine", "Volunteering with Habitat for Humanity"]'
  career_goals: Kevin aims to advance to senior project manager and eventually become a principal engineer or director of infrastructure for the City of Saint Paul, leading large-scale projects that combine
    resilience, sustainability, and community-oriented design. He aspires to earn LEED AP certification and to spearhead initiatives that integrate public art and green spaces into transportation corridors.
    In the longer term, he envisions launching his own consulting firm focused on equitable, climate‑responsive infrastructure for underserved neighborhoods, while mentoring the next generation of Black
    engineers through professional societies and university outreach programs.
