personas:
  professional: Kevin Holly, a licensed civil engineer with advanced skills in structural, transportation, and sustainable infrastructure design, blends rigorous project management and data analytics with
    a creative eye for public art integration, aiming to become a senior project manager and eventually a director of infrastructure for Saint Paul.
  sports: Kevin Holly competes in a local weekend basketball league with the St. Paul Hoops Club, follows the Minnesota Timberwolves and Vikings avidly, and recharges by hiking the Superior and Itasca State
    Parks, often planning trail runs before the season’s games.
  arts: Kevin Holly regularly explores the Walker Art Center, studies Mark Rothko’s color fields, paints watercolors of city skylines inspired by the works of Maya Lin, and immerses themselves in live performances
    by Gregory Porter and the Twin Cities Jazz Orchestra, finding that modern art and jazz fuel their engineering creativity.
  travel: Kevin Holly prefers road‑trip adventures that mix architecture and nature, having photographed the historic streets of Barcelona, trekked the cliffs of Iceland’s Reykjanes Peninsula, and explored
    the Upper Peninsula’s Pictured Rocks, while planning a future visit to Copenhagen to study its bike‑friendly urban design.
  culinary: Kevin Holly experiments with Southern‑inspired dishes like shrimp and grits, smoked brisket, and pecan‑crusted catfish, seasoning with smoked paprika, cayenne, and fresh thyme, and often hosts
    family dinners featuring collard greens, cornbread, and a side of homemade lemon‑voiced vinaigrette.
  core: Kevin Holly fuses engineering precision with artistic curiosity, crafting resilient infrastructure by day and vibrant watercolors by night, all while juggling a love for basketball, jazz, and Southern
    cooking.
background:
  cultural: Kevin is a second‑generation African‑American who grew up in the vibrant Black community of Saint Paul’s Rondo neighborhood. His family’s traditions blend Southern hospitality, gospel music,
    and a strong emphasis on education and community service. He celebrates Juneteenth and Kwanzaa with his family and stays connected to the Twin Cities’ Black cultural scene through local churches, jazz
    clubs, and community art projects. Kevin’s heritage informs his commitment to equity in infrastructure, motivating him to mentor young Black students in STEM and to champion inclusive design that reflects
    the diverse needs of his community.
attributes:
  skills: '["Structural design", "AutoCAD Civil 3D", "GIS mapping", "BIM implementation", "Project management", "Cost estimation", "Regulatory compliance", "Sustainable infrastructure design", "Stormwater
