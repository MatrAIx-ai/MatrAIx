personas:
  professional: Cedric Franklin, a retired community mentor turned cultural custodian, channels decades of conflict‑mediation, oral‑history recording, and jazz knowledge into informal workshops, sidewalk
    storytelling sessions, and a nascent digital archive, guided by a curious, spontaneous spirit that often sketches plans on napkins while juggling deadlines with a compassionate focus on harmony.
  sports: Cedric Franklin enjoys low‑impact fitness, taking daily walks along the Mississippi River levee and joining the senior members of the New Orleans Riverwalk Running Club, while cheering on the
    New Orleans Saints and Pelicans from his porch, showing a relaxed yet community‑spirit‑driven approach to sports.
  arts: Cedric Franklin immerses themselves in the vibrant arts scene, attending live sets by local saxophonist Kyle Shepherd at Preservation Hall, quoting Wynton Marsalis during impromptu lessons, and
    capturing the city’s color palette in watercolor studies of the French Quarter, which fuels their identity as a lifelong learner and storyteller.
  travel: Cedric Franklin prefers leisurely cultural trips, having explored the historic streets of Savannah and the jazz cafés of Havana, while dreaming of a spring pilgrimage to the art museums of Paris,
    and always plans journeys around family gatherings and modest travel budgets.
  culinary: Cedric Franklin, an adept Creole home chef, whips up gumbo with okra, smoked sausage, and filé powder, simmers jambalaya with fragrant rice and shrimp, and treats friends to beignets dusted
    with powdered sugar, all while tending their balcony tomatoes and savoring the ritual of cooking as a communal celebration.
  core: Cedric Franklin is a curious, spontaneous septuagenarian who blends jazz, watercolor, and gumbo into a daily rhythm, often forgets to file paperwork on time, but they never miss a story to record
    from a neighbor.
background:
  cultural: Cedric is an African‑American native of New Orleans whose family roots trace back to the city’s historic Creole community. Growing up in the Tremé neighborhood, he was surrounded by the sounds
    of brass bands, the rhythms of second‑line parades, and the rich culinary traditions of Creole and Cajun cuisine. The Catholic and Baptist traditions in his family instilled a strong sense of community
    service and collective celebration. He lived through the aftermath of Hurricane Katrina, an experience that deepened his commitment to neighborhood resilience and cultural preservation. Cedric’s identity
    is shaped by the convergence of African, French, Spanish, and Caribbean influences that define New Orleans, and he takes pride in passing these traditions on to younger generations through storytelling,
    food, and music.
