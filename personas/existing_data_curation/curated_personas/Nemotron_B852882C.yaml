  career_goals: Although retired from formal employment, Cedric is driven to become a recognized cultural custodian in New Orleans. He aims to launch a community oral‑history project that records the memories
    of older residents and makes them accessible through the local library or a digital archive. He hopes to mentor emerging musicians and artists, offering informal workshops and storytelling sessions.
    Cedric plans to write a memoir or a collection of essays that weave together his personal experiences with the broader history of the city, especially focusing on the resilience shown after Hurricane
    Katrina. He also aspires to volunteer regularly as a docent at the New Orleans African American Museum, and to lead a monthly seniors’ conversation circle that promotes intergenerational dialogue and
    harmony. To support these goals, he intends to take a short course in digital archiving and public speaking at a community college.
