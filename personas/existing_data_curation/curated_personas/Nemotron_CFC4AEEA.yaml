personas:
  professional: Mary Jaffar, a three-year-old pres preschooler who loves constructing towering block castles and then diligently lines them up for tidy storage, displays an early mix of curiosity and practicality
    that hints at a future engineer mindset while balancing the desire to explore with an instinct for organization.
  sports: Mary Jaffar, a three-year-old who joins the Mini Mavericks toddler soccer group for weekly kick‑around sessions and splashes happily in her local YMCA swim class, enjoys the structured drills
    of soccer while also reveling in free‑form water play, reflecting a balance of organization and flexibility in her approach to fitness.
  arts: Mary Jaffar, a three-year-old who sings along to Raffi’s Baby Beluga and The Wiggles while meticulously coloring within the lines of her crayon book, yet also loves finger‑painting chaotic rainbows,
    blends structured artistic activities with spontaneous creative bursts that shape her playful identity.
  travel: Mary Jaffar, a three-year-old who delights in short car rides to the nearby zoo and was thrilled by the sensory overload of a family trip to Disneyland, prefers itineraries that intersperse playtime
    with nap breaks and snack pauses, balancing curiosity with the practical need for routine.
  culinary: Mary Jaffar, a three-year-old who eagerly devours macaroni and cheese, smothers her peanut‑butter banana sandwich with extra banana slices, insists on sprinkling cinnamon on apple slices, and
    occasionally stirs pancake batter under supervision, yet stubbornly refuses broccoli, revealing a pragmatic palate with occasional picky quirks.
  core: Mary Jaffar, a three-year-old who blends relentless curiosity with tidy pragmatism, builds block towers only to line them up for neat storage while bargaining for extra glitter stickers, showcases
    a surprisingly organized yet adaptable toddler mindset.
background:
  cultural: Mary is raised in a white, middle‑class family in Indianapolis, Indiana. Her household embraces Midwestern values such as friendliness, community involvement, and a balanced work‑life rhythm.
    The family participates in local traditions like community fairs, the family‑friendly events surrounding the Indianapolis 500, and seasonal celebrations such as pumpkin carving and holiday gatherings.
    She attends a play‑based preschool that blends exploration with structured routines, reinforcing her curiosity and practicality. This cultural environment nurtures her cooperative spirit, her respect
    for routines, and her balanced approach to social interaction.
