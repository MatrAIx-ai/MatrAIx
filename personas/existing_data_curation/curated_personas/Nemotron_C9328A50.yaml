    ''Community beach clean-ups'']'
  career_goals: Mark dreams of becoming a marine biologist or environmental engineer, aiming to protect coral reefs and study marine life along Florida's coast. He envisions designing simple underwater
    monitoring devices that blend his practical problem‑solving skills with scientific curiosity. He also hopes to lead community science projects, organize beach‑cleanups, and eventually advocate for coastal
    preservation at a larger scale. A secondary ambition, sparked by his love of space and new ideas, is to become an astronaut, reflecting his desire to explore both the oceans and the broader universe.
