personas:
  professional: Mark Allen, a budding junior marine biologist in his school's science club, blends curiosity about ocean life with methodical data collection during tide‑pool surveys, while his organized
    nature drives him to meticulously document findings in a scrapbook that doubles as a project portfolio.
  sports: Mark Allen, a forward on the Jupiter Soccer Academy’s U‑11 team and a regular at the community pool’s freestyle swim club, channels his outgoing energy into weekend beach clean‑ups that double
    as cardio, cheers for the Miami Dolphins on game nights, and occasionally neglects stretching, leading to occasional sore calves after intense practice.
  arts: Mark Allen, a sketch‑enthusiast who draws sea turtles and coral reefs after beach trips, devotes evenings to building intricate LEGO models inspired by the architecture of Frank Lloyd Wright, and
    codes interactive Scratch games featuring background music from the likes of Taylor Swift and soundtrack scores from Studio Ghibli, all of which fuel his creative expression.
  travel: Mark Allen loves spontaneous weekend trips to the Atlantic shoreline for tide‑pool adventures, dreams of snorkeling the Great Barrier Reef after seeing a documentary on National Geographic, and
    balances his wanderlust with family budget constraints by opting for day‑camps at nearby state parks like Jonathan Dickinson State Park.
  culinary: Mark Allen prefers fresh seafood dishes such as grilled shrimp tacos with mango salsa, enjoys helping his parents prepare simple salads with home‑grown lettuce and cherry tomatoes, and can proudly
    make a fruit‑smoothie using banana, coconut milk, and a splash of pineapple juice, though he often forgets to clean the blender afterward.
  core: Mark Allen is a methodical, curiosity‑driven ten‑year‑old who blends his love for marine science, LEGO engineering, and soccer with an uncanny calmness that makes him a reliable friend, occasional
    procrastinator on chores, and a budding environmental advocate.
background:
  cultural: 'Mark is a 10‑year‑old white boy raised in the suburban community of Jupiter, Martin County, Florida. His family is middle‑class, with parents who work locally and emphasize education, outdoor
    recreation, and community involvement. The coastal lifestyle of Jupiter shapes his daily routine: school field trips to marine sanctuaries, weekend beach outings, and participation in local youth sports
    leagues. He celebrates typical American holidays such as Thanksgiving, Christmas, and Independence Day, and attends a community church that promotes service and togetherness. While the region''s growing
    diversity exposes him to multicultural perspectives, his immediate cultural environment reflects mainstream American values—teamwork, self‑reliance, respect for nature, and a practical, optimistic outlook.
    He enjoys regional foods like fresh seafood, is fluent in English, and has occasional exposure to Spanish through school and community interactions.'
