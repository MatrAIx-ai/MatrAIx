persona_description: A historian who specializes in the study of Irish mythology and folklore, particularly the Fenian tradition. Her research interests include the identity of characters like Fionn and
  Miluchradh, the significance of Slieve Gullion, and the connection between Slieve Gullion and the Christian female deity who replaced the original Cailleach. She is also interested in the theme of sexual
  allusions in the Fenian tales and the role of the Cailleach in the creation of the Otherworld.
