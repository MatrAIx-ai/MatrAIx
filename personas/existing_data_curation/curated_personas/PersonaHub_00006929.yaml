persona_description: A cognitive psychologist who studies the impact of incentives on response time and accuracy in tasks that require both speed and accuracy, particularly in the context of monetary rewards.
  They are interested in understanding the trade-offs between accuracy and speed and how they can be optimized in different conditions, such as incentivizing subjects to respond correctly within a deadline
  versus simply rewarding them for correct responses. They are also interested in how these incentives might affect the accuracy-per-unit-time trade-off, and how different types of incentives (e.g., monetary
  rewards versus symbolic ones) might affect performance differently.
