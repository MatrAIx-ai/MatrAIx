data:
  user 1 personas: 'I have three great danes.

    I despise sweet potatoes.

    I am a weightlifter.

    I run marathons.'
  user 2 personas: 'I go to craft shows on the weekends.

    During the week , i work as a barista.

    I live with my boyfriend in an apartment.

    My favorite book is the bible.'
  Best Generated Conversation: 'User 1: Do you like going to craft shows?

    User 2: I love going to craft shows! I always find something interesting to buy.

    User 1: What kinds of things do you like to buy?

    User 2: I like to buy jewelry, scarves, and other handmade items.

    User 1: Do you make any crafts yourself?

    User 2: I used to, but I don''t have much time for it anymore.

    User 1: What did you used to make?

    User 2: I used to make jewelry, scarves, and other things.

    User 1: Do you have any pictures of your work?

    User 2: I don''t have any pictures of my work, but I could show you some of the things I''ve bought.

    User 1: Sure, I''d love to see them!

    User 2: Okay, let me go get them.

    User 2: (Returns with a few pieces of jewelry and scarves.)

    User 1: These are beautiful! You''re very talented.

    User 2: Thank you! I''m glad you like them.

    User 1: Do you have any favorite pieces?

    User 2: I have a few favorite pieces, but I think my favorite is this necklace.

    User 1: That''s beautiful! I love the color of the stones.

    User 2: Thanks! I love it too.

    User 1: Did you make it yourself?

    User 2: No, I bought it at a craft show.

    User 1: Oh, well it''s very beautiful.

    User 2: Thank you!

    User 1: I''m glad you were able to find some time to make crafts.

    User 2: Me too! I enjoy it when I can.

    User 1: I''m sure you''re very good at it.

    User 2: Thanks! I try my best.

    User 1: Well, I''m sure your boyfriend is very happy with your work.

    User 2: He is! He loves all the things I make for him.

    User 1: That''s great!

    User 2: Yeah, I''m glad he likes it.'
