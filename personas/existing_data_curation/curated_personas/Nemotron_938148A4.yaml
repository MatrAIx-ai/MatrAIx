personas:
  professional: Jessica Woods, a retired community‑event coordinator and seasoned genealogist, now channels her meticulous organizational talent and competitive drive into crafting a memoir, establishing
    a scholarship for budding artists, and curating an intergenerational exhibition that pairs senior creators with high‑school students, all while negotiating volunteer dynamics with a skeptical eye toward
    donors’ motives.
  sports: Jessica Woods enjoys low‑impact walking on the Turtle Creek Nature Trail and participates in senior‑friendly yoga classes, tracks her weekly mileage competitively against fellow walkers, and follows
    the Dallas Mavericks and Dallas Stars for community camaraderie, while avoiding high‑intensity sports due to joint pain and a lingering fear of injury.
  arts: Jessica Woods paints watercolors of North Texas landscapes, quilts intricate Texas‑star patterns, attends weekly art lectures at the Dallas Museum of Art, offers sharp critiques inspired by her
    keen visual eye, and draws inspiration from jazz legends like Miles Davis and classical composers such as Bach, while she also reveres local painter Sam Goudeau for his unconventional brushwork.
  travel: Jessica Woods prefers organized, senior‑friendly tours that balance adventure with comfort, frequently day‑trips to the Fort Worth Stockyards, weekend getaways to Waco’s Magnolia Market, and a
    yearly pilgrimage to New Orleans for its jazz festivals, all while budgeting through the senior center’s travel club and using a motorized scooter for airport navigation.
  culinary: Jessica Woods regularly cooks traditional Texan dishes such as chicken‑fried steak, pecan pie, and shrimp gumbo, seasoning generously with garden‑fresh rosemary and thyme, expertly handling
    a cast‑iron skillet and slow cooker, yet her hypertension medication sometimes dulls her taste, leading her to over‑salt dishes on occasion.
  core: Jessica Woods is a 97‑year‑old art‑loving genealogist whose competitive precision fuels legacy projects, while her chronic worries, frugal finances, and garden‑filled days reveal a vibrant yet occasionally
    anxious spirit.
background:
  cultural: Jessica grew up in a mid‑century Texas community shaped by post‑World War II optimism, Southern hospitality, and a strong Baptist upbringing. Her family’s roots trace back to early 20th‑century
    Anglo‑American settlers in the Dallas‑Fort Worth region, and she carries the values of self‑reliance, community service, and respect for tradition. While she honors these cultural foundations, Jessica’s
    curiosity has led her to embrace diverse artistic expressions and new ideas, blending a classic Texan sensibility with a lifelong passion for the arts and continuous learning.
