  hobbies: '[''visiting art museums'', ''watercolor painting'', ''bridge (card game)'', ''gardening (roses)'', ''genealogy research'', ''volunteering at community center'', ''listening to jazz and classical
    music'', ''cooking Texan recipes'', ''nature walks'', ''reading historical novels'']'
  career_goals: Although retired, Jessica’s ambition centers on leaving a lasting legacy for her community and family. She is working on a memoir that weaves personal history with the cultural evolution
    of North Texas. She hopes to establish a small scholarship fund for gifted local high‑school artists and to curate an intergenerational art exhibition that showcases senior creators alongside younger
    students. Jessica also aims to expand senior‑wellness programs at the community center, advocating for mental‑health resources and fostering a culture of lifelong learning among older adults.
