personas:
  professional: Maria Castorena, a 59‑year‑old bilingual community health volunteer, channels her lifelong caregiving experience and natural conflict‑mediation talent into organizing informal health workshops,
    mentoring recent Caribbean immigrants, and acting as a cultural liaison for service agencies, balancing her love of structure with the flexibility needed to respond to evolving community needs.
  sports: Maria Castorena enjoys leisurely walks through Reston’s Meadowbrook and Trailside parks, participates in a senior walking club that meets twice weekly, casually follows the Washington Nationals
    baseball team, and occasionally joins low‑impact aqua‑fit classes at the community center for gentle exercise.
  arts: Maria Castorena fills evenings with merengue and bachata playlists featuring Juan Luis Guerra and Romeo Santos, often humming along, dives into romance novels by Nora Roberts, and streams telenovelas
    such as “La Usurpadora,” finding both the music and the dramas a comforting bridge to their heritage and a source of emotional release.
  travel: Maria Castorena prefers short, planned trips that blend cultural immersion and relaxation, such as annual visits to historic Old Town Alexandria, weekend getaways to Virginia’s wine country, and
    a cherished pilgrimage to the Caribbean island of their ancestors where they enjoy beach walks and family reunions, all while budgeting carefully to fund their garden’s seasonal planting.
  culinary: Maria Castorena’s culinary repertoire centers on Caribbean staples like sancocho, mangú, and seasoned roast pork, seasoned with oregano, cilantro, and bitter orange juice, accompanied by avocado‑lime
    salsa and plantain fritters, often sourced from their backyard vegetable patch and the local farmers’ market, which they proudly share with neighbors during community potlucks.
  core: Maria Castorena is a compassionate, worry‑prone community anchor who blends structured caregiving with spontaneous garden cooking, using music and modest budgeting to navigate their golden years.
background:
  cultural: Maria was born in the Dominican Republic and immigrated to the United States as a young adult. She grew up in a close‑knit Dominican family where Catholic traditions, music, and communal meals
    were central. In Reston, VA, she remains connected to her roots through the local Dominican diaspora, celebrating holidays like Día de la Independencia with traditional foods, music, and dance. She
    values the importance of family, respect for elders, and community solidarity, which shape her compassionate and cooperative outlook. Her bilingual fluency and cultural knowledge enable her to serve
    as a bridge between the Dominican community and broader American society.
