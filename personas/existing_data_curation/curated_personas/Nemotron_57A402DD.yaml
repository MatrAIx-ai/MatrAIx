  hobbies: '[''Cooking Dominican cuisine'', ''Gardening'', ''Walking in parks'', ''Listening to merengue and bachata'', ''Singing'', ''Participating in a Dominican cultural group'', ''Volunteer work at
    food pantry'', ''Reading romance novels'', ''Watching telenovelas'', ''Attending church services'']'
  career_goals: Maria aims to transition from being out of the workforce to a part‑time role that leverages her caregiving experience, such as a community health volunteer or a mentor for recent Dominican
    immigrants. She hopes to organize cultural workshops that preserve Dominican traditions, and eventually become a trusted liaison between local service agencies and the Dominican community. Her ambition
    is to create a supportive network that reduces isolation for older adults and fosters intergenerational ties, while also developing consistent routines to better manage stress.
