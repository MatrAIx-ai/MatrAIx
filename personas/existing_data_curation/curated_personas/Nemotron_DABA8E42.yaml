personas:
  professional: Bich Quang, a budding digital illustrator and aspiring graphic novelist, channels their boundless curiosity and love for fantasy into sketching comic characters on a tablet, and they often
    juggle school assignments with spontaneous art sessions that reflect a relaxed approach to obligations.
  sports: Bich Quang enjoys weekend hikes on nearby nature trails and participates in a community youth soccer league, and they often cheer for the LA Galaxy while preferring low‑key exercise over competitive
    sports.
  arts: Bich Quang immerses themselves in creative expression by sketching manga‑style characters, revering artists like Hayao Miyazaki and indie musician Mitski, and they regularly visit the Pomona Arts
    Center to soak in rotating exhibitions.
  travel: Bich Quang loves spontaneous day trips to the California coast, especially Santa Monica Pier, and dreams of exploring the lantern‑lit streets of Hoi An during Tet, balancing family expectations
    with their own adventure cravings, and they often plan these trips on a whim.
  culinary: Bich Quang delights in cooking simple family dishes such as fragrant pho broth and spring rolls, experimenting with fresh herbs like cilantro and basil, and they also enjoy classic American
    pizza and bubble tea from the local shop.
  core: Bich Quang is a 13‑year‑old art‑obsessed teen who balances vivid imagination with a relaxed, sometimes chaotic routine, prone to anxiety yet driven by kindness and a longing for creative freedom,
    and they often channel their emotions into sketching.
background:
  cultural: Bich comes from a Southeast Asian family that maintains a strong connection to its cultural heritage while thriving in the multicultural environment of Pomona, California. At home, she speaks
    both English and Vietnamese, celebrates traditional holidays such as Tet, and partakes in family rituals that emphasize respect for elders and community harmony. This blend of cultural values nurtures
    her appreciation for artistic expression, community involvement, and the importance of balancing personal aspirations with familial expectations.
