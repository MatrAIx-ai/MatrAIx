  career_goals: Bich dreams of turning her love for art and storytelling into a career that can both inspire others and provide emotional support. She envisions studying graphic design or animation to create
    inclusive media that resonates with diverse audiences, and she also hopes to mentor younger kids in community art programs, using her creativity to foster safe, expressive spaces for peers who feel
    anxious or isolated.
