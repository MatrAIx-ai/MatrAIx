  hobbies: '[''Sketching'', ''Digital painting'', ''Photography'', ''Attending art exhibitions and museum tours'', ''Pickup basketball'', ''Narrative video gaming'', ''Creative writing (short stories, poetry)'',
    ''Volunteering at youth arts workshops'', ''Exploring historic neighborhoods'', ''Listening to indie and alternative music'', ''DIY street art'']'
  career_goals: Robert aims to turn his passion for visual storytelling into a career as a multimedia artist or digital content creator. In the short term, he plans to earn his GED and enroll in a community
    college program focused on graphic communications or game design, while building a portfolio of freelance commissions for local businesses and community events. Long‑term, he dreams of launching his
    own creative studio that blends illustration, video production, and interactive media, eventually collaborating with cultural institutions in the Washington, D.C. area to produce immersive exhibition
    experiences. His competitive drive fuels a desire to be recognized as a leading young artist in the regional scene.
