  career_goals: Nita aims to move beyond front‑line support into a supervisory role within the next two years, leveraging her leadership instincts and people‑first mindset. She plans to earn a bachelor’s
    degree in Business Administration to qualify for a Customer Experience Manager position, where she can design training programs that prioritize employee well‑being and customer satisfaction. Long‑term,
    she envisions contributing to company‑wide quality‑assurance initiatives and possibly leading a regional support hub that balances operational efficiency with a supportive team culture.
