personas:
  professional: Nita Becka is a frontline support specialist at a midsize technology company, where her calm resilience, empathetic communication, and mastery of Salesforce CRM enable rapid conflict de‑escalation
    and meticulous documentation, and she is simultaneously earning a Business Administration degree to qualify for a Customer Experience Manager role within two years.
  sports: Nita Becka is a regular Zumba enthusiast, plays competitive beach volleyball at St. Augustine Beach, cheers for the Jacksonville Jaguars in the NFL and the Orlando Magic in the NBA, and volunteers
    as an assistant coach for a local youth soccer league.
  arts: Nita Becka participates in a community book club that reads contemporary Southern authors, enjoys live performances at the St. Augustine Amphitheatre featuring folk singer‑songwriter Gillian Welch,
    and frequently listens to classic soul artists like Aretha Franklin and modern pop icons such as Taylor Swift, shaping her relaxed yet expressive artistic taste.
  travel: Nita Becka prefers flexible road‑trip planning, often taking spontaneous weekend drives to the pristine sands of Siesta Key, the historic streets of Savannah, and the vibrant nightlife of New
    Orleans, while also budgeting for occasional international cultural tours to Barcelona to explore its Spanish colonial architecture.
  culinary: Nita Becka cooks at an intermediate level, delighting in Southern‑coastal dishes like shrimp and grits, key lime pie, and low‑country boil, frequently sourcing fresh crab and okra from the St.
    Johns Farmers Market, and enjoys experimenting with spice blends such as Creole cayenne and smoked paprika.
  core: Nita Becka blends a love for structured routines with a spontaneous social spirit, using calm resilience to balance work leadership ambitions, community volunteering, and beach‑side spontaneity,
    all while occasionally slipping on impulse spending and missed appointments.
background:
  cultural: Nita is a White American raised in the Southeast, now residing in historic St. Augustine, Florida. She embodies the region’s blend of Southern hospitality, community involvement, and coastal
    leisure. Her family traditions include church gatherings, family barbecues, and an appreciation for the city’s Spanish colonial history. The multicultural tourism environment of St. Augustine has broadened
    her cultural awareness, prompting her to value diversity, inclusive dialogue, and the preservation of local heritage. Her upbringing in a middle‑class, family‑oriented setting reinforces her cooperative,
    harmony‑seeking outlook.
