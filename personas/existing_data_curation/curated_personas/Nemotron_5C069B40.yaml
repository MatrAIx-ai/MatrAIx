    cleaning and inspection'']'
  hobbies: '[''Fishing on the St. Francis River'', ''Seasonal hunting trips'', ''Woodworking projects'', ''Gardening and vegetable growing'', ''Listening to blues and gospel music'', ''Playing harmonica'',
    ''Church participation and building maintenance'', ''Watching Arkansas Razorbacks football'', ''Playing dominoes and card games'', ''Cooking Southern soul food'', ''Family barbecues and potlucks'']'
  career_goals: Jaquez aims to earn an Arkansas Certified Handyman license and a formal HVAC certification within the next two years, allowing him to expand his service offerings. He plans to complete OSHA
    10‑hour construction safety training and pursue the OSHA 30‑hour course to enhance workplace safety competence. His long‑term goal is to transition from a staff maintenance role to a supervisory position
    with the Marked Tree school district, eventually launching his own small contracting business that serves Poinsett County. He also hopes to mentor younger community members through a local trade apprenticeship
    program, sharing his practical knowledge and fostering a new generation of skilled workers.
