personas:
  professional: Jaquez Eli is a seasoned general maintenance professional with a toolbox full of hands‑on skills—from diagnosing plumbing leaks to wiring HVAC systems—who blends practical problem‑solving
    with a curiosity for emerging smart‑home technology, yet often embraces a relaxed, sometimes disorganized, approach to scheduling projects.
  sports: Jaquez Eli is an avid Arkansas Razorbacks football fan who never misses a Saturday game, joins the Poinsett County Hunters Association for seasonal deer hunts, spends weekend mornings fishing
    the St. Francis River, and enjoys friendly competition playing dominoes with the neighborhood crew.
  arts: Jaquez Eli immerses themselves in blues, gospel, and classic R&B, often playing harmonica at family gatherings while listening to B.B. King, Mahalia Jackson, and Marvin Gaye, and attends local church
    choir performances and occasional live music festivals in Little Rock.
  travel: Jaquez Eli favors spontaneous road trips to natural spots like the Ozark National Forest, annual hunting lodges in southern Missouri, has visited Nashville for a blues festival, dreams of fishing
    in the Florida Keys, and keeps travel modest due to family and work commitments.
  culinary: Jaquez Eli delights in cooking soulful Southern dishes such as fried catfish with hush‑puppy cornmeal biscuits, collard greens seasoned with smoked paprika, shrimp and grits, and homemade peach
    cobbler, often using fresh produce from their vegetable patch and communal gatherings as a testing ground for new recipes.
  core: Jaquez Eli blends practical hands‑on expertise with a laid‑back curiosity, a community‑centered spirit, and a penchant for blues music, hunting, and modest yet purposeful financial planning.
background:
  cultural: Jaquez grew up in a close‑knit African‑American community in rural Arkansas, where the legacy of Southern hospitality and church life shaped his worldview. He was raised on stories of resilience
    from the civil‑rights era and values of self‑reliance, cooperation, and communal support. Family gatherings centered around soul food, gospel music, and shared storytelling, reinforcing a strong sense
    of identity and belonging. The local Black community in Poinsett County places a high premium on mutual aid; Jaquez often assists neighbors with home repairs, embodying the cooperative spirit of his
    cultural heritage. He also celebrates regional traditions such as Juneteenth parades, church picnics, and local festivals, which keep him connected to the broader tapestry of African‑American Southern
    culture while informing his emphasis on harmony, kindness, and practical problem‑solving.
attributes:
  skills: '[''Plumbing repairs'', ''Electrical troubleshooting'', ''HVAC system maintenance'', ''Small engine repair'', ''Carpentry and framing'', ''Basic welding'', ''Drywall repair'', ''Painting and finishing'',
