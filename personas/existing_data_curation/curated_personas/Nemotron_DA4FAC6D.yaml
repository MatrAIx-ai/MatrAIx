  hobbies: '[''Painting'', ''Pottery'', ''Candle making'', ''Ukulele playing'', ''Book club participation'', ''Organizing community events'', ''Yoga'', ''Meditation'', ''Hiking'', ''Cooking Southern cuisine'',
    ''DIY crafts'', ''Attending theater productions'']'
  career_goals: Karen aspires to transition from her current role as a full‑time caregiver and volunteer into a professional position within the nonprofit or community arts sector. She plans to complete
    a bachelor's degree in social work or nonprofit management within the next three years, while obtaining certification in art therapy. Her long‑term ambition is to launch a community‑based art therapy
    center that offers workshops for children, seniors, and adults coping with stress, thereby blending her compassion, organizational talent, and love of art to promote mental well‑being.
