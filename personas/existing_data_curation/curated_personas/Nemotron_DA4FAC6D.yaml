personas:
  professional: Karen Glass is a community‑focused event coordinator who channels their curiosity, meticulous organization, and deep compassion into designing art‑therapy workshops and neighborhood gatherings,
    and they constantly refine budgets and volunteer schedules while worrying about meeting every participant’s needs.
  sports: Karen Glass embraces an active lifestyle through weekly yoga classes at the local studio, weekend hikes with the Atlanta Hiking Society, and they cheer for the Atlanta Falcons in fall football,
    the Atlanta Hawks during basketball season, and the Atlanta Braves in spring baseball, while they occasionally join a community volleyball league to balance their structured schedule with spontaneous
    movement.
  arts: Karen Glass nurtures a vibrant artistic soul, regularly painting acrylics inspired by Van Gogh’s swirling skies and O’Keeffe’s desert flora, crafting pottery while listening to Norah Jones, performing
    ukulele covers of Jack Johnson at local open‑mic nights, and they draw creative inspiration from community theater productions starring Lin‑Manuel Miranda’s works.
  travel: Karen Glass prefers thoughtfully planned trips that blend cultural immersion with restorative nature, having explored the historic streets of Savannah, the red rocks of Sedona, and the tea houses
    of Kyoto, while they dream of a future art‑retreat in Marrakech and they often budget travel around volunteer commitments.
  culinary: Karen Glass enjoys cooking Southern comfort foods such as buttermilk fried chicken, shrimp and grits, and collard greens seasoned with smoked paprika, while they experiment with new recipes
    like Thai coconut curry and craft their own scented candles infused with lavender and citrus, and they consider themselves an enthusiastic home chef who often sources fresh heirloom tomatoes from the
    local farmer’s market.
  core: Karen Glass is a diligent, art‑obsessed community organizer who worries about every detail, can’t resist the glow of a freshly made candle, and finds solace in yoga and ukulele strums after a long
    day of event planning.
background:
  cultural: Karen grew up in the suburbs of Wake Forest, North Carolina, where Southern hospitality, close‑knit family ties, and a strong sense of community are integral parts of daily life. Her upbringing
    was shaped by church involvement, seasonal traditions such as Fourth of July fireworks and Thanksgiving gatherings, and a love for the region’s natural landscapes. While rooted in these Southern customs,
    she has embraced broader artistic influences through college and volunteer experiences, fostering an appreciation for both local folk art and contemporary creative expressions.
