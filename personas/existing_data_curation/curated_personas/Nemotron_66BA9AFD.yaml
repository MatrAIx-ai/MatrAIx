    and time management'', ''Adaptability and flexibility'']'
  hobbies: '[''Visiting art galleries and museums'', ''Playing acoustic guitar'', ''Writing poetry and short essays'', ''Reading philosophy and contemporary fiction'', ''Biking along the Jersey Shore'',
