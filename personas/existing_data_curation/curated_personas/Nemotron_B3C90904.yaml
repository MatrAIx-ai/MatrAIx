  hobbies: '["crayon drawing and color mixing", "making simple collages from natural materials", "dancing to Mexican folk music and local country songs", "pretend outdoor exploration in the Ozark woods",
    "listening to bilingual storybooks", "singing nursery rhymes in English and Spanish"]'
  career_goals: Even at three, Alyssia dreams in bright, imaginative terms. She often talks about becoming a "big artist" who paints pictures that make people smile, a storyteller who shares tales of her
    Mexican family and the forests of Missouri, or a caring animal helper who looks after birds and squirrels. Her long‑term ambition is to create a world where everyone feels welcome and happy, using art,
    music, and kindness as her tools.
