personas:
  professional: A three-year-old named Alyssia Fernandez explores the world with a pretend doctor kit, turning playtime into early experiments as she piles colorful blocks and asks endless questions, showing
    a budding curiosity for problem‑solving even though she resists any tidy‑up schedule.
  sports: A three-year-old named Alyssia Fernandez loves splashing in the local splash pad and chasing a tiny orange soccer ball during the spring playgroup, cheering for the neighborhood youth soccer club
    the Little Eagles, but she quickly loses interest when drills become too regimented, preferring free‑form tag games instead.
  arts: A three-year-old named Alyssia Fernandez is fascinated by the bright colors of a children's picture book of Picasso’s early sketches, sings \"Let It Go\" from Frozen at bedtime, and watches the
    whimsical antics of Elmo and Cookie Monster, often attempting to recreate those scenes with finger paints and a toy ukulele.
  travel: A three-year-old named Alyssia Fernandez has visited her grandparents’ cottage in the mountains, made sandcastles at the sunny shoreline of Clearwater Beach, and dreams of seeing the giant redwood
    trees in California’s national parks, always packing her favorite stuffed bunny for the journey.
  culinary: A three-year-old named Alyssia Fernandez prefers creamy mac and cheese, strawberry‑banana smoothies, and the occasional bite of soft avocado toast, proudly scoops grated cheese onto her plate
    with a tiny fork, yet she stubbornly refuses peas and will trade her dessert for extra ketchup.
  core: A three-year-old named Alyssia Fernandez mixes boundless curiosity with a preference for spontaneous play, a tender worry about unfamiliar sounds, and a habit of hoarding glittery stickers.
background:
  cultural: Alyssia is raised in a household that blends Mexican heritage with the rhythms of small‑town Missouri. At home, Spanish is spoken alongside English, and traditions such as Día de los Muertos
    altars, tamales, and family gatherings are celebrated with lively music and colorful decorations. The surrounding Ozark landscape introduces her to rural American customs like seasonal fairs, hunting
    season, and community church events, fostering a sense of belonging to both cultures. This dual cultural immersion shapes her love for bright colors, rhythmic patterns, storytelling, and a strong emphasis
    on family and community harmony.
attributes:
  skills: '["basic bilingual communication (English/Spanish)", "simple singing and rhythmic clapping", "colorful drawing and scribbling", "building with blocks and puzzles", "basic counting (1-5) and shape
