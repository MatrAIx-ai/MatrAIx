personas:
  professional: Edgar Pulido is an aspiring IT and automotive technician who blends self‑directed troubleshooting, bilingual communication, and a competitive gaming mindset to excel in tech support tasks
    while building a modest Twitch channel, preferring structured learning but often juggling flexible schedules, and they thrive on clear objectives despite occasional disorganized moments.
  sports: Edgar Pulido hits the local park to shoot hoops with the Atlanta Hawks fan club’s youth group, joins weekend pickup soccer with friends that mimics the style of the Atlanta United supporters,
    rides a BMX bike on nearby trails, and follows the Atlanta Falcons and Atlanta Braves, balancing a love for competition with a relaxed approach to fitness that sometimes leaves them skipping planned
    workouts, and they still enjoy the occasional pickup game.
  arts: Edgar Pulido fuels their creative side by streaming to communities that admire the beats of Bad Bunny, J Balvin, Cardi B, and the rhythms of Latin pop, while also appreciating visual street art
    from artists like Banksy and catching esports highlight reels from shoutcasters such as Shroud, blending musical passion and digital media into their identity, and they often discuss these influences
    on stream.
  travel: Edgar Pulido prefers road‑trip adventures that mix gaming conventions in Los Angeles, cultural festivals in San Antonio, and short weekend escapes to Nashville or Savannah, often planning itineraries
    on the fly due to a modest budget and family responsibilities, yet they dream of a future trip to Mexico City to explore family heritage sites.
  culinary: Edgar Pulido enjoys cooking simple tacos al pastor, quesadillas with melted cheese and fresh cilantro, and whipping up guacamole with ripe avocados, while also loving fast‑food pizza and chicken
    nuggets, showing a beginner‑level culinary skill that balances family‑tradition meals with teenage snack cravings, and they take pride in mastering the perfect guacamole.
  core: Edgar Pulido is a competitively‑ driven teen who merges gaming strategy with hands‑on mechanical tinkering, juggling structured study goals and spontaneous gaming marathons, and they often forget
    to charge their phone overnight.
background:
  cultural: Edgar is the son of Mexican immigrants and grew up in a bilingual household where Spanish is spoken at home and English at school and in the wider community. He celebrates Mexican traditions
    such as Día de los Muertos and Mexican Independence Day, often sharing homemade foods and stories with extended family. Living in Norcross, GA, he has integrated aspects of Southern culture, including
    an appreciation for local cuisine and community gatherings. This bicultural upbringing gives him a strong sense of pride in his heritage while also navigating the expectations of a diverse American
    suburb, influencing his language skills, culinary preferences, and social connections.
