  career_goals: Edgar aims to obtain his GED within the next year and enroll in a community college program focused on information technology or automotive technology. He aspires to earn certifications
    such as CompTIA A+ or ASE to secure a stable, well‑paid job in tech support or automotive service. Simultaneously, he wants to grow a modest Twitch streaming channel centered on his favorite competitive
    games, hoping to eventually turn his gaming passion into a side income. Long‑term, he envisions combining his technical skills with entrepreneurial ambition, perhaps launching a small mobile car‑care
    service that serves his local community while supporting his family.
