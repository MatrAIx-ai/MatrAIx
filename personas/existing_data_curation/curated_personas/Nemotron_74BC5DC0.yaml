    ''Watercolor painting'', ''Gentle yoga'', ''Crossword puzzles'']'
  career_goals: Colette's current ambitions focus on staying active, maintaining her independence, and deepening her contributions to her community. She aims to continue volunteering at the local senior
    center, organizing low‑impact fitness classes, craft workshops, and inter‑generational activities, while mentoring younger volunteers in event planning and hospitality. She also hopes to complete a
    memoir documenting her family's history and personal life lessons, sharing practical wisdom with her grandchildren. Additionally, she plans to learn watercolor painting and expand her quilting work
    to create heirloom pieces for family celebrations. Maintaining her health through regular waterfront walks, gentle yoga, and routine medical check‑ups is also a priority.
