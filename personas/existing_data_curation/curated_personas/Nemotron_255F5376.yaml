personas:
  professional: Joy Napier, a 3‑year‑old of boundless curiosity, spends every afternoon building elaborate block towers that double as imagined skyscrapers, turning play‑time into a miniature engineering
    lab where they practice spatial reasoning and negotiate the occasional dismantling tantrum when the structure collapses.
  sports: Joy Napier dashes around the local playground, favoring the slide and a wobbling tricycle, and they cheer loudly for the hometown junior soccer team, the “Riverdale Rockets,” during televised
    matches, even though they prefer solo chase games over team activities.
  arts: Joy Napier, an avid crayon enthusiast, creates vivid abstract scribbles on every available sheet of paper, enjoys watching the animated series ‘Bluey’ for its creative storytelling, and often hums
    the theme from ‘Sesame Street,’ reflecting an early appreciation for color, rhythm, and narrative.
  travel: Joy Napier loves short family road trips to the nearby aquarium, where they can stare at the colorful fish for hours, and they day‑dream about visiting a tropical island with palm‑scented breezes,
    though their travel outings are limited to short daycare field trips and weekend visits to grandparents.
  culinary: Joy Napier delights in sticky peanut butter sandwiches and banana slices, insists on stirring the batter with a wooden spoon despite the mess, and frequently requests the “special” chicken nuggets
    that come with a side of ketchup, showcasing a developing palate with a love for familiar textures.
  core: Joy Napier is a curious, slightly anxious three‑year‑old who builds block kingdoms, hoards pennies, bursts into tears over small setbacks, yet finds solace in crayons, slides, and the comforting
    hum of a favorite cartoon tune.
background:
  cultural: Joy is raised in a white, middle‑class family in Troy, New York, a city with a historic Dutch‑American heritage and a vibrant arts community. Her family participates in community events at the
    Troy Public Library’s children’s program and the annual Troy Art Festival, exposing her to a blend of traditional American holidays and local cultural celebrations. The region’s seasonal cycles and
    proximity to the Hudson River valley influence her love of nature, while the city's emphasis on public murals and sculptures nurtures her early appreciation for creativity.
attributes:
  skills: '[''fine motor coordination (drawing, stacking blocks)'', ''basic color theory exploration (mixing primary colors)'', ''vocabulary of ~500 words with ability to label emotions'', ''question‑asking
    habit (why, how)'', ''simple problem solving (shape sorters)'', ''emotional articulation through art'']'
  hobbies: '[''watercolor painting and scribbling'', ''leaf and stone collecting'', ''singing nursery rhymes'', ''pretend play with stuffed animals'', ''building block construction'', ''exploring the local
    park and creek'']'
  career_goals: Joy imagines a future where she can paint without constraints, tell stories through pictures, and explore nature as a "forest explorer." She dreams of becoming an artist who captures feelings
    on canvas, a storyteller who animates adventures with dolls, or a caretaker of animals in a countryside setting. Her ambition is guided by a desire for flexibility, creative freedom, and the ability
    to share her unconventional way of seeing the world.
