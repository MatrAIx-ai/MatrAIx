  hobbies: '[''Woodworking'', ''Fishing'', ''Golf'', ''Crossword puzzles'', ''Sudoku'', ''Reading historical non-fiction'', ''Classic‑rock music'', ''Cleveland Browns football'', ''Volunteering at food
    pantry'', ''Neighborhood clean‑up'']'
  career_goals: Tyrone aims to transition from a senior clerk to a shift supervisor within the next two years, securing a Six Sigma Green Belt certification to formalize his process‑improvement expertise.
    He envisions leading a team that reduces order‑fulfillment errors by at least 15 % and implements cost‑saving inventory practices. Over the longer term, he hopes to obtain a Certified Supply Chain Professional
    (CSCP) credential and, after retirement, launch a small, family‑run e‑commerce fulfillment service that leverages his logistics knowledge while providing a stable income for his children.
