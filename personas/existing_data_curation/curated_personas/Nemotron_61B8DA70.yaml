personas:
  professional: Karen Curtis, an architectural and engineering manager, blends business acumen with advanced BIM expertise to steer large‑scale construction projects through meticulous data‑driven planning
    while their competitive edge fuels relentless cost‑cutting and sustainable design initiatives.
  sports: Karen Curtis participates in early‑morning hikes at Lake Bistineau State Park, plays in a co‑ed recreational softball league affiliated with the Shreveport Sports Club, and follows the Louisiana
    Tech Bulldogs football, the New Orleans Saints, and the Houston Astros, using these teams' seasons to structure their own fitness cycle.
  arts: Karen Curtis finds artistic inspiration at the Riverfront Blues Club, where they regularly see performances by local legends like Kenny Neal and enjoy recordings of B.B. King and Etta James, while
    also curating a personal collection of architectural photography featuring works by Louis Sullivan and contemporary installations by Maya Lin.
  travel: Karen Curtis plans trips with a spreadsheet itinerary, favoring short‑term road getaways to historic towns like Natchez and Asheville, a culinary pilgrimage to New Orleans for authentic gumbo,
    and an annual family vacation to the Canadian Rockies that balances adventure hiking with affordable cabin stays.
  culinary: Karen Curtis, a confident home chef, excels at crafting gumbo and jambalaya with Andouille sausage, shrimp, and filé powder, often experimenting by smoking the roux for deeper flavor, while
    they still occasionally rely on take‑out pizza on busy project weeks.
  core: Karen Curtis is a methodical, curiosity‑driven leader who balances competitive ambition with a quiet love of historic architecture, woodworking, and low‑key blues evenings, yet can’t resist a late‑night
    slice of pizza after a marathon of project spreadsheets.
background:
  cultural: Karen was raised in a middle‑class white family in the South, where community ties and a strong sense of hospitality were emphasized. Her upbringing included regular participation in church
    and local festivals that celebrate the unique blend of Southern, Cajun, and Creole cultures of Louisiana. She earned her business degree from a state university, grounding her in pragmatic problem‑solving
    while remaining open to new ideas. Living in Shreveport, she embraces the region’s culinary traditions, music heritage, and the emphasis on close‑knit social circles, all of which shape her balanced
    perspective of curiosity and practicality.
attributes:
  skills: '[''Project Management'', ''Budgeting and Cost Control'', ''Building Information Modeling (Revit)'', ''Regulatory Compliance'', ''Team Leadership'', ''Strategic Planning'', ''Risk Management'',
