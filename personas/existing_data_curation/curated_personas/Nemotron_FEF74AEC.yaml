  hobbies: '[''Playing guitar'', ''Hiking local trails'', ''Watching college football'', ''Video gaming (strategy games)'', ''Volunteering at the food bank'', ''Reading self-improvement books'', ''Cooking
    and grilling'', ''Attending live music shows'', ''Biking around campus'', ''DIY home improvement projects'']'
  career_goals: Jordan aims to advance to a store manager position within the next two years while completing a bachelor's degree in business administration. After gaining broader managerial experience,
    he envisions moving into a district or regional management role, overseeing multiple locations and shaping operational strategy. Long‑term, he is interested in launching his own specialty retail boutique
    or consulting firm that helps small businesses improve their sales processes and employee development programs. He values steady career progression that balances responsibility with the flexibility
    to pursue entrepreneurial projects.
