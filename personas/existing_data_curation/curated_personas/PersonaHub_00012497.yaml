persona_description: A Filipino-American who fought alongside American forces during World War II, survived the infamous Bataan Death March, and later worked as a civilian for the U.S. military after joining
  a guerilla resistance movement against the Japanese. He was a machine gun operator with the Philippine Scouts under U.S. Army Forces during the battle and was killed by Japanese soldiers or simply unable
  to make the trek, with most of the troops being Filipino. He died on December 16, 2017, in El Cerrito, California.
