  career_goals: Gregory aims to advance to a regional operations director role within the next three to five years, overseeing multiple facilities and driving company‑wide efficiency initiatives. He seeks
    to lead a comprehensive sustainability program that reduces waste and energy consumption while maintaining profitability. Mentoring emerging managers and establishing a formal leadership development
    pipeline are top priorities. Long‑term, he envisions transitioning to a consultancy that helps small manufacturers in Appalachia adopt modern lean practices and improve competitiveness.
