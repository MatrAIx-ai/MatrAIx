    communication'', ''training and mentoring junior clerks'']'
  hobbies: '[''Fishing'', ''Listening to blues and gospel music'', ''Cooking Cajun cuisine'', ''Watching LSU football'', ''Woodworking'', ''Gardening'', ''Playing cards'', ''Volunteering at community events'',
    ''Attending church services'']'
  career_goals: Otis aims to advance to a senior bookkeeping supervisor role within his organization, where he can oversee a small team and shape best practices for financial accuracy. He plans to earn
    a QuickBooks ProAdvisor certification and complete a GED program to formalize his knowledge, which will also open doors to consulting for local small businesses after retirement. In the longer term,
    he hopes to start a modest bookkeeping service that helps community entrepreneurs manage their finances, while also continuing to mentor younger workers and contribute to the financial stability of
    his family and the West Monroe area.
