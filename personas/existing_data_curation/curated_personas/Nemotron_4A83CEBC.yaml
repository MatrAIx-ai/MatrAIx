  career_goals: Courtland’s career ambitions blend his pragmatic side with his creative curiosity. He plans to enroll in a community‑college automotive technology program within the next year, aiming to
    earn an ASE certification that will open doors to stable, well‑paid work while still allowing flexible scheduling. In parallel, he wants to expand his graphic‑design portfolio and begin taking freelance
    commissions for local small businesses and community events, eventually turning that side hustle into a modest creative studio that can serve as a gathering space for youth art workshops. He hopes this
    dual path will provide financial security, a sense of purpose, and the flexibility to continue exploring new ideas on his own terms.
