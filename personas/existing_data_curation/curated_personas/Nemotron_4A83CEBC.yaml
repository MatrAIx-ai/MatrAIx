personas:
  professional: An aspiring automotive technician and freelance graphic designer, Courtland Leonard blends hands‑on troubleshooting skills with street‑art inspired digital graphics, pursuing an ASE certification
    at a community college while taking on local small‑business commissions to fund a future creative studio.
  sports: Courtland Leonard enjoys solo jogs along Columbus’s Scioto Mile and follows the Ohio State Buckeyes football and Columbus Crew SC soccer teams, occasionally joins a local pickup basketball league,
    valuing low‑key fitness routines over competitive sports.
  arts: Courtland Leonard sketches street‑art inspired designs on a tablet while listening to classic hip‑hop legends like A Tribe Called Quest, contemporary R&B from H.E.R., and jazz from Miles Davis,
    and shares original verses at intimate open‑mic nights featuring poets such as Rupi Kaur.
  travel: Courtland Leonard prefers spontaneous weekend getaways to nearby destinations like Hocking Hills State Park and Indianapolis, planning trips on the fly with a tight budget, prioritizing nature
    hikes and low‑key coffee shop visits over elaborate itineraries.
  culinary: Courtland Leonard experiments with soul‑food dishes such as fried chicken, collard greens, and shrimp and grits, seasoning them with homemade hot sauce while playing jazz, demonstrating a moderate
    cooking skill level and a love for comfort food with a creative twist.
  core: Courtland Leonard is a curious yet pragmatic 21‑year‑old who balances solitary tech tinkering and street‑art design with a habit of procrastination, frequent worry, and a deep love for low‑key music‑driven
    cooking sessions.
background:
  cultural: Courtland’s cultural identity is rooted in the African‑American community of Columbus, Ohio. His grandparents were part of the Great Migration, moving from the rural South to the Midwest in
    the 1960s, and they instilled a strong sense of resilience, faith, and pride in their heritage. Weekly church services introduced him to gospel music and the tradition of communal support, while neighborhood
    block parties exposed him to the evolution of hip‑hop and R&B that shaped his musical tastes. He participates in local cultural events such as the Columbus African‑American Arts Festival and the Ohio
    Black History Month celebrations, which reinforce his connection to broader Black history and contemporary social issues. This background informs his values of community uplift, creativity, and perseverance,
    even as he navigates personal anxieties.
