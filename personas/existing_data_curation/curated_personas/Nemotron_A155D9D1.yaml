  hobbies: '[''Baking pastelitos and flan'', ''Balcony gardening of tomatoes, basil, and cilantro'', ''Reading historical novels'', ''Listening to salsa and bolero music'', ''Walking on Miami Beach boardwalk'',
    ''Participating in church choir'']'
  career_goals: Lucila aims to continue volunteering at the senior center, teaching cooking workshops that preserve Cuban culinary traditions for younger generations. She hopes to compile her migration
    memories into a short memoir to share with family and the community, ensuring her story of resilience is not lost. Maintaining her health and independence remains a top priority, as does securing stable
    finances to support her modest lifestyle. She also aspires to mentor a handful of younger Cuban-Americans, helping them navigate cultural identity and practical life skills.
