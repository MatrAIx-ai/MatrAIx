personas:
  professional: An experienced community volunteer, Lucila Paz coordinates senior center events, leads cooking workshops, and serves as an informal neighborhood translator, blending meticulous organization
    with their warm, cooperative spirit.
  sports: Lucila Paz enjoys daily walks along the Miami Beach boardwalk, participates in a senior walking club that cheers on the Miami Heat and Miami Marlins, and occasionally joins low‑impact aqua aerobics
    at a local community pool.
  arts: Lucila Paz frequently listens to classic salsa and bolero records by artists such as Celia Cruz and Benny Moré, sings in the church choir, and devotes evenings to reading historical novels by Eduardo
    Galeano, finding these artistic pursuits central to their sense of identity.
  travel: Lucila Paz favors low‑key travel, planning trips to historic Caribbean towns like Cartagena and Santo Domingo while also cherishing relaxed day trips to nearby Key West, balancing a love for cultural
    immersion with the practical need to stay close to family support.
  culinary: Lucila Paz is renowned among friends for baking pastelitos filled with sweet guava, crafting caramel flan, and preparing classic family dishes such as arroz con pollo and ropa vieja, often using
    fresh basil and cilantro from their balcony garden to add a personal touch.
  core: Lucila Paz blends a disciplined love of baking, garden‑to‑table cooking, and community service with a meticulous budgeting habit, but their tendency toward anxiety and occasional forgetfulness adds
    a vulnerable edge to their resilient, nurturing outlook.
background:
  cultural: Lucila was born in Havana in 1943 and left Cuba with her parents during the early years of the Revolution, settling in Miami in the early 1960s. She grew up in a close‑knit Cuban‑exile community,
    where Catholic traditions, family solidarity, and Afro‑Cuban music shaped daily life. Over the decades she has blended her Cuban heritage with the vibrant multicultural fabric of Miami, maintaining
    Spanish as her primary language while acquiring enough English to navigate everyday interactions. Her cultural identity is expressed through food, music, religious observances, and a strong commitment
    to preserving the stories of the older Cuban diaspora for future generations.
attributes:
  skills: '[''Spanish–English bilingual translation'', ''Traditional Cuban cooking'', ''Household budgeting and bookkeeping'', ''Community event planning'', ''Knitting and crocheting'', ''Elderly caregiving'',
