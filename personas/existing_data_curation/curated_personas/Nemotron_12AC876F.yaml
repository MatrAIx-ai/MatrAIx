    at community garden"]'
  career_goals: Velma aims to earn her GED within the next year and subsequently pursue a Certified Nursing Assistant (CNA) or Medical Office Assistant certification, allowing her to re-enter the workforce
    in a stable, structured role. In the longer term, she hopes to launch a home-based catering service focused on soul-food and Southern flavors, providing a predictable income while leveraging her cooking
    and event-planning skills. She also plans to take on a volunteer leadership role in her church’s outreach programs to build experience for future paid positions.
