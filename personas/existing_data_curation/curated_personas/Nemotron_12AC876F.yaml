personas:
  professional: Velma Howard, a 45‑year‑old aspiring Certified Nursing Assistant who pairs her extensive household‑management, budgeting, and event‑coordination expertise with a meticulous, skeptical approach
    to patient care, ensuring every medication dosage and care plan is double‑checked for reliability as she prepares for a future home‑based soul‑food catering venture.
  sports: Velma Howard, a member of a local community walking club who follows the Atlanta Falcons and the Georgia Bulldogs, enjoys weekly morning walks through her garden, and participates in her church’s
    seasonal softball league, favoring low‑impact, social fitness activities over high‑intensity sports.
  arts: Velma Howard, an avid reader of Agatha Christie mysteries and a dedicated member of her church choir, finds solace in singing gospel hymns popularized by Mahalia Jackson, listening to classic soul
    like Otis Redding, and knitting while humming Ella Fitzgerald’s ballads, weaving these artistic interests into her daily routine.
  travel: Velma Howard, a methodical planner who prefers short, well‑organized road trips to historic Southern towns such as Savannah, Charleston, and New Orleans, while dreaming of a leisurely cultural
    tour of Lisbon’s tile‑laden neighborhoods, balances travel aspirations with her family responsibilities by booking months in advance to secure affordable accommodations.
  culinary: Velma Howard, a seasoned home cook whose repertoire includes collard greens seasoned with garden thyme, smoked catfish gumbo, sweet potato pie, fried okra, and cornbread, regularly experiments
    with new twists on classic Southern soul‑food while sourcing fresh herbs from her own garden, and delights friends with buffet‑style gatherings featuring her signature dishes.
  core: Velma Howard, the detail‑oriented, garden‑loving quilter who balances a steady pursuit of nursing credentials with a passion for soul‑food cooking, community service, and cautious budgeting, all
    while maintaining a quietly skeptical but emotionally steady demeanor.
background:
  cultural: Velma is an African-American woman raised in the Southern United States and now residing in Fort Bend County, Texas. She maintains a strong connection to Black Southern cultural traditions,
    including gospel music, soul-food cooking, and church community life. Her family emphasizes resilience, self-reliance, and storytelling, values she upholds through preserving family recipes and oral
    histories. Living in a diverse county, she also engages with the broader multicultural fabric of the region while honoring her heritage.
