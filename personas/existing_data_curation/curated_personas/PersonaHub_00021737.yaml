persona_description: A community leader and advocate for sustainable water solutions, specifically rainwater harvesting and water filters. They are deeply concerned about water quality and scarcity issues
  in their community and are actively working to improve access to safe, healthy drinking water. They are open to collaboration with other grassroots organizations and prioritize community involvement in
  project planning and implementation. They are skilled in water monitoring, community-led solutions, and research and development, and are committed to sharing their data and results with the public. They
  prioritize the intersection of low-cost, proven technologies with an implementation model driven by local communities, and are dedicated to helping communities at risk confront challenges of water quality
  and scarcity.
