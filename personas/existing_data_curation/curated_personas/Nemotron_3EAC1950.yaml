personas:
  professional: David Hebert, an 11‑year‑old budding roboticist who thrives on building LEGO megastructures and programming simple robots in his junior robotics club, channels his love for clear rules into
    meticulous project plans and enjoys solving chess puzzles to sharpen his strategic thinking, and they often spend evenings sketching blueprints for their next build.
  sports: David Hebert, an 11‑year‑old who enjoys structured physical activities, spends Saturday mornings swimming with the community youth swim club, participates in a junior fishing league, and follows
    the New York Yankees and Seattle Seahawks, they often check scores between LEGO builds.
  arts: David Hebert, an 11‑year‑old creative enthusiast who watches the LEGO Movie directed by Phil Lord and Christopher Miller, follows Minecraft YouTuber Dream, reads Jeff Smith’s Bone graphic novels,
    listens to John Williams’s Harry Potter soundtrack, and admires Mark Rober’s invention videos, they find inspiration for their own builds in the blend of science and storytelling.
  travel: David Hebert, an 11‑year‑old adventure planner who loves nature walks, has camped at Yellowstone National Park, fished on Lake Superior with his family, and dreams of exploring the robotics museums
    of Tokyo, they prefer road‑trip itineraries that let them map routes in a journal between LEGO sessions.
  culinary: David Hebert, an 11‑year‑old with modest cooking skills, can whip up a pepperoni pizza from a frozen crust, perfect a bowl of mac and cheese using cheddar cheese and elbow pasta, enjoys grilling
    his catch of bass with lemon and dill, and snacks on goldfish crackers seasoned with sea salt, they take pride in mastering each simple recipe before tackling more complex dishes.
  core: David Hebert, an 11‑year‑old pragmatic builder, balances a love for orderly LEGO constructions and robotics with a persistent worry that fuels a daily journal habit, they often stay up late perfecting
    designs.
background:
  cultural: David was born and raised in Columbia, South Carolina, in a middle‑class family with deep roots in the American South. He attends a public elementary school in Richland County, where regional
    values like politeness, community involvement, and respect for tradition are emphasized. His family attends a local Baptist church, shaping his experience of Southern religious life and seasonal community
    events such as picnics, county fairs, and holiday parades. The local cuisine—fried chicken, sweet tea, and barbecue—features often at family gatherings. While he is more introverted, the Southern emphasis
    on hospitality influences his cooperative nature and his willingness to help peers in small group settings.
attributes:
  skills: '[''structured problem‑solving'', ''basic Scratch programming'', ''LEGO and model kit assembly'', ''strategic board games (chess)'', ''academic organization'', ''detail‑focused writing'', ''basic
