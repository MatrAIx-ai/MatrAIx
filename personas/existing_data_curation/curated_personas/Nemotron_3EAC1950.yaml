  hobbies: '[''Minecraft'', ''LEGO building'', ''Reading science/engineering books'', ''Chess'', ''Junior robotics club'', ''Nature walks and fishing'', ''Journaling'']'
  career_goals: David imagines a future where he designs and builds things that help people. He is drawn to careers that combine structure, practicality, and tangible outcomes, such as civil engineering
    or software development. His goal is to study math and science in middle and high school, participate in robotics or engineering clubs, and eventually earn a degree that allows him to create bridges,
    roads, or apps that solve everyday problems. He also hopes his future work will provide a stable, predictable environment where he can apply his organized approach and attention to detail.
