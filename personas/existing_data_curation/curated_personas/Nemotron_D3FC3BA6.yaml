  career_goals: Although retired, Alan’s personal ambitions focus on staying mentally and physically active, deepening his involvement in the Muncie senior community, and leaving a lasting legacy for his
    family. He aims to expand the weekly bingo program into a broader social-events series, mentor local teenagers interested in trades through a partnership with the community college, and finish a written
    memoir of his life that captures mid-century Midwestern history. He also aspires to manage his anxiety by continuing participation in a senior support group and by learning relaxation techniques such
    as mindfulness breathing.
