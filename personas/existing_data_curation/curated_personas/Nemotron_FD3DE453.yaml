personas:
  professional: Felix Delrosario is a bilingual pastor and community organizer whose methodical counseling style blends theological depth with contemporary art references, guiding a multicultural congregation
    while steering volunteer outreach, church finance management, and conflict mediation with an organized, compassionate approach.
  sports: Felix Delrosario enjoys weekend hikes on Lookout Mountain, runs with the Chattanooga Trail Runners club, follows the Tennessee Titans in football, supports the Nashville Predators on ice, and
    occasionally plays pickup soccer at the community center, maintaining fitness through varied seasonal activities.
  arts: Felix Delrosario immerses themselves in Chattanooga’s art scene—sketching murals inspired by Banksy, attending exhibitions featuring Frida Kahlo retrospectives, playing acoustic renditions of Leonard
    Cohen and Bon Iver, and acting in community theater productions of August Wilson’s plays, all of which fuel their creative sermons.
  travel: Felix Delrosario plans trips with a mix of meticulous itineraries and spontaneous detours, having explored the historic streets of New Orleans, the art‑laden alleys of Barcelona, the canyonlands
    of Utah, and hopes to trek the Andes in Peru while balancing travel costs with volunteer mission trips.
  culinary: Felix Delrosario experiments with Mexican‑Southern fusion, whipping up chipotle‑spiced shrimp and grits, carnitas tacos paired with collard greens, and smoky brisket enchiladas seasoned with
    ancho chilies and smoked paprika, while their pantry stocks corn masa, okra, and fresh cilantro for vibrant flavor combinations.
  core: Felix Delrosario is a methodical, art‑loving pastor who balances bilingual sermons, community outreach, and experimental cooking, yet occasionally splurges on vintage guitar gear and forgets to
    hydrate during rehearsals.
background:
  cultural: Felix grew up in a bilingual Mexican‑American household, where Catholic traditions such as Día de los Muertos and family celebrations shaped his early worldview. Emigrating from Mexico to Tennessee
    as a child, he blended Mexican folk art and music with Southern hospitality, creating a unique cultural identity that informs his ministry. He remains fluent in Spanish, regularly incorporates Mexican
    liturgical music and visual motifs into worship, and actively participates in local Hispanic festivals, while also embracing the communal spirit of the Chattanooga community.
attributes:
  skills: '[''Pastoral counseling'', ''Bilingual preaching (English/Spanish)'', ''Sermon development'', ''Community outreach coordination'', ''Liturgical planning'', ''Conflict mediation'', ''Volunteer
