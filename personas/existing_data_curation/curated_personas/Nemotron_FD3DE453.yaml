  hobbies: '[''Visiting art galleries'', ''Acoustic guitar playing'', ''Sketching and painting'', ''Hiking'', ''Cooking Mexican‑Southern fusion dishes'', ''Reading theology and philosophy'', ''Traveling'',
    ''Volunteering at food banks'', ''Community theater acting'', ''Learning Latin'', ''Podcast listening'', ''Yoga and meditation'']'
  career_goals: Felix aims to deepen his theological foundation by pursuing a seminary degree while continuing his ministry in Chattanooga. He envisions leading a larger, multicultural congregation that
    serves both Mexican‑American and Southern communities, and he hopes to launch a community arts center that uses creative workshops to foster spiritual growth. Over the next decade, he aspires to author
    a book that explores the intersection of faith and art, and to mentor emerging clergy in culturally responsive ministry.
