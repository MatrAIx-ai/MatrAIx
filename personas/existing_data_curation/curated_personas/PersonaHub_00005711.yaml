persona_description: A historian who is fascinated with the early history of Australia and its colonization by the British. This person is particularly interested in the colonization of New South Wales
  and the events that led to the establishment of the first colony in Botany Bay. They enjoy learning about the indigenous Australians who lived in the region before the British arrived and the impact of
  the first settlement on the local culture and way of life. This person is also interested in the economic and social developments that occurred in New South Wales after the British arrived, particularly
  the mining industry and the expansion of the British dominion.
