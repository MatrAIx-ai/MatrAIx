  hobbies: '["Drawing and coloring","Reading picture books","Building with LEGO or blocks","Exploring nature in the backyard or park","Playing a simple musical instrument (recorder)","Helping with cooking
    simple Mexican dishes (e.g., guacamole, tacos)","Attending library storytime with a small group of friends"]'
  career_goals: Celestina dreams of growing up as a creative professional who can share stories through art and ideas. She imagines herself painting bright murals that honor her Mexican roots, curating
    small museum displays that let children explore new concepts, designing fun playgrounds where every piece fits together like a puzzle, or teaching younger kids how to read and draw. Her methodical nature
    leads her to set small, achievable goals—like mastering lettering or learning a new color technique—and she sees each step as a way toward a future where she can blend curiosity, organization, and compassion
    in a career that makes her community proud.
