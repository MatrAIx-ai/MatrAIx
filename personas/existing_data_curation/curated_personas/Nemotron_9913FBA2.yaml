personas:
  professional: Celestina Diaz, a budding mini-architect and storyteller, channels her boundless curiosity and methodical mindset into drawing elaborate castle scenes and constructing intricate LEGO robots,
    while preferring quiet collaboration with a few friends during school art projects.
  sports: Celestina Diaz enjoys climbing the jungle gym at the neighborhood park, participates in the Little Explorers Soccer Club’s Saturday games, and roots for the hometown baseball team, the River City
    Tigers, while preferring small‑group play over large crowds.
  arts: Celestina Diaz loves sketching storytime characters, listening to the playful tunes of Raffi and the classic melodies of The Beatles on a tiny recorder, and idolizes the whimsical illustrations
    of Dr. Seuss and the vibrant colors of Monet’s water lilies.
  travel: Celestina Diaz’s most treasured trip is a family road‑trip to the Grand Canyon, and they eagerly plan future visits to the sandy beaches of Costa Rica and the snowy peaks of the Alps, always creating
    a map with stickers to track each destination.
  culinary: Celestina Diaz proudly helps whisk together guacamole, assembles taco plates with diced tomatoes and shredded cheese, and crafts smiley‑face fruit salads using banana slices, strawberries, and
    blueberries, though they sometimes sneak extra cheese when no one’s looking.
  core: Celestina Diaz is a curious, organized six‑year‑old who turns backyard finds into art, saves pennies for LEGO dreams, and never skips a storytime session, all while managing mild allergies with
    calm confidence.
background:
  cultural: Celestina is the daughter of Mexican immigrants who live in Van Nuys, a vibrant part of Los Angeles. Spanish is spoken at home alongside English, and she grows up hearing traditional songs,
    stories, and values of respect for family and community. She celebrates Mexican holidays such as Día de los Muertos, Las Posadas, and Mexican Independence Day, often helping to make papel picado decorations
    and preparing family recipes like tamales, salsa, and elote. Her parents encourage curiosity and education while also fostering pride in her cultural identity. The multicultural environment of Van Nuys
    exposes her to diverse neighborhoods, community festivals, and bilingual school programs, enriching her appreciation for both her Mexican roots and the broader world.
attributes:
  skills: '["Basic reading and phonics comprehension","Clear handwriting of name and simple words","Colorful drawing and basic perspective","Puzzle solving (jigsaw, shape sorting)","Organizing personal
