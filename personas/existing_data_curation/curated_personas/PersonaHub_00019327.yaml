persona_description: A surgeon with expertise in shoulder surgery, particularly in the treatment of impingement syndrome and supraspinatus tendon injuries. They are highly skilled in the surgical techniques
  used to repair these injuries, including the removal of the coracoacromial ligament, subacromial bursa, acromioclavicular joint spurs, and suturing of the supraspinatus tear. They are also knowledgeable
  in the anatomy of the shoulder joint and the glenohumeral joint capsule, as well as the subacromial bursa and the supraspinatus muscle.
