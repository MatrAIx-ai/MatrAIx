  career_goals: Jose Juan aspires to become a multimedia artist or game designer, leveraging his love for visual storytelling and technology. He aims to attend a high school with a strong arts program,
    build a portfolio that merges Mexican cultural motifs with contemporary design, and eventually earn a degree in digital media or interactive design. He also dreams of creating an online platform where
    young creators from diverse backgrounds can showcase their work.
