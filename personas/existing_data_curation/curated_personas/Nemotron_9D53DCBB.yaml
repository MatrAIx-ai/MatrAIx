    and minorities)'', ''Basic plumbing and carpentry integration'']'
  hobbies: '[''Gospel choir singing'', ''Dancing at community festivals'', ''Gardening heirloom vegetables'', ''Restoring vintage radios and electronics'', ''Cooking Southern cuisine'', ''Reading trade
    magazines on electrical technology'', ''Mindfulness meditation and deep‑breathing for anxiety management'']'
  career_goals: Monica’s primary goal is to obtain a master electrician license within the next two years, positioning herself for a transition to part‑time consulting that focuses on energy‑efficiency
    retrofits and solar projects for low‑income neighborhoods in Arkansas County. She is passionate about establishing a mentorship program for young women interested in the trades, hoping to increase representation
    and provide hands‑on training. Additionally, Monica aspires to serve as a union safety representative, advocating for stricter on‑site safety protocols. Long‑term, she wishes to author a guidebook that
    blends technical advice with personal stories of resilience, helping others navigate both the challenges of the trade and emotional wellbeing.
