personas:
  professional: Monica Nelson, a seasoned electrician with three decades of residential and small‑commercial experience, blends practical ingenuity with a curiosity for emerging solar technologies, mentors
    apprentices—especially women—and is pursuing a master electrician license to launch a part‑time consulting practice focused on energy‑efficiency retrofits for low‑income neighborhoods while serving
    as a union safety representative, all while channeling their sociable, assertive nature into on‑site safety briefings.
  sports: Monica Nelson stays active by walking with the Stuttgart Senior Walking Club, cheering on the Arkansas Razorbacks football team, dancing at the annual Watermelon Festival, and participating in
    community softball games during the summer, while favoring low‑impact yoga classes at the local community center for flexibility.
  arts: Monica Nelson leads the church gospel choir, drawing inspiration from legends like Mahalia Jackson, Mavis Staples, and contemporary artist Kirk Franklin, enjoys listening to blues icons such as
    B.B. King and soul‑spirit performers like Etta James, and finds creative fulfillment restoring vintage radios that once broadcast their favorite classic shows.
  travel: Monica Nelson prefers road‑trip adventures that blend cultural heritage and nature, having explored the Mississippi Delta blues trail, visited historic Savannah, Georgia, camped in the Great Smoky
    Mountains, and dreaming of a future pilgrimage to New Orleans for its music scene, all while planning trips around a modest budget and family commitments.
  culinary: Monica Nelson delights in cooking traditional Southern fare—slow‑cooked collard greens with smoked turkey, fried catfish with hush‑puppies, and sweet potato pie—while cultivating heirloom tomatoes,
    collards, and herbs in their garden, using ingredients like smoked paprika, cayenne, and fresh basil, and approaches each meal with moderate culinary skill and a penchant for sharing dishes at church
    potlucks.
  core: Monica Nelson is a pragmatic, community‑focused electrician whose love for vintage radios and gospel music is balanced by a lively social spirit and a persistent undercurrent of anxiety that fuels
    meticulous planning.
background:
  cultural: Monica grew up in a close‑knit African‑American community in rural Arkansas, where church, family gatherings, and food were central to daily life. The legacy of the Great Migration and the history
    of Black farm families in the region fostered a strong sense of resilience and communal responsibility. Gospel music, oral storytelling, and potluck meals at the church nurtured her love for collective
    celebration and support. Living in Stuttgart, she participates in local traditions such as the Watermelon Festival while maintaining ties to broader Black cultural institutions, including the Arkansas
    Black History Museum and regional civil‑rights organizations. Her identity as a Black woman in a historically male‑dominated trade drives her determination to break barriers and mentor other women of
    color, reflecting the values of perseverance and community uplift ingrained in her cultural upbringing.
attributes:
  skills: '[''Residential electrical wiring'', ''Commercial electrical installation and code compliance'', ''Blueprint reading and system design'', ''Electrical safety inspections and OSHA compliance'',
