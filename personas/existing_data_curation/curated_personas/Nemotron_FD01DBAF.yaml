  career_goals: Karna aims to expand his boutique architecture firm into the premier provider of sustainable residential and small‑commercial projects throughout the Intermountain West. He plans to earn
    a recognized LEED Accredited Professional credential and develop a proprietary design methodology that integrates data‑driven energy modeling with time‑tested construction techniques. Over the next
    five years, he targets AIA Idaho award nominations for at least two projects, while building a steady pipeline of high‑value commissions that allow him to work largely from his quiet home office. Ultimately,
    he seeks to secure financial stability for his family, establish a legacy of environmentally responsible architecture, and mentor a small, highly focused team of designers who share his preference for
    low‑distraction, results‑oriented work environments.
