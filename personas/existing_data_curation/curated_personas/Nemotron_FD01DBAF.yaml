personas:
  professional: Karna Lizarazo, a licensed architect specializing in sustainable residential design, leverages their meticulous BIM expertise, analytical mindset, and preference for quiet, focused workspaces,
    applying a skeptical eye to client demands to deliver LEED‑level projects that balance creative ambition with strict budget and code compliance.
  sports: Karna Lizarazo, an avid hiker and seasonal skier, trains with the Boise Pathfinders Hiking Club, follows the Boise State Broncos football team, the Utah Jazz basketball squad, and the Colorado
    Rockies baseball club, and they schedule weekly endurance walks and occasional backcountry ski trips to maintain the stamina required for demanding site visits while valuing the solitary meditative
    quality of solo trail runs.
  arts: Karna Lizarazo, a dedicated wildlife photographer inspired by Ansel Adams, a connoisseur of Frank Lloyd Wright's organic architecture, and a sci‑fi enthusiast who revisits Isaac Asimov and William
    Gibson, weaves these artistic influences into their design concepts, often listening to Philip Glass's minimalist compositions while drafting.
  travel: Karna Lizarazo, a methodical planner who favors solo, nature‑focused trips, has trekked Patagonia's Torres del Paine, explored Iceland's geothermal valleys, and dreams of a remote cabin stay in
    the Scottish Highlands, always budgeting meticulously to balance family commitments with their yearning for wilderness solitude.
  culinary: Karna Lizarazo, an amateur home‑brewer and modest gardener, enjoys crafting a crisp IPA infused with Cascade hops, cooking pan‑seared trout with rosemary and lemon, and preparing a quinoa‑and‑roasted‑vegetable
    salad topped with feta and toasted pumpkin seeds, all while occasionally dabbling in sourdough bread baking.
  core: Karna Lizarazo, a 45‑year‑old architect, channels a solitary, detail‑obsessed mindset into sustainable design, balances chronic worry with disciplined mindfulness, and tempers a competitive edge
    with a love for meticulous hobbies like scale‑model building and crossword puzzles.
background:
  cultural: Karna grew up in a middle‑class family in Idaho Falls, where the values of self‑reliance, modesty, and a deep appreciation for the surrounding natural landscape are common. His cultural identity
    blends the practical, individualistic ethos of the American West with the professional culture of architecture and business, which emphasize precision, continuous learning, and competitive excellence.
    Although his surname hints at Hispanic ancestry, his upbringing was largely within the broader white American cultural context of the Intermountain region, marked by a preference for quiet, low‑key
    community life, outdoor recreation, and a strong work ethic centered on delivering tangible results.
