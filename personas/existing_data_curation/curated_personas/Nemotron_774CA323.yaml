personas:
  professional: Ibis Rivera, a 53‑year‑old agricultural specialist, combines hands‑on agronomy expertise, bilingual record‑keeping, and a meticulous, data‑driven approach with a restless curiosity that
    drives them to innovate low‑water organic systems while documenting every trial with sketches and photographs.
  sports: Ibis Rivera finds low‑impact fitness in weekend hikes with the Boise Foothills Trail Club, supports the Idaho Steelheads hockey team and the Boise State Broncos football squad from the comfort
    of their garden patio, and occasionally participates in local bird‑watching walks that double as gentle cardio sessions.
  arts: Ibis Rivera channels a love of visual storytelling into watercolor studies inspired by Georgia O'Keeffe’s desert palettes and night‑time nature photography echoing Ansel Adams, while devouring monographs
    on contemporary photographer Sally Mann and visiting Boise’s Basque Museum art exhibits whenever time permits.
  travel: Ibis Rivera prefers solitary, meticulously planned road trips that blend a detour to Oregon’s Columbia River Gorge for sunrise photography with a week‑long immersion in Oaxaca’s culinary markets,
    though budget constraints keep most international journeys to occasional weekend getaways to nearby Yellowstone.
  culinary: Ibis Rivera, a competent home chef, crafts Mexican‑Idaho fusion dishes such as roasted poblano‑infused Idaho trout, green‑chile‑spiced potato gratin, and cactus‑topped honey‑lime pork tacos,
    always sourcing heirloom produce from local farmers’ markets and experimenting with homemade masa.
  core: Ibis Rivera is a solitary, fiercely curious agronomist‑artist who obsessively catalogs plant health on sketchpads, balances a competitive drive with gentle yoga, and can’t resist a late‑night mystery
    novel before bed.
background:
  cultural: Born to Mexican parents, Stephanie grew up immersed in the traditions of her heritage—celebrating Día de los Muertos, listening to mariachi music, and helping prepare homemade tamales. She is
    fluent in Spanish and maintains close ties with her extended family, who visit from California and Mexico during holidays. Relocating to Nampa, Idaho, she adapted her culinary repertoire to incorporate
    locally sourced potatoes, trout, and sage, creating a unique fusion that honors both cultures. Her Mexican roots inform a deep respect for labor, community, and the land, while her Idaho experience
    has broadened her perspective, blending Southwest agricultural practices with Pacific Northwest sustainability values.
attributes:
  skills: '[''Crop production management'', ''Integrated pest management'', ''Drip-irrigation system design and maintenance'', ''Small machinery operation and repair'', ''Yield data collection and analysis'',
