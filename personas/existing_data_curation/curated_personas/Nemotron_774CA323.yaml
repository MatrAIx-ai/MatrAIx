    solving'', ''Nature photography for crop documentation'', ''Artistic sketching for design planning'']'
  hobbies: '[''Watercolor painting of landscapes'', ''Nature photography'', ''Birdwatching'', ''Hiking in the Boise foothills'', ''Cultivating ornamental garden plants'', ''Cooking Mexican-Idaho fusion
    dishes'', ''Reading art-history and photography books'', ''Yoga and meditation'', ''Reading mystery novels'']'
  career_goals: She aims to transition from a hands‑on agricultural worker to a certified organic farm manager, eventually establishing a boutique farm that cultivates heirloom Mexican and Pacific Northwest
    varieties. She plans to complete a bachelor’s degree in Sustainable Agriculture within the next five years and obtain organic-farm certification for her future operation. Her competitive drive pushes
    her to benchmark yields against regional standards and develop a low-water, high-output model that could be shared with local producers. Long-term, she envisions creating an agro‑art retreat where participants
    learn both sustainable farming techniques and visual arts, merging her love of agriculture with her artistic curiosity.
