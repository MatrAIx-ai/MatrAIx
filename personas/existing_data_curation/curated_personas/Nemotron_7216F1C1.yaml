personas:
  professional: Alexianna West, a meticulous accounting clerk at a midsize Baton Rouge firm, leverages QuickBooks and advanced Excel pivot tables to enforce GAAP‑compliant controls while dreaming of CPA
    certification and quietly grooming junior staff through mentorship, and they habitually double‑check every ledger entry to soothe their lingering worry about meeting deadlines.
  sports: Alexianna West, a yoga‑enthusiast who also jogs along the LSU campus trails in the evenings, roots for the LSU Tigers football team and the New Orleans Saints, plays pick‑up basketball at the
    local park during winter, volunteers as a time‑keeper for a neighborhood youth soccer league, and they occasionally skip a workout when work stress spikes.
  arts: Alexianna West, an avid patron of the Baton Rouge Blues Festival, fills evenings listening to the soulful saxophone of Wynton Marsalis, reads contemporary fiction like Colson Whitehead's novels,
    dabbles in watercolor painting while jazz plays, and they never miss a Saturday night set at the historic Capitol Lakehouse, even if it means staying up late.
  travel: Alexianna West, a budget‑savvy explorer, has road‑tripped to New Orleans for the Jazz & Heritage Festival and spent a weekend in Charleston sampling shrimp po’boys, dreams of a fall getaway to
    the Great Smoky Mountains, meticulously plans itineraries using travel‑deal alerts, and they sometimes postpone trips to prioritize a friend’s birthday dinner.
  culinary: Alexianna West, an inventive home cook, perfects gumbo with a dark, patient roux, peppers, okra, and file powder, experiments with shrimp étouffée and Cajun shrimp and grits, occasionally over‑spices
    a jambalaya in pursuit of flavor depth, and they source fresh herbs from their backyard garden while hosting monthly potluck evenings for neighbors.
  core: Alexianna West blends ledger precision with Creole flavor, channels chronic worry into yoga, jazz, and community mentorship, and they tend to over‑caffeinate during late‑night spreadsheet marathons.
background:
  cultural: Alexianna is an African‑American woman whose family has deep roots in Louisiana's Black and Creole communities. Growing up in Baton Rouge, she was immersed in a rich cultural tapestry that includes
    gospel music, community church gatherings, and family celebrations featuring dishes like gumbo, jambalaya, and cornbread. Her upbringing emphasized the importance of extended family ties, mutual support,
    and collective resilience. She participates in local cultural events such as the Baton Rouge Mardi Gras parade and the Louisiana Blues Festival, which reinforce her connection to the region's heritage.
    While she embraces contemporary professional life, she also cherishes traditions of storytelling, communal meals, and the value of mentorship within her community.
attributes:
  skills: '[''General ledger management'', ''Accounts payable and receivable'', ''Bank and account reconciliation'', ''QuickBooks'', ''Microsoft Excel (advanced)'', ''Financial reporting'', ''GAAP compliance'',
    ''Data entry accuracy'', ''Time management'', ''Attention to detail'', ''Customer service'', ''Conflict resolution'']'
  hobbies: '[''Yoga and mindfulness meditation'', ''Home cooking (Southern and Creole cuisine)'', ''Reading (personal development, finance, fiction)'', ''Volunteer tutoring (math and budgeting)'', ''Attending
    live jazz performances'', ''Walking in city parks and campus grounds'', ''Gardening (herb and vegetable garden)'']'
  career_goals: Alexianna aims to deepen her accounting expertise by earning her CPA certification within the next three years. She envisions progressing from her current clerk role to a senior accounting
    or internal audit position within a midsize firm or a municipal agency in Baton Rouge, where she can apply her structured approach to improve financial controls. Long‑term, she hopes to lead a small
    accounting team, mentor newer staff, and eventually launch a community‑focused financial consulting practice that helps local small businesses and non‑profits manage their finances more efficiently.
