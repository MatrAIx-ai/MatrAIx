  career_goals: Stephen dreams of turning his passion for visual culture into a sustainable career. In the short term, he aims to build a strong personal brand on Instagram and TikTok that showcases his
    street art, digital designs, and skate footage, attracting freelance commissions for murals and graphic projects. He hopes to secure an apprenticeship with a local design studio or a graffiti collective
    that can teach him professional production workflows. Long‑term, Stephen wants to become a recognized freelance visual artist and creative director, producing brand campaigns, music videos, and interactive
    media. He also envisions mentoring other under‑served youth in Houston by creating a community program that blends art, skate culture, and digital media skills.
