personas:
  professional: Stephen Laningham, a 17-year-old visual artist and skateboarder, leverages their graffiti talent, digital illustration prowess in Procreate and Photoshop, and kinetic video editing to craft
    street-culture-infused content for Instagram and TikTok, while their calm confidence lets them mediate peer disputes and pitch freelance mural commissions with an improvisational, flexible workflow.
  sports: Stephen Laningham, an avid skateboarder who spends afternoons at a local Houston skate park with the crew Sk8HOU, follows the Houston Rockets for a splash of team spirit, and they stay fit by
    mixing trick practice, weekend pickup basketball at Montrose courts, and occasional skateboarding competitions on the Texas Circuit.
  arts: Stephen Laningham, a teenage graffiti enthusiast inspired by street legends like Banksy and Shepard Fairey, curates playlists featuring MF DOOM, Aphex Twin, and Flying Lotus, and they regularly
    attend exhibitions by contemporary muralist Kelsey Strother at the Houston Museum of Fine Arts.
  travel: Stephen Laningham, an exploratory teen who roams the eclectic murals of Houston's Montrose district, has backpacked to Berlin's East Side Gallery to study its street-art history, dreams of catching
    sunrise at Japan's Shibuya Crossing for skate footage, and they favor spontaneous, budget-friendly trips over meticulously planned itineraries.
  culinary: Stephen Laningham, a self-proclaimed foodie with a penchant for fiery taco al pastor, spicy kimchi fried rice, and a homemade mac & cheese topped with jalapeno slices, prefers cooking quick
    meals in a dorm kitchen while they often indulge in late-night runs to the Houston Food Hall for artisanal quesadillas.
  core: Stephen Laningham, a 17-year-old visual-culture junkie, blends skate tricks, graffiti, and quick-fire gaming into a laid-back, curiosity-driven hustle, though they habitually procrastinate on school
    assignments and hoard sketchbooks like secret treasures.
background:
  cultural: Stephen grew up in Houston, a city known for its cultural diversity and vibrant arts scene. As a white Texan raised in a mixed‑ethnic neighborhood, he has been exposed to Southern traditions,
    the city’s Hispanic and African‑American influences, and the dynamic rhythm of the local music and street‑art movements. This multicultural environment shaped his eclectic taste in music, visual art,
    and food, and fostered a sense of openness to unconventional ideas while grounding him in the informal, community‑oriented spirit of Texas.
