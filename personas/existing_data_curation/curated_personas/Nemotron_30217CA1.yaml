    and vendor management'', ''Financial reporting and KPI tracking'', ''Credit analysis'']'
  hobbies: '[''classic car restoration'', ''woodworking'', ''golf'', ''chess'', ''financial literacy volunteering'', ''reading economic history'', ''home brewing'', ''attending Philadelphia Eagles games'',
    ''exploring local historical sites'', ''culinary grilling'']'
  career_goals: Justin aims to move into a senior executive finance role, targeting a Director of Finance position and ultimately the Chief Financial Officer title within the next five years. He plans to
    spearhead a finance transformation project that integrates AI-driven predictive analytics and automation to shorten reporting cycles and enhance decision-making. To formalize his expertise, he intends
    to earn the CPA designation and consider pursuing the CFA charter. Beyond corporate advancement, Justin seeks to mentor emerging finance talent and, after establishing a robust network, launch a boutique
    consulting firm focused on helping small businesses in the greater Philadelphia region improve financial health and operational efficiency.
