personas:
  professional: Austin Radhakrishnan, an aspiring robotics hobbyist and budding game developer, combines a love for sketching comic strips with methodical coding in Scratch, channeling their curiosity and
    organized mindset into building simple robots that can animate their own digital stories.
  sports: Austin Radhakrishnan, an energetic participant in the Charleston Youth Soccer League and the local junior basketball club, enjoys Saturday morning pick‑up games at the park, idolizes the Charleston
    Battery, and follows a disciplined schedule of cardio drills and skill drills to stay fit.
  arts: Austin Radhakrishnan, a passionate comic‑strip creator, draws inspiration from artists like Alan Moore, Alex Ross, and the storytelling style of Hayao Miyazaki, composes melodies reminiscent of
    Joni Mitchell on their acoustic guitar, and regularly visits the Charleston Art Fair to showcase their digital art.
  travel: Austin Radhakrishnan, a curious explorer, spends weekends hiking the Cooper River trails and weekend‑visiting Folly Beach, dreams of a future trip to the Grand Canyon, and prefers to plan trips
    with detailed itineraries using Google Maps while balancing school responsibilities and family budget constraints.
  culinary: Austin Radhakrishnan, a budding home chef, loves crafting cheesy garlic pizza with fresh basil, enjoys making chicken quesadillas and mango‑lime smoothies, and often experiments with toppings
    while watching cooking tutorials on YouTube.
  core: Austin Radhakrishnan, a methodical yet spontaneously creative 13‑year‑old, balances a love for robotics and comic art with a penchant for meticulous planning, a habit of collecting odd rocks, and
    occasional procrastination on cleaning their room.
background:
  cultural: Austin was raised in the suburban community of Hanahan, South Carolina, within a predominantly white, middle‑class Southern setting. His family embraces the region’s traditions of hospitality,
    community service, and church involvement, often gathering for Sunday meals and local festivals. The proximity to Charleston exposes him to a vibrant arts scene—including museums, historic tours, and
    annual art fairs—that nurtures his artistic curiosity. School life emphasizes sports, club participation, and collaborative projects, reinforcing his sociable and cooperative traits. While his cultural
    upbringing includes classic Southern values, Austin’s exposure to diverse creative influences through media, friends, and community events broadens his perspective beyond regional norms.
