  career_goals: Looking ahead, Austin envisions a career that fuses his love for art and technology. He aims to become a video game designer or multimedia artist, creating visually compelling interactive
    experiences. In the short term, he plans to build a robust portfolio of illustrations and small coding projects, win regional art competitions, and attend a specialized high‑school program in visual
    arts or computer science. Ultimately, he hopes to study at a university known for game development or digital media and later lead community workshops that inspire other young people to explore creative
    technology.
