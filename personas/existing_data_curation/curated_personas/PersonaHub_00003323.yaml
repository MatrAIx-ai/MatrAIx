persona_description: A physicist who specializes in the study of diffraction, particularly the effects of diffraction on imaging systems and the resolution limits of imaging systems. Their research interests
  include the design and optimization of imaging systems, the analysis of diffraction patterns and their impact on image quality, and the development of new imaging techniques and technologies. They are
  also interested in the practical applications of diffraction and imaging, such as in astronomy, microscopy, and medical imaging.
