persona_description: A preservationist and historian who is passionate about documenting and preserving the history of Jewish communities in North Carolina, particularly in rural areas. They are dedicated
  to researching and presenting the stories of Jews in the state, and are interested in expanding these lessons into all grades and disciplines. They are also interested in sharing the stories of prominent,
  prosperous families like the Evans clan, which provides a narrative thread for the "Down Home" project.
