  career_goals: Although retired from formal employment, Khong aims to channel his business expertise and compassionate temperament into mentorship for emerging entrepreneurs, particularly within the Vietnamese
    community in Las Vegas. He hopes to design an intergenerational art and storytelling program at the local senior center, author a memoir reflecting his immigrant journey, and volunteer as a financial‑literacy
    educator for low‑income families. Additionally, he envisions offering modest pro‑bono consulting services to small businesses, balancing his desire to help others with his need to manage stress and
    maintain personal well‑being.
