  career_goals: Karl frequently declares, in his enthusiastic toddler voice, that he wants to be an artist who paints bright pictures for everyone, an astronaut who flies to the stars, a storyteller who
    entertains his friends, or a community helper like a firefighter who rescues people. These aspirations reflect his love for novelty, creativity, and being at the center of attention. Though expressed
    through play, he shows a budding ambition to explore, create, and engage with others.
