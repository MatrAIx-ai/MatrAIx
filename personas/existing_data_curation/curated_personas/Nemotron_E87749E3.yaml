  hobbies: '[''Painting'', ''Sketching'', ''Photography'', ''Visiting art museums'', ''Attending local concerts'', ''Hiking'', ''Ultimate frisbee'', ''Volunteering at community events'', ''Reading contemporary
    fiction'', ''Cooking and trying new recipes'']'
  career_goals: Anna plans to attend a state university to study Communications or Visual Arts, with the long‑term goal of becoming a community arts coordinator or cultural program director. She hopes to
    combine her love for art, social interaction, and community building by designing inclusive arts programs, organizing local festivals, and using media to promote cultural engagement in her hometown
    and beyond.
