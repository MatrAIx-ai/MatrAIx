personas:
  professional: Anna Sapp, an aspiring community arts coordinator with a budding portfolio of graphic design, photography, and event planning, leverages their curiosity and organizational knack to craft
    inclusive pop‑up art installations and local festivals that celebrate communal traditions like seasonal fairs and informal sauna gatherings.
  sports: Anna Sapp energizes their social circle by captaining a co‑ed ultimate frisbee team, hitting the trails for Saturday hikes with the local outdoor club, and cheering loudly for the Milwaukee Bucks
    and Green Bay Packers while squeezing in weekend yoga sessions.
  arts: Anna Sapp immerses themselves in the Midwest art scene, painting vibrant cityscapes, snapping candid street photography, frequenting the Appleton Art Center, and drawing creative fuel from indie
    folk acts like Bon Iver and the annual Oktoberfest music stage.
  travel: Anna Sapp dreams of a study‑abroad semester in Copenhagen while also planning budget‑friendly road trips to Door County’s lighthouses, the Chicago Art Institute, and a weekend ski outing in the
    Upper Peninsula, balancing a student‑friendly itinerary with a desire for cultural immersion.
  culinary: Anna Sapp loves to experiment in the kitchen, perfecting comfort staples like cheese curds and bratwurst alongside new recipes such as miso‑glazed salmon with smoked paprika, and they often
    host potluck nights where homemade apple strudel and craft soda are the stars.
  core: Anna Sapp is a restless creative who doodles in lecture margins, forgets to water houseplants, but never skips a Friday night art gallery opening or a weekend ultimate frisbee match.
background:
  cultural: Anna was raised in Appleton, Wisconsin, within a predominantly white Midwestern community. Her family has German and Scandinavian roots, reflected in traditions such as celebrating Oktoberfest,
    enjoying hearty comfort foods like cheese curds and bratwurst, and occasionally attending a local sauna. She values the Midwestern emphasis on community, modesty, and hard work, while also being open
    to diverse ideas and cultures. Seasonal activities like county fairs, Thanksgiving gatherings, and community theater productions have shaped her appreciation for local heritage and collective harmony.
attributes:
  skills: '[''Public speaking'', ''Team collaboration'', ''Event planning'', ''Social media management'', ''Basic graphic design (Canva)'', ''Photography'', ''Research and information synthesis'', ''Time
