  hobbies: '[''cooking Puerto Rican cuisine'', ''salsa and bachata dancing'', ''home vegetable gardening'', ''volunteering at community gardens'', ''yoga and meditation'', ''attending Latin music festivals'',
    ''reading horticulture publications'', ''exploring Miami art and cultural events'']'
  career_goals: Lorena aims to advance from crew supervisor to regional manager for a multi‑site landscaping firm, overseeing operations across South Florida. She plans to earn certifications such as Certified
    Grounds Manager (CGM) and OSHA Safety Officer to bolster her credentials. Long‑term, she dreams of launching her own boutique landscaping business that blends eco‑friendly techniques with Caribbean
    aesthetic influences, offering culturally resonant designs for residential and commercial clients. To support these goals, she intends to complete her GED and take night courses in business management,
    while also building a network of mentors and apprentices to ensure a supportive, stress‑aware workplace culture.
