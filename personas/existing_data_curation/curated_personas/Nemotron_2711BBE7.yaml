personas:
  professional: Lorena Gonzalez, a 48‑year‑old landscaping crew supervisor in South Florida, blends practical grounds‑keeping expertise with a flair for tropical plant palettes, leading their team like
    an extended family while pursuing certifications in safety and sustainable design.
  sports: Lorena Gonzalez enjoys weekend beach volleyball matches with their crew, follows the Miami Heat and Inter Miami CF with enthusiastic fan’s zeal, and incorporates salsa dancing as a cardio routine
    to stay fit year‑round.
  arts: Lorena Gonzalez attends Miami’s Art Basel and local gallery openings featuring vibrant works by artists such as Romero Britto, while their playlists are filled with salsa legends like Celia Cruz
    and contemporary Latin stars like Bad Bunny, and they often sing along during community dance evenings.
  travel: Lorena Gonzalez prefers culturally immersive trips, planning their vacations around festivals such as Carnaval in Cartagena and the San Juan street parade, while balancing work commitments with
    weekend getaways to the Everglades and occasional beach resorts in the U.S. Virgin Islands.
  culinary: Lorena Gonzalez is an avid home cook who perfects dishes like mofongo with chicharrón, arroz con gandules seasoned with sofrito, and fresh mango‑lime salsa, while also experimenting with home‑grown
    papaya and chayote in their vegetable garden and indulging in occasional upscale dining at places offering modern Caribbean cuisine.
  core: Lorena Gonzalez is a vibrant, talkative leader whose love of tropical color palettes and community festivals is matched by a chronic habit of over‑planning and occasional midnight snack binges when
    stress runs high, and they often unwind with late‑night salsa playlists.
background:
  cultural: Lorena grew up in a close‑knit Puerto Rican family in Miami, bilingual in Spanish and English, and deeply rooted in the island’s traditions of family solidarity, festive celebrations, and communal
    support. She carries the concept of "familismo" into her work, treating her crew like an extended family and prioritizing harmonious relationships. Her cultural heritage informs her design sensibility—she
    favors vibrant foliage, tropical palms, and color‑rich plant palettes reminiscent of Caribbean gardens. Community festivals like San Juan celebrations and Puerto Rican parades are a regular part of
    her life, reinforcing her connection to her roots. These cultural influences shape her warm, talkative communication style, her collaborative leadership approach, and her commitment to preserving and
    sharing Caribbean horticultural heritage within Miami’s diverse landscape.
attributes:
