persona_description: A historian specializing in Maya history, particularly the political and social dynamics of the Eastern Peten region during the Late Classic period. With a deep understanding of Maya
  chronology and history, they are particularly interested in the complex political infighting among the kingdoms in the region at the end of the eighth century. They have a keen interest in the role of
  the ruler K’inich Lakamtuun in the conflict and the fate of his prisoner, Xub Chahk. They are also knowledgeable about Maya art and architecture, and have a particular interest in the depiction of captives
  in Maya art.
