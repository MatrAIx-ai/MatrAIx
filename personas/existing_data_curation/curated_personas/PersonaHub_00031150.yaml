persona_description: A researcher in public health or environmental science who is interested in understanding the impact of urbanization and environmental factors on respiratory health and atopy. This
  person is likely to be studying the relationship between asthma, allergy, and environmental factors in developing countries, particularly in Ethiopia. They are interested in the differences between urban
  and rural populations, and the potential role of environmental factors such as housing style, bedding materials, and use of malathion insecticide. They are also likely to be interested in the timing of
  the emergence of asthma and allergy in urban populations, and the factors that may have contributed to this increase.
