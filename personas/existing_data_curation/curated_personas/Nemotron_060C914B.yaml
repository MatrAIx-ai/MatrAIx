personas:
  professional: Amina Johnson, a veteran architect renowned for her blend of hand drafting mastery and cutting‑edge sustainable design, leads community‑focused historic preservation projects with meticulous
    organization, assertive mentorship, and a curiosity that keeps her integrating new technologies into Southern‑style structures.
  sports: Amina Johnson, a member of the Riverwalk Senior Walking Club, enjoys brisk morning walks along the Mississippi River and attends weekly low‑impact yoga at the community center, while cheering
    on the New Orleans Saints during football season and the Mississippi Braves in summer, balancing her love of gentle exercise with spirited fandom.
  arts: Amina Johnson, a gospel choir stalwart, finds solace in singing hymns by Mahalia Jackson and contemporary worship songs by Kirk Franklin, while her evenings are often filled with the sounds of B.B.
    King at the local blues festival and quilting sessions set to classic jazz from Duke Ellington, weaving artistic expression into her social life.
  travel: Amina Johnson prefers meticulously planned trips that combine architectural pilgrimage and soulful relaxation, having toured the historic mansions of Natchez, the ante‑bellum districts of Savannah,
    and the jazz‑rich streets of New Orleans, she now dreams of a guided tour of UNESCO‑listed historic villages in the Caribbean, all arranged within her modest retirement budget and health considerations.
  culinary: Amina Johnson, an adept home cook, delights in preparing collard greens simmered with smoked ham hocks, honey‑glazed fried catfish, and sweet potato pie, often sourcing tomatoes, beans, and
    herbs from her own garden, and she enjoys experimenting with seasonal ingredients like okra and jalapeños to put a fresh twist on classic soul‑food.
  core: Amina Johnson blends a meticulous architect’s mind with a choir‑singer’s heart, turning every garden harvest, quilting pattern, and community project into a harmonious celebration of Southern heritage—though
    she sometimes forgets to take her blood‑pressure meds after a lively blues jam.
background:
  cultural: Amina Johnson grew up as a Black woman in Terry, Mississippi, within a close‑knit extended family deeply rooted in the African‑American church tradition. Her upbringing was shaped by oral storytelling,
    gospel music, and the communal resilience forged during the civil‑rights era. She carries the legacy of her ancestors who built homes, churches, and schools with limited resources, giving her a profound
    respect for vernacular construction techniques. Southern hospitality, respect for elders, and a strong sense of communal responsibility inform her daily interactions. Amina's cultural identity is reflected
    in her architectural work through the inclusion of porches, shaded courtyards, and design motifs that honor African‑American heritage. Her life embraces the strengths of the Black Southern experience—faith,
    perseverance, and collective uplift—while navigating the challenges of segregation and systemic barriers, which have fueled her commitment to equitable and inclusive design.
