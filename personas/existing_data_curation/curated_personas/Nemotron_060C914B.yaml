  career_goals: Even at 78, Amina remains driven to shape the built environment of her hometown. She aims to establish a scholarship fund for Black youth in Mississippi who wish to pursue architecture,
    ensuring greater diversity in the field. Amina wants to document and protect historic African‑American neighborhoods in Hinds County, creating an archival portfolio that informs future restoration projects.
    She aspires to mentor a new generation of architects, particularly women and people of color, through workshops at the local community college. Additionally, she hopes to author a memoir that interweaves
    her personal journey with the evolution of Southern architecture, highlighting how curiosity and practicality have guided her practice. Finally, Amina seeks to advise municipal planning committees on
    inclusive, resilient design that balances innovation with the cultural heritage of the region.
