  career_goals: As she grows, Tiffanie aspires to channel her innate curiosity and meticulous nature into a career that blends creativity with structured achievement. She envisions becoming an artist‑educator
    or a museum curator, roles that let her appreciate varied artistic expressions while maintaining high standards of organization and impact. Her long‑term ambition is to lead community art programs that
    foster cultural appreciation and personal growth within her hometown of Fort Worth.
