  career_goals: Susanna aims to move into a senior credit manager position where she can lead a team of analysts, spearhead the adoption of innovative credit scoring methodologies, and mentor junior staff.
    She also wishes to expand her influence by designing community‑focused financial literacy workshops, integrating her practical expertise with her desire to support others. Over the next five years,
    she envisions balancing increased responsibility with initiatives that promote workplace well‑being and stress‑management for herself and her colleagues.
