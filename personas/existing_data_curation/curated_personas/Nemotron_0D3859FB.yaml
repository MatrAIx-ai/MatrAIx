  hobbies: '[''Basketball (pickup games)'', ''Video gaming (strategy and adventure)'', ''Learning guitar'', ''Cooking family recipes'', ''Sketching and digital art'', ''Volunteering at community center'']'
  career_goals: Jacob is motivated to complete his high school education and earn a diploma. He is drawn to fields that blend his curiosity about how things work with a desire to serve his community, such
    as civil engineering or renewable energy technology. In the short term, he plans to explore vocational programs that offer hands‑on training in fields like automotive technology or electronics, aiming
    to gain certifications that can lead to entry‑level jobs after graduation. He also hopes to improve his English proficiency and eventually study engineering at a community college, with the longer‑term
    ambition of designing sustainable infrastructure projects that benefit neighborhoods like his own.
