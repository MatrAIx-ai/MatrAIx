personas:
  professional: Darlene Everton, a ten‑year‑old aspiring storyteller‑illustrator, channels their love of adventure mysteries into well‑outlined short stories for the school magazine, using a clear plot
    structure while allowing spontaneous doodles in the margins, and confidently presents their ideas to the class, often taking the lead in group brainstorming sessions.
  sports: Darlene Everton plays midfield for the Albany Youth Soccer League, cheers enthusiastically for the Kentucky Wildcats during basketball games, and enjoys watching the Cincinnati Reds on Sunday
    afternoons, balancing formal practice drills with impromptu backyard scrimmages that satisfy their love for structure and spontaneous fun.
  arts: Darlene Everton sings alto in the school choir, sketches whimsical characters for their story illustrations, and draws inspiration from folk legend Dolly Parton and pop star Taylor Swift, often
    humming their tunes while crafting friendship bracelets during church youth group gatherings.
  travel: Darlene Everton eagerly anticipates family road trips to the county fair in August, dreams of hiking the trails of the Great Smoky Mountains and experiencing Nashville’s live music scene, and
    prefers itineraries that mix planned visits to historic farmsteads with spontaneous picnics in the rolling hills, all within the modest budget set by their parents.
  culinary: Darlene Everton helps stir the pot of simmering black beans, shape buttery cornbread batter, and coat crispy fried chicken, while they especially love the sweet tang of homemade apple butter
    and the crunch of fried green tomatoes, often sketching these dishes in their notebook during cooking.
  core: Darlene Everton is a talkative, structure‑loving ten‑year‑old who transforms adventure books into vivid school stories, saves allowance for craft supplies, battles spring allergies, dominates the
    soccer field after choir rehearsals, and dreams of mountain hikes when not busy making friendship bracelets.
background:
  cultural: Darlene grows up in a white, Appalachian‑influenced family in Albany, Kentucky. Her community values close family ties, church fellowship, and a strong sense of neighborly support. Family gatherings
    often feature home‑cooked meals like beans, cornbread, and fried chicken, and local traditions such as county fair visits and folk music sessions. The region’s natural setting—rolling hills, streams,
    and farmland—has taught her to appreciate outdoor activities and local wildlife. Church youth groups and school community service projects reinforce values of generosity, respect, and community pride,
    shaping Darlene’s outlook and interests.
