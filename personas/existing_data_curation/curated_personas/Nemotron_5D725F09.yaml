  hobbies: '[''Reading adventure books'', ''Writing short stories'', ''Drawing and sketching'', ''Crafting friendship bracelets'', ''Singing in school choir'', ''Participating in local community events'',
    ''Playing soccer with friends'', ''Exploring nature (collecting leaves, watching birds)'', ''Playing educational computer games'', ''Volunteering with neighborhood clean‑up'']'
  career_goals: Inspired by her love of talking to others and helping friends, Darlene dreams of a future where she can guide and inspire kids. She hopes to become a teacher or youth counselor, a role that
    lets her combine storytelling, leadership, and compassion. She also imagines working as a community event host or a local television presenter, bringing stories of her town to a broader audience. If
    she follows her interest in animals, she might explore a veterinary career, but her primary ambition is to stay connected to people and make a positive impact on her community.
