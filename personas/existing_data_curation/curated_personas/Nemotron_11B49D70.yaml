personas:
  professional: Herbert Dean is an aspiring video game strategist and budding drama performer, channeling a competitive streak and love for storytelling into leading school game tournaments and starring
    in school productions, though they sometimes struggle with organization and miss practice deadlines.
  sports: Herbert Dean is a basketball and soccer enthusiast who plays on the Westfield Youth Soccer League, joins after-school pickup basketball games, idolizes the Indiana Pacers and the local high school
    football team, and approaches fitness with a fiercely competitive edge, often challenging friends to outscore each other.
  arts: 'Herbert Dean immerses themselves in creative expression through the school drama club, a growing comic book collection featuring Spider-Man and Batman, and building intricate LEGO Star Wars sets,
    drawing inspiration from Marvel''s Stan Lee and the animated series Avatar: The Last Airbender, and they often rehearse monologues in front of the mirror.'
  travel: Herbert Dean loves family road trips to county fairs and the Indianapolis 500, dreams of visiting Disneyland in California and exploring the Great Smoky Mountains on a camping adventure, and they
    prefer a mix of structured itineraries and spontaneous stops at local ice-cream shops.
  culinary: Herbert Dean favors classic Midwestern comfort foods like pepperoni pizza, mac and cheese, chicken nuggets, and corn on the cob, enjoys helping their parent grill burgers at backyard barbecues,
    and they have a particular fondness for root beer float and chocolate chip cookies.
  core: Herbert Dean is a talkative, competition-driven ten-year-old who balances a love for video games, drama, and sports with occasional anxiety, and they have a habit of splurging their allowance before
    saving for bigger toys.
background:
  cultural: Herbert is a white Midwesterner raised in La Porte, Indiana, a small city that blends agricultural roots with modest industrial presence. His family embodies typical Midwestern values of hard
    work, punctuality, and community involvement. Local culture emphasizes school sports, church gatherings, and family-oriented events such as backyard barbecues and county fairs. He grows up with a friendly,
    neighborly environment that encourages sociability but also expects personal responsibility. Exposure to broader media through the internet adds contemporary influences to his upbringing, balancing
    traditional Midwestern pragmatism with modern, digital interests.
