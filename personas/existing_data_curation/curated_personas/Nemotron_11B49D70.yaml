  hobbies: '[''Video gaming'', ''LEGO building'', ''School drama club'', ''Basketball'', ''Soccer'', ''Comic books'', ''Action figure collection'', ''Bike tinkering'', ''Attending community fairs'']'
  career_goals: Herbert dreams of a future where he can combine his love of talking, competition, and technology. He aspires to become a sports broadcaster or a video game developer, positions that let
    him be in the spotlight while engaging with competitive content. He also entertains the idea of becoming a teacher or a youth club leader, where he could bring structure to others while nurturing his
    sociable side. Although ambitious, he often worries about living up to his own high expectations and fears that setbacks might expose his vulnerabilities.
