  career_goals: Jennifer aims to enroll in a community college program focusing on environmental studies or sustainable business, blending her curiosity about new ideas with her practical mindset. She aspires
    to work in community outreach or non‑profit initiatives that promote local environmental projects, eventually moving into a project management role where she can lead teams and organize events. In the
    short term, she plans to take part‑time jobs or internships with local NGOs or small businesses to gain real‑world experience while financing her education.
