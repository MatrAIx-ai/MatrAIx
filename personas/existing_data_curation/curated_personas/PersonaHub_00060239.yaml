persona_description: A suicide prevention expert who has published research on the mental health effects of military operations and is advocating for the integration of published research on increased rates
  of psychiatric illness in the military, as well as the need for ongoing resources for prevention, diagnosis, and treatment. They are proposing four steps based on past research and emerging evidence to
  help begin curbing military suicide, including reducing access to guns and other means of suicide, watching for sleep disturbances, and improving primary care treatment for depression.
