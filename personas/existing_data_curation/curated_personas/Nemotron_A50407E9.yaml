personas:
  professional: Katha Pardee, a 48‑year‑old visual artist, writer and community event manager, leverages a meticulous, game‑theory‑inspired planning style to secure grant funding and run a thriving volunteer
    network for her envisioned Killeen art hub, while remaining wary of partners’ motives and fiercely competitive in every proposal.
  sports: Katha Pardee, a devoted fan of the Dallas Cowboys, Mavericks and Stars, spends early mornings jogging with the Killeen Running Club, attends weekly yoga sessions at Killeen Yoga Studio, and joins
    a co‑ed recreational tennis league at Central Texas Tennis Club to counterbalance her competitive board‑gaming mindset.
  arts: Katha Pardee, an avid painter of oil landscapes inspired by Georgia O’Keeffe’s desert palettes, performs in community theater productions ranging from Shakespeare to original sci‑fi scripts, hosts
    a monthly book club that devours Octavia Butler and Neil Gaiman, and fills evenings with the ambient sounds of Björk while sketching imaginative character designs.
  travel: Katha Pardee, who meticulously plans weekend getaways to Texas art capitals like Austin and San Antonio and savors annual pilgrimages to the Edinburgh Fringe Festival, now dreams of a slow‑travel
    immersion in Kyoto’s zen gardens, balancing her modest travel budget against the demands of her community art hub funding calendar.
  culinary: Katha Pardee, a competent home cook who harvests rosemary, basil, and sage from her aesthetic garden to whip up fragrant ratatouille, pan‑seared salmon with lemon‑dill sauce, and occasional
    ginger‑spiced lentil stew, delights her book‑club guests with homemade scones topped with local honey, yet sometimes oversalts her experimental Thai curry in a burst of culinary bravado.
  core: Katha Pardee is a fiercely competitive, imagination‑driven community arts champion who meticulously plans every grant and garden, yet wrestles with chronic worry and a habit of impulsive pigment
    purchases that leave her studio a rainbow of unfinished projects.
background:
  cultural: Katha grew up in a middle‑class Anglo‑American family in central Texas, absorbing the warmth of Southern hospitality and the eclectic, transient culture of Killeen, a city shaped by its proximity
    to a large military base. Her upbringing emphasized self‑reliance, community involvement, and participation in regional traditions such as local festivals, barbecue gatherings, and country music events.
    While rooted in these Texan customs, her education and personal interests have fostered an appreciation for national and international art movements, and she values the diverse perspectives offered
    by the military community around her. Although she has never married, she cherishes independence and draws support from the vibrant local arts and volunteer networks.
attributes:
  skills: '[''Oil painting'', ''Acrylic painting'', ''Digital photography'', ''Illustration'', ''Creative writing'', ''Event planning'', ''Volunteer coordination'', ''Grant writing'', ''Public speaking'',
