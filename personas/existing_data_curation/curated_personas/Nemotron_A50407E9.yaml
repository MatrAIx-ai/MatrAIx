  hobbies: '[''Oil painting'', ''Acrylic painting'', ''Creative writing (poetry and short stories)'', ''Reading speculative fiction'', ''Community theater participation'', ''Book club hosting'', ''Strategic
    board games (Chess, Go, Settlers of Catan)'', ''Crossword and Sudoku puzzles'', ''Yoga and mindfulness'', ''Aesthetic gardening'']'
  career_goals: Katha aims to establish a community art hub in Killeen that offers workshops, exhibitions, and mentorship for emerging artists. She plans to earn a certificate in nonprofit management to
    better lead volunteer initiatives and secure funding. Parallel to her community work, she aspires to complete an online MFA program and publish a collection of short stories that explore abstract and
    philosophical themes. Long‑term, she hopes to become a recognized local cultural liaison and a part‑time mentor while maintaining a balanced, stress‑resilient lifestyle.
