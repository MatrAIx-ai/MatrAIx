  career_goals: Angela aspires to a career that combines her curiosity about the natural world with her methodical approach. She dreams of becoming a wildlife biologist or an environmental researcher, envisioning
    herself conducting field studies, collecting data, and analyzing results in a quiet, focused laboratory setting. She also expresses an interest in technology, hoping to one day design software tools
    that help conservationists track animal populations. To achieve these goals, she plans to maintain her strong academic record, pursue advanced science courses in high school, join a robotics or ecology
    club, and eventually attend a university with strong environmental science and computer science programs.
