personas:
  professional: Angela Mccabe, a budding young coder and aspiring story designer, channels her curiosity and methodical nature into creating interactive fantasy narratives on Scratch, where she blends organized
    project planning with quiet, solo work sessions.
  sports: Angela Mccabe, a quiet participant in the school cross‑country club and occasional swimmer at the local community pool, supports the Los Angeles Dodgers and the LA Lakers from the sidelines, preferring
    methodical, low‑impact workouts like hill hikes in Orange County over team sports.
  arts: Angela Mccabe, a dedicated piano hobbyist who practices pieces by Ludovico Einaudi and Yiruma while curating a digital photo collection inspired by Ansel Adams and Annie Leibovitz, finds solace
    in reading fantasy novels by J.K. Rowling and C.S. Lewis, which together shape their quiet creative identity.
  travel: Angela Mccabe, an organized teen traveler with a love for coastal scenery, often plans day trips to nearby Catalina Island and the tide pools of Crystal Cove, dreams of hiking the Grand Canyon
    someday, yet prefers low‑key nature retreats over crowded amusement parks due to their need for solitude.
  culinary: Angela Mccabe, who enjoys simple home‑cooked meals, frequently makes grilled cheese with sharp cheddar and sliced apple, loves spaghetti aglio e olio topped with fresh basil, and delights in
    preparing a weekend blueberry muffin using fresh berries and vanilla extract, though they sometimes skip breakfast when staying up late reading.
  core: Angela Mccabe, a methodical 12‑year‑old who thrives in solitary, curiosity‑driven pursuits— from coding quiet stories to cataloguing shells—while wrestling with worry‑induced stress, meticulous
    planning, and a penchant for cataloguing every detail of their world.
background:
  cultural: Angela grew up in a middle-class white family in Fountain Valley, a suburban community in Orange County, California. Her upbringing reflects typical American cultural values, with emphasis on
    education, community involvement, and participation in holidays such as Thanksgiving, Christmas, and the Fourth of July. Living in a diverse region, she has been exposed to a mix of cultures through
    school and local events, yet her household traditions are rooted in her family's Irish-English heritage, including storytelling, weekend family meals, and occasional participation in local community
    fairs and beach clean-ups.
