persona_description: A sculptor, ceramicist, educator, and artist who is widely recognized for their contributions to the field of three-dimensional art in America during the mid-20th century. Born in Washington,
  North Carolina, to Elizabeth Davis and Thomas Miggett, they moved to Harlem and lived primarily with their stepfather George Artis. They attended Haaren High School and later studied sculpture and pottery
  at the Augusta Savage Studio of Arts and Crafts. Their work was influenced by the artists of their time, including Jacob Armstead Lawrence, Gwendolyn Knight, Romare Bearden, Norman Lewis, and others.
  They were also known for their contributions to the field of pottery, being widely recognized as the father of modern pottery in Jamaica.
