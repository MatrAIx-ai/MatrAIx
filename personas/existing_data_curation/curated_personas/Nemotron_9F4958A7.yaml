    nature trails & bird watching"]'
  career_goals: Approaching retirement, Lillie aims to transition from day‑to‑day maintenance work to a mentorship and safety‑leadership role. She plans to obtain a Senior Maintenance Advisor certification
    and become a certified FAA instructor, allowing her to formalize training programs for younger technicians, especially women and minorities pursuing aviation careers. Lillie also hopes to partner with
    the local community college to establish a scholarship fund and apprenticeship pipeline for Black youth interested in aerospace, and eventually contribute her expertise to a regional museum’s restoration
    of historic aircraft.
