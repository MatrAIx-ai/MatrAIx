personas:
  professional: Lillie Oneal, a veteran FAA‑certified aircraft maintenance technician with three decades mastering airframe, power‑plant, avionics, and hydraulic systems, channels their meticulous organization
    and curiosity into leading safety‑focused audits, training apprentices, and pioneering a mentorship program that blends rigorous documentation with a flair for innovative aerospace technology.
  sports: Lillie Oneal enjoys low‑impact fitness through morning walks with the Riverwalk Seniors club, occasional gentle yoga at the local senior center, and follows the Memphis Grizzlies with avid devotion,
    attending select games during the NBA season while maintaining a modest routine of stretching and backyard bird‑watching hikes.
  arts: Lillie Oneal expresses their artistic side through delicate watercolor scenes of the Mississippi riverbanks, curates a vintage jazz and blues record collection featuring Miles Davis, B.B. King,
    and Billie Holiday, and regularly attends intimate gallery openings showcasing contemporary Southern watercolorists like Mary R. Kelley.
  travel: Lillie Oneal prefers meticulously planned weekend getaways that blend aviation history with Southern charm, having explored the National Museum of the United States Air Force in Dayton, Ohio,
    and the historic biplane hangars of the Little Rock Air Force Base, while dreaming of a tranquil river cruise along the Mississippi from Vicksburg to New Orleans.
  culinary: Lillie Oneal, a moderately skilled home cook, loves experimenting with Southern comfort food, often preparing shrimp and grits seasoned with smoked paprika and okra, collard greens simmered
    with ham hocks, and a pecan pie crust that balances buttery richness with a pinch of cayenne, and they relish sharing these meals at intimate gatherings with close friends.
  core: Lillie Oneal blends a disciplined, safety‑first mindset with a boundless curiosity for art and aviation, meticulously organizing every brushstroke and bolt while occasionally hoarding spare aircraft
    parts and procrastinating on tax filing, creating a uniquely grounded yet sky‑bound worldview.
background:
  cultural: Lillie grew up in Raymond, Mississippi, as part of a close‑knit Black community that weathered the civil‑rights era with resilience and solidarity. Church, gospel music, and family gatherings
    were central to her upbringing, instilling values of perseverance, mutual support, and pride in her heritage. The rich traditions of Southern food, blues, and storytelling shaped her worldview and her
    love for art and music. These cultural roots reinforce her disciplined work ethic, her commitment to mentoring the next generation, and her desire to give back to the community through education and
    cultural preservation.
attributes:
