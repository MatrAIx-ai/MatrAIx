personas:
  professional: Elias Goldman leverages his carpentry and budgeting expertise to coordinate volunteer projects at the local heritage museum, where his direct yet respectful communication style and pragmatic
    curiosity enable him to manage small renovation budgets while mentoring younger apprentices.
  sports: Elias Goldman enjoys early-morning fishing trips on Lake Pontchartrain with the Atchafalaya Anglers Association, maintains modest fitness through daily walks in the bayou, and follows the New
    Orleans Saints, New Orleans Pelicans, and LSU Tigers with a loyal but measured enthusiasm, preferring relaxed fan gatherings over intense workouts.
  arts: Elias Goldman spends Thursday evenings at Preservation Hall listening to the soulful improvisations of Wynton Marsalis and Diana Krall, draws design inspiration from the bold simplicity of George
    Rodrigue's Louisiana folk paintings, and frequently quotes passages from historian Doris Kearns Goodwin during informal book circles.
  travel: Elias Goldman prefers meticulously planned trips that blend low-key birdwatching in places like the Galapagos and Costa Rica with quiet cultural immersion in historic towns such as New Orleans
    and Charleston, opting for off-peak travel to stretch his modest retirement budget while dreaming of a future pilgrimage to New Zealand's South Island wetlands.
  culinary: Elias Goldman masters classic Cajun gumbo and jambalaya, layering andouille sausage, shrimp, okra, and home-grown tomatoes and bell peppers, while modestly perfecting a roux that rivals family
    recipes, and delights friends with a side of freshly baked cornbread.
  core: Elias Goldman blends a quiet, methodical mind with a love for birdsong, jazz, and the grain of wood, quietly chronicling family histories while occasionally hoarding spare change for a rainy day
    and obsessively polishing his tools late into the night.
background:
  cultural: Elias grew up in a second‑generation Southern white family in Baton Rouge, with deep‑rooted French‑Acadian (Cajun) ancestry. He was raised attending a United Methodist church and participates
    in regional traditions such as Mardi Gras parades, parish festivals, and community potlucks. The local culture of hospitality, a love for spicy Louisiana cuisine, and an appreciation for the area's
    diverse musical heritage—including zydeco, blues, and jazz—have shaped his values, daily rhythms, and his desire to contribute to the community.
attributes:
  skills: '["Carpentry", "General home maintenance", "Project budgeting and planning", "Volunteer coordination", "Basic computer skills (Microsoft Office)", "Genealogy and archival research", "Cajun cooking
