  career_goals: In the short term, Daniel aims to become a shift supervisor by completing a retail management certification and taking on extra responsibilities such as scheduling and loss‑prevention auditing.
    He plans to enroll in community‑college courses in business administration to supplement his hands‑on experience. Over the next five years, he aspires to manage an entire store, leveraging his curiosity
    for emerging retail technologies to introduce digital payment solutions and data‑driven merchandising. Ultimately, Daniel hopes to progress to a regional manager role or to own a small boutique where
    he can blend his practical expertise with his passion for community engagement and personalized customer experiences.
