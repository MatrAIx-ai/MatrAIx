  career_goals: John dreams of turning his love of building things into a career. He aspires to become a civil engineer or an agricultural‑technology designer who creates practical solutions for his hometown’s
    farms and infrastructure. He also hopes to stay connected to his community by coaching youth soccer or leading a local robotics club.
