personas:
  professional: John Smith, a twelve‑year‑old budding robotics enthusiast, blends his curiosity for new ideas with a practical knack for building LEGO‑based machines, leading his school’s science club projects
    and 4‑H animal‑care experiments with a collaborative yet assertive flair.
  sports: John Smith, an energetic midfielder on his middle‑school soccer team, cheers for the local professional club the Seattle Sounders and spends weekends fishing at Lake Sammamish, reflecting his
    love for team sport, outdoor activity, and community ties.
  arts: John Smith, an avid fan of the animated series Adventure Time and the music of Imagine Dragons, spends free time sketching comic panels inspired by his favorite sci‑fi novels and attending the local
    youth theater’s summer workshops.
  travel: John Smith, who has camped in the Adirondack Mountains and visited the Smithsonian National Air and Space Museum in Washington, D.C., dreams of backpacking through Japan’s cherry‑blossom season
    and prefers spontaneous road trips over meticulously planned vacations.
  culinary: John Smith, a budding kitchen helper, loves whipping up pepperoni pizza, building towering s’mores over a campfire, and experimenting with DIY gummy candy recipes using gelatin and fruit juice,
    while occasionally forgetting to clean up the kitchen mess.
  core: John Smith mixes boundless curiosity with laid‑back spontaneity, juggling LEGO robots, soccer drills, and video‑game adventures while occasionally losing track of homework deadlines and snack crumbs.
background:
  cultural: John grew up in Cherokee, a small town in western Iowa where Midwestern values shape daily life. His family’s heritage is primarily Northern European (German and Scandinavian) and they attend
    a local Lutheran church that emphasizes community service, modesty, and hard work. Rural life, seasonal farming cycles, local fairs, high school sports, and community gatherings like church potlucks
    and county fairs are integral parts of his upbringing, fostering his cooperative spirit, love of the outdoors, and practical mindset.
