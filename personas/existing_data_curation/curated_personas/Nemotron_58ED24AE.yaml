  career_goals: Although still in elementary school, Annetta dreams of a future where she can combine her love for art and technology. She imagines becoming a professional illustrator or visual designer
    for children's books and interactive media, perhaps one day creating immersive museum exhibits that blend storytelling with digital interactivity. Her competitive spirit fuels ambitions to win national
    art contests and science fairs, and she hopes to study environmental science later to contribute innovative ideas that protect the world she enjoys exploring.
