personas:
  professional: Annetta Ancheta, a budding junior designer, channels her love of drawing, Lego engineering, and puzzle‑solving into creating intricate storyboards and interactive games with Scratch, showing
    a methodical yet inventive mindset that balances organization with spontaneous creativity.
  sports: Annetta Ancheta, an enthusiastic sidewalk soccer player, joins the local Brooklyn Youth Soccer League in the spring, idolizes New York City FC, practices drills after school, and balances competitive
    spirit with a habit of sprinting to the ice‑cream stand during halftime.
  arts: Annetta Ancheta, a fervent young creator, spends afternoons sketching scenes inspired by the Brooklyn Museum’s contemporary exhibits, emulating the bold lines of Basquiat, humming along to Billie
    Eilish’s pop songs, and performing simple piano pieces by Beethoven’s “Für Elise” for family gatherings.
  travel: Annetta Ancheta, an adventurous seven‑year‑old, loves weekend trips to Coney Island’s amusement park, has explored the historic streets of Philadelphia on a school field trip, and dreams of visiting
    the natural wonder of Niagara Falls, always planning trips with a colorful map spread across her bedroom wall.
  culinary: Annetta Ancheta, a budding kitchen helper, enjoys assembling cheese‑pizza slices, mixing peanut butter with banana on toast, and experimenting with rainbow fruit kebabs of strawberries, grapes,
    and pineapple, yet often forgets to wash her hands before snack time.
  core: Annetta Ancheta blends fierce curiosity, artistic flair, and competitive drive into a bright, organized whirlwind of Lego builds, soccer sprints, and sketchbooks, all while occasionally hoarding
    snack crumbs in her desk drawer.
background:
  cultural: Annetta is a white American growing up in the vibrant, multicultural borough of Brooklyn, New York. Her family, rooted in the Northeastern United States, values education, community involvement,
    and exposure to the arts. They regularly participate in local after‑school programs, library story hours, and neighborhood art workshops. Brooklyn’s diverse population, street art, museums such as the
    Brooklyn Museum, and the city’s blend of cultural traditions have nurtured Annetta’s open‑minded thinking, appreciation for varied artistic expressions, and curiosity about the world.
