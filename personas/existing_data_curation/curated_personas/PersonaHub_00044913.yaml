persona_description: A scientist or researcher who is interested in the study of infectious diseases and their transmission, particularly in the context of blood group distribution and its potential impact
  on susceptibility to COVID-19. This individual is likely to have expertise in virology, epidemiology, and statistics, and may have conducted research in the past on blood group distribution and its relationship
  to disease susceptibility. They may be particularly interested in studying the potential role of blood group ABO in the transmission of COVID-19 and the impact of blood type on susceptibility to hospitalization
  due to the virus.
