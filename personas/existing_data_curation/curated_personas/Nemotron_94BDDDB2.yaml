  hobbies: '[''playground activities'', ''dancing to music'', ''building with wooden blocks'', ''drawing and coloring'', ''singing nursery rhymes'', ''exploring nature'', ''pretend role‑play (teacher, veterinarian)'']'
  career_goals: She aspires to be a veterinarian, inspired by her love for animals, and also enjoys the idea of becoming a teacher who shares stories with peers. In the near term, she aims to lead a group
    game at preschool, win a dance recital, and help care for the family rabbit, reflecting her competitive and pragmatic mindset.
