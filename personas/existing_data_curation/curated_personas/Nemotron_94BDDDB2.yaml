personas:
  professional: Josefina Jimenez, a 4-year-old budding LEGO architect, blends boundless curiosity with a practical eye for sturdy builds, and they prefer spontaneous free-play over rigid instructions, thrive
    on collaborative building sessions, often challenge peers to see who can construct the tallest tower, and stay unfazed by a wobbly structure.
  sports: Josefina Jimenez, who delights in dribbling a soft soccer ball with the Sunshine Tots Soccer Club in the spring and splashing through water with the Little Dolphins Swim Team in summer, cheers
    for the city's professional baseball squad the Tigers, and they love watching gymnastics on TV for inspiration.
  arts: Josefina Jimenez, an enthusiastic fan of The Wiggles and Raffi, spends afternoons singing along to Baby Beluga while scribbling colorful crayon portraits of their favorite Sesame Street characters,
    and they eagerly await the local puppet theater's weekly performances.
  travel: Josefina Jimenez, who has already explored the San Diego Zoo, splashed on the sandy shores of Florida's Gulf Coast, marveled at the lights of Paris on a family tour, and dreams of riding the rides
    at Tokyo Disneyland someday, they prefer spontaneous road trips over meticulously planned itineraries, and enjoy traveling with their parents and older cousin.
  culinary: Josefina Jimenez, a food-loving four-year-old who adores creamy macaroni and cheese, crunchy chicken nuggets, and peanut butter banana sandwiches sprinkled with honey, proudly helps stir batter
    for pancakes despite occasional flour clouds, and they insist on adding extra strawberry slices to their yogurt for extra sweet-ness.
  core: Josefina Jimenez is a curious, competitive 4-year-old who mixes spontaneity with a practical knack for problem-solving, they thrive in social play, and stay unflappable under pressure.
background:
  cultural: Josefina is raised in a Colombian household in Boone, Iowa. At home, Spanish is spoken alongside English, and the family celebrates Colombian traditions such as Día de los Reyes, enjoys dishes
    like arepas and empanadas, listens to cumbia and vallenato music, and participates in community events that feature Colombian dance and folklore. Her upbringing blends Colombian cultural values of family
    closeness, sharing meals, and Catholic celebrations with the Midwestern community environment.
attributes:
