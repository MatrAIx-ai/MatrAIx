personas:
  professional: Ellery Ruffin, a budding junior architect in the making, channels their love for bright colors and LEGO construction into imaginative building sketches, applying their methodical planning
    and curious problem‑solving to every play‑session.
  sports: Ellery Ruffin, an energetic member of the neighborhood “Little Strikers” soccer club, dashes across the local park field every Saturday, idolizes forward Lionel Messi’s dribbling, roots for the
    local professional baseball team the Chicago Cubs, and balances a playful love of swimming lessons at the community pool with a penchant for occasionally skipping warm‑ups.
  arts: Ellery Ruffin, a passionate young artist, fills sketchbooks with Mary Blair‑inspired pastel landscapes, sings along to Idina Menzel’s “Let It Go,” watches animated works by Pixar, and proudly displays
    homemade collages of glitter and macaroni, all of which shape their vivid imagination.
  travel: Ellery Ruffin, a curious explorer, loves spontaneous family trips to the nearby botanical garden and Disney World, dreams of visiting the Eiffel Tower in Paris, and prefers parents to handle itineraries
    while they pack a favorite stuffed animal and a sketchbook for each adventure.
  culinary: Ellery Ruffin, a picky‑but‑creative eater, devours mac and cheese with extra cheddar, dips carrot sticks in hummus, delights in strawberry‑filled pancakes topped with maple syrup, and occasionally
    tries to “cook” spaghetti using a toy kitchen set, though they often forget to wash their hands before meals.
  core: Ellery Ruffin, a six‑year‑old burst of imagination and relentless curiosity, can turn a stray sock into a superhero cape, forget to finish a coloring page, yet always returns with a fresh bundle
    of crayons and a new story to share.
background:
  cultural: Ellery is raised in a close‑knit African American family in Elizabeth, New Jersey, a city known for its cultural diversity. Her parents emphasize the importance of education, community involvement,
    and preserving family traditions. She celebrates milestones such as Juneteenth and Kwanzaa, participates in church choir rehearsals, and enjoys seasonal family gatherings that include soul‑food cooking,
    storytelling, and music. The local community center offers art workshops and youth programs, which she attends regularly, reinforcing both her cultural heritage and her connection to the broader multicultural
    environment of Union County.
