  career_goals: Although only six, Ellery already dreams big. She often says she wants to become an astronaut who can draw the planets she visits, a children’s book author and illustrator who shares her
    stories, or a teacher who helps other kids explore their own creativity. She also expresses a desire to be a community organizer, hosting art and story sessions for neighborhood children, reflecting
    her sociable and compassionate nature.
