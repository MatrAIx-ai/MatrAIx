  career_goals: Brian dreams of becoming a scientist—specifically an astronaut or a wildlife biologist—so he can explore space and protect animals. He also imagines designing simple inventions that make
    everyday tasks easier for his family and friends. As he grows, he hopes to help others learn, perhaps as a teacher who encourages curiosity and kindness.
