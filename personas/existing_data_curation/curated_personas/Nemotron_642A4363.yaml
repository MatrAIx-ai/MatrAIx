personas:
  professional: Brian Pompi, a seven‑year‑old aspiring engineer, channels curiosity and methodical planning into building intricate LEGO structures and creating simple Scratch programs, demonstrating a
    practical yet imaginative approach to problem‑solving.
  sports: Brian Pompi enjoys strolling through Riverside Park's nature trails, participates in the Little League baseball team called the Riverside Raccoons, and cheers for the Chicago Cubs and Chicago
    Bulls on weekends, preferring low‑key physical activities over high‑intensity sports.
  arts: Brian Pompi delights in sketching woodland animals inspired by the illustrations of Beatrix Potter, watches kid‑friendly documentaries narrated by David Attenborough, and listens to gentle acoustic
    tunes from Jack Johnson alongside classic Disney soundtracks such as "Circle of Life" from The Lion King.
  travel: Brian Pompi loves day trips to the nearby State Nature Preserve, has visited the Grand Canyon on a school field trip, and dreams of exploring the Kennedy Space Center in Florida to see real rockets
    up close, favoring planned itineraries that include museum visits over spontaneous beach outings.
  culinary: Brian Pompi favors mac and cheese with crunchy breadcrumb topping, enjoys building his own mini pizzas using LEGO‑shaped cookie cutters, and snacks on apple slices with peanut butter, while
    occasionally indulging in sugary gummy bears despite a parental rule limiting sweets.
  core: Brian Pompi is a meticulously organized, curious seven‑year‑old whose solitary pursuits and gentle kindness are balanced by a persistent worry about the unknown, leading to both thoughtful creation
    and occasional over‑cautiousness.
background:
  cultural: Brian was raised in a middle‑class white family in San Antonio, Texas. His household celebrates typical American holidays such as Thanksgiving and Independence Day while also participating in
    local Texan traditions like visits to the River Walk, enjoying Tex‑Mex cuisine, and attending community events during Fiesta San Antonio. The multicultural atmosphere of the city provides occasional
    exposure to Spanish language and diverse cultural celebrations. His family values community involvement, modest Texan customs, and a cooperative, respectful approach to others.
