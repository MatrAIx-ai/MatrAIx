  career_goals: Maria aims to transform her passion for quiet, art-infused hospitality into a small, boutique bar that doubles as a local art gallery and a calm retreat for solitary patrons. She hopes to
    develop a reputation for unique, locally-sourced cocktails that reflect Oregon’s terroir, and eventually mentor other bartenders in creative mixology through workshops or a community-focused cocktail
    series. In the longer term, she envisions opening a low-key café-wine bar that offers curated art exhibitions and a quiet space for reading and contemplation.
