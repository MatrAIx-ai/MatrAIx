  career_goals: Biaggio aims to advance to a detective position within the Leon County Sheriff's Office, focusing on a specialized unit such as narcotics or homicide. He also aspires to lead community-engagement
    initiatives that bridge law enforcement with the local arts scene, perhaps creating an outreach program that uses art workshops to foster dialogue and trust. In the longer term, he envisions becoming
    a sergeant or lieutenant where he can mentor younger officers and shape policy that emphasizes compassion, cooperation, and innovative problem-solving.
