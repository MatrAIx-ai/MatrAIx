  career_goals: Poonam aims to transition from specialist to senior program manager within the next three years, overseeing multi-year, cross-industry initiatives that integrate technology and sustainability.
    She aspires to lead a PMO and shape organizational project governance, championing agile-lean practices that encourage creative problem-solving. Parallel to her professional growth, she plans to earn
    the PMP and Lean Six Sigma Black Belt certifications, and to mentor emerging women project managers, especially those from under-represented South-Asian backgrounds. Long-term, she envisions founding
    a boutique consultancy that helps mid-size companies embed socially responsible and culturally inclusive project frameworks.
