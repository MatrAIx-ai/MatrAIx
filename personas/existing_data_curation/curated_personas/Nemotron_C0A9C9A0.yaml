personas:
  professional: Poonam Durairaj, a 36‑year‑old project management specialist with a graduate business degree, leverages Agile, Scrum, and Lean Six Sigma to orchestrate complex, cross‑industry initiatives
    while their curiosity and meticulous yet adaptable mindset fuels a drive toward senior program management and future PMO leadership.
  sports: Poonam Durairaj blends steady fitness with fan enthusiasm, practicing yoga three times weekly, running the Schuylkill River Trail with a small running group, cheering the Philadelphia Eagles and
    76ers, and joining a co‑ed tennis league each spring.
  arts: Poonam Durairaj immerses themselves in the arts, frequenting the Philadelphia Museum of Art to sketch watercolors inspired by contemporary installations by Olafur Eliasson and Yayoi Kusama, while
    devouring literary fiction such as Donna Tartt's "The Goldfinch" and design thinking works by Tim Brown, and finding solace in the music of Nick Drake and Sufjan Stevens during quiet evenings.
  travel: Poonam Durairaj favors curated weekend escapes, often trekking the verdant trails of the Pocono Mountains, savoring the historic charm of Washington, D.C., and dreaming of a solo cultural pilgrimage
    to Kyoto, balancing a love for nature with a carefully planned itinerary that respects a modest travel budget and professional commitments.
  culinary: Poonam Durairaj is a self‑taught home chef who experiments with aromatic spice blends, crafting dishes like a herb‑infused lentil stew with locally sourced kale, a spiced cauliflower rice bowl
    paired with mango chutney, and a pan‑seared salmon tossed in a citrus‑pomegranate glaze, while their balcony garden of basil, mint, and rosemary supplies fresh herbs for daily cooking.
  core: Poonam Durairj balances a detail‑oriented project management career with an artistic, introspective lifestyle, using structured routines and creative outlets to navigate anxiety and channel curiosity.
background:
  cultural: As a second-generation South-Asian (Tamil) American, Poonam grew up in a bilingual household where Tamil and English were spoken interchangeably. Family gatherings centered around traditional
    Hindu festivals such as Diwali, Pongal, and Navaratri, celebrated with homemade sweets, rangoli, and community service at the nearby Edison Hindu temple. These cultural foundations coexist with her
    American upbringing in New Jersey, giving her a nuanced perspective that values both collectivist family loyalty and individual career ambition. Her dietary preferences reflect vegetarian roots, yet
    she appreciates diverse cuisines, often sharing her culinary experiments with friends in the multicultural Burlington County area. Poonam's cultural identity informs her collaborative style—emphasizing
    respect, inclusivity, and a willingness to bridge differing viewpoints.
