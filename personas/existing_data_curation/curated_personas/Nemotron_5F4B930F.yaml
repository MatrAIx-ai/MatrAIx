  career_goals: Lauryn aims to move into a supervisory role on the production floor within the next two years, targeting a shift‑lead position that leverages her expertise in safety and quality. She plans
    to complete a GED and enroll in an associate‑degree program in industrial technology to broaden her technical knowledge, eventually aspiring to become a plant manager or a certified trainer for new
    operators. Financial stability and the ability to provide a secure future for herself after her divorce motivate her to pursue these advancements while mentoring newer team members.
