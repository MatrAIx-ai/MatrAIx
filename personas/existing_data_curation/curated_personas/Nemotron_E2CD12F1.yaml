personas:
  professional: Luis Escobar, a one‑year‑old with a clear preference for structure, already shows an early fascination with sorting toys by shape and color, hinting at a future career in organization‑focused
    fields such as logistics or data management; they display an unusually methodical approach for their age.
  sports: Luis Escobar, a one‑year‑old who prefers solitary play, races his crawling sibling to the plush ball with a competitive spark, and enjoys watching short clips of the local minor‑league baseball
    team, although they rarely join large playgroups.
  arts: Luis Escobar, a one‑year‑old who finds solace in soft lullabies by the classic singer Andrea Bocelli and bright, rhythmic nursery rhymes from 'Sesame Street', they often spend solitary moments drawing
    with thick crayons, showing a quiet appreciation for gentle melodies and bold colors.
  travel: Luis Escobar, a one‑year‑old who thrives on routine, enjoys short car rides to the nearby grandparents' home and the familiar scent of the local park, yet they become uneasy when faced with unfamiliar
    airports, preferring well‑planned weekend trips to the beach over spontaneous adventures.
  culinary: Luis Escobar, a one‑year‑old with a practical palate, prefers smooth pureed carrots, ripe bananas, and avocado, avoids spicy or highly textured foods, and insists on having the same spoon and
    bowl each feeding; they reflect a desire for predictability in meals.
  core: Luis Escobar, a one‑year‑old who combines a love for order, early competitive spirit, and a sensitive disposition, navigates daily life with meticulous routines, cautious curiosity, and occasional
    bouts of fussiness; they embody a tiny yet determined personality.
background:
  cultural: 'Luis was born in San Pablo, California, to Guatemalan parents who maintain a bilingual household. Spanish is spoken at home, while English is used in school and the community. He grows up surrounded
    by Guatemalan traditions: family gatherings feature pupusas, tamales, and sweet atol; celebrations of Día de los Muertos include colorful altars and marigold decorations; and festive music from the
    marimba fills many holidays. The close‑knit family structure and communal values of his heritage influence his reserved demeanor, his comfort with small groups, and his sense of responsibility toward
    family expectations.'
