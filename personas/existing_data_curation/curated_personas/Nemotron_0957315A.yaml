  career_goals: William often says he wants to be an artist who can draw the world’s most amazing places, and he imagines turning his pictures into storybooks for other kids. He also talks about becoming
    an astronaut who can explore space and draw the planets he discovers. His biggest ambition is to use his art to make people happy and to share his ideas with friends and family.
