personas:
  professional: Addie Hodge is an administrative specialist turned aspiring office manager who leverages meticulous document preparation, Canva design flair, and flexible problem‑solving to keep nonprofit
    executives thriving, even as a relaxed attitude toward strict schedules sometimes leaves them juggling last‑minute changes.
  sports: Addie Hodge finds renewal on weekend hikes through the bayous and gentle yoga sessions, while cheering on the LSU Tigers on football Saturdays and the New Orleans Pelicans during the NBA season,
    and they belong to the Ruston Bayou Birdwatchers Club, which meets monthly for low‑key bird‑spotting outings.
  arts: Addie Hodge immerses themselves in abstract painting inspired by the bold colors of Romare Bearden, attends Ruston Community Theater productions, and draws creative energy from the soulful sounds
    of Etta James, the improvisational jazz of Miles Davis, and the contemporary poetry of Tracy K. Smith.
  travel: Addie Hodge prefers spontaneous weekend road trips with a loose itinerary, often heading to New Orleans for its vibrant music scene, the historic streets of Savannah for a quiet Saturday, or the
    Southwest Louisiana bayous for birdwatching, while dreaming of a future cultural pilgrimage to Marrakech but balancing travel with family commitments and a modest budget.
  culinary: Addie Hodge enjoys experimenting in the kitchen, skillfully twisting family gumbo with smoked paprika and fresh okra, crafting jambalaya with Andouille sausage and quinoa, and perfecting sweet‑potato
    pie infused with bourbon, all while sharing these plates at neighborhood potlucks.
  core: Addie Hodge is a creatively restless, community‑driven organizer who balances admin precision with a love for art, cuisine, and spontaneous adventure, all while wrestling with occasional disorganization
    and a skeptical eye toward others' motives.
background:
  cultural: Addie grew up in a close‑knit African‑American family in the rural South, where church, music, and food shaped her identity. Raised in a historically Black congregation, she sang in the gospel
    choir and learned traditional Louisiana dishes from her grandmother, blending Creole flavors with Southern soul cuisine. The cultural rhythm of jazz, blues, and storytelling instilled a deep appreciation
    for artistic expression and communal resilience. In Ruston, she remains active in local Juneteenth celebrations, volunteers at the North Louisiana Historical Society to preserve African‑American heritage,
    and mentors youth through after‑school art programs. Her background informs her values of perseverance, community service, and a keen awareness of the social dynamics that influence trust and collaboration.
attributes:
  skills: '[''Office administration'', ''Calendar management'', ''Travel coordination'', ''Document preparation'', ''Data entry'', ''Microsoft Office Suite'', ''Google Workspace'', ''Basic graphic design'',
    ''Event planning'', ''Customer service'', ''Internal communication'', ''Record keeping'', ''Problem solving'', ''Project coordination'', ''Workflow automation tools'']'
  hobbies: '[''Abstract painting'', ''Sketching'', ''Speculative fiction reading'', ''Poetry writing'', ''Visiting art galleries'', ''Community theater volunteering'', ''Soul‑food cooking experiments'',
    ''Birdwatching'', ''Bayou hiking'', ''Yoga'', ''Genealogy research'', ''Book club participation'']'
  career_goals: Addie aims to formalize her expertise by earning a Certified Administrative Professional (CAP) credential within the next two years and to move into an office manager or senior executive
    assistant role at a regional nonprofit or cultural organization. She is eager to lead initiatives that integrate her administrative acumen with her passion for the arts, such as coordinating community
    art festivals or museum outreach programs. Long‑term, she envisions launching a small consulting service that helps local small businesses and cultural groups improve their administrative efficiency
    while infusing creative branding. Her competitive drive pushes her to be recognized as the go‑to organizer in her community, and she hopes to mentor younger staff members, especially women of color,
    to advance in the field.
