  career_goals: Emilia aims to move into a supervisory role on the production floor within the next few years, where she can mentor newer workers and apply her curiosity for process improvement. She is
    interested in obtaining a Six Sigma Green Belt or an OSHA trainer certification to solidify her expertise. While she values flexibility and dislikes rigid schedules, she hopes to achieve a more stable
    income that would allow her to explore a side venture—such as creating and selling handcrafted home décor—providing both financial security and a creative outlet. Reducing her workplace stress and emotional
    overwhelm is also a personal goal, so she plans to transition to a role with fewer physical demands and more predictable hours.
