persona_description: A historian and genealogist who is particularly interested in the history of African American cemeteries, particularly those related to the Underground Railroad and Civil Rights movements.
  They are also knowledgeable about landscape architecture and the work of Adolph Strauch. They are interested in the burial grounds of prominent African Americans and the contributions of individuals buried
  there, such as William H. Beckley, John Isom Gaines, and Priscilla Jane Thompson. They are also interested in the history of the United Colored American Association and the transfer of ownership of the
  cemetery to the Union Baptist Church.
