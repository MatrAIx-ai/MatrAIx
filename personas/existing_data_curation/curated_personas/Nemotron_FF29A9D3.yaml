personas:
  professional: Stephanie Clary, a 34‑year‑old HR specialist at a mid‑size New York firm, blends data‑driven workforce analytics on Workday with a humanities‑inspired knack for storytelling to design employee
    engagement and wellness programs, mediate conflicts, spearhead DEI initiatives, and they energize training workshops with an improv‑honed, talkative presence.
  sports: Stephanie Clary, a regular at a downtown yoga studio and a dedicated Central Park runner who logs weekly distance on a Strava app, enthusiastically follows the New York Knicks and New York City
    FC, and they join a co‑ed recreational volleyball league each summer to blend social interaction with cardio.
  arts: Stephanie Clary fills evenings with improv comedy at the Upright Citizens Brigade, open‑mic storytelling at local cafés, and a book club that dissects contemporary fiction by Sally Rooney, philosophical
    essays by Alain de Botton, and psychology texts by Daniel Kahneman, while they find inspiration in Lin‑Manuel Miranda’s lyrical theater and the avant‑garde installations at MoMA.
  travel: Stephanie Clary plans meticulously for cultural European getaways—such as a museum‑focused week touring the British Museum, the Louvre, and the Uffizi—while leaving room for spontaneous coffee
    stops on Paris’s Left Bank, prefers short‑haul flights to maximize work‑life balance, and they dream of exploring the historic streets of Prague and the monuments of Athens on future trips.
  culinary: Stephanie Clary, an enthusiastic foodie, regularly attends ramen‑making workshops, perfects homemade shakshuka with fresh cumin and preserved lemons, relishes truffle‑infused mushroom pizza
    and matcha‑glazed salmon at top New York eateries, yet they often overorder brunch platters when gathering with friends, leading to lingering leftovers they reluctantly consume later.
  core: Stephanie Clary is a sociable HR strategist whose relentless curiosity fuels innovative workplace wellness while their anxiety fuels late‑night self‑help podcasts and they often overcommit to social
    events.
background:
  cultural: Stephanie identifies as a white American with roots in the Northeastern United States, growing up in a suburban community near New York City. Her family heritage includes European ancestry,
    predominantly Irish and Italian, which instilled a respect for tradition and community gatherings. Living and working in Manhattan has exposed her to a richly multicultural environment, shaping a progressive
    worldview that values diversity and inclusion. She enjoys city cultural institutions—museums, theaters, and galleries—and incorporates these experiences into her personal and professional life. Her
    upbringing emphasized education, empathy, and social responsibility, aligning with her current commitment to fostering harmonious, supportive workplaces.
attributes:
