    and communication'', ''Event planning'', ''Mental health first aid'']'
  hobbies: '[''Improv comedy and storytelling'', ''Public speaking at networking events'', ''Reading contemporary fiction, philosophy, and psychology'', ''Monthly book club'', ''Exploring NYC food scene
    and cooking classes'', ''Yoga and meditation'', ''Volunteering at a mental‑health helpline'', ''Travel to cultural museums and historic sites in Europe'']'
  career_goals: Stephanie aims to advance into an HR Manager role within the next two years, overseeing employee experience and wellbeing at a mid‑size New York firm. She plans to earn the SHRM‑Senior Certified
    Professional (SHRM‑SCP) credential and later pursue a Master's in Organizational Psychology. Her long‑term ambition is to become a Chief People Officer who integrates robust mental‑health support systems
    into corporate culture. Additionally, she hopes to mentor junior HR staff, champion inclusive hiring practices, and eventually launch a boutique consultancy that helps organizations build compassionate,
    high‑performing workplaces.
