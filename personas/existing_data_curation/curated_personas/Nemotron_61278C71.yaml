  career_goals: Even at her young age, Michelle enjoys imagining future roles that let her nurture and organize the world around her. She often says she wants to become a teacher who creates a calm, structured
    classroom where every child feels valued, or a caregiver for animals, inspired by her family's occasional visits to a local farm. Her ambitions are grounded in kindness and a desire to maintain harmony,
    and she looks forward to growing up in an environment where she can eventually combine her love of routine with the flexibility to explore new interests.
