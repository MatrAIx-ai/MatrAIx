personas:
  professional: Michelle Ahmad, a two‑year‑old mini‑architect in her playroom, constructs block towers with meticulous order, showing early spatial reasoning and a penchant for predictable outcomes, while
    also happily improvising when a piece falls, reflecting a blend of structure and flexibility.
  sports: Michelle Ahmad, a toddler who loves the swings at the local park, attends a 'Tiny Tots Soccer' class on Saturday mornings, cheering for the hometown baseball team, the Boston Red Sox, and delighting
    whenever the team scores, while also enjoying swimming lessons at the community pool during summer.
  arts: Michelle Ahmad adores the animated melodies of Disney’s 'Let It Go' and the cheerful folk tunes of Raffi, often dancing to 'Baby Shark,' and she delights in picture books by Dr. Seuss, suggesting
    a budding appreciation for bright visual art and simple musical storytelling.
  travel: Michelle Ahmad’s favorite trips include weekend visits to Grandma’s cottage in the countryside, a thrilling day at the San Diego Zoo, and a family vacation to Disney World, where she prefers the
    calm of slow‑moving attractions over the chaos of rides, showing a love for predictable yet magical experiences.
  culinary: Michelle Ahmad is a picky eater who loves creamy mac and cheese, soft banana slices, and crunchy carrot sticks dipped in ranch, often insisting on food being cut into bite‑size squares and humming
    a tune while she self‑feeds, yet she occasionally sneaks a bite of the cookie jar when no one watches.
  core: Michelle Ahmad is a two‑year‑old who thrives on routine yet embraces spontaneous play, balances kindness with occasional worry, and displays a charming mix of structured block building, mindful
    saving, and a sweet tooth for mac‑and‑cheese.
background:
  cultural: Michelle comes from a white ethnic background, but her family carries the surname Ahmad, reflecting a blend of cultural influences. At home, there are occasional touches of Middle Eastern heritage,
    such as hearing a few words in Arabic during family gatherings and celebrating diverse holidays alongside typical New England traditions like Thanksgiving and holiday parades. Living in Farmington,
    CT, she experiences a suburban, community‑focused lifestyle that values education, seasonal festivities, and a mix of cultural perspectives, fostering her awareness of both her own roots and the broader
    multicultural environment.
