  hobbies: '[''Watercolor painting'', ''Collage making'', ''Quilting'', ''Embroidery'', ''Traditional Spanish cooking'', ''Reading classic literature'', ''Gardening'', ''Church choir participation'', ''Senior-center
    bingo and card games'', ''Spanish folk dance'', ''Storytelling circles'', ''Genealogy research'']'
  career_goals: Although retired, Mary aims to preserve and share her Spanish heritage by establishing a bilingual oral‑history archive of Spanish families in Bamberg and organizing a monthly Spanish cultural
    night featuring music, dance, and cuisine. She wishes to mentor younger volunteers in arts and crafts, write a memoir that weaves personal memories with cultural anecdotes, and advocate for senior mental‑health
    resources within her community. Continuing to learn new artistic techniques and staying mentally active are also central to her personal ambition.
