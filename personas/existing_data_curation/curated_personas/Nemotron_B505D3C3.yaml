  hobbies: '[''Pickup basketball'', ''Video gaming (sports and strategy)'', ''DIY electronics and Arduino projects'', ''Cooking (Caribbean and Southern cuisine)'', ''Listening to hip‑hop, R&B, jazz'', ''Walking
    tours of Boston historic sites'', ''Reading urban fiction'', ''Attending community cultural festivals'']'
  career_goals: Muhamed is currently focused on securing a stable career path that leverages his practical strengths. He plans to enroll in a community‑college apprenticeship program in HVAC or electrical
    maintenance within the next year, aiming to earn a certification that will open doors to steady employment with the city’s public works department or a local contractor. In the longer term, he aspires
    to become a lead technician or facilities manager, eventually overseeing a small team and contributing to neighborhood improvement projects. He also hopes to complete a GED if needed, obtain a modest
    loan to purchase a reliable vehicle, and later purchase his own home. Parallel to his professional goals, he wishes to mentor younger teens in his community, sharing his experience with structured goal‑setting
    and job‑readiness skills.
