personas:
  professional: Muhamed Jones is a budding HVAC technician‑in‑training who leverages his hands‑on mechanical aptitude, meticulous inventory management from retail work, and strong customer‑service skills
    to thrive in the structured, fast‑paced environment of city public works.
  sports: Muhamed Jones is a regular at the West Roxbury YMCA basketball courts, follows the Boston Celtics and Boston Bruins with fervor, and participates in a local 5‑on‑5 rec league that blends social
    camaraderie with cardio fitness.
  arts: Muhamed Jones immerses themselves in the beats of hip‑hop artists such as Kendrick Lamar and J. Cole, the smooth R&B tones of H.E.R., the improvisational jazz of Miles Davis, and the vivid narratives
    of urban fiction writers like Zane Chase, while frequently attending Boston’s community cultural festivals for live music and spoken‑word performances.
  travel: Muhamed Jones favors budget‑friendly, self‑planned road trips and walking tours, having explored Boston’s historic Beacon Hill, the Freedom Trail, and nearby Salem, and now dreams of a weekend
    getaway to New Orleans for its jazz heritage and a summer vacation to the Dominican Republic to sample island cuisine.
  culinary: Muhamed Jones, an enthusiastic home cook, frequently prepares jerk chicken with mango salsa, spicy collard greens, and Sunday‑style fried catfish with hushpuppies, showcasing an intermediate
    skill level aided by a well‑stocked spice rack featuring all‑spice, scotch bonnet peppers, and smoked paprika.
  core: Muhamed Jones is a practical, community‑oriented 23‑year‑old who balances a love of hands‑on tech, competitive basketball, and soulful music while meticulously planning their future and occasionally
    staying up late gaming.
background:
  cultural: Muhamed is a Black American raised in West Roxbury, a suburban district of Boston with a diverse yet predominantly white population. His family’s heritage blends Caribbean (Jamaican) roots from
    his mother’s side and African (Nigerian) ancestry from his father’s side, which fosters a rich cultural mix of music, food, and traditions at home. Growing up, he attended a local public high school
    where he participated in the school’s basketball team and joined a community center after‑school program that emphasized academic support and mentorship for minority youth. He regularly visits the nearby
    mosque where he observes Ramadan, reflecting his personal interest in Islam, while also staying connected to the historically Black church community through family gatherings. The city’s vibrant African‑American
    history—in neighborhoods like Roxbury and Dorchester—has shaped his awareness of civil‑rights legacies and community activism. His cultural identity is thus a blend of his family’s Caribbean and African
    customs, the broader Boston Black experience, and the everyday suburban environment of West Roxbury.
attributes:
  skills: '[''Basic computer literacy (Microsoft Office, Google Workspace)'', ''Cash handling and inventory management'', ''Customer service'', ''Mechanical troubleshooting (automotive, household)'', ''Time
