persona_description: A veterinarian with expertise in the management and treatment of rats. The individual has extensive experience in diagnosing and treating kidney diseases in rats, as well as in the
  use of dietary supplements and medications to manage these conditions. They are knowledgeable about the importance of exercise, socialization, and environmental factors in maintaining the health of rats.
  They are also aware of the dangers of mold toxins and the importance of selecting pet foods that are free of them.
