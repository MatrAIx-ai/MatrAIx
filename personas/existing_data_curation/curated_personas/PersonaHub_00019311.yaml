persona_description: A social justice advocate and education expert who has conducted extensive research on the use of avatars in STEM education, particularly in the context of educational technology and
  game design. They have developed a custom platform called MazeStar that allows students to explore their own ideas through customized games while learning about human-computer interaction, web design,
  privacy, coding, debugging, and more. The author has also formulated several best practices and guidelines for the use of avatars in education, and has systematically explored the impacts of different
  avatar types on users, including distinctions between anthropomorphic vs. non-anthropomorphic avatars, user likeness vs. non-likeness avatars, and other conditions informed by insights from the learning
  sciences and sociology. The author has used qualitative, quantitative, and AI/machine learning analysis techniques to study the effects of avatars on student performance and engagement in STEM education.
