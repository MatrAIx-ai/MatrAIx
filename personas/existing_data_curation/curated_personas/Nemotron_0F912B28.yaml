personas:
  professional: Sonia Miller, a retired senior‑center volunteer with an associate’s degree in business administration, blends her practical bookkeeping skills and calm conflict‑resolution style to orchestrate
    weekly quilting circles, community garden fundraisers, and church socials, favoring clear structures while allowing enough flexibility for the spontaneous stories and tea‑time chats that keep the events
    lively.
  sports: Sonia Miller stays active by walking with a historic‑site group that meets twice weekly, cheering on the Utah Jazz during occasional senior‑center viewings and supporting the local high‑school
    track team, while she occasionally joins gentle yoga classes at the senior center to balance her love of structured activity with flexibility for her joints.
  arts: Sonia Miller immerses herself in creative expression through a weekly quilting circle where she recreates vintage folk‑dance patterns, sings in her church choir performing hymns by the Tabernacle
    Choir, enjoys reading historical fiction by authors like Larry McMurtry, and occasionally listens to folk guitarist John Denver while crocheting, letting music and literature shape her leisure.
  travel: Sonia Miller dreams of road‑tripping with her grandchildren to Zion and Bryce National Parks, meticulously planning each stop on a paper map while also leaving room for spontaneous detours to
    historic pioneer towns, and she occasionally revisits family roots by traveling to the river valleys of her grandparents’ early homestead.
  culinary: Sonia Miller, an adept home cook, regularly prepares her signature honey‑lavender chicken and peach cobbler for potluck gatherings, delights in preserving garden tomatoes and apricots in jars,
    enjoys moderate skill at baking but habitually adds an extra spoonful of honey for comfort, and savors the social ritual of sharing meals with neighbors.
  core: Sonia Miller is a community‑oriented elder whose love of structure, worry‑prone heart, and penchant for quilting, gardening, and storytelling blend into a life of gentle stewardship, occasional
    over‑planning, and an unshakable devotion to sharing heritage with others.
background:
  cultural: Sonia is a white American whose life has been shaped by the mid‑century Mormon culture of Ogden, Utah. Born in 1939, she grew up during World War II rationing and the post‑war boom, experiencing
    the strong family‑centric, service‑oriented values of the Church of Jesus Christ of Latter‑day Saints. Her family celebrated Pioneer Day, participated in ward service projects, and emphasized self‑reliance,
    modesty, and community cohesion. German and Scandinavian ancestors who were early settlers of the Weber County region contributed to family traditions like homemade preserves, folk dances, and a reverence
    for the local mountains. These cultural threads inform Sonia’s love of communal gatherings, stewardship of the land, and dedication to preserving and sharing the stories of her heritage.
