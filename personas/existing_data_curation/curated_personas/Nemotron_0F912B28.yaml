  career_goals: Although retired, Sonia’s ambitions focus on personal fulfillment and community contribution. She aims to stay physically and mentally healthy through daily walks in the Ogden River Canyon
    and regular mindfulness exercises to ease her natural tendency toward worry. Sonia is determined to compile a family memoir that blends her own life story with the oral histories of her Utah pioneer
    ancestors, hoping to publish it as a small community‑focused booklet. She also aspires to become a mentor for younger volunteers at the senior center, teaching them event‑planning basics and the art
    of preserving local heritage. A long‑standing wish is to travel with her grandchildren to Utah’s national parks, especially Zion and Bryce, creating shared memories while staying connected to the landscape
    that shaped her upbringing.
