  career_goals: Looking ahead, Manuel aims to transition into a nurse educator role within a community college or hospital training program, where he can combine his practical expertise with his curiosity
    for new teaching methods. He plans to obtain a certification in gerontological nursing and to lead community outreach initiatives that address health disparities among Puerto Rican seniors in the Worcester
    County area. Over the next five years, he hopes to take on a charge‑nurse or supervisory position, allowing him to influence care protocols while maintaining the flexible schedule he values for family
    time. Ultimately, he envisions a gradual shift toward part‑time consulting, helping agencies develop culturally responsive care plans before fully retiring.
