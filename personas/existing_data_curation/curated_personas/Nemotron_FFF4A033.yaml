personas:
  professional: Richard Ulibarri, a 5-year-old who channels their curiosity and methodical nature into leading a weekly LEGO building club at the local community center, plans each session down to the color
    palette, and reliably ensures every participant has a chance to showcase their creation.
  sports: Richard Ulibarri, a 5-year-old who passionately plays forward for the Little League Tigers soccer team, attends weekly gymnastics classes at the neighborhood club, and cheers for the Chicago Cubs
    while wearing their cap during family movie nights, balancing high-energy bursts with occasional calm puzzle time.
  arts: Richard Ulibarri, a 5-year-old who delights in drawing vivid dinosaurs after watching National Geographic Kids, imitates the playful tunes of children’s musician Raffi, and frequently reenacts scenes
    from Disney’s Frozen starring Idina Menzel, letting these artistic influences shape their imaginative play.
  travel: Richard Ulibarri, a 5-year-old with an adventurous spirit who loves family road trips to the Grand Canyon, weekend visits to the local aquarium, and dreams of seeing the Eiffel Tower in Paris,
    prefers meticulously planned itineraries with picture books for each stop while occasionally demanding a plush toy as a travel companion.
  culinary: Richard Ulibarri, a 5-year-old who favors cheesy macaroni, peanut butter and jelly sandwiches, and strawberry-banana smoothies, enjoys helping stir the batter for chocolate chip cookies with
    a tiny wooden spoon, and stubbornly insists on sprinkling extra cinnamon on oatmeal despite parental reminders.
  core: Richard Ulibarri, a 5-year-old whose bright curiosity, orderly mind, and boundless energy turn every LEGO set into a strategic project, every piggy bank into a financial lesson, and every playground
    swing into a test of resilience, all while occasionally forgetting to put on shoes before heading out.
background:
  cultural: Richard grows up in a middle‑class, predominantly white community in Arvada, Colorado. His family embraces the broader American cultural values of independence, curiosity, and community involvement,
    while also enjoying the outdoor lifestyle that Colorado offers, such as hiking, park visits, and occasional trips to the mountains. He attends a local preschool where multicultural stories and inclusive
    play are part of the curriculum, and his family celebrates typical holidays like Thanksgiving and the Fourth of July, often incorporating local traditions such as community fairs and seasonal outdoor
    activities.
