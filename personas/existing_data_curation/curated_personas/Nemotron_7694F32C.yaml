personas:
  professional: A budding naturalist and future wildlife explorer, Michael Flanders blends their love of adventure books with practical problem-solving skills, often sketching animal habitats while building
    detailed LEGO ecosystems, showing a structured yet flexible approach to learning.
  sports: An enthusiastic member of the neighborhood youth soccer team, the Timberwolves, Michael Flanders practices on Saturdays, cheers for the national team during televised matches, and delights in
    weekend hikes through the woods, though sometimes skips a drill to finish a LEGO build.
  arts: A creative sketcher of wildlife, Michael Flanders idolizes illustrator Beatrix Potter, enjoys the animated films of Hayao Miyazaki, and sings along to the pop tunes of Taylor Swift while assembling
    intricate LEGO scenes, letting artistic expression shape their playtime.
  travel: A curious weekend explorer, Michael Flanders has trekked the nearby state park, visited the city's natural history museum, and dreams of joining a family trip to the Grand Canyon, favoring spontaneous
    nature walks over meticulously planned vacations.
  culinary: A budding home-chef, Michael Flanders loves making cheesy macaroni, crafting peanut-butter banana smoothies, and experimenting with carrot-shaped LEGO-themed snacks, yet often sneaks extra chocolate
    chips into their cookies despite a promise to limit sweets.
  core: Michael Flanders is a compassionate, structure-loving nine-year-old who blends a love of wildlife, LEGO building, and soccer into a curious, slightly disorganized but deeply caring everyday adventure.
background:
  cultural: Michael grows up in Lexington, South Carolina, a community with deep Southern traditions. His family attends a local church, participates in Sunday services, and joins church youth activities.
    He experiences Southern hospitality through neighborhood barbecues, high‑school football games, and family gatherings centered around home‑cooked meals like fried chicken and sweet tea. The region's
    emphasis on community, respect for nature, and outdoor recreation shapes his love for exploring woods, caring for animals, and valuing personal relationships. These cultural influences blend with his
    compassionate, cooperative nature, fostering a strong sense of belonging and responsibility toward his neighbors.
