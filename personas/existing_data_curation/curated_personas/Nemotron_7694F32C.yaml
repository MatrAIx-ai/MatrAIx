    ''Volunteer reading at library'']'
  career_goals: Michael dreams of a future where he can help others every day. He hopes to become a teacher who inspires curiosity and kindness in young minds, or a veterinarian who cares for animals. In
    the short term, he wants to maintain strong grades, join the school’s peer‑tutoring program, and volunteer at the local animal shelter. He imagines someday leading community projects that combine education
    and animal welfare.
