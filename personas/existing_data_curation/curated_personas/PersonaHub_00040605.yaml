persona_description: A Romanian historian who specializes in the study of Romanian history, particularly the period from the Romanian Revolution of 1848 to the Romanian Revolution of 1989. He is particularly
  interested in the history of Transylvania and the role of the Romanian Orthodox Church in the state's affairs. His research interests include, but are not limited to, the development of Romanian national
  identity, the role of religion in state affairs, and the history of the Romanian Revolution of 1848. He is also interested in the history of the Romanian state's relations with Austria-Hungary, Serbia,
  Ukraine, Bulgaria, and the Ottoman Empire.
