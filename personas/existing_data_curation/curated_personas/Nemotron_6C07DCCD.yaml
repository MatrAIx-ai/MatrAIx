    ''Time management and scheduling'', ''Basic welding and fabrication'', ''Photography'', ''Graphic design (Adobe Photoshop/Illustrator)'']'
  hobbies: '[''Photography'', ''Sketching and digital illustration'', ''Graphic design for community events'', ''Improvisational comedy'', ''Open‑mic hosting'', ''Mexican folk music and dance (salsa, cumbia)'',
    ''Cooking traditional Mexican dishes'', ''Journaling'', ''Mindfulness meditation'', ''Yoga'', ''Basketball'', ''Soccer'']'
  career_goals: Adamis aims to advance from his current plant‑operator role to a supervisory position within the next two years, pursuing an associate’s degree in Industrial Technology and earning a Lean
    Six Sigma Green Belt. Over the next five to seven years he envisions becoming a plant manager who integrates efficiency improvements with culturally resonant safety programs, using his artistic skills
    to develop engaging visual training materials. Ultimately, he hopes to combine his technical expertise and creative passion by leading a cross‑functional team that implements innovative, sustainability‑focused
    projects in the manufacturing sector.
