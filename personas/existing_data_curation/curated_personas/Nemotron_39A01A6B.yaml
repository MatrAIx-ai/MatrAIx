personas:
  professional: Robert Garcia, the 30‑year‑old CEO of a regional supply firm, leverages methodical strategic planning, rigorous financial analysis, and data‑driven decision‑making to drive operational efficiency
    while balancing a competitive drive with a persistent worry about market risks.
  sports: Robert Garcia is a disciplined runner who logs three weekly mileage sessions with the Houston Running Club, a strategic golfer at the Houston Golf Club, and a loyal fan of the Houston Astros,
    Rockets, and Texans, blending competitive spirit with his love for data‑driven performance tracking.
  arts: Robert Garcia unwinds after board meetings by listening to Ludovico Einaudi’s piano soundscapes, attending performances at Houston’s Alley Theatre, especially the local production of Hamilton, and
    collecting vintage Edward Hopper prints, while his weekly chess matches with his spouse serve as his preferred low‑key intellectual art form.
  travel: Robert Garcia prefers meticulously planned getaways, often blending business trips with leisure golfing in destinations like St Andrew’s, Scotland, and Napa Valley’s premier vineyards, while his
    bucket list includes a tech‑focused tour of Shenzhen and a culinary pilgrimage to Mendoza, Argentina.
  culinary: Robert Garcia, a competent home chef, often orchestrates dinner nights with his spouse, preparing dishes such as sous‑vide chicken breast, grilled salmon with lemon‑dill sauce, and wood‑fire
    Margherita pizza topped with fresh basil, while pairing each course with a carefully selected Sauvignon Blanc or Malbec.
  core: Robert Garcia is a hyper‑organized, data‑driven CEO who channels competitive ambition into meticulously scheduled runs, strategic golf rounds, and nightly chess battles, yet battles chronic worry
    that fuels both his relentless productivity and occasional over‑analysis.
background:
  cultural: Raised in the suburban Midwest, Robert grew up in a middle‑class, predominantly white community near Detroit where hard work and self‑reliance were emphasized. His family’s cultural values draw
    from traditional Midwestern Protestant ethic—pragmatism, punctuality, and community involvement. Living in Brighton, Michigan, he maintains close ties with local business networks and participates in
    civic events, reflecting a blend of regional pride and a broader American entrepreneurial spirit. These cultural influences shape his preference for order, his competitive drive, and his emphasis on
    family stability.
