    User 1: Oh, I''ve never read any books about serial killers.

    User 2: They''re really interesting! I like to learn about the psychology of serial killers.

    User 1: I can see why that would be interesting. I''m not sure if I''m brave enough to read a book about a serial killer, though.

    User 2: It can be a little scary, but it''s also really fascinating.

    User 1: Maybe I''ll give it a try.

