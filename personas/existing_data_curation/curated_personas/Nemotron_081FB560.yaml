  hobbies: '[''Watercolor painting'', ''Sketching'', ''Photography'', ''Reading'', ''Yoga and meditation'', ''Nature walks and bird‑watching'', ''Cooking experimental dishes'', ''Collecting vintage fire
    helmets'', ''Historical research on firefighting'', ''Volunteering for community art projects'']'
  career_goals: Angela aims to move into senior leadership within the fire department, such as Battalion Chief or Fire Chief, where she can champion mental‑health support for firefighters and introduce
    innovative, art‑focused community education programs. She plans to earn her Fire Instructor certification, develop a youth mural project that blends fire safety lessons with creative expression, and
    eventually transition to an administrative role that leverages her curiosity for new ideas while allowing more flexibility and reduced physical strain as she approaches retirement.
