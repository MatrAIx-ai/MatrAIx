personas:
  professional: Angela Singh, a 55-year-old fire suppression veteran and EMT, they blend meticulous incident-command expertise with a skeptical, art-infused outlook to mentor crews, champion mental-health
    initiatives, and pursue senior leadership within the department.
  sports: Angela Singh, a 55-year-old outdoor enthusiast, they practice daily sunrise walks and yoga, follow the Dallas Cowboys and Houston Astros with fervor, and belong to a local bird-watching club that
    meets at the Trinity River trail each spring.
  arts: Angela Singh, a 55-year-old solitary watercolorist and photographer, they draw creative inspiration from Ansel Adams' dramatic vistas, Andrew Wyeth's intimate sketches, and Frida Kahlo's vibrant
    palette, often embedding fire-safety messages into community murals that reflect their artistic curiosity.
  travel: Angela Singh, a 55-year-old reflective traveler, they favor solo, low-key trips that combine quiet contemplation with bird-watching, having trekked through Big Bend National Park, savored the
    culinary richness of New Orleans, and dreaming of the tranquil gardens of Kyoto for future exploration.
  culinary: Angela Singh, a 55-year-old experimental cook, they blend Southern comfort dishes with subcontinental spices, creating collard greens seasoned with garam masala, cumin-infused cornbread, and
    a turmeric-scented gravy to accompany a smoked-paprika chicken-fried steak.
  core: Angela Singh, a 55-year-old fire-chief aspirant, they balance a competitive, worry-laden mindset with a love for solitary art, vintage fire helmets, and an occasional habit of forgetting to water
    their indoor succulents.
background:
  cultural: Angela was raised in a close‑knit African‑American community in the Greater Houston area, steeped in Southern Black church traditions and strong communal ties. Through her family lineage she
    also has South Asian (Indian) heritage, reflected in the surname Singh, which introduced her to Indian cultural practices such as celebrating Diwali and savoring diverse cuisines. This blended background
    fosters a deep respect for resilience, community service, and an openness to varied artistic and cultural experiences.
attributes:
  skills: '[''Fire suppression'', ''Rescue operations'', ''Emergency medical services'', ''Incident command'', ''Fire investigation'', ''Fire prevention education'', ''Hazardous materials awareness'', ''Building
