  career_goals: Jordan aims to ascend to a senior leadership role, such as Director of Operations or Vice President of Operations, where he can shape organizational strategy and embed a culture of innovative
    efficiency. He is interested in spearheading sustainability initiatives that blend operational excellence with creative design. In the longer term, he envisions launching his own consultancy that helps
    companies integrate artistic thinking into process improvement. To support these ambitions, he plans to pursue an executive MBA or advanced certification in lean management while continuing to develop
    his emotional resilience through mindfulness practices.
