  career_goals: Ryan aspires to become an engineer who can devise practical solutions for everyday problems and enhance his community's resilience to natural hazards. He is particularly interested in mechanical
    and environmental engineering, aiming to design affordable, sustainable technologies such as flood‑resistant devices or energy‑efficient prototypes. His short‑term goal is to attend a magnet high school
    with a strong STEM focus, earn a scholarship, and later pursue an engineering degree at a university where he can combine his love of coding, hands‑on building, and environmental stewardship.
