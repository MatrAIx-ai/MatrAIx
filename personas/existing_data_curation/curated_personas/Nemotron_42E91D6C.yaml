personas:
  professional: Ryan Gonzalez, a budding engineer and young coder, leverages their curiosity and methodical mindset to design Scratch games, build intricate LEGO Technic models, and sketch engineering concepts,
    balancing innovative ideas with practical problem‑solving while thriving in solitary workspaces.
  sports: Ryan Gonzalez enjoys low‑key fitness activities such as weekend swimming at the community pool and occasional bike rides through City Park, follows the New Orleans Pelicans in the NBA and the
    New Orleans Saints in the NFL, but prefers watching games at home while sketching, and they are a member of the school’s junior bird‑watching club that organizes sunrise hikes as an active pastime.
  arts: Ryan Gonzalez channels creative energy into digital artwork on a tablet, drawing inspiration from the fluid brushwork of Studio Ghibli’s animation, the intricate geometry of M.C. Escher, and the
    melodic improvisations of Miles Davis and Johann Sebastian Bach, while they occasionally attend local library art workshops and watch documentaries on Renaissance engineering.
  travel: Ryan Gonzalez prefers meticulously planned family trips that blend quiet exploration with educational stops, having recently visited the Smithsonian’s National Air and Space Museum in Washington,
    D.C., and dreaming of a future immersive tour of the Kennedy Space Center in Florida, while they also enjoy weekend nature hikes in the nearby Oak Grove Nature Preserve and avoid spontaneous travel
    that disrupts their routine.
  culinary: Ryan Gonzalez favors simple, comforting meals like homemade macaroni‑and‑cheese sprinkled with sharp cheddar and a side of roasted broccoli, occasionally attempts to bake blueberry muffins using
    fresh blueberries and whole‑wheat flour, but their cooking skill is limited to microwave reheats and they often indulge in ordering pizza topped with pepperoni and extra cheese when a project deadline
    looms, reflecting a habit of late‑night snacking.
  core: Ryan Gonzalez, a 12‑year‑old solitary tech‑enthusiast, builds intricate LEGO machines, codes quirky Scratch games, and hoards a growing collection of science books while habitually staying up late
    to perfect digital sketches, often forgetting to stretch after long coding marathons.
background:
  cultural: Ryan grew up in a white family in New Orleans, Louisiana, where Southern and Creole cultures intersect with his family's Hispanic heritage reflected in his surname. He celebrates typical American
    holidays and enjoys the city’s unique traditions such as Mardi Gras parades, jambalaya and gumbo meals, and occasional second‑line brass bands, though he prefers quieter settings. His household sometimes
    includes Spanish phrases and recipes passed down from relatives, giving him modest bilingual exposure. He attends a diverse public middle school that mirrors the multicultural fabric of the city, shaping
    his awareness of the region’s history, music, and environmental challenges.
