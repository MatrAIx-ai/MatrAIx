personas:
  professional: Rosemary Harms, a curious two‑year‑old who already lines up building blocks by color and size before constructing towers, demonstrates an early love for structured play and an adaptable
    spirit that hints at a future career in project coordination or design, as they seamlessly blend predictable routines with spontaneous imagination.
  sports: Rosemary Harms, a lively two‑year‑old who joins the De Pere Little Stars toddler soccer class each spring, cheers loudly for the Green Bay Packers on game nights, and splashes enthusiastically
    in the community center’s toddler pool, they treat every activity as a fun group workout while preferring the comfort of familiar routines.
  arts: Rosemary Harms, who delights in drawing farm animals with Crayola crayons while humming Sesame Street melodies and occasionally impersonating characters from The Wiggles, channels their sociable
    energy into imaginative storytelling, and they proudly showcase their creations during family gatherings.
  travel: Rosemary Harms, who enjoys short family road trips to the Wisconsin Dells water park and to Green Bay for a glimpse of the Packers’ stadium, prefers relaxed itineraries with frequent snack breaks
    and window seats for watching passing scenery, and they always ask for a gummy bear as a travel treat.
  culinary: Rosemary Harms, a budding gourmand who loves creamy macaroni and cheese sprinkled with cheddar, dips crisp apple slices into honey‑yogurt, helps stir pancake batter with a tiny wooden spoon,
    and they often end up with a flour smudge on their cheek, revealing a joyful yet messy approach to dining.
  core: Rosemary Harms, a two‑year‑old bundle of energetic curiosity, blends a love for predictable play routines with spontaneous sociability, leaving a trail of toys and giggles wherever they go.
background:
  cultural: Rosemary is raised in a white, middle‑class family in De Pere, Wisconsin, a small city in Outagamie County with strong Midwestern values. Her upbringing includes community‑center activities,
    family gatherings centered around holidays like Thanksgiving and Fourth of July, and regular attendance at a local church that emphasizes community service and cooperation. The local culture’s emphasis
    on politeness, family cohesion, and participation in community events shapes her sense of harmony, kindness, and sociability.
