personas:
  professional: Stephanie Mejia is a senior diagnostic medical sonographer whose meticulous image acquisition, organized workflow, and compassionate patient communication enable them to lead quality‑improvement
    initiatives while mentoring junior staff in a fast‑paced Boston hospital.
  sports: Stephanie Mejia is a dedicated Boston marathon trainee who clocks early morning runs with the BAA Weekend Warriors club, practices yoga twice weekly for flexibility, and never misses a chance
    to root for the Boston Red Sox at Fenway, while they also hike the White Mountains during summer.
  arts: Stephanie Mejia curates a neighborhood book club that devours everything from Toni Cobb’s memoirs to Margaret Atwood’s dystopias, knits scarves while listening to Ella Fitzgerald’s jazz standards,
    and attends live performances of Hamilton by the Boston Playhouse, weaving literature, music, and craft into their social tapestry, while they also share their knit creations at community fairs.
  travel: Stephanie Mejia plans meticulously‑crafted weekend getaways to coastal towns like Martha’s Vineyard and forested retreats in the White Mountains, and dreams of a summer pilgrimage to a historic
    coastal village in the British Isles and a culinary tour of Tuscany, balancing adventure with budget‑conscious itineraries, and they always book travel during off‑peak seasons to stretch their savings.
  culinary: Stephanie Mejia treats their kitchen like a laboratory, documenting each step of their heirloom tomato basil sauce, Boston clam chowder, and occasional homemade paella in a handwritten recipe
    journal, while tending a backyard garden that supplies fresh kale, carrots, and rosemary for their meticulously planned weekly menus, and they relish experimenting with seasonal ingredients to keep
    meals exciting.
  core: Stephanie Mejia’s life is a precise choreography of medical imaging, marathon miles, and meticulously logged recipes, though they have a penchant for over‑planning that often spirals into late‑night
    spreadsheet sessions and a lingering worry about perfection.
background:
  cultural: Stephanie grew up in Braintree, Massachusetts, a suburban community with a mix of New England traditions and diverse cultural influences. Her family background includes generations of white
    American heritage with roots in Irish and Italian neighborhoods, and her surname reflects a broader Hispanic lineage she embraces through family stories and occasional cultural celebrations. She values
    the strong community spirit, emphasis on education, and the work ethic typical of the area. Local holidays like Thanksgiving and Fourth of July parades, as well as participation in community service
    projects, have shaped her compassionate and cooperative outlook.
