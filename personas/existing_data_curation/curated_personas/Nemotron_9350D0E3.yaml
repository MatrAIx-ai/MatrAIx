  career_goals: Stephanie aims to advance into a senior sonography role where she can lead quality‑improvement initiatives and mentor junior staff. She plans to obtain additional RDMS certifications in
    breast imaging and advanced cardiac ultrasound within the next three years. Her long‑term ambition is to become a clinical educator or department manager, establishing standardized imaging protocols
    that enhance patient safety and workflow efficiency. She also hopes to contribute to community health outreach programs that teach expectant mothers about prenatal care, reflecting her compassionate
    drive to improve patient experiences.
