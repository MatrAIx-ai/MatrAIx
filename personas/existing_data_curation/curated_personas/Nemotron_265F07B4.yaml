  career_goals: Lauren aims to step into a senior director role overseeing development and communications for a mid‑size nonprofit focused on science education or climate action. She plans to lead a $10 million
    multi‑year fundraising campaign, integrate innovative tech solutions like AI‑driven donor insights, and expand the organization’s donor base across diverse demographics. Over the next five years, she
    hopes to earn a nonprofit leadership certificate, become a sought‑after speaker at industry conferences, and mentor emerging PR professionals, while championing equity and inclusion in fundraising practices.
