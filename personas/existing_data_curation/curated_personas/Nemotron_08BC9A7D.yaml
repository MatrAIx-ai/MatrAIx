  career_goals: Victor aims to launch his own boutique custom‑furniture studio that showcases Midwestern craftsmanship infused with artistic design, while offering hands‑on woodworking workshops for adults
    and youth. He aspires to build a reputation for sustainable, community‑focused projects and eventually expand into a small, green‑building contractor firm. Mentoring aspiring carpenters through local
    vocational programs and contributing to charitable builds, such as Habitat for Humanity, are also central to his long‑term vision.
