personas:
  professional: Victor Holton, a 38‑year‑old master carpenter turned entrepreneur, blends meticulous blueprint reading, custom woodworking, and sustainable building practices with a relaxed, collaborative
    style as they work to launch a boutique furniture studio and community workshops.
  sports: Victor Holton, a devoted member of the North Shore Community Basketball League and occasional Lakefront Joggers Club participant, roots for the Chicago Bulls and Chicago Bears, embraces a social,
    low‑pressure approach to fitness by shooting hoops on weekends and hiking the suburban trail network during summer months.
  arts: Victor Holton, a regular visitor to the Art Institute of Chicago and the 606 Gallery, draws inspiration from William Morris’s decorative patterns, the photography of Ansel Adams, and the indie folk
    sounds of Bon Iver, weaving these influences into their own DIY home‑improvement projects.
  travel: Victor Holton prefers weekend‑sprint getaways that blend art‑centric city tours with outdoor adventure, having explored the music‑rich streets of New Orleans, the craft‑focused markets of Asheville,
    and now yearning to bike through Portland’s green neighborhoods and wander the vineyards of Tuscany, all while balancing workshop commitments.
  culinary: Victor Holton, a confident home chef, frequently whips up farm‑to‑table dishes like roasted beet and goat‑cheese salad, miso‑glazed salmon with seasonal greens, and handcrafted sourdough loaf,
    relishing the tactile joy of kneading dough and the aroma of slow‑roasted root vegetables.
  core: Victor Holton channels a relaxed, curiosity‑driven ethos into every project, juggling vintage furniture hunts, community basketball games, and spontaneous workshop ideas while habitually misplacing
    their wrench and forgetting to file receipts.
background:
  cultural: Victor was raised in the suburban Midwest, growing up in Naperville, Illinois, in a middle‑class family with German‑Polish roots. The local culture emphasizes community, practical ingenuity,
    and a strong work ethic, while also supporting a vibrant arts scene through museums, festivals, and public murals. These Midwestern values of friendliness, modesty, and civic responsibility shape his
    approach to both his craft and his social life, fostering a blend of reliable craftsmanship with an appreciation for artistic expression.
