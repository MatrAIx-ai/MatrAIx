personas:
  professional: A retired manufacturing engineer named Raymond Agganis channels decades of drafting and quality-control expertise into meticulous curation of art collections, where their disciplined record-keeping
    and analytical eye make them a trusted advisor for the Weisman Art Museum’s senior art education endowment.
  sports: A senior fitness enthusiast named Raymond Agganis jogs the Minneapolis lakefront in crisp summer mornings, follows the Minnesota Timberwolves schedule on weekends, joins a local senior walking
    club that meets for Nordic walking, and they occasionally take gentle ice-skating lessons at the public rink, all while avoiding high-impact sports to protect arthritic knees.
  arts: An avid museum-goer named Raymond Agganis spends each Saturday at the Weisman Art Museum, taking meticulous notes on exhibitions ranging from Monet’s Impressionist water lilies to contemporary installations
    by Yayoi Kusama, while also curating a personal collection of vintage photographs of Minneapolis’s historic warehouses, and they engage in spirited discussions about Heidegger and deconstruction with
    fellow members of the senior art club.
  travel: A methodical traveler named Raymond Agganis prefers well-planned itineraries, often using rail passes to explore European capitals such as Florence—where they sketch Renaissance architecture—and
    revisits historic Greek islands in the off-season, while a lifelong love for domestic road trips has taken them to the historic preservation sites of St. Paul's Summit Avenue and the seaside villages
    of the Upper Peninsula.
  culinary: A devoted home chef named Raymond Agganis prepares traditional festival dishes like moussaka and baklava using authentic oregano, phyllo dough, and honey, while also mastering Midwestern comfort
    foods such as wild‑rice casserole and pan-seared perch, and they often pair meals with a glass of crisp Riesling and share recipes during senior-center potlucks.
  core: Raymond Agganis is a disciplined, curiosity-driven 90-year-old who melds a meticulous manufacturing mind with a lifelong passion for art, genealogy, and community mentorship, all while navigating
    the challenges of age with frugality, selective indulgence, and relentless intellectual vigor, and they remain ever the critical, skeptical thinker.
background:
  cultural: Raymond is a second-generation Greek-American who grew up in Saint Paul's vibrant Greek Orthodox community. His parents emigrated from Crete in the 1920s, bringing with them traditions of hospitality,
    Orthodox liturgy, and a love for music and cuisine. He was raised speaking both English and conversational Greek, celebrating holidays like Easter with traditional foods such as lamb and tsoureki. The
    Midwestern environment of Minnesota, with its harsh winters and strong community-first ethic, reinforced values of hard work, frugality, and civic involvement. These dual influences—Greek cultural heritage
    and Midwestern American values—shape his worldview, artistic sensibilities, and commitment to preserving both family history and local culture.
attributes:
  skills: '[''Organizational system design'', ''Meticulous record-keeping'', ''Budget planning and financial management'', ''Technical drafting and mechanical troubleshooting'', ''Quality-control inspection'',
