personas:
  professional: Mandy Evans, a 56‑year‑old retail veteran, leverages her meticulous inventory control, calm conflict resolution, and community‑focused leadership to consistently exceed sales targets while
    mentoring new hires with the same neighborly spirit that shaped her upbringing.
  sports: Mandy Evans stays active by attending senior‑center aerobics classes, walking the local park trails, cheering on the St. Louis Cardinals and the Kansas City Chiefs, and she also organizes a neighborhood
    walking club that meets every Saturday morning.
  arts: Mandy Evans finds artistic fulfillment quilting patterns inspired by the classic works of Martha Jane Pettway, losing herself in historical novels by Philippa Gregory, and regularly attending community‑theater
    productions such as the local rendition of "The Music Man," while her evenings often include listening to the folk tunes of Johnny Cash.
  travel: Mandy Evans prefers well‑planned road trips that balance relaxation with community‑centric stops, having enjoyed a family weekend in Asheville, North Carolina, a harvest tour of Napa Valley, and
    the historic charm of Williamsburg, while she dreams of a modest pilgrimage to a European countryside celebrated for its traditional harvest festivals, keeping the itinerary budget‑friendly.
  culinary: Mandy Evans savors the comfort of her homemade apple‑cinnamon pie, crusty sourdough loaf, and garden‑fresh zucchini casserole, often seasoning dishes with rosemary, thyme, and a dash of sage,
    and while her baking skills are seasoned, she occasionally over‑mixes dough, resulting in a slightly dense crumb she humorously calls "Mandy's signature".
  core: Mandy Evans blends Midwestern practicality with a warm, community‑first spirit, channeling her meticulous organization into both retail leadership and a bustling garden, yet she can’t resist the
    occasional extra slice of pie after a long shift.
background:
  cultural: Mandy grew up in the rolling farmlands of Webster County, Missouri, in a multigenerational White American family with roots tracing back to German and Scots‑Irish settlers. The Midwestern values
    of hard work, modesty, neighborly support, and a strong sense of community are central to her identity. Regular involvement in her local church, participation in town festivals, and a tradition of volunteering
    at schools and community events have reinforced a cooperative, service‑oriented outlook. Her upbringing in a small‑town environment fosters a practical, down‑to‑earth perspective combined with a warm,
    sociable demeanor.
attributes:
  skills: '[''Customer service'', ''POS and cash handling'', ''Inventory management'', ''Visual merchandising'', ''Schedule and shift coordination'', ''Team training and mentorship'', ''Conflict resolution'',
