  hobbies: '[''Gardening'', ''Quilting and crocheting'', ''Baking and cooking for family'', ''Volunteer work at the local food bank and church'', ''Reading historical fiction'', ''Participating in a book
    club'', ''Attending community theater productions'', ''Walking/hiking in local parks'', ''Senior center aerobic classes'', ''Organizing neighborhood events'']'
  career_goals: Mandy aims to advance to a store‑manager role within her retail chain, where she can leverage her organizational strengths to streamline processes, increase sales, and cultivate a collaborative
    team culture. Over the next several years she hopes to transition into a regional supervisory position or become a corporate trainer, sharing best practices across locations. In the longer term she
    envisions opening a small specialty boutique that reflects her love of crafts and community service, allowing her to blend retail expertise with personal passions.
