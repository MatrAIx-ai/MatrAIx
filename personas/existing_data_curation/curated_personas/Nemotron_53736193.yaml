personas:
  professional: Joseph Suazo, a retired STEM professional turned community mentor, blends his technical troubleshooting expertise and love of art history to guide youth in DIY repair workshops, often improvising
    without strict deadlines.
  sports: Joseph Suazo enjoys walking the Daytona Beach boardwalk each morning, participates in a senior volleyball league at the community center, and follows the Orlando Magic (NBA) and the Miami Dolphins
    (NFL) while cheering with the local senior fan club.
  arts: Joseph Suazo spends afternoons sketching the Art Deco facades of the historic downtown, studies the works of Diego Rivera and Frida Kahlo, and finds inspiration in the contemporary paintings of
    Yayoi Kusama, often attending the local theater's productions of classic plays.
  travel: Joseph Suazo has road‑tripped through the historic districts of Savannah and Charleston, taken a guided tour of the ancient ruins at Chichén Itzá, and dreams of sailing along the coast of Portugal
    after retiring his garden projects.
  culinary: Joseph Suazo delights in preparing traditional corn‑based dishes such as tamales, mole, and pozole with fresh chipotle and cilantro, often pairing the meals with sliced avocado and homemade
    salsa, while also cultivating mangoes and papayas for fresh fruit desserts.
  core: Joseph Suazo blends a lifelong curiosity for science with a passion for watercolor landscapes, using daily beach walks and garden harvests to fuel creative and community‑focused projects, even if
    deadlines sometimes slip through his relaxed schedule.
background:
  cultural: Born to Mexican‑American parents, Joseph grew up bilingual in Spanish and English, celebrating traditions such as Día de los Muertos and Mexican Independence Day. His upbringing blended Mexican
    family values with the diverse cultural fabric of Florida, and he remains active in the local Mexican community in Daytona Beach, often volunteering at cultural events and sharing stories of his heritage
    with younger generations.
attributes:
  skills: '[''Technical troubleshooting'', ''Mechanical repair'', ''Basic computer programming'', ''Data analysis'', ''Bilingual Spanish-English communication'', ''Art historical knowledge'', ''Mentoring
    in STEM'', ''Community volunteer coordination'', ''Gardening and horticulture'']'
  hobbies: '[''Watercolor painting'', ''Sketching'', ''Photography'', ''Bird-watching'', ''Gardening'', ''Cooking Mexican cuisine'', ''Reading popular science'', ''Playing chess'', ''Attending cultural
    festivals'']'
  career_goals: He aims to stay mentally and physically active by pursuing continuous learning through art workshops and online courses, volunteering as a STEM mentor at the local science museum, and creating
    a digital archive of Mexican-American cultural stories in his community. He also hopes to write a memoir that weaves together his scientific career and artistic passions, while maintaining a healthy
    lifestyle that lets him enjoy daily walks on the Daytona Beach boardwalk.
