personas:
  professional: Shan Simpson, a 72‑year‑old senior‑center veteran, leverages their practical budgeting acumen and structured event‑planning skills to chair the Activity Committee, orchestrating intergenerational
    garden projects while gently nudging fellow seniors toward digital independence.
  sports: Shan Simpson, an avid supporter of the Atlanta Braves and Atlanta Falcons, stays fit through daily walks in historic neighborhoods, attends low‑impact aqua‑fit sessions at the senior center’s
    pool, and joins a weekly senior bowling league that adds gentle cardio to their routine.
  arts: Shan Simpson, a lifelong lover of story and song, finds inspiration in the novels of James Baldwin, the gospel harmonies of Mahalia Jackson, and the intricate patterns of Gee's Bend quilters, while
    their church choir performances of classics by Aretha Franklin bring daily joy.
  travel: Shan Simpson’s travel style blends organized group tours of Atlanta’s historic districts with weekend getaways to Savannah’s riverfront and the Blue Ridge Mountains, and a cherished memory of
    a New Orleans Mardi Gras trip fuels a long‑standing dream of strolling the cobblestone streets of Bruges with their grandchildren.
  culinary: Shan Simpson, a seasoned home cook, delights in preparing classic Southern fare such as buttermilk fried chicken, collard greens simmered with smoked ham hocks, and peach cobbler topped with
    a buttery biscuit crust, while their garden‑grown rosemary and thyme often season the family’s Sunday pot roast.
  core: Shan Simpson, a structured yet sociable 72‑year‑old, blends community leadership, garden‑grown meals, and digital mentoring into a legacy of service, all while gently battling occasional forgetfulness
    and a penchant for extra quilting fabric.
background:
  cultural: Shan was raised in a middle‑class Southern white family in Georgia, where hospitality, church involvement, and community service were core values. Her upbringing emphasized family gatherings,
    traditional Southern cooking, and regular participation in Methodist church events. Living in Atlanta’s diverse DeKalb County, she has embraced multicultural interactions while preserving her Southern
    identity, evident in her love for local festivals, gardening, and the preservation of family histories.
attributes:
  skills: '[''Household Management'', ''Budgeting and Financial Planning'', ''Community Event Coordination'', ''Volunteer Management'', ''Basic Computer Literacy'', ''Caregiving and Companion Support'',
