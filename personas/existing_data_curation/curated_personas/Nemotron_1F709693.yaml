  hobbies: '[''Book Club'', ''Community Gardening'', ''Quilting Circle'', ''Cooking Southern Cuisine'', ''Church Choir'', ''Bridge'', ''Volunteering at Soup Kitchen'', ''Genealogy Research'', ''Walking
    Tours of Historic Neighborhoods'']'
  career_goals: Shan aims to deepen her leadership role at the DeKalb County Senior Center by chairing the Activity Committee and launching an intergenerational community garden program. She plans to enhance
    her digital literacy to assist peers in accessing online services and to document her family’s genealogy for future generations. Coupled with a structured wellness routine that includes daily walks
    and low‑impact exercise to preserve her independence, Shan’s long‑term ambition is to leave a lasting legacy of community service, family heritage preservation, and mentorship for younger volunteers.
