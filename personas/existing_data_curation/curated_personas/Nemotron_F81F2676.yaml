  career_goals: William aims to transition into a strategic consulting role that helps small and midsize manufacturers adopt agile, cost‑effective operations while reducing administrative burdens. He also
    wants to establish a mentorship program for emerging Black professionals in Prince George’s County, combining his business expertise with his love for the arts. Over the next five years, he seeks a
    balance between high‑impact work and a lighter, less stressful schedule that allows more time for personal interests and community involvement.
