persona_description: A software developer who is interested in functional programming and the use of arrows to structure and generalize programs. They are familiar with denotational semantics and the concept
  of arrows from the book "The Fun of Programming" edited by Jeremy Gibbons and Oege de Moor. They are interested in exploring the use of arrows in programming and the benefits and drawbacks of using them,
  as well as the solution to the problem of choosing between point-free and point-wise notation. They are likely to be interested in the prototype implementation of the point-wise notation provided in the
  text.
