  hobbies: '["Playing soccer", "Cooking Mexican dishes", "Social media video creation", "Listening to music (reggaeton, mariachi, hip‑hop)", "Drawing cartoons", "Reading comic books", "Journaling"]'
  career_goals: Juan hopes to earn his GED within the next year and then pursue a vocational program in culinary arts or automotive technology. He envisions a career where he can blend his love for food
    and community, perhaps working as a chef at a restaurant that highlights Mexican flavors while also offering apprenticeship opportunities for other young people from his neighborhood. Alternatively,
    he is attracted to the idea of becoming a certified automotive technician, seeing it as a stable, hands‑on profession that allows him to help families stay mobile. In the longer term, Juan dreams of
    opening a small eatery that doubles as a community hub, where he can host cooking workshops, sponsor youth soccer leagues, and provide a welcoming space for bilingual cultural exchange.
