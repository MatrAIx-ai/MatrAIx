personas:
  professional: Juan Amador, a bilingual high‑school senior who captains their school’s soccer team, merges a practical curiosity for automotive maintenance with budding culinary skills, using their outgoing
    and cooperative nature to lead community‑kitchen projects and mentor peers, and they plan to enroll in a vocational program after graduation.
  sports: Juan Amador thrives on weekend soccer matches at the local park, starring as a forward for the Matthews Youth Soccer Club, while cheering for Charlotte FC in MLS and the Carolina Panthers during
    football season, and they maintain fitness through informal drills, occasional gym visits, and a disciplined warm‑up routine.
  arts: Juan Amador channels creative energy into short TikTok videos that blend cooking tutorials with neighborhood event highlights, curates playlists mixing Bad Bunny, traditional mariachi, and Lil Baby,
    and sketches superhero characters from Marvel comics, making their artistic life a vivid collage of multicultural influences.
  travel: Juan Amador prefers spontaneous road trips that combine cultural immersion and affordable adventure, having explored Asheville’s mountain art scene and Charleston’s historic waterfront with friends,
    while dreaming of a future backpacking journey to the highlands of their family’s hometown to experience authentic regional cuisine, and they hope to capture the trip on camera for their growing online
    audience.
  culinary: Juan Amador enjoys cooking tamales, fresh salsa, and experimenting with fusion dishes like cheese‑stuffed pork tacos, excels at mastering family recipes handed down by grandparents, delights
    in pairing meals with cilantro, lime, and a dash of smoked paprika, and they often document the process for social media.
  core: Juan Amador is a bilingual teen whose restless curiosity drives them to blend car repairs, soccer leadership, and kitchen creativity into a community‑focused hustle, all while battling a habit of
    over‑thinking and late‑night scrolling.
background:
  cultural: Juan is a first‑generation Mexican‑American who grew up in a bilingual household. His parents immigrated from Jalisco, and family gatherings are centered around traditional foods, music, and
    the celebration of holidays such as Día de los Muertos and Mexican Independence Day. While he lives in Matthews, North Carolina, and has adopted many Southern customs—like attending local festivals
    and enjoying barbecue—he maintains strong ties to his Mexican heritage through language, cuisine, and community. This dual cultural identity informs his worldview, giving him a deep appreciation for
    both collectivist family values and the individualistic spirit of his American surroundings. His cultural roots also shape his desire to create spaces where both cultures can intersect, such as a community
    kitchen or youth sports program that celebrates diversity.
