  hobbies: '["Barbecuing with family", "Church choir singing", "Attending high school football games", "Listening to classic R&B and gospel", "Playing dominoes", "Collecting vintage car memorabilia", "Fishing",
    "Volunteering at the food pantry"]'
  career_goals: Michael aims to transition into a senior driver or dispatcher role within his current company, leveraging his extensive experience to oversee route scheduling and driver coordination. He
    is interested in earning a CDL trainer certification so he can formally teach new drivers. Long‑term, he hopes to launch a small, community‑focused delivery service that provides reliable transportation
    for local businesses and elderly residents, increasing his family's financial security and giving back to his neighborhood.
