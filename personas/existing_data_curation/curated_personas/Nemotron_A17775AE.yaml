  hobbies: '[''Sketching'', ''Watercolor painting'', ''Photography'', ''Visiting art galleries'', ''Reading speculative fiction'', ''Listening to experimental music'', ''Playing acoustic guitar'', ''Kayaking'',
    ''Hiking'', ''Cooking Cajun cuisine'', ''Meditation'', ''Journaling'']'
  career_goals: Stephen aims to complete a Bachelor of Fine Arts in Visual Arts or Graphic Design within the next three years, building a professional portfolio that showcases his illustration, photography,
    and mixed‑media work. He aspires to secure freelance contracts with independent publishing houses and indie game studios, and eventually to hold a solo exhibition at a regional gallery in New Orleans
    or Baton Rouge. Long‑term, he hopes to open a community art space in Abita Springs that offers workshops linking creative practice with mental‑health awareness, allowing him to blend his compassion
    with self‑interest by generating sustainable income while giving back to his small‑town community.
