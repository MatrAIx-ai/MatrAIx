personas:
  professional: Stephen, a 21‑year‑old visual arts student with a flair for digital illustration, hand‑drawn watercolors, and sunrise photography, channels their curiosity and relaxed approach to deadlines
    into a freelance‑ready portfolio that blends experimental jazz‑inspired motion graphics with community‑focused art projects.
  sports: Stephen enjoys low‑impact fitness like sunrise hikes along Bayou St. John, paddle‑boarding with the Bayou St. John Kayak Club, and cheering on the New Orleans Saints and Pelicans, though they
    rarely join organized team sports and favor solitary exercise.
  arts: Stephen, a devoted explorer of New Orleans’ creative scene, spends weekends at the Contemporary Arts Center, absorbing experimental jazz from artists like Wynton Marsalis and Buckwheat Zydeco while
    they sketch in notebook, compose poetry inspired by N.K. Jemisin’s speculative worlds, and attend intimate gallery openings featuring works by local painters such as George Rodrigue.
  travel: Stephen prefers spontaneous weekend road trips to nearby cultural hotspots like Asheville and Austin, dreams of an extended stay in Oaxaca to study mural art and Kyoto for its zen gardens, yet
    their travel plans are often constrained by a limited student stipend and the need to return home for family commitments.
  culinary: Stephen loves cooking hearty bayou‑inspired dishes like gumbo with andouille sausage, jambalaya, and blackened catfish, experimenting with roux, filé powder, and okra while they occasionally
    treat themselves to beignets at Café du Monde, though they sometimes over‑season their meals in the pursuit of bold flavors.
  core: Stephen is a quietly intense creator who balances a love of solitary art‑making with bursts of community‑focused projects, guarded optimism about the future, and a tendency to let anxiety drive
    meticulous journaling and late‑night coffee binges.
background:
  cultural: Stephen is a white male raised in the small town of Abita Springs, Louisiana, where his family’s roots trace back to Irish and Appalachian settlers who settled in the Gulf region generations
    ago. Growing up in a close‑knit Southern community, he absorbed the hospitality and modesty typical of the area, while also being exposed to the vibrant Cajun and Creole cultural tapestry—local cuisine,
    Mardi Gras celebrations, zydeco music, and the jazz heritage of nearby New Orleans. These regional influences mingle with his personal curiosity, prompting him to explore artistic traditions beyond
    his hometown while maintaining a strong sense of place and community.
