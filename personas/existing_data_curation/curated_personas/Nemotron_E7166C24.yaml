  hobbies: '["Visiting Art Galleries", "Painting", "Reading (non-fiction)", "Chess", "Group Hiking", "STEM Mentorship Volunteering", "Gardening", "Cooking"]'
  career_goals: Over the next five years, Joel aims to transition into a senior sales operations consultant role, leveraging his experience to guide multiple divisions in adopting data‑driven sales strategies
    and AI‑enhanced forecasting tools. He is pursuing targeted executive‑level certifications to deepen his expertise in digital transformation. Additionally, Joel aspires to mentor emerging leaders within
    his organization, champion diversity and inclusion initiatives, and eventually launch a community‑focused art outreach program that blends his love of sales leadership with his passion for the arts.
