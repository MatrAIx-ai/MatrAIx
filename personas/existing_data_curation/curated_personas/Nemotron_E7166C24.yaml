personas:
  professional: Joel Doran, a veteran sales operations consultant, blends his methodical leadership, data‑driven analysis, and insatiable curiosity to streamline non‑retail sales processes while mentoring
    high‑performing teams and championing inclusive, art‑infused corporate initiatives.
  sports: Joel Doran enjoys seasonal hiking with the Arbuckle Mountain trek club, plays a weekly senior golf round at the local country club, and ardently follows the Oklahoma City Thunder and Oklahoma
    State Cowboys, balancing low‑impact cardio with occasional pick‑up basketball at the community center.
  arts: Joel Doran, an avid visitor to regional galleries, finds inspiration in the watercolors of Winslow Homer and the abstract works of Hilma af Klint, occasionally creates their own watercolor landscapes
    reminiscent of the Arbuckle vistas, and regularly attends performances by the Oklahoma City Philharmonic and local spoken‑word artist Maya Lulic.
  travel: Joel Doran prefers meticulously planned road trips that blend nature and culture, having explored the Grand Canyon, Banff National Park, and the historic streets of Savannah, while they dream
    of a future pilgrimage to Kyoto’s temples and the Icelandic highlands, always budgeting around their consulting schedule and family commitments.
  culinary: Joel Doran, a confident home chef, loves cultivating heirloom tomatoes, purple carrots, and heirloom beans, then crafting rustic ratatouille and slow‑cooked goat cheese and beet salad, favoring
    fresh herbs like thyme and rosemary, while they relish occasional dining at farm‑to‑table bistros that showcase seasonal produce.
  core: Joel Doran is a calm, curious, and methodical 60‑year‑old who fuses data‑driven sales expertise with a vibrant love for art, gardening, and community mentorship, all while maintaining disciplined
    finances and a proactive health routine.
background:
  cultural: Joel was born and raised in the Midwestern‑American environment of Norman, Oklahoma. His family heritage includes German and Irish ancestry, and the community values of hard work, modesty, and
    neighborliness were central to his upbringing. He earned his graduate degree in engineering at the University of Oklahoma, where he cultivated both technical rigor and an appreciation for artistic expression.
    Living in Norman, Joel participates in regional traditions such as the Oklahoma State Fair, high‑school football rallies, and local church activities, while also embracing the area's growing arts scene.
    His cultural identity blends classic Midwestern pragmatism with an open‑minded curiosity that drives his varied interests and professional approach.
