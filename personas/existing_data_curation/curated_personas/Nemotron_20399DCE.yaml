personas:
  professional: Jun Hua is a budding engineer‑in‑training who channels a love for routine into meticulous LEGO constructions with moving parts, strategic chess victories with their father, and disciplined
    piano practice, showcasing methodical problem‑solving, reliable teamwork, and a penchant for planning ahead even at seven.
  sports: Jun Hua plays on the Rising Stars youth soccer team every Saturday, practices basketball drills at the community center twice a month, follows the Los Angeles Dodgers and the Golden State Warriors
    on television, and maintains a habit of daily morning stretches to keep their routine physically balanced.
  arts: Jun Hua devotes two evenings a week to piano lessons where they practice Beethoven’s Für Elise and admire Lang Lang’s performances, draws precise dinosaur and space diagrams inspired by Carl Sagan’s
    books, and enjoys practicing calligraphy in Chinese language class while watching Studio Ghibli films like My Neighbor Totoro.
  travel: Jun Hua loves organized family trips to the natural history museum in Washington, D.C., day‑long excursions to the local planetarium, and dreams of visiting the Houston Space Center and the Jurassic
    fossil beds in Utah, always planning itineraries with a checklist to ease their worry.
  culinary: Jun Hua prefers meals that are both structured and flavorful, often eating teriyaki chicken rice bowls with steamed broccoli, cheese pizza slices with apple slices on the side, and enjoys helping
    to roll simple dumplings using rice flour and soy sauce, while sometimes sneaking extra cookies despite their parents’ reminder to stick to the schedule.
  core: Jun Hua is a methodical 7‑year‑old who thrives on structured LEGO builds, chess strategy, and piano practice, while quietly wrestling with daily worries and a desire for order.
background:
  cultural: Jun is a second‑generation Chinese‑American living in West Roxbury, MA. His family speaks Mandarin at home and celebrates both American holidays and traditional Chinese festivals such as Lunar
    New Year and the Mid‑Autumn Festival. His parents emphasize education and respect for elders, encouraging academic excellence while teaching cultural customs like making dumplings during holidays. He
    participates in a local Chinese cultural center where he learns basic calligraphy and joins community events, blending his Chinese heritage with the multicultural environment of Boston's suburbs.
