  career_goals: Even at seven, Jun often talks about what he wants to become. He is drawn to careers that combine practicality with systematic thinking, such as civil engineering, computer programming,
    or becoming a school teacher. He imagines designing safe bridges or coding simple games that follow clear rules. His desire for a stable, routine‑oriented profession reflects his personality, and he
    aspires to help others by applying his methodical approach and attention to detail.
