  career_goals: Bonnie aims to complete her GED within the next year and enroll in a community college program focused on hospitality management or health services administration. She envisions a career
    where she can combine her organizational talents and love for interacting with people, such as a hotel front‑desk manager, community outreach coordinator for a health clinic, or event planner for a
    nonprofit. In the longer term, she hopes to become a certified medical assistant or a licensed practical nurse, leveraging her practical, hands‑on approach and desire for a stable, structured profession.
    Her competitive nature drives her to attain leadership positions, and she plans to develop certifications in office administration and basic medical terminology to enhance her employability.
