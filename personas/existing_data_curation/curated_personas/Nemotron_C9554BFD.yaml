    "Journaling"]'
  career_goals: Luz aims to transition into a leadership role where she can steer research on sustainable rocket propulsion, such as methane‑based or electric thrusters, contributing to planetary‑scale
    missions like lunar landers or Mars cargo transports. She aspires to become a principal engineer or technical director at a major aerospace firm or NASA center, championing initiatives that increase
    representation of Mexican‑American women in STEM. Additionally, Luz hopes to establish a mentorship program linking aerospace professionals with underserved youth in Sacramento, publish a technical
    guide on low‑emission propulsion, and eventually author a memoir that weaves her engineering journey with her cultural heritage.
