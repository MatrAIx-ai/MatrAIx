personas:
  professional: Luz Minaya is a senior aerospace engineer who leverages deep expertise in propulsion system design, CFD simulation, and Agile team leadership to blend rigorous engineering with artistic
    visualizations, they channel curiosity and assertive yet cooperative style to mentor junior staff while meticulously balancing organization with creative flexibility.
  sports: Luz Minaya stays active through weekly hikes with the Sierra Trail Club in the foothills, follows the Sacramento Kings and San Jose Earthquakes fervently, joins community charity runs during the
    spring, and balances a love of group fitness with solitary stargazing sessions, they show a moderately social but self‑reflective approach to exercise.
  arts: Luz Minaya immerses themselves in watercolor painting inspired by rocket silhouettes, frequents local galleries showcasing contemporary artists like Shepard Fairey, performs classical guitar pieces
    by Andrés Segovia in a folk ensemble, and draws creative energy from the works of Frida Kahlo and the music of Gustavo Santaolalla, they integrate artistic appreciation into their scientific mindset.
  travel: Luz Minaya prefers meticulously planned trips to dark‑sky locations such as Flagstaff, Arizona, and the Atacama Desert for stargazing, but also enjoys spontaneous weekend getaways to coastal vineyards
    in Napa and cultural festivals in Oaxaca, they balance a love of adventure with budget‑conscious family considerations.
  culinary: Luz Minaya delights in preparing mole poblano with roasted chilies, cilantro, and a hint of basil, crafting tamales with locally sourced corn masa and smoked chipotle, and experimenting with
    Californian twists like avocado‑lime salsa, they showcase a skilled home chef who blends traditional flavors with fresh, seasonal ingredients.
  core: Luz Minaya is a detail‑oriented aerospace leader who channels curiosity into art and astronomy, worries about deadlines and health, yet finds balance through yoga, gardening, and inventive cooking,
    they embody a harmonious blend of precision and creativity.
background:
  cultural: 'Luz is a second‑generation Mexican‑American whose parents emigrated from Jalisco in the 1960s. Raised in Sacramento''s vibrant Latino community, she grew up bilingual, speaking Spanish at home
    and English at school. Family and community ties are strong; she participates in local Mexican cultural festivals, celebrates Día de los Muertos, and maintains the tradition of preparing tamales with
    her mother. Her Catholic upbringing informs her values of compassion, humility, and communal responsibility. Luz’s cultural identity shapes her professional outlook: she actively mentors Latinx students,
    volunteers with STEM outreach programs for underrepresented youth, and cultivates a workplace environment that respects diversity. While she fully embraces her American professional life in the aerospace
    sector, she remains deeply connected to Mexican artistic traditions, often drawing inspiration from the works of Frida Kahlo and Mexican muralists in her creative pursuits.'
