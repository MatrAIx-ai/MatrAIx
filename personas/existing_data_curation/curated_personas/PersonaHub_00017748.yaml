persona_description: A paleoanthropologist who specializes in the study of ancient human societies, particularly those that lived in the steppes of Mongolia and Eastern Europe. Her research interests include
  the domestication of horses, the diet and behavior of these animals, and the social and economic structures of these societies. She is particularly interested in the evidence of horse domestication at
  the Botai site in Kazakhstan and the implications of this for the evolution of domesticated animals.
