  career_goals: Although currently out of the formal workforce, Herbert aims to channel his experience into a meaningful role within his community. He plans to volunteer as a coordinator for the local arts
    council, helping organize exhibitions, public art installations, and workshops that bring together diverse age groups. He also aspires to launch a small community‑garden program that provides fresh
    produce and a gathering space for seniors and youths alike. Long‑term, he hopes to obtain a certification in community counseling so he can mentor at‑risk teenagers, using his life experience to guide
    them while maintaining a low‑stress, flexible schedule that supports his health and family life.
