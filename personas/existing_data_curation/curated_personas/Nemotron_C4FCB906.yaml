  career_goals: Lily aims to transition from bedside nursing to a leadership role that allows her to shape patient‑care systems. In the short term, she plans to earn a certification in Nurse Management
    and lead a hospital‑wide quality‑improvement team focused on medication safety. Over the next five years, she intends to complete a Master of Science in Nursing with a concentration in Nursing Administration,
    positioning herself for a Nurse Manager position in her current health system. Long‑term, Lily aspires to become a Director of Clinical Services or a Clinical Educator, where she can design staff development
    programs, mentor future nurses, and influence policy on patient safety and community health outreach. She also hopes to champion a regional health‑literacy initiative that provides free workshops for
    seniors in Placer County.
