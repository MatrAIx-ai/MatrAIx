personas:
  professional: Lily Jones, a seasoned registered nurse with a talent for health informatics, merges precise clinical assessment with data‑driven quality improvement, and they lead interdisciplinary teams
    with calm, methodical authority while mentoring staff toward evidence‑based practice.
  sports: Lily Jones spends her weekends hiking the Sierra Nevada foothills with the Placer County Trailblazers, follows the Sacramento Kings for basketball and the San Jose Earthquakes for soccer, and
    they sustain their fitness through a disciplined weekly yoga practice.
  arts: Lily Jones captures the golden light of Sierra landscapes with a vintage Nikon, channels Ansel Adams's black‑and‑white aesthetic, devours historical fiction by Hilary Mantel and Ken Follett, and
    they occasionally enjoy a performance at the Reno Little Theater.
  travel: Lily Jones favors purposeful weekend escapes that combine nature and culture, having trekked Yosemite’s Mist Trail, savored wine tasting in Napa Valley, and they plan a future culinary pilgrimage
    to Italy’s Amalfi Coast, all while balancing travel costs against their family’s budget.
  culinary: Lily Jones experiments with Mediterranean ratatouille and miso‑glazed salmon, frequently improvises with fresh basil, sumac, and extra‑virgin olive oil, and they delight in sharing these dishes
    with friends, though they sometimes over‑salt their creations in their enthusiasm.
  core: Lily Jones, a 46‑year‑old data‑savvy nurse, blends a love for garden‑fresh cooking, mountain hikes, and meticulous health‑data analysis, they occasionally forget to water succulents and over‑book
    their calendar.
background:
  cultural: Lily is a white American with English and German ancestry, raised in the suburban environs of Sacramento County before moving to Roseville. Her family emphasized education, community service,
    and self‑reliance, values that mirror broader Californian cultural themes of health consciousness and environmental stewardship. Growing up in a diverse, progressive region, Lily developed an appreciation
    for multicultural perspectives while maintaining a strong sense of personal responsibility. These cultural influences shape her collaborative work style, her commitment to patient advocacy, and her
    active participation in local volunteer initiatives.
