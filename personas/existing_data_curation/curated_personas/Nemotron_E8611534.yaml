personas:
  professional: Brittany Evans, a budding junior naturalist, channels their curiosity and practicality into exploring the nearby park, cataloguing leaves and watching butterflies while balancing schoolwork
    with unstructured play and occasional LEGO building sessions.
  sports: Brittany Evans, an enthusiastic member of the Greenfield Kids Soccer League, darts across the field with boundless energy, looks up to Seattle Sounders FC forward Jordan Morris for inspiration,
    and proudly wears the team’s jersey while also cheering on the local Little League baseball squad on weekends.
  arts: Brittany Evans delights in drawing vibrant pictures with Crayola markers, coloring picture books by Eric Carle and Dr. Seuss, building intricate LEGO creations, and watching Pixar’s “Finding Nemo”
    and Disney’s “Moana” for artistic inspiration, often sprinkling glitter on every craft.
  travel: Brittany Evans loves family road trips to places like the Great Smoky Mountains National Park and Disney World, prefers spontaneous stops for ice‑cream and leaf‑collecting, plans adventures through
    colorful stickers on a travel journal, yet relies on their parents for scheduling and budget constraints.
  culinary: Brittany Evans favors simple meals such as peanut butter‑jelly sandwiches, cheesy macaroni, and banana‑strawberry smoothies, enjoys sprinkling edible glitter on cupcakes they bake with cocoa
    powder and vanilla extract, and eagerly requests crunchy apple slices as a snack.
  core: Brittany Evans, a six‑year‑old leaf‑collector and glitter‑glued craft enthusiast, blends boundless curiosity with a relaxed, slightly disorganized streak, often swapping soccer practice for sticker‑filled
    LEGO builds while forgetting to tidy up their colorful play space.
background:
  cultural: Brittany grows up in the suburban community of Suwanee, Georgia, a region known for its blend of Southern hospitality and growing cultural diversity. Her family participates in local traditions
    such as summer community festivals, neighborhood block parties, and seasonal celebrations that feature foods like peach cobbler and barbecued dishes. They attend a local Baptist church occasionally,
    which reinforces values of kindness and community service. Brittany’s school reflects the diverse makeup of Gwinnett County, exposing her to classmates from a variety of cultural backgrounds, and encouraging
    inclusive activities and learning experiences.
