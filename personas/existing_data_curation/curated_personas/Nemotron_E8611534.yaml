  career_goals: Brittany dreams of growing up as someone who helps others and explores the natural world. She often says she wants to be a veterinarian because she loves caring for animals, and she also
    imagines becoming a teacher or a scientist who studies plants and space. Her practical side leads her to think about careers where she can create and solve problems, such as an engineer or a community
    helper.
