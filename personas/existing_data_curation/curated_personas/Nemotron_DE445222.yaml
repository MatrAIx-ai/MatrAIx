personas:
  professional: Lois Khairi, an aspiring young storyteller and budding illustrator, channels their curious mind and methodical planning into sketching vivid characters, drafting adventure plots, and sharing
    illustrated stories during school art shows.
  sports: Lois Khairi enjoys weekly T‑ball practice with the Pueblo Youth Baseball Club, cheers for the Colorado Rockies and Denver Broncos on game days, and spends free afternoons biking along the Sand
    Creek Trail, often stopping to kick a soccer ball with friends from the neighborhood park.
  arts: Lois Khairi draws inspiration from the whimsical worlds of Beatrix Potter and the bold watercolors of Claude Monet, frequently recreating their favorite scenes while listening to classic tunes by
    The Beatles during community art class at the Pueblo Public Library.
  travel: Lois Khairi dreams of hiking among the red rock arches of Arches National Park and stargazing at Cherry Creek State Park, yet routinely explores nearby Pueblo’s historic downtown and enjoys family
    weekend trips to the Denver Botanic Gardens, balancing a love of adventure with the need for school‑time routines.
  culinary: Lois Khairi delights in assembling homemade veggie tacos with seasoned ground beef, fresh cilantro, diced tomatoes, and a squeeze of lime, and also loves blending strawberry‑banana smoothies
    with Greek yogurt, often helping whisk pancake batter under careful supervision.
  core: Lois Khairi is a curious, organized eight‑year‑old who turns nature walks into sketchbook stories, builds meticulous Lego cities, and navigates occasional allergy bouts with quiet determination.
background:
  cultural: Lois Anne is raised in a white, middle‑class family in Pueblo, Colorado. Her upbringing blends typical American traditions—celebrating holidays like Thanksgiving, Fourth of July, and Halloween—with
    the multicultural flavour of the Southwest. Pueblo’s strong Hispanic community and local Native American heritage expose her to Spanish words, regional foods, and cultural festivals such as the Pueblo
    Chile & Frijoles Cook‑Off. Her family values education, community involvement, and outdoor exploration, encouraging her to visit local museums, the Pueblo Zoo, and the historic El Pueblo Museum, which
    nurture her curiosity for art, history, and nature.
