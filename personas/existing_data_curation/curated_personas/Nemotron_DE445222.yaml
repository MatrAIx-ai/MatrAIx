  hobbies: '[''Drawing and sketching'', ''Watercolor painting'', ''Nature walks and journaling'', ''Lego building and design'', ''Puzzle solving (jigsaws, logic games)'', ''Community art classes'', ''Recorder
    music lessons'', ''Reading adventure and mystery books'']'
  career_goals: Lois dreams of a future where she can combine her love of nature, art, and discovery. She often talks about becoming a wildlife artist who draws and illustrates animals in their habitats,
    or a museum curator who designs interactive exhibits that teach other kids about science and art. She also imagines exploring the world as a young scientist‑explorer, conducting experiments and sharing
    her findings through vivid drawings and stories. Her goal is to keep learning, stay organized, and help others appreciate the beauty of the natural world.
