  career_goals: Yvonne aims to deepen her artistic practice and share it with others. She plans to curate a small exhibition of her watercolours at the local community centre and to launch a weekly art‑craft
    circle for seniors. She also hopes to compile her poems and reflections into a modestly published chapbook. In service, she aspires to expand her volunteer caregiving to include a peer‑support hotline
    for older adults and to complete a short course in art‑therapy basics. Personal ambitions include learning digital illustration tools, traveling to regional art museums for inspiration, and maintaining
    her mental well‑being through regular mindfulness practice.
