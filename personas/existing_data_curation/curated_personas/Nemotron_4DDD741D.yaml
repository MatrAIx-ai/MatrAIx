  hobbies: '[''Playing bridge'', ''Chess'', ''Community theater acting'', ''Set design for theater'', ''Fishing'', ''Gardening'', ''Volunteer computer tutoring'', ''Weekly bingo'', ''Cooking classic American
    dishes'']'
  career_goals: David aims to transition from full-time development to a part-time advisory role where he can mentor the next generation of developers and oversee the migration of legacy casino systems
    to modern platforms. He is determined to codify his systematic development approach in a comprehensive best-practices guide for the organization, hoping to earn recognition as a trusted technical authority.
    While he values a stable routine, he also wants to take on a few high-impact, performance-optimization projects that will allow him to demonstrate his competitive edge and leave a lasting contribution
    before fully retiring.
