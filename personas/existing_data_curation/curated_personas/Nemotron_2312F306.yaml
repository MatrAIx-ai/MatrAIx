  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting and sketching'', ''Reading historical novels and biographies'', ''Gardening (herbs and vegetables)'', ''Cooking traditional Vietnamese
    dishes'', ''Practicing tai chi for stress relief'', ''Personal journaling and memoir writing'', ''Genealogy research'', ''Attending cultural festivals'', ''Listening to classical and traditional Asian
    music'', ''Volunteer work at local senior center'', ''Learning calligraphy'']'
  career_goals: Although retired from formal employment, Epifania aims to obtain a certificate in museum studies to serve as a docent for Asian art at a local museum, leveraging her art curiosity and disciplined
    approach. She aspires to publish a memoir and accompanied family oral history that documents her migration story, fulfilling her high standards for achievement. She also plans to lead intergenerational
    art‑appreciation workshops for seniors and youth, and to organize culturally resonant events that strengthen community ties. A personal ambition includes traveling to Vietnam to connect with her heritage
    sites and to deepen her understanding of traditional practices.
