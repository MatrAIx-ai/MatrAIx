personas:
  professional: Epifania Tran, a retired community organizer turned aspiring museum docent, leverages their bilingual fluency, meticulous budgeting, and archival research skills to curate intimate Asian
    art exhibitions for seniors, channeling their disciplined, high‑standard mindset and quiet curiosity into every program they design.
  sports: Epifania Tran stays active through weekly tai chi sessions at the senior center’s wellness club, enjoys gentle morning walks in the community garden, and follows the Portland Trail Blazers and
    Seattle Mariners for seasonal excitement, preferring low‑impact movement over competitive sports.
  arts: Epifania Tran immerses themselves in watercolor landscapes inspired by Claude Monet, studies calligraphy alongside works by Ai Weiwei, and finds solace listening to Yo‑Yo Ma’s cello suites and traditional
    guzheng melodies, often curating informal exhibitions that blend classic European techniques with East Asian aesthetics.
  travel: Epifania Tran favors thoughtfully planned journeys that balance cultural immersion with comfortable pacing, having already visited Kyoto’s historic temples and the rice terraces of Sapa, they
    now hope to travel to the ancestral villages along Vietnam’s Mekong Delta and to explore the art museums of Florence, always budgeting each trip with spreadsheet precision.
  culinary: Epifania Tran expertly prepares fragrant phở broth, crisp bánh xèo pancakes, and herb‑laden summer rolls, delighting in fresh cilantro, lemongrass, and star anise, while their modest cooking
    skill level allows them to experiment confidently yet occasionally over‑salt a dish when lost in conversation.
  core: Epifania Tran is a meticulously organized, quietly curious senior who blends artistic devotion with a propensity for worry, channeling their high standards into community workshops while indulging
    in herb garden meditations and occasional over‑planning of museum visits.
background:
  cultural: Epifania is a first‑generation Southeast Asian (Vietnamese) immigrant who grew up in the vibrant multicultural landscape of Southern California. Her family maintains strong ties to Vietnamese
    traditions, celebrating Lunar New Year (Tet), practicing Buddhist rituals, and preserving the Vietnamese language at home. The values of respect for elders, communal responsibility, and dedication to
    education shape her daily life. Living in El Monte, she navigates a blend of her heritage and mainstream American culture, contributing to local cultural festivals, participating in community churches,
    and supporting neighborhood initiatives that honor both her roots and her adopted home.
