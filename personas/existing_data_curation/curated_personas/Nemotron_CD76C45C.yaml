personas:
  professional: Teresa Moyer, a seasoned acute-care nurse known for razor‑sharp assessment skills, complex IV therapy expertise, and evidence‑based wound management, merges her analytical mindset with her
    love of watercolor to design creative curricula, even as they wrestle with a tendency to procrastinate on paperwork and resist rigid timelines.
  sports: Teresa Moyer, an avid hiker who explores the Cedar Ridge Preserve each Saturday, a member of a local cycling club that meets for weekend rides, a loyal fan of the Dallas Cowboys and Mavericks,
    and a participant in yoga classes at a community studio, they approach fitness with a mix of structured training and spontaneous trail adventures.
  arts: Teresa Moyer, a passionate watercolorist captivated by Texas sunsets, regularly visits galleries featuring Kehinde Wiley and Georgia O’Keeffe, volunteers in an improv troupe that channels the quick
    wit of Tina Fey, strums the ukulele to the mellow tones of Jack Johnson, and dives into sci‑fi novels by Neil Gaiman and philosophical texts by Slavoj Žižek, they weave artistic inspiration into everyday
    life.
  travel: Teresa Moyer, a spontaneous road‑tripper who often maps out quick getaways to Hill Country vineyards, has trekked the historic streets of Santa Fe, dreams of wandering Kyoto’s art districts and
    Florence’s Renaissance galleries, they balance these wanderlust pursuits with family responsibilities and a tight schedule, preferring a blend of adventure and cultural immersion over leisurely beach
    vacations.
  culinary: Teresa Moyer, an intermediate‑level home chef who relishes crafting miso‑glazed salmon with fresh basil, simmering smoky paprika‑infused Texas chili, experimenting with cactus‑topped tacos,
    and exploring eclectic dishes like pho at neighborhood restaurants, they treat each meal as a canvas for flavor experimentation while never missing the latest fusion pop‑up.
  core: Teresa Moyer blends clinical precision with artistic improvisation, they channel curiosity into inventive patient education, yet constantly battle a love‑hate relationship with structure that fuels
    both spontaneous brilliance and deadline‑driven chaos.
background:
  cultural: Teresa grew up in a middle‑class, white family in Dallas County, absorbing a blend of Southern hospitality and the forward‑looking, tech‑savvy culture of the Dallas metro area. Her family’s
    roots trace back to German and Irish immigrants, which fostered a respect for hard work, self‑reliance, and community involvement. The regional emphasis on education encouraged her pursuit of a STEM
    degree, while the vibrant local arts scene sparked her lifelong curiosity about creative expression. Living in Duncanville, she experiences the mix of suburban values—family ties, church involvement,
    and a love for barbeque—with the progressive, multicultural fabric of the larger Dallas community, shaping her competitive drive and independent outlook.
attributes:
  skills: '[''Acute patient assessment'', ''IV therapy and medication administration'', ''Wound care and dressing management'', ''Electronic medical record (EMR) optimization'', ''Lab data interpretation'',
    ''Quality improvement and data analysis'', ''Clinical mentorship'', ''Integrative art‑therapy techniques'', ''Crisis and emergency response'', ''Patient education and health coaching'']'
  hobbies: '[''Watercolor painting'', ''Visiting art galleries and pop‑up shows'', ''Reading science‑fiction and philosophy'', ''Exploring diverse cuisines and cooking'', ''Hiking in local nature preserves'',
    ''Succulent gardening'', ''Volunteering at health fairs'', ''Improv theater'', ''Playing ukulele'']'
  career_goals: Teresa aims to transition from bedside nursing to a clinical nurse educator role where she can shape curricula that blend scientific rigor with creative patient‑centred approaches. She intends
    to lead a multidisciplinary quality‑improvement initiative focused on reducing readmission rates for chronic wounds in Dallas County, and to earn a Master of Science in Nursing (Leadership) to qualify
    for a nurse‑manager position. In the longer term, she hopes to develop an outpatient program that integrates art‑therapy and preventive health education for underserved populations, ultimately advancing
    toward a family‑practice nurse practitioner certification.
