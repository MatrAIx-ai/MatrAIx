  hobbies: '[''Softball league'', ''Zumba fitness classes'', ''Trivia nights'', ''Volunteer work at Decatur food bank'', ''Gardening'', ''Cooking and trying new recipes'', ''Reading personal development
    books'', ''Knitting'', ''Hiking in state parks'']'
  career_goals: Toni aspires to move into a supervisory role within her warehouse, such as shift lead or assistant manager, where she can apply her organizational strengths and drive performance improvements.
    She plans to obtain certifications in supply chain logistics and forklift operation and is considering enrolling in an associate’s degree program in logistics or business administration to broaden her
    career prospects. Ultimately, she aims to secure a stable, predictable schedule that offers higher responsibility and a clear pathway to a logistics coordinator or supply chain analyst position.
