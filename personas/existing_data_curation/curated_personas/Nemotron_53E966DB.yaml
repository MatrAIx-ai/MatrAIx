personas:
  professional: Toni Barnhardt is a detail‑driven warehouse operations specialist who leverages her methodical expertise in inventory control, WMS, and forklift safety to train new staff, chase performance
    metrics, and push for process improvements as she prepares for a supervisory role.
  sports: Toni Barnhardt pitches for the Decatur Dynamo women’s softball team, breaks a sweat in community Zumba sessions, roots for the Chicago White Sox, and belongs to the Mid‑Illinois Running Club for
    occasional 5‑k runs.
  arts: Toni Barnhardt devours personal‑development titles like Atomic Habits by James Clear, knits scarves while listening to The Lumineers, and attends neighborhood theater productions starring local
    talent.
  travel: Toni Barnhardt spends her weekends hiking Starved Rock State Park and camping at Hoosier National Forest, plans future getaways to Asheville’s art‑laden streets and New Orleans’ jazz scene, and
    favors meticulously plotted itineraries over spontaneous trips.
  culinary: Toni Barnhardt experiments with garden‑fresh dishes such as lemon‑herb quinoa with roasted beets, perfects a spicy shrimp taco recipe, and masters a sourdough starter, while still indulging
    in a weekly take‑out pizza night as a stress‑relief reward.
  core: Toni Barnhardt’s competitive, organized nature drives a disciplined work ethic, a hyper‑structured financial life, a diligent health regimen, and a social calendar packed with softball, Zumba, and
    craft‑filled evenings—though occasional stress‑driven impulse buys and sleepless nights betray their perfectionist streak.
background:
  cultural: Toni was raised in a middle‑class, predominantly white neighborhood in Decatur, Illinois, where Midwestern values such as hard work, practicality, and community involvement were emphasized.
    She attended local public schools and spent her teenage years participating in school sports and church groups, which fostered a sense of sociability and teamwork. Her cultural upbringing blends traditional
    Midwestern hospitality with a modern, independent outlook, shaping her pragmatic approach to life and work while maintaining strong ties to family and local community events.
attributes:
  skills: '[''Inventory control'', ''Order fulfillment'', ''Product placement'', ''Warehouse Management System operation'', ''Barcode scanning'', ''Data entry'', ''Forklift operation (certified)'', ''Process
