  the outcomes of these battles. He also has an interest in the political and social structures of the Assyrian Empire during Sargon II's reign. He is likely to have access to a wide range of sources and
  materials on Sargon II and his reign, including historical texts, inscriptions, and archaeological evidence. He is also likely to have a deep understanding of Assyrian history and the cultural and political
  context of the time.
