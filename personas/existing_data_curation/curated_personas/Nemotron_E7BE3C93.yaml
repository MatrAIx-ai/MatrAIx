personas:
  professional: Ronan Szuszkiewicz, a 43‑year‑old high‑school physics and computer‑science teacher, designs data‑driven curricula and leads the school robotics club with methodical precision, leveraging
    his competitive drive and skeptical eye to ensure every tech integration is evidence‑based while mentoring novice teachers.
  sports: Ronan Szuszkiewicz powers forward for his co‑ed Saturday soccer league, hikes Griffith Park trails with a local hiking group, and roots for the LAFC while cheering on the Los Angeles Lakers during
    the basketball season.
  arts: Ronan Szuszkiewicz performs rhythm guitar in a neighborhood folk band, delights in improv nights at The Groundlings, regularly attends stand‑up sets by comedians like John Mulaney, and hosts board‑game
    evenings featuring titles such as Catan and Ticket to Ride.
  travel: Ronan Szuszkiewicz prefers weekend road trips to California’s national parks, has trekked Yosemite’s Half Dome, dreams of a cultural immersion tour of historic towns in Europe, and plans a future
    family vacation to the coastal towns of New Zealand.
  culinary: Ronan Szuszkiewicz experiments in the kitchen, fusing his family’s traditional recipes—like hand‑rolled dumplings and smoked sausage—with Californian staples such as avocado, quinoa, and heirloom
    tomatoes to create dishes such as a kale‑quinoa dumpling bake.
  core: Ronan Szuszkiewicz is a hyper‑organized, competitively driven educator who channels his chronic worry into yoga, fuels his social energy through soccer, improv, and folk music, and meticulously
    balances a disciplined financial plan with experimental cooking.
background:
  cultural: Ronan is a second-generation Polish-American. His grandparents emigrated from Krakow in the 1970s, and his family settled in the San Fernando Valley, where he grew up in a middle-class, culturally
    mixed neighborhood. Though English is his primary language, he learned conversational Polish and continues to celebrate traditions such as Wigilia and Smigus-dyngus with his extended family. Living
    his entire life in Los Angeles, he has been shaped by the city's diverse cultural landscape, which fostered his appreciation for multicultural perspectives and informed his inclusive teaching style.
    He identifies as white American, and his upbringing blended the work ethic of his Polish heritage with the progressive, collaborative ethos of California's public education system.
