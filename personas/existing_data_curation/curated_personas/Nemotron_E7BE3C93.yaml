  career_goals: Ronan aims to move into a leadership role within his district, such as STEM department chair or instructional coordinator, where he can shape district-wide curriculum standards. He plans
    to earn a master's degree in educational leadership within the next three years and to secure grant funding for an expanded robotics and maker program that serves underrepresented students. Long-term,
    he envisions publishing research on effective technology integration, presenting at national education conferences, and eventually influencing state STEM policy through a position on the California
    Board of Education advisory panel.
