  hobbies: '["Reading (science fiction, historical nonfiction)", "Urban gardening", "Yoga and mindfulness practice", "Volunteer safety education for youth", "Hiking local trails", "Cooking traditional African‑American
    and Caribbean dishes", "Crossword and logic puzzle solving", "DIY home repair projects"]'
  career_goals: Raven aims to advance to a senior HAZMAT supervisor role within the next five years, leveraging her hands‑on experience to oversee larger projects and mentor a broader team. She plans to
    complete a bachelor’s degree in Environmental Health and Safety, earn an OSHA 30‑hour certification, and eventually obtain the Certified Safety Professional (CSP) credential. Long‑term, she envisions
    transitioning into a consulting position focused on sustainable waste‑management solutions for municipalities and private firms, combining her practical expertise with strategic oversight.
