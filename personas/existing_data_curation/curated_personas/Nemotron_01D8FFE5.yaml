personas:
  professional: A certified HAZWOPER specialist, Raven Chery leverages methodical planning, meticulous risk assessments, and a collaborative yet assertive leadership style to guide small crews through hazardous
    material operations, while pursuing advanced safety certifications to secure a senior supervisory role.
  sports: Raven Chery stays fit through weekly hikes in the Watchung Reservation and daily yoga, participates in the local New Jersey Hiking Association, and follows the New York Knicks in basketball season
    while cheering for the New Jersey Devils during hockey playoffs.
  arts: Raven Chery unwinds with science‑fiction epics by Ursula K. Le Guin, riffs through crossword puzzles, and curates playlists featuring Janelle Monáe and the ambient scores of Christopher Nolan films,
    finding artistic inspiration in both literature and music.
  travel: Raven Chery prefers meticulously planned getaways that blend outdoor adventure with cultural immersion, having trekked the Blue Mountains of Jamaica and explored Asheville’s arts scene, while
    dreaming of a solo hike through Iceland’s volcanic trails.
  culinary: Raven Chery’s culinary repertoire features aromatic Jerk Chicken, simmered collard greens, and sweet potato pie, seasoned with garden‑grown thyme and cilantro, and while skillful, they occasionally
    burn the edges of a curry while multitasking.
  core: Raven Chery is a methodical hazard‑safety specialist who channels curiosity into solitary pursuits, balancing disciplined budgeting with occasional splurges on garden tools, and can’t resist solving
    a crossword before bed.
background:
  cultural: Raven was raised in a close‑knit Black family that moved from Newark to Saddle Brook when she was a teenager. Her parents emphasized education, community service, and cultural pride, often taking
    her to church gatherings where gospel music, storytelling, and communal meals reinforced a sense of belonging. Celebrations such as Juneteenth and Kwanzaa were integral parts of her upbringing, instilling
    values of resilience, collective responsibility, and reflection on heritage. Extended family ties include Caribbean roots, exposing her to diverse culinary flavors and rhythmic music that influence
    her cooking and leisure listening. This blend of African‑American traditions and Caribbean influences shapes Raven’s respectful approach to collaboration, her commitment to giving back, and her appreciation
    for both established customs and new ideas.
attributes:
  skills: '["HAZWOPER certification", "DOT hazardous materials endorsement", "Hazardous material identification", "Decontamination procedures", "Safety compliance and documentation", "PPE selection and
