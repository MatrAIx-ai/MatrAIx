  hobbies: '[''Family Barbecues & Mexican Cooking'', ''Playing Guitar at Community Events'', ''Fishing on Laguna Madre'', ''Hunting'', ''Adult Soccer League'', ''Mentoring Young Drivers'', ''Participating
    in Día de los Muertos Parade'', ''Volunteer at Local Church'', ''Attending Tex-Mex Music Festivals'', ''DIY Woodworking Projects'']'
  career_goals: Rigo aims to move from solo driving to a supervisory role within a regional transport company, eventually becoming a fleet manager who designs routes and mentors new drivers. He plans to
    earn the Certified Transportation Professional (CTP) credential and add endorsements for hazardous‑material transport, positioning himself for higher earnings and greater responsibility. In the longer
    term, he dreams of launching his own small trucking operation that serves local agricultural businesses around the Gulf Coast, giving him the stability he seeks for his family while allowing him to
    apply his disciplined, organized approach on a larger scale. Reducing daily stress, improving work‑life balance, and gaining recognition as a reliable leader are key motivators.
