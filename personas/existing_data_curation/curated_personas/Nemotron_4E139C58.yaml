  hobbies: '[''Gardening'', ''Cooking (Southern and Tex‑Mex fusion)'', ''Quilting'', ''Crossword puzzles'', ''Sudoku'', ''Reading historical fiction'', ''Gospel choir attendance'', ''Chess'', ''Volunteer
    reading at library'']'
  career_goals: Though retired from formal employment, Mary aims to deepen her involvement in community service by leading a senior volunteer mentorship program at the local community center, organizing
    an annual cultural heritage fair that showcases Black and Hispanic traditions, and completing a memoir that highlights the experiences of African‑American women in South Texas. She also seeks to improve
    her digital skills to help fellow seniors navigate online resources.
