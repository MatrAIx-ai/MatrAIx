personas:
  professional: Ronald is an aspiring junior naturalist and budding coder who spends weekends mapping woodland trails, building LEGO structures that mimic animal habitats, and tinkering with simple coding
    projects, thereby channeling their curiosity and practical problem-solving into early science-fair experiments and classroom technology assignments.
  sports: Ronald loves playing soccer for the Flippin Rovers youth league, cheers on the Arkansas Razorbacks men's basketball team during March Madness, and admires the St. Louis Cardinals, while keeping
    a loosely organized schedule of weekend bike rides and occasional fishing trips that satisfy their love of the outdoors.
  arts: 'Ronald enjoys drawing wildlife cartoons inspired by National Geographic, humming Disney Pixar''s signature song ''You''ve Got a Friend in Me'', dancing to country hits by Kelsea Ballerini, and
    recreating favorite scenes from the animated series ''Avatar: The Last Airbender'' using LEGO figures, all of which feed their imagination and provide a playful outlet.'
  travel: Ronald has explored the nearby Ozark trails and taken a family road trip to Hot Springs National Park, dreams of visiting Walt Disney World in Orlando for the ultimate theme-park adventure, and
    hopes one day to wander Yellowstone National Park's geysers after watching a nature documentary, all while their parents balance the cost with weekly budgeting.
  culinary: Ronald loves snacking on crispy fried chicken and buttery corn on the cob at family barbecues, helps stir fresh garden tomatoes into a simple pasta sauce, and proudly devours a slice of warm
    apple pie topped with vanilla ice cream after a successful LEGO build, reflecting their enjoyment of hearty Southern flavors and hands-on cooking.
  core: Ronald blends boundless curiosity about nature and technology with a practical, hands-on approach, yet their relaxed, sometimes disorganized habits and a tendency to worry make them both a kind,
    cooperative friend and an occasionally anxious explorer.
background:
  cultural: Ronald was raised in Flippin, a small town in Cleburne County, Arkansas, in a close‑knit, predominantly white community where southern hospitality and neighborly cooperation are valued. He attends
    a local public elementary school, participates in church youth activities, and celebrates regional traditions such as community fairs, county fairs, and seasonal hunting and fishing trips with family.
    The rural setting gives him a strong connection to nature, a respect for hard work, and an appreciation for simple, practical skills passed down through family and community.
