persona_description: A German architect who is known for his minimalist and sustainable architecture, particularly for the Pilgrimage Church in Neviges, Germany. He is a winner of the Pritzker Architecture
  Prize in 1986, which suggests his work is of significant and enduring importance. He likely has a deep understanding of his craft, having created a monumental structure that requires a large amount of
  concrete and steel-reinforcing bar, and is considered one of the most decisive, significant, and unsung spaces of the 20th Century. His work is likely to be celebrated for its compact, focussed, and enduring
  nature, and his contributions to the field of architecture are likely to be highly respected.
