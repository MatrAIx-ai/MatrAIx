personas:
  professional: Jane Whitten is a precision instrument technician who expertly calibrates laser interferometers, coordinate measuring machines, and optical microscopes, channeling her curiosity about form
    and function into meticulous workmanship and innovative custom housings, while her competitive edge fuels her ambition to lead a specialist team within five years.
  sports: Jane Whitten enjoys weekend hikes with the Michigan Trailblazers Hiking Club, follows the Detroit Lions in the fall and the Detroit Tigers in spring, and plays pickup basketball at the local community
    center, while maintaining early morning jogs along the Great Lakes shoreline to counterbalance sedentary lab work.
  arts: Jane Whitten frequents Detroit's art districts, attending gallery openings featuring works by Kehinde Wiley and Yayoi Kusama, sketching urban architecture, and capturing street photography inspired
    by Henri Cartier‑Bresson's interplay of light, while listening to ambient compositions by Brian Eno during soldering sessions.
  travel: Jane Whitten prefers meticulously planned road trips that blend art and nature, having explored Detroit's vibrant murals, Cleveland's industrial heritage, and a solo backpacking adventure through
    Algonquin Park, while dreaming of a future visit to the Bauhaus sites in Dessau, Germany.
  culinary: Jane Whitten enjoys cooking simple yet flavorful meals, favoring roasted beet and goat cheese salads with fresh dill, experimenting with homemade kimchi on weekends, and savoring artisanal espresso
    made with Ethiopian Yirgacheffe beans, though they occasionally resort to takeout sushi when time‑constrained.
  core: Jane Whitten blends a meticulous technical mind with a creative eye, turning precision instrument repair into an artful hobby while balancing competitive board‑game nights, spontaneous hikes, and
    a habit of procrastinating on tax filing.
background:
  cultural: Jane grew up in a middle‑class family in the Greater Lansing area, absorbing the pragmatic Midwestern work ethic and a strong sense of community. While her ethnic background is White, her family’s
    cultural practices reflect a blend of traditional Protestant values and an appreciation for the region’s manufacturing heritage. The local emphasis on reliability, modesty, and hands‑on problem solving
    shaped her career choice in precision equipment repair. Exposure to Michigan’s vibrant university environment and its art institutions broadened her interests, encouraging an openness to diverse ideas
    and unconventional thinking. She balances the modest, down‑to‑earth attitude of her upbringing with a curiosity-driven embrace of new technologies and artistic expression.
attributes:
  skills: '[''Precision instrument calibration'', ''Electromechanical troubleshooting'', ''Technical schematic interpretation'', ''Soldering and PCB rework'', ''LabVIEW test automation'', ''Clean-room protocol
    compliance'', ''Preventive maintenance scheduling'', ''CAD (SolidWorks) for custom fixtures'', ''3-D printing for prototype parts'', ''Documentation and quality reporting'', ''Team training and mentorship'']'
  hobbies: '[''Gallery visits and sketching'', ''Street photography of industrial settings'', ''DIY electronics and maker fairs'', ''Competitive board-game nights'', ''Hiking in Michigan woods'', ''Reading
    science journalism and contemporary fiction'', ''Volunteering to teach soldering to teens'']'
  career_goals: Jane aims to become a senior instrument specialist within the next five years, leading a small team that handles high‑value scientific equipment for university labs and industrial R&D. She
    plans to earn an associate degree in Mechatronics or a certification in Advanced Metrology to deepen her technical authority. Long‑term, she envisions designing proprietary calibration procedures and
    possibly launching a boutique service that merges her technical expertise with aesthetic design, offering custom‑finished instrument housings for laboratories that value both function and visual appeal.
    She also seeks opportunities to present at industry conferences, contributing to standards development in precision measurement.
