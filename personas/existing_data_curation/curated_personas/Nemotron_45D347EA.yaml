personas:
  professional: Jaron is a budding game developer who creates simple video games in Scratch and builds intricate LEGO models, channeling their love of logic puzzles into methodical yet spontaneous coding
    projects, though they often abandon unfinished levels when structure feels restrictive.
  sports: Jaron is an enthusiastic streetball player who spends after‑school hours shooting hoops at the neighborhood court, idolizes LeBron James and follows the local high school team, the City Raiders,
    while using a jump‑rope routine to boost stamina.
  arts: Jaron is a sci‑fi enthusiast who devours novels by Isaac Asimov, streams the anime series 'Steins;Gate', and listens to Daft Punk’s synth‑driven tracks while constructing LEGO creations, often collecting
    limited‑edition Marvel graphic novels for inspiration.
  travel: Jaron is an inquisitive traveler who dreams of touring the Kennedy Space Center in Florida and the Canadian Museum of History, enjoys weekend visits to grandparents’ countryside farm where they
    explore barns and fields, but prefers trips with clear itineraries over spontaneous road trips.
  culinary: Jaron is a junior chef who helps prepare collard greens seasoned with smoked turkey and buttery cornbread, loves the tang of lemon zest on homemade pepperoni pizza, and experiments by adding
    toasted pecans to sweet potato casserole.
  core: Jaron is a curious, solitary nine‑year‑old puzzle‑solver whose love of LEGO, Scratch coding, and space documentaries is tempered by a wary, competitive streak, a habit of hoarding allowance, and
    frequent bouts of worry.
background:
  cultural: Jaron is a Black boy raised in Jacksonville, Florida, within a close‑knit African‑American community. He participates in family traditions such as Sunday church services, soul‑food meals, and
    cultural celebrations like Juneteenth and Black History Month, where he learns about notable Black scientists, inventors, and athletes. The local music scene—hip‑hop, R&B, and jazz—fills his home, influencing
    his tastes. He attends a public elementary school with a majority Black student body and takes part in after‑school programs that emphasize STEM and basketball. Stories of resilience and community pride
    shared by his grandparents and extended family shape his identity and motivate him to succeed and give back to his neighborhood.
attributes:
  skills: '[''Reading comprehension (3rd grade level)'', ''Creative writing of short stories'', ''LEGO building (advanced)'', ''Scratch programming (basic game development)'', ''Puzzle solving (logic puzzles,
    beginner Sudoku)'', ''Basketball dribbling and shooting'', ''Basic math problem solving'', ''Observational skills'']'
  hobbies: '[''Reading science‑fiction books'', ''Building LEGO sets'', ''Scratch programming'', ''Playing basketball (one‑on‑one)'', ''Solving logic puzzles and riddles'', ''Watching educational YouTube
    videos on space and robotics'', ''Cooking with family (Southern cuisine)'']'
  career_goals: Jaron dreams of becoming an engineer or inventor who designs gadgets that make daily life easier. He also hopes to join a competitive basketball team and win local tournaments. He aims to
    earn recognition at school science fairs and eventually attend a STEM‑focused high school where he can deepen his coding and robotics skills. Ultimately, he wants to create technology that benefits
    his community while achieving personal success.
