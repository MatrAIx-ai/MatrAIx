  hobbies: '[''Hiking'', ''Wine tasting'', ''Volunteering at community farmers’ markets'', ''Yoga'', ''Recreational volleyball'', ''Strategy board games'', ''Historical fiction reading'', ''Farm‑to‑table
    cooking'', ''Gardening'', ''Attending art fairs'']'
  career_goals: Julianna aims to advance to a senior market insights leadership role within the next five years, overseeing a multidisciplinary research team that drives innovation for consumer‑focused
    brands. She plans to earn the Professional Researcher Certification (PRC) and publish thought‑leadership pieces on consumer behavior in the emerging wine and agribusiness sectors. Long‑term, she envisions
    launching a boutique consultancy that helps regional producers harness data‑driven strategies while maintaining a healthy work‑life balance to support her family and community involvement.
