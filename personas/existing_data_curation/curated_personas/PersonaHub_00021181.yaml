persona_description: A neuro-optometrist who specializes in the evaluation and treatment of visual problems after a stroke, as well as the recovery process of stroke survivors. They work with other rehabilitation
  team members to help stroke survivors learn new ways of performing tasks to circumvent or compensate for any residual disabilities, promoting recovery through various therapies and activities that retrain
  the neural processes of the brain. They are trained to evaluate the integrity of the visual field, unilateral spatial inattention, eye movements, binocular and accommodative systems, and photosensitivity,
  and to suggest an ideal treatment.
