personas:
  professional: A miniature architect, John Simpson meticulously builds towering block structures, merging their innate curiosity with disciplined precision, and they often re-align the blocks after a brief
    play session, hinting at a future professional path in design or engineering.
  sports: A spirited little athlete, John Simpson loves sprinting across the backyard in summer, follows the local minor-league baseball team the Springfield Sluggers on TV, attends a weekly toddler gymnastics
    class called Little Movers, and they eagerly cheer on their favorite cartoon soccer heroes during playtime.
  arts: A budding music enthusiast, John Simpson sings along to Raffi's 'Baby Belug' and Pinkfong's 'Baby Shark', watches Sesame Street's Elmo, flips through picture books illustrated by Eric Carle, and
    they often dance with a homemade ribbon wand, letting these artistic influences color their imagination.
  travel: An adventurous family traveler, John Simpson enjoys road trips to the local zoo and beach, dreams of a future visit to Disney World and a gentle seaside town in Italy, and they love collecting
    smooth stones from each destination as treasured mementos.
  culinary: A messy eater with a budding palate, John Simpson prefers finger-friendly meals like cheesy macaroni, chicken nuggets, and apple slices, delights in the sweet tang of strawberries, proudly uses
    a child-sized fork to scoop peas, and they often leave a colorful sauce trail on their bib.
  core: John Simpson is a miniature perfectionist who lines up toy cars by color, demands snack schedules, insists on bedtime stories in exact three-page increments, and they occasionally throw a tantrum
    when a block tower crumbles.
background:
  cultural: John is raised in a white, middle‑class family in Downers Grove, Illinois, a typical suburban Midwestern community. His upbringing reflects mainstream American customs, including participation
    in local community events, celebration of holidays such as Thanksgiving and the Fourth of July, and exposure to a blend of Catholic and secular values common in the area. The neighborhood’s emphasis
    on education, safety, and organized activities reinforces his naturally disciplined and curious personality.
