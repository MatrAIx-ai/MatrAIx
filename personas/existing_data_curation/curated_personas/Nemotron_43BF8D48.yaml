personas:
  professional: Lisa Blackman leverages her hands‑on cleaning expertise, OSHA safety knowledge, and meticulous inventory management to excel as a building cleaner in Lewisville, while channeling her organized,
    competitive drive toward earning a Certified Professional Cleaner credential, stepping into shift‑supervisor roles, and eventually launching an eco‑friendly facilities‑management business.
  sports: Lisa Blackman hikes the rolling Texas Hill Country trails each weekend, follows the Dallas Cowboys and Dallas Mavericks for seasonal excitement, and maintains a disciplined gym schedule that blends
    strength training with interval cardio, treating each workout as a personal competition to beat her previous performance metrics.
  arts: Lisa Blackman dives into mystery novels by Agatha Christie and historical fiction by Hilary Mantel while also curating indie board‑game sessions featuring titles like Terraforming Mars, and she
    occasionally streams live performances by local folk singer‑songwriter John Moreland, reflecting her curiosity‑driven but practical appreciation for storytelling.
  travel: Lisa Blackman prefers meticulously planned weekend getaways, such as exploring the rugged vistas of Big Bend National Park or savoring the boutique wineries of Fredericksburg, while dreaming of
    a spring trek through Kyoto’s cherry‑blossom gardens to inspire her vegetable garden back home, balancing adventure with budget consciousness.
  culinary: Lisa Blackman cultivates a modest vegetable garden that supplies heirloom tomatoes, sweet peppers, and kale for her favorite roasted‑vegetable quinoa bowls, and she enjoys experimenting with
    quick Mediterranean dishes like lemon‑garlic grilled chicken, though she admits to indulging in late‑night pizza orders when a DIY project runs overdue.
  core: Lisa Blackman is a methodical, competition‑driven facility caretaker who blends meticulous budgeting, proactive health management, and a love for disciplined hiking, reading, and DIY projects into
    a calm, forward‑looking life plan that edges toward entrepreneurial green‑cleaning.
background:
  cultural: Lisa grew up in a Black family in the Dallas‑Fort Worth metro area, absorbing a blend of Southern hospitality and the vibrant multicultural tapestry of Denton County. Church gatherings, family
    storytelling, and celebrations like Juneteenth cultivated a strong sense of community and resilience. She enjoys African‑American musical traditions ranging from gospel to R&B, and she often cooks soul‑food
    dishes with a Texas twist. Her cultural roots emphasize perseverance, collective support, and a pragmatic outlook, which align with her calm demeanor and methodical approach to both work and life.
