  career_goals: Lisa’s long‑term ambition is to move beyond routine janitorial duties into a supervisory and eventually managerial role in facilities operations. She plans to earn a Certified Professional
    Cleaner credential and then step up as a shift supervisor, overseeing multiple cleaning crews and implementing efficiency improvements. Over the next five years she hopes to transition into a facilities
    manager position for a corporate campus, where she can apply her competitive drive to set higher service standards and introduce sustainable, green‑cleaning practices. Ultimately, she envisions launching
    her own small cleaning business that blends practicality with innovative eco‑friendly techniques.
