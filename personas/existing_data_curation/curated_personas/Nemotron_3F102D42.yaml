personas:
  professional: Latrice Collins is a retired administrative professional turned community elder who leverages their meticulous organization, budget-savvy, and persuasive communication to coordinate intergenerational
    events, mentor volunteers, and mediate conflicts, while their natural talkativeness and occasional worry keep them both a charismatic leader and a self-critical planner.
  sports: Latrice Collins stays active through early-morning nature walks along the Riverbank Trail, participates in the senior-spirit bowling league at the community center, and avidly supports the local
    minor-league baseball team, the Riverfront Guardians, while also cheering on the city's women's basketball squad, the Lakeside Lady Hawks, during the winter season.
  arts: Latrice Collins draws artistic inspiration from the delicate floral paintings of Claude Monet, the storytelling of folk singer Johnny Cash, the vivid photography of Ansel Adams, and the classic
    films of director Wes Anderson, while channeling that energy into their own quilting patterns, church choir performances, and local photo exhibits.
  travel: Latrice Collins favors carefully planned road trips that blend relaxed sightseeing with pocket-sized photography sessions, often venturing to historic towns like Savannah and Charleston, exploring
    the Great Smoky Mountains' fall foliage, and journaling their experiences for future community workshops, while balancing a modest retirement budget and the occasional need to tend to their garden.
  culinary: Latrice Collins delights in cooking hearty Southern classics such as smoked collard greens, shrimp-and-grits, and sweet potato pie, expertly seasoning them with heirloom pecans, fresh okra,
    and a dash of hot sauce, while their seasoned hands orchestrate large-scale potluck meals for the senior center, yet they sometimes over-salt dishes in their enthusiasm to impress the choir.
  core: Latrice Collins is a garden-loving, choir-singing, meticulously organized community elder who channels their talkative charm and occasional worry into intergenerational mentorship, even if they
    tend to over-water their begonias.
background:
  cultural: Latrice was raised in a close‑knit African‑American community in rural Florida, where church fellowship, family storytelling, and community resilience were central to daily life. Influenced
    by the traditions of the Black South, she maintains strong ties to her extended family and honors cultural celebrations such as Juneteenth and Kwanzaa. Her grandparents' involvement in the Civil Rights
    movement instilled a deep sense of social responsibility, which she carries forward through volunteerism and mentorship. She blends Southern culinary heritage with contemporary health‑conscious cooking,
    and values the oral histories of her community as a source of identity and pride.
