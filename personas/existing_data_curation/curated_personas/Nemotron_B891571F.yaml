  hobbies: '[''Cooking traditional Southeast Asian dishes'', ''Attending community cultural festivals'', ''Group fitness classes (Zumba, dance)'', ''Volunteering at local community center'', ''Organizing
    social gatherings with friends'', ''Reading personal development books'', ''DIY crafts (scrapbooking, photo albums)'', ''Practicing Vietnamese language with family'']'
  career_goals: Procesa aims to enroll in a community‑college program in Business Administration or Event Management within the next year, followed by a certification as an Administrative Assistant. She
    seeks a full‑time office or operations role at a local non‑profit or small business where she can apply her routine‑focused, practical skill set. Over the next five years, she hopes to advance to an
    Operations Coordinator or Community Program Manager position, allowing her to blend her love for organized work with her sociable nature, ultimately contributing to the well‑being of her neighborhood
    while maintaining a stable, predictable career path.
