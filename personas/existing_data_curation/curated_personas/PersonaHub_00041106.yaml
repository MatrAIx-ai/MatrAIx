persona_description: A scientist with expertise in climate monitoring and assessments, specifically focused on the National Climatic Data Center's development and analysis of the HCN version 2 temperature
  dataset. The scientist is interested in understanding the quality of the data sources, the systematic bias adjustments, and the impact of these adjustments on U.S. temperature trends over the period 1895–2007.
  They are also interested in the effects of changes to the time of observation and the widespread changeover from liquid-in-glass thermometers to the maximum–minimum temperature system (MMTS) on the HCN
  version 2 temperature data.
