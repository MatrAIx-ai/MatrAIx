persona_description: A multidisciplinary artist who explores themes of identity, cultural heritage, and social justice through her work, and who uses felt-making and environmental installations to engage
  with communities and raise awareness about political and social issues. Tanya Aguiñiga's background in fiber art and furniture design, as well as her experience in founding and managing artist cooperatives,
  gives her a unique perspective on the intersection of art and social change. Her work challenges assumptions about cultural representation and the power of art to create dialogue and empathy across different
  communities.
