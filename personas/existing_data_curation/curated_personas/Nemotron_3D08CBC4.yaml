  hobbies: '[''Community dancing'', ''Bingo and senior center games'', ''Desert gardening (succulents and herbs)'', ''Cooking traditional Mexican dishes'', ''Reading historical fiction'', ''Hand embroidery
    and needlework'', ''Participating in Día de los Muertos altar preparations'', ''Walking in Tucson parks'']'
  career_goals: Despite being retired, Maria Veronica remains driven to leave a lasting impact. She aims to mentor younger relatives and community members in cultural traditions, organize intergenerational
    gatherings that celebrate Mexican heritage, and contribute her organizing talent to local senior programs. She also aspires to document her family’s history for future generations, maintain her health
    through regular activity, and continue setting high standards for herself in volunteering and learning new crafts.
