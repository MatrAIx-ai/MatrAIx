  career_goals: Although still young, Yvonne imagines herself as a creator who designs vibrant artwork or invents imaginative stories. She expresses a budding ambition to become an artist, illustrator,
    or storyteller who can share her unique perspectives. Her competitive streak fuels a desire to excel in creative contests and school projects, and her love for orderly processes hints at a future interest
    in architecture or design.
