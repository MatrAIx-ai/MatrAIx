personas:
  professional: Yvonne Ainley, a budding junior architect who constructs intricate Lego towers with methodical precision, channels her curiosity and organized, competitive nature into every pretend‑building
    session at preschool, and they proudly present each new design to peers.
  sports: Yvonne Ainley delights in weekly T‑ball drills with the Orangevale Little Dodgers, cheering the Sacramento River Cats on game days and seasonally dabbling in preschool soccer with the Little Kickers,
    always striving to be the fastest runner on the field and they never miss a chance to practice batting.
  arts: Yvonne Ainley revels in drawing vivid crayon murals inspired by Dr. Seuss and Disney’s Frozen, regularly visiting the Sacramento Museum of Art for the interactive kids’ exhibit and rhythm‑clapping
    along to songs by Sara Bareilles on preschool music hour, and they often rehearse a tiny puppet show for family evenings.
  travel: Yvonne Ainley prefers short, family‑led road trips, having already explored the shallow shores of Lake Tahoe, the towering sequoias of Yosemite, and a memorable bite of a churro at San Francisco’s
    Fisherman’s Wharf, and they always insist on a nap break midway for their favorite stuffed rabbit.
  culinary: Yvonne Ainley gravitates toward buttery macaroni and cheese, pepperoni mini‑pizzas, and apple slices sprinkled with cinnamon, proudly whisking pancake batter with her mother on Saturday mornings
    while demanding extra grated cheddar on every bite, and they always forget to clean up the flour mess afterward.
  core: Yvonne Ainley, a four‑year‑old with a notebook full of Lego blueprints, a piggy bank guarded like a treasure chest, and a fierce competitive streak that makes even playdates feel like championships,
    often pouts when a game isn’t won and they secretively hide extra crayons for later use.
background:
  cultural: Yvonne comes from a white, middle‑class family living in the suburban community of Orangevale, California. Her upbringing reflects typical American cultural practices—celebrating holidays such
    as Thanksgiving and the Fourth of July, attending community events, and participating in preschool programs that emphasize early literacy and creativity. The region’s proximity to Sacramento’s museums
    and parks provides her with exposure to a variety of artistic and cultural experiences, while her family’s values emphasize independence, curiosity, and orderly routines.
