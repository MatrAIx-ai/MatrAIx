persona_description: A person who is interested in learning about and treating back pain caused by bulging discs. They are likely to be a physical therapist, chiropractor, or medical professional who specializes
  in treating back pain. They may also be a patient who is experiencing back pain and is seeking alternative treatments. They are interested in learning about the causes of bulging discs and the different
  treatment options available, such as exercise, pain relieving pills, and heating pads. They may also be interested in learning about the different factors that can cause bulging discs, such as lifting
  heavy weight in an improper posture, taking up an improper posture in the course of one's sleep, and physical injuries done to the discs.
