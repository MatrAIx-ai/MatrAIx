persona_description: A historian who specializes in the study of pre-Columbian civilizations of North and South America, focusing on the development of agriculture, technology, and culture in the Mississippian
  culture and the Andean civilization. Their research interests include the impact of climate on the development of agriculture and the role of the Mississippian culture in the spread of agricultural technology
  and culture to the south. They have a deep understanding of the cultural traits shared among the major pre-Columbian cultures within the region and the reasons for their success in developing high culture.
  They are also interested in the complex interplay of geography, climate, and cultural factors in the development of civilization in the New World.
