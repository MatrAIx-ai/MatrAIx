personas:
  professional: Elizabeth Morrison, a 27‑year‑old elementary and middle‑school teacher in Fort Worth, channels their engineering background and curiosity into crafting hands‑on STEAM curricula, while their
    methodical organization and talkative, sociable demeanor make them the go‑to lead for robotics clubs, after‑school coding sessions, and district‑wide professional‑development workshops as they eye a
    future role as STEM coordinator.
  sports: Elizabeth Morrison keeps active by joining the Fort Worth Trailblazers hiking club for weekend treks, attending weekly Vinyasa yoga, and cheering on the Texas Rangers at Globe Life Field while
    occasionally playing pick‑up soccer with coworkers, balancing their love of nature with a competitive spirit despite occasional fatigue after lesson planning.
  arts: Elizabeth Morrison immerses themselves in Fort Worth’s vibrant arts scene, regularly visiting the Kimbell Art Museum to study Georgia O’Keeffe’s palettes, attending fringe theater productions at
    the Fort Worth Community Theatre, and expressing their own creativity by painting watercolors and strumming a ukulele to Jack Johnson covers at local open‑mic nights.
  travel: Elizabeth Morrison plans trips with the same spreadsheet precision they use for lesson plans, favoring short‑haul adventures like a weekend road‑trip to Santa Fe for its art markets and a DIY
    hike in the Great Smoky Mountains, while dreaming of a longer cultural immersion in Kyoto’s temples once they secure a sabbatical.
  culinary: Elizabeth Morrison’s culinary adventures revolve around fresh farmers’ market finds, as they skillfully whip up spinach‑feta quinoa bowls, shrimp étouffée with Cajun spices, and occasional homemade
    sourdough, while occasionally splurging on premium heirloom tomatoes and smoked brisket for weekend dinner gatherings.
  core: Elizabeth Morrison is a curiosity‑driven, talkative teacher who mixes watercolors with code, obsessively plans every detail yet wrestles with chronic worry, and can’t resist a late‑night habit of
    binge‑solving puzzles while neglecting a bedtime.
background:
  cultural: Elizabeth grew up in a suburban community near Fort Worth within a middle‑class, Anglo‑American family that valued education, community service, and Southern hospitality. Her upbringing blended
    traditional Texan customs—such as church gatherings, family barbecues, and a love for country music—with exposure to the region’s rich multicultural influences, including Hispanic festivals and a thriving
    local arts scene. These experiences fostered her appreciation for diverse perspectives and her commitment to civic involvement. The supportive, education‑focused environment encouraged her curiosity
    in STEM fields and nurtured her sociable, talkative disposition, shaping her identity as a collaborative educator who embraces both the cultural heritage of Texas and the broader artistic community.
attributes:
  skills: '[''STEM content knowledge (math, science)'', ''Inquiry-based lesson design'', ''Curriculum development'', ''Differentiated instruction'', ''Classroom management'', ''Data-driven assessment'',
    ''Educational technology integration (Google Classroom, interactive whiteboards, Scratch, Arduino)'', ''Project-based learning facilitation'', ''Extracurricular club leadership (robotics, science fair)'',
    ''Professional development facilitation'', ''Public speaking and communication'', ''Organizational planning'', ''Collaborative teamwork'']'
  hobbies: '[''Visiting galleries, museums, and theater productions'', ''Watercolor painting'', ''Experimenting with cooking and baking'', ''Reading science-fiction and popular-science books'', ''Yoga and
    mindfulness meditation'', ''Hiking local trails'', ''Volunteer tutoring and after‑school program mentorship'', ''Leading a weekend coding club for children'', ''Playing the ukulele at community events'',
    ''Attending board‑game nights and puzzle solving with friends'']'
  career_goals: Elizabeth aspires to become a district STEM coordinator, where she can shape STEAM curricula and champion innovative teaching practices across Fort Worth schools. To prepare for this leadership
    role, she plans to earn a master's degree in educational leadership and eventually pursue a doctorate in curriculum and instruction. She envisions developing community outreach programs that provide
    hands‑on science and art workshops to under‑served neighborhoods, bridging gaps between schools and local cultural institutions. Long‑term, Elizabeth aims to advance to elementary school principal,
    fostering a culture of curiosity, collaboration, and student well‑being. Additionally, she hopes to author a series of STEM teaching resources and create an online platform for teachers to share lesson
    plans, while advocating for mental‑health awareness and stress‑reduction strategies for educators and students alike.
