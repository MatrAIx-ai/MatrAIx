  hobbies: '[''Watercolor painting'', ''Art museum visits'', ''Travel journaling'', ''Reading historical fiction'', ''Gardening'', ''Birdwatching'', ''Knitting'', ''Volunteering at senior center'', ''Community
    theater attendance'', ''Yoga'']'
  career_goals: Portia aims to transition into a senior training or safety liaison role within her airline, where she can shape safety policies and mentor the next generation of flight crew. She also plans
    to develop a community outreach program that combines travel safety education with local art appreciation, and ultimately to retire with a part‑time consulting position that allows her to share her
    expertise while pursuing personal artistic projects.
