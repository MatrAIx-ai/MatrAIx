  hobbies: '["Surfing", "Beach volleyball", "Hiking (Diamond Head, Makapuu Trail)", "Live music attendance", "Acoustic guitar playing", "Photography", "Craft cocktail mixing", "Cooking (Hawaiian and Balkan
    dishes)", "Beach clean-up volunteering", "Hawaiian language lessons"]'
  career_goals: Philip aims to transition from a front‑line attendant to a supervisory role within the next three years, targeting a venue manager position at a major Honolulu resort or hotel. He plans
    to complete his associate degree in Hospitality Management and obtain certifications in Event Planning and Tourism. In the long term, he envisions opening a boutique beachfront bar that hosts cultural
    nights featuring Hawaiian and Balkan music, dance, and cuisine, blending his heritage with island traditions. He seeks to become a recognized leader who combines creative guest experiences with operational
    efficiency, while mentoring incoming staff and contributing to the local tourism community.
