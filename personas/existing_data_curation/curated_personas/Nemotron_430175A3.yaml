personas:
  professional: Alberto Ayala, a 48‑year‑old bilingual maintenance enthusiast, blends hands‑on carpentry, vehicle repair, and community event coordination into a career aimed at a facilities‑assistant role;
    their penchant for predictable routines drives them to pursue an HVAC certification while their relaxed approach sometimes leads to a cluttered workshop.
  sports: Alberto Ayala enjoys playing in a neighborhood soccer league on Saturday afternoons, cheering for Los Angeles FC during televised MLS matches and rooting for the Los Angeles Dodgers in baseball;
    they also follow the San Diego State Aztecs basketball team and belong to a casual hiking club that meets monthly for trail runs.
  arts: Alberto Ayala fills home workshops with the lively sounds of marimba ensemble Los Discípulos de la Marimba, classic salsa queen Celia Cruz, and contemporary Latin pop star Bad Bunny, often humming
    along while they rebuild a shelf; occasionally they attend the annual San Bernardino Cultural Festival to watch folkloric dance performances.
  travel: Alberto Ayala prefers short, predictable getaways that fit a modest budget, having explored Joshua Tree’s desert trails, spent a weekend in Big Bear’s snowy hills, and taken a road trip to San
    Diego’s historic Old Town; they dream of a future culinary tour of Oaxaca to study regional cooking techniques, but family duties keep trips under a week.
  culinary: Alberto Ayala boasts a well‑worn apron and a talent for crafting tamales, pepian, and chiles rellenos, often sourcing heirloom corn and locally‑grown chilies; their cooking skill sits between
    home‑cook and hobbyist chef, and they love pairing dishes with fresh guava salsa and a splash of lime‑infused agua fresca.
  core: Alberto Ayala channels a love of hands‑on predictability into maintenance work, community service, and weekend cooking, balancing structured goals with a laid‑back charm and occasional paperwork
    procrastination.
background:
  cultural: Alberto is the son of Guatemalan immigrants who settled in Southern California in the late 1970s. Raised in a Spanish‑speaking household, he grew up immersed in Guatemalan customs, from the
    vibrant celebrations of Semana Santa to the aromas of family‑cooked meals. The Catholic faith and strong emphasis on familial unity shaped his values of harmony and cooperation. While he proudly maintains
    these traditions, he also navigated the multicultural landscape of San Bernardino, blending his heritage with the broader Latino and American cultures. This dual identity informs his bilingual communication
    style, his love for community engagement, and his desire to share Guatemalan cuisine and customs with his neighbors.
attributes:
  skills: '["Bilingual communication (Spanish/English)", "Basic carpentry and home repair", "Automotive maintenance", "Gardening and small‑scale horticulture", "Traditional Guatemalan cooking", "Community
