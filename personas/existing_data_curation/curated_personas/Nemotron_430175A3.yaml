  hobbies: '["Cooking traditional Guatemalan dishes", "Gardening and small‑scale horticulture", "Playing and watching recreational soccer", "Listening to marimba, salsa, and Latin music", "Attending local
    cultural festivals", "Walking/hiking in the San Bernardino foothills", "DIY home improvement projects", "Volunteer work at community center (event organization, language tutoring)"]'
  career_goals: Alberto aims to secure a steady, structured position that leverages his hands‑on expertise and bilingual abilities, such as a maintenance technician or facilities assistant at a school,
    community center, or local business. Over the next two years he plans to earn a certification in HVAC or building maintenance to increase his employability and provide a predictable routine for his
    family. In the longer term, he dreams of opening a modest family‑run food stall or pop‑up that offers authentic Guatemalan dishes, combining his culinary passion with a desire to contribute to the cultural
    fabric of his San Bernardino neighborhood while ensuring financial security for his loved ones.
