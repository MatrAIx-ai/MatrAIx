personas:
  professional: Betty Lay, a nine‑year‑old aspiring scientist, applies their keen curiosity and practical problem‑solving to lead simple experiments in their school’s after‑school science club, while their
    spontaneous, often disorganized style means they frequently jump to new projects before finishing the current one.
  sports: Betty Lay splashes through their afternoons with the Everglades Youth Swim Team, sprints across the field for the Biscayne Bay Juniors Soccer Club, and they chant for the Miami Dolphins and Miami
    Heat whenever they watch games on game day.
  arts: Betty Lay sketches whimsical cartoons inspired by Adventure Time and Disney classics, they strum simple chords on their ukulele to sing along with The Wiggles and KidZ Bop renditions of Taylor Swift,
    and they enjoy Saturday morning marathons of Cartoon Network’s power‑packed shows.
  travel: Betty Lay loves weekend family trips to the Everglades, the bright beaches of the Florida Keys, and the dazzling rides at Orlando’s theme parks, they dream of exploring the coral reefs of Cairns,
    Australia, and the rainforests of Costa Rica on a future school‑organized adventure.
  culinary: Betty Lay prefers cheesy pepperoni pizza, crunchy chicken nuggets, and mango‑banana smoothies, they can confidently whip up a batch of no‑bake chocolate oatmeal cookies, and they delight in
    adding fresh basil to their occasional homemade spaghetti sauce.
  core: Betty Lay is a boundlessly curious nine‑year‑old whose relentless energy fuels endless LEGO creations, impromptu nature expeditions, and occasional chaos from a habit of leaving half‑finished projects
    scattered around the house, they often race from one hobby to the next without a clear plan.
background:
  cultural: Betty grows up in a middle‑class white American family in Hollywood, Florida, where the cultural rhythm blends typical U.S. holidays—Thanksgiving, Christmas, Independence Day—with the coastal
    lifestyle of South Florida. Her family enjoys beach outings, seafood dinners, and community events like the Broward County Fair. At school she interacts with classmates from many ethnic backgrounds,
    giving her a natural appreciation for diversity while maintaining her own family traditions such as holiday baking, watching classic cartoons, and playing backyard games. The warm climate and proximity
    to the Atlantic inspire her love of marine life, shaping her curiosity about local ecosystems.
attributes:
