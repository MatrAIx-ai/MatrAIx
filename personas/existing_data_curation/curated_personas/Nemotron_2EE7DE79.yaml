  hobbies: '[''Swimming'', ''Soccer'', ''LEGO building'', ''Reading adventure books'', ''Nature walks'', ''Drawing and doodling'', ''DIY crafts'', ''Science club experiments'', ''Ukulele practice'']'
  career_goals: Betty dreams of turning her love for nature and animals into a future career as a marine biologist or wildlife rehabilitator, inspired by the beaches and Everglades near her home. She also
    hopes to become a teacher, because she enjoys explaining how things work to her friends. In the short term, she wants to lead her class’s science club, organize a beach‑clean‑up event, and earn the
    role of team captain on her soccer team, developing early leadership and community‑service skills.
