personas:
  professional: Brittany Robinson, an aspiring multimedia artist, blends hand-drawn illustration with digital collage using Procreate and Photoshop, channeling their vivid imagination and organized yet
    adaptable workflow into socially-charged graphics for non-profit campaigns and school events, and they naturally step into a leadership role for community mural projects thanks to their outgoing, collaborative
    nature.
  sports: Brittany Robinson, a high-school hip-hop dancer and weekend roller-skater, avidly supports the Minnesota Timberwolves, Vikings, Twins, and Wild while participating in the school's dance crew and
    the local community center’s youth basketball league, balancing energetic movement with a laid-back approach to fitness that includes spontaneous runs around the Chain of Lakes during summer, and they
    often use these activities as inspiration for their visual storytelling.
  arts: Brittany Robinson, who immerses herself in spoken-word slam nights and sketch sessions, draws creative fuel from Kendrick Lamar, H.E.R., Basquiat, and local Minneapolis muralist Paul Biedermann,
    frequently watches performances by Lin-Manuel Miranda and Angela Bassett, and they routinely blend musical rhythms and bold color palettes in their digital collages to convey narratives of youth empowerment.
  travel: Brittany Robinson, who prefers quick weekend road trips with friends over long-haul travel, has explored Chicago’s art districts and New Orleans’ jazz scene, dreams of wandering the vibrant street-art
    alleys of London’s Shoreditch and the neon neighborhoods of Tokyo, and they always plan itineraries around affordable public transit and photo-friendly stops for TikTok content.
  culinary: Brittany Robinson, a budding home cook, mixes Southern family favorites like fried chicken, collard greens, and sweet potato pie with experimental flavors such as kimchi-topped pancakes and
    avocado-lime salsa, hones their skills through TikTok recipe hacks, seasons dishes with smoked paprika, hot sauce, and fresh basil, and they often host late-night snack sessions where friends critique
    the latest culinary creation.
  core: Brittany Robinson, a restless creative who channels boundless imagination into vivid digital collages while habitually procrastinating on school assignments and hoarding sketchbooks in every backpack
    pocket, and they constantly seek fresh inspiration on TikTok.
background:
  cultural: Brittany was raised in a Black family in Minneapolis, where community and cultural heritage are central to daily life. She grew up listening to gospel, funk, and contemporary hip‑hop, and she
    took part in church choirs and community celebrations like Juneteenth and Kwanzaa. The city's vibrant arts scene, including the annual Uptown Art Fair and the Minnesota African American Heritage Museum,
    has shaped her appreciation for visual storytelling that reflects Black experiences. Her family emphasizes education, resilience, and giving back, influencing her commitment to using art as a tool for
    empowerment and social change.
attributes:
  skills: '[''hand‑drawn illustration'', ''digital illustration (Procreate, Photoshop)'', ''creative writing (poetry, short stories)'', ''public speaking and presentations'', ''event planning and group
    project coordination'', ''basic video editing (iMovie, DaVinci Resolve)'', ''introductory coding with Scratch'', ''social media content creation'']'
  hobbies: '[''sketching and illustration'', ''digital art and collage'', ''creative writing / spoken‑word poetry'', ''street photography'', ''hip‑hop and R&B dancing'', ''attending art workshops'', ''participating
    in poetry slams'', ''music discovery'', ''cooking family recipes'', ''collaborative TikTok video creation'']'
  career_goals: She aims to graduate high school (or earn a GED) and pursue a BFA in Visual Arts or Graphic Design at a college, eventually working as a multimedia artist or creative director for a non‑profit
    focused on youth empowerment. In the short term, she plans to launch an online portfolio showcasing her artwork and to organize a community mural project in Minneapolis that celebrates Black culture.
    She also hopes to mentor younger students through the local community center’s art programs and eventually start a boutique design studio that merges art, storytelling, and social activism.
