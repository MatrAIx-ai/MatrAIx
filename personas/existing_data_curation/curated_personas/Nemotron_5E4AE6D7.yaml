personas:
  professional: James Atwell, a budding little architect, builds elaborate block towers and meticulously sorts his toys by color, showcasing a blend of curiosity and practical organization that hints at
    future design talent.
  sports: James Atwell, a tiny fan of the New York Yankees and a member of the Little Giants preschool soccer club, dashes around the playground with a balance of enthusiastic teamwork and occasional assertive
    goal‑calling.
  arts: James Atwell, who sings along to the Sesame Street theme, paints stick figures of Mickey Mouse, and eagerly watches Disney’s Frozen, lets his imagination roam, merging a love for familiar characters
    with a curiosity for new stories.
  travel: James Atwell, having explored the local zoo, splashed at a Florida beach, and dreaming of a trip to Disneyland Paris, prefers short car rides with snack breaks, balancing adventure with the comfort
    of familiar routines.
  culinary: James Atwell, who delights in mac and cheese, chicken nuggets, and strawberry slices, often insists on arranging his veggies in rainbow order before eating, reflecting a practical approach to
    mealtime fun.
  core: James Atwell is a steadfast, curious three‑year‑old who balances playful exploration with tidy organization, gentle cooperation and occasional assertiveness, and a calm demeanor under stress.
background:
  cultural: James is a white American child raised in the suburban community of Dunellen, New Jersey. His family participates in typical U.S. cultural traditions such as Thanksgiving, Fourth of July celebrations,
    and Easter egg hunts, while also embracing the multicultural fabric of Union County through community events and a diverse local school environment. Growing up in a middle‑class household, he experiences
    a blend of mainstream American media, local park activities, and occasional exposure to neighboring cultural festivals, shaping a culturally aware but primarily U.S.‑centric worldview.
