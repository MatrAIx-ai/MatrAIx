  career_goals: William dreams of a future where he can work with clear structures and tangible outcomes. He is intrigued by the idea of becoming a mechanical engineer or automotive technician, attracted
    by the predictability of working with machines and the satisfaction of fixing things. He also expresses a softer ambition to care for animals as a veterinarian, citing his love for wildlife and the
    steady routine of a clinic. In both aspirations, he values a career that offers a stable schedule, defined responsibilities, and the chance to contribute to his community while allowing him some quiet,
    focused work.
