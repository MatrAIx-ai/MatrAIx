personas:
  professional: William Garner is a budding LEGO architect and Minecraft engineer whose methodical yet relaxed mindset lets them follow instruction manuals faithfully while improvising imaginative twists,
    turning every school assignment into a structured yet adaptable mini‑project.
  sports: William Garner enjoys early‑morning fishing trips on the local lake with dad, follows the Milwaukee Brewers for a touch of baseball excitement, rides a sturdy bike along forest trails for solo
    fitness, and occasionally joins the community youth soccer team but always prefers the calm of solitary rides through the woods.
  arts: William Garner loves watching nature documentaries narrated by David Attenborough, gets inspired by the whimsical Lego Movie soundtrack composed by Mark Mothersbaugh, and often sketches animals
    from encyclopedias as a quiet artistic outlet between LEGO builds.
  travel: William Garner dreams of camping under the pines of Wisconsin’s Northwoods, exploring the shoreline of Lake Superior’s Apostle Islands, and one day trekking the towering redwoods of California’s
    Redwood National Park, though current trips are limited to family weekend outings to nearby state parks.
  culinary: William Garner favors classic grilled cheese sandwiches made with sharp cheddar on buttery sourdough, delights in homemade fish and chips using perch caught on fishing trips, and enjoys a creamy
    bowl of mac‑and‑cheese topped with crispy breadcrumbs as a comforting after‑school snack.
  core: William Garner is a meticulous young builder who channels a quiet, worry‑prone mind into LEGO and Minecraft creations while lingering over fishing lines and quietly fretting over unfinished projects.
background:
  cultural: William was raised in a predominantly white, Midwestern community in Rice Lake, Wisconsin, where many families share German, Scandinavian, and Polish heritage. He attends a local Lutheran church
    with his family, taking part in seasonal gatherings like the county fair, township picnics, and community fishing tournaments. The rural setting emphasizes self‑reliance, modesty, and close ties to
    nature, shaping his appreciation for outdoor activities and practical skills. School and community programs stress cooperation, respect for tradition, and a quiet work ethic, all of which are reflected
    in William's day‑to‑day life and values.
