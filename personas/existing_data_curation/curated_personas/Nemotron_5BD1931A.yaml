personas:
  professional: Sharon Donaldson, a 68‑year‑old community arts facilitator and abstract painter, blends their lifelong knack for vivid watercolor and mixed‑media expression with a spontaneous, deadline‑averse
    approach to curating exhibitions, and they mentor seniors in craft workshops while penning memoir passages that weave local histories into layered narratives.
  sports: Sharon Donaldson enjoys low‑impact morning walks with the Preble County Senior Walking Club, follows the Cincinnati Reds baseball season avidly, and participates in community yoga sessions at
    the local senior center, using these activities to stay limber while they eschew competitive sports.
  arts: Sharon Donaldson’s artistic world is saturated with the bold abstractions of Jackson Pollock, the serene compositions of Georgia O’Keeffe, the speculative storytelling of Ursula K. Le Guin, and
    the lyrical folk melodies of Joni Mitchell, all of which inspire their own watercolor canvases, handcrafted quilts, and nightly journal entries, and they often reference these influences in community
    workshops.
  travel: Sharon Donaldson plans their annual art pilgrimages to the Cleveland Museum of Art and the Columbus Museum of Art, occasionally extends trips to the Biltmore Estate in Asheville for garden inspiration,
    and dreams of a weekend in Paris to see the Musée d’Orsay, all while leveraging senior travel discounts and a flexible, no‑fixed‑itinerary mindset, and they relish spontaneous detours.
  culinary: Sharon Donaldson, a confident home chef, habitually incorporates fresh basil, thyme, and lavender from their garden into herb‑infused ratatouille, rosemary‑scented roasted potatoes, and delicate
    lavender shortbread cookies, while they relish occasional wildflower honey tea and modestly experiment with sous‑vide techniques despite occasional forgetfulness about kitchen timers.
  core: Sharon Donaldson, an imaginative 68‑year‑old with a penchant for spontaneous creativity, balances a bustling schedule of abstract painting, genealogy research, and birdwatching with a slight aversion
    to strict deadlines, a habit of misplacing garden tools, and they delight in narrating stories to any listening neighbor.
background:
  cultural: Sharon grew up in the rural Midwest, spending her life in Preble County, Ohio. Her family background is rooted in a white, Midwestern Protestant tradition, with Methodist influences evident
    in community gatherings and seasonal celebrations. The region’s agricultural heritage shaped a practical, self‑reliant ethos, while the close‑knit small‑town environment fostered strong neighborly ties
    and a spirit of volunteerism. Local folk art, quilting circles, and community fairs provided early exposure to creative expression, encouraging her imaginative curiosity. Though she identifies with
    the modest values of her Midwestern upbringing, she also embraces a love for novelty and abstract ideas, seeking inspiration beyond the immediate surroundings through books, traveling exhibitions, and
    online artistic communities.
