  hobbies: '[''Reading (science nonfiction, mystery novels)'', ''Gardening'', ''Knitting/Crocheting'', ''Hiking on local trails'', ''Visiting local history museums'', ''Puzzle solving (crosswords, Sudoku)'',
    ''Cooking'', ''DIY home improvement projects'', ''Volunteer tutoring at the community library'']'
  career_goals: Danielle aims to transition from a supportive administrative role to an office manager or operations coordinator position within a research or technology organization, where she can apply
    her STEM background to bridge technical and administrative functions. She plans to earn a Certified Administrative Professional (CAP) credential and later pursue a Project Management Professional (PMP)
    certification to formalize her project coordination skills. Long‑term, she hopes to mentor junior staff, lead process‑optimization initiatives that reduce workplace stress, and perhaps consult part‑time
    on workflow efficiencies for small nonprofits in her community. Balancing ambition with her sensitivity to stress, she seeks roles that offer clear structure, manageable workloads, and opportunities
    for incremental growth.
