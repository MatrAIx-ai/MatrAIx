personas:
  professional: Geoffrey Whitfield is a budding LEGO architect and sketch artist who channels their curiosity into designing intricate, futuristic cityscapes, often working alone in their bedroom, letting
    loose their imagination while they occasionally lose track of deadlines due to a relaxed approach to obligations.
  sports: Geoffrey Whitfield follows the Chicago Bulls and Chicago White Sox, spends Saturday mornings practicing basketball at a local YMCA, enjoys solo skateboarding at the nearby skate park, and prefers
    they run along the Lakefront Trail as a quiet way to stay fit, rather than joining team sports.
  arts: Geoffrey Whitfield immerses themselves in the world of art by sketching in the margins of a notebook inspired by Vincent van Gogh’s swirling skies, listening to Miles Davis jazz and Kendrick Lamar
    hip‑hop playlists introduced by their parents, and they animate short clips on a tablet with cues from Studio Ghibli’s My Neighbor Totoro.
  travel: Geoffrey Whitfield loves exploring museums like the Field Museum and the Chicago Art Institute’s children’s gallery, dreams of visiting the Kennedy Space Center to see rockets up close, and they
    prefer carefully planned weekend trips to nearby natural spots such as Starved Rock State Park, while occasional family vacations to New York City fuel their curiosity about urban architecture.
  culinary: Geoffrey Whitfield’s palate favors classic comfort foods like pepperoni pizza, mac and cheese, and dinosaur‑shaped chicken nuggets, they can confidently make a peanut‑butter‑jelly sandwich and
    whisk pancake batter, yet they are picky about trying new spices, only daringly sampling sushi rolls with avocado and cucumber on special occasions.
  core: Geoffrey Whitfield is a solitary, curiosity‑driven 9‑year‑old who fills their world with LEGO constructions, sketchbooks, and jazz‑hip‑hop soundtracks, and they often wrestle with anxiety, disorganization,
    and a competitive streak that makes cooperation a challenge.
background:
  cultural: Geoffrey comes from an African American family rooted in Chicago’s South Side, where community stories, music, and resilience shape his worldview. His parents and grandparents share traditions
    of oral storytelling, gospel music, and participation in local cultural programs such as the Chicago Public Library’s youth art workshops and the DuSable Museum’s kids’ events. Exposure to the city’s
    rich jazz, blues, and hip‑hop heritage, along with the neighborhood’s emphasis on perseverance and self‑expression, informs his artistic sensibility and his appreciation for diverse perspectives.
