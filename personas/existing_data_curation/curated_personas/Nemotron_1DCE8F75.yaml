  career_goals: He dreams of becoming a graphic novelist or video game designer who can create worlds that reflect his curiosity and unique perspective, and someday perhaps a researcher-artist who blends
    science and art to explore new ideas. He aims to master his creative skills, work independently, showcase his artwork in community galleries, and develop a simple indie game that challenges players’
    problem‑solving abilities.
