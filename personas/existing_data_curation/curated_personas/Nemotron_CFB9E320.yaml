  career_goals: Miguel aims to advance to a senior operations manager or director role within the next five years, leading multi‑site operations and digital transformation initiatives. He plans to earn
    a Lean Six Sigma Black Belt and PMP certification to deepen his methodological expertise. Ultimately, he envisions launching his own consultancy focused on operational efficiency for small‑and‑medium
    enterprises, while continuing to mentor emerging talent and influence strategic decision‑making at the executive level.
