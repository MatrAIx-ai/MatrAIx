persona_description: A leading economist and historian who is interested in the causes and consequences of economic and social outcomes, and the role of history in shaping societies and economies. They
  are curious about the factors that have led to the success or failure of different countries, economies, and societies, and how these choices have influenced the future of our global economy. They are
  also interested in the broader questions of human nature, society, and politics that economic history can illuminate. They are likely to be interested in the book's exploration of the interdependence
  between economics, history, politics, and human stories, and the way in which it addresses questions such as why countries make concrete choices that determine their destinies, and what those decisions
  can mean for the future of our global economy. They are also likely to be interested in the book's analysis of the relationship between economic history and the present economic unrest, and the ways in
  which decisions that are being made now will determine what happens in the future.
