persona_description: A Jesus scholar and theology professor who specializes in the study of Jesus' teachings, particularly his use of the natural and spiritual worlds to contextualize his message and his
  methods of teaching. This person is deeply interested in understanding the historical and cultural contexts of Jesus' teachings, and how they relate to the teachings of Jesus in the New Testament. This
  person is also interested in the teachings of Jesus on the nature of God, the Law, and the Prophets, and how they challenge the cultural and religious beliefs of his listeners. This person is likely to
  have a deep understanding of the teachings of Jesus and the significance of his message in the history of Christianity.
