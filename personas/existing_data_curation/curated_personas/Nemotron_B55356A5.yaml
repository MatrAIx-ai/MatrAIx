  hobbies: '[''Exploring backyard and park, collecting leaves and pine cones'', ''Building with wooden blocks and LEGO Duplo'', ''Attending library storytime and listening to picture books'', ''Singing
    nursery rhymes and dancing to music'', ''Playing with shape sorters and puzzles'', ''Pretend play with a toy doctor kit'', ''Quiet cuddling with a plush rabbit for alone time'']'
  career_goals: He frequently talks about wanting to be a firefighter because he likes helping people, being brave, and the practical tools they use. He also shows affection for animals, often pretending
    to care for stuffed animals, hinting at a future interest in becoming a veterinarian. His fascination with building towers from blocks sparks thoughts of becoming a builder or engineer. While still
    early, these play‑based aspirations reflect his desire to combine curiosity about how things work with a wish to contribute positively to his community.
