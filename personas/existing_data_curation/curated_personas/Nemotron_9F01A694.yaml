  hobbies: '[''Acrylic painting'', ''Sketching'', ''Art history reading'', ''Nature photography'', ''Hiking'', ''Gardening'', ''Woodworking'', ''Listening to folk and classic rock music'', ''DIY home improvement
    projects'', ''Attending small‑group art workshops'']'
  career_goals: Kenneth aims to transition from journeyman painter to certified master painter and eventually start a small‑scale painting contractor focused on historic restoration and custom mural work
    in the Hastings area. He plans to obtain a state‑approved painting certification and complete a GED program to formalize his education. Over the next five years he hopes to reduce the physically demanding
    aspects of his work by training a trusted crew, allowing him more time for personal art projects and occasional teaching at local community‑college workshops. A long‑term ambition is to exhibit his
    own paintings in regional galleries and generate supplementary income from commissions, thereby creating a more balanced, less stressful financial base.
