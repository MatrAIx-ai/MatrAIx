    fiction"]'
  career_goals: Martha aims to leverage her hands‑on experience to move into a supervisory or facilities‑management role within the next few years. She plans to obtain a Certified Professional Cleaner designation
    and may enroll in a part‑time business‑administration program to build managerial skills. In the long term she hopes to become a facilities manager for a corporate office or to launch her own small
    cleaning service that offers reliable and flexible services to local businesses and residents.
