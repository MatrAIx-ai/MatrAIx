personas:
  professional: Mary Rivero, a budding storyteller and LEGO architect, channels their boundless curiosity and calm resilience into crafting elaborate narratives and detailed structures, while their spontaneous
    nature makes them abandon projects mid‑play, preferring the thrill of starting new creations over finishing old ones.
  sports: Mary Rivero, a frequent participant in the neighborhood's Saturday soccer scramble and a member of the local kids' swimming class at the community pool, loves sprinting through the woods for impromptu
    obstacle courses, cheering for the hometown baseball team, the Riverdale Rascals, while preferring free‑play over organized drills.
  arts: Mary Rivero, an avid lover of coloring books and sketchpads, draws inspiration from classic country tunes like Johnny Cash and children's melodies such as Baby Shark, often recreating scenes from
    animated films by Disney and admiring the bold colors of artist Yayoi Kusama, while spending afternoons inventing stories starring their stuffed bunny.
  travel: Mary Rivero, who cherishes weekend trips to the nearby state park for leaf‑collecting expeditions and has eagerly awaited a family vacation to the tropical beaches of Costa Rica, prefers spontaneous
    day‑trips over meticulously planned itineraries, yet delights in revisiting the local zoo and the café at the downtown train station for ice‑cream.
  culinary: Mary Rivero, a self‑declared connoisseur of peanut butter‑and‑jelly sandwiches, mac and cheese, and crunchy apple slices with cinnamon, often helps stir batter for chocolate cupcakes, loves
    the buttery crunch of fresh baguette with cheese, and occasionally sneaks a handful of gummy bears when no adult is watching.
  core: Mary Rivero, a curious 6‑year‑old who builds LEGO forts, sketches wild characters, and triumphs over seasonal allergies with calm resilience, yet habitually leaves a trail of scattered bricks and
    refuses bedtime routines in favor of late‑night story adventures.
background:
  cultural: Mary lives in Haleyville, a small town in Marion County, Alabama. Her family participates in Southern community traditions such as church gatherings, county fairs, and family barbecues, which
    foster a sense of hospitality and storytelling. The region’s love for music, local art fairs, and close‑knit neighborhoods influences her appreciation for creative expression while her school and media
    exposure broaden her view beyond the local culture.
attributes:
  skills: '[''Storytelling'', ''Crayon drawing'', ''Early digital literacy'', ''Puzzle solving'', ''Memory for colors and shapes'', ''Improvisational game creation'']'
  hobbies: '[''Coloring picture books'', ''Sketching'', ''Nature exploration'', ''LEGO building'', ''Listening to music'', ''Imaginative storytelling'']'
  career_goals: Mary dreams of growing up to become an artist who paints whimsical murals, an inventor who designs playful gadgets, or a scientist who explores the natural world. She wants to share her
    unique ideas with classmates, win a school art contest, and one day travel to far‑away places to experience new cultures and art forms, driven by her curiosity and competitive spirit.
