  hobbies: '[''Digital illustration and concept sketching'', ''Acoustic guitar playing and songwriting'', ''Reading speculative fiction and philosophy'', ''DIY electronics and robotics projects'', ''Volunteering
    at community makerspace'', ''Hiking in the Cascades and mindful walking'', ''Fermentation cooking (sourdough, kimchi)'', ''Meditation and mindful breathing'', ''Participating in small sustainability
    meet‑ups'', ''Experimenting with 3D‑printed art installations'']'
  career_goals: Alfred aims to evolve from a hands‑on engineering technologist into a senior design leader who drives sustainable, user‑centric product solutions. He aspires to head cross‑functional teams
    that merge rigorous engineering with artistic innovation, positioning his work at the intersection of functionality and aesthetic appeal. Over the next five years he wishes to earn a professional engineering
    certification, deepen his expertise in renewable‑energy system design, and spearhead a community makerspace mentorship program that introduces underrepresented youth to STEM. Ultimately, Alfred hopes
    to launch a boutique consultancy focused on low‑impact, ethically designed technologies, while maintaining a flexible schedule that preserves his time for creative pursuits and family life.
