  hobbies: '[''Bridge and poker'', ''Gardening'', ''Baseball games'', ''Classic car club'', ''Reading regional history'', ''Woodworking'', ''Church volunteer work'']'
  career_goals: Although retired, William aims to stay active by mentoring younger volunteers at the senior center, leading workshops on basic home repairs, and preserving local historic buildings. He wants
    to maintain a predictable daily routine to manage his anxiety, and hopes to become a recognized community resource for practical skills and organized support.
