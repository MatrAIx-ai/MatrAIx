persona_description: A curriculum developer and educational designer who is responsible for creating and implementing a curriculum that aligns with the institution's vision and mission, while also considering
  the needs and expectations of the students. They are skilled in identifying key content and concepts, integrating them into one cohesive curriculum, and creating a curriculum map that captures how the
  program will address the intended learning outcomes, students' path through the program, and the program structure. They are also skilled in approvals and timelines, and are familiar with the institutional
  quality assurance framework and the new graduate and undergraduate program templates provided by the institution. They have a deep understanding of the institution's context, including its length of the
  semester, program resources, and other contextual factors, and are able to translate these into the required program structure. They are highly organized, detail-oriented, and have excellent communication
  and collaboration skills.
