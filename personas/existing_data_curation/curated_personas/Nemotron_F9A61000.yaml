personas:
  professional: Annabelle Mendez is an aspiring young programmer who turns her fascination with sci‑fi narratives and logic puzzles into clean, well‑documented Python projects, while also sharpening strategic
    thinking through online chess, approaching every line of code with the same disciplined, competitive rigor she applies to Sudoku.
  sports: Annabelle Mendez prefers solitary fitness pursuits, regularly hiking the Red Rock Canyon Loop with the Evergreen Trails Hiking Club, logging their runs on Strava, and cheering quietly for the
    Seattle Mariners while shunning team sports in favor of personal endurance challenges.
  arts: Annabelle Mendez nurtures a creative side through piano recitals featuring pieces by Ludovico Einaudi and Claude Debussy, photography inspired by Ansel Adams, and writing sci‑fi flash fiction that
    mirrors their analytical mindset, while they also enjoy the cinematic scores of Hans Zimmer and the ambient works of Brian Eno.
  travel: Annabelle Mendez has explored the towering redwoods of California’s Redwood National Park and dreams of witnessing Iceland’s dramatic geysers, favoring meticulously planned solo day hikes over
    group tours, balancing parental consent and school commitments with a desire for immersive, low‑key adventure.
  culinary: Annabelle Mendez delights in preparing avocado toast with poached eggs, mastering basic sushi rolls on weekends, and crafting homemade granola bars for trail snacks, though they sometimes neglect
    balanced meals during intense programming sessions.
  core: Annabelle Mendez is a methodical, introverted teen who blends a love for logical challenges, solitary exploration, and disciplined routines into every pursuit, from coding to hiking, while occasionally
    indulging in tech gadget splurges.
background:
  cultural: Annabelle comes from a white, middle‑class family in the suburban community of Magnolia, Texas. The area blends Southern hospitality and close‑knit neighborhoods with a strong emphasis on education,
    personal responsibility, and self‑reliance. Her family's values reflect traditional Texan modesty and community involvement—often centered around church activities, local school events, and neighborhood
    gatherings—while also embracing contemporary American youth culture through media and technology. This environment has shaped her practical, structured outlook and her preference for quiet, independent
    spaces.
