  career_goals: Annabelle aims to follow a STEM‑focused high‑school track, earn a scholarship in computer science or engineering, and ultimately work as a software engineer or data analyst creating tools
    that solve real‑world problems. She plans to compete in math and programming competitions to benchmark her skills, and she hopes to develop an educational app or website that supports solitary learners
    like herself. Long‑term, she envisions pursuing a degree at a research‑intensive university and contributing to projects that blend data analysis with practical, user‑oriented solutions.
