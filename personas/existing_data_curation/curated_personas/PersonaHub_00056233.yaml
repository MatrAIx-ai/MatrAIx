persona_description: A historian interested in the political, social, and cultural history of medieval and early modern Poland, Lithuania, and the Polish–Lithuanian Commonwealth. This person is particularly
  interested in the period from the waning of the Middle Ages to the Partition of Poland in 1795, when Poland was divided among Prussia, Russia, and Austria. They are also interested in the struggles between
  Poland and Lithuania over control of territories, particularly eastern Lithuania, and the role of the Lithuanian nobility and peasantry in these conflicts.
