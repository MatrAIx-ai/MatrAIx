personas:
  professional: Jason Johnson, a 16-year-old aspiring automotive service technician with hands-on problem-solving skills ranging from engine diagnostics to basic computer repairs, channels their curiosity,
    competitive drive, and meticulous yet flexible approach into each project - whether swapping brake pads on the 1998 Corolla or editing vlog footage - while balancing skepticism about others' motives
    with a genuine desire for reliable outcomes.
  sports: Jason Johnson, a 16-year-old who plays soccer for the Port Arthur Youth Soccer Club and joins a community basketball league, follows the Houston Astros, Dallas Cowboys, and Houston Rockets, and
    approaches fitness with a strategic, competitive mindset that mirrors their approach to car projects and video games.
  arts: Jason Johnson, a 16-year-old budding video editor, draws inspiration from tech creators like MKBHD, game composer Jeremy Soule, and filmmaker Christopher Nolan, while their playlist of Linkin Park
    and Kendrick Lamar tracks fuels their editing sessions and reflects their blend of mechanical precision and artistic flair.
  travel: Jason Johnson, a 16-year-old who prefers spontaneous weekend road trips to nearby spots like Galveston and New Orleans and dreams of an immersive car-culture tour in Tokyo, balances their wanderlust
    with a tight teenage budget and the need to manage school responsibilities and anxiety-induced caution.
  culinary: Jason Johnson, a 16-year-old with budding kitchen confidence, frequently grills Texas-style brisket and prepares chicken fried steak at home while also dabbling in homemade ramen broth after
    watching cooking streams, favoring bold, savory flavors but often skipping vegetables when time runs short.
  core: Jason Johnson is a mechanically curious, competitively driven teen who channels their anxiety into obsessive car tinkering, yet they often procrastinate on schoolwork and health check-ups.
background:
  cultural: Jason grew up in Port Neches, a small, predominantly white, working‑class town in the Gulf Coast region of Texas. The community is steeped in Baptist and Methodist traditions, with strong family
    ties, a reliance on hard work, and a deep appreciation for local high‑school football culture. His family has generational connections to the oil and petrochemical industries that dominate Jefferson
    County, fostering a practical, self‑reliant mindset. Local customs include Sunday church services, community fairs, and Texas barbecue gatherings, while nearby Sabine Lake and the Big Thicket provide
    outdoor recreation. These Southern Texas cultural influences shape his values and daily life, even as his curiosity leads him to explore modern digital media and broader horizons.
