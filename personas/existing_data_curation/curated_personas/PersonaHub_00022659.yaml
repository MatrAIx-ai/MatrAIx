persona_description: A modern dance pioneer who was a radical artist who used dance to explore social and political issues, challenge audiences, and make a statement. She was much more than a performer
  and choreographer; she was a radical artist who probed deeply into social and political issues, broke gender barriers, and danced "because [she] wanted to say something." Her work has been celebrated
  and remembered for her lifetime contributions to the art form.
