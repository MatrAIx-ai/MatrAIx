persona_description: Kathryn Johnson, an assistant professor of biology at Beloit College, is a physiologist with expertise in animal and human physiology. Her research interests include the physiological
  mechanisms of novel diabetes therapies and alterations in cortisol levels in humans. Johnson is also a member of the American Physiological Society and teaches classes in human biology, zoology, scientists
  in society, neurobiology, human anatomy & physiology, and human pathophysiology. She is a media resource on topics related to her research and teaching interests.
