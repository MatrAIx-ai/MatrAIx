  hobbies: '[''DIY home improvement'', ''custom furniture building'', ''basketball (playing & watching)'', ''weight training'', ''running'', ''listening to hip‑hop and R&B music'', ''Ohio State football
    fandom'', ''reading personal‑development'', ''vegetable gardening'']'
  career_goals: Anton aims to advance from laborer to crew foreman within the next two years, and eventually earn a certificate in construction management to become a site supervisor or project manager.
    He plans to complete his associate degree in construction technology, acquire OSHA 30‑hour certification, and obtain a commercial driver’s license to broaden his skill set. Long‑term, he dreams of starting
    his own small contracting firm focused on residential renovations, allowing him to provide stable income for his family and give back to his community. He also hopes to mentor younger workers, especially
    those from underrepresented backgrounds.
