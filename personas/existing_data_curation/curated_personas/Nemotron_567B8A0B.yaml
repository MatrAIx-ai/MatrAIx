personas:
  professional: Anton Boyd, a construction laborer with solid expertise in framing, concrete pouring, and equipment operation, translates their organized, methodical nature and competitive drive into tight
    project schedules, rigorous quality control, and clear crew communication, positioning themselves for a foreman role within two years.
  sports: Anton Boyd, an avid basketball fan who roots for the Miami Heat and participates in weekly pickup games at the local community center league, also follows Ohio State Buckeyes football on Sundays,
    maintains a disciplined weight‑training schedule, runs with the City Runners Club during cooler months, and holds a season‑ticket for the nearby minor‑league hockey team.
  arts: Anton Boyd, who decompresses after work by streaming hip‑hop and R&B artists such as Kendrick Lamar, H.E.R., and SZA, collects vintage vinyl, and attends live jazz nights at the downtown venue,
    allowing music to shape their creative downtime.
  travel: Anton Boyd, favoring well‑planned road trips over spontaneous travel, frequently escapes to a lakeside cabin in northern Michigan during summer, dreams of touring Napa Valley’s vineyards and witnessing
    Kyoto’s cherry‑blossom season, and balances these aspirations with a family‑friendly budget and limited vacation days.
  culinary: Anton Boyd, a backyard gardener who harvests heirloom tomatoes, kale, and sweet potatoes, delights in grilling rosemary‑marinated chicken with roasted root vegetables and fresh avocado salsa,
    yet occasionally indulges in a pepperoni pizza to celebrate completed DIY projects.
  core: Anton Boyd, a detail‑oriented construction enthusiast who worries about deadlines, meticulously manages finances, battles mild hypertension, and finds peace in DIY furniture, hip‑hop beats, and
    a thriving vegetable garden.
background:
  cultural: Anton grew up in a Black working‑class family in the Midwest, with grandparents who migrated from the South during the Great Migration. His upbringing was shaped by strong community ties, church
    involvement, and a deep respect for perseverance and mutual support. He celebrates cultural milestones such as Juneteenth and honors African‑American heritage through music, food, and storytelling.
    While navigating a predominantly white industry, he draws on his cultural identity to stay resilient, mentor younger Black workers, and contribute to community initiatives in Columbus, such as local
    youth mentorship programs and neighborhood clean‑up events.
