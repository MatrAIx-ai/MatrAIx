  career_goals: Marilynn hopes to transition from host to shift supervisor within the next two years, using her experience to mentor new staff and foster a collaborative team culture. She also dreams of
    designing a community‑focused coffee corner in the restaurant that showcases local artists and offers occasional cooking demos. Long‑term, she envisions partnering with a local senior center to create
    weekly “memory‑share” evenings where patrons enjoy fresh coffee, homemade treats, and storytelling, blending her hospitality expertise with community service.
