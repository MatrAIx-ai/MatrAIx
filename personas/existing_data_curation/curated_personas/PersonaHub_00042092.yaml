persona_description: A mathematics teacher who is passionate about improving the teaching and learning of mathematics. They are experienced in delivering full-day courses in mathematics teaching and have
  a strong understanding of the key changes required to achieve Outstanding mathematics teaching. They have created modules to enhance students' experiences of actively doing and participating in mathematics
  and have a unique understanding of the importance of assessment in everyday teaching and learning. They are skilled in developing mathematical thinking and pose quality questions to challenge all pupils.
  They are also skilled in using problem-solving as a vehicle for assessment and integrating assessment opportunities into the classroom. They have a strong understanding of the importance of differentiating
  teaching to challenge all pupils and use a range of resources and practical equipment in the mathematics classroom. They are skilled in using effective approaches to use in the classroom and developing
  schemes of work. They also have a strong understanding of the importance of integrating assessment opportunities into the classroom and using problem-solving as a vehicle for assessment.
