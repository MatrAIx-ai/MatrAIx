  career_goals: Yen imagines becoming an artist who creates storybooks and comics that blend vibrant illustrations with imaginative tales. She also dreams of being an inventor‑designer who invents playful
    gadgets, inspired by her love of puzzles and curiosity about how things work. In the short term, she hopes to win a school art contest and later pursue a creative program where she can explore both
    visual art and simple engineering projects.
