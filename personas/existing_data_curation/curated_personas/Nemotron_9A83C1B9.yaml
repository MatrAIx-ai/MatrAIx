personas:
  professional: Yen Chen, an aspiring junior architect, constructs imaginative LEGO skyscrapers and sketches nature scenes with a quiet curiosity that fuels their creative problem‑solving, even as they
    embrace the freedom of unstructured play over rigid schedules.
  sports: Yen Chen, a lively member of the Philadelphia Youth Soccer Club, spends weekend afternoons chasing a soccer ball on the community field while cheering for the Philadelphia Eagles on TV, preferring
    spontaneous play over organized drills, and they enjoy occasional family trips to the local indoor swimming pool.
  arts: Yen Chen, a quiet enthusiast of drawing, spends hours coloring scenes inspired by classic folktale illustrations and the whimsical works of Hayao Miyazaki, especially the film Spirited Away, while
    listening to Mozart’s piano concertos, and they find the music soothing as they fold origami.
  travel: Yen Chen, an imaginative little explorer, favors short family road trips to Philadelphia's Please Touch Museum and the historic streets of Washington D.C., while dreaming of a future adventure
    to the cherry blossoms of Kyoto, and they balance a love for discovery with the comfort of familiar routines.
  culinary: Yen Chen, a curious junior chef, loves helping their family roll jiaozi (dumplings) and stir‑fried rice with soy sauce and ginger, can expertly color a sliced apple with caramel drizzle, yet
    they often get distracted halfway through recipes, leaving a trail of flour on the kitchen counter.
  core: Yen Chen, a six‑year‑old dreamer, merges quiet curiosity with a love for solitary art, saving pennies in a piggy bank while occasionally losing track of chores, and they embody a gentle blend of
    imagination, perseverance, and endearing disorganization.
background:
  cultural: Yen is the daughter of Chinese immigrants living in Philadelphia. At home, Mandarin is spoken alongside English, and she celebrates Lunar New Year with red lanterns, festive foods, and storytelling
    about the zodiac. Her family encourages appreciation of traditional Chinese arts—calligraphy, paper cutting, and folk tales—while also embracing the multicultural environment of the city, exposing her
    to museum visits, community festivals, and a blend of cuisines that shape a rich, bicultural identity.
