  career_goals: Samuel aims to ascend to a senior director of operations role within the next five years, overseeing multiple facilities across the Midlands. He is pursuing a Six Sigma Black Belt and an
    MBA to strengthen his strategic leadership credentials. He plans to implement advanced automation and IoT solutions to modernize his company's manufacturing processes, targeting a 15% increase in overall
    equipment effectiveness. Additionally, he aspires to mentor emerging managers by establishing a structured leadership development program within his organization. Long term, he envisions launching his
    own operations consulting firm focused on helping midsize manufacturers adopt lean and digital transformation practices.
