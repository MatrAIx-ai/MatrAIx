  career_goals: Gloria aims to enroll in a college BFA program focused on illustration and graphic design, with a long‑term goal of becoming a multidisciplinary artist who creates socially conscious visual
    narratives. She dreams of publishing a graphic novel that weaves her cultural heritage with themes of mental health and resilience. Ultimately, she wants to combine her art with community outreach,
    possibly as an art therapist or youth arts coordinator, using creative expression to foster harmony and support peers dealing with stress.
