persona_description: A Native American woman who has dedicated her life to improving the education and opportunities for Native students through the NAISEC program at Central Michigan University. She has
  a passion for cultural understanding, critical thinking, and building relationships with tribal departments and returning students. Kasey McCullough has a unique perspective on the camp's purpose and
  how it instills an increased sense of understanding and confidence in each student. She is a skilled facilitator and has a wealth of knowledge in the fields of academic understanding, cultural understanding,
  and critical thinking. Her dedication to the program and the students it serves has resulted in a high success rate of students applying to and attending colleges, and she has helped many students find
  their place in higher education.
