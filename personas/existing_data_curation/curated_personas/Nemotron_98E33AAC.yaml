  hobbies: '["Sketching and watercolors", "Digital art on tablet", "Playing piano", "Reading fantasy and sci‑fi novels", "Writing fan‑fiction", "Hiking local trails", "Photography and short video making",
    "Participating in school drama club", "Collecting vintage postcards", "DIY crafts and cooking experiments"]'
  career_goals: Donna dreams of turning her love for visual storytelling into a career. In the short term, she hopes to earn a scholarship to attend a specialized high‑school arts program where she can
    deepen her skills in illustration and media production. Eventually she aims to study graphic design or illustration at a university and work as a multimedia artist who creates books, animations, or
    community‑focused art projects. She also envisions launching a YouTube channel or local workshop series that teaches art techniques to peers and younger children, combining her passion for art, teaching,
    and community building.
