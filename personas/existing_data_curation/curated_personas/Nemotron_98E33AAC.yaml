personas:
  professional: Donna, a budding visual artist and student organizer, channels her curious mind and sociable charm into sketching, watercolor, digital illustration, and spearheading her school's annual
    art showcase, where her reliability and love for harmony turn projects into collaborative celebrations.
  sports: Donna, an enthusiastic hiker, spends weekends trekking the scenic Sacramento River trails with the River Runners youth group, cheers for the Sacramento Kings and Sacramento Republic FC from the
    stands, and mixes in occasional school cross‑country practice to stay fit, favoring nature walks over team sports.
  arts: Donna, a versatile creator, immerses herself in watercolor studies of Monet’s lily ponds, crafts digital fan‑art of Miyazaki’s Spirited Away characters on her tablet, plays piano pieces by Chopin
    for school recitals, and writes fan‑fiction inspired by J.K. Rowling and Brandon Sanderson, all while drawing inspiration from the dramatic flair of Lin‑Manuel Miranda’s Broadway scores.
  travel: Donna, a young explorer with a vintage postcard collection, dreams of hiking Yosemite’s misty cliffs, strolling through Paris’s art museums, and tasting street food in Tokyo, planning each trip
    with hand‑drawn itineraries and relying on her parents’ road trips for nearby adventures while budgeting her allowance for future journeys.
  culinary: Donna, a budding home chef, loves experimenting with basil pesto pasta, sushi rolls, and chocolate chip cookies—mixing fresh basil, coconut milk, and rainbow sprinkles—while watching cooking
    videos from Gordon Ramsay, proudly boasting a decent skill level that lets her impress friends at weekend potlucks.
  core: Donna, a 13‑year‑old artistic whirlwind, seamlessly blends sketch‑filled afternoons, piano reveries, river hikes, and a curiosity‑driven social buzz into a vibrant, organized, yet flexible lifestyle.
background:
  cultural: Donna grew up in Anderson, a tight‑knit town in Tehama County, Northern California. Her family traces its roots to Midwest farming communities, and they have lived in the valley for several
    generations. The local culture blends a traditional, community‑oriented rural lifestyle with the progressive values of the wider California region. Donna’s upbringing includes celebrations of common
    American holidays, regular attendance at the county fair, and participation in school and church events that emphasize cooperation and mutual support. Though the town is predominantly white, her school
    curriculum and extracurricular clubs expose her to diverse artistic traditions and perspectives, which she embraces with her open‑minded curiosity.
attributes:
  skills: '["Digital illustration (Procreate)", "Basic video editing (iMovie)", "Creative short story writing", "Public speaking and presentation", "Leadership in school art club", "Basic coding with Scratch",
