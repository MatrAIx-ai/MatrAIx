personas:
  professional: Gloria Jones is a seasoned building inspector with over three decades of experience interpreting Illinois building codes, and they are known for a sharp eye for structural hazards and a
    compassionate, assertive communication style that turns tense contractor meetings into collaborative problem‑solving sessions.
  sports: Gloria Jones enjoys weekly line‑dancing at the community center, plays in a co‑ed softball league each spring, supports the St. Louis Cardinals in baseball and the Chicago Bears in football, and
    they schedule fitness routines around neighborhood clean‑up days rather than strict workout plans.
  arts: Gloria Jones participates in an improv theater troupe, leads a line‑dancing group that performs to classics like Marvin Gaye and contemporary tracks by Janelle Monáe, regularly attends gospel choir
    rehearsals at the historic church, and they draw inspiration from artists such as Nina Simone and modern blues guitarist Gary Clark Jr.
  travel: Gloria Jones favors weekend road trips to historic river towns such as Galena, Illinois and Springfield, Missouri, plans loosely with a blend of Google Maps and a well‑worn road atlas, prefers
    budget motels that showcase local heritage, and they dream of exploring New Orleans for its music and cuisine while balancing travel costs with family responsibilities.
  culinary: Gloria Jones loves cooking modern twists on soul food—spicy collard greens with quinoa, smoked chicken drizzled with honey‑chipotle glaze, and peach cobbler topped with oat crumble—often preparing
    these dishes for potluck gatherings and experimenting with ingredients like smoked gouda and pickled okra.
  core: Gloria Jones is a gregarious, curiosity‑driven building inspector who balances community mentorship with occasional chaos‑inducing disorganization and a persistent worry about safety and perfection.
background:
  cultural: Gloria grew up in a close‑knit African‑American community in the Midwest, where church, family, and neighborhood gatherings shaped her identity. Her grandparents instilled a strong work ethic
    and a reverence for storytelling, which she carries into her community outreach efforts. Though Alton, IL, has a predominantly white population, Gloria embraces her heritage by participating in local
    Black History Month events, supporting the historic African‑American church choir, and preserving culinary traditions passed down through generations. Her experiences as a black woman in a traditionally
    male‑dominated construction field inform her assertive yet compassionate approach to leadership, and she often mentors young people of color who aspire to careers in trades and public service.
attributes:
  skills: '["Building Code Compliance","Structural Inspection","Safety Hazard Identification","Blueprint Reading","Effective Communication","Conflict Mediation","Problem Solving","Adaptability","Community
