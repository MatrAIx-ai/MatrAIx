  hobbies: '["Community Volunteering","Line Dancing","Backyard Gardening","Soul Food Cooking","Improv Theater","Historic Road Trips","Book Club (Mystery Novels)","Breathing Exercises","Journaling"]'
  career_goals: Gloria aims to advance to a senior inspector role within the Macoupin County Building Department, where she can mentor newer inspectors and help shape local inspection policies. She is pursuing
    additional certifications such as the Certified Building Inspector (CBI) and OSHA safety trainer credentials to broaden her expertise. Long‑term, she hopes to launch a community‑focused consulting service
    that assists small contractors in adopting green building techniques and improves safety standards in underserved neighborhoods. Balancing her practical mindset with her curiosity, Gloria also wants
    to champion a county‑wide program that offers free safety workshops for homeowners, reinforcing her commitment to public welfare while building a lasting professional legacy.
