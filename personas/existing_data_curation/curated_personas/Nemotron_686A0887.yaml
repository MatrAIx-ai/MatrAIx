  hobbies: '[''Guitar jam sessions'', ''Home studio recording'', ''DIY audio projects (Arduino, modular synths)'', ''Hiking in Indiana state parks'', ''Field recording natural sounds'', ''Reading science‑fiction
    and popular science'', ''Cooking seasonal meals'', ''Playing strategy video games'', ''Attending local concerts'', ''Collaborative songwriting with spouse'']'
  career_goals: Tyler’s career ambition is to merge his technical savvy with his artistic voice, positioning himself as a forward‑thinking indie artist. In the near term, he plans to record and self‑release
    a full EP, build a modest home recording studio that incorporates custom‑built audio hardware, and launch a regional touring circuit across Indiana and neighboring Midwestern states. He wants to collaborate
    regularly with his spouse and other local musicians on projects that weave scientific concepts—such as space exploration or data visualization—into lyrical themes. Long‑term, he hopes to establish a
    sustainable music‑tech venture that offers affordable modular synthesizer kits and educational content for aspiring musicians, while continuing to produce and perform music that pushes genre boundaries.
    He also aims to develop a reputation for innovative live shows that blend traditional instrumentation with interactive electronic elements.
