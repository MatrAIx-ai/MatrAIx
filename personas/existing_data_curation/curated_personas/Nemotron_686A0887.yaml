personas:
  professional: An aspiring indie musician and DIY audio engineer, Tyler Lacey blends a STEM background with front‑of‑house expertise to craft experimental EPs while juggling impromptu live shows and custom‑built
    synth gear.
  sports: An outdoor‑enthusiast hiker and weekend trail runner, Tyler Lacey regularly explores Indiana’s state parks with a local hiking club, supports the Indiana Pacers during the NBA season, and squeezes
    in occasional pickup basketball games at the community center.
  arts: A guitar‑wielding songwriter with a penchant for sci‑fi narratives, Tyler Lacey draws lyrical inspiration from authors like William Gibson and musicians such as Radiohead, Tame Impala, and local
    act The Stripes, often attending live shows at Indianapolis’s Hi‑Fi venue.
  travel: A spur‑of‑the‑moment road‑tripper, Tyler Lacey prefers weekend escapes to places like Brown County State Park, Asheville’s Blue Ridge Mountains, and Nashville’s music scene, planning trips on
    a whim but keeping an eye on budget constraints.
  culinary: A casual home‑chef who favors seasonal dishes, Tyler Lacey whips up quick roasted beet salads with goat cheese and thyme, perfects spaghetti aglio e olio with smoked paprika, and experiments
    with homemade spice rubs for weekend barbecues.
  core: Tyler Lacey is a 21‑year‑old audio‑tech tinkerer who fuses sci‑fi storytelling with DIY synths, lives on spontaneous creativity, and battles procrastination with late‑night jam sessions.
background:
  cultural: Tyler grew up in a small‑town Midwestern environment, where community values, practicality, and a strong work ethic were emphasized. His family’s European ancestry (primarily German and Irish
    roots) contributed to an appreciation for folk music traditions and DIY craftsmanship, which later merged with his love for modern indie rock. Attending high school near Purdue University exposed him
    to a culture of curiosity and technical innovation, shaping his decision to pursue a STEM degree. Living in West Lafayette, a college town, he benefits from a vibrant cultural mix of students, musicians,
    and tech enthusiasts, which informs his openness to experimentation while staying grounded in local Midwestern sensibilities. His marriage at a young age reflects personal priorities that balance emotional
    commitment with his drive for creative independence.
