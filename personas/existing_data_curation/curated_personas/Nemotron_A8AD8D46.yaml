  hobbies: '[''Reading historical biographies'', ''Philosophy essays'', ''Clockmaking'', ''Chess'', ''Cycling on the Schuylkill River Trail'', ''Vintage motorcycle restoration'', ''Urban photography'',
    ''Attending acoustic gigs'', ''Maker‑space tinkering'', ''Portuguese cooking'']'
  career_goals: Stephen aims to transition from a floor‑level machinist to a CNC programmer and eventually to a supervisory role where he can lead a small team focused on high‑precision, low‑volume production.
    He is motivated to become the go‑to expert for process innovation within his plant, championing the adoption of new machining strategies that boost efficiency without sacrificing quality. Long‑term,
    he envisions opening a boutique custom‑fabrication shop that combines advanced CNC capabilities with his love for handcrafted mechanical projects, allowing him to merge his technical skill set with
    his creative curiosity. Recognition for technical excellence and the ability to shape workflow standards are central to his ambition.
