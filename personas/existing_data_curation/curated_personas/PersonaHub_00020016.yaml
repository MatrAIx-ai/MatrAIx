persona_description: A Pacific Islander who is passionate about the study of Pacific societies and their cultural values. They are also interested in the economic challenges facing the Pacific region, particularly
  in the context of globalization and its impact on human migration flows, alternative exchange rate systems, trade liberalization, and economic inequality. They are a key speaker at the Pacific Science
  Inter-Congress and are known for their expertise in the field of ocean acidification and its impact on Pacific Island nations. They are also interested in the topic of cooperation in science and education
  in the Pacific Islands and are a member of the PSA Working Group on Ocean Acidification.
