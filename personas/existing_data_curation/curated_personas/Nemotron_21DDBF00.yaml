  hobbies: '[''Reading mystery and historical fiction'', ''Journaling'', ''Crocheting'', ''Balcony gardening'', ''Running short timed routes'', ''Small women’s Bible study group'', ''Visiting the Baltimore
    Museum of Black History'', ''DIY woodworking projects'']'
  career_goals: Olivia aims to earn a Journeyman Fabricator certification within the next two years, positioning herself for a shift‑supervisor role where she can shape workflow standards and improve efficiency.
    She wants to lead a small team, introduce lean‑manufacturing practices, and eventually open a boutique metal‑craft studio that serves local artisans and community projects. Financial stability and a
    predictable work schedule are central to her goal, providing a steady environment to manage her anxiety and support her independent household.
