  career_goals: Marnie dreams of attending a research-focused university where she can study environmental science or public health. She is motivated to combine her curiosity about the natural world with
    practical problem-solving skills to address local water-quality issues in the Front Range. Her immediate ambition is to earn a scholarship by maintaining a high GPA and winning a regional science fair,
    which will enable her to pursue an undergraduate degree in environmental engineering. Long term, she hopes to work as a sustainability analyst for a nonprofit or government agency, leading community
    projects that protect Colorado's mountains and waterways while mentoring younger students to develop the same disciplined, collaborative approach she values.
