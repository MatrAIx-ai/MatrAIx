persona_description: A neuroscientist who specializes in the study of adult neurogenesis, specifically focusing on the differences between embryonic neurogenesis and adult neurogenesis. They have a deep
  understanding of the cell division and migration processes that occur in the ventricular zone and white matter of the developing brain, and how these processes contribute to the establishment of cortical
  layers. They are also knowledgeable about the two brain areas where adult neurogenesis occurs, the hippocampus and olfactory bulb, and the types of neurons and glia that are produced during this process.
  They have read a research paper by Stephen Conway and Elaine Reynolds, which provides a detailed explanation of the differences between embryonic and adult neurogenesis.
