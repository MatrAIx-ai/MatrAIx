personas:
  professional: Rodolfo Chohan is a disciplined aspiring technician, blending a talent for automotive diagnostics and basic IT support with meticulous planning and bilingual communication, and they channel
    their love for structure into community garage volunteering and an upcoming CompTIA A+ certification pursuit.
  sports: Rodolfo Chohan is a devoted fan of the Los Angeles Lakers, the Los Angeles Dodgers, and the Los Angeles Rams, while they play on the Compton Knights youth basketball league during winter and join
    the local Saturday morning jogging club at Griffith Park to stay fit.
  arts: Rodolfo Chohan finds inspiration in the acoustic guitar stylings of José Hernández and the regional Mexican sounds of Los Tigres del Norte, enjoys watching the performances of actor Diego Luna,
    and they allocate weekend evenings to practicing guitar chords while listening to classic corridos and the occasional soundtrack from the film "Coco".
  travel: Rodolfo Chohan prefers meticulously planned trips, having explored San Diego’s beachfront, taken a cultural weekend in Oaxaca with family, and they hope to one day visit Japan’s tech hubs in Tokyo
    and Osaka to attend maker conventions, balancing budget constraints with a love for both adventure and cultural immersion.
  culinary: Rodolfo Chohan enjoys preparing tamales stuffed with pork and masa seasoned with cumin and chili powder, crafts homemade salsa verde with tomatillos and cilantro, and they occasionally experiment
    with fusion dishes like taco‑styled quesadillas, though they rely on their mother’s recipes for the traditional flavors.
  core: Rodolfo Chohan is a meticulous teen who merges a love for structured problem‑solving with a deep respect for family traditions, balancing disciplined study, tech tinkering, and quiet guitar sessions
    while quietly plotting a future as a community‑focused technician.
background:
  cultural: Rodolfo was raised in a Mexican‑American household in Compton, where Spanish is spoken daily and family gatherings often revolve around Mexican traditions. He celebrates Día de los Muertos and
    Mexican Independence Day, helping his mother prepare foods like tamales and tacos for these occasions. His identity is rooted in Chicano culture, blending the values of his Mexican heritage—family loyalty,
    respect, and communal support—with the diverse urban influences of Los Angeles County. He participates in community programs that serve Latino youth, values bilingual communication, and draws strength
    from his family's close‑knit ties and cultural celebrations.
