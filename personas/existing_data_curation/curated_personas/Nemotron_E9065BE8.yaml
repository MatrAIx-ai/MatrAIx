  career_goals: In the short term, Rodolfo aims to earn his GED within the next year and complete a CompTIA A+ certification along with an automotive technology certification offered through a local vocational
    program. He plans to secure an apprenticeship at a community garage or a tech support role to gain hands‑on experience. Long‑term, he envisions a stable technical career, either as a certified automotive
    technician or an IT support specialist, and ultimately hopes to open a community‑focused repair shop or tech help center that provides training and mentorship for at‑risk youth. He also remains open
    to joining a disciplined environment such as the U.S. Navy’s technical training programs if they align with his goal of structured skill development.
