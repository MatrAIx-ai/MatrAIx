persona_description: 'A birth doula who provides continuous physical, emotional and informational support to the mother before, during and just after childbirth. She is trained and experienced in childbirth
  and is knowledgeable about the effects of the presence of a doula on birth outcomes, the mother, the baby, and the partner. She practices in three ways: privately hired directly by clients, as hospital
  employees, and as volunteers in community or hospital programs. She does not replace nursing staff, make decisions for clients or intervene in their clinical care, and is supportive to both the mother
  and her partner.'
