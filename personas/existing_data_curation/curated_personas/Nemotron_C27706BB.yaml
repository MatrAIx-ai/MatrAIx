personas:
  professional: Monica Foy, a retired corporate finance strategist, applies their meticulous, structure‑loving mindset to mentor small‑business owners, guide community development projects, and shape a
    scholarship fund for women in business with the same analytical rigor that defined their multi‑year budgeting career.
  sports: Monica Foy, a lifelong Detroit Tigers fan who also follows the Detroit Pistons and Detroit Lions, participates in a senior walking club that meets twice weekly, enjoys gentle birdwatching hikes
    along the Detroit River, and occasionally joins the local senior softball league for light competition, where they value the occasional social interaction.
  arts: Monica Foy, an avid photographer of Grosse Pointe’s historic architecture, knits intricate patterns while listening to Miles Davis, John Coltrane, and Yo‑Yo Ma, and fills their evenings with classic
    literature and the soothing strains of Beethoven’s Ninth Symphony.
  travel: Monica Foy, who favors quiet, well‑planned trips, enjoys organized Great Lakes river cruises, guided tours of Savannah’s historic squares, and has earmarked funds for a spring pilgrimage to Kyoto’s
    cherry‑blossom gardens, while always returning home to their cherished rose garden.
  culinary: Monica Foy, a tea enthusiast with a modest kitchen repertoire, brews Earl Grey with a hint of lavender, prepares rosemary‑roasted chicken alongside quinoa‑stuffed zucchini, and pairs each meal
    with a slice of lemon cake while sketching their next knitting design.
  core: Monica Foy is a disciplined, solitary 79‑year‑old who balances meticulous budgeting with bursts of creative knitting, a penchant for early‑morning rose‑water tea, and a habit of forgetting why they
    entered a room, all while quietly championing community mentorship.
background:
  cultural: Monica is an African‑American woman whose family roots trace back to the Great Migration from the rural South to Detroit in the early 20th century. Growing up during the civil‑rights movement,
    she was shaped by the resilience of her community and the church’s central role in fostering solidarity. In Grosse Pointe, she maintains ties to the local black community through church events, cultural
    gatherings, and mentorship of youth, honoring a legacy of perseverance, education, and service.
