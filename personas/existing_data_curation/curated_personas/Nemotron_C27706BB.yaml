  career_goals: Although retired, Monica aims to channel her experience into legacy‑building activities. She plans to establish a scholarship fund for African‑American women pursuing business degrees, mentor
    small‑business owners in the Grosse Pointe and Detroit area, and author a memoir reflecting on her journey through the civil‑rights era and corporate America. She also aspires to serve as a consultant
    for local community development projects, ensuring sustainable and fiscally responsible outcomes.
