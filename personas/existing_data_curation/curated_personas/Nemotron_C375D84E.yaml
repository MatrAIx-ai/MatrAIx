personas:
  professional: Mitzi Mims, a seasoned graphic designer with over three decades of experience, blends advanced Adobe Creative Suite mastery with strategic business acumen to craft cohesive brand identities,
    employing structured Trello and Asana workflows while allowing creative spontaneity in client presentations and community workshops, and they are known for assertive yet empathetic negotiations that
    balance practicality with a talkative, collaborative spirit.
  sports: Mitzi Mims, an avid hiker of the Bridger and Gallatin ranges, belongs to the Bozeman Trail Runners club for seasonal 10K races, cross‑countries with the local Snowlodge Ski Club in winter, supports
    the Montana Grizzlies football team and the Denver Broncos on game nights, and they weave regular strength‑training sessions and weekend yoga into their fitness routine to counter hiking‑induced fatigue.
  arts: Mitzi Mims, who curates lively dinner‑party gatherings featuring screenings of classic August Wilson plays and live performances by the Bozeman Community Theatre, draws artistic inspiration from
    Ansel Adams’ iconic landscapes and Paula Scher’s bold typography, frequently streams the folk sounds of The Lumineers and the jazz vocals of Norah Jones while sketching, and they channel this cultural
    immersion into mentorship workshops that blend design fundamentals with storytelling.
  travel: Mitzi Mims prefers meticulously planned road trips that blend hiking adventures with design inspiration, having recently driven the Yellowstone Loop to capture geyser photography before an unplanned
    weekend in Banff National Park, and they aspire to explore the vibrant souks of Marrakech and the Zen gardens of Kyoto on future creative retreats, all while maintaining a quarterly creative‑retreat
    fund to keep travel expenses in check.
  culinary: Mitzi Mims, an enthusiastic host of seasonal dinner parties, loves preparing farm‑to‑table meals such as cedar‑plank grilled trout with spruce‑tip butter, roasted root‑vegetable medley seasoned
    with lavender‑infused olive oil, and huckleberry cobbler topped with locally sourced honey, often incorporating foraged pine nuts and wild mushrooms from their garden, and they indulge in artisanal
    cheese platters featuring young goat cheese, local honey, and fresh figs as a perfect finish.
  core: Mitzi Mims, a talkative 55‑year‑old designer who structures projects with precision yet embraces spontaneous creativity, channels worry into disciplined yoga and gratitude journaling, knits scarves
    for charity at night, and fuels their community with vibrant art‑theatre gatherings and sustainable branding ambitions.
background:
  cultural: Mitzi is a White American whose family roots trace back to German and Irish immigrants who settled in the Midwest before moving to Montana in the 1970s. She grew up with a blend of Midwestern
    pragmatism and frontier independence, values that translate into her practical yet adaptable approach to work and life. Her upbringing emphasized hard work, community involvement, and a love of the
    outdoors, all of which are reflected in her design aesthetic and her active participation in Bozeman’s cultural and environmental initiatives.
attributes:
  skills: '["Adobe Photoshop", "Adobe Illustrator", "Adobe InDesign", "Brand identity development", "Print layout and production", "Digital illustration", "Social media content creation", "Client relationship
    management", "Project budgeting", "Public speaking and workshop facilitation", "Flexible project‑management tools (Trello, Asana)", "Strategic visual communication"]'
  hobbies: '["Hiking and mountain photography", "Hosting dinner parties and community art‑theatre events", "Gentle yoga and mindfulness journaling", "Gardening native Montana wildflowers", "Knitting and
    crafting for local charities", "Mentoring art students at the community college"]'
  career_goals: Mitzi aims to transition from freelance graphic design to a leadership role as a Creative Director for a boutique agency in Bozeman, where she can shape brand strategy for emerging local
    businesses. Over the next five years, she plans to launch her own sustainable‑branding studio that emphasizes eco‑friendly design practices and supports the region’s entrepreneurial community. She also
    wants to formalize a mentorship program for junior designers, offering workshops that combine design fundamentals with business acumen. To reduce personal stress, she is pursuing certification in UI/UX
    design to broaden her service offerings and secure more stable, higher‑value contracts.
