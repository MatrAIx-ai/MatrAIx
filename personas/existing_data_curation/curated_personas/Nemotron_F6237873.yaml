personas:
  professional: Chester Wrice is an aspiring junior architect who spends afternoons designing elaborate LEGO cityscapes, applying methodical planning skills and a curiosity for new ideas while eagerly sharing
    blueprints with friends during playtime.
  sports: Chester Wrice dashes onto the neighborhood soccer field every weekend with the local youth team, the Greenfield Strikers, while cheering for the nearby professional baseball club, the River City
    Rams, and alternates biking days with bike‑friendly routes mapped out on their iPad.
  arts: Chester Wrice channels their love for comic heroes like Spider‑Man and Batman into vibrant sketches while jamming to Kendrick Lamar, Beyoncé, and Chris Tomlin, and they often re‑enact scenes from
    their favorite Magic Tree House books with LEGO, merging visual storytelling with musical rhythm.
  travel: Chester Wrice prefers family road trips that blend adventure with learning, eagerly recalling the dinosaur exhibit at Jurassic Park in Utah, the glittering lights of Disney World in Orlando, and
    dreaming of a future visit to London’s Tower of London to explore medieval history firsthand.
  culinary: Chester Wrice delights in building their own pepperoni pizza with extra mozzarella and cheddar, whisking up instant mac and cheese after soccer practice, and swapping stories over fresh apple
    slices and carrot sticks at lunch, though they sometimes sneak extra chocolate chip cookies when no one’s watching.
  core: Chester Wrice is a methodical yet adventurous 7‑year‑old who balances precise LEGO constructions with high‑energy soccer, saves pennies for coveted toys while occasionally forgetting to pack a snack,
    and thrives on sharing stories and music with friends.
background:
  cultural: Chester is a Black child growing up in Cincinnati's West End, where his family balances Midwestern life with deep African‑American cultural roots. His parents emphasize church involvement, gospel
    singing, and community service, instilling values of resilience and togetherness. Family gatherings feature foods like fried chicken, collard greens, and Cincinnati chili, while local celebrations such
    as the African‑American Cultural Festival expose him to music, dance, and stories of Black heritage. These influences shape his identity, fostering pride in his community and a curiosity about broader
    cultural traditions.
