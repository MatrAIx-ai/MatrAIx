personas:
  professional: An aspiring digital cartoonist, Roger Monteverde merges a curiosity for desert flora with skillful use of Sketchbook and Scratch, occasionally designing cartoon skeleton characters inspired
    by Día de los Muertos, and they channel this blend into playful storyboards while keeping organized notebooks for school art projects.
  sports: A small-group soccer enthusiast, Roger Monteverde plays midfield for the El Centro Strikers youth club, enjoys cheering for the LA Galaxy, and they prefer short, skill-focused drills over lengthy
    practices, balancing a love for the game with a gentle, cooperative style.
  arts: 'A devoted visual storyteller, Roger Monteverde fills sketchbooks with cartoons of desert cacti and desert wildlife, draws inspiration from graphic novels like ''Amulet'' and ''Avatar: The Last
    Airbender'', and they attend local festivals featuring mariachi bands, folkloric dance, and Día de los Muertos celebrations, which infuse their art with vibrant cultural rhythms.'
  travel: An inquisitive explorer, Roger Monteverde enjoys weekend trips to Joshua Tree National Park and family beach outings in San Diego, while dreaming of a future trip to Tokyo to dive into anime culture,
    and they favor carefully planned itineraries that blend relaxed sightseeing with adventurous hikes.
  culinary: A budding kitchen helper, Roger Monteverde assists in preparing tamales and fresh guacamole for family gatherings, delights in crafting simple cheese quesadillas with corn tortillas, and they
    love the sweet, cinnamon-sugar coating of churros, showcasing growing confidence in cooking.
  core: Roger Monteverde is a quietly curious 11-year-old who blends desert-inspired art, small-group soccer, and family traditions into a thoughtful, organized yet flexible lifestyle, occasionally forgetting
    chores in favor of sketching.
background:
  cultural: Roger is a first‑generation Mexican‑American raised in El Centro, California. At home, Spanish is spoken daily, and he regularly participates in family traditions such as preparing tamales,
    celebrating Día de los Muertos, and attending local festivals that showcase mariachi music and folkloric dance. His school environment is bilingual, reinforcing his fluency in both languages. Growing
    up in the Imperial Valley, he feels a strong connection to the desert's unique flora and fauna, which often inspires his artwork. The blend of Mexican heritage and Southern California's multicultural
    community shapes his identity, values of family solidarity, respect for elders, and a deep appreciation for cultural storytelling.
attributes:
  skills: '["hand drawing and sketching", "digital illustration (tablet)", "basic coding with Scratch", "bilingual Spanish‑English communication", "reading comprehension", "logical problem solving", "time
    management for school tasks", "collaborative small‑group teamwork"]'
  hobbies: '["drawing and sketching cartoons", "digital art on a tablet", "coding simple games in Scratch", "reading graphic novels and sci‑fi books", "birdwatching and desert nature walks", "listening
    to Mexican folk and pop music", "building LEGO models", "playing soccer with a few friends", "helping with family cultural celebrations"]'
  career_goals: Roger dreams of attending a specialized arts high school where he can refine his illustration skills and study graphic design. He hopes to become a professional illustrator or concept artist
    who creates culturally rich stories and community murals that celebrate Mexican heritage and the desert landscape of Imperial County. Long‑term, he imagines using his art to educate others about environmental
    conservation and cultural traditions, possibly combining visual storytelling with scientific topics.
