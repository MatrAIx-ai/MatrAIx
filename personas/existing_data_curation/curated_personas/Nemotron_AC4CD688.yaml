  hobbies: '["Reading science-fiction and environmental nonfiction", "Coastal fishing", "Surfing", "Woodworking with reclaimed materials", "Arduino-controlled lighting projects", "Cooking traditional Latino
    meals with modern twists", "Shoreline photography", "Visiting local farmers’ markets", "Hosting small potluck gatherings"]'
  career_goals: Feliciano aims to translate his practical skill set into a flexible, home‑based venture that aligns with his preference for low‑pressure schedules and strong family focus. Over the next
    two years, he plans to earn an EPA certification as a residential HVAC technician, expanding the range of services he can offer to neighbors. He also intends to launch a series of weekend workshops
    in his garage where he teaches basic home‑repair, DIY electronics, and sustainable woodworking to small groups of community members. Parallel to these efforts, he is developing an online portfolio that
    showcases his reclaimed‑wood furniture and occasional video tutorials on preparing modern twists on traditional Latino dishes, hoping to generate modest supplemental income. Ultimately, his ambition
    is to achieve financial stability through a modest entrepreneurial side‑gig while preserving the relaxed, curiosity‑driven lifestyle that he values.
