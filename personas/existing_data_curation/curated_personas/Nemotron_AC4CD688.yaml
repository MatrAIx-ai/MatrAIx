personas:
  professional: Feliciano Velecela is a hands‑on home‑repair specialist and aspiring residential HVAC technician; they blend a solid grounding in engineering fundamentals with a calm, curiosity‑driven mindset,
    turning reclaimed‑wood projects into Arduino‑enhanced décor while teaching practical DIY workshops to small groups in a relaxed, flexible schedule.
  sports: Feliciano Velecela enjoys laid‑back surf sessions at Virginia Beach when the swell permits, spends quiet weekends fishing from the pier, follows the Washington Commanders in the NFL and the Washington
    Capitals in the NHL, jogs along the boardwalk as a gentle fitness habit, participates in the local Virginia Beach Surf Club for occasional group outings, and they relish the calm rhythm of the ocean
    as a form of meditation.
  arts: Feliciano Velecela captures the shifting seascape with a DSLR camera inspired by Ansel Adams' tonal clarity, relaxes to the ambient sounds of Bon Iver and the speculative prose of N.K. Jemisin,
    attends intimate folk‑music evenings featuring emerging singer‑songwriters at a nearby coffeehouse, and they weave these influences into their creative woodworking designs.
  travel: Feliciano Velecela prefers low‑key, self‑planned road trips that blend nature and culture, having explored the Outer Banks and the Blue Ridge Parkway, dreaming of hiking Patagonia’s Torres del
    Paine and savoring street food in Oaxaca, while they balance travel costs with a modest side‑gig income and family commitments.
  culinary: Feliciano Velecela excels at modernizing traditional corn‑based dishes such as tamales, pupusas, and arepas by incorporating smoked paprika, quinoa, and seasonal vegetables from local farmers’
    markets, often pairing them with handcrafted corn masa and experimenting with sous‑vide techniques to achieve precise textures, and they share these inventive meals with their spouse and close friends.
  core: Feliciano Velecela blends calm curiosity with practical ingenuity, turning everyday routines into sustainable, hands‑on projects while they maintain a relaxed, low‑pressure lifestyle.
background:
  cultural: 'Feliciano’s cultural background reflects a blend of his parents’ Central American roots and the coastal, multicultural environment of Virginia Beach. Raised in a bilingual household, he grew
    up speaking both Spanish and English, listening to a mix of traditional Latin music and the sounds of ocean breezes. Family celebrations such as Día de los Muertos, Las Posadas, and holiday feasts featuring
    dishes like empanadas and tamales have been integral to his upbringing, reinforcing values of familial closeness and community sharing. While these traditions remain central, his daily life is also
    shaped by the relaxed beach culture of his Virginia home, where he enjoys outdoor activities and a diverse social scene. This bicultural identity informs his worldview: he seamlessly merges the warmth
    and collaborative spirit of his Latino heritage with the laid‑back, individualistic vibe of the coastal community, guiding his interactions, culinary experiments, and community involvement.'
attributes:
  skills: '["Engine repair", "Basic residential electrical wiring", "Automotive maintenance", "Home networking and Wi-Fi troubleshooting", "Arduino electronics prototyping", "Indoor air-quality monitoring",
