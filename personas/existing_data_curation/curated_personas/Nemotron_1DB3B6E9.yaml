  career_goals: Aimee aims to finish her bachelor's degree in Business Administration within the next two years, positioning herself for promotion to an Operations Manager or senior administrative leader.
    She is passionate about driving digital workflow initiatives that reduce manual paperwork and improve efficiency across her department. Aimee also wants to formalize a mentorship program for entry‑level
    clerical staff, helping them develop clear career pathways. Long‑term, she envisions transitioning to a consulting role that advises small businesses and non‑profits on office best practices, while
    maintaining a balanced lifestyle that allows time for community volunteer work and family.
