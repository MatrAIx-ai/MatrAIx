  hobbies: '["Gardening (vegetables and herbs)", "Reading classic literature", "Listening to classical music (Indian ragas and Western symphonies)", "Cooking South Asian dishes", "Birdwatching", "Nature
    walks", "Participating in small cultural gatherings", "Mindfulness meditation", "Poetry writing"]'
  career_goals: Although retired, Upendra aims to complete a memoir that weaves together his immigration journey, family history, and reflections on cultural identity, preserving these stories for future
    generations. He aspires to mentor younger members of the local South Asian community, offering guidance on academic pursuits and cultural heritage. Upendra also wishes to develop a senior‑focused wellness
    program at the Leesburg community center that incorporates mindfulness and social support to address anxiety and emotional distress among older adults. Additionally, he plans to enhance his digital
    skills to create an online archive of family photographs and documents, ensuring they are accessible to his grandchildren.
