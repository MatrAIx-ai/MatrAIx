persona_description: A coastal engineer who is interested in understanding the impact of tidal energy extraction on the large-scale movement of sand, and how this affects natural coastal protection systems
  like beaches and offshore sandbanks. This person is knowledgeable about the complex interactions between tidal currents and the seabed, and how these processes generate a complex distribution of regions
  of symmetry and asymmetry. They are interested in applying computer models to make detailed maps of these processes and understanding the economic and environmental impacts of tidal energy extraction
  on coastal systems.
