personas:
  professional: Lashonda Mosley is a seasoned non-retail sales supervisor who leverages data-driven analysis, design-thinking, and meticulous organization to drive team performance, while they channel their
    curiosity and collaborative spirit into mentorship and inclusive leadership.
  sports: Lashonda Mosley stays active by attending weekly yoga sessions, runs with the Mississippi River Run Club, roots for the Jackson State Tigers football team in the fall, and follows the Mississippi
    Braves baseball season, while they balance structured workouts with community sport cheerleading.
  arts: Lashonda Mosley nurtures their creative side with watercolor sessions inspired by Georgia O'Keeffe, frequents galleries in Jackson and Oxford, and immerses themselves in the soulful sounds of B.B.
    King, Etta James, and Mahalia Jackson, letting art and music shape their identity as they find inspiration in each brushstroke.
  travel: Lashonda Mosley plans travel around cultural festivals, having savored the New Orleans Jazz & Heritage Festival and a weekend art tour in Savannah, while dreaming of a spring trip to Oaxaca's
    vibrant markets and the galleries of Paris, and they balance careful budgeting with a love for spontaneous culinary discoveries.
  culinary: Lashonda Mosley enjoys exploring reinvented Southern fare, frequently preparing smoked paprika-infused shrimp and grits, hot-honey fried chicken, and collard greens spiced with pimento cheese,
    and they wield a kitchen skill set that blends confident technique with experimental flair.
  core: Lashonda Mosley is a methodical yet creatively curious leader who balances data-driven sales strategy with a love for watercolor art, and they often lose track of time in the studio while juggling
    a penchant for late-night coffee and occasional perfectionist over-planning.
background:
  cultural: Lashonda is a Black woman raised in Laurel, Mississippi, whose family traces its roots to the Mississippi Delta and the civil-rights era. She grew up attending a historically Black Baptist church,
    where gospel music, communal support, and storytelling shaped her values. Her upbringing emphasized resilience, education, and service, leading her to engage with local Black professional groups such
    as the National Black MBA Association and the NAACP chapter. She celebrates African-American traditions like Juneteenth, soul food, and community festivals, while also embracing contemporary Southern
    culture. These experiences inform her collaborative leadership style, her commitment to uplifting others, and her appreciation for art and diverse perspectives.
attributes:
  skills: '[''Team Leadership'',''Sales Performance Management'',''Data Analysis (Excel, Power BI)'',''CRM Administration (Salesforce)'',''Process Optimization'',''Training & Development'',''Conflict Resolution'',''Strategic
