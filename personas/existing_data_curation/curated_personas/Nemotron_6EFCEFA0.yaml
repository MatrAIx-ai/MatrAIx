  hobbies: '[''Watercolor Painting'',''Visiting Art Galleries'',''Reading (fiction and non-fiction)'',''Cooking & Food Exploration'',''Yoga and Meditation'',''Community Volunteering'',''Mentoring Youth'',''Gardening'',''Traveling
    to Cultural Festivals'',''Listening to Blues and Gospel Music'']'
  career_goals: Lashonda aims to advance to a regional sales director role within the next five years, overseeing multiple teams and shaping company-wide sales strategy. She plans to obtain a professional
    MBA or executive leadership certification to deepen her strategic acumen. A core ambition is to champion diversity and inclusion initiatives, mentor emerging Black women in business, and eventually
    launch her own boutique consultancy that helps small firms adopt data-driven sales processes infused with creative storytelling and visual branding.
