  hobbies: '[''Soccer (local league)'', ''Youth mentoring'', ''Fishing at local reservoirs'', ''Motorcycle maintenance'', ''Cooking Mexican dishes'', ''Hosting communal meals'', ''Playing FIFA video games'',
    ''Attending cultural celebrations (Día de los Muertos, Mexican Independence Day)'']'
  career_goals: Ruben aims to become a certified journeyman plumber and pipefitter within the next two years, earn a Steamfitter‑Pipefitter (SV) certification, and eventually advance to a foreman or project‑lead
    role on larger commercial installations. He dreams of launching his own contracting business that can provide stable, well‑paid jobs for peers in his community, emphasizing safety, reliability, and
    fair wages. To support this, he plans to pursue an associate degree in Construction Management at a local community college, strengthening his managerial and budgeting skills. These goals reflect his
    desire for a predictable income stream to support his family and reduce his anxiety about future financial stability.
