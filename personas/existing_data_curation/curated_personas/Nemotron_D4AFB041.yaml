personas:
  professional: A 22‑year‑old apprentice plumber and pipefitter, Ruben Torres combines meticulous interpretive skills of technical drawings with an outgoing, customer‑focused work style, using their practical
    problem‑solving and strong inventory management to deliver code‑compliant residential projects while actively pursuing journeyman certification and a future foreman role.
  sports: Ruben Torres leads the forward line for the East Bay Community Soccer League, cheers on the LA Galaxy and Los Angeles Dodgers during professional seasons, and spends Sundays fishing at Lake Berryessa
    while maintaining a simple gym routine for core strength.
  arts: Ruben Torres winds down after a shift by streaming action movies like John Wick, blasting the cumbia rhythms of Los Santos Aztecos while grilling carne asada, and sporadically listening to indie
    rock acts such as Tame Impala, illustrating how visual and musical arts weave into their downtime.
  travel: Ruben Torres favors high‑energy weekend escapes, meticulously planning motorcycle road trips to Santa Cruz, fishing getaways to Lake Tahoe, and dreaming of an immersive cultural tour of Oaxaca’s
    Día de los Muertos celebrations, all while navigating the modest budget of an apprenticeship.
  culinary: Ruben Torres, a self‑taught grill enthusiast, seasons carne asada with cumin, garlic, and lime, rolls pork‑filled tamales with chilies and corn husks, and crafts fish tacos using fresh snapper,
    cilantro, and radish, often sharing large communal meals with neighbors and friends.
  core: Ruben Torres is a diligent, community‑oriented apprentice who balances the rigor of pipework with a love for soccer, family cooking, and a constant undercurrent of worry about financial stability.
background:
  cultural: Ruben grew up in a Mexican‑American household in Los Banos, where Spanish and English were spoken interchangeably. His family places a high value on community, family loyalty, and hard work,
    values that shape his professional ethic. He identifies strongly with Mexican cultural traditions—celebrating holidays such as Día de los Muertos, Mexican Independence Day, and attending Catholic Mass
    with his family. The close‑knit Mexican community in Merced County provides him with a support network that influences his social life, volunteer activities, and culinary tastes. He carries forward
    the tradition of 'trabajo duro' (hard work) and 'respeto' (respect) in both his personal relationships and his career.
attributes:
