  hobbies: '[''Community Choir'', ''Gardening'', ''Historical Fiction Reading'', ''Cooking Southern Cuisine'', ''Church Volunteer Work'', ''Financial Literacy Volunteering'', ''Mentoring Young Professionals'',
    ''Book Club'', ''Quilting'', ''Attending Local Sports Events'']'
  career_goals: Cynthia aims to transition into a senior supervisory role where she can shape accounting best practices for a regional firm and mentor the next generation of Black accountants. She is passionate
    about establishing a community‑focused financial literacy program that empowers local entrepreneurs and low‑income families in Garland and the greater Dallas area. While preparing for a phased retirement,
    she envisions launching a boutique consulting practice offering tailored bookkeeping and tax advisory services to small businesses, ensuring a smooth legacy for her professional contributions.
