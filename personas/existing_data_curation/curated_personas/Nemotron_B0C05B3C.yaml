  hobbies: '["Prairie garden tending", "Reading historical biographies and mid‑century American literature", "Crocheting blankets for local shelter", "Birdwatching along the Rock River trail", "Small book
    club meetings", "Cooking traditional Midwestern dishes", "Online genealogical research", "Neighborhood walks"]'
  career_goals: Although retired, Sarah aims to deepen her engagement with the local historical society, helping to record and preserve stories of Rockford’s older residents. She hopes to mentor younger
    volunteers at the senior center, sharing her practical skills in gardening, cooking, and needlework. Maintaining her health through regular walks along the Rock River trail and continued gardening is
    a personal priority. She also wishes to complete a memoir that weaves together three generations of family narratives, contributing to both her personal legacy and the community’s collective memory.
    Ultimately, she aspires to foster intergenerational connections that reflect her values of harmony, kindness, and practical curiosity.
