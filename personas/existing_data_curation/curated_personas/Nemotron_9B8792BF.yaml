  hobbies: '[''Pickup basketball'', ''Barbecue cooking'', ''Church choir participation'', ''Community event organization'', ''Gardening'', ''Reading leadership and personal development books'', ''Traveling
    to historical sites'', ''Playing acoustic guitar'', ''Attending jazz and R&B concerts'', ''Volunteering at youth STEM workshops'']'
  career_goals: Eddie is aiming to move into a senior leadership role where he can shape safety culture across multiple facilities. His short‑term goal is to obtain Certified Safety Professional (CSP) and
    Certified Industrial Hygienist (CIH) credentials, which will strengthen his technical credibility. Over the next five years he envisions becoming Director of Safety and Operational Excellence for a
    regional manufacturing corporation, leading cross‑functional initiatives that reduce workplace injuries by 30% and improve productivity through lean practices. He also plans to mentor emerging engineers,
    launch a community safety outreach program for local schools, and eventually transition to a consulting practice that helps small businesses in Gwinnett County implement sustainable safety systems.
