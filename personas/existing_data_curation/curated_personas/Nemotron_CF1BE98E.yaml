personas:
  professional: Yong Lee is a Certified Financial Planner who leverages deep quantitative analysis and Python-driven data visualizations to craft bespoke wealth strategies for high‑net‑worth families, channeling
    their competitive, skeptical nature into rigorous risk assessments while their artistic sensibility ensures client communications sparkle with clear, gallery‑like visual narratives.
  sports: Yong Lee fuels stress relief by logging solo hikes across the Blue Ridge Mountains, training with the Atlanta Trail Runners club for seasonal half‑marathons, cheering on the Atlanta Falcons in
    football season and the Atlanta Hawks in basketball, while maintaining a disciplined weekend running routine that balances competitive drive with modest endurance goals.
  arts: Yong Lee immerses themselves in the Atlanta contemporary art scene, drawing inspiration from the bold abstractions of Ellsworth Kelly and the immersive installations of Yayoi Kusama, while curating
    their own sketchbook entries beside listening to the minimalistic compositions of Philip Glass and the folk storytelling of Joni Mitchell, and they regularly capture urban architecture through a Leica
    camera.
  travel: Yong Lee prefers thoughtfully planned solo journeys that blend cultural depth with relaxation, having trekked the misty trails of Asheville’s Blue Ridge Parkway, explored the modern art museums
    of Paris, and yearning to wander the historic streets of Kyoto for culinary inspiration, all while budgeting travel expenses through a spreadsheet that tracks each trip’s cost against professional time
    away.
  culinary: Yong Lee experiments in the kitchen by fusing traditional Korean flavors—such as gochujang and kimchi—with Southern staples like collard greens and smoked pork, creating signature dishes like
    gochujang‑glazed pork ribs paired with cornbread, kimchi‑infused collard green stew, and bulgogi‑style chicken waffles, while honing a modest but confident skill set with a sous‑vide precision cooker.
  core: Yong Lee embodies a disciplined yet creatively restless 38‑year‑old who blends analytical rigor with artistic curiosity, navigating wealth management, solo hikes, and kitchen experiments while constantly
    wrestling with a competitive streak and a penchant for over‑thinking.
background:
  cultural: Yong is the son of Korean immigrants who settled in the southeastern United States. His upbringing combined the disciplined, education‑first values of his parents' Korean culture with the Southern
    hospitality and community focus of Georgia. He grew up bilingual in Korean and English, celebrating holidays such as Chuseok and Lunar New Year while also participating in local festivals. This bicultural
    experience shaped his respect for tradition, strong work ethic, and an appreciation for both Eastern calligraphy aesthetics and Western contemporary art. Family ties remain central, and he often incorporates
    Korean culinary techniques and seasonal ingredients into his cooking, blending them with Southern staples. These cultural roots inform his client approach, especially when working with other Asian‑American
    families who value intergenerational wealth planning.
