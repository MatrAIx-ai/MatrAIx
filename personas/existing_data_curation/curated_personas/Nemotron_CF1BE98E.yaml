    for client presentations'']'
  career_goals: Yong aims to scale his practice into a boutique advisory firm that specializes in high‑net‑worth families, targeting $100 million in assets under management within five years. He plans to
    earn the Chartered Financial Analyst (CFA) charter to deepen his investment expertise and develop a proprietary, data‑driven financial planning framework that integrates artistic visualizations for
    client communication. He also aspires to become a sought‑after speaker at regional finance conferences, author a book that blends behavioral finance insights with creative thinking, and establish a
    mentorship program for younger Asian‑American professionals entering the financial services industry. Balancing professional ambition with personal well‑being, he seeks to implement structured work‑life
    boundaries that reduce stress and allow more time for his artistic pursuits.
