persona_description: A veterinarian who specializes in the study of viral diseases, particularly the Bovine Viral Diarrhoea Virus (BTV) and its impact on sheep. She is particularly interested in the detection
  and characterization of viral proteins in sheep tissues, and the role of BTV in the development of clinical signs in sheep. She is skilled in the use of immunohistochemistry and confocal microscopy to
  identify viral infections in sheep tissues. She is also interested in the clinical signs associated with BTV infection in sheep, and how these can be used to diagnose the disease.
