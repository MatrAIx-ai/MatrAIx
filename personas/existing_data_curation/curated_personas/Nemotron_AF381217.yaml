  career_goals: James aims to graduate high school with strong grades in math and science, then pursue a bachelor’s degree in civil engineering at a university such as Rutgers. He envisions a career designing
    sustainable infrastructure projects that improve his local community, eventually moving into project management roles where he can apply his organizational strengths. In the short term, he plans to
    join his high school’s robotics and STEM clubs, secure a summer internship with a local engineering firm, and volunteer as a mentor for younger students interested in STEM. Long‑term, he hopes to combine
    his technical expertise with his passion for community service by participating in urban planning committees or public works initiatives.
