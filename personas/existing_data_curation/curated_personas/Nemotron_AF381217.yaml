personas:
  professional: James Daly, a budding robotics enthusiast and aspiring mechanical engineer, channels meticulous planning and teamwork into designing functional prototypes for his middle‑school robotics
    club, using Python and CAD while also leading as point guard on the basketball team.
  sports: James Daly, a point guard for the Fair Lawn Middle School basketball team, thrives on structured playmaking while cheering for the New York Knicks and Brooklyn Nets, participates in a local youth
    basketball league, and hikes the Palisades Interstate Park trails with friends during the off‑season.
  arts: James Daly, an enthusiastic member of a community drum circle, blends rhythmic traditions from local St. Patrick’s Day celebrations with contemporary beats, and draws creative inspiration for robotics
    projects from listening to folk groups like The Chieftains and pop artists such as Dua Lipa.
  travel: James Daly, a curious teen who has explored New York City museums, visited Washington, D.C.’s Smithsonian on a family road trip, and spent a week in Dublin during St. Patrick’s Day festivities,
    now dreams of backpacking through the Pacific Northwest to see historic railways and visiting Chicago’s engineering marvels.
  culinary: James Daly, an aspiring home chef, follows YouTube tutorials to master quick meals like spaghetti carbonara, chicken stir‑fry with bell peppers, and a simplified Irish soda bread, favoring ingredients
    such as garlic, fresh rosemary, sharp cheddar, and canned tomatoes, often cooking for family after basketball practice.
  core: James Daly, a methodical teen who balances structured teamwork on the court with precise robot building, disciplined budgeting, and a rhythm‑driven love for drums.
background:
  cultural: 'James grew up in a middle‑class, predominantly white suburban community in Fair Lawn, New Jersey. His family is of Irish‑American descent, with traditions such as celebrating St. Patrick''s
    Day and attending a local Catholic parish. The neighborhood values punctuality, responsibility, and community involvement, reflected in volunteer fire department events and local town festivals. While
    the area is culturally diverse, James''s upbringing emphasizes typical Northeastern U.S. suburban values: a strong work ethic, respect for rules and schedules, and an emphasis on education and civic
    participation.'
