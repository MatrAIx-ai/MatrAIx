  hobbies: '[''Electronics tinkering'', ''Basketball'', ''Fishing'', ''Listening to classic rock and country music'', ''Volunteering at the food pantry'', ''Journaling'', ''Online video gaming'']'
  career_goals: Terry plans to earn his GED within the next year and then secure an apprenticeship with a local mechanic or carpentry shop, leveraging his curiosity for how things work and his desire for
    a stable, practical career. His long‑term ambition is to open his own small repair and maintenance business that can serve the Como community and provide employment opportunities for other young people.
    He also hopes to take part‑time community‑college courses in vocational trades or social services so he can expand his ability to help others beyond technical work.
