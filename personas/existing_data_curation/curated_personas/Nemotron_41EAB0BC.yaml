  hobbies: '[''southern cooking'', ''gardening'', ''knitting'', ''church choir'', ''genealogy research'', ''walking'', ''journaling'', ''mindfulness practice'', ''community theater'']'
  career_goals: Sanay hopes to deepen her community involvement by becoming a volunteer coordinator at the local senior center, where she can design flexible activity programs and mentor newer volunteers.
    She aims to lead a weekly book club focused on African‑American literature and to teach a beginner’s computer class for seniors, sharing her self‑taught digital skills. Additionally, she aspires to
    write a memoir that weaves together her family’s oral histories, cultural traditions, and personal reflections on coping with anxiety, with the goal of offering comfort and inspiration to other retirees.
