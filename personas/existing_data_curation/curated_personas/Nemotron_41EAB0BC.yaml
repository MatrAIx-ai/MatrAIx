personas:
  professional: Sanay Sharper, a 66-year-old aspiring volunteer coordinator at the local senior center, blends a practical knack for budgeting and event organization with a curiosity-driven love of genealogy
    and digital skills, leading peer-support circles, teaching beginner computer classes, and occasionally wrestling with a relaxed, disorganized approach to schedules.
  sports: Sanay Sharper, a 66-year-old avid walker, participates in The Villages Pickleball Club's weekly matches, follows the Orlando Magic and Jacksonville Jaguars on television, and balances fitness
    with leisurely nature strolls along the community's shaded trails, favoring low-impact activity over strenuous gym routines.
  arts: Sanay Sharper, a 66-year-old community theater enthusiast, sings in the church choir with renditions of Mahalia Jackson's hymns, performs in local productions of August Wilson's plays, devotes evenings
    to mystery novels by Agatha Christie and Tana French, and cherishes Winslow Homer's Southern landscapes that echo their garden's colors.
  travel: Sanay Sharper, a 66-year-old travel lover, favors group road trips to historic Southern gems such as Savannah, Charleston, and New Orleans, dreams of a tranquil Key West beachfront getaway, and
    recalls a memorable visit to St. Augustine's cobblestone streets, balancing wanderlust with a modest budget and a relaxed travel timetable.
  culinary: Sanay Sharper, a 66-year-old culinary aficionado, perfects Southern comfort staples like fried chicken, collard greens simmered with smoked ham hocks, buttery cornbread, peach cobbler, and gumbo
    enriched with garden-fresh tomatoes and okra, and delights in experimenting with their own twists on classic dishes while sharing hearty plates at community potlucks.
  core: Sanay Sharper, a 66-year-old storyteller who melds a deep love for Southern hospitality, garden experiments, and volunteer ambitions with anxiety-driven budgeting, occasional disorganization, and
    an insatiable curiosity for family history, embodies a resilient yet emotionally reactive spirit.
background:
  cultural: Sanay identifies as African American and carries a rich Southern cultural heritage. Growing up in a close‑knit Black neighborhood, she was immersed in soul food cooking, gospel music, and oral
    storytelling traditions that emphasized family bonds and communal support. The church has been a central pillar in her life, shaping her values of compassion, resilience, and community service. In her
    current home at The Villages, Florida, she blends these cultural roots with the vibrant retirement community atmosphere, participating in multicultural events, sharing her culinary skills, and offering
    mentorship rooted in her life experiences.
