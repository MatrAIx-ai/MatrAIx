persona_description: A researcher and public health expert who studies the effects of exposure to microbes on the immune system and the development of childhood diseases, particularly acute lymphoblastic
  leukemia (ALL). The researcher is particularly interested in the role of genetic predisposition, environmental factors, and the interaction between the immune system and the microbiome in triggering the
  disease. The researcher is also interested in developing a bacteria pill to protect children from cancer and other conditions.
