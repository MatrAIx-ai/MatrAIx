personas:
  professional: A seasoned restaurant operations manager, Doris Moody leverages a humanities background and a competitive, data‑driven mindset to streamline workflows, design art‑inspired menus, and mentor
    diverse teams; they balance meticulous efficiency with a curiosity for unconventional dining concepts.
  sports: An avid supporter of local teams, Doris Moody follows the Houston Astros, the Rockets, and the Dynamo, regularly joins a weekend bayou‑run club, and balances their competitive drive on the field
    with solo hikes in Brazos Bend State Park, where they find solitude and reset.
  arts: A dedicated patron of the arts, Doris Moody frequents the Houston Museum of Fine Arts, especially exhibitions featuring Jean‑Michel Basquiat and contemporary Texas artists, attends community theater
    productions of August Wilson’s plays, and finds inspiration in authors like Sally Rooney and musicians such as St. Vincent, often quoting their lyricism while planning menu concepts; they consider each
    artistic encounter a seed for culinary innovation.
  travel: A meticulous planner with a taste for cultural immersion, Doris Moody has explored Austin’s music scene, the historic French Quarter of New Orleans, and the culinary markets of Oaxaca, and they
    are eyeing a future trip to Kyoto’s tea houses and Copenhagen’s New Nordic restaurants, always budgeting travel expenses through a dedicated “experience” savings account.
  culinary: A creative home chef, Doris Moody experiments with Tex‑Mex fusion dishes like miso‑glazed shrimp and grits, smoked brisket tacos with pickled daikon, and a watercress‑goat‑cheese salad drizzled
    with local honey, documenting each plating on Instagram, where they obsessively adjust lighting to capture the perfect shot.
  core: Doris Moody, a 36‑year‑old restaurant manager, blends Southern hospitality with artistic flair, balancing methodical efficiency, competitive ambition, and a relentless curiosity for new flavors
    and experiences.
background:
  cultural: Doris grew up in a middle‑class, predominantly white community in the Greater Houston area, absorbing the values of Southern hospitality, self‑reliance, and community involvement. Her family's
    emphasis on education and appreciation for the arts led her to pursue a humanities degree, which informs her aesthetic approach to both her personal life and professional endeavors. Living in Pearland,
    a diverse suburb of Houston, she navigates a blend of Texan traditions and multicultural influences, fostering a pragmatic yet open‑minded worldview.
attributes:
  skills: '[''Operations Management'', ''Team Leadership'', ''Budgeting & Cost Control'', ''Inventory Management'', ''Food Safety & ServSafe Compliance'', ''Menu Development'', ''Vendor Negotiation'', ''Scheduling
