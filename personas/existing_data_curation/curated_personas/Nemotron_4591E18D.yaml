  hobbies: '[''Visiting Art Exhibitions'', ''Experimenting with Fusion Cooking'', ''Photography of Food and Architecture'', ''Hiking Local Trails'', ''Yoga and Meditation'', ''Reading Contemporary Fiction'',
    ''Attending Community Theater Performances'', ''Exploring Cultural Festivals'']'
  career_goals: Doris aims to advance from managing a single location to overseeing multiple restaurants as a regional manager, positioning herself as a leader who blends operational efficiency with creative
    dining concepts. In the longer term, she aspires to launch her own boutique café that showcases curated art installations alongside innovative, locally sourced cuisine, establishing a reputation for
    experiential hospitality. She also envisions mentoring emerging food‑service professionals and contributing to industry publications on best practices for integrating aesthetics into restaurant management.
