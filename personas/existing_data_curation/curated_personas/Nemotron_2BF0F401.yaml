personas:
  professional: Candida Rivera is a junior data analyst at the Chicago Department of Public Health who blends strong quantitative skills in Excel, SQL, and Python with a bilingual flair for translating
    complex health data into clear visual stories, and their talkative, upbeat demeanor turns routine presentations into lively, inclusive workshops that keep stakeholders engaged.
  sports: Candida Rivera stays active by dancing salsa and bachata three times weekly, joining a community volleyball league in the summer, jogging the lakefront trail while cheering on the Chicago Cubs
    in spring and the Chicago Bulls during basketball season, and embraces a relaxed fitness philosophy that prioritizes fun over rigid routines.
  arts: Candida Rivera showcases vocal talent at open‑mic karaoke nights, drawing inspiration from artists like Celia Cruz, Marc Antonio, and contemporary pop singer Ariana Grande, while also curating playlists
    of Latin jazz and attending local theater productions featuring actors such as Lupita Nyong’o, enriching their evenings with a blend of music, dance, and performance.
  travel: Candida Rivera prefers spontaneous weekend getaways, often hopping on a train to explore nearby Milwaukee’s lakefront festivals or planning low‑cost flights to vibrant cities such as Oaxaca for
    its street food and colorful markets, balancing a love for cultural immersion with a limited budget and a flexible schedule.
  culinary: Candida Rivera, an enthusiastic home cook, delights in mastering mole with dried chilies, chocolate and spices, rolling homemade tamales with masa and pork, and grilling tacos al pastor marinated
    in achiote and pineapple, while also experimenting with fresh cilantro, roasted corn, and artisan tortillas to share flavorful feasts with friends.
  core: Candida Rivera embodies a curious, sociable analyst who blends data‑driven rigor with spontaneous salsa steps, occasional disorganization, and a habit of turning every coffee break into a mini‑lecture
    for anyone willing to listen.
background:
  cultural: Candida is a first‑generation Mexican‑American raised in Chicago’s Little Village neighborhood. She grew up in a bilingual home where Spanish and English were spoken interchangeably, and family
    gatherings centered around Mexican traditions such as Día de los Muertos, Día de la Independencia, and weekly posadas. Her upbringing emphasized familismo, communal support, and respect for elders,
    with strong Catholic influences shaping holiday celebrations. She stays connected to her heritage through music—ranging from mariachi to modern Latin pop—and by sharing traditional recipes with her
    friends. This cultural foundation drives her commitment to community outreach and her desire to uplift other Mexican‑American youths in STEM.
attributes:
