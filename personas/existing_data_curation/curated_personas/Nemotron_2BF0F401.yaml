  hobbies: '[''Salsa dancing'', ''Cooking Mexican cuisine'', ''Mentoring youth in science clubs'', ''Karaoke'', ''Exploring Chicago neighborhoods'', ''Lakefront trail walking'', ''Reading mystery novels'',
    ''Sudoku and puzzle solving'', ''Astronomy documentaries'']'
  career_goals: Candida aims to earn a bachelor’s degree in data science while continuing her current role as a junior data analyst for the Chicago Department of Public Health. She aspires to become a senior
    analyst focusing on health equity metrics for underserved Latinx neighborhoods, using her analytical skills to inform policy. Parallel to her technical growth, she wants to design and lead STEM outreach
    programs that introduce middle‑school students from Mexican‑American families to mathematics and science, leveraging her sociable nature and love of community engagement. She values a flexible work
    environment that allows her to explore new analytical methods without being confined to rigid schedules.
