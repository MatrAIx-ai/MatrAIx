personas:
  professional: Fidel Scott is a veteran Bronx taxi driver who leverages an instinctive grasp of traffic shortcuts, bilingual fluency, and a vivid imaginative curiosity to design themed rides that blend
    urban murals, rhythmic beats, and island‑heritage flavors, delivering assertive yet compassionate service while they maintain a reliable schedule amid the borough’s constant flux.
  sports: Fidel Scott cheers for the New York Yankees and the New York Knicks, participates in the Bronx Basketball Association’s weekend pick‑up games, and keeps fit by jogging along the Bronx River Parkway
    during spring, viewing physical activity as a meditative counterbalance to the mental demands of their urban storytelling while they stay grounded.
  arts: Fidel Scott immerses in street art by studying the bold canvases of Basquiat and the stencil provocations of Banksy, attends live shows by Kendrick Lamar, Celia Cruz, and underground hip‑hop collectives,
    and writes reflective poetry inspired by the prose of Junot Díaz and Julia Alvarez, letting the arts shape both their personal identity and community‑focused projects while they continuously seek fresh
    sources of inspiration.
  travel: Fidel Scott prefers spontaneous weekend getaways, often planning day trips to Coney Island’s boardwalk or Philadelphia’s vibrant mural district, while they dream of an immersive cultural pilgrimage
    to Barcelona’s street‑art alleys and the historic old town of Cartagena, balancing a modest budget with a yearning for global artistic experiences.
  culinary: Fidel Scott enjoys experimenting in the kitchen, fusing traditional island mashed plantains with smoked pork belly and truffle oil, reinventing the classic stewed root‑vegetable soup by adding
    coconut milk and a dash of habanero, showcasing a confident sauté technique that occasionally gives way to over‑seasoning when enthusiasm runs high, and they relish sharing these dishes at community
    pop‑up events.
  core: Fidel Scott is a 40‑year‑old Bronx cab driver whose boundless curiosity stitches together street art, music, and fusion cuisine into a vibrant community narrative, even as chronic stress and occasional
    insomnia keep them on edge.
background:
  cultural: Fidel grew up in a close-knit Dominican household in the Bronx, where Sunday family lunches centered around arroz con pollo, sancocho, and lively bachata playlists. His parents emigrated from
    Santo Domingo in the 1980s, preserving both Catholic traditions and Afro-Caribbean folk practices. This bicultural upbringing gave him fluency in Spanish with a distinctive Dominican cadence, as well
    as an intimate knowledge of the Bronx's multicultural tapestry—its Latino street markets, Caribbean festivals, and the neighborhood's deep-rooted hip-hop lineage. Community churches, local block parties,
    and the annual Dominican Parade in New York City remain pivotal reference points for his identity, influencing his love for rhythm, storytelling, and communal solidarity while also motivating his desire
    to showcase Dominican culture within the broader Bronx narrative.
