  career_goals: Fidel aims to obtain a commercial driver's license that qualifies him to train new taxi drivers, providing a steadier income while sharing his expertise. He plans to finish his bachelor's
    degree in communications or urban studies, building on his some-college coursework. Long-term, he dreams of creating a community cultural hub—a small gallery and pop-up kitchen that showcases emerging
    Dominican-American artists and offers fusion Dominican dishes, blending his love for art, food, and entrepreneurship. He also hopes to develop a part-time role as a Bronx cultural guide, offering "art-themed"
    rides that spotlight local murals, historic sites, and Dominican cultural landmarks. These goals balance his desire for financial stability with his passion for creativity and community connection.
