personas:
  professional: Gladys Thomas is a 25‑year‑old automotive technician at a busy Alexandria garage who thrives on routine maintenance, precise engine diagnostics, and brake overhauls, blends meticulous record‑keeping
    with a sociable, mentor‑like presence, and they are driven to become a certified master mechanic specializing in diesel engines before opening a community‑focused auto shop.
  sports: Gladys Thomas plays in a weekend recreational basketball league with the Alexandria Knights, follows the New Orleans Saints in football and the New Orleans Pelicans in basketball, stays fit through
    regular pick‑up games and occasional jogs around the Lake Alexandria waterfront, and they prefer a flexible, community‑oriented approach to exercise rather than strict training regimens.
  arts: Gladys Thomas immerses herself in the sounds of gospel legend Mavis Staples, blues icons B.B. King, and Zydeco pioneer Clifton Chenier, enjoys dancing to live Zydeco bands at the Alexandria Mardi Gras
    parade, regularly attends church choir rehearsals, and they occasionally watch the soulful dramas of actress Viola Davis to blend cultural storytelling with their own creative expression.
  travel: Gladys Thomas favors flexible, low‑budget road trips that blend car‑culture stops with family visits, having already driven to New Orleans for Mardi Gras, taken a weekend cruise along the Gulf
    Coast beaches of Gulfport, attended the Detroit Auto Show, and they dream of exploring the Cajun‑influenced town of Lafayette and the historic French Quarter while improvising itineraries around work
    shifts.
  culinary: Gladys Thomas loves cooking hearty Southern staples such as gumbo with Andouille sausage, jambalaya loaded with shrimp and smoked turkey, and sweet potato pie spiced with cinnamon and nutmeg,
    often adding fresh okra and collard greens from her community garden, and they enjoy sharing these meals at neighborhood potlucks while boasting a confident, albeit improvisational, kitchen skill set.
  core: Gladys Thomas blends a practical, routine‑driven work ethic with a sociable, community‑first spirit, juggling occasional impulsive truck upgrades and a laid‑back approach to planning, while dreaming
    of a future auto shop that mentors local youth, and they often rely on spontaneity to keep life lively.
background:
  cultural: Gladys grew up in Alexandria’s close‑knit Black community, where family ties, church, and shared traditions shaped her worldview. Influenced by Southern African‑American culture, she was raised
    on the sounds of gospel, blues, and Zydeco, and she cherishes the communal meals that feature Creole and Cajun flavors. The legacy of resilience and mutual support in Rapides Parish’s Black neighborhoods
    taught her the value of practicality, hard work, and looking out for neighbors. While she respects the traditional values of her elders, she also embraces the vibrant, contemporary culture of Louisiana—celebrating
    Mardi Gras, participating in local festivals, and maintaining a strong sense of pride in her heritage.
attributes:
  skills: '[''Routine maintenance (oil changes, tire rotations, fluid checks)'', ''Engine diagnostics using OBD-II scanners'', ''Brake system inspection and repair'', ''Transmission service and minor repairs'',
    ''HVAC (air-conditioning) repair'', ''Electrical system troubleshooting (battery, alternator, wiring)'', ''Suspension and steering component repair'', ''Safe use of hand and power tools'', ''Interpreting
    service manuals and schematics'', ''Accurate service record keeping'', ''Customer communication and education'', ''Team collaboration and mentorship of junior staff'']'
  hobbies: '[''Church gatherings and potluck barbecues'', ''Dancing to Zydeco and hip‑hop at Mardi Gras'', ''Recreational basketball league'', ''Community gardening (okra, collard greens)'', ''Attending
    regional car shows'', ''Customizing her own truck (rims, paint)'', ''Cooking Southern dishes (gumbo, jambalaya, sweet potato pie)'']'
  career_goals: She aims to become a certified master mechanic by completing all ASE (Automotive Service Excellence) tests within the next three years, and she plans to enroll in an associate-degree program
    in automotive technology at a community college in nearby Pineville. Long‑term, Gladys envisions opening her own modest auto‑repair shop in Alexandria that offers affordable, trustworthy service to
    the neighborhood, with a focus on training local youth through apprenticeship programs. She also hopes to specialize in diesel‑engine repair for the region’s many pickup trucks and to become a respected
    instructor for future mechanics.
