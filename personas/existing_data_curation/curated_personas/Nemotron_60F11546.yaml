personas:
  professional: Jonathan Tabera is a seasoned Training and Development Specialist who blends two decades of corporate learning expertise with bilingual, culturally mindful instructional design, leveraging
    Articulate Storyline, Adobe Captivate, and Moodle to craft immersive workshops that champion inclusive, data‑driven outcomes while staying curious about emerging learning technologies and maintaining
    a practical focus on measurable impact.
  sports: Jonathan Tabera hikes regularly with the Shenandoah Trail Club, follows the Washington Capitals and Washington Wizards, participates in a casual Fairfax men’s soccer league, and embraces seasonal
    fitness routines that prioritize group camaraderie over rigid training plans, even though they occasionally forget to stretch after long treks.
  arts: Jonathan Tabera immerses themselves in the vibrant rhythms of cumbia and salsa, dancing with a local Latino dance troupe that often plays classics by Celia Cruz, Carlos Vives, and Marc Antonio,
    while also enjoying Broadway hits like Hamilton and films by Pedro Almodóvar, reflecting a sociable and curious palate for artistic expression.
  travel: Jonathan Tabera blends curiosity with relaxed planning when traveling, savoring weekend escapes to Shenandoah National Park, revisiting the historic streets of Cartagena, Colombia for family festivals,
    and dreaming of a future cruise to the Galápagos, all while balancing retirement budgeting considerations.
  culinary: Jonathan Tabera loves preparing traditional dishes such as salteñas, mondongo, and quinoa salads spiced with ají amarillo and llajua, proudly sharing these meals at community gatherings while
    also experimenting with paella and guava jam, though they occasionally over‑salt the stew when multitasking between cooking and lesson planning.
  core: Jonathan Tabera blends compassionate community spirit with a relaxed, curiosity‑driven approach to life, juggling hiking, dance, and cooking while occasionally misplacing schedules and embracing
    spontaneous moments.
background:
  cultural: Jonathan was born to Bolivian parents and grew up immersed in Andean traditions, speaking Spanish at home while attending American schools. He carries forward the values of community, hospitality,
    and respect for elders that characterize Bolivian culture. Annual celebrations of Carnaval de Oruro and Día de los Muertos, family gatherings centered around hearty meals, and the rhythmic sounds of
    traditional instruments have shaped his worldview. In Fairfax County, he stays connected to the Bolivian diaspora through cultural associations, volunteering at local festivals, and sharing his heritage
    by organizing bilingual workshops that highlight cross‑cultural communication. His dual‑cultural identity informs his compassionate approach to helping others and adds depth to his training content.
attributes:
  skills: '[''Adult Learning Theory'', ''Curriculum Design'', ''Blended Learning Development'', ''E‑learning Authoring (Articulate Storyline, Adobe Captivate)'', ''Learning Management System Administration
    (Moodle, Cornerstone)'', ''Facilitation of In‑person and Virtual Workshops'', ''Group Dynamics and Team‑building'', ''Conflict Resolution and Mediation'', ''Coaching and Mentoring'', ''Bilingual Content
    Development (Spanish/English)'', ''Training Evaluation (Kirkpatrick Model)'', ''Data‑Driven Performance Analytics'']'
  hobbies: '[''Hiking in Shenandoah and local trails'', ''Cooking Bolivian cuisine (salteñas, mondongo, llajua)'', ''Cumbia and salsa dancing'', ''Volunteering as a mentor at adult‑education center'', ''Reading
    personal development and leadership books'', ''Listening to workplace learning podcasts'', ''Participating in community cultural festivals'']'
  career_goals: Looking ahead, Jonathan aims to transition into a senior leadership role such as Director of Learning and Development within a mid‑size organization that values inclusive culture. He plans
    to create a signature program on emotional intelligence and collaborative teamwork that can be scaled across multinational teams. Additionally, he hopes to launch an independent consulting practice
    focused on diversity, equity, and inclusion training, leveraging his Bolivian heritage to introduce cross‑cultural competence modules. He also aspires to mentor emerging trainers, develop a certification
    pathway for community‑based educators, and contribute scholarly articles on practical training design to professional journals.
