personas:
  professional: Herbert Greer, a 12‑year‑old budding junior debater and drama enthusiast, channels their methodical curiosity into leading school debate team discussions and starring in community theater
    productions, where they thrive as a talkative and reliable on‑stage leader.
  sports: Herbert Greer, a 12‑year‑old soccer aficionado, plays midfield for the Midtown Youth Soccer Club, roots for the New England Revolution in the MLS, and practices drills at local beaches and woods,
    balancing a competitive drive with a laid‑back approach to pickup games.
  arts: Herbert Greer, a 12‑year‑old drama club star and LEGO model builder, draws inspiration from Shakespeare’s A Midsummer Night’s Dream, admires the performances of Lin‑Manuel Miranda, and reads historical
    fiction like The Witch of Blackbird Pond, weaving storytelling into their creative projects.
  travel: Herbert Greer, a 12‑year‑old explorer, spends weekends trekking the nearby coastal dunes and pine woods, has visited Boston’s Freedom Trail and Plymouth Plantation, and dreams of future trips
    to Colonial Williamsburg and the Smithsonian National Air and Space Museum.
  culinary: Herbert Greer, a 12‑year‑old aspiring chef, loves assembling snack trays shaped like LEGO bricks, enjoys classic grilled cheese with tomato soup, and experiments with simple recipes such as
    homemade pizza topped with pepperoni and pineapple, though they often neglect to clean up afterward.
  core: Herbert Greer, a 12‑year‑old charismatic debater, LEGO architect, and soccer enthusiast, blends methodical curiosity with sociable energy, leading to a habit of planning elaborate projects while
    occasionally neglecting chores.
background:
  cultural: Herbert's cultural background is shaped by growing up in Halifax, Massachusetts, a small New England town with a rich colonial history and a close relationship to the Atlantic coast. His family
    reflects the region's blend of early colonial roots and later European immigrant influences, emphasizing education, community involvement, and respect for the local environment. Local traditions such
    as town meetings, seasonal festivals, and school programs that celebrate regional history and environmental stewardship are integral parts of his upbringing.
