  hobbies: '[''Visiting art museums'', ''Attending jazz and blues concerts'', ''Community theater (acting and set design)'', ''Storytelling at senior center'', ''Gardening (heirloom vegetables)'', ''Card
    games (bridge, rummy)'', ''Cooking (soul food and experimental recipes)'']'
  career_goals: Albert aims to transition from his cashier role into a mentor‑coach position within the store, where he can share his decades of experience with younger employees and improve staff development
    programs. He also hopes to become a volunteer docent at the Indianapolis Museum of Art, guiding visitors and deepening his engagement with the arts. Additionally, Albert wishes to organize intergenerational
    cultural events at his senior center, using his organizational skills and sociable personality to foster community connections and celebrate local heritage.
