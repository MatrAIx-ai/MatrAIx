personas:
  professional: Albert Price, a 73‑year‑old retail veteran, blends his four‑decade mastery of cash handling, POS systems, and conflict resolution with a vibrant curiosity for the arts to mentor new hires,
    serve as a liaison between management and staff, and pursue a transition into a store‑wide coach role while also aspiring to become a volunteer docent at the Indianapolis Museum of Art.
  sports: Albert Price enjoys low‑impact fitness through weekly senior‑center tai chi, follows the Indianapolis Colts football team and the Indiana Pacers basketball team, and participates in a community
    garden walking club that meets at the Indianapolis City Market each Saturday.
  arts: Albert Price immerses himself in Indianapolis’s cultural life by frequenting the Indianapolis Museum of Art and attending live performances at the Indy Jazz Fest, revering musicians such as Miles
    Davis, John Coltrane, and B.B. King, while also acting in community theater productions and designing sets that blend classic motifs with his own storytelling flair.
  travel: Albert Price prefers leisurely road trips that blend history and nature, having visited Brown County’s leaf‑covered hills, taken a weekend train to New Orleans for its jazz heritage, and planning
    a future pilgrimage to the National Gallery of Art in Washington, D.C., all while balancing travel expenses with a modest travel fund.
  culinary: Albert Price loves cooking soulful comfort dishes like slow‑braised collard greens, fried chicken, sweet potato pie, and cornbread, often harvesting heirloom tomatoes and peppers from his garden
    to experiment with spice blends such as smoked paprika and cayenne, and he delights in sharing these meals at senior‑center potlucks.
  core: Albert Price is a talkative, art‑obsessed former cashier who blends meticulous retail expertise with a relentless curiosity, mentoring younger staff by day and orchestrating jazz‑filled evenings,
    garden harvests, and community theater productions by night.
background:
  cultural: Albert is an African‑American who grew up in Indianapolis after his family relocated from the South during the Great Migration. Raised in a close‑knit Black community, he was deeply influenced
    by the local church, gospel music, and family gatherings that emphasized storytelling and culinary traditions. These roots fostered a strong sense of communal responsibility and an appreciation for
    cultural expression through art, music, and food. Albert remains active in historically Black neighborhoods, participates in events such as the Indy Black Film Festival, and draws on the resilience
    and optimism of his heritage in his everyday interactions.
attributes:
