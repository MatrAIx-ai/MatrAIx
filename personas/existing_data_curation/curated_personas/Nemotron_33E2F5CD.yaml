personas:
  professional: Shawntell Moxey, a veteran television and film production specialist, merges decades‑long analog camera expertise with modern digital editing and color grading, and they channel their pragmatic
    focus and competitive drive into mentoring younger crews while navigating occasional disorganization to keep tight project schedules on track.
  sports: Shawntell Moxey stays active with the Rowan County Senior Walking Club’s morning strolls, enjoys cheering on the Carolina Panthers in football season and the Charlotte Hornets in basketball, and
    they join the community garden‑themed charity softball league every summer, balancing low‑impact exercise with friendly competition.
  arts: Shawntell Moxey finds solace in playing their harmonica to the soulful blues of Muddy Waters and gospel hymns of Mahalia Jackson, spends evenings absorbed in African‑American classics by Toni Morrison,
    James Baldwin, and Maya Angelou while sipping sweet tea, and they volunteer at the local historical society to curate vintage photographs, weaving their love of music, literature, and visual storytelling.
  travel: Shawntell Moxey prefers organized heritage tours that blend historic sites with leisurely garden breaks, having explored Savannah’s historic squares and New Orleans’ jazz museums, and they dream
    of a guided Smithsonian trip in Washington, D.C., as well as a tranquil week in the Blue Ridge Mountains.
  culinary: Shawntell Moxey delights in cooking Southern comfort dishes like collard greens simmered with smoked ham hocks, peach cobbler made from garden‑fresh peaches, and perfectly brewed sweet tea,
    yet they most often assemble simple garden salads drizzled with vinaigrette, showcasing their modest kitchen prowess and enduring love of fresh produce.
  core: Shawntell Moxey is a structured yet delightfully disorganized 78‑year‑old film veteran who cultivates a vibrant garden by day, mentors budding filmmakers by night, and they wind down with a blues
    harmonica, all while occasionally misplacing their glasses and forgetting to water a few pots.
background:
  cultural: Shawntell’s cultural identity is shaped by the African‑American experience in the American South. Born in the late 1940s, she witnessed the tail end of segregation and the rise of the civil‑rights
    movement, which instilled a strong sense of resilience and community solidarity. She earned her degree from a historically Black college, where she immersed herself in African‑American studies, literature,
    and visual arts. Her Southern roots are reflected in the rhythms of gospel music, the flavors of soul‑food cooking, and a storytelling tradition that values oral histories. These influences permeate
    her work, as she often frames narratives that highlight Black coaches, churches, and family histories within North Carolina, honoring both personal legacy and collective memory.
attributes:
  skills: '[''Camera operation (digital & analog)'', ''Lighting design and on‑set set‑up'', ''Video editing (Final Cut Pro X, Avid Media Composer, Adobe Premiere)'', ''Color correction and grading (DaVinci
    Resolve)'', ''Audio sync and basic sound mixing'', ''Storyboarding and shot planning'', ''Media asset organization and archiving'', ''Technical troubleshooting for broadcast equipment'', ''Mentorship
    and crew training'', ''Documentary storytelling and narrative structuring'']'
  hobbies: '[''Backyard gardening'', ''Reading African‑American literature and memoirs'', ''Playing harmonica (blues/gospel)'', ''Volunteer work at the Rowan County Historical Society'', ''Attending church
    choir services'', ''Participating in community theater productions'', ''Cooking traditional Southern soul‑food recipes'', ''Birdwatching in nearby nature preserves'', ''Solving crossword puzzles'']'
  career_goals: Although semi‑retired, Shawntell aims to preserve the African‑American heritage of Rowan County by producing a multi‑part documentary series that blends archival footage with contemporary
    interviews. She plans to establish a community media workshop where she can train aspiring local filmmakers in both classic film techniques and modern digital tools. Additionally, she hopes to digitize
    her personal collection of historic news reels, securing them for future generations, and to be recognized as a cultural steward who bridges the past and present through visual storytelling.
