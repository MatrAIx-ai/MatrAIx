  hobbies: '[''Cooking Honduran Cuisine'', ''Dancing Salsa and Cumbia'', ''Church Choir Participation'', ''Gardening'', ''Volunteering at Community Centers'', ''Attending Cultural Festivals'', ''Watching
    Spanish-Language Films'', ''Knitting'', ''Reading Family History'']'
  career_goals: Yudelka aims to broaden the nonprofit's reach to neighboring counties, secure multi‑year funding streams, and launch a mentorship program that pairs Honduran youth with community leaders.
    She envisions establishing a permanent cultural center that offers language classes, job‑training workshops, and health‑referral services. Over the next five years, she also plans to develop a clear
    succession plan to ensure the organization’s longevity and to author a memoir highlighting her journey from a small‑town immigrant to a community leader.
