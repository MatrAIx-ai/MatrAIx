personas:
  professional: Clyde Thornton, a service sales representative with two decades of experience, leverages their proficiency with Salesforce, data‑driven market analysis, and a pragmatic yet curious mindset
    to strategically close deals while coaching teammates, balancing organized time‑boxing with the flexibility to seize last‑minute opportunities.
  sports: Clyde Thornton, a regular in the local YMCA basketball league, is a devoted fan of the New Orleans Saints, Mississippi State Bulldogs, and Memphis Grizzlies, using early morning runs along the
    Yazoo River as cardio and they balance competitive play with a weekend ritual of cheering at high school football games.
  arts: Clyde Thornton, an avid blues and country aficionado, spends evenings strumming acoustic guitar at open‑mic nights, draws inspiration from B.B. King, Willie Nelson, and modern folk duo The Milk
    Carton Kids, and they curate a modest vinyl collection that fuels their creative woodworking designs.
  travel: Clyde Thornton prefers road‑trip adventures that blend fishing expeditions—like their annual trek to the Kenai River in Alaska—with cultural stops at music hubs such as Nashville and New Orleans,
    often planning trips months ahead but leaving room for spontaneous detours to local festivals.
  culinary: Clyde Thornton, a confident home cook, relishes frying catfish in cornmeal, baking buttery cornbread with honey, and experimenting with Southern comfort flavors using buttermilk, pimento cheese,
    and hot sauce, while they occasionally over‑indulge in midnight snack plates of fried chicken wings.
  core: Clyde Thornton is a pragmatic competitor who balances early‑morning fishing, data‑driven sales tactics, and evenings of blues guitar, all while they juggle a skeptical edge and a habit of hoarding
    woodworking tools.
background:
  cultural: Clyde grew up in Robinsonville and its surrounding rural communities in Tunica County, Mississippi. His upbringing reflects the Southern working‑class culture of the Delta region, marked by
    a strong sense of community, reverence for local traditions, and an emphasis on self‑reliance. He was raised in a Baptist household, with regular church attendance shaping his values of honesty, hard
    work, and neighborly support. The local cuisine, music—particularly blues and country—and the annual high‑school football season are part of his cultural fabric. Despite never marrying, Clyde maintains
    close ties with extended family and long‑time friends, often gathering for barbecues and church events. His perspective combines a practical, grounded outlook typical of the Mississippi Delta with an
    openness to new ideas, reflecting the region’s gradual economic diversification.
attributes:
  skills: '[''Customer Relationship Management (CRM) software (e.g., Salesforce)'', ''Negotiation and persuasive communication'', ''Lead generation and prospecting'', ''Market analysis and trend monitoring'',
