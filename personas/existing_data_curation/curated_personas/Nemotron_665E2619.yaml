  hobbies: '[''Visiting art museums and galleries'', ''Sketching and watercolor painting'', ''Reading philosophy and retail innovation'', ''Volunteer work at community center'', ''Tutoring teens in computer
    basics'', ''Gardening'', ''Hiking in Shawnee National Forest'', ''Exploring farm‑to‑table cuisine'']'
  career_goals: Kevin aims to advance from his current role as a retail salesperson to a store manager within the next two years, using his organizational skills and compassionate leadership style to improve
    employee retention and customer satisfaction. Ultimately, he envisions moving into a district‑manager position where he can influence multiple locations and implement innovative merchandising concepts
    that blend retail with local art culture. He plans to complete a bachelor's degree in Business Administration or Arts Management, which will equip him to someday open his own boutique‑gallery hybrid
    that showcases emerging Midwestern artists while offering curated lifestyle products.
