  hobbies: '[''Herb gardening'', ''Exploring farmer’s markets'', ''Cooking show marathons'', ''Food photography'', ''Hiking in the Sonoran Desert'', ''Reading culinary history'', ''Baking bread'', ''Volunteer
    cooking classes at community kitchen'']'
  career_goals: Jose aims to become a head chef within the next three years, leveraging his curiosity for innovative dishes while maintaining reliable, profitable kitchen operations. He plans to complete
    his culinary certification to solidify his formal credentials and eventually open a small, upscale Mexican-fusion eatery in Tucson that showcases locally sourced ingredients. His ambition includes mentoring
    junior cooks in an intimate setting, fostering a collaborative kitchen culture that balances creativity with disciplined execution. Financial stability and a supportive community are key motivations
    driving his career trajectory.
