persona_description: A researcher at the Argonne National Laboratory, specialized in quantum optics and quantum network opportunities, focusing on the study of semiconductor nanoplatelets. They are skilled
  in single photon emission from semiconductor nanoplatelets, including their absorption and emission dipoles, and are proficient in manipulating their emission polarization and directionality using the
  absorption and emission dipoles. They work at the Center for Nanoscale Materials, one of the premier national user facilities for interdisciplinary research at the nanoscale supported by the DOE Office
  of Science, and are managed by UChicago Argonne, LLC for the U.S. Department of Energy’s Office of Science.
