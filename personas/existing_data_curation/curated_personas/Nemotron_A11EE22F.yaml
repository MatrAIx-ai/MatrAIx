personas:
  professional: Kathy Williams, a one-year-old who meticulously lines up stacking cubes and imitates office phone calls during playtime, already blends curiosity with practicality, and they often organize
    their toys by color and size, hinting at a future path in engineering or project management.
  sports: Kathy Williams, a one‑year‑old who loves crawling after the TV’s broadcast of the Chicago Cubs and giggles when the family watches the local youth soccer club ‘Lil’ Lions’, they now participate
    in a parent‑led infant swim class at the community pool.
  arts: Kathy Williams, a one‑year‑old who sways to the gentle lullabies of Brahms, sings along with Raffi’s "Baby Beluga," and watches Sesame Street’s colorful puppets, they find creative expression through
    clapping, babbling, and cuddling plush toys.
  travel: Kathy Williams, a one‑year‑old who enjoys stroller‑friendly trips to the nearby botanical garden, weekend visits to Grandma’s cottage in the mountains, and annual family vacations to Disneyland,
    they prefer travel that is carefully planned with nap schedules and baby‑proof accommodations.
  culinary: Kathy Williams, a one‑year‑old with a particular fondness for smooth avocado puree, sweet carrot mash, and occasional chicken and rice puree, they show early culinary preferences for bright,
    mildly sweet flavors and often reject textures that are too lumpy, demanding the teething biscuit for comfort.
  core: Kathy Williams, a highly sociable yet anxious one‑year‑old who balances meticulous organization of toys with talkative bursts, they constantly worry about new experiences while thriving on the attention
    of caregivers.
background:
  cultural: Kathy comes from a Black family rooted in the cultural traditions of the African American community in New Jersey. Her parents celebrate holidays such as Juneteenth and Kwanzaa, incorporating
    music, storytelling, and soul‑food recipes passed down through generations. Living in Paulsboro, a small town in Gloucester County, she is exposed to a blend of urban and suburban influences, including
    community events at the local church and cultural festivals that highlight African American history and contributions. Family gatherings often involve call‑and‑response singing, rhythmic clapping, and
    sharing of oral histories, all of which shape Kathy’s early sense of identity and belonging.
