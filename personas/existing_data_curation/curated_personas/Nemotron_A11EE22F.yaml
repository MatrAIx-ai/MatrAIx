  career_goals: At her current stage, Kathy does not have formal career goals, but her parents nurture her strong curiosity and sociability with the aim of fostering a lifelong love of learning. She shows
    early signs of leadership in group play, suggesting future ambitions to become a teacher, community organizer, or caregiver who can help others. Her family encourages her to continue building communication
    skills, confidence, and a sense of responsibility so she can pursue a career that lets her support and inspire others.
