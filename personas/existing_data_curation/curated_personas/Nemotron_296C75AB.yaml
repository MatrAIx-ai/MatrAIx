personas:
  professional: Juan Leon, a 33‑year‑old STEM career counselor, blends psychometric analytics with AI‑driven job‑matching tools, using their spontaneous, talkative nature to energize workshops while compensating
    for their dislike of structure by relying on co‑counselor partnerships and shared digital calendars, and they thrive on the dynamic feedback of group sessions.
  sports: Juan Leon stays fit by joining the local D.C. area pick‑up basketball league that pits their team against the Wizards‑sponsored Rotisserie Crew, trekking the Appalachian Trail sections of Shenandoah
    National Park with the Potomac Outdoor Club on weekends, and cheering on the Washington Capitals during the hockey season as a reward for their workouts, and they feel a surge of confidence after each
    game.
  arts: Juan Leon fuels their creative spark by performing improv sketches with the Capital City Comedy Collective, starring in community theater productions of “Our Town” and “The Laramie Project,” and
    immersing themselves in live shows headlined by indie acts such as St. Vincent and world‑music sensation Manu Chao, while they often sprinkle favorite movie lines from Robert De Niro into counseling
    sessions to lighten tense moments.
  travel: Juan Leon blends spontaneous weekend road trips to Asheville’s vibrant arts district with meticulously planned spring visits to Barcelona for its culinary scene, yet they balance their wanderlust
    against limited savings by prioritizing affordable stays in Shenandoah’s cabins and occasional cultural festivals in nearby Philadelphia.
  culinary: Juan Leon, an enthusiastic home chef, delights in crafting Mexican‑Italian fusion dishes like chipotle‑infused marinara tacos topped with fresh mozzarella and cilantro, frequently experimenting
    with poblano peppers, heirloom tomatoes, and chorizo, and they showcase their culinary creations at weekly potluck gatherings with friends.
  core: Juan Leon is a charismatic, anxiety‑prone improv lover who merges tech‑savvy career counseling with spontaneous cooking experiments, forever juggling structure‑less creativity against the need for
    self‑care, and they constantly seek balance through humor and habit.
background:
  cultural: Juan was raised in the culturally diverse suburbs of Falls Church and Arlington, Virginia. Although his family identifies as white, they maintain ties to both European and Hispanic heritage,
    reflected in a bilingual household where Spanish is spoken alongside English and in the celebration of holidays such as Thanksgiving and Día de los Muertos. Growing up in a multicultural environment
    shaped his inclusive communication style and his commitment to equity in education. He attended public schools with a broad mix of socioeconomic backgrounds, where early encouragement toward STEM was
    balanced by participation in community service programs that emphasized collaboration across cultural lines. This blend of traditions and experiences informs Juan's approach to counseling, fostering
    empathy, respect for diverse perspectives, and a practical orientation toward helping clients thrive in a globalized world.
