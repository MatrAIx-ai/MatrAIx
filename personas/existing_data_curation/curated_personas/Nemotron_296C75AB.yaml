  career_goals: Juan aims to advance into a senior leadership role within higher education, such as Director of Career Services at a research university, where he can shape institution‑wide strategies for
    STEM student development. Parallel to that, he envisions launching his own AI‑enhanced career guidance platform that personalizes pathways for students from diverse backgrounds, blending his curiosity
    for new technologies with proven counseling methods. He plans to publish research on integrating digital tools with counseling techniques for clients who experience high emotional reactivity, and to
    become a sought‑after speaker at national counseling and educational conferences. Additionally, Juan wants to establish a mentorship network in the Washington, D.C. metro area that pairs high‑school
    students with STEM professionals, and to cultivate stronger personal organization and self‑care habits to model resilience for his clients.
