personas:
  professional: Zoya Hoover, a seasoned GIS manager based in Colorado, leverages advanced photogrammetry, LiDAR processing, and Python automation to deliver visually striking, data‑rich maps that guide
    sustainable land‑use decisions, while they mentor junior staff and champion community‑driven mapping initiatives that blend Midwestern pragmatism with Colorado’s artistic flair.
  sports: Zoya Hoover, an avid mountain biker with the Loveland Trailblazers club and regular hiker of the Colorado Front Range, supplements outdoor pursuits with seasonal cross‑country skiing, participates
    in a local yoga studio, and they root for the Denver Broncos, Colorado Avalanche, and Colorado Rockies as part of their community‑focused fitness routine.
  arts: Zoya Hoover, a watercolor enthusiast inspired by Georgia O'Keeffe and the local sculpture park, frequently visits exhibitions featuring artists like Julie Rotblatt‑Amrany, performs improv theater
    at the Loveland Creative Lab, and they enjoy intimate concerts by The Lumineers and folk legend Ryan Bingham, weaving these artistic experiences into their personal and professional narratives.
  travel: Zoya Hoover favors meticulously planned road trips that mix adventure and cultural immersion, such as a summer drive to Banff, a spring trek through Patagonia’s Torres del Paine, and a literary
    pilgrimage to Kyoto after a travel‑focused book club selection, yet they balance these trips with family obligations and a modest travel budget that prioritizes national park visits over luxury resorts.
  culinary: Zoya Hoover delights in seasonal farm‑to‑table cooking, often preparing cedar‑planked salmon with roasted Colorado beets, quinoa‑pomegranate salad, and herb‑infused wild mushroom risotto, while
    they master sourdough starter techniques and pair meals with locally brewed IPA and a crisp Nebbiolo discovered on a recent wine‑tour.
  core: Zoya Hoover blends Midwestern practicality with Colorado's love of the outdoors, channeling curiosity into artistic GIS solutions, seasoned by yoga, mountain biking, and occasional splurges on high‑end
    hiking gear, and they keep community at the heart of every project.
background:
  cultural: Zoya grew up in a small Midwestern town in Kansas, where a family emphasis on engineering and practical problem‑solving shaped her early education. After earning a STEM bachelor’s degree, she
    relocated to Loveland, Colorado, drawn by the region’s vibrant outdoor lifestyle and strong arts community. In Loveland, she embraces the city’s blend of contemporary sculpture, folk art traditions,
    and environmental stewardship, participating in local festivals like the Loveland Sculpture Invitational. Her cultural identity combines Midwestern pragmatism with Colorado’s progressive, nature‑focused
    ethos, valuing self‑reliance, community collaboration, and an appreciation for both modern and traditional American artistic expressions.
attributes:
  skills: '[''Geographic Information Systems (GIS)'', ''Cartographic design'', ''Photogrammetry'', ''LiDAR data processing'', ''GNSS/RTK surveying'', ''Remote sensing analysis'', ''Spatial data analysis'',
    ''Python scripting for GIS'', ''SQL and PostGIS database management'', ''AutoCAD and MicroStation drafting'', ''Project management'', ''Stakeholder communication'', ''Quality assurance and control'',
    ''Data visualization'', ''Map aesthetic design'']'
  hobbies: '[''Hiking and mountain biking'', ''Landscape photography'', ''Watercolor painting'', ''Geocaching'', ''Community mapping volunteer'', ''Book club (travel literature)'', ''Cooking and hosting
    dinner parties'', ''Yoga'', ''Live music concerts'', ''Improvisational theater'']'
  career_goals: Zoya aims to advance to a senior GIS manager or lead photogrammetry specialist role within a regional planning agency or environmental consulting firm, where she can shape large‑scale spatial
    projects and influence sustainable land‑use policies. She plans to earn the GIS Professional (GISP) certification and publish a portfolio of case studies that integrate artistic map design with actionable
    data. Over the next five years, she hopes to mentor a diverse team of surveyors, spearhead community‑driven mapping initiatives in Colorado, and eventually launch her own boutique mapping studio focused
    on wildfire risk assessment and cultural heritage documentation. Speaking at national conferences such as AAG and ASPRS and contributing to open‑source GIS tools are also high on her agenda.
