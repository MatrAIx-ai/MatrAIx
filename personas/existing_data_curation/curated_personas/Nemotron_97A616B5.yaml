  career_goals: He frequently talks about wanting to be a 'people helper' when he grows up – imagining roles such as an early‑childhood teacher who shares stories from his Polynesian heritage, a firefighter
    who keeps his community safe, or a youth coach who organizes fun, inclusive activities. Michael also dreams of leading a cultural dance group that teaches other children traditional Polynesian songs
    and movements, combining his love for music, dance, and community harmony. His calm demeanor and natural kindness fuel an ambition to create spaces where friends feel heard and supported.
