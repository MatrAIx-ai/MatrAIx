personas:
  professional: Young Michael is a pint‑sized inquisitive builder who spends hours crafting elaborate Lego cities, using a mix of creative ideas and tried‑and‑true building techniques while eagerly explaining
    each step to anyone who will listen, and they love turning playtime into mini‑workshops for friends.
  sports: Young Michael champions the local Tiny Tykes Soccer Club in the spring, loves cheering for the hometown City Cubs baseball team, and spends afternoons at the playground mastering the monkey bars
    while giggling with friends, and they thrive on the energy of team play.
  arts: Young Michael enjoys drawing whimsical versions of his favorite movie characters like Elsa from Frozen and Spider‑Man, humming Disney soundtracks by Idina Menzel, proudly showcasing his crayon masterpieces
    on the refrigerator door, and they often organize impromptu art shows for anyone who stops by.
  travel: Young Michael's favorite trips include a weekend beach stay at Sunny Shores where he builds sandcastles, a family road trip to the Grand Canyon for an awe‑inspiring view, and frequent visits to
    Grandma's house where he relishes exploring the backyard's hidden fort, and they eagerly demand the next adventure.
  culinary: Young Michael prefers the comforting taste of mac and cheese with a sprinkle of cheddar, delights in dipping apple slices into peanut butter, loves helping his mom stir pancake batter even if
    his tiny hands sometimes flop the whisk, and they proudly claim the title of 'official taste‑tester' for any new snack.
  core: Young Michael is a chatty, curiosity‑driven five‑year‑old who balances imaginative play with practical habits, spreads kindness effortlessly, and they remain serenely resilient no matter the mess.
background:
  cultural: Young Michael comes from a Polynesian family that blends Samoan and Hawaiian traditions. At home, he hears everyday greetings in Samoan and Hawaiian, enjoys meals featuring poi, taro, and coconut,
    and participates in monthly gatherings organized by the local Polynesian cultural association in Las Vegas. These events include dance workshops, storytelling circles, and community service projects,
    reinforcing values of respect for elders, communal harmony, and love for music and movement. Growing up in the multicultural environment of Clark County, Michael comfortably shares his heritage with
    peers while also embracing the diverse influences of the city.
