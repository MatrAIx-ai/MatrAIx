personas:
  professional: Jacob Russell, a 1‑year‑old budding explorer, applies their natural curiosity and practical problem‑solving to stacking blocks, navigating cause‑and‑effect toys, and experimenting with textures,
    all while favoring flexible play routines over rigid schedules, hinting at future strengths in engineering or design.
  sports: Jacob Russell, a 1‑year‑old who loves the sand at Imperial Beach, attends a toddler swim class at San Diego Sports Club, watches the San Diego Padres and Los Angeles Lakers on TV, and frequently
    joins a local parent‑child playgroup where they competitively chase after beach balls.
  arts: Jacob Russell, a 1‑year‑old with an affection for bright music, dances to Disney’s "When You Wish Upon a Star", sings along with The Beatles’ "Yellow Submarine", enjoys Pixar’s "Toy Story" with
    wide‑eyed wonder, and experiments with finger paints, often smearing colors across the floor in enthusiastic, albeit messy, artistic sessions.
  travel: Jacob Russell, a 1‑year‑old who has already visited the family‑favorite Imperial Beach, spent a weekend at Legoland California, and enjoyed a magical day at Disneyland Resort, prefers car rides
    with window stickers and anticipates future trips to the San Diego Zoo and the Grand Canyon, balancing their love for exploration with the comfort of familiar routines.
  culinary: Jacob Russell, a 1‑year‑old who craves the sweet taste of mashed bananas and pureed sweet potatoes, delights in bite‑sized chicken nuggets and soft steamed broccoli florets, and is gradually
    introduced to mild salsa for a future palate adventure, often displaying a pick‑and‑choose attitude toward new foods while their parents gently encourage balanced meals.
  core: Jacob Russell is a curious, flexible 1‑year‑old who mixes playful competition with beach‑side adventures, bright toy experiments, and early exposure to saving habits through a cherished piggy bank.
background:
  cultural: Jacob is raised in a White, middle‑class family in Chula Vista, California. His upbringing reflects mainstream American cultural practices—celebrating holidays like birthdays, Halloween, and
