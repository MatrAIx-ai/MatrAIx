  career_goals: Jack aims to obtain the Certified Protection Professional (CPP) credential within the next two years and move into a supervisory role overseeing a team of surveillance officers at a regional
    casino. He plans to develop a mentorship program for junior guards, leveraging his knack for conversation and teaching. Long‑term, he envisions transitioning to a security‑consultancy practice focused
    on small‑to‑mid‑size gaming venues in Florida, allowing a more predictable schedule that helps him better manage stress while still sharing his expertise with the industry.
