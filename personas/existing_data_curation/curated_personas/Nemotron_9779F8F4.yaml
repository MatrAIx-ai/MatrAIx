personas:
  professional: Felix Lee, a budding junior inventor, channels curiosity and a love for drawing and LEGO into creating simple robotics projects and Scratch Jr. games, and they display an organized‑flexible
    workflow that balances meticulous building steps with spontaneous creative tweaks.
  sports: Felix Lee, an energetic member of the Parkside Panthers youth soccer team, spends weekend afternoons mastering dribbling drills and cheering for FC Barcelona, while they also enjoy pick‑up basketball
    games in the summer and maintain a habit of stretching after every match to keep their knees in shape.
  arts: Felix Lee, a lively participant in school theater productions and a frequent visitor to the city museum, spends free time sketching characters inspired by Van Gogh’s swirling skies and reproducing
    scenes from the graphic novels Amulet and Dog Man, while their playlist blends Kendrick Lamar’s beats with classic jazz from Miles Davis, shaping a vibrant artistic identity.
  travel: Felix Lee, whose travel style blends family‑planned road trips to nearby nature reserves like Redwood National Park with occasional overseas adventures such as a week‑long visit to Tokyo’s science
    museums, prefers itineraries that balance active wildlife hikes with hands‑on museum explorations, while they save allowance‑earned ‘travel jars’ for future trips to the Grand Canyon.
  culinary: Felix Lee, an enthusiastic junior chef, loves whipping up cheesy pizza with extra mozzarella and pepperoni at home, experimenting with fruit‑topped pancakes featuring banana slices and strawberry
    jam, and they also enjoy occasional sushi rolls with avocado and cucumber, though they often forget to clean up the kitchen afterward, revealing a love for flavor paired with a bit of messiness.
  core: Felix Lee blends an insatiable curiosity for building and storytelling with a habit of leaving LEGO bricks scattered across the living room, turning everyday spaces into impromptu creative workshops.
background:
  cultural: Felix is a Black American child raised in Saint Paul, Minnesota, in a family that celebrates African-American heritage through storytelling, music, and community events such as the St. Paul
    African American Festival and school Black History Month activities. His parents encourage reading books by Black authors, listening to a range of Black music, and participating in after-school programs
    like the Boys & Girls Club that emphasize arts and STEM for youth of color. The local Midwestern environment blends with his cultural pride, giving him a sense of belonging to both the vibrant Black
    community in the Twin Cities and the broader, diverse fabric of Minnesota.
