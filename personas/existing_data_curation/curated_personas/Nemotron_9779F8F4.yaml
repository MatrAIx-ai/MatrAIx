  career_goals: Felix enjoys dreaming about future careers; he imagines traveling to space as an astronaut, creating vibrant stories as an animator or illustrator, inventing helpful gadgets as an engineer,
    and one day guiding younger students as a teacher or community mentor, all while continuing to explore his love of science, art, and technology.
