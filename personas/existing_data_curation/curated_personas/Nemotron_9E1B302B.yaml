  career_goals: Haydee aims to secure a supervisory shift lead position within the next two years, leveraging her reliability and organizational strengths to oversee daily warehouse operations. She plans
    to obtain a Certified Forklift Operator credential and a safety officer certification, which will enable her to formalize training programs for new hires. Long‑term, she hopes to transition into a part‑time
    role that allows her to mentor younger workers while reducing physical strain, and eventually retire with a stable pension and the ability to support her extended family.
