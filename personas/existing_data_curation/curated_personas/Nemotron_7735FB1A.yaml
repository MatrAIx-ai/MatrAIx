  career_goals: Dominick’s imagination leads him to envision future careers that blend his love of art and discovery. He often says he wants to become an astronaut who sketches the stars, a comic‑book illustrator
    who creates heroes, or a wildlife photographer who captures animals in the city’s parks. He likes the idea of exploring new worlds, whether in space or on paper, and he aspires to be recognized for
    his creative ideas. Though still young, his competitive streak drives him to aim for top spots in school art shows and science fairs.
