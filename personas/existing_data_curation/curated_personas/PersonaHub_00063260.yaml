persona_description: A chemist with a background in materials science and nanotechnology, particularly interested in the design and fabrication of plasmonic metamaterials for sensing, nanophotonics, and
  photocatalysis. They have expertise in the study of self-assembly processes, particularly in the formation of large-scale supercrystals of highly uniform polyhedral nanocrystals. Their research focuses
  on controlling the packing and ordering of these nanocrystals to achieve desired optical properties. They have a keen interest in using sedimentation-based techniques to control the superlattice dimensions
  of the supercrystals.
