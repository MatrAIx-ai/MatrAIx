  career_goals: Elizabeth aims to advance to an Office Manager or Operations Coordinator role where she can lead a small administrative team, refine office processes, and mentor new staff. She plans to
    obtain the Certified Administrative Professional (CAP) credential to formalize her expertise. Over the next five years, she hopes to spearhead efficiency initiatives that reduce operational costs and
    enhance workflow consistency, while also preparing a comprehensive handover plan for a smooth transition into a semi‑retired advisory position later in her career.
