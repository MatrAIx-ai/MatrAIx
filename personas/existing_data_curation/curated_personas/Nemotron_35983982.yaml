  career_goals: Even at seven, Alex is already thinking about future jobs that involve clear structures and tangible results. He frequently talks about becoming a civil engineer or architect, fascinated
    by the way buildings are planned and built. Space exploration captures his imagination too, and he dreams of one day working as an astronaut. His competitive streak also fuels an interest in becoming
    a professional chess player, while his desire to help his community leads him to consider roles like firefighter or police officer, where routines and responsibility are central.
