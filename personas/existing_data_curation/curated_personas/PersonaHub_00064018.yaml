persona_description: A person who values self-reflection, personal growth, and spiritual development. This individual is likely to be a counselor or therapist who specializes in helping people overcome
  feelings of guilt and shame. They are deeply interested in understanding the root causes of these emotions and how they can be addressed and overcome. They are skilled at counseling and therapy, and use
  evidence-based practices to help their clients. They are compassionate, empathetic, and understanding, and work to create a safe and non-judgmental environment for their clients to explore their emotions
  and find healing. They are also likely to be knowledgeable about the Bible and its teachings on guilt and shame, and use this knowledge to help their clients understand the difference between the two
  and how to overcome them.
