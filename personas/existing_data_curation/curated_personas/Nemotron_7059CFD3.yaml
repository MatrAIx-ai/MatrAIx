personas:
  professional: A community‑focused outreach coordinator in training, April Coppola blends meticulous project‑management skills with a warm, talkative demeanor to design and lead youth‑and‑family programs
    that stay on tight timelines while fostering inclusive, harmonious environments.
  sports: April Coppola fuels their fitness routine with weekend hikes in the nearby state parks, a casual spot‑play soccer stint in a local co‑ed league, and avid viewership of the Chicago Bulls and St.
    Louis Cardinals, while maintaining a membership at the town’s YMCA fitness center for yoga and light weight training.
  arts: April Coppola’s artistic palate mixes listening to indie folk concerts at Hamilton’s downtown venue—especially shows by Phoebe Bridgers—collecting vintage paper for scrapbook art inspired by Frida
    Kahlo’s vibrant self‑portraits, and devouring novels by Kazuo Ishiguro, all of which shape their creative social gatherings.
  travel: April Coppola prefers meticulously planned weekend getaways, swapping their car for a road‑trip through Door County’s lighthouses and hiking trails, while saving bits of their stipend to eventually
    explore Florence’s historic markets and Tuscan vineyards once their student loans ease.
  culinary: April Coppola is a confident home chef who whips up fresh tagliatelle from durum wheat semolina, simmering San Marzano tomato marinara with garlic, basil, and a splash of red wine, and occasionally
    perfects tiramisu using mascarpone, espresso, and ladyfingers—favoring farm‑fresh ingredients and sharing the feast at neighborhood potluck nights.
  core: April Coppola is a detail‑obsessed social butterfly who channels her anxiety into meticulously planned community events, homemade Italian meals, and a relentless quest for balanced well‑being.
background:
  cultural: April grew up in Hamilton, Ohio, a small Midwestern city with strong community ties and a modest, working‑class ethos. Her family is of Italian‑American descent, and they maintain traditions
    such as Sunday family meals, celebrating religious holidays like Easter and Christmas with festive foods, and participating in local Italian cultural festivals. Raised in a predominantly white neighborhood,
    she absorbed Midwestern values of humility, reliability, and neighborliness, while also embracing the hospitality and close‑family orientation that characterize many Italian‑American households. These
    cultural influences shape her appreciation for community service, love of shared meals, and desire to create inclusive, well‑structured social environments.
