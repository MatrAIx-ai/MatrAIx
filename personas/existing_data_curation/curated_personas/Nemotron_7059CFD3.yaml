  career_goals: April aims to secure a role as a Community Outreach and Engagement Specialist for a nonprofit organization serving youth and families in the Midwest. She plans to complete her bachelor's
    degree in Communications or Nonprofit Management, followed by a certification in Project Management (CAPM) to reinforce her structured approach to program development. Her long‑term ambition is to design
    and lead sustainable, predictable community programs that promote social cohesion, while also integrating mental‑wellness resources to support individuals who, like herself, experience heightened stress
    and worry. She envisions advancing to a managerial position where she can mentor new staff and shape organizational policies that prioritize both efficiency and compassionate service.
