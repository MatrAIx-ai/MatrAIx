personas:
  professional: Jarvus Blount, a 19‑year‑old insurance sales associate, merges his analytical mindset with a bold visual style, using eye‑catching digital graphics to demystify auto and property policies
    while consistently surpassing sales targets and beginning a self‑taught digital marketing journey.
  sports: Jarvus Blount, a member of the McKinney Community Basketball League and the local Valorant squad "Lone Star Gambit", follows the Dallas Mavericks and Dallas Stars, dedicates weekend mornings to
    pickup basketball games and weekday evenings to sharpening his aim in competitive esports, balancing physical exertion with strategic gaming.
  arts: Jarvus Blount, an avid sketcher and street photographer, draws inspiration from local muralist Mike Garton and the bold lines of Basquiat, curates playlists featuring Kendrick Lamar, J Cole, and
    Miles Davis, and regularly performs digital illustrations at open‑mic nights at The Hub Café, where his art blends Southern hip‑hop aesthetics with speculative sci‑fi motifs.
  travel: Jarvus Blount, a budding traveler on a tight student budget, plans weekend road trips to Austin’s live‑music venues and New Orleans’ historic jazz districts while day‑dreaming about a spring backpacking
    adventure through Berlin’s street‑art corridors, balancing his love for cultural immersion with financial constraints.
  culinary: Jarvus Blount, a self‑taught home cook with moderate skill, delights in recreating soul‑food staples like smoked brisket with tangy BBQ glaze, collard greens simmered with smoked turkey, and
    sweet potato pie, while also experimenting with chipotle‑shrimp tacos and fresh‑basil pesto pasta, reflecting his bold palate and willingness to fuse traditional flavors with contemporary twists.
  core: Jarvus Blount, a 19‑year‑old insurance rookie who fuses art, basketball, and strategic gaming, channels his curiosity and competitive edge into eye‑catching client experiences, navigates a tight
    budget with disciplined investing, and balances proactive health monitoring with occasional late‑night gaming lapses.
background:
  cultural: Jarvus is a Black Texan whose upbringing in McKinney reflects a blend of Southern African‑American traditions and contemporary urban culture. Family gatherings often feature gospel music, soul
    food, and storytelling that emphasize resilience and community solidarity. He grew up attending a historically Black church, where the emphasis on service and mentorship shaped his volunteer work. The
    local Black community, while relatively small, is tightly knit, celebrating cultural events like Juneteenth parades and supporting local Black-owned businesses. Jarvus also resonates with the vibrant
    Southern hip‑hop scene, which informs his musical tastes and creative expression. This cultural tapestry nurtures his appreciation for both heritage and innovative ideas, guiding his personal and professional
    aspirations.
attributes:
  skills: '[''Insurance product knowledge (auto, property, personal liability)'', ''Customer relationship management (CRM) software proficiency'', ''Effective verbal communication'', ''Active listening'',
