    solving'']'
  hobbies: '[''Sketching and digital illustration'', ''Street photography'', ''Playing basketball at local courts'', ''Competitive online gaming (esports)'', ''Listening to and curating hip‑hop playlists'',
    ''Reading speculative fiction and tech journalism'', ''Participating in community art workshops'', ''Volunteer tutoring at the local youth center'']'
  career_goals: Jarvus aims to secure his Texas General Lines insurance license within the next year and become a top‑performing sales representative at his agency. He plans to pursue the Chartered Property
    Casualty Underwriter (CPCU) designation to deepen his industry expertise and eventually move into a supervisory or underwriting role. Long‑term, he dreams of opening his own boutique insurance agency
    that caters to niche markets, leveraging his artistic sensibility to craft distinctive branding and client experiences. He also hopes to complement his professional growth with a part‑time associate
    degree in business administration, keeping his options open for future entrepreneurship.
