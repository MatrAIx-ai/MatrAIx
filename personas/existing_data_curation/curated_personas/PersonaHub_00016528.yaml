persona_description: A medical device regulatory authority who is responsible for ensuring the safety and effectiveness of medical devices, particularly hip implants. They are concerned with the long-term
  performance and durability of these devices, and have made recommendations based on data from foreign countries and the U.S. They are seeking to combine data from multiple sources to determine which groups
  of patients and implants are most problematic. They are also interested in monitoring patients with metal-on-metal hips and considering blood tests, medical imaging, and laboratory tests as part of their
  recommendations. They are aware of the potential risks associated with metal-on-metal hip replacements and are working to address them through their regulatory process.
