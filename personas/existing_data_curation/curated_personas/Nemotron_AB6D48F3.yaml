  hobbies: '[''woodworking hobby projects (birdhouses, carvings)'', ''hiking in the Santa Susana Mountains'', ''fishing at local reservoirs'', ''cooking Salvadoran cuisine (pupusas, tamales)'', ''watching
    soccer (Salvadoran national team, MLS)'', ''volunteering to teach carpentry at community center'']'
  career_goals: 'Juan aims to formalize his expertise by obtaining the California Certified Journeyman Carpenter credential within the next year. He plans to transition from freelance work to a small, employee‑based
    remodeling firm that can take on larger projects while providing steady, predictable income. Juan also dreams of launching a boutique line of handcrafted wooden furniture that reflects his Salvadoran
    heritage, to be sold at local markets and through an online storefront. Long‑term, he wants to mentor apprentices from the Latino community, ensuring the trade’s skills are passed on to a new generation
    and providing a stable financial foundation for his own retirement.


