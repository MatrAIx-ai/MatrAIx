personas:
  professional: Juan Valencia is a seasoned carpenter with three decades of hands‑on experience in residential and light commercial construction, excelling in custom furniture design, high‑end cabinetry,
    and full‑home remodels, and brings his competitive, direct communication style and meticulous project planning to negotiate contracts and keep projects on schedule and budget.
  sports: Juan Valencia stays active by hiking the Santa Susana Trails, casting a line at local reservoirs on weekends, and cheering for the LA Galaxy and LAFC in MLS while never missing a match of his
    home‑country’s national soccer team, blending his love of outdoor fitness with a competitive spirit for the beautiful game.
  arts: Juan Valencia channels his creative side through intricate wood carving inspired by the folk motifs of artists like Diego Rivera and the melodic storytelling of singer‑songwriter Carlos Vives, while
    also indulging in classic cinema from directors such as Pedro Almodóvar and listening to the smooth blues of B.B. King during evenings in his workshop.
  travel: Juan Valencia plans trips with the same structured checklist he uses for remodels, favoring weekend getaways to the coastal towns of Big Bear Lake and the historic streets of Oaxaca, while dreaming
    of a longer pilgrimage to the ancient ruins of Tikal, balancing his love of nature with family obligations and a modest travel budget.
  culinary: Juan Valencia excels at cooking traditional dishes such as pupusas, tamales, and yuca frita, carefully selecting fresh corn masa, queso fresco, and plantains, and pairs his meals with homemade
    salsa verde and a side of freshly brewed black coffee, often sharing recipes and the finished plates with friends at his workshop gatherings.
  core: Juan Valencia blends a disciplined, competitive work ethic with a love for handcrafted art, outdoor solitude, and family‑centered cooking, all while juggling a pragmatic approach to finances and
    a habit of occasionally skipping recommended stretch routines.
background:
  cultural: Juan is a first‑generation Salvadoran American who grew up in a close‑knit immigrant community in Southern California. He is fluent in Spanish and maintains strong ties to Salvadoran traditions,
    including Catholic observances, celebrating Independence Day, and participating in neighborhood festivals that feature música tropical and traditional dance. His cultural heritage influences his aesthetic
    choices—he often incorporates warm wood tones and subtle folkloric motifs into his furniture designs. Juan values hard work, family loyalty, and communal support, traits that guide both his professional
    ethos and his involvement in local Latino organizations.
attributes:
  skills: '[''custom furniture design'', ''high‑end cabinetry installation'', ''structural framing'', ''blueprint interpretation'', ''material estimation and budgeting'', ''tool maintenance and workshop
