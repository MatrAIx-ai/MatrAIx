    ''Gentle Yoga'', ''Meditation'', ''Local History Research'', ''Cooking Seasonal Meals'']'
  career_goals: Angela aims to advance into a senior portfolio manager role that emphasizes sustainable investment strategies, while mentoring the next generation of analysts. She plans to develop a community‑focused
    financial literacy program in Boonville and, eventually, transition to a consulting position that offers greater flexibility and reduced daily stress, allowing her to balance professional impact with
    personal well‑being.
