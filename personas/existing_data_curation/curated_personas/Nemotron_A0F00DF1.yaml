personas:
  professional: Altagracia Rodriguezarroyo, an environmental engineer with a pragmatic streak, leads climate‑adaptation projects for Connecticut’s coastal towns, blending cutting‑edge GIS and climate‑modeling
    tools with cost‑effective stormwater designs while they rally bilingual stakeholder groups.
  sports: Altagracia Rodriguezarroyo hikes the Long Island Sound shoreline with the Coastal Trail Club, practices yoga three times a week, and dances salsa at weekly local Latin nights, while they cheer
    on the Hartford Yard Goats and the New England Patriots during baseball and football seasons.
  arts: Altagracia Rodriguezarroyo captures Connecticut’s fall foliage and winter snows through photography inspired by Ansel Adams, enjoys reading Margaret Atwood’s sci‑fi novels, and unwinds listening
    to classic salsa tracks by Celia Cruz, all of which they weave into their creative approach to environmental storytelling.
  travel: Altagracia Rodriguezarroyo favors a blend of nature and culture, planning weekend getaways to the Hudson Valley’s vineyards, annual visits to a Caribbean island to reconnect with family roots,
    and occasional trips to Barcelona’s coastal architecture, balancing careful budgeting with spontaneous detours for local festivals while they keep a travel journal of sketches.
  culinary: Altagracia Rodriguezarroyo excels at preparing traditional island rice and beans cooked with sofrito, plantains battered and fried, and slow‑roasted pork marinated in achiote and citrus, often
    pairing these dishes with fresh garden herbs like cilantro and epazote harvested from their native‑plant garden, and they love sharing these meals with friends at communal gatherings.
  core: Altagracia Rodriguezarroyo is a data‑driven environmental engineer who balances meticulous project planning with spontaneous salsa nights, garden experiments, and a habit of over‑monitoring every
    budget line, and they never pass up a chance to photograph a sunrise.
background:
  cultural: Altagracia is a first‑generation American of Puerto Rican heritage. Raised in a bilingual household, she grew up with Caribbean rhythms, storytelling, and a strong emphasis on family and community.
    In New England, she stays connected to the vibrant Puerto Rican diaspora through local cultural organizations, festive celebrations like Noche de San Juan, and by sharing traditional foods and music.
    Her cultural identity informs her collaborative yet competitive spirit, fostering a deep commitment to community‑focused environmental stewardship and a nuanced appreciation for diverse perspectives.
attributes:
  skills: '[''Environmental Impact Assessment'', ''Stormwater Management'', ''Coastal Resilience Design'', ''GIS Mapping (ArcGIS, QGIS)'', ''Data Analysis (Python, R)'', ''AutoCAD'', ''Regulatory Compliance
    (EPA, CT DEEP)'', ''Project Management'', ''Technical Writing'', ''Bilingual Communication (Spanish/English)'', ''Community Outreach'', ''Sustainability Planning'']'
  hobbies: '[''Hiking along the Long Island Sound shoreline'', ''Salsa dancing'', ''Cooking Puerto Rican cuisine'', ''Native‑plant gardening'', ''Birdwatching'', ''Reading environmental science and sci‑fi
    literature'', ''Landscape photography'', ''Yoga'', ''Volunteer beach clean‑ups'', ''Participating in Puerto Rican cultural festivals'']'
  career_goals: Altagracia aims to obtain her Professional Engineer (PE) license and advance to a senior leadership role where she can shape climate‑adaptation policy for Connecticut’s coastal communities.
    She aspires to lead large‑scale sustainability projects, mentor emerging engineers, and eventually launch a consultancy that integrates innovative green technologies with environmental justice initiatives.
    Her competitive drive pushes her to pursue professional engineering awards and contribute to industry standards that balance ecological protection with economic feasibility.
