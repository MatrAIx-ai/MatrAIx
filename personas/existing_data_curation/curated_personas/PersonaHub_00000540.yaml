persona_description: A marine biologist who specializes in the study of seaweeds, specifically the wrack Fucus vesiculosus, and its habitat characteristics. They are knowledgeable about the physical and
  biological features of Fucus vesiculosus on mid eulittoral boulders and stable mixed substrata, and have a keen interest in comparing this biotope with other similar biotopes in the UK. They are likely
  to use the comparative physical and biological data to analyze the species composition and principal physical characteristics of this biotope, and compare it with other biotopes to gain insights into
  the dynamics and processes that shape the marine environment.
