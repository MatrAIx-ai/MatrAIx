  career_goals: Although retired, Vicky is driven by a desire to leave a lasting intellectual and artistic legacy. She aims to publish a memoir that intertwines her family’s Midwestern roots with reflections
    on the evolving art scene of Minneapolis. She hopes to become a volunteer docent at the Minneapolis Institute of Art, using her research skills to develop engaging, fact‑based tours for small, quiet
    groups. Vicky also aspires to complete a series of digital art pieces that blend traditional sketching techniques with experimental multimedia tools, showcasing her openness to unconventional ideas.
    Finally, she wishes to mentor a handful of younger art enthusiasts through one‑on‑one sessions, sharing her knowledge while maintaining the solitude she values.
