personas:
  professional: Cleveland Sheridan, a three‑year‑old tinkerer, spends afternoons building elaborate block forts and pretends to draw blueprints for houses, showcasing an early blend of organized planning
    and imaginative flexibility that hints at a future in design.
  sports: Cleveland Sheridan, a three‑year‑old who loves sprinting across the community playground, attends the ‘Little Explorers Soccer Club’ practice on Tuesdays, and watches the Chicago Cubs and Los
    Angeles Lakers on TV, displaying a budding enthusiasm for both soccer and professional baseball and basketball.
  arts: Cleveland Sheridan, a three‑year‑old who sings along to Raffi’s Baby Beluga and draws vivid scenes inspired by Mo Willems’ books, treats art as a joyful adventure that fuels their curiosity and
    love for bright colors.
  travel: Cleveland Sheridan, a three‑year‑old who has delighted in a sandy beach day in Florida, a magical visit to Disney World, and weekend picnics at a nearby nature reserve, prefers short, structured
    trips with familiar snacks and a comforting routine.
  culinary: Cleveland Sheridan, a three‑year‑old who eagerly stirs banana pancake batter, savors creamy mac and cheese, adores soft avocado mash, and always asks for extra strawberry slices on their yogurt,
    while proudly presenting each bite to a parent.
  core: Cleveland Sheridan, a three‑year‑old curious explorer who balances bright imagination with frequent worries, finds joy in block castles, humming Raffi songs, and clutching a pink piggy bank, yet
    often pauses to soothe their own stress.
background:
  cultural: Cleveland grows up in Daytona Beach, Florida, within a white family that embraces the relaxed coastal lifestyle of the Atlantic coast. Family traditions include Sunday picnics on the beach,
    attending local festivals like Daytona Beach Bike Week, and celebrating holidays with Southern hospitality. The multicultural environment of Volusia County exposes her to diverse neighborhoods, but
    her immediate cultural influence is the beach‑centric recreation, warm weather, and the community's emphasis on friendliness and togetherness. Her parents emphasize kindness, cooperation, and respect
    for nature, shaping her worldview.
