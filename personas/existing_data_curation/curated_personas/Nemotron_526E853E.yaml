  career_goals: Mitra aims to pursue a health‑focused career that lets her combine her love for people with practical problem‑solving. She plans to enroll in a pre‑nursing program at a nearby community
    college after high school, then earn a nursing degree to become a registered nurse. Over the long term, she hopes to specialize in pediatric or community health nursing, allowing her to support the
    wellbeing of children and families in her hometown and rural surrounding areas.
