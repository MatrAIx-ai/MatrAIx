personas:
  professional: Mitra Petti, a high school student with a flair for leadership, combines her strong communication skills, soccer teamwork, and theater experience to excel in group projects, while already
    dreaming of a future as a community health nurse who can blend practical problem‑solving with compassionate care.
  sports: Mitra Petti, the forward on her high school soccer team and avid supporter of the Iowa Hawkeyes, spends Saturdays chasing the ball on the field, joins a weekend hiking club exploring the Cedar
    River trail, and stays fit through spontaneous pickup games, embodying her energetic and sociable personality.
  arts: Mitra Petti, a member of the community theater troupe who adores the works of Lin‑Manuel Miranda and the charisma of Taylor Swift, regularly writes and performs short TikTok sketches that blend
    humor with DIY tips, while also soaking up classic movies like 'The Sound of Music' for inspiration.
  travel: Mitra Petti, who loves road‑trip spontaneity, often spends long weekends driving to nearby Cedar Rapids for concerts, has already visited Chicago’s Museum of Science and Industry, dreams of backpacking
    through Yellowstone National Park, and prefers low‑budget, adventure‑focused travel over meticulously planned itineraries.
  culinary: Mitra Petti, an avid baker who whips up vanilla cupcakes topped with salted caramel drizzle for friends, enjoys cooking farm‑fresh roasted corn and kale salads, and experiments with bright food
    coloring and edible glitter in her homemade jewelry‑themed desserts, reflecting her hands‑on creativity.
  core: Mitra Petti is a curiosity‑driven, spontaneous teen who blends a love for teamwork, DIY creativity, and a future in nursing, even as they wrestle with occasional procrastination and impulsive splurges
    on glitter.
background:
  cultural: Mitra was raised in Waterloo, Iowa, a modest Midwestern town where community ties and agricultural roots shape daily life. The local culture emphasizes friendliness, self‑reliance, and involvement
    in school and church activities. Family gatherings often feature home‑cooked meals and backyard games, and seasonal events like the Black Hawk County Fair reinforce a sense of shared heritage. This
    environment has nurtured her sociable, cooperative nature and her practical approach to challenges.
attributes:
  skills: '[''Interpersonal communication'', ''Team collaboration'', ''Adaptability'', ''Basic digital media editing'', ''Event planning'', ''Gardening'', ''Problem solving'']'
