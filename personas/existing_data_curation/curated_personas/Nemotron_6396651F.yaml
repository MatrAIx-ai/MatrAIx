  career_goals: Brion aims to move from a hands‑on machinist to a shop floor supervisor within the next two years, using his business education to manage production schedules, improve efficiency, and mentor
    junior technicians. In the longer term, he dreams of opening a small‑scale custom machining shop that blends traditional machining with modern digital fabrication, offering prototype services to local
    entrepreneurs. He also plans to earn a CNC programmer certification and become a certified Lean Six Sigma Green Belt to lead continuous‑improvement initiatives.
