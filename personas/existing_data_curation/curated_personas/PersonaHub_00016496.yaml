persona_description: A teacher who is passionate about keeping their students engaged with their learning and is looking for ways to motivate them. They are familiar with the SMART goals acronym and use
  measurable targets to help students achieve specific outcomes. They also enjoy using variety in their tasks to keep things interesting and engaging. They are interested in the idea of closure and completion
  and how it can be used to enhance their classes. They are open to adapting tasks from their course book or their own ideas and observe their students to see who is motivated by reaching targets.
