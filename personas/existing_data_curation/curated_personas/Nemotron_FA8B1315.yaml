personas:
  professional: Gloria Velez is a budding science enthusiast and community volunteer who leverages their curiosity, meticulous organization, and compassion to design simple experiments at home, assist with
    library storytime events, and mentor younger classmates in project planning.
  sports: Gloria Velez plays forward for the El Paso Youth Soccer Association’s U‑12 team, follows El Paso Locomotive FC and the Dallas Cowboys for inspiration, and they balance weekly practices with weekend
    hikes on the Franklin Mountains, maintaining a disciplined yet playful approach to fitness.
  arts: Gloria Velez immerses themselves in bright watercolor sketches inspired by Frida Kahlo’s vivid palette, they create digital collages that echo Diego Rivera’s mural storytelling, and they sing classic
    rancheras by Vicente Fernández and pop hits from Selena during family gatherings, channeling both traditional and contemporary influences into their artistic identity.
  travel: Gloria Velez loves planning weekend family trips that blend adventure and culture, they eagerly revisit the Grand Canyon’s rim and dream of a future vacation to Mexico City’s bustling markets,
    while balancing a modest allowance that limits spontaneous travel beyond school‑field trips to nearby state parks.
  culinary: Gloria Velez enjoys helping their parents prepare guacamole, hand‑pressed corn tortillas, and savory tamales seasoned with chipotle and cilantro, they show budding kitchen confidence while occasionally
    sneaking extra mango slices into salsa for a sweet twist.
  core: Gloria Velez is a bright‑eyed, organized explorer who balances rigorous school projects, soccer drills, and art experiments, yet often loses track of time when sketching wildlife, and occasionally
    forgets to bring their inhaler to the field.
background:
  cultural: 'Gloria was born and raised in El Paso, Texas, a bustling border city where Mexican and American cultures intertwine daily. Her family maintains strong Mexican traditions: they speak Spanish
    at home, celebrate Día de los Muertos with colorful altars, enjoy Cinco de Mayo festivities, and gather for family fiestas with music, dance, and homemade comida like tamales and enchiladas. She grew
    up surrounded by Mexican folk art, such as papel picado and Talavera ceramics, which inspire her own artistic projects. Attending a bilingual public school, she experiences a curriculum that values
    both English and Spanish, reinforcing her dual‑language identity. Community values of cooperation, respect for elders, and helping neighbors are emphasized in her household, reflecting the collectivist
    heritage of Mexican culture. Her Catholic upbringing includes attending church events, which further shapes her sense of community and service. The vibrant mix of border life, family customs, and bicultural
    education gives Gloria a unique perspective that she proudly carries into her studies, hobbies, and future ambitions.'
attributes:
  skills: '["Bilingual communication (English/Spanish)", "Reading comprehension", "Mathematics problem‑solving", "Basic coding with Scratch", "Organizational planning and time management", "Drawing and
