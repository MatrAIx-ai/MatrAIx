  hobbies: '["Reading adventure and mystery novels", "Drawing and painting with folk art themes", "Playing soccer in a youth league", "Singing traditional Mexican songs", "Conducting simple science experiments",
    "Volunteering at the library for storytime", "Cooking Mexican dishes with family", "Collecting stamps from various countries", "Creating digital art on a tablet", "Hiking and nature observation with
    sketching"]'
  career_goals: Gloria dreams of turning her love for learning, art, and helping others into a career that enriches her community. In the short term, she hopes to become a student leader who organizes art‑focused
    clubs and bilingual tutoring sessions at her middle school. Looking ahead, she envisions studying to become an elementary school teacher who incorporates creative projects and cultural heritage into
    the curriculum, especially for bilingual students. She is also intrigued by the possibility of creating youth art programs through a nonprofit organization, giving under‑privileged children access to
    expressive outlets. While she is open to exploring fields like pediatric nursing or community health work because of her compassionate drive, her primary ambition remains to blend education, art, and
    cultural celebration to foster curiosity and empathy in the next generation.
