  career_goals: Andres dreams of becoming someone who can blend imagination with real‑world impact. He talks about wanting to be an astronaut who designs rockets, an engineer who creates eco‑friendly toys,
    or a teacher who helps other children learn to read. He also imagines helping his family’s community by sharing Mexican recipes in a cooking class or organizing a neighborhood clean‑up. These goals
    reflect his curiosity about science, his practical desire to help, and his caring nature.
