personas:
  professional: Andres Flores is a budding LEGO architect who spends hours designing intricate brick structures, channeling their curiosity into creative problem‑solving while their relaxed, slightly disorganized
    approach means the floor is often littered with scattered pieces, yet their cooperative nature shines when they invite friends to help build.
  sports: Andres Flores is a spirited member of the Sunset Park Kids Soccer Club, idolizing the Los Angeles Galaxy and cheering for them during televised matches, while also enjoying watching the local
    ducks at the pond, and they sometimes skip practice to explore the water’s edge, balancing team drills with spontaneous nature breaks.
  arts: Andres Flores expresses a vivid imagination through drawing colorful pictures of space rockets, jungle animals, and folklore heroes, often humming along to traditional mariachi tunes while they
    color, and they adore watching animations by Pixar such as 'Toy Story' and listening to the music of child‑friendly singer Luis Fonsi, which fuels both their artistic style and love of rhythm.
  travel: Andres Flores loves family road trips to the nearby desert state park where they can spot cacti and stargaze, dreams of visiting the Kennedy Space Center in Florida to see rockets up close, and
    enjoys quick weekend visits to grandparents’ house in a small town, balancing the excitement of adventure with the comfort of familiar routines and the necessity of parental planning.
  culinary: Andres Flores enjoys helping in the kitchen, mastering the art of assembling soft corn tacos with shredded chicken, cheese, and fresh pico de gallo, as well as flipping banana‑flavored pancakes,
    preferring mild spices and avocado slices, yet they sometimes get distracted and spill flour across the counter, turning cooking into a messy but joyful learning experience.
  core: Andres Flores is a curious, easy‑going LEGO builder who mixes boundless imagination with a laid‑back habit of leaving bricks everywhere, making friends fast but often forgetting to tidy up before
    bedtime.
background:
  cultural: Andres is a first‑generation Mexican‑American raised in a bilingual home in Minneapolis. His parents speak Spanish at home and teach him Mexican traditions such as Día de los Muertos, Cinco
    de Mayo, and family gatherings centered around shared meals of tacos, tamales, and pozole. He attends a local Mexican community center where he learns folk dances and hears stories from older relatives.
    This cultural upbringing fosters his love for family, harmony, and community service, and it gives him a rich bilingual foundation that he proudly shares with friends and teachers.
