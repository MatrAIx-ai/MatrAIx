  career_goals: Ian aims to earn his architectural licensure within the next two years and become a LEED Accredited Professional. He envisions leading multidisciplinary design teams on community‑focused
    projects, such as affordable housing and revitalization of public spaces in Marion and surrounding areas. Ultimately, he hopes to establish his own boutique firm that integrates parametric design and
    sustainable practices, while fostering a supportive workplace culture that prioritizes mental well‑being. He also aspires to mentor junior architects, sharing both his technical expertise and strategies
    for managing stress in a high‑pressure profession.
