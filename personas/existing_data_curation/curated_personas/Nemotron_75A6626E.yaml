  hobbies: '[''Visiting art museums and galleries'', ''Attending theatre and concert performances'', ''Reading contemporary literature and philosophy'', ''Writing poetry and memoirs'', ''Cooking traditional
    Mexican cuisine'', ''Gardening on her balcony'', ''Volunteering at local community arts programs'', ''Exploring New York neighborhoods on foot'', ''Learning digital photography'', ''Participating in
    cultural festivals (e.g., Día de los Muertos)'']'
  career_goals: Although retired from formal employment, Yesenia aims to leave a lasting intellectual legacy by completing a memoir that chronicles the contributions of Mexican-American artists in New York.
    She aspires to establish a modest scholarship fund for senior citizens pursuing arts education and to create a community archive that preserves oral histories of local artists. Continuing to volunteer
    as a guest curator and mentor, she seeks to influence museum programming toward greater inclusion of multicultural perspectives while maintaining her personal growth through lifelong learning.
