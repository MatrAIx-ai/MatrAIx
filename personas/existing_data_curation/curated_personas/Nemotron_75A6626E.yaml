personas:
  professional: Yesenia Li, an 87‑year‑old retired art historian and community museum curator, combines meticulous project‑management, bilingual fluency, and a competitively driven passion for inclusive
    programming to design scholarly exhibitions, mentor emerging artists, and secure grant funding while balancing solitary research with volunteer lecturing, and they approach each task with methodical
    precision.
  sports: Yesenia Li, an 87‑year‑old avid walker, participates in a weekly senior walking club through diverse New York neighborhoods, attends free sunrise yoga classes at Riverside Park, follows the New
    York Yankees and New York Knicks on television, and they occasionally join a community Tai Chi group to maintain flexibility.
  arts: Yesenia Li, an 87‑year‑old passionate advocate of modern art, spends their days reading critiques on Frida Kahlo, Diego Rivera, and Jackson Pollock, curating community exhibitions at the local museum,
    delivering public lectures at the Metropolitan Museum of Art and MoMA, photographing street murals with their digital camera, and they compose poetry inspired by the performances at Lincoln Center.
  travel: Yesenia Li, an 87‑year‑old meticulous traveler, prefers short, well‑planned trips that blend cultural immersion and family visits, such as weekend walks through Harlem’s historic galleries, annual
    journeys to Mexico City for Día de los Muertos celebrations, and occasional pilgrimages to Santa Fe’s art festivals, and they always book senior‑friendly accommodations in advance.
  culinary: Yesenia Li, an 87‑year‑old skilled home cook, delights in preparing traditional Mexican dishes like mole poblano, pozole, and tamales using fresh cilantro, epazote, and oregano harvested from
    their balcony garden, and they enjoy hosting intimate dinners where they pair their meals with artisanal mezcal and lively storytelling.
  core: Yesenia Li, an 87‑year‑old curatorial veteran with a competitive edge, balances precise organization and skeptical discernment with a lifelong love for art, garden herbs, and Mexican culinary rituals,
    even as they occasionally forget to floss.
background:
  cultural: Yesenia is a first‑generation Mexican‑American whose parents immigrated to the United States in the early 20th century. Raised in a bilingual household, she grew up celebrating Mexican holidays
    such as Día de los Muertos and Semana Santa while simultaneously absorbing the vibrant, multicultural environment of New York City. Her cultural identity intertwines Mexican folk art, music, and culinary
    traditions with a deep appreciation for the diverse artistic expressions found in her adopted city. She often incorporates Mexican motifs and narratives into her curatorial work, fostering cross‑cultural
    dialogue and enriching the local arts community.
