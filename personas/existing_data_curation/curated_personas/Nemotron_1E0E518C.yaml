personas:
  professional: Alba Espinoza, an eight‑year‑old aspiring detective and LEGO master, leverages their methodical love for puzzles and strict routine to organize clues, plan elaborate builds, and outperform
    peers in mystery club challenges, while their competitive streak and occasional worry about making mistakes keep them constantly double‑checking every detail.
  sports: Alba Espinoza, a forward on the River Rangers U8 soccer team, trains twice a week, follows a meticulously drawn practice schedule, thrives on competition in weekend league matches against the
    Hilltop Hawks, and idolizes the tactical play of Lionel Messi while cheering for the local Major League Soccer club, the Seattle Sounders, in the occasional family viewing night.
  arts: Alba Espinoza, a piano enthusiast who practices "Für Elise" and "Clair de Lune" a few times weekly, sketches mystery‑themed comic panels inspired by Tove Jansson’s Moomin, swaps dance steps to Shakira’s
    "Waka Waka" at family gatherings, and spends leisurely afternoons drawing characters from Studio Ghibli films, merging structured musical study with imaginative visual art.
  travel: Alba Espinoza enjoys family road trips to the Grand Canyon and a summer camp at Lake Tahoe, dreams of visiting Paris’s Eiffel Tower, plans trips by creating colorful itinerary maps with stickers,
    balances the excitement of adventure with a need for predictable schedules, and prefers destinations where they can combine a short hike with a chance to solve a scavenger‑hunt mystery.
  culinary: Alba Espinoza delights in helping mash corn masa for homemade tamales, rolls cheese quesadillas with a sprinkle of cilantro, whips up a quick spaghetti carbonara with pancetta and parmesan,
    and tops off snack time with apple slices drizzled in honey, yet they often forget to clean up the kitchen counters, leaving crumbs for the family cat.
  core: Alba Espinoza is a meticulous eight‑year‑old puzzle‑solver whose love for structure fuels competitive soccer and LEGO building, but a streak of worry leads to nail‑biting and occasional over‑thinking
    of daily choices.
background:
  cultural: Alba comes from a Hispanic/Latino family with roots in Mexican and Central American traditions, now settled in the small town of Hohenwald, Tennessee. At home, Spanish and English are spoken
    interchangeably, and cultural celebrations such as Día de los Muertos, Cinco de Mayo, and family gatherings featuring traditional foods are important parts of her upbringing. She enjoys listening to
    Latin music, dancing to folkloric rhythms, and hearing stories that blend her family's Latin heritage with Southern Appalachian culture. This blend of influences fosters a strong sense of family, respect,
    and community warmth.
attributes:
  skills: '["Following daily routines", "Organizing personal items", "Reading comprehension", "Basic arithmetic", "Puzzle solving (jigsaw and LEGO)", "Attention to detail", "Basic soccer skills"]'
  hobbies: '["Reading mystery books", "Building LEGO sets", "Solving puzzles (jigsaw, brain teasers)", "Playing soccer", "Practicing piano", "Girl Scouts badge activities", "Family cooking (making tamales)",
    "Drawing and sketching"]'
  career_goals: Alba dreams of a career that combines her love of order with the chance to help others. She imagines becoming an architect who designs organized, functional spaces, or a veterinary technician
    who follows clear procedures to care for animals. She also hopes to win science fairs and eventually work as a biomedical engineer, valuing the clear steps and measurable outcomes the field provides.
    In the short term, she aims to be the top student in her class, earn a spot on the school science club, and lead her soccer team to a local tournament victory.
