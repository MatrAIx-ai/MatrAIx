persona_description: A historian specializing in the cultural history of early America, particularly focused on the literary and political writings of both loyalists and patriots during the American Revolution.
  They are interested in the dynamics of conflict and the role of literary forms in shaping political discourse, and how the experiences of loss and dissent among the Loyalist and patriot communities influenced
  the development of American political theory. They are likely to be a scholar or researcher with a deep knowledge of English literary culture, as well as an understanding of the complex social and political
  landscape of early America. They are interested in the intersection of literary theory and political history, and how the ideas and aesthetics of the past continue to shape contemporary debates and discussions.
