    plumbing integration", "Vendor negotiation", "Team leadership and mentoring"]'
  hobbies: '["Sketching architectural details", "Digital illustration (Procreate)", "Reading speculative fiction and philosophy", "Building miniature pipe network models", "Assembling vintage steam engine
    kits", "Playing acoustic guitar solo", "Industrial photography", "Collecting vintage brass plumbing fixtures", "Morning runs along the Hillsborough River", "Volunteering for community repair projects"]'
  career_goals: Michael aims to become a Master Pipefitter within the next five years, earning advanced certifications such as the Certified Plumbing Design Specialist. He plans to launch his own environmentally
    focused plumbing consultancy that designs high‑efficiency water systems for commercial and residential projects throughout Tampa. He envisions integrating smart‑home technology and artistic water installations
    into his work, creating functional pieces that also serve as public art. Additionally, Michael wants to contribute articles to trade journals, mentor apprentices from his community, and eventually expand
    his firm to provide green‑plumbing solutions for low‑income housing initiatives.
