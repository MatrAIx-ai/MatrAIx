personas:
  professional: Michael Teyebotchway is a 25‑year‑old pipefitting specialist who blends precise welding, CAD‑driven hydraulic design, and a methodical, solitary work ethic to deliver sustainable water‑system
    installations while dreaming of turning each project into a functional art piece.
  sports: Michael Teyebotchway begins each day with a solitary 5‑kilometre run along the Hillsborough River, enjoys occasional paddleboarding at Fort De Soto, and stays loyal to the Tampa Bay Buccaneers
    and Lightning while occasionally joining a local CrossFit box for strength training.
  arts: Michael Teyebotchway channels their love for water‑themed abstraction into digital illustrations inspired by James Turrell and Anish Kapoor, captures Tampa’s industrial scenery through black‑and‑white
    photography, strums acoustic renditions of Nick Drake on a vintage guitar, and curates a modest collection of reclaimed brass plumbing fixtures as tactile art objects.
  travel: Michael Teyebotchway meticulously plans trips that blend industrial heritage tours—such as the German Railway Museum in Stuttgart and the UK’s National Railway Museum—with water‑centric experiences
    like Iceland’s geysers and Japan’s onsen towns, while reserving weekend getaways to the Florida Keys for quiet reflection.
  culinary: Michael Teyebotchway favors fresh Gulf seafood, frequently prepares grilled grouper tacos with cilantro‑lime salsa, experiments with molecular gastronomy techniques like spherified lime pearls,
    and treats themselves to a perfectly brewed espresso after a long day of sketching.
  core: Michael Teyebotchway is a solitary, imagination‑driven pipefitter who fuses art and engineering, meticulously balances budgets, and quietly wrestles with back pain while never missing a sunrise
    run.
background:
  cultural: Michael grew up in Tampa's historic Seminole Heights area within a close‑knit African American family that values education, community service, and cultural heritage. His parents instilled a
    strong work ethic—his mother in healthcare and his father in construction—while celebrating traditions such as church gospel music, family reunions, and Southern cuisine like fried catfish and collard
    greens. He identifies with the broader African diaspora narrative, aware of his family's roots in the Great Migration from the rural South. Michael participates in local cultural events like Juneteenth
    celebrations and supports black‑owned businesses. He draws inspiration from the rhythm and blues and hip‑hop music that shaped his adolescence, and his appreciation for resilience and solidarity in
    his community informs both his personal values and professional aspirations.
attributes:
