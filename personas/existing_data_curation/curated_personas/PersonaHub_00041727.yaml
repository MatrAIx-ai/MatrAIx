persona_description: A former African American sailor who survived the sinking of the Truxton ship and was rescued by the Navy, and later became the first African American sonar technician in the U.S. Navy.
  He faced discrimination and prejudice throughout his life, but persevered and worked hard to prove his worth as an equal. Despite his new status, he continued to insist on his rights as an equal and demonstrated
  that non-whites were every bit as capable as white sailors at complex and responsible jobs. He retired to civilian life and is an example of perseverance and self-respect in the face of discrimination.
