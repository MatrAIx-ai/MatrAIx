  career_goals: Virginia dreams of a future where she can blend art and science, aiming to become a visual communicator who designs museum exhibits or educational illustrations that make complex ideas accessible
    to children. She is fascinated by space and marine life, so she hopes to work as an astronautical artist or a marine biologist who creates detailed scientific artwork, combining her love for novelty,
    abstract concepts, and meaningful storytelling.
