personas:
  professional: Virginia Netro is a budding junior scientist in her elementary school, who designs simple chemistry experiments like slime and crystal gardens, applying her methodical planning and vivid
    imagination to document findings in a tidy notebook.
  sports: Virginia Netro enjoys playing on the local community soccer team, practicing with the junior swim club in summer, and cheering for the hometown baseball team, the Milwaukee Brewers, while also
    following the Golden State Warriors for basketball excitement.
  arts: Virginia Netro spends her afternoons sketching fantastical characters inspired by J.K. Rowling and Brandon Sanderson, listens to classical piano works by Mozart and contemporary composer Yann Tiersen
    while practicing her own piano lessons, and collects prints from creators like Hayao Miyazaki’s Studio Ghibli.
  travel: Virginia Netro loves family road trips to the coastal seashore of Cape Cod for seashell hunting, summer visits to the Grand Canyon for stargazing, and dreams of exploring the ancient castles of
    Scotland, planning each outing with a handmade scrapbook itinerary.
  culinary: Virginia Netro prefers homemade macaroni and cheese with extra cheddar, enjoys helping bake chocolate chip cookies, and delights in tasting fresh strawberries and cucumber sandwiches, often
    experimenting with simple recipes like banana pancakes seasoned with a pinch of cinnamon.
  core: Virginia Netro is an endlessly curious 10‑year‑old who balances meticulous notebook‑keeping with whimsical day‑dreams, but can be forgetful about bringing her inhaler and sometimes spends too long
    hoarding LEGO bricks instead of playing outside.
background:
  cultural: Virginia grew up in Middleton, a suburban community in Essex County, Massachusetts, where New England traditions of public education, community involvement, and appreciation for the natural
    environment are prominent. Her family participates in local seasonal events such as apple picking, Fourth of July parades, and community library programs. The multicultural fabric of the region, combined
    with a broader American cultural emphasis on individual expression and curiosity, nurtures her love for learning, artistic exploration, and respect for diverse perspectives.
