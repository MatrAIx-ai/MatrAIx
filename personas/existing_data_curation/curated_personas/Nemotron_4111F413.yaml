  career_goals: Terilynn aims to transition into a supervisory role where she can shape department policies that prioritize patient comfort and staff well‑being. She hopes to obtain advanced certifications
    in CT and MRI to stay current with evolving technology, and to develop a mentorship program for new technologists. Long‑term, she envisions contributing to community health outreach by teaching radiation
    safety workshops at local senior centers and volunteering in low‑income clinics, while gradually reducing her clinical hours as she approaches retirement.
