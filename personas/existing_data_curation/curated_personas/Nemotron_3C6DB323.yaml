  career_goals: Although approaching typical retirement age, John aims to channel his experience into a supervisory role within his courier company. He seeks promotion to shift lead or logistics coordinator,
    where he can oversee scheduling, mentor new hires, and implement efficiency improvements. He plans to obtain a commercial driver’s license (CDL) and hazardous‑material handling certification to broaden
    his operational capabilities. In the longer term, John envisions transitioning to a part‑time logistics consultant for local small businesses, helping them set up reliable delivery networks while maintaining
    a steady, predictable routine. He also hopes to volunteer his driving skills for community programs that provide transportation to seniors and disabled residents.
