  hobbies: '[''Robotics club'', ''Chess'', ''Reading science fiction'', ''Bharatanatyam dance'', ''Playing the sitar'', ''Cooking traditional Indian dishes'', ''Hiking in local parks'', ''Digital illustration'',
    ''Volunteering at community events'']'
  career_goals: Sunita aspires to pursue a college degree in biomedical engineering or computer science, fields that blend her interest in practical problem solving with a desire to make tangible contributions
    to health and technology. She aims to secure scholarships that recognize her academic diligence and to intern at research labs or tech companies during high school summers. In the long term, she envisions
    developing medical devices or software that improve patient outcomes, while also mentoring younger students from under‑represented backgrounds in STEM. Balancing family expectations and personal ambition,
    she hopes to combine a respected professional career with community service initiatives in Cary.
