personas:
  professional: Sunita Menon, a budding robotics enthusiast, channels their love of order into designing and programming autonomous models for their school's robotics club, where meticulous planning and
    strategic mindset consistently earn them top placement in regional competitions.
  sports: Sunita Menon balances a love of the outdoors with fandom for the Charlotte Hornets and Charlotte FC, spending weekends hiking Umstead State Park, participating in the Cary Youth Chess Club as
    a mental sport, and joining a community Bharatanatyam troupe for fitness, though they sometimes skip warm‑ups before practice.
  arts: Sunita Menon immerses herself in creative expression by crafting digital sci‑fi illustrations inspired by Isaac Asimov, listening to the sitar virtuosity of Ravi Shankar and the cinematic scores
    of John Williams while painting, and attending weekend performances of classical dance that reinforce their cultural roots.
  travel: Sunita Menon dreams of a school exchange trip to Kyoto's historic temples while already cherishing family road trips to the Great Smoky Mountains for hiking and local cultural festivals, and they
    meticulously plan future travel itineraries using a spreadsheet that balances budget, academic calendar, and seasonal weather.
  culinary: Sunita Menon hones their cooking skills by mastering dishes like samosas, butter chicken, and masala chai, savoring fresh cilantro, garam masala, and turmeric, yet they often skip breakfast
    for a granola bar before rushing to robotics practice.
  core: Sunita Menon blends disciplined curiosity with a love for structured creativity, juggling robotics, chess, and Bharatanatyam while occasionally surrendering to late‑night gaming marathons.
background:
  cultural: 'Sunita comes from a South Asian (Indian) family that migrated to the United States when she was five. Her household blends Indian traditions with American life: Hindi is spoken at home alongside
    English, and celebrations like Diwali, Holi, and Navratri are observed with family gatherings, traditional foods, and cultural performances. The Menon family places a strong emphasis on education, respect
    for elders, and community involvement, values that shape Sunita’s disciplined approach to school and extracurricular activities. Living in Cary, North Carolina, she participates in a vibrant local Indian
    diaspora, attending weekend cultural school, volunteering at the nearby Hindu temple, and sharing her heritage with friends from diverse backgrounds.'
attributes:
  skills: '[''Organizational planning'', ''Time management'', ''Basic Python programming'', ''Data analysis with spreadsheets'', ''Mathematical problem solving'', ''Scientific lab techniques'', ''Team coordination'',
