  career_goals: Long aspires to earn a bachelor’s degree in psychology or social work and build a career in community mental‑health services. He aims to start as a youth counselor or community program coordinator,
    leveraging his sociable nature to create supportive environments for young adults, especially within the Asian American community. Over time, he hopes to lead a nonprofit organization that integrates
    technology and outreach to address mental‑health stigma and provide accessible resources. He also seeks to develop personal resilience and stress‑management strategies to sustain his compassion‑driven
    work.
