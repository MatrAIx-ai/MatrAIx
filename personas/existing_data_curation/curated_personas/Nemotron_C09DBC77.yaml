personas:
  professional: Michael Reigle, an aspiring young robotics engineer, combines their love of Python programming, Arduino tinkering, and strategic chess thinking to design functional LEGO robots, while their
    meticulous yet adaptable nature ensures they balance experimental trial-and-error with proven engineering principles.
  sports: Michael Reigle, a fan of the Washington Capitals and the Washington Wizards, participates in the Capitol Hill Youth Basketball league during the winter, enjoys occasional weekend runs along the
    Potomac River, and maintains a disciplined weekly routine of bodyweight exercises to stay mentally sharp for chess tournaments.
  arts: Michael Reigle, who devours the futuristic soundtracks of Hans Zimmer and the lyrical poetry of David Bowie, frequently attends the Smithsonian's American History Museum exhibits for inspiration,
    and curates a personal collection of sci‑fi graphic novels featuring artists like Moebius and H.R. Giger.
  travel: Michael Reigle, who has explored the National Mall's monuments and taken a school field trip to Philadelphia’s Independence Hall, dreams of visiting the Kennedy Space Center in Florida and the
    historic shipyards of Portsmouth, UK, favoring meticulously planned itineraries that include museum tours and local tech workshops.
  culinary: Michael Reigle, whose kitchen experiments orbit around building a homemade pepperoni pizza topped with fresh mozzarella, basil, and a dash of smoked paprika, also enjoys crafting protein‑packed
    hummus with olive oil and garlic, yet often forgets to eat breakfast before school.
  core: Michael Reigle, a calm and competitive 13‑year‑old with a relentless curiosity for technology, balances meticulous problem‑solving with occasional impulsive splurges on gadgets, while quietly charting
    a path toward a future as a robotics innovator.
background:
  cultural: Michael comes from a middle‑class white family with roots in the Mid‑Atlantic region. His parents work in public service and education, emphasizing the value of knowledge and civic responsibility.
    Growing up in Washington, DC, he has been immersed in the nation's historic and multicultural environment, frequenting museums, monuments, and community events. While his cultural practices align with
    mainstream American traditions—celebrating holidays like Thanksgiving, the Fourth of July, and participating in local school activities—he also appreciates the diverse perspectives present in the capital,
    which fuels his curiosity about other cultures.
