  career_goals: Michael aspires to attend a top university where he can major in computer science or engineering. He envisions a career that merges his love for technology with tangible impact—such as becoming
    a robotics engineer, a cybersecurity analyst, or an aerospace researcher. He aims to secure scholarships that recognize his competitive academic record, gain internships in research labs, and eventually
    contribute to projects that advance national technology initiatives. His long‑term ambition is to lead innovative teams that solve complex, real‑world problems while maintaining his calm, resilient
    approach to challenges.
