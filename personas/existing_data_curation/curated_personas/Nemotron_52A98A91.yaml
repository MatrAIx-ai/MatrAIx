  hobbies: '[''Contemporary Art Gallery Visits'', ''Experimental Theater Attendance'', ''Photography'', ''Ultimate Frisbee'', ''Chess'', ''Hiking (Torrey Pines)'', ''Guitar Playing'', ''Futurist & Design
