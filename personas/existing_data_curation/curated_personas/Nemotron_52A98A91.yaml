  career_goals: Francis aims to ascend to a senior executive role—such as Chief Operations Officer—where he can shape organization‑wide strategy and champion a culture of innovation. He plans to deepen
    expertise in digital workflow automation and sustainable operations, positioning himself as a thought leader who bridges efficiency with creative design. In the longer term, he envisions launching a
    boutique consulting firm that helps mid‑size companies integrate lean processes with user‑experience insights, leveraging his dual passion for operational excellence and artistic perspective. Throughout,
    he seeks opportunities to mentor emerging managers, fostering a competitive yet collaborative environment.
