  hobbies: '[''softball league'', ''coastal hiking'', ''live‑music festivals'', ''barbecuing'', ''cooking New England dishes'', ''DIY home improvement'', ''mystery‑novel book club'', ''volunteer fire department
    fundraisers'']'
  career_goals: Anne aims to translate her practical experience into a supervisory role within the next two years, targeting a shift‑lead position where she can implement efficiency improvements and coach
    a larger crew. Her longer‑term ambition is to become a warehouse manager overseeing regional distribution, driving cost‑reduction initiatives through technology adoption. To support these goals she
    plans to obtain OSHA forklift certification, a Certified Supply Chain Professional (CSCP) credential, and attend leadership workshops, leveraging her competitive drive to achieve measurable performance
    gains.
