personas:
  professional: Roselyn Toney, a seasoned janitor with over a decade of hands‑on experience in floor care, carpet cleaning, and basic building maintenance, leverages their meticulous organization, cooperative
    communication, and curiosity for sustainable practices to mentor new staff and streamline cleaning operations in Valparaiso facilities, and they consistently seek ways to improve efficiency.
  sports: Roselyn Toney enjoys low‑impact fitness through weekly nature walks along Lake Michigan’s shoreline and participates in a casual community volleyball league at their church, while cheering on
    the Chicago Cubs in summer, the Chicago Bears during football season, and the Chicago Blackhawks in winter, and they balance their love of teamwork with a preference for small‑group activities.
  arts: Roselyn Toney finds creative solace in crocheting intricate granny‑square blankets while listening to the folk storytelling of Joni Mitchell and the lyrical piano works of Ludovico Einaudi, and
    they often lose themselves in historical fiction novels by Philippa Gregory and Ken Follett, occasionally attending the local community theatre’s productions of classic plays.
  travel: Roselyn Toney favors short, budget‑friendly road trips that blend nature and history, having explored Door County’s lighthouses and Sleeping Bear Dunes, while dreaming of a solo pilgrimage to
    Bath’s Roman baths and a sustainable eco‑retreat in Costa Rica’s Monteverde cloud forest, and they meticulously plan each journey to fit their family duties and modest savings.
  culinary: Roselyn Toney enjoys cooking with the fresh produce from their garden, mastering vegetable lasagna, roasted beet salad with goat cheese, and hearty chicken pot pie, while their moderate cooking
    skill shines in weekend sourdough experiments and they often season dishes with basil, thyme, and rosemary, though they sometimes over‑rely on ready‑made frozen meals when overtime limits their kitchen
    time.
  core: Roselyn Toney is a quietly curious organizer who balances a love for sustainable cleaning and solitary crafts with occasional yarn‑shopping splurges and a tendency to over‑schedule their garden
    chores, and they often lose track of time when crocheting.
background:
  cultural: Roselyn grew up in a modest, middle‑class family in a small town in northern Indiana. Her upbringing reflects typical Midwestern values of hard work, courtesy, and community involvement. As
    a white Midwesterner, she embraces a strong sense of self‑reliance, respect for tradition, and an appreciation for the rhythms of small‑town life. Family traditions such as Sunday dinners, participation
    in the local church, and attending community events like the Porter County Fair have shaped her cooperative and considerate personality.
attributes:
  skills: '[''Floor care (sweeping, mopping, stripping, waxing)'', ''Carpet and upholstery cleaning'', ''Chemical safety and proper dilution'', ''Inventory management and supply ordering'', ''Cleaning equipment
    operation (floor scrubbers, pressure washers, steam cleaners)'', ''Basic building maintenance (light‑bulb replacement, filter changes, minor repairs)'', ''Hazardous material handling'', ''Eco‑friendly
    cleaning practices'', ''Documentation and record‑keeping of cleaning logs'', ''Interpersonal communication with tenants and staff'', ''Problem solving and troubleshooting'', ''Basic computer literacy
    (email, scheduling software)'', ''Training and mentorship of new staff'']'
  hobbies: '[''Reading historical fiction'', ''DIY home‑improvement projects'', ''Vegetable gardening'', ''Crocheting and knitting'', ''Crossword puzzles and Sudoku'', ''Nature walks by the lake'', ''Church
    small‑group activities'', ''Volunteering at the community food pantry'']'
  career_goals: Roselyn aims to progress into a supervisory or facilities‑management role within the next three to five years. She plans to earn a certified Facility Management credential and lead a team
    that adopts eco‑friendly cleaning protocols to reduce chemical waste and improve efficiency. Long‑term, she envisions launching her own small cleaning business that emphasizes sustainable practices
    while offering reliable service to families and local businesses, allowing her to balance career growth with her family responsibilities.
