    User 2: Oh, really? I''m a fan of the Los Angeles Lakers.

    User 1: Nice! The Lakers are a good team. I''m excited to see how they do this year.

    User 2: Me too. I think they have a good chance to make the playoffs.

    User 1: I hope so! I''d love to see them play in the finals.

