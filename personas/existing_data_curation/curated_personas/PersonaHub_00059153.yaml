persona_description: A healthcare professional who specializes in reproductive health and hormonal contraception. She is knowledgeable about the various types of hormonal contraception available, their
  effectiveness rates, and the potential risks and benefits associated with each method. She is also familiar with the mechanisms by which hormones regulate the menstrual cycle, and how they can be used
  to treat menstrual bleeding and acne. She is likely to be a healthcare provider who specializes in gynecology or obstetrics, and is knowledgeable about the use of hormonal contraception in treating abnormal
  menstrual bleeding and other gynecological conditions.
