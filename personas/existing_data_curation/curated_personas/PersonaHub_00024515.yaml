persona_description: A historian who is interested in the history of the British Army, particularly the East Anglian Division and the 162nd Brigade Workshop. They are knowledgeable about the history of
  the brigade, the formation and amalgamation of units, and the role of the brigade in the Great War. They have a particular interest in the Victoria Cross and the soldiers who won it while serving with
  the brigade. They are also interested in the history of the Bedfordshire and Hertfordshire Regiment and the formation of the 2nd Line.
