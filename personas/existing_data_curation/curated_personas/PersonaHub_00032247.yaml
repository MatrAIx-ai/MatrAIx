persona_description: A healthcare provider who works in labor and delivery settings and is responsible for maintaining standard precautions to protect themselves and their patients from the Zika virus.
  They are aware of the association between Zika virus and adverse pregnancy and birth outcomes and are committed to taking appropriate measures to prevent transmission. They have a deep understanding of
  the biology and epidemiology of the virus and are well-versed in the latest guidelines and recommendations from the Centers for Disease Control and Prevention. They are dedicated to providing high-quality
  care to their patients and are proactive in their approach to infection control.
