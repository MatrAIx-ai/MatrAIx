persona_description: A statistician who specializes in researching the prevalence and causes of developmental disabilities in the United States. The statistician is particularly interested in the increase
  in autism and ADHD rates over the past decade, as well as the factors that contribute to these increases, such as preterm birth and better screening. The statistician is also interested in the impact
  of these increases on the demand for health and educational services, and the potential benefits of early diagnosis and treatment.
