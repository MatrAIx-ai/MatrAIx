personas:
  professional: Craig Klein, a retired engineer with a STEM background, translates their systematic project planning, technical documentation expertise, and hands‑on DIY skills into mentoring STEM students,
    authoring a Pacific Northwest sustainable gardening guide, and preparing to lead a neighborhood emergency preparedness committee.
  sports: Craig Klein, an avid hiker and birdwatcher, pursues their weekly Riverside State Park treks with the Spokane Seniors Outdoor Club, attends a low‑impact yoga class each winter, and faithfully cheers
    on the Spokane Indians baseball team and the Seattle Seahawks football team on game days.
  arts: Craig Klein, a regular patron of Spokane’s community theater, admires the storytelling of August Wilson, studies the photographic composition of Ansel Adams, and enjoys listening to folk legends
    like John Denver while experimenting with their own black‑and‑white nature photography during weekend outings.
  travel: Craig Klein, an organized traveler, meticulously plans multi‑day trips to national parks such as Yellowstone, Glacier, and Grand Teton—capturing sunrise shots and reflective essays—while budgeting
    for modest lodgings and aiming to add Zion and Yosemite to their future itinerary, balancing adventure with comfortable, solo photography sessions.
  culinary: Craig Klein, a confident home cook, favors Pacific Northwest staples such as cedar‑plank salmon, foraged wild mushrooms, and huckleberry jam, often seasoning dishes with garden‑grown rosemary
    and thyme, yet occasionally over‑salts their mushroom risotto in pursuit of depth.
  core: Craig Klein, a methodical retiree, blends a passion for sustainable gardening, woodworking, and senior tech‑literacy teaching with a calm, resilient outlook that balances curiosity and practicality,
    though they occasionally forget to water their indoor succulents after a lengthy hike.
background:
  cultural: Craig was raised in Spokane, Washington, within a predominantly white, middle‑class family with German and Irish ancestry. The Pacific Northwest’s mix of urban development and abundant natural
    landscapes instilled in him a respect for the outdoors and a practical, self‑reliant ethos. Community values such as neighborly assistance, participation in local fairs, and a dedication to education
    shaped his worldview. While he acknowledges the region’s indigenous heritage, particularly the Spokane Tribe, he embraces a culturally inclusive approach, supporting local environmental stewardship
    initiatives and celebrating regional traditions like harvest festivals.
