  hobbies: '[''Hiking and Trail Exploration'', ''Birdwatching'', ''Nature Photography'', ''Native Plant Gardening'', ''Woodworking'', ''Reading (History, Science, Technology)'', ''DIY Electronics and Smart
    Home Projects'', ''Community Volunteering (Tech Literacy)'', ''Local Theater Attendance'', ''Travel to National Parks'']'
  career_goals: Although retired from formal employment, Craig is determined to remain active and purposeful. He aims to volunteer as a mentor for STEM students at the local community college, designing
    workshops that blend his curiosity for new technologies with practical, hands‑on projects. He plans to author a guide on sustainable gardening tailored to the Pacific Northwest climate, leveraging his
    methodical research approach. Craig also seeks to earn a certification in community emergency preparedness so he can lead a neighborhood safety committee, applying his organizational skills to benefit
    his Spokane community. Additionally, he hopes to travel to a series of national parks, documenting his observations through photography and reflective essays.
