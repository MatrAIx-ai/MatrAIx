personas:
  professional: Jose Rodriguez works as a hands-on electrician who combines solid wiring expertise and blueprint interpretation with a flair for artistic lighting, often charming clients with their talkative,
    collaborative approach while occasionally juggling tasks thanks to a relaxed, flexible attitude.
  sports: Jose Rodriguez spends weekends cycling the Bay Trail with the East Bay Bike Party, hanging out at skate sessions with the local crew 'Skate Bay', hiking the nearby hills with the Hillside Hiking
    Club, and cheering for the Golden State Warriors and San Francisco Giants while maintaining a laid-back fitness routine.
  arts: Jose Rodriguez frequently roams the Mission District galleries, sketches vibrant street murals inspired by Banksy and Diego Rivera, experiments with low-light photography an homage to James Turrell,
    and their love for live salsa nights fuels a deep appreciation for the rhythm of both sound and color.
  travel: Jose Rodriguez prefers spontaneous road trips, having already explored the redwoods of Big Sur, the vineyards of Napa, and a culinary pilgrimage to Oaxaca, while dreaming of a future solo bike
    tour through the Netherlands' tulip fields.
  culinary: Jose Rodriguez enjoys cooking traditional tacos al pastor and chiles rellenos, often adding a twist like kimchi salsa or quinoa stuffing, and they relish the bright flavors of chipotle, lime,
    and fresh cilantro while occasionally over-seasoning in their experimental kitchen experiments.
  core: Jose Rodriguez blends electric wiring skill with a vivid love of light and color, thrives on social buzz, grabs life with flexible spontaneity, and occasionally lets disorganization and late-night
    gaming derail their otherwise bright path.
background:
  cultural: Jose Manuel grew up in a bicultural Mexican‑American household, speaking Spanish at home and English at school. Family gatherings centered around celebrations like Día de los Muertos, quinceañeras,
    and Sunday tamales, instilling a deep appreciation for Mexican traditions, music, and cuisine. Living in Pittsburg, CA, he also embraces the diverse, multicultural vibe of the Bay Area, often participating
    in local Latino community events and volunteering at cultural festivals. His heritage shapes his worldview—he values community harmony, respects elders, and brings a vibrant, color‑rich aesthetic to
    his artistic pursuits, while his American upbringing fuels his curiosity about new ideas and unconventional career paths.
