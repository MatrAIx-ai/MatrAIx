  career_goals: Jose Manuel aims to earn his Master Electrician license within the next three years and become a certified solar installer. He hopes to merge his technical skills with his artistic curiosity
    by specializing in creative lighting design for residential and commercial spaces, eventually launching his own boutique electrical contracting firm that focuses on sustainable, visually striking installations.
    Short‑term, he plans to complete his associate’s degree in Electrical Engineering Technology, gain experience on large‑scale solar projects, and mentor junior apprentices. Long‑term, he envisions his
    business serving the Bay Area’s growing demand for green energy while also offering workshops that blend art, light, and technology.
