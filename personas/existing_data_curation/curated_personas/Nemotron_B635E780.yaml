  hobbies: '[''Reading speculative fiction'', ''Creative writing (poetry, short stories)'', ''Birdwatching'', ''Hiking and nature photography'', ''Experimental cooking'', ''Online strategy gaming (e.g.,
    chess, real-time strategy)'', ''DIY home projects and woodworking'', ''Small craft workshops'', ''Community garden participation'']'
  career_goals: Mary aims to translate her blend of curiosity and practicality into a career that offers flexibility and impact. She aspires to become a freelance environmental data analyst, providing remote
    research and reporting services to NGOs and small agricultural enterprises in the rural South. In the longer term, she hopes to launch a consulting venture that helps local farms adopt low-cost technology
    solutions such as sensor-based irrigation monitoring, while producing independent technical guides and articles that bridge scientific insight and everyday practice. Her ambitions are rooted in autonomy,
    competitive achievement, and the desire to make tangible improvements in her community without being constrained by rigid corporate hierarchies.
