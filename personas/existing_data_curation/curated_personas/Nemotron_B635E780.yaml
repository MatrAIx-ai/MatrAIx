personas:
  professional: Mary Dagher, a budding freelance environmental data analyst, leverages their field-based observation skills and proficiency in Python's pandas and Excel to turn raw ecosystem data into actionable
    reports, while their spontaneous, competitive nature pushes them to chase flexible project deadlines despite a natural resistance to rigid structures.
  sports: Mary Dagher spends weekends hiking with the Birmingham Hiking and Outdoors Club, logs bird sightings on eBird, and follows the Alabama Crimson Tide football and Birmingham Barons baseball teams,
    preferring low-impact cardio and strategic chess-based fitness challenges over high-intensity gym workouts.
  arts: Mary Dagher curates a personal anthology of speculative short stories inspired by N.K. Jemisin and Ted Chiang, writes haiku-style poetry while listening to Bon Iver and Phoebe Bridgers, and attends
    intimate indie film screenings by directors like Ava DuVernay, letting these creative currents shape their analytical worldview.
  travel: Mary Dagher favors solo weekend road trips to nearby natural retreats such as Shenandoah National Park and Asheville's Blue Ridge Mountains, while dreaming of a low-budget backpacking trek through
    the Scottish Highlands, meticulously planning each itinerary on spreadsheets and deliberately avoiding crowded tourist hotspots.
  culinary: Mary Dagher, an experimental home cook, frequently merges unconventional flavors like beet-infused quinoa with goat cheese and smoked paprika, perfects quick sautéed wild mushrooms with fresh
    thyme, and treats every dish as a data set to be logged, tweaked, and shared in their food blog.
  core: Mary Dagher is a calm yet fiercely competitive 22-year-old who turns solitary hikes, birdwatching, and strategic games into data-driven projects, obsessively organizing notes in spreadsheets while
    habitually procrastinating on deadlines.
background:
  cultural: Mary grew up in Woodland, a small town in Randolph County, Alabama, within a predominantly white, rural Southern community. Her upbringing emphasized self-reliance, close family ties, and a
    respect for the land, values that fostered her practical mindset. At the same time, the widespread availability of internet and digital media exposed her to broader cultural currents, encouraging curiosity
    about global ideas and technologies. This duality has shaped a cultural identity that blends traditional Southern modesty and community orientation with a modern, individualistic drive for knowledge
    and autonomy.
attributes:
  skills: '[''Self-directed research'', ''Data collection and organization'', ''Basic statistical analysis (Excel, Python pandas)'', ''Multimedia documentation (photography, video editing)'', ''Technical
