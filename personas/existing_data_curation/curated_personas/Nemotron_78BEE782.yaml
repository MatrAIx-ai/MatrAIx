  career_goals: George aims to secure an entry‑level position in data analytics or product development where he can apply his analytical and engineering skills within a well‑defined workflow. He seeks a
    role that offers clear career ladders, mentorship, and the opportunity to earn industry certifications (e.g., Lean Six Sigma Green Belt or AWS Cloud Practitioner). In the longer term, he aspires to
    become a project lead or technical specialist who can steer multidisciplinary teams, while maintaining a balanced schedule to manage his sensitivity to stress.
