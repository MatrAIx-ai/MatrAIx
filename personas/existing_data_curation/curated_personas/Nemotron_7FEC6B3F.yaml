  career_goals: In the short term, Demario aims to earn his GED and enroll in a vocational program at a local community college, focusing on diesel technology or automotive technology to formalize his hands‑on
    experience. He plans to secure an apprenticeship with a reputable auto shop in the Comanche area, where he can obtain industry certifications such as ASE (Automotive Service Excellence). Over the next
    five years, he envisions becoming a fully certified automotive technician and eventually taking on a supervisory role or opening his own small repair shop that serves his community. Alternatively, he
    is interested in the logistics sector, seeing a pathway to become a certified truck driver and later a fleet manager, attracted by the clear structure and predictable routines of the industry. Long‑term,
    Demario hopes to achieve financial stability sufficient to support his family, give back by mentoring younger teens through the church’s youth programs, and possibly sponsor scholarships for local students
    pursuing trade careers.
