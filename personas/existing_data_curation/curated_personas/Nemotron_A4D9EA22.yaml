personas:
  professional: Guilherme Reece, an aspiring multimedia storyteller, blends hand‑drawn sketches, digital illustration, guitar songwriting, and short video editing into immersive school projects and social‑media
    clips, channeling a restless curiosity and spontaneous energy while often scrambling against deadlines.
  sports: Guilherme Reece guards the midfield for the Thunder Strikers youth soccer club, spends weekends kicking the ball at the community field, passionately follows FC Barcelona and Liverpool FC, and
    they blend their energetic sociability with teamwork, while occasionally skipping practice to work on art projects.
  arts: Guilherme Reece’s creative universe fuses whimsical drawings inspired by Studio Ghibli, indie soundscapes from Tame Impala and Arcade Fire, world‑music rhythms of Tinariwen on guitar, and spontaneous
    improv sketches with the school drama troupe, cultivating a constantly evolving artistic voice driven by curiosity and collaborative energy.
  travel: Guilherme Reece dreams of wandering Tokyo’s neon districts, strolling Lisbon’s historic alleyways, and exploring the nearby beach town of Praia das Conchas on school trips, preferring itineraries
    that mix cultural immersion with photo‑op opportunities, yet budget limits keep most adventures local, leading to weekend camping outings in the neighboring mountain ridge.
  culinary: Guilherme Reece delights in crafting avocado toast sprinkled with chili flakes, simmering spicy miso ramen with soft‑boiled eggs, and baking chocolate‑chip cookies with a pinch of sea salt,
    while their kitchen confidence swings between enthusiastic beginner and occasional disaster when a timer slips.
  core: Guilherme Reece is a curiosity‑driven teen artist whose spontaneous creativity, deep compassion for friends and animals, and periodic anxiety combine into a vibrant yet sometimes disorganized pursuit
    of self‑expression.
background:
  cultural: Guilherme was born and raised in Roswell, Georgia, a suburban community in Cobb County that blends Southern traditions with a growing multicultural vibe. Though identified as white, his family
    carries Portuguese roots—his first name 'Guilherme' reflects a connection to Brazil/Portugal, and he grew up hearing Portuguese at home and celebrating holidays like Carnaval with extended family. This
    mix of Southern hospitality, weekend trips to local farmers' markets and high‑school football games, and occasional Portuguese cuisine such as pastel de nata and feijoada has shaped his worldview. He
    feels comfortable navigating both the outgoing social scene of the Atlanta metro area and the close‑knit, community‑oriented values of his neighborhood. Exposure to diverse artistic influences—from
    street murals in downtown Atlanta to traditional Portuguese fado music—feeds his appreciation for varied cultural expressions.
