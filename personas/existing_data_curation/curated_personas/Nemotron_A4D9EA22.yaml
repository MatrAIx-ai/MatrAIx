  career_goals: Looking ahead, Guilherme hopes to turn his creative passions into a career that also serves his community. He envisions becoming a multimedia artist or graphic designer who can produce compelling
    visual stories for non‑profit organizations, helping them raise awareness about mental health and youth empowerment. He is also attracted to studying psychology or counseling in college so he can combine
    artistic expression with professional support for peers facing anxiety or depression. In the short term, he wants to build a robust online portfolio, secure a mentorship with a local artist, and volunteer
    as a teen facilitator for a community mental‑health outreach program.
