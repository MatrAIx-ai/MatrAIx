  career_goals: Nanette aims to advance from construction laborer to foreman within the next three years, leveraging her associate degree and on‑site experience to earn a Certified Construction Manager
    (CCM) credential. She aspires to later become a project manager or start her own boutique renovation firm that blends functional construction with artistic interior design, emphasizing sustainable,
    locally sourced materials. To achieve this, she plans to complete a bachelor’s degree in Construction Management, obtain supervisory certifications, and build a portfolio of custom woodworking and design
    projects. Additionally, she hopes to mentor other women entering the trades, promoting diversity and inclusion in the industry while securing a more stable income that reduces her financial stress.
