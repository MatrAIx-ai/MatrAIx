    ''Yoga'', ''Volunteer mentoring for women in STEM'']'
  career_goals: Rosa aspires to transition into a Director of Engineering role where she can shape technology strategy, champion interdisciplinary innovation, and embed inclusive design principles into
    product development. She aims to lead a cutting‑edge team that bridges engineering with the arts, creating immersive digital experiences that fuse AI, interactive media, and cultural storytelling. Rosa
    is also committed to increasing representation of women and Latinx professionals in tech; she plans to establish mentorship programs, speak at industry conferences, and contribute to open‑source projects
    that empower underrepresented communities. Over the next five years, she hopes to secure patents for novel hardware‑software integration solutions and possibly launch a start‑up that leverages her engineering
    expertise and artistic vision.
