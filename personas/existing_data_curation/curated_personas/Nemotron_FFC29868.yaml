personas:
  professional: A senior systems engineer named Rosa Santiago channels her disciplined organization and imaginative curiosity into building cloud‑native, human‑centered solutions that blend high‑performance
    code with artistic design, positioning herself for a future director role that champions interdisciplinary innovation.
  sports: Rosa Santiago fuels her love for the outdoors by joining the Cascade Hiking Society for weekend treks in the foothills, follows the Seattle Seahawks and Seattle Kraken on game days, and attends
    weekly yoga sessions at Redmond Yoga Flow to stay flexible for salsa dancing, blending team spirit with personal fitness.
  arts: Rosa Santiago channels her creative curiosity into abstract acrylics inspired by the bold colors of street murals she admires at the Seattle International District, while her evenings are often
    filled with listening to lively brass lines of classic salsa tracks and watching contemporary performances by Beyoncé and Lin‑Manuel Miranda, integrating musical energy into her visual art.
  travel: Rosa Santiago plans her trips with a blend of meticulous itineraries and spontaneous detours, having already explored the vibrant street life of Mexico City and the historic plazas of Barcelona,
    she now dreams of hiking Patagonia’s Torres del Paine and attending a traditional music festival in Oaxaca, balancing her tech‑driven schedule with a desire for cultural immersion.
  culinary: Rosa Santiago, an amateur chef, regularly prepares a savory shredded beef stew seasoned with cumin, garlic, and olives alongside crisp plantain fritters, and she perfects her own mojo sauce
    using fresh lime juice, orange zest, and cilantro, often pairing these dishes with a glass of aged rum and sharing them at neighborhood potlucks.
  core: Rosa Santiago is a disciplined engineer who balances high‑octane code sprints with nightly salsa spins, a habit of collecting vintage enamel pins that clutters her desk, and a tendency to lose track
    of time during immersive art sessions, making her both a relentless problem‑solver and a vibrant social catalyst.
background:
  cultural: Rosa grew up in a Cuban‑American household, with both parents emigrating from Havana before she was born. Bilingual in Spanish and English, she carries forward the warmth, hospitality, and rhythmic
    energy of Cuban culture. Family celebrations—such as Carnaval, San Juan, and elaborate holiday feasts—shape her values of community, generosity, and collective joy. Cuban music, particularly son and
    salsa, is a constant soundtrack in her life, influencing her love for dance and social gatherings. While thriving in Redmond’s tech ecosystem, Rosa stays connected to the local Cuban diaspora through
    cultural festivals, Spanish‑language book clubs, and volunteer work that supports immigrants adapting to life in the Pacific Northwest. Her heritage informs her collaborative style, encouraging inclusive
    dialogue, empathy, and a celebration of diverse perspectives in both personal and professional realms.
