personas:
  professional: Harpreet Brooks, a seasoned residential painter and paperhanger with three decades of expertise in surface preparation, custom color mixing, and eco‑friendly finish systems, channels their
    practical curiosity and relaxed planning style into precise, durable projects while they navigate client expectations with a subtly competitive edge.
  sports: Harpreet Brooks stays active through weekly yoga sessions at the community center, enjoys a Saturday morning walking club along the D&R Canal trail, cheers on the New York Giants and New York
    Yankees, and they play casual pickleball with the East Brunswick Senior Center Pickleball Club during the fall.
  arts: Harpreet Brooks expresses their love for color through personal watercolor studies inspired by Claude Monet and Georgia O’Keeffe, they frequently listen to classic Bollywood soundtracks featuring
    Lata Mangeshkar and R. D. Burman, and they attend local community theater productions of Agatha Christie mysteries.
  travel: Harpreet Brooks prefers purposeful trips, having visited the historic streets of Williamsburg, the coastal charm of Newport, Rhode Island, and the vibrant art scene of Santa Fe, and they dream
    of a pilgrimage‑style journey to the rural villages of their ancestral homeland to reconnect with extended family while supporting grandchildren’s education.
  culinary: Harpreet Brooks, an avid home cook, blends traditional sarson da saag with garden‑fresh cilantro and New Jersey‑grown kale, experiments with turmeric‑infused hummus and hand‑rolled naan, and
    they often order take‑out Chinese after late workdays, while they enjoy a perfectly spiced chicken tikka masala with basmati rice.
  core: Harpreet Brooks is a meticulous painter who battles daily anxiety with yoga, they occasionally forget to bill clients on time, and they can spend hours perfecting a single paint hue.
background:
  cultural: Harpreet is a second-generation Indian American whose parents immigrated from Punjab in the early 1970s. Raised in New Jersey, she grew up bilingual in English and Punjabi and maintains many
    family traditions, such as celebrating Diwali and Vaisakhi, preparing seasonal festive foods, and participating in her local gurdwara’s service projects. Her South Asian heritage influences her aesthetic
    sensibility, often inspiring her to incorporate subtle patterns, warm palettes, and symbolic motifs into her interior painting work while seamlessly blending with the broader American cultural environment
    of East Brunswick.
attributes:
  skills: '[''Surface preparation'', ''Wallpaper installation'', ''Custom color mixing'', ''Interior finish selection'', ''Customer communication'', ''Project quoting'', ''Basic carpentry'', ''Safety compliance'',
    ''Adaptation to new paint technologies'', ''Mentoring apprentices'']'
  hobbies: '[''Watercolor painting'', ''Herb gardening'', ''Cooking Indian-inspired cuisine'', ''Yoga and meditation'', ''Listening to Bollywood music'', ''Reading mystery novels'', ''Community mural projects'']'
  career_goals: Harpreet aims to cement her reputation as the go-to painter for East Brunswick homeowners, earn a recognized certification in advanced finish systems, and slowly expand her solo business
    into a small team that can take on larger renovation contracts. She wants to mentor a younger apprentice, preferably from the local South Asian community, as a way to give back and ensure the craft
    continues. She also hopes to earn enough to fund travel to India to reconnect with extended family and to support her grandchildren’s education, while maintaining a work schedule that helps manage her
    anxiety.
