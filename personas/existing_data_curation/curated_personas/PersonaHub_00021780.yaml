persona_description: A biologist who specializes in the study of ecological succession and the microbiome, particularly the role of beneficial bacteria in the human gut. She has a deep understanding of
  the science behind fermentation and the impact of microorganisms on human health. Her research interests include the impact of urbanization on the microbiome and the development of sustainable farming
  practices. She is passionate about promoting sustainable and regenerative agriculture and has a particular interest in the use of fermented foods in promoting health and wellbeing.
