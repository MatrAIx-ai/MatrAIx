personas:
  professional: Catherine Caffey, a 71‑year‑old retail veteran with a teaching background, channels their practical curiosity and competitive edge into a shift‑lead role where they mentor new cashiers,
    streamline point‑of‑sale workflows, and resolve shopper disputes with calm, sociable finesse—though their relaxed approach sometimes means a stack of paperwork sits unfinished.
  sports: Catherine Caffey embraces active aging by line‑dancing to lively country tunes, tackling summer trails around Lake Tahoe with the local hiking club, and cheering on the San Jose Sharks during
    hockey season, all while treating bridge nights as a strategic mental workout that satisfies their competitive spirit.
  arts: Catherine Caffey weaves a love of narrative into daily life, devouring Ken Follett’s sweeping epics and Agatha Christie’s whodunits while hand‑knitting scarves that echo Joan Baez’s folk melodies,
    and capping the creative cycle with pottery sessions led by local artist Maria Rivera, finding solace in tactile art amid their practical routine.
  travel: Catherine Caffey favors low‑key, flexible travel, having trekked the Grand Canyon’s South Rim, splurged on a weekend wine‑tasting tour in Napa Valley, and spent tranquil evenings at a cabin on
    the shores of Lake Tahoe, always leveraging senior discounts and a relaxed itinerary that leaves room for spontaneous detours.
  culinary: Catherine Caffey delights in farm‑to‑table cooking, regularly preparing roasted heirloom carrots, zucchini, and kale tossed with fresh basil from their garden, experimenting with almond‑crusted
    salmon and seasonal apple crumble, all while their knitting needles clack beside the stove, reflecting a hands‑on, creative culinary philosophy.
  core: Catherine Caffey is a competitively curious septuagenarian who blends teaching patience with retail savvy, pursues outdoor and crafty hobbies, and navigates life with a relaxed, occasionally disorganized,
    yet emotionally steady outlook.
background:
  cultural: Catherine grew up in a small Midwestern farming community, where values of hard work, self‑reliance, and close‑knit community were emphasized. After relocating to Reno in her early adulthood,
    she embraced the frontier spirit of Nevada—independent, adaptable, and open to diverse influences. Her cultural identity blends a traditional white American Protestant upbringing with the eclectic,
    outdoors‑oriented lifestyle of the Great Basin, informing her pragmatic approach, strong community involvement, and appreciation for both established customs and novel ideas.
