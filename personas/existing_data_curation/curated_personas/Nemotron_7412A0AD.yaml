  career_goals: He aspires to become a software engineer or robotics developer, dreaming of designing interactive video games and building autonomous robots that could help people. Inspired by the tech
    environment of Fremont and Silicon Valley, Duc aims to pursue a STEM-focused education through middle school and eventually attend a top engineering university. He also hopes to combine his cultural
    heritage with his technical skills by creating apps or games that celebrate Vietnamese stories.
