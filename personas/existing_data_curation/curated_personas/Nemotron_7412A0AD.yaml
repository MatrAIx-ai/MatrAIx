personas:
  professional: Duc Trieu is an aspiring robotics hobbyist who spends after‑school hours building intricate LEGO creations and crafting animated stories in Scratch, channeling a love for structure and competition
    into projects that blend logical engineering with creative storytelling.
  sports: Duc Trieu is a dedicated member of the Tigers Youth Soccer League, practicing drills at the local park, tracking personal goal statistics in a handwritten notebook, and cheering for the city’s
    pro team the Metro Lions while balancing competitive drive with team camaraderie.
  arts: Duc Trieu channels creative energy into building detailed LEGO models, programming short animations in Scratch, devouring adventure series like Harry Potter and mystery tales by R.L. Stine, and
    drawing inspiration from the animated show Adventure Time, often sketching characters during recess.
  travel: Duc Trieu loves weekend road trips to nearby nature spots such as Pine Ridge Park, dreams of exploring the Grand Canyon and Disney World, and prefers family‑organized itineraries that include
    scheduled soccer practice, snack breaks with fruit slices, and plenty of photo opportunities.
  culinary: Duc Trieu enjoys cheesy pizza, crispy chicken nuggets, and home‑made vegetable stir‑fry seasoned with soy sauce, often helping in the kitchen to chop fresh strawberries for a fruit salad and
    experimenting with simple recipes using a child‑safe kitchen set.
  core: Duc Trieu is a structured, competitive ten‑year‑old who fuses logical LEGO engineering with lively soccer, saves allowance for new kits, and sometimes neglects dental hygiene.
background:
  cultural: Duc is a second-generation Vietnamese American raised in Fremont's vibrant Asian-American community. At home, he speaks both Vietnamese and English, and his family observes cultural traditions
    such as Tet (Lunar New Year), the Mid-Autumn Festival, and weekly visits to a local Vietnamese Buddhist temple. The family's emphasis on education, respect for elders, and community involvement shapes
    his values and motivations. Growing up amidst the diverse culinary and cultural environment of Alameda County, Duc balances his Vietnamese heritage with the multicultural influences of his Californian
    surroundings.
attributes:
