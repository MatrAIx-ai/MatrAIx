personas:
  professional: Tram Luong is an aspiring cartographer and comic creator who blends boundless imagination with meticulous planning, designing elaborate fantasy maps and story panels that they share on a
    kid‑friendly online forum, turning their love of drawing, LEGO architecture, and Minecraft world‑building into a budding creative career.
  sports: Tram Luong loves the outdoors, playing midfield for the Wahiawa Warriors youth soccer team, swimming with the Wahiawa Aquatics Club, and traversing the Pu‘u o Mahukona trail on weekends, all while
    collecting shells for art projects and staying active after school.
  arts: Tram Luong immerses themselves in the arts, drawing inspiration from James Gurney’s imaginative landscapes, the whimsical animation of Hayao Miyazaki, and the acoustic melodies of Jack Johnson,
    while crafting LEGO sculptures that echo traditional Southeast Asian motifs and performing ukulele songs at family gatherings.
  travel: Tram Luong’s travel style blends curiosity and family comfort, having explored the beaches of Maui and the volcanic craters of Honolulu, visited the interactive exhibits at Seattle’s Space Needle
    Museum, dreaming of a future trip to the Great Barrier Reef and the ancient ruins of Machu Picchu.
  culinary: Tram Luong enjoys helping in the kitchen, skillfully preparing aromatic pho with star anise, rice noodles, and fresh basil, assembling bánh mì with pickled carrots, cilantro, and pork pâté,
    and experimenting with mango sticky rice topped with coconut milk and sesame seeds, all while proudly serving these dishes to friends and family.
  core: Tram Luong is a ten‑year‑old imagination powerhouse who meticulously plans fantastical creations, worries about perfection, and balances a love of art, nature, and family with the occasional late‑night
    sketch‑marathon.
background:
  cultural: 'Tram’s cultural background is a vibrant blend of Southeast Asian heritage and Hawaiian island life. Her family traces its roots to Vietnam (and possibly the Philippines), and she grows up speaking
    both English and Vietnamese, celebrating traditions like Tet with homemade bánh chưng and firecracker displays. The aromas of pho broth and fresh herbs fill family meals, connecting her to her ancestors’
    culinary customs. Living in Wahiawa, Hawaii, Tram participates in local cultural events: she learns basic hula steps in school, receives lei for birthdays, and respects the concept of ‘aina (land).
    The multicultural community exposes her to a mix of Asian festivals, Hawaiian music, and Pacific Island stories, all of which influence her artwork, where she often incorporates tropical flora, lantern
    motifs, and mythic symbols from both cultures.'
attributes:
  skills: '["Sketching and drawing", "Storytelling and comic creation", "Basic Scratch programming", "Puzzle solving", "Organizational planning and notebook management", "Bilingual communication (English
