  hobbies: '["Doodling and painting fantasy art", "Writing short stories and comic strips", "Building LEGO architectural models", "Exploring Wahiawa nature trails and beaches", "Cooking traditional Southeast
    Asian dishes with family", "Playing ukulele", "Playing Minecraft and sandbox video games", "Watching documentaries on space, marine life, and mythology"]'
  career_goals: For her future, Tram dreams of a career where imagination meets technology. She hopes to become a children’s book illustrator who brings fantastical stories to life, or a video game designer
    creating immersive worlds that spark curiosity. She is also fascinated by space and marine science, contemplating a role as a visual scientist who illustrates complex concepts for educational media.
    Tram wishes to lead collaborative projects, perhaps becoming a youth mentor who organizes creative workshops for other kids. Her ambition is to blend art, storytelling, and scientific curiosity to inspire
    others while staying organized and reliable.
