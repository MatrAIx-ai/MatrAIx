  career_goals: Racquel hopes to move from individual housekeeping work to a supervisory role within a reputable cleaning or property‑management company in Atlanta, eventually overseeing a team of cleaners
    for a boutique hotel or corporate office. She plans to earn a certification in green cleaning and, over the next few years, complete a bachelor’s degree in business administration or facilities management.
    In the long term, she dreams of launching her own modest, environmentally‑focused cleaning service that provides reliable employment for other women in her community. Her goals also include achieving
    greater financial stability, purchasing a home for her family, and establishing a healthier work‑life balance to reduce stress.
