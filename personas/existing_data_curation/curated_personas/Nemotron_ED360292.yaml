  hobbies: '[''Recreational fishing'', ''Model ship building'', ''Woodworking'', ''Bridge (card game)'', ''Golf'', ''Reading historical fiction'', ''Volunteer mentoring'', ''Beach walking'', ''Cooking seafood
    dishes'']'
  career_goals: Although retired, Eduard aims to stay physically active, maintain his health, and continue to be a valuable resource for his community. He plans to compile a memoir of his life along the
    Maryland coast, documenting the evolution of Ocean City. He hopes to mentor younger volunteers at the senior center, sharing his practical skills, and to compete in a senior fishing league with an eye
    toward winning a local contest. He also wishes to learn basic computer skills to digitize his photo archive and to travel spontaneously with his wife to other coastal towns while keeping a simple budget.
