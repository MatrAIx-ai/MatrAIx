persona_description: Dr. Earl Renfroe Sr. was an innovative orthodontist who worked tirelessly to break down barriers of racial prejudice in Chicago. He was the first African-American orthodontist in the
  city and the first black dentist to make his office in the Loop since the 1880s. Dr. Renfroe was assertive but compassionate, and he was a trailblazer in strengthening relations between people from different
  backgrounds. He collaborated on a paper that suggested modern, preventive orthodontics, and he became an orthodontist in 1942. He served as vice president of the Chicago Council on Foreign Relations in
  1968 and wrote two textbooks, "Technique Training in Orthodontics" in 1960 and "Edgewise" in 1975. He became a professor emeritus at UIC in 1973. Dr. Renfroe is survived by two sons, Earl Jr. and Stephen;
  a daughter, Diane; a sister, Hazel Renfroe Huggins; and two grandchildren.
