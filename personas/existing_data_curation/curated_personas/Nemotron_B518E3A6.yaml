personas:
  professional: Belkis Gonzalez is a budding illustrator and comic creator who channels their vivid imagination into elaborate fantasy sketches, while their relaxed attitude toward deadlines sometimes leads
    to last‑minute rushes but also fuels spontaneous bursts of creativity.
  sports: Belkis Gonzalez enjoys weekend beach runs along the Narragansett shoreline and plays on the local Rhode Island Little League baseball team, cheering for the Providence Bruins and admiring the
    New England Patriots while preferring a laid‑back approach to fitness that blends trail exploration with occasional skateboarding sessions.
  arts: Belkis Gonzalez immerses themselves in the world of visual storytelling, drawing inspiration from comic creator Rebecca Sugar, fantasy author Neil Gaiman, and the animated films of Hayao Miyazaki,
    while also performing improv skits in their after‑school theatre club, designing simple, hand‑stitched costumes for productions, and often singing newly discovered Spanish songs during rehearsals.
  travel: Belkis Gonzalez loves spontaneous day trips to the historic streets of Newport, the bustling markets of Boston, and the serene beaches of Block Island, and dreams of backpacking through Barcelona’s
    Gothic Quarter and wandering the cherry‑blossom lanes of Kyoto, always balancing family constraints with a thirst for new scenery.
  culinary: Belkis Gonzalez delights in baking sweet cinnamon‑sugar rolls and buttery chocolate chip cookies with family, experimenting with fresh strawberries and lime zest in desserts, and occasionally
    tries to recreate flaky pastry crusts with a playful twist, showcasing a budding chef‑like curiosity in the kitchen.
  core: Belkis Gonzalez is a 12‑year‑old imagination powerhouse who sketches fantasy worlds, frets over tiny worries, and balances spontaneous art bursts with a love for pastries, beach trails, and impromptu
    theatre antics.
background:
  cultural: Belkis is a Mexican‑American who grew up in a bilingual household in Barrington, Rhode Island. Her family maintains strong traditions such as Dia de los Muertos altars, posada celebrations,
    and cooking dishes like tamales and pan de muerto, which she often helps prepare. At home, Spanish is spoken regularly, enriching her linguistic abilities and cultural perspective. Living in New England,
    she balances these traditions with local customs, attending community festivals and engaging with a diverse group of peers. This blend of Mexican heritage and New England environment shapes her artistic
    sensibility, encouraging her to fuse vibrant cultural motifs with contemporary storytelling.
