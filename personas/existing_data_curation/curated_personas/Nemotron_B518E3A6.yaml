  career_goals: Belkis dreams of becoming a multimedia artist who can weave storytelling, animation, and cultural heritage into games or graphic novels. She aspires to study visual arts and computer animation,
    eventually working in an indie studio where flexibility and creativity are valued. She also hopes to use her artistic voice to raise awareness about teenage mental health, perhaps by creating supportive
    comic series that help peers navigate stress and anxiety. Long‑term, she envisions leading community workshops that combine art, technology, and cultural storytelling for youth in her hometown.
