  hobbies: '[''Hiking and nature walks'', ''Birdwatching'', ''Fishing'', ''Reading fantasy and science‑fiction novels'', ''Sketching and drawing'', ''Digital photography and social media content creation'',
    ''Playing acoustic guitar'', ''Singing in school choir'', ''Participating in school science club'', ''Cooking and baking for friends'']'
  career_goals: Looking ahead, Lisa aims to graduate high school with a strong academic record and then pursue a career that blends her practical nature with her curiosity about living things. She is interested
    in a health‑related field such as veterinary technology or nursing, where she can work directly with animals or people while applying hands‑on problem solving. At the same time, she hopes to keep her
    creative side alive by studying digital media or graphic design at a community college, with the long‑term ambition of creating content that highlights Appalachian wildlife and local culture. Lisa envisions
    a balanced pathway that provides financial stability, community service, and artistic expression.
