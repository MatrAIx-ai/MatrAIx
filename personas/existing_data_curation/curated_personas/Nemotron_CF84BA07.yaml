  career_goals: Gary aims to scale his company into a regional leader while maintaining its entrepreneurial spirit. He envisions expanding into sustainable product lines that merge profitability with environmental
    stewardship, positioning the business as a model for responsible growth in the Great Lakes area. Over the next five years, he plans to launch a mentorship program for emerging entrepreneurs in Alpena
    County, foster strategic partnerships with cultural institutions, and eventually transition to a board‑level role where he can guide multiple ventures and influence broader economic development initiatives.
