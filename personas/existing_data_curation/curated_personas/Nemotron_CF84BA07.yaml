personas:
  professional: Gary Castaneda, an entrepreneurial strategist who blends data‑driven decision‑making with a keen eye for storytelling, leverages his financial and operational expertise to steer his company
    toward sustainable growth while championing cross‑functional design thinking and community partnerships.
  sports: Gary Castaneda is an avid sailor on Hubbard Lake, a dedicated fisherman, and a seasonal hiker who tackles Upper Peninsula trails, while cheering for the Detroit Red Wings and supporting the local
    Alpena Fire youth soccer club.
  arts: Gary Castaneda frequents the Alpena County Art Center, draws inspiration from Ansel Adams' landscape photography and Monet's impressionist works, volunteers set‑design ideas for community theater,
    and regularly streams the folk trio The Lumineers, letting artistic immersion shape his creative problem‑solving.
  travel: Gary Castaneda plans his trips with a blend of spreadsheet precision and spontaneity, favoring weekend drives to Mackinac Island, summer sailing tours of the Great Lakes, and dream vacations to
    the Amalfi Coast, all while balancing a modest travel budget and family commitments.
  culinary: Gary Castaneda enjoys crafting Mediterranean‑inspired meals such as grilled branzino with lemon‑oregano vinaigrette, Greek salad with kalamata olives and feta, and homemade falafel, using fresh
    herbs from his garden and pairing dishes with crisp Pinot Grigio, while hosting lively dinner parties for friends.
  core: Gary Castaneda is a curious, sociable leader who blends strategic rigor with artistic flair, spends free time sailing, photographing sunrise over lakes, and cooking Mediterranean feasts, yet occasionally
    skips sleep to chase the next big idea.
background:
  cultural: Gary grew up in a Midwestern, white American family with deep roots in northern Michigan’s lake‑country culture. His upbringing emphasized self‑reliance, community involvement, and a strong
    work ethic characteristic of the region. The Castaneda surname reflects a lineage that blends European (primarily German and Scandinavian) ancestry with a touch of Hispanic heritage, giving him a subtle
    appreciation for multicultural traditions. This background informs his respect for local customs—such as the seasonal fishing cycles and outdoor recreation—while also fostering an openness to diverse
    artistic expressions and global perspectives. His marital life and community ties reinforce a values‑centered identity grounded in family, hospitality, and regional pride.
