personas:
  professional: John Ellis, a 63‑year‑old project‑management veteran, blends three decades of corporate and nonprofit experience with Agile, Lean, and visual storytelling, and they guide teams through flexible,
    consensus‑driven processes, reflecting their compassionate, curious nature.
  sports: John Ellis enjoys low‑impact fitness by walking the countryside, playing occasional 9‑hole rounds at the local country club, and cheering on the Louisville Bats and Kentucky Wildcats, and they
    participate in a senior‑center walking club that meets every Saturday.
  arts: John Ellis immerses themselves in the arts by sketching rural scenes, photographing blue‑grass festivals, visiting Speed Art Museum exhibitions featuring Monet and local folk painter Mary K. Lentz,
    listening to Miles Davis and Joan Baez, and supporting community theater productions of Tennessee Williams’ *The Glass Menagerie*, and they find inspiration in the visual storytelling of each medium.
  travel: John Ellis plans trips that blend curiosity and comfort, having explored the Edinburgh Festival, the Loire Valley’s château museums, and New Orleans’ historic jazz scene, while they dream of a
    pilgrimage to Florence’s art galleries and a leisurely drive through Kentucky’s horse farms.
  culinary: John Ellis, an enthusiastic home cook, delights in preparing bourbon‑glazed pork ribs, shrimp and grits seasoned with fresh thyme and rosemary from their garden, and the classic Kentucky Hot
    Brown, while they savor locally roasted coffee and occasional artisanal cheese boards featuring Gouda and blue cheese.
  core: John Ellis is a seasoned project manager who merges a relaxed, arts‑loving soul with a community‑first mindset, often juggling garden chores, sketchbooks, and mentorship while they occasionally
    forget bill due dates.
background:
  cultural: John B. Ellis is rooted in the Mid‑Southern culture of Kentucky, growing up in a family with Irish and German ancestry that prized hard work, hospitality, and community involvement. The region’s
    traditions—bluegrass music, bourbon craftsmanship, and annual horse‑show events—have shaped his appreciation for local heritage. His upbringing in Jefferson County exposed him to a blend of rural values
    and the cultural vibrancy of nearby Louisville, fostering an openness to diverse artistic expressions. John’s business education and decades‑long career in project management added a corporate, results‑driven
    perspective, while his personal curiosity has led him to embrace both regional and global artistic influences.
attributes:
  skills: '[''Strategic Project Planning'', ''Budget and Resource Management'', ''Risk Assessment'', ''Schedule Optimization'', ''Stakeholder Communication'', ''Conflict Resolution'', ''Team Facilitation'',
