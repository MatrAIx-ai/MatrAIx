  hobbies: '[''Visiting art galleries'', ''Photography'', ''Sketching'', ''Reading art history and philosophy'', ''Attending theater and jazz concerts'', ''Traveling to cultural festivals'', ''Gardening'',
    ''Woodworking'', ''Playing chess'', ''Mentoring youth entrepreneurship programs'']'
  career_goals: John aims to transition from day‑to‑day project execution to a senior advisory and mentoring role, guiding the next generation of project managers within his organization and the local nonprofit
    sector. He envisions establishing a community‑focused consultancy that helps small arts and cultural groups in the Louisville area secure funding and manage projects effectively. Additionally, John
    aspires to author a practical guide that blends traditional project management principles with creative, art‑inspired problem‑solving techniques. While preparing for a gradual retirement, he seeks to
    leave a legacy of collaborative, compassionate leadership.
