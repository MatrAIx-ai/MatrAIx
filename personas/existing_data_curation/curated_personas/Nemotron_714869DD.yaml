  career_goals: Michael aims to transition into a senior technology leadership role where he can spearhead digital transformation initiatives for agribusinesses and midsize enterprises in California’s Central
    Valley. Over the next five years he plans to become a VP of Technology or Chief Analytics Officer, overseeing the integration of data‑driven sustainability solutions and AI‑enhanced operational efficiencies.
    He also envisions launching a boutique consulting firm that blends rigorous business analysis with creative technology—such as interactive art installations and immersive data visualizations—to enrich
    local cultural institutions and support community entrepreneurship.
