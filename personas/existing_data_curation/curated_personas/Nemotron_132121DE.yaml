  career_goals: Graciela aims to become a senior HR business partner leading strategic workforce planning for a technology company in South Florida. She plans to earn the SHRM‑Senior Certified Professional
    (SHRM‑SCP) credential and deepen her expertise in people analytics, eventually heading a people‑operations function that integrates AI‑driven recruitment tools. She also aspires to champion DEI initiatives
    that amplify South Asian representation in tech and to mentor emerging HR professionals through a community network. In the longer term, she envisions launching her own boutique HR consultancy that
    provides data‑centric talent solutions to small and medium‑sized enterprises, balancing her competitive drive with her preference for autonomy.
