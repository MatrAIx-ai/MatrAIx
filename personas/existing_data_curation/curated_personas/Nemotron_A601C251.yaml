personas:
  professional: Vivian Chen leverages her flair for event planning, bilingual communication, and polished public speaking to thrive as a student leader coordinating school productions, community service
    drives, and social media campaigns, all while methodically adhering to project timelines and nurturing collaborative harmony.
  sports: Vivian Chen enjoys hiking the Appalachian Trail sections of the Patapsco Valley State Park during weekends, follows the Baltimore Ravens and Washington Wizards, participates in a local co‑ed recreational
    soccer league, and incorporates yoga into their fitness regimen to maintain flexibility for hip‑hop dance.
  arts: Vivian Chen channels their love for performance through leading roles in school theater, engaging hip‑hop routines set to BTS and Ariana Grande tracks, curating event photography on Instagram, and
    editing promotional videos with Canva and basic video software, while also practicing Chinese calligraphy as a meditative visual art.
  travel: Vivian Chen prefers meticulously planned trips that blend cultural immersion and adventure, having backpacked through Taiwan’s night markets, explored the historic streets of Singapore on a student
    exchange program, and dreaming of a future semester abroad in Japan, all while budgeting travel expenses through a dedicated travel fund.
  culinary: Vivian Chen loves experimenting with fusion dishes like pepper‑corn teriyaki chicken tacos and kimchi mac & cheese, often sourcing gochujang, fresh basil, and cheddar at the local farmers market,
    yet sometimes over‑season to the point of overpowering subtle flavors, and enjoys sharing their creations on TikTok.
  core: Vivian Chen is a sociable, organized multitasker who blends a love for performance, community service, and creative cooking with a pragmatic eye on budgeting and wellness, occasionally overcommitting
    but always bouncing back with a smile and a flash of neon‑bright confidence.
background:
  cultural: Vivian is of Chinese descent, raised in a bilingual household where Mandarin and English are spoken. Her family maintains cultural traditions such as celebrating Lunar New Year and the Mid‑Autumn
    Festival with traditional foods and gatherings, while also fully engaging in American customs and community life in Brookeville, MD. She participates in local Chinese community events, attends language
    classes, and practices calligraphy, keeping her heritage alive. The blend of East Asian family values—emphasis on education, respect for elders, and communal responsibility—with the diverse, suburban
    environment of Howard County shapes her worldview, fostering both a strong sense of cultural identity and an inclusive, outward‑looking attitude.
attributes:
  skills: '["Public speaking", "Event planning and coordination", "Organizational and time‑management skills", "Team collaboration", "Digital media creation (Canva, video editing)", "Basic HTML/CSS coding",
    "Bilingual communication (English and Mandarin)", "Peer tutoring in math and English", "Conflict resolution and mediation"]'
  hobbies: '["School theater and drama", "Hip‑hop dancing", "Singing and music appreciation", "Chinese calligraphy", "Cooking and experimenting with fusion recipes", "Reading contemporary YA and non‑fiction",
    "Volunteer work at community center", "Photography", "Hiking and nature walks", "Yoga"]'
  career_goals: Vivian intends to enroll in a four‑year university, majoring in Communications or Public Relations with a business minor. She aspires to become a community outreach coordinator for a nonprofit
    focused on youth empowerment and cultural exchange, using her sociable nature and organizational talent to design inclusive programs. In the long term, she hopes to launch a youth mentorship platform
    that blends digital media and in‑person workshops to foster cross‑cultural understanding. She also plans to study abroad in an Asian country such as Taiwan or Singapore to deepen her language proficiency
    and global perspective, ultimately aiming to make a tangible, positive impact on both her local community in Howard County and the broader diaspora.
