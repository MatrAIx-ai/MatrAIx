persona_description: A college or university instructor who is responsible for teaching information literacy skills to their students. The instructor is likely to be a librarian, a subject matter expert,
  or a graduate student who is interested in teaching information literacy skills. They may have expertise in a particular discipline or field and may have experience teaching information literacy skills
  in their academic career. The instructor is likely to be knowledgeable about the ACRL framework for information literacy and may have experience integrating information literacy into their courses and
  programs. They may also have experience working with students and may be familiar with the Association of College & Research Libraries (ACRL) and other relevant resources.
