persona_description: A neuroscientist and researcher who specializes in the study of traumatic brain injury (TBI) and post-traumatic epilepsy (PTE), particularly in identifying targeted molecular and epigenetic
  mechanisms that underlie PTE. His work aims to develop a rational, effective strategy for preventing epilepsy by targeting the primary signaling pathways that initially trigger the numerous downstream
  cellular and molecular mechanisms mediating the development of epilepsy, as the brain becomes progressively more prone to seizures because of injury factors.
