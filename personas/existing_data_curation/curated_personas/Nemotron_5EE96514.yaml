  career_goals: Although retired, Patsy remains motivated to leave a lasting imprint on her community. She aims to serve on the board of the Portage County senior services council, expand the local community
    garden, and launch intergenerational programs that pair seniors with students for shared learning. She also hopes to author a memoir celebrating her French-Canadian heritage and to lead a series of
    cooking workshops featuring traditional Midwestern recipes. To deepen her impact, she plans to earn a volunteer-coordinator certification and enhance her digital storytelling skills.
