personas:
  professional: David Rosenbaum is a veteran police officer with over three decades of frontline experience who now leverages their investigative interviewing, community‑engagement expertise, and keen photographic
    eye to mentor junior officers, lead town‑hall meetings, and design creative problem‑solving strategies despite a relaxed attitude toward paperwork.
  sports: David Rosenbaum enjoys weekend hikes with the Campbell County Trailblazers Hiking Club, shades of fall fishing with the Kentucky Bass Anglers Association, cheers on the Cincinnati Reds and the
    Louisville Cardinals, and volunteers as a safety instructor for youth soccer leagues, embodying a laid‑back yet community‑focused sports spirit.
  arts: David Rosenbaum frequently visits gallery openings featuring artists like Jane Doe of the Kentucky Murals Project, studies Ansel Adams’ black‑and‑white landscapes, participates in open‑mic nights
    sharing police anecdotes, paints watercolors inspired by northern Kentucky river towns, and reads contemporary fiction by Margaret Atwood and Haruki Murakami in a weekly book club.
  travel: David Rosenbaum prefers spontaneous road trips that blend scenic hikes in Red River Gorge, history tours of Mammoth Cave, and cultural stops at Nashville’s Country Music Hall of Fame, while dreaming
    of attending the Edinburgh Festival and the Leipzig Book Fair, often planning itineraries on a napkin due to a flexible, last‑minute travel style.
  culinary: David Rosenbaum loves cooking fresh‑caught catfish with a bourbon glaze, savoring classic Kentucky Derby Pie and smoky grilled corn on the cob, boasts a competent but occasionally messy pepper‑roasting
    technique, and frequently pairs meals with locally roasted coffee and the occasional instant noodle during late‑night photo edits.
  core: David Rosenbaum is a sociable, art‑obsessed police veteran who blends community‑focused policing with a relaxed, sometimes disorganized lifestyle, channeling curiosity into photography, mentorship,
    and spontaneous adventures.
background:
  cultural: David grew up in a working‑class white family in the Ohio River Valley, the son of a coal‑miner turned electrician and a school‑teacher. His ancestors trace back to German and Irish immigrants
    who settled in the region in the late 19th century, imparting a strong sense of community, self‑reliance, and respect for tradition. Raised in the Protestant (Baptist) faith, he regularly attended the
    local church, where he learned the value of service and fellowship. The close‑knit culture of Campbell County, with its county fairs, high school football Saturdays, and grassroots arts initiatives,
    shaped his worldview and encouraged his love for local history and folklore. Though he spent his entire career in law enforcement, he has always balanced the “blue” uniform with a deep appreciation
    for the area’s cultural heritage, which continues to inform his interactions with residents and his commitment to preserving the county’s legacy.
