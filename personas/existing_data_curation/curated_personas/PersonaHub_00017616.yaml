persona_description: A scientist and entomologist with the Agricultural Research Service (ARS) and the University of Florida (UF), specializing in the study of plant diseases and insect pests. They are
  exploring the use of kaolin, a type of powdered clay, and plant essential oils to reduce the incidence of tomato spotted wilt disease (TSW) by 50 percent in field trials. They are also investigating the
  use of ultraviolet-light-reflective mulches and commercial products like acibenzolar-s-methyl to control thrips and TSW.
