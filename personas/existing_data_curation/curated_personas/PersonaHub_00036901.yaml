persona_description: A researcher and clinician interested in understanding the impact of childhood bullying on mental and physical health, particularly in relation to the inflammatory response and the
  hypothalamic-pituitary-adrenal axis. They are particularly interested in the longitudinal effects of bullying on health outcomes and the potential for bullying to be considered as a form of "toxic stress"
  alongside other forms of abuse. They are looking for new targets for interventions aimed at reducing problems related to the experience of being bullied in childhood.
