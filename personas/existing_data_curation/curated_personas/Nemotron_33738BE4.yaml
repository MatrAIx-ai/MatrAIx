  hobbies: '[''Gardening'', ''Quilting'', ''Baking'', ''Mystery novels'', ''Book club'', ''Church socials'', ''Walking'', ''Knitting'', ''Classic movies'']'
  career_goals: Although Jayme is not currently in the paid workforce, she aims to deepen her involvement in community service by taking on a leadership role in the church’s outreach committee and expanding
    the local food-pantry program. She also hopes to improve her digital skills so she can assist her grandchildren with school projects and stay connected with extended family. In the longer term, Jayme
    dreams of turning her love of baking into a small home-based catering service for neighborhood gatherings, while maintaining her health through regular walking and gardening.
