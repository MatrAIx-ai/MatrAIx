personas:
  professional: Sang Xiong, an information clerk specializing in records administration, they apply meticulous Excel tracking and basic SQL queries to streamline filing systems, craft detailed SOPs that
    satisfy their competitive drive for measurable efficiency, and pursue a Certified Records Manager credential to become a senior records analyst within three years.
  sports: Sang Xiong, a dedicated Taekwondo practitioner, they train twice weekly at the local Dojang, follow the KBO’s Doosan Bears and the NBA’s Los Angeles Lakers with strategic enthusiasm, and regularly
    join weekend chess‑in‑the‑park tournaments that double as mental sport, balancing disciplined martial arts with avid sports fandom.
  arts: Sang Xiong, an avid cultural consumer, they unwind by streaming Mozart’s symphonies, listening to contemporary K‑pop group BTS for a nostalgic boost, binge-watching Christopher Nolan’s films, and
    reading Haruki Murakami’s novels, weaving global artistic influences into a reflective personal aesthetic.
  travel: Sang Xiong, a meticulous itinerary maker, they prefer planning trips with a bullet‑journal layout that includes dates, transport details, and budgeting for each day, and have explored Kyoto’s
    historic temples, Prague’s architectural gems, and Busan’s coastal charm, balancing a desire for cultural immersion with a budget‑conscious approach that often delays luxury travel until career milestones
    are met.
  culinary: Sang Xiong, a disciplined home cook, they faithfully follow traditional Korean recipes such as bibimbap with gochujang, kimchi jjigae, and bulgogi, recording each trial in a detailed food journal
    noting precise ingredient ratios like sesame oil and garlic, yet sometimes become so fixated on perfection that dishes are over‑cooked.
  core: Sang Xiong, a 24‑year‑old precision‑driven planner, they fuse a love of strategic games, bullet‑journal habits, and disciplined cooking with a persistent undercurrent of anxiety and a competitive
    streak that fuels both career ambition and occasional stress‑induced over‑commitments.
background:
  cultural: Sang is a second‑generation East Asian American—his parents immigrated from South Korea in the early 2000s. He grew up in a bilingual household where Korean was spoken alongside English, and
    family gatherings emphasized respect for elders, education, and cultural festivals such as Lunar New Year and Chuseok. Living in Lawton, Oklahoma, he has adapted to a predominantly Midwestern environment
    while preserving his heritage through community events at the local Korean cultural center, attending language classes, and sharing traditional meals with friends. His cultural upbringing instilled
    a strong work ethic and a preference for order, which dovetails with his pragmatic personality.
attributes:
  skills: '[''Data entry'', ''Records management'', ''Document indexing'', ''Microsoft Office Suite (Excel, Word, Outlook)'', ''Basic SQL querying'', ''Compliance and confidentiality handling'', ''Process
    improvement'', ''Time management'', ''Analytical reporting'']'
  hobbies: '[''Playing Go'', ''Chess'', ''Puzzle solving (crosswords, Sudoku)'', ''Taekwondo'', ''Cooking traditional Korean cuisine'', ''Bullet journaling'', ''Reflective writing'']'
  career_goals: Sang aims to turn his clerkship into a career in records and information governance. In the next three years he plans to complete his bachelor's degree in Information Management or Business
    Administration, obtain the Certified Records Manager (CRM) credential, and move into a senior Records Analyst position within a government agency or a large corporation. He seeks roles that provide
    clear performance metrics and well‑defined responsibilities, allowing him to apply his structured approach. Long‑term, he envisions overseeing a records department, shaping document‑retention policies,
    and possibly transitioning into data‑governance or compliance consulting, where his competitive drive can be measured against concrete benchmarks.
