persona_description: A public health advocate and policy expert who has studied the impact of the War on Drugs on communities of color and the effectiveness of alternative approaches to drug prevention
  and treatment. They are passionate about investing in young people's lives through the creation of enriched environments and relationships, and are committed to addressing the root causes of drug abuse
  and criminal behavior. They recognize the importance of removing stigma and changing policies that criminalize drug use and seek to prioritize investments in black and brown communities that have been
  disproportionately affected by the War on Drugs.
