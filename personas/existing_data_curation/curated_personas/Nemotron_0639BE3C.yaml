personas:
  professional: Michael Eller, a budding teen robotics enthusiast, spends afternoons tinkering with LEGO Technic sets and simple Arduino kits, channeling their curiosity and practical mindset into building
    functional machines while dreaming of a future as a software engineer who can combine teamwork with inventive problem‑solving.
  sports: Michael Eller dominates pick‑up basketball and soccer at the neighborhood park, idolizes the Chicago Bulls and LA Galaxy, and plays for the local youth club Riverdale Kickers, where their energetic,
    cooperative style makes them the go‑to player for setting up plays and cheering teammates.
  arts: Michael Eller, a devoted fan of hip‑hop and pop, constantly streams tracks by Kendrick Lamar, Travis Scott, and Ariana Grande while mixing their own beats on a phone app, and they channel that rhythm
    into storytelling sessions at the community library where they read aloud to younger kids.
  travel: Michael Eller enjoys weekend hikes along the Appalachian Trail’s lowlands with their family, has already explored Shenandoah National Park and dreams of trekking the glaciers of Banff National
    Park, while their love for spontaneous road trips means they often grab a map and ride with friends to coastal beaches without a fixed itinerary.
  culinary: Michael Eller prefers quick, flavor‑packed meals like pepperoni pizza, chicken tacos with freshly diced tomatoes, and ramen bowls seasoned with miso, often helping their mom whip up the dishes
    while experimenting with LEGO‑inspired plating designs for extra fun.
  core: Michael Eller is an energetic, socially‑driven teen who blends curiosity with laid‑back disorder, juggling sports, robotics, and hip‑hop while striving to keep their finances and health in check
    despite occasional forgetfulness.
background:
  cultural: Michael was raised in a middle‑class white family in the suburban neighborhoods of Fulton County, near Atlanta. While his household reflects many traditional Southern values such as hospitality,
    respect for community, and a strong work ethic, his everyday life is shaped by the city’s cultural diversity. Attending a public middle school in Atlanta has exposed him to classmates from a variety
    of ethnic and cultural backgrounds, encouraging an appreciation for different perspectives. Family gatherings often feature Southern cuisine blended with broader American dishes, and community events
    like local festivals and sports leagues provide him with a mix of regional and multicultural experiences.
