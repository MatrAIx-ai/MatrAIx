  career_goals: Michael dreams of a career where he can blend his love for people with his growing interest in technology. He hopes to study social work or community development in college, eventually becoming
    a youth outreach coordinator who designs and runs tech‑focused after‑school programs. In the short term, he aims to gain more leadership experience by volunteering in school clubs, assisting younger
