persona_description: A scientist who advocates for the importance of recognizing and valuing the interdependence and cooperation among trees in forests, particularly in sustainable forest management strategies.
  She challenges the materialist worldview that has historically characterized the Western scientific perspective and argues for the importance of animist cultural worldviews. Her research focuses on the
  long-term health and sustainability of forests, and she advocates for a move towards a longer-term model for forest research and policy. Her work has been resisted by the forestry establishment due to
  its inconsistent with previous observations and the tenacity of the long-held dominant paradigm of forests as spaces of competition.
