  hobbies: '[''Watercolor painting'', ''Visiting art museums'', ''Photography'', ''Hiking'', ''Gardening'', ''Attending public lectures'', ''Reading contemporary fiction'', ''Book club participation'',
    ''Yoga'', ''Baking artisan bread'', ''Volunteering at senior centers'', ''Traveling to historic towns'']'
  career_goals: Christie aims to transition toward part‑time teaching at a local community college, sharing her clinical expertise and passion for evidence‑based dentistry with the next generation. She
    plans to earn a certification in geriatric dental health to better serve the senior population in Pittsburgh, and to develop a low‑cost oral‑health education program for underserved elders. Leveraging
    her love of art, she envisages curating an annual “Art in the Waiting Room” exhibit that uses visual arts to reduce patient anxiety. Ultimately, she hopes to author a guidebook on maintaining oral health
    in later life and to continue mentoring emerging dental professionals throughout her retirement.
