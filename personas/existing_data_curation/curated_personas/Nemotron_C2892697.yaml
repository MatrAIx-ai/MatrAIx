personas:
  professional: Christie Soria, a seasoned dental hygienist nearing retirement, blends fifteen years of clinical expertise in preventive care, digital radiography, and patient education with a keen artistic
    eye to craft aesthetic treatment plans, and they are now channeling their curiosity and assertiveness into part‑time teaching at a community college while curating an annual 'Art in the Waiting Room'
    exhibit for their Pittsburgh practice.
  sports: Christie Soria enjoys weekend hikes with the Frick Park Trailblazers and follows the Pittsburgh Steelers in football and the Penguins in hockey, balancing a low‑impact cardio routine of walking
    and gardening with a habit of cheering loudly at Sunday games while modestly tracking steps on a fitness watch.
  arts: Christie Soria spends weekdays sketching watercolors of the Allegheny River after visiting the Carnegie Museum of Art to study works by Monet and the contemporary Warhol retrospective, captures
    cityscapes through a vintage Nikon camera, and draws inspiration from authors like Ann Patchett in the book club, integrating visual and literary arts into their daily routine.
  travel: Christie Soria favors immersive trips to historic towns such as Williamsburg, Virginia, and culinary journeys through Napa Valley’s vineyards, while also savoring the tea ceremonies of Kyoto,
    usually planning trips months ahead to secure senior discounts and balance travel with their volunteer commitments back home in Pittsburgh.
  culinary: Christie Soria, an avid baker, perfects sourdough loaves with a crackly crust, complements them with heirloom tomato caprese salads drizzled with basil‑infused olive oil, and often experiments
    with rosemary‑infused focaccia, reflecting a medium‑level cooking skill that blends artisanal technique with garden‑to‑table freshness.
  core: Christie Soria blends a lifelong curiosity for art and science with a habit of over‑scheduling workshops and humming softly while polishing teeth, creating a uniquely soothing yet occasionally frazzled
    presence that leaves patients both relaxed and slightly amused.
background:
  cultural: Christie's cultural background is rooted in midwestern American white heritage, with family ties to the steel‑manufacturing era of Pittsburgh. Raised in a Catholic household, she values community,
    family gatherings, and modest celebration of traditional holidays. The city's rich industrial history and vibrant arts scene have shaped her appreciation for hard work, resilience, and cultural enrichment.
    She actively participates in local community festivals, supports neighborhood arts initiatives, and maintains a strong sense of civic responsibility typical of Allegheny County residents.
attributes:
  skills: '[''Preventive dental care'', ''Periodontal assessment'', ''Patient education'', ''Dental radiography'', ''Infection control'', ''Electronic health records management'', ''Evidence-based practice'',
