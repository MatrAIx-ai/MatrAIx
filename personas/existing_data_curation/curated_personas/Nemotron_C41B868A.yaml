personas:
  professional: Kaley Peterson, a five‑year‑old budding architect, spends afternoons arranging LEGO bricks into orderly skyscrapers, insisting on step‑by‑step instructions, and happily sharing their creations
    with classmates, reflecting a practical love for structure and predictability.
  sports: Kaley Peterson dashes around the community’s Sunshine Kids Soccer Club’s T‑ball sessions, cheering for the local professional baseball team the Chicago Cubs, and prefers the predictability of
    set practice drills, proudly showcasing a mismatched pair of little‑league cleats.
  arts: Kaley Peterson delights in coloring Peppa Pig pages, drawing the Muppets, humming Disney classics like “Let It Go,” and re‑enacting Sesame Street scenes with stuffed friends, underscoring a gentle,
    imaginative artistic side.
  travel: Kaley Peterson enjoys family road trips with meticulously plotted stops, recalling a recent adventure to the San Diego Zoo where they followed a printed map of animal exhibits, and dreams of a
    future vacation to Disneyland for its structured rides and themed parades.
  culinary: Kaley Peterson loves stirring up mac and cheese with a dash of cheddar, spreading peanut butter on whole‑grain bread, and topping banana slices with honey, showing a balanced palate that blends
    kid‑friendly comforts with a curiosity for mild flavor experiments.
  core: Kaley Peterson is a five‑year‑old who thrives on orderly play, meticulous saving, gentle health habits, team sports, imaginative arts, well‑planned trips, and comforting yet adventurous meals, while
    juggling endearing quirks like misplacing change and forgetting inhalers.
background:
  cultural: Kaley grows up in a suburban, middle-class family in Bethesda, Maryland, where the community values education, public libraries, and seasonal celebrations. Her household observes common American
    traditions such as Thanksgiving, Fourth of July fireworks, and birthday parties with a blend of family customs. While she is of white ethnic background, she experiences the multicultural environment
    of Montgomery County, interacting with diverse neighbors and participating in community events at local parks and cultural centers.
