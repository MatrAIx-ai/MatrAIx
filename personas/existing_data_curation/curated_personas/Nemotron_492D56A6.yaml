  career_goals: Ted aims to move into senior technical leadership, targeting roles such as Director of Engineering or Chief Technology Officer where he can shape organizational technology strategy. He is
    driven to lead digital transformation initiatives for mid‑size enterprises in the New England region, emphasizing modern cloud adoption and secure, maintainable codebases. Additionally, he plans to
    expand his mentorship efforts by establishing a community coding boot‑camp for under‑represented youth, while gradually transitioning to selective consulting engagements that allow him to balance professional
    impact with family time.
