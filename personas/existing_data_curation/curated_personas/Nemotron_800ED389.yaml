personas:
  professional: Roger Tims, an aspiring multimedia creator, blends self‑taught sketching, digital illustration, beat‑making, and simple web design into community‑focused art projects, thriving on flexible,
    open‑ended assignments that satisfy their curious, relaxed, and occasionally disorganized workflow, and they relish the freedom to jump between mediums without strict deadlines.
  sports: Roger Tims, who spends weekends mastering tricks at the local skatepark and joining impromptu basketball pick‑up games at Memorial Park, they follow the Houston Rockets for basketball inspiration
    and root for the Astros during baseball season, yet they prefer low‑key, self‑directed workouts over structured gym sessions.
  arts: Roger Tims, who channels the lyrical flow of Kendrick Lamar and J. Cole into home‑studio beats while sketching cityscapes inspired by Banksy’s street murals and the graphic storytelling of the comic
    series ‘Saga’, they regularly share verses at intimate community‑center open‑mic nights, letting these creative influences shape their artistic identity.
  travel: Roger Tims, who favors spontaneous, low‑budget road trips along the Texas Gulf Coast—spending afternoons exploring Galveston’s beachfront art studios and wandering Austin’s vibrant mural corridors—while
    dreaming of a future backpacking adventure through Mexico’s cultural festivals, they plan travel that balances creative inspiration with flexible, unstructured itineraries.
  culinary: Roger Tims, who loves devouring smoky Texas‑style brisket tacos tossed with fresh cilantro and lime and experiments with quick loaded nachos using canned black beans, shredded cheddar, and jalapeños,
    they admit their cooking skill tops out at microwave hacks and occasional late‑night ramen bowls.
  core: Roger Tims, a curious 16‑year‑old who flips between sketching, beat‑making, and skateboarding, they thrive on solitary creativity, often leave a trail of half‑finished projects and empty soda cans,
    and they believe a spontaneous ride down the bike trail beats any rigid schedule.
background:
  cultural: Roger grew up in a predominantly African‑American neighborhood in Houston, where the blend of Southern traditions, hip‑hop culture, and a bustling multicultural cityscape shaped his identity.
    Family gatherings feature soul food, gospel music, and storytelling that fostered his appreciation for rhythm and visual expression. He draws inspiration from Houston’s historic Black art movements,
    local muralists, and musicians such as Beyoncé and Travis Scott, while also respecting the legacy of community leaders and civil‑rights activists from the Third Ward. His weekly attendance at a neighborhood
    church and regular participation in a community‑center art program reinforce values of resilience, collective pride, and the desire to give back through creative work. These cultural influences, combined
    with his curiosity, motivate him to create art that reflects both personal experience and broader community narratives.
attributes:
