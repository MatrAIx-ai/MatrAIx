  hobbies: '[''sketching and drawing'', ''digital illustration'', ''beat‑making and rap lyric writing'', ''skateboarding'', ''exploring street art'', ''playing narrative video games'', ''reading graphic
    novels'', ''journaling'', ''bike and skateboard repair for neighbors'', ''small‑group basketball games'']'
  career_goals: Roger wants to turn his artistic passions into a sustainable career while preserving the flexibility that matches his laid‑back, curiosity‑driven lifestyle. He plans to earn his GED within
    the next year, then enroll in a community‑college program in graphic design or multimedia production. He aims to build a portfolio of murals, album covers, and web designs that celebrate Black history
    and Houston neighborhoods. He prefers a path that allows him to experiment and take unconventional approaches, rather than a rigid corporate ladder. In the longer term he hopes to secure an apprenticeship
    with a local design studio or recording studio, eventually establishing his own modest studio where he can mentor other youth and collaborate on community‑focused art projects. He also envisions freelance
    work that lets him choose projects that spark his interest, balancing creative freedom with steady income.
