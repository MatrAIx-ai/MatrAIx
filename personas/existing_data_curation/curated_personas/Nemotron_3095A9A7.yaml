  hobbies: '[''gardening'', ''hiking'', ''birdwatching'', ''photography'', ''historical fiction reading'', ''crossword puzzles'', ''yoga'', ''knitting'', ''health‑fair volunteering'', ''book club participation'']'
  career_goals: Ingrid aims to advance into a charge nurse or nurse manager role within the next three years, leveraging her organizational strengths to improve unit efficiency and staff morale. She plans
    to complete a Bachelor of Science in Nursing (BSN) to broaden her clinical knowledge and pursue certifications in geriatric care and palliative care. Long‑term, she hopes to become a nurse educator
    or preceptor, sharing her practical wisdom with the next generation while developing stress‑reduction programs for healthcare workers, reflecting her sensitivity to workplace anxiety.
