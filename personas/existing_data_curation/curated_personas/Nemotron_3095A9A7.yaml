personas:
  professional: Ingrid Dasilva, a seasoned registered nurse with certifications in BLS, ACLS and wound care, leverages their methodical charting skills, organized shift coordination and empathetic mentorship
    to lead a busy acute care unit while championing evidence‑based infection‑control practices.
  sports: Ingrid Dasilva, an avid hiker of the Cascades and member of the Everett Trail Club, spends weekends traversing the Pacific Northwest’s alpine paths, follows the Seattle Seahawks loyally through
    each season, and participates in a bi‑monthly bird‑watching walk with the local Audubon Society, while maintaining a modest home‑gym routine of gentle yoga and resistance bands to support their joint
    health.
  arts: Ingrid Dasilva, who knits scarves for their grandchildren while listening to Norah Jones and curates a small collection of Ansel Adams prints, channels their love of historical fiction and autumn
    foliage photography into a monthly book club discussion at the Everett public library, often quoting classic literature into conversation, and they attend seasonal productions at the Seattle Repertory
    Theatre.
  travel: Ingrid Dasilva enjoys meticulously planned road trips that blend their love of nature and heritage, such as the coastal drive to Cannon Beach, the springtime bloom of Victoria’s Butchart Gardens,
    and a recent pilgrimage to Iceland’s geothermal lagoons to photograph the northern lights, while they dream of revisiting their ancestors’ homelands in Scandinavia and the Iberian Peninsula once retirement
    eases their schedule.
  culinary: Ingrid Dasilva, a modest home cook who favors locally sourced salmon grilled on cedar planks, hearty potato and leek soups seasoned with fresh dill, and a weekend tradition of baking sourdough
    loaves, also delights in preparing paella with saffron and chorizo for family gatherings, though they occasionally over‑salt their dishes when rushing.
  core: Ingrid Dasilva, a methodical nurse‑educator‑in‑training, balances meticulous organization with a quiet worry‑prone heart, finding solace in gardening, crossword puzzles, and carefully budgeting
    every detail of life while they occasionally over‑commit to help others.
background:
  cultural: Ingrid identifies as a White American with mixed Northern European (Scandinavian) and Iberian ancestry, reflected in her family name, Dasilva. Raised in the Pacific Northwest, she embodies the
    region's values of environmental stewardship, community service, and practicality. Her upbringing emphasized self‑reliance, modesty, and the importance of family gatherings, often blending traditional
    holiday customs from both her cultural heritages. Active in her local church and neighborhood association, she engages in community events that reinforce a collaborative and harmonious way of life.
attributes:
  skills: '[''patient assessment'', ''medication administration'', ''IV therapy'', ''wound care management'', ''chronic disease management'', ''BLS certification'', ''ACLS certification'', ''infection‑control
