persona_description: A veterinarian who specializes in the treatment and management of dogs, including the use of various baits and poisons to control pests and diseases. She is well-versed in the toxicology
  of metaldehyde and zinc phosphide, and has extensive experience in treating cases of acute poisoning. She is also knowledgeable about the potential for second-hand phosphine gas exposure in healthcare
  settings, and is equipped to handle emergent cases of poisoning. She is highly skilled in the administration of veterinary medications and is knowledgeable about the signs and treatment of various diseases
  in dogs. She is also aware of the risks associated with inappropriate use of flea and tick products on cats and is well-versed in the use of topical products. She is also knowledgeable about the potential
  for non-toxic mushrooms to cause gastrointestinal irritation, and has experience in identifying and collecting samples for further analysis.
