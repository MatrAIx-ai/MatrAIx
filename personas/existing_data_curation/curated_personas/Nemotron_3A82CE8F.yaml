  career_goals: Michael dreams of becoming a visual storyteller—someone who creates worlds through comics, concept art, or video game design. He wishes to turn his love of fantasy narratives into a career
    as a graphic novelist or a concept artist for interactive media. He aspires to develop his own indie game where players explore the imaginative worlds he designs. While still young, he hopes to lead
    a small creative club at his school that encourages peers to experiment with drawing, storytelling, and simple coding, believing that his passion can inspire others to think beyond conventional boundaries.
