personas:
  professional: Luis Acosta, a 22‑year‑old aspiring journeyman painter, combines a meticulous eye for color mixing with a flexible crew‑lead approach, translating simple floor plans into eco‑friendly decorative
    finishes while juggling unpredictable schedules and a habit of misplacing tools.
  sports: Luis Acosta, an avid weekend basketball player, regularly joins pick‑up games at the local park, hikes the Sandia Mountains with a group of friends, and roots for the Albuquerque Isotopes and
    the New Mexico Lobos, balancing a love for team sport competition with solo mountain cardio.
  arts: Luis Acosta expresses creativity beyond the paintbrush by attending Albuquerque’s thriving live‑music venues, where they adore the soulful sounds of local indie band The Floor Was Lava and the classic
    riffs of The Strokes, while also designing vibrant murals on community walls during free evenings.
  travel: Luis Acosta favors spontaneous road trips over rigid itineraries, having explored the towering cliffs of Moab, the art‑rich streets of Santa Fe, and a weekend getaway to Vancouver, yet dreams
    of backpacking through Patagonia when finances allow.
  culinary: Luis Acosta delights in cooking rustic, family‑style meals, often preparing a signature fire‑roasted corn salsa, a slow‑cooked pork shoulder stew, and hand‑rolled flatbreads seasoned with a
    personal blend of spices, while occasionally burning the garlic when juggling a paint job and a deadline.
  core: Luis Acosta blends a hands‑on painter’s precision with a carefree social spirit, juggling occasional disorganization, a love for communal activities, and a steadfast ambition to launch an eco‑friendly
    painting business.
background:
  cultural: Luis is a second‑generation Mexican‑American raised in Albuquerque’s vibrant Hispanic community. Bilingual in Spanish and English, he grew up celebrating traditions such as Día de los Muertos,
    Cinco de Mayo, and family gatherings centered around Mexican food and music. The blend of Mexican cultural values—family loyalty, hospitality, and community solidarity—with the Southwestern U.S. lifestyle
    shapes his work ethic, his love for community events, and his appreciation for regional art and cuisine.
attributes:
  skills: '[''interior painting'', ''exterior painting'', ''wall preparation'', ''surface sanding'', ''color mixing'', ''paint sprayer operation'', ''paper hanging'', ''drywall finishing'', ''basic carpentry'',
    ''reading simple floor plans'', ''team collaboration'', ''customer communication'', ''adherence to OSHA safety protocols'']'
  hobbies: '[''pick‑up basketball'', ''volunteering at cultural festivals'', ''cooking Mexican cuisine'', ''hiking in the Sandia Mountains'', ''listening to regional music (banda, norteño)'', ''DIY home
    improvement projects'', ''painting murals'', ''watching local sports events'']'
  career_goals: Luis aims to become a licensed journeyman painter and eventually obtain a small‑business contractor’s license so he can launch his own painting and paper‑hanging service in Albuquerque.
    He plans to specialize in eco‑friendly paint applications and decorative finishes, develop leadership skills to manage crews, and mentor younger workers from his community while maintaining a work schedule
    that offers enough flexibility for his social life.
