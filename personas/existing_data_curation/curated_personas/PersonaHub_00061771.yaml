persona_description: A researcher and engineer working on the development of new propulsion technologies for spacecraft, particularly the concept of magnetized-beam plasma propulsion (mag-beam) that could
  potentially cut travel time to and from Mars and other distant parts of the solar system. The individual is a professor at the University of Washington and has led a project to develop mag-beam, which
  involves generating a stream of magnetized ions that interact with a magnetic sail on a spacecraft to propel it through the solar system at high speeds. The individual is also interested in developing
  other plasma propulsion concepts and has previously led efforts to develop a system called mini-magnetospheric plasma propulsion that uses a plasma bubble around a spacecraft and sail on the solar wind.
  The individual is working on ways to make mag-beam practical by placing smaller plasma units around the solar system and has estimated that a control nozzle 32 meters wide would generate a plasma beam
  capable of propelling a spacecraft at 11.7 kilometers per second, which would translate to more than 26,000 miles an hour or more than 625,000 miles a day.
