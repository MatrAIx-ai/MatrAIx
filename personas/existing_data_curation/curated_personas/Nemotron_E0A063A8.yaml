  career_goals: Sharnise aims to launch her own boutique home‑renovation and artistic painting studio that specializes in bespoke murals for local businesses and historic homes in Walton County. She plans
    to earn certifications in eco‑friendly paints, develop a mentorship program for women of color entering the trades, and eventually teach a community‑college course on decorative painting. Long‑term,
    she hopes to secure a community arts grant to create a public art mural series celebrating African‑American heritage in Monroe.
