personas:
  professional: Sharnise Zackery, a decorative painter and mural specialist in Walton County, blends masterful hand‑painting techniques with rigorous project management, using their vivid imagination and
    methodical reliability to deliver custom interior murals that transform historic homes and local businesses.
  sports: Sharnise Zackery, an avid hiker on the Piedmont trails and member of the Walton County Trailblazers Hiking Club, they follow the Miami Heat and Tampa Bay Buccaneers, and they stay active through
    weekly pickleball matches at the local community center.
  arts: Sharnise Zackery, an active participant in a community theater troupe and church choir, they find inspiration in the abstract expressionism of Jackson Pollock and Mark Rothko, they frequent gallery
    openings featuring local artist Marcus Rivera, and they unwind to the improvisational jazz of Kamasi Washington.
  travel: Sharnise Zackery, a methodical yet adventure‑seeking traveler, they map out weekend road trips to historic Southern towns like Savannah and New Orleans while they dream of immersive journeys to
    Marrakech’s souks and Kyoto’s temples, they balance travel costs through a dedicated savings account and often they weave art‑focused workshops into their itineraries.
  culinary: Sharnise Zackery, a garden‑to‑table enthusiast, they harvest sweet potatoes, okra, and heirloom tomatoes to craft Southern comfort dishes such as shrimp and grits with miso glaze and fried green
    tomatoes topped with harissa aioli, they showcase an experimental cooking style that blends regional flavors with global twists.
  core: Sharnise Zackery blends boundless artistic imagination with meticulous project planning, yet they can’t resist buying extra brushes and paint tubes even when their studio shelves are already overflowing.
background:
  cultural: Sharnise is an African‑American woman whose roots trace back to generations of Southern laborers and community leaders in Georgia. Raised in a close‑knit church community in Monroe, she grew
    up with gospel music, storytelling, and the tradition of Southern hospitality. Her cultural identity is shaped by the legacy of the Harlem Renaissance, African‑American folk art, and local crafts such
    as quilting and folk mural painting. She actively participates in Juneteenth celebrations, Gullah heritage events, and church outreach programs, drawing inspiration from these experiences for her artistic
    work and mentoring efforts.
