  career_goals: Maria aims to translate her passion for art and community into a part‑time role as a cultural program coordinator for her local library or community center, where she can design and lead
    exhibitions, artist talks, and hands‑on workshops. She also dreams of launching a modest gallery‑plus‑online platform that showcases regional artists and offers curated art‑themed events. To expand
    her influence, she plans to start a blog and occasional podcast focused on Midwestern art and cultural history. Completing a bachelor's degree in arts administration is on her longer‑term agenda, enabling
    her to take on larger leadership roles in nonprofit arts organizations.
