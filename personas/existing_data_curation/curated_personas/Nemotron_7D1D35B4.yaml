personas:
  professional: Maria Mcclendon, a 53‑year‑old community‑oriented event coordinator, merges her business administration acumen, deep art‑history knowledge, and charismatic public speaking to design immersive
    cultural programs for the local library while planning a modest regional gallery and online showcase, and they leverage their competitive drive to secure funding and partnerships.
  sports: Maria Mcclendon follows the Chicago Bears and Chicago Cubs with unwavering enthusiasm, plays weekly tennis matches with the Midwestern Senior Tennis Club, and they join a local walking group that
    meets every Saturday to explore historic neighborhoods, blending competitive spirit with a love for community camaraderie.
  arts: Maria Mcclendon curates watercolor exhibitions inspired by Georgia O'Keeffe and prairie landscapes, volunteers as stage manager at the community theater where they admire performances of Lin‑Manuel
    Miranda’s *Hamilton*, and they regularly discuss Monet, Warhol, and emerging Midwestern artists like Jenna Hayes in their book club.
  travel: Maria Mcclendon delights in weekend road trips to historic Route 66 stops such as the restored Dodge Garage in Illinois, dreams of a summer pilgrimage to the art‑rich streets of Florence, Italy,
    and the vibrant festivals of Oaxaca, Mexico, and they balance a limited travel budget with careful planning and occasional spontaneous detours.
  culinary: Maria Mcclendon experiments with Moroccan tagine, Japanese ramen, and Ethiopian injera, sourcing fresh saffron, miso, and teff at local farmers’ markets, and they host themed dinner parties
    where guests enjoy paired wines and a signature beet‑and‑goat‑cheese salad, reflecting their meticulous yet sometimes overly ambitious cooking style.
  core: Maria Mcclendon, a talkative and competitive 53‑year‑old art lover, turns every social gathering into a curated cultural experience, obsessively tracks spending on art supplies while occasionally
    neglecting personal exercise, and they thrive on being the energetic heart of community projects, even when their skeptical edge clashes with group consensus.
background:
  cultural: Maria was raised in Mendon, a small, predominantly white town in Adams County, Illinois, where Midwestern values of community engagement, modesty, and self‑reliance were central to daily life.
    Her family has deep roots in the region, with generations of farmers and small business owners, fostering a strong sense of civic duty and practicality. While she cherishes these local traditions, Maria’s
    curiosity pushes her to explore broader cultural experiences through art, travel, and diverse cuisines, creating a blend of grounded Midwestern heritage and an outward‑looking appreciation for varied
    ideas and creative expression.
