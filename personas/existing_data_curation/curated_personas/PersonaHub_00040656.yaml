persona_description: A researcher at the UK's Health & Safety Laboratory who specializes in the study of aerosolized human-to-human transmission of norovirus, particularly in the context of simulation and
  modeling. They have conducted studies on the extent to which the surrounding environment becomes contaminated when an individual vomits, and have developed a humanoid simulated vomiting system affectionately
  known as "Vomiting Larry". They have published studies that contribute to reviews of healthcare guidance in hospitals and are due to be published in relevant journals in the near future.
