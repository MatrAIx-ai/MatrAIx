personas:
  professional: Troy Urraro, a retired automotive veteran turned community mentor, leverages mechanical know‑how and carpentry skills to coordinate senior‑center projects, guide youth volunteers, and collaborate
    on a Kenosha industrial history exhibit, blending practical problem‑solving with a storyteller’s curiosity.
  sports: Troy Urraro spends spring mornings fishing on Lake Michigan, joins a weekly shuffleboard league at the Kenosha senior center, and loyally roots for the Milwaukee Brewers during baseball season
    and the Green Bay Packers in the fall.
  arts: Troy Urraro’s evenings echo with classic rock from The Rolling Stones and smooth jazz from Miles Davis, while they unwind playing Bridge at the community center and often attend Kenosha Historical
    Society lectures featuring local authors and regional folklore.
  travel: Troy Urraro prefers short, low‑stress road trips to destinations like Door County’s lighthouses and Chicago’s Art Institute, yet they are saving for a modest ten‑day pilgrimage to a Mediterranean
    town where their forebears once lived, to connect with family roots.
  culinary: Troy Urraro delights in cooking garden‑fresh ratatouille with zucchini, tomatoes, basil, and garlic, grilling Lake Michigan perch with lemon butter on summer evenings, and rewarding themselves
    with a slice of homemade apple pie after a successful woodworking project.
  core: Troy Urraro blends a maker’s pragmatism with a storyteller’s curiosity, juggling a thriving garden, a woodworking bench, and a family photo album, while habitually forgetting to water indoor ferns
    until the last moment.
background:
  cultural: Troy comes from a Midwestern, Italian‑American background. His grandparents emigrated from Southern Italy to the industrial neighborhoods of Kenosha, bringing with them traditions of Sunday
    family meals, Catholic holidays, and a love of storytelling. Growing up, Troy blended these Italian customs with the practical, community‑oriented values of the American Midwest. He primarily speaks
    English, but occasionally slips in Italian phrases learned from his family. He remains actively involved in the local parish, the Kenosha Historical Society, and neighborhood gardening clubs, embodying
    both his heritage and the collaborative spirit of his region.
