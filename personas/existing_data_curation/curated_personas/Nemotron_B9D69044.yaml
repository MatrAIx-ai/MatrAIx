  career_goals: Although retired, Troy aims to stay intellectually active and socially contributing. He plans to document his family’s Italian‑American heritage in a memoir, mentor volunteers at the local
    senior center, and support his grandchildren’s education through tutoring and financial advice. He also hopes to collaborate with the Kenosha Historical Society on a small exhibit about the city’s industrial
    past and to take a modest trip to Italy to explore his ancestral roots, all while maintaining his health and independence.
