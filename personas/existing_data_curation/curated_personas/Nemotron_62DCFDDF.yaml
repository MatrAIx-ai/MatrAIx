  career_goals: Neil aims to move into a senior leadership role within his agency, targeting a regional sales manager position within the next three years. He also aspires to launch his own independent
    insurance brokerage, capitalizing on his extensive client network and deep product knowledge. Achieving top-seller recognition at the state level and mentoring a new generation of agents are key milestones
    for him. Ultimately, he seeks a financially secure retirement that allows him to maintain a flexible schedule and reduce the stress associated with performance pressure.
