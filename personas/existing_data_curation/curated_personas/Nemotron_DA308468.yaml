personas:
  professional: Sunny Gillam, an aspiring junior mystery writer, leverages a methodical love for puzzles, a disciplined daily journaling habit, and a structured approach to research to craft intricate plot
    twists while balancing quiet solo writing sessions with occasional collaborative brainstorming in their Girl Scouts troop.
  sports: Sunny Gillam, who lives in a small Midwestern suburb, avidly follows the Chicago Cubs baseball team, supports the Chicago Bears football squad, and spends Saturday mornings training with the Oakwood
    Tigers youth soccer club, while also joining weekend nature walks with their family to stay active.
  arts: Sunny Gillam devotes an hour each evening to practicing piano pieces by Ludwig van Beethoven and Yiruma, discovers inspiration in the storytelling of author Rick Riordan, enjoys the animated musical
    numbers of Disney's 'Moana', and often rehearses scenes from the stage adaptation of 'Anne of Green Gables' for school talent shows.
  travel: Sunny Gillam delights in family weekend trips to the nearby Great Smoky Mountains National Park, has taken a school field trip to Washington, D.C.'s Smithsonian museums, and dreams of exploring
    the historic streets of Edinburgh, Scotland, while insisting on meticulously planning each itinerary in their journal to avoid unexpected surprises.
  culinary: Sunny Gillam enjoys helping their mom bake chocolate chip cookies with dark chocolate chunks and sea salt, loves assembling homemade vegetable stir‑fry with broccoli, carrots, and soy sauce,
    and occasionally tries their hand at creating a simple spaghetti carbonara using pancetta, parmesan, and eggs, though they sometimes forget to set a timer and overcook the pasta.
  core: Sunny Gillam is a detail‑oriented, worry‑prone eleven‑year‑old who balances a love for structured puzzles and creative pursuits with a generous heart and a habit of over‑organizing every part of
    their day.
background:
  cultural: Sunny comes from a white, middle‑class family in Durant, Oklahoma. Her upbringing reflects the close‑knit community of southeast Oklahoma, with regular involvement in church gatherings, school
    events, and local traditions such as the Bryan County Fair and high‑school football Saturdays. Family meals often feature regional dishes, and she values the small‑town spirit, community cooperation,
    and respect for local history that shape her worldview.
attributes:
  skills: '[''Organized note-taking'', ''Time management for school assignments'', ''Basic computer skills (typing, internet research)'', ''Pet care (feeding and grooming a family dog)'', ''Puzzle solving
    and LEGO building'', ''Journaling and reflective writing'']'
  hobbies: '[''Reading chapter books'', ''Building LEGO sets'', ''Puzzle solving (jigsaw, Sudoku)'', ''Playing piano'', ''Journaling'', ''Girl Scouts activities'', ''Nature walks and park exploration'']'
  career_goals: Sunny aspires to become an elementary school teacher, where she can create a structured and supportive classroom environment. She aims to study education in college, develop lesson plans
    that help students thrive, and later mentor younger children in community programs. She also expresses interest in working with animals as a veterinary assistant, combining her love for pets with a
    desire to help others.
