  career_goals: Maria Rosa aims to advance to a lead engineer role within the next two years, focusing on guiding architecture decisions for high‑traffic, bilingual platforms. She plans to obtain the AWS
    Solutions Architect Associate certification and later transition into engineering management, where she can shape team processes, champion rigorous development standards, and drive inclusive hiring
    practices. Her long‑term ambition is to become a director of engineering championing products that serve Spanish‑speaking communities across the United States. She also aspires to win regional hackathons,
    present at tech conferences on secure, culturally‑aware development, and establish a mentorship program that connects Mexican‑American women with industry opportunities.
