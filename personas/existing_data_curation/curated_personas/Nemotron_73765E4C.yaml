personas:
  professional: Roger Conner, a 59‑year‑old self‑taught IT specialist, leverages three decades of hardware repair, networking, and basic Python and PowerShell scripting to run a flexible consulting practice
    that offers affordable tech support and hands‑on digital‑media workshops for small businesses and seniors in Dixon, while they favor spontaneous problem‑solving over rigid deadlines and rely on their
    patient, clear‑communication style to guide non‑technical clients through projects.
  sports: Roger Conner, an avid fisherman and casual runner, roots for the Dallas Cowboys and the Houston Astros, participates in the Lee County Senior Fitness Club’s weekly walking group, and joins a local
    community softball league during the summer, while they also enjoy occasional fly‑fishing trips on the nearby river.
  arts: Roger Conner, a watercolor painter who captures Lee County’s rolling pastures in soft washes, studies the pastel tones of Claude Monet and the realism of Andrew Wyeth, experiments with Ansel Adams‑style
    black‑and‑white photography using a vintage SLR, enhances images with Photoshop and GIMP, and regularly attends exhibitions featuring contemporary Southern artists like Jessamyn Kelsey, all while they
    quote Ray Bradbury and Plato in their sketchbook margins.
  travel: Roger Conner prefers quiet, reflective road trips, having already driven to Sedona, Arizona for sunrise hikes and to Asheville, North Carolina for its vibrant arts scene, while dreaming of photographing
    the sunrise over Machu Picchu and strolling through the cherry blossoms in Kyoto, they favor last‑minute lodging that fits a flexible schedule and modest budget.
  culinary: Roger Conner enjoys rustic home‑cooked meals, often growing heirloom tomatoes and basil in their garden to make fresh marinara, grilling river‑caught catfish with a honey‑lime glaze, and occasionally
    whipping up a skillet ratatouille flavored with Provençal herbs, yet they reluctantly admit a habit of over‑indulging in sugary coffee pastries during late‑night editing sessions.
  core: Roger Conner is a 59‑year‑old tech‑savvy artist who blends DIY electronics with watercolor landscapes, volunteers at the library, worries about deadlines, and cherishes spontaneous creativity despite
    occasional disorganization.
background:
  cultural: Roger grew up in a working-class, Midwestern family of German-Irish descent in Illinois. The community emphasized self-reliance, modesty, and a strong sense of neighborly responsibility. Church
    gatherings, county fairs, and family reunions fostered a cultural rhythm rooted in tradition and communal harmony. Although his formal schooling ended before the ninth grade, he accessed public library
    resources and community college night classes, shaping a lifelong habit of self-directed learning. The values of humility, cooperation, and practical problem-solving ingrained in his upbringing coexist
    with his curiosity about new ideas, allowing him to blend conventional Midwestern sensibilities with an open-minded, artistic outlook.
attributes:
  skills: '["Computer hardware troubleshooting and repair", "Network configuration and troubleshooting", "Basic scripting in Python and PowerShell", "Digital image editing (Photoshop, GIMP)", "Retro computer
    restoration", "Technical customer support", "Volunteer workshop facilitation", "Creative problem solving", "Integration of art and technology", "Self-directed learning"]'
  hobbies: '["Watercolor painting and sketching", "Nature photography with vintage SLR", "DIY electronics (Raspberry Pi, Arduino)", "Reading science-fiction and philosophy", "Attending local art exhibitions",
    "Gardening", "Fishing", "Volunteer computer literacy workshops"]'
  career_goals: Roger aims to formalize his expertise by earning entry-level certifications such as CompTIA A+ and Security+ to broaden his service offerings. Over the next five years he plans to launch
    a small consulting firm that provides affordable IT support and digital-media workshops for local businesses and seniors in Dixon. He also hopes to develop a community program that merges technology
    with the arts, teaching participants how to create and edit visual content using inexpensive hardware like Raspberry Pi. Balancing his desire for creative freedom with a need for lower stress, Roger
    seeks a schedule that allows him to work at his own pace, avoid high-pressure deadlines, and spend more time mentoring youth interested in tech and art.
