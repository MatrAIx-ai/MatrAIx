  career_goals: Jose aims to earn his GED within the next year and enroll in a vocational training program, preferably in electrical or automotive technology, where he can combine his mechanical curiosity
    with a reliable trade. He also hopes to expand his web development skills to create bilingual online resources for local community organizations. In the long term, he envisions securing a stable, well‑paid
    trade job that allows him to support his family financially while giving him time to pursue his personal projects, such as a small electronics repair side business or an online art portfolio.
