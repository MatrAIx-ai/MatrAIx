personas:
  professional: Jose Atencio, a budding technophile with hands-on hardware troubleshooting skills and introductory web development experience, blends curiosity and practicality by pursuing vocational training
    in electrical and automotive technology while building bilingual community websites.
  sports: Jose Atencio enjoys coaching kids at the neighborhood Eastside Soccer Club, plays pickup basketball after school, follows the LA Galaxy in MLS and the Los Angeles Lakers in the NBA, and maintains
    a flexible fitness routine that mixes weekend bike rides with occasional strength-training sessions.
  arts: Jose Atencio immerses themselves in digital storytelling inspired by Stan Lee, Alex Ross, and Nina Paley, while listening to Los Tigres del Norte and classic anime films by Hayao Miyazaki, and spends
    evenings editing gameplay footage into short videos using mobile apps.
  travel: Jose Atencio prefers budget-friendly road trips with family, having explored the coastal city of San Diego and the music scene in Austin, while dreaming of a future solo adventure to Tokyo for
    anime conventions and to Barcelona for its vibrant street art.
  culinary: Jose Atencio enjoys cooking family meals, skillfully preparing carnitas tacos, chicken tamales, and fresh salsa verde with plenty of cilantro and lime, and often experiments with homemade guacamole
    using ripe avocados.
  core: Jose Atencio balances a quiet, methodical mindset with a love for immersive strategy games, often staying up late polishing digital comics while occasionally forgetting to water their houseplants.
background:
  cultural: Jose grew up in a Mexican‑American household on Phoenix’s Southwest side. Spanish is spoken at home, while English is used at school and in the community, making him fully bilingual. His family
    celebrates Mexican traditions such as Día de los Muertos, Mexican Independence Day, and enjoys gatherings centered around dishes like pozole and tamales. He participates in his local Catholic parish,
    where community service and festivals reinforce his sense of harmony and cooperation. The strong family and neighborhood ties within the Phoenix Mexican community shape his values of respect, kindness,
    and collective responsibility.
