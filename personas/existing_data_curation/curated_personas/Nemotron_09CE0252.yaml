  career_goals: Beth dreams of a future where she can combine her love of art and curiosity about the world. She aspires to become a children's author and illustrator who creates picture books that make
    science and nature exciting for other kids. She also imagines working as a museum educator or wildlife illustrator, using her artistic skills to share knowledge and inspire curiosity in young audiences.
