  hobbies: '["Hiking", "Camping", "Live Music", "Intramural Volleyball", "Community Theater", "Yoga", "Meditation", "Cooking", "Photography", "Animal Shelter Volunteering", "DIY Crafts", "Podcast Listening"]'
  career_goals: Mary aims to enroll in a community‑college program that leads to a bachelor's degree in Environmental Science or Community Development, leveraging her love for the outdoors and desire to
    enhance local quality of life. She aspires to work in a role that blends public engagement with sustainable initiatives—such as a non‑profit program coordinator for environmental education, a community
    outreach specialist for a regional park, or an event manager for cultural festivals. Long‑term, she envisions leading projects that foster community cohesion while integrating innovative green practices,
    and she hopes to eventually mentor younger volunteers, drawing on her calming resilience and collaborative spirit.
