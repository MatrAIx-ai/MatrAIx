  hobbies: '[''Cooking'', ''Gardening'', ''Reading (Romance and Self-Help)'', ''Streaming TV Shows'', ''Yoga'', ''Dog Walking'', ''Volunteer Work (Community Center)'', ''Knitting'', ''DIY Home Decor'']'
  career_goals: Kamela aims to advance from her current administrative support role to an office manager or operations coordinator position within the next three to five years. She plans to obtain a Microsoft
    Office Specialist certification and complete an associate degree in business administration at a community college, which will give her deeper knowledge of project management, human resources basics,
    and budgeting. She also aspires to lead a small team, improve office efficiency through process improvements, and eventually explore starting her own virtual administrative consulting service that offers
    flexible support to small businesses, allowing her to balance professional growth with family life.
