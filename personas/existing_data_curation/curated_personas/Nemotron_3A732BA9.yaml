  career_goals: Although currently not in the formal workforce, Jihad aims to channel his expertise into a low‑key, part‑time consulting service that offers handyman assistance to seniors and small‑business
    owners in his neighborhood. He also hopes to launch a mentorship program that pairs high‑school students with skilled tradespeople, allowing him to pass on his practical knowledge. Over the next few
    years he plans to become a recognized community elder—leading safety initiatives, organizing local festivals, and advocating for accessible resources for older adults. Continuing his curiosity, he intends
    to attend workshops on sustainable building practices and maintain his health by participating in community fitness events, such as the annual 5K walk/run with his family.
