personas:
  professional: Jihad Jupiter, a seasoned handyman consultant, blends decades of carpentry, plumbing, and automotive repair with methodical project planning and a competitive drive to deliver reliable,
    hands‑on solutions for seniors and local businesses, and they pride themselves on a reputation for getting the job done right.
  sports: Jihad Jupiter stays active by captaining a local adult softball league, cheering on the Carolina Panthers on Sundays, and joining the seasonal 5K walk/run organized by the community health group,
    where their competitive spirit pushes them to beat personal times, and they relish the camaraderie of team sport.
  arts: Jihad Jupiter expresses their artistic side through gospel choir performances, a passion for blues legends like B.B. King and jazz greats like Miles Davis, and capturing neighborhood scenes with
    their DSLR, often framing photos in a black‑and‑white style reminiscent of Gordon Parks, and they consider each image a tribute to the community’s everyday poetry.
  travel: Jihad Jupiter prefers purposeful road trips to historic Southern towns such as Savannah, Charleston, and New Orleans, planning each itinerary around heritage tours, local soul‑food joints, and
    photo opportunities, while saving for a future pilgrimage to the National Museum of History and Culture in Washington, D.C., because they see travel as a living classroom.
  culinary: Jihad Jupiter, an avid home cook, crafts soul‑food classics like smoked collard greens, buttermilk fried chicken, and sweet potato casserole, often seasoning with smoked paprika, fresh rosemary
    from their garden, and a dash of hot sauce, and they take pride in serving each dish as a celebration of community and tradition.
  core: Jihad Jupiter balances a competitive handyman hustle with a community‑first heart, never missing a neighborhood watch shift, yet habitually hoards vintage tools in the garage, even when space is
    tight, because they find comfort in being prepared for any job.
background:
  cultural: Jihad grew up in a tightly knit African‑American community in the Piedmont region of North Carolina, where church, family gatherings, and community service formed the core of daily life. His
    parents were part of the post‑World War II migration that settled families in Guilford County, bringing with them traditions of gospel music, Southern cuisine, and a deep respect for oral history. The
    legacy of the civil‑rights era, coupled with the rich heritage of High Point’s furniture‑making and African‑American entrepreneurial spirit, has shaped his identity. He continues to honor his cultural
    roots through participation in Juneteenth celebrations, church events, and mentoring younger community members, while also preserving family recipes and stories that link past generations to the present.
