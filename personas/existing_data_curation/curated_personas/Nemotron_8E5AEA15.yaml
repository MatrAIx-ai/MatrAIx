  career_goals: Peggy dreams of becoming an artist who paints stories, a storyteller who writes books, or a curious explorer who discovers new worlds. She is fascinated by abstract ideas and wishes to create
    things that surprise and delight. She aspires to bring joy to others through her imagination, envisioning a future where she can explore new forms of art, storytelling, and playful discovery.
