  career_goals: Beatrice aims to leverage her organizational talents and love for the arts by becoming a board member of the Jefferson County Arts Council, where she can help design and implement community
    art programs. She aspires to launch a weekly art‑therapy workshop for seniors at the local community center, drawing on her background in creative facilitation. Additionally, she plans to complete a
    certificate in museum studies through a nearby community college and to mentor younger volunteers interested in event planning and cultural projects.
