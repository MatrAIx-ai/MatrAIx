personas:
  professional: Reynaldo Marulanda, a retired small-business strategist, applies their decades-long expertise in strategic planning, budgeting, and operational efficiency to volunteer leadership, balancing
    meticulous organization with the flexibility to nurture community partnerships, and they mentor emerging entrepreneurs with compassion and steady composure.
  sports: Reynaldo Marulanda enjoys low-impact fitness through daily walks around the desert foothills, participates in senior pickup basketball at the local community center, and they follow the Las Vegas
    Golden Knights and the Las Vegas Raiders with a modest weekly habit of watching games on television.
  arts: Reynaldo Marulanda, an avid watercolorist, spends their weekends sketching the Mojave landscape, curates intimate exhibitions at the Nevada Museum of Art, and they draw inspiration from Georgia
    O'Keeffe, Claude Monet, and the vibrant murals of Diego Rivera, while listening to the bachata of Juan Luis Guerra for creative spark.
  travel: Reynaldo Marulanda prefers culturally rich, low-key trips such as the colonial streets of San Miguel de Allende, the historic plazas of Seville, and the art-filled neighborhoods of Santa Fe, planning
    each journey meticulously to stay within their modest budget and they often travel with their adult children to share family stories.
  culinary: Reynaldo Marulanda delights in preparing traditional baleadas and tamales using fresh cilantro, oregano, and epazote from their garden, and they cook with a moderate skill level that balances
    authentic flavors with occasional experimental twists like adding roasted poblano to the filling.
  core: Reynaldo Marulanda blends disciplined business acumen, artistic curiosity, and a quietly compassionate spirit into a life of purposeful mentorship, modest indulgences, and steady community involvement.
background:
  cultural: Born and raised in Honduras, Reynaldo carries the warmth of Central American family values, a strong sense of comunidad, and the Catholic traditions of his upbringing. After relocating to Las
    Vegas, he has blended his heritage with American life, maintaining fluency in Spanish while embracing English. He actively participates in local Honduran cultural associations, celebrating holidays
    such as Día de la Independencia and Semana Santa, and promotes cultural exchange through community events. His background informs his compassionate outlook, emphasizing respect, cooperation, and the
    importance of preserving cultural identity within a multicultural environment.
attributes:
  skills: '[''Strategic business planning'', ''Financial budgeting and analysis'', ''Operational management'', ''Bilingual communication (Spanish/English)'', ''Cross‑cultural negotiation'', ''Community
