personas:
  professional: Van Phan is an aspiring robotics prototyper who blends methodical planning with hands-on curiosity, leading school club projects while coordinating teammates with organized detail.
  sports: Van Phan plays forward on the Eastside High School Tigers soccer team and point guard for the school's basketball squad, devotes evenings to conditioning for weekend league games, cheers on Manchester
    United and the Los Angeles Lakers, and logs weekly hikes on the nearby Pine Ridge Trail to stay fit.
  arts: Van Phan creates digital flyers for school clubs inspired by the bold colors of graphic designer Malika Favre, sketches indie-rock album covers echoing the aesthetic of Tame Impala, and relaxes
    by streaming upbeat V-pop hits and indie tracks from Arctic Monkeys.
  travel: Van Phan plans weekend getaways with friends by mapping affordable bus routes to nearby state parks such as Willow Creek, enjoys hiking local trails, and dreams of backpacking through the lantern-lit
    streets of Hoi An and the neon alleys of Tokyo during school holidays.
  culinary: Van Phan enjoys cooking fragrant pho broth with star-anise and ginger, mastering crispy spring rolls for family celebrations, and experimenting with lemongrass-marinated chicken tacos, all while
    rating their dishes on a shared family cooking blog.
  core: Van Phan is a methodical teen who channels curiosity into robotics, balances a disciplined budget, manages asthma with proactive habits, thrives in team sports, blends digital art with V-pop beats,
    and cooks traditional meals with a modern twist.
background:
  cultural: Van Victor is a second‑generation Vietnamese‑American raised in Garden Grove’s vibrant Little Saigon community. His family maintains strong ties to Vietnamese traditions—celebrating Tet, preparing
    bánh chưng, and observing Buddhist festivals—while also embracing the multicultural, suburban life of Orange County. Bilingual at home, he navigates both American school culture and his heritage’s emphasis
    on respect for elders, community responsibility, and hard work. This dual cultural lens shapes his worldview, encouraging him to honor his roots while seeking innovative ways to contribute to the broader
    society.
