personas:
  professional: Mary Baskin, a 16-year-old aspiring health-information technician, blends a hands-on curiosity for simple electronics with a practical knack for organizing school records, even though they
    sometimes forget to file paperwork on time, and they thrive in small-group volunteer settings where their cooperative nature shines.
  sports: Mary Baskin enjoys weekend nature walks at Shawnee Hills State Park and occasionally jogs with a local youth track club, while cheering on the St. Louis Cardinals baseball team and the Chicago
    Bears football team, though they rarely join organized school sports due to a preference for solitary exercise.
  arts: Mary Baskin immerses themselves in R&B and gospel playlists featuring artists like Aretha Franklin, H.E.R., and Kirk Franklin, sketches neighborhood scenes with graphite pencils, and reads contemporary
    YA novels such as 'The Hate U Give' alongside biographies of pioneering figures, and they use these creative outlets to unwind after school.
  travel: Mary Baskin dreams of visiting the Grand Canyon and the historic streets of New Orleans, but currently plans low-cost weekend trips to nearby state parks like Shawnee Hills and occasional family
    visits to Chicago, and they balance a limited budget with a love for both adventure and familiar surroundings.
  culinary: Mary Baskin cooks traditional Southern comfort meals such as fried catfish, collard greens, and peach cobbler, while experimenting with new recipes like gumbo featuring okra and smoked turkey,
    and they relish sourcing fresh herbs and sweet potatoes at the local farmers market.
  core: Mary Baskin is a curious, hands-on teen who balances solitary creativity with community-oriented caring, often juggling disorganized habits with a steady, resilient spirit, and they remain determined
    to turn their curiosity into a future career.
background:
  cultural: Mary is an African American teenager raised in Cape Girardeau, Missouri, within a tight-knit Black community that values family, church, and cultural heritage. Her family’s roots trace back
    to the Great Migration, and she grew up with traditions such as Sunday gospel services, soulful cooking (collard greens, cornbread, fried chicken), and storytelling that honors Black resilience. These
    cultural influences shape her worldview, encouraging a sense of community responsibility and an appreciation for both historical legacy and contemporary Black art forms.
