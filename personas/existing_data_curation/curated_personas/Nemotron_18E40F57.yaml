  career_goals: Mary aims to complete her GED within the next two years and then enroll in a community college program focused on health information technology or nursing assistance. She is motivated by
    a desire to help her community in a practical, hands-on way, and she hopes to secure a stable position as a medical records technician or a certified nursing assistant. Additionally, she remains open
    to exploring skilled trades, such as automotive or HVAC repair, that align with her curiosity for hands-on work and allow flexible scheduling.
