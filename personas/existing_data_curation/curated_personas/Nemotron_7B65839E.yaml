personas:
  professional: Shayd Kiner, a seasoned metal‑and‑wood fabricator turned mentor, blends precise welding, CNC machining, and blueprint interpretation with an imaginative, organized, and collaborative approach,
    and they guide apprentices while ensuring safe, efficient workshop practices.
  sports: Shayd Kiner, an avid member of the Dorchester Walking Club, enjoys brisk morning walks and supports the Boston Red Sox and Boston Celtics, and they often attend games as a social outing after
    a seasonal jog.
  arts: Shayd Kiner, a passionate sketcher and metal sculptor who frequents community theater productions starring local talent like Maria Alvarez, draws inspiration from artists such as M.C. Escher and
    Georgia O’Keeffe, and they participate in weekly workshops that blend speculative fiction themes from Neil Gaiman and Ursula K. Le Guin into visual art.
  travel: Shayd Kiner, a methodical planner who prefers weekend road trips to New England gems like Provincetown, the historic streets of Salem, and the garden terraces of Portland, Maine, and they dream
    of a cultural pilgrimage to Kyoto’s art districts once retirement frees up more time.
  culinary: Shayd Kiner, a competent home cook with a penchant for hearty New England fare, often whips up clam chowder with fresh clams, thyme, and potatoes, savors roasted beet and goat‑cheese salads
    harvested from their modest garden, and they indulge in occasional experimental dishes like smoked paprika‑glazed pork ribs.
  core: Shayd Kiner, the inventive 61‑year‑old craftsman who swaps a morning espresso for an extra coffee break, forgets appointments when a new metal‑working idea sparks, yet they never let a day pass
    without sketching something abstract.
background:
  cultural: Shayd comes from a working‑class New England family with deep roots in Dorchester. His ancestors were Irish immigrants who settled in the Boston area in the early 20th century, fostering a strong
    sense of community, neighborly support, and a tradition of skilled manual labor. Growing up in a neighborhood where church gatherings, local festivals, and collective projects were common, he internalized
    a blend of Irish‑American cultural practices and broader New England maritime heritage. This background informs his appreciation for craftsmanship, community involvement, modesty, and cooperative values.
