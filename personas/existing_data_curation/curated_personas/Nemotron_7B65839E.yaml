  hobbies: '[''Sketching'', ''Metal sculpture'', ''Painting'', ''Model kit building'', ''Community theater'', ''Walking club'', ''Volunteer craft workshops'', ''Reading speculative fiction'', ''Gardening'',
    ''Board games'']'
  career_goals: Shayd aims to transition from full‑time assembly work to a part‑time mentorship role at a local trade school, where he can pass his craftsmanship to the next generation. He also dreams of
    opening a modest studio to produce handcrafted metal‑and‑wood art pieces that reflect his love of abstract design, and to showcase these works in community exhibitions. Over the next few years he hopes
    to lead a community arts initiative that connects local artisans, while eventually retiring with a legacy of mentorship and small‑scale artistic contributions to Dorchester.
