personas:
  professional: Minerva Collado, a seasoned credit counselor and loan originator, channels her methodical analytical mindset, bilingual fluency, and curiosity for fintech tools into crafting precise credit
    risk assessments and visually engaging financial literacy workshops that empower Spanish‑speaking families while assertively guiding them toward sound borrowing decisions.
  sports: Minerva Collado stays fit by trail‑hiking the San Bernardino foothills with the local San Bernardino Hiking Group, attending weekly Vinyasa classes at Yoga Works, cheering on the LA Dodgers in
    spring and the LA Lakers in winter, and occasionally training for a 5K charity run each autumn.
  arts: Minerva Collado nurtures their artistic side by attending gallery openings featuring renowned painters such as Frida Kahlo and Luis Cruz, taking pottery classes with instructor Maria Alvarez, and
    finding inspiration in the soulful songs of Lila Downs that often accompany their watercolor experiments in a home studio.
  travel: Minerva Collado prefers meticulously planned road trips—mapping routes in Excel and budgeting with Mint—so they can explore the desert trails of Joshua Tree in summer, partake in the vibrant celebrations
    of Día de los Muertos in Oaxaca each November, and unwind on the coastal cliffs of Santorini during a biennial European getaway.
  culinary: Minerva Collado boasts an intermediate command of traditional family cuisine, often preparing mole poblano, fresh tamales, and roasted corn elotes seasoned with cotija and epazote for intimate
    dinner gatherings, while they experiment with fusion twists like cilantro‑lime quinoa bowls to delight their friends.
  core: Minerva Collado, a 49‑year‑old credit counselor with a penchant for humming Lila Downs while tending their garden, blends disciplined financial acumen with a quiet love for watercolor, yet they
    sometimes forget to water their succulents on rainy days.
background:
  cultural: Minerva identifies as Mexican-American, born to parents who immigrated from Jalisco. She grew up in a bilingual household where Spanish language, festive traditions like Día de los Muertos,
    and Mexican culinary practices were central. Her cultural heritage informs her compassionate yet assertive counseling style, as she often relates to clients navigating language barriers or cross-cultural
    financial challenges. Being part of the vibrant Mexican community in Hesperia, she actively participates in local celebrations, supports cultural organizations, and leverages her bicultural perspective
    to build trust with diverse clientele.
