  hobbies: '[''Watercolor painting'', ''Pottery classes'', ''Hiking'', ''Gardening'', ''Yoga'', ''Cooking traditional Mexican dishes'', ''Reading contemporary fiction'', ''Reading business and finance literature'',
    ''Volunteer tutoring for financial literacy'', ''Attending local art gallery exhibitions'', ''Participating in Día de los Muertos community events'']'
  career_goals: Minerva aspires to progress into a senior leadership role, such as Branch Manager or Director of Consumer Lending, within her credit union. She plans to earn professional credentials including
    Certified Credit Counselor (CCC) and Certified Financial Planner (CFP) to deepen her expertise. A key ambition is to design and launch community-based financial literacy workshops that blend her love
    for art and creative learning, targeting Mexican-American families in the Inland Empire. Over the next five years, she also aims to mentor emerging loan officers, champion diversity and inclusion initiatives,
    and eventually establish a non-profit organization dedicated to empowering underserved populations through financially artistic education.
