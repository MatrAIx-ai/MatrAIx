  hobbies: '[''sketching and watercolor painting'', ''visiting local galleries and museums'', ''photography hikes along the Chattahoochee River'', ''playing basketball at the community center'', ''reading
    graphic novels and fantasy books'', ''listening to indie/alternative music'', ''creating short TikTok videos about art'', ''volunteering for community festivals and school events'']'
  career_goals: Terry aims to attend a four‑year college where he can major in Visual Arts, Communications, or Arts Administration. His long‑term ambition is to become a community arts program director,
    creating accessible art workshops, public murals, and cultural events that bring together diverse groups in Columbus and beyond. He also envisions working as a creative content strategist for a nonprofit
    organization, using his design and storytelling skills to raise awareness for social causes. In the future, Terry hopes to open a youth art collective in his hometown, providing a supportive space for
    teens to explore creative expression and develop collaborative projects.
