personas:
  professional: Terry York, an aspiring visual arts student who blends a meticulous eye for digital photography with a knack for event planning, leverages Canva and Photoshop Elements to craft compelling
    visual narratives while confidently leading school club initiatives, reflecting their organized, sociable, and curious nature.
  sports: Terry York, a regular participant in the Columbus Community Center’s pickup basketball league who also enjoys occasional skateboarding in the summer, follows the Atlanta Hawks and Falcons closely,
    and adheres to a routine of three weekly basketball sessions combined with stretching drills to stay fit, embodying their energetic and team‑oriented spirit.
  arts: Terry York, whose artistic palette ranges from watercolor experiments inspired by John Singer Sargent to TikTok clips echoing the visual style of Studio Ghibli, finds creative refuge in graphic
    novels like Saga and Monstress, while their playlists cycle through Tame Impala, Phoebe Bridgers, and The 1975, illustrating a vibrant blend of classic and contemporary influences.
  travel: Terry York, a detail‑oriented planner who prefers day‑trips to nearby spots like the Chattahoochee River and weekend getaways to Savannah and Nashville on a teen budget, dreams of a future adventure
    exploring the street‑art corridors of Barcelona and the museums of New York City, balancing curiosity with financial prudence.
  culinary: Terry York, a budding home chef who can confidently whip up shrimp‑and‑grits with a dash of smoked paprika and enjoys mastering avocado toast topped with feta and chili flakes, often experiments
    with spicy ramen bowls featuring miso broth and soft‑boiled eggs, yet admits to frequently ordering pizza late at night when deadlines loom.
  core: Terry York, a meticulously organized yet socially magnetic teen artist who habitually sketches during class, hoards limited‑edition graphic novels, and occasionally procrastates on homework by scrolling
    TikTok for the latest art‑tip videos.
background:
  cultural: Terry is a white Southern American who grew up in Columbus, Georgia, a city known for its blend of river‑front charm and historic cultural venues. Raised in a middle‑class family, he was exposed
    to the region's traditions of Southern hospitality, church community involvement, and a strong emphasis on cooperation and neighborly support. The local music scene—from blues to modern indie acts—and
    the city's public art initiatives have shaped his appreciation for diverse artistic expressions. While embodying mainstream American teenage experiences, Terry also values the close‑knit community spirit
    of Muscogee County, which informs his cooperative nature and desire to give back through artistic outreach.
attributes:
  skills: '[''digital photography'', ''basic graphic design (Canva, Photoshop Elements)'', ''event planning and coordination'', ''public speaking and presentation'', ''team leadership'', ''time management'',
