  career_goals: Although retired, Kimberly aims to remain an active contributor to her community. She hopes to take on a leadership role within the local senior citizens advisory board, mentor new volunteers
    at the community center, and develop a series of intergenerational workshops that combine her love of crafting with storytelling. She also aspires to compile her family recipes into a community cookbook
    and to complete a memoir that captures her experiences growing up in the Pacific Northwest.
