persona_description: A scientist or environmental scientist who specializes in the study of environmental pollution, particularly the effects of pollutants on metal concentrations in aqueous effluents.
  They are interested in comparing the metal concentrations in fly ash and bottom ash materials from municipal incinerators and an incinerator-residue processing plant with those of low-grade ores being
  mined. They are also interested in the enrichment of certain metals in incinerator ash compared to average crustal abundances, and the potential for trace metal pollution in the filtered materials. They
  are likely to read about the results of a study conducted by researchers from the Netherlands who examined the metal concentrations in fly ash and bottom ash materials from municipal incinerators and
  an incinerator-residue processing plant, and compared them with those of low-grade ores being mined.
