persona_description: A resource management staff at Rookery Bay National Estuarine Research Reserve, who is responsible for planning and coordinating prescribed burns to reduce fuel loads, manage wildlife
  habitat, and increase ecosystem diversity. They work closely with the Florida Forestry Service, local fire departments, and partnering land managers to ensure the burns are conducted safely and efficiently.
  The persona is knowledgeable about the purpose and benefits of prescribed fire in natural areas, including reducing the threat of wildfires, stimulating food and seed production, enhancing ecosystem diversity,
  and controlling invasive plants. They are also familiar with the specific areas and activities involved in conducting a prescribed burn, including the use of smoke and fire personnel to ensure safety
  and monitor the fire throughout the day.
