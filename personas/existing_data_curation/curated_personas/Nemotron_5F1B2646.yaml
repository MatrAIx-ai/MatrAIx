personas:
  professional: Luis Larocca, a veteran cabinetmaker turned meticulous furniture restorer, now volunteers as a quiet docent at the Brevard County Art Museum, where they apply their methodical research skills
    and love of Renaissance and Pre-Columbian art to create soothing tours for senior visitors.
  sports: Luis Larocca, an avid senior spectator, they follow the Orlando Magic and Tampa Bay Rays on television, attend the annual senior-friendly golf clinic at the Melbourne Country Club, and spend sunrise
    birdwatching sessions that double as gentle cardio, though they rarely participate in team sports themselves.
  arts: Luis Larocca, whose solitary sketchbook sessions capture Gulf Coast sunsets and imagined Andean valleys, they draw inspiration from Michelangelo's chiaroscuro and the modern Peruvian painter Fernando
    de Szyszlo, while listening to the lute compositions of Johann Sebastian Bach and traditional Andean panpipe melodies as they restore antique mahogany armoires.
  travel: Luis Larocca, who meticulously plans his trips using printed maps and a leather-bound travel journal, they have revisited their ancestral towns in the highlands of Peru and explored the historic
    forts of St. Augustine, but now prefer short drives to nearby botanical gardens like the Bok Tower Gardens, citing limited stamina and the desire to stay close to their grandchildren.
  culinary: Luis Larocca, a seasoned home chef, they expertly prepare ceviche with fresh sea bass, lime juice, aji amarillo, and cilantro, and also simmer lomo saltado with sliced beef, onions, tomatoes,
    and roasted potatoes, all while tending their indoor herb garden of basil and oregano, though they occasionally over-salt dishes in their quest for bold flavor.
  core: Luis Larocca, a 92-year-old meticulous craftsman and quiet scholar, they blend disciplined solitude with a restless curiosity, often worrying about finances and health while nurturing their artistic
    legacy for future generations.
background:
  cultural: Luis was born to Peruvian immigrants who settled in Florida during the 1950s. Raised in a bilingual household, he grew up celebrating traditional Peruvian festivals such as Inti Raymi and Señor
    de los Milagros while also embracing the coastal culture of Melbourne, FL. His upbringing blended Catholic rituals with Andean folk customs, preserving familial recipes like ceviche, causa, and pisco
    sour. The values of hard work, community respect, and reverence for art—hallmarks of Peruvian culture—have shaped his lifelong appreciation for craftsmanship and visual expression. Though he now lives
    primarily in solitude, he remains connected to his heritage through language, cuisine, and regular participation in the local Peruvian cultural association’s quiet gatherings.
attributes:
  skills: '[''Woodworking'', ''Antique Furniture Restoration'', ''Spanish Fluency'', ''Peruvian Culinary Arts'', ''Historical Research'', ''Digital Archiving'', ''Budget Management'', ''Art Knowledge'']'
  hobbies: '[''Sketching'', ''Reading Art History'', ''Listening to Classical and Andean Music'', ''Indoor Herb Gardening'', ''Cooking Peruvian Meals'', ''Family Genealogy Research'', ''Photography'', ''Birdwatching'']'
  career_goals: Luis aims to preserve his family’s legacy by completing a written memoir and a curated photo archive, while continuing to share his expertise through volunteer docent work at the Brevard
    County Art Museum, offering quiet guided tours for seniors. He seeks to maintain his health and independence with regular low‑impact exercise and mental stimulation, ensure his financial affairs are
    orderly for his grandchildren’s benefit, and deepen his understanding of Peruvian art by studying Inca and contemporary Peruvian painters.
