  career_goals: Carlos aims to complete his GED within the next year and enroll in a community college art program or a vocational graphic design certificate. He dreams of becoming a freelance graphic designer
    or visual storyteller, working on album covers, murals, or social media campaigns for local businesses. He also hopes to use his bilingual skills to bridge cultural gaps in creative projects and eventually
    mentor younger teens in his community.
