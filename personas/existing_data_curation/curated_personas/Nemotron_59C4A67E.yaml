personas:
  professional: Carlos Gonzalez, a 16‑year‑old budding visual storyteller, blends his bilingual fluency, digital illustration skills on Procreate and Photoshop, and love for street art into freelance graphic
    design projects for local businesses, while his relaxed attitude toward deadlines means he often thrives under the pressure of last‑minute creative bursts.
  sports: Carlos Gonzalez dribbles for a community basketball league, rides his skateboard with the Amarillo Skate Club, cheers for the Dallas Mavericks and Texas Rangers, and hits the local gym in summer
    to boost his vertical leap, though he sometimes skips workouts when homework piles up, reflecting his relaxed approach to obligations.
  arts: Carlos Gonzalez channels his curiosity into drawing cartoon characters inspired by indie rock bands like Arctic Monkeys, experimenting with street‑art motifs à la Banksy on legal walls while listening
    to reggaeton hits by Bad Bunny, all of which shape his vibrant visual storytelling style.
  travel: Carlos Gonzalez prefers spontaneous road trips with friends, having explored the art districts of Santa Fe, the lively Día de los Muertos celebrations in San Antonio, and dreaming of backpacking
    through Berlin’s graffiti‑laden streets and surfing in Costa Rica when his savings allow.
  culinary: Carlos Gonzalez enjoys cooking family‑style tacos al pastor and chicken tamales, mastering the perfect masa dough and smoky chipotle salsa, though he often forgets to clean the kitchen after
    a marathon cooking session, leaving a lingering scent of spices.
  core: Carlos Gonzalez is a curious, socially‑driven teen who trades strict deadlines for creative bursts, sketches his world in vivid color, saves for skate tricks, and fuels his art with tacos, reggaeton,
    and a dash of organized chaos.
background:
  cultural: Carlos is a first‑generation Mexican‑American raised in Amarillo, Texas. He grew up speaking Spanish at home and English at school, celebrating traditions like Día de los Muertos, Mexican Independence
    Day, and family gatherings centered around food. His family’s heritage influences his love for Mexican cuisine, music, and visual motifs, which he often incorporates into his artwork. Living in a diverse
    Texas community, Carlos feels a strong connection to both his Mexican roots and the broader American culture, shaping his identity and creative outlook.
