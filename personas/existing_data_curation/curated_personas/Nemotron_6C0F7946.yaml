  hobbies: '[''Hiking in Hill Country'', ''Birdwatching'', ''Reading YA and sci‑fi novels'', ''Acoustic guitar playing'', ''Jewelry making'', ''Python coding projects'', ''Cooking Tex‑Mex meals'', ''Volunteering
    at animal shelter'', ''Landscape and wildlife photography'']'
  career_goals: Lana wants to turn her curiosity about how things work into a career that also serves her community. In the next few years she plans to enroll in a technical college to earn a certification
    in automotive technology, with the long‑term ambition of opening a small, locally‑focused repair shop that could also offer custom accessories for motorcycles and bicycles. Parallel to that, she is
    exploring digital design; she hopes to develop a freelance graphic‑design portfolio that leverages her photo‑editing and coding skills. Ultimately she seeks a balanced professional life where she can
    solve tangible problems, stay financially independent, and keep learning new tools.
