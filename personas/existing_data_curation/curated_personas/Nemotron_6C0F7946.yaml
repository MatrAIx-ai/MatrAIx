personas:
  professional: Lana Fox is a high‑school senior who merges her curiosity about how things work with a practical flair for DIY repairs, excelling in basic automotive maintenance, Python scripting, and Adobe
    Lightroom photo editing, and they channel their organized yet flexible mindset into peer mentoring and hands‑on school projects.
  sports: Lana Fox hikes the rolling trails of the Texas Hill Country several times a month, participates in the Austin Trail Runners club’s weekend 5K runs, supports Austin FC soccer, and balances their
    fitness routine with weekend bike rides on a refurbished mountain bike they maintain themselves.
  arts: Lana Fox strums acoustic guitar at family gatherings, drawing inspiration from Sufjan Stevens and The Staves, crafts handmade silver‑leaf jewelry while following Etsy maker trends, edits photos
    in Lightroom with a high‑contrast style reminiscent of Ansel Adams, and they immerse themselves in contemporary YA novels and classic sci‑fi by Ursula K. Le Guin for creative fuel.
  travel: Lana Fox prefers low‑cost road trips that blend hiking and photography, having camped along the Rio Grande in New Mexico and explored the blue‑hued hills of Sedona, they dream of backpacking the
    fjords of Norway and the deserts of Patagonia, planning each itinerary in their paper planner to balance adventure with a modest budget.
  culinary: Lana Fox loves cooking Tex‑Mex at home, perfecting dishes like chicken enchiladas, homemade guacamole with fresh cilantro and lime, and spicy chiles rellenos, they enjoy experimenting with smoky
    chipotle marinades and often source locally grown jalapeños from a nearby farmer’s market.
  core: Lana Fox is a curiosity‑driven teen who balances meticulous planning with spontaneous hikes, a love for tinkering and guitar chords, and a habit of over‑organizing their allowance while occasionally
    forgetting to floss.
background:
  cultural: Lana grew up in Boerne, a small town in Kendall County known for its German‑Texan heritage. Her family celebrates a mix of traditional Texas customs—like Sunday barbecues and country‑music gatherings—and
    German traditions such as Oktoberfest and Wurstfest, which are highlighted by local festivals and foods. Although she identifies as White American, the community’s emphasis on self‑reliance, neighborly
    support, and a love for the outdoors has shaped her values. She occasionally helps with family recipes that blend German and Texan flavors, and she speaks a few basic German phrases she learned from
    grandparents. This cultural mix gives her a strong sense of belonging to both her local town and its broader historical roots.
attributes:
  skills: '[''Microsoft Office'', ''Google Workspace'', ''Adobe Lightroom (basic photo editing)'', ''DIY home repair'', ''Basic car maintenance'', ''Effective verbal communication'', ''Organizational planning'',
