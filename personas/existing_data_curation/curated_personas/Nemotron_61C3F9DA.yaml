  skills: '[''gardening'', ''quilting'', ''household budgeting'', ''volunteer coordination'', ''basic digital literacy'', ''local history research'', ''genealogy'', ''cooking and baking'', ''storytelling'']'
  hobbies: '[''watercolor painting'', ''historical fiction reading'', ''birdwatching'', ''gardening'', ''crocheting'', ''quilting'', ''attending community theater'', ''listening to bluegrass music'', ''cooking
    Southern cuisine'', ''playing bridge'']'
  career_goals: Although retired, Casey’s ambitions focus on personal enrichment and community legacy. She plans to complete a memoir that weaves together her life experiences with the history of Madison‑on‑the–Cave
    region, and to create a detailed family genealogy archive for future generations. She hopes to organize an annual community art exhibition that showcases local craftspersons and encourages youth participation.
    Keeping her curiosity alive, Casey aims to learn digital photography and experiment with photo‑journalism of local events. She also wants to remain physically active through gardening and regular walks,
    and to mentor younger volunteers at the senior centre by sharing her skills in quilting and local history.
