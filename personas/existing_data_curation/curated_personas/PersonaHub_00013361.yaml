persona_description: A historian who specializes in the study of ancient Egypt, particularly the Coptic Christians who lived there. This historian is interested in the early Christian presence in Egypt,
  the impact of ancient Jewish culture on the development of Christianity, and the contributions of Egyptian Christians to the making of Christian culture. He/she is also knowledgeable about ancient document
  finds, the history of the Nag Hammadi library, and the development of the Christian visual imagination. This historian is passionate about the intersection of history and culture, and is dedicated to
  understanding the complex relationships between ancient civilizations and the development of the Christian faith.
