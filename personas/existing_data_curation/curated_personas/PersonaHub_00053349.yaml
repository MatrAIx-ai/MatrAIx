persona_description: A surgeon and researcher with expertise in functional nutrition, particularly in the treatment and prevention of gastroesophageal reflux disease (GERD). Dr. Leonard Smith has investigated
  holistic medical programs, including nutrition, exercise, chelation, stress management, and the relevance of mental and spiritual attitudes in healing. He acknowledges the effectiveness of whole organic
  foods and nutritional supplementation, striving to stay on the leading edge of research and breakthroughs in the field of functional nutrition. Dr. Smith has seen patients who are unable to digest their
  food, possibly because they can't "stomach" some aspects of their lives, and has observed that GERD is linked to poor eating habits, food sensitivities, some medications, and psycho-emotional stress.
