  career_goals: Although retired, Hadia aims to cement her legacy by establishing a scholarship fund for local high-school students pursuing business studies, continuing to mentor senior volunteers, and
    documenting her experiences in a memoir that highlights the evolution of small-town commerce and community life in Michigan. She also hopes to help modernize the senior center’s operations by introducing
    simple digital tools and ensuring that the center remains financially stable for future generations.
