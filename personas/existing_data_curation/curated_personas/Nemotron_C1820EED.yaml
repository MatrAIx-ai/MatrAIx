personas:
  professional: Hadia Noyes, a retired retail proprietor turned volunteer finance director, blends meticulous bookkeeping with a no‑nonsense approach to senior‑center budgeting, leveraging spreadsheets
    to keep every dollar accounted while mentoring younger volunteers with a competitive edge that keeps the ledger balanced.
  sports: Hadia Noyes enjoys low‑impact cardio walks in the community garden, follows the Detroit Lions with weekly game‑day gatherings, and is a member of the senior center’s gentle yoga class, while cheering
    on the Michigan Wolverines during football season.
  arts: Hadia Noyes finds solace in the melodies of Ella Fitzgerald, the historical novels of Philippa Gregory, and the local theater’s productions of classic plays, often humming hymn verses from their
    church choir while knitting and listening to recordings of the Detroit Symphony Orchestra.
  travel: Hadia Noyes has toured historic sites such as Colonial Williamsburg and the Gettysburg battlefield, cherished a road trip along Lake Michigan’s shoreline, and dreams of a guided pilgrimage to
    the cathedrals of Europe, especially the Basilica di San Marco in Venice.
  culinary: Hadia Noyes delights in preparing heirloom tomato soup with fresh basil, baking apple‑cinnamon crumble with a buttery crust, and savoring seasonal zucchini casserole, all seasoned with a pinch
    of rosemary and a dash of nostalgia for their hometown’s Harvest Festival recipes.
  core: Hadia Noyes is a structured yet sociable nonagenarian whose competitive spirit fuels community service, meticulous money management, and a love for garden‑fresh meals, even if they sometimes forget
    their glasses while playing bridge.
background:
  cultural: Hadia’s cultural background reflects a classic Midwestern white American upbringing. Raised in a post-World War II small-town environment, she imbibed values of hard work, community responsibility,
    and modesty. Her family’s ancestry traces back to German and Irish immigrants who settled in Michigan in the early 1900s. She grew up attending a Protestant Methodist church, celebrating traditional
    American holidays, and participating in community events like county fairs and church potlucks. These cultural influences fostered her practical outlook, love of organized group activities, and commitment
    to civic service.
