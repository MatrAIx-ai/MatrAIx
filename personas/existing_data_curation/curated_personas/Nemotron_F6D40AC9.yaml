    (chess, bridge)'', ''Volunteer program coordination'', ''Archival research and oral‑history documentation'']'
  hobbies: '[''Weaving and knitting'', ''Heirloom gardening'', ''Birdwatching and nature photography'', ''Reading historical fiction and poetry'', ''Visiting museums and art talks'', ''Playing chess and
    solving puzzles'', ''Cooking traditional Guatemalan recipes'', ''Storytelling workshops'', ''Collecting folk music recordings'']'
  career_goals: Although retired, Deilys is driven to leave a lasting cultural legacy. She aims to compile a memoir and a series of recorded oral histories documenting her Guatemalan family’s migration
    and traditions, which she plans to donate to the Westbrook Historical Society. She also aspires to organize an annual multicultural art exhibit at the local library that showcases indigenous Guatemalan
    textiles alongside works by Minnesota artists. Additionally, she hopes to mentor younger members of the community—especially bilingual youths—through storytelling workshops and cooking classes, fostering
    cross‑cultural understanding. A secondary ambition is to develop a small community garden featuring traditional Central American crops, creating a living classroom for sustainable agriculture and heritage
    preservation.
