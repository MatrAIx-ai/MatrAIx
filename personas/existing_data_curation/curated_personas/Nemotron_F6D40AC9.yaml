personas:
  professional: Deilys Isern, a retired community arts coordinator, leverages their expertise in Guatemalan textile weaving, bilingual storytelling, and heirloom garden curation to design immersive cultural
    exhibits, channeling their curious, solitary nature and competitive drive while often sidestepping strict deadlines.
  sports: Deilys Isern enjoys low‑impact gardening workouts, walks the trails of Lake Harriet Park, follows the Minnesota Twins and the Minnesota Timberwolves each season, and participates in a senior walking
    club that meets at the Westbrook Community Center, preferring solitary observation of local birds over team sports.
  arts: Deilys Isern immerses themselves in weaving and exhibition curation, drawing inspiration from Frida Kahlo's vibrant self‑portraits, the textile mastery of Guatemalan artist Myrna Ríos, and the poetic
    rhythms of Pablo Neruda, while regularly attending talks featuring Midwestern painter Jeffery Smith and listening to the folk guitar of José González.
  travel: Deilys Isern prefers self‑planned, low‑key journeys that balance curiosity with comfort, having trekked the ruins of Tikal in Guatemala and explored Antigua's colonial streets, while dreaming
    of a sustainable agriculture tour in the Andean highlands of Peru and a quiet retreat to the coastal town of Carmel‑by‑the‑Sea, California.
  culinary: Deilys Isern, an accomplished home cook, delights in preparing Guatemalan staples such as pepian with heirloom corn tortillas, chiles rellenos stuffed with cream cheese and black beans, and
    plantain empanadas flavored with fresh cilantro, roasted tomatillos, and a hint of smoked paprika harvested from their garden.
  core: Deilys Isern, a quietly competitive, solitary craftswoman, weaves cultural memory into tapestries, gardens, and stories while juggling spontaneous generosity with a habit of overlooking bureaucratic
    details.
background:
  cultural: Deilys was born to Guatemalan parents who emigrated to the United States in the early 1960s, bringing with them rich Maya‑influenced traditions, Spanish language, and Catholic customs. Growing
    up in a bilingual household, she absorbed the rhythms of traditional marimba music, the vibrant colors of Guatemalan textiles, and the communal storytelling practices of her grandparents. After moving
    to Westbrook, Minnesota, she blended these roots with Midwestern values of self‑reliance and community service. Her identity is a tapestry of Guatemalan heritage—marked by celebrations like Día de los
    Muertos and the preparation of tamales—and the quiet, nature‑focused lifestyle of rural Minnesota. This dual cultural lens informs her commitment to preserving her ancestral legacy while contributing
    to her local community.
attributes:
  skills: '[''Bilingual Spanish‑English communication'', ''Oral storytelling and cultural narrative preservation'', ''Traditional Guatemalan weaving and embroidery'', ''Culinary fusion of Guatemalan and
