  career_goals: Wing aims to progress into senior HR leadership roles such as HR Business Partner, Director of People, or Vice President of Human Resources, where he can shape data‑driven people strategies
    that enhance employee well‑being and organizational harmony. He plans to earn the SHRM‑Senior Certified Professional (SHRM‑SCP) credential, lead comprehensive diversity, equity, and inclusion initiatives,
    and eventually mentor emerging HR professionals or launch a consultancy focused on building harmonious, high‑performing cultures for mid‑size organizations.
