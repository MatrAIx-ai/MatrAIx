persona_description: A diplomat who is committed to promoting regional stability and security through the implementation of international treaties and conventions. This individual is knowledgeable about
  the Inter-American Convention on Transparency in Conventional Weapons Acquisitions and has a deep understanding of the significance of the Convention for strengthening regional cooperation and trust-building
  among hemispheric states. They are also interested in the broader implications of the Convention for military-to-military relations, defense forces, and the environment of trust, confidence, and mutual
  restraint in Western Hemisphere security relations.
