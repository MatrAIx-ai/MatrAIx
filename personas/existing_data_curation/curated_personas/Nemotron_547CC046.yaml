personas:
  professional: Alison King, a retired part‑time office administrator now serving as the senior‑center’s volunteer coordinator, blends meticulous budgeting, flexible event planning, and a love for gardening
    to create intergenerational mentorship programs, while their pragmatic Midwestern roots and occasional worry keep projects tightly organized yet adaptable.
  sports: Alison King, an avid birdwatcher and gentle yoga enthusiast, joins early‑morning beach walks, participates in a senior bowling league at the community center, and cheers for the Miami Marlins,
    balancing social activity with low‑impact fitness while respecting their aging joints.
  arts: Alison King, a watercolor painter inspired by Claude Monet’s coastal scenes, devotes afternoons to capturing Gulf sunsets, reads historical fiction like 'The Nightingale', listens to Joan Baez,
    and volunteers backstage at the local senior theater, letting creative expression temper their occasional stress.
  travel: Alison King, a nostalgic traveler who favors road trips to historic Southern towns such as Savannah and New Orleans and dreams of a Mediterranean cruise to Italy, plans trips with careful budgeting
    and a preference for slow, reflective itineraries that accommodate health needs.
  culinary: Alison King, a home‑cook who blends Mediterranean flavors with Florida’s fresh produce, frequently prepares grilled branzino with lemon‑olive oil, heirloom tomato bruschetta, and chickpea‑spinach
    stew, enjoys experimenting with homemade pesto, yet sometimes overcooks vegetables when distracted by a favorite gardening podcast.
  core: Alison King, a diligent, community‑oriented 75‑year‑old with a practical streak, a penchant for gentle hobbies, and a lingering worry that fuels meticulous planning, navigates life by balancing
    curiosity with caution.
background:
  cultural: Alison is a white American who grew up in the Midwest during the post‑World War II era, experiencing the optimism of the 1950s and the social upheavals of the 1960s. Her upbringing emphasized
    community involvement, self‑reliance, and a pragmatic approach to life, values she carried into adulthood. After a career of part‑time work and community service, she retired to Bonita Springs, Florida,
    attracted by the coastal environment and the tight‑knit senior community. She maintains a lifelong affiliation with a Methodist congregation, which informs her sense of service and compassion. Her cultural
    identity reflects a blend of Midwestern practicality, Southern hospitality, and an appreciation for the natural beauty of Florida’s Gulf Coast.
