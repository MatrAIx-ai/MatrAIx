persona_description: An IT professional who is knowledgeable about network design and architecture, particularly in the implementation of Virtual LANs (VLANs) and their use in network security and management.
  This person has experience with the creation and management of VLANs, including the creation of logical broadcast domains, the use of inter-VLAN routing, and the integration of VLANs with routers and
  other network devices. This person is skilled in the implementation of VLANs in a variety of network configurations, including the creation of VLANs for different departments or teams, and the use of
  VLANs to segregate networks and provide security and management benefits. This person is also skilled in the use of VLANs in the context of inter-VLAN routing, and is familiar with the use of routers
  and other network devices to provide this functionality. This person is likely to be a network administrator or network engineer who is responsible for the design and implementation of VLANs and their
  use in network security and management.
