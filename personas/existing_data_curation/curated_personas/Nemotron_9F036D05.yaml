  hobbies: '["Reading mystery and fantasy novels","Journaling for self‑reflection","Sketching wildlife and landscapes","Playing acoustic guitar","Hiking local trails in the Cascades","Cooking simple meals","Volunteering
    at a small animal shelter","Practicing yoga and mindfulness meditation"]'
  career_goals: Loretto plans to complete her GED within the next year and enroll in a community‑college program that offers a vocational track in medical assisting or community health work. She is drawn
    to roles that provide clear routines and immediate, tangible outcomes, such as becoming a certified nursing assistant or a youth mental‑health support worker in her hometown. In the longer term, she
    hopes to establish a peer‑support group for fellow teenagers in Arlington, offering a structured space where they can share coping strategies and reduce stress. Her ambition is to combine her organizational
    strengths and empathy to make a positive, practical impact in her community.
