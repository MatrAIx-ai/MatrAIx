personas:
  professional: Jimmy Johnson, a board-eligible internal medicine physician, blends disciplined charting and evidence-based care with an inquisitive passion for visual arts, and they lead interdisciplinary
    rounds while pioneering research on arts-based interventions for community health.
  sports: Jimmy Johnson maintains fitness by running the Bronx's Pelham Bay Park trails, playing wing in the local Bronx Basketball League on weekends, and they cheer on the New York Knicks and New York
    Yankees, following the seasonal NBA and MLB schedules.
  arts: Jimmy Johnson channels creative curiosity into street photography of Bronx murals, capturing works by artists like Basquiat and Mohamed Bourouissa, and they perform saxophone in the Bronx Jazz Ensemble,
    a group that reinterprets John Coltrane classics while they attend contemporary art exhibitions.
  travel: Jimmy Johnson prefers budget-friendly weekend urban getaways, having explored Philadelphia's Museum of Art and a restorative yoga retreat in the Catskills, and they dream of a Caribbean immersion
    in Cartagena to sample authentic cuisine, all while allocating a dedicated travel fund and planning trips months in advance.
  culinary: Jimmy Johnson delights in cooking Caribbean-inspired meals for their spouse, expertly preparing jerk chicken with Scotch bonnet pepper, coconut-milk rice and peas, and plantain-topped callaloo,
    and they continuously refine their spice blend using fresh thyme, allspice, and ginger.
  core: Jimmy Johnson fuses a physician's precision with a photographer's eye, balancing tight schedules with spontaneous camera walks, yet they can't resist binge-watching medical dramas while snacking
    on plantain chips at 2 a.m.
background:
  cultural: Jimmy grew up in the Bronx within a close‑knit African‑American family that values resilience, community solidarity, and cultural expression. His household blended traditional African‑American
    customs with Caribbean influences from extended relatives, enriching his appreciation for music, cuisine, and storytelling. The multicultural environment of the Bronx exposed him to diverse languages,
    street art, and hip‑hop culture, shaping his open‑minded outlook and commitment to social equity. Family gatherings center around shared meals, gospel music, and discussions about overcoming systemic
    challenges, which inform his dedication to improving health outcomes for underserved populations.
