  hobbies: '[''street photography'', ''visiting art galleries'', ''playing the saxophone'', ''basketball'', ''reading contemporary fiction'', ''volunteering at community health fairs'', ''cooking Caribbean-inspired
    meals'', ''running in Central Park'', ''studying emerging medical technologies'', ''attending local jazz concerts'']'
  career_goals: Jimmy aims to complete his residency in internal medicine and become board‑certified within the next three years. He aspires to specialize in community health, developing a Bronx‑based clinic
    that addresses chronic disease management and health inequities. Long‑term, he envisions a leadership role as a medical director or chief of staff, guiding systemic improvements while maintaining a
    balance between his professional ambitions and his marriage. He also hopes to publish research on the impact of arts‑based interventions in patient recovery and to mentor future physicians from under‑represented
    backgrounds.
