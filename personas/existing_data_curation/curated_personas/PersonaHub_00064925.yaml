persona_description: A researcher and educator who specializes in the education of Native American students, particularly those who come from families with limited English proficiency. The individual is
  passionate about bringing the culture and language of their own tribe back to their children and is frustrated by the lack of progress in this area. They are involved in a research study looking at the
  effectiveness of integrating Native culture and language into the curriculum of schools serving Native American students.
