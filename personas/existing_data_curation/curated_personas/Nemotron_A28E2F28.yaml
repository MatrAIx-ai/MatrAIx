personas:
  professional: Leonardo Moralescolon, a seasoned maintenance technician with decades of hands‑on expertise in electrical, plumbing, HVAC, and carpentry, channels their curiosity and appreciation for art
    into a collaborative yet sometimes disorganized work style that becomes assertively safety‑focused when quality or risk is at stake.
  sports: Leonardo Moralescolon roots for the Boston Red Sox, Boston Celtics, and New England Patriots, joins their senior walking club for weekend hikes in the New England woods, and plays occasional pick‑up
    soccer at the local community center, valuing the social camaraderie and gentle exercise over intense competition.
  arts: Leonardo Moralescolon frequents the Museum of Fine Arts Boston and La Casa de la Cultura, draws inspiration from the bold colors of Frida Kahlo and the mural narratives of Diego Rivera, listens
    to traditional marimba ensembles such as the Guatemala Marimba Orchestra, and spends evenings painting watercolors of highland landscapes, letting their artistic side inform their restorative work on
    historic homes.
  travel: Leonardo Moralescolon cherishes trips to Antigua, Guatemala during Semana Santa, has explored Mexico City’s historic center, enjoys weekend getaways to Acadia National Park in Maine, and dreams
    of attending the Holy Week processions in Seville, Spain, all while balancing travel costs with their modest retirement budget.
  culinary: Leonardo Moralescolon expertly prepares tamales de hoja, pepian de pollo, and chilimota using fresh masa, achiote, and garden‑grown herbs, enjoys experimenting with regional chilies and plantains,
    and balances these hearty meals with occasional visits to local diners for lobster rolls, demonstrating a palate that melds traditional flavors with New England influences.
  core: Leonardo Moralescolon merges a lifetime of skilled trade craftsmanship with a deep love for their highland heritage, an artistic curiosity, and a habit of worrying that keeps their plans flexible
    yet occasionally scattered.
background:
  cultural: Leonardo was born in a small town in the highlands of Guatemala, where Catholic traditions, extended family bonds, and vibrant folklore shaped his early life. He grew up speaking Spanish and
    learning the rhythms of marimba music, as well as the flavors of his mother’s kitchen. In his early twenties, he immigrated to the United States seeking better opportunities, eventually settling in
    Lawrence, Massachusetts, a city with a large Latino community that reminded him of home. He maintains strong ties to his heritage—celebrating Semana Santa, Día de los Muertos, and Guatemalan Independence
    Day with his wife and local community. He is bilingual, often switching between Spanish and English with ease, and he serves as a cultural bridge for younger immigrants, sharing stories of his homeland
    and encouraging pride in their roots. While he has adopted many American customs—participating in community volunteer programs and enjoying local outdoor activities—Leonardo’s identity remains rooted
    in his Guatemalan upbringing, which informs his values of family loyalty, hospitality, and reverence for artistic expression.
