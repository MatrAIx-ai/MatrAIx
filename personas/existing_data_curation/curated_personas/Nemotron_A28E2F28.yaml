  career_goals: Approaching retirement, Leonardo hopes to transition from full‑time maintenance work to a flexible, part‑time role where he can mentor younger technicians and share his trade knowledge.
    He dreams of launching a modest side business offering restorative repairs for historic homes and community murals, blending his love of art with his repair expertise. Continuing his curiosity, he plans
    to enroll in occasional community‑college courses on art conservation and sustainable building practices. At the same time, he wants to secure a stable financial cushion for his wife, ensuring they
    can travel back to Guatemala occasionally and perhaps fund a small scholarship for a local youth interested in trades. Leonardo prefers a loosely structured path—he values flexibility over rigid scheduling—and
    he aims to balance his professional ambitions with his tendency to worry by setting realistic, incremental goals and relying on his supportive community.
