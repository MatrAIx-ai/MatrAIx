personas:
  professional: Joyce Holloman, a seasoned building and construction inspector on the brink of retirement, leverages a meticulous eye for code compliance, green building practices, and aesthetic design
    to mentor younger inspectors and guide developers through safety‑first, sustainable projects, balancing their competitive drive with a collaborative, organized consultancy approach.
  sports: Joyce Holloman hikes the Cascade Foothills as part of the local senior trekking club, follows the Portland Trail Blazers and Portland Timbers avidly, and volunteers as a photographer for the community
    youth soccer league, balancing a love of low‑impact outdoor activity with spirited support for regional teams.
  arts: Joyce Holloman tours the Portland Art Museum, sketches historic downtown facades, captures renovation projects with a vintage Nikon, draws inspiration from Ansel Adams and Georgia O'Keeffe, and
    builds theater sets for the community troupe, weaving visual arts into daily life and often debating artistic choices with a critical, open‑minded eye.
  travel: Joyce Holloman prefers weekend road trips that combine hiking in the Olympic Peninsula, exploring the historic streets of Savannah, and tasting farm‑to‑table cuisine in Willamette Valley, planning
    itineraries with a detailed spreadsheet while leaving room for spontaneous photo walks, reflecting a balance of adventure and cultural immersion.
  culinary: Joyce Holloman loves blending Southern comfort dishes like fried chicken with Pacific Northwest flavors such as smoked salmon and hazelnut‑crusted collard greens, frequently preparing Dungeness
    crab gumbo, and experimenting with local farmer's market herbs, though their tendency to over‑season can lead to fiery sauces.
  core: Joyce Holloman is a curious, disciplined inspector and hobbyist who blends art, sustainability, and community mentorship into a pragmatic yet creatively competitive life, occasionally letting perfectionism
    turn into over‑cooking or overspending on camera gear.
background:
  cultural: Joyce is an African American woman who grew up in the Pacific Northwest, navigating the intersection of her Black heritage and a largely white‑dominated construction industry. Her upbringing
    was shaped by strong church involvement, close ties to the local Black community, and a family tradition of self‑reliance and perseverance. These cultural influences fostered her resilient work ethic
    and her commitment to mentoring the next generation of Black tradespeople. Joyce actively participates in community events such as Juneteenth celebrations, supports Black‑owned businesses in Molalla,
    and remains connected to the broader cultural narratives of African American history and civil rights, which inform her perspective on equity in the workplace.
attributes:
  skills: '[''Building code compliance'', ''Structural integrity assessment'', ''Safety protocol enforcement'', ''Use of laser levels and moisture meters'', ''Digital inspection reporting'', ''Cost‑effective
    remediation planning'', ''Sustainable construction knowledge'', ''Architectural design appreciation'']'
  hobbies: '[''Visiting art galleries'', ''Sketching architecture'', ''Photography of building projects'', ''Gardening'', ''Hiking'', ''Community theater involvement'', ''Youth apprenticeship mentorship'',
    ''Cooking fusion recipes'', ''Participating in Juneteenth and church events'']'
  career_goals: Approaching retirement, Joyce aims to transition from full‑time field inspections to a senior consultancy role where she can mentor younger inspectors, especially women and people of color
    entering the trades. She plans to obtain the Certified Building Official (CBO) credential to formalize her expertise and to establish a part‑time consulting service that advises developers on integrating
    safety and sustainable design from the early planning stages. Joyce also hopes to author a practical guidebook on navigating building codes for non‑traditional learners, and to become an advocate for
    diversity and inclusion within the regional construction industry.
