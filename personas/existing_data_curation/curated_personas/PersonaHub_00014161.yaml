persona_description: A chemist who specializes in the study of thermodynamics, particularly the concepts and equations related to heat capacity, latent heat of fusion, and latent heat of vaporization. She
  is interested in the relationship between temperature and energy, and how different substances behave at different temperatures. She uses the concept of specific heat capacity to measure the amount of
  energy required to change the temperature of a substance by a certain amount. Her expertise lies in the conversion of specific heat capacity from the gram basis to the mole basis, and in the calculation
  of heat capacity using the heat equation. She is also knowledgeable about the relationship between temperature and pressure, and how this affects the specific heat capacity of substances.
