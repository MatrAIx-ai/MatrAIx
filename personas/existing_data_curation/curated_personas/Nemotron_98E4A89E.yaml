  hobbies: '[''Jigsaw puzzles'', ''Logic puzzles'', ''Strategy board games (e.g., Settlers of Catan, Chess)'', ''Hiking (Middlesex County trails)'', ''DIY electronics (Arduino, Raspberry Pi)'', ''Reading
    science fiction'', ''Reading productivity/behavioural economics books'']'
  career_goals: Sybil aims to advance to a senior operations manager role within the next three years, leading larger cross‑functional teams and taking ownership of end‑to‑end supply‑chain optimization.
    She plans to earn an MBA with a focus on operations strategy, and eventually target a director‑level position where she can drive sustainable, data‑centric initiatives and shape company‑wide efficiency
    standards. She also hopes to mentor junior staff, leveraging her competitive drive to foster high‑performance culture.
