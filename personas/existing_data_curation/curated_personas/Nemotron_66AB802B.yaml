  hobbies: '["Gardening", "Mentoring debate team", "Reading classic literature", "Genealogy research", "Community theater attendance", "Playing bridge", "Fishing", "Woodworking", "Birdwatching", "Traveling
    to historic sites"]'
  career_goals: While transitioning toward a semi‑retired phase, Bruce aims to channel his curiosity and practical mindset into mentoring emerging leaders, serving on local non‑profit boards, and documenting
    the oral histories of Calhoun County. He aspires to publish a memoir that weaves personal experience with regional cultural narratives, and to be recognized for his contributions to historic preservation
    and arts education in his community.
