personas:
  professional: Jose Ocampo blends their hands‑on expertise in sustainable urban farming with data‑driven crop monitoring, leveraging bilingual communication to lead community garden projects while designing
    eye‑catching market displays and mediating crew dynamics with a cooperative, yet sometimes overly anxious, leadership style.
  sports: Jose Ocampo plays forward for the East Bay Suns, a local recreational soccer league team, devoting weekend matches to high‑energy play and post‑game gatherings at a nearby cafe, while cheering
    for the San Francisco Giants and supporting community sports outreach.
  arts: Jose Ocampo captures sunrise fields and vibrant street murals with a vintage Nikon, admires the works of Banksy and Diego Rivera, attends painting workshops inspired by Frida Kahlo, and regularly
    listens to cumbia legends like Los Hermanos Rosario, reggaeton star Bad Bunny, and classic folk singer Carlos Vives.
  travel: Jose Ocampo enjoys weekend road trips to Napa Valley vineyards, day hikes in Muir Woods, and dreams of exploring the terraced farms of Tuscany, all while balancing travel costs on a modest budget
    that prioritizes cultural festivals over luxury stays.
  culinary: Jose Ocampo perfects homemade pupusas de queso y loroco and tamales de elote, incorporates freshly harvested heirloom vegetables from their garden into dishes like roasted cherry tomatoes with
    ancho chilies, and experiments with rustic corn masa dough while occasionally over‑seasoning with impromptu spice blends.
  core: Jose Ocampo is a socially vibrant, art‑obsessed urban farmer whose relentless curiosity is tempered by frequent anxiety spikes and a habit of multitasking between garden plots, community events,
    and endless playlists.
background:
  cultural: Jose was born to Salvadoran immigrant parents who settled in the Richmond area. At home, Spanish is spoken, and family life centers around shared meals, religious traditions, and celebrations
    of Salvadoran holidays such as Independence Day on September 15 and the Feast of San Salvador. He grew up immersed in Salvadoran cuisine, music, and folk art, which fostered his love for vibrant colors
    and communal gatherings. The close‑knit Salvadoran diaspora in the Bay Area places a strong emphasis on collective support, hard work, and respect for elders—values that shape his cooperative and caring
    disposition. He remains actively involved in local Salvadoran cultural organizations, helping to organize festivals, culinary events, and community outreach programs that preserve and share his heritage
    with broader audiences.
