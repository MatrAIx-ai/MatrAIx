  hobbies: '[''Community gardening'', ''Cooking Salvadoran dishes'', ''Playing soccer'', ''Photography'', ''Painting and sketching'', ''Attending art workshops'', ''Listening to music (cumbia, reggaeton,
    folk)'', ''Dancing (salsa, bachata)'', ''Yoga and meditation'', ''Volunteering at cultural festivals'', ''Hiking in regional parks'', ''Reading about sustainable agriculture and social justice'']'
  career_goals: Jose aims to finish his associate degree in environmental studies and obtain a certification in sustainable agriculture within the next two years. He envisions moving into a supervisory
    role where he can manage an urban farm or community garden that serves the Salvadoran and broader Bay Area community. He hopes to integrate educational workshops on organic growing, cultural cooking,
    and mental‑wellness practices for farmworkers. Long‑term, he dreams of founding a non‑profit hub that combines urban agriculture, cultural arts, and peer‑support services, positioning himself as a bridge
    between his heritage, environmental stewardship, and community health.
