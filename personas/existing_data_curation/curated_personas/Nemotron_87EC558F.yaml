personas:
  professional: Whitney Hagey, a 56‑year‑old certified esthetician and small‑business owner, blends advanced dermatological techniques such as chemical peels and microdermabrasion with a calm, assertive
    bedside manner, using their deep scientific knowledge and community‑focused marketing savvy to build client trust and grow a boutique wellness spa vision.
  sports: Whitney Hagey stays active by line‑dancing at the Magnolia Country Club, practicing gentle yoga at Riverbend Yoga Studio, cheering on the Atlanta Falcons in football season and the Atlanta Braves
    in baseball, and joining a local walking club for weekend coastal strolls.
  arts: Whitney Hagey nurtures a love for the arts by line‑dancing to Dolly Parton’s ‘Jolene’, collecting hand‑crafted pottery at regional craft fairs, and quoting Maya Angelou’s poems in their skincare
    blog, while also enjoying classic films starring Meryl Streep.
  travel: Whitney Hagey prefers relaxed weekend getaways to nearby coastal towns such as Tybee Island, Savannah, and Charleston, often planning spontaneous beach picnics with fresh herbs from their garden,
    while dreaming of a culinary tour of the Florida Keys and the historic streets of New Orleans.
  culinary: Whitney Hagey delights in hosting potluck dinners featuring shrimp and grits, fried chicken with rosemary‑infused collard greens, and peach cobbler spiced with lavender, mastering new techniques
    like sous‑vide chicken breasts while frequently over‑seasoning dishes with home‑grown thyme and basil.
  core: Whitney Hagey, a 56‑year‑old esthetician with a sunny Southern smile, blends meticulous science with spontaneous herb‑infused whims, rarely worries, and can’t resist a late‑night craft‑fair impulse
    purchase of scented candles.
background:
  cultural: Whitney grew up in the rural South of Georgia, imbued with traditional Southern hospitality, close‑knit community values, and a strong connection to the land. As a white Southern woman, she
    was raised in a Protestant church environment that emphasized service, family gatherings, and community involvement. These cultural roots shape her warm, welcoming demeanor, her love for Southern cuisine
    and gardening, and her commitment to giving back through local health initiatives and church‑based outreach programs.
