  hobbies: '[''Line dancing'', ''Southern cooking'', ''Gardening'', ''Book club'', ''Community volunteering'', ''Yoga'', ''Crafting homemade skincare recipes'', ''Travel to coastal towns'', ''Attending
    craft fairs'', ''Church choir'']'
  career_goals: Whitney aims to expand her practice into a boutique wellness spa that integrates natural Southern botanicals into personalized skin‑care regimens. She plans to obtain advanced certification
    as a Certified Clinical Esthetician and develop her own line of organic skincare products sourced from Georgia farms. Additionally, she hopes to lead quarterly community workshops on skin health, mentor
    aspiring estheticians, and become a recognized speaker at regional health fairs.
