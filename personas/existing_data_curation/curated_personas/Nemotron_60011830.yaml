  career_goals: Seeking a stable, structured role, Mark aims to become an administrative assistant or logistics coordinator within the next year. He plans to enroll in a community-college business administration
    program to earn an associate’s degree, with the long-term ambition of moving into a supervisory position that allows him to apply his reliability and organizational strengths while maintaining a balanced
    lifestyle.
