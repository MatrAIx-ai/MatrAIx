personas:
  professional: Mark Randell, a 24‑year‑old administrative aspirant, blends meticulous organization with a calm, reliable work ethic, employing spreadsheet tracking and task‑list systems to excel in volunteer
    coordination and preparing for a logistics coordinator role.
  sports: Mark Randell, an avid trail jogger, joins the Milwaukee Trail Runners club for weekend runs, follows the Milwaukee Bucks and Brewers closely, and plays in a recreational indoor soccer league during
    the summer.
  arts: Mark Randell enjoys building LEGO Architecture kits, attends local productions of plays by Sam Shepard, listens to John Mayer and classic rock from The Rolling Stones, and collects vintage board
    games for strategic evenings.
  travel: Mark Randell prefers structured weekend road trips, has explored Chicago’s architecture, Nashville’s music scene, and plans to visit Japan’s model‑kit hobby shops and Yellowstone National Park’s
    backcountry trails.
  culinary: Mark Randell cooks straightforward meals like spaghetti aglio e olio, grilled chicken with roasted vegetables, and stir‑fried tofu with soy‑ginger sauce, favoring pantry staples such as olive
    oil, garlic, and soy sauce.
  core: Mark Randell is a calm, methodical planner who balances a love for organized tasks with occasional impulsive model‑kit splurges and a habit of over‑packing for trips.
background:
  cultural: Mark was raised in a middle-class, suburban neighborhood in Union, New Jersey, within a family of European (primarily Irish-Italian) heritage. His upbringing emphasized community involvement,
    self-reliance, and the value of consistent, honest work. He celebrates mainstream American holidays and maintains close ties with extended family in the region, reflecting the cultural norms of a typical
    white American suburban community.
