  career_goals: Though retired, Caleb aims to stay intellectually active by mentoring young engineers and hobbyists through local community workshops and senior‑student partnership programs. He aspires
    to compile his professional experiences and reflections on technological change into a memoir that blends technical insight with cultural observations. Caleb also hopes to contribute his time to the
    La Verne Art Center, helping curate exhibitions that bridge science and art, while maintaining a focus on personal health and lifelong learning.
