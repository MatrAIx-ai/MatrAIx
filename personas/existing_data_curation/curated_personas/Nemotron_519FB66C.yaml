  career_goals: Nathaniel aims to progress to a senior or lead engineering role where he can shape architecture decisions while preserving practical, user-focused solutions. He aspires to become a software
    architect or technical lead on a small, agile team that values flexibility and continuous learning. He also hopes to contribute to open-source projects and eventually launch a side venture that creates
    educational tools for underserved communities, blending his curiosity about new tech with a desire to make a positive impact. Maintaining a balanced work-life rhythm that accommodates remote flexibility
    and occasional solo project work is a key ambition.
