personas:
  professional: Holly Rice, a 19‑year‑old visual arts enthusiast, channels curiosity and disciplined project management into a burgeoning freelance graphic design practice, delivering blended traditional‑and‑digital
    pieces for local businesses while coordinating teen art workshops with confidence.
  sports: Holly Rice, a 19‑year‑old outdoor enthusiast, spends weekends hiking the Monte Sano trail network, plays in a recreational soccer league on Saturdays, and cheers for the Alabama Crimson Tide football
    team and the Chattanooga Lookouts minor‑league baseball club.
  arts: Holly Rice, a 19‑year‑old hybrid artist, splits time between sketching riverbank scenes, experimenting with oil on canvas, and crafting digital illustrations inspired by Georgia O'Keeffe, David
    Hockney, and street‑muralist Swoon, while attending the Athens Art Crawl and jamming with a local acoustic trio to the tunes of Bon Iver and Fleet Foxes.
  travel: Holly Rice, a 19‑year‑old weekend wanderer, prefers low‑budget road‑trip adventures that combine hiking in the Great Smoky Mountains, photo‑ops at Nashville’s vibrant arts districts, and stays
    in Asheville’s artsy cabins, often planning itineraries on shared Google Sheets, and dreaming of a springtime visit to New Orleans’ French Quarter.
  culinary: Holly Rice, a 19‑year‑old experimental cook, loves re‑imagining Southern dishes such as shrimp and grits, fried green tomatoes with pimento cheese slaw, and bourbon‑glazed biscuits, often chopping
    fresh herbs while strumming their guitar, though they sometimes over‑season or burn the edges of a sauce when lost in creative thought.
  core: Holly Rice, a 19‑year‑old art‑obsessed multitasker, balances disciplined budgeting and meticulous project planning with spontaneous midnight painting sessions, even if they occasionally forget to
    water their houseplants.
background:
  cultural: Holly grew up in Athens, Alabama, a close‑knit Southern town where family, church, and community events shape daily life. Her family traditions include attending Sunday services, participating
    in local festivals like the Limestone County Heritage Celebration, and enjoying Southern hospitality and cuisine. Though her upbringing reflects typical white Southern values—respect for tradition,
    modesty, and a strong sense of community—Holly’s curious nature pushes her to embrace diverse artistic influences from beyond the region, blending local cultural motifs with contemporary and global
    art styles.
attributes:
  skills: '[''Sketching'', ''Watercolour painting'', ''Basic oil painting'', ''Digital illustration (Adobe Photoshop, Illustrator)'', ''Photography (DSLR)'', ''Project organization (Trello, Google Workspace)'',
