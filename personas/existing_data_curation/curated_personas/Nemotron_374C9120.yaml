  hobbies: '[''Sketching in parks'', ''Oil painting'', ''DSLR photography'', ''Visiting art galleries and local art events'', ''Reading contemporary fiction and art theory'', ''Playing acoustic guitar'',
    ''Hiking regional trails'', ''Experimenting with Southern cooking'', ''Volunteering as a teen art workshop facilitator'']'
  career_goals: Holly aims to pursue a Bachelor of Fine Arts in Graphic Design or Visual Arts at a university in Alabama or a nearby state. Her short-term goal is to build a professional portfolio that
    showcases a blend of traditional and digital artwork, securing a summer internship at a local design studio or gallery in Birmingham. She aspires to work as a freelance graphic designer, creating visual
    identities for small businesses and community organizations, and eventually to lead community art initiatives that bring public murals and interactive installations to Limestone County, celebrating
    its heritage and encouraging creative expression among youth.
