persona_description: Pete Caudle, a highly technical Sales Manager with extensive knowledge and experience in the field of fire safety and hazardous chemical storage. He specializes in risk analysis, risk
  mitigation, team building, and management, and has a BA in Biology/Chemistry. His passion and mission are focused on protecting people, first responders, the environment, and assets and research. He is
  skilled in understanding the fire triangle and using proper techniques and storage to limit the chances of fire, explosion, and exposure to chemicals. He is also knowledgeable in segregation and storage
  of chemicals per the Global Harmonized Systems and the MSDS sheets of each. Pete is highly interested in providing fire protection to each person who will be in the laboratory space.
