personas:
  professional: Deion Seabrook is a junior IT manager at a municipal agency who blends systems administration, Python scripting, and UI/UX prototyping with a curiosity‑driven, user‑centric mindset, and
    their relaxed, disorganized style often leads them to champion flexible, low‑stress work cultures while juggling multiple agile projects.
  sports: Deion Seabrook enjoys low‑impact cardio, regularly biking the Cape Henlopen boardwalk with the Sussex County Cycling Club and practicing yoga at a local studio, while cheering on the Philadelphia
    Eagles in the NFL and the Delaware Fightin' Blue Hens basketball team, and they view fitness as a calming counterpoint to their high‑stress IT role.
  arts: Deion Seabrook immerses themselves in contemporary visual culture, frequenting galleries that showcase emerging digital artists like Refik Anadol and Jessica Hische, creating nightly digital illustrations
    inspired by speculative fiction such as N.K. Jemisin's The Fifth Season, and curating a small Instagram feed where they blend graphic design with photography of Delaware's coastal horizons.
  travel: Deion Seabrook prefers purposeful, low‑key travel, planning weekend trips to cultural hubs like Berlin's Kreuzberg district for street art, a food‑focused getaway to Oaxaca, Mexico for mole and
    mezcal tasting, and seasonal visits to family at Cape May, balancing a modest travel budget with a yearning for global culinary inspiration.
  culinary: Deion Seabrook enjoys experimenting in the kitchen, mastering dishes like Japanese ramen, Ethiopian injera with spicy berbere stew, and a Mediterranean mezze platter featuring roasted eggplant
    dip, while their intermediate cooking skill, bolstered by weekly spice market trips with their spouse, allows them to fuse flavors as creatively as they fuse code and design.
  core: Deion Seabrook is a curiosity‑driven IT manager who balances a love for digital illustration and world cuisines with a laid‑back, sometimes disorganized lifestyle that fuels both creative breakthroughs
    and occasional bouts of worry.
background:
  cultural: Deion identifies as Black and grew up in a close‑knit African American community in the Mid‑Atlantic region. His family traditions include celebrating Juneteenth, attending church gatherings,
    and preserving the storytelling and musical heritage of the Black diaspora. He is active in local cultural events in Laurel and Sussex County, supporting initiatives that showcase Black art, history,
    and entrepreneurship. This cultural foundation informs his collaborative, community‑oriented approach at work and fuels his commitment to creating inclusive technology solutions that reflect the diverse
    experiences of his community.
attributes:
  skills: '[''Systems Administration'', ''Network Configuration'', ''Python Programming'', ''JavaScript (Node.js)'', ''SQL Database Design'', ''Agile Project Management'', ''Figma UI/UX Prototyping'', ''Technical
    Troubleshooting'', ''Team Coordination'', ''Conflict Resolution'', ''Creative Problem Solving'']'
  hobbies: '[''Visiting art galleries'', ''Digital illustration'', ''Photography'', ''Reading speculative fiction'', ''Yoga'', ''Bike rides'', ''Community coding workshops'', ''Cooking international cuisine'']'
  career_goals: Deion aims to move from his current junior manager role to a senior IT manager or director position within the next five years, focusing on digital transformation initiatives that serve
    both the public sector and local creative enterprises. He plans to complete his bachelor's degree in Information Systems, earn certifications such as PMP and CISSP, and eventually pursue an MBA to broaden
    his strategic perspective. He is passionate about building flexible, low‑stress work cultures that prioritize mental well‑being, and he hopes to launch a community tech‑incubator in Sussex County that
    helps underrepresented entrepreneurs integrate technology with art and culture.
