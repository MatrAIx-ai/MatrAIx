personas:
  professional: Christopher Holton is a miniature naturalist who spends afternoons in the backyard cataloguing insects with a tiny magnifying glass, and they carefully label each find while still darting
    away from any rigid play schedule, preferring quiet solo observations over noisy group games, sharing snacks with friends to keep the peace, and often fretting about losing their favorite beetle pin.
  sports: Christopher Holton loves to kick soft foam balls at the Tiny Explorers toddler soccer club, proudly wears a Los Angeles Dodgers cap given by a parent, prefers spontaneous free‑play sessions over
    structured practice, shares their water bottle to keep everyone hydrated, and sometimes feels anxious when a game schedule changes.
  arts: Christopher Holton delights in coloring jungle animals with Crayola crayons while humming tunes from The Wiggles, and they meticulously arrange their art supplies by size to satisfy their practical
    side, favor quiet drawing corners over noisy playrooms, gladly shares finished drawings with grandparents to keep the peace, yet often frets about smudging their work.
  travel: Christopher Holton enjoys short family outings to the city zoo where they watch giraffes quietly, dreams of a future trip to Disneyland for the rides, prefers the comfort of a familiar car seat
    over noisy airports, shares travel snacks with siblings to maintain harmony, and gets anxious when itineraries shift unexpectedly.
  culinary: Christopher Holton craves cheesy macaroni, carefully dips chicken nuggets in ketchup while insisting on a side of steamed broccoli, enjoys helping stir pancake batter on Saturday mornings, prefers
    familiar gentle flavors over spicy foods, shares their favorite apple slices with a sister to avoid conflict, yet often worries when their plate isn’t perfectly clean.
  core: Christopher Holton is a curious yet cautious 3‑year‑old who balances spontaneous play with a need for order, shares generously, and frets over small worries that loom large in their little world.
background:
  cultural: Christopher is raised in a white, Midwestern American family in New Albany, Indiana. His household observes typical regional traditions such as Thanksgiving, Christmas, and community events
    at the local park. He attends a nearby preschool that incorporates play-based learning and values kindness, cooperation, and respect for others. The family’s cultural milieu blends modest, community-oriented
    values with a love of outdoor activities along the Ohio River, and occasionally includes church attendance and seasonal holiday celebrations.
