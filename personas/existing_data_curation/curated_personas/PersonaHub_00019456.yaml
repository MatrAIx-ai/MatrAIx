persona_description: A historian who specializes in the study of the Holocaust in the Baltic states, particularly the role of Latvian resistance groups during the war. She has a deep understanding of the
  complex history of the region, including the Soviet and Nazi occupations and the ongoing struggle for independence. She is also knowledgeable about the archives at the Hoover Institution and has conducted
  extensive research on the Holocaust in Latvia, Latvian resistance groups, and the history of the Baltic states. She is interested in documenting the experiences of the Baltic peoples during the war and
  has written extensively on the topic.
