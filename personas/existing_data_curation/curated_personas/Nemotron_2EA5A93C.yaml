personas:
  professional: Robin Sullivan, a senior advisor for nonprofit boards, melds a graduate‑level business background with decades of budgeting, grant‑writing, and volunteer‑coordination expertise, using their
    spontaneous, harmony‑focused style to translate complex financial data into clear, actionable plans while gently nudging teams toward collaborative, flexible execution.
  sports: Robin Sullivan stays active by joining the ‘Suns & Sets’ senior pickleball league at their community center and participating in a casual walking group called the ‘Orlando Magic Fans on Foot’,
    while faithfully rooting for the Miami Heat and the Tampa Bay Rays during their respective seasons.
  arts: Robin Sullivan weaves vibrant quilts while listening to Ella Fitzgerald and Duke Ellington, devours biographies of historical pioneers, and attends intimate performances at the Orlando Shakespeare
    Theater, letting the works of Maya Angelou and painter Georgia O’Keeffe inspire their artistic sensibility.
  travel: Robin Sullivan prefers thoughtfully planned, leisurely road trips that blend historic charm and natural serenity—having savored the antebellum streets of Savannah and the jazz‑laden alleys of
    New Orleans, they now dream of exploring the autumn foliage along the Blue Ridge Parkway and the quiet marvels of Acadia National Park.
  culinary: Robin Sullivan delights in cultivating heirloom tomatoes, sweet potatoes, and okra in their backyard garden, then turning them into fresh garden salads with citrus vinaigrette, occasionally
    cooking classic Floridian dishes like blackened grouper with a side of mango salsa, and they treat themselves to indulgent homemade peach cobbler on warm evenings.
  core: Robin Sullivan is a curiosity‑driven, garden‑loving mentor who balances spontaneous kindness with a chronic worry habit that fuels nightly mindfulness rituals and occasional forgetfulness about
    medication timing.
background:
  cultural: Robin’s cultural identity is rooted in the African‑American community of the Southeast United States. Growing up during the civil‑rights era, she was shaped by church congregations that emphasized
    collective well‑being, storytelling, and resilience. In Winter Park, she actively participates in local Black cultural festivals, celebrates Juneteenth, and supports the preservation of African‑American
    heritage sites. Her heritage informs her commitment to mentorship, community activism, and the intergenerational transmission of knowledge, ensuring that the values of harmony, empathy, and perseverance—central
    to her cultural upbringing—remain vibrant in the communities she serves.
attributes:
