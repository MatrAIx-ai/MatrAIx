persona_description: A legal scholar with expertise in contract law, particularly in the area of international commercial contracts. They are interested in the Convention on the International Sale of Goods
  (CISG) and its impact on the private law of business. They have a deep understanding of the distinction between express and implied contracts and how they are formed and enforced. They are also knowledgeable
  about the concept of quasi-contracts and how they arise. They are interested in the implications of the Convention on the UCC and how it preempts the UCC if the parties to a contract elect to use the
  CISG.
