  hobbies: '[''playing competitive video games'', ''building custom PC rigs'', ''street soccer'', ''graffiti sketching'', ''cooking tacos with family'', ''listening to regional Mexican and hip‑hop music'',
    ''watching esports tournaments'', ''attending local Mexican community festivals'']'
  career_goals: Jose dreams of turning his competitive gaming talent into a professional esports career, hoping to join a local Texas team and eventually stream his gameplay to a wider audience. He sees
    this as a way to earn income while feeding his love for strategy and technology. At the same time, he recognizes the need for a stable fallback and is working toward a GED and an entry‑level automotive
    technician certification, attracted by the practical problem‑solving nature of car repair. In the longer term, he hopes to combine his cultural roots and culinary skills by opening a small taco or quesadilla
    food‑truck that serves a fusion of authentic Mexican flavors and Dallas street food. He plans to fund these ambitions through tournament winnings, part‑time gigs like car washing, and community sponsorships.
