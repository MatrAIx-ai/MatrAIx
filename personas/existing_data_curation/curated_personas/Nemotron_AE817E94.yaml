personas:
  professional: Jose Lujan is an aspiring PC‑building enthusiast and budding esports competitor, blending their love for fast‑paced video games with a practical knack for hardware tinkering, while their
    spontaneous nature often leads them to abandon structured learning paths in favor of hands‑on experimentation.
  sports: Jose Lujan spends Saturdays in neighborhood street soccer matches, improvising goals with laundry baskets, cheering for FC Dallas when watching on TV, and occasionally joining a local youth league,
    yet they often skip warm‑ups due to impulsive enthusiasm.
  arts: Jose Lujan expresses creativity through graffiti tags inspired by regional mural culture, sketching vibrant street‑art concepts, listening to corridos, reggaeton, and hip‑hop artists like Bad Bunny
    and Los Tigres del Norte, and experimenting with simple beat‑making apps, while their competitive streak drives them to outshine peers in local art contests.
  travel: Jose Lujan dreams of exploring the historic murals of Austin and the lively cultural festivals in New Orleans, prefers spontaneous weekend road trips over meticulously planned vacations, but budget
    constraints keep most adventures within a two‑hour drive from Dallas.
  culinary: Jose Lujan enjoys crafting tacos at home, chopping fresh cilantro, onions, and jalapeños for salsa, savoring carnitas and chorizo fillings, and occasionally attempts fusion dishes like kimchi‑topped
    tacos, though they sometimes forget to clean up the kitchen afterward.
  core: Jose Lujan is a fiercely competitive teen who blends street‑savvy tech tinkering, graffiti art, and impromptu soccer with a restless curiosity that fuels both creative bursts and occasional bouts
    of anxiety.
background:
  cultural: Jose is a first‑generation Mexican‑American raised in the vibrant Latino community of Dallas, Texas. Both of his parents immigrated from Jalisco, and the household is bilingual, weaving Spanish
    traditions with American customs. He celebrates Día de los Muertos, Cinco de Mayo, and family fiestas, where music, food, and storytelling reinforce his cultural identity. Growing up in Dallas, he is
    also exposed to Tex‑Mex cuisine, American football culture, and the city’s diverse artistic scene. His family emphasizes respect for elders, the importance of hard work, and the value of community support,
    which shape his approach to friendships and responsibilities. At the same time, he navigates the hybrid identity of being Mexican at heart while adapting to the broader Texan environment.
