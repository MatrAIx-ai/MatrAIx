  hobbies: '[''Nature Photography'', ''Woodworking'', ''Fishing'', ''Cross‑Country Skiing'', ''Local Art Gallery Visits'', ''Community Theater'', ''Reading (Supply Chain Innovation, Regional History)'',
    ''Puzzle Solving (Sudoku, Crosswords)'']'
  career_goals: Looking ahead, Scott aims to transition into a senior logistics leadership role, such as Regional Supply Chain Manager, where he can drive strategic initiatives around green logistics and
    digital transformation. He is interested in championing the adoption of AI‑based predictive analytics and blockchain for traceability within the Iron Range’s distribution networks. Additionally, Scott
    hopes to mentor emerging logistics professionals in his community, eventually leveraging his expertise to offer consultancy services focused on efficiency and sustainability for midsize manufacturers
    in northern Minnesota.
