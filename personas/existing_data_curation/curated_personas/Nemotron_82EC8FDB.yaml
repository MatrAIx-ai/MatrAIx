personas:
  professional: Scott Perez, a seasoned logistics and supply chain manager with over thirty years of experience, leverages advanced ERP platforms like SAP and Manhattan to engineer data‑driven inventory
    controls and green‑focused transportation strategies while mentoring junior staff and championing AI‑powered predictive analytics.
  sports: Scott Perez is an avid supporter of the Minnesota Wild and the local high‑school hockey squad, attends Minnesota Twins games when the schedule permits, skis cross‑country with the Hibbing Alpine
    Club each winter, and spends weekend mornings fishing for walleye on Lake Vermilion.
  arts: Scott Perez frequently visits folk‑art festivals celebrating regional woodcarvers, attends photography exhibitions featuring Ansel Adams and local photographer Jeff Anderson, curates a modest collection
    of John Cordes’ landscape prints, and volunteers backstage at the Iron Range Community Theater, all of which feed his deep appreciation for visual storytelling.
  travel: Scott Perez prefers self‑guided road trips that combine scenic drives through the Northwoods with stops at historic mining towns, has chased the northern lights in Iceland, dreams of a summer
    getaway to Sweden’s coastal archipelago, and plans future visits to the Canadian Shield’s remote lodges.
  culinary: Scott Perez relishes smoked walleye served with dill sauce, hearty Finnish‑style salmon stew, homemade pierogi stuffed with potato and cheese, and dessert huckleberry crumble, often cooking
    over a wood‑fired stove while swapping recipes at neighborhood potlucks.
  core: Scott Perez blends meticulous logistics expertise with a rugged outdoor soul, punctuated by a penchant for late‑night puzzle solving, occasional camera‑gear splurges, and a stubborn refusal to let
    a stubborn knee stop his cross‑country ski runs.
background:
  cultural: Scott grew up in Hibbing, Itasca County, a town steeped in Iron Range heritage and a blend of Scandinavian and Eastern European immigrant traditions. The community’s strong work ethic, love
    for high‑school hockey, and seasonal outdoor rituals shaped his values of reliability, self‑reliance, and modest pride. While he identifies with the broader Midwestern white working‑class culture, he
    also embraces the region’s folk art legacy and the communal spirit of potlucks, town festivals, and volunteer initiatives. These cultural influences inform both his professional diligence and his appreciation
    for the artistic and natural richness of northern Minnesota.
attributes:
  skills: '[''Inventory Management'', ''Demand Forecasting'', ''Route Optimization'', ''Warehouse Management Systems (SAP, Oracle)'', ''Data Analysis and Visualization (Excel, Power BI)'', ''Process Improvement'',
