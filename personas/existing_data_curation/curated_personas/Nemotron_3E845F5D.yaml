personas:
  professional: Caridad, a 19‑year‑old bilingual organizer, leverages her meticulous Excel skills, methodical project planning, and deep commitment to community harmony to thrive in part‑time administrative
    roles at local non‑profits where she ensures smooth operations and culturally resonant program support.
  sports: Caridad, an avid weekend hiker, frequents Red Rock Canyon with the Las Vegas Hiking Club, follows the Las Vegas Aces in the WNBA for inspiration, and balances her love of the desert trails with
    a weekly low‑impact yoga routine, preferring personal wellness over competitive team sports.
  arts: Caridad actively participates in community salsa classes, enjoys performances by Mariachi Los Camperos, and regularly streams music from Bad Bunny, Selena, and classic film scores by Ennio Morricone,
    blending traditional rhythmic roots with contemporary pop culture in her artistic palate.
  travel: Caridad plans trips with a mix of careful budgeting and spontaneous weekend getaways, having explored the historic streets of Oaxaca and the breathtaking vistas of the Grand Canyon, while dreaming
    of attending Day of the Dead celebrations in Guatemala and a future road trip along the Pacific Coast.
  culinary: Caridad is a passionate home cook who masterfully prepares tamales, salsa verde, and hand‑pressed corn tortillas using fresh chilies, masa harina, cilantro, and lime, and they enjoy experimenting
    with mole poblano while pairing dishes with locally sourced avocados and aromatic herbs from their indoor garden.
  core: Caridad, a 19‑year‑old bilingual planner, balances a love of structured community work with daily mindfulness rituals, a penchant for cooking elaborate tamales, and occasional bouts of anxiety that
    keep her hyper‑organized.
background:
  cultural: Caridad is a second‑generation Mexican‑American whose parents immigrated from Mexico and raised her in a bilingual household in Las Vegas. At home, Spanish is spoken daily, and family gatherings
    are centered around Mexican cuisine, music, and Catholic traditions. She celebrates holidays such as Día de los Muertos, Cinco de Mayo, and Navidad with elaborate altars, festive meals, and community
    events that reinforce a sense of belonging. While she embraces American culture—attending school, enjoying local attractions, and forming friendships across diverse backgrounds—her Mexican heritage
    remains a core part of her identity, shaping her values of family cohesion, respect for elders, and a strong commitment to helping her community.
