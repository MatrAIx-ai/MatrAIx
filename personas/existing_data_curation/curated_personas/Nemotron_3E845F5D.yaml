  career_goals: In the short term, Caridad aims to secure a part‑time administrative or clerical position at a local non‑profit or municipal office where she can apply her organizational skills and bilingual
    abilities. She plans to complete a community‑college associate degree in Business Administration, earn a Microsoft Office Specialist certification, and develop expertise in program coordination. Long‑term,
    she aspires to become a project coordinator or program manager for an organization that serves Mexican‑American families, blending her desire for structured work with her commitment to community harmony
    and support.
