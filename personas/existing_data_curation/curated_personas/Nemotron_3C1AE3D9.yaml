personas:
  professional: A curious infant named Curley Davis delights in arranging blocks by color and shape, an early sign of the organized yet flexible mindset that they may one day steer toward a career in design
    or engineering.
  sports: An energetic toddler named Curley Davis loves crawling after a plush soccer ball in the backyard, proudly wears a tiny New York Yankees cap, and attends a local baby swim class, where they splash
    enthusiastically while their parents cheer.
  arts: A budding art enthusiast named Curley Davis spends afternoons finger-painting with non-toxic paints, humming along to the soothing piano pieces of Ludovico Einaudi, and giggling at the colorful
    animations of Sesame Street, which they find endlessly fascinating.
  travel: An adventurous one-year-old named Curley Davis enjoys stroller walks through the city's botanical garden, has recently visited grandparents in Chicago, and dreams of a future family trip to Disney
    World, where they imagine the magic of bright parades.
  culinary: A budding foodie named Curley Davis loves the sweet taste of mashed banana and avocado, eagerly explores the texture of soft oatmeal, and claps their hands when served a tiny bite of homemade
    carrot puree, which they often request at mealtime.
  core: Curley Davis is a curious, organized one-year-old who balances playful exploration with calm routines, often sorting socks by color and humming lullabies, and they sometimes demand extra snack time.
background:
  cultural: Curley is part of a Black family rooted in Dallas, Texas, where African‑American cultural traditions blend with Southern hospitality and urban energy. His home features gospel and soul music,
    family storytelling, and regular gatherings at local churches and community centers. He is exposed to cultural celebrations like Juneteenth parades and visits to the Dallas African American Museum,
    fostering pride in his heritage. These experiences shape his early appreciation for rhythm, visual art, and community harmony, reinforcing the kindness and cooperative values highlighted in his personality.
