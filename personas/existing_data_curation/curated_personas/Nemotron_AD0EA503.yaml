personas:
  professional: Jonathan Cottrell is a senior landscape supervisor in Montgomery County who blends technical GIS and drone analysis with hands‑on crew leadership, designing low‑water native‑plant plans
    while navigating client expectations with a practical curiosity and Southern‑rooted hospitality.
  sports: Jonathan Cottrell enjoys weekend hikes on the Sam Houston National Forest trails and rides with the Montgomery County Cycling Club, cheering on the Houston Astros in spring and following the Houston
    Texans in fall, while maintaining a flexible fitness routine that balances vigorous bike rides with occasional yoga to soothe stress.
  arts: Jonathan Cottrell finds creative respite strumming acoustic renditions of John Prine and The Lumineers, frequenting live‑music venues in downtown Houston where he catches sets by the local blues
    trio The Bayou Band, and captures native wildflowers in photographs inspired by Ansel Adams.
  travel: Jonathan Cottrell prefers low‑key road trips that blend outdoor exploration with cultural immersion, having driven to Austin for a live‑music weekend and to New Orleans for a culinary tour, while
    dreaming of a spring hike through the Great Smoky Mountains and an eco‑lodged stay in Costa Rica, yet his busy schedule and modest savings steer him toward weekend getaways rather than extended overseas
    vacations.
  culinary: Jonathan Cottrell enjoys cooking hearty Texas‑style brisket and smoked sausage on his backyard grill, pairing them with fresh herb salads made from home‑grown basil and cilantro from his hydroponic
    setup, while relaxing with a locally brewed IPA and occasionally treating himself to spicy shrimp tacos topped with avocado and pickled jalapeños.
  core: Jonathan Cottrell is a detail‑driven landscape specialist who balances a love of native Texas ecosystems with a restless curiosity, but his chronic worry and occasional coffee binge keep his stress
    levels in a precarious dance.
background:
  cultural: Jonathan was raised in a suburban neighborhood on the outskirts of Houston, Texas, in a family with deep Anglo-American roots that emphasized hard work, self-reliance, and Southern hospitality.
    Growing up amid the warm climate and abundant green space fostered an early appreciation for the outdoors and native Texas flora. His college years introduced him to a broader, more diverse STEM community,
    expanding his worldview and sparking an interest in sustainable environmental practices. Living and working in Montgomery County, he regularly interacts with a multicultural client base—including many
    Hispanic and African-American homeowners—prompting him to respect and incorporate a variety of cultural preferences in his landscaping designs. This blend of traditional Texan values, scientific curiosity,
    and community awareness shapes his cultural identity.
