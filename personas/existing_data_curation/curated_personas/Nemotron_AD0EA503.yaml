  hobbies: '[''Hiking'', ''Bicycle commuting'', ''Nature photography'', ''Hydroponic gardening'', ''Backyard native plant gardening'', ''Drone piloting'', ''Playing acoustic guitar'', ''Craft beer tasting'',
    ''Volunteering at community garden'', ''Reading horticulture journals'']'
  career_goals: Jonathan aspires to move from his current supervisory role into a regional operations manager position within the next five years, overseeing multiple service territories and championing
    environmentally responsible landscaping practices across Montgomery County and beyond. He aims to earn certifications such as the Certified Landscape Professional (CLP) and LEED Green Associate, and
    eventually launch his own boutique firm that specializes in low-water, native-plant designs for residential and commercial clients. In parallel, he wants to mentor younger crew members, develop a reputation
    for innovative yet reliable service delivery, and achieve a level of career advancement that allows him more control over his schedule to better manage his stress and personal well-being.
