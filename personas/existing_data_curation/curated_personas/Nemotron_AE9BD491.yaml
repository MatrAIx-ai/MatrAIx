  career_goals: Chad aims to move from a senior technologist role into engineering management within the next five years. He plans to earn certifications such as the Certified Manufacturing Technologist
    (CMfgT) and a PLC programming credential, and eventually pursue a bachelor's degree in engineering technology to broaden his theoretical foundation. His short‑term goal is to lead a cross‑functional
    project that implements Industry 4.0 IoT monitoring on the production line, showcasing both efficiency gains and creative product design. Long‑term, he envisions establishing a boutique consultancy
    that helps midsize manufacturers integrate functional aesthetics and lean processes, while also mentoring apprentices to foster a collaborative, high‑energy workplace culture.
