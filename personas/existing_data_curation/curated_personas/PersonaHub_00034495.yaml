persona_description: A researcher or healthcare professional who studies autoimmune diseases, particularly ANCA-associated vasculitis (AAV), and their impact on infection risk. This person is interested
  in understanding the prevalence and characteristics of infections in AAV patients compared to the general population, as well as the factors that contribute to the higher risk of infection in AAV patients.
  They are looking for evidence-based strategies to reduce the risk of infection in AAV patients and are seeking to improve the understanding of infection risk assessment in this population.
