    & Public Speaking", "Budget Planning"]'
  hobbies: '["Reading (literature & non‑fiction)", "Cooking Korean & fusion cuisine", "Yoga and Tai Chi", "Hiking (Forest Park, Hudson Valley)", "Visiting art galleries & film festivals", "Mentoring adult
    learners", "Puzzle solving (crossword, Sudoku)", "Balcony gardening", "Exploring Queens'' multicultural food scene"]'
  career_goals: Thu aims to transition into a senior strategic role—such as Director of Learning & Development or Chief Learning Officer—where she can shape a data‑informed, technology‑enabled learning
    strategy that directly supports business outcomes. She is driven to integrate emerging tools like AI‑personalized learning, AR/VR simulations, and micro‑learning platforms while ensuring measurable
    ROI. Additionally, she aspires to become a thought leader in the L&D field by publishing articles, delivering keynote presentations at industry conferences, and launching a boutique consulting practice
    that assists organizations in digital transformation. Mentoring the next generation of L&D professionals and establishing a well‑being program to mitigate stress for herself and her team are also central
    to her long‑term ambitions.
