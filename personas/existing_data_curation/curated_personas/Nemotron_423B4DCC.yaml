personas:
  professional: Thu Ku blends over twenty‑five years of corporate learning design with a data‑centric, technology‑enabled vision, employing ADDIE and AI‑driven micro‑learning while rigorously applying Kirkpatrick’s
    model to demonstrate ROI, and they approach each vendor proposal with skeptical scrutiny, positioning themselves as a competitive candidate for senior L&D leadership.
  sports: Thu Ku stays active by hiking the Hudson Valley trails with the Hudson Valley Trailblazers club in spring and fall, practices weekly yoga at a Queens studio, and roots for the New York Yankees,
    Knicks, and Giants, balancing a competitive drive for personal fitness with occasional burnout from over‑committing to work.
  arts: Thu Ku frequents local art galleries showcasing artists like Yayoi Kusama and Kehinde Wiley, attends Korean film screenings featuring directors such as Bong Joon‑ho, and unwinds to the melodies
    of Yo‑Yo Ma and Adele, letting these artistic experiences shape their reflective yet critical outlook.
  travel: Thu Ku prefers meticulously planned trips that blend cultural immersion with comfort, having explored the historic streets of Kyoto, the seaside cliffs of Santorini, and the vibrant neighborhoods
    of Queens, while they often wrestle with travel‑related anxiety that leads them to over‑pack and double‑check itineraries.
  culinary: Thu Ku enjoys cooking at an intermediate level, mastering traditional dishes like bibimbap and kimchi‑fried rice while creatively fusing flavors into bulgogi tacos with gochujang glaze and miso‑infused
    ramen, and they relish tasting the diverse street foods of Queens, especially the fragrant tteokbokki and roasted sweet potatoes.
  core: Thu Ku is a data‑driven L&D strategist who balances a fierce competitive edge with a chronic worry‑fuelled perfectionism, channels stress into yoga, crosswords, and culinary experiments, and never
    backs down from a challenge, even if it means sacrificing a full night’s sleep.
background:
  cultural: Thu Joo Ku is a first‑generation Korean American raised in New York City. Her family emphasized education, respect for elders, and the preservation of Korean cultural traditions. She is fluent
    in Korean, celebrates holidays such as Seollal and Chuseok, and incorporates Korean culinary practices into her daily life. While she values collectivist principles, her professional journey in training
    and development has fostered a competitive, results‑oriented mindset. Living in Forest Hills, a diverse Queens neighborhood, has exposed her to a wide array of Asian cultures and perspectives, shaping
    an adaptable, cross‑cultural viewpoint that she applies in both her personal interactions and her work designing inclusive learning experiences.
attributes:
  skills: '["Instructional Design (ADDIE, SAM)", "E‑learning Development (Articulate Storyline, Adobe Captivate)", "LMS Administration (Cornerstone, SAP SuccessFactors)", "Training Needs Analysis", "Curriculum
