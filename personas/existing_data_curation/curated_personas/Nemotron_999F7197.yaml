personas:
  professional: Thomas Manka, a 66‑year‑old retired mechanical engineer, blends their decades of CAD, mechanical design, and data‑analysis expertise with a curiosity‑driven love for aesthetics, mentoring
    high‑school robotics teams, tutoring adult learners in Python, and consulting on small‑scale product prototyping that marries function and visual appeal.
  sports: Thomas Manka, an avid weekend hiker and member of the Toledo River Runners club, roots for the Cleveland Browns, Detroit Tigers, Cleveland Cavaliers, and hometown Toledo Mud Hens, while regularly
    playing pickleball at the Maumee Community Center and joining a senior cycling group each spring.
  arts: Thomas Manka, a watercolor enthusiast who frequents the Toledo Museum of Art, draws inspiration from Monet and Hopper, curates a personal collection of vintage radios as functional sculptures, attends
    productions at the Toledo Repertory Theatre featuring works by Arthur Miller, playlists the Beatles’ “Abbey Road” while editing landscape photos, and regularly reads Arthur C. Clarke’s science‑fiction
    novels, reflecting a life where visual and performing arts converge.
  travel: Thomas Manka, who plans trips with a meticulous spreadsheet but leaves room for spontaneous photo walks, has already toured the historic streets of Kyoto, the vibrant markets of Marrakech, and
    the art‑laden alleys of Florence, and aims to experience the Edinburgh Festival Fringe, Rio de Janeiro’s Carnival, and the Albuquerque International Balloon Fiesta before their 70th birthday, balancing
    modest retirement savings with occasional family‑driven road trips to nearby Lake Erie.
  culinary: Thomas Manka, an adept home cook with a green thumb, often harvests heirloom tomatoes, basil, and thyme from their backyard to whip up fresh bruschetta, caprese salads, and homemade marinara
    sauce for spaghetti, while occasionally indulging in a well‑executed chicken piccata with capers and experimenting with smoked paprika and maple glaze on wood‑cured pork ribs.
  core: Thomas Manka, a curious 66‑year‑old engineer‑turned‑maker, balances meticulous spreadsheets with spontaneous watercolor sessions, treats vintage radios like art, and never skips a Saturday hike
    even when their knees protest.
background:
  cultural: Thomas grew up in a middle‑class, German‑American family in the suburbs of Toledo, Ohio. The Midwestern values of modesty, self‑reliance, and community service shaped his outlook, while his
    parents encouraged a love of learning and respect for the arts. He embodies the classic Midwest ethos of practical problem solving paired with an openness to new ideas, which informs both his personal
    pursuits and his collaborative approach to mentorship.
attributes:
  skills: '[''Mechanical design'', ''Computer-aided design (CAD)'', ''Data analysis (Python, Excel)'', ''Technical writing'', ''Project management'', ''STEM mentorship'', ''Digital photography'', ''Woodworking'']'
  hobbies: '[''Visiting art museums'', ''Watercolor painting'', ''Landscape photography'', ''Woodworking'', ''Restoring vintage radios'', ''Hiking'', ''Science-fiction reading'', ''Community theater attendance'',
    ''Gardening'']'
  career_goals: Thomas aims to stay intellectually active by deepening his knowledge of sustainable technologies and digital art, volunteering as a mentor for local youth STEM programs, and eventually authoring
    a guidebook that demystifies modern maker tools for seniors. He also hopes to curate a small community exhibition that blends his love for engineering and visual art, and to travel to at least three
    major cultural festivals before turning 70.
