personas:
  professional: Joseph Hodges is a budding tech hobbyist who spends afternoons building and tweaking gaming PCs, filming street‑ball tricks for their YouTube channel, and volunteering at the library’s teen
    program, where their practical mindset and love for routine keep the tech‑setup running smoothly despite occasional disorganization.
  sports: Joseph Hodges enjoys playing pickup basketball with their close‑knit group at the Eastside Community Center, follows the NBA’s Los Angeles Lakers, and occasionally joins the local youth league
    Maplewood Hoops, preferring informal sessions over rigid training schedules.
  arts: Joseph Hodges immerses themselves in hip‑hop and R&B playlists featuring Kendrick Lamar and SZA while sketching comic‑style characters inspired by Mike Mignola, and they craft short street‑ball
    video clips that blend rhythmic beats with visual storytelling.
  travel: Joseph Hodges prefers low‑key weekend road trips to nearby state parks and family vacations to Orlando’s theme parks and Washington D.C., and they dream of a future adventure in Tokyo to explore
    its gaming culture and street art scene.
  culinary: Joseph Hodges favors comfort foods like pepperoni pizza, spicy ramen, and homemade mac and cheese, can barely master a grilled cheese sandwich, and they regularly snack on Doritos while experimenting
    with hot sauce to elevate the flavor.
  core: Joseph Hodges is a routine‑oriented, tech‑savvy teen who blends low‑key basketball games, PC building, and comic sketching into a quietly cooperative life, and they cherish small‑group hangouts
    while occasionally slipping into disorganized spurts.
background:
  cultural: Joseph was raised in Newburgh’s largely African‑American community, where family bonds, church gatherings, and neighborhood block parties play a central role. His grandparents migrated to the
    Hudson Valley during the Great Migration, passing down values of hard work, resilience, and community support. Local cultural staples—street basketball courts, hip‑hop music, community center programs,
    and annual celebrations like Juneteenth—have shaped his identity, reinforcing a sense of belonging and a commitment to harmony within his neighborhood.
