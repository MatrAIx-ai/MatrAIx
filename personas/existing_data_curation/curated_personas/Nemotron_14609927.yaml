  hobbies: '["Visiting art galleries and museums", "Attending theater and live music performances", "Watercolor painting", "Quilting", "Gardening", "Book club membership", "Volunteering at community health
    fairs", "Yoga classes", "Traveling to culturally rich destinations", "Cooking classes and culinary exploration"]'
  career_goals: Heather aims to transition from clinic management to a regional director role overseeing multiple health facilities in Central Oklahoma, where she can champion innovative patient-centered
    care models that blend health services with artistic and cultural programming. She is interested in expanding telehealth services for rural populations, mentoring emerging health administrators, and
    leading a community health initiative that partners with local arts organizations to improve mental health outcomes. Continuing education through a healthcare leadership certificate and participation
    in professional networks are also part of her plan.
