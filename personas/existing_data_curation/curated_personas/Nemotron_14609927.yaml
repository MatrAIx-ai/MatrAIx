personas:
  professional: Heather Howell, a seasoned healthcare administrator with over three decades of experience overseeing outpatient clinics and community health programs in the Norman‑Oklahoma City region,
    leverages their strategic planning, budgeting, and EMR expertise together with a curious, art‑appreciating mindset to inject creative, community‑focused solutions—such as art‑therapy events—into patient
    care while navigating the demanding regulatory landscape with a relaxed, flexible approach.
  sports: Heather Howell enjoys low‑impact fitness through weekly yoga sessions at the Norman community center, participates in a senior walking club that meets for scenic trails along the Oklahoma River,
    roots for the Oklahoma City Thunder and the Oklahoma Sooners, and occasionally joins a local bridge club that doubles as a gentle mental‑exercise sport, all while they prefer a relaxed, social approach
    to staying active.
  arts: Heather Howell immerses themselves in the arts by attending gallery openings featuring works by Georgia O’Keeffe, catching performances by the Oklahoma City Ballet, listening to chamber concerts
    with Yo‑Yo Ma, while at home they paint delicate watercolors of their garden, quilt intricate Log Cabin patterns, and follow the theatrical productions of the Oklahoma Shakespeare Festival.
  travel: Heather Howell prefers flexible, culturally rich weekend trips, often booking spontaneous flights to cities like Santa Fe, New Orleans, and Kyoto to explore museums, local markets, and culinary
    classes, while they balance their modest retirement budget by using discount travel sites and traveling with a close circle of friends rather than family commitments.
  culinary: Heather Howell, an enthusiastic home cook with an intermediate skill level, revels in mastering global dishes such as Thai green curry with fresh lemongrass, Moroccan chicken tagine spiced with
    cumin and preserved lemon, and Mexican mole, often sourcing organic cilantro, saffron, and heirloom tomatoes at the farmer’s market and pairing meals with a glass of Pinot Noir.
  core: Heather Howell blends a vibrant love for art, community, and health into a relaxed, curiosity‑driven lifestyle, punctuated by occasional forgetfulness about appointments but always finding time
    for a brushstroke, a yoga pose, or a spontaneous trip to a new city.
background:
  cultural: Heather identifies as a White American with deep roots in the Great Plains. Raised in Oklahoma, she grew up amidst a blend of rural traditions and the university-town atmosphere of Norman, where
    community ties, hospitality, and a love for local arts and music shaped her worldview. Her family background reflects a mix of Protestant values and Midwestern sensibilities, emphasizing hard work,
    self-reliance, and civic engagement. Living in McClain County, she has absorbed regional customs such as country‑music gatherings, barbecue socials, and an appreciation for the natural landscape, while
    also respecting the cultural contributions of Native American and Hispanic neighbors in the area. This cultural tapestry informs her inclusive approach to health services and community outreach.
