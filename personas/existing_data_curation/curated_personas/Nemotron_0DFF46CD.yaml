personas:
  professional: Roni Phillips, a disciplined accountant and auditor with advanced Excel, Power BI, and SAP expertise, translates complex GAAP and SOX compliance matters into clear, collaborative solutions
    while methodically driving process optimization and mentoring junior staff.
  sports: Roni Phillips supports the Charlotte Hornets and Carolina Panthers, jogs with the Forsyth County Running Club on Saturdays, participates in a local yoga studio's weekend Yoga for Athletes class,
    and tends to skip the occasional evening gym session after long work days.
  arts: Roni Phillips enjoys listening to Stevie Wonder's classic soul albums, watches Lin‑Manuel Miranda’s Hamilton on Broadway livestreams, reads Maya Angelou's memoirs, and attends quarterly art shows
    featuring Southern folk painters like Nell Jackson in the local community gallery.
  travel: Roni Phillips has explored the historic streets of Charleston, savored the beaches of Jamaica, and dreams of touring the castles of Scotland while balancing travel plans around the school calendar
    and budgeting for modest family trips.
  culinary: Roni Phillips loves experimenting with Southern‑inspired dishes such as shrimp and grits and Caribbean flavors like jerk chicken with Scotch bonnet peppers, often incorporating homegrown tomatoes,
    collard greens, and sweet plantains into elaborate weekend meals.
  core: Roni Phillips blends analytical rigor with nurturing community spirit, balancing meticulous financial stewardship, garden‑to‑table cooking, yoga‑centered wellness, and a habit of over‑planning that
    occasionally leaves little room for spontaneous fun.
background:
  cultural: Roni identifies as an African American woman with deep roots in the Atlanta region. Her upbringing emphasized education, family cohesion, and community service, shaping her respect for tradition
    and dedication to social uplift. She actively participates in cultural celebrations such as Juneteenth and Kwanzaa and is a member of the National Association of Black Accountants, which reinforces
    her commitment to representation in finance. Her cultural perspective informs her collaborative work style and her passion for mentoring the next generation of Black professionals.
attributes:
  skills: '[''Financial reporting (GAAP)'', ''Internal controls design'', ''Risk assessment and mitigation'', ''SOX compliance auditing'', ''Advanced Excel modeling'', ''Power BI and Tableau data visualization'',
    ''ERP systems (SAP, Oracle Financials)'', ''Forensic accounting'', ''Tax planning and preparation'', ''Process optimization'', ''Project management'', ''Clear stakeholder communication'']'
  hobbies: '[''Gardening'', ''Cooking (Southern and Caribbean dishes)'', ''Yoga'', ''Reading (historical nonfiction, personal development)'', ''Knitting'', ''Volunteer work at church outreach programs'',
    ''Mentoring young professionals'']'
  career_goals: Roni aims to advance to a senior leadership position such as Finance Director or CFO within a midsize organization that values community impact, and eventually to become a partner in a public
    accounting firm. She is pursuing CPA certification and plans to deepen her expertise in data analytics and ESG reporting to stay ahead of industry trends. Mentorship is a priority; she hopes to create
    a structured pipeline for junior Black accountants through professional networks like NABA, and to lead financial‑literacy workshops for local families in Forsyth County.
