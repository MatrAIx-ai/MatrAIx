  hobbies: '["Gardening", "Cooking Southern/Soul Food", "Reading (medical journals, biographies, fiction)", "Book Club", "Volunteer Health Fair Participation", "Yoga", "Walking/Bayou Trails", "Crocheting",
    "Genealogy Research"]'
  career_goals: Vernell aims to advance her nursing career by earning a Bachelor of Science in Nursing (BSN) within the next two years, followed by pursuing a Nurse Practitioner certification specializing
    in chronic disease management. She hopes to become a charge nurse, leading a small team with a collaborative yet assertive style, and to mentor new nurses, fostering a supportive learning environment.
    Additionally, she is passionate about developing community health outreach programs targeting underserved neighborhoods in Houston, leveraging her cultural insight to improve health equity. Throughout
    her professional growth, she prioritizes maintaining a sustainable work‑life balance to manage stress and preserve her well‑being.
