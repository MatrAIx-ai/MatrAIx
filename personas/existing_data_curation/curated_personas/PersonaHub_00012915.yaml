persona_description: A university English instructor who is interested in developing a creative non-fiction writing project that encourages students to engage with writing, reading, discourse communities,
  and literacy through personal narratives. This instructor is familiar with the challenges faced by students in writing courses, such as resistance to revision and the lack of attention to sentence-level
  focus, and is looking for a way to counteract these issues and move students towards a more university-level writing discourse. This instructor is also interested in incorporating diverse literacies into
  the writing process and is open to learning from other educators who have successfully implemented this project in their own classes.
