  hobbies: '[''Reading business/self‑development books'', ''Reading classic literature'', ''Tutoring high‑school students'', ''Community service at local center'', ''Church youth group involvement'', ''Event
    planning'', ''Choir participation'', ''Yoga'', ''Walking/hiking at Sweetwater Creek State Park'', ''Cooking Southern cuisine'', ''Instagram food blogging'']'
  career_goals: Short‑term, Myda wants to secure a summer internship or part‑time role in a corporate finance or marketing department to apply her academic knowledge in a real‑world setting while building
    a professional network. She plans to obtain relevant certifications such as Bloomberg Market Concepts (BMC) and a Certified Associate in Project Management (CAPM) within the next two years. Long‑term,
    she aspires to become a project manager for a mid‑size company or launch her own boutique consulting firm that helps local small businesses in Fayette County with financial planning and digital marketing.
    She envisions pursuing an MBA after gaining three to five years of work experience, with a focus on entrepreneurship and strategic management.
