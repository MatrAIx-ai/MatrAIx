personas:
  professional: Myda Mcbride is an aspiring corporate finance intern who leverages their Excel mastery, data visualization acumen, and detail‑oriented project coordination skills to deliver structured,
    actionable insights while they maintain a calm, reliable presence in team settings.
  sports: Myda Mcbride stays active by practicing yoga three times a week at the Sweetwater Creek Yoga Studio, joining the community center’s co‑ed soccer league in the spring, and cheering on the Atlanta
    Falcons, Braves, and Hawks while they track player stats for fun.
  arts: Myda Mcbride finds artistic balance in listening to the church’s gospel choir, streaming R&B legends like Alicia Keys and classic soul artist Otis Redding, and delving into timeless novels by Jane
    Austen and F. Scott Fitzgerald, which inform their storytelling style when presenting project proposals.
  travel: Myda Mcbride prefers well‑planned road trips to historically rich Southern towns such as Savannah and Charleston, loves the predictability of scheduled itineraries, and dreams of an organized
    backpacking adventure through Paris and Kyoto once they can afford a gap‑year after college.
  culinary: Myda Mcbride, a confident home cook, delights in mastering Southern soul‑food staples like crisp fried chicken (marinated in buttermilk and seasoned with paprika), slow‑cooked collard greens
    with smoked turkey, and sweet potato pie spiced with nutmeg and cinnamon, and they often share vibrant photos of these dishes on Instagram.
  core: Myda Mcbride is a detail‑obsessive, community‑driven 18‑year‑old who balances spreadsheets and soul food, yet they occasionally over‑schedule their day, leaving little room for spontaneous fun.
background:
  cultural: Myda is an African American raised in Fairburn, Georgia, where family, church, and community play central roles. She grew up listening to gospel music and soul classics, and family gatherings
    often feature hearty Southern dishes like collard greens, fried chicken, and cornbread. Her parents emphasized education and civic responsibility, encouraging her to excel academically and give back
    to the neighborhood. The local African‑American church community provides a support network that reinforces values of cooperation, harmony, and service. Myda also draws inspiration from Black entrepreneurs
    in Atlanta and the broader Southern Black business tradition, which influences her ambition to support local enterprises and preserve cultural heritage.
attributes:
  skills: '[''Financial analysis'', ''Budgeting'', ''Market research'', ''Basic accounting'', ''Microsoft Excel (advanced)'', ''PowerPoint presentation design'', ''Data visualization (Tableau)'', ''Project
