  career_goals: Araceli aims to advance within casino security, targeting a senior surveillance analyst role where she can lead a team, design training programs, and influence security policy. She plans
    to earn the Certified Protection Officer (CPO) credential and eventually complete an associate degree in criminal justice, positioning herself for a transition to law enforcement or corporate security
    management. Long‑term, she envisions a leadership position that blends her practical expertise with her curiosity for new security technologies, allowing her to contribute to safer gaming environments
    while mentoring newer officers.
