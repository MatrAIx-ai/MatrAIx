  hobbies: '[''Playing soccer with friends'', ''Building LEGO and mechanical sets'', ''Reading adventure books'', ''Drawing comic‑book characters'', ''Listening to hip‑hop and R&B music'', ''Participating
    in Cub Scout community service'', ''Helping with church youth group events'']'
  career_goals: Antonio dreams of becoming a firefighter or a pediatric nurse, driven by his strong desire to protect and care for others. He is fascinated by how emergency responders work and often volunteers
    for school safety drills. In the short term, he aims to earn his Cub Scout rank and take on a leadership role in his soccer team, building the confidence and teamwork skills he believes will help him
    keep his community safe in the future.
