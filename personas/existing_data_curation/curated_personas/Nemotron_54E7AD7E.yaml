personas:
  professional: Antonio Richardson dreams of becoming a mechanical engineer, building elaborate LEGO gear sets that satisfy their love for predictability while navigating the inevitable disorganization
    of a nine‑year‑old mind.
  sports: Antonio Richardson plays for the Riverdale Runners junior soccer team, relishes after‑school scrimmages, and is a fan of FC Barcelona and the Cityville Eagles baseball team, blending structured
    drills with spontaneous play.
  arts: Antonio Richardson sketches Spider‑Man and Batman in the margins of school notebooks, devours adventure novels by Rick Riordan, and listens to hip‑hop and R&B tracks by Kendrick Lamar and Beyoncé,
    letting the rhythm spark their imagination during quiet moments.
  travel: Antonio Richardson longs for a family road‑trip to the Grand Canyon and a future vacation at Disney World in Orlando, favoring itineraries that balance scheduled museum visits with free‑play at
    playgrounds, though the thought of unexpected changes can trigger their stress.
  culinary: Antonio Richardson loves pepperoni pizza, chicken nuggets, and homemade fruit kebabs, can whip up a simple spaghetti Bolognese with parental guidance, and enjoys the combination of melty cheddar
    cheese and fresh basil, though they sometimes binge on sugary cereal before bed.
  core: Antonio Richardson is a compassionate, structure‑loving nine‑year‑old who balances LEGO engineering, soccer, and community service with a lingering worry that fuels meticulous saving and careful
    health monitoring.
background:
  cultural: Antonio comes from an African‑American family rooted in the Monmouth County area. His parents, both first‑generation college graduates, emphasize respect, family cohesion, and community service.
    The family regularly attends a historically Black Baptist church in nearby Asbury Park, where gospel music, Sunday school, and church picnics shape his cultural experiences. Family gatherings feature
    traditional soul foods such as collard greens, mac and cheese, and cornbread, and holidays are celebrated with a blend of Kwanzaa traditions and mainstream American customs. Growing up in Neptune, New
    Jersey, Antonio benefits from access to the Atlantic shoreline, multicultural programs at the local library, and neighborhood block parties that showcase local hip‑hop artists, enriching his sense of
    identity and belonging.
