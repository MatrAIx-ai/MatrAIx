personas:
  professional: Fairy Black is a budding robotics enthusiast who spends countless after‑school hours engineering programmable LEGO machines, applying a methodical, competition‑driven mindset to school science
    fairs and community tech workshops while meticulously documenting each build in a notebook.
  sports: Fairy Black is an eager member of the Indianapolis Youth Basketball League and a midfielder for the local soccer club, idolizing the Indiana Pacers and Indy Eleven, and approaches each practice
    by meticulously planning drills, tracking personal stats, and striving to out‑score opponents with a competitive edge.
  arts: Fairy Black enjoys listening to Beyoncé’s empowering anthems, studying the storytelling of Pixar’s “Inside Out,” and recreating favorite characters with LEGO, often quoting lines from “Black Panther”
    while sketching comic panels during after‑school art club sessions.
  travel: Fairy Black prefers family trips that blend fun with learning, having explored the interactive exhibits at Chicago’s Museum of Science and Industry and dreaming of visiting the vibrant music festivals
    of New Orleans and the historic monuments of Washington, D.C., always drafting a simple itinerary on a colorful map before departure.
  culinary: Fairy Black loves assembling homemade pizza topped with pepperoni, mozzarella, and pineapple, proudly mastering the perfect grilled cheese sandwich with sharp cheddar, and savors sweet corn
    on the cob at summer barbecues, while still relying on peanut‑butter‑jelly sandwiches for quick lunches.
  core: Fairy Black mixes relentless curiosity in robotics with a disciplined savings habit, a competitive sports spirit, and a quirky penchant for memorizing LEGO part numbers, all while never missing
    a Sunday church gathering.
background:
  cultural: Fairy's cultural background reflects the experience of an African‑American family in the Midwest, specifically Indianapolis. He is raised in a close‑knit Black community where church, family
    gatherings, and local community centers play central roles. His family emphasizes education, respect for tradition, and participation in neighborhood activities such as the Indianapolis Youth Basketball
    League and community festivals celebrating African‑American heritage. He is exposed to a blend of contemporary black music, stories of local civil‑rights history, and the city’s vibrant sports culture,
    all of which shape his worldview and values.
