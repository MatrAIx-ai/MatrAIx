  career_goals: Fairy dreams of a future where he can combine his love for structure and teamwork. He aspires to become a civil engineer who designs safe, functional community spaces, and is also fascinated
    by robotics, hoping to work as a robotics technician building machines that help people. At the same time, his competitive nature fuels an ambition to excel in basketball, aiming to play for his high
    school team and eventually earn a college scholarship. He sees these pathways as ways to stay organized, solve real‑world problems, and give back to his neighborhood.
