  hobbies: '["building LEGO models", "programming simple games (Scratch, Python)", "reading science‑fiction and inventor biographies", "basketball practice", "drumming in school band", "volunteering at
    Boys & Girls Club (STEM workshops)"]'
  career_goals: Kelvin aspires to become a civil engineer or robotics engineer, aiming to design practical and sustainable structures that benefit his community. He hopes to earn a scholarship to study
    engineering at a university, eventually working on infrastructure projects in Texas that improve safety and accessibility. In the short term, he plans to deepen his coding skills, compete in regional
    robotics competitions, and seek mentorship through local engineering outreach programs. He also envisions guiding youth STEM initiatives in Haslet, combining his technical interests with his natural
    leadership.
