  hobbies: '[''Landscape painting'', ''Community theater volunteering'', ''Chess club'', ''Fishing on the Intracoastal Waterway'', ''Cooking fusion recipes'', ''Reading speculative fiction'', ''Attending
    art exhibits'', ''Church choir singing'', ''Organizing block parties'']'
  career_goals: As he approaches retirement, Omari aims to transition from day‑to‑day supervision to a strategic advisory role, helping his plant implement sustainable production practices and championing
    safety culture. He hopes to become a mentor‑coach for emerging supervisors, perhaps leading a community apprenticeship program that blends technical skill with creative thinking. He also dreams of launching
    a small side business selling handcrafted wooden sculptures inspired by coastal motifs, merging his production knowledge with his artistic passion.
