personas:
  professional: Kim Russell, a veteran elementary and middle school teacher, channels her curiosity and meticulous organization into interdisciplinary STEAM curriculum design, energizing classrooms with
    hands‑on art projects while skillfully mediating student conflicts through a compassionate, socially‑aware demeanor.
  sports: Kim Russell, an active participant in the local Cascade Trails Hiking Club, tackles spring and summer treks through the Cascades, joins the Portland Timbers supporters’ weekly soccer walk‑abouts
    in the off‑season, and never misses a Saturday night Oregon Ducks football game.
  arts: Kim Russell immerses herself in the arts by studying Monet’s watercolors, sketching backstage at the Oregon Shakespeare Festival, listening to Joni Mitchell’s folk albums while painting, and attending
    live performances of Lin‑Manuel Miranda’s shows whenever they tour the West Coast.
  travel: Kim Russell prefers purposeful, low‑key journeys that align with school breaks, such as winter snowshoeing in Banff, summer road trips along the Pacific Coast Highway to the Monterey Bay Aquarium,
    and a long‑awaited pilgrimage to Edinburgh’s Fringe Festival, all booked months in advance to squeeze maximum cultural immersion into limited vacation days.
  culinary: Kim Russell, an enthusiastic home cook, routinely transforms garden‑fresh rosemary, thyme, and basil into herb‑infused pesto for hand‑made pasta, delights in simmering a vegetable ratatouille
    seasoned with smoked paprika, and treats themselves to seasonal farmer’s‑market burrata salads while reserving evenings for occasional dining at Portland’s farm‑to‑table bistro Le Pigeon.
  core: Kim Russell, a 51‑year‑old educator whose boundless curiosity is matched by a penchant for meticulous planning and a lingering worry about unfinished projects, finds solace in watercolor brushes,
    mountain trails, and mindful breaths, even if it means occasionally sacrificing a night of sleep to perfect a lesson plan.
background:
  cultural: Kim Ann is a White American with roots in the Pacific Northwest. Raised in a small town in Oregon, she grew up surrounded by the region’s natural beauty and a strong community emphasis on environmental
    stewardship and the arts. The vibrant cultural scene of Ashland—home to the Oregon Shakespeare Festival and numerous galleries—has profoundly shaped her appreciation for theater, visual arts, and inclusive
    community engagement. Her family background includes a tradition of public service and education, fostering a deep respect for lifelong learning and civic involvement. These cultural influences inform
    her teaching philosophy, her commitment to integrating arts into education, and her active participation in local cultural and environmental initiatives.
