  career_goals: Kim Ann aims to become a lead curriculum specialist focusing on STEAM education, championing the integration of art and humanities across the district. She hopes to earn a Master's in Education
    Leadership to move into an administrative role such as assistant principal or department head, where she can shape school policies that prioritize student wellbeing and arts programming. She also aspires
    to develop a community partnership program linking her school with the Oregon Shakespeare Festival and local environmental groups to provide experiential learning opportunities. Additionally, she wants
    to mentor new teachers and lead professional development workshops on innovative instructional strategies and stress-reduction techniques for educators.
