persona_description: A woman who is seeking compensation from the government for being coerced into sterilisation without her consent, and who is documenting such cases in Zimbabwe to establish the actual
  number of sterilisation victims. She is part of the Pan-African Positive Women's Coalition (PAPWC) and is involved in documenting evidence of the forced sterilisation of HIV positive women since 1998.
  She is a member of the International Community of Women Living with HIV/AIDS and is working to ensure that the right to give birth is respected by HIV positive women despite being infected with HIV.
