personas:
  professional: Katheryn Kirksey, a budding preschool storyteller who organizes circle time with vivid imagination, follows simple lesson plans, thrives on the attention of peers, balances curiosity with
    practical routines, and is known for their kind, cooperative nature.
  sports: Katheryn Kirksey sprints around the local playground, practices tee‑ball with the Scottsboro Little Sprouts club in spring, cheers loudly for the Alabama Crimson Tide on Saturdays, and they love
    to repeat the same routines at home to build stamina, showing a lively yet organized approach to staying active.
  arts: Katheryn Kirksey delights in singing Dolly Parton’s classic country melodies at Sunday school, dancing to Disney’s ‘Let It Go’ during playtime, and creating colorful dinosaur sketches at the library
    story hour, and they often rehearse these performances for family evenings, letting these artistic moments shape their cheerful identity and love for performance.
  travel: Katheryn Kirksey enjoys short family road trips to the county fair, weekend visits to the Great Smoky Mountains for picnics, and dreams of a future Disney World adventure, and they plan each outing
    with a favorite stuffed animal for comfort, reflecting a blend of adventurous curiosity and need for security.
  culinary: Katheryn Kirksey loves buttery biscuits with savory gravy for breakfast, devours chicken nuggets with honey mustard for lunch, enjoys mac and cheese at dinner, and proudly helps stir the batter
    for pancakes, all while requesting extra strawberries on their yogurt, and they relish the occasional family bake‑off where they sprinkle cinnamon sugar on toast.
  core: Katheryn Kirksey is a bubbly four‑year‑old who balances boundless curiosity with a need for routine, loves being the center of attention, worries about new experiences, and they often forget to
    tidy up their crayons after a creative burst.
background:
  cultural: Katheryn is raised in Scottsboro, a small town in northern Alabama, within a white, Southern family that values hospitality, close‑knit community ties, and church involvement. Her early environment
    includes attending a local preschool, participating in Sunday school, joining library story hours, and celebrating community events such as the county fair and holiday festivals. Southern cultural touches
    like country music, family meals of biscuits and gravy, and a respectful, courteous demeanor shape her worldview while she also absorbs modern children’s media.
