  career_goals: Katheryn often talks about becoming a teacher because she enjoys helping friends learn new things, or a veterinarian so she can care for animals she loves. She also dreams of performing
    on stage, imagining herself as an actress in school plays. Underlying these youthful ambitions is a strong desire to be kind, organized, and supportive in a future role that makes others feel safe and
    happy.
