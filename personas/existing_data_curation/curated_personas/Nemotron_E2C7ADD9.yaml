personas:
  professional: Brian Jones, a budding junior engineer in the making, already shows a knack for constructing intricate LEGO models and experimenting with Scratch coding, channeling their disciplined curiosity
    into systematic problem‑solving and collaborative teamwork during school projects.
  sports: Brian Jones dashes across the field for the Greenville Green Wave Youth Soccer Club every Saturday, idolizes the Carolina Panthers for their teamwork, and cheers for the Charlotte Hornets during
    off‑season basketball, keeping a neatly organized practice log that reflects their energetic yet disciplined approach to fitness.
  arts: Brian Jones spends afternoons immersed in the adventures of 'The LEGO Movie' and the curiosity‑sparking episodes of Bill Nye the Science Guy, while devouring science‑filled adventure books by authors
    like Chris Columbus, and they often recreate favorite scenes with LEGO bricks, letting their imaginative side shape their artistic expression.
  travel: Brian Jones enjoys family road trips that blend short hikes in the Blue Ridge Mountains and picnics at Cleveland Park, and they’ve already chalked up a day trip to Washington’s National Air and
    Space Museum as a highlight while dreaming of future adventures to the Great Smoky Mountains and a Disneyland vacation, favoring a mix of carefully plotted itineraries and spontaneous nature detours.
  culinary: Brian Jones favors classic kid‑friendly dishes like pepperoni pizza, buttery mac and cheese with extra cheddar, and chicken nuggets, yet they also surprise family by crafting LEGO‑shaped pancakes
    topped with strawberries and a drizzle of maple syrup, showing a modest culinary confidence that leans toward playful experimentation rather than gourmet ambitions.
  core: Brian Jones is an organized, curiosity‑driven 9‑year‑old who balances soccer drills with LEGO engineering, yet habitually forgets to bring their inhaler to practice and leaves half‑finished LEGO
    sets scattered across the living room floor.
background:
  cultural: Brian was raised in a middle‑class, predominantly white suburb of Greenville, South Carolina. His family’s traditions reflect a blend of classic Southern values—hospitality, community involvement,
    and close family ties—alongside modern influences such as after‑school technology clubs and local sports leagues. He frequently participates in community events like the Greenville County Library story
    hours, town fairs, and school volunteer projects, which foster his collaborative spirit. The regional culture of emphasizing courteous interaction, respect for elders, and a love for outdoor activities
    shapes his everyday life.
