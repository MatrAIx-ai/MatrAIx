  career_goals: Inspired by his love for building and problem‑solving, Brian dreams of one day becoming a civil engineer or architect, designing bridges and community spaces that help people. He also expresses
    a keen interest in science, imagining a future as an astronaut or a marine biologist who explores the ocean. Guided by his disciplined nature, he sets high standards for himself in school, aiming to
    excel in math and science to lay the foundation for these careers.
