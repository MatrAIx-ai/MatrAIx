  career_goals: Andrew aims to move into a sales leadership role within the next three to five years, targeting positions such as Territory Manager or Sales Team Lead. He plans to complement his associate
    degree with a bachelor's in Business Administration and earn professional certifications like Certified Professional Sales Person (CPSP). Long‑term, he dreams of opening his own specialty retail shop
    that blends his love for outdoor gear with community outreach, while maintaining a stable income and a balanced lifestyle.
