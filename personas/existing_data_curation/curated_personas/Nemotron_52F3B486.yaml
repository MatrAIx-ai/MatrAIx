personas:
  professional: Andrew Rockhill, a 27‑year‑old sales professional in Eau Claire, leverages his data‑driven expertise with Salesforce and HubSpot to deliver needs‑based solutions, while they maintain a steady,
    organized demeanor and love crafting functional woodworking projects that translate into meticulous KPI dashboards, positioning them for a future territory‑manager role.
  sports: Andrew Rockhill, a steadfast Green Bay Packers supporter, fuels his fitness through regular hikes on the Chippewa River Trail and weekend fishing trips with the Chippewa River Anglers Association,
    while they occasionally join the Eau Claire recreational softball league to maintain cardiovascular health and team camaraderie.
  arts: Andrew Rockhill finds artistic respite in the rustic charm of woodworking, the folk narratives of The Avett Brothers and John Prine, and the occasional performance at the Eau Claire Community Theatre,
    while they enjoy the low‑key strategic creativity of their board‑gaming circle.
  travel: Andrew Rockhill plans trips with spreadsheet precision, favoring budget‑friendly road trips to national parks like Yellowstone and the Boundary Waters, and dreaming of a summer canoeing expedition
    through Glacier National Park, all while they balance a modest budget and occasional family obligations back home.
  culinary: Andrew Rockhill, an intermediate home‑cook, relishes grilling freshly caught walleye with lemon‑butter, whipping up hearty bratwurst‑and‑cheese‑curd platters, and occasionally perfecting dill‑infused
    pierogi, always sourcing ingredients from local farms and the Chippewa River markets, while they savor the satisfaction of a meal built from their own catch.
  core: Andrew Rockhill, a quietly ambitious 27‑year‑old who thrives on data‑driven sales and weekend fishing trips, balances a meticulous budget with a habit of over‑stocking kitchen supplies after each
    catch, while they maintain a reserved demeanor that masks a steadfast community spirit.
background:
  cultural: Andrew’s cultural background reflects the Midwestern white working‑class tradition of Eau Claire, Wisconsin. His family roots trace back to German and Scandinavian ancestors, instilling values
    of practicality, modesty, and a strong work ethic. Community life emphasizes self‑reliance, neighborly cooperation, and appreciation for the outdoors, which shape his worldview. Local customs such as
    attending county fairs, supporting the Green Bay Packers, and participating in community service events are familiar and meaningful to him.
