persona_description: A researcher in the field of aging and technology, particularly in the area of monitoring and assessing changes in motor behaviors and memory in the context of Alzheimer's disease and
  related disorders. This person is interested in the continuous monitoring of in-home activity to detect subtle changes in motor behaviors and memory patterns, which can be used to more effectively identify
  when elders are starting to have trouble. They are likely to be familiar with the use of unobtrusive technology to monitor activity in a person's home, and have experience in the field of biomedical engineering
  and research.
