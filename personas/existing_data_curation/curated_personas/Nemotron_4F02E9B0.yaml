  hobbies: '[''Hiking'', ''Fishing'', ''Birdwatching'', ''Woodworking'', ''Acoustic guitar'', ''Church potlucks'', ''Cooking comfort meals'', ''Reading Appalachian folklore'', ''Collecting mystery novels'']'
  career_goals: Nathan hopes to formalize his desire to help others by earning a GED and completing a Certified Nursing Assistant (CNA) training program, which would allow him to provide in‑home support
    for seniors in his community. He also aims to expand the neighborhood garden he helps maintain, turning it into a small cooperative that supplies fresh produce to local food banks. In the longer term,
    Nathan envisions a role as a volunteer coordinator at the Weaverville senior center, where he can blend his organizational skills with his natural inclination toward compassion and harmony.
