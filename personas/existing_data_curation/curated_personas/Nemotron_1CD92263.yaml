personas:
  professional: Shantell Boomer, a 32‑year‑old public relations manager with expertise in strategic communications, media outreach, and data‑driven fundraising, they blend a curiosity for new ideas with
    a practical, organized approach to craft clear narratives while maintaining a healthy skepticism toward stakeholder motives, positioning them for a future director role in a social‑equity nonprofit.
  sports: Shantell Boomer, a 32‑year‑old fitness advocate, they track the New York Knicks in winter and the New York Yankees in summer, play forward for a co‑ed weekend soccer league with the Jersey City
    Community Club, and attend tri‑weekly yoga sessions to maintain flexibility and mental balance.
  arts: Shantell Boomer, a 32‑year‑old cultural enthusiast, they immerse themselves in Jersey City galleries and independent theater productions, draw inspiration from the bold visual narratives of Kara
    Walker and the soulful rhythms of Kendrick Lamar, and curate a modest collection of limited‑edition prints from emerging artists after each gallery opening.
  travel: Shantell Boomer, a 32‑year‑old travel aficionado, they meticulously plan weekend escapes to the Hudson Valley’s farm‑to‑table retreats and annual adventures to Kingston, Jamaica, they balance
    a love for cultural immersion with a cautious budget, and they dream of exploring Lisbon’s culinary scene while still honoring family responsibilities.
  culinary: Shantell Boomer, a 32‑year‑old culinary explorer, they cultivate basil, thyme, and scotch bonnet peppers on a rooftop garden to blend Southern comfort dishes like shrimp and grits with Caribbean
    heat, they experiment with collard‑green‑infused jambalaya and sweet plantain‑topped cheese‑stuffed okra, and they enjoy occasional dining at farm‑to‑table restaurants that celebrate seasonal produce.
  core: Shantell Boomer, a 32‑year‑old data‑driven PR strategist, they balance a competitive curiosity with cautious practicality, channeling solitary pursuits like rooftop gardening and trivia into community
    impact while quietly doubting the motives behind every agenda.
background:
  cultural: Shantell identifies as Black American with family roots spanning the American South and the Caribbean. Growing up in the culturally vibrant neighborhoods of Jersey City, she was immersed in
    a community that values resilience, storytelling, and collective uplift. Her cultural heritage informs her commitment to equity in her PR work, her appreciation for soulful music and food, and her participation
    in local cultural festivals that celebrate Black history and contemporary contributions.
attributes:
  skills: '[''Strategic Communications Planning'', ''Media Relations'', ''Crisis Communication'', ''Donor Stewardship'', ''Grant Writing'', ''Fundraising Campaign Management'', ''Event Production'', ''Digital
