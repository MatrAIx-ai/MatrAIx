  hobbies: '[''Reading (nonfiction, biographies)'', ''Rooftop gardening'', ''Cooking (Southern and Caribbean fusion)'', ''Visiting art galleries and independent theaters'', ''Yoga'', ''Competitive trivia
    nights'', ''Chess club'']'
  career_goals: Shantell aims to transition from her current managerial role to a director-level position overseeing development and communications for a midsize nonprofit focused on social equity. She
    aspires to design and execute high-impact, data-driven fundraising initiatives that diversify revenue streams and expand the organization’s reach. Long‑term, she envisions earning an MBA or MPA to deepen
    her leadership capabilities, mentoring emerging PR professionals from underrepresented backgrounds, and eventually serving on the board of a cultural institution in Hudson County.
