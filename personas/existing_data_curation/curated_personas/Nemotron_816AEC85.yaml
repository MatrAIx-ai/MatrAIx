  career_goals: Desrene aims to earn a Bachelor of Fine Arts in Visual Communication and later pursue a master's degree in art therapy, with the long‑term ambition of opening a community art studio in Lawrenceville
    that offers free workshops for teens and young adults dealing with mental‑health challenges. In the short term, she plans to work as a freelance digital illustrator and content creator for nonprofit
    organizations focused on youth empowerment, allowing a flexible schedule that supports her wellbeing. She also hopes to develop an online platform that merges storytelling, illustration, and mental‑health
    resources, positioning herself as a creative leader who bridges art and social impact while maintaining a collaborative, people‑centered work environment.
