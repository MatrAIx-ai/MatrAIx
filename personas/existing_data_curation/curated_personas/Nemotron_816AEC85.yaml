personas:
  professional: Desrene Mckinney is a budding freelance digital illustrator and content creator who leverages Adobe Photoshop, Procreate, and Illustrator to produce storytelling‑rich graphics for nonprofit
    youth‑empowerment groups, while also facilitating art‑based workshops at a local youth center; they blend their extroverted flair with a relaxed, spontaneous work style.
  sports: Desrene Mckinney is an enthusiastic supporter of the Atlanta Hawks and often joins pickup basketball games at the neighborhood park, while also practicing yoga at the community center and hiking
    the Sweetwater Creek trails on weekends to stay active and clear their mind.
  arts: Desrene Mckinney immerses herself in contemporary art by visiting the High Museum of Art, admiring street‑mural projects along the Beltline, drawing inspiration from artists like Kehinde Wiley and
    Kara Walker, and fueling her creative process with the sounds of Kamasi Washington, H.E.R., Tycho, and Kendrick Lamar while writing poetry that blends speculative fiction themes.
  travel: Desrene Mckinney favors spontaneous weekend road trips to places like Savannah’s historic district and Asheville’s arts scene, dreams of wandering Berlin’s galleries one day, and often plans trips
    around student discounts and group rides with friends to balance adventure with a limited budget.
  culinary: Desrene Mckinney enjoys cooking soulful dishes such as collard greens with smoked turkey and sweet tea, while also experimenting with avocado toast topped with chili flakes and sipping craft
    coffee from local cafés like Java Jive, often pairing meals with indie playlists.
  core: Desrene Mckinney is a vibrant, imagination‑driven creator who thrives on community connection, channels anxiety into art, and dances between spontaneous inspiration and occasional disorganization,
    all while they radiate warmth and talkativeness.
background:
  cultural: Desrene grew up in a close‑knit Black family in Lawrenceville, Georgia, where church gatherings, community events, and family storytelling were central to daily life. Her parents emphasized
    education, cultural pride, and resilience, exposing her to a blend of Southern soul music, gospel choirs, and contemporary hip‑hop, as well as local African‑American culinary traditions like collard
    greens and sweet tea. She participates in cultural celebrations such as Juneteenth festivals, local arts fairs, and neighborhood block parties, which have shaped her sense of identity and her desire
    to use art as a vehicle for cultural expression and social connection. This background informs her commitment to creating inclusive creative spaces that honor her heritage while embracing diverse perspectives.
