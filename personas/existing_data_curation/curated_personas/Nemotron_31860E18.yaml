  hobbies: '[''Community gardening'', ''Family recipe cooking and preservation'', ''Church choir singing'', ''Reading biographies'', ''Crossword puzzles'', ''Sudoku'', ''Knitting'', ''Walking in local parks'',
    ''Volunteer coordination at senior center'', ''Genealogical research'']'
  career_goals: Charity aims to complete her associate degree in community studies to formalize her knowledge and serve as a mentor for younger residents in Compton. She aspires to lead a senior advisory
    council at the local community center, bridging gaps between older adults and municipal services. Additionally, she hopes to expand the neighborhood garden she helped establish, creating a sustainable
    space for intergenerational learning and healthy food access. She also dreams of compiling her family’s oral histories into a small book that celebrates her ancestors’ legacy.
