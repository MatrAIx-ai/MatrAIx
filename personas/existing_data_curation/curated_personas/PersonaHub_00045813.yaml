persona_description: A young, innovative, and driven biotech student who has developed a groundbreaking technology using artificial intelligence to predict and diagnose diseases. Gangwal and his classmate,
  Pranav Gangwal, are twenty-one years old and have started a company called Orbuculum. They are interested in healthcare and have a unique perspective on the challenges of diagnosing diseases. They have
  a background in data science and genomics and have an intern who is older to them. Their technology uses genomic data to visualize the disease and has received a patent. They are eager to make a positive
  impact on healthcare delivery and have a unique understanding of the flaws in current methods of disease diagnosis.
