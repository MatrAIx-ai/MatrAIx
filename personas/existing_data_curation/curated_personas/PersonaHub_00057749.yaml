persona_description: A constitutional law scholar who specializes in the study of the United States Constitution, particularly the powers and limitations of the legislative and executive branches. He is
  particularly interested in the history and evolution of the separation of powers and the role of the executive branch in the democratic process. He is also knowledgeable about the political and social
  implications of the separation of powers and the influence of constitutional provisions on the functioning of the government. He has written extensively on the topic of the Confederate Congress and the
  role of the executive branch in the Confederacy.
