  hobbies: '[''Community Theatre'', ''Gospel Choir'', ''Youth Basketball Coaching'', ''Southern Cooking'', ''Gardening'', ''Reading African-American Literature'', ''Jazz Concert Attendance'', ''Mindfulness
    Meditation'', ''Journaling'']'
  career_goals: Antonio aims to move into school leadership by becoming a department chair and eventually a vice‑principal, where he can influence district policy on culturally responsive teaching. He plans
    to earn a bachelor's degree in education administration through night courses to strengthen his credentials. Antonio is passionate about launching a district‑wide mentorship program for at‑risk Black
    students, expanding after‑school academic support, and establishing partnerships with local businesses for career‑readiness pathways. He also hopes to be recognized with a statewide teaching excellence
    award and to author a guidebook on integrating African‑American literature into high‑school curricula.
