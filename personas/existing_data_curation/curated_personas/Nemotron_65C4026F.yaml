  career_goals: Kimberlee aims to move into a lead engineering role where she can mentor junior developers and shape product direction with a human‑centered lens. She envisions guiding a small, flexible
    team to build inclusive, accessible software—particularly in educational or cultural heritage domains. Balancing ambition with well‑being, she seeks a work environment that offers remote flexibility,
    low‑stress project pacing, and opportunities to integrate her humanities background into technology strategy.
