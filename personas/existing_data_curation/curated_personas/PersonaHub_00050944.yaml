persona_description: A historian or biographer who specializes in the life and works of Thomas Jefferson, particularly his periods of dejection and despair, his encounters with the old civilizations of
  the Mediterranean, and his transformation of anxiety into action through the esoteric lore he encountered. The persona is deeply interested in Jefferson's life, works, and legacy, and seeks to uncover
  the maps Jefferson used to find his way out of dejection and to forge a new democratic culture for America. The persona is also knowledgeable about the Enlightenment philosophy and its failures, and seeks
  to understand Jefferson's genius in a broader historical context.
