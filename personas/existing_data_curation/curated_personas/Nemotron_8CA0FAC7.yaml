  career_goals: Rachel dreams of a future where she can combine her love for helping others with a structured, reliable career. She often imagines becoming a teacher because she enjoys group activities
    and guiding peers, or a veterinarian to care for animals in a practical, routine-oriented setting. She also thinks about being a pediatric nurse, valuing the compassionate yet organized environment.
    These ambitions reflect her desire for stability, community service, and the ability to make a tangible difference.
