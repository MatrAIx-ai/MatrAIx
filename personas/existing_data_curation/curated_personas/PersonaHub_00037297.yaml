persona_description: A historian who specializes in the study of medieval history, particularly the period from the 11th to the 13th century. The historian is interested in the rise and fall of the Angevin
  dynasty, the conflicts between the barons and the king, and the role of the Church in the political landscape of the time. The historian is also interested in the various contributions made by the nobility
  during this period, including the contributions of figures such as Stephen Langton, Roger Bacon, and Thibault, Count of Champagne, and the University of Paris. The historian is also interested in the
  various military campaigns of the period, including the Fourth Crusade and the sack of Constantinople by the Latins. The historian is also interested in the various cultural and artistic developments
  of the period, including the University of Oxford and the University of Paris. The historian is also interested in the various religious and political developments of the period, including the excommunication
  of Philippe II., Auguste King of France from the Capetian dynasty and the placing of England under an interdict by Pope Innocent III.
