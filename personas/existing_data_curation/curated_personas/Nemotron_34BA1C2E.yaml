  career_goals: Although currently out of the formal workforce, Gene aims to deepen his impact on Salem’s social fabric. He plans to spearhead a local history preservation initiative that documents oral
    histories of longtime residents. He also hopes to write a memoir that weaves his family's Italian‑American journey with Midwestern life, and to mentor younger adults in effective communication and community
    leadership. Gene is interested in co‑directing the town’s community theater and may eventually offer part‑time consulting workshops for nonprofit organizations on event planning and volunteer management.
    Throughout these pursuits, he wants to maintain a balanced home life, supporting his marriage and fostering intergenerational connections within his community.
