  career_goals: Danielle aspires to advance within the School District of Lancaster’s transportation department. Her primary ambition is to become a driver trainer and safety coordinator, where she can
    formalize onboarding programs, conduct regular safety drills, and mentor new drivers. She plans to complete her associate degree in Transportation Management within the next two years, building on the
    college courses she began. Long‑term, she hopes to move into a Transportation Operations Manager role, overseeing route optimization for the entire district and advocating for mental‑health resources
    for drivers. She also wishes to develop a community outreach program that educates parents and students about safe bus practices and provides a support network for staff experiencing anxiety or stress.
