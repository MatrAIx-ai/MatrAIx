persona_description: A medical doctor who practiced in Asheville, North Carolina, and conducted research on the ideal temperature, humidity levels, and amount of wind believed to play a role in curing respiratory
  infections like tuberculosis. His work was influential in the development of climato-therapy and he held office in several buildings in Asheville. He also served as the County Medical Society’s president
  and was highly respected by his peers. His style was distinctive, with a military air and a love for hats and canes. He died in 1927 and was remembered as an institution in Asheville.
