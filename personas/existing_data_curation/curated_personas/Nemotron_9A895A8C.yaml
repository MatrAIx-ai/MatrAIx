    clerical staff'', ''Bilingual communication (English and Gujarati)'', ''Process improvement and workflow documentation'']'
  hobbies: '[''Cooking traditional Gujarati vegetarian dishes'', ''Participating in Navratri Garba and other cultural dance events'', ''Walking on the Virginia Beach boardwalk and beach picnics'', ''Knitting
    and crocheting for charity'', ''Reading self‑help and personal finance books'', ''Volunteering at local temples and community centers'', ''Attending yoga classes for stress relief'', ''Organizing community
    potlucks and social gatherings'']'
  career_goals: Sabina aims to move from a general clerical role into a senior administrative or office‑manager position within the next three to five years, where she can design and oversee office procedures
    that promote both efficiency and a low‑stress atmosphere. She plans to earn a Certified Administrative Professional (CAP) credential or an equivalent Office Administration certificate to solidify her
    expertise. A key ambition is to lead a small team, using her cooperative nature to foster a supportive workplace that minimizes tension and helps colleagues manage stress. Sabina also wishes to mentor
    younger employees, particularly those from immigrant backgrounds, sharing her bilingual skills and cultural insights. She hopes to secure a schedule that offers flexibility for family commitments and
    community events, allowing her to maintain the harmony she values at home and work. Ultimately, she envisions contributing her organizational talents to a non‑profit serving the South Asian diaspora,
    aligning her career with her personal dedication to community service.
