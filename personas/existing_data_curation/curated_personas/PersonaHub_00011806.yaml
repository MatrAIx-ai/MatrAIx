persona_description: Dr. Zhengzhao Johnny Luo, a scientist from the Department of Earth and Atmospheric Sciences at City College, is an expert in atmospheric science, specifically studying how convective
  storms transport pollutants from the surface to high altitudes and how these pollutants disperse across the globe. His research has earned him the NASA Group Achievement Award in 2015 for his findings
  on how these storms can be as effective as hurricanes at transporting pollution, even across oceans. Dr. Luo's research heavily relies on computer models and simulations, and he has become integral to
  complementing scientific observations in understanding different atmospheric events. However, he also presents a challenge as models struggle to capture every detail. Dr. Luo compares the observed behaviors
  of storms with what the models simulate to improve the realism of the models. His research interests include climate change, air pollution, and atmospheric science.
