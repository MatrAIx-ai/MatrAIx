  career_goals: Doraida aims to become a product development leader in a biotech startup that creates affordable medical devices for underserved communities, especially in Latin America. She plans to leverage
    her dual expertise to launch her own venture focused on point‑of‑care diagnostics within the next five years. Alongside entrepreneurship, she aspires to mentor Latinx women in STEM, serve on advisory
    boards for health‑tech incubators, and eventually earn an MBA to deepen her strategic and financial acumen. Her long‑term ambition includes influencing health‑policy frameworks that promote equitable
    access to innovative therapies.
