persona_description: A cardiologist who believes in the importance of monitoring heart rate during exercise and is critical of the idea that target heart rates have little meaning. They are also skeptical
  of the idea that recreational athletes waste their time monitoring their heart rate and believe that the body knows its own target heart rate. They are interested in the relationship between heart rate
  and cardiovascular fitness and the importance of oxygen delivery to the cells. They are also interested in the variability of heart rate levels from person to person and the potential for it to affect
  the effectiveness of exercise.
