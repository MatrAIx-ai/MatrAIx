  career_goals: Although retired, Tanya aims to remain an active pillar of her community. She plans to expand the senior‑center wellness program she helped launch, mentor a youth gardening club, and complete
    a memoir that weaves her family’s Appalachian story with recipes from her kitchen. She also hopes to learn digital photography to document local events and to support her grandchildren’s college education
    through a modest scholarship fund she is establishing.
