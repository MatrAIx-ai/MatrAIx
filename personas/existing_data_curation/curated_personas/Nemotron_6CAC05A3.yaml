  hobbies: '[''Playing with wooden blocks'', ''Reading repetitive picture books'', ''Coloring and drawing'', ''Observing wildlife on nature walks'', ''Listening to children’s music'']'
  career_goals: Although still very young, Sandra often talks about being a “teacher” when she grows up because she likes helping others follow schedules and learn new things. She also dreams of being a
    “helper” at home, assisting her mother with chores and eventually caring for animals as a veterinarian, reflecting her competitive desire to be the best at caring for others.
