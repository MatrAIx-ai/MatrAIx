personas:
  professional: John Puno, a certified residential electrician who now also designs solar PV systems and smart home integrations, leverages his practical, structure‑oriented nature and cooperative communication
    style to lead job‑site teams, while their relaxed attitude toward planning sometimes leads to last‑minute kit changes during installations.
  sports: John Puno, a devoted Los Angeles Dodgers fan and regular participant in Westchester community pick‑up soccer matches, enjoys catching a Galaxy game when possible and they counter work‑related
    fatigue with occasional weight‑training at a nearby gym.
  arts: John Puno unwinds with classic rock icons like Pink Floyd and The Rolling Stones while also listening to regional Mexican favorites such as Los Tigres del Norte, watches action movies starring Keanu
    Reeves and Charlize Theron on weekends, and they regularly play the latest Call of Duty titles to decompress after a long workday.
  travel: John Puno prefers road‑trip adventures in their vintage Chevrolet, having explored San Diego’s coastal boardwalks, the desert canyons of Joshua Tree, and a weekend getaway to Cabo San Lucas, yet
    they balance travel with family responsibilities and budget trips around their upcoming licensing exams.
  culinary: John Puno enjoys cooking tamales and carnitas for family gatherings, mastering the perfect masa dough and smoky pork seasoning, while they also experiment with classic Southern‑style barbecue
    ribs and whip up a quick pepperoni pizza when craving comfort food.
  core: John Puno is a hands‑on electrician who merges a love for vintage car tinkering and classic rock with a community‑focused spirit, and they often juggle work deadlines, family gatherings, and the
    occasional forgetful lapse in budgeting or dental care.
background:
  cultural: John was raised in a Mexican‑American household in Compton, where Spanish was spoken at home and cultural traditions such as Día de los Muertos, quinceañeras, and weekly family meals were integral
    to his upbringing. His parents emphasized hard work, respect for elders, and a strong sense of community, values that continue to shape his respectful and cooperative demeanor. The bicultural experience
    of balancing Mexican heritage with the urban Los Angeles environment gave him fluency in both English and Spanish, enabling him to communicate effectively with a diverse client base. He draws pride
    from Mexican culinary traditions, music, and the close‑knit neighborhood ties, which influence his desire to give back to his community through mentorship and locally focused business aspirations.
attributes:
  skills: '[''Residential wiring and remodeling'', ''Commercial electrical systems'', ''Electrical troubleshooting and fault diagnosis'', ''Interpretation of electrical blueprints and schematics'', ''Installation
    of lighting, smart home, and solar PV systems'', ''NEC code compliance and safety inspections'', ''Basic HVAC electrical work'', ''Client communication and customer service'', ''Team collaboration on
    construction sites'', ''Routine maintenance of appliances and equipment'']'
  hobbies: '[''Listening to classic rock and regional Mexican music'', ''Watching Los Angeles Dodgers baseball games'', ''Playing pick‑up soccer'', ''Car restoration and electrical customization'', ''Cooking
    traditional Mexican meals'', ''Family gatherings and celebrations'', ''Volunteering at youth community center (electrical safety workshops)'', ''Watching action movies'', ''Playing video games'']'
  career_goals: John aspires to obtain his master electrician license within the next two years, enabling him to bid larger commercial projects and mentor junior technicians. He plans to enroll in an associate‑degree
    program in electrical engineering technology to broaden his technical foundation. Long‑term, he hopes to launch his own contracting business focused on sustainable energy solutions, such as solar installations,
    to serve the Compton community and provide stable, well‑paid jobs for his family. He values a work environment that balances structure with flexibility, allowing him to be present for his wife and future
    children while continuing to grow professionally.
