persona_description: A member of the Swiss government who is interested in disaster risk reduction and disaster response coordination. They are familiar with the UNDP's project "Strengthening Disaster Risk
  Management Capacities in Lebanon" and are willing to take practical steps to reduce the traumatic costs of disasters. They are also interested in the response exercise conducted in Jbeil/Byblos and the
  National Response Plan developed by the UNDP. They are aware of the grant of $5,000,000 offered by the Swiss government to support projects for disaster risk reduction in Lebanon.
