  hobbies: '["Drawing and painting", "LEGO construction", "Exploring local nature trails", "Reading adventure & sci‑fi books", "Playing piano", "Science club projects", "Community theater performances",
    "Playing chess"]'
  career_goals: David dreams of becoming someone who merges art and technology to create immersive experiences. He envisions a future as an interactive game designer, product designer, or architect who
    can turn imaginative ideas into real‑world projects. He also hopes to share his curiosity with other children by leading workshops or after‑school clubs that encourage creative problem‑solving and artistic
    expression.
