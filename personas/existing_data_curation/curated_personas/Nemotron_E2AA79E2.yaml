  career_goals: Looking ahead, Ofelia aims to pursue a career that unites her scientific curiosity with tangible community impact. She is interested in studying environmental engineering or urban sustainability,
    aspiring to develop green infrastructure solutions for cities like Denver. At the same time, she wants to stay connected to her peers by mentoring younger students in STEM clubs and leading community
    outreach programs that promote environmental awareness. Ultimately, she envisions a role where she can apply her organized, practical mindset to solve real-world problems while fostering collaborative
    learning.
