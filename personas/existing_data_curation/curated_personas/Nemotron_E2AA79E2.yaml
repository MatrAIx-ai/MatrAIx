personas:
  professional: Ofelia Fernandez, a budding robotics enthusiast at age 13, channels their methodical curiosity into designing Arduino-powered soccer‑ball trackers for the school club, while reliably leading
    after‑school science‑art workshops and coordinating group projects with the same organized precision they apply to choreographing folklorico routines.
  sports: Ofelia Fernandez thrills on the midfield of the Denver Juniors United soccer team, cheers on the Denver Broncos and Colorado Rockies, and spends weekends hiking the Rockies with the local scouting
    troop, approaching fitness with disciplined drills yet still indulging in spontaneous pick‑up games that fuel their energetic, sociable spirit.
  arts: Ofelia Fernandez blends creative outlets by sketching comic‑style illustrations of sci‑fi adventures between folklorico rehearsals, drawing inspiration from the vibrant murals of Denver, the storytelling
    of Neil Gaiman, and the rhythmic beats of Carlos Santana, while also enjoying weekend viewings of the animated film Coco and listening to the pop‑rap sounds of Bad Bunny.
  travel: Ofelia Fernandez prefers meticulously planned weekend hikes to Boulder’s Flatirons and annual family trips to the historic streets of Mexico City, yet dreams of a solo backpacking adventure through
    the Pacific Northwest after graduating high school, balancing school deadlines and a tight family budget with a love for both cultural immersion and natural exploration.
  culinary: Ofelia Fernandez excels at hand‑rolling chicken tamales and mixing fresh pico de gallo salsa with lime, avocado, and jalapeño, while also mastering the art of cheesy pizza slices and whipped
    chocolate churros, often mixing weekend cooking sessions with friends but occasionally forgetting to clean the kitchen before soccer practice.
  core: Ofelia Fernandez fuses methodical tech curiosity with a vibrant community spirit, juggling robotics, soccer, and folklorico while occasionally neglecting chores in favor of the next creative project.
background:
  cultural: Ofelia is a Mexican-American teen growing up in Denver’s vibrant, multicultural landscape. Raised in a bilingual household, she speaks Spanish at home and English at school, allowing her to
    navigate both cultures fluently. Her family maintains Mexican traditions, celebrating Día de los Muertos, Cinco de Mayo, and preparing home-cooked meals that blend regional flavors. She participates
    in local cultural events such as the Denver Mexican Cultural Festival, and her involvement in the community center connects her with other Mexican families in the area. This bicultural upbringing instills
    in her a strong sense of heritage, community responsibility, and an appreciation for diversity.
