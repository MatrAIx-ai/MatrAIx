  hobbies: '[''Soccer'', ''Folklorico dance'', ''Cooking Mexican cuisine'', ''Robotics club (Scratch, Arduino)'', ''Hiking in the Rocky Mountains'', ''Reading mystery and sci-fi novels'', ''Volunteering
