personas:
  professional: A seasoned restaurant manager, Ellen Wang leverages a decade of food‑service leadership, pragmatic cost‑control, and ServSafe expertise to steer diverse teams through shifting menus while
    maintaining a relaxed, adaptable approach that tolerates occasional schedule slip‑ups.
  sports: An avid outdoor enthusiast, Ellen Wang hikes the Sandia Mountains, cycles local trails with the Albuquerque Trail Runners club, and they root for New Mexico United while also cheering on the Albuquerque
    Isotopes during seasonal baseball games.
  arts: A culturally curious arts fan, Ellen Wang attends performances at the KiMo Theatre, follows the folk storytelling of Rhiannon Giddens, enjoys the evocative paintings of Georgia O’Keeffe, and they
    regularly stream the cinematic works of Guillermo del Toro while collecting limited‑edition prints from local New Mexican artisans.
  travel: A spontaneous explorer, Ellen Wang prefers loosely planned road trips to destinations like Santa Fe, the Grand Canyon, and Oaxaca, picks up local guidebooks at farmers' markets, balances adventure
    with occasional beach relaxation in Costa Rica, and they budget their travels through a mix of savings and a travel‑rewards credit card.
  culinary: A passionate home cook, Ellen Wang experiments with seasonal recipes featuring Hatch green chiles, Pueblo corn masa, and fresh herbs from their balcony garden, perfects dishes like red‑chile
    enchiladas and green corn posole, and they blend New Mexican flavors with classic comfort foods while occasionally over‑seasoning in their quest for boldness.
  core: Ellen Wang is a pragmatic restaurant leader who fuses New Mexican culinary flair with a flexible work style, manages finances with careful budgeting yet occasional market splurges, battles anxiety
    through meditation, hikes passionately, and they relish arts and travel as antidotes to daily stress.
background:
  cultural: Ellen is a second-generation American of European ancestry who grew up in a suburban Midwestern community before moving to Albuquerque as a young adult. Living in Bernalillo County, she has
    absorbed the Southwest’s blend of Native American and Hispanic culinary traditions, which informs her cooking style and appreciation for local ingredients like chiles and Pueblo corn. Her family’s emphasis
    on hard work, self-reliance, and practical problem solving shaped her pragmatic outlook, while her marriage and active involvement in the diverse Albuquerque community expose her to multicultural perspectives.
    Ellen identifies with mainstream American cultural norms but also embraces New Mexican customs, celebrating local festivals, participating in community gatherings, and navigating both Anglo and Hispanic
    cultural spaces with ease.
attributes:
