  hobbies: '[''hiking and mountain biking'', ''balcony herb gardening'', ''experimental cooking and recipe development'', ''reading food-culture blogs and culinary memoirs'', ''attending farmers’ markets
    and community cooking workshops'', ''listening to podcasts on restaurant innovation'', ''yoga and guided meditation'', ''volunteering at local food banks'']'
  career_goals: Ellen aims to transition from managing a single restaurant to overseeing multiple locations as a regional food-service director within the next five years. She also dreams of opening a small
    farm-to-table café that spotlights locally sourced New Mexican ingredients and incorporates her love for experimental menu development. To support these ambitions, she plans to earn an associate degree
    in hospitality management and obtain advanced certifications such as the Certified Food-Service Manager (CFSM). Additionally, Ellen is focused on cultivating better work-life balance, delegating more
    responsibilities to trusted team members, and developing stress-management techniques so she can lead with resilience.
