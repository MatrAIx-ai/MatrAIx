  career_goals: Paul hopes to pursue a career that blends his artistic talents, curiosity about the world, and desire to support others. He dreams of becoming an illustrator or concept artist for books,
    games, or movies, and also envisions a future where he could teach or mentor younger students, using his compassion and creativity to inspire and guide them.
