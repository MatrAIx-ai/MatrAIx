personas:
  professional: Paul Jarrell, an aspiring junior illustrator and budding game developer, blends their curiosity for sci‑fi worlds with a meticulous habit of organizing sketch files and code snippets, channeling
    compassionate storytelling into detailed drawings and simple Scratch games, while their tendency to worry occasionally leads them to double‑check every line of code before sharing.
  sports: Paul Jarrell, who plays on the West Haven Youth Soccer Club and occasionally joins a weekend beach‑volleyball group, follows the New England Patriots, Boston Red Sox, and Hartford Yard Goats,
    and spends quiet mornings jogging along the local coastal trail, balances organized team practices with spontaneous skateboarding sessions, reflecting their love of low‑key activity and teamwork.
  arts: Paul Jarrell, who sketches characters inspired by Hayao Miyazaki’s animation, the vivid realism of Alex Ross’s comic art, and the bold colors of Frida Kahlo, attends local art workshops featuring
    guest talks by street‑artist‑turned‑activist Banksy and graphic novelist Joann Sfar, and immerses themselves in world‑building novels by J.K. Rowling and Brandon Sanderson, constantly blending literary
    imagination with visual expression.
  travel: Paul Jarrell, who prefers low‑stress, nature‑focused trips with family and a handful of close friends, has explored the coastal trails of West Haven, visited historic Boston, toured the interactive
    Smithsonian exhibits in Washington, D.C., and dreams of experiencing Tokyo’s Akihabara district and Iceland’s volcanic landscapes, always planning itineraries in a detailed notebook with their contingency
    plans for rainy days.
  culinary: Paul Jarrell, who has a beginner‑level knack for cooking, loves whipping up homemade margherita pizza topped with fresh basil, crafting avocado‑and‑soy‑sauce sushi rolls, baking blueberry pancakes
    with real berries, and they often snack on trail mix of almonds, dried apricots, and dark‑chocolate chips during gaming sessions.
  core: Paul Jarrell, an imaginative 11‑year‑old who balances sketch‑filled afternoons with frequent bouts of over‑thinking and occasional snack‑hoarding, finds calm through journaling but they often procrastinate
    by day‑dreaming about alternate universes.
background:
  cultural: Paul’s cultural background is that of a middle‑class New England family. He grew up in West Haven, Connecticut, a coastal city with a strong sense of community and access to nearby cultural
    resources such as the Yale University art museums and the New Haven public libraries. His family’s European ancestry and participation in mainstream American traditions inform his values of education,
    civic engagement, and respect for the environment.
