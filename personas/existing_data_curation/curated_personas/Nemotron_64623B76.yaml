  hobbies: '[''Photography (landscapes & property)'', ''Hiking (Appalachian Trail, local peaks)'', ''Art Gallery Visits'', ''Live Music (bluegrass, country)'', ''Volunteer Work (Habitat for Humanity)'',
    ''Reading (architecture, history)'', ''Cooking (Southern dishes)'', ''Woodworking'', ''Community Festival Participation'', ''Farmers Market Shopping'']'
  career_goals: Thomas aims to transition from a successful independent broker to the owner of a boutique real‑estate firm that emphasizes artistic staging and community revitalization in Johnson City.
    Over the next three years he plans to earn the Certified Residential Specialist designation, boost his annual transaction volume by at least 30%, and build a small portfolio of rental properties to
    generate steady passive income. He also wants to mentor new agents, integrate mindfulness practices to better manage his stress and worry, and eventually create a legacy that blends his love of art,
    local culture, and ethical real‑estate practice.
