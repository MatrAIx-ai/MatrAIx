personas:
  professional: Patricia Ramos, though only one year old, shows an early fascination with cause‑and‑effect by methodically arranging colorful stacking cubes in neat rows, revealing a curious and organized
    mind that already plans ahead in play.
  sports: Patricia Ramos enjoys weekly baby yoga classes at the local community center and proudly wears a tiny foam badge of the Seattle Seahawks while her parents cheer for the Seattle Sounders FC youth
    side, preferring the calm of small‑group activities over large stadium crowds.
  arts: Patricia Ramos delights in the vivid illustrations of Eric Carle, giggles to Norah Jones' lullabies, and claps along to Yann Tiersen’s whimsical piano pieces, demonstrating an appreciative yet reserved
    engagement with creative expression.
  travel: Patricia Ramos has ventured on a weekend family road trip to the Grand Canyon and a short cruise to the Bahamas, favoring quiet car rides with her soft blanket over bustling airports, yet remains
    eager for new sights within a safe, familiar routine.
  culinary: Patricia Ramos prefers the sweet smoothness of mashed sweet potato seasoned with a pinch of cinnamon, distinguishes between applesauce and banana puree, and occasionally enjoys a pureed avocado
    mash, showing selective yet adventurous palate development.
  core: Patricia Ramos is a one‑year‑old who blends methodical block stacking, a keen eye on her parents' budgeting talks, and a cautious curiosity that makes her a meticulous little explorer with a tendency
    toward worry in unfamiliar settings.
background:
  cultural: Patricia’s Mexican heritage is a central part of her identity, shaping her values of family cohesion, respect for elders, and celebration of traditions such as Día de los Muertos and festive
    holiday meals. Growing up in a bilingual household in Provo, she blends Mexican customs with the broader Utah community, participating in local cultural festivals while preserving Spanish language use
    at home. Her Catholic upbringing informs her worldview, and she maintains strong ties to her extended family, often acting as a bridge between her community’s Mexican roots and her American surroundings.
