  career_goals: Patricia aims to earn her GED within the next year to broaden her educational foundation. She aspires to obtain a certification as a Home Health Aide, leveraging her caregiving experience,
    while also exploring a culinary certificate focused on Mexican cuisine to eventually launch a small home‑based catering service. Her long‑term ambition is to combine her love for art and food by creating
    a community workshop space where she can teach cooking and craft classes, fostering cultural exchange and personal stability.
