  career_goals: Calvin dreams of a future where he can blend his love for problem‑solving with his concern for living things. He is leaning toward careers such as mechanical engineering or veterinary medicine,
    envisioning himself designing innovative solutions for animal health or sustainable technologies. He also hopes to stay involved in community service, maybe by leading youth STEM programs or participating
    in environmental clean‑up projects along the Jersey Shore. In the short term, he aims to excel in his middle‑school STEM electives, join a high‑school robotics team, and earn a scholarship that will
    allow him to study engineering or a related field at university.
