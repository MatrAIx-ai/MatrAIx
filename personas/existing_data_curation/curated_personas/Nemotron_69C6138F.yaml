personas:
  professional: Maria Solis blends a business degree with hands-on expertise in painting and paper-hanging, leading a small bilingual crew that delivers sustainable interior finishes while pragmatically
    juggling client expectations, budgets, and their curiosity for low-VOC innovations.
  sports: Maria Solis enjoys weekend hikes up the hills of Río Grande, attends a local yoga class, and fervently supports the Vaqueros de Bayamón baseball team, while also coaching a community soccer league
    for neighborhood kids, and they relish the occasional post-game stretching session.
  arts: Maria Solis expresses creativity through watercolor coastal scenes inspired by island shorelines, admires John Singer Sargent's fluid brushwork, finds rhythm in Celia Cruz's salsa classics, and
    contributes to community murals that celebrate local stories, and they often tie the colors of their watercolors to the music playing in the background.
  travel: Maria Solis prefers short, eco-conscious road trips to nearby coastal towns like Rincón, dreams of exploring Cartagena's historic walls, and plans a family vacation to the Spanish island of Mallorca
    to study Mediterranean architecture, and they keep a scrapbook of passport stamps.
  culinary: Maria Solis delights in cooking mofongo and pasteles with plantain, chicharrón, and sofrito while listening to plena, occasionally experiments with seafood paella featuring saffron, shrimp,
    and local herbs, yet admits to over-seasoning dishes when stressed, and they sometimes burn the garlic while multitasking.
  core: Maria Solis is a pragmatic, eco-focused painter who balances relentless curiosity with a worry-prone nature, weaving family, community art, and sustainable business into a vibrant but often overstressed
    life, and they constantly check their to-do list.
background:
  cultural: Maria was born and raised in Bayamón, with deep roots in the Trujillo Alto barrio. She grew up speaking Spanish at home, learning English at school, and attending a Catholic church where community
    events were central to her upbringing. Her family traditions blend Spanish colonial influences with Afro‑Caribbean rhythms, evident in the music, food, and celebrations she cherishes. She values close
    family ties, respects the communal spirit of Puerto Rican fiestas, and maintains a strong sense of pride in her island heritage while navigating the practical demands of modern entrepreneurship.
attributes:
  skills: '["Residential painting", "Paper hanging", "Surface preparation", "Eco‑friendly coating application", "Cost estimating", "Project scheduling", "Client communication", "Bilingual negotiation (Spanish/English)",
    "Small business management", "Team leadership"]'
  hobbies: '["Watercolor painting", "Listening to salsa, bomba, and plena music", "Cooking Puerto Rican dishes (mofongo, pasteles)", "Community gardening", "Hiking in Río Grande forests", "Reading historical
    fiction about Puerto Rico", "Volunteering for local mural projects", "Yoga and meditation", "Attending town festivals and fiestas patronales"]'
  career_goals: Maria aims to grow her painting business into a reputable boutique service that specializes in sustainable interior finishes for residential and small commercial clients in the Bayamón–Trujillo
    Alto area. She plans to obtain certification in green building practices and to incorporate energy‑efficient coatings. To reduce her stress and improve work‑life balance, she hopes to hire a trusted
    assistant and train apprentices, allowing her more time for family and personal well‑being. Long‑term, she envisions establishing a community workshop that offers free skill‑building classes for local
    youth, blending her entrepreneurial spirit with a desire to give back.
