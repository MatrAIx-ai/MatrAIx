    ''Continuing education in emerging dental technologies'']'
  hobbies: '[''Reading African-American literature and historical nonfiction'', ''Genealogy research using online archives'', ''Gardening (native plants and vegetable patch)'', ''Knitting and crocheting'',
    ''Puzzle solving (crosswords, sudoku)'', ''Walking in Indianapolis parks and along canal trails'', ''Listening to jazz and classical music'', ''Cooking healthy variations of soul-food recipes'']'
  career_goals: Looking ahead, Khadija aims to transition from full‑time clinical duties to a supervisory and mentorship role that lets her apply her methodical strengths while reducing the high‑traffic,
    social demands of a busy operatory. She plans to earn a Certified Dental Radiology Technician credential, which aligns with her curiosity for new imaging technologies yet offers a practical, evidence‑based
    enhancement to her skill set. In parallel, she intends to develop a quarterly community‑based oral‑health workshop focused on seniors and African‑American families in Indianapolis, delivering culturally
    resonant education in a calm, classroom setting. Over the next few years, Khadija hopes to serve as a lead dental assistant or part‑time office manager, overseeing scheduling, compliance, and inventory,
    thereby allowing her to mentor younger staff and ensure consistent quality without the constant patient interaction that can be draining. Ultimately, her ambition is to leave a legacy of precise, compassionate
    care while continuing to learn and share her expertise in a structured, low‑stress environment.
