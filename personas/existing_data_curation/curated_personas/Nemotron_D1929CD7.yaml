  hobbies: '[''drawing and coloring'', ''building with blocks'', ''listening to music'', ''reading picture books'', ''exploring nature'', ''pretend play with superheroes'', ''watching educational cartoons'']'
  career_goals: Edward’s imagination is filled with big dreams. He often talks about becoming an astronaut who explores distant planets, inspired by his love of space books and TV shows. He also envisions
    himself as a painter who can bring his vibrant drawings to life on giant canvases. Occasionally, he says he wants to be a teacher one day so he can share his favorite stories and help other kids learn
    and have fun. These aspirations reflect his curiosity, appreciation for art, and desire to make a positive impact on others.
