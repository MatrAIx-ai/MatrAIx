persona_description: A geologist with expertise in coastal and marine geology, particularly in the study of coastal processes and erosion. They are interested in the Ocean Beach Coastal Processes Study,
  which aims to document nearshore sediment transport processes at the mouth of San Francisco Bay, with a focus on how these processes relate to erosion at Ocean Beach. They are likely to be involved in
  decision-making processes related to coastal management and infrastructure protection, and may have expertise in numerical modeling and field data collection techniques.
