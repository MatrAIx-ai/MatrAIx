  career_goals: Andrew aims to transition from employee to independent contractor, establishing a modestly sized specialty finishing company that offers custom decorative ceiling solutions in the Fairfield–Freestone
    County area. He plans to obtain a Texas Contractor’s License and complete a certification in decorative plasterwork, positioning himself as a go‑to artisan for high‑end residential remodels. In the
    longer term, he hopes to mentor apprentices, expand his business to include small‑scale renovation projects, and eventually take on a project‑management role that allows him to shape design concepts
    while still applying his hands‑on skills. He also aspires to contribute to local community building projects, such as restoring historic homes and supporting Habitat for Humanity builds.
