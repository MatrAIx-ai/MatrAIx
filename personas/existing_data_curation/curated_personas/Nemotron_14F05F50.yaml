personas:
  professional: Andrew Nelson, a seasoned drywall and ceiling‑tile installer with 15 years of hands‑on experience, leverages his meticulous measurement skills, blueprint reading, and curiosity for decorative
    plaster to run organized job sites while flexibly integrating artistic ceiling designs for high‑end remodels in central Texas.
  sports: Andrew Nelson, a devoted fan of the Dallas Cowboys and Texas Rangers, spends Sunday afternoons at the local Fairfield Fishing Club casting for largemouth bass on Lake Fairfield, joins a community
    softball league in the spring, and incorporates regular hiking in the Hill Country to stay fit.
  arts: Andrew Nelson, an avid photographer and amateur guitarist, frequents the Waco Arts Center, draws inspiration from Ansel Adams’s landscapes and Leon Bridges’s soulful melodies, builds decorative
    wooden panels reflecting his love of texture, and contributes set designs to community theater, often citing Van Gogh’s brushwork as a visual benchmark.
  travel: Andrew Nelson prefers carefully planned weekend getaways to Hill Country towns like Fredericksburg and Enchanted Rock for hiking and photography, but also enjoys spontaneous road trips to Austin’s
    live‑music venues and occasional cross‑state trips to New Orleans for its blues scene, balancing budget constraints with a desire for cultural immersion.
  culinary: Andrew Nelson, an intermediate home‑cook with a penchant for Texas‑style barbecue, loves slow‑smoked brisket seasoned with mesquite wood and jalapeño rub, pairs it with homemade chili featuring
    locally sourced beans and corn, and enjoys experimenting with fresh herbs like cilantro while sometimes over‑salting his dishes.
  core: Andrew Nelson blends rugged craftsmanship with artistic curiosity, juggling a steady construction career, community‑rooted generosity, and a habit of over‑planning his woodworking projects while
    occasionally forgetting to water his houseplants.
background:
  cultural: Andrew grew up in a working‑class white family in rural Central Texas, where values of hard work, self‑reliance, and community solidarity are deeply ingrained. The local culture of Fairfield
    and Freestone County emphasizes Southern hospitality, modesty, and a strong connection to the land, reflected in traditions like county fairs, church gatherings, and backyard barbecues. His upbringing
    blended a respect for practical skills passed down through generations of tradespeople with an openness to the broader cultural currents of Texas, such as a love for live music, regional art, and outdoor
    recreation.
