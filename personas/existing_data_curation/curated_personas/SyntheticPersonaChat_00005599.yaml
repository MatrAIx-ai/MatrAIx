    User 1: Oh, that''s great! I love Italian food.

    User 2: Well, if you''re ever in [user 2''s hometown], you should come to my restaurant.

    User 1: I will, thanks for the invitation.

    User 2: No problem. So, what do you do for a living?

    User 1: I own a custom upholstery shop.

    User 2: Oh, that''s cool! I''ve never heard of that before.

    User 1: It''s not a very common job, but it''s a lot of fun.

    User 2: I''m sure it is. So, what''s it like being a mother?

    User 1: It''s the best thing in the world.

    User 2: I''m sure it is. I love my grandchildren.

    User 1: Me too, they''re my whole world.

    User 2: So, what else do you like to do for fun?

    User 1: I love to read, go for walks, and spend time with my family.

    User 2: That sounds like fun. I like to do a lot of the same things.

    User 1: I''m glad. We should get together sometime and do something fun.

    User 2: That would be great! I''d love to.'
