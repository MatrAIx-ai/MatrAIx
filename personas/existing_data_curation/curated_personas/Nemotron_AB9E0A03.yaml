personas:
  professional: Ricardo Corzo is a self‑taught visual storyteller who blends vibrant folk motifs with abstract digital design, leveraging Photoshop, Illustrator, and basic web development to deliver culturally
    resonant branding for local festivals, while their calm, resilient demeanor ensures deadlines are met without sacrificing creative flexibility.
  sports: Ricardo Corzo spends weekends at the local skate park perfecting new tricks, joins pickup basketball games at the community center during summer, and passionately follows the Los Angeles Dodgers
    and LA Galaxy, proudly wearing team apparel while streaming matches with friends.
  arts: Ricardo Corzo immerses themselves in community mural projects inspired by the bold graphics of Shepard Fairey and the whimsical surrealism of Takashi Murakami, curates playlists featuring Aphex
    Twin, Flume, and Bonobo while producing beats in Ableton Live, and finds creative renewal at live shows by indie folk duo The Paper Kites.
  travel: Ricardo Corzo prefers low‑key backpack trips that blend cultural immersion with artistic inspiration, having explored Berlin’s vibrant street‑art districts and the desert art festivals of Santa
    Fe, while dreaming of a pilgrimage to Oaxaca’s Guelaguetza celebrations to capture its vivid processions on canvas.
  culinary: Ricardo Corzo enjoys cooking tamales and mole at home, experimenting with smoked chilies, dark chocolate with a hint of cinnamon, and toasted sesame seeds to create fusion dishes that blend
    traditional flavors with modern plating, and they often host small tasting events for friends after long studio sessions.
  core: Ricardo Corzo is a 20‑year‑old visual designer who balances disciplined work habits with spontaneous creativity, channels community rituals into vibrant art, invests wisely while splurging on music
    gear, and finds zen through sketching, skateboarding, and mindful meditation.
background:
  cultural: Ricardo was born to Mexican immigrant parents in Santa Ana’s vibrant Chicano neighborhood. He grew up bilingual, celebrating family traditions like Día de los Muertos, quinceañeras, and weekly
    gatherings centered around homemade Mexican food and mariachi music. The visual language of Mexican folk art—papel picado, Talavera tiles, and bold color palettes—deeply influences his artistic style.
    He feels a strong sense of cultural pride and actively incorporates Mexican symbols and stories into his creative projects, while also navigating the multicultural dynamics of Orange County.
