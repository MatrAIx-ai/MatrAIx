  hobbies: '[''digital illustration'', ''photography'', ''music production'', ''guitar playing'', ''sketching and mural painting'', ''reading speculative fiction and philosophy'', ''cooking Mexican cuisine'',
    ''mindfulness meditation'', ''skateboarding'']'
  career_goals: He plans to enroll in a community‑college visual arts program to earn an associate degree in graphic design, while continuing to build a professional portfolio of illustration, branding,
    and multimedia projects. Ricardo aims to secure freelance contracts with local cultural festivals and small businesses, eventually transitioning to a full‑time role as a creative designer or art director
    at a multicultural media agency. Long‑term, he dreams of launching his own boutique studio that creates culturally infused digital experiences—such as interactive installations and indie games—that
    celebrate Mexican heritage and contemporary art.
