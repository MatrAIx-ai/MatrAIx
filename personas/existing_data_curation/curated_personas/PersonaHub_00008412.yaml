persona_description: A Baha'i who has been a victim of the Iranian regime's mistreatment and persecution, particularly under the Education Ministry's Project Mehr initiative. The Baha'i faith is one of
  the recognized minorities in Iran, but it is illegal for any Iranian Muslim to convert to another faith, and the Baha'i community has faced numerous violations of their religious freedom. The Baha'i Seven,
  who were leaders in the religious community who began serving 10-year sentences in 2008 on the basis of a range of vague charges including "insulting religious sanctities," were held in solitary confinement
  for more than 100 days after their arrest, while the expressed legal limit is 20. The Baha'i Seven were also made to wait nine months for any news of the charges against them despite the fact that the
  Iranian regime's own law specifies that charges must be filed quickly if pre-trial detention is to continue.
