  career_goals: Fitzgerald aims to advance to a chief compliance leadership role within the next five years, where he can shape enterprise-wide risk strategies and embed ethical decision-making into the
    company’s DNA. He is passionate about integrating emerging technologies—such as AI-driven monitoring and blockchain-based record-keeping—into compliance workflows to enhance efficiency and transparency.
    A long-term ambition is to develop a community outreach program that offers free compliance and financial-literacy workshops for under-represented residents of DeKalb County, reflecting his deep commitment
    to social harmony. He also aspires to publish thought-pieces on the intersection of technology, ethics, and social justice, and to serve as a mentor for aspiring Black professionals in the regulatory
    field.
