  hobbies: '[''Drawing and coloring'', ''Creating imaginative stories with toys'', ''Reading picture books on space and marine life'', ''Building with LEGO and blocks'', ''Solving jigsaw puzzles'', ''Exploring
    nature walks and collecting shells'', ''Playing educational tablet games'']'
  career_goals: Bridgett often shares big dreams of exploring the unknown. She imagines herself as an astronaut floating among the stars, an illustrator bringing fantastical worlds to life, or a scientist
    discovering new marine species along the coast. Her competitive spirit fuels a desire to be the best at turning curiosity into discovery, so she aspires to lead missions or create picture books that
    inspire other children.
