personas:
  professional: A budding young scientist named Bridgett Woodard, who spends hours constructing intricate LEGO habitats, sketching extinct dinosaurs and marine ecosystems, channels their vivid imagination
    and competitive drive into solo experiments, though their notebooks often appear delightfully disorganized.
  sports: A solitary sport enthusiast named Bridgett Woodard spends sunny afternoons gathering shells on the shoreline, practices beginner swimming at the community pool, plays on the local youth soccer
    team the Coastal Cubs, and cheers for the Seattle Mariners during weekend family games, preferring quiet personal challenges over team scrimmages.
  arts: A creative dreamer named Bridgett Woodard spends afternoons drawing elaborate space rockets while listening to Hans Zimmer’s orchestral scores, flipping through Dr. Seuss picture books, and admiring
    the animated worlds of Studio Ghibli’s Hayao Miyazaki.
  travel: A curious wanderer named Bridgett Woodard delights in unhurried day trips to the tide‑pools of Crescent Bay, daydreams about snorkeling at the Great Barrier Reef and exploring the Smithsonian’s
    National Air and Space Museum, and always packs a sketchbook for every journey, though family budgets keep trips within the state.
  culinary: A picky but adventurous eater named Bridgett Woodard loves homemade macaroni‑and‑cheese loaded with extra cheddar, fresh strawberries, and gummy fish, can whip up a simple fruit salad of banana,
    blueberries, and honey with a parent’s help, yet stubbornly refuses broccoli.
  core: Bridgett Woodard is a six‑year‑old imagination engine who builds intricate LEGO worlds, hoards allowance in a pink piggy bank, dives solo into tide‑pools, and stubbornly resists sharing glitter‑glued
    creations, making quiet brilliance their signature.
background:
  cultural: Bridgett is an African American child raised in Mount Pleasant, South Carolina, where her family blends Southern traditions with rich African‑American heritage. Family gatherings often feature
    soulful gospel music, church celebrations, and stories of Charleston's historic Black communities, including Gullah anecdotes passed down by grandparents. Community events such as Juneteenth parades,
    Lowcountry festivals, and local beach clean‑ups deepen her sense of belonging. These cultural experiences foster a love for storytelling, music, resilience, and a deep appreciation for the natural world—elements
    that echo through her imaginative play and creative pursuits.
