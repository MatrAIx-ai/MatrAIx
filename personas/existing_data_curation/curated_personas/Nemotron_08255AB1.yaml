  hobbies: '[''Community volunteering and mentorship'', ''Gardening (vegetable and herb garden)'', ''Cooking (Southern cuisine and healthy adaptations)'', ''Hiking local trails (Mount Diablo, Briones Regional
    Park)'', ''Dance classes (African dance, salsa)'', ''Reading business and personal development books'', ''Bridge club'', ''Book club'', ''Quilt making'', ''Attending industry networking events'']'
  career_goals: Jasmine aims to step into a regional sales director role within the next two years, overseeing multiple territories and championing sustainable manufacturing solutions. She plans to earn
    the Certified Professional Sales Leader (CPSL) credential to formalize her expertise and increase her credibility as a mentor. Long‑term, she envisions establishing a consulting firm that helps minority‑owned
    manufacturers optimize their sales processes and expand market reach. Alongside professional advancement, Jasmine is committed to creating a structured mentorship program for Black women in sales, speaking
    at industry conferences, and serving on local economic development boards to promote inclusive growth in the Bay Area.
