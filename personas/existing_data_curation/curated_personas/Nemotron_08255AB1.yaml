personas:
  professional: Jasmine Scott, a seasoned wholesale and manufacturing sales executive with over thirty years of experience, applies advanced Salesforce analytics, Power BI dashboards, and meticulous contract
    negotiation skills to drive revenue growth, and they calmly mentor new reps while architecting data‑driven market expansion strategies.
  sports: Jasmine Scott is an avid hiker who conquers the trails of Mount Diablo and Briones Regional Park each weekend, follows the San Francisco 49ers and Golden State Warriors, participates in a senior-friendly
    pickleball league, and they view these activities as both fitness routines and social gatherings.
  arts: Jasmine Scott cultivates a vibrant artistic life through African dance, salsa, a weekly bridge club, a quilting circle that produces intricate patchwork, and a business‑development book club, while
    they regularly enjoy the soulful sounds of Celia Cruz and the modern jazz of Kamasi Washington.
  travel: Jasmine Scott prefers structured weekend getaways, having explored the culinary streets of New Orleans, the historic charm of Savannah, and the majestic vistas of Yosemite, and they are planning
    an immersive trip to Ghana to study traditional dance rhythms.
  culinary: Jasmine Scott blends traditional Southern dishes—such as collard greens, smoked turkey, and shrimp‑and‑grits—with health‑forward twists like quinoa‑kale salads, seasoning meals with garden‑fresh
    thyme, rosemary, and cilantro, and they often host farm‑to‑table dinner parties for friends.
  core: Jasmine Scott, a methodical sales veteran with a passion for community mentorship, balances meticulous planning with spontaneous dance, garden experiments, and disciplined financial habits, though
    they sometimes over‑schedule their weekends.
background:
  cultural: Jasmine is an African American woman raised in the East Bay, with family roots that trace back to the Southern United States during the Great Migration. Growing up in San Pablo and the broader
    Contra Costa County, she was immersed in a vibrant Black community shaped by church, gospel music, and local activism. These experiences instilled values of resilience, collective uplift, and pride
    in her heritage. Jasmine actively celebrates Juneteenth, Black History Month, and cultural festivals that showcase African American art and cuisine. She draws strength from the legacy of civil rights
    leaders in the Bay Area and integrates that awareness into her professional drive to empower minority‑owned businesses. Family gatherings, soulful R&B, and community storytelling remain central to her
    identity.
attributes:
