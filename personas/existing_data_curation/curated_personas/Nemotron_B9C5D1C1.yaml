  career_goals: Sarah aims to advance within the public assistance sector by becoming a senior eligibility specialist or team lead, where she can mentor newer interviewers and shape best‑practice procedures.
    She plans to pursue an associate degree in Human Services or a certification in case management to strengthen her expertise. Long‑term, she envisions moving into a program coordinator role that lets
    her influence policy refinements, improve client experience, and integrate mental‑health support resources—areas that resonate with her own emotional sensitivity. Balancing ambition with her desire
    for a stable, low‑stress work environment, she seeks opportunities that allow for incremental growth while maintaining a healthy work‑life balance.
