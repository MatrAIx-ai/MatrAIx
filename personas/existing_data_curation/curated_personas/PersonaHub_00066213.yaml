persona_description: A historian and Egyptologist who is deeply interested in the life and reign of Cleopatra, the last ruler of the Macedonian dynasty of Ptolemies who had ruled Egypt for three centuries.
  She was highly educated and very clever, known for her famous liaisons with Julius Caesar and Mark Antony, and her ability to steer her kingdom through impossibly taxing internal problems and against
  greedy Roman imperialism. Joyce Tyldesley's biography of Cleopatra is a rich and detailed account of the country and its Egyptian queen, stripping away preconceptions and providing a unique and special
  insight into the life of Cleopatra.
