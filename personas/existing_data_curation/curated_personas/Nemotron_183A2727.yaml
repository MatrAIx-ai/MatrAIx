  career_goals: George aims to advance to a senior leadership role in total rewards, such as Director of Compensation & Benefits, where he can shape strategic compensation philosophy across a multi‑national
    organization. He plans to obtain the Certified Employee Benefit Specialist (CEBS) designation and a senior SHRM‑SC certification within the next three years. He also aspires to lead cross‑functional
    projects that integrate AI‑driven analytics into compensation planning, mentor junior analysts, and publish thought‑leadership articles on equitable pay structures. Balancing his professional drive
    with family life, he seeks roles that offer flexibility and support for work‑life integration.
