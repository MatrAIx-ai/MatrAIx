  hobbies: '[''Pickup basketball games'', ''Weekly bowling league'', ''Live music concerts'', ''Food‑truck tasting outings'', ''Weekend road trips to Long Island'', ''Watching NY Mets baseball games'',
    ''Listening to classic rock music'', ''Community gardening'', ''Reading mystery novels'', ''Retro video‑gaming with friends'']'
  career_goals: Edward aims to progress from his current support role to an office manager position within the next three to five years. He plans to enroll in an associate program in business administration
    and acquire certifications such as Certified Administrative Professional (CAP) to broaden his managerial skill set. Long‑term, he envisions launching his own small office‑services consulting firm, leveraging
    his practical experience and networking strengths to help other local businesses streamline their operations while maintaining the reliable, routine‑focused service he values.
