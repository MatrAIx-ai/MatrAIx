  hobbies: '["Gardening (vegetable and herb)", "Woodworking projects", "Cooking traditional Mexican cuisine", "Reading non-fiction (personal finance, technology)", "Watching documentaries (science, history)",
    "Neighborhood potlucks and small group soccer", "Mindfulness meditation and journaling"]'
  career_goals: Miguel aims to secure a stable part-time position in facilities management or become a licensed handyman, building on his DIY background. He also wishes to enroll in a community-college
    certificate program for HVAC or plumbing to formalize his hands-on expertise. Long-term, he aspires to launch a modest home-services business that allows flexibility to accommodate his family's needs
    while providing financial stability and a sense of achievement. He hopes to improve his stress resilience through continued mindfulness practice, ensuring he remains reliable for his loved ones.
