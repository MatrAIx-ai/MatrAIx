personas:
  professional: Miguel Ruiz is a meticulous DIY enthusiast transitioning into part‑time facilities management, leveraging their bilingual communication, budgeting acumen, and hands‑on repair skills to negotiate
    contracts, plan projects, and ensure reliable service for clients while balancing a desire for stable income with personal flexibility.
  sports: Miguel Ruiz joins a neighborhood sandlot soccer team called the Riverside Rovers for weekly friendly matches, follows the Los Angeles Dodgers in baseball and the Los Angeles Lakers in basketball,
    and incorporates a light jogging routine along the beach on weekend mornings to stay fit without overcommitting, and they value the camaraderie of the small team.
  arts: Miguel Ruiz immerses themselves in documentary series by Ken Burns and David Attenborough, listens to folk‑rock singer Gillian Welch while woodworking, collects classic vinyl albums from Bob Dylan
    and The Beatles, and occasionally attends local theater productions starring actors like Viola Davis, which enrich their appreciation for storytelling and cultural nuance.
  travel: Miguel Ruiz prefers meticulously planned road trips, having driven the Pacific Coast Highway to Monterey, explored the historic streets of Kyoto, Japan, and taken a weekend getaway to the Grand
    Canyon, while budgeting travel expenses to balance their family responsibilities and their dream of eventually opening a boutique bed‑and‑breakfast.
  culinary: Miguel Ruiz delights in crafting a slow‑cooked pork and hominy stew that honors their family's traditional recipes, experiments with roasted poblano‑filled quesadillas, and refines their salsa
    using fresh cilantro, lime, and jalapeño, while occasionally indulging in a shortcut meal of frozen pizza when time runs short.
  core: Miguel Ruiz is a detail‑oriented, solitary problem‑solver who balances curiosity with caution, juggling meticulous budgeting, DIY projects, and mindful meditation while they occasionally succumb
    to worry‑driven over‑planning.
background:
  cultural: Miguel is a second-generation Mexican-American whose family emigrated from Jalisco before he was born. He grew up in a bilingual household, celebrating Mexican traditions such as Día de los
    Muertos, Las Posadas, and weekly family meals featuring dishes like pozole and tamales. Living in Hacienda Heights, he participates in the local Mexican community center, attending cultural festivals
    and volunteering at the annual Cinco de Mayo event. His faith, shaped by his Catholic upbringing, informs his values of family solidarity and service. While he respects his heritage, Miguel also embraces
    the multicultural environment of Los Angeles County, blending American customs with his own curiosity for new ideas.
attributes:
  skills: '["Spanish/English bilingual", "Budgeting and personal finance", "Home repair and maintenance", "Basic automotive troubleshooting", "Project planning and time management", "Effective negotiation",
