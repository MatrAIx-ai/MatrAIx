personas:
  professional: Chantel Lacrosse is a structured, detail‑oriented high‑school junior who excels at organizing tasks, self‑teaching Python scripts, and plans to earn a GED and become a certified medical
    laboratory technician, bringing her meticulous attention to repeatable procedures and her competitive edge from strategy gaming into a future lab environment.
  sports: Chantel Lacrosse enjoys low‑impact fitness, walking the Wickliffe shoreline with indie playlists, practicing light yoga at the local community center, and follows Cleveland’s professional teams—the
    Browns, Guardians, and Cavaliers—while competing in the school’s chess club and online chess leagues as a mental sport.
  arts: Chantel Lacrosse blends a love for digital illustration—creating detailed everyday scene sketches on a drawing tablet—with a devotion to indie music, often streaming Phoebe Bridgers and Tame Impala,
    and shares mystery‑thriller book insights from authors like Gillian Flynn and Tana French with a tight‑knit online book group.
  travel: Chantel Lacrosse prefers meticulously planned weekend getaways, frequently biking to Cuyahoga Valley National Park for nature hikes, dreaming of a future trip to New York City’s literary cafés
    and the historic streets of Boston, while keeping travel modest due to a limited teen budget.
  culinary: Chantel Lacrosse cooks comforting meals such as creamy mac‑and‑cheese with sharp cheddar, basil pesto pasta, and classic grilled cheese with tomato soup, experimenting with simple flavor tweaks
    like smoked paprika or fresh basil while maintaining a reliable kitchen routine.
  core: Chantel Lacrosse is a disciplined, puzzle‑loving teen who balances competitive gaming and meticulous organization with anxiety‑driven mindfulness, all while dreaming of a steady lab career and modest,
    well‑planned adventures.
background:
  cultural: Chantel lives in Wickliffe, a suburb of Cleveland in Cuyahoga County, Ohio, within a middle‑class white family whose ancestry includes German and Irish immigrants who settled in the Midwest
    generations ago. The local culture emphasizes practicality, hard work, modesty, and community involvement, reflecting the region’s industrial heritage and Midwestern values. Family traditions include
    participation in community events such as farmers' markets and local high‑school sports games, with a shared regional pride in the Cleveland Browns. A Protestant Christian background informs her sense
    of responsibility and moral framework, though she practices her faith quietly. This cultural setting reinforces her preference for predictability, reliability, and structured pathways toward personal
    and professional goals.
