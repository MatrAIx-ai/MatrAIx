  career_goals: Chantel plans to earn her GED within the next year and then enroll in a community‑college program to become a certified medical laboratory technician. She is drawn to this field because
    of its clear, repeatable procedures and tangible impact on patient care, offering a predictable schedule and stable employment in the Cleveland area. After gaining certification, she hopes to pursue
    a bachelor’s degree in biomedical sciences to broaden her career options. Her long‑term ambition is to achieve financial independence, support her family, and work in a structured environment that minimizes
    stress and uncertainty.
