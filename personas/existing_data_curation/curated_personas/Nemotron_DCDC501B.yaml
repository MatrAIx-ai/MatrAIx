  career_goals: Although retired, Gabriela aims to deepen her impact in Humación by expanding her volunteer work at the local senior center, leading cultural workshops that teach traditional cooking, dance,
    and storytelling, and establishing a mentorship program for young families in the community. She also aspires to document oral histories of longtime residents, learn basic digital photography to preserve
    these stories, and travel to historic sites across Puerto Rico to share her experiences with grandchildren via video calls.
