personas:
  professional: Gabriela Santiago, a retired community organizer now volunteering at the local senior center, leverages their decades‑long experience in event coordination, budgeting, and bilingual communication
    to lead cultural workshops that blend traditional dance, cooking, and storytelling, while embodying their practical curiosity and collaborative spirit.
  sports: Gabriela Santiago supports the Cangrejeros de Santurce baseball team, enjoys watching Vaqueros de Bayamón basketball games on TV, and maintains fitness through daily morning walks along the Humacao
    Nature Reserve and lively salsa sessions, all of which satisfy their energetic, sociable disposition.
  arts: Gabriela Santiago expresses their love for the arts by singing in the church choir with a repertoire ranging from traditional island folk songs to Mozart chorales, dancing bomba and salsa at local
    festivals alongside musicians like Bobby Valentín, and admiring painter José Campeche’s works, which fuel their creative outlet and community connections.
  travel: Gabriela Santiago favors leisurely, family‑oriented trips that combine cultural immersion and gentle adventure, such as a weekend road‑trip to Old San Juan’s historic forts, a guided tour of the
    Ponce Art Museum, and a planned pilgrimage to the UNESCO‑listed town of San Germán, while balancing travel costs with their retirement budget.
  culinary: Gabriela Santiago, an accomplished home cook, delights in preparing classic arroz con gandules and mofongo with a health‑conscious twist of quinoa, seasoning dishes with sofrito, cilantro, and
    achiote, while also experimenting with new flavors like ginger‑marinated fish tacos, reflecting both tradition and culinary curiosity.
  core: Gabriela Santiago's vibrant blend of community devotion, practical curiosity, and love for dance, gardening, and storytelling makes them the neighborhood's beloved aunt‑figure who never misses a
    family gathering, even if they occasionally forget to water their hibiscus.
background:
  cultural: Gabriela was born and raised in Humacao, a coastal municipality on the eastern side of Puerto Rico. Her cultural identity is a blend of Spanish colonial heritage, African rhythms, and Taíno
    influences that shape the island’s music, cuisine, and communal values. She grew up in a close-knit Catholic family where celebrations such as the Fiesta de Santiago Apóstol and community gatherings
    fostered a strong sense of belonging. The Caribbean climate and proximity to the Humacao Nature Reserve nurtured her love for tropical gardening and outdoor activities. Her bilingual upbringing in Spanish
    and English reflects the island’s linguistic landscape, and her lifelong participation in local traditions keeps her deeply connected to Puerto Rican cultural heritage.
