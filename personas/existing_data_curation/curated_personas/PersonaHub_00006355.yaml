persona_description: A space engineer who specializes in the design and operation of geostationary and Earth observation satellites. They are responsible for ensuring the stability and accuracy of the orbit,
  the control of the spacecraft, and the execution of station-keeping maneuvers. Their expertise includes the use of frozen orbit designs, the fine control of the eccentricity vector, the execution of small
  orbit raising manoeuvres, the compensation for atmospheric drag, and the station-keeping in low-earth orbit, low Earth orbit, and geostationary orbit.
