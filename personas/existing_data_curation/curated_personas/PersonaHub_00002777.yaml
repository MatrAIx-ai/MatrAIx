persona_description: Erik Gunnar Asplund was a Swedish architect known for his contributions to the development of modern architecture in Sweden. He designed the central library of Stockholm and is best
  known for his group of pavilions for the Stockholm Exhibition of 1930, which he employed the forms of new architecture but added a dynamic line and dignity of proportion of his own. Asplund's works were
  influential in the development of modern architecture in Sweden and his contributions are still recognized and appreciated today.
