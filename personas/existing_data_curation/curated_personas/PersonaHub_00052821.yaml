persona_description: Sir Samuel Bentham was a British engineer, naval architect, and navy official who was an early advocate of explosive-shell weapons for warships. He led Russian vessels fitted with shell
  guns to victory over a larger Turkish force in 1788. Bentham developed the Arrow class of sloops used against France. He served as commissioner of the navy from 1807 to 1812. Bentham's work in naval architecture
  and engineering was influential in the development of the British navy. He was also the brother of Jeremy Bentham and father of the botanist George Bentham.
