persona_description: A historian who specializes in the study of twentieth-century Mexican history, particularly the interactions between the Roman Catholic Church, Mexico's new business class, and the
  PRI party. He is known for his archival research and for his ability to offer new perspectives on the convergence of these groups and the resulting social justice movement in Mexico. His book focuses
  on the efforts of the Jesuit-led organizations such as the Mexican Catholic Youth Association, the National Catholic Student Union, and the Universidad Iberoamericana to influence Mexican society through
  education and indoctrination, and he shows how these organizations left a different imprint on Mexican society, training a generation of activists who played important roles in politics and education.
