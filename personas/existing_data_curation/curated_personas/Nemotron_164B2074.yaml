  career_goals: Looking ahead, Tina aims to transition from store‑level supervision to a district‑manager role within the next five years, where she can apply her structured, results‑oriented leadership
    to multiple locations. She plans to earn a professional retail‑management certification and enroll in an executive MBA program focused on analytics and operations. Her long‑term ambition includes designing
    a proprietary training curriculum that blends her humanities background with practical retail skills, eventually offering it as a consulting service for regional chains. Tina also hopes to mentor emerging
    female leaders in the industry, creating a pipeline of talent that reflects her competitive drive and commitment to measurable success.
