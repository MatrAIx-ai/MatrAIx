personas:
  professional: An experienced retail supervisor named Tina Mitchell leverages three decades of hands‑on store operations, meticulous inventory control, loss‑prevention audits, and analytics dashboards
    to create a methodical, data‑driven environment, and they coach staff with a competitive edge while maintaining a healthy skepticism toward vendor promises as they work toward a district‑manager role.
  sports: Tina Mitchell is a devoted fan of the Tampa Bay Buccaneers and the Florida State Seminoles football teams, participates in a senior walking club that meets at Alfred B. Maclay Gardens State Park,
    and they hold a seasonal membership at the Tallahassee Country Club’s tennis courts where they compete in mixed doubles on weekends.
  arts: Tina Mitchell curates her evenings around the Tallahassee Film Festival, a love for historical nonfiction by authors like David McCullough, and a personal hobby of photographing native wildflowers,
    and they often unwind listening to Dolly Parton while admiring an Andrew Wyeth landscape painting on their living‑room wall.
  travel: Tina Mitchell plans vacations with the precision of a grocery list, favoring road trips to historic towns such as Charleston, Savannah, and New Orleans, a forthcoming genealogy tour of Edinburgh,
    Scotland, and occasional weekend getaways to nearby Gulf‑Coast islands, and they always book boutique B&Bs that celebrate local heritage.
  culinary: Tina Mitchell’s palate gravitates toward classic Lowcountry fare—shrimp and grits, collard greens, and sweet‑tea‑glazed biscuits— which they prepare using fresh herbs from their garden, yet
    they admit to over‑salting cornbread on restless evenings and indulging in a slice of pecan pie as a nightly treat.
  core: Tina Mitchell melds a lifelong love of community hospitality with razor‑sharp organization, transforming their retail floor into a well‑tuned operation while tending a thriving garden, devouring
    history, and coaching future female leaders, and they approach every challenge with a calm, competitive spirit.
background:
  cultural: Tina grew up in a middle‑class family in the Deep South, absorbing the region’s emphasis on hospitality, community involvement, and respect for tradition. Though she identifies as a white Floridian,
    her upbringing was steeped in Southern cultural markers—Sunday church services, seasonal festivals, and a love for regional cuisine such as shrimp and grits. Her liberal arts education deepened her
    appreciation for historical context, influencing her participation in local heritage projects and the Tallahassee Film Festival. While she values the independence fostered by her divorce, she remains
    connected to her community through church outreach programs and civic volunteering, embodying a pragmatic yet warm Southern sensibility.
