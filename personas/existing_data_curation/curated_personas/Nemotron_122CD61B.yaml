personas:
  professional: Angela Garcia is an aspiring young robotics programmer who channels her love of step‑by‑step manuals into crafting Python scripts for school projects, applying the strategic foresight honed
    through chess and resource‑management video games to solve engineering challenges with calm precision.
  sports: Angela Garcia enjoys ice skating at the local outdoor rink each winter, follows the Minnesota Wild with analytical enthusiasm, and participates in the school’s cross‑country team to balance solitary
    endurance training with structured competition.
  arts: Angela Garcia channels her creative side through short sci‑fiction stories inspired by Isaac Asimov, finds artistic solace listening to the electronic melodies of Daft Punk, and regularly visits
    the Minnesota Science Museum to explore interactive exhibits that merge art and technology.
  travel: Angela Garcia has spent holiday weekends exploring the Mall of America’s indoor attractions and winter trips to Lake Superior’s snow‑covered shores, while dreaming of a future spring pilgrimage
    to Japan’s robotics expos and Kyoto’s historic temples.
  culinary: Angela Garcia favors hearty, winter‑friendly dishes such as turkey with stuffing, creamy mashed potatoes, and hot chocolate with marshmallows, while also experimenting with precise, DIY meals
    like mac and cheese and carefully measuring ingredients for perfect grilled cheese, reflecting her methodical palate.
  core: Angela Garcia is a meticulous, introverted tech‑enthusiast who channels her love of structure into coding, chess, LEGO, and winter pursuits, maintaining a calm, competitive edge while quietly navigating
    teenage life.
background:
  cultural: Angela grew up in Saint Paul, Minnesota, within a predominantly White, Midwestern community. Her family heritage includes German and Scandinavian roots, which influence traditions such as celebrating
    Thanksgiving and Christmas with hearty meals and winter activities like ice skating. The local culture emphasizes punctuality, practicality, and a strong work ethic, values that align with Angela’s
    preference for structure and reliability. She attends a public middle school that provides a structured curriculum and offers extracurricular STEM programs, such as robotics and coding clubs. The region's
    cold winters and community resources such as libraries and museums have fostered her love for organized learning and solitary, intellectually stimulating pursuits.
