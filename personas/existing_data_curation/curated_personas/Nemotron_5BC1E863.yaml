personas:
  professional: Jonny Acosta, a detail‑oriented personal care aide with a STEM background, merges precise client assessments and meticulous electronic health‑record documentation with a knack for troubleshooting
    health‑monitoring devices, and is actively pursuing gerontology certification and tele‑health expertise to transition into senior care coordination and advise health‑tech startups.
  sports: Jonny Acosta, an avid hiker and occasional supporter of the Portland Timbers and Trail Blazers, spends weekends tackling Forest Park’s steep trails with the local Forest Park Hiking Club, prefers
    solo cardio over team sports, and tracks elevation gains on a smartwatch to stay motivated.
  arts: Jonny Acosta, a puzzle‑loving gamer, immerses themselves in the strategic depth of Civilization VI while unwinding to the mellow beats of Nujabes, attends occasional screenings of Christopher Nolan
    films, and delights in the soulful storytelling of Lila Downs, which connects them to the culinary heritage they love.
  travel: Jonny Acosta, a methodical planner, favors low‑key weekend road trips to places like Oregon’s Columbia River Gorge and California’s Big Sur, has trekked the Inca Trail in Peru, dreams of wandering
    Kyoto’s temples, and meticulously maps itineraries in spreadsheets while budgeting travel expenses to keep their savings on track.
  culinary: Jonny Acosta, a passionate home cook, perfects mole poblano, tamales, and chilaquiles using dried chilies, toasted cumin, and fresh cilantro, experiments with quinoa‑stuffed poblano peppers
    for a modern twist, and relishes the aromatic complexity of homemade salsa verde made from tomatillos and serrano peppers.
  core: Jonny Acosta blends meticulous caregiving with a quiet curiosity for tech, tames anxiety through yoga and journaling, spends spare hours soldering Arduino projects and simmering spicy stews, and
    sometimes lets perfectionism delay both paperwork and pizza orders.
background:
  cultural: Jonny was raised in a Mexican‑American household in Queens, where Spanish was spoken alongside English and family gatherings centered around food, music, and cultural celebrations such as Día
    de los Muertos and the quinceañera tradition. His parents emphasized respect for elders, community responsibility, and the value of hard work—principles that shape his caring approach in his profession.
    While he embraces the vibrant, multicultural fabric of New York City, he remains connected to his roots through cooking, attending local Mexican festivals, and maintaining strong ties with extended
    family, balancing the warmth of his heritage with the pragmatic rhythm of his urban life.
attributes:
  skills: '[''Client Assessment'', ''Personal Care Assistance'', ''Mobility Support'', ''Medication Reminder'', ''First Aid/CPR'', ''Health Monitoring Device Operation'', ''Electronic Health Record Management'',
    ''Data Analysis'', ''Problem Solving'', ''Technical Troubleshooting'', ''Bilingual Communication (English/Spanish)'', ''Time Management'', ''Process Improvement'', ''Regulatory Compliance'']'
  hobbies: '[''Cooking Mexican cuisine'', ''DIY electronics (Arduino, Raspberry Pi)'', ''Reading science and technology articles'', ''Yoga and meditation'', ''Hiking in Forest Park'', ''Puzzle solving (crosswords,
    Sudoku)'', ''Strategy video gaming'', ''Volunteer tutoring for seniors'']'
  career_goals: Jonny aims to advance from frontline caregiving to a senior care coordination role within the next five years, leveraging his curiosity for new health‑tech solutions. He plans to obtain
    a certification in gerontology and to develop expertise in tele‑health platforms, positioning himself to lead initiatives that integrate wearable monitoring devices with personalized care plans. Ultimately,
    he envisions a hybrid career where he supervises care teams while advising health‑tech startups on user‑centered design for older adults, combining his practical compassion with his analytical training.
