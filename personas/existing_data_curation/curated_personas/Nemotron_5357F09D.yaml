    Entry'', ''Project Coordination'', ''Apprentice Mentoring'']'
  hobbies: '[''Fishing'', ''Woodworking'', ''DIY Home Improvement'', ''Playing Acoustic Guitar'', ''Listening to Blues and Gospel'', ''Church Community Service'', ''Mentoring Youth in Trades'', ''Watching
    Dallas Cowboys'', ''Barbecue Cooking'']'
  career_goals: At this stage, Willie aims to transition from hands‑on field work to a supervisory and mentorship role. He plans to attain a Master Pipefitter certification within the next two years, which
    will qualify him to lead larger commercial projects and serve as a certified trainer for the United Association apprenticeship program. Parallel to this, he hopes to launch a small, family‑owned plumbing
    and pipe‑fitting business that can provide steady income after retirement and give him flexibility to balance work with his personal life. Financial stability, the ability to pass on his trade knowledge
    to younger Black workers, and earning respect as a reliable, calm leader in Fort Worth’s construction community are his primary ambitions.
