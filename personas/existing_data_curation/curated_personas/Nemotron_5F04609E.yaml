personas:
  professional: Rachel Brackett, at 67, a veteran retail manager whose humanities background informs her art‑centric visual merchandising, leads a frontline team with an improvisational style, and they
    compete for top‑quarter sales while mentoring emerging supervisors despite a relaxed approach to strict planning.
  sports: Rachel Brackett, at 67, enjoys gentle walks along the Catawba River with the Catawba Valley Walking Club; they play weekly pickleball at the local community center, and follow the Charlotte Hornets
    and Carolina Panthers on TV, viewing exercise as a calming counterpoint to anxiety.
  arts: Rachel Brackett, at 67, frequents the Bechtler Museum of Modern Art and the Mint Museum; they paint watercolors of river scenes, read poetry by Mary Oliver and William Carlos Williams, curate rotating
    exhibitions at the historical society, and draw inspiration from Monet and O'Keeffe.
  travel: Rachel Brackett, at 67, prefers low‑stress, solitary road trips across the Blue Ridge in off‑season months; they have recently visited Asheville’s gardens and plan a future journey to Provence’s
    lavender fields, yet budget carefully due to a modest retirement income.
  culinary: Rachel Brackett, at 67, experiments with Southern‑Korean fusion; they craft dishes like shrimp and grits with miso glaze, rosemary‑scented roasted carrots, and kimchi‑infused cornbread, sourcing
    fresh herbs such as thyme and lavender from their modest garden.
  core: Rachel Brackett, at 67, is a competitive, art‑driven retail mentor who tames anxiety through garden, meditation, and a steady stream of watercolor projects; they balance a flexible, sometimes disorganized
    lifestyle with an unrelenting drive for excellence.
background:
  cultural: Rachel grew up in a modest, middle‑class white family in rural York County, South Carolina. She attended local schools before earning a graduate degree in arts and humanities at the University
    of South Carolina. The region’s Southern hospitality, church gatherings, and deep reverence for local history shaped her values, while frequent trips to state museums sparked a lifelong love of art.
    Her appreciation for Southern folk traditions, such as quilting and regional storytelling, coexists with an open curiosity for broader cultural ideas. Now widowed, she remains actively tied to her community,
    using her artistic sensibilities and retail experience to foster connections between local culture and everyday life.
