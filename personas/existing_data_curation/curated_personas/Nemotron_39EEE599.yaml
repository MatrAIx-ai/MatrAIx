personas:
  professional: Shan Adams works part‑time as a personal care aide in Draper, Utah, where her methodical documentation, reliable medication reminders, and confident advocacy for client needs reflect a blend
    of curiosity‑driven learning and practical, self‑reliant service values, all while pursuing CNA certification.
  sports: Shan Adams hikes the Wasatch foothills with the Wasatch Trail Hikers club, practices yoga twice weekly for flexibility, and cheers for the Utah Jazz and Real Salt Lake while preferring solitary
    or small‑group fitness over large‑scale team sports.
  arts: Shan Adams devours speculative fiction by N.K. Jemisin and Liu Cixin, captures sunrise landscapes inspired by Ansel Adams, knits to the melodies of Sufjan Stevens and ambient scores by Brian Eno,
    and occasionally attends Utah Symphony concerts, letting these artistic threads weave through her creative identity.
  travel: Shan Adams favors low‑key weekend trips, meticulously planning hikes to Zion and Bryce Canyon, day‑dreams about a backpacking adventure through the Pacific Northwest, and budgets carefully to
    keep travel costs within her modest student allowance.
  culinary: Shan Adams loves assembling quinoa bowls with roasted sweet potatoes, avocado, feta, and tahini, brews peppermint tea for calm evenings, and prepares snack trays of almond butter, dark chocolate,
    and dried apricots for her garden volunteer sessions, showcasing a penchant for wholesome, simple flavors.
  core: Shan Adams blends quiet curiosity with disciplined reliability, turning solitary hobbies into purposeful care work, while balancing modest frugality with occasional indulgent splurges on creative
    supplies.
background:
  cultural: Shan was raised in suburban Draper, Utah, within a predominantly white, family‑oriented community that values service, self‑reliance, and outdoor recreation. While many local traditions reflect
    the region’s historical Latter‑day Saint heritage, Shan’s household emphasized inclusivity and personal curiosity, encouraging her to explore a broad range of interests. This blend of community solidarity,
    a strong work ethic, and an appreciation for nature shapes how she approaches both her professional caregiving role and her personal life.
attributes:
  skills: '[''Personal hygiene assistance'', ''Mobility support'', ''Medication reminder and observation'', ''Accurate record keeping'', ''Time management and scheduling'', ''Basic first aid'', ''Effective
    client communication'', ''Problem solving and advocacy'']'
  hobbies: '[''Hiking in the Wasatch foothills'', ''Reading contemporary speculative fiction'', ''Landscape photography'', ''Knitting'', ''Puzzle solving'', ''Yoga and meditation'', ''Volunteering at a
    community garden'']'
  career_goals: Shan aims to become a certified nursing assistant (CNA) within the next year, leveraging her curiosity for new care techniques. After gaining certification, she plans to enroll in an associate's
    degree program in nursing at a community college in Utah, with a long‑term goal of earning a RN license and specializing in geriatric or rehabilitation nursing. She also hopes to design a small community
    outreach program that provides home‑care education and resources to underserved seniors in Draper, integrating her practical skills with a desire to give back to her local community.
