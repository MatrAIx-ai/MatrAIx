personas:
  professional: Angel Toirac, a veteran community mentor and cultural steward, leverages meticulous organizational skills, bilingual fluency, and a practical curiosity to orchestrate senior center workshops,
    genealogy sessions, and heritage festivals with reliable precision.
  sports: Angel Toirac enjoys daily walks in the neighborhood park, follows the Dallas Cowboys football team and the Dallas Mavericks basketball team with spirited enthusiasm, and participates in a senior-friendly
    aerobics class at the community center each spring.
  arts: Angel Toirac immerses themselves in the arts by listening to mariachi and regional folk music, admiring the paintings of Frida Kahlo, and crafting quilts patterned after traditional folk motifs,
    often sharing these creations at local cultural festivals.
  travel: Angel Toirac prefers purposeful travel, planning trips to heritage-rich destinations like San Miguel de Allende and the historic missions of San Antonio, while also enjoying weekend getaways to
    nearby Hill Country vineyards for relaxed picnics.
  culinary: Angel Toirac passionately prepares authentic dishes such as pozole, chiles en nogada, and handmade corn tortillas, cultivating cilantro, oregano, and chilies in a modest garden, and using fresh
    herbs to infuse each recipe with a homegrown flavor.
  core: Angel Toirac blends methodical planning with a love of tradition, negotiating budgets, crafting quilts, and cooking heritage meals, all while occasionally forgetting to water the garden when caught
    up in volunteer duties.
background:
  cultural: Angel grew up in a Mexican‑American household where Spanish was spoken daily and Catholic traditions were observed. Family gatherings centered around homemade tamales, mole, and celebrations
    of Día de los Muertos, Las Posadas, and Mexican Independence Day. Her upbringing emphasized respect for elders, community solidarity, and a strong work ethic. Living in Dallas, she maintains ties to
    both her Mexican roots and the broader Texan culture, participating in local Hispanic organizations, sharing cultural recipes with neighbors, and preserving bilingual storytelling for future generations.
attributes:
  skills: '["Budgeting and Personal Finance Management","Organizing Community Events","Traditional Mexican Cooking","Bilingual Communication (Spanish-English)","Genealogy Research","Gardening and Horticulture","Health
