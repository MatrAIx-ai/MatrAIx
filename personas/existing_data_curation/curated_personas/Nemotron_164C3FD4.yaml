  hobbies: '["Traditional Mexican Cooking","Herb and Vegetable Gardening","Reading Historical Fiction and Family Memoirs","Quilting and Knitting","Attending Cultural Festivals and Parades","Walking and
    Light Hiking","Volunteering at Local Senior Center","Listening to Mariachi and Regional Mexican Music","Genealogy Research"]'
  career_goals: Although Angel is not in the formal workforce, she aims to deepen her impact as a community mentor and cultural steward. She plans to volunteer as a senior advisor at the local Hispanic
    senior center, lead workshops on traditional cooking and genealogy, and compile a family cookbook that blends recipes with historical stories. Angel also wishes to enroll in a short‑term community college
    class on gerontology to better support her peers, and she hopes to be recognized as a cultural ambassador for Mexican heritage during Dallas’ annual festivals.
