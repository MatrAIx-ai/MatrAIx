persona_description: A philatelist who is interested in railway stamps, particularly those from the narrow gauge railway systems of various countries around the world. They are knowledgeable about philatelic
  terms and the history of railway stamps. They are also interested in the technical specifications of railway locomotives and the development of the railway industry. They are not interested in technical
  manuals or learned treatises on motive power and are looking for a book that is visually appealing and provides a comprehensive overview of the railway stamps from different countries.
