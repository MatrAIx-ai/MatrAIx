persona_description: Alexander Fixlmüller was a renowned astronomer and mathematician who made significant contributions to the field of astronomy in Austria. He was the nephew of the astronomer Alexander
  Fixlmüller and was the head of the observatory at the Mathematischer Turm of Kremsmuenster Abbey from 1759. He is known as the founder of modern astronomy in Austria (together with M. Hell) and was responsible
  for calculating the orbit of Uranus, improving astronomical instruments, and inventing simpler formulae for astronomical calculations.
