    science non‑fiction and contemporary art magazines'']'
  career_goals: Robert aims to become a senior flight paramedic and eventually a regional EMS director, leveraging his biomedical engineering knowledge to integrate emerging technologies such as tele‑medicine
    and wearable vital‑sign monitors into pre‑hospital care. He plans to earn a Master’s in Public Health with a focus on Emergency Management, pursue certifications in Critical Care Transport and Incident
    Command System, and lead community initiatives that combine emergency response with creative arts therapy for trauma recovery. Over the next five years, he envisions spearheading a collaborative project
    with a local university to develop evidence‑based protocols that enhance patient outcomes while also establishing an annual art‑and‑health symposium in Cache County.
