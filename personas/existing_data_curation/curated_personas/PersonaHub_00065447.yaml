persona_description: A geologist who specializes in the study of mountain formation processes, particularly the geological processes that underlie the formation of mountains. Their research interests include
  the understanding of specific landscape features in terms of the underlying tectonic processes, the study of geologically young or ongoing processes, and the analysis of the orogenic process of mountain
  building. They are likely to be familiar with the concepts and theories related to plate tectonics, folding, faulting, volcanic activity, igneous intrusion, and metamorphism, and their work may involve
  the development of new models and theories to explain the formation of mountains.
