  hobbies: '["Gardening","Reading Historical Non-Fiction","Knitting","Crossword and Sudoku Puzzles","Walking in Chicago Parks","Baking","Visiting Museums","Attending Local Theater","Volunteer Work with
    Youth Programs"]'
  career_goals: Parveen aims to advance to a senior director role overseeing multiple early childhood centers in the Chicago area, where she can implement evidence‑based practices and elevate program outcomes.
    She is committed to mentoring the next generation of administrators, championing inclusive policies, and securing sustainable funding through grant acquisition. In the long term, she hopes to leave
    a legacy of high‑quality, equitable education programs and perhaps transition into a consultancy role to share her expertise with other nonprofits.
