  hobbies: '[''Sketching and drawing'', ''Landscape photography'', ''Acoustic guitar playing'', ''Reading speculative fiction'', ''Listening to eclectic music'', ''Hiking'', ''Cooking experimental dishes'',
    ''Volunteering at the local library'', ''Mindfulness journaling'']'
  career_goals: Dennis aims to transform his artistic talents into a sustainable career. He plans to obtain his GED and enroll in a community college program in graphic design or multimedia arts. His short‑term
    goal is to become a freelance illustrator and content creator, producing artwork for indie game studios and local businesses. He also hopes to run workshops for other teens in his town, teaching digital
    art and media skills. Long‑term, Dennis envisions a stable position as a visual designer for an environmental nonprofit, allowing him to combine his creative abilities with his commitment to preserving
    Montana’s natural landscape.
