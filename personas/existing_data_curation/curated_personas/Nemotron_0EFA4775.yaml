personas:
  professional: Dennis Templeton, a 16‑year‑old aspiring freelance illustrator, leverages their curious eye for landscapes and organized workflow in Procreate and Photoshop to secure commissions from local
    businesses and indie game studios, meticulously double‑checking contracts out of worry, and they are already mapping out a graphic design degree and a visual design role at an environmental nonprofit.
  sports: Dennis Templeton channels their love of the outdoors into regular hikes with the Bozeman Hiking Club and cross‑country runs for their school team, cheers on the Montana Grizzlies basketball squad
    during weekends, and they occasionally join a local climbing gym, all while balancing a preference for solitary trail walks with sporadic social sports gatherings.
  arts: Dennis Templeton spends free afternoons sketching Big Sky landscapes inspired by Thomas Moran, strums acoustic renditions of Bon Iver and experimental tracks by Aphex Twin on their guitar, devours
    speculative fiction by N. K. Jemisin, and curates a digital playlist that blends folk storytelling with ambient electronica, all of which shape a unique artistic voice that they channel into their digital
    illustrations.
  travel: Dennis Templeton dreams of weekend road trips to Glacier National Park and a future backpacking adventure along the Appalachian Trail, has already visited nearby Yellowstone for a sunrise photo
    session, and they, the budget‑conscious teen, envision a once‑in‑a‑lifetime cultural immersion in Reykjavik, Iceland, balancing wanderlust with the practicalities of school and part‑time work.
  culinary: Dennis Templeton experiments in the kitchen with bison chili, kimchi fried rice, and saffron‑infused lentil soup, often sourcing wild huckleberries from the family garden and following YouTube
    tutorials for Japanese ramen, while their intermediate cooking skill is sometimes sabotaged by a tendency to over‑season, and they often multitask between music practice and simmering pots.
  core: Dennis Templeton blends teenage curiosity, meticulous artistry, and a quiet anxiety into a life of sketching Montana horizons, guitar strings, and careful budgeting while dreaming of a visual design
    career that protects the very landscapes they love.
background:
  cultural: Dennis comes from a white, rural Montana background, with family roots tracing back to German and Scandinavian settlers who arrived in the early 1900s. Raised in Lambert, a small agricultural
    community in Richard County, he embodies the values of self‑reliance, close‑knit neighborliness, and a deep respect for the natural environment. Community gatherings such as county fairs, church services,
    and local art shows play a central role in his life, fostering a sense of belonging and cultural continuity. While rooted in his regional heritage, Dennis also draws inspiration from broader American
    pop culture, particularly indie music and online digital art communities.
attributes:
