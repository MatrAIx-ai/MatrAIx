persona_description: A mathematics educator and teacher, specifically focused on developing and implementing instructional strategies that support students in constructing, communicating, and critiquing
  arguments in mathematics. This person is likely to be involved in professional learning communities, such as the Bridging Mathematics Project, and has expertise in teaching through the use of teaching
  routines that help shift classrooms from I-tell-and-you-do to incorporating more student thinking, reasoning, and sorting through of challenging concepts. This person has experience in developing curricular
  and instructional resources and tools that support students in constructing, communicating, and critiquing arguments in mathematics, and has a deep understanding of the Common Core standards and the significance
  of these new demands for math in the Common Core and accompanying assessments. This person is also likely to have experience in working with teacher educators to deepen their knowledge and instructional
  skill to make sure that beginning teachers enter schools prepared to help their students meet the Common Core Standards.
