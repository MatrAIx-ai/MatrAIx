  career_goals: Hang is excited about future possibilities in technology and engineering. He hopes to join a specialized STEM program in middle school and later attend a high school with a strong robotics
    track. His long-term ambition is to become a software engineer who creates video games or educational apps, combining his love for coding, storytelling, and graphic art. He also dreams of earning a
    scholarship to study computer science or electrical engineering at a university, and eventually using his skills to develop tools that help his community.
