personas:
  professional: Hang Huang, a budding robotics enthusiast, thrives on hands‑on problem solving as they co‑design simple autonomous machines in school’s robotics club, balancing a love for clear step‑by‑step
    builds with a relaxed attitude toward deadlines, making them both a reliable teammate and a spontaneous tinkerer.
  sports: Hang Huang, a lively member of the local youth soccer club the Meadowlarks and a fan of the professional team Riverside FC, spends weekends kicking the ball at the neighborhood park, enjoys casual,
    unstructured scrimmages while also stepping up as an assertive captain when needed, balancing a love for teamwork with a preference for flexible game plans.
  arts: Hang Huang, an avid fan of animated series like My Hero Academia and graphic novels such as One Piece, spends free hours sketching manga‑style characters, idolizes artist Akira Toriyama, proudly
    shares comic strips in the school art club, and blends disciplined drawing practice with spontaneous doodles whenever inspiration strikes.
  travel: Hang Huang, an enthusiastic weekend explorer, enjoys day trips to the nearby Blue Ridge Trail for nature hikes, dreams of wandering the historic streets of Bruges and strolling through Kyoto’s
    cherry‑blossom gardens, plans trips loosely with family while leaving room for spontaneous detours, balancing a love for structured itineraries and flexible adventures.
  culinary: Hang Huang, a junior kitchen helper, loves preparing family‑style dumplings, stir‑fried rice, and savory noodle bowls, proudly masters the art of hand‑folding dough and balancing flavors with
    soy sauce and sesame oil, yet often forgets to clean the cutting board promptly after cooking, showing a blend of culinary enthusiasm and relaxed housekeeping.
  core: Hang Huang is an 11‑year‑old who mixes a love for structured robotics projects with spontaneous video‑game marathons, soccer kicks, manga sketches, and family cooking adventures, embodying a blend
    of order and flexibility.
background:
  cultural: Hang’s family immigrated from China and maintains many cultural traditions at home. Mandarin is spoken alongside English, and the household celebrates Lunar New Year, the Mid-Autumn Festival,
    and other holidays with customary foods and decorations. While living in Maxton, NC, Hang also experiences Southern culture, such as community barbecues, football games, and local folklore. His upbringing
    blends East Asian values of family respect, education, and community with the warm, neighborly atmosphere of rural North Carolina, giving him a bicultural perspective that shapes his interests and goals.
