  career_goals: Julia aims to channel her sociability and creativity into a career that allows her to engage and inspire other kids. In the long term she hopes to become a youth‑focused media producer or
    a school counselor, roles that combine her communication skills, practical thinking, and desire to help others. She also imagines studying animal care or environmental science, aligning with her practical
    interests in caring for living things. Ultimately, she wants a profession where she can lead projects, be in the spotlight, and make tangible positive impacts.
