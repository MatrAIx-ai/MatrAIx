  career_goals: She plans to earn a Certified Forklift Trainer credential within the next year, positioning herself for a shift-supervisor role where she can mentor new workers and introduce creative workflow
    enhancements. In the longer term, Sreelatha hopes to transition into a logistics coordination or safety officer position that offers steadier hours and enables her to apply her curiosity to process
    optimization. Parallel to her career, she aspires to launch a small community art studio in Martinez that offers workshops celebrating South Asian arts and provides a calming creative outlet for locals.
