  hobbies: '[''Abstract painting'', ''Mixed‑media art'', ''Community dance nights'', ''Karaoke'', ''Trivia competitions'', ''Speculative fiction reading'', ''Philosophy book club'', ''Gardening (native
    Texas wildflowers)'', ''Volunteer craft workshops at senior center'']'
  career_goals: Patsy aspires to move into a supervisory or facilities management role where she can blend her operational expertise with her creative vision. She aims to obtain certifications in OSHA safety
    and green cleaning, and to lead a team of cleaners while overseeing aesthetic upgrades to the building, such as mural projects or decorative refurbishments. Long‑term, she dreams of starting her own
    boutique cleaning and space‑styling business catering to local schools, churches, and small businesses, allowing her to compete for contracts and innovate in service delivery.
