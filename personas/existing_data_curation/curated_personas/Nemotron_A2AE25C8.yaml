  career_goals: Xavier aims to advance from his current role to a senior management position within the Warren County Parks and Recreation Department, ultimately becoming the Director of Recreation. To
    achieve this, he plans to earn the Certified Park and Recreation Professional (CPRP) credential and pursue a Master’s degree in Public Administration. He is dedicated to expanding inclusive programming
    that addresses the needs of underserved neighborhoods, such as after‑school sports, health‑and‑wellness workshops, and culturally relevant arts initiatives. Xavier also aspires to mentor the next generation
    of recreation staff, develop a community center that serves as a hub for intergenerational activities, and eventually launch a consulting practice that helps small municipalities design sustainable
    recreational services.
