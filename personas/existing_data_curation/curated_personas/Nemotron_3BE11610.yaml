  career_goals: Terrence aims to build on his early supervisory experience to advance within the retail sector. In the near term, he plans to complete a bachelor's degree in Business Administration while
    seeking promotion to store manager, where he can apply his structured management style to improve sales performance and operational efficiency. His longer‑term ambition is to become a regional manager
    overseeing several locations, or to launch his own retail enterprise that emphasizes data‑driven decision‑making and disciplined workplace culture. He is motivated by measurable outcomes and seeks roles
    that allow him to implement systematic improvements.
