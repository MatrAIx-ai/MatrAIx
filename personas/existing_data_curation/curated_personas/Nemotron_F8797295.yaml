    interest)'']'
  hobbies: '[''Abstract painting'', ''Gallery attendance and curation'', ''Community theater acting and directing'', ''Reading speculative fiction and poetry'', ''Flash fiction writing'', ''Coastal photography'',
    ''Hosting dinner parties'', ''Museum docent volunteering'', ''Paddle‑boarding'', ''Kayaking'', ''Nature trail hiking'']'
  career_goals: Mary aims to advance to a senior supervisory role within the Department of Revenue, such as Lead Revenue Agent or Division Manager, where she can shape policy and mentor new examiners. She
    plans to earn the Certified Tax Specialist credential and to develop a statewide outreach program that educates small‑business owners on tax compliance using workshops and multimedia resources. Long‑term,
    she envisions a post‑retirement transition into community arts leadership, perhaps directing a local art center while continuing to consult on tax matters for nonprofit organizations.
