personas:
  professional: Mary Bigham, a senior tax examiner in the Department of Revenue, they leverage a humanities‑infused perspective, razor‑sharp Excel analytics, and a flair for theatrical storytelling to decode
    complex regulations, negotiate payment plans, and train new agents, all while channeling their vivid imagination into unconventional compliance solutions and occasionally battling anxiety‑driven perfectionism
    that fuels a relaxed, sometimes disorganized workflow.
  sports: Mary Bigham, they fuel their love of water and trail activity by paddling sunrise sessions with the Gulf Coast Paddle Club, kayaking with the Bayou Kayak Collective, jogging the Coastal Nature
    Trail, and cheering for the Houston Astros, the Tampa Bay Buccaneers, and the New Orleans Pelicans, while their competitive streak surfaces during the annual Gulf Kayak Regatta where they aim for a
    top‑three finish.
  arts: Mary Bigham, they immerse evenings in painting abstract seascapes that echo the Gulf’s hues, regularly attend openings featuring works by Julie Mehretu, Mark Rothko, and local artist Sarah Kate
    Ellis, direct community theater productions of Neil Gaiman’s short‑story adaptations, and capture sunrise photography inspired by Ansel Adams, weaving poetry by Ocean Vuong into dinner conversations
    and their own flash‑fiction pieces.
  travel: Mary Bigham, they favor spontaneous coastal road trips, with a travel wish‑list that includes the historic French Quarter of New Orleans, the crystal‑clear sands of Destin, Florida, and the rugged
    art colonies of St. Ives, Cornwall, but balance these wanderlust drives with family commitments and a modest budget, often opting for weekend getaways to nearby wildlife refuges and spontaneous last‑minute
    bookings that match their love of novelty.
  culinary: Mary Bigham, they delight in cooking shrimp étouffée spiced with cayenne and thyme, perfecting a sunrise fruit salad of mango, papaya, and lime, and savoring freshly shucked oysters, while their
    confident home‑cook skill level lets them experiment with abstract plating inspired by their paintings, though they occasionally over‑salt dishes during moments of anxiety.
  core: Mary Bigham, they are a 47‑year‑old tax specialist turned coastal artist who navigates life with a kaleidoscopic mind, blending analytical rigor and creative chaos, while juggling anxiety, spontaneous
    generosity, and a relentless love for sunrise horizons.
background:
  cultural: Mary grew up in a middle‑class Anglo‑American family in the American South, absorbing the region’s emphasis on hospitality, community gatherings, and a strong work ethic. After earning her BA
    in humanities, she settled in Santa Rosa Beach, where the Gulf Coast’s relaxed beach lifestyle, Southern traditions, and a thriving local arts scene shape her daily life. She participates in regional
    festivals such as the Gulf Coast Arts and Crafts Fair, celebrates holidays with a blend of Southern cuisine and coastal seafood, and values the blend of contemporary creativity and historical heritage
    that characterizes the Panhandle’s cultural fabric.
attributes:
  skills: '[''Tax law interpretation'', ''Revenue collection procedures'', ''Audit and compliance analysis'', ''Data analysis with Excel and tax software'', ''Negotiation and conflict resolution'', ''Public
