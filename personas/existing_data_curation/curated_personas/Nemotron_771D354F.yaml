  hobbies: '[''Abstract Painting'',''Speculative Fiction Reading'',''Philosophy Study'',''Street Photography'',''Community Mural Volunteering'',''Traditional Mexican Cooking'',''Folk Music Listening'',''Hiking'',''Chess'',''Stargazing'']'
  career_goals: Christiam aspires to advance to a regional property management director position within the next five years, overseeing multiple community associations across the Rio Grande Valley. He aims
    to obtain the Certified Property Manager (CPM) and Accredited Residential Manager (ARM) designations to solidify his professional credentials. Passionate about integrating art and sustainability, he
    plans to launch a pilot program that incorporates public art installations and green spaces into HOA developments, positioning himself as an innovator in the field. Ultimately, he envisions establishing
    his own boutique property management firm that blends meticulous operational excellence with culturally resonant community experiences.
