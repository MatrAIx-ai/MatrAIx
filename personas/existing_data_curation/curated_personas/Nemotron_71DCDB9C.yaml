personas:
  professional: An aspiring city‑builder, Rosemarie Williams constructs sprawling LEGO metropolises, applying basic architectural concepts learned from school projects and leading their backyard play crew
    as the unofficial mayor, balancing meticulous planning with spontaneous storytelling.
  sports: Rosemarie Williams loves the rush of outdoor play, sprinting as a forward for the Jordan Youth Soccer Club’s U‑8 Rainbow Rangers, cheering for the Utah Jazz during family basketball nights, and
    attending ski lessons at the Wasatch Mountain park where they proudly wear a miniature Utah Utes basketball jersey while practicing snowball drills.
  arts: Rosemarie Williams is a budding watercolorist who spends afternoons in a community art class recreating scenes from Disney’s “Frozen” and sketches LEGO characters inspired by Glen Keane’s animation
    style, while listening to Taylor Swift’s “Shake It Off” and admiring the whimsical illustrations of Dr. Seuss on their bedroom wall.
  travel: Rosemarie Williams enjoys family road trips to Utah’s national parks, especially Zion and Bryce Canyon, where they collect pine cones for craft projects, and dreams of visiting Disney World in
    Orlando and exploring the ancient ruins of Machu Picchu, preferring itineraries that blend adventure hikes with downtime for story‑telling picnics.
  culinary: Rosemarie Williams is a confident kitchen helper who can whip up mac‑and‑cheese, bake chocolate‑chip cookies using fresh butter and vanilla, and assemble fruit salads with strawberries, blueberries,
    and a squeeze of lemon, favoring bright, simple flavors and often adding a pinch of cinnamon to their oatmeal.
  core: Rosemarie Williams is a hyper‑creative, socially‑savvy 7‑year‑old who builds LEGO cities, saves pocket money in a pink piggy bank, battles spring allergies with band‑aids, scores goals for a youth
    soccer team, paints watercolors to Disney tunes, and dreams of park‑hopping across national parks while perfecting mac‑and‑cheese.
background:
  cultural: Rosemarie comes from a White family living in West Jordan, Utah, a suburb with strong community ties and a blend of cultural influences, including the predominant Latter‑Day Saint (LDS) heritage
    and a broader American middle‑class upbringing. Her family values education, creativity, and service, often attending local events such as Pioneer Day celebrations, school PTA meetings, and community
    volunteer projects. The surrounding natural landscape of Utah's mountains and parks fuels her love for outdoor exploration, while the supportive school environment encourages her sociable and compassionate
    nature.
