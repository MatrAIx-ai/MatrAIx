  career_goals: Rosemarie dreams of one day becoming an astronaut who explores new worlds, a painter who brings her imaginative scenes to life, or a teacher who writes and shares stories that inspire other
    children. She is motivated by the idea of using her creativity and compassion to help people understand the world and each other.
