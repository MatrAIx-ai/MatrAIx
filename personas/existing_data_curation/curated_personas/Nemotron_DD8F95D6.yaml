  hobbies: '["Sketching", "Digital painting", "Landscape photography", "Reading (philosophy, psychology, speculative fiction)", "Chess puzzles", "Strategy video games", "Weightlifting", "Hiking", "Vinyl
    music collection", "Short story writing", "Volunteer art cataloging"]'
  career_goals: Aydin aims to translate his artistic abilities into a sustainable career while securing the financial stability he craves. He plans to enroll in a community college program for graphic design
    or visual communications, leveraging his portfolio to obtain freelance commissions for branding, album art, and local business marketing. In the longer term, he envisions launching a small boutique
    studio that blends digital illustration with handcrafted merchandise such as screen-printed tees and laser-cut wooden prints, allowing him to merge his design and carpentry skills. Aydin also contemplates
    an apprenticeship in automotive repair to retain a reliable backup trade. His ambitions include moving to a larger cultural hub like Dallas to access a broader art scene, but he is mindful of maintaining
    his ties to Sherman and managing his anxiety through structured routines and occasional counseling.
