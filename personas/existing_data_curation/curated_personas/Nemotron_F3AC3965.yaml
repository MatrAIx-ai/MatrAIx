personas:
  professional: Victor Webster is an aspiring TikTok content creator who merges his love for basketball, gaming, and make‑shift drumming into short, high‑energy skits, using their curiosity for new editing
    tricks while relying on a surprisingly practical approach to meet school deadlines despite a relaxed, occasionally disorganized schedule.
  sports: Victor Webster dominates the neighborhood basketball court after school, proudly wears a Chicago Bulls jersey, follows the NBA’s Miami Heat, and occasionally joins the local youth soccer league
    in the summer to stay fit and compete with peers.
  arts: Victor Webster thrives on rhythm, banging on a homemade drum kit while remixing tracks by Drake, Beyoncé, and Kirk Franklin on his phone, and choreographing TikTok dances that blend hip‑hop swagger
    with gospel soul, making them a magnetic presence in school talent shows.
  travel: Victor Webster prefers weekend road trips to nearby state parks like Red River Gorge for hiking and shooting hoops in scenic clearings, dreams of a future family vacation to Tokyo to experience
    the anime and gaming culture, and enjoys planning spontaneous day‑camps with friends when school breaks allow.
  culinary: Victor Webster loves munching on pepperoni pizza and chicken nuggets, can whip up a quick taco night with seasoned ground beef, cheddar, and fresh salsa, and often experiments with blending
    fruit smoothies featuring strawberries, bananas, and almond milk as a post‑practice snack.
  core: Victor Webster is a talkative, socially‑charged teen who juggles basketball, gaming, and TikTok fame, thriving on spontaneity while secretly juggling a messy schedule and a growing appetite for
    both instant thrills and long‑term goals.
background:
  cultural: Victor grows up in a close‑knit African American family in Greenville, where church gatherings, family barbecues, and community festivals are central to life. He celebrates Juneteenth and Black
    History Month with stories passed down from grandparents, who taught him the value of oral tradition and resilience. The local Southern cuisine, rhythmic church music, and the legacy of civil‑rights
    activism in his neighborhood shape his worldview, giving him a strong sense of pride in his heritage while also motivating him to uplift his community.
