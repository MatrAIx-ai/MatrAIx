  skills: '[''Public speaking'', ''Social media content creation'', ''Team leadership'', ''Basic coding (Scratch)'', ''Peer mediation'', ''Improvisational problem solving'', ''Digital video editing'']'
  hobbies: '[''Playing basketball'', ''Online gaming (Fortnite, Minecraft)'', ''Creating TikTok videos'', ''Listening to hip‑hop and R&B'', ''Drumming'', ''Participating in school talent shows'', ''Helping
    organize block parties'']'
  career_goals: Victor imagines turning his love for talking and creating content into a career as a digital media influencer or a community‑focused broadcaster. He wants to build a popular YouTube channel
    where he shares gaming tips, local stories, and highlights community events in Greenville. Over the long term, he hopes to study communications or media production, then use those skills to become a
    youth outreach coordinator or a local TV host, giving a platform to voices from his neighborhood while also exploring entrepreneurial opportunities in tech.
