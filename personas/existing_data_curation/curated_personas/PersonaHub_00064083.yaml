persona_description: A historian who specializes in the study of the history of hysteria, particularly the causes and effects of hysteria during wartime and in the spread of diseases. Her research interests
  include, but are not limited to, the development and evolution of hysteria theories, the impact of hysteria on society, and the role of hysteria in the spread of diseases. She is also interested in the
  historical context of hysteria, including the beliefs and attitudes towards hysteria during different eras and cultures.
