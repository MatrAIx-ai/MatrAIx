  hobbies: '[''Running Club'', ''Spin Classes'', ''Doubles Tennis'', ''Puzzle Solving (Sudoku, Logic Puzzles)'', ''STEM Mentorship for Girls'', ''Organizing Professional Networking Events'', ''Reading Business
    Non‑Fiction'', ''Hosting Dinner Gatherings'']'
  career_goals: Jill aims to advance to a senior leadership position such as Director of Analytics or Chief Data Officer within a mid‑size enterprise or a regional healthcare system in Louisville. She is
    driven to build high‑performing analytics teams that deliver measurable business value, champion data governance, and foster a culture of evidence‑based decision making. In the next five years, she
    plans to earn a certification in data science leadership, publish case studies on successful quantitative initiatives, and mentor emerging women professionals in STEM fields. Ultimately, she envisions
    influencing corporate strategy at the executive level while expanding her impact through community‑focused data projects that address local economic development.
