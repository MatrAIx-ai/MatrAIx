personas:
  professional: Jill Allen, a senior analytics strategist at a mid-size enterprise, leverages advanced statistical modeling, Python, and Tableau to translate data into actionable business plans, while her
    disciplined, competitive nature drives her to build high‑performing teams that meet rigorous performance metrics and her clear, persuasive communication wins senior leadership buy‑in.
  sports: Jill Allen, a devoted member of the Park Run Louisville club and a regular at SoulCycle spin classes, competes in weekend doubles tennis at the Louisville Tennis Center, tracks performance metrics
    with Strava, and roots for the Louisville Cardinals basketball team and the Louisville City FC soccer club.
  arts: Jill Allen, an avid fan of contemporary jazz, often streams Miles Davis and Esperanza Spalding, appreciates the cello mastery of Yo‑Yo Ma, and draws inspiration from Christopher Nolan’s storytelling
    when hosting dinner parties, while occasionally attending Louisville’s Fourth Street Live! theater productions of Broadway hits like Hamilton.
  travel: Jill Allen plans trips with meticulous spreadsheets, favoring weekend retreats to Asheville’s Blue Ridge Mountains and culinary tours of New Orleans, while a long‑standing dream is to attend a
    data science summit in Zurich and explore the historic streets of Kyoto during a year‑end sabbatical.
  culinary: Jill Allen, a confident home cook, designs structured dinner gatherings featuring Mediterranean dishes such as grilled salmon with quinoa, lemon‑herb roasted chicken, and a pistachio‑rosewater
    baklava, relishes fresh basil, feta, and olive oil, and experiments with sous‑vide techniques, though she admits to over‑seasoning sauces when under time pressure.
  core: Jill Allen combines a relentless analytical mindset with a sociable, competitive spirit, turning data into strategy by day and meticulously choreographed dinner parties by night, all while juggling
    a penchant for spreadsheets and an occasional habit of over‑caffeinating during late‑night project sprints.
background:
  cultural: Jill was raised in a middle‑class white family in the suburban neighborhoods of Louisville, Kentucky. Her upbringing was shaped by Southern hospitality and a strong sense of community, reinforced
    by regular participation in local church activities and civic events. She attended a private Catholic school, where discipline and academic rigor were emphasized, fostering her early interest in mathematics
    and business. The regional culture of modesty, self‑reliance, and emphasis on hard work informed her practical and achievement‑oriented outlook. While she identifies with mainstream American values,
    Jill also embraces the cultural diversity of Louisville's growing arts scene and supports local initiatives that promote education and economic opportunity.
attributes:
