persona_description: A food scientist who specializes in the processing and analysis of meat products, particularly those derived from livestock and fish. They are knowledgeable in the biological processes
  involved in the conversion of muscle to meat and the factors that affect the quality of meat-based foods. They are likely to be familiar with the techniques used in commercial meat processing plants and
  the different methods used for harvesting fish. They may have experience with the analysis of meat products using techniques such as lipid oxidation, anaerobic metabolism, and heme iron. They are also
  likely to be familiar with the role of meat color in meat quality and the importance of freshness in meat products.
