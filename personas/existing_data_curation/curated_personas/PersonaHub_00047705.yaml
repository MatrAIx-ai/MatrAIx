persona_description: A scientist who specializes in remote sensing and satellite imagery analysis, particularly in the field of environmental monitoring. They have developed a groundbreaking satellite system
  called Terra-i that uses data from NASA's MODIS satellite sensor to monitor deforestation across Latin America in near real-time. Their research interests include the development of operational monitoring
  systems for land cover change and the application of machine learning techniques to detect changes in land cover. They have published several papers on the use of satellite data for environmental monitoring
  and have presented their work at international conferences.
