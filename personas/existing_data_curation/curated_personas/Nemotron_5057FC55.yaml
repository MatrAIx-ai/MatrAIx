personas:
  professional: Altagracia Quiroz, a budding junior game developer in her weekend coding club, blends her curious storytelling flair with disciplined Scratch programming skills, creating colorful, interactive
    games that reflect her love for drawing and her penchant for keeping her projects neatly organized.
  sports: Altagracia Quiroz sprints around the park on Saturdays with the River Rapids U‑11 soccer team, relishing the teamwork and quick bursts of exercise, yet she often pauses to sketch the game’s most
    dramatic moments for later storytelling.
  arts: Altagracia Quiroz immerses herself in visual arts by drawing storybook characters, experimenting with watercolors, crafting collages from recycled paper, and frequenting local galleries where she
    admires murals by Diego Rivera and contemporary works by Frida Kahlo, sharing quirky facts about each piece with her friends.
  travel: Altagracia Quiroz, fueled by her adventurous novels, spends weekends exploring the city’s historic museum and nearby volcano park, while dreaming of future trips to Machu Picchu’s ancient ruins
    and the sun‑kissed beaches of Costa Rica, preferring mixed itineraries that combine guided tours with self‑led scavenger hunts that spark her artistic imagination.
  culinary: Altagracia Quiroz helps her family assemble tamales on Saturdays, learning each generation’s story behind the masa and pork filling, savoring fresh mango slices, cheesy quesadillas, and adding
    a splash of lime to her water, while she meticulously doodles recipe notes and colorful ingredient illustrations in her sketchbook.
  core: Altagracia Quiroz is a curious, art‑obsessed ten‑year‑old who balances bright imagination with tidy habits, coding playful games, saving allowance in mini‑investments, and sprinkling everyday life
    with sketches, soccer kicks, and family‑made tamales.
background:
  cultural: Altagracia’s family comes from Guatemala, and their home is a blend of Guatemalan traditions and Los Angeles’s multicultural life. Spanish is spoken at the dinner table, and she learns about
    Mayan legends, traditional music such as marimba and folkloric dance, and the importance of community gatherings. At the same time, school and neighborhood experiences expose her to a wide array of
    cultures, from Korean food trucks to Mexican Día de los Muertos celebrations. This dual cultural footing gives her a sense of pride in her heritage while encouraging an open‑minded curiosity about the
    world. She often celebrates Guatemalan holidays like Independence Day with salsa music and homemade foods, and she participates in local Latino community events, which reinforce her connection to both
    her roots and her city.
