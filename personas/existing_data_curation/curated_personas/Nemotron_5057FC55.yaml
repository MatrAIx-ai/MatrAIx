  career_goals: As a curious child who loves art and new ideas, Altagracia dreams of becoming a visual artist who can tell stories through drawings and murals. She imagines one day studying graphic design
    or illustration in high school and eventually creating artwork that celebrates both her Guatemalan heritage and the diverse cultures of Los Angeles. She also hopes to share her love of language by becoming
    a bilingual tutor for younger kids, helping them feel confident in both Spanish and English. Short‑term, she wants to win her school’s art contest and contribute a piece to a community mural project.
