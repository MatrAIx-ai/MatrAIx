persona_description: A veterinarian who specializes in the diagnosis and treatment of tuberculosis in livestock and birds. They have extensive knowledge and experience in the identification, culture, and
  treatment of Mycobacterium tuberculosis and its related species. They are skilled in the use of laboratory techniques, such as acid-fast staining and the Lowenstein-Jensen medium, to differentiate between
  the three species. They are also knowledgeable in the clinical signs and symptoms of tuberculosis, including the effects on the respiratory, gastrointestinal, and reproductive systems. They are adept
  at recognizing the signs of infection via skin abrasions and are skilled in the diagnosis and treatment of the disease in laboratory animals.
