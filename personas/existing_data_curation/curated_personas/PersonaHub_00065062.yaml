persona_description: A healthcare professional who is concerned about the rising rates of sexually transmitted diseases in Wyoming and is actively seeking ways to prevent and treat these infections. This
  person is likely to be interested in the latest research on STDs, the impact of these infections on public health, and the effective prevention strategies recommended by the Wyoming Department of Health.
  They are also likely to be knowledgeable about the federal Centers for Disease Control and Prevention's (CDC) report on the prevalence of chlamydia, gonorrhea, and syphilis in the United States and how
  these infections are affecting younger populations.
