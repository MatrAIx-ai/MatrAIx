personas:
  professional: Dorothy Hager is a retired community event coordinator who leverages her decades‑long experience in church potluck planning, senior‑center craft fairs, and volunteer budgeting to keep local
    gatherings running smoothly, even though she prefers a relaxed approach to strict schedules and often relies on intuitive improvisation rather than detailed spreadsheets.
  sports: Dorothy Hager enjoys low‑impact fitness through weekly senior dance nights at the community center, dancing swing to big‑band tunes while watching the Springfield Cardinals baseball games on TV
    and cheering for the St. Louis Blues hockey team during the playoffs, and she strolls the town’s river trail each morning, using the walk as a social outing with her church friends.
  arts: Dorothy Hager immerses herself in classic big‑band recordings by Count Basie and Duke Ellington, finds solace in gospel legends like Mahalia Jackson, regularly attends Branson’s historic theater
    productions such as “The Greatest Show on Earth” with her knitting circle, and cherishes the occasional Elvis tribute show, all of which inspire the patterns she creates in her quilts.
  travel: Dorothy Hager prefers short, purposeful trips, having toured Washington, D.C. with her church choir for a historic music pilgrimage, taken a weekend road‑trip to the Ozark Mountains to photograph
    her garden’s wildflowers, and dreaming of a serene stay in Savannah’s historic district to read mystery novels on a porch swing, yet she remains mindful of her health constraints and budget.
  culinary: Dorothy Hager delights in cooking comfort meals such as tomato‑basil soup using herbs from her garden, herb‑roasted chicken with rosemary and thyme, and flaky almond biscuits, while her signature
    peach cobbler and pecan pie have become staples at family reunions; she boasts an intermediate skill level in the kitchen, often improvising with leftover garden produce and swapping recipes with grandchildren
    via handwritten notes.
  core: Dorothy Hager is a compassionate, routine‑loving octogenarian who threads together community service, garden‑to‑table cooking, and big‑band nostalgia, all while juggling a relaxed approach to planning
    and a healthy dose of worry.
background:
  cultural: Dorothy was born in the rural Midwest during the late 1930s and raised in a Protestant (Methodist) family that valued hard work, modesty, and community service. Her early life was shaped by
    the post-World War II era, fostering a practical, routine-oriented outlook. After completing some college coursework in the 1950s, she married and spent most of her adult years in Missouri, eventually
    settling in Branson. The town’s mix of traditional Midwestern values and a vibrant tourism industry influenced her appreciation for hospitality, home-cooked meals, and community gatherings. Her cultural
    identity is rooted in Midwestern hospitality, a strong sense of neighborly responsibility, and a reverence for preserving local customs and family traditions.
