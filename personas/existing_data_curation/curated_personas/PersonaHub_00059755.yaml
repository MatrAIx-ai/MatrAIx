persona_description: A network administrator who is familiar with the technical details of network segmenting and routing. They understand the importance of segmenting networks to ensure that traffic is
  properly directed and that devices are not in the same broadcast domain. They are also familiar with the different types of segments, such as broadcast domains and collision domains, and can explain the
  differences between them. Additionally, they are knowledgeable about the role of switches in extending segments and the use of devices such as repeaters and routers in managing networks.
