personas:
  professional: Jerry Priester, an urban and regional planner with a knack for GIS, transportation modeling, and community engagement, channels his curiosity and love of art into proposals that blend data-driven
    rigor with watercolor-inspired visual narratives, while his laid‑back approach lets him flexibly reorganize project timelines when inspiration strikes.
  sports: Jerry Priester enjoys solitary morning jogs along Lake Michigan’s shoreline and is a devoted fan of the Milwaukee Bucks and Green Bay Packers, occasionally joining a local walking club for seasonal
    hikes while eschewing team parties in favor of quiet viewings at home.
  arts: Jerry Priester immerses himself in visual and auditory arts by painting watercolors of Milwaukee’s industrial skylines, photographing twilight over the dunes in the style of Ansel Adams, and practicing
    piano pieces by Debussy, while regularly attending intimate gallery openings featuring regional folk artists like John Osterkamp.
  travel: Jerry Priester favors slow‑travel itineraries that blend nature and culture, such as camping in Door County’s cedar forests, exploring the fjords of Norway’s coastal towns, and revisiting the
    Upper Peninsula’s historic lighthouses, always planning trips with ample room for spontaneous sketching sessions.
  culinary: Jerry Priester enjoys cooking simple, garden‑fresh meals like roasted beet and goat‑cheese salad, pan‑seared lake trout with dill, and a hearty bowl of barley soup, relying on his modest vegetable
    patch and a well‑worn cast‑iron skillet while occasionally indulging in late‑night cheese curds and craft beer tastings with friends.
  core: Jerry Priester is a solitary, art‑driven planner whose blend of analytical rigor and carefree spontaneity fuels a restless curiosity that often clashes with bouts of anxiety and a tendency to misplace
    deadlines.
background:
  cultural: Jerry is a white Midwesterner whose family roots trace back to German and Scandinavian immigrants who settled in Wisconsin in the late 19th century. Growing up in Kenosha County, he absorbed
    the region’s blend of industrial heritage, agricultural landscapes, and strong community ties. The local emphasis on self‑reliance, modesty, and civic responsibility shaped his professional ethic, while
    exposure to the Kenosha Museum of Art and regional folk traditions sparked his lifelong appreciation for visual arts. His Midwestern upbringing instilled a preference for quiet, reflective environments
    and a practical, hands‑on approach to problem‑solving, balanced by an intrinsic curiosity about new ideas and unconventional perspectives.
