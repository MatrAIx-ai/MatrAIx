  sports: Juan Selva, though only an infant, is already a regular attendee at weekend family outings to the local soccer stadium to watch the Seattle Sounders' kid‑friendly events, and enjoys weekly baby
    swim classes that build core strength and coordination.
  arts: Juan Selva engages with the arts through nightly lullabies by classical pianist Lang Lang and the soothing animated series "Sesame Street," and their parents often play Mozart's "Eine kleine Nachtmusik"
    during diaper changes, fostering an early appreciation for music and storytelling.
  travel: Juan Selva’s travel style is stroller‑centric, favoring short weekend trips to nearby botanical gardens like the Chicago Botanic Garden and family cruises to the Caribbean, where their parents
    plan loosely, allowing spontaneity while ensuring the baby’s comfort.
  culinary: Juan Selva enjoys pureed sweet potato, avocado mash, and organic apple sauce, and their parents often experiment with homemade baby food recipes that blend carrots, lentils, and a pinch of cinnamon,
    reflecting a curiosity about flavors while sticking to familiar, nutrient‑dense staples.
  core: Juan Selva is a newborn whose budding curiosity, relaxed approach to routine, and subtle competitive spark already shape a life of balanced exploration, occasional disorganization, and resilient
    calm.
background:
