  hobbies: '[''Historical Fiction Reading'', ''Gardening'', ''Cooking Soul Food'', ''Volunteering at Church Food Pantry'', ''Book Club Participation'', ''Birdwatching'', ''Quilting'', ''Local History Exploration'',
    ''Yoga for Relaxation'']'
  career_goals: Nykira aims to advance to a regional management role where she can influence affordable‑housing initiatives across multiple counties. She envisions launching a boutique property‑management
    firm that emphasizes culturally responsive community development and sustainable maintenance practices. Additionally, she plans to create a mentorship program for aspiring Black property managers and
    to serve on the board of the Jefferson County Housing Authority, using her calm resilience to advocate for equitable housing policies.
