persona_description: A medievalist scholar who specializes in the study of medieval education and the trivium. She is particularly interested in the pedagogical theories and curricular content of medieval
  education, and is known for her detailed and nuanced analysis of the texts and materials used in medieval education. Her research interests include the evolution of medieval education, the role of grammar
  in medieval education, and the impact of medieval education on later periods. She is also interested in the ways in which medieval education has been misunderstood and misrepresented in modern times,
  and seeks to provide a more accurate and nuanced understanding of this period of history.
