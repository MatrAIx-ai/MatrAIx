  career_goals: Michael aims to harness his competitive drive and artistic sensibility to become the visual merchandising lead for his store, transforming the retail space into a community hub for curated,
    aesthetically pleasing products. He seeks to achieve top‑sales performance within his department and, in the medium term, step into a managerial role that offers flexible hours and less daily social
    demand, aligning with his preference for solitude. Ultimately, Michael envisions launching an online boutique that sells curated art prints and locally crafted goods, merging his retail expertise with
    his passion for art and new ideas while maintaining a schedule that allows him to work independently.
