  hobbies: '[''Carving (bone, wood, ivory)'', ''Salmon fishing'', ''Community potlatch participation'', ''Reading (art, indigenous history)'', ''Playing hand drums'', ''Berry gardening'', ''Digital photography
    for cultural documentation'', ''Exploring new artistic ideas'']'
  career_goals: Aaron aims to establish a permanent cultural heritage center in Port Lions that showcases Yupik art, crafts, and oral histories, to publish a memoir documenting the community’s changes over
    his lifetime, and to mentor the next generation of elders to uphold high standards of cultural preservation. He also hopes to secure grant funding for youth apprenticeship programs in traditional crafts
    and to organize an annual inter‑village art competition that celebrates innovative expression while honoring tradition.
