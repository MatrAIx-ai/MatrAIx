persona_description: A researcher with a background in economics and sociology, specifically focusing on the study of the economic impacts of immigration policies and the experience of immigrants in the
  United States and Canada during the Great Depression. They are particularly interested in the statistical evidence drawn from new digital samples of the Canadian Censuses from 1911 to 1931, and are looking
  for patterns and trends in the earnings of immigrants relative to native-born Canadians during the early 20th century. They are seeking to understand whether the experience of the Depression had implications
  for the long-run labour market adjustment of immigrants relative to native-born Canadians, and how the effects of reverse assimilation were focused almost entirely among immigrants from continental Europe
  who were not native English speakers.
