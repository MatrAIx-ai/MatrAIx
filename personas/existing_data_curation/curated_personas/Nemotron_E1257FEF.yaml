  hobbies: '[''gardening'', ''cooking Mexican cuisine'', ''reading historical fiction'', ''crossword puzzles'', ''yoga'', ''volunteering at community health fairs'', ''knitting'']'
  career_goals: Maria aims to become the medical director of her clinic, where she can formalize a mentorship program for early‑career physicians and embed systematic wellness resources to address the high
    anxiety she has witnessed among staff. She is passionate about launching a community health outreach initiative focused on preventive care and chronic disease management for the growing Mexican‑American
    senior population in Fairfield County. Over the next five years, she hopes to publish a series of practice‑based research articles on culturally tailored interventions, and ultimately transition to
    a part‑time teaching role while remaining active in community health advocacy.
