personas:
  professional: Luis Gomez is a high‑school sophomore who spends afternoons in his school's robotics club, channeling their curiosity and practical tinkering into building model rockets and simple electronic
    kits, while they favor hands‑on problem solving over strict project timelines.
  sports: Luis Gomez thrives on the court and field, joining after‑school pickup basketball games while rooting for the Dallas Mavericks and following the Austin Spurs, and they lace up their cleats on
    weekends to play for the Meadow High School Wolves in local soccer leagues.
  arts: Luis Gomez fuels his downtime with playlists that blend the reggaeton beats of Bad Bunny and J Balvin with the storytelling twang of Los Tigres del Norte, and they often stream teen‑focused comedies
    starring Millie Bobby Brown, shaping their sense of humor and style.
  travel: Luis Gomez dreams of a summer road trip through Arizona’s red‑rock canyons, already cherishes family vacations to the beach town of Puerto Vallarta, and they have saved enough to plan a future
    backpacking adventure across Europe’s soccer stadiums in Barcelona and Munich.
  culinary: Luis Gomez alternates between chopping fresh cilantro and simmering masa dough, confidently whipping up tacos al pastor, pork‑filled tamales with chilies, and a side of guacamole infused with
    lime, though they often rush and burn the edges of their homemade tortillas when dinner time looms.
  core: Luis Gomez is a competitively spirited teen who juggles team sports, rocket building, and cooking spicy tacos while they breeze through schoolwork with a laid‑back, occasionally disorganized mindset.
background:
  cultural: Luis is a second‑generation Mexican‑American raised in Pflugerville, TX, an area with a vibrant blend of Texan and Hispanic cultures. At home, Spanish is spoken alongside English, allowing him
    to fluidly navigate both linguistic worlds. He celebrates cultural traditions such as Día de los Muertos, Cinco de Mayo, and family gatherings centered around Mexican cuisine, which reinforce strong
    family ties and community values. His upbringing in the Austin‑area suburbs exposes him to a diverse cultural scene, from local festivals featuring mariachi bands to the popular Tex‑Mex food that shapes
    his palate. This bicultural experience informs his identity, giving him a deep appreciation for his heritage while also embracing the broader Texan lifestyle.
