  career_goals: Luis aims to finish high school with a respectable GPA and then pursue a vocational program in automotive technology, leveraging his love for hands‑on work and his practical mindset. He
    also hopes to stay involved in youth sports, eventually coaching a community basketball or soccer team where he can combine his competitive instincts with his outgoing personality. In the longer term,
    Luis envisions owning his own small auto‑repair shop while mentoring younger kids in both sports and technical skills, balancing his curiosity for how things function with a desire to give back to his
    community.
