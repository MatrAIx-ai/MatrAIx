persona_description: An engineer who specializes in the design and analysis of mechanical systems. The engineer is skilled in the use of rigid body dynamics and has experience in collision dynamics. The
  engineer is interested in understanding the effects of collisions on mechanical systems and the conservation of angular momentum in these systems. The engineer has a deep understanding of the principles
  of rotational mechanics and is familiar with the use of moment of inertia and angular momentum in calculating the angular momentum of mechanical systems before and after collisions. The engineer is also
  knowledgeable in the use of MATLAB and other engineering software for the analysis of mechanical systems.
