  career_goals: Jennifer dreams of becoming an artist who creates whimsical books and animations, or a scientist who explores marine life, blending her love for art, imagination, and abstract concepts.
    She also imagines helping other kids understand their feelings as a child psychologist, reflecting her compassion and desire to make a positive impact. Her long‑term goal is to combine creativity and
    caring by designing educational games that teach children about nature and emotions.
