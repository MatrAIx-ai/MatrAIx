personas:
  professional: Jennifer Ramnarine, an emerging mini storyteller‑illustrator, weaves imaginative creatures onto paper and builds sprawling LEGO realms, demonstrating early talent for visual narrative, meticulous
    planning, and collaborative play while balancing organization with whimsical flexibility.
  sports: Jennifer Ramnarine steers a red soccer ball for the Rocky Ridge Youth Soccer Club, cheers for the Colorado Rapids during the MLS season, and joins their family on weekend hikes along the Rocky
    Mountain trails, where they balance stamina‑building treks with rock‑collecting scavenger hunts.
  arts: Jennifer Ramnarine immerses themselves in the music of Beethoven’s ‘Für Elise,’ twirls to choreography from ‘The Nutcracker,’ sketches dragons inspired by Studio Ghibli’s ‘Spirited Away,’ and admires
    children’s author Eric Carle for his bold collage style.
  travel: Jennifer Ramnarine dreams of revisiting the alpine meadows of Banff, planning a future family road‑trip to the geysers of Yellowstone, and, on rainy afternoons, exploring virtual tours of the
    Louvre’s Egyptian wing through an educational app.
  culinary: Jennifer Ramnarine delights in crafting cheesy macaroni, layering strawberry‑banana peanut butter sandwiches, and sprinkling citrus zest of freshly grated lemon into occasional kitchen experiments,
    though they often forget to wash their hands before cooking.
  core: Jennifer Ramnarine blends boundless imagination with a love for organized play, but can spiral into anxious over‑thinking when routine drifts, making them both a meticulous mini‑creator and an emotional
    whirlwind.
background:
  cultural: Jennifer grew up in Broomfield, Colorado, immersed in a predominantly American suburban culture that values outdoor recreation, community events, and school involvement. Her family celebrates
    typical U.S. holidays such as Thanksgiving, Fourth of July, and Christmas, while also embracing Colorado traditions like seasonal ski trips and local wildlife festivals. The surrounding Rocky Mountain
    environment nurtures her love for nature, hiking, and wildlife observation, shaping her curiosity about the natural world. Though identified as white, her household reflects a blend of mainstream American
    values and an appreciation for diverse artistic expressions found in local museums and cultural fairs.
