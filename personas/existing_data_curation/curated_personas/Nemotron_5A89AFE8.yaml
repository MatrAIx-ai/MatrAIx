  hobbies: '["Hiking", "Cycling", "Landscape Photography", "Electronics Projects", "Recreational Python Programming", "Science Fiction Reading", "Acoustic Guitar Playing", "Board Games", "Community Safety
    Volunteering", "Tech Meetups"]'
  career_goals: Alan aims to move into a senior detective role within the cyber‑crime division, where he can leverage his technical expertise to lead complex investigations. Over the next five years he
    plans to develop advanced predictive policing tools, obtain certifications in digital forensics and cybersecurity, and mentor junior officers. Ultimately he aspires to become a precinct commander or
    police chief, shaping policies that integrate technology with community‑oriented policing while preserving operational flexibility and structured decision‑making.
