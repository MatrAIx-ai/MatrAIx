personas:
  professional: Alan Womble, a 39‑year‑old detective with a knack for blending forensic rigor and data‑driven tech, channels his analytical mind and leadership instincts into building predictive policing
    models while navigating the tension between strict procedural structure and a preference for flexible, on‑the‑fly problem solving.
  sports: Alan Womble fuels his love of the outdoors with weekly hikes in the Santa Cruz Mountains and regular rides along the Bay Trail, cheers for the San Francisco Giants and the Golden State Warriors,
    and participates in a local cycling club that meets every Saturday, but he still skips the occasional cross‑training session when his schedule feels too unpredictable.
  arts: Alan Womble spends evenings strumming acoustic guitar—often covering Neil Young and John Mayer—photographing mist‑laden redwoods in the style of Ansel Adams, and diving into Philip K. Dick novels,
    while board‑game nights with friends revolve around titles like Terraforming Mars and Gloomhaven, reflecting his blend of analytical curiosity and creative expression.
  travel: Alan Womble prefers spontaneous, weekend‑focused escapes, such as camping in Yosemite, wandering the coastal cliffs of Big Sur, and dreaming of a future trek through Iceland’s volcanic landscapes,
    planning each trip with a loose itinerary that leaves room for impromptu photo stops rather than rigid scheduling.
  culinary: Alan Womble enjoys cooking simple yet hearty dishes like grilled salmon with citrus‑herb rub, avocado‑lime tacos, and espresso‑driven coffee, showcasing a moderate skill level that places him
    comfortably between reheating leftovers and attempting elaborate brunch spreads, with a particular fondness for locally sourced, seasonal produce.
  core: Alan Womble is a tech‑savvy detective who balances a love for structured data with a laid‑back approach to life, often juggling meticulous crime‑scene work with spontaneous hikes, guitar riffs,
    and a penchant for modest financial recklessness.
background:
  cultural: Alan is a White American who was raised in a middle‑class family that emphasized education, civic duty, and self‑reliance. Relocating to the Bay Area for his STEM graduate studies and law‑enforcement
    career, he has absorbed the region’s tech‑focused, progressive ethos. He values a pragmatic, data‑driven mindset balanced with a commitment to public service and community engagement, and he respects
    the cultural diversity of San Mateo County, often collaborating with colleagues from varied ethnic backgrounds.
attributes:
  skills: '["Crime Scene Management", "Forensic Evidence Collection", "Digital Forensics", "Data Analysis & Predictive Policing", "GIS Mapping", "Python Programming", "SQL Querying", "Cybersecurity Fundamentals",
