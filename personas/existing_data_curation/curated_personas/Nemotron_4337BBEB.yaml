  hobbies: '[''Hiking'', ''Listening to classic rock'', ''Live music'', ''Miniature painting'', ''Jigsaw puzzles'', ''Volunteering at food bank'', ''Bowling league'']'
  career_goals: Cynthia aims to earn a GED and obtain a certification in advanced digital press technology within the next two years. She hopes to move into a lead operator or shift‑supervisor role, eventually
    overseeing the production floor and implementing more efficient workflows. Long‑term, she is interested in managing a small print shop or starting her own custom merchandise business.
