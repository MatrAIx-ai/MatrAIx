personas:
  professional: Cynthia Cotten, a 26‑year‑old print press operator in Buffalo, brings hands‑on expertise with offset and digital presses, color calibration, and OSHA safety protocols to the shop while imposing
    a structured workflow that they sometimes relax in favor of flexible, last‑minute adjustments, reflecting a competitive drive to become a lead operator and eventually run their own custom merchandise
    business.
  sports: Cynthia Cotten fuels their competitive streak in a local recreational bowling league where they bowl twice weekly, avidly follows the Buffalo Bills during football season and the Buffalo Sabres
    in winter, and occasionally hikes the Niagara Escarpment for cardio, though they rarely commit to a formal gym routine.
  arts: Cynthia Cotten channels artistic energy into painting Warhammer miniatures with meticulous detail while unwinding to classic rock icons like Led Zeppelin and The Rolling Stones and attending live
    performances at Buffalo’s Harborcenter Club, where they also partake in puzzle nights that satisfy their methodical mindset.
  travel: Cynthia Cotten prefers spontaneous weekend road trips along the Lake Erie shoreline, soaking in the Buffalo waterfront, the misty spray of Niagara Falls, and the rustic charm of the Adirondacks,
    often planning on the fly with a modest budget saved for certification fees, while dreaming of a future cross‑country drive to San Francisco to explore the tech scene.
  culinary: Cynthia Cotten has a hearty appetite for Buffalo staples such as hot chicken wings drenched in Frank’s RedHot and beef on weck piled high on rye, enjoys cooking simple pastas with garlic, fresh
    basil, and olive oil, and, despite a moderate kitchen skill set, occasionally experiments with homemade pretzel dough using malt and rye flour to honor family culinary traditions.
  core: Cynthia Cotten is a pragmatic yet laid‑back 26‑year‑old who balances a competitive drive for career advancement with a love for community bowling, classic rock, and spontaneous weekend hikes, all
    while navigating a modest budget and the occasional back pain.
background:
  cultural: Cynthia grew up in a working‑class, predominantly white neighborhood in Buffalo, shaped by the city’s industrial heritage and strong community ties. Her family has Irish and German roots, with
    traditions of hard work, modesty, and loyalty to local institutions like the Buffalo Bills and the annual summer neighborhood block parties. She celebrates holidays with a mix of Catholic customs and
    regional foods such as chicken wings and beef on weck, reflecting the cultural mosaic of western New York.
attributes:
  skills: '[''Press operation'', ''Mechanical troubleshooting'', ''Color management'', ''Quality control'', ''Inventory management'', ''Basic graphic design (Adobe Illustrator)'', ''Safety compliance (OSHA)'',
