personas:
  professional: Jennifer Harkins is a budding community‑focused art educator who blends her art history knowledge, digital photography expertise, and a relaxed yet assertive coordination style to lead intimate
    workshops at the Philadelphia Museum of Art and the Warminster Community Center, while navigating a naturally disorganized schedule.
  sports: Jennifer Harkins enjoys low‑impact cardio through weekly walks with the Bucks County Hiking Club and occasional community softball games, cheering on the Philadelphia Eagles in the fall and the
    Philadelphia 76ers during the winter season, while favoring gentle yoga over high‑intensity gym sessions.
  arts: Jennifer Harkins immerses themselves in the visual arts by frequenting the Philadelphia Museum of Art, photographing historic Bucks County architecture with a Nikon D5600, drawing inspiration from
    Ansel Adams and contemporary Pennsylvania painter Jane Smith, and curating small art‑history discussions at local book clubs.
  travel: Jennifer Harkins prefers spontaneous, culturally rich weekend getaways, often traveling by train to Philadelphia’s historic Old City or driving to the Pocono Mountains for nature sketches, while
    dreaming of an art‑focused pilgrimage to Florence, Italy, though budgeting constraints sometimes limit overseas travel.
  culinary: Jennifer Harkins loves to experiment in the kitchen, blending classic American comfort foods like chicken pot pie with Thai lemongrass curry, frequently using heirloom tomatoes from their garden
    and fresh basil to create dishes such as roasted beet risotto and spiced apple crumble.
  core: Jennifer Harkins is a curiosity‑driven, garden‑to‑camera storyteller who balances a relaxed, occasionally disorganized lifestyle with an assertive drive to share art and comfort food within close‑knit
    community circles.
background:
  cultural: Jennifer was raised in a middle‑class, suburban family in the Greater Philadelphia region. Her cultural upbringing reflects mainstream American values, emphasizing community involvement, self‑reliance,
    and an appreciation for the arts. While she identifies as White American, her ancestry traces back to several generations of English and Irish heritage, contributing to a modest, practical worldview.
    Growing up in Bucks County exposed her to a blend of historic colonial heritage and a vibrant contemporary arts scene, fostering her curiosity for both tradition and innovative ideas.
