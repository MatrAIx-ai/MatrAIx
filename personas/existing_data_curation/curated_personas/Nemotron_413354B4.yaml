  career_goals: Pedro aims to move from a cashier role into a supervisory or store‑manager position within the next three years. He plans to enroll in evening business‑administration courses at a community
    college to gain formal management training. Long‑term, he dreams of opening a modest neighborhood grocery that highlights Puerto Rican staples while offering a reliable, low‑stress work environment
    for himself and family members. Achieving greater financial stability and reducing daily stress are central motivations behind his career ambitions.
