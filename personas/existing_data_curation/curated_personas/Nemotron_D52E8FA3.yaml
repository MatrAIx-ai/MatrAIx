  hobbies: '[''Sketchbook journaling'', ''Visiting local art galleries and museums'', ''Listening to indie/lo‑fi music while drawing'', ''Collecting seashells and beachcombing'', ''Reading fantasy and sci‑fi
    novels'', ''Playing strategy video games with friends'', ''Acoustic guitar practice'', ''Short film creation'', ''Volunteering at community library art workshops'']'
  career_goals: Lisa aspires to turn her love of visual storytelling into a future career. She hopes to attend a specialized high‑school program in visual arts and later earn a BFA in illustration or game
    design. Her long‑term ambition is to become a concept artist for video‑game studios or an independent graphic‑novel creator. She aims to build a strong portfolio, win youth art competitions, and eventually
    freelance while collaborating with a small, like‑minded creative community.
