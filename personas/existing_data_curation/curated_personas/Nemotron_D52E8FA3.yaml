personas:
  professional: Lisa Lester is a budding visual storyteller who blends sketchbook journaling with digital art tools, using their curiosity about fantastical creatures to craft concept art for indie video
    games, while their relaxed attitude toward deadlines sometimes leads to last‑minute scrambles.
  sports: Lisa Lester follows the Tampa Bay Buccaneers and the Miami Heat with casual enthusiasm, joins an after‑school beach volleyball club in the summer and participates in a local swim team during the
    school year, yet they prefer solo jogs along Sarasota’s shoreline over large team sports.
  arts: Lisa Lester immerses themselves in the Sarasota arts district, drawing inspiration from street murals by Banksy and local muralist Casey Rhodes, while they stream indie bands such as Mitski and
    lo‑fi playlists while sketching, and they occasionally capture short‑form video edits of gallery visits for their class project.
  travel: Lisa Lester favors spontaneous road trips to nearby Gulf Coast towns like St. Petersburg and Key West, dreaming of a future backpacking adventure through Japan’s art islands, balancing a modest
    travel budget with a love for discovering quirky beachside coffee shops and vintage record stores.
  culinary: Lisa Lester enjoys crafting avocado toast topped with smoked salmon and capers, whipping up shrimp tacos with fresh mango salsa, and they love the tang of citrus in their homemade key lime pie,
    while their cooking skill level hovers between confident snack maker and experimental home chef.
  core: Lisa Lester is a curious, self‑directed teen artist who balances solitary sketching with occasional guitar riffs, navigates finances with a laid‑back micro‑budget, and thrives on spontaneous creative
    and coastal adventures despite a penchant for disorganization.
background:
  cultural: Lisa is a white teenager raised in North Port, a suburban community in Sarasota County on Florida's Gulf Coast. Her upbringing reflects a typical middle‑class Anglo‑American family life, with
    holidays centered around beach trips, Fourth of July fireworks, and community festivals. The region's relaxed coastal vibe, frequent outdoor activities, and proximity to Sarasota's vibrant arts scene
    have shaped her appreciation for nature and visual creativity. While her household maintains traditional American customs, the multicultural atmosphere of South‑Florida school environments introduces
    her to diverse perspectives, subtly influencing her open‑minded and unconventional thinking.
attributes:
  skills: '[''Digital illustration (Procreate)'', ''Watercolor painting'', ''Photo editing (Adobe Lightroom)'', ''Basic JavaScript coding'', ''Analytical essay writing'', ''Strategic board games (Chess)'',
