personas:
  professional: Rosanne Lopez, a seasoned telecommunications technician with over a decade of hands‑on expertise installing and maintaining cellular, microwave, satellite, and fiber‑optic systems, they
    blend meticulous adherence to FCC and OSHA safety standards with a talent for translating complex RF concepts into clear client language, while using their natural sociability to lead cross‑functional
    crews toward efficient project delivery.
  sports: Rosanne Lopez follows the Rio Grande Valley FC Toros soccer team and the Dallas Cowboys, they play in a community Sunday morning soccer league, incorporate dance to cumbia and norteño music as
    primary cardio, and occasionally join a local hiking club for weekend park outings.
  arts: Rosanne Lopez balances a love for community radio hosting with a passion for singing in their church choir and dancing at local festivals, they frequently listen to artists such as Los Tigres del
    Norte, Carlos Vives, and Selena, and they attend regional theater productions whenever possible.
  travel: Rosanne Lopez prefers short, family‑oriented road trips to nearby state parks such as Big Bend and the Hill Country, they dream of a cultural immersion tour of Oaxaca and a weekend getaway to
    Austin's live‑music scene, balancing travel planning around work shifts and child‑care responsibilities.
  culinary: Rosanne Lopez enjoys crafting authentic dishes like tamales, pozole, and fresh salsa using ingredients such as masa harina, dried chilies, epazote, and lime, they boast a solid home‑cooking
    skill level that merges traditional family recipes with occasional experimental twists inspired by their hobby electronics projects.
  core: Rosanne Lopez, a 41‑year‑old telecom technician whose sociable spirit fuels community radio hosting, family potlucks, and vibrant dance nights, they balance meticulous technical work with occasional
    stress‑driven indulgences, while steadfastly pursuing leadership certification and a future family‑run contracting business.
background:
  cultural: Rosanne grew up in a bilingual Mexican‑American household in Pharr, Texas, a city at the heart of the Río Grande Valley. Spanish is the language of the home, while English dominates school and
    work contexts. Her family observes Catholic traditions and celebrates Mexican holidays such as Día de los Muertos, Cinco de Mayo, and Las Posadas, often blending them with local Texan customs. The close‑knit
    community and proximity to the U.S.–Mexico border have cultivated a strong sense of cultural pride, reflected in her love for Mexican food, music, and family gatherings. Her heritage informs her values
    of loyalty, hospitality, and mutual support, and she actively participates in neighborhood events, church activities, and cultural festivals that reinforce her connection to both Mexican roots and American
    life.
attributes:
  skills: '[''Radio equipment installation'', ''Telecommunications system repair'', ''RF testing and measurement'', ''Fiber‑optic splicing and termination'', ''Cable management and conduit installation'',
    ''Technical schematics and blueprint reading'', ''Troubleshooting and diagnostics'', ''Safety compliance (FCC, OSHA)'', ''Customer communication and support'', ''Team coordination and training'', ''Basic
    networking (LAN/WAN) knowledge'', ''Emerging 5G technology awareness'']'
  hobbies: '[''Cooking Mexican cuisine'', ''Hosting on community radio'', ''Dancing to cumbia and norteño'', ''Singing in church choir'', ''DIY electronics projects'', ''Gardening'', ''Attending local festivals'',
    ''Reading technology blogs'', ''Socializing with friends and family'']'
  career_goals: Rosanne aspires to become a lead technician or supervisor within her company, where she can mentor junior installers and shape best‑practice procedures. She plans to earn an FCC General
    Radiotelephone Operator License and a Cisco Certified Network Associate (CCNA) certification to broaden her technical credentials. In the longer term, she hopes to launch a small, family‑owned contracting
    firm that provides reliable telecom infrastructure services to small businesses and community organizations in the Rio Grande Valley. Balancing professional advancement with personal well‑being, she
    also seeks a schedule that mitigates stress, allowing more quality time with her husband and extended family.
