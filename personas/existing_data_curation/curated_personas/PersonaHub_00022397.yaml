persona_description: A healthcare professional with expertise in medical assessment and treatment, particularly in the fields of critical care, neurology, and anesthesia. They are trained in the use of
  medical equipment and techniques to maintain patients in a state of unconsciousness for therapeutic purposes, including the use of sedatives and hypnotics. They are skilled in assessing and evaluating
  the severity of a patient's condition, and in making decisions regarding the appropriate level of intervention to prevent the patient from regaining consciousness too soon. They are likely to be involved
  in the management of patients in critical care units, and to have a deep understanding of the physiological and neurological mechanisms underlying unconsciousness.
