  career_goals: Looking ahead, Alberto aims to transition into a senior supervisory role that oversees multiple yards within the regional rail network. He intends to lead safety initiatives that further
    reduce incident rates, implement proven process improvements, and mentor the next generation of conductors and yardmasters. By earning additional certifications in rail safety and operations, he hopes
    to be recognized as a benchmark for operational excellence. Simultaneously, he is preparing a post‑retirement plan that includes part‑time consulting for rail firms and teaching courses at a local community
    college, ensuring financial security for his family while sharing his expertise.
