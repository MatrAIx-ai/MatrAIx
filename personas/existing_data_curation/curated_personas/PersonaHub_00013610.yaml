persona_description: A professor of psychological sciences who has developed and pioneered the treatment called Multisystemic Therapy (MST) as a way to prevent serious mental health problems in children
  and adolescents. He has found that the treatment continues to have positive effects on former participants more than 20 years after treatment. He has conducted clinical trial participants that completed
  treatment nearly 22 years earlier, on average. He has located records for more than 80 percent of participants and found that MST participants committed five times fewer misdemeanors than individual therapy
  participants. He plans to study savings over the course of almost 22 years following treatment.
