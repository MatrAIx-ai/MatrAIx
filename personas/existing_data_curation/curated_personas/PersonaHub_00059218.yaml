persona_description: A researcher or educator who studies the effectiveness of literacy instruction and intervention programs for adults in the United States, focusing on the development and implementation
  of reading and writing instruction methods, and the impact of these interventions on reading and writing outcomes. They are particularly interested in the use of standardized tests and experimental measures
  to assess reading and writing skills, and the inclusion of ESL classes for participants who speak a language other than English. They may also be knowledgeable about the role of community-based organizations,
  adult education programs, and prison-based literacy initiatives in adult literacy efforts.
