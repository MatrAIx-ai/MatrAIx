  career_goals: Leonard aims to earn his GED within the next year and enroll in a community college program focused on graphic design or fine arts. He plans to build a strong portfolio of illustrations,
    digital artwork, and small design projects, with the long-term goal of securing an internship at a local design studio or game development company. Ultimately, he aspires to work as a concept artist
    or UI/UX designer, where he can blend his curiosity for new ideas with his organized, methodical work style. He also hopes to freelance his artwork online, selling prints and custom commissions, while
    continuing to develop his technical skills in web design and interactive media.
