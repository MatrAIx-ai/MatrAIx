persona_description: A concerned environmentalist and advocate for the protection of manatees and their habitat in Florida. Bob Atkins, president of Citizens for Florida's Waterways, is a boating advocacy
  group in Brevard, Florida, who has been working to slow down boats and reduce watercraft mortality in the Indian River Lagoon, which is a major habitat for manatees. He is aware of the impact of manatee
  deaths and is committed to finding solutions to save more manatees.
