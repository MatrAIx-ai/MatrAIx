  hobbies: '[''Reading science‑fiction'', ''LEGO building'', ''Scratch programming'', ''Stargazing'', ''Desert hiking'', ''Chess'', ''Logic puzzles'', ''Robotics kits'', ''Nature observation'']'
  career_goals: In the short term, Christopher aims to win his middle school science‑fair with a robotics project, master Python basics, and secure a spot on the school robotics club. Over the next decade,
    he aspires to become an aerospace or robotics engineer, contributing to the design of exploration vehicles and autonomous systems. He envisions earning a scholarship for STEM studies, leading innovative
    engineering teams, and one day seeing his inventions used in space missions, all while maintaining the high standards he sets for himself.
