personas:
  professional: Mary Robinson, an interior designer with a systematic approach, leverages a curiously analytical mindset to blend sustainable materials with eclectic vintage pieces, competes for LEED AP
    accreditation while meticulously managing budgets, schedules, and client expectations.
  sports: Mary Robinson maintains physical balance through thrice‑weekly Vinyasa yoga sessions and seasonal trail runs with the Green Ridge Running Club, while cheering on the local professional soccer
    team the Portland Timbers and occasionally playing casual pickleball at the community center.
  arts: Mary Robinson curates intimate pop‑up shows featuring emerging talent like artist Lina Mendez and regularly photographs interiors reminiscent of Edward Hopper, while drawing inspiration from the
    works of Yayoi Kusama, Ansel Adams, and the modernist designs of Charles and Ray Eames.
  travel: Mary Robinson prefers meticulously planned boutique escapes, having savored the sustainable design scene in Copenhagen, the historic tea houses of Kyoto, and the Mediterranean hues of Chefchaouen,
    while budgeting future trips around design conferences and a long‑awaited adaptive‑reuse project tour in Barcelona.
  culinary: Mary Robinson, a competent home chef, experiments with heirloom tomatoes in Shakshuka, miso‑glazed eggplant, and handcrafted sourdough, often incorporating garden‑grown rosemary, smoked paprika,
    and locally sourced pine nuts to echo the flavors encountered on their travels.
  core: Mary Robinson blends a relentless curiosity for vintage aesthetics with a disciplined, solo‑driven work ethic, yet admits to hoarding scrap fabric samples and habitually losing track of time while
    puzzling over crosswords.
background:
  cultural: Mary was raised in a middle‑class suburban environment in Woodbridge, Virginia, within a family of primarily Anglo‑American heritage. Her upbringing emphasized self‑reliance, community involvement,
    and an appreciation for the historical architecture of the Mid‑Atlantic region. A bachelor's degree in humanities exposed her to a broad range of cultural narratives, from European art movements to
    contemporary global design trends. This eclectic cultural literacy, combined with the diverse demographic fabric of Prince William County, informs her inclusive yet thoughtfully curated design aesthetic.
attributes:
  skills: '["Spatial Planning", "Color Theory", "Material Sourcing", "Sustainable Design", "AutoCAD", "SketchUp", "Revit", "Adobe Photoshop", "Adobe Illustrator", "3D Rendering", "Budget Management", "Procurement",
    "Project Scheduling", "Building Codes Compliance", "Historic Restoration", "Art Curation", "Trend Forecasting"]'
  hobbies: '["Art Gallery Visits", "Museum Curating", "Vintage Furniture Collecting", "Interior Photography", "Gardening", "Exploratory Cooking", "Travel to Design Capitals", "Yoga and Meditation", "Puzzle
    Solving", "Crossword Puzzles"]'
  career_goals: Mary aims to transition from a senior interior designer to the founding partner of her own boutique studio that specializes in environmentally responsible, culturally nuanced residential
    and boutique hospitality projects. She plans to achieve LEED AP accreditation within the next two years, expand her portfolio to include adaptive reuse of historic homes, and become a recognized speaker
    at national design conferences. Additionally, she hopes to mentor emerging designers, publish articles on innovative design thinking, and eventually teach a graduate-level studio course on sustainable
    interior architecture.
