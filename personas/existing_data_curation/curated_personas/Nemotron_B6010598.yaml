personas:
  professional: Yesenia Garcia, a veteran retail cashier with flawless cash handling and bilingual customer service expertise, channels their methodical organization, talkative charm, and curiosity about
    art into mentoring new staff and orchestrating community events at the store, positioning themselves for a future part‑time docent role at the local museum.
  sports: Yesenia Garcia enjoys their brisk walks along Stamford’s Cove Island Park, participates in a senior badminton league at the community center, follows the New England Patriots in football and the
    Boston Red Sox during baseball season, and sometimes catches a Connecticut Whale hockey game, balancing low‑impact exercise with cheering for regional teams.
  arts: Yesenia Garcia paints watercolor seascapes inspired by Claude Monet and Frida Kahlo, frequently visits regional galleries to view works by emerging artists like Maya Rivera, dances to live bachata
    performances by Juan Luis Guerra and the salsa rhythms of Aventura, and shares their love of art history in a senior book club, weaving creative expression throughout their social life.
  travel: Yesenia Garcia prefers relaxed, culturally rich trips, having explored the historic streets of Old San Juan, the gardens of Versailles, and planning a heartfelt pilgrimage to the Dominican Republic
    to document family histories, all while budgeting travel costs around their fixed income and modest mobility.
  culinary: Yesenia Garcia, a confident home cook, prepares traditional Dominican dishes such as mangú with sautéed onions, sancocho brimming with yucca and plantains, and arroz con pollo flavored with
    cilantro and achiote, using fresh herbs from their garden and occasionally improvises with local seasonal produce.
  core: Yesenia Garcia, a vivacious 67‑year‑old watercolorist and community champion, blends curiosity, disciplined planning, and a love for music and dance into a vibrant life, though their tendency to
    over‑commit sometimes leaves them juggling more projects than time permits.
background:
  cultural: Yesenia grew up in a close‑knit Dominican immigrant family in the New York metropolitan area, where Spanish was spoken at home and American customs were celebrated outside. Her upbringing blended
    Caribbean rhythms—bachata, merengue, and salsa—with the civic traditions of Fairfield County, such as community parades and local festivals. Family gatherings centered around shared meals of mangú,
    sancocho, and plantains, reinforcing values of hospitality, resilience, and intergenerational respect. While she embraces her Dominican heritage through language, music, and cuisine, she also integrates
    the diverse cultural fabric of Stamford, participating in multicultural events and fostering connections across the community.
