  career_goals: Yesenia aims to transition her customer‑focused expertise into a part‑time role at a local cultural institution, such as serving as a docent or volunteer coordinator at the nearby museum.
    She also aspires to organize a monthly art‑and‑culture workshop for seniors in Stamford, blending her love of art with her community spirit. In the longer term, she hopes to travel to the Dominican
    Republic to reconnect with her roots and document family histories that she can share in a community exhibition.
