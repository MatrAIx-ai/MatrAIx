personas:
  professional: Monika Dasgupta, a retired environmental scientist now serving as a community health and cultural heritage liaison, harnesses her STEM expertise, bilingual storytelling, and practical gardening
    experience to lead structured volunteer projects and a digital archive of traditional ecological knowledge, while her compassionate nature allows her to adapt flexibly when plans shift.
  sports: Monika Dasgupta enjoys gentle sunrise walks along the San Juan River, participates in a senior yoga circle at the local community center, and follows the Colorado Rockies and Denver Broncos from
    her garden patio, illustrating her low‑impact, socially anchored fitness routine.
  arts: Monika Dasgupta merges her love for traditional basket weaving with listening to folk legend Joan Baez and classical guitarist Andrés Segovia, recounts community legends in intergenerational circles,
    and draws inspiration from the ceramics of Ruth Asawa exhibited at regional galleries.
  travel: Monika Dasgupta favors thoughtfully planned, leisurely road trips to scenic places like the Grand Canyon, Taos Pueblo, and Sedona, balancing nature photography with occasional video‑call reunions,
    while a modest travel budget steers her toward culturally resonant destinations rather than distant exotic getaways.
  culinary: Monika Dasgupta, a confident home cook, delights in preparing blue‑corn mush with sage, prickly pear‑infused stews, cedar‑smoked trout, and nettle tea, often sharing these dishes at community
    gatherings and pairing them with locally harvested wild berries.
  core: Monika Dasgupta bridges centuries of traditional plant wisdom with modern digital tools, fostering intergenerational harmony through garden stewardship and storytelling, even as she occasionally
    misplaces her glasses and forgets to water the newest seedlings.
background:
  cultural: Monika is a member of the Diné (Navajo) Nation, raised in Farmington, NM, where she grew up surrounded by both modern life and deep-rooted tribal traditions. Her family emphasized the teachings
    of the land, oral storytelling, and communal responsibility. She participated in seasonal ceremonies, learned the Diné language, and practiced traditional crafts such as weaving and the use of herbal
    remedies. Her bachelor's degree in environmental science reinforced her respect for the sacred relationship between her people and the Southwest landscape, motivating her ongoing involvement in language
    revitalization programs, tribal events, and environmental stewardship activities.
