  hobbies: '[''Garden cultivation'', ''Traditional basket weaving'', ''Storytelling'', ''Native cooking'', ''Birdwatching'', ''Digital literacy (photography, video calls)'', ''Walking along the San Juan
    River'', ''Community gatherings'']'
  career_goals: Although retired, Monika is focused on mentoring younger tribal members in traditional ecological knowledge, leading a community garden that supplies fresh produce to local elders, and creating
    a digital archive of Diné stories and medicinal practices. She aspires to advocate for environmental stewardship in San Juan County, support elder‑wellness initiatives, and foster intergenerational
    harmony through volunteer workshops and cultural events.
