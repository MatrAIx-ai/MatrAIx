personas:
  professional: Angela Costantini is a communications major at a New Jersey college, already interning as an event‑planning assistant for a local nonprofit where they combine public‑speaking flair, Canva‑driven
    social media design, and meticulous budgeting to turn community gatherings into inclusive digital storytelling experiences.
  sports: Angela Costantini spends Saturday mornings playing beach volleyball with the Monmouth Beach Volleyball Club, supports the New York Giants and New York Knicks with fervor, and joins a casual kick‑ball
    league that meets at a nearby park during the spring, blending competitive spirit with social bonding.
  arts: Angela Costantini frequents local coffee‑house open‑mic nights where they've performed spoken‑word pieces, enjoys live shows by The Strokes, Lizzo, and the folk duo Sea The Cottage, and curates
    an Instagram feed of their photography that often features candid portraits of the band members and sunrise over the Atlantic.
  travel: Angela Costantini prefers spontaneous, budget‑friendly road trips along the Jersey Shore, having already explored Cape May, Asbury Park, and Fire Island, and they keep a passport‑ready list that
    includes a dream summer backpacking adventure through the Greek islands and a culinary tour of Spain's coastal towns.
  culinary: Angela Costantini loves to recreate beloved Sunday family dishes like marinara‑sauce spaghetti with fresh basil and garlic, perfects a pepperoni pizza with a crisp crust using a home‑made dough
    starter, and often experiments by adding shaved Parmesan to avocado toast, while they admit to over‑seasoning their sauces when trying to impress friends during potlucks.
  core: Angela Costantini blends a bubbly, people‑centered energy with a pragmatic knack for turning ideas into organized events, yet secretly hoards half‑empty coffee cups and occasionally forgets to water
    their houseplants.
background:
  cultural: Angela was raised in a middle‑class, Italian‑American family in West Long Branch, New Jersey. Her family traditions include Sunday family meals featuring pasta and homemade sauce, celebrating
    holidays such as Christmas and Easter with a blend of Catholic customs and local community events. Growing up in the diverse suburban setting of Monmouth County, she has been exposed to a mix of cultures
    and values community involvement, which has shaped her inclusive outlook and collaborative spirit.
