  career_goals: Aiming to leverage her sociable nature and organizational talent, Angela intends to pursue a bachelor’s degree in Communications or Hospitality Management. She aspires to work as an event
    coordinator or public relations specialist for a nonprofit or community‑focused organization in the New York/New Jersey area. Long‑term, she envisions leading a community outreach program that blends
    event design with digital storytelling, and eventually earning a leadership role where she can mentor young people and promote inclusive, collaborative projects.
