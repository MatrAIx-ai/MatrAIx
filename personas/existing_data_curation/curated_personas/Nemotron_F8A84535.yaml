  career_goals: Although officially retired, Kum aspires to leave a lasting imprint on Bisbee’s cultural memory. He plans to compile a memoir that weaves his personal experiences with the town’s mining
    heritage, and to launch an oral-history project that records the stories of longtime residents using simple audio-visual tools. He also aims to expand the senior-center garden he helped organize, creating
    a therapeutic space that can serve as a model for other community groups. On a personal level, he seeks to strengthen his emotional resilience by maintaining a daily journaling practice, participating
    in a local anxiety-support group, and learning basic mindfulness techniques. Ultimately, he wishes to be recognized as a bridge between generations, helping younger volunteers appreciate the town’s
    history while embracing new ideas.
