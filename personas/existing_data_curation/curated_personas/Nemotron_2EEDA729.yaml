  career_goals: Lucila aims to move from a systems analyst role to a senior solution architect or IT strategy manager within the next five years, leading large‑scale digital transformation projects for
    multinational firms. She plans to earn PMP and CBAP certifications, deepen her expertise in cloud‑based architecture, and eventually launch her own consultancy focused on optimizing business processes
    for tech startups. Her competitive drive pushes her to become a recognized strategic partner who bridges business goals with cutting‑edge technology.
