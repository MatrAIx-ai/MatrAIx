  career_goals: Mone aims to complete his associate’s degree in hospitality management while gaining steady employment at a Las Vegas resort or casino. In the next three years he hopes to advance into a
    supervisory role such as floor manager or event coordinator, leveraging his bilingual ability to serve international guests. Long‑term, he envisions launching a boutique food‑truck business that blends
    modern Mexican street food with contemporary twists, using his social‑media skills to build a brand. He also plans to develop resilience strategies to manage stress, potentially pursuing certification
    in wellness coaching to help peers handle anxiety. His career plan balances curiosity for new culinary trends with a practical desire for financial stability.
