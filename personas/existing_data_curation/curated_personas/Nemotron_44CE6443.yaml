  hobbies: '["Abstract watercolor painting", "Mixed‑media collage", "Photography", "Speculative fiction writing", "Museum and gallery visits", "Indie narrative board gaming", "Mindful nature walks and sketching",
    "Listening to experimental music", "Digital illustration", "DIY craft projects"]'
  career_goals: Cynthia aspires to become a director of an innovative early‑learning center that places art and interdisciplinary exploration at its core. She plans to earn a master’s degree in early childhood
    education or educational leadership within the next five years, focusing on research into arts‑based pedagogy. Long‑term, she envisions launching her own boutique preschool in Madison that emphasizes
    creativity, critical thinking, and community partnership, and to contribute thought‑leading articles to educational journals on integrating abstract concepts into early curricula.
