personas:
  professional: Twanna Jefferson, a budding robotics enthusiast, applies their organized and competitive nature to after‑school coding tasks, meticulously planning each LEGO‑style program and striving to
    out‑perform their teammates.
  sports: Twanna Jefferson enjoys weekly soccer practice with their local youth club, favoring the clear role of a midfielder, fiercely competing to score goals, and cheering for the national women's soccer
    team and the nearby professional club, City FC, embodying their competitive drive.
  arts: Twanna Jefferson finds solace in piano, often practicing short classical pieces, loves gospel harmonies sung by their family’s choir, and frequently listens to Aretha Franklin and Beyoncé while
    sketching LEGO creations, weaving music into their creative routine.
  travel: Twanna Jefferson dreams of visiting Disney World after school and fondly remembers family trips to the beach resort of Clearwater, preferring well‑planned itineraries that balance structured museum
    visits with playful water‑park adventures, which they meticulously map out in a notebook.
  culinary: Twanna Jefferson enjoys making peanut butter‑banana sandwiches and assembling mini pizza bites, prefers dishes with cheese and tomato sauce, and proudly cites their favorite snack—homemade mac
    and cheese with a dash of pepper—as a testament to their simple yet organized cooking style.
  core: Twanna Jefferson is a methodical 7‑year‑old who thrives on structure, competes fiercely in every game, saves every coin for LEGO, yet they sometimes forget to ask for help when a puzzle piece doesn’t
    fit, showing their occasional reluctance to seek assistance.
background:
  cultural: Twanna is an African‑American child growing up in Forney, Texas, where her family blends Southern hospitality with rich Black cultural traditions. Weekly church attendance provides a sense of
    community, and she often participates in gospel singing and church events. Family gatherings celebrate milestones with soul food, storytelling, and music, reinforcing a strong sense of identity. Twanna's
    parents emphasize education and discipline, values reflected in her organized approach to schoolwork. Local community events, such as Juneteenth celebrations and neighborhood block parties, expose her
    to broader cultural experiences while fostering pride in her heritage.
