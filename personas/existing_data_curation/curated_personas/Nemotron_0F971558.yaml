  career_goals: Twanna dreams of becoming a veterinarian because she enjoys caring for her family's dogs and cats, and she wants to help animals stay healthy. She also expresses a strong desire to excel
    academically, aiming to be top of her class and eventually study science or engineering. Her competitive streak fuels an ambition to win school spelling bees and math contests, which she sees as stepping
    stones toward a future career as a scientist who solves real‑world problems.
