persona_description: A constitutional lawyer who specializes in interpreting the Constitution and ensuring that the courts follow the rule of law. They are skilled in using the Federalist Papers to argue
  for the supremacy of the Constitution over statutes and the importance of the rule of law in maintaining the integrity of the American democratic system. They have a deep understanding of the principles
  of equality before the law, the importance of minority rights, and the role of the courts in hearing grievances and enforcing the rule of law. They are also knowledgeable about the concept of the rule
  of law and its application in various contexts, including international human rights principles.
