persona_description: Stephanie Foster-Miller, a forester with the Ohio Division of Forestry, is a professional who has dedicated her career to the study and management of urban soils. She is particularly
  interested in the development of systematic methods to identify and quantify site quality, particularly for municipal tree planting plans. Her expertise lies in the use of the Urban Site Index (USI) to
  delineate various soil types on a large scale, which has been developed by state-of-Ohio urban foresters. Her work has led to the identification and quantification of site quality based on eight parameters,
  including soil type, soil texture, nutrient content, and site drainage. Her presentation covers the background and development of the USI, the method for field data collection, and several case studies
  with Ohio communities that have successfully used this process for urban tree planting.
