  hobbies: '[''Visiting museums and galleries'', ''Sketching and watercolor painting'', ''Photography'', ''Reading philosophy, psychology, and sociology'', ''Participating in discussion groups'', ''Playing
    intramural soccer'', ''Improv workshops'', ''Organizing board game nights'', ''Mentoring youth in entrepreneurship'', ''Coordinating community fundraising events'', ''Yoga and meditation'', ''Journaling'',
    ''Listening to mental‑health and entrepreneurship podcasts'']'
  career_goals: In the short term, Naser aims to secure an entry‑level role in a socially responsible organization—such as a corporate social responsibility analyst or a nonprofit program coordinator—where
    he can apply his business acumen while directly supporting community initiatives. He plans to deepen his expertise in social impact through a part‑time Master’s program in Nonprofit Management or an
    MBA with a concentration in social entrepreneurship. Over the next five to ten years, his ambition is to launch a community‑focused social enterprise that blends arts education with youth empowerment,
    creating sustainable spaces for creative expression and mental‑health support. He also hopes to become an advocate for workplace well‑being, using his own experiences with anxiety to develop policies
    and programs that foster emotional resilience and inclusive cultures.
