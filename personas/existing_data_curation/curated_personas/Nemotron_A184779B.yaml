  career_goals: Although retired from formal employment, Jenefer aims to remain intellectually active by providing occasional consulting for local community projects, mentoring high‑school girls interested
    in STEM, and authoring a memoir that reflects on her career and life lessons. She also plans to complete a structured online certification in data visualization to keep her skills current, and to maintain
    her health and financial security through careful budgeting and steady participation in a senior wellness program.
