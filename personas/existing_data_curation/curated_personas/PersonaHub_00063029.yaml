persona_description: A forest ecologist or a forestry researcher who is responsible for estimating aboveground woody biomass for the FAO and the UNFCCC reporting in Poland. They have expertise in forest
  inventory systems, conversion factors, and the influence of stand and tree characteristics on biomass estimation. They are knowledgeable about the IPCC guidelines and the need to consider differences
  in wood and bark density, especially for pine. They are skilled in analyzing data and making informed decisions based on the available information.
