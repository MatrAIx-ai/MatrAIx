personas:
  professional: Angelia Lee, a retired visual artist who now leads community art workshops and curates senior-center exhibitions, leverages their watercolor, collage, and experimental photography expertise
    to mentor emerging creators while navigating deadline-phobia and impulsive project planning.
  sports: Angelia Lee, a devoted fan of the San Antonio Spurs and San Antonio FC, stays active by joining weekly senior tennis matches at the Alamo Heights Tennis Club, dances swing classes at the Riverwalk
    Cultural Center during the summer, and practices gentle yoga at the local senior center to counterbalance their occasional joint stiffness.
  arts: Angelia Lee, whose artistic soul is shaped by the vibrant murals of downtown San Antonio, the abstract canvases of Wassily Kandinsky, and the improvisational jazz of Charles Mingus, spends weekends
    painting plein-air scenes, assembling collages inspired by found objects, and attending live folk shows at the Blue Note, while curating a personal Instagram gallery that showcases their mixed-media
    experiments.
  travel: Angelia Lee, an adventurous wanderer who prefers spur-of-the-moment road trips over meticulously plotted itineraries, delights in weekend drives to quirky places like Marfa's art installations,
    the historic ghost town of Indianola, and the Hill Country's Wimberly Wool Picnic, while dreaming of a future pilgrimage to the Musee d'Orsay in Paris to soak in Impressionist masterpieces.
  culinary: Angelia Lee, a confident home cook who revels in mixing bold Tex-Mex flavors with their experimental palate, frequently whips up homemade carne asada tacos with fresh cilantro, lime, and roasted
    poblano strips, perfects a citrus-infused gazpacho with chopped heirloom tomatoes and cucumber, and treats themselves to decadent dark chocolate mousse infused with a dash of smoked paprika for a sweet-savory
    twist.
  core: Angelia Lee, a fiercely imaginative 70-year-old whose spontaneous creativity, competitive drive, and perpetual worry dance together like an improvisational jazz riff, fuels their relentless pursuit
    of artistic legacy while leaving a trail of unfinished plans and impulsive art-supply splurges.
background:
  cultural: Angelia grew up as a White Texan in the post‑World War II era, raised in a modest suburban neighborhood of San Antonio. Her family’s roots trace back to Midwestern settlers who moved to Texas
    in the 1930s, blending a Southern work ethic with an appreciation for the multicultural tapestry of the River City. Immersed in the bilingual environment of Bexar County, she developed an affection
    for Tex‑Mex cuisine, the vibrant colors of local fiestas, and the historic blend of Anglo‑American and Hispanic traditions. Although she completed only a high‑school education, Angelia values lifelong
    learning and has absorbed influences from the city’s art scene, community centers, and the broader Southwestern cultural heritage.
