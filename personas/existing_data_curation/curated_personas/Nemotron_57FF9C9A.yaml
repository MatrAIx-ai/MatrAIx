  career_goals: Even in retirement, Angelia remains driven to leave a lasting imprint on San Antonio’s artistic community. She aspires to hold a solo exhibition at a downtown gallery, publish a curated
    collection of poems and visual sketches, and mentor emerging artists through a weekly mentorship circle. Angelia hopes to launch an annual Imagination Festival that celebrates abstract art, spontaneity,
    and intergenerational collaboration, and she seeks to serve on the advisory board of the local arts council to influence cultural programming. Her competitive streak pushes her to win regional senior‑artist
    contests and achieve broader recognition for her innovative work.
