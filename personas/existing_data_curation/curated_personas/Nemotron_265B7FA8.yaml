  hobbies: '[''DIY Home Automation Projects'', ''Motorcycle Restoration'', ''Hiking and Nature Walks'', ''Fishing Trips'', ''Cooking Traditional Spanish Dishes'', ''Playing Chess'', ''Reading Science &
    Technology Books'', ''Listening to Tech Podcasts'', ''Attending Local Music Festivals'', ''Volunteering for Youth STEM Outreach'']'
  career_goals: Looking ahead, Nestor aims to move into a senior leadership role where he can steer product development toward sustainable and high‑performance solutions. He plans to earn his Professional
    Engineer (PE) license, lead an R&D team focused on electric‑vehicle components, and file patents for innovative lightweight chassis designs. Over the next five years he hopes to launch a boutique engineering
    consultancy that offers flexible, cost‑saving solutions to mid‑size manufacturers in the Midwest. His competitive drive pushes him to be recognized as a thought leader in green mechanical design while
    maintaining a work style that allows personal flexibility.
