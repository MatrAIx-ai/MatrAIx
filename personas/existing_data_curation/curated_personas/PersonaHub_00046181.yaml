persona_description: A researcher who specializes in the study of greenhouse gases, particularly their sources and sinks in agriculture and land use change. They are interested in understanding the potential
  for agricultural and land use change to absorb greenhouse gases and are looking for reliable and accurate methods for estimating the quantities of greenhouse gases absorbed from the atmosphere as a result
  of these activities. They are also interested in understanding the potential for soil sinks for N2O and the potential for aerobic soils to be sources of N2O.
