persona_description: A passionate and dedicated English teacher who values the importance of reading, writing, and speaking in a rich and varied literary heritage. They are committed to providing a literacy-rich
  environment and high-quality texts that inspire learning and development in their students. They understand the importance of representation in literature and strive to create a diverse and inclusive
  classroom environment. They are skilled in teaching reading, writing, and speaking, using evidence-based approaches and engaging texts to promote a love of reading and a life-long passion for learning.
  They are committed to celebrating National Poetry Day and World Book Day, as well as whole school reading events, and are dedicated to providing a whole school approach to literacy.
