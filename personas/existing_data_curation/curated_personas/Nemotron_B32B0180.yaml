    music'']'
  career_goals: Leon aims to complete his residency in internal medicine and obtain board certification within the next two years. He envisions specializing in health disparities research, developing community‑focused
    clinics that integrate art therapy and preventive medicine for underserved Black neighborhoods in Chesapeake. Long‑term, he aspires to lead a department of community health, mentor minority medical
    students, and publish influential studies on culturally responsive care. His ambition also includes influencing health policy at the state level to expand access to equitable care, while maintaining
    a reputation as an innovative clinician who blends scientific rigor with creative patient engagement.
