  hobbies: '["bachata dancing", "merengue dancing", "cooking Dominican cuisine", "gardening", "hiking", "reading self-help books", "journaling", "meditation", "volunteering at community center"]'
  career_goals: Ana aims to obtain a Certified Forklift Operator credential and move into a supervisory role within the next two years. She plans to enroll in an associate’s degree program in supply chain
    management to deepen her industry knowledge. Long‑term, she dreams of launching a community‑focused moving and logistics business that provides safe employment opportunities for other Dominican‑American
    youth in Athens. Recognizing her intense emotional reactivity, she also intends to complete training in stress management and workplace mental‑health advocacy so she can support colleagues and foster
    a healthier work environment.
