personas:
  professional: Ana Ogden, a material mover at a bustling Athens distribution center, combines their methodical inventory management, forklift proficiency, and natural talent for calming anxious shift changes
    into a reliable workflow that keeps the warehouse humming while quietly bridging cultural gaps among teammates.
  sports: Ana Ogden, who squeezes weekend hikes through the State Botanical Garden and dances bachata at local Latin nights to stay fit, roots for the Atlanta Falcons and the Georgia Bulldogs, participates
    in the Athens community softball league each spring, and balances an otherwise low‑key workout routine with occasional yoga sessions after work.
  arts: Ana Ogden, a devoted fan of bachata rhythms by artists such as Juan Luis Guerra and Romeo Santos, regularly attends live Latin music nights on Main Street, enjoys occasional performances by the
    Georgia Ballet, and incorporates storytelling through community workshops where they teach basic Spanish phrases and island folk customs.
  travel: Ana Ogden, who prefers affordable road trips that blend cultural immersion with nature, has revisited the Caribbean island’s capital where their family roots lie, explored Savannah’s historic
    squares and Asheville’s mountain trails, and dreams of a future solo retreat to a colonial waterfront city once their business capital gains stability.
  culinary: Ana Ogden, a confident home cook who can coax the deep, comforting flavors of sancocho and the buttery smoothness of mangú using fresh cilantro, garlic, and ripe plantains, frequently hosts
    potluck gatherings where they showcase these dishes alongside a homemade avocado–tomato salad, yet they still indulge in occasional visits to the local Caribbean café for a quick empanada or a steaming
    bowl of arroz con gandules.
  core: Ana Ogden, a 29‑year‑old logistics enthusiast who blends methodical warehouse expertise with a passion for island dance, grapples with intense anxiety that fuels both meticulous planning and occasional
    panic, and channels those energies into building a community‑focused moving business while never missing a family dinner.
background:
  cultural: Ana is a first‑generation Dominican‑American who grew up in a bilingual household in Georgia. Her parents immigrated from the Dominican Republic, bringing a rich blend of Caribbean traditions,
    Spanish language, and a strong sense of family. She celebrates Dominican holidays such as Día de la Constitución and enjoys the rhythms of Dominican music, while also embracing Southern hospitality
    and the community values of Athens. This cultural duality informs her warm, communal approach to work and life, and she often serves as a cultural bridge between her coworkers and the local community.
attributes:
  skills: '["forklift operation", "inventory management", "warehouse safety compliance", "material handling", "equipment maintenance", "time management", "basic computer proficiency (WMS)", "team coordination",
