  career_goals: Toni aims to leverage her experience and curiosity for improvement by moving into a supervisory role within the United States Postal Service, such as a Route Supervisor or Logistics Coordinator,
    where she can implement more efficient delivery methods and mentor new carriers. She also plans to complete her bachelor's degree in Business Administration to broaden her career options and possibly
    transition into a community liaison position that bridges postal services with local businesses and civic programs. Balancing her ambition with personal well‑being, she seeks to advocate for mental‑health
    resources for frontline workers and to create a supportive network for colleagues who face similar emotional challenges.
