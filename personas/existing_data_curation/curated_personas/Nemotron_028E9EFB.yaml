  career_goals: Colin aspires to turn his love for art and community service into a career that blends creativity with social impact. He plans to earn his GED, then pursue a degree in graphic design or
    community art education, with the long-term goal of working for a nonprofit that uses visual arts to empower youth in under-served neighborhoods. He also envisions volunteering as a youth mentor and
    eventually leading community-wide art projects that celebrate local heritage.
