  career_goals: In the short term, Jose aims to earn the CISSP and transition into a senior analyst role where he can lead cross‑functional security projects and mentor junior team members. Over the next
    five years, he aspires to become a security architect, shaping secure system designs for large health‑care providers in Southern California. Ultimately, he envisions a CISO‑adjacent position that combines
    strategic risk management with community outreach, allowing him to develop cybersecurity education programs for Latino youth and small businesses in his neighborhood.
