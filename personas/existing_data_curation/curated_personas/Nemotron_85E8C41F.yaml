    ''Scripting and automation (Python, PowerShell)'', ''Penetration testing basics'', ''Risk assessment and mitigation planning'', ''Security awareness training'', ''Log analysis and anomaly detection'']'
  hobbies: '[''Street mural photography'', ''Acoustic guitar playing'', ''Reading science‑fiction and philosophy'', ''Puzzle solving (crosswords, logic games)'', ''Quiet nature walks and sketching'', ''Exploring
