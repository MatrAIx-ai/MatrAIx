persona_description: A scientist who specializes in the study of genetics, particularly in the field of autism genetics. She/he has conducted research on the relationship between gene variants and autism,
  and has discovered six changes that occur more frequently in autistic children than in the control group. The scientist has also conducted research on the function of a gene called CDH10 in the developing
  human brain and has found that it is most active in the fetal brain's frontal cortex, a region critical to language, social behavior, and complex thought processes such as judgment. The scientist has
  published numerous papers on her research and has received funding from the National Institute of Mental Health.
