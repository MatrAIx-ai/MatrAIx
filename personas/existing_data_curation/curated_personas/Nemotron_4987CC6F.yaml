personas:
  professional: Eboney Ellis, a 44‑year‑old warehouse operator, seamlessly blends hands‑on expertise with industrial truck mastery and a natural talent for community event planning, using their curiosity
    and compassion to train new operators while championing safety and creative workplace culture.
  sports: Eboney Ellis enjoys the rhythm of salsa and line‑dancing classes year‑round, joins a local beach‑volleyball league each summer, and passionately supports the Jacksonville Jaguars (NFL) and the
    Jacksonville Icemen (ECHL), often attending games with friends after work.
  arts: Eboney Ellis frequents Riverside Arts Market and downtown galleries, finds inspiration in the vibrant works of Kerry James Marshall and the soulful saxophones of John Coltrane, and leads child art‑craft
    workshops where they draw on the playful energy of Maya Angelou's poems and the kinetic designs of James Turrell.
  travel: Eboney Ellis prefers spontaneous weekend road trips along the Florida coast—savoring sunrise at Clearwater Beach, strolling the historic streets of St. Augustine, and dreaming of a future jazz‑filled
    getaway to New Orleans—while balancing limited vacation time with a flexible, last‑minute planning style.
  culinary: Eboney Ellis cooks Southern soul food with creative twists, whipping up shrimp‑and‑grits with a hint of coconut milk, collard greens seasoned with smoked paprika, and a sweet‑potato pie infused
    with ginger, all while sourcing fresh produce at Jacksonville’s farmers market and experimenting with hot‑sauce blends.
  core: Eboney Ellis, a compassionate, art‑loving warehouse veteran who wrestles with anxiety, blends safety expertise with spontaneous salsa steps, and whips up soulful dishes while dreaming of a community
    art‑therapy program.
background:
  cultural: Eboney is an African‑American woman raised in Jacksonville, Florida, where the rich legacy of Southern Black culture—a blend of church traditions, soul food, jazz, and civil‑rights activism—shapes
    her identity. Her family emphasizes community solidarity, storytelling, and a deep respect for artistic expression, especially music and visual arts rooted in the Black experience. Growing up in a close‑knit
    Black neighbourhood, she participated in church choirs, local festivals like the Jacksonville Jazz Festival, and community clean‑up initiatives. This cultural grounding fuels her compassion, collaborative
    spirit, and her desire to uplift others through both safety advocacy at work and creative community projects.
attributes:
