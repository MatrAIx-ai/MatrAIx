  hobbies: '[''visiting art galleries'', ''attending jazz concerts'', ''Riverside Arts Market'', ''volunteering at community food bank'', ''leading art‑craft workshops for children'', ''salsa dancing'',
    ''line dancing'', ''coastal road trips'', ''cooking Southern soul food'', ''reading contemporary fiction and self‑help books'']'
  career_goals: She aims to advance to a supervisory role such as lead operator or safety coordinator, obtaining certification in occupational safety and health. Over the next few years, she plans to complete
    a bachelor’s degree in logistics or industrial safety, which would enable her to design safer, more efficient warehouse processes. Simultaneously, she hopes to launch a community program that blends
    art workshops with mental‑health support for local youth, leveraging her passion for art and empathy. Ultimately, she envisions a career where she can shape workplace culture, promote safety, and give
    back through creative community initiatives.
