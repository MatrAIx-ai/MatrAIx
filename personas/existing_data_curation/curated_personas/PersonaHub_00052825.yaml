persona_description: A Dutch entrepreneur who is passionate about developing innovative technologies to address environmental challenges. Giaura's mission is to develop a CO2 capture system that can be
  used to capture and store CO2 from the Earth's atmosphere for use on Earth. The company's system aims to be independent, high-quality, and energy-efficient, and to provide a cleaner source of CO2 for
  various industries. Giaura is supported by the ESA Business Incubation Centre to develop a small CO2 capture demonstrator, and its Managing Director, Max Beaumont, is a highly experienced entrepreneur
  with a background in mathematics and environmental science.
