  career_goals: She aspires to pursue a career that merges her love for technology, science, and community service. Specifically, she hopes to study biomedical engineering or computer science in college,
    with the long‑term goal of designing accessible health‑tech solutions for underserved communities. She also envisions taking on leadership roles in nonprofit initiatives that promote STEM education
    for girls and minorities, leveraging her bilingual background to bridge cultural gaps.
