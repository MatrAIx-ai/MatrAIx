personas:
  professional: Wen Guan is an aspiring robotics enthusiast who leads the middle school robotics club, designs competition‑ready robots and simple video games, and leverages a curiosity‑driven yet practical
    mindset to balance inventive coding with disciplined project timelines.
  sports: Wen Guan is a midfielder on the Oakridge Middle School soccer team, strengthens stamina through dance rehearsals with the local Contemporary Fusion troupe, jogs with the community’s River Valley
    Runners club, and roots for the Seattle Sounders FC (MLS) and the New York Knicks (NBA), blending structured practice with playful pick‑up games.
  arts: Wen Guan is a budding pianist who practices pieces by Ludovico Einaudi and Yiruma, creates digital illustrations inspired by Studio Ghibli’s Hayao Miyazaki and contemporary artist Loish, and draws
    artistic motivation from watching Joffrey Ballet performances and listening to pop icons like Taylor Swift.
  travel: Wen Guan prefers group trips organized by school or family, balancing detailed itineraries with spontaneous exploration; they have visited Yellowstone National Park and Washington, D.C., and dream
    of traveling to Tokyo for a robotics expo and snorkeling at the Great Barrier Reef when finances allow.
  culinary: Wen Guan is an enthusiastic home cook who deftly rolls pork and shrimp dumplings for dim sum, sears crispy fried chicken with a buttermilk brine, and whips up collard greens flavored with smoked
    turkey, frequently seasoning dishes with ginger, garlic, and soy sauce, yet often forgets to clean the kitchen afterward.
  core: Wen Guan is a socially vibrant teen who juggles robotics, soccer, and dance with relentless curiosity, yet can’t resist binge‑watching sci‑fi series on weekends, leading to occasional missed homework
    deadlines.
background:
  cultural: Wen comes from an East Asian (Chinese) family that has lived in the United States for two generations. Growing up in Arlington, Tennessee, she balances the cultural values of her heritage—such
    as respect for elders, emphasis on education, and bilingualism—with the Southern traditions of community hospitality and church involvement. Her household celebrates Lunar New Year and Mid‑Autumn Festival,
    incorporating traditional foods like dumplings and mooncakes, while also partaking in local festivals, high‑school football games, and church gatherings. This blend of cultures informs her worldview,
    fostering both a global perspective and a strong sense of local community.
