personas:
  professional: John Soni, a budding junior illustrator with a knack for whimsical character sketches, merges their love of watercolors and indie video game lore into spontaneous after‑school art sessions,
    often leaving projects half‑finished because structure feels stifling.
  sports: John Soni, a regular participant in pickup basketball games after school, cheers for the local high school Spartans while dreaming of the NBA’s Golden State Warriors, and they occasionally practice
    drills at the community center’s youth sports club.
  arts: John Soni, an avid member of the school drama club who sketches character concepts inspired by Studio Ghibli and the indie game Celeste, fuels their creative mood with alternative playlists featuring
    Radiohead, The Strokes, and Tame Impala.
  travel: John Soni prefers spontaneous weekend hikes in nearby state parks like Redwood Forest and impromptu family road trips to the Grand Canyon, while they keep a wish list of future adventures that
    include a cultural tour of Kyoto and a summer camp in the Rockies.
  culinary: John Soni, a budding home‑chef who loves experimenting with avocado toast topped with basil and chili flakes, often trades pizza slices for homemade ramen bowls after gaming marathons, and they
    sometimes forget to recycle the take‑out containers.
  core: John Soni is an endlessly curious teen whose imagination blends art, nature, and video games into vibrant creations, yet their spontaneous streak leaves a trail of half‑finished sketches and missed
    deadlines.
background:
  cultural: John comes from an Italian‑American family in Allentown, PA. His upbringing reflects the working‑class Lehigh Valley culture, with strong emphasis on family meals, community festivals (such
    as local Italian feasts and the St. Patrick’s Day Parade), and Catholic traditions. He is exposed to a blend of suburban Mid‑Atlantic values, the region’s industrial heritage, and a diverse, multicultural
    community that fosters his openness to novelty and collaborative creativity.
