personas:
  professional: Umberto Grubbe is an aspiring graphic designer and tech tinkerer who merges self‑taught HTML/CSS and PC‑building expertise with a love for pixel art, aiming to secure a junior digital content
    role while wrestling with occasional disorganization and academic anxiety.
  sports: Umberto Grubbe enjoys casual cycling with the Montclair Bike Club, weekend hikes on the Watchung Reservation, occasional pickup basketball games, and fervently follows the New York Knicks and
    New York Giants, preferring low‑key fitness routines over organized varsity sports.
  arts: Umberto Grubbe sketches urban street scenes while listening to Phoebe Bridgers and lo‑fi beats on ChilledCow, creates pixel art inspired by Paul Robertson, indulges in Studio Ghibli films, and experiments
    with simple digital illustrations after watching tutorials by YouTube creator Aaron Blaise.
  travel: Umberto Grubbe prefers low‑cost weekend road trips planned with Google Maps and budget‑travel forums, has taken day trips to New York City and a week‑long family visit to Washington, D.C., and
    dreams of backpacking through the Amalfi Coast and exploring the neon streets of Tokyo, balancing a love for spontaneous adventure with the financial reality of a teenage budget.
  culinary: Umberto Grubbe enjoys cooking homemade spaghetti carbonara with pancetta, garlic, and pecorino, perfects pepperoni pizza on a self‑made dough, occasionally experiments with ramen broth infused
    with miso and soy sauce, and brings a beginner‑level flair to the kitchen that blends family pasta traditions with a curiosity for global flavors.
  core: Umberto Grubbe is a tech‑savvy teen who blends solitary creative pursuits with a habit of over‑indulging in PC upgrades, wrestling with anxiety and a love for family pasta rituals while dreaming
    of freelance freedom.
background:
  cultural: Umberto comes from an Italian‑American family rooted in the suburbs of Montclair, New Jersey. His grandparents immigrated from Southern Italy, bringing traditions such as regular family gatherings
    centered around homemade pasta and occasional celebrations of cultural holidays like the Feast of the Immaculate Conception. Growing up in a diverse, middle‑class neighborhood, he blends these family
    customs with the broader American teenage culture of the Northeast, balancing a respect for heritage with the independent, tech‑savvy outlook of his peer group.
