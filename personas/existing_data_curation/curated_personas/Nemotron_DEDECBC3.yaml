  career_goals: Umberto aims to earn his GED within the next year and enroll in a community‑college program focused on graphic design or IT support. He hopes to secure an apprenticeship in a local tech
    repair shop or a junior role as a digital content creator, allowing him to blend his creative interests with practical work. Long‑term, he dreams of freelancing as a video editor and designer, achieving
    financial independence while maintaining the flexibility hevalues. Overcoming his worry about academic pressures, he plans to build a portfolio of personal projects to demonstrate his capabilities to
    future employers.
