  career_goals: Mary’s primary professional ambition is to obtain her Certified Public Accountant credential within the next 12 months, positioning herself for promotion to senior auditor at her firm. Over
    the next five years she aims to lead a small audit team, handling complex engagements for regional mid‑size businesses and nonprofit organizations. She hopes to leverage her humanities background to
    develop a niche in impact‑oriented accounting, integrating financial performance with community outcomes. Ultimately, Mary envisions establishing her own boutique accounting consultancy that offers
    flexible, client‑centered services to small firms throughout East Tennessee, while also mentoring emerging accountants and promoting ethical practice.
