personas:
  professional: Mary Dougherty is a 31‑year‑old CPA‑in‑training who blends her accounting expertise with a humanities‑infused analytical lens, delivering meticulous audit reports while they translate technical
    jargon into clear, compassionate communication for both corporate clients and community nonprofits.
  sports: Mary Dougherty enjoys weekend hikes with the East Tennessee Appalachian Hiking Club, plays in a local co‑ed softball league during summer, follows the Tennessee Titans and Nashville Predators
    on game days, and they stay active by doing yoga at the community center while they occasionally skip workouts when a book club meeting runs late.
  arts: Mary Dougherty immerses herself in the regional arts scene by dancing to live bluegrass sets featuring Alison Krauss and Chris Stapleton at the town’s music hall, volunteering as a stagehand for
    community‑theater productions of Tennessee Williams plays, and they unwind by reading the latest novel by Celeste Ng, all of which shape her vibrant cultural identity.
  travel: Mary Dougherty prefers spontaneous weekend road trips over rigid itineraries, often heading to Asheville’s Blue Ridge Parkway or the historic streets of Savannah for a blend of hiking and southern
    cuisine, while they dream of touring the Scottish Highlands to trace ancestral roots and savoring the jazz scene in New Orleans on a future spring break.
  culinary: Mary Dougherty, a confident home cook, loves preparing Southern classics such as crispy fried chicken with hot‑cooking oil, buttery cornbread, collard greens simmered with smoked ham hocks,
    and peach cobbler spiced with cinnamon and nutmeg, often seasoning dishes with locally sourced pecans and sweet potatoes for her group‑hike picnics.
  core: Mary Dougherty blends structured accounting rigor with a love for community, outdoor adventure, and Southern hospitality, balancing meticulous work habits with a spontaneous, people‑centric lifestyle.
background:
  cultural: Mary grew up in Elizabethton, a small town nestled in the foothills of the Appalachian Mountains in East Tennessee. Her family roots trace back to Scots‑Irish settlers who arrived in the region
    in the 19th century, fostering a cultural heritage steeped in Southern hospitality, storytelling, and a deep connection to the outdoors. The local community’s emphasis on church involvement, family
    gatherings, and seasonal festivals—such as the Flowermere Festival—shaped her values of cooperation, generosity, and civic pride. While she embraces traditional Southern customs like homemade cooking
    and folk music, her academic exposure to the humanities broadened her perspective, allowing her to blend regional identity with a modern, inclusive worldview. This mix of Appalachian tradition, small‑town
    community spirit, and a love for the arts informs her social interactions, professional ethic, and personal interests.
