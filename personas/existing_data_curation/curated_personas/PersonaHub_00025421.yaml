persona_description: A Masonic historian with a deep interest in the history and development of Freemasonry in the state of Illinois. They have a particular expertise in the early history of Masonic lodges
  in the state, including the formation of the first lodge in Kaskaskia in 1806 and the subsequent Grand Lodge of Illinois in 1822. They are also knowledgeable about the persecution of Freemasonry during
  the 1820s and the gradual recovery and growth of the order in the state during the 1830s and 1840s. The persona is interested in the Grand Lodge of Illinois and its role in overseeing the activities of
  Masonic lodges in the state, as well as the broader history of Freemasonry in the United States.
