  career_goals: Mary Susan aspires to a career that blends her love for helping others with her knack for organization and calm under pressure. She hopes to become a pediatric nurse, providing compassionate
    care to children while applying her reliable nature and stress‑resilience. She is also intrigued by event planning for local community festivals, where she could use her coordination skills. In the
    short term, she aims to excel in high school, earn a scholarship for a health‑sciences program, and gain experience through volunteering at a clinic and the animal shelter. Ultimately, she plans to
    attend a university with strong nursing or public‑health programs and later specialize in pediatric care.
