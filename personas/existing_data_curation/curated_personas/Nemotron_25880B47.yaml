personas:
  professional: Mary Frazzetta, a 13‑year‑old student with a love for structure, reliably coordinates soccer practice schedules and choreographs dance routines while keeping a practical eye on homework
    and school projects.
  sports: Mary Frazzetta, a steadfast midfielder on her school’s varsity soccer team and a member of the community youth soccer club, dutifully follows the U.S. Women’s National Team and the local MLB franchise
    the Seattle Mariners, balancing regimented practice sessions with spontaneous weekend pick‑up games to keep her stamina high.
  arts: Mary Frazzetta, who practices piano three times a week, stars in community‑theater productions of the musical Annie, avidly follows pop icons such as Taylor Swift and BTS, and escapes into contemporary
    teen novels by John Green, weaving these inspirations into her friendship‑bracelet crafts and dance routines.
  travel: Mary Frazzetta, who favors well‑planned family trips and values a balanced mix of sightseeing and downtime, has vacationed at the coastal resort of Myrtle Beach, dreams of strolling through New
    York City’s Central Park, and hopes to someday explore the historic temples of Kyoto.
  culinary: Mary Frazzetta, an enthusiastic home‑cook who can reliably bake chocolate chip cookies and whip up a simple chicken teriyaki stir‑fry using soy sauce, ginger, and garlic, prefers pizza margherita
    and tacos for a quick bite but delights in trying new flavors at local food festivals.
  core: Mary Frazzetta, a structurally minded yet socially vibrant 13‑year‑old, habitually organizes her Minecraft inventory by color, hoards spare change for future bike upgrades, and never skips a soccer
    practice even when a lingering cold threatens to slow her down.
background:
  cultural: Mary Susan grows up in a predominantly white, middle‑class suburb of Lehigh Acres, a small community in Southwest Florida. Her family’s roots are Anglo‑American, and they celebrate typical U.S.
    holidays such as Thanksgiving, Christmas, and the Fourth of July. The warm, coastal climate influences her love for outdoor activities like beach outings, fishing trips, and community events such as
    the annual Lee County Fair. Local customs, a relaxed family‑centered lifestyle, and frequent participation in school and neighborhood gatherings have shaped her appreciation for community service and
    social interaction.
attributes:
  skills: '[''Project coordination'', ''Peer mediation'', ''Basic computer literacy'', ''Team sports (soccer)'', ''Time management'', ''Personal budgeting'', ''Community service organization'']'
