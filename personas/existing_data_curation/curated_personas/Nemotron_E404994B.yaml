  career_goals: Frank aims to progress from front‑line support to a supervisory role within the next three years, leveraging his calm leadership style to mentor new agents and improve team performance.
    He plans to obtain an associate’s degree in Business Management from a local community college to deepen his understanding of operations and analytics. Long‑term, he aspires to become a Customer Support
    Manager overseeing quality assurance and training programs, while maintaining a balanced work‑life schedule that allows him to stay engaged in his community and personal interests.
