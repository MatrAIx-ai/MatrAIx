  career_goals: Jonathan aims to become a regional sales manager within the next five years, leading a team of representatives across the Southeast and driving growth in sustainable manufacturing solutions.
    To support this, he plans to earn a Certified Professional Sales Leader (CPSL) credential and complete a supply‑chain management certification. In the longer term, he envisions launching his own boutique
    wholesale business that imports artisanal Mexican crafts and specialty foods, merging his cultural heritage with his sales expertise. He also seeks to mentor junior colleagues, fostering collaborative
    environments, and to integrate creative elements—such as curated art displays—into client engagements to differentiate his approach.
