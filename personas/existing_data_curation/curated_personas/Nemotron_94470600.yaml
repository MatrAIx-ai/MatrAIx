personas:
  professional: Jonathan Perezrivera is a B2B sales strategist in wholesale manufacturing who leverages their analytical acumen and artistic curiosity to craft visually compelling proposals, build consultative
    client relationships, and drive data‑driven pipeline management using Salesforce and Zoho, and they consistently inject creative storytelling into every pitch.
  sports: Jonathan Perezrivera is an avid hiker who trails the Appalachian foothills with the North Georgia Hiking Club, follows the Atlanta Falcons and Braves, and joins a weekend pickup basketball league,
    and they find solace in the rhythm of a steady stride as much as in the camaraderie of a quick game.
  arts: Jonathan Perezrivera is a solitary painter who draws inspiration from the rolling hills of North Georgia and traditional Mexican motifs, admires the bold colors of Frida Kahlo, listens to Los Lobos
    and Simon & Garfunkel while sketching, curates a modest collection of indie folk vinyls for private listening sessions, and they often experiment with mixed media to push visual boundaries.
  travel: Jonathan Perezrivera prefers meticulously planned road trips that blend adventure and cultural immersion, having explored Oaxaca’s historic streets, Napa Valley’s vineyards, and the Great Smoky
    Mountains, while dreaming of a quiet retreat in the Andalusian countryside, and they meticulously draft itineraries on a whiteboard to avoid last‑minute stress.
  culinary: Jonathan Perezrivera enjoys mastering authentic Mexican dishes such as mole poblano, tamales de elote, and chiles en nogada, sourcing heirloom chilies and cacao from local farmers’ markets,
    experimenting with fusion plating that pairs native Georgia herbs with traditional spices, and they often treat friends to elaborate dinner parties that double as informal tasting sessions.
  core: Jonathan Perezrivera is a creatively driven sales professional who balances disciplined finance with spontaneous art, occasional over‑indulgence in spicy cooking, and a habit of over‑packing for
    trips that never quite make the itinerary, and they constantly juggle these passions with a dash of end‑of‑day insomnia.
background:
  cultural: Jonathan was raised in a bicultural Mexican‑American household in Alto, Georgia. His parents emigrated from Veracruz, keeping Spanish as the home language and preserving traditions such as Día
    de los Muertos, family‑style meals, and Mexican folklore. While he embraces Southern hospitality and the close‑knit community values of Banks County, he maintains strong ties to his heritage through
    regular participation in Mexican festivals in Atlanta and annual trips to Veracruz to visit extended family. His bilingual ability allows him to communicate effectively with Mexican manufacturers and
    to mentor Spanish‑speaking youth in his volunteer work. This blended cultural lens informs his worldview, merging the warmth and collectivism of Mexican family life with the entrepreneurial spirit of
    the Southern United States.
