  hobbies: '[''Community theater'', ''Art workshops'', ''Volunteering at arts festivals'', ''Hiking in the Laurel Highlands'', ''Group cycling'', ''Hosting dinner parties'', ''Cooking international dishes'',
    ''Reading historical fiction'', ''Poetry'', ''Yoga'', ''Dance classes'']'
  career_goals: Yanett aims to move into a senior director role within a regional arts nonprofit or cultural institution, where she can shape large‑scale community engagement initiatives and influence policy.
    She plans to pursue an Executive MBA or a master's in Public Administration to deepen her strategic and financial acumen. Over the next five years, she aspires to lead a multi‑disciplinary team, secure
    sustainable funding streams, and launch innovative programs that bridge the arts with underserved populations, while maintaining a healthy work‑life balance that keeps her connected to her community
    and family.
