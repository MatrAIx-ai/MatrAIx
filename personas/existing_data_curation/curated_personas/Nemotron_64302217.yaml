personas:
  professional: Yanett Moss blends creative vision with data‑driven strategy as a senior program manager in a regional arts nonprofit, leveraging strengths in strategic planning, grant writing, budget oversight,
    and stakeholder communication while balancing curiosity‑driven innovation with practical fiscal stewardship.
  sports: Yanett Moss embraces an active lifestyle with weekend hikes in the Laurel Highlands, group rides with the Pittsburgh Cyclists Club, and yoga sessions, while cheering on the Steelers, Penguins,
    and Pirates and occasionally joining a local co‑ed indoor soccer league in the spring.
  arts: Yanett Moss energizes the local arts scene by acting in community theater productions, leading workshops at the Allegheny Arts Festival, and drawing inspiration from playwright August Wilson, poet
    Mary Oliver, and the musical storytelling of Lin‑Manuel Miranda, all of which shape their collaborative and assertive creative approach.
  travel: Yanett Moss favors a blend of planned weekend getaways to the Laurel Highlands and spontaneous urban escapes to cities like New York, Asheville, and Lisbon, while dreaming of a cultural immersion
    trip to Kyoto, balancing a moderate travel budget with a desire to explore diverse art and culinary traditions.
  culinary: Yanett Moss experiments with world‑inspired cuisine at dinner parties, mastering dishes such as Thai green curry, Moroccan tagine with preserved lemons, and Japanese ramen, favoring ingredients
    like saffron, cherimoya, and miso, yet occasionally over‑spices the food in their quest for bold flavors.
  core: Yanett Moss is a socially energized arts leader who fuses data‑driven pragmatism with creative curiosity, constantly juggling community projects, strategic fundraising, and eclectic cooking while
    sometimes sacrificing sleep for the next big initiative.
background:
  cultural: Yanett grew up in a middle‑class, predominantly white suburb of western Pennsylvania, where family traditions and community ties emphasized self‑reliance, modesty, and a deep appreciation for
    regional culture. Her ancestry includes mixed German, Irish, and Anglo‑American roots, contributing to a pragmatic outlook blended with a respect for artistic expression. Living in Oakdale, she is immersed
    in the vibrant cultural scene of the Greater Pittsburgh area, participating in its museums, music venues, and local festivals, while also valuing the close‑knit, cooperative spirit of her neighborhood.
