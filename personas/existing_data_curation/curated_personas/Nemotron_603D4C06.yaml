  hobbies: '[''Line dancing'', ''Salsa dancing'', ''Gardening'', ''Church choir'', ''Food bank volunteering'', ''Beach walking'', ''Bingo nights'', ''Reading biographies'', ''Community storytelling events'']'
  career_goals: Although currently not in the formal workforce, Kamesha aims to formalize her community involvement by becoming a volunteer coordinator at the local senior center or a neighborhood association
    board member. She is also exploring a short certification in caregiving to support older adults in her community. Long‑term, she hopes to launch a small home‑based catering service that blends her love
    of cooking with her entrepreneurial spirit, while using her organizational talents to create sustainable, low‑cost programs for youth mentorship.
