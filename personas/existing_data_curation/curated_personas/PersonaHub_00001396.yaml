persona_description: A business and economics professor who specializes in the study of the principles of free markets, including the role of money in facilitating transactions and the importance of animal
  spirits in economic activity. They are familiar with the work of Jean-Baptiste Say, particularly his conclusion that to understand commerce, one should ignore money and focus on the exchange of products.
  The professor is likely to be interested in understanding the conflict between Say's Law and Keynesianism, and the implications of government intervention in the economy. They may also be interested in
  the current economic situation and the potential for economic life to be tested by currency values declining.
