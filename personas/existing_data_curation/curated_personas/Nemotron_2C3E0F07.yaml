personas:
  professional: Miriam Damas is a seasoned IT support specialist with over two decades of experience troubleshooting hardware, software, and network issues, fluent in both English and Spanish, who is now
    pursuing CompTIA Network+ and Azure Fundamentals certifications to transition into a senior technical lead role while launching a community‑focused tech consultancy, yet occasionally lets spontaneous
    community projects push back her documentation deadlines.
  sports: Miriam Damas cheers for the Minnesota Timberwolves and the Green Bay Packers, joins a local hiking club for Saturday treks along the St. Croix River, and participates in casual Sunday soccer matches
    with friends from her dance group, balancing enthusiastic fandom with regular outdoor activity.
  arts: Miriam Damas is an avid salsa dancer who spins to classic salsa legends like Celia Cruz, strums acoustic guitar during quiet evenings, devours mystery novels by Agatha Christie and Tana French,
    and attends community theater productions, weaving music, dance, and storytelling into her social identity.
  travel: Miriam Damas prefers road‑trip adventures that blend planned stops at national parks such as Voyageurs and Badlands with spontaneous visits to local farmers’ markets, has journeyed to Oaxaca to
    study traditional mole recipes, and dreams of trekking Patagonia’s Patagonian steppe while balancing travel costs with her modest retirement savings.
  culinary: Miriam Damas delights in crafting mole poblano and tamales from scratch, growing fresh chilies, tomatoes, and zucchini in her garden, serving homemade salsa verde at potluck gatherings, and
    pairing her hearty dishes with grilled fish seasoned with cilantro and lime, indicating a skillful yet home‑grown culinary style.
  core: Miriam Damas blends methodical IT expertise with spontaneous salsa rhythms, balancing structured budgeting and health monitoring with occasional forgetfulness about keys, medication refills, and
    dental appointments.
background:
  cultural: Miriam was born to Mexican immigrant parents and grew up speaking both Spanish and English. She maintains strong ties to her heritage through celebrations of Día de los Muertos, Cinco de Mayo,
    and family reunions that feature traditional music and food. In Minnesota, she has blended Mexican customs with Midwestern values, participating in local community events and contributing to the state's
    Hispanic cultural association. Her bilingual ability and cultural fluency enable her to bridge gaps between the Mexican community and the broader Mora population, especially in her role as a tech support
    specialist where she assists both Spanish‑speaking and English‑speaking users. Miriam’s cultural background informs her collaborative approach, respect for familial connections, and passion for sharing
    knowledge.
attributes:
  skills: '["Hardware troubleshooting", "Software installation & configuration", "Network diagnostics", "Remote support tools (TeamViewer, LogMeIn)", "Ticketing system management (Jira Service Management,
    ServiceNow)", "User training and documentation", "Bilingual technical communication (Spanish/English)", "Basic cybersecurity awareness", "PC and peripheral setup"]'
  hobbies: '["Salsa dancing", "Cooking Mexican cuisine", "Hiking local trails", "Vegetable gardening", "Volunteering for digital literacy workshops", "Raspberry Pi tinkering & home automation", "Reading
    mystery novels", "Acoustic guitar playing", "Hosting community potlucks"]'
  career_goals: 'Looking ahead, Miriam aims to transition from a front‑line support role to a senior technical lead position where she can shape service processes and mentor junior staff. She plans to earn
    CompTIA Network+ and Microsoft Certified: Azure Fundamentals certifications within the next year, and eventually pursue a certification in cybersecurity (CompTIA Security+). Miriam also envisions launching
    a community‑focused tech consultancy that offers affordable IT support and digital literacy workshops for seniors and small businesses in Pine County. She hopes to spearhead a structured training program
    within her organization, improving documentation standards and response times, and to become an advocate for women and Hispanic professionals in the tech industry.'
