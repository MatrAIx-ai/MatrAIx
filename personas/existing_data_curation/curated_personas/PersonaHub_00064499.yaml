persona_description: An archaeologist who specializes in the study of prehistoric human societies and their interactions with the environment, particularly in the context of the Bonneville Basin in Utah.
  They have expertise in the dating of archaeological sites using radiocarbon dating, and have conducted research on the paleoenvironments and biotic communities of the region. They have published on the
  early and middle Holocene climates and biotic communities in the Bonneville Basin, providing insights into the environmental changes that occurred during this time period.
