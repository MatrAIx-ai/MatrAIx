  career_goals: Although retired from formal employment, Jugal aims to compile a memoir‑styled collection of poems and reflections that weaves together South Asian literary traditions and contemporary Western
    thought. He plans to mentor emerging artists in Redmond through informal workshops, curate small‑scale community art exhibitions, and create an oral‑history archive of elders from his cultural community.
    Continuing his personal growth, he hopes to learn a new visual technique—such as digital collage—and perhaps study a language like Persian to deepen his appreciation of poetic forms.
