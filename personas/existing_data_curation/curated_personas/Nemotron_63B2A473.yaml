  hobbies: '[''Hiking in the Columbia River Gorge'', ''Community gardening and container gardening'', ''Reading literary fiction and poetry'', ''Yoga and mindfulness meditation'', ''Knitting and sewing
    handcrafted items'', ''Farm‑to‑table cooking with seasonal produce'', ''Solving puzzles (crosswords, jigsaws)'', ''Volunteering at financial‑literacy workshops'', ''Attending indie music and folk festivals'',
    ''Participating in local book clubs'']'
  career_goals: Elly aims to become a certified public accountant (if she hasn't yet earned the designation) and progress to an audit manager or director of finance role within a mid‑size firm that values
    sustainability. Over the next five years, she plans to lead the integration of environmental, social, and governance (ESG) reporting for a Portland‑based organization, positioning her expertise at the
    intersection of finance and the region’s strong environmental ethic. She also aspires to launch a boutique consultancy that provides audit and financial advisory services to non‑profit arts and cultural
    institutions, leveraging her humanities background. Mentoring the next generation of women accountants, especially those seeking work‑life balance, remains a core ambition.
