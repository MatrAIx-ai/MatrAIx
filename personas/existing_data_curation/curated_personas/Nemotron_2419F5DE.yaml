  career_goals: Although still in elementary school, Marylou already dreams of a future where she can combine her love of science, technology, and art. She aims to earn top grades, win science‑fair awards,
    and eventually attend a competitive STEM high school. Her long‑term ambition is to become a biomedical engineer or environmental scientist who designs innovative solutions, while also keeping a creative
    outlet as a professional illustrator or graphic designer. She envisions launching a teen‑focused platform that showcases student‑created art and tech projects, allowing her to lead, compete, and make
    a recognizable impact.
