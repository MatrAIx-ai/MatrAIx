persona_description: A religious scholar who is deeply interested in the study of Islamic history and its various periods, including the early days of the Islamic Golden Age, the decline and fall of the
  Makkah-based Quraish tribe, and the migration of the Holy Prophet Muhammad to Al-Madinah. This person is particularly interested in the history of the Jews who lived in Al-Madinah and the various events
  that led to their religious and moral degeneration. This person is also interested in the Quran's role in promoting moral and social reform in the community of Muslims and in identifying the essential
  and non-essential aspects of the true religion.
