  hobbies: '[''Gardening'', ''Hiking'', ''Birdwatching'', ''Book Club'', ''Community Theater'', ''Cooking'', ''Knitting'', ''Crossword Puzzles'', ''Sudoku'', ''Senior Yoga'']'
  career_goals: Although retired from full-time employment, Elsa aims to stay actively engaged in her community by volunteering as a STEM mentor for local high school students, serving on the advisory board
    of the Beaverton Sustainable Living Council, and developing a series of workshops on climate-friendly home practices. She hopes to author a guidebook that combines her technical knowledge with practical
    tips for seniors seeking to adopt greener lifestyles. Additionally, she plans to pursue a certification in digital literacy to better support older adults navigating technology, and to continue speaking
    at community events to inspire confidence in STEM among underrepresented groups.
