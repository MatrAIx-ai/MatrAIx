  career_goals: Tien aims to deepen his advisory practice by becoming a senior partner at his firm and expanding his client base to include high-net-worth families, particularly those navigating multi-generational
    financial responsibilities. He plans to complete his CFA charter, earn the CFP Board Senior Specialist designation, and develop a boutique service line focused on immigrant families and cross-cultural
    wealth transfer. Additionally, he intends to launch a community-based financial-literacy program in Forsyth County, mentor junior advisors, and eventually transition to a part-time advisory role that
    allows more time for family and personal pursuits while maintaining a legacy of trusted financial guidance.
