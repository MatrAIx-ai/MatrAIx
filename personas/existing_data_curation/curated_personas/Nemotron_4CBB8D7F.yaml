  career_goals: Gary aims to turn his early experience into a full‑time career in accounting. In the next three to five years he plans to earn the Enrolled Agent (EA) certification and later pursue a Bachelor’s
    degree in Accounting, with the ultimate goal of becoming a Certified Public Accountant. He is drawn to the idea of running his own independent tax‑service practice in Medway, where he can offer flexible
    hours to small‑business owners and individuals. His competitive streak pushes him to be the top performer at his firm, while his curiosity drives him to stay current on tax law changes. He also hopes
    to develop better organizational habits to reduce stress and improve client satisfaction.
