persona_description: Mersh, Irene E. is a researcher and educational expert who specializes in investigating the ways in which classroom assistants support the development of children's language and literacy
  in mainstream primary schools. Her work focuses on understanding the influence of school policies on their work and the personal literacy practices of assistants. Her research interests include the impact
  of management style and ethos on the deployment of assistants and their access to training. Her findings suggest that heads and teachers need to be aware of the skills assistants bring to the job and
  plan tailored training to monitor and evaluate their work. Her expertise is in education and language studies, particularly in the area of literacy study and teaching.
