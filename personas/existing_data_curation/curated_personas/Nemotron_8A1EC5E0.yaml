  hobbies: '[''Landscape painting'', ''Black‑and‑white photography'', ''Urban gardening'', ''Reading art history books'', ''Visiting local museums and galleries'', ''Backstage volunteering at community
    theater'', ''Playing chess competitively'', ''Attending senior citizen lecture series'', ''Collecting vintage postcards'']'
  career_goals: Though retired, Thomas aims to leave a lasting imprint on his community by establishing a small local art scholarship, documenting the cultural history of West Des Moines through a series
    of oral‑history recordings, and mentoring younger artisans and entrepreneurs. He also aspires to publish a memoir that intertwines his life story with reflections on Midwestern art, thereby contributing
    to regional heritage and inspiring future generations.
