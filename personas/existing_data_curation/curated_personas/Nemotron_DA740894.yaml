personas:
  professional: Khaled Maisuria blends rigorous market research methodology with a charismatic, talkative style, structuring studies with statistical precision while leveraging their sociable network to
    translate complex data into actionable strategy for senior leaders, all while balancing a preference for predictable processes with a willingness to pivot when client demands shift.
  sports: Khaled Maisuria plays as a middle‑order batsman for the local cricket league, volunteers as a youth coach, and cheerfully roots for the Austin FC soccer team while occasionally attending Dallas
    Cowboys games, blending competitive spirit on the field with community‑building off it.
  arts: Khaled Maisuria enjoys attending live performances ranging from A.R. Rahman's orchestral concerts to local Texas folk music festivals, absconds to galleries featuring contemporary photography, and
    quotes favorite memoirs by Robert Caro, shaping their identity through a mix of global and regional artistic influences.
  travel: Khaled Maisuria alternates between frequent trips to family homes across India to explore regional markets and weekend getaways to the Hill Country wineries, while dreaming of a culinary tour
    of Morocco’s souks, balancing familial obligations with a thirst for new cultural experiences.
  culinary: Khaled Maisuria showcases culinary prowess by preparing aromatic biryani, smoky tandoori chicken, and crisp paneer tikka at gatherings, while also mastering Texas brisket rubs, preferring ingredients
    like cumin, turmeric, smoked paprika, and fresh cilantro, reflecting a fusion of heritage flavors and local barbecue.
  core: Khaled Maisuria is a structured yet spontaneously sociable market insights leader who competes fiercely, revels in cooking elaborate meals, and occasionally lets disorganization sneak into their
    otherwise disciplined life.
background:
  cultural: Khaled’s parents immigrated to the United States from the Indian state of Gujarat in the early 1990s. Raised in the Midwest and later settling in Franklin, Tennessee, he grew up bilingual, speaking
    Gujarati at home while navigating an English‑dominant school environment. He celebrates Diwali, Navratri, and other Indian festivals with his family, maintaining traditions such as sharing communal
    meals and participating in cultural performances. His upbringing emphasized the value of education, community service, and hospitality, which inform both his professional ethos and his active involvement
    in the local South Asian diaspora. While fully integrated into American life, he retains a strong connection to his heritage through language, cuisine, and cultural events.
attributes:
  skills: '[''Quantitative research design'', ''Survey methodology (Qualtrics, SurveyMonkey)'', ''Statistical analysis (SPSS, R, Excel)'', ''Data visualization (Tableau, PowerBI)'', ''Consumer insights
    generation'', ''Brand positioning strategy'', ''Digital marketing analytics'', ''Social media listening and sentiment analysis'', ''Stakeholder communication'', ''Presentation and storytelling'', ''Project
    management'', ''Cross‑cultural market analysis'', ''Competitive intelligence'', ''SQL query writing'', ''CRM data analysis'']'
  hobbies: '[''Cooking South Asian cuisine'', ''Playing and coaching cricket'', ''Hosting social dinner gatherings'', ''Attending networking and industry events'', ''Toastmasters public speaking'', ''Hiking
    in Tennessee state parks'', ''Landscape photography'', ''Reading business and leadership books'', ''Traveling (especially to India)'', ''Volunteering for cultural festivals'']'
  career_goals: Khaled aims to step into a senior leadership role such as Director of Market Insights or Vice President of Marketing, where he can shape the overall research agenda and integrate emerging
    AI‑driven analytics into the decision‑making process. He wants to become a recognized thought leader within the industry by publishing whitepapers, speaking at conferences, and mentoring the next generation
    of analysts. In the next five years, he plans to complete the Professional Researcher Certification (PRC) and earn a certification in advanced data science, positioning himself to launch a boutique
    consultancy that helps brands navigate the nuanced preferences of South Asian consumers in the United States while also contributing to community outreach programs that promote data literacy.
