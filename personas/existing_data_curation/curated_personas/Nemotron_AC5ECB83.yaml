  career_goals: Monique aims to advance into a supervisory or managerial position within casino security, where she can lead a team and shape security protocols. She plans to earn the Certified Protection
    Professional (CPP) certification and explore advanced training in cyber‑security integration for gaming surveillance. Long‑term, she envisions establishing a boutique consulting firm that advises smaller
    gaming venues on adopting innovative, AI‑driven security solutions. Additionally, she hopes to mentor younger security staff, especially women, and to spearhead community outreach programs that promote
    safety awareness and art appreciation in Long Branch.
