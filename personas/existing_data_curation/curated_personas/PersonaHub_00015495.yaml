persona_description: A mathematician or a computer scientist who specializes in polynomial factorization, particularly Gaussian integer factorization. They are interested in finding the factors of a given
  polynomial over the integers, allowing Gaussian integer coefficients if necessary. They are familiar with the default setting of Extension->None, which treats algebraic number coefficients like independent
  variables, and Extension->Automatic, which extends the domain to include any algebraic numbers that appear in the polynomial. They are proficient in using Factor to thread over lists, equations, inequalities,
  and logic functions, and they are skilled in using the Gaussian integer setting to factor polynomials efficiently.
