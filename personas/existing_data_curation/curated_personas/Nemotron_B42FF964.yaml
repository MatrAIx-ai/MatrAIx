  hobbies: '[''Painting'', ''Sketching'', ''Poetry composition'', ''Reading philosophy and abstract art theory'', ''Gardening'', ''Cooking traditional dishes'', ''Listening to bomba and plena music'', ''Participating
    in local cultural festivals'', ''Photography'', ''Stargazing'']'
  career_goals: Ruben’s career aspirations are rooted in his desire to give back to the Moca community while achieving personal artistic recognition. He hopes to establish a modest, free-access art studio
    or workshop space where he can teach painting, poetry, and digital illustration to local youth and seniors, thereby preserving and revitalizing the town’s cultural heritage. Over the next five years
    he aims to compile and self-publish a collection of poems titled 'Moca en Versos', which blends personal memory with the folklore of his hometown. He also plans to organize an annual Festival de la
    Imaginación, a community event that showcases local artists, musicians, and chefs, and to secure a small grant from the municipal cultural office to fund these initiatives. In parallel, Ruben intends
    to complete a GED program to formalize his education and enroll in a short-term certification in community arts coordination, believing that documented credentials will enhance his ability to attract
    funding and credibility. Ultimately, his ambition is to be recognized as a cultural steward who bridges imagination, discipline, and communal harmony.
