  hobbies: '[''Watercolor painting'', ''Quilting circles'', ''Book club (historical non-fiction)'', ''Volunteer work at historical society'', ''Birdwatching'', ''Gardening'', ''Cooking Southern meals'',
    ''Community theater costume design'', ''Playing bridge'', ''Senior line-dancing'']'
  career_goals: Although retired, Barbara aims to leave a lasting artistic legacy in Searcy. She plans to curate a traveling senior-artist exhibition that showcases works by local elders, and she hopes
    to secure a permanent senior art studio space at the community center. She also aspires to publish an illustrated family memoir that weaves together historical photographs, genealogy, and personal anecdotes,
    preserving Cleburne County’s heritage for future generations. Beyond personal projects, Barbara seeks to mentor younger volunteers, teaching them both artistic techniques and effective community-organizing
    skills, and she dreams of traveling each year to at least two major art museums—such as the Metropolitan Museum of Art in New York and the National Gallery of Art in Washington, D.C.—to broaden her
    artistic perspective.
