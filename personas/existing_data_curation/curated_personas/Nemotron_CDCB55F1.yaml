    ''Board game nights'', ''Journaling'', ''Mindfulness meditation'']'
  career_goals: Wendy aims to progress from her current role as a computer and information systems manager to a senior IT leadership position within the next five years, ideally overseeing digital transformation
    for a regional health-care network or a midsize manufacturing firm in central Pennsylvania. She plans to earn PMP and CISM certifications, deepen her expertise in cloud architecture, and develop a reputation
    for integrating technology with creative problem-solving. Long-term, she envisions launching a boutique consulting practice that helps small businesses adopt sustainable tech solutions while preserving
    the community’s cultural heritage.
