personas:
  professional: Wendy Goett is a budding information systems manager who blends a business degree with hands-on tech skills, steering agile and waterfall projects, scripting in Python, and designing user-centric
    interfaces while infusing her artistic eye into every system rollout.
  sports: Wendy Goett is a weekend hiker who tackles the Susquehanna Trail and joins the local Susquehanna Valley Trail Runners club for Saturday runs, roots for the Pittsburgh Steelers, and balances their
    fitness routine with occasional yoga classes at the community center, preferring low-impact cardio over competitive sports.
  arts: Wendy Goett is an avid acrylic painter who captures the fiery autumn foliage of the Susquehanna Valley, draws inspiration from the bold color palettes of Georgia O'Keeffe and the contemporary abstractions
    of Julie Mehretu, enjoys speculative fiction by N.K. Jemisin, and regularly attends productions at the Susquehanna Valley Repertory Theatre while listening to indie folk artists like Sufjan Stevens
    during creative sessions.
  travel: Wendy Goett prefers self-planned micro-adventures, often packing a DSLR and a sketchbook for weekend hikes through the Pennsylvania Wilds, has trekked the Appalachian Trail's segment in Pennsylvania,
    dreams of photographing the fall colors of Vermont's Green Mountains, and hopes to spend a spring weekend in Asheville, North Carolina, indulging in its art galleries and farm-to-table food scene.
  culinary: Wendy Goett is a self-taught sourdough baker who loves kneading rye and whole-wheat loaves with rosemary and sea salt, experiments with focaccia topped with caramelized onions and figs, and
    pairs their breads with locally sourced cheese and honey, while also enjoying the occasional apple-cinnamon crumble made with fresh orchard apples from a nearby farm.
  core: Wendy Goett is a 20-year-old tech-savvy artist who balances meticulous project plans with spontaneous paint splashes, over-thinks every budget line, and can't resist a midnight slice of sourdough
    while worrying about the next deadline.
background:
  cultural: Wendy grew up in a modest, middle-class family in the small towns surrounding Lock Haven, Pennsylvania. Her upbringing was shaped by the region’s strong community ties, a work ethic rooted in
    local manufacturing and agriculture, and a value placed on education and self-reliance. Family gatherings, local fairs, and church-related events fostered a sense of belonging and respect for tradition,
    while the nearby state parks and the Susquehanna River nurtured her love of nature. This blend of small-town stability, appreciation for the arts, and exposure to emerging technology at school influenced
    her balanced approach to both professional responsibilities and personal creativity.
