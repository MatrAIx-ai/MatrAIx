  hobbies: '[''Gardening'', ''Woodworking'', ''Chess'', ''Reading African American History'', ''Listening to Jazz and Soul Music'', ''Walking along the Riverwalk'', ''Volunteer tutoring at a senior center'']'
  career_goals: As a 74‑year‑old practitioner, Willie aims to continue contributing his expertise while shaping the next generation of therapy aides. He plans to obtain a certification in geriatric rehabilitation
    to enhance care for older adults, develop a structured fall‑prevention protocol for the senior center where he volunteers, and serve as a mentor to younger staff, sharing his practical knowledge and
    disciplined work ethic. Ultimately, he wishes to retire on his own terms, leaving a legacy of reliable, patient‑centered care in the Milwaukee community.
