persona_description: A human-centered learning experience designer who is passionate about creating powerful and impactful learning experiences that enable learners to reach their desired learning outcomes.
  This person is skilled in breaking down the learning experience into its core components - experience, design, and learning - and tailoring the design to meet the unique needs and preferences of their
  target audience. They are adept at understanding and empathizing with learners, and use this knowledge to design experiences that are engaging, interactive, and tailored to the specific learning needs
  of each individual. This person is also highly skilled in using a mix of creative, conceptual, intellectual, and analytical qualities to come up with elegant solutions that work, and is skilled in using
  a variety of design disciplines, including interaction design, user experience design, experience design, graphic design, and game design, to create engaging and effective learning experiences.
