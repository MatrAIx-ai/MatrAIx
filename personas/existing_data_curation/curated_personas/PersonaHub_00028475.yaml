persona_description: A distinguished university president with extensive experience in higher education, business, and community leadership. Dr. John Kelly is a well-respected figure in the South Carolina
  and Florida communities, having served as a vice president for economic development at Clemson University, where he oversaw a variety of South Carolina campuses and centers. He has also held leadership
  positions at other universities, including at the University of South Florida and the University of Florida. Dr. Kelly has a strong track record of innovation and leadership, having been named the university's
  seventh president at FAU in 2014.
