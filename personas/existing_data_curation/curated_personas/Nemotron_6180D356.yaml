personas:
  professional: Amaya George, a retired elementary school teacher, leverages their methodical lesson‑planning and culturally responsive pedagogy to orchestrate intergenerational storytelling and tech tutoring
    programs at the Tinley Park Senior Center, combining their organized, reliable nature with their sociable, energetic drive to build lasting community ties.
  sports: Amaya George stays active by leading a weekly senior walking club in Tinley Park, cheering on the Chicago White Sox during baseball season, and participating in a local pickleball league for seniors,
    balancing their love for community camaraderie with a practical routine that counters age‑related stiffness.
  arts: Amaya George enriches daily life by singing gospel renditions of Mahalia Jackson and soulful classics by Aretha Franklin in the church choir, quilting vibrant blankets inspired by the Gee's Bend
    tradition, and devouring historical novels by Isabel Wilkerson, weaving these artistic threads into their identity.
  travel: Amaya George prefers purposeful travel, planning short road trips to heritage sites like the Mississippi Delta and vibrant New Orleans jazz festivals, while also dreaming of a guided tour of Washington,
    D.C.’s botanical gardens, always balancing a limited senior budget with a desire for cultural immersion.
  culinary: Amaya George delights in cooking soulful meals such as collard greens seasoned with smoked ham hocks, fried catfish with cornmeal crust, and sweet potato pie spiced with nutmeg, and cultivates
    garden herbs like thyme and basil to enhance these dishes, showcasing a high‑skill yet heart‑warming culinary approach.
  core: Amaya George is a diligent, community‑oriented storyteller whose organized mind, vibrant creativity, and persistent worry drive a lifetime of teaching, gardening, and cultural preservation.
background:
  cultural: Amaya is a second‑generation African‑American who grew up in the South Side of Chicago during the 1950s and 60s, a period marked by the Great Migration’s cultural flourishing. Her parents were
    part of the wave of Southern farmers who moved north seeking industrial jobs, and they instilled in her a strong sense of community, church involvement, and the importance of education. The family’s
    roots in Mississippi’s Delta region are reflected in her love for soul food, gospel music, and oral storytelling traditions. Throughout her life, Amaya has been active in the African‑American church
    community, participating in civil‑rights commemorations, and supporting local cultural festivals such as the Chicago Black History Month Parade. In Tinley Park, she remains connected to her heritage
    through the local African‑American senior association, where she shares recipes, history, and mentorship with younger members.
