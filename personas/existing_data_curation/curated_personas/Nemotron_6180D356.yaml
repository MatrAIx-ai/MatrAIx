  career_goals: Although Amaya is no longer part of the formal workforce, she is driven to leave a lasting legacy through community service. Her primary ambition is to establish a sustainable intergenerational
    learning program at the Tinley Park Senior Center that pairs seniors with local middle‑school students for shared storytelling, tech tutoring, and cultural exchange. She hopes to secure a grant to fund
    the program’s curriculum and training materials, and eventually serve on the board of the local community foundation to advocate for elder‑focused educational initiatives. A personal goal is to author
    a memoir and a children’s picture book that weave together her family’s Great Migration history and the richness of African‑American oral tradition.
