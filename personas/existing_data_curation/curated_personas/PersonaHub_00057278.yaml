persona_description: A researcher interested in studying human behavior and attitudes, particularly in the context of online interactions and the prevalence of discriminatory attitudes. The person is curious
  about how people's online behavior differs from their reported values and attitudes in surveys, and is interested in testing hypotheses about social and geographical differences in honesty and the extent
  to which social factors influence how people respond in surveys. The person is also interested in understanding the extent to which discriminatory attitudes are widespread in different countries and how
  they may be influenced by factors such as education, income, and cultural and legal differences.
