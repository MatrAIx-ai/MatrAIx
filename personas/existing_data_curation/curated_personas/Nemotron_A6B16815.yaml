  hobbies: '[''Arduino and Raspberry Pi projects'', ''Fishing at Lake Tawakoni'', ''Hiking in Texas Hill Country'', ''Competitive online strategy gaming'', ''Sci‑fi film marathons'', ''Mindfulness meditation'',
    ''Journaling'', ''DIY home improvement'', ''Reading popular science articles'']'
  career_goals: David aims to channel his curiosity and practicality into a hybrid health‑tech career. Over the next few years he plans to earn a certification as a Biomedical Equipment Technician and complete
    a short‑term Health Informatics program, positioning himself for roles that blend technical repair with patient support. He envisions moving beyond frontline caregiving into a supervisory or specialist
    position where he can implement more efficient care protocols and integrate new health‑monitoring technologies. Long‑term, he hopes to launch a small consulting firm that offers personalized home‑care
    solutions equipped with smart devices, allowing him to stay competitive, keep learning, and achieve the financial stability that would ease his anxiety.
