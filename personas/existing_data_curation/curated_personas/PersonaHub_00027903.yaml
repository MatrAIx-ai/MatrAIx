persona_description: An archaeologist who specializes in the study of prehistoric settlements and their landscapes, particularly in the context of Scotland's Iron Age and early prehistory. This person is
  interested in understanding the continuity and change in settlement patterns over time and the significance of the inherited landscape in shaping these patterns. They are also familiar with comparative
  approaches and the character of mid-late Bronze Age settlement compared to that of the Iron Age, and seek to explore the regional patterns of different periods.
