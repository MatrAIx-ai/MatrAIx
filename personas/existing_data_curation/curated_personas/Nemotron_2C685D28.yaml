personas:
  professional: David Cavanaugh, a seasoned airline transport pilot, blends meticulous technical expertise with a sociable, assertive leadership style to run pre‑flight briefings, safety drills, and crew
    coordination, while their curiosity about emerging aviation tech drives them to push toward electric propulsion integration, and they routinely mentor junior pilots on these advancements.
  sports: David Cavanaugh devotes weekends to fly‑fishing on the Yellowstone River, organizes deer and elk hunts with the Bozeman Hunting Association, snowmobiles across Montana’s backcountry in winter,
    coaches the Billings Youth Baseball League, and cheers for the Montana Grizzlies football and the Denver Broncos NFL team, and they eagerly follow the Billings Mustangs minor‑league baseball schedule.
  arts: David Cavanaugh channels their sociable nature into acoustic guitar sessions at community barn dances, often covering John Prine, Neil Young, and local folk singer Cody Hampson, while their meticulous
    hobby of building and flying radio‑controlled model aircraft reflects a blend of engineering precision and artistic craftsmanship, and they regularly perform at town festivals.
  travel: David Cavanaugh prefers meticulously planned road trips that pair adventure with family time, having trekked the Glacier National Park loop, fished the Kenai River in Alaska, and plotted a future
    kayaking expedition to Patagonia, while balancing a limited vacation budget with the desire for occasional high‑altitude ski weekends in the Canadian Rockies, and they often draft detailed itineraries
    months in advance.
  culinary: David Cavanaugh enjoys grilling elk steaks seasoned with rosemary and juniper, pan‑searing locally caught trout with lemon‑dill butter, and topping bison burgers with caramelized onions and
    huckleberry jam, showcasing solid intermediate cooking skills and a love for Montana’s wild game and native berries, and they often pair these meals with a robust, locally brewed stout.
  core: David Cavanaugh is a methodical but gregarious aviator who balances a high‑stress cockpit career with a love for Montana’s outdoors, community music, and an ever‑present worry that fuels meticulous
    planning, and they often find themselves double‑checking every checklist even at home.
background:
  cultural: David grew up in a middle‑American, white family with deep roots in the rural Midwest, later moving to Miles City, Montana, where he embraced the strong sense of community, self‑reliance, and
    respect for the outdoors that define the region. His family heritage traces back to Irish and English ancestors, and he was raised with values of hard work, punctuality, and modesty, reinforced by a
    Protestant upbringing that emphasized service and stewardship. The local ranching and farming culture taught him the importance of practical problem‑solving, while the close‑knit town environment fostered
    his outgoing, sociable personality. These influences shape his respect for tradition, his dedication to community involvement, and his openness to integrating new ideas within a grounded, practical
    framework.
attributes:
  skills: '["Multi‑Engine Pilot","Instrument Rating","Commercial Pilot Certificate","Airline Transport Pilot (ATP)","Advanced Flight Planning","Aircraft Systems Diagnostics","Airframe & Powerplant Knowledge","Safety
