  hobbies: '["Fly fishing on the Yellowstone River","Deer and elk hunting expeditions","Snowmobiling in the Montana backcountry","Volunteering at regional airshows","Building and flying radio‑controlled
    model aircraft","Playing acoustic guitar at community gatherings","Coaching youth baseball","Organizing group hikes","Cooking barbecue for friends and family","Participating in Civil Air Patrol community
    service"]'
  career_goals: David aims to transition from his current regional airline role to a captain position within the next three years, leveraging his extensive flight experience to earn a senior leadership
    role in flight operations. He plans to obtain a certified flight instructor (CFI) rating to mentor junior pilots, eventually moving into a flight operations manager or safety officer role where he can
    shape safety culture and integrate emerging aviation technologies, such as electric propulsion and advanced avionics, into the fleet. His long‑term ambition includes establishing a boutique charter
    service that serves remote communities in Montana, combining his practical problem‑solving mindset with his curiosity about new aviation models.
