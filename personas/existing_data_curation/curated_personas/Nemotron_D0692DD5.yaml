personas:
  professional: Marisleydis Cruz, a veteran civil and mechanical engineer turned interdisciplinary design consultant, merges advanced CAD/BIM expertise with a vivid artistic sensibility to lead community‑focused
    sustainable art installations while mentoring emerging engineers with a charismatic, organized yet flexible approach.
  sports: Marisleydis Cruz enjoys Saturday morning hikes with the Ventura Trails Association, cheers on the Los Angeles Dodgers and LA Galaxy, participates in a local seniors’ walking club, and joins weekly
    salsa‑dance cardio sessions that double as low‑impact exercise, keeping her active year‑round.
  arts: Marisleydis Cruz finds inspiration in the murals of Diego Rivera, the magical realism of Gabriel García Márquez, and the music of Lila Downs, spends afternoons crafting ceramics and painting oil
    canvases that echo Día de los Muertos colors, and regularly performs acoustic guitar renditions of José José at community theater fundraisers.
  travel: Marisleydis Cruz plans relaxed yet purposeful trips, favoring weekend drives along the Pacific Coast Highway to explore coastal art festivals, annual pilgrimages to Oaxaca for Day of the Dead
    celebrations, and occasional adventurous hikes in Yosemite, all while budgeting carefully to accommodate family gatherings.
  culinary: Marisleydis Cruz, an adept home cook, specializes in mole poblano, chiles en nogada, and homemade tamales using heirloom corn masa, cultivates nopal and Mexican oregano in her garden, and enjoys
    pairing her dishes with fresh avocado salsa and a splash of mezcal during family gatherings.
  core: Marisleydis Cruz blends engineering precision with bold artistic flair, mentors youthful creators, hikes with a paint‑splattered grin, and can’t resist a late‑night taco bite after a long day of
    sketching.
background:
  cultural: Marisleydis is a first‑generation Mexican‑American whose family arrived in California during the 1960s. Raised in a close‑knit immigrant community, she grew up bilingual, celebrating Día de
    los Muertos, quinceañeras, and other Mexican traditions while also embracing the broader American culture of Southern California. Her cultural identity influences her artistic style—favoring vibrant
    colors, folkloric motifs, and community‑focused projects—and fuels her commitment to mentoring Mexican‑heritage youth in STEM fields.
