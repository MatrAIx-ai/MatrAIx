  career_goals: As she approaches retirement, Marisleydis aims to transition into a consulting and mentorship role, guiding collaborative projects that integrate engineering with public art and community
    sustainability. She envisions launching a series of environmentally‑friendly art installations in Simi Valley, establishing a local interdisciplinary design studio, and authoring a guidebook on blending
    technical rigor with artistic imagination. Additionally, she seeks to serve on the board of a cultural heritage organization to preserve Mexican‑American artistic traditions in Southern California.
