  hobbies: '[''Community Gardening'', ''Bridge Club'', ''Senior Fitness Classes'', ''Historical Society Volunteering'', ''Reading Historical Biographies'', ''Knitting'', ''Digital Photography'']'
  career_goals: Although retired from formal employment, Alexis aims to mentor emerging entrepreneurs in Prescott and serve on the board of a local economic‑development non‑profit. She hopes to author a
    guidebook on practical financial stewardship for small businesses and senior citizens, and to volunteer as a tax‑preparation advisor for low‑income families. Her ambition is to leave a lasting legacy
    of practical knowledge and community empowerment while maintaining a structured schedule that balances her personal well‑being.
