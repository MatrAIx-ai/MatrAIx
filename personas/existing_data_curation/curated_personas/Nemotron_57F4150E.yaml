personas:
  professional: Alexis Hochstein, a retired corporate finance strategist and former regional retail manager, leverages 35 years of expertise in budgeting, risk assessment, and cross-functional team coordination
    to mentor budding entrepreneurs in Prescott, channeling her methodical planning and assertive yet compassionate style into community-focused workshops and board service.
  sports: Alexis Hochstein participates in the Prescott Senior Fitness Club’s low-impact cardio sessions, enjoys weekly walks along the Prescott Lakes trail, and is an avid supporter of the Arizona Diamondbacks
    and Phoenix Suns, cheering them from her favorite seat at the stadium whenever she can catch a game.
  arts: Alexis Hochstein captures the stark beauty of the Arizona high desert with a digital camera, studies the works of Georgia O'Keeffe for compositional inspiration, listens to Bob Dylan and Willie
    Nelson while knitting intricate patterns inspired by Megan Kennedy, and devours historical biographies by David McCullough in quiet evenings.
  travel: Alexis Hochstein favors meticulously planned road trips across the Southwest, has toured Sedona, the Grand Canyon, and Santa Fe on organized senior tours, dreams of visiting Kyoto during cherry
    blossom season, and routinely adds new destinations to her detailed travel ledger.
  culinary: Alexis Hochstein enjoys cooking southwestern dishes such as green chile enchiladas and nopales salad, favors fresh cilantro, cumin, and prickly pear for flavor, can whip up a praiseworthy prickly
    pear sorbet for community potlucks, but occasionally forgets to refrigerate leftovers, leading to mild food-safety anxieties.
  core: Alexis Hochstein is a meticulous yet vivacious 69-year-old who balances a regimented schedule of community service, garden stewardship, and endless curiosity, all while secretly hoarding discount
    coupons and worrying about every detail.
background:
  cultural: Alexis is a White American who grew up in the Midwest before relocating to Arizona after retirement. Her upbringing emphasized self‑reliance, community involvement, and a strong work ethic,
    values that continue to shape her interactions in Prescott. She maintains traditions of seasonal family gatherings, celebrates American holidays with a focus on community charity drives, and integrates
    local Southwestern cultural elements into her gardening and outdoor pursuits.
attributes:
