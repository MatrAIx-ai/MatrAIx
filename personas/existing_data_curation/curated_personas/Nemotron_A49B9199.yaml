  career_goals: Edward aims to transition into a senior technical architect role where he can shape the strategic direction of enterprise software platforms, particularly focusing on integrating cloud-native
    and AI-enabled solutions that improve community services in the Chicago metro area. He is passionate about mentoring the next generation of developers, planning to formalize a mentorship program within
    his company and to volunteer as an instructor at a local community college coding bootcamp. Over the next five years, he envisions speaking at regional tech meetups, contributing to open-source projects
    that prioritize accessibility, and eventually scaling back direct coding work to focus on thought leadership and advisory capacities that allow more time for family and personal well-being.
