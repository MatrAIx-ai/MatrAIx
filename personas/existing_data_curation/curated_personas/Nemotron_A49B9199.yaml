personas:
  professional: Edward Sommer is a veteran full‑stack software engineer who leverages their three decades of Python, Java, and JavaScript expertise, a data‑driven mindset, and an eye for UI/UX inspired
    by art‑gallery visits to design scalable microservice architectures on AWS and Azure, while mentoring junior developers and steering agile ceremonies toward a future senior technical architect role.
  sports: Edward Sommer cycles with the Chicago Bike Club every Saturday, hikes the Des Plaines River Forest Preserve regularly, cheers for the Chicago Cubs at Wrigley Field during summer, and follows the
    Chicago Bulls, balancing a love for low‑impact endurance activities with a fan’s enthusiasm for the city’s professional teams.
  arts: Edward Sommer frequents the Art Institute of Chicago and local galleries to sketch contemporary exhibitions, strums acoustic guitar in a folk ensemble covering Bob Dylan and Joni Mitchell, volunteers
    in community theater as a supporting actor in productions of “Our Town,” and draws inspiration from musicians like Leonard Cohen and visual artists such as Georgia O’Keeffe.
  travel: Edward Sommer prefers thoughtfully planned road trips that blend cultural immersion and family time, having recently explored the historic districts of Savannah, Georgia, the culinary markets
    of Oaxaca, Mexico, and the art‑rich streets of Florence, Italy, while keeping future itineraries focused on Midwest lakefront retreats and occasional weekend getaways to the Door County peninsula.
  culinary: Edward Sommer experiments with world cuisines in the kitchen, mastering dishes such as Thai green curry with lemongrass, Spanish paella with saffron, and Ethiopian injera paired with berbere‑spiced
    stews, often sourcing fresh herbs from the local farmers’ market and inviting their spouse and adult children to taste‑test each new creation.
  core: Edward Sommer blends a tech‑savvy, art‑infused mind with a worry‑prone yet generous spirit, balancing a high‑level software career, active community mentorship, and a lively family life filled with
    music, cooking, and weekend adventures.
background:
  cultural: Edward grew up in the Chicago suburbs of Cook County, raised in a family of German-Irish ancestry that valued hard work, modesty, and community service. The cultural fabric of Woodridge and
    neighboring Will County - characterized by a blend of Midwestern hospitality, seasonal outdoor recreation, and a growing tech scene - shaped his worldview. He celebrates classic American holidays with
    traditional meals, while also embracing the diverse culinary influences of the region. The proximity to Chicago's world-class museums and music venues sparked his lifelong appreciation for visual and
    performing arts. Edward's cultural identity is rooted in the Midwestern ethic of collaboration and consensus, which informs his cooperative nature at work and his dedication to mentoring and volunteering
    within his local community.
