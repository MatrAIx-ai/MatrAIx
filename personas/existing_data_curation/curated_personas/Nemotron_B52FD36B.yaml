personas:
  professional: Melvin Johnson, a budding three-year-old future engineer who spends hours building towering block structures, showcases emerging spatial reasoning and a spontaneous, unstructured approach
    to problem solving; they often scatter blocks in a burst of creative energy.
  sports: Melvin Johnson, a playful three-year-old who thrives on tumble-time at the local YMCA toddler gymnastics class, dabbles in the Little Sprouts Soccer Club, and cheers for the Seattle Seahawks and
    Seattle Mariners on game days, yet they prefer spontaneous play over rigid drills.
  arts: Melvin Johnson, an enthusiastic three-year-old who spends afternoons drawing with Crayola crayons while humming Disney's 'Let It Go' by Kristen Anderson-Lopez and watching Sesame Street's Elmo,
    and they let these artistic influences shape their budding creative identity.
  travel: Melvin Johnson, a curious three-year-old who loves spontaneous family trips to the city zoo, weekend beach days at Santa Monica, and dreams of seeing the Eiffel Tower, yet they often feel overwhelmed
    in new places and cling to a favorite stuffed animal for comfort.
  culinary: Melvin Johnson, a selective three-year-old who adores cheesy macaroni, sweet banana slices, and crunchy carrot sticks, proudly helps stir pancake batter with a tiny wooden spoon, but they frequently
    refuse green vegetables unless they’re cut into fun shapes.
  core: Melvin Johnson, a three-year-old whirlwind of curiosity, artistic wonder, and intense emotions, they balance fierce emotional highs with impulsive, unstructured play, often leaving a trail of crayons
    and wonder in their wake.
background:
  cultural: Melvin grows up in a Black family in Hattiesburg, Mississippi, where Southern traditions, church gatherings, and community celebrations play a central role. His household often sings gospel
    and R&B songs, cooks soul food like fried chicken, collard greens, and biscuits, and shares stories about local civil‑rights history. He participates in preschool programs that incorporate music, rhythm,
    and visual arts, and his family encourages pride in African‑American heritage and Southern culture.
