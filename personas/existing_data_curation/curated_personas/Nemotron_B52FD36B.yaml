  career_goals: Although still a toddler, Melvin often talks about wanting to be a painter who uses bright colors, a superhero who helps friends, or a musician who makes people smile. His aspirations revolve
    around creative expression and caring for others, reflecting his compassionate yet self‑assertive nature.
