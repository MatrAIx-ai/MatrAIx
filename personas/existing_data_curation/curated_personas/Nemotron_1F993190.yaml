  hobbies: '[''Crayon drawing and coloring'', ''Watercolor painting'', ''Block building and sorting'', ''Sing‑along and clapping games'', "Dancing to children''s music", ''Nature walks and insect searching'',
    ''Reading picture books'', ''Pretend play with stuffed animals'', ''Helping with simple cooking tasks'', ''Storytelling and retelling'']'
  career_goals: Shirley often talks about growing up as a 'nice teacher' who paints pictures for her class, or as a 'doctor for animals' who helps puppies and kittens. She imagines organizing a colorful
    classroom where every child has a spot for their supplies, and she looks forward to learning more about science, art, and caring for living things. Her ambitions blend her curiosity about the world,
    her love of art, and her natural inclination to keep things neat and well‑planned.
