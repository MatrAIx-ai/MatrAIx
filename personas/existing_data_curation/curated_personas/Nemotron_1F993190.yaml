personas:
  professional: A budding preschool explorer named Shirley Varney delights in organizing storytime circles, methodically arranging crayons and picture books, and using her natural curiosity and reliability
    to guide classmates through imaginative adventures.
  sports: Shirley Varney cheers enthusiastically for the Atlanta Braves and the Georgia Bulldogs while joining her preschool’s tiny t‑ball league, proudly wearing a little baseball cap and practicing running
    drills on the community park’s grass field each Saturday.
  arts: Shirley Varney brightens church sing‑alongs with her enthusiastic renditions of gospel classics like ‘Amazing Grace’ and country hits by Dolly Parton, while also folding origami cranes and splashing
    watercolors during her preschool’s arts hour, shaping her identity through music and crafty expression.
  travel: Shirley Varney loves family road trips to the peach orchards in nearby Dooly County and the sandy shores of Tybee Island, dreaming of a future visit to Disney World’s Magic Kingdom where she plans
    to ride ‘It’s a Small World’ and sample churros.
  culinary: Shirley Varney adores buttery biscuits drenched in honey, crispy fried chicken, and fresh strawberry tarts, often helping her mother stir mashed potatoes with a wooden spoon and proudly declaring
    peas as her favorite green veggie.
  core: Shirley Varney is a curious, orderly three‑year‑old who balances a love for glittery stickers and gospel sing‑alongs with an uncanny ability to keep her crayons perfectly aligned, even if it means
    pausing playtime to reorganize.
background:
  cultural: Shirley is raised in a white, Southern‑American family in Dublin, Georgia. Her household reflects typical Southern values such as hospitality, respect for elders, and a close connection to the
    church. She attends a local preschool that emphasizes community, arts, and outdoor play, and she often participates in church‑based children’s programs and county‑fair events. Family gatherings feature
    Southern cuisine like fried chicken, biscuits, and fresh‑picked berries, and Sunday afternoons are spent listening to gospel and country music. This cultural setting nurtures her curiosity about nature,
    storytelling, and creative expression, while also reinforcing a sense of order and reliability.
attributes:
  skills: '[''Color identification'', ''Basic counting (1-10)'', ''Fine‑motor drawing and coloring'', ''Block stacking and sorting by shape/size'', ''Following daily routines'', ''Short‑sequence memory
