  career_goals: She aspires to study graphic design or visual communication at a California state university, with an eye toward using her artistic talents to promote cultural appreciation. Long‑term, she
    hopes to work as a museum educator or community art program coordinator, creating inclusive exhibitions that celebrate Mexican heritage. She also dreams of launching a small freelance studio offering
    illustration and branding services for local businesses, allowing her flexible schedule and creative freedom. Additionally, she envisions further training in art therapy to combine her kindness and
    artistic skills to support youth mental health.
