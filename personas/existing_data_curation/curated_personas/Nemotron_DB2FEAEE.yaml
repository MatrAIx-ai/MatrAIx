personas:
  professional: Gina Lopezbaez, an aspiring graphic design student, blends digital illustration expertise with bilingual communication to craft culturally resonant visual projects, yet they often procrastinate
    on deadlines, relying on last‑minute creative improvisation.
  sports: Gina Lopezbaez, an avid surfer, catches early morning waves at Malibu and hikes the cliffs of Palos Verdes on weekends, while cheering for the Los Angeles Lakers and joining a local beach volleyball
    league to balance competitive spirit with laid‑back fitness.
  arts: Gina Lopezbaez, a dedicated contemporary art aficionado, frequents the Broad and MOCA, sketches street scenes inspired by Edward Hopper and Banksy, and creates digital illustrations while listening
    to indie folk duo The Lumineers and Latin‑alternative group Café Tacvba, merging visual and auditory inspiration.
  travel: Gina Lopezbaez, a spontaneous traveler, favors loosely planned weekend road trips to coastal towns like Santa Barbara and culturally rich cities such as Barcelona, balancing school responsibilities
    with surf sessions and mural spotting, and dreams of backpacking through the Andes when finances permit.
  culinary: Gina Lopezbaez, a culinary enthusiast, spends Sundays mastering tamales and mole with their grandmother while also experimenting with avocado toast topped with pickled radish and fresh cilantro,
    blending traditional family recipes with contemporary food trends.
  core: Gina Lopezbaez lives at the intersection of sketchbooks, surfboards, and cultural curiosity, juggling artistic ambition, laid‑back spontaneity, and a habit of procrastinating until inspiration strikes.
background:
  cultural: Gina was born and raised in Torrance to Mexican immigrant parents. She grew up speaking Spanish at home and celebrating traditional customs such as Día de los Muertos, quinceañeras, and religious
    festivals. Her family maintains strong ties to Mexican culinary traditions, which she helps preserve by cooking with her abuela. Living in a diverse Southern California community, she blends Mexican
    heritage with American influences, attending bilingual church services and participating in local Mexican‑American cultural events. Her Mexican background informs her artistic sensibility, from vibrant
    color palettes to storytelling motifs, and fuels her desire to share her culture through visual arts.
