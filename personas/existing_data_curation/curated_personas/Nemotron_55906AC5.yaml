  hobbies: '[''hiking'', ''reading historical fiction'', ''gardening'', ''live music attendance'', ''vintage film photography'', ''volunteering at library art programs'', ''community theater improv'', ''journal
    writing'', ''mindfulness meditation'', ''watercolor painting'']'
  career_goals: She aims to open a nonprofit community art hub in Exeter that offers free photography workshops for seniors and youth, publishes a photo book that documents the changing landscapes of rural
    New England, and becomes a sought‑after visual storyteller for regional publications. Gloria also plans to mentor a cohort of under‑represented photographers, secure a grant to develop a mental‑health‑focused
    photography therapy program, and eventually transition into a curatorial role at the local historical society, where she can blend her love for history, education, and visual art.
