personas:
  professional: Natalia Ellis is a veteran security and fire alarm systems installer whose 15-year track record of interpreting electrical schematics, programming access-control units, and ensuring NFPA
    72 compliance is powered by a methodical, structure-loving mindset that translates into meticulous documentation, on-time project scheduling, and a mentorship focus on empowering women in the trades.
  sports: Natalia Ellis stays active through early-morning bird-watching walks in Okefenokee Swamp, supports the Atlanta Braves and the local Hazlehurst High School track team, and participates in a community
    walking club that meets twice a week for low-impact cardio.
  arts: Natalia Ellis nourishes her creative spirit by devouring classic mystery novels by Agatha Christie and Dorothy L. Sayers, crocheting intricate blankets inspired by folk art, attending performances
    at the Hazlehurst Community Theatre, and listening to fiddle-driven bluegrass from Alison Krauss while quilting.
  travel: Natalia Ellis prefers meticulously planned weekend road trips to natural retreats like the Blue Ridge Parkway and historic Savannah, enjoys occasional bird-watching excursions to the Everglades,
    and dreams of a summer pilgrimage to the English countryside that inspired the settings of her beloved mystery novels.
  culinary: Natalia Ellis favors farm-to-table cooking, regularly preparing dishes such as peach-glazed chicken, roasted heirloom tomatoes with fresh basil, and zucchini bread using produce harvested from
    her garden, and she delights in adding aromatic herbs like thyme and rosemary to elevate simple Southern meals.
  core: Natalia Ellis blends disciplined precision at work with a solitary love for puzzles, gardening, and community service, turning methodical habits into a quietly ambitious life.
background:
  cultural: Natalia grew up in Hazlehurst, a close‑knit town in Appling County, Georgia. Her family traces its roots to Anglo‑American and German ancestors who settled in the South during the early 20th century.
    The community’s Southern hospitality, strong work ethic, and emphasis on self‑reliance shaped her values. She attended a local Baptist church where she participated in small Bible‑study groups and community
    service, reinforcing her cooperative and harmonious disposition. Local traditions such as the annual Peach Festival, church potlucks, and a deep respect for the natural landscape of the Lowcountry continue
    to influence her lifestyle and sense of belonging.
attributes:
  skills: '["Electrical wiring and low-voltage installation", "Fire alarm system design and installation", "Security system programming and maintenance", "NFPA 72 code compliance", "Blueprint and schematic
    interpretation", "System troubleshooting and diagnostics", "Customer service and communication", "Project scheduling and documentation", "Hand and power tool proficiency", "Basic home automation integration
    (Z‑Wave, Zigbee)", "Safety and emergency response protocols", "First aid and CPR certification"]'
  hobbies: '["Vegetable gardening and peach orchard care", "Reading classic mystery novels", "Crossword and Sudoku puzzles", "Quilting and crocheting", "Bird‑watching walks in Okefenokee Swamp", "Volunteer
    work at local food bank", "Small group Bible‑study sessions", "Attending community festivals (e.g., Peach Festival)", "Cooking Southern comfort food", "DIY home improvement projects"]'
  career_goals: She aims to achieve NICET Level III certification and become a lead technician or supervisor within her company, eventually opening her own boutique security‑and‑fire‑safety consulting firm
    serving small businesses and churches in rural Georgia. She is motivated to mentor new installers, especially women, and to stay current with emerging smart‑home integration technologies. In the next
    five years she plans to complete the NFPA‑72 Advanced Fire Alarm Systems course, expand her service offerings to include integrated video surveillance, and develop a reputation as a trusted safety consultant
    for community institutions.
