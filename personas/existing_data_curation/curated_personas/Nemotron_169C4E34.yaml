personas:
  professional: Norma Wong, a 22‑year‑old health technologist in Silicon Valley, blends meticulous device troubleshooting and EHR documentation with an artist’s eye for detail, and they are actively pursuing
    CBET certification and an associate degree in clinical laboratory science so they can design more intuitive medical device interfaces and mentor future techs.
  sports: Norma Wong finds stress relief on Saturday hikes through the Santa Cruz Mountains, they belong to a local weekend cycling club that explores the coastal trail, they occasionally join intramural
    ultimate frisbee games, and they root for the San Jose Sharks and the San Jose Earthquakes with a modest collection of team apparel.
  arts: Norma Wong spends weekday evenings sketching downtown San Jose skylines, experimenting with Procreate to illustrate futuristic health‑tech concepts, they curate indie playlists featuring Mitski,
    Mac DeMarco, and Phoebe Bridgers, and they regularly attend exhibitions at the San Jose Museum of Art, especially installations by Yayoi Kusama and contemporary photographer Carrie Mae Weems.
  travel: Norma Wong enjoys weekend getaways to Napa Valley’s vineyards and the rugged cliffs of Big Sur, they plan trips using budget airlines like Southwest and book boutique Airbnbs near local art districts,
    and they dream of a spring immersion in Kyoto’s temples and tea houses to study traditional design aesthetics.
  culinary: Norma Wong—an avid coffee‑shop hopper—relishes a perfectly brewed pour‑over at Blue Bottle, pairs it with avocado toast sprinkled with feta and chili flakes, they indulge in sushi rolls such
    as spicy tuna and California during lunch, and they experiment with making bibimbap at home, though their busy schedule often leaves the rice a bit under‑cooked.
  core: Norma Wong is a detail‑obsessed health technologist who counters chronic worry with art, yoga, and coffee‑fuelled creativity, while they juggle a modest budget and big‑picture tech ambitions.
background:
  cultural: Norma grew up in a middle‑class white family in the San Jose suburbs, where the multicultural tapestry of the Bay Area was a daily presence. While her household maintained traditional American
    holidays and values, the diverse neighborhoods exposed her to Asian, Latinx, and other cultural influences, shaping her appreciation for varied artistic expressions and cuisines. The tech‑centric environment
    of Silicon Valley fostered a pragmatic, innovative mindset, while her family's emphasis on community involvement nurtured her cooperative and considerate nature. This blend of local cultural diversity
    and the region’s forward‑thinking spirit informs her worldview and personal interests.
