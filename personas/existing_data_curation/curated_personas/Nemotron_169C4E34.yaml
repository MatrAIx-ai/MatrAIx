  hobbies: '[''Sketching and urban drawing'', ''Visiting art galleries and museums'', ''Digital illustration and graphic design'', ''Playing ukulele'', ''Curating indie music playlists'', ''Yoga and mindfulness
    meditation'', ''Hiking in the Santa Cruz Mountains'', ''Volunteering at community health fairs'', ''Reading science‑fiction literature'', ''Exploring specialty coffee shops'']'
  career_goals: Norma aims to advance from her current technician role to a certified clinical laboratory technologist within the next three years, pursuing an associate degree in clinical laboratory science.
    She is interested in specializing in biomedical equipment engineering, possibly earning certifications such as Certified Biomedical Equipment Technician (CBET). Long‑term, she hopes to combine her technical
    expertise with her passion for design by contributing to user‑friendly medical device interfaces or health‑tech startups in Silicon Valley. She also wants to develop stress‑management strategies and
    eventually mentor new entrants in the field, especially those who share her artistic sensibility.
