personas:
  professional: Angel Clayton, a 70‑year‑old volunteer coordinator at the Washington County senior center, blends meticulous budgeting, desert‑garden expertise, and compassionate mentorship to run structured
    support circles while flexibly adapting to participants' changing needs, and they assert themselves when advocating for seniors’ resources despite a generally reserved nature.
  sports: Angel Clayton enjoys leisurely hikes along Saint George's red‑rock trails, participates in the local senior walking club, and they watch the Utah Jazz and the University of Utah basketball team
    on TV while they practice gentle yoga in morning routines to maintain flexibility.
  arts: Angel Clayton spends afternoons knitting and quilting traditional patterns, listens to folk legends like Woody Guthrie, Pete Seeger, and early American ballads by The Carter Family while journaling,
    and they read historical fiction by Ken Follett and memoirs by Maya Angelou, weaving these artistic threads into their daily life.
  travel: Angel Clayton favors short, well‑planned road trips to nearby wonders such as Zion National Park, Bryce Canyon, and the Grand Staircase‑Escalante, they have taken a senior‑group cruise to the
    Pacific Northwest, and they dream of returning to Sedona’s red‑rock vistas for a quiet photography retreat.
  culinary: Angel Clayton delights in preparing desert‑friendly meals like grilled zucchini with prickly‑pear salsa, lemon‑herb roasted chicken, homemade pine‑nut pesto, and they occasionally bake simple
    sourdough loaves using heirloom wheat flour, pairing meals with peppermint tea and fresh figs.
  core: Angel Clayton is a methodical yet adaptable 70‑year‑old desert gardener, quilt enthusiast, and community mentor who balances meticulous budgeting with occasional indulgences, they navigate anxiety
    through journaling, and they thrive on quiet, nature‑filled routines despite a tendency to forget appointments.
background:
  cultural: Angel was raised in the post‑war American West, growing up in a modest, middle‑class family in the Intermountain region. The community’s strong emphasis on self‑reliance, church participation,
    and stewardship of the arid landscape shaped her values. The longstanding presence of the Church of Jesus Christ of Latter‑day Saints in Saint George instilled a cultural emphasis on family, service,
    and modest living, though Angel’s personal practice blends this with broader American traditions of independence and respect for nature. Her cultural identity is rooted in mid‑century Western values,
    community cohesion, and an appreciation for the desert’s beauty.
