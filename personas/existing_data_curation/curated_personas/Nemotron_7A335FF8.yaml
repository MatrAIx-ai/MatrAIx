  career_goals: Angel’s ambition is to remain an active, independent member of her community while nurturing her emotional wellbeing. She wants to mentor younger volunteers at the local senior center, contribute
    oral histories to the Washington County historical society, and eventually compile her own memoirs. Additionally, she aims to establish a weekly support circle for seniors dealing with anxiety, incorporating
    mindfulness and gentle exercise. Maintaining a daily routine that balances physical activity, creative work, and social connection is a central goal.
