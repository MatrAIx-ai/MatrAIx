personas:
  professional: Brian Samson, a 20-year-old parking attendant at Stoneboro municipal lot, leverages their methodical nature, strong customer-service skills and knack for schedule-management to keep ticketing
    efficient, ensure safety protocols, and mentor new attendants, all while pursuing a shift-supervisor promotion that will let them blend compassionate leadership with operational precision.
  sports: Brian Samson anchors the local Stoneboro Slam Dunkers basketball team as point guard, rallies behind the Cleveland Cavaliers and Ohio State Buckeyes, joins the Lake Mercy anglers’ club for weekend
    bass fishing, and participates in the volunteer fire department’s charity 5K supporting the Stoneboro Firefighters Association, and they stay physically fit through regular workouts at the community
    gym.
  arts: Brian Samson’s evenings often feature classic-rock karaoke at the Rusty Nail, where they belt out Led Zeppelin’s 'Whole Lotta Love', while they also enjoy vinyl sessions of The Rolling Stones, AC DC,
    and The Who, and regularly attend the town’s community theater productions like 'Our Town' during the annual fair.
  travel: Brian Samson prefers detailed itineraries for road trips, having explored the Great Lakes shoreline, taken a weekend escape to Niagara Falls, and camped in Yellowstone National Park, while they
    dream of a spring music pilgrimage to Nashville and a budget-friendly backpacking tour through Spain once savings allow.
  culinary: Brian Samson delights in cooking hearty meals such as beef chili with garden-grown tomatoes, smoked pork ribs seasoned with brown sugar and paprika, and pan-seared trout caught on lake trips,
    using a cast-iron skillet and fresh herbs like rosemary and thyme, often sharing these dishes at family gatherings and community potlucks, and they take pride in pairing meals with classic rock playlists.
  core: Brian Samson blends a love for routine, community service, and classic-rock karaoke into a methodical yet outgoing lifestyle, balancing disciplined work habits with a quirky penchant for car restoration
    and garden-fresh cooking, and they occasionally skip self-care in favor of helping others.
background:
  cultural: Brian grew up in a middle‑class white family in Stoneboro, a small town in Mercer County, Pennsylvania. His heritage is rooted in the region’s German‑Irish and other Northern European ancestry,
    and his upbringing emphasized practicality, hard work, and community involvement. He celebrates typical American holidays and local traditions such as county fairs, high‑school football games, and church
    gatherings. The close‑knit nature of his town fostered a strong sense of neighborly responsibility, shaping his compassionate and cooperative outlook while reinforcing a preference for routine, reliability,
    and modesty in both personal and professional life.
attributes:
  skills: '[''Customer service'', ''Cash handling'', ''Ticketing and POS operation'', ''Parking lot coordination'', ''Time management'', ''Organization and scheduling'', ''Conflict resolution'', ''Safety
