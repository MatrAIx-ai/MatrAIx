  hobbies: '[''Playing basketball in a local league'', ''Volunteering at community food bank'', ''Gardening'', ''Car restoration projects'', ''Fishing trips'', ''Cooking and sharing meals'', ''Listening
    to classic rock'', ''Karaoke with friends'', ''Participating in town’s annual fair'', ''Volunteer fire department events'']'
  career_goals: Brian aims to complete his associate degree in Business Administration and advance within the parking and facilities management field. His short‑term goal is to become a shift supervisor,
    overseeing a team of attendants while improving customer experience and operational efficiency. In the longer term, he aspires to a facility manager or operations manager role in a municipal or private
    parking organization, where he can apply his methodical planning and compassionate leadership to create safe, well‑organized environments. He also entertains the idea of eventually launching a community‑focused
    parking service that supports local events and supports small businesses in Stoneboro.
