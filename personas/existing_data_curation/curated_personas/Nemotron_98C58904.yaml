  hobbies: '[''reading science-fiction and popular science'', ''digital art and manga illustration'', ''playing piano and Korean folk music'', ''gardening'', ''cooking Korean dishes'', ''journaling and
    guided meditation'', ''nature walks'', ''online robotics club'', ''volunteering at library tutoring program'']'
  career_goals: She aims to pursue a career in biomedical engineering or health technology, where she can blend her curiosity about science with a practical, methodical approach. In the short term, she
    plans to obtain her GED, attend community college courses in biology and computer science, and secure an internship at a local medical device company. Long‑term, she dreams of contributing to the development
    of affordable health‑monitoring devices that can serve underserved communities, including those in her hometown of Union, MO. She also hopes to serve as a mentor for other young people from similar
    cultural backgrounds, encouraging them to balance academic ambition with mental well‑being.
