personas:
  professional: Soyoung Chinsee is an aspiring biomedical engineer who blends a love of science‑fiction narratives with hands‑on robotics, leveraging Python programming and meticulous note‑taking to prototype
    low‑cost health‑monitoring devices; they often double‑check every schematic before sharing it with mentors, and their organized, methodical nature drives them to schedule daily research sessions despite
    occasional worry about outcomes.
  sports: Soyoung Chinsee stays fit by jogging along the nearby Kincaid Lake Trail each weekend and drills with the Union Youth Soccer Club during the spring, while cheering on the St. Louis Cardinals and
    the Kansas City Chiefs on game days; they balance a love of outdoor activity with a modest membership at the local community center’s swimming pool, though they occasionally skip a workout when exam
    stress spikes.
  arts: Soyoung Chinsee cultivates a vibrant creative outlet through manga‑style digital illustrations inspired by Hayao Miyazaki and Studio Ghibli, while practicing piano pieces by Yiruma and the folk
    melody 'Arirang' on the gayageum; they regularly follow the Twitter feeds of artists like Kei and share fan‑art on DeviantArt, and their methodical approach to sketching mirrors their scientific curiosity,
    though they sometimes procrastinate on finishing a piece because they get lost in research.
  travel: Soyoung Chinsee prefers meticulously planned weekend getaways, often mapping out visits to nearby attractions like the St. Louis Gateway Arch and the Ozark National Forest before saving for a
    dream solo trip to Tokyo, where they hope to explore Akihabara’s tech shops and the historic Senso‑ji temple; they balance a modest budget with a love of cultural immersion, and they occasionally day‑dream
    about a backpacking trek through the European Alps as a future adventure.
  culinary: Soyoung Chinsee enjoys moderate‑level cooking, mastering family recipes such as kimchi (fermented napa cabbage with gochujang, daikon, and fish sauce) and bibimbap (rice topped with seasoned
    vegetables, bulgogi, a fried egg, and an extra‑spicy gochujang sauce); they experiment with variations like adding quinoa or tofu, often documenting the process on a personal blog while listening to
    K‑pop playlists, though they sometimes over‑salt dishes when stressed.
  core: Soyoung Chinsee is a detail‑driven 16‑year‑old who mixes scientific curiosity with artistic flair, juggling a careful budget, anxiety‑focused self‑care, and a habit of over‑planning every hobby,
    yet they occasionally let worry stall their creative flow.
background:
  cultural: Soyoung is a second‑generation Korean‑American whose family maintains strong ties to Korean cultural traditions while also integrating into the Midwestern United States. At home, Korean is spoken
    alongside English, and she celebrates holidays such as Seollal and Chuseok with traditional foods and rituals. Her parents emphasize education, respect for elders, and community responsibility, which
    has shaped her organized and cooperative nature. Living in Union, Missouri, she participates in local cultural festivals and Korean community events, balancing the values of her heritage with the practical,
    community‑oriented lifestyle of her hometown.
