  hobbies: '["Reading (non-fiction, natural history, anthropology)", "Solo Hiking and Birdwatching", "Landscape Photography", "Traditional Dena''ina Beadwork", "Wood Carving", "Cooking Native Dishes", "Herb
    Gardening", "Learning Dena''ina Language"]'
  career_goals: Margarita aims to leverage her reliable performance and competitive drive to advance into a supervisory role within retail, such as assistant store manager, and eventually become a store
    manager. She plans to complete a retail management certification program offered by a local community college to formalize her expertise. Long‑term, she envisions opening a small home‑based boutique
    that sells handcrafted items inspired by her Dena'ina heritage, combining her business acumen with cultural preservation. She also hopes to mentor younger Alaska Native employees, helping them navigate
    retail careers and retain cultural connections.
