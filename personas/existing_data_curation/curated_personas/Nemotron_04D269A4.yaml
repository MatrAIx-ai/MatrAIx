  hobbies: '[''Photography'', ''Visiting art galleries and museums'', ''Chinese calligraphy'', ''Tai Chi'', ''DIY electronics and 3D printing'', ''Open‑source coding projects'', ''Hiking in the Santa Cruz
    Mountains'', ''Cooking fusion Chinese‑Californian dishes'', ''STEM outreach and mentorship'']'
  career_goals: Xi aims to become a department head or curriculum coordinator within his district, leading the integration of STEAM curricula across schools. He plans to pursue a doctoral degree in education
    leadership to influence policy on STEM equity, especially for underrepresented East Asian and minority students. Over the next five years, he envisions launching a community partnership program with
    Silicon Valley tech firms to provide mentorship and internship pathways for his students, authoring a textbook on interdisciplinary science teaching, and eventually moving into school administration
    as a principal to shape a culture of curiosity and high achievement.
