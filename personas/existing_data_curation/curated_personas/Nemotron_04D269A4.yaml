personas:
  professional: Xi Le is a highly organized secondary-school STEM teacher who leverages deep expertise in physics, mathematics, and computer science to design project-based STEAM curricula, integrating
    robotics kits, 3D printed prototypes, and open-source coding tools while fostering cross-cultural collaboration and mentoring students for science competitions.
  sports: Xi Le enjoys weekend hikes in the Santa Cruz Mountains and is a devoted fan of the Golden State Warriors, occasionally playing pick-up basketball at the community center and following the San
    Jose Earthquakes for a dash of local soccer excitement.
  arts: Xi Le spends free afternoons exploring contemporary galleries such as the San Francisco Museum of Modern Art, practicing traditional calligraphy, and photographing urban landscapes, drawing inspiration
    from artists like Ai Weiwei and Takashi Murakami to infuse visual storytelling into their lesson plans.
  travel: Xi Le meticulously plans trips with detailed itineraries, having trekked the Redwood forest, visited the tech hubs of Tokyo and Seoul for professional exchanges, and dreaming of future hikes in
    Patagonia, while balancing limited vacation days with family commitments during Lunar New Year.
  culinary: Xi Le loves cooking inventive fusion dishes like mapo tofu tacos and miso ramen with avocado, expertly balancing Sichuan peppercorn heat with fresh Californian herbs, and they often experiment
    with sous vide techniques while occasionally ordering dim sum for a quick lunch break.
  core: Xi Le is a curious, ultra-organized educator who blends science with art, stays calm under pressure, embraces mindful traditions, and quietly indulges in quirky hobbies like 3D printing tiny robots
    for classroom demos.
background:
  cultural: Xi Le grew up in a Chinese‑American household in the Bay Area, where Confucian values of education, respect for elders, and communal responsibility were interwoven with the progressive, multicultural
    ethos of California. Bilingual in English and Mandarin, he celebrates Lunar New Year and Mid‑Autumn Festival with his family, while also participating in the broader community's multicultural events.
    These cultural influences reinforce his dedication to academic excellence, collaborative learning, and fostering cross‑cultural understanding among his students.
