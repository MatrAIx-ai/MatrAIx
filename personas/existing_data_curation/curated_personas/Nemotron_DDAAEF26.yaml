  career_goals: Melisa dreams of turning her love of art into a career. She hopes to attend a specialized art summer camp and eventually study visual arts or illustration at a university. Her long-term
    ambition is to become a concept artist or graphic novelist, creating images and stories that inspire others. Inspired by her own worries about stress, she also wants to use her artwork to raise awareness
