  career_goals: Bok aims to advance to a regional director of operations role within the next five years, overseeing multiple hospitals or health systems. He seeks to spearhead digital transformation initiatives
    such as telehealth integration and AI‑driven patient flow optimization to improve care quality and operational efficiency. To deepen his strategic expertise, he plans to pursue a graduate certificate
    in Health Care Management and possibly an MBA. Additionally, he wishes to mentor emerging healthcare managers, fostering a collaborative culture that balances innovation with patient‑centered care.
