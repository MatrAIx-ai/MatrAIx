personas:
  professional: Bok Yang, a seasoned medical services manager, leverages strategic planning, budget oversight, and data‑driven decision making to pilot incremental digital transformation initiatives while
    balancing pragmatic curiosity with a relaxed, flexible work style that tolerates occasional disorganization.
  sports: Bok Yang cycles the Brandywine River Trail as a member of the Philadelphia Cycling Club, roots for the Philadelphia Eagles, Phillies, and Flyers, and hikes the Appalachian foothills in autumn,
    combining competitive fandom with a relaxed fitness routine that values flexibility over strict regimens.
  arts: Bok Yang practices calligraphy inspired by ancient brushwork, photographs urban street scenes in a style reminiscent of Vivian Maier, devours mystery novels by Tana French, and enjoys live performances
    by The Roots and Brad Mehldau, weaving these artistic pursuits into a reflective personal rhythm.
  travel: Bok Yang enjoys weekend getaways to Amish Country and historic New Hope, dreams of spring immersion in Kyoto’s temples, a summer trek through Taiwan’s Taroko Gorge, and an autumn culinary tour
    of the Italian Alps, always planning with a flexible itinerary that leaves room for spontaneous detours.
  culinary: Bok Yang’s kitchen is a laboratory where gochujang‑marinated pork meets Pennsylvania Dutch apple butter, producing signature dishes like kimchi‑sauerkraut stew and bulgogi‑filled pretzel rolls,
    while they relish sourcing fresh herbs from local farmers’ markets and experimenting with fermented radishes and rye flour.
  core: Bok Yang blends pragmatic curiosity with a relaxed, occasionally chaotic schedule, juggling hospital operations, fusion cooking, spontaneous weekend rides, and a habit of leaving half‑finished calligraphy
    sheets on the fridge as reminders of unfinished creative projects.
background:
  cultural: Bok’s family traces its roots to the Jiangsu province of China, where he was born before emigrating to the United States as a child. Raised in a bilingual household, he is fluent in Mandarin
    and English, and he maintains cultural traditions such as Lunar New Year celebrations and filial respect. Living in Swarthmore, PA, he blends his heritage with the local community, participating in
    multicultural events and contributing to neighborhood initiatives. His East Asian upbringing instilled a strong respect for education, collective well‑being, and perseverance, which inform his collaborative
    leadership style and his commitment to improving health outcomes for diverse populations.
