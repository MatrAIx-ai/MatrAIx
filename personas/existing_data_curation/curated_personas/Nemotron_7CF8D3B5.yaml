personas:
  professional: Katina Fleming, a 25-year-old visual artist and community organizer in Joliet, merges traditional oil and acrylic painting with digital illustration while applying her practical, structure-oriented
    mindset and talkative, sociable nature to coordinate mural projects, lead inclusive art workshops, and amplify events through energetic social-media storytelling.
  sports: Katina Fleming maintains a balanced fitness routine that centers on yoga classes at Mindful Movement Studio and weekly 5K runs with the Joliet Runners Club, while enthusiastically cheering for
    the Chicago Cubs and Chicago Bulls during the baseball and basketball seasons, embodying her sociable yet structured approach to staying active.
  arts: Katina Fleming draws artistic inspiration from the vibrant street murals of Banks, the mixed-media narratives of Kara Walker, and the lyrical poetry of Ocean Vuong, regularly attending local open-studio
    events and curating collaborative exhibitions that blend visual art with wellness practices.
  travel: Katina Fleming prefers thoughtfully planned weekend trips to Midwestern cultural hotspots such as Chicago's West Loop galleries, the historic streets of Galena, and Detroit's mural districts,
    yet harbors a dream of immersive stays in New Orleans' French Quarter and Santa Fe's Pueblo art scene.
  culinary: Katina Fleming, an avid home cook, delights in seasonal farm-to-table dishes like roasted beet and goat-cheese salad, corn-crusted salmon with fresh herb butter, and a fragrant autumn squash
    soup, often featuring locally sourced heirloom tomatoes, kale, and smoked paprika.
  core: Katina Fleming is a structured yet gregarious visual artist who channels her meticulous project management skills into community murals while juggling a lingering worry about grant funding and an
    unstoppable habit of late-night sketching sessions.
background:
  cultural: Katina grew up in a suburban Midwestern environment in Joliet, Illinois, shaped by the region's pragmatic work ethic and strong sense of community. Her family, of European descent with Irish
    and German roots, emphasized modesty, reliability, and the value of contributing to local causes. This cultural backdrop fostered her appreciation for public art as a means of community building and
    reinforced her preference for structured, goal‑oriented projects. The Midwest's seasonal rhythms and accessible public spaces have inspired her landscape sketches and community mural themes, while local
    festivals and arts fairs have provided early exposure to collaborative artistic endeavors.
