  hobbies: '[''attending art meet-ups'', ''yoga and mindfulness meditation'', ''reading contemporary fiction and poetry'', ''urban photography'', ''cooking seasonal recipes'', ''hosting dinner gatherings'',
    ''volunteering as art instructor'', ''exploring historic neighborhoods'']'
  career_goals: Katina aims to establish a community‑focused art studio in Joliet that serves as a hub for local artists, youth art programs, and public mural initiatives. She aspires to secure a regular
    grant or fellowship that provides financial stability while allowing her to pursue large‑scale public art commissions. In the next five years, she hopes to have at least three permanent murals displayed
    in the city, a curated solo exhibition at a regional gallery, and a growing roster of workshops that blend art with wellness practices. Long‑term, Katina envisions taking a leadership role on the Will
    County Arts Council, leveraging her organizational strengths to shape public arts policy and expand access to arts education for underserved populations.
