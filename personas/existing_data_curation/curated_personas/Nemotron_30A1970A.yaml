  career_goals: While still in elementary school, Olga already envisions a future where she can combine her love of science, nature, and helping people. She hopes to become a wildlife biologist or an environmental
    scientist who studies local Appalachian ecosystems and works on conservation projects, because this lets her explore questions while making a practical impact. She also considers a career in community
    health, such as a pediatric nurse or health educator, where she can use her empathy and first‑aid knowledge to support friends and neighbors. To prepare, she aims to excel in science class, join the
    school’s science club, earn a 4‑H badge in wildlife, and volunteer at the nearby animal shelter. She wants a steady, purposeful job that offers hands‑on problem solving and a clear contribution to her
    community, which helps ease the worries she sometimes feels about the future.
