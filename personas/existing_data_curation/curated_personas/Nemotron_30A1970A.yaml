personas:
  professional: A budding junior coder and LEGO architect, Olga Key channels her curiosity and practicality into designing simple Scratch games while her spontaneous streak often leaves her project files
    a bit chaotic and deadlines a blur.
  sports: An enthusiastic member of the Mount Carmel Youth Soccer Club, Olga Key roots for the Pittsburgh Steelers in fall football and the Pittsburgh Penguins in winter hockey, balancing structured team
    practices with spontaneous weekend hikes along the Susquehanna River, though she sometimes forgets to bring water and ends up dehydrated.
  arts: A creative soul who devours fantasy novels by J.K. Rowling, sketches river scenes while listening to Imagine Dragons, and lifts her voice in the church choir performing classic hymns and occasional
    renditions of ‘A Whole New World’ from Disney’s Aladdin, Olga Key finds artistic expression a vital outlet.
  travel: A curious explorer who favors weekend nature getaways, Olga Key has trekked the Shenandoah trail, marveled at Washington D.C.'s museums on a school field trip, and dreams of camping in the Great
    Smoky Mountains, though she must budget her allowance and coordinate with family schedules.
  culinary: A budding kitchen helper, Olga Key loves scooping a spoonful of the spicy Mount Carmel Chili Festival stew, munching homemade mac‑and‑cheese with extra cheddar, and occasionally baking apple
    pie with a pinch of cinnamon, proudly using fresh basil from the community garden she tends.
  core: Olga Key is a bright, worry‑prone eleven‑year‑old who blends imaginative building with a habit of losing track of deadlines, often trading a spare moment of journaling for a quick LEGO burst.
background:
  cultural: Olga comes from a family of mixed Eastern European (Polish and Irish) ancestry, typical of the Northumberland County area. Growing up in the small, close‑knit town of Mount Carmel, she is shaped
    by the region’s Appalachian heritage, which values hard work, modesty, community solidarity, and a strong emphasis on education despite the town’s shift from coal‑mining to service‑oriented jobs. Her
    family celebrates national holidays such as Thanksgiving and Christmas and takes part in local traditions like the annual Mount Carmel Chili Festival. They attend a nearby Catholic church where community
    service and simple family meals are highlighted. This cultural mix informs her practical outlook, appreciation for stable community life, and curiosity about the natural environment.
