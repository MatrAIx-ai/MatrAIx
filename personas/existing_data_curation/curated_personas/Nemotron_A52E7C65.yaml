personas:
  professional: Mitzi Smith, a 26‑year‑old elementary teacher with a graduate focus on curriculum design, leverages meticulous lesson planning, data‑driven assessment, and their outgoing leadership style
    to drive instructional improvement while competitively eyeing the Teacher of the Year award.
  sports: Mitzi Smith, an avid runner with the Rochester Canal Trail Running Club, logs weekly 5‑10 k runs, cheers for the Rochester Red Wings baseball team, and participates in seasonal pickup soccer games
    at local community fields.
  arts: Mitzi Smith, a volunteer theater coach at a nearby elementary school, delights in directing student productions of "Peter Pan" and "The Wizard of Oz," attends the Lilac Festival concerts featuring
    folk artist Gregory Alan Isakov, and hosts competitive board game nights featuring Catan and Ticket to Ride.
  travel: Mitzi Smith, a planner‑oriented traveler, prefers weekend getaways to the Finger Lakes wineries and the Adirondack Hiking Trail, meticulously books affordable Airbnb stays, and dreams of a cultural
    immersion trip to Dublin to explore its historic libraries.
  culinary: Mitzi Smith, a detail‑oriented baker, loves perfecting blueberry lemon muffins, crafting sourdough bread using garden‑grown rosemary, and experimenting with seasonal vegetable ratatouille, while
    often over‑seasoning dishes in their quest for culinary precision.
  core: Mitzi Smith blends meticulous organization with sociable energy, channeling competitive drive into teaching excellence while managing anxiety through mindfulness, baking, and community involvement.
background:
  cultural: Mitzi grew up in a middle‑class white family in upstate New York, shaped by the Rochester community and broader Mid‑Atlantic American traditions. Her family emphasizes hard work, education,
    and community involvement, reflecting the region’s historic focus on industrial innovation and civic engagement. She participated in local customs such as the annual Lilac Festival, supported the Rochester
    Red Wings baseball team, and engaged in community service projects organized by churches and civic groups. These experiences fostered a practical outlook, respect for structured community events, and
    a strong sense of local identity.
attributes:
  skills: '[''Classroom management'', ''Lesson planning and curriculum design'', ''Differentiated instruction'', ''Data-driven assessment'', ''Educational technology integration'', ''Student records management'',
