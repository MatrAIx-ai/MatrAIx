    management and project planning'']'
  hobbies: '[''Running club'', ''After-school theater volunteering'', ''Baking'', ''Gardening'', ''Mindfulness meditation and journaling'', ''Reading educational psychology and self-help books'', ''Attending
    local music festivals'', ''Board game nights'']'
  career_goals: Mitzi aims to become a lead teacher or instructional coach within the next three years, using her organizational strengths to mentor new educators and drive school‑wide instructional improvements.
    She plans to pursue a Master’s in Educational Leadership to qualify for an assistant principal position. Long term, she aspires to influence district policies on mental‑health support for students and
    teachers, developing structured programs that address anxiety and emotional well‑being. She also seeks recognition for teaching excellence, targeting the New York State Teacher of the Year award and
    creating a specialized literacy intervention program for struggling readers.
