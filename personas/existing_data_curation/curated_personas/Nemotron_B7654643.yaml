  hobbies: '[''soccer'', ''LEGO building'', ''reading adventure books'', ''collecting trading cards'', ''playing board games (Connect Four, Checkers)'', ''Boy Scouts activities'', ''bike riding'']'
  career_goals: Eric dreams of a future where he can combine his love for order and teamwork. He is fascinated by firefighters because the job requires clear routines, teamwork, and helping the community,
    and he imagines himself wearing the uniform one day. He also talks about becoming a construction engineer, building structures with precision and following detailed plans. In school, he aspires to be
    class president so he can organize events and lead his peers, reflecting his competitive drive and desire for reliable leadership.
