personas:
  professional: Eric Perry treats school group projects like miniature ventures, using detailed checklists and a competitive drive to ensure the team delivers on time, often volunteering to be the designated
    coordinator for LEGO‑based science fair displays, and they proudly log each milestone in a bright notebook.
  sports: Eric Perry charges onto the soccer field with the local youth club Northside Rangers, idolizing Lionel Messi, while also joining the neighborhood bike club for weekend rides along the familiar
    tree‑lined loop, never misses the early‑morning warm‑up drills that his coach insists on, and they relish the routine of counting goals scored after each practice.
  arts: Eric Perry immerses himself in the world of LEGO artistry and Magic Tree House adventures, often reenacting scenes from Mary Pope Osborne’s books with his bricks, while humming The Wiggles’ tunes
    during playtime, proudly displays his rare Pokémon trading cards like miniature gallery pieces, and they love arranging the cards by rarity to satisfy their need for order.
  travel: Eric Perry prefers structured trips, packing a checklist for each outing, whether it’s a weekend camping excursion with the Boy Scouts at Grove Creek State Park or a family visit to the regional
    science museum, dreams of exploring historic European castles once school field trips expand, and they map out each route on a paper map before setting off.
  culinary: Eric Perry loves pepperoni pizza with extra cheese, delights in crafting mini‑sandwiches of peanut butter, jelly, and sliced banana, proudly helps whisk spaghetti sauce with tomatoes, garlic,
    and oregano, yet often sneaks extra chocolate chips into cookie dough when no adult watches, and they claim the secret ingredient is a pinch of imagination.
  core: Eric Perry blends a competitive spark with a love for routine, turning every game, LEGO set, and bike ride into a meticulously planned adventure, though they sometimes grow overly suspicious of
    new friends and hoard the last slice of pizza.
background:
  cultural: Eric is a white American child raised in the suburban community of Gainesville, Virginia, within Prince William County. His family reflects typical middle‑class suburban values, emphasizing
    punctuality, responsibility, and community involvement. He celebrates mainstream American holidays such as Thanksgiving, Independence Day, and Christmas, and participates in local traditions like neighborhood
    block parties and school events. He attends a public elementary school that offers a balanced curriculum of core academics and extracurriculars, exposing him to a diverse peer group while maintaining
    a familiar cultural environment. Media consumption includes family‑friendly cartoons, adventure books, and sports broadcasts, reinforcing a blend of American cultural norms and a focus on teamwork and
    structured activities.
attributes:
  skills: '[''following daily routines'', ''organizing personal belongings'', ''basic reading comprehension'', ''elementary arithmetic'', ''solving logic puzzles'', ''team sports fundamentals (soccer)'',
