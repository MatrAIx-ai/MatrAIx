  professional: Brendon Speakman is an aspiring young engineer who spends weekends building complex LEGO machines with moving gears, programs simple Scratch games to test strategic logic, and they approach
    each project with a blend of curiosity and pragmatic problem‑solving, often documenting progress in a tidy notebook while challenging friends to improve their designs.
  sports: Brendon Speakman is a midfield striker for the Midtown Tigers U‑11 soccer team, practices drills after school, idolizes players like Lionel Messi and Christian Pulisic, follows the Premier League
    and USMNT matches, and they supplement on‑field training with weekend bike rides on the local Greenway Trail to boost endurance.
  arts: Brendon Speakman devotes free time to reading sci‑fi series such as Ender's Game and The Maze Runner, watches the animated adventures of My Hero Academia, admires the LEGO‑inspired creativity of
    YouTube creator JANGBRiCKS, and they listen to pop‑rock tracks by Imagine Dragons and the upbeat tunes of BTS while sketching futuristic vehicle designs.
  travel: Brendon Speakman enjoys family road trips to national parks like Yellowstone, has explored the interactive exhibits at the Smithsonian’s National Air and Space Museum, dreams of visiting the LEGO
    House in Billund, Denmark, and they prefer itineraries that blend outdoor bike trails with opportunities to collect limited‑edition action figures at conventions.
  culinary: Brendon Speakman favors classic kid‑friendly foods such as pepperoni pizza, chicken nuggets, and spaghetti with marinara, enjoys crafting banana‑blueberry smoothies with spinach for a hidden
    veggie boost, and they occasionally attempt simple recipes like microwave mug cakes, though they often over‑season with ketchup and honey mustard.
  core: Brendon Speakman is a competitively curious 10‑year‑old who balances meticulous LEGO engineering with fast‑paced gaming, trades action figures like a mini‑entrepreneur, and they tackle challenges
    with a pragmatic yet skeptical eye.
