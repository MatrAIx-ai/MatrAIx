persona_description: Nanette and Alejandra are healthcare professionals who have dedicated their careers to improving access to healthcare and vaccines for underserved communities. They have worked with
  governments and other organizations to ensure that the Hispanic/Latino community is aware of opportunities to join clinical trials and have developed patient-focused, Spanish-language materials to help
  overcome language barriers. Their work has been instrumental in ensuring that the Hispanic/Latino community is included in clinical trials and that the clinical trial's results are representative of the
  population.
