personas:
  professional: Donald Nagel, a budding teen technologist who transforms intricate LEGO builds into miniature engineering prototypes, blends Scratch coding with practical problem‑solving, and applies a
    reliably organized yet flexible mindset to turn imaginative ideas into functional projects.
  sports: Donald Nagel, an energetic member of the neighborhood park’s junior basketball league who admires the Chicago Bulls, practices three‑on‑three games with friends after school, and participates
    in his school’s fitness club for light weight‑training, preferring team camaraderie over solitary workouts.
  arts: Donald Nagel, an enthusiastic guitarist who strums acoustic covers of Ed Sheeran and classic Beatles songs to unwind, sketches daily comic‑strip panels inspired by Calvin and Hobbes and his favorite
    sci‑fi novels, and attends community art workshops to learn watercolor techniques, though he sometimes procrastinates on finishing his drawings.
  travel: Donald Nagel, an imaginative young explorer who has taken family road trips to the Grand Canyon and a weekend camping excursion to Yosemite, dreams of visiting Tokyo to see anime studios and the
    futuristic Odaiba district, plans trips with a blend of outdoor adventure and tech‑focused museum stops, but his travel budget remains limited to school‑break allowances.
  culinary: Donald Nagel, a budding home‑chef who loves assembling veggie‑laden wraps with fresh lettuce, carrots, and hummus from his community garden harvest, enjoys making homemade pepperoni pizza with
    pineapple, and occasionally experiments with basil pesto pasta, though his cooking skill is still beginner level and he sometimes overcooks his spaghetti.
  core: Donald Nagel, a curious and organized teen who blends inventive LEGO engineering, code tinkering, and community service into a balanced life while juggling occasional forgetfulness and a love for
    music and sports.
background:
  cultural: Donald grows up in the vibrant, multicultural environment of Brooklyn, New York, while his family maintains a white, middle‑American cultural heritage with roots in the Northeastern United States.
    His household celebrates typical American holidays such as Thanksgiving and the Fourth of July, and may attend a local Protestant church for community gatherings. Exposure to the diverse neighborhoods
    of Brooklyn gives him familiarity with a variety of cuisines, languages, and traditions, fostering an open‑minded outlook while his family emphasizes education, modesty, and community involvement.
