    ''Sketching comic strips'', ''Volunteering at community garden'']'
  career_goals: Donald aspires to pursue a STEM‑focused high school pathway, with the long‑term ambition of becoming a software engineer or robotics designer who creates tools that improve everyday life.
    He hopes to join his high school robotics club, earn scholarships for engineering programs, and later study computer science or mechanical engineering at university. Alongside his technical goals, he
    wants to stay involved in community mentoring, helping younger students learn coding and encouraging teamwork in local sports or after‑school programs.
