persona_description: A person who is interested in the taxonomy of birds, particularly in the process of creating a new taxonomic checklist of the world's birds. This person is knowledgeable about the Handbook
  of the Birds of the World series and BirdLife's annual taxonomic checklists, and is currently engaged in a discussion about potential taxonomic revisions for the newly split or lumped taxa. This person
  is also interested in the status of the world's birds for the IUCN Red List and is eager to contribute to the ongoing process of updating the Red List assessments for the newly split or lumped taxa.
