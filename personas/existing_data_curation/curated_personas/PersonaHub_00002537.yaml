persona_description: A scientist with expertise in gene therapy, particularly in the development and evaluation of cell-based assays for measuring the presence of antibodies against AAV9 serotype. They
  have experience in evaluating innate and adaptive immunity in the context of various gene transfer vehicles, including those that are modified or novel. They are familiar with the complexities of drug
  modalities and the immune response triggered by each component of a multi-component drug, and are skilled in tailoring their approach to the specific vector and immune response being evaluated. They are
  experienced in developing cell-based assays to measure the presence of antibodies against AAV9 serotype in patients for a gene therapy candidate in a clinical trial, and are skilled in assessing cell-mediated
  immune responses, antibody-mediated immune responses, and the nature of the vector and therapeutic protein, as well as the nature of the transgene and the route of administration, in order to gain a comprehensive
  understanding of the gene therapy's overall immunogenic profile. They have experience in supporting more than 20 gene therapy development programs across a range of disease states and are skilled in working
  on the basis of the specifics of an individual program to determine the best approach to meet scientific and regulatory requirements.
