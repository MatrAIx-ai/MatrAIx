personas:
  professional: A newborn named Tonya Evans already exhibits a natural curiosity and openness to unconventional ideas, foreshadowing a future as an interdisciplinary researcher who will blend art theory
    with cognitive science, using their competitive drive and flexible mindset to navigate grant applications and collaborative projects.
  sports: A newborn named Tonya Evans enjoys gentle tummy‑time stretches and participates in weekly infant swim classes with the Bright Horizons Water Babies club, while they quietly cheer for the local
    football team, the Harbor Hawks, during background TV broadcasts.
  arts: A newborn named Tonya Evans is soothed by Mozart’s Symphony No. 40, classic lullabies by Ella Fitzgerald, and looks at a hand‑stitched mobile featuring Van Gogh’s Starry Night, showing early appreciation
    for music and visual art that fuels their imaginative stillness.
  travel: A newborn named Tonya Evans has already traveled to a lakeside cabin for a family weekend retreat and a sun‑kissed beach resort in the Bahamas, preferring car rides with soft playlists over noisy
    airports, while they dream of a future visit to Kyoto’s bamboo grove.
  culinary: A newborn named Tonya Evans prefers smooth textures like sweet‑potato purée, avocado mash, and organic baby oatmeal, yet can be fussy about banana purée, and they demonstrate an early discerning
    palate with occasional food refusal.
  core: Tonya Evans is a curiously solitary newborn who loves soothing classical music, carries a future trust fund, endures mild colic, and they often turn quiet moments into imaginative play despite occasional
    fussiness over food.
background:
  cultural: Tonya is an African‑American infant born in Atlanta, Georgia, and is part of a family rooted in Southern Black cultural traditions. Her upbringing includes exposure to gospel and soul music,
    community church gatherings, and local celebrations such as Juneteenth and the Atlanta Black History Month events. These cultural influences shape her early environment, emphasizing communal support,
    artistic expression, and a strong sense of identity within the vibrant Black community of Fulton County.
