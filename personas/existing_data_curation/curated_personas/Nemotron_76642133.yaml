  hobbies: '[''Visiting art museums and galleries'', ''Watercolor painting'', ''Reading contemporary fiction and non‑fiction'', ''Volunteer tutoring in finance'', ''Hiking in Allegheny countryside'', ''Cooking
    experimental recipes'', ''Attending fintech meetups'', ''Puzzle solving and chess'', ''Traveling to culturally diverse destinations'']'
  career_goals: Jasmine aims to advance from her junior financial manager role to senior finance leadership within the next five years, targeting positions such as senior financial analyst and eventually
    chief financial officer. She plans to earn her CFA and CPA certifications while pursuing an MBA focused on sustainable finance. Passionate about integrating social impact with profitability, she aspires
    to champion ESG initiatives, develop innovative financial products that support community development, and lead digital transformation projects that employ AI for predictive forecasting. Long‑term,
    Jasmine envisions founding a consultancy that helps organizations align financial performance with ethical and environmental stewardship, while mentoring women and underrepresented groups in the finance
    sector.
