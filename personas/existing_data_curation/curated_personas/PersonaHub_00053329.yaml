persona_description: A Marxist philosopher who specializes in the analysis of capitalism and its effects on society, particularly in the context of India. This individual is likely to have a deep understanding
  of Marx's works and the concept of uneven development, and is likely to be critical of the way in which the capitalist system is imposed and the ways in which it constrains productive development in certain
  parts of the world. This individual may also have a particular interest in the way in which modernist growth and sustainable development are used to justify the capitalist system, and may be critical
  of the ways in which these ideologies are used to justify the status quo.
