  career_goals: While preparing for retirement, Sam aims to transition from full‑time management to a consulting and mentorship role, helping local nonprofits and small businesses implement effective project
    structures. He plans to obtain a PMI‑ACP certification to deepen his agile expertise, and to develop a knowledge‑transfer program within his current organization that equips younger project managers
    with practical skills. Sam also hopes to lead community‑focused initiatives, such as the revitalization of historic sites in Suffolk County, ensuring his legacy of practical problem‑solving and collaborative
    leadership endures.
