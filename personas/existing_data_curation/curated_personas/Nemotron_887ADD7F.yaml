personas:
  professional: A budding robotics engineer, Hieu Tran designs and programs autonomous bots with friends, applying their methodical planning style and calm problem-solving to compete in regional STEM competitions.
  sports: Hieu Tran jogs with the Sacramento Youth Running Club along the American River Trail, attends Saturday games of the Sacramento Kings and supports the San Francisco 49ers, and caps off the week
    with skateboarding at the River Park skate spot, balancing structured training with spontaneous play.
  arts: Hieu Tran crafts electric-guitar solos inspired by Jimi Hendrix and Tame Impala, snaps sunset frames with a Nikon D3500 while studying the compositional techniques of Ansel Adams, and dives into
    science-fiction novels by Neal Stephenson and films by Christopher Nolan, letting these artistic threads shape their creative outlook.
  travel: Hieu Tran plans meticulous weekend road trips, having explored Yosemite National Park and Redwood Forest with family, and dreams of a spring backpacking journey through Japan's cherry-blossom
    routes, balancing a budget-conscious approach with a thirst for immersive cultural experiences.
  culinary: Hieu Tran spends Saturday afternoons mastering family recipes such as aromatic broth noodle soup flavored with star anise and lemongrass, grilled chicken marinated in fish sauce and ginger,
    and fresh spring rolls packed with cilantro and mint, while experimenting with sous-vide precision and pairing each dish with craft sodas or cold brew tea.
  core: Hieu Tran blends methodical curiosity with quiet confidence, juggling robotics, guitar, and community service while steering a disciplined budget and a calm, resilient mindset.
background:
  cultural: Hieu was born to Vietnamese immigrant parents who settled in Sacramento’s thriving Southeast Asian community. At home, Vietnamese language, Lunar New Year celebrations, and traditional customs
    are woven into daily life, while his schooling and neighborhood expose him to Californian cultural norms. This bicultural upbringing instills a strong respect for family and elders, a communal ethic
    of helping fellow Vietnamese youth, and an adaptive mindset that blends heritage values with mainstream American experiences. He participates in local Vietnamese cultural festivals, volunteers at the
    community’s language school, and maintains close ties with extended family across the Pacific.
