  career_goals: Hieu aspires to study computer science and engineering at a top university, aiming to blend software development with hardware prototyping. He envisions creating affordable, environmentally
    focused tech solutions—such as low‑cost sensor arrays for air‑quality monitoring—while also mentoring younger students from immigrant backgrounds. In the long term, he hopes to earn a role as a software
    engineer in a cutting‑edge company, eventually leading a multidisciplinary team that designs sustainable technology products.
