personas:
  professional: An ambitious civil engineer, Hugo Herrera leverages their expertise in structural analysis, BIM coordination, and Python-driven simulations to deliver sustainable infrastructure designs
    while balancing meticulous project management with a flexible, collaborative approach that energizes multidisciplinary teams.
  sports: An avid participant in the local intramural soccer league, Hugo Herrera also roots for the LA Galaxy and the Los Angeles Dodgers, joins weekend pick-up matches at Griffith Park, balances high-energy
    soccer with hiking trail runs, and they occasionally attend LAFC games for a change of scenery.
  arts: With a keen eye for urban photography, Hugo Herrera captures the eclectic street art of Downtown LA, draws inspiration from photographers like Henri Cartier-Bresson and contemporary muralist JR,
    swings to salsa and cumbia rhythms of Celia Cruz and Marc Anthony at community events, and they unwind with board games such as Catan and Terraforming Mars on weekend game nights.
  travel: Always seeking a blend of adventure and cultural connection, Hugo Herrera has trekked Yosemite’s Half Dome, explored the rainforests of Tulum, plans a pilgrimage to Antigua, Guatemala to taste
    authentic pepian, dreams of a cycling tour through Tuscany’s vineyards, and they balance travel costs with a modest savings plan.
  culinary: An enthusiastic home chef, Hugo Herrera perfects Guatemalan pepian with roasted pumpkin seeds, achiote, and slow-cooked chicken, rolls fragrant tamales seasoned with chipotle and corn masa,
    experiments with locally sourced avocado and cilantro, yet they occasionally forget to clean the kitchen before heading to late-night coding sessions.
  core: Hugo Herrera is a 29-year-old socially vibrant civil engineer whose blend of technical rigor, relentless curiosity, and emotional intensity fuels a passion for sustainable design, community outreach,
    and spontaneous salsa dancing, and they constantly juggle ambitious projects with intense emotional waves.
background:
  cultural: Hugo grew up in a Guatemalan immigrant household in Los Angeles, speaking Spanish at home and English at school. His family places high value on hard work, community loyalty, and close intergenerational
    ties. He celebrates traditional holidays such as Semana Santa and Día de los Héroes, and maintains strong connections with the local Guatemalan diaspora through cultural festivals, communal meals, and
    a bilingual church. This bicultural upbringing shapes his collaborative style, his appreciation for both innovative ideas and established practices, and his desire to create engineering solutions that
    respect cultural contexts.
