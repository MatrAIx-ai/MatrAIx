  career_goals: Hugo aims to earn his Professional Engineer (PE) license within the next two years and advance to a senior project manager role overseeing large-scale, sustainable infrastructure projects
    in the Greater Los Angeles area. He wants to lead multidisciplinary teams that integrate green building practices and smart-city technologies, and eventually launch his own consulting firm focused on
    community-centered development. Mentoring junior engineers and advocating for greater diversity in engineering are also central to his long-term vision.
