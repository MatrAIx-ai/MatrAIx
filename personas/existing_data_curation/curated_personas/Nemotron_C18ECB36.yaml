  hobbies: '[''Gardening'', ''Cooking traditional dishes'', ''Listening to Latin music'', ''Sketching'', ''Visiting art galleries'', ''Reading artist biographies'', ''Crossword puzzles'', ''Storytelling
    with grandchildren'', ''River walks'', ''Fishing'']'
  career_goals: Although retired, Miguel intends to deepen his community impact. He hopes to formalize his role as a cultural ambassador at the Hialeah Public Library, create a monthly cooking workshop
    for senior residents, collaborate with a local museum on a Nicaraguan‑heritage exhibition, and compile a memoir of his family's journey from Nicaragua to Florida. He also wishes to stay physically active,
    maintain his garden, and support his grandchildren’s education through tutoring and storytelling.
