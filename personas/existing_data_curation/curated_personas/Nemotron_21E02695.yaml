personas:
  professional: Kenneth Ruiz, a budding game developer who creates simple Scratch games, leverages their methodical mindset and love for structured problem‑solving, and channels their competitive streak
    into mastering coding challenges.
  sports: Kenneth Ruiz, a dedicated middle‑school track athlete who practices sprint intervals on the school’s cinder track, joins the local youth running club on weekends, follows the Chicago Cubs as a
    baseball team, cheers for the Los Angeles Lakers in basketball, and lets these fandoms fuel their competitive spirit.
  arts: Kenneth Ruiz, an avid builder and reader who constructs intricate LEGO creations while listening to classic rock legends like Led Zeppelin, Pink Floyd, and The Beatles, and immerses themselves in
    science‑fiction novels by Isaac Asimov and Arthur C. Clarke, which shapes their imagination and fuels their penchant for structured storytelling.
  travel: Kenneth Ruiz, a cautious yet curious traveler who prefers meticulously planned family road trips to nearby state parks such as Yosemite and occasional weekend visits to Disneyland, dreams of exploring
    the Kennedy Space Center in Florida and the National Museum of Emerging Science and Innovation in Tokyo, and balances these aspirations with the limited budget of a middle‑school allowance and parental
    approval.
  culinary: Kenneth Ruiz, an enthusiastic yet modest home cook who can assemble a perfectly baked pepperoni pizza using pre‑made dough, whisk together a quick chicken quesadilla with cheddar and salsa,
    and proudly prepares a peanut‑butter‑banana sandwich as a snack, showing a strong preference for salty, cheesy, and mildly sweet flavors.
  core: Kenneth Ruiz, a methodical twelve‑year‑old whose love for order and competitive streak drives obsessive LEGO building and Scratch coding, while their intense anxiety fuels nightly journaling and
    occasional over‑thinking of even the smallest choices.
background:
  cultural: 'Kenneth comes from a middle‑class white family living in Lakewood, New Jersey. His upbringing reflects mainstream American suburban values: a focus on school achievement, participation in community
    and after‑school clubs, and family traditions such as celebrating holidays like Thanksgiving and Christmas. The diverse environment of Ocean County exposes him to a range of cultural experiences, from
    beach outings to local festivals, while his family retains some European‑American customs that emphasize practicality, reliability, and a love of routine.'
