  hobbies: '[''reading (science fiction and non‑fiction)'', ''building LEGO sets'', ''playing chess'', ''coding simple games (Scratch)'', ''model building (airplane kits)'', ''track running'', ''journaling'',
    ''listening to music (classic rock)'']'
  career_goals: Kenneth aspires to excel academically, especially in math and science, with the long‑term goal of studying engineering or computer science in college. He hopes to develop his programming
    skills further and eventually work on practical technology projects where his reliability and methodical approach are valued. In the meantime he aims to earn high grades, participate in STEM clubs,
    and secure a scholarship for a reputable engineering program.
