persona_description: 'A biologist and artist who is passionate about promoting the concept of an ecosystem and teaching students how to relate their own interests to science and creativity. They are team-teaching
  the innovative hands-on course "Art Through Science: Camden in Context" in the Department of Fine Arts and the Biology Department, fulfilling the Gen Ed requirement in either Art and Aesthetic Appreciation
  or Natural Science. They are also exploring the concept of a "Gen Ed requirement" that allows students to take the course during Summer Session in the Department of Fine Arts as 50:080:490 Art Through
  Science: Camden in Context and in the Biology Department as Science Through Art: Camden in Context to fulfill the requirement in Natural Science.'
