personas:
  professional: Douglas Nafisi leverages 25 years of hands‑on warehouse logistics expertise, mastering NetSuite, Fishbowl, and advanced Excel, and they blend practical curiosity with a laid‑back attitude
    to lead teams, troubleshoot disruptions, and champion RFID automation as they eye a supervisory role.
  sports: Douglas Nafisi energizes their weekends with the Desert Sox adult softball league, tackles Sonoran Desert hikes with a community group, and they rally behind the Arizona Diamondbacks, Arizona
    Cardinals, and Phoenix Suns, embodying a laid‑back yet socially driven fitness routine.
  arts: Douglas Nafisi fuels their free time with classic‑rock devotion, regularly catching live shows by the Rolling Stones, Led Zeppelin tribute acts, and local Phoenix blues bands, while their passion
    for restoring classic cars leads them to admire the automotive sculptures of Glen Whitaker and hoard vintage car magazines for artistic inspiration, and they view these pursuits as extensions of their
    hands‑on creativity.
  travel: Douglas Nafisi prefers road‑trip adventures over packaged tours, having mapped out desert escapes to Sedona, the Grand Canyon, and a weekend camping spree in Flagstaff, while dreaming of a transatlantic
    pilgrimage to Ireland’s rugged coastlines to trace family roots, and they plan each journey with a flexible itinerary that leaves room for spontaneous detours.
  culinary: Douglas Nafisi commands their backyard grill with intermediate flair, mastering mesquite‑smoked brisket, chipotle‑glazed ribs, and shrimp tacos topped with fresh cilantro, jalapeño, and lime,
    and they often swap recipes at the local BBQ club.
  core: Douglas Nafisi blends a Midwestern work ethic with Southwest ease, turning inventory spreadsheets into playgrounds for RFID experiments, and they juggle backyard barbecues, classic‑car grease, and
    an ever‑expanding roster of spontaneous weekend hikes.
background:
  cultural: 'Douglas grew up in the American Midwest before relocating to Arizona in his thirties. He identifies with mainstream White American middle-class values: hard work, self-reliance, and community
    involvement. His family''s heritage includes Irish and English roots, but his cultural identity is shaped by the Southwest lifestyle—outdoor recreation, a relaxed pace, and a strong emphasis on local
    community events and volunteerism.'
attributes:
