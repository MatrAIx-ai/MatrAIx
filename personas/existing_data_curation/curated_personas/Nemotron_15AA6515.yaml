  hobbies: '["Adult softball league", "Hiking Sonoran Desert trails", "Classic rock concerts", "Barbecue cooking", "Classic car restoration", "DIY home improvement", "Volunteer work at community food bank"]'
  career_goals: Douglas aims to transition from his current clerk role into a supervisory or inventory manager position within the next three years. He plans to earn an APICS Certified in Production and
    Inventory Management (CPIM) credential and to lead a project that integrates RFID technology into his warehouse's operations. Long-term, he envisions moving into logistics consulting, helping small
    businesses in the Phoenix metropolitan area streamline their supply chains, while also establishing a stable financial base for early retirement.
