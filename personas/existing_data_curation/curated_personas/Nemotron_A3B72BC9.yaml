personas:
  professional: Jose Acosta, a methodical special‑education teacher in Cleveland, expertly crafts individualized education plans, leverages assistive technology and data‑driven instruction, and navigates
    Ohio IDEA compliance while fostering collaborative ties with Spanish‑speaking families, reflecting their preference for structure, reliability and quiet dedication.
  sports: Jose Acosta, an avid hiker of Cuyahoga Valley trails and a weekend participant in a local co‑ed recreational soccer league, also follows the Cleveland Guardians, Browns, and Cavaliers closely,
    using a modest routine of morning jogs and evening yoga to maintain fitness without sacrificing their preference for low‑key physical activity.
  arts: Jose Acosta, a quiet lover of the literary arts, regularly devours contemporary Chilean novels by Alejandro Zambra and poetry by Pablo Neruda while strumming acoustic renditions of Violeta Parra
    and Victor Jara on guitar, and occasionally attends performances by the Cleveland Play House featuring productions of classic American dramas.
  travel: Jose Acosta, a detail‑oriented traveler, meticulously plans trips on spreadsheets, preferring low‑key cultural immersion such as a solo trek through Patagonia’s Torres del Paine and weekend literary
    cafés in Santiago, while budgeting carefully to accommodate their teacher salary and dreaming of an Icelandic fjord adventure.
  culinary: Jose Acosta, a competent home chef, delights in preparing Chilean staples like hand‑folded empanadas stuffed with seasoned beef, onions, olives and boiled egg, and pastel de choclo layered with
    corn puree, raisins, and a pinch of smoked paprika, sourcing fresh corn, cilantro and aji from the Cleveland farmer’s market, while occasionally treating themselves to a night out at a local tapas bar
    for contrast.
  core: Jose Acosta, a methodical yet quietly quirky special‑education teacher, balances meticulous lesson planning with a solitary love for folk guitar, puzzle‑solving, and a habit of over‑seasoning every
    empanada, all while quietly nurturing a dream of district‑wide inclusive reform.
background:
  cultural: Jose was born in Chile and immigrated to the United States as a teenager, bringing with him a deep appreciation for Chilean customs, music, and cuisine. He remains fluent in Spanish and actively
    participates in the local Chilean diaspora community in Cleveland, celebrating festivals such as Fiestas Patrias and sharing folkloric dance. His bicultural experience informs his teaching philosophy,
    helping him build trust with Spanish‑speaking families and incorporate culturally responsive practices into his classroom.
attributes:
  skills: '[''Special Education Instruction'', ''IEP Development'', ''Behavior Management'', ''Curriculum Adaptation'', ''Assistive Technology Integration'', ''Data‑Driven Instruction'', ''Bilingual Communication
    (Spanish/English)'', ''Collaboration with Parents and Multidisciplinary Teams'', ''Compliance with IDEA and Ohio Regulations'', ''Classroom Organization and Planning'']'
  hobbies: '[''Reading educational psychology and Chilean literature'', ''Cooking traditional Chilean dishes'', ''Playing acoustic guitar'', ''Hiking in Cuyahoga Valley National Park'', ''Gardening'', ''Solving
    puzzles and crosswords'', ''Volunteering in bilingual tutoring groups'']'
  career_goals: Jose aims to complete a bachelor's degree in Special Education and obtain Ohio teaching certification within the next two years. He aspires to become a Special Education Coordinator for
    the Cleveland school district, where he can design district‑wide inclusive curricula, mentor novice teachers, and lead professional‑development workshops that emphasize structured, evidence‑based practices.
    Long‑term, he envisions founding a community outreach program that supports Spanish‑speaking families navigating special‑needs services.
