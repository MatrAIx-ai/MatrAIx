  career_goals: Approaching the culmination of his professional life, Garth aims to codify his analytical methodologies into a concise handbook tailored for small‑business owners and nonprofit leaders in
    the San Diego region. He seeks to transition to a selective consulting role that allows him to mentor emerging analysts through structured, one‑on‑one sessions while preserving his need for solitude.
    Additionally, he aspires to publish a reflective article on the intersection of educational theory and management analytics, thereby leaving a lasting intellectual legacy and ensuring financial stability
    for his spouse.
