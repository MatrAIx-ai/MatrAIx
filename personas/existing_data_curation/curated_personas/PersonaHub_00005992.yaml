persona_description: A researcher and expert in music therapy, particularly in the field of anesthesia and surgery. They have conducted studies on the effects of music on patients undergoing both planned
  and emergency surgical operations while awake, and have published their findings in the Annals of the Royal College of Surgeons. They are currently leading a study on the impact of music on patients undergoing
  both planned and emergency surgical operations while awake, and are seeking larger multi-centre research to establish whether this should become part of standard practice. They are also interested in
  the effects of music when played in the waiting room or endoscopy suite, with little work done on patients in the operating theatre when they are probably most anxious.
