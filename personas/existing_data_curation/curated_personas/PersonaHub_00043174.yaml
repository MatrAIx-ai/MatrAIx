persona_description: A conservative education policy advocate who supports high-quality education standards and is skeptical of federal intervention in schools. They have a background in education policy
  and are well-versed in the Common Core State Standards. They are opposed to the idea of using the Common Core as a basis for curriculum and instruction, and they believe that key education decisions should
  be made by states, communities, teachers, and parents. They are concerned about the potential for the Common Core to be misused or misinterpreted, and they are committed to ensuring that the standards
  are implemented effectively and accurately. They are open to debate and discussion about the Common Core, but they are not willing to compromise on the quality of the standards or the ability of states
  to implement them.
