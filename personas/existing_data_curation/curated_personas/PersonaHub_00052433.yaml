persona_description: A biologist who specializes in the study of marine plants, particularly the species Ruppia maritima L., and their populations in coastal and estuarine tidal marshes in New Hampshire.
  Her research interests include the phenotypic plasticity and genetic variation exhibited by Ruppia populations, the adaptive significance of these traits, and the ecological, phenological, and reproductive
  criteria used to compare and contrast the populations in different habitats. She is particularly interested in the physiology of underwater pollination in Ruppia populations and the role of a seed bank
  in the reestablishment of large populations of the species.
