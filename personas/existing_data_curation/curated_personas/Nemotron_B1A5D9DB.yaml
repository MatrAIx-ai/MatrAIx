  hobbies: '[''Watercolor Painting'', ''Ceramics'', ''Reading Historical Fiction'', ''Gardening'', ''Hiking'', ''Community Theater'', ''Volunteer Reading Programs'', ''Puzzle Solving'', ''Attending Folk
    Art Festivals'', ''Cooking/Baking'', ''Listening to Jazz and Folk Music'']'
  career_goals: Sarah aims to advance into a leadership position within her school district, such as Lead Teacher or Director of Early Childhood Programs, where she can shape district‑wide curriculum and
    mentor educators. She plans to pursue a master's degree in Early Childhood Education to deepen her expertise. Additionally, she dreams of launching a community arts‑based early learning center in Wattsburg
    that offers after‑school workshops and partnership programs with local libraries and museums. Sarah also hopes to author a children’s book that blends storytelling with abstract art concepts, and to
    become an advocate for increased early‑learning funding in Erie County.
