personas:
  professional: Salina Stroud is a community‑focused organizer who leverages her budgeting expertise, event‑coordination experience, and First Aid certification to launch a part‑time home daycare while
    also planning neighborhood fundraisers, balancing meticulous planning with the flexibility to adapt on the fly.
  sports: Salina Stroud enjoys weekend hikes along the Illinois River Trail, follows the St. Louis Cardinals, and participates in a local runners' club that meets for a spring 5K race each year.
  arts: Salina Stroud expresses creativity through knitting scarves, close‑up botanical photography inspired by Georgia O'Keeffe, and reading historical fiction by Ken Follett, while they also attend community
    theater productions featuring local talent.
  travel: Salina Stroud prefers budget‑friendly road trips that blend scenic hiking with small‑town history, having explored Asheville, North Carolina, and Charleston, South Carolina, and they dream of
    a spring visit to Kyoto, Japan to photograph cherry blossoms.
  culinary: Salina Stroud delights in baking artisan sourdough bread and apple‑cinnamon pies, seasoning dishes with fresh rosemary and thyme from their garden, and they often share the fragrant loaves and
    pies at church potlucks and farmer's markets.
  core: Salina Stroud balances a practical, organized mind with a curiosity for new recipes and community projects, yet they sometimes forget to water houseplants while the garden thrives.
background:
  cultural: Salina was raised in a middle‑class White family in the Greater St. Louis area, where Midwestern values of self‑reliance, modesty, and community involvement were emphasized. Her family’s heritage
    includes German and Irish roots, and she grew up attending a local Catholic parish, which reinforced a sense of service and tradition. Living in Belleville, a town with historic French‑Canadian influences,
    she embraces a blend of cultural customs—seasonal community festivals, church gatherings, and neighborhood potlucks—that reflect the region’s diverse yet cohesive identity. This background contributes
    to her practical outlook, cooperative spirit, and appreciation for both established methods and new ideas.
attributes:
  skills: '[''Household budgeting and financial planning'', ''Meal planning and cooking'', ''Community event coordination'', ''Basic computer proficiency (email, word processing, online budgeting tools)'',
    ''First Aid/CPR certification'', ''Gardening and basic horticulture'', ''DIY home repairs and maintenance'']'
  hobbies: '[''Gardening'', ''Baking and pastry making'', ''Reading historical fiction and memoirs'', ''Volunteering at the local library'', ''Knitting'', ''Hiking the Illinois River Trail'', ''Photography
    of local plants and flowers'']'
  career_goals: Salina aims to re‑enter the workforce on a part‑time basis, leveraging her organizational talents and community‑service experience. She plans to enroll in a community‑college certificate
    program in early childhood education to start a licensed home daycare, providing flexible childcare for local families. Concurrently, she hopes to develop a small‑scale cottage‑food business, selling
    baked goods at farmers’ markets. Long‑term, she envisions a role as a volunteer coordinator or outreach specialist for a local non‑profit, where she can combine her love of community events with her
    practical skill set.
