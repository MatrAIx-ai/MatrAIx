  hobbies: '[''Herb gardening'', ''Traditional Puerto Rican cooking'', ''Historical reading'', ''Genealogy research'', ''Puzzles'', ''Chess'', ''Model ship building'', ''Woodworking'', ''Listening to bomba
    and plena music'']'
  career_goals: Although officially retired, Isaiah aims to remain intellectually active by volunteering as a curriculum consultant for local schools and community centers, focusing on bilingual education
    best practices. He hopes to author a memoir that intertwines his Puerto Rican heritage with his experiences in American education, and to contribute occasional articles to educational journals. A long‑term
    ambition is to establish a modest scholarship fund for Puerto Rican students in Indiana, allowing him to leave a personal legacy while staying true to his competitive drive for personal achievement.
