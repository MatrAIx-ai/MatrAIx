persona_description: A researcher at South Dakota State University, specializing in the study of swine diseases and particularly in the development of vaccines and treatments for Porcine Postweaning Diarrhea
  (PWD). He has conducted research on the virulence factors contributing to PWD and has developed a study model using genetically engineered E. coli strains to investigate the role of other enterotoxins
  and non-fimbrial adhesions in causing PWD. He has also been involved in ongoing research projects funded by USDA to develop a vaccine that protects pigs from K88 fimbrial ETEC strains and is currently
  investigating the possibility of adding vaccine protection against heat-stable toxins.
