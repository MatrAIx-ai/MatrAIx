  career_goals: Miguel aims to earn a scholarship to a top engineering program, focusing on mechanical or petroleum engineering with an eye toward sustainable energy solutions. He plans to secure internships
    at local energy firms to apply his practical skills, and eventually become a licensed engineer who can bridge Mexican‑American perspectives in the industry. Long‑term, he envisions leading projects
    that improve community infrastructure while promoting environmentally responsible practices.
