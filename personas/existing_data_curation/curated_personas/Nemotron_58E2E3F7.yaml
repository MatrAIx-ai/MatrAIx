personas:
  professional: Miguel Cabrera, a budding tech enthusiast, channels his disciplined organization and practical curiosity into Python programming, Arduino prototyping, and meticulous scale-model airplane
    construction, often applying systematic project plans to school robotics competitions and solo coding challenges.
  sports: Miguel Cabrera, a methodical teen athlete, competes in his high school soccer team each fall, joins a community basketball league during winter, follows the Chicago Bulls in the NBA, and upholds
    a disciplined fitness regimen that includes daily stretching, weekend jogging, and occasional weekend hikes in nearby state parks.
  arts: Miguel Cabrera, a reflective teen creator, strums acoustic renditions of Jimi Hendrix and Carlos Santana on his guitar, immerses himself in the narrative universes of Isaac Asimov and Ann Leckie,
    and regularly attends local cultural festivals featuring live performances by Los Tigres del Norte, all of which fuel his imaginative outlook.
  travel: Miguel Cabrera, an organized teen explorer, meticulously plans weekend getaways to nearby natural wonders like the Redwood Forest, dreams of an exchange program to Osaka, Japan to tour cutting-edge
    tech museums, and balances his travel ambitions with a modest budget funded by tutoring earnings and disciplined savings.
  culinary: Miguel Cabrera, a diligent home-chef, assists his family in mastering dishes like tamales, pozole, and chiles en nogada using masa harina, chipotle, and fresh cilantro, while occasionally experimenting
    with tech-inspired snacks such as matcha-infused ramen and perfecting his own homemade pizza crusts.
  core: Miguel Cabrera, a disciplined yet solitary teen, merges relentless curiosity for technology with a regimented schedule, often staying up late debugging code at the cost of sleep, and balances his
    love for sci-fi worlds with a practical streak that drives his meticulous model-airplane builds.
background:
  cultural: Miguel grows up in a Mexican‑American household in Midland, Texas. His family maintains strong ties to Mexican traditions, speaking Spanish at home, celebrating holidays such as Día de los Muertos
    and Mexican Independence Day, and cooking family recipes. At the same time, the oil‑driven economy and multicultural environment of West Texas shape his worldview, exposing him to both Texan and Mexican
    cultural practices. Bilingualism and an appreciation for both cultures influence his personal identity, social interactions, and aspirations.
