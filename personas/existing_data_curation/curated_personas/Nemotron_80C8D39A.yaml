  career_goals: Although officially retired, Francis seeks to channel his expertise into purposeful, low‑stress activities. He aims to become a mentor for emerging entrepreneurs through a senior‑business
    advisory board at a Grand Rapids nonprofit, offering quarterly workshops on fiscal stewardship. He also wishes to serve on the board of a local arts organization, leveraging his fundraising experience
    to support community exhibitions. On a personal level, Francis plans to document his professional journey and family history in a memoir, using writing as a therapeutic outlet for his frequent worries.
    Continuing education remains important; he intends to take occasional online courses in digital archiving and contemporary art theory to satisfy his curiosity without overwhelming his schedule.
