  career_goals: Ai Jin aims to advance into a senior technical leadership role, such as Lead Architect or Engineering Manager, where he can guide the design of large‑scale distributed systems and mentor
    junior engineers. He plans to obtain the AWS Solutions Architect Professional certification and pursue an MBA to blend technical depth with strategic business insight. His long‑term ambition includes
    shaping product strategy for data‑centric platforms while fostering a collaborative, low‑stress work environment that balances innovation with pragmatic delivery.
