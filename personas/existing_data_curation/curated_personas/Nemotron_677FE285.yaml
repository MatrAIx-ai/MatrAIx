personas:
  professional: Raha Suggs, a 28‑year‑old front‑desk specialist in Napa’s hospitality scene, blends warm interpersonal flair, meticulous record‑keeping, and conflict‑resolution savvy with a burgeoning knowledge
    of wine tourism to drive seamless visitor experiences and mentor a small support team.
  sports: Raha Suggs fuels their active lifestyle with membership in the Napa Valley Hiking Club, weekend yoga at Solstice Studio, and enthusiastic support for the Golden State Warriors, often swapping
    post‑game drinks for sunrise trail runs.
  arts: Raha Suggs curates live music at the local farmers market, regularly playlists Sufjan Stevens and indie folk bands, treasures Monet’s impressionist canvases at the di Rosa Center, and unwinds with
    historical fiction by Hilary Mantel, weaving these artistic threads into their own short‑form essays.
  travel: Raha Suggs prefers spontaneous weekend getaways, alternating between wine‑focused tours in Bordeaux and coastal hikes in Cinque Terre, while balancing a modest travel budget that still allows
    annual road trips to Sonoma and occasional flights to Santa Barbara for Mediterranean culinary workshops.
  culinary: Raha Suggs experiments with Mediterranean dishes like lamb tagine with preserved lemons and harissa, perfecting pairings with Napa Cabernet, and catalogs their culinary adventures in a lovingly
    messy scrapbook of recipes and wine‑pairing notes.
  core: Energetic, curiosity‑driven and delightfully disorganized, Raha Suggs blends a love for community‑centric wine culture with a habit of over‑booking social outings, often juggling a spreadsheet of
    event ideas while forgetting to water their succulents.
background:
  cultural: 'Raha grew up in a middle‑class, predominantly white suburban community in Northern California, with family roots tracing back to Irish and English ancestors. Her upbringing emphasized appreciation
    for the arts, education, and community involvement, reflecting the liberal‑arts values she later pursued in college. Living in Angwin, a small town nestled in Napa County, she has absorbed the region''s
    strong emphasis on hospitality, sustainability, and local food and wine culture. This blend of a traditional American family background with the progressive, environmentally conscious vibe of the Napa
    area shapes her worldview: she values interpersonal connection, cultural curiosity, and a collaborative spirit while maintaining a relaxed, flexible approach to daily life.'
attributes:
  skills: '["Customer service and guest relations","Multi‑line phone etiquette","Appointment scheduling and calendar management","Microsoft Office (Word, Excel, Outlook)","Google Workspace (Docs, Sheets,
