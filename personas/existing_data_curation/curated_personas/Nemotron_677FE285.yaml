  hobbies: '["Group hiking in wine country","Weekend yoga classes","Wine tasting and vineyard tours","Volunteering at local farmers market (event coordination)","Attending live music and art events","Reading
    historical fiction","Creative writing (short essays)","Mediterranean cooking and recipe development","Photography of vineyards and community events"]'
  career_goals: Raha aims to transition from a receptionist role to a supervisory position such as Office Manager or Guest Services Coordinator within the Napa hospitality or tourism sector. She envisions
    leveraging her people‑skill strengths to lead a small team, improve visitor experience, and contribute to community‑focused events like vineyard tours and farmer's market pop‑ups. To support this, she
    plans to earn a certification in Event Planning and deepen her knowledge of wine tourism through a short course offered by a local college. Ultimately, Raha hopes to combine her administrative expertise
    with her love of community interaction by becoming a liaison between local wineries, cultural organizations, and visitors, helping to craft memorable, inclusive experiences while maintaining a flexible
    work schedule that aligns with her values of spontaneity and balance.
