personas:
  professional: Jonathan Reyes is a retired mechanical engineer who applies his mastery of advanced mechanical design, thermodynamics, and data analytics to mentor high‑school students, lead community STEM
    workshops, and spearhead local heritage projects, channeling their disciplined, competitive nature and sociable charisma into meticulous planning and persuasive public speaking.
  sports: Jonathan Reyes hikes the Blue Ridge Trail with the local Blue Ridge Hiking Club each spring, follows the Carolina Panthers in football and the Charlotte Hornets in basketball, and competes in
    weekly senior‑center chess and bridge tournaments, channeling their competitive streak into disciplined morning walks while preferring low‑impact activities over high‑intensity gym sessions.
  arts: Jonathan Reyes acts in community theater productions of Arthur Miller plays, directs folk‑music evenings featuring the ballads of Doc Watson and the Avett Brothers, and curates a personal collection
    of woodcarvings by Sam Ragan, allowing their love of storytelling and craftsmanship to shape both their leisure time and their public talks.
  travel: Jonathan Reyes prefers meticulously planned road trips that combine scenic hiking in the Blue Ridge Mountains with visits to historic engineering museums, having toured the Smithsonian’s National
    Air and Space Museum and the Royal Institution in London, and now dreaming of a summer excursion to the dark‑sky reserve of Aoraki Mackenzie in New Zealand.
  culinary: Jonathan Reyes enjoys preparing farm‑to‑table Southern meals such as shrimp and grits with garden‑grown heirloom tomatoes, collard greens seasoned with smoked paprika, and a signature pecan‑crusted
    sweet‑potato casserole, while their woodworking hobby inspires the use of hand‑crafted cedar serving boards for family gatherings.
  core: Jonathan Reyes blends a lifelong precision in engineering with mountain‑community self‑reliance, channeling competitive zeal into community mentorship while occasionally hoarding vintage manuals
    and neglecting to floss.
background:
  cultural: Jonathan’s cultural background is rooted in the Appalachian foothills of western North Carolina. Raised in a middle‑class white family with deep generational ties to Mount Airy, he grew up in
    a community that prized self‑reliance, hospitality, and a pragmatic work ethic. His upbringing blended traditional Southern values—family loyalty, church involvement, and community service—with the
    region’s rich folk music, storytelling, and craftsmanship traditions. After earning a graduate STEM degree and a career in mechanical engineering, he returned to his hometown for retirement, where he
    continues to embody the area’s mix of practical ingenuity and communal engagement.
