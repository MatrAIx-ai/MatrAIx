personas:
  professional: Angela Harris is a middle‑school STEM enthusiast who focuses on technology and design, using her curiosity, organized planning, and reliable execution to create Minecraft redstone circuits
    and intricate LEGO builds.
  sports: Angela Harris runs with her middle‑school cross‑country team and plays for a community soccer club called Evergreen Knights, while cheering on Seattle’s professional teams—the Seahawks in the
    NFL, the Mariners in MLB, and the Sounders FC in MLS—displaying her organized approach to training and balanced competitive spirit.
  arts: Angela Harris immerses herself in the school band as a clarinetist, devours fantasy novels by Brandon Sanderson, listens to the cinematic scores of Hans Zimmer and the experimental piano works of
    Yiruma, and enjoys the animated films of Studio Ghibli such as Spirited Away, shaping her creative identity through diverse artistic influences.
  travel: Angela Harris enjoys family road trips to destinations like Yosemite National Park and Seattle’s Pike Place Market, while dreaming of an overseas adventure to Kyoto, Japan, and plans each itinerary
    in her journal to balance school responsibilities, limited allowance, and a love for both adventure and relaxation.
  culinary: Angela Harris loves cooking simple yet satisfying dishes such as homemade macaroni‑and‑cheese with a breadcrumb topping and roasted broccoli, delights in sushi rolls featuring avocado and cucumber,
    and frequently snacks on a trail mix of dried apricots, almonds, and dark chocolate chips, reflecting her balanced approach to nutrition and flavor exploration.
  core: Angela Harris blends meticulous curiosity with creative play, balancing organized projects, compassionate volunteering, and a love for fantasy tales, all while navigating teen life with a pragmatic
    yet imaginative spark.
background:
  cultural: Angela grew up in Topeka, Kansas, a Midwestern city where community values, modesty, and practicality are common. Her white, middle‑class family emphasizes education, self‑reliance, and involvement
    in local traditions such as school sports events, the Kansas State Fair, and church gatherings. The region’s cultural fabric includes a strong appreciation for small‑town friendliness, volunteerism,
    and agricultural heritage, which she experiences through the 4‑H club and local community service. While maintaining these Midwestern sensibilities, Angela also engages with diverse ideas through school
    curricula, online platforms, and interactions with peers from varied backgrounds, shaping a balanced cultural perspective.
