  career_goals: Angela dreams of turning her love for animals and science into a future career as a veterinarian, hoping to combine hands‑on animal care with scientific research. At the same time, she is
    fascinated by how things work and has expressed interest in engineering, particularly robotics, which she pursues through her coding club. She aims to attend a STEM‑focused high school and eventually
    a university where she can major in a life‑science or engineering program. Beyond a professional career, Angela hopes to mentor younger students in her community, sharing her organized approach to learning
    and encouraging curiosity in science and technology.
