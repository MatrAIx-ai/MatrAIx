persona_description: A scientist at Glasgow University, focused on the discovery and development of new anti-inflammatory drugs. Specializes in the study of flavanoids, their role in reducing inflammation,
  and the potential for these molecules to lead to the development of new treatments for heart disease. Has expertise in molecular biology, cell biology, and pharmacology. Is currently conducting research
  on the activation of immune cells and the production of immune molecules, which could lead to the development of new anti-inflammatory drugs. Has published research in the "Biochemical Journal" and is
  currently working on finding ways to produce these new drugs more cheaply and effectively.
