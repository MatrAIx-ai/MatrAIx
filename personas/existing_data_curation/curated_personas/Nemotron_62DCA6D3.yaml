personas:
  professional: Clareen Thomas, a 17‑year‑old self‑taught visual creator, harnesses Procreate, Adobe Photoshop, charcoal, and watercolor to craft intricate fantasy worlds and character designs while they
    weave poetry and short fiction into narrative art, maintaining a disciplined bullet‑journal workflow that balances meticulous organization with the freedom of solitary imagination.
  sports: Clareen Thomas enjoys solitary early‑morning runs through Hocking Hills State Park, participates in a local youth running club, follows the Cleveland Cavaliers (NBA) and Columbus Blue Jackets
    (NHL) for community spirit, and they attend weekly yoga sessions to counterbalance long hours of drawing.
  arts: Clareen Thomas immerses themselves in ambient electronic sounds from Brian Eno and Aphex Twin, jazz legends like Miles Davis, and soul icons such as Erykah Badu while studying visual works by Hayao Miyazaki,
    Frida Kahlo, and exhibitions highlighting underrepresented artists, and they regularly attend indie film screenings of titles like 'Moonlight' and 'The Fall' to fuel their speculative storytelling.
  travel: Clareen Thomas prefers quiet, reflective trips with a sketchbook in hand, having explored the misty cliffs of Hocking Hills, the vibrant street art of Berlin, and the serene gardens of Kyoto,
    while they plan future solo journeys to Iceland's black sand beaches and the historic libraries of Florence, always budgeting carefully and using public transport to maximize artistic inspiration.
  culinary: Clareen Thomas enjoys experimenting in the kitchen, often preparing a fragrant bowl of ramen with miso, shiitake, and a soft‑boiled egg, savoring Ethiopian injera paired with spiced lentil stew,
    and whipping up sweet potato‑black bean tacos topped with fresh cilantro and lime, while their cooking skill remains at an enthusiastic intermediate level, and they relish discovering new flavors during
    museum café visits.
  core: Clareen Thomas is a solitary, hyper‑creative teen who balances meticulous organization with spontaneous bursts of artistic imagination, occasionally neglecting sleep for late‑night sketching and
    habitually over‑caffeinating during study sessions, and they often lose track of time while chasing new visual ideas.
background:
  cultural: Clareen grew up in a predominantly Black neighborhood in Delaware County, Columbus, Ohio. Her family maintains strong ties to African American cultural traditions, including gospel music from
    church services, oral storytelling, and community gatherings. From an early age she was introduced to the works of Black authors such as Toni Morrison, Maya Angelou, and contemporary spoken‑word poets,
    which shaped her literary sensibilities. Local cultural institutions like the King Arts Center and the Columbus Museum of Art's African Diaspora exhibitions deepened her appreciation for Black visual
    arts. Her grandparents shared stories about African heritage, cuisine, and customs, infusing her creative narratives with motifs of African patterns and rhythms. While she values solitude, she feels
    a profound connection to the resilience and creativity of the Black community in the Midwest, and she often incorporates themes of social justice and cultural identity into her artwork.
attributes:
  skills: '[''Digital illustration (Procreate, Photoshop)'', ''Hand drawing (charcoal, watercolor)'', ''Creative writing (poetry and short fiction)'', ''Basic Python coding for generative art'', ''Photography
    (low‑light, minimalist)'', ''Self‑organization and project planning (bullet journal)'', ''Critical analysis of visual media'', ''Conceptual art development'']'
  hobbies: '[''Sketchbook drawing'', ''Digital painting'', ''Poetry and short‑story writing'', ''Listening to ambient, jazz, and soul music'', ''Solitary nature walks and photography'', ''Reading mythology,
    philosophy, and speculative fiction'', ''Watching indie films and experimental cinema'', ''Meditation and mindfulness practice'', ''Creating audio collages'', ''Visiting art museums and cultural exhibits'']'
  career_goals: Clareen plans to obtain her GED within the next year and then enroll in a specialized art program such as the Columbus College of Art & Design, focusing on illustration and concept art.
    She aims to build a robust digital portfolio that showcases her fantasy world‑building and narrative art, targeting freelance commissions for book covers, indie video games, and graphic novels. Her
    long‑term ambition is to become a recognized concept artist and author, publishing a graphic novel that weaves African American cultural motifs with speculative fiction. She also hopes to use her art
    as a platform for social commentary, creating installations that highlight Black experiences and inspire community dialogue. Ultimately she seeks a career that balances independent creative work with
    occasional collaborative projects while preserving the quiet, solitary environment she thrives in.
