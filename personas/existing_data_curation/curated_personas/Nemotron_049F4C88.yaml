personas:
  professional: Steven Maynard, a three‑year‑old preschool explorer, channels his curiosity for art and new ideas into building elaborate block castles and leading impromptu storytelling circles, demonstrating
    early organizational flair and flexible imagination that hint at a future career in design or education.
  sports: Steven Maynard dashes around the Monaca community park every Saturday, gravitating toward the local youth soccer club’s tiny green field, cheering on the Pittsburgh Steelers on game day, and proudly
    waving a miniature Penguins banner during family outings to the arena.
  arts: Steven Maynard spends afternoons at preschool with crayons, recreating scenes from the classic picture book The Very Hungry Caterpillar, humming Disney’s Let It Go while painting watercolors inspired
    by Van Gogh’s starry night, and he eagerly awaits the annual community art fair to see local muralists at work.
  travel: Steven Maynard’s family road trips have taken him to the historic Liberty Bell in Philadelphia, the interactive Smithsonian museums in Washington, D.C., and a beach day at the New Jersey shore,
    and his current wish list includes a future adventure to Disneyland and a summer camping outing in the Allegheny hills.
  culinary: Steven Maynard adores buttery mac and cheese, bites into chicken nuggets with secret ketchup dips, and delights in helping his mom whisk pancake batter for Sunday breakfast, while he also enjoys
    the sweet tartness of fresh strawberries and the comforting warmth of pumpkin soup during Thanksgiving.
  core: Steven Maynard, a curious three‑year‑old, blends the cozy rhythms of suburban family life with an uncontainable appetite for art, play, and the occasional messy snack, all while navigating the world
    with a bright smile and boundless energy.
background:
  cultural: Steven comes from a white American family living in Monaca, Pennsylvania, a small community in Beaver County. His upbringing reflects typical suburban Mid-Atlantic values, emphasizing family
    togetherness, community participation, and modest independence. He attends a local preschool where multicultural picture books and inclusive play are part of the curriculum, fostering openness to diverse
    ideas. Family traditions include celebrating holidays such as Thanksgiving and the Fourth of July with community firework displays, and attending a local church that encourages kindness and service.
    These cultural influences provide a stable environment that nurtures his curiosity, sociability, and appreciation for art and new experiences.
