  hobbies: '[''Drawing and coloring with crayons'', ''Building with wooden blocks'', ''Imaginary role-play (explorer, builder, superhero)'', ''Listening to and asking about picture books'', ''Dancing and
    singing to music'', ''Outdoor explorations in the park (collecting leaves, observing insects)'']'
  career_goals: Steven’s aspirations reflect his vivid imagination and curiosity. He often says he wants to become an astronaut to explore space, a firefighter to help people, and an artist to create beautiful
    pictures. He shows enthusiasm for science kits and enjoys picture books about how things work, hinting at a budding ambition to be a scientist or inventor. While his goals are playful, they reveal a
    desire for exploration, contribution, and creative expression.
