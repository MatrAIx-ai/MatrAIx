personas:
  professional: Sally Simmons, a budding LEGO architect who loves assembling sturdy models, channels their love of routine into step‑by‑step building plans while allowing spontaneous creative twists, and
    they often volunteer to help classmates with group projects, showcasing their cooperative spirit.
  sports: Sally Simmons, who loves riding a bike on nearby forest trails, eagerly follows the local youth soccer club, the Greenfield Tigers, and roots for the hometown minor‑league baseball team the Riverdale
    Raptors, while they balance regular outdoor play with occasional organized practice sessions and maintain a relaxed, fun‑first attitude.
  arts: Sally Simmons, an avid drawer who fills pages with bright scenes inspired by Dr. Seuss's whimsical illustrations, delights in listening to the playful songs from Disney’s Frozen soundtrack and admires
    the colorful paintings of Henri Matisse, and they often share stickers of beloved cartoon characters with friends, reflecting their blend of routine creativity and cooperative spirit.
  travel: Sally Simmons, who enjoys family road trips to the countryside and a memorable weekend at the coastal lighthouse, dreams of exploring the giant LEGO sculptures at Legoland in Denmark and hopes
    to one day visit the snow‑capped peaks of the Rockies, preferring a relaxed itinerary that mixes familiar stops with a splash of adventure, and they rely on their parents to handle all the planning.
  culinary: Sally Simmons, a junior kitchen helper, loves sprinkling chocolate chips onto warm cookies, enjoys assembling peanut butter and jelly sandwiches with extra strawberry jam, and eagerly assists
    in whisking batter for banana pancakes, often insisting on adding a dash of cinnamon for extra flavor, reflecting their practical taste preferences and love for simple, repeatable cooking routines.
  core: Sally Simmons blends a love for routine LEGO building, sticker collecting, and gentle kindness with a flexible, easy‑going attitude that makes them a harmonious, if occasionally disorganized, little
    explorer.
background:
  cultural: 'Sally comes from a white, middle‑class family living in Arlington, Washington, a small community in Snohomish County. Her upbringing reflects typical Pacific‑Northwest suburban life: frequent
    outdoor activities like forest walks and bike rides, participation in community events such as the local farmer’s market, and celebrating widely observed American holidays with family traditions. The
    family places value on education, kindness, and community involvement, which aligns with her cooperative personality.'
