    in a reading nook"]'
  career_goals: Even at seven, Sally enjoys imagining future roles where she can continue to help others in a predictable, caring environment. She talks about becoming a teacher who can guide small classes,
    a veterinarian who cares for animals, or a community helper such as a librarian. Her underlying ambition is to create safe, organized spaces where children feel supported and valued.
