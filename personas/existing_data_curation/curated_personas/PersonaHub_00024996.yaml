persona_description: A historian who specializes in the study of English history, particularly the period from the reign of George II to the present day. Her research interests include the development of
  laws and policies towards Catholics in England, the impact of these laws on the Irish population, and the evolution of English character and policy towards Ireland. She is particularly interested in the
  role of the Papists in England and the rise of the English character that led to the current state of affairs in Ireland.
