  hobbies: '[''Native‑Plant Gardening'', ''Birdwatching'', ''Knitting'', ''Quilting'', ''Historical Fiction Book Club'', ''Volunteer Library Work'', ''Cooking Maryland Cuisine'', ''River Trail Walking'',
