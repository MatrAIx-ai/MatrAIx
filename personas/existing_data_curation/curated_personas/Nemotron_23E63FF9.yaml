  career_goals: Although retired, Kelly aims to channel her lifelong love of learning into mentoring younger teachers through a local “Teach‑Next” volunteer program, documenting the oral histories of Conowingo’s
    long‑time residents, and authoring a modest guide to the area’s native flora. She plans to complete a series of online courses in genealogy and environmental stewardship, and to stay actively involved
    in the town’s historical society, ensuring that her community’s stories are preserved for future generations while maintaining her health and independence.
