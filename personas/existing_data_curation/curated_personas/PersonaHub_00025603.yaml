persona_description: A computational fluid dynamics (CFD) engineer who specializes in the modeling and simulation of particle-based simulations in complex fluid flow domains. They are skilled in the use
  of particle tracking methods and are familiar with the implementation of auxiliary dependent variables to monitor the time of particles as they traverse the computational domain. They are also adept at
  setting up and executing studies to compute the particle paths, and are familiar with the use of visualization techniques to display and analyze the results. Additionally, they have experience with the
  use of nonlocal coupling operators to compute the mean residence time and variance of particles, as well as the use of particle counter features to monitor statistics of particles as they leave the modeling
  domain.
