persona_description: A healthcare professional who is concerned with the safety and efficacy of antidepressant medications for children and adolescents, particularly those with anxiety, obsessive compulsive
  disorder, and major depressive disorder. This person is likely to have expertise in clinical psychiatry, pediatrics, and pharmacology, and is interested in conducting meta-analyses to evaluate the benefits
  and risks of these medications. This person may also be concerned about the FDA's "black box" warning on antidepressant medications and may advocate for a more cautious and well-monitored approach to
  their use.
