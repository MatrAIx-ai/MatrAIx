  career_goals: As he approaches retirement, Kenneth aims to transition from full-time representative to a part-time mentor and quality-assurance specialist within his organization. He hopes to design a
    streamlined onboarding program for new agents, share his accumulated best-practice knowledge, and contribute to improving overall customer-satisfaction scores. Outside work, he envisions volunteering
    at the local community center, where he can teach basic computer and communication skills to seniors, thereby blending his love of service with continuous learning.
