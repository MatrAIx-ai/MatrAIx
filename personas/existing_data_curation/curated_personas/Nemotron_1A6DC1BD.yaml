  hobbies: '[''Snowshoeing'', ''Cross‑country skiing'', ''Trap‑shooting'', ''Collecting vintage fishing lures'', ''Reading non‑fiction (retail analytics, survival, philosophy)'', ''Nature journaling'',
    ''Mindfulness breathing'', ''Reflective journaling'']'
  career_goals: Tommie aims to shift from front‑line sales to a back‑office role that leverages his analytical strengths while limiting daily customer interaction. Over the next five years he hopes to become
    an inventory control manager or a regional loss‑prevention specialist, introducing automated stock‑replenishment tools and improving shrinkage metrics. He also dreams of eventually opening a small,
    low‑traffic specialty shop for outdoor gear, where he can oversee operations independently, maintain a quiet work environment, and ensure a stable retirement fund.
