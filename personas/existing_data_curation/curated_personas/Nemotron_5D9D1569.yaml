  hobbies: '[''Art Gallery Visits'', ''Jazz and Blues Concerts'', ''Photography'', ''Watercolor Painting'', ''Gardening'', ''Reading African American History'', ''Community Volunteering'', ''River Trail
    Hiking'']'
  career_goals: Edward aims to transition from site work to a mentorship‑focused role by establishing a small consulting firm that provides specialty terrazzo design for community art projects and historic
    restoration. He plans to earn a Green Building certification and collaborate with local artists to create public installations that blend functional flooring with visual storytelling. Additionally,
    he hopes to volunteer as a master tradesperson with Habitat for Humanity, passing his knowledge to the next generation and fostering inclusive, resilient neighborhoods.
