personas:
  professional: Edward Terry, a 63‑year‑old master cement mason and terrazzo specialist, blends three decades of meticulous concrete finishing with a calm, collaborative leadership style; they mentor apprentices
    and design community art installations that marry structural integrity with artistic storytelling, while pursuing Green Building certification to launch a consulting firm focused on sustainable public
    flooring.
  sports: Edward Terry stays active by walking the Columbia River Trail year‑round, they join the Evergreen Walking Club’s seasonal hikes, they cheer on the Portland Timbers and Portland Trail Blazers from
    their living room, and they occasionally play third base for the community’s summer softball league, a routine that balances solitary reflection with light‑hearted team camaraderie.
  arts: Edward Terry draws artistic inspiration from Jacob Lawrence’s narrative panels, the improvisational spirit of Miles Davis, and the vibrant murals of Portland’s own local artist who blends contemporary
    street art with historic motifs, they frequent jazz nights at Jimmy Mak’s, explore exhibitions at the Portland Art Museum, and capture the city’s textured streetscapes with their Leica camera, all of
    which inform their bespoke terrazzo patterns and delicate watercolor cityscapes.
  travel: Edward Terry prefers purposeful travel that blends cultural immersion with creative research, they have trekked through New Orleans’s French Quarter to soak in its jazz legacy, explored the National
    Museum of African American History and Culture in Washington, D.C., taken a week‑long road trip along Oregon’s coastline to capture seaside light, and now they dream of visiting Kyoto’s historic garden
    towns to study traditional composting techniques and Zen‑inspired design.
  culinary: Edward Terry, an enthusiastic backyard gardener, enjoys cooking seasonal farm‑to‑table meals such as heirloom tomato‑basil bruschetta, roasted beet and goat‑cheese salad with walnut vinaigrette,
    and miso‑glazed salmon seasoned with fresh dill and shiso, they often pair these dishes with a crisp Oregon pinot noir, and while their cooking skill is solid, they sometimes over‑salt their creations
    in an eager attempt to highlight flavors.
  core: Edward Terry channels their calm, art‑driven curiosity into a lifelong blend of terrazzo mastery, garden experiments, and midnight jazz listening, they habitually tap their foot to syncopated rhythms
    during project meetings and, despite a disciplined work ethic, they occasionally lose track of time while perfecting a new terrazzo pattern.
background:
  cultural: Edward was raised in a close‑knit African‑American family in Portland’s Eastside neighborhoods. His parents, both community activists, instilled a strong sense of collective responsibility and
    pride in Black heritage. He grew up attending church choirs, local cultural festivals, and neighborhood block parties that celebrated music, storytelling, and food. These experiences fostered his appreciation
    for artistic expression and his commitment to mentoring younger community members. While navigating the challenges of being a Black tradesperson in a predominantly white industry, Edward remains deeply
    connected to his cultural roots, drawing on the resilience and solidarity of his community in both his work and his personal life.
