persona_description: A librarian who specializes in information technology and the development of information systems, with a focus on creating and managing networks for the dissemination of cultural information
  resources. They have experience in bridging the gaps in access to cultural information resources through the use of technology and the development of new methods for accessing and organizing cultural
  information. They are aware of the barriers to access that have been created by specific traditions of custody and documentation and are interested in exploring possible strategies for bridging these
  barriers.
