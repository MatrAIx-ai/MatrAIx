personas:
  professional: Dawn Jones is an aspiring digital artist and budding robotics engineer who blends meticulous sketching, coding in Python, and a competitive drive to create award‑winning robot designs for
    their school’s robotics club while maintaining a rigorously organized workflow that mirrors their high academic standards.
  sports: Dawn Jones channels their competitive spirit into weekend matches with the San Antonio Youth Soccer Club, cheers for the San Antonio Spurs during NBA season, and balances high‑intensity drills
    with daily yoga sessions, while also joining their school's cross‑country team in the fall to maintain endurance.
  arts: Dawn Jones frequents the San Antonio Museum of Art to study works by contemporary creators such as Ai Weiwei and Kehinde Wiley, draws inspiration from digital trailblazers like Beeple and Loish
    for their own sketches, and fuels their imagination with science‑fiction novels by Octavia Butler and N.K. Jemisin, while curating playlists featuring Tame Impala and Halsey during their art sessions.
  travel: Dawn Jones plans their trips with a spreadsheet, has already explored Austin’s music scene, trekked the Rio Grande Gorge in New Mexico, and saved for a family visit to Mexico City’s murals, while
    dreaming of a solo backpacking adventure through Kyoto’s art districts and a summer road‑trip across the national parks of the American West.
  culinary: Dawn Jones, a self‑taught kitchen experimenter, regularly whips up avocado toast drizzled with sriracha, perfects spicy chicken ramen using miso and chili oil, and crafts homemade tacos al pastor
    with pineapple and cilantro, while they occasionally treat themselves to matcha‑infused smoothies and master the art of plating digital‑inspired edible designs.
  core: Dawn Jones blends a hyper‑organized, competition‑fueled mindset with a passion for sketching and robotics, turning every project into a disciplined experiment, though they sometimes over‑criticize
    their own work and neglect downtime.
background:
  cultural: Born and raised in Cibolo, a small town in Bexar County, Texas, Dawn grew up in a predominantly white, middle‑class family that values independence, self‑reliance, and a strong work ethic—hallmarks
    of traditional Texas culture. While her immediate community emphasizes close‑knit family ties and local traditions such as county fairs and community gatherings, the proximity to the culturally diverse
    San Antonio metropolitan area exposes her to a broad spectrum of artistic, musical, and culinary influences. This blend of Southern values and multicultural exposure shapes her open‑minded curiosity
    and appreciation for varied experiences.
