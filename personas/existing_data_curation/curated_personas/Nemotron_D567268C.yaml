  career_goals: Dawn aims to combine her love for art and technology by pursuing a career in visual communication and interactive design. She aspires to attend a top university for interdisciplinary design
    or human‑centered engineering, eventually becoming a graphic designer or creative director who leads innovative projects. Long‑term, she dreams of launching her own design studio that merges aesthetic
    excellence with cutting‑edge technology, positioning herself as a competitive leader in the field.
