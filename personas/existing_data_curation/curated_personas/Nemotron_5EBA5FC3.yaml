personas:
  professional: Horace French, a 20‑year‑old nursing assistant in Meridian who thrives on monitoring vitals, delivering wound care, and navigating EMR systems, balances meticulous organization with on‑the‑fly
    problem solving, and they are channeling their practical curiosity toward completing a CNA program, an associate‑degree in nursing, and ultimately a BSN to serve in emergency and rural community health.
  sports: Horace French, an avid hiker, mountain biker, and casual basketball player, cheers for the Boise State Broncos football team and the Idaho Vandals basketball squad, belongs to the Meridian Trail
    Riders biking club, and they spend Saturday mornings fly‑fishing on the Boise River, combining community spirit with personal fitness.
  arts: Horace French, who strums a battered acoustic guitar in his bedroom, frequently listens to John Mayer, Neil Young, and local folk singer Tyler Childers, enjoys occasional trips to the Boise Philharmonic
    concerts, watches indie films like 'The Rider' and classic westerns, and they let music and storytelling shape their downtime.
  travel: Horace French, a 20‑year‑old who balances school and work, plans weekend getaways to Yellowstone and Glacier National Parks, has already backpacked through the Rocky Mountains, dreams of a spring
    road trip along the Pacific Coast Highway, hopes to one day explore the fjords of Norway, and they budget carefully to keep travel affordable.
  culinary: Horace French, who enjoys cooking simple healthy meals, often prepares grilled trout with lemon‑herb quinoa, a hearty Idaho potato and kale soup, and snacks on trail mix made of almonds, dried
    cranberries, and dark chocolate, while they occasionally indulge in a greasy cheeseburger after a long shift.
  core: Horace French, a pragmatic yet curious 20‑year‑old nursing assistant, blends a love for the Idaho outdoors with a disciplined approach to career, finances, and self‑care, and they often hum folk
    tunes while planning their next mountain‑bike adventure.
background:
  cultural: Horace grew up in a middle‑class, predominantly white suburban community in Meridian, Idaho. The local culture emphasizes self‑reliance, respect for the outdoors, and a strong sense of neighborly
    responsibility. Family traditions such as weekend barbecues, high‑school football gatherings, and participation in county fairs have shaped his appreciation for community cohesion. At the same time,
    the broader American West values of practicality, modesty, and service have informed his decision to work in healthcare early on. He balances exposure to national pop culture—music, sports, and technology—with
    the grounded, slower‑paced rhythm of Idaho’s natural landscape, creating a cultural outlook that values both modern ideas and time‑tested local customs.
attributes:
  skills: '[''Vital signs monitoring'', ''Basic wound care'', ''Patient mobility assistance'', ''Infection control protocols'', ''Electronic Medical Records (EMR) entry'', ''CPR and First Aid certification'',
    ''Compassionate communication with patients and healthcare team'', ''Time management and scheduling'', ''Problem solving in clinical settings'', ''Basic anatomy knowledge'', ''Adaptability to shifting
    priorities'']'
  hobbies: '[''Hiking in the Boise Foothills'', ''Fly fishing on the Boise River'', ''Mountain biking'', ''Reading medical and science literature'', ''Strategy video gaming'', ''Volunteering at the local
    food bank'', ''Playing acoustic guitar'', ''Casual basketball games'', ''Cooking healthy meals'']'
  career_goals: Horace aims to transform his hands‑on experience into a full nursing career. His immediate goal is to complete a Certified Nursing Assistant (CNA) program and enroll in an associate‑degree
    nursing (ADN) track at a nearby community college, with the long‑term ambition of earning a Bachelor of Science in Nursing (BSN) and becoming a Registered Nurse. He is especially drawn to emergency
    and community health nursing, hoping to work in a fast‑paced ER or provide outreach services in rural Idaho. Over the next decade, he envisions pursuing a nurse practitioner credential or a master’s
    degree in nursing administration to lead quality‑improvement initiatives and mentor new entrants to the profession.
