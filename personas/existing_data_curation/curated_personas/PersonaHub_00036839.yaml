persona_description: A medical school admissions committee member who values and prioritizes non-academic personal qualities, such as communication skills, patient relation abilities, and practical experience,
  in addition to academic ability, when selecting medical students. They are aware of the importance of non-academic personal qualities in the learning and practice of medicine, and they strive to ensure
  that the limited student positions available go to individuals who will make outstanding doctors. They understand the importance of community feedback and are open to incorporating these insights into
  their selection process. They are committed to promoting diversity and inclusion in medical education, and they are willing to make changes to their selection policy as necessary to reflect these values.
