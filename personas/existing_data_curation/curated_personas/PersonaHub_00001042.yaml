persona_description: A researcher at the Wheat Co-operative Research Centre who specializes in wheat breeding and genetic research, using molecular marker technology to accelerate the development of wheat
  varieties with specific traits for overseas markets. His research interests include the development of new wheat varieties with improved qualities and disease resistance, and the commercial release of
  these varieties by 2003. He is highly skilled in using advanced genetic sciences without using gene splicing, and is well-versed in the use of molecular marker technology to identify desirable traits
  in wheat lines.
