personas:
  professional: Anthony Arsenault, a 19‑year‑old emerging visual artist and digital illustrator, blends traditional drawing, Photoshop, and Procreate skills with community‑center facilitation to create
    socially‑conscious murals and freelance commissions, all while embracing a laid‑back, occasionally disorganized workflow.
  sports: Anthony Arsenault enjoys occasional weekend hikes on the Appalachian Trail, follows the Philadelphia Eagles and Phillies with enthusiastic but low‑key fandom, and participates in a small, informal
    Saturday morning ultimate Frisbee pick‑up group, preferring spontaneous outdoor activity over a regimented gym routine.
  arts: Anthony Arsenault immerses themselves in Philadelphia’s indie gallery circuit, takes visual cues from artists like Yayoi Kusama and Shepard Fairey, curates playlists that feature experimental musicians
    such as Aphex Twin and FKA twigs, and reads contemporary fiction by Ocean Vuong and Sally Rooney, weaving these diverse influences into their mixed‑media sketches and digital illustrations.
  travel: Anthony Arsenault favors spontaneous weekend trips, often backpacking the Catskills or hopping a train to New York City for pop‑up gallery shows, while dreaming of a solo art pilgrimage to Barcelona’s
    street murals and Kyoto’s Zen gardens, balancing a tight student budget with a craving for immersive cultural experiences.
  culinary: Anthony Arsenault delights in preparing simple vegetarian meals like chickpea falafel wraps, roasted vegetable quinoa bowls, and avocado toast topped with heirloom tomatoes, experimenting with
    fresh basil, lemon zest, and smoked paprika while swapping recipes and cooking tips during community‑kitchen volunteer shifts.
  core: Anthony Arsenault is a free‑spirited 19‑year‑old visual storyteller who channels curiosity and compassion into art‑driven community work, thriving on spontaneous creativity while occasionally missing
    deadlines or dentist appointments due to their relaxed, disorganized rhythm.
background:
  cultural: Anthony's surname reflects a French-Canadian heritage; his grandparents emigrated from the Acadian region of New Brunswick to Pennsylvania in the 1970s. Raised in Feasterville-Trevose, he grew
    up in a predominantly suburban, middle-class white community in Bucks County, where he was exposed to both mainstream American culture and subtle French-Canadian traditions at family gatherings, such
    as celebrating Saint-Jean-Baptiste and enjoying dishes like tourtière. The county's mix of historic Pennsylvania German influences and proximity to Philadelphia's vibrant arts scene has also shaped
    his appreciation for diverse artistic expressions and community involvement.
