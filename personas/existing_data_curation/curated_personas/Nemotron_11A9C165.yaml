  career_goals: Anthony aspires to build a sustainable career that merges his artistic talents with his desire to help others. In the next few years he plans to expand his portfolio, secure part-time freelance
    commissions, and volunteer as an art facilitator for youth programs in Bucks County. He intends to enroll in a bachelor's program in Fine Arts or Art Therapy to deepen his practice and eventually work
    at a community center or nonprofit where he can lead workshops that use art for emotional wellbeing and social connection. He also hopes to launch an online platform that showcases socially conscious
    artwork and provides mentorship for emerging artists.
