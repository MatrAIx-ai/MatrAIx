  hobbies: '["Garden cultivation (herbs, roses, lilacs)", "Reading (classics, poetry)", "Knitting and crocheting", "Playing bridge", "Walking on the beach", "Birdwatching", "Volunteer at the Chatham Historical
    Society", "Cooking and preserving (jam, pickles)", "Attending community theater", "Genealogy research"]'
  career_goals: Although retired, Karri aims to preserve and share the history of her family and community. She plans to complete a memoir that chronicles her years as a high school English teacher and
    her decades of volunteer work with the Chatham Historical Society. She also hopes to mentor new volunteers, contribute regularly to the town library’s reading program, maintain her health through daily
    walks and gardening, and support her husband and grandchildren by staying actively involved in family gatherings and occasional trips to see them.
