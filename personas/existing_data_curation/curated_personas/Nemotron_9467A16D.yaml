personas:
  professional: Angie Jones is a retired community organizer and church volunteer who blends budgeting expertise, conflict mediation, and genealogical research to coordinate senior outreach and lead a quilting
    circle, reflecting a practical, structure‑oriented mindset tempered by a gentle flexibility, and they approach each task with patient determination.
  sports: Angie Jones follows the Dallas Cowboys, the Texas Rangers, and the Houston Rockets on television, attends local senior walking clubs at Lake Central, participates in the Killeen Women’s Bowling
    League, and enjoys cheering on the Fort Hood Roughnecks during occasional base‑hosted basketball games, and they never miss the weekly senior walking club, eagerly greeting fellow walkers with a bright
    smile.
  arts: Angie Jones sings in their church choir, immerses themselves in gospel legends like Mahalia Jackson and Stevie Wonder, quilts using heirloom fabrics while listening to classic R&B from Aretha Franklin,
    and finds inspiration in historical fiction authors such as Toni Morrison and Alex Haley, weaving these artistic threads into daily life, and they often hum the melodies while stitching to guide the
    pattern.
  travel: Angie Jones dreams of traveling to Louisiana for a family reunion, touring civil‑rights landmarks in Montgomery and Selma, and has already explored New Orleans' historic French Quarter, preferring
    organized group tours that accommodate their walking pace and fixed budget, and they schedule trips months in advance to ensure comfort and affordability.
  culinary: Angie Jones delights in cooking soul‑food classics like collard greens seasoned with smoked turkey, shrimp étouffée, and cornbread with honey butter, often harvesting basil, thyme, and okra
    from their garden, and skillfully blends Creole seasoning into dishes while they occasionally over‑salt their gumbo in a burst of enthusiastic flavor.
  core: Angie Jones embodies a steadfast, community‑centered spirit, balancing meticulous budgeting and health vigilance with a penchant for late‑night gospel sing‑alongs, occasional medication forgetfulness,
    and a habit of humming hymns while they stir the pot.
background:
  cultural: Angie was raised in a close-knit African-American community in Texas during the mid-20th century. Her family’s roots trace back to the Great Migration, with grandparents who moved from the Deep
    South seeking work and greater freedom. Church has been the cornerstone of her cultural identity, shaping values of communal support, worship through music, and service. She carries Southern culinary
    traditions—creole seasoning, collard greens, and cornbread—while also embracing the broader Black cultural renaissance of the 1960s and 1970s that sparked her interest in civil‑rights history. Living
    in Killeen, near a large military base, she has interacted with a diverse population, blending the hospitality of Texan culture with the solidarity of Black Southern heritage.
attributes:
  skills: '[''Traditional Southern cooking'', ''Budgeting and household finance'', ''Sewing and quilting'', ''Community event coordination'', ''Mentoring youth'', ''Genealogy research'', ''Conflict mediation'']'
  hobbies: '[''Gardening (vegetables and herbs)'', ''Quilting and patchwork'', ''Cooking Southern comfort food'', ''Church choir singing'', ''Genealogy research'', ''Reading historical fiction'', ''Walking
    in local parks'', ''Bingo nights'', ''Listening to soul and gospel music'']'
  career_goals: Although retired, Angie remains goal-oriented. She aims to preserve her family’s history by completing a memoir and a detailed family tree, and to pass that knowledge on to her grandchildren.
    She aspires to stay physically active through daily walks in the park and gentle stretching, while maintaining her health through regular medical check-ups. Volunteering at her church’s senior outreach
    program and leading a small quilting circle for other seniors are also priorities. Travel ambitions are modest—she hopes to attend a family reunion in Louisiana and visit historic civil‑rights sites
    in Montgomery and Selma.
