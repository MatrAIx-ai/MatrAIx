persona_description: A scientist who specializes in RNA biology and circRNA research, with expertise in the identification, characterization, and functional analysis of circRNAs in the mammalian brain.
  They are interested in the evolutionary conservation and dynamic expression patterns of circRNAs, and how they contribute to the regulation of neural gene expression. They have experience with sequencing
  RNA from different brain regions, isolating primary neurons, and analyzing circRNAs using computational and experimental methods. They are also familiar with RNA editing and the role of ADAR1 in circRNA
  biogenesis. They have published several papers in leading scientific journals, including the report on circRNAs in the mammalian brain.
