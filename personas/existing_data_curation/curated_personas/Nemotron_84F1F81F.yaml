  career_goals: Armando dreams of becoming an astronaut one day so he can explore space and discover new worlds, and he is also fascinated by the idea of being an engineer who builds tools to help people.
    He sometimes imagines wearing a firefighter's helmet to protect his neighborhood. Though he is only six, he already talks about studying hard at school, learning more science and math, and staying bilingual
    to reach his goals. His practical side tells him that mastering reading and math now will be the foundation for any future career he chooses.
