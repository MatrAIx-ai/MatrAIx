personas:
  professional: Armando Santiago is a budding junior architect who channels their organized curiosity into building intricate LEGO structures, meticulously planning each build while confidently sharing
    ideas with peers, and they reliably follow through on their creative visions.
  sports: Armando Santiago plays forward for the Hobbs Little Lions Youth Soccer Club, practices twice a week at the local park, cheers for the Texas Rangers baseball team and the Dallas Cowboys football
    team, and they balance competitive drive with teamwork, organizing friendly matches while showing cooperative yet assertive spirit.
  arts: Armando Santiago draws cartoon characters inspired by PJ Masks and SpongeBob during free time, listens to traditional mariachi music alongside pop hits from Taylor Swift, and they attend community
    arts fairs where they practice rhythm by clapping along, reflecting a curious yet practical approach to creative expression.
  travel: Armando Santiago has explored the desert dunes near Hobbs, visited Carlsbad Caverns, dreams of seeing the Grand Canyon and Disneyland, and they prefer structured day trips with clear itineraries
    while letting their curiosity lead them to ask endless questions about new places, balancing solo wonder with group outings.
  culinary: Armando Santiago helps in the kitchen by stirring batter for tortas, assembling chicken quesadillas with shredded cheese and jalapeño, and they enjoy tasting the crispy results, often lining
    up ingredients meticulously before cooking, though they occasionally sneak extra cheese when no one watches, showing a blend of methodical planning and playful indulgence.
  core: Armando Santiago is a curious, organized six-year-old who balances LEGO building, soccer, kitchen chores, and disciplined allowance savings with a practical, stress-free approach to life, and they
    occasionally assert their preferences in playful ways.
background:
  cultural: Armando grows up in a Mexican‑American household in Hobbs, New Mexico, where Spanish is spoken alongside English. His family keeps Mexican traditions alive by celebrating Día de los Muertos
    with colorful altars, enjoying Cinco de Mayo with homemade tacos and tamales, and listening to mariachi and regional folk songs. He learns respect for elders, the value of hard work, and the importance
    of community, reflecting both his heritage and the close‑knit, oil‑town spirit of Lea County. Bilingual storytelling at bedtime and regular visits to local cultural events reinforce his pride in both
    Mexican roots and his American hometown.
