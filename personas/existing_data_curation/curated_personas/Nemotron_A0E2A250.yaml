  hobbies: '[''Reading fantasy books'', ''Drawing imaginative scenes'', ''Building LEGO models'', ''Nature walks and collecting rocks'', ''Solving puzzles'', ''Keeping a personal journal'']'
  career_goals: Evelyn’s imagination fuels ambitious dreams about the future. She hopes one day to become a scientific illustrator who can combine her love of art and the natural world, drawing accurate
    yet whimsical pictures of Appalachian plants, animals, and even imagined alien life. She also dreams of working as a museum curator, designing interactive exhibits that let visitors explore the mountains
    and forests she cherishes. Occasionally, she imagines herself as an astronaut or astronomer, charting distant galaxies and turning abstract concepts into visual stories. At this stage, her goals revolve
    around learning, creating, and sharing her unique vision with others.
