personas:
  professional: Janelle Soto, a retired bookkeeping and office administration specialist, applies their meticulous record‑keeping, bilingual fluency, and habit of methodical planning to volunteer free accounting
    assistance for fellow seniors while they carefully preserve their own financial independence.
  sports: Janelle Soto enjoys solitary morning walks among their garden and gentle stretching at the Joelton Senior Walkers Club, while they quietly root for the Tennessee Titans on football Sundays and
    follow the Nashville Predators’ hockey season, preferring low‑impact activity that fits their structured, low‑stimulus routine.
  arts: Janelle Soto finds creative fulfillment crocheting intricate afghans inspired by the patterns of Frida Kahlo’s paintings, losing themselves in the mystery novels of Agatha Christie, while they listen
    to the soothing guitar melodies of Andrés Segovia and the classic croons of Frank Sinatra during quiet evenings.
  travel: Janelle Soto prefers meticulously planned road trips that blend quiet historic charm with gentle adventure, such as weekend escapes to Savannah, Georgia’s tree‑lined squares, the sun‑kissed streets
    of Amelia Island, Florida, and a dreamed‑for pilgrimage to the centuries‑old cathedral town of Segovia, Spain, while they keep a modest budget that keeps their journeys short and seasonal.
  culinary: Janelle Soto delights in preparing traditional baleadas with freshly made corn tortillas, refried beans, crema, and queso fresco, as well as slow‑cooked pork tamales wrapped in banana leaves,
    while they season garden‑grown tomatoes, peppers, and basil to infuse every meal with bright, home‑grown flavors.
  core: Janelle Soto balances a lifelong devotion to order and solitude with a stubborn habit of over‑checking every financial detail, finding calm in crocheting perfect afghans while they quietly wrestle
    with persistent worries about tomorrow’s bill.
background:
  cultural: Janelle was raised in a Honduran household where Spanish was spoken daily and Catholic traditions guided family life. She grew up celebrating Semana Santa, Día de la Madre, and the Honduran
    Independence Day with specific foods, music, and communal gatherings. These cultural practices instilled a deep respect for family, community, and heritage. After moving to Joelton, Tennessee, she blended
    her Latin roots with Southern customs, participating in local potlucks while still preparing traditional dishes for neighbors. Her identity is shaped by the values of perseverance and hospitality from
    her Honduran upbringing, combined with the modest, self‑reliant ethos of small‑town Tennessee.
