  career_goals: Although Janelle is retired, she remains goal‑oriented. She aims to preserve her financial independence by maintaining an organized personal budget and ensuring her health‑care plans are
    up to date. She wishes to volunteer part‑time at the local senior center, offering free bookkeeping assistance to other retirees and helping organize community events. A long‑standing ambition is to
    compile a family cookbook that documents Honduran recipes and the stories behind them, which she plans to self‑publish for her grandchildren. She also wants to stay mentally sharp by learning basic
    computer skills for video‑calling, so she can remain connected with family across the country.
