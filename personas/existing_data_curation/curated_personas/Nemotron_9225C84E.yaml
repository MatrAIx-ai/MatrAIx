personas:
  professional: Rachel Schmedding, a veteran carpenter shifting toward a boutique custom-furniture studio, they apply four decades of framing, finish carpentry, decorative inlay, and historic restoration
    expertise while using their organized, methodical planning and sociable mentorship to guide apprentices - particularly women - into sustainable, community-centered projects.
  sports: Rachel Schmedding, an avid outdoors enthusiast, they enjoy weekend hikes along the Kankakee River State Park and participate in a local walking club meeting at the Jacksonville Community Center,
    while cheering on the Chicago Cubs in summer, the Chicago Bears in fall, and the Illinois Fighting Illini basketball team, balancing low-impact cardio with volunteer park clean-ups.
  arts: Rachel Schmedding, a lifelong art lover, they frequently visit the Art Institute of Chicago to study modern sculpture by Anish Kapoor and folk paintings reminiscent of Grandma Moses, paint watercolors
    of Illinois prairies inspired by Monet's palette, and play mandolin in community sessions featuring songs by Bob Dylan and The Milk Carton Kids, while a book-club devotion to authors like Toni Morrison
    rounds out their artistic life.
  travel: Rachel Schmedding, a methodical traveler, they prefer well-planned road trips that blend cultural immersion with natural beauty, having driven historic Route 66 to explore Oklahoma's prairie towns,
    spent a summer in Norway's fjords to study traditional wooden stave churches, and taken a weekend retreat at the historic Biltmore Estate, while budgeting travel around workshop commitments and their
    single-person household.
  culinary: Rachel Schmedding, a passionate home cook, they enjoy preparing hearty Midwestern dishes such as corn-bread casserole with heirloom tomatoes, hand-kneading sourdough for rustic loaves, and occasional
    schnitzel with fresh dill and sauerkraut, while never missing a slice of apple-spice pie at the county fair and proudly sourcing herbs from their native prairie garden.
  core: Rachel Schmedding blends a carpenter's precision with an artist's curiosity, they mentor apprentices at the swing of a hand plane while secretly hoarding vintage tool catalogs and forgetting to
    water indoor ferns on rainy days.
background:
  cultural: Rachel grew up in central Illinois in a small, close‑knit community that values hard work, self‑reliance, and neighborly support. Her family heritage traces back to German and Northern European
    settlers who farmed the region, and she was raised with Midwestern traditions such as church involvement, county fairs, and 4‑H activities. The local culture celebrates practical craftsmanship, folk
    arts like quilting and simple woodwork, and a deep respect for the agricultural landscape. These influences fostered her appreciation for functional beauty and community service. As a never‑married
    woman who pursued a traditionally male trade, Rachel embodies the evolving gender norms of the Midwest while maintaining the region’s modest, cooperative spirit.
