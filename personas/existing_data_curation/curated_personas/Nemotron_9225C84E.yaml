  hobbies: '[''Visiting art museums'', ''Watercolor painting'', ''Genealogy research'', ''Native gardening'', ''Hiking'', ''Volunteering with Habitat for Humanity'', ''Playing mandolin'', ''Book club'',
    ''Potluck hosting'', ''Collecting vintage woodworking tools'']'
  career_goals: With retirement approaching, Rachel aims to transition from full-time construction to running a boutique custom-furniture studio that blends traditional craftsmanship with contemporary artistic
    designs. She plans to document and preserve local historic building techniques through a guidebook and instructional videos for the community college. Rachel also wants to launch weekly community carpentry
    workshops for seniors and youth, fostering inclusive participation and encouraging more women to enter the trade. She hopes to collaborate with the Jacksonville arts council on public art installations
    that celebrate regional heritage, and to advocate for sustainable, environmentally responsible wood sourcing. Over the next few years she intends to focus more on design consulting, mentorship, and
    creative projects while gradually reducing hands‑on labor.
