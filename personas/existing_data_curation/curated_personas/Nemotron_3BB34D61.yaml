  career_goals: Gregory aims to translate his community‑focused soft skills into a full‑time role in the non‑profit sector, targeting positions such as community outreach coordinator or youth program manager
    with a Boise‑based organization. Over the next two years he plans to complete a nonprofit management certification and become a certified first‑aid instructor, positioning himself for leadership of
    a community center that blends environmental education with social services. He also hopes to launch a part‑time guided hiking program that leverages his outdoor expertise and supplements his primary
    career while fostering local stewardship.
