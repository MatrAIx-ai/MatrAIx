personas:
  professional: Ramsey Edmonson is a veteran construction manager who leverages fifteen years of hands‑on experience translating architectural plans into on‑time, budget‑constrained builds while integrating
    emerging sustainable technologies and mentoring crews, and they approach every project with a competitive, detail‑driven mindset.
  sports: Ramsey Edmonson is an avid fly‑fisher on the White River, a seasonal elk hunter, and a dedicated member of the local hunting club who cheers the Arkansas Razorbacks while they occasionally join
    a weekend grass‑roots softball league.
  arts: Ramsey Edmonson finds creative release in crafting custom reclaimed‑wood furniture, listening to folk legends like Gillian Welch and the Avett Brothers, and immersing in historical nonfiction by
    David McCullough, which together shape their appreciation for Americana artistry, and they often display finished pieces at regional craft fairs.
  travel: Ramsey Edmonson prefers meticulously planned road trips to outdoor destinations such as the Ozark National Forest and Yellowstone, yet they sometimes add a spontaneous hunting excursion to Colorado’s
    Rocky Mountains, balancing a love for solitude with family visits at county fairs.
  culinary: Ramsey Edmonson enjoys cooking freshly caught trout almondine, slow‑smoked pork ribs, and skillet‑fried catfish seasoned with garden‑grown herbs, while they possess modest culinary skill that
    lets them experiment with Southern comfort dishes and pair meals with craft beers.
  core: Ramsey Edmonson blends a competitive, detail‑oriented construction career with solitary hobbies, meticulous budgeting, anxiety‑driven self‑care rituals, and a deep love for Ozark‑rooted traditions,
    and they navigate life with a pragmatic yet curious mindset.
background:
  cultural: Ramsey grew up in a white, working‑class family on the outskirts of Batesville, Arkansas, steeped in Ozark and Southern traditions. The community emphasized self‑reliance, a strong Protestant
    work ethic, and close‑knit family ties, with gatherings centered around church events, county fairs, and outdoor activities like hunting and fishing. While his upbringing was relatively homogenous,
    his innate curiosity has led him to explore broader perspectives through reading, occasional travel, and exposure to diverse construction practices. These cultural roots shape his practical sensibility,
    respect for established methods, and competitive drive, while also informing his desire to preserve regional heritage in his professional and personal life.
