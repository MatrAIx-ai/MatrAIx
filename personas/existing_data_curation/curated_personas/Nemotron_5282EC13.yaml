    and inspection'', ''Procurement and supply chain management'']'
  hobbies: '[''Woodworking and custom furniture making'', ''Fly fishing in the White River'', ''Hunting (deer and turkey)'', ''Model railroading'', ''Reading historical nonfiction'', ''Chess (online and
    club play)'', ''Gardening and vegetable patch'', ''DIY home renovation projects'', ''Listening to classic country music'', ''Meditation and journaling'']'
  career_goals: Ramsey aims to earn a bachelor’s degree in construction management and attain PMP and LEED‑AP certifications within the next three years. He aspires to advance to a regional construction
    director role, overseeing multiple sites and championing sustainable building practices across the Midwest and South. Ultimately, he hopes to launch his own family‑owned construction firm that emphasizes
    employee well‑being, offers mentorship for younger tradespeople, and integrates innovative, eco‑friendly methods while honoring proven trade skills.
