  hobbies: '[''Hiking and biking'', ''Street photography'', ''Cooking Mexican and Tex‑Mex dishes'', ''Attending tech meetups'', ''Reading science and psychology non‑fiction'', ''Playing guitar'', ''Solving
    puzzles'']'
  career_goals: Joel aims to advance to a senior compliance leadership role within the next five years, targeting positions such as Senior Compliance Manager or Chief Compliance Officer in a fast‑growing
    tech or fintech firm. He plans to deepen his expertise in emerging regulatory areas like data privacy, AI ethics, and blockchain compliance, and intends to acquire certifications such as CIPP/US and
    Certified Information Systems Auditor (CISA). Joel also aspires to mentor junior compliance staff, develop streamlined, data‑driven compliance frameworks, and contribute thought leadership through industry
    conferences and articles.
