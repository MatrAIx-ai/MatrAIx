personas:
  professional: Joel Pedrero is a compliance officer who merges his STEM foundation with a curiosity for emerging tech, using Python, SQL, and Tableau to automate risk assessments and craft data‑driven
    dashboards, while they maintain a laid‑back, flexible work style that occasionally leads to missed follow‑ups but fuels inventive regulatory solutions.
  sports: Joel Pedrero stays active by biking the Lady Bird Lake trail with the Austin Biking Club, joins weekend pick‑up basketball games at Zilker Park, and rallies behind Austin FC in MLS and the Texas
    Longhorns during fall football, while they blend a love for outdoor fitness with loyal local team spirit.
  arts: Joel Pedrero practices street photography, capturing Austin’s murals with a lens inspired by Banksy’s urban edge and the vivid color stories of Diego Rivera, while they unwind on an electric guitar
    playing songs by St. Vincent and Kacey Musgraves, and they enjoy indie films by director Ava DuVernay.
  travel: Joel Pedrero favors spontaneous road trips, having chased sunrise over Texas Hill Country vineyards and taken a weekend escape to Santa Fe’s art scene, while they dream of wandering Tokyo’s neon
    districts and trekking Patagonia’s Torres del Paine for a mix of cultural immersion and rugged adventure.
  culinary: Joel Pedrero loves cooking traditional tamales and hearty pozole, often seasoning them with chipotle‑smoked brisket and fresh cilantro, while they experiment with Tex‑Mex fusion tacos that blend
    queso fresco, avocado, and a jalapeño‑lime crema, showcasing a skillful balance between authenticity and culinary innovation.
  core: Joel Pedrero is a data‑driven compliance specialist who balances a love for outdoor spontaneity, street photography, and Tex‑Mex cooking with a laid‑back, occasionally disorganized lifestyle that
    fuels creativity but sometimes leaves deadlines hanging, while they constantly seek new ways to merge compliance rigor with personal passions.
background:
  cultural: Joel was raised in a Mexican‑American household in Austin, where both Spanish and English were spoken daily. Family traditions such as celebrating Día de los Muertos and cooking homemade tamales
    remain central to his identity. He regularly participates in local Mexican cultural festivals and volunteers with community organizations that support Hispanic youth in STEM. His bicultural upbringing
    gives him a nuanced perspective on diversity and inclusion, which he brings to his professional collaborations.
