  career_goals: Cassandra plans to finish her secondary education, obtaining a high school diploma or GED, and then pursue a Certified Nursing Assistant (CNA) certification as a concrete first step into
    the healthcare field. She values the clear, structured training and the ability to work in small, supportive teams, which aligns with her preference for predictability and practical impact. In the medium
    term, she aims to enroll in an associate‑degree nursing program to become a Licensed Practical Nurse (LPN), and ultimately achieve Registered Nurse (RN) status with a focus on pediatric care, allowing
    her to combine her compassion with a routine‑driven environment. To support these goals, she intends to volunteer at the local community health clinic, shadow medical professionals, and further develop
    her knowledge of patient care and medical documentation.
