personas:
  professional: Michael Milicevic is a budding junior architect‑scientist who spends countless afternoons building LEGO rockets and dinosaurs, turning curiosity into practical designs while keeping their
    work area tidy and sharing step‑by‑step guides with neighborhood friends.
  sports: Michael Milicevic dazzles on the soccer field with the Junior Strikers Soccer Club, idolizing the Seattle Sounders FC for their teamwork, and they eagerly cheer for the Seattle Seahawks during
    football season, balancing competitive spirit with a cooperative, fair‑play attitude that mirrors their love for group games in the neighborhood park.
  arts: Michael Milicevic loves drawing vibrant animals and soaring rockets, inspired by the whimsical worlds of Dr. Seuss and the educational adventures of The Magic School Bus, and they often sing along
    to Raffi’s ‘Baby Beluga’ and The Wiggles’ ‘Fruit Salad’ while experimenting with crayons, markers, and occasional glitter mishaps.
  travel: Michael Milicevic enjoys weekend expeditions to the local science museum and the nearby river trail, dreaming of a future visit to the Kennedy Space Center in Florida, and they prefer traveling
    with family’s organized itinerary yet delight in spontaneous detours to collect cool rocks and leaf samples.
  culinary: Michael Milicevic favors cheesy pizza slices, chicken nuggets, and homemade spaghetti with meatballs, often sprinkling extra cheddar cheese on everything, and they proudly help stir fruit salad
    with apples, strawberries, and banana, though they sometimes overindulge in sugary cereals before school.
  core: Michael Milicevic is a curious, organized six‑year‑old who builds LEGO universes, saves allowance in a piggy bank, tackles mild allergies with a smile, and thrives on soccer, crayons, and family
    adventures, all while occasionally forgetting to brush their teeth.
background:
  cultural: Michael is raised in a middle‑class white family in Mishawaka, Indiana, with Eastern European (Serbian) heritage reflected in his surname. He celebrates typical American holidays such as Thanksgiving,
    Fourth of July, and Christmas, while his family also observes occasional cultural traditions like a family "slava" (patron saint day) and shares stories from their ancestral homeland. Attending a local
    public elementary school, he is influenced by Midwestern values of kindness, cooperation, and community involvement. The blend of mainstream American culture and subtle Eastern European customs shapes
    his worldview, encouraging both curiosity about the wider world and a practical, harmonious approach to daily life.
