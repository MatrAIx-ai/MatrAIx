  career_goals: Michael dreams of becoming someone who builds and helps. He often talks about wanting to be an engineer or astronaut who designs cool things for people, or a firefighter who rescues others.
    He enjoys imagining how things work and hopes to turn those ideas into real solutions that help his friends and community. He also expresses a desire to be a teacher one day, sharing his love of learning
    with others.
