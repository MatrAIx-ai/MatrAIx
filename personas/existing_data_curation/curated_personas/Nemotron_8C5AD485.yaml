  hobbies: '[''Art gallery visits'', ''Backyard woodworking'', ''Acoustic guitar'', ''Photography'', ''River fishing'', ''Science fiction reading'', ''Trail hiking'', ''Vintage computer restoration'', ''Regional
    hackathon participation'']'
  career_goals: John aims to transition from a hands‑on analyst to a senior enterprise architect within the next five years, focusing on modernizing healthcare IT systems for regional hospitals in Arkansas.
    He plans to earn an AWS Solutions Architect Professional and CISSP certification to solidify his expertise in cloud security. Driven by his curiosity, he wants to lead a cross‑functional team that integrates
    AI‑driven analytics into small‑business workflows, showcasing unconventional technology applications. Additionally, John seeks to mentor emerging tech talent in Paragould by establishing a community
    tech lab, balancing his competitive drive with a desire to give back. Ultimately, he envisions a consulting role where he helps legacy companies adopt flexible, future‑proof solutions while maintaining
    a low‑key, independent work style.
