personas:
  professional: John Rodrigue, a veteran computer systems analyst with three decades of experience, channels his competitive curiosity and occasional disorganization into designing enterprise architectures
    that blend legacy mainframes with AWS cloud solutions for regional Arkansas hospitals, while leading hackathons, mentoring junior staff, and pursuing AWS Solutions Architect Professional and CISSP certifications
    to cement his transition to senior enterprise architect.
  sports: John Rodrigue, an avid weekend angler on the St. Francis River and regular hiker of Crowley’s Ridge, follows the Arkansas Razorbacks football, the St. Louis Cardinals baseball, and occasionally
    catches a Memphis Grizzlies game on TV, while participating in a local fly‑fishing club and preferring low‑key cardio like brisk walks over gym workouts, though he often forgets his water bottle on
    longer treks.
  arts: John Rodrigue, a dedicated visitor of the Craighead County Arts Center, spends Saturday mornings sketching murals in downtown Paragould, captures the Ozark foothills’ shifting light with a vintage
    Nikon, and unwinds by playing acoustic guitar to the sounds of "Bob Dylan", "Joan Baez", and "Muddy Waters", while regularly attending regional folk festivals and collecting limited‑edition prints by
    contemporary muralist Emily Harper.
  travel: John Rodrigue favors loosely planned road trips that blend fishing expeditions on the St. Francis River with cultural stops, having recently explored the scenic Ozark National Forest, sampled
    jazz and gumbo in New Orleans, attended a tech hackathon in Berlin, and dreamed of a future retreat to Kyoto’s temples, all while managing travel costs through a dedicated savings account and prioritizing
    visits that offer both solitude and opportunities to photograph untouched landscapes.
  culinary: John Rodrigue, a moderately skilled home chef, relishes preparing Southern staples such as pecan‑crusted trout, smoked barbecue ribs, and fried green tomatoes seasoned with smoked paprika and
    fresh thyme, often cooking while strumming his acoustic guitar and pairing meals with locally brewed craft beer, though he occasionally lets the pantry run dry because his relaxed scheduling leads to
    last‑minute grocery runs.
  core: John Rodrigue, a curious 53‑year‑old systems analyst who blends analytical rigor with a love for sketching, vintage computers, and solitary fishing, approaches life with competitive drive, relaxed
    organization, and a habit of turning every hobby into a low‑key, self‑directed project.
background:
  cultural: 'John grew up in a white, middle‑class family in Paragould, Arkansas. His upbringing was anchored in the values of the rural South: a strong work ethic, modesty, and community involvement. Weekly
    church attendance and family gatherings featuring Southern cooking fostered a sense of belonging and respect for tradition. The natural environment—forests, rivers, and open fields—instilled an appreciation
    for outdoor recreation and self‑reliance. Though rooted in these traditions, his college education and career in technology broadened his perspective, exposing him to diverse ideas and contemporary
    art. This blend of Southern pragmatism and curiosity about unconventional thinking shapes his worldview, allowing him to navigate both local community expectations and the evolving landscape of modern
    IT.'
attributes:
  skills: '[''Systems analysis'', ''Enterprise architecture design'', ''Python programming'', ''SQL database development'', ''Data visualization'', ''Cloud infrastructure (AWS)'', ''Automation scripting'',
