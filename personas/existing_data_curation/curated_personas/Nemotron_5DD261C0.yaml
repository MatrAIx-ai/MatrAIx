personas:
  professional: A budding little architect named David Hoffman spends hours arranging building blocks into neat cityscapes, balancing curiosity with practicality by always measuring twice before laying
    the next piece, and they follow through on the self‑set deadlines with a methodical, organized approach that impresses their parents.
  sports: An enthusiastic little athlete named David Hoffman kicks around a soft soccer ball at preschool’s weekly t‑ball practice, proudly wears a New York Yankees jersey during backyard games, and they
    eagerly follow the team’s schedule on a kid‑friendly sports app, balancing organized practice drills with bursts of imaginative play.
  arts: A fledgling artist named David Hoffman fills sketchbooks with bold crayon dinosaurs while humming favorite Disney tunes like "Let It Go", admires the playful illustrations of Dr. Seuss, and they
    proudly showcase a collection of "The Wiggles" CDs in the living‑room, letting music and color shape their everyday imagination.
  travel: A curious little explorer named David Hoffman recently marveled at the magic of Walt Disney World’s Magic Kingdom, enjoys planning trips that include frequent snack breaks and stroller‑friendly
    routes, and they are already dreaming of a future visit to the Grand Canyon’s rim for a family photo with a majestic sunset backdrop.
  culinary: A budding foodie named David Hoffman prefers the cheesy comfort of mac and cheese and the sweet crunch of strawberry slices, can expertly stir cookie dough with a plastic spoon under adult supervision,
    and they often request extra pepperoni on pizza, showcasing a playful yet organized approach to meals.
  core: David Hoffman, a four‑year‑old balancing boundless curiosity with methodical organization, navigates life with a practical imagination, a love for tidy routines, and occasional stubborn streaks
    that make every day a charming experiment for them.
background:
  cultural: David grows up in a white, Anglo‑American family in Houston, Texas. His household blends traditional Southern hospitality with the city’s multicultural flavor. Family traditions include celebrating
    Thanksgiving with a turkey feast, decorating for Christmas, and watching Fourth of July fireworks over the Bayou. He is exposed to the diverse community around him, occasionally hearing Spanish at local
    parks and school, and enjoys Tex‑Mex cuisine like quesadillas alongside classic Texan dishes such as BBQ. The local library’s early childhood programs and community festivals provide him with early
    social experiences and reinforce values of kindness, responsibility, and curiosity.
