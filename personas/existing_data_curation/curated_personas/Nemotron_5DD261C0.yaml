  career_goals: 'David is already forming career dreams: he imagines soaring as an astronaut to explore space and building tall structures like an engineer, reflecting his curiosity about how things work
    and his methodical approach. He also expresses a desire to help others, saying he wants to be a teacher or a helper. His immediate ambitions focus on early milestones: reading his name fluently, counting
    to 100, completing simple chores independently, and mastering new building sets, all of which align with his organized and goal‑oriented mindset.'
