  hobbies: '[''Recreational soccer'', ''Financial-literacy mentoring'', ''Weekend road trips'', ''Cooking and hosting dinner parties'', ''Yoga'', ''Mindfulness podcasts'']'
  career_goals: Oleida aims to move from her current role as a financial manager to a senior finance leadership position, targeting a CFO role within a mid-sized manufacturing or agribusiness firm in the
    Midwest. She is driven to spearhead data-driven decision making by integrating AI‑based forecasting models that improve profitability and reduce risk. Over the next five years she plans to earn her
    CPA designation and complete an executive MBA to deepen her strategic expertise. Additionally, she envisions launching a boutique consulting practice that helps small‑to‑mid‑size companies modernize
    their financial processes while preserving practical, low‑risk solutions. Competition fuels her ambition, and she strives to be recognized as a top performer in cost control and financial strategy.
