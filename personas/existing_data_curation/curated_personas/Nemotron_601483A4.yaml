personas:
  professional: Oleida Wagner is a financial manager who leverages advanced Excel, Power Query, and NetSuite to craft AI‑enhanced forecasts, and they use their outgoing, competitive temperament to translate
    complex data into persuasive presentations, though their spontaneous resistance to rigid schedules sometimes creates deadline pressure.
  sports: Oleida Wagner plays forward for a local women’s recreational soccer league, joins a mid‑week running club that meets at the city park, cheers for the Kansas City Chiefs in the fall and the St
    Louis Cardinals in spring, and they balance their competitive drive with a tendency to overcommit, leading to occasional missed practices.
  arts: Oleida Wagner enjoys mixing cultural art experiences, attending live shows by local indie band The Gray Notes, streaming performances of Yo‑Yo Ma, and binge‑watching critically acclaimed series
    starring Viola Davis, while they often quote Maya Angelou in dinner conversations, reflecting a love for both classical and contemporary voices.
  travel: Oleida Wagner prefers impromptu road trips across the Midwest, charting routes through Galena, Iowa City, and the Ozark National Forest, while they also daydream about weekend getaways to Lisbon
    and Kyoto, balancing their love for small‑town diners with a desire for global culinary adventures, though budget constraints sometimes curb the more exotic itineraries.
  culinary: Oleida Wagner is an adventurous home cook who masterfully blends spices to create Moroccan tagine with apricots, Korean bibimbap topped with gochujang, and a daring vegan jackfruit tacos, favoring
    ingredients like sumac, miso, and smoked paprika, and they host themed dinner parties where each course tells a story of cultural fusion.
  core: Oleida Wagner is a competitive, spontaneously curious finance leader who balances high‑stakes data work with soccer, yoga, and eclectic cooking, all while wrestling with a perpetual worry habit
    that fuels both ambition and occasional burnout.
background:
  cultural: Oleida was born and raised in a small-town Midwestern environment in Illinois, coming from a family of German‑American descent that values hard work, humility, and community involvement. Growing
    up in Ogle County, she attended local public schools and spent summers on family farms, which instilled a practical, down-to-earth outlook. Her cultural upbringing blends traditional Midwestern hospitality
    with a progressive curiosity, encouraging her to respect established customs while embracing new ideas. She remains active in her local church and the Rotary Club, reflecting a strong sense of civic
    responsibility and a desire to contribute to her community.
attributes:
  skills: '[''Financial analysis'', ''Budgeting and forecasting'', ''Cash-flow management'', ''Risk assessment'', ''Advanced Excel and Power Query'', ''ERP (NetSuite) implementation'', ''Stakeholder communication'',
