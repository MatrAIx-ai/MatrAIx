personas:
  professional: Mohamed Obi, a 55‑year‑old community handyman, blends decades of hands‑on automotive and carpentry expertise with their talkative, competitive spirit to run a modest part‑time home‑repair
    service while prepping for a solar‑panel certification that will let them advise neighbors on green upgrades.
  sports: Mohamed Obi hits the Federal Way courts for pick‑up basketball three evenings a week, rallies with Seattle Seahawks fans on Sundays, casts a line at Lake Washington for weekend trout catches,
    and volunteers as a referee for the local senior basketball league, all while keeping a flexible fitness routine that balances competitive drills with occasional yoga stretches they use to ease joint
    stiffness.
  arts: Mohamed Obi shines at local karaoke nights belting out Sam Cooke and Bob Marley classics, delivers fiery spoken‑word pieces inspired by Maya Angelou and contemporary poet Rudy Francisco, and curates
    community open‑mic events that merge music, poetry, and the rhythmic storytelling of their vintage‑car restoration workshop ambience, where they often invite neighbors to share a verse.
  travel: Mohamed Obi prefers low‑key, self‑planned road trips that combine classic‑car rallies in Monterey, fishing excursions on Lake Tahoe, and weekend hikes in Mount Rainier National Park, often saving
    on accommodations by camping in the family’s backyard or staying with relatives while budgeting their limited travel fund to prioritize experiences over luxury, and they relish the spontaneity of unstructured
    detours along the way.
  culinary: Mohamed Obi cooks daringly, mastering jollof rice simmered with smoked paprika and nutmeg, whipping up a fragrant lamb tagine with apricots and preserved lemon, while also perfecting a quick‑fire
    suya‑style grilled chicken that they serve at weekly community feast‑style potlucks, displaying a confident, experimental palate that blends spicy, smoky, and sweet notes.
  core: Mohamed Obi is a charismatic, competitive fixer‑upper who juggles a love for noisy basketball games, late‑night karaoke, and spontaneous car restorations with a habit of over‑promising on community
    projects, often scrambling to meet deadlines they promised.
background:
  cultural: Mohamed was raised in a close‑knit Black Muslim household in the Seattle metropolitan area. His parents emigrated from Senegal, infusing the family with a blend of Islamic faith and West African
    cultural traditions. The local mosque served as a cornerstone of his upbringing, hosting religious observances such as Ramadan and Eid as well as cultural celebrations like the West African Gani festival.
    Growing up in the multicultural environment of the Pacific Northwest, Mohamed forged friendships across ethnic lines and developed a strong pride in his heritage. He identifies with the Black diaspora
    in Washington State, actively participating in events that honor African American history and sharing stories, music, and cuisine that reflect his hybrid identity of African, Muslim, and Pacific Northwest
    influences.
attributes:
  skills: '[''Automotive diagnostics and repair'', ''Small engine maintenance'', ''Basic carpentry and woodworking'', ''Home repair and maintenance (plumbing, electrical basics, appliance troubleshooting)'',
