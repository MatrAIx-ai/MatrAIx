  hobbies: '[''Hiking (Ozark trails)'', ''Fly‑fishing'', ''Scale model airplane building'', ''Vegetable gardening'', ''Reading non‑fiction (leadership, entrepreneurship)'', ''Chess'', ''Volunteer work at
    Callaway County Food Bank'', ''Small local coding meetup'']'
  career_goals: He aims to become a senior engineer within the next two years, then transition into a technical lead role where he can mentor small teams and shape product architecture. Long‑term, he aspires
    to a chief technology officer position at a mid‑size SaaS firm that serves small businesses, leveraging his business insight to drive product‑market fit. He plans to earn certifications in cloud architecture
    (AWS) and product management, and to launch a side‑project that offers workflow automation tools for local retailers.
