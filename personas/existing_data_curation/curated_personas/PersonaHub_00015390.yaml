persona_description: A professional in the field of environmental engineering and water treatment, specifically focused on the design and implementation of permeable reactive weirs (PRWs) for surface water
  remediation. They are knowledgeable about the selection, installation, and maintenance of PRWs, as well as the technology and equipment required for water treatment within the weirs. They are skilled
  in integrating fish passage features and monitoring equipment for aquatic habitats improvement, and have experience with electrical, mechanical, and thermal energy sources for power supply. They are interested
  in the scalability and configurability of PRWs to site-specific conditions, and are looking for opportunities to apply their knowledge and skills in environmental remediation projects.
