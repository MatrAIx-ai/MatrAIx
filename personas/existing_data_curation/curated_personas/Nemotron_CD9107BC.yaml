  career_goals: Mario aims to progress from an office clerk to a supervisory or office manager role within the next five years. He wants to obtain a Certified Administrative Professional (CAP) credential
    and consider enrolling in a community college program for office administration or business analytics to broaden his skill set. He is driven to become the top performer in efficiency metrics in his
    department, seeking to lead initiatives that reduce processing time and improve data accuracy. Long‑term, he envisions a stable career in operations where he can influence workflow design, possibly
    moving into a logistics coordinator or junior data analyst position. He also wants to secure a promotion that provides a clearer path to financial stability and reduces his worry about job security.
