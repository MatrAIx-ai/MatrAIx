  career_goals: Marlys aims to make partner at her mid‑size Tampa firm within the next five years, focusing on corporate and intellectual property law intersecting with the arts sector. She plans to develop
    a niche practice advising creative enterprises on licensing and copyright matters, leveraging her humanities graduate training. She also seeks to lead a pro bono initiative for local artists and small
    businesses, and to implement legal‑tech solutions that improve workflow efficiency. Her long‑term ambition includes establishing her own boutique law boutique that blends commercial law with cultural
    advocacy.
