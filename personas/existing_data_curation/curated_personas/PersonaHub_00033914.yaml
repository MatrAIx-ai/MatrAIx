persona_description: A veterinarian who specializes in the treatment and management of cats with calcium oxalate bladder stones. The vet has extensive knowledge and experience in the management of these
  stones, including the use of non-acidifying diets, dietary dissolution, and surgical removal as necessary. They are also knowledgeable about the factors that contribute to the development of these stones,
  such as acidifying the body and the role of vitamin C in oxalate stone formation. The vet is likely to be experienced in the use of dietary interventions, such as using a normal calcium content, a moderate
  magnesium content, and citrate to bind urinary calcium, as well as the use of non-acidifying diets and thiazide diuretics to dilute urine and correct electrolyte balance. The vet is likely to be familiar
  with the management of calcium oxalate bladder stones in cats and may also have experience with the identification and treatment of stones in cats.
