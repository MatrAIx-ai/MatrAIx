personas:
  professional: Roosevelt Barnes is a budding arts administrator who blends strong public‑speaking charisma with Adobe Photoshop and Illustrator skills to organize community art fairs, coordinate volunteers,
    and craft engaging social‑media campaigns that showcase local exhibitions while balancing meticulous planning with spontaneous creative pivots.
  sports: Roosevelt Barnes cherishes weekend hikes through the state parks near Howell, participates in a local recreational basketball league that meets at the community center, and is an avid supporter
    of the Detroit Red Wings and Detroit Lions, often wearing their jerseys while sketching cityscapes after games.
  arts: Roosevelt Barnes immerses themselves in the Detroit Institute of Arts, follows the latest street‑art installations by creators like Banksy and KAWS, draws inspiration from musicians such as Kendrick
    Lamar, Kamasi Washington, and Erykah Badu, and regularly contributes vibrant digital illustrations to their blog, where they dissect emerging art trends.
  travel: Roosevelt Barnes prefers road‑trip adventures that blend art‑focused itineraries—like the Ann Arbor Art Fair and a weekend gallery crawl in Chicago—with spontaneous stops at roadside diners, budgeting
    trips through a travel app, and dreams of someday strolling the frescoed corridors of Florence and the contemporary spaces of Paris.
  culinary: Roosevelt Barnes loves cooking comfort‑food staples like skillet‑seared pork shoulder, garlic‑roasted vegetables, and creamy mac and cheese, while also experimenting with local food‑truck specialties
    such as Detroit‑style coney dogs, often sharing meals with friends despite a recurring habit of burning the edges when multitasking between sketching and sauce simmering.
  core: Roosevelt Barnes is a talkative, detail‑oriented art enthusiast who balances community‑driven projects with late‑night digital doodles, a love of hiking, and an occasional tendency to over‑spend
    on limited‑edition prints.
background:
  cultural: Roosevelt was raised in a close‑knit African‑American family in the suburban Midwest, where church, music, and community gatherings were central to his upbringing. Growing up in Howell, Michigan,
    he experienced both the small‑town culture of Livingston County and the broader Black cultural influences of nearby Detroit. Family traditions emphasized education, respect for elders, and active involvement
    in local civic activities. He celebrated Juneteenth and Black History Month with storytelling and music that connected him to his heritage. These experiences shaped his appreciation for diverse artistic
    expressions and motivated his desire to create inclusive cultural spaces that honor the Black experience while engaging the wider community.
