  hobbies: '[''Sketching'', ''Digital illustration'', ''Visiting art museums and galleries'', ''Photography'', ''Hip‑hop dancing'', ''Listening to jazz and neo‑soul'', ''Blogging about art and culture'',
    ''Participating in community open‑mic events'', ''Hiking in local state parks'', ''Cooking family recipes'']'
  career_goals: Roosevelt aims to complete a bachelor’s degree in Arts Administration or Community Development within the next three years and secure a full‑time role as a community arts coordinator for
    a nonprofit or municipal cultural agency in the greater Detroit area. He envisions designing and leading accessible art workshops, curating local exhibitions, and establishing youth mentorship programs
    that celebrate Black creative expression. Ultimately, he hopes to launch his own nonprofit collective that provides free arts education and creative spaces for under‑represented young people throughout
    Michigan.
