  career_goals: Osbaldo aspires to merge his artistic imagination with technology. He aims to develop a strong portfolio of concept art and interactive media, with the goal of studying graphic design or
    computer science at a university. In the long term, he envisions a career as a concept artist or user experience (UX) designer for video games or immersive digital experiences, where he can create compelling
    visual narratives while working in a focused, independent environment. He also hopes to contribute to community art projects that celebrate his Mexican heritage.
