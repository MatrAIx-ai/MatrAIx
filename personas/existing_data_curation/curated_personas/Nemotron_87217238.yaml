  hobbies: '[''Book club'', ''Community gardening'', ''Church choir'', ''Board‑game nights'', ''Trivia contests'', ''Journaling'', ''Mindfulness meditation'', ''Hiking trips'', ''Baking competitions'']'
  career_goals: Pilar aims to formalize her community‑service experience by earning a certificate in event management or nonprofit administration through a local community college. She hopes to take on
    a volunteer coordinator role at a regional charity, eventually leading fundraising campaigns and community outreach programs. On a personal level, she wants to build a small home‑based catering business
    that leverages her cooking and budgeting strengths, while also seeking opportunities to mentor younger volunteers in organizing and leadership skills. Improving her emotional resilience through continued
    therapy and possibly leading a peer‑support group for others coping with anxiety is also a key ambition.
