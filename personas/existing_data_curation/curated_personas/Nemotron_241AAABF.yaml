personas:
  professional: Bryan Wright, a 12‑year‑old aspiring mechanical engineer and team captain for their school's soccer squad, blends meticulous LEGO Technic construction skills with quick tactical thinking
    from video gaming, turning their organized, competitive nature into disciplined project leadership and reliable follow‑through on school assignments.
  sports: Bryan Wright, a forward on the Midtown Youth Soccer Club and a regular participant in their school's intramural basketball league, trains rigorously before games, idolizes Manchester United and
    the Chicago Bulls, and balances their competitive drive with structured weekend conditioning drills.
  arts: Bryan Wright channels their energetic imagination into cartoon sketches inspired by the whimsical style of Matt Groening, while energizing drum practice with the beats of Imagine Dragons and watching
    Pixar films for storytelling cues.
  travel: Bryan Wright favors short road trips to nearby amusement parks like Six Flags and family camping outings in the nearby state park, but dreams of a future adventure to Tokyo's Akihabara district
    to experience the ultimate gaming pilgrimage.
  culinary: Bryan Wright enjoys building their own tacos with seasoned ground beef, fresh cilantro, and lime, while experimenting with simple cheese‑filled quesadillas, yet admits to a guilty pleasure of
    devouring sugary cereal straight from the box.
  core: Bryan Wright is a hyper‑organized, competition‑driven pre‑teen whose relentless journal‑writing and strategic gaming mask a nervous streak that often ends in midnight cereal binges.
background:
  cultural: 'Bryan grew up in Morrison, a small, close‑knit town in Whiteside County, Illinois. His family reflects typical Midwestern values: a strong work ethic, community involvement, and a respect for
    tradition. Sundays are often spent at a local Protestant church, and family gatherings revolve around hearty home‑cooked meals and stories about the town’s agricultural roots. Community events such
    as the annual county fair, high school football games, and local volunteer projects play a big role in his life, reinforcing a sense of belonging and a desire to give back. His upbringing blends a love
    for practical, hands‑on activities with the supportive, sociable atmosphere of a rural American community.'
attributes:
  skills: '["Organizational planning and time management", "Team coordination and ball handling (soccer midfielder)", "Strategic thinking (chess, competitive video gaming)", "Technical assembly (LEGO Technic
    and model kits)", "Basic computer troubleshooting", "Mathematics problem solving", "Reliable task completion"]'
  hobbies: '["Playing soccer for the school team", "Building LEGO Technic sets", "Playing chess and strategy board games", "Competitive video gaming (Rocket League, Fortnite)", "Playing drums in a school
    band", "Journaling and creative drawing", "Participating in local community events and fairs"]'
  career_goals: Bryan dreams of earning a soccer scholarship that will fund his education and eventually lead to a career as a civil engineer, where he can combine his love for structure, practicality,
    and community improvement by designing safe roads and bridges. He also feels a strong desire to serve his hometown, so he hopes to become a volunteer firefighter after high school. In the near term,
    he is focused on raising his grades in math and science, mastering advanced concepts, and developing leadership skills on the soccer field to prepare for these long‑term ambitions.
