  hobbies: '[''Hiking'', ''Desert photography'', ''Sketching'', ''Watercolor painting'', ''Attending art workshops'', ''Cooking experimental dishes'', ''Mindfulness meditation'', ''Yoga'', ''Volunteering
    at local arts festival'']'
  career_goals: Teresa aims to secure a supervisory role within the restaurant, earn her GED, and eventually open a small café that doubles as a community art space, giving local artists a venue and offering
    a menu inspired by Southwestern flavors. She is motivated to develop leadership skills, attend a short culinary certification program, and use her competitive drive to establish a successful, flexible
    business that accommodates her need for occasional solitude.
