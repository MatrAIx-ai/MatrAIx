personas:
  professional: Teresa Reeves is a seasoned waitress at a beloved Overgaard diner, where her quick multitasking, empathetic de‑escalation, and competitive upselling drive both tips and guest satisfaction,
    while she weaves Southwestern décor into the dining area to reflect her artistic curiosity.
  sports: Teresa Reeves enjoys weekend hikes in the Apache‑Sitgreaves forest and rounds out her fitness routine with casual pick‑up basketball at the Overgaard community center, while she follows the Arizona
    Diamondbacks, the Phoenix Suns, and the local high‑school cross‑country team for a mix of professional and grassroots sport inspiration.
  arts: Teresa Reeves channels her curiosity into watercolor painting that blends Navajo geometric motifs with influences from Georgia O’Keeffe and T.C. Cannon, frequently attending gallery openings featuring
    artists like R.C. Gorman, and she finds solace in listening to folk‑rock bands such as Calexico and the soulful crooning of Linda Ronstadt while sketching desert vistas.
  travel: Teresa Reeves favors spontaneous road trips that combine scenic desert drives with cultural stops, having trekked the Red Rock Scenic Byway, explored Santa Fe’s art scene, and dreaming of a future
    visit to the ancient cliff dwellings of Mesa Verde and the vibrant markets of Oaxaca.
  culinary: Teresa Reeves experiments with comfort food infused with desert flavors, frequently preparing chile‑pepper cornbread, prickly‑pear glazed chicken, and mesquite‑smoked brisket, using ingredients
    like Hatch chilies, pine nuts, and sage, and she rates herself as an intermediate home cook who loves pairing meals with locally brewed Arizona lagers.
  core: Teresa Reeves is a creatively driven, competitively spirited 44‑year‑old who balances a love for art, desert adventures, and entrepreneurial ambition with bouts of anxiety and a penchant for occasional
    impulsive spending on art supplies.
background:
  cultural: Teresa is a white American who grew up in a small Midwestern town before moving to Overgaard, Arizona in her early thirties. Living in Navajo County, she is surrounded by a blend of rural Western
    culture and the rich heritage of the nearby Navajo Nation. While she identifies with mainstream American customs, she has developed a deep appreciation for the local Southwestern aesthetic, including
    Native American art, desert flora, and regional cuisine. Her mixed background informs her open‑minded curiosity and her desire to bridge her own cultural experiences with the diverse artistic expressions
    she encounters in the community.
