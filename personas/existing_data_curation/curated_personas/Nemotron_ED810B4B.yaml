personas:
  professional: Candis Roberts, a newborn raised in a modest, community‑centered household that values self‑reliance and outdoor stewardship, already displays a methodical curiosity that they show by constantly
    examining textures, and parents interpret this as a nascent analytical mind, pointing toward a future career in environmental engineering or sustainable agriculture.
  sports: Candis Roberts, a newborn who already tags along to family outings at the nearby Wasatch Mountain resort for ski lessons and to local swimming sessions at the Eagle Mountain Community Center,
    is slated to join the junior program of the Utah Jazz youth basketball camp, and they will soon be introduced to toddler‑friendly soccer drills at the community park.
  arts: Candis Roberts, a newborn whose nursery is filled with soothing hymns from the Mormon Tabernacle Choir and classic folk tunes by the Carter Family, finds early comfort in melodic storytelling and
    simple rhythmic lullabies, and they respond with a calm smile whenever the music swells.
  travel: Candis Roberts, a newborn who has already taken a short family road trip to Antelope Island State Park for a picnic and whose parents plan scenic drives to Zion and Yellowstone, prefers car journeys
    over air travel for comfort and parental convenience, and they enjoy watching the changing landscapes from the back seat.
  culinary: Candis Roberts, a newborn who enjoys breastmilk and is being introduced to pureed organic apples, carrots, and sweet potato alongside a dollop of locally sourced unsweetened yogurt, reflects
    a family emphasis on wholesome, minimally processed foods, and they seem to relish the subtle flavors, often smiling after each feeding.
  core: Candis Roberts, a newborn with methodical curiosity, cautious heart, and a family‑rooted love of the outdoors, balances early sensitivities with a budding drive to explore and learn, and they already
    show a keen interest in the natural world around them.
