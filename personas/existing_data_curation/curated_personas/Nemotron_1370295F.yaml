  hobbies: '["Car club participation", "Organizing charity car shows", "Fishing", "Woodworking", "Community fair volunteering", "Church youth program", "Backyard barbecues", "Listening to classic rock and
    country music"]'
  career_goals: Roy aims to become the shop foreman at his current garage within the next two years, earning the ASE Master Technician certification and adding hybrid/electric vehicle expertise to his skill
    set. He dreams of eventually opening a small independent shop that specializes in classic car restoration and modern eco‑friendly repairs, providing a training ground for younger technicians from the
    community. He also hopes to lead a community car‑care workshop series to educate local drivers on maintenance and safety.
