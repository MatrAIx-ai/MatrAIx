personas:
  professional: Pedro Esteban, a 23‑year‑old full‑stack web developer, leverages strong JavaScript, React, Node.js, and Python skills within agile squads, balancing meticulous planning with flexible problem‑solving,
    and they mentor junior coders while designing open‑source tools that widen education and healthcare access.
  sports: Pedro Esteban plays as a midfielder in a Chicago amateur soccer league, cheers for the Chicago Fire FC and the Chicago Bulls, and they complement weekly matches with hikes in Starved Rock State
    Park, embodying their energetic, team‑oriented spirit with a practical routine.
  arts: Pedro Esteban immerses in Chicago’s vibrant music scene, attending salsa nights at Rosa’s Lounge and mariachi performances at Grant Park Summer Stage, while they keep a Spotify playlist curated
    with Celía Cruz, Los Lobos, and indie folk band The Lumines, reflecting their outgoing, compassionate love for cultural rhythm.
  travel: Pedro Esteban prefers short, budget‑friendly trips that blend adventure and community, such as weekend camping at Shawnee National Forest, a culinary road‑trip through Texas BBQ towns, and a planned
    spring visit to Oaxaca to learn authentic mole recipes, balancing structured itineraries with spontaneous exploration.
  culinary: Pedro Esteban enjoys cooking Mexican comfort foods like tacos al pastor, chiles en nogada, and pozole, skillfully seasoning with fresh cilantro, roasted chilies, and achiote, and they host lively
    dinner nights where friends sample experimental salsas, showcasing a pragmatic yet passionate approach to home cooking.
  core: Pedro Esteban is a structured yet sociable tech enthusiast who channels their compassionate drive into mentoring, community‑focused coding, spirited soccer, and flavorful Mexican cooking, all while
    maintaining a disciplined financial routine and a habit of binge‑watching sci‑fi marathons.
background:
  cultural: Pedro is a first‑generation Mexican‑American raised in a bilingual household where Spanish and English are spoken interchangeably. His family maintains strong ties to Mexican traditions—celebrating
    Día de los Muertos, preparing regional dishes from Oaxaca, and participating in community events in Chicago's Pilsen neighborhood. This cultural grounding nurtures his sense of community, collective
    responsibility, and appreciation for multicultural collaboration, which he brings into both his professional and personal life.
