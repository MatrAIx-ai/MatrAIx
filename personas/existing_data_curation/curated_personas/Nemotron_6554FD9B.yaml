  career_goals: Pedro aims to become a lead software engineer within the next five years, focusing on building technology solutions that improve access to education and healthcare for underserved communities.
    He aspires to lead a diverse, inclusive engineering team, launch open‑source projects addressing social challenges, and eventually transition into a product management role that blends technical expertise
    with community impact. He also plans to earn AWS Solutions Architect certification and continue mentoring aspiring developers from his local Mexican‑American community.
