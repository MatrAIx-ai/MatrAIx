  career_goals: Melissa aims to turn her passion for art, community events, and digital media into a freelance career as a visual content creator and event promoter. She plans to enroll in a short‑term
    digital media program or community‑college associate degree to formalize her design skills, while simultaneously building a personal brand on TikTok and Instagram that highlights Wellington’s vibrant
    arts and beach scene. Long‑term, she dreams of opening a collaborative art space and café where local artists can exhibit work, host workshops, and where she can curate pop‑up cultural events that blend
    creativity with the laid‑back Florida lifestyle.
