  hobbies: '[''exploring woods and collecting rocks'', ''building LEGO models'', ''drawing comics'', ''playing soccer with friends'', ''reading adventure books'', ''solving jigsaw puzzles'', ''playing educational
    video games'', ''conducting simple science experiments'', ''participating in school science fairs'']'
  career_goals: Even at six, Bruce dreams of turning his curiosity into real‑world impact. He often talks about becoming a scientist‑engineer who designs inventions that solve everyday problems, an astronaut
    who explores space, or a firefighter who helps people in emergencies. He imagines winning school science fairs and competitions, hoping his ideas will be recognized. His competitive streak fuels these
    ambitions, but he sometimes worries whether he will be good enough, and he looks to teachers and parents for encouragement and reassurance.
