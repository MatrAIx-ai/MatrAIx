personas:
  professional: Russell Defore, a methodical 16‑year‑old aspiring logistics specialist, combines their knack for detailed planning, model‑kit assembly, and team coordination in volunteer beach clean‑up
    projects, showcasing the reliability and structured thinking that will serve them well in future supply‑chain or engineering technology roles.
  sports: Russell Defore enjoys swimming at their local pool as a regular workout, follows the Miami Heat and the Miami Dolphins closely, and plays in a youth soccer league with the Miami United Juniors,
    balancing personal fitness with team spirit.
  arts: Russell Defore channels their creative side through shoreline photography, model‑kit craftsmanship, and avid chess matches, while drawing artistic inspiration from local street murals and listening
    to a mix of classic rock and contemporary Latin pop artists like Juanes and Bad Bunny.
  travel: Russell Defore prefers well‑planned short trips, having explored the Florida Keys and Everglades through organized weekend getaways, and now dreams of a budget‑friendly backpacking adventure across
    Spain’s coastal cities, balancing their love for the sea with a disciplined travel itinerary.
  culinary: Russell Defore favors fresh, handheld meals like cubanos, grilled fish tacos with mango salsa, and simple avocado toast, often preparing them themselves while listening to music, though they
    occasionally indulge in late‑night pizza slices during marathon chess sessions.
  core: Russell Defore is a detail‑obsessed teen who blends meticulous planning, community service, and a passion for photography and model building into a disciplined yet socially‑aware lifestyle, all
    while they juggle typical teenage quirks like occasional procrastination and snack cravings.
background:
  cultural: Russell identifies as a white American raised in a middle‑class family in Miami, Florida. While his household primarily speaks English and celebrates traditional American holidays, the city's
    multicultural atmosphere has exposed him to diverse Latin American cultures, cuisine, and music. This blend of a conventional suburban upbringing with an eclectic, multicultural community environment
    has shaped his appreciation for cultural harmony and his cooperative, considerate nature.
attributes:
  skills: '["Organizational Planning","Time Management","Basic Computer Literacy","Spreadsheet Proficiency","Model Kit Assembly","Team Coordination","Problem Solving"]'
  hobbies: '["Model Kit Building", "Chess", "Beach Clean‑up Volunteering", "Youth Mentorship", "Swimming", "Photography", "Reading Non‑Fiction"]'
  career_goals: Russell aims to obtain his GED within the next year and then enroll in a technical college program focused on logistics or engineering technology. He is drawn to careers that value structure,
    reliability, and teamwork, such as project coordination, supply‑chain management, or automotive systems technician. Long‑term, he envisions a role where he can lead organized initiatives and contribute
    to community development while continuing to expand his technical expertise.
