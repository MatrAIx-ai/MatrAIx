  career_goals: Bernice aims to advance from first‑line supervisor to a senior office manager or regional operations supervisor within the next five years. She plans to obtain a Certified Administrative
    Professional (CAP) credential and to lead larger cross‑functional teams, showcasing her ability to streamline processes and cut costs. Long‑term, she envisions launching a consulting side‑business that
    helps small businesses in Allen County implement efficient administrative systems, leveraging her blend of curiosity for new solutions and practical execution skills.
