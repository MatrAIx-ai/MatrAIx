persona_description: A scientist or researcher who specializes in modeling and simulation, particularly in the field of ecology and environmental science. They are knowledgeable about the concepts of compartmentalization
  and scoping in models, and have experience working with different types of objects such as compartments, species, parameters, and rules. They are also familiar with the naming conventions for compartment
  names within a model and the importance of compartment names being unique within a model. They are likely to have a deep understanding of the principles of ecology and environmental science and how they
  can be applied through the use of models and simulations.
