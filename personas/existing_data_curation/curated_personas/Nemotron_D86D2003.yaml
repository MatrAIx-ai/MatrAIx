  career_goals: She aspires to enroll in a visual‑arts or interactive‑media program at a university, with a long‑term goal of curating contemporary digital‑art exhibitions that highlight multicultural narratives,
    especially Spanish and Latin‑American perspectives. Additionally, she is interested in UX design, aiming to create mental‑health‑focused digital experiences that leverage her artistic sensibility and
    empathy. Ultimately, she hopes to combine art, technology, and her cultural heritage to foster inclusive spaces for creative expression and well‑being.
