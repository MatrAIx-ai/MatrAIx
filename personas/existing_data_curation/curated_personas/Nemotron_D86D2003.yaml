personas:
  professional: Bertha Saaverda, a high-school junior with a flair for both brush and code, blends watercolor cityscapes, Procreate illustrations, and budding Python scripts to craft interactive art prototypes,
    while channeling their cooperative yet assertive nature into leading class projects and dreaming of curating multicultural digital exhibitions at a future university.
  sports: Bertha Saaverda hikes the foothills of Boulder three times a week with the local Trailblazers Club, follows the Denver Broncos and Colorado Avalanche for seasonal thrills, and maintains a casual
    jog routine to stay balanced amid their artistic workload.
  arts: Bertha Saaverda draws inspiration from Edward Hopper's urban canvases, Ansel Adams' mountain photography, indie band The National's lyrical depth, and flamenco guitarist Vicente Amigo, weaving these
    influences into sketchbooks, digital collages, and occasional impromptu dance sessions to the rhythmic beats of Latin percussion.
  travel: Bertha Saaverda's travel diary lists backpacking trips to Rocky Mountain National Park, a family road-trip through the historic streets of Barcelona, a weekend art-tour of New York's MoMA and
    the Guggenheim, and a future wish to explore the street-art alleys of Buenos Aires on a modest student budget.
  culinary: Bertha Saaverda enjoys cooking paella valenciana with saffron and chorizo alongside their family, perfects a quick tortilla española for late-night study sessions, and experiments with quinoa-infused
    gazpacho, all while mastering the balance of spice and tradition in their modest kitchen.
  core: Bertha Saaverda is a curious, slightly anxious teen who fuses watercolor and code to visualize multicultural stories, budgets art supplies amidst tuition worries, and finds solace in hiking, poetry,
    and spontaneous flamenco beats.
background:
  cultural: Bertha is of Spanish descent and was raised in a bilingual household in Colorado Springs, speaking both Spanish and English fluently. Her family maintains traditions such as celebrating Semana
    Santa, Día de los Muertos, and cooking paella and tapas together. She participates in local Hispanic community events and embraces Spanish artistic legacies like Picasso and Gaudí, while also being
    immersed in the outdoor, multicultural environment of the American Southwest. This blend of Spanish heritage and Colorado’s nature‑focused lifestyle informs her appreciation for art, her love of exploration,
    and her desire to bridge cultures through creative expression.
