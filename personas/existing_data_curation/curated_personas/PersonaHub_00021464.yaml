persona_description: A reliability engineer who specializes in the RAM (Reliability, Availability, and Maintainability) analysis methodology, particularly in the decommissioning phase of complex systems.
  This individual has experience in performing RAM analysis using historical failure data and simulation using a reliability diagram model. They are also familiar with the RGA (Restoration Factor Analysis)
  model and have applied these methods to assess the effects of critical failures on system operational availability during a specific range of time. This expert has experience in proposing a RAM + L analysis
  methodology that takes into account both logistic and reliability issues, and is skilled in analyzing human factors in maintenance tasks. They have a unique understanding of the importance of human reliability
  in maintenance performance and have developed a methodology to analyze maintenance tasks taking into account human factors.
