  career_goals: Amy aims to turn her natural charisma and digital savvy into a career in media and entertainment. Over the next few years she plans to build a sizable following on TikTok and Instagram,
    using that platform to launch a teen fashion line she designs herself. She wants to study Communications or Marketing in college, with a focus on brand strategy and digital marketing, eventually working
    as a content strategist or influencer manager for a lifestyle brand. In the longer term she envisions hosting a live‑stream talk show that combines interview segments, pop‑culture commentary, and community
    outreach for youth in Sugar Land.
