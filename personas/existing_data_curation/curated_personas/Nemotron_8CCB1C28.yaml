personas:
  professional: Kimberly Nunez is a budding comic artist who blends traditional watercolor washes with digital panel layouts, harnessing their curiosity for unconventional storytelling while often letting
    loose deadlines slide in favor of creative flexibility, and they confidently pitch ideas in school art club meetings despite their laid‑back planning style.
  sports: Kimberly Nunez enjoys casual weekend hikes on the trails around McKinney and plays on their middle school’s co‑ed soccer team, cheering on the Dallas Cowboys on game day while also following the
    Dallas Mavericks and FC Dallas, yet they prefer low‑key, unstructured movement over regimented workouts.
  arts: Kimberly Nunez immerses themselves in the world of contemporary art, sketching alongside the vivid installations of artists like Banksy and Kara Walker at local galleries, while their soundtrack
    of indie bands such as Tame Impala, Mac DeMarco, and Phoebe Bridgers fuels afternoons of creating watercolor‑washed digital comics inspired by graphic novels like Saga and Ms. Marvel.
  travel: Kimberly Nunez prefers spontaneous day trips to nearby nature preserves and occasional family outings to Dallas museums, while dreaming of a future backpack adventure through Tokyo’s Akihabara
    and a weekend pilgrimage to the Louvre in Paris, balancing their limited teen budget with a love for unplanned cultural immersion.
  culinary: Kimberly Nunez, a beginner at the kitchen, delights in whipping up quick snacks such as avocado‑toast topped with chili flakes, crispy baked cheese‑and‑herb crackers, and strawberry‑basil smoothies,
    and they love experimenting with matcha‑infused brownies during weekend craft sessions with friends.
  core: Kimberly Nunez curates indie soundtracks while watercolor‑splashed comic panels bloom on their notebook, a curious teen who trades organized schedules for spontaneous art marathons, often forgetting
    homework but never missing a museum opening.
background:
  cultural: Kimberly was raised in McKinney, a suburban city in North Texas that blends Southern hospitality with a modern, multicultural vibe. Her family is of white European descent and celebrates traditional
    American holidays—Thanksgiving, Fourth of July barbecues, and Christmas—while also participating in community events like the Collin County Fair and local art festivals. The Texan backdrop offers her
    opportunities for outdoor activities like hiking nearby trails and attending county rodeos, while the nearby Dallas‑Fort Worth metro area exposes her to a diverse arts scene, tech workshops, and pop
    culture. This mix of regional pride, suburban community values, and exposure to broader cultural trends shapes her openness to new ideas and artistic exploration.
