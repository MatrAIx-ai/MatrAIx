  career_goals: Kimberly hopes to attend a specialized high school for visual arts and eventually study graphic design or UI/UX design at a university. She dreams of becoming a freelance multimedia artist
    who can blend illustration, storytelling, and interactive design, allowing her to work on video game art, indie comics, and community art projects. She values flexibility in her career, aiming for a
    path that lets her explore varied creative ideas without being tied to a rigid schedule.
