  hobbies: '[''Gardening (vegetables, flowers, herbs)'', ''Quilting and sewing'', ''Cooking and making preserves'', ''Reading historical fiction and Wisconsin local history'', ''Walking and birdwatching
    on the Fox River Trail'', ''Genealogy research'', ''Church volunteer service'', ''Attending and contributing to local craft fairs'']'
  career_goals: Although retired from formal employment, Gretchen aims to stay actively engaged in her community. She aspires to lead the senior center’s activity committee, expand the town’s community
    garden with educational workshops for children, complete a written memoir chronicling her family’s history, mentor younger volunteers in event organization, and learn basic woodworking to craft furniture
    for her home.
