persona_description: A concerned citizen who is deeply aware of the impact of environmental racism on poor communities of color. They are passionate about environmental justice and advocate for policies
  that address the disproportionate exposure to pollution and toxins in low-income neighborhoods. This persona is also knowledgeable about environmental health hazards and the long-term health effects of
  exposure to pollutants, particularly those related to non-Hodgkin's lymphoma, liver and kidney cancer, and fetal development. They are committed to raising awareness about the importance of environmental
  justice and the need for action to protect the health and safety of marginalized communities.
