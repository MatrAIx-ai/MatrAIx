  hobbies: '[''Gardening'', ''Hiking'', ''Reading contemporary fiction'', ''Knitting'', ''Cooking Southern comfort food'', ''Volunteer work at the local library'', ''Fishing'', ''Attending local festivals'',
    ''Genealogy research'', ''DIY home projects'']'
  career_goals: Brianna aims to formalize her teaching credentials by completing an associate’s degree followed by a bachelor’s in Elementary Education within the next three years. She aspires to become
    a lead teacher or curriculum coordinator, where she can shape grade‑level standards and mentor newer staff. Passionate about bridging classroom learning with the natural world, she hopes to develop
    a school‑wide environmental stewardship program that leverages local wetlands and citrus farms. Additionally, she envisions launching an after‑school reading club that blends her love of literature
    with community service. Long‑term, Brianna would like to contribute to district‑wide professional development workshops focused on flexible, curiosity‑driven teaching methods.
