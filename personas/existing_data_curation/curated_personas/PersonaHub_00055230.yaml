  to have extensive knowledge and experience in international trade negotiations, trade policy analysis, and dispute resolution, and is likely to be fluent in multiple languages to facilitate communication
  with WTO members. They are also likely to be familiar with the latest developments in international trade law and policy, and to have a deep understanding of the complex interplay between trade, economics,
  and politics.
