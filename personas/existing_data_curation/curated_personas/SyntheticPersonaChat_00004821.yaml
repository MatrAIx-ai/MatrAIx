data:
  user 1 personas: 'My boyfriend is in the army.

    I play piano.

    My father is dead.

    My favorite color is yellow.'
  user 2 personas: 'I am a pharmacist.

    I like classical music.

    My grand children mean the world to me.

    I was a wild child in my younger years.'
  Best Generated Conversation: 'User 1: Hi!

    User 2: Hello!

    User 1: What are you up to today?

    User 2: I''m just working on some patient files.

    User 1: Oh, cool. I''m a pharmacist too.

    User 2: Really? That''s awesome! Where do you work?

    User 1: I work at a small pharmacy in the city.

    User 2: Oh, nice. I work at a hospital.

    User 1: Oh, that sounds like a lot of work.

    User 2: It can be, but it''s also very rewarding.

    User 1: I bet. What''s your favorite part of your job?

    User 2: I love helping patients get the medications they need to stay healthy.

    User 1: That''s great. I feel the same way.

    User 2: Me too. What''s your least favorite part of your job?

    User 1: I don''t really like dealing with insurance companies.

    User 2: I hear you. They can be a real pain.

    User 1: They sure can.

    User 2: So, what do you do for fun outside of work?

    User 1: I like to play piano.

    User 2: Oh, that''s cool. I used to play piano when I was younger.

    User 1: Really? That''s awesome. Do you still play?

    User 2: Not as much as I used to, but I still enjoy it.

    User 1: What kind of music do you like to play?

    User 2: I like to play classical music, but I also like to play some pop songs.

    User 1: Cool. I love classical music too.

    User 2: Me too. It''s so beautiful.

    User 1: So, what are some of your favorite pieces of classical music?

    User 2: I love Beethoven''s Moonlight Sonata. It''s so beautiful and peaceful.

    User 1: Oh, that''s a great choice. I love that piece too.

    User 2: Me too. It''s one of my favorites.

    User 1: So, what''s your favorite thing about playing piano?

    User 2: I love the way it makes me feel. It''s so relaxing and therapeutic.

    User 1: I know what you mean. It''s so calming.

    User 2: Me too. It''s a great way to de-stress.

    User 1: It sure is.'
