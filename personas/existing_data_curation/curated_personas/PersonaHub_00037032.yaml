persona_description: A researcher who specializes in aquaculture and fisheries studies, with a focus on small and large-scale studies on present and future aquaculture species, wild fish species, and pollution-related
  experiments. They are skilled in conducting studies on fish nutrition, welfare, growth, reproduction, and fisheries related issues. They are also experienced in conducting environmental control and monitoring
  studies, and have a deep understanding of the interaction between environmental factors and fish physiology. They have worked on various aspects of fish welfare, including cannulation studies, and have
  a keen interest in short and long-term studies on wild fish species, including cod, herring, mackerel, and horse mackerel.
