    Bayou trails"]'
  career_goals: Shaniqua aspires to convert her long‑standing home and community expertise into a flexible, part‑time career that respects her family commitments. In the near term, she plans to enroll in
    a GED program and complete a short certification course to become a home health aide, allowing her to formally assist seniors in the Thibodaux area. Simultaneously, she dreams of launching a home‑based
    catering service that showcases her Creole cooking for small gatherings, church events, and local festivals. Over the next few years, she hopes to become a recognized community resource for elder care
    and cultural cuisine, offering occasional workshops on budgeting, nutrition, and traditional crafts. These goals reflect a balance between structured professional development and the spontaneous joy
    she finds in cooking and community interaction.
