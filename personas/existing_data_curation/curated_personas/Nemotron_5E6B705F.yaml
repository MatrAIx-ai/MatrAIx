personas:
  professional: Shaniqua Obeid, a 49‑year‑old caretaker transitioning toward a certified home health aide role while piloting a home‑based Creole catering service, combines meticulous budgeting, garden
    stewardship, and a talent for spontaneous recipe improvisation to create a flexible, community‑oriented career path that balances structured certification with the joy of small‑scale culinary art.
  sports: Shaniqua Obeid favors low‑key physical activity such as walking the local Bayou trails, keeps a loyal fan base for the New Orleans Saints and LSU Tigers, participates in a church‑organized softball
    league each spring, and avoids high‑intensity competitive sports, preferring community‑oriented, relaxed exercise.
  arts: Shaniqua Obeid enjoys reading historical fiction set in the Reconstruction era, sings gospel hymns with a small church choir, crafts quilts featuring traditional motifs, and fills the garden with
    the sounds of Louis Armstrong’s jazz and Clifton Chenier’s Zydeco, allowing music, literature, and textile art to shape daily moments of quiet creativity.
  travel: Shaniqua Obeid plans modest weekend road trips to historic towns like Natchitoches, coastal retreats such as Grand Isle, and cultural festivals in New Orleans, blending a carefully plotted itinerary
    with spontaneous stops at local music venues, while dreaming of a future extended stay in Savannah to explore its historic districts.
  culinary: Shaniqua Obeid prepares classic Creole dishes — gumbo, jambalaya, and red beans and rice — often improvising with garden‑fresh okra, Andouille sausage, and filé powder, while balancing meticulous
    meal planning for family gatherings with experimental flavor twists, and delights in serving these foods at church events and neighborhood potlucks.
  core: Shaniqua Obeid is a meticulous caregiver‑turned‑entrepreneur whose love of garden‑grown Creole cuisine, gospel choir, and quiet crafts merges structured budgeting with spontaneous creativity, all
    while navigating the ebb and flow of health, finances, and community ties.
background:
  cultural: Shaniqua is an African American woman raised in Thibodaux, Louisiana, a region where the cultural currents of Southern Black traditions intersect with Creole and Cajun influences. Her family
    has deep roots in the local Church community, which has shaped her values of resilience, mutual support, and collective celebration. Growing up, she absorbed the rhythms of gospel music and the flavors
    of gumbo, jambalaya, and crawfish étouffée, which today inform her cooking and social gatherings. She honors the oral history of Black laborers and civil‑rights activists in Terrebonne Parish, and she
    participates in community events that spotlight African American heritage, such as Juneteenth commemorations and local heritage festivals. This cultural blend fosters a strong sense of identity rooted
    in family, faith, and the vibrant, multicultural tapestry of southern Louisiana.
