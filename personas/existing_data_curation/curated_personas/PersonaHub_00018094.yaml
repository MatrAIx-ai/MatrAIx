persona_description: A neuroscientist who studies the effects of maternal immune responses on the development of the brain and immune system in offspring. The scientist has published groundbreaking research
  on cytokine changes in the brains of treated mice, which has implications for understanding neurodevelopmental disorders such as schizophrenia and autism. The scientist is interested in exploring the
  potential of targeting immune molecules to restore normal brain development in these conditions. The scientist has received funding support from the National Institutes of Health and from Autism Speaks.
