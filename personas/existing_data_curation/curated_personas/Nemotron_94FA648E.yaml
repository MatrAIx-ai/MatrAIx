personas:
  professional: Antonio Sandoval, a veteran construction specialist, leverages two decades of framing, concrete work, and code expertise to lead crew projects while integrating energy‑efficient techniques,
    and their practical curiosity and ambition to become a foreman push them to pursue construction‑management certifications and streamline site safety.
  sports: Antonio Sandoval enjoys weekend fishing on Lake Tramonto for bass and catfish, participates in the Plant City Pickers adult softball league, and roots for the Tampa Bay Buccaneers, Lightning,
    and Rays, maintaining a modest fitness routine of circuit‑training at a local gym to stay in shape for their physically demanding work.
  arts: Antonio Sandoval finds creative release strumming acoustic guitar at St. Mark's church, often covering songs by Juan García and Chris Rice, and enjoys listening to Latin folk legend Carlos Banda
    while watching classic films like ‘The Godfather’ on Friday nights, which often inspires them to perform impromptu at the Plant City Cinco de Mayo parade.
  travel: Antonio Sandoval prefers low‑key road trips to nearby beaches like Clearwater and occasional DIY camping at Ocala National Forest, but they also dream of a culturally immersive vacation to Oaxaca,
    Mexico, carefully planning each journey around family schedules and budgeting constraints to protect their retirement savings.
  culinary: Antonio Sandoval, an avid home cook, masters tamales and enchiladas using masa, pork, and smoky chipotle, often experimenting with fresh corn, heirloom chilies, and homemade salsa verde, while
    they also savor a well‑cooked slab of grilled ribeye paired with a chilled craft beer after a long workday.
  core: Antonio Sandoval is a hands‑on builder with a green thumb for vintage trucks, a perpetual worry‑wart who channels stress into community projects, and an occasional over‑caffeinated night owl who
    never misses a Sunday church jam session, and they often unwind with a late‑night espresso before bed.
background:
  cultural: Antonio was raised in a Mexican‑American household in Orlando before moving to Plant City. His parents immigrated from Jalisco, bringing strong family values, a deep respect for community, and
    a love of traditional food and music. He grew up bilingual, speaking Spanish at home and English at school, which has helped him bridge cultural gaps on construction sites. He celebrates Mexican holidays
    such as Día de los Muertos and Cinco de Mayo, often cooking and sharing traditional meals with friends and neighbors. His Catholic upbringing informs his participation in his local parish, where he
    volunteers and plays guitar. Antonio’s cultural heritage shapes his collaborative work style, his emphasis on harmony in the team, and his desire to mentor younger workers from similar backgrounds.
attributes:
  skills: '[''Framing'', ''Concrete formwork'', ''Concrete pouring'', ''Drywall installation'', ''Finishing carpentry'', ''Blueprint reading'', ''OSHA 10‑hour safety'', ''NCCER concrete and masonry'', ''Hurricane‑resistant
    construction methods'', ''Energy‑efficient building practices'', ''Basic solar‑panel installation'', ''Bilingual communication (Spanish/English)'']'
  hobbies: '[''DIY home improvement'', ''Vintage Chevrolet pickup restoration'', ''Cooking Mexican dishes'', ''Fishing'', ''Acoustic guitar'', ''Church choir participation'', ''Cinco de Mayo parade involvement'',
    ''Habitat for Humanity volunteering'']'
  career_goals: Antonio aims to move from laborer to crew foreman within the next two years, gaining additional certifications in construction management and project scheduling. He plans to complete an
    associate’s degree in construction technology, building on his earlier college credits. Long‑term, he hopes to start his own small contracting firm that emphasizes sustainable, energy‑efficient homes
    for the Plant City community, providing stable, well‑paid work for his family and other Hispanic workers. He also wants to reduce the financial stress that worries him by securing a higher income and
    establishing a retirement savings plan.
