  career_goals: Luis dreams of becoming an architect because he loves sketching houses and building them with LEGO. He also imagines being a soccer star or coach, enjoying competition and teamwork. Occasionally
    he talks about being a scientist or inventor to discover new ideas and create helpful gadgets. He wants a future where he can plan projects, lead teams, and turn creative ideas into real things.
