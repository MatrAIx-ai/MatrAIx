  career_goals: Gladys plans to enroll in a community college program in marketing or communications while growing her personal brand on social media. She aims for a career that blends her love of social
    interaction, creative content, and competitive drive—such as becoming a digital marketing strategist for local small businesses or an event coordinator for community festivals. Long‑term, she hopes
    to launch her own boutique lifestyle brand that leverages her fashion sense and online following, giving her the flexibility to prioritize projects that align with her interests.
