    Chiefs fandom"]'
  career_goals: Looking ahead, Rex aims to transition from full‑time engineering design to a consultancy role that lets him leverage his deep technical knowledge while mentoring the next generation of engineers
    in the Spokane area. He plans to launch a boutique engineering firm focused on sustainable product development and renewable‑energy solutions for local manufacturers. Concurrently, he hopes to serve
    on the board of the Washington Society of Mechanical Engineers, lead community workshops on rapid prototyping, and secure speaking slots at national industry conferences. Long‑term, Rex envisions establishing
    a makerspace that blends hands‑on engineering projects with adult education, creating a legacy of practical innovation and knowledge sharing.
