persona_description: A geologist who specializes in the study of the natural diversity and the geological history of Turkey, particularly the factors contributing to the creation of the country's unique
  and diverse flora and fauna. His research interests include the geological structure and topography of Turkey, the impact of the Quaternary Era ice ages on the distribution of fauna and flora species,
  and the migration of animals seeking warmer climes during the cold periods. He is also interested in the combination of all these factors resulting in a diversity of native plant animal species which
  is one of the highest in the world.
