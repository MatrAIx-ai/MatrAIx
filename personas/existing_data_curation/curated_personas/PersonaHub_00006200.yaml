persona_description: A marine archaeologist who specializes in ship construction and interpretation, with a particular interest in Civil War-era shipwrecks. He has explored over 150 shipwrecks, many of
  them Civil War vessels, and has a strong understanding of the construction features of boats and the design of blockade runners. He is currently working on an underwater excavation project to find as
  many wrecks in the area as possible, using sonar imaging to map ruins near Egmont Key and MacDill Air Force Base.
