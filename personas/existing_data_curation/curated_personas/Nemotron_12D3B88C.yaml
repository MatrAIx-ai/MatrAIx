personas:
  professional: Wren Martin, a 35‑year‑old paralegal in a small Ohio firm, leverages their proficiency with LexisNexis, e‑filing, and quick‑books to streamline case workflows while juggling a relaxed approach
    to deadlines and a habit of juggling multiple DIY home‑improvement projects between client intake and research, often preferring practical, technology‑driven solutions but occasionally missing a filing
    deadline due to their flexible planning style.
  sports: Wren Martin, an avid hiker of the rolling hills and river trails near Meigs County, participates in a local trail‑running club, supports the Cincinnati Bengals and Ohio State Buckeyes during football
    season, and attends community yoga classes for flexibility, while occasionally skipping workouts when work piles up.
  arts: Wren Martin, a watercolor hobbyist and book‑club regular, immerses themselves in true‑crime narratives by authors like Gillian Flynn and historical fiction by Hilary Mantel, finds inspiration in
    the impressionist works of Claude Monet, and occasionally binge‑watches legal dramas on streaming platforms for both entertainment and professional insight.
  travel: Wren Martin enjoys weekend getaways to the Appalachian foothills, has a bucket‑list destination of Asheville’s culinary scene and the historic streets of Bath, England, plans trips spontaneously
    rather than months ahead, and prefers road trips that allow stops at farmers’ markets to stock their garden pantry.
  culinary: Wren Martin, a seasonal cook who tends a modest vegetable garden, delights in preparing roasted beet and goat‑cheese salads, simmering pumpkin soup with fresh sage, and mastering sous‑vide chicken
    thighs, while occasionally over‑indulging in elaborate desserts that require them to order specialty ingredients online.
  core: Wren Martin, a curious yet laid‑back 35‑year‑old paralegal, blends legal expertise with garden‑fresh cooking, loves hiking and watercolor painting, worries about deadlines, and finds solace in yoga
    and journaling.
background:
  cultural: Wren grew up in a tight‑knit, predominantly white community in Meigs County, Ohio, where Midwestern values of modesty, hard work, and neighborly cooperation are embedded in daily life. The region’s
    Appalachian heritage influences her appreciation for folk music, outdoor recreation, and a strong sense of local identity. Her family’s modest, church‑centered upbringing emphasized kindness, humility,
    and community service, which continue to shape her collaborative workplace style and her commitment to helping others through the legal system.
attributes:
  skills: '[''Legal research'', ''Case file organization'', ''Document drafting'', ''Electronic filing (e‑filing)'', ''Client intake and communication'', ''Court procedures knowledge'', ''Contract and real‑estate
