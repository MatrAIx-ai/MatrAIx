personas:
  professional: Iria Proenza, a 37‑year‑old aspiring home‑based caterer, leverages her expertise in budgeting, meal planning, and traditional cooking while using her structured yet flexible mindset to juggle
    certification studies, community‑center volunteering, and occasional home repairs, ensuring her small business runs on a predictable schedule despite occasional disarray in paperwork.
  sports: Iria Proenza enjoys leisurely walks along the Pecos River as a member of the Pecos River Walking Club, follows the Dallas Cowboys in football and the Texas Rangers in baseball, and occasionally
    joins a neighborhood pickleball league in the spring, preferring low‑impact activities that fit their flexible schedule over rigorous gym routines.
  arts: Iria Proenza finds artistic solace in listening to ranchera legends such as Vicente Fernández and Alejandro Farré, binge‑watching classic telenovelas starring Lucero and Thalía, and practicing traditional
    hand‑embroidery inspired by the works of artist Frida Kahlo, which together weave a vibrant cultural tapestry into their daily routine.
  travel: Iria Proenza favors modest road trips to nearby destinations like Santa Fe, New Mexico, and Sedona, Arizona, cherishing quiet cultural sites and local markets, while dreaming of a future pilgrimage
    to Oaxaca to explore its culinary heritage, all while planning trips around school calendars and tight household budgets.
  culinary: Iria Proenza, an adept home cook, perfects molcajete salsa with chiles de árbol, tomatillos, and cilantro, crafts tangy horchata using rice, cinnamon, and vanilla, and regularly prepares tamales
    al vapor swathed in corn husks, all while experimenting with heirloom tomato varieties from their garden to elevate family meals.
  core: Iria Proenza balances a love for structured, home‑cooked traditions with a charmingly chaotic approach to paperwork, turning garden‑fresh ingredients into festive sauces while quietly nurturing
    their tight‑knit community.
background:
  cultural: Iria grew up in a Mexican‑American household that retained strong ties to its ancestral roots while adapting to life in rural West Texas. Spanish is spoken at home, and many family celebrations
    feature Día de los Muertos altars, quinceañera traditions, and Mexican holiday foods. Her Catholic faith, reinforced by regular attendance at the local church, shapes her values of harmony and community
    service. The blend of Mexican culinary heritage and the agricultural lifestyle of Irion County gives her a unique perspective that merges festive family gatherings with the practical rhythms of a small‑town
    ranching community.
