  career_goals: Iria hopes to translate her passion for cooking and community service into a modest income. She plans to obtain a food safety certification and start a home‑based catering business focused
    on authentic Mexican family meals for local gatherings and church events. She also intends to complete her GED to keep options open for part‑time work in the town’s community center, where she could
    lead cooking classes or craft workshops for children and seniors. Long‑term, she dreams of owning a small storefront that sells her homemade sauces, tamales, and embroidered textiles.
