persona_description: A professional responsible for managing and maintaining navigation aids and safety regulations in coastal and enclosed waters of Victoria, Australia. They are responsible for issuing
  notices to mariners, including notices to navigate, to ensure the safe and efficient movement of shipping in waters not covered by Admiralty charts. They must be knowledgeable about the latest navigation
  aids and safety regulations, as well as the ability to communicate effectively with mariners. They may also have experience in working with other authorities, such as ports and maritime safety authorities,
  to ensure the effective implementation of safety regulations.
