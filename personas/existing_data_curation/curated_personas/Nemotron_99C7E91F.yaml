personas:
  professional: Shevelle Stevenson, a finance manager with a STEM‑focused background, leverages advanced financial modeling, Python, VBA, and SAP to drive strategic decisions, applying a structured yet
    collaborative approach that balances analytical rigor with supportive team leadership.
  sports: Shevelle Stevenson starts each day with a 5‑mile run and weekly yoga, participates in the local Peachtree Striders running club, holds season tickets for the Atlanta Falcons and follows the Atlanta
    Hawks, and they view fitness as a structured ritual that balances mental clarity with community engagement.
  arts: Shevelle Stevenson relaxes by attending live jazz performances featuring artists like Kamasi Kamau and Esperanza Spalding, reads contemporary fiction from authors such as Chimamanda Adichie, and
    they also enjoy occasional theater outings to see productions by the local Shakespeare company.
  travel: Shevelle Stevenson prefers meticulously planned trips that blend cultural immersion with relaxation, having recently explored New Orleans' music scene, the art museums of Washington DC, and dreaming
    of a future safari in Tanzania while balancing travel expenses with their professional commitments.
  culinary: Shevelle Stevenson is an adept home cook who perfects Southern soul‑food classics like shrimp and grits, collard greens, and sweet‑potato casserole, often swapping butter for olive oil and adding
    quinoa or kale for healthier twists, and they enjoy tasting new farm‑to‑table dishes at venues such as The Optimist.
  core: Shevelle Stevenson blends a data‑driven finance career with a love for jazz and crossword puzzles, yet they have a habit of staying up late solving riddles, sacrificing sleep for the perfect answer.
background:
  cultural: Sheelle is an African American woman whose upbringing in North Carolina immersed her in the traditions of Black Southern culture. Her family emphasized education, resilience, and community service,
    celebrating gatherings filled with gospel music, soul‑food cuisine, and observances such as Juneteenth and Kwanzaa. She remains actively involved in local Black professional organizations, including
    the National Association of Black Accountants, and participates in church outreach programs. These cultural influences reinforce her values of collective uplift, mentorship, and a strong work ethic,
    shaping both her personal life and her professional commitment to fostering equity and empowerment within the finance industry.
attributes:
  skills: '[''Financial Modeling'', ''Data Analysis & Visualization'', ''Risk Management'', ''Budgeting & Forecasting'', ''Regulatory Compliance'', ''Strategic Financial Planning'', ''Advanced Excel & VBA'',
    ''SAP/Oracle Financial Systems'', ''Python & SQL for Finance'', ''Process Improvement'', ''Team Leadership'', ''Stakeholder Communication'']'
  hobbies: '[''Running/Jogging'', ''Yoga'', ''Reading (fiction & finance)'', ''Cooking (Southern & healthy recipes)'', ''Gardening'', ''Volunteer financial literacy tutoring'', ''Mentoring young professionals'',
    ''Jazz concerts'', ''Puzzle solving (crosswords, Sudoku)'', ''Traveling'']'
  career_goals: Sheelle aims to advance to a senior executive finance role, such as Chief Financial Officer or Vice President of Finance, within the next five to seven years. She plans to deepen her expertise
    in integrating advanced analytics and sustainable finance practices into corporate strategy, positioning herself as a leader in data‑driven financial transformation. Concurrently, she is committed to
    fostering diversity and inclusion in the finance sector by mentoring emerging Black professionals and sponsoring community financial literacy initiatives. She also intends to obtain the Chartered Financial
    Analyst (CFA) designation to broaden her strategic investment acumen and to contribute to board‑level governance initiatives that drive long‑term organizational resilience.
