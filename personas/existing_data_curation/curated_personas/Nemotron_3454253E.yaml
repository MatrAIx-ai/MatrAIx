personas:
  professional: Wendy Mallett is a meticulous explosives worker who, after more than a decade of hands‑off ordnance handling in central Ohio, designs and executes demolition projects with exacting safety
    protocols, writes detailed blast reports, mentors junior crew members, and pursues Certified Blasting Supervisor credentials to formalize their methodical expertise while maintaining a calm, routine‑focused
    work environment.
  sports: Wendy Mallett stays fit through routine morning walks with the Muskingum River Trail Club, follows the Ohio State Buckeyes basketball season with quiet enthusiasm, maintains a casual allegiance
    to the Cleveland Browns, and prefers low‑impact activities over high‑intensity gym sessions, reflecting a steady, low‑stress approach to fitness.
  arts: Wendy Mallett finds artistic solace in stitching quilts while listening to Norah Jones, delving into Agatha Christie’s cozy mysteries, meticulously hand‑building World War II model kits from Academy
    Model’s catalog, and occasionally attending community productions by the local Little Theatre troupe, each hobby feeding their love for quiet, detail‑oriented creativity.
  travel: Wendy Mallett prefers carefully planned road trips that combine historical exploration with low‑stress itineraries, having already visited the Gettysburg battlefield and Colonial Williamsburg
    with their family, and now dreaming of a spring pilgrimage to the Normandy beaches once a predictable work schedule and the budget for a modest overseas vacation align.
  culinary: Wendy Mallett delights in preparing comforting family dishes like herb‑roasted chicken with rosemary potatoes, homemade apple cobbler, and fresh garden salads featuring kale, carrots, and sweet
    potatoes harvested from their own plot, displaying solid cooking skills while occasionally over‑seasoning in the quest for bold flavor.
  core: Wendy Mallett is a routine‑obsessed explosives specialist who channels their meticulous nature into both safe demolitions and soothing crossword puzzles, yet they cannot shake a persistent worry
    that makes them double‑check every detail, even the pantry layout at midnight.
background:
  cultural: Wendy grew up in a small, predominately white, Midwestern community in Ohio, steeped in traditional Protestant values and a strong sense of local pride. Her family has deep roots in the region,
    tracing ancestry to German and Irish immigrants who settled in Muskingum County in the late 19th century. Community events such as county fairs, church gatherings, and volunteer fire‑department fundraisers
    have shaped her practical, cooperative outlook and reinforced a commitment to hard work, reliability, and preserving the familiar rhythms of small‑town life.
attributes:
  skills: '[''Explosives safety and handling'',''Ordnance inspection and disposal'',''Hazardous materials compliance (OSHA, EPA)'',''Blast design and calculation'',''Demolition project planning'',''Inventory
    control of explosives and munitions'',''Secure transportation and storage of ordnance'',''Emergency response and fire safety'',''Documentation and record‑keeping'',''Training and mentorship of junior
    crew members'',''Equipment maintenance and troubleshooting'',''Risk assessment and mitigation'']'
  hobbies: '[''Vegetable gardening'',''Quilting and needlework'',''Reading mystery novels'',''Model building (historical military models)'',''Walking local nature trails'',''Cooking and baking family recipes'',''Participating
    in small community volunteer groups'',''Solving puzzles (crossword, Sudoku)'']'
  career_goals: Wendy aims to obtain the Certified Blasting Supervisor credential within the next two years and to transition into a safety‑officer role where she can develop and implement standardized
    operating procedures that further reduce workplace stress for her team. She also aspires to lead a small training program for new explosives workers, eventually leveraging her expertise to consult for
    regional construction firms while maintaining a steady, predictable schedule that supports her family life.
