  career_goals: Anna aims to advance to a supervisory role on the restaurant floor, such as lead waitress or shift manager, where she can mentor newer staff and contribute to scheduling and inventory decisions.
    She is also exploring a part‑time certification in hospitality management to boost her credentials. Long‑term, she dreams of opening a small neighborhood coffee‑shop or bakery that doubles as a community
    gathering spot, allowing her to blend her love for food, social interaction, and local traditions while creating a stable income that eases her financial worries.
