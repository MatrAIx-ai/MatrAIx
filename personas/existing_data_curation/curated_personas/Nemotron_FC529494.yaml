personas:
  professional: Marylene Rivera, a seasoned full‑stack software developer with expertise in Java, Python, JavaScript, React, Angular, and Node.js, leverages their bilingual fluency and systematic mindset
    to architect scalable APIs while championing code maintainability, despite a tendency to let documentation lag behind.
  sports: Marylene Rivera, an avid weekend hiker of Florida state parks and a member of a local salsa dance crew, cheers for the Miami Dolphins and Orlando Magic, and incorporates weekly yoga sessions into
    their fitness routine, balancing structured workouts with spontaneous trail explorations.
  arts: Marylene Rivera, a mystery‑thriller aficionado who devours novels by Gillian Flynn and Tana French, enjoys live Latin jazz performances by artists like Buena Vista Social Club, and attends community
    theater productions, letting these creative outlets shape their analytical thinking and cultural appreciation.
  travel: Marylene Rivera, a flexible traveler who prefers last‑minute deals to explore Caribbean islands such as Puerto Rico and domestic gems like the Great Smoky Mountains, blends careful budget planning
    for airfare with spontaneous weekend getaways, often using Airbnb stays to practice cooking local dishes.
  culinary: Marylene Rivera, a confident home cook who perfects classic Puerto Rican dishes like mofongo, arroz con gandules, and pernil while experimenting with smoked paprika and fresh cilantro from their
    vegetable garden, enjoys sourcing local heirloom tomatoes and plantains, yet occasionally forgets to season the finishing sauce.
  core: Marylene Rivera balances a structured tech career and leadership aspirations with a love for cooking, yoga, and spontaneous adventure, all while wrestling with the occasional disorganization and
    worry that fuels their drive.
background:
  cultural: Marylene’s cultural background is rooted in her Puerto Rican heritage; raised in a bilingual English‑Spanish household, she preserves family traditions such as preparing arroz con gandules and
    celebrating Nochebuena, Three Kings’ Day, and local Latino festivals, values strong family ties with Sunday meals and extended gatherings, and integrates her cultural identity into her professional
    life by advocating for Hispanic women in technology, mentoring Latino youth in coding workshops, and drawing on Puerto Rican values of community, resilience, and adaptability.
