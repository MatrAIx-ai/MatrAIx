personas:
  professional: Wanda Perez, a seasoned childcare professional with a STEM bachelor's degree, leverages their preference for predictable routines and competitive drive to design meticulous daily schedules
    that weave simple science experiments with cultural crafts, positioning themselves for a future role as a licensed daycare center director.
  sports: Wanda Perez stays active by following a structured weekly routine of shoreline walks with a small local walking club, supports the San Francisco 49ers during football season and the Giants in
    baseball, and occasionally joins a community center's low-impact aerobics class, though their relaxed attitude toward obligations sometimes leads to missed sessions.
  arts: Wanda Perez immerses themselves in the rhythmic sounds of Vallenato legend Carlos Vives and classic Cumbia hits while knitting colorful blankets for the children they care for, frequently attending
    the neighborhood's cultural festivals and community theater productions, and finds inspiration for storytelling in historical biographies of prominent Latin American figures.
  travel: Wanda Perez prefers meticulously planned weekend getaways to nearby retreats like the San Juan Islands and Napa Valley and dreams of exploring historic coastal cities such as Cartagena and Barcelona,
    balancing detailed itineraries with occasional spontaneous day trips along the Pacific coast whenever time and budget permit.
  culinary: Wanda Perez delights in preparing traditional arepas and hearty sancocho using cilantro, plantains, and beans from their balcony garden, expertly seasoning each dish while occasionally over-seasoning
    with guava jam glaze, and enjoys sharing these meals with the children, often pairing them with freshly brewed coffee and a side of homemade guacamole.
  core: Wanda Perez, a 56-year-old seasoned childcare specialist, blends a love for routine, competitive ambition, and cultural traditions into a structured, community-focused life marked by occasional
    disorganization, quiet resilience, and a penchant for herb-filled cooking and shoreline walks.
background:
  cultural: Born in Bogotá, Colombia, Wanda moved to the United States as a teenager and now lives in Daly City, CA, where a vibrant Latino community surrounds her. She is fluent in Spanish and English,
    celebrates Colombian holidays such as Carnaval de Barranquilla and Día de los Santos Inocentes, and maintains family culinary traditions. Active in local cultural events and volunteer programs at the
    Colombian Consulate, she incorporates bilingual storytelling and cultural crafts into her childcare practice. Her Catholic upbringing influences her values of family, responsibility, and modesty.
attributes:
  skills: '[''Early Childhood Education'', ''Child Safety & First Aid'', ''Basic Math and Science Tutoring'', ''Nutrition Planning'', ''Routine Scheduling'', ''Conflict Mediation'', ''Record Keeping'',
    ''Emergency Response'', ''Bilingual Communication'']'
  hobbies: '[''Gardening'', ''Cooking Colombian cuisine'', ''Reading historical nonfiction'', ''Knitting'', ''Walking along the Bay shoreline'', ''Listening to Vallenato and Cumbia'', ''Puzzle solving'']'
  career_goals: Wanda aims to become a licensed daycare center director within the next three years, overseeing a small, family‑style facility that emphasizes routine, safety, and hands‑on STEM enrichment.
    She plans to earn a Child Development Associate credential and design an after‑school program that merges simple science experiments with Colombian cultural crafts. Ultimately, she hopes to own and
    operate her own home‑based daycare, providing financial stability after her divorce and gaining recognition as a top‑rated provider in the Bay Area community.
