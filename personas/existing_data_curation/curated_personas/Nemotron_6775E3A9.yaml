  hobbies: '[''Oil painting'', ''Acrylic painting'', ''Landscape photography'', ''Model airplane building'', ''Reading speculative fiction and philosophy'', ''Playing acoustic guitar'', ''Hiking in Iowa
    state parks'', ''Experimenting with new culinary recipes'']'
  career_goals: David aims to move from his driver‑sales role to a logistics coordinator position within the next three years, leveraging his route‑optimization skills and pursuing certification in Transportation
    Management. He plans to advance to managing a fleet of delivery trucks, and eventually launch a side business that creates custom‑painted, artistically designed vehicles for local businesses, merging
    his artistic interests with industry expertise. Long‑term, he envisions owning a regional transport company that emphasizes innovative, aesthetically distinctive branding while maintaining high operational
    efficiency.
