  career_goals: Although retired from formal employment, Maria aims to broaden her impact on the Tucson community. She plans to join the board of a local senior services nonprofit, develop a mentorship
    program teaching financial literacy to young adults, and lead a neighborhood food-cooperative initiative. She also hopes to complete a series of workshops on advanced xeriscape design, compile her family's
    multigenerational stories into a memoir, and travel with her husband to explore the national parks of the Southwest.
