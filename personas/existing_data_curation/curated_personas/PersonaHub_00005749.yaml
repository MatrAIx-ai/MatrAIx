persona_description: A scientist who studies the microbiome, specifically the changes in the microbiome caused by early life antibiotics and its downstream effects on metabolism, particularly in the regulation
  of energy storage. This scientist is interested in the link between the microbiome and a range of diseases including cancer, autism, and heart disease, and the role of antibiotics in the development of
  obesity. They are also interested in studying the effects of antibiotics in human bodies, particularly in children who are exposed to antibiotics before the age of six months.
