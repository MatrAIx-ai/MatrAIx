persona_description: A researcher and scientist with a passion for understanding the pathogenesis and treatment of infectious diseases. This person is dedicated to conducting non-human primate experiments
  to develop vaccines, antivirals, and other treatments for Ebola and other infectious diseases. They have a deep understanding of the disease course, evolution, and transmission, and are committed to using
  non-human primate models to advance our understanding of the disease. They are also interested in the development of new treatments for epilepsy, and are conducting research on the identification of gene
  mutations, the use of amino acids and cell therapy as potential therapies, and the use of mice in the development of new treatments.
