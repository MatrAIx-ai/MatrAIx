  hobbies: '[''Visiting art galleries and museums'',''Photography (architectural and street)'',''Woodworking'',''Reading philosophy and science nonfiction'',''Chess'',''Community garden gardening'',''Attending
    experimental theatre'']'
  career_goals: Larry aims to leverage his deep technical expertise into a senior advisory role where he can guide strategic digital transformation initiatives for public sector organizations in Maryland.
    He hopes to mentor junior analysts, obtain advanced certifications such as CISSP and PMP, and eventually transition to part‑time consulting, helping small businesses improve their IT resilience. Completing
    his GED and possibly pursuing a professional certification program is also a personal milestone he intends to achieve within the next two years.
