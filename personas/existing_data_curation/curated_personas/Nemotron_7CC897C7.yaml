  hobbies: '[''Cooking'', ''Saxophone playing'', ''Jazz music'', ''Fishing'', ''Nature walks'', ''Volunteer mentorship'', ''Church activities'', ''Reading historical novels'', ''Classic blues movies'',
    ''Strategy video games'']'
  career_goals: Nadir aims to move into a senior systems analyst or IT project manager role where he can lead cross‑functional teams and design robust, patient‑focused technology solutions. He seeks professional
    certification such as the Certified Business Analysis Professional (CBAP) and hopes to deepen his expertise in healthcare informatics. A key priority is achieving a better work‑life balance, so he is
    interested in positions offering flexible or remote work options that allow quality time with his family. Long‑term, Nadir envisions becoming a technology strategist for a public‑sector or healthcare
    organization in Louisiana, using his technical and interpersonal strengths to drive community health initiatives and mentor the next generation of IT professionals.
