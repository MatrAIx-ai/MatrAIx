  hobbies: '["Book club", "Yoga", "Community volunteering", "Cooking Tex-Mex meals", "Visiting art museums", "Live music outings", "Weekend hiking", "Organizing social events"]'
  career_goals: Sheri aims to advance from her current receptionist role to an administrative assistant position within the next two years, eventually moving into office manager responsibilities. She plans
    to enroll in an associate degree program in Business Administration and obtain a Certified Administrative Professional (CAP) certification to strengthen her credentials. Long‑term, she hopes to develop
    supervisory and project‑management skills, possibly overseeing a small team, and as her experience grows, she envisions opening a community‑focused boutique café that blends her love for hospitality
    with local Dallas culture.
