personas:
  professional: Sheri Pittman, a meticulous front‑desk professional who blends Southern hospitality with a love for order, they excel at phone etiquette, appointment scheduling, and visitor management,
    using Microsoft Office to keep the office running as smoothly as a well‑planned community potluck.
  sports: Sheri Pittman, an avid supporter of the Dallas Cowboys and Dallas Mavericks, they balance tailgate traditions with membership in the Dallas Women's Hiking Club, trekking Cedar Ridge State Park
    on weekends and sustaining fitness through a twice‑weekly yoga routine.
  arts: Sheri Pittman, a regular at the Dallas Museum of Art and a fan of live music nights featuring local jazz ensemble The Soulful Strings and blues legend Susan Tedeschi, they draw creative inspiration
    from the bold colors of Frida Kahlo’s paintings and the evocative portraits of Annie Leibovitz.
  travel: Sheri Pittman, a planner of purposeful road trips that blend scenic hikes with hearty meals, they have explored Texas Hill Country towns like Fredericksburg and Austin, and they yearn to wander
    Barcelona’s Gothic Quarter for its art and cuisine.
  culinary: Sheri Pittman, an enthusiastic home cook who loves perfecting Tex‑Mex dishes such as shrimp‑taco al pastor with fresh cilantro, lime, and roasted corn, they also savor Southern BBQ brisket seasoned
    with a smoky rub and a side of pickled jalapeños, often sharing these creations at community gatherings.
  core: Sheri Pittman, a harmony‑driven planner who blends Southern hospitality with meticulous organization, they juggle community volunteer work and a secret habit of late‑night true‑crime documentary
    binges while maintaining a perfectly alphabetized desk.
background:
  cultural: Sheri was raised in a middle‑class white family in Dallas, Texas, where Southern hospitality, Texan pride, and community spirit shaped her outlook. Family gatherings often featured BBQ, football
    games, and church activities, emphasizing cooperation, modesty, and respect for tradition. Growing up in a diverse metropolitan area exposed her to a blend of cultural influences, fostering an appreciation
    for local arts, music, and culinary traditions while maintaining a strong connection to the values of teamwork and harmony typical of her regional background.
attributes:
  skills: '["Customer service", "Phone etiquette", "Appointment scheduling", "Microsoft Office Suite", "Data entry", "Record keeping", "Time management", "Problem solving", "Conflict resolution", "Team
