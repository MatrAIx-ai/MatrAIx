  career_goals: John aims to leverage his extensive experience into a supervisory or specialist role within the library system before retirement. He plans to earn an ALA Library Assistant certification
    and deepen his knowledge of digital archiving so he can lead a digitization project for the local historical collection. Additionally, he hopes to design a series of community workshops that teach genealogy
    and digital research skills, positioning himself as a mentor for newer staff members. While he values stability and low stress, his ambition is to leave a lasting imprint on the library’s services by
    improving workflow efficiency, fostering intergenerational programming, and strengthening partnerships with local schools and historical societies.
