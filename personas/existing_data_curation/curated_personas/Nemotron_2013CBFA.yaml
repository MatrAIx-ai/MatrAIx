personas:
  professional: Wyman Reed, a 53‑year‑old operations manager, leverages strategic planning, budgeting, performance analytics, and design‑thinking creativity to lead high‑energy teams, while they apply skepticism
    and a competitive drive to anticipate risks and exceed sales targets.
  sports: Wyman Reed avidly follows the Alabama Crimson Tide football team, participates in a local adult soccer league on Saturday mornings, and hits the nearby community gym for occasional weight‑lifting
    sessions, blending seasonal football enthusiasm with regular, social fitness activities they enjoy.
  arts: Wyman Reed immerses himself in Birmingham’s blues and jazz scene, frequently attends gigs featuring The Alabama Shakes and John Hammond Jr., curates a small collection of contemporary paintings
    by local artist James Schaeffer, and volunteers as a visual‑arts tutor for youth, letting music and visual art shape their identity.
  travel: Wyman Reed prefers spontaneous, culturally immersive trips, often exploring art‑rich cities like New Orleans, Austin, and Florence, while balancing a limited travel budget by staying with relatives
    or using Airbnb, and they dream of attending the Montreux Jazz Festival in Switzerland.
  culinary: Wyman Reed delights in cooking soulful barbecue ribs and collard greens, experiments with dry rubs of smoked paprika and brown sugar, and often hosts community cooking workshops where they share
    recipes for shrimp and grits and sweet potato pie, showcasing moderate culinary skill and love for comfort foods.
  core: Wyman Reed is a charismatic, art‑curious operations leader whose competitive edge, emotional intensity, and love for soulful Southern flavors drive both their professional ambition and vibrant community
    involvement.
background:
  cultural: Wyman grew up in the historically Black neighborhoods of Birmingham, Alabama, surrounded by the city’s civil‑rights legacy, church community, and Southern hospitality. His family emphasized
    education, resilience, and communal support, fostering a deep appreciation for soul food, blues and jazz music, and storytelling. He remains actively involved in the local Black business network, supports
    Black‑owned enterprises, and participates in church choirs and community festivals. These experiences have shaped a cultural identity that blends Southern traditions with a broad curiosity for global
    art and ideas, informing both his professional outlook and personal passions.
attributes:
  skills: '[''Strategic Planning'', ''Team Leadership'', ''Budget Management'', ''Performance Analytics'', ''Project Oversight'', ''Design Thinking'', ''Creative Problem Solving'', ''Stakeholder Communication'',
