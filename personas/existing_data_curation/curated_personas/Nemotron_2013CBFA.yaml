  hobbies: '[''Visiting Art Galleries'', ''Live Blues and Jazz Concerts'', ''Photography'', ''Collecting Contemporary Paintings'', ''Cooking Southern Cuisine'', ''Barbecue Grilling'', ''College Football
    Watching'', ''Community Soccer League'', ''Guided Meditation'', ''Journaling'', ''Yoga'', ''Volunteer Youth Art Tutoring'', ''Traveling to Cultural Destinations'']'
  career_goals: Wyman aims to move from his current managerial role into a senior executive position—ideally Vice President of Operations or Chief Operations Officer—where he can steer corporate strategy,
    champion innovative, culturally resonant initiatives, and drive growth across multiple markets. He is pursuing certifications such as PMP and Lean Six Sigma to strengthen his operational expertise,
    and is considering an executive MBA to deepen his strategic acuity. Parallel to his corporate aspirations, he dreams of launching a consultancy that helps midsize companies integrate creative problem-solving
    and inclusive leadership practices. A personal ambition is to mentor emerging Black professionals and establish a community-based arts mentorship program that blends his love for art with his commitment
    to uplift the next generation.
