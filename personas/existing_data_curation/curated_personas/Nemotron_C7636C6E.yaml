  hobbies: '[''Live Music'', ''Volunteer at Arts Festivals'', ''Book Club'', ''Gardening'', ''Cooking Southern Cuisine'', ''Yoga'', ''Hiking'', ''Genealogy Research'']'
  career_goals: Eva aims to transition into an executive director role within the next three to five years, focusing on expanding community outreach and integrating digital platforms for arts programming.
    She also aspires to mentor emerging women leaders in the nonprofit sector, develop a regional arts consortium that fosters collaboration among cultural institutions, and eventually launch a consultancy
    that helps midsize arts organizations adopt sustainable practices while embracing innovative programming.
