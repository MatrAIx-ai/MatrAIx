personas:
  professional: Eva Wright, a seasoned nonprofit arts manager with three decades of strategic planning, budget oversight, and program evaluation experience, leverages her methodical yet curious nature to
    fuse innovative digital outreach with proven operational frameworks, positioning herself for an upcoming executive director role.
  sports: Eva Wright follows the Nashville Predators and Tennessee Titans avidly, participates in a local women's hiking club that meets every Saturday, and keeps fit with a blend of yoga classes and occasional
    community 5K runs organized by the Williamson County Recreation Center.
  arts: Eva Wright immerses herself in Nashville's country and folk scene, regularly attending shows by artists like Jason Isbell, Gillian Welch, and Kacey Musgraves, while also volunteering at the Americana
    Fest and supporting regional theater productions such as the Nashville Children's Theatre's 'A Midsummer Night's Dream'.
  travel: Eva Wright prefers thoughtfully planned trips that blend genealogy research with leisure, having recently explored historic Williamsburg, Virginia, and a week-long ancestral tour in Devon, England,
    while her future wish list includes a cultural immersion in New Orleans' music districts and a relaxed retreat at Asheville's Blue Ridge Mountains.
  culinary: Eva Wright, an adept home cook, delights in preparing Southern-inspired dishes like shrimp and grits, fried green tomatoes, and collard greens seasoned with smoked paprika, often incorporating
    heirloom tomatoes and fresh okra from her garden, and enjoys occasional outings to farm-to-table restaurants such as The Local in Franklin.
  core: Eva Wright blends strategic foresight with a love for community arts, balancing meticulous budget spreadsheets with spontaneous weekend hikes, soulful concerts, and the occasional habit of over-watering
    her heirloom tomatoes.
background:
  cultural: Eva was raised in a middle‑class white family in the American South, absorbing Southern hospitality, a love of storytelling, and a deep appreciation for country and folk music. Her upbringing
    emphasized community involvement, respect for tradition, and a strong work ethic. While she values these roots, she also embraces broader cultural perspectives through her humanities education and frequent
    travel, leading to a multicultural outlook that informs both her personal life and professional practice.
attributes:
  skills: '[''Strategic Planning'', ''Project Management'', ''Team Leadership'', ''Budget Management'', ''Stakeholder Engagement'', ''Program Evaluation'', ''Event Coordination'', ''Public Speaking'', ''Cross-Cultural
