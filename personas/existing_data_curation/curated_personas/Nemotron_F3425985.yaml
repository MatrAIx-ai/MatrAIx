personas:
  professional: Robert Sprayberry, a self‑driven 11‑year‑old budding technologist, channels his methodical curiosity into building intricate LEGO constructions, scripting simple games on Scratch, and sketching
    precise technical diagrams; they follow a clear plan and timeline for each project, ensuring organized execution.
  sports: Robert Sprayberry enjoys the occasional hike on local trails where they spot deer and birds, participates in the school’s chess club as a strategic sport, follows the Los Angeles Lakers basketball
    team on television, and plays pickup soccer with a small group of friends at the community field on weekends, preferring low‑key activity over large crowds.
  arts: Robert Sprayberry immerses themselves in science‑fiction novels by authors like Isaac Asimov and watches animated series such as Star Wars, draws detailed schematics of their LEGO creations, and
    listens to the atmospheric scores of Hans Zimmer while sketching, allowing these creative outlets to temper their analytical mind.
  travel: Robert Sprayberry dreams of exploring the natural wonder of Grand Canyon National Park and the interactive exhibits at the Kennedy Space Center, has already visited Washington D.C. with family
    to see the Smithsonian museums, and prefers meticulously planned trips with a clear itinerary over spontaneous adventures.
  culinary: Robert Sprayberry favors hearty comfort foods like pepperoni pizza and macaroni‑and‑cheese, enjoys crafting homemade fruit smoothies flavored with strawberries and bananas, and has recently
    begun experimenting with simple baked goods like chocolate chip cookies, though they often forget to wash their hands after handling LEGO bricks before cooking.
  core: Robert Sprayberry is an organized, curiosity‑driven 11‑year‑old whose love for LEGO and coding is balanced by a penchant for worry, meticulous budgeting, and occasional late‑night snack neglect.
background:
  cultural: Robert was raised in a middle‑class, predominantly white suburban neighborhood in The Colony, Texas. His family values practical education, self‑reliance, and community involvement, reflecting
    typical Texan middle‑class cultural norms. He participates in school and community events, occasionally attends local church services, and his upbringing blends traditional American values with encouragement
    to explore scientific and technical interests.
attributes:
  skills: '[''Mathematics problem solving'', ''Basic coding with Scratch'', ''LEGO Technic and model building'', ''Organizing and planning school projects'', ''Reading comprehension'', ''Structured essay
    writing'']'
  hobbies: '[''LEGO building'', ''Scratch programming'', ''Reading science‑fiction'', ''Nature hikes and wildlife observation'', ''Chess'', ''Sketching technical diagrams'', ''Journaling'']'
  career_goals: Robert aspires to one day work as a mechanical or robotics engineer, aiming to design functional prototypes and perhaps contribute to aerospace or automotive innovation. He is motivated
    to deepen his knowledge in STEM fields, earn scholarships for advanced science programs, and eventually create inventions that solve real‑world problems. He also hopes to mentor younger students in
    his community, sharing his love for hands‑on projects.
