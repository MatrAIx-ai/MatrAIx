  hobbies: '[''Gardening (heirloom vegetables)'', ''Historical Fiction Reading'', ''Birdwatching'', ''Knitting & Crochet'', ''Puzzle Solving (crosswords, sudoku)'', ''Volunteering at Lancaster Food Bank'',
    ''Genealogy Research'', ''Yoga and Mindfulness Meditation'', ''Local History Museum Visits'', ''Wine Tasting in Lancaster County'']'
  career_goals: Amanda aims to transition from her current managerial role to a regional operations director position within the next five years, leveraging her blend of practical experience and curiosity
    for innovative solutions. She plans to complete a Bachelor’s degree in Business Administration part‑time and earn a Project Management Professional (PMP) certification to formalize her project‑leadership
    skills. A key ambition is to spearhead sustainability initiatives that incorporate locally sourced products and reduce waste, aligning with the agricultural roots of Lancaster. She also wishes to mentor
    emerging female managers, creating a supportive network that counters her own tendency toward worry and stress. Long‑term, Amanda envisions a semi‑retirement phase where she consults small family‑owned
    businesses on operational efficiency, ensuring a stable financial future for her family while preserving a balanced, lower‑stress lifestyle.
