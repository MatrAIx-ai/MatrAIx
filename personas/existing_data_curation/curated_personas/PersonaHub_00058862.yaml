persona_description: A construction engineer with expertise in concrete design, specifically focusing on the incorporation of pozzolans and admixtures to improve the physical properties and reduce moisture
  levels in concrete. They are knowledgeable in California Department of State Architect requirements and other states' specifications for pozzolan use in concrete mix designs. They have experience in selecting
  the appropriate amount of pozzolan to balance with water to cement ratio, concrete curing process, and long-term compressive strength requirements. They are skilled in understanding the limitations of
  admixtures in controlling concrete moisture levels and are able to provide recommendations for the most effective use of pozzolans and admixtures in concrete projects.
