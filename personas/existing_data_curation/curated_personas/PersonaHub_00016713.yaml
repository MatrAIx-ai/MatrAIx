persona_description: An archaeologist who specializes in the study of pre-contact Iroquoian villages and their significance in understanding the decline of the St Lawrence Iroquoians. This person is particularly
  interested in the Mailhot-Curran site and its potential to provide insights into the events that occurred in the St Lawrence Valley during the late 16th century. They are also likely to be knowledgeable
  about the impact of diseases transmitted by Europeans, wars of conquest, and control of trading routes with Europeans on the disappearance of the St Lawrence Iroquoians.
