personas:
  professional: Era Ayala, a retired community event planner and multidisciplinary artist, blends their vivid imagination with methodical organization, and they curate a museum exhibit of abstract watercolors,
    preserve oral histories through diligent archiving, teach traditional weaving to younger relatives, design heirloom gardens, and mentor seniors and youth, all while mastering basic digital tools for
    sharing their work.
  sports: Era Ayala, a dedicated birdwatcher and garden enthusiast, participates in low‑impact activities such as weekly walking groups at the local park and a senior‑friendly lawn bowling league, follows
    the Charleston Battery soccer team and the South Carolina Gamecocks football program for community spirit, and they occasionally join a weekend gardening club that doubles as a gentle cardio routine.
  arts: Era Ayala, an abstract watercolorist inspired by oceanic hues, draws creative stimulation from the works of Georgia O'Keeffe and the lyrical storytelling of Maya Angelou, enjoys listening to Miles
    Davis' modal jazz while painting, and they regularly attend performances of Shakespearean plays at the local theater and contemporary art exhibitions featuring artists like Yayoi Kusama.
  travel: Era Ayala, a reflective traveler with a love for both relaxation and cultural immersion, prefers organized travel itineraries that combine visits to historic Southern towns such as Charleston,
    Savannah, and Asheville with occasional pilgrimages to remote island destinations reminiscent of early‑life memories, and they balance these trips with the practicalities of health accommodations and
    a modest travel budget.
  culinary: Era Ayala, a creative home chef, delights in blending island‑inspired ingredients like taro, coconut milk, and fresh fish with Southern staples such as shrimp, collard greens, and sweet potatoes
    to craft signature dishes like coconut‑infused taro chowder, grilled snapper with mango‑coconut salsa, and heirloom tomato and basil galette, and they experiment with fragrant herbs like lemongrass
    and ginger harvested from their garden.
  core: Era Ayala, an 80‑year‑old imaginative organizer, channels a lifelong blend of artistic curiosity, cultural mentorship, and methodical community service into vibrant paintings, heritage crafts, and
    thoughtful stewardship of both garden and legacy, and they never miss a chance to sketch a fleeting idea in a journal before bedtime.
background:
  cultural: Era’s cultural roots trace back to Chuuk in the Federated States of Micronesia. Her parents migrated to the United States in the early 1960s, first settling in Guam before moving to South Carolina,
    where they joined a small Micronesian diaspora community. Growing up, Era was immersed in traditional practices—listening to oral stories, participating in community dances, and learning to weave pandanus
    mats. She retains fluency in Chuukese and incorporates the language into family celebrations. While embracing Southern customs—attending church potlucks, gardening, and local festivals—she continues
    to honor Micronesian values of communal responsibility, respect for elders, and a deep connection to the sea. This bicultural identity informs her worldview, art, and dedication to cultural preservation.
attributes:
  skills: '["Watercolor and mixed-media painting", "Traditional Micronesian weaving and basketry", "Community event planning and coordination", "Oral history documentation and transcription", "Volunteer
