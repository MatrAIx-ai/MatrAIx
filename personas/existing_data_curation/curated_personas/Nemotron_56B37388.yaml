  hobbies: '["Abstract watercolor painting", "Cooking Micronesian and Southern fusion dishes", "Reading poetry and speculative fiction", "Creative writing and journaling", "Birdwatching in local nature
    reserves", "Garden cultivation of heirloom and tropical plants", "Attending local museum exhibitions and cultural talks"]'
  career_goals: Even in retirement, Era remains driven to leave a lasting cultural legacy. She aims to curate a retrospective exhibit of her abstract paintings at the Berkeley County Museum, accompanied
    by a booklet of artist statements. She plans to compile a memoir intertwining her family’s Micronesian oral histories with reflections on her life in South Carolina, preserving these narratives for
    future generations. Era hopes to mentor Micronesian‑American youth in traditional crafts and storytelling through a series of community workshops. She aspires to travel back to her ancestral islands
    once health permits to reconnect with the sources of her cultural identity. Additionally, she seeks to continue her volunteer work at the local senior center, fostering intergenerational connections
    and cultural exchange.
