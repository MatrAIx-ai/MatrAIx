personas:
  professional: Miguel Ramirez, a 20‑year‑old visual arts student and budding freelance concept artist, merges proficient digital illustration in Procreate and Photoshop with a flair for speculative storytelling,
    crafting experimental game concepts that blend Mexican cultural motifs with contemporary design, while their laid‑back, flexible approach sometimes leads to missed deadlines but fuels spontaneous creative
    breakthroughs.
  sports: Miguel Ramirez enjoys occasional pick‑up basketball games with the Huntsville Hoops Club, runs with the Huntsville Trail Runners in spring, follows the Alabama Crimson Tide football and Huntsville
    Havoc hockey teams on television, and prefers low‑intensity yoga sessions in their dorm lounge to stay limber for long sketching marathons.
  arts: Miguel Ramirez spends evenings sketching while listening to Aphex Twin and Björk, draws creative inspiration from Frida Kahlo’s vibrant symbolism and Guillermo del Toro’s cinematic storytelling,
    regularly contributes to community mural projects, and showcases spoken‑word pieces at open‑mic nights influenced by the poetry of Ocean Vuong.
  travel: Miguel Ramirez favors spontaneous, low‑budget weekend road trips to music hubs like Austin and New Orleans, dreams of an immersive cultural pilgrimage to Oaxaca and a winter art retreat in Kyoto,
    typically relies on last‑minute hostel deals and flexible itineraries, and balances these wanderlust urges against a tight student budget.
  culinary: Miguel Ramirez, a self‑taught home cook, experiments with mole poblano infused with matcha and chipotle‑marinated tofu, frequently crafts chilaquiles topped with cotija cheese and pickled radish,
    pairs dishes with craft sodas and mezcal‑infused cocktails, and occasionally forgets to clean the kitchen after late‑night cooking sessions.
  core: Miguel Ramirez is a 20‑year‑old visual arts student whose boundless imagination fuels experimental sketches, fusion cuisine, and spontaneous creativity, while their relaxed, disorganized habits
    sometimes cause missed deadlines.
background:
  cultural: Miguel grew up in a bilingual Mexican‑American household in Texas, deeply rooted in both Mexican traditions and Southern Texan culture. Family celebrations like Día de los Muertos and quinceañeras
    taught him the value of storytelling and visual symbolism. He is fluent in Spanish and often incorporates Mexican folklore, such as the legend of La Llorona, into his artistic projects. At the same
    time, the rugged landscapes and historic sites of Walker County influence his appreciation for regional history and community ties. This blend of cultural influences shapes his artistic voice, allowing
    him to fuse vibrant Mexican color palettes with the more subdued tones of Texan countryside aesthetics.
attributes:
  skills: '[''Digital illustration'', ''Creative writing'', ''Conceptual design'', ''Basic web development (HTML/CSS)'', ''Urban photography'', ''Fluent Spanish'']'
  hobbies: '[''Sketching and concept art'', ''Experimental music production'', ''Reading speculative fiction and magical realism'', ''Urban photography'', ''Cooking Mexican fusion dishes'', ''Participating
    in open‑mic and improv events'', ''Community mural painting'']'
  career_goals: Miguel aspires to become a freelance concept artist and visual storyteller, eventually collaborating with indie game studios or animation projects that value experimental aesthetics. He
    plans to complete a BFA in Visual Arts while building a robust online portfolio that showcases his blend of Mexican cultural motifs with contemporary design. In the longer term, he dreams of opening
    a community art space in Walker County where local artists can exhibit work, conduct workshops, and explore cross‑cultural collaborations. He also hopes to publish a graphic novel that weaves speculative
    fiction with elements of Mexican folklore.
