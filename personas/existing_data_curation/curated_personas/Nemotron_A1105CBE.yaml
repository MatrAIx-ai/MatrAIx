personas:
  professional: Joseph Swinehart, an aspiring aerospace hobbyist, blends a curious yet practical mindset with hands‑on skills in model rocket construction and wooden birdhouse building, letting their relaxed,
    flexible attitude turn unexpected setbacks into opportunities for improvisation, and they often share completed rockets with friends at local park gatherings.
  sports: Joseph Swinehart, who spends weekends hiking the trails around Covington and practicing catch‑and‑release fishing with friends, roots for the Cincinnati Bengals and Reds while occasionally joining
    a community youth baseball league, and they prefer low‑key, flexible outdoor activity over formal gym routines.
  arts: Joseph Swinehart, who strums simple chords of Ed Sheeran and Taylor Swift on an acoustic guitar at family gatherings, devours adventure and sci‑fi novels such as The Hunger Games and Ender’s Game,
    and they spend hours crafting intricate builds in Minecraft while watching YouTubers like DanTDM for inspiration, letting these creative outlets shape a vivid imagination and a love for storytelling.
  travel: Joseph Swinehart, who prefers spontaneous day trips over rigid itineraries, has explored nearby Mammoth Cave National Park and taken a family road‑trip to Washington, D.C., and they dream of backpacking
    through the Great Smoky Mountains and eventually visiting the Fuji‑surrounded landscapes of Japan, balancing modest allowance limits with an appetite for rugged adventure.
  culinary: Joseph Swinehart, who enjoys cooking simple meals like cheese‑topped pizza and grilled cheese sandwiches, often caps off fishing outings with fresh‑caught catfish fried in cornmeal, and they
    love making s’mores over a campfire with graham crackers, marshmallows and chocolate, reflecting a love for hearty, hands‑on comfort foods.
  core: Joseph Swinehart is a curious, hands‑on teen who balances a love for building rockets and playing guitar with a relaxed, occasionally forgetful attitude toward chores and budgeting, and they often
    trade homework for late‑night Minecraft sessions.
background:
  cultural: Joseph comes from a white, rural family in Craig County, Virginia, where Southern Appalachian traditions shape daily life. Community events such as county fairs, church gatherings, and local
    sports games are central to his upbringing. His family emphasizes self‑reliance, respect for the natural environment, and close‑knit family ties, all of which influence his values, interests, and aspirations.
