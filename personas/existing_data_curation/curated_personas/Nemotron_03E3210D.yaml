personas:
  professional: Nadia Mayhue, a seasoned quality assurance specialist with over 35 years of hands‑on experience in pharmaceutical and food manufacturing, leverages their expertise in statistical process
    control, LIMS, and Lean Six Sigma Green Belt certification to mentor junior inspectors, design robust sampling plans, and champion a new diversity‑focused mentorship program as they prepare for a senior
    management role.
  sports: Nadia Mayhue enjoys daily walks along the National Mall, participates in a senior cycling club during the spring, follows the Washington Capitals hockey team and the DC United soccer club with
    spirited enthusiasm, and they prefer low‑impact fitness like yoga over high‑intensity training to protect their joints.
  arts: Nadia Mayhue sings in a local gospel choir performing arrangements of the Clark Sisters and Shirley Caesar, studies West African dance inspired by traditional rhythmic patterns, they discuss works
    by James Baldwin and Zora Neale Hurston in a book club centered on literature of marginalized voices, and frequently attend exhibitions at the Smithsonian’s National Museum of American History.
  travel: Nadia Mayhue prefers structured travel planning, often joining book‑club trips to historic Southern towns such as Savannah, Georgia, and taking short Caribbean getaways to Jamaica to explore local
    markets, while they budget carefully to balance volunteer commitments and family responsibilities.
  culinary: Nadia Mayhue is an accomplished home cook who regularly prepares Southern classics like shrimp and grits and Caribbean delights such as jerk chicken with mango salsa, seasoning dishes with fresh
    thyme, scotch bonnet peppers, and smoked paprika, and they delight in sharing these meals at community potlucks.
  core: Nadia Mayhue balances a methodical, detail‑oriented professional life with a vibrant community presence, juggling quality‑control leadership, gospel singing, garden nurturing, and frequent worry
    about missed details, while they secretly hoard an ever‑growing collection of novelty tea mugs.
background:
  cultural: Nadia is a second‑generation African‑American who grew up in Washington, D.C., with family roots tracing back to the Great Migration from the rural South. Her upbringing was steeped in the rich
    cultural traditions of the Black community—music, storytelling, church fellowship, and community activism. She celebrates Juneteenth, honors African heritage through dance and cuisine, and maintains
    close ties with local organizations that support Black professionals in STEM. Nadia’s cultural identity informs her collaborative approach at work, her dedication to mentorship, and her commitment to
    fostering inclusive spaces both professionally and socially.
attributes:
  skills: '[''Quality control inspection'', ''Sample collection and weighing'', ''Instrument calibration'', ''Statistical process control (SPC)'', ''Root‑cause analysis'', ''Corrective‑action implementation'',
    ''Standard operating procedure (SOP) development'', ''Regulatory compliance (GMP, FDA, ISO 9001)'', ''LIMS administration'', ''Barcode and scanner operation'', ''Data analysis with Excel and Minitab'',
    ''Lean Six Sigma Green Belt'', ''ASQ Certified Quality Auditor'', ''Mentoring and training of staff'', ''Occupational safety and hazard mitigation'']'
  hobbies: '[''Gospel choir singing'', ''West African dance classes'', ''STEM outreach volunteering'', ''Community gardening'', ''Cooking traditional Southern and Caribbean cuisine'', ''African‑American
    literature book club'', ''Walking tours of the National Mall and Smithsonian museums'', ''Yoga and mindfulness meditation'', ''Civic engagement and social justice advocacy'']'
  career_goals: Nadia aims to transition into a senior quality assurance management role within the next two years, overseeing a multidisciplinary inspection team at a large manufacturing facility. She
    plans to earn a Six Sigma Black Belt to deepen her expertise in process optimization and waste reduction. A core ambition is to champion diversity and inclusion by establishing a mentorship program
    for women of color entering STEM and quality assurance fields. Nadia also hopes to author a practical guide on integrating statistical tools into day‑to‑day sampling operations and to become a sought‑after
    consultant for regulatory compliance projects across the Mid‑Atlantic region.
