  career_goals: Christopher aims to turn his artistic abilities and social knack into a sustainable, flexible career. Over the next two years he plans to enroll in a community‑college certificate program
    in graphic design or digital media, build a professional portfolio, and start taking on freelance commissions for logos, posters, and social‑media graphics for local businesses and musicians. He also
    hopes to launch a small side venture—such as a custom‑t‑shirt and sticker shop—that blends his design work with his interest in street‑wear culture. Ultimately, Christopher wants to achieve a stable
    freelance income that supports his marriage, allows him to maintain a flexible schedule for spontaneous travel and community activities, and eventually expands into a boutique design studio that collaborates
    with other creatives in the Green Bay area.
