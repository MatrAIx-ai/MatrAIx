personas:
  professional: Roosevelt Hernandez, a communications student leveraging Photoshop, Illustrator, and bilingual fluency, coordinates campus art showcases while developing social media strategies that blend
    meticulous planning with spontaneous creative twists, reflecting their curious, organized yet flexible, and outgoing nature.
  sports: Roosevelt Hernandez is an avid skateboarder with the Bellevue Skate Club, hikes the Platte River trails on weekends, and cheers for the Nebraska Cornhuskers football team and Kansas City Royals,
    balancing high‑energy solo pursuits with communal fan rituals.
  arts: Roosevelt Hernandez frequently visits Omaha’s contemporary galleries, documents street murals by artists like Banksy and Shepard Fairey on their blog, and draws inspiration from Georgia O’Keeffe’s
    vivid color palettes while curating community art events.
  travel: Roosevelt Hernandez favors budget‑friendly road trips, having explored the vibrant murals of Austin, the historic art districts of Santa Fe, and the bustling street art scene of New Orleans, while
    dreaming of a future cultural exchange program in Barcelona.
  culinary: Roosevelt Hernandez experiments in the kitchen with family‑heritage dishes like slow‑cooked pork tacos and inventive fusion recipes such as kimchi‑infused quesadillas, showcasing a solid intermediate
    cooking skill and a penchant for fresh cilantro, lime, and smoky chipotle.
  core: Roosevelt Hernandez blends a curious eye for art, a lively social streak, and a disciplined yet spontaneous approach to life, all while juggling student finances, skate‑park injuries, and a relentless
    love for salsa dancing.
background:
  cultural: Roosevelt was raised in a bilingual Mexican-American household, where Spanish was spoken at home and English at school. Family gatherings often featured traditional celebrations such as Día
    de los Muertos and quinceañera festivities, instilling a strong sense of cultural pride. His parents immigrated from Jalisco, bringing with them a love for music, storytelling, and culinary traditions
    that he continues to honor. Living in Bellevue, Nebraska, he navigates a blend of Midwestern values—like community responsibility and modesty—with the vibrancy of Mexican cultural practices. This hybrid
    identity fuels his passion for bridging cultural gaps through art, communication, and community projects.
attributes:
  skills: '[''Graphic Design'', ''Digital Photography'', ''Bilingual Spanish-English Communication'', ''Event Planning'', ''Basic Web Development (HTML/CSS)'', ''Customer Service'']'
  hobbies: '[''Visiting art galleries and street murals'', ''Digital photography'', ''Salsa dancing'', ''Cooking Mexican and fusion cuisine'', ''Skateboarding'', ''Hiking'', ''Cooperative multiplayer gaming'']'
  career_goals: Roosevelt aims to complete his bachelor's degree in Communications or Marketing within the next three years, leveraging his creative background to enter the field of social media strategy
    and community outreach. He aspires to work for a cultural institution or nonprofit organization in the Omaha metropolitan area, where he can design and promote art programs that engage diverse audiences.
    In the long term, he envisions leading a multidisciplinary team as a Community Engagement Director, creating inclusive initiatives that celebrate both his Mexican heritage and the broader Midwestern
    community.
