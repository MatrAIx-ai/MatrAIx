persona_description: A scientist at the Friedrich Miescher Institute for Biomedical Research who specializes in the study of cancer and its treatment. The scientist has identified a novel target for the
  treatment of malignant brain tumors, specifically the Mer receptor tyrosine kinase (MerTK). The scientist has found that MerTK is highly expressed in human brain tumors but absent from normal adult brain
  tissue, and that loss of MerTK strongly reduces the invasive capacity of tumor cells. The scientist has also discovered that MerTK drives glioma cell invasion by regulating actomyosin contractility, thus
  helping the invading cell to squeeze through small spaces into the surrounding brain tissue.
