  career_goals: Kimberly aims to mentor emerging supervisors and build a succession plan that preserves her department’s collaborative culture. Over the next five years she hopes to launch a green‑logistics
    initiative that reduces fuel consumption and carbon footprint, and to develop a mental‑health and wellness program for her crew to address anxiety and stress. As she approaches retirement, she envisions
    transitioning to a part‑time advisory role, consulting on safety and efficiency while dedicating more time to community volunteering and personal well‑being.
