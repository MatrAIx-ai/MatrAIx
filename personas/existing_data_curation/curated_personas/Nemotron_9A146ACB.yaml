  career_goals: Mohamed aims to advance from his current surveillance officer role to a senior supervisory position overseeing a team of guards at a major casino resort. He plans to earn the Certified Protection
    Officer (CPO) credential and complete an online Bachelor’s degree in Criminal Justice to qualify for security management roles. Long‑term, he envisions spearheading the integration of AI‑driven video
    analytics into the casino’s security operations, improving incident detection while mentoring newer staff. His ambition is to be recognized for improving safety standards and fostering a disciplined,
    high‑performing security culture.
