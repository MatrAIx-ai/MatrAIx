personas:
  professional: Miguel Duarte, a 24‑year‑old management analyst in Leawood, harnesses advanced Excel, SQL, and Power BI to dissect complex data sets and design process‑optimizing strategies, while their
    methodical, competitive nature and talkative charisma turn intricate findings into clear, persuasive presentations for senior leadership.
  sports: Miguel Duarte, a competitive amateur soccer midfielder in the Leawood City League, trains twice weekly, draws tactical inspiration from the Kansas City Chiefs and Sporting Kansas City, and spends
    weekend hikes in the Flint Hills to balance team camaraderie with personal endurance.
  arts: Miguel Duarte, an avid guitarist, channels the fiery fingerpicking of Paco de Lucía and the melodic storytelling of John Mayer into spontaneous performances at local Spanish cultural evenings, while
    they binge‑watch Pedro Almodóvar films and collect vintage vinyls that echo their love for lively, expressive art.
  travel: Miguel Duarte plans trips with spreadsheet‑precision, preferring short‑haul road trips to Austin and Nashville for music festivals and longer escapes to Barcelona and Buenos Aires to explore Spanish‑speaking
    cultures, yet they often extend stays to network with local professionals, balancing adventure with career‑building opportunities.
  culinary: Miguel Duarte, a confident home chef, perfects paella with saffron‑infused rice, chorizo, mussels, and shrimp while pairing tapas like patatas bravas and jamón serrano with a glass of Rioja,
    and they host weekly dinner gatherings where their meticulous plating rivals their analytical reports.
  core: Miguel Duarte is a structured yet sociable 24‑year‑old who turns data into strategy, spices life with guitar riffs and paella, and relentlessly schedules both career milestones and weekend fun,
    even if that sometimes means juggling too many commitments.
background:
  cultural: Miguel was born to Spanish parents who emigrated to the United States shortly after his birth, and he grew up in a bilingual household that celebrated both Andalusian traditions and Midwestern
    values. He maintains strong ties to his heritage through regular visits to Spain, participation in local Semana Santa processions, and involvement with the Spanish‑American Chamber of Commerce in Kansas
    City. His upbringing emphasized family meals, respect for hierarchy, and a love for music and dance, while his American schooling instilled a pragmatic, results‑oriented mindset. This dual cultural
    lens shapes his professional approach—combining Mediterranean relational networking with the structured efficiency prized in the U.S. corporate environment.
attributes:
  skills: '[''Strategic business analysis'', ''Data analytics (Excel, SQL, Power BI)'', ''Financial modeling'', ''Cost‑benefit and risk assessment'', ''Process mapping and improvement'', ''Project management
    (Agile and Waterfall)'', ''Stakeholder communication and presentation'', ''Bilingual communication (Spanish/English)'', ''Competitive benchmarking'']'
  hobbies: '[''Amateur soccer (league competition)'', ''Guitar playing and performing at gatherings'', ''Cooking Spanish dishes (paella, tapas)'', ''Participating in Toastmasters for public speaking'',
    ''Organizing professional networking mixers'', ''Strategic board games (Catan, chess)'', ''Logic puzzles and crosswords'', ''Hiking in Kansas parks'']'
  career_goals: Miguel aims to become a senior management consultant within the next five years, eventually leading a practice focused on operational excellence for multinational firms. He is driven to
    obtain professional certifications such as PMP or CBAP to bolster his credentials, and plans to pursue an MBA with a concentration in finance to broaden his strategic perspective. In the long term,
    he envisions founding his own consultancy that helps Spanish‑American businesses expand into the U.S. Midwest market, leveraging his cultural fluency and analytical expertise. He also seeks leadership
    roles within his current organization where he can mentor junior analysts and spearhead high‑impact transformation projects.
