persona_description: A Quality Assurance Manager who is interested in implementing Six Sigma and DMAIC methodologies in their organization to achieve quality objectives. They are looking for a course that
  provides a practical framework for understanding how to achieve quality objectives and plan and implement a quality assurance initiative. They are willing to apply the DMAIC methodology of Six Sigma quality
  within a management framework and create a top-level project definition for a quality assurance initiative. They are also interested in analyzing their current process, identifying metrics for measuring
  the process, determining if the current process meets customer requirements, and conducting a measurement systems analysis. They are willing to conduct a value stream analysis to determine value and non-value
  added steps in critical processes and identify and verify the root causes of problems in critical processes. They are also interested in showing, with data, how specific solutions can eliminate problems
  in critical processes. They are willing to conduct a failure mode effect analysis to identify, analyze, prioritize, and document potential failure modes and their effects on a product or service. They
  are also interested in controlling the improvement process to ensure that their quality improvement plan is successful by standardizing the new process, measuring the bottom-line impact to the business,
  and documenting lessons learned. They are also willing to address challenges that could potentially impact the successful implementation of a continuous improvement program.
