  career_goals: Mary Sue aims to pursue a stable, people‑focused career that balances routine with opportunities to help others. In the short term, she plans to volunteer at the local health clinic and
    join the school's peer‑support program to gain experience in caregiving and mentorship. After high school, she hopes to attend community college for a nursing associate degree, eventually becoming a
    registered nurse so she can provide reliable, hands‑on care within her community while maintaining a predictable work schedule.
