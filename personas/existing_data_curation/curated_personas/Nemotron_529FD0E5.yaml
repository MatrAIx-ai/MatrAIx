  hobbies: '[''coloring and drawing'', ''building with wooden blocks'', ''exploring backyard nature (collecting leaves, rocks, observing insects)'', ''listening to children\''s music and singing'', ''reading
    picture books at library storytime'', ''matching and memory games'', ''pretend play as a doctor or scientist'', ''simple science experiments (mixing paints)'']'
  career_goals: Even at four, Margaret talks about what she wants to be when she grows up. She often says she would love to become an artist who creates pictures that tell stories, and she imagines opening
    her own little studio where friends can draw together. Her love of discovery also leads her to dream of being a scientist or a museum curator who explores new ideas and shares them with others. Occasionally
    she mentions becoming a teacher because she enjoys showing friends how to solve puzzles or make art, and she sometimes says she wants to be the best at whatever she tries, reflecting her competitive
    streak.
