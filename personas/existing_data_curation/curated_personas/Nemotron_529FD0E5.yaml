personas:
  professional: An enthusiastic pre‑K learner, Margaret Worth approaches each day's play‑based curriculum like a budding architect, meticulously arranging building blocks into cityscapes while letting their
    imagination run free, and they display early problem‑solving acumen and a competitive edge when comparing creations with peers.
  sports: A budding athlete, Margaret Worth dabbles in the Rocky Mount Youth Soccer Club’s tiny tots program during spring, cheers for the Carolina Panthers on game nights, idolizes Charlotte Hornets guard
    LaMelo Ball, and they love splashing in the community pool whenever the summer heat rolls in.
  arts: An enthusiastic art explorer, Margaret Worth spends weekends at the Edgecombe County Children’s Museum painting watercolors inspired by Van Gogh’s Sunflowers, giggles to Sesame Street’s catchy tunes,
    and they proudly mimic Bob Ross’s “happy little trees” during their local art workshop.
  travel: A curious wanderer, Margaret Worth loves family road trips to Wilmington’s sandy shoreline and the Great Smoky Mountains, eagerly anticipates returning to the Edgecombe County Fair each fall,
    and they daydream about a future adventure to Disney World’s Magic Kingdom, though they often need reassurance before new journeys.
  culinary: A budding foodie, Margaret Worth relishes creamy mac and cheese with a sprinkle of sharp cheddar, delights in buttery buttermilk biscuits slathered with honey, carefully spreads peanut butter
    and jelly on whole‑grain bread, and they proudly declare that corn on the cob beats any broccoli on the plate.
  core: Margaret Worth, a four‑year‑old with a voracious curiosity, a competitive streak, and a meticulously organized piggy‑bank system, navigates childhood through the lens of Southern community storytelling,
    and they often fret over tiny changes in routine.
background:
  cultural: Margaret grows up in a White family in Rocky Mount, North Carolina, a small city in Edgecombe County known for its close‑knit neighborhoods and community events. Her family participates in local
    traditions such as the Edgecombe County Fair, church Sunday school, and community library story‑times, giving her regular exposure to Southern hospitality and communal storytelling. She attends a play‑based
    pre‑K program that blends structured learning with open‑ended creative activities, reflecting the region’s emphasis on both academic readiness and personal expression. The local cuisine, seasonal festivals,
    and frequent visits to nearby parks and the historic downtown area shape her experiences, while her parents encourage involvement in the town’s children’s museum and art workshops, fostering her appreciation
    for art and new ideas.
