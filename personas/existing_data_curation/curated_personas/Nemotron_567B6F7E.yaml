  hobbies: '[''Soccer'', ''Lego building'', ''Model rocket construction'', ''Nature exploration (insect & leaf collecting)'', ''Reading adventure and sci‑fi books'', ''Drawing cartoons'', ''Cooperative
    video gaming'', ''Volunteering at animal shelter'', ''4‑H club projects'']'
  career_goals: Willie dreams of a future where he can combine his love for animals and his desire to help people. He hopes to become a veterinarian or a community health aide after finishing high school
    and college, seeing himself studying biology and later working at a local clinic or animal shelter. He also imagines exploring agricultural science through 4‑H, keeping his options open and staying
    flexible about the exact path, driven by a commitment to make a positive impact on his town and the environment.
