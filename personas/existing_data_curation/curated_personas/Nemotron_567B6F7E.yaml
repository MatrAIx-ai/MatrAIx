personas:
  professional: Willie Cook is an aspiring young engineer who blends a practical curiosity for how things work with a love for building intricate Lego creations, often sketching ideas in their nature journal
    before tackling school science projects and dreaming about designing their own model rockets.
  sports: Willie Cook darts onto the midfield for the Mooresville Thunder Y‑U12 soccer squad, idolizing Charlotte FC’s midfielders and cheering for the Carolina Hurricanes when the season rolls in, favoring
    teamwork drills over solo drills and viewing each game as a chance to build camaraderie rather than win at all costs.
  arts: Willie Cook sketches lively comic strips inspired by the humor of "Adventure Time" and the dynamic art of Brad Morris, devours the "Ender’s Game" series before bedtime, and jams to the catchy tunes
    of "Imagine Dragons" while building elaborate Lego worlds, letting creative storytelling bleed into every hobby.
  travel: Willie Cook has trekked through the trails of Crowders Mountain State Park, marveled at the historic sites of Washington, D.C., and dreamed of launching a mini‑expedition to the Kennedy Space
    Center in Florida, favoring hands‑on, nature‑focused trips over packed theme‑park itineraries.
  culinary: Willie Cook’s palate gravitates toward cheesy macaroni, pepperoni pizza, and crunchy apple slices sprinkled with cinnamon, and they proudly master a simple "Lego‑shaped" pancake recipe using
    flour, eggs, and a dash of vanilla, though they often forget to finish their vegetables before reaching for dessert.
  core: Willie Cook merges boundless curiosity with a laid‑back, disorganized charm, turning every Lego build, nature hunt, and soccer game into a cooperative adventure while juggling a pocket‑full of unfinished
    sketches and half‑saved allowances.
background:
  cultural: Willie comes from a white, Midwestern family rooted in Mooresville, Indiana. His upbringing reflects the small‑town values of neighborliness, community service, and a close connection to the
    local agricultural landscape. Family traditions include church gatherings, seasonal community fairs, and participation in 4‑H, which together nurture a sense of independence, modesty, and a pragmatic
    work ethic. These cultural influences shape his compassionate nature and his desire to contribute to the well‑being of his community.
