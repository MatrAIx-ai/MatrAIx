  career_goals: Eugene dreams of turning his curiosity about how things work into a future career in engineering or technology. He aims to study robotics or mechanical engineering, hoping to design and
    build functional machines that solve real‑world problems. His competitive spirit drives him to participate in science fairs, coding contests, and robotics competitions, with the long‑term goal of earning
    a scholarship to a top STEM program and eventually contributing to innovative projects at organizations such as NASA or a tech startup.
