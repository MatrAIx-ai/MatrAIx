personas:
  professional: Eugene Thompson is a budding robotics hobbyist who combines an early love of LEGO architecture with methodical Scratch programming, approaching each new project by mapping out step‑by‑step
    plans and testing ideas with a pragmatic eye for what works.
  sports: Eugene Thompson rides a mountain bike along the American River Parkway, participates in the school’s cross‑country club, cheers for the Sacramento Kings during basketball season, and keeps a competitive
    edge by tracking personal lap times against peer benchmarks.
  arts: Eugene Thompson draws creative inspiration from LEGO artist Nathan Sawaya, devours sci‑fi novels by Andy Weir, listens to Imagine Dragons on repeat, and spends weekend afternoons building intricate
    LEGO dioramas that double as storytelling canvases.
  travel: Eugene Thompson has hiked the red‑rock trails of Yosemite on a family trip, dreams of biking through the streets of Copenhagen to see its famed bike culture, and prefers short, well‑planned weekend
    getaways that fit within a school calendar.
  culinary: Eugene Thompson favors homemade pizza topped with pepperoni and extra mozzarella, enjoys whipping up banana‑strawberry smoothies for after‑bike rides, and proudly crafts rock‑shaped sugar cookies
    that echo their rock‑collecting hobby.
  core: Eugene Thompson blends a child‑sized curiosity for building and coding with a surprisingly organized, competitive streak, turning each LEGO set, bike ride, and spreadsheet into a miniature laboratory
    for mastering the world.
background:
  cultural: Eugene comes from a white, middle‑class family living in the suburban community of Rancho Cordova, California. His upbringing reflects typical American values such as independence, practicality,
    and community involvement. Family traditions include celebrating holidays like Thanksgiving, Christmas, and the Fourth of July with barbecues and fireworks, as well as attending local community events
    and school activities. Growing up in a diverse region of the Bay Area’s greater Sacramento region, Eugene is exposed to a mix of cultural influences, including Spanish language signs, regional Native
    American history, and the multicultural fabric of California, which adds a broader perspective to his otherwise conventional suburban background.
