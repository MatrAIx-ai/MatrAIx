personas:
  professional: An aspiring teenage tech entrepreneur, Huey Wilkie spends weekends overclocking custom PC builds and sketching blueprints for a neighborhood repair‑shop, thriving on the immediate challenge
    of troubleshooting hardware while they often skip formal planning and miss project deadlines.
  sports: Huey Wilkie hits the local skate park—Skate Haven—every Saturday, pulls off ollies and kickflips while cheering for the hometown baseball team the River City Runners, and they join pickup basketball
    at Riverside Community Center where they idolize the NBA’s Golden State Warriors for their fast‑paced play.
  arts: Huey Wilkie's soundtrack is a looping mix of The Strokes, Tame Impala, and Daft Punk, fueling both gaming marathons and DIY circuit work, and they spend spare evenings sketching pixel‑art characters
    inspired by indie game titles while occasionally catching live shows at the downtown music venue The Underground.
  travel: Huey Wilkie has road‑tripped to the Pacific Northwest for PAX West, dreamed of boarding a Tokyo arcade corridor to hunt rare fighting‑game cabinets, and they hope to visit California’s Silicon
    Valley to tour start‑up incubators, all while balancing family budget constraints and school obligations.
  culinary: Huey Wilkie favors quick, high‑energy meals like spicy ramen, pepperoni pizza, and homemade chicken tacos, enjoys experimenting with extra‑hot sriracha and cornflakes as a crunchy topping, yet
    their cooking skill hovers at an enthusiastic beginner level, often resorting to microwave shortcuts when they are late for a gaming session.
  core: Huey Wilkie is a competitive, tech‑savvy teen who thrives on fast‑paced gaming and DIY projects, balances a love for structure with a spontaneous streak, and they navigate life with a skeptical
    eye and a calm, resilient demeanor.
background:
  cultural: Huey grew up in Rochester, New York, a city with a legacy of manufacturing, higher‑education institutions and a vibrant arts scene. As a white American of mixed European ancestry, his family
    reflects the middle‑class suburban culture of Monroe County, valuing self‑reliance, punctuality and community involvement. Rochester’s seasonal climate, proximity to the Erie Canal and the presence
    of institutions like RIT and the University of Rochester have exposed him to both technical innovation and cultural events such as the Rochester International Jazz Festival. These influences shape his
    pragmatic outlook, his appreciation for hands‑on craftsmanship, and his openness to diverse hobbies while maintaining a grounded, locally rooted identity.
attributes:
  skills: '[''Computer hardware assembly and troubleshooting'', ''Basic automotive maintenance'', ''Bike repair'', ''Advanced mathematics problem solving'', ''Strategic video game play'', ''Basketball team
    coordination'']'
  hobbies: '[''Gaming (FPS and strategy)'', ''Skateboarding'', ''Computer building and overclocking'', ''Pickup basketball'', ''Listening to alternative rock and electronic music'', ''Participating in school
    robotics club'']'
  career_goals: He aims to complete high school with a solid GPA and then enroll in a technical apprenticeship program, preferably in automotive technology or HVAC, where he can combine his hands‑on skills
    with formal training. Over the longer term he envisions becoming a certified automotive technician who can later transition into automotive engineering or a specialized role in electric‑vehicle retrofitting.
    He also entertains the possibility of pursuing competitive esports, hoping to join a regional team and develop a disciplined training routine. Whatever path he chooses, he values a career that offers
    clear structure, tangible outcomes, and opportunities to apply his competitive drive.
