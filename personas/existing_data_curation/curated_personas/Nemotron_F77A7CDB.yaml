personas:
  professional: Rosemary Been is a budding junior marine scientist who spends afternoons at tide pools conducting simple water‑quality experiments, channeling their love for puzzles into systematic data
    collection and eagerly sharing findings with the school’s science club, yet they often forget to log results in a timely manner.
  sports: Rosemary Been is an enthusiastic youth soccer player in a local Saint Augustine league, cheering for the Tampa Bay Rays during baseball season and the Jacksonville Jaguars on Fridays, while also
    spending weekends sprinting along the pier and swapping soccer tricks with friends, though they sometimes skip practice to finish a Sudoku puzzle.
  arts: Rosemary Been delights in sketching cartoon characters inspired by Pixar films and reading mystery novels by Lemony Snicket, often humming Ariana Grande’s latest pop hits while painting seashell
    collages, yet they can be picky about listening to classical music unless it’s in the background of a movie.
  travel: Rosemary Been prefers spontaneous day trips to nearby beaches and the historic fort, enjoys family road trips to Orlando’s theme parks, dreams of exploring the Everglades on a guided kayak tour,
    and usually packs a small tote with sunscreen, a puzzle book, and a seashell‑hunting guide, though they sometimes forget to bring a snack.
  culinary: Rosemary Been loves the smoky flavor of weekend family barbecues, especially grilled chicken and corn on the cob, savors key lime pie and shrimp tacos after beach outings, and enjoys making
    simple peanut butter‑banana sandwiches, but they often skip vegetables and rely on sugary fruit snacks for quick energy.
  core: Rosemary Been is a structured‑yet‑flexible nine‑year‑old who mixes a love for puzzles, soccer, and seashells with a habit of misplacing chores, a keen eye for detail, and a penchant for spontaneous
    beach adventures, and they often forget where they left their favorite puzzle piece.
background:
  cultural: Rosemary grew up in a white, middle‑class family in Saint Augustine, Florida, a city known for its Spanish colonial history and vibrant coastal culture. Her upbringing includes regular visits
    to the historic fort, lighthouse, and local museums, which have given her an appreciation for the area’s blend of European and Native American influences. Family traditions such as weekend barbecues,
    Easter egg hunts, and occasional church services reflect typical Floridian customs, while the steady flow of tourists exposes her to a variety of languages and cultures. The warm climate and nearby
    beaches have shaped a lifestyle centered on outdoor play, swimming, and community events like the annual St. Augustine Sea Turtle Festival.
