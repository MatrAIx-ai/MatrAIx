  career_goals: Even though she is only nine, Rosemary already imagines a future where she can combine her love of the sea, her knack for solving problems, and her competitive spirit. She dreams of becoming
    a marine biologist or ocean conservationist who explores tide pools and helps protect sea turtles, and she plans to start by winning her school’s science fair and joining the junior marine club. She
    also sees herself as a teacher who can create clear lesson plans and guide younger kids through hands‑on experiments. In the short term, she aims to improve her math contest scores, earn a spot on the
    varsity soccer team, and take on a leadership role in the school’s science club.
