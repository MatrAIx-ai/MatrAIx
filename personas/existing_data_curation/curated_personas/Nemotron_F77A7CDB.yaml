  hobbies: '[''Jigsaw puzzles'', ''Age‑appropriate Sudoku'', ''Soccer'', ''Reading mystery and adventure books'', ''Collecting seashells'', ''Sketching cartoons'', ''Exploring tide pools'', ''Science club
