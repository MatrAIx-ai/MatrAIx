personas:
  professional: Chu Zhang is a preschool class helper who balances curiosity and practicality by carefully arranging story‑time schedules, ensuring everyone gets a turn with toys, and reliably tidying the
    play area before nap time, and they take pride in keeping the classroom organized.
  sports: Chu Zhang energetically participates in the Little Tigers soccer team, attends weekly swimming lessons at the community pool, and cheers on the New York Yankees during baseball season, blending
    their sociable spirit with a disciplined practice routine.
  arts: Chu Zhang delights in drawing cartoon characters from Disney’s Frozen, sings "Let It Go" during kindergarten music class, and dances to "Baby Shark" with friends, showcasing their outgoing creativity
    and cooperative enthusiasm for shared artistic activities.
  travel: Chu Zhang loves family trips to the local zoo, the sunny beach in Santa Monica, and a magical weekend at Disneyland, where they eagerly plan itineraries, count souvenirs, and imagine future adventures
    to the pyramids of Egypt.
  culinary: Chu Zhang prefers cheese pizza, chicken nuggets, and strawberry yogurt, proudly helps stir pancake batter at breakfast, yet stubbornly refuses broccoli, revealing a picky yet enthusiastic eater
    who loves simple, brightly colored foods.
  core: Chu Zhang is a methodical, curious five‑year‑old who organizes block towers, saves every cent for a bike, battles seasonal sneezes with a tiny inhaler, dribbles soccer balls, sings Disney tunes,
    and can’t resist a slice of pizza.
background:
  cultural: Chu Jin’s family is of East Asian (Chinese) heritage, maintaining traditions such as celebrating Lunar New Year with red envelopes, dumplings, and lanterns, and speaking Mandarin alongside English
    at home. The household values education, respect for elders, and community harmony, which shape his compassionate and cooperative nature. Growing up in Bowie, MD, he also participates in multicultural
    community events, enjoys the diverse foods and festivals of Prince George’s County, and blends his cultural roots with the broader American environment.
