  career_goals: Chu Jin often talks about wanting to become a doctor or a teacher because he loves helping people feel better and sharing knowledge. He is also fascinated by space and dreams of being an
    astronaut who can explore the stars. Occasionally, he imagines designing cool inventions or building big structures with LEGO, reflecting an early interest in engineering and problem‑solving.
