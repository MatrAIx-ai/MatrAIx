personas:
  professional: Abdelhak John is a meticulous arts‑administration hopeful who channels their curatorial research expertise, grant‑writing savvy, and event‑planning precision into community‑focused museum
    projects, all while drawing on their innate curiosity and sociable charm to build inclusive cultural programs, and they often volunteer to lead tours on weekends.
  sports: Abdelhak John energizes their week by playing forward in a co‑ed soccer league that mirrors the camaraderie of the New York Red Bulls fan base, occasionally catching a New Jersey Devils game on
    weekends, and they dedicate Friday evenings to light runs through Morristown’s historic streets to stay fit.
  arts: Abdelhak John breathes contemporary art, attending openings at MoMA PS1 and the New Museum, performing with the Morristown Players, designing sets inspired by Ai Weiwei and the color palettes of
    Yayoi Kusama, while they capture urban architecture with a Leica M10, curating a personal portfolio that blends photography and set design.
  travel: Abdelhak John meticulously plans artistic pilgrimages, having explored the galleries of New York City, the Renaissance marvels of Florence, the avant‑garde districts of Tokyo, and they now eye
    the medina of Marrakech as a future immersive study of architectural heritage.
  culinary: Abdelhak John enjoys cooking international fare—from Moroccan tagine seasoned with preserved lemons and fresh cilantro from their herb garden, to Japanese ramen broth simmered with kombu and
    miso, and Italian gnocchi tossed with sage butter—though they occasionally over‑salt the final dish, prompting a quick taste‑test correction.
  core: Abdelhak John is a curiosity‑driven, hyper‑organized cultural catalyst who seamlessly blends community theater, museum curation, and garden‑fresh cooking into a lively, coffee‑fuelled rhythm of
    life, and they never miss a chance to share a freshly brewed espresso after a successful exhibition.
background:
  cultural: Abdelhak identifies as White American with deep roots in the Northeastern United States. His family lineage traces back to Irish and German ancestors who settled in New Jersey during the early
    20th century. Growing up in Morristown’s historic suburb, he was exposed to a blend of traditional American customs—such as Thanksgiving, Fourth of July celebrations, and high school football—and the
    vibrant cultural offerings of nearby New York City, including theater, museums, and world‑cuisine festivals. The multicultural resonance of his given name, Abdelhak, sparked an early appreciation for
    global art traditions, prompting him to explore Middle Eastern and African visual art alongside European classics. This dual appreciation informs his inclusive worldview, driving both his personal pursuits
    and community involvement.
