  career_goals: Looking ahead, Abdelhak aims to translate his volunteer experience into a professional role in arts administration. Within the next two years he plans to enroll in a master’s program in
    Museum Studies or Arts Management to deepen his theoretical foundation. He aspires to secure a position as a program coordinator or curator at a regional museum or cultural center, where he can design
    inclusive exhibitions and community outreach programs. Long‑term, he envisions founding a nonprofit that offers free, interdisciplinary art workshops for families in Morristown, fostering creative expression
    and cultural literacy. He also hopes to serve on a municipal arts council, influencing policy to sustain local arts infrastructure while balancing his responsibilities as a husband and father.
