  career_goals: Lawrence dreams of merging his love for art and technology to become a concept artist or independent game designer. He plans to attend a high school with a strong arts program, develop a
    portfolio of illustrated stories and prototype games, and eventually study visual arts or interactive media at a university. His long‑term ambition is to work on projects that blend imaginative narratives
    with innovative design, perhaps even leading a community creative studio in his hometown.
