personas:
  professional: Lawrence Ogilvie, a budding digital illustrator and self‑taught game mechanic enthusiast, channels their vivid imagination and relaxed approach to deadlines into creating whimsical comic
    strips and prototype board games during after‑school coding clubs.
  sports: Lawrence Ogilvie, an energetic member of the middle‑school soccer team, the Cedar Valley Knights, and a weekend participant in the local youth rock‑climbing club, enjoys group drills and informal
    sprints that satisfy their love for movement and camaraderie.
  arts: Lawrence Ogilvie, an avid creator of digital paintings inspired by Studio Ghibli’s “Spirited Away,” indie musicians like Mitski and Tame Impala, and a casual guitarist who jams at school assemblies,
    finds that these artistic outlets shape their identity and spark endless storytelling ideas.
  travel: Lawrence Ogilvie, who painstakingly maps out weekend visits to the nearby science museum and dreams of exploring Tokyo’s Akihabara district and the LEGO® House in Billund, balances a love for
    interactive exhibits with a modest family travel budget and school permission constraints.
  culinary: Lawrence Ogilvie, a budding home chef who enjoys whipping up quick ramen with miso broth, baking chocolate chip cookies, and experimenting with avocado toast toppings like feta and chili flakes,
    showcases a playful palate yet often skips breakfast in the rush before school.
  core: Lawrence Ogilvie, a relentlessly imaginative 13‑year‑old who doodles on every scrap of paper, loses track of time during game design sessions, and alternates between frantic creativity and laid‑back
    procrastination, embodies a quirky blend of curiosity and relaxed discipline.
background:
  cultural: Lawrence grew up in a typical middle‑class, suburban environment in Pleasantville, New Jersey. His family follows mainstream American traditions such as celebrating Thanksgiving, Fourth of July
    fireworks, and Halloween, while also participating in local community events like the annual county fair and neighborhood sports leagues. He is exposed to a blend of suburban Northeast culture, including
    access to nearby urban centers like Philadelphia and Atlantic City, which broadens his artistic influences. His white American heritage reflects a mix of Anglo‑American customs and values that emphasize
    independence, curiosity, and community involvement.
