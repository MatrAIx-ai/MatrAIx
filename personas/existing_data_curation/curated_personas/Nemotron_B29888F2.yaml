    ''Mentoring and peer support'']'
  hobbies: '[''Visiting contemporary art galleries and street‑art murals'', ''Urban photography'', ''Cooking traditional Southeast Asian dishes and experimental fusion'', ''Collecting vintage vinyl records
    and attending indie music shows'', ''Playing tabletop role‑playing games with a small group'', ''Mindfulness meditation and journaling'', ''Reading modern psychology and philosophy'', ''Exploring thrift
    shops for unique décor'']'
  career_goals: Aquilino aims to transition from floor sales to a managerial role that lets him shape the aesthetic direction of a boutique or specialty shop, especially one featuring Southeast Asian art,
    fashion, or crafts. He dreams of launching a small e‑commerce platform that showcases handcrafted items from his cultural community, merging his retail expertise with his love of art. Pursuing part‑time
    coursework in art history or fine arts is on his agenda, as is obtaining a bachelor's degree to broaden his strategic outlook. He also hopes to mentor younger associates on both sales techniques and
    mental‑health awareness, fostering a supportive workplace that respects flexibility and creativity.
