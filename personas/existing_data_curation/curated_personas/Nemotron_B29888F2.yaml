personas:
  professional: Aquilino Tran, a 50‑year‑old seasoned retail salesperson in Southern California, merges a sharp eye for visual storytelling with fluent English, Tagalog, and Vietnamese to create immersive
    boutique displays, and is now channeling curiosity and a penchant for flexible, improvisational problem‑solving into a managerial role that will champion emerging Southeast Asian art and craft trends.
  sports: Aquilino Tran enjoys low‑key fitness routines such as weekend beach volleyball with a local club, Saturday morning yoga classes, and follows the LA Lakers, LA Galaxy, and Los Angeles Dodgers,
    but often skips scheduled workouts when anxiety spikes, preferring spontaneous walks to photograph street murals.
  arts: Aquilino Tran immerses themselves in LA’s art scene, regularly attending openings featuring artists like Yayoi Kusama and Francis Alÿs, curates a personal collection of rare 1970s vinyl from David
    Bowie and contemporary indie bands like Mitski, and documents urban street‑art through candid photography that blends cultural narratives with modern aesthetics.
  travel: Aquilino Tran favors spontaneous, photography‑focused trips, having recently explored the night markets of Saigon, the historic districts of Manila, and a relaxing weekend in Kyoto’s Gion neighborhood,
    while planning a future road‑trip along the Pacific Coast Highway to capture sunrise murals in Santa Barbara.
  culinary: Aquilino Tran cooks at an intermediate level, perfecting family staples such as adobo, pho, and bun bo hue, and loves experimenting with fusion twists like avocado‑leaf pho broth or adobo‑marinated
    tacos, often seasoning dishes with star anise, lemongrass, and tamarind for depth.
  core: Aquilino Tran is a curious, art‑driven retail veteran whose anxiety fuels both impulsive vinyl hunts and meticulous mindfulness practice, balancing flexible work habits with a love for communal
    cooking and quiet photography sessions.
background:
  cultural: Aquilino is a first‑generation American born to a Vietnamese father and a Filipino mother who settled in Southern California after migrating in the early 1990s. Growing up in North Hollywood,
    he was immersed in a multicultural environment that blended the festive rhythms of Tet, the colorful celebrations of Sinulog, and the artistic eclecticism of the LA arts district. Fluent in English,
    Tagalog, and conversational Vietnamese, he navigates multiple cultural identities, honoring family traditions of communal meals and respect for elders while embracing the individualistic, creative energy
    of his hometown. His heritage influences his palette—both in cuisine and visual aesthetics—fueling his passion for showcasing Southeast Asian art and crafts within mainstream retail contexts.
attributes:
