    problem solving"]'
  hobbies: '["Reading contemporary fiction and self‑help books", "Journaling for self‑reflection", "Sketching and watercolor painting", "Hiking local trails and bird‑watching", "Volunteering at an animal
    shelter", "Listening to country and indie music", "Playing narrative‑driven video games", "Baking desserts for friends and family"]'
  career_goals: Gina aims to complete her high‑school education by obtaining a GED or finishing her diploma within the next year. She plans to enroll in a community college program focused on psychology
    or counseling, with the long‑term ambition of becoming a licensed therapist who specializes in adolescent mental health. She also hopes to start a peer‑support group at her school to provide a safe
    space for classmates dealing with anxiety and depression. In the future, Gina envisions pursuing a master’s degree in clinical psychology and eventually working for a nonprofit organization that offers
    mental‑health services to underserved youth in West Texas.
