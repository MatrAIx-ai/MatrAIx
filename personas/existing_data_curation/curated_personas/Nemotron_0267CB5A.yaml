personas:
  professional: Gina Hooper, an aspiring adolescent therapist, leverages solid computer and communication skills to organize peer‑support sessions and translate psychological research into practical, compassionate
    action, while they balance curiosity with a pragmatic, detail‑oriented approach.
  sports: Gina Hooper hikes the Buffalo Springs Trail on weekends, volunteers with the local bird‑watching club, follows the Texas Tech Red Raiders football team, and they occasionally attend community
    yoga classes to balance active outdoor pursuits with gentle fitness.
  arts: Gina Hooper sketches watercolor sunsets over the West Texas horizon, devours contemporary fiction such as "Normal People", streams country artist Kacey Musgraves and indie singer Phoebe Bridgers,
    and they curate a modest Instagram feed that showcases their art and reinforces their emotional outlet.
  travel: Gina Hooper plans modest road trips, having explored Santa Fe’s art scene and dreaming of trekking Patagonia’s glaciers, and they balance limited funds with a love for expansive natural vistas,
    preferring early‑morning drives over last‑minute bookings.
  culinary: Gina Hooper bakes chocolate‑chip cookies and pecan pie using cinnamon, vanilla, and locally sourced pecans, while they also relish a well‑seasoned chicken fajita with fresh cilantro and lime,
    reflecting a blend of comfort baking and Tex‑Mex flavors.
  core: Gina Hooper is an empathetic, anxiety‑prone 18‑year‑old who blends West Texas self‑reliance with a modern, introspective pursuit of mental‑health advocacy, often over‑thinking but driven by genuine
    care.
background:
  cultural: Gina is a White American raised in Lubbock, Texas, a community known for its strong sense of local identity, family ties, and a blend of rural and small‑city culture. Her upbringing reflects
    typical West Texas values such as self‑reliance, community involvement, and appreciation for outdoor activities, while also being shaped by modern, internet‑driven exposure to diverse ideas and perspectives.
    Her family emphasizes education, personal responsibility, and a balance between tradition and openness to new experiences, which informs Gina’s practical curiosity and her desire to help others navigate
    emotional challenges.
attributes:
  skills: '["Basic computer proficiency (Word, PowerPoint, social media)", "Effective written communication", "Independent online research", "Group project organization and leadership", "Time management
