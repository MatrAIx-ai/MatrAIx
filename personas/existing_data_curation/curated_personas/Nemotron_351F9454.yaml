personas:
  professional: Van Taylor is a budding concept artist and junior robotics hobbyist who merges traditional sketching of fantastical creatures with digital design tools, while building intricate LEGO models
    and Minecraft machines, using their vivid imagination and competitive drive to push creative boundaries despite a relaxed attitude toward deadlines.
  sports: Van Taylor is an occasional participant in the Coshocton Community Center’s after‑school basketball pick‑up games, quietly rooting for the Ohio State Buckeyes football team, while preferring solo
    activities like bike rides along the nearby river trail to large crowds.
  arts: Van Taylor immerses themselves in speculative fiction by devouring works from Neil Gaiman and Brandon Sanderson, creates detailed character sketches inspired by Studio Ghibli’s ‘Princess Mononoke’,
    and composes ambient soundscapes using a free digital audio workstation while listening to Brian Eno and Aphex Twin.
  travel: Van Taylor enjoys planning low‑key family road trips, has visited the Rock and Roll Hall of Fame in Cleveland and the historic town of Gettysburg, and dreams of a future adventure to Kyoto, Japan,
    where they hope to explore traditional art studios and high‑tech innovation districts.
  culinary: Van Taylor favors hearty comfort foods like homemade mac and cheese and apple pie from county fairs, occasionally experiments with making simple pizza dough topped with pepperoni and pineapple,
    but their cooking skill remains at a basic level, often relying on microwave meals and school cafeteria options.
  core: Van Taylor is a day‑dreaming, tech‑savvy teen whose competitive spark fuels imaginative art and engineering projects, while a habit of procrastination and frequent worry adds both creative tension
    and occasional disorganization.
background:
  cultural: Van grew up in Coshocton, Ohio, a small Midwestern community surrounded by farmland and the historic Ohio River Valley. His family traces roots to German and Irish immigrants who settled in
    the region in the late 19th century, and family traditions include attending local Lutheran services and participating in county fairs. The town’s modest public library and community center provide
    access to art supplies, robotics clubs, and after‑school programs, which sparked his early interest in drawing and technology. While he embraces the Midwestern values of modesty and self‑reliance, he
    also draws heavily from global internet cultures—video‑game forums, online art communities, and international speculative fiction—creating a hybrid identity that blends his small‑town upbringing with
    a broad, imaginative outlook.
