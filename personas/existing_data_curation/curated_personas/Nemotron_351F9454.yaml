  career_goals: Van aspires to turn his imaginative talents into a career that blends art and technology. He dreams of becoming a concept artist for video‑game studios or an independent graphic novelist
    who can illustrate and write his own series. He hopes to receive a scholarship to an art‑focused high‑school program or a specialized academy, and eventually launch his own indie video‑game where he
    controls both the visual design and narrative direction. He also wants to enter creative contests to gain recognition for his original worlds and possibly secure freelance commissions that allow him
    the flexibility he values.
