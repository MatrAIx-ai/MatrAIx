  career_goals: She dreams of a future where she can share her love of discovery with others. Candelaria imagines becoming an elementary‑school teacher who incorporates hands‑on science experiments, allowing
    kids to explore the world while learning practical skills. She is also fascinated by animals and hopes to study to become a veterinarian so she can care for pets and wildlife. Both ambitions reflect
    her curiosity, her desire to help others, and her practical approach to making a positive impact.
