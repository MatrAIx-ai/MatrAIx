personas:
  professional: An enthusiastic junior playground coordinator, Candelaria Rodriguez uses her sociable energy, love for soccer, and knack for drawing to organize impromptu games and create colorful scoreboards
    for her friends, balancing curiosity about new game rules with a practical, easygoing approach.
  sports: A budding soccer enthusiast, Candelaria Rodriguez plays on the U7 side of the River Valley Soccer Club, cheers for the LA Galaxy after school, and enjoys hiking the trails of Dry Creek Pioneer
    Regional Park, embodying her energetic, team‑oriented spirit with a laid‑back approach to fitness.
  arts: An imaginative young artist, Candelaria Rodriguez blends folklore dance steps with the rhythms of traditional drums, sketches bright animals and superheroes inspired by Disney’s "The Lion King"
    and Marvel comics, and watches "Space Kids" and "Dino Adventures" cartoons, weaving cultural celebration and pop culture into her creative world.
  travel: Candelaria Rodriguez loves spontaneous day trips, from exploring the nearby creek park’s secret hideouts to family vacations at the sunny beaches of Laguna Beach, and she dreams of visiting the
    dinosaur fossil digs at Dinosaur National Monument and the historic castles of Edinburgh, preferring adventure over rigid itineraries.
  culinary: An energetic kitchen helper, Candelaria Rodriguez mixes ripe avocados, lime, and cilantro for guacamole, rolls soft masa dough for tamales with corn husks, and delights in munching on cheesy
    quesadillas and strawberry‑banana smoothies, showing a hands‑on enthusiasm for bold flavors while occasionally over‑seasoning her dishes.
  core: Candelaria Rodriguez is a curious, outgoing seven‑year‑old who blends soccer, dance, and LEGO building into a vibrant daily tapestry, juggling spontaneous fun with just enough practical focus to
    keep her friends engaged.
background:
  cultural: Candelaria is a first‑generation Mexican‑American born in Hayward, California. She grows up in a bilingual household where Spanish is spoken daily, and she attends a public elementary school
    that offers a dual‑language program. Her family celebrates Mexican traditions such as Día de los Muertos, Cinco de Mayo, and Christmas posadas, often gathering to cook tamales, make atole, and listen
    to música ranchera. The vibrant Mexican community in Alameda County provides her with cultural festivals, community dance classes, and neighborhood gatherings that reinforce her heritage while also
    embracing the diverse influences of the Bay Area.
