personas:
  professional: Aubrey Mason is a seasoned front‑office administrator in healthcare and municipal settings, leveraging 25 years of expertise in multi‑line phone systems, Epic record‑keeping, and meticulous
    calendar coordination, while their blend of curiosity and disciplined organization fuels process‑improvement initiatives and a drive toward an office‑manager role.
  sports: Aubrey Mason enjoys weekly morning walks along the Bayou and participates in a local women's softball league with the Bayou Belle Softball Club, follows the New Orleans Saints for football, the
    New Orleans Pelicans for basketball, and the LSU Tigers during college football season, balancing community team spirit with low‑impact exercise.
  arts: Aubrey Mason immerses themselves in the region’s musical heritage, regularly attending Zydeco shows featuring Clifton Chenier tributes and Buckwheat Zydeco, while also savoring mystery novels by
    Agatha Christie and historical biographies by Doris Kearns Goodwin, which together shape their appreciation for storytelling across mediums.
  travel: Aubrey Mason plans vacations with a blend of nostalgic road trips to New Orleans’ French Quarter and deliberate, budget‑friendly escapes to Asheville’s mountain retreats, while dreaming of a culinary
    pilgrimage to Montreal to explore its French‑Acadian roots, balancing a love of local culture with limited retirement savings.
  culinary: Aubrey Mason is an accomplished Cajun cook who perfects gumbo with a roux of dark brown flour and andouille sausage, crafts jambalaya featuring shrimp, chicken, and okra, and meticulously records
    each variation in a family scrapbook, often experimenting with file powder and bell peppers while still occasionally ordering fast‑food pizza as a quick cheat.
  core: Aubrey Mason blends meticulous organization with a love of Cajun tradition, juggling a high‑stress front‑office career, chronic worry, and a penchant for secret late‑night pizza runs.
background:
  cultural: Aubrey is a white Southern woman with deep roots in the Breaux Bridge area, tracing her family lineage to French‑Acadian settlers who arrived in Louisiana in the 18th century. Raised in a close‑knit
    Catholic community, she has absorbed the traditions of Mardi Gras, Cajun and Creole cuisine, and the lively Zydeco music scene. The rural Bayou environment has fostered a strong appreciation for nature,
    self‑reliance, and hospitality. Though her heritage is primarily French‑Acadian, Aubrey embraces the broader multicultural tapestry of Lafayette Parish, respecting the diverse influences that shape
    daily life in South Louisiana.
