    family recipes'']'
  career_goals: Aubrey aims to move into an office‑manager position within the next two years, overseeing the entire front‑desk operation and mentoring new staff. She plans to earn the Certified Administrative
    Professional (CAP) credential to formalize her expertise. Leveraging her disciplined, achievement‑driven nature, she wants to lead process‑improvement projects that streamline patient intake and information
    flow. In the long term, Aubrey envisions establishing a small consultancy that helps local businesses develop efficient administrative systems, securing financial stability for her retirement while
    allowing her to use her curiosity for practical problem‑solving.
