personas:
  professional: Bianca Moon, an 80‑year‑old retired community arts organizer, leverages decades of expertise in event planning, archival research, fundraising, and volunteer mentorship to quietly orchestrate
    art‑focused programs for senior centers, while their methodical nature ensures flawless execution and their deep compassion creates inclusive, harmonious spaces.
  sports: Bianca Moon enjoys low‑impact fitness by joining a Sunday morning walking group at the Tallgrass Prairie Preserve, follows the Oklahoma City Thunder basketball season and the Oklahoma Sooners
    football games on television, and they regularly attend senior‑center yoga classes, preferring gentle activity over competitive sports.
  arts: Bianca Moon spends hours painting watercolor prairie vistas, studies the works of Georgia O'Keeffe and Yayoi Kusama, attends opening receptions at the Oklahoma City Museum of Art and the River Arts
    District gallery, and they volunteer to curate rotating exhibits at the senior center, letting those experiences shape a nuanced appreciation for both classic and contemporary art.
  travel: Bianca Moon prefers carefully planned road trips to nearby natural gems like the Tallgrass Prairie Preserve, the Wichita Mountains Wildlife Refuge, and occasional weekend visits to Santa Fe’s
    historic plaza, favoring relaxed itineraries that accommodate their walker and modest travel budget while they dream of a future pilgrimage to the gardens of Kyoto.
  culinary: Bianca Moon delights in farm‑to‑table cooking with fresh garden harvests, frequently preparing zucchini‑corn succotash, heirloom tomato bruschetta, and wildflower honey‑glazed carrots, but they
    have a habit of over‑salting their soups and occasionally forget to set the timer for their slow‑cooker stews.
  core: Bianca Moon, an 80‑year‑old quiet yet endlessly curious steward of prairie art, blends meticulous organization with gentle compassion, and they nurture community, creativity, and a lasting artistic
    legacy.
background:
  cultural: Bianca was born in 1945 in a small Midwestern farming community and moved to Oklahoma City in her twenties. Raised in a Protestant, white Midwestern family, she grew up with strong values of
    modesty, self‑reliance, and community service. Living in Oklahoma exposed her to the region’s rich Native American artistic traditions and the vibrant local arts scene, which deepened her appreciation
    for diverse cultural expressions. Her upbringing emphasized participation in church gatherings, county fairs, and volunteer clubs, shaping her compassionate, cooperative spirit and her lifelong commitment
    to nurturing artistic and communal bonds.
