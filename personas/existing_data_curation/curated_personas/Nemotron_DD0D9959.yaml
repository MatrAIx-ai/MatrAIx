  career_goals: Although retired, Bianca continues to set meaningful goals that align with her values. She aims to establish a scholarship fund for budding artists in Oklahoma City, compile and publish
    a collection of oral histories from longtime residents, mentor emerging volunteers at the city’s cultural center, learn digital illustration techniques, and contribute her expertise to the board of
    the local art museum. Her ambition is to leave a lasting legacy of artistic enrichment and community cohesion.
