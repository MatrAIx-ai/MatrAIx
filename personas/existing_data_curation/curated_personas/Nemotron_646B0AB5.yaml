  hobbies: '[''Intramural basketball'', ''Historical museum docent volunteering'', ''Historical fiction book club'', ''Cooking Midwestern comfort food'', ''Hiking local trails'', ''Playing acoustic guitar
    in a folk group'']'
  career_goals: Eric aims to achieve tenure at his community college within the next three years, followed by a promotion to department chair. He intends to develop an interdisciplinary program that bridges
    history and digital media, securing a grant to support innovative teaching. In the longer term, he aspires to become a recognized educator in the region, publish a textbook on American cultural history,
    and contribute to community outreach by establishing partnerships between the college and local museums.
