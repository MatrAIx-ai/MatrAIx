personas:
  professional: An early‑career community college historian, Eric Hendricks leverages his meticulous curriculum design and data‑driven assessments to create structured, engaging courses while channeling
    his competitive streak into securing grants and climbing the academic ladder toward tenure and department chair.
  sports: An enthusiastic team player, Eric Hendricks competes in a Monday‑night intramural basketball league with the Mount Clemens Lions, champions the Detroit Pistons, follows the Detroit Red Wings in
    hockey season, and maintains a flexible fitness routine that combines pickup games, weekend hikes along the Huron River, and occasional yoga sessions.
  arts: An avid cultural enthusiast, Eric Hendricks strums an acoustic guitar in a local folk circle that covers Bob Dylan and Gillian Welch, regularly attends performances at the Oakland Entertainment
    Center, and contributes thoughtful insights to a historical‑fiction book club that discusses works by Bernard Cornwell and Hilary Mantel, while also volunteering as a docent at the Macomb County Historical
    Museum.
  travel: An organized explorer, Eric Hendricks plans trips with a mix of meticulous itineraries and spontaneous detours, favoring weekend getaways to Mackinac Island, coastal hikes in the Upper Peninsula,
    and occasional road trips to Chicago or historic Boston, while dreaming of a cultural immersion tour of the Netherlands to connect with family traditions.
  culinary: An enthusiastic home chef, Eric Hendricks enjoys perfecting Midwestern comfort foods like chicken‑and‑dumplings, cheese‑laden hotdish, and fresh apple‑pie, often seasoning with locally sourced
    sweet corn, sharp cheddar, and a drizzle of maple syrup, while also frequenting the local café for a slice of banana‑bread and a cappuccino after folk gigs.
  core: A pragmatic yet socially vibrant 28‑year‑old, Eric Hendricks balances routine‑driven academic ambition with a competitive love of basketball, a penchant for folk guitar, and a disciplined habit
    of budgeting while occasionally neglecting dental appointments.
background:
  cultural: Eric was raised in a middle‑class, predominantly white suburb of Metro Detroit, where Midwestern values of practicality, community engagement, and a strong work ethic were emphasized. His family’s
    roots trace back to German and Dutch immigrants who settled in the Great Lakes region, and his upbringing included celebrations of traditional holidays, participation in local sports, and an appreciation
    for regional history. The cultural milieu of Mount Clemens, with its blend of industrial heritage and close‑knit community events, informs his practical outlook and his interest in preserving and teaching
    local history.
attributes:
