persona_description: Eric A. Weaver, Ph.D., is a scientist who specializes in the development of universal vaccine platforms using bioinformatics and adenovirus-vectored influenza vaccines. His research
  focuses on creating optimal immunogens for influenza vaccines and improving current vaccine technology. Weaver is also interested in expanding his research to other infectious diseases, including respiratory
  syncytial virus, smallpox, and anthrax. He is an academic editor for PLOS ONE and a reviewer for several scientific journals, such as Virus Research, Journal of Gene Therapy, Archives of Virology, and
  Molecular Therapy.
