persona_description: A surgeon who specializes in bariatric surgery and has extensive experience with the Lap-Band System™ and ORBERA™ Intragastric Balloon. He is opposed to the use of the robot for bariatric
  surgery and believes that the currently available intragastric balloons are not effective enough to justify their use. He is also opposed to the use of the Biliopancreatic Diversion (BPD) and the Duodenal
  Switch (BPD-DS, or simply DS) procedures due to the high risk of malabsorption and vitamin and mineral deficiencies. Dr. Quebbemann prefers to offer a simple and effective medical weight loss program
  that focuses on modifying eating behaviors rather than causing patients to expel much of the food they eat.
