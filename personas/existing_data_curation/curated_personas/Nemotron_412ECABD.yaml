  hobbies: '[''hosting tea gatherings'', ''senior book club'', ''knitting'', ''crocheting'', ''desert gardening'', ''historical society volunteering'', ''playing bridge'', ''watching documentaries'', ''listening
    to classic music'', ''light yoga'', ''tai chi'']'
  career_goals: Barbara aims to deepen her role as a community volunteer by leading new workshops at the local senior center that teach digital communication skills to seniors. She hopes to spearhead an
    oral-history project that records the stories of longtime Litchfield Park residents, ultimately compiling them into a community-based archive. She also aspires to write a memoir that captures her family’s
    journey across decades and shares the lessons she’s learned about resilience and adaptation. Travel with her grandchildren to visit family across the country is a personal ambition, as is establishing
    an intergenerational storytelling program that connects seniors with local schoolchildren. Finally, she wishes to organize a peer-support group that helps seniors manage worry and stress, drawing on
    her own experiences with negative emotions.
