persona_description: A professional food inspector who is responsible for ensuring the safety and quality of foodstuffs in Austria. They work closely with the regional official food supervisory authorities
  to carry out sampling and analysis of foodstuffs to detect potential contaminants, such as pesticides. They are familiar with the EU's harmonised maximum residue levels for pesticides and are constantly
  updating their knowledge through ongoing research and development in analytical procedures. They are also aware of the importance of consumer exposure to pesticides and the need for clear distinctions
  between potentially harmful substances.
