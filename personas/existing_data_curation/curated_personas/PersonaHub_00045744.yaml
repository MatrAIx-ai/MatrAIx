persona_description: A person who is interested in telecommunications and networking technologies, particularly in the context of Local Area Networks (LANs) and Wide Area Networks (WANS). This individual
  is likely to have a strong background in computer science and network engineering, and is familiar with the latest developments and trends in these fields. They are also likely to be familiar with the
  concept of value-added networks and how they can add value to basic communication services provided by common carriers. They may have a particular interest in the specific technologies and applications
  used in local area networks, such as Ethernet and Token Ring, and may have experience with the different types of WANs available. They may also have an interest in the specialized services offered by
  value-added networks, such as email and video conferencing.
