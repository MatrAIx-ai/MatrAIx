personas:
  professional: Yan Hong is a veteran accountant and auditor who, after four decades mastering GAAP, tax preparation, internal controls, and forensic accounting, now channels their methodical precision
    and bilingual fluency in English and a heritage language into part‑time consultancy and mentorship, applying advanced Excel, SAP, Power Query and Tableau to deliver data‑driven audit solutions for family‑owned
    businesses.
  sports: Yan Hong practices disciplined tai chi twice a week at the neighborhood park and follows the Chicago Cubs and Chicago Bulls with season‑ticket devotion, while occasionally joining the Midwest
    Tai Chi Circle’s weekend walks that keep their joints supple.
  arts: Yan Hong cultivates brush‑calligraphy, solves crosswords and Sudoku, and collects vintage postage stamps, while finding inspiration in the lyrical poetry of classic literature and the piano renditions
    of Yo‑Yo Ma, often attending the Chicago Symphony Orchestra’s chamber concerts to feed their artistic sensibility.
  travel: Yan Hong prefers meticulously planned trips to historic sites, having explored the tranquil gardens of Suzhou and the ancient temples of Kyoto, and they dream of a leisurely river cruise along
    the Danube before their next family gathering, favoring short‑duration itineraries that balance comfort with cultural immersion.
  culinary: Yan Hong delights in hand‑rolling dumplings filled with pork, scallions, and ginger, baking mooncakes scented with lotus seed paste and roasted sesame, and seasoning balcony‑grown herbs like
    cilantro and basil into aromatic stir‑fries, reflecting a modest yet precise cooking style that favors fresh, seasonal produce.
  core: Yan Hong blends relentless precision with quiet curiosity, and they channel a lifelong love of order into disciplined consultancy, diligent finances, and solitary pursuits that keep their mind sharp
    and heart steady.
background:
  cultural: Born to immigrant parents from Taiwan who settled in Chicago's Chinatown in the 1960s, Yan grew up immersed in a blend of traditional East‑Asian values—emphasis on diligence, respect for elders,
    and community cohesion—and American urban life. She celebrates Lunar New Year, the Mid‑Autumn Festival, and other cultural holidays with family gatherings and traditional cuisine. While she values these
    roots, her professional path reflects a pragmatic adaptation to U.S. accounting standards and corporate culture. Her bilingual ability and nuanced understanding of both cultures enable her to bridge
    gaps for clients navigating cross‑border financial matters.
