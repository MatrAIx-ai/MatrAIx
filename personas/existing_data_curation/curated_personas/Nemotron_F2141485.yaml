  career_goals: Approaching retirement, Yan aims to shift into a part‑time consultancy focused on audit preparation and tax planning for small family‑owned businesses, especially within the East‑Asian community
    of Chicago. She intends to mentor emerging accountants through volunteer workshops at local community colleges and senior centers, sharing her competitive drive and meticulous standards. Yan also plans
    to deepen her proficiency in data‑driven auditing techniques to stay ahead of industry trends, and she hopes to establish a modest scholarship fund for Asian‑American students pursuing accounting degrees.
