  hobbies: '[''Visiting art museums and galleries'', ''Cooking Cuban recipes'', ''Digital photography and editing'', ''Salsa dancing'', ''Gardening herbs and vegetables'', ''Reading eclectic non-fiction'',
    ''Volunteer teaching Spanish conversation'', ''Attending community cultural festivals'']'
  career_goals: Rodolfo aims to channel his curiosity and love for culture into lasting community impact. He plans to launch a series of free cooking workshops that teach Cuban cuisine to neighbors, preserving
    culinary heritage and fostering cross‑cultural dialogue. He is pursuing a part‑time certificate in art history at Jefferson Community College to deepen his knowledge and eventually volunteer as a docent
    at the Speed Art Museum. He also hopes to start a bilingual blog and occasional YouTube channel sharing stories of Cuban diaspora, recipes, and art commentary. In the longer term, he would like to travel
    to Cuba to reconnect with family and explore contemporary Cuban art, using those experiences to enrich his local teaching. Mentoring younger Cuban‑American adults in career and cultural identity is
    another aspiration he holds dear.
