personas:
  professional: Kimberly Block, a 35‑year‑old interior designer who transforms abstract concepts into immersive, avant‑garde spaces using advanced 3D visualization tools, bold color palettes, and a fiercely
    competitive communication style that drives budget negotiations, while offsetting her aversion to strict timelines by delegating coordination to a trusted project manager.
  sports: Kimberly Block is a weekend hiker with the Lake Monroe Trail Club, a regular yoga practitioner at a downtown studio, and an avid supporter of the Indianapolis Colts and Pacers, while occasionally
    joining a co‑ed ultimate frisbee league that satisfies her competitive streak.
  arts: Kimberly Block frequents contemporary art galleries showcasing Ai\u200bWeiwei and Kara\u200bWalker, takes improv classes at a local theater where she channels the energy of The Second City, and
    curates playlists featuring Bon\u200bIver and Fiona\u200bApple to fuel her creative process.
  travel: Kimberly Block’s travel style blends design‑focused itineraries and spontaneous adventures, having documented her stays in Barcelona’s Gaudí districts, Copenhagen’s Danish design hubs, and Marrakech’s
    spice markets, while planning future trips to Buenos\u200bAires for its vibrant murals and the Japanese tea houses of Kyoto.
  culinary: Kimberly Block experiments with global cuisines at home, mastering Thai green curry with fresh galangal and lemongrass, preparing Japanese miso ramen seasoned with kombu, and crafting a Mediterranean
    beet‑goat‑cheese salad accented with sumac, all while hosting elaborate dinner parties that showcase her flair for plating on reclaimed vintage crockery.
  core: Kimberly Block is an imaginative, competitive interior designer who channels spontaneous creativity into sustainable avant‑garde spaces, balances a love for vintage finds with a disciplined investment
    strategy, and constantly juggles high‑energy social gatherings, yoga retreats, and design‑centric travels.
background:
  cultural: Kimberly grew up in Whiteland, Indiana, within a Midwestern white American family with German‑Irish roots. Her upbringing emphasized community involvement, practicality, and an appreciation
    for straightforward, functional aesthetics such as the regional farmhouse style. A humanities degree from Indiana University exposed her to European modernist and post‑modern art movements, which she
    blends with the warm, down‑to‑earth sensibilities of the Midwest. This cultural mix informs her design philosophy—balancing bold, novel concepts with welcoming, livable environments.
