  career_goals: Kimberly aims to become a creative director and eventually launch her own boutique interior‑design studio that champions avant‑garde, sustainable spaces. She aspires to be featured in national
    design magazines, publish a coffee‑table book showcasing her most innovative projects, and earn recognition such as the ASID Design Excellence Award. Additionally, she wants to mentor emerging designers,
    develop a structured studio process that balances her spontaneous style with reliable delivery, and expand her clientele beyond Indiana to include high‑profile urban commissions.
