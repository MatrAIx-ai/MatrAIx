  hobbies: '[''Gardening (vegetable and rose gardens)'', ''Hiking in the Hill Country'', ''Book club (historical fiction)'', ''Community event organization'', ''Potluck dinner hosting'', ''Texas barbecue
    cooking'', ''Volunteer docent at local history museum'', ''Participating in Uvalde County Fair'']'
  career_goals: Angela aims to grow her boutique brokerage into the leading real‑estate service in Uvalde County, expanding her team to include at least three newly licensed agents within the next two years.
    She plans to earn the Certified Residential Specialist (CRS) designation and pursue a real‑estate development license to facilitate affordable housing projects for local families. Additionally, she
    envisions creating a mentorship program that pairs seasoned agents with newcomers, fostering a collaborative, high‑performance culture.
