personas:
  professional: Mary Sheara, an experienced arcade equipment technician, blends a methodical, predictive workflow with a relaxed, people-centric vibe, they swiftly diagnose electrical faults, manage spare-part
    inventories, train junior techs, and keep venue owners smiling with clear, chatty updates, all while eyeing a future supervisory role in modern digital arcade systems.
  sports: Mary Sheara, an avid beach-walker and casual fisherman, spends weekends strolling the Gulf shoreline and joining the Gulf Coast Beach Volleyball Club for informal games, supports the New Orleans
    Saints in the NFL and the Houston Astros in MLB, and occasionally volunteers as a scorekeeper for local high school baseball, preferring low-impact, social fitness activities over regimented gym routines.
  arts: Mary Sheara, a lively member of the community theater troupe, regularly stars in musical numbers from shows like Grease and performs improvisational sketches, sways to the sounds of Jimmy Buffett,
    Chris Stapleton, and local brass band performances at the annual Gulf Music Festival, and curates a modest home jukebox of classic rock and southern soul that fuels her creative energy.
  travel: Mary Sheara, an adventurous yet budget-conscious traveler, has road-tripped to the Florida Keys for sunrise fishing, explored New Orleans during Mardi Gras, dreams of immersing herself in Japan’s
    Akihabara arcade scene, and often plans weekend getaways to Asheville’s mountain retreats, preferring self-guided itineraries that leave room for spontaneous beach stops.
  culinary: Mary Sheara, a Southern-flavor aficionado, loves cooking shrimp and grits, fried catfish with hush-puppy crumbs, and collard greens seasoned with smoked paprika and ham hocks, grows tomatoes,
    basil, and okra in her garden, and frequently incorporates fresh herbs and locally sourced Gulf oysters into her dishes, while occasionally splurging on specialty hot sauces for her retro arcade cabinet
    builds.
  core: Mary Sheara, a hands-on arcade technician who charms crowds with theater flair, balances meticulous repairs with spontaneous beach walks, delights in Southern cooking, and juggles a lively social
    calendar while dreaming of a boutique repair shop.
background:
  cultural: Mary was raised in a middle‑class family on the Florida Gulf Coast, where Southern hospitality and a close‑knit community ethos were central to daily life. Her upbringing emphasized hard work,
    respect for neighbors, and active participation in local traditions such as church gatherings, regional festivals, and neighborhood potlucks. The blend of coastal lifestyle and Southern cultural values
    fostered her warm, sociable nature and a strong sense of responsibility toward others. While she identifies with the broader American cultural landscape, she retains a fondness for regional customs,
    including seafood cuisine, beach recreation, and the informal, friendly communication style typical of the Gulf Coast.
attributes:
  skills: '["Coin-operated machine maintenance", "Electrical troubleshooting", "Mechanical repair and reassembly", "Preventive maintenance scheduling", "Customer service and communication", "Inventory and
    parts management", "Service schedule coordination", "Technical documentation", "Mentoring and training of junior technicians"]'
  hobbies: '["Community theater and musical performances", "Volunteering at local youth programs", "Beach walking and shell collecting", "Casual fishing trips", "DIY retro arcade cabinet building", "Gardening",
    "Cooking Southern-inspired cuisine", "Attending live music festivals"]'
  career_goals: Mary aims to broaden her expertise into modern digital arcade systems and eventually transition into a supervisory role overseeing a team of technicians. She plans to obtain certification
    as a certified amusement equipment technician, open her own small repair shop to serve local businesses, and develop a training program for apprentices. Long‑term, she hopes to become a recognized regional
    expert who can advise venue owners on equipment upgrades and maintenance best practices, while maintaining a work schedule that allows her flexibility for family and community commitments.
