personas:
  professional: Gurmukh Patel is a budding junior coder who builds simple games on a tablet, designs intricate LEGO structures, and applies a blend of curiosity and practicality to troubleshoot bugs while
    eagerly sharing discoveries with friends.
  sports: Gurmukh Patel is a lively member of the neighborhood soccer club 'Little Strikers', plays every Saturday at the local park, idolizes the Manchester United forward Marcus Rashford, cheers for the
    New York Knicks during winter, and balances energetic play with disciplined warm‑up routines taught by their coach.
  arts: Gurmukh Patel delights in dancing bhangra to the beats of Diljit Dosanjh at family gatherings, sings along to the pop tunes of Taylor Swift, flips through adventure comics by Jeff Smith, and sketches
    LEGO creations while admiring the colorful murals of street artist Banksy.
  travel: Gurmukh Patel loves weekend trips to the nearby botanical garden and annual visits to Grandma’s farmhouse, dreams of exploring the futuristic museums of Tokyo and the historic castles of Scotland,
    and prefers traveling with family in a car where they can map routes on a tablet while listening to travel podcasts.
  culinary: Gurmukh Patel eagerly assists in chopping onions for aromatic dal, rolls homemade samosas with a sprinkle of cumin, enjoys building pizza toppings with mozzarella and pepperoni, and can proudly
    name the ingredients of his favorite mango lassi—yogurt, mango pulp, and a dash of cardamom.
  core: Gurmukh Patel is a curious, organized eight‑year‑old who balances LEGO engineering with soccer, often forgets to finish bedtime reading but never misses a bhangra beat at family celebrations.
background:
  cultural: Gurmukh comes from a South Asian Indian family that maintains cultural traditions such as speaking Gujarati at home, celebrating Diwali, Holi, and Navratri, and participating in local Indian
