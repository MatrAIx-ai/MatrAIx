persona_description: A surgeon who is interested in using advanced technologies to improve surgical outcomes and precision in the operating room. They are familiar with the concept of activity-based probes
  and are seeking to explore the use of FIRE, a novel probe that targets only active enzymes found in the margins of cancer. They are interested in the fast and precise nature of the probe, as well as its
  ability to be used topically in vivo or ex vivo. They are also interested in the unique and flexible nature of the probe, and its potential applications in the future, such as in the assessment of tumor
  margins for various types of cancer.
