persona_description: A well-known African American poet and writer who won the Pulitzer Prize in 1950 for her poetry and writing. Her work was well known among African-Americans who read a newspaper called
  the Chicago Defender. After winning the Pulitzer Prize, her writing became known by white people as well. She influenced and inspired other writers such as Toni Morrison, and funded programs and prizes
  to encourage people to write poetry.
