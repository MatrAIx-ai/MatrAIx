personas:
  professional: Kathy Leon is an aspiring junior LEGO architect who organizes complex brick builds with the same methodical precision she applies to her school projects, yet they often forget to label the
    bins, causing a chaotic treasure hunt for missing pieces.
  sports: Kathy Leon loves sprinting around the neighborhood on their bike, scores goals on the local U‑7 soccer team, and cheers for the Utah Jazz during family game night while proudly wearing a Real
    Salt Lake youth fan shirt at community fairs.
  arts: Kathy Leon is a budding illustrator who fills sketchbooks with detailed animal drawings inspired by nature hikes, devours adventure books by Roald Dahl, and sings along to Disney soundtracks, especially
    those performed by Auli'i Cravalho, while they occasionally doodle on school worksheets when they get bored.
  travel: Kathy Leon enjoys spontaneous weekend trips to nearby red‑rock trails like Antelope Island State Park and dreams of visiting Disneyland, often packing a small backpack with snacks, a map of the
    route, and a favorite stuffed bear for comfort on long car rides.
  culinary: Kathy Leon prefers crunchy carrot sticks from the garden, cheesy pizza slices, and homemade banana pancakes on Saturday mornings, occasionally attempting to mix their own trail mix but usually
    ending up with a sticky honey‑syrup mess on the kitchen counter.
  core: Kathy Leon balances methodical LEGO construction with a love for messy outdoor play, a secret stash of coins for future kits, and a habit of forgetting to put bike helmets back on the rack.
background:
  cultural: Kathy grows up in a suburban family in Lehi, Utah County. Her household is rooted in White American traditions typical of the Intermountain West, emphasizing family meals, community involvement,
    and participation in local school events. While her family celebrates mainstream American holidays such as Thanksgiving and the Fourth of July, they also enjoy regional activities like hiking in the
    nearby foothills, attending community fairs, and occasional gatherings at their local place of worship. Through school and neighborhood programs, she is exposed to a modest mix of cultures, fostering
    an inclusive outlook.
