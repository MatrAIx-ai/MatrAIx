  career_goals: She imagines future careers that let her help living things and share knowledge. Kathy often says she wants to become a veterinarian because she loves caring for animals at the local park,
    and she also dreams of being a teacher to inspire younger kids. Occasionally she mentions becoming an astronaut after watching space documentaries, reflecting her curiosity about the world beyond.
