  career_goals: Wydell aims to open a boutique salon that also serves as a community art space, allowing local artists to showcase work while clients experience a culturally rich environment. She plans
    to develop her own line of natural, afro‑centric hair‑care products that reflect her expertise and heritage. Becoming a certified master stylist and earning regional beauty‑industry awards are key professional
    milestones. Wydell also seeks to lead workshops on textured hair care, mentor emerging Black cosmetologists, and collaborate with local schools to introduce cosmetology career pathways. Ultimately,
    she envisions her salon as a hub for empowerment, creativity, and intergenerational mentorship within the Cedar Hill community.
