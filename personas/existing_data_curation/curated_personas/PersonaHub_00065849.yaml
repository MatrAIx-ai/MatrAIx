persona_description: A neuroscientist who specializes in the study of the supraspinal connectome, particularly the mapping of descending projection neurons throughout the mouse brain. His research interests
  include mapping the distribution and spatial relationships of these neurons, and using this information to understand the functional consequences of different injuries and to better evaluate the efficacy
  of treatments. He is interested in disseminating this information to the wider neuroscience community, and is committed to creating an interactive web-based resource to spur progress by broadening understanding
  and analyses of essential but understudied supraspinal populations.
