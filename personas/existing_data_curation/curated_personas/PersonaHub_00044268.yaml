persona_description: A forest and conservation nursery manager who is interested in exploring the implications of climate change on the selection, production, and provision of trees for forestry purposes.
  They are seeking strategies and options to ensure the sustainability and adaptability of nurseries in the face of changing climatic conditions. They are likely to be involved in decision-making processes
  related to the selection of suitable trees for planting, the adaptation of nursery operations to new climatic conditions, and the development of breeding programs to maintain genetic diversity in the
  nursery stock. They may also be interested in exploring the use of assisted migration techniques to help trees adapt to changing climatic conditions.
