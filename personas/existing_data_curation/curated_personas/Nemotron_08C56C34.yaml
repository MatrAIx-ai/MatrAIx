personas:
  professional: Lee Ortega is a seasoned accountant and auditor who leverages advanced spreadsheet modeling, ERP expertise in SAP and Oracle NetSuite, and a humanities‑infused creative mindset to craft
    vivid financial visualizations, while they apply a competitive streak to drive meticulous risk assessments and a relentless pursuit of audit excellence.
  sports: Lee Ortega fuels their competitive drive by training with the Detroit Marathon Club for quarterly long‑distance runs, cheering for the Detroit Lions on Sundays, joining the Michigan Road Runners’
    weekly long‑run sessions, and they occasionally shoot hoops with the Detroit Pistons alumni group at community courts.
  arts: Lee Ortega’s evenings are spent sketching Detroit’s steel silhouettes, assembling mixed‑media collages from reclaimed industrial materials, attending jazz sessions by Robert Glasper and soul concerts
    featuring the Detroit Symphony Jazz Orchestra, and performing spoken‑word pieces at the Poetry Center’s monthly slam, drawing creative energy from icons such as Basquiat, Edward Hopper, and Nina Simone,
    and they find inspiration in the city’s resilient spirit.
  travel: Lee Ortega plans travel like a curated exhibition, meticulously budgeting for weekend getaways to Mackinac Island’s Victorian charm, jet‑setting to Berlin’s museum islands for a deep dive into
    contemporary art, and scheduling annual trips to New York’s MoMA and the Venice Biennale, and they balance work constraints with a hunger for cultural immersion.
  culinary: Lee Ortega, a competent home chef, frequently crafts Detroit‑style pizza topped with pepperoni, colby‑jack, and tangy pickled red onions, whips up beet‑goat cheese salads drizzled with walnut‑balsamic
    vinaigrette, and indulges in weekend barbecues featuring cedar‑planked salmon seasoned with dill, lemon, and smoked paprika, and they savor the creative process as much as the final flavor.
  core: Lee Ortega blends forensic precision with artistic flair, obsessively color‑coding spreadsheets like canvases, sprinting through marathons while sketching cityscapes, and they hoard vintage concert
    tickets in a drawer that serves as both shrine and cluttered mess.
background:
  cultural: Lee is a Black American who grew up in Inkster, Michigan, a suburb with deep ties to the African‑American experience of the Great Migration. His family maintains strong connections to church
    traditions, gospel music, and the storytelling culture of the Black community in Wayne County. Exposure to Motown legends and Detroit's vibrant art scene instilled in him an appreciation for music,
    visual arts, and community activism. Lee's cultural identity is shaped by a blend of African heritage passed down through family narratives and the Midwestern Black experience, emphasizing resilience,
    communal support, and a commitment to uplifting Black voices in both his professional and creative pursuits.
