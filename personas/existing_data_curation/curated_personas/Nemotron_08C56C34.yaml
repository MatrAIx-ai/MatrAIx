  career_goals: Lee aims to become a Certified Public Accountant (CPA) within the next two years and leverage that credential to advance to a senior audit manager role at a regional firm. His long‑term
    ambition is to transition into a leadership position—such as Chief Financial Officer—within a nonprofit arts organization or a cultural institution where he can blend his financial expertise with his
    passion for the arts. He also aspires to develop a boutique consultancy that offers financial advisory services tailored to artists, galleries, and creative startups, positioning himself as a thought
    leader at the intersection of finance and culture.
