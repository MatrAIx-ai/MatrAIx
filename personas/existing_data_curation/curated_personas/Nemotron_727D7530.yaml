  career_goals: Although currently not in the formal workforce, Kathleen aims to formalize her informal expertise. She plans to obtain a GED, improve her digital literacy, and launch a small online boutique
    selling hand‑crafted items and her own watercolor prints. Additionally, she hopes to become a volunteer docent at Glendale’s art museum, where she can share her love for art with visitors and organize
    occasional workshops for adults who enjoy quiet creative activities.
