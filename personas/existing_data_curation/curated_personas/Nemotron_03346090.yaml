  career_goals: Daniel aspires to pursue a career in engineering, with a particular interest in mechanical or civil engineering. He is motivated by a desire to create practical solutions that improve the
    infrastructure and sustainability of his rural community. In the short term, he aims to excel in high school STEM courses, join the school's robotics and engineering clubs, and earn a scholarship to
    study engineering at a university. He envisions eventually designing energy‑efficient buildings or innovative farming equipment that blends cutting‑edge technology with the practical needs of Michigan’s
    agricultural landscape.
