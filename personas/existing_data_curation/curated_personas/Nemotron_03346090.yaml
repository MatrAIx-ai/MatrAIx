personas:
  professional: A budding technophile and methodical tinkerer, Daniel Dubois spends his afternoons building intricate LEGO Technic models, coding simple games in Scratch and Python, and meticulously documents
    his projects in a leather‑bound notebook, reflecting his blend of curiosity and practical planning, and they often share their creations with a small circle of friends.
  sports: An outdoor‑oriented sports enthusiast, Daniel Dubois enjoys fishing at local lakes, rides their mountain bike on the nearby forest trails, participates in the middle‑school cross‑country club,
    and roots for the Detroit Tigers and the Mason County Wildcats high‑school football team during the season.
  arts: A creative hobbyist, Daniel Dubois practices acoustic guitar fingerpicking after school, draws inspiration from folk artists like John Denver and indie bands such as Arcade Fire, and spends weekends
    reading sci‑fi novels by authors like Andy Weir while swapping board game strategies with friends, shaping their artistic identity.
  travel: A modest adventure seeker, Daniel Dubois plans weekend getaways to nearby Sleeping Bear Dunes and Mackinac Island with meticulous checklists, dreams of trekking the Canadian Shield’s forested
    trails, and prefers low‑budget road trips that blend nature exploration with a love for historic small‑town charm.
  culinary: A budding home chef, Daniel Dubois enjoys whipping up simple meals like grilled cheese with raspberry jam, experimenting with fresh lake trout in a lemon‑butter sauce, and topping pancakes with
    maple syrup, while their favorite snack remains the classic corn dog from the county fair.
  core: Daniel Dubois is a methodical, curiosity‑driven teen who balances meticulous planning with a quiet love for lakeside reflection, often over‑organizing their LEGO projects and forgetting to take
    breaks during gaming sessions.
background:
  cultural: Daniel grew up in Hart, a small town in Mason County, Michigan, where the community is characterized by Midwestern values of self‑reliance, modesty, and close‑knit neighborly ties. His family,
    of French‑Canadian heritage reflected in the surname Dubois, maintains a blend of cultural traditions—occasionally speaking a few French phrases at home and celebrating holidays such as Thanksgiving,
    the Fourth of July, and local county fairs with a strong sense of community. Raised in a Protestant (likely Methodist/Lutheran) environment, he attends church events and participates in community service.
    The surrounding rural landscape, with its forests, lakes, and farmland, fosters his appreciation for nature and outdoor recreation.
