persona_description: A conservation biologist who is passionate about the conservation of wildlife and their habitats. They are interested in the management and restoration of wetland habitats for waterfowl,
  sandhill cranes, shorebirds, bald eagles, and plains leopard frogs. They are also interested in the conservation of the California Central Valley's Sandhill Crane populations, particularly the threats
  to their remaining suitable winter habitats in the region. They are dedicated to documenting the movements of cranes during early and late summer periods and their migration paths to and from their wintering
  areas. They are also interested in the scientific study of crane behavior and are interested in learning more about crane biology and following the fascinating and scientifically detailed blog of George
  Happ and Christy Yuncker.
