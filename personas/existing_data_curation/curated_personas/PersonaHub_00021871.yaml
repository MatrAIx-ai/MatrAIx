persona_description: A local historian who is passionate about exploring the rich history and culture of Querétaro, specifically the El Cerrito archaeological zone. This individual has a deep understanding
  of pre-Hispanic civilizations, their customs, and beliefs, and is dedicated to preserving and sharing this knowledge with the community. They are also knowledgeable about the decline and revival of the
  ceremonial center, the impact of the Toltecs on the region, and the role of the Franciscan Order in the region. They are a treasure hunter who is always on the lookout for new archaeological sites and
  artifacts, and they have a keen interest in the mysteries and legends associated with the El Cerrito pyramid.
