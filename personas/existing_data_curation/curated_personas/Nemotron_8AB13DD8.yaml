personas:
  professional: Yasuko Choi, a construction specialist with a flair for artistic design, leverages hands‑on framing, concrete mixing, and blueprint reading to lead crews toward custom remodels that blend
    functional structure with imaginative finishes, while embracing a flexible, occasionally improvisational management style.
  sports: Yasuko Choi, an avid hiker of the Angeles National Forest and weekend runner with the local Angeles Trail Runners club, follows the Los Angeles Lakers for basketball, the LA Dodgers for baseball,
    and the LA Galaxy for soccer, preferring solo outdoor workouts over crowded gym classes.
  arts: Yasuko Choi, a sketch‑loving visual explorer, spends weekends wandering galleries to admire works by Zaha Hadid and Yayoi Kusama, devours indie films by David Lynch, immerses herself in experimental
    soundscapes by Ryoji Ikeda and Brian Eno, and fuels her design imagination with speculative novels by China Miéville and design magazines like *Wallpaper*.
  travel: Yasuko Choi, a solo traveler who meticulously plans itineraries that balance industrial architecture tours with natural retreats, has explored the steel‑spine streets of Berlin, the geothermal
    wonders of Iceland, and the tranquil temples of Kyoto, and now dreams of trekking the basalt columns of the Faroe Islands while keeping expenses within a modest side‑business budget.
  culinary: Yasuko Choi, an enthusiastic home chef, routinely perfects kimchi jjigae and miso ramen, experiments with matcha‑infused dough for creative breads, and loves the crisp bite of tempura vegetables,
    all while maintaining a pantry stocked with gochujang, shoyu, and fresh nori for spontaneous culinary improvisations.
  core: Yasuko Choi, a thirty‑one‑year‑old construction artist, blends steel‑to‑canvas creativity with a habit of starting too many DIY projects at once, leaving half‑finished sketches scattered across
    her apartment, yet thrives on turning chaos into bespoke living spaces.
background:
  cultural: Yasuko is a first‑generation American of mixed Japanese and Korean heritage. Raised in a bilingual household in Southern California, she grew up celebrating both Chuseok and Obon, and was taught
    traditional cooking, calligraphy, and respect for communal effort. Her family’s emphasis on hard work and perseverance shaped her strong work ethic on construction sites. At the same time, exposure
    to both Japanese minimalism and Korean pop culture fostered a love for contemporary art and design. Living in the multicultural environment of San Dimas, she navigates an identity that blends American
    independence with East Asian cultural values, often seeking spaces where creativity and craftsmanship intersect.
attributes:
  skills: '["Framing and carpentry", "Concrete mixing and finishing", "Light machinery operation (forklift, floor jack)", "Basic blueprint reading", "Site safety compliance (OSHA)", "Creative problem solving",
    "DIY home improvement", "Hand and power tool proficiency", "Physical stamina and endurance", "Selective teamwork"]'
  hobbies: '["Sketching and watercolor painting", "DIY home improvement projects", "Visiting art galleries and street murals", "Reading speculative fiction and design magazines", "Photography of urban and
    natural scenes", "Cooking Korean and Japanese dishes", "Practicing calligraphy", "Listening to experimental music", "Hiking in Angeles National Forest"]'
  career_goals: She aims to leverage her practical construction background and artistic curiosity to become a foreman or crew lead within a few years, eventually moving into a niche of custom home remodeling
    where she can integrate her design ideas. Yasuko plans to obtain OSHA certification and a trade apprenticeship, and to build a modest side business that offers bespoke interior finishes and artistic
    installations for small‑scale residential projects. Long‑term, she dreams of establishing her own boutique construction‑design studio that blends functional building with aesthetic expression, allowing
    her to work on flexible schedules and maintain creative independence.
