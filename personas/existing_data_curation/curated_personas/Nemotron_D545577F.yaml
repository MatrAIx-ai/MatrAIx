    and Mitigation'', ''Policy and Regulatory Analysis'', ''Stakeholder Engagement and Facilitation'', ''Executive Reporting and Presentation'', ''Change Management'']'
  hobbies: '[''Tennis (local league)'', ''Group hiking trips'', ''Hosting dinner parties and cooking classes'', ''Volunteer work on Arlington County advisory boards'', ''Playing strategic board games (Catan,
    chess)'', ''Attending theater and live music events'', ''Reading non-fiction (economics, public policy, leadership)'', ''Gardening (vegetable garden)'', ''Genealogy research'']'
  career_goals: Anthony aims to transition into a senior leadership role—such as Director of Strategic Planning or Chief Data‑Driven Strategy Officer—within a regional government agency or a nonprofit focused
    on public service. He seeks to spearhead enterprise‑wide transformation projects that embed analytics into decision‑making, mentor the next generation of analysts, and establish best‑practice frameworks
    for performance measurement. He also plans to share his expertise through speaking engagements, publishing articles on data‑driven governance, and eventually launching a boutique consultancy that helps
    government entities optimize processes while fostering collaborative networks across agencies.
