  hobbies: '[''Beach walks'', ''Gardening'', ''Yoga'', ''Cooking experimental Mediterranean dishes'', ''Reading mystery novels'', ''Volunteering at free‑tax clinics'', ''DIY home‑improvement projects'']'
  career_goals: Looking ahead, Peggy aims to leverage her experience toward a supervisory position within the Revenue Department, where she can lead a team of examiners and shape policy‑driven process improvements.
    She plans to earn a Certified Public Accountant (CPA) credential to broaden her analytical toolkit and to champion the integration of data‑analytics and automation tools that enhance audit efficiency.
    Peggy also aspires to mentor junior agents, develop community outreach workshops that simplify tax filing for low‑income families, and maintain a balanced workload that supports her family life.
