  hobbies: '[''reading historical non‑fiction'', ''listening to history podcasts'', ''photography'', ''fishing at Galveston Bay'', ''playing acoustic guitar'', ''attending local open‑mic nights'', ''volunteering
    at the historical society'', ''cooking Tex‑Mex barbecue'', ''DIY home improvement projects'']'
  career_goals: Monty aims to transition from solo taxi work to running a small independent fleet that offers both conventional rides and curated historical tours of the Houston‑Gulf region, leveraging
    his humanities background. He hopes to earn a commercial driver’s license for higher‑pay freight work as a backup, while eventually publishing a guidebook on the area's cultural landmarks. Long‑term,
    he wants a steady retirement plan that reduces daily stress and provides financial security for his family.
