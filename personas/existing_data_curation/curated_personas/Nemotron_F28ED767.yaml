  hobbies: '[''drawing and painting'', ''LEGO building'', ''pretend role‑play as explorer or astronaut'', ''listening to picture books'', ''collecting leaves, rocks, and insects'', ''singing and dancing
    to children’s songs'', ''solving simple puzzles'', ''magnetic tile construction'']'
  career_goals: Gregory imagines many exciting futures, often sharing that he wants to become an astronaut exploring space, an artist creating bright paintings, or a doctor who helps people feel better.
    He also talks about being a 'space helper' who fixes problems for both Earth and the stars, and he enjoys the idea of teaching his stuffed animals and friends how to count and draw. His compassionate
    side leads him to think about caring for animals as a veterinarian or helping his community as a friendly neighborhood helper. These playful aspirations reflect his fascination with discovery, creativity,
    and service to others.
