personas:
  professional: Gregory Cowan, a budding junior scientist in preschool, delights in building block experiments and asking endless 'why' questions, turning playtime into miniature research labs where they
    blend imagination and organization to produce tidy, color‑coded discovery boards.
  sports: Gregory Cowan, a tiny soccer enthusiast, proudly dons a jersey of the local junior Lions club, kicks a soft ball at the neighborhood park, and they cheer for the New York Yankees whenever a game
    is on TV, embodying a playful mix of organized team spirit and spontaneous backyard races.
  arts: Gregory Cowan, an imaginative little artist, spends afternoons drawing whimsical creatures inspired by Dr. Seuss and Pablo Picasso’s shapes, sings along to Sesame Street songs, and they proudly
    showcase a collection of hand‑painted rocks to friends and family.
  travel: Gregory Cowan loves family road trips to the seaside boardwalk, recent adventures at the San Diego Zoo, and they daydream about a future visit to Disneyland Paris, always packing their favorite
    stuffed bunny and insisting on map‑reading with crayons.
  culinary: Gregory Cowan enjoys mac and cheese with hidden peas, loves dipping apple slices in caramel, can proudly spread peanut butter on toast with a little help, and they feel triumphant when they
    successfully 'cook' imaginary pizza in the play kitchen.
  core: Gregory Cowan is a bright‑eyed, compassionate four‑year‑old who blends boundless curiosity with gentle cooperation, often turning everyday chores into imaginative adventures while they occasionally
    forget bedtime.
background:
  cultural: Gregory is raised in a white, middle‑class family in Villa Rica, a small town in Douglas County, Georgia. His upbringing reflects Southern cultural values such as hospitality, politeness, and
    a strong sense of community. He attends a local preschool where activities often incorporate regional traditions, including celebrating holidays like Independence Day with parades and community picnics,
    and seasonal events such as pumpkin festivals. His family participates in church activities that emphasize caring for others, sharing, and kindness—principles that align with his compassionate personality.
    The rural‑suburban environment gives him frequent opportunities to explore nearby parks, observe local wildlife, and collect natural objects, fostering his curiosity about the natural world.
