  career_goals: Even at four, Xay talks about future jobs that combine his curiosity about the natural world with a desire to help others. He dreams of becoming a marine biologist who can protect the sea
    turtles and colorful fish near Kona’s beaches. He also mentions wanting to be a community helper, such as a firefighter or a doctor, because he likes keeping people safe. His practical side leads him
    to imagine a job like a construction engineer or architect, where he can design sturdy structures for his neighborhood.
