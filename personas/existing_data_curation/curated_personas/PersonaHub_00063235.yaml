persona_description: A plant scientist who specializes in plant genetics and plant physiology. The person is interested in understanding how plants convert atmospheric nitrogen into a usable form, how legumes
  convert atmospheric nitrogen into a usable form, and how plants use their leaves to capture radiant energy (sunlight) and convert it into chemical energy in the form of carbohydrates. The person is also
  interested in mapping resistance genes, conducting genetic studies of drought tolerance, and conducting research on the phenotype of plant root systems. The person is familiar with the Ernie and Lottie
  Sears Plant Growth Facility, which houses the research of 22 scientists and includes three levels of supplemental lighting, three large temperature – and humidity-controlled cold rooms for seed storage,
  and a large seed-sorting facility equipped with a drying oven. The person is interested in the ability to tightly control conditions in the facility to ensure plant science research is successful.
