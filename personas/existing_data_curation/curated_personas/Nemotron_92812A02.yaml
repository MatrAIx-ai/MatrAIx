  career_goals: She aims to transition into a senior technical leadership role, such as Lead Architect or Chief Technology Officer, where she can shape product strategy, champion best‑practice engineering
    standards, and expand mentoring programs for women and under‑represented groups in tech. Over the next few years she plans to earn an AWS Solutions Architect Professional certification, publish a technical
    whitepaper on secure microservices, and lead a community‑focused open‑source project that provides affordable software tools for local nonprofits.
