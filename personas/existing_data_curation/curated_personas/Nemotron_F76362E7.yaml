  career_goals: Although retired, Whitney’s ambition is to remain an active pillar of her community while continuing to learn and grow. She aims to expand her digital skills to help bridge the generation
    gap, offering informal tech tutoring to fellow seniors. Whitney hopes to volunteer as a mentor for youth programs at the community center, sharing her knowledge of local history and crafts. She is working
    on compiling a handwritten and digital archive of Albia’s oral histories to preserve for future generations. Maintaining her health and mobility is a priority so she can keep participating in the senior
    softball league, organize seasonal events, and travel across Iowa to visit historic sites and give informal talks at schools. Ultimately, she seeks to balance curiosity with practicality, staying engaged,
    flexible, and socially connected.
