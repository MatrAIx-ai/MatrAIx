  hobbies: '[''Book club participation'', ''Community gardening'', ''Church choir singing'', ''Volunteer tutoring'', ''Historical walking tours'', ''Quilting'', ''Birdwatching'', ''Cooking Southern cuisine'',
    ''Bridge (card game)'', ''Traveling to historic sites'', ''Low‑impact hiking'', ''Senior center workshops'']'
  career_goals: Kathy aims to leave a lasting legacy in her department by establishing a mentorship program for early‑career faculty and creating a community‑focused lecture series on Southern literature
    and local history. She hopes to secure a small endowment that will fund scholarships for non‑traditional students and to co‑author a reflective memoir on her decades of teaching in rural Tennessee.
    While she plans to continue teaching part‑time as long as her health permits, she also wants to transition into advisory roles, helping shape curriculum policy at the college level and volunteering
    her expertise for statewide adult‑education initiatives.
