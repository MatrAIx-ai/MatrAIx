  career_goals: Though only five, Jennifer expresses a vivid imagination about future professions. She dreams of becoming a teacher who can share knowledge with curious children, a veterinarian caring for
    animals she loves, and an astronaut exploring outer space. Her ambitions are guided by a desire to help, explore, and learn.
