personas:
  professional: Jennifer Vaughan, a budding mini engineer who spends her afternoons constructing intricate LEGO structures and experimenting with simple circuits in her quiet bedroom, blends her boundless
    curiosity with a practical step‑by‑step approach, staying organized while allowing room for creative improvisation.
  sports: Jennifer Vaughan, a cheerful participant in the Little Kickers soccer clinic and the Little Ducks swimming club, cheers loudly for the New Orleans Saints on Sundays while preferring solitary play
    like hopping on the backyard trampoline during her free time.
  arts: Jennifer Vaughan, a quiet creative who spends afternoons finger‑painting scenes inspired by Disney classics and dancing to country hits by Randy Travis and zydeco rhythms by Clifton Chenier, often
    lines up her crayons in rainbow order before starting a masterpiece.
  travel: Jennifer Vaughan, who delights in family road trips to the sunny Gulf Shores beaches and annual visits to Disneyland in Anaheim, cherishes the quiet moments watching the sunrise over the Gulf,
    and dreams of someday exploring the historic French Quarter of New Orleans.
  culinary: Jennifer Vaughan, a budding little chef who loves to stir her family's chicken gumbo with a wooden spoon, delights in the aroma of simmering okra and roux, adds a sprinkle of Creole seasoning
    to her mac and cheese, and proudly samples the first bite of jambalaya prepared by her mother.
  core: Jennifer Vaughan, a quiet five‑year‑old with an insatiable curiosity for building LEGO castles, a meticulous habit of saving every spare coin, and a strong preference for solitary play over noisy
    crowds, often organizes her toys into perfect rows before bedtime.
background:
  cultural: Jennifer comes from a white Southern family in Livingston, Louisiana. Her upbringing reflects a blend of traditional Southern values—emphasis on family, community, and church—and local cultural
    touches such as enjoying Creole cuisine, attending community fairs, and listening to country and zydeco music. Her family celebrates holidays like Christmas and Thanksgiving with customary customs,
    and she is exposed to both mainstream American media and regional stories that shape her worldview.
