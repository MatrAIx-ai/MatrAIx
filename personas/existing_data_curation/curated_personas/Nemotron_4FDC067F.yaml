  career_goals: Alie hopes to transition from a general production role to a position that blends her technical background with her creative curiosity, such as a process‑improvement specialist or a maintenance
    technician focused on lean‑manufacturing initiatives. She plans to enroll in a community‑college certification program for CNC machining and industrial maintenance, and to complete an OSHA refresher
    course. Concurrently, she dreams of launching a modest side business selling her original paintings and hand‑crafted décor, which would give her a flexible outlet for her artistic side while supplementing
    the family income. Long‑term, she envisions a role where she can mentor newer workers, champion safety culture, and have enough stability to pursue personal wellbeing practices like mindfulness therapy.
