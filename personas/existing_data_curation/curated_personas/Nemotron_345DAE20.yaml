personas:
  professional: Dunia Vazquezgarcia, a 21‑year‑old warehouse associate and business‑administration student, blends operational efficiency with a budding data‑driven mindset, leveraging their inventory‑management
    expertise, bilingual communication, and meticulous organization to streamline stock flow while planning a transition to a supervisory supply‑chain role.
  sports: Dunia Vazquezgarcia, a 21‑year‑old outdoor enthusiast, spends weekends hiking the North Cascades and running along Whatcom Bay, follows the Seattle Seahawks for NFL excitement, supports the Western
    Washington University Vikings, and they are a member of the North Cascades Hiking Society.
  arts: Dunia Vazquezgarcia, who cultivates a keen eye for light through their photography inspired by Ansel Adams, enjoys listening to indie folk artists like Bon Iver, reads nonfiction trade‑history books
    in an intimate book club, and occasionally attends community theater productions featuring actors such as Lakeith Stanfield.
  travel: Dunia Vazquezgarcia, a 21‑year‑old who prefers solo, purpose‑driven getaways, has explored the San Juan Islands and a weekend in Vancouver, dreams of trekking Patagonia’s Torres del Paine, and
    they meticulously plan trips with spreadsheets to balance budget constraints with a love for natural landscapes.
  culinary: Dunia Vazquezgarcia, a budding home chef, delights in preparing dishes like ceviche, causa, and pisco salsa using fresh Pacific Northwest ingredients, skillfully balances bold flavors while
    occasionally over‑seasoning out of enthusiasm, and they love sharing these meals with close friends in intimate gatherings.
  core: Dunia Vazquezgarcia, a methodical 21‑year‑old who blends curiosity with practicality, finds solace in solitary hikes, camera clicks, and cooking family recipes, often over‑organizes their schedule
    yet occasionally procrastinates on paperwork.
background:
  cultural: Dunia is a first‑generation Peruvian‑American; her parents emigrated from Lima and kept many aspects of their cultural heritage alive at home. She grew up bilingual, speaking Spanish with her
    family while attending English‑language schools in Bellingham. Family celebrations, such as Día de la Canción Criolla and Inti Raymi reenactments organized by the local Peruvian community, reinforced
    a sense of pride in her Andean roots. These traditions influence her everyday life, from the recipes she prepares to the values she upholds—respect for elders, community solidarity, and a pragmatic
    optimism. At the same time, living in the Pacific Northwest has shaped her love for outdoor recreation and an appreciation for environmental stewardship, creating a blended identity that honors both
    her Peruvian heritage and her Northwestern upbringing.
attributes:
  skills: '[''Inventory Management'', ''Order Fulfillment'', ''Barcode Scanning'', ''POS System Operation'', ''Data Entry'', ''Spreadsheet Analysis (Excel)'', ''Bilingual Communication (Spanish/English)'',
    ''Warehouse Safety Protocols'', ''Time Management'', ''Aisle Organization'', ''Stock Discrepancy Resolution'']'
  hobbies: '[''Hiking'', ''Nature Photography'', ''Cooking Peruvian Cuisine'', ''Reading Historical Non‑Fiction'', ''Community Volunteering (Food Pantry)'', ''Small‑Group Book Club'', ''Sustainable Gardening
    Workshops'', ''Playing Acoustic Guitar (occasionally)'']'
  career_goals: Dunia aims to finish her associate’s degree in Business Administration with a focus on Supply Chain Management within the next two years. She plans to leverage her hands‑on experience to
    transition into a supervisory role, such as Warehouse Team Lead or Inventory Analyst, where she can apply data‑driven decision‑making to improve stock turnover and reduce waste. In the longer term,
    she hopes to obtain an APICS certification and move into a logistics coordinator position at a regional retailer or a sustainability‑focused supply‑chain firm. She also dreams of eventually opening
    a small boutique that showcases Peruvian artisanal products, blending her cultural roots with her business expertise.
