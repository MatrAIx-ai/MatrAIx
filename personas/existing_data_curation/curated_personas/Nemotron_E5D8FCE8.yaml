  hobbies: '[''Reading business and self‑help books'', ''Journaling'', ''Running'', ''Yoga'', ''Cooking Southern cuisine'', ''Listening to R&B, gospel, and hip‑hop music'', ''Attending church services'',
    ''Volunteering at community center'', ''Playing chess'', ''Strategic board games'']'
  career_goals: Tanekia aims to secure an entry‑level business analyst position with a regional firm or a consulting boutique, where she can apply her analytical skills while learning industry best practices.
    She plans to pursue professional certifications (such as CFA or PMP) and eventually transition into a strategic planning or senior consulting role. Long‑term, she aspires to launch her own socially
    responsible venture that supports economic development in underserved communities of South Georgia, leveraging her practical curiosity and competitive drive to create sustainable impact.
