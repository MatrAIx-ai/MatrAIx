personas:
  professional: Tanekia Welch is an aspiring business analyst who leverages strong Excel modeling, market research, and risk assessment skills, while her methodical planning and skeptical edge sharpen her
    negotiations and presentations in pursuit of strategic consulting roles.
  sports: Tanekia Welch runs three times a week with the Savannah Striders running club, attends early‑morning yoga sessions at the local studio, fervently supports the Atlanta Falcons and the Georgia Bulldogs,
    and occasionally joins pick‑up basketball games at the community center.
  arts: Tanekia Welch tunes into R&B legend Alicia Keys, gospel powerhouse Kirk Franklin, and hip‑hop lyricist J. Cole while streaming their concerts, attends live gospel choir performances at her church,
    and collects limited‑edition prints of modern Southern realist painter Ned Bittinger.
  travel: Tanekia Welch meticulously plans trips with spreadsheets, has explored Charleston’s historic district, the beaches of Destin, and a weekend in New Orleans for the music scene, and dreams of a
    solo backpacking adventure through the Scottish Highlands to study community development models.
  culinary: Tanekia Welch masters the art of Southern comfort cooking, perfecting crispy fried chicken seasoned with paprika, simmering collard greens with smoked turkey, and whipping up buttery peach cobbler
    topped with vanilla ice cream, all while experimenting with spice blends from her favorite African‑American cookbook.
  core: Tanekia Welch is a strategic‑minded 19‑year‑old who balances spreadsheets and self‑care, channels competitive energy into business analysis and running, yet often overthinks decisions, leading to
    late‑night snack binges and a craving for order.
background:
  cultural: Tanekia was raised in Thomasville, GA, within a close‑knit African American community that values family, church, and Southern hospitality. She grew up immersed in traditions such as soul food
    cooking, gospel music, and community gatherings that celebrate heritage, including Juneteenth and local civil‑rights commemorations. Her cultural identity blends the resilience and collective support
    characteristic of Black Southern families with a strong emphasis on education and entrepreneurship. This background informs her sense of responsibility toward her community and fuels her ambition to
    create opportunities for others.
attributes:
  skills: '[''Financial analysis'', ''Market research'', ''Data analysis'', ''Risk assessment'', ''Critical thinking'', ''Strategic planning'', ''Project management'', ''Time management'', ''Negotiation'',
