personas:
  professional: Don Fisher, a 33‑year‑old clinical nurse with strong assessment, IV therapy, and wound‑care expertise, combines their detail‑oriented charting and conflict‑resolution skills with a deep
    appreciation for visual art to pilot art‑based therapeutic interventions, spearhead a hospital art‑therapy liaison program, and pursue a BSN and future NP certification in adult‑gerontology or psychiatric‑mental
    health.
  sports: Don Fisher spends Saturdays hiking Frick Park’s rugged trails and kayaking the Allegheny River; they root for the Pittsburgh Steelers and Penguins, join a local adult hiking club, and practice
    gentle yoga each evening to counterbalance the high‑stress demands of nursing.
  arts: Don Fisher explores Pittsburgh’s vibrant art scene, regularly visiting the Andy Warhol Museum and local studio shows; they sketch urban landscapes, create watercolors inspired by Edward Hopper and
    Vivian Maier’s street photography, and occasionally join intimate jam sessions featuring folk duo The Milk Carton Kids.
  travel: Don Fisher prefers low‑key solo getaways and small‑group cultural tours, having trekked the Blue Ridge Parkway in Asheville and wandered the historic streets of Montreal; they dream of soaking
    in Kyoto’s temples, chasing Reykjavik’s northern lights, and cycling through Tuscany’s vineyards when their schedule permits.
  culinary: Don Fisher, an intermediate home cook, frequently prepares Mediterranean quinoa salads with roasted carrots, feta, and fresh basil, delights in Pittsburgh classics like a Primanti Brothers sandwich,
    experiments with handcrafted ramen broth, and savors a nightly pour‑over Ethiopian coffee as a calming ritual.
  core: Don Fisher is a reflective, art‑obsessed nurse who channels anxiety into watercolor sketches, meticulous patient care, and occasional coffee splurges, balancing a quiet, organized life with bursts
    of creative spontaneity.
background:
  cultural: Don grew up in a working‑class family in Pittsburgh’s North Side, a region shaped by the historic steel industry and a strong sense of community solidarity. His cultural identity is tied to
    the Rust Belt’s values of resilience, practicality, and modesty. He was raised in a Protestant (Methodist) household that emphasized service to others, which reinforced his caring nature and desire
    to help. The city’s diverse arts scene and the legacy of cultural institutions like the Carnegie Museum have nurtured his appreciation for creative expression, while the close‑knit neighborhood culture
    has taught him the importance of cooperation and harmony.
