  career_goals: Don aims to advance his nursing career by completing a Bachelor of Science in Nursing (BSN) and later pursuing a Nurse Practitioner certification with a focus on adult‑gerontology or psychiatric‑mental
    health, fields that align with his interest in supporting patients' emotional well‑being. He also hopes to develop a hospital‑based art‑therapy liaison program that integrates patients' creative expression
    into recovery, and eventually transition into a leadership role as a charge nurse or clinical educator where he can mentor new staff and promote holistic care.
