personas:
  professional: Robert Parent is a pragmatic CDL‑qualified truck driver and sales associate who leverages route‑optimization expertise, hands‑on mechanical skill, and business coursework to deliver reliable
    freight while mentoring junior drivers, and they aim to transition into a fleet manager role within five years.
  sports: Robert Parent follows the Tennessee Titans and the Atlanta Braves, participates in a local fishing derby, and hikes with a community running club, and they also join weekly pickup basketball games
    at the church gym.
  arts: Robert Parent spins classic rock vinyl—favoring Pink Floyd, Led Zeppelin, and The Rolling Stones—hosts family karaoke nights, and attends regional theater productions, and they let music and performance
    art punctuate a otherwise utilitarian lifestyle.
  travel: Robert Parent enjoys weekend road trips along the Tennessee River, camping in the Great Smoky Mountains, and dreams of a spring drive to New Zealand’s South Island, and they prefer self‑planned
    itineraries that allow spontaneous fishing stops.
  culinary: Robert Parent is a self‑taught pitmaster who favors smoked brisket, cedar‑plank salmon, and homemade coleslaw, often seasoning with hickory chips and a dash of brown sugar, and they occasionally
    burn the ribs due to an over‑zealous grill temperature.
  core: Robert Parent blends a hands‑on love of trucks, fishing, and classic rock with a community‑oriented heart, balancing disciplined budgeting and health routines with a stubborn streak that sometimes
    leads to late‑night tool purchases and forgotten paperwork, and they cherish quiet evenings by the river.
background:
  cultural: Robert grew up in the suburban‑rural setting of Hamilton County, Tennessee, absorbing the Southern values of hospitality, hard work, and community involvement. His family’s heritage is primarily
    English‑German, typical of the white population in the region, and he was raised attending a local Methodist congregation. He embraces the regional culture of country music, outdoor recreation, and
    seasonal events like the county fair, while also being open to new ideas through his work in sales and occasional travel. This blend of traditional Southern roots and practical curiosity shapes his
    worldview and daily interactions.
