persona_description: Robert Berner, an acclaimed geochemist known for his contributions to understanding the carbon cycle, is likely to be interested in the above text. He was born in Erie, Pennsylvania
  on 25 November 1935 and enrolled at Purdue University in 1953 to study chemistry, but left after one semester because he felt pushed towards engineering. He transferred to the University of Michigan to
  read mathematics and physics, but found the fields "too demanding" and so switched to geology. His research on the application of chemical thermodynamics and kinetics informed hundreds of journal articles,
  and he was classed as one of the most highly cited scientists by the Institute for Science Information. In 1983, he produced the BLAG model of the carbon cycle with Tony Lasaga and Bob Garrels, and later
  modelled the effects of atmospheric carbon dioxide and oxygen on the palaeoclimate. In 2013, he received the Franklin Institute’s Benjamin Franklin Medal in Earth and Environmental Science.
