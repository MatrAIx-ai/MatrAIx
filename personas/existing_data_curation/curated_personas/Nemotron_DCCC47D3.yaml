  career_goals: Ida aims to become a lead teacher or early‑childhood program coordinator within the Birmingham school district, focusing on curriculum innovation that centers Black children's cultural experiences.
    She plans to earn a Master's in Early Childhood Education within the next two years and eventually assume a director role to influence district‑wide policies on equity and inclusion. She also aspires
    to develop a community outreach program that provides after‑school literacy support for families in Jefferson County and to mentor new teachers on establishing classroom structure and resilience.
