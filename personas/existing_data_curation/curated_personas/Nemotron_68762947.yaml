  hobbies: '[''Cooking traditional Spanish dishes'', ''Gardening (vegetables and herbs)'', ''Knitting and quilting'', ''Reading historical novels'', ''Listening to flamenco and zarzuela music'', ''Watching
    Spanish‑language TV shows'', ''Attending church services'', ''Participating in senior‑center workshops'']'
  career_goals: Although retired from formal employment, Evelia aims to remain an active and reliable contributor to her family and the local Hispanic community. Her primary goals include preserving and
    passing down Spanish culinary and language traditions to her grandchildren, expanding her role as a mentor in community Spanish‑language classes, and continuing her regular volunteering at the senior
    center and parish. She also aspires to improve her digital skills so she can join virtual family gatherings more comfortably. Maintaining her health through daily walks and a structured garden routine
    is a personal ambition that supports her desire to stay independent and supportive of others.
