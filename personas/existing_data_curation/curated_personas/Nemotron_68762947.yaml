personas:
  professional: Evelia Pineda, an 82‑year‑old retired homemaker turned community volunteer, leverages her decades of budgeting, event coordination, and bilingual communication skills to organize senior‑center
    workshops and parish celebrations, applying her love of structure and cooperative spirit to ensure every detail runs smoothly.
  sports: Evelia Pineda stays active with daily morning walks in her backyard and weekly low‑impact water aerobics at the senior center, while cheering on the Houston Astros during spring training and the
    Houston Rockets on game nights, and she also participates in the local senior walking club that meets on Saturday mornings.
  arts: Evelia Pineda delights in listening to flamenco legends like Paco de Lucía and classic zarzuela performed by Plácido Domingo, watches Spanish‑language films starring Javier Bardem on Sunday evenings,
    and crafts quilts patterned after the vivid colors of Joaquín Sorolla’s seascapes for community events.
  travel: Evelia Pineda prefers well‑planned, leisurely trips that combine cultural immersion with family time, having enjoyed a serene pilgrimage to Santiago de Compostela with her grandchildren, a sunny
    weekend in San Antonio’s River Walk, and dreaming of a relaxed stay in the Andalusian village of Ronda to revisit the roots of her beloved festivals.
  culinary: Evelia Pineda’s culinary passion shines in her mastery of paella Valenciana, gazpacho de tomate, and empanadas filled with chorizo and manchego, using saffron, smoked paprika, and fresh rosemary
    from her garden, and she delights in sharing these dishes at family gatherings, often seasoning with a pinch of sea salt as a signature flourish.
  core: Evelia Pineda blends meticulous organization, gentle humor, and a lifelong devotion to preserving family recipes, all while occasionally forgetting to water her succulents and sneaking an extra
    serving of flan before dinner.
background:
  cultural: Evelia is of Spanish heritage and grew up in a bilingual, Catholic household that emphasized family cohesion, respect for elders, and the celebration of cultural festivals such as Semana Santa
    and Navidad. After moving to Houston, she has blended her Spanish roots with the vibrant Hispanic community of the city, regularly attending a local Spanish‑speaking parish and contributing to cultural
    events at community centers. Her daily life reflects Spanish customs—preparing paella for family gatherings, preserving family recipes, and speaking both Spanish and English with ease. This cultural
    foundation informs her values of harmony, cooperation, and service to others.
attributes:
