    and flexibility"]'
  hobbies: '["Cooking traditional Mexican dishes", "Garden cultivation", "Hiking local trails", "Yoga practice", "Reading mystery novels", "Salsa and Latin dancing", "Volunteering (Spanish tutoring)", "Exploring
    new culinary recipes", "Attending logistics webinars"]'
  career_goals: Maria aims to advance into a regional logistics manager role where she can oversee multiple distribution centers and drive strategic initiatives across the supply chain. She plans to earn
    professional certifications such as the APICS Certified Supply Chain Professional (CSCP) and the Certified in Logistics, Transportation, and Distribution (CLTD) to deepen her expertise. A key ambition
    is to champion sustainable logistics practices, integrating green transportation methods and waste‑reduction programs into daily operations. Over the next five years, she also hopes to mentor emerging
    talent—especially women in logistics—and eventually explore consulting opportunities that allow her to help midsize companies modernize their supply chains while preserving operational flexibility.
