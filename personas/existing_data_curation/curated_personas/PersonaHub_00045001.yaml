persona_description: A technologist and entrepreneur with a passion for renewable energy and a track record of successful project development in Egypt. She is a fellow at MIT's Legatum Center for Development
  and Entrepreneurship, investigating a plan to spur solar manufacturing in Egypt. Shalaby's plan is to circumvent import taxes, markups, and transportation costs by manufacturing solar technology on its
  own soil, which would eliminate 50 percent of production costs. She believes that this project will not only spur innovation and create much-needed clean energy jobs but also foster an R&D sector in Egypt.
