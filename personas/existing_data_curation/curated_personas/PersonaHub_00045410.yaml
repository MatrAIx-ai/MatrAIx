persona_description: A molecular biologist who specializes in the study of zeolites and their role in water purification, focusing on the effect of confinement on the solubility of salts. They are interested
  in the molecular simulation techniques used in the study and are familiar with the RASPA simulation code and force fields used for water and ions. They have experience in using MD and MC simulations to
  analyze the influence of temperature and system size on the dissociation of salt in confined systems. They are also knowledgeable about the properties and applications of zeolites, such as their hydrophobic
  nature and suitability for various applications.
