personas:
  professional: Dylan Schell, a surveillance specialist at a regional casino, leverages razor-sharp observational skills, meticulous incident reporting, and a disciplined, methodical mindset to spot fraud
    patterns while quietly applying the same punctual, community-focused reliability that shaped his Midwestern upbringing.
  sports: Dylan Schell jogs five miles every morning, casts methodical lines for bass on the Mississippi River, belongs to the Quad Cities Anglers Club, supports the Iowa Hawkeyes football team, and follows
    the Quad Cities River Bandits baseball season with the same precise enthusiasm he brings to chess and poker.
  arts: Dylan Schell channels his love for set design into community theater productions of 'Our Town' and 'Death of a Salesman', admires the regional painter Grant Wood, enjoys the folk storytelling of
    Bob Dylan and The Band, and collects meticulously detailed model train kits that double as artistic displays.
  travel: Dylan Schell plans road-trip itineraries on a spreadsheet, favoring detailed explorations of historic Midwestern towns like Galena, a weekend hike in the Badlands, and a dream visit to the historic
    railway museums of Zurich, balancing his love of structure with a modest travel budget and family obligations.
  culinary: Dylan Schell, an intermediate home cook, perfects hearty Midwestern fare such as pork tenderloin with apple-cider glaze, smoked trout with dill, and German-style potato salad, often seasoning
    dishes with locally sourced corn and rye flour while occasionally indulging in a late-night poker-night snack of pepperoni pizza.
  core: Dylan Schell blends methodical precision, competitive spirit, and a steadfast Midwestern work ethic into every facet of life, from surveillance to model trains, even if an early-morning jog occasionally
    steals their sleep.
background:
  cultural: Dylan grew up in the Quad Cities region of Iowa, raised in a middle-class, white Midwestern family with German-Scandinavian ancestry. His upbringing emphasized self-reliance, community involvement,
    and a strong work ethic typical of the Midwest. He attended local public schools, where he participated in extracurricular activities such as debate and the school newspaper, reflecting his humanities
    education. The cultural values of modesty, punctuality, and practicality shape his personal and professional life. While he is not married, he maintains close ties with his extended family and often
    attends regional festivals and county fairs that celebrate Iowa's agricultural heritage.
attributes:
  skills: '[''observational analysis'', ''CCTV operation'', ''incident reporting'', ''conflict de-escalation'', ''self-defence'', ''first aid'', ''risk assessment'', ''data analysis (Excel)'', ''knowledge
    of casino regulations'', ''structured security patrols'']'
  hobbies: '[''scale model building'', ''woodworking'', ''fishing'', ''poker'', ''chess'', ''reading historical nonfiction'', ''community theater set design'', ''morning jogs'']'
  career_goals: Dylan aims to advance from his current surveillance role to a supervisory position within the loss-prevention department of a regional casino, eventually becoming a loss-prevention manager.
    He plans to obtain a Certified Protection Officer (CPO) credential and attend a community college program in criminal justice to supplement his humanities degree. Over the next five years, he aspires
    to lead a team, develop training programs for new security staff, and eventually start a private security consulting firm that specializes in casino and event security. His competitive nature drives
    him to exceed performance metrics and achieve recognition for reducing shrinkage rates.
