  career_goals: Michael aims to move into a senior program director role within the next five years, overseeing large-scale infrastructure and resilience projects in South Florida. He plans to obtain his
    PMP certification and deepen his expertise in Agile and Lean methodologies to broaden his strategic toolkit. Ultimately, he envisions launching a boutique consulting practice that helps mid-sized construction
    firms implement standardized project controls and risk-management processes, allowing a gradual transition to consultancy while maintaining a predictable schedule for his family.
