personas:
  professional: Nicholas Thomas is a community‑oriented business consultant who leverages his project‑management expertise, Excel and QuickBooks proficiency, and methodical planning to help Detroit small
    businesses and non‑profits grow sustainably while fostering collaborative partnerships.
  sports: Nicholas Thomas plays competitive pickup basketball with the Motor City Hoops League each summer, cheers for the Detroit Pistons at home games, supports the Detroit Tigers in the spring, and maintains
    a disciplined fitness routine that mixes cardio courtside drills with weekend gardening as active recovery.
  arts: Nicholas Thomas immerses himself in live jazz at Baker's Keyboard Lounge and funk concerts featuring Earth, Wind & Fire tributes, while his playlist constantly cycles through classics by Stevie
    Wonder, Aretha Franklin, and modern artists like Kamasi Washington, shaping both his social gatherings and his community storytelling.
  travel: Nicholas Thomas prefers road‑trip itineraries that blend music pilgrimages to New Orleans and Memphis with family outings to the Great Smoky Mountains, carefully budgeting each journey in spreadsheets
    and often opting for affordable Airbnb stays over pricey hotels to keep his community grant fund intact.
  culinary: Nicholas Thomas excels at preparing soulful classics such as fried catfish, buttery collard greens, and sweet potato casserole for neighborhood block parties, while also experimenting with global
    twists like harissa‑spiced okra gumbo, always sourcing fresh ingredients from local farmers markets.
  core: Nicholas Thomas blends disciplined project planning with a love for spontaneous jam sessions, occasionally staying up late to perfect a new recipe or finish a woodworking piece, and never misses
    a chance to mentor a young entrepreneur over a plate of cornbread.
background:
  cultural: Nicholas is a second-generation African-American raised in Detroit, a city with a rich legacy of music, activism, and community solidarity. He grew up attending a historically Black church where
    music, fellowship, and service were central, shaping his cooperative spirit. His family honors traditions of soul and Motown music, weekend barbecues, and community self-reliance. He draws pride from
    Detroit’s resilience and incorporates the city’s cultural heritage into his volunteer work and everyday life, emphasizing mentorship, collective progress, and the celebration of Black excellence.
attributes:
  skills: '[''Project Management'', ''Budgeting and Financial Planning'', ''Data Analysis (Excel, QuickBooks)'', ''Strategic Planning'', ''Community Outreach'', ''Event Planning'', ''Volunteer Coordination'',
    ''Conflict Mediation'', ''Public Speaking'', ''Leadership'']'
  hobbies: '[''Playing basketball in a local league'', ''Volunteering at church food pantry'', ''Organizing neighborhood block parties'', ''Cooking soul-food meals for family'', ''Attending live jazz and
    funk concerts'', ''Participating in a leadership book club'', ''Gardening'', ''DIY woodworking projects'']'
  career_goals: Nicholas aims to re-enter the workforce as a consultant for local small businesses and non-profits, using his business acumen and community connections to help them grow sustainably. He
    also aspires to launch a social-enterprise incubator that offers mentorship and micro-grants to Detroit’s youth entrepreneurs. In the longer term, he hopes to serve on the board of a community development
    organization and maybe teach part-time business courses at a community college, creating a legacy of economic empowerment for his neighborhood.
