  hobbies: '["Visiting local art galleries and murals", "DIY home-decor and painting projects", "Creative cooking and baking", "Gardening", "Listening to art and culture podcasts", "Community-theater volunteering",
    "Attending cultural festivals", "Reading mystery novels", "Photography of everyday scenes"]'
  career_goals: Miriam hopes to progress to a supervisory role within her current restaurant chain, aiming to become a shift manager where she can mentor new employees and influence service standards. She
    also dreams of completing her GED and taking community-college courses in culinary arts or visual design, which could eventually enable her to open a small neighbourhood bakery that doubles as a gallery
    space for local artists. Financial stability for her family and the ability to dedicate more time to her artistic interests are central to her long-term ambition.
