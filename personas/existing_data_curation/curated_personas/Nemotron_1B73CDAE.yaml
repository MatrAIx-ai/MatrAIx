personas:
  professional: Miriam Lamb, a seasoned fast‑food service professional with over two decades of high‑volume cash handling, POS expertise, and stringent sanitation training, channels their organized yet
    flexible nature and curiosity about new ideas into an upbeat, collaborative shift, where they mentor new teammates while eyeing a shift‑manager position that could let them weave artistic inspiration
    into daily operations.
  sports: Miriam Lamb, a casual fitness enthusiast, jogs the Riverside Trail on weekends, plays pickleball at the local community center, and they cheer for the Anaheim Ducks in hockey season and the Los
    Angeles Angels during baseball, embodying a balanced approach that blends low‑impact activity with spirited fandom.
  arts: Miriam Lamb, a visual‑arts aficionado who spends Saturdays strolling past Anaheim’s vibrant murals, studies the works of Banksy and Frida Kahlo while enjoying the soulful flavors of Leon Bridges
    and Norah Jones, and they volunteer at community‑theater productions featuring classic plays by Arthur Miller, seamlessly weaving artistic inspiration into everyday life.
  travel: Miriam Lamb, preferring road‑trip adventures along California’s Pacific Coast Highway to far‑flung cruises, savors weekend getaways to Santa Barbara’s wineries and Napa Valley’s culinary tours,
    dreams of exploring Barcelona’s Gaudí architecture, and they balance family travel budgets with occasional solo retreats to Portland’s art districts.
  culinary: Miriam Lamb, an inventive home cook who blends Mediterranean flavors—like grilled lemon‑herb salmon with quinoa and a side of roasted zucchini—with family‑friendly DIY pizza nights, nurtures
    a backyard herb garden of basil, rosemary, and mint, and while their cooking skill is solid, they sometimes leave a kitchen mess longer than intended, treating each meal as a canvas for creativity.
  core: Miriam Lamb is a curious, organized multitasker who juggles fast‑food leadership ambitions, a thriving DIY art hobby, family responsibilities, and a pragmatic approach to finances, all while they
    nurture a dream of opening a bakery‑gallery hybrid.
background:
  cultural: Miriam is a white, middle‑class American who grew up in Southern California’s suburban environment. Living in Anaheim, she has absorbed the region’s blend of mainstream American values—emphasis
    on work ethic, community involvement, and personal independence—while also being exposed to the multicultural tapestry of Orange County, which includes frequent interactions with diverse cultural traditions
    at local festivals, food markets, and public spaces. Her upbringing reflects a typical Californian suburban upbringing with a strong appreciation for personal freedom, family cohesion, and a curiosity
    about the broader cultural world that surrounds her.
attributes:
  skills: '["Customer service", "Cash handling and electronic payment processing", "Point-of-sale system operation", "Food preparation and safety compliance", "Multitasking in high-pressure settings", "Workstation
