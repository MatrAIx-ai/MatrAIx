personas:
  professional: Donald Charles, an 18-year-old aspiring hospitality professional, channels his hands-on experience organizing community festivals, maintaining a small sailboat, and volunteering at the Newport
    Historical Society into meticulously planned waterfront events, using Microsoft Office and graphic tools to craft promotional material while they keep every detail on schedule despite occasional worry.
  sports: Donald Charles fuels their love of the outdoors by playing beach volleyball with the Cape Cod Spikers, sailing with the Narragansett Bay Sailing Club, hiking the coastal trails of Block Island,
    and cheering on the Boston Red Sox, New England Patriots, and Boston Bruins, while they also participate in a seasonal ultimate frisbee league each fall.
  arts: Donald Charles expresses creativity through acoustic guitar sessions at informal gatherings, curates flyers for local events using Canva, and immerses themselves in the sounds of Bob Dylan, Mumford
    & Sons, and Phoebe Bridgers at the Newport Folk Festival, while they also enjoy indie films at the Newport Playhouse and collect vintage board-game artwork.
  travel: Donald Charles balances structured trip planning with spontaneous sailing adventures, having explored Block Island, Martha's Vineyard, and a weekend road trip to Boston, while they dream of a
    Mediterranean cruise to Greece and a solo sail to the Bahamas, all organized in detailed Google Sheets itineraries that keep their budget and time constraints in check.
  culinary: Donald Charles delights in New England seafood, frequently cooking lobster rolls with butter-toasted buns, clam chowder seasoned with thyme, and grilled mahi-mahi with mango salsa, while they
    also host casual beach picnics featuring fresh corn on the cob and homemade banana bread, showcasing a modest yet enthusiastic cooking skill.
  core: Donald Charles is a structured yet sociable 18-year-old who blends event-driven energy, sailing passion, and mindful anxiety management into a roadmap toward a future hospitality leadership role,
    and they constantly seek balance between predictability and the thrill of group experiences.
background:
  cultural: Donald is a white American raised in Newport, Rhode Island. His family’s lineage traces back to early New England settlers of English and Irish descent. Growing up near the harbor, he absorbed
    the town’s strong maritime culture, from the annual sailing regattas to the historic cobblestone streets of downtown. Community values such as self‑reliance, neighborly cooperation, and an appreciation
    for historic preservation are central to his upbringing. He celebrates traditional American holidays with a regional flavor—watching Fourth of July fireworks over the harbor, enjoying seafood‑focused
    Thanksgiving meals, and attending local clambakes. His speech carries a mild New England accent, and he feels comfortable moving between the affluent resort neighborhoods and the working‑class port
    communities.
attributes:
  skills: '[''Event coordination'', ''Project planning'', ''Team facilitation'', ''Microsoft Office Suite'', ''Basic graphic design'', ''Carpentry basics'', ''Marine maintenance basics'', ''First aid certification'']'
  hobbies: '[''Sailing'', ''Beach volleyball'', ''Live music festivals'', ''Acoustic guitar playing'', ''Board games'', ''Coastal hiking'', ''Mindfulness meditation'', ''Volunteer work at Newport Historical
    Society'']'
  career_goals: Donald aims to finish his associate degree and then obtain a bachelor’s in Hospitality Management or Business Administration. He envisions a career in Newport’s tourism sector, starting
    as an event coordinator for a waterfront venue and eventually moving into senior operations management. He also wants to earn a U.S. Coast Guard certification to become a licensed captain, combining
    his love of sailing with a professional path. Stability, clear advancement steps, and the chance to lead teams in both hospitality and marine settings drive his long‑term ambition.
