  career_goals: Willie aims to turn his hands‑on delivery experience into a formal logistics career. In the next year he plans to earn his GED and begin a community‑college certification in transportation
    logistics. He will obtain a commercial driver’s license (CDL) to qualify for larger box‑truck driving positions and target a supervisory role in a regional dispatch center within three years. Over the
    longer term, he aspires to launch a small independent same‑day delivery service in Las Vegas, leveraging his route‑planning expertise, reliable reputation, and fleet of low‑cost vehicles. Achieving
    these milestones will provide greater financial stability, leadership experience, and the opportunity to build a business that reflects his disciplined, achievement‑driven mindset.
