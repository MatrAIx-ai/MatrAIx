  hobbies: '[''Playing guitar'', ''Singing folk songs'', ''Photography'', ''Hiking in Sandia Mountains'', ''Gardening (chilies, corn)'', ''Cooking traditional New Mexican dishes'', ''Volunteering at a senior
    center'', ''Attending Albuquerque International Balloon Fiesta'', ''Storytelling at community gatherings'', ''Participating in Mexican dance events'']'
  career_goals: Even as he approaches retirement, Erick aims to transition from a full‑time waiter to a mentorship and community‑focused role. He hopes to become a head waiter or shift supervisor at his
    current restaurant, using his experience to coach younger staff and improve service standards. Simultaneously, he dreams of launching a modest pop‑up food stall at the Albuquerque International Balloon
    Fiesta, showcasing his family’s traditional New Mexican recipes. In the longer term, Erick envisions authoring a small cookbook that blends stories from his decades of service with beloved regional
    dishes, preserving cultural heritage while staying socially active.
