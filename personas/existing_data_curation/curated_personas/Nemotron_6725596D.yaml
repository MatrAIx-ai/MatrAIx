  hobbies: '[''Coastal Hiking'', ''Sunrise Photography'', ''Cooking Puerto Rican Cuisine'', ''Reading Historical Biographies'', ''Meditation'', ''Playing Acoustic Guitar'', ''Model Shipbuilding'', ''Collecting
    Vintage Vinyl Records'', ''Teaching Financial Literacy Workshops'', ''Watching San Diego Padres Baseball Games'']'
  career_goals: Luis aims to transition into a senior portfolio strategist role where he can shape investment policy for a boutique fund that emphasizes ESG (environmental, social, governance) criteria,
    aligning his practical expertise with his growing interest in sustainable finance. He aspires to mentor junior analysts, sharing both technical skills and coping strategies for managing the emotional
    stress inherent in market volatility. Over the next five years, Luis plans to earn the Chartered Financial Analyst (CFA) charter’s Level III designation to solidify his credibility, while also developing
    a side consultancy that offers financial‑literacy workshops to the Puerto Rican community in San Diego County. Ultimately, he envisions a balanced career that allows flexible scheduling, reduces the
    pressure of rigid deadlines, and provides a legacy of both professional excellence and community impact.
