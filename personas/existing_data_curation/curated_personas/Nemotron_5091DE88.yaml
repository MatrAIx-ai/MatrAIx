  career_goals: Although retired from formal employment, Kishan is driven to leave a lasting cultural legacy in Chesapeake. He aims to author a memoir that weaves together his family’s migration story,
    recipes, and reflections on South Asian art, hoping it will become a resource for younger generations of diaspora families. He also plans to establish a small community art studio where senior volunteers
    can learn woodworking, painting, and digital storytelling, positioning himself as a mentor and bridge between his heritage and the local community. Kishan aspires to be recognized by the city for his
    volunteer contributions and to present a paper on the evolution of South Asian culinary traditions in Virginia at a regional cultural conference.
