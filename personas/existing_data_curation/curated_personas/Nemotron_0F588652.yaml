  career_goals: Sherman aspires to advance to a senior systems analyst or IT solutions architect role where he can lead a team in designing reliable, user‑focused systems. He plans to earn PMP and higher‑level
    ITIL certifications to formalize his project management expertise. His long‑term ambition includes establishing a mentorship program within his organization to nurture junior talent, while maintaining
    a balanced workload that preserves quality family time.
