  career_goals: Daniel aims to advance within the public safety communications field by first becoming a senior dispatcher and shift supervisor. He plans to earn a bachelor’s degree in Emergency Management
    or Public Administration, which will position him for a future role as a communications manager or director of 911 services. He is particularly interested in helping his agency adopt Next‑Gen 911 technologies,
    such as video triage and integrated GIS mapping. Long‑term, Daniel hopes to design training programs that improve dispatcher resilience and to contribute to community disaster‑preparedness initiatives
    across St. Lucie County.
