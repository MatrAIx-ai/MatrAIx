persona_description: A conservation biologist who specializes in the study of the impact of climate change on elephant populations, particularly in Botswana and the Okavango Delta. She has extensive knowledge
  of the local ecosystem and the effects of pollution, specifically the presence of cyanobacteria in the water bodies. Her research focuses on developing strategies to mitigate the impact of pollution on
  elephant populations and developing alternative water sources for the elephants. She has a keen interest in the use of technology and data analysis to monitor elephant populations and their health.
