  career_goals: Kirt aims to earn a bachelor's degree in business administration while continuing to climb the sales ladder. His short‑term goal is to become an assistant store manager and gain experience
    in strategic planning. Long‑term, he aspires to become a regional sales director for a national retailer, and eventually launch his own Black‑owned lifestyle brand that offers affordable apparel and
    community mentorship programs. He also wants to develop leadership skills that enable him to create supportive work cultures and reduce stress for his future teams.
