  hobbies: '[''Drawing'', ''Painting'', ''Digital art with a tablet'', ''Reading graphic novels'', ''Playing piano'', ''Coding with Scratch'', ''Science fair projects'', ''Soccer'', ''Exploring local parks'',
    ''Listening to music (reggaetón, bomba, plena)'']'
  career_goals: Teresa dreams of turning her love for art and technology into a future career as a graphic designer or an interactive media creator, where she can blend storytelling, visual art, and coding.
    She also imagines working as a museum curator or cultural program coordinator, helping to showcase Puerto Rican heritage in Milwaukee. Her competitive spirit drives her to aim for top placements in
    school art competitions and science fairs, hoping to earn scholarships that will support her further education in visual arts or design. Teresa is determined to develop her skills early so she can eventually
    lead community workshops that empower other kids to explore creativity through technology.
