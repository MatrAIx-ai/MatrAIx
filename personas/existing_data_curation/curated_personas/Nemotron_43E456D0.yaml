personas:
  professional: Teresa Delvallecollazo, an organized and curious 11‑year‑old budding game creator, channels a methodical planning style and competitive drive into Scratch projects that blend hand‑drawn
    character art with layered soundtracks of classical piano and upbeat reggaetón, reliably delivering polished demos for class showcases.
  sports: Teresa Delvallecollazo plays forward for the Milwaukee United school soccer team, drills twice a week, competes fiercely in the spring league, and follows the Milwaukee Bucks and Brewers for winter
    sports, maintaining a disciplined fitness routine that balances team practice with personal conditioning.
  arts: Teresa Delvallecollazo devotes spare hours to sketching in the style of 'Frida Kahlo' and creating digital paintings inspired by the vivid panels of 'Scott Pilgrim', practices piano pieces by Mozart
    and bomba rhythms, and frequently discusses graphic novels such as 'Maus' and 'Bone' with friends.
  travel: Teresa Delvallecollazo enjoys weekend trips to Lakeshore State Park and the Milwaukee Art Museum, plans each outing with printed maps and a checklist, and dreams of exploring the Smithsonian museums
    in Washington, D.C., and the colorful street murals of Mexico City.
  culinary: Teresa Delvallecollazo helps the family kitchen by mastering arroz con gandules with sofrito, garlic, and achiote, experimenting with crisp plantain fritters, and occasionally adding fresh cilantro
    to tacos, showing an intermediate cooking skill level and a love for traditional flavors.
  core: Teresa Delvallecollazo blends a fierce competitive streak with an insatiable curiosity for art and code, obsessively cataloguing game ideas in a notebook while sneaking extra screen time after bedtime.
background:
  cultural: Teresa comes from a proud Puerto Rican family that keeps Spanish as the home language and celebrates traditions such as Noche Buena, San Juan festivals, and Puerto Rican Heritage Month in Milwaukee.
    Family gatherings often feature music, dancing, and dishes like mofongo and pastelón, reinforcing her connection to the island's culture. She participates in community events organized by local Puerto
    Rican cultural centers, where she learns about the island's history, art, and folklore. This bicultural environment nurtures her bilingual abilities, love for vibrant music and art, and a strong sense
    of resilience and community pride.
attributes:
  skills: '[''Digital illustration'', ''Basic Scratch programming'', ''Spanish‑English bilingual communication'', ''Creative writing'', ''Project planning'', ''Critical analysis'', ''Organizational skills'',
