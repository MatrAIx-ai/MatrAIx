personas:
  professional: Lowell Sullivan, a tiny architect of block towers, combines a love of new building patterns with tried‑and‑true stacking methods, and their chatty nature turns the playroom into a lively
    workshop where peers gather to watch and help.
  sports: Lowell Sullivan, an energetic member of the Little Sprinters toddler soccer club, idolizes the local MLS team the Seattle Sounders, spends afternoons on the playground climbing nets and swinging,
    and balances structured practices with free‑play tag games, all while wearing their favorite neon green sneakers.
  arts: Lowell Sullivan, an enthusiastic fan of children's music, sings along to Disney's Frozen soundtrack, especially "Let It Go", dances to the rhythm of "Baby Shark" by Pinkfong, and loves finger‑painting
    with Crayola paints while proudly displaying their own scribble masterpiece on the fridge.
  travel: Lowell Sullivan, a curious explorer, loves family trips to the Monterey Bay Aquarium, the bright lights of Disneyland, and short weekend getaways to the nearby state park where they collect pinecones,
    preferring organized itineraries that include a snack break and a nap time.
  culinary: Lowell Sullivan, a budding foodie, enjoys mac and cheese with a sprinkle of cheddar, loves dipping apple slices in peanut butter, can assemble a simple peanut butter‑jelly sandwich with a bit
    of mess, and often requests the chicken nuggets shaped like dinosaurs from the local fast‑food place.
  core: Lowell Sullivan, a talkative three‑year‑old who balances curiosity with practicality, turns every playtime into a mini‑conference, hoards stickers like treasure, and never lets a sneeze derail a
    game.
background:
  cultural: Lowell is raised in a white Southern family in Tuscumbia, Alabama. His upbringing reflects the hospitality, close‑knit community values, and modest religious traditions typical of the region.
    Family meals often feature Southern comfort foods such as fried chicken, biscuits, and sweet tea, and weekend gatherings may include church services at the local Baptist congregation. Community events
    like the Colbert County fair, high school football games, and church picnics are part of his early experiences, shaping a cultural background of friendliness, respect for tradition, and an appreciation
    for simple, communal celebrations.
