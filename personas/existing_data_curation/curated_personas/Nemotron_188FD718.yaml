  career_goals: Don aims to progress to a senior finance leadership role, such as Director of Finance or Chief Financial Officer, within the next eight to ten years. He plans to deepen his expertise in
    emerging financial technologies, including AI‑driven analytics and blockchain‑based accounting, to spearhead digital transformation initiatives at his organization. To support this trajectory, he is
    pursuing the CFA charter and considering an MBA focused on finance and technology. Don also aspires to mentor junior analysts, fostering a data‑centric culture while embedding sustainable financial
    practices into corporate strategy.
