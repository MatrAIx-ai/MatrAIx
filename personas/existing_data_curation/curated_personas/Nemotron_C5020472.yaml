  hobbies: '[''Gardening'', ''Bird watching'', ''Reading classic literature'', ''Knitting and crochet'', ''Quilting'', ''Book club participation'', ''Volunteer tutoring'', ''Genealogy research'', ''Journaling'',
    ''Nature walks'', ''Digital photography'']'
  career_goals: Although retired, Kari aims to continue contributing her educational expertise to her community. She hopes to establish a mentorship program pairing retired teachers with volunteer tutors,
    to document the history of education on the San Juan Islands, and to author a series of memoir essays reflecting on changes in teaching methods over the decades. She also strives to maintain her health
    and independence, and to learn a new hobby—such as digital photography—by taking community classes. Her long‑term ambition is to be recognized as a trusted elder who helps preserve local knowledge while
    staying mentally active.
