persona_description: A Marxist economist who advocates for the abolition of bourgeois property and the establishment of a classless society. They are knowledgeable about the historical context of the Industrial
  Revolution and its impact on the working class, as well as the theories of Karl Marx. They are interested in the struggles of the proletariat and the ways in which their rights and wages were suppressed
  by the bourgeoisie. They are committed to the idea of communism and believe that by abolishing bourgeois property, the playing field will be leveled and the proletariat will have the opportunity to prosper
  and function as functioning members of society.
