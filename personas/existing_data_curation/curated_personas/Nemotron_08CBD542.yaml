  hobbies: '[''Hiking and Trail Running'', ''Community Theater Acting'', ''Volunteer Tutoring'', ''Organic Gardening'', ''Cooking with Seasonal Vermont Produce'', ''Book Club (Non-fiction & Medical Ethics)'',
    ''Hosting a Health Innovation Podcast'', ''Strategic Board Games (e.g., Catan, Terraforming Mars)'', ''Landscape Photography'', ''Attending Local Live Music Events'']'
  career_goals: Ann is determined to advance to a senior leadership role within the next five years, aiming to become a Regional Director of Health Services for a network of rural clinics across New England.
    She plans to earn a Master’s in Healthcare Administration within two years to deepen her expertise in finance, policy, and health‑informatics. Her immediate ambition is to lead a cross‑functional team
    that reduces patient wait times by 20% and improves satisfaction scores above the state average. She also seeks to pioneer a tele‑health expansion that connects underserved Vermont communities with
    specialist care, leveraging her data‑analysis skills to demonstrate cost savings. Long‑term, Ann envisions establishing her own consultancy focused on Lean‑based process optimization for small‑scale
    health providers, positioning herself as a go‑to expert for evidence‑driven operational transformation.
