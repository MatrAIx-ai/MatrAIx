persona_description: A historian and archivist who specializes in the study of historical events and figures related to the American Revolution and the early development of the United States. He is particularly
  interested in the role of the Pennsylvania Legislature in authorizing the creation of the New Hope-Lambertville Bridge in 1812 and its impact on the development of transportation and commerce between
  the two states. He is also interested in the social and cultural context of the time, including the rise of the waltz as a popular dance form.
