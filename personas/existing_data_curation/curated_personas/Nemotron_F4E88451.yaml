  career_goals: Although retired, Alicia aims to stay actively engaged in her community. She hopes to become the volunteer coordinator for the local senior center, where she can mentor younger volunteers
    and expand programs that bring together seniors and school‑age children. She also wishes to compile a family‑recipe cookbook that preserves her Midwestern culinary heritage, and to learn how to use
    a tablet for video calls with her grandchildren. A long‑term ambition is to document her life story for the Rochester Historical Society, ensuring that the experiences of her generation are recorded
    for future residents.
