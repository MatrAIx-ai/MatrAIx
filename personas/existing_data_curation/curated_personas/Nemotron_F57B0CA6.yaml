personas:
  professional: Ronnie Zaw is a self‑directed visual artist and community facilitator who blends ink‑wash techniques with Vermont’s seasonal landscapes, crafting watercolor and digital illustrations while
    informally mediating neighborhood disputes through active listening.
  sports: Ronnie Zaw is an avid hiker who joins the North Hartland Hiking Club during summer, enjoys cross‑country skiing on the Green Mountain trails in winter, and cheers for the Boston Celtics and the
    Vermont Lake Monsters while occasionally playing casual pickleball at the town recreation center.
  arts: Ronnie Zaw is a passionate painter and calligrapher who draws inspiration from the serene brushwork of Hokusai, the muted palettes of Monet, and the Zen minimalism of contemporary ink artists, regularly
    attending the Burlington Fine Arts Gallery’s workshops and showcasing their own hybrid works at the North Hartland Community Center.
  travel: Ronnie Zaw is an intentional traveler who prefers low‑key, nature‑focused trips, having trekked the misty trails of Kyoto’s Arashiyama Bamboo Grove, explored the lavender fields of Provence, and
    regularly returns to the autumn foliage of New England’s White Mountains, all while budgeting through a simple spreadsheet and seeking quiet mountain cabins.
  culinary: Ronnie Zaw is a home‑cook who experiments with Asian‑fusion dishes like maple‑glazed pork belly bao, pumpkin mooncake cheesecake, and miso‑infused clam chowder, favoring locally sourced heirloom
    vegetables from their garden and occasionally over‑spicing meals due to a love of bold, contrasting flavors.
  core: Ronnie Zaw is a contemplative, inventive artist who merges ink‑wash serenity with Vermont’s rugged charm, lives in a tangle of paint‑splattered canvases and garden rows, forgets to file taxes on
    time but always remembers to water the lotus‑like nasturtiums in their garden.
background:
  cultural: Ronnie is the son of a Chinese‑Vietnamese mother and a Japanese father who immigrated to the United States in the late 1960s. Raised in a modest immigrant household in upstate New York, he was
    taught traditional calligraphy, the basics of Chinese cooking, and the significance of lunar festivals. After moving to North Hartland, Vermont, he blended these heritage practices with New England
    customs—celebrating Thanksgiving with a side of mooncakes, joining local fall foliage tours, and participating in town meetings. His artistic sensibility is heavily influenced by East Asian ink‑wash
    techniques and Zen aesthetics, which he adapts to the rugged, seasonal landscape of Vermont. This hybrid cultural lens informs both his creative work and his desire to foster intercultural dialogue
    within his small community.
