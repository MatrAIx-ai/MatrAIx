  career_goals: Although currently not in the formal workforce, Ronnie aims to channel his creative talents into a semi‑professional artistic practice. He intends to curate a small solo exhibition at the
    local public library, publish a limited‑edition book that pairs his poetry with his illustrations, and mentor a handful of youth interested in drawing and painting through weekly workshops at the community
    center. Over the next five years he hopes to co‑found a neighborhood art hub that offers studio space, informal classes, and a forum for cultural exchange, allowing him to blend his artistic vision
    with his commitment to harmony and community well‑being.
