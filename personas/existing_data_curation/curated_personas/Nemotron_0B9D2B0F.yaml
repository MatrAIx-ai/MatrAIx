    sessions'', ''Flexibility in workflow management'']'
  hobbies: '[''Gardening'', ''Hiking in the Ozarks'', ''Cooking Southern cuisine'', ''Reading contemporary fiction'', ''Attending local live‑music events'', ''Listening to HR and personal‑development podcasts'',
    ''Volunteering at community food bank'', ''DIY home projects'', ''Yoga for relaxation'', ''Participating in a book club'']'
  career_goals: Patricia aims to deepen her HR expertise by earning the SHRM‑CP certification within the next two years and to move into an HR generalist or HR business‑partner role. She wants to lead employee-engagement
    initiatives, develop a mentorship program for new hires, and influence workplace policies that promote flexibility and well‑being. Long‑term, she envisions becoming an HR manager for a mid‑size company
    in Central Arkansas, where she can shape a culture of collaboration and support.
