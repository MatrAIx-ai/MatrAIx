  career_goals: He aims to transition back into a technical role that combines his engineering expertise with community impact. Scott is targeting positions such as senior mechanical engineer, technical
    lead for a local manufacturing firm, or consultant for a nonprofit focused on STEM education. He also hopes to launch a small maker‑space in Dayton where he can mentor hobbyists and provide hands‑on
    training. A key ambition is to secure a stable, flexible work schedule that reduces stress while allowing him to continue learning new technologies and contributing to collaborative projects.
