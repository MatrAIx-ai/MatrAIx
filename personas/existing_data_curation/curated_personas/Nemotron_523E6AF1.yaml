personas:
  professional: Daniel Torresgarcia, a veteran bookkeeper and auditor with over three decades of experience in municipal and small‑business finance, channels their methodical, organized nature and cautious
    curiosity into meticulous double‑entry bookkeeping, advanced Excel automation, and mentoring junior staff while vigilantly guarding against compliance slip‑ups that keep them up at night.
  sports: Daniel Torresgarcia stays active by early‑morning fishing on Bayou Teche, attending weekly chess matches at the community center, walking with the Bayou Teche Strollers senior club, and cheering
    on the New Orleans Saints in the fall and the LSU Tigers during college football season.
  arts: Daniel Torresgarcia nurtures a love for the arts by devouring historical biographies, listening to the flamenco virtuoso Paco de Lucía and zydeco legend Clifton Chenier, attending community theater
    productions of Arthur Miller's 'Death of a Salesman', and collecting vintage wooden chairs they restore as functional art.
  travel: Daniel Torresgarcia plans travel with a meticulous spreadsheet, favoring relaxed road trips to the historic French Quarter of New Orleans and the pine‑scented trails of Acadia National Park, while
    dreaming of a genealogical pilgrimage to Seville, Spain, though they keep the itinerary modest to stay within a fixed retirement budget.
  culinary: Daniel Torresgarcia blends culinary traditions by expertly preparing saffron‑infused Spanish paella with chorizo and shrimp alongside bubbling Cajun gumbo seasoned with smoked andouille, fresh
    okra, and a backyard harvest of heirloom tomatoes, while their modest garden supplies the herbs that pepper their meals with homegrown basil and thyme.
  core: Daniel Torresgarcia is a detail‑driven, worry‑prone retiree who balances methodical bookkeeping with a passion for vintage furniture restoration, garden‑fresh cooking, and quiet moments by the bayou,
    all while quietly mentoring the next generation.
background:
  cultural: Daniel was raised in a bilingual household where Spanish was spoken at home and English at school, giving him a strong connection to his Spanish heritage. His family maintains Catholic traditions,
    celebrating Holy Week with special processions and enjoying festive meals that blend Spanish flavors with Southern Louisiana cuisine. Living in Franklin, he participates in local Mardi Gras celebrations,
    appreciates Cajun music, and frequently visits the nearby parish church, merging his Iberian roots with the rich cultural tapestry of coastal Louisiana.
attributes:
  skills: '[''Double-entry bookkeeping'', ''Financial statement preparation'', ''Payroll processing'', ''Tax preparation'', ''Internal audit procedures'', ''Accounting software (QuickBooks, Sage 50, Microsoft
