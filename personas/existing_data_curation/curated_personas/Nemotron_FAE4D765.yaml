  career_goals: Even at eight, Johnny envisions a future where he can merge his love for animals, the desert environment, and his curiosity about how things work. He dreams of becoming a wildlife biologist
    or veterinarian who cares for desert creatures, and he also imagines designing robots or exploring space as an engineer or astronaut. He is determined to excel in school, especially in science and math,
    to lay the foundation for these ambitions. While he feels motivated to be reliable and helpful, he sometimes worries about meeting his own high expectations, which fuels his drive to achieve his goals.
