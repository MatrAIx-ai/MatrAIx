personas:
  professional: Johnny Johnson is a budding young engineer who spends hours constructing intricate LEGO models, applying practical problem‑solving skills while letting their curiosity guide innovative designs,
    and their organized yet flexible approach lets them adapt when a build doesn’t go as planned.
  sports: Johnny Johnson is a dedicated member of the Scottsdale Panthers youth soccer team, playing midfield on Saturdays, cheering for the Arizona Diamondbacks in the spring and the Phoenix Suns during
    the winter, and they balance their love of team drills with solitary sprint intervals at the community pool.
  arts: Johnny Johnson expresses their creativity by drawing cartoon strips inspired by Mo Willems and painting desert sunsets with warm hues of ochre and turquoise, and they frequently watch Pixar’s 'Finding
    Nemo' and listen to the band Imagine Dragons while building LEGO cityscapes.
  travel: Johnny Johnson enjoys family road trips that combine desert adventures in Sedona and the Grand Canyon with beach days at Laguna Beach, prefers to plan hikes using a kid‑friendly map app but also
    loves spontaneous stops at local taco stands, and they dream of exploring the ancient ruins of Chichen Itza next summer.
  culinary: Johnny Johnson favors warm, flavorful dishes like chicken quesadilla with extra cheese, crunchy carrot sticks with hummus, and homemade guacamole for dipping, enjoys helping their mom bake chocolate
    chip cookies, and can expertly assemble a simple fruit smoothie using mango, banana, and a splash of orange juice.
  core: Johnny Johnson balances an inquisitive mind with a practical streak, often worrying over perfect LEGO builds, yet they stay organized, caring for their dog Max and navigating school, sports, and
    hobbies with a blend of curiosity, responsibility, and occasional indecisiveness.
background:
  cultural: Johnny is a white American raised in the suburban neighborhoods of Scottsdale, Arizona. His family celebrates mainstream U.S. holidays—Thanksgiving, Christmas, and the Fourth of July—while also
    embracing Southwest cultural elements. He frequently visits local attractions such as the Desert Botanical Garden and the Scottsdale Museum of the West, where he learns about Native American history
    and desert ecology. Exposure to the region’s Spanish-speaking community has introduced him to a few Spanish words at school and community events. The warm desert climate encourages outdoor activities
    like hiking and playing in community pools. His household places a strong emphasis on education, responsibility, and practical skills, shaping his balanced, organized, yet flexible personality.
