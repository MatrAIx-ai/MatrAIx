  career_goals: Claudette aims to earn a bachelor's degree in Fine Arts or Art Therapy, with the long‑term ambition of becoming a community art facilitator who uses creative programs to support mental health
    and empower underserved youth. In the near future, she seeks internships in gallery administration or graphic design firms to build a professional portfolio and gain mentorship. She also plans to develop
    a freelance illustration business that produces culturally resonant artwork for local publications and social media, while continuing to volunteer as a mentor for young artists in her neighborhood.
