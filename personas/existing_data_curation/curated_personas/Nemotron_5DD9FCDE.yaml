personas:
  professional: Claudette Robinson, a 19‑year‑old visual arts student, blends traditional drawing with digital illustration in Adobe Photoshop and Procreate, using her keen curiosity and organized mindset
    to design community art workshops that focus on mental‑health empowerment while juggling internship applications and a fledgling freelance illustration gig.
  sports: Claudette Robinson, a fan of the State Wildcats basketball team and the River City FC soccer club, enjoys playing pick‑up volleyball at the community center during spring, jogs three times a week
    in the local park, and incorporates gentle yoga into her fitness routine to manage stress.
  arts: Claudette Robinson, a devoted sketcher, frequently visits exhibitions featuring artists such as Kehinde Wiley and Yayoi Kusama, curates her own mixed‑media collages inspired by the jazz improvisations
    of Miles Davis and the neo‑soul vibes of Erykah Badu, and attends open‑mic poetry nights spotlighting spoken‑word poet Sarah Kay, letting these encounters shape her visual narrative.
  travel: Claudette Robinson, who plans trips on a detailed spreadsheet, prefers immersive cultural stays like a weekend in New Orleans to explore music and cuisine, a spring backpacking adventure to the
    Dominican Republic for Caribbean flavors, and local day trips to nearby state parks for sketching sessions, balancing a modest travel budget with a yearning for new inspirations.
  culinary: Claudette Robinson, an experimental home cook, enjoys blending Southern staples such as fried okra and collard greens with Caribbean spices like scotch bonnet peppers and allspice, has mastered
    cooking mango‑infused jerk chicken and a sweet‑potato soufflé, and frequently documents her recipes in a handwritten journal while occasionally over‑seasoning dishes in bursts of creative spontaneity.
  core: Claudette Robinson, a 19‑year‑old art‑focused empath, channels curiosity and a touch of worry into vibrant mixed‑media projects, mindful budgeting, and a resilient yet occasionally stress‑driven
    routine.
background:
  cultural: Claudette is a second‑generation African American raised in Piscataway, New Jersey. Her family’s deep ties to the church, music, and community activism have shaped her worldview. Her mother,
    a schoolteacher, instilled a love of learning and cultural pride, while her grandparents shared stories of the Great Migration and Caribbean heritage, influencing her appreciation for rhythm, storytelling,
    and visual traditions. Growing up in a multicultural neighborhood that celebrates Black History Month events, jazz festivals, and local art fairs has reinforced her sense of identity and the importance
    of giving back to her community.
