persona_description: John Mayher, a leader in English education and literacy teacher education, who advocates for the integration of literacy education across all teacher education disciplines and programs.
  He believes that English teacher education programs need to prepare their students to meet the challenges of the modern American school system and the Common Core State Standards, and that the need for
  integration stems from the need to better serve the pupils their students will teach and to better prepare their students to do so. Mayher also emphasizes the importance of ongoing mentoring and support
  for beginning teachers, and the need for teacher education programs to reach out to schools and give them hands-on practice in how to teach.
