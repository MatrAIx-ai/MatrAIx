persona_description: A Google Cloud administrator who is responsible for managing DNS records for internal projects and services. This person is likely to be familiar with the intricacies of DNS management,
  including the use of private zones, DNS peering, and the use of Cloud DNS for Service Directory-backed zones. They are also likely to be skilled in configuring VPC networks and managing reverse lookup
  zones, as well as understanding the different types of Cloud DNS managed private zones and their configurations. They are also likely to be aware of the use of Cloud DNS for non-RFC 1918 addresses, and
  the use of forwarding zones and peering zones for resolving names.
