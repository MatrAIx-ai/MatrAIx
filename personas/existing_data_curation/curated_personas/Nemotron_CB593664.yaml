    ''Shift Scheduling and Inventory Management'']'
  hobbies: '[''Strength Training and Running'', ''Playing Strategy Video Games (e.g., turn‑based RPGs)'', ''Cooking Traditional Mexican Dishes'', ''Hiking in the Rio Grande Valley'', ''Listening to Regional
    Mexican Music'', ''Journaling and Mindfulness Practices'', ''Participating in Community Health Fairs'', ''Photography of Local Landscapes and Street Scenes'']'
  career_goals: Bridney aspires to advance within the EMS field by attaining a senior paramedic position and eventually becoming an EMS crew chief or operations supervisor. He plans to complete a bachelor’s
    degree in emergency medical services or public health to qualify for administrative roles and to pursue certifications as a Flight Paramedic. Long‑term, he hopes to design and lead culturally competent
    training programs for first responders in border communities, and to champion mental‑health support initiatives for paramedics, drawing on his own experiences with anxiety and emotional distress.
