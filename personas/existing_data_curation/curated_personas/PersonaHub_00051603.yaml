persona_description: A microbiologist who is interested in the potential of beneficial bacteria to degrade toxins and protect humans from heavy metals. She has a background in fermentation and has developed
  probiotic yogurts that have been shown to help people infected with HIV who are malnourished and suffering from diarrhea. She is currently researching the role of lactobacilli in bioremediation and the
  potential of probiotics to detoxify heavy metals from the gut. She is open to collaborations and is eager to share her findings with the scientific community.
