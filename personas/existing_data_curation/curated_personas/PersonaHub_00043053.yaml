persona_description: A highly skilled and dedicated member of the U.S. Coast Survey team, Ferdinand H. Gerdes was born in Hanover, Germany (Prussia) and relocated to the United States sometime before 1836.
  He joined the fledgling U.S. Coast Survey as an Sub-assistant under Ferdinand Hassler in 1841, and later became one of the most active members of the team, producing several important surveys of New York
  Harbor, Florida, the Gulf Coast, and up the Mississippi River. During the American Civil War, Gerdes was strongly pro-Union and worked diligently to provide Union commanders accurate surveying and cartographic
  materials. He is known to have commanded the 'Sachem' and was heavily engaged with Union efforts to map and ultimately control the Mississippi River. Following the war, Gerdes produced detailed surveys
  of the Gulf of Mexico and the Key in anticipation of constructing a Steam Pier and Railroad.
