  hobbies: '[''Basketball (recreational)'',''Fitness and gym training'',''Listening to business and technology podcasts'',''Strategic board games (chess, Settlers of Catan)'',''Cooking Mexican cuisine'',''Traveling
    (Mexico and Midwest)'',''Reading non-fiction (business, psychology)'',''Volunteering for community mentorship'',''Photography (urban landscapes)'']'
  career_goals: Raul is determined to rank among the top sales performers in his organization, targeting President's Club recognition within the next two years. He plans to advance to a sales manager role,
    then to regional sales director, and eventually to a vice-president of sales position. Parallel to his corporate trajectory, he intends to pursue an MBA to deepen his strategic expertise and, long term,
    launch his own sales consultancy that helps Latino-owned businesses scale their operations.
