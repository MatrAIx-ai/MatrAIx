persona_description: A scientist or researcher who is interested in the development and application of genetically modified plants and animals to produce pharmaceuticals. They are likely to be familiar
  with the concept of pharming, which involves genetically modifying plants and animals to produce valuable pharmaceutical substances. They may have expertise in genetic engineering, molecular biology,
  and medicinal chemistry. They are interested in finding the least expensive and most effective ways of practicing pharming, and are willing to invest time and resources into researching and testing new
  approaches. They are also interested in the potential benefits of pharming, such as the reduction in laboratory costs and the production of medicinal materials with fewer side effects.
