  career_goals: Tasha aims to advance to a shift-supervisor role within the next year and eventually become a store manager, leveraging her long-standing retail experience. She plans to enroll in a community
    college retail-management certificate program to formalize her expertise. Long-term, she hopes to combine her passion for helping others with her practical skills by launching a neighborhood financial-literacy
    workshop series for teenagers and low-income adults. Additionally, she dreams of establishing a small community-focused boutique that showcases locally made crafts and foods, allowing her to blend entrepreneurship
    with community service.
