personas:
  professional: Tasha Price, a veteran retail associate with three decades of cash‑register mastery, excels at POS systems, inventory control, and conflict resolution, channeling their community‑oriented
    compassion and pragmatic curiosity into mentoring new hires and smoothing store operations as they eye a shift‑supervisor role.
  sports: Tasha Price, an enthusiastic fan of the Tennessee Titans and Nashville Predators, cheers from the living‑room couch on game days while balancing a modest weekly routine of low‑impact yoga, community
    garden hikes, and a spirited church softball league that keeps them moving despite a stubborn knee ache.
  arts: Tasha Price immerses themselves in the rich tapestry of Nashville’s music scene, singing gospel standards by Aretha Franklin with their church choir, swaying to the blues of Sam Cooke at local venues,
    appreciating Dolly Parton’s storytelling in country‑folk, and devouring novels by Toni Morrison and James Baldwin during book‑club evenings, all of which shape their soulful creative outlook.
  travel: Tasha Price prefers road‑trip adventures across the Southern charm of New Orleans, Charleston, and the Great Smoky Mountains, planning itineraries around family gatherings and affordable B&B stays,
    while dreaming of a cultural pilgrimage to Ghana’s coastal villages and a culinary tour of Paris’s markets when their boutique finally takes off.
  culinary: Tasha Price, a confident home cook who can whip up classic collard greens, fried catfish, and sweet‑potato casserole with the ease of a seasoned chef, often experiments by folding Mediterranean
    olives or cumin into their Southern staples, sourcing fresh basil, thyme, and home‑grown okra from their garden to craft hearty, soulful fusion meals for church potlucks and family gatherings.
  core: Energetic, community‑driven and pragmatically curious, Tasha Price balances a love for gospel music and soul‑food cooking with a habit of hoarding receipts for budgeting, a gentle forgetfulness
    around medication, and a relentless drive to turn their retail expertise into a neighborhood boutique that serves both commerce and compassion.
background:
  cultural: Tasha is an African American woman whose family settled in Nashville during the Great Migration, bringing Southern culinary traditions and a deep connection to the city’s historically Black
    neighborhoods. Her upbringing was centered around church, gospel music, and community gatherings, fostering a strong sense of solidarity and service. She embraces the heritage of Southern soul food,
    storytelling, and the legacy of civil-rights activism that shaped her community. Tasha’s cultural identity is reflected in her love for gospel singing, cooking family recipes, and participating in local
    events that celebrate Black history and arts in Nashville.
