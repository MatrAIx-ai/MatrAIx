  hobbies: '[''Chinese calligraphy'', ''Cooking regional Chinese dishes'', ''Jogging'', ''Basketball'', ''Reading historical fiction and philosophy'', ''Mahjong'', ''Volunteering at senior center'', ''Street
    photography'']'
  career_goals: Looking ahead, Tao aims to advance to the rank of fire captain and eventually become a district chief, where he can shape fire safety policy for Queens. He plans to develop a bilingual fire
    prevention program that integrates mobile‑app alerts, predictive analytics, and neighborhood workshops, targeting high‑rise apartments common in Flushing. Tao also intends to pursue the Fire Officer
    II certification and a Master’s degree in Public Administration to deepen his strategic leadership skills. He is committed to mentoring the next generation of firefighters, especially those from immigrant
    backgrounds, and hopes to serve on the city’s fire safety advisory board.
