personas:
  professional: Jean Rodgers, a seasoned health information management specialist with over two decades of expertise in ICD‑10, CPT coding, and Epic/Cerner EHRs, leverages her methodical nature and imaginative
    curiosity to design rigorous quality‑assurance protocols while actively pursuing RHIA certification and a senior leadership role to champion predictive analytics and thought leadership in medical record
    accuracy.
  sports: Jean Rodgers stays active through a disciplined yoga practice three times a week, joins the local Sunrise Hikers group for weekend prairie walks, follows the Kansas City Chiefs with fervent devotion
    on Sundays, and occasionally plays casual tennis at the community center, balancing competitive spirit with the serenity of birdwatching.
  arts: Jean Rodgers immerses herself in the arts by creating bold abstract watercolors inspired by Mark Rothko and Wassily Kandinsky, curating a home gallery that showcases her work alongside prints of
    Georgia O’Keeffe, attending weekly workshops led by local artist collectives, devouring speculative philosophy texts by Ted Chiang and contemporary fiction by Margaret Atwood, while solving crossword
    puzzles and listening to the avant‑garde sounds of Björk to stimulate creative thought.
  travel: Jean Rodgers prefers meticulously planned photography trips that blend serene sunrise shoots over the Great Plains with cultural immersion, having captured the dramatic light of Badlands National
    Park, the sandstone arches of Monument Valley, and the cherry blossoms of Kyoto, while dreaming of a leisurely week in Provence’s lavender fields, she balances her wanderlust with budget-conscious itineraries
    and limited vacation days.
  culinary: Jean Rodgers, an intermediate home cook, delights in preparing garden‑fresh dishes such as roasted beet and goat‑cheese salad with arugula, quinoa pilaf with grilled zucchini and fresh thyme,
    and hearty carrot‑ginger soup, while she frequently indulges in a slice of dark chocolate after a stressful audit, and she seeks out farm‑to‑table restaurants featuring seasonal ingredients like heirloom
    tomatoes and heirloom corn.
  core: Jean Rodgers blends an imaginative, art‑driven curiosity with methodical data mastery, yet their intense anxiety often fuels late‑night puzzle marathons and occasional over‑indulgence in chocolate,
    making them a meticulous yet tenderly fragile guardian of both health records and watercolor hues.
background:
  cultural: Jean was born and raised in the Upper Midwest, growing up in a modest, middle-class white family in South Dakota. The region’s strong work ethic, independence, and emphasis on community service
    shaped her reliable and methodical demeanor. She maintains ties to local traditions, such as the Sioux Falls Riverfest and the annual St. Patrick’s Day Parade, and she participates in a small-town Lutheran
    congregation that values stewardship and fellowship. The expansive plains and seasonal cycles fostered her appreciation for solitude and nature, which informs both her artistic expression and her reflective,
    introspective side.
attributes:
  skills: '[''ICD-10 and CPT coding'', ''Epic and Cerner EHR management'', ''HIPAA privacy and security compliance'', ''Health information quality assurance'', ''Data analysis and reporting'', ''Process
    improvement and workflow optimization'', ''Project management'', ''Staff training and mentorship'', ''Document classification and retrieval'', ''Auditing and risk assessment'']'
  hobbies: '[''Abstract watercolor painting'', ''Reading speculative philosophy'', ''Puzzle solving (crosswords, Sudoku)'', ''Birdwatching'', ''Gardening'', ''Yoga and mindfulness meditation'', ''Photography
    of prairie landscapes'', ''Attending regional art fairs'']'
  career_goals: Jean aims to transition from a specialist role to a senior leadership position, such as Health Information Management Director, where she can shape organization-wide data strategy. She plans
    to obtain the Registered Health Information Administrator (RHIA) credential, lead the implementation of predictive analytics tools within the EHR, and champion a culture of continuous improvement. Ultimately,
    she aspires to author articles on best practices for medical record accuracy and present at national HIM conferences, positioning herself as a thought leader in health informatics.
