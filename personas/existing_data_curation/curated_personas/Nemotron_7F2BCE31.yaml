  hobbies: '[''Watercolor Painting'', ''Acoustic Guitar'', ''Nature Photography'', ''Hiking'', ''Community Gardening'', ''Volunteering at Parks'', ''Reading Speculative Fiction'', ''Attending Art Workshops'',
    ''Woodworking'', ''Birdwatching'']'
  career_goals: Aaron aims to transition from hands‑on groundskeeping to a role as a landscape design consultant, focusing on artistic, eco‑friendly projects for public parks and private clients in the
    Otter Tail County area. He plans to earn a Certified Landscape Professional credential, mentor younger workers, and eventually launch a boutique design studio that blends abstract art concepts with
    native Minnesota flora. Over the next five years, he also hopes to secure a teaching position at the local community college to share his knowledge of sustainable landscaping and creative design.
