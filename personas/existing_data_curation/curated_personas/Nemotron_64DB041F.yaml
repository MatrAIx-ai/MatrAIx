personas:
  professional: Hope Rutherford is an aspiring wildlife coder who blends curiosity about ecosystems with methodical problem‑solving, channeling their love of nature, animal‑shelter volunteering, and LEGO
    building into developing simple Scratch games about animal habitats, while their quiet, reliable nature keeps projects organized and on schedule.
  sports: Hope Rutherford enjoys casual soccer with the local youth co‑op in the fall, follows the Carolina Panthers during football season, stays active by biking along the Cape Fear River trail on weekends,
    and prefers low‑pressure group activities over competitive leagues, reflecting a balanced, community‑oriented approach to fitness.
  arts: Hope Rutherford finds quiet expression through playing the flute in the school band, draws inspiration from violinist Lindsey Stirling and composer Hans Zimmer, devours mystery novels by Agatha
    Christie, and incorporates cinematic soundscapes into Scratch games, illustrating a creative synthesis of music, literature, and digital art.
  travel: Hope Rutherford prefers family road trips that blend structured stops at historic sites like Williamsburg with nature escapes to the Great Smoky Mountains, and dreams of a future school exchange
    program in Kyoto, balancing careful itineraries with spontaneous nature walks.
  culinary: Hope Rutherford helps whisk cornbread batter and season fried chicken with a pinch of cayenne on Sundays, experiments with DIY veggie sushi rolls using avocado, cucumber, and seasoned rice,
    and confidently crafts mac and cheese with a breadcrumb topping, showing a budding kitchen confidence while still relying on comforting Southern staples.
  core: Hope Rutherford is a quietly curious 13‑year‑old who balances meticulous LEGO builds and nature journals with a habit of forgetting to water houseplants, while charting short Scratch games that
    explore animal worlds.
background:
  cultural: Hope was raised in Fayetteville, North Carolina, a city known for its close ties to the nearby Fort Bragg military community. Her family lives in a suburban neighborhood where Southern hospitality,
    community service, and respect for tradition are emphasized. She attends a public middle school that reflects a mix of local families and military‑connected families, exposing her to diverse perspectives
    while retaining a strong sense of small‑town community. Weekly family meals often feature Southern staples such as fried chicken and collard greens, and holidays include church gatherings and local
    festivals. These cultural influences have fostered her appreciation for harmony, responsibility, and modest ambition.
attributes:
  skills: '[''Organized note‑taking'', ''Time‑management for school assignments'', ''Basic digital literacy (Google Docs, Scratch coding)'', ''Research and summarizing skills'', ''Collaboration on small‑group
    science projects'', ''Peer mentorship in reading and math'', ''Responsibility in household chores'']'
  hobbies: '[''Reading mystery and fantasy novels'', ''Nonfiction books about animals and ecosystems'', ''LEGO building'', ''Simple chemistry experiments'', ''Journaling nature observations'', ''Playing
    the flute'', ''Scratch coding'', ''Volunteering at animal shelter'']'
  career_goals: Hope is excited by the idea of working with animals and nature. She aspires to become a veterinarian or wildlife rehabilitator, a goal that blends her curiosity about biology with her compassionate
    desire to help living beings. In the short term, she plans to take advanced science electives in high school, join a local community‑service program focused on animal shelters, and continue building
    her research skills through science fairs. Long‑term, she envisions attending a university with a strong pre‑veterinary program and eventually opening a small clinic that serves both pets and local
    wildlife, while also promoting community education about animal care.
