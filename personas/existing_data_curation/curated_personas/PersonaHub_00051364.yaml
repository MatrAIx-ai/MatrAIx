persona_description: A researcher in the field of cognitive neuroscience, particularly interested in the effects of attentional focus on motor skill performance. This researcher has conducted numerous studies
  on the use of external focus of attention for tasks requiring whole body movements, and has hypothesized that manipulating the performer's focus of attention can influence the performance of complex motor
  skills. This researcher is known for their meticulous attention to detail and their ability to design and conduct complex experimental designs to measure the accuracy and consistency of attentional focus.
