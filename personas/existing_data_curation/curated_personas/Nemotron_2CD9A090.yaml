personas:
  professional: Jose Tejada, a seasoned cook with two decades of fast‑paced Miami kitchen experience, leverages meticulous organization, bilingual communication, and mastery of traditional paella and modern
    Caribbean flavors to lead kitchen brigades with calm precision while they nurture a supportive team culture.
  sports: Jose Tejada jogs along Miami Bay each sunrise with the South Beach Runners, avidly supports the Miami Heat and Inter Miami CF, and plays weekend pickleball at a nearby community center to balance
    cardio with social interaction, while they appreciate the camaraderie of team sports.
  arts: Jose Tejada immerses in flamenco guitar by Paco de Lucía, strums a second‑hand guitarra on quiet evenings, and frequently attends performances at the Miami‑Beach Art Deco theater as well as local
    salsa‑infused art festivals, letting the rhythms shape their cooking cadence.
  travel: Jose Tejada plans meticulously for culinary‑inspired getaways—revisiting Barcelona’s La Boqueria market, savoring Havana’s street food, and exploring the Caribbean’s stone‑crab shores—while they
    balance a modest travel budget that favors home‑cooked experiences over lavish luxury resorts.
  culinary: Jose Tejada, a master of both classic paella and modern stone‑crab tapas, skillfully blends saffron, rosemary, thyme, mango, and lime in their kitchen, routinely crafting dishes like gazpacho
    with a splash of citrus and croquetas infused with jamón ibérico, reflecting their deep culinary roots and Miami’s coastal bounty.
  core: Jose Tejada, a 41‑year‑old disciplined chef, channels intense anxiety into precise kitchen routines, early‑morning jogs, a balcony herb garden, and occasional flamenco guitar sessions, all while
    they nurture a harmonious team and dream of a boutique tapas bar.
background:
  cultural: Jose was born in Seville, Spain, and grew up immersed in the region’s rich culinary traditions—from tapas and gazpacho to the ritual of sharing a family paella. His upbringing was shaped by
    a Catholic household that celebrated holidays with communal meals, emphasizing hospitality and the joy of food. After moving to Miami in his early thirties, he adapted to the city’s multicultural tapestry,
    blending his Spanish roots with the vibrant Cuban, Caribbean, and Latin American influences that dominate South Florida’s food scene. Bilingual in Spanish and English, Jose navigates both cultures fluidly,
    honoring his heritage through authentic dishes while embracing local ingredients such as stone‑crab, tropical fruits, and fresh fish. This hybrid cultural identity informs his cooking style, his interpersonal
    approach, and his aspiration to create a culinary space that bridges Spanish tradition with Miami’s dynamic palate.
attributes:
