    high‑pressure service'']'
  hobbies: '[''Herb gardening on balcony'', ''Morning jogs along Miami Bay'', ''Mindfulness meditation'', ''Experimenting with traditional Spanish recipes'', ''Listening to flamenco and classical Spanish
