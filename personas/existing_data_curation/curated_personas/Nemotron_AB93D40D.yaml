personas:
  professional: Perla Garcia is a hands‑on heavy‑equipment technician in Modesto who blends deep mechanical expertise in diesel engines, hydraulics and transmissions with a flair for creative problem‑solving,
    often sketching custom livery designs on service tickets and using MIG/TIG welding to fabricate parts, while navigating a flexible schedule that they sometimes neglect to plan meticulously, mentoring
    apprentices competitively yet skeptically, and pursuing ASE Heavy‑Duty and Certified Heavy Equipment Technician credentials to eventually launch a mobile repair‑and‑design business.
  sports: Perla Garcia fuels an adrenaline‑filled fitness routine with weekend off‑road ATV rides as part of the Modesto Off‑Road Enthusiasts club, balances those bursts with regular yoga sessions and occasional
    trail hikes in the Sierra foothills, and cheers on the San Francisco Giants and Golden State Warriors while occasionally joining a community soccer league for a social workout.
  arts: Perla Garcia immerses themselves in Modesto’s vibrant street‑art scene, capturing murals in watercolor sketches inspired by the bold stencil work of Banksy and the vibrant colors of Shepard Fairey,
    curates custom graphics for equipment paint jobs, and fuels their creative spirit by attending intimate gigs featuring indie acts like The Serendipitous and Latin‑alternative bands such as Café Tacvba
    and Zoé.
  travel: Perla Garcia prefers spur‑of‑the‑moment road trips, often loading the bike with a camera to capture sunrise over Yosemite and then hopping south to Oaxaca for its Day of the Dead festivities,
    while balancing a modest travel budget that nudges them toward budget‑friendly stays in Austin for South by Southwest and occasional weekend getaways to the coastal town of Santa Cruz.
  culinary: Perla Garcia showcases a palate that celebrates vibrant flavors, expertly preparing mole poblano, chile rellenos and carnitas for Cinco de Mayo and Día de los Muertos community feasts, while
    delighting in fresh avocado, chipotle, lime, and cilantro in homemade salsas and often experimenting with artisanal corn masa to craft the perfect taco shell.
  core: Perla Garcia is a creatively wired diesel mechanic who balances an intense anxiety‑driven need for mindfulness with impulsive art‑shopping sprees, a flexible but sometimes chaotic schedule, and
    a fierce drive to merge heavy‑equipment repair with custom design.
background:
  cultural: Perla is a first‑generation Mexican‑American born to immigrant parents who settled in the Central Valley’s agricultural community. She grew up bilingual, celebrating Día de los Muertos, quinceañeras,
    and other Mexican traditions with her family and the local Mexican‑American church. Her upbringing instilled a strong work ethic, reverence for community, and an appreciation for vibrant visual culture,
    evident in her love of mural art and custom equipment livery. While honoring her heritage through traditional cooking, music, and dance, she also embraces a modern Californian identity, navigating both
    cultures with confidence and curiosity.
attributes:
  skills: '[''Diesel engine repair'', ''Hydraulic system diagnostics'', ''Heavy equipment maintenance'', ''MIG/TIG welding'', ''Blueprint and schematic reading'', ''Diagnostic software (e.g., Caterpillar
    Service Link)'', ''Preventive maintenance planning'', ''OSHA safety compliance'', ''Spanish language proficiency'', ''Creative troubleshooting'', ''Basic graphic design for equipment livery'']'
  hobbies: '[''Street‑art photography'', ''Watercolor painting'', ''Custom equipment graphic design'', ''Off‑road ATV riding'', ''Yoga and meditation'', ''Listening to indie and Latin‑alternative music'',
    ''Cooking traditional Mexican dishes'', ''Volunteering at cultural festivals (Cinco de Mayo, Día de los Muertos)'', ''Reading cyber‑punk and speculative fiction'', ''Bike customization'']'
  career_goals: Perla aims to earn the ASE Heavy‑Duty certification and the Certified Heavy Equipment Technician credential within the next two years. She envisions advancing to a lead service‑technician
    or foreman role at her current shop, and eventually launching a mobile equipment‑repair business that also offers custom paint and design work, blending her mechanical expertise with her artistic interests.
    Long‑term, she hopes to become a specialist in telematics‑driven maintenance and to mentor more women and underrepresented minorities entering the heavy‑equipment trades, fostering a more inclusive
    workplace.
