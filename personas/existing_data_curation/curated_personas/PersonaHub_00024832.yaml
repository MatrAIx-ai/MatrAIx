persona_description: François Duvalier, also known as Papa Doc, was a Haitian politician and military leader who served as the president of Haiti from 1957 to 1971. He was known for his authoritarian rule,
  which included the use of violence and terror to maintain power. Duvalier's regime was characterized by widespread human rights abuses, including the suppression of political dissent and the execution
  of thousands of people. Despite the violence and oppression, Duvalier's rule was able to achieve political stability for Haiti during a time of political turmoil.
