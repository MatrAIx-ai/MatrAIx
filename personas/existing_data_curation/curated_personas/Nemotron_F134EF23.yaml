  career_goals: Alex aims to build a future in technology, aspiring to become a software developer or computer engineer who creates tools that benefit his community. In the short term, he hopes to join
    a specialized STEM summer camp, earn entry‑level IT certifications such as CompTIA IT Fundamentals, and take on a leadership role in his school's technology club. Long‑term, he envisions launching youth
    coding workshops in Charles County to inspire other teenagers and contribute to local tech initiatives.
