personas:
  professional: Alex Washington is a budding robotics hobbyist and aspiring game strategist who spends afternoons constructing simple Arduino bots while they apply their problem‑solving curiosity to master
    tactical video games, balancing creative experimentation with a pragmatic step‑by‑step methodology.
  sports: Alex Washington spends solitary evenings shooting hoops at the Northside Youth Basketball Club, idolizing the Los Angeles Lakers and the Chicago Bulls while they keep a casual fitness routine
    that emphasizes solo basketball drills over team play, preferring the quiet focus of the court to noisy group sports.
  arts: Alex Washington immerses themselves in hip‑hop and R&B, looping beats on a tablet while they study the production styles of Kendrick Lamar, J. Cole, and SZA, and they unwind with graphic novels
    like 'Saga' and 'Watchmen', letting those visual narratives fuel their own creative storytelling.
  travel: Alex Washington prefers low‑cost, spontaneous trips to nearby nature spots such as Pine Ridge State Park and dreams of hiking the Grand Canyon, planning trips on a whim with family approval while
    they balance school constraints and a limited budget.
  culinary: Alex Washington’s palate leans toward bold flavors—spicy buffalo wings, sushi rolls with avocado, and ramen with extra Sriracha—yet their cooking skill is limited to microwaving pizza and assembling
    simple pasta dishes, often snacking on chips while they game.
  core: Alex Washington navigates life like a sandbox game—experimenting with robots, beats, and books, while their relaxed, sometimes disorganized, yet emotionally steady nature lets them turn curiosity
    into improvised mastery, and they never shy away from a new challenge.
background:
  cultural: Alex is an African American teenager raised in Newburg, Maryland, a community that reflects the Mid‑Atlantic Black experience. His family emphasizes education, community involvement, and cultural
    pride, celebrating traditions such as family reunions, church gatherings, and local festivals featuring soul food, gospel music, and African American arts. Proximity to Washington, D.C. exposes him
    to a vibrant urban Black culture—hip‑hop, spoken word, and activism—while his hometown’s close‑knit neighborhoods foster solidarity and mutual support. These cultural influences shape his worldview,
    encouraging both a deep appreciation of his heritage and a desire to give back through technology and community service.
