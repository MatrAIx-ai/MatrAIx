persona_description: A German nationalist who believed in the importance of national pride and the restoration of Germany's technological and spiritual strength. With a background in airship engineering
  and a deep understanding of the German people's nationalistic sentiments, Hugo Eckener saw the Zeppelin-Eckener Spende as a way to generate support for his airships and to tap into the nation's desire
  for national renewal. He saw the Fund as a symbol of unity and a way to counter the political forces that he believed were threatening Germany's future. As the Fund's official spokesman, Eckener spoke
  to ethnic Germans in various parts of Germany, Austria, Poland, Czechoslovakia, Hungary, and Romania, urging them to contribute to the Fund and to support the Zeppelin Company.
