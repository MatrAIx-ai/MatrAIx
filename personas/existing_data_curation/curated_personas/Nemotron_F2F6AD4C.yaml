  hobbies: '["Cooking traditional Mexican dishes", "Gardening", "Visiting art galleries and cultural exhibitions", "Playing bridge and rummy", "Sewing and embroidery", "Participating in cultural festivals
    (Día de los Muertos, Mexican Independence Day)", "Reading historical novels and biographies", "Listening to Mexican music (ranchera, boleros)", "Volunteer work at church and community center"]'
  career_goals: Although retired, Maria Marcela is driven to remain intellectually and socially active. She plans to write a memoir documenting her family's migration story and the evolution of the Mexican‑American
    community in Pico Rivera, preserving it for future generations. She aspires to mentor younger women in her neighborhood, teaching them traditional cooking, crafts, and the art of oral storytelling.
    Maria hopes to curate an annual local art showcase that highlights senior artists and celebrates Mexican cultural heritage. To expand her creative toolkit, she intends to enroll in a community‑college
    class on digital photography. Maintaining her health is also a priority, so she aims to keep up with regular walks, low‑impact exercise classes, and mindful stress‑reduction practices.
