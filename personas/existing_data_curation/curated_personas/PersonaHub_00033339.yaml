  on the possibility of spaceflight using a tower with an elevator that could ride up the cable to reach orbit velocity. He is also known for his work on the use of liquid propellants for rockets and his
  proposal for a multistage rocket. His work has had a significant impact on the development of rocket technology in Russia and has contributed to the Soviet Union's space program.
