  career_goals: Looking ahead, Miguel aims to transition from hands‑on driving to a leadership position within his trucking firm, focusing on driver training, safety compliance, and route‑optimization strategy.
    He plans to obtain the Certified Transportation Safety Professional (CTSP) credential and enroll in a community‑college business management program to gain formal managerial knowledge. Parallel to his
    professional aspirations, Miguel dreams of launching a niche boutique delivery service that caters to local artists, galleries, and craft markets, marrying his logistical expertise with his passion
    for art. In the longer term, he envisions owning a small fleet of eco‑friendly vehicles that support the Idaho creative community while providing mentorship opportunities for younger drivers.
