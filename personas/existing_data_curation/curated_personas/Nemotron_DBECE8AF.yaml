personas:
  professional: Miguel Mendoza is a veteran commercial driver with three decades of experience, skilled in heavy‑duty truck operation, DOT compliance, route‑optimization software, bilingual client communication,
    and hands‑on mechanical maintenance, who leverages his calm demeanor and imaginative problem‑solving to mentor new drivers and design creative logistics solutions for his company.
  sports: Miguel Mendoza enjoys hiking the Boise Foothills, follows the Boise State Broncos football team and the Boise Hawks minor‑league baseball club, and occasionally joins pickup basketball games at
    the community center, blending his love of the outdoors with light competitive activity.
  arts: Miguel Mendoza channels his imagination into abstract landscape paintings inspired by Idaho’s sunrise, captures moving trucks in photographs reminiscent of Ansel Adams, crafts functional wooden
    pieces, improvises acoustic guitar melodies at family gatherings, and finds artistic kinship with Jackson Pollock’s fluid style, regularly exhibiting at the Idaho Arts Council fair.
  travel: Miguel Mendoza favors scenic road trips that blend artistic inspiration and nature, planning routes that include stops at Sun Valley, Yellowstone National Park, and the Oregon Coast, while dreaming
    of a future drive through Patagonia’s fjords, balancing detailed itinerary work with spontaneous detours for unexpected photographic moments.
  culinary: Miguel Mendoza prefers hearty, locally sourced fare, often grilling Idaho trout with fresh herbs, baking rustic potato gratin, and savoring seasonal strawberries drizzled with local honey, while
    occasionally indulging in homemade chicken tacos to keep his Spanish fluency sharp.
  core: Miguel Mendoza is a calm, imaginative veteran trucker who blends logistical expertise with an artistic soul, mentoring drivers by day and painting abstract canvases by night.
background:
  cultural: Miguel grew up in the modest working‑class neighborhoods of Nampa, Idaho. His parents immigrated from Mexico in the early 1970s and settled in Canyon County, where they worked in agriculture
    and construction. While Miguel identifies as white in demographic terms, his family maintains a blend of Mexican cultural traditions—such as music, communal meals, and a reverence for storytelling—alongside
    the broader values of the Pacific Northwest's rural communities. He is fluent in English and conversational in Spanish, a skill he occasionally uses with clients and in community activities. The region’s
    emphasis on self‑reliance, respect for the outdoors, and tight‑knit neighborhood networks shaped his cooperative and harmonious outlook, while his multicultural heritage nurtured his love for art, music,
    and abstract ideas.
