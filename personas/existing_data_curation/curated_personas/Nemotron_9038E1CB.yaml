personas:
  professional: Gregory Walma is a budding junior game designer who blends a love for drawing, intricate LEGO constructions, and Scratch programming to prototype whimsical interactive stories, while their
    curious, relaxed, and competitively spirited nature fuels rapid experimentation despite occasional disorganization.
  sports: Gregory Walma enjoys weekend soccer practices with the Flagstaff Hawks Youth League, follows the Arizona Diamondbacks' spring training, and spends afternoons scaling the sandstone trails at Flagstaff
    Mountain, favoring a playful, competitive approach to fitness that balances team drills with solo rock‑collecting expeditions.
  arts: Gregory Walma immerses themselves in drawing anime‑style characters, studies Monet's water lily paintings, watches Pixar's "Soul" for color inspiration, and follows the LEGO Master Builder channel
    of "Beyond the Brick", shaping a vibrant artistic identity that blends classic fine art with modern pop culture.
  travel: Gregory Walma dreams of returning to the Grand Canyon for sunrise photography, has already explored the Lowell Observatory's night sky tours, and hopes to one day visit Kyoto’s bamboo forest to
    sketch the iconic scenery, preferring trips that combine adventure hikes with hands‑on learning experiences.
  culinary: Gregory Walma favors homemade mac and cheese topped with crisp bacon, delights in snacking on honey‑glazed carrot sticks and fresh blueberries, and loves attempting simple smoothie experiments
    blending banana, spinach, and almond milk, though they often forget to clean the blender promptly.
  core: Gregory Walma is a curious, competitively spirited eight‑year‑old whose artistic tinkering, love for nature, and relaxed approach weave a uniquely imaginative and effortlessly resilient worldview.
background:
  cultural: Gregory grows up in Flagstaff, Arizona, a high‑desert city surrounded by national forests and near several Native American reservations. His family’s heritage is predominantly White, with roots
    in the Pacific Northwest, but the local community’s emphasis on outdoor recreation, environmental education, and respect for Indigenous histories shapes his worldview. School programs highlight Southwestern
    art, astronomy at the Lowell Observatory, and stewardship of the region’s unique ecosystems, providing Gregory with a blend of cultural influences that inform his interests and values.
