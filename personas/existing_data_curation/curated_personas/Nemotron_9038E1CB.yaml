  career_goals: Gregory dreams of exploring space as an astronaut and sharing his discoveries through illustrated comics and videos that make science exciting for other kids. He also imagines becoming a
    park ranger or wildlife documentary filmmaker, where he could combine his love of nature, art, and storytelling. In the long term, he hopes to lead projects that blend scientific research, environmental
    stewardship, and creative outreach, inspiring curiosity and appreciation for the natural world.
