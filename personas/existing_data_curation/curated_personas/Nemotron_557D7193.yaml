  career_goals: Benjamin aims to pursue a degree in environmental science or outdoor recreation management, with the long-term goal of working as a park ranger or conservation project coordinator in the
    national parks of Utah. He hopes to combine his love for nature, practical skill set, and community-focused mindset to promote sustainable tourism, lead educational programs, and eventually start a
    small local guiding business that emphasizes ecological stewardship.
