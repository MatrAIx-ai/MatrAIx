  career_goals: Even at eight, Zhao Fang dreams of turning his love for systematic problem‑solving into a future career. He aspires to become a software or robotics engineer who designs tools that help
    children learn math and science more efficiently. He aims to win his elementary school science fair, develop a simple interactive game in Scratch, and eventually study computer science in high school
    and college, with the long‑term goal of creating technology that blends creativity with practicality.
