personas:
  professional: Zhao Fang is a budding technologist who channels their methodical curiosity into constructing intricate LEGO models, crafting simple Scratch programs, and solving Rubik’s cubes, thriving
    in solitary workspaces where their organized planning and attention to detail turn imaginative ideas into precise, functional creations.
  sports: Zhao Fang prefers low‑key exercise, joining the local youth badminton club Maple Leaf Badminton Bunch and enjoying quiet bird‑watching walks, while occasionally rooting for the Chicago Cubs during
    televised games, favoring solitary, methodical play over high‑energy team sports.
  arts: Zhao Fang’s artistic world revolves around mastering piano renditions of Beethoven’s Moonlight Sonata and Yiruma’s River Flows in You, practicing elegant brush‑stroke calligraphy, and drawing inspiration
    from the intricate animation of Hayao Miyazaki’s films and the modular brilliance of LEGO Art series.
  travel: Zhao Fang loves meticulously planned weekend trips to the nearby state botanical garden and imagines future adventures to the towering redwoods of Sequoia National Park, the dazzling coral reefs
    of the Maldives, and the historic natural history museum in London, balancing a love for quiet observation with the excitement of new landscapes.
  culinary: Zhao Fang favors the cheesy pull of pizza Margherita, the comforting swirl of macaroni and cheese, and the bright freshness of strawberry‑topped yogurt, often helping in the kitchen to stir‑fry
    vegetables with garlic, olive oil, and basil while practicing precise knife skills and experimenting with simple baking projects like chocolate chip cookies.
  core: Zhao Fang is an eight‑year‑old methodical thinker who blends a quiet, puzzle‑driven curiosity with a careful, organized approach to every hobby, while quietly wrestling with worries that sharpen
    their determination.
background:
  cultural: Zhao Fang is a second‑generation Chinese‑American growing up in Rosemead, a city with a large East Asian community. At home, Mandarin (or Cantonese) is spoken alongside English, and his family
    celebrates traditional festivals such as Lunar New Year, Mid‑Autumn Festival, and the Dragon Boat Festival. He attends a Saturday Chinese language school, learning characters and cultural stories that
    reinforce his heritage. The neighborhood’s Chinese grocery stores, restaurants, and Buddhist temples provide a familiar cultural backdrop, while his parents’ emphasis on education and respect for elders
    shapes his disciplined, methodical approach to learning.
