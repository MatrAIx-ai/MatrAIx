persona_description: 'A group of writers who have released the first version of the "Definition of Free Cultural Works." The authors have identified a minimum set of freedoms which they believe should be
  granted to all users of copyrighted materials, inspired by the Free Software Definition and the ideals of the free software and open source movements. The definition lists the following core freedoms:
  freedom to use and perform the work, freedom to study the work and apply the information, freedom to redistribute copies, and freedom to distribute derivative works. The authors encourage authors to rethink
  copyright law and use one of the Free Culture Licenses to help build a genuine free and open culture. The website of the definition contains information about specific licenses and logos and buttons for
  identifying free cultural works. The website is maintained by Erik MÃ¶ller and Benjamin Mako Hill, who have experience in the field of copyright law and are well-versed in the principles of free software
  and open source movements. The website also features Angela Beesley, Mia Garlick, and Elizabeth Stark as moderators, and Richard Stallman and Lawrence Lessig as helpful feedback providers.'
