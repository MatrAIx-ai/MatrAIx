  hobbies: '[''Watercolor painting'', ''Digital photography'', ''Reading speculative fiction'', ''Philosophical discussion groups'', ''Community theater'', ''Gardening'', ''Cooking'', ''Playing bridge'',
    ''Hiking'', ''Volunteer mentorship'']'
  career_goals: Although officially retired, Raymond aims to channel his lifelong business acumen into purpose-driven projects that blend entrepreneurship with creativity. He plans to launch a small online
    boutique showcasing his own watercolor prints and vintage-inspired designs, while also offering workshops for local seniors interested in basic digital art tools. Additionally, he aspires to write and
    self-publish a memoir that interweaves his experiences in the corporate world with reflections on art, philosophy, and personal growth, hoping the book will inspire others to pursue lifelong learning.
    He also wishes to expand the inter-generational art program at the Huntington community center, securing grants to provide supplies and mentorship for youth and older adults alike.
