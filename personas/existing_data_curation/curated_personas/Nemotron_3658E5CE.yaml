  career_goals: Carmen dreams of becoming a pediatric doctor who can care for children in both English and Spanish‑speaking families. She is motivated by a desire to combine her compassion with practical
    medical knowledge, and she hopes to stay curious about new health discoveries through lifelong learning. In the short term, she aims to win her school’s science fair by designing a simple experiment
    on plant growth, and she wants to earn a badge in first aid through her local community program.
