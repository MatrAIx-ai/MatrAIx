personas:
  professional: Carmen is an aspiring comic storyteller, blending her love of graphic novels with a methodical approach, using Scratch to prototype interactive storyboards and meticulously planning each
    panel while balancing curiosity with practicality.
  sports: Carmen enjoys exploring the trails of Gifford Pinchot State Park and participates in the Harrisburg Youth Soccer Club, while cheering for the Philadelphia Eagles and the Philadelphia 76ers during
    weekends.
  arts: Carmen immerses themselves in drawing comic strips inspired by Raina Telgemeier and Stan Lee, practices beginner piano pieces by Mozart, and frequently sketches local wildlife after visits to the
    park.
  travel: Carmen delights in family weekend trips to nearby state parks like Gifford Pinchot, dreams of a summer visit to Washington, D.C.’s museums, and plans a future adventure to San Diego’s zoo after
    school breaks.
  culinary: Carmen assists with family cooking of arroz con gandules, enjoys preparing simple avocado toast for snacks, and experiments with making homemade fruit salads using fresh berries and citrus.
  core: Carmen is a curious, organized ten‑year‑old who channels their love for stories into drawing comics, methodically saves allowance for LEGO projects, and balances quiet solo pursuits with occasional
    team sports.
background:
  cultural: Carmen grows up in a bilingual household where Spanish is spoken alongside English. Her family maintains Puerto Rican traditions, celebrating holidays like Nochebuena, Three Kings Day, and holding
    weekend gatherings with music such as plena and salsa. She enjoys eating foods like mofongo, pastelón, and arroz con gandules prepared by her grandparents. While living in Reading, Pennsylvania, she
    participates in community events at the local cultural center, where she sometimes shares her heritage through school presentations. Her cultural background gives her a strong sense of identity, blending
    Caribbean familial warmth with the practical, community‑oriented values of her Pennsylvania neighborhood.
