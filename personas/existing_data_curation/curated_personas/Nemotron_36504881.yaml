  hobbies: '[''Coloring with crayons'', ''Listening to children’s music'', ''Building with wooden blocks'', ''Backyard nature exploration'', ''Library storytime'', ''Free dancing to music'']'
  career_goals: Linda dreams of growing into a creative professional who can explore ideas without strict schedules. She imagines herself as a painter who mixes bright colors, a storyteller who shares imaginative
    tales, or a nature explorer who discovers new wonders. Her ambitions focus on staying curious, flexible, and able to share her enthusiasm for art and discovery with others.
