  hobbies: '["Hiking (mapped trails in Great Smoky Mountains)","Woodworking (building functional furniture)","Reading non-fiction (psychology, sociology, science)","Playing chess (strategic competition)","Strength
    training at local gym","Guitar practice","Family BBQs and cooking"]'
  career_goals: Roderick aims to obtain his Licensed Clinical Social Worker (LCSW) credential and move into a supervisory role within a county‑wide health agency or a non‑profit serving at‑risk families.
    He wants to develop a data‑driven program that streamlines intake processes and improves outcome tracking, positioning himself as a competitive candidate for a future program director or chief operations
    officer. Long‑term, he envisions launching a consulting practice that helps social‑service organizations implement structured, evidence‑based interventions while reducing staff burnout through systematic
    stress‑management protocols.
