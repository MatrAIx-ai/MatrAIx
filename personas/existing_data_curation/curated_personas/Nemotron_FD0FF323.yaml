personas:
  professional: Roderick Mitchel is a data‑driven social services analyst who leverages his STEM background and meticulous case‑management skills to design evidence‑based intake systems, and they constantly
    push for a supervisory LCSW role that lets them streamline operations and mentor staff.
  sports: Roderick Mitchel fuels his competitive spirit with regular strength‑training sessions at a local CrossFit box, tracks his weekend hikes in the Great Smoky Mountains, and stays loyal to the Tennessee
    Titans in the fall, the Nashville Predators during hockey season, and the Nashville Sounds in the summer, and they maintain a structured yet varied approach to fitness year‑round.
  arts: Roderick Mitchel unwinds by practicing acoustic guitar with occasional renditions of Johnny Cash and Jason Isbell songs, attending community theater productions of classics like Our Town, and delving
    into non‑fiction works by Malcolm Gladwell and Daniel Kahneman, which they cite as shaping both their analytical mindset and personal narrative.
  travel: Roderick Mitchel plans trips with the same precision he applies to case management, favoring pre‑mapped itineraries that blend weekend getaways to Asheville and Charleston with longer adventures
    to Reykjavik and Costa Rica, balancing a modest travel budget with a desire for both relaxation and structured exploration, which they share with their spouse.
  culinary: Roderick Mitchel enjoys mastering Southern BBQ, perfecting a bourbon‑glazed pulled‑pork sandwich and a side of smoked collard greens while they experiment with dry‑rubbed brisket, and they often
    complement these meals with a craft beer like a local amber ale, reflecting an intermediate cooking skill set anchored in comfort cuisine.
  core: Roderick Mitchel is a data‑obsessed social services professional who channels competitive chess strategies into systematic program design, but battles chronic over‑thinking and a habit of skipping
    sleep after late‑night woodworking projects.
background:
  cultural: Roderick grew up in a middle‑class white family in the suburban‑rural communities of Rutherford County, Tennessee. Raised in a Southern Baptist environment, he absorbed the region’s emphasis
    on family, church involvement, hospitality, and a pragmatic work ethic. The local culture’s focus on reliability and community service dovetails with his preference for structure and responsibility.
    His STEM education at the University of Tennessee reinforced a scientific, data‑oriented worldview, which he now blends with the practical, hands‑on attitude characteristic of Middle Tennessee’s cultural
    landscape.
attributes:
  skills: '["Case Management","Crisis Intervention","Risk Assessment","Program Evaluation","Data Analysis (SPSS, R)","Report Writing","Community Outreach","Resource Coordination","Conflict Mediation","Regulatory
