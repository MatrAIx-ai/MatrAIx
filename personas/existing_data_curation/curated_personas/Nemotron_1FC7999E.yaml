  career_goals: Alexandra aims to transition from a full‑time analyst role to part‑time advisory work where she can mentor younger professionals and help small businesses in the Fresno area adopt data‑driven
    practices. She hopes to craft a concise guide on pragmatic analytics for community nonprofits, leaving a legacy of sustainable process improvements. Volunteering her analytical expertise with local
    economic development initiatives also aligns with her desire to blend curiosity for new methods with tangible community impact, all while preserving the flexible schedule that suits her relaxed approach
    to obligations.
