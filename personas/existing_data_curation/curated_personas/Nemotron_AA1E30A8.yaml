personas:
  professional: Juan Benitez is an aspiring soccer midfielder and imaginative LEGO architect who blends a love for structured teamwork on the field with creative storytelling in their brick builds, they
    follow a step‑by‑step plan that satisfies their practical side while still allowing enough flexibility for spontaneous design twists.
  sports: Juan Benitez plays forward for the local Little Strikers kids' soccer team, training twice a week and cheering loudly for the city's professional Red Lions while also enjoying weekend matches
    at the community field and keeping a collection of the team's colorful scarves.
  arts: Juan Benitez brings cartoons to life by sketching comic strips that feature legendary desert trickster characters, mixes these drawings with the rhythmic beats of traditional folk songs they hear
    at family gatherings, and spends afternoons constructing detailed LEGO scenes inspired by the same folk tales, often humming the same lullaby their grandparents sang.
  travel: Juan Benitez loves exploring the nearby desert wildlife reserve, where they spot lizards and learn about desert plants, has taken a family road trip to the sunny seaside town of Playa Dorada,
    and dreams of visiting the ancient stone pyramids in a neighboring country as well as the bustling market streets of Tokyo during a school cultural exchange.
  culinary: Juan Benitez enjoys making and eating simple corn‑based tacos filled with beans, cheese, and a dash of mild salsa, fashions homemade guacamole for snack time, shows a budding skill in shaping
    LEGO‑inspired vegetable sculptures, while also indulging in occasional cheese pizza slices and fresh fruit smoothies.
  core: Juan Benitez is a practical yet playful 8‑year‑old who balances structured soccer teamwork and LEGO creativity with a compassionate heart, a slightly disorganized allowance system, seasonal allergies,
    and a love for folk tunes and desert adventures.
background:
  cultural: Juan is raised in a Mexican‑American household in Nogales, Arizona, a vibrant border community where Mexican traditions blend with Southwestern U.S. culture. He grows up speaking Spanish at
    home and English at school, celebrating holidays such as Día de los Muertos, Las Posadas, and Fourth of July with family gatherings, traditional foods, and music. Family ties extend across the border,
    and visits to relatives in Mexico are a regular part of life, reinforcing his bilingual identity. He participates in local cultural events like the Nogales Festival, where community dances and mariachi
    performances highlight his dual heritage. This rich cultural environment informs his values of compassion, cooperation, and a deep sense of community responsibility.
attributes:
  skills: '["bilingual (Spanish/English)", "reading comprehension", "basic arithmetic", "tablet navigation", "team collaboration", "empathy and caregiving"]'
  hobbies: '["soccer", "LEGO building", "drawing comics", "reading adventure books", "listening to Mexican folk music", "participating in community clean‑up", "observing desert wildlife"]'
  career_goals: Although still young, Juan dreams of a future where he can help people directly. He often says he wants to become a teacher because he loves sharing knowledge, or a community firefighter
    because he wants to keep his neighborhood safe. He also imagines working as a doctor someday to care for those who are sick. Juan aspires to continue learning both languages and hopes to use his abilities
    to bridge his Mexican heritage and American community, ultimately choosing a career that supports and unites people.
