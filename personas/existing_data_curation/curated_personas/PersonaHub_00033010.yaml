  deeply concerned about the wealth gap and the growing power of special interests in Washington. The person is likely to be a business owner or entrepreneur who has struggled to bring profits and wealth
  back to the United States, and who is frustrated by the lack of incentives to invest in the American economy. The person is likely to be a regular voter who is concerned about the direction of the country
  and the role of Washington in shaping policy.
