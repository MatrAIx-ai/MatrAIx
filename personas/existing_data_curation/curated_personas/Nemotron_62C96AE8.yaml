  career_goals: Mary aims to transition into a school‑wide leadership role, such as curriculum coordinator or assistant principal, where she can champion innovative, evidence‑based teaching practices while
    maintaining practical outcomes for students. She hopes to design district‑level professional‑development programs, publish articles on blended learning in educational journals, and expand after‑school
    enrichment programs that combine her love for group activities with academic rigor. Her competitive drive fuels a desire to see measurable improvements in student achievement and teacher performance
    across her district.
