  hobbies: '[''Community theater'', ''Adult softball league'', ''Hiking in the Sonoran Desert'', ''Bird‑watching'', ''Cooking southwestern cuisine'', ''Hosting potluck gatherings'', ''Trivia nights'', ''Board
