personas:
  professional: Wyanette Carter, a budding young illustrator, channels their meticulous planning and love for intricate details into creating elaborate drawings of animals and outer‑space scenes that often
    accompany improvised story‑time adventures with stuffed friends.
  sports: Wyanette Carter delights in splashing through the community swim class, proudly dons the teal jersey of the Little River Tigers under‑6 soccer squad on Saturdays, and spends rainy afternoons constructing
    obstacle courses with LEGO bricks for home‑grown “gymnastics” practice.
  arts: Wyanette Carter finds inspiration in the vibrant illustrations of Dr. Seuss and the whimsical watercolors of Eric Carle, mimics the gentle jazz of Louis Armstrong on family playlists while coloring,
    and often reenacts scenes from Pixar’s Inside Out with stuffed animals, shaping their imaginative play.
  travel: Wyanette Carter prefers short, nature‑filled family road trips, delighting in beachcombing for shells at Cape May and leaf‑collecting hikes in the Blue Ridge Mountains, while dreaming of zooming
    off to the towering dunes of the Sahara Desert for a future adventure.
  culinary: Wyanette Carter loves the cheesy stretch of homemade mac & cheese flavored with a dash of paprika, giggles over rainbow fruit kebabs made of strawberries, grapes, and banana slices, and proudly
    mixes their own strawberry‑banana smoothies, though they firmly refuse broccoli on their plate.
  core: Wyanette Carter is a meticulously curious six‑year‑old who turns every leaf, rock, and crayon into a tiny masterpiece, yet sometimes gets sidetracked by glitter and forgets to put away their LEGO
    creations.
background:
  cultural: Wyanette is a Black child growing up in Columbus, Ohio, within a close‑knit African‑American family that values community, faith, and education. Sunday church services expose her to gospel music
    and stories of perseverance, while family gatherings celebrate traditions such as Juneteenth and storytelling about ancestors. Her parents encourage reading books by Black authors and participating
    in local library programs that highlight Black history and culture. Community events at the Columbus African Heritage Festival and neighborhood art workshops introduce her to a vibrant blend of African‑American
    art, music, and culinary traditions, shaping her appreciation for creativity and cultural pride.
attributes:
  skills: '[''Reading simple sight words'', ''Writing name and basic sentences'', ''Counting to twenty'', ''Building with LEGO bricks'', ''Solving jigsaw puzzles'', ''Using educational tablet apps'', ''Organizing
