  hobbies: '[''Drawing and coloring'', ''Reading picture books'', ''Building with LEGO bricks'', ''Collecting leaves, rocks, and shells'', ''Listening to music (children’s songs, jazz, R&B)'', ''Playing
    memory and cooperative board games'', ''Storytelling with stuffed animals'']'
  career_goals: Even at six, Wyanette loves to imagine future roles that blend creativity and discovery. She dreams of becoming an artist who paints colorful stories, a scientist who explores the outdoors
    and conducts tiny experiments, or a teacher who shares books and crafts with younger children. Her long‑term ambition is to keep learning new ideas, help friends and family, and one day create a space
    where art and curiosity meet, such as a community art‑science workshop.
