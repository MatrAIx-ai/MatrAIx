  hobbies: '["Painting and Sketching","Visiting Art Galleries","Jazz and Gospel Music Events","Community Cultural Festivals","Workshop Attendance (Art, Mindfulness)","Reading (Fiction & Psychology)","Journaling","Gardening
    (Herbs & Vegetables)","Hosting Small Gatherings","Board Games (e.g., Scrabble)","Volunteering at Library Story‑time","Exploring New Culinary Recipes"]'
  career_goals: Jocelyn aims to advance from her current childcare worker role to a lead early‑learning teacher and ultimately to a center director position. She plans to complete her bachelor's degree
    in Early Childhood Education, obtaining her state teaching credential within the next three years. Leveraging her love of art, she aspires to develop an innovative, art‑centric curriculum that integrates
    visual arts, music, and storytelling into daily routines, especially for under‑served communities in Savannah. In the longer term, she dreams of founding a community‑based nonprofit that offers affordable
    after‑school art workshops and mindfulness sessions for children and their families, creating safe, creative spaces that also address stress and emotional wellbeing. Jocelyn is also interested in mentorship,
    hoping to guide new childcare staff in adaptive classroom management and to advocate for policies that improve worker support and child safety.
