personas:
  professional: Jocelyn Ulysse is a dedicated early‑childhood educator who leverages their art‑centric approach, strong observational skills, and flexible, improvisational mindset to design creative lesson
    plans and lead a small team while navigating the occasional disorganization that comes with a busy childcare schedule, and they apply a healthy dose of skepticism to parent communication to ensure clarity.
  sports: Jocelyn Ulysse enjoys low‑impact fitness like morning walks through Savannah’s historic squares, occasional community yoga classes, and cheering on the Savannah Bananas baseball team, but competitive
    drive leads them to join the local adult pick‑up basketball league whenever schedule permits.
  arts: Jocelyn Ulysse immerses themselves in the visual arts by painting and sketching in a sunlit studio, and they attend weekly jazz sessions at The Jinx and gospel concerts at a historic downtown church,
    drawing inspiration from Georgia O’Keeffe and contemporary street muralist Maya Hayuk.
  travel: Jocelyn Ulysse favors culturally rich trips, planning weekend getaways to Charleston’s historic waterfront, day trips to the Savannah Riverboat tours, and dreaming of a future art‑focused pilgrimage
    to Florence, Italy, while balancing travel costs with a modest budget and family responsibilities.
  culinary: Jocelyn Ulysse delights in farm‑to‑table cooking, often preparing herb‑infused shrimp and grits with fresh basil, thyme, and garden‑grown collard greens, yet they sometimes indulge in late‑night
    takeout tacos when a busy schedule interrupts their meal prep routine.
  core: Jocelyn Ulysse blends a curiosity for art and child development with a competitive streak, flexible work style, and a tendency to worry, and they craft a life where creative expression and community
    service coexist amid occasional disorganization.
background:
  cultural: Jocelyn was raised in a tight‑knit African‑American family in Savannah, Georgia, where the legacy of the Gullah‑Geechee culture and Southern Black traditions informs her daily life. Family gatherings
    often revolve around soulful gospel music, hearty Southern cooking, and storytelling that preserves the community’s history. She attended a historically Black Baptist church, which continues to be a
    cornerstone of her spiritual and social support network. Growing up, she participated in local Juneteenth celebrations, community barbecues, and the Savannah African American Music Festival, experiences
    that deepened her appreciation for Black artistic expression. These cultural roots have shaped her values of resilience, communal responsibility, and a strong sense of identity, which she brings to
    her work with children, emphasizing cultural inclusivity and pride.
