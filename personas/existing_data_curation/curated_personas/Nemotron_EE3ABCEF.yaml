  career_goals: Sadi aims to transition into a district‑wide curriculum specialist role where she can formalize her arts‑integrated teaching framework. She hopes to author a series of children's books that
    blend imaginative narratives with foundational academic concepts. Over the next five years, she plans to lead workshops on abstract thinking in early education, develop a community art outreach program
    for underserved youth, and eventually retire while continuing to volunteer as a mentor and part‑time art instructor.
