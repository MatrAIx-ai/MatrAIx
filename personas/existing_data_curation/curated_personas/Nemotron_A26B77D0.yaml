  career_goals: She dreams of a future where she can blend her love for art and caring for others, envisioning herself as a children’s book illustrator who brings stories to life, a teacher who nurtures
    creativity in her classroom, or a veterinarian who helps animals stay healthy. Stephanie also hopes to organize community art projects that bring neighbors together and celebrate shared experiences.
