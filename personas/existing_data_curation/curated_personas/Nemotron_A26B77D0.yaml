personas:
  professional: Stephanie Lecompte, a budding watercolor illustrator, blends a curious eye for detail with the methodical planning she uses when building LEGO creations, turning school art club assignments
    into meticulously executed animal sketches that reflect her love of unconventional ideas.
  sports: Stephanie Lecompte is a member of the Green Meadow Little League Soccer team, where she practices dribbling and teamwork each Saturday, and on weekends she cheers for the Los Angeles Lakers, the
    Seattle Seahawks, and the New York Yankees on TV, using the athletes’ discipline as inspiration for her own art projects.
  arts: Stephanie Lecompte immerses herself in the whimsical worlds of Dr. Seuss, the dreamy pastel landscapes of Claude Monet, and the playful sculptures of Yayoi Kusama, while also enjoying Disney animated
    classics, which together shape her vibrant watercolor style and fuel her creative storytelling during storytime at the local library.
  travel: Stephanie Lecompte loves family outings to the nearby botanical garden, weekend trips to the coastal tide pools of Santa Cruz, and the annual pilgrimage to Washington, D.C.’s National Air and
    Space Museum, balancing her curiosity for nature with a preference for short, well‑planned trips that leave room for drawing sessions along the way.
  culinary: Stephanie Lecompte delights in crafting peanut‑butter‑banana sandwiches, slurping cheesy macaroni, savoring strawberry‑yogurt parfaits, and nibbling crunchy carrot sticks, often adding a sprinkle
    of cinnamon to her smoothies and insisting on stirring her own bowl of soup with a trusty wooden spoon.
  core: Stephanie Lecompte is a meticulous, curious seven‑year‑old who blends art, organized savings, and a love of nature into a vibrant, slightly sticker‑obsessed personality.
background:
  cultural: Stephanie’s cultural background reflects a Mid‑Atlantic American suburban environment in Westminster, Maryland. Her family celebrates typical national holidays such as Thanksgiving and Christmas
    and participates in community events like the Carroll County Fair and local library story hours. The Lecompte family also carries a touch of French‑Canadian heritage, sharing occasional recipes and
    traditions passed down through generations. The community places a strong emphasis on kindness, cooperation, and respect for diversity, fostering an inclusive atmosphere that encourages curiosity and
    artistic expression.
