personas:
  professional: James Moore, a seasoned licensed electrician with two decades of hands‑on experience, they leverage their methodical approach, deep code knowledge, and emerging solar expertise to lead complex
    residential and commercial projects while mentoring apprentices and meticulously planning each job.
  sports: James Moore, an avid outdoor enthusiast from the Inland Empire, they are a dedicated fan of the Los Angeles Dodgers and Rams, regularly hike the San Bernardino trails with a V‑stripe Patagonia
    pack, and belong to a local weekend cycling club that meets for rides on the Pacific Crest Trail corridor.
  arts: James Moore, a hands‑on creative, they regularly study Ansel Adams’ black‑and‑white landscapes for wildlife photography, enjoy classic rock legends like The Rolling Stones and Fleetwood Mac while
    working in their garage, and attend the Riverside Community Theater’s monthly productions to unwind after a long workweek.
  travel: James Moore, a weekend adventurer, they favor short road trips to destinations like Yosemite, Lake Tahoe, and the Grand Canyon, meticulously plan routes with scenic byways on Google Maps, and
    dream of a future overseas tour of Japan’s automotive museums and craft breweries.
  culinary: James Moore, a DIY brewer and grill master, they savor home‑brewed IPA paired with smoked brisket, experiment with classic German pretzel recipes, regularly prepare rosemary‑infused roasted
    lamb, and often incorporate fresh citrus from the local farmers’ market into their craft beer cocktails.
  core: James Moore, a methodical electrician‑entrepreneur who balances meticulous safety standards with a hands‑on love for classic cars, solar projects, and home‑brewed beer, all while juggling a modest
    budget, chronic back strain, and a quiet, solitary lifestyle.
background:
  cultural: James grew up in a working‑class family on the outskirts of Southern California’s Inland Empire. His parents emphasized hard work, self‑reliance, and practical skills, values that shaped his
    career path as an electrician. While his ethnic background is White, he has been immersed in the culturally diverse environment of Riverside County, where interactions with Hispanic, Asian, and other
    communities have broadened his perspective on community collaboration. He maintains a modest, middle‑American outlook, valuing family stability, local community ties, and a respect for both tradition
    and the steady influx of new ideas that characterize the region.
attributes:
  skills: '["Residential wiring", "Commercial electrical installations", "Solar panel system design and installation", "Electrical code interpretation (NEC, California Electrical Code)", "Motor control
    and automation", "Low‑voltage and data cabling", "Blueprint and schematic reading", "Conduit bending and raceway installation", "Electrical safety inspections and OSHA compliance", "Project planning
    and budgeting", "Apprentice mentorship"]'
  hobbies: '["Classic car restoration", "Woodworking", "Hiking and wildlife photography", "Community mentoring in electrical safety", "DIY solar charger projects", "Home brewing"]'
  career_goals: Looking ahead, James aims to achieve master electrician status and obtain a certified electrical contractor license so he can launch his own small‑scale contracting firm focused on energy‑efficient
    retrofits and solar installations for homeowners in Riverside County. He is pursuing LEED Green Associate certification to deepen his expertise in sustainable building practices. Over the next five
    years, he hopes to become a foreman or site supervisor, where he can lead a crew, implement rigorous safety protocols, and mentor the next generation of tradespeople. Ultimately, his ambition is to
    build a financially stable business that provides reliable service to his community while allowing more time for family and his personal projects.
