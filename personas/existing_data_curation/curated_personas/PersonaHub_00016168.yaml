persona_description: A manager or researcher with the Maryland Department of Natural Resources (DNR) who is responsible for monitoring and assessing the health of the Chesapeake Bay. They are interested
  in collecting around-the-clock data on shallow water habitats and ecosystem processes to better understand the long-term impacts of best management practices. They are looking for a monitoring system
  that can gather water samples and provide real-time data on water quality criteria set by the Chesapeake Bay Program. They are interested in the YSI 6600 Multi-Parameter Water Quality Sonde, which is
  equipped with cellular telemetry and can log data every 15 minutes, and the NexSens 3100-MAST Wireless Telemetry Systems, which are powered by solar panels and equipped with cellular telemetry for broadcasting
  sensor readings.
