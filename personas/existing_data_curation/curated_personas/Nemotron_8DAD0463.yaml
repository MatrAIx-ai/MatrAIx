  career_goals: Maria aims to move into a district curriculum specialist role, where she can lead the development of a standardized bilingual program and shape instructional policies. Over the next five
    years she plans to author a culturally relevant Spanish language textbook and secure a mentorship position that allows her to guide new teachers while maintaining her structured approach. As she approaches
    retirement, she hopes to transition to part‑time consultancy work that lets her work independently, continue influencing educational practice, and achieve recognition through district awards for her
    contributions.
