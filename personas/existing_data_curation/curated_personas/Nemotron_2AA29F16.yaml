personas:
  professional: Karla Miller is a budding block-builder who treats a pile of wooden LEGO bricks like a construction site, using an early love for organization and flexibility to create tidy, imaginative
    structures while quietly narrating each step to an attentive audience of stuffed animals.
  sports: Karla Miller loves the rhythm of toddler soccer at the Chehalis Community Center’s Little Kick‑Stars club, enjoys splash‑time at the nearby YMCA’s toddlers swimming pool, and proudly wears a Seattle
    Mariners cap while cheering on the baseball season, embodying a gentle, nature‑inspired approach to staying active with short, playful bursts of exercise.
  arts: Karla Miller delights in finger‑painting bright swirls inspired by the bold colors of Van Gogh’s Starry Night on preschool walls, sings along enthusiastically to The Wiggles and Raffi’s Baby Beluga,
    and watches the whimsical adventures of Pixar’s Toy Story, letting these creative moments nurture a quiet, inquisitive artistic spirit.
  travel: Karla Miller embarks on family road trips with a backpack of plush companions, loves the salty breeze of the Oregon Coast’s Cannon Beach where they collect smooth shells, has delighted in a weekend
    visit to Seattle’s Space Needle and the interactive Seattle Children’s Museum, and daydreams about exploring the magic of Disneyland in California, showing a penchant for short, sensory‑rich excursions
    guided by parents.
  culinary: Karla Miller eagerly devours fluffy blueberry pancakes drizzled with maple syrup, chomps on creamy mac and cheese with extra cheddar, helps stir batter with a tiny wooden spoon, and refuses
    peas while insisting on crunchy apple slices, reflecting a simple yet enthusiastic palate anchored by familiar comfort foods.
  core: Karla Miller is a quietly curious three‑year‑old who balances gentle imagination with tidy habits, finds joy in nature‑filled play, loves simple savings rituals, and nurtures a budding love for
    art and community through playful, well‑guided routines.
background:
  cultural: Karla comes from a white, American background rooted in the Pacific Northwest. Her family lives in Chehalis, Washington, a close‑knit community in Lewis County where outdoor activities and seasonal
    fairs are integral to daily life. They celebrate mainstream American holidays while also embracing regional traditions such as berry picking, forest hikes, and attending the annual Chehalis Wooden Shoe
    Festival. The local culture emphasizes respect for nature, cooperation, and modest community gatherings, reinforcing Karla's reserved yet kind demeanor and her appreciation for small‑group interactions.
