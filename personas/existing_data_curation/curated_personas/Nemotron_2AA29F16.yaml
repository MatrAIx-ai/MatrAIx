  career_goals: Even at three, Karla dreams about future roles that reflect her love of creativity and caring nature. She often mentions wanting to become an artist who paints colorful pictures, a teacher
    who reads stories to small groups of friends, or a gentle caregiver for animals like a veterinarian. Her ambitions are shaped by a desire to explore new ideas, help others, and express herself through
    art, hinting at a future path centered on imagination, education, and kindness.
