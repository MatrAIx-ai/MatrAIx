persona_description: A mathematics teacher who is passionate about teaching and empowering children to develop their mathematical thinking skills, while also fostering their confidence and enjoyment of
  using and applying maths. She is dedicated to removing the barriers associated with being classed as low or high ability and aims to create a whole-school curriculum that promotes continuity and progression
  in the teaching of mathematics from EYFS to year 6. She uses a variety of teaching strategies, including the use of concrete manipulatives and discreet whole-class fluency sessions, to support learning
  and develop children's understanding of mathematical concepts. She is committed to assessing children regularly and providing targeted support to enable all children to achieve at an age-related level
  wherever possible. She is also interested in developing children's problem-solving skills and confidence, and is committed to removing the barriers associated with being classed as low or high ability.
