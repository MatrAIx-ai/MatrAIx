personas:
  professional: Mario Loza is a seasoned dentist who melds over twenty years of comprehensive general dentistry, digital CAD/CAM workflow, and bilingual patient communication with a competitive, pragmatic
    mindset that embraces new technologies while allowing for a relaxed, flexible practice organization.
  sports: Mario Loza fuels his competitive streak by playing beach volleyball with the Coral Springs Beach Volleyball Club, joining weekend outings at the Coral Springs Golf Society where he chases low
    scores, and cheering on the Miami Heat and the Liga MX side Club America, blending group camaraderie with a personal drive to improve.
  arts: Mario Loza expresses his love for rhythm through salsa dancing at the local Latin dance studio and curates a vintage vinyl collection featuring Celia Cruz, Tito Puente, The Beatles, and David Bowie,
    regularly attending live performances at the Coral Springs Cultural Center, merging his social nature with a nostalgic appreciation for classic sounds.
  travel: Mario Loza prefers a travel style that mixes careful planning for family trips to culturally rich destinations such as Oaxaca's culinary festivals and Barcelona's historic neighborhoods with spontaneous
    weekend getaways to nearby Caribbean islands like the Bahamas, balancing his desire for relaxation with his competitive curiosity about new experiences.
  culinary: Mario Loza showcases his culinary skill by hand-making tamales, simmering complex mole sauces with chile de árbol and chocolate, crafting fresh salsas from tomatoes, jalapeños, and cilantro,
    and occasionally grilling local seafood, using his backyard patio garden's herbs to flavor each dish while delighting friends and family at weekly gatherings.
  core: Mario Loza balances a meticulous, technology-driven dental practice with a sociable, competitive lifestyle, all while wrestling with a perpetual worry that fuels both his drive and his occasional
    disorganization.
background:
  cultural: Born to Mexican immigrant parents, Mario grew up in a bilingual household where Spanish was spoken at home and English at school. His upbringing emphasized family loyalty, respect for elders,
    and community celebration of traditions such as Día de los Muertos, Christmas posadas, and weekly family meals featuring regional dishes from Veracruz and Oaxaca. As a devout Catholic, he participates
    in church festivities and values the service‑oriented spirit of his faith. Relocating to Florida, he has blended his Mexican heritage with the multicultural atmosphere of Coral Springs, maintaining
    strong ties to local Mexican‑American organizations and using his cultural fluency to connect with the growing Hispanic patient base in Broward County. These roots shape his hospitality, his preference
    for cooking and sharing food, and his commitment to providing culturally competent dental care.
attributes:
  skills: '[''General Dental Examinations'', ''Endodontic Therapy'', ''Periodontal Assessment and Treatment'', ''Digital Radiography and Cone‑Beam CT'', ''CAD/CAM Restorative Dentistry'', ''Dental Implant
