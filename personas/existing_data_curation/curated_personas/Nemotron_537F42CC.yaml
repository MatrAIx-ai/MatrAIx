personas:
  professional: Antanas Hayes is a retired farmer‑handyman whose decades of small‑engine repair, carpentry, and volunteer fire service reveal that they approach each task with meticulous planning and a
    quiet confidence.
  sports: Antanas Hayes enjoys low‑impact fitness through early‑morning walks along the lake, occasional senior‑league bowling at the Underwood Community Center, and fervently follows the Minnesota Vikings
    and Twins while they keep a modest foot‑care routine aimed at maintaining mobility for gardening.
  arts: Antanas Hayes finds solace in classic jazz by Miles Davis and comforting folk ballads from Woody Guthrie while they spend quiet evenings flipping through vintage National Geographic, attending occasional
    productions by the local community theater, and preserving a carefully curated collection of 78‑rpm records that echo the rhythms of their rural upbringing.
  travel: Antanas Hayes prefers methodical road‑trips on his sturdy Midwestern sedan to nearby destinations like the Boundary Waters, historic Duluth, and occasional pilgrimages to the Baltic coasts for
    Saint Jonas celebrations, meticulously planning each itinerary with paper maps and a modest travel budget while they avoid crowded tourist hubs.
  culinary: Antanas Hayes favors hearty, home‑cooked meals such as baked pork chops with apples, fresh lake‑caught fish seasoned with dill, bright beetroot salad, and the occasional kūčios prepared for
    holiday celebrations, and they cook with a modest but capable skill set that mixes a reliable cast‑iron skillet and an old family recipe notebook.
  core: Antanas Hayes is a quietly disciplined elder who weaves self‑reliance, meticulous record‑keeping, and a love of solitary nature into a life of modest frugality, steady tradition, and understated
    humor, and they rarely miss a chance to tend their garden at sunrise.
background:
  cultural: Antanas is a second-generation Lithuanian-American whose grandparents emigrated to Minnesota in the early 20th century. Raised in Underwood, he grew up with a blend of Lithuanian Catholic traditions—such
    as observing Saint Jonas and preparing kūčios for holidays—and the broader Midwestern values of modesty, self-reliance, and community cooperation. The rural Minnesota setting fostered a deep appreciation
    for the land, seasonal cycles, and neighborly assistance, shaping his practical outlook and quiet, structured lifestyle.
