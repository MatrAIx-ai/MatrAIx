  career_goals: Although retired, Antanas aims to stay self-sufficient and mentally active. He plans to complete a written memoir of his family's immigration story, organize his genealogical records for
    future generations, and continue mentoring his grandchildren on practical skills. He also hopes to volunteer occasionally with the local historical society and the fire department, contributing his
    organizational expertise while preserving his independence and health.
