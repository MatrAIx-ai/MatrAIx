  hobbies: '[''cooking Puerto Rican cuisine'', ''gardening'', ''reading historical fiction and poetry'', ''small book club participation'', ''yoga and meditation'', ''solo hiking'', ''volunteering at community
    health fairs'']'
  career_goals: Beatriz aims to advance into a Nurse Manager or Clinical Nurse Educator role within the next five years, leveraging her bilingual skills to develop training programs that address health
    disparities in the Hispanic community. She plans to complete her Bachelor of Science in Nursing (BSN) and eventually pursue a Master of Science in Nursing (MSN) with a focus on geriatric care or case
    management. Long‑term, she envisions establishing a community health outreach clinic that provides preventive care and health education for Puerto Rican families in the Dallas‑Fort Worth area, while
    maintaining a balanced workload that supports her family life and personal well‑being.
