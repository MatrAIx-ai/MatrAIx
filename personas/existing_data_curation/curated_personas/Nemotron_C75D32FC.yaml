  career_goals: Eriberto aims to become a full‑stack engineering lead who can guide small, tightly coordinated teams to create technology solutions that benefit his community. He plans to earn professional
    certifications such as AWS Solutions Architect and Certified Scrum Master, and later complete a bachelor’s degree in Computer Science to bolster his credentials. In the longer term, he dreams of launching
    a platform that connects low‑income families in Southern California with resources for education, health, and employment, merging his technical expertise with his deep desire to help others and foster
    social harmony.
