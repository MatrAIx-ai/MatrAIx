personas:
  professional: Eriberto Lopes, a full‑stack web developer proficient in React, Node.js, and SQL/NoSQL, translates technical concepts between English and Spanish while leading small Agile teams, blending
    his methodical approach with a compassionate mentoring style that keeps codebases tidy and teammates motivated.
  sports: Eriberto Lopes, an avid surfer who catches early morning swells at Long Beach and occasionally joins a local beach‑volleyball meetup, supports the Los Angeles Dodgers and LA Galaxy, and plays
    pickup basketball on weekends, balancing his love for solo wave riding with brief team‑sport bursts while preferring the intimacy of small‑group activities.
  arts: Eriberto Lopes, a quiet acoustic guitarist who strums mellow folk tunes reminiscent of the Avett Brothers and José González, enjoys evenings listening to indie singer‑songwriter Phoebe Bridgers
    and reading science‑fiction works by N. K. Jemisin and Octavia Butler, using these artistic escapes to decompress from coding stress.
  travel: Eriberto Lopes, a budget‑conscious traveler who plans trips with a minimalist checklist, prefers week‑long surf retreats to Santa Catalina and spontaneous road trips along the Pacific Coast Highway,
    while dreaming of exploring the historic streets of Oaxaca and the tech hubs of Berlin, yet often postpones travel due to lingering worries about finances.
  culinary: Eriberto Lopes, a self‑taught home cook who meticulously prepares tacos al pastor using pork marinated in achiote paste, pineapple, and guajillo chilies, and carefully folds steaming tamales
    stuffed with masa, pork, and pepper‑seed sauce, often sharing these meals with a tight circle of friends in his modest apartment kitchen.
  core: Eriberto Lopes blends a methodical tech mindset with a compassionate heart, managing anxiety through meditation while occasionally losing track of bills, and finds solace in surf, guitar, and spicy
    homemade tacos.
background:
  cultural: Eriberto grew up in a Mexican‑American household in Long Beach, immersed in both Mexican traditions and Southern Californian culture. He is fluent in Spanish and English, and his family celebrates
    Día de los Muertos, Cinco de Mayo, and the Christmas posada with food, music, and community gatherings. The vibrant local Mexican community influences his values of family cohesion, hospitality, and
    mutual support. While he respects Catholic customs, he also embraces the diverse, multicultural environment of Los Angeles County, which shapes his inclusive outlook and motivates him to create technology
    that bridges cultural and socioeconomic gaps.
