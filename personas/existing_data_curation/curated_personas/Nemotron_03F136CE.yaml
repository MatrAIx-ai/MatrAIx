personas:
  professional: David Cole is an aspiring automotive technician and budding computer networking enthusiast, they blend practical mechanical skill with the strategic, quick-thinking mindset honed in competitive
    multiplayer video games, aiming to launch a small auto-repair shop that also offers IT support.
  sports: David Cole hits the local park for fast-paced pickup basketball on Saturdays, rooting for the Los Angeles Lakers and following the college basketball season of the UNC Tar Heels, while also joining
    a weekend amateur soccer league with the Metro Strikers club.
  arts: David Cole unwinds by listening to Kendrick Lamar's lyrical flow and the synth-driven soundtracks of the game Halo, they also appreciate the street-art stylings of Banksy and catch indie films like
    Parasite, which together shape their creative outlook.
  travel: David Cole prefers low-key road trips and weekend hikes, having trekked the Great Smoky Mountains and road-tripping to Detroit's auto show, while dreaming of an overseas journey to Japan's countryside
    to experience both its precise car culture and tranquil onsen retreats.
  culinary: David Cole is a modest home-chef who loves grilling garlic-marinated steak and tossing a cheesy, four-cheese mac and cheese with a dash of hot sauce, they frequently snack on classic pepperoni
    pizza while exploring new flavors like ramen broth.
  core: David Cole is a 19-year-old pragmatic tinkerer with a competitive gaming streak, a knack for hands-on repairs, and a habit of over-thinking the future while still chasing the next high-score.
background:
  cultural: David was raised in a middle‑class white family in Valparaiso, Indiana, where Midwestern values of self‑reliance, modesty, and community involvement are prominent. His upbringing included attending
    a local Protestant church and participating in county fairs and high‑school sports events. The region's strong emphasis on practicality and hard work shaped his pragmatic outlook, while the close‑knit
    community fostered his appreciation for both collaborative and independent pursuits.
attributes:
