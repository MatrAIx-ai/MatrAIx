  career_goals: David aims to enroll in a community college program focused on automotive technology or computer networking, seeking an apprenticeship that blends his mechanical aptitude with his tech interests.
    His long‑term ambition is to launch his own small auto‑repair shop or IT support service, providing a stable income that mitigates his stress about the future. He also hopes to stay connected to the
    competitive gaming scene, possibly as a part‑time streamer or content creator once his primary business is established.
