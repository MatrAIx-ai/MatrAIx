  career_goals: Asim aims to transition into a tech‑lead or software‑architect role where he can shape product strategy toward inclusive, community‑focused technology. He envisions spearheading initiatives
    that bridge tech innovation with social impact—such as building platforms for mental‑health support or creating accessible coding education programs for underrepresented youth in the Alexandria/D.C.
    area. He also aspires to become a recognized speaker at tech conferences, sharing insights on blending curiosity with practical engineering, and to mentor the next generation of diverse developers while
    preserving flexibility and work‑life balance.
