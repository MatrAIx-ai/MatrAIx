  hobbies: '["Gardening","Cooking (soul food with local produce)","Hiking and lakeside walks","Fishing","Reading mystery and historical fiction","Listening to R&B and soul music","Church choir participation","Volunteer
    health‑wellness workshops","Knitting","DIY home improvement projects"]'
  career_goals: Shari aims to transition from LPN to registered nurse by completing an RN‑to‑BSN program within the next three years, leveraging online coursework to accommodate her family responsibilities.
    She is drawn to geriatric and community health nursing, hoping to become a charge nurse at her local clinic and eventually design a preventive‑care outreach program for older adults in Mackinac County.
    Long‑term, she envisions a role as a part‑time nursing educator or mentor, sharing practical insights with new LPNs while advocating for culturally responsive care in rural health settings. Throughout
    her career progression, Shari prioritizes flexibility, seeking positions that allow a balance between professional growth and quality family time.
