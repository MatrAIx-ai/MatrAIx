personas:
  professional: Shari Otiji is a licensed practical nurse in a fast‑paced rural clinic who blends meticulous patient assessment with a curiosity‑driven adoption of telehealth triage and fall‑prevention
    protocols, while they maintain a relaxed approach to scheduling that lets them prioritize family time and adapt quickly to shifting unit demands.
  sports: Shari Otiji enjoys weekend hikes along the Lake Huron shoreline with the Lake Huron Trail Club, follows the Detroit Lions and Detroit Red Wings, joins a local adult softball league for casual
    play, and their inconsistent yoga practice reflects a relaxed approach to fitness that balances occasional fishing trips with a love of fresh air.
  arts: Shari Otiji channels soulful R&B vibes from artists like Alicia Keys and Leon Bridges while singing in the church choir, loses themselves in contemporary mystery novels by Tana French and historical
    fiction by Kate Morton, and finds quiet creativity in knitting projects inspired by folk designs, all of which shape their relaxed yet curious artistic palate.
  travel: Shari Otiji prefers low‑key road trips that blend nature and heritage, having explored Mackinac Island’s historic forts, camped in the Upper Peninsula’s Porcupine Mountains, and dreaming of a
    breezy coastal getaway in Maine while balancing travel plans with family responsibilities and a flexible budget.
  culinary: Shari Otiji cooks hearty meals that fuse soul‑food comfort—like collard greens simmered with smoked turkey, kale‑bean soup, and sweet‑potato latkes—using fresh Michigan potatoes, beans, and
    kale from their garden, showcasing a modest but confident cooking skill that leans on simple seasoning like smoked paprika, garlic, and fresh thyme.
  core: Shari Otiji balances a practical, curiosity‑driven nursing career with a laid‑back love of gardening, soulful music, and flexible family‑first planning, often juggling organization challenges with
    a warm, community‑focused spirit.
background:
  cultural: Shari identifies as African American and draws strength from her family’s traditions of resilience, faith, and communal support. Growing up in a more urban environment before moving to rural
    Michigan, she brings the richness of Black cultural heritage—celebrations of music, storytelling, and soulful cuisine—into her everyday life. In Rudyard, she blends this heritage with the close‑knit,
    nature‑oriented values of Mackinac County, fostering connections across diverse community members. Her cultural background informs her nursing practice, shaping a patient‑centered approach that honors
    both cultural identity and the unique needs of a predominantly white, rural population.
attributes:
  skills: '["Patient assessment","Medication administration","Wound care","IV therapy","Health education and chronic disease management","Electronic medical records (EMR) proficiency","Telehealth triage
