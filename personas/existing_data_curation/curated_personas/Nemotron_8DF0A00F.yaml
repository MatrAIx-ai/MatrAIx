personas:
  professional: Susie Pennington, a retired administrative specialist with three decades of budgeting and event coordination experience, now channels her methodical curiosity into volunteer leadership at
    the local historical society, hands‑on cooking and quilting workshops, and mentoring high school students, exemplifying her organized, reliable nature.
  sports: Susie Pennington enjoys gentle morning walks, weekly yoga sessions, and cheering on the Memphis Grizzlies and the Tennessee Titans, while occasionally joining a senior softball league at the community
    center, embodying her steady, community‑oriented fitness routine.
  arts: Susie Pennington regularly attends live blues at B.B. King’s Blues Club, treasures the gospel harmonies of local choirs, and finds inspiration in the quilts of Faith Ringgold, all of which shape
    her creative spirit and love for storytelling through music and textiles.
  travel: Susie Pennington favors relaxed, culturally rich road trips, having explored the historic blues trail in Clarksdale and the culinary delights of New Orleans, while dreaming of a spring visit to
    Savannah’s historic squares and a future pilgrimage to the civil‑rights landmarks of Montgomery.
  culinary: Susie Pennington’s kitchen is a haven for soulful Southern cooking, where she perfects fried catfish, collard greens simmered with smoked turkey, and sweet potato pie, using fresh garden okra,
    hot sauce, and a pinch of smoked paprika to infuse each dish with love.
  core: Susie Pennington blends pragmatic organization with a deep love for Memphis’s musical and culinary heritage, turning every garden, quilt, and community event into a testament to her caring, steady
    spirit and occasional overwatering habit.
background:
  cultural: Susie is an African‑American resident of Memphis who grew up immersed in the city’s rich musical legacy, church community, and Southern culinary traditions. She celebrates cultural events such
    as the Memphis Music Festival, Juneteenth, and local gospel gatherings, and maintains strong ties to her extended family and local African‑American churches. Her upbringing emphasized communal harmony,
    storytelling, and preservation of heritage, which continue to shape her volunteer activities, cooking, and appreciation for the arts.
