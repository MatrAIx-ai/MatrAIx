  hobbies: '[''gardening'', ''blues music'', ''reading biographies'', ''quilting'', ''southern cooking'', ''choir singing'', ''volunteering at food pantry'', ''historical site tours'', ''walking'', ''yoga'']'
  career_goals: Although retired, Susie aims to stay active by expanding her volunteer work at the local historical society, leading workshops on traditional cooking and quilting, and mentoring high school
    students interested in community service. She also plans to learn digital photography to document neighborhood stories and to maintain her health through regular walking and yoga practice. Her long‑term
    ambition is to preserve and share Memphis’s cultural heritage with younger generations.
