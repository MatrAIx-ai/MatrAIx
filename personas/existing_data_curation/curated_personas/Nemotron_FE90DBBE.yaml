personas:
  professional: Marietta Nettles, an aspiring museum studies graduate, leverages their research acumen in visual culture, meticulous organization, and empathic communication to curate community‑focused
    exhibitions that celebrate Southern artistic narratives through contemporary lenses.
  sports: Marietta Nettles, a dedicated participant in Charlotte’s community yoga studio and occasional intramural volleyball player, follows the Charlotte Hornets and passionately supports the Carolina
    Panthers, while maintaining a balanced fitness routine that includes early morning runs along the Little River and weekend bike rides in Freedom Park.
  arts: Marietta Nettles, an avid explorer of street art and contemporary visual culture, frequents the gallery openings at the Mint Museum, draws inspiration from artists like Kara Walker and Kehinde Wiley,
    and curates Instagram reels featuring the soulful sounds of Erykah Badu, Kamasi Washington, and Miles Davis while also penning poems in local spoken‑word circles.
  travel: Marietta Nettles, a methodical planner who prefers curated itineraries over spontaneous trips, enjoys weekend getaways to Asheville’s artist colonies and has already explored New Orleans for its
    jazz heritage, while dreaming of a cultural immersion in Lisbon’s tile‑laden neighborhoods and a future road trip along the historic Natchez Trace.
  culinary: Marietta Nettles, a home cook who blends traditional Southern flavors with modern twists, delights in preparing shrimp and grits with a splash of smoked paprika, sweet‑potato collard‑green samosas,
    and buttermilk‑marinated fried chicken that they serve alongside homemade hot sauce and fresh okra, honing their skills through weekly cooking sessions with friends.
  core: Marietta Nettles, a curious and organized 21‑year‑old, balances a passion for community‑centered art curation with disciplined saving habits, mindful health routines, and a love for soulful music,
    all while navigating the quirks of occasional procrastination and a penchant for late‑night street photography.
background:
  cultural: Marietta's cultural background is rooted in the African-American experience of the American South. Growing up in Charlotte's historically Black neighborhoods, she was raised by parents who emphasized
    education, church fellowship, and the rich musical and artistic traditions of their ancestors. Family stories of the Great Migration and Southern resilience have shaped her identity and her appreciation
    for community solidarity. She regularly participates in local cultural festivals, church choir events, and regional art initiatives that celebrate Black heritage, and she draws inspiration from these
    traditions in both her personal and artistic pursuits.
