    cuisine", "Volunteering at community art programs", "Exploring coffee shops"]'
  career_goals: Marietta aims to complete a bachelor's degree in Museum Studies or Cultural Management, building on her current associate-level coursework. She envisions a career that merges her love for
    art with community empowerment, such as a curator or program coordinator for a local cultural center that highlights under-represented Black artists. In the medium term, she plans to secure a museum
    internship in Charlotte or Atlanta, develop a professional network within the arts sector, and later lead small-scale exhibitions or educational workshops. Ultimately, she dreams of establishing a community
    art space where youth can explore creativity in a supportive, inclusive environment while also pursuing freelance digital content creation that showcases African-American visual narratives.
