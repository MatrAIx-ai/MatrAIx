  career_goals: Colby dreams of becoming a creator of imaginative worlds—whether as an author of fantasy books, an animator, or a video‑game designer. He hopes to one day develop his own interactive stories
    that blend art and technology. In the near term, he aims to improve his drawing skills, write longer stories for school projects, and learn more advanced coding concepts so he can build his own games.
