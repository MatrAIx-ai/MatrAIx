personas:
  professional: Colby Wong, a budding young storyteller-architect, spends afternoons sketching elaborate fantastical creatures, drafting LEGO-inspired city plans, and weaving short adventure tales, showcasing
    impressive spatial imagination and narrative flair while often abandoning projects halfway due to a natural aversion to rigid schedules.
  sports: Colby Wong, a 9‑year‑old who thrives in solo physical challenges, practices junior rock climbing at the community gym’s kids wall, hikes the local nature trail every weekend, and joins the town’s
    Saturday youth soccer match for the River City Cubs, where they display fierce competitiveness while preferring the quiet focus of climbing over team drills.
  arts: Colby Wong immerses themselves in creative expression, filling sketchbooks with hybrid dragons inspired by James Gurney's illustrations, reading the fantastical worlds of J.K. Rowling and N.K. Jemisin,
    listening to the soothing piano scores of Joe Hisaishi and the ambient Minecraft soundtrack while building LEGO masterpieces, and idolizing the whimsical animations of Hayao Miyazaki.
  travel: Colby Wong loves quiet adventure, taking weekend trips to the nearby Redwood State Park to study leaf patterns, cherishing a family visit to the Grand Canyon, and dreaming of hiking the fairy‑tale
    stone circles of the Isle of Skye, preferring low‑key backpacking over bustling theme parks due to a need for calm surroundings.
  culinary: Colby Wong enjoys playful cooking experiments, such as assembling pancake mosaics that mimic LEGO bricks, savoring spicy ramen with a soft‑boiled egg, munching on carrot sticks with hummus,
    and treating themselves to mango sorbet after a long LEGO session, though they frequently leave the broccoli on the plate untouched.
  core: Colby Wong is a solitary, imagination‑rich 9‑year‑old who crafts worlds in sketches, LEGO, and stories, competes with self‑set challenges, worries about details, and resists rigid routines while
    occasionally succumbing to disorganization.
background:
  cultural: Colby was raised in Dearborn, Michigan, in a middle‑class family of European‑American heritage. His household celebrates traditional American holidays such as Thanksgiving, Independence Day,
    and Christmas, while also participating in community events that reflect Dearborn's diverse cultural landscape. Local library story‑time sessions and the city’s public art programs have nurtured his
    love for creativity. Although his immediate family background is primarily white, the multicultural environment of Dearborn gives him occasional exposure to a variety of cultural foods, music, and festivals,
    which he enjoys observing in a quiet, reflective way.
