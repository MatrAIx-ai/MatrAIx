personas:
  professional: Wilhemena Robertson, a budding junior detective and LEGO architect, blends her curiosity with practical problem‑solving to craft mystery‑themed builds and solve neighborhood puzzles, often
    asserting their inventive ideas while casually misplacing pieces and favoring a flexible, unstructured workflow.
  sports: Wilhemena Robertson, an energetic playground regular who swings, slides, and plays tag with friends, also nets goals on the Oakville Tigers U‑9 soccer team in spring and cheers for the Riverdale
    Raptors minor league baseball club, and they approach fitness with a spontaneous, improvisational style that mirrors their love for flexible LEGO building.
  arts: Wilhemena Robertson, a passionate doodler and young painter, fills their sketchbooks with fantasy scenes inspired by Studio Ghibli’s Spirited Away and Dr. Seuss’s whimsical art, while they tap rhythms
    on a recorder during community music workshops, often humming along to The Wiggles’ upbeat tunes.
  travel: Wilhemena Robertson, a curious explorer who delights in spontaneous day‑trips to Willow Creek Park’s nature trails and the town’s historic museum, has already enjoyed a family weekend at the Grand
    Canyon and dreams of visiting Washington, D.C.’s National Museum of Natural History, balancing their adventurous spirit with the practical limits of school holidays and a modest family budget.
  culinary: Wilhemena Robertson, an enthusiastic kitchen helper, enjoys assembling peanut‑butter‑and‑jelly sandwiches, whisking strawberry‑banana smoothies with fresh berries, and sprinkling extra mozzarella
    on homemade mini‑pizzas, yet they often leave crumbs on the counter, reflecting their beginner cooking skills mixed with a carefree, slightly messy approach.
  core: Wilhemena Robertson is a nine‑year‑old mystery‑loving LEGO creator who soothes their frequent worries with journaling and science videos, balancing boundless curiosity with a delightfully disorganized,
    flexible outlook on life.
background:
  cultural: Wilhemena is a Black child raised in Milwaukee, Wisconsin, in a close‑knit family that values community, church gatherings, and African‑American cultural traditions. She celebrates Juneteenth
    and Kwanzaa with family, learns about her heritage through stories from her grandparents and local cultural programs, and participates in school events that highlight Black history. The vibrant Black
    community of Milwaukee shapes her sense of identity, encouraging her appreciation for music, art, and community activism.
