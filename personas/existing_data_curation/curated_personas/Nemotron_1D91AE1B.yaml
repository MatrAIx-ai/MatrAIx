    in local parks", "Journaling", "Watching educational science videos"]'
  career_goals: She dreams of becoming a veterinarian because she loves caring for animals, and sometimes imagines exploring space as an astronaut. Wilhemena also expresses a wish to be a teacher who can
    inspire other kids to ask questions and create. While she enjoys these big pictures, she wants to keep learning new things now so she can help her community and make a positive impact when she grows
    up.
