  career_goals: Timothy aims to transition from a frontline courier to a supervisory position within the logistics sector, such as a route manager or dispatch coordinator, where he can apply his organizational
    strengths on a larger scale. He plans to earn his GED to broaden his qualifications and enroll in short courses on supply chain management. In the medium term, he dreams of launching a small, community‑focused
    delivery service that emphasizes reliability and personalized service for local businesses in Prince Edward County.
