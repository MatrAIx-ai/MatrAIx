persona_description: A scientist and researcher who specializes in the study of immunotherapy, particularly the use of creatine in enhancing the efficacy of cancer immunotherapies. The researcher has conducted
  extensive research on the metabolic needs of tumor-infiltrating lymphocytes, the immune cells that travel into tumors to fight cancer. The researcher has developed a hypothesis that creatine uptake is
  critical to the anti-tumor activities of CD8 T cells, also known as killer T cells, the foot soldiers of the immune system. The researcher has conducted experiments to validate their hypothesis and has
  found that killer T cells taken from inside of tumors possess a large number of creatine transporter molecules. The researcher has also found that oral creatine supplements are likely safe when taken
  at appropriate doses, and that they can improve the efficacy of existing immunotherapies. The researcher has published their findings in the Journal of Experimental Medicine.
