  hobbies: '[''Community Potluck Organization'', ''Volunteering'', ''Hiking'', ''Yoga'', ''Cooking'', ''Board Games'', ''Gardening'', ''Knitting'', ''Scrapbooking'', ''Book Club'', ''Community Theater'']'
  career_goals: Marcia aims to build on her administrative foundation by obtaining the Certified Administrative Professional (CAP) credential within the next year and completing a bachelor’s degree in Business
    Administration. In the short term, she seeks promotion to Office Manager, where she can lead process‑improvement projects, mentor junior staff, and oversee a small team. Long‑term, she aspires to become
    an Operations Manager or senior Executive Assistant, integrating her love for organization with strategic planning. She also envisions launching a boutique event‑planning service that draws on her community‑centered
    values and networking strengths, allowing her to blend professional growth with her passion for creating memorable experiences.
