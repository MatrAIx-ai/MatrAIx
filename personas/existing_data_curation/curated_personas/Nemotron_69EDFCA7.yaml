personas:
  professional: Marcia Corona is a meticulous administrative professional whose talent for calendar coordination, office organization, and event planning blends with a sociable, talkative demeanor to make
    every meeting run like a well‑orchestrated community potluck.
  sports: Marcia Corona enjoys weekend hikes around Lake Minnetonka, is a regular member of the Minnesota Hiking Association, follows the Minnesota Twins and Vikings with fervor, and caps her fitness routine
    with weekly yoga classes at a community center.
  arts: Marcia Corona delights in community theater productions featuring local playwrights, finds inspiration in folk‑rock icons like Bob Dylan and The Jayhawks, and unwinds by knitting patterns inspired
    by Martha Stewart’s designs.
  travel: Marcia Corona prefers meticulously planned road trips, having explored the Boundary Waters and Duluth’s lakefront and dreaming of a spring getaway to Reykjavik’s geothermal spas while balancing
    travel costs with a modest savings plan.
  culinary: Marcia Corona loves cooking Midwestern classics such as walleye fish fry, hotdish, and rhubarb crisp, often incorporating fresh garden tomatoes, basil, and heirloom carrots into her potluck
    contributions for board‑game nights.
  core: Marcia Corona merges an organized, calm demeanor with a vibrant sociability, turning every spreadsheet, garden bed, and community event into a well‑balanced expression of structure and connection.
background:
  cultural: Marcia’s cultural roots are grounded in the Midwestern traditions of Minnesota, with a family heritage that traces back to German and Scandinavian (particularly Swedish) ancestors. Raised in
    a small town before moving to Lakeville, she was immersed in values of hard work, reliability, and modest hospitality typical of the region. Her family’s Lutheran affiliation and regular participation
    in church and local civic events reinforced a strong sense of community service. These influences shape her emphasis on organized, cooperative interactions, respect for tradition, and a balanced approach
    to career and family life, while her sociable personality reflects the friendly, neighborhood spirit characteristic of the Twin Cities suburbs.
attributes:
  skills: '[''Calendar Management'', ''Travel Coordination'', ''Office Organization'', ''Event Planning'', ''Document Preparation'', ''Data Entry'', ''Microsoft Office Suite'', ''Google Workspace'', ''QuickBooks'',
