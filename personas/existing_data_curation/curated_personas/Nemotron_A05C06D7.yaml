  career_goals: She loves art and music, so she dreams of becoming an artist who paints bright pictures, a teacher who shares stories, or a dancer who moves to rhythm. She often says she wants to be a “painter”
    or a “music teacher” when she imagines her future, and she looks forward to helping other kids learn and play.
