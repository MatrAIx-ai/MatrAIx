personas:
  professional: Marie Casmere, a budding storyteller who arranges imaginative playdates, blends the rhythm of gospel hymns heard at church with her own improvised verses, and shows a surprising knack for
    organizing tiny stage productions that delight peers and adults alike.
  sports: Marie Casmere is a pint‑sized member of the Brandon Little Strikers soccer club, idolizes the New Orleans Pelicans for their fast breaks, and loves cheering on the Mississippi Braves during summer
    outings, yet often prefers impromptu tag games in the backyard over structured practice.
  arts: Marie Casmere loves dancing to the soulful choruses of gospel choir leader Tasha Cobbs, sings along to Beyoncé’s ‘Love on Top’, draws vibrant pictures of her family inspired by Maya Angelou’s storytelling,
    and spends afternoons crafting collages with glitter and dried corn husks.
  travel: Marie Casmere enjoys weekend trips to Grandma’s farmhouse near the Natchez Trace, dreams of visiting Disney World’s Magic Kingdom after watching travel videos, and prefers road‑trip playlists
    filled with gospel and pop songs, though their short attention span often leads to frequent snack stops.
  culinary: Marie Casmere delights in the fragrant aroma of collard greens simmering on Sundays, can butter a slice of cornbread without spilling, and craves sweet potato pie, yet they sneak extra grapes
    from the fruit bowl whenever Mom isn’t looking.
  core: Marie Casmere is an exuberant, church‑raised preschooler whose love of music, group play, and vivid imagination battles occasional anxiety and a penchant for sticky‑fingered snack raids.
background:
  cultural: Marie is raised in a Black family in Brandon, Mississippi, where Southern and African‑American traditions intertwine. Her family attends a local church that emphasizes gospel music and community
    fellowship, and weekend gatherings feature soul food, storytelling, and celebrations of cultural holidays like Juneteenth. She is exposed to rich musical rhythms, spoken‑word poetry, and a strong sense
    of community support, which nurture her love for art, music, and group activities while teaching respect for elders and resilience.
