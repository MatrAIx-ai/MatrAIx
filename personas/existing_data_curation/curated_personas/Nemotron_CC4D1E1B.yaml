personas:
  professional: Joseph Coleman, a budding multimedia designer, synergizes Photoshop, Illustrator, and Lightroom expertise with a disciplined self‑project schedule, channeling their curiosity into freelance
    work that amplifies inclusive narratives for cultural institutions while juggling community‑college classes and part‑time gigs.
  sports: Joseph Coleman, an avid follower of the Orlando Magic and Orlando City SC, participates in weekend pickup basketball games at local parks and schedules early morning jogs along Lake Eola to balance
    screen time with light cardio.
  arts: Joseph Coleman, a passionate explorer of Orlando’s galleries, frequently attends small‑group poetry slams featuring spoken‑word artists like Sarah Kay, listens to jazz legends such as Miles Davis
    and modern R&B icons like H.E.R., and reads graphic novels such as 'Saga' while sketching street portraits inspired by Kehinde Wiley and contemporary muralists.
  travel: Joseph Coleman, a frugal travel enthusiast, has road‑tripped to New Orleans for its music scene, dreamed of wandering the Metropolitan Museum of Art in New York, and prefers budget‑friendly hostels
    and Airbnb rentals, planning trips around student breaks and limited finances.
  culinary: Joseph Coleman, an experimental home cook, regularly prepares Southern comfort dishes like collard greens, fried chicken, and cornbread, often adding a vegan twist with quinoa or kale, while
    obsessively fine‑tuning seasoning blends featuring smoked paprika, garlic, and thyme.
  core: Joseph Coleman, a 20‑year‑old visual storyteller, balances a restless curiosity and a penchant for inclusive art with lingering anxiety, turning mindfulness, sketchbooks, and freelance gigs into
    a personal quest for meaningful expression.
background:
  cultural: Joseph grew up in a close‑knit African‑American family in Orlando, with deep roots in the Southern Black community of Florida. His upbringing was shaped by church gatherings, family celebrations
    centered around music and storytelling, and participation in local cultural events such as the Florida Black Heritage Festival. These experiences instilled a pride in African‑American artistic traditions—from
    gospel and jazz to visual arts—and a sense of responsibility to honor and elevate those narratives. Living in the diverse environment of Orange County, he blends this heritage with influences from the
    broader multicultural fabric of the city, fostering a perspective that values both cultural specificity and inclusive community engagement.
attributes:
  skills: '[''Graphic design (Adobe Photoshop, Illustrator)'', ''Photography and photo editing (Lightroom)'', ''Basic web design (HTML/CSS)'', ''Creative writing and blogging'', ''Research and fact‑checking'',
    ''Organizational planning for personal projects'', ''Social media content creation'', ''Critical analysis of visual arts'', ''Digital illustration'']'
  hobbies: '[''Visiting art galleries and museums'', ''Sketching and drawing'', ''Street and landscape photography'', ''Listening to jazz and R&B'', ''Reading speculative fiction and graphic novels'', ''Attending
    small poetry slam events'', ''Playing narrative‑driven indie video games'', ''Mindfulness meditation'', ''Cooking traditional African‑American cuisine'', ''Reflective journaling'']'
  career_goals: Joseph aims to enroll in a community‑college program in visual communications or a related field, eventually transferring to a four‑year university to earn a bachelor's degree in multimedia
    design. He hopes to build a freelance portfolio that blends graphic design, photography, and storytelling, and ultimately secure a role as a multimedia designer for a cultural institution that prioritizes
    inclusive representation of Black artists. In the long term, he envisions launching a community art outreach program in Orlando that uses creative workshops to support youth mental‑health and self‑expression.
