  career_goals: Avery aims to advance to a regional sales director role within the next three years, eventually aspiring to become a vice‑president of sales for a national organization. She wants to lead
    larger, multi‑state teams, implement data‑driven sales enablement programs, and mentor emerging women leaders. Avery also plans to obtain the Certified Sales Leader (CSL) designation and to spearhead
    corporate social responsibility initiatives that support community education and small‑business development in her hometown. Balancing her ambition with family life, she seeks roles that allow for predictable
    schedules and work‑life integration.
