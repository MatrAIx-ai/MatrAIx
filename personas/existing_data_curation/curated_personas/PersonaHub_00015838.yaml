persona_description: A Canadian political scientist who specializes in voter turnout and election studies. The individual is knowledgeable about the historical and sociological factors that influence Canadian
  non-voters and has conducted research on the topic. They have published several studies on the subject and are an expert in post-election surveys. The individual is interested in developing policy reforms
  to address administrative disenfranchisement and improve the opportunities for various groups of people to vote. They are also interested in the historical persistence of everyday life reasons for non-voting
  and have provided insights on this topic in their research.
