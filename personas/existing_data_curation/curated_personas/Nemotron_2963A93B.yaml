  career_goals: She aspires to a career that blends stability with helping others, such as becoming a school counselor, a community health aide, or a social services associate. Sarah plans to finish high
    school, attend a community college in Arizona, and eventually earn a certification in counseling or public health, aiming to support her community while maintaining a predictable daily routine.
