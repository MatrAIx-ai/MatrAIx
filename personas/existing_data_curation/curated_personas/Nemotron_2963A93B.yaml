personas:
  professional: Sarah Trujillo is a high school junior who channels her love for storytelling into detailed sketchbooks, applying a practical, structure‑loving mindset to school art projects while allowing
    spontaneous doodles during quiet moments, and they quietly mentor peers on drawing techniques.
  sports: Sarah Trujillo spends summer afternoons swimming at Lake Havasu with the local swim club, joins the school’s cross‑country team in the fall, cheers for the Arizona Cardinals and Arizona Diamondbacks,
    and they prefer low‑key weekend hikes over organized team sports.
  arts: Sarah Trujillo immerses themselves in Latin pop icons like Bad Bunny and regional ballads by Vicente Fernández while sketching characters inspired by YA authors such as Sarah J. Maas, and they regularly
    attend a community cultural center’s art workshops to practice watercolor techniques.
  travel: Sarah Trujillo prefers spontaneous road trips over rigid itineraries, often exploring nearby desert landmarks like the Grand Canyon and Sedona, while dreaming of a future family visit to Oaxaca’s
    markets and the historic streets of Mexico City, balancing a limited teen budget with occasional school‑organized field trips.
  culinary: Sarah Trujillo delights in helping their mother prepare tamales with masa, pork, and chilies, experiments with guacamole spiked with roasted pepitas, and they occasionally bake cinnamon‑sugar
    churros, though they admit to over‑indulging in sugary snacks after long art sessions.
  core: Sarah Trujillo is a quiet, detail‑oriented teen whose sketchbook is a sanctuary, who worries about the little things, tends to misplace school assignments, and finds calm in caring for their rabbit
    and perfecting tamales.
background:
  cultural: Sarah is a first-generation Mexican-American raised in a bilingual home where Spanish is spoken alongside English. Her family celebrates Mexican holidays such as Dia de los Muertos and Las Posadas,
    and she often participates in community events at the local Mexican cultural center. These traditions shape her values of family cohesion, respect for elders, and a love for Mexican cuisine, while her
    upbringing in Lake Havasu City blends desert-region outdoor activities with her cultural heritage.
