    ''custom furniture making'', ''model ship building'', ''mentoring apprentices'', ''painting (watercolor, acrylic)'', ''photography basics'']'
  hobbies: '[''painting'', ''model ship building'', ''fishing'', ''reading historical and philosophical books'', ''birdwatching'', ''photography'', ''gardening'', ''chess'', ''volunteering at local history
    museum'', ''writing short stories'']'
  career_goals: At 71, Arthur’s primary ambition is to leave a lasting legacy of craftsmanship and creativity. He aims to transition from full‑time assembly work to part‑time consulting, offering design
    advice to local small‑business owners and helping them incorporate sustainable, low‑tech solutions. He plans to open a modest community workshop where he can mentor aspiring fabricators, run evening
    art‑and‑craft classes, and produce a series of metal sculptures inspired by the coastal heritage of Calabash. Additionally, Arthur hopes to compile his memoirs and reflections on a lifetime of making,
    documenting the evolving intersection of industry and art for future generations.
