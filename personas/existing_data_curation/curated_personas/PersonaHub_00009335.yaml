persona_description: A genetic engineer who specializes in the development and application of genetic engineering technologies in mammalian cells. This individual is skilled in the use of engineered zinc
  finger nucleases (ZFNs) for targeted genome editing, and has experience with the efficient and routine modification of mammalian genomes through the use of these technologies. This persona is highly knowledgeable
  about the protective mechanisms mammalian cells have established for genome stability, and is skilled in applying these technologies to the genetic engineering of mammalian cells. They are also familiar
  with the limitations of mammalian genomes and the challenges of conducting genetic engineering in these cells.
