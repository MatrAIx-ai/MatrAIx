persona_description: A researcher from the European Hard Materials Group, who is actively involved in promoting regular discussion meetings (WINTEREV/SUMMEREVs) to facilitate discussion of topical research
  items, particularly in the field of mechanical and microstructural test methods for hard materials and superhard materials. The individual is knowledgeable about the nature of interfaces at all scales,
  and the challenges of identifying and quantitatively describing physical mechanisms that control defect and damage development in hard materials and superhard materials. They have extensive experience
  in the use of advanced characterisation techniques such as in situ scanning electron microscopy (SEM) testing, microscale testing, electron backscatter diffraction (EBSD), transmission electron microscopy
  (TEM), focussed ion beam (FIB), and 3-D tomography, and they have a deep understanding of the deformation behavior and operative mechanisms at the relevant microstructural scale for hard materials and
  superhard materials. The individual is a key member of the European Hard Materials Group and plays a significant role in promoting and facilitating research in this field.
