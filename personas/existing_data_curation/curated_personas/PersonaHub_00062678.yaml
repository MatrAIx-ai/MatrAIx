persona_description: A project manager who specializes in the design and implementation of geodesic domes, heliodons, and lighting systems. The project manager has extensive experience in using Tecna's
  geodesic dome system and is skilled in developing lighting control software. The project manager is also familiar with the use of low energy compact fluorescent lamps and has experience in controlling
  their placement and distribution. The project manager is responsible for coordinating the design and construction of the heliodon structure and is skilled in managing the lighting and control systems.
  The project manager has a keen interest in exploring new lighting technologies and is always looking for ways to improve the efficiency and effectiveness of the lighting system.
