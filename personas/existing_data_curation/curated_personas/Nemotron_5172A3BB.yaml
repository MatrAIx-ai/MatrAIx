  career_goals: Christian aims to finish a personal anthology of poems and a series of watercolor paintings that capture Portland’s seasonal moods, to curate an intergenerational community‑art exhibition
    at a local gallery, and to record oral histories of longtime Portland residents for a neighborhood archive. He also hopes to mentor at least two emerging artists through a structured workshop at the
    senior center, and to learn basic digital photography to document his garden and share his creative work online, providing a low‑pressure outlet that helps balance his natural worry and sensitivity
    to stress.
