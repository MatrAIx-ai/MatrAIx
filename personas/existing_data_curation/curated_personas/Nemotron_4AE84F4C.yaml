  hobbies: '[''playing tag'', ''soccer'', ''building forts'', ''exploring nature'', ''reading adventure books'', ''drawing cartoons'', ''crafting with recycled materials'', ''participating in school clubs'']'
  career_goals: Kathy dreams of one day becoming a teacher or a veterinarian, careers that would let her share knowledge, care for others, and explore the natural world. She loves the idea of leading classroom
    projects or helping animals at a local clinic, combining her curiosity with a practical way to make a difference in her community. While she sometimes feels anxious about making mistakes, she is determined
    to keep learning and grow into a role where she can help friends and neighbors.
