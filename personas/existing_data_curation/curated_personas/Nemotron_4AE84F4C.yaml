personas:
  professional: Kathy Gold, an 8-year-old classroom aide, channels her spontaneous energy into leading group projects and organizing impromptu games, balancing curiosity with practical problem‑solving while
    often forgetting to tidy up after activities.
  sports: Kathy Gold, a member of the Little Lions Soccer Club, loves tag and backyard soccer scrimmages, roots for the Chicago Cubs and follows the Dallas Mavericks, and often practices dribbling with
    a makeshift ball while balancing a love of team spirit with a tendency to lose their shoes mid‑game.
  arts: Kathy Gold draws cartoon characters inspired by Dr. Seuss, Pixar’s Toy Story, and Bill Watterson’s Calvin and Hobbes, adds them to handcrafted forts made from cardboard, and spends afternoons listening
    to the soundtrack of Moana while collecting glitter and stickers for scrapbooks.
  travel: Kathy Gold dreams of exploring the Grand Canyon’s red cliffs and visiting Disneyland, but currently satisfies wanderlust with Saturday hikes to the local creek and family road trips to the beach,
    planning each outing with doodles of maps and a packed snack bag.
  culinary: Kathy Gold favors macaroni‑and‑cheese, peanut butter‑and‑jelly sandwiches, and makeshift veggie kebabs using cherry tomatoes and cucumber slices, often attempting to cook in the kitchen by assembling
    snack plates and proudly topping everything with a sprinkle of cheese.
  core: Kathy Gold is an endlessly curious 8‑year‑old who bursts into spontaneous games, hoards glittery stickers, worries about missing a turn, and can’t resist the lure of a creek‑side adventure.
background:
  cultural: Kathy comes from a White, Midwestern family in Lytton, Iowa, a small rural community where close‑knit neighborhood ties and a respect for the land shape daily life. Her family participates in
    local traditions such as community picnics, county fair events, and occasional church gatherings that emphasize cooperation, kindness, and a strong work ethic. These surroundings foster her practical
    outlook, love of both new ideas and established customs, and her appreciation for group activities and helping others.
attributes:
  skills: '[''reading comprehension'', ''basic arithmetic'', ''spontaneous problem solving'', ''group play coordination'', ''peer mediation'', ''creative storytelling'', ''hand‑eye coordination (drawing)'',
