persona_description: A political negotiator who specializes in accession negotiations for European Union candidate countries. This person is responsible for monitoring and helping candidate countries prepare
  for accession, assessing their readiness, and facilitating negotiations to ensure compliance with the accession criteria. They are skilled in evaluating each country's merits and preparing them to fulfill
  the obligations of European Union membership. They also play a crucial role in monitoring the adoption and implementation of the Community acquis, and in defining measurable reference criteria for each
  chapter. The negotiator must be adept at defining common negotiating positions for each chapter, and adept at incorporating the results of political and economic dialogues into a draft accession treaty.
  They must also be able to manage negotiations even if transposal of the acquis has not been completed.
