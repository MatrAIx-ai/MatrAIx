  career_goals: Roberto aspires to transition from a front‑line guard to a supervisory role within the casino security hierarchy, aiming to become a Shift Supervisor or Security Manager within the next
    three to five years. He plans to obtain formal certification through ASIS International’s Certified Protection Officer (CPO) program to bolster his credentials. Leveraging his passion for art, he also
    envisions moving into a specialized museum‑security position that combines his security expertise with his appreciation for cultural spaces. In the longer term, he hopes to mentor younger guards, share
    best practices, and perhaps launch a small consulting firm that advises local venues on low‑cost, high‑impact surveillance solutions.
