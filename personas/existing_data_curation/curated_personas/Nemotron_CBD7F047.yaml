  hobbies: '[''Strategy video gaming'', ''Arduino and Raspberry Pi projects'', ''Reading science fiction and technology articles'', ''Hiking and nature walks'', ''Playing acoustic guitar'', ''Landscape
    photography'', ''Volunteer tutoring at local library'']'
  career_goals: Shahan aims to graduate high school with a strong record in math and science, then enroll in a community college program focused on computer science or civil engineering. He envisions a
    career that blends his love of technology with the practical needs of his rural community, such as developing software tools for local agriculture or contributing to infrastructure projects that improve
    road safety and broadband access. In the longer term, he hopes to return to Ariton to mentor younger students in coding and practical DIY skills, fostering a culture of sustainable innovation while
    maintaining the close‑knit, supportive environment he values.
