personas:
  professional: An aspiring maker and coder, Shahan Keller channels a love of strategy games into designing Arduino and Raspberry Pi projects that solve everyday problems for classmates and the community,
    and they relish the satisfaction of turning code into tangible tools.
  sports: An avid follower of high school football and a weekend angler, Shahan Keller roots for the Auburn Tigers while also cheering on the Atlanta Braves, and they spend free days hiking local trails
    and practicing target fishing at a nearby lake.
  arts: A budding acoustic guitarist and landscape photographer, Shahan Keller draws inspiration from John Mayer's fingerstyle and the golden hour light over Alabama's pine forests, while they devour sci-fi
    classics by Isaac Asimov and contemporary thrillers by Andy Weir.
  travel: A planner of modest family road trips, Shahan Keller has explored the historic streets of Savannah, Georgia, and the misty peaks of the Great Smoky Mountains, and they prefer low-cost drives that
    balance adventure with cherished time at home.
  culinary: Comforted by Southern flavors, Shahan Keller enjoys cooking biscuits with buttermilk and collard greens seasoned with smoked ham hocks, while they experiment with homemade grilled shrimp tacos
    seasoned with lime, cilantro, and a dash of hot sauce.
  core: A quietly ambitious teen, Shahan Keller blends rural roots with a digital curiosity, constantly building gadgets, mastering guitar chords, and balancing disciplined savings with occasional indulgences,
    and they approach life with a steady calm learned from fishing trips and coding marathons.
background:
  cultural: Shahan grew up in Ariton, a small, predominantly white town in Dale County, Alabama. His family and community emphasize Southern hospitality, church involvement, and close family ties. Attending
    a local Baptist church has given him a grounding in community service and modesty, while school and internet exposure introduce him to broader cultural trends and technology. The blend of rural traditions—such
    as community festivals, high school sports, and outdoor recreation—and an interest in modern digital culture shapes his identity, fostering a respect for heritage alongside a drive to explore new ideas.
