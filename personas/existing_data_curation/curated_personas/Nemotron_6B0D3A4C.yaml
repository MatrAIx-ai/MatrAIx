  professional: Eriberto Torresroa is an aspiring young programmer and budding robotics enthusiast who translates his methodical planning and curiosity into Scratch game development and intricate LEGO constructions,
    often taking the lead on group tasks in his school robotics club while maintaining a reliable, organized workflow.
  sports: Eriberto Torresroa enjoys casual soccer with the local youth league and weekend hikes on nearby nature trails, cheering for Real Madrid while occasionally attending matches with family, and maintains
    a steady fitness routine that balances team play with solitary trail exploration.
  arts: Eriberto Torresroa spends evenings drawing original cartoons inspired by Stan Lee’s dynamic panels and immerses themselves in mystery novels by Agatha Christie, while also listening to the melodic
    guitar work of Carlos Santana to fuel their creative imagination.
  travel: Eriberto Torresroa prefers planned, low‑key family trips that combine nature exploration and cultural curiosity, having trekked the Grand Canyon and hoping to visit the Galápagos Islands to study
    unique wildlife, all while keeping travel budgets tight using allowance savings.
  culinary: Eriberto Torresroa enjoys crafting simple yet flavorful meals like chicken quesadillas and spaghetti carbonara, experimenting with ingredients such as mozzarella, avocado, and dark chocolate,
    and possesses a budding cooking skill that sees them confidently following step‑by‑step recipes while occasionally over‑spicing dishes in their enthusiasm.
  core: Eriberto Torresroa is a detail‑oriented, curious 12‑year‑old who meticulously plans LEGO builds and Scratch games, yet often wrestles with worry that leads to over‑thinking even simple decisions.
background:
  cultural: Eriberto is a first‑generation Cuban‑American. His family maintains Cuban traditions such as cooking ropa vieja and pastelitos, celebrating Cuban holidays like the Día de la Revolución, and
    listening to classic Cuban music at home. He grew up in a bilingual environment, speaking Spanish with his grandparents and English at school, which has given him a strong cultural duality. Living in
    Naples, Florida, he also engages with the broader Floridian coastal culture, enjoying beach outings and local seafood festivals. His heritage instills a sense of community and respect for family, while
    his Floridian surroundings expose him to diverse cultures and the natural environment that fuels his interest in marine and environmental sciences.
