  career_goals: Janet envisions a future where she can help and inspire others. She often talks about becoming a teacher because she enjoys sharing knowledge and fostering a friendly classroom environment.
    She is also fascinated by science and sometimes imagines herself as an astronaut or a wildlife biologist, exploring new ideas while staying grounded in helping people. Combining her love for community,
    she dreams of working in a local community garden or a health clinic where she can support neighbors, reflecting her practical side and desire for stability.
