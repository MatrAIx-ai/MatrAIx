personas:
  professional: Janet Meyer is an aspiring junior engineer who loves building custom LEGO sets and crafting simple Scratch animations, using their curiosity and practical mindset to tinker with ideas, though
    their spontaneous nature sometimes leaves projects half‑finished.
  sports: Janet Meyer charges the midfield in after‑school soccer games, idolizing the local MLS team Seattle Sounders FC and cheering for the U‑12 community league squad, while also loving weekend hikes
    where they sprint up gentle trails, blending team spirit with personal fitness.
  arts: Janet Meyer sings soprano in the school choir, delighting in renditions of songs by Disney's 'Frozen' soundtrack and Taylor Swift's 'Shake It Off,' while they also sketch detailed insects from their
    nature walks and program quirky animations on Scratch inspired by Pixar's 'Inside Out.'
  travel: Janet Meyer prefers spontaneous day trips to nearby state parks and a recent family road‑trip to Washington, D.C., where they marveled at the National Museum of Natural History, while dreaming
    of a future adventure hiking the Grand Canyon’s South Rim with friends.
  culinary: Janet Meyer enjoys mixing batter for chocolate‑chip cookies with dark chocolate chunks, brown sugar, and a pinch of sea salt, and they often help their family make homemade pizza topped with
    fresh mozzarella, basil, and sliced bell peppers, proudly serving their creations to neighbors at the community garden bake‑sale.
  core: Janet Meyer is a curious, energetic 10‑year‑old whose love for soccer, LEGO, and Scratch projects is balanced by frequent worries and a habit of leaving tasks unfinished.
background:
  cultural: Janet is raised in Red Springs, a small town in Hoke County, North Carolina, where Southern hospitality and close community ties are central to daily life. Her family participates in church
    gatherings, local festivals such as the Hoke County Fair, and community service projects, reinforcing values of kindness, cooperation, and respect for neighbors. The rural setting provides her with
    regular exposure to farms, woodlands, and seasonal traditions like pumpkin picking and outdoor picnics. These experiences shape her appreciation for nature, storytelling, and the importance of supporting
    the community, while also exposing her to regional customs like sharing sweet tea and enjoying Southern comfort foods.
