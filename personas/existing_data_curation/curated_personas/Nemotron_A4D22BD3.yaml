  hobbies: '[''Soccer'', ''Hip-hop dance'', ''Reading mystery novels'', ''Sketching'', ''Playing the ukulele'', ''STEM club (Scratch programming)'', ''Volunteering at community garden'', ''Cooking family
    recipes'', ''Attending local cultural festivals'', ''Organizing school events'']'
  career_goals: Deborah aims to maintain top grades throughout middle school and become class president, using her leadership to organize community service projects. She is passionate about helping her
    peers manage stress and envisions a future career in youth mental‑health advocacy or public health, where she can combine her organized, practical mindset with her desire to support Black and immigrant
    communities. Long‑term, she hopes to study psychology or public health at university and become a community health worker or youth counselor.
