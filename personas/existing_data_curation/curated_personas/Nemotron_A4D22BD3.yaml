personas:
  professional: Deborah Sosagarcia, a disciplined 12‑year‑old who channels her curiosity into building simple Scratch games, leads her school’s STEM club projects with meticulous planning and a collaborative
    spirit.
  sports: Deborah Sosagarcia spikes the ball as a forward on the Midtown Tigers U12 girls soccer team and lights up the school’s Rhythm Beats hip‑hop crew, balancing competitive drills with expressive dance
    sessions after school.
  arts: Deborah Sosagarcia strums ukulele chords to songs by Jack Johnson, drops beats inspired by Afro‑Caribbean drummers like Rita May, sketches mystery protagonists from Rick Riordan novels, and draws
    creative energy from listening to hip‑hop icons such as Kendrick Lamar.
  travel: Deborah Sosagarcia plans trips with a blend of adventure and family bonding, having explored the Grand Canyon’s rim on a school field trip, vacationed on a Caribbean beach where she collected
    shells for her ukulele case, and dreaming of a future visit to Tokyo’s anime districts to fuel her storytelling.
  culinary: Deborah Sosagarcia loves whipping up homemade empanadas filled with seasoned beef, cheese, and cumin, perfecting the crust with flour and butter, and also enjoys making pineapple‑glazed chicken
    using fresh pineapple, soy sauce, and ginger, while gradually mastering the balance of spice and sweetness.
  core: Deborah Sosagarcia is an energetic 12‑year‑old whose disciplined curiosity drives her to code, play soccer, and strum the ukulele, yet a constant undercurrent of worry makes her over‑organize every
    hobby and budget.
background:
  cultural: Deborah is a Black youth raised in the culturally rich neighborhoods of Miami‑Dade County, where Afro‑Caribbean, African‑American, and Latino influences intersect. Her family maintains traditions
    from the Caribbean—such as cooking dishes like rice and peas and speaking Haitian Creole and Spanish alongside English—while also celebrating African‑American heritage through events like Juneteenth
    and attending a local Baptist church. She participates in community celebrations like the Ocho de Diciembre parade and enjoys a music mix of hip‑hop, reggae, and zouk. This blend of cultural experiences
    shapes her identity, fostering a strong sense of community, resilience, and awareness of social justice issues.
