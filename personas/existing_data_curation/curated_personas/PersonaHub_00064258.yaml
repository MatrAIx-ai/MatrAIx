persona_description: A medical historian who specializes in the study of the history of medicine, particularly the medical practices and treatments during the 17th, 18th, and 19th centuries. Her research
  interests include, but are not limited to, the history of plague doctors, their costumes, and the medical practices and treatments used during the time of the Black Death. She is particularly interested
  in the evolution of medical practices and their impact on public health.
