personas:
  professional: Ashley Flores, an 81‑year‑old senior community cultural organizer, leverages bilingual public‑speaking, event‑planning expertise, and a keen eye for art to curate intergenerational story‑sharing
    programs and a traveling senior‑artist exhibit that tours regional art festivals, and they mentor emerging volunteers with the same calm, resilient energy.
  sports: Ashley Flores enjoys daily walks along the Berks County trails, lively salsa evenings that serve as cardio workouts, and cheering on the Reading Fightin Phils during spring baseball, while they
    also participate in a senior bowling league at the local community center each winter.
  arts: Ashley Flores, a devoted gallery‑goer, finds inspiration in the bold colors of Frida Kahlo, the contemporary abstractions of Kehinde Wiley, and the vibrant Latin jazz rhythms of Tito Puente, often
    weaving these influences into storytime sessions at the Reading Public Library where they captivate listeners with vivid storytelling.
  travel: Ashley Flores prefers low‑impact group tours that blend cultural immersion with comfortable pacing, having explored the historic streets of Cartagena, the gardens of New England’s Cape Cod, and
    the museums of Washington, D.C., while dreaming of a leisurely Danube river cruise that would combine music, food, and scenic art.
  culinary: Ashley Flores delights in preparing mofongo with crispy plantains, garlic‑infused sofrito, and succulent pork, alongside arroz con gandules seasoned with pigeon peas, cilantro, and lime, and
    they often garnish these dishes with fresh basil, mint, and a squeeze of lemon from their balcony garden.
  core: Ashley Flores channels boundless curiosity and sociable vigor into a lifelong mission of cultural exchange, balancing meticulous organization with spontaneous joy, all while occasionally forgetting
    to water the cactus perched on the balcony ledge.
background:
  cultural: Ashley was born in San Juan, Puerto Rico, and moved to Reading, Pennsylvania as a young adult, bringing with her a deep appreciation for the island’s vibrant music, food, and family traditions.
    Bilingual in Spanish and English, she maintains strong ties to the local Puerto Rican diaspora, celebrating festivals such as Noche de San Juan and contributing to cultural events at the Berks County
    Hispanic Center. Her upbringing emphasized storytelling, communal meals, and a resilient work ethic—values that continue to shape her interactions and community involvement. While fully integrated into
    the broader Reading community, she proudly preserves and shares her heritage through cooking, music, and oral‑history projects.
attributes:
  skills: '[''Public Speaking (English/Spanish)'', ''Event Planning and Facilitation'', ''Community Storytelling and Oral History'', ''Art Appreciation and Curatorial Guidance'', ''Volunteer Coordination'',
    ''Bilingual Communication'', ''Creative Cooking and Traditional Puerto Rican Cuisine'', ''Gardening and Urban Horticulture'', ''Knitting and Handcrafts'', ''Mentorship of Youth and Seniors'']'
  hobbies: '[''Attending Local Art Exhibitions'', ''Salsa/Dance Sessions at Senior Center'', ''Cooking Traditional Puerto Rican Cuisine'', ''Gardening (herbs, citrus, indoor plants)'', ''Reading Historical
    Fiction and Biographies'', ''Walking on Berks County Trails'', ''Listening to Latin Jazz and Live Music'', ''Volunteering for Library Storytime'', ''Digital Photo Archiving'', ''Organizing Community
    Potluck Gatherings'']'
  career_goals: Even at 81, Ashley aims to deepen her impact on the Reading community by establishing a senior‑led cultural exchange program that pairs older Puerto Rican residents with younger volunteers
    to share music, stories, and culinary traditions. She aspires to document her own life story and family heritage in a memoir, and to curate a traveling exhibit of local senior artists for regional art
    festivals. Additionally, she wishes to continue learning art history through online courses and to mentor aspiring community organizers, ensuring that her curiosity and love of new ideas benefit future
    generations.
