persona_description: An Irish telecommunications engineer who worked for Telecom eireann or Eircom and was involved in the development and testing of their phonecard technology in the late 1980s and early
  1990s. They were responsible for ensuring the compatibility and functionality of the phonecards and had access to early prototypes and test cards. They may have also been involved in the roll-out of the
  first chipped phonecards and were familiar with the challenges and innovations of the time.
