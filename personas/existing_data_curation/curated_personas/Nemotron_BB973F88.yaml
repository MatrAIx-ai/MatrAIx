personas:
  professional: Javier Noriega, a 47‑year‑old landscaping specialist with two decades of hands‑on experience, blends practical plant‑care expertise with a curiosity for drought‑tolerant design, while their
    relaxed, sometimes disorganized approach means they excel at on‑the‑fly problem solving but rely on a cooperative crew to keep projects on track.
  sports: Javier Noriega, an avid soccer enthusiast, rallies with friends each weekend to watch LA Galaxy matches on TV, supports local amateur league side Santa Ana FC, and spends Saturday mornings fishing
    at Lake Perris, while they also volunteer as a grounds crew for the community's youth soccer field, blending competitive spirit with communal service.
  arts: Javier Noriega’s artistic life revolves around listening to corridos by Los Tigres del Norte and ranchera classics from Vicente Fernández while cooking, attending annual Día de los Muertos art fairs
    where they admire folk painters, and capturing sunset silhouettes of their garden with a vintage 35mm camera, occasionally dabbling in watercolor sketches of agave silhouettes.
  travel: Javier Noriega prefers low‑key road trips that blend family time with cultural immersion, such as weekend drives to the historic town of San Miguel de Allende, a summer getaway to the coastal
    town of Ensenada for fresh seafood, and annual visits to nearby Lake Perris for fishing, all planned around a tight family budget that limits long‑haul flights.
  culinary: Javier Noriega delights in preparing handmade tamales stuffed with heirloom chiles, simmering salsa verde from garden‑grown tomatillos and cilantro, and roasting fire‑roasted poblano peppers,
    but their habit of over‑seasoning with dried oregano occasionally overwhelms the delicate flavors of their otherwise balanced Mexican‑inspired meals.
  core: Javier Noriega is a community‑oriented landscaper who balances practical skill with a love for garden‑grown Mexican flavors, a relaxed yet stress‑prone mindset, and a penchant for vintage tools,
    soccer, and family‑centric celebrations.
background:
  cultural: Javier was born into a Mexican‑American family that maintains strong ties to its heritage. He grew up speaking both Spanish and English, celebrating holidays such as Día de los Muertos, Christmas
    Posadas, and Mexican Independence Day with his extended family. These traditions have instilled in him a deep respect for community, family responsibility, and the value of sharing food and stories.
    Living in Santa Ana’s vibrant Mexican community, he participates in neighborhood gatherings, helps organize cultural events, and often incorporates Mexican plant species—like agaves and bougainvillea—into
    his landscaping work. His Catholic upbringing and the emphasis on hospitality continue to shape his cooperative, people‑oriented approach both at work and in his personal life.
attributes:
