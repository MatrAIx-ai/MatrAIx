  hobbies: '[''Home gardening'', ''Cooking traditional Mexican cuisine'', ''Listening to regional Mexican music'', ''Watching soccer matches'', ''Attending community festivals'', ''Reading about sustainable
    landscaping'', ''DIY home improvement projects'', ''Fishing with spouse'', ''Casual photography of plants and landscapes'', ''Collecting vintage gardening tools'']'
  career_goals: Javier aims to move from being a crew member to a foreman in the next few years, eventually launching his own small, family‑run landscaping business that emphasizes drought‑tolerant, environmentally
    friendly designs. He plans to earn a Certified Landscape Technician credential and to build a portfolio of residential projects that showcase native Californian and Mexican‑inspired plantings. Achieving
    greater financial stability for his wife and teenage children is a primary motivator, and he hopes that better planning and formal training will reduce the stress he often feels on the job.
