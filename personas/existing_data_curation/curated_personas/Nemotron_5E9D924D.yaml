personas:
  professional: Michael Davis, a 17‑year‑old aspiring diesel and marine mechanic, leverages their step‑by‑step troubleshooting skill set and their assertive‑yet‑cooperative nature to meticulously organize
    shop projects while still leaving room for spontaneous motorcycle customizations.
  sports: Michael Davis stays active by fishing early mornings on Bayou Lafourche, joining occasional pickup basketball games at the Thibodaux Community Center, and cheering for the New Orleans Saints in
    the NFL and the LSU Tigers during college football, as they balance solitary pursuits with team spirit.
  arts: Michael Davis finds artistic inspiration in graphic novels like 'Saga' and 'Watchmen' while the lively accordion riffs of Clifton Chenier and the country twang of Luke Bryan echo through their workshop,
    and they sometimes sketch their latest fishing catches for personal enjoyment.
  travel: Michael Davis prefers low‑key weekend getaways, meticulously planning fishing trips to Gulf Shores and dreaming of a future road trip to the Canadian Rockies for fly‑fishing, while their tight
    budget keeps lengthy voyages like a solo trek to Hokkaido out of reach for now.
  culinary: Michael Davis enjoys cooking regional dishes such as jambalaya and gumbo, confidently seasoning with smoked andouille sausage, fresh shrimp, and a pinch of cayenne, and they occasionally burn
    the roux, revealing their youthful culinary impatience.
  core: Michael Davis is a methodical teen who balances a love for structured mechanics with an impulsive habit of scattering tools after a weekend bike project, and they are always ready to chase the next
    bite on the bayou.
background:
  cultural: Michael grew up in Thibodaux, Louisiana, within a predominantly white, Cajun‑influenced community. His family practices a blend of Catholic traditions and Southern hospitality, celebrating local
    festivals such as Mardi Mardi and the Bayou St. John festivities. The region’s French‑Cajun heritage is evident in the food, music, and occasional use of Louisiana French phrases at home. The local
    economy’s ties to fishing, oil, and small‑scale agriculture have shaped his daily life, offering him exposure to both outdoor work and industrial environments. Community ties are strong; neighbors often
    gather for potlucks, church events, and neighborhood clean‑ups, fostering a sense of belonging that Michael values despite his reserved nature.
attributes:
  skills: '[''Basic automotive repair'', ''Motorcycle maintenance'', ''Fishing techniques (bayou and lake)'', ''Cajun cooking basics'', ''Computer literacy (gaming, internet research)'', ''Basic carpentry'',
    ''Small‑group collaboration and leadership'']'
  hobbies: '[''Fishing'', ''Video gaming (action/strategy)'', ''Motorcycle maintenance and customization'', ''Cooking Cajun dishes'', ''Listening to Zydeco and country music'', ''Reading graphic novels/comics'',
    ''Attending local community festivals'']'
  career_goals: Michael aims to earn his GED within the next year and enroll in a vocational program to become a certified diesel or marine mechanic, targeting stable employment in the local petrochemical
    or fishing industries. He values a career that offers a clear structure, predictable routines, and reliable income to support his family. While he likes the idea of disciplined work, he also hopes to
    keep flexible hours that let him continue his personal interests, such as fishing and motorcycle projects. In the longer term, Michael dreams of owning his own small repair shop where he can combine
    his mechanical skills with his entrepreneurial spirit, all while staying rooted in his community.
