personas:
  professional: Amy Koch, a retired community arts coordinator turned senior‑artist curator, leverages their vivid imagination, talkative charisma, and talent for storytelling to lead spontaneous art workshops,
    organize a traveling exhibition of Saginaw seniors’ work, and mentor volunteers for an oral‑history project, often preferring flexible, improvisational planning over strict schedules.
  sports: An enthusiastic participant in the local senior center’s water‑aerobics class, Amy Koch also enjoys strolling along the Saginaw Riverwalk, roots for the Detroit Tigers and Michigan Wolverines,
    and joins a weekend walking club that hikes Lake Michigan’s shoreline each summer.
  arts: Amy Koch, an abstract watercolorist and mixed‑media collage artist, draws inspiration from Georgia O'Keeffe’s bold forms, Kandinsky’s color theory, and the lyrical brevity of Rupi Kaur, while regularly
    attending Saginaw gallery openings, facilitating senior craft circles, and sharing poems on a modest blog.
  travel: After savoring Creole jazz in New Orleans and exploring the red‑rock galleries of Sedona, Amy Koch now dreams of a slow‑paced pilgrimage to Kyoto’s zen gardens, preferring meticulously planned
    train itineraries that allow ample sketching time and reflective pauses while staying within a modest retirement budget.
  culinary: A culinary enthusiast, Amy Koch whips up lavender‑infused shortbread, lemon‑basil linguine, and hearty quinoa‑and‑rosemary stuffed peppers using fresh roses and lavender from their garden, showcasing
    an intermediate cooking skill that shines during Sunday potlucks at the senior center.
  core: Amy Koch is a wildly imaginative, socially vibrant retiree whose boundless curiosity fuels a life of art, community storytelling, and occasional worry‑driven splurges, all while juggling a scattered
    schedule and a penchant for lavender‑scented creations.
background:
  cultural: Amy is a lifelong resident of Saginaw, Michigan, and embodies the Midwestern values of hospitality, modesty, and community pride. Her family’s roots trace back to German and Polish immigrants
    who arrived in the early 20th century to work in the region’s automotive factories, giving her a connection to the area’s manufacturing heritage. Growing up during the post‑war boom, she experienced
    the cultural shift from a bustling industrial town to a more service‑oriented community, which has shaped her appreciation for local history and collective memory. She was raised in a Protestant (Lutheran)
    household, attending neighborhood church events and seasonal festivals that celebrate the Great Lakes region’s seasonal rhythms. These experiences inform her love for local traditions—such as summer
    lake outings, autumn harvest fairs, and winter holiday gatherings—while her artistic curiosity pushes her to explore more avant‑garde and abstract expressions within that cultural framework.
