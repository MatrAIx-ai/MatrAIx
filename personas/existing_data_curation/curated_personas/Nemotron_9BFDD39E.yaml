  hobbies: '[''abstract watercolor painting'', ''mixed-media collage'', ''creative writing (poetry, flash fiction)'', ''reading speculative fiction and modern poetry'', ''participating in seniors’ book
    club'', ''volunteering at senior center art workshops'', ''attending local theater and gallery events'', ''gardening (roses, lavender)'', ''yoga and mindfulness practices'', ''knitting and quilting'']'
  career_goals: Although retired from formal employment, Amy envisions a vibrant second act centered on creative contribution and community connection. She aims to curate a traveling exhibition of senior‑artist
    works that showcases the unique perspectives of Saginaw’s older residents. Concurrently, she plans to launch a community‑oral‑history project, training volunteers to record and archive stories of longtime
    locals, with the goal of publishing a collective memoir that celebrates the city’s cultural heritage. Amy also hopes to deepen her digital art skills through short courses at the local community college,
    eventually offering weekly virtual art‑therapy sessions for seniors coping with stress and isolation. Her broader ambition is to become a recognized cultural ambassador for Saginaw, fostering intergenerational
    dialogue and promoting the arts as a pathway to mental well‑being.
