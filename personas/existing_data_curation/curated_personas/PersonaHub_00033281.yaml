persona_description: A historian who specializes in the study of African American women's history, particularly the contributions and struggles of black women in the United States during the 20th century.
  Her research interests include the intersection of race, gender, and labor, and the impact of wartime labor shortages on women of all races and ages. She is particularly interested in the struggles faced
  by black women in segregated industries and the challenges they faced in obtaining better pay and working conditions. Her expertise is evident in her detailed analysis of the iconic image of Rosie the
  riveter and the photographs showcasing women at work during World War I and the early 1920s. She has a deep understanding of the role of black women in the American workforce and their contributions to
  the progress and success of leading industries.
