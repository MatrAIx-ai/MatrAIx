personas:
  professional: Ava Wong, a seasoned school bus driver with a solid STEM foundation, blends meticulous route optimization, basic mechanical troubleshooting, and first‑aid readiness with a curious, art‑inspired
    approach to education on board, while their relaxed, sometimes disorganized style fuels a drive to become a transportation safety coordinator who can embed data‑driven efficiency and creative outreach
    into district fleet operations.
  sports: Ava Wong, an enthusiastic participant in weekend hikes with the Orlando Hiking & Exploration Club and a regular attendee of sunrise yoga sessions at Lake Eola, roots for the Orlando Magic and
    Orlando City SC while favoring fluid, low‑pressure workouts over regimented gym routines, often using a Fitbit to track steps more for fun than competition.
  arts: Ava Wong immerses themselves in Orlando’s arts scene, regularly visiting the Orlando Museum of Art to admire works by Georgia O’Keeffe, snapping cityscape photos inspired by Annie Leibovitz, joining
    community dance classes set to the rhythms of Afro‑Caribbean drummers, and winding down with board game nights featuring titles like Catan and Ticket to Ride while listening to the eclectic playlists
    of local indie band The Midnight Echoes.
  travel: Ava Wong favors spur‑of‑the‑moment weekend getaways and detailed month‑long trips alike, having already explored the vibrant markets of San Juan, Puerto Rico, and the natural wonders of the Everglades,
    while they dream of a culinary‑centric road trip along Spain’s Costa del Sol, balancing flexible itineraries with a penchant for pre‑booking boutique hostels that showcase local art.
  culinary: Ava Wong, a self‑taught home chef with a knack for Caribbean‑fusion experiments, often whips up jerk chicken tacos topped with mango‑pineapple salsa, slow‑cooks curried goat with Scotch bonnet
    peppers, and perfects plantain‑based desserts using coconut milk and toasted cacao nibs, while also seeking out the occasional pop‑up dining experience that highlights seasonal, locally sourced produce.
  core: Ava Wong is a curious, art‑driven school bus driver whose love of spontaneous creativity fuels a flexible, sometimes disorganized lifestyle that blends STEM precision with Caribbean flavors and
    community‑centric adventures.
background:
  cultural: Ava identifies as African‑American with Chinese heritage, reflecting a multicultural family tradition that blends African‑American cultural practices—such as church gatherings, soulful music,
    and Juneteenth celebrations—with Chinese customs like Lunar New Year festivities, calligraphy, and family reunions. Living in Orlando’s vibrant, diverse community, she also embraces Caribbean and Latin
    influences, often participating in local festivals, enjoying diverse cuisines, and connecting with neighbors from various backgrounds. Her upbringing has instilled a deep appreciation for storytelling,
    rhythm, and community mentorship that shapes her personal and professional life.
attributes:
  skills: '[''Safe driving'', ''Route planning and optimization'', ''Vehicle inspection and basic maintenance'', ''Emergency response and first aid'', ''Student supervision and conflict resolution'', ''Communication
