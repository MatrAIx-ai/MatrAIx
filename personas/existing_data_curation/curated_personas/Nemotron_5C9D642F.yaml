    training'']'
  hobbies: '[''Visiting local art museums and galleries'', ''Painting and sketching'', ''Photography of cityscapes and nature'', ''Community dance and drumming classes'', ''Hiking in Central Florida parks'',
    ''Reading speculative fiction'', ''Cooking Caribbean and fusion dishes'', ''Volunteer tutoring in arts and STEM'', ''Attending live music and theater performances'', ''Playing board games with family'']'
  career_goals: Ava aims to advance into a transportation safety coordinator role within the school district, where she can develop and enforce fleet safety protocols, mentor new drivers, and integrate
    data‑driven route efficiency tools. She plans to earn a certification in transportation management and eventually pursue a master’s degree in transportation engineering. Passionate about connecting
    art and STEM, she envisions launching a mobile outreach program that transforms the school bus into a traveling studio and science lab, partnering with local museums and community centers. While seeking
    greater leadership responsibilities, Ava also values maintaining a flexible schedule that supports her family and personal creative pursuits.
