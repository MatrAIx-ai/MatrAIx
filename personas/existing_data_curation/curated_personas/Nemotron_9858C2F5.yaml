  career_goals: Robert aims to be promoted to detective within the next three years, focusing on homicide or cybercrime investigations where he can apply his forensic and analytical skills. He also aspires
    to lead a specialized task force that integrates community art initiatives to engage at‑risk youth and foster trust between law enforcement and residents. Long‑term, he envisions attaining the rank
    of sergeant or lieutenant, shaping department policies toward evidence‑based policing, cultural competence, and proactive community outreach.
