personas:
  professional: Robert Mccoy is a police officer in Anniston who leverages his criminal justice education and meticulous investigative technique to excel at evidence collection, crime‑scene documentation,
    and precise report writing, and they consistently exceed performance metrics while their competitive streak fuels aspirations toward homicide or cybercrime investigations.
  sports: Robert Mccoy is an avid trainee who blends weightlifting at the Anniston Powerhouse gym, trail running in the Cheaha foothills, and participation in USPSA tactical‑shooting matches, and they cheer
    on the Atlanta Falcons while joining the Anniston Trail Runners club for group runs.
  arts: Robert Mccoy is a cultural enthusiast who spends weekends sketching the historic downtown streets of Anniston, attends intimate acoustic concerts by local folk duo The Indigo Tree, admires prints
    by street artist Banksy, and they volunteer in a youth art program that partners with community‑theater workshops featuring plays by August Wilson.
  travel: Robert Mccoy is a methodical planner who prefers short, well‑researched road trips to historic cities such as Savannah, GA, and Asheville, NC, while dreaming of a summer art‑focused tour of Edinburgh,
    Scotland, and they balance these aspirations with a modest police salary and a commitment to weekend duties.
  culinary: Robert Mccoy is a moderately skilled home cook who favors Southern comfort dishes like shrimp and grits and smoked brisket, enjoys experimenting with fresh herbs such as rosemary and thyme,
    and they often cap a night out with a craft beer at the local brewery, though they can be indecisive about restaurant reservations, leading to frequent take‑out pizza.
  core: Robert Mccoy is a disciplined, art‑loving police officer whose competitive edge fuels both their investigative ambitions and a relentless pursuit of a balanced life of fitness, culture, and community
    service, albeit with a habit of over‑planning free time.
background:
  cultural: Robert grew up in a middle‑class, white Southern family in Anniston, Alabama. His upbringing reflects traditional Southern values of strong family ties, community loyalty, and a solid work ethic,
    tempered by the region's modest religious influences and respect for law and order. The local culture's appreciation for folk art, regional music, and historic preservation informs his own artistic
    interests and his desire to bridge policing with community cultural initiatives.
