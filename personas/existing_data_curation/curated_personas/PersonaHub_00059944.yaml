persona_description: Calvin Henderson Wiley was a well-known educator and writer in North Carolina, known for his advocacy of universal education and his efforts to overcome the state's cultural backwardness.
  He was a pioneer in the field of public education and played a significant role in shaping the state's educational system. His contributions to the development of the common schools in North Carolina
  were recognized by the state and he is now considered the "Horace Mann of the South." Wiley's work was influenced by his religious beliefs and his desire to improve the lives of his fellow citizens. He
  was a strong advocate for the importance of education in overcoming the state's poverty and backwardness.
