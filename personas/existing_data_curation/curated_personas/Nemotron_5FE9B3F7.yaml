  career_goals: Alan dreams of turning his curiosity into a career that blends creativity with practicality. He aspires to become a mechanical engineer or a software developer who designs simple, sustainable
    gadgets that help people in everyday life. He is fascinated by how technology can improve his community, and he imagines someday creating a small device that makes household chores easier for his family.
    While he enjoys the big picture, he remains flexible about the exact path, open to exploring robotics, environmental tech, or even wildlife conservation if it aligns with his love of nature.
