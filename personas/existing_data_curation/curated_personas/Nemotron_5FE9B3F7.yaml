personas:
  professional: Alan Wilhelm, an aspiring middle‑school mechanical tinkerer, channels a blend of curiosity and practicality into designing motorized LEGO builds and conquering strategy video games, demonstrating
    early problem‑solving skills and a relaxed, improvisational work style.
  sports: Alan Wilhelm enjoys casual weekend bike rides through the nearby park, follows the Seattle Seahawks for football and the Los Angeles Dodgers for baseball, and plays on the local youth soccer club’s
    forward line where they value teamwork but often forget to hydrate after games.
  arts: Alan Wilhelm immerses themselves in sci‑fi stories by devouring Isaac Asimov novels and drawing mechanical sketches inspired by the art of Studio Ghibli’s Hayao Miyazaki, while they listen to Imagine
    Dragons and the classic film scores of John Williams, fueling their creative downtime.
  travel: Alan Wilhelm prefers low‑key family road trips like a weekend to Yellowstone National Park and a summer visit to the Great Barrier Reef via cruise, planning itineraries loosely around museum stops
    and nature hikes, but they dream of exploring the high‑tech streets of Tokyo on a future school exchange.
  culinary: Alan Wilhelm’s favorite meals are homemade pepperoni pizza, spaghetti carbonara with pancetta, and occasional sushi rolls, and while their cooking skill tops at assembling simple snacks and
    following YouTube tutorials for beginner’s ramen, they relish experimenting with fresh basil, Parmesan, and wasabi.
  core: Alan Wilhelm is a curious, solitary 11‑year‑old builder who balances a love for intricate LEGO mechanisms with a relaxed, sometimes disorganized approach to school, money, and health, often getting
    lost in sci‑fi worlds while they forget to stretch.
background:
  cultural: Alan comes from a European‑American family with German heritage, reflected in his surname, living in the suburban community of Parkville, Maryland, near Baltimore. He grows up celebrating typical
    American holidays like Thanksgiving, Fourth of July, and Halloween, while also honoring family traditions such as Sunday home‑cooked meals and occasional German dishes during cultural events. Attending
    a public middle school that brings together a diverse student body, he is exposed to a mix of cultural perspectives, fostering an appreciation for community involvement and respect for different backgrounds.
    His family emphasizes curiosity, education, and the value of practical skills, encouraging him to explore both creative and hands‑on activities.
attributes:
  skills: '["Scratch programming", "LEGO Technic building", "Reading comprehension", "Basic algebra", "Problem solving", "Woodworking basics"]'
