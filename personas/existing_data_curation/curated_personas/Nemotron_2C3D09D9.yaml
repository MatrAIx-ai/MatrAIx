  hobbies: '[''Singing in church choir'', ''Organizing community talent shows'', ''Volunteering at the Fairburn food pantry'', ''Planning neighborhood clean‑up events'', ''Journaling and schedule planning'',
    ''Cooking Southern comfort‑food recipes'', ''Playing basketball at the community center'', ''Practicing yoga and mindfulness meditation'', ''Reading non‑fiction books on social justice'', ''Participating
    in local African‑American heritage tours'']'
  career_goals: Mariah intends to enroll in a community college program in public health or social work within the next year, aiming to become a certified community health worker who can design and implement
    youth outreach programs in Fulton County. She plans to acquire project‑management certification and later pursue a bachelor’s degree in social work, with the long‑term ambition of leading a nonprofit
    organization that focuses on education, health equity, and empowerment for underserved Black youth. In the short term, she hopes to gain hands‑on experience through internships at local shelters and
    public health departments, while also obtaining first‑aid and CPR certifications.
