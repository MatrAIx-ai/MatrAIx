personas:
  professional: Mariah Lizana is an aspiring community health coordinator who leverages their organized planning, budget‑savvy, and calm conflict‑mediation skills to orchestrate youth outreach events with
    precision and compassion, and they consistently follow through on every timeline.
  sports: Mariah Lizana, a regular at the Fairburn Community Center’s pick‑up basketball games, roots for the Atlanta Hawks and Atlanta Falcons, volunteers with the Fairburn Youth Run Club for early‑morning
    5K training sessions each spring, balances team play with personal fitness routines like yoga, and they constantly set new personal bests in both runs and court drills.
  arts: Mariah Lizana blends a love for gospel music—rehearsing classics by Kirk Franklin, Mary Mary, and Tasha Cobbs—in their church choir with an appreciation for Atlanta’s Alliance Theatre productions,
    curating inclusive community talent shows that celebrate storytelling and soulful expression, and they often incorporate theatrical sketches into choir performances to keep audiences engaged.
  travel: Mariah Lizana prefers budget‑friendly, well‑planned weekend getaways, having explored Savannah’s historic riverfront and the Smithsonian museums in Washington, D.C., while they day‑dream about
    a future solo trip to New Orleans to soak in its jazz scene and Creole culinary traditions, and they keep a travel journal to capture each adventure’s lessons.
  culinary: Mariah Lizana, a confident home cook, spends weekends perfecting Southern comfort dishes such as shrimp‑and‑grits, fried chicken with buttermilk brine, and sweet‑potato casserole, delighting
    in ingredients like smoked paprika, okra, and fresh collard greens, and they occasionally indulge in the famed chicken‑and‑dumplings at Mary Mac’s while experimenting with new spice blends collected
    from local markets.
  core: Mariah Lizana’s blend of meticulous scheduling, spontaneous bursts of creativity, and a quirky habit of hoarding extra spice packets reveals a youthful zeal for order and generosity that fuels their
    drive to uplift others, even though they sometimes sacrifice sleep after late‑night talent‑show rehearsals, and they never miss a chance to share a homemade snack with friends.
background:
  cultural: Growing up as a Black teenager in Fairburn, Georgia, Mariah’s cultural identity is rooted in the Southern African‑American tradition of close‑knit family, faith‑centered community, and a strong
    sense of collective responsibility. She was raised attending a historically Black high school where she participated in cultural clubs, marching band, and the NAACP youth chapter. Weekly church services,
    gospel music, and local celebrations such as Juneteenth and the annual community cook‑out have reinforced values of resilience, mutual support, and pride in her heritage. These experiences shape her
    worldview, encouraging her to give back through service, celebrate communal storytelling, and preserve the rich culinary and musical customs of her community.
