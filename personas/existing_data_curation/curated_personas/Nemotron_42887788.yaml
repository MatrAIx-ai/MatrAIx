  career_goals: His primary ambition is to keep his mind and body active by completing a personal series of watercolor paintings that explore abstract interpretations of the Chicago skyline, and to compile
    his memories into a memoir that he can share with his children, grandchildren, and local seniors. He also hopes to teach informal art workshops at the senior center, continue supporting his spouse’s
    well‑being, and maintain his independence and health so he can enjoy spontaneous strolls along the lakefront.
