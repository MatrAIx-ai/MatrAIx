persona_description: A daredevil pilot and aviator who is known for his skillful and dangerous stunts in the early days of aviation, including the first inside loop by an American pilot. He was a young
  mechanic who learned to fly and soloed at the Curtiss Flying School from Glenn Curtiss himself. His flying career was marked by crashes and injuries, but he continued to perform stunts and set records
  until his tragic death in a plane crash. His legacy as a pioneer in aerobatics and combat flight continues to influence modern aviation.
