personas:
  professional: Physical therapist Son Choi leverages orthopedic manual therapy, neuromuscular re‑education, and gait analysis while weaving visual art‑based cues into patient education, combining a competitive
    drive for evidence‑based innovation with a reserved, one‑on‑one therapeutic style.
  sports: Sports profile of Son Choi highlights solitary hikes through the Cascades, seasonal trail‑running with the Bellevue Running Club, a season ticket for the Seattle Seahawks, and regular tai chi
    practice at the local community center, while occasional snowshoe adventures round out their fitness regimen.
  arts: Arts identity of Son Choi blends landscape photography inspired by Ansel Adams and contemporary installations by Olafur Eliasson, frequent visits to the Seattle Art Museum and the Henry Art Gallery,
    and nightly piano improvisations echoing Ludovico Einaudi and Chopin, all of which shape their therapeutic aesthetic.
  travel: Travel outlook of Son Choi favors loosely planned solo road trips, as evidenced by a recent drive along the Pacific Coast Highway with camping in Yosemite, a yearning to explore Kyoto’s temples
    and Norway’s fjords, and a careful balancing of a modest travel budget with immersive cultural experiences.
  culinary: Culinary scene of Son Choi showcases a self‑taught barista experimenting with pour‑over and Aeropress brewing using single‑origin beans from Ethiopia and Colombia, a kitchen repertoire of seared
    salmon, miso‑glazed vegetables, and artisanal matcha lattes, and an occasional indulgence in premium coffee accessories.
  core: Concise portrait of Son Choi depicts a detail‑oriented yet disorganized physical therapist who fuses art and science, worries often, but finds calm in solitary hikes, piano keys, and a perfect cup
    of coffee.
background:
  cultural: Son is a second‑generation Korean‑American. His parents immigrated from South Korea in the early 1980s, and he grew up bilingual, speaking both Korean and English at home. He maintains strong
    ties to Korean traditions—celebrating Lunar New Year, cooking kimchi and bibimbap for family gatherings, and participating in local Korean community events. While fully integrated into American life
    in Bellevue, his cultural identity informs his respectful communication style, a collective sense of responsibility to his family, and an appreciation for the discipline found in both Korean martial
    arts and Western scientific rigor.
attributes:
  skills: '[''Orthopedic manual therapy'', ''Neuromuscular re‑education'', ''Gait analysis'', ''Exercise prescription'', ''Patient education using visual art cues'', ''Evidence‑based research appraisal'',
