  hobbies: '[''Landscape photography'', ''Visiting contemporary art exhibitions'', ''Playing piano'', ''Hiking the Cascades'', ''Experimenting with specialty coffee brewing'', ''Reading philosophy and neuroscience'',
    ''Practicing tai chi'', ''Gardening (horticulture)'', ''Attending Korean cultural festivals'', ''DIY home improvement projects'']'
  career_goals: Son strives to become the lead clinician at his Bellevue clinic and eventually open an integrative rehabilitation center that blends conventional physical therapy with creative therapies
    such as art‑based movement and mindfulness. He aims to earn a clinical doctorate focused on geriatric fall prevention, publish peer‑reviewed articles on innovative rehab protocols, and present at national
    conferences. His competitive nature fuels a desire to be recognized as a top practitioner in the Pacific Northwest, while his sensitivity to stress motivates him to model and teach stress‑management
    techniques to both patients and colleagues.
