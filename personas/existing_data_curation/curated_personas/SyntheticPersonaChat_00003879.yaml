    User 1: I will! I''m sure it''s even better than I imagine.

    User 2: It definitely is.

    User 1: What kind of food do you like to try?

    User 2: I like to try all kinds of food, but I especially like spicy food.

    User 1: Me too! I love the feeling of my mouth on fire.

    User 2: That''s the best!

    User 1: So, what are you doing for the rest of the day?

    User 2: I''m not sure yet. What are you doing?

    User 1: I''m not sure either. Maybe we could hang out?

    User 2: That sounds like fun! I''m free.

    User 1: Great! I''ll pick you up in 30 minutes.

