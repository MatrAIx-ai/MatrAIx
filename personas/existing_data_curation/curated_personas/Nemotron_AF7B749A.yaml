personas:
  professional: Jessica Szabo, a veteran long-haul and regional truck driver with over three decades of expertise in route optimization, vehicle maintenance, and client negotiations, lets her methodical,
    organized nature shine through meticulous log keeping and her calm, resilient demeanor that earns the trust of younger drivers she mentors, while her curiosity drives her to explore emerging logistics
    software as she prepares for a Certified Driver Trainer role.
  sports: Jessica Szabo enjoys low‑impact recreation such as early‑morning walks around Audrain Lake, occasional senior league bowling, and is a faithful fan of the St. Louis Cardinals and the St. Louis
    Blues, while she participates in a local fishing club that organizes monthly trips to the lake.
  arts: Jessica Szabo spends quiet evenings quilting intricate, heritage‑inspired patterns while listening to traditional folk melodies performed by ensembles like the Danube Folk Ensemble, and she regularly
    reads historical biographies by authors such as David McCullough and Carl Sandburg, which deepen her appreciation for Midwestern agricultural heritage.
  travel: Jessica Szabo prefers planned, low‑stress getaways, often driving to the historic town of Hermann, Missouri for its German‑style wineries, or taking a weekend road trip to the Lake of the Ozarks
    to fish, though she dreams of a pilgrimage to the Great Plains’ homestead museums in North Dakota and the rolling vineyards of Napa Valley.
  culinary: Jessica Szabo delights in preparing hearty paprika‑spiced beef goulash and golden fried lángos topped with sour cream and garlic, leveraging fresh carrots, potatoes, and sweet peppers from her
    garden, while her comfortable cooking skill level lets her experiment with slow‑cooker adaptations and occasional fusion of local Missouri barbecue sauces.
  core: Jessica Szabo blends a steadfast, methodical work ethic with a quiet love for solitary crafts, balancing long‑haul trucking grit with the gentle rhythm of gardening, quilting, and folk music, all
    while maintaining a calm resilience that makes her both a reliable mentor and a modest, thrifty community pillar.
background:
  cultural: Jessica is a third‑generation American of Hungarian descent; her family immigrated after World II, bringing traditions such as Hungarian folk dancing, language, and cuisine, which she preserves
    through cooking and occasional cultural celebrations. Raised in the Midwest, she embraces the values of modesty, hard work, and community involvement typical of rural Missouri towns. Her Catholic upbringing
    informs her participation in church activities and seasonal festivals. Living in Mexico, MO, she is also attuned to the agricultural rhythms of Audrain County, shaping her connection to the land and
    local farming culture.
attributes:
  skills: '[''Commercial Truck Driving'', ''Vehicle Maintenance'', ''Route Planning'', ''Customer Service'', ''Sales Negotiation'', ''Electronic Logging Device (ELD) Management'', ''Compliance Documentation'',
    ''Mentoring New Drivers'', ''Basic Fleet Management Software'']'
  hobbies: '[''Gardening'', ''Reading Historical Biographies'', ''Quilting'', ''Cooking Hungarian Cuisine'', ''Fishing'', ''Listening to Folk Music'', ''Attending Small Church Gatherings'']'
  career_goals: She aims to transition into a supervisory or training role within her company, leveraging her decades of experience to develop a driver mentorship program that emphasizes safety and efficiency.
    In the next five years, she hopes to obtain a Certified Driver Trainer designation, oversee a small team of drivers, and gradually reduce her on‑road hours while still staying involved in logistics
    planning. Long‑term, she plans to start a family‑run local delivery service that serves Audrain County's agricultural producers, ensuring a smooth hand‑off to her children and grandchildren.
