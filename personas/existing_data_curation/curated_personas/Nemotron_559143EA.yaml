personas:
  professional: Angela Osorio is an aspiring young robotics enthusiast who constructs intricate LEGO contraptions and sketches circuit diagrams, driven by a competitive spirit that pushes them to perfect
    every mechanism.
  sports: Angela Osorio is a budding soccer player with the Greenfield Mini Soccer Club, an enthusiastic fan of the Boston Red Sox, and a weekend hiker who joins family treks to the nearby Blue Ridge Trail,
    and they balance team competition with solitary nature runs.
  arts: Angela Osorio is an avid doodler who fills sketchbooks with Monet‑inspired watercolors, devours graphic novels such as Bone and Amulet, and treats piano practice like a mini‑concert of Debussy’s
    Arabesque, and they let these artistic pursuits shape their imaginative storytelling.
  travel: Angela Osorio loves organized day trips like the county museum and weekend camping at Shenandoah National Park, dreams of exploring the Smithsonian in Washington, D.C., and plans a future family
    vacation to Tokyo’s kid‑friendly science museums, and they prefer carefully plotted itineraries over spontaneous wanderings.
  culinary: Angela Osorio prefers homemade mac and cheese with extra cheddar, enjoys assembling their own veggie pizza topped with pepperoni and olives, and experiments with blending banana‑spinach smoothies,
    though they often forget to clean up the kitchen afterward.
  core: Angela Osorio is a meticulous, puzzle‑loving nine‑year‑old who balances a fierce competitive streak with quiet creativity, often hoarding crayons, secret snack stashes, and mismatched socks, and
    they relish solving every challenge with a critical eye.
background:
  cultural: 'Angela was born and raised in Canonsburg, a small town in Washington County, Pennsylvania. Her family identifies as white American, with a heritage that includes German and Irish ancestors,
    though they blend those roots into a broader American cultural identity. The local community emphasizes close‑knit relationships, school involvement, and participation in regional traditions such as
    the county fair, local sports events, and community theater. Angela’s upbringing reflects typical suburban‑rural values: a focus on education, respect for nature, and appreciation for the arts encouraged
    through school programs and the town’s public library. While she participates in family gatherings and occasional church services, her personal interests are shaped more by her curiosity and exposure
    to diverse ideas through books, museums, and online educational resources.'
