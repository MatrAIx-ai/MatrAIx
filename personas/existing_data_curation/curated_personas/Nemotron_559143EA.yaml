  career_goals: Although still young, Angela already envisions a future where she can combine her love of art and science. She dreams of becoming a wildlife illustrator who documents animals through detailed
    drawings, or a young researcher who creates interactive educational games that teach science concepts. She aspires to win her school's science fair and later compete in regional art competitions, aiming
    to be recognized for both her creativity and analytical skills. In the long term, she hopes to study environmental science or visual arts at a university where she can merge curiosity with tangible
    impact.
