  career_goals: Although retired from formal employment, Raven aims to deepen her impact as a volunteer mentor at the local senior center and the community arts program, sharing her art appreciation and
    life experiences with younger participants. She hopes to complete a memoir that weaves together her family's Great Migration story, civil-rights era memories, and personal reflections on art and resilience.
    Raven also plans to learn watercolor painting techniques through weekly classes at the Decatur Public Library and to travel to key African-American cultural sites, such as the National Museum of African
    American History and Culture in Washington, D.C., and the Delta blues trail in Mississippi. Maintaining her health and independence so she can continue attending church services, community gatherings,
    and family celebrations remains a core ambition.
