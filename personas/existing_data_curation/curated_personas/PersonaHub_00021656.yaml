persona_description: Judy Odendahl is a parent educator and professional with expertise in early intervention services for children with hearing loss, deaf education, and early childhood education. She
  has over 20 years of experience in the field and has developed the concept and format for the CID book, Super Sensational Science, and presented at national and international conferences of the Alexander
  Graham Bell Association for the Deaf and Hard of Hearing, Early Hearing Detection and Intervention, and the Pennsylvania Low Incidence Institute. She has also participated in the Global Foundation for
  Children with Hearing Loss to develop curricula and mentor professionals in Vietnam. Judy is credentialed in Missouri and Illinois and has a master's degree in early childhood education from the University
  of Texas — San Antonio.
