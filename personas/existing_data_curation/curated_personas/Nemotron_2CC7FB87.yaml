  career_goals: Robert aspires to become a civil engineer who designs safe, community‑focused infrastructure for small towns like Jesup. He dreams of building bridges and playgrounds that blend innovative
    design with practical utility. He also hopes to win a state science fair with a project on sustainable gardening, reflecting his desire for achievement and real‑world impact. In the longer term, he
    imagines teaching younger children basic coding and construction skills, combining his love of organization, mentorship, and community service.
