  hobbies: '[''Reading historical fiction and local history'', ''Community gardening'', ''Cooking family recipes'', ''Volunteering at senior center'', ''Participating in book club'', ''Hosting story hour
    for seniors'', ''Attending live jazz and karaoke'', ''Walking and street photography'', ''Playing bridge and bingo'', ''Collecting vintage postcards'']'
  career_goals: Carmen aims to transition from solely driving to a broader role within the transportation sector. Over the next few years, she plans to obtain a Defensive Driving Instructor certification
    and start a small, community‑focused shuttle service that transports seniors and individuals with limited mobility to medical appointments and social activities. She also aspires to formalize a mentorship
    program for new drivers, offering guided ride‑alongs and safety workshops. Beyond transportation, she hopes to establish a scholarship fund at her local community college for students pursuing degrees
    in logistics or business, leaving a legacy of safe, compassionate mobility for her community.
