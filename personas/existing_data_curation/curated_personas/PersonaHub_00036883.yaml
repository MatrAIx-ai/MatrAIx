persona_description: An assistant professor in leisure studies at the University of South Alabama with expertise in conducting field research related to leisure lifestyles, well-being, race and ethnicity,
  and population health in urban and rural settings. He has conducted leisure lifestyle research projects in six cities in China, three cities and three rural areas in Taiwan, one city in Korea, and one
  city in Japan. He has also been a project manager and research assistant, a Korea Foundation research fellow, and a visiting professor at the University of Ryukyus in Japan. He has co-authored "Leisure
  Constraints in Six Chinese Cities" in Leisure Sciences. He received his PhD from Pennsylvania State University.
