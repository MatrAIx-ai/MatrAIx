    User 1: So, what do you like to do when you''re not working?

    User 2: I like to spend time with my family and friends. I also like to read and go to the movies.

    User 1: That sounds like a lot of fun. I like to read too.

    User 2: Me too! What kind of books do you like to read?

    User 1: I like to read a variety of books, but I mostly read fiction.

    User 2: Me too! I love getting lost in a good story.

    User 1: Me too! It''s a great way to escape from the real world.

