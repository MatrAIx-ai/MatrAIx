  hobbies: '[''Landscape photography'', ''Sketching and watercolor painting'', ''Hiking in the Willamette Valley'', ''Reading speculative fiction'', ''Volunteering at animal shelter'', ''Playing indie video
    games'', ''Model building (scale models)'']'
  career_goals: Zachary intends to pursue a bachelor's degree in graphic design or community arts with a focus on socially engaged projects. His long‑term ambition is to become a community arts coordinator
    for a nonprofit organization that uses art therapy and public art installations to promote mental well‑being and social cohesion in under‑served neighborhoods. He also hopes to integrate environmental
    stewardship into his work, creating programs that connect art with local ecosystems. To prepare, he plans to take a gap year volunteering at a youth mentorship program and to secure an apprenticeship
    at the Oregon Museum of Art and Culture.
