  career_goals: Carolann loves to imagine her future in ways that let her care for others and stay connected to the predictable world she enjoys. She frequently says she wants to become a teacher so she
    can help other children learn in a structured classroom, a veterinarian because she adores the animals she sees at the local zoo and aquarium, or a marine biologist who studies the sea turtles and fish
    she encounters at the beach. She also dreams of being a 'helper' at home, like assisting her mom with cooking or looking after a younger sibling, reflecting her desire to be useful and nurturing.
