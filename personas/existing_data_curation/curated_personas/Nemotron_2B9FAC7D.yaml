personas:
  professional: Carolann Arias, a four‑year‑old budding builder who carefully arranges their wooden blocks into orderly towers before playtime yet happily dismantles them when a new story spark arises,
    exemplifies a practical mind that loves structure while embracing spontaneous flexibility.
  sports: Carolann Arias sprints across the local park's grass as a member of the Little Tigers Soccer Club on Saturday mornings, they cheer for the Chicago Cubs while also delighting in spontaneous puddle
    jumps, merging a love for structured team play with carefree physical fun.
  arts: Carolann Arias spends afternoons drawing whimsical animals after watching episodes of Bluey, they hum the classic tune of “Twinkle, Twinkle, Little Star” while coloring, and eagerly share their
    artwork with friends, reflecting a cooperative creative spirit anchored in predictable routines.
  travel: Carolann Arias eagerly anticipates family trips to Disneyland, where they follow the daily park map with wide‑eyed enthusiasm, yet they also cherish quiet moments building sandcastles on a secluded
    beach in Maui, balancing structured excitement with relaxed exploration.
  culinary: Carolann Arias prefers creamy mac‑and‑cheese, crunchy carrot sticks, and sweet strawberry yogurt, they love helping stir batter for banana muffins but occasionally sneak extra sprinkles when
    no adult watches, showcasing a practical palate that enjoys both order and spontaneous indulgence.
  core: Carolann Arias is a meticulously playful four‑year‑old who thrives on routine, they share generously, worry about small changes, and sneak extra sprinkles when no one looks.
background:
  cultural: Carolann grows up in a predominantly white, Anglo-American household in Tampa, Florida, within Pinellas County. Her family celebrates widely observed U.S. holidays such as Thanksgiving, Christmas,
    and Easter, and they also participate in local Florida traditions like beach outings, visits to the nearby Gulf Coast, and community events such as the annual Gasparilla Parade. The surname Arias hints
    at a Hispanic heritage, and the household incorporates occasional Spanish greetings and enjoys family meals that feature dishes like empanadas or arroz con pollo alongside typical American fare, creating
    a blended multicultural environment. The warm subtropical climate, frequent sunshine, and proximity to the ocean shape her daily experiences and inspire her love for marine life and outdoor play.
