    ''Emotional support and crisis de‑escalation'']'
  hobbies: '[''Salsa and cumbia dancing'', ''Cooking Bolivian cuisine'', ''Zumba fitness classes'', ''Hiking in local parks'', ''Photography'', ''Volunteering at health fairs'', ''Reading mindfulness and
    self‑help books'', ''Listening to Latin American folk music'']'
  career_goals: Leonor is determined to transition from a nursing assistant to a registered nurse, planning to enroll in a Bachelor of Science in Nursing program within the next two years. Her ambition
    is to work in a community health setting where she can leverage her bilingual abilities to improve access to care for immigrant and low‑income families in Fort Bend County. She hopes to specialize in
    pediatric or geriatric nursing, ultimately taking on a leadership role such as charge nurse or patient‑advocate, and to mentor fellow CNAs on culturally competent care.
