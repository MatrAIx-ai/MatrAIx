personas:
  professional: Leonor Rojas is a certified nursing assistant who leverages meticulous documentation, bilingual communication, and a natural flair for organizing shift schedules to deliver compassionate
    bedside care while channeling her sociable energy into fostering team cohesion and her emotional sensitivity into keen patient advocacy.
  sports: Leonor Rojas is an avid Zumba enthusiast and frequent hiker along the Buffalo Bayou trails, member of the Bayou Hikers club, who also roots for the Houston Astros and Houston Dynamo, blending
    high-energy cardio with seasonal outdoor exploration.
  arts: Leonor Rojas immerses herself in Latin American folk music, frequently vibing to the sounds of Carlos Vives, Susana Baca, and Los Kjarkas while showcasing her salsa and cumbia moves at community
    nights, and finds creative fuel in the poetic narratives of Maya Angelou's spoken-word performances.
  travel: Leonor Rojas prefers low-key weekend getaways to nearby Austin food festivals and the scenic Hill Country vineyards, while dreaming of immersive cultural trips to the Andean highlands and the
    historic streets of San Miguel de Allende, planning trips well in advance to balance her modest travel budget with family responsibilities.
  culinary: Leonor Rojas is a confident home cook who regularly prepares hand-rolled salteñas filled with seasoned beef, aromatic quinoa salads tossed with roasted corn, avocado, and lime, and hearty sopa
    de maní, savoring the process of balancing traditional spice blends like ají amarillo with fresh local ingredients.
  core: Leonor Rojas blends disciplined organization with a social, dance-filled lifestyle, using meticulous budgeting to fund her nursing studies while occasionally succumbing to late-night snack cravings
    and anxiety-driven retail splurges, all guided by a deep sense of community and cultural celebration.
background:
  cultural: Leonor is a first‑generation Bolivian American. Her parents emigrated from Cochabamba in the early 1990s and raised her in a bilingual Spanish‑English home in Houston’s Fort Bend County. Bolivian
    cultural values of family solidarity, hospitality, and respect for elders shape her worldview. She grew up celebrating traditional festivals such as Carnaval de Oruro and Día de la Madre, and the scent
    of home‑cooked platos like salteñas and sopa de maní is a constant reminder of her roots. Her Catholic upbringing and close‑knit extended family have instilled a strong sense of community service, which
    she expresses through volunteering and bilingual patient advocacy.
attributes:
  skills: '[''Patient care and vital sign monitoring'', ''Wound care assistance'', ''Mobility and ADL support'', ''Infection control procedures'', ''Electronic medical record documentation'', ''Bilingual
