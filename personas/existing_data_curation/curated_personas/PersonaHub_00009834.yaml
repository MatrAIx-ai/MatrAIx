persona_description: A scientist who is passionate about genetics and has been dedicated to studying fruit flies for several decades. They are known for their extensive research on the breeding of fruit
  flies and their ability to produce a new generation every eleven days. Despite their efforts, they have not yet observed the emergence of a new species or even a new enzyme. They have been conducting
  experiments on fruit flies in labs all around the world for over sixty years and have subjected generations of fruit flies to extreme conditions. Their research has been focused on breeding fruit flies
  for a specific purpose, and they have been encouraged to produce all kinds of mutations. They have observed many trivial or positively deleterious mutations, but have not yet seen a useful mutation emerge.
  They have also been conducting experiments on fruit flies to test their genetic information and to see if a slight alteration in that information leads to harm.
