personas:
  professional: Karina Cordova, an aspiring junior soccer captain and block‑building enthusiast, demonstrates how they merge their curiosity for new ways of constructing towers with a practical, organized
    approach to leading her neighborhood team, showing reliability and sociable teamwork.
  sports: Karina Cordova spends most weekends sprinting across the field for the Little Eagles, her neighborhood soccer club, while channeling the energy of the city’s professional team, Metro United, and
    idolizing striker Alex Ramirez, and they also dabble in indoor gymnastics during the colder months for a balanced athletic routine.
  arts: Karina Cordova expresses her artistic side by drawing vibrant animal sketches inspired by the illustrations of Eric Carle, dancing to the lively tunes of folk singer Lucia Rivera, and eagerly flipping
    through picture books like The Very Hungry Caterpillar by Dr. Seuss, which they find both entertaining and educational.
  travel: Karina Cordova loves spontaneous family outings to the nearby botanical garden and the city zoo, dreams of visiting the sandy beaches of Cancun, and eagerly plans future trips to the magical castles
    of Europe, preferring hands‑on discoveries over rigid itineraries, and they always pack a sketchbook for on‑the‑go doodles.
  culinary: Karina Cordova delights in kneading dough for chocolate‑chip cookies, sprinkling cinnamon on oatmeal raisin bites, munching fresh apple slices with peanut butter, and mixing banana‑strawberry
    smoothies with a splash of milk, often insisting on stirring the batter herself, a habit that showcases their practical curiosity in the kitchen, and they proudly declare each bite a tiny victory.
  core: Karina Cordova is a bright, energetic six‑year‑old who balances relentless curiosity with tidy practicality, though they sometimes forget to clean up their block towers before dinner.
background:
  cultural: Karina grows up in a Mexican‑American household in Salinas, California. Her family speaks both Spanish and English at home, celebrates traditions such as Día de los Muertos, Las Posadas, and
    Mexican holidays, and enjoys cooking dishes like tamales and tacos with her mother. The local agricultural community and frequent visits to the farmer's market expose her to fresh produce and farm life,
    reinforcing a respect for hard work and community values.
