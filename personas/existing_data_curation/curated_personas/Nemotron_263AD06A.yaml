personas:
  professional: Roberto Sanjuan is a retired community artisan who leverages his bilingual fluency, woodworking craftsmanship, and gifted storytelling to mentor seniors at the local senior center, lead
    traditional folk‑art workshops, and partner with a university oral‑history project to record elder narratives.
  sports: Roberto Sanjuan enjoys low‑impact activities such as daily walks around the neighborhood park, follows the Los Angeles Dodgers with devotion, and participates in a senior walking club that meets
    every Thursday at the local community garden.
  arts: Roberto Sanjuan expresses creativity through delicate watercolor landscapes of his childhood streets and California horizons, strums an acoustic guitar to bolero classics like "Sabor a Mí," attends
    intimate mariachi performances at local festivals, and reads poetry collections featuring Octavio Paz and Pablo Neruda.
  travel: Roberto Sanjuan prefers leisurely, culturally rich trips, having visited Yosemite National Park and the historic missions of San Juan Capistrano, while planning a heartfelt pilgrimage back to
    his birthplace on the Gulf Coast of Veracruz to reconnect with family roots and archival photo albums.
  culinary: Roberto Sanjuan delights in preparing traditional dishes such as mole, tamales, and freshly rolled tortillas, cultivating cilantro, chilies, and marigolds in his garden to enhance flavors, and
    pairing meals with homemade salsa verde and a glass of chilled horchata.
  core: Roberto Sanjuan is a reflective 73‑year‑old storyteller‑artisan who blends quiet imagination with community service, meticulous finances, diligent health care, modest sports enthusiasm, rich artistic
    pursuits, thoughtful travel, and flavorful cooking, all seasoned by a few endearing quirks like misplacing paint brushes and negotiating bedtime with the grandkids.
background:
  cultural: Roberto was born to Mexican immigrant parents who settled in Southern California during the 1950s. Raised in a bilingual household, he grew up celebrating Mexican traditions such as Día de los
    Muertos, Las Posadas, and quinceañeras, while also adapting to the multicultural environment of Orange County. His family emphasized the importance of community, respect for elders, and the preservation
    of Mexican folk arts, including pottery, papel picado, and storytelling. These cultural foundations shape his identity and guide his ongoing commitment to sharing Mexican heritage with younger generations
    in his community.
attributes:
  skills: '[''Bilingual Spanish‑English communication'', ''Traditional Mexican cooking'', ''Backyard gardening and herb cultivation'', ''Woodworking and carpentry'', ''Storytelling and oral history preservation'',
