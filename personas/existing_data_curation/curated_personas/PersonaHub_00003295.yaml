persona_description: A person interested in digital education and accessibility, particularly those who are digitally excluded or have disabilities. They are likely to have a background in education, technology,
  or disability studies and are interested in exploring innovative methods and practices to promote inclusive education and enhance digital skills and competences for these groups. They are also likely
  to be familiar with the ENTELIS+ project and its goals of developing and implementing innovative methods and practices to foster inclusive education and enhancing the digital skills and competences of
  digitally excluded groups, particularly persons with disabilities of all ages.
