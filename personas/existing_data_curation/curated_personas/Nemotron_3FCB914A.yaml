personas:
  professional: Andrew Perkins is a ten-year-old aspiring engineer who spends after-school hours designing intricate LEGO structures, coding simple games in Scratch, and mastering chess strategies, and
    they channel their meticulous, competitive nature into every project.
  sports: Andrew Perkins plays shortstop on the town’s Little League baseball team, cheers for the Cleveland Browns on weekend game nights, and follows the Ohio State Buckeyes men’s basketball, and they
    balance their competitive drive on the field with a disciplined practice schedule.
  arts: Andrew Perkins channels a love of structure into artistic pursuits, constructing elaborate LEGO cityscapes while listening to the cinematic scores of Hans Zimmer and the pop-rock energy of Imagine
    Dragons, and they occasionally sketch vehicle designs inspired by the classic model-car collection at home.
  travel: Andrew Perkins enjoys family road trips to the Ohio State Fair and nearby Cedar Point amusement park, dreams of a guided tour of NASA's Kennedy Space Center in Florida, and they prefer itineraries
    that include scheduled museum visits and hands-on science exhibits.
  culinary: Andrew Perkins prefers classic comfort foods such as pepperoni pizza, cheesy macaroni, and chicken nuggets, often helping their dad grill cheese-filled quesadillas with extra cheddar, and they
    secretly sneak in a dash of hot sauce for a thrill.
  core: Andrew Perkins is a disciplined, puzzle-loving ten-year-old whose relentless pursuit of perfect LEGO builds and chess victories fuels their competitive spirit, even as they sometimes forget to do
    homework in favor of a new model car.
background:
  cultural: Raised in a predominantly white, middle‑class family in Wellington, Ohio, where Midwestern values such as community involvement, family meals, and emphasis on education are prominent. Attends
    the local public elementary school, participates in a small community church youth group, and shares regional customs like weekend sports events and local fairs.
