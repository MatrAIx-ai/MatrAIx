  career_goals: Looking ahead, Christian aims to translate his practical experience into a leadership role on the plant floor. He hopes to become a shift supervisor or a maintenance technician, which would
    allow him to mentor newer workers and influence safety and efficiency standards. To support this, he plans to enroll in a technical certification program in industrial maintenance. Ultimately, he wants
    a stable, higher‑earning position that provides for his growing family while preserving the work‑life balance he values.
