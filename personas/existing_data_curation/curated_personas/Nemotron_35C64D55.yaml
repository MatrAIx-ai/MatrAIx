personas:
  professional: Donald Graham is a meticulous mechanical engineer who fuses CAD mastery in SolidWorks with an artistic eye, delivering sustainable product designs that balance performance, lean Six Sigma
    efficiency, and striking visual appeal while aiming to lead R&D teams and secure patents.
  sports: Donald Graham hikes steep trails in the Watchung Reservation with a local outdoor club, follows the New York Giants during football season, and runs a few miles each week with the New Jersey Track
    Club, preferring solitary endurance activities over team sports.
  arts: Donald Graham explores visual arts by photographing industrial sites in the style of Bernd and Hilla Becher, sketches architectural concepts inspired by Zaha Hadid, and attends exhibitions featuring
    works by Ai Weiwei and James Turrell, all of which feed their unconventional engineering ideas.
  travel: Donald Graham plans trips with meticulous spreadsheets, prefers immersive field trips like a two‑week design tour of Bauhaus landmarks in Germany and a solo trek through the Icelandic highlands,
    but budget constraints keep most getaways within the Northeastern U.S., such as weekend stays in Boston’s maker districts.
  culinary: Donald Graham enjoys cooking sous‑vide salmon with a citrus‑herb glaze, experimenting with matcha‑infused desserts, and sourcing fresh herbs from local farmers’ markets, yet they admit a habit
    of ordering late‑night ramen after late‑night CAD sessions.
  core: Donald Graham is a disciplined yet curious engineer who blends artistic flair with rigorous data, channeling competitive energy into innovative designs while occasionally succumbing to late‑night
    tech cravings and ergonomic oversights.
background:
  cultural: Donald grew up in a middle-class, predominantly white suburban community in Somerset County, New Jersey. His family emphasized education, self-reliance, and community involvement, typical of
    the Northeastern United States. He was exposed to a blend of American cultural values—individualism, merit-based achievement, and an appreciation for the arts through frequent visits to nearby museums
    in New York and Philadelphia. This environment fostered his curiosity, disciplined work ethic, and openness to artistic influences within engineering contexts.
attributes:
  skills: '[''SolidWorks'', ''Autodesk Inventor'', ''ANSYS'', ''MATLAB'', ''Python'', ''GD&T'', ''CNC machining'', ''Additive manufacturing'', ''Lean Six Sigma'', ''Project management'', ''Technical writing'',
    ''Industrial design aesthetic integration'']'
  hobbies: '[''Industrial photography'', ''Sketching and painting'', ''3D-printing projects'', ''Scale model kit building'', ''Reading science-fiction'', ''Solo hiking'', ''Maker-space workshops'', ''Art
    exhibition visits'']'
  career_goals: Donald aims to become a lead mechanical engineer or R&D manager within five years, focusing on sustainable product development and innovative technologies such as lightweight composites
    and renewable energy systems. He plans to earn his Professional Engineer (PE) license, pursue a Master's degree in Mechanical Engineering or Engineering Management, and secure patents for novel design
    solutions. Ultimately, he envisions founding a boutique engineering consultancy that merges high-performance engineering with artistic design, positioning himself as a competitive thought-leader in
    the industry.
