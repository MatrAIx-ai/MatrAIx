personas:
  professional: Bernice Owens, a 31‑year‑old systems analyst with a keen eye for process optimization and a competitive edge, leverages her SQL, Python, and AWS expertise to design efficient workflows while
    challenging teammates to exceed performance benchmarks on every project.
  sports: Bernice Owens, an avid participant in the Red River Run Club’s early‑morning 5K runs and a regular at the Bossier City Yoga Studio, follows the New Orleans Saints and LSU Tigers with a competitive
    spirit, cross‑trains with indoor cycling in winter, and joins community escape‑room tournaments for mental agility.
  arts: Bernice Owens, a choir‑volunteering enthusiast who curates gospel music nights and unwinds to the smooth sounds of Miles Davis, Erykah Badu, and John Legend, channels her creative side by dabbling
    in amateur songwriting, and draws inspiration from jazz improvisation when tackling complex system designs.
  travel: Bernice Owens, who favors meticulously planned weekend getaways to music‑rich cities such as New Orleans for Mardi Gras, Austin for South by Southwest, and Charleston’s historic district, balances
    her adventurous curiosity with a moderate budget that prioritizes cultural immersion over luxury lodging.
  culinary: Bernice Owens, a self‑taught home chef whose culinary adventures blend Southern comfort staples—like shrimp‑and‑grits with miso glaze and chicken fried steak topped with sriracha‑infused jam—using
    smoked paprika, fresh basil, and pomegranate seeds to add contemporary twists, often sourced from the Bossier City farmer’s market.
  core: Bernice Owens fuses a data‑driven, competitive mindset with a love for Southern flavors and weekend escapades, yet habitually procrastinates on flossing and can’t resist a late‑night strategy game
    binge when a project deadline looms.
background:
  cultural: Bernice is a 31-year-old African-American woman who grew up in Bossier City, Louisiana. Her family’s heritage is rooted in the Creole and Southern Black communities of the region, giving her
    a cultural identity shaped by church fellowship, family gatherings, and the rich culinary traditions of the Gulf Coast. The legacy of Southern hospitality combined with a history of civil-rights activism
    informs her practical outlook and competitive drive. She values self-reliance while staying connected to her community, regularly attending church services, participating in gospel choirs, and contributing
    to mentorship programs that support other young Black professionals in the area. Her cultural experiences blend the rhythms of blues and jazz with the resilience and optimism characteristic of the Southern
    African-American experience.
attributes:
  skills: '["Systems analysis", "Requirements gathering", "Process optimization", "SQL querying", "Python scripting", "PowerShell scripting", "Network fundamentals", "AWS cloud basics", "ITIL incident and
