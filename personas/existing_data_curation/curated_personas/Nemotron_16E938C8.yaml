  hobbies: '["Running (5K races)", "Yoga", "Escape-room puzzles", "Strategy video gaming", "Reading techno-thrillers", "Reading African-American historical fiction", "Cooking Southern comfort food with
    modern twists", "Church choir participation", "Gospel music events", "Mentoring high-school students in coding", "Listening to R&B and jazz", "Attending local cultural festivals"]'
  career_goals: Bernice aims to leverage her blend of curiosity and practicality to advance into senior technical leadership. In the next three to five years she plans to earn CompTIA Security+ and AWS
    Solutions Architect certifications, then transition to a senior systems analyst role where she can lead larger projects and mentor junior staff. Her longer-term ambition is to become an IT project manager
    or head of technology services for a mid-size company, overseeing cross-functional teams, driving digital transformation, and eventually launching her own consulting practice focused on streamlining
    operations for small businesses in the Gulf Coast region. She is motivated by competitive achievement and personal mastery, seeking positions that reward results and offer clear pathways for advancement.
