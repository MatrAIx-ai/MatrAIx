  career_goals: Taris dreams of becoming a wildlife ranger who protects the desert animals she loves to watch, while also sharing her tribe's stories about the land. She imagines a future where she can
    teach younger children about nature and cultural heritage, perhaps as a storyteller‑teacher. Her practical side hopes to combine caring for the environment with a role that helps her community, so she
    often talks about being a protector of both the earth and her people's traditions.
