  hobbies: '[''Chess'', ''Morning jogs'', ''Weight training'', ''Reading financial news and industry journals'', ''Korean calligraphy'', ''Cooking traditional Korean and Chinese dishes'', ''Sudoku puzzle
    solving'', ''Volunteer financial literacy workshops'', ''Listening to classical music'', ''Attending Lunar New Year celebrations'']'
  career_goals: Driven by a competitive streak and a desire for measurable achievement, Hong aims to advance rapidly within the finance hierarchy. Over the next three years he plans to earn his Certified
    Public Accountant (CPA) credential and begin the Chartered Financial Analyst (CFA) program, positioning himself for senior finance leadership. His short‑term goal is to lead a regional budgeting and
    forecasting initiative that reduces cycle time by 15 % while enhancing forecast accuracy. In the medium term, he aspires to become a Finance Director or Chief Financial Officer for a growth‑oriented
    company, where he can shape financial strategy, drive cost‑optimization projects, and mentor junior analysts. He also hopes to develop a niche expertise in financial technology integration, particularly
    automating reporting workflows, to stay ahead of industry trends.
