persona_description: A researcher who is interested in the history of higher education in Australia, particularly focusing on the growth and development of the public universities in New South Wales. They
  are particularly interested in the early years of the University of Sydney and its growth under the reforms in secondary education, and are looking for information on the alumni of the university from
  1857 to 1980. They are also interested in the digitized and published historical materials of the universities, such as Church records, rare books, and photographic collections. Additionally, they are
  interested in the student newspapers and magazines that were published by the universities, as well as the student newspaper Honi Soit. They are also interested in the public universities in New South
  Wales, such as the University of New South Wales, University of New England, University of Newcastle, University of Technology Sydney, University of Wollongong, University of Western Sydney, Charles Sturt
  University, and Southern Cross University, and the digitized and published historical materials of these universities.
