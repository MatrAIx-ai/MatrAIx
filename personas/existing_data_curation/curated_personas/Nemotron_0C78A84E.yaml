  hobbies: '[''Abstract painting'', ''Digital illustration'', ''Reading speculative fiction and poetry'', ''Creative writing (short stories)'', ''Hiking in the San Gabriel Mountains'', ''Yoga and meditation'',
    ''Exploring virtual reality experiences'', ''Attending small art gallery openings'', ''Small-group board game nights (e.g., Dungeons & Dragons, Settlers of Catan)'', ''Gardening (herbs and succulents)'']'
  career_goals: Tina aims to become a recognized thought leader in innovative learning experiences, especially at the intersection of STEM and creative arts. Over the next five years she plans to earn advanced
    certifications (CPLP, Instructional Design Mastery) and deepen her expertise in immersive technologies such as AR/VR to design experiential training programs. She envisions launching a boutique learning
    consultancy that partners with tech startups and community organizations in the Los Angeles area to deliver flexible, self-paced, gamified learning solutions. Long-term, she aspires to take on a senior
    strategic role—Director of Learning & Development—where she can shape organizational culture, champion diversity and inclusion in STEM education, and mentor the next generation of instructional designers.
