personas:
  professional: A forward‑thinking instructional designer, Tina Rivers blends their STEM background with a love for abstract art to craft immersive AR/VR learning experiences that gamify complex concepts,
    while their relaxed, sometimes disorganized, work style favors flexible deadlines over rigid planning.
  sports: An avid outdoor enthusiast, Tina Rivers spends weekends trekking the San Gabriel Mountains, practices Vinyasa yoga at a local studio, roots for the Los Angeles Clippers and LA Galaxy, and occasionally
    joins a weekend hiking club that meets at the foothills of Mount Baldy.
  arts: A passionate creator, Tina Rivers immerses themselves in abstract painting and digital illustration, drawing inspiration from artists such as Yayoi Kusama and James Turrell, while attending gallery
    openings featuring cutting‑edge VR installations, listening to Björk’s experimental albums, and quoting modern poets like Ocean Vuong during storytelling‑focused board‑game nights.
  travel: A curiosity‑driven traveler, Tina Rivers prefers spontaneous, small‑group getaways that blend nature and culture, having hiked the red rocks of Joshua Tree, explored Berlin’s vibrant street‑art
    scene, and dreaming of a VR‑enhanced pilgrimage to Kyoto’s ancient temples.
  culinary: A culinary experimenter, Tina Rivers cultivates basil, rosemary, and succulents in their garden, enjoys crafting herb‑infused pesto for homemade gnocchi, frequently orders a spicy lentil‑taco
    bowl with avocado at local vegan eateries, and delights in tasting menus that highlight fermented miso‑glazed eggplant.
  core: Tina Rivers is a 41‑year‑old learning architect who fuses STEM rigor with artistic whimsy, thrives on flexible, solitary creativity, and balances mindful health habits with occasional impulsive
    splurges on tech and art.
background:
  cultural: Tina grew up in a middle-class, Anglo-American family in Southern California, where the West Coast blend of progressive values, environmental awareness, and a vibrant arts scene shaped her worldview.
    Living in Altadena—nestled against the foothills of the San Gabriel Mountains—has fostered a deep appreciation for outdoor recreation and a laid-back lifestyle. The multicultural tapestry of Los Angeles
    County exposed her to diverse perspectives, reinforcing her inclusive mindset and curiosity about different cultures. While her ethnic background is white, she identifies with the region’s eclectic,
    bohemian subculture, valuing independence, intellectual exploration, and a commitment to lifelong learning.
attributes:
