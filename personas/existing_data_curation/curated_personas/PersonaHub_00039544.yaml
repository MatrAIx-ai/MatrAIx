persona_description: A neurologist who specializes in the diagnosis, treatment, and management of disorders, diseases, and injuries affecting the nervous system, including the brain, spinal cord, nerves,
  and muscles. They are responsible for long-term care for patients with conditions such as multiple sclerosis (MS), Alzheimer's disease, Parkinson's disease, and other nervous system diseases. A neurologist
  performs a variety of procedures, including CAT scans, MRIs, EEGs, and spinal taps, and examines the performance of different areas of the body, including the level of consciousness, memory, eye reflexes,
  hearing, taste, and smell, abnormal movements or twitching, skin and muscle sensations, coordination, and the ability of the patient to walk. A neurologist will also refer a patient to a pediatric neurologist
  if there is a concern regarding a possible disorder or illness involving the nervous system.
