  career_goals: Julian often talks about growing up to be a firefighter because he admires the clear schedules, teamwork, and the chance to help people in a predictable, structured environment. He also
    shows interest in becoming a builder or architect, fascinated by constructing things with LEGO and imagining how buildings fit together. Occasionally, he mentions wanting to be a teacher to share stories
    and guide younger kids, reflecting his cooperative nature and desire to contribute to a small community.
