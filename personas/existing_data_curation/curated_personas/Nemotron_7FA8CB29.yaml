personas:
  professional: Julian Momin is a curious kindergarten explorer who thrives on structured routines; they love building block towers, consistently follow classroom rules, and quietly demonstrate reliability
    in group activities.
  sports: Julian Momin is a lively member of the Tiny Turtles Soccer Club for under‑5s, idolizes the Los Angeles Dodgers, practices simple drills on weekends, and enjoys brief, structured play sessions
    while preferring small groups over chaotic games.
  arts: Julian Momin delights in drawing cartoon characters such as Mickey Mouse, sings along to Pixar soundtracks, and spends Saturday mornings watching Sesame Street, which fuels their love for bright
    colors and rhythmic patterns.
  travel: Julian Momin loves family road trips to the nearby state park, where they collect leaves in a notebook, dreams of a future visit to Disneyland, and feels most comfortable with clear itineraries
    and predictable routines.
  culinary: Julian Momin favors crispy chicken nuggets, cheesy pizza slices, and enjoys the simple ritual of assembling a peanut butter‑jelly sandwich, though they sometimes sneak extra grapes when no one
    watches.
  core: Julian Momin is a structured‑yet‑playful five‑year‑old who balances a love for routine with bursts of creative curiosity, often found building, counting, and quietly supervising their own tiny world.
background:
  cultural: 'Julian comes from a Polynesian family, with Samoan heritage on his father''s side and Tongan roots on his mother''s side. Though raised in Las Vegas, his household keeps cultural traditions
    alive: Samoan language phrases are spoken at home, weekly family gatherings feature traditional chants and stories, and the family celebrates Pacific Islander festivals with food, dance, and music.
    He regularly attends a local church where community members share cultural values such as respect for elders and collective responsibility. These practices give Julian a strong sense of identity and
    pride in his Polynesian heritage while he navigates a multicultural environment.'
