persona_description: A researcher and scientist who specializes in the development and creation of comprehensive, legally endorsed definitions of whole grain flour and products. This individual is involved
  in the HEALTHGRAIN EU project, which aims to increase the use of whole grains and their health protecting constituents in food products for improved nutrition and health benefits. The researcher works
  with a multidisciplinary group of nutrition scientists, cereal scientists and technologists, plant breeders, flour milling specialists, and experts in regulatory affairs from throughout Europe to develop
  and refine the HEALTHGRAIN definition. The individual has a deep understanding of the complex issues surrounding the definition of whole grain, including the need for a precise, common understanding of
  what constitutes whole grain in food products, regardless of where they originate, and the importance of processing practices that can affect the resulting flour's nutritional value. The researcher is
  also known for their expertise in developing and implementing new ways to get products high in their healthy compounds onto the market.
