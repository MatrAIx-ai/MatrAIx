    (painting, sketching)'', ''Walking groups and light exercise'']'
  career_goals: Even in retirement, Eudaldo aims to leave a lasting cultural legacy. He plans to launch a community‑based program that teaches Salvadoran cooking and storytelling to younger residents, preserving
    heritage while fostering intergenerational bonds. He wishes to compile a memoir that blends his personal journey with the broader story of the Salvadoran diaspora in Georgia. Mentoring youth interested
    in the arts is a priority, and he hopes to expand the local senior garden project to create more collaborative, health‑focused spaces. Ultimately, he seeks to be recognized as a catalyst for cultural
    pride and community cohesion.
