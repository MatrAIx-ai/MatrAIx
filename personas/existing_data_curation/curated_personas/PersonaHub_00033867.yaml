persona_description: A designer who specializes in the design and assembly of flexible circuits, particularly in the area of bend and fold design. They are skilled in the use of IPC-2223 guidelines and
  are familiar with the use of cold forming, thermal forming, and form-in-place methods to permanently form flexible circuits. They are also aware of the potential stress and cracking conditions that can
  occur in the copper foil during the bend and fold process and have experience in designing and implementing solutions to minimize these conditions.
