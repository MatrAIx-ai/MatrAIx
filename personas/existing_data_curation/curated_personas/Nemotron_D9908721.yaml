personas:
  professional: An experienced retail operations manager, Jennifer Hamze blends two decades of hands‑on team leadership, data‑driven budgeting, and design‑thinking into daily store stewardship; they excel
    at visual merchandising, conflict resolution, and optimizing inventory, and are currently studying for a PMP certification to pivot into a senior regional supervisory role that can embed creativity
    into corporate culture.
  sports: An avid hiker and weekend trail runner, Jennifer Hamze tackles the Pueblo Reservoir Trail and the foothills at least three times a week, often joining the Pueblo Hiking Association for group outings;
    they proudly root for the Colorado Rockies, Denver Broncos, and Colorado Avalanche, and they blend competitive spirit into personal fitness by setting incremental elevation goals while also practicing
    yoga for flexibility, though they admit to occasionally skipping a workout when a new art project demands extra time.
  arts: A dedicated watercolorist and landscape photographer, Jennifer Hamze spends Saturdays at the Pueblo Art Museum and local galleries, sketching Rocky Mountain vistas and capturing candid street scenes
    with a Fuji X‑100; they frequently attend productions at the Pueblo Playhouse, take pottery classes at Clayworks Studio, and draw inspiration from Ansel Adams, Georgia O'Keeffe, and contemporary Pueblo
    artist Maria L. Duarte, channeling their curiosity into experimental mixed‑media pieces, even if they sometimes become overly engrossed and lose track of time.
  travel: A semi‑planned adventure seeker, Jennifer Hamze enjoys road‑trip explorations of the Southwest, having recently visited Santa Fe, Sedona, and the Grand Canyon to photograph sunrise vistas; they
    dream of a culinary immersion in Oaxaca, Mexico, and an art‑focused weekend in Barcelona, balancing a flexible itinerary with a modest travel budget, and they often pack a lightweight tripod for on‑the‑go
    photography, though they admit to occasionally over‑packing due to a love of collecting local spices.
  culinary: A passionate home chef, Jennifer Hamze blends Southwestern flavors with global spices, routinely crafting chipotle‑lime shrimp tacos, quinoa‑crusted enchiladas with harissa, and black‑bean chile
    rellenos topped with fresh cilantro; they favor ingredients like ancho chilies, smoked paprika, black garlic, and mezcal, source produce from the Pueblo farmer’s market, and consider themselves an intermediate
    cook who occasionally over‑spices dishes, leading friends to jokingly call them the “spice alchemist.”
  core: Jennifer Hamze merges sharp retail analytics with an insatiable artistic curiosity, channeling a competitive edge into community‑focused art initiatives while navigating disciplined finances and
    proactive health habits.
background:
  cultural: Jennifer was raised in a middle‑class family in the American West, with roots tracing back to German and Irish ancestry. Growing up in Pueblo, Colorado, she absorbed the city’s blend of Anglo‑American,
    Hispanic, and Pueblo Indian influences, which fostered an appreciation for cultural diversity while retaining a strong work ethic typical of the region. Her family’s values emphasized self‑reliance,
    community participation, and respect for the outdoors—principles that continue to shape her outlook today. Although she identifies as white, she feels a deep connection to Pueblo’s local traditions,
    such as the annual Balloon Festival and the region’s vibrant Southwestern cuisine, and she often incorporates this cultural awareness into both her professional initiatives and personal pursuits.
