  career_goals: She aims to leverage her managerial experience to transition into a senior regional supervisory role within the next three years, overseeing multiple locations and shaping corporate culture
    around creativity and continuous improvement. Jennifer also aspires to earn a professional certification in project management (PMP) or operations management, which will formalize her expertise and
    open pathways to consulting for small businesses seeking to integrate art‑focused branding. Long‑term, she envisions establishing a community art hub in Pueblo, where she can combine her operational
    acumen with her love for the arts, offering workshops, exhibitions, and mentorship to emerging local creators.
