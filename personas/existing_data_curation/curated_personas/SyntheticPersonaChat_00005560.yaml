    User 1: So, what''s your favorite beach?

    User 2: I have a few favorites, but one of my favorites is Maui.

    User 1: Maui! I''ve always wanted to go there.

    User 2: It''s beautiful! The water is crystal clear and the sand is white and soft.

    User 1: It sounds amazing!

    User 2: It is. I hope you get to go there someday.

    User 1: I hope so too.'
