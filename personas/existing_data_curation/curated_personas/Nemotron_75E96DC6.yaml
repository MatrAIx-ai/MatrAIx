    ''Digital art (Canva)'']'
  career_goals: She aims to complete her bachelor's degree in Business Administration (or a related field) within the next two years, with the goal of securing a role as a project coordinator for a nonprofit
    organization focused on community development or environmental sustainability. Long‑term, she envisions leading a small consultancy that helps local businesses adopt sustainable practices while also
    considering a future entrepreneurial venture in eco‑friendly home products.
