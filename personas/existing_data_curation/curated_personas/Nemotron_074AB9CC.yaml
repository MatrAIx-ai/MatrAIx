  hobbies: '["Gardening", "Coastal Trail Walking & Photography", "Reading Historical Fiction & Memoirs", "Book Club", "Volunteering at Local Food Pantry", "Cooking with Home‑Grown Herbs", "Yoga & Mindfulness
    Meditation", "Crocheting for Charity", "Attending Community Theater"]'
  career_goals: Angelique is driven to expand the impact of her community service work by leading a region‑wide initiative that integrates mental‑health support for seniors and underserved families. Over
    the next five years, she aims to transition into an executive director role where she can influence strategic planning, deepen partnerships with state agencies, and increase annual funding by at least
    30 percent. She also intends to mentor emerging social service managers, develop a scalable training curriculum on flexible program management, and author a practical guidebook that bridges innovative
    social‑service models with the realities of modest nonprofit budgets. Balancing these professional aspirations with her need for personal well‑being, she plans to embed regular self‑care practices into
    her leadership routine.
