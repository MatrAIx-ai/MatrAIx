    leadership and mentorship'', ''Risk assessment and mitigation'']'
  hobbies: '[''Cooking South Asian cuisine'', ''Yoga and meditation'', ''Reading literary fiction and poetry'', ''Sketching architectural forms'', ''Photography of built environments'', ''Hiking in Texas
    Hill Country'', ''Visiting art galleries and museums'', ''Volunteer work at local cultural center'', ''Learning Urdu calligraphy'']'
  career_goals: Erum aims to become a senior architect and eventually a principal leading a boutique practice that specializes in sustainable, culturally nuanced projects for diverse communities, especially
    South Asian diaspora groups in the Dallas‑Fort Worth area. She plans to earn her LEED Accredited Professional credential within the next two years and to take on larger, mixed‑use developments that
    integrate green infrastructure and heritage motifs. Long‑term, she envisions founding her own firm that prioritizes mentorship of women and underrepresented minorities in architecture, while maintaining
    a balanced workload that supports her mental well‑being and allows her to stay connected to her creative passions.
