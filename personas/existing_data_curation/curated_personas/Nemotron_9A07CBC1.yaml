personas:
  professional: Erum Harwani is a licensed architect who merges precise BIM and code expertise with culturally responsive design, leading multidisciplinary teams through structured project timelines while
    quietly battling a perfectionist streak that fuels both high-quality outcomes and occasional stress.
  sports: Erum Harwani hikes the Texas Hill Country with a local outdoor club every other weekend, supports the Dallas Cowboys on game days, and participates in a co‑ed recreational volleyball league at
    the Plano community center, balancing structured cardio with occasional competitive play.
  arts: Erum Harwani spends evenings sketching historic facades after visiting exhibitions by photographer Steve McCurry and installations by artist Yayoi Kusama, recites verses from poet Rumi, and unwinds
    listening to the soulful chants of Nusrat Fateh Ali Khan.
  travel: Erum Harwani meticulously plans each trip using a detailed travel journal, favors culturally immersive stays such as a week‑long design retreat in Marrakech and a weekend exploring Kyoto’s temples,
    and dreams of exploring Barcelona’s modernist architecture when time and budget align.
  culinary: Erum Harwani is a dedicated home chef who perfects classic biryani, samosas, and spiced chai, often experimenting with quinoa‑based biryani and roasted cauliflower fillings, and they enjoy dining
    at farm‑to‑table bistros that showcase seasonal heirloom tomatoes and microgreens.
  core: Erum Harwani balances a disciplined, detail‑driven architecture career with a passion for cultural cooking and yoga, yet their tendency to over‑plan fuels late‑night anxiety and an occasional habit
    of scrolling design forums until sunrise.
background:
  cultural: Erum is a second‑generation South Asian American, raised in a Pakistani‑American household in Texas. She grew up bilingual in English and Urdu, observing cultural traditions such as Ramadan,
    Eid al‑Fitr, and family gatherings that feature classic dishes and poetry recitals. Her parents emphasized education, respect for elders, and community service, values that still guide her professional
    ethos. While fully integrated into the Plano community, she maintains strong ties to her heritage through language, cuisine, and participation in local South Asian cultural festivals, often drawing
    on these experiences to inform her design work and promote inclusive spaces.
attributes:
  skills: '[''Architectural design'', ''Building information modeling (BIM) with Revit'', ''AutoCAD drafting'', ''SketchUp 3D modeling'', ''Sustainable design and LEED certification'', ''Construction documentation
