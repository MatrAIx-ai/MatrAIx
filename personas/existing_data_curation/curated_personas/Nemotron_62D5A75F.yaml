  hobbies: '[''Art Gallery Visits'', ''Watercolor Painting'', ''Salsa Dancing'', ''Cuban Cooking'', ''Street Photography'', ''Reading Detective Fiction'', ''Meditation'', ''Community Digital Literacy Volunteering'']'
  career_goals: Eddy aims to transition from field investigations to a mentorship and consulting role, where he can train the next generation of private detectives in Miami’s culturally diverse environment.
    He hopes to establish a boutique consultancy specializing in art‑theft cases and cyber‑fraud, leveraging his art appreciation and digital skills. Over the next five years, he plans to author a memoir
    that blends investigative anecdotes with Cuban cultural reflections, and to collaborate with local law‑enforcement agencies on community‑focused crime‑prevention programs. Ultimately, Eddy wants to
    secure a balanced schedule that allows more quality time with his wife and involvement in community cultural projects.
