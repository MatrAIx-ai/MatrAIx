personas:
  professional: Eddy Gamez, a veteran private investigator specializing in art theft and digital fraud, blends their methodical, organized approach and bilingual fluency with a keen curiosity for visual
    culture to uncover forgeries, mentor emerging detectives, and provide expert courtroom testimony.
  sports: Eddy Gamez, an avid supporter of the Miami Heat and Inter Miami CF, spends weekday mornings swimming laps at the Miami Beach community pool, plays doubles tennis with the Miami Senior Tennis Club,
    and joins a seasonal beach‑volleyball league each summer to stay fit; they view regular physical activity as essential to maintaining the sharp focus required in their investigations.
  arts: Eddy Gamez, a devoted patron of Miami’s art scene, regularly attends openings at the Pérez Art Museum Miami, studies works by Jeff Koons, Kehinde Wiley, and street muralist Futura, enjoys listening
    to the timeless salsa of Celia Cruz and the modern jazz of Arturo Sandoval, and experiments with watercolor portraits inspired by the techniques of Alvaro Castagnet; they find that immersing themselves
    in diverse artistic expressions fuels their investigative intuition.
  travel: Eddy Gamez, a meticulous planner, prefers art‑focused pilgrimages to cities like New York’s Chelsea galleries, Paris’s Musée d’Orsay, and Barcelona’s Picasso Museum, while also carving out weekend
    escapes to the Florida Keys for relaxed fishing trips; they balance their travel budget with consultancy commitments and family time.
  culinary: Eddy Gamez, an enthusiastic home cook, masters the slow‑cooked flavors of ropa vieja, the savory blend of picadillo with olives and raisins, and the bright zest of mojo‑marinated chicken, often
    sourcing fresh plantains, cumin, and aged rum for sauces, while they occasionally treat themselves to upscale Latin fusion at Miami’s top restaurants.
  core: Eddy Gamez, a methodical art‑crime detective turned mentor, balances their love of watercolor, salsa, and street photography with a disciplined financial ledger and a routine of meditation for their
    hypertension; they also frequently forget to water their indoor succulents.
background:
  cultural: Eddy was born into a close‑knit Cuban‑American family in Miami, where Spanish was spoken at home and English at school. He grew up celebrating traditional Cuban holidays such as Carnaval and
    the San Juan Festival, and he maintains strong ties to the Cuban diaspora community through church gatherings, cultural festivals, and baseball leagues. The rhythm of Cuban music and the flavors of
    island cuisine are integral to his identity, shaping both his personal life and his professional network. Eddy’s upbringing emphasized respect for family, hospitality, and collective responsibility,
    values that influence his collaborative approach to investigations and his commitment to community service. While fully integrated into American society, he remains proud of his heritage, often sharing
    Cuban stories and customs with clients and colleagues.
attributes:
