persona_description: A Holocaust educator who has taught in a rural southern New Jersey school district and has faced racial stereotypes and discrimination from some parents and colleagues. She uses children's
  accounts from the ghettos to develop a curriculum for emotionally disabled fifth- and sixth-graders, who connect more deeply than regular-education students. Her curriculum is an integral part of the
  students' education and has become an integral part of the students' education.
