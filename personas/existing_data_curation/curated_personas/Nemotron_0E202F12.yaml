personas:
  professional: Berni Acosta, a 47‑year‑old construction manager known for precise project budgeting, Procore‑driven scheduling, and LEED‑focused site supervision, applies a structured yet flexible mindset
    and an outgoing, assertive leadership style to build cohesive crews while quietly battling the occasional anxiety that comes with high‑stakes deadlines.
  sports: Berni Acosta plays in a local adult soccer league, supports Austin FC in the MLS, hikes the rolling hill‑country trails on weekends while bird‑watching for quails and hawks, and joins charity
    5K runs to combine fitness with community networking.
  arts: Berni Acosta frequents Austin’s live‑music venues such as Antone’s to enjoy Cumbia and Banda tunes, visits the Hope Outdoor Gallery to absorb vibrant street murals, and follows the folk‑rock duo
    The Texas Gentlemen for a relaxed cultural fix after a busy workday.
  travel: Berni Acosta prefers well‑planned road trips to nearby Hill Country wineries, enjoys a yearly weekend getaway to Santa Fe for its cultural festivals, and dreams of trekking Patagonia’s Andes,
    balancing travel aspirations with family responsibilities and a mid‑career budget.
  culinary: Berni Acosta delights in preparing mole with dried ancho chilies, dark chocolate with cinnamon, and toasted sesame seeds, hand‑rolling tamales with masa and pork, pairing each dish with a crisp
    Texas‑crafted pilsner, and occasionally improvises wooden serving boards from their DIY woodworking hobby.
  core: Berni Acosta is a diligent, socially vibrant construction leader who channels structured ambition into sustainable projects, balances disciplined finances with craft‑beer indulgences, and copes
    with anxiety through outdoor activity and culinary tradition.
background:
  cultural: Berni Acosta grew up in a Mexican‑American household where family gatherings, traditional foods, and bilingual communication were central. Though raised in Texas, he remains deeply connected
    to his Mexican roots, speaking Spanish fluently and participating in local Latino community events. His upbringing emphasized hard work, respect for elders, and the value of a close‑knit community,
    which influences his collaborative leadership style. Living in Austin and Hays County, Berni blends his heritage with the city's vibrant, multicultural atmosphere, often acting as a cultural bridge
    between his crew, clients, and the broader community.
attributes:
  skills: '["Project Planning and Scheduling", "Budget Management and Cost Estimation", "Construction Site Supervision", "Blueprint and Technical Drawing Interpretation", "Compliance with Texas Building
    Codes", "Safety Protocol Enforcement", "Vendor and Subcontractor Management", "Contract Negotiation", "Risk Assessment and Mitigation", "Construction Management Software (Procore, Buildertrend)", "Sustainable/Green
    Building Practices (LEED)", "Bilingual Communication (Spanish/English)", "Team Leadership and Conflict Resolution", "Supply Chain and Logistics Coordination"]'
  hobbies: '["Adult Soccer League", "Hiking and Trail Walking", "Cooking Traditional Mexican Cuisine", "Attending Mexican Cultural Festivals", "Listening to Regional Mexican Music", "Craft Beer Tasting",
    "DIY Woodworking Projects", "Socializing with Friends and Community Groups"]'
  career_goals: Berni aims to advance to a senior director of construction role within a major Austin‑area development firm, overseeing large‑scale mixed‑use projects that incorporate sustainable design.
    He plans to obtain Certified Construction Manager (CCM) and Project Management Professional (PMP) certifications to formalize his expertise. Over the next five years, he hopes to mentor younger tradespeople,
    particularly those from the Mexican‑American community, and eventually establish his own consulting firm that focuses on eco‑friendly building methods and community‑centered development in Central Texas.
