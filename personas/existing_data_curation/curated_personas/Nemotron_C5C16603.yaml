personas:
  professional: Ricardo Baker is a disciplined senior project manager who applies rigorous Agile and Lean Six Sigma methods, crafts detailed charters, and uses data‑driven performance metrics to steer multi‑million‑dollar
    infrastructure projects while strategically positioning himself to launch a data‑centric PMO and mentor high‑performing leads.
  sports: Ricardo Baker is a methodical runner who logs his miles for half‑marathons with the Atlanta Track Club, follows the Atlanta Falcons for football, casts at Lake Lanier for trout during summer,
    and practices strategic patience in recreational fishing, all while adhering to a strict training schedule.
  arts: Ricardo Baker cultivates an analytical appreciation for jazz, frequently listening to the intricate compositions of John Coltrane, Miles Davis, and Thelonious Monk on vinyl, and attends monthly
    performances at the Center for Civil and Human Rights jazz series, which informs his reflective leisure.
  travel: Ricardo Baker prefers meticulously planned trips that balance historical immersion and solitude, having explored Washington, D.C.'s civil‑rights museums, trekked the Blue Ridge Mountains, and
    now aims to visit Rome's ancient archives and the Scottish Highlands for quiet fishing retreats.
  culinary: Ricardo Baker enjoys farm‑to‑table cooking, often preparing herb‑crusted salmon with quinoa, roasted heirloom tomatoes, and kale from his garden, while his weekend meals feature meticulously
    measured spice rubs for smoked brisket, reflecting his precision in both woodworking and cuisine.
  core: Ricardo Baker is a solitary, hyper‑organized project strategist who channels his competitive drive into precise woodworking, methodical running, and a disciplined financial regimen, yet occasionally
    lets late‑night puzzle marathons erode his sleep.
background:
  cultural: Ricardo is an African-American man raised in the South, with family roots that trace back to the Great Migration and the civil-rights era in Georgia. He grew up in a close-knit extended family
    where church fellowship, storytelling, and community service were central, reflecting hallmarks of Black Southern culture. His heritage informs a deep appreciation for African-American artistic expressions—especially
    music, literature, and oral history. He celebrates Juneteenth, participates in local cultural festivals, and regularly visits a nearby Black history museum in Atlanta, maintaining a strong connection
    to his cultural identity. This background provides him with a nuanced perspective on collaboration, respect for diverse viewpoints, and a personal drive to mentor younger Black professionals in project
    management.
attributes:
  skills: '[''Project Charter Development'', ''Project Scheduling (Microsoft Project, Smartsheet)'', ''Agile & Scrum Implementation'', ''Risk Assessment & Mitigation'', ''Budget Management'', ''Compliance
    Assurance (Georgia regulations)'', ''Quality Assurance'', ''Data-Driven Reporting'', ''Resource Allocation Optimization'', ''Vendor Negotiation'', ''Team Leadership'', ''Process Improvement (Lean Six
    Sigma)'']'
  hobbies: '[''Historical non-fiction reading'', ''Jazz vinyl collection'', ''Woodworking'', ''Gardening'', ''Fishing'', ''Long-distance running'', ''Puzzle solving (Sudoku, crosswords)'', ''Online chess'']'
  career_goals: Ricardo aims to advance to a senior program-management position within the next five years, overseeing multiple concurrent portfolios for a regional infrastructure firm. He plans to earn
    the PMI Program Management Professional (PgMP) certification and deepen his expertise in Lean Six Sigma. His long-term ambition is to lead the creation of a data-centric Project Management Office that
    standardizes metrics across the organization, fostering a culture of accountability and measurable outcomes. He also intends to mentor a select group of high-performing project leads, sharing his disciplined,
    results-oriented approach. Ultimately, Ricardo envisions launching his own consultancy to advise small-to-mid-size enterprises on aligning project processes with strategic goals, emphasizing rigorous
    planning and performance tracking.
