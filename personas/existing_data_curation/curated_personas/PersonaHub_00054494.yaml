persona_description: A painter who is interested in the works of Jackson Pollock, Willem de Kooning, and Mark Rothko, and is particularly drawn to the abstract expressionist style that developed in New
  York after World War II. They appreciate the act of creation as being of the greatest importance and are fascinated by the use of paint to convey emotions and feelings. They are drawn to the thick impasto
  of de Kooning's Woman V and the expressive spontaneity of Rothko's Multiform. They are also interested in the works of Australian painters Tony Tuckson and Ian Fairweather who sought to translate their
  authentic being onto canvas through expressive spontaneity and bypassing the constraints of Western tradition.
