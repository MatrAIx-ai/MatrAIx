persona_description: Lt. Col. Jeffrey Talley, an assistant professor of environmental engineering at Notre Dame, is a veteran of the Iraq War who returned with a unique set of skills and knowledge. He has
  a passion for coffee and a fascination with cultural artifacts, which led him to send back a beat-up brass coffee pot from Iraq. Talley's expertise lies in environmental engineering and he has a unique
  perspective on the environmental hazards created in Iraq due to the coalition's invasion. He has volunteered to work with Task Force Restore Iraqi Oil to assess the environmental hazard caused by the
  lakes and to consider possible methods of cleaning them up. Talley's funding proposal highlights the need to address similar environmental issues in Kuwait and the importance of rebuilding Iraq as a safe
  place to live.
