persona_description: A scientist working in the field of microfluidics and biosensors, particularly focused on the development of novel techniques for cell manipulation and separation. They are experienced
  in laser deposition techniques and have a background in electrokinetics and surface science. They are interested in controlling electroosmotic flow at glass-liquid interfaces and have a desire to eliminate
  cell-wall adhesion in microchip applications. They have published research papers in leading scientific journals and have experience with laser tweezers and neural cell analysis.
