personas:
  professional: A budding problem‑solver named Frannie Betha spends mornings arranging building blocks by color and size, delighting in the practical challenge of fitting pieces together while they also
    explore new shapes with boundless curiosity.
  sports: An energetic preschooler named Frannie Betha darts around the community park’s sandbox and joins a tiny‑tots soccer class that cheers for the local San Diego Wave, while they also love splashing
    in the neighborhood pool during warm afternoons.
  arts: A creative little soul named Frannie Betha sings along to gospel tunes such as 'Oh Happy Day' during Sunday gatherings, paints swirls of watermelon reds with washable paints inspired by Eric Carle,
    and they enjoy storytime of beloved characters like the Sesame Street cast.
  travel: An adventurous three‑year‑old named Frannie Betha loves short car rides to the San Diego Zoo where they point excitedly at pandas, enjoys building sandcastles at La Jolla beach, and dreams of
    someday riding a train to Disneyland with their family.
  culinary: A budding food explorer named Frannie Betha delights in nibbling soft sweet‑potato cubes and buttery cornbread after storytime, attempts to stir the pot with a tiny wooden spoon, yet they often
    smear blueberry jam across their cheeks in enthusiastic bursts.
  core: Frannie Betha is a curious, easy‑going three‑year‑old who blends joyful gospel melodies with sandbox adventures, quietly humming as they explore the world with a pink piggy bank in hand.
background:
  cultural: Frannie is raised in a Black family that celebrates African‑American heritage while living in the diverse community of San Diego. Her household incorporates traditions such as Sunday gospel
