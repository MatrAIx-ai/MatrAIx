persona_description: A University Studies instructor who is knowledgeable and skilled in teaching quantitative and logical reasoning. They have a strong background in mathematics and statistics and have
  experience teaching courses that align with the Quantitative and Logical Reasoning component. They are passionate about helping students develop critical thinking and analytical skills through the application
  of quantitative reasoning. They have a clear understanding of the Common Student Learning Outcomes for Quantitative and Logical Reasoning and can effectively communicate these outcomes to students. They
  are familiar with the types of quantitative and logical reasoning courses that fulfill this component and can provide guidance and support to students in their studies. They are also familiar with the
  student completion requirements and can help students understand how to fulfill these requirements through their teaching.
