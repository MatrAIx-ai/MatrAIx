  hobbies: '[''Collecting vinyl records'', ''Listening to classic rock, folk, and lo‑fi electronic music'', ''Poetry writing'', ''Gardening'', ''Woodworking (making guitar accessories)'', ''Road trips to
    music festivals and county fairs'', ''Live concert photography'', ''Cooking Midwestern comfort food'', ''Board games with friends'', ''Hiking in Kansas prairie'']'
  career_goals: Timothy aims to capture his late‑stage artistic vision in a concept album that blends his love for traditional Americana with experimental electronic textures, targeting release within the
    next two years. He hopes to increase his regional touring footprint by securing regular slots at venues across Kansas and neighboring states, and to collaborate with emerging singer‑songwriters to produce
    a compilation EP highlighting local talent. Long‑term, he aspires to open a modest home‑studio space that doubles as a teaching hub, offering affordable private lessons and workshops on songwriting,
    recording, and live performance. He also wants to formalize a community music program at the Salina public library, providing performance opportunities for youth while sharpening his own organizational
    skills to meet project deadlines.
