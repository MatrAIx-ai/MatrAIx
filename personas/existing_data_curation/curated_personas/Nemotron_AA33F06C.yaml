  hobbies: '[''Historical nonfiction reading'', ''Classic literature'', ''Native plant gardening'', ''Birdwatching'', ''Knitting'', ''Cross‑stitch'', ''Nature journaling'', ''Crossword puzzles'', ''Classical
    music'', ''Project management podcasts'', ''Local historical archiving'']'
  career_goals: Ola aims to transition into senior leadership within project management, overseeing multi-disciplinary, community-focused initiatives that blend cultural preservation with modern operational
    efficiency. She aspires to mentor emerging project managers, develop a consultancy specializing in arts and heritage projects, and publish thought pieces on integrating humanities perspectives into
    corporate project methodologies. Long-term, she envisions directing a regional cultural institution's strategic initiatives, ensuring sustainable funding and impactful community engagement.
