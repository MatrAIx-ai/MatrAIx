personas:
  professional: Lina Ramirez is a highly organized metal fabricator and plastic molding technician whose meticulous workflow, MIG/TIG welding expertise, and knack for leading briefings blend with a talkative,
    competitive drive, making them a natural de‑facto shift coordinator who thrives on structure while they channel their sociable energy to mentor apprentices and champion lean manufacturing initiatives.
  sports: Lina Ramirez follows the national soccer team with fervor, roots for the local Richmond Kickers, and they participate in a community boxing club, balancing high‑intensity workouts with a competitive
    spirit that mirrors their drive in the manufacturing floor.
  arts: Lina Ramirez brightens community theater improv nights with quick‑witted humor, dances to salsa and merengue at cultural gatherings, and they draw artistic inspiration from performers like Lin‑Manuel
    Miranda and musicians such as Celia Cruz, shaping their vibrant social identity that fuels both work and leisure.
  travel: Lina Ramirez prefers well‑planned weekend road trips to scenic spots like Shenandoah Valley and the Blue Ridge Mountains, while they dream of a cultural immersion tour of Central America that
    blends culinary workshops and soccer festivals, balancing their finite travel budget with a love for both adventure and relaxation.
  culinary: Lina Ramirez showcases moderate culinary skill by mastering traditional dishes such as baleadas, sopa de mondongo, and plantain‑based sides, regularly hosting potluck gatherings where they experiment
    with fresh cilantro, lime, and tangy salsa recipes, and they delight in pairing the meals with local craft beers.
  core: Lina Ramirez blends rigorous technical precision with a sociable, talkative flair, and they manage anxiety through boxing and yoga while juggling a competitive edge, meticulous budgeting, and a
    passion for community‑driven cooking and improv.
background:
  cultural: Lina’s roots trace back to a modest town in Honduras where her parents grew up. She immigrated as a child with her family to the United States, settling in Richmond’s historic Southside neighborhood.
    Growing up bilingual, she maintains fluency in Spanish and celebrates Honduran traditions such as Día de la Independencia (September 15) and Semana Santa with family gatherings and community festivals.
    Her Catholic upbringing informs her values of family solidarity and respect for elders. She stays connected to the Honduran diaspora through local cultural organizations, contributing by volunteering
    at events that showcase Central American art, music, and cuisine. This cultural pride shapes her identity, culinary tastes, and social circles in Richmond.
