  hobbies: '[''Cooking Honduran cuisine'', ''Salsa and merengue dancing'', ''Boxing'', ''Yoga'', ''Community theater improv'', ''Reading self‑help books'', ''Following Honduran soccer'']'
  career_goals: Lina aims to move into a supervisory role within the next two years, obtaining an AWS Certified Welder credential and a CNC programming certification to strengthen her technical leadership.
    She aspires to become a shift manager, overseeing production schedules, implementing lean manufacturing initiatives, and mentoring apprentices. Long‑term, she hopes to launch her own small‑scale custom
    metal‑fabrication and plastic‑product workshop that serves local businesses and community events, leveraging her network and building a reputation for high‑quality, reliable work. She also intends to
    pursue stress‑management training to better handle her emotional reactivity, ensuring she can sustain high performance under pressure.
