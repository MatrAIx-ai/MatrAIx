  career_goals: Irma dreams of becoming a biologist or environmental scientist to study and protect the local waterways around East Chicago, inspired by her curiosity about nature and a desire to make practical
    improvements in her community. She also envisions using her bilingual abilities to educate and advocate for others, perhaps as a science teacher or community outreach coordinator, allowing her to combine
    compassion with self‑interest. She aims to excel in school, graduate high school, and pursue a college degree in environmental science or biology.
