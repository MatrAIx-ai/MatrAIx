personas:
  professional: Irma Torres, an aspiring junior ecologist, blends her curiosity about adventure books with practical LEGO building to create detailed miniature habitats, demonstrating early analytical skills
    and a methodical yet flexible approach to problem‑solving.
  sports: Irma Torres plays soccer with the community youth team "Maple Grove Strikers" during the fall, enjoys watching the professional league's "City Titans", and balances active play with weekend hikes,
    preferring small, coordinated scrimmages over large tournaments.
  arts: Irma Torres spends afternoons sketching wildlife inspired by the picture books of Beatrix Potter and the vivid murals of artist Ana Luna, while listening to the folk ensemble "River Folk" and reading
    mystery novels by Enid Blyton, weaving these influences into her own storytelling sketches.
  travel: Irma Torres prefers carefully planned day trips with her grandparents to nearby nature reserves like Blue Ridge Park and occasional family road trips to the historic city of San Antonio, while
    dreaming of exploring the ancient ruins of Machu Picchu and the snowy peaks of the Swiss Alps.
  culinary: Irma Torres loves helping in the kitchen, where she kneads masa for tacos and shapes tamale husks with seasoned pork, peppers, and corn, delights in topping dishes with fresh cilantro, lime,
    and avocado, and proudly claims the title of 'sauce supervisor' for her homemade salsa made from tomatoes, chilies, and onions, though she occasionally forgets to wash her hands before cooking.
  core: Irma Torres is a curious, organized nine‑year‑old who balances adventurous reading and LEGO engineering with a disciplined saving habit, yet often loses the last puzzle piece and forgets to finish
    homework before diving into a new book.
background:
  cultural: Irma is a second‑generation Mexican American raised in East Chicago, Indiana. She grows up in a Spanish‑speaking household where her parents and grandparents maintain traditions such as Día
    de los Muertos, making tamales, and listening to mariachi music. The neighborhood includes a vibrant Latino community, and she often participates in cultural events at the local community center. Bilingualism
    is an everyday part of her life; she attends a public elementary school where Spanish is offered as a heritage language, and she navigates both English and Spanish cultural norms. Her family emphasizes
    close family ties, respect for elders, and a strong work ethic, reflecting both Mexican values and the industrial working‑class history of the region.
