  hobbies: '[''nature photography'', ''landscape sketching'', ''digital painting'', ''reading speculative fiction'', ''playing acoustic guitar'', ''hiking'', ''bonsai cultivation'', ''model aircraft building'',
    ''community mural volunteering'']'
  career_goals: In the next two years Gregory plans to earn an ISA Certified Arborist credential and enroll in a community‑college program in horticulture or environmental science. He hopes to advance from
    entry‑level tree trimming to a lead arborist role, eventually managing a crew and overseeing urban forestry projects for the City of Racine. Long‑term, he dreams of founding a sustainable landscaping
    consultancy that blends ecological stewardship with visual storytelling—producing educational graphics, photo essays, and community art projects that raise awareness about the value of trees. He also
    considers a bachelor's degree in environmental studies to broaden his impact.
