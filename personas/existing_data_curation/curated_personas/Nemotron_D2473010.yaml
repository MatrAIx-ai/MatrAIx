personas:
  professional: Jennifer Corpening channels their meticulous organizational talent into HOA leadership, using Excel‑driven budgeting, event‑planning expertise, and a calm, cooperative style to launch neighborhood
    safety programs and a community garden while mentoring volunteers.
  sports: Jennifer Corpening stays active with twice‑weekly gentle yoga sessions, weekend bird‑watching walks around Lake Apopka, and occasional cheering for the Orlando Magic and Tampa Bay Rays, while
    they belong to the Lake Apopka Seniors Walking Club.
  arts: Jennifer Corpening weaves creativity into their life through quilting and crochet, finds inspiration in the historical novels of Ken Follett and the folk melodies of Joan Baez, and volunteers backstage
    at the Orlando Community Theatre where they admire performances by the Orlando Philharmonic Orchestra.
  travel: Jennifer Corpening prefers well‑planned, low‑stress trips, often exploring historic sites like St. Augustine and Savannah on weekend getaways, while they dream of a guided tour of Washington,
    D.C.’s museums once their mother’s health stabilizes.
  culinary: Jennifer Corpening delights in cooking fresh Florida produce, frequently preparing grilled grouper with citrus glaze, key‑lime pie, and quinoa salads tossed with home‑grown herbs, and they enjoy
    baking soft cinnamon rolls for their book club gatherings.
  core: Jennifer Corpening is a detail‑oriented, community‑focused planner who balances structured routines with quiet hobbies, yet wrestles with persistent worry and a tendency to overcommit themselves
    to caring for others.
background:
  cultural: Jennifer was raised in a middle‑class family in the Midwest before relocating to Central Florida in her early thirties. She identifies with mainstream American culture that values self‑reliance,
    community service, and family cohesion. Her Midwestern upbringing contributed principles of hard work, punctuality, and modesty, while her Florida residence introduced a more laid‑back, outdoor‑oriented
    lifestyle. She attends a United Methodist church, reflecting a Protestant Christian tradition that emphasizes fellowship, charitable outreach, and modest living. Her celebrations often combine traditional
    American customs with Southern‑influenced home‑cooked meals shared with family and neighbors.
attributes:
  skills: '[''Household Management'', ''Budgeting & Financial Planning'', ''Record‑Keeping'', ''Microsoft Office (Excel, Word, PowerPoint)'', ''Event Planning'', ''Volunteer Coordination'', ''Basic Home
