  hobbies: '[''Gardening (vegetables & native plants)'', ''Quilting and Crochet'', ''Reading historical fiction and biographies'', ''Weekly book club'', ''Nature walks & birdwatching'', ''Community theater
    volunteering'', ''Gentle yoga'', ''Journaling'']'
  career_goals: Jennifer aims to channel her organizational strengths into a leadership role within her homeowners association, where she hopes to launch neighborhood safety initiatives and a community
    garden project. She plans to obtain a certification in geriatric caregiving to better support her aging mother and to volunteer as a peer mentor for other family caregivers. Over the next five years
    she hopes to author a practical budgeting guide for retirees in her community and to offer part‑time consulting to local non‑profits on event planning and grant writing, while maintaining a balanced,
    stress‑aware lifestyle.
