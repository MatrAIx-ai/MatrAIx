persona_description: A geologist who specializes in the study of the geology and hydrology of the Kansas region, focusing on the specific geologic features and ground-water resources of Cloud County, Kansas.
  This geologist is likely to have extensive knowledge and experience in fieldwork, data analysis, and the interpretation of geological and hydrologic information. They may also have expertise in the study
  of sedimentary rocks, unconsolidated sand and gravel deposits, and the aquifers in the county. They are likely to have a strong interest in the geology and hydrology of the Dissected High Plains section
  of the Great Plains physiographic province, and in the specific geologic and hydrologic features of Cloud County. They may also have a background in geology education, and be interested in teaching or
  conducting research related to the geology and hydrology of the Kansas region.
