    rocks'', ''coding simple games in Scratch'', ''playing board games like Settlers of Catan Junior'']'
  career_goals: Ronald dreams of exploring the cosmos as an astronaut or sharing his imagination as a science‑fiction author and illustrator. He hopes to one day create books, comics, or movies that inspire
    kids to ask big questions about space, nature, and invention. He also imagines becoming a teacher or museum guide who combines his love for art, science, and sharing knowledge.
