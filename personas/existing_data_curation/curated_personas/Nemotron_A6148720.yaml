personas:
  professional: Ronald Batten, a budding young game designer and storyteller, merges their love for fantasy literature, LEGO spaceship engineering, and Scratch coding into imaginative digital adventures
    while they channel their organized, methodical planning and charismatic stage presence from drama club into collaborative school projects.
  sports: Ronald Batten, a spirited member of the Sunrise Tigers youth soccer team, practices defensive drills after school, idolizes Manchester United’s midfield, and spends weekend afternoons cheering
    for the local high‑school basketball team, the Riverdale Raptors, while they maintain an enthusiastic but occasionally unsteady jogging routine in the neighborhood park.
  arts: Ronald Batten, an enthusiastic creator, draws vibrant superhero sketches of Spider‑Man and original futuristic cityscapes, devours J.K. Rowling’s Harry Potter series and Rick Riordan’s Percy Jackson
    books, and shines on stage delivering dramatic monologues at school drama club, often quoting Pixar’s \"Inside Out\" for emotional inspiration, while they use their vivid imagination to improvise storylines
    on the spot.
  travel: Ronald Batten, an inquisitive explorer, spends Saturdays combing the nearby Willow Creek woods for unique rocks and insects, has visited the interactive Children’s Museum in the city, dreams of
    a family road trip to the Grand Canyon, and hopes to experience the magic of Disneyland next summer, while they carefully map each outing in a hand‑drawn journal.
  culinary: Ronald Batten, a budding kitchen helper, relishes pepperoni pizza with extra mozzarella, loves assembling homemade spaghetti with meatballs using fresh basil and garlic, and enjoys concocting
    peanut‑butter‑filled chocolate chip cookies during community center art workshops, though they sometimes sneak extra marshmallows into the batter.
  core: Ronald Batten, an imaginative, sociable nine‑year‑old who balances epic LEGO constructions, Scratch game coding, and dramatic performances with soccer drills, while they meticulously budget allowance
    and navigate mild allergies with a mix of disciplined routine and spontaneous bursts of creative energy.
background:
  cultural: Ronald comes from a White, Anglo‑American family living in Snohomish, Washington. His upbringing reflects the Pacific Northwest’s appreciation for nature, community events, and seasonal celebrations
    such as Thanksgiving, Christmas, and the local county fair. His family values education, kindness, and community service, and they often attend a nearby church and participate in school and library
    programs that emphasize creativity and curiosity.
