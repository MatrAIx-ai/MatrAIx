  hobbies: '[''Sketching and illustration'', ''Watercolor painting'', ''Digital art (Procreate, Photoshop)'', ''Reading graphic novels'', ''Ukulele playing'', ''Art club participation'', ''Drama and theater'',
    ''Multicultural student council'', ''Cooking Indian recipes'', ''Visiting museums and community events'']'
  career_goals: Sohini dreams of becoming a visual storyteller who blends her South Asian heritage with contemporary media. She aims to attend a specialized arts high school, then pursue a degree in illustration
    or animation to create children’s books and short films that celebrate cultural diversity and promote mental‑health awareness for teenagers. In the long term, she envisions founding a youth‑led community
    arts collective in San Antonio that offers workshops, mentorship, and a platform for young creators to share their voices.
