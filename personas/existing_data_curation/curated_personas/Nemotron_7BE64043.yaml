personas:
  professional: Sohini Singh, an aspiring visual storyteller, combines her sketching, watercolor, and fledgling digital illustration skills with her organized yet flexible nature, leading the school art
    club’s exhibition planning while naturally taking the spotlight during presentations.
  sports: Sohini Singh enjoys after‑school badminton matches, plays forward on the neighborhood junior soccer team “Riverdale Rangers”, and rallies behind the city’s professional cricket squad “Coastal
    Chargers”, using weekend bike rides through community gardens to stay fit and relieve stress.
  arts: Sohini Singh immerses herself in creative expression by filling journals with whimsical characters, drawing inspiration from Hayao Miyazaki, the bold color patterns of Yayoi Kusama, the melodic
    beats of A.R. Rahman’s Bollywood scores, the lo‑fi vibes of Clairo, and the narrative depth of graphic novelists Marjane Satrapi and Jeff Smith.
  travel: Sohini Singh loves spontaneous day trips to the nearby botanical garden and historic fort town of Oldbridge, cherishes family weekend getaways to the coastal beach resort of Sunbay, and dreams
    of wandering Kyoto’s art alleys and Barcelona’s vibrant street markets when she saves enough for a study‑abroad art program.
  culinary: Sohini Singh delights in weekend cooking sessions, mastering crunchy samosas, tangy mango lassi, spiced lentil dal, and experimenting with fresh cilantro and cumin, while proudly showcasing
    her dishes at school cultural festivals.
  core: Sohini Singh is a talkative, art‑driven teen who balances meticulous planning with spontaneous sketching, worries about perfection, finds calm in music and cooking, and thrives on community collaboration.
background:
  cultural: Sohini is a second‑generation Indian‑American whose parents emigrated from Delhi to Texas before she was born. Growing up in San Antonio’s diverse Bexar County, she celebrates Diwali, Holi,
    and other South Asian festivals alongside local Texan holidays, blending vibrant Indian colors and motifs into her everyday life. Her household is bilingual, speaking both English and Hindi, and she
    regularly attends cultural gatherings at the local Hindu temple. This multicultural environment nurtures her appreciation for art, storytelling, and community harmony, while her family’s emphasis on
    education and respect for tradition shapes her balanced, organized, yet flexible approach to responsibilities.
attributes:
  skills: '[''Digital illustration'', ''Graphic design (Canva, Procreate)'', ''Creative writing (short stories, poetry)'', ''Public speaking'', ''Event planning and coordination'', ''Basic Python programming'',
