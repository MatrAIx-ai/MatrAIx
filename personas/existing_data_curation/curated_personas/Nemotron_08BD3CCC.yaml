  career_goals: Anthony dreams of turning his love of art and storytelling into a career where he can create worlds that inspire others. He imagines becoming a digital illustrator or video‑game designer
    who can work from his own quiet studio, blending his drawings with interactive technology. He is also intrigued by the idea of being an inventor or a STEM educator who builds simple gadgets and explains
    them through visual art. Ultimately, he wants a career that lets him work independently, explore new ideas, and share his creations with a community that values imagination.
