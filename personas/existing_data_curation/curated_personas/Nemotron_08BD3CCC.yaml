personas:
  professional: Anthony Johnson is a budding junior inventor who pulls LEGO bricks and Scratch Jr. projects together into whimsical prototypes, and they channel their boundless curiosity into designing
    imaginative machines even though they often forget to keep their work organized.
  sports: Anthony Johnson is a quiet sports enthusiast who roots for the Chicago Bulls and the Chicago Cubs, they attend weekend swimming lessons at the community center and participate in the North Shore
    Youth Soccer Club, yet they prefer solo runs through the nearby forested park to build stamina.
  arts: Anthony Johnson is a creative sketcher who fills notebooks with handwritten stories and watercolor scenes while listening to Miles Davis, Aretha Franklin, Kendrick Lamar, and uplifting gospel hymns
    from their community church, they admire the illustrations of Oliver Jeffers and Mo Willems and often visit the local library’s art corner for storytime featuring diverse folklore.
  travel: Anthony Johnson enjoys weekend excursions to the Field Museum, the Chicago Botanic Garden, and Lake Michigan’s beach, they dream of hiking the Grand Canyon and exploring Washington, D.C.’s Smithsonian
    museums, and they plan trips with a simple hand‑drawn map, balancing school schedule constraints with family‑approved adventures.
  culinary: Anthony Johnson loves helping prepare soul‑inspired dishes like collard greens, gumbo with okra, and cornbread, they also adore Chicago‑style deep‑dish pizza and chocolate chip pancakes, and
    they experiment with mixing ingredients like sweet potatoes and berries into homemade smoothies.
  core: Anthony Johnson is an introspective 8‑year‑old inventor who channels curiosity into art and science, navigates anxiety with careful rituals, and balances solitary creativity with occasional bursts
    of playful indulgence.
background:
  cultural: Anthony comes from an African‑American family rooted in the Midwest, with grandparents who migrated from the South. At home, he is exposed to Black cultural traditions through music, stories,
    and food. His parents regularly play jazz, soul, and contemporary hip‑hop, and they celebrate holidays such as Juneteenth and Black History Month, often visiting local museums and cultural festivals
    in the Chicago area. He has read books by Black authors and enjoys cartoons that showcase diverse characters. The community church his family attends emphasizes gospel music and fellowship, providing
    a supportive space for shared experiences. Living in Shorewood, a suburban suburb of Chicago, he benefits from a public library with a strong multicultural collection and a nearby park where he can
    explore nature while reflecting on his heritage.
