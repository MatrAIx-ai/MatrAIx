personas:
  professional: A seasoned community consultant, Ariel Anaya blends meticulous budgeting expertise with a relaxed, flexible approach to workshop planning, often improvising when schedules slip, and uses
    their bilingual fluency and gentle assertiveness to mentor micro‑entrepreneurs and senior volunteers alike.
  sports: A gentle fitness enthusiast, Ariel Anaya enjoys leisurely walks through White River State Park and participates in a senior walking club that meets twice weekly, while cheering on the Indianapolis
    Colts on Sundays and occasionally attending an Indy Eleven soccer match when the weather permits.
  arts: A devoted lover of the arts, Ariel Anaya finds solace in the smooth melodies of bolero legends like Luis Miguel and the lively trumpets of mariachi ensembles, regularly attending local museum exhibitions
    featuring works by Frida Kahlo and Diego Rivera, and they often crochet while listening to classic films.
  travel: A relaxed traveler, Ariel Anaya prefers culturally immersive trips, having already explored the historic streets of San Antonio and the art museums of Washington, D.C., while dreaming of a heartfelt
    journey back to their ancestral hometown in Veracruz to photograph family landmarks and capture oral histories.
  culinary: A confident home cook, Ariel Anaya delights in preparing aromatic tamales and slow‑cooked mole using fresh cilantro, dried pasilla chilies, and masa harina, often inviting neighbors over to
    share the feast while they swap stories about family recipes.
  core: Ariel Anaya blends a lifelong curiosity for history and genealogy with a garden‑scented, laid‑back lifestyle, juggling community mentorship and occasional disorganization while they never miss a
    chance to crochet a blanket for charity.
background:
  cultural: Ariel was raised in a Mexican household rooted in the traditions of Veracruz, where family gatherings, homemade food, and celebrations of Día de los Muertos and Cinco de Mayo were central. Growing
    up in Indianapolis, she blended those customs with Midwestern values of friendliness and civic engagement. She is bilingual in Spanish and English, participates actively in the local Mexican cultural
    centre, and maintains strong ties to the Catholic faith and community service. Her heritage informs her love of music, cooking, and the importance she places on intergenerational connections.
