  hobbies: '["Herb gardening", "Cooking Mexican cuisine", "Reading historical fiction", "Visiting museums and cultural exhibits", "Attending Mexican cultural festivals", "Walking in local parks", "Listening
    to boleros and mariachi music", "Crocheting", "Volunteer work at community garden", "Genealogy research"]'
  career_goals: Ariel’s career aspirations now center on mentorship and community service. She plans to launch a part‑time consulting service that offers financial‑literacy workshops and basic business
    guidance to micro‑entrepreneurs within the Indianapolis Latinx community. She also hopes to organize monthly budgeting seminars at the senior center, develop a neighborhood garden program that teaches
    sustainable horticulture, and compile a family cookbook featuring traditional Mexican recipes and stories. A long‑term personal aim is to travel back to her hometown in Veracruz to document her family’s
    genealogy.
