  hobbies: '["Playing with Duplo blocks", "Sorting colored beads and stickers", "Listening to storybooks", "Exploring backyard and park", "Crayon drawing", "Family music and dance sessions", "Assisting
    in simple cooking activities (e.g., rolling spring rolls)"]'
  career_goals: Even at three, Diemchau often talks about becoming a builder or a doctor. He imagines designing safe playgrounds where children can explore, or growing up to be a pediatric physician who
    helps other kids stay healthy. These aspirations blend his fascination with how things work, his organized and practical mindset, and his compassionate desire to assist others.
