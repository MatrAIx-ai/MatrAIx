  hobbies: '[''Playing soccer'',''Building LEGO sets'',''Reading adventure books'',''Solving puzzles and brainteasers'',''Participating in school robotics club'',''Cooking with family (following recipes)'']'
  career_goals: Joshua dreams of becoming a teacher or a community‑oriented professional, such as a firefighter or a youth sports coach, where he can use his love for structure, organization, and teamwork
    to help others. He also imagines designing video games that teach problem‑solving, reflecting his interest in technology and methodical thinking.
