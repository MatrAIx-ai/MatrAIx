personas:
  professional: Joshua Sakala is a budding robotics enthusiast who, at eight, channels his love for structure into building LEGO sets, programming simple sensors for his school robotics club, and taking
    on reliable roles in group projects, demonstrating methodical planning and a natural knack for teamwork.
  sports: Joshua Sakala plays forward for the Upland United youth soccer team, admires LA Galaxy midfielder Jonathan Dos Santos, follows the Golden State Warriors for basketball inspiration, and approaches
    fitness with high energy, preferring team drills over solitary workouts while occasionally neglecting proper warm‑ups.
  arts: Joshua Sakala devours the Percy Jackson adventure series, enjoys Disney animated films like 'Moana', listens to Imagine Dragons and Taylor Swift on family road trips, and participates in the local
    community theater’s junior workshops, using these artistic experiences to fuel his imagination and storytelling.
  travel: Joshua Sakala loves family road trips to the California coast—especially Santa Monica Beach and Disneyland—often plans detailed itineraries with maps, and dreams of exploring European castles
    and historic towns shown in school, balancing a love for organized travel with a sense of adventure.
  culinary: Joshua Sakala assists with cooking by precisely measuring ingredients for spaghetti Bolognese, banana bread, and chicken tacos with guacamole, favoring dishes that let them follow a recipe step‑by‑step
    while occasionally adding a splash of sriracha for extra flavor.
  core: Joshua Sakala is an organized, energetic 8‑year‑old who thrives on structure, teamwork, and adventure, balancing a meticulous approach to LEGO building and school projects with a lively love for
    soccer and family cooking.
background:
  cultural: Joshua comes from a white, middle‑class family in Upland, California. His household blends typical American cultural practices—celebrating holidays such as Thanksgiving, Fourth of July, and
    Christmas—with occasional European traditions from his family's Czech ancestry, like Easter egg decorating and a fondness for folk music. Growing up in suburban Southern California, he is exposed to
    a diverse community, but his family emphasizes values of punctuality, responsibility, and community service.
attributes:
  skills: '[''Organizational skills (checklists, tidy workspace)'',''Reliability in completing tasks'',''Methodical problem-solving (math and puzzles)'',''Collaboration and informal leadership in group
