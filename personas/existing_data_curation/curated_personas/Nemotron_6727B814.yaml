personas:
  professional: Ethan Williams, a retired civil and mechanical engineer turned community sustainability advisor, blends his CAD mastery, structural analysis know-how, and crisp technical writing to design
    low‑impact garden infrastructure while passionately mentoring high‑school students in STEM, merging his disciplined project management with the fluid creativity sparked by his abstract watercolor practice.
  sports: Ethan Williams, a devoted fan of the Detroit Tigers and occasional spectator of the Detroit Red Wings, spends his mornings walking the Lake St. Clair shoreline and joins a senior sailing crew
    on the lake each summer, favoring low‑impact cardio over competitive sports while staying connected to his community’s athletic spirit.
  arts: Ethan Williams, an avid watercolorist and digital illustrator, draws inspiration from Kandinsky’s emotive abstraction and Mondrian’s geometric precision, frequently experiments with Procreate to
    render kinetic patterns, and regularly attends openings at the Detroit Institute of Arts where they discuss their latest series with fellow senior artists.
  travel: Ethan Williams, who prefers thoughtful, slow‑paced vacations over frantic tours, treasures weekend trips to Mackinac Island’s historic streets and seasonal hikes in the Upper Peninsula, has taken
    a memorable week in New York City to explore the Museum of Modern Art, and they keep a modest savings fund earmarked for a future art pilgrimage to Venice’s Biennale and the Louvre in Paris.
  culinary: Ethan Williams, a modest home cook who delights in harvesting native Michigan herbs for seasoning, often prepares roasted beet and carrot medleys with rosemary, savors fresh cherries and apple
    crisp desserts, experiments with sourdough starter on occasion, yet they habitually nibble salted crackers while solving Sudoku puzzles, sometimes over‑seasoning dishes with extra pepper.
  core: Ethan Williams, a 66‑year‑old engineer‑turned‑artist, fuses meticulous structural thinking with boundless abstract creativity, channels anxiety through mindful meditation, and finds purpose in mentoring
    youth while occasionally indulging in impulsive art‑supply splurges.
background:
  cultural: Ethan grew up in the Detroit metropolitan area during the post-World War II industrial boom, absorbing Midwestern values of hard work, modesty, and community solidarity. His white, largely Protestant
    family emphasized education, self-reliance, and civic responsibility. The region's manufacturing heritage and Detroit's vibrant art scene fostered his appreciation for both technical precision and creative
    expression. Over the decades, Michigan's Great Lakes culture, seasonal rhythms, local festivals, and a strong tradition of volunteerism have shaped his outlook and sense of belonging.
attributes:
  skills: '[''Civil Engineering'', ''Mechanical Engineering'', ''Computer-Aided Design (CAD)'', ''Structural Analysis'', ''Project Management'', ''Data Analysis'', ''Statistical Modeling'', ''Technical
