  hobbies: '[''Watercolor painting'', ''Digital illustration'', ''Reading philosophy'', ''Reading classic literature'', ''Puzzle solving (crosswords, Sudoku)'', ''Book club participation'', ''Woodworking'',
    ''Mentoring STEM students'', ''Gardening (native plants)'', ''Walking along Lake St. Clair'', ''Mindfulness meditation'']'
  career_goals: Ethan aims to continue his lifelong learning by delving deeper into abstract art and philosophy, while dedicating his time to mentorship programs for high school students interested in STEM.
    He aspires to contribute his engineering expertise to local sustainability projects, such as assisting with the design of community garden infrastructure, and to produce a collection of watercolor paintings
    that explore the relationship between geometry and emotion. He also hopes to write a memoir reflecting on his career and personal journey, and to manage his anxiety through mindfulness practices and
    a supportive social network.
