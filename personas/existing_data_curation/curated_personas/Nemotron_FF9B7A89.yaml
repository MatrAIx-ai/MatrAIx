  career_goals: Kennan aims to move into a supervisory role within the next three years, targeting a foreman or shift‑lead position where he can blend his technical expertise with leadership. He plans to
    earn OSHA 30‑hour certification and complete a NCCER journeyman program to deepen his trade credentials. Long‑term, he envisions launching a modest, family‑run contracting business that specializes
    in sustainable residential renovations, allowing him to provide greater financial security for his wife and future children while applying his interest in green building practices. Balancing ambition
    with his sensitivity to stress, he also seeks mentorship opportunities to improve his stress‑management skills and maintain a healthy work‑life balance.
