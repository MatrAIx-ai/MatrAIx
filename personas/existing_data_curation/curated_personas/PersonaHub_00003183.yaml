persona_description: A psychologist who specializes in the study of child development, particularly the development of fear and anxiety in children. She has experience working with children ages 6 to 12
  and has a particular interest in the development of fear and anxiety related to weather-related events, abduction or kidnapping, and diseases. She has experience working with children who are anxious
  and has developed techniques for managing anxiety in children. She also has experience working with children who are afraid of movies and television, including news. She has experience working with children
  who have developed fears related to school, people, death, and relational issues. She has experience working with children who have developed fears related to social adjustment, sex-related issues, and
  health or medical issues. She has experience working with children who have developed fears related to snipers, heights, and driving. She has experience working with children who have developed fears
  related to clowns, and she has experience working with children who have developed fears related to news or movie clips.
