  career_goals: Cameron dreams of turning his love for animals and his practical problem‑solving skills into a future career. He hopes to become a veterinarian or an agricultural engineer focused on sustainable
    farming methods. In the short term, he is driven to earn good grades, secure a scholarship for high school, take on greater responsibility in his 4‑H projects, and develop his coding skills so he can
    create tools that help local farms run more efficiently.
