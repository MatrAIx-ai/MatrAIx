personas:
  professional: Cameron Dodgen is a budding engineer who channels their love for structure into building intricate LEGO sets and designing redstone contraptions in Minecraft; they apply practical problem‑solving
    skills and a reliable, organized approach even in team projects like 4‑H.
  sports: Cameron Dodgen pitches for the Maple Grove Little League team, practices batting drills after school, and supports the nearby minor‑league baseball club the River City Runners; they also enjoy
    weekend fishing trips with dad on Willow Pond, balancing competitive play with relaxed outdoor activity.
  arts: Cameron Dodgen spends free time sketching the rolling fields around their hometown, listening to classic rock legends such as The Beatles and Led Zeppelin during family road trips, and diving into
    the Percy Jackson series; they weave together visual, auditory, and literary creativity.
  travel: Cameron Dodgen prefers short, family road trips that blend scenic drives—listening to classic rock—to visit nearby attractions like the state park’s hiking trails; they also dream of a future
    adventure to the Grand Canyon’s rim and a summer camp in the Rockies.
  culinary: Cameron Dodgen favors classic kid‑friendly fare such as pizza with pepperoni, chicken nuggets, and mac and cheese, but also enjoys cooking freshly caught trout with lemon and herbs after fishing
    trips; they showcase a growing curiosity for simple, fresh ingredients.
  core: Cameron Dodgen is a structured, LEGO‑obsessed twelve‑year‑old who balances meticulous building projects with spontaneous fishing outings, a love for classic rock, and a habit of saving pocket money
    for new sets; they often forget to finish chores before bedtime.
background:
  cultural: Cameron was raised in Moniteau County, Missouri, a tight‑knit, predominantly white Midwestern community where practical values and self‑reliance are emphasized. His family participates in local
    traditions such as church gatherings, county fairs, and 4‑H competitions, fostering a strong sense of community service and respect for hard work. Holiday celebrations like Thanksgiving and the Fourth
    of July often involve potluck meals and neighborhood barbecues. This cultural setting reinforces a blend of structured routine, cooperative spirit, and modest independence that shapes Cameron’s outlook
    and daily life.
