personas:
  professional: Stephen Carter, a 23‑year‑old transportation service attendant, blends meticulous operational expertise with a creative flair, using their data‑driven mindset and empathy to keep transit
    running smoothly while championing public‑art initiatives and mentoring new staff.
  sports: Stephen Carter, an avid pickup basketball player, cheers for the Indiana Pacers and follows the University of Bloomington basketball team, joins a local hiking club for weekend treks in Hoosier
    National Forest, and attends yoga classes twice weekly to balance high‑energy competition with calming movement.
  arts: Stephen Carter immerses themselves in the Bloomington art scene, sketching urban landscapes in a watercolor notebook, snapping street photography inspired by Henri Cartier‑Bresson, playing acoustic
    renditions of Nick Drake at open‑mic nights, and volunteering as a mentor for middle‑school students while drawing inspiration from the works of contemporary artist Jeff Koons.
  travel: Stephen Carter prefers low‑key, budget‑friendly trips that blend nature and culture, having camped in the Great Smoky Mountains, explored the historic streets of Prague, and planning a future
    solo trek along the Appalachian Trail, all while using a meticulously planned itinerary to keep anxiety at bay.
  culinary: Stephen Carter enjoys cooking simple, fresh meals like lemon‑garlic grilled salmon with quinoa and roasted Brussels sprouts, experimenting with seasonal produce from the Bloomington farmers
    market, and they have a guilty pleasure for spicy ramen bowls on late‑night study sessions.
  core: Stephen Carter is a methodical transit attendant whose curiosity fuels a love of art and data, whose sociable energy fuels group hobbies, and whose anxiety drives meticulous planning, occasional
    over‑caffeination, and a habit of journaling at 3 am.
background:
  cultural: Stephen grew up in Celestine, a small, close-knit community in Dubois County, Indiana, where Midwestern values of hard work, hospitality, and community involvement are woven into daily life.
    His family attended a local Protestant church and participated in county fairs, high-school sports, and volunteer events, giving him a strong sense of place and modesty. While the region is largely
    homogeneous, Stephen was exposed to a variety of American cultural touchstones through school, regional libraries, and the internet, which sparked his curiosity about art, new ideas, and unconventional
    perspectives. This blend of traditional small-town upbringing and an outward-looking curiosity shapes his worldview, making him both grounded in his local heritage and eager to explore broader cultural
    experiences.
attributes:
  skills: '[''Customer Service'', ''Ticketing Software Operation'', ''Cash Handling'', ''Route Planning'', ''Schedule Coordination'', ''Safety & Emergency Procedures'', ''Vehicle Inspection'', ''Basic Mechanical
