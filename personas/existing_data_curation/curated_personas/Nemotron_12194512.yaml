  hobbies: '[''Watercolor sketching'', ''Acoustic guitar'', ''Gallery visits'', ''Science-fiction & philosophy reading'', ''Youth art mentoring'', ''Basketball'', ''Hiking'', ''Yoga & mindfulness meditation'',
    ''Street photography'', ''Journaling'']'
  career_goals: Long-term, Stephen aims to move from the attendant position into a supervisory or management role within the regional transit authority, such as a Transit Operations Supervisor or Logistics
    Coordinator. To achieve this, he plans to complete a bachelor's degree in Transportation Management or Business Administration while working, and to earn industry certifications like the Certified Transit
    Operator and the Transportation Safety Manager credential. He is especially interested in leveraging data analytics to improve route efficiency and in integrating public art projects into stations and
    vehicles, merging his love of art with his professional expertise. In the next two years he hopes to lead small teams, mentor new attendants, and spearhead a pilot program that introduces environmentally
    friendly practices, like electric shuttle routes, to his county's transit system.
