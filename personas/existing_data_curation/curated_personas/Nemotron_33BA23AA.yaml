    Mexican dancing (Folklorico)'', ''Journaling'', ''Puzzle solving (crosswords, Sudoku)'', ''Board games (Catan with small group)'', ''Volunteering at community library'']'
  career_goals: 'Mayra dreams of a career that blends her love for animals, the environment, and helping others. She aims to graduate high school with honors and pursue a degree in biology or environmental
    science at a university such as UC Riverside. Her long‑term ambition is to become a veterinarian or an environmental researcher, allowing her to protect wildlife and contribute to community sustainability
    projects. She also hopes to mentor younger students in STEM fields, fostering curiosity and practical problem‑solving skills.


    In the short term, she plans to earn a certification in basic pet first aid and to join her school''s ecology club to gain hands‑on experience.'
