personas:
  professional: Mayra Serrano is a budding coder and junior library volunteer who blends their curiosity for sci‑fi worlds with methodical planning, using Scratch and Python to create simple games that
    they later share during story‑time sessions at the community library.
  sports: Mayra Serrano enjoys the rhythmic discipline of folklorico dancing at family festivals and occasionally joins the school's beginner volleyball club, cheering for the local soccer team, the City
    Dons, while preferring solo jogs in the nearby park over crowded gym sessions.
  arts: Mayra Serrano spends evenings sketching imagined alien landscapes inspired by authors like Octavia Butler and listening to the ambient scores of composer Ramin Djawadi, while their board-game nights
    bring out a love for the strategic artistry of Catan and the whimsical illustrations of "Ticket to Ride".
  travel: Mayra Serrano favors low-key weekend trips to the regional natural history museum and the quiet mountain trailhead of Sierra Vista, planning outings with a checklist and an eye toward affordable,
    family-friendly destinations like the historic town of San Miguel for its festive dances.
  culinary: Mayra Serrano enjoys brewing fresh mint-basil tea from their balcony herb garden, whipping up simple avocado toast with lime zest, and experimenting with homemade pizza toppings, though they
    often forget to rotate the herbs, leading to some wilted leaves.
  core: Mayra Serrano is a methodical, curiosity-driven teen who balances solitary coding projects and sketching with nurturing their hamster and herb garden, all while quietly mastering the art of budgeting
    and self-care.
background:
  cultural: Mayra comes from a Mexican‑American family in Riverside, California, where Spanish is spoken at home alongside English. She celebrates Mexican holidays such as Día de los Muertos, Cinco de Mayo,
    and Las Posadas, often helping to prepare traditional foods like tamales and pozole. Her family places a strong emphasis on respect (respeto), close‑knit relationships, and community involvement, which
    influences her cooperative and kind demeanor. Attending a diverse public middle school, she blends Mexican cultural values with the broader Californian environment, navigating both traditions while
    maintaining a bilingual identity. Her cultural heritage informs her love for music, dance, and community service, and she often participates in local cultural festivals and church events that reinforce
    her sense of belonging.
