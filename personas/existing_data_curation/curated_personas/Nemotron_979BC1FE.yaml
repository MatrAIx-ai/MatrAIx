  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting'', ''Traditional Mexican folk dance'', ''Cooking Mexican cuisine'', ''Volunteering as an art mentor'', ''Gardening'', ''Hiking
    in Angeles National Forest'', ''Reading historical fiction'', ''Exploring genealogy'', ''Attending community cultural festivals'']'
  career_goals: She aims to transition into a supervisory or safety‑trainer role within the manufacturing plant, where she can lead process‑improvement projects and mentor younger staff. Bibiana also hopes
    to obtain a certification in occupational health and safety and eventually volunteer as an arts coordinator for a community center, merging her technical experience with her passion for art. Over the
    next few years, she aspires to design a more sustainable packaging workflow that reduces waste and showcases culturally inspired visual elements.
