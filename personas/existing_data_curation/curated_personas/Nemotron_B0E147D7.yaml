  hobbies: '[''experimental home cooking'', ''herb gardening'', ''watercolor painting'', ''listening to gospel, jazz, and blues'', ''hiking'', ''reading food history'', ''writing a personal food blog'',
    ''volunteering at community cooking classes'']'
  career_goals: Driven by his curiosity and love for artistic expression, James aspires to transition from his current role as a line cook to a head chef position within a boutique restaurant that celebrates
    Southern heritage and contemporary cuisine. He envisions eventually opening a small, community‑focused eatery or pop‑up dining series in Gray where he can curate seasonal menus that spotlight locally
    sourced produce and his family's culinary traditions. To support this ambition, he plans to enroll in a culinary certificate program at a nearby community college and to network with local farmers and
    artisans. James also hopes to mentor youth in his community, using cooking workshops to preserve cultural recipes and to foster creative confidence.
