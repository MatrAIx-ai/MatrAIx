  hobbies: '[''Reading (historical fiction, self-help)'', ''Gardening (vegetables and ornamental plants)'', ''Cooking (Southern and soul-food recipes)'', ''Quilting and fabric crafts'', ''Walking in nature/local
    parks'', ''Volunteer work at community center'', ''Bible study and church choir'', ''Puzzles (crosswords, Sudoku)'', ''Listening to gospel and jazz music'']'
  career_goals: She aims to advance to a senior management analyst or operations manager position within the county government, where she can lead larger efficiency initiatives and mentor newer staff. Completing
    a GED or professional certification such as PMP is part of her plan to formalize her knowledge. Long‑term, Velette hopes to develop a community‑focused program that teaches financial literacy and workplace
    readiness, blending her analytical background with her commitment to harmony, cooperation, and stress‑reduction for herself and others.
