personas:
  professional: Craig Lopez, a senior finance manager for an oil‑and‑gas firm in the Permian Basin, leverages his methodical, risk‑aware mindset, deep expertise in budgeting, cash‑flow analysis, SAP/Oracle,
    and a collaborative leadership style to streamline internal controls while mentoring his team through clear procedures.
  sports: Craig Lopez enjoys a low‑key fitness routine that blends weekend 18‑hole rounds at the Midland Country Club—often used for networking—with seasonal fishing trips on the Pecos River, hiking desert
    trails in spring, and they proudly follow the Dallas Cowboys, Texas Rangers, and are a member of the Midland Golf Association, preferring measured activity over high‑intensity workouts.
  arts: Craig Lopez, a devoted fan of classic country music, regularly attends live shows featuring George Strait, Willie Nelson, and Chris Stapleton, enjoys rodeo spectacles with their spouse, and keeps
    a modest collection of Western‑themed vinyl records that provide a nostalgic soundtrack to their woodworking sessions.
  travel: Craig Lopez prefers road‑trip adventures that balance family time and budget, having explored Big Bend National Park and Carlsbad Caverns on weekend getaways, dreaming of a future cross‑country
    drive to Nashville’s Country Music Hall of Fame while always planning around the school calendar and work commitments.
  culinary: Craig Lopez relishes hearty Texas cuisine, favoring slow‑cooked brisket seasoned with smoked paprika, cumin, and fresh jalapeños, enjoys grilling shrimp tacos on the patio, and possesses a solid
    intermediate skill set in weekend barbecuing, though they sometimes over‑salt dishes when stressed.
  core: Craig Lopez is a structured finance professional who worries about numbers, seeks harmony at work and home, unwinds with fishing, classic‑car restoration, and country music, yet can’t resist a late‑night
    spreadsheet run that fuels insomnia.
background:
  cultural: Craig was born and raised in West Texas, growing up in a close-knit, predominantly white community where oil and gas shaped the local economy. His family’s values are rooted in self-reliance,
    modesty, and Christian faith, which have fostered a strong sense of duty to family and community. The regional culture emphasizes practicality, hard work, and respect for tradition, traits that align
    with Craig’s preference for structure and his cooperative, harmony-seeking personality.
attributes:
  skills: '[''Financial analysis'', ''Budgeting and forecasting'', ''Cash flow management'', ''Risk assessment'', ''Internal controls and compliance'', ''Data visualization (Excel, Power BI)'', ''ERP systems
    (SAP, Oracle)'', ''Team leadership and staff development'', ''Strategic financial planning'', ''Cost optimization in oil & gas sector'']'
  hobbies: '[''Fishing'', ''Hiking in West Texas desert'', ''Golf'', ''Country music concerts'', ''Classic car restoration'', ''Home improvement projects'', ''Reading (finance, history)'', ''Gardening'',
    ''Volunteer work with local food bank'']'
  career_goals: Craig aims to become a chief financial officer within the next five years, leading the finance function of a mid-size energy company. He plans to earn his CPA and a CMA credential to deepen
    his technical expertise. He wants to introduce advanced analytics and automated reporting to enhance financial transparency, reduce risk, and support strategic growth in the Permian Basin. At the same
    time, Craig values work-life balance and intends to mentor junior finance staff, fostering a supportive, low-stress workplace culture.
