personas:
  professional: Violet Gatlin is an aspiring pop‑up chef and freelance digital illustrator who translates a hands‑on DIY mindset and basic mobile photo‑editing into experimental Southern‑fusion menus, while
    their relaxed attitude toward deadlines and competitive drive to out‑craft local eateries often clash with a naturally disorganized workflow.
  sports: Violet Gatlin stays active primarily through solitary walks along the Mississippi riverfront and casual home yoga, while rooting for the New Orleans Pelicans in basketball season and the Saints
    during football, and they occasionally join impromptu pickup basketball games despite a generally relaxed and unstructured approach to fitness.
  arts: Violet Gatlin intertwines street‑level photography of New Orleans murals with quick sketchbook doodles, drawing artistic influence from Louis Armstrong’s jazz, B.B. King’s blues, indie folk artist
    Sufjan Stevens, and photographer William Eggleston, channeling this eclectic mix into vivid digital illustrations and social‑media graphics.
  travel: Violet Gatlin prefers spontaneous, budget‑friendly weekend trips, often biking to historic towns like Savannah or catching a bus to Biloxi’s Gulf Coast beaches, while dreaming of a future artistic
    pilgrimage to New York’s Chelsea galleries, balancing a tight student budget with a yearning for culturally rich experiences.
  culinary: Violet Gatlin delights in cooking gumbo, jambalaya, and beignets with a contemporary twist, layering fresh balcony herbs such as thyme, basil, and cilantro into traditional Southern dishes while
    listening to jazz and indie folk, and they experiment with modern plating techniques inspired by avant‑garde chefs.
  core: Violet Gatlin is a 17‑year‑old creative wanderer who channels intense curiosity and competitive ambition into cooking and illustration, yet often battles procrastination and anxiety‑driven mood
    swings that leave them disorganized and skeptical of external expectations.
background:
  cultural: Violet grew up in a predominantly white, middle‑class family in the Crescent City, absorbing the laid‑back Southern lifestyle and the city’s rich multicultural tapestry. The vibrant music scene,
    Creole culinary traditions, and the blend of French and African American heritage in New Orleans shaped her appreciation for food, rhythm, and visual art. While her family’s cultural practices are rooted
    in traditional Southern customs, her daily life is colored by the city’s festive celebrations, Saturday morning markets, and the communal spirit of neighborhood block parties.
attributes:
  skills: '[''basic internet research'', ''photo editing with mobile apps'', ''preparing Southern cuisine (gumbo, jambalaya, beignets)'', ''sketching and visual storytelling'', ''DIY furniture repurposing'',
