  hobbies: '[''urban photography'', ''sketching'', ''poetry writing'', ''listening to jazz and blues'', ''cooking Southern dishes'', ''playing narrative video games'', ''herb gardening'']'
  career_goals: Violet wants to earn her GED within the next year and enroll in a community‑college culinary program that lets her blend her love for traditional Southern cooking with modern plating techniques.
    She hopes to eventually open a small pop‑up kitchen in the French Quarter where she can experiment with fusion dishes. In parallel, she aims to develop a freelance portfolio of digital illustrations
    and social‑media graphics to generate supplemental income, giving her the flexibility to work on her own schedule.
