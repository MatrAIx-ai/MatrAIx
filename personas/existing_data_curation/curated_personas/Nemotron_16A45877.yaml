personas:
  professional: Shigeko Carter, a budding junior coder and amateur naturalist at age six, channels their curiosity and methodical planning into creating tiny coding games on a tablet while assembling detailed
    Lego ecosystems that mirror forest habitats, and they showcase early problem‑solving skills and a competitive drive to master each new challenge.
  sports: Shigeko Carter enjoys weekend nature hikes that double as low‑impact cardio, participates in the local Cub Scouts' outdoor adventure club, cheers for the West Virginia Mountaineers football team
    on game day, and they occasionally kick a soccer ball in the community park with the neighborhood’s under‑8 league.
  arts: Shigeko Carter spends afternoons drawing intricate forest scenes inspired by the melodies of Bill Monroe and Alison Krauss, devours mystery chapter books by Enid Blyton, and attends the annual local
    folk storytelling festival where they recite their own tales about woodland creatures.
  travel: Shigeko Carter prefers family road trips that blend exploration and quiet, having recently visited Mammoth Cave National Park to sketch stalactite formations, dreaming of a future visit to the
    Blue Ridge Parkway and the Smithsonian museums in Washington, D.C., and they always pack a sketchbook and a snack of apple slices.
  culinary: Shigeko Carter favors homemade biscuits with honey, loves the tang of cheddar cheese on a grilled cheese sandwich, enjoys snacking on dried wild berries they pick on hikes, and, despite limited
    cooking skills, can follow a simple step‑by‑step recipe for banana muffins with a parent's supervision.
  core: Shigeko Carter is a quiet, detail‑obsessed six‑year‑old who balances a love for solitary puzzles and nature sketching with a competitive streak that fuels their drive to master coding games, Lego
    builds, and meticulous diary planning, and they wrestle with frequent worries.
background:
  cultural: Shigeko grows up in Ona, a small community in Cabell County, West Virginia, within a predominantly white, Appalachian cultural setting. Her family values self‑reliance, modesty, and a strong
    connection to the natural surroundings of the hills and forests. Local traditions such as folk storytelling, bluegrass music, and seasonal outdoor activities influence her upbringing, though she personally
    gravitates toward quiet indoor pursuits. The community’s emphasis on education and hard work shapes her disciplined mindset, while the rural environment nurtures her curiosity about nature and science.
