  hobbies: '["Reading mystery books","Jigsaw puzzles","Lego building and customization","Detailed nature drawing","Exploring and sketching plants/insects","Block‑based coding games","Maintaining a personal
    diary/planner"]'
  career_goals: Shigeko dreams of becoming a scientist or engineer, fascinated by how things work and eager to design her own inventions. She also imagines working as a librarian or archivist, where she
    could maintain a quiet, orderly environment and manage information. Her competitive nature drives her to aim for top grades, win school science fairs, and earn recognition for her meticulous projects.
