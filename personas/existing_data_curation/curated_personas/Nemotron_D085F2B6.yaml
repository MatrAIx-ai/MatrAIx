  hobbies: '[''Drawing fantastical creatures'', ''Building with LEGO and wooden blocks'', ''Solving jigsaw puzzles'', ''Reading picture books about space and abstract art'', ''Collecting stones'', ''Listening
    to music (Mexican lullabies, instrumental)'', ''Inventing simple toys from recyclables'']'
  career_goals: Even at four, Jose dreams of becoming a creator who works independently. He imagines designing his own space rockets and drawing giant murals that tell stories of distant planets. He aspires
    to be the best puzzle-solver in his school, to invent new games that combine art and logic, and someday to be an astronaut-artist who explores unknown worlds while illustrating them.
