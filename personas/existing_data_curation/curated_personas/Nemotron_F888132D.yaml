  career_goals: She dreams of a future where she can protect her community’s water and environment, perhaps as an environmental scientist or civil engineer focused on clean-water solutions. She also loves
    sharing knowledge, so she imagines becoming a teacher who makes learning fun and inclusive. Caring for others appeals to her, leading her to consider a career as a pediatric nurse or doctor. Overall,
    Annabelle aims to combine her curiosity, teamwork, and kindness into a role that helps people and makes her hometown a safer, healthier place.
