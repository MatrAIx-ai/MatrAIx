personas:
  professional: Annabelle Zayas is an aspiring junior scientist who blends their curiosity about how things work with a practical knack for building LEGO models, often leading their school’s science club
    projects with spontaneous energy while sometimes struggling to keep their experiments organized.
  sports: Annabelle Zayas dashes onto the field for their Lakeview Lions youth soccer team, idolizing the Milwaukee Bucks for their fast‑break energy and the Detroit Tigers for their teamwork, and they
    approach fitness with a love for spontaneous park scrimmages, even if they sometimes forget to stretch before games.
  arts: Annabelle Zayas grooves to the upbeat rhythms of The Supremes and Ariana Grande while sketching comic panels inspired by Stan Lee and the whimsical animation style of Disney’s ‘Moana’, merging their
    love for dance, pop culture, and visual arts into a lively creative outlet.
  travel: Annabelle Zayas spends their free weekends exploring the sandy shores of Presque Isle State Park along the Great Lakes and the wooded trails of local nature reserves, while dreaming of a family
    road trip to Washington, D.C., and a summer vacation at Disney World, balancing their love for adventure with the practical limits of school schedules and parental budgets.
  culinary: Annabelle Zayas loves the cheesy stretch of a homemade pizza topped with pepperoni and fresh basil, the smooth comfort of mac and cheese, and they confidently whip up fruit kebabs with grapes,
    strawberries, and watermelon, though they often forget to wash their hands before cooking.
  core: Annabelle Zayas is a bright‑hearted, curiosity‑driven nine‑year‑old who blends spontaneous storytelling, a love for soccer and comics, and an ever‑growing collection of LEGO masterpieces into a
    lively, sometimes disorganized, world of playful exploration.
background:
  cultural: Annabelle is a white Midwestern girl raised in Flint, Michigan, a city known for its strong community bonds and recent history of the water crisis. Her family embraces typical Midwestern values
    of hard work, modesty, and helping neighbors, and they are actively involved in local church and neighborhood activities. The legacy of the Flint water situation has fostered a heightened awareness
    of health, environmental stewardship, and civic engagement in her household. She regularly participates in public school events that celebrate local heritage, enjoys seasonal community festivals, and
    is exposed to the city’s automotive and Motown cultural influences. These experiences shape her pragmatic outlook, her empathy for others, and her desire to contribute positively to her community.
