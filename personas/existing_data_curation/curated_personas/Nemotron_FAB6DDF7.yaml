  career_goals: As she approaches retirement, Veronica aims to translate her extensive managerial background into a senior advisory role that shapes policy and program design for Bronx‑based community organizations.
    Her immediate goal is to secure a Director‑level position overseeing multi‑agency collaborations, while also establishing a mentorship pipeline for emerging Latinx leaders. Long‑term, she envisions
    serving on nonprofit boards and consulting for small businesses in her neighborhood, leveraging her expertise to promote sustainable growth and workforce development.
