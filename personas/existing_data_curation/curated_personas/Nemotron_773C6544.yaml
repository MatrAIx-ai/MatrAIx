  career_goals: Allen aims to become a director of youth development within Minneapolis Parks and Recreation, where he can design integrated sports and arts programs that foster holistic growth for local
    youth. He envisions creating a community hub that combines athletic training, artistic expression, and mentorship, and eventually becoming a recognized thought leader in inclusive talent development.
    Over the long term, he plans to launch his own consultancy that advises schools and nonprofit organizations on building culturally responsive coaching and scouting frameworks.
