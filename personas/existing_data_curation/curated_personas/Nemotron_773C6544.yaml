personas:
  professional: Allen Joseph merges a humanities background with systematic sports scouting to design data-driven talent pipelines and community outreach events, leveraging polished public-speaking, meticulous
    planning, and a collaborative yet assertive style to mentor young athletes and propose integrated arts-sports programs for Minneapolis Parks and Recreation.
  sports: Allen Joseph plays pick-up basketball at the Minneapolis Youth Basketball League, coaches a Saturday junior team, roots for the Minnesota Timberwolves and Vikings, hikes Itasca State Park in summer,
    and joins a local adult league for recreational volleyball during the fall.
  arts: Allen Joseph frequents the Walker Art Center and visits installations by James Turrell, captures urban moments with a Leica camera inspired by Henri Cartier-Bresson, curates playlists featuring
    Prince and Lizzo for community events, and attends productions at the Orpheum Theatre starring actors like Taylor Schilling.
  travel: Allen Joseph plans trips with detailed itineraries, has explored New Orleans during Mardi Gras, trekked the Boundary Waters Canoe Area, dreams of visiting Kyoto's Gion district and the Amalfi
    Coast, and balances weekend getaways with occasional international backpacking once a year.
  culinary: Allen Joseph experiments with Ethiopian injera, Thai green curry, and Finnish salmon gravlax, perfects a spicy Szechuan mapo tofu using doubanjiang, frequently shops at the Nicollet Farmers
    Market for fresh produce, and enjoys dining at The Bachelor Farmer for its farm-to-table ethos.
  core: Allen Joseph is a 29-year-old community-focused sports-arts strategist who balances meticulous planning with a restless curiosity, occasionally overbooks their schedule but always finds time to
    snap a photo of the city's hidden corners.
background:
  cultural: Allen grew up in a close‑knit African‑American community in Minneapolis, drawing on the rich traditions of the Twin Cities’ Black cultural heritage. His family maintains Southern roots, celebrating
    gatherings around soul food, gospel music, and storytelling. He participates actively in local cultural events such as the African World Festival and the Twin Cities Jazz Festival, and he values the
    legacy of civil‑rights activism that shaped his neighborhood. His upbringing instilled a deep appreciation for both artistic and athletic achievements within the Black community, which he brings to
    his coaching and scouting work.
