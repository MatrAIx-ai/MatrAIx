persona_description: A biologist who specializes in the study of neurotransmitter transport proteins, particularly those involved in the regulation of GABA levels in the central nervous system. She is particularly
  interested in the high-affinity sodium-dependent transport mechanism used by GABA plasma membrane transport proteins. Her research interests include the development of new drugs that can modulate GABA
  levels and the understanding of the cellular mechanisms underlying GABA's effects on brain function.
