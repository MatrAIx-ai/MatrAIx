personas:
  professional: Eddy Zayasrodriguez, a diligent radiologic technologist-in-training, leverages strong technical expertise in X‑ray, CT, and MRI alongside bilingual communication and meticulous organizational
    skills to mentor peers, ensure safety compliance, and streamline imaging workflows in a busy community hospital setting, where they thrive on structure and teamwork.
  sports: Eddy Zayasrodriguez plays on a local co‑ed soccer league and a rec basketball team, proudly cheering for FC Cincinnati and the Cleveland Cavaliers, and they supplement group games with weekly
    hikes at Hueston Woods State Park to stay fit and balance their energetic social schedule.
  arts: Eddy Zayasrodriguez immerses themselves in Latin music by attending salsa nights featuring artists like Marc Anthony and Celia Cruz, curates a podcast that discusses health‑tech trends alongside
    indie rock playlists, and practices street photography inspired by Henri Cartier‑Bresson, capturing the interplay of historic architecture and candid family moments.
  travel: Eddy Zayasrodriguez prefers meticulously planned weekend road trips to nearby cultural hubs such as Nashville and New Orleans, while also dreaming of an extended adventure in Barcelona to explore
    Gaudí’s architecture, blending a love for photography with a modest travel budget that they fund through part‑time freelance tutoring.
  culinary: Eddy Zayasrodriguez enjoys cooking traditional island dishes like ropa vieja, plantain chips, and black bean soup for friends, wielding a well‑stocked spice rack with cumin, oregano, and fresh
    cilantro, and they balance their culinary enthusiasm with occasional late‑night snack binges on empanadas.
  core: Eddy Zayasrodriguez combines a methodical, structure‑loving mindset with an outgoing, team‑centric spirit, channeling their bilingual technical expertise into radiology while juggling spontaneous
    salsa nights, diligent budgeting, and a penchant for impromptu photography.
background:
  cultural: Eddy is a second-generation Cuban-American whose family emigrated to the United States in the early 1990s. Raised in a bilingual household in Oxford, Ohio, he speaks fluent Spanish and English,
    and maintains strong ties to Cuban traditions such as celebrating Carnaval, preparing ropa vieja, and listening to son and salsa. Family gatherings are central, emphasizing collectivism, respect for
    elders, and hospitality. While he lives in a Midwestern setting, Eddy blends these cultural values with the local community’s emphasis on neighborly support, often participating in cultural festivals
    and volunteering with Hispanic outreach programs. His Catholic upbringing informs his appreciation for community service and personal humility.
attributes:
  skills: '[''Digital X-ray operation'', ''CT scanning'', ''MRI operation'', ''Radiation safety and dose management'', ''Patient positioning and care'', ''Anatomy and pathology knowledge'', ''PACS and DICOM
    image handling'', ''Imaging software analysis (e.g., OsiriX, RadiAnt)'', ''Equipment troubleshooting and maintenance'', ''Bilingual communication (Spanish/English)'', ''Scheduling and documentation'',
    ''Team training and mentorship'']'
  hobbies: '[''Soccer (intramural)'', ''Basketball (recreational leagues)'', ''Salsa dancing and Cuban music socials'', ''Cooking Cuban cuisine for gatherings'', ''Volunteering at health fairs and community
    clinics'', ''Hiking local nature trails'', ''Playing chess'', ''Photography (architecture, family events)'', ''Podcasting about health-tech trends'']'
  career_goals: Eddy aims to obtain ARRT certification within the next year, followed by advanced certifications in MRI and CT. He plans to enroll in a part-time bachelor’s program in Radiologic Sciences
    or Healthcare Administration to broaden his leadership knowledge. Within five years, he aspires to become a radiology department supervisor at a regional hospital, where he can implement quality-improvement
    initiatives and mentor staff. Eddy also wants to develop a community outreach program in Preble County to educate residents about preventive imaging and radiation safety, leveraging his sociable nature
    to engage local schools and senior centers. Long-term, he envisions contributing to research on low-dose imaging protocols and the integration of AI tools in diagnostic radiology.
