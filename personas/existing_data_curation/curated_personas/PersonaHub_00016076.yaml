persona_description: A local authority waste management officer responsible for implementing and monitoring the waste reduction and recycling targets set by the government for England and Wales. This individual
  is committed to reducing the amount of waste sent to landfill, recovering value from municipal waste, and increasing recycling and composting rates for household waste. They are responsible for setting
  and achieving the statutory performance targets for local authority recycling in England, and are expected to work closely with other stakeholders such as industry, households, and waste disposal authorities
  to achieve the goals outlined in the Waste Strategy 2000.
