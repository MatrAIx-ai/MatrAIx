  hobbies: '[''Hiking in the Wasatch Mountains'', ''Backcountry skiing'', ''Rock climbing'', ''Strategy board games'', ''True‑crime podcasts'', ''Landscape photography'', ''Reading non‑fiction on technology
    and sales'']'
  career_goals: Matthew aims to move from his current role as a sales representative of services to a senior sales position within the next 18‑24 months, focusing on high‑value enterprise accounts. He plans
    to earn a bachelor's degree in business administration or a related field to strengthen his strategic acumen. Long‑term, he envisions stepping into a regional sales manager role where he can mentor
    newer reps, shape sales strategies, and contribute to product development feedback loops. Ultimately, he aspires to leverage his competitive drive and industry knowledge to launch his own boutique consulting
    firm that helps small businesses choose and implement service solutions.
