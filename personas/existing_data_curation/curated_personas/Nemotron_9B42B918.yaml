  career_goals: 'William aims to re‑enter the workforce in a part‑time or consulting capacity that leverages his organizational and community‑building expertise, such as a program coordinator or volunteer
    manager for a local nonprofit. He also hopes to establish a small consulting practice advising community organizations on efficient program design and fundraising strategies, while maintaining a predictable
