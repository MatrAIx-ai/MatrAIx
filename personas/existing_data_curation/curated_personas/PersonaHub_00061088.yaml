persona_description: A teacher or instructor who is responsible for designing and implementing exercises that require students to solve problems by performing multiple steps of operations, each of which
  is complex enough to warrant its own instructions and a check on whether it has been done correctly. The exercises are typically Sequential in nature, with each step having instructions of varying lengths
  and the exercise containing a total of four instructions regardless of the number of steps. The exercise may include a Multiple Choice with Console step, which is not a requirement for the exercise but
  allows the instructor to test the student's ability to interpret the output. The exercise types are designed to be mixed, with some exercises consisting of Coding and Multiple Choice with Console steps.
