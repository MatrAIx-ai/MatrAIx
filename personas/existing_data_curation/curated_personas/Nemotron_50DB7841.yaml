  hobbies: '[''Art Gallery Visits'',''Reading Historical Biographies'',''Gardening'',''Bird Watching'',''Coastal Trail Walking'',''Small Book Club'',''Watercolor Painting'']'
  career_goals: Nedra aims to expand her impact by leading a district-wide initiative that weaves interdisciplinary arts into STEM curricula, securing sustainable funding for innovative early-learning programs,
    mentoring the next generation of education administrators, and establishing a professional-development series focused on cultivating resilience and creative problem-solving among educators. She also
    hopes to contribute to policy discussions at the state level on early childhood education standards.
