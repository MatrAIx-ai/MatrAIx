personas:
  professional: Marielys Moncada is a bilingual education consultant who leverages their disciplined, detail‑oriented approach to design and deliver adult literacy curricula, while their balanced curiosity
    and kindness drive them to mentor at‑risk youth and lead culturally responsive workshops.
  sports: Marielys Moncada enjoys low‑impact fitness through daily walks along the Rio Grande and weekly yoga classes, follows the El Paso Chihuahuas baseball team in spring and the El Paso Locomotive FC
    soccer club in fall, and participates in a senior walking group that meets at the community center every Saturday.
  arts: Marielys Moncada’s artistic life revolves around photographing family gatherings and desert landscapes, reading historical fiction by authors such as Hilary Mantel and Ken Follett, and listening
    to the soulful ballads of Natalia Lafourcade and the classic films of Pedro Almodóvar, which together enrich their sense of cultural continuity.
  travel: Marielys Moncada favors purposeful, slow‑travel trips that blend genealogy research with cultural immersion, having explored historic towns like San Miguel de Allende and Santa Fe, and they dream
    of a pilgrimage to the ancient ruins of Teotihuacan, all while planning within a modest retirement budget and coordinating with adult children and grandchildren.
  culinary: Marielys Moncada, an accomplished home cook, delights in preparing classic dishes such as pozole, tamales, chiles en nogada, and fresh salsa verde using home‑grown cilantro, epazote, and tomatillos,
    often sharing these meals at community potlucks where they savor the convivial atmosphere as much as the flavors.
  core: Marielys Moncada blends disciplined organization with boundless curiosity, channeling their love of puzzles and genealogy into community storytelling while occasionally losing track of time in the
    garden, forgetting to water their succulents during rainy spells.
background:
  cultural: Marielys is a first‑generation Mexican‑American who grew up in a bilingual household near the U.S.–Mexico border. Her childhood was steeped in Mexican traditions such as Día de los Muertos,
    quinceañeras, and Catholic celebrations, while also absorbing the Texan cultural milieu of El Paso. She values family cohesion, communal hospitality, and the preservation of Mexican language and cuisine.
    Living in a border city, she effortlessly navigates both cultures, speaking fluently in Spanish and English, and actively contributes to cross‑cultural dialogue through volunteer work, community events,
    and mentorship.
attributes:
  skills: '["Bilingual instruction (English‑Spanish)", "Curriculum development for K‑12 and adult learners", "Literacy and reading intervention", "Classroom management and student assessment", "Educational
