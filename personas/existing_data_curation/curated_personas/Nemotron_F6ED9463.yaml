personas:
  professional: Larry Marsh, a 47‑year‑old physician assistant with two decades of primary‑care and orthopaedic experience, blends meticulous clinical assessment, hands‑on procedural skill, and health‑informatics
    savvy to create patient‑education illustrations that turn complex diagnoses into visual stories, while they steer workflow improvements and mentor future PAs with organized, methodical precision.
  sports: Larry Marsh cycles the Macomb County trail network with their local road‑bike club, hikes the Huron‑Manistee National Forest during summer weekends, and supports the Detroit Lions and Detroit
    Pistons, while they maintain a disciplined routine that includes weekly strength‑training to manage early‑onset knee wear.
  arts: Larry Marsh, an avid oil‑painter of realist portraits inspired by John Singer Sargent, strums acoustic folk and jazz standards à la Bob Dylan and Bill Evans on their guitar, participates in Detroit
    improv workshops, and captures urban Detroit skylines and forest scenes with a Nikon D750, often drawing creative energy from the works of photographer Ansel Adams.
  travel: Larry Marsh prefers meticulously planned trips that balance cultural immersion and outdoor adventure, having explored the Renaissance art of Florence, the coastal trails of the Scottish Highlands,
    and the culinary markets of Marrakech, while they dream of a road‑trip along the Pacific Coast Highway to photograph sunrise over Big Sur.
  culinary: Larry Marsh, an enthusiastic home chef, experiments with Mediterranean dishes such as lamb moussaka, shakshuka, and grilled branzino, delighting in the chemistry of olive oil, fresh herbs, and
    smoked paprika, and they frequently pair their meals with a glass of dry rosé while occasionally over‑seasoning in their quest for bold flavor.
  core: Larry Marsh, a curious and organized 47‑year‑old healer‑artist, fuses clinical precision with creative pursuits, juggling classic‑car restoration, oil‑painting, and guitar riffs while they balance
    disciplined finances and a penchant for late‑night creative bursts.
background:
  cultural: Larry grew up in a middle‑class family in the Detroit suburbs, specifically Sterling Heights, Michigan. His paternal grandparents immigrated from Poland and his maternal ancestors were of German
    descent, giving him a mixed Central European heritage. Raised in a Lutheran household, he was taught values of community service, punctuality, and modesty—traits often associated with Midwestern culture.
    The region’s industrial legacy sparked his early interest in mechanics and engineering, while Detroit’s vibrant cultural institutions—museums, music venues, and ethnic festivals—nurtured his appreciation
    for art and diverse ideas. He attended public schools that emphasized STEM education, leading to a bachelor's degree in biomedical engineering before transitioning to a career as a physician assistant.
    He identifies with Midwestern sensibilities—friendly, reliable, and pragmatic—while also embracing broader cultural influences through travel, reading, and active participation in the local arts scene.
attributes:
  skills: '[''Clinical assessment'', ''Diagnostic imaging interpretation'', ''Minor surgical procedures'', ''EHR workflow optimization'', ''Patient education and health coaching'', ''Medical illustration'',
