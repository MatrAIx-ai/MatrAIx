  hobbies: '[''reading historical fiction'', ''daily journaling'', ''baking traditional Puerto Rican pastries'', ''playing chess'', ''participating in school dance troupe (bomba/plena)'', ''hiking the Guánica
    Dry Forest on set routes'', ''collecting and organizing stickers'']'
  career_goals: Angel aims to graduate at the top of her class, earn a scholarship for a STEM program, and eventually become a civil engineer or a registered nurse so she can contribute to the infrastructure
    and health of her community. She also dreams of opening a small family bakery that preserves her cultural culinary heritage, combining her love of routine, organization, and tradition.
