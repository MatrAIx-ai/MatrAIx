personas:
  professional: Angel Gonzalez is a disciplined 12‑year‑old student who channels their love for routine and achievement into leading the school’s history club, organizing weekly historical fiction reading
    circles, and coaching peers in chess, applying meticulous planning and high standards to every activity.
  sports: Angel Gonzalez enjoys the stamina‑building rhythm of the school’s bomba and plena dance troupe, complements it with weekend hikes on the Guánica Dry Forest trails, and follows the local soccer
    team Coastal FC and the regional basketball squad the Northern Stars, adhering to a strict schedule of workouts to maintain consistency.
  arts: Angel Gonzalez curates a personal playlist that alternates between Lin‑Manuel Miranda’s Broadway numbers and Taylor Swift’s narrative‑driven pop songs, rehearses bomba and plena choreography after
    school, and fills a sketchbook with watercolor scenes inspired by Claude Monet’s Impressionist landscapes, all of which fuel their creative journaling.
  travel: Angel Gonzalez prefers meticulously planned trips with clear itineraries, often revisiting familiar sites such as the historic Old Town of Cartagena, exploring the structured pathways of the Guánica
    Dry Forest, and dreaming of organized tours of Rome’s ancient ruins, balancing a love for routine with occasional adventurous curiosity.
  culinary: Angel Gonzalez is an adept young baker who perfects arroz con dulce by caramelizing panela sugar and sprinkling cinnamon and raisins, masters pan de agua by timing dough rises to the minute,
    and enjoys pairing their pastries with fresh mango and coconut milk drizzles, all while keeping a tidy kitchen workspace.
  core: Angel Gonzalez is a highly organized, routine‑loving 12‑year‑old who balances a competitive edge in chess with a passion for historical storytelling, meticulous budgeting, anxiety‑filled journaling,
    and a secret habit of reheating yesterday’s pastries for comfort.
background:
  cultural: Angel is a native of Guanica in the Yauco municipality, raised in a close‑knit Puerto Rican family that follows Catholic traditions and places high value on community, family gatherings, and
    respect for elders. Her household speaks Spanish, celebrates local festivals such as Día de San Juan and the Fiesta de Aguinaldo, and maintains culinary customs like cooking arroz con gandules and lechón
    during holidays. Growing up near the Guánica Dry Forest and the historic sugar‑cane fields of Yauco has given her a strong connection to the island’s natural landscape and agricultural heritage, shaping
    her identity, work ethic, and pride in Puerto Rican culture.
