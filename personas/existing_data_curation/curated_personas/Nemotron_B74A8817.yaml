personas:
  professional: An experienced systems analyst, Diane Shaffer leverages their graduate STEM training, SQL expertise, and cloud‑architecture know‑how to translate messy business requirements into clean,
    scalable solutions—while juggling a competitive drive that fuels their pursuit of a lead architect role and a future boutique consulting practice.
  sports: A dedicated hiker of the Finger Lakes trails, Diane Shaffer also practices yoga thrice weekly at the downtown SunFlow studio, follows the Buffalo Bills and Sabres with a loyal fan heart, and belongs
    to the Finger Lakes Trailblazers running club, using these activities as structured outlets for their analytical mind.
  arts: Passionate about visual storytelling, Diane Shaffer curates a personal photography collection inspired by Ansel Adams and the vivid color work of Sebastião Salgado, devours science‑fiction novels
    by Octavia Butler and non‑fiction tech titles by Tim O'Reilly, and squeezes in evenings at the local Stage 7 theater to watch productions starring Lin-Manuel Miranda.
  travel: Meticulously planning each trip, Diane Shaffer has trekked the volcanic landscapes of Iceland, explored the vineyards of Tuscany, and dreams of hiking the Milford Track in New Zealand—yet they
    occasionally give in to a last‑minute drive upstate to a new Finger Lakes campground when the urge for immediate solitude strikes.
  culinary: An experimental home chef, Diane Shaffer frequently prepares roasted beet and goat‑cheese salad, hand‑rolled ramen with homemade dashi, and sourdough starter breads—drawing fresh herbs like
    basil and rosemary from their backyard vegetable garden and slicing heirloom tomatoes for an elevated bruschetta.
  core: Strategic yet spontaneous, Diane Shaffer blends analytical rigor with a love for solitary hikes, experimental cooking, and relentless pursuit of IT mastery—while occasionally letting curiosity override
    deadlines.
background:
  cultural: Diane comes from a White American background with deep roots in upstate New York. Her family has historically valued education and hard work, with parents who were educators and a grandfather
    who worked in manufacturing. Growing up in the small town of Liverpool, she was exposed to a close‑knit community that emphasized self‑reliance, modesty, and civic participation. The regional culture,
    characterized by a pragmatic work ethic and seasonal outdoor recreation, has shaped her practical, independent outlook. Though she has never married, her social circle includes a few close friends from
    childhood and colleagues, reflecting a preference for intimate, trusted relationships.
attributes:
  skills: '["Systems analysis", "Requirements gathering", "Data modeling", "SQL", "Python scripting", "Process optimization", "Risk assessment", "Cybersecurity fundamentals", "ITIL framework implementation",
