  career_goals: Mariela aims to move from a general office clerk to a supervisory or office manager position within the next three to five years. She plans to enroll in a part‑time business administration
    or project‑management certificate program to complement her humanities background and satisfy her curiosity for new methods. Her competitive drive pushes her to lead efficiency initiatives, such as
    streamlining filing systems or introducing low‑cost digital tools, and she seeks recognition for measurable improvements. In the longer term, she dreams of launching a community‑focused event‑planning
    venture that celebrates Latin American culture, allowing her to blend her practical skills with her love of group activities and cultural heritage. She also hopes to secure a stable income that reduces
    her stress while advocating for flexible scheduling policies that benefit her and her coworkers.
