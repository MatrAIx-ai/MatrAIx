persona_description: A scholar or enthusiast of Spanish and Latin American literature who is interested in exploring the connections between the Baroque and the modern in Spanish literature, as well as
  the works of lesser-known authors. They are likely to be familiar with the works of Cervantes, Lope de Vega, Calderón de la Barca, Alejo Carpentier, Carlos Fuentes, Gabriel García Márquez, Nicolás Guillén,
  and Severo Sarduy, as well as lesser-known authors. They would be interested in the themes of language and morality, and the use of excesses of the Baroque in Spanish literature. They may also be interested
  in the concept of literary modernity and the role of the bawd and witch in Spanish literature.
