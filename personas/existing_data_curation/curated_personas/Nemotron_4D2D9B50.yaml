personas:
  professional: Frank Rowland, a 25‑year‑old aspiring home‑services entrepreneur, blends hands‑on mechanical aptitude, HVAC troubleshooting, and self‑taught web design to launch a mobile repair and tech‑assistance
    venture while pursuing an associate degree in Business Administration, and they rely on their pragmatic curiosity and flexible work style.
  sports: Frank Rowland, a 25‑year‑old outdoor enthusiast, spends weekends fishing at Lake Hefner and hiking the Red Rock trails while cheering on the Oklahoma City Thunder and following the Oklahoma City
    Dodgers, and they belong to the local Oklahoma City Hiking Club and the Lake Hefner Anglers Association for regular sport and camaraderie.
  arts: Frank Rowland, a 25‑year‑old hobbyist musician, strums an acoustic guitar at casual jam sessions covering John Mayer, Ed Sheeran, and Bob Dylan, frequents the live‑music hotspot The Blue Door for
    indie folk shows, and they channel their creative curiosity into building detailed WWII aircraft model kits while appreciating video‑game soundtracks from titles like The Witcher 3.
  travel: Frank Rowland, a 25‑year‑old adventure‑seeker, prefers spontaneous road trips to nearby escapes like the Great Smoky Mountains and Carlsbad Caverns, often budgeting for a quick weekend getaway,
    yet they dream of a future tech‑focused pilgrimage to Tokyo and a rugged trekking expedition across New Zealand’s South Island.
  culinary: Frank Rowland, a 25‑year‑old who enjoys cooking after a day on the water, excels at grilling fresh catfish with lemon‑butter and cilantro, perfecting smoked pulled‑pork sandwiches and hearty
    chili using cumin, smoked paprika, and fresh rosemary, and they often pair their meals with craft brews from the local Burnt Barrel BBQ.
  core: Frank Rowland blends a restless curiosity for gadgets and model aircraft with a love of solitary fishing trips, while they often procrastinate paperwork and have a habit of buying the newest tech
    before the old one is fully used.
background:
  cultural: 'Frank was raised in a middle‑class white family in Oklahoma City, immersed in a blend of urban and rural Midwestern culture. His family’s roots trace back to the region’s farming and oil industries,
    instilling values of self‑reliance, hard work, and community service. He attended local public schools, participated in church youth groups, and grew up attending community fairs and county festivals
    that celebrate regional music, food, and traditions. This environment fostered a balanced outlook: an openness to new ideas and technologies tempered by practical, down‑to‑earth sensibilities typical
    of the Oklahoma heartland.'
