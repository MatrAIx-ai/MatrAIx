  career_goals: Frank aims to complete an associate degree in Business Administration while earning an HVAC certification, positioning himself for a stable, flexible career in home services or remote technical
    support. He envisions launching a modest mobile repair and tech‑assistance business that blends his mechanical know‑how with his digital skills, allowing him to set his own schedule and maintain a work‑life
    balance. Long‑term, he hopes to expand the venture, possibly hiring a small team, while also keeping the door open for further education in entrepreneurship.
