personas:
  professional: An aspiring nursing professional, Digna Barrios leverages their bilingual fluency, meticulous record‑keeping, and calm, structured approach to excel in clinical settings, while their preference
    for quiet environments and reliability make them a trusted aide in patient care.
  sports: A quietly competitive fitness enthusiast, Digna Barrios follows the San Antonio Spurs and San Antonio FC, they attend a local yoga studio’s weekly classes, and they spend Saturday mornings hiking
    the Hill Country trails to maintain flexibility and endurance.
  arts: A reflective creator, Digna Barrios spends evenings sketching urban scenes inspired by the architectural lines of San Antonio’s missions, captures nature through photography echoing the style of
    Ansel Adams, and they find inspiration in the works of Frida Kahlo, the lyrical ballads of José José, and the historical narratives of Isabel Allende.
  travel: A methodical wanderer, Digna Barrios meticulously plans each trip in a spreadsheet, has already explored the colonial charm of San Miguel de Allende and the desert vistas of Big Bend, and now
    dreams of savoring the culinary richness of Oaxaca and the historic streets of Cartagena while they balance their student budget.
  culinary: A culinary caretaker, Digna Barrios delights in preparing traditional dishes such as pozole, chiles en nogada, and tamales, using fresh cilantro, epazote, and roasted chilies from their indoor
    herb garden, and often invites family to share the meals while they perfect their salsa verde.
  core: Digna Barrios is a quietly diligent 19‑year‑old who blends a love for structured learning, serene creativity, and compassionate care into a balanced, purposeful life.
background:
  cultural: Digna is a first‑generation Mexican‑American who grew up in a bilingual household in Texas, speaking Spanish at home and English at school. She actively celebrates Mexican traditions such as
    Día de los Muertos, Las Posadas, and Mexican Independence Day, while also participating in Texan community events. Her family places strong emphasis on close‑knit relationships, respect for elders,
    and communal meals, which have shaped her cooperative and considerate nature. Living near Joint Base San Antonio has exposed her to a diverse, service‑oriented community, fostering a sense of respect
    for military families and enhancing her cultural competency. She integrates her bicultural identity into daily life, using her language skills and cultural knowledge to bridge gaps between her Mexican
    heritage and the broader American environment.
attributes:
  skills: '["Bilingual (Spanish and English)", "Microsoft Office Suite (Word, Excel, PowerPoint)", "Data entry and record‑keeping", "Basic First Aid and CPR certification", "Organizational and time‑management
    skills", "Effective written and verbal communication", "Practical problem‑solving", "Cultural competency in Mexican‑American community", "Adaptability to quiet work environments"]'
  hobbies: '["Reading historical fiction (Mexican and Latin American)", "Sketching and drawing", "Photography (nature and architecture)", "Cooking traditional Mexican dishes", "Yoga and meditation", "Indoor
    herb gardening", "Solving puzzles (Sudoku, crosswords)", "Volunteering at community library reading corner"]'
  career_goals: Digna aims to pursue a career in the healthcare field where her structured approach and caring nature can thrive. She plans to enroll in a community college to earn an Associate’s degree
    in Nursing, subsequently obtaining Certified Nursing Assistant (CNA) and Certified Medical Assistant (CMA) credentials. Her long‑term ambition is to become a registered nurse serving the military families
    stationed at Joint Base San Antonio, leveraging her bilingual abilities to improve patient communication and cultural sensitivity. She also hopes to eventually acquire a bachelor’s degree in Health
    Administration to move into leadership roles that balance operational efficiency with patient advocacy.
