  career_goals: Although retired, Thomas remains motivated to stay active, healthy, and socially engaged. His primary goals are to maintain his independence, continue volunteering at the local senior centre
    and church, and pass on his practical know‑how to his grandchildren through hands‑on workshops. He also hopes to compile a family cookbook featuring the traditional dishes his mother taught him, preserving
    his culinary heritage for future generations. Additionally, Thomas and his wife plan modest road trips to visit family, attend state fairs, and explore historic sites in Indiana, ensuring they enjoy
    their later years with purpose and connection.
