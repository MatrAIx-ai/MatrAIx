personas:
  professional: Thomas Bujosa is a retired automotive service technician who now spends his days as the go‑to handyman for his community, orchestrating senior‑centre bingo nights and church potlucks with
    an easy‑going, loosely scheduled approach that leverages his practical repair skills and outgoing personality to keep events lively and running smoothly, and they relish the chance to bring people together.
  sports: Thomas Bujosa is a devoted Saturday spectator of the local Franklin Central Wildcats high‑school football team, a lifelong fan of the Indianapolis Colts and Indiana Pacers, and an active member
    of the neighborhood walking club that meets each weekend, using gentle strolls to stay fit despite a tendency to skip scheduled physiotherapy for his arthritis, and they enjoy cheering loudly with fellow
    fans.
  arts: Thomas Bujosa is a nostalgic admirer of 1950s rock‑and‑roll legends like Elvis Presley and Chuck Berry, a regular listener of big‑band broadcasts featuring Glenn Miller, and occasionally joins the
    senior‑centre’s community choir to hum along to classics, finding comfort in familiar melodies that echo the love they have for tradition.
  travel: Thomas Bujosa is a modest road‑trip enthusiast who prefers short, budget‑friendly drives to places like White River State Park, the historic town of Madison, Indiana, and the annual Indiana State
    Fair, planning trips with a loose itinerary that leaves room for spontaneous detours and visits to family members in nearby Ohio, and they cherish the gentle rhythm of traveling at their own pace.
  culinary: Thomas Bujosa is a seasoned home cook who excels at preparing classic Midwestern comfort foods such as a slow‑cooked pot roast with carrots and potatoes, a flaky apple pie made with Granny Smith
    apples, and a garden‑fresh tomato‑and‑pepper sauce seasoned with basil and garlic, often sharing these dishes at community potlucks, and they take pride in preserving the recipes they learned from their
    mother.
  core: Thomas Bujosa is a routine‑loving, sociable octogenarian whose relaxed schedule, hands‑on practicality, and penchant for classic rock and hearty home‑cooked meals keep them anchored in community
    and comfort, while they occasionally forget a bill or a doctor’s appointment.
background:
  cultural: Thomas was born and raised in Beech Grove, Indiana, a suburb of Indianapolis, where the Midwestern values of hard work, community, and modesty are deeply ingrained. His family traces its roots
    to a mix of German and Polish immigrants who settled in Marion County in the early 20th century, bringing with them a strong Catholic tradition and a love of hearty, home‑cooked meals. Growing up during
    the post‑World War II era, Thomas experienced the boom of manufacturing jobs and the close‑knit neighborhood culture that prized neighborly assistance and regular church attendance. These influences
    have shaped his practical outlook, his love for routine, and his dedication to community service.
