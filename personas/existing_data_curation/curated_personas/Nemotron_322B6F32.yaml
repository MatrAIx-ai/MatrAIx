  hobbies: '[''Line Dancing'', ''Quilting Circles'', ''Mystery Book Club'', ''Community Gardening'', ''Food Pantry Volunteering'', ''Cooking Traditional German‑Polish Cuisine'', ''Attending Local Festivals'',
    ''Lake Michigan Beach Trips'', ''Bird Watching'', ''Bridge Playing'']'
  career_goals: Violeta aims to transition from front‑line sales to a store‑manager role within the next two years, using her experience to streamline operations and mentor younger associates. She plans
    to earn a retail management certification and lead a community‑focused initiative, such as a local “shop local” campaign that highlights regional products. While she looks forward to a gradual shift
    toward semi‑retirement, she hopes to keep a part‑time consulting presence, sharing best‑practice retail strategies with small businesses in Sheboygan County and perhaps opening a modest boutique that
    showcases vintage Midwestern clothing and handcrafted goods.
