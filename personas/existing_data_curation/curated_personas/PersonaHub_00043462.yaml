persona_description: A finance professor at the University of Georgia, who specializes in the analysis of monetary policy and the Federal Reserve System. He has a deep understanding of the historical development
  of the Federal Reserve System and its role in the monetary and financial system of the United States. He is knowledgeable about the key elements that contributed to the Fed's failure to chart a non-inflationary
  course, including its political composition and preoccupation with the interest-rate structure. He is aware of the limitations of the Fed's control over monetary growth and the need for a true institutional
  reform to ensure the banking system's competitiveness and innovation. He is likely to be interested in the implications of the expansion of money stocks at generally increasing rates and the impact of
  this on inflation.
