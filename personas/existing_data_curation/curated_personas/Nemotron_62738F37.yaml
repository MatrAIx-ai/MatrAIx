  career_goals: Although not currently in the formal workforce, Lindsay aims to channel her curiosity and practicality into leading a regional historical preservation project that documents Manteca’s agricultural
    heritage. She seeks to secure a competitive grant to fund a community archive and to organize an annual heritage festival that receives statewide recognition. Lindsay also aspires to author a memoir
    intertwining her personal journey with local history, and to mentor emerging volunteers in research and grant writing, establishing herself as a respected authority in the county’s cultural nonprofit
    sector. Additionally, she plans to continue lifelong learning through advanced courses in digital archiving, ensuring her expertise remains current and impactful.
