  hobbies: '[''visiting art galleries'', ''gardening'', ''cooking Mexican cuisine'', ''reading historical fiction'', ''embroidery and crocheting'', ''walking nature trails'', ''participating in a senior
    book club'', ''attending pottery and mural workshops'']'
  career_goals: Caridad aims to transition into a senior cashier or shift-lead role where she can mentor younger colleagues and share her bilingual strengths. She also wishes to volunteer as a cultural
    liaison for the municipal library, helping Spanish-speaking patrons access resources. In the longer term, she hopes to organize a small exhibition of Mexican folk art at the local community center and
    lead a monthly art-appreciation discussion group. These goals reflect her curiosity, love of art, and desire to contribute to her community while maintaining a flexible work schedule.
