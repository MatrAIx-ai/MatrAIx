  hobbies: '[''Mixed‑media art'', ''Sketching'', ''Landscape photography'', ''Philosophical reading'', ''Poetry writing'', ''Attending gallery talks'', ''Chess club'', ''Gardening'']'
  career_goals: Olivia aims to secure a curatorial position at a regional museum or gallery where she can design innovative exhibitions that explore abstract and conceptual art. She aspires to publish a
    scholarly monograph on 20th‑century abstraction, develop an online platform for critical art discourse, and eventually lead a community arts program that fosters independent artistic inquiry. In the
    medium term, she plans to obtain a research fellowship to deepen her expertise and build a reputation as a respected art critic and educator.
