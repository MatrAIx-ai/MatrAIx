persona_description: A scientist who studies the biology and behavior of monarch butterflies, particularly their migration patterns and reproductive biology. She is particularly interested in the factors
  that influence the timing of diapause completion and the progression of ovarian development in monarchs. Her research includes experiments on post-diapause reproductive development in monarchs and has
  found that access to milkweed is important in stimulating ovarian development and that body condition might be important in determining when monarchs complete diapause. She has conducted experiments on
  post-diapause reproductive development in monarchs and has found that most females without access to milkweed lacked mature oocytes while the majority with access to milkweed developed mature oocytes
  within 3-4 days. She has also found that females can complete diapause and become reproductively mature before they have mated, and that increasing day length had no effect on monarch post-diapause ovarian
  development.
