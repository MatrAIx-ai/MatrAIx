  career_goals: Barbara aspires to advance her nursing career by pursuing a Master’s degree to become a Nurse Practitioner with a focus on community health and rural primary care. She aims to integrate
    her appreciation for arts and holistic wellness into her practice, potentially developing an art‑therapy outreach program for patients in Poultley and surrounding areas. Long‑term, she envisions taking
    on leadership roles such as charge nurse or nurse manager, where she can mentor new nurses, champion evidence‑based practice, and drive quality‑improvement projects that enhance patient outcomes. Her
    ambition includes contributing to policy discussions on telehealth expansion to improve access for underserved populations.
