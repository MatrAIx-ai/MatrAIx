  career_goals: Micah aims to move from laborer to site supervisor within the next five years, leveraging his practical experience and pursuing a degree in construction management. He plans to earn certifications
    such as OSHA 30‑hour, NCCER trade credentials, and eventually the Certified Construction Manager (CCM) designation. His long‑term ambition is to launch his own small‑scale construction firm that specializes
    in sustainable, energy‑efficient builds, incorporating emerging methods like modular construction and 3D‑printed components. Micah also wants to achieve financial stability, purchase a home in Toms
    River, and mentor younger workers entering the trades, using his competitive drive to set high standards for project performance and safety.
