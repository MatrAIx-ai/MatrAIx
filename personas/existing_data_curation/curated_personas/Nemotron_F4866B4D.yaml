personas:
  professional: Jerry Charles, a retired aerospace mechanical engineer, channels their three‑decades of design experience into meticulous woodworking, garden planning, and volunteer docent work, leveraging
    SolidWorks and data‑driven problem solving as they mentor high‑school students through a STEM‑arts rocket‑painting program.
  sports: Jerry Charles follows the Orlando Magic and the Miami Marlins, participates in a senior walking club at the local nature preserve, enjoys occasional weekend golf at a nearby course, and they prefer
    low‑impact activities like birdwatching walks and gentle tai chi sessions to stay fit.
  arts: Jerry Charles paints impressionistic watercolors of Floridian sunsets inspired by Claude Monet and captures night‑sky vistas reminiscent of Ansel Adams, regularly attends gallery openings at the
    Space Coast Art League, and as a museum docent they share art‑history insights while listening to Beethoven’s late string quartets in the background.
  travel: Jerry Charles has journeyed to Cape Canaveral for a behind‑the‑scenes tour of the Kennedy Space Center, explored the historic streets of St. Augustine, and dreams of photographing the Milky Way
    from the Atacama Desert, favoring meticulously planned road trips over spontaneous travel due to their love of routine and limited mobility, and they often map out each itinerary weeks in advance.
  culinary: Jerry Charles delights in cooking garden‑fresh dishes such as citrus‑marinated grilled grouper, roasted sweet potatoes with smoked paprika, and basil‑infused tomato soup, often pairing meals
    with locally brewed craft beer, though they sometimes over‑salt their recipes while experimenting with new herb blends.
  core: Jerry Charles is a methodical, solitary retiree who blends engineering precision with artistic wonder, spending days crafting, painting, and stargazing while they gently nudge their community toward
    STEM‑arts integration.
background:
  cultural: Jerry grew up in a middle‑class family in the Midwest, where he internalized values of hard work, reliability, and community service. After moving to Titusville, FL, to work at the Kennedy Space
    Center, he blended his Midwestern pragmatism with the coastal, space‑focused culture of the Space Coast. He identifies as a white American with a strong appreciation for both technical achievement and
    artistic expression. His upbringing encourages a respectful, cooperative demeanor, while his life in Florida has exposed him to diverse ideas and unconventional thinking, shaping a cultural outlook
    that balances tradition with curiosity.
attributes:
  skills: '[''Mechanical engineering'', ''Computer‑Aided Design (SolidWorks, CATIA)'', ''Structural analysis'', ''Data analysis with Python and Excel'', ''Project planning and management'', ''Woodworking'',
