personas:
  professional: Tomeka King, a veteran logistics professional with a CDL Class A and a knack for route optimization and sales negotiation, leverages their structured, detail‑oriented mindset and cooperative
    nature to keep deliveries punctual while mentoring new drivers.
  sports: Tomeka King, an avid fan of the Wichita Thunder hockey team and the Wichita State Shockers basketball program, stays fit through daily brisk walks in Sedgwick County parks, weekly pick‑up basketball
    games at their church, and occasional pickleball matches with the local Wichita Pickleball Club.
  arts: Tomeka King, who lends their voice to the church choir and draws inspiration from gospel icons like Shirley Caesar and jazz legends such as Miles Davis, also enjoys quilting designs echoing Faith
    Ringgold’s narrative fabrics and attends community theater productions featuring local talent like Jamila Hayes.
  travel: Tomeka King, who prefers meticulously planned road trips with their sister, has explored the jazz‑filled streets of New Orleans and the historic charm of Savannah, and hopes to tour Washington,
    D.C.’s National Museum of History and Culture, all while balancing a modest travel budget and limited vacation days.
  culinary: Tomeka King, an accomplished home cook, perfects soul‑food staples such as smoked collard greens with ham hocks, low‑sugar sweet potato pie, and tomato‑rich gumbo, routinely incorporating garden‑fresh
    tomatoes, fresh okra, and a pinch of cayenne to give each dish their signature kick.
  core: Tomeka King, the structured logistics veteran who gardens, quilts, and sings gospel, habitually double‑checks delivery routes at night while occasionally forgetting to water their indoor cactus
    on weekends.
background:
  cultural: Tomeka is a Black woman whose family roots trace back to the Southern United States, part of the Great Migration that settled many African‑American families in Wichita’s historic Delano district.
    She grew up immersed in a close‑knit community centered around a Baptist church, where faith, music, and shared meals reinforced values of resilience, cooperation, and mutual support. Cultural traditions
    such as storytelling, gospel singing, and preparing family recipes are integral to her identity. She actively participates in local cultural celebrations like Juneteenth, and her upbringing emphasizes
    the importance of community service, education, and maintaining strong family ties.
attributes:
  skills: '[''Driving (long‑haul & local deliveries)'', ''Vehicle maintenance'', ''Route planning'', ''Customer service'', ''Sales negotiation'', ''Inventory management'', ''Safety compliance'', ''Time
