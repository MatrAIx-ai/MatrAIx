  hobbies: '[''Gardening'', ''Reading historical fiction'', ''Cooking soul food'', ''Church choir participation'', ''Quilting'', ''Volunteer mentoring'', ''Listening to gospel music'', ''Nature walks'',
    ''Crossword puzzles'', ''Online business courses'']'
  career_goals: Tomeza aims to advance into a supervisory role within logistics, such as a fleet manager or operations coordinator, where she can mentor new drivers and oversee route optimization for a
    larger team. She plans to obtain a CDL Class A endorsement and pursue a certification in supply chain management to broaden her expertise. Long‑term, she envisions launching a small, family‑run transportation
    business that blends her driving experience with her sales acumen, providing reliable services to local businesses while maintaining a stable schedule for her family.
