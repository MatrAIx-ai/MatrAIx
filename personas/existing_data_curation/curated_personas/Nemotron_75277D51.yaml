personas:
  professional: Mariaelena Orig is a bilingual attorney who leverages a results‑oriented, analytical approach to corporate and immigration matters, excelling in legal research, contract drafting, and persuasive
    advocacy while navigating cases with a structured, adaptable mindset that reflects their competitive drive and pragmatic focus.
  sports: Mariaelena Orig embraces a dynamic fitness routine that blends sunrise runs along South Beach, twice‑weekly Vinyasa yoga, and lively salsa and bachata socials, while cheering for the Miami Heat
    and holding a membership in the local South Beach Runners Club during the winter months, which they attend every Saturday.
  arts: Mariaelena Orig cultivates her creative side through urban photography of Miami’s street murals, devouring contemporary Latin American novels by Valeria Luiselli and poetry by Giannina Braschi,
    and soaking up live performances by artists like Carlos Vives and Natalia Lafourcade at downtown venues, which they regard as essential inspiration for both work and leisure.
  travel: Mariaelena Orig alternates between purposeful trips to Bogotá to reconnect with family and impromptu escapes to Caribbean islands like Aruba, favoring a blend of itinerary‑free beach days and
    meticulously planned cultural tours of historic neighborhoods, all while balancing travel costs against a budding professional network, a strategy they refine with each journey.
  culinary: Mariaelena Orig is a confident home cook who transforms classic arepas, empanadas, and sancocho with modern twists—adding quinoa, avocado, and smoked paprika—while also mastering dishes like
    ceviche with lime, cilantro, and tiger shrimp, reflecting a palate that celebrates bold flavors and fresh ingredients, a culinary curiosity they pursue nightly.
  core: Mariaelena Orig is a diligent attorney who balances a competitive, structured work ethic with spontaneous salsa nights, a love for yoga, and a habit of over‑booking their calendar, often forgetting
    to reply to non‑urgent messages.
background:
  cultural: Mariaelena was raised in a bilingual household where Spanish and English were spoken interchangeably, celebrating Colombian holidays such as Día de la Independencia and Carnaval de Barranquilla
    while also embracing Miami’s multicultural diversity. Her family’s emphasis on close‑knit relationships, respect for elders, and a strong work ethic shaped her pragmatic outlook. The blend of Colombian
    traditions—music, food, and communal gatherings—with the entrepreneurial spirit of Miami informs both her personal values and professional focus on cross‑border legal issues.
