  career_goals: Mariaelena aims to become a senior associate and eventually a partner at a Miami‑based law firm that specializes in cross‑border corporate and immigration law, leveraging her Colombian heritage
    to serve Latin American clients. In the next five years she plans to complete an LLM in international business law, expand her professional network within the Colombian business community, and develop
    a niche practice in trade compliance. Long‑term, she envisions launching her own boutique firm that provides integrated legal services for Colombian entrepreneurs entering the U.S. market while mentoring
    young lawyers from underrepresented backgrounds.
