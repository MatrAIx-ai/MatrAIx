    building'', ''quality assurance and performance auditing'']'
  hobbies: '[''vegetable gardening'', ''reading historical fiction and biographies'', ''knitting and quilting'', ''birdwatching'', ''small-group book club participation'', ''volunteering at the local library'']'
  career_goals: 'Rhonda aims to sustain the lodge''s high occupancy rates and five-star guest satisfaction scores while embedding a culture of disciplined excellence among her team. In the next two years
    she plans to implement a mentorship program that pairs senior staff with newer employees, ensuring the continuity of her structured approach after retirement. Long-term, she envisions transitioning
    to a part-time consultancy for boutique inns across West Texas, sharing her proven methods for cost-effective operations and staff development. Additionally, she hopes to author a handbook titled "Structured
    Hospitality: A Practical Guide for Small-Scale Lodging Managers," drawing on her decades of experience.'
