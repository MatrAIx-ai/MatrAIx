personas:
  professional: Rhonda Cross, a seasoned lodging manager with five decades of hospitality experience, runs the Midland inn with a disciplined, SOP‑driven approach that blends meticulous staff scheduling,
    tight budget controls, and a calm, conflict‑resolution style while mentoring future managers and planning a part‑time consultancy to spread her structured methods.
  sports: Rhonda Cross, a devoted supporter of the Midland RockHounds and the Texas Longhorns football team, participates in a local senior walking club that meets twice weekly for brisk prairie strolls,
    and enjoys occasional bowling nights at the community center as her primary fitness outlet.
  arts: Rhonda Cross, a quiet connoisseur of classic historical fiction and biographies, spends evenings listening to piano renditions of Debussy, knitting to the soft croon of Patsy Cline, and attending
    monthly screenings of classic films like Casablanca at the Midland cultural center.
  travel: Rhonda Cross, a planner who maps each trip on a spreadsheet, enjoys purposeful road trips to Big Bend National Park and historic tours of the Alamo, prefers quiet bed‑and‑breakfast stays over
    crowded hotels, and hopes to one day explore the historic streets of Edinburgh.
  culinary: Rhonda Cross, an avid gardener‑cook, whips up fresh garden salads with heirloom tomatoes, basil, and olive oil, simmers a hearty Texas‑style chili with home‑grown peppers, and bakes buttery
    blueberry scones and apple pie for her book circle gatherings.
  core: Rhonda Cross, a 73‑year‑old steward of order who blends quiet solitude with a competitive edge, channels her meticulous nature into hospitality, gardening, and a disciplined approach to every aspect
    of life.
background:
  cultural: Rhonda was raised in a small-town, white Texan family that blended Southern hospitality with Midwestern pragmatism. Her upbringing emphasized community responsibility, modesty, and a strong
    work ethic rooted in the oil-rich environment of West Texas. Regular involvement in a local Methodist congregation reinforced values of service, reliability, and respect for tradition. While she values
    the independence common to her generation, she also cherishes the close-knit family ties and regional customs such as Thanksgiving potlucks, Fourth of July celebrations, and support for the local high-school
    football team.
attributes:
  skills: '[''hospitality operations management'', ''standard operating procedure development'', ''staff recruitment, onboarding, and training'', ''budgeting and financial forecasting'', ''conflict resolution
