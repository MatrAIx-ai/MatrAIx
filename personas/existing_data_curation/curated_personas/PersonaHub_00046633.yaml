persona_description: A researcher or a scientist who specializes in the field of medicine, particularly in the study of chronic diseases and their causes. They are interested in large-scale population studies
  and the analysis of biomarker profiles to better understand the relationship between lifestyle, environment, genetics, and disease risk. They are excited about the opportunity to study the Mexico City
  Prospective Study cohort and to use comprehensive biomarker data to investigate the major causes of death in a Hispanic population. They are also interested in the global burden of chronic diseases and
  the importance of studying populations across the globe to capture ethnic and socio-economic differences that underlie disease risk.
