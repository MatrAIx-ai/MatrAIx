personas:
  professional: Faith Houston, an 18‑year‑old aspiring operations manager, leverages their bullet‑journal precision, Microsoft Office fluency, and student‑council event coordination experience to streamline
    campus projects while dreaming of a future administrative role at a tech or health‑care firm in Los Angeles.
  sports: Faith Houston hits the trails of the Santa Monica Mountains on weekends, attends weekly yoga classes, roots for the Los Angeles Lakers and LA Galaxy, and is a member of the local California Trails
    Club where they mentor new hikers on pacing and safety.
  arts: Faith Houston immerses themselves in contemporary fiction by Sally Rooney and Ocean Vuong, captures sunrise landscapes inspired by Ansel Adams with their DSLR, curates an Instagram feed featuring
    indie musician Phoebe Bridgers and local art‑fair finds, and occasionally joins friends at community concerts.
  travel: Faith Houston plans meticulously in their bullet‑journal, favoring weekend road trips to Big Sur, a day hike in Joshua Tree, and dreaming of a spring adventure to New Zealand’s South Island, always
    balancing a love for nature with a modest travel budget.
  culinary: Faith Houston enjoys baking lemon‑blueberry scones and precise sourdough loaves using almond flour and matcha, experiments with recipe ratios in their kitchen, and regularly swaps dishes like
    chicken‑tikka masala or quinoa‑veggie bowls with friends during study breaks.
  core: Faith Houston, an organized 18‑year‑old with a bullet‑journal habit, blends a love for structured planning, hiking, and precise baking into a life that balances ambition with community service.
background:
  cultural: Faith grew up in a middle-class white family in Agoura Hills, a suburban enclave within Los Angeles County. Her upbringing combined Mid-Western values of responsibility, hard work, and community
    service with the laid-back, outdoor-oriented lifestyle typical of Southern California. Family traditions include celebrating mainstream American holidays such as Thanksgiving and Christmas, and participating
    in community events like farmers’ markets, volunteer beach clean-ups, and school fundraisers. While primarily identifying with a Protestant/Christian background, she has been exposed to the cultural
    diversity of the greater Los Angeles area, fostering an openness to varied perspectives while retaining her own cultural identity.
attributes:
  skills: '[''Microsoft Office (Word, Excel, PowerPoint)'', ''Google Workspace'', ''Data entry and organization'', ''Event planning and coordination'', ''Student-council leadership'', ''Interpersonal communication'',
    ''Conflict resolution'', ''Peer mentoring'', ''CPR/first-aid certification'', ''Basic photography'', ''Social-media content creation'']'
  hobbies: '[''Bullet-journal keeping'', ''Hiking in the Santa Monica Mountains'', ''Yoga'', ''Animal shelter volunteering'', ''Cooking and baking'', ''Reading contemporary fiction'', ''Journaling'', ''Photography
    (landscapes and portraits)'', ''Attending local concerts and art fairs'']'
  career_goals: Faith plans to enroll in a community college next fall and transfer to a four-year university to earn a bachelor's degree in Business Administration with a focus on Operations Management.
    After graduating, she hopes to secure an entry-level administrative or project-coordinator position at a mid-size tech or health-care firm in the Los Angeles area. She aims to obtain a Certified Administrative
    Professional (CAP) credential and eventually advance to an office-manager or operations-lead role, where she can apply her organizational strengths and supportive nature to improve workplace efficiency
    and team cohesion.
