  hobbies: '[''Gardening'', ''Reading Historical Nonfiction'', ''Small Book Club Participation'', ''Mindfulness Meditation'', ''Volunteer Peer Listener (Crisis Helpline)'', ''Fishing on Lake Erie'', ''Woodworking'',
    ''Puzzle Solving (Crosswords, Logic Games)'']'
  career_goals: Matthew aims to transition into a senior HR leadership role, such as HR Director or Senior Business Partner, where he can shape organizational culture around psychological safety and employee
    well‑being. He is passionate about integrating mental‑health support into workplace policies and plans to develop a comprehensive employee assistance program that reduces anxiety and fosters resilience.
    He also envisions mentoring the next generation of HR professionals, sharing his blend of technical expertise and compassionate leadership. In the longer term, he hopes to consult for small businesses
    in the Greater Cleveland area, helping them build structured, humane HR systems that balance predictability with flexibility.
