persona_description: A historian or researcher who is interested in the history of African American political movements, specifically the Colored Conventions Project, and has a particular interest in the
  1843 National Colored Convention. This person is likely to be knowledgeable about the events, people, and cultural assets associated with the convention, and has a passion for uncovering the buried history
  of nineteenth-century Black political organizing. This person is likely to have a background in English and is interested in the literary and cultural aspects of the convention, as well as the economic
  dispositions and cultural assets of communities connected to the convention.
