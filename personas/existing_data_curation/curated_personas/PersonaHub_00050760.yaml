persona_description: A dedicated educator who has developed an innovative educational tool, TuitionKit, to aid students in their exam preparation. This educator is a former head teacher and has launched
  a series of Hip-Hop poetry videos to translate tough-to-remember exam poetry into a relatable medium, making learning more engaging and memorable. This educator values the use of visual aids, such as
  badges, to motivate and track progress throughout their subjects. They are also a proponent of the use of flash cards to reinforce key information and learn regularly, with a preference for using Pearson's
  revision cards for all core subjects.
