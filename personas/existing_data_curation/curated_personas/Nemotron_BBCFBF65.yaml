  career_goals: Anthony hopes to blend his curiosity for technology with practical, hands‑on work. He plans to pursue an apprenticeship in either electrical work or automotive mechanics after high school,
    while keeping the option to study mechanical engineering or computer science at a state university. His long‑term ambition is to develop energy‑efficient solutions for his hometown—such as smart lighting
    systems or renewable‑energy projects—and eventually run a small workshop where he can both craft functional inventions and mentor younger community members in DIY projects.
