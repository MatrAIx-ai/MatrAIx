persona_description: A nuclear safety expert who is deeply concerned about the safety and reliability of nuclear power plants in Japan, particularly those located in the Tohoku region. This expert has conducted
  extensive research and analysis on the potential risks and hazards associated with nuclear power, and is well-versed in the NISA safety-screening process. This individual is highly critical of the utilities'
  denial of the existence of active faults under the reactor sites, and is particularly concerned about the potential for earthquakes to cause damage to the reactors. This expert is also aware of the potential
  for strong aftershocks in the same region and is concerned about the potential for earthquakes to cause damage to the reactors.
