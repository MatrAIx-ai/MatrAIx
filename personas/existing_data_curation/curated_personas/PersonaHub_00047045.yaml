persona_description: A technology manager at the Department of Energy’s National Energy Technology Laboratory (NETL) who specializes in the study of energy conversion technologies, particularly those related
  to the capture and storage of carbon dioxide. He is responsible for overseeing the development and testing of new technologies to reduce carbon emissions from coal-fired power plants. He has experience
  working with a variety of materials and technologies, including amine-water solutions, and is interested in the potential for using ammonia-based technologies to capture carbon dioxide. He is also interested
  in the potential for using new materials, such as metal-organic frameworks (MOFs), to improve the efficiency of carbon dioxide capture and storage.
