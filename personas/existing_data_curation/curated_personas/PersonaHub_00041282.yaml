persona_description: A zoologist who specializes in the study of wild goat species, particularly the Iberian caprines. He or she has expertise in population genetics, habitat management, and conservation
  biology. The individual is interested in the decline and expansion of the Iberian caprine species, including the Andorran caprine, and is particularly focused on the potential impacts of habitat alteration
  and competition with introduced ungulates. The persona is also knowledgeable about the role of wild goats in local economies and the management of hunting practices.
