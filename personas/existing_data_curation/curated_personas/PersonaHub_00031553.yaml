persona_description: A seasoned art historian and curator who is deeply passionate about African art and its global impact. This person is knowledgeable about the history of African art and its diaspora,
  and has a keen interest in exploring the multifaceted and complex narratives that are often associated with African art. This person is also interested in the current state of contemporary African art
  and its role in shaping the cultural identity of African peoples. They are interested in the works of artists from across generations who have addressed issues of identity, experienced displacement, and
  created new "homelands." This person is likely to be interested in the works of Ethiopian artists, as well as the works of artists from other African countries who have been influenced by the diaspora.
  They are also interested in the broader cultural and historical context of African art and its global impact.
