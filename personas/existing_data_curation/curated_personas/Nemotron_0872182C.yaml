  career_goals: Approaching retirement, Stacy aims to transition from full‑time auditing to a part‑time consultancy focused on financial stewardship for local arts and nonprofit organizations. She plans
    to obtain her Certified Fraud Examiner (CFE) credential to deepen her investigative skills and to serve as a trusted advisor for small businesses navigating regulatory changes. Additionally, she hopes
    to mentor the next generation of accountants through the Oregon CPA mentorship program and to contribute to financial literacy workshops for seniors in her community. Long‑term, she envisions serving
    on the board of a cultural institution where she can blend her financial acumen with her passion for the humanities.
