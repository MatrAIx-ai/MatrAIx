personas:
  professional: Mariela Cruz is a bilingual commercial driver who uses her curiosity for route‑optimization software, hands‑on vehicle‑maintenance know‑how, and persuasive sales techniques to keep deliveries
    on time while confidently handling cash transactions, negotiating with clients, and swiftly resolving on‑road conflicts, balancing meticulous organization with the flexibility to adapt to unexpected
    traffic challenges.
  sports: Mariela Cruz runs twice weekly with the River Runners club for early‑morning 5K jogs, follows the New Orleans Pelicans in basketball and the New Orleans Saints in football, and incorporates high‑energy
    salsa‑dance fitness classes into her routine, treating each activity as both social engagement and cardio workout.
  arts: Mariela Cruz dives into the New Orleans music scene, regularly attending live performances by Trombone Shorty and the Preservation Hall Jazz Band, takes weekend salsa lessons inspired by the rhythmic
    stylings of Celia Cruz and Carlos Vives, and enjoys indie film festivals showcasing directors like Ava DuVernay, allowing her to blend cultural rhythm with contemporary artistic expression.
  travel: Mariela Cruz favors spontaneous Gulf Coast road trips, capturing sunrise shots at Gulf Islands National Seashore and planning a future cross‑country drive to the Pacific Northwest to photograph
    rain‑soaked forests, all while using a rewards credit card and budget motels to keep her adventures financially sustainable.
  culinary: Mariela Cruz loves cooking family‑heritage dishes such as plátano maduro, bean and plantain stew, and arroz con pollo, experimenting with bold spice blends that sometimes lead to over‑seasoned
    plates, and delights in sharing her meals at neighborhood potlucks where friends sample her signature chimichurri‑marinated grilled chicken.
  core: Mariela Cruz is a high‑energy, detail‑oriented driver‑turned‑logistics aspirant who balances meticulous planning with spontaneous dancing, combats stress through yoga and music, and battles a habit
    of late‑night snack binges driven by her worry‑prone mindset.
background:
  cultural: Mariela is a first‑generation American whose parents emigrated from Honduras. She grew up bilingual in Spanish and English, celebrating Honduran holidays such as Día de la Independencia (September 15)
    and Semana Santa, and maintaining close ties to a supportive Honduran diaspora in the Greater New Orleans area. Her family’s Catholic faith and communal values influence her strong sense of family,
    community involvement, and appreciation for traditional foods like baleadas, tamales, and gallo pinto.
attributes:
  skills: '["Commercial Driving (CDL)", "Route Planning & Optimization", "Vehicle Maintenance & Basic Repairs", "Customer Service & Sales Negotiation", "Bilingual Communication (Spanish/English)", "Logistics
    Software (Fleetio, Oracle Transportation Management)", "Cash Handling & POS Operation", "Time Management", "Problem Solving Under Pressure", "Conflict Resolution", "Safety Compliance (DOT, OSHA)", "Basic
    Mechanical Troubleshooting"]'
  hobbies: '["Salsa and Merengue dancing", "Cooking traditional Honduran dishes", "Road trips and scenic photography", "Attending live music events in New Orleans", "Group fitness runs and cycling", "Volunteering
    at local Hispanic community organizations", "Yoga and meditation for stress management", "Reading self‑help and personal development books"]'
  career_goals: She aims to earn a Class A CDL with hazardous‑material endorsement and transition into a logistics coordinator role within the next two years. Mariela plans to complete a bachelor’s degree
    in Business Administration or Transportation Management, gain certifications in fleet safety, and eventually launch her own small trucking company that can serve local businesses while providing stable
    employment for other bilingual drivers. She also seeks leadership positions that let her mentor new drivers and improve operational efficiency.
