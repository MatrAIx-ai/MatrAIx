personas:
  professional: Anthony Cositore is an aspiring network engineer who leverages his CCNA‑level Cisco knowledge, PowerShell and Bash scripting, and hands‑on experience with VMware and Hyper‑V to troubleshoot
    LAN/WAN issues, while his outgoing, cooperative nature makes him a natural team lead during hackathons and volunteer tech workshops.
  sports: Anthony Cositore embraces an active lifestyle by hiking the shores of Lake Minnetonka and the Superior National Forest with the Twin Cities Hiking Club, shooting hoops at the local YMCA while
    cheering on the Minnesota Vikings, Twins, Timberwolves, and Wild, and they balance these pursuits with a laid‑back approach to fitness that favors weekend adventures over regimented gym routines.
  arts: Anthony Cositore channels his creative energy into strumming acoustic versions of songs by The Head and the Heart, sketching digital tributes to Shepard Fairey, and photographing urban street scenes
    inspired by Ansel Adams and Nan Goldin, often attending live shows featuring local indie bands and gallery openings showcasing contemporary muralists like Lisa Silvester.
  travel: Anthony Cositore prefers spontaneous, budget‑friendly road trips that combine hiking in Minnesota’s Boundary Waters and exploring the vibrant street art of Portland, Oregon, while dreaming of
    future backpacking adventures through the temples of Kyoto, Japan, and the fjords of Iceland, though they balance these wanderlust plans with the limited savings from their part‑time tech gigs.
  culinary: Anthony Cositore enjoys crafting fusion meals at home, such as spicy tuna poke bowls with avocado, pickled ginger, and sesame seeds, while also indulging in a perfectly seared ribeye steak topped
    with garlic‑herb butter, and they frequently pair these dishes with craft IPA ales from local breweries, reflecting their moderate cooking confidence and love for bold flavors.
  core: Anthony Cositore is a tech‑savvy, art‑loving 18‑year‑old whose boundless curiosity fuels both their network engineering ambitions and nightly guitar jams, yet they often let a laid‑back attitude
    create a cluttered workspace and cause missed deadlines.
background:
  cultural: Raised in a middle‑class, predominantly white family in Northfield, Minnesota, Anthony grew up with Midwestern values of modesty, community involvement, and a strong work ethic, while also being
    exposed to the city's progressive college atmosphere. His heritage includes German and Scandinavian roots, which are reflected in family traditions and local celebrations. The blend of small‑town community
    life, proximity to the Twin Cities' arts and music scene, and the inclusive environment of a university town has shaped his open‑minded outlook, appreciation for diverse creative expressions, and willingness
    to engage with people from varied backgrounds.
attributes:
  skills: '[''Network troubleshooting'', ''Windows Server administration'', ''Linux system administration'', ''Virtualization (VMware/Hyper‑V)'', ''PowerShell scripting'', ''Cisco routing and switching
    (CCNA level)'', ''Hardware diagnostics and repair'', ''Cloud fundamentals (AWS, Azure)'', ''Cybersecurity best practices'', ''Customer support'', ''Team collaboration'', ''Creative problem solving'']'
  hobbies: '[''Playing guitar'', ''Digital illustration/graphic design'', ''Photography'', ''Attending live music and art events'', ''Hiking and outdoor exploration'', ''Multiplayer video gaming'', ''Building
    custom PCs'', ''Participating in hackathons'', ''Volunteering to teach basic computer skills'', ''Socializing at local coffee shops'']'
  career_goals: Anthony aims to earn industry certifications such as CompTIA Network+, Security+, and Cisco CCNP within the next three years, positioning himself for a senior network engineer role. He plans
    to complete his bachelor's degree in Information Technology while gaining hands‑on experience in cloud architecture and cybersecurity. Long‑term, he envisions becoming a systems architect who bridges
    technology with creative projects, perhaps developing interactive installations or leading IT teams in a digital‑media agency. He also hopes to mentor younger students in his community, sharing his
    passion for both tech and the arts.
