  hobbies: '[''Knitting'', ''Quilting'', ''Community gardening'', ''Bridge'', ''Bingo'', ''Cooking'', ''Choir singing'', ''Walking'', ''Historical fiction reading'', ''Genealogy research'']'
  career_goals: Sandra’s primary goal is to maintain her independence and remain physically active while continuing to contribute to the Greenfield community. She aims to organize a monthly intergenerational
    gardening club, compile a handwritten family history for her great‑grandchildren, mentor new volunteers at the local senior center, and learn a new crochet technique to create blankets for charity drives.
    Managing her anxiety through weekly group therapy and mindfulness practices is also a key ambition.
