personas:
  professional: Norberto Moreno, a 16‑year‑old with a disciplined work ethic, channels his hands‑on mechanical talent and methodical mindset into a budding career as an aspiring automotive apprentice, meticulously
    documenting each repair of motorcycles and small engines while leveraging bilingual communication to bridge community needs.
  sports: Norberto Moreno devotes evenings to the local youth soccer league, playing forward for the San Antonio Stars FC Academy while cheering for the senior San Antonio FC team and using rigorous drills
    to maintain fitness throughout the seasonal calendar.
  arts: Norberto Moreno nourishes his creative side by assembling model cars in the quiet of his room, inspired by the iconic designs of Enzo Ferrari, while his playlists feature cumbia legends like Los
    Ángeles Azules and norteño icons such as Los Tigres del Norte, shaping his aesthetic sensibility.
  travel: Norberto Moreno prefers short, purpose‑driven trips—often weekend drives to historic missions along the Texas Hill Country or family pilgrimages to the vibrant markets of Puebla—balancing his
    love for cultural immersion with a tight budget and school commitments.
  culinary: Norberto Moreno hones his cooking by preparing family staples like carne asada al carbón, tamales de elote, and pozole rojo under his mother’s guidance, expertly timing the simmering of hominy
    and the roasting of chilies while tasting each batch with a hint of lime and cumin.
  core: Norberto Moreno is a routine‑driven, mechanically curious teenager whose disciplined mind merges community service with a love for soccer, model cars, and family‑rooted flavors, even if his early‑morning
    alarm often succumbs to a lingering snooze habit.
background:
  cultural: Norberto comes from a Mexican‑American family rooted in San Antonio's vibrant Bexar County community. His parents immigrated from Jalisco, bringing with them a strong emphasis on family cohesion,
    respect for elders, and Catholic traditions. He celebrates Día de los Muertos and Las Posadas with his extended family, preserving cultural practices through food, music, and storytelling. Bilingualism
    is a central part of his identity; he switches seamlessly between Spanish at home and English at school, which informs his ability to mediate and connect across cultural lines. The neighborhood's mix
    of traditional Mexican markets, street festivals, and community churches provides a constant cultural backdrop that shapes his values of practicality, discipline, and a deep desire to give back to the
    community.
