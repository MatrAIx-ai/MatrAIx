  career_goals: Norberto aims to complete his GED within the next year and secure an apprenticeship in automotive technology or electrical work, fields that match his practical orientation and high standards
    for achievement. He envisions becoming a certified technician, providing reliable service to his community while earning a stable income to support his family. Long‑term, he hopes to combine his technical
    expertise with his compassionate nature by leading community workshops that teach youth basic maintenance skills, thereby fostering self‑reliance and harmony. He is also open to a future in the military
    or a public safety role, attracted by the structure, discipline, and service-oriented aspects of those careers.
