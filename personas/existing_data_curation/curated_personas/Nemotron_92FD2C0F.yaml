  hobbies: '[''Hiking coastal trails'', ''Reading contemporary and historical books'', ''Nature photography'', ''Pottery making'', ''DIY home gardening'', ''Volunteering at the local library’s literacy
    program'', ''Attending live music at local venues'', ''Visiting maritime museums and historical sites'']'
  career_goals: Miriam aims to deepen her academic foundation by completing a bachelor's degree in Education with a focus on History, followed by a master's in Educational Leadership. In the next five years,
    she hopes to become a lead teacher and eventually a curriculum coordinator for her district, where she can champion interdisciplinary projects that link local New England history with environmental
    science. She also envisions launching an after‑school enrichment program that offers STEAM workshops and literacy support to underserved students in Rockland. Continuous professional development—particularly
    in project‑based learning and culturally responsive pedagogy—is a core ambition.
