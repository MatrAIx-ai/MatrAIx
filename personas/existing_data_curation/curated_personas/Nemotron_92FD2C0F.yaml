personas:
  professional: Miriam Sparks, a 27-year-old middle-school history teacher in Rockland, blends student-centered lesson planning with tech tools like Google Classroom and interactive whiteboards, balancing
    curiosity-driven project-based learning with practical classroom management, and uses her cooperative yet assertive style to mentor new teachers while championing interdisciplinary STEAM initiatives.
  sports: Miriam Sparks enjoys the New England rhythm of seasonal activity, joining a local hiking club for weekend treks along the North Shore, supporting the Boston Red Sox and New England Patriots while
    attending occasional community softball games, and fits in yoga classes at the town fitness center to balance the demands of teaching.
  arts: Miriam Sparks, an avid reader of contemporary fiction by Sally Rooney and historical narratives by Erik Larson, frequents the Capitol Theatre to see indie bands like The National, finds inspiration
    in Ansel Adams' landscape photography, and practices pottery at a community studio, often admiring the work of modern ceramic artist Grayson Perry.
  travel: Miriam Sparks favors a blend of planned and spontaneous trips, returning each summer to the historic streets of Boston for museum tours, taking weekend getaways to the coastal towns of Martha's
    Vineyard and Cape Cod for seaside walks, and dreaming of a spring visit to Dublin's literary landmarks, all while budgeting travel through a flexible savings plan.
  culinary: Miriam Sparks enjoys home-cooked New England fare, regularly preparing clam chowder with fresh clams, potatoes, and thyme, whipping up lobster rolls with butter-toasted buns, and gardening heirloom
    tomatoes for salads, though their disorganized pantry sometimes forces them to improvise meals with whatever ingredients are on hand.
  core: Miriam Sparks is a curious yet laid-back teacher who blends tech-savvy lessons with pottery hobbies, occasional budget slip-ups, and a love for hiking, music, and coastal cuisine.
background:
  cultural: Miriam grew up in Rockland, a small New England town with deep colonial roots. Her family’s heritage is a mix of Irish and English ancestry, and she was raised in a modest, community‑oriented
    environment that values education, civic participation, and respect for the natural landscape. Seasonal traditions—such as fall leaf‑peeping trips, winter holiday gatherings, and summer days at the
    beach—shaped her appreciation for the region’s rhythms. While identifying as a white New Englander, she is keenly aware of the growing cultural diversity in Plymouth County and strives to incorporate
    inclusive perspectives into her teaching and community involvement.
attributes:
  skills: '[''Lesson planning'', ''Educational technology integration'', ''Differentiated instruction'', ''Classroom management'', ''Formative and summative assessment'', ''Curriculum alignment'', ''Parent‑teacher
