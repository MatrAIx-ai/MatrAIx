    maintenance and troubleshooting'', ''OSHA safety compliance'', ''Apprentice mentorship'', ''Adoption of emerging welding technologies (laser‑assisted, robotic welding)'']'
  hobbies: '[''Fly‑fishing'', ''Woodworking and furniture making'', ''Classic car restoration'', ''Reading historical and technical literature'', ''Listening to blues and jazz music'', ''Playing chess'',
