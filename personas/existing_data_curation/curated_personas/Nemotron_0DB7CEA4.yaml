personas:
  professional: Antwan Montgomery, a seasoned metal-fabrication expert with over forty years mastering MIG, TIG, and stick welding, leverages a balanced blend of curiosity and practicality to mentor apprentices,
    champion OSHA safety, pursue Certified Welding Inspector certification, and launch a boutique workshop that fuses precision metal art with classic-car restoration, aiming to be recognized as the region’s
    top craftsman while transitioning to a senior safety-lead role.
  sports: Antwan Montgomery spends his early mornings fly-fishing with the Midwest Anglers Association on nearby lakes, follows the Detroit Tigers throughout baseball season, roots for the Detroit Lions
    on football Sundays, and stays fit by playing weekly rounds in his county senior golf league, blending low-impact exercise with his love of the outdoors.
  arts: Antwan Montgomery unwinds to the soulful blues of B.B. King and the improvisational jazz of Miles Davis, immerses himself in African-American classics by James Baldwin and Toni Morrison alongside
    historical biographies like Walter Isaacson's *Steve Jobs*, and translates the rhythm and narrative of those works into his handcrafted furniture and custom metal sculptures, where each piece echoes
    a lyrical, yet precise, aesthetic.
  travel: Antwan Montgomery prefers self-planned road trips that combine early-morning fly-fishing at Lake of the Ozarks, weekend visits to historic sites such as Washington, D.C.'s National Museum of African
    American History, and attendance at premier classic-car events like the Pebble Beach Concours d'Elegance, balancing solitary adventure with occasional family outings when budget and time allow.
  culinary: Antwan Montgomery delights in farm-to-table cooking, often grilling fresh lake trout brushed with rosemary-infused butter, simmering garden-grown tomatoes into a rustic vegetable stew, and hosting
    weekend barbecues featuring smoked brisket, collard greens, and buttery cornbread, all while skillfully using his steady hands—honed by decades of welding—to fillet fish with precision.
  core: Antwan Montgomery, a meticulous weld-master who whispers compliments to his tools, thrives on solitary craftsmanship yet harbors a competitive streak that drives them to out-shine fellow tradesmen,
    while their skeptical nature fuels a habit of double-checking every joint and occasionally forgetting to take their medication on time.
background:
  cultural: Antwan’s cultural roots are anchored in the African‑American community of East Texas. His grandparents migrated from rural Louisiana to Ellis County during the Great Migration, bringing with
    them a deep reverence for self‑reliance, church, and family solidarity. Growing up in Mansfield, Antwan was raised with the traditions of Black churches—gospel music, communal picnics, and a strong
    emphasis on mentorship—which shaped his sense of duty to give back. Soul food, blues, and jazz have been constant backdrops in his household, reinforcing a rich cultural heritage that celebrates resilience
    and creativity. This background informs his work ethic, his preference for close‑knit gatherings over large crowds, and his commitment to supporting the next generation of Black tradespeople in his
    community.
