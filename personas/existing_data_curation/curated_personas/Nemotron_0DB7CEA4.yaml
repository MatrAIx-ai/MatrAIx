  career_goals: Looking ahead, Antwan aims to transition from full‑time shop work to a senior mentor and safety leader role. He plans to earn a Certified Welding Inspector (CWI) credential and become the
    lead safety officer for his plant, using his experience to raise standards and reduce incidents. Parallel to this, he hopes to open a small boutique workshop where he can craft custom metal art and
    restoration pieces, allowing him to blend his technical skill with his love for craftsmanship. Antwan also wants to give back by developing a hands‑on welding module for the local community college’s
    trade program, training the next generation of welders. While he is competitive and wants to be recognized as a top‑rated craftsman in the region, his goals remain realistic and focused on legacy, financial
    stability, and gradual semi‑retirement.
