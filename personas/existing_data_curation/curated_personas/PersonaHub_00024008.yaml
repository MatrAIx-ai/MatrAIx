persona_description: A commercial pilot who had worked for the same agricultural operator for 27 months and had not flown on the previous day. The pilot was assigned to dispense fertilizer on a triangular
  shaped field from a height of 50 feet above the ground, and the assigned flagman reported that the field was measured and posted at 60 feet intervals for a west to east spray pattern. The flagman observed
  the pilot bumping up and down with a pronounced up and down deflection of the elevator and struggled to get over the willow trees at the end of the field. The pilot had been employed by the agricultural
  operator for 27 months and had not flown on the previous day. The airplane was manufactured on November 10, 1992, and the first flight of the day was a spray mission with "Furadan 4F" insecticide/nematicide.
