persona_description: Robert Cribb and Audrey Kahin are likely to read the above text. They are senior fellows at the Australian National University in Canberra, with a focus on Indonesia and its history.
  They have previous work experience in Australia, The Netherlands, and Denmark, and have published several books on Indonesia. Their research interests include political violence, national identity, and
  historical geography. Audrey Kahin is also a managing editor of Southeast Asia publications at Cornell and a co-editor of the journal Indonesia, which further showcases their expertise in the field of
  Indonesian studies.
