  career_goals: Looking ahead, Alva aims to transition into a part‑time consultancy role where she can share her wealth of HR knowledge with small businesses and nonprofit arts organizations in the Myrtle
    Beach area. She is passionate about building the next generation of HR professionals, so she plans to formalize a mentorship program for young employees and retirees interested in workforce development.
    Her competitive drive pushes her to become a recognized speaker on DEI and flexible workplace practices in regional conferences. At the same time, she seeks a balanced workload that reduces stress,
    allowing her to continue volunteering for community art projects and to enjoy a gradual, fulfilling retirement.
