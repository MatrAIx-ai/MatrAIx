personas:
  professional: Alva Latchman, a seasoned HR veteran with three decades of expertise in employee relations, talent acquisition, and DEI, leverages their curiosity and flexible, sometimes disorganized, approach
    to design inventive training programs, mediate workplace conflicts for small businesses and nonprofit arts groups, and mentor the next generation of HR professionals.
  sports: Alva Latchman, a dedicated daily beach walker who supports the Carolina Panthers and attends local senior yoga classes, maintains fitness through sunrise shoreline strolls, light gardening lifts,
    and occasional community walking club meets, preferring low‑impact activity over high‑intensity competition.
  arts: Alva Latchman, a watercolor enthusiast who paints seascapes, regularly visits the Myrtle Beach Art Center gallery openings, participates in a community theater troupe performing classics like 'Our
    Town,' and draws inspiration from artists such as Monet, Georgia O'Keeffe, and local painter Susan MacDonald, weaving these influences into their monthly book‑club discussions.
  travel: Alva Latchman, a leisurely traveler who prefers thoughtfully planned road trips to coastal gems like Charleston and Savannah, dreams of visiting the Renaissance museums of Florence and the sun‑kissed
    islands of the Greek Cyclades, and balances a modest travel budget with a love of spontaneous sunset photography sessions on the beach.
  culinary: Alva Latchman, a passionate low‑country cook who excels at preparing shrimp and grits, she‑crab soup, and collard greens seasoned with smoked ham hocks, enjoys sourcing fresh oysters and sweet
    potatoes from local farmers' markets, and frequently pairs meals with a chilled Riesling while hosting lively family gatherings.
  core: Alva Latchman blends a lifelong curiosity for art and people with a flexible, sometimes disorganized HR expertise, a cautious financial outlook, vigilant health monitoring of hypertension, low‑impact
    beach walks and theater nights, and a love of low‑country cooking that fuels their vibrant, albeit occasionally worry‑laden, outlook on retirement.
background:
  cultural: Alva’s cultural background is rooted in the African‑American community of the South Atlantic coast. Her family traces its heritage to the Gullah‑Geechee traditions of Lowcountry South Carolina,
    with a strong emphasis on oral storytelling, church fellowship, and communal resilience. Growing up in a historically Black neighborhood of Myrtle Beach, she experienced both the joys of close‑knit
    community celebrations—such as Juneteenth parades and gospel choirs—and the challenges of navigating racial inequities in the workplace. These experiences have shaped her commitment to diversity, equity,
    and inclusion, and they influence her appreciation for Southern soul food, jazz, and the rhythmic cadence of spoken‑word poetry. Alva’s identity is also informed by the intergenerational transmission
    of values that honor elders, prioritize collective support, and celebrate artistic expression as a means of cultural preservation.
