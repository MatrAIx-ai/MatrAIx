personas:
  professional: Martha Council, a seasoned registered nurse with a flair for data-driven care, leverages their curiosity and competitive drive to integrate art-therapy techniques into Epic EMR workflows
    while mentoring junior staff, even as their relaxed approach to obligations sometimes leads to a cluttered inbox.
  sports: Martha Council, an avid weekend hiker on the coastal trails of Torrey Pines, balances their competitive spirit by joining the San Diego Coastal Hikers Club and a local kayaking league, cheering
    on the San Diego Padres and San Diego Wave FC, and attending weekly yoga classes to soothe anxiety and maintain flexibility.
  arts: Martha Council, a devoted patron of San Diego's contemporary art scene, spends weekday evenings at the Museum of Contemporary Art exploring works by Ai Weiwei and Kerry James Marshall, creates raku-style
    pottery inspired by Japanese traditions, and unwinds listening to the experimental jazz of Kamasi Washington and the ambient soundscapes of Brian Eno.
  travel: Martha Council, a curious traveler in their early fifties, favors spontaneous road trips along the Pacific Coast Highway to places like Big Sur and Santa Barbara while dreaming of an immersive
    art-focused study tour of Florence, Barcelona, and Kyoto, balancing a love for adventure with occasional budget constraints caused by their flexible spending habits.
  culinary: Martha Council, an experimental home chef, fuses Mediterranean and Mexican flavors by preparing smoked salmon tacos with harissa-infused crema and rosemary-scented paella, keeping a pantry stocked
    with turmeric, miso, and fresh herbs, and often treats themselves to tasting menus at La Jolla's modern fusion eateries.
  core: Martha Council, a 51-year-old nurse-informaticist-in-training, channels a restless curiosity, artistic soul, and competitive edge into every facet of life—from data-driven patient care to splurging
    on pottery glaze—while battling procrastination and vivid anxiety that both fuels creativity and triggers occasional overwhelm.
background:
  cultural: Martha grew up in a suburban, middle‑class White American family on the West Coast, absorbing the region’s blend of laid‑back coastal lifestyle and progressive cultural values. Living in San
    Diego, she is influenced by the city’s multicultural atmosphere, which nurtures her appreciation for diverse artistic expressions and holistic health perspectives. Her upbringing emphasized self‑reliance
    and academic achievement, while her current environment encourages openness to new ideas and community involvement, shaping her identity as a compassionate yet critically minded healthcare professional.
attributes:
  skills: '[''Clinical nursing'', ''Patient assessment'', ''Acute triage'', ''Wound care'', ''Health informatics'', ''Data analysis (Python)'', ''Medical research methodology'', ''Epic EMR management'',
