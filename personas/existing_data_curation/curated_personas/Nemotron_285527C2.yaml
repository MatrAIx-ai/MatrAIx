  hobbies: '[''Visiting art galleries and museums'', ''Pottery and ceramics'', ''Hiking coastal trails'', ''Reading science‑fiction'', ''Gardening'', ''Experimental cooking'', ''Mindfulness meditation'',
    ''Volunteering at community health fairs with art‑based wellness activities'']'
  career_goals: Martha aims to transition into a nurse informatics specialist role where she can design and implement technology‑driven solutions that personalize patient care. She plans to pursue a Master’s
    in Nursing Administration to eventually become a unit manager, championing interdisciplinary programs that incorporate creative arts for mental‑health support. Over the next five years she hopes to
    launch a community‑based art‑and‑wellness clinic in San Diego, secure grant funding for research on art therapy’s impact on chronic illness outcomes, and mentor a network of nurses to adopt flexible,
    patient‑centered care models.
