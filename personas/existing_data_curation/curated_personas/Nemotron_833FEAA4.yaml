  career_goals: She aims to transition from being a journeyman carpenter to owning a small, eco‑focused carpentry business that supplies custom interiors for homes in the Los Angeles area. Over the next
    five years she plans to earn a Certified Green Professional credential, expand her client base through community networking, hire and train at least two apprentices, and become an active member of the
    local carpenter’s union leadership committee. Long‑term, she hopes to influence affordable housing projects by providing cost‑effective, high‑quality woodwork solutions.
