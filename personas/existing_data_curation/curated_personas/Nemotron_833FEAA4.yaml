personas:
  professional: Shekinah Smith, a seasoned carpenter with over two decades of residential and light‑commercial woodworking experience, blends traditional joinery with CNC technology and sustainable low‑VOC
    materials, mentors apprentices, and strategically plans to launch an eco‑focused carpentry firm delivering custom interiors while championing affordable housing solutions; they balance curiosity with
    practicality in every project.
  sports: Shekinah Smith stays active through weekend hikes with the Angeles National Forest Hiking Club, regular yoga sessions at a neighborhood studio, and follows the Los Angeles Dodgers and Lakers passionately,
    occasionally joining a community softball league in spring, balancing a competitive spirit with a love for nature; they view fitness as both a personal challenge and a way to sustain the stamina needed
    for their trade.
  arts: Shekinah Smith nurtures a deep appreciation for classic soul and jazz, spinning Marvin Gaye, Aretha Franklin, and Miles Davis on vinyl while restoring vintage furniture and attending local block‑party
    performances by emerging spoken‑word artists, letting music and craftsmanship fuel their creative drive; they often find inspiration for new designs in the rhythms and stories they hear.
  travel: Shekinah Smith prefers purposeful trips that blend adventure and cultural immersion, having hiked the Redwood trails in Northern California, savored a weekend getaway to Santa Barbara’s coastal
    markets, and dreaming of a workshop visit to Asheville’s artisan community, all while budgeting carefully due to family obligations; they plan future journeys with a mix of curiosity, practicality,
    and a desire to connect with fellow makers.
  culinary: Shekinah Smith enjoys cooking soulful meals that fuse Southern staples such as collard greens, smoked turkey, and cornbread with California fresh produce like avocado, heirloom tomatoes, and
    kale, often improvising with spices like smoked paprika and adding a dash of citrus to brighten the plate; they treat the kitchen as another workshop where experimentation meets tradition.
  core: Shekinah Smith is a pragmatic craftsman; they blend curiosity with a competitive drive, balancing a skeptical eye for shortcuts with a soulful love for vintage wood, vinyl jazz, and community mentorship,
    even if occasional back pain and a secret stash of gummy bears keep them grounded.
background:
  cultural: Shekinah is a second‑generation African‑American raised in the multicultural suburbs of Bellflower. Her upbringing was shaped by strong ties to the Black church, community gatherings, and a
    family tradition of hands‑on craftsmanship. She carries forward the collective values of resilience, mutual support, and pride in her heritage, which inform both her work ethic as a carpenter and her
    commitment to mentoring younger members of the community. The vibrant cultural landscape of Los Angeles, with its blend of Black, Latino, and Asian influences, also colors her tastes in music, food,
    and community activism, especially around issues of affordable housing and representation in skilled trades.
