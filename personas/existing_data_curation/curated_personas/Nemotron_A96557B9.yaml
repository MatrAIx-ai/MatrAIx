personas:
  professional: Roger Robinson, a seasoned facilities maintenance supervisor with over two decades of experience in staff scheduling, quality control, and OSHA compliance, leverages their curiosity and
    practicality to blend data‑driven cleaning protocols with a people‑first leadership style that emphasizes mentorship and inclusive teamwork.
  sports: Roger Robinson enjoys pick‑up basketball at Suwanee Community Park, roots for the Atlanta Hawks and Atlanta Falcons, participates in a weekend adult league for the Atlanta Braves fan club, and
    hikes the Blue Ridge Mountains for cardio, balancing competitive spirit with a laid‑back approach to fitness.
  arts: Roger Robinson finds inspiration in the soulful sounds of Marvin Gaye, Aretha Franklin, and contemporary gospel choir Tasha Cobbs, attends the annual Atlanta Film Festival featuring works like "The
    Color Purple," and volunteers at their church’s choir, using music as a bridge between community and personal reflection.
  travel: Roger Robinson favors short, purposeful trips that blend nature and culture, such as weekend hikes in Asheville’s Blue Ridge Parkway, a culinary tour of New Orleans’ Creole cuisine, and an annual
    family pilgrimage to Charleston’s historic districts, planning most itineraries on a spreadsheet to balance work commitments and budget constraints.
  culinary: Roger Robinson excels at preparing soul‑food classics like smoked collard greens, honey‑glazed ham, and peach‑cornbread, often using heirloom tomatoes from their community garden, and enjoys
    experimenting with low‑sodium seasoning blends to align their cooking with health goals.
  core: Roger Robinson is a methodical facilities leader who balances data‑driven efficiency with community mentorship, while juggling garden‑to‑table cooking, weekend basketball, and a vigilant eye on
    health and finances.
background:
  cultural: Roger is a Black American who grew up in the Atlanta metro area and now lives in Suwanee, Georgia. His family places a strong emphasis on community, faith, and education, values that have shaped
    his collaborative and considerate nature. He maintains cultural traditions such as celebrating Juneteenth and cooking soul‑food recipes passed down through generations. Regular involvement in his church
    and local African‑American community organizations reinforces his commitment to harmony, mentorship, and giving back. These cultural influences inform his leadership style, his dedication to creating
    inclusive workplaces, and his passion for community‑centered activities.
attributes:
  skills: '[''staff scheduling'', ''team leadership'', ''quality control'', ''OSHA and health‑safety compliance'', ''inventory management'', ''budgeting and cost control'', ''training and mentorship'',
