    proficiency (Microsoft Office, scheduling platforms, IoT monitoring)'']'
  hobbies: '[''community gardening'', ''cooking Southern soul‑food'', ''recreational basketball'', ''listening to R&B, soul, and gospel music'', ''reading non‑fiction (technology, leadership, self‑improvement)'',
    ''volunteering at church (youth mentorship, event planning)'', ''hiking local trails'', ''DIY home‑improvement projects'']'
  career_goals: Roger aspires to advance from first‑line supervision to a facilities manager role where he can oversee multiple sites and drive strategic initiatives. He is pursuing a Certified Facility
    Manager (CFM) credential and hopes to lead a department that integrates advanced sustainability measures, such as automated cleaning systems and energy‑efficiency programs. In the longer term, he envisions
    starting his own consulting firm that helps small‑to‑mid‑size businesses adopt greener housekeeping standards while providing mentorship to aspiring Black leaders in the industry.
