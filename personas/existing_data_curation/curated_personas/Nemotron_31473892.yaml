  hobbies: '["Reading adventure and nature books", "LEGO building", "Jigsaw puzzles", "Animal sketching", "Family cooking (Spanish cuisine)", "Collecting rocks and observing insects", "Listening to Spanish
    folk music"]'
  career_goals: Even at eight, Maria envisions a future that combines her curiosity about living things with her love for order and service. She dreams of becoming a veterinarian, caring for animals with
    the same careful, step‑by‑step approach she uses in school projects. She is also fascinated by teaching, hoping to one day be an elementary school teacher who can share organized learning strategies
    with younger children. Ultimately, she aims for a career that blends scientific inquiry with practical, compassionate help for others.
