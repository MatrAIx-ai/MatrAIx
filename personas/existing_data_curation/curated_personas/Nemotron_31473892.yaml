personas:
  professional: Maria Medina, an aspiring young naturalist and budding engineer, channels her methodical curiosity into building intricate LEGO habitats that mimic animal ecosystems, while documenting each
    step in a notebook that they share with the library's junior science club.
  sports: Maria Medina, a member of the Porter Youth Soccer League and avid fan of the Houston Astros, drills on the field wearing the number 7 for the "Porter Cubs," practices weekend obstacle courses
    at the local park, and follows the team's games on weekends with family, cheering loudly from the living room couch.
  arts: Maria Medina, an enthusiastic sketch artist, spends after-school hours drawing capybaras and sunrise landscapes inspired by wildlife photographer Chris Carson and the luminous brushwork of Joaquín
    Sorolla, while they hum traditional folk songs like "La Vaca" during their creative sessions.
  travel: Maria Medina, whose family road-trip highlights include the bustling San Antonio River Walk, a sunny day at Galveston Beach, and the quirky street art of Austin's South Congress, dreams of strolling
    through Barcelona's Park Güell and hiking the towering redwoods of California's Big Tree Park.
  culinary: Maria Medina, a kitchen helper extraordinaire, can whisk a perfect tortilla de patatas, stir saffron-infused paella, and drizzle chocolate over freshly fried churros, though they sometimes over-salt
    the rice and sneak extra marshmallows into the batter for a sweet surprise.
  core: Maria Medina, an organized eight-year-old explorer, blends methodical LEGO engineering with wildlife sketches, saves allowance with a meticulous ledger, navigates mild allergies and occasional worries,
    delights in soccer and Astros games, draws inspiration from iconic artists, dreams of bright city adventures, and perfects family recipes while sometimes over-salting.
background:
  cultural: Maria lives in Porter, Texas, in a household that maintains strong ties to its Spanish heritage. Her parents speak both Spanish and English at home, celebrating traditions such as Día de los
    Reyes, Semana Santa, and vibrant Spanish festivals while also participating in local Texan events like Cinco de Mayo and community fairs. The family enjoys traditional Spanish foods – paella, tortilla
    española, and churros – and incorporates Spanish music and dance into family gatherings. This bicultural environment gives Maria a blend of Mediterranean values—family cohesion, respect for elders,
    and a love of communal meals—combined with the friendly, community‑oriented spirit of the Houston area.
attributes:
  skills: '["Bilingual reading (Spanish & English)", "Basic arithmetic (addition, subtraction, multiplication)", "Organizational planning (homework planner)", "Problem‑solving with puzzles (LEGO, jigsaw)",
