personas:
  professional: Johnathon Nel is a budding young designer, constructing elaborate LEGO mazes and sketching futuristic cityscapes, demonstrating an early knack for spatial reasoning, project planning, and
    collaborative problem‑solving that hints at a future career in architecture or engineering.
  sports: Johnathon Nel plays forward for the Bayview Junior Soccer Club, sprinting around the field with the same energy they pour into LEGO builds, and they attend weekend practices reliably while also
    joining a seasonal swimming class during summer, balancing team spirit with personal fitness.
  arts: Johnathon Nel spends weekends at the local art fair, sketching street performers in vibrant crayon while humming along to Imagine Dragons, and they idolize contemporary artist Yayoi Kusama for her
    bold patterns, often attempting to replicate her polka‑dot motifs in their own paintings.
  travel: Johnathon Nel loves day trips to the tide‑pool‑rich coastline of Seaside Cove, where they collect sea glass and explore rocky pools, and they dream of visiting the aquariums of Monterey and the
    museums of Washington D.C., preferring short, family‑guided trips over long solo journeys.
  culinary: Johnathon Nel prefers homemade cheese pizza with extra pepperoni, loves dipping carrot sticks in hummus, and enjoys making fruit smoothies with banana and strawberry, boasting a budding ability
    to follow simple recipes but often leaving a trail of flour on the kitchen counter.
  core: Johnathon Nel is a curious, energetic kid whose love of LEGO, art, and soccer fuels a vibrant imagination, though they sometimes lose track of time in their creative projects, leaving a mess of
    crayons and building bricks behind.
background:
  cultural: Raised in Cambria, a small coastal town in San Luis Obispo County, Johnathon grows up in a close‑knit, environmentally aware community that values outdoor activities, local arts, and family
    traditions. While his family observes mainstream American holidays like Thanksgiving and Christmas, they also participate in regional events such as the Cambria Scarecrow Festival and the Pacific Coast
    Artisan Fair, fostering an appreciation for both classic middle‑American values and the relaxed, nature‑centric lifestyle of central California.
