  career_goals: Raymond aims to transition from a subcontractor to the owner of a niche painting firm that specializes in low-VOC and lead-safe finishes for historic homes in the Sioux Falls area. He plans
    to obtain formal certification as a lead-safe painter and to complete a short course in sustainable building practices, which aligns with his curiosity for new materials while honoring his practical
    mindset. Recognizing his tendency to feel overwhelmed by strict deadlines, he intends to build a small, trusted crew that shares his flexible work style, allowing projects to be scheduled in a way that
    reduces pressure and improves work‑life balance. Over the next five years, he hopes to mentor at least two apprentices, expand his service portfolio to include decorative faux finishes, and achieve
    a steady income that secures his family's financial future without sacrificing his preference for low-stress, manageable workloads.
