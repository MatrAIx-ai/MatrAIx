personas:
  professional: Raymond Zhao, a seasoned painter and paperhanger with fifteen years of hands‑on experience, blends their curiosity for low‑VOC and lead‑safe finishes with a pragmatic, flexible work style
    that shuns tight deadlines and thrives on small‑team collaboration and mentorship of apprentices.
  sports: Raymond Zhao stays active by early‑morning fishing on Lake Alvin, weekend hikes with the Badlands Trail Crew, and avidly supporting the Sioux Falls Storm, Minnesota Vikings, and Minnesota Twins,
    preferring low‑impact, solitary workouts over crowded gym classes, a routine that aligns with their love of quiet, purposeful movement.
  arts: Raymond Zhao’s artistic side surfaces in their weekend woodworking projects, their evening photography of prairie light reminiscent of Ansel Adams, and an avid reading habit that includes historical
    fiction by Hilary Mantel and Ken Follett, while folk tunes from John Denver and the Carter Family often drift through their workshop.
  travel: Raymond Zhao plans low‑key, self‑driven road trips that blend natural beauty and heritage, such as a summer family drive to Yellowstone, a fall weekend in the Black Hills, and a dream visit to
    Heidelberg’s historic old town, always favoring quiet routes over crowded tourist hubs to honor their love of solitude and modest budget.
  culinary: Raymond Zhao cooks simple, health‑focused meals—grilled trout with fresh dill, roasted beet and kale salad tossed with locally sourced goat cheese, and hearty barley soup with heirloom carrots—drawing
    inspiration from farmer’s‑market ingredients while occasionally indulging in a comforting beef stew on colder evenings, a habit that reflects their appreciation for wholesome, home‑grown flavors.
  core: Raymond Zhao blends prairie‑rooted self‑reliance with restless curiosity, carving out quiet moments at the lake, dodging tight deadlines, silently worrying about the next project, and quietly mastering
    a new finish while battling a chronic whisper of stress, a pattern that reveals their constant balancing act between ambition and tranquility.
background:
  cultural: Raymond is a white Midwestern American with deep roots in the South Dakota prairie. His family has lived in the region for three generations, originally arriving from German and Scandinavian
    immigrants who settled the farms of Lincoln County. Growing up in a small town, he absorbed the region’s emphasis on self-reliance, practical problem solving, and community cooperation. While he identifies
    culturally as American, he maintains a quiet pride in the traditions of the Upper Midwest—such as seasonal county fairs, local church gatherings, and the modest, straightforward lifestyle common in
    the plains. His upbringing in a close‑knit, predominantly white community has reinforced his preference for small-group interactions and a respect for the land, which he expresses through his love of
    fishing, hiking, and sustainable home practices.
