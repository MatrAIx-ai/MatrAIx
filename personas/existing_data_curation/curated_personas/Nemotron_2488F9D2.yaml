personas:
  professional: Sherri Donovan, an aspiring theatre prodigy, channels her vivid imagination and disciplined organization into leading school drama productions as both lead actor and stage‑design coordinator,
    thriving on the buzz of the audience while meticulously planning every cue and set piece.
  sports: Sherri Donovan enjoys weekend hikes along the Texas Hill Country trails such as the Barton Creek Greenbelt, volunteers as a trail steward for the local youth outdoor club, and cheers on Austin
    FC during the MLS season, preferring low‑key, nature‑focused exercise over competitive sports.
  arts: Sherri Donovan draws inspiration from Lin‑Manuel Miranda’s musical storytelling, Idina Menzel’s vocal power, and Disney Broadway set designs, often recreating miniature backdrops for drama club
    shows while humming Disney classics during rehearsals.
  travel: Sherri Donovan loves spontaneous weekend road trips to explore Hill Country towns like Fredericksburg and Wimberley, dreams of backpacking through Yosemite’s giant sequoias, and plans each outing
    with a hand‑drawn map and snack checklist created with her family.
  culinary: Sherri Donovan delights in baking lemon‑zest cupcakes for community bake sales, crafts fresh pesto from garden‑grown basil, and savors the comforting aroma of homemade chicken noodle soup on
    rainy days, always topping her plates with a sprinkle of fresh mint leaves.
  core: Sherri Donovan is a charismatic, hyper‑organized eleven‑year‑old who turns every creative project into a meticulously planned performance, yet often wrestles with a whirlwind of anxiety that fuels
    both her drive and occasional over‑thinking.
background:
  cultural: Sherri was raised in Dripping Springs, a small town in the Texas Hill Country known for its tight‑knit community and blend of ranching and emerging tech influences. Her family reflects a typical
    white, middle‑class background with deep roots in the region, celebrating Texas traditions such as Friday night football, county fairs, and local rodeos, while also participating in church gatherings
    and community service projects. The local emphasis on hospitality, self‑reliance, and respect for nature has shaped her values of cooperation, responsibility, and a love for outdoor activities. At the
    same time, she is attuned to broader American pop culture through music, social media, and school events, creating a balanced cultural outlook.
