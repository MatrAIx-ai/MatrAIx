    community bake sales'']'
  career_goals: Sherri dreams of a future where she can combine her love for helping others, her organizational talent, and her passion for learning. She aspires to become a pediatric nurse or doctor so
    she can support children’s physical and emotional health, and she also envisions leading community health workshops for youth. In the longer term, she hopes to run a youth mentorship program that blends
    academic tutoring with creative arts, allowing her to be a positive role model while staying organized and making a tangible impact.
