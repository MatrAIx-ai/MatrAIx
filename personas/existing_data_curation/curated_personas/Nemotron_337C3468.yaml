personas:
  professional: Omawattie Chan, a 32‑year‑old construction specialist with heavy‑equipment expertise and OSHA certification, blends a competitive drive with pragmatic problem‑solving to keep projects on
    schedule while mentoring crew members and championing sustainable building practices.
  sports: Omawattie Chan, a member of the Flint Hills Hiking Club, tackles the rugged trails during spring and summer, roots for the Kansas City Chiefs in football and the Kansas City Royals in baseball,
    and balances weekend trail runs with occasional volunteer work coaching a youth flag‑football team, reflecting a competitive yet community‑oriented approach to fitness.
  arts: Omawattie Chan weaves creative threads through acoustic guitar evenings inspired by John Hartford, learning powwow drum patterns from local drummers, hand‑crafting functional wooden furniture while
    studying biographies of pioneering women tradespeople such as Rosie the Riveter, and they regularly attend performances by the Kansas City Ballet and the local folk music festival.
  travel: Omawattie Chan plans trips like a project schedule, favoring eco‑focused road trips to places like Yellowstone National Park and the Badlands for hiking, while dreaming of a sustainable architecture
    tour through Denmark's eco‑villages, balancing a modest travel budget with occasional family visits to the ancestral reservation during cultural festivals.
  culinary: Omawattie Chan prefers farm‑to‑table meals, expertly preparing heirloom tomato salads, wild rice pilaf with sage, and cedar‑smoked trout, while their modest kitchen skills shine in traditional
    family recipes like spiced cornbread and smoked pork shoulder, and they experiment with prairie‑grown vegetables in a weekly garden‑to‑plate dinner.
  core: Omawattie Chan is a competitively spirited builder who balances solo hikes with community drum circles, meticulously budgets for tools while sometimes neglecting dental care, and channels pragmatic
    curiosity into sustainable construction and hands‑on craftsmanship.
background:
  cultural: 'Omawattie is a member of the Iowa Tribe of Kansas, a community with deep roots in the region surrounding Holton. Growing up, she was immersed in tribal traditions that emphasize respect for
    the land, communal responsibility, and the importance of skilled craftsmanship. She speaks English fluently and has conversational knowledge of her tribal language, which she practices during cultural
    gatherings. Her heritage informs her perspective on construction: she values sustainable methods that protect natural ecosystems and often incorporates Indigenous design motifs—such as symbolic patterns
    and natural materials—into her projects. Participation in powwows, tribal council meetings, and community service initiatives reinforces her connection to her ancestors and motivates her to advocate
    for building practices that honor cultural values.'
attributes:
  skills: '[''Concrete pouring and finishing'', ''Basic framing and carpentry'', ''Heavy equipment operation (backhoe, skid steer)'', ''Blueprint reading and plan interpretation'', ''OSHA safety compliance'',
    ''Site material inventory management'', ''Problem‑solving and on‑site troubleshooting'', ''Basic electrical wiring assistance'', ''Team coordination and shift scheduling'', ''Knowledge of sustainable
    building practices'']'
  hobbies: '[''Hiking local trails'', ''Gardening native plants'', ''Woodworking projects'', ''Traditional dance and drumming'', ''Sustainable building workshops'', ''Reading biographies of women in construction'',
    ''Playing acoustic guitar'', ''Cooking Native American recipes'', ''Volunteering at community events'']'
  career_goals: Omawattie aims to formalize her expertise by earning certifications in heavy‑equipment operation and construction safety within the next two years. She envisions moving into a crew foreman
    role, where she can combine her organizational strengths with her competitive drive to lead a high‑performing team. Long‑term, she hopes to specialize in sustainable and culturally‑respectful building
    projects that integrate traditional Native American design elements, eventually serving as a project manager or starting a boutique consultancy focused on eco‑friendly construction for tribal communities.
    Pursuing an associate’s degree in construction management or a related field is also on her roadmap to broaden her career options.
