personas:
  professional: Rann Kelley is a self‑taught tech enthusiast who leverages hands‑on PC‑building expertise, Python automation, and front‑end web development to deliver reliable remote support solutions,
    thriving in solitary, data‑driven environments and approaching each client task with a competitive‑edge mindset.
  sports: Rann Kelley enjoys early‑morning solo walks along Fort Lauderdale’s canals, follows the Miami Heat, the Florida Panthers, and the Fort Lauderdale Strikers with an analytical eye, and participates
    occasionally in the local ‘Fort Lauderdale Morning Walkers’ club, favoring low‑impact cardio over team sports.
  arts: Rann Kelley immerses themselves in minimalist urban photography inspired by Andreas Gursky, unwinds to synth‑driven soundtracks like Vangelis’ Blade Runner score and Daft Punk’s electronic beats,
    and reads the cyberpunk classic Neuromancer by William Gibson, allowing these influences to shape their aesthetic and coding style.
  travel: Rann Kelley prefers meticulously planned solo trips that balance tech‑centric exploration in cities like Tokyo and Singapore with low‑budget nature retreats to the Everglades and Key West, cataloguing
    each journey in a digital journal while controlling expenses with a modest travel fund.
  culinary: Rann Kelley enjoys quick, protein‑rich meals such as avocado toast topped with smoked salmon and a side of spicy ramen, cooking at a beginner‑friendly level using staple ingredients like garlic,
    soy sauce, and sriracha, and occasionally splurges on a gourmet burger after a successful gaming tournament.
  core: Rann Kelley is a solitary, data‑driven nineteen‑year‑old who merges competitive gaming instincts with pragmatic tech tinkering, obsessively tracking habits yet often forgetting to stretch, turning
    every PC build into a personal victory.
background:
  cultural: Rann grew up in Fort Lauderdale, a coastal city in Broward County that blends a laid‑back beach vibe with a diverse, multicultural population. While his household reflects a predominantly white,
    middle‑class American upbringing, he has been exposed to a variety of cultural influences through local festivals, multilingual neighborhoods, and the city's vibrant music scene. This environment has
    fostered an appreciation for both individualism and the practical ethos of the broader Floridian community, shaping his balanced outlook on curiosity and established methods.
