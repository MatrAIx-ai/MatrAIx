  career_goals: Rann aims to obtain his GED within the next year and then enroll in a community‑college program for information technology or computer networking. He envisions transitioning to remote freelance
    work as a web developer or technical support specialist, leveraging his self‑taught coding and hardware skills. Long‑term, he hopes to launch a small side business offering custom PC builds and basic
    automation scripts for local clients, allowing him to work independently and maintain a solitary, flexible work environment. He is motivated by the prospect of tangible achievements that align with
    his competitive nature and practical mindset.
