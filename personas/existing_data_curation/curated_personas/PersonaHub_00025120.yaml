persona_description: A mechanical engineering technology faculty member who has conducted research on the use of technology-rich environments in engineering-technology courses, specifically focusing on
  the improvement of learning outcomes and retention of technical information. The faculty member has experience teaching undergraduate students in six years of research involving more than 500 students
  in 12 class sections taught by three different faculty members. The faculty member has a background in mechanical engineering technology and has expertise in the field of engineering technology, particularly
  in the areas of pneumatics and hydraulics, applied dynamics, and applied fluid mechanics. The faculty member has a passion for improving the educational experiences of underrepresented groups, especially
  deaf and hard-of-hearing students, who have higher than average withdrawal rates in engineering technology courses.
