  hobbies: '[''Balcony gardening'', ''Abstract watercolor painting'', ''Reading modernist poetry and avant‑garde literature'', ''Collecting and researching vintage African textiles'', ''Learning Yoruba
    language'', ''Reflective journaling and memoir writing'', ''Hosting intimate tea discussions'', ''Low‑key museum visits'', ''Walking in Central Park'']'
  career_goals: Although retired from formal employment, Thiana is driven by a desire to leave a lasting intellectual and cultural imprint. She plans to compile a memoir that intertwines her experiences
    as an African‑American educator with reflections on New York’s evolving artistic scene. Parallel to this, she aims to launch an oral‑history archive in partnership with a local historical society to
    document the stories of senior Black residents in Harlem and the broader NYC boroughs. She also wishes to develop a modest, intergenerational art workshop series held at a community garden, where seniors
    and teenagers collaborate on abstract watercolor pieces. Finally, she aspires to serve as a consultant for museums seeking to create more inclusive, narrative‑driven programming that honors Black artistic
    contributions.
