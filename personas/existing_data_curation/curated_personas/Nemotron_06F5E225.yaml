personas:
  professional: Thiana Mccray, a retired K‑12 educator turned community arts advocate, uses their four decades of interdisciplinary curriculum design, grant‑writing, and horticultural‑therapy expertise
    to mentor new teachers, curate inclusive exhibitions, and consult museums on narrative‑driven programming that they help shape.
  sports: Thiana Mccray, an avid participant in senior yoga classes at the Harlem Community Center and a faithful follower of the New York Knicks, tracks their daily step count during leisurely walks to
    the local farmers market and they occasionally join the Harlem Senior Sports Club’s low‑impact tennis sessions.
  arts: Thiana Mccray curates their abstract watercolor studies alongside a prized collection of vintage African textiles, draws inspiration from Georgia O’Keeffe, Yinka Shonibare, and Miles Davis, and
    hosts intimate tea gatherings where friends discuss poets like Amiri Baraka and visual artists such as Catherine Opie, all while they continuously explore new techniques in their sketchbook.
  travel: Thiana Mccray, who favors tranquil cultural escapes, enjoys annual weekend trips to Kyoto’s historic gardens, occasional visits to the Smithsonian’s National Museum of African American History,
    and dreams of exploring the souks of Marrakech with their Yoruba conversation group, though they plan each journey with a flexible itinerary that leaves room for spontaneous tea ceremonies.
  culinary: Thiana Mccray delights in brewing jasmine‑lemongrass tea, preparing herb‑infused olive oil for simple salads featuring rosemary‑roasted root vegetables and a pinch of sumac, and occasionally
    cooks a comforting lentil stew with cilantro and dried apricots, all while they proudly share these dishes at their low‑key tea gatherings.
  core: Thiana Mccray navigates life with watercolor‑splashed imagination, garden‑rooted serenity, a habit of misplacing tiny keys, and an unwavering commitment to chronicling community stories, and they
    cherish each quiet moment.
background:
  cultural: Thiana’s cultural identity is rooted in a rich tapestry of African diaspora experiences. Born to parents who migrated from Jamaica and the American South during the 1940s, she grew up in Harlem’s
    vibrant community where jazz, spoken word, and civil‑rights activism were everyday influences. Her family upheld traditions of storytelling, soul food cooking, and communal gatherings, shaping her early
    appreciation for oral history and collective memory. Throughout her teaching career, she incorporated African‑American literature, Black visual art, and historical narratives into lessons, fostering
    a sense of pride and critical consciousness among her students. In New York City, she has remained an active participant in local cultural organizations, volunteering at the Schomburg Center, contributing
    to community garden projects, and supporting intergenerational initiatives that celebrate Black heritage. Her lifelong commitment to cultural preservation and education reflects both the legacy of her
    ancestors and her personal quest for intellectual discovery.
