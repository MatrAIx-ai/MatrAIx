  career_goals: Lilly aims to advance from her current surveillance officer position to a supervisory role within casino security, eventually becoming a Security Operations Manager overseeing a team of
    officers and the full spectrum of loss‑prevention activities. She plans to obtain advanced certifications such as the Certified Protection Professional (CPP) and Physical Security Professional (PSP)
    to broaden her expertise. In the longer term, she aspires to merge her passion for art with her security background by transitioning into museum security or consulting on protection strategies for high‑value
    art exhibitions, leveraging both her technical surveillance skills and her deep appreciation for visual culture.
