  hobbies: '[''Reading historical fiction'', ''Cooking Creole and Southern dishes'', ''Gardening'', ''Listening to jazz and gospel music'', ''Yoga'', ''Journaling'', ''Volunteering at local church food
    pantry'', ''Small‑group board game nights'']'
  career_goals: Briana aims to advance to a senior financial director role within the next five years, leveraging her practical expertise to shape strategic financial planning for a mid‑sized organization
    in the Caddo Parish area. She plans to earn her CPA certification and enroll in a part‑time bachelor's program in finance or an MBA to broaden her strategic skill set. Long‑term, she envisions launching
    a boutique consulting practice that helps local Black‑owned small businesses improve cash flow and sustainability, integrating her curiosity for innovative financial tools with a commitment to community
    empowerment.
