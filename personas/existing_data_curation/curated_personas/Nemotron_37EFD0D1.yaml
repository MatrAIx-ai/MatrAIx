personas:
  professional: A seasoned financial analyst, Briana Prussien leverages advanced Excel, SAP Financials, and QuickBooks to translate complex data into clear strategic reports, guiding senior leadership while
    fostering collaborative consensus in cross‑functional teams, even though they sometimes miss deadlines due to a flexible, spontaneous work style.
  sports: An enthusiastic community fitness enthusiast, Briana Prussien enjoys early‑morning backyard yoga, follows the LSU Tigers football and New Orleans Pelicans basketball teams, and participates in
    a local mixed‑age softball league on weekends, preferring low‑key, small‑group activities over high‑intensity gym sessions, and they often cherish the camaraderie of these intimate gatherings.
  arts: A devoted lover of soulful arts, Briana Prussien regularly attends intimate jazz concerts at venues like the historic Louisiana Club featuring artists such as Wynton Marsalis, finds solace in gospel
    choirs at her church, immerses themselves in Reconstruction‑era historical novels by authors like George Ella Lynge, and occasionally dabbles in watercolor painting of bayou landscapes, reflecting a
    blend of curiosity and tradition.
  travel: A culturally curious explorer, Briana Prussien has wandered the Mardi Gras streets of New Orleans to celebrate community traditions, trekked Charleston’s historic districts, taken weekend road
    trips to Texas Hill Country for bluebonnet photography, and dreams of a culinary pilgrimage to Lyon, France, though they balance these travel ambitions with a modest family budget and occasional work‑related
    stress.
  culinary: An enthusiastic home chef, Briana Prussien blends family‑passed Creole recipes with garden‑fresh herbs, frequently cooks gumbo with okra, jambalaya with andouille sausage, and black‑eyed pea
    salad seasoned with thyme and bay leaf, while experimenting with modern twists like crawfish étouffée tacos, yet they sometimes burn the roux when distracted by a work email.
  core: Briana Prussien balances analytical rigor with heartfelt community commitment, navigating career ambition, financial stewardship, and personal wellness through disciplined planning and spontaneous
    creativity, all while wrestling with anxiety and a love for quiet, soulful moments.
background:
  cultural: Briana is a Black woman rooted in the rich tapestry of Southern Louisiana culture. Growing up in Shreveport, she was immersed in the traditions of the local African‑American community—church
    gatherings, gospel music, Creole cuisine, and family reunions that emphasized collective support. Her family history includes ties to the historic Black neighborhoods of Caddo Parish, where storytelling
    and resilience were daily lessons. She celebrates Mardi Gras with a focus on Black cultural contributions and participates in community events hosted by organizations such as the NAACP and local churches.
    This heritage informs her values of cooperation, harmony, and a deep commitment to uplifting those around her.
attributes:
  skills: '[''Financial analysis'', ''Budgeting and forecasting'', ''Risk assessment'', ''Financial reporting'', ''Regulatory compliance'', ''Vendor negotiation'', ''Team leadership'', ''Advanced Excel'',
