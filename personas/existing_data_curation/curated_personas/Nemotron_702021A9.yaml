personas:
  professional: Nicholas Pratt is an aspiring visual artist and budding UX designer who combines hand-drawn illustration with digital interface concepts, channeling their meticulous planning and empathetic
    communication into user-centred projects that often explore mental-health narratives, and they occasionally let perfectionist procrastination delay final drafts.
  sports: Nicholas Pratt regularly hikes the Appalachian Trail with the local Frontiers Hiking Club, occasionally joins community yoga classes to manage stress, they follow the Baltimore Ravens, Washington
    Capitals, and Baltimore Orioles, and they keep a modest fitness routine focused on endurance rather than competitive sports.
  arts: Nicholas Pratt immerses themselves in artistic creation by sketching en plein air, digital painting using Adobe Photoshop, and playing acoustic tunes inspired by Nick Drake and Sufjan Stevens, they
    draw aesthetic inspiration from the illustration work of James Jean and the poetry of Ocean Vuong, which together shape their identity and fuel their leisure.
  travel: Nicholas Pratt favors thoughtfully planned weekend escapes to nearby Shenandoah National Park and occasional trips to New York City's Museum of Modern Art, they dream of a cultural pilgrimage
    to Kyoto's bamboo forests and the Scottish Highlands, balancing adventure with a limited student budget and family responsibilities.
  culinary: Nicholas Pratt enjoys preparing modest vegetarian meals like mushroom risotto, lentil soup, and spinach-feta omelets, they favor fresh herbs such as rosemary and basil, yet they habitually over-season
    everything with cinnamon and prefer sipping cold brew coffee while sketching.
  core: Nicholas Pratt is a meticulous dreamer who blends art and design, worries about every detail, saves sparingly, and they channel anxiety into creative sketches, late-night guitar sessions, and carefully
    plotted hikes.
background:
  cultural: Nicholas grew up in Accident, a small rural town in Garrett County, Maryland, nestled in the Appalachian region of western Maryland. His family’s heritage is primarily of European descent—Irish,
    German, and English ancestors—reflecting a typical white American background. The community’s cultural fabric emphasizes close‑knit family ties, modesty, and a strong work ethic, with local traditions
    such as county fairs, folk music gatherings, and storytelling evenings. These rural values have instilled in him a respect for nature, self‑reliance, and community harmony. At the same time, his curiosity
    has led him to engage with broader American and global cultures through online art communities, contemporary literature, and digital media, blending his Appalachian roots with a modern, cosmopolitan
    outlook.
attributes:
  skills: '["traditional drawing (pencil, charcoal)", "digital illustration (Adobe Photoshop, Illustrator)", "graphic design fundamentals (layout, typography, color theory)", "basic UX/UI wireframing and
    user flow mapping", "creative writing (short stories, poetry)", "acoustic guitar composition and performance", "academic research and literature review", "project planning and time management", "empathetic
    communication and conflict mediation", "basic Python programming for creative prototypes"]'
  hobbies: '["sketching and digital painting of Appalachian landscapes", "reading speculative fiction and modern poetry", "hiking and nature photography", "acoustic guitar playing and songwriting", "journaling
    and creative writing", "experimenting with Unity game prototypes", "volunteering for local library reading programs"]'
  career_goals: Nicholas aims to complete a Bachelor of Fine Arts or a related interdisciplinary degree that merges visual arts with user‑experience design. He plans to build a professional portfolio that
    showcases both hand‑drawn and digitally produced work, with a focus on projects that explore storytelling, mental‑health themes, and innovative interfaces. In the short term, he hopes to secure internships
    or freelance commissions in illustration, indie game art, or educational publishing. Long‑term, he envisions a career as a UI/UX designer for a technology company that prioritizes user well‑being, or
    as an art therapist who uses creative processes to support individuals dealing with anxiety and stress. Additionally, he aspires to mentor younger students in his hometown by leading after‑school art
    workshops and community‑based creative programs.
