persona_description: A climate scientist who specializes in the study of sea level rise and its impacts on coastal regions. She has a particular interest in the Southeast United States, where she has observed
  sudden increases in sea levels over the past century. Her research involves analyzing tide gauge records and examining the relationship between climate patterns such as the El Niño Southern Oscillation
  and sea level rise. She is also interested in the role of human activities, such as groundwater pumping and sea level rise, in driving these changes.
