persona_description: A student studying at Kingston University who is focusing on Building Surveying. The student is interested in the construction and property industry, specifically in the area of reducing
  carbon emissions from existing buildings. The student is looking for ways to introduce smart and greener technologies, smart systems and green technologies, and BIM to help regulate energy use in existing
  buildings. The student is also interested in the use of reclaimed, recycled, and new materials to insulate existing buildings and in smart systems to regulate energy usage within the home. The student
  is seeking information on ways to ensure the success of projects and to recruit employers in the construction industry.
