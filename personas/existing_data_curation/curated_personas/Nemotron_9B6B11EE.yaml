  career_goals: Carol aims to complete her high‑school equivalency, then pursue a community‑college program in health sciences with the goal of becoming a registered nurse or EMT. She is motivated to combine
    her organizational talent with her desire to help others by eventually leading community health outreach initiatives in Oklahoma City. Long‑term, she envisions a role in project management within a
    healthcare or emergency‑services organization, where she can apply her competitive drive and systematic approach.
