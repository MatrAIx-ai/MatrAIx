personas:
  professional: Carol Dennis, a high‑school senior with a knack for event coordination, blends meticulous spreadsheet planning and emerging Python skills to lead school health‑awareness drives, demonstrating
    their organized, competitive drive and practical curiosity in every project.
  sports: Carol Dennis, a varsity volleyball setter and co‑captain of the school soccer midfield, trains with the OKC Thunder Youth Soccer Club in the spring and roots for the Oklahoma City Thunder and
    the Oklahoma State Cowboys, balancing competitive team play with a disciplined personal fitness routine of early‑morning runs.
  arts: Carol Dennis, who shines on stage as a drama‑club lead and spends weekends at country‑music showcases headlined by Kacey Musgraves or indie shows featuring The War on Drugs, channels her organized
    creativity into set design and playlist curating, often quoting lines from Shakespeare in casual conversation.
  travel: Carol Dennis, limited by a high‑school schedule and a tight budget, favors weekend road trips to nearby natural spots like the Wichita Mountains, dreams of a summer backpacking adventure through
    the Appalachian Trail, and meticulously plans each itinerary using Google Maps and a travel spreadsheet.
  culinary: Carol Dennis, an avid home‑cook who can whip up a spicy chicken fried steak with jalapeño‑infused gravy and a rustic black‑bean chili, prefers farm‑to‑table farmers’ markets for fresh produce
    but occasionally indulges in late‑night gaming snack runs for loaded nachos.
  core: Carol Dennis juggles herd‑like social energy, a competitive streak, and a spreadsheet‑obsessed mind, all while battling occasional migraines and a never‑ending quest for the perfect barbecue rub.
background:
  cultural: Carol grew up as a White American in Oklahoma City, immersed in Midwestern values of hard work, community hospitality, and self‑reliance. Her family and local church emphasize participation
    in community events and a respect for both traditional country life and modern digital culture. This blend of regional pride, volunteer spirit, and contemporary interests shapes her outlook and daily
    activities.
