  hobbies: '[''Hiking in the Sierra Nevada'', ''Landscape photography'', ''Watercolor painting'', ''Playing acoustic guitar'', ''Visiting contemporary art exhibitions'', ''Reading science‑fiction and philosophy'',
    ''Volunteering at community science fairs'', ''Meditation'', ''Journaling'', ''Participating in casual jam sessions'']'
  career_goals: Edwin aims to lead a multidisciplinary biotech venture that leverages his scientific insight and business acumen to develop sustainable solutions for agriculture and environmental health.
    He aspires to secure a tenure‑track research position focused on synthetic biology while building strategic partnerships with industry to bring discoveries to market. Over the next decade, he hopes
    to launch his own startup, mentor emerging scientists, and influence Nevada’s biotech policy. Recognizing his sensitivity to stress, he is committed to fostering a collaborative lab culture that prioritizes
    mental well‑being, flexible work structures, and balanced workloads.
