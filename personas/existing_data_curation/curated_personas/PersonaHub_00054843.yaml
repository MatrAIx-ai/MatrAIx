persona_description: A medical professional who specializes in the diagnosis and treatment of mood disorders, particularly depression. They have extensive knowledge and experience in the six main types
  of depression and their symptoms, as well as the effects of untreated depression on daily life. They are skilled in recognizing and managing symptoms of depression, including feelings of sadness, loss
  of interest in activities, and suicidal thoughts. They are also knowledgeable about the risks and consequences of untreated depression, including the potential for prolonged periods of inactivity and
  the possibility of developing bipolar disorder.
