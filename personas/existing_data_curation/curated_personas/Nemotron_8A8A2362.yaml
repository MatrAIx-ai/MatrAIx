  career_goals: Approaching retirement, Sho aims to transition into a mentorship and advisory role, establishing a boutique consulting practice that guides Asian‑American investors in cross‑border strategies.
    He also seeks to build a personal art‑investment portfolio that fuses his financial acumen with his love of visual arts. His goals include achieving financial independence that supports his wife's community
    art initiatives, publishing thought‑lead articles on unconventional investing, and leaving a legacy of disciplined, data‑driven analysis for the next generation of analysts.
