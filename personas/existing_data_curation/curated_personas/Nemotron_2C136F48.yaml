  career_goals: Janet aims to pursue a career that blends her love for structure, problem‑solving, and teamwork. In the short term she plans to excel academically in math and science, secure a place in
    a competitive STEM program, and earn a sports scholarship for soccer. Long‑term, she envisions becoming a civil engineer or project manager, designing and overseeing community infrastructure projects
    that improve her hometown and foster collaboration. She also considers a future in law, where her analytical and debate skills could serve her in corporate or public advocacy roles.
