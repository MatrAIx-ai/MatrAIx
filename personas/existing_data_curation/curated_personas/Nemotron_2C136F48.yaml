personas:
  professional: Janet Gott is an aspiring team strategist who channels her competitive edge from middle school soccer, debate, and puzzle solving into leading her peers with organized, practical plans while
    balancing school responsibilities, and they often volunteer to coordinate club events with a reliable, structured approach.
  sports: Janet Gott is a midfield player on the Arlington Heights middle school soccer team, drills with the local youth club, and cheers for the Chicago Bears and Cubs, and they approach fitness with
    a structured routine of after‑school practices, weekend matches, and occasional dance cardio sessions, though they sometimes skip stretch time when homework piles up.
  arts: Janet Gott explores photography and graphic design, captures candid shots of friends at soccer practices, streams playlists featuring Billie Eilish and Taylor Swift while editing, and they unwind
    by reading mystery novels by Agatha Christie, often sketching storyboards for imagined escape‑room puzzles.
  travel: Janet Gott has road‑tripped to Chicago’s Navy Pier and spent a family weekend at Wisconsin Dells, dreams of visiting the Irish countryside and German castles someday, and they plan trips using
    Google Maps, preferring short, budget‑friendly adventures that blend sightseeing with opportunities to photograph local scenes.
  culinary: Janet Gott enjoys crafting a perfect slice of Chicago‑style deep‑dish pizza with pepperoni and extra cheese, loves quick meals like grilled cheese and apple slices, experiments with colorful
    smoothie bowls for Instagram, and they often snack on popcorn while solving puzzles late at night.
  core: Janet Gott, a competitively driven 14‑year‑old, blends structured leadership on the soccer field with a love for puzzles, video games, and community events, while occasionally over‑spending on gaming
    gear and neglecting rest after intense practices.
background:
  cultural: Janet grew up in Arlington Heights, a suburban community in Cook County, Illinois. Her family is of European descent, primarily German and Irish ancestry, reflecting the region’s traditional
    Midwestern heritage. She was raised with typical American customs—celebrating Thanksgiving, Fourth of July, and Christmas—and attended a local public middle school that emphasizes community involvement
    and academic achievement. The neighborhood’s values of practicality, reliability, and civic participation have shaped her outlook.
