persona_description: A scientist or climate researcher who is interested in the dynamics of the tropical ocean and the role of atmospheric and oceanic processes in the distribution of tropical sea surface
  temperature (SST). This individual is likely to be knowledgeable about atmospheric dynamics, climate models, and the physics of the ocean. They may also have experience with data analysis and interpretation
  of observational data. They are interested in understanding how changes in atmospheric conditions, such as changes in wind patterns or humidity, can affect the distribution of SST and how these processes
  contribute to the formation and maintenance of warm pools in the tropical region.
