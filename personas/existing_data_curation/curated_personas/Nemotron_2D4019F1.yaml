  career_goals: Graciela dreams of one day becoming a marine biologist who can explore tide pools and protect sea turtles, while also imagining herself as a teacher who shares her love of stories and science
    with other children. She hopes to combine her curiosity about the ocean with a practical desire to help her community, perhaps by leading beach clean‑up projects when she’s older.
