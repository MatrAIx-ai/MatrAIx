persona_description: A person who is interested in the Craft of Communication and its application in the field of performance, particularly in the context of status and leadership. They are likely to be
  familiar with the Latin meaning of status and its application in classical theatre. They are also interested in the concept of status equation and its implications on leadership. They may be interested
  in the idea that less space used implies lower status and more space used implies higher status. They are likely to be interested in the concept of low and high status and how it affects leadership and
  management. They may be interested in the idea that low status can give the impression that someone is not up to the job of leading or managing others, while high status can give the reassurance that
  someone is capable of leading or managing others.
