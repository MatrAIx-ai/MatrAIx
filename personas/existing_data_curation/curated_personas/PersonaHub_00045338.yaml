persona_description: A historian who specializes in Scottish history, particularly the medieval period. The person is interested in the events, figures, and developments that took place in Scotland during
  the 12th to 16th centuries. They are knowledgeable about the kingdoms of Scotland, their rulers, and their interactions with England, France, and other European powers. The person is also interested in
  the cultural, political, and social changes that occurred during this time period, and how they impacted Scotland and its people. They are likely to be interested in the history of the Scottish Enlightenment
  and Industrial Revolution, and the role that these events played in shaping Scotland's identity and development. Additionally, the person may be interested in the geography of Scotland, including its
  location, coastlines, and islands, and the natural and cultural features of the country.
