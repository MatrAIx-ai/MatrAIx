  hobbies: '[''Hiking'', ''Birdwatching'', ''Gardening'', ''Reading Historical Nonfiction'', ''Educational Literature'', ''Yoga'', ''Knitting'', ''Book Club'', ''Community Garden Volunteering'']'
  career_goals: Helen aims to move into an instructional coaching role within her district over the next three years, where she can shape curriculum and support teacher growth. She plans to earn a master's
    degree in Educational Leadership to qualify for a curriculum specialist or department head position, with a focus on embedding sustainability and experiential learning across grade levels. Additionally,
    she aspires to coordinate a community partnership that brings local environmental experts into classrooms, creating interdisciplinary projects that foster climate‑aware citizenship while maintaining
    a practical, results‑oriented framework.
