  operating the SKA. Has experience in international collaboration and negotiation. Is interested in the scientific potential of the SKA and its potential impact on the field of astronomy. Has a strong
  interest in the development of new technologies and the integration of existing ones. Is aware of the ethical and social implications of the SKA and its potential impact on society. Is committed to the
  scientific goals of the SKA and its potential to advance our understanding of the universe. Is aware of the potential risks and challenges associated with the SKA project and is prepared to address them.
  Is committed to the development of a sustainable and equitable SKA project.
