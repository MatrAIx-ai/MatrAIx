personas:
  professional: Arie Hampton, a 42‑year‑old community event planner and aspiring arts administrator, blends methodical budgeting, precise volunteer coordination, and a curious eye for visual storytelling
    to turn local non‑profit gatherings into vibrant cultural experiences, while a competitive streak drives them to out‑maneuver peers in grant‑writing contests and a skeptical nature keeps them vigilant
    about partners’ motives.
  sports: Arie Hampton, a 42‑year‑old who enjoys weekly community basketball pick‑up games and follows the Tennessee Volunteers football team and the Nashville Predators hockey club, treats fitness as a
    supplementary routine, often prioritizing woodworking projects and art curation over regular gym sessions, leading to occasional lapses in their exercise schedule.
  arts: Arie Hampton, an avid visitor to Middle Tennessee galleries and a self‑taught photographer, draws artistic inspiration from jazz legends like Miles Davis, blues icons such as B.B. King, and gospel
    powerhouses like Aretha Franklin, while their sketchbook captures spontaneous impressions of local murals and their woodworking hobby translates visual motifs into handcrafted furniture.
  travel: Arie Hampton, a 42‑year‑old photography enthusiast, prefers carefully planned road trips that blend cultural immersion with scenic stops—having documented the jazz streets of New Orleans, the
    historic gardens of Charleston, and the artisan markets of Asheville—they dream of a future European art pilgrimage to Paris and Amsterdam, though current finances keep the itinerary modest.
  culinary: Arie Hampton, an intermediate home cook with a penchant for Southern soul food, regularly prepares fried chicken glazed with hot sauce, slow‑cooked collard greens seasoned with smoked paprika,
    and buttery cornbread, while experimenting with pecan‑topped sweet potato pie during holiday gatherings.
  core: Arie Hampton, a 42‑year‑old community‑focused organizer with a competitive edge and a skeptical eye, channels curiosity into art and woodworking while juggling a disciplined budget, occasional health
    neglect, and a habit of hoarding vintage jazz records and power tools.
background:
  cultural: Arie's cultural background is rooted in the African-American experience of the rural South. Born and raised in Middle Tennessee, he grew up in a close-knit church community where gospel music,
    storytelling, and communal support were central. Family traditions emphasize resilience, education, and participation in civil rights narratives that shaped his worldview. The culinary heritage of Southern
    soul food, the legacy of blues and jazz, and the rich history of black art in the region inform his aesthetic sensibilities. Though Lebanon is a small town, Arie's identity reflects a blend of historic
    black Southern culture and contemporary influences from national art and music movements, fostering a deep appreciation for both his heritage and broader artistic expression.
attributes:
  skills: '["Project planning and organization", "Community event coordination", "Volunteer management", "DIY home repair and woodworking", "Art appreciation and critique", "Basic financial budgeting",
    "Research and information synthesis", "Strategic gaming (chess)", "Digital photography and editing"]'
  hobbies: '["Visiting art galleries", "Painting and sketching", "Photography", "Woodworking projects", "Reading historical biographies", "Playing chess", "Listening to jazz and gospel music", "Gardening",
    "Community volunteer work", "Cooking Southern soul food"]'
  career_goals: Arie's immediate career objective is to transition from informal volunteer work to a paid role that merges his organizational strengths with his passion for the arts. He plans to earn a
    certificate in arts administration from a nearby community college, and to start a part-time consultancy offering event planning and volunteer management services for local non-profits. Long-term, he
    envisions opening a modest workshop space where he can teach woodworking and host art-focused community gatherings, providing both supplemental income and a platform for cultural expression.
