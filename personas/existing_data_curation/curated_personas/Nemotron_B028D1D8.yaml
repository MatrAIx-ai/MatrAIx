  hobbies: '[''Visiting art galleries and museums'', ''Sketching and drawing'', ''Playing acoustic guitar'', ''Photography (urban and natural landscapes)'', ''Organizing community events'', ''Volunteering
    at the local youth center'', ''Reading philosophy and science'', ''Participating in debate and drama clubs'']'
  career_goals: Tyler aspires to become a community outreach and event manager for a nonprofit or cultural organization, where he can blend his love of art with his sociable, organized demeanor. He plans
    to finish his high school diploma through an alternative program and then pursue a degree in communications, media studies, or arts administration. In the longer term, he hopes to launch a podcast or
    YouTube channel that explores contemporary art, music, and ideas, positioning himself as a local cultural influencer who connects people and promotes creative experiences.
