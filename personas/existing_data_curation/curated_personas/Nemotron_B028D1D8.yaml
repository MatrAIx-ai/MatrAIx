personas:
  professional: Tyler Blankenship, an aspiring community outreach and event manager, merges a natural flair for public speaking with methodical event planning to orchestrate art‑centric workshops, youth‑focused
    gallery tours, and cultural festivals, while using their networking skill to build lasting partnerships with local nonprofits and emerging artists.
  sports: Tyler Blankenship, a dedicated early‑morning jogger who captures sunrise shots along the Sandhills, participates in the Lincoln City Soccer Club’s fall league, follows the Nebraska Cornhuskers
    football team and the Omaha Mavericks basketball squad, and schedules weekly yoga sessions to maintain flexibility, treating fitness as another carefully coordinated event.
  arts: Tyler Blankenship, an avid sketcher and acoustic guitarist, draws inspiration from Edward Hopper’s urban realism, Sufjan Stevens’ folk arrangements, and experimental playwrights like Samuel Beckett,
    regularly attends museum exhibitions, curates photo series for Instagram, and volunteers to lead after‑school arts workshops that blend visual storytelling with live music performances.
  travel: Tyler Blankenship, a meticulous planner who favors road‑trip adventures, has explored Yellowstone and Badlands National Parks on sunrise hikes, visited Chicago for a photography exhibition at
    the Art Institute, enjoys weekend music festivals in Austin, and dreams of touring the contemporary art galleries of Amsterdam and the street murals of Berlin, all while balancing travel costs with
    a savings goal.
  culinary: Tyler Blankenship, a competent home cook who prefers farm‑to‑table flavors, frequently prepares corn succotash with fresh local heirloom corn, grilled elk jerky marinated in rosemary and garlic,
    and avocado toast topped with radish slices and a drizzle of lemon‑infused olive oil, while also indulging in nightly coffee shop visits for espresso and a slice of almond‑flour chocolate cake.
  core: Tyler Blankenship blends relentless curiosity with a planner’s precision, turning every photo, sketch, and community event into a curated experience, all while balancing occasional impulse purchases
    and an unwavering calm.
background:
  cultural: Tyler grew up in Lincoln’s Lancaster County, a predominantly white Midwestern community where family ties, church involvement, and local fair traditions shape daily life. The region’s agricultural
    heritage and expansive prairie scenery have cultivated an appreciation for open, understated aesthetics that he often reflects in his art and photography. Community values such as reliability, modesty,
    and collaborative spirit are emphasized, while his exposure to Nebraska’s modest arts scene—regional folk art, community theater, and seasonal festivals—has nurtured his curiosity for varied cultural
    expressions.
