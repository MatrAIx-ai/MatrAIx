personas:
  professional: Keith Benitez is a senior full‑stack software developer who writes Java, C#, Python and JavaScript code while architecting React and Angular front‑ends and Node.js back‑ends, and they leverage
    Azure and AWS to build scalable cloud services; their love of curiosity tempered by practicality drives them to experiment with new frameworks but also to refactor legacy code, and although they prefer
    a relaxed, flexible workflow that sometimes borders on disorganization, they excel at collaborative problem‑solving, mentoring junior teammates, and steering Agile sprints toward clear product outcomes
    as they aim for a Lead Architect or Engineering Manager role.
  sports: Keith Benitez dominates the local community softball league as a versatile shortstop, joins weekly basketball pick‑ups at the Grass Lake gym, and spends Saturday mornings hiking the Pinckney Recreation
    Area and cycling the Washtenaw County trail network, while they cheer for the Detroit Tigers, root for the Pistons during the NBA season, and proudly wear the Michigan State Spartans gear during college
    football weekends.
  arts: Keith Benitez curates lively board‑game nights featuring Catan, Ticket to Ride, and the occasional Gloomhaven marathon, belts out classic karaoke hits from The Beatles and Journey at a downtown
    pub, and they fill their free time with a rotating playlist of The Rolling Stones, John Mayer, and local indie folk act The Paper Kites, illustrating how music, games, and performance fuel their sociable
    and energetic spirit.
  travel: Keith Benitez prefers spontaneous road trips that blend outdoor adventure with craft‑beer tasting, having recently explored the whiskey distilleries of Louisville, the vibrant music scene of Austin,
    and the rugged coastline of Oregon's Cannon Beach, while they keep a bucket‑list of destinations that includes a culinary pilgrimage to Oaxaca for authentic mole and a future cross‑country drive to
    the Grand Canyon to combine hiking with family bonding.
  culinary: Keith Benitez delights in merging Midwestern comfort with Mexican flair, often serving jalapeño‑infused mac and cheese beside carnitas tacos, crafting barbecue‑glazed pork enchiladas, and experimenting
    with a citrus‑hopped IPA brewed at home that pairs perfectly with their signature chipotle‑spiced chicken wings, showcasing a kitchen skill level that mixes confident sauté techniques with a willingness
    to experiment on the fly.
  core: Keith Benitez is a sociable, curiosity‑driven software veteran who balances late‑night karaoke, home‑brewing experiments, and a love for community sports with a laid‑back approach to planning that
    sometimes leads to missed bills, yet they always keep the group laughing.
background:
  cultural: Keith grew up in the Midwest, raised in a predominantly white, middle‑class family in Michigan while also embracing the Hispanic heritage of his father, whose surname Benítez reflects his Mexican
    roots. This bicultural upbringing gave him a strong sense of Midwestern values—politeness, community service, and a love of local traditions—combined with a appreciation for Mexican cultural practices
    such as family gatherings, music, and cuisine. He celebrates both Thanksgiving and Día de los Muertos, and he maintains close ties to a local Catholic church that serves as a cultural bridge for his
    family. This blend of American Midwestern and Latino influences shapes his inclusive outlook, collaborative spirit, and love for community‑focused activities.
