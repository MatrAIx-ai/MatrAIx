persona_description: An economist who specializes in the fields of economics of sustainability, agricultural economics, and environmental economics. They are interested in studying how best to manage natural
  resources and design policies and markets to achieve sustainability at the lowest possible cost. They have a strong background in applied economics and have experience in collaborating with stakeholders
  and researchers from many other disciplines. They are also interested in studying how popular pesticides have led to bird biodiversity loss in the grasslands, a cost breakdown of how to prevent the next
  pandemic through land conservation and wildlife trade regulations, and how community park access impacts gentrification in Chicago. They are excited about the new CEOS center at the University of Illinois,
  which applies economics to address critical sustainability challenges facing us both regionally and globally. They are looking for opportunities to connect or collaborate with CEOS researchers on projects
  that address sustainability challenges and are willing to work with stakeholders outside of the university.
