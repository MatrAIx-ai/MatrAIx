personas:
  professional: Sebastian Navarro, a 34‑year‑old master machinist with over a decade of experience on CNC mills, manual lathes, and SolidWorks, blends a meticulous safety‑first mindset with a competitive
    drive to secure a lead‑machinist or shift‑supervisor role where they can streamline processes with lean principles and mentor junior technicians.
  sports: Sebastian Navarro, a dedicated strength‑training enthusiast, follows a four‑day‑a‑week gym routine centered on deadlifts and bench press, supplements this with weekend fly‑fishing trips to the
    nearby Greenwood Reservoir, and quietly roots for the River City Runners baseball team while shunning large crowds.
  arts: Sebastian Navarro balances the clatter of the shop floor with the gentle strum of an acoustic guitar, regularly rehearsing classic folk ballads from their family’s heritage, and finds creative inspiration
    in both machining tutorial videos and the cinematic scores of Ennio Morricone.
  travel: Sebastian Navarro prefers low‑key, purpose‑driven travel, often planning road trips to industrial museums like the Henry Ford Museum in Detroit or CNC expos in Munich, while also seeking quiet
    retreats at alpine lakes in Colorado and dreaming of a pilgrimage to a historic market town renowned for its mole and tamale traditions.
  culinary: Sebastian Navarro enjoys cooking family‑rooted dishes such as chicken mole with dried ancho chilies and masa‑based tamales, perfects the balance of spice and chocolate in the sauce, and occasionally
    experiments with sous‑vide steak to merge precision engineering with culinary art.
  core: Sebastian Navarro, a meticulous 34‑year‑old machinist who channels a competitive, stress‑prone mind into precision work, disciplined finances, solitary hobbies, and a quiet devotion to family traditions
    and personal mastery.
background:
  cultural: Sebastian is a first‑generation Mexican‑American raised in Pomona. He grew up in a bilingual household, speaking Spanish with his parents and grandparents while attending English‑language schools.
    Mexican cultural values of hard work, respect for elders, and community solidarity shaped his practical and organized outlook. He participates in local celebrations such as Día de los Muertos and Mexican
    Independence Day, and maintains family ties in both Southern California and his hometown in Mexico. His heritage influences his cooking, music preferences, and his modest, family‑oriented perspective
    on life.
attributes:
  skills: '[''CNC milling'', ''CNC turning'', ''Manual lathe operation'', ''Blueprint interpretation'', ''Precision measurement (micrometer, CMM)'', ''CNC programming (G-code)'', ''CAD/CAM (SolidWorks,
    Mastercam)'', ''Machine troubleshooting'', ''Lean manufacturing'', ''Safety compliance (OSHA)'']'
  hobbies: '[''Scale model building'', ''Woodworking'', ''Engine tinkering'', ''Fishing'', ''Strength training'', ''Acoustic guitar'', ''Cooking Mexican dishes'', ''Watching machining tutorials'', ''Reading
    technical manuals'', ''Mindfulness meditation'']'
  career_goals: Sebastian aims to advance to a lead machinist or shift supervisor position within the next few years, obtain NIMS certification, and deepen his expertise in CNC programming. He envisions
    eventually managing a small machine shop or transitioning to a manufacturing engineering role where his practical skills can drive process improvements. His goals emphasize stable, higher‑paying employment
    that rewards his reliability and technical competence while maintaining a predictable work environment. He also seeks opportunities to mentor junior team members and, long‑term, to launch his own custom
    metal‑fabrication business.
