  career_goals: Samuel aims to turn his imagination into a sustainable career. He aspires to become a concept artist or multimedia storyteller for a game development studio or indie film production, where
    he can blend visual art, narrative, and music. He envisions building a personal brand as a content creator who publishes comic strips, animated shorts, and short fiction online, eventually partnering
    with a creative agency that values flexible work schedules. He also hopes to develop community‑focused art workshops in his hometown, offering a supportive space for other teens to explore creativity,
    which aligns with his cooperative nature.
