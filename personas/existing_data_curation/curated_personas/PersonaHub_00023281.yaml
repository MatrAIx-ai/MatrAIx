persona_description: A user who is interested in designing a user-friendly interface. They are likely to be a professional with a background in graphic design, user experience (UX) design, or interface
  design. They have experience in conducting user research to understand user needs, goals, and behavior, and they are skilled in creating a clear and simple layout using visual hierarchy and whitespace.
  They are familiar with common UI patterns and design elements and are able to use them to make the interface feel familiar and intuitive. They are also skilled in providing clear and immediate feedback
  when users interact with the interface and are able to test and iterate based on real user feedback to improve the user experience.
