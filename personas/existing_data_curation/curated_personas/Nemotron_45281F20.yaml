personas:
  professional: Michelle Reyes, a retired community organizer turned senior cooking class leader, leverages their meticulous budgeting skills and natural talkative charm to coordinate weekly culinary workshops
    at the Imperial Beach Senior Center, while occasionally juggling the chaos of last‑minute ingredient hunts and the anxiety of keeping everything on schedule.
  sports: Michelle Reyes, a devoted fan of the San Diego Padres and San Diego Wave FC, participates in a sunrise beach‑walk club and occasional friendly volleyball matches at the local community center,
    yet often forgets to wear sunscreen, leading to mild sunburns that add to their seasonal discomfort.
  arts: Michelle Reyes, an enthusiastic member of a salsa and cumbia dance troupe, delights in humming classic boleros by Armando Manzanero and modern Latin pop hits from Luis Miguel, while also collecting
    vintage cinema posters and knitting scarves inspired by traditional folk patterns.
  travel: Michelle Reyes dreams of a relaxed road trip to Baja California to reconnect with siblings, has already explored Ensenada on a weekend getaway, and prefers itineraries that blend cultural festivals
    with beachfront sunsets, though their anxiety often triggers a last‑minute checklist of medications and travel insurance.
  culinary: Michelle Reyes is renowned among friends for whipping up authentic mole, tamales, and fresh salsa using garden‑grown tomatoes, chilies, and cilantro, though they sometimes over‑season dishes
    with extra salt and admit to sneaking extra churros during family potlucks.
  core: Michelle Reyes blends structured budgeting with spontaneous community cooking, navigates health worries with proactive monitoring, and channels sociable energy into dance, sports, and cultural travel,
    all while battling a touch of anxiety and occasional forgetfulness.
background:
  cultural: Michelle is a first‑generation Mexican‑American whose parents migrated from Jalisco in the early 1960s. Raised in a bilingual household in the San Diego region, she has retained strong ties
    to Mexican customs such as Día de los Muertos, family meals centered around homemade tortillas, and the celebration of fiestas patronales. Living in Imperial Beach, she actively participates in local
    Hispanic community events, Spanish‑language church services, and neighborhood cultural festivals. Her identity blends the rich traditions of her Mexican heritage with the laid‑back coastal lifestyle
    of southern California, and she often serves as a cultural bridge, sharing stories, recipes, and language skills with neighbors of diverse backgrounds.
