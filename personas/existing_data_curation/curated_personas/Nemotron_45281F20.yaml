  career_goals: Although retired from formal employment, Michelle is determined to deepen her impact on the local senior community. Her goals include leading a weekly cooking class at the Imperial Beach
    Senior Center to preserve Mexican culinary traditions, serving on the advisory board of the senior services agency to advocate for culturally relevant health and social programs, and organizing an annual
    neighborhood cultural festival that celebrates Mexican holidays and customs. On a personal level, she aspires to remain physically active through gardening, to cultivate mindfulness practices that alleviate
    her anxiety, and to travel to Baja California to visit her siblings before turning 70.
