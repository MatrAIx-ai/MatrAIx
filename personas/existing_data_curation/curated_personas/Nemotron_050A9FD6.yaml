  hobbies: '[''Hiking'', ''Fly fishing'', ''Mountain biking'', ''Community softball league'', ''Live music events'', ''DIY electronics projects'', ''Volunteering with Habitat for Humanity'', ''Barbecue
    gatherings'']'
  career_goals: Mario aims to earn his Master Electrician license within the next two years, deepen his expertise in renewable‑energy systems, and eventually launch his own electrical contracting firm that
    specializes in sustainable installations for homeowners in Missoula and surrounding communities. He plans to obtain a GED and pursue an associate degree in electrical technology to broaden his technical
    knowledge. Additionally, he hopes to become a certified mentor for apprentices, contribute regularly to Habitat for Humanity projects, and position his business as a trusted partner for local green‑energy
    initiatives.
