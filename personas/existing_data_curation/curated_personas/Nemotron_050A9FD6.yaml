personas:
  professional: Mario Galusha, a 30‑year‑old electrician in Missoula, blends meticulous blueprint reading and code‑compliant wiring with a curiosity for solar and smart‑home tech, leading small crews on
    residential and light‑commercial projects while mentoring apprentices and juggling flexible schedules to keep both safety and innovation on the front‑line.
  sports: Mario Galusha throws a fastball for the local Missoula Softball League, hikes the Rattlesnake Ridge trail every month, flies their fly‑fishing line on the Clark Fork River, rides with the Missoula
    Mountain Bikers club, and proudly wears the Missoula Osprey baseball cap while cheering the game on weekends.
  arts: Mario Galusha frequents Missoula’s bluegrass nights to see The Infamous Stringdusters and folk sessions with Gillian Welch, occasionally joins open‑mic banjo circles, and supports the Missoula Repertory
    Theatre’s summer productions, finding rhythm in both music and the hum of newly wired homes.
  travel: Mario Galusha plans weekend escapes to Glacier and Yellowstone for high‑altitude hikes, has a bucket list spot of a salmon‑focused fly‑fishing trip to the Canadian Rockies, enjoys spontaneous
    road‑trips to Boise for craft‑brew festivals, and balances adventure with a modest travel fund that they top up after each successful contract.
  culinary: Mario Galusha perfects a smoky grilled trout with huckleberry glaze, masters slow‑cooked beef ribs on hickory, mixes their own BBQ rubs using Montana‑grown herbs, and despite being a competent
    grill master, sometimes over‑salts the side salad when the barbecue gets too lively.
  core: Mario Galusha is a community‑driven electrician who transforms outdoor enthusiasm into sustainable energy projects, balances social BBQs with meticulous budgeting, keeps a pragmatic safety mindset,
    yet often forgets to charge their phone after a day on the trail.
background:
  cultural: Mario grew up in a working‑class family in the Missoula area, descending from northern European settlers (German, Irish, and Scandinavian) typical of Montana’s white population. The region’s
    rugged frontier spirit, self‑reliance, and close‑knit community values shaped his practical outlook and deep appreciation for the natural environment. He was raised with a mix of traditional Midwestern
    work ethics and the progressive, outdoors‑focused culture of western Montana, which emphasizes hard work, hospitality, and community involvement. This background informs his collaborative yet assertive
    approach at work and his commitment to local volunteer initiatives.
attributes:
  skills: '[''Residential wiring'', ''Commercial electrical troubleshooting'', ''NEC and Montana code compliance'', ''Solar PV installation'', ''Smart home automation'', ''HVAC system wiring'', ''Blueprint
