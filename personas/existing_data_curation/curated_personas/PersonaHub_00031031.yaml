persona_description: A Peruvian archaeologist who specializes in the excavation and study of ancient Peruvian sites, particularly those in the Andes foothills. She is a senior adviser to Peru's National
  Culture Institute and has led several excavations in the Sechin Bajo archaeological complex. Her expertise includes carbon dating, archaeology, and the study of ancient ceremonial sites. She is also a
  vocal advocate for the preservation and protection of Peru's cultural heritage.
