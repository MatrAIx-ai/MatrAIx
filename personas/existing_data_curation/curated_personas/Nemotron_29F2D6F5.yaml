personas:
  professional: A seasoned grocery store cashier with over fifteen years of experience, Jane Wood blends meticulous cash handling and conflict‑resolution expertise with a curious, community‑focused mindset,
    positioning themselves for a shift‑supervisor role while dreaming of an art‑supply boutique that doubles as a local creativity hub.
  sports: Jane Wood finds fitness in community line‑dancing at the summer festival and occasional Saturday morning jogs, cheers for the Chicago Bears and the Chicago Cubs, and participates in the local
    YMCA’s recreational softball league, blending social motion with modest athletic competition.
  arts: Jane Wood frequents the Peoria Riverfront Museum and the local Victoria Art Gallery, draws inspiration from Monet and Frida Kahlo for their watercolor landscapes, enjoys listening to folk singer
    Bob Dylan while sketching, and contributes backstage to the Victoria Community Theatre’s productions, weaving visual art into daily life.
  travel: Jane Wood prefers modest road trips that combine scenic farm‑state routes with cultural stops, having explored Chicago’s art districts, a weekend in St. Louis for the blues scene, and dreaming
    of a spring visit to Paris’s Montmartre to study impressionist studios, all while budgeting travel around a modest family allowance.
  culinary: Jane Wood delights in farm‑to‑table cooking, tossing garden‑fresh tomatoes, basil, and heirloom carrots into a rustic bruschetta, perfecting a sourdough starter for weekly loaves, and occasionally
    indulging in a hearty chicken pot pie made with locally sourced potatoes and rosemary, showcasing both Midwestern comfort and artistic flair.
  core: Jane Wood balances meticulous cash‑register precision with spontaneous watercolor splashes, worries about future steps but always finds joy in line‑dancing and garden‑fresh meals.
background:
  cultural: Jane grew up in Victoria, a small town in Knox County, Illinois, within a white family of German and Irish descent. Her upbringing reflected classic Midwestern values—hard work, modesty, and
    a strong sense of community. While she cherishes local traditions such as town fairs, church gatherings, and rural family meals, her curiosity has exposed her to diverse cultural experiences through
    art, literature, and travel. This blend of traditional Midwestern roots and an openness to new ideas shapes her worldview and daily life.
