  hobbies: '[''Visiting art galleries and museums'', ''Sketching and watercolor painting'', ''Reading (fiction and non-fiction)'', ''Book club participation'', ''Community theatre attendance'', ''Volunteering
    at local festivals'', ''Gardening'', ''Cooking and baking'', ''Listening to podcasts on philosophy and science'', ''Social dancing (e.g., line dancing)'']'
  career_goals: Jane aims to advance within retail by first becoming a shift supervisor and eventually a store manager, leveraging her reliable work ethic and leadership potential. She plans to complete
    her GED within the next year to broaden her career options. Long‑term, Jane dreams of merging her love for art with entrepreneurship by opening a modest art‑supply boutique or community art space that
    can host workshops and local exhibitions. Additionally, she is interested in transitioning to a community‑center coordinator role where she can apply her event‑planning and outreach experience to serve
    her town’s cultural activities.
