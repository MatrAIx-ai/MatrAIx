  career_goals: In the short term, Angie aims to earn industry‑recognized certifications such as OSHA 30‑hour, HVAC specialist, and EPA refrigerant handling. She plans to complete her associate’s degree
    in facilities management while gaining promotion to lead technician. Long‑term, she envisions becoming a facilities manager for a school district or healthcare facility, overseeing large‑scale maintenance
    operations and implementing energy‑efficiency upgrades. Ultimately, she hopes to launch her own community‑focused repair service that integrates green technologies and provides training opportunities
    for other young workers.
