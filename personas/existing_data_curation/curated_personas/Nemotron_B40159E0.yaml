personas:
  professional: Angie Urrutia, a hands‑on facilities technician, blends meticulous safety protocols with a curiosity for sustainable repair technologies, applying her mechanical, electrical, and plumbing
    expertise while thriving in collaborative, community‑focused projects.
  sports: Angie Urrutia spikes for a co‑ed volleyball league, hikes the Crowders Mountain trails each weekend, and roots for the Charlotte Hornets while occasionally joining a local ultimate frisbee pickup
    group.
  arts: Angie Urrutia rhythmically sways to salsa and bachata tracks by Marc Antonio, Shakira, and Celia Cruz, attends live Latin jazz nights at the Charlotte Music Factory, and channels the music’s vibrancy
    into her DIY home improvement projects.
  travel: Angie Urrutia has road‑tripped to Asheville and Savannah, explores the Appalachian trail system, and dreams of eco‑tourism adventures in Costa Rica’s rainforests, preferring budget‑friendly hostels
    and group travel with friends to balance cost and community connection.
  culinary: Angie Urrutia lovingly prepares arroz con pollo, beef‑and‑olive empanadas, and a zesty mango‑avocado salsa seasoned with cilantro, jalapeño, and lime, often experimenting with sustainable cooking
    techniques like low‑waste meal prep.
  core: Angie Urrutia is a socially energetic, tool‑savvy twenty‑year‑old who balances community‑centric DIY projects with a love for Latin dance, sustainable tech, and a habit of over‑planning her next
    certification despite occasional budget splurges.
background:
  cultural: Angie is a second‑generation Mexican‑American raised in a bilingual household in Laurel Hill, NC. She grew up speaking both Spanish and English, celebrating traditions such as Día de los Muertos,
    Cinco de Mayo, and family gatherings centered around shared meals. Her cultural identity emphasizes close family ties, respect for elders, and a strong sense of community, which informs her collaborative
    work style and her commitment to helping others.
