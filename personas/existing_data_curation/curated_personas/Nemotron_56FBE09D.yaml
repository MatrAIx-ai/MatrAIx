personas:
  professional: Mark Cornell, a 21‑year‑old retail associate with an associate’s degree in business, leverages his meticulous cash‑handling, inventory tracking, basic accounting, and process‑improvement
    skills to streamline store operations while quietly aspiring to a supervisory role within the next two years.
  sports: Mark Cornell, a casual fan of the New England Patriots and the Boston Red Sox, spends Saturday mornings hiking the White Mountains with the local White Mountain Hiking Club and joins a community
    pickup soccer league at the town recreation field.
  arts: Mark Cornell, an acoustic‑guitar enthusiast, spends evenings strumming folk classics by Nick Drake and contemporary singer‑songwriters like Jason Isbell, attends occasional performances at the historic
    Rockingham County Playhouse, and crafts handmade wooden instrument stands as part of his woodworking hobby.
  travel: Mark Cornell, who prefers low‑key road trips, has explored historic sites such as Boston’s Freedom Trail and the colonial town of Portsmouth, longs to backpack through the Scottish Highlands,
    and plans a summer visit to Cape Cod to sample fresh seafood and scenic lighthouses.
  culinary: Mark Cornell, an admirer of New England comfort food, regularly cooks lobster roll with drawn butter, maple‑glazed pork chops, and classic clam chowder, while sharpening his woodworking skill
    by crafting a cedar cutting board for his kitchen.
  core: Mark Cornell, a 21‑year‑old organized introvert, balances his love of solitary curiosity—historical reading, guitar practice, and model‑kit assembly—with a practical drive to climb the retail ladder,
    save earnestly for a future boutique, and maintain a steady routine of hiking, woodworking, and community volunteering.
background:
  cultural: Mark grew up in a middle‑class white family in Atkinson, a small town in Rockingham County, New Hampshire. The community’s New England values of self‑reliance, respect for the natural environment,
    and neighborly cooperation shaped his worldview. Local traditions such as town meetings, seasonal outdoor activities, and community volunteering reinforced his preference for harmony, modest social
    settings, and a practical, achievement‑oriented approach to life.
