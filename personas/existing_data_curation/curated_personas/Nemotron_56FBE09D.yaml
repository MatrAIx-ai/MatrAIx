  hobbies: '[''Reading historical non-fiction'', ''Hiking'', ''Woodworking'', ''Playing acoustic guitar'', ''Model building'', ''Board gaming with small groups'', ''Volunteering at a food pantry'']'
  career_goals: Mark aims to leverage his disciplined work ethic to move into supervisory roles, targeting a store manager position within the next two to three years. He plans to continue his education
    toward a bachelor's in Business Administration, with the longer‑term ambition of managing multiple locations or eventually launching his own small retail venture that blends his interest in local New
    England products with his strong organizational skills.
