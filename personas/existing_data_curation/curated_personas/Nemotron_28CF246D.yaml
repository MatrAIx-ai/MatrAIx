  career_goals: Tabitha dreams of channeling her imagination into a career that merges art and technology. She hopes to attend a specialized high school focused on visual arts and eventually study interactive
    media or game design at the collegiate level. Her long-term goal is to become a game developer or multimedia artist, creating immersive worlds that invite others to explore. She also envisions publishing
    a graphic novel series and possibly leading community workshops that encourage other kids to blend creativity with tech.
