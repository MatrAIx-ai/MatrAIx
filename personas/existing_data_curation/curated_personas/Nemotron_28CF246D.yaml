personas:
  professional: An aspiring digital artist and budding game developer, Tabitha Lamb channels their vivid imagination, disciplined organization, and outgoing energy into sketching detailed characters, creating
    whimsical Scratch games, and they collaborate with friends on their Instagram art feed.
  sports: Tabitha Lamb enjoys after‑school soccer with the local youth league, follows the Los Angeles Lakers and New York Yankees on TV, mixes daily bike rides with occasional weekend hikes in nearby state
    parks, and they view fitness as a playful adventure.
  arts: Tabitha Lamb immerses themselves in creative expression by drawing inspiration from Studio Ghibli films, listening to Taylor Swift’s storytelling lyrics, playing folk tunes on their ukulele, and
    they bring this same enthusiasm to school drama productions that echo the theatrical flair of Lin‑Manuel Miranda.
  travel: Tabitha Lamb prefers short, adventure‑filled road trips to places like the Grand Canyon and Kyoto’s historic temples, planning itineraries with friends on Google Maps, while they dream of a future
    exchange program in Sweden to explore Nordic design and folklore.
  culinary: Tabitha Lamb’s palate favors homemade ramen with miso broth, veggie tacos with fresh cilantro, and experimental matcha cupcakes, and they enjoy experimenting in the kitchen despite occasional
    burnt toast.
  core: Tabitha Lamb is a hyper‑creative, socially magnetic teen who blends imagination with organized hustle, often juggling art projects, code, and garden volunteerism, yet they sometimes procrastinate
    on schoolwork in favor of midnight sketch marathons.
background:
  cultural: Tabitha grew up in Enola, a small community in Cumberland County, Pennsylvania. Her family belongs to the region's typical middle-class, white American demographic, with roots in the broader
    mid-Atlantic culture. She experiences a blend of suburban life—attending a public middle school, participating in local events such as the Enola Fair, and enjoying the nearby historic sites and farmlands.
    While her household reflects mainstream American customs, she is also acquainted with the state's Pennsylvania Dutch heritage, evident in community festivals and local cuisine. The cultural environment
    values education, community involvement, and a love of sports and outdoor recreation, all of which shape Tabitha's worldview and interests.
