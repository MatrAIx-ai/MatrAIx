  career_goals: Kimberly aims to move into a supervisory role within the casino security department, eventually becoming a Security Operations Manager overseeing multiple surveillance teams. She plans to
    earn the Physical Security Professional (PSP) certification and pursue a master's degree in criminology or emergency management to broaden her strategic expertise. Long‑term, she envisions developing
    a proprietary training program that blends her educational background with practical security drills, positioning herself as a regional trainer and consultant for gaming establishments throughout North
    Texas.
