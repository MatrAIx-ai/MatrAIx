  career_goals: Although still very young, Julia frequently imagines herself in caring, organized roles. She talks about wanting to become a teacher or a librarian when she grows up, describing how she
    would help children find books, keep a quiet space, and share knowledge. Her ambitions are shaped by her desire to create harmonious environments and to support others in learning, echoing her kind
    and methodical personality.
