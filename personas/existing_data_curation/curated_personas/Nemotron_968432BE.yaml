personas:
  professional: A 38‑year‑old retail supervisor, Nicole Yannucci drives top‑5% district sales through meticulous scheduling, data‑driven inventory control, and eye‑catching visual merchandising, while coaching
    her team with a competitive yet pragmatic leadership style.
  sports: An early‑morning runner, Nicole Yannucci logs 5‑10 km runs along the Sabine River, participates in the Houston Half Marathon, practices yoga thrice weekly, and follows the Dallas Cowboys and Houston
    Astros, balancing competitive training with mindfulness.
  arts: A culturally curious enthusiast, Nicole Yannucci enjoys strategic board games like chess and Settlers of Catan, attends local art fairs featuring contemporary painters, streams the music of Lila
    Downs and Carlos Santana, and reads works by Malcolm Gladwell and David McCullough for both inspiration and relaxation.
  travel: A methodical planner, Nicole Yannucci prefers weekend road trips to Austin’s music scene, the culinary delights of San Antonio, and the vineyards of Napa, while dreaming of a cultural immersion
    tour of Barcelona’s architecture and Oaxaca’s vibrant markets.
  culinary: An inventive home cook, Nicole Yannucci experiments with healthy Tex‑Mex dishes such as quinoa‑infused chicken fajitas, black‑bean enchiladas, and fresh guacamole flavored with cilantro and
    lime, regularly sourcing local avocados and heirloom tomatoes for vibrant meals.
  core: A competitively disciplined retail leader who runs at sunrise, plays chess before bedtime, obsessively tracks spreadsheets, and can’t start the day without a double espresso.
background:
  cultural: Nicole grew up in a middle‑class family in the greater Houston area, with a blend of Southern Texas culture and an Italian lineage suggested by her surname. Raised primarily in a Protestant
    environment, she values hard work, self‑reliance, and community hospitality that characterize Texan life. The multicultural fabric of Conroe exposed her to a wide range of customers, prompting her to
    develop basic conversational Spanish for better service. Family traditions include Italian holiday meals and occasional trips to Italy, which have fostered an appreciation for diverse cuisines and a
    respect for heritage. This cultural mix informs her pragmatic yet curious outlook, her disciplined approach to both work and personal pursuits, and her competitive spirit tempered by a sense of community
    responsibility.
attributes:
