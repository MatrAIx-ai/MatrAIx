  hobbies: '[''running'', ''yoga'', ''cooking'', ''reading business and self-improvement books'', ''DIY home projects'', ''gardening'', ''attending local live music events'', ''strategic board games like
    chess and Settlers of Catan'', ''volunteering at community food drives'']'
  career_goals: Nicole aims to move from first‑line supervisor to store manager within the next two years, leveraging her disciplined performance record to achieve top‑5% sales rankings in her district.
    She plans to pursue a bachelor’s degree in business administration, followed by an MBA part‑time, to broaden her strategic acumen. Long‑term, she aspires to become a district manager overseeing multiple
    stores, and eventually transition into a corporate retail operations role where she can shape company‑wide policies on training, loss prevention, and customer experience. Nicole also harbors a personal
    ambition to launch a boutique that blends curated fashion with community‑focused events, reflecting her competitive drive and entrepreneurial curiosity.
