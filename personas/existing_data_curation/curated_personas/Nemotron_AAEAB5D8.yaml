personas:
  professional: Lisa Kriska, an aspiring mini‑architect of block towers, demonstrates early spatial reasoning and an uncanny knack for organizing their playroom, applying their love for structure and predictability
    to building projects.
  sports: Lisa Kriska, a budding soccer enthusiast, plays for the Sunshine Little Kickers league, enjoys organized drills and makes sure their tiny sneakers are always tied, reflecting their love of structure.
  arts: Lisa Kriska, an enthusiastic fan of The Wiggles and Sesame Street, spends afternoons painting rainbows with Crayola crayons, and can recite the alphabet song with perfect rhythm, showing their moderate
    talkativeness in group settings.
  travel: Lisa Kriska, a small‑scale explorer, adores planned trips to Disneyland and weekend beach outings with family, preferring itineraries printed on colorful maps to guide their adventures.
  culinary: Lisa Kriska, a picky eater turned junior chef, loves mac and cheese, strawberry smoothies, and helps stir pancake batter with a wooden spoon, but stubbornly refuses peas.
  core: Lisa Kriska blends a love for tidy routines with a calm curiosity, turning everyday play into structured adventures while quietly navigating social moments with a gentle assertiveness.
background:
  cultural: Lisa comes from a White Midwestern family in Columbus, Ohio. Her household celebrates common American holidays such as Thanksgiving, Christmas, and Easter, and incorporates family traditions
    like Sunday meals and community events at the local church or community center. The family values routine, punctuality, and participation in neighborhood activities, which reinforces Lisa's preference
    for structure. Exposure to Columbus's public libraries, preschool programs, and the city's green spaces gives her a sense of belonging to a supportive, culturally diverse community while maintaining
    a stable, predictable environment.
