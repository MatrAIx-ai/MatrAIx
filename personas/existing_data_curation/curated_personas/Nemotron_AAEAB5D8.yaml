  career_goals: Although she is only four, Lisa enjoys imagining future roles that involve caring for others and using her love of order. She often says she wants to be a teacher so she can help children
    learn and keep the classroom organized, and she also dreams of working with animals as a veterinarian because she feels compassionate toward pets. In the near term, she aims to learn to write her name
    neatly, master counting to twenty, and help her parents with simple household tasks, building a foundation for her long-term goal of a helping profession that combines structure and compassion.
