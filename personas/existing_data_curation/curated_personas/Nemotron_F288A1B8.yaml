personas:
  professional: An experienced woodworker named Tanner Johnson blends meticulous hand joinery with abstract design concepts, consulting small‑scale clients to craft bespoke cabinetry and sculptural furniture
    while nurturing a modest apprenticeship program and planning a boutique studio that showcases reclaimed hardwoods.
  sports: A low‑key fitness enthusiast named Tanner Johnson enjoys weekend hikes through the Pine Barrens, plays occasional pickup basketball at the local rec center, roots for the Jersey Shore BlueClaws
    minor‑league baseball team, and belongs to a community bowling league that meets every Thursday night.
  arts: An abstract painter and garage‑studio jazz guitarist, Tanner Johnson draws inspiration from Jackson Pollock’s drip technique, channels Miles Coltrane’s improvisational spirit on a vintage Fender
    Stratocaster, and curates a small personal collection of scientific‑fiction cover art to fuel creative woodwork designs.
  travel: A methodical planner disguised as a spontaneous wanderer, Tanner Johnson prefers weekend road trips to rustic cabins in the Adirondacks, has visited the historic shipyards of Mystic, Connecticut,
    and keeps a wish list that includes the moss‑covered forests of Yakushima, Japan, and the volcanic landscapes of Iceland for future inspiration.
  culinary: A farm‑to‑table home cook, Tanner Johnson relishes preparing rosemary‑roasted carrots, pan‑seared trout with lemon‑dill butter, and a hearty mushroom risotto, often harvesting fresh herbs from
    their modest vegetable garden and pairing meals with a glass of locally brewed amber ale.
  core: Tanner Johnson is a 48‑year‑old imaginative woodworker who balances a love of abstract art and sustainable craftsmanship with a laid‑back approach to finances, health, and community involvement,
    often overlooking details but never losing his creative spark.
background:
  cultural: Tanner grew up in a modest, predominantly white, suburban‑rural community in Gloucester County, New Jersey. His family valued self‑reliance, hard work, and a practical approach to life, traits
    common in the region’s mid‑20th‑century working‑class culture. He was exposed early to American folk craftsmanship through local carpentry shops and community fairs, which nurtured his appreciation
    for handmade objects. While his formal education ended before high‑school graduation, he absorbed a wealth of informal knowledge from mentors, trade magazines, and the regional tradition of do‑it‑yourself
    projects. This background, combined with the eclectic cultural mix of New Jersey’s artisan scene, informs his respect for sustainable sourcing, a laid‑back work ethic, and an affinity for small‑group
    collaborations that honor both individual creativity and community heritage.
