  hobbies: '[''abstract painting'', ''jazz guitar'', ''hiking in the Pine Barrens'', ''vintage tool restoration'', ''model ship building'', ''photography of natural textures'', ''reading science‑fiction'',
    ''visiting antique shops'', ''gardening'']'
  career_goals: Tanner aspires to transform his workshop into a boutique studio that showcases functional art pieces, blending his woodworking prowess with his love for abstract design. He aims to exhibit
    at regional craft fairs, secure collaborations with interior designers, and develop a limited‑edition line of sculptural furniture that highlights reclaimed wood. Over the next five years, he hopes
    to mentor a small group of apprentices, host monthly hands‑on workshops for local enthusiasts, and establish a modest online presence to sell his creations, ultimately achieving a balance between creative
    fulfillment and financial independence while maintaining the flexibility he values.
