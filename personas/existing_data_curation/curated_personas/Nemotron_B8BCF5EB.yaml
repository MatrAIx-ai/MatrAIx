  career_goals: Ketsana aims to transition from a freelance therapist to the owner of a structured wellness studio in Orange County, offering a suite of therapeutic services including clinical massage,
    rehabilitation support, and guided mindfulness sessions. She plans to obtain advanced certifications in clinical and orthopedic massage to expand her scope of practice and to collaborate with local
    physicians for referral‑based care. A long‑term ambition is to develop a mentorship program for newly licensed therapists, fostering a supportive yet disciplined learning environment. She also envisions
    integrating culturally relevant wellness offerings, such as traditional Vietnamese herbal compress therapy, to differentiate her practice and serve the community with a balanced, evidence‑based approach.
