  career_goals: To Kim aims to transition into selective, low‑overhead technology consulting that lets him solve data‑driven problems for small, sustainability‑focused startups while preserving his preference
    for solitary work. He plans to develop an open‑source environmental monitoring toolkit, author a technical monograph on urban climate modeling, and obtain a Certified Data Scientist credential to formalize
    his expertise. Over the next five years he hopes to mentor introverted professionals through an online community, contribute regularly to academic‑industry publications, and achieve a modest, stable
    freelance income that supports his family and personal projects without requiring extensive social interaction.
