  hobbies: '["gardening", "reading classic literature", "book club participation", "crossword puzzles", "jigsaw puzzles", "museum visits", "guided historic tours", "gentle senior yoga", "genealogy research",
    "volunteering at the library"]'
  career_goals: Although retired, Jeannette aims to continue contributing to her community by curating oral history projects that capture the experiences of Palo Alto senior residents. She aspires to publish
    a memoir reflecting on the social changes she has witnessed over eight decades, and to mentor younger volunteers in historical preservation. She also hopes to support local arts by organizing intergenerational
    exhibitions that blend traditional crafts with contemporary media. Her ambition is to leave a lasting legacy of cultural stewardship and to ensure that the stories of her generation remain accessible.
