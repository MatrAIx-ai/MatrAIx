  career_goals: Michael aims to transition from his current dispensing role to owning a boutique optical studio that merges his technical precision with his artistic sensibility, offering bespoke frames
    and personalized vision solutions for a niche clientele. He aspires to become a regional authority on innovative lens designs, publishing articles and presenting at Pacific Northwest optometric conferences.
    He also envisions developing a line of handcrafted wooden frames that reflect Tokeland’s coastal character. While valuing independence and flexible schedules, he hopes to mentor a small number of apprentices
    in a one‑on‑one setting, balancing his competitive drive with his preference for solitude.
