personas:
  professional: Michael Sweeting, a seasoned optical dispenser with a masterful eye for lens precision and handcrafted frame design, channels their solitary imagination and spontaneous curiosity into bespoke
    vision solutions while often grappling with organization and tight deadlines.
  sports: Michael Sweeting, a Pacific Northwest aficionado of low‑key fitness, spends mornings kayaking with the Pacific Northwest Kayak Association, follows the Seattle Seahawks and Seattle Sounders for
    the thrill of game day, and hikes coastal trails in the summer to counterbalance their desk‑bound optical work.
  arts: Michael Sweeting, whose artistic soul is nourished by the ethereal lightscapes of James Turrell, the ambient harmonies of Brian Eno, and the speculative worlds of Philip K. Dick, channels this inspiration
    into both their astrophotography and handcrafted wooden frames.
  travel: Michael Sweeting, a solitary wanderer with a penchant for foggy coastlines, has photographed the aurora over Iceland, trekked the night skies of New Zealand’s Aoraki region, and dreams of an extended
    stay in Chile’s Atacama Desert to capture unrivaled star fields, always planning trips months in advance to fit their modest budget.
  culinary: Michael Sweeting, a modest home chef who favors Pacific seafood, often prepares cedar‑plank salmon seasoned with dill, lemon, and a touch of honey, cooks a robust clam chowder with thyme and
    seaweed, and savors a dark‑roasted pour‑over while listening to ambient music.
  core: Michael Sweeting is a contemplative optical artisan who converts solitary curiosity into handcrafted frames and night‑sky photos, yet battles chronic worry and a tendency to procrastinate on deadlines.
background:
  cultural: Michael grew up in a modest, predominantly white, middle‑class family in the Seattle suburbs before relocating to the rural coastal community of Tokeland, WA. His upbringing reflects the Pacific
    Northwest’s blend of self‑reliance, appreciation for nature, and a DIY ethic inherited from generations of craftsmen in his family. Culturally American, he identifies with the region’s quiet, introspective
    lifestyle, valuing independence and a close connection to the maritime environment. His European‑American heritage—primarily English and Scandinavian—instills a subtle respect for tradition and a pragmatic
    work ethic.
