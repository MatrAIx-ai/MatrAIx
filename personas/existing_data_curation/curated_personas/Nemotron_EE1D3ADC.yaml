  career_goals: Approaching retirement, David aims to leave a lasting scholarly and practical legacy. His primary ambition is to author a seminal book on creative entrepreneurship that bridges business
    theory with artistic practice, thereby influencing both academic discourse and local cultural economies. He plans to establish a small interdisciplinary research hub at his university that supports
    faculty and students exploring the business of the arts, securing external funding through competitive grants. Additionally, David seeks to mentor a new generation of business educators, transition
    to an emeritus role that includes advisory responsibilities for regional economic development initiatives, and continue presenting at national conferences to stay at the forefront of evolving business
    thought.
