  hobbies: '[''Oil Painting'', ''Visiting Art Galleries'', ''Reading Contemporary Nonfiction'', ''Chess'', ''Hiking in State Parks'', ''Photography'', ''Traveling to Cultural Festivals'', ''Cooking Experimental
