personas:
  professional: David Alkishawi is a veteran business professor known for blending data‑driven strategic management with a creative lens on entrepreneurship, designing courses that weave art‑market case
    studies while mentoring local start‑ups; he approaches his work methodically, never missing a deadline, and welcomes spirited scholarly debates as he nears retirement and builds a legacy of interdisciplinary
    research.
  sports: David Alkishawi follows Michigan sports with devotion, cheering the Detroit Lions on Sundays, the Michigan Wolverines during football season, and playing weekly pick‑up golf at the local senior
    club; he also hikes the Porcupine Mountains and channels his competitive spark into regular chess matches at the senior center, where he strategizes like a seasoned player.
  arts: David Alkishawi immerses himself in the visual arts, painting oil canvases inspired by the tonal realism of Edward Hopper and the bold abstractions of Gerhard Richter, regularly attending exhibitions
    at the Museum of Contemporary Art Detroit and performing acoustic renditions of Bob Dylan songs at community open‑mic nights, while his photography captures the sunrise over Lake Michigan in the style
    of Ansel Adams.
  travel: David Alkishawi favors purposeful road trips that blend cultural immersion and natural scenery, having driven the Great Lakes Circle Tour, explored the galleries of the Art Institute of Chicago,
    and taken a pilgrimage to Florence to study Renaissance workshops; his future itinerary includes a week‑long retreat in the Adirondacks and a spring visit to the Cherry Blossom Festival in Washington,
    D.C.
  culinary: David Alkishawi loves experimental cooking, often whipping up a smoked perch dish with fresh dill and lemon zest for family gatherings, crafting his own Detroit‑style pizza crust with cornmeal,
    and experimenting with heirloom tomato sauces infused with rosemary and smoked paprika, all while modestly rating his culinary successes on a private blog.
  core: David Alkishawi is a meticulous professor‑mentor who fuses Midwestern pragmatism with artistic curiosity, channels his competitive streak into chess and grant pursuits, and balances disciplined
    finance with occasional creative culinary splurges.
background:
  cultural: David was raised in a small Midwestern town in Michigan, growing up in a white family with Irish and English ancestry. His upbringing blended traditional Midwestern values—such as self‑reliance,
    modesty, and a strong work ethic—with a deep respect for education and civic involvement. The local community’s emphasis on seasonal festivals, family reunions, and the celebration of holidays like
    Thanksgiving shaped his appreciation for collective heritage while reinforcing personal responsibility. A Protestant background introduced regular participation in church gatherings, which fostered
    a sense of community service that later translated into his volunteer work for regional economic development. Exposure to the industrial and agricultural history of the Great Lakes region nurtured his
    interest in the practical applications of business principles, while the presence of nearby cultural institutions—small museums, community theaters, and university art programs—seeded his lifelong fascination
    with art and interdisciplinary exploration. This cultural tapestry informs his balanced worldview, integrating pragmatic Midwestern sensibilities with a curiosity for new ideas and varied experiences.
