persona_description: A psychologist or researcher who studies autism spectrum disorders, focusing on the specific challenges faced by children with autism in processing information in its context. The individual
  is likely to have expertise in experimental psychology and cognitive neuroscience, and has conducted research on visual and verbal context processing in children with autism, as well as on the generalizability
  of these findings to other domains. They may have published findings on the use of context information in tasks such as the Palmer's visual context task, Tager-Flusberg's visual and verbal semantic memory
  task, Frith and Snowling's homograph task, and other related tasks. The persona is also likely to have knowledge of the theories of central coherence and its implications for cognitive processing, and
  may have experience with the development of interventions or treatments for children with autism.
