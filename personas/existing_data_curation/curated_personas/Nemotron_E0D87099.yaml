personas:
  professional: Elizabeth Disalvo, a budding preschool play leader, channels her talkative energy into orchestrating imaginative games and picture‑book circles, preferring flexible rules over strict structure.
  sports: Elizabeth Disalvo, a playground enthusiast at Glendale’s neighborhood park, loves kicking a soccer ball, mimics the Arizona Diamondbacks mascot during play, and attends a toddler gymnastics class
    at the local community center.
  arts: Elizabeth Disalvo, a budding storyteller, sings along to Disney’s “Let It Go,” delights in finger‑painting bright swirls, and watches the community theater’s children’s productions, especially the
    lively rendition of “The Lion King,” shaping her creative spark.
  travel: Elizabeth Disalvo, an adventurous toddler, thrills to family road trips to the Grand Canyon and weekend visits to the Arizona Science Center, and dreams of a future Disney cruise after seeing
    bright maps and travel books in preschool.
  culinary: Elizabeth Disalvo, a pint‑size food explorer, adores creamy mac and cheese with extra cheddar, dips carrot sticks into ranch dressing, and eagerly helps stir pumpkin‑spice batter for Thanksgiving,
    though their enthusiastic mixing often creates a kitchen mess.
  core: Elizabeth Disalvo, a highly sociable three‑year‑old, blends boundless curiosity with a love for community gatherings, juggling multiple snack‑time projects while sometimes misplacing their favorite
    stuffed bunny.
background:
  cultural: Elizabeth is raised in a White American family in suburban Glendale, Arizona. Her household celebrates typical U.S. holidays such as Thanksgiving, Halloween, and birthdays with community gatherings
    and backyard barbecues. The family values early socialization, enrolling her in a local preschool where she interacts with a diverse group of peers. Community events at nearby parks and occasional multicultural
    activities at school expose her to a variety of foods, music, and a few Spanish words, shaping a flexible, sociable upbringing that aligns with her talkative nature.
