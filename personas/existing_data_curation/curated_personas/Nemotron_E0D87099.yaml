  hobbies: '[''singing nursery rhymes'', ''dancing'', ''playground activities'', ''crayon drawing'', ''building block towers'', ''listening to picture books'', ''role‑play with dolls'', ''exploring nature'']'
  career_goals: Even at three, Elizabeth often dreams aloud about future roles. She loves the idea of becoming a preschool teacher because she enjoys talking to other kids and sharing stories. She also
    imagines caring for animals as a veterinarian, inspired by trips to the local petting zoo. Occasionally she says she wants to be a dancer or a storyteller who leads a group of friends in songs and games,
    reflecting her sociable and attention‑loving personality.
