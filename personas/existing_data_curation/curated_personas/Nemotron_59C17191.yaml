  hobbies: '[''Reading historical fiction'', ''Herb gardening'', ''Cooking traditional Punjabi dishes'', ''Listening to classical Indian ragas'', ''Hiking local trails'', ''Knitting scarves'', ''Volunteering
    at senior center'']'
  career_goals: Tripta aims to solidify her shop as the go‑to grooming destination in Hampshire County, earning recognition at regional barber competitions for her blend of traditional craftsmanship and
    modern technique. She plans to attain an advanced certification in color theory and to incorporate a line of handcrafted hair‑care products rooted in Indian herbal knowledge. Within the next five years,
    she hopes to train a dedicated apprentice who will eventually become a partner, ensuring the shop’s continuity after her retirement while preserving her high standards of service.
