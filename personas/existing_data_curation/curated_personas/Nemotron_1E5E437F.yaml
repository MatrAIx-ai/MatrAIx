  career_goals: Although retired, Chong Ao aims to remain intellectually vibrant by sharing his expertise with the community. He plans to develop a series of workshops at the local science museum that explore
    the intersection of technology and art, mentor high‑school and college students in STEM research, and author a memoir reflecting on his career and the evolution of engineering practices. He also hopes
    to stay current with emerging technologies such as artificial intelligence, both for personal enrichment and to inform his teaching.
