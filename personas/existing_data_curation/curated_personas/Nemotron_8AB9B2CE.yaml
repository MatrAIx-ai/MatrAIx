personas:
  professional: Jeanette Cromartie, a budding community health worker‑in‑training, combines her natural empathy, conflict‑mediation talent, and Canva design skills with a laid‑back, occasionally disorganized
    approach to orchestrating neighborhood wellness events, turning her curiosity about social justice into practical outreach initiatives.
  sports: Jeanette Cromartie supports the Washington Capitals and DC United’s women’s soccer team, participates in pick‑up basketball at the local community center, and incorporates weekday evening yoga
    to stay flexible, balancing team spirit with personal wellness.
  arts: Jeanette Cromartie nurtures her creative side by frequenting open‑mic nights that feature artists like H.E.R., Anderson .Paak, and J. Cole, while her weekends are spent capturing street moments
    through photography inspired by Gordon Parks and designing flyers for community festivals with Canva.
  travel: Jeanette Cromartie favors budget‑friendly weekend trips that blend relaxation with cultural discovery, such as strolling the historic squares of Savannah, Georgia, attending the New Orleans Jazz
    & Heritage Festival, and dreaming of a future volunteer service trip to Ghana to connect with diaspora roots, all while balancing a modest student budget.
  culinary: Jeanette Cromartie delights in cooking soul‑food classics like fried chicken, collard greens, and sweet‑potato pie, often adding modern twists with quinoa, smoked paprika, or pickled jalapeños,
    and she treats friends to a Saturday night batch of peach cobbler spiced with cinnamon and ginger.
  core: Jeanette Cromartie is a 23‑year‑old community‑oriented storyteller who balances a love for soulful music, spontaneous photography, and yoga with a chronic habit of worrying over deadlines and occasionally
    letting her notebook fill with half‑finished ideas.
background:
  cultural: Jeanette is a Black woman raised in the vibrant, predominantly African‑American community of Prince George’s County. Her family’s traditions blend Southern heritage with the multicultural influences
    of the Washington, D.C. metropolitan area. She grew up celebrating Juneteenth, Kwanzaa, and family reunions centered around soulful cooking, gospel music, and church gatherings that emphasized community
    service and mutual support. The county’s strong Black middle‑class presence and local activism have shaped her perspective on racial equity and civic engagement. She frequently participates in neighborhood
    block parties, cultural festivals, and community clean‑up events, and she holds a deep appreciation for the legacy of Black resilience and creativity that informs her values and aspirations.
