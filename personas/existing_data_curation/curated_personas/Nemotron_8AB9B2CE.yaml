  hobbies: '[''Reading contemporary fiction'', ''Journaling'', ''Listening to R&B/neo‑soul and hip‑hop'', ''Attending local open‑mic nights'', ''Photography'', ''Graphic design with Canva'', ''Yoga and
    mindfulness meditation'', ''Cooking and experimenting with Southern‑inspired recipes'']'
  career_goals: Jeanette aims to complete her bachelor's degree in public health or social work while obtaining a community health worker certification. She envisions a career that blends her curiosity
    for new ideas with a practical desire to improve community well‑being. Her short‑term goal is to secure a part‑time role as a program assistant at a local nonprofit or health department, where she can
    apply her interpersonal strengths and event‑planning experience. Long‑term, she hopes to become a community outreach coordinator or a case manager, leading initiatives that promote health equity and
    provide supportive services for families in Prince George’s County. She values a flexible work environment that allows her to maintain a balanced life and reduce stress, and she seeks mentorship opportunities
    to strengthen her organizational skills.
