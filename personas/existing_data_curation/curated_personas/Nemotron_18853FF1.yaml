personas:
  professional: Harriet Hammond is a meticulous preschool builder who arranges colorful blocks into precise towers, treating playtime like a miniature engineering project and relishing the predictable patterns
    they create, often challenging friends to see whose structure stands taller.
  sports: Harriet Hammond is a beach‑loving mini athlete who joins the local Kids Swim Club at the community center, cheers for the Miami Dolphins on Sundays, and practices preschool soccer with a tiny
    goal net during fall, preferring the familiar sand to crowded gymnasiums.
  arts: Harriet Hammond is a budding artist who spends afternoons coloring beach scenes from a Crayola set, sings along to Disney classics like "Let It Go" by Idina Menzel, and attends the weekly puppet
    show at the Pompano Beach community fair, finding comfort in familiar characters like Mickey Mouse.
  travel: Harriet Hammond is an inquisitive traveler who enjoys planned trips to the family’s favorite beach at Fort Lauderdale, looks forward to annual visits to Disney World’s Magic Kingdom, and prefers
    staying in a hotel room where their bedtime routine stays unchanged.
  culinary: Harriet Hammond is a picky but enthusiastic eater who loves strawberry‑banana smoothies, chicken nuggets with honey mustard, and helps mash bananas for pancakes, yet stubbornly refuses broccoli,
    and enjoys sprinkling rainbow sprinkles on their mac & cheese.
  core: Harriet Hammond is a routine‑driven four‑year‑old who balances meticulous block‑building with playful beach trips, hoards stickers, and cautiously negotiates new experiences while clutching their
    beloved pink piggy bank.
background:
  cultural: Harriet comes from a white, Anglo‑American family living in Pompano Beach, Broward County, Florida. Her upbringing reflects mainstream U.S. cultural practices, including celebrating holidays
    such as Thanksgiving, Christmas, and Independence Day, coupled with local coastal traditions like weekend trips to the beach, enjoying fresh fruit smoothies, and attending community fairs. The family
    values routine, safety, and practical activities, which align with the region’s family‑oriented lifestyle and the subtropical environment of South Florida.
attributes:
