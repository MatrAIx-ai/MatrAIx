  career_goals: Harriet often talks about wanting to be a 'teacher' when she grows up because she likes the idea of a classroom with clear rules and a predictable schedule. She also imagines herself as
    a 'veterinarian' caring for animals she meets at the beach, and she expresses a desire to be the 'best' at everything she does in preschool, such as winning the next counting competition or having the
    most organized art display. Her goals reflect a preference for structured roles that offer order and measurable success.
