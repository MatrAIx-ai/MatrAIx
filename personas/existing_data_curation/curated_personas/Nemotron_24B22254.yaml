  career_goals: Kenichi aims to become a department chair and later an instructional coach focused on arts integration across the district. He plans to pursue a doctoral degree in Education with a specialization
    in interdisciplinary pedagogy, hoping to publish research on flexible, student‑centered learning environments. In the medium term, he wants to launch a "Humanities Lab" at his school—a collaborative
    space where students can explore connections between literature, visual art, and technology through hands‑on projects. Ultimately, he aspires to influence state curriculum policy to embed creative arts
    more deeply into core academic standards and to author a textbook on project‑based humanities education.
