persona_description: A biologist who specializes in the study of molecular biology, particularly the processes of transcription initiation and transcriptional regulation. His research interests include,
  but are not limited to, the structure and function of the transcription initiation complex, the molecular mechanisms of bacterial transcription, and the development of new antibacterial agents that function
  by inhibiting bacterial transcription. He is also interested in the structural and mechanistic similarities between the transcription machineries in bacteria and higher organisms.
