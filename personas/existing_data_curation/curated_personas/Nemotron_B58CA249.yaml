  hobbies: '[''Reading non‑fiction (productivity, psychology, personal finance)'',''Puzzle solving (Sudoku, crosswords)'',''Jogging in local parks'',''Board‑game nights with a small group of friends'',''DIY
    electronics and software tinkering'',''Volunteering at the public library (event organization)'']'
  career_goals: Michael aims to deepen his administrative expertise by earning a Certified Administrative Professional (CAP) credential and completing community college courses in business administration.
    Over the next five years, he envisions progressing from a secretary role to an office manager position, where he can lead a small team, design efficient office procedures, and contribute to strategic
    planning. He is also interested in exploring virtual assistance opportunities that would allow him to apply his organizational strengths to a broader client base while maintaining a balanced work‑life
    schedule.
