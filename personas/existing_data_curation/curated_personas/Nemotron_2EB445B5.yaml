  career_goals: Jenny aims to advance to a senior director role overseeing a portfolio of mixed‑use properties in the Greater Philadelphia area, where she can integrate sustainable practices and community‑focused
    programming. She plans to earn the Certified Property Manager (CPM) and Certified Commercial Investment Member (CCIM) designations to deepen her strategic and investment expertise. Long‑term, she envisions
    launching her own boutique property‑management firm that emphasizes resident well‑being, cultural enrichment, and environmentally responsible operations. Mentoring emerging property managers and championing
    inclusive community initiatives are also central to her professional aspirations.
