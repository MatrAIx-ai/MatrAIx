  career_goals: John aims to leverage his expertise by establishing a community tutoring network for at‑risk youth in Montgomery County, focusing on structured, measurable outcomes. He aspires to author
    a practical guide on culturally responsive teaching that blends his academic background with real‑world classroom strategies. While remaining selective about formal employment, he is interested in part‑time
    consulting roles that allow him to influence school policy on equity and inclusion, and he hopes to serve on the local school board to advocate for sustainable, data‑informed reforms.
