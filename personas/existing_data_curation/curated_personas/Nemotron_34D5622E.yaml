personas:
  professional: John Boston is a veteran curriculum developer and instructional designer who leverages meticulous organization, data‑driven assessment expertise, and precise LMS integration to build structured,
    measurable learning programs while they quietly champion equity through solo grant writing and mentorship.
  sports: John Boston stays fit through solitary early‑morning walks along Takoma Park’s Sligo Creek Trail and a disciplined weekend routine of light resistance training, while they quietly root for the
    Washington Capitals during the hockey season and occasionally join a pickup tennis match at the Bethesda Community Center.
  arts: John Boston finds solace in listening to Miles Davis and B.B. King on vinyl while drafting reflective essays, and they regularly attend the Takoma Park Arts and Crafts Festival to admire local woodcarvers,
    as well as revisiting biographies by David McCullough for intellectual enrichment.
  travel: John Boston prefers meticulously planned week‑long historical tours, having explored colonial Williamsburg and Savannah’s historic districts, while they eye a future solo trip to Kyoto’s temples
    to blend quiet contemplation with their love of history.
  culinary: John Boston, an adept home chef, favors farm‑to‑table meals such as roasted vegetable ratatouille and herb‑crusted salmon seasoned with fresh rosemary from their garden, and they indulge in
    regular visits to the Takoma Park Farmers Market for heirloom tomatoes and artisanal cheeses.
  core: John Boston blends a scholar’s precision with a craftsman’s patience, channeling solitary woodwork and disciplined data‑driven teaching into a quiet crusade for equity, even as they hoard unfinished
    projects and resist spontaneous social events.
background:
  cultural: John’s cultural identity is rooted in the African American experience of the Mid‑Atlantic region, shaped by the civil‑rights legacy of Washington, D.C., and the vibrant community of Montgomery
    County. He values education as a cornerstone of empowerment, a belief reinforced by family traditions that emphasized scholarly achievement and community service. While he prefers quiet, he honors his
    heritage by participating in local Juneteenth celebrations, supporting soul‑food cooking gatherings with close family, and engaging with community history projects that preserve the stories of Black
    residents in Takoma Park.
