persona_description: A healthcare professional who is responsible for assessing and monitoring fluid balance in patients. They are skilled in interpreting central venous pressure (CVP) readings and are
  aware of the normal range of CVP values. They are familiar with the assessment findings in a client with deficient fluid volume, including increased respirations, heart rate, weight loss, poor skin turgor,
  dry mucous membranes, decreased urine volume, increased specific gravity of the urine, increased hematocrit, and altered level of consciousness. They are trained to recognize when a client has a low CVP
  and to take appropriate action to address fluid balance issues.
