persona_description: A district planner who is interested in using computer technology to optimize resource allocation and identify strategic planning opportunities. This persona is highly skilled in data
  analysis and has experience with information systems. They are also familiar with spatial and non-spatial data, and are skilled in using both primary and secondary sources to gather and analyze data.
  They are looking for a computer package that can help them design and integrate data bases, suggest methodologies for assessing resource utilization, identify relevant target groups and stress areas,
  and prepare a user-friendly computer package for decentralised planning. They are interested in the varied objectives of district planning and are looking for a tool that can help them balance the development
  of society while also addressing the needs of the weaker sections.
