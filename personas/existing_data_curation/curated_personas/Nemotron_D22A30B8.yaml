  career_goals: He aims to transition into a lead software architect role within a midsize tech firm that values remote work and community impact. Jose wants to design scalable, user‑friendly systems that
    support small businesses and non‑profits in Idaho, leveraging cloud services and open‑source tools. Over the next five years, he hopes to lead a small, self‑directed team, mentor new engineers, and
    eventually launch a socially‑focused tech startup that offers low‑cost digital solutions for underserved communities, all while preserving a flexible schedule that accommodates his preference for solitude
    and family time.
