persona_description: A sociologist who specializes in the study of social history, particularly the role of communication technology in shaping social structures and practices. Their research interests
  include the history of telephony in Turkey, the impact of communication technology on social struggles, and the appropriation of technology by individuals to assert their agency and participate in the
  making of the modern. They are likely to be interested in the intersection of social history and communication studies, and their work is likely to be informed by a deep understanding of the history of
  Turkey and its impact on its people.
