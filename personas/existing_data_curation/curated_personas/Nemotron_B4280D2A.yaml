personas:
  professional: Gabriel Vidal, a veteran HVAC engineer whose 35‑year career spans complex refrigeration diagnostics, ductwork layout, and smart‑home integration, applies methodical planning and imaginative
    curiosity to devise eco‑friendly retrofits that honor historic architecture, while fostering a cooperative, bilingual apprenticeship program.
  sports: Gabriel Vidal follows the Chicago Cubs in spring, the Bulls in winter, and the Blackhawks during hockey season, participates in a neighborhood senior walking club and the local bocce league for
    low‑impact exercise, and blends his methodical approach to health with daily garden chores, while occasionally joining a weekend bowling league with fellow hobbyists.
  arts: Gabriel Vidal’s artistic life revolves around watercolor sessions inspired by coastal Mexican vistas, an avid appreciation for Frida Kahlo’s vibrant storytelling, regular visits to Chicago’s Museum
    of Contemporary Art to see works by artists like Kerry James Marshall, and evenings listening to Lila Downs while devouring speculative fiction by N.K. Jemisin.
  travel: Gabriel Vidal plans trips with the precision of an HVAC load calculation, favoring culturally rich destinations such as Oaxaca’s Day of the Dead celebrations, the historic vineyards of Napa Valley,
    and weekend road‑trips to Door County’s lakefront festivals, while budgeting carefully for occasional pilgrimages to the Baja Peninsula’s coastal art colonies.
  culinary: Gabriel Vidal, a proficient cook, expertly prepares mole poblano with ancho chilies, epazote, and toasted sesame seeds, crafts hand‑made corn tortillas for carnitas, and incorporates fresh garden
    cilantro and oregano into every dish, while delighting neighbors with weekly communal meals that pair Mexican street‑food flavors with his own experimental twists.
  core: Gabriel Vidal is a methodical HVAC master who fuses technical expertise with a vibrant artistic soul, and they nurture community through sustainable retrofits, watercolor landscapes, and shared
    meals.
background:
  cultural: Gabriel was raised in a bilingual Mexican‑American household, where Spanish and English were spoken interchangeably and Mexican traditions were cherished. He grew up celebrating Día de los Muertos,
    enjoying family gatherings centered around homemade Mexican cuisine, and participating in Catholic rituals common in his community. Living in the Chicago area, he remains active in the local Mexican-American
    community, attending cultural festivals, supporting Mexican-owned businesses, and volunteering at community centers that offer bilingual services. His heritage instills values of respect, hospitality,
    and communal solidarity, which shape his considerate and cooperative interactions at work and in social settings. Gabriel blends these cultural influences with Midwestern sensibilities, often incorporating
    Mexican artistic motifs into his paintings and sharing traditional recipes with friends and neighbors.
attributes:
  skills: '[''HVAC installation and maintenance'', ''Refrigeration system diagnostics'', ''Electrical wiring and controls'', ''Load calculation and system design'', ''Energy efficiency retrofitting'', ''Smart
