  hobbies: '[''Watercolor painting'', ''Reading science fiction'', ''DIY smart home projects'', ''Cooking Mexican cuisine'', ''Attending local art exhibitions'', ''Community volunteering'', ''Gardening'',
    ''Ham radio (amateur radio)'', ''Photography'', ''Walking in nature'']'
  career_goals: As he approaches retirement, Gabriel aims to deepen his expertise in sustainable HVAC practices by obtaining an Advanced Energy Efficiency Certification and becoming a recognized green‑technology
    specialist. He plans to mentor a new generation of technicians through formal apprenticeship programs and community workshops. Gabriel also hopes to launch a part‑time consulting service focused on
    energy‑saving retrofits for historic homes in the Chicago area, blending his technical skill set with his creative flair for innovative design. Ultimately, he envisions contributing to industry standards
    committees and advocating for environmentally responsible heating and cooling solutions.
