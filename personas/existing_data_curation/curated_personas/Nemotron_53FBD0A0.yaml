  career_goals: Suzanne aims to transition into a senior engineering leadership role within the next five years, ultimately becoming a Director of Engineering or VP of Product Development. She plans to
    deepen her expertise in cloud architecture and obtain a professional certification such as AWS Certified Solutions Architect – Professional. She also intends to pursue an MBA part‑time to strengthen
    her strategic and business acumen, allowing her to drive large‑scale product initiatives and mentor emerging talent, especially women and underrepresented groups in tech. Long‑term, she envisions launching
    her own tech startup focused on sustainable software solutions for small businesses.
