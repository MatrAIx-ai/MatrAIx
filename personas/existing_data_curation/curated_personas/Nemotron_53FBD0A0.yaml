personas:
  professional: Suzanne Malone is a full‑stack software engineer who leverages Python, Java, JavaScript, React, and Django to deliver cloud‑native solutions on AWS and Azure, thrives in Agile Scrum environments
    as a certified Scrum Master, and channels their methodical, organized approach into leading cross‑functional teams while translating technical work into clear business value.
  sports: Suzanne Malone rides the Pacific in surf sessions at Oceanside, competes in a local beach‑volleyball league, hikes the Torrey Pines bluffs with the Torrey Pines Trail Runners, and roots for the
    San Diego Padres while cheering on the LA Lakers, mixing seasonal outdoor pursuits with structured fitness routines they log on Strava.
  arts: Suzanne Malone captures sunrise panoramas along the coast with a Canon EOS R, draws inspiration from Ansel Adams and contemporary photographer Chris Burkard, curates a living playlist featuring
    Bon Iver, Tame Impala, and recent indie‑folk releases, and visits the La Jolla Museum of Art to unwind, allowing visual and auditory creativity to inform the precision they bring to code.
  travel: Suzanne Malone plans trips with the same checklist mindset they use at work, favoring weekend surf getaways to Santa Cruz, week‑long cultural immersion trips to Kyoto during cherry‑blossom season,
    and dreaming of an Iceland adventure to chase the Northern Lights, all while balancing a limited vacation budget and a desire to return home for monthly tech meetups.
  culinary: Suzanne Malone enjoys cooking Mediterranean‑inspired dishes such as grilled salmon with lemon‑oregano quinoa, chickpea ratatouille, and fresh hummus, expertly balancing flavors with olive oil,
    feta, and roasted red peppers, and they host dinner parties where friends sample their healthy creations paired with crisp Sauvignon Blanc.
  core: Suzanne Malone blends disciplined engineering leadership with a love for surf, photography, and Mediterranean cooking, juggling structured career ambitions and spontaneous waves while never missing
    a board‑game night, even if it means secretly binge‑watching tech tutorials late into the night.
background:
  cultural: Suzanne was raised in a middle‑class Anglo‑American family in Southern California. Her upbringing combined traditional American values—emphasis on education, hard work, and community service—with
    the relaxed, outdoors‑oriented culture of the West Coast. She celebrates typical U.S. holidays such as Thanksgiving and Fourth of July while also participating in local community events like beach clean‑ups
    and neighborhood festivals. Her family’s heritage includes roots in the British Isles, and she grew up with a multicultural awareness fostered by the diverse population of the San Diego region.
