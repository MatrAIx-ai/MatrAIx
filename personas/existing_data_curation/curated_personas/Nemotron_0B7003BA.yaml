  career_goals: Danielle aims to move from front‑line surveillance to a supervisory role within a major casino or a corporate loss‑prevention department. She plans to earn professional certifications such
    as Certified Protection Professional (CPP) and Advanced Security Practitioner (ASP) within the next two years. Her long‑term ambition is to become a security manager who designs and implements structured
    surveillance protocols, mentors new guards, and leads a team focused on reducing fraud and improving guest safety. She also envisions pursuing a master's degree in security studies or criminology to
    broaden her career options and secure a more predictable, stable schedule that supports her mental‑health needs.
