  career_goals: 'Caitlyn aims to move into a nursing leadership role that allows her to shape practice standards and enhance rural health outcomes in Lincoln County. She plans to earn a Master’s in Nursing
    Administration and obtain certification as a Nurse Manager or Clinical Nurse Specialist. Her primary ambition is to spearhead a hospital-wide patient safety and quality improvement program, while also
    developing a telehealth outreach service to increase access for underserved residents. Additionally, she is committed to mentoring emerging nurses and championing evidence‑based practice within her
    community.

