personas:
  professional: Caitlyn Crosson, a seasoned registered nurse with over twenty years of acute and community care experience, leverages their STEM background and methodical precision to integrate data‑driven
    decision support, mentor junior staff, and spearhead evidence‑based quality improvement initiatives that aim to elevate rural health outcomes in Lincoln County.
  sports: Caitlyn Crosson enjoys low‑impact exercise, joining the Lincoln County Hiking Club for weekend trail outings, cheering on the Portland Timbers in MLS and the Oregon Ducks during college football
    season, participating in a casual adult beach‑volleyball league each summer, and hitting the cross‑country skis at Mount Hood during winter months.
  arts: Caitlyn Crosson finds solace in historical fiction by Hilary Mantel, attends community theater productions of Shakespeare, knits in small circles while listening to folk legend Joni Mitchell and
    indie band The National, and decorates their living space with prints of Vincent van Gogh’s “Starry Night,” reflecting a blend of literary, musical, and visual appreciation.
  travel: Caitlyn Crosson favors thoughtfully planned nature‑centric getaways, having hiked the Blue Ridge Mountains in spring, enjoyed a breezy summer weekend in Cape Cod for lobster feasts, embarked on
    an autumn road trip through the Scottish Highlands, and dreaming of a spring pilgrimage to the cherry blossoms of Kyoto for a quiet cultural immersion.
  culinary: Caitlyn Crosson, an avid home chef, cultivates fresh herbs to flavor regional dishes like New England clam chowder, Oregon Dungeness crab cakes, and a rosemary‑infused lamb roast, savoring the
    ritual of preparing these meals with garden‑grown thyme, rosemary, and locally sourced produce.
  core: Caitlyn Crosson blends a nurse’s precision with a gardener’s patience, channeling curiosity into data projects and quiet hobbies while methodically planning every step of their life, even if that
    means occasional impulse buys of rare yarns.
background:
  cultural: Caitlyn was raised in the foothills of central Kentucky, immersed in Southern Appalachian values that emphasize community, modesty, and self‑reliance. Her family’s roots in farming and small‑town
    working‑class life have fostered a deep sense of hospitality and service, reinforced by regular attendance at a local Methodist church. While she honors these traditions, her STEM education and nursing
    career have broadened her worldview, positioning her as a bridge between long‑standing cultural norms and contemporary healthcare innovations.
