  career_goals: Ysidra aspires to become a professional graphic designer or visual artist, ideally working for a cultural institution or creative agency that celebrates diverse voices. She dreams of attending
    a specialized high‑school art program, earning a scholarship for a visual‑arts degree, and eventually using her art to raise awareness about teen mental‑health issues. She also hopes to create a community
    outreach initiative that merges art and cultural heritage for youth empowerment.
