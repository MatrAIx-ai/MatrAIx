personas:
  professional: Linda Miller, a veteran building cleaner with three decades of hands‑on janitorial expertise, they combine practical know‑how of floor stripping, eco‑friendly chemical mixing, and minor
    repairs with a curiosity for green‑cleaning innovations as they pursue a supervisory role and plan to mentor new staff.
  sports: Linda Miller, a regular participant in the town’s senior walking group that explores nearby nature trails and occasionally cheers on the Cedar Grove High School Tigers football team, they prefer
    low‑impact exercise and enjoy casual bird‑watching hikes over competitive sports.
  arts: Linda Miller, an avid reader of historical fiction by Ken Follett and mystery novels by Sue Grafton, they stitch scarves while listening to Ansel Adams’ photography monographs, and contribute sunset
    photos to the community center’s art bulletin, blending literary and visual arts in their quiet creative routine.
  travel: Linda Miller, who favors self‑driven weekend getaways to nearby state parks like Laurel Ridge and dreams of touring the English cottage gardens of the Cotswolds, they plan trips around their garden
    schedule and modest retirement budget, opting for scenic routes over crowded tourist hubs.
  culinary: Linda Miller, who delights in cooking tomato‑basil soup, roasted vegetable lasagna, and classic chicken pot pie using fresh herbs from their garden, they balance nostalgic comfort meals with
    occasional experimental recipes that showcase seasonal produce.
  core: Linda Miller is a practical, curiosity‑driven garden‑loving janitorial veteran who trades cleaning chemicals for compost, embraces solitude, and quietly pursues green certifications while occasionally
    misplacing their keys in the garden, and they often laugh at their own absent‑mindedness.
background:
  cultural: Linda grew up in a small Midwestern town in Ohio, where community ties and hard‑working values were emphasized. Her family has been part of the region’s agricultural and blue‑collar workforce
    for generations, instilling a sense of practicality, modesty, and self‑reliance. The cultural backdrop includes a Protestant work ethic, informal social customs, and a preference for neighborly cooperation.
    She identifies with the white, rural Ohio cultural identity, which values humility, straightforward communication, and a quiet appreciation for seasonal rhythms—a perspective that still shapes her everyday
    habits and interactions.
attributes:
  skills: '[''Commercial janitorial services'', ''Floor care (stripping, waxing, buffing)'', ''Restroom sanitation and supply restocking'', ''Safe chemical handling and eco‑friendly cleaning techniques'',
    ''Minor plumbing and electrical repairs'', ''Equipment operation (floor scrubbers, pressure washers)'', ''Inventory management'', ''Work order documentation'', ''Customer service and communication'']'
  hobbies: '[''Gardening (vegetables, herbs)'', ''Reading (historical fiction, mystery)'', ''Walking and birdwatching on local trails'', ''Knitting and crocheting'', ''Participating in a small book club'',
    ''Cooking comfort dishes'', ''Photography of nature scenes'']'
  career_goals: Linda hopes to transition from a staff janitor to a supervisory role within the facilities department, eventually becoming a lead custodian or facilities coordinator for the school district.
    She is interested in obtaining a Green Cleaning Certification and, if possible, training newer employees on sustainable practices. In the longer term, she dreams of starting a small, part‑time residential
    cleaning business that would give her more flexible hours to spend time on her garden and community projects. Financial stability for retirement and the ability to support herself independently are
    central to her ambitions.
