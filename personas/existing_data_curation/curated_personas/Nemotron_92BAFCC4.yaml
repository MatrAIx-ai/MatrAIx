personas:
  professional: Michael Torres, a 28-year-old assembly technician skilled in CNC routing, MIG/TIG welding, and Fusion 360 CAD, blends their methodical precision with an artistic imagination to streamline
    production workflows while prototyping functional metal sculptures, positioning them for a shift‑supervisor role within three years.
  sports: Michael Torres plays forward for the Inland Empire United community soccer league, roots for the Los Angeles FC and LA Lakers, regularly attends salsa and cumbia nights that double as cardio,
    and joins a weekend CrossFit box to maintain functional strength for their fabrication projects.
  arts: Michael Torres sketches abstract concepts on their tablet while listening to Brian Eno, creates mixed‑media metal sculptures inspired by Theo Jansen and Ai Weiwei, visits street‑art murals by local
    crews and galleries featuring Basquiat retrospectives, and collects limited‑edition prints of Wassily Kandinsky for visual reference.
  travel: Michael Torres enjoys weekend road trips to Joshua Tree for desert inspiration, annual visits to San Diego’s maker fairs, a yearly pilgrimage to Portland’s artisan districts, and dreams of studying
    Barcelona’s modernist architecture while balancing their travel budget with their studio‑saving goals.
  culinary: Michael Torres swears by the smoky flavor of chipotle‑marinated grilled corn, loves crafting sushi rolls with fresh tuna and avocado, experiments with homemade ramen broth seasoned with ginger
    and miso, and often cooks meals in a seasoned cast‑iron skillet they forged themselves.
  core: Michael Torres fuses meticulous engineering with boundless imagination, turning metal and code into functional art while staying calm, organized, and sociable, though occasional back aches and impulse
    spending on creative supplies remind them they’re human.
background:
  cultural: Michael grew up in a Mexican‑American household in Adelanto, where Spanish and English are spoken interchangeably. Family traditions include cooking tamales, pozole, and tacos for celebrations,
    and observing Día de los Muertos and Cinco de Mayo with vibrant decorations and music. He maintains close ties with his extended family and often helps organize community events at the local church.
    His cultural heritage influences his love for lively Latin rhythms, rhythmic dancing, and the bold colors and motifs that occasionally appear in his artistic projects.
attributes:
  skills: '[''mechanical assembly'', ''fabrication'', ''CNC machine operation'', ''MIG/TIG welding'', ''technical drawing interpretation'', ''quality inspection'', ''equipment maintenance'', ''basic CAD
    (Fusion 360)'', ''creative problem solving'', ''inventory management'', ''workflow optimization'', ''team training'']'
  hobbies: '[''sketching and digital illustration'', ''mixed‑media metal sculpture'', ''Arduino and Raspberry Pi tinkering'', ''community soccer'', ''salsa and cumbia dancing'', ''visiting art galleries
    and street murals'', ''reading science‑fiction and philosophy'']'
  career_goals: Michael aims to move from his current assembler role into a supervisory position within the next three years, seeking a production lead or shift supervisor role where he can blend his technical
    expertise with his creative vision. He plans to earn an associate degree in manufacturing technology at a local community college and obtain certifications in CNC machining and lean manufacturing. Long‑term,
    he dreams of opening a boutique fabrication studio that creates functional metalwork with artistic design, serving local businesses and custom‑order clients while mentoring apprentices.
