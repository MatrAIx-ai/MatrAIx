personas:
  professional: Clemmie Moore is an aspiring community-development project coordinator who leverages meticulous scheduling, Trello-driven workflow management, and a practical, routine-focused mindset to
    turn city revitalization plans into predictable, low-stress deliverables, all while navigating the occasional anxiety of looming deadlines.
  sports: Clemmie Moore hikes the Cascades with the Bellingham Hiking Society, plays competitive weekend volleyball with the Fairhaven Flyers club, and is a dedicated fan of the Seattle Seahawks and Seattle
    Sounders FC, attending games whenever the schedule aligns with their meticulously planned calendar.
  arts: Clemmie Moore devotes Friday evenings to community theater rehearsals, channeling the narrative energy of Lin-Manuel Miranda’s Hamilton, while their off-stage downtime includes listening to Fleet
    Foxes, admiring Ansel Adams photographs, and diving into self-help titles by Brené Brown.
  travel: Clemmie Moore prefers meticulously planned road trips, having already explored the rugged coastline of Oregon's Cannon Beach, the vibrant streets of Seattle's Pike Place Market, and a weekend
    hike in Banff National Park, while a future dream itinerary includes a summer trek through the Scottish Highlands.
  culinary: Clemmie Moore's culinary routine revolves around precise baking projects like lemon-curd tartlets and almond-flour macarons, using exact measurements of butter, confectioners' sugar, and fresh
    berries, and they often pair their creations with locally sourced salmon from the Bellingham fish market for a balanced dinner.
  core: Clemmie Moore is an orderly, socially-savvy 18-year-old who transforms group activities into well-run events, battles chronic worry with yoga and spreadsheets, and forgets to hydrate while counting
    every board-game piece.
background:
  cultural: Clemmie was raised in a middle‑class white family in the Pacific Northwest, where practicality, hard work, and community involvement are core values. Growing up in Bellingham, she absorbed a
    blend of progressive environmental awareness and traditional small‑town sensibilities, which fostered her love of organized, community‑focused activities. Her family emphasized routine, responsibility,
    and participation in local events, shaping her appreciation for structured social engagement. While she identifies with mainstream American culture, she also respects the region’s indigenous heritage
    and incorporates a strong connection to outdoor recreation into her daily life.
