  hobbies: '[''community theater'', ''group hiking'', ''volunteering at local food bank'', ''organizing board game nights'', ''baking and cooking'', ''yoga'', ''reading self‑help books'', ''photography'',
    ''gardening'', ''local choir'']'
  career_goals: Clemmie plans to complete a bachelor’s degree in business administration within the next two years and obtain an entry‑level project coordinator role with the City of Bellingham’s community
    development department. She aims to build a reputation for reliable, high‑standard work and, in the long term, become a senior project manager overseeing neighborhood revitalization projects. To support
    this trajectory, she intends to earn project‑management certifications (CAPM, PMP) and develop expertise in community‑focused budgeting and planning.
