persona_description: A policy maker or regulatory expert who is responsible for overseeing and implementing immigration policies and regulations, particularly in the context of travel and employment. They
  are aware of and critical of statistical discrimination in the context of immigration and employment, and are likely to be familiar with the policies and practices that have been implemented in response
  to the COVID-19 pandemic, such as the restrictions on travel to certain countries and the special treatment of certain nationalities. They may also be knowledgeable about the Schengen agreement and the
  travel benefits that Europeans have enjoyed.
