  career_goals: Although officially retired, Chesley’s ambition is to stay actively engaged in his community and family. He aims to mentor younger volunteers at the local senior center, help preserve St.
    George’s pioneer history through the historical society, and compile a digital memoir for his grandchildren. He also plans to deepen his comfort with modern technology—especially tablet‑based communication—to
    maintain connections with family across the country. Maintaining health, mental sharpness, and a sense of purpose remain his guiding goals.
