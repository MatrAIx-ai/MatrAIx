persona_description: A scientist working at NASA's Jet Propulsion Laboratory, specialized in the field of planetary science, particularly focusing on the study of radiation on Mars and its impact on the
  habitability of the planet. The scientist has expertise in using the REMS and RAD instruments to measure radiation levels on Mars and analyzing the data to determine the potential for long-term human
  habitation. The scientist is also involved in the research of the habitability of Mars and its potential for supporting microbial life.
