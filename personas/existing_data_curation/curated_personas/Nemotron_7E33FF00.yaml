personas:
  professional: A budding mini engineer, Song Li spends preschool hours constructing elaborate block towers and testing simple pulley systems, blending a love for new ideas with a practical sense of how
    pieces fit together while often resisting structured class activities, and they relish spontaneous tinkering over rigid lessons.
  sports: A spirited member of the kindergarten soccer club, Song Li prefers the goalkeeper position where quick reflexes meet solitary focus, cheers for the regional Raptors youth team, practices kicking
    drills spontaneously after school, sometimes forgets to bring their shin guards, and they enjoy the thrill of defending the net in friendly matches.
  arts: An enthusiastic crayon artist, Song Li fills sketchbooks with detailed dinosaur sketches inspired by picture books by author Emily, enjoys listening to classic Disney soundtracks while drawing,
    and they often critique peers' artwork with a surprisingly skeptical eye, pushing for more realistic proportions.
  travel: An eager little explorer, Song Li has delighted at the hands-on exhibits of the City Aquarium and the dazzling fireworks at Disney World resort, and they dream of someday standing before the Eiffel
    Tower in Paris.
  culinary: A selective eater, Song Li prefers crunchy apple slices, peanut butter sandwiches, and spaghetti with plain tomato sauce, often arranging the food on the plate like a colorful puzzle, but they
    sometimes sneak extra chocolate chip cookies when unsupervised.
  core: Song Li balances fierce curiosity with a pragmatic streak, thrives on spontaneous puzzles and solitary play, and they habitually challenge rules - especially when it means more fun or a better victory.
background:
  cultural: Song Li comes from an East Asian (Chinese) family that maintains bilingual household traditions in Harford County, Maryland. Her parents celebrate Lunar New Year, teach her basic Mandarin through
    stories and songs, and share cultural foods such as dumplings and mooncakes. She participates in local community events at the county’s Asian cultural center, where she learns about Chinese folklore
    and values respect for elders, while also integrating into the broader American community through school and neighborhood activities.
attributes:
  skills: '["early literacy (letter recognition & phonics)", "basic numeracy (counting to 20)", "fine‑motor coordination (drawing, coloring, safety‑scissors cutting)", "block building (DUPLO/LEGO)", "simple
    puzzle solving", "introductory coding with ScratchJr", "basic Mandarin vocabulary", "self‑clean‑up and organization skills"]'
  hobbies: '["drawing and coloring", "building with DUPLO blocks", "reading picture books", "exploring nature (backyard and parks)", "collecting rocks and shells", "playing educational tablet games (ScratchJr,
    letter/number apps)", "singing and dancing to children’s songs", "paper origami and simple crafts"]'
  career_goals: She often talks about growing up to become a scientist or engineer who invents things that make everyday life easier, such as a robot that helps with chores. Her love of building and problem
    solving fuels a dream of designing new toys or gadgets. She also expresses a desire to help animals, imagining a future as a veterinarian, and enjoys the idea of exploring space like an astronaut, reflecting
    both her curiosity and pragmatic view of making a tangible impact.
