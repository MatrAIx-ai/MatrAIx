  career_goals: Sebastian’s career ambition is to transition from a front‑line representative to a supervisory and training role within his contact‑center organization. Over the next two years, he aims
    to earn a Certified Customer Service Professional (CCSP) credential and to lead a small team of agents, applying his structured approach to improve key performance metrics such as average handle time
    and first‑call resolution. He is also interested in spearheading a process‑optimization project that leverages his analytical eye to streamline call routing and documentation procedures. In the longer
    term, Sebastian envisions moving into a quality‑assurance management position where he can mentor agents, develop training curricula, and ensure consistent service standards while maintaining the predictable,
    organized work environment he values.
