personas:
  professional: Sebastian Larraga, a veteran contact‑center representative with over twenty years of front‑line experience, blends bilingual fluency, empathetic listening, and meticulous CRM documentation
    to de‑escalate calls and train new agents, while his preference for structure drives his goal of moving into supervisory and quality‑assurance leadership.
  sports: Sebastian Larraga kicks off his day with a jog along Fort Lauderdale’s shoreline, joins a local adult soccer league for Saturday matches, attends Miami Marlins games—especially when Latin American
    prospects are on the mound—and enjoys occasional community fishing trips, blending cardio, team sport, and relaxed outdoor recreation.
  arts: Sebastian Larraga, an avid salsa dancer, immerses himself in the rhythms of Marc Antonio, Celia Cruz, and Carlos Vives while attending monthly cultural performances, and finds inspiration in the
    films of Pedro Almodóvar and the poetry of Pablo Neruda, which shape his creative expression and social gatherings.
  travel: Sebastian Larraga favors mixed‑purpose trips that balance cultural immersion with beach relaxation, having explored the historic streets of Barcelona, the colonial charm of Cartagena, and the
    coastal vibes of Key West, while his travel planning leans on detailed itineraries to stay within his budget and accommodate his family commitments.
  culinary: Sebastian Larraga, an enthusiastic home cook, masters dishes like ropa vieja, arroz con pollo, and flan, often seasoning with cumin, oregano, and fresh cilantro, and delights in hosting friends
    for feasts that showcase his skillful use of plantains, sofrito, and caramelized sugar.
  core: Sebastian Larraga harmonizes a structured, goal‑driven career in customer service with a lively social life centered on salsa, cooking, and community volunteering, all while juggling a disciplined
    financial plan and occasional health‑related compromises.
background:
  cultural: Sebastian is a first‑generation Cuban‑American who grew up in the vibrant Hispanic neighborhoods of South Florida. Raised in a bilingual household, he speaks fluent Spanish and English, and
    his family’s traditions have deeply shaped his identity. He celebrates Cuban holidays such as Día de la Independencia and participates in local festivals that feature música cubana, baile, and traditional
    food. The aromas of his mother’s kitchen—slow‑cooked pork, plantains, and black beans—remain a cornerstone of his culinary tastes. While he has never married, he maintains close ties with an extended
    family network that regularly gathers for holiday meals and cultural celebrations. His upbringing instilled a strong sense of community, respect for elders, and a cooperative spirit, which he carries
    into both his professional life and his involvement with the local Cuban community center, where he volunteers as a language mentor and cultural liaison.
