personas:
  professional: Sherrie Echols, a 28‑year‑old HR specialist with a STEM education, harnesses advanced Excel, SQL, and Power BI to drive data‑driven talent acquisition and craft innovative employee‑engagement
    programs, positioning herself for a strategic HR Business Partner role in a technology company.
  sports: Sherrie Echols spends weekends traversing desert mesas with the Las Cruces Trail Runners, ardently supports the New Mexico State Aggies basketball team, follows the Albuquerque Isotopes baseball
    club, and occasionally plays pickup soccer after community dance classes.
  arts: Sherrie Echols dedicates Friday evenings to painting abstract mixed‑media pieces influenced by Yayoi Kusama’s polka‑dot installations, curates trips to immersive Beeple digital exhibitions, and
    frequently visits local galleries showcasing emerging Southwestern muralists, while their digital illustration work channels sci‑fi inspirations from authors like Philip K. Dick.
  travel: Sherrie Echols blends meticulous planning with spontaneous curiosity, favoring sunrise hikes in White Sands, weekend art‑focused stays on Santa Fe’s Canyon Road, and an upcoming solo trek to Patagonia’s
    southern night‑sky observatories, while always leaving room for impromptu stops at regional farmer’s markets.
  culinary: Sherrie Echols delights in preparing Mediterranean roasted red‑pepper hummus and slow‑cooked lamb tagine, masters spicy New Mexican green‑chile enchiladas, and builds heirloom tomato salads
    from the local farmer’s market, often accompanied by a strong cup of dark roast coffee.
  core: Sherrie Echols merges rigorous analytics with boundless creativity, toggling between Power BI dashboards and paintbrushes, staying up late over sci‑fi novels, and occasionally forgetting to water
    succulents during marathon brainstorming sessions.
background:
  cultural: Sherrie identifies as a white American with Midwestern family roots that emphasized education, curiosity, and community service. She moved to Las Cruces to pursue a bachelor's degree in a STEM
    field at New Mexico State University, where she became immersed in the Southwest's rich blend of Hispanic, Native American, and Anglo-American cultural influences. This multicultural environment has
    shaped her inclusive worldview and her appreciation for diverse perspectives, which she brings to her HR practice. She and her spouse are active participants in local festivals, regional outdoor activities,
    and community volunteer initiatives, reflecting a strong connection to the Dona Ana County community.
attributes:
  skills: '[''Data-driven talent acquisition'', ''Employee relations'', ''Performance management'', ''Organizational development'', ''HRIS administration (Workday, SAP SuccessFactors)'', ''Advanced Excel
    and Power BI'', ''SQL for workforce analytics'', ''Design thinking for employee engagement'', ''Conflict mediation'', ''Project management'']'
  hobbies: '[''Painting'', ''Digital illustration'', ''Visiting art galleries and immersive installations'', ''Reading science-fiction and popular science'', ''Online courses on emerging tech and behavioral
    psychology'', ''Hiking desert trails and high-desert mesas'', ''Night-sky photography'', ''Community dance classes'', ''Volunteering at the regional food bank'', ''Organizing trivia nights'']'
  career_goals: She aims to advance into a strategic HR Business Partner role within a technology-focused organization, where she can lead people-analytics projects and drive talent strategy aligned with
    business objectives. Over the next two years, Sherrie plans to earn the SHRM-CP certification and deepen her expertise in predictive workforce modeling. In the longer term, she envisions becoming a
    Director of Talent Management or Chief Human Resources Officer, championing a culture of innovation, inclusivity, and data-informed decision-making.
