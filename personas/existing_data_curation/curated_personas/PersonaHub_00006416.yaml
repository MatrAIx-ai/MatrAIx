persona_description: A scientist working on a research mission to study and map an earthquake fault that led to the 1964 Good Friday earthquake in Alaska, one of the most devastating earthquakes in history.
  The scientist is using advanced technology, such as sound waves and air guns, to create a sonogram of the fault and estimate its size and potential for future earthquakes. The scientist is also using
  the data to learn about the differences between the parts of the subduction zone that produce large earthquakes and those that do not.
