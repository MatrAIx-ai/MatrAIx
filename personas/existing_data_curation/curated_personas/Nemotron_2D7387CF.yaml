  hobbies: '[''Fishing'', ''Hiking'', ''Woodworking projects'', ''Automotive tinkering'', ''Reading DIY and technology manuals'', ''Strategy video games'', ''Community clean‑up volunteering'']'
  career_goals: He aims to secure a technical apprenticeship in HVAC or electrical work, leveraging his interest in sustainable home systems while ensuring steady employment. Over the next three years,
    he plans to complete a certification program at a community college and obtain an EPA 608 certification for refrigerant handling. Ultimately, he envisions launching his own small‑scale handyman business
    that offers energy‑efficient upgrades for rural homeowners. He also sees value in joining the National Guard to gain discipline, leadership experience, and additional technical training, which would
    complement his civilian career goals.
