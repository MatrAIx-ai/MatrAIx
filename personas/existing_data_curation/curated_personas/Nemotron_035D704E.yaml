  hobbies: '[''Basketball'', ''Church gatherings and event organization'', ''Cooking family meals'', ''Listening to gospel and R&B music'', ''Fishing'', ''Boating'', ''Community volunteering at food banks'',
    ''Mentoring youth'', ''Amateur photography'']'
  career_goals: Robert aims to advance to a senior purchasing manager role within the next five years, where he can lead a team and shape strategic sourcing initiatives that deliver measurable cost savings.
    He plans to earn a Certified Purchasing Professional (CPP) credential through employer‑sponsored training, strengthening his technical expertise and formal qualifications. Beyond personal advancement,
    he is motivated to mentor newer staff, sharing his practical knowledge to help them succeed. Recognizing his own emotional reactivity, he also seeks to implement stress‑reduction strategies at work,
    advocating for a supportive workplace culture that balances productivity with wellbeing. Ultimately, he hopes to leverage his role to contribute to community economic development by partnering with
    local minority‑owned businesses.
