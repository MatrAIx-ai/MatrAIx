  hobbies: '["Hiking in the Sierra foothills", "Cooking Mexican cuisine with modern twists", "Playing chess and strategic board games", "Reading medical research and technology journals", "Mindfulness meditation
    and journaling", "Volunteering at community health fairs", "Listening to Latin jazz and traditional music"]'
  career_goals: David aims to transition into an advanced practice role, such as a Nurse Practitioner or Clinical Nurse Specialist, with a focus on integrating data analytics into patient care to improve
    outcomes. He aspires to lead a quality‑improvement department, develop hospital‑wide safety protocols, and earn recognition as a thought leader in nursing informatics. Ultimately, he dreams of obtaining
    a Master's degree in Nursing and a certification in health informatics, positioning himself for senior management or consulting opportunities where he can drive competitive excellence in healthcare
    delivery.
