  hobbies: '[''Watercolor painting'', ''Pottery'', ''Quilting'', ''Hiking'', ''Gardening'', ''Community volunteering'', ''Line dancing'', ''Book club'', ''Maker‑space projects'', ''Attending gallery openings'']'
  career_goals: Approaching retirement, Willa aims to transition from full‑time production to a mentorship role where she can share her technical knowledge with the next generation of fabricators. She plans
    to volunteer as a workshop instructor at the local community college’s CNC and metal‑working program, and to lead a small maker‑space club that blends fabrication with artistic projects. Additionally,
    she hopes to develop a part‑time consulting service for small manufacturers seeking process improvements, and to pursue a personal goal of designing and building functional art pieces for local galleries.
