personas:
  professional: An experienced assembler and fabricator, Willa Huyser leverages three decades of hands‑on manufacturing expertise to mentor emerging metalworkers, streamline workshop processes, and design
    functional art pieces for local galleries, all while maintaining a methodical, organized approach to quality and deadlines.
  sports: Willa Huyser enjoys seasonal outdoor activity, joining a local hiking group for spring trail walks in the Blue Ridge foothills, participating in line dancing at the Carolina Festival of the Arts,
    and cheering on the Charlotte Hornets and the Greenville Drive while also playing casual pickleball at the community center.
  arts: Willa Huyser blends a love for visual and literary arts by attending monthly gallery openings featuring contemporary artists like Yayoi Kusama and local painter Sarah Finch, taking watercolor and
    pottery classes at the community arts center, quilting with patterns inspired by Georgia O'Keeffe's flower motifs, and discussing novels by Sally Rooney and Chimamanda Ngozi Adichie in a lively book
    club.
  travel: Willa Huyser prefers road‑trip adventures that balance art and nature, having driven the Blue Ridge Parkway to Asheville for a weekend museum tour, explored the historic streets of Charleston
    for culinary delights, and planning a future pilgrimage to Florence to study Renaissance sculpture, all while budgeting trips around her part‑time consulting work and family commitments.
  culinary: Willa Huyser cultivates heirloom tomatoes, rainbow carrots, and heritage beans in her garden and transforms them into vibrant dishes like roasted vegetable ratatouille, fresh summer gazpacho,
    and cornbread with jalapeño, demonstrating a moderate cooking skill that blends comfort food with occasional experimental flavors using herbs like tarragon and sage.
  core: Willa Huyser is a curious, methodical 62‑year‑old who fuses a lifetime of precise metal‑fabrication with a vibrant artistic spirit, community involvement, and a pragmatic approach to aging.
background:
  cultural: Willa grew up in a traditional Southern environment in South Carolina, where church gatherings, family barbecues, and community festivals shaped her values of hospitality and cooperation. Her
    upbringing combined respect for Southern customs—such as a love of country music and comfort food—with an openness to broader cultural experiences she encountered through travel and art education. The
    rich history of the Midlands region, the close‑knit feel of Blythewood, and the diverse artistic scene of nearby Columbia influence her appreciation for both heritage and contemporary expression.
attributes:
