  hobbies: '[''Street photography around Brooklyn'', ''Cooking and experimenting with new recipes'', ''Reading historical non‑fiction'', ''Listening to technology and economics podcasts'', ''Jogging in
    Prospect Park'', ''Community gardening'', ''Watching basketball games'', ''DIY home improvement projects'']'
  career_goals: Nevin aims to move from cashier to shift supervisor within the next two years, followed by a store manager position. He plans to complete an associate degree in business administration at
    a local community college, obtain a certification in retail management, and ultimately open a small neighborhood convenience store that emphasizes community ties and efficient service. While ambitious,
    he balances his goals with realistic budgeting and a focus on steady professional growth.
