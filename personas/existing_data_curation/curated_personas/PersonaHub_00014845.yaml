persona_description: A researcher who studies the economics of tobacco and its impact on socio-economic disparities. The individual is interested in understanding the role of price discrimination in the
  tobacco industry and how it affects smokers' purchasing behavior. They are likely to be a data-driven scientist who has conducted a study on the price of tobacco products in the UK over a 12-year period.
  The researcher is interested in finding evidence that the tobacco industry is introducing a wider variety of brands to cater to smokers who want to buy cheaper, and they want to recommend that the price
  of all types of tobacco should be equally high to discourage smoking.
