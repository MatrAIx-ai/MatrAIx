personas:
  professional: Diana Rodriguez, a seasoned early childhood educator with deep expertise in STEM-arts integration, they use their razor‑sharp organization and curiosity to design data‑driven, bilingual
    curricula that blend coding toys, interactive whiteboards, and hands‑on art projects, while mentoring new teachers with a disciplined yet supportive style.
  sports: Diana Rodriguez, an avid hiker of the central mountain trails, they join the local women’s running club for Saturday 5K runs, cheer on the island’s baseball team, the Cangrejeros, and practice
    yoga twice a week, blending cardio with mindful stretching to maintain stamina for classroom energy.
  arts: Diana Rodriguez, a devoted painter and piano enthusiast, they spend weekends sketching still‑lifes inspired by Frida Kahlo’s bold colors and playing Debussy’s 'Clair de lune' while attending gallery
    openings featuring emerging Caribbean artists such as Ana Rivera.
  travel: Diana Rodriguez, a planner who prefers curated cultural itineraries, they have already explored the historic streets of Old San Juan, the botanical gardens of Monteverde, and the music festivals
    of Cartagena, and dream of a retreat in the lavender fields of Provence that balances discovery with quiet reflection.
  culinary: Diana Rodriguez, an enthusiastic home chef, they cultivate tropical herbs like cilantro, epazote, and lemongrass to flavor dishes such as arroz con gandules, mango‑coconut ceviche, and a garden‑fresh
    pesto, and enjoy experimenting with fusion recipes while occasionally treating themselves to fine‑dining sushi platters.
  core: Diana Rodriguez blends disciplined organization with boundless curiosity, turning every lesson, garden, and piano piece into a creative experiment, yet they occasionally hoard stray pens and forget
    to water succulents.
background:
  cultural: Diana grew up in a bilingual household in Puerto Rico, immersed in the island's rich traditions of music, dance, and cuisine. Her family celebrates Puerto Rican holidays such as Nochebuena and
    San Sebastián Street Festival, and she incorporates these cultural elements into her classroom through music, storytelling, and food-related activities. She values the strong communal ties of her neighborhood,
    the importance of family, and the resilience of Puerto Rican culture. Diana's teaching reflects a deep respect for her heritage, integrating local folklore and environmental stewardship into her STEM
    lessons, fostering pride and cultural identity in her young learners.
attributes:
  skills: '[''Early Childhood Education'', ''STEM Curriculum Integration'', ''Bilingual Instruction (Spanish-English)'', ''Child Development Assessment'', ''Differentiated Instruction'', ''Educational Technology
