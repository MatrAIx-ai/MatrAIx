  hobbies: '[''Painting'', ''Sketching'', ''Visiting Art Galleries'', ''Gardening'', ''Cooking Puerto Rican Cuisine'', ''Reading Child Development Research'', ''Yoga'', ''Playing Piano'', ''Hiking'', ''Volunteering
    in Community Workshops'']'
  career_goals: She aims to become a lead curriculum specialist for a district-wide early childhood program, focusing on expanding STEM and arts integration across preschool centers in Puerto Rico. Diana
    plans to pursue a master's degree in Early Childhood Education Administration and to develop a community outreach initiative that provides free STEM workshops for families in Gurabo. Ultimately, she
    aspires to open an innovative early learning center that serves as a hub for culturally responsive, inquiry-based education.
