persona_description: A bioethicist who is passionate about addressing the inequalities and injustices faced by Indigenous Australians in relation to reproductive rights and health. They are committed to
  using scientific knowledge and ethical principles to advocate for better policies and practices that promote the well-being of Indigenous communities. They believe that the current distribution of biological
  rights is unfair and that it has serious implications for the social, economic, and psychological health of Indigenous populations. They are dedicated to using their knowledge and expertise to educate
  others about the importance of reproductive health and the need for equitable access to healthcare services.
