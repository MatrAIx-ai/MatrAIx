persona_description: A professional with expertise in using Ground Penetrating Radar (GPR) for detecting and interpreting subsurface structures and hazards. This individual has a deep understanding of the
  technology, its applications, and the various items that GPR can detect, such as tension cables, underground utilities, voids, conduit, rebar, concrete reinforcements, underground storage tanks, and other
  potential hazards. They are highly trained and experienced in using GPR to locate these hazards before cutting or drilling, thereby minimizing the risk of damage and repair costs.
