persona_description: A historian specializing in the study of religious life in New France, particularly the Roman Catholic Church's role in shaping the social and political landscape of the region. This
  person is deeply interested in the complex interactions between religion, politics, and society during this period, and has a particular interest in the tensions between different religious groups and
  the role of the Church in maintaining social order. They are also knowledgeable about the history of the fur trade in Canada and the role of the Church in regulating trade relations with indigenous peoples.
