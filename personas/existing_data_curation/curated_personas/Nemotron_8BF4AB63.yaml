personas:
  professional: Kelya Perez is a community cultural organizer in Tyler who leverages bilingual communication, meticulous budgeting, and event coordination to run intergenerational festivals and senior wellness
    workshops, balancing practical structure with outgoing energy to ensure everything runs on schedule.
  sports: Kelya Perez stays active through weekly folk-dance rehearsals, gentle walks in the community garden, and chair-yoga sessions at the senior center, while cheering on the Tyler High School Bulldogs
    during fall football and the Round Rock Express in summer baseball, and she belongs to a friendly walking club that meets every Saturday.
  arts: Kelya Perez immerses herself in the rhythms of classic folk singers such as José José and Vicente Fernández, plays simple percussion like maracas during community dance gatherings, and finds inspiration
    in the paintings of Frida Kahlo, which she displays in her kitchen while sharing stories from historical novels at her monthly book club.
  travel: Kelya Perez prefers well-planned, moderate-duration trips that combine cultural immersion and family visits, having already traveled to Oaxaca and San Miguel de Allende to explore historic plazas
    and culinary markets, while dreaming of a relaxed road-trip through the Hill Country of Texas and a spring pilgrimage to New Orleans for its vibrant music festivals.
  culinary: Kelya Perez is an accomplished home chef who expertly prepares enchiladas suizas, mole poblano, and homemade tamales using fresh corn masa, poblano chiles, and epazote, delights in teaching
    younger relatives the art of salsa-making, and enjoys occasional potluck evenings where she pairs her dishes with a glass of mezcal or a simple cerveza.
  core: Kelya Perez is a spirited septuagenarian who blends meticulous organization with a love for communal celebrations, occasionally forgetting where she puts her glasses but always finding them in the
    garden pot where she tends her herbs.
background:
  cultural: Kelya is a first‑generation Mexican American who grew up in a bilingual household that blended Mexican traditions with Texan influences. Her family’s Catholic faith shaped celebrations such
    as Christmas posadas, Día de los Muertos, and quinceañeras, while the warmth of extended family and community gatherings emphasized mutual support. Living in Tyler, Texas, she has integrated Tex‑Mex
    culinary flavors and participated in local Hispanic organizations, preserving Spanish language fluency and passing cultural customs to younger generations. The blend of Mexican heritage, Catholic rituals,
    and East Texas community life informs her values of family, respect for elders, and active civic participation.
attributes:
  skills: '[''Bilingual communication (Spanish & English)'', ''Community event coordination'', ''Budgeting and financial management for nonprofits'', ''Traditional Mexican cooking'', ''Community gardening
    and horticulture'', ''Senior wellness advocacy'', ''Interpersonal communication and conflict resolution'', ''Basic computer literacy (email, social media)'', ''Teaching and mentoring (cooking, language,
    crafts)'']'
  hobbies: '[''Mexican folk dancing'', ''Cooking traditional Mexican dishes'', ''Community gardening'', ''Reading historical novels and biographies'', ''Genealogy research'', ''Volunteer work at local senior
    center'', ''Attending church socials and cultural celebrations'', ''Listening to traditional Mexican music'']'
  career_goals: Kelya aims to remain an active cultural ambassador in Tyler, fostering intergenerational connections and preserving Mexican culinary traditions. She plans to launch a quarterly cooking‑class
    series tailored for seniors and a mentorship program that pairs younger volunteers with older community members. She also hopes to document oral histories of Mexican families in East Texas, creating
    a small archive for local schools. On a personal level, Kelya seeks to maintain her health and vitality so she can continue leading community initiatives and may advise the city council on senior‑friendly
    policies.
