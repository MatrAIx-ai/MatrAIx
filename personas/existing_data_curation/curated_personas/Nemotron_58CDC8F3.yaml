  hobbies: '[''reading contemporary African American literature'', ''visiting museums and galleries'', ''listening to jazz and soul music'', ''urban gardening'', ''cooking Southern-inspired dishes'', ''hiking
    the Lakefront Trail'', ''photography'', ''volunteering as a STEM mentor'', ''attending tech meetups'', ''traveling to historical sites'']'
  career_goals: Lola aims to advance into senior leadership, eventually becoming a chief systems architect or IT director where she can shape enterprise‑wide digital transformation initiatives. She plans
    to earn certifications such as TOGAF and CISSP to deepen her strategic and security expertise. Her ambition includes leading projects that integrate ethical AI and inclusive design, leveraging her humanities
    background to ensure technology serves diverse communities. She also wants to mentor emerging Black women in tech, creating pipelines that increase representation and foster a culture of resilience
    and excellence within the industry.
