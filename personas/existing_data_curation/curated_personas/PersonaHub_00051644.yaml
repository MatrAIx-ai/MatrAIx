persona_description: A healthcare professional who is responsible for planning and implementing strategies to protect the public's health during periods of cold weather in England. This person may work
  for the NHS, local authorities, social care, or other public agencies, and they would be responsible for alerting the public to the negative health effects of cold weather and providing guidance on how
  to prepare and respond appropriately. This person would also be involved in training professionals working with people at risk, as well as in developing and implementing plans to protect individuals,
  local communities, and voluntary groups from the harmful effects of cold weather.
