personas:
  professional: Melissa Decola, a seasoned drafting specialist with 25 years mastering AutoCAD, Revit, and SketchUp, blends precise BIM coordination with a painter’s eye for hand‑rendered perspectives,
    drives sustainable design through deep knowledge of the Florida Building Code, mentors junior drafters, and they aspire to lead community‑focused public‑space projects as a BIM manager.
  sports: Melissa Decola energizes her fitness routine with sunrise kayak trips along the Gulf Coast, weekly paddle‑boarding, a membership in a local adult recreation soccer league, and they enthusiastically
    cheer the Tampa Bay Buccaneers, the Lightning, and the Rays while integrating a Thursday night salsa‑dance cardio class as part of her active lifestyle.
  arts: Melissa Decola immerses herself in the arts by painting watercolors of native Floridian wildflowers inspired by Georgia O’Keeffe and Claude Monet, designing sets for her community theater’s production
    of ‘A Streetcar Named Desire,’ attending exhibitions by local muralist JR at the Tampa Museum of Art, and they regularly lead drawing workshops for children that blend storytelling techniques from contemporary
    author N.K. Jemisin.
  travel: Melissa Decola plans her vacations with a blend of careful itineraries and spontaneous detours, favoring weekend escapes to the Florida Keys, annual cultural tours of Italy’s Amalfi Coast and
    Sicily for authentic Mediterranean cuisine, occasional hikes in the Great Smoky Mountains, and they budget about ten percent of discretionary income for travel while coordinating trips around their
    salsa‑dance class schedule and family commitments.
  culinary: Melissa Decola explores Mediterranean and Italian flavors by mastering dishes such as fresh ricotta gnocchi with sage‑butter sauce, grilled branzino drizzled with preserved lemon, and a traditional
    vegetable moussaka, they source organic olive oil, sun‑dried tomatoes, and locally harvested basil from farmer’s markets, and they host bi‑monthly dinner parties where experimental sauces are paired
    with curated playlists of classical guitar.
  core: Melissa Decola is a meticulous drafting veteran who fuses artistic curiosity with community‑focused sustainability, balances structured planning with spontaneous outdoor adventures, and they occasionally
    let their love of new paints delay paperwork.
background:
  cultural: Melissa is a second‑generation Italian‑American whose family settled in Florida after migrating from Southern Italy in the mid‑20th century. Raised in a Catholic household in the Tampa Bay area,
    she grew up celebrating traditional holidays such as Christmas, Easter, and the Italian feast of Saint Joseph, while also embracing the multicultural ethos of coastal Florida. Her cultural identity
    blends the warm, community‑oriented values of her Italian heritage—love for food, art, and family gatherings—with the laid‑back, outdoor lifestyle of Pinellas County. This hybrid background informs
    her appreciation for both classic European art and contemporary American design, and drives her active involvement in local cultural events and community service.
attributes:
  skills: '[''AutoCAD'', ''Revit'', ''SketchUp'', ''SolidWorks'', ''Blueprint Reading'', ''Florida Building Code Knowledge'', ''BIM Coordination'', ''Construction Document Preparation'', ''Material Specification'',
    ''Sustainable Design Principles'', ''Hand Rendering'', ''Adobe Photoshop'', ''Adobe Illustrator'', ''Project Coordination'', ''Problem Solving'']'
  hobbies: '[''Watercolor Painting'', ''Acrylic Painting'', ''Visiting Art Galleries'', ''Community Theater Set Design'', ''Gardening'', ''Bird Watching'', ''Kayaking'', ''Paddle‑boarding'', ''Salsa Dancing'',
    ''Cooking Mediterranean Cuisine'', ''Book Club'', ''DIY Home Improvement'', ''Teaching Drawing Workshops'']'
  career_goals: Melissa aims to advance to a senior drafting or BIM manager position within the next five years, gaining Revit certification and completing a bachelor's in architectural technology. She
    wants to mentor junior drafters, lead BIM coordination on sustainable building projects, and eventually transition to a consulting role offering freelance drafting services to community‑oriented architecture
    firms. She also aspires to contribute to local public‑space design initiatives in Pinellas County, integrating her artistic interests with her technical expertise.
