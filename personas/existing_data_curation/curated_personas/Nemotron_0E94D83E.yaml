  career_goals: Yohann aims to earn an MBA within the next three years to broaden his strategic and financial acumen, then move into a senior director role overseeing operations and product development
    in a tech company. He aspires to champion interdisciplinary innovation that fuses technology with creative arts, eventually launching his own consultancy that helps firms embed design thinking and data‑driven
    creativity into their workflows. He also wants to mentor emerging talent, especially underrepresented groups in STEM.
