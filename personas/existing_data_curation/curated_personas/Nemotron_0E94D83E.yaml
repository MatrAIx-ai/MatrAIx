personas:
  professional: Yohann King, a 29‑year‑old tech project lead, blends agile management, Python data analysis, and Tableau storytelling with a relaxed, creative mindset that fuels cross‑functional collaboration
    and design‑thinking workshops.
  sports: Yohann King dominates local pick‑up basketball courts, supports the Charlotte Hornets, hikes with the Asheville Trail Club in the Blue Ridge foothills, and follows the Carolina Panthers season
    with a competitive but laid‑back attitude.
  arts: Yohann King immerses himself in contemporary galleries showcasing artists like Yayoi Kusama and Banksy, practices street photography inspired by Henri Cartier‑Bresson, and frequents live shows by
    Janelle Monáe and local indie band The Good Life, channeling that creative energy into his work.
  travel: Yohann King prefers spontaneous, budget‑friendly trips—last summer he road‑tripped to Asheville for a music festival, he dreams of a spring weekend in Lisbon for its murals, and he often books
    last‑minute flights to explore new art scenes.
  culinary: Yohann King experiments with fusion dishes such as kimchi‑taco tacos and miso‑glazed salmon sushi bowls, enjoys sourcing fresh basil and gochujang at farmer’s markets, and boasts a decent skillet‑master
    skill level but sometimes burns the edges when distracted.
  core: Yohann King is a curious, art‑obsessed tech leader who balances creative spontaneity with a hint of disorganization, turning board‑game nights into brainstorming sessions.
background:
  cultural: Yohann grew up in a middle‑class, white family in Charlotte, North Carolina, steeped in Southern hospitality and community values while also being exposed to the city’s emerging tech and arts
    scene. His family’s roots trace back to Scottish and Irish immigrants, giving him a cultural heritage that blends traditional Southern customs—such as weekend barbecues, college sports enthusiasm, and
    a love for storytelling—with a modern, progressive outlook. Living in Charlotte’s growing urban hub has broadened his perspective, fostering appreciation for cultural diversity, innovative arts, and
    collaborative environments.
