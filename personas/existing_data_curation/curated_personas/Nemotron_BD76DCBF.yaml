personas:
  professional: Tonya Carter is a retired environmental engineer and former high school science teacher who now channels her methodical, routine‑driven mindset into community science advocacy; they apply
    water‑quality testing expertise, statistical analysis, and curriculum development skills to mentor students, coordinate volunteer initiatives, and draft a low‑input gardening guide for seniors.
  sports: Tonya Carter follows the Sacramento River Cats baseball team, enjoys morning walks on local park trails with their husband, participates in a senior‑center bridge club that serves as mental exercise,
    and attends a gentle senior‑friendly yoga class at the community center during the spring months.
  arts: Tonya Carter spends evenings immersed in golden‑age mystery novels by Agatha Christie and Dorothy L. Sayers, sings in their church choir performing Handel or gospel works by Kirk Franklin, and crafts
    quilts inspired by William Morris patterns, weaving a steady thread of literary and musical appreciation through their leisure time.
  travel: Tonya Carter prefers organized, low‑stress road trips, having visited the Monterey Bay Aquarium, the historic town of Sonoma, and a Civil War battlefield tour in Virginia, while dreaming of a
    tranquil pilgrimage to the English countryside to trace their family’s roots and enrich their genealogy project.
  culinary: Tonya Carter delights in cooking with garden harvests, regularly preparing roasted beet and walnut salad, carrot‑ginger soup, and homemade dill pickles, and their comfort dish is a hearty vegetable
    stew seasoned with rosemary, thyme, and a splash of aged balsamic vinegar.
  core: Tonya Carter blends a lifetime of analytical science expertise with a love of routine, community service, and gentle creativity, navigating their golden years through meticulous planning, modest
    frugality, and a steady stream of quilting, bird‑watching, and choir harmonies.
background:
  cultural: Tonya grew up in a mid‑western farm family of German‑American heritage before relocating to California in her thirties. She identifies with traditional American Protestant (Methodist) values,
    emphasizing family cohesion, community service, thrift, and self‑reliance. Her upbringing stressed the importance of routine, respect for elders, and practical problem‑solving. She cherishes holiday
    traditions such as Thanksgiving dinner and observes conservative social norms, while also valuing the modest, steady contributions she can make to her Red Bluff community.
attributes:
  skills: '["Water quality analysis", "Statistical data analysis", "Laboratory instrumentation", "Science curriculum development", "Project management", "Community outreach coordination", "Organic gardening"]'
  hobbies: '["Organic vegetable gardening", "Birdwatching", "Quilting", "Reading classic mystery novels", "Volunteer work at the food pantry", "Genealogy research", "Bridge", "Church choir participation"]'
  career_goals: Although retired, Tonya aims to leave a lasting legacy by mentoring high‑school students in STEM, creating a low‑input gardening guide for seniors, raising funds to establish a small community
    science lab in Red Bluff, and documenting her family’s history for future generations. She also wishes to maintain her health, support her husband’s activities, and continue fostering a sense of routine
    and stability within her household and volunteer circles.
