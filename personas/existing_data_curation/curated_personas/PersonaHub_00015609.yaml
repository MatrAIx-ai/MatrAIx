persona_description: A pediatrician who focuses on the prevention and management of pain conditions in children. They are interested in understanding the underlying factors that contribute to the development
  of pain conditions in children and are looking for ways to prevent the onset of these conditions through promoting physical fitness, exercise, and introducing pause exercises to physically passive children.
  They are likely to be familiar with the Physical Activity and Nutrition in Children Study conducted by the University of Eastern Finland and interested in its findings.
