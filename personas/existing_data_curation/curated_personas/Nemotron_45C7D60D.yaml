  career_goals: Linda plans to complete her high school education, either by graduating on schedule or earning a GED, and then pursue a vocational certificate in a field that offers a predictable, quiet
    work environment, such as medical records administration or veterinary assisting. She seeks a role where she can apply her organizational strengths, attention to detail, and compassionate nature, while
    still allowing time for personal solitude. Long‑term, she hopes to secure a stable, full‑time position that provides clear responsibilities, opportunities for continued learning, and a supportive community.
