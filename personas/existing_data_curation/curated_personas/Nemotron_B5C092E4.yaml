  hobbies: '[''Reading historical fiction and memoirs'', ''Backyard vegetable gardening'', ''Traditional cooking for potlucks'', ''Attending local cultural festivals'', ''Calligraphy practice'', ''Digital
    photography of community events'', ''Senior storytelling circle'', ''Volunteer tutoring at the local library'']'
  career_goals: Although officially retired, Paz aims to leave a lasting legacy by establishing a community cultural garden that serves as a gathering spot for seniors and families. She aspires to create
    a mentorship program linking high‑school students with senior volunteers to share life skills and cultural knowledge. Additionally, she hopes to publish a small cookbook of family recipes and oral histories,
    ensuring her heritage remains vibrant in Stamford’s multicultural tapestry.
