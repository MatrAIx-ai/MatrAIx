  hobbies: '[''Sketching'', ''Speculative fiction writing'', ''Guitar playing'', ''School theater'', ''Robotics club'', ''Board game nights'', ''Peer mentoring'', ''Exploring tide pools'', ''Hiking'', ''DIY
    crafts'']'
  career_goals: He aims to pursue a career that blends his artistic imagination with technology, such as video game design, interactive media, or animation. He hopes to attend a specialized arts high school
    or a university program in visual arts and computer science, eventually becoming a creative director or a user experience designer who can shape engaging, inclusive digital experiences. He also dreams
    of using his skills to lead community art projects that bring together his peers.
