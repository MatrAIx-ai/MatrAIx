    Leadership'', ''Mentorship & Coaching'', ''Impact Investing'', ''Community Outreach'', ''Creative Problem-Solving'']'
  hobbies: '[''Visiting Museums and Galleries'', ''Collecting Contemporary Art'', ''Attending Live Performances (theatre, concerts, dance)'', ''Reading Art History and Biography'', ''Writing a Blog on Finance
    and the Creative Economy'', ''Traveling to Cultural Capitals'', ''Yoga and Mindfulness Practice'', ''Cooking and Hosting Dinner Parties'', ''Volunteer Mentoring in Arts Education'', ''Learning New Languages
    (German, Italian)'']'
  career_goals: Jennifer aspires to become a chief financial officer for a leading cultural institution such as a museum or performing‑arts center, where she can shape financial sustainability while championing
    artistic innovation. She aims to design and implement impact‑investment portfolios that fund emerging artists and community‑based cultural programs. Over the next five years she plans to earn a CFA
    charter, lead a finance team in a nonprofit arts organization, and mentor junior staff, especially women and underrepresented groups, to create more inclusive financial leadership. She also envisions
    founding a consultancy that helps arts nonprofits transition to resilient, data‑driven financial models.
