persona_description: A microbiologist with expertise in virology and the gut microbiome, particularly in the study of enteric virome and its role in inflammatory bowel disease (IBD). Dr. Virgin's research
  focuses on the importance of viruses in the microbiome and their effects on immunity, disease states, and potential links to other components of the microbiome. He has published papers on the virome in
  IBD, and is currently exploring mechanisms that could be at play if enteric viruses are implicated in causing disease. His work has been supported by the National Institutes of Health (NIH).
