  hobbies: '[''Visiting art galleries and museums'', ''Playing classical guitar'', ''Cooking traditional Mexican dishes'', ''Gardening'', ''Walking nature trails along the Missouri River'', ''Reading scientific
    and historical non‑fiction'', ''Participating in small community workshops'', ''Photography'', ''Puzzle solving (crosswords, sudoku)'', ''Journaling and mindfulness breathing'']'
  career_goals: Approaching retirement, Yuris aims to shape a lasting legacy by establishing a cross‑functional innovation hub that blends technology with artistic design, allowing the organization to explore
    unconventional solutions. He seeks to transition into a senior advisory role where he can mentor the next generation of managers, champion diversity and inclusion, and embed a culture of harmony and
    well‑being. Ultimately, he hopes to balance a phased reduction in daily responsibilities with active involvement in community projects that celebrate Mexican heritage and the arts.
