personas:
  professional: Stephanie Thomas is a 23‑year‑old production line operator who leverages their quick learning, safety‑first mindset, and creative problem‑solving to streamline machinery maintenance while
    using their artistic eye for visual process documentation, and they actively seek supervisory responsibilities and certifications to transition into a process‑improvement specialist role.
  sports: Stephanie Thomas keeps fit by joining spontaneous Saturday pickup volleyball matches with the Brando Beach Volleyball League, cheering on the Milwaukee Bucks and Brewers through the NBA and MLB
    seasons, and they complement the team sports with salsa dancing classes and lakeshore jogs, though a lack of structured routine sometimes leads to missed workouts.
  arts: Stephanie Thomas immerses themselves in Milwaukee’s arts scene by sketching vibrant street murals inspired by artists like Shepard Fairey, attending watercolor workshops at the Milwaukee Art Museum,
    laughing through improv classes at The Comedy Lab, dancing salsa at Sassy Salsa, and catching live sets from the indie band The War on Drugs at The Jazz Estate, all of which fuel their creative outlook
    and inform their process‑improvement ideas.
  travel: Stephanie Thomas prefers spur‑of‑the‑moment road trips, often spending a weekend exploring Lake Michigan’s shoreline or hopping to Chicago for a live music night, while dreaming of a future solo
    adventure to New Orleans’ jazz district and a design‑focused weekend in Copenhagen, yet they balance these wanderlust plans with a modest budget that prioritizes occasional craft‑beer tours over expensive
    overseas flights.
  culinary: Stephanie Thomas, a self‑described ‘part‑time foodie,’ gravitates toward Midwest comfort foods like cheese curds and bratwurst, delights in craft‑beer pairings with artisanal pretzels, and occasionally
    experiments with homemade fish tacos using fresh cilantro, lime, and corn tortillas, while their cooking skill hovers at confident amateur—adept at quick skillet dishes but rarely attempts complex baking.
  core: Stephanie Thomas is a curiosity‑driven, arts‑obsessed production line tech who juggles spontaneous social adventures with a competitive streak, often sacrificing organization for excitement, and
    can be found sketching process flowcharts over a craft‑beer foam.
background:
  cultural: Stephanie grew up in a working‑class, predominantly white neighborhood of Milwaukee, where German and Polish immigrant heritage shaped the community’s food, festivals, and values. The Midwestern
    ethos of hard work, friendliness, and community involvement is ingrained in her, evident in her participation in local fairs, sports gatherings, and brewery festivals. Her cultural upbringing blends
    the practical, blue‑collar mindset of the region with exposure to the city’s strong arts and music scene, fostering both a reliable work ethic and an appreciation for creative expression.
attributes:
  skills: '[''Machine operation'', ''Quality inspection'', ''Troubleshooting equipment'', ''Safety compliance'', ''Rapid learning'', ''Team coordination'', ''Interpersonal communication'', ''Conflict resolution'',
