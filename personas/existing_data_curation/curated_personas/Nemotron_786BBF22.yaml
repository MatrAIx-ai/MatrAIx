  hobbies: '[''Visiting art museums'', ''Watercolor painting'', ''Sketching street murals'', ''Improv comedy'', ''Salsa dancing'', ''Pickup volleyball'', ''DIY crafts workshops'', ''Photography'', ''Live
    music concerts'', ''Exploring craft breweries'', ''Day trips to Lake Michigan'']'
  career_goals: She aims to advance from the production floor to a supervisory or lead role within the next 3‑5 years, pursuing certifications such as forklift operation and CNC machining. Stephanie hopes
    to become a process-improvement specialist who can meld her curiosity and creativity to streamline workflows. In the longer term she dreams of blending her love for art with industry by eventually moving
    into a design-oriented position or opening a small studio where she can create custom visual art pieces.
