personas:
  professional: Brian Adams, an engineering technologist who blends deep CAD expertise with a business mindset, leads cross‑functional process‑improvement initiatives at a Southern California aerospace
    supplier, translating complex equipment calibrations into clear stakeholder narratives while occasionally missing deadlines due to a spontaneous work style.
  sports: Brian Adams follows Southern California sports passionately, cheering for the Los Angeles Lakers, the Dodgers, and the LA Galaxy, while personally surfing at Huntington Beach on weekends, practicing
    sunrise beach yoga, and riding with a local cycling club along the Pacific Coast Highway.
  arts: Brian Adams immerses themselves in contemporary art by attending opening nights at the Museum of Contemporary Art Los Angeles, admiring street murals by local graffiti artists, enjoying live shows
    by Tame Impala and Billie Eilish, and sharpening improv skills at The Comedy Store where they often become the center of attention.
  travel: Brian Adams prefers spontaneous coastal road trips, exploring quirky towns like Cambria and Solvang, while dreaming of lantern‑lit streets in Kyoto, the rolling vineyards of Tuscany, and the red
    rocks of Sedona, usually booking last‑minute rentals and letting curiosity dictate the itinerary.
  culinary: Brian Adams experiments in the kitchen with sous‑vide pork belly glazed with miso, kimchi‑infused taco shells, and deconstructed s’mores featuring smoked paprika, favoring fresh heirloom tomatoes,
    charred corn, and exotic spices such as sumac and harissa, and often hosts potluck nights to showcase these avant‑garde dishes.
  core: Brian Adams is a charismatic, curiosity‑driven technologist who blends art, improvisation, and maker‑culture into a restless yet calmly resilient lifestyle marked by spontaneous road trips, community
    mentorship, and a penchant for experimental cooking.
background:
  cultural: Brian was raised in a middle‑class suburban environment in Southern California, where mainstream American values of individualism and optimism intersect with the region's vibrant multicultural
    atmosphere. His family emphasized education, community involvement, and a balanced appreciation for both practical business acumen and the arts. Living near the U.S.–Mexico border, he was exposed to
    diverse culinary traditions, festivals, and artistic expressions that broadened his cultural outlook. While he identifies with the typical white American cultural heritage, he embraces the local emphasis
    on outdoor activities, creative expression, and social connectivity that define life in San Diego County.
attributes:
  skills: '[''Technical troubleshooting'', ''CAD modeling (SolidWorks)'', ''Rapid prototyping'', ''IoT system integration'', ''Process improvement'', ''Operations management'', ''Supply chain coordination'',
