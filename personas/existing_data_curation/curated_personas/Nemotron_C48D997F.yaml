    improvisation'']'
  hobbies: '[''Visiting contemporary art galleries'', ''Live music and theater attendance'', ''Improv comedy workshops'', ''Spontaneous road trips along the California coast'', ''DIY electronics and Arduino
    projects'', ''3D printing and design'', ''STEM mentoring for youth'', ''Community gardening'', ''Yoga and mindfulness meditation'', ''Experimental cooking for family and friends'']'
  career_goals: Brian aims to transition into a senior leadership role where he can drive innovative, interdisciplinary engineering projects that blend technology with aesthetic design. He envisions becoming
    an innovation manager or senior technologist within a forward‑thinking aerospace or advanced manufacturing firm in Southern California, spearheading initiatives that incorporate sustainable practices
    and user‑centered design. Leveraging his business background, he seeks to align technical development with strategic corporate objectives and improve operational efficiency. Outside the corporate arena,
    Brian aspires to launch a community STEM outreach program that offers hands‑on workshops to youth and underrepresented groups, reflecting his strong desire to help others and foster collaborative learning.
    Ultimately, he wants to shape an organizational culture that values creativity, compassion, and resilience.
