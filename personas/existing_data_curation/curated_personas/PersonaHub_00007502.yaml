persona_description: A researcher who is interested in the molecular and cellular mechanisms of Down syndrome (DS), specifically in the genetics, biochemistry, and molecular biology of patients with DS.
  This person is likely to be involved in research on the molecular and cellular pathways that contribute to the symptoms of DS, including cognitive impairment, neurologic disorders, and the development
  of AD. They are interested in understanding the genetic basis of DS and the role of genes on chromosome 21 in the pathogenesis of the syndrome. This person is likely to have a background in genetics,
  molecular biology, and biochemistry, and is interested in exploring the molecular mechanisms of the DS critical region and the role of SOD-1 in the development of AD.
