persona_description: A naturalist and entomologist interested in the study of ants, specifically focusing on the Formicidae family, which includes ants such as the Crematogaster brevis. This persona is
  knowledgeable about the behavior, habitat preferences, and distribution of Crematogaster brevis in Costa Rica and Colombia. They have a keen interest in the interactions between Crematogaster brevis and
  other ant species, such as Azteca, and are interested in the potential benefits or exclusions of nesting near Azteca colonies. This persona is also interested in the ecological and evolutionary aspects
  of ant species, particularly how they interact with their environment and other species.
