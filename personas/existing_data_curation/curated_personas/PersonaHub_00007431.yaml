persona_description: A research scientist specializing in the gut microbiota and its impact on animal productivity and health. This individual has conducted extensive research on the use of live yeast probiotics,
  Saccharomyces cerevisiae boulardii CNCM I-1079 (S.c. boulardii), in reducing the detrimental changes that occur at weaning in pigs. They have published several studies on the impact of S.c. boulardii
  on gut microbiota, feed conversion ratio, and faecal E. coli levels. The persona is highly knowledgeable in molecular sequencing technology, dietary modulation, and the relationship between gut health,
  microbiota, and nutrient utilisation. They are interested in studying the effect of S.c. boulardii on the gut microbiota of weaned piglets, particularly in terms of bacterial composition, diversity, and
  stability.
