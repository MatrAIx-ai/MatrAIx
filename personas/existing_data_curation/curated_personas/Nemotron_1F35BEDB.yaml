  career_goals: Andres dreams of a career that blends competition, hands‑on problem solving, and teamwork. He hopes to become a robotics or marine‑engineer, designing machines that serve his hometown’s
    port and oil‑refinery industry, while also keeping an eye on environmental sustainability. In the short term, he aims to earn a spot on his high school varsity basketball team and win a regional robotics
    competition, building a reputation for both athletic and technical excellence.
