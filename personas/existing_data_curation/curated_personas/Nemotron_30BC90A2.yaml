personas:
  professional: David Caulder is an aspiring teen tech tinkerer who merges their love for competitive gaming with hands‑on electronics, channeling their practical curiosity into Arduino creations while
    their relaxed, improvisational style fuels collaborative projects in their school robotics club.
  sports: David Caulder shuffles between the local skate park crew where they practice flip tricks, the middle school basketball team that runs a spring league, and cheering for the Los Angeles Lakers and
    the Phoenix Suns, blending their love for street culture with a competitive edge in team sports.
  arts: David Caulder syncs their playlists with hip‑hop icons like Kendrick Lamar and classic rock legends such as Led Zeppelin while sketching pixel‑art avatars for their gaming streams, occasionally
    borrowing an older sibling’s guitar to jam during weekend hangouts, weaving music and visual design into their creative downtime.
  travel: David Caulder plans their weekend escapes on a whim, biking out to the nearby desert for sunrise photo‑ops and aiming to attend the upcoming e‑sports tournament in Seoul, but budget constraints
    keep overseas trips on a wish‑list, so their immediate travel map is dotted with local skate spots, a family road‑trip to national parks, and a coveted visit to the Grand Canyon.
  culinary: David Caulder favors quick bites like pepperoni pizza, chicken‑and‑waffle tacos, and ramen bowls seasoned with sriracha, can whip up a decent mac‑and‑cheese using the family’s cheddar block,
    but their cooking skill stalls at microwaving leftovers, and they often snack on trail‑mix while gaming.
  core: David Caulder is a kinetic teen who toggles between high‑score battles, skate tricks, and DIY electronics, and they are fueled by a love for competition, a habit of forgetting homework, and a penchant
    for impulsive snack raids.
background:
  cultural: 'David grows up in a typical suburban setting of Yuma, Arizona, a desert town shaped by agriculture and proximity to the Mexican border. His family is of Anglo‑American heritage, rooted in the
    Southwest''s ranching and farming traditions. He is exposed to a blend of cultures: community events like county fairs, Fourth of July parades, and local Hispanic influences such as Mexican cuisine
    and occasional Spanish phrases. The hot, open landscape fosters a self‑reliant, pragmatic outlook, while the multicultural environment encourages curiosity and a healthy skepticism about unfamiliar
    intentions. His upbringing reflects values of independence, hard work, and a laid‑back attitude toward formal schedules.'
attributes:
  skills: '[''troubleshooting basic electronics'', ''Scratch and introductory Python programming'', ''Arduino prototyping'', ''strategic video‑game play'', ''spatial reasoning from skateboarding'', ''basic
    arithmetic'', ''reading comprehension'', ''knowledge of desert irrigation basics'']'
  hobbies: '[''video gaming (competitive)'', ''skateboarding'', ''biking'', ''Arduino/electronics projects'', ''exploring the desert'', ''reading science‑fiction'', ''watching e‑sports streams'', ''school
    robotics club'', ''basketball'', ''listening to music'']'
  career_goals: David wants to turn his love for technology and competition into a career that blends engineering with real‑world impact. He aspires to become a robotics or mechatronics engineer designing
    automated tools for agriculture in the desert, or alternatively to become a professional e‑sports player or gaming content creator. He plans to pursue a technical degree after high school while keeping
    flexibility to explore entrepreneurial ideas around smart farming and sustainable water‑use solutions for his community.
