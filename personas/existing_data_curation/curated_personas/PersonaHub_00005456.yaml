persona_description: Howard Bennett, a Harlem community leader and civil rights activist, dedicated to the celebration and recognition of Dr. Martin Luther King Jr.'s birthday as a national holiday. He
  was a leader of the 369th Veterans Association and served as Labor Chairman of the New York Branch of the National Association for the Advancement of Colored People (NAACP). Bennett was awarded an honorary
  degree of Doctor of Humanities by Southeastern University in 1977 for his contribution to the civil rights movement. He was a passionate advocate for the holiday and worked tirelessly to make January
  15 a national holiday in honor of Dr. King.
