    and pastoral care'']'
  hobbies: '[''Reading theological and philosophical literature'', ''Acoustic guitar playing'', ''Nature hiking and trail walking'', ''Yoga and meditation'', ''Board game nights'', ''Writing reflective
    journals'', ''Participating in community art events'', ''Podcast production on faith and mental health'', ''Volunteering at local soup kitchen'', ''Knitting or crafts for stress relief'']'
  career_goals: Michael aims to expand his impact beyond Saint Paul by establishing a regional network of innovative religious education programs that blend tradition with technology. He aspires to earn
    a Master of Divinity to deepen his theological expertise, while also seeking a senior executive role—such as Director of National Faith‑Based Education—where he can shape policy and curriculum at a
    national level. His competitive nature fuels his ambition to secure major grants, publish a widely‑used curriculum series, and be recognized as a thought leader in integrating mental‑health awareness
    into faith education. Personally, he plans to develop stronger self‑care practices to manage his anxiety, enabling him to sustain high performance and emotional resilience.
