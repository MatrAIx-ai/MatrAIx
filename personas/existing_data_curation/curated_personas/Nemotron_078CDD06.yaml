personas:
  professional: Jorge Roa is a master-level automotive service technician with over three decades of experience, excelling in engine diagnostics, hybrid and electric vehicle maintenance, and parts inventory
    management, and they apply their methodical, organized nature and bilingual communication skills to mentor apprentices and cultivate customer trust.
  sports: Jorge Roa is an avid participant in a local senior soccer league that competes on Sunday afternoons, a steadfast fan of the San Jose Earthquakes, and a regular hiker on the Napa Valley trails,
    combining cardio workouts with weekend outings that also serve as scenic routes for classic car drives.
  arts: Jorge Roa enjoys attending the Napa Valley Film Festival, frequently listens to the classic crooning of Vicente Fernández alongside modern rock legends like The Rolling Stones, and collects folk‑art
    prints that depict Día de los Muertos celebrations, finding these artistic experiences a comforting bridge between past traditions and present life.
  travel: Jorge Roa prefers road‑trip adventures in a restored 1965 Mustang, planning routes along the Pacific Coast Highway and visiting wine regions like Bordeaux and Tuscany, while also cherishing family
    trips to Oaxaca's historic plazas, balancing a modest travel budget with a desire for cultural immersion and scenic drives.
  culinary: Jorge Roa loves cooking tamales, pozole, and chiles en nogada using fresh cilantro, oregano, and dried chiles from their garden, pairing these dishes with local Napa Valley Cabernet Sauvignons,
    and they often host dinner gatherings where they demonstrate meticulous, step‑by‑step techniques taught to apprentices in the workshop.
  core: Jorge Roa is a methodical master mechanic who balances classic car restoration, family traditions, and community mentorship while savoring wine‑paired home‑cooked feasts and occasional soccer matches.
background:
  cultural: Jorge grew up in a Mexican family that prized hard work, close‑knit relationships, and respect for tradition. Bilingual in Spanish and English, he celebrates Día de los Muertos, Christmas posadas,
    and family gatherings with authentic Mexican food. His Mexican heritage informs his meticulous work ethic and his generous, community‑oriented spirit. Living in Angwin, he has integrated into the local
    wine country culture while preserving his roots, often sharing stories of his upbringing and teaching younger community members about Mexican customs. As a widower, he remains closely connected to extended
    family and draws strength from cultural rituals that honor memory and continuity.
