personas:
  professional: Lucien McCann is a 39‑year‑old full‑stack software engineer who merges cloud‑native micro‑services with generative‑art coding, leading agile teams with a curious, collaborative spirit that
    values analytical rigor as much as aesthetic experimentation.
  sports: Lucien McCann is an avid supporter of the St. Louis Cardinals, St. Louis Blues, and St. Louis City SC who hikes the Ozark foothills on Saturdays, runs a few miles on weekday mornings, and participates
    in a local cycling club, though project deadlines sometimes push those workouts to the back burner.
  arts: Lucien McCand frequently visits the Contemporary Art Museum St. Louis and the City Museum, draws inspiration from jazz legends like Miles Davis and local blues icons, plays acoustic guitar at open‑mic
    nights covering Bob Dylan and Joni Mitchell, and experiments with generative art sketches using JavaScript and Processing.
  travel: Lucien McCann plans a blend of structured road trips and spontaneous weekend getaways, having explored Asheville’s art scene, New Orleans’ music quarters, and dreaming of a spring visit to Berlin’s
    tech‑art festivals, all while balancing a modest vacation budget and family commitments.
  culinary: Lucien McCann enjoys cooking eclectic dishes such as spicy Cajun gumbo, Korean‑style bibimbap, and homemade sourdough bread, sourcing fresh vegetables from the St. Louis farmer’s market, and
    often experiments with sous‑vide steak and charcoal‑grilled vegetables to fuse culinary technique with his love of precision.
  core: Lucien McCann is a tech‑savvy, arts‑obsessed Midwesterner who balances code, chords, and mountain trails, fueled by late‑night coffee and a stubborn streak of perfectionism.
background:
  cultural: Lucien grew up in the St. Louis metropolitan area, shaped by the Midwestern values of practicality, community involvement, and modest ambition. His family’s middle‑class, white American background
    emphasized education and steady work, fostering his curiosity and respect for both analytical rigor and artistic expression. He is comfortable navigating the diverse cultural scene of St. Louis— from
    its historic jazz and blues heritage to its vibrant contemporary art community— mixing traditional Midwest sensibilities with an open‑hearted appreciation for global artistic influences. This blend
    of regional roots and cosmopolitan curiosity informs his balanced outlook, collaborative nature, and willingness to explore unconventional ideas.
