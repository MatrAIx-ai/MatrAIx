  hobbies: '[''Visiting art museums and galleries'', ''Photography (urban and nature)'', ''Playing acoustic guitar'', ''Generative art coding projects'', ''Hiking in the Ozarks'', ''Experimenting with cooking
    and new recipes'', ''Reading science‑fiction and tech non‑fiction'', ''Attending tech meet‑ups and hackathons'', ''Volunteering for community coding workshops'']'
  career_goals: Lucien aims to transition into a technical leadership role where he can shape product vision at the intersection of technology and art. In the next five years, he seeks to become a Lead
    Engineer or Engineering Manager on a team that builds interactive media platforms, augmented‑reality experiences, or generative‑art tools. He plans to deepen his expertise in cloud‑native micro‑services,
    AI‑driven creative pipelines, and AR/VR development, while pursuing certifications in AWS and machine learning. Long‑term, he envisions founding a boutique studio that produces innovative digital art
    installations and empowering other creators through robust, open‑source tooling. Throughout, he values a collaborative culture, continuous learning, and maintaining a balanced work‑life rhythm that
    preserves his creative pursuits.
