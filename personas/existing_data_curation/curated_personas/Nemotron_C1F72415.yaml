  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting'', ''Herb gardening'', ''Bird-watching'', ''Reading poetry and culinary books'', ''Attending community theater'', ''Experimental
    home cooking for small gatherings'', ''Quilting'', ''Listening to classical music while cooking'']'
  career_goals: Sarah aims to transition from a line cook to a head chef at a boutique restaurant that emphasizes art-inspired cuisine, and she plans to earn a Culinary Arts Certificate from St. Petersburg
    College within the next two years. She dreams of opening a small bistro that showcases locally sourced seafood paired with seasonal produce, while offering cooking workshops that encourage creativity
    and mindfulness. Additionally, she aspires to mentor younger culinary staff, contribute recipes to a community cookbook, and achieve financial stability to support her family's future.
