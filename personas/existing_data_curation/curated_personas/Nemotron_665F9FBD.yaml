personas:
  professional: Yvrose Rogers, an occupational therapy assistant‑to‑be in rural Edmonson County, leverages their expertise in adaptive equipment, motivational interviewing, and a vivid imagination to turn
    everyday tasks into creative, arts‑infused therapy sessions for seniors, though their love of spontaneity sometimes clashes with the rigid deadlines of Medicaid billing.
  sports: Yvrose Rogers, an avid walker who joins the seasonal Mammoth Cave Trail Club and cheers loudly for the Kentucky Wildcats basketball team while occasionally playing recreational pickleball at the
    county community center, embraces movement as a social ritual even though they often postpone workouts when a new art project beckons.
  arts: Yvrose Rogers, a prolific painter of abstract watercolors, a guitarist who strums gospel classics by Mahalia Jackson and jazz standards by Miles Davis, an improvisational theater enthusiast, and
    a quilter who draws inspiration from Romare Bearden’s narrative collages, weaves their creative expression into community workshops, though their habit of leaving canvases unfinished reflects a restless
    imagination.
  travel: Yvrose Rogers, who prefers spontaneous weekend getaways over rigid itineraries, has explored the jazz‑infused streets of New Orleans, the historic cobblestones of Savannah, and the underground
    wonders of Mammoth Cave, while dreaming of a pilgrimage to the folk art markets of Asheville, yet they often curtail trips due to caregiving duties and a modest travel fund.
  culinary: Yvrose Rogers, a home‑cook who masters soul‑food staples like smoked‑turkey collard greens, buttery cornbread, and sweet‑potato pie while also experimenting with herb‑infused quinoa bowls and
    rosemary‑garlic roasted carrots, treats each meal as a canvas for storytelling, though they sometimes over‑salt a stew while lost in a new poem.
  core: Yvrose Rogers, a 58‑year‑old occupational therapy hopeful, blends a boundless imagination with a penchant for spontaneous creativity, a chronic worry about deadlines, and a love for community gospel
    music, and they forge a life where art and care intersect in every hallway.
background:
  cultural: Yvrose is an African‑American woman who grew up in a small Kentucky town, navigating a blend of Southern and Black cultural traditions. Raised in a close‑knit church community, gospel music,
    oral storytelling, and communal support shaped her early life. Her family upheld Southern culinary heritage—especially soul food—while emphasizing resilience, creativity, and the pursuit of education
    despite systemic barriers. She identifies strongly with the Black community’s focus on collective uplift and often incorporates African‑American artistic expression, such as rhythmic music, folk art,
    and narrative storytelling, into both her therapeutic work and personal creative projects. Living in Edmonson County, she experiences the dynamics of being a Black professional in a predominantly white
    rural environment, informing her advocacy for inclusive health services and culturally responsive care. Her cultural identity is also grounded in intergenerational traditions, church fellowship, and
    a deep appreciation for Kentucky’s natural landscapes.
