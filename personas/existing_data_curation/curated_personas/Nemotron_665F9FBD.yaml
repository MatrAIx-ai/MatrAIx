    techniques'']'
  hobbies: '[''Acrylic and watercolor painting'', ''Abstract sketching'', ''Creative writing (short stories, poetry)'', ''Acoustic guitar and gospel/jazz singing'', ''Improvisational theater participation'',
    ''Herb and vegetable gardening'', ''Soul food cooking and recipe experimentation'', ''Speculative fiction book club'', ''Church choir volunteering'', ''Hiking and nature walks'', ''Quilt making and
    pottery'']'
  career_goals: Yvrose aims to obtain a Certified Occupational Therapy Assistant (COTA) credential and complete an associate degree in occupational therapy, which may require earning a GED or high school
    diploma. She plans to develop a pilot community art‑therapy program for seniors and individuals with disabilities in Edmonson County, integrating her love of creativity with therapeutic practice. Long‑term,
    she aspires to a supervisory role where she can mentor new aides and influence program design, while also exploring a niche consulting practice offering adaptive living solutions and workshops on creative
    therapy. Yvrose is interested in deepening her knowledge of neurorehabilitation and hopes to serve on a local health advisory board to advocate for inclusive, culturally responsive services.
