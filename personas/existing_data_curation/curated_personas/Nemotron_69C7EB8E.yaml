  hobbies: '[''Drawing and comic creation'',''Storytelling'',''Playing soccer'',''LEGO construction'',''Exploring parks and nature'',''Art club watercolor painting'',''Minecraft building'',''Listening to
    Salvadoran music'']'
  career_goals: Augusto dreams of becoming an astronaut‑artist who can explore space and capture its wonders in colorful illustrations. He also imagines designing video games that let other kids create
    their own fantastical worlds. Occasionally he talks about playing professional soccer for his favorite Salvadoran team, hoping to inspire friends back home. His overarching ambition is to blend creativity
    and adventure, sharing stories that connect people across cultures.
