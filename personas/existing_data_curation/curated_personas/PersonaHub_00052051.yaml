persona_description: 'A multidisciplinary researcher and geographer who specializes in mapping the spatial networks of Victorian cultural figures and their movements in urban centers and beyond. She is
  interested in using newly digitized historical maps and cutting-edge research techniques in geography to trace life histories and spatial trajectories of individuals as they moved through the now historic
  landscape. Her research has been funded by the Andrew W. Mellon Foundation and is part of the Academic Research and University Libraries: Creating a New Model for Collaboration initiative.'
