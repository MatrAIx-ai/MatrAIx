  career_goals: Although retired from formal employment, Gina is driven to continue contributing creatively and socially. She aims to develop a multi-generational art program at the Downers Grove Senior
    Center, pairing younger artists with seniors for collaborative projects. She hopes to complete a series of advanced art history courses at a local community college, eventually curating a small traveling
    exhibition of works created by seniors in her community. Gina also aspires to pen a memoir that intertwines her personal history with reflections on mid‑century American art and culture, preserving
    her family's legacy for future generations. Finally, she wishes to advocate for senior-friendly public spaces, working with city officials to enhance accessibility to parks and cultural venues.
