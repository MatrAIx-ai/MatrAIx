personas:
  professional: Bruno Guillot is a budding little engineer whose love for building LEGO vehicles and turning backyard rock collections into imagined habitats showcases their boundless curiosity, open‑minded
    creativity, and relaxed, sometimes disorganized, approach to completing projects.
  sports: Bruno Guillot loves informal games of tag and catch in the park, plays forward for the neighborhood Mini‑Kickers soccer club, cheers on the local County Cubs baseball team, and prefers unstructured
    outdoor play to regimented drills, channeling their energy into exploring trails and gathering rocks for fun fitness.
  arts: Bruno Guillot fills sketchbooks with bright animal drawings inspired by Eric Carle’s collage style, hums Mozart’s ‘Eine kleine Nachtmusik’ from their children’s classical music collection, and watches
    Pixar’s ‘Toy Story’ shorts, letting the colors and melodies shape their creative world.
  travel: Bruno Guillot favors spontaneous day trips to the city’s natural history museum—where they marveled at dinosaur fossils—and nearby forest trails, while day‑dreaming about future adventures to
    Iceland’s geysers and the Great Barrier Reef, always packing a sketchbook and a box of crayons for every outing.
  culinary: Bruno Guillot delights in cheesy macaroni, peanut‑butter‑jelly sandwiches, and colorful fruit kebabs made from strawberries, blueberries, and banana slices, but their cooking skill tops at mixing
    baking‑soda volcano ingredients and arranging crackers into animal shapes for playful meals.
  core: Bruno Guillot is a curious six‑year‑old art enthusiast who builds messy LEGO structures, worries about small details, leaves a rainbow trail of crayons wherever they roam, and habitually forgets
    to clean up after experiments.
background:
  cultural: Bruno is a white child from a family with French‑Canadian and midwestern American roots. Growing up in Boulder, Colorado, he is surrounded by a community that values outdoor recreation, environmental
    stewardship, and artistic expression. His parents encourage a blend of American traditions—such as Thanksgiving celebrations and weekend trips to the mountains—with occasional nods to their French heritage,
    like speaking a few French words at home and enjoying pastries on special occasions. The local mountain culture has fostered his love for hiking, wildlife observation, and a protective attitude toward
    nature, while the city’s vibrant arts scene nurtures his appreciation for visual arts and music.
