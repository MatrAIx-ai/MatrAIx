  career_goals: Although still in kindergarten, Bruno frequently dreams about a future where he can spend time outdoors, create beautiful pictures, and help protect the environment. He imagines becoming
    a wildlife photographer, an environmental scientist who studies insects and birds, or an illustrator who brings stories about nature to life. He also mentions wanting to invent a simple device that
    helps clean streams, showing his early interest in combining creativity with problem‑solving. His goals are shaped by his love of art, curiosity about the natural world, and desire to make a positive
    difference while working in settings that allow quiet focus.
