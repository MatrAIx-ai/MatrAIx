  career_goals: Although retired from formal employment, Ana aims to deepen her role as a community pillar by expanding her volunteer work at the local senior center, mentoring younger volunteers, and coordinating
    cultural celebrations that showcase Mexican traditions. She wishes to compile a handwritten family cookbook of her most treasured recipes to share with grandchildren and the neighborhood. Maintaining
    her independence is a priority, so she plans to stay physically active through daily walks and gardening, and to improve her digital literacy to keep in touch with family via video calls. Her overarching
    ambition is to foster intergenerational connections, ensuring that compassion, cooperation, and her cultural heritage are passed on to future generations.
