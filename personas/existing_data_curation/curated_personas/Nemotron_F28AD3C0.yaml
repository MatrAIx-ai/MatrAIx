    handling'', ''Presentation and demonstration skills'', ''Time management and scheduling'', ''Team collaboration and mentorship'', ''Basic financial budgeting for client proposals'']'
  hobbies: '[''Fishing'', ''Gardening'', ''Woodworking'', ''Attending high school football games'', ''Volunteering at church/community projects'', ''Listening to classic country music'', ''Reading self-improvement
    books'', ''Listening to sales podcasts'', ''Home improvement projects'', ''Barbecue cooking'']'
  career_goals: Paul aims to transition into a regional sales manager role within the next three years, where he can coach junior representatives, implement structured sales processes, and drive a 15% annual
    growth in service adoption across Central Arkansas. He also seeks to earn the Certified Professional Sales Leader (CPSL) credential, deepen his expertise in emerging digital service offerings, and expand
    his professional network through the Cabot Chamber of Commerce. Long‑term, he envisions moving into a consulting capacity to help small businesses develop customer‑centric sales strategies while maintaining
    a balanced lifestyle that supports his family.
