  career_goals: Shirley aims to advance to a senior finance leadership role, such as Finance Director or Chief Financial Officer, within the next five to seven years. She plans to earn her CPA certification
    and enroll in an MBA program to deepen her strategic and managerial skill set. Additionally, she is passionate about mentoring emerging Black professionals in finance, advocating for diversity and inclusion
    initiatives, and leading a finance‑digital transformation project that leverages AI‑driven analytics to improve decision‑making. She also hopes to contribute to community financial‑literacy programs
    that empower families in Evergreen Park.
