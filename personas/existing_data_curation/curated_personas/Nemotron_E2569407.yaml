  career_goals: Sarah aims to advance to a senior leadership role within the Katy Independent School District, such as Lead Guidance Coordinator, where she can shape the district’s career-readiness curriculum
    and mentor a team of counselors. She plans to obtain the National Certified Counselor (NCC) credential and pursue a specialized certification in career development. Over the next five years, she hopes
    to design and launch a district-wide mentorship program that pairs high-school students with local businesses in the energy, health-care, and arts sectors. Long-term, Sarah envisions establishing a
    private consulting practice that supports mid-career adults transitioning into creative and arts-related professions, and she hopes to author a guidebook on practical career planning for families in
    suburban Texas.
