  hobbies: '[''Abstract digital sketching'', ''Creative writing (poetry, journal)'', ''Reading philosophy and contemporary fiction'', ''Listening to ambient and avant-garde music'', ''Coastal walking and
    nature observation'', ''Experimental cooking (Dominican fusion)'', ''Puzzle solving (crosswords, logic games)'']'
  career_goals: Jaime aspires to turn her artistic passion into a sustainable freelance career. She plans to build a portfolio of abstract digital illustrations and bespoke designs that she can license
    to independent publishers, boutique brands, and online platforms. She aims to self‑publish a collection of poetry and micro‑fiction that explores themes of identity and solitude. In parallel, she intends
    to develop a modest online presence—an Instagram feed and a personal website—where she offers commissioned artwork and occasional cooking tutorials featuring creative Dominican fusion dishes. To solidify
    her transition, she is considering enrolling in a community‑college certificate program in graphic design and taking workshops on marketing for creatives. Ultimately, Jaime wants to achieve financial
    independence while maintaining the flexibility to work from her home studio, allowing her to protect her quiet lifestyle and continue deepening her intellectual curiosities.
