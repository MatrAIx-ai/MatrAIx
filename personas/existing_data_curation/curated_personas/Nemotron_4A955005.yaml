    for investment properties'', ''Team leadership and mentoring'', ''Competitive sales strategy development'']'
  hobbies: '[''Soccer'', ''Cooking Mexican cuisine'', ''Acoustic guitar playing'', ''Reading historical fiction and philosophy'', ''Hiking in the Santa Monica Mountains'', ''Community volunteering'', ''Board
    games (chess, poker)'', ''Attending cultural festivals'', ''Exploring real estate technology trends'']'
  career_goals: Antonio aims to become the top-producing broker in the Greater Los Angeles market and eventually launch his own boutique brokerage that specializes in serving multicultural, especially Latino,
    clientele. He is driven to expand his practice into commercial real estate and to build a real-estate investment fund that provides entry-level opportunities for second-generation Mexican-American investors.
    Leveraging his competitive nature, he targets annual sales milestones that place him in the top 5% of agents statewide, while also pursuing advanced certifications such as the CCIM designation. He plans
    to use his curiosity for technology to pioneer AI-enhanced market forecasting within his firm, positioning himself as a thought leader at industry conferences. Finally, he wants to mentor emerging agents
    from underrepresented backgrounds, creating a pipeline of talent that reflects his community values.
