personas:
  professional: Michael Mcgee, a 44‑year‑old master upholsterer in Las Cruces, they blend two decades of hands‑on craftsmanship with a meticulous project‑planning mindset, using sustainable fabrics and
    advanced stitching techniques to deliver high‑quality custom furniture while rigorously tracking budgets, inventory, and client expectations.
  sports: Michael Mcgee, a dedicated hiker and sports fan, they channel their competitive streak into weekend desert hikes along the Organ Mountains, occasionally join the Las Cruces Trail Club, support
    the New Mexico State Aggies football and basketball teams, and attend the annual New Mexico United soccer fan meet‑up, though their schedule rarely permits regular gym sessions.
  arts: Michael Mcgee, an avid collector of design history and textures, they devote evenings to macro‑photography of fabric weaves and desert surfaces, spin classic rock vinyl from Led Zeppelin and Pink
    Floyd on a vintage turntable, and draw inspiration from designers like Charles & Ray Eames and photographer Annie Leibovitz for their upholstery creations.
  travel: Michael Mcgee, a methodical traveler, they prefer meticulously planned trips that balance adventure with family constraints, having trekked the sandstone cliffs of Monument Valley, explored the
    timber markets of Portland, and visited the textile workshops of Florence, while still dreaming of a sustainable‑focused retreat in the Finnish Lapland.
  culinary: Michael Mcgee, a home‑cooking enthusiast, they enjoy crafting New Mexican staples such as green chile stew with Hatch chile, carne adovada, and roasted corn tamales, often experimenting with
    locally sourced chili, corn masa, and heritage beans, yet their busy workshop schedule sometimes leads to over‑seasoned dishes or a quick reheated burrito.
  core: Michael Mcgee, a detail‑driven upholsterer, they live at the intersection of sustainable craftsmanship, disciplined budgeting, and a cautious yet curious mind that balances solitary creativity with
    a competitive edge.
background:
  cultural: Michael is a white American of Irish‑Scottish descent who grew up in a close‑knit Midwestern town where a strong work ethic and self‑reliance were emphasized. After completing some college coursework,
    he moved to Las Cruces, New Mexico, drawn by the region’s demand for skilled craftsmen. Living in the Southwest has exposed him to Hispanic and Native American design traditions, particularly in textiles
    and color palettes, which he respectfully incorporates into his upholstery work. He maintains a family‑centric lifestyle, valuing modesty, reliability, and community ties while navigating the cultural
    blend of his Midwestern roots and the local New Mexican influences.
attributes:
  skills: '[''Custom Furniture Restoration'', ''Advanced Stitching Techniques'', ''Fabric Selection & Sourcing'', ''Carpentry & Frame Repair'', ''Foam Cutting and Shaping'', ''Project Planning & Scheduling'',
    ''Cost Estimation & Budget Management'', ''Inventory Control'', ''Client Consultation'', ''Quality Assurance'', ''Sustainable Material Integration'']'
  hobbies: '[''Design History Reading'', ''Textile Pattern Study'', ''Woodworking Mini‑Projects'', ''Desert Hiking'', ''Macro Photography of Fabrics'', ''Classic Rock Listening'', ''Cooking New Mexican
    Cuisine'']'
  career_goals: Michael aims to transform his solo upholstery operation into a boutique workshop recognized for high‑quality, sustainable custom furniture in Southern New Mexico. He plans to obtain professional
    certification from the Upholsterers Association, develop a signature line of eco‑friendly upholstery pieces, and mentor a dedicated apprentice to preserve his craftsmanship. By formalizing his scheduling,
    budgeting, and inventory systems, he seeks to reduce daily stress, increase profit margins, and build a stable financial foundation for his family.
