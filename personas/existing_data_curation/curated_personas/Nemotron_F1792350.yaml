  hobbies: '[''Oil painting'', ''Sketching'', ''Landscape photography'', ''Acoustic guitar playing'', ''Community theatre'', ''Hiking'', ''Cross-country skiing'', ''DIY woodworking'', ''Reading speculative
    fiction'', ''Attending sustainable design talks'']'
  career_goals: Abdellah aims to transition from laborer to supervisory roles, pursuing certifications such as the OSHA 30‑Hour General Industry and the Certified Construction Manager (CCM) credential.
    He envisions leading a team as a foreman within the next three years, focusing on projects that integrate sustainable building practices and artistic design elements. Ultimately, he aspires to launch
    his own small‑scale contracting firm that specializes in eco‑friendly residential renovations and custom art installations, merging his construction expertise with his passion for aesthetics. He also
    hopes to mentor apprentices, sharing both technical skills and a collaborative, inclusive work ethic.
