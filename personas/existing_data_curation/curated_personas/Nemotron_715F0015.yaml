personas:
  professional: Dana Douglas, a seasoned educator and curriculum architect, channels their curiosity, compassionate collaboration, and painter’s eye into vibrant, visually rich lesson plans that blend differentiated
    instruction, grant‑writing expertise, and cutting‑edge technology to empower students and community learners alike.
  sports: Dana Douglas enjoys sunrise jogs along Flamingo Beach, competes in the Bonaire Beach Volleyball Club, and passionately follows Ajax Amsterdam in the Eredivisie while cheering for the Curaçao baseball
    team during Caribbean tournaments.
  arts: Dana Douglas, a devoted painter of landscapes and portraits, draws inspiration from the luminous brushwork of Claude Monet, the bold colors of Frida Kahlo, and the narrative depth of Toni Morrison’s
    novels, while also singing gospel classics by Mahalia Jackson in the church choir and regularly visiting exhibitions featuring contemporary artists such as Kehinde Wiley.
  travel: Dana Douglas, an avid traveler who blends careful itinerary planning with spontaneous art‑focused excursions, has explored Cartagena’s historic walled city, Kinderdijk’s iconic windmills, and
    Bonaire’s world‑renowned coral reefs, and dreams of strolling through Provence’s lavender fields and Kyoto’s serene tea gardens.
  culinary: Dana Douglas delights in experimenting with Southern comfort cuisine, regularly preparing shrimp étouffée with fresh okra and smoked turkey, perfecting fried chicken seasoned with cayenne, and
    baking sweet‑potato pie crowned with toasted pecans, all while harvesting heirloom tomatoes and herbs from their own vegetable garden for the freshest flavors.
  core: Dana Douglas blends a teacher’s organizational skill with an artist’s spontaneous creativity, juggling community workshops, choir rehearsals, and garden care while occasionally forgetting to lock
    the studio door after late‑night painting sessions.
background:
  cultural: Dana's cultural background is rooted in African‑American Southern traditions. Raised in a close‑knit Black community in Georgia, she grew up with gospel music, church fellowship, family storytelling,
    and a strong sense of community service. Her heritage blends the legacy of the African diaspora with Southern hospitality, cuisine, and celebrations such as Juneteenth and church homecoming events.
    She incorporates African‑American art, history, and communal values into her educational and volunteer work.
attributes:
  skills: '[''Curriculum Development'', ''Differentiated Instruction'', ''Classroom Management'', ''Educational Technology Integration'', ''Grant Writing'', ''Community Outreach'', ''Conflict Mediation'',
