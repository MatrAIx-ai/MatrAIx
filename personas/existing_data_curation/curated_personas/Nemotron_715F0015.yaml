  hobbies: '[''Painting'', ''Visiting Art Exhibits'', ''Reading'', ''Gardening'', ''Cooking'', ''Yoga'', ''Choir Singing'', ''Volunteer Craft Workshops'']'
  career_goals: Dana aims to launch a community learning hub in Bonaire that provides after‑school tutoring, art enrichment, and adult education classes. She also seeks a part‑time role as a literacy coordinator
    within the local school district and plans to pursue certification as a school counselor. Long‑term, she hopes to secure grant funding for programs that support underserved students and to become a
    mentor for emerging educators in her region.
