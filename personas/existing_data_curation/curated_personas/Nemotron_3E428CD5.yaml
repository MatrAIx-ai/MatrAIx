  career_goals: Pedro dreams of becoming a community helper who can protect and care for others. He often says he wants to be a firefighter because he likes the idea of helping people in emergencies, or
    a teacher so he can share stories and teach younger children. He also imagines being a veterinarian because he loves animals and wants to keep them healthy. These ambitions reflect his practical mindset
    and strong desire to make a positive difference.
