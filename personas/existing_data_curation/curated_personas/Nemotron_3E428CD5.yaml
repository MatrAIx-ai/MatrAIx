personas:
  professional: Pedro Reyes, an aspiring junior illustrator, turns his routine love for drawing animals and cartoon characters into detailed school art projects, applying his practical mindset, reliable
    work ethic, and compassionate teamwork to meet every deadline while sharing his creations with classmates.
  sports: Pedro Reyes thrives on the soccer field, playing midfield for the local under‑7 club and idolizing star forward Lionel Messi, while also cheering for the nearby baseball team, the River City Bears,
    and joining after‑school tag games where their cooperative spirit ensures fair play.
  arts: Pedro Reyes pours creativity into drawing whimsical animals inspired by Dr. Seuss and Disney’s Mickey Mouse, builds intricate LEGO forts that echo his love of structure, and delights in animated
    shows like “Paw Patrol” and “Peppa Pig”, turning classroom art projects into vibrant displays that reflect his compassionate and organized nature.
  travel: Pedro Reyes prefers family road trips with a detailed itinerary, such as visits to the San Diego Zoo, a weekend stay at a coastal beach resort, and a dream vacation to Disneyland, balancing excitement
    with familiar routines to stay comfortable while exploring new sights.
  culinary: Pedro Reyes enjoys helping prepare tacos by layering corn tortillas with cheese, beans, a mild salsa, and avocado, also loves making simple quesadillas and fruit smoothies, yet often forgets
    to clean up the mess afterward, turning the kitchen into a playful but chaotic workspace.
  core: Pedro Reyes blends a love for routine, creative building, and caring teamwork, saving pennies for LEGO dreams while sprinkling compassion into every game and art project.
background:
  cultural: Pedro comes from a Mexican family living in El Paso, Texas, a city where Mexican and American cultures intertwine. At home, he speaks both Spanish and English, hearing stories about Mexican
    traditions such as Día de los Muertos, Cinco de Mayo celebrations, and family gatherings centered around food and music. His family places a strong emphasis on respect for elders, community involvement,
    and Catholic holidays, which shape his values of compassion and cooperation. Growing up near the border, Pedro experiences a blend of Mexican heritage and American school life, fostering a bilingual,
    bicultural identity.
