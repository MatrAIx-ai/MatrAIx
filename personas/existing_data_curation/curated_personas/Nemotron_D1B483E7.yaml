  career_goals: Yong aims to earn full ASE master technician certification within the next two years and specialize in electric-vehicle service, a field he finds both technically challenging and environmentally
    meaningful. He aspires to become a lead technician and eventually open his own garage that blends high-performance automotive work with artistic customization, offering hands-on apprenticeships for
    local youth. In addition, he hopes to contribute to community outreach by providing affordable car maintenance workshops and partnering with non-profits that support low-income families. Long-term,
    Yong envisions becoming a certified automotive instructor, sharing his love of cars, new technologies, and collaborative problem solving with the next generation of technicians.
