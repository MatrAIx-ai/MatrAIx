personas:
  professional: Yong Say, a 25‑year‑old automotive service technician in Fresno, blends hands‑on mechanical expertise with a love for artistic customization, diagnosing everything from engine failures to
    hybrid‑driven electric systems while translating complex repairs into plain‑language explanations for customers.
  sports: Yong Say fuels their energy by playing pickup basketball at the Fresno Recreation Center, shooting goals in the weekly community soccer league, cheering on the Fresno State Bulldogs football team,
    and hiking the Sierra foothills each weekend.
  arts: Yong Say’s artistic side shows up in wandering through Fresno’s vibrant street‑art murals, attending live shows by local indie band The Raging Llamas, and hand‑painting custom car graphics inspired
    by the bold colors of graffiti artist Zed.
  travel: Yong Say prefers road‑trip adventures that double as car‑culture pilgrimages, planning weekend drives along the Pacific Coast Highway, weekend hikes to Yosemite’s misty valleys, and annual visits
    to the Tokyo Auto Salon to scout the latest electric‑vehicle trends.
  culinary: Yong Say enjoys cooking for friends, mastering dishes like Pad Thai, Korean bulgogi, and Chinese dumplings with fresh cilantro, ginger, and chilies, while occasionally experimenting with a smoked
    brisket after a long day in the shop.
  core: Yong Say is a garage‑savvy, art‑obsessed, socially charged 25‑year‑old who mixes grease with pigments, occasionally forgets to pay a bill, but never skips a community cleanup.
background:
  cultural: Yong is a second-generation Chinese-American whose parents immigrated to Fresno in the early 1990s. He grew up bilingual, speaking Mandarin at home and English at school, and he celebrates cultural
    holidays such as Lunar New Year and the Mid-Autumn Festival with family gatherings and traditional foods. The close-knit East Asian community in Fresno's Central Valley taught him the value of harmony,
    respect for elders, and collective responsibility—principles that echo his compassionate and cooperative nature. While he embraces mainstream American culture—enjoying sports, pop music, and diverse
    cuisine—he also stays connected to his heritage through community events at the local Chinese cultural center, calligraphy workshops, and occasional trips to visit relatives in China. This blend of
    cultural influences shapes his worldview, balancing innovation and curiosity with a deep sense of duty to help others.
