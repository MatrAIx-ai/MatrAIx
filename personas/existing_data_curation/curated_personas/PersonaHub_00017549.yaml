persona_description: A national study on the wellbeing of hospital doctors in Ireland, led by Professor Blánaid Hayes, a past dean of the Faculty of Occupational Medicine. The study aimed to assess the
  causes of stress in the workplace and gather data on doctors' lifestyle choices, interpersonal relationships, and rates of mental health problems, including burnout, depression, anxiety, and substance
  misuse. The study was conducted in 2014 and found that hospital doctors across all grades in Ireland had low levels of work-life balance and high levels of work stress, with almost one-third of respondents
  experiencing burnout and 50% of doctors reporting being emotionally exhausted and overwhelmed by work. The study was the first national survey of its kind conducted on a cohort of hospital doctors working
  within the same health system in Ireland.
