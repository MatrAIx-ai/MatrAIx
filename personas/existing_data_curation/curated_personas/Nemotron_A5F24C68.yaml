  hobbies: '[''sketching'', ''digital painting'', ''creative writing'', ''blogging'', ''Minecraft'', ''Roblox'', ''guitar playing'', ''school art club'', ''drama troupe'', ''photography'', ''beachcombing'',
    ''volunteering at community art workshops'']'
  career_goals: Michael aims to attend a top art and design college such as the Rhode Island School of Design or the School of Visual Arts. His primary ambition is to become a concept artist and animator
    for video games or animated films, merging his storytelling passion with visual creation. Long‑term, he dreams of founding an indie game studio where he can blend narrative, illustration, and interactive
    design, and he hopes to publish a graphic novel that showcases his unique style. He plans to build a professional portfolio during high school through competitions, collaborations, and personal projects.
