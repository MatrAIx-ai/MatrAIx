personas:
  professional: Michael Couch, an aspiring digital illustrator and budding game designer, merges the love for fantasy storytelling with practical coding skills from Minecraft and Roblox to prototype narrative‑driven
    worlds, while juggling school responsibilities and art club leadership; they reflect a balance of imagination and organized effort.
  sports: Michael Couch, a member of the Milford High School cross‑country team who enjoys weekend skateboarding and follows the New England Patriots, Boston Red Sox, and New York Knicks, approaches fitness
    with a blend of structured training runs and spontaneous backyard basketball games with friends, and they thrive on collaborative competition.
  arts: Michael Couch, an avid sketcher and photographer, draws inspiration from fantasy illustrator Yoshitaka Amano, classic painter John William Waterhouse, and indie musician Tash Sultana, often listening
    to their tracks while creating art and channeling that energy into blog poetry and drama performances, and they love sharing visual stories in community shows.
  travel: Michael Couch, who has explored the rocky cliffs of the New England coastline on family trips and dreams of wandering Kyoto’s bamboo groves and hiking Iceland’s waterfalls, prefers loosely planned
    backpacking adventures that combine photography opportunities with occasional gaming cafes, and they relish spontaneous detours that spark new story ideas.
  culinary: Michael Couch, a self‑taught kitchen experimenter, can whip up pepperoni pizza from a frozen base topped with fresh mozzarella, basil, and chili oil, and occasionally attempts ramen bowls with
    miso broth, sliced pork belly, and soft‑boiled eggs, though they often forget to set timers and burn the garlic.
  core: Michael Couch lives in a constant swirl of sketches, code, and chords, never misses a chance to doodle on napkins, pulls all‑night gaming marathons yet forgets homework, and they can’t resist humming
    the theme from "The Legend of Zelda" while painting a sunrise.
background:
  cultural: Michael was raised in a typical suburban New England environment in Milford, Connecticut, a coastal town known for its maritime heritage and close‑knit community. His family’s roots trace back
    to Irish and German ancestry, and his upbringing reflects the region’s emphasis on education, volunteerism, and seasonal traditions such as July Fourth fireworks on the shoreline, pumpkin picking in
    autumn, and community holiday festivals. Exposure to nearby cultural institutions like the Yale University Art Gallery and local historical societies has fostered an appreciation for both classic and
    contemporary art, shaping his creative outlook.
