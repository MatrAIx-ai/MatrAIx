personas:
  professional: Miguel Negron is a bilingual visual artist and community program coordinator who channels his digital illustration mastery, street photography eye, and empathetic communication into designing
    inclusive pop‑up exhibits and workshop series for local non‑profits, balancing meticulous planning with spontaneous creative spontaneity.
  sports: Miguel Negron stays active by joining the Southwest Florida Hiking Society for weekend treks, cheering on the Tampa Bay Buccaneers and the Miami Marlins, and playing casual soccer with the Fort
    Myers Community League during the summer months.
  arts: Miguel Negron immerses himself in visual and performing arts, sketching in cafés while listening to Bad Bunny and Bon Iver, photographing murals by local artist Juan Pérez, and citing inspirations
    from Frida Kahlo, Banksy, and the reggae rhythms of Bob Marley.
  travel: Miguel Negron favors short, purposeful trips that blend adventure and cultural immersion, having explored the mangroves of the Everglades, the historic streets of Cartagena, and dreaming of a
    road trip to Oaxaca's art colonies, all while budgeting travel costs through early‑bird flight deals.
  culinary: Miguel Negron experiments in his kitchen by preparing traditional Honduran baleadas with avocado, plantain‑infused tamales, and occasional fusion dishes like shrimp taco‑filled baleadas, while
    savoring the aromatic notes of cilantro, lime, and roasted chilies.
  core: Miguel Negron is a curious, community‑driven artist who balances disciplined project work with spontaneous sketch‑sessions, tends to overspend on art supplies, and can be found humming reggae while
    tending his balcony garden.
background:
  cultural: Miguel was raised in a close‑knit Honduran family that celebrated traditional holidays like Semana Santa and Día de la Independencia with music, food, and communal gatherings. Spanish was spoken
    at home, while English became his language of school and work, giving him a natural bilingual fluency. The values of respect, hospitality, and community service that he inherited from his parents are
    evident in his daily interactions. Moving to Fort Myers introduced him to a multicultural setting where the Central American diaspora maintains cultural clubs, churches, and festivals. Miguel blends
    his heritage with his Florida experience, participating in local Honduran community events, sharing his cuisine, and using his artistic eye to highlight the stories of fellow immigrants. This hybrid
    identity informs his worldview and fuels his desire to create spaces where cultural exchange thrives.
