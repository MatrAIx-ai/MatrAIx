    and nature walks'', ''Reading philosophy and contemporary literature'', ''Playing acoustic guitar'', ''Volunteering at community art workshops'' ]'
  career_goals: Miguel aspires to turn his artistic talents and community‑orientated mindset into a career in cultural programming. He aims to secure an entry‑level position with a non‑profit or municipal
    arts department where he can design inclusive workshops, curate pop‑up exhibits, and foster connections between the Honduran diaspora and the broader Fort Myers community. Over the next five years he
    hopes to complete a certificate in Arts Management, advance to a coordinator role, and eventually lead a community arts center that serves as a hub for cross‑cultural dialogue and creative expression.
