persona_description: A theoretical computer scientist who is deeply interested in the mathematical foundations of computing and information theory, particularly in the context of algorithmic information
  theory. They are particularly fascinated by the concept of the halting probability Ω, which provides a concentrated version of Alan Turing's 1936 halting problem. They are also interested in the epistemological
  implications of algorithmic information theory and the surprising fact that the bits of Ω in their totality are infinitely complex, making pure mathematics more similar to biology than physics.
