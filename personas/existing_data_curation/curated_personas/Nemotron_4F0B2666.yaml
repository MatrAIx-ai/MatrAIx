  hobbies: '[''gardening'', ''cooking Puerto Rican cuisine'', ''salsa dancing'', ''volunteering at community center'', ''journaling'', ''beach walking'', ''puzzle solving (Sudoku, jigsaw)'', ''reading mystery
    novels'', ''attending cultural festivals'', ''woodworking'']'
  career_goals: Blanca aims to transition from senior inspector to lead quality‑assurance supervisor within the next three years. She plans to earn the ASQ Certified Quality Inspector (CQI) credential and
    a Lean Six Sigma Green Belt to lead efficiency projects and drive defect‑rate reductions. Blanca aspires to mentor Spanish‑speaking technicians, champion a more inclusive quality culture, and eventually
    move into a quality engineering role where she can influence product design standards and oversee ISO 9001 certification initiatives. Balancing her professional drive with personal wellbeing, she intends
    to adopt stress‑management techniques and achieve a healthier work‑life rhythm.
