    to Art Fairs"]'
  career_goals: Curtis aims to advance from his current sales role to store manager within the next year, using his disciplined approach to exceed sales targets and improve staff retention. He plans to
    complete a bachelor's degree in Business Administration to qualify for a regional district manager position, where he can implement innovative, art‑centric retail concepts across multiple locations.
    Long‑term, Curtis dreams of opening his own boutique that functions as a community art space, showcasing local creators while offering curated merchandise. He also wants to develop a mentorship program
    for junior retail staff that emphasizes creativity, customer empathy, and measurable results, positioning himself as a thought leader in modern retail experience design.
