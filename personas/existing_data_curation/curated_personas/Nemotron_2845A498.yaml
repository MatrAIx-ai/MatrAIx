personas:
  professional: Curtis Patterson, a retail leader with a knack for visual merchandising, merges their art‑inspired aesthetic with data‑driven sales strategies, using disciplined organization and empathetic
    customer service to drive foot traffic and staff loyalty while mentoring teams through creative problem‑solving.
  sports: Curtis Patterson hits the trails around Lake Washington for weekend hikes, bands with the Seattle Nordic Ski Club for cross‑country sessions in winter, and roots for the Seattle Seahawks, Seattle
    Sounders FC, and the local amateur basketball league where they coach a recreational team.
  arts: Curtis Patterson volunteers at the St. Peter Art Center, curates pop‑up exhibits featuring emerging Midwestern painters, draws inspiration from artists like Andrew Wyeth and contemporary photographer
    Annie Leibovitz, and they find solace listening to indie folk bands such as The Lumineers and Sufjan Stevens.
  travel: Curtis Patterson plans trips with a spreadsheet, balancing work‑friendly weekends with immersive art‑focused getaways, having explored the galleries of Santa Fe, the fjords of Norway for landscape
    photography, and they dream of a summer retreat at Glacier National Park’s hidden lakes.
  culinary: Curtis Patterson enjoys home‑brewing amber ales with notes of citrus hops, whips up stovetop shrimp paella flavored with saffron and smoked paprika, and they seek out farm‑to‑table diners for
    dishes like pickled beet salad with goat cheese, while still ordering takeout pizza on late‑night creative sessions.
  core: Curtis Patterson blends disciplined retail expertise with a restless artistic curiosity, often caught juggling inventory spreadsheets and a paintbrush, while they occasionally neglect sleep for
    late‑night brewing experiments.
background:
  cultural: Curtis grew up in the Upper Midwest, raised in a modest, white family with deep Scandinavian (primarily Swedish and Norwegian) roots common to central Minnesota. His upbringing emphasized hard
    work, modesty, and community responsibility—values reinforced by the town’s Lutheran heritage and frequent participation in church and civic events. The local culture cherishes outdoor recreation, seasonal
    celebrations such as the St. Peter Fall Fest, and a strong support network for small businesses. Exposure to the town’s historic downtown and its boutique shops sparked his early interest in retail,
    while the growing presence of the St. Peter Art Center introduced him to the region’s evolving arts scene. These cultural influences have shaped his disciplined work ethic, appreciation for artistic
    expression, and desire to blend commerce with community enrichment.
