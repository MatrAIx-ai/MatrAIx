  hobbies: '[''Listening to podcasts'', ''Exploring Lake Michigan shoreline and local parks'', ''Casual video gaming (Minecraft, Stardew Valley)'', ''Cooking simple comfort meals'', ''Reading mystery and
    thriller novels'', ''Volunteering at community food bank'', ''DIY home improvement projects'', ''Nature photography'', ''Learning basic guitar chords'']'
  career_goals: Dallas aims to move into a supervisory role within the housekeeping field, such as lead housekeeper at a boutique hotel or senior‑living residence, where he can mentor newer staff and shape
    service standards. He plans to obtain certifications in hospitality management and green cleaning technologies through community‑college courses. In the longer term, he hopes to start his own small
    cleaning business that emphasizes eco‑friendly practices and provides reliable work for fellow community members. Achieving a stable income and a more predictable schedule are important to help reduce
    his stress and allow him to focus on helping others.
