  hobbies: '["Gardening", "Baking and cooking", "Knitting and quilting", "Birdwatching", "Hiking and nature walks", "Community theater", "Hosting game nights and trivia", "Reading mystery and historical
    fiction", "Volunteering at senior center", "Digital tutoring for seniors"]'
  career_goals: Annie aims to deepen her impact within the Brainerd community by taking on a formal volunteer leadership role, such as Senior Outreach Coordinator at the local community center, where she
    can design programs that foster connection among seniors. She hopes to launch a neighborhood garden project that provides fresh produce for older residents and encourages intergenerational collaboration.
    Additionally, she plans to complete a certificate in senior wellness advocacy, write a memoir that captures her life experiences and the town's history, and maintain her personal health through regular
    walking groups and mindfulness practices to manage stress.
