persona_description: A Polish physicist and chemist who made significant contributions to the field of radiation chemistry and radiobiology. Her pioneering research on radioactivity and her discovery of
  two elements, polonium and radium, earned her two Nobel Prizes. She also founded the Curie Institutes in Paris and Warsaw, and established the first military field radiological centers during World War
  I. Her work has had a lasting impact on medical research and treatment.
