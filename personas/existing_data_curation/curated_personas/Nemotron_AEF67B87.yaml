  hobbies: '[''Reading historical nonfiction'', ''Bullet journaling'', ''Gardening (raised‑bed vegetables)'', ''Hiking on the James River Park System'', ''Cooking Southern-inspired meals'', ''Crossword
    and sudoku puzzles'', ''Attending local theater productions'', ''Volunteering at a community literacy program'', ''Participating in trivia competitions'']'
  career_goals: Katherine aims to move into district‑level leadership, targeting a role such as Special Education Coordinator or Director of Inclusive Programs. To support this, she plans to earn a master’s
    degree in Special Education Leadership and obtain certification in school administration. Her long‑term ambition is to design and implement district‑wide inclusive practices, lead professional‑development
    workshops, and influence state policy to secure equitable resources for students with disabilities. She also hopes to be recognized for innovative, evidence‑based interventions that improve student
    outcomes, reflecting her competitive drive.
