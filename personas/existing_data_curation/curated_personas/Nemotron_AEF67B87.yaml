personas:
  professional: Katherine Meek is a veteran special education teacher who designs data‑driven individualized programs for autistic and emotionally‑behavioral students, mentors peers with a competitive edge,
    and leverages bullet‑journal precision to map her path toward a district‑level role as Special Education Coordinator.
  sports: Katherine Meek enjoys weekend hikes along the James River Park System, roots for the Virginia Cavaliers men’s basketball team, belongs to a local adult softball league, and participates in the
    annual Washington DC Marathon charity run, all while keeping a competitive streak that fuels her personal best times.
  arts: Katherine Meek regularly attends productions at the Virginia Stage Company, admires performances by Viola Davis and the folk duo The Avett Brothers, and fills evenings solving crosswords while listening
    to classic literature podcasts by author Donna Tartt, blending cultural enrichment with her love of narrative.
  travel: Katherine Meek prefers thoughtfully planned getaways, having trekked Shenandoah National Park’s Skyline Drive, explored historic Williamsburg, dreamed of the Edinburgh International Book Festival,
    and schedules weekend escapes to New Orleans for jazz and Creole cuisine, all logged in her bullet journal with budgeted itineraries.
  culinary: Katherine Meek’s kitchen is a Southern‑inspired laboratory where she perfects shrimp and grits with fresh garden tomatoes, cooks collard greens with smoked turkey, bakes pecan pie using locally
    sourced pecans, and experiments with bourbon‑glazed pork chops, all while occasionally treating herself to artisanal cheese plates.
  core: Katherine Meek blends a data‑driven educator’s rigor with a garden‑soaked, competitive curiosity, juggling meticulous plans and lingering worries while constantly seeking inclusive excellence.
background:
  cultural: Katherine grew up in the greater Richmond area, a region where Southern traditions blend with a vibrant, historic urban culture. Her family’s roots in Virginia instilled a respect for community
    involvement, education, and a nuanced appreciation of the city’s Civil War and civil‑rights history. While she identifies with the mainstream white American culture of the South, she values inclusivity
    and draws inspiration from the diverse student population she serves. She occasionally participates in Episcopal services but maintains a largely secular worldview, focusing on principles of empathy
    and social responsibility.
