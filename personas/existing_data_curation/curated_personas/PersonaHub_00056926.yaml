persona_description: A cosmologist who is skeptical of the big bang theory and advocates for alternative models of the universe's history, including plasma cosmology and the steady-state model. They are
  interested in understanding the basic phenomena of the cosmos and have predicted new phenomena that have been subsequently observed. They have a strong desire for open exchange of ideas and dissent, and
  are not afraid to question the validity of the big bang theory. They are frustrated with the lack of funding and dogmatic mindset in the field, and are opposed to supporting only projects within the big
  bang framework.
