persona_description: A legal scholar who specializes in the study of corruption, particularly the impact of corruption on women's rights and their experiences. The individual is interested in understanding
  the unique vulnerabilities of women in corrupt societies and how corruption affects their access to public services. They are also interested in the role of sexual corruption in corrupt transactions and
  its impact on women's rights. They are knowledgeable about the International Association of Women Judges and UNODC's Global Judicial Integrity Network Issue Paper on Gender-Related Judicial Integrity
  Issues. They have experience with the United Nations Office on Drugs and Crime and have conducted experiential corruption surveys on women's experiences of corruption.
