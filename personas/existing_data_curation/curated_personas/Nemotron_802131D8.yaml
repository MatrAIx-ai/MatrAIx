personas:
  professional: Guina Chandler, a 22‑year‑old community‑center instructor turning toward a middle‑school art teaching career, excels at weaving visual arts, storytelling, and inquiry into lesson plans,
    leverages interactive whiteboards and LMS tools to personalize feedback, and uses their calm, compassionate demeanor to nurture inclusive collaboration while managing classroom dynamics with empathy.
  sports: Guina Chandler, an outdoor‑oriented fitness enthusiast who hikes the Illinois River Trail each weekend with a DSLR in tow, practices yoga three times weekly at a downtown studio, and cheerfully
    supports St. Louis Cardinals baseball and St. Louis City SC soccer while occasionally joining a local running club for 5K events.
  arts: Guina Chandler, a multidisciplinary artist who sketches St. Louis skyline watercolors, creates digital illustrations inspired by Georgia O’Keeffe’s bold forms, attends gallery openings at the St. Louis
    Art Museum, strums an acoustic guitar while crafting lyrical verses reminiscent of Sufjan Stevens, and finds inspiration in the poetry of Ocean Vuong and the performance art of Marina Abramović.
  travel: Guina Chandler, a weekend traveler who maps day trips to Chicago’s Art Institute, explores the historic river towns of Hannibal and Grafton, dreams of studying Renaissance frescoes in Florence’s
    Uffizi gallery, and plans budget‑friendly backpacking adventures across the Pacific Northwest, all while balancing school commitments and limited finances.
  culinary: Guina Chandler, a health‑conscious home cook who favors Mediterranean dishes such as quinoa tabbouleh with fresh mint, crafts avocado toast with heirloom tomatoes, experiments with seasonal
    vegetable roasts, and enjoys occasional indulgence in a spicy pepperoni pizza from a local pizzeria after a successful gallery‑opening night.
  core: Guina Chandler, a calm, curiosity‑driven art education student who blends disciplined planning with spontaneous creativity, balances compassion with personal solitude, occasionally procrastinates
    on filing taxes despite a meticulous budget, and navigates life with mindful health practices, a love for sketching, music, and community outreach.
background:
  cultural: Guina grew up in Belleville, Illinois, a Midwestern town with strong community ties and a blend of German, Irish, and broader American cultural influences. Her family maintains traditions such
    as annual county fair participation, summer picnics at local parks, and holiday gatherings that emphasize hospitality and modesty. Although not religiously observant, she was raised with an appreciation
    for community service, volunteering at the local church's outreach programs. The culturally diverse environment of the St. Clair County school district exposed her to a range of traditions, fostering
    her commitment to inclusive education. This Midwestern upbringing, combined with her exposure to regional art scenes and community initiatives, shapes her values of cooperation, resilience, and curiosity.
attributes:
  skills: '[''Curriculum development (arts-integrated learning)'', ''Classroom management with a focus on inclusive practices'', ''Empathetic communication and peer mediation'', ''Educational technology
    integration (Google Classroom, interactive whiteboards)'', ''Facilitation of interdisciplinary workshops'', ''After-school program coordination'', ''Visual arts instruction (drawing, painting, mixed
    media)'', ''Creative lesson planning and project-based learning'', ''Time management and flexible scheduling'', ''Mentoring and tutoring'']'
  hobbies: '[''Sketching and watercolor painting'', ''Visiting art galleries and museums'', ''Yoga and mindfulness meditation'', ''Hiking and nature photography'', ''Acoustic guitar playing and songwriting'',
    ''Volunteer work at animal shelter'', ''Book club participation focusing on contemporary literature and philosophy'', ''Creative writing and journaling'', ''Community theater involvement (acting/behind-the-scenes)'',
    ''Culinary experimentation with international recipes'']'
  career_goals: She aims to complete a Bachelor of Arts in Art Education and obtain Illinois state teaching certification within the next three years. Guina plans to transition from her current community-center
    instructor role to a full-time middle-school art teacher, where she can embed art across the curriculum and champion student-centered learning. In the longer term, she aspires to become a curriculum
    specialist or district arts program coordinator, developing culturally responsive arts curricula and advocating for expanded arts funding in underserved schools. She also hopes to launch a community-based
    youth arts collective that provides free workshops and mental-health support through creative expression.
