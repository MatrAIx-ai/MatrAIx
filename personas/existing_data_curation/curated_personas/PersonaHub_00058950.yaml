persona_description: A volunteer and activist working to combat desertification in Asia, specifically the Kubuqi Desert in Inner Mongolia. Kwon founded Future Forest, a non-profit organization, to combat
  desertification in 2001 and has been leading a group of volunteers across four kilometres of desert to a "green wall" of recently planted trees and shrubs aimed at blocking the march of sand and restoring
  the land. Kwon is convinced that if action isn't taken, the march of sand will threaten the viability of the Asian continent.
