    at youth center'',''Tutoring peers in computer basics'',''Cooking soul-food dishes'']'
  career_goals: Devante envisions a future where his love for art and his drive to help others intersect. He aims to study graphic design or visual communication at a community college, with the long-term
    goal of becoming a community arts coordinator who runs youth art workshops in Houston's underserved neighborhoods. He is also drawn to roles in nonprofit outreach, dreaming of creating a safe space
    where teens can express themselves through murals, music, and digital media. If he pursues further education, he sees himself studying social work or counseling to combine creative therapy with direct
    community support. Flexibility, creativity, and impact are the core pillars of his career aspirations.
