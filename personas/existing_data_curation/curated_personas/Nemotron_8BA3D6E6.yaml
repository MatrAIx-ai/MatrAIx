personas:
  professional: An aspiring digital visual artist and content creator, Devante Harris blends graffiti, doodling, and short‑form video editing to craft socially conscious pieces that celebrate community
    empowerment, while volunteering at a neighborhood youth center to mentor peers in basic computer skills.
  sports: A basketball enthusiast who spends afternoons at the local park hoop, Devante Harris cheers for the Houston Rockets, especially player Jalen Green, participates in the Southside Youth Basketball
    League, and keeps a casual fitness routine by shooting free throws after school, though they often forget to stretch, leading to occasional sore knees.
  arts: A graffiti‑inspired illustrator and video editor, Devante Harris draws inspiration from street legends like Seen and TA•KI 183, studies the bold lines of Jean‑Michel Basquiat, and syncs the rhythm
    of Kendrick Lamar’s beats to their animated shorts, channeling community narratives into vibrant murals and online reels.
  travel: A curious regional explorer, Devante Harris has road‑tripped to the San Antonio River Walk for tacos al pastor, experienced New Orleans Mardi Gras with family, dreams of attending the Ghanaian
    Cape Coast Heritage Festival, and typically plans trips on a shoestring budget using public transit and discount youth passes, balancing adventure with school obligations.
  culinary: A budding home chef who perfects soul‑food comfort dishes, Devante Harris loves crafting jalapeño cheddar mac and cheese, spicing collard greens with a homemade hot‑sauce blend, and baking buttery
    cornbread, often cooking alongside family while swapping stories of gospel choir rehearsals, which fuels their love for flavorful, hearty meals.
  core: Devante Harris, a 15‑year‑old graffiti‑savvy storyteller, balances community‑centric art, soulful cooking, and basketball passion with a laid‑back, compassionate vibe and a habit of forgetting homework
    in favor of late‑night sketch sessions.
background:
  cultural: Devante is an African-American teen raised in Houston's vibrant, historically Black neighborhoods. His family's roots trace back to the Southern tradition of gospel music, soulful cooking, and
    strong church community ties, while also embracing the city's multicultural influences—from Mexican street food to Caribbean rhythms. Growing up, he has attended local Juneteenth celebrations, visited
    the Houston Museum of African American Culture, and participated in community art projects that honor Black history and resilience. These experiences shape his identity, infusing his art with themes
    of empowerment, community solidarity, and the dynamic spirit of Houston's Black culture.
