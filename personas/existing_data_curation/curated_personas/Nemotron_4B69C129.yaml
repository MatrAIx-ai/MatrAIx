  career_goals: Although retired from paid work, Debra aims to deepen her involvement in the local community. She plans to volunteer as a coordinator for the senior center’s monthly activity schedule, mentor
    younger volunteers in organizational best practices, and lead a small intergenerational gardening project that connects schoolchildren with seniors. She also hopes to complete an online certification
    in senior health education so she can offer informal workshops on nutrition and medication safety. Long‑term, she would like to compile a family history album and share it at the county historical society.
