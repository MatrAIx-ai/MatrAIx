  hobbies: '[''Abstract painting'', ''Digital art'', ''Playing synthesizer'', ''Reading speculative fiction'', ''Philosophy'', ''Puzzle solving'', ''Strategy board games'', ''Volunteer financial workshops'',
    ''Hiking'']'
  career_goals: He aims to become a senior loan officer or branch manager within the next five years, eventually leading a team that integrates technology and creative education into everyday banking. Michael
    plans to earn a bachelor's degree in finance or business administration while continuing his work, and he hopes to launch his own financial‑wellness consultancy that offers innovative budgeting tools
    and community workshops. He also envisions contributing to policy development that improves consumer credit protections.
