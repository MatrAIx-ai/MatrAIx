  hobbies: '[''Jogging'', ''Cycling'', ''Playing strategy video games'', ''Reading fiction and biographies'', ''Cooking Mexican cuisine'', ''Learning acoustic guitar'', ''Casual soccer with friends'']'
  career_goals: Juan aims to obtain a Commercial Driver's License within the next two years to qualify for higher‑paying freight driving positions. He plans to transition from entry‑level courier work to
    a logistics coordinator role, leveraging his on‑the‑ground experience and college business studies. Over the next five years, he hopes to complete his associate degree in business or supply chain management
    while gaining experience in route optimization software. Long‑term, Juan aspires to launch his own small, eco‑friendly delivery service focused on serving local neighborhoods in Chula Vista and the
    wider San Diego area, emphasizing reliability and community ties.
