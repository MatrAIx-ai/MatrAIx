  hobbies: '[''Gardening'', ''Reading historical fiction and non-fiction'', ''Book club participation'', ''Quilting and knitting'', ''Cooking and baking'', ''After-school tutoring'', ''Nature walks and
    bird-watching'', ''County fairs'', ''Community church events'']'
  career_goals: Erica aims to advance to a supervisory position within her store, such as shift manager or eventually store manager, where she can apply her methodical planning and staff-development skills.
    She also wants to expand her community involvement by leading adult-learning workshops at the local library and coordinating volunteer tutoring programs for elementary students. In the medium term,
    she plans to earn a retail management certification and mentor younger employees, while maintaining a balanced schedule that allows time for her personal interests and gradual transition toward a flexible,
    semi-retired lifestyle.
