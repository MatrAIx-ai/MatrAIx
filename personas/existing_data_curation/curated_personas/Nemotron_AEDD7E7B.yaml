personas:
  professional: Windell Menesses is a budding illustrator who fills sketchbooks with cartoon characters and watercolor forests, eagerly showing their artwork to teachers and friends, while frequently leaving
    crayons scattered around the house and forgetting to tidy up after a creative session.
  sports: Windell Menesses is a forward on the Sprout Strikers U8 soccer squad, spending afternoons dribbling a bright orange ball on the neighborhood field, while also cheering for the River City Runners
    baseball team in summer, and they love to practice ice skating at the local rink during winter months.
  arts: Windell Menesses spends free time drawing cartoons inspired by the whimsical style of 'Mickey Mouse' and the quirky humor of 'SpongeBob SquarePants', paints watercolors of forest scenes reminiscent
    of Beatrix Potter's illustrations, and dances to upbeat tracks like Pharrell Williams' 'Happy' while listening to the soundtrack of 'Toy Story.'
  travel: Windell Menesses loves weekend trips to the nearby Greenleaf State Park for bug hunting, has fond memories of a family beach vacation in Florida, dreams of visiting Disneyland in California next
    summer, and hopes to explore the Grand Canyon's rim before turning ten.
  culinary: Windell Menesses enjoys munching on carrot sticks, apple slices, and cheese pizza, helps whip up peanut butter-and-jelly sandwiches with a plastic knife, loves the sweet taste of watermelon
    cubes, and delights in sprinkling rainbow sprinkles on vanilla cupcakes they occasionally bake with a parent.
  core: Windell Menesses is an inquisitive, art-loving 7-year-old who balances boundless curiosity with a habit of leaving supplies everywhere, finds joy in nature, music, and caring for the family rabbit,
    and approaches life with compassionate spontaneity.
background:
  cultural: Windell is a White American child raised in Gloversville, a small city in Fulton County, New York. His family participates in typical upstate New York traditions such as attending local community
    fairs, celebrating holidays with extended family gatherings, and supporting the town’s public library and school events. The region’s mix of modest industrial heritage and close‑knit neighborhoods influences
    his appreciation for community cooperation and his willingness to help others. While his ancestry includes European roots common to many families in the area, his daily life reflects the inclusive,
    small‑town values of kindness, mutual support, and a love of the outdoors.
