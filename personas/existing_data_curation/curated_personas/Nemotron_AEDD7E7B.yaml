  career_goals: Windell dreams of becoming someone who can combine caring for others with creative expression. He often says he wants to be a wildlife rescue worker who helps injured animals, an artist
    who paints pictures that make people smile, or a teacher who shares stories and encourages curiosity. He envisions a future where he can use his kindness and imagination to make the world a happier,
    safer place.
