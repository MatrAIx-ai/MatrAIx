  career_goals: Kajal aims to transition from first‑line supervision to a senior operations leadership role, such as Operations Manager or Director of Office Services, within a technology‑focused organization.
    She plans to earn a Six Sigma Green Belt and a Project Management Professional (PMP) certification to deepen her process‑improvement expertise. Additionally, she aspires to mentor emerging female leaders,
    champion diversity and inclusion initiatives, and eventually influence company‑wide policies that support flexible work arrangements and work‑life balance. Her long‑term vision includes completing an
    MBA to broaden her strategic perspective while maintaining a strong grounding in data‑driven decision making.
