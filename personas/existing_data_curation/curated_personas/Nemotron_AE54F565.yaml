personas:
  professional: Sherry Mcminn, a certified forklift operator and material moving worker in Boone County, blends hands‑on logistics expertise with a curiosity for creative problem‑solving, often improvising
    load‑sequencing to keep shifts humming while championing a cooperative, art‑infused workplace culture.
  sports: Sherry Mcminn loves group hikes on the Appalachian Trail’s nearby loops, plays casual soccer with coworkers, cheers on the West Virginia Mountaineers football team, and volunteers with the local
    Little League, balancing a love for outdoor activity with community spirit.
  arts: Sherry Mcminn paints watercolor landscapes of rolling hills, strums the banjo at informal jam sessions featuring Doc Watson covers, volunteers at the Clay County Art Gallery, and stars in community
    theater productions of classic Appalachian folk tales, drawing deep inspiration from local festivals and craft circles.
  travel: Sherry Mcminn prefers spontaneous weekend road trips, having already explored the Blue Ridge Parkway, the Great Smoky Mountains, and a music‑filled weekend in Nashville, yet budget constraints
    keep most adventures within a few hours’ drive of home, where they can still soak up new folk scenes.
  culinary: Sherry Mcminn experiments in the kitchen with dishes like smoked trout and wild mushroom risotto, seasoned with locally harvested thyme and honey, enjoys making cornbread with a bourbon glaze,
    and often brings a batch to community potlucks, though they sometimes burn the edges when juggling a forklift shift.
  core: Sherry Mcminn is a curious, socially‑driven logistics worker who balances a love for art and community with a habit of rolling between organized safety checks and spontaneous creative bursts, all
    while wrestling with occasional anxiety.
background:
  cultural: Sherry grew up in Peytona, a small Appalachian community where coal mining, tight‑knit family ties, and folk traditions shape daily life. The white, working‑class culture of Boone County emphasizes
    self‑reliance, storytelling, and a deep appreciation for music and crafts passed down through generations. Church gatherings, community potlucks, and local festivals have fostered her sociable nature
    and her belief in cooperative effort. While the region has faced economic hardship, there’s a growing movement to revitalize its cultural assets, something Sherry actively supports through her art‑related
    hobbies. Her upbringing instilled a practical work ethic, an openness to new ideas, and a sensitivity to the stresses faced by her peers, all of which inform her personal and professional aspirations.
attributes:
  skills: '["forklift operation", "inventory management", "safety compliance", "basic mechanical troubleshooting", "team coordination", "conflict mediation", "adaptability in dynamic environments", "basic
