  hobbies: '["watercolor painting", "banjo playing", "folk‑music festival attendance", "volunteering at local art galleries", "group hiking on Appalachian trails", "photography of rural landscapes", "DIY
    craft workshops", "community theater participation", "experimental regional cooking"]'
  career_goals: Sherry aims to formalize her logistics knowledge by completing her associate degree in supply chain management and earning advanced certifications in forklift safety and inventory control.
    She envisions moving into a supervisory role where she can mentor new workers, shape a more harmonious shift schedule, and introduce flexible, stress‑aware practices that reduce workplace pressure.
    Simultaneously, she hopes to blend her love of art with her career by spearheading a community‑focused “Art in the Warehouse” program that showcases local Appalachian crafts and provides creative outlets
    for colleagues. Long‑term, she dreams of one day opening a small, cooperative logistics hub that doubles as a venue for rotating art exhibitions and community workshops.
