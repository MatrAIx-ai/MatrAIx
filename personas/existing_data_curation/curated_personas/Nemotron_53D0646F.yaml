    ''Team coordination and shift management'']'
  hobbies: '[''Cooking Peruvian cuisine'', ''Watching and discussing soccer'', ''Playing acoustic guitar'', ''Salsa and bachata dancing'', ''Walking along the Hudson River Park'', ''Volunteering at community/church
    events'', ''Reading mystery and crime novels'', ''Occasional poker games with friends'']'
  career_goals: Marcelino aspires to advance within the casino security hierarchy, aiming for a supervisory or manager position where he can mentor newer guards and influence security policy. He plans to
    obtain formal certifications such as Certified Protection Officer (CPO) and Emergency Management Professional (EMP) to bolster his credentials. Over the next five years, he hopes to lead a security
    team, oversee training programs, and contribute to the implementation of advanced surveillance technologies. Ultimately, he envisions a smooth transition into a part‑time consulting role that leverages
    his extensive field experience while allowing more time for family and community involvement.
