personas:
  professional: Marcelino Astudillo, a seasoned casino security professional, leverages meticulous incident reporting, bilingual communication, and advanced CCTV expertise while applying their organized,
    reliable nature and sociable, mentoring mindset to lead security teams and drive policy improvements.
  sports: Marcelino Astudillo, an avid soccer enthusiast, follows the national team of their homeland and the New York Red Bulls, attends local matches at Red Bull Arena, supports the New Jersey Devils
    during hockey season, and maintains fitness by walking the Hudson River waterfront and playing in a community rec soccer league.
  arts: Marcelino Astudillo, a passionate acoustic guitarist, delights in performing Andean folk tunes by Los Kjarkas and Latin classics by Juan Luis Guerra, joins salsa and bachata nights to dance to Tito
    Puente, and unwinds with mystery novels by Agatha Christie, showcasing a culturally rich yet modern artistic palate.
  travel: Marcelino Astudillo, a methodical traveler, prefers organized itineraries that blend cultural immersion and relaxation, having explored coastal towns of their ancestral country, trekked to Machu
    Picchu, taken road trips to the Catskills, and regularly visits New York City for theater, while dreaming of a culinary tour of Spain’s Andalusian cities.
  culinary: Marcelino Astudillo, an enthusiastic home chef, expertly prepares ceviche with fresh fish, lime, and ají amarillo, layers causa with avocado and tuna, sears lomo saltado using soy sauce and
    peppers, and frequently experiments with quinoa and aji pepper sauces, though they sometimes over‑season dishes when multitasking during large gatherings.
  core: Marcelino Astudillo, a meticulous security veteran who balances disciplined budgeting, community‑focused cooking, and lively soccer fandom with a penchant for late‑night mystery novels, embodies
    organized reliability tempered by occasional indulgent quirks.
background:
  cultural: Marcelino is a first‑generation Peruvian American who grew up in a close‑knit family that emphasized traditional values, Catholic faith, and strong community ties. He maintains a vivid connection
    to his heritage through language, cuisine, and cultural celebrations such as Día de la Canción Criolla and Peruvian Independence Day. In West New York, he is part of a vibrant Latino community that
    blends Peruvian customs with the diverse cultural tapestry of the New York metropolitan area. His upbringing instilled a sense of "familismo"—placing family and communal harmony above personal ambition—while
    his experience in the U.S. workforce has integrated pragmatic, methodical approaches to everyday life. This dual perspective informs his respectful, cooperative attitude and his willingness to bridge
    cultural gaps in both his professional and personal interactions.
attributes:
  skills: '[''CCTV monitoring and analysis'', ''Behavioral observation and threat detection'', ''Conflict de‑escalation'', ''Emergency response and first aid'', ''Incident reporting and documentation'',
