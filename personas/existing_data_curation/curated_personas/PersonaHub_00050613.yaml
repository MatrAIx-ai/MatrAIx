persona_description: A historian who is interested in the history of the Korean Revolution and the founding of the Association for the Restoration of the Fatherland (ARF). The person is particularly interested
  in the role of the ARF in the national liberation struggle and the expansion of its organization during the anti-Japanese revolution. They are knowledgeable about the unique idea of the united front and
  the historic event it represented, as well as the broad-mindedness and magnanimity of the President who led the nationalists, religious men, and workers to support the Ten-point Program of the ARF.
