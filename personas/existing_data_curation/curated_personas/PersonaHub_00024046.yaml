persona_description: A health professional who is interested in rare diseases and their treatments, particularly those related to vision and eye health. They may be a physician, optometrist, or ophthalmologist,
  and are seeking information on the latest research and treatments for keratomalacia, a rare eye condition that can lead to blindness if left untreated. They may also be interested in learning about the
  prevalence and causes of vitamin A deficiency, as well as the impact of non-selective general malnutrition on vitamin A deficiency and keratomalacia in developing countries.
