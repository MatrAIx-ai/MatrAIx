  hobbies: '[''basketball'', ''hip hop dance'', ''freestyle rap'', ''TikTok content creation'', ''cooking family recipes'', ''church choir'', ''community event volunteering'', ''bayou exploration'', ''reading
    teen novels'', ''journaling'', ''watching drama series'']'
  career_goals: Isabel aims to complete her GED within the next year and enroll in a cosmetology program at a nearby vocational school, with the long‑term goal of launching a mobile beauty and wellness
    service that caters to the youth in Acadia Parish. She also hopes to earn a scholarship for community college to study public health, enabling her to become a community health outreach worker focused
    on mental‑health support for teens. By building a strong social‑media presence, she plans to inspire other Black girls in rural Louisiana to pursue education and self‑expression. Ultimately, she envisions
    owning a small business that blends beauty services with community mentorship.
