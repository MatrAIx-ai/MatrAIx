personas:
  professional: Isabel Cox, a 17‑year‑old aspiring cosmetology student, leverages her knack for reading social cues to organize pop‑up beauty sessions at local events while using TikTok to champion teen
    wellness and is planning to launch a mobile beauty and wellness service that also offers mental‑health outreach for her peers.
  sports: Isabel Cox, a basketball enthusiast, spends weekends shooting hoops at the neighborhood park, roots for the LSU Tigers and the New Orleans Pelicans, and prefers spontaneous pick‑up games for fitness
    over structured workouts, balancing her competitive drive with a laid‑back approach to training.
  arts: Isabel Cox channels her energy into hip‑hop and R&B dance routines inspired by artists such as Megan Thee Stallion and Cardi B, crafts freestyle rap verses for TikTok, and unwinds by binge‑watching
    drama series like Euphoria, drawing creative fuel from these pop‑culture icons.
  travel: Isabel Cox loves spontaneous weekend excursions to the nearby bayous, dreams of attending a dance workshop in New Orleans and a summer camp in Austin, Texas, and prefers budget‑friendly road trips
    that let her capture TikTok moments while juggling school responsibilities.
  culinary: Isabel Cox enjoys cooking family staples like gumbo with okra and andouille sausage, jambalaya with shrimp and smoked turkey, and pairs them with homemade cornbread, often improvising with fresh
    herbs and hot sauce to add a personal twist to each dish.
  core: Isabel Cox is a charismatic teen who blends street basketball and TikTok fame with community service, yet habitually forgets homework deadlines and worries about future plans.
background:
  cultural: Isabel is a Black teenager raised in Morse, a small community in Acadia Parish, Louisiana. Her family blends Southern African‑American traditions with the regional Acadian (Cajun) culture, celebrating
    church gatherings, local festivals like Mardi Gras, and family meals featuring Creole and soul food dishes. Growing up in a rural setting, she has been exposed to both the close‑knit Black community
    of the South and the broader multicultural heritage of southwestern Louisiana, giving her a strong sense of identity rooted in resilience, faith, and community solidarity.
attributes:
  skills: '[''interpersonal communication'', ''conflict mediation'', ''event coordination'', ''improvisational dance'', ''basketball'', ''basic cooking'', ''first aid'', ''smartphone proficiency'', ''social
