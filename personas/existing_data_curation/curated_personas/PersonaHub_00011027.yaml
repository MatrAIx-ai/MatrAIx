persona_description: Elizabeth Elliott, Professor of Paediatrics and Child Health, Westmead Children's Hospital, is a medical expert who has dedicated her career to the prevention and treatment of fetal
  alcohol spectrum disorder (FASD) among Indigenous women and their children. She is a leading authority in the field of child health and has made significant contributions to the understanding of the medical
  and psychological effects of alcohol exposure during pregnancy. Elizabeth's expertise and dedication to her work have been instrumental in reducing alcohol abuse among Indigenous communities, and she
  is now focused on providing support and education to women and FASD affected children and adults.
