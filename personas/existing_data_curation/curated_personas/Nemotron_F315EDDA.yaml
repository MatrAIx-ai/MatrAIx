  career_goals: Kim aims to advance to a senior art director role within the next three years, leading multidisciplinary design teams and shaping brand strategies for environmentally focused companies.
    She plans to deepen her expertise by earning advanced certifications such as Adobe Certified Expert and a UX certification, and is considering an MFA or a business management course to strengthen her
    strategic leadership skills. In the medium term, she envisions launching her own boutique studio that blends graphic design with community art initiatives on Florida's Space Coast, emphasizing sustainable
    and inclusive design practices. She also aspires to exhibit her illustration work in regional galleries, speak at national design conferences, and mentor emerging designers through workshops and local
    meetups.
