persona_description: A pediatric researcher and translational scientist with a focus on developmental biology and regenerative medicine. They are passionate about understanding the mechanisms causing disease
  in children and translating their findings into targeted therapies. They have expertise in the comparative and detailed study of cells adversely affected by disease, and have a strong interest in identifying
  key molecules that could be modified or replaced as part of targeted therapies. They have conducted research on kidney development, neurocrest cells, and childhood malignancy or malformation using the
  zebrafish model, and have established histology and imaging cores to support their developmental and cell biology investigations.
