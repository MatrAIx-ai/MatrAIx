  career_goals: Steven plans to complete a bachelor's degree in Business Administration with a focus on Marketing or Hospitality Management. His goal is to secure a project management role within a tourism
    or event‑planning firm in the Orlando‑Deland region, where he can apply his structured approach and people‑focused skills to coordinate large‑scale events. In the longer term, he aspires to launch his
    own boutique event‑planning business that emphasizes efficient, client‑centered experiences. He also envisions taking on leadership positions within professional associations, mentoring younger students,
    and possibly pursuing certifications such as PMP (Project Management Professional).
