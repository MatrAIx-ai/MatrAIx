personas:
  professional: Steven Hommel, an aspiring event‑management enthusiast, leverages their methodical planning, polished public‑speaking, and natural charisma to design campus events with laser‑focused precision,
    balancing structural rigor with a sociable flair that keeps participants engaged.
  sports: Steven Hommel, a weekend intramural soccer player who also enjoys beach volleyball, proudly roots for the Orlando Magic in the NBA and the Miami Dolphins in the NFL, and is a member of the university’s
    recreational soccer club, balancing competitive play with a laid‑back beach fitness routine that they maintain each summer.
  arts: Steven Hommel, a frequent attendee of live music venues, fills their evenings with shows by Tame Impala, Billie Eilish, and local indie band Against The Current, while also devouring non‑fiction
    works like Simon Sinek’s ‘Start With Why,’ and they often pair craft‑brew tastings with curated soundtrack playlists that shape their creative outlook.
  travel: Steven Hommel, who plans weekend getaways with the same checklist mindset they apply to events, regularly explores Florida’s coastline from Clearwater Beach to Key Largo for snorkeling, dreams
    of backpacking through the Bahamas and Iceland’s icy landscapes, yet prefers trips that fit within a modest student budget.
  culinary: Steven Hommel, a budding home chef, whips up quick yet flavorful dishes such as shrimp tacos with mango salsa, garlic‑lemon pasta, and avocado toast topped with smoked salmon, pairing them with
    craft beers like Dogfish Head 90‑Minute IPA, and often shares their creations on Instagram to showcase simple culinary flair.
  core: Steven Hommel blends meticulous planning with a gregarious spirit, turning every campus event, soccer match, and kitchen experiment into a structured yet lively experience, even if they sometimes
    stay up too late gaming and forget to log their daily water intake.
background:
  cultural: Steven grew up in Deland, a suburban community in central Florida, within a middle‑class, predominantly white family that values education, hard work, and community involvement. His upbringing
    blended Southern hospitality with the relaxed, tourism‑driven lifestyle of the Sunshine State—family outings to the beach, participation in local festivals, and a strong emphasis on neighborly relationships.
    He was raised in a Protestant household that encouraged civic engagement, and he attended public schools where he formed lasting friendships. The multicultural environment of central Florida, with its
    diverse residents and visitors, has shaped his open‑minded outlook while reinforcing a practical, independent American ethos.
