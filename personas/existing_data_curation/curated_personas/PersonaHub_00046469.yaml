persona_description: A behavioral scientist who specializes in the study of human behavior and its impact on our lives. They have a keen interest in the formation of self rules and the ways in which these
  rules guide our behavior in specific contexts. They are also aware of the hidden negative side effect of following these rules, known as rule "insensitivity". They are skilled at recognizing when to hold
  onto their rules lightly and when to break them in order to be more compassionate. They have a deep understanding of the importance of being present to what is happening in the moment and the impact of
  verbally self constructed rules on our behavior.
