personas:
  professional: Jason Morrison, a retired maintenance and operations specialist with three decades of coastal industrial experience, leverages his methodical approach to preventative maintenance, hands‑on
    carpentry, and disciplined budget oversight to mentor younger retirees and volunteer as a community safety inspector.
  sports: Jason Morrison spends Saturday mornings on the greens at Milton Country Club, playing a steady round of golf while cheering for the Houston Astros and Houston Texans, and joins the local veterans’
    softball league for a casual weekly game.
  arts: Jason Morrison delights in classic country tunes from Johnny Cash and Willie Nelson, attends the Houston Symphony’s seasonal concerts, and collects vintage woodworking magazines, finding inspiration
    for his furniture projects in the works of folk artists like Auguste Rodin’s sculptures.
  travel: Jason Morrison prefers well‑planned road trips, often driving the scenic Gulf Coast Highway to historic towns such as Galveston and Natchez, and has a bucket‑list that includes the Grand Canyon,
    Big Bend National Park, and a leisurely cruise through the Florida Keys with his wife.
  culinary: Jason Morrison enjoys cooking fresh Gulf shrimp in a garlic‑lemon butter sauce, growing heirloom tomatoes for homemade salsa, and perfecting his lemon‑rosemary chicken, while his woodworking
    hobby earns him occasional grants to host community cooking demos featuring gumbo and grilled fish.
  core: Jason Morrison blends a regimented routine of early‑morning fishing, meticulous woodworking, and dependable volunteer service, all while battling a habit of forgetting to water his garden and a
    penchant for polishing his fishing rods to a mirror shine.
background:
  cultural: Jason was raised in a middle‑class Southern family with deep roots in the Gulf Coast region, tracing ancestry back to English and Irish immigrants who settled in the Deep South. His upbringing
    in a traditional Protestant household emphasized hard work, self‑reliance, community service, and family loyalty. The cultural fabric of the Florida panhandle—close‑knit neighborhoods, a love of outdoor
    recreation, and respect for local customs—has shaped his values and daily rhythms. He celebrates holidays with classic Southern cuisine such as fried shrimp, collard greens, and sweet tea, and maintains
    long‑standing ties to his church, veteran community, and local historical societies.
attributes:
  skills: '[''Facility maintenance management'', ''Preventative maintenance planning'', ''Team leadership'', ''Budget and financial administration'', ''Carpentry and woodworking'', ''Basic electrical and
