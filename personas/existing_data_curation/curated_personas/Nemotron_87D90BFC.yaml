  hobbies: '[''Sketching'', ''Visiting Art Galleries and Museums'', ''Reading (philosophy, contemporary fiction)'', ''Listening to Jazz and Classical Music'', ''Gardening'', ''Nature Trail Walking'', ''Photography'',
    ''Writing Reflective Blog Posts on Art and Education'']'
  career_goals: Andrew aims to establish an interdisciplinary arts program at his school that allows students to explore literature, visual arts, and digital media through independent projects. He aspires
    to become a department chair or curriculum coordinator to influence school‑wide policies that prioritize flexibility and student‑centered learning. Over the next five years, he plans to earn a master’s
    degree in curriculum and instruction via an online program and lead professional development workshops on creative teaching methods. Long‑term, he envisions partnering with local arts organizations
    in Bucks County to create after‑school workshops and community exhibitions, linking the school with the region’s cultural scene.
