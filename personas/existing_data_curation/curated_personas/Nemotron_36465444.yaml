personas:
  professional: Lisa Jensen is a budding communications student who channels her karaoke flair, improv experience, and knack for crafting viral TikTok videos into prototype social media campaigns that spotlight
    mental‑health resources for her peers, balancing a curiosity for new trends with a pragmatic focus on measurable engagement while navigating occasional disorganization in deadline management.
  sports: Lisa Jensen shoots hoops with the campus intramural basketball team on Thursday nights, cheers loudly for the Golden State Warriors during NBA season, plays forward for the Student Recreation
    Club's soccer squad on weekends, and uses the energetic atmosphere of a Saturday morning spin class at the local gym to boost her mood after anxiety spikes.
  arts: Lisa Jensen curates playlists that blend Billie Eilish's moody pop, Lizzo's empowering anthems, and classic indie folk from Fleet Foxes, performs improv sketches with the community theater troupe
    StageLights, and draws inspiration from Greta Gerwig's expressive storytelling to shape her own vlogs and short videos.
  travel: Lisa Jensen prefers spontaneous weekend getaways to nearby coastal towns like Santa Barbara, savors the buzz of a college‑town pub crawl in Austin, and dreams of backpacking through Berlin during
    the Summer Beats Festival, all while using a travel app to snag last‑minute hostel deals that fit her modest student budget.
  culinary: Lisa Jensen—who rates her cooking as an enthusiastic beginner—frequently whips up avocado toast drizzled with sriracha, hearty ramen bowls with soft‑boiled eggs, experimental matcha‑latte smoothies,
    and treats herself to late‑night pizza slices topped with caramelized onions during group study sessions, while often ordering takeout when deadlines loom.
  core: Lisa Jensen is a socially magnetic 18‑year‑old who transforms anxiety into creative advocacy, yet often forgets deadlines, binge‑watches karaoke videos, and hoards caffeine to fuel her endless chatter.
background:
  cultural: Lisa comes from a white Midwestern family with German‑Scandinavian roots, reflected in her surname Jensen. Growing up in Saginaw, Michigan—a city shaped by the automotive and manufacturing legacy
    of the Rust Belt—she absorbed a blend of working‑class resilience and community‑oriented values typical of the region. Local traditions such as county fairs, high‑school football games, and church gatherings
    fostered her sociable spirit, while the modest, pragmatic ethos of the Midwest guided her balanced approach to curiosity and practicality.
attributes:
