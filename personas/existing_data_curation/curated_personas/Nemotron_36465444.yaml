  hobbies: '[''Karaoke'', ''Improv theater'', ''Live concerts'', ''Vlogging and short‑form video creation'', ''Photography'', ''Journaling'', ''Yoga and mindfulness'', ''Volunteer event organizing'']'
  career_goals: Lisa intends to pursue a bachelor's degree in communications or marketing while building a portfolio of digital content that highlights mental-health awareness for college students. She
    aspires to work as a community manager or social media strategist for a nonprofit or lifestyle brand that values authentic connection. In the longer term, she hopes to launch her own online platform
    or youth outreach program that combines creative storytelling with resources for coping with anxiety, allowing her to use her sociable nature and advocacy drive to make a tangible impact on her peers.
