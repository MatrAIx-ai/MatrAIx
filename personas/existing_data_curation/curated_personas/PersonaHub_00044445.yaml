persona_description: A paleoanthropologist who specializes in the study of Paleoindian artifacts, particularly those found at the Ready site in western Illinois. His research interests include the typological
  comparison of artifacts with western Clovis bifaces and bifacial pre-forms, the lithic raw material sources and use, and the dating of the artifacts using radiocarbon dating. He is particularly interested
  in the Early Paleoindian period and the chronology of the artifacts found at the site. He has a deep understanding of the lithic raw material sources and their availability in the region, as well as the
  techniques used to extract and analyze them. He is also knowledgeable about the lithic raw material use and the impact of the artifacts on the local culture and society.
