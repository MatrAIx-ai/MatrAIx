personas:
  professional: Brandon Cockrell, a veteran fast-food specialist poised to become a shift manager, leverages three decades of POS expertise, inventory control, and staff training while channeling a practical
    curiosity into lean workflow experiments; their competitive streak pushes them to beat neighboring outlets' performance metrics, and their healthy skepticism ensures every schedule change or cost-saving
    measure is double-checked before implementation.
  sports: Brandon Cockrell enjoys low-key athletics centered on fishing at Cheney Reservoir and weekend walks, while cheering on the Kansas City Chiefs, Kansas City Royals, and Wichita State Shockers; they
    belong to a senior men's fishing club that meets monthly, occasionally compete in local senior fishing tournaments, and fit gardening and light weight-lifting into their routine, but they skip formal
    gym sessions, preferring the practical fitness of tending their vegetable plot.
  arts: Brandon Cockrell immerses themselves in historical nonfiction and crossword puzzles, finds solace in the classic storytelling of Bob Dylan, the folk narratives of Marty Robbins, and the puzzle craftsmanship
    of Will Shortz, occasionally attends a Kansas City Symphony concert, and displays a quiet appreciation for early Western films starring John Wayne, all of which inform their creative woodworking designs.
  travel: Brandon Cockrell prefers carefully planned road trips that blend relaxation with modest adventure, having driven to Yellowstone and the Grand Canyon, explored the jazz scene in New Orleans, and
    visited Chicago's museums; they dream of a Pacific Northwest salmon-fishing expedition and a short stay in New York to see a Broadway show, but budget constraints keep most journeys within the U.S.
    Midwest and pre-booked discount lodging.
  culinary: Brandon Cockrell, an intermediate home cook, delights in Midwestern comfort dishes such as chicken-fried steak, homemade chili, and roasted garden vegetables, often seasoning meatloaf with chipotle
    for a modern twist, while their garden yields fresh zucchini and tomatoes that star in quick sautéed side dishes; they relish deep-fried butter and funnel cake at the fair but balance these indulgences
    with a disciplined weekly meal plan.
  core: Brandon Cockrell, a pragmatic yet curious 61-year-old fast-food veteran, blends disciplined thrift, competitive drive, and hands-on hobbies to chart a steady path toward managing and eventually
    owning a small diner.
background:
  cultural: Brandon grew up in a white, middle‑class family in the Midwest and has lived most of his life in Wichita, Kansas. His upbringing emphasized self‑reliance, hard work, and community involvement,
    with strong ties to local churches and neighborhood events. The regional culture—characterized by a blend of agricultural roots, modest Midwestern values, and a love of simple, hearty food—shapes his
    outlook and daily habits. He values practicality, modesty, and a balanced life that mixes work responsibilities with family time and community participation.
attributes:
  skills: '["Customer service", "Cash handling", "POS system operation", "Food safety and sanitation", "Inventory management", "Staff scheduling", "Equipment maintenance", "Training and mentoring", "Conflict
    resolution", "Time management"]'
  hobbies: '["Woodworking", "Vegetable gardening", "Fishing", "Attending the Sedgwick County Fair", "Reading historical non-fiction", "Crossword puzzles", "Card games (bridge/whist)"]'
  career_goals: At 61, Brandon wants to transition to a supervisory role where he can use his practical knowledge to improve operations. He aims to become a shift manager within the next year and eventually
    move into an assistant manager position, with the long‑term ambition of opening a small, family‑run diner that blends classic Midwestern comfort food with a few modern twists he’s curious about. He
    also plans to obtain a ServSafe Manager certification and attend a local small‑business workshop to prepare for eventual ownership.
