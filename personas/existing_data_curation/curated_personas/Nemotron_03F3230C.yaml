  career_goals: Although retired from formal employment, Mary Ann aims to deepen her impact on the Kansas City community. She plans to secure a certification in community arts administration to formally
    lead a seniors‑focused art program at the local community center. She also aspires to complete a self‑directed study in genealogy, culminating in a published family history that connects local residents
    to the region’s past. Additionally, she hopes to mentor younger volunteers, helping them develop organizational and fundraising skills while fostering an inclusive atmosphere.
