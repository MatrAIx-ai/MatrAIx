persona_description: A teacher or counselor who works with students with challenging behaviors, particularly those who exhibit truancy, disruptive behavior, and social issues. The individual is likely to
  have experience with different approaches to teaching and managing behavior, including time-out strategies, token boards, and other behavioral interventions. They are knowledgeable about the literature
  on teaching and understanding social skills, and have experience with using these skills to help students meet their needs. The individual is also likely to be familiar with the challenges faced by students
  with behavior challenges and the resources available to support them.
