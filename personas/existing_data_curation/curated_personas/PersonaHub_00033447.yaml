persona_description: A social scientist who is interested in the relationship between media, press, and the Olympic and Paralympic Games. They are particularly interested in the history of media engagement
  with these events and the ways in which they can be used to investigate questions related to communication in the digital age. They are looking for resources and information on the relationship between
  the press, broadcasters, and the International Olympic Committee (IOC), and are interested in the role of journalists in the Olympic movement. They are also interested in the history of the media's engagement
  with the Paralympic Games and how it has changed over time.
