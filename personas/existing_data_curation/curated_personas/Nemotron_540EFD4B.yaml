personas:
  professional: April Taylor, a 12‑year‑old aspiring librarian, volunteers at the local public library where they methodically shelve books by the Dewey Decimal System, showcase an innate organization and
    love for routine, and channel their fascination with fantasy worlds into school research projects, demonstrating reliable attention to detail and a budding talent for cataloguing information.
  sports: April Taylor plays defender for the Eagle Academy U12 Girls Soccer team, thriving on predictable drills and set‑piece routines practiced twice a week, and idolizes the disciplined play of the
    U.S. Women’s National Team as well as the strategic midfield of Manchester United, often watching matches on Saturdays to study formation patterns and improve their own game.
  arts: April Taylor practices piano for half an hour each day, mastering pieces like Beethoven’s “Für Elise” and Einaudi’s “Nuvole Bianche” by following a strict lesson plan, while also crafting friendship
    bracelets using patterned bead sequences and rereading the “Harry Potter” series in the same order for comfort, and they attend weekend community theater to watch performances by Lin‑Manuel Miranda
    in ‘Hamilton’.
  travel: April Taylor prefers vacations that follow a detailed itinerary, such as the family road trip to Washington, D.C., where they visited the National Museum of Natural History on a pre‑planned schedule,
    a repeat weekend at the nearby state park for hiking the same trail, and a summer stay at an Orlando, Florida resort, carefully mapping out theme‑park rides; they dream of a guided tour of Rome, Italy,
    to see the Colosseum and Vatican in a structured group setting.
  culinary: April Taylor loves baking measured recipes, especially chocolate chip cookies using exactly 120 g of flour, 60 g of butter, and a precise pinch of sea salt, and often adds fresh basil from their
    herb garden to make herb‑infused lemonade; they can become overly meticulous, adjusting cooking times by seconds, which sometimes leads to slightly over‑browned cookies.
  core: April Taylor is a routine‑driven 12‑year‑old who balances structured hobbies with anxious introspection, turning meticulous journaling, piano practice, and soccer drills into a comforting rhythm
    while occasionally succumbing to impulsive splurges on craft supplies.
background:
  cultural: April was born and raised in Louisville, Kentucky, into a middle-class family of European ancestry that embodies many aspects of Southern Appalachian and Midwestern culture. Her household observes
    traditional values such as hospitality, community involvement, and a respect for routine, which are reinforced by regular family gatherings, church attendance (her family is Baptist), and participation
    in local events like the Kentucky Derby festivities and regional bluegrass music festivals. Louisville’s blend of urban and Southern charm has exposed her to a diverse school environment, yet her home
    life is grounded in the modest, practical sensibilities of the American South—comfort food like fried chicken and biscuits, a love for outdoor activities, and a strong emphasis on education and punctuality.
    These cultural influences shape her appreciation for tradition, order, and community service.
