  career_goals: April dreams of a career that blends her love of routine, practical problem-solving, and caring for others. She is fascinated by animals and hopes to become a veterinarian or veterinary
    technician, envisioning a future where she can apply her methodical nature to diagnose and treat pets in a predictable clinical environment. At the same time, she is drawn to the idea of working as
    a librarian, a role that would let her organize information, maintain orderly collections, and create quiet, structured spaces for community members. Her long-term ambition is to pursue a degree in
    biological sciences or library science, leading to a stable profession that offers clear daily schedules and the chance to help others in a systematic way.
