  hobbies: '[''Wildlife Photography'', ''Sketching/Illustration'', ''Visiting Art Galleries'', ''Community Theater Participation'', ''Open‑Mic & Music Events'', ''Reading Sci‑Fi & Fantasy'', ''Hiking &
    Nature Exploration'', ''Cooking International Cuisine'', ''Volunteer Work at Animal Shelters'', ''Organizing Fundraising Events'', ''Meditation & Journaling'', ''Yoga'']'
  career_goals: In the short term, Sherman plans to complete a bachelor's degree in zoology or wildlife management while continuing his work as an animal caretaker. He aims to take on supervisory responsibilities,
    leading a team at a larger facility such as a zoo or wildlife sanctuary, and to develop programs that integrate art and education into animal welfare. Long‑term, he envisions founding a community‑oriented
    nonprofit that blends conservation, cultural storytelling, and artistic expression, offering interactive workshops, photo‑essay exhibitions, and policy advocacy. He also hopes to publish a photographic
    series that highlights rescued animals' stories, using his sociable talent to mobilize public support and drive systemic change.
