personas:
  professional: Derick Gil is a seasoned behavioral-health clinician who blends rigorous evidence-based counseling—motivational interviewing, CBT, trauma-informed care—with expressive-arts techniques, leveraging
    their imaginative curiosity and sociable energy to engage groups, while their balanced organization ensures meticulous outcome measurement and data-driven program evaluation.
  sports: Derick Gil roots for the Houston Astros, Texans, and Rockets, joins the Hill Country Trail Club for weekend hikes, participates in a co-ed Sunday basketball league at a community center, and alternates
    these activities with salsa-dance cardio classes, reflecting their sociable, energetic nature and a preference for group-oriented fitness that balances cardio with camaraderie.
  arts: Derick Gil immerses themselves in oil painting inspired by Frida Kahlo’s bold colors and Vincent van Gogh’s expressive brushstrokes, strings an acoustic guitar to play John Mayer’s soulful riffs,
    dances salsa and cumbia to the rhythms of Celia Cruz and Carlos Vives, and hones spontaneous storytelling at the Second City Houston improv workshops, feeding their imaginative curiosity and love for
    collaborative creative expression.
  travel: Derick Gil blends spontaneous weekend road trips with meticulously planned cultural pilgrimages, having explored the Hill Country’s vineyards, trekked the Colorado Rockies, sampled street food
    in Oaxaca, wandered the galleries of Barcelona, and scheduled annual visits to Austin’s music festivals, all while balancing family time and a modest travel budget.
  culinary: Derick Gil experiments with Mexican-fusion cuisine at an intermediate skill level, frequently whipping up chipotle-marinated pork tacos with pineapple salsa, crafting cumin-infused mole over
    hominy, and garnish dishes with fresh cilantro, epazote, and charred corn, while they often over-salt a sauce in the pursuit of bold flavor and keep a well-worn notebook of successful and failed recipes.
  core: Derick Gil channels their boundless curiosity and sociable spirit into a career that fuses data-driven counseling with expressive arts, while juggling a love for music, painting, and spontaneous
    salsa nights that sometimes leave paint on the couch.
background:
  cultural: Derick is a second‑generation Mexican‑American who grew up in a bilingual household in the Houston metro area. Family and community (familismo) are central to his identity, and he celebrates
    traditions such as Día de los Muertos, Cinco de Mayo, and religious holidays with a blend of Catholic and personal spiritual practices. Fluent in Spanish, he often uses culturally resonant metaphors,
    music, and food in therapy to build rapport with Mexican‑American clients. His heritage informs his commitment to serving underserved populations and incorporating cultural strengths into his counseling
    approach.
attributes:
  skills: '[''Motivational Interviewing'', ''Cognitive Behavioral Therapy'', ''Trauma-Informed Care'', ''Group Therapy Facilitation'', ''Crisis Intervention'', ''Case Management'', ''Data Analysis'', ''Research
    Methodology'', ''Program Development'', ''Grant Writing'', ''Expressive Arts Integration'', ''Cultural Competency (Mexican-American)'', ''Public Speaking'']'
  hobbies: '[''Oil painting'', ''Sketching'', ''Playing acoustic guitar'', ''Salsa and cumbia dancing'', ''Cooking Mexican fusion dishes'', ''Reading science-fiction novels'', ''Hiking in Texas parks'',
    ''Volunteering at community youth centers'', ''Attending improv theater workshops'', ''Data visualization in Python'', ''Gardening'']'
  career_goals: Derick aims to become a certified clinical supervisor and eventually direct a regional behavioral‑health center serving the Greater Houston area. He wishes to develop a culturally tailored
    treatment model that blends evidence‑based counseling with expressive‑arts therapy for Mexican‑American populations. He plans to publish research on the effectiveness of art‑integrated interventions,
    secure grant funding for community‑based programs, and mentor emerging counselors. Long‑term, he aspires to influence state policy to expand access to substance‑abuse services for underserved communities.
