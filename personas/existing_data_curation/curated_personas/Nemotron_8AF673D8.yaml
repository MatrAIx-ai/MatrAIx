  hobbies: '[''Gardening'', ''Cooking traditional Mexican dishes'', ''Reading historical fiction and textile history'', ''Quilting and decorative embroidery'', ''Volunteering to teach sewing'', ''Nature
    walks and birdwatching'']'
  career_goals: Yessenia aims to transform her home‑based workshop into a modest boutique studio in Lake in the Hills, offering both made‑to‑order dresses and a curated line of eco‑friendly apparel that
    blends contemporary styles with Mexican heritage designs. She plans to launch an online storefront to reach a broader audience, and she aspires to mentor a small group of apprentices, sharing her craftsmanship
    and fostering a community of skilled seamstresses. Long‑term, she hopes to participate in regional craft fairs and collaborate with local designers on limited‑edition collections that showcase sustainable
    textile innovations.
