personas:
  professional: Yessenia Feliz, a meticulous tailor and dressmaker, runs a home‑based workshop where she blends classic pattern drafting with emerging eco‑friendly fabrics, leveraging her organized project
    timelines, bilingual client consultations, and rigorous quality‑control checkpoints to deliver flawless custom garments while planning a future boutique studio in Lake in the Hills.
  sports: Yessenia Feliz enjoys leisurely weekend walks through nearby nature preserves with the Lake in the Hills Nature Walkers club, follows the Chicago Cubs and Chicago Bulls as her favorite professional
    teams, and occasionally plays pickleball at the community center for light exercise.
  arts: Yessenia Feliz draws creative inspiration from the textile histories of Faith Ringgold and the vibrant murals of Diego Rivera, listens to Yo‑Yo Ma’s cello recordings while sewing, and regularly
    attends local gallery openings showcasing contemporary fabric artists such as Pamella Haines.
  travel: Yessenia Feliz prefers low‑key, culturally immersive trips, having explored Oaxaca’s bustling markets for hand‑woven textiles, taken a weekend retreat to Sedona’s red‑rock trails, and planning
    a future visit to Barcelona’s sustainable fashion district.
  culinary: Yessenia Feliz cooks traditional Mexican meals like chiles rellenos, pozole, and homemade corn tortillas using fresh vegetables from her garden, fragrant cilantro, roasted tomatillos, and occasionally
    experiments with quinoa salads and hibiscus agua fresca for a refreshing twist.
  core: Yessenia Feliz blends methodical craftsmanship, quiet curiosity, and a love for sustainable living into a life centered on bespoke tailoring, community teaching, and thoughtful garden‑fresh cooking.
background:
  cultural: Yessenia was raised in a Mexican household where family gatherings centered around food, music, and vibrant textiles. Her grandparents taught her to recognize and appreciate traditional Mexican
    fabrics such as rebozo and serape, influencing her love for rich colors and intricate patterns. She incorporates these cultural elements into her designs, often using embroidery motifs like floral vines,
    solar symbols, and folk‑art borders. While fully integrated into the Midwestern community of Lake in the Hills, she maintains strong ties to her Mexican heritage through language, cuisine, and participation
    in cultural festivals, which enrich both her personal life and professional aesthetic.
attributes:
  skills: '[''Custom garment construction'', ''Pattern drafting and grading'', ''Fabric selection and sourcing'', ''Hand sewing and machine embroidery'', ''Alterations and fit adjustments'', ''Inventory
