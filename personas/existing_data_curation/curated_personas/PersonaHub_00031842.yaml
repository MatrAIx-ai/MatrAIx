persona_description: Jean Trimble, a School Library Media Specialist (SLMS) who is committed to teaching students how to find relevant information, evaluate the accuracy of information, determine the reliability
  of information, use information ethically, responsibly, and legally, and present the information in a creative way. Jean is knowledgeable about the Common Core standards and the importance of research
  to build and present knowledge. She is aware of the need for information professionals and the importance of having a full-time librarian in schools. Jean is a strong advocate for investing in libraries
  and believes that schools should not cut their librarian positions. Jean is a passionate educator who is dedicated to helping students become lifelong learners and lifelong researchers.
