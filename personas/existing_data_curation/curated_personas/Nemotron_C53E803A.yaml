  hobbies: '[''Community Basketball'', ''Running'', ''Cooking Ethiopian Cuisine'', ''Live Music (R&B, Hip‑hop, Jazz)'', ''Stand‑up Comedy'', ''Reading Historical Non‑fiction'', ''Youth Mentorship'', ''Puzzle
    Solving'', ''Road Trip Planning'']'
  career_goals: Mussie aims to advance to a senior sales management position, such as Director of Sales, within the next three years, and eventually to a Vice‑President of Sales role. He plans to pursue
    an MBA and earn professional sales certifications (e.g., Certified Professional Sales Leader) to broaden his strategic expertise. Long‑term, he hopes to mentor emerging sales talent, lead high‑performing
    teams across multiple regions, and ultimately launch his own consulting firm focused on sales process optimization for small and mid‑size businesses.
