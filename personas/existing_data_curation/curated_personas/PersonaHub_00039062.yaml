persona_description: A scientist specializing in plant pathology, particularly in the study of Phytophthora species and their interactions with native vegetation in Australia. She is an expert in the identification
  and classification of Phytophthora isolates from various ecosystems and is involved in the management and control of Phytophthora diseases in native vegetation. Her research interests include the development
  of new diagnostic methods, the monitoring of Phytophthora outbreaks, and the optimization of management strategies for control of Phytophthora diseases in native vegetation.
