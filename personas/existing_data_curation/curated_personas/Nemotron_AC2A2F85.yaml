personas:
  professional: Maria Harb, a 52‑year‑old community‑driven organizer, leverages decades of household management, budgeting, and volunteer coordination to design senior‑focused programs at the local community
    center while laying the groundwork for a home‑based catering venture that serves wholesome, family‑style meals.
  sports: Maria Harb, an avid hiker who follows the Colorado Springs Switchbacks FC and the Denver Broncos, participates in the Pikes Peak Trail Club, leads weekly walks with a senior fitness group, and
    balances outdoor adventures with low‑impact yoga sessions at the community center.
  arts: Maria Harb, a devoted book‑club participant and community‑theatre enthusiast, enjoys performing in local productions of classics like 'Our Town,' knits while listening to John Denver and Bob Dylan,
    and studies authors such as Jane Austen and Maya Angelou, often gifting handmade bookmarks to fellow readers.
  travel: Maria Harb, a methodical planner, prefers road‑trip adventures that blend scenic hikes in Rocky Mountain National Park with cultural visits to Santa Fe’s art galleries, budgets her travel fund
    to permit occasional family vacations to destinations like New Zealand, yet occasionally delays flight bookings until the last minute.
  culinary: Maria Harb, a garden‑to‑table cook, frequently prepares roasted beet and quinoa salads, hearty vegetable stews, and apple crumble using fresh herbs like rosemary and thyme, delights in experimenting
    with sourdough bread, but sometimes over‑salts a dish when distracted by a phone call.
  core: Maria Harb, a structured yet social 52‑year‑old, blends meticulous organization with a love for community, garden‑grown meals, and evening knitting, while occasionally overcommitting her schedule
    and forgetting to water her indoor plants.
background:
  cultural: Maria Mae grew up in a middle‑class, predominantly white suburb of the Midwest before relocating to Colorado Springs. Her cultural identity is grounded in traditional American values—emphasizing
    family, hard work, and community service—augmented by the outdoors‑oriented lifestyle of the Colorado foothills. She participates in seasonal celebrations such as Thanksgiving, Fourth of July barbecues,
    and local holiday festivals, and maintains ties to her church, which reinforces her cooperative and caring disposition. Her heritage includes German and Irish ancestry, which informs a modest, practical
    outlook blended with the rugged, friendly spirit of the American West.
