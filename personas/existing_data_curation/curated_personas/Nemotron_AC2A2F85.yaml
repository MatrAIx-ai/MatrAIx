  career_goals: Although currently not in the formal workforce, Maria Mae aims to turn her organizational talents into a part‑time leadership role at the local community center, where she can design programs
    for seniors and families. She also dreams of launching a small home‑based catering service that offers wholesome, family‑style meals for neighborhood gatherings. In parallel, she hopes to mentor younger
    volunteers, sharing her practical knowledge while continuing to grow her own skills through short courses in nutrition and senior care certification.
