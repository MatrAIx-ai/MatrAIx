personas:
  professional: Angel Hernandezsantos, an IT support specialist who blends methodical troubleshooting across Windows, macOS, and Linux environments with efficient PowerShell and Bash automation, leverages
    her organized, competitive nature to maintain flawless ServiceNow documentation and mentor peers, all while pursuing CompTIA Network+, Security+, and Cisco CCNA certifications to step into a network
    engineering role.
  sports: Angel Hernandezsantos jogs the Merrimack River trail three times a week, sharpens her footwork at salsa nights, avidly follows the Boston Red Sox, New England Patriots, and Boston Celtics, and
    competes in a local co-ed soccer league on weekends.
  arts: Angel Hernandezsantos immerses herself in historical fiction by Ken Follett and Hilary Mantel, energizes her evenings with the salsa rhythms of Celia Cruz and modern hits from Beyoncé, and frequently
    attends live theater productions like Hamilton at the local performing arts center, all of which enrich her storytelling when mentoring youth.
  travel: Angel Hernandezsantos enjoys meticulously planned weekend trips to New England coastal towns such as Newport and Portland, dreams of a tech-centric cultural immersion in Berlin and a culinary
    tour of the Caribbean islands, and balances these aspirations with a modest travel budget and occasional family commitments.
  culinary: Angel Hernandezsantos cooks at an intermediate level, regularly preparing arroz con gandules, mofongo, and lechón seasoned with sofrito and adobo while experimenting with plantain-based desserts
    and hosting lively dinner gatherings for friends and family.
  core: Angel Hernandezsantos is a methodical, competitive tech professional who balances precise problem-solving with a love for puzzles, board games, salsa dancing, and hearty home-cooked meals while
    rigorously pursuing certifications and leadership in IT.
background:
  cultural: Angel is a first‑generation American whose parents emigrated from Puerto Rico. Raised in Lawrence, Massachusetts, she grew up in a bilingual household where Spanish and English were spoken daily,
    and family gatherings were filled with music, storytelling, and traditional foods. The city’s vibrant Latino community provided frequent exposure to festivals such as the annual Puerto Rican Day Parade
    and local salsa nights, reinforcing her connection to her heritage. Angel’s cultural identity emphasizes familial loyalty, resilience, and a collective sense of celebration, which she blends with the
    pragmatic, industrious mindset characteristic of New England. She continues to practice cultural traditions by cooking Puerto Rican meals, participating in community events, and maintaining strong ties
    with relatives back on the island.
attributes:
  skills: '[''Computer hardware troubleshooting'', ''Network configuration and maintenance'', ''Operating system support (Windows, macOS, Linux)'', ''PowerShell and Bash scripting for automation'', ''Basic
    cybersecurity and malware remediation'', ''IT service management (ITIL) and ticketing systems (ServiceNow, Zendesk)'', ''Technical documentation and SOP creation'', ''Customer service and end‑user communication'',
    ''Root cause analysis and process improvement'', ''Data backup and recovery'']'
  hobbies: '[''Logic puzzles (Sudoku, crosswords)'', ''Competitive board games (Chess, Settlers of Catan)'', ''Tech meetups and hackathons'', ''Jogging along the Merrimack River trail'', ''Salsa dancing
    at cultural centers'', ''Cooking traditional Puerto Rican cuisine'', ''Reading historical fiction'', ''Mentoring youth in STEM programs'']'
  career_goals: Angel aims to expand her technical expertise and move into leadership within IT. Over the next two years she plans to earn CompTIA Network+ and Security+ certifications and a Cisco CCNA,
    positioning herself for a network engineer role. She aspires to become a team lead or IT operations manager, where she can apply her methodical planning to streamline workflows, mentor junior technicians,
    and spearhead security hardening projects. In the longer term, Angel intends to pursue a bachelor’s degree in information technology or computer science, ultimately targeting a senior infrastructure
    architect position that oversees enterprise‑wide technology strategy for a regional organization.
