personas:
  professional: Amber Taylor, a veteran user‑centered product and experience designer with three decades of industrial and UX expertise, leverages their curiosity‑driven exploration of sustainable materials
    and practical mastery of CAD, Python automation, and Agile facilitation to lead cross‑functional teams, all while maintaining a kind, organized yet flexible management style that nurtures inclusive
    innovation.
  sports: Amber Taylor embraces the Texan outdoors by hiking the Hill Country trails with the Austin Trailblazers club, supports Austin FC in MLS, follows the Texas Longhorns football team, and jogs twice
    weekly while integrating a low‑impact Pilates routine to protect their knees.
  arts: Amber Taylor expresses creativity through oil paintings of Hill Country sunsets inspired by Ansel Adams, analog photography using Kodak Portra film, and strumming acoustic renditions of Joni Mitchell
    and Willie Nelson, while regularly volunteering to teach watercolor techniques at local community art workshops.
  travel: Amber Taylor favors thoughtful road trips that blend nature and sustainability, such as a recent drive to Big Bend National Park for stargazing, a week‑long eco‑tour of Costa Rica’s rainforests,
    and yearly visits to Kyoto’s tea gardens for design inspiration, always planning itineraries that balance solo retreats with community visits.
  culinary: Amber Taylor enjoys farm‑to‑table Tex‑Mex cooking, expertly preparing dishes like roasted poblano enchiladas with locally sourced heirloom tomatoes and cilantro, while also experimenting with
    vegan jackfruit tacos, and they regularly tend a backyard herb garden to supply fresh basil, oregano, and chives.
  core: Amber Taylor blends seasoned design leadership, sustainable living, and a love for solitary creativity, yet can't resist late‑night tinkering with Arduino boards and over‑indulging in boutique coffee,
    a quirk that fuels both their imagination and occasional caffeine‑driven jitteriness.
background:
  cultural: Amber grew up in a middle‑class Anglo‑American family in the Midwest, where a strong work ethic and community involvement were emphasized. After earning a STEM graduate degree, she relocated
    to Austin, drawn by its vibrant blend of tech innovation, artistic expression, and progressive values. The city’s inclusive, collaborative culture has shaped her design philosophy, merging a pragmatic
    Midwestern mindset with Austin’s emphasis on sustainability, creativity, and social responsibility.
