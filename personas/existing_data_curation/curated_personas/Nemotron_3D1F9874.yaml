  hobbies: '[''Hiking in the Hill Country'', ''Oil painting'', ''Analog photography'', ''Sustainable gardening'', ''Playing acoustic guitar'', ''Attending Austin tech and design meetups'', ''DIY electronics
    projects'', ''Volunteering in community art workshops'', ''Reading historical fiction'', ''Yoga'']'
  career_goals: Amber aspires to become a design director where she can embed sustainability and inclusive design into the core of product development. She aims to lead interdisciplinary teams that merge
    technology and human‑centered solutions, launch a consultancy focused on socially responsible design, mentor a diverse next generation of designers, and contribute thought leadership through conference
    talks and a forthcoming book on practical innovation.
