  hobbies: '[''Visiting art galleries and museums'', ''Landscape photography on Appalachian hikes'', ''Hiking and trail walking in West Virginia'', ''Cooking experimental, farm‑to‑table dishes'', ''Playing
    in a local adult soccer league'', ''Hosting and participating in trivia nights'', ''Volunteering with the Wood County Historical Society'', ''Attending community theater performances and workshops'',
    ''Reading contemporary fiction'', ''Traveling to regional cultural festivals'']'
  career_goals: Michelle aims to advance to senior leadership in compliance, targeting a Director of Compliance role within a regional financial institution or manufacturing firm. She wants to spearhead
    ESG and data‑privacy compliance initiatives, design integrated training programs, and mentor emerging compliance professionals. Long‑term, she envisions becoming a recognized speaker at industry conferences
    and contributing to regulatory policy discussions. She also hopes to launch a boutique consulting practice that helps multiple organizations navigate complex regulatory environments while supporting
    local arts and cultural projects in her community.
