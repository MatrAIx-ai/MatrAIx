  hobbies: '["Gardening (perennials and vegetables)","Bird‑watching","Reading historical fiction and non‑fiction","Small book club participation","Knitting for charity","Small‑scale woodworking (e.g., garden
    benches)","Local winery tastings","Volunteer cataloging at the public library"]'
  career_goals: Although retired from formal employment, Juliana aims to expand her impact as a volunteer mentor for new members of the Woodinville Historical Society, guiding them in research methods and
    archival practices. She aspires to complete a comprehensive family history manuscript that blends her investigative curiosity with her love for storytelling, and to see it published for future generations.
    Additionally, she hopes to spearhead a collaborative community‑garden project that brings together a small circle of neighbors, enhancing local sustainability while reinforcing her values of cooperation
    and practicality. Continuing her personal growth, Juliana plans to enroll in a senior‑focused photography workshop to deepen her technical skills and eventually showcase her nature photographs in a
    local exhibition.
