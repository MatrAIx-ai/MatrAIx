  career_goals: Although retired, William aims to stay purposefully active by mentoring younger volunteers at the local senior center, completing a memoir of his life along the California coast, mastering
    digital photography to document the region's natural beauty, and earning a volunteer certification for beach safety response. He also wishes to maintain his health through regular exercise and continue
    learning about marine ecology.
