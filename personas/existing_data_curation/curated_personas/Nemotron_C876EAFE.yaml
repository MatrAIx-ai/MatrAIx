  career_goals: William dreams of growing up to be an inventor‑artist who can design amazing gadgets and create colorful murals that tell stories. He imagines a future where he can explore space, build
    robots, and travel to national parks, blending his love for art, science, and adventure. His ambition is to keep learning without limits, turning his curious ideas into real projects that inspire others.
