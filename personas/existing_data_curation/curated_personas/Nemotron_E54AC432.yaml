personas:
  professional: Jerry Staggs is a precision equipment maintenance technician who excels at diagnosing and calibrating high‑accuracy instruments, applying meticulous schematics reading and OSHA‑compliant
    lock‑out/tag‑out practices, while leveraging strong independent problem‑solving skills and a competitive drive to fast‑track certifications and a future boutique repair shop.
  sports: Jerry Staggs enjoys solo hikes on the coastal hills and follows the San Jose Sharks and Golden State Warriors on TV, occasionally joins a local mountain‑bike club for weekend rides, and maintains
    fitness through weekly calisthenics and occasional pick‑up basketball, preferring low‑key, self‑directed exercise over organized team sports.
  arts: Jerry Staggs channels his love of precision into macro photography of gears and circuit boards, fans electronic ambient artists like Tycho and Aphex Twin, attends intimate wine‑and‑art evenings
    featuring works by local ceramicists, and occasionally dabbles in woodworking sculptures inspired by the clean lines of modernist designers such as Dieter Rams.
  travel: Jerry Staggs prefers DIY itineraries crafted in spreadsheets, values solo exploration over group tours, has trekked Yosemite’s Mist Trail and sampled wines in Napa Valley, dreams of a study‑tour
    to aerospace labs in Toulouse, France, but balances travel aspirations against a modest student‑tech budget.
  culinary: Jerry Staggs relishes craft beer and limited‑edition Chardonnay at tasting events, experiments with home‑brewing using pilsner malt and Cascade hops, cooks simple yet precise meals like sous‑vide
    chicken breast with rosemary and garlic, and enjoys pulling apart a perfectly calibrated espresso shot with single‑origin beans.
  core: Jerry Staggs is a technically‑obsessed lone wolf who fine‑tunes both machines and his own routines, sacrificing social plans for precision hobbies while juggling a pragmatic yet occasionally lax
    approach to finances.
background:
  cultural: Jerry grew up in Lodi, California, a community rooted in agriculture and the wine industry. His family, of Midwestern white American descent, worked on a family-owned farm where he was introduced
    early to mechanical work on farm equipment. The region’s practical, self‑reliant ethos shaped his appreciation for hands‑on problem solving and respect for precise craftsmanship. He attended a local
    community college, studying engineering technology, which reinforced his technical skills and introduced him to a broader network of tradespeople. The cultural mix of a small town, surrounding vineyards,
    and a modest working‑class environment informs his preference for small‑group interactions, independent work, and a pragmatic outlook.
attributes:
  skills: '[''Precision instrument troubleshooting'', ''Calibration of measurement devices'', ''Mechanical and electronic diagnostics'', ''Interpreting technical schematics and manuals'', ''Use of micrometers,
    calipers, laser alignment tools'', ''PLC programming basics and troubleshooting'', ''Preventative maintenance and safety compliance (OSHA, lockout/tagout)'', ''Documentation of repair reports and quality
    control procedures'', ''Independent workflow management'', ''Basic CAD for component repair planning'']'
  hobbies: '[''RC drone building and flying'', ''Arduino/Raspberry Pi electronics projects'', ''Woodworking and tool making'', ''Strategy video gaming (e.g., Civilization, Factorio)'', ''Puzzle solving
    (Sudoku, logic puzzles)'', ''Small-group wine tasting and home brewing'', ''Solo hiking in local hills'', ''Macro photography of mechanical subjects'']'
  career_goals: Jerry aims to advance from his current role to become a senior precision equipment maintenance specialist within the next five years, seeking certifications such as Certified Calibration
    Technician (CCT) and advanced PLC programming credentials. He hopes to work for a biotech or aerospace firm in the Bay Area where he can handle cutting‑edge scientific instrumentation. Long‑term, he
    envisions opening his own boutique repair shop that offers on‑site calibration and consulting services for laboratories and manufacturers. He also aspires to mentor junior technicians and lead a small
    team focused on high‑accuracy maintenance.
