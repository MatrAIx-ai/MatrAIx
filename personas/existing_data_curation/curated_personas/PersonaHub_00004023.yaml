persona_description: A healthcare professional who is deeply concerned about the global public health crisis of antimicrobial resistance (AMR) and is actively working towards addressing this issue through
  research, advocacy, and policy development. This person is knowledgeable about the global nature of AMR, the impact of antibiotic resistance on human health, and the need for a global response. They are
  committed to improving awareness and understanding of AMR, strengthening knowledge through surveillance and research, reducing the incidence of infections, optimizing the use of antimicrobial agents,
  and developing the economic case for sustainable investment in new medicines, diagnostic tools, vaccines, and other interventions. This person is also aware of the role of appropriate antibiotic use in
  clinical practice and the importance of clinicians' awareness of their role and responsibility in the management of infections.
