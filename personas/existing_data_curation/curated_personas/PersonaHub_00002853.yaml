persona_description: A teacher who specializes in the study of children's literature, particularly the elements of storytelling, character development, and narrative structure. Their research interests
  include, but are not limited to, the use of language and imagery in children's books, the impact of literary elements on children's development, and the role of storytelling in fostering empathy and understanding.
  They are passionate about teaching children how to write stories and how to tell compelling narratives that resonate with young readers.
