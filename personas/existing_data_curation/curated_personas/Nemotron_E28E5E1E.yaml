  career_goals: Jon dreams of traveling beyond Earth and imagines becoming an astronaut or a space‑engineer who designs rockets and conducts experiments in micro‑gravity. He envisions himself drawing detailed
    comics about interstellar missions and sharing his discoveries in illustrated journals. In the short term, he wants to join his school’s science club, win a regional LEGO robotics contest, and improve
    his drawing skills so he can publish a self‑made comic series about a brave young explorer. He also hopes to attend a summer coding camp where he can deepen his ScratchJr projects and learn basic robotics,
    allowing him to combine his competitive spirit with teamwork. Ultimately, Jon aspires to a career that merges his love for science, competition, and visual storytelling.
