  hobbies: '["abstract acrylic painting", "ceramic pottery and sculpture", "playing acoustic guitar", "hiking local trails", "birdwatching", "landscape photography", "reading science‑fiction and philosophy",
    "volunteering for STEM outreach programs", "home chemistry art projects", "cooking traditional Mexican cuisine", "attending local art exhibitions", "practicing yoga and meditation"]'
  career_goals: Amaury aims to lead a research program focused on sustainable, biodegradable materials that can replace conventional plastics, leveraging his background in polymer chemistry and his passion
    for environmental stewardship. He aspires to secure a senior scientist position at a forward‑looking company or research institute where he can mentor a diverse team and integrate artistic design principles
    into material development. In parallel, Amaury is driven to establish community‑based science outreach initiatives in Chico and surrounding regions, creating hands‑on workshops that blend chemistry
    with visual arts to inspire underrepresented youth. Long‑term, he envisions launching a small startup that commercializes low‑cost, eco‑friendly materials while maintaining a strong commitment to collaborative,
    humane workplace culture.
