  hobbies: '[''Community Gardening'', ''Knitting Circle'', ''Book Club'', ''Walking/Hiking in Minneapolis Parks'', ''Food Bank Volunteering'', ''Baking and Cooking'', ''Photography'', ''Local Theater Attendance'']'
  career_goals: Although she is not currently in paid employment, Marcha aims to deepen her impact in the community. She plans to complete a GED and enroll in a part‑time certificate program for community
    health work or family support services. Her short‑term goal is to lead a neighborhood "welcome committee" that pairs new residents with local resources. Long‑term, she hopes to mentor younger volunteers,
    possibly take on a formal coordinator role at the local senior center, and maintain a stable, nurturing environment for her family.
