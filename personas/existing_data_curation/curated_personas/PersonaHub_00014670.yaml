persona_description: A scientist who specializes in the development of green science and fashion collaboration, particularly in the field of pollution-busting technology. Her work has led to the creation
  of the Catalytic Clothing product, which is currently undergoing safety tests and is aimed at reducing pollution caused by nitrogen oxides. She is also known for her work on the discovery of microscopic
  particles of titanium oxide, which can grip onto the millions of fibres in the material and have a greater effect due to the constant movement of the fabric while being worn. Her eureka moment came when
  she realised that these particles could be used as a pollution-buster when sprayed on clothes.
