personas:
  professional: Sonaly Harvey, a senior operations strategist with a STEM graduate background, they leverage Lean Six Sigma and rigorous SOP development to streamline cross‑functional workflows, while mentoring
    women in STEM and pushing for a director‑level role within three years, all guided by their disciplined, structured mindset.
  sports: Sonaly Harvey enjoys scheduled weekend hikes on Wisconsin’s Ice Age Trail, participates in the local birdwatching club, follows the Green Bay Packers and Milwaukee Brewers, and occasionally joins
    a community cycling group, blending her love of nature with low‑impact fitness that satisfies her structured routine.
  arts: Sonaly Harvey finds creative balance in knitting intricate Fair‑Isle patterns and listening to Yo‑Yo Ma’s cello suites, while attending quarterly performances by the Wisconsin Chamber Orchestra
    and admiring the botanical illustrations of Mary Ann Ott, allowing art to complement her analytical work.
  travel: Sonaly Harvey prefers meticulously planned trips, has explored Yellowstone National Park and Door County’s historic lighthouses, dreams of touring English garden estates in the Cotswolds, and
    chooses destinations that offer both structured itineraries and opportunities for solitary reflection in nature.
  culinary: Sonaly Harvey, an intermediate home chef, delights in cooking farm‑to‑table dishes like ratatouille with her garden‑grown tomatoes, rosemary‑infused roasted carrots, and mushroom barley soup,
    while savoring Wisconsin cheese curds as a nostalgic treat and often experimenting with new herb blends during her knitting breaks.
  core: Sonaly Harvey is a methodical operations leader who translates her love of data‑driven gardening into high‑performance workplaces, yet her chronic worry fuels both relentless improvement and occasional
    sleepless nights.
background:
  cultural: Sonaly grew up in a middle‑class, White, Midwestern family in Wisconsin with deep roots in the region. Her upbringing emphasized hard work, practicality, and community involvement, values that
    are reflected in her disciplined work ethic and collaborative spirit. Her family's heritage includes German and Scandinavian ancestry, and she was raised with Protestant ethics that stress modesty,
    self‑reliance, and responsibility to others. The cultural emphasis on order, reliability, and modest achievement has shaped her preference for structure, her methodical approach to problem‑solving,
    and her inclination toward small, trusted social circles.
