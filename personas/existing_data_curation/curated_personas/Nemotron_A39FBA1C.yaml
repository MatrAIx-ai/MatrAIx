  career_goals: Sonaly is focused on securing a senior operations leadership role, such as Director of Operations, within the next three years. She aims to achieve Lean Six Sigma Black Belt certification
    to formalize her expertise, lead a company-wide operational excellence initiative, and mentor emerging talent, especially women in STEM. Additionally, she aspires to reduce organizational stress by
    implementing systematic, predictable processes and fostering a collaborative culture that balances high performance with employee well‑being.
