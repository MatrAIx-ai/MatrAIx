personas:
  professional: Thomas Welner, a self‑appointed little engineer, channels their curiosity and practicality into constructing elaborate block farms, meticulously sorting pieces by shape while competitively
    challenging peers to build the tallest silo in record time.
  sports: Thomas Welner, an enthusiastic fan of the Iowa Hawkeyes, they attend a local 'Teddy Tigers' toddler soccer program at the community center every Saturday, love sprinting around the farm’s pasture
    with a bright red ball, and balance structured practice with spontaneous, unorganized play.
  arts: Thomas Welner, an avid little listener of Raffi’s 'Baby Beluga' and Sesame Street’s Elmo, they spend afternoons drawing vibrant crayon pictures of cows and barns, often pretending to play a fiddle
    during church potluck music, and they eagerly mimic the dance moves of their favorite cartoon characters.
  travel: Thomas Welner, who delights in family road trips to the Johnson County Fair and a summer stay on a cousin’s dairy farm in Wisconsin, they prefer short drives with frequent snack breaks, yet they
    dream of a future adventure to 'Disney World' where they can explore themed rides and meet beloved characters.
  culinary: Thomas Welner, a budding kitchen helper who can confidently spread peanut butter on toast, they love cheesy corn dogs, fresh apple slices, and crunchy carrot sticks, but they stubbornly refuse
    broccoli and always request ketchup on the side.
  core: Thomas Welner, a fiercely curious yet practical three‑year‑old, they balance a competitive block‑building streak with disciplined piggy‑bank savings, farm‑inspired snack choices, and a love for
    county‑fair adventures.
background:
  cultural: Thomas grows up in Gladbrook, Iowa, a small, close‑knit Midwestern town rooted in agriculture. His family reflects the region's German‑American heritage and participates in a local Lutheran
    church, where community gatherings, county fairs, and farm life shape his early worldview. The practical, self‑reliant values typical of rural Iowa, along with a modest appreciation for tradition and
    seasonal rhythms, influence his daily routines and emerging perspectives.
attributes:
  skills: '[''basic motor skills'', ''fine motor coordination'', ''simple verbal communication'', ''color and shape recognition'', ''basic counting'', ''problem solving through blocks and puzzles'', ''following
    multi‑step instructions'', ''routine completion'']'
  hobbies: '[''building with Duplo blocks'', ''simple jigsaw puzzles'', ''drawing with crayons'', ''backyard sandbox play'', ''exploring nature (butterflies, bugs, leaves)'', ''listening to storytime and
    nursery rhymes'', ''pretend play with toy trucks and tractors'', ''visiting farm animals'']'
  career_goals: Thomas frequently talks about growing up to drive a big red tractor on his family's farm, fixing farm equipment like a mechanic, or building tall structures as a construction worker. He
    loves the idea of helping his grandparents with chores and imagines being the "best" at stacking the tallest block tower, showing a budding competitive spirit and personal drive.
