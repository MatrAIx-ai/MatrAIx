personas:
  professional: An experienced painter and paperhanger, Claire Card fuses decades of expertise in decorative finishes with a vivid abstract artistic vision, advising clients on nuanced color palettes and
    executing hand‑painted wallpapers, faux‑marbling, and site‑specific murals while calmly asserting leadership over a small crew of apprentices.
  sports: A low‑key fitness enthusiast, Claire Card finds inspiration in gentle prairie walks and weekend yoga classes, while cheering on the local minor league baseball team, the Peoria Chiefs, and occasionally
    attending a community basketball pickup game; they prioritize light movement over competitive sports, using activity as a mental reset rather than a performance goal.
  arts: A dedicated visual artist, Claire Card immerses themselves in abstract canvas work inspired by native wildflowers, drawing influence from Georgia O'Keeffe, Mark Rothko, and Helen Frankenthaler,
    while also enjoying the improvisational sounds of Miles Davis and John Coltrane at town jazz nights; they actively participate in a quarterly craft fair, a small artist collective, and a monthly book
    club that explores imaginative literature, weaving these experiences into their creative process.
  travel: A thoughtful wanderer, Claire Card favors spontaneous, low‑key road trips to prairie preserves like the Tallgrass Prairie National Preserve and artistic retreats such as Santa Fe’s Canyon Road
    art market, while also cherishing a past visit to the historic art museums of Chicago; they dream of attending the spring tulip festivals in Holland but plan trips around studio commitments and modest
    savings, often opting for mid‑week travel to avoid crowds.
  culinary: A flavorful home cook, Claire Card delights in preparing seasonal Midwestern dishes that echo their garden’s bounty, such as roasted beet and goat‑cheese salad, wildflower‑honey glazed scones,
    and herb‑infused chicken and dumplings; they possess modest culinary skills, favoring vivid plating that mirrors their palette, and often pair meals with a cup of chamomile tea or locally roasted coffee
    while sketching new mural ideas.
  core: An imaginative, slightly disorganized 54‑year‑old artist, Claire Card blends decorative‑finishes craftsmanship with abstract fine‑art ambition, thrives in small creative circles, and balances entrepreneurial
    drive with a love for prairie‑inspired color, quiet solitude, and occasional procrastination on paperwork.
background:
  cultural: Claire grew up in a mid‑western, white, working‑class family in central Illinois, where values of modesty, self‑reliance, and community are deeply rooted. Her ancestry includes German and Irish
    immigrant lines, reflected in family traditions such as holiday gatherings with home‑cooked meals and a respect for craftsmanship passed down through generations of tradespeople. The region’s seasonal
    rhythms, agricultural heritage, and the close‑knit nature of small‑town life have shaped her appreciation for practical skill and the understated beauty of everyday surroundings. While she identifies
    with mainstream American cultural norms—Christian holidays, Fourth of July celebrations, and a love for classic rock—her exposure to regional folk art and vernacular architecture has fueled her interest
    in blending traditional motifs with contemporary, abstract aesthetics in her work.
attributes:
  skills: '[''Surface preparation'', ''Paint application (smooth, satin, gloss, faux finishes)'', ''Color theory and palette consultation'', ''Custom wallpaper measurement and installation'', ''Pattern
