personas:
  professional: Aaron Vanwey is a 22‑year‑old construction site manager who leverages Procore, Microsoft Project, and a methodical, safety‑first mindset to coordinate crews, keep budgets on track, and translate
    blueprints into action while fostering a cooperative, team‑oriented culture on the job site; they also prioritize clear communication with clients and subcontractors to maintain predictability.
  sports: Aaron Vanwey regularly joins a local recreational basketball league and a flag‑football team in Harris County, roots for the Houston Rockets and Texans, and spends Saturday mornings hiking the
    Big Thicket trails; they view fitness as a social extension of their teamwork ethos and often organize post‑game BBQs for the crew.
  arts: Aaron Vanwey strums an acoustic guitar at House of Blues open‑mic nights, follows live shows by Gary Clark Jr. and Beyoncé, and draws creative inspiration for DIY projects from the soulful blend
    of Texas blues and Southern rock they hear on playlists; they also enjoy sketching design ideas while listening to music.
  travel: Aaron Vanwey prefers quick getaways to Gulf Coast spots like Galveston Island for fishing and to the Hill Country for weekend hikes, while dreaming of a future trip to Scandinavia to study sustainable
    building methods; they balance spontaneous road trips with careful budgeting and often involve friends in planning.
  culinary: Aaron Vanwey loves cooking Gulf Coast seafood such as shrimp étouffée with okra and blackened catfish, often seasoning dishes with smoked paprika and fresh cilantro on his newly built deck,
    while also enjoying a well‑done Texas brisket and occasionally ordering pizza after late‑night site work; they tend to let the sauce simmer a bit longer than necessary, creating a signature, slightly
    tangy flavor.
  core: Aaron Vanwey blends disciplined organization with a community‑focused heart, juggling construction sites, guitar strings, and weekend hikes while navigating a budget, back pain, and a habit of leaving
    dishes in the sink too long; they manage it all with relentless optimism.
background:
  cultural: Aaron grew up in the close-knit, predominantly white community of Bridge City, Texas, a small town on the Gulf Coast with a strong work ethic and a deep sense of neighborly responsibility. His
    family’s roots trace back to generations of laborers and tradespeople who built and maintained the region’s oil-refining and construction industries. The local culture blends classic Texas hospitality—Sunday
    church gatherings, backyard barbecues, and high school football Saturdays—with subtle Cajun influences from nearby Louisiana, evident in the community’s love for seafood boils and Mardi Gras-style festivals.
    These surroundings instilled in Aaron values of reliability, teamwork, and a desire to give back, shaping his compassionate, cooperative outlook and his commitment to community-focused projects.
