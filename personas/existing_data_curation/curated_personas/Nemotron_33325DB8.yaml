  hobbies: '["Basketball", "Flag Football", "Fishing", "Hiking", "DIY Home Improvement", "Habitat for Humanity Volunteering", "Food Pantry Volunteering", "Acoustic Guitar", "Live Music Events", "Construction
    Trade Podcasts"]'
  career_goals: Aaron is driven to advance from site manager to licensed general contractor and eventually launch his own construction firm that prioritizes sustainable, community-focused building in the
    Gulf Coast. Over the next five years he plans to earn an associate degree in construction technology followed by a bachelor’s in construction management, while obtaining certifications such as OSHA
    30-hour, PMP and LEED Green Associate. He aims to lead multi-million-dollar commercial projects, integrate lean construction and BIM tools to improve efficiency, and develop a reputation for safety
    and workforce well-being. Ultimately, Aaron wants to give back by mentoring apprentices and creating affordable housing solutions that strengthen his hometown of Bridge City and surrounding communities.
