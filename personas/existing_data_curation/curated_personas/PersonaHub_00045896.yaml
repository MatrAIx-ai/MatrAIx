persona_description: An engineer with expertise in the design and manufacturing of gas sensors, particularly those used in biogas plants for monitoring and controlling the efficiency of the anaerobic digestion
  process. This person has a deep understanding of the principles of infrared band pass filters and their applications in gas sensing, and has a proven track record of successfully commercializing this
  technology. They are highly skilled in designing and implementing gas sensors for a wide range of safety and process critical applications, and have extensive experience in integrating these sensors into
  biogas plants. They are also well-versed in the ISO9001 Quality accreditation and have a deep understanding of the importance of calibration and burn-in processes in ensuring the reliability and accuracy
  of gas sensors.
