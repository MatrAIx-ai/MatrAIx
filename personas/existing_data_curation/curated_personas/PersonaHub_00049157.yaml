persona_description: A chemist specializing in the field of chromatography, particularly in the use of hydroxyapatite for the purification of biological molecules. They have developed a method to remove
  protons from the surface of hydroxyapatite during elution, which helps to improve the robustness of CHT and prevent pH drops during elution without desorbing the target protein. This method is patent-pending
  and is similar to the action shown in Figure 2, except that water provides the neutralizing hydroxyls.
