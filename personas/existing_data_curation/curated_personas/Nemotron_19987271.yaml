  career_goals: Betty aims to transition into a strategic leadership role where she can shape enterprise‑wide analytics initiatives—such as Director of Operations Research or Head of Business Analytics.
    She plans to deepen her expertise in machine‑learning‑augmented optimization, earn a professional certification in data science, and publish case studies on applying OR to supply‑chain resilience. Ultimately,
    she wants to be recognized as a thought leader who drives data‑driven culture, mentors emerging analysts, and influences corporate strategy at the executive level.
