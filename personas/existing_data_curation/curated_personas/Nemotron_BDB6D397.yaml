    to instrumental/lo-fi music'']'
  career_goals: Man Min aspires to turn his early technical interests into a career in software development or hardware engineering. He envisions attending a top university for computer science, where he
    can deepen his coding skills and explore artificial intelligence. His long-term goal is to create practical software tools or interactive games that blend creativity with utility, ideally in a role
    that offers autonomy and the chance to work on innovative projects. He also dreams of building a personal portfolio of indie games and tech prototypes that could later become a small startup or content
    channel.
