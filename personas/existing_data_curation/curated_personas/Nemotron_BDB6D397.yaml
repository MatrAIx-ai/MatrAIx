personas:
  professional: Man Min, an aspiring teenage programmer, spends afternoons solo coding Python scripts and tinkering with Arduino boards, merging a competitive drive to solve puzzles with a pragmatic preference
    for functional, well‑tested solutions, even though they often let school assignments slide in favor of personal projects.
  sports: Man Min, an avid esports competitor who follows Team Liquid in StarCraft, roots for the Washington Capitals in the NHL, and practices with the local Chantilly Youth Soccer Club on weekends, yet
    prefers solitary video‑gaming workouts to group drills.
  arts: Man Min, a self‑taught digital artist, creates pixel‑style animations in Krita while listening to lo‑fi beats by Nujabes and piano pieces by Yiruma, and draws storytelling inspiration from Studio Ghibli
    films, often sharing their work on online art forums.
  travel: Man Min, a curious traveler who visited Seoul during Lunar New Year to experience family holiday foods and later explored Washington, D.C.’s museums on a weekend, now hopes to venture to Tokyo’s
    Akihabara for tech inspiration, favoring loosely planned trips that leave room for spontaneous coding sessions in cafés.
  culinary: Man Min, a budding home cook, reliably whips up kimchi fried rice and marinated bulgogi for family Chuseok gatherings, also enjoys slurping instant ramen and ordering pepperoni pizza after late‑night
    gaming, and frequently experiments by adding gochujang to unconventional dishes like quesadillas.
  core: Man Min, a solitary 14‑year‑old tech prodigy who juggles relentless coding projects and competitive gaming while neglecting schedules, hoarding gadgets, and occasionally overindulging in snacks,
    embodies a pragmatic curiosity tempered by a carefree, slightly disorganized streak.
background:
  cultural: Man Min comes from a Korean-American family that immigrated to the United States before his birth. At home, Korean language and customs are maintained; his family celebrates Lunar New Year and
    Chuseok with traditional foods and rituals, and they encourage respect for elders and a strong work ethic. Growing up in Chantilly, VA, he attends a diverse public middle school where he is exposed
    to a multicultural environment and American teenage culture. This blend of East Asian heritage and suburban American life shapes his competitive drive, practical curiosity, and preference for solitary
    study, while also giving him a broad perspective on technology and global trends.
