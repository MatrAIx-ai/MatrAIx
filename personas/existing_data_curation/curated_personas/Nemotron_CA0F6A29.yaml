  career_goals: Mihirkumar aims to advance from laborer to crew lead and eventually become a certified construction supervisor or foreman within the next three to five years. He plans to enroll in a local
    community college’s construction management program to earn a certificate that will bolster his technical knowledge and leadership credentials. His long‑term ambition is to start his own boutique construction
    firm that blends sustainable building practices with artistic design elements, creating homes that reflect both functional efficiency and visual creativity. He also wants to develop stronger emotional
    resilience through mentorship and stress‑management training so he can lead teams confidently under pressure.
