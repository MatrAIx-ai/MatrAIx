personas:
  professional: Mihirkumar Guevararodriguez merges a methodical construction laborer's expertise—framing, drywall, concrete finishing, blueprint reading, and OSHA compliance—with an artist’s curiosity,
    using sketching and timelapse videos to propose aesthetic upgrades while methodically coordinating crew schedules, and they aim to become a certified crew lead within three years.
  sports: Mihirkumar Guevararodriguez plays pickup basketball at the local recreation center, regularly hikes the trails of Great Falls Park, follows the Washington Wizards and Washington Capitals, and
    they belong to a weekend cycling club that rides the Capital Crescent Trail, using sport as a release for their competitive drive.
  arts: Mihirkumar Guevararodriguez spends weekends sketching urban skylines, frequents the Smithsonian American Art Museum, swears by the rhythmic beats of A.R. Rahman, the raw edge of The Strokes, and
    the lyrical flow of Kendrick Lamar, and they volunteer at community art festivals where they help curate a blend of traditional and contemporary installations.
  travel: Mihirkumar Guevararodriguez enjoys short road trips to historic towns like Annapolis and hiking getaways in Shenanda­gan, dreams of a month‑long immersion in Barcelona’s Gaudí architecture and
    Mumbai’s street art scene, but they balance these aspirations with a modest travel budget and a full‑time construction schedule, often planning trips around long weekends and using travel rewards credit
    cards.
  culinary: Mihirkumar Guevararodriguez loves the bold flavors of biryani and paneer tikka, the smoky tang of grilled BBQ ribs, and experiments with ramen broth at home, cooking most meals in a small apartment
    kitchen while occasionally treating friends to homemade tacos al pastor, and they keep a well‑stocked spice rack featuring turmeric, cumin, and smoked paprika.
  core: Mihirkumar Guevararodriguez is a 27‑year‑old construction artisan with an artist’s eye, a competitive spirit, a chronic anxiety that they temper with meditation, and a habit of juggling tool upgrades
    with impulse art purchases.
background:
  cultural: Mihirkumar is a second‑generation South Asian American whose family originates from Gujarat, India. He grew up in a bilingual household where Gujarati and English were spoken, and his family
    observes cultural traditions such as Diwali, Navratri, and family gatherings centered around Indian cuisine. Living in Fairfax County, he participates in a vibrant local South Asian community, attending
    cultural events at the Indian Cultural Center and volunteering at community festivals. While he cherishes his heritage and family values, he also embraces the multicultural environment of the Washington,
    D.C. metro area, blending traditional customs with contemporary American lifestyle.
