  hobbies: '["Acoustic guitar", "Cooking traditional Salvadoran dishes", "Playing soccer", "Robotics club (Arduino, Scratch)", "Drawing comic-style illustrations", "Reading graphic novels", "Strategic video
    gaming (Minecraft, puzzle games)"]'
  career_goals: Oswaldo aspires to pursue a career that blends his practical mindset with his compassionate nature. He is drawn to becoming a bilingual mental-health counselor or social worker, helping
    other teenagers navigate anxiety, cultural adjustment, and the challenges of growing up in a multicultural environment. He plans to complete high school, earn a scholarship to study psychology or social
    work, and later obtain certifications to work in community health centers serving Latino youth. At the same time, he nurtures an interest in culinary arts and dreams of opening a small Salvadoran café
    where he could serve traditional dishes and create a welcoming space for his community. Ultimately, he seeks a profession that offers both financial stability and the opportunity to make a positive
    impact on the lives of young people.
