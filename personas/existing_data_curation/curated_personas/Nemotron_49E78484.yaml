personas:
  professional: A budding robotics enthusiast named Oswaldo Ghali, who balances his love for structured Arduino projects with a laid‑back attitude toward deadlines, channels his practical mindset into building
    simple game‑logic contraptions for his school club while quietly competing for the best code with peers, often letting curiosity outweigh strict planning.
  sports: Oswaldo Ghali plays forward for a local youth soccer league that practices at the high school field, cheers loudly for the national soccer team of his family’s country during televised matches,
    and habitually watches the New York Red Bulls games, though his tendency to procrastinate on conditioning drills sometimes leaves him winded.
  arts: Oswaldo Ghali strums acoustic guitar chords from both English folk tunes and rhythmic cumbia tracks while sketching comic‑style panels inspired by graphic novels like "Saga" and "Maus," often losing
    track of time and forgetting homework.
  travel: Oswaldo Ghali favors short, budget‑friendly trips, planning weekend getaways to nearby New York City museums or the Jersey Shore, while dreaming of a trip to his family's hometown to explore historic
    churches and street‑food markets, balancing family expectations with a desire for spontaneous adventure.
  culinary: Oswaldo Ghali enjoys cooking pupusas and yuca frita with his family, experimenting with cheese‑and‑spinach fillings and swapping recipes for new sauces, yet he often forgets to clean up the
    kitchen, leaving a lingering scent of spices and a mountain of dishes.
  core: Oswaldo Ghali blends a love for robotics, guitar, and soccer with a habit of last‑minute planning, prone to emotional highs and troughs, and a quirky tendency to multitask his gaming streams while
    cooking family meals.
background:
  cultural: Oswaldo grew up in a close-knit Salvadoran household in Cliffside Park, where Spanish is spoken at home and English dominates school and community life. His parents emigrated from El Salvador
    in the early 2000s, bringing with them traditions such as celebrating Semana Santa, preparing dishes like pupusas, tamales, and yuca frita, and listening to cumbia and reggaeton. Family gatherings often
    revolve around shared meals, music, and storytelling about life in San Salvador. He attends a public middle/high school where he navigates both his Salvadoran heritage and the broader American cultural
    landscape, giving him a bicultural perspective. He participates in local events organized by the Central American Association, which strengthens his connection to his roots while fostering a sense of
    belonging in the diverse borough.
attributes:
  skills: '["Bilingual communication (Spanish & English)", "Basic computer literacy (Microsoft Office, Scratch, Python)", "Cooking traditional Salvadoran dishes", "Acoustic guitar (beginner)", "Mathematics
