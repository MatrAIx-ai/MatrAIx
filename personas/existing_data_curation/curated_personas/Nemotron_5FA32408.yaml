personas:
  professional: A budding illustrator and theater enthusiast, Dallice Santas combines meticulous sketching of fantasy characters with organized rehearsal schedules, channeling their curiosity and sociable
    energy into school art projects and community performances.
  sports: A lively member of the local youth soccer club and a fan of the Portland Timbers, Dallice Santas eagerly joins weekend hikes in the Willamette Valley, often cheering on the Timbers during televised
    matches while encouraging teammates with compassionate high‑fives and organized warm‑up drills.
  arts: An avid sketcher and ukulele player, Dallice Santas draws inspiration from J.K. Rowling's fantasy realms, sketches in the style of Studio Ghibli, sings along to Jack Johnson, and delights in performing
    scenes from 'Matilda' and 'The Lion King' at school, weaving artistic appreciation into daily life.
  travel: A curious explorer, Dallice Santas enjoys family trips to Multnomah Falls, weekend visits to the Oregon Coast's Cannon Beach, and dreams of a future adventure to Kyoto's bamboo forests, preferring
    organized itineraries that blend nature hikes with cultural museum stops.
  culinary: A budding chef in the kitchen, Dallice Santas loves crafting colorful fruit kebabs, making fluffy pancakes with blueberries, and painting roasted vegetable platters with a splash of olive oil
    and parmesan, while proudly mastering the art of a perfect grilled cheese sandwich.
  core: Dallice Santas is a talkative, organized eight‑year‑old who fills every spare moment with doodles, ukulele chords, and heartfelt help for friends, balancing boundless curiosity with a gentle, compassionate
    rhythm.
background:
  cultural: Dallice is a white American growing up in Stayton, Oregon, a small town in Marion County known for its agricultural heritage and close‑knit community spirit. Her family observes traditional
    American holidays such as Thanksgiving and Fourth of July, while also embracing Pacific Northwest values like environmental stewardship, outdoor recreation, and community involvement. The local culture
    emphasizes support for neighbors, participation in school and town events, and a love for the natural scenery surrounding the Willamette River and nearby farms.
