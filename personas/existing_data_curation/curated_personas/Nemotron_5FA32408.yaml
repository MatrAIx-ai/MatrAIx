  career_goals: Dallice dreams of becoming an artist who can share her love of color and imagination with others, perhaps by opening a community art studio where children can explore creativity together.
    She also envisions a future as a teacher or school counselor, using her compassionate nature to help classmates express themselves and resolve conflicts. Ultimately, she hopes to combine her artistic
    talents with her desire to support and uplift her community.
