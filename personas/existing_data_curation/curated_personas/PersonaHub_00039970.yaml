persona_description: A neuroscientist who is interested in the mechanisms that control the interaction between the brain and the immune system and the potential of the placebo effect in boosting our physical
  and mental health. She is looking at the impact of the neuronal networks involved in positive experiences that contribute to recovery from illness, and is interested in understanding how negative emotions,
  linked to depression, affects immune activity. She is conducting experiments in mice and is using new technologies like transcranial magnetic stimulation (TMS) to understand how brain activity translates
  into changes in immune activity and how it can be used to control brain activity to boost recovery. She is conducting research to test different techniques in humans using tools like neurofeedback and
  TMS to see whether it is possible to affect immune activity by the brain.
