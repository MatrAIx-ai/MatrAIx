persona_description: A research scientist specializing in the development and testing of composite thermal insulation systems in solid-construction elements. This persona is likely to be interested in the
  practical applications of sandwich wall elements made of sheet steel with a core of rigid foam, as well as the transfer of adhesive tensile and shear forces in the composite joint. They are interested
  in the technical feasibility of glass rigid-foam concrete sandwich elements and the transmission of adhesive tensile and shear forces in the composite joint, and are looking for further tests on the load-bearing
  behaviour of these elements.
