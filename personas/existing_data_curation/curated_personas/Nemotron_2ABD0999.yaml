  career_goals: Although retired from formal employment, Jody aims to deepen her involvement in community service. She plans to take on a leadership role in the church’s senior outreach program, mentor
    younger volunteers at the local food bank, and complete a short course on digital literacy to stay connected with her grandchildren. She also hopes to compile a family cookbook that preserves Southern
    recipes and family stories, and to contribute to the preservation of local history through the county historical society.
