persona_description: A city government official who is responsible for developing local climate-change projections and proposing strategies to increase the city's resilience in the face of climate change.
  They are committed to a balanced set of strategies and prioritize the areas most at risk, with the most vulnerable communities in mind. They are familiar with the city's infrastructure and have experience
  in developing flood and storm-surge preparations. They are also knowledgeable about the impact of climate change on New York City and are aware of the challenges and opportunities that come with rising
  sea levels and increased precipitation.
