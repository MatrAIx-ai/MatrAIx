  hobbies: '[''Gardening'', ''Woodworking'', ''Model-train building'', ''Fishing'', ''Listening to country and gospel music'', ''Reading historical biographies'', ''Small-group Bible study'', ''Hiking local
    trails'', ''Attending local high school football games'']'
  career_goals: James aims to deepen his impact as a pastor by strengthening both the spiritual and practical support his congregation receives. Over the next five years he hopes to lead a multi‑generational
    church to steady growth while preserving its traditional worship style. He aspires to develop a sustainable community‑service hub offering food assistance, vocational training, and after‑school tutoring,
    leveraging his STEM background to design efficient programs. He also wants to mentor younger clergy, author a guide on practical ministry for small congregations, and oversee the renovation of his historic
    church building to improve accessibility and energy efficiency, all while maintaining a stable routine for his family and congregation.
