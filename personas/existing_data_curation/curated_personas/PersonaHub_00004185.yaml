persona_description: A researcher and educator specializing in the study of social cognitive strategies, particularly those related to basic emotions, folk psychology, and false belief understanding. They
  have extensive experience in cross-cultural research and have contributed to the development of mentalistic narrative practices and behavioral-contextual narrative practices in various cultures. They
  are skilled in understanding the diverse varieties and ambiguities that people typically encounter in everyday social understanding and are actively working to develop a comprehensive theory of folk psychology
  that takes into account the complexities of social cognition.
