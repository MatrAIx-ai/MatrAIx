personas:
  professional: Daniel Valencia, an aspiring young engineer who transforms LEGO kit instructions into functional prototypes while also inventing original brick creations, showcases a practical, detail‑oriented
    mindset balanced by spontaneous problem‑solving, hinting at a future career in mechanical design or robotics.
  sports: Daniel Valencia, a dedicated young soccer enthusiast who drills with the local youth club Thunder FC every Saturday morning and then joins unstructured pickup matches where they improvise moves,
    idolizes Manchester United and hopes to one day score a goal like Marcus Rashford.
  arts: Daniel Valencia, an avid sketcher who fills their sketchbook with panels inspired by comic legends Stan Lee and Alex Ross, and also designs pixel‑art landscapes in Minecraft Education, finds artistic
    expression a soothing outlet after a stressful school day.
  travel: Daniel Valencia, a curious traveler who dreams of visiting the Grand Canyon’s red cliffs and Tokyo’s futuristic district because they love the blend of natural wonder and neon lights, and they
    enjoy family road trips to nearby state parks where they can collect rocks for their LEGO models.
  culinary: Daniel Valencia, a budding home‑chef who can confidently assemble a pepperoni pizza from scratch using mozzarella, tomato sauce, and a sprinkle of oregano, loves cheesy macaroni, and often experiments
    by adding tiny LEGO‑shaped vegetable cuts to salads for extra fun.
  core: Daniel Valencia is an 8‑year‑old who thrives on the tension between structured LEGO builds and spontaneous imagination, worries about school pressures, and navigates daily life with a practical
    yet flexible outlook, often juggling a vivid inner world with the need for routine.
background:
  cultural: Daniel grows up in a Black family rooted in the rich cultural tapestry of the American South. His parents and extended relatives emphasize community, faith, and heritage, often gathering for
    Sunday church services at a local African‑American Baptist congregation where gospel music and storytelling are central. Family celebrations feature traditional Southern dishes such as collard greens,
    sweet potato pie, and fried chicken, alongside dishes passed down from his grandparents. He participates in community programs like the Greenville Boys & Girls Club, which offers mentorship, enrichment
    activities, and exposure to role models in education and sports. Local African‑American history, including visits to the Greenville Historical Museum and public murals celebrating Black pioneers, informs
    his sense of identity and pride. These cultural experiences shape his values of perseverance, communal support, and a love for music and rhythm that surface in his enjoyment of drumming and dance.
