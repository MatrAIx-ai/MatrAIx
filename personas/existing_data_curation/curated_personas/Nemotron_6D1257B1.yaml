  career_goals: Daniel dreams of a future where he can combine his love for helping people with his interest in structured, predictable work. He often says he wants to become a firefighter because he admires
    the clear responsibilities, teamwork, and the chance to protect his community. He also shows fascination with building and design, imagining himself as a civil engineer who constructs safe playgrounds
    and schools. More recently, he has expressed curiosity about creating video games, hoping to blend his creativity with the logical steps he enjoys in coding. While his ambitions are big, he sometimes
    worries whether he can achieve them, motivating him to practice his schoolwork and ask for guidance.
