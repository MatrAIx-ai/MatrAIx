  hobbies: '[''Performing skits with friends'', ''LEGO building'', ''Competitive video gaming'', ''Reading adventure novels'', ''Exploring local parks'', ''Participating in school talent shows'', ''Mixed‑media
    art projects'']'
  career_goals: Her biggest dream is to become a teacher or a community theater director, roles where she can blend her love of talking, storytelling, and practical problem‑solving. She wants to inspire
    other kids, lead projects that balance creativity with organization, and eventually run a program that combines performance with hands‑on learning. She also hopes to stay competitive, perhaps coaching
    a school debate or drama team, while managing any worries about meeting expectations.
