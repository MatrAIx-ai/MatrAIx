personas:
  professional: An aspiring game strategist and LEGO architect, Cherryll Jones channels their quick-thinking hobby in video games and love for building intricate bricks into leadership roles in school clubs,
    where their talkative, competitive nature shines as they organize skit performances and direct group projects.
  sports: Cherryll Jones dashes around the local playground as a forward for the Riverside Soccer Club while cheering passionately for the New York Knicks and the Chicago Cubs, and they channel their competitive
    edge into weekend pick-up basketball games where they thrive on the fast-paced, high-energy action.
  arts: Cherryll Jones draws inspiration from the vibrant stop-motion world of Studio Ghibli, the catchy pop beats of Billie Eilish, and the dramatic flair of Lin-Manuel Miranda's Hamilton, often channeling
    this mix into spontaneous costume-themed skits that blend their love for crafts and performance.
  travel: Cherryll Jones dreams of swapping backyard treasure hunts for real-world adventures, having already explored the nearby Redwood State Park and the bustling streets of New York City with their
    family, they now set their sights on visiting Disney World Resort in Florida and the ancient castles of Scotland for the ultimate quest.
  culinary: Cherryll Jones boasts a fearless palate for a ten-year-old, regularly whipping up peanut butter-banana sandwiches, personalized pizza slices topped with pepperoni, olives, and extra cheese,
    and even daring to try sushi rolls with avocado and cucumber, though their kitchen experiments often end in a sticky mess they proudly call creative chaos.
  core: Cherryll Jones is a charismatic, competitively-driven ten-year-old who thrives on the spotlight, juggles curiosity with a mess-loving DIY spirit, and often lets worry scribble into their otherwise
    adventurous day.
background:
  cultural: Cherryll comes from a middle‑class white family in Carpentersville, a suburban community in the Chicago metropolitan area of Illinois. Her upbringing reflects typical Midwestern values such
    as community involvement, family gatherings, and participation in local school and church activities. While her family embraces practical, down‑to‑earth attitudes, the proximity to the culturally diverse
    city of Chicago exposes her to a range of ideas and traditions, fostering her curiosity and openness to new experiences.
