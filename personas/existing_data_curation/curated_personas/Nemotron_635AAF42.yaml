personas:
  professional: Vibhakar Sharma is a data‑driven operations manager in the Bay Area who leverages Excel and Asana to schedule projects, keep budgets tight, and orchestrate cross‑functional teams, while
    sprinkling a visual‑design flair into promotional events and dreaming of a future boutique co‑working space that fuses art galleries with tech incubators.
  sports: Vibhakar Sharma plays midfield for the Golden Gate Soccer Club in a competitive Bay Area league, roots for the San Jose Earthquakes during MLS season, and squeezes in early morning runs along
    the Embarcadero when training for the next trail hike.
  arts: Vibhakar Sharma spends weekends wandering the San Francisco Museum of Modern Art and smaller zip‑code galleries, grooves to live sets by Anderson .Paak and Tycho at intimate venues, and immerses
    themselves in VR installations by teamLab, constantly drawing inspiration for their own visual‑design projects.
  travel: Vibhakar Sharma prefers meticulously planned getaways, often escaping to Yosemite’s high country for a weekend trek, savoring wine tasting in Napa, and dreaming of a future tech‑art pilgrimage
    to Tokyo’s teamLab Borderless, while balancing travel costs with their career ambitions.
  culinary: Vibhakar Sharma enjoys crafting Indian‑fusion dishes like tandoori cauliflower tacos, masala ramen, and butter‑chicken pizza, experimenting with spices such as turmeric, garam masala, and miso,
    and despite a modest kitchen setup, impresses friends with flavorful, Instagram‑worthy plates at potluck gatherings.
  core: Vibhakar Sharma is a curiosity‑driven, methodical socialite who blends art and analytics, yet can be overly competitive, sometimes hoarding the best coffee shop Wi‑Fi for personal projects and neglecting
    sleep during marathon brainstorming sessions.
background:
  cultural: Vibhakar comes from a South Indian (Telugu) family that immigrated to the United States before he was born. He grew up in the culturally diverse Bay Area, blending traditional Indian values—such
    as respect for elders, celebration of festivals like Diwali and Sankranti, and a love for classical music—with a Californian lifestyle centered on openness and innovation. Bilingual in English and Telugu,
    he maintains close ties to his heritage through community events at the local Indian cultural center while fully embracing the multicultural dynamics of Livermore.
