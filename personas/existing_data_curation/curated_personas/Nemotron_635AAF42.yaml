  career_goals: Vibhakar aims to advance from his current managerial role to a senior operations manager within the next three years, eventually stepping into a director‑level position overseeing multiple
    locations. He plans to pursue an MBA part‑time to deepen his strategic and financial expertise. Long‑term, he aspires to launch his own boutique co‑working space that blends art galleries with tech
    incubators, fostering a community where creative ideas meet entrepreneurial execution.
