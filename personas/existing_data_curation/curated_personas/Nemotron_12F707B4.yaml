personas:
  professional: Bonnie Henderson, an aspiring junior environmental technologist, blends a practical eye for detail in their sketches of Florida’s coastal flora with beginner‑level Scratch coding to create
    simple digital field guides, channeling their curiosity and calm resilience into disciplined yet flexible project routines.
  sports: Bonnie Henderson enjoys swimming laps at the community pool and participating in the local youth track club, quietly follows the Jacksonville Jaguars in the NFL and the Jacksonville Jumbo Shrimp
    in minor‑league baseball, and prefers solitary nature walks along the St Johns River over large‑group team sports, reflecting their reserved yet active disposition.
  arts: Bonnie Henderson nurtures a quiet artistic side through detailed nature drawings inspired by Claude Monet’s water lilies, piano practice of Beethoven’s Moonlight Sonata, and reading adventure books
    by Gerald Durrell, often listening to John Denver’s folk tunes while sketching, which fuels their reflective and harmonious worldview.
  travel: Bonnie Henderson favors low‑key weekend trips to nearby coastal state parks and occasional family road‑trips to Washington, D.C., planning them with a simple notebook itinerary that balances tide‑pool
    exploration with the comfort of familiar beachfront cafés, while dreaming of future adventures in the Everglades and the Grand Canyon.
  culinary: Bonnie Henderson prefers straightforward comfort foods such as grilled cheese sandwiches with tomato soup, enjoys assembling shrimp tacos with lime and cilantro, and experiments with modest
    baking like oatmeal raisin cookies, often choosing fresh strawberries and locally caught mussels as star ingredients.
  core: Bonnie Henderson is a calm, curious 11‑year‑old who channels solitary explorations of Florida’s shores into creative sketches, modest coding projects, and thoughtful savings, all while gently nudging
    themselves away from impulsive treats.
background:
  cultural: Bonnie was raised in a middle‑class White family in Orange Park, Florida, a community that blends suburban life with close proximity to the Atlantic coast. Her upbringing reflects typical Floridian
    influences such as frequent beach outings, participation in school and community programs, and a strong emphasis on civic responsibility. Family traditions include celebrating holidays like Thanksgiving,
    Christmas, and local events such as the annual Orange Park Festival, where she enjoys simple, wholesome foods and community games. The multicultural environment of Duval County has exposed her to a
    range of perspectives, fostering her respect for diverse backgrounds while maintaining her family's cultural values of kindness, cooperation, and practical stewardship of the environment.
attributes:
  skills: '[''Reading comprehension (grade‑6 level)'', ''Pre‑algebra and problem solving'', ''Scientific inquiry (basic experiments)'', ''Digital literacy (Scratch coding)'', ''Organizational skills (planners,
