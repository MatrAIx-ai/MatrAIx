  hobbies: '[''Reading adventure and nature books'', ''Nature journaling and sketching'', ''Exploring parks and coastal trails'', ''Collecting shells and observing wildlife'', ''Scratch coding projects'',
    ''LEGO model building'', ''Piano practice'', ''Volunteering at animal shelter (small groups)'']'
  career_goals: Bonnie envisions a future where she can combine her love for nature, animals, and practical problem-solving. She aspires to become a marine biologist or wildlife conservationist, hoping
    to study marine ecosystems along Florida’s coast and contribute to protecting them. She also dreams of one day designing community gardens or educational programs that teach younger children about environmental
    stewardship. Her calm and resilient mindset gives her confidence that she can pursue these goals through steady academic effort and hands‑on experiences.
