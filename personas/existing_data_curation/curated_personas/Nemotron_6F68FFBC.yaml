  hobbies: '[''Fishing'', ''Woodworking'', ''Cooking traditional Mexican cuisine'', ''Community gardening'', ''Volunteer construction work (Habitat for Humanity)'']'
  career_goals: Abel aims to transition into a supervisory and mentorship role within the next few years, leveraging his deep technical knowledge to train the next generation of metalworkers in Monterey
    County. He plans to obtain a journeyman certification and eventually become a certified safety inspector, helping local contractors meet higher safety standards. Long‑term, Abel hopes to establish a
    small, family‑run metal‑fabrication shop that provides steady employment for local residents and contributes to community projects like affordable housing and small‑scale infrastructure improvements.
    He is also interested in integrating sustainable building practices, such as using recycled steel, to align his work with evolving industry standards.
