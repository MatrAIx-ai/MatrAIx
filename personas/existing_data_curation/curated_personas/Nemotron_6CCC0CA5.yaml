  career_goals: Terry aims to move into a senior sales leadership role—such as regional sales manager or director—where he can shape broader strategy while preserving the disciplined, data‑centric culture
    he has cultivated. He plans to earn the Certified Professional Sales Leader (CPSL) credential and to spearhead a department‑wide mental‑wellness initiative, leveraging his own experience with anxiety
    to create a supportive environment. Over the next five years he also wants to mentor at least two future supervisors, formalize a sales‑enablement framework that integrates emerging technology with
    proven methods, and position himself for a smooth transition into either a strategic consulting role or a phased retirement that maintains a legacy of high performance and team cohesion.
