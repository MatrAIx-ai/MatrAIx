  career_goals: Noel aims to become a senior industrial engineer and eventually a safety manager within the next five years, leveraging her technical expertise to lead large‑scale sustainability and worker‑well‑being
    initiatives. She plans to earn a Certified Safety Professional (CSP) credential and a Six Sigma Black Belt, and to pursue a master’s degree focused on occupational health ergonomics. Long‑term, she
    hopes to spearhead corporate programs that reduce workplace injuries, mentor emerging women engineers from underrepresented backgrounds, and collaborate with local manufacturing firms on community safety
    workshops.
