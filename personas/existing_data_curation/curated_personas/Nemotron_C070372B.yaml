  hobbies: '[''Art gallery visits'', ''Photography (urban and cultural subjects)'', ''Cooking traditional Mexican cuisine with contemporary flair'', ''Mindfulness meditation'', ''Journaling'', ''Yoga for
    anxiety management'', ''Reading philosophy and contemporary literature'', ''Hiking in the Texas Hill Country'', ''Small-group cultural tours'', ''Technology trend analysis'']'
  career_goals: Mauricio aims to ascend to a senior director or chief operating officer role where he can lead large‑scale transformation initiatives that integrate sustainability and innovative technologies.
    He is driven to mentor emerging managers, especially from underrepresented backgrounds, and to spearhead projects that fuse operational excellence with creative problem‑solving. In the long term, he
    envisions establishing his own consultancy that helps mid‑size firms adopt high‑impact process improvements while preserving a people‑first culture.
