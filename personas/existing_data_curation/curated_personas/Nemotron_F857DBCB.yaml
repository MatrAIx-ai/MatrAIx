personas:
  professional: Michael May is a hands‑on maintenance technician who blends solid carpentry, plumbing, and electrical troubleshooting skills with a knack for improvised fixes, and they are on track to earn
    a CMRT credential while eyeing a supervisory role in the local school district's facilities team.
  sports: Michael May is an avid supporter of the Eastside High Eagles football team, never misses a Friday night game, cheers for the county's minor‑league baseball club, and spends early Saturdays fishing
    at Lake Willow while also playing pickup softball with the town's recreation league.
  arts: Michael May unwinds by strumming classic rock on their guitar, favoring songs by Led Zeppelin, AC DC, and The Rolling Stones, and enjoys casual gaming sessions of Mario Kart with their spouse on
    Saturday evenings as a relaxed artistic outlet.
  travel: Michael May prefers short road trips to nearby attractions such as the Blue Ridge Trail and Lake Evergreen for weekend fishing, carefully plans each outing in a notebook, but dreams of a summer
    drive along the Pacific Coast Highway once they save enough for a family vacation.
  culinary: Michael May cultivates tomatoes, bell peppers, and basil in their backyard garden, then crafts fresh salsa, spaghetti topped with a homemade marinara, and grilled vegetable kebabs, while occasionally
    treating the family to a Saturday night BBQ at a local joint renowned for its smoked brisket.
  core: Michael May is a pragmatic 22‑year‑old maintenance worker who balances tool‑laden projects, garden‑to‑table meals, and weekend football chants, even if their planner often lives forgotten in a drawer.
background:
  cultural: Michael grew up in a small Midwestern town in Kansas, shaped by the region's emphasis on hard work, self‑reliance, and community cooperation. His family places a high value on modesty, responsibility,
    and supporting one another, which aligns with his cooperative and harmony‑seeking nature. He participates in a local church that fosters fellowship and service, reflecting the area's tradition of faith‑based
    community involvement. The rural environment has cultivated his practical skill set and appreciation for outdoor pursuits, while his upbringing encourages a balanced approach to family life and personal
    flexibility.
attributes:
  skills: '[''Carpentry'', ''Plumbing basics'', ''Electrical troubleshooting'', ''HVAC maintenance'', ''Appliance repair'', ''Hand and power tool proficiency'', ''Improvised problem solving'', ''Safety
