  hobbies: '[''Fishing'', ''Gardening'', ''Woodworking'', ''Attending high school sports events'', ''Community fairs and potlucks'', ''Playing guitar'', ''Casual video gaming'']'
  career_goals: Michael aims to earn a Certified Maintenance & Reliability Technician (CMRT) credential within the next two years to solidify his technical expertise. He hopes to advance to a supervisory
    role overseeing facility upkeep for the local school district or a municipal building, which would provide a stable income and predictable schedule for his young family. Long‑term, he envisions opening
    a small, community‑focused handyman business that offers flexible services to neighbors while allowing him to maintain a steady work‑life balance. He also plans to attend occasional trade workshops
    to stay current with emerging repair technologies.
