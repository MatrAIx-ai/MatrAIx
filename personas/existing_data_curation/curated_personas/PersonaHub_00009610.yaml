persona_description: Joel Chandler Harris was a renowned American writer who created the character of Uncle Remus, a fictional black commentator who originated from "dialect sketches" written for The Atlanta
  Journal-Constitution. Harris used his stories to promote an understanding between the races in the post-Civil War South. His stories were detailed about everyday slave life, right down to how they made
  shoe pegs, baked yams and ash cakes. Harris was known for his distaste for the intolerable misrepresentations of the minstrel stage and his painstaking transcription of dialect as he heard it. His work
  was an immediate success and his characters, such as Brer Fox and Brer Rabbit, became popular among readers. Harris's stories were meant to be entertaining, not moral lessons, and he often intervened
  in his stories to tell his audience that the animals' behavior shouldn't always be considered proper human conduct. Harris's work was an important contribution to American literature and his character
  Uncle Remus is considered one of the most famous fictional characters in American literature.
