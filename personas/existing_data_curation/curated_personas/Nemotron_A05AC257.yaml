personas:
  professional: Heather Couper, a 39‑year‑old curriculum innovator who leverages her business degree and artistic flair to design project‑based learning units that blend entrepreneurship with creative expression,
    thrives on public speaking and workshop facilitation, and channels her competitive drive into securing grants despite a relaxed, sometimes disorganized approach to daily planning.
  sports: Heather Couper, an avid hiker who tackles sections of the Appalachian Trail each spring, participates in the Capital Area Running Club for weekend runs, joins a co‑ed adult soccer league that
    cheers the Philadelphia Union, and never misses a Steelers game on Sundays.
  arts: Heather Couper, whose watercolor landscapes echo Claude Monet’s soft palette, frequents the Philadelphia Museum of Art to study Georgia O’Keeffe’s works, embraces improv comedy workshops inspired
    by The Second City’s style, and fills her evenings with live performances by the Philadelphia Orchestra under Yannick Nézet‑Séguin and Broadway shows starring Lin‑Manuel Miranda.
  travel: Heather Couper, who prefers spontaneous itineraries over rigid schedules, has already trekked the Scottish Highlands and enjoys weekend getaways to the Poconos for hiking, dreams of exploring
    Kyoto’s Gion Matsuri lantern festivals, and balances family responsibilities that sometimes limit extended overseas trips.
  culinary: Heather Couper, an adventurous home chef with intermediate cooking skills, frequently experiments with saffron‑infused paella, Thai green curry flavored with lemongrass and kaffir lime, and
    Moroccan tagine featuring preserved lemons, often showcasing these dishes at her multicultural dinner parties.
  core: Heather Couper, a charismatic yet delightfully disorganized educator who merges art with entrepreneurship, thrives on spontaneous social gatherings, and habitually misplaces her planner while juggling
    grant proposals and watercolor brushes.
background:
  cultural: Heather was raised in a middle‑class, predominantly white suburb of the Lehigh Valley in Pennsylvania. Her family placed a strong emphasis on education, community involvement, and a pragmatic
    work ethic shaped by the region’s industrial and service‑oriented history. Growing up she took part in local fairs, church youth groups, and school initiatives, fostering a deep appreciation for community
    spirit and self‑reliant values. While her heritage is broadly American, she identifies with the cultural traditions of Lehigh County, such as seasonal festivals, local sports enthusiasm, and steadfast
    support for public schools.
