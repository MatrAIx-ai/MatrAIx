  hobbies: '[''Watercolor Painting'', ''Improv Comedy'', ''Book Club'', ''Hosting Dinner Parties'', ''Cooking International Cuisine'', ''Volunteering in Tutoring Programs'', ''Hiking'', ''Traveling to Cultural
    Festivals'', ''Attending Live Music Events'', ''Visiting Art Galleries'']'
  career_goals: Heather aims to transition into school leadership within the next three years, pursuing a master’s degree in educational administration to become a principal or district curriculum specialist.
    She aspires to launch a county‑wide arts‑and‑entrepreneurship integration program that encourages student creativity and competitive thinking, securing grant funding to support after‑school workshops.
    In the long term, she envisions establishing a nonprofit that offers entrepreneurship mentorship to underserved youth and authoring a guidebook for teachers on blending business concepts with elementary
    education.
