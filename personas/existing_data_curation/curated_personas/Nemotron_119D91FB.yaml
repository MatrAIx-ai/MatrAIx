  career_goals: James aims to advance into a supervisory role such as Head of Guest Services or Operations Manager at a leading hotel or resort, where he can apply his STEM knowledge to modernize service
    workflows, introduce data‑driven inventory systems, and mentor junior staff. He also aspires to earn a Certified Hospitality Supervisor credential and eventually launch a consultancy that helps boutique
    hotels integrate technology to enhance guest experiences while maintaining a personal touch.
