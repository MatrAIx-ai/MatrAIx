    Oracle)'', ''Creative Problem Solving'', ''Design Thinking'', ''Stakeholder Communication'']'
  hobbies: '[''Visiting art museums and galleries'', ''Urban and architectural photography'', ''Playing acoustic guitar'', ''Reading science-fiction and philosophy'', ''Playing chess'', ''Hiking Long Island
    nature trails'', ''Experimenting with fusion cooking'', ''Attending tech meetups and startup pitch events'', ''Practicing yoga and meditation'', ''Writing a personal blog on operational innovation'']'
  career_goals: Jonathan aims to advance to a senior executive role—such as Director of Operations or Vice President of Strategy—where he can shape enterprise-wide efficiency programs and champion innovative,
    data-centric cultures. He plans to earn an MBA and attain a Lean Six Sigma Black Belt within the next three years to deepen his strategic and analytical expertise. Long-term, he envisions launching
    a boutique consulting firm that helps midsize companies embed artistic creativity and resilience into their operational frameworks, while also authoring thought-leadership pieces on sustainable process
    design.
