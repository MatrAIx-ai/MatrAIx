  career_goals: John aims to achieve master‑die‑maker certification and eventually lead a small, tight‑knit workshop that balances high‑precision production with a flexible, low‑stress environment. He dreams
    of designing innovative, custom‑tool solutions for niche manufacturers in the Midwest, reducing setup times and material waste. In the longer term, he hopes to mentor a new generation of craftsmen,
    perhaps opening a part‑time training program that emphasizes hands‑on skill development over formal classroom learning. While he values structure in his craft, he wants his future role to allow enough
    autonomy to work at his own pace and maintain a healthy work‑life balance.
