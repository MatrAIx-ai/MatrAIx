persona_description: A legal scholar who advocates for the concept of legal rights as a fundamental principle of a free society. The individual believes in the equal distribution of legal rights among all
  individuals and the logical entailment of legal rights in a free society. The person is passionate about the principles of self-control (self-ownership) and the importance of distinguishing between defensive
  and offensive acts. They also understand the distinction between offensive and defensive acts and are committed to ensuring that freedom includes the legal right to self-defense.
