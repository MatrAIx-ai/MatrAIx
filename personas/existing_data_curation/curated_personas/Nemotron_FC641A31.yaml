personas:
  professional: Jose Perez, a one‑year‑old with a nascent fascination for cause‑and‑effect, spends hours arranging shape‑sorter toys and building block towers, foreshadowing a future career in engineering
    where meticulous problem‑solving, methodical planning, and a collaborative, talkative demeanor will make them a natural team leader.
  sports: Jose Perez delights in toddler gymnastics at the local community center’s ‘Little Movers’ class, cheers for the Tampa Bay Buccaneers during family game nights, and eagerly watches the community’s
    youth soccer practice at the nearby park, reflecting a playful yet organized approach to physical activity.
  arts: Jose Perez is captivated by the rhythmic beats of salsa music at family festivals, frequently claps along to lively parrandas, and enjoys watching animated cartoons featuring classic artists like
    Disney’s ‘The Lion King,’ which together nurture a vibrant, socially engaged artistic appreciation.
  travel: Jose Perez has taken short trips to the family’s beachside cottage, savoring sand between toes, and enjoys seasonal visits to a grandparent’s home on a tropical island where pasteles and flan
    are served, while dreaming of future adventures to Disney World and the vibrant streets of New Orleans.
  culinary: Jose Perez prefers the sweet smoothness of mashed sweet potatoes and the occasional spoonful of mango puree, but lights up at family gatherings when served flan and small bites of pasteles,
    and shows early curiosity by trying to hold a plastic fork during mealtime.
  core: Jose Perez, a one‑year‑old with an innate curiosity, methodical play style, sociable charm, and a touch of baby‑level worry, balances early learning with family traditions and a budding fascination
    for building, saving, and rhythmic music.
background:
  cultural: Jose Luis grows up in a bilingual Puerto Rican household in Land O Lakes, Florida. Spanish is spoken at home alongside English, and family celebrations often include traditional foods like pasteles
    and flan, as well as music from Puerto Rico's rich heritage. He participates in community events such as the annual Puerto Rican Festival in nearby Tampa, where salsa dancing and parrandas reinforce
    his cultural identity. The close‑knit family structure and emphasis on harmony reflect both his Puerto Rican roots and the supportive neighborhood environment.
