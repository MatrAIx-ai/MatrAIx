  career_goals: Trevor aims to deepen his impact on teacher education by earning a master's degree in Educational Leadership within the next three years, followed by a doctorate focused on inclusive pedagogy.
    He envisions advancing to a department chair role, leading curriculum innovation projects that integrate emerging educational technologies, and establishing a regional apprenticeship program that connects
    college students with local schools. Additionally, he seeks to publish research on student resilience and to serve as a mentor for new faculty, contributing to the professional development culture at
    his institution.
