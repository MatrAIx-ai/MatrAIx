personas:
  professional: Rebecca Singley is a seasoned senior cleaning consultant with over five decades of hands‑on housekeeping expertise, blending eco‑friendly cleaning techniques, minor home repairs, and mentorship
    for younger staff, and their pragmatic curiosity and spontaneous schedule flexibility make each client visit both reliable and adaptable.
  sports: Rebecca Singley enjoys daily walks along the Leesburg lakeside trail as part of the Lake County Senior Walking Club, follows the Orlando Magic basketball team and the Tampa Bay Rays baseball team,
    and they occasionally join a community pickleball league in the cooler months to stay active.
  arts: Rebecca Singley delights in classic mystery novels by Agatha Christie, frequents the local community theater to watch performances of plays like 'Our Town', tunes into the smooth crooning of Ella
    Fitzgerald, and they spend quiet evenings stitching a quilt while listening to the gentle piano works of Debussy.
  travel: Rebecca Singley prefers relaxed, well‑planned road trips that include scenic rest stops, having already visited the historic streets of St. Augustine and the sun‑kissed beaches of the Florida
    Keys, they dream of a gentle cruise to Savannah, Georgia, and a future pilgrimage to London’s museums, balancing their love of history with the comfort of familiar routines.
  culinary: Rebecca Singley enjoys baking simple treats like classic chocolate chip cookies and apple crumble pie using home‑grown apples, fresh basil, and garden tomatoes, cooks comfort foods such as chicken
    pot pie and collard greens seasoned with smoked paprika, and they take pride in sharing these dishes at the senior center, though they sometimes over‑salt their soup in the enthusiasm of the moment.
  core: Rebecca Singley is a pragmatic, curious senior who blends eco‑conscious housekeeping with a love for gardening, mystery novels, and community, while they occasionally forget to pay a bill on time
    and hoard extra cleaning supplies.
background:
  cultural: Rebecca is a White American raised in a modest, working‑class family in central Florida. Her upbringing emphasized self‑reliance, hospitality, and community involvement, values reinforced by
    regular attendance at a local Baptist church. Growing up in the post‑World‑II era, she learned domestic skills early, contributing to her practical, hands‑on approach to work. While she completed high
    school, she pursued most of her knowledge through on‑the‑job experience and neighborhood networks. Her cultural background blends Southern hospitality with a pragmatic, no‑nonsense attitude toward daily
    life, shaping her courteous, cooperative demeanor and her preference for straightforward, reliable solutions.
attributes:
  skills: '[''Residential cleaning'', ''Deep‑cleaning techniques (steam cleaning, floor stripping & waxing)'', ''Carpet and floor care'', ''Laundry and fabric care'', ''Window washing'', ''Pet‑friendly
