  hobbies: '[''hosting dinner parties'', ''cooking'', ''hiking in the Rockies'', ''community theater'', ''board games'', ''volunteering at local animal shelter'', ''gardening'', ''reading mystery novels'',
    ''DIY home projects'']'
  career_goals: Mitzi aims to channel her organizational talent and charismatic presence into a community‑focused role. She is pursuing certification as an administrative professional and plans to apply
    for a part‑time position as a community events coordinator for the City of Thornton or a local nonprofit. Long‑term, she envisions launching a boutique home‑based catering and event‑planning business
    that showcases her cooking, allows her to compete for high‑profile contracts, and provides financial independence while maintaining a predictable, structured work schedule.
