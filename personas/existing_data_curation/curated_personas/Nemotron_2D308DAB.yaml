personas:
  professional: Mitzi Purington, a 41‑year‑old aspiring community events coordinator, leverages their meticulous budgeting, schedule‑juggling expertise, and natural flair for public‑speaking to transform
    neighborhood gatherings into seamless, high‑energy experiences, while their competitive streak drives them to secure the most coveted municipal contracts.
  sports: Mitzi Purington channels their competitive drive into weekend hikes with the Trailblazers Hiking Club, fervently follows the Denver Broncos and Colorado Avalanche, and competes in a co‑ed softball
    league that keeps them fit while satisfying a love for team camaraderie.
  arts: Mitzi Purington embraces the arts by starring in community theater productions of classic comedies, quoting Shakespeare lines, while unwinding with mystery novels by Agatha Christie and Gillian
    Flynn, and they often stream concerts by John Legend and the Avett Brothers to fuel their creative spirit.
  travel: Mitzi Purington prefers meticulously planned road trips, having already explored the rugged trails of Rocky Mountain National Park and the jazz‑filled streets of New Orleans, while they dream
    of a culinary pilgrimage to Tuscany’s vineyards, balancing wanderlust with budget constraints and a love for modest boutique B&Bs.
  culinary: Mitzi Purington, a self‑taught home chef, delights in crafting elaborate dinner parties featuring rosemary‑infused roasted lamb, lemon‑garlic quinoa salads, and homemade basil pesto gnocchi,
    while they never pass up a chance to sample artisanal cheese boards and locally sourced heirloom tomatoes.
  core: Mitzi Purington is a predictably structured yet fiercely competitive social catalyst who can juggle a flawless dinner party while secretly hoarding a stash of expired coupons for the thrill of a
    bargain, and they relish the occasional strategic win.
background:
  cultural: Mitzi comes from a white, middle‑class, Anglo‑American background typical of suburban Colorado. Raised in a predominantly Protestant environment, she values hard work, self‑reliance, and community
    service. The Colorado lifestyle—outdoor recreation, a strong sense of local identity, and a blend of suburban convenience with frontier spirit—has shaped her practical outlook and love for social gatherings
    rooted in neighborhood traditions.
attributes:
  skills: '[''event planning'', ''community outreach'', ''budget management'', ''public speaking'', ''conflict resolution'', ''project coordination'', ''basic computer skills (Microsoft Office, social media)'',
