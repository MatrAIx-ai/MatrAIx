persona_description: A linguist who specializes in the study of Chulym language, a Turkic language spoken by descendants of an ancient local population in Siberia. The Chulym people pose an interesting
  puzzle for genetics and the history of human migration, and the language is in decline, with only three fluent speakers left. The speaker population continues to decline sharply, and only three speakers
  are able to work with the project. The Enduring Voices Project represents a partnership between National Geographic Mission Programs and the Living Tongues Institute for Endangered Languages, and the
  project aims to document, record, and analyze the fragmented knowledge that remains of the Chulym people. The project has published a collection of the stories and word lists collected on previous expeditions,
  making them available both to scientists and to the Chulym community.
