  career_goals: Tegan dreams of a future where she can blend her love for art and curiosity about the natural world. She hopes to become an artist who creates vibrant illustrations of wildlife, or a scientist
    who explores animals and shares discoveries through storytelling. She also imagines leading a school art club or becoming a teacher who inspires other kids to think creatively and work together.
