personas:
  professional: An aspiring junior creator, Tegan Mccollum channels their curiosity and organization into drawing vivid watercolors, building intricate LEGO worlds, and narrating stories for friends, and
    they eagerly present their creations to classmates, showcasing early leadership and collaborative skills even in school projects.
  sports: An energetic youth soccer player, Tegan Mccollum practices twice a week with the local Little Ravens team, cheers for the LA Galaxy, and they balance competitive play with impromptu kick‑around
    games at the neighborhood park.
  arts: A vibrant visual storyteller, Tegan Mccollum revels in painting watercolors inspired by Monet and creating LEGO sculptures reminiscent of Dr Seuss, while they collect friendship bracelets and draw
    inspiration from animated films like Moana and Spirited Away.
  travel: A curious explorer, Tegan Mccollum loves organized school trips to the Neon Museum and local science center, dreams of traveling to the Tokyo Studio Ghibli Museum and the Louvre, and they prefer
    a mix of carefully plotted itineraries and spontaneous photo‑hunt adventures.
  culinary: A budding foodie, Tegan Mccollum enjoys crafting colorful fruit kebabs, piling pepperoni on homemade pizza, and mixing mango smoothies with a dash of honey, but they often get distracted midway
    through making a sandwich, leaving crumbs everywhere.
  core: Tegan Mccollum is an eight‑year‑old curious creator who blends art, LEGO building, and soccer with a pinch of organized chaos, sprinkling friendship bracelets and adventure stories into everyday
    life, and they never miss a chance to dream about the next museum visit.
background:
  cultural: Tegan comes from a white American family with roots in the Midwest and Northeast, now living in the vibrant city of Las Vegas, Nevada. Her upbringing blends typical American traditions—such
    as celebrating Thanksgiving, Fourth of July, and school festivals—with the unique cultural flavors of Las Vegas, including occasional visits to family-friendly shows, the Neon Museum, and desert outings.
    The city’s diverse entertainment scene fuels her interest in the arts, while the surrounding desert landscape nurtures a fascination with nature and wildlife.
