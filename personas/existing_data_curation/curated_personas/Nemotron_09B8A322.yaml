  career_goals: In the short term, Elizabeth aims to build a competitive portfolio that will earn her a spot in her high school's advanced art program and win regional art contests, securing a scholarship
    for further study. Long‑term, she dreams of becoming a professional illustrator or concept artist for video games or animated films, blending her love for storytelling and visual design. She also envisions
    attending a university with a strong fine‑arts and digital media program, and eventually freelance while mentoring younger artists. Her competitive nature drives her to set ambitious milestones, though
    she often worries about meeting expectations and balancing creative pursuits with academic responsibilities.
