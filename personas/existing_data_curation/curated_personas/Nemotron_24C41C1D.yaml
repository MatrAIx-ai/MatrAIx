  career_goals: Laura aims to transition from being a hands‑on carpenter to a master‑carpenter and small business owner. Over the next five years she plans to obtain NCCER certification, expand her workshop
    into a boutique furniture studio, and secure contracts for sustainable residential renovations in the Duluth area. She is passionate about mentoring other women entering the trades and hopes to establish
    a community apprenticeship program. Financially, she seeks to achieve stable income that supports home ownership and provides a safety net post‑divorce.
