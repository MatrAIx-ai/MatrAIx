  career_goals: Ned aims to finish high school with a solid grounding in STEM, then study mechanical or civil engineering to blend his curiosity with practical problem‑solving. He hopes to secure a summer
    apprenticeship at a local hardware store or a tech internship, gaining hands‑on experience that could later translate into designing community projects like bike repair workshops or skate parks.
