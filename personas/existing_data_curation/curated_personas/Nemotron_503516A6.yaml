personas:
  professional: Teen robotics enthusiast Ned Cooper blends hands‑on curiosity for Arduino and robot design with a natural flair for teamwork, often leading school club projects while casually filming behind‑the‑scenes
    videos, and they thrive on turning messy brainstorming sessions into workable prototypes.
  sports: Ned Cooper shoots hoops for the high school Eagles basketball team and dribbles on the Knights soccer squad, cheers on the Los Angeles Lakers and Manchester United on game days, and they spend
    evenings perfecting kick‑flip tricks at the local skate park for extra cardio.
  arts: Ned Cooper crafts short, snappy comedy clips for TikTok inspired by the witty timing of early silent film masters, sets them to a soundtrack of Billie Eilish, Tame Impala, and The 1975, and they
    regularly binge‑watch indie‑rock concerts on YouTube for creative recharge.
  travel: Ned Cooper loves spontaneous weekend road trips to the nearby lake for paddleboarding, dreams of a high‑school exchange in Kyoto to geek out over robotics festivals, and they keep a scrapbook
    of family trips from Yellowstone to the Grand Canyon.
  culinary: Ned Cooper favors late‑night pepperoni pizza and spicy chicken tacos, can whip up a quick ramen bowl with instant noodles, a soft‑boiled egg, and soy‑ginger broth, and they experiment with DIY
    energy bars using oats, peanut butter, and honey for after‑practice snacks.
  core: Ned Cooper is a high‑energy teen who fuses robotics curiosity with social media flair, juggling basketball, skate parks, and an indie‑pop soundtrack, while they often juggle disorganized schedules
    and impulsive spending.
background:
  cultural: Ned was raised in the suburban town of Saint Charles, Illinois, a predominantly white, middle‑class community that values Midwestern friendliness, community involvement, and a mix of traditional
    and emerging tech cultures. His family participates in local traditions such as the annual Saint Charles Summer Festival, Fourth of July parades, and high‑school sports events, instilling a sense of
    civic pride and a pragmatic yet open‑minded outlook.
