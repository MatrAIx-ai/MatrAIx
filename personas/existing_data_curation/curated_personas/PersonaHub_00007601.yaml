persona_description: A healthcare professional who is knowledgeable about parasitic infections, particularly pinworm infections. They are likely to be a doctor or a nurse who treats patients with pinworm
  infections and is familiar with the symptoms, treatment options, and preventive measures. They may also be interested in the epidemiology and transmission of pinworm infections and may have experience
  with the use of tape tests and medication for pinworm treatment. They are likely to have a good understanding of the importance of hygiene and prevention in managing pinworm infections and may provide
  advice on how to prevent reinfection.
