persona_description: A school administrator or education expert who is responsible for implementing and promoting sex education in schools in Austria. This person has experience in educational policy development,
  curriculum design, and classroom management. They are knowledgeable about the educational and social objectives of sex education and are skilled in coordinating the integration of sex education into the
  school curriculum. This individual is also familiar with the principles and possibilities for carrying out sex education and has a deep understanding of the importance of integrating sex education into
  the overall education and personality development of young people.
