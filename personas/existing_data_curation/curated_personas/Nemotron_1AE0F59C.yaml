personas:
  professional: A seasoned painter and restoration specialist, Keyosha Fitzgerald leverages three decades of mastery in interior and exterior finishes, blends meticulous project planning with an inquisitive
    eye for sustainable low‑VOC coatings, and mentors apprentices with disciplined yet compassionate guidance.
  sports: An avid supporter of the Philadelphia Eagles and a regular participant in the local senior walking club, Keyosha Fitzgerald enjoys weekend strolls through historic neighborhoods, occasional pick‑up
    basketball games at the community center, and follows the Philadelphia 76ers season with lively commentary, while maintaining a disciplined yet low‑impact fitness routine centered on stretching, gardening,
    and yoga.
  arts: A passionate watercolor hobbyist, Keyosha Fitzgerald fills her evenings with abstract brushwork inspired by the vibrant hues of the Philadelphia Museum of Art, sways to the soulful sounds of Marvin Gaye,
    Aretha Franklin, and contemporary jazz virtuoso Kamasi Washington, and regularly attends local museum talks featuring artists like Jacob Lawrence, while lending her voice to the church outreach choir.
  travel: A thoughtful traveler with a penchant for weekend road trips, Keyosha Fitzgerald has explored the historic districts of Savannah and New Orleans, plans a summer pilgrimage to Ghana’s coastal forts
    to deepen her appreciation for diaspora history, and prefers meticulously mapped itineraries that balance cultural immersion with relaxed garden strolls, all while budgeting within family commitments.
  culinary: A seasoned home cook, Keyosha Fitzgerald expertly prepares soul‑food classics such as collard greens with smoked turkey, caramelized sweet‑potato pie, and crispy fried catfish, seasoning with
    thyme, garlic, and a splash of hot sauce, while also experimenting with healthier twists like low‑sodium barbecue ribs, and delights in sharing her dishes at church potlucks and family gatherings.
  core: Keyosha Fitzgerald blends pragmatic discipline with boundless curiosity, juggling a thriving painting business, watercolor hobby, and community choir while habitually sipping three coffees a day
    and occasionally forgetting to water her garden during busy weeks.
background:
  cultural: Keyosha was born and raised in the North Philadelphia community, a historically Black neighborhood that shaped her identity with a strong sense of resilience and solidarity. Her parents were
    part of the Great Migration, bringing Southern traditions, church life, and a deep appreciation for music and storytelling to the city. Growing up, she experienced the cultural richness of local block
    parties, church gatherings, and neighborhood barbershops, while also confronting the challenges that Black women often face in male‑dominated trades. This background fostered her pragmatic outlook and
    her drive to break barriers, making her a proud representative of her community in the construction industry. She maintains close ties with the African‑American church, celebrates Juneteenth, and supports
    local initiatives that preserve Black heritage sites, weaving her cultural roots into both her personal and professional life.
attributes:
  skills: '[''interior painting'', ''exterior painting'', ''decorative finishes (faux plaster, glazing)'', ''wallpaper installation and removal'', ''surface preparation (scraping, sanding, priming)'', ''color
    theory application'', ''use of low‑VOC and eco‑friendly paints'', ''project budgeting and scheduling'', ''client communication'', ''team leadership and apprenticeship mentorship'', ''OSHA safety compliance'']'
  hobbies: '[''watercolor painting'', ''abstract art creation'', ''reading African‑American history'', ''museum visits'', ''listening to soul, Motown, and jazz music'', ''volunteering with Habitat for Humanity
    (painting projects)'', ''church choir participation'', ''gardening'', ''crossword puzzles'', ''cooking soul‑food family recipes'']'
  career_goals: Keyosha aims to transition from a sole‑operator painter to the owner of a small, family‑run painting and restoration firm that specializes in preserving Philadelphia’s historic African‑American
    neighborhoods. She wants to obtain a Certified Professional Painter credential and attend workshops on sustainable surface coatings, combining her practical mindset with her curiosity for new methods.
    Over the next five years, she plans to expand her client base, secure contracts with local heritage preservation societies, and hire and train at least two apprentices, providing a pathway for other
    Black women in the trades. Financially, she aspires to achieve a steady income that supports her family’s future while building a reputation for quality, reliability, and cultural stewardship.
