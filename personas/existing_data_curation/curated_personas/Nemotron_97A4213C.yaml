personas:
  professional: Jacqueline Heder, a data‑driven HR leader at a technology firm, blends analytics expertise with creative employee‑experience design, championing DEI initiatives and calm, assertive change
    management while steering talent‑acquisition dashboards built in Workday and SAP SuccessFactors.
  sports: Jacqueline Heder, an avid hiker and weekend runner, trains with the Washington Trail Runners club on the Great Falls and Catoctin Mountain trails, occasionally plays casual tennis at the Maryland
    Athletic Club, and follows the Washington Capitals, Wizards, and Commanders as part of her seasonal sports fandom.
  arts: Jacqueline Heder, a devoted art aficionado, visits the Hirshhorn Museum and the National Gallery of Art weekly, collects limited‑edition prints by Yayoi Kusama, studies the photography of Annie Leibovitz
    and Ansel Adams, and volunteers as an educator in the Smithsonian’s museum‑education program.
  travel: Jacqueline Heder, an intentional traveler, prefers meticulously planned weekend getaways to nearby natural retreats like Shenandoah National Park, while dreaming of longer cultural immersions
    in Mediterranean locales such as Santorini and Lisbon, balancing travel with a remote‑work schedule that allows occasional work‑camps.
  culinary: Jacqueline Heder, a confident home cook, specializes in Mediterranean dishes such as grilled branzino with lemon‑oregano vinaigrette, ratatouille seasoned with fresh basil and thyme, and makes
    fresh focaccia topped with rosemary and sea salt, often drawing herbs from her own garden.
  core: Jacqueline Heder is a calm, analytically sharp HR strategist whose love for art and mindfulness fuels a habit of photographing every sunrise on her hikes while occasionally over‑ordering rare prints
    that crowd her loft.
background:
  cultural: Jacqueline comes from a white, middle‑class American family with roots in Irish and German ancestry. Raised in the suburban corridors of Montgomery County, Maryland, she grew up in a community
    that prized education, civic involvement, and cultural diversity. The region’s blend of historic colonial heritage and vibrant, multicultural neighborhoods shaped her appreciation for both tradition
    and new perspectives. Her upbringing emphasized a strong work ethic, self‑reliance, and respect for public service, while frequent exposure to nearby Washington, DC’s museums, theaters, and academic
    institutions fostered her curiosity for art, ideas, and continual learning. This Mid‑Atlantic cultural backdrop informs her balanced approach to professionalism and personal life, as well as her commitment
    to fostering inclusive environments.
