  career_goals: Jacqueline aims to ascend to a senior HR leadership role—such as HR Director or Chief People Officer—within a technology‑focused organization. She intends to spearhead the integration of
    advanced analytics and AI tools into talent management, build a robust leadership pipeline, and champion comprehensive DEI strategies that embed inclusivity into every business process. She plans to
    obtain the SHRM‑SCP certification, mentor emerging HR professionals, and launch a company‑wide mental‑wellness program that leverages her calm, resilient disposition. Additionally, she hopes to create
    partnerships between her employer and local arts institutions, enriching community engagement while reinforcing the organization’s cultural capital.
