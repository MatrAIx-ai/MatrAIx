personas:
  professional: Jill Crawford is a seasoned IT leader who blends Agile and Waterfall methodologies, directs complex cloud migrations to AWS and Azure, and uses her confident, talkative style to translate
    technical concepts for executives while her methodical planning ensures projects stay on time and on budget.
  sports: Jill Crawford follows the Utah Jazz and Real Salt Lake, runs with the Wasatch Trail Runners club, competes in the Salt Lake City Marathon each fall, and practices yoga weekly to balance high‑intensity
    trail runs and maintain flexibility.
  arts: Jill Crawford enjoys community theater productions, regularly attends the Utah Shakespeare Festival, draws creative inspiration from musicians like Bon Iver and The Oh Hellos, and admires actress
    Emma Stone, while occasionally performing improv sketches that showcase her love of the spotlight.
  travel: Jill Crawford plans trips that mix adventure and relaxation, having trekked Zion and Arches National Parks, taken a road trip through the Pacific Northwest, dreaming of Iceland’s basalt landscapes
    and a cultural tour of Tuscany, all while balancing family commitments and a sensible budget.
  culinary: Jill Crawford’s culinary palate favors farm‑to‑table fare—she crafts roasted beet salad with goat cheese, slow‑cooks bison chili with ancho chilies, and pairs Pinot Noir with a cheese board
    featuring aged cheddar and local honey, though she admits to occasionally over‑indulging in artisanal desserts.
  core: Jill Crawford blends a competitive, talkative spirit with pragmatic organization, turning her love for outdoor adventure, tech leadership, and social gatherings into a uniquely balanced, slightly
    skeptical yet relentlessly optimistic life outlook.
background:
  cultural: Jill grew up in a middle‑class family in Utah, with ancestral roots in German and Scandinavian immigrant communities that settled the Intermountain West. Her upbringing emphasized self‑reliance,
    community involvement, and the value of hard work. While she respects traditional local customs—such as celebrating Pioneer Day and participating in outdoor recreation—her career in technology has exposed
    her to broader, progressive perspectives. This blend of regional heritage and modern professional experience informs her balanced worldview, a strong sense of civic duty, and an appreciation for both
    established methods and innovative ideas.
attributes:
  skills: '[''IT project management (Agile & Waterfall)'', ''Infrastructure planning and network design'', ''Cloud migration (AWS, Azure)'', ''Vendor negotiation and contract management'', ''IT budgeting
    and financial oversight'', ''Team leadership and mentorship'', ''ITIL change and incident management'', ''Cybersecurity risk assessment and compliance (HIPAA, PCI‑DSS, SOX)'', ''Data analytics and reporting
    (Excel, Power BI)'', ''Process automation (Power Automate, scripting)'', ''Strategic IT planning'', ''Effective communication and public speaking'']'
  hobbies: '[''Hiking and trail running in the Wasatch Mountains'', ''Landscape photography'', ''Community theater acting'', ''Hosting dinner parties and wine tasting events'', ''Volunteering for local
    STEM outreach programs for girls'', ''Attending tech meetups and networking events'', ''Competitive trivia nights and board game evenings'', ''Yoga for flexibility and stress management'']'
  career_goals: In the short term, Jill aims to complete a bachelor's degree in information technology or business administration while earning advanced certifications such as CISSP and AWS Solutions Architect.
    She plans to lead a department‑wide cloud migration that reduces on‑premises costs by at least 20% and to implement performance metrics that boost operational efficiency. Over the next five years, Jill
    aspires to move into a Director of IT role for a regional healthcare system or manufacturing firm, where she can shape the strategic technology roadmap and champion digital transformation. Long‑term,
    she envisions influencing industry best practices through speaking engagements, establishing a mentorship program for women in tech, and possibly pursuing an executive MBA to broaden her leadership
    perspective.
