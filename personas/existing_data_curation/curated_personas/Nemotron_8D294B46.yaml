  hobbies: '[''Reading contemporary fiction'', ''Reading scientific non‑fiction'', ''Solo hiking'', ''Watercolor painting'', ''Jigsaw puzzles'', ''Crossword puzzles'', ''Nature sound recording'', ''Cooking
    intricate recipes'']'
  career_goals: Judith aims to become a recognized specialist in fetal cardiac imaging within the next five years, pursuing advanced certifications in echocardiography and neonatal sonography. She plans
    to contribute to protocol development at her hospital, publish case studies on innovative imaging techniques, and eventually transition into a supervisory role where she can mentor other sonographers
    while maintaining a focus on technical excellence. Her competitive drive motivates her to lead quality‑improvement initiatives and to stay at the forefront of ultrasound advancements, balancing her
    curiosity for new methods with the practical realities of patient care.
