personas:
  professional: Felicia Rodriguez is a seasoned telecommunications field technician who excels at installing, configuring, and maintaining RF antenna systems, coaxial and fiber optic networks while ensuring
    FCC and OSHA compliance, leverages her bilingual fluency to provide clear technical support and mentor apprentices, embraces routine and organized project coordination, and channels her competitive
    drive toward earning 5G and BICSI certifications and advancing to a lead field supervisor role with the long‑term vision of launching a community‑focused consultancy.
  sports: Felicia Rodriguez regularly hikes the scenic trails of Angeles National Forest with her local outdoor club, avidly follows the Los Angeles Dodgers, and participates in a community senior softball
    league, blending a love of nature, team competition, and social camaraderie into her fitness routine.
  arts: Felicia Rodriguez is a devoted member of a folklorico dance troupe where she channels traditional mariachi rhythms into vibrant performances, frequently attends live concerts by artists such as
    Lila Downs and Carlos Santana at venues like The Troubadour, and finds that the arts deepen her social connections and provide an expressive outlet beyond her technical career.
  travel: Felicia Rodriguez prefers well‑planned road trips that balance adventure and relaxation, often exploring California treasures like Big Sur and Santa Barbara before venturing to historic colonial
    towns in southern Mexico to reconnect with family and experience bustling markets, all while keeping travel costs aligned with her retirement savings goals.
  culinary: Felicia Rodriguez delights in preparing traditional dishes such as mole poblano, tamales, and fresh salsa verde using herbs and vegetables harvested from her garden, impresses family gatherings
    with her culinary skill, but occasionally over‑seasons with salt, reflecting her enduring love for bold flavors.
  core: Felicia Rodriguez blends a meticulous, routine‑driven work ethic with a vibrant social life, balancing a competitive edge in telecom projects and a passion for folklorico dance, while occasionally
    splurging on new tech gadgets and forgetting to schedule physical‑therapy appointments.
background:
  cultural: Felicia was raised in a Mexican‑American household in Lakewood, where bilingualism and strong family ties shaped her values. She celebrates Hispanic traditions such as Día de los Muertos and
    Mexican Independence Day, often incorporating these customs into her personal and professional life. Her cultural heritage instills a practical work ethic, a sense of community responsibility, and a
    deep appreciation for sharing knowledge, which she expresses through mentorship and community service. While fluent in both English and Spanish, she uses her language skills to bridge communication
    gaps in the field, ensuring clear and respectful interactions with diverse clients and coworkers.
attributes:
  skills: '[''RF antenna installation'', ''Coaxial and fiber optic cable splicing'', ''Signal strength measurement'', ''Equipment troubleshooting'', ''Schematics interpretation'', ''FCC regulatory compliance'',
    ''OSHA safety protocols'', ''Project coordination'', ''Team leadership'', ''Bilingual technical communication (English/Spanish)'']'
  hobbies: '[''Folklorico dancing'', ''Amateur radio (ham) club'', ''Cooking traditional Mexican cuisine'', ''Gardening'', ''Church community volunteering'', ''Family gatherings'', ''Hiking in Angeles National
    Forest'', ''Live music events'']'
  career_goals: Felicia aims to advance to a lead field supervisor role where she can oversee larger projects and influence quality standards across the company. She plans to earn advanced certifications
    in 5G technology and BICSI design, positioning herself as an expert in emerging telecom infrastructure. Long‑term, she envisions launching her own small‑business consultancy that offers installation
    and training services to locally owned businesses, especially within the Latino community. She also hopes to be recognized as a mentor, helping the next generation of technicians succeed while securing
    a stable retirement plan for her family.
