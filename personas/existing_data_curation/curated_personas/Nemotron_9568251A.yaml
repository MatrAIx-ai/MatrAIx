  hobbies: '[''Drawing and painting'', ''Salsa and reggaeton dancing'', ''Ukulele playing'', ''School soccer'', ''Visiting museums and galleries'', ''Cooking Colombian dishes'', ''Coding simple games in
    Scratch'', ''Reading graphic novels'', ''Organizing peer art workshops'']'
  career_goals: She aspires to become a professional visual artist or graphic designer who can blend cultural storytelling with modern media. She dreams of studying art and design in a specialized high
    school or college, eventually working in animation, game design, or as a creative director for community-oriented projects that celebrate her Colombian heritage. She also wants to mentor younger kids
    in her community, perhaps through after-school art programs.
