personas:
  professional: Danielle Marrero is a budding multimedia storyteller who blends hand‑drawn folklore characters with simple Scratch animations, leveraging her curiosity and organized yet flexible mindset
    to turn classroom projects into collaborative art workshops for peers.
  sports: Danielle Marrero thrives as a midfielder for the Eastside Middle School Soccer Club, follows New York City FC in the MLS, and mixes energetic practice sessions with impromptu salsa steps during
    warm‑ups, balancing competitive play with fun group fitness.
  arts: Danielle Marrero immerses herself in sketching folklore‑inspired heroes, drawing inspiration from illustrator Shaun Tan, comic creator Marjane Satrapi, and musician Bad Bunny’s rhythmic beats, while
    attending local gallery openings featuring street‑artist Banksy replicas and theatre productions of Lin‑Manuel Miranda’s songs.
  travel: Danielle Marrero loves weekend trips to the city’s natural history museum and the nearby beach boardwalk, dreams of backpacking through the ancient ruins of Machu Picchu, and plans to join a school
    exchange program to explore the historic streets of Seville, balancing school work and friends’ schedules with her travel aspirations.
  culinary: Danielle Marrero enjoys cooking arepas stuffed with cheese and avocado and hand‑folded empanadas filled with seasoned ground beef, shows a moderate skill level by mastering the dough technique
    but still burns the edges occasionally, and loves pairing her meals with fresh mango salsa and a splash of lime juice.
  core: Danielle Marrero is a curiosity‑driven, sociable teen who channels her love of folklore, dance, and tech into vibrant art workshops, all while juggling a habit of forgetting to floss and a penchant
    for spontaneous salsa moves on the soccer field.
background:
  cultural: Danielle is a first-generation Colombian-American raised in Paterson, New Jersey, a city known for its vibrant Hispanic community. At home, Spanish is spoken daily, and the family preserves
    Colombian customs such as celebrating Carnaval de Barranquilla, making arepas, and dancing to cumbia and vallenato music. She attends a public middle school where she interacts with peers from diverse
    backgrounds, which broadens her perspective while rooting her identity in both Colombian and American cultures. Her parents' emphasis on hard work and community involvement has fostered her pride in
    her heritage and a desire to share Colombian stories through art.
