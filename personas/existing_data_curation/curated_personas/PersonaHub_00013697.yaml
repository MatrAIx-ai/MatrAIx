persona_description: A financial analyst who specializes in the analysis of energy markets, particularly the trends and dynamics of shale gas prices and production. He has a deep understanding of the land
  grab business model, the over-drilling of plays, and the collapse of prices. He is well-versed in the use of historical data, economic indicators, and financial ratios to predict future trends and evaluate
  the performance of companies in the energy sector. He is also familiar with the risks and challenges of investing in shale gas, including the need for discipline and prudent financing strategies.
