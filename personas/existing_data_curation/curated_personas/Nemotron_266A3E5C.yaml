personas:
  professional: Natasha Hawkins dreams of becoming a kindergarten teacher, using their natural organization and compassion to design structured classroom activities, and their love for picture book narratives
    to create predictable, engaging lessons that keep young learners comfortable and enthusiastic.
  sports: Natasha Hawkins enjoys organized playground games, plays on the Sunshine Sprouts U‑8 soccer team, eagerly watches the Seattle Seahawks on game nights, and roots for the Seattle Mariners and the
    Seattle Sounders FC, balancing teamwork on the field with a love for predictable, scheduled practice sessions.
  arts: Natasha Hawkins spends afternoons drawing characters from Mo Willems’ ‘Elephant & Piggie’ and coloring scenes from Dr. Seuss books, sings along to Idina Menzel’s ‘Let It Go’ from Frozen while performing
    in the church choir, and delights in watching Pixar’s ‘Toy Story’ for inspiration in their own stories.
  travel: Natasha Hawkins has explored the nearby state beach during family picnics, enjoyed a magical weekend at Disneyland Resort in California, and now dreams of traveling to the Eiffel Tower in Paris
    and the Great Wall of China when school holidays allow, preferring guided tours that follow a clear itinerary.
  culinary: Natasha Hawkins loves baking chocolate‑chip cookies with vanilla extract and colorful sprinkles, helps stir batter for banana‑bread muffins using ripe bananas and walnuts, enjoys snacking on
    carrot sticks and hummus, and proudly assembles a simple garden salad with cucumber, cherry tomatoes, and a drizzle of olive oil.
  core: Natasha Hawkins blends an unshakable love for routine with boundless compassion, navigating life through orderly puzzles, harmonic choir rehearsals, and meticulous cookie‑making, while occasionally
    forgetting to tidy up after creative projects.
background:
  cultural: Natasha comes from an African-American family rooted in Montgomery, Alabama, a city with deep civil-rights history and vibrant Southern traditions. Her family emphasizes church involvement,
    community service, and the sharing of cultural stories and music. She celebrates holidays with soul food dishes such as fried chicken, collard greens, and sweet cornbread, and enjoys listening to gospel
    and R&B music that echo her heritage. Family gatherings often feature storytelling about ancestors and local history, reinforcing a sense of pride in her Black identity and Southern upbringing. Her
    cultural environment encourages respect, mutual aid, and the preservation of community bonds.
