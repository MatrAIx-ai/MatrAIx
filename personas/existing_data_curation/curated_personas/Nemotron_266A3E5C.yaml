  hobbies: '[''Reading picture books'', ''Drawing and coloring'', ''Completing puzzles'', "Singing in the church children''s choir", ''Baking cookies with family'', ''Helping in the backyard garden'', ''Playing
    hopscotch with friends'']'
  career_goals: Natasha dreams of growing up to work in a role where she can help others and maintain a caring, organized environment. She often talks about becoming a teacher, a nurse, or a community volunteer
    who supports children and families. Her ambition is to combine her love for routine and compassion by creating safe, orderly spaces for learning and healing, and she imagines herself leading community
    projects that bring people together.
