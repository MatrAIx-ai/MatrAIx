personas:
  professional: Maria Rodriguez, a 26‑year‑old geospatial scientist who merges rigorous land‑surveying expertise with an artistic eye, leverages advanced GIS tools, UAV data acquisition, and Python automation
    while consistently delivering meticulously planned community‑focused mapping projects, and they are renowned for their dependable project timelines and bilingual communication skills.
  sports: Maria Rodriguez enjoys hiking the Palisades in spring, jogging along the Hudson River Greenway year‑round, supports the New York Giants and New York Knicks, and occasional joins a co‑ed beach
    volleyball league at the local community pool during summer; they find solitary runs especially restorative.
  arts: Maria Rodriguez spends weekends sketching New Jersey shorelines, painting watercolors inspired by Monet’s coastal scenes, curates a personal collection of Latin jazz vinyl from Tito Puente and Eddie
    Palmieri, and frequents gallery openings featuring contemporary mixed‑media artists like Kehinde Wiley; they view each brushstroke as a way to translate spatial data into visual narratives.
  travel: Maria Rodriguez prefers meticulously planned solo trips that blend urban exploration with nature, having recently trekked the Catskills, explored the historic streets of Cartagena, Colombia, and
    now dreams of sailing along the Cinque Terre villages in Italy; they meticulously map each itinerary to balance adventure with budget constraints.
  culinary: Maria Rodriguez expertly prepares traditional mofongo with chicharrón and arroz con gandules seasoned with sofrito, while also experimenting with avocado‑lime ceviche and hand‑rolled sushi,
    often pairing dishes with a chilled Albariño and sharing meals with close friends; they take pride in mastering the perfect balance of flavors and textures.
  core: Maria Rodriguez is a detail‑obsessed mapmaker who channels their love for quiet creativity into vibrant spatial storytelling, hoarding extra drone batteries for emergencies and never missing a sunset
    over the shoreline, and they habitually organize their workspace down to the last pencil.
background:
  cultural: Born to first‑generation Puerto Rican immigrants, Maria grew up in a bilingual household where Spanish and English were both spoken. Her family maintained traditions such as celebrating Nochebuena,
    enjoying plena and salsa music, and preparing dishes like mofongo and arroz con gandules, fostering a strong sense of community and cultural pride. Living in Teaneck, New Jersey, she navigates the intersection
    of Caribbean heritage and the diverse suburban environment, actively participating in local Puerto Rican community events and sharing her cultural perspective in both personal and professional contexts.
attributes:
  skills: '[''GIS data collection'', ''LiDAR processing'', ''Drone piloting'', ''ArcGIS Pro'', ''QGIS'', ''Python for geospatial analysis'', ''AutoCAD'', ''Survey instrument calibration'', ''Project management'',
    ''Technical report writing'', ''Bilingual communication (Spanish/English)'']'
  hobbies: '[''Urban sketching'', ''Watercolor painting of cityscapes'', ''Drone photography'', ''Science fiction and cartography book club'', ''Hiking the Palisades'', ''Cooking traditional Puerto Rican
    dishes'', ''Listening to Latin jazz'', ''Visiting local art galleries'']'
  career_goals: Maria aims to obtain a professional land surveyor license and pursue a master’s degree in GIS or urban planning within the next five years. Long‑term, she envisions leading large‑scale mapping
    projects that support sustainable development and community storytelling, especially in historically underrepresented neighborhoods. She also hopes to blend her artistic interests by curating public
    exhibitions that visualize spatial data in creative formats.
