  career_goals: Looking ahead, Jay aims to transition into a senior leadership role such as PMO Director or Program Manager within a regional manufacturing or infrastructure firm, where he can shape project
    governance and mentor emerging project managers. He plans to earn his PMP certification (if not already held) and to lead larger, multi‑year initiatives that support community development in Lawrence
    County. While pursuing professional growth, he remains committed to maintaining a balanced lifestyle that protects time for family and local involvement.
