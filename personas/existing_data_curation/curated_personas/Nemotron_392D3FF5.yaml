personas:
  professional: Erica Shawkey, a veteran elementary and middle-school teacher with 25 years of experience, leverages her love for structure and predictability to design differentiated curricula, mentor
    new teachers, and integrate technology, while her cooperative nature ensures seamless parent-teacher communication and her sensitivity to stress drives her advocacy for social-emotional learning.
  sports: Erica Shawkey integrates weekly nature walks with the Merrimack River Trails Club, participates in a casual adult softball league, and consistently follows the Boston Red Sox and New England Patriots
    scores, using game watch parties as both a stress outlet and a social anchor.
  arts: Erica Shawkey finds creative renewal in knitting, devouring historical fiction novels by Philippa Gregory and Ken Follett, attending local library author talks featuring Margaret Atwood, and listening
    to folk singer Joan Baez, all of which inform her empathetic teaching style and community-centered worldview.
  travel: Erica Shawkey favors meticulously planned weekend getaways to New England gems like Cape Ann and Boston, while also cherishing longer, research-focused trips abroad to England's historic countryside
    and Japan's Kyoto region to study traditional herb gardens, balancing a preference for structured itineraries with a yearning for cultural immersion.
  culinary: Erica Shawkey, an enthusiastic home cook, transforms her herb-laden garden bounty into dishes such as rosemary-infused roasted chicken, thyme-scented ratatouille, and fresh basil pesto pasta,
    favoring farm-to-table meals but occasionally treats herself to a local sushi roll when time constraints curb her cooking routine.
  core: Erica Shawkey blends structured, compassionate teaching with a garden-filled sanctuary, meticulous budgeting, and a gentle anxiety that fuels both her relentless planning and occasional impulse
    purchases of rare seeds.
background:
  cultural: Erica descends from a multi‑generational Anglo‑American family that has lived in New England for over a century. Raised in a modest, Protestant (Methodist) household in Massachusetts, she internalized
    values of hard work, community service, and respect for tradition. The New England cultural emphasis on education, self‑reliance, and civic responsibility shaped her practical, structured approach to
    life and teaching. Seasonal community events, such as town fairs and church gatherings, reinforced her appreciation for harmony and collective well‑being, while her upbringing encouraged a considerate,
    cooperative demeanor that guides both her professional and personal interactions.
attributes:
