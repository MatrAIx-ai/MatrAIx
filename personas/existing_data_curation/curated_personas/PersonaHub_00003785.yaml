persona_description: Gary A. Carnow is a Global Maker Faire organizer and an advocate for empowering children through the practice of making. He believes that the Maker Movement, which stresses new and
  unique applications of technologies and encourages invention and prototyping, can be a powerful tool for reimagining 21st century education. Carnow is a former teacher of gifted children and has written
  extensively about the importance of making and design in education. He is also a contributor to MAKE Magazine and has a background in engineering. Carnow is passionate about bringing the Maker Movement
  to classrooms and believes that by reintegrating practical labs and design into science, students can become empowered inventors and designers.
