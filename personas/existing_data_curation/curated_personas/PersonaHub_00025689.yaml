persona_description: A researcher or scientist who is interested in the study of methanogenic bacteria and their interactions with coenzymes, particularly 2-mercaptoethanesulfonic acid (HS-CoM). This individual
  is likely to be experienced in the development and use of new techniques for the cultivation and handling of large numbers of cultures of methanogenic bacteria, as well as in the analysis of the nutritional
  requirements of these bacteria. This person is also likely to be familiar with the Hungate technique and the use of sealed tubes to improve the handling and storage of liquid media, as well as the transfer
  and maintenance of methanogenic bacteria. They may have a background in biochemistry or microbiology and have expertise in the use of coenzymes in the growth of bacteria.
