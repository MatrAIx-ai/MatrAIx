persona_description: A sociologist who specializes in the study of immigration and its impact on the U.S. Latino population. She is particularly interested in the educational outcomes of recent immigrants
  and how they are affected by societal stratification and inter- and intra-group structural relations. Her research focuses on developing a critical assessment of these outcomes relative to current policy
  perspectives and proposing an alternative policy approach to education based on cultural dynamics reflected in patterns of interaction within and between the groups in question and the broader society.
