  hobbies: '[''Cooking traditional Mexican and Tex-Mex dishes'', ''Gardening (chiles, tomatoes, herbs)'', ''Listening to rancheras, corridos, and banda music'', ''Knitting and quilting'', ''Attending church
    services and cultural celebrations like Día de los Muertos'', ''Walking along the Rio Grande promenade'', ''Gentle breathing exercises and chair yoga'', ''Reading romance and mystery novels'']'
  career_goals: Entering her early sixties, Graciela is focused on securing a stable, low-stress role that leverages her experience while allowing her to manage her anxiety. She aims to move into a lead-receptionist
    or office-coordinator position where she can mentor newer staff and design clear, supportive workflows. She also hopes to take a short community-college course in mental-health first aid so she can
    better support coworkers and patrons facing emotional distress. Ultimately, she wishes to maintain a reliable income that lets her stay active in the Brownsville community and provide financial support
    for her grandchildren.
