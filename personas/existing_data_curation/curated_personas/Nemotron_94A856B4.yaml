personas:
  professional: Marc Higham is an aspiring junior game designer and tinkering enthusiast who blends his love for Minecraft’s strategic building with hands‑on electronics kits, dreaming of creating his own
    interactive LEGO‑style video worlds while balancing curiosity with a surprisingly practical approach to problem solving.
  sports: Marc Higham plays midfield for the East Long Island Soccer Club, cheers for the New York City FC during televised matches, and follows the New York Yankees and Brooklyn Nets, hoping to improve
    stamina through weekend beach volleyball sessions at Jones Beach.
  arts: Marc Higham immerses themselves in the world of digital art by recreating Fortnite skins in LEGO, idolizes the cinematic scores of Hans Zimmer, listens to Billie Eilish on repeat, and never misses
    the latest Pixar releases starring Tom Holland’s adventurous spirit.
  travel: Marc Higham prefers spontaneous family road trips to coastal towns like Montauk, dreams of visiting the Kennedy Space Center in Florida and the historic streets of Kyoto, and always packs a travel‑sized
    LEGO set to keep creativity handy despite occasional forgetfulness about passports.
  culinary: Marc Higham enjoys crafting homemade pepperoni pizza with fresh mozzarella, basil, and a sprinkle of oregano, while occasionally attempting a DIY sushi roll using cucumber, avocado, and crab
    sticks, yet their cooking skill peaks at perfectly baked chocolate chip cookies topped with sea salt.
  core: Marc Higham is a curiosity‑driven, competitively spirited 11‑year‑old who blends strategic gaming, LEGO engineering, and beach adventures, often juggling disorganized habits with bursts of practical
    ingenuity.
background:
  cultural: Marc grows up in a suburban white family in Port Jefferson Station, Long Island, where his cultural backdrop blends typical American middle‑class values with the diverse influences of the region.
    He celebrates holidays such as Thanksgiving, Christmas, and the Fourth of July with family traditions, while also participating in community events like local sports leagues and school clubs. The proximity
    to the Long Island sound introduces an appreciation for maritime activities, beach outings, and a subtle awareness of the area's historic New England roots. His upbringing emphasizes self‑reliance,
    curiosity about technology, and a balanced view of individual achievement and community involvement.
