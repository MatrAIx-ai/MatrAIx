persona_description: A researcher interested in the spatial evaluation of geographic health care access and the density of existing health facility networks in developing countries. This person is particularly
  interested in the study of noncommunicable diseases (NCDs) and their impact on population health, with a focus on cardiovascular diseases (CVDs) and their associated morbidity and mortality. This person
  is likely to be interested in the application of GIS methods to develop policies that target areas or populations being underserved by health facilities and populations that must travel long distances
  to receive healthcare. The person may also be interested in the study of CVD risk factors, particularly high blood pressure, and the lack of regular exercise as common risk factors for NCDs.
