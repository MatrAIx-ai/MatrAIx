  career_goals: Denise aims to advance to a senior clerk or deputy clerk position within Brunswick County, where she can lead the digitization of court records and mentor newer staff members. She is interested
    in completing a certification in records management and developing a workplace wellness program to help coworkers manage stress. Over the next few years, she hopes to transition to a part‑time community
    liaison role that allows her to continue serving residents while enjoying a stable retirement.
