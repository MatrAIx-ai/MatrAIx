  career_goals: Ann Marie’s career trajectory is driven by her competitive nature and commitment to structure. In the next three years she aims to earn the detective designation, focusing on forensic and
    homicide investigations where meticulous evidence handling is paramount. She plans to complete a Master’s in Criminal Justice to deepen her analytical expertise and to qualify for a supervisory role,
    such as Sergeant, within the Erie County Police Department. Long‑term, she aspires to lead the department’s Crime Scene Unit, develop evidence‑based training curricula, and influence policy on officer
    wellness and procedural integrity.
