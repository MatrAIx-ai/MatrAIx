persona_description: A historian or a researcher who is interested in the history of the Norsemen and their links across the western world between Russia and the North American continent, particularly in
  the eastern regions of Europe. They are familiar with the Slavonic peoples of Eastern Europe, the relationship between the East Norse and the Eastern Roman Empire, and the establishment of the Ros or
  Rhos state. They are also interested in the complexion of the Varangian Guard and its changes over the years.
