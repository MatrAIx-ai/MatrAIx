personas:
  professional: Leonora Brinson, a 25‑year‑old residential painter and paperhanger in Anniston, leverages a deep understanding of color theory and paint chemistry to deliver flawless finishes and custom
    murals, while managing small crews, reading blueprints, and negotiating client expectations with a blend of meticulous organization and creative flexibility.
  sports: Leonora Brinson is a member of the Anniston Trail Runners club, enjoys early‑morning jogs through Oak Mountain State Park, cheers on the Alabama Crimson Tide football team on Sundays, and attends
    local high‑school basketball games to stay connected with community sports.
  arts: Leonora Brinson curates playlists featuring John Coltrane, Erykah Badu, and H.E.R. that inspire the palette in her park sketchings, admires the bold motifs of Yayoi Kusama, the vibrant compositions
    of Henri Matisse, and follows contemporary muralist Shepard Fairey for ideas on integrating cultural narratives into her own large‑scale works.
  travel: Leonora Brinson favors weekend getaways to Asheville for its mountain scenery, delights in the jazz‑filled streets of New Orleans, dreams of exploring Oaxaca’s colorful markets and street art,
    and caps each trip with a notebook filled with travel‑inspired sketches and color swatches.
  culinary: Leonora Brinson loves reinventing Southern comfort dishes—spicing up shrimp and grits with jalapeño, turning collard greens into a smoked‑paprika sauté, and crafting a signature mushroom‑gouda
    biscuit that blends creamy cheese with earthy mushrooms and flaky pastry.
  core: Leonora Brinson balances a precise, organized work ethic with a boundless imagination, preferring solitary creative sessions, meticulous budgeting, and occasional back‑pain relief routines while
    quietly plotting a boutique studio that fuses trade mastery with personal art.
background:
  cultural: Leonora grew up in a close-knit African-American family in Anniston, where church, family gatherings, and community events were central to her upbringing. The rich legacy of Southern Black culture—gospel
    music, soul food, storytelling, and the civil-rights history of Alabama—has deeply shaped her identity. She draws inspiration from the vivid colors of African textiles and the rhythmic energy of blues
    and jazz, which often surface in her abstract paintings. Growing up as a Black woman in the South, she experienced both the challenges of systemic inequities and the strength of communal support, fostering
    her resilience and self-reliance after her early divorce. Leonora celebrates Juneteenth and local African-American heritage festivals, and she integrates themes of empowerment and cultural pride into
    her artistic projects.
attributes:
  skills: '[''Residential wall painting'', ''Wallpaper installation'', ''Surface preparation and priming'', ''Faux finishing and decorative murals'', ''Color theory and paint mixing'', ''Blueprint reading
    and project estimation'', ''Team coordination and time management'', ''Safety compliance and equipment use'', ''Abstract painting and mixed media art'', ''Client communication and negotiation'']'
  hobbies: '[''Sketching and plein air drawing'', ''Acrylic painting and collage'', ''Visiting art museums and galleries'', ''Reading magical realism and Afrofuturist literature'', ''Listening to jazz,
    soul, R&B music'', ''Gardening (balcony)'', ''Cooking Southern cuisine with creative twists'', ''Attending small live-music shows'', ''Volunteering at after-school art programs'', ''Writing journal
    entries'']'
  career_goals: Leonora aims to establish her own boutique painting and mural studio in Anniston, offering both high-quality residential services and bespoke artistic installations. She plans to become
    a certified master painter and acquire a small business loan within the next two years to expand her equipment and hire an apprentice. Long-term, she envisions her studio as a community hub where she
    can host workshops on creative painting techniques, mentor local youth interested in the trades, and exhibit her own abstract artwork in a small gallery space. She also hopes to secure public art commissions
    for murals that celebrate African-American heritage in Calhoun County. Balancing financial stability with artistic fulfillment, she aspires to transition gradually from contract work to a hybrid model
    that supports her personal art practice.
