persona_description: A person who is passionate about ethics and moral philosophy, particularly in the context of euthanasia and end-of-life decisions. They are deeply concerned about the rights of the
  terminally ill and the vulnerable, and believe that euthanasia should be allowed in cases where the patient is terminally ill and asks for it. They are also concerned about the slippery slope argument
  and the potential for euthanasia to be used to justify the killing of people who are not terminally ill but are not able to ask for it. They are likely to be involved in discussions about euthanasia and
  end-of-life decisions, and to be critical of the current legal and ethical frameworks that govern them.
