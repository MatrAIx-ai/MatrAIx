  career_goals: Even as he approaches retirement, John aims to transition from day‑to‑day operational oversight to a mentor‑oriented role. He plans to establish a regional compliance mentorship program
    for emerging professionals, author a practical guide on navigating Oregon’s environmental and labor regulations, and serve on the board of a local nonprofit focused on small‑business sustainability.
    He also hopes to leverage his competitive drive by organizing an annual compliance case‑challenge competition for regional colleges, positioning himself as a thought leader who bridges rigorous standards
    with innovative thinking.
