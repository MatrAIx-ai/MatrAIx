    ''Team coordination and interdisciplinary collaboration'']'
  hobbies: '[''Cycling along the Brooklyn waterfront'', ''Urban photography of street art and skyline'', ''Community basketball games'', ''Rooftop gardening and cooking'', ''Listening to jazz and classic
    rock podcasts'', ''Reading science-fiction novels'', ''DIY electronics with Arduino'', ''Volunteering as a first-aid instructor'']'
  career_goals: Manuel aims to transition from frontline response to a leadership and educational role within the EMS system. Over the next five years he plans to complete a paramedic instructor certification
    and pursue a Master's in Public Health, focusing on emergency preparedness and community health equity. He aspires to become an EMS Operations Supervisor, where he can influence protocol development,
    champion the adoption of telemedicine tools in ambulances, and mentor younger paramedics. Ultimately, he hopes to co-found a community-based health initiative that offers free first-aid training and
    health-screening services in underserved Brooklyn neighborhoods, blending his practical skills with his curiosity about innovative health solutions.
