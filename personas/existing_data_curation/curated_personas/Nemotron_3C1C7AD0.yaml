personas:
  professional: Manuel Jackson, a seasoned paramedic with a biomedical engineering background, blends advanced ACLS, PALS, and PHTLS expertise with a curious, hands‑on knack for field‑tech innovation, channeling
    their cooperative nature into clear crisis communication and patient‑centered care.
  sports: Manuel Jackson stays active by shooting hoops at a Brooklyn community basketball court, cheering on the New York Knicks and Brooklyn Nets, and training for the annual NYC Marathon, where their
    flexible training schedule reflects a balance of social play and personal fitness goals.
  arts: Manuel Jackson unwinds with Miles Davis and Led Zeppelin podcasts, devours Neal Stephenson’s cyber‑punk sagas, and captures Brooklyn’s street murals through their camera lens, letting the rhythm
    of jazz and the grit of urban art fuel their reflective side.
  travel: Manuel Jackson prefers spontaneous weekend getaways to the Adirondacks and occasional trips abroad to Iceland’s volcanic landscapes or Japan’s tea ceremonies, planning loosely around shift schedules
    and a modest travel budget that balances their love for adventure with community commitments.
  culinary: Manuel Jackson cooks simple, health‑focused meals such as rosemary‑roasted salmon with quinoa and kale, often seasoning their dishes with fresh basil and cilantro from their rooftop garden,
    while still indulging in occasional classic New York pizza slices on lazy Sunday evenings.
  core: Manuel Jackson blends a paramedic’s split‑second decision‑making with a curious tinkerer’s love for gadgets, juggling community care, spontaneous bike rides, and a habit of forgetting their own
    lunch in the rush of the next call.
background:
  cultural: Manuel is a white American of mixed Irish and German ancestry, raised in a middle-class family in Queens before moving to Brooklyn as an adult. Growing up in a culturally diverse part of New
    York City, he absorbed a strong sense of community responsibility and appreciation for the city's multicultural tapestry. His family emphasized public service—his grandfather was a firefighter—instilling
    a respect for teamwork and civic duty. While he maintains the values of his European heritage, such as a pragmatic work ethic and a fondness for traditional holiday gatherings, his daily life reflects
    the vibrant, inclusive atmosphere of Brooklyn, where he celebrates local festivals, engages with neighbors from various backgrounds, and integrates the city's eclectic food, music, and artistic influences
    into his personal identity.
attributes:
  skills: '[''Advanced Cardiac Life Support (ACLS)'', ''Pediatric Advanced Life Support (PALS)'', ''Pre-Hospital Trauma Life Support (PHTLS)'', ''Rapid patient assessment and triage'', ''IV and airway management'',
