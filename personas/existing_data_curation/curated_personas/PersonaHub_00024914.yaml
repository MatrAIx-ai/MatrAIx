persona_description: A policy advocate and expert in early childhood education, who is passionate about reducing the high cost of remediation and special education, and increasing the effectiveness of K-12
  education. This person is well-versed in the research on the importance of early childhood development, and has experience with evidence-based public investment opportunities for early childhood programs.
  They are aware of the immediate barriers to achieving better outcomes for low-income children and are committed to making effective investments in philanthropy to address these challenges. This person
  is likely to be a member of a think tank, policy think tank, or a non-profit organization that focuses on early childhood development and education.
