persona_description: A scholar and researcher who specializes in the interdisciplinary study of material religion, neuroarchaeology, semiotics, phenomenology, and the history of science. Their research
  focuses on the relationship between material objects and their perceived power, and how these objects have been used to construct and convey meaning throughout history. They are interested in the fluidity
  and pervasiveness of apotropaic objects, as well as the socio-cultural and intellectual needs for categorizing and deconstructing these objects. They are also curious about the potential for developments
  in these fields to further our understanding of these objects, their function, creation, and perception.
