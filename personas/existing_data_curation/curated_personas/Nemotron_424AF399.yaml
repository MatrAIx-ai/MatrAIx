  career_goals: Focused on advancing to senior leadership, Andres aims to become a Director of Product Development within the next five years, overseeing innovative technology solutions that merge cutting-edge
    research with market viability. He plans to augment his managerial experience with an executive MBA, expand his influence in data-centric decision making, and eventually spearhead his own tech venture
    that addresses challenges in sustainable energy or health tech. Throughout, he seeks roles that balance analytical rigor with practical impact, aligning with his competitive drive and stable temperament.
