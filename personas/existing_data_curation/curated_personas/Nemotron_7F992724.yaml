personas:
  professional: Johnny Sides, a 41-year-old remote IT troubleshooter and freelance consultant, they leverage their meticulous hardware debugging, Python automation, and disciplined woodworking mindset to
    deliver reliable solutions while preferring low-communication, structured tasks that minimize social friction.
  sports: Johnny Sides, a 41-year-old who keeps fitness low-key by taking weekly hikes at Cedar Ridge Preserve and occasional weekend rides along the Lady Bird Lake trail, they casually follow Austin FC
    and the Texas Rangers while belonging to a small, low-communication birdwatching club that doubles as a light-cardio outing.
  arts: Johnny Sides immerses themselves in the moody narratives of Gillian Flynn, the atmospheric piano works of Philip Glass, and the minimalist wood sculptures of George Nakashima, weaving these artistic
    influences into a personal journal that records reflections after each solitary woodworking project.
  travel: Johnny Sides, a methodical yet flexible traveler, they plan low-stress trips using detailed spreadsheets, favoring secluded cabins in the Adirondacks, sunrise hikes at Zion National Park, and
    occasional weekend getaways to the historic town of Marfa, Texas, while deliberately avoiding crowded tourist hotspots.
  culinary: Johnny Sides enjoys crafting low-maintenance meals like herb-roasted chicken thighs seasoned with rosemary and thyme, a side of quinoa tossed with pomegranate seeds, and a steady cup of black
    coffee, and they occasionally indulge in a precision-cooked ribeye steak seasoned with smoked paprika, while preferring to dine alone at quiet local diners for consistent service.
  core: Johnny Sides, a 41-year-old introverted tinkerer, they channel a relentless anxiety into precise PC builds, meticulous woodworking, and a habit of over-budgeting, yet they let routine chores slip
    through the cracks.
background:
  cultural: Johnny was born and raised in Bedford, Texas, a suburban community in Tarrant County. Coming from a white, middle-class family with deep roots in the Dallas-Fort Worth metroplex, his upbringing
    blended traditional Southern hospitality with the individualistic, self-reliant ethos common in Texas. He was exposed to a mix of cultural influences, including country music, local high-school football
    culture, and family gatherings centered around barbecue and holiday celebrations. Although he never married and prefers solitude, his cultural background instills a strong work ethic, a respect for
    personal independence, and an appreciation for the outdoors, reflected in his love of hiking and birdwatching.
