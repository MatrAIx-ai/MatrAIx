  career_goals: Margarita aims to leverage her decades of hands-on experience into a small, locally-owned cleaning service that emphasizes personalized, culturally-informed care. She plans to obtain a professional
    certification in residential cleaning management within the next year, attend workshops on eco-friendly cleaning products, and develop a network of trusted subcontractors. Her long-term ambition is
    to become a community liaison for senior housing in Lake County, offering both cleaning support and cultural enrichment programs—such as art workshops and Puerto Rican cooking classes—for residents.
    Margarita also wishes to continue her education by completing an associate degree in hospitality management, which will complement her entrepreneurial goals.
