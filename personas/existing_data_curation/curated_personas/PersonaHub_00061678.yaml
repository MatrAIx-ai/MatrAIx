persona_description: A professional plumber who is skilled in the maintenance and repair of ball valves in residential and commercial plumbing systems. They are experienced in handling various types of
  ball valves, including quarter-turn valves, and are aware of their advantages and disadvantages in terms of water flow control and potential for water hammer. They also have knowledge of the potential
  disadvantages of using ball valves in certain tight locations and are aware of the importance of turning the lever slowly to avoid damaging the silicone or PTFE seats.
