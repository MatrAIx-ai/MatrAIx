personas:
  professional: Anita Alvarado, an enthusiastic middle‑schooler who combines curiosity about coding with practical problem‑solving, builds complex LEGO creations and crafts interactive Scratch stories,
    often leading group projects at school despite sometimes forgetting deadlines.
  sports: Anita Alvarado plays forward for the Davison Explorers youth soccer team, cheering on the Detroit Tigers during game nights and idolizing soccer star Alex Morgan, while also sprinting on school
    track events in the fall.
  arts: Anita Alvarado enjoys drawing fantastical creatures in her sketchbook, listening to a mix of Taylor Swift pop hits and upbeat Latin salsa playlists at family gatherings, and re‑watching Pixar's
    "Coco" for its vibrant storytelling.
  travel: Anita Alvarado dreams of hiking the scenic trails of Michigan’s Upper Peninsula after her next family road trip to Niagara Falls, but she prefers short, structured day‑out adventures over long
    vacations, often planning routes with a hand‑drawn map.
  culinary: Anita Alvarado loves baking chocolate chip cookies with her mother, experimenting with adding a pinch of espresso powder for a grown‑up twist, and frequently crafts themed LEGO‑shaped pastries
    when friends visit.
  core: Anita Alvarado is a curious, slightly disorganized 11‑year‑old who juggles coding, LEGO building, and soccer, sprinkling her days with spontaneous snack cravings and a steadfast love for imaginative
    storytelling.
background:
  cultural: Anita grows up in Davison, a small city in Lapeer County, Michigan, where Midwestern values of community, friendliness, and self‑reliance shape daily life. Her family identifies as white American,
    with ancestral roots that include Italian and Irish heritage, reflected in family recipes and occasional celebrations of St. Patrick’s Day and traditional Italian holidays. The Alvarado surname also
    hints at a distant Hispanic lineage, which has introduced a few Spanish phrases at the dinner table and a love for Latin music during family gatherings. She regularly attends the local public school,
    participates in the community library’s reading programs, and enjoys seasonal events such as the county fair, Thanksgiving turkey dinners, and Fourth of July fireworks. These cultural experiences blend
    the broader American Midwestern culture with her family's unique blend of traditions.
