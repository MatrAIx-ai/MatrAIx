  career_goals: Anita dreams of turning her love for animals and science into a future career as a wildlife biologist or veterinary technician. She imagines herself studying animal behavior, helping injured
    wildlife, and maybe one day running a community garden that provides habitats for local species. She also enjoys teaching her friends how to code, so she entertains the idea of becoming a science teacher
    who combines hands‑on experiments with technology. While she is still exploring options, her ambition is to pursue a path where she can both help living creatures and solve real‑world problems.
