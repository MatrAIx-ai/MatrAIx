  career_goals: Mario aims to leverage his two decades of customer‑service experience into a leadership role within the next three years, such as a Team Lead or Customer Experience Supervisor, where he
    can mentor junior colleagues and shape service strategies. He plans to earn certifications in customer experience management and data analytics to deepen his analytical capabilities. Ultimately, Mario
    envisions transitioning to a hybrid role that merges his technical expertise and artistic curiosity—perhaps overseeing the integration of digital technologies into local art initiatives or consulting
    for museums on visitor engagement. He also aspires to leave a lasting impact by establishing a mentorship program for older workers entering the service sector and to maintain a flexible schedule that
    allows him to pursue his artistic and community interests.
