  career_goals: Earl aims to leave a lasting legacy of trust between the Minneapolis police and the community. He plans to mentor the department’s next generation of leaders, champion mental‑health and
    wellness initiatives for officers, and influence policy reforms that blend practical policing with innovative approaches. In the next few years he hopes to serve on a city advisory board on public safety
    and, after retirement, work as a consultant designing training programs that emphasize both effective investigation methods and community engagement.
