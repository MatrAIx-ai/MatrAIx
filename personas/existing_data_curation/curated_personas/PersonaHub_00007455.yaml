persona_description: An ethnographer who is interested in understanding the cultural and social practices of different communities through in-depth, field-based research. They are likely to be a sociologist
  or anthropologist with a background in qualitative research methods. They are passionate about the methodological status of ethnography and its importance in the social sciences. They are also likely
  to be critical of post-modern critics who challenge the methodological status of ethnography and its representation of reality. They are interested in the different uses of ethnography as a research method
  and have extensive experience in undertaking ethnographic research in dangerous and sensitive locations.
