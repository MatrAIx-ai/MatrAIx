personas:
  professional: Alexandra Berrios, a 23‑year‑old cashier whose bilingual fluency and precise POS operation are paired with an organized, compassionate demeanor, consistently turns stressful customer interactions
    into calm resolutions, positioning them for a supervisory role as they advance their business studies.
  sports: Alexandra Berrios, a 23‑year‑old who blends weekly volleyball matches at the Carolina Beach Volleyball Club with early‑morning hikes through El Yunque, follows a fitness routine that includes
    yoga and occasional cardio, and they enthusiastically support the Cangrejeros de Santurce in basketball and the Indios de Mayagüez during the baseball season.
  arts: Alexandra Berrios, a 23‑year‑old who channels their outgoing energy into salsa and bachata nights to the rhythms of Bad Bunny and Rosalía while unwinding with contemporary fiction by Sally Rooney,
    finds inspiration in the vibrant storytelling of Latin pop and the emotive narratives of modern literature.
  travel: Alexandra Berrios, a 23‑year‑old who favors spontaneous weekend getaways across the island—such as snorkeling in Culebra, exploring the historic streets of Old San Juan, and hiking the waterfalls
    of Ponce—while dreaming of a cultural immersion trip to Cartagena, balances careful budgeting with the desire for adventure, often planning trips using free online resources but occasionally over‑booking
    due to their enthusiasm.
  culinary: Alexandra Berrios, a 23‑year‑old who proudly prepares the aromatic arroz con gandules with sofrito, plantains, and pigeon peas alongside family, balances a home‑cooked comfort‑food repertoire
    with occasional cravings for fresh ceviche and artisanal coffee, and they often experiment with spice blends while occasionally over‑seasoning in their eagerness to impress.
  core: Alexandra Berrios, a 23‑year‑old blend of organized planner and social butterfly, constantly juggles calendar alerts, yoga mats, and salsa shoes, yet they can’t resist late‑night scrolling through
    finance podcasts, often worrying about tomorrow while dancing through today.
background:
  cultural: Alexandra was born and raised in Carolina, a lively municipality in the north of Puerto Rico, where Caribbean and mainland U.S. influences blend in daily life. Growing up in a bilingual household,
    she speaks both Spanish and English fluently and participates in family traditions such as celebrating Navidad with lechón, dancing to salsa and plena, and attending local festivals like the Fiestas
    de la Calle San José. The close‑knit community ethos of her neighborhood taught her the importance of helping neighbors, supporting local initiatives, and preserving cultural heritage. Her Puerto Rican
    identity informs her love for food, music, and communal gatherings, and fuels her desire to give back to the community.
