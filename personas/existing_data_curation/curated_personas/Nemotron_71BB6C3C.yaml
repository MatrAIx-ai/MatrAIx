  career_goals: Alexandra aims to build on her cashier experience by moving into a supervisory role within the next two years, pursuing a bachelor’s degree in Business Administration while obtaining certifications
    in retail management. She envisions becoming a store manager and, eventually, opening her own community‑focused café or boutique that celebrates Puerto Rican culture and provides employment opportunities
    for local youth. Beyond retail, she hopes to volunteer as a financial‑literacy mentor, develop leadership skills, and contribute to community outreach programs that support families in Carolina.
