  career_goals: Although retired, Kenneth aims to deepen his involvement in the local arts community and preserve Vero Beach's cultural heritage. He plans to volunteer full‑time as a docent at the Vero
    Beach Museum of Art, leading tours that connect visitors to the region’s artistic legacy. He also hopes to launch a monthly senior‑focused art workshop where he can mentor budding artists and share
    his watercolor techniques. Writing a memoir that weaves together his experiences with boat life, gardening, and community service is another ambition, potentially self‑publishing a book that blends
    personal anecdotes with reflections on art and nature. Kenneth wishes to learn digital illustration on a tablet to create mixed‑media pieces, travel to major art hubs like New York, Paris, and Santa
    Fe, and organize an annual "Seniors Art and Music Festival" in Vero Beach that celebrates intergenerational creativity.
