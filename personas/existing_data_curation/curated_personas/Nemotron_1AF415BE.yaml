personas:
  professional: Kenneth Tillis, a retired construction foreman and boat‑repair craftsman who now volunteers as a docent and senior‑center arts event coordinator, leverages his hands‑on carpentry and marine
    skills together with his spontaneous, sociable energy to keep community art programs alive despite occasional lapses in organization.
  sports: Kenneth Tillis spends his mornings sailing his small boat on the Intracoastal Waterway, joins the Vero Beach Senior Golf Club for occasional 9‑hole rounds, and cheers on the Miami Marlins while
    birdwatching at the nearby Rookery Bay National Estuarine Research Reserve.
  arts: Kenneth Tillis paints watercolor landscapes of the Intracoastal with a palette inspired by Winslow Homer and Georgia O'Keeffe, strums the ukulele to Latin‑inspired folk tunes at community gatherings,
    and frequently leads docent tours at the Vero Beach Museum of Art, where he delights in American Impressionist works by Childe Hassam.
  travel: Kenneth Tillis enjoys spontaneous weekend getaways to the Florida Keys and historic Savannah, while dreaming of immersive art pilgrimages to New York’s Met, Paris’s Musée d’Orsay, and the vibrant
    galleries of Santa Fe, balancing careful budgeting with his love for sudden, culturally rich adventures.
  culinary: Kenneth Tillis, a moderately skilled home chef, prepares citrus‑garlic shrimp, mojo‑marinated grouper with plantains, and freshly baked key lime pie, infusing each dish with garden‑grown herbs
    like basil and cilantro while occasionally indulging in classic peach cobbler for a nostalgic Southern touch.
  core: Kenneth Tillis is a spirited, art‑loving retiree who fuses his hands‑on boat‑building chops with spontaneous community projects, yet his chronic worry and occasional forgetfulness keep life both
    lively and a little chaotic.
background:
  cultural: Kenneth is a White American who grew up in a small town in central Georgia during the 1950s and 1960s. His upbringing was shaped by Southern customs, a close‑knit church community, and a strong
    work ethic. After a career in construction and boat repair, he retired to Vero Beach in his early 60s, where he embraced the laid‑back, multicultural vibe of Florida's Treasure Coast. He enjoys the
    coastal lifestyle, participates in local festivals, and respects the diverse cultural influences—including the Hispanic traditions celebrated by his wife's family. His artistic sensibilities reflect
    an appreciation for classic American art as well as the vibrant, eclectic flavors of the region.
