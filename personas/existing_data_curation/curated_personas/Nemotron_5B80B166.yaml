  hobbies: '[''Salsa dancing'', ''Group fitness classes (HIIT, dance cardio)'', ''Yoga and mindfulness meditation'', ''Volunteer tutoring at local youth center'', ''Community gardening'', ''Cooking Caribbean
    and Southern cuisine'', ''Attending live music events in Miami'', ''Board game nights with friends'', ''Reading personal development literature'', ''Exploring heritage sites through travel'']'
  career_goals: Merzier aims to progress to a senior leadership role such as Director of Operations or Vice President of Operations within a mission‑driven organization, preferably in the healthcare or
    sustainable manufacturing sectors. She is motivated to champion diversity, equity, and inclusion initiatives that create more equitable workplaces for Black professionals. Long‑term, she envisions establishing
    a consulting practice that helps nonprofit and community‑focused enterprises streamline operations while embedding employee mental‑wellness programs. To support these ambitions, she plans to earn an
    MBA with a focus on organizational leadership and acquire certifications in mental‑health first aid and advanced Lean Six Sigma.
