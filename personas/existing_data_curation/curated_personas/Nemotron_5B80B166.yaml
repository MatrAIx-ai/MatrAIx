personas:
  professional: Merzier Taylor, a data‑driven operations manager, blends Lean Six Sigma expertise, systematic KPI development, and a compassionate, structured leadership style to drive efficiency while
    embedding mental‑wellness programs across diverse teams.
  sports: Merzier Taylor’s fitness regimen includes HIIT and dance‑cardio classes at a Miami‑Dade community center, a weekly salsa social that doubles as a cardio workout, avid support for the Miami Heat
    and Miami Marlins, and participation in an adult recreational volleyball league each summer.
  arts: Merzier Taylor immerses herself in the rhythm of salsa by listening to Celia Cruz and Marc Anthony, draws inspiration from contemporary painter Kehinde Wiley, attends live music festivals featuring
    artists like Bad Bunny, and unwinds with board game nights playing Catan while absorbing personal‑development insights from Brené Brown.
  travel: Merzier Taylor prefers meticulously planned group trips that blend adventure and relaxation, such as a guided culinary tour of Puerto Rico, a wellness retreat in Sedona, and a solo weekend escape
    to New Orleans, all choreographed within a moderate budget that still leaves room for spontaneous salsa dancing abroad.
  culinary: Merzier Taylor enjoys cooking at an intermediate level, often preparing Caribbean staples like jerk chicken with Scotch bonnet peppers and Southern comfort dishes such as collard greens and
    sweet potato pie, while experimenting with coconut milk, plantains, and fresh herbs to add vibrant flavor and cultural storytelling to each meal.
  core: Merzier Taylor is a relentlessly organized operations strategist whose high‑energy social life, fervent salsa dancing, and habit of over‑scheduling both fuel ambition and occasionally trigger anxiety
    when life’s variables spin out of control.
background:
  cultural: Merzier grew up in a close‑knit African‑American family in South Florida, where the rhythms of Caribbean music and the traditions of the Black church played central roles in daily life. Her
    parents emphasized education and community service, encouraging her to attend a historically Black college for her STEM degree. The multicultural tapestry of Homestead and broader Miami‑Dade County
    exposed her to a rich blend of Afro‑Caribbean, Latin, and Southern U.S. cultures, shaping her inclusive worldview. While navigating the challenges of systemic inequities, she developed a strong sense
    of resilience and a commitment to uplifting her community. Her cultural identity informs her leadership style—grounded in collective responsibility, empathy, and a desire to create spaces where Black
    professionals and underserved residents can thrive.
attributes:
  skills: '[''Operations Management'', ''Process Optimization'', ''Data‑Driven Decision Making'', ''Budget Forecasting'', ''Team Leadership'', ''Conflict Resolution'', ''Staff Training and Development'',
