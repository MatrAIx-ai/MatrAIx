  career_goals: Seepersaud aims to turn his love of art and his desire to help others into a career that blends creativity with community impact. In the short term he plans to deepen his graphic‑design
    abilities and build a portfolio of student‑led artwork and volunteer projects. He hopes to study visual communication or graphic design in college, eventually working as a community‑arts coordinator
    or social‑impact designer who creates inclusive art programs for youth. He also envisions volunteering as a mentor for younger students and possibly pursuing counseling coursework to support peers facing
    challenges.
