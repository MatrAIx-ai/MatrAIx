persona_description: A geologist who is interested in the study of crystal structures and the relationships between different types of crystals. They are particularly interested in the seven systems of
  crystal structures, also known as lattices, and how they reflect the ordered internal structure of large crystals like spinels. They enjoy learning about the everyday materials they encounter as crystals,
  such as table salt, sugar, and snow, and the unique properties and structures of gemstones like quartz and diamond. They are also interested in the mathematical concepts and theories related to crystal
  structures, such as group theory and representation theory.
