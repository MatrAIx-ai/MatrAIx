  hobbies: '[''Knitting and crocheting'', ''Quilting'', ''Gardening'', ''Hiking'', ''Reading historical fiction'', ''Book club'', ''Volunteer work at animal shelter'', ''Baking'']'
  career_goals: Diane aims to advance to a supervisory role, such as shift lead or lead machine setter, within the next three years, leveraging her technical expertise and mentorship skills. She plans to
    complete her associate's degree in industrial technology and obtain certification in textile manufacturing safety. Her long‑term ambition is to become a production manager focused on sustainable textile
    practices, reducing waste, and implementing eco‑friendly processes. She also aspires to champion employee well‑being by serving as a safety coordinator, fostering a harmonious and safe work environment
    for her colleagues. Balancing career growth with family stability, she seeks a position that offers a predictable schedule and the opportunity to contribute meaningfully to her team's success.
