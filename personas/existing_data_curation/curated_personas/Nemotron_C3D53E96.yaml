  career_goals: Norma aims to turn her methodical strengths into a career in data analysis or financial administration. She plans to enroll in a community college program in accounting or information systems
    within the next year, with the goal of obtaining a certification as a bookkeeper or a junior data analyst. In the longer term, she aspires to work for a local agribusiness or winery as a logistics coordinator,
    leveraging her love for practical problem‑solving and her competitive drive to excel in performance metrics. She also entertains the idea of eventually launching a small e‑commerce venture selling handcrafted
    home‑brew kits, drawing on her DIY skills.
