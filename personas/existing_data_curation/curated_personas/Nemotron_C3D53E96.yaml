personas:
  professional: Norma Miller, a budding data analyst with a talent for Excel and meticulous record‑keeping, channels their curiosity and competitive drive into turning raw agricultural data into actionable
    logistics plans while maintaining a skeptical eye on data integrity.
  sports: Norma Miller, a solitary fitness enthusiast, drums up morning cardio by trail‑running with the Napa Valley Trail Club, tunes into San Francisco Giants baseball games on weekends, and uses their
    competitive edge to track personal bests in a Strava‑linked cycling app.
  arts: Norma Miller, an introspective photographer, spends evenings editing macro shots of dew‑kissed herbs while listening to Sufjan Stevens’ folk‑indie ballads and studies Ansel Adams’ black‑and‑white
    landscapes for compositional inspiration.
  travel: Norma Miller prefers meticulously planned weekend road trips, having already explored Yosemite National Park’s granite cliffs and dreaming of a solo backpacking adventure through the Scottish
    Highlands, yet they budget each journey to avoid overspending on flights and accommodations.
  culinary: Norma Miller, a modest home chef, cultivates basil, rosemary, and thyme in their garden to craft fresh pesto and herb‑infused olive oil for pasta al pomodoro, while occasionally treating themselves
    to a craft cheese board featuring aged cheddar and a glass of local Pinot Noir.
  core: Norma Miller blends methodical data‑driven ambition with a solitary love of nature, obsessively tracks every expense in spreadsheets, but they can’t resist impulsively buying vintage camera gear
    when a flash sale appears.
background:
  cultural: Norma was raised in Walla Walla, a small town in southeastern Washington with a predominantly white, middle‑class population. Her family’s roots are in the region’s agricultural and wine‑producing
    heritage, and she grew up attending community events like county fairs and local vineyard tours. The local culture emphasizes self‑reliance, modesty, and a close connection to the land, which have shaped
    her practical outlook and appreciation for quiet, solitary pursuits. While she identifies with mainstream American cultural norms, she also values the regional pride of the Pacific Northwest’s outdoor
    lifestyle.
