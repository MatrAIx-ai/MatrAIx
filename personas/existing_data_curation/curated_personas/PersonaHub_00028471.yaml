persona_description: A military historian and martyr studies, particularly focusing on the life and martyrdom of Saint Maurice, a Syrian military commander who suffered under the emperor Maximian Galerius
  in the year 305. His research interests include the historical context, the tactics and strategies of the time, and the impact of the persecution on the soldiers and the martyrdom of the saint. He is
  also interested in the spiritual and moral strength of the saint and the impact of the martyrdom on the Christian community.
