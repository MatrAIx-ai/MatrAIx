  career_goals: Currently retired from the corporate world, Hua aims to channel his experience into the local arts community of Portland. He aspires to volunteer as a program coordinator for a multicultural
    arts nonprofit, designing cross-cultural exhibitions that showcase East Asian and Pacific Northwest artists. He also hopes to launch a podcast series that explores contemporary art, philosophy, and
    intercultural dialogue, positioning himself as a thought-leader who bridges ideas across continents. Additionally, Hua plans to mentor emerging artists and community organizers, and he is considering
    completing a certificate in arts administration to formalize his expertise.
