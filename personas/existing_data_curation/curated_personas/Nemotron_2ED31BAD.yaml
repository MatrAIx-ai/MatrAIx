  hobbies: '[''Sketching and digital illustration'', ''Acoustic guitar playing'', ''Photography'', ''Hiking and nature walks'', ''Community theater attendance'', ''School art club participation'', ''Volunteer
    graphics tutoring'', ''Robotics kit building'', ''Exploring new tech apps'', ''Organizing social meet‑ups'']'
  career_goals: Justin aims to pursue a career that blends his artistic sensibility with technology. His immediate goal is to attend a university with a strong visual arts and interactive media program,
    where he can refine his design skills and expand his knowledge of user experience and multimedia production. He aspires to become a UI/UX designer or multimedia artist, eventually leading creative projects
    that shape digital products or community art initiatives. In the longer term, he envisions launching a collaborative makerspace in his hometown that offers workshops in digital art, coding, and music,
    providing local youth with creative outlets and practical skills.
