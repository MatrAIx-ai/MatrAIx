personas:
  professional: Justin Speer is a budding UI/UX designer in the making, channeling their methodical project-management flair and Adobe Illustrator expertise into leading the school art club’s interactive
    media showcases and orchestrating community‑center workshops that fuse digital illustration with simple Python scripts.
  sports: Justin Speer is an avid weekend hiker who joins the school’s cross‑country team in the fall, plays pick‑up basketball with friends at the community center, and passionately supports the MLB’s
    Chicago Cubs and the NBA’s Golden State Warriors, approaching fitness with a mix of disciplined training and spontaneous outdoor adventures.
  arts: Justin Speer immerses themselves in creative expression by sketching daily, drawing inspiration from digital artist Beeple and Studio Ghibli’s animation, strumming acoustic covers of John Mayer
    and Bon Iver, and attending community theater productions of 'Our Town,' weaving these artistic touchstones into their design sensibility and weekend meet‑ups.
  travel: Justin Speer loves crafting detailed itineraries, from weekend photo walks along the nearby Green River Valley to a spring weekend in Asheville, North Carolina exploring its art galleries, and
    they now dream of a summer backpacking trip through the Swiss Alps and a cultural deep‑dive in Barcelona’s street murals, always balancing a teen budget with a penchant for both structured planning
    and spontaneous photo challenges.
  culinary: Justin Speer’s palate leans toward comfort foods with a creative twist—think avocado toast sprinkled with feta and chili flakes, homemade ramen bowls topped with soft‑boiled eggs and miso butter,
    and occasional attempts at baking chocolate chip cookies that often end up slightly burnt—reflecting a modest cooking skill level that favors quick, flavorful meals over elaborate recipes.
  core: Justin Speer is a methodical, socially‑driven teen who blends art, tech, and community spirit, juggling sketchbooks, guitar strings, and event checklists while occasionally over‑committing and snacking
    on midnight pizza.
background:
  cultural: Justin grew up in Mexico, Missouri, a small town in Callaway County that embodies classic Midwestern values of community, hospitality, and self‑reliance. As a white American from a rural background,
    he was shaped by local traditions such as county fairs, high school football gatherings, church events, and family barbecues. While he embraces the modest, hard‑working ethos of his region, his curiosity
    and access to broader cultural influences through school and the internet have expanded his appreciation for diverse artistic expressions. He balances his regional heritage with a forward‑looking mindset,
    valuing both communal ties and innovative ideas.
