    to Retail & Technology Podcasts'', ''Home Brewing Craft Beer'', ''Genealogy Research'']'
  career_goals: Brent aims to advance into a managerial role that leverages his strength in back‑of‑house operations. Over the next three to five years he plans to become a store manager or inventory supervisor,
    focusing on efficient stock control and staff development while minimizing extensive front‑line sales interaction. To support this transition, he intends to complete a part‑time bachelor's degree in
    Business Management and earn a National Retail Federation certification. In the longer term, he aspires to move into a regional logistics coordinator position, designing inventory processes for multiple
    stores and preserving a balanced work‑life schedule. He also seeks to mentor younger employees, fostering a culture of collaboration and harmony, and to ensure financial stability for his family through
    steady career growth that aligns with his practical and modest leadership style.
