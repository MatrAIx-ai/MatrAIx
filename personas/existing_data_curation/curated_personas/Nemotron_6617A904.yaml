personas:
  professional: Zaria Miller is an interior-finishing specialist who merges a STEM analytical mindset with hands-on craftsmanship, excelling at precise measurement, low-VOC paint mixing, historic restoration,
    and project budgeting, while channeling their competitive drive into delivering sustainable, high-end residential spaces.
  sports: Zaria Miller cycles weekly with the Ann Arbor Cycling Club, follows the University of Michigan Wolverines football and basketball teams, keeps up with the Detroit Tigers in baseball, and practices
    yoga twice a week to counterbalance the physical demands of interior finishing work.
  arts: Zaria Miller explores fine-art painting in oil and watercolor, drawing inspiration from Claude Monet's light studies, Frida Kahlo's bold colors, and the dynamic street art of Banksy, while regularly
    attending Ann Arbor's ArtFair, volunteering on community murals, and finding creative rhythm in the music of Nina Simone and John Coltrane.
  travel: Zaria Miller plans trips meticulously, favoring eco-friendly itineraries that combine cycling tours through the vineyards of Tuscany, a culinary pilgrimage to New Orleans for authentic gumbo,
    weekend escapes to the serene shoreline of Lake Michigan, and occasional weekend getaways to the historic streets of Savannah, all while budgeting carefully to sustain their growing business.
  culinary: Zaria Miller's kitchen showcases Southern-inspired dishes like shrimp and grits, collard greens seasoned with smoked paprika, and banana pudding, prepared with a confident hand in oil-based
    sauces and a penchant for sourcing fresh herbs from their urban garden.
  core: Zaria Miller blends meticulous craftsmanship, a competitive edge, and a love for art and sustainable living into a life anchored by disciplined schedules, occasional indulgent paint-supply splurges,
    and a quiet resilience forged through cycles of work and yoga.
background:
  cultural: Zaria is a Black woman whose family roots trace back to the Great Migration from the American South, with grandparents who settled in Detroit before she moved to Ann Arbor for college. Her cultural
    identity blends Southern heritage—soul food, gospel music, and storytelling—with the progressive, academic atmosphere of a university town. She actively participates in Ann Arbor’s African-American
    community events, supports local Black artists, and mentors young people of color in the trades through the local chapter of the National Association of Women in Construction. Her STEM education and
    trade expertise reflect a commitment to breaking stereotypes and fostering representation within both technical and artistic spheres.
attributes:
  skills: '["Surface preparation", "Drywall taping and mudding", "Paper hanging and wallpaper installation", "Paint mixing and color matching", "Interior finish specification reading", "Project budgeting
    and cost estimation", "Time management and scheduling", "Safety compliance (OSHA)", "Power tool operation (sprayers, sanders)", "Material science knowledge (adhesives, coatings)", "Mathematical calculations
    for material quantities", "Problem solving under constraints", "Customer communication", "Team coordination", "Quality control", "Basic CAD drafting for layout planning", "Sustainability practices (low-VOC
    paints)", "Historic restoration techniques"]'
  hobbies: '["Oil painting (fine arts)", "Watercolor sketching", "DIY home improvement projects", "Urban gardening", "Cycling on Ann Arbor trails", "Reading African-American literature", "Reading popular
    science books", "Attending local art festivals and theater", "Cooking Southern-inspired cuisine", "Volunteer mural painting", "Yoga and mindfulness meditation", "Listening to technology podcasts", "Historical
    home restoration projects", "Hiking in the Huron River area", "Collecting vintage tools"]'
  career_goals: Zaria aims to transition from contractor to business owner, establishing a boutique interior-finishing firm that specializes in sustainable, high-end residential projects and historic restorations.
    She plans to earn master certifications in lead-safe painting and become a certified green-building consultant. Long-term, she hopes to mentor and train women of color entering the trades, develop a
    line of low-VOC, eco-friendly paint products, and eventually serve as a consultant for large university and corporate renovation projects in the Midwest.
