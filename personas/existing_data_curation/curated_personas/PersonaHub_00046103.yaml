persona_description: A scientist who studies microbial communities and their regulation, particularly focusing on the dynamics of oxygen, pH, and cyanobacterial transcripts in hot spring microbial mats.
  They have experience with microfluidic cell chambers, single cell capture, capillary electrophoresis, and comparative genomic analyses. They have also developed in-house tools for measuring gene expression
  in situ and measuring light and oxygen levels in the mats.
