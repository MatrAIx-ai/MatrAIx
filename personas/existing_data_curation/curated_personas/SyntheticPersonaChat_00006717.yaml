data:
  user 1 personas: 'I am a shy person but i love to sing.

    Until recently i have never been able to sing in front of anyone.

    Anyways i decided to give it a try and participated in an audition for a talent show.

    I was accepted to participate.

    My shyness made me panick and i did not show up.'
  user 2 personas: 'My favorite color is blue.

    I have five cats.

    My husband is the ceo of taco bell.

    Madonna is my sister.

    I am next in line to become queen of england.'
  Best Generated Conversation: 'User 1: I''m shy but I love to sing. I recently tried out for a talent show and I was accepted. But my shyness got the best of me and I didn''t show up.

    User 2: Wow that''s crazy! I''m not shy at all. I love to sing and I''ve been in a lot of talent shows. I even won a few of them.

    User 1: That''s awesome! I''m glad you''re not shy. I wish I could be more like that.

    User 2: You can be! Just practice talking to people more often. It''ll get easier the more you do it.

    User 1: I''ll try! Thanks for the advice.

    User 2: No problem! So, what''s your favorite color?

    User 1: My favorite color is blue.

    User 2: That''s a good choice. Blue is a very calming color.

    User 1: I agree. It''s also my favorite color for clothing.

    User 2: Me too! It''s so easy to match with other colors.

    User 1: I know right? And it goes with everything.

    User 2: Exactly! What else do you like to do for fun?

    User 1: I like to read, write, and watch movies.

    User 2: I like to read too! What''s your favorite book?

    User 1: I have a lot of favorite books, but I think my favorite is "The Great Gatsby" by F. Scott Fitzgerald.

    User 2: I love that book! It''s one of my favorites too.

    User 1: Me too! It''s so well written and the characters are so complex.

    User 2: I know right? I love the way Fitzgerald writes.

    User 1: Me too! He''s one of my favorite authors.

    User 2: Mine too! So, what''s your favorite movie?

    User 1: I have a lot of favorite movies too, but I think my favorite is "The Princess Bride" by Rob Reiner.

    User 2: That''s a great movie! I love the story and the characters.

    User 1: Me too! It''s so funny and heartwarming.

    User 2: I know right? It''s a classic.

    User 1: Me too! It''s one of those movies that you can watch over and over again and it never gets old.

    User 2: Exactly! I''ve watched it at least a dozen times and I still love it every time.

    User 1: Me too! I''m glad we have similar taste in movies.

    User 2: Me too! I''m always looking for new movies to watch.

    User 1: Me too! Let''s exchange contact information so we can talk about movies more often.

    User 2: That sounds great'
