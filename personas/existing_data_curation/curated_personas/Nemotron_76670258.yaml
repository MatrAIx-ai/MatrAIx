  career_goals: Emily plans to transition gradually from full‑time bedside nursing to a part‑time mentorship and community health education role. Over the next two years she aims to earn a certification
    in geriatric palliative care to better serve the aging residents of Morrow County. She also hopes to formalize a volunteer home‑visit program for isolated seniors, continue mentoring nursing students,
    and attend selected continuing‑education workshops that pique her curiosity about holistic care. Ultimately, she envisions a phased retirement that maintains her professional contribution while granting
    her greater flexibility for family, hobbies, and personal well‑being.
