personas:
  professional: Ernest Davis, an enthusiastic kindergarten class monitor, channels their love of structure and sociable energy into keeping daily routines orderly while gently nudging peers toward cooperative
    group activities.
  sports: Ernest Davis, a lively member of the Little Lions Soccer Club, passionately cheers for the Chicago Cubs during family game nights, loves sprinting in the kindergarten’s obstacle course, but they
    can become overly competitive during tag, occasionally tripping over their own enthusiasm.
  arts: Ernest Davis, an avid fan of Disney’s "Frozen," enjoys drawing Elsa’s ice castle, sings loudly to JoJo Siwa’s "Kid in Love," and frequently reenacts scenes from "Blue’s Clues," though they sometimes
    battle over the volume on the family TV.
  travel: Ernest Davis, a curious explorer who has visited the local zoo and Disney World and dreams of seeing the beaches of Hawaii, prefers trips that follow a clear itinerary with scheduled snack breaks,
    yet they get nervous when flights are delayed, clutching their stuffed rabbit for comfort.
  culinary: Ernest Davis, a picky but adventurous eater, adores mac and cheese with cheddar, chicken nuggets with a secret honey‑mustard dip, and fruit salad featuring strawberries and banana slices, yet
    they habitually sneak a handful of gummy bears before bedtime despite parental warnings.
  core: Ernest Davis, a structured yet sociable five‑year‑old who thrives on routine, they lead peers in play, worry about small changes, and balance careful saving with occasional candy cravings.
background:
  cultural: 'Ernest is raised in a middle‑class white family in Yorktown Heights, Westchester County. His upbringing reflects typical suburban American traditions: celebrating holidays such as Thanksgiving,
    Independence Day, and Christmas, attending community events, and participating in preschool and library programs. His family values routine, safety, and community involvement, which shape his daily
    life and early worldview.'
attributes:
  skills: '["Letter recognition and simple reading", "Counting and basic addition", "LEGO building and puzzle solving", "Following and enforcing game rules", "Cooperative group play", "Basic tablet navigation
    for educational apps", "Organizing personal play space"]'
  hobbies: '["LEGO building", "Jigsaw puzzles", "Organized playground games", "Library storytime", "Drawing and coloring", "Singing nursery rhymes"]'
  career_goals: Ernest dreams of growing up to be a firefighter or a school teacher—careers that combine clear routines, helping others, and a sense of responsibility. He often talks about wanting to wear
    a firefighter's helmet or stand at a blackboard, showing his desire for roles that are structured, community‑focused, and allow him to protect and guide people.
