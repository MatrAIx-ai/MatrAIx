  career_goals: Although she is not currently employed, Valarie aims to deepen her involvement in Gulfport’s civic life. She plans to secure a leadership role on a local nonprofit board, launch a small
    home‑based catering service focused on Southern comfort food, and eventually run for a seat on the Harrison County School Board. She also seeks to develop a structured stress‑management routine to sustain
    her active social lifestyle.
