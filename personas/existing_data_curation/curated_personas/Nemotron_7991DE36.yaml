  career_goals: Although retired, Doris aims to remain an active contributor to her community by expanding her volunteer mentorship for adult learners and seniors. She plans to develop and lead intergenerational
    arts workshops at local community centers, and is exploring a certificate in museum studies to deepen her curatorial knowledge. Doris aspires to write a memoir or a local history book that captures
    the cultural evolution of Royal Oak, and she hopes to advocate for more senior-friendly continuing education programs within Oakland County. She also wishes to build a supportive network for older women
    interested in creative pursuits, fostering collaboration and lifelong learning.
