personas:
  professional: A retired educator and community mentor, Doris Mitchell channels their decades of classroom instruction, curriculum design, and public speaking into leading intergenerational arts workshops
    at local centers, where their meticulous event planning meets a flexible, curiosity‑driven style that allows them to assertively guide volunteers while remaining cooperative and attentive to participants’
    needs.
  sports: An active community member who enjoys daily bird‑watching walks, low‑impact Tai Chi, and attending Detroit Tigers baseball games at Comerica Park, Doris Mitchell is a regular participant in the
    Royal Oak Senior Athletic Club’s “Silver Sneakers” fitness program and occasionally plays shuffle‑board at the local senior center, balancing light exercise with a love for seasonal sports.
  arts: An ardent arts enthusiast who frequents the Detroit Institute of Arts, Cranbrook Art Museum, and neighborhood galleries, Doris Mitchell paints watercolors inspired by Monet and O'Keeffe, captures
    architectural details of Frank Lloyd Wright homes through digital photography, and immerses themselves in local theater productions featuring works by Arthur Miller and contemporary jazz performances
    by the Detroit Symphony Orchestra.
  travel: A reflective traveler who blends curiosity with comfort, Doris Mitchell has journeyed to Mackinac Island for historic ferry rides, explored the Scottish Highlands to trace ancestral roots, and
    visited Paris to study impressionist collections, preferring meticulously planned itineraries that incorporate genealogical research stops, yet they often negotiate travel costs using senior discounts
    and occasionally postpone overseas trips due to health concerns.
  culinary: A culinary explorer who delights in cooking new ethnic dishes, Doris Mitchell regularly prepares Thai green curry with fresh lemongrass and basil from their herb garden, Moroccan chicken tagine
    with preserved lemons and apricots, and homemade rosemary focaccia topped with heirloom tomatoes, mastering a moderate skill level that balances experimental flavors with reliable comfort foods.
  core: A curious, detail‑oriented senior who weaves art, genealogy, and community mentorship into a vibrant, occasionally worry‑laden but generously spirited life.
background:
  cultural: Doris grew up in suburban Detroit within a middle‑class family of German and Irish ancestry. Raised with Midwestern values of hard work, community involvement, and modesty, she attended public
    schools and earned her degree from a state university. She has been an active member of the United Methodist church, participating in outreach and cultural events. Living her entire adult life in Oakland
    County, she has been shaped by the region’s automotive heritage, the rich museum and arts scene, and a strong sense of neighborhood camaraderie. Her cultural identity blends traditional Midwestern hospitality
    with an appreciation for diverse artistic expressions.
