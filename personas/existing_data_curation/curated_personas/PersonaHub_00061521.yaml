persona_description: A college professor specializing in the field of molecular biology and biochemistry, particularly in the area of RNA structure and prediction. He has extensive experience in graph theory
  and its applications to the study of biological networks, including DNA, RNA, and protein networks. His research focuses on the development of more precise algorithms to predict RNA structure using the
  graph-theoretical representation of RNAs. He collaborates with a research group led by Tamar Schlick, from Courant Institute of Mathematical Sciences and Chemistry departments from New York University,
  to conduct research on RNA structure and to fight the COVID-19 pandemic.
