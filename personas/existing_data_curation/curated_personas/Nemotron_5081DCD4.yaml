  hobbies: '[''Visiting art galleries'', ''Handcrafting Mexican folk art'', ''Cooking traditional and fusion dishes'', ''Reading science and technology articles'', ''Gardening (succulents and desert plants)'',
    ''Photography (desert landscapes)'', ''Volunteer teaching basic computer skills'', ''Listening to mariachi and folk music'', ''Hiking in Mojave Desert'', ''Playing board games'']'
  career_goals: Linda aims to transition into a role that leverages her STEM background while building on her retail experience, such as a technical support specialist for retail technology or a data entry/analysis
    position within a logistics company. She plans to earn a certification in information systems or project management within the next two years to strengthen her qualifications. Additionally, Linda aspires
    to start a small side business selling hand‑crafted Mexican folk art and offering workshops that blend cultural heritage with basic computer skills for community members. Financial stability for retirement
    and the ability to travel to her family’s hometown in Mexico are long‑term priorities, as is becoming a mentor for younger women pursuing STEM careers in her region.
