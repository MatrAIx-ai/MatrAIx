  hobbies: '[''Fishing on Beaver Lake'', ''Reading science-fiction and business books'', ''Woodworking and DIY projects'', ''Home brewing craft beer'', ''Hiking Ozark trails'', ''Cooking Italian meals'',
    ''Board game nights with close friends'']'
  career_goals: Over the next three to five years, Domenico aims to step into a senior sales management role where he can lead a small team of service representatives, mentor junior staff, and shape regional
    sales strategies. He hopes to deepen his expertise in cloud‑based and managed services, positioning himself as a trusted advisor for larger enterprise clients. Ultimately, he envisions moving into a
    regional director position that offers greater autonomy, a flexible schedule for his family, and the ability to influence product development based on direct market feedback. Financial stability and
    the ability to provide more security for his wife and future children remain core motivators.
