persona_description: A business executive who is responsible for overseeing the development and implementation of connected devices for the internet of things. This person is highly skilled in Linux distribution
  selection and 32-bit microprocessor selection, and has experience in designing and implementing communication protocols. This person is also familiar with the challenges and limitations of building a
  connected device, such as the tradeoff between complexity and cost, and the importance of reducing device complexity by storing computations and data in the cloud. This person is also aware of the potential
  for the cloud-based approach to reduce device complexity and enable more affordable connected devices.
