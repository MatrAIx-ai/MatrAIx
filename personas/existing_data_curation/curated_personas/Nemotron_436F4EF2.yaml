  hobbies: '[''Painting'', ''Sketching'', ''Digital Illustration'', ''Reading speculative fiction'', ''Attending poetry readings'', ''Improvisational theater'', ''Pickup basketball'', ''Community art volunteering'',
    ''Cooking fusion cuisine'', ''Exploring cultural festivals'', ''Hiking'']'
  career_goals: Deandre aims to become the director of a regional arts nonprofit, creating inclusive programming that bridges artistic expression with social impact in Fairfield County. He envisions establishing
    a community hub that offers workshops, exhibitions, and mentorship opportunities for emerging artists, especially those from underrepresented backgrounds. Long‑term, he hopes to influence cultural policy
    at the state level, championing equitable access to the arts while maintaining a flexible work‑life balance that supports his family.
