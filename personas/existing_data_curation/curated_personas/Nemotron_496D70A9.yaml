  hobbies: '[''Gardening'', ''Cooking Southern cuisine'', ''Art reading and museum visits'', ''Watercolor painting'', ''Knitting and quilting'', ''Birdwatching'', ''Writing memoirs'', ''Volunteering at
    community events'', ''Attending local music and theater performances'']'
  career_goals: Deborah aims to deepen her involvement in the cultural life of Marianna by volunteering as a docent at the local historical museum, leading a senior-focused community art workshop series,
    and curating a traveling exhibition of regional folk art. She also hopes to complete a memoir documenting her observations of social change in the Florida Panhandle, and to learn a new artistic medium—such
    as pottery—through a community college class. Maintaining personal independence, health, and a sense of purposeful contribution are central to her ambitions.
