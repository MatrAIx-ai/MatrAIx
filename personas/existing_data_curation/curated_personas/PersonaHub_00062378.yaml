persona_description: A scientist working at the National Institute on Deafness and Other Communication Disorders (NIDCD), specifically focused on research in the field of hearing and balance. Dr. Bechara
  Kachar and Dr. M’hamed Grati are known for their contributions to the understanding of the inner ear's function and the discovery of proteins involved in the tuning of the ear's stereocilia. Their latest
  research has focused on the proteins cadherin-23 and protocadherin-15, which they have localized at the site of the ear's tip links. Their findings have implications for the understanding of Usher syndrome,
  a genetic disorder that can result in loss of hearing, balance, and vision.
