  hobbies: '[''Gardening'', ''Baking'', ''Volunteer Work at Food Pantry'', ''Community Clean‑up'', ''Walking/Hiking'', ''Reading Cozy Mysteries'', ''Knitting'', ''Attending County Fair'']'
  career_goals: Veronica aims to build on her strengths in empathy and conflict resolution to move into a supervisory or lead role within the next three to five years, seeking opportunities to mentor new
    representatives and shape service policies. She plans to earn a Certified Customer Service Professional credential and, in the longer term, develop a community‑focused outreach program or a small home‑based
    venture—such as a baked‑goods business—that leverages her practical skills while preserving her routine‑oriented lifestyle.
