  hobbies: '[''Gardening'', ''Book Club Participation'', ''Knitting and Quilting'', ''Craft Workshops'', ''Bridge'', ''Bingo'', ''Jazz Concert Attendance'', ''Historic Walking Tours'', ''Lilac Festival
    Attendance'', ''Genealogy Research'']'
  career_goals: Although retired from formal employment, Joan remains driven by a personal mission to enrich her community and preserve her family’s legacy. Her primary ambition is to expand the intergenerational
    storytelling program at the Rochester Public Library, where she can capture oral histories of senior residents and mentor high‑school students in archiving techniques. She also aspires to complete a
    memoir that intertwines her life experiences with Rochester’s mid‑20th‑century cultural shifts, aiming to publish it locally. Maintaining her health and independence is a core goal, so she follows a
    structured walking routine and participates in senior fitness classes. Additionally, she hopes to travel modestly around the Finger Lakes region, combining her curiosity for new experiences with her
    practical budgeting skills. In all these pursuits she leverages her calm resilience to navigate any challenges without undue stress.
