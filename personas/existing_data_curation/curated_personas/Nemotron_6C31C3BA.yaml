    Art Exploration'']'
  career_goals: Michael aims to turn his creative talents into a dynamic career in digital media and brand storytelling. He plans to complete a bachelor's degree in Communications or Visual Arts, secure
    an internship with an advertising agency, and eventually become a creative director or brand strategist known for bold, unconventional campaigns. He is also interested in launching his own boutique
    content studio that blends art, music, and community events, enabling him to travel, collaborate with diverse creators, and gain recognition for innovative projects.
