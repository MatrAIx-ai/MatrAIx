  career_goals: Although officially retired, Augusto aims to remain an active cultural contributor in Morton Grove and the greater Chicago area. He hopes to launch an intergenerational art workshop series
    at the local community center, serve as a docent for the Chicago History Museum, and compile a short‑story collection inspired by the city’s neighborhoods. He also plans to mentor younger volunteers
    interested in museum studies, and to pursue additional coursework in museum education to deepen his expertise.
