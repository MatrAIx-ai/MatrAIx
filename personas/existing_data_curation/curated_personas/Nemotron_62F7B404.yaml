  career_goals: Tanya aims to complete her bachelor’s degree in Communications with a focus on public relations and event management. She envisions starting as a junior communications associate at a regional
    nonprofit or marketing firm, where she can apply her organized, detail‑oriented mindset while continuing to engage with diverse audiences. Long‑term, she hopes to launch her own community‑focused event
    planning business that emphasizes inclusive programming and mental‑health awareness, combining her professional ambition with her personal commitment to supporting others.
