personas:
  professional: Henry Jones, a retired handyman and community mentor, merges decades of hands‑on home‑repair expertise with a calm yet assertive demeanor to teach plumbing, basic electrical work, carpentry,
    and simple automotive maintenance at his neighborhood center, and they delight in seeing neighbors apply these skills.
  sports: Henry Jones is a die‑hard fan of the Houston Rockets and frequently joins the local senior fan club to watch games; they balance this enthusiasm with leisurely fishing trips to Lake Conroe each
    spring and a regular routine of garden‑based cardio, though they never sign up for a formal gym membership.
  arts: Henry Jones fills his evenings with gospel hymns, the gritty blues of B.B. King, the timeless soul of Aretha Franklin, and the lively harmonies of his church choir; they occasionally volunteer as
    a backup vocalist at community events and keep a treasured collection of classic R&B vinyl that inspires both his cooking rhythm and storytelling.
  travel: Henry Jones prefers spontaneous road‑trip adventures; they have chased jazz through New Orleans, spent relaxed weekends fishing on Galveston’s Gulf shoreline, and dream of a pilgrimage along the
    Civil Rights Trail in Alabama, all while balancing a modest travel budget with familial responsibilities.
  culinary: Henry Jones is a master of slow‑cooked barbecue ribs, collard greens, jambalaya, and gumbo; they season with smoked paprika, Cajun herbs harvested from their garden, and a splash of hot sauce,
    often hosting pot‑luck feasts where each dish tells a story of Southern comfort and communal bonding.
  core: Henry Jones is a sociable, garden‑loving mentor who turns every barbecue into a home‑repair lesson, yet habitually misplaces bills and worries about health checks, balancing boundless generosity
    with a touch of chronic overthinking.
background:
  cultural: Henry’s cultural identity is rooted in the African-American community of Houston’s Third Ward, where he was born and raised in the 1950s. His grandparents migrated from Mississippi during the
    Great Migration, bringing with them stories of sharecropping, church worship, and the pursuit of better opportunities. Growing up, Henry was immersed in the rhythms of gospel music, the flavors of Southern
    cooking, and the strong sense of solidarity fostered by his church and local senior yard. He celebrates Juneteenth, participates in annual community barbecues, and maintains family traditions such as
    storytelling and cooking soul food on holidays. His experiences as a Black man who lived through the civil‑rights era have shaped his values of perseverance, community service, and pride in his heritage.
