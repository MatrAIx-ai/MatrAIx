persona_description: A paleontologist who specializes in the study of mammalian fossils, particularly those of marsupial ancestors. His research interests include the evolution and diversity of marsupial
  mammals, and the relationship between marsupials and placental mammals. He is particularly interested in the discovery and analysis of new fossil species, and the use of paleontological evidence to understand
  the history and ecology of ancient mammalian populations. He is also interested in the cultural and historical significance of fossil discoveries, and the ways in which they can be used to inform broader
  scientific and social debates.
