personas:
  professional: Seema Mason is a diligent master carpenter‑in‑training who combines traditional framing expertise with modern CNC techniques, runs tight project budgets, and channels a competitive drive
    into winning regional trade contests while planning an all‑female boutique workshop in Madison specialized in sustainably sourced custom furniture.
  sports: Seema Mason finds balance on the Appalachian segments of the Natchez Trace, is a member of the Madison Trailblazers hiking club, follows the Milwaukee Brewers for baseball, and participates in
    weekend pickup volleyball games to keep her cardio up.
  arts: Seema Mason engages in woodturning small art pieces inspired by the organic forms of William Sawrey, restores vintage tool collections as functional art, reads architectural histories by Jane Jacobs,
    listens to the true‑crime podcast Serial for a creative break, and appreciates folk singer Gillian Welch.
  travel: Seema Mason favors purposeful weekend trips, has explored Portland’s maker community, trekked the Smoky Mountains, plans a future visit to Copenhagen to study Danish modern design and Kyoto for
    traditional Japanese joinery, and always books budget‑friendly accommodations while mapping out detailed itineraries.
  culinary: Seema Mason prefers farm‑to‑table comfort food, often cooks wood‑fired pizza topped with smoked hickory‑flavored sausage and fresh rosemary, loves a perfectly seasoned chicken and dumplings,
    and forages morel mushrooms on hikes to add to her sauces.
  core: Seema Mason is a competitive, methodical carpenter who balances an obsession with perfecting sustainable furniture with a restless curiosity, a penchant for vintage tools, and a chronic worry that
    fuels both meticulous planning and occasional sleepless nights.
background:
  cultural: Seema grew up in a modest, working‑class family in Madison County, Mississippi, where a strong Southern work ethic and community spirit were central values. Her upbringing in a small town with
    deep roots in the region’s timber and craft traditions exposed her early to hands‑on woodworking, often accompanying her grandfather in the family workshop. While she attended a local high school and
    participated in church youth groups, she has always valued self‑reliance, practical problem solving, and skepticism toward untested trends. The blend of Southern hospitality, modesty, and a growing
    appreciation for sustainable, locally sourced materials shapes her identity and informs both her professional practice and personal pursuits.
attributes:
  skills: '[''Custom furniture design'', ''Structural framing'', ''Blueprint interpretation'', ''Project budgeting'', ''Tool maintenance and repair'', ''Safety compliance'', ''Sustainable material selection'',
    ''CNC routing basics'', ''Problem solving'', ''Team leadership'']'
  hobbies: '[''Woodturning'', ''Vintage tool restoration'', ''DIY home projects'', ''Hiking'', ''Birdwatching'', ''Crossword puzzles'', ''True‑crime podcasts'', ''Reading architectural history'', ''Volunteer
    work with Habitat for Humanity'']'
  career_goals: Seema aims to achieve Master Carpenter certification within the next two years, then open her own boutique workshop in Madison that specializes in bespoke, sustainably sourced furniture
    and residential remodels. She intends to lead a small, all‑female crew, offering apprenticeships and mentoring to encourage more women into skilled trades. Over the next five years she hopes to become
    a recognized contractor for high‑quality home renovations, win regional trade competitions, and build a reputation for blending innovative designs with reliable craftsmanship while maintaining an organized,
    methodical approach to every project.
