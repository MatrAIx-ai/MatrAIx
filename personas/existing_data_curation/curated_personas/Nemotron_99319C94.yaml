  career_goals: Although retired, Murdis aims to complete a memoir that weaves her family's story with the broader history of Black Chicago. She hopes to curate a traveling exhibition of local African American
    artists for senior centers and community halls, establish a modest scholarship fund for youth interested in art and history, and digitize her genealogical collections for public access through the Chicago
    History Museum. Murdis also aspires to continue attending major art exhibitions, take workshops at the Art Institute of Chicago, and serve as a consultant for community heritage projects, ensuring that
    her knowledge benefits future generations.
