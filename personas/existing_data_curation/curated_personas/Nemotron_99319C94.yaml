personas:
  professional: Murdis Birriel, a retired genealogist and community arts coordinator, applies a meticulous, curiosity‑driven research approach to curate traveling exhibitions of local Black artists for
    senior centers, mentor volunteers in storytelling workshops, and methodically plan a memoir that weaves family lineage with Chicago’s artistic heritage.
  sports: Murdis Birriel follows the Chicago Bulls, Bears, and White Sox with loyal enthusiasm, joins the Grant Park senior walking group each Saturday, and treats the upkeep of an urban garden plot as
    a gentle strength‑building routine that keeps their knees moving despite arthritis.
  arts: Murdis Birriel spends weekends at the Art Institute decoding works by Jacob Lawrence, Romare Bearden, and Kara Walker, attends curated talks on contemporary Black art, and relaxes by replaying classic
    jazz albums such as Miles Davis’s Kind of Blue, Billie Holiday’s Lady in Satin, and B.B. King’s Live at the Regal.
  travel: Murdis Birriel prefers meticulously planned train trips that blend cultural immersion—like the annual visit to the Smithsonian’s National Museum of African American History and Culture in Washington,
    D.C., a weekend jazz pilgrimage to New Orleans, and a day‑trip to the Art Institute’s special exhibition—while staying within a modest pension budget and avoiding crowded tourist hotspots.
  culinary: Murdis Birriel expertly prepares soul‑food staples such as collard greens simmered with smoked turkey hocks, honey‑buttered cornbread, hearty gumbo rich with andouille sausage and okra, and
    sweet‑potato pie spiced with nutmeg, yet occasionally over‑salts the greens when caught up in a lively storytelling session.
  core: Murdis Birriel is a methodical, curiosity‑fueled octogenarian who blends archival research, community art advocacy, jazz devotion, and meticulous budgeting into a life of purposeful storytelling
    and quiet resilience.
background:
  cultural: Murdis was born and raised on Chicago’s South Side to parents who arrived from the Southern United States during the Great Migration. She grew up embedded in a vibrant Black community marked
    by gospel music, soul food traditions, and a legacy of civil‑rights activism. Family gatherings emphasized storytelling, preserving African heritage, and celebrating milestones such as Juneteenth. The
    cultural richness of Chicago—its blues clubs, jazz festivals, neighborhood art fairs, and strong church networks—has profoundly shaped Murdis’s identity, fostering her deep appreciation for artistic
    expression, community solidarity, and intergenerational mentorship.
