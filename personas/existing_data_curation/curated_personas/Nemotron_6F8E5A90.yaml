  career_goals: Although still a toddler, Yasuko frequently voices whimsical dreams of becoming a teacher who shares stories, a veterinarian who cares for animals, or a community storyteller who makes people
    smile. She is drawn to roles that involve interaction, nurturing, and creating harmonious environments. As she grows, she may aim to pursue a career that blends her love for communication, helping others,
    and her cultural appreciation for education and community well‑being.
