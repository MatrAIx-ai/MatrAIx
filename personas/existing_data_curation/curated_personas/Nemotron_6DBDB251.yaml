  hobbies: '[''Gardening'', ''Cooking'', ''Reading historical fiction'', ''Walking along river trails'', ''Photography'', ''Quilting'', ''Volunteering at farmers market'', ''Attending local music concerts'',
    ''Book club participation'']'
  career_goals: Kathleen aims to become one of the top residential producers in Lucas County within the next three years, increasing her annual sales volume by 30 %. She aspires to expand her personal brand
    into a boutique brokerage that specializes in first‑time homebuyers and senior downsizing, offering personalized service and community‑focused resources. Mentoring younger agents and eventually moving
    into a regional manager role at a larger firm are long‑term ambitions. She also hopes to achieve a more balanced schedule that allows her to devote time to her garden and local volunteer work, while
    maintaining the flexibility she values.
