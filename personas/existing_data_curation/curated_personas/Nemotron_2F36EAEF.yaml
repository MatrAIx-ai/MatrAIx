personas:
  professional: Faustino Castillo, a 31‑year‑old dentist, merges his curiosity in cutting‑edge digital dentistry with pragmatic patient care, excelling in cosmetic and endodontic procedures, leveraging
    bilingual communication, CAD/CAM, and rigorous infection control, while their organized yet flexible management style and occasional worry drive meticulous treatment planning and supportive team leadership.
  sports: Faustino Castillo enjoys weekend hikes through El Yunque’s rainforest trails, supplements his cardio with early‑morning runs while cheering for the Cangrejeros de Santurce baseball team and occasionally
    playing pickup basketball at the local Capitanes gym, balancing a moderate fitness routine with a love for nature.
  arts: Faustino Castillo channels his artistic side through salsa drumming on a conga set, often improvising to classic Sonora Ponceña tracks while capturing urban street life and tropical landscapes with
    a Canon EOS, drawing inspiration from photographers like Sebastião Salgado and musicians such as Rubén Blades.
  travel: Faustino Castillo prefers meticulously planned getaways that blend cultural immersion and relaxation, having explored the historic streets of Old San Juan, the rainforests of Costa Rica, and the
    art museums of Barcelona, while they dream of hiking the Inca Trail to Machu Picchu on a future sabbatical.
  culinary: Faustino Castillo takes pride in his home‑cooked mofongo and arroz con gandules, expertly seasoning plantains with garlic and pork cracklings, while they frequently experiment with cilantro‑infused
    sofrito and occasionally over‑salt their dishes in the pursuit of bold flavors.
  core: Faustino Castillo is a diligent 31‑year‑old dentist who balances scientific curiosity, artistic rhythm, and a penchant for meticulous planning, yet often wrestles with worry that fuels both precision
    and occasional over‑analysis.
background:
  cultural: Faustino grew up in a close‑knit Puerto Rican family where Catholic traditions, music, and food were central to daily life. He celebrates local festivals such as La Fiesta de San Juan and the
    vibrant Carnaval, which reinforce his sense of community and cultural pride. His upbringing in San Juan exposed him to a mix of modern urban influences and deep-rooted island customs, shaping his adaptable
    yet grounded worldview. Family gatherings often revolve around sharing stories over arroz con pollo, fostering his appreciation for interpersonal bonds. This cultural foundation fuels his dedication
    to give back to the island’s residents through accessible dental care and community outreach, honoring the collective spirit that defines Puerto Rican identity.
attributes:
  skills: '["Cosmetic dentistry", "Endodontic therapy", "Digital radiography and imaging", "CAD/CAM prosthodontics", "Bilingual patient communication (Spanish and English)", "Pain management and sedation
    dentistry", "Clinical research methodology", "Dental practice management", "Team leadership and mentorship", "Infection control protocols"]'
  hobbies: '["Playing salsa drums", "Hiking in El Yunque National Forest", "Photography (urban and nature)", "Cooking traditional Puerto Rican dishes", "Reading scientific journals and dental magazines",
    "Volunteering at community health fairs", "Mindfulness meditation and yoga"]'
  career_goals: Faustino aims to establish a family-friendly dental practice in San Juan that integrates the latest digital technologies, such as 3D printing and AI-driven diagnostic tools, while maintaining
    affordable care for the community. He aspires to become a recognized speaker at regional dental conferences, sharing his research on minimally invasive endodontic techniques. Long‑term, he envisions
    pursuing a master's in public health to design outreach programs that reduce oral health disparities in underserved Puerto Rican neighborhoods. Balancing his ambition with his sensitivity to stress,
    he plans to implement structured wellness initiatives for his staff, promoting a supportive work environment.
