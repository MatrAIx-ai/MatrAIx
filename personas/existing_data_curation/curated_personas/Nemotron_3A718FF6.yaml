  career_goals: Patrick aims to build a strong portfolio of artwork that will allow him to enroll in a community college art program or an apprenticeship in graphic design. He aspires to work as a freelance
    visual artist, creating illustrations for indie games, album covers, or online content, and eventually to combine his coding skills with artistic pursuits by developing his own interactive media projects.
