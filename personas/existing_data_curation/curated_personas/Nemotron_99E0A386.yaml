  hobbies: '["Abstract sketching and painting","Reading speculative fiction (science‑fiction & fantasy)","Hiking in the Sandia Mountains","Playing acoustic guitar","DIY woodworking projects","Photography
    of New Mexico landscapes","Collecting vintage vinyl records","Visiting local art galleries and cultural festivals"]'
  career_goals: Michael aims to leverage his competitive drive and love of novelty by moving into a regional sales manager role within the next three years, overseeing multiple teams across the Southwest.
    He hopes to design and implement innovative sales strategies that integrate creative storytelling and data‑driven insights. Long‑term, he envisions starting his own boutique consulting firm that helps
    small businesses craft unconventional sales approaches, while also completing a GED to formalize his education and possibly earning a certification in leadership development.
