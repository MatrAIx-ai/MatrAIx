personas:
  professional: Michael Shontz, a first‑line supervisor overseeing non‑retail B2B sales teams in the Southwest, blends an imaginative, improvisational mindset with strong verbal communication to craft unconventional
    pitches, motivate competitive reps, and navigate contract negotiations, even as a relaxed, sometimes disorganized planning style keeps them adaptable under pressure.
  sports: Michael Shontz, an avid hiker and member of the Albuquerque Trail Club, spends weekends scaling the Sandia Mountains, follows New Mexico United soccer and the Colorado Rockies baseball teams,
    and drops into a local indoor climbing gym each winter to stay fit.
  arts: Michael Shontz, a passionate abstract painter inspired by the desert palette, often studies the works of Jackson Pollock and Mark Rothko while strumming acoustic guitar covers of Neil Young and
    performing occasional jam sessions at the Albuquerque International Balloon Fiesta.
  travel: Michael Shontz, a spontaneous road‑trip enthusiast, has explored the surreal landscapes of Sedona, the art‑laden streets of Santa Fe, and the starlit deserts of Joshua Tree, and dreams of chasing
    the aurora borealis in Iceland, preferring loosely planned itineraries that leave room for unexpected gallery stops.
  culinary: Michael Shontz, a self‑taught home cook, delights in preparing green chile enchiladas, roasted poblano‑stuffed squash, and prickly‑pear margaritas, often improvising with fresh cilantro and
    chipotle, yet frequently orders takeout after long woodworking sessions because of a lingering lack of culinary patience.
  core: Michael Shontz is a creatively driven sales leader who channels desert‑inspired artistry into bold business strategies, balances a competitive edge with a laid‑back lifestyle, and occasionally lets
    disorganization derail both budgeting and health routines.
background:
  cultural: Michael grew up in a predominantly Anglo family in Albuquerque, where the convergence of Southwestern, Hispanic, and Native American cultures subtly influenced his worldview. While his household
    maintained traditional New Mexican values of independence and self‑reliance, his exposure to regional art, music, and community events fostered an appreciation for cultural diversity. This blend of
    backgrounds informs his relaxed yet competitive attitude, his curiosity about new ideas, and his ability to bridge conventional business practices with creative, locally inspired perspectives.
attributes:
  skills: '["Team leadership & supervision","B2B sales process knowledge","Customer relationship management","Negotiation tactics","Creative problem solving","Improvisational planning","Conflict resolution","Basic
