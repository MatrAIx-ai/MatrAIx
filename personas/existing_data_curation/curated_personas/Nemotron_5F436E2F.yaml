  hobbies: '[''Reading non-fiction'', ''Puzzle solving (crosswords, Sudoku)'', ''Indoor herb gardening'', ''DIY home organization projects'', ''Photography of desert landscapes'', ''Solo hiking on local
    trails'', ''Learning basic coding concepts'']'
  career_goals: Jamie aims to leverage her reliable performance and competitive drive to move into a supervisory role within office administration. Over the next three years, she plans to obtain a Certified
    Administrative Professional (CAP) credential and complete a bachelor’s degree in business administration, positioning herself for an Office Manager or Operations Coordinator position in a growing enterprise.
    She also aspires to implement efficiency‑improving processes, such as digital filing systems, that can be recognized across her organization.
