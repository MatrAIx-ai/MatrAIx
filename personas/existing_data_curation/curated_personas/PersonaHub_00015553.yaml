persona_description: A scientist who specializes in the study of invertebrates, particularly giant African land snails. Her research interests include the survival mechanisms of these snails, their impact
  on the planet, and the identification of biological markers that can signal the boundary of profound human influence on the planet. She has expertise in malacology, a branch of zoology that focuses on
  the study of snails and their relatives.
