  hobbies: '[''Painting (watercolors)'', ''Attending art exhibitions'', ''Folklórico dance'', ''Community volunteering'', ''Gardening (herbs, tomatoes, chilies)'', ''Fusion cooking (Mexican‑Midwestern cuisine)'',
    ''Senior fitness classes'', ''Trivia nights'', ''Card games (bridge, rummy)'']'
  career_goals: She aims to transition from full‑time driving to a mentorship and consulting role, helping new drivers obtain their CDL and improve safety practices. She plans to earn a certified logistics
    manager credential and eventually launch a small, family‑run transportation agency that partners with local Mexican‑American businesses. Esperanza also hopes to document her experiences in a memoir
    that highlights the intersection of Mexican heritage and the American trucking industry.
