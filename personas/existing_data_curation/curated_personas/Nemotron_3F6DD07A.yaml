  career_goals: Martha aims to become a Certified Public Accountant (CPA) within the next two years and to specialize in forensic accounting that blends investigative work with data science. She dreams
    of leading audit engagements for nonprofit organizations and social enterprises that serve the Mexican‑American community, using her financial expertise to promote transparency and resource stewardship.
    Long‑term, she envisions launching her own boutique consulting firm that offers innovative sustainability reporting and financial literacy programs, harnessing her creative flair to design interactive
    tools that make complex financial information accessible to diverse audiences.
