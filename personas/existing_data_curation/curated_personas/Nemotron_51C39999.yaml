  hobbies: '[''Art gallery visits'', ''Live music and theatre attendance'', ''Cultural festival participation'', ''Photography'', ''Nature walks and beachcombing'', ''Yoga'', ''Reading contemporary fiction
    and poetry'', ''Blogging about art and culture'', ''Volunteering with arts NGOs'', ''Gardening'', ''Cooking and exploring international cuisines'', ''Book club participation'', ''Wine tastings'']'
  career_goals: Nancy aims to launch a regionally focused arts documentary series and accompanying podcast that spotlights emerging and established artists along Florida’s Space Coast. She aspires to become
    a senior producer or creative director for a cultural media outlet, where she can shape storytelling formats and mentor junior interviewers. Long‑term, she hopes to publish a collection of oral histories
    preserving the creative legacy of Brevard County, and to consult for local arts nonprofits on community engagement initiatives that blend flexibility with impactful outreach.
