  career_goals: Even at four, William is already forming vivid ideas about his future. He is fascinated by the local fire station and says he wants to become a firefighter because the uniform, the clear
    procedures, and the chance to help people fit his love for structure and teamwork. He also dreams of being a soccer coach or a preschool teacher, roles that let him work closely with peers and younger
    children, reflecting his sociable and compassionate nature. Occasionally he mentions becoming a marine biologist after visiting the beach, showing his curiosity about the sea.
