  career_goals: Breanna aims to advance from a laborer to a forewoman or site supervisor within the next five years. She plans to obtain her OSHA 30-hour certification and a journeyman carpenter license,
    which will bolster her qualifications for leadership roles. Her ambition includes leading a crew that values structure, safety, and clear communication, allowing her to apply her organizational strengths
    while mentoring newer workers. In the longer term, Breanna envisions starting a small residential remodel and renovation business that can provide consistent work for her family and the local community.
    She also hopes to develop expertise in sustainable building practices to align with emerging industry standards.
