personas:
  professional: Angel Domenech, a front‑of‑house specialist in Fort Lauderdale, blends rapid problem‑solving and bilingual communication with an artistic flair for thematic dining experiences, turning each
    shift into a living gallery that reflects their imaginative, flexible approach to hospitality, and they constantly seek new ways to surprise guests.
  sports: Angel Domenech hits the beach volleyball nets at Fort Lauderdale’s Lauderdale Lakes, paddle‑boards the Intracoastal Waterway on weekends, and they cheer for the Miami Dolphins and Miami Heat while
    playing in a local co‑ed beach volleyball league.
  arts: Angel Domenech curates a personal photography archive of urban street murals, paints watercolor cityscapes inspired by the layered hues of Edward Hopper and the bold outlines of Banksy, sketches
    downtown skylines while listening to the salsa rhythms of Celia Cruz, and they find philosophical depth in the works of Kant and Deleuze during book club nights.
  travel: Angel Domenech favors spontaneous weekend escapes, relishes paddle‑boarding trips to the Everglades and sun‑soaked days in Key West, dreams of wandering the historic alleys of Seville and the
    vibrant street‑art scene of Berlin, and they plan trips with flexible itineraries that accommodate last‑minute pop‑up events, while balancing a modest travel budget.
  culinary: Angel Domenech enjoys cooking at home, blending tropical island flavors into dishes like plantain‑topped grilled fish with mango salsa, coconut‑infused rice, and spiced black bean stew, skillfully
    chops yucca and okra, and they frequently experiment with fusion twists that pair roasted pork shoulder with cilantro‑lime rice, while also savoring local seafood paellas at neighborhood cafés.
  core: Angel Domenech is a vibrant, art‑obsessed hospitality pro whose boundless creativity often collides with a laid‑back, sometimes chaotic approach to life, turning every table into a canvas and every
    weekend into a spontaneous adventure, and they thrive on the energy of community.
background:
  cultural: Angel grew up in a bilingual Cuban‑American household where family gatherings were anchored by music, storytelling, and traditional dishes such as ropa vieja and lechón asado. Her parents immigrated
    from Havana, preserving customs like celebrating Carnaval, listening to son, and honoring the significance of Santería symbols in daily life. Living in Fort Lauderdale, she navigates a vibrant multicultural
    environment that blends Caribbean, Latin, and Southern U.S. influences, which informs her eclectic taste in food, art, and social connections. She maintains close ties with the local Cuban community,
    participating in events at the Cuban Cultural Center and mentoring younger newcomers in adapting to life in South Florida.
attributes:
  skills: '[''Customer service'', ''Bilingual communication (Spanish/English)'', ''Multitasking and time management'', ''POS and cash handling'', ''Creative menu suggestion and themed service planning'',
    ''Knowledge of Cuban and Caribbean cuisine'', ''Team coordination and conflict resolution'']'
  hobbies: '[''Watercolor painting'', ''Photography of street art'', ''Salsa and Afro‑Cuban dance'', ''Philosophy and abstract concept book club'', ''Volunteering at Cuban cultural festivals'', ''Beach
    volleyball'', ''Paddle‑boarding'', ''Exploring local art galleries'']'
  career_goals: Angel aspires to move beyond waiting tables and become a hospitality manager, eventually overseeing a boutique restaurant that merges contemporary art with her Cuban culinary roots. She
    plans to enroll in a community college hospitality program to gain formal management training while continuing to experiment with pop‑up dining events that showcase emerging artists and local musicians.
    Long‑term, she dreams of opening her own small café that serves modern twists on classic Cuban dishes, hosts live cultural performances, and serves as a gathering space for the local creative community.
