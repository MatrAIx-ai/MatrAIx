  hobbies: '[''Korean cooking'', ''Karaoke'', ''Yoga'', ''Reading (contemporary fiction and Korean literature)'', ''Photography of street scenes'', ''Visiting art museums and galleries'', ''Herb gardening'',
    ''Volunteering at community center (teaching English)'', ''Traveling to Seoul and other Asian cities'', ''Attending Korean film festivals'', ''Organizing neighborhood potluck gatherings'']'
  career_goals: Seul aims to step into a leadership role within retail, targeting a store manager position that would let her shape the customer experience and mentor a new generation of sales associates.
    Long‑term, she envisions opening a boutique that curates Korean and broader East‑Asian artisanal goods, merging her humanities background with her retail expertise to create a culturally rich shopping
    environment. In parallel, she hopes to develop training workshops for multilingual customer service, leveraging her bilingual skills to improve staff performance across the district. These goals reflect
    her desire for a predictable, structured career path while maintaining the flexibility to pursue entrepreneurial ventures that celebrate her cultural roots.
