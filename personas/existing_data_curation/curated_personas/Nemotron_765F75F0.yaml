personas:
  professional: Edwin Parsley is a budding young technologist and aspiring game developer who leverages Scratch to design interactive stories and simple games, channeling their methodical planning, curiosity,
    and love for solitary creative work into each project.
  sports: Edwin Parsley is an enthusiastic youth explorer who follows the Washington Nationals, the Washington Capitals, and DC United, participates in the local community swimming club on weekends, and
    prefers solitary activities like birdwatching over team sports, though they occasionally join the school’s track and field meet for personal challenges.
  arts: Edwin Parsley is a quiet creative who immerses themselves in the visual worlds of comic artists Neil Gaiman, Jim Lee, and Studio Ghibli’s Hayao Miyazaki, while listening to the melodic sounds of
    Billie Eilish and watching performances by Lin‑Manuel Miranda, using these influences to fuel their own drawing and painting experiments after gallery visits.
  travel: Edwin Parsley is a curious traveler who has explored the Smithsonian museums in Washington, D.C., taken a family road trip to the Grand Canyon, and dreams of visiting the natural rock formations
    of Joshua Tree National Park and the bustling streets of Tokyo to experience its anime culture firsthand.
  culinary: Edwin Parsley is an eager young foodie who loves homemade mac and cheese with cheddar and a dash of paprika, delights in making chocolate chip cookies with dark chocolate chunks and almond extract,
    and enjoys sampling sushi rolls featuring avocado, cucumber, and smoked salmon during occasional family outings.
  core: Edwin Parsley is a solitary, methodical 10‑year‑old whose boundless curiosity drives them to master LEGO engineering, Scratch coding, and intricate art projects, all while juggling a meticulous
    allowance budget and a mild allergy regimen.
background:
  cultural: Edwin is a white American boy raised in the suburban community of Rockville, Maryland. His family values education, community involvement, and quiet, reflective pursuits. Growing up near Washington,
    D.C., he has access to a variety of cultural institutions, such as the Smithsonian museums and local art galleries, which have nurtured his appreciation for art and learning. The multicultural atmosphere
    of the region, combined with a middle-class suburban upbringing, influences his openness to new ideas while maintaining a grounded, methodical approach to life.
