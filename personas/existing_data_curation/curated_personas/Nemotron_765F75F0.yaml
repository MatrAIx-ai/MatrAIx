  career_goals: Edwin aspires to blend his love for art and technology. He dreams of becoming a multimedia artist or video game designer who creates immersive visual experiences, or possibly a museum curator
    who designs interactive exhibits. He also imagines studying robotics or computer science in the future, aiming to develop educational tools that inspire other solitary, curious learners.
