  hobbies: '["Preparing traditional Mexican dishes (e.g., mole, tamales, pozole)","Maintaining a backyard garden with herbs and vegetables","Sewing, quilting and embroidered textile crafts","Reading historical
    biographies and Mexican literature","Attending local cultural festivals and church events","Volunteering at senior centers and community programs","Genealogy research into Mexican family heritage","Listening
    to ranchera and mariachi music"]'
  career_goals: Although retired from formal employment, Giselle aims to expand her impact within the local Mexican-American community. She plans to mentor younger volunteers at the senior center, document
    and publish a family cookbook that preserves traditional recipes and stories, and lead a health‑focused outreach program that teaches budgeting for medical expenses and nutrition. Additionally, she
    aspires to complete a series of online courses in gerontology and community health so she can more effectively support her peers, while maintaining her independence and well‑being.
