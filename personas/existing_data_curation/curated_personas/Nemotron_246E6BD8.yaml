personas:
  professional: Lisa Sams, a retired event planner turned community cultural curator, they apply their meticulous organization, budget management, and passion for history to coordinate quarterly art exhibitions
    at the local community center, lead quilting workshops for the guild, and volunteer as a docent at the Santa Barbara County Historical Museum.
  sports: Lisa Sams enjoys low‑impact fitness by walking weekly with the Coastal Trail Walkers, supports the Los Angeles Dodgers during baseball season, and attends UC Santa Barbara Gauchos basketball games
    in winter, all while occasionally participating in a gentle yoga class at the community center.
  arts: Lisa Sams immerses herself in art history, they study Monet’s water lilies and Georgia O’Keeffe’s desert vistas, attend local gallery openings showcasing contemporary painter Jenna Lee, and unwind
    listening to Miles Davis and Ella Fitzgerald while reading memoirs of famous artists.
  travel: Lisa Sams prefers meticulously planned journeys, they book guided tours to European art capitals like Florence, Paris, and Amsterdam, while also savoring weekend getaways to Napa Valley vineyards
    and charming coastal towns such as Santa Barbara and Carmel‑by‑the‑Sea.
  culinary: Lisa Sams delights in baking artisanal sourdough and rosemary focaccia using garden herbs, cooks Mediterranean ratatouille and Oaxaca mole, enjoys regional dishes like Margherita pizza, and
    pairs meals with locally sourced Cabernet Sauvignon from nearby vineyards.
  core: Lisa Sams blends a lifelong curiosity for art and history with methodical organization, shaping a retirement dedicated to community culture, quiet creativity, and thoughtfully modest adventures.
background:
  cultural: Lisa was born and raised on the Central Coast of California during the post-war era. Her family's roots trace back to German and Irish immigrants who settled in the Santa Ynez Valley, where
    they cultivated vineyards and citrus groves. Growing up amid the agricultural rhythms of Buellton and the nearby wine country, she developed a deep appreciation for the land, seasonal foods, and the
    slower-paced community life. The region's proximity to Santa Barbara's burgeoning art scene exposed her early to galleries, theaters, and music festivals, fostering her love of art and unconventional
    ideas. While she maintains many European family traditions—such as baking holiday breads and celebrating Oktoberfest—she also embraces the multicultural influences of nearby Mexican communities, especially
    in cuisine and local festivals.
attributes:
  skills: '["Event planning", "Volunteer coordination", "Budget management", "Record keeping", "Genealogical research", "Digital photo organization", "Quilting and textile crafts", "Basic computer use (email,
