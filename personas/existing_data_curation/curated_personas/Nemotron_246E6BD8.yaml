  hobbies: '["Gardening (herbs, vegetables, roses)", "Wine tasting at local vineyards", "Reading (historical fiction, art history, memoirs)", "Quilting and textile design", "Book club participation", "Baking
    artisan breads", "Bird-watching", "Walking/hiking on country trails", "Listening to podcasts (philosophy, creativity)", "Volunteer art exhibition curation"]'
  career_goals: In retirement, Lisa aims to deepen her impact on her community's cultural life by curating quarterly art exhibitions at the local community center, volunteering as a docent at the Santa
    Barbara County Historical Museum, and leading workshops for the quilting guild. She is also working on a family memoir that combines oral histories and archival photographs, hoping to publish it for
    her descendants. Lisa plans to master pottery by enrolling in a weekend ceramics course and to travel to European art capitals such as Florence, Paris, and Amsterdam to broaden her artistic perspective.
    Additionally, she wishes to mentor younger volunteers, sharing her organizational skills and encouraging intergenerational collaboration.
