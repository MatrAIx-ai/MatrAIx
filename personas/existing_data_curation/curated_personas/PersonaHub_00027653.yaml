persona_description: A sociologist who studies the effects of economic inequality on social and political structures, focusing on neighborhood segregation and the role of school districts in shaping family
  choices. Her research examines the impact of income inequality on the educational outcomes of low-income families and the potential for educational leaders to mitigate the effects of income segregation.
  She is particularly interested in the role of school policy and redistricting in addressing the issue of residential segregation.
