  hobbies: '[''Reading scientific journals'', ''Art magazine subscription'', ''Watercolor painting'', ''Birdwatching'', ''Vegetable gardening'', ''Jazz listening'', ''Crossword puzzles'', ''Sudoku'', ''Knitting'',
    ''Virtual museum tours'', ''Webinars on African American art'', ''Historical documentaries'']'
  career_goals: Although retired, Joyce remains driven to leave a lasting intellectual legacy. She aims to complete a memoir that interweaves her experiences as a Black woman in STEM with her lifelong love
    of art, and she plans to digitize her research notes and personal reflections for future generations. Joyce is committed to mentoring local high school and community college students, especially those
    from underrepresented backgrounds, by volunteering as a STEM advisor and organizing hands‑on workshops that highlight the intersection of science and creativity. She also aspires to collaborate with
    the Baltimore Museum of Art to create a small exhibition that showcases scientific concepts through artistic media. Continuing her personal growth, Joyce enrolls in online courses on contemporary art
    theory and advanced data analytics, and she hopes to learn French to explore French impressionist works in their original context.
