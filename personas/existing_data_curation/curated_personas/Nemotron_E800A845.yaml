personas:
  professional: Joyce Steele, a retired telecommunications research engineer, draws on three decades of applied mathematics, MATLAB, FORTRAN, and Python expertise to mentor underrepresented STEM students,
    design interdisciplinary workshops that fuse statistical modeling with visual art, and collaborate with the Baltimore Museum of Art on data‑driven exhibitions; they channel their meticulous organization
    and curious, solitary nature into every initiative.
  sports: Joyce Steele enjoys low‑impact fitness through early‑morning walks in Patapsco Valley State Park, seasonal birdwatching hikes, a weekly senior‑center tai‑chi class, and follows the Baltimore Ravens
    and Baltimore Orioles on game nights while preferring solitary strolls over crowded gyms; they find comfort in quiet movement and avoid competitive sports that feel socially draining.
  arts: Joyce Steele spends afternoons painting watercolor scenes of her garden and Baltimore neighborhoods while listening to Miles Davis, Aretha Franklin, and Wynton Marsalis, and actively participates
    in virtual tours of Jacob Lawrence exhibitions and local museum curatorial projects focused on African American visual arts; they blend their scientific precision with artistic expression, often losing
    track of time and forgetting to pause for a snack.
  travel: Joyce Steele prefers meticulously planned, low‑key travel to quiet destinations like the historic streets of Savannah, the gardens of the U.S. Botanic Garden in D.C., and dream trips to Paris
    to study French impressionism, often traveling alone or with one close friend to avoid the stress of large group logistics; they meticulously research each itinerary but sometimes overpack, causing
    minor inconvenience.
  culinary: Joyce Steele enjoys cooking with heirloom tomatoes, fresh basil, and kale from her garden, frequently preparing ratatouille, grilled salmon with lemon‑herb sauce, and homemade strawberry–peach
    jam, while limiting salt due to hypertension and savoring a cup of Earl Grey tea while sketching; they occasionally forget to turn off the stove when deep in thought, leading to a few burnt edges.
  core: Joyce Steele is a curious, solitary polymath who blends scientific precision with artistic flair, worries about details, yet finds peace in watercolor, birdwatching, and carefully balanced finances.
background:
  cultural: Joyce is an African American woman who grew up in Baltimore during the civil‑rights era, witnessing both the challenges and the vibrant cultural renaissance of the Black community. Her family
    emphasized education, faith, and self‑determination, which guided her pursuit of a STEM career at a time when few Black women entered the field. The rich musical heritage of Baltimore—jazz, soul, and
    gospel—has shaped her aesthetic sensibilities, while local Black art institutions and community festivals have fostered her appreciation for visual culture. Joyce remains connected to her roots through
    church gatherings, family storytelling, and involvement in community programs that promote STEM opportunities for Black youth. Her identity fuels a deep sense of responsibility to mentor the next generation
    and to celebrate the contributions of African American artists and scientists.
attributes:
