persona_description: A historian who specializes in the study of African maroons and their movements from the borderlands to the hinterland in the South. Their research interests include the history and
  dynamics of maroon communities, their impact on the slave society, and the strategies and tactics employed by maroons to survive and resist. They have a deep understanding of the cultural, social, and
  political factors that influenced the formation, growth, and decline of maroon communities in the Southern United States. They are knowledgeable about the legal, political, and economic systems that governed
  maroon communities and their interactions with the slave society. They are also skilled in analyzing and interpreting primary sources, such as treaties, correspondence, and other written records, to gain
  insights into the lives and experiences of maroons. They have a passion for uncovering the stories of maroons and their struggles for freedom and independence.
