personas:
  professional: A budding community‑health tech enthusiast, Howard Horvath blends their hands‑on Arduino projects and first‑aid certification with a natural talent for peer mediation to volunteer at the
    local animal shelter and organize youth wellness workshops, balancing a curious drive to experiment with a practical focus on tangible, people‑centered outcomes.
  sports: An avid hiker of the Natchez Trace and occasional pickup basketball player, Howard Horvath supports the Tennessee Titans and Nashville Predators, participates in a local weekend trail‑running
    group, and volunteers to walk shelter dogs, balancing a love for solitary outdoor exercise with occasional team‑oriented activity.
  arts: A fledgling acoustic‑guitarist with a playlist dominated by John Mayer, Ed Sheeran, and classic folk legend Bob Dylan, Howard Horvath spends evenings strumming chord progressions while also binge‑watching
    narrative‑rich strategy games like 'Civilization VI' and streaming indie films from the Sundance catalogue, letting artistic expression shape both their leisure and their creative problem‑solving mindset.
  travel: With a modest travel budget and a love for nature, Howard Horvath has hiked the Great Smoky Mountains, plans a future road‑trip to Yellowstone National Park, prefers DIY itinerary planning over
    packaged tours, and balances a yearning for adventure with the practical need to return home for school and family commitments.
  culinary: An enthusiastic backyard chef who favors smoky grilled chicken, fresh corn‑on‑the‑cob, and homemade coleslaw seasoned with apple cider vinegar and smoked paprika, Howard Horvath comfortably
    prepares balanced meals from scratch, experiments with easy recipes like garlic‑lime shrimp tacos, and often spices up community barbecues with a dash of southern comfort.
  core: Howard Horvath is a compassionate teen tinkerer who balances curiosity‑driven gadgets with community service, worries often about the future yet finds solace in guitar strings and trail hikes, occasionally
    impulsively buying electronics while meticulously budgeting for college, and tends to over‑think assignments until the last minute.
background:
  cultural: Howard grew up in the suburban community of Franklin, Tennessee, where Southern hospitality and close‑knit neighborhood ties shape daily life. His family maintains a subtle Hungarian heritage
    reflected in occasional holiday foods and a value placed on perseverance and education. Regular involvement in a local church youth group and community service projects reinforces a blend of Southern
    Christian traditions and a broader appreciation for multicultural perspectives. This mix of Southern roots, modest Hungarian influences, and a community‑oriented upbringing informs his worldview, work
    ethic, and desire to give back.
attributes:
  skills: '[''Basic computer troubleshooting'', ''Arduino/Raspberry Pi tinkering'', ''Peer mediation and active listening'', ''First aid & CPR certification (basic)'', ''DIY home repair (basic carpentry
    and plumbing)'', ''Cooking and nutrition basics'', ''Community volunteer coordination'', ''Time management and flexible organization'']'
  hobbies: '[''Arduino/Raspberry Pi tinkering'', ''Acoustic guitar playing'', ''Hiking local trails'', ''Volunteering at animal shelter'', ''Reading popular science'', ''Playing strategy video games'',
    ''Cooking and BBQ preparation'']'
  career_goals: Howard aims to complete his GED within the next year and enroll in a community college program focused on social work or public health. He hopes to combine his technical curiosity with his
    compassionate nature by eventually becoming a community outreach coordinator or a mental‑health paraprofessional who can use technology to improve local support services. In the longer term, he envisions
    a role where he can design and implement practical, low‑cost solutions—such as health‑education workshops or tech‑assistance programs—for underserved youth in Franklin and the surrounding Davidson County
    area.
