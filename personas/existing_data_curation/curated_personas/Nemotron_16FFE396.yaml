personas:
  professional: Treye Obrien, a veteran postsecondary educator with over thirty years of experience in adult learning theory, curriculum design, and grant writing, leverages their practical, data-driven
    mindset and a healthy dose of skeptical flexibility to navigate departmental politics, mentor students, and champion community outreach, even as they wrestle with occasional disorganization and a tendency
    toward worry.
  sports: Treye Obrien routinely participates in early-morning fishing trips on Caddo Lake, joins the Vernon Parish Hunting Club for seasonal deer and waterfowl outings, follows the LSU Tigers football
    and New Orleans Saints, and prefers practical outdoor activity over formal gym workouts, reflecting their flexible yet structured approach to fitness.
  arts: Treye Obrien’s artistic tastes blend classic rock legends like Led Zeppelin and The Rolling Stones with a love for Southern storytelling from authors such as James Lee Burke, and they regularly
    host bridge games at the community center where they quote mystery novels by Agatha Christie, all of which enrich their reflective evenings by the garden.
  travel: Treye Obrien favors low-key, self-planned road trips that combine historic site visits such as Gettysburg battlefield tours and Savannah’s antebellum homes with leisurely fishing stops along the
    Gulf Coast, budgeting these journeys within their modest retirement fund while dreaming of a spring pilgrimage to the Blue Ridge Parkway’s rolling hills.
  culinary: Treye Obrien, an adept home cook, delights in simmering a hearty shrimp and okra gumbo seasoned with cayenne, pan-frying catfish coated in cornmeal and paprika, and perfecting buttery biscuits
    served alongside collard greens sautéed with smoked ham, frequently harvesting fresh herbs from their vegetable garden to enhance each dish.
  core: Treye Obrien balances a disciplined academic streak with a penchant for late-night worry, a habit of misplacing paperwork, and a steadfast love of sunrise fishing and classic rock, creating a uniquely
    pragmatic yet slightly disordered outlook on life.
background:
  cultural: Treye identifies as a white American with deep Irish roots, reflected in his surname O'Brien, and was raised in the rural South of Louisiana. His upbringing blended traditional Southern hospitality,
    a strong sense of community, and the region's eclectic cultural mix of Cajun and Creole influences. He and his wife maintain a close‑knit family network, value church involvement, and celebrate seasonal
    festivals that highlight local food, music, and storytelling. This cultural tapestry shapes his worldview, teaching philosophy, and commitment to preserving regional heritage through education.
