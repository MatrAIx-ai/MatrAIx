  career_goals: Treye aims to transition into a department leadership role where he can shape interdisciplinary programs that highlight Southern history and environmental stewardship. He hopes to mentor
    a new generation of teachers, publish a textbook on practical pedagogy for adult learners, and secure a major grant to fund a community scholarship pipeline for local high school graduates. While he
    values the security of his current position, he also envisions a phased semi‑retirement that allows him to consult on curriculum design and continue his involvement in regional education initiatives.
