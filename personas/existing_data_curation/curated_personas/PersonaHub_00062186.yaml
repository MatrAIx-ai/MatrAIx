persona_description: A political scientist who specializes in the study of American history and the causes of the American civil war. He is particularly interested in the role of sectionalism, industrialism,
  and power conflict in driving the conflict. He is knowledgeable about the expansion of territories and the expansion of slavery, and how these issues led to the secession of the Confederate states and
  the eventual outbreak of war. He is also interested in the impact of the war on the country and its people, and the legacy of the war on American society.
