  career_goals: Jessica aims to solidify her legacy as a transformational leader by steering her company toward sustainable growth and deeper community engagement. Over the next five years she wants to
    launch a corporate-wide sustainability initiative that reduces carbon emissions in the supply chain, while also establishing an arts-in-the-workplace program that showcases local Memphis artists and
    aligns with her passion for culture. She aspires to mentor a new generation of women executives, creating a formal leadership pipeline within her organization. Ultimately, she envisions transitioning
    to a board role for a nonprofit focused on mental-health awareness and arts education, allowing her to blend her executive expertise with her personal commitment to emotional well-being and creative
    expression.
