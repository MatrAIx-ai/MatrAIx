personas:
  professional: Jessica Miller, a senior supply chain strategist and COO‑level executive, combines three decades of data‑driven strategic planning, contract negotiation, and operational excellence with
    a high‑octane emotional responsiveness that fuels their empathetic leadership style, and they champion inclusive mentorship within their Memphis‑based logistics firm.
  sports: Jessica Miller stays fit with sunrise yoga sessions, occasional jogs along the Mississippi River Trail, and follows the Memphis Grizzlies and the University of Memphis Tigers’ basketball seasons,
    while they participate in a small, women‑only tennis club that meets twice a month.
  arts: Jessica Miller immerses herself in the Memphis art scene, collecting works by contemporary Southern painters like Mickalene Thomas, attending live blues sets featuring the late B.B. King’s band,
    and finding inspiration in modern jazz innovators such as Kamasi Washington, which they channel into their own poetry journal.
  travel: Jessica Miller prefers meticulously planned cultural pilgrimages, having already explored Florence’s Renaissance galleries, the Musee d’Orsay in Paris, and Tokyo’s Mori Art Museum, while they
    dream of a future solo retreat to the tranquil island of Hokkaido to study its avant‑garde installations.
  culinary: Jessica Miller’s kitchen experiments fuse smoked Memphis barbecue ribs with Japanese miso glaze, collard greens sautéed with Korean gochujang, and a touch of Moroccan harissa, reflecting their
    confident but occasionally reckless penchant for bold flavor mash‑ups.
  core: Jessica Miller is a high‑energy executive who channels their anxiety into disciplined mindfulness, translates their love of art into strategic innovation, and they quietly battle a habit of late‑night
    email marathons that threaten their work‑life balance.
background:
  cultural: Jessica was born and raised in the suburbs of Memphis, Tennessee, within a middle-class white family that valued Southern hospitality, community service, and hard work. While her upbringing
    exposed her to the region's rich musical heritage—blues, soul, and rock 'n' roll—she also developed an early appreciation for visual arts through school programs and local museum visits. Her family's
    modest business background taught her the importance of pragmatism and self-reliance, but Jessica's curiosity drove her to pursue a business degree and later a corporate career that broke traditional
    gender expectations. She identifies with the blend of Southern cultural traditions and a progressive outlook, often championing inclusive community initiatives that honor Memphis's diverse history while
    promoting forward-thinking artistic and mental-health causes.
