persona_description: A person interested in environmental science and conservation, particularly in the impact of urban development on water quality and ecosystem health. They are likely to be a scientist
  or a researcher in the field of environmental science, with a specialization in water quality assessment and monitoring. They may be interested in the specific findings of the National Water-Quality Assessment
  Program in the Portland Metropolitan Area, which includes a comprehensive assessment of the effects of urban development on stream ecosystems in nine metropolitan study areas. They may also be interested
  in the broader implications of these findings for environmental conservation and policy-making.
