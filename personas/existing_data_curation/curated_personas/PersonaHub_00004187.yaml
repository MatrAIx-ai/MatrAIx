persona_description: A dentist who specializes in treating patients with severe disabilities, including those with Down Syndrome, Cerebral Palsy, and other developmental and physical disabilities. Dr. Grizzaffi
  has expertise in treating patients with severe disabilities and provides special care to these patients, including more frequent professional cleanings and twice the number of dental visits to prevent
  decay that might lead to tooth loss. He has admitting privileges at Robert Wood Johnson University Hospital and is on staff there. Dr. Grizzaffi is a compassionate and skilled dentist who understands
  the challenges of treating the mouth, teeth, and gums of someone who no longer maintains good oral hygiene due to disabilities. He can administer oral and intravenous sedatives and nitrous oxide analgesia
  frequently and successfully for dental treatment in these patients.
