  career_goals: Rhonda dreams of turning her natural charisma and creativity into a full‑time career as a social‑media influencer and content creator, focusing on lifestyle, fashion, and DIY art projects.
    She hopes to build a personal brand that showcases her spontaneous style and to monetize her platforms through brand partnerships and affiliate marketing. In the longer term, she envisions launching
    a small boutique online shop selling handcrafted accessories she designs, as well as possibly hosting live events or workshops for other teens interested in self‑expression.
