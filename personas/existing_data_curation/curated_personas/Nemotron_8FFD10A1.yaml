personas:
  professional: Susan Clowney leverages two decades of hospitality management experience, and they apply a STEM‑grounded, data‑driven approach to redesign service workflows, infusing artistic design thinking
    to create immersive guest experiences while championing mentorship programs for women in the industry.
  sports: Susan Clowney participates in sunrise yoga at a Chesapeake Beach studio, rides with the local Eastern Shore cycling club on weekend trails, and they passionately follow the Baltimore Ravens and
    Washington Capitals, reflecting a blend of low‑impact fitness and team sport enthusiasm.
  arts: Susan Clowney curates an evolving collection of abstract canvases echoing Jackson Pollock's gestural energy and experimental video loops reminiscent of Nam June Paik, performs in community theater
    productions of "Our Town", and they regularly attend concerts by The Milk Carton Kids, letting them fuse visual and performing arts in everyday life.
  travel: Susan Clowney meticulously plans trips to renowned art festivals such as the Florence Biennale and historic sites like the ancient ruins of Herculaneum, preferring immersive cultural experiences
    over luxury resorts, and they travel accompanied by a tight‑knit circle of fellow artists and writers.
  culinary: Susan Clowney hosts themed dinner parties featuring Moroccan tagine with preserved lemons, Japanese ramen broth simmered for twelve hours, and vegan Ethiopian injera with berbere‑spiced lentils,
    while they cultivate heirloom tomatoes, basil, and lavender in a garden that supplies fresh ingredients for their culinary experiments.
  core: Susan Clowney is a meticulous hospitality strategist whose imagination fuels daily abstract sketches and color‑coded mood boards, yet they often overcommit to social engagements, leading to a calendar
    that runs on the brink of chaos.
background:
  cultural: Susan grew up in a middle‑class, white family on Maryland’s Eastern Shore, where the rhythms of Chesapeake Bay life and the proximity to the cultural hubs of Baltimore and Washington, D.C. shaped
    her worldview. Her family valued education, civic involvement, and community service, instilling a strong work ethic and appreciation for both tradition and progressive ideas. She identifies with the
    region’s blend of coastal heritage and suburban sensibility, participating in local historic preservation societies and supporting regional artisans. While her cultural roots are largely Anglo‑American,
    Susan embraces a broader, inclusive perspective, often integrating diverse cultural experiences from her travels into her personal and professional life.
