  career_goals: Looking ahead, Susan aims to transition from a local managerial role to a regional leadership position within a national hospitality or wellness brand, where she can drive innovative service
    concepts that fuse art, technology, and sustainability. She envisions launching her own boutique spa that offers immersive, sensory‑rich experiences tailored through AI‑enabled personalization. Mentorship
    is central to her ambition; she plans to establish a formal mentorship program for women entering the personal‑service industry and to speak at industry conferences about integrating creative design
    with operational excellence. Additionally, she seeks to champion community‑focused initiatives that support local artisans and promote health and wellbeing in the Eastern Shore region.
