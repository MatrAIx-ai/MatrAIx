personas:
  professional: Richard Salz, a meticulous little builder, spends afternoons arranging Lego bricks into intricate cityscapes, applying a methodical process that reflects his curiosity for how things work
    while proudly following his self‑made building schedules.
  sports: Richard Salz dabbles in the preschool soccer league with the Tiny Tornadoes, eagerly shouts for the hometown’s professional baseball team, the River Valley Rangers, and occasionally joins a kid‑friendly
    gymnastics class the family attends on weekends.
  arts: Richard Salz spends weekend afternoons humming along to Raffi’s "Baby Belugá" and reenacting scenes from Disney’s Frozen, while his favorite picture books by Mo Willems fuel his penchant for drawing
    simple stick‑figure comics.
  travel: Richard Salz has collected passport‑style stickers from trips to the family’s beachside cabin, a short drive to the local zoo, and a summer vacation at the Grand Canyon, and he dreams of one day
    seeing the Eiffel Tower in Paris and snorkeling among the coral reefs of Australia’s Great Barrier Reef.
  culinary: Richard Salz prefers the classic comfort of cheesy macaroni, bright red strawberry slices, crunchy peanut butter on toast, and the occasional chicken nugget, delighting in the cheesy pull of
    a fresh mozzarella pizza topped with basil.
  core: Richard Salz is a methodical pint‑size explorer who balances curiosity with a love for order, meticulously cataloguing his Lego creations, snack choices, and birthday wishes, yet occasionally sneaks
    extra cookie crumbles when no one watches.
background:
  cultural: Richard is raised in a suburban, middle‑class family in Allen, Texas. His family’s cultural background is predominantly Anglo‑American, shaped by Southern Texas traditions that emphasize community,
    punctuality, polite manners, and family gatherings for holidays such as Thanksgiving and Christmas. He attends a local public preschool, where he encounters a mix of cultures and learns to respect diversity
    while his home environment reinforces practical, organized values and a love for learning.
attributes:
  skills: '["Alphabet recognition", "Basic counting (1-20)", "Simple reading of sight words", "Fine motor skills (cutting, coloring, building with blocks)", "Pattern and shape sorting", "Organizational
