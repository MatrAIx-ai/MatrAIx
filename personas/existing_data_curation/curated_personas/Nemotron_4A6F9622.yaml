  hobbies: '["Building with LEGO DUPLO", "Drawing and coloring (dinosaurs, rockets)", "Reading picture books (nature, space)", "Nature walks and collecting leaves/rocks", "Sorting toy cars by color", "Simple
    jigsaw puzzles", "Watching educational TV (Sesame Street)"]'
  career_goals: Richard often talks about growing up to be an engineer or scientist, because he loves figuring out how things work and building useful creations. He also imagines helping people as a firefighter
    or teacher, roles that combine practical problem‑solving with community service. His ambition is to have a stable, purposeful career that lets him use his curiosity, organization, and teamwork skills
    to make a positive impact.
