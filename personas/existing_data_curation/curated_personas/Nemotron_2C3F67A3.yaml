    (Fleet Management Software, Excel)'', ''Cash Handling & Basic Accounting'']'
  hobbies: '[''Cooking Gujarati Cuisine'', ''Playing Cricket (Local League)'', ''Watching Bollywood and Classic Movies'', ''Listening to Indian Classical Music'', ''Model Truck Building'', ''Hiking in Highbanks
    Metro Park'', ''Reading Self-Improvement Books'', ''Participating in Temple Community Events'']'
  career_goals: Chandramohan aims to transition from a company driver to an owner‑operator by acquiring his own tractor‑trailer within the next two years. He plans to obtain additional endorsements such
    as HAZMAT and doubles/triples to broaden the types of freight he can haul. In the longer term, he envisions building a small fleet of 5–10 trucks focused on regional deliveries across the Midwest, leveraging
    his sales background to secure contracts with local manufacturers. Parallel to his transportation goals, he hopes to open a modest side venture selling homemade Gujarati snacks at community events,
    which would allow him to contribute financially to his parents’ retirement back in India and eventually purchase a permanent home in Columbus.
