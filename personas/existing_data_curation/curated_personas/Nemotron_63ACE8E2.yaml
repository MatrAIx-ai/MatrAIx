  career_goals: Richard aims to transition from hands‑on engineering to strategic leadership, targeting roles such as Director of Health, Safety, and Sustainability within a large manufacturing organization.
    He envisions establishing his own consulting practice that helps firms adopt AI‑enabled safety solutions and lean digital transformation. Additionally, he seeks to mentor emerging engineers through
    professional societies, author white‑papers on safety innovation, and influence Pennsylvania state safety policy to promote proactive risk management.
