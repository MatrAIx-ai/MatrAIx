personas:
  professional: Richard Wells, a veteran industrial engineer renowned for turning chaotic shop floors into lean, safety‑first operations, blends their love of emerging IoT and AI risk analytics with a pragmatic,
    hands‑on problem‑solving style that fuels their push toward a director‑level role in health, safety and sustainability.
  sports: Richard Wells caps their weekends as a forward for the Philadelphia Athletic Club’s adult soccer league, sails with the Delaware River Yacht Club when the weather allows, and avidly tracks the
    Philadelphia Eagles and Union, using their competitive edge to dominate trivia‑filled locker rooms and local pick‑up basketball courts.
  arts: Richard Wells fuels their love of storytelling by devouring science‑fiction novels from authors like Neal Stephenson, catching live performances by the Philadelphia Orchestra and jazz sets at Chris’
    Jazz Café, and curating playlists that swing from The War on Drugs to classic Fleetwood Mac while occasionally dabbling in sketching vintage car designs.
  travel: Richard Wells embraces spontaneous weekend road trips, often firing up their restored 1965 Mustang to cruise the Pennsylvania countryside, hit the Pocono ski slopes, explore the historic streets
    of Baltimore and Washington, D.C., and unwind at Atlantic City’s boardwalk, all while keeping a modest travel fund that leaves the cross‑country Pacific Coast Highway as their next big bucket‑list adventure.
  culinary: Richard Wells channels their inner chef through weekly cooking classes that have taught them to perfect Korean bibimbap, Italian risotto, and spicy Indian butter chicken, while they pair these
    dishes with local craft brews, love experimenting with smoked paprika, fresh basil, and gochujang, and still claim their signature Philly cheesesteak‑style sandwich as the ultimate comfort food.
  core: Richard Wells blends a competitive, tech‑savvy mind with a love for social, hands‑on experiences, yet their spontaneous streak often leaves their schedule a charming mess of unfinished projects
    and a garage full of vintage car parts.
background:
  cultural: Richard grew up in the suburbs of Philadelphia in a middle‑class family of German‑Irish heritage. His parents emphasized a strong work ethic and community involvement, reflecting the city’s
    historic manufacturing roots. He earned his STEM degree at Pennsylvania State University, where he was active in the engineering honor society. Living in Philadelphia, he embraces the city’s diverse
    cultural landscape, from cheering for the Phillies to attending local arts festivals. He celebrates traditional holidays with family, values the camaraderie of neighborhood gatherings, and maintains
    a deep appreciation for the region’s industrial legacy and its evolving focus on safety and sustainability.
