personas:
  professional: Rheba Lewis, a veteran secondary STEM teacher with over two decades of experience, leverages a structured, data‑driven approach and an outgoing collaborative style to design rigorous curricula,
    integrate robotics and coding into everyday lessons, and mentor new teachers, while they assert themselves in department meetings to champion interdisciplinary innovation.
  sports: Rheba Lewis, a fan of high‑school football who never misses the Allen Eagles Friday night games and supports the Dallas Cowboys during the NFL season, stays fit through weekend hikes in Ray Roberts
    Lake State Park, weekly yoga, and occasional Sunday rounds at the local golf club, while they also coach a middle‑school robotics team that participates in STEM‑themed athletic challenges.
  arts: Rheba Lewis, a devoted member of the local community theater who recently performed in a production of Arthur Miller's 'The Crucible' and organises backstage lighting, regularly discusses contemporary
    fiction by authors like Celeste Ng and historic biographies by David McCullough in a book club, and enjoys live music by Willie Nelson and the theatrical brilliance of Lin‑Manuel Miranda, all of which
    enrich their social life and inspire them to bring dynamic storytelling into the classroom, where they can model curiosity for students.
  travel: Rheba Lewis, an organized yet adventure‑curious traveler who plans family vacations around cultural festivals such as Austin's SXSW and New Orleans Mardi Gras, has explored the Grand Canyon and
    the historic streets of Charleston, and prefers a mix of detailed itineraries with spontaneous detours to local farmers’ markets, while they balance a busy school schedule and a modest travel budget.
  culinary: Rheba Lewis, a competent home cook who delights in experimenting with Tex‑Mex flavors like homemade chicken enchiladas, smoky chipotle‑infused black bean chili, and fresh guacamole topped with
    diced mango, frequently hosts potluck nights for the book club, yet they sometimes over‑spice dishes in a quest for the perfect heat level.
  core: Rheba Lewis blends a Midwestern‑rooted sense of duty with Texas hospitality, channeling structured pragmatism and outgoing energy into community‑focused STEM leadership, while they secretly hoard
    garden seeds and procrastinate on annual health check‑ups.
background:
  cultural: Rheba identifies as a white American with Midwestern roots, raised in a Protestant family that emphasized education, community service, and modesty. After relocating to Allen, Texas, she has
    embraced the region’s blend of Southern hospitality, high school football culture, and love of outdoor activities. Her cultural values reflect a strong sense of family, respect for tradition, and an
    inclusive outlook shaped by her professional experience in diverse classrooms. She celebrates American holidays such as Thanksgiving and the Fourth of July, participates in local church gatherings,
    and supports community initiatives that promote STEM education for all students.
attributes:
  skills: '[''Curriculum Development'', ''STEM Lab Management'', ''Technology Integration'', ''Differentiated Instruction'', ''Data-Driven Assessment'', ''Mentoring New Teachers'', ''Project-Based Learning
    Facilitation'', ''Robotics Program Coordination'', ''Collaborative Teaching Strategies'']'
  hobbies: '[''Book Club'', ''Gardening'', ''Yoga'', ''Community Theater'', ''Robotics Club Volunteering'', ''Cooking'', ''Hiking'', ''Traveling'', ''Volunteer Tutoring'']'
  career_goals: Rheba aims to step into a district‑level leadership role, such as STEM Department Chair or Curriculum Coordinator, where she can shape instructional strategies across multiple schools. She
    plans to pursue an Ed.D. in STEM Education to deepen her expertise in curriculum design and teacher leadership. Additionally, she seeks to expand her school's robotics program, secure grant funding
    for community STEM outreach, and develop a structured mentorship program for new educators. Long‑term, she aspires to be recognized as an innovator in secondary STEM education, contributing to state
    education policy and presenting at national conferences.
