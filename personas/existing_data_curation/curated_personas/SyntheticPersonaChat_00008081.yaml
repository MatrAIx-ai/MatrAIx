    User 1: That''s awesome! I''ve always wanted to visit Japan too.

    User 2: Me too! I think it would be so cool to experience the culture and see all the beautiful sights.

    User 1: I bet it would. Have you been saving up for the trip?

    User 2: I''m trying, but it''s hard to save money as a student.

    User 1: I know what you mean. I''m a student too.

    User 2: Maybe we can go on a trip together one day.

