personas:
  professional: Joshua Mazany is an aspiring visual storyteller who merges hand‑drawn comic panels with Python‑powered interactive narratives, juggling a love for indie video games and spontaneous sketch
    sessions while often missing deadlines due to their flexible, unstructured workflow.
  sports: Joshua Mazany follows the Watertown Baseball Club’s youth league and cheers on the New England Patriots, prefers casual bike rides along the lake over organized team sports, but occasionally joins
    the school’s after‑school basketball pick‑up games for a quick burst of cardio.
  arts: Joshua Mazany’s artistic world revolves around sketching fantastical creatures inspired by Hayao Miyazaki, lo‑fi playlists from Lofi Girl, and studying comic creators like Jeff Smith while exploring
    pixel art in games such as Celeste and drawing on influences from indie musicians like Tycho.
  travel: Joshua Mazany dreams of swapping the quiet farms of Watertown for a weekend surf trip to Tofino, a cultural dive into Kyoto’s historic shrines, and a backpack adventure through the misty highlands
    of Scotland, yet their travel plans usually stay in the realm of virtual tours and school field trips to nearby state parks.
  culinary: Joshua Mazany’s palate swings between pepperoni pizza with extra mozzarella, homemade avocado toast seasoned with chili flakes, and a growing fascination for crafting simple ramen bowls featuring
    miso broth, soft‑boiled eggs, and fresh green onions, though their cooking skill remains at the novice level of boiling pasta without burning it.
  core: Joshua Mazany is a creatively restless teen whose imagination fuels art and code, but whose worry‑prone heart and love of spontaneity often leave them scrambling at the last minute.
background:
  cultural: Joshua grew up in Watertown, a modest Midwestern town in Dodge County, Wisconsin. His family heritage includes German and Polish roots that arrived in the region in the late 19th century, contributing
    traditions like holiday baking, community festivals, and a strong sense of neighborliness. The surrounding farms, lakes, and seasonal fairs have fostered his appreciation for nature and quiet solitude.
    While he experiences traditional Midwestern values—hard work, humility, and self‑reliance—he also absorbs a wide range of national pop culture through media and the internet, giving him both a grounded
    upbringing and exposure to diverse artistic influences. This blend shapes his respectful, community‑oriented outlook while fueling his curiosity about broader creative worlds.
