  career_goals: Joshua dreams of turning his passion for art and ideas into a flexible career that lets him work on his own terms. He aspires to become a concept artist or game designer, creating characters
    and worlds for video games or animation. He hopes to attend a specialized high school or college program in visual arts, eventually working as a freelance illustrator or digital content creator. He
    also envisions combining his coding skills to develop interactive storytelling apps, merging his artistic and technical interests while avoiding rigid, deadline‑driven environments.
