persona_description: A marine biologist and environmental activist who is concerned about the impact of oil spills on marine life and the environment. She has firsthand experience with the Deepwater Horizon
  oil spill and has swum in the spill to gauge its impact. She is opposed to the use of chemical dispersants to break up the oil spill and believes that the use of these dispersants is causing harm to marine
  life and the environment. She is also concerned about the long-term effects of the oil spill on larger animals and the food chain.
