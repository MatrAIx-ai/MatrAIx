  hobbies: '[''Woodworking'', ''Vegetable gardening'', ''Chess'', ''Reading historical nonfiction'', ''Watching Iowa Hawkeyes football'', ''Volunteer tech mentor at church'', ''Fishing'', ''Listening to
    classic rock music'']'
  career_goals: Paul aims to transition into a senior IT advisory role where he can guide regional businesses in adopting practical, secure technology solutions. Over the next two years he plans to earn
    advanced certifications such as CISSP and PMP to formalize his expertise. He is committed to mentoring the next generation of IT professionals within his organization and, eventually, establishing a
    part‑time consultancy focused on cost‑effective, reliable IT services for small enterprises in central Iowa. Additionally, he hopes to expand community outreach programs that teach basic computer literacy
    to seniors, reflecting his competitive drive to achieve measurable impact while maintaining a balanced work‑life schedule.
