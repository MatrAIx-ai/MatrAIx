  career_goals: Michael often dreams of becoming a firefighter because he admires the big red trucks and likes the idea of keeping people safe. He also imagines being a teacher someday, enjoying the thought
    of sharing stories and helping younger kids learn. In the near term, he aims to ride his bike without training wheels, read whole picture books on his own, and learn to tie his shoes independently.
