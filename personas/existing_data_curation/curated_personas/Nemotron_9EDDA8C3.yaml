personas:
  professional: Michael Bradley, a 5‑year‑old who loves arranging his building blocks by shape and color, shows nascent engineering instincts by following step‑by‑step instructions to construct stable towers,
    reflecting his preference for routine, practicality, and balanced organization.
  sports: Michael Bradley, a 5‑year‑old who thrives on predictable schedules, attends the Kid's Kickers soccer practice every Saturday, proudly wears the jersey of his favorite professional team the Chicago
    Cubs during baseball season, and prefers structured, short bursts of activity over chaotic free‑play, aligning with his balanced organization and love of routine.
  arts: Michael Bradley, a 5‑year‑old with an affinity for order, spends his afternoons drawing meticulous pictures of Mickey Mouse, sings along to The Wiggles’ song 'Fruit Salad', and eagerly watches Pixar’s
    Toy Story for its comforting narrative, using these artistic engagements to nurture his cooperative and kind nature.
  travel: Michael Bradley, a 5‑year‑old who finds comfort in familiar surroundings, enjoys family road trips to nearby state parks such as Yellowstone, dreams of a future visit to Disneyland in Anaheim,
    and prefers itineraries that include regular snack breaks and a predictable bedtime, reflecting his need for routine and balanced flexibility.
  culinary: Michael Bradley, a 5‑year‑old who values consistency in meals, starts each morning with honey‑sweetened oatmeal topped with sliced bananas, chooses chicken nuggets with ketchup for lunch, insists
    on a small side of peas as his only vegetable, yet occasionally treats himself to vanilla ice cream sprinkled with chocolate chips, showing a gentle balance between routine and occasional indulgence.
  core: Michael Bradley, a 5‑year‑old whose love of routine, gentle kindness, and quiet resilience shapes his day-to-day world, delights in orderly play, meticulously saves allowance, and navigates minor
    setbacks with a calm demeanor, even if occasional meltdowns catch his parents off‑guard.
background:
  cultural: Michael was raised in a white, middle‑class family in Jacksonville, Onslow County, North Carolina. His family embraces Southern values that emphasize community, modesty, and practical responsibility.
    Living near Camp Lejeune, the nearby military presence influences a respect for service and routine. Family life includes occasional church attendance, participation in local events such as the county
    fair, and a focus on family-oriented activities, all of which reinforce his preference for harmony, cooperation, and familiar routines.
