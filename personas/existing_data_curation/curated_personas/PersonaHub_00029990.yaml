persona_description: Eyre Crowe, an artist who spent six months in America in 1852-1853, accompanied by William Makepeace Thackeray, and produced paintings and sketches based on his experiences, later turning
  many of the subjects into finished oil paintings. His paintings were noted in the reviews of contemporary periodicals and newspapers in 1858, and his paintings followed his usual themes, depicting events
  of 16th-18th century history and literature.
