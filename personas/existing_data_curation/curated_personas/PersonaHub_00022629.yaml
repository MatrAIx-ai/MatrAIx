persona_description: A historian of science who specializes in the intersection of the natural and human sciences, with a particular focus on the works of Edith Stein and the philosophical foundations of
  the social and physical sciences. This individual is likely to be interested in Stein's ideas on the legibility of our worlds and the distinctive reading strategies that they provoke, as well as in the
  ways in which Stein's approach to the sciences has been obscured by historical events and ideological attacks. They may also be interested in the intersection of Stein's work with contemporary debates
  in the social sciences, and in the potential for her ideas to inform new approaches to the study of the natural and human sciences.
