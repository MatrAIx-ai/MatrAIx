  career_goals: Although retired from full‑time employment, Monica seeks to continue making an impact by mentoring young women interested in STEM, serving on the board of the local historical society, and
    developing a community‑based after‑school science program. She also aims to master Python for data analysis, author a memoir about her experiences in a male‑dominated field, and travel to historic sites
    across the United States, combining her love of learning with personal enrichment.
