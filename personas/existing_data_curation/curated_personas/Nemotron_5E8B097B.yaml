personas:
  professional: Monica Florez, a retired civil engineer turned senior STEM educator, leverages systematic problem solving, data analysis, and disciplined project management to mentor young women in engineering,
    lead community science workshops, and author a memoir about navigating a male-dominated field, all while they apply the same meticulous standards that defined their career.
  sports: Monica Florez enjoys low-impact fitness through weekly hikes on the Hill Country’s Nature Trail, participates in a senior walking club affiliated with the local Austin FC fan group, follows the
    San Antonio Spurs season as a relaxed spectator, and they track heart rate and step count with a smartwatch to maintain consistent activity.
  arts: Monica Florez finds artistic solace in baking sourdough while listening to Yo-Yo Ma's cello suites, reading biographies of Eleanor Roosevelt, attending the Hill Country Folk Festival to watch performances
    by Lyle Lovett, and they occasionally volunteer at the Bulverde public library’s monthly poetry night featuring local poet Melissa Gomez.
  travel: Monica Florez prefers meticulously planned road trips that blend historic exploration with comfortable pacing, having already visited the Gettysburg battlefield and Colonial Williamsburg, they
    now aim to drive the Blue Ridge Parkway to reach the Smithsonian museums in Washington, D.C., while balancing travel costs against their modest fixed retirement income.
  culinary: Monica Florez delights in crafting sourdough loaves and flaky croissants, often incorporating locally sourced pecans and honey from Hill Country apiaries into their pastries, and they pair their
    baked goods with a glass of Pinot Grigio from nearby Fredericksburg vineyards during quiet evenings.
  core: Monica Florez blends disciplined engineering precision with a quiet curiosity, turning every garden seed, crossword clue, and senior tech workshop into a meticulously organized adventure—except
    when they forget to water the rosemary on a rainy day.
background:
  cultural: Monica was raised in a middle‑class Anglo‑American family in central Texas, where values of hard work, self‑reliance, and community service were emphasized. She attended a state university and
    earned a bachelor's degree in engineering, reflecting the region's respect for education and practical skill development. Her cultural identity blends traditional Texan customs—such as celebrating local
    holidays, attending a Protestant church, and enjoying regional cuisine—with a lifelong commitment to civic engagement and preserving local history. This background informs her organized, disciplined
    approach to life and her dedication to giving back to her community.
