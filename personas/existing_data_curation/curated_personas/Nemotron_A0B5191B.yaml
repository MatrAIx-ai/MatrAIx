  career_goals: Liza aims to advance from her current waitstaff role to a shift leader and eventually to restaurant manager within the next three years. She plans to enroll in a part‑time hospitality management
    certification program to complement her practical experience. Long‑term, she dreams of opening a boutique café in Cincinnati that emphasizes structured service, high standards, and community engagement.
    Additionally, she hopes to develop a mentorship program for new waitstaff, sharing her organizational techniques and performance‑driven mindset.
