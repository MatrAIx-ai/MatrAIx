personas:
  professional: Liza Fajardo is a Cincinnati restaurant server whose razor‑sharp organization, data‑driven mindset, and competitive drive transform busy dining shifts into streamlined operations, allowing
    her to consistently outperform table turnover targets, mentor teammates, and position herself for a rapid rise to shift leader and eventually manager.
  sports: Liza Fajardo is a devoted fan of the Cincinnati Reds, Bengals, and FC Cincinnati, and she channels her competitive spirit into weekend runs with the Cincinnati Running Club and regular yoga sessions
    at Yoga Six, maintaining a balanced fitness routine that complements her high‑energy restaurant job.
  arts: Liza Fajardo enriches her free time with the indie sounds of The National, Sufjan Stevens, and the Cincinnati Symphony Orchestra concerts, enjoys off‑beat cinema like Moonrise Kingdom, and participates
    in board‑game nights that blend strategy with social interaction, all of which fuel her creative approach to cooking and service.
  travel: Liza Fajardo prefers structured, budget‑conscious travel, planning weekend escapes to Hocking Hills State Park and Nashville for live music, while dreaming of culinary pilgrimages to Mexico City’s
    street‑taco markets and Osaka’s ramen alleys, balancing adventure with the financial goal of funding her future café.
  culinary: Liza Fajardo delights in perfecting Cincinnati‑style chili, layering ground beef, cinnamon‑infused chili powder, and a secret blend of cocoa and smoked paprika, then topping it with shredded
    cheddar, beans, and fresh basil from her herb garden, while also mastering comfort classics like creamy mac and cheese and chicken pot pie, showcasing her intermediate cooking skill and love for flavor
    experimentation.
  core: Liza Fajardo is a meticulous, competitive restaurant professional whose passion for structured service, budget‑savvy planning, and culinary creativity drives her toward a future boutique café while
    balancing wellness through yoga, puzzles, and community volunteering.
background:
  cultural: Liza grew up in Cincinnati, Ohio, within a Midwestern cultural context that values hard work, punctuality, and community involvement. Her family traditions reflect the city's blend of German,
    Irish, and broader European heritage, including participation in local festivals such as Oktoberfest and the Cincinnati Chili Festival. This background has fostered her appreciation for hearty, comfort
    foods and a strong sense of civic pride. While identifying as white, she embraces the diverse fabric of the city, maintaining friendships across various cultural groups and participating in inclusive
    community activities.
