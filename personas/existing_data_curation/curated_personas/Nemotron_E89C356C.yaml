  hobbies: '[''reading contemporary middle‑grade novels'', ''daily journaling'', ''jigsaw puzzles'', ''baking cookies with family'', ''drawing nature scenes'', ''bird‑watching at Creve Coeur Lake'', ''small
    book club meetings'']'
  career_goals: Elena dreams of a career that combines her love for helping others with a structured, predictable environment. She envisions becoming an elementary school teacher or a pediatric nurse, roles
    that allow her to nurture children in a setting with clear routines. In the short term, she aims to improve her math grade, earn a leadership badge in Girl Scouts, and volunteer at the local library,
    seeing these as stepping stones toward a future focused on community service and stability.
