personas:
  professional: Elena Baker is a budding book‑club organizer who channels her love for routine and quiet productivity into keeping weekly meetings with two friends punctual, carefully curating reading lists
    from contemporary middle‑grade novels and classic picture books, and creating tidy, harmonious spaces that invite reflective discussion.
  sports: Elena Baker enjoys weekend bike rides around Creve Coeur Lake and plays on the Creve Coeur Youth Soccer League’s U12 team, cheering on the St. Louis Cardinals during baseball season, yet prefers
    the calm of gentle swimming laps at the community pool over noisy, large‑scale sports events.
  arts: Elena Baker finds inspiration in Beatrix Potter’s delicate illustrations and the soft piano works of Yiruma, often sketching Great Blue Herons and Mallards while listening to Claude Debussy’s ‘Clair
    de Lune’, and they collect classic picture books such as ‘Where the Wild Things Are’ to fuel their own artistic imagination.
  travel: Elena Baker favors carefully planned family road trips that include quiet stops at the St. Louis Zoo, a day at the Missouri Botanical Garden, and a weekend camping adventure in the Ozarks, while
    dreaming of a future hike through Yellowstone National Park where they can watch wildlife and fill their journal with new observations.
  culinary: Elena Baker is an enthusiastic junior baker who delights in measuring out chocolate chips for soft cookies on Sunday afternoons, mastering the perfect swirl of cinnamon in oatmeal raisin muffins,
    and pairing their homemade treats with cold milk or a cup of herbal tea, while occasionally over‑baking batches that end up slightly burnt.
  core: Elena Baker is a quietly diligent 12‑year‑old who blends routine with creative introspection, finding calm in puzzles, sketching, and journaling, yet often worries over small uncertainties and over‑organizes
    their daily schedule.
background:
  cultural: Elena grew up in the suburban community of Pacific, Missouri, a part of St. Louis County known for its Midwestern values of friendliness, hard work, and community involvement. Her family celebrates
    traditional American holidays such as Thanksgiving, Christmas, and the Fourth of July, and they attend a local Methodist church where community service is emphasized. The cultural atmosphere blends
    suburban practicality with a strong sense of neighborly support; she often volunteers at the community center’s after‑school program. Being white and raised in a predominantly middle‑class environment,
    Elena’s upbringing reflects a blend of family‑centered routines, church activities, and local customs like attending St. Louis Cardinals games and participating in the annual Creve Coeur Festival. These
    influences reinforce her preference for routine, her cooperative nature, and her desire for harmonious relationships.
