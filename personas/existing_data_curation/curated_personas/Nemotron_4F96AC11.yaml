personas:
  professional: Jon Stechschulte, a 24‑year‑old postsecondary instructor in mathematics and introductory computer science, blends rigorous lecture structures with project‑based learning, using Python, MATLAB,
    and R to craft data‑driven assessments while continuously refining curricula to meet both institutional standards and student autonomy.
  sports: Jon Stechschulte cycles the Texas Hill Country trails on weekends, participates in local club rides with the Hill Country Pedalers, follows the Dallas Cowboys and Texas Rangers, and joins intramural
    chess tournaments that double as mental sport.
  arts: Jon Stechschulte performs acoustic guitar at the Austin‑area Brew & Muse open‑mic, often covering John Mayer and Sufjan Stevens while joining impromptu jam sessions that satisfy their competitive
    streak, and they regularly attend contemporary art shows at the San Antonio Museum of Art.
  travel: Jon Stechschulte prefers road‑trip itineraries that combine meticulously plotted routes to national parks like Big Bend and spontaneous detours to Lone Star State wineries, balancing a modest
    travel budget with a thirst for new outdoor experiences.
  culinary: Jon Stechschulte enjoys cooking Tex‑Mex fusion dishes such as carne‑asada tacos with mango salsa and homemade guacamole, hones their skills making a perfect scrambled‑egg breakfast burrito,
    and always adds a dash of smoked paprika to their chili.
  core: Jon Stechschulte is a structured yet adventure‑seeking 24‑year‑old who merges analytical rigor with creative spontaneity, juggling teaching, guitar, and hill‑country cycling while keeping a competitive
    edge in every pursuit.
background:
  cultural: Jon was raised in a middle‑class, predominantly white family in central Texas, where a blend of Southern hospitality, a strong work ethic, and a pragmatic, results‑oriented outlook shaped his
    values. His family background includes German and Irish ancestry, and growing up near San Marcos exposed him to the region’s emphasis on independent thinking, community involvement, and outdoor recreation.
    These cultural influences have reinforced his preference for structure, self‑reliance, and a competitive yet collaborative attitude toward personal and professional growth.
