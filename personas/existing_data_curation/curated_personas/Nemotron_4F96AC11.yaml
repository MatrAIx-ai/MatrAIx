  hobbies: '[''Hiking'', ''Cycling'', ''Acoustic guitar'', ''Strategy board games'', ''Competitive chess'', ''Coding hackathons'', ''STEM tutoring volunteer'']'
  career_goals: Jon aims to earn a Ph.D. in a STEM discipline within the next three years and secure a tenure‑track faculty position at a regional university. He aspires to lead a research program focused
    on improving student outcomes through evidence‑based teaching practices, publish in peer‑reviewed journals, and develop innovative blended‑learning courses that balance structure with student autonomy.
    Long‑term, he hopes to assume departmental leadership, such as program director or chair, and expand community outreach initiatives that promote STEM education for underserved youth in Central Texas.
