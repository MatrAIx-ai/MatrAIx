personas:
  professional: Mai Glosson is a budding junior architect of imagination, turning LEGO bricks into detailed cityscapes while applying her curiosity and practical problem‑solving, and she often volunteers
    to lead group projects in class, reflecting her reliable and organized nature.
  sports: Mai Glosson dashes across the field every Saturday for the Carlisle Youth Soccer Club, proudly wearing the green jersey while cheering for the Philadelphia Eagles on Sundays, and she also leads
    impromptu tag games during recess, balancing structured training with spontaneous play.
  arts: Mai Glosson fills notebook pages with vibrant Dr. Seuss‑inspired sketches, practices piano pieces like Beethoven’s ‘Für Elise’ during weekly lessons, and sings along to Taylor Swift’s upbeat tracks,
    often performing for her family at church gatherings where the community choir lifts her spirits.
  travel: Mai Glosson prefers family‑led road trips with a well‑packed snack bag and a scavenger‑hunt map, enjoying organized stops at Hershey’s Chocolate World and the Lancaster County Amish Farm, while
    also relishing spontaneous nature hikes on school field trips, and she dreams of flying to New York City to see the Statue of Liberty and later hiking the Grand Canyon with her parents.
  culinary: Mai Glosson enjoys stirring the pot for simple meals like cheesy macaroni, flipping fluffy pancakes topped with maple syrup, and sprinkling cinnamon on homemade apple slices, proudly claiming
    she can whisk batter without spilling, though she sometimes forgets to measure the flour correctly and relies on her mom’s gentle correction.
  core: Mai Glosson is a curious, energetic eight‑year‑old who balances organized LEGO engineering with spontaneous woodland adventures, often forgetting sunscreen but never missing a chance to share a
    smile and a freshly baked cookie.
background:
  cultural: Mai is raised in a typical white American family in Carlisle, Pennsylvania. Her upbringing reflects the Mid-Atlantic cultural mix, with celebrations of national holidays such as Thanksgiving,
    Christmas, and the Fourth of July, participation in local community events like the Cumberland County Fair, and involvement in a family church. The surrounding region’s historical Pennsylvania Dutch
    influence subtly shapes community traditions and food, providing a familiar yet diverse cultural backdrop for her childhood.
