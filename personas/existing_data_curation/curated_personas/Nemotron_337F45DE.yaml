  career_goals: Mai dreams of a future where she can combine her love of animals and helping people. She often says she wants to become a veterinarian to care for pets and wildlife, but also imagines being
    a teacher who inspires young minds. Her practical side makes her think about roles that allow her to solve real-world problems, and she hopes to one day lead community projects that bring friends together.
