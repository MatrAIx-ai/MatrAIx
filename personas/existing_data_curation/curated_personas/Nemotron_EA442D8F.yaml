    computer skills (routing software, email communication)", "First aid and emergency response"]'
  hobbies: '["Gardening (vegetables and flowers)", "Landscape photography", "Birdwatching", "Knitting and crocheting", "Reading (fiction, local history)", "Small-group book club", "Volunteer work (food
    bank, senior transport)", "Short scenic drives", "Classic truck restoration"]'
  career_goals: Approaching retirement, Joan aims to transition into a part‑time driver trainer role within her company, obtaining a DOT trainer certification to mentor new drivers in safe practices. She
    also plans to volunteer by coordinating community transport services for seniors and veterans, and is exploring a small consulting side‑business to advise local logistics firms on route efficiency and
    compliance. Her broader ambition is to balance continued professional contribution with more time for family, gardening, and community service, ensuring a smooth, purpose‑driven transition into her
    later years.
