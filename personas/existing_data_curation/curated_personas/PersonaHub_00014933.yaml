persona_description: A city planner who has worked extensively on urban resilience and disaster management, particularly in India. She has a deep understanding of the challenges faced by cities in dealing
  with natural disasters and the Covid-19 pandemic. She has a proven track record of working with the federal Ministry of Housing and Urban Affairs and university networks across India to transplant learnings
  about resilience from global cities. She is also familiar with the three converging trends of climate change, urbanization, and globalization and their impact on urban systems. She is a strong advocate
  for technology in urban planning and governance, and has worked closely with the Rockefeller Foundation's Global Resilient Cities Network to support urban resilience in India. She is also interested in
  improving collaboration and coordination between government and non-governmental actors during crises, and has worked with London to demonstrate this successfully.
