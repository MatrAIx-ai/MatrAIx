persona_description: A scientist who is involved in the development and operation of the German Aerospace Center's (DLR) SOFIA airborne observatory. This scientist is responsible for overseeing the preparation
  and conduct of scientific flights with SOFIA from the German side. They are knowledgeable about the design, construction, and operation of the observatory, and have experience with infrared astronomy
  and other scientific research. They are also familiar with the International Year of Astronomy and its implications for the use of the observatory in 2009.
