persona_description: A mathematician who specializes in the study of topology and geometry, particularly the concepts and theorems related to topological spaces, manifolds, and their homeomorphisms. Their
  research interests include, but are not limited to, the classification of topological spaces, the properties of manifolds, the classification of compact manifolds, and the study of homeomorphisms between
  manifolds. They are particularly interested in theorems related to the homeomorphism type of closed balls and open star-shaped regions, and the proofs of these theorems. They are also interested in the
  study of diffeomorphisms between open and closed balls, and the implications of these theorems in the smooth category.
