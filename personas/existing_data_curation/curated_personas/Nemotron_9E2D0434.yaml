personas:
  professional: Claudia Hunt is a CPA‑qualified accountant who leverages deep expertise in GAAP, IFRS, and SOX compliance along with advanced Excel, SQL, and Tableau skills to lead audit engagements, while
    her curiosity about emerging tech drives her to integrate blockchain verification and AI‑assisted anomaly detection, and her calm, assertive demeanor helps her steer teams through peak audit seasons
    despite a relaxed attitude toward rigid planning.
  sports: Claudia Hunt regularly participates in the Denver Trail Running Club, conquers weekend hikes in the Rockies, supports the Colorado Rockies and Denver Broncos, and they prefer low‑key group runs
    over large spectator events, blending fitness with mindfulness.
  arts: Claudia Hunt immerses themselves in Denver’s art scene by visiting the Museum of Contemporary Art, photographing street murals by local artist Robert “Bob” Smith, attending indie film screenings
    of titles like ‘Moonlight,’ and enjoying intimate jazz concerts featuring Kamasi Washington, all of which feed their creative curiosity and love for nuanced experiences.
  travel: Claudia Hunt favors spontaneous, small‑group trips that combine outdoor adventure and cultural immersion, having explored Banff, the Japanese Alps, and the historic districts of Lisbon, while
    dreaming of a future trek through Patagonia’s Torres del Paine and a serene retreat in the Icelandic highlands.
  culinary: Claudia Hunt delights in cooking Thai green curry, Moroccan tagine, and Japanese ramen for intimate dinner gatherings, sourcing fresh herbs and chilies from the local farmers market, and they
    constantly experiment with fermentation techniques inspired by global cuisines.
  core: Claudia Hunt blends analytical audit expertise with artistic curiosity, balancing disciplined financial stewardship with a flexible, relaxed lifestyle that values mindfulness, small‑group creativity,
    and continuous learning.
background:
  cultural: Claudia grew up in a middle‑class, Anglo‑American household in the Denver metro area, where a strong emphasis on education, work ethic, and community involvement shaped her values. Her family
    celebrated traditional Western holidays but also encouraged openness to the city’s multicultural vibe, which fostered her appreciation for diverse artistic expressions and progressive ideas. Living
    in Colorado, she internalized the region’s blend of urban sophistication and outdoor adventure, influencing both her professional drive for innovation and her personal pursuits of art, nature, and balanced
    living.
