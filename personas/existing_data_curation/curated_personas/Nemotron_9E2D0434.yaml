    performances'', ''Exploring emerging tech trends and data‑visualization tools'', ''DIY crafts such as pottery and ceramics'']'
  career_goals: Claudia aims to become a senior audit manager within the next three years, leveraging her data‑analytics skills to lead a technology‑focused audit practice. She plans to earn her CPA if
    not already secured and to earn a certification in forensic accounting to broaden her expertise. Long‑term, she envisions a CFO role at an innovative midsize company that values sustainability reporting
    and ESG metrics, or launching a boutique consultancy that helps firms integrate AI‑driven audit solutions while maintaining a flexible, people‑centric work culture. She also hopes to present at professional
    conferences on the intersection of accounting and emerging technologies, positioning herself as a thought leader who blends technical rigor with creative problem‑solving.
