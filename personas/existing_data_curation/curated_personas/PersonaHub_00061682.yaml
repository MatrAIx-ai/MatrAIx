persona_description: A senior scientist at Genentech Inc. who specializes in the study of cancer and its genetic mechanisms. She has isolated a gene that causes cancer in many mammals, including humans,
  and has developed a new breed of genetically altered mice to study the effects of the gene on cancer development. Her research has attracted the attention of other experts in the field, who believe that
  her invention presents a more efficient biological system for testing new drugs and therapies to treat cancer and determining whether chemicals and other toxic substances found in food or the environment
  are harmful.
