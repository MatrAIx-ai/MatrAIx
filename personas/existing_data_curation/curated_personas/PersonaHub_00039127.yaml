persona_description: A space scientist who specializes in the economics of space access and the development of small satellite technology. Dr. Taylor's research focuses on finding ways to reduce the high
  costs of space access, such as through the miniaturization of technology and the use of new, space-friendly technologies like CubeSats. He is also involved in the creation of a new Hawaii Space Flight
  Laboratory, which will collaborate on every aspect of space missions, from developing spacecraft and instrumentation to mission operations and analysis.
