personas:
  professional: Yeng Le, a budding architect‑in‑training who assembles LEGO cityscapes and draws precise cartoon blueprints, demonstrates early spatial design skills and a disciplined, competitive mindset
    that drives them to follow clear instructions and perfect every detail.
  sports: Yeng Le, a competitive bike‑rider who joins the Rochester Dragons youth soccer program after school, eagerly watches the Rochester Red Wings baseball games and the Rochester Americans hockey matches
    for inspiration, and they approach fitness with a structured schedule that balances daily neighborhood rides with weekly practice drills, reflecting their need for predictability and competitive drive.
  arts: Yeng Le, an enthusiastic fan of Mo Willems’ picture books and The Wiggles’ upbeat songs, they spend free time drawing simple cartoons inspired by favorite characters and eagerly watch Disney’s “Mulan”
    for its vibrant art style, using these creative outlets to channel their competitive spirit and need for clear, structured storytelling.
  travel: Yeng Le, a meticulous planner who loves family road trips to Niagara Falls and has a budding wish to explore the Smithsonian museums in Washington, D.C., they insist on detailed maps, scheduled
    rest stops, and pre‑selected snack breaks, balancing their love for adventure with a need for predictable routines that ease their anxiety about new surroundings.
  culinary: Yeng Le, a budding kitchen helper who eagerly assists in rolling bánh chưng and stirring pho broth during Lunar New Year celebrations, they prefer familiar flavors like soy‑glazed chicken and
    cheese‑filled pizza, demonstrate moderate cooking chops by carefully measuring ingredients yet occasionally forget to clean the cutting board, and they relish the structured step‑by‑step recipes that
    satisfy both their love for tradition and their desire for predictable outcomes.
  core: Yeng Le, a detail‑driven six‑year‑old who builds LEGO towers with surgical precision, hoards a piggy bank full of allowance, frets over unfinished puzzles, can’t resist a good‑structured board game
    even if it means missing bedtime, and they often stay up late worrying about the next day’s school test.
background:
  cultural: Yeng is a second‑generation Vietnamese‑American living with his family in Rochester, New York. At home, Vietnamese is spoken regularly, and he participates in cultural traditions such as Lunar
    New Year celebrations, where the family prepares and shares dishes like bánh chưng. His family places a strong emphasis on respect for elders, education, and community involvement, which informs his
    structured approach to schoolwork and his aspiration for academic success. He attends a public elementary school where he interacts with peers from many backgrounds, while also staying connected to
    his heritage through language lessons and community events hosted by the local Vietnamese association.
