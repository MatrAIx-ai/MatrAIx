  career_goals: Yeng’s short‑term ambition is to be the top student in his class and win the upcoming science‑fair project contest. He imagines growing up as a builder or engineer who designs and constructs
    impressive structures, inspired by his love of LEGO. He also dreams of exploring space as an astronaut or creating computer programs, hoping that his precision and hard work will be recognized in future
    careers.
