  career_goals: Looking ahead, Catherine aspires to turn her blend of curiosity, practicality, and competitive spirit into a career that lets her solve real‑world problems. She is fascinated by environmental
    science and hopes to become a wildlife rehabilitator or conservation researcher, working with local farms and natural habitats in Lancaster County. At the same time, she dreams of building an online
    presence—perhaps a YouTube channel—where she can share sustainable DIY projects and simple science experiments, aiming to become the go‑to creator among her peers. She values flexibility and the ability
    to work independently, so she envisions a path that combines field work with digital content creation, allowing her to apply her hands‑on skills while reaching a broader audience.
