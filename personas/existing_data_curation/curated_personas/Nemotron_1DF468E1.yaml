  hobbies: '[''Woodworking'', ''Classic car restoration'', ''Fishing'', ''Reading historical non-fiction'', ''Gardening'', ''Chess'', ''Crossword puzzles'', ''Community volunteering'', ''Attending local
    sports events'']'
  career_goals: Michael aims to transition from daily driving to a leadership role within the school transportation system, such as a fleet supervisor or transportation coordinator, where he can shape safety
    policies and implement technology-driven route efficiencies. He hopes to mentor a new generation of drivers, develop comprehensive safety training programs, and contribute to district‑wide transportation
    planning committees. Long‑term, he envisions a semi‑retired consulting position advising neighboring districts on best practices, while maintaining a healthier work‑life balance to reduce stress.
