persona_description: 'Thomas Cummins, Dumbarton Oaks Professor of the History of Pre-Columbian and Colonial Art, is a scholar who specializes in the interpretation and understanding of objects that hold
  the key to a fuller understanding of the encounter between native peoples and their Spanish conquerors. His latest book, "Toasts With the Inca: Andean Abstraction and Colonial Images on Kero Vessels,"
  focuses on ritual Inca drinking vessels and the transformation of their decorative designs from geometric abstraction to pictorial representation. Cummins'' research interests include the study of pre-Columbian
  and colonial art, the interpretation of indigenous objects, and the creation of a more balanced view of history by interpreting indigenously crafted objects whose significance has not been fully understood.'
