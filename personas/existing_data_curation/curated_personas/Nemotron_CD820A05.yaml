personas:
  professional: Teresa Kellum, a 90‑year‑old senior‑center veteran, blends their knack for structured routine with a spontaneous flair for rallying neighbors, leading mentorship programs, preserving oral
    histories, and orchestrating community potluck events with the same meticulous care they apply to their garden.
  sports: Teresa Kellum enjoys leisurely walks around the historic town square, participates in the senior center’s low‑impact fitness classes, avidly follows the local high school football team, the Cedarwood
    Eagles, and never misses a summer game of the Harbor City Mariners baseball club, yet prefers the gentle rhythm of a weekly bridge tournament over any strenuous sport.
  arts: Teresa Kellum delights in the swing of Glenn Miller and the velvety voice of Ella Fitzgerald, spends evenings listening to big‑band recordings, reads Agatha Christie mysteries, and occasionally
    attends community theater productions of classic plays like Our Town, letting the era’s music and mystery novels shape their creative outlook.
  travel: Teresa Kellum prefers relaxed, short‑duration trips by car, often visiting nearby historic coastal towns such as Savannah and Charleston, cherishes annual visits to their grandchildren’s home
    in the Midwest, and maintains a wish to take a senior‑friendly river cruise along the Mississippi, all planned well in advance to accommodate their health and mobility considerations.
  culinary: Teresa Kellum's culinary world revolves around baking classic apple pies with Granny Smith apples, cinnamon, nutmeg, and a flaky butter crust, preparing hearty chicken pot pies and garden vegetable
    soups, and sharing renowned biscuits at church potlucks, though they occasionally cling to the old family recipe and resist using pre‑made dough.
  core: Teresa Kellum, a 90‑year‑old garden‑to‑table baker and community raconteur, balances a love of predictable routines with spontaneous get‑togethers, worries about health and finances, yet fuels a
    lifelong mission to stitch stories, sweaters, and smiles into their town’s fabric.
background:
  cultural: Teresa was born in the early 1930s on a family farm in rural Illinois and grew up in a close‑knit Protestant community that emphasized hard work, self‑reliance, hospitality, and mutual aid.
    Her upbringing during the Great Depression and World War II instilled a deep respect for routine and practicality, while her lifelong involvement in church and community events fostered a strong sense
    of sociability and compassion. She maintains Midwestern traditions such as seasonal gardening, family reunions, church potlucks, and storytelling around the hearth.
