  career_goals: Even at 90, Teresa aims to remain an active, independent elder in her community. She wishes to mentor younger volunteers at the local senior center, preserve and share her family’s stories
    through a community oral‑history project, and continue providing emotional support to her grandchildren and great‑grandchildren. She also hopes to publish a memoir of her life’s experiences to leave
    a lasting legacy and to help others navigate the anxieties that come with aging.
