persona_description: A health official or a medical researcher who is responsible for controlling the spread of drug resistant tuberculosis and promoting the use of the recommended treatment strategy. They
  are aware of the importance of using proper control programmes and are committed to ensuring that these programmes are implemented effectively in order to prevent the emergence of drug resistant strains.
  They are likely to be familiar with the global report released by the World Health Organization on World Tuberculosis Day and the findings of the study.
