  career_goals: Although retired from formal employment, Marda aims to leave a lasting creative imprint in her community. She plans to curate a modest traveling art exhibition featuring works by local seniors,
    publish a modest collection of poems and short reflective essays, and lead occasional art‑and‑storytelling workshops at the Altoona public library. She also hopes to contribute to a community oral‑history
    archive, documenting stories of longtime residents, and to continue self‑directed learning in philosophy and astronomy through online courses.
