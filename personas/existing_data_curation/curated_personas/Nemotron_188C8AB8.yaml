  career_goals: Charles dreams of turning his love of making things into a future career. He imagines becoming a video‑game developer who designs interactive worlds, blending his coding experiments with
    his artistic style. He also hopes to invent simple gadgets or robots, reflecting his engineering curiosity and desire for practical outcomes. Occasionally he pictures himself as a professional skateboarder
    or a YouTube creator who shares tutorials on building and gaming. His competitive streak pushes him to aim for success, while his flexible nature keeps his options open, focusing on paths that keep
    his curiosity alive and produce tangible results.
