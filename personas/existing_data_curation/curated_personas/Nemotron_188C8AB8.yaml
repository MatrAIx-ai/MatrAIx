personas:
  professional: A ten‑year‑old aspiring engineer and game creator named Charles Maza channels their curiosity and practicality into building moving‑part LEGO contraptions and coding interactive Scratch
    games, while their competitive streak drives them to constantly outdo friends and their relaxed, disorganized approach lets them improvise solutions on the fly.
  sports: A ten‑year-old named Charles Maza spends afternoons at Riverbend Skate Park with the Portland Youth Skate Club, cheering on the Portland Timbers and Trail Blazers while they favor spontaneous
    tricks over regimented training, reflecting a competitive yet flexible approach to fitness.
  arts: A ten‑year-old named Charles Maza draws comic‑style heroes inspired by Jeff Smith and Pixar animations, creates sprite art for Scratch games, and fuels creative sessions with playlists featuring
    Imagine Dragons, Billie Eilish, and classic Beatles tracks, showcasing a competitive desire to craft the coolest characters.
  travel: A ten‑year-old named Charles Maza prefers short, adventure‑filled trips like weekend outings to the local science museum, a family road‑trip to the Grand Canyon, and a summer vacation at Disneyland,
    while dreaming of a future solo‑style journey to Tokyo's anime districts and London's gaming expos, often relying on parents' planning but occasionally sketching itineraries on their tablet.
  culinary: A ten‑year-old named Charles Maza favors bold flavors like pepperoni pizza, chicken nuggets, and cheesy tacos, enjoys assembling simple snacks such as DIY nachos with cheddar and jalapeños,
    and is eager to experiment with beginner‑friendly recipes like spaghetti carbonara, yet often neglects vegetables, reflecting a selective palate.
  core: Charles Maza, a ten‑year‑old LEGO and Scratch enthusiast, blends fierce competitiveness with laid‑back disorganization, constantly chasing the next trick or invention while often misplacing homework
    and snack wrappers.
background:
  cultural: Charles is raised in a white, middle‑class family with roots in the American Midwest, now living in a multicultural Los Angeles neighborhood. His household embraces a relaxed West‑Coast lifestyle
    that values creativity, outdoor activity, and exposure to diverse cultures. He attends a public elementary school where he interacts with peers from many ethnic backgrounds, broadening his perspective
    while his skeptical side tests others' intentions. The city’s vibrant tech, entertainment, and skate scenes provide role models and informal learning opportunities, shaping his interests in gaming,
    digital creation, and skateboarding. Family traditions include weekend trips to the beach, movie nights featuring classic Hollywood films, and participation in community science fairs, nurturing his
    curiosity while grounding him in a practical, community‑oriented environment.
