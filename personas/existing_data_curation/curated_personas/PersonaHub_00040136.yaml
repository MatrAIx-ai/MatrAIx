persona_description: A fashion designer who pioneered the streetwear movement, developed a collection of brash knockoffs using bootlegged fabrics, and was later recognized by Time magazine as one of the
  most influential people of 2020. His designs, influenced by high-end luxury brands like Gucci, Louis Vuitton, and Fendi, are associated with introducing high fashion to the hip hop world. His business,
  Dapper Dan’s Boutique, operated from 1982-1992, and he is credited with revitalizing his career by launching a fashion line with Gucci in 2017.
