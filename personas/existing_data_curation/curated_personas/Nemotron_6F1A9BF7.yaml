personas:
  professional: Shawn Bevan, an aspiring junior inventor, transforms the living room into a laboratory of cardboard rockets and watercolor galaxies, channeling boundless curiosity into early STEM tinkering
    while embracing a relaxed, unstructured approach to play, and they often prefer solitary experiments over group projects.
  sports: Shawn Bevan, a five‑year‑old who prefers quiet play over noisy team drills, attends the "Mini Dolphins" swim class twice a week to splash through laps, while they occasionally cheer for the nearby
    "City Cubs" baseball team on weekend game days, reflecting a low‑key but enthusiastic approach to fitness.
  arts: Shawn Bevan, a five‑year‑old with a vivid imagination, spends hours drawing swirling galaxies on sketch pads and constructing colorful Lego mosaics while they hum along to They Might Be Giants and
    the playful melodies of Sesame Street, letting whimsical art shape their daily adventures.
  travel: Shawn Bevan, a curious five‑year‑old who loves short family road trips, treasures quiet moments exploring the tide pools at the local aquarium and the sweeping sand dunes at the nearby beach,
    while dreaming of a future visit to Disney World’s Magic Kingdom where they can discover new worlds at their own pace.
  culinary: Shawn Bevan, a five‑year‑old with a burgeoning palate, delights in slathering peanut butter and jelly sandwiches, constructing rainbow fruit skewers with strawberries, blueberries, and kiwi,
    and proudly creating smiley‑face pancakes topped with chocolate chips, and they often gleefully splash flour across the kitchen counter.
  core: Shawn Bevan, a five‑year‑old dreamer with a penchant for solitary imagination, colorful art, and impulsive snack decisions, balances quiet curiosity with bursts of assertive play, they occasionally
    leave a trail of crayons and crumbs in their wake.
background:
  cultural: Shawn is a White American child raised in Surprise, a suburban community in Maricopa County, Arizona. His upbringing reflects a typical middle‑class Southwest United States environment, with
    an emphasis on outdoor play in the desert landscape, participation in community activities such as school art fairs and library story times, and family traditions that include mainstream American holidays
    and occasional trips to nearby natural parks. The regional culture provides a relaxed, sun‑filled lifestyle that blends with broader American cultural influences.
