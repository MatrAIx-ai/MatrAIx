  career_goals: He aims to advance into senior program management within the next five years, overseeing multi‑disciplinary, high‑value infrastructure projects. Chad plans to earn his Project Management
    Professional (PMP) certification and pursue an Agile Certified Practitioner credential to broaden his methodological toolkit. He also envisions establishing a boutique consultancy that helps mid‑size
    firms in Oklahoma implement streamlined project controls and continuous improvement programs. Mentoring emerging project managers and contributing to local professional networks, such as the Tulsa Project
    Management Institute, are integral parts of his long‑term ambition. Ultimately, Chad seeks to leave a legacy of robust, cost‑effective project delivery that supports regional growth and sustainability.
