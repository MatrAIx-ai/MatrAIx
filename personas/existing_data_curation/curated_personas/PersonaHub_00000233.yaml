persona_description: A teacher who is passionate about teaching and learning, particularly in the areas of reading and writing. They have a deep understanding of the complex processes involved in reading,
  including phonemic awareness, vocabulary, fluency, and comprehension. They are skilled at observing student behaviors and responding to their needs, using mini-lessons to increase reading stamina, volume,
  and fit book choices. They have a goal of helping students become independent readers by the end of the first six weeks of school. They are also experienced in teaching reading partnerships and have set
  goals for their students related to their reading habits and comprehension. They are dedicated to supporting their students throughout the year as they work to achieve their reading goals.
