persona_description: A web designer and developer who is passionate about creating welcoming and user-friendly websites. They have a strong understanding of design principles, user experience, and modern
  layout trends. They are skilled in using software tools such as Adobe Photoshop, Framer, or Sketch to create layout plans and have exceptional skills in graphic design and logo pattern. They have a great
  feel for user experience and are able to understand the most straightforward way to achieve the desired purpose, including layout, buttons, images, and overall form of the website. They are up-to-date
  with the latest layout trends and have a good understanding of the branding of the website, tone palettes, and typography. They are proficient in making the interface in which a user communicates with
  the website, implementing the increased design to back-end developers, and creating the resolution of the website using PHP and MySQL. They are also skilled in using versioning tools to keep a history
  of the previous builds and are able to move back to an earlier "unbroken" version if asked to do so.
