  hobbies: '["Reading historical novels and poetry", "Listening to boleros, plena, and salsa", "Watercolor painting of local landscapes", "Birdwatching in mangroves", "Walking along the coastal trail",
    "Attending small church gatherings", "Collecting vintage postcards"]'
  career_goals: At 93, Manuel’s ambitions center on legacy rather than professional advancement. He aims to compile a memoir of his life’s experiences, emphasizing the cultural shifts he has witnessed in
    Puerto Rico. He hopes to mentor his grandchildren and younger neighbors, teaching them cooking, storytelling, and simple carpentry. Manuel also wishes to contribute to a local heritage project by donating
    his photographs and oral histories to the municipal library, ensuring the preservation of San Sebastián’s unique traditions for future generations.
