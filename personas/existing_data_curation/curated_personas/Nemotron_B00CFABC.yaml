  career_goals: Although only ten, Sabrina already envisions a future where she can apply her analytical mind and love for discovery. She dreams of becoming a wildlife biologist or a forensic scientist,
    roles that allow her to investigate mysteries and solve problems. She aspires to win science fair competitions, earn top grades, and eventually work in a field that combines fieldwork with data analysis,
    allowing her to work independently while making tangible contributions.
