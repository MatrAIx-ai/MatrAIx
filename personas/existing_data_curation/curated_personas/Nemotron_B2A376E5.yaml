  career_goals: Jeremy aims to advance to a senior executive role, such as Director of Operations or Vice President of Business Development, within the next five years. He aspires to lead large‑scale initiatives
    that integrate artistic insight into corporate strategy, positioning his organization as a cultural innovator in the region. Long‑term, he envisions launching his own consultancy focused on marrying
    business efficiency with community arts programming, thereby creating socioeconomic impact in underserved neighborhoods. Additionally, Jeremy is committed to developing stronger emotional resilience
    and hopes to champion mental‑health awareness initiatives within his workplace.
