personas:
  professional: Jeremy Mackie, an operations strategist who blends rigorous strategic planning with a deep appreciation for contemporary art, uses data‑driven decision making and creative branding to drive
    performance while positioning their organization as a cultural innovator.
  sports: Jeremy Mackie, a sailing enthusiast who spends weekends navigating the Intracoastal Waterway with a local yacht club, also follows the Miami Heat in basketball and the Tampa Bay Rays in baseball,
    and participates in a weekly squash match to keep competitive edge.
  arts: Jeremy Mackie, a dedicated patron of contemporary visual arts, frequents galleries showcasing African diaspora creators such as Kara Walker and Kehinde Wiley, curates jazz‑infused playlists featuring
    Miles Davis, Robert Glenn, and modern hip‑hop artist Kendrick Lamar for their spouse, and occasionally volunteers to lead art‑making workshops in underserved neighborhoods.
  travel: Jeremy Mackie prefers meticulously planned trips that combine cultural immersion and culinary exploration, having visited New Orleans for its music scene, trekked to Ghana to trace artistic roots,
    and dreams of a future sailing expedition along the Greek islands while balancing work commitments.
  culinary: Jeremy Mackie enjoys reinventing Southern comfort dishes like shrimp and grits with miso glaze, collard greens sautéed with smoked paprika, and bourbon‑infused fried chicken, often sourcing
    ingredients such as buttermilk, okra, and fresh Gulf shrimp to create meals that blend tradition with modern flavor twists.
  core: Jeremy Mackie is a methodical strategist with a restless curiosity for art and sailing, whose analytical rigor is tempered by a creative soul and a persistent battle with anxiety that fuels both
    their drive and self‑critical tendencies.
background:
  cultural: Jeremy is an African American who grew up in the South before relocating to South Florida. His cultural identity is shaped by family traditions, historic Black church involvement, and participation
    in community celebrations such as Juneteenth and local Black arts festivals. He maintains strong ties to African American culinary heritage, often preparing dishes that blend Southern flavors with Caribbean
    influences common in Palm Beach County. Jeremy supports Black-owned businesses and is active in regional professional networks that promote diversity in leadership. His experiences navigating both the
    challenges and strengths of his community inform his skeptical outlook, competitive drive, and deep appreciation for artistic expression within the Black cultural narrative.
