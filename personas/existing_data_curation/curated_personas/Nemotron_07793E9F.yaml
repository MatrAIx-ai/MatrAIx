personas:
  professional: Rhen Luebbert is a construction‑trade helper who excels at blueprint reading, carpentry basics, and site logistics, using their methodical, organized approach to keep crews on schedule while
    dreaming of a journeyman certification and eventually leading green‑building projects as a foreman.
  sports: Rhen Luebbert follows the Detroit Lions and Red Wings loyally, plays pickup basketball at the local community center, hikes the trails of Pinckney Recreation Area on weekends, and hits the gym
    three times a week to stay fit for both work and recreation.
  arts: Rhen Luebbert enjoys the gritty blues of Muddy Waters, the garage‑rock energy of The White Stripes, and attends the annual Detroit Institute of Arts’ free evenings, while also dabbling in woodworking
    projects inspired by Bauhaus designs.
  travel: Rhen Luebbert prefers road trips that combine outdoor adventure and cultural stops, having driven up to the Upper Peninsula’s Porcupine Mountains for hiking and planning a future visit to the
    historic streets of Milwaukee and the art districts of Chicago.
  culinary: Rhen Luebbert loves cooking with fresh vegetables from their garden, often preparing roasted heirloom carrots, sautéed kale, and a hearty chicken sheet‑pan dinner seasoned with garlic and rosemary,
    while still indulging in a perfectly grilled bratwurst and sauerkraut on game days.
  core: Rhen Luebbert blends hands‑on construction expertise, a green‑building vision, and a community‑first mindset into a pragmatic yet curious life philosophy, occasionally over‑budgeting on tools but
    always staying on schedule.
background:
  cultural: Rhen grew up in suburban Warren, Michigan, in a middle‑class, white Midwestern family with German‑Polish heritage. Her upbringing emphasized hard work, punctuality, and community involvement.
    She celebrates typical American holidays and cherishes local traditions such as supporting Detroit sports teams and participating in neighborhood events, while also valuing the collaborative spirit
    of the regional construction trade community.
attributes:
  skills: '[''Blueprint reading'', ''Basic carpentry'', ''Concrete mixing and finishing'', ''Safety compliance (OSHA)'', ''Power tool operation'', ''Basic electrical and plumbing assistance'', ''Construction
    site logistics'', ''Project documentation'', ''Microsoft Excel for site data'', ''Team coordination and communication'']'
  hobbies: '[''Woodworking'', ''DIY home improvement'', ''Hiking in local state parks'', ''Gardening'', ''Fitness/weight training'', ''Listening to construction podcasts'', ''Playing strategy video games'',
    ''Cooking'', ''Volunteering with Habitat for Humanity'']'
  career_goals: Rhen aims to earn a journeyman carpentry certification within two years, followed by an NCCER construction management credential. She plans to transition into a foreman role, lead crews
    on green‑building residential projects, and eventually launch her own small contracting firm focused on energy‑efficient remodels in the Detroit metropolitan area.
