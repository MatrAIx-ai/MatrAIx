personas:
  professional: Robert Pfost, a seasoned inventory and logistics manager turned community event consultant, leverages his logistical expertise, carpentry know‑down, and conflict‑mediation training to coordinate
    volunteer‑driven festivals and workshops, blending structured planning with a laid‑back, people‑first style.
  sports: Robert Pfost powers through weekly pickup basketball games at the Reno community center, treks the Sierra Nevada foothills with the Sierra Nevada Hiking Club in summer, snowshoe‑rocks the Tahoe
    trail in winter, and roots for the Vegas Golden Knights in hockey and the Reno Aces in minor‑league baseball.
  arts: Robert Pfost stars in Reno’s community theater, delivering comedic performances in Neil Simon productions, and spends his free evenings at music festivals headlined by The Lumineers and Kacey Musgraves
    while browsing local art fairs for vibrant paintings by regional artists like Emily Carr and pop‑art prints of Shepard Fairey.
  travel: Robert Pfost plans trips that balance rugged adventure with relaxed exploration, having already hiked Yosemite’s Half Dome, snow‑shoeed in Banff National Park, and sampled craft brews in Portland,
    while dreaming of a future trek through Patagonia’s Torres del Paine and a leisurely weekend in the French Alps.
  culinary: Robert Pfost cooks with garden‑fresh heirloom tomatoes, rainbow carrots, and rosemary, often preparing a grilled zucchini and tomato salad drizzled with a basil‑lemon vinaigrette, pairs it with
    his own hazy IPA brewed with Cascade hops, and occasionally whips up a quick stovetop paella featuring locally sourced chicken and chorizo.
  core: Robert Pfost, a 43‑year‑old logistics pro with a penchant for meticulous event planning, casually misplaces their gardening tools, over‑organizes community workshops, and compulsively hosts marathon
    board‑game nights fueled by home‑brewed IPA.
background:
  cultural: Robert grew up in a small Midwestern town where self‑reliance, community volunteerism, and modest, family‑centered values were emphasized. His family’s Protestant background instilled a sense
    of service and cooperation, which he carries into his adult life. After moving to Reno for its proximity to outdoor recreation, he adopted the city’s laid‑back yet community‑oriented culture, blending
    his Midwestern roots with the diverse, open‑minded spirit of the Nevada high desert.
