  hobbies: '[''Hiking in the Sierra Nevada'', ''Snowshoeing'', ''Pickup basketball games'', ''Community theater acting'', ''Home brewing craft beer'', ''Vegetable gardening'', ''Board game and poker nights'',
    ''Attending Reno art and music festivals'']'
  career_goals: Looking ahead, Robert aims to channel his organizational strengths into a part‑time consulting role helping local non‑profits streamline their operations. He also plans to complete his undergraduate
    degree in business administration, building on the credits he earned in college. In the longer term, he hopes to launch a small community workshop where residents can learn practical skills such as
    woodworking, gardening, and basic home maintenance, fostering self‑reliance and neighborhood cohesion.
