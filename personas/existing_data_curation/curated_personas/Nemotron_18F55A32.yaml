  hobbies: '["Hiking", "Gardening", "Quilting", "Community theater (stage management)", "Bridge (card game)", "Volunteer work at historical society", "Senior choir", "Local book club"]'
  career_goals: As she approaches retirement, Lindsey aims to transition into a part‑time consulting role that allows her to advise on historic preservation projects while continuing to mentor emerging
    engineers. She hopes to author a practical handbook on sustainable retrofits for vintage timber‑framed houses, serve on Bennington’s planning and historic‑preservation boards, and spearhead a community‑wide
    initiative to improve the energy performance of older residential stock. Her long‑term ambition is to leave a documented legacy that blends her engineering expertise with her commitment to preserving
    New England’s architectural heritage.
