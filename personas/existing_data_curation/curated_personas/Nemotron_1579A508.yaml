  career_goals: Joseph aspires to become a mechanical engineer or robotics designer, focusing on creating practical solutions that blend his curiosity with real-world applications. He dreams of winning
    a regional science fair with a project that demonstrates an innovative use of simple robotics. In the longer term, he hopes to work on designing sustainable tools for his community and possibly coach
    younger students in chess or baseball. His ambition is guided by his desire to turn ideas into tangible results while maintaining the discipline and planning habits he values.
