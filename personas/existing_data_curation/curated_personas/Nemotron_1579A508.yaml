personas:
  professional: Joseph Hancock is a budding aerospace hobbyist who meticulously designs and launches model rockets, applying their methodical planning and curiosity to solve engineering puzzles before school
    even ends.
  sports: Joseph Hancock pitches for the Ridgewood Elementary baseball team, idolizes the Washington Nationals, and participates in the Little League Tigers program, approaching each practice with a methodical,
    competitive edge that mirrors their strategic chess mindset.
  arts: Joseph Hancock indulges in creative storytelling by drafting short fiction inspired by Appalachian hikes, while listening to The Beatles and reading Jules Verne’s classic novels, letting these artistic
    influences shape their imaginative play.
  travel: Joseph Hancock plans modest family weekend trips to the Appalachian foothills and dreams of camping in Great Smoky Mountains National Park and touring NASA’s Kennedy Space Center, favoring organized
    hikes with close friends over crowded tourist tours, and they always bring a notebook to document observations.
  culinary: Joseph Hancock prefers homemade mac and cheese with extra cheddar, enjoys assembling simple trail‑mix snacks of pretzels, dried fruit, and peanuts, and they occasionally help grill mini burgers,
    showing a budding but enthusiastic cooking skill.
  core: Joseph Hancock is a calm, meticulously organized ten‑year‑old, and they channel their love for rockets, chess, and solitary exploration into a competitive streak and a habit of over‑planning every
    hobby.
background:
  cultural: Joseph’s cultural background is rooted in the small-town Southern environment of Albertville, Alabama. He comes from a white, multigenerational family that values community, family ties, and
    modesty. Local traditions such as church attendance, Sunday potluck meals, and seasonal festivals like the Albertville Canada Day Celebration shape his social experiences. The region’s emphasis on self-reliance,
    courtesy, and a strong work ethic aligns with his methodical and competitive nature. He is also exposed to Southern cuisine, music, and the slower pace of life typical of rural Alabama, which reinforces
    his preference for small-group interactions and solitude.
