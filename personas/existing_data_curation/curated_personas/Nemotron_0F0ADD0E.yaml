personas:
  professional: Wanda Horton is a telecommunications field technician who blends hands‑on expertise in RF testing, coaxial splicing, and broadband installation with a compassionate knack for translating
    technical jargon for seniors, and they are actively pursuing CTNS certification and an FCC General Radiotelephone Operator License to lead a rural broadband expansion team within five years.
  sports: Wanda Horton enjoys hiking the Neuse River Trail on weekends, participates in a local women’s yoga circle, cheers for the Durham Bulls baseball team and the Carolina Hurricanes during the season,
    and occasionally joins a community softball league that practices at the Wilson County park.
  arts: Wanda Horton is an avid fan of classic R&B legends like Marvin Gaye and Aretha Franklin, regularly joins community gospel jam sessions, attends the annual Wilson County Arts Festival featuring local
    jazz and spoken‑word poets, and unwinds with mystery novels by Agatha Christie, all of which stitch together a vibrant cultural tapestry in their leisure time.
  travel: Wanda Horton favors road trips to historic southern cities such as Savannah, Charleston, and New Orleans to soak in heritage architecture, dreams of a cultural immersion visit to Ghana’s coastal
    towns to trace ancestral roots, but balances these aspirations with a modest budget and family commitments, often planning weekend getaways to the Great Smoky Mountains for low‑cost outdoor adventure.
  culinary: Wanda Horton loves cooking soul‑food staples like slow‑cooked collard greens with smoked turkey, fried catfish with hush‑puppy crumbs, and sweet potato pie, frequently seasoning dishes with
    smoked paprika and hot sauce, while also incorporating home‑grown tomatoes and collard greens from their garden into fresh salads and stews.
  core: Wanda Horton is a technically savvy, community‑focused telecom specialist who balances curiosity with practicality, channels compassion into mentoring, and anchors life with gospel rhythms, garden
    chores, and a love for mystery novels.
background:
  cultural: Wanda’s cultural identity is rooted in the Black Southern tradition of Wilson County, where family, church, and community have long shaped daily life. Growing up, she participated in church
    gatherings, gospel choirs, and cultural celebrations such as Juneteenth and Kwanzaa, which reinforced values of resilience, collective support, and pride in African‑American heritage. The region’s rich
    history of civil‑rights activism and storytelling influences her commitment to service and empowerment, especially in bridging the digital divide for historically marginalized neighborhoods. Her culinary
    preferences reflect Southern soul food traditions, and she often shares meals with extended family and neighbors, using food as a conduit for cultural connection and community building.
attributes:
  skills: '[''Radio frequency equipment installation'', ''Broadband network troubleshooting'', ''Coaxial and fiber optic splicing'', ''RF signal testing and calibration'', ''FCC regulatory compliance'',
    ''Electrical safety and grounding'', ''Technical documentation and reporting'', ''Client communication and education'', ''Team mentorship and training'', ''Problem‑solving under pressure'']'
  hobbies: '[''Community tech tutoring'', ''Gardening (vegetable and herb cultivation)'', ''Listening to classic R&B and gospel music'', ''Amateur (ham) radio operation'', ''Local jam sessions and choir
    participation'', ''Hiking in nearby state parks'', ''Yoga and mindfulness practice'', ''Reading mystery and thriller novels'']'
  career_goals: Wanda aims to progress from field technician to senior supervisory role within the next five years, pursuing certifications such as Certified Telecommunications Network Specialist (CTNS)
    and an FCC General Radiotelephone Operator License. She envisions leading a small team that handles major infrastructure projects for rural broadband expansion in eastern North Carolina, blending her
    technical expertise with her desire to improve community access to technology. Long‑term, she hopes to launch a locally owned consulting firm that provides affordable installation services and digital
    inclusion workshops for underserved neighborhoods, leveraging her practical skills and collaborative spirit to drive regional connectivity and empowerment.
