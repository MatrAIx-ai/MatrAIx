  career_goals: Alexis aims to transition into a senior engineering role within the next two years, focusing on leading small, cross‑functional teams where she can apply her organizational strengths. She
    aspires to become a technical lead who mentors junior developers, especially women and underrepresented minorities, fostering an inclusive tech culture in the Bronx. Long‑term, she envisions moving
    into software engineering management while maintaining a balanced workload that safeguards her mental well‑being. To support this trajectory, she plans to earn an AWS Solutions Architect certification
    and eventually pursue a part‑time master's in Computer Science, all while championing projects that address financial inclusion and community empowerment in her neighborhood.
