  hobbies: '[''Yoga'', ''Mindfulness meditation'', ''Reading science‑fiction'', ''Reading African‑American literature'', ''Journaling'', ''Rooftop gardening'', ''Cooking soul‑food'', ''Women‑in‑tech meetups'',
