  hobbies: '[''Community Basketball Games'', ''Home Cooking (Southeast Asian & Midwestern Fusion)'', ''Urban Rooftop Gardening'', ''Habitat for Humanity Volunteering'', ''Traveling to Architectural Landmarks'',
    ''Attending Construction Technology Expos'']'
  career_goals: Building on his 15‑year track record, Jevon aims to advance to a senior director role overseeing regional construction operations for a developer focused on Detroit’s urban revitalization.
    He is passionate about integrating sustainable design into high‑rise projects and hopes to spearhead a city‑wide green building initiative that reduces carbon footprints while creating affordable housing.
    Jevon also envisions mentoring emerging talent from underrepresented backgrounds, establishing a scholarship program within the construction trade, and eventually launching his own consultancy that
    blends innovative construction technology with community‑centric development.
