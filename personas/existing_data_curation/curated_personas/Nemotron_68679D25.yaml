personas:
  professional: Jevon Pel is a construction manager who leverages BIM, Primavera P6, and lean construction to oversee large commercial builds, while their sociable, talkative nature turns stakeholder meetings
    into collaborative brainstorming sessions and their balanced curiosity embraces both innovative green tech and tried‑and‑true building practices.
  sports: Jevon Pel rallies community basketball pick‑up games every Thursday, supports the Detroit Pistons and Detroit Lions, runs a half‑marathon in the spring with the local running club, and enjoys
    cheering on the Detroit Red Wings during the hockey season.
  arts: Jevon Pel frequents Detroit Institute of Arts exhibitions, collects vinyl records of Motown legends like Stevie Wonder and Marvin Gaye, attends live jazz sets at the Jazz Café, and draws inspiration
    from street murals by local artists such as the collective X.
  travel: Jevon Pel plans trips around iconic architecture, having toured the Art Deco skyscrapers of Chicago, the futuristic Marina Bay Sands in Singapore, and the Detroit Renaissance Center, while also
    attending construction tech expos in Frankfurt and Dubai to stay ahead of industry trends.
  culinary: Jevon Pel is an avid home‑chef who perfects Vietnamese beef pho with star anise and fish sauce, slow‑cooks Filipino chicken adobo with bagoong and soy, and experiments by adding Michigan cherry
    glaze to classic dishes, all while cultivating fresh herbs like Thai basil on their rooftop garden.
  core: Jevon Pel blends a pragmatic construction mindset with a community‑focused, talkative spirit, balancing sustainable innovation with hearty culinary experiments and a love for Detroit’s sports and
    arts scenes, even if they sometimes forget a dental check‑up.
background:
  cultural: Jevon was raised in Detroit by immigrant parents who arrived from the Philippines and Vietnam in the late 1970s. Their household blended traditional Asian customs—celebrating Lunar New Year,
    honoring ancestors, and cooking family recipes—with the practical, hardworking ethos of the Midwest. This dual heritage instilled in him a deep respect for community, harmony, and perseverance. He remains
    connected to the local Asian diaspora through cultural festivals and mentorship programs, while also embracing Detroit’s rich musical and automotive legacy. These cultural influences shape his collaborative
    approach, his commitment to inclusive community development, and his appreciation for both innovative ideas and established practices.
attributes:
  skills: '[''Project Management'', ''Construction Scheduling'', ''Budgeting & Cost Control'', ''Building Information Modeling (BIM)'', ''Lean Construction'', ''Safety & Compliance'', ''Team Leadership'',
