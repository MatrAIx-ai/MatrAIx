  career_goals: Desiree aims to advance to a regional health services director role, where she can shape policy and oversee multiple facilities across the Chicago metropolitan area. She is passionate about
    implementing patient‑centered care models and spearheading digital transformation projects that improve efficiency and experience. In the longer term, she envisions serving on a hospital board or consulting
    for nonprofit health organizations, mentoring emerging leaders, and championing community health initiatives that reduce disparities in her Lake County region.
