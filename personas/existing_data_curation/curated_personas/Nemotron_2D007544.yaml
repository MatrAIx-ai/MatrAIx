  hobbies: '[''Painting'',''Photography'',''Visiting art galleries'',''Attending live music events'',''Gardening'',''Cooking traditional Guatemalan cuisine'',''Volunteering at community safety workshops'',''Participating
    in cultural festivals'',''Learning new musical instruments'',''Exploring sustainable DIY projects'']'
  career_goals: Johany aims to formalize her extensive experience by obtaining a state journeyman license and pursuing certifications in sustainable energy, such as solar panel installation. She envisions
    launching a boutique electrical contracting firm that specializes in artistic lighting solutions for galleries, community centers, and private homes in the Grand Island area. A core ambition is to create
    apprenticeship opportunities for women and underrepresented minorities in the trades, leveraging her sociable nature to build mentorship networks. Long‑term, she hopes to collaborate on public art projects
    that integrate innovative lighting technologies, thereby merging her technical skills with her appreciation for creative expression.
