persona_description: A historian who is interested in the colonial history of South Texas and the Franciscan mission system, particularly the site of Mission Espíritu Santo de Zúñiga. This historian is
  well-versed in archaeological methods and techniques, and is eager to uncover the daily life and impact of the mission on the local Native American tribes. They are interested in understanding how the
  missionization process affected both the Indians and the colonizers, and how these experiences shaped the lives of the mission residents.
