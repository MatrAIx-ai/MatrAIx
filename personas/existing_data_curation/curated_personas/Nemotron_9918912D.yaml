  career_goals: Floris aims to advance to a store manager role within the next three years, deepening his expertise in visual merchandising and retail leadership. He aspires to blend his passion for art
    with his retail career by moving into a position that curates artistic products for a boutique or department store. Long‑term, he envisions opening his own independent shop that showcases emerging artists
    and offers curated lifestyle goods, leveraging his entrepreneurial spirit and love for unconventional ideas.
