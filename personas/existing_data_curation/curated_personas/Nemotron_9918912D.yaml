personas:
  professional: Floris Robinson is a retail associate who excels in visual merchandising and POS operations, channeling their art‑driven curiosity and spontaneous adaptability into crafting striking store
    displays, even as they occasionally wrestle with strict inventory organization and deadline‑driven paperwork.
  sports: Floris Robinson enjoys weekend hikes on the James River Park System, occasionally joins a local pick‑up basketball league that supports the Virginia Cavaliers, follows the Richmond Kickers with
    casual enthusiasm, and they prefer spontaneous outdoor activity over regimented gym routines.
  arts: Floris Robinson spends evenings sketching in Richmond’s street‑art‑laden Shockoe Bottom, curates a growing collection of limited‑edition prints by contemporary artists like Kehinde Wiley and Shepard Fairey,
    captures urban vistas through a Leica camera, regularly attends live shows featuring The War on Drugs, Snarky Puppy, and local indie acts, unwinds with graphic novels such as Saga and Sandman, and they
    feel that each artistic encounter fuels their retail creativity.
  travel: Floris Robinson prefers spontaneous, art‑focused weekend getaways, often jet‑setting from Richmond to Charlottesville for vineyard tours, wandering the historic streets of Savannah, exploring
    New York’s museum districts, dreaming of a longer cultural immersion in Berlin’s galleries and Lisbon’s tile‑laden neighborhoods when savings allow, and they balance these adventures with the practical
    need to coordinate schedules with their spouse.
  culinary: Floris Robinson, an intermediate home chef, loves experimenting with spicy Korean‑style tacos, harissa‑marinated chicken, and shrimp‑and‑grits featuring fresh Gulf shrimp, often sourcing artisanal
    beans for espresso and whipping up sourdough starter for weekend brunches while frequenting Richmond’s eclectic coffee houses for inspiration, and they enjoy sharing these creative meals with their
    spouse during relaxed evenings.
  core: Floris Robinson blends restless curiosity with a spontaneous flair, turning retail aisles into mini‑galleries while juggling impulsive art‑spending and occasional insomnia, all fueled by coffee‑shop
    brainstorming sessions and weekend hikes, and they constantly seek the next visual story to tell.
background:
  cultural: Floris was raised in suburban Henrico County, Virginia, within a white, middle‑class Southern family. His upbringing combined traditional Southern values—such as hospitality, community involvement,
    and a strong work ethic—with exposure to the region’s growing arts scene, local music, and diverse cultural events. He identifies with his Southern roots while also embracing a broader contemporary
    American identity that celebrates curiosity, creativity, and openness to new experiences.
