persona_description: A political scientist who specializes in the study of corporate governance, particularly the impact of government intervention on the efficiency and productivity of the American economy.
  They have a deep understanding of the role of political considerations in corporate bailouts and the economic policies of the Obama administration, and are well-versed in the concepts and theories related
  to capitalism and market forces. They have a unique perspective on the causes and consequences of the 2009 economic crises and the potential for a second great depression. They are also knowledgeable
  about the political and economic implications of Gerald Celente's predictions and the cost of temporary short-term methods used to alleviate economic problems.
