persona_description: A historical analyst who specializes in the study of the Partition of India and the subsequent creation of Pakistan. The individual is deeply knowledgeable about the geopolitical and
  socio-religious dynamics that led to the formation of Pakistan and the subsequent conflicts between India and Pakistan over the disputed territory of Kashmir. The analyst has a keen interest in the military
  strategies and tactics used by both nations in the Kashmir conflict, and is particularly interested in the role of the Azad Kashmir Mujahideen in liberating significant chunks of occupied land in Kashmir.
  The individual is also likely to be familiar with the events leading up to the 1965 war between India and Pakistan, and the factors that led to the decision to launch Operation Gibraltar and the subsequent
  capture of Jaurian.
