    User 1: That''s really great. I''m sure your clients appreciate your work.

    User 2: I hope so! I try my best to make sure they''re happy with my work.

    User 1: Well, I''m sure you do a great job.

    User 2: Thanks! I appreciate that.

    User 1: So, how long have you been married?

