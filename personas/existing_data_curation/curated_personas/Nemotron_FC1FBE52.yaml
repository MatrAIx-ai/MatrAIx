personas:
  professional: Kelsey Stock, a seasoned HR manager with a STEM‑grounded analytical mindset, leverages their methodical, data‑driven approach and love of routine to excel in talent acquisition, compensation
    design, and conflict resolution, positioning themselves for a senior HR director role.
  sports: Kelsey Stock enjoys birdwatching with the local Appalachian Birding Society, hikes the Blue Ridge Trail on weekends, and follows the West Virginia Mountaineers football team and the Pittsburgh
    Penguins hockey club, preferring low‑impact outdoor activities over team sports.
  arts: Kelsey Stock finds solace in historical fiction by Hilary Mantel and Ken Follett, quilts intricate Log Cabin patterns inspired by Appalachian folk art, and attends bluegrass concerts featuring Alison
    Krauss and Rhiannon Giddens, weaving these creative outlets into a steady rhythm of personal enrichment.
  travel: Kelsey Stock plans meticulous road trips to Shenandoah National Park and the historic district of Savannah, Georgia, balancing a love of nature and heritage with budget‑conscious lodging, while
    dreaming of a culinary pilgrimage to the Champagne region of France.
  culinary: Kelsey Stock delights in cooking mouth‑watering Appalachian staples such as sautéed collard greens with smoked ham hocks, cornbread, and apple stack cake, often using garden‑fresh tomatoes,
    beans, and heirloom squash, and takes pride in perfecting their signature fried green tomatoes.
  core: Kelsey Stock is a routine‑driven HR strategist who gardens, quilts, and explores Appalachian trails, blending meticulous planning with a quiet love for nature‑centered creativity and pragmatic financial
    stewardship.
background:
  cultural: Kelsey was born and raised in Charleston, West Virginia, part of the Appalachian region. She comes from a middle‑class white family with deep community ties that emphasize self‑reliance, modesty,
    and strong family and church connections. Growing up during the economic transitions of the 1970s and 1980s, she internalized a practical, stable outlook and a respect for routine. Her pursuit of a
    graduate degree in a STEM field reflects a generational push for higher education among women in the area, reinforcing her analytical mindset while maintaining the regional values of hard work and community
    service.
attributes:
  skills: '["Employee Relations Management", "Talent Acquisition and Recruitment", "Compensation and Benefits Administration", "HRIS Data Analysis and Reporting", "Performance Management and Appraisal",
    "Compliance with Labor Laws (FLSA, OSHA)", "Organizational Development and Change Management", "Training and Development Design", "Project Management", "Data‑Driven Workforce Planning"]'
  hobbies: '["Gardening", "Reading historical fiction", "Quilting", "Birdwatching", "Hiking in local trails", "Volunteer work at the community food bank", "Cooking traditional Appalachian dishes"]'
  career_goals: Kelsey aims to advance to a senior leadership role such as HR Director or HR Business Partner within the next five years, where she can shape strategic workforce initiatives and embed analytics
    into decision‑making. She plans to earn the SHRM‑SCP certification to formalize her expertise and to mentor emerging HR professionals, especially women entering the field. Ultimately, she envisions
    guiding her organization through stable growth while maintaining a supportive workplace culture, and may later transition to part‑time consulting to share her best‑practice frameworks with regional
    businesses.
