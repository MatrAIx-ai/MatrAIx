personas:
  professional: Pharis Stewart, a budding automotive‑technology and IT enthusiast, leverages hands‑on troubleshooting of car engines and hobbyist PC builds to excel in community‑college labs, where their
    curiosity‑driven experimentation pairs with a gentle, collaborative demeanor that makes them a natural go‑to for classmates needing patient guidance.
  sports: Pharis Stewart enjoys low‑intensity outdoor exercise, regularly hiking the Lake Erie shoreline and joining the Monroe County Trail Club, while cheering on the Buffalo Bills and watching the Rochester
    Red Wings, and occasionally plays casual basketball with a small group at the community center.
  arts: Pharis Stewart finds solace sketching comic‑style panels inspired by Jack Kirby and listening to acoustic renditions of classic folk songs by Bob Dylan while strumming quietly on their practice
    guitar, and occasionally attends local indie film screenings debuting works by emerging directors like Greta Gerwig.
  travel: Pharis Stewart favors solo, low‑stress road trips to places like the Hocking Hills State Park in Ohio and the historic streets of Providence, Rhode Island, planning itineraries loosely around
    scenic drives and tech‑store visits, while dreaming of a future backpacking adventure through the northern Japanese islands for a blend of nature and gadget culture.
  culinary: Pharis Stewart enjoys straightforward comfort foods such as homemade spaghetti carbonara with pancetta and Pecorino, experiments with building their own chicken‑and‑vegetable stir‑fry using
    soy sauce, ginger, and fresh basil, and often orders a classic pepperoni pizza from a local pizzeria when time for cooking is scarce, reflecting a modest culinary skill set balanced by occasional indulgence.
  core: Pharis Stewart is an introspective 18‑year‑old tech hobbyist whose steady curiosity fuels nightly PC builds and weekend hikes, but whose anxiety triggers occasional procrastination and impulsive
    gadget purchases.
background:
  cultural: Pharis grew up in Monroe, Michigan, a small Midwestern city shaped by its proximity to Detroit’s automotive legacy and the Great Lakes. His family reflects the region’s typical white, middle‑class
    heritage, with roots in German and Dutch immigration that value hard work, modesty, and community participation. He attended local public high school, where traditions such as Friday night football
    games, county fairs, and seasonal festivals formed a backdrop to his upbringing. Community values of cooperation, self‑reliance, and neighborly assistance are ingrained in him, influencing his preference
    for harmonious interactions and volunteer work. Regular family gatherings during holidays like Thanksgiving and Christmas reinforced a sense of belonging, while occasional church attendance provided
    a moral framework emphasizing compassion and service. This cultural milieu blends a pragmatic work ethic with an openness to new ideas, mirroring his personality’s balance of curiosity and practicality.
attributes:
  skills: '["Basic computer troubleshooting", "Routine car maintenance", "DIY home repair", "Effective listening and empathy", "Creative problem solving", "Journaling for emotional regulation"]'
  hobbies: '["Strategy video gaming", "Custom PC building", "Reading science fiction and popular science", "DIY electronics projects", "Sketching and drawing", "Acoustic guitar practice", "Hiking local
    trails", "Volunteering at animal shelter", "Journaling"]'
  career_goals: Pharis aims to enroll in a community‑college program focused on automotive technology or information technology, with the long‑term goal of becoming a certified mechanic or IT support specialist.
    He envisions an apprenticeship where he can blend hands‑on work with ongoing learning, allowing him to satisfy his curiosity while maintaining a practical, stable income. In parallel, he hopes to acquire
    certifications in network fundamentals to keep his skill set adaptable. He also wants to cultivate a career path that offers a predictable routine and supportive work environment, which he believes
    will help mitigate his anxiety and provide the emotional stability needed to pursue personal projects, such as eventually opening a small workshop that serves both automotive and custom‑PC building
    needs.
