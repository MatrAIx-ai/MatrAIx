  hobbies: '[''Journaling'', ''Puzzle solving (crosswords, Sudoku)'', ''Indoor yoga'', ''Reading productivity and self‑help books'', ''Knitting'', ''Indoor herb gardening'', ''Volunteering in community
    event planning'']'
  career_goals: Cheryl aims to complete her bachelor's degree in Business Administration within the next two years, followed by obtaining a Project Management Professional (PMP) certification. She envisions
    starting in an entry‑level project coordinator or operations analyst role at a structured, process‑driven company where she can apply her organizational talents. Long‑term, she aspires to advance to
    a managerial position overseeing workflow optimization, with the ultimate goal of shaping efficient, high‑performing teams while maintaining a balanced, low‑stress work environment.
