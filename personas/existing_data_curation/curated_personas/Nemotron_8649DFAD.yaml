personas:
  professional: Cheryl Milligan, a budding business administration student with a knack for meticulous project coordination, leverages Notion, Trello, and Excel to break down complex assignments into trackable
    milestones, showcasing their disciplined work ethic and competitive edge as they prepare for a PMP certification and an entry‑level operations analyst role.
  sports: Cheryl Milligan, a dedicated participant in her local yoga studio’s weekly Pilates class, follows the Chicago Bulls during the NBA season and roots for the Midwest minor‑league baseball team the
    St. Paul Saints, balancing solitary workouts with occasional group sports meet‑ups, which they find rewarding for both team spirit and personal discipline.
  arts: Cheryl Milligan finds solace in knitting scarves while listening to Sufjan Stevens, annotates poetry by Mary Oliver in their journal, and occasionally visits the Art Institute to admire Andrew Wyeth’s
    realist paintings, letting these artistic pursuits temper their competitive streak.
  travel: Cheryl Milligan, who spent a semester studying in Barcelona and now dreams of a meticulously planned solo trek through Kyoto’s historic temples, prefers detailed itineraries, budget‑conscious
    lodging, and slow‑paced immersion over spontaneous backpacking, a methodical approach they value for reducing uncertainty.
  culinary: Cheryl Milligan cultivates basil, rosemary, and thyme in a sunny windowsill, whipping up fresh pesto pasta and herb‑infused olive oil on weekends, while they feel most confident when following
    structured recipes from the New York Times Cooking section, which satisfy their love for precision.
  core: Cheryl Milligan thrives on meticulous order, channeling a competitive drive into structured projects, yet battles lingering worry that fuels late‑night journaling and occasional over‑planning, habits
    they both rely on and struggle to curb.
background:
  cultural: Cheryl grew up in a middle‑class family in the Midwest, specifically in St. Joseph County near Notre Dame, Indiana. Her upbringing was shaped by modest Catholic traditions common in the region,
    emphasizing punctuality, personal responsibility, and community involvement. Family gatherings often featured classic Midwestern fare, and there was a strong encouragement to pursue higher education
    as a pathway to stability. While she identifies as white, her cultural experience reflects a blend of Midwestern values—such as a steady work ethic, respect for routine, and a pragmatic outlook—combined
    with exposure to the diverse student community at Notre Dame, which has broadened her perspective on cultural inclusivity.
attributes:
  skills: '[''Time management'', ''Project planning'', ''Data analysis with Excel and SPSS'', ''Event coordination'', ''Budgeting and financial tracking'', ''Academic research and writing'', ''Public speaking'',
