  hobbies: '[''cooking and recipe experimentation'', ''gardening'', ''listening to and dancing to Bomba and Plena'', ''attending local art exhibitions'', ''reading Puerto Rican history and folklore'', ''digital
    photography walks'', ''playing dominos'', ''volunteering at church festivals'']'
  career_goals: Although retired from formal employment, Jose remains driven to contribute to his community and personal growth. He aims to document his family's memories and local stories in a handwritten
    memoir that could be shared at the community center. He wishes to teach cooking workshops that blend classic recipes with modern twists, fostering intergenerational exchange. Fueled by his curiosity,
    Jose plans to learn digital photography, capturing everyday life in Rio Grande and eventually curating a small community exhibition. He also hopes to support a youth Bomba group by providing rhythm
    instruction and occasional mentorship, ensuring the island’s musical heritage continues to thrive.
