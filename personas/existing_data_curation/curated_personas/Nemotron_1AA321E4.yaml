  hobbies: '[''soccer'', ''LEGO building'', ''Scratch programming'', ''reading adventure comics'', ''drawing cartoons'', ''helping cook Mexican dishes'', ''participating in cultural festivals'', ''hiking
    local parks'', ''playing educational video games'']'
  career_goals: Although he is only eight, Herminio already dreams of becoming a robotics engineer who can design machines that help his community. He plans to join his school’s STEM club, take extra coding
    lessons, and keep building LEGO robots. He also imagines himself as a future teacher or community volunteer, because he enjoys helping classmates understand new ideas. In the longer term he hopes to
    combine his love of technology with his desire to give back, maybe by creating educational tools for other kids. He also loves soccer and sometimes says he might become a professional player or coach,
    showing his ambition to excel in sports as well.
