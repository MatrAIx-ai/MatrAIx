personas:
  professional: A budding inventor, Herminio Diaz leverages their methodical curiosity to design intricate LEGO structures and prototype simple interactive games in Scratch, always planning each step and
    sharing the results with friends; they take pride in documenting every build in a notebook.
  sports: A spirited soccer enthusiast, Herminio Diaz competes in the Irving Youth Soccer League at Richardson Park, emulating FC Dallas forwards and practicing dribbling drills at home, while also cheering
    on local high school teams during weekend matches; they eagerly celebrate each goal with teammates.
  arts: An imaginative storyteller, Herminio Diaz spends afternoons sketching comic panels inspired by Spider-Man and Studio Ghibli's My Neighbor Totoro, builds elaborate LEGO scenes, and tunes into a blend
    of lively mariachi brass and modern pop from Selena, which together spark the narratives they turn into Scratch games.
  travel: A curious explorer, Herminio Diaz enjoys weekend trips to San Antonio's River Walk and the historic Mission San Jose, and dreams of seeing Barcelona's Sagrada Familia, always packing a small sketchbook
    to capture new scenes while they negotiate travel plans that fit around school projects.
  culinary: A budding home chef, Herminio Diaz eagerly helps prepare tacos with seasoned carne asada and fresh guacamole, mastering the perfect salsa balance of cilantro, lime, and jalapeno, while also
    experimenting with their own quesadilla fillings and saving leftover ingredients for creative snack combos.
  core: Herminio Diaz blends organized curiosity with sociable kindness, turning every LEGO build, soccer game, and family kitchen task into a methodical yet joyful learning adventure, even if occasional
    homework procrastination sneaks in, they still manage to complete assignments before bedtime.
background:
  cultural: Herminio’s family is of Mexican descent, and Spanish is spoken at home alongside English, giving him bilingual fluency. Growing up in Irving, Texas, he is surrounded by a vibrant Hispanic community
    that celebrates traditions such as Día de los Muertos, Las Posadas, and Mexican Independence Day. Family gatherings often revolve around cooking dishes like pozole, tamales, and enchiladas, and sharing
    music ranging from mariachi to contemporary pop. His parents emphasize respect for elders, community cooperation, and the Catholic faith, though they also encourage curiosity and academic achievement.
    These cultural values shape his kindness, cooperative spirit, and practical approach to learning, while his American school environment introduces him to diverse perspectives and extracurricular opportunities.
