personas:
  professional: Ezra Bryant, a 31-year-old aspiring home-repair contractor with solid plumbing, electrical, and carpentry skills, blends quiet reliability and a curiosity for new techniques to run a fledgling
    repair business while laying the groundwork for a community arts workshop that mentors local youth in photography, music, and storytelling.
  sports: Ezra Bryant follows the New Orleans Saints and the New Orleans Pelicans, joins a church basketball league in the winter, casts a line at Lake Porter during summer weekends, and squeezes in occasional
    runs along the bayou trail to stay active.
  arts: Ezra Bryant immerses himself in African-American literature by reading works by Toni Morrison and James Baldwin, draws inspiration from gospel legends like Nina Simone and blues icons such as B.B.
    King, captures rural life through photography, and shares original songs and poetry at community gatherings while admiring the murals of local artist Jeremiah Ward.
  travel: Ezra Bryant enjoys modest road trips, favoring weekend getaways to the historic French Quarter of New Orleans, the pine-forested hills of the Great Smoky Mountains, and fishing retreats at Lake
    Lanier, while dreaming of a cultural pilgrimage to Dakar to explore its vibrant music scene.
  culinary: Ezra Bryant, an adept home cook, frequently prepares family-style gumbo with Andouille sausage, okra, and file powder, fried catfish with hushpuppies, collard greens seasoned with smoked turkey,
    and jambalaya seasoned with cayenne and thyme, while occasionally treating himself to a downtown po' boy sandwich.
  core: Ezra Bryant balances a quiet, methodical handyman mindset with a restless artistic soul, often found snipping garden vines while humming gospel tunes, and has a habit of leaving tools out on the
    porch at night.
background:
  cultural: Ezra is rooted in the African-American Southern tradition of Morehouse Parish, where church, family, and community form the core of everyday life. He grew up immersed in gospel music, Creole
    and Southern cuisine, and the oral storytelling that conveys his ancestors’ histories and local folklore. The tight-knit Black community in Bastrop has shaped his values of cooperation, humility, and
    service, while also exposing him to the challenges of systemic inequality and limited educational resources. These experiences have fostered a deep respect for cultural heritage, an appreciation for
    art as a means of expression, and a commitment to uplifting those around him through both practical help and creative encouragement.
attributes:
  skills: '[''basic computer literacy'', ''handyman/DIY repairs'', ''basic plumbing'', ''basic electrical work'', ''carpentry'', ''cooking Creole and Southern cuisine'', ''gardening'', ''photography'',
