  hobbies: '[''visiting local art murals and galleries'', ''reading African-American literature and historical fiction'', ''playing acoustic guitar and songwriting'', ''photography of rural landscapes and
    community life'', ''gardening ornamental and edible plants'', ''cooking traditional Creole and Southern dishes'', ''fishing'', ''volunteering in church and community service'']'
  career_goals: Ezra aims to turn his handyman and carpentry abilities into a stable home-repair business that can provide a reliable income for his family. He plans to enroll in a local vocational program
    or community-college trade course to earn a certification in carpentry, which will open doors to larger contracting jobs. Simultaneously, he hopes to create a small community arts workshop where he
    can share his love of photography, music, and writing with local youth, fostering creativity and giving back to his neighborhood. Over the next five years, Ezra envisions achieving financial security,
    obtaining a professional trade credential, and establishing a modest but respected presence in both the trades and the local arts scene.
