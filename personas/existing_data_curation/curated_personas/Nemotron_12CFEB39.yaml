personas:
  professional: Luz Miguel, a teenage coding enthusiast and digital illustrator, blends a love for orderly design with chess‑honed strategy to create clean, well‑commented Python projects and meticulously
    detailed folklore‑inspired sketches.
  sports: Luz Miguel enjoys watching the Los Angeles Lakers basketball team and the New York Yankees baseball club on weekends, and balances the screen time with solitary jogging sessions three times a
    week, occasionally joining a community running club for a structured 5K training group.
  arts: Luz Miguel, an avid digital sketcher, draws inspiration from folklore and modern sci‑fi, admiring artists like Hayao Miyazaki, Neil Gaiman, and contemporary visual storyteller Banksy, while spending
    evenings reading works by Octavia Butler and classic literature giants such as Gabriel García Márquez.
  travel: Luz Miguel dreams of exploring Tokyo’s neon‑lit tech districts and the ancient ruins of Machu Picchu, while their recent school field trip to the Smithsonian National Air and Space Museum sparked
    a fascination with aerospace history.
  culinary: Luz Miguel, a meticulous home cook, follows precise recipes to create regional staple dishes like tamales and enchiladas, carefully measuring masa harina, chilies, and cheese, and enjoys experimenting
    with the balance of spice and texture.
  core: Luz Miguel channels a quiet, structured mind into coding, sketching, and strategic games, balancing meticulous habits with a hint of competitive edge and occasional over‑indulgence in obsessive
    spreadsheet updates.
background:
  cultural: Luz is a first‑generation Mexican‑American raised in Rancho Cordova, California. At home, Spanish is spoken daily, and family gatherings revolve around Mexican traditions such as Día de los
    Muertos, quinceañera celebrations, and weekend meals of homemade tamales. She participates in the local Latino community center, where she volunteers at cultural events and learns traditional dances.
    While she embraces her heritage, Luz also navigates the broader American school environment, blending Mexican values of family solidarity and respect with the individualistic ethos of Californian youth
    culture. This bicultural experience shapes her bilingual abilities, culinary interests, and her desire to create technology that serves both her community and a wider audience.
