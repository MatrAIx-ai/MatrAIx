  hobbies: '[''Reading (science fiction, Mexican literature)'', ''Digital illustration'', ''Chess (online and tournaments)'', ''Cooking traditional Mexican dishes'', ''Coding (Python projects)'', ''Journaling'']'
  career_goals: Luz aims to pursue a career in software engineering or data science, fields that combine her love of structure, problem solving, and independent work. In the short term, she plans to maintain
    high grades in STEM subjects, join the school’s robotics team, and earn certifications in Python. She hopes to secure a scholarship for a university with a strong engineering program and eventually
    work on developing tools that improve community access to technology, potentially focusing on bilingual educational software that bridges her Mexican heritage with her American upbringing.
