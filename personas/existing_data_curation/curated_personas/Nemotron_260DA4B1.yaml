personas:
  professional: Jorge Figueroa, an aspiring child cartoonist, blends boundless curiosity with meticulous planning to create bright, story‑driven sketches that often feature playful characters inspired by
    seaside adventures, and their organized yet flexible workflow reflects a natural talent for turning ideas into punchy frames.
  sports: Jorge Figueroa thrills on the local youth soccer field every Saturday, playing as a forward for the Riverdale Rovers while cheering on the New England Revolution and cheering loudly for the Boston
    Red Sox during baseball season, and they blend energetic drills with spontaneous dance moves inspired by salsa beats during warm‑ups.
  arts: Jorge Figueroa dives into vibrant cartoon drawing, painting bright seascapes reminiscent of island sunsets, assembling LEGO worlds, and crafting simple Scratch animations, all while idolizing artists
    like Dr. Seuss and animators from Pixar, which fuels their imagination and provides endless inspiration for colorful storytelling.
  travel: Jorge Figueroa enjoys weekend nature walks along the Charles River and local parks, dreaming of future family trips to the waterfalls of Puerto Rico, the historic streets of Old San Juan, and
    the theme parks of Orlando, balancing a love for exploration with a careful reliance on parental planning and occasional travel‑budget savings.
  culinary: Jorge Figueroa loves joining family cooking sessions, mastering the steps to prepare arroz con gandules and frying sweet plantain slices, while also experimenting with homemade pizza topped
    with mozzarella and pineapple, developing a youthful flair for mixing bold flavors and colorful ingredients.
  core: Jorge Figueroa is a curious, high‑energy nine‑year‑old who sketches bright worlds, scores goals on the soccer field, saves allowance for LEGO builds, and occasionally loses track of their antihistamines
    during playtime.
background:
  cultural: Jorge was born to Puerto Rican parents who moved to Lawrence, MA, a city with a vibrant Latino community. At home, Spanish is spoken alongside English, and he celebrates Puerto Rican holidays
    such as Fiesta de San Juan and participates in local parades that showcase island music and dance. Family traditions include cooking dishes like arroz con gandules, plantains, and pasteles, and sharing
    stories about life on the island. Jorge attends a public elementary school where he learns about American history while also participating in cultural clubs that highlight his heritage. This blend of
    Puerto Rican customs and New England life shapes his identity, giving him a strong sense of community, bilingual pride, and an appreciation for both island and mainland cultural expressions.
