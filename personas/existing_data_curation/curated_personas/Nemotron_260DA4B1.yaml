  career_goals: Jorge dreams of becoming someone who can explore the world in creative ways—whether that's an astronaut who discovers new planets, an artist who paints vibrant murals for his neighborhood,
    or a scientist who invents fun experiments for kids. He also imagines helping his community by teaching younger children how to draw, code, or play sports, combining his love for art, technology, and
    teamwork.
