personas:
  professional: Amanda Miller is a budding junior designer who builds miniature architectural models from step‑by‑step LEGO instructions, showing meticulous organization, a love for predictable structures,
    and a collaborative spirit when guiding friends; they channel this structured creativity into drawing cute characters as well.
  sports: Amanda Miller enjoys the rhythmic splash of the Junior Dolphins Swim Team in summer and the spirited matches of the Little League Tigers in spring, often cheering for the hometown baseball team,
    the River City Rovers, while balancing a love of organized play with occasional solitary bike rides, reflecting their practical, structured approach to fitness.
  arts: Amanda Miller spends afternoons sketching whimsical characters inspired by Studio Ghibli, Dr. Seuss, and the vibrant illustrations of Sara Gonçalves, while attending library storytime where they
    eagerly discuss the works of Roald Dahl and craft simple watercolor scenes of their backyard garden, highlighting a creative yet orderly artistic sensibility.
  travel: Amanda Miller’s travel diary lists a weekend hike on the easy Pine Trail at the nearby national park, a magical stay at Disney World, and a budding wish to explore the cherry blossoms of Kyoto
    and the coral reefs of Cairns, preferring organized itineraries with plenty of downtime for creative sketches.
  culinary: Amanda Miller delights in whisking chocolate chip cookies with a pinch of sea salt, mixing peanut butter into cupcakes, and experimenting with fresh basil in pasta sauce, but occasionally forgets
    to clean the countertop, reflecting their love for hands‑on cooking and a playful messiness.
  core: Amanda Miller is a sweet‑tempered, detail‑loving seven‑year‑old who balances a love for structured creative play with gentle worries that whisper through every carefully planned LEGO build and garden
    seed, and they often seek quiet moments to soothe their nerves.
background:
  cultural: Amanda grows up in a white, Irish‑German household in the diverse neighborhoods of Brooklyn, Kings County. Her family celebrates traditional American holidays such as Thanksgiving and Christmas,
    and often incorporates Irish customs like singing St. Patrick’s Day songs and baking soda bread. Living in Brooklyn exposes her to a mosaic of cultures—she frequently attends community festivals, hears
    languages ranging from Spanish to Mandarin on the street, and shares books that reflect a variety of backgrounds, fostering a respectful and inclusive outlook.
attributes:
  skills: '["Reading comprehension", "Basic arithmetic", "Organizing personal space", "Empathetic listening", "Basic computer navigation", "Board game strategy", "Following classroom routines"]'
  hobbies: '["Drawing and sketching", "LEGO building", "Reading picture books", "Storytime at the library", "Jigsaw puzzles", "Gardening with family", "Simple baking", "Organizing playdates"]'
  career_goals: Although only seven, Amanda already imagines a future where she helps others learn and feel safe. She often says she wants to be a teacher who creates a calm, well‑structured classroom,
    or a veterinarian who cares for animals with compassion. Her long‑term goal is to finish school, earn a degree, and work in a role that combines her love of order with her desire to support people and
    pets.
