personas:
  professional: Madison Taggart is a retired community organizer who leverages decades of grant‑writing, archival research, and program coordination expertise to mentor volunteers, and they bring a competitive
    drive for meticulous planning that fuels impactful heritage initiatives.
  sports: Madison Taggart follows the San Diego Padres with avid enthusiasm, participates in the Imperial Beach Senior Walking Club for daily beach strolls, and they join a local shuffleboard league each
    summer, balancing a competitive spirit with low‑impact exercise.
  arts: Madison Taggart volunteers at the town library's literary events, attends productions by the Imperial Beach Community Theatre featuring local actors such as Sarah Martinez, and they relish the historical
    novels of Hilary Mantel and the folk ballads of Joan Baez, weaving those artistic influences into their own creative writing.
  travel: Madison Taggart prefers well‑planned weekend road trips to nearby historic sites such as the Old Mission San Diego de Alcalá and the USS Midway Museum, balancing a love of cultural immersion with
    a modest retirement budget, and they occasionally dream of a cross‑country itinerary that includes Gettysburg and Colonial Williamsburg.
  culinary: Madison Taggart enjoys preparing fresh grilled fish tacos with locally caught Pacific cod, topped with cabbage slaw, avocado, fresh cilantro, and a squeeze of lime, while they experiment with
    heirloom tomatoes from their garden in a chilled gazpacho, showcasing a modest but confident kitchen skill set.
  core: Madison Taggart is a structurally minded, socially vibrant septuagenarian who blends competitive curiosity with community stewardship, turning historical passion into tangible heritage projects
    while they indulge in garden‑fresh meals and disciplined financial habits.
background:
  cultural: Madison was raised in a traditional white American household that relocated to Southern California during the 1960s. Her upbringing emphasized hard work, community service, and a deep appreciation
    for the arts, values that continue to guide her. Living in Imperial Beach, a coastal city with a vibrant Mexican‑American presence, she has adopted a relaxed, beach‑centric lifestyle while honoring
    her own cultural heritage. She identifies with the broader Californian ethos of diversity, environmental stewardship, and civic participation, which informs her community‑focused activities and her
    commitment to preserving local history.
