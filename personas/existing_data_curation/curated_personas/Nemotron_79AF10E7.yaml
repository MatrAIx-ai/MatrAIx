  career_goals: Although retired, Madison aims to complete a memoir that intertwines her family story with the history of Imperial Beach, preserving local narratives for future generations. She plans to
    launch an annual heritage festival that showcases regional art, music, and history, and to expand a mentorship program that connects seniors with youth interested in humanities studies. Staying active
    and engaged, she also aspires to travel to historic sites across the United States, deepening her own knowledge and sharing insights with her community.
