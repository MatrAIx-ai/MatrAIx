personas:
  professional: Walter Stephens is a high‑school STEM teacher who blends rigorous curriculum design with hands‑on robotics projects, leveraging their organized and methodical nature to keep lesson plans
    aligned with state standards while their outgoing, team‑oriented personality shines through as they coach the school’s robotics club and mentor new teachers.
  sports: Walter Stephens enjoys intramural basketball at Conway Community Center, hiking the Ozark foothills every other weekend, and cheering on the Arkansas Razorbacks football and basketball teams,
    while also belonging to the local Conway Amateur Basketball Club that meets for weekly pickup games.
  arts: Walter Stephens unwinds by attending live shows at the Conway Music Hall, where they gravitate toward indie rock acts like The War on Drugs, folk‑rock singer Brandi Carlile, and local folk duo The
    Hawthorne Brothers, and they also indulge in sci‑fi novels from authors such as Neal Stephenson and Octavia Butler during quiet evenings.
  travel: Walter Stephens prefers short, well‑planned road trips that blend outdoor adventure with cultural stops, having explored Hot Springs National Park, the historic streets of Eureka Springs, and
    a weekend music‑festival pilgrimage to Austin, Texas, while dreaming of a future hiking expedition to New Zealand’s South Island.
  culinary: Walter Stephens is an enthusiastic home‑cook who likes to experiment with Southern comfort dishes like shrimp and grits, smoky brisket tacos, and homemade apple pie, often using fresh herbs
    like thyme and cilantro, and they treat their Friday cooking sessions with their wife as a laboratory for trying new recipes from food blogs.
  core: Walter Stephens is a methodical, sociable STEM educator who balances a love for structured lesson planning with spontaneous board‑game nights, a habit of over‑stocking kitchen gadgets, and a persistent
    struggle to stick to regular dental appointments.
background:
  cultural: Walter was raised in a middle-class white family in central Arkansas, the son of parents who worked in manufacturing and education. His family's cultural roots trace back to English and Irish
    immigrants who settled in the South generations ago, and he grew up with the values of Southern hospitality, community involvement, and modest, work-oriented pragmatism. A lifelong member of a local
    Methodist congregation, he internalized a tradition of service that fuels his collaborative and kind demeanor. Attending the University of Arkansas for a STEM bachelor's, Walter is a first-generation
    college graduate. The regional emphasis on high-school sports, outdoor recreation, and close-knit neighborhood ties remains a core part of his identity, while his education and career aspirations reflect
    a progressive, forward-looking outlook.
