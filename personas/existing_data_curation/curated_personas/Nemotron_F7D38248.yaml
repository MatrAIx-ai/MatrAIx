personas:
  professional: Mario Edmonds, a 68‑year‑old diesel‑engine specialist with ASE Master Technician credentials in diesel, fuel systems and brakes, merges their practical curiosity for hybrid powertrains with
    a methodical, yet adaptable workshop routine; they mentor apprentices in clear, cooperative language while meticulously managing inventory and preventive‑maintenance plans for city buses and heavy‑duty
    trucks.
  sports: Mario Edmonds stays fit through leisurely beach walks, weekly rounds of golf at the Fort Lauderdale Senior Golf Club, and seasonal fishing excursions off the Intracoastal Waterway; they cheer
    the Miami Dolphins in the fall, the Miami Heat during winter, and the Tampa Bay Lightning in spring, embodying a relaxed yet consistent fitness routine.
  arts: Mario Edmonds finds artistic solace in the classic twang of Johnny Cash, the muted canvases of Edward Hopper, and the hands‑on craftsmanship of Gustav Stickley; they often listen to vintage rock‑n‑roll
    while hand‑carving tool chests and occasionally attend community‑theater performances of classic American dramas.
  travel: Mario Edmonds favors carefully planned road trips in their restored 1950s Chevrolet, cruising the coastal routes of the Florida Keys and the historic streets of Savannah; they dream of a leisurely
    cruise through the Norwegian fjords and a nostalgic visit to the Mercedes‑Benz Museum in Stuttgart, balancing a love for relaxed scenery with a penchant for automotive history.
  culinary: Mario Edmonds, a competent home cook, often prepares fresh caprese salads with garden‑grown tomatoes, basil, and mozzarella, savors a smoky shrimp gumbo spiced with pepper and cayenne, and enjoys
    grilling marinated pork chops topped with a herb‑butter glaze; they demonstrate a blend of Southern comfort and Mediterranean flair.
  core: Mario Edmonds blends a disciplined, mentor‑focused work ethic with quiet‑morning‑by‑the‑water hobbies, a habit of chatting with their toolbox during repairs, and an occasional tendency to lose track
    of time polishing the chrome on their beloved 1950s Chevrolet trucks.
background:
  cultural: Mario is a white American whose family roots trace back to Irish and German immigrants who settled in the Midwest. He grew up in a modest, blue‑collar household that emphasized hard work, practicality,
    and community support. After completing some college coursework in automotive technology, he moved to Florida in his early thirties to take advantage of the growing fleet maintenance market in South
    Florida. Living in Fort Lauderdale, he has embraced the city’s mix of coastal leisure and multicultural vibrancy, picking up bits of Spanish from his Hispanic coworkers and participating in local festivals.
    His cultural identity blends Midwestern work‑ethic values with the relaxed, inclusive atmosphere of South Florida.
attributes:
  skills: '["Diesel engine diagnostics", "ASE Master Technician (diesel)", "Electronic control module (ECM) troubleshooting", "Emissions compliance", "Hybrid/electric powertrain retrofitting", "Preventive
    maintenance planning", "Welding and metal fabrication", "Hydraulic system repair", "Machining and precision tooling", "Apprentice mentorship", "Workshop inventory management"]'
  hobbies: '["Classic truck restoration", "Fishing", "Gardening", "Reading automotive history magazines", "Volunteer mechanical work for community events", "Bridge (card game)", "Beach walking", "Woodworking"]'
  career_goals: Looking ahead, Mario hopes to transition from full‑time shop work to a part‑time consulting role where he can share his decades‑long expertise with fleet operators and vocational schools.
    He aims to develop a short‑course curriculum on modern diesel and hybrid truck maintenance for a local community college, and to publish a practical handbook on diagnosing common diesel engine failures
    for independent mechanics. While he does not plan a major career shift, he is eager to stay involved in the evolving field of alternative‑fuel heavy‑vehicle technology, and to mentor the next generation
    of technicians as a respected elder in his profession.
