  career_goals: Although officially retired, Atish remains driven by a desire to apply his curiosity and practicality to projects that benefit his community and preserve his personal legacy. He aims to
    mentor younger adults interested in trade skills through one-on-one workshops, focusing on carpentry, basic electrical safety, and cost-effective home maintenance. He also plans to contribute to the
    Putnam County Historical Society by recording oral histories of long-time residents, especially those of South Asian descent, and to compile his own memoir that interweaves family migration stories
    with life on a rural New York farm. In the coming years he hopes to attain a basic certification in digital photography so he can document his garden, local wildlife, and community events, and eventually
    publish a small photo-essay collection. These goals reflect his competitive spirit, his critical approach to learning, and his preference for meaningful, small-group engagement.
