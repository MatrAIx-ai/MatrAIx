    ''Project planning and scheduling'']'
  hobbies: '[''Intramural soccer'', ''Hiking and trail photography'', ''Beadwork and contemporary quilting'', ''Traditional Native American weaving and basket making'', ''Competitive online gaming'', ''Attending
    powwows and cultural festivals'', ''Documentary watching (textile history, technology)'', ''Yoga and mindfulness meditation'', ''Reading self‑help and personal development books'']'
  career_goals: Brandi aims to transition from a machine setter to a shift supervisor within the next three years, leveraging her disciplined work ethic and high standards for operational excellence. She
    plans to complete a bachelor’s degree in Industrial Engineering or Textile Technology, supplementing her on‑the‑job experience with formal coursework in production systems and sustainable manufacturing.
    Long‑term, she envisions founding a community‑owned textile studio that produces ethically sourced fabrics featuring Indigenous patterns, creating market opportunities for tribal artisans and promoting
    cultural preservation. To support this ambition, she seeks certifications such as Certified Manufacturing Engineer (CMfgE) and participates in leadership development programs that balance her competitive
    drive with collaborative team building. Her career roadmap also includes mentoring other American Indian youth in technical trades, helping them navigate the same pathways she values.
