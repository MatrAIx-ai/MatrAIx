personas:
  professional: Brandi Yang, an 18‑year‑old textile machine setter at a Colorado manufacturing plant, blends a curiosity for innovative production methods with a disciplined, detail‑oriented work ethic,
    using Lean tools, OSHA safety practices, and advanced Excel reporting to keep looms and high‑speed knitting machines operating within tight tolerances, while they channel their competitive streak into
    leading shift‑level visual management boards and mentoring new operators, even as their occasional skepticism prompts double‑checking team suggestions.
  sports: Brandi Yang, an avid intramural soccer and volleyball player with the Rocky Mountain Rovers club, trains three times a week at the community recreation center, cheers on the Denver Broncos, Colorado
    Rockies, and Colorado Avalanche, and they balance their competitive drive with a disciplined yoga routine to offset work‑related stress.
  arts: Brandi Yang, a budding photographer who captures Colorado’s rugged peaks in the style of Ansel Adams while experimenting with beadwork and contemporary quilting inspired by Maya Lin, relaxes by
    streaming indie folk icons like Bon Iver and listening to spoken‑word poet Andrea Gibson, and they use modern design software to fuse heritage motifs with digital art.
  travel: Brandi Yang, who loves weekend road trips, has hiked the trails of Rocky Mountain National Park and plans to trek the Inca Trail in Peru, and they often meticulously plan itineraries with topographic
    maps yet leave room for spontaneous detours to local markets and street food stalls.
  culinary: Brandi Yang, an intermediate home chef, favors hearty Colorado comfort foods like elk chili with roasted corn, black beans, and green chile, enjoys crafting quinoa salads with roasted beets,
    goat cheese, and pumpkin seeds, and they treat themselves to sushi rolls featuring avocado and spicy tuna after a long shift.
  core: Brandi Yang, an 18‑year‑old textile machine setter, channels a competitive, detail‑obsessed mind into both precise factory work and weekend sports, and they wrestle a habit of late‑night gaming
    marathons that often cuts into needed sleep.
background:
  cultural: Brandi was raised in Durango, Colorado, in a family that identifies with the Ute and broader American Indian heritage. Growing up, she participated in tribal cultural programs that taught her
    traditional weaving, beadwork, and the stories embedded in those practices. While English is her primary language, she has learned basic phrases of the Ute language from elders, recognizing the importance
    of language preservation. The region’s rich Indigenous history—visible in local archaeological sites and community events—instilled in her a strong sense of place and responsibility to honor her ancestors.
    Brandi balances this cultural pride with her modern professional life, often incorporating tribal motifs into fabric prototypes at work. She is aware of the challenges faced by Native peoples in contemporary
    society and channels her competitive nature toward creating opportunities for other Indigenous youth in the skilled trades.
attributes:
  skills: '[''Textile machine setup and operation'', ''Mechanical troubleshooting and preventive maintenance'', ''Fabric quality inspection'', ''Lean manufacturing & process optimization'', ''Safety compliance
