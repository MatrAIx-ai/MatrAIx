  career_goals: Dulce imagines a future where she works with children, preferably as an elementary school teacher who can create a warm, structured classroom while celebrating the cultures of her students.
    She also dreams of organizing after‑school clubs that combine arts, sports, and language learning, hoping to give other kids a supportive space to grow. As she gets older, she hopes to attend a university
    that values multicultural perspectives and to eventually earn a degree in education or community development.
