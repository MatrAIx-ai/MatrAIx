personas:
  professional: Dulce Villatoro, a budding team captain in her school’s soccer club, demonstrates practical quick‑thinking on the field, thrives on structured drills yet embraces flexible play, and channels
    her outgoing, cooperative nature into cheering up teammates while occasionally forgetting her water bottle because of her relaxed approach to obligations.
  sports: Dulce Villatoro, an enthusiastic member of her school’s soccer club, practices after classes, idolizes the local professional soccer team the City Strikers, and balances her energetic play with
    occasional bouts of fatigue due to her scattered sleep schedule.
  arts: Dulce Villatoro, a lively cartoon creator on her tablet, dances to upbeat rhythmic music with friends, collects stickers and colorful notebooks for artistic inspiration, and finds comfort in sketching
    whimsical characters that reflect her kind, cooperative spirit.
  travel: Dulce Villatoro, who loves weekend outings to the nearby nature reserve, dreams of visiting a coastal town with sandy beaches, prefers spontaneous day trips over rigid itineraries, and often packs
    her favorite notebook to document adventures despite occasional forgetfulness.
  culinary: Dulce Villatoro, a hands‑on kitchen helper, enjoys preparing family‑style seasoned meat pies and sweet rice pudding, experiments with colorful ingredients like mango and cinnamon, and sometimes
    rushes through recipes, leading to occasional burnt edges but a big grin and willingness to try again.
  core: Dulce Villatoro is a sociable, energetic 10‑year‑old who thrives on group activities and creative expression, yet worries easily and wrestles with a relaxed, sometimes disorganized, approach to
    obligations.
background:
  cultural: Dulce comes from a Colombian family that preserves its language, music, and culinary traditions while living in Columbus, Ohio. She speaks both Spanish and English at home, celebrates Colombian
    holidays such as Carnaval de Barranquilla and the Día de la Independencia (July 20), and participates in local Colombian community gatherings where foods like buñuelos and tamales are shared. Her household
    observes a blend of Colombian and American customs, including a weekly family dinner with arepas, and she often hears stories of her grandparents' hometowns, which reinforce a strong sense of cultural
    identity alongside the Midwestern experience of growing up in Franklin County.
