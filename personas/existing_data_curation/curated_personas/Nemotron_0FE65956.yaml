personas:
  professional: Thomas Cissone, a retired educator turned community archivist, leverages his deep knowledge of visual‑arts criticism, oral‑history interviewing, and meticulous budget management to curate
    a growing local art archive while mentoring volunteers with his calm, organized yet flexible approach.
  sports: Thomas Cissone enjoys low‑impact exercise, strolling the Sangamon Valley Trail with the Decatur Senior Walking Club, watches the Chicago Cubs and Chicago Bears on weekends, and occasionally joins
    a local senior badminton league to keep his reflexes sharp.
  arts: Thomas Cissone immerses himself in the works of Claude Monet, Georgia O’Keeffe, and the jazz improvisations of Miles Davis while listening to Beethoven’s Ninth Symphony during his watercolor sessions,
    and cherishes the theatrical performances of the Goodman Theatre when visiting Chicago.
  travel: Thomas Cissone prefers meticulously planned road trips, favoring day‑long excursions to historic sites like the Lincoln Home National Historic Site in Springfield, a weekend at the Art Institute
    of Chicago, and dreaming of a future voyage to the Renaissance galleries of Florence, Italy.
  culinary: Thomas Cissone enjoys farm‑to‑table cooking, often preparing heirloom tomato salads with basil, roasted heirloom carrots, and homemade apple crumble, and his culinary skill sits at an intermediate
    level, allowing him to preserve and ferment vegetables from his garden.
  core: Thomas Cissone blends quiet curiosity with disciplined stewardship, turning his love of art, nature, and community into a lifelong project of gentle preservation and mentorship.
background:
  cultural: Thomas was born and raised in the heart of Illinois in a family of German-American heritage with a Methodist upbringing. Growing up in the 1950s and 60s, he experienced the post-war optimism
    of the Midwest, the social changes of the civil-rights era, and the rise of counter-cultural art movements, all of which fostered his open-minded curiosity. The Midwestern values of modesty, self-reliance,
    neighborliness, and a strong sense of community continue to shape his worldview, emphasizing quiet reflection, small-group fellowship, and a deep appreciation for local history and cultural traditions.
attributes:
  skills: '[''Art appreciation and critique'',''Historical research'',''Oral history interviewing'',''Woodworking'',''Gardening'',''Digital archiving'',''Event planning for small groups'',''Mentoring'',''Writing
    and editing'',''Financial budgeting for personal projects'']'
  hobbies: '[''Visiting local art galleries'',''Watercolor painting'',''Gardening (heirloom vegetables)'',''Woodworking'',''Birdwatching'',''Chess'',''Listening to classical and jazz music'',''Road trips
    to historic sites and museums'',''Volunteering at library art programs'',''Reading art history and philosophy'']'
  career_goals: Although retired, Thomas remains driven by a desire to leave a lasting cultural legacy for Decatur. He aims to compile a community-based archive of local artists, historic photographs, and
    oral histories, and to publish a modest volume of collected stories and his own watercolor series. He hopes to mentor his grandchildren and local youth in art appreciation, continue learning through
    museum visits in Chicago and Springfield, and maintain his health and independence to stay actively engaged in community volunteer work.
