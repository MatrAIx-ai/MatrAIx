personas:
  professional: Madeline Golden is a budding builder‑in‑training who loves stacking blocks into intricate towers, using their practical curiosity to test new constructions while keeping the play area tidy,
    showing early signs of the organized yet flexible approach they’ll later bring to engineering.
  sports: Madeline Golden loves the bright green field of the Little Sprouts Soccer Club, where they chase the ball with unbridled enthusiasm, balancing energetic play with quiet moments on the bench to
    recharge.
  arts: Madeline Golden engages in finger painting inspired by the bold hues of Eric Carle’s picture books and sings along to Raffi’s Baby Beluga, weaving music and color into their daily play.
  travel: Madeline Golden’s travel adventures include a sensory‑rich day at the Monterey Bay Aquarium, a playful outing at the Chicago Children’s Museum, and a hopeful wish to someday explore the magical
    realms of Disneyland.
  culinary: Madeline Golden delights in creamy mac and cheese topped with a sprinkle of cheddar, scoops bite‑sized banana slices into their lunchbox, and proudly helps stir the batter for fluffy mini blueberry
    pancakes.
  core: Madeline Golden is a curious yet cautious three‑year‑old who balances playful exploration with a need for order, often worrying about small mishaps while delighting in music, art, and tiny triumphs.
background:
  cultural: Madeline is raised in West Liberty, Kentucky, a small town in Rowan County known for its close‑knit community and Appalachian cultural influences. Her family emphasizes hospitality, respect
    for nature, and community involvement, often participating in local festivals, church gatherings, and farm‑related traditions. While her heritage is predominantly White Appalachian, her upbringing blends
    traditional values with a supportive environment that encourages curiosity and cooperative play.
attributes:
  skills: '["basic vocabulary (≈200 words)", "color, shape, and number recognition", "simple counting to ten", "drawing basic shapes", "block stacking and spatial organization", "imitating household chores
    (e.g., wiping tables)", "self‑dressing with minimal help"]'
  hobbies: '["collecting pine cones and natural objects", "drawing and coloring", "interactive storybooks", "group play and cooperative games", "outdoor walks and nature observation", "sing‑along and music
    activities"]'
  career_goals: Although still very young, Madeline often talks about growing up and helping people. She admires her mother’s cooking and imagines being a chef, enjoys storytime about teachers and says
    she wants to "teach kids", and shows interest in caring for animals, expressing a wish to become a veterinarian. These aspirations blend her practical love for everyday tasks with her curious imagination,
    reflecting a balanced view of future roles.
