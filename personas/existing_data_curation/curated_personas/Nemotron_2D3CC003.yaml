  career_goals: Although approaching traditional retirement age, Jacob aims to transition into a mentorship-focused role, guiding the next generation of technicians and promoting a culture of safety and
    compassion in the lab. He hopes to spearhead a citizen‑science environmental monitoring program that partners with local schools and senior centers, thereby extending his impact beyond the workplace.
    Jacob also wishes to consult part‑time for regional public health agencies, helping them improve data integrity and streamline laboratory workflows while balancing his own health and stress levels.
