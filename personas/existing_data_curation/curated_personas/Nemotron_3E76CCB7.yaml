  career_goals: Sara is working toward earning her Registered Nurse (RN) license by completing a bridge program to obtain a Bachelor of Science in Nursing within the next three years, allowing her to take
    on greater clinical responsibility and supervisory roles. She plans to specialize in geriatric care, reflecting Maine’s aging population, and is pursuing certification in wound management to become
    a go‑to expert on her unit. Long‑term, she hopes to lead a small team as a charge nurse or clinical educator, where she can design structured onboarding curricula that balance her love of predictability
    with the flexibility needed for busy shifts. Sara also wants to develop a community health‑literacy project that provides bilingual resources for Asian immigrant families in Portland, leveraging her
    cultural background and competitive drive to fill a service gap. Ultimately, she aims to advance her career while preserving the quiet, solitary routine that sustains her personal well‑being.
