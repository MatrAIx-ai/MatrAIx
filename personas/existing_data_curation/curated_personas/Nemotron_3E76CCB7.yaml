personas:
  professional: An experienced licensed practical nurse, Sara Fernando leverages her practical mindset, structured protocols, and competitive drive to excel in patient assessment, wound care, and mentorship
    while quietly thriving in the fast‑paced Portland hospital environment.
  sports: A solitary fitness enthusiast, Sara Fernando hikes the rocky Maine coastline with the Portland Hiking Club in spring, follows the Portland Sea Dogs baseball season religiously, and maintains a
    weekly morning jog along the waterfront while occasionally joining a community senior volleyball league for gentle cardio.
  arts: An avid reader of historical fiction and medical memoirs, Sara Fernando devours works by Ken Follett and Atul Gawande, enjoys the folk melodies of Sufjan Stevens, listens to Ludovico Einaudi while
    knitting scarves, and attends occasional community theater productions of classic Shakespeare plays.
  travel: A lover of quiet retreats, Sara Fernando plans low‑key weekend getaways to a cabin in the White Mountains, savors off‑season visits to Acadia National Park’s tide pools, and dreams of exploring
    the tranquil gardens of Kyoto during a future solo pilgrimage.
  culinary: A meticulous home cook, Sara Fernando perfects family recipes such as ginger‑infused steamed fish, jasmine rice with toasted sesame oil, and hand‑rolled dumplings, often seasoning dishes with
    fresh basil, cilantro, and a splash of soy sauce harvested from her garden’s herbs.
  core: Sara Fernando blends a competitive, structure‑seeking nursing career with solitary hobbies—gardening, knitting, and early‑morning reading—while occasionally letting relaxed budgeting and occasional
    forgetfulness undercut her otherwise disciplined routine.
background:
  cultural: Sara’s cultural background is a blend of Asian heritage—her parents emigrated from the Philippines and Vietnam—and her lifelong residence in New England. Growing up in a bilingual household,
    she was taught the values of diligence, respect for elders, and the importance of education, which shaped her pragmatic approach to nursing. Family gatherings often featured shared meals of adobo, pho,
    and locally sourced seafood, reflecting a fusion of traditions that taught her to adapt and appreciate diverse flavors. While she embraces the quiet, community‑oriented lifestyle of Portland, Maine—favoring
    its coastal walks, local farmers’ markets, and close‑knit neighborhood ties—her Asian roots influence her approach to care, emphasizing holistic well‑being and clear communication, especially for patients
    who face language barriers. This dual cultural lens informs her professional ethos, her commitment to serving immigrant populations, and her personal preference for solitude balanced with occasional
    family connectedness.
