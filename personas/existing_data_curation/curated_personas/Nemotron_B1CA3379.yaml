  hobbies: '[''Abstract painting'', ''Mixed-media art'', ''Speculative fiction reading'', ''Poetry reading'', ''Gardening (native Southern herbs)'', ''Southern soul food cooking'', ''Church choir singing'',
    ''Keyboard playing'', ''Attending theater productions'', ''Visiting museums and art exhibitions'', ''Genealogy research'', ''Quilting'', ''Board games with friends'']'
  career_goals: Miya aims to solidify her legacy as a community artist and cultural historian. She plans to curate a traveling exhibition of her abstract works that highlights African-American experiences
    in the Piedmont region. She hopes to publish a memoir or collection of poems that intertwine personal history with broader social changes. Another ambition is to launch a weekly senior-focused art workshop
    at the local community center, mentoring youth and fellow seniors in creative expression. She also aspires to learn digital illustration tools to expand her artistic repertoire and to advocate for increased
    municipal support for arts programming in High Point.
