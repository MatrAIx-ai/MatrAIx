personas:
  professional: Miya Spencer is a community artist and cultural historian who blends their vivid imagination with a relaxed, flexible approach to organize traveling exhibitions, mentor seniors in art workshops,
    and negotiate resources for local art fairs, even if it means juggling multiple unfinished projects at once.
  sports: Miya Spencer follows the Carolina Panthers and Charlotte Hornets on television, participates in a local pickleball club at the community center during spring, and enjoys occasional Saturday morning
    walks with the High Point walking group, but their disorganized schedule sometimes leads to missed practice sessions.
  arts: Miya Spencer draws inspiration from abstract painter Helen Frankenthaler, admires the theatrical works of August Wilson, delights in the gospel sounds of The Blind Boys of Alabama, and contributes
    to quilting circles that reinterpret classic patterns into modern collages, all while occasionally debating the merits of digital illustration versus traditional media.
  travel: Miya Spencer cherishes weekend trips to Asheville’s Biltmore Estate, day excursions to Charleston’s historic waterfront, and dreams of exploring the cherry‑blossom gardens of Kyoto, preferring
    relaxed itineraries that allow spontaneous stops at local museums and herb markets, yet sometimes overpacks and forgets essential art supplies.
  culinary: Miya Spencer loves cooking soulful Southern dishes such as shrimp and grits, collard greens seasoned with smoked ham hocks, and sweet potato pie, frequently experimenting with heirloom herbs
    like sage and thyme from their garden, while their habit of tasting every stew before finishing a dish often leads to extended cooking sessions.
  core: Miya Spencer is an endlessly imaginative senior whose penchant for starting new art projects before finishing old ones fuels both creative brilliance and a perpetually cluttered studio, balanced
    by a skeptical yet competitive drive to secure resources for community arts.
background:
  cultural: Miya’s cultural background is rooted in African-American Southern traditions. Born and raised in the High Point area during the tail end of segregation, she witnessed the civil-rights movement
    firsthand, which instilled a strong sense of resilience and community activism. Her family’s roots trace back to the Great Migration, with grandparents who moved from the rural Deep South to North Carolina
    seeking better opportunities. The local Black church has been a central pillar in her life, shaping her values around fellowship, gospel music, and service. She grew up listening to blues, jazz, and
    soul, and those musical influences permeate her artistic work. The region’s rich furniture-making heritage and the story of High Point's Furniture Capital have also informed her appreciation for craftsmanship,
    evident in her mixed-media collages that incorporate reclaimed wood and fabric. Her high school education in the integrated school system of the 1970s exposed her to both Black and white cultural narratives,
    fostering a nuanced perspective that she brings to her storytelling, art, and community involvement.
attributes:
  skills: '[''Abstract painting'', ''Mixed-media collage'', ''Genealogical research'', ''Storytelling (oral and written)'', ''Improvisational problem solving'', ''Event coordination'', ''Budgeting and household
