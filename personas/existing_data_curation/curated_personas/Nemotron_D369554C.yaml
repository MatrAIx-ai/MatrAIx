  career_goals: Although retired, Randy aims to stay actively involved by leading the local senior center’s activity committee, organizing annual charity car‑show fundraisers, completing a memoir that chronicles
    his life in Mobile, and maintaining physical health through regular fishing competitions and volunteer service at his church.
