persona_description: A Chinese scholar, statesman, and poet who compiled the monumental Zizhi tongjian, a general chronicle of Chinese history from 403 BCE to 959 CE. Known for his moral uprightness, he
  was learned in several disciplines and prominent in government. His work, the Zizhi tongjian, showed evidence of rigorous critical standards and dealt with diverse subjects such as rites, music, astronomy,
  geography, and economy. He is also an excellent poet and is the hero of modern Chinese children's books, which portray him as the child who saved a playmate from drowning by breaking the water tank into
  which his friend had fallen.
