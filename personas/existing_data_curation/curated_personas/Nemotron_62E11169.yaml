personas:
  professional: Paula Nease, a diligent building inspector in training, leverages her mastery of the International Building Code and cutting‑edge GIS tools to produce meticulously annotated reports, while
    her curiosity about sustainable design drives her to integrate green standards into every site evaluation, all balanced by her disciplined schedule and cooperative communication style.
  sports: Paula Nease keeps fit through sunrise yoga at the Paterson Community Center and jogs with the Newark IronCross Running Club during spring, cheering on the New York Giants in the fall and the New
    Jersey Devils in hockey season, while she avoids competitive sports but enjoys casual pick‑up basketball at the local park to unwind.
  arts: Paula Nease expresses her artistic side by photographing the Art Deco facades of historic Paterson buildings and sketching their cornices, drawing inspiration from architectural photographer Julius Shulman
    and painter Georgia O’Keeffe, while she relaxes to the folk melodies of Bon Iver and attends monthly exhibits at the Paterson Museum featuring works by local muralist James Starks.
  travel: Paula Nease favors travel itineraries that blend architectural tours with affordable transit, having explored the historic districts of Boston, the cobblestone streets of Charleston, and the modernist
    marvels of Barcelona, and she dreams of a future study trip to Copenhagen to see Copenhagen’s sustainable housing, all while budgeting carefully and planning trips around school breaks.
  culinary: Paula Nease enjoys crafting simple, nutrient‑dense meals such as quinoa bowls with roasted seasonal vegetables, miso‑glazed salmon, and avocado toast topped with heirloom tomatoes, while she
    insists on a perfectly pulled single‑origin espresso from her hometown café and often experiments with seasonal produce at the Passaic County farmers’ market, especially love for fresh basil and smoked
    mozzarella.
  core: Paula Nease is a hyper‑organized, anxiety‑prone building‑inspection enthusiast who balances a love for historic architecture, puzzle‑solving, and sustainable design with daily yoga, coffee‑induced
    caffeine spikes, and a relentless drive to mentor young women in the trades.
background:
  cultural: Paula grew up in Paterson, New Jersey, in a family of Italian‑American heritage. Her parents, second‑generation immigrants, kept many Italian traditions alive—Sunday family lunches, celebrating
    holidays like Festa della Madonna, and an emphasis on hard work and community support. The multicultural environment of Paterson exposed her to a blend of European and Latino cultures, shaping her appreciation
    for diverse perspectives while reinforcing values like cooperation, respect, and responsibility. Although she primarily speaks English, she understands basic Italian phrases and enjoys cooking family
    recipes, which connect her to her cultural roots.
attributes:
  skills: '[''Building code interpretation'', ''Blueprint reading'', ''Site safety assessment'', ''Digital inspection software proficiency'', ''Precise record keeping'', ''Report writing'', ''Time management'',
    ''Stakeholder communication'', ''Conflict mediation'', ''Sustainable construction knowledge'']'
  hobbies: '[''Architectural photography'', ''Sketching building facades'', ''Puzzle solving'', ''Yoga and meditation'', ''Reading on sustainable design and mental health'', ''Community volunteering (home‑safety
    workshops)'', ''Urban exploration'', ''Coffee gatherings with friends'']'
  career_goals: Paula aims to complete her associate degree in construction management and earn professional certifications such as the Certified Building Inspector (CBI) and LEED Green Associate within
    the next three years. She aspires to become a senior inspector for Passaic County, eventually moving into a building‑code official role where she can influence policy and improve community safety. Long‑term,
    she envisions launching her own consulting firm that offers inspection services and training programs focused on sustainable building practices and mental‑health awareness for field workers. She also
    hopes to mentor other young women entering the trades.
