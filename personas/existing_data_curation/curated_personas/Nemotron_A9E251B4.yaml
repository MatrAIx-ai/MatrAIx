personas:
  professional: A senior geospatial analyst who blends rigorous surveyor expertise with a storyteller’s eye, Angela Cochran leverages UAV photogrammetry, Python automation, and a flair for cartographic
    design, and they lead multidisciplinary projects that turn rugged Pennsylvania terrain into intuitive, policy‑informing maps.
  sports: An avid outdoors enthusiast, Angela Cochran hikes the Bald Eagle State Forest trails, runs with the local Mountain Trail Runners club in early mornings, follows the Penn State Nittany Lions football
    team, watches Hershey Bears hockey games on weekends, and they often organize group trail runs that blend camaraderie with a love of the landscape.
  arts: A vibrant member of the Ridge Art Collective, Angela Cochran contributes mural sketches that celebrate the region’s geological layers, curates photo exhibitions inspired by Ansel Adams, regularly
    attends gallery openings featuring artist Julie O’Rourke, participates in improv workshops at the Centre County Theatre, and they often improvise scenarios that weave cartographic puns into performance.
  travel: A meticulous planner with a wander‑lust for dramatic landscapes, Angela Cochran has photographed the cliffs of Iceland’s Golden Circle, trekked Shenandoah’s Skyline Drive, savoring the autumn
    colors, and they dream of a future expedition to Patagonia’s Torres del Paine, preferring trips that blend aerial photography opportunities with rugged hiking.
  culinary: A curious home chef, Angela Cochran mixes global flavors by whipping up Thai green curry with fresh lemongrass and kaffir lime, crafts hand‑rolled pierogi stuffed with potato and cheddar from
    her garden’s harvest, perfects sourdough loaves using heirloom wheat, and they always finish dishes with a drizzle of locally sourced lavender honey.
  core: Angela Cochran is a data‑driven cartographer who balances farm‑rooted pragmatism with artistic curiosity, turning aerial shots into vibrant maps while juggling drone upgrades, weekend hikes, and
    experimental cooking, and they occasionally forget to water their office succulents.
background:
  cultural: Angela was born and raised in central Pennsylvania, a region shaped by a blend of Appalachian traditions and a strong university presence. Her family background is rooted in a multigenerational
    farming community that values self-reliance, community cooperation, and a deep appreciation for the natural landscape. Growing up near Penn State's research environment, she was exposed early to scientific
    inquiry and the collaborative spirit of campus life. This mix of rural heritage and academic exposure fostered her pragmatic yet curious worldview, encouraging both a respect for the land and a desire
    to explore new ideas. While she identifies as white American, she embraces the cultural mosaic of Centre County by participating in local festivals, supporting regional artisans, and advocating for
    inclusive STEM education.
attributes:
  skills: '[''Surveying (total stations, GNSS, GPS)'', ''UAV photogrammetry'', ''LiDAR processing'', ''GIS analysis (ArcGIS Pro, QGIS)'', ''Cartographic design'', ''Remote sensing'', ''Spatial data visualization'',
    ''Python (GDAL, Shapely, Pandas)'', ''R (spatial statistics)'', ''AutoCAD and MicroStation drafting'', ''Project management'', ''Client communication'', ''Team leadership and mentorship'', ''Data quality
    assurance (QA/QC)'']'
  hobbies: '[''Aerial drone photography'', ''Hiking and trail exploration'', ''Sketching and plein-air drawing'', ''Participating in local art galleries and mural projects'', ''Improv theater and group
    performances'', ''Board-game gatherings'', ''Cooking international dishes'', ''Mentoring STEM outreach programs'', ''Gardening'']'
  career_goals: Angela aims to become a senior geospatial analyst and eventually a director of a spatial data innovation lab within a state agency or a consulting firm. She plans to earn a professional
    land surveyor license and pursue a Master's degree in Geomatics to deepen her expertise in 3D city modeling and AI-driven image interpretation. Over the next five years she hopes to lead interdisciplinary
    projects that integrate artful cartography with public-policy data, publish research on automated feature extraction from drone imagery, and mentor underrepresented students in STEM through local outreach
    programs. Long-term, she envisions shaping regional infrastructure planning by delivering high-resolution, interactive geospatial platforms that support community decision-making.
