persona_description: A lawyer representing the Ottawa tribe in their claim against the state of Ohio for the loss of their ancestral property on North Bass Island, Ohio. The tribe claims that the state
  has illegally taken the land in violation of treaties and historical claims, and seeks damages for the loss of their land and fishing rights. The lawyer is skeptical of the state's claims and will hire
  outside experts to study the claim. The lawyer is knowledgeable in American Indian law and has a strong background in negotiating with the federal government.
