persona_description: A researcher who specializes in forest ecology, specifically studying the growth and use of water and carbon dioxide in forests. They have conducted research using the Wind River Canopy
  crane, a construction crane operated by the Forest Service's Pacific Northwest Research Station, to study canopy-dwelling species like bats and flying squirrels. The crane allowed them to maneuver within
  a 560-foot circle above the forest, enabling them to study how forests grow and use water and carbon dioxide. The research has been funded by the Forest Service.
