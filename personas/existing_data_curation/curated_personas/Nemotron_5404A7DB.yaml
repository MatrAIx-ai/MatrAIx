  hobbies: '["Drawing and finger painting", "Dancing to Latin music", "Building wooden block towers", "Exploring nature (insects, butterflies)", "Attending storytime at the library", "Singing bilingual
    nursery rhymes", "Helping with family cooking (making tortillas)", "Pretend space explorer games"]'
  career_goals: Alvaro dreams of becoming an “astro‑artist” who travels to space and draws the planets he discovers, blending his love for drawing, curiosity about the universe, and fascination with adventure.
    He also imagines being a “superhero” who helps friends and shares stories, showing his desire to help others while expressing himself creatively. In the short term, he wants to be a “big helper” at
    home, like a chef’s assistant, and to lead the playground’s pretend‑explorer games.
