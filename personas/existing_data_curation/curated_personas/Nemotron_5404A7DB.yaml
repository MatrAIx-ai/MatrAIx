personas:
  professional: Alvaro Rosado, a four‑year‑old pretend chef who runs a make‑believe restaurant in his play kitchen, mixing imaginary ingredients and orchestrating the stuffed‑animal customers while navigating
    occasional chaotic spills with a relaxed, flexible approach to rules.
  sports: Alvaro Rosado, a four‑year‑old who sprints across the neighborhood park playing soccer in a tiny Barcelona jersey, cheers loudly for the local youth club’s Little Tigers team, and treats each
    recess as a mini‑tournament, even as their shoe laces frequently come undone in the excitement.
  arts: Alvaro Rosado, a four‑year‑old who splashes watercolors across oversized sheets while humming The Wiggles, stages impromptu dance numbers for family gatherings, and hoards crayons like treasure,
    channeling curiosity into bright, unconventional creations.
  travel: Alvaro Rosado, a four‑year‑old who dreams of the dazzling lights of Disneyland after watching cartoons about the Magic Kingdom, delights in weekend trips to the seaside, and prefers spontaneous
    road trips over meticulously planned itineraries, often packing a favorite stuffed animal for comfort.
  culinary: Alvaro Rosado, a four‑year‑old who adores cheesy macaroni, chicken nuggets, and sliced strawberries, proudly helps stir batter with a wooden spoon, yet habitually forgets to eat vegetables,
    claiming the broccoli looks like tiny trees.
  core: Alvaro Rosado is a curious, energetic four‑year‑old whose love of art, playful chaos, and spontaneous adventures turns everyday moments into colorful, slightly mess‑filled learning experiences.
background:
  cultural: Alvaro is a Mexican‑American child raised in a bilingual household in Modesto, California. His family celebrates Mexican holidays such as Día de los Muertos and Cinco de Mayo, and they speak
    Spanish at home while also using English at school and in the community. He enjoys traditional foods like tamales, pozole, and fresh salsa, and he participates in local cultural events at the Modesto
    Hispanic Center. This blend of Mexican heritage and Californian environment nurtures his love for vibrant colors, rhythmic music, and community‑oriented values, shaping his curiosity, sociability, and
    appreciation for art.
attributes:
  skills: '["Basic bilingual communication (English & Spanish)", "Crayon drawing and coloring", "Puzzle assembly (up to 12 pieces)", "Counting to ten and recognizing shapes/colors", "Singing bilingual nursery
