persona_description: A professional in the field of broadcast engineering who is responsible for the deployment and optimization of IP-based broadcast networks. This individual is knowledgeable about the
  convergence of broadcast infrastructures to IP and the capabilities of IP and MPLS networks to support video services. They are also aware of the adoption of IPv6 as the next generation of IP and the
  need for a large IP address space to support the increasing number of devices connected via IP and the services that rely on peer-to-peer and mobility-focused communication. The persona is skilled in
  designing and deploying IP-based broadcast networks, and is aware of the compatibility issues between IPv4 and IPv6 and the importance of aligning the boundaries between the two domains. They are also
  familiar with the features and capabilities of IPv6, including multicast, QoS, and network convergence, and are able to explain these concepts to others.
