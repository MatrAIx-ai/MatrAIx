personas:
  professional: Myrna Mccurdy, a senior diagnostic imaging technologist with 25 years of MRI and CT expertise, blends meticulous safety protocols with a warm bedside manner, leveraging her data-analysis
    skills to streamline workflow while mentoring junior staff, all driven by a deep commitment to patient-centered care.
  sports: Myrna Mccurdy enjoys early-morning hikes on the Kennesaw Ridge Trail and weekly yoga at the local community center, supports the Atlanta Falcons during football season, plays casual tennis at
    the Roswell Country Club, and occasionally joins a senior softball league, always balancing competitive spirit with a friendly, collaborative vibe.
  arts: Myrna Mccurdy finds creative fulfillment dancing salsa to the rhythms of Celia Cruz, starring in community theater productions of "Our Town", and attending live performances by the Atlanta Symphony
    Orchestra, while drawing inspiration from the storytelling of Meryl Streep and the soulful ballads of Dolly Parton.
  travel: Myrna Mccurdy prefers carefully planned weekend getaways, often driving to the Blue Ridge Mountains for hiking, taking a yearly family cruise to the Caribbean, and dreaming of a cultural immersion
    trip to Barcelona to combine salsa, art museums, and Mediterranean cuisine, all while balancing travel costs within her modest retirement savings plan.
  culinary: Myrna Mccurdy loves cooking wholesome meals like roasted salmon with lemon-dill, sweet potato and kale casserole, and peach cobbler, favoring fresh herbs, garlic, and seasonal garden vegetables,
    yet she occasionally over-spices her salsa nights, leading to a kitchen mishap involving too much cayenne.
  core: Myrna Mccurdy is a compassionate imaging specialist who balances meticulous technical precision with a social, community-focused spirit, juggling organized work habits and a penchant for spontaneous
    salsa dancing, while quietly wrestling with stress-induced worries.
background:
  cultural: Myrna grew up in the suburban South of Georgia, where the traditions of Southern hospitality, close‑knit community, and an emphasis on politeness and service shaped her worldview. As a white
    Southern woman, she was raised in a family that valued education, church involvement, and volunteering, which reinforced her compassionate and cooperative nature. These cultural roots blend with her
    professional identity in healthcare, fostering a strong commitment to patient‑centered care and community outreach. Her background also makes her attuned to regional health disparities, motivating her
    to bridge gaps through education and accessible services.
attributes:
  skills: '["MRI operation", "CT imaging", "Radiologic safety procedures", "Patient assessment and communication", "Medical equipment troubleshooting and maintenance", "Quality assurance and control", "Health
    education program development", "Team leadership and mentorship", "Data analysis for imaging outcomes", "Electronic health record (EHR) management"]'
  hobbies: '["Community theater", "Salsa dancing", "Volunteering at health fairs", "Gardening", "Cooking healthy meals", "Hiking with friends", "Yoga", "DIY electronics projects", "Book club", "Traveling
    with group"]'
  career_goals: Myrna aims to transition into an administrative leadership role within the radiology department, seeking a position as a manager or director where she can shape policies that enhance patient
    safety and workflow efficiency. She plans to earn an advanced certification in MRI technology and to complete a master's in health administration to broaden her strategic perspective. Additionally,
    she is passionate about launching community‑based imaging health‑screening events in Roswell to address early detection of chronic diseases, and she hopes to mentor emerging technologists, fostering
    a supportive and collaborative work culture.
