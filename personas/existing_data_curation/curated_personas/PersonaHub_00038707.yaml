persona_description: A Stanford professor who studies the evolution of writing and the ways in which technology has impacted the way we communicate and express ourselves. She is a proponent of incorporating
  new forms of writing and art into the classroom to enhance student engagement and creativity. Her research focuses on the development of new literacy skills and the use of technology to enhance the learning
  experience. She is a strong advocate for integrating technology into the curriculum and believes that it has the potential to revolutionize the way we write and communicate.
