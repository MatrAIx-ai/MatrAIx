personas:
  professional: Steven Claybon, a veteran industrial and refractory machinery mechanic with two decades of hands‑on expertise, leverages meticulous diagnostic skills, OSHA‑compliant safety practices, and
    a collaborative mentorship style to keep high‑temperature furnace systems humming while eyeing a lead maintenance supervisor role that will let them shape protocols and schedule predictability.
  sports: Steven Claybon enjoys the camaraderie of a local recreational basketball league, cheering for the New York Knicks while drafting weekend fishing trips on the Hudson River, and balances these activities
    with a membership at a community gym where they focus on functional strength training to support their physically demanding job.
  arts: Steven Claybon’s auditory palate ranges from Miles Davis jazz sessions during workshop breaks to classic soul playlists while grilling, and they occasionally unwind with a late‑night listening session
    of Kendrick Lamar’s newest album, believing music fuels their hand‑eye coordination for precise welding.
  travel: Steven Claybon prefers road trips that combine hands‑on exploration and relaxation, having driven a vintage Harley‑Davidson along the Blue Ridge Parkway and planning a future weekend getaway to
    the Adirondacks for fishing and cabin woodworking retreats, all while keeping travel itineraries tightly scheduled around family commitments.
  culinary: Steven Claybon is the resident barbecue maestro, mastering a slow‑smoked pork shoulder infused with hickory wood chips and a secret dry rub of paprika, brown sugar, and mustard powder, while
    also enjoying the practical challenge of crafting a custom smoker from reclaimed steel.
  core: Steven Claybon blends rugged mechanical mastery with a compassionate mentor’s heart, balancing meticulous safety standards and a love for vintage motorcycles, yet often worries about schedule unpredictability
    and can’t resist a good barbecue sauce.
background:
  cultural: Steven grew up as a Black New Yorker in a close‑knit, working‑class neighborhood of Manhattan, surrounded by the rich tapestry of African American, Caribbean, and African immigrant cultures
    that define the city. Family gatherings, block parties, and local churches reinforced values of perseverance, community support, and mutual aid. Exposure to the vibrant music scene—from jazz clubs in
    Harlem to hip‑hop on the streets—shaped his appreciation for rhythm and storytelling. The challenges of navigating life without a formal high‑school diploma fostered a strong sense of self‑reliance,
    while his cultural heritage instilled a deep commitment to helping others, particularly younger members of his community. These experiences inform his pragmatic work ethic, his collaborative spirit
    on the job, and his dedication to mentorship and community service.
attributes:
  skills: '["Mechanical troubleshooting", "Industrial machinery maintenance", "Welding and fabrication", "Hydraulic and pneumatic systems", "Preventive maintenance planning", "Safety compliance", "Team
