  hobbies: '["Restoring vintage motorcycles", "Woodworking", "Fishing", "Recreational basketball", "Listening to jazz, soul, and hip‑hop", "Reading technical manuals", "Mentoring youth in robotics", "Cooking
    and barbecuing"]'
  career_goals: Steven aims to transition into a lead maintenance supervisor role where he can shape safety procedures and schedule planning for his department. He plans to earn a GED and pursue certifications
    such as Certified Maintenance & Reliability Technician (CMRT) and HVAC/R specialist credentials. Mentoring younger workers and establishing a small, community‑focused machine repair shop are long‑term
    ambitions. He also seeks a more predictable work schedule to reduce stress, improve work‑life balance, and create space for his personal interests and family responsibilities.
