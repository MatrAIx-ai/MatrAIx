  career_goals: Batul aims to move from a clerk position to a supervisory role within the next three years, targeting a title such as Inventory Supervisor or Logistics Team Lead. She plans to enroll in
    a part‑time supply‑chain certification program (e.g., the APICS Certified in Logistics, Transportation and Distribution) to formalize her knowledge. In the medium term, she hopes to lead process‑improvement
    projects that blend her analytical skills with her artistic eye, such as redesigning inventory dashboards with visual storytelling. Ultimately, she envisions launching a modest online boutique where
    she can sell her own artwork and handcrafted items, leveraging her logistics expertise to manage fulfillment while preserving a flexible, low‑stress work schedule.
