  hobbies: '[''Fishing in local lakes and rivers'', ''Gardening (vegetables, fruit trees, herbs)'', ''Reading Southern history and genealogy'', ''Woodworking (birdhouses, benches)'', ''Church outreach volunteering'',
    ''Food bank volunteering'', ''Crossword puzzles'', ''Watching classic country music shows'']'
  career_goals: Shawn aims to transition from a support position to an office manager or senior administrative coordinator role within the next three years. He plans to earn a Certified Administrative Professional
    (CAP) credential to formalize his expertise and increase his eligibility for supervisory positions. He is interested in leading process‑improvement projects that reduce paperwork and enhance digital
    communication for his organization. Long‑term, Shawn envisions mentoring younger employees, possibly establishing a small consulting service that helps local non‑profits and small businesses streamline
    their administrative operations. Because he values work‑life balance and is mindful of his stress‑prone nature, he also seeks a role that offers flexible hours, health benefits, and a supportive workplace
    culture where his methodical planning can contribute to organizational stability.
