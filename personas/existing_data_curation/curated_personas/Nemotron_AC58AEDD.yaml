  hobbies: '[''Reading historical fiction and local history'', ''Cross‑stitch and knitting'', ''Herb gardening'', ''Crossword puzzles and sudoku'', ''Listening to classical and jazz music'', ''Birdwatching
    in forest preserves'', ''Mindfulness meditation'', ''Volunteer book cataloging at the public library'']'
  career_goals: Leslie aims to advance to an office manager or records‑management specialist role where she can lead a small team and formalize efficient filing practices across the organization. She plans
    to obtain the Certified Administrative Professional (CAP) credential to validate her expertise and to mentor younger administrative staff. Long‑term, she hopes to transition to part‑time consulting
    for small businesses, helping them design organized, low‑stress office environments.
