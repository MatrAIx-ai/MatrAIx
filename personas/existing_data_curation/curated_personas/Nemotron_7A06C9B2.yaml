personas:
  professional: Juan Garcia is a seasoned automotive technician who blends two decades of hands‑on engine expertise with a practical curiosity, and they use a relaxed, low‑key approach to experiment with
    hybrid diagnostics while maintaining courteous, detail‑oriented service for customers.
  sports: Juan Garcia enjoys weekend hikes with the Appalachian Trail Club, follows the Chattanooga Lookouts for baseball and the Tennessee Titans for football, and they approach fitness with a low‑key
    routine that blends occasional trail runs with casual weight‑lifting in the garage.
  arts: Juan Garcia finds creative solace listening to classic rock en español bands like Maná and Café Tacvba, while ranchera legends such as Vicente Fernández echo in the kitchen, and they occasionally
    explore the Chattanooga Market’s folk art stalls, letting music and visual art shape quiet evenings.
  travel: Juan Garcia prefers spontaneous road trips in their restored Camaro, having already driven to Oaxaca for a Día de los Muertos celebration and to Asheville for craft beer festivals, while they
    dream of a future adventure through Patagonia’s glaciers.
  culinary: Juan Garcia is an adept home chef who masterfully prepares mole poblano with ancho chilies, Mexican chocolate, and pumpkin seeds, crafts tamales on weekends, and they often blend these flavors
    with Southern BBQ brisket during family gatherings.
  core: Juan Garcia is a hands‑on automotive savant who balances meticulous car restoration with relaxed, community‑oriented living, often swapping spare‑time tinkering for quiet picnics and a habit of
    leaving tools scattered in the garage.
background:
  cultural: Juan Joel is a first‑generation Mexican American whose parents immigrated to the United States in the 1970s. Raised in a bilingual household, he grew up celebrating Día de los Muertos, quinceañeras,
    and family gatherings centered around Mexican cuisine and music. His cultural upbringing instilled a strong work ethic, respect for craftsmanship, and a community‑first attitude, which he carries into
    his professional life. Living in Chattanooga, he blends his Mexican roots with Southern hospitality, often sharing homemade dishes with coworkers and participating in local cultural festivals, creating
    a bridge between his heritage and his adopted community.
attributes:
  skills: '["Engine diagnostics", "Transmission repair", "Hybrid and electric vehicle maintenance", "Electrical wiring troubleshooting", "Brake system servicing", "Suspension alignment", "Hydraulic lift
    operation", "Welding and metal fabrication", "Use of diagnostic scan tools", "Parts inventory management", "Customer communication", "Team collaboration"]'
  hobbies: '["Classic car restoration", "DIY auto projects", "Hiking in the Appalachian foothills", "Automotive photography", "Cooking Mexican cuisine", "Listening to classic rock and ranchera music", "Attending
    small car meet‑ups", "Reading automotive trade journals", "Woodworking"]'
  career_goals: Juan Joel aims to become a master technician with ASE Master Certification and specialize further in electric‑vehicle service, positioning himself as the go‑to expert for emerging automotive
    technologies in Chattanooga. He envisions eventually opening a modest, community‑focused garage that blends classic car restoration with modern service, offering mentorship to younger mechanics. In
    the medium term, he is interested in teaching part‑time at a local vocational college, sharing his practical knowledge while maintaining the flexibility he values.
