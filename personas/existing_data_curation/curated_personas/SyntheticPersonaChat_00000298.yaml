    User 1: Okay, let''s set up the game.

    (They set up the game and start playing.)

    User 1: So, the goal of the game is to cure four diseases before they spread too far and kill everyone.

    User 2: Oh, that sounds really difficult.

    User 1: It can be, but it''s a lot of fun.

    (They continue playing for a while.)

    User 1: We''re doing really well! We''ve already cured two diseases.

    User 2: This is exciting! I don''t think I''ve ever made it this far before.

    User 1: Well, you''re doing a great job.

    (They continue playing.)

    User 1: We did it! We cured all four diseases!

    User 2: We won! That was so much fun!

    User 1: I know, right? I''m so glad we played.

    User 2: Me too. We should do it again sometime.

    User 1: Definitely.


