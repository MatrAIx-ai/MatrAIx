  hobbies: '[''Basketball (adult league)'', ''Karaoke'', ''Cooking Chinese cuisine'', ''Community volunteering'', ''Attending cultural festivals'', ''Tech podcasts'', ''Productivity literature'']'
  career_goals: Hai Ja aims to transition from a general clerk role to a supervisory position within the next three years, leveraging his disciplined work ethic and high standards. He plans to obtain a
    GED and pursue a Certified Administrative Professional (CAP) credential to strengthen his qualifications. Long‑term, he envisions moving into operations management, where he can apply his process‑optimization
    mindset on a larger scale. Simultaneously, he is exploring the possibility of launching a niche online store that offers specialty Asian snacks, combining his entrepreneurial curiosity with practical
    market research.
