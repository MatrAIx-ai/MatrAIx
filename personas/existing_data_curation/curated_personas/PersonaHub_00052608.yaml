persona_description: A visionary and pioneering figure in the field of bilingual higher education, dedicated to creating opportunities for Hispanic adults to access and succeed in four-year degree programs.
  The founder of St. Augustine College in Chicago, the College is a unique institution that aims to bridge cultural and educational gaps, reinforce cultural interaction, and build a bridge to fill socio-economic
  gaps. The College is based on years of community work performed by the Spanish Episcopal Services, an educational agency created under the auspices of the Episcopal Diocese of Chicago by Father Carlos
  A. Plazas, Ph. D., in 1970. The College is accredited by The Higher Learning Commission of the North Central Association of Colleges and Schools.
