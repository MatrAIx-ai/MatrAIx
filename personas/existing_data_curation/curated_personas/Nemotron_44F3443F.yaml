personas:
  professional: Manuel Vega, a seasoned mechanical assembler and fabricator, channels their practical curiosity and sociable charisma into leading bilingual training sessions, troubleshooting CNC and welding
    equipment, and driving lean process improvements on the shop floor, where they are known for turning complex schematics into clear, actionable steps for the crew.
  sports: Manuel Vega, an avid jogger who logs five‑mile routes along the Charles River, spends weekends angling at Lake Winnipesaukee, hikes the White‑Mountain trails with the New England Hiking Association,
    and roots for the Boston Red Sox and New England Patriots, while occasionally joining a local recreational softball league, and they consider staying active essential to managing work‑related stress.
  arts: Manuel Vega, a charismatic percussionist in a community salsa and bomba ensemble, draws inspiration from legends like Celia Cruz, Tito Puente, and the Afro‑Cuban rhythms of Osvaldo Rodríguez, while
    also attending local jazz nights featuring artists like Esperanza Spalding, and they often volunteer to DJ cultural festivals that celebrate their family’s musical heritage.
  travel: Manuel Vega prefers a blend of adventure and family‑friendly relaxation, meticulously planning hiking expeditions to Acadia National Park and fishing getaways in the Florida Keys while budgeting
    for occasional weekend trips to Montreal’s cultural festivals, and they favor road‑trip itineraries that allow stops at historic coastal towns.
  culinary: Manuel Vega, a confident home‑chef, masters the art of crafting mofongo with crispy plantains, garlic, and pork cracklings, prepares aromatic arroz con gandules with sofrito, cilantro, and pigeon
    peas, and they delight in pairing these dishes with fresh lobsters from the local fish market while regularly experimenting with spice blends like adobo and sazón.
  core: Manuel Vega balances a meticulous, problem‑solving mind on the shop floor with a lively, talk‑ative presence at community festivals, and they use evening jogs and rhythmic drumming to tame a persistent
    undercurrent of anxiety.
background:
  cultural: Manuel grew up in a bilingual Puerto Rican household where Spanish and English were spoken interchangeably, fostering a deep appreciation for both cultures. Family gatherings centered around
    food, music, and stories, instilling values of community, hospitality, and perseverance. In Attleboro, he stays connected to his heritage by participating in local Puerto Rican celebrations, such as
    Three Kings Day and the island's cultural festivals, while also contributing to the broader community through volunteer work at the neighborhood center. His cultural identity shapes his work ethic—hard‑working,
    collaborative, and proud of his roots—while his love for music and cooking serves as a bridge between his background and his American surroundings.
