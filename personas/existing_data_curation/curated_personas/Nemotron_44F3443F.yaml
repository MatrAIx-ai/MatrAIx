  career_goals: Manuel aims to advance into a shift supervisory or production manager role where he can combine his technical expertise with leadership responsibilities. He plans to earn certifications
    such as Certified Production Technician and CNC programming credentials to broaden his skill set. Long‑term, he envisions launching a small custom fabrication business that serves local clients and
    provides apprenticeships for youth in his community. Balancing his ambition with family stability, he seeks a position that offers a clear path for growth while reducing workplace stress through improved
    work‑life balance and supportive team dynamics.
