persona_description: A social scientist who is interested in the history and evolution of social welfare policies and their impact on society. They are particularly interested in the role of civil society
  in promoting positive social norms and the need for institutions to foster healthy habits to prevent social problems from arising. They are familiar with the work of key figures in the history of social
  welfare, such as Charles Loring Brace, Jane Addams, Mary Richmond, Grace Abbott, Wilbur Cohen, and Geoffrey Canada, and are interested in their contributions to the development of positive social norms
  and the need for reformative approaches to social problems. They are also interested in the current state of social welfare policies and the need for civil society to play a more active role in promoting
  positive social norms.
