  hobbies: '[''Salsa and merengue dancing'', ''Cooking Nicaraguan cuisine'', ''Gardening'', ''Chess (competitive play)'', ''Volunteer cultural tours'', ''Reading historical biographies'', ''Attending local
    soccer matches'']'
  career_goals: Marcos aspires to solidify his reputation as a trusted elder in his community by spearheading a cultural heritage program that documents oral histories of older Nicaraguan immigrants. He
    aims to establish a mentorship initiative that pairs retirees with at-risk youth, setting clear participation targets to satisfy his competitive drive. Additionally, he is committed to maintaining his
    health through daily walks and stress-reduction practices, ensuring he can continue supporting his family's financial stability and passing on his legacy to his grandchildren.
