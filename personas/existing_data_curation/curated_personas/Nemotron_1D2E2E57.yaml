    local trails", "Listening to indie/instrumental music"]'
  career_goals: Benito aims to complete his high school education through a GED and then enroll in a community college where he can study computer science or mechanical engineering. He envisions a career
    that blends his love for technology and hands‑on creation, such as becoming a software developer who builds utility tools, or a technical specialist who runs a small electronics repair shop in his hometown.
    In the longer term, he hopes to launch an online channel that reviews and demonstrates DIY tech projects, combining his technical expertise with his interest in sharing knowledge.
