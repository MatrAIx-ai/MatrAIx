  career_goals: Myrelis aims to transition from a senior analyst role to a leadership position within the analytics function of a multinational corporation or a consultancy specializing in operations research.
    Over the next five years she plans to earn the Certified Analytics Professional (CAP) credential, publish at least two case‑study articles in INFORMS journals, and become a regular speaker at industry
    conferences. She is driven to build and mentor a high‑performing team of analysts, champion data‑driven decision making across the organization, and eventually influence strategic direction as a director
    of operations analytics. Her curiosity pushes her to stay abreast of emerging optimization algorithms, while her competitive nature motivates her to benchmark her team's performance against top industry
    standards.
