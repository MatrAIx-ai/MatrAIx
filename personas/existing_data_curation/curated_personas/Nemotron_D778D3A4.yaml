  hobbies: '[''Digital drawing'', ''Manga reading'', ''Photography'', ''Nature sketching'', ''Ambient music listening'', ''Philosophy reading'', ''Mindfulness meditation'', ''Generative art coding'', ''Calligraphy'',
    ''Short story writing'']'
  career_goals: Aurora dreams of turning her passion for visual storytelling into a sustainable career. In the short term, she plans to build a polished portfolio and enroll in a community college art program
    or a specialized art school in the Bay Area. Long‑term, she envisions working as a freelance concept artist for indie video‑game studios or animation projects, eventually establishing her own small
    studio that offers custom illustration and design services to clients worldwide. She values flexibility and the ability to work from quiet studio spaces, which aligns with her desire for autonomy and
    low‑stress environments. She also hopes to integrate her modest coding skills to create interactive digital art installations.
