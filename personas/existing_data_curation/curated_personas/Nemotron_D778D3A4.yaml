personas:
  professional: An aspiring concept artist and generative art coder named Aurora San blends digital illustration with Python scripts to create whimsical indie‑game assets, leveraging a keen visual memory
    and a preference for solitary, flexible studio time while often missing formal deadlines.
  sports: Aurora San prefers low‑key physical activity, attending weekly yoga classes and practicing tai‑chi in a local park while cheering for the San Jose Sharks and occasionally joining friends for casual
    basketball pickup games at the high school gym, but avoids competitive sports due to a desire for quiet, unscheduled downtime.
  arts: An avid digital painter, Aurora San spends evenings drawing to lo‑fi beats, collecting manga and sketchbooks, practicing Mandarin calligraphy, and drawing inspiration from Hayao Miyazaki, Makoto
    Shinkai, and contemporary digital artist Loish, while also admiring the brush‑stroke elegance of traditional landscape masters.
  travel: With a love for spontaneous exploration, Aurora San enjoys weekend road trips to Yosemite’s misty valleys, a yearly pilgrimage to the Mid‑Autumn Festival lantern display in San Mateo, and dreams
    of attending a spring anime convention in Tokyo, all while favoring flexible itineraries over rigid tour packages.
  culinary: An adventurous home cook, Aurora San delights in crafting hand‑rolled dumplings during family New Year celebrations, perfecting matcha‑infused bubble tea, experimenting with miso‑glazed salmon,
    and indulging in buttery croissants and spicy ramen, often scrolling through food blogs for new fusion recipes.
  core: Aurora San, a 17‑year‑old visual storyteller, balances solitary creative bursts with occasional impulsive spending, mindful anxiety management, and a love for quiet wanderings, all wrapped in a
    habit of late‑night sketching and passion for cultural festivals.
background:
  cultural: Aurora is a second‑generation Chinese‑American. Her parents immigrated to the Bay Area in the early 2000s, and she grew up in a bilingual household where Mandarin and English are spoken interchangeably.
    Family gatherings feature traditional celebrations such as Chinese New Year, the Mid‑Autumn Festival, and homemade dumplings, while her friends and school environment expose her to the multicultural
    fabric of Silicon Valley. She feels a strong connection to Chinese cultural aesthetics, which influences her artistic style, especially in the use of brush‑like strokes and symbolic motifs. At the same
    time, she embraces the individualistic and tech‑forward ethos of California, balancing respect for familial expectations with her own unconventional creative aspirations.
