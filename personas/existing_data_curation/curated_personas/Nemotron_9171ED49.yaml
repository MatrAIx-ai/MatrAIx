personas:
  professional: Neal Bottomley, a seasoned nursing assistant with four decades of frontline experience, leverages meticulous infection‑control expertise, organized shift‑scheduling skills, and an outgoing
    bedside manner, and they mentor newer staff while championing workflow efficiencies in a senior supervisory role.
  sports: Neal Bottomley enjoys winter skiing and snowboarding on the Steamboat slopes, summer hiking the Elk River Trail, and weekend fly‑fishing in the Colorado River, while cheering for the Colorado
    Avalanche and regularly participating in the local Steamboat Springs Hiking Club, and they find the combination of group activity and mountain air revitalizing.
  arts: Neal Bottomley finds solace in listening to folk singer Gillian Welch, attending community theater productions of classic plays at the Steamboat Playhouse, and occasionally sketching mountain vistas
    while sipping homemade coffee, and they often share these artistic moments with friends during post‑work gatherings.
  travel: Neal Bottomley prefers planned group adventures, having trekked the Yellowstone backcountry, explored Banff’s ice‑fields, and dreamed of a wellness retreat in Kyoto’s hot springs, all while balancing
    travel costs against their modest retirement budget, and they meticulously map out itineraries to ensure each trip aligns with their love of nature and community.
  culinary: Neal Bottomley delights in cooking hearty Colorado lamb stew, pan‑seared trout with fresh herbs from their garden, and rustic sourdough bread, often experimenting with smoked paprika despite
    a habit of over‑salting their dishes, and they relish sharing these meals with neighbors during seasonal potlucks.
  core: Neal Bottomley blends veteran caregiving expertise, a passion for mountain life, and a meticulous yet worry‑prone nature into a community‑focused, adventure‑rich, and hearty home‑cooking lifestyle,
    and they continuously seek ways to balance duty with personal joy.
background:
  cultural: Neal grew up in a modest Midwestern town where hard work, self‑reliance, and community solidarity were prized. After moving to Colorado in his thirties, he embraced the rugged, outdoor‑oriented
    culture of Steamboat Springs, integrating the region’s love of skiing, fishing, and volunteerism into his daily life. His white, working‑class heritage blends with the Western mountain ethos, shaping
    a pragmatic, down‑to‑earth worldview that values practical knowledge, dependable service, and close‑knit social networks. This background underpins his commitment to caring for others, his organized
    approach to work, and his ability to balance curiosity with proven methods.
attributes:
  skills: '["Patient care", "Vital sign measurement", "Wound dressing and care", "Infection control practices", "CPR and basic life support", "Medication assistance", "Mobility and transfer techniques",
