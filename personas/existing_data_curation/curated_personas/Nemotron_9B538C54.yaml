personas:
  professional: Sudhir Vyas, a veteran full‑stack developer proficient in React, Node.js, Django, and Spring Boot, leverages a data‑driven, user‑centric mindset to build scalable AWS‑cloud services while
    championing inclusive design and mentoring junior engineers, balancing his curiosity for emerging frameworks with a pragmatic focus on maintainable code.
  sports: Sudhir Vyas channels competitive energy into weekend hikes at Brown County State Park, joins a local Indiana Trail Runners club for seasonal trail runs, and follows the Indianapolis Colts, Indiana
    Pacers, and Chicago Cubs, occasionally catching a live basketball game to unwind.
  arts: Sudhir Vyas nurtures artistic balance by practicing tabla sessions inspired by Zakir Hussain, immersing in ragas by Ravi Shankar, curating a vinyl collection that spans sitar maestros to Beethoven,
    and engaging in strategy board games like Terraforming Mars and competitive video titles such as Civilization VI, all of which fuel his creative problem‑solving.
  travel: Sudhir Vyas prefers a hybrid travel style that blends meticulous itinerary planning for wellness retreats in Bali and trekking in Patagonia with spontaneous hackathon trips to Berlin, and they
    have already explored Kyoto’s temples, the Swiss Alps, and the historic streets of Prague while dreaming of a future visit to the Utah national parks.
  culinary: Sudhir Vyas experiments in the kitchen by hand‑picking cilantro, mint, and fenugreek from his backyard garden to craft fusion dishes like tandoori‑glazed salmon tacos, butter‑chicken ramen,
    and mango‑chutney pizza, while mastering traditional staples such as masala dosa and paneer tikka with a confidence that rivals professional chefs.
  core: Sudhir Vyas is a curiosity‑driven, compassionate tech mentor who balances restless creativity with pragmatic code, channels intense emotions through meditation and music, and occasionally gets sidetracked
    by spontaneous gadget purchases and meticulous garden herb care.
background:
  cultural: Sudhir is a second‑generation Indian American whose parents emigrated from Gujarat in the early 1990s. Raised in a bilingual household, he grew up speaking Hindi and Gujarati at home while attending
    public schools in Indiana. Family traditions—celebrating Diwali, Holi, and Navratri, sharing homemade sweets, and practicing the value of seva (service)—remain central to his identity. He remains connected
    to the local Indian diaspora through temple gatherings, cultural festivals, and cooking clubs. While embracing the independent, career‑focused ethos of Midwestern America, he balances it with the collectivist,
    community‑oriented values of his heritage, which drive his volunteer work and desire to create harmonious workplaces.
