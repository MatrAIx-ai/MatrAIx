    (Diwali, Holi)'']'
  career_goals: Sudhir aspires to transition into a senior technical leadership role where he can combine his software engineering expertise with his business acumen to steer product development that delivers
    social impact. He aims to become a tech lead or engineering manager responsible for building accessible, user‑centered platforms—particularly in mental‑health or education tech—that foster community
    well‑being. Over the next five years he plans to mentor diverse junior developers, champion inclusive team cultures, and introduce flexible yet supportive workflows that mitigate his own anxiety around
    deadlines. Long‑term, he envisions launching a social‑tech venture that bridges the digital divide for underserved families, leveraging his entrepreneurial spirit while maintaining a sustainable work‑life
    balance.
