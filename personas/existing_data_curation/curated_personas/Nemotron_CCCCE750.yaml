personas:
  professional: An experienced commercial kitchen specialist, Tyrone Fells leverages years of dishwasher expertise, meticulous sanitation compliance, and crew‑coordination prowess to pursue a supervisory
    role, blending curiosity for innovative cooking techniques with a practical, organized workflow; they thrive when leading a small team through high‑pace service periods.
  sports: A community‑oriented athlete, Tyrone Fells competes in a neighborhood basketball league, follows the Georgia Bulldogs and the Dallas Cowboys, and joins a local fishing club to catch catfish on
    weekends; they thrive on team camaraderie and seasonal outdoor pursuits.
  arts: A devoted choir participant and soulful music enthusiast, Tyrone Fells sings with the church choir, organizes community potlucks, and immerses themselves in classic soul, funk, and gospel legends
    like Marvin Gaye, James Brown, Aretha Franklin, and Al Green, letting these rhythms shape their weekend relaxation; they find solace and motivation in the music’s uplifting energy.
  travel: A weekend‑focused explorer, Tyrone Fells enjoys road‑tripping to fishing spots in the Ozarks and cultural food hubs like New Orleans and Memphis, preferring mid‑range motels and planning trips
    around family gatherings while dreaming of a culinary tour of Southern comfort‑food destinations; they balance adventure with practical budgeting.
  culinary: A barbecue aficionado and aspiring comfort‑food chef, Tyrone Fells experiments with hickory‑smoked pork ribs using a coffee‑infused rub, perfects collard greens seasoned with smoked turkey,
    and delights in serving sweet‑potato casserole at family gatherings, all while honing their culinary skills through a community‑college program; they relish the process of discovering new flavors and
    mastering grill techniques.
  core: Tyrone Fells embodies a sociable, detail‑oriented 43‑year‑old who balances relentless curiosity for culinary craft with pragmatic financial planning, while they wrestle with occasional worry and
    a weekend habit of basketball, fishing, and soulful music.
background:
  cultural: Tyrone is a Black man raised in the rural South, and his identity is shaped by the rich African‑American heritage of West Point, GA, and the broader Troup County community. He grew up in a close‑knit
    family where church, communal meals, and storytelling were central. His cultural background includes deep appreciation for Southern Black culinary traditions—especially soul food and barbecue—and a
    strong connection to gospel music and church life. He honors the history of resilience and civil‑rights activism in his region, participates in Juneteenth celebrations, and values the supportive network
    of historically Black churches and community groups that have guided his personal and professional growth.
attributes:
  skills: '["Commercial dishwashing & sanitization", "Food safety & HACCP compliance", "Kitchen equipment operation & basic maintenance", "Inventory monitoring & supply ordering", "Team coordination & crew
