    communication"]'
  hobbies: '["Barbecue cooking", "Neighborhood basketball league", "Gospel choir participation", "Local church potluck volunteerism", "Fishing trips", "DIY home improvement", "Listening to classic soul
    and funk music", "Watching college football and the NFL", "Reading personal finance books", "Car maintenance and tinkering"]'
  career_goals: Tyrone aims to advance from his current role to a kitchen supervisory or management position where he can combine his practical knowledge with his curiosity for new cooking techniques. He
    plans to earn a ServSafe Manager certification and enroll in a community‑college culinary program to deepen his culinary skills. Long‑term, he envisions launching a small catering service or food‑truck
    that showcases Southern Black comfort food, allowing him to support his family more financially while staying connected to his cultural roots. He also hopes to mentor younger kitchen staff, fostering
    a supportive and organized work environment.
