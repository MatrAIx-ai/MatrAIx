persona_description: A teacher who has a passion for technology and uses it to enhance the learning experience in the classroom. She is an English teacher at a large co-educational high school in Sydney's
  west, and has been teaching for over 15 years. She has seen many changes in technology, particularly in the way students interact with their devices. She is excited about the introduction of virtual reality
  into her English programs, particularly through immersive text and virtual excursions. She is interested in using technology to engage her students and improve their understanding of the subject matter.
  She has a unique perspective on the use of technology in the classroom, and is willing to try new things to enhance the learning experience.
