  hobbies: '[''Concept Car Sketching'', ''Digital Illustration'', ''Abstract Painting'', ''Custom Vehicle Graphic Design'', ''Attending Small Car Shows'', ''Scale Model Building'', ''Classic Motorcycle
    Restoration'', ''Woodworking'', ''Science-Fiction Reading'', ''Chess'', ''Automotive Photography'']'
  career_goals: Gabriel aspires to transition from a skilled tradesperson to a boutique studio owner where he can fuse his technical expertise with his artistic vision. He aims to earn ASE Master Technician
    certification in collision repair, gain certification in custom automotive painting, and develop a recognized brand for bespoke vehicle restorations and one-of-a-kind paint artistry. In the longer term,
    he wants to teach advanced body repair and design at a community college, publish a handbook on merging automotive restoration with artistic techniques, and become a respected thought leader in the
    niche of creative automotive craftsmanship.
