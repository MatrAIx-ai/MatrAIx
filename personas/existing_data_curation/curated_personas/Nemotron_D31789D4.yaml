personas:
  professional: Gabriel Granado, a 37‑year‑old automotive body repair specialist who seamlessly blends precision welding, panel straightening, and custom paint artistry, leverages meticulous attention to
    detail and imaginative flair to turn broken cars into moving canvases for clients at a boutique studio.
  sports: Gabriel Granado follows the Los Angeles Rams and the Detroit Tigers, hits the local gym for functional strength training twice a week, participates in a Saturday morning motorcycle club Iron Road
    Riders for track‑day drills, and enjoys occasional weekend hikes in the nearby foothills to stay limber.
  arts: Gabriel Granado draws artistic inspiration from the futurist concepts of Syd Mead and the surreal machine forms of H.R. Giger, tunes into the synthwave beats of Kavinsky and the ambient textures
    of Brian Eno while sketching custom vehicle graphics, and attends indie film screenings of Denis Villeneuve’s works to fuel narrative imagination.
  travel: Gabriel Granado favors meticulously planned road trips along the Pacific Coast Highway, has visited the Nürburgring in Germany to study race‑car aerodynamics, dreams of a summer retreat in Patagonia’s
    steppe, and balances travel ambitions with a modest family budget that limits prolonged overseas stays.
  culinary: Gabriel Granado’s palate tilts toward smoky Texas‑style brisket, handmade gnocchi tossed with sage butter, and the bright acidity of lime‑infused ceviche, and they enjoy a competent kitchen
    where they can experiment with smoked paprika, fresh basil, and aged Parmesan, though they often skip breakfast for a quick coffee.
  core: Gabriel Granado is a methodical yet wildly imaginative auto artisan whose competitive edge fuels a relentless pursuit of perfect paint finishes, even as anxiety and late‑night sketching sessions
    sometimes spill over into work‑life balance.
background:
  cultural: Gabriel grew up in a middle-class, white suburban family in the greater Toledo area of Ohio. His upbringing was steeped in Midwestern values of hard work, modesty, and community service, with
    a strong appreciation for the region’s manufacturing heritage, especially the automotive and glass industries that shaped the local economy. Family gatherings often featured discussions about classic
    American cars and DIY projects, fostering his early fascination with vehicle mechanics and craftsmanship. He identifies with the cultural traditions of the Midwest—pragmatic pragmatism, a love for local
    fairs, and participation in community and church events—while also drawing inspiration from the broader North American car culture and the artistic sub-scene of custom vehicle styling.
attributes:
  skills: '[''Structural Frame Straightening'', ''Panel Replacement'', ''MIG/TIG Welding'', ''Custom Paint Mixing and Application'', ''Artistic Vehicle Graphics Design'', ''CAD for Bodywork Layout'', ''Digital
