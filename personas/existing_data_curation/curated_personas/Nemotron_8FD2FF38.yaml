personas:
  professional: Duc Tran, a budding mini‑architect and junior coder, transforms their passion for real‑world structures into intricate LEGO builds of houses, bridges and vehicles while using Scratch to
    prototype interactive story‑puzzles, applying a methodical, organized mindset that favors clear, predictable outcomes.
  sports: Duc Tran shines in community‑center badminton, competing as a regular member of the Sunrise Badminton Club while cheering for the national badminton team and occasionally joining weekend soccer
    scrimmages with friends.
  arts: Duc Tran expresses creativity through beginner piano lessons focused on Beethoven’s Für Elise, devouring adventure novels by Rick Riordan, admiring LEGO Architecture series designs, and watching
    Studio Ghibli films for visual storytelling inspiration.
  travel: Duc Tran enjoys weekend trips to the nearby lake town for canoeing, cherishes family visits to distant grandparents’ countryside farm, and dreams of exploring the Eiffel Tower in Paris and the
    Great Wall of China on future school tours.
  culinary: Duc Tran loves helping in the kitchen, mastering the art of rolling delicate rice paper rolls, simmering fragrant herb‑infused broth, and perfecting caramelized pork, while also experimenting
    with simple pancake recipes after piano lessons.
  core: Duc Tran is a meticulous, puzzle‑loving nine‑year‑old who balances a structured love of LEGO architecture and coding with a shy worry about new challenges, often channeling stress into music and
    badminton.
background:
  cultural: Duc Tuan is a first‑generation Vietnamese‑American. At home, he speaks Vietnamese with his parents and grandparents and celebrates Vietnamese cultural events such as Tet, where the family prepares
    traditional foods and honors ancestors. In Temecula, he attends a public elementary school, where he balances American customs with his heritage, often sharing Vietnamese stories and customs with classmates.
    His family places a strong emphasis on respect for elders, academic diligence, and community harmony, values that reinforce his organized, considerate, and cooperative personality.
attributes:
  skills: '["Organized time management", "Basic Scratch coding", "LEGO building", "Reading comprehension", "Basic arithmetic", "Following instructions"]'
  hobbies: '["LEGO construction", "Scratch programming", "Chess", "Puzzle solving", "Beginner piano", "Reading adventure novels", "Badminton", "Family cooking"]'
  career_goals: Duc Tuan dreams of becoming a civil engineer who designs safe, well‑planned bridges and community spaces. He is fascinated by how structures are built step by step and hopes to use his methodical
    nature to create reliable, helpful projects. He also thinks about working as a community planner or teacher, roles that would let him keep environments organized and supportive for others. His long‑term
    ambition is to combine his love for building with a career that brings stability and benefits his neighborhood.
