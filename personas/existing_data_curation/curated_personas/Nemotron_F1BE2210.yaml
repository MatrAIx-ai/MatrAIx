  hobbies: '[''Salsa and bachata dancing'', ''Playing and watching soccer'', ''Cooking Guatemalan cuisine'', ''Volunteering at community festivals'', ''Yoga and meditation'', ''Hiking in Texas Hill Country'',
    ''Group fitness classes (Zumba, boot‑camp)'', ''Participating in book clubs'']'
  career_goals: Jean aims to complete her bachelor's degree in Business Administration while earning certifications in digital marketing and data analytics. She aspires to secure a junior marketing coordinator
    role at a local firm that serves the Hispanic community, where she can blend her cultural insight with performance‑driven campaigns. Over the next five years, she envisions advancing to a program director
    position at a nonprofit focused on Guatemalan immigrant integration, ultimately launching her own consultancy that helps small Latinx businesses grow through targeted digital strategies.
