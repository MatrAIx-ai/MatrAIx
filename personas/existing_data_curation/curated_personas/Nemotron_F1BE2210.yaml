personas:
  professional: Jean Rojas, a 24‑year‑old budding digital marketer, blends bilingual fluency and a skeptical, data‑driven mindset to craft community‑focused campaigns for local firms seeking to engage bilingual
    audiences, while juggling coursework, certifications, and a competitive drive to outperform peers in measurable results.
  sports: Jean Rojas, a 24‑year‑old soccer enthusiast, joins Saturday pick‑up games with friends, cheers for Dallas FC during MLS season, and hones their rhythm in salsa and bachata classes at the local
    dance studio, treating each session as both workout and cultural expression.
  arts: Jean Rojas, a 24‑year‑old cultural aficionado, streams salsa and bachata playlists featuring artists like Celia Cruz and Marc Anthony while attending community theater productions of classic comedies,
    participates in a book club that tackles titles by Brené Brown and Ta‑Nehisi Coates, and channels these artistic sparks into inventive marketing ideas.
  travel: Jean Rojas, a 24‑year‑old adventure‑seeker, prefers spontaneous weekend road trips to Texas Hill Country towns such as Fredericksburg and Austin, while saving for a longer‑term cultural immersion
    tour of Mexico City and a hiking expedition to the Grand Canyon, balancing a modest travel budget with a desire to broaden their worldview.
  culinary: Jean Rojas, a 24‑year‑old home cook, enjoys mastering family‑style pupusas and tamales—rolling corn masa with fresh cheese, beans, and pork—while experimenting with spice blends, yet sometimes
    burns the edges when juggling a busy schedule, making their kitchen a lively arena of flavor and occasional chaos.
  core: Jean Rojas, a 24‑year‑old sociable go‑getter, channels competitive curiosity into bilingual digital marketing while juggling anxiety‑fueling deadlines, salsa rhythms, and a meticulous budget that
    leaves little room for sleep.
background:
  cultural: Jean is a first‑generation Guatemalan‑American who grew up in a bilingual household in Fort Worth. Her family maintains strong ties to Guatemalan traditions, from language and cuisine to holiday
    celebrations like Día de los Santos. She balances the values of collectivism and family loyalty with the individualistic opportunities of U.S. culture. This dual perspective informs her community‑focused
    mindset, her competitive drive to succeed, and her desire to give back to both the local Hispanic community and the broader society.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Community outreach and volunteer coordination'', ''Event planning and logistics'', ''Social media marketing and content creation'', ''Basic data
