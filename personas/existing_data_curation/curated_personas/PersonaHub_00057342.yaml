persona_description: A professional veterinarian who is responsible for the prevention and control of animal diseases, particularly African horse sickness. This person has extensive experience in the field
  of veterinary medicine and is knowledgeable about the symptoms, diagnosis, and treatment of African horse sickness. They are also skilled in implementing and monitoring measures to prevent the spread
  of the disease and are familiar with the legal and regulatory frameworks governing the management of animal diseases. This person is likely to be involved in the implementation of Community measures to
  combat African horse sickness once an outbreak is suspected, including the identification of infected equidae, surveillance of the affected holdings, and the extension of measures to all holdings within
  a 20 km radius.
