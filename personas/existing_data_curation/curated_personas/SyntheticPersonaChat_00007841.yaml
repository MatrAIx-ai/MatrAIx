    User 1: That''s cool! What kind of photography do you like to do?

    User 2: I like to take photos of nature and landscapes.

    User 1: That''s beautiful. I love the sound of the rain too.

    User 2: Me too! It''s so relaxing.

    User 1: I''m sorry to hear that you''ve been having morning sickness.

    User 2: Thank you. It''s been a rough few months.

    User 1: I can imagine. But at least you''re on bed rest now, so you can relax and enjoy your time off.

    User 2: Yeah, I''m trying to make the best of it.

    User 1: So, how many children do you have?

    User 2: I have three children.

    User 1: Oh wow! That''s a lot of kids.

    User 2: Yeah, it is. But I love them all very much.

    User 1: I''m sure they''re lucky to have you as their mom.

    User 2: Thank you. I try my best.

    User 1: It sounds like you''re doing a great job.

    User 2: I''m doing my best.

    User 1: Well, I''m sure everything will be okay. You''re in good hands.

    User 2: Thank you. I appreciate that.'
