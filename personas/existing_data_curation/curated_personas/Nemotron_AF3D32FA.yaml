  hobbies: '[''Coding small projects'', ''Robotics club'', ''Reading mystery and science‑fiction novels'', ''Playing piano'', ''Journaling'', ''Strategic board games (e.g., Settlers of Catan)'', ''Track
    sprinting'', ''Photography'']'
  career_goals: Mariah aspires to attend a top university where she can major in computer science or biomedical engineering. She envisions a future where she designs innovative technologies that solve real‑world
    problems, especially in healthcare. In the long term, she aims to lead research teams, earn patents for her inventions, and mentor other young women of color in STEM fields. Her immediate goal is to
    earn scholarships through academic competitions and maintain a high GPA to keep her options open.
