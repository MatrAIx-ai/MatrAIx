personas:
  professional: Mariah Williams, a budding coder and robotics enthusiast, channels her meticulous organization and competitive spirit into designing precise Arduino projects and solving algorithmic puzzles,
    always documenting every step in her journal to ensure reproducibility.
  sports: Mariah Williams, a disciplined sprinter on the Colorado Springs Youth Track Club, rigorously follows interval training schedules, channels competitive drive into every 100‑meter dash, and roots
    for the Denver Broncos and Colorado Avalanche as sources of seasonal motivation.
  arts: Mariah Williams, an avid piano player and mystery‑novel collector, finds inspiration in the intricate melodies of Ludovico Einaudi, the suspenseful storytelling of Agatha Christie, and the striking
    portraits of Annie Leibovitz, often blending these influences into her own experimental photography projects.
  travel: Mariah Williams prefers meticulously planned trips that balance adventure with structure, eagerly anticipating family road trips to Rocky Mountain National Park for hiking challenges, and dreaming
    of a future visit to the historic streets of New Orleans during its vibrant Mardi Mardi festivals, while budgeting each outing in a travel spreadsheet.
  culinary: Mariah Williams enjoys cooking simple but precise dishes such as lemon‑garlic grilled chicken and homemade mac and cheese, meticulously measuring spices like smoked paprika and thyme, while
    also indulging in comfort foods like classic pepperoni pizza and sweet mango smoothies when unwinding after coding sessions.
  core: Mariah Williams is a hyper‑organized teen whose relentless quest for precision fuels both her coding triumphs and her occasional over‑thinking, leading them to double‑check every assignment while
    secretly hoarding extra puzzle books for late‑night challenges.
background:
  cultural: Mariah identifies as African‑American and embraces the cultural heritage passed down by her family, which has roots in the Southern United States. Growing up in Colorado Springs, she participates
    in local community events such as Juneteenth celebrations, Black History Month programs, and church gatherings that reinforce a sense of pride and resilience. Her family places a strong emphasis on
    education, perseverance, and contributing positively to the community, values that shape her disciplined approach to school and future aspirations.
attributes:
