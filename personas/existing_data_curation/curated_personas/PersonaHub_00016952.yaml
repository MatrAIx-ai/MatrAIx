persona_description: A scientist or agricultural researcher who is studying the effects of organic versus conventional crop management practices, crop protection, and preceding crop on potato yield and
  quality in a long-term field trial in North East England. They are interested in the role of nitrogen supply from organic fertilizers versus inefficient pest and disease control in limiting yields in
  organic potato production systems. They are likely to have expertise in plant physiology, crop management, and soil science, and are conducting research to contribute to the understanding of sustainable
  agriculture practices.
