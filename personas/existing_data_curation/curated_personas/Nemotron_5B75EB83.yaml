personas:
  professional: Joanna Thomas, an occupational therapy assistant known for meticulous documentation and schedule management, integrates talkative, art‑based activities into patient care and competitively
    stays abreast of evidence‑based practices while pursuing leadership in pediatric creative arts therapy, and they view each therapeutic session as a chance to blend creativity with functional recovery.
  sports: Joanna Thomas avidly follows the Chicago Bears and Chicago Cubs, joins a weekend hiking club for Kankakee River State Park treks, and competes in intramural volleyball at the university, and they
    balance spectator enthusiasm with active involvement in regional outdoor activities.
  arts: Joanna Thomas sketches historic downtown storefronts while listening to indie folk duo The Milk Carton Kids, plays the ukulele to the tunes of Vance Joy, volunteers at the community theater for
    productions like 'Our Town', and they regularly attend Chicago Symphony Orchestra concerts featuring works by Philip Glass, using these experiences to fuel their mixed‑media art projects.
  travel: Joanna Thomas plans trips with spreadsheet itineraries, prefers budget airlines and hostels, has explored Chicago’s museum district and taken a weekend road trip to Indianapolis, and dreams of
    a spring visit to Kyoto’s cherry blossom festivals and a summer trek through the Swiss Alps, and they balance their love of new cultures with the constraints of a student budget.
  culinary: Joanna Thomas enjoys crafting avocado toast topped with radish and aged cheddar for breakfast, indulges in Chicago’s deep‑dish pizza on weekends, experiments with homemade ramen broth and miso,
    and they often flavor dishes with fresh basil, cilantro, and seasonal farm‑to‑table vegetables, reflecting a mix of comfort food and culinary curiosity.
  core: Joanna Thomas is a talkative, organized 21‑year‑old who channels a competitive, curiosity‑driven spirit into blended art‑therapy practice, meticulous budgeting, and eclectic hobbies, occasionally
    over‑commits to projects and sometimes neglects self‑care in the pursuit of new experiences.
background:
  cultural: Joanna grew up in Monmouth, a small Midwestern town in Illinois, within a white, middle‑class family rooted in the region for generations. The community’s emphasis on hard work, self‑reliance,
    and modesty shaped her organized and reliable nature. Local traditions, such as the county fair, high school sports, and church gatherings, fostered her sociable, talkative side, while the region’s
    expanding arts initiatives and nearby university programs sparked her curiosity for unconventional ideas and creative expression. Though she embraces her Midwestern heritage, she often seeks experiences
    beyond the town’s borders, integrating diverse perspectives into her personal and professional life.
attributes:
  skills: '[''Basic patient assessment'', ''Therapeutic activity planning and adaptation'', ''Electronic health record documentation'', ''Scheduling and time management'', ''Inventory management of adaptive
    equipment'', ''Patient education and communication'', ''Art‑based therapeutic interventions'', ''Data collection and outcome measurement'', ''Critical evaluation of treatment protocols'']'
  hobbies: '[''Sketching and mixed‑media art'', ''Playing ukulele'', ''Volunteering at community theater'', ''Attending art exhibitions'', ''Weekly trivia nights'', ''Intramural volleyball'', ''Hiking'',
    ''Photography'', ''Reading contemporary non‑fiction on psychology and creativity'', ''Participating in workshops on emerging health technologies'']'
  career_goals: Joanna aims to complete her bachelor's degree in occupational therapy within the next two years, then pursue a master's focusing on pediatric and creative arts therapy. She envisions designing
    community‑based programs that blend functional rehabilitation with expressive arts, particularly for children and seniors in rural Illinois. Her competitive drive pushes her to seek leadership positions,
    such as lead therapy aide or program coordinator, and eventually to obtain licensure as an OT to open her own practice. She also aspires to present findings at regional conferences, contributing to
    evidence‑based practices.
