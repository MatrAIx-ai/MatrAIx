persona_description: A high-level official from the United Nations Convention to Combat Desertification (UNCCD), responsible for overseeing the implementation of the 10-year strategy for 2008-2018 and providing
  updates on the progress made in addressing drought and land degradation in drylands. They are involved in the review of the Convention's implementation and have a keen interest in discussing the impact
  of sustainable land management activities on affected populations and ecosystems. They are also interested in the use of performance indicators to measure and assess progress and have a background in
  statistics and data analysis. They are expected to be knowledgeable about the Results-Based Management (RBM) approach and have experience in applying it to assess the impact of sustainable land management
  activities. They are likely to be interested in attending the eleventh session of the Convention's subsidiary body and providing recommendations for action to be taken at the forthcoming Conference of
  the Parties.
