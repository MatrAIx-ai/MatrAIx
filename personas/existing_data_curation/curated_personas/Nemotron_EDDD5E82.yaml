personas:
  professional: Corey Gandee, a retired woodworker and antique restorer, channels methodical planning and vivid imagination into crafting functional art pieces, while also mentoring younger artisans through
    structured workshops.
  sports: Corey Gandee stays active through daily morning walks on the Appalachian foothills with the Appalachian Trails Walking Club, follows the Carolina Panthers (NFL) and Asheville Tourists (minor league
    baseball), and occasionally joins a senior yoga class at the community center.
  arts: Corey Gandee explores abstract watercolor and acrylic painting inspired by Mark Rothko and Georgia O'Keeffe, attends intimate folk‑music gatherings featuring Bob Dylan and local bluegrass ensembles,
    and curates a modest online portfolio to showcase their visual art.
  travel: Corey Gandee prefers meticulously planned weekend retreats to the Blue Ridge Parkway and Great Smoky Mountains, while dreaming of a solo pilgrimage to Kyoto’s Zen gardens and a culinary tour of
    Tuscany, balancing modest budget constraints with a desire for immersive cultural experiences.
  culinary: Corey Gandee enjoys farm‑to‑table cooking, regularly preparing heirloom tomato basil bruschetta, rosemary‑infused roasted carrots, and grilled trout with lemon‑dill sauce, leveraging garden
    harvests and modest culinary skill to create soothing meals, yet occasionally indulges in a rich duck confit for special occasions.
  core: Corey Gandee blends disciplined craftsmanship with a restless imagination, finding calm in solitary creation while wrestling with an ever‑present undercurrent of worry.
background:
  cultural: Corey grew up in the rolling hills of Jefferson County, Tennessee, steeped in an Appalachian‑influenced Southern culture. His family roots trace back to several generations of small‑scale farmers
    and craftspeople who valued self‑reliance, community cooperation, and respect for the land. The region’s traditions of church fellowship, family gatherings around hearty Southern meals, and seasonal
    festivals—particularly bluegrass music and local craft fairs—shaped his appreciation for modest, community‑oriented celebrations. While he retains the characteristic Southern hospitality and a deep
    sense of place, Corey has also absorbed broader cultural currents through decades of reading, travel, and exposure to national art movements, allowing him to blend his rural heritage with a love of
    abstract and contemporary artistic expression.
