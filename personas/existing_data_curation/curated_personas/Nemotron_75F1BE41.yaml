personas:
  professional: Maria Helton, a two-year-old self-appointed 'playroom manager', blends their boundless curiosity with an early knack for organizing toys by color, often commandeering pretend-meeting circles
    with talkative flair while competitively racing friends to complete puzzle challenges.
  sports: Maria Helton dashes through the neighborhood preschool's Little Explorers t-ball practice with infectious enthusiasm, cheers loudly for the West Virginia Mountaineers whenever their game flickers
    on the family TV, and eagerly sleds down the gentle hills of their backyard each winter.
  arts: Maria Helton splashes turbulent rainbows across paper in finger-painting sessions, hums along to lively folk fiddle tunes at the community harvest fair, and proudly belts the chorus of 'The Rainbow
    Connection' as performed by their favorite children's entertainer Raffi.
  travel: Maria Helton loves the rhythmic hum of the family car on weekend trips to Canaan Valley's leaf-laden trails and eagerly points at the pandas during a visit to Washington, D.C.'s National Zoo,
    though they sometimes whine when a planned stop is unexpectedly skipped.
  culinary: Maria Helton delights in slurping buttery macaroni and cheese and spreading sweet blueberry jam on toasted brioche, while fiercely rejecting peas and demanding that golden cornbread and crisp
    apple slices make the final pass on their plate.
  core: Maria Helton is a chatty, curious two-year-old who orchestrates their playroom with surprising order, competitively hoards the biggest puzzle pieces, yet often frets over minor changes in routine.
background:
  cultural: Maria is raised in a white, middle‑class family in Wheeling, West Virginia, where Appalachian and Mid‑Atlantic traditions blend with suburban life. Family gatherings often include church potlucks,
    folk music, and seasonal celebrations such as fall harvest fairs and holiday crafts. The community emphasizes close family ties, church involvement, and appreciation for local arts and outdoor activities,
    shaping Maria's early worldview.
attributes:
  skills: '[''basic language acquisition'', ''early storytelling'', ''fine motor coordination'', ''color and shape recognition'', ''social greeting and turn-taking'', ''basic rhythm and movement'']'
  hobbies: '[''scribbling with crayons'', ''dancing to music'', ''building block towers'', ''participating in storytime'', ''exploring nature'', ''listening to picture books'']'
  career_goals: Although still a toddler, Maria frequently declares she wants to become a painter or a singer and loves pretending to be a teacher. Her future ambitions are shaped by her love of art, music,
    and attention‑seeking play, hinting at later interests in creative fields such as visual arts, performing arts, or early childhood education.
