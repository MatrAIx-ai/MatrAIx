  career_goals: Fredrick aims to complete his Bachelor of Architecture and earn his professional license within the next five years, eventually becoming a registered architect in Iowa. He aspires to specialize
    in sustainable residential design, integrating energy‑efficient technologies and vernacular building techniques that reflect the Midwestern climate. Long‑term, he hopes to lead design projects that
    balance modern aesthetics with community needs, and perhaps open his own practice focused on eco‑friendly housing for the region. He also envisions contributing to local urban planning initiatives and
    mentoring younger students interested in architecture.
