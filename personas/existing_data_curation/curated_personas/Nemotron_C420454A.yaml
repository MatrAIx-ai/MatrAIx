personas:
  professional: Dorca Torres, a veteran housekeeping specialist with over two decades of deep‑cleaning expertise, leverages bilingual communication and meticulous checklist‑driven workflows, and they train
    staff, negotiate eco‑friendly supply contracts, and deliver high‑standard services to affluent Houston families while eyeing a senior house manager role and eventually launching a boutique cleaning
    firm.
  sports: Dorca Torres, an avid supporter of the Houston Astros and Rockets, participates in weekly salsa‑dance cardio sessions, joins a local community soccer league during spring, and they maintain a
    disciplined home‑workout routine using resistance bands to counteract the physical demands of housekeeping.
  arts: Dorca Torres, a passionate lover of cumbia and salsa, regularly attends dance nights featuring music by Celia Cruz and Marc Anthony, volunteers as a choreographer for youth workshops, sings karaoke
    to classics by Juan Gabriel, and they unwind with telenovelas starring Thalía and Eduardo Yáñez.
  travel: Dorca Torres, who balances family commitments with a love for cultural immersion, prefers short road trips to historic San Antonio and weekend getaways to New Orleans for its music scene, while
    they dream of a culinary pilgrimage to Oaxaca to study mole‑making, all while budgeting travel expenses within a modest annual travel fund.
  culinary: Dorca Torres, an accomplished home cook, delights in preparing mole with ancho chilies and chocolate, steaming tamales wrapped in corn husks, and hearty pozole flavored with hominy and epazote,
    and they often harvest oregano and cilantro from their backyard garden to add fresh depth to each dish.
  core: Dorca Torres blends a competitive, detail‑oriented mindset with vibrant sociability, turning housekeeping into a platform for eco‑innovation, community dance, and weekend culinary experiments—though
    they sometimes fuel heated price negotiations with a skeptical streak.
background:
  cultural: Dorca was raised in a bilingual Mexican‑American household in Houston, where Spanish and English were spoken interchangeably. Her family’s roots trace back to Jalisco, and she grew up celebrating
    Mexican holidays such as Día de los Muertos, Semana Santa, and the Feast of Our Lady of Guadalupe, often centered around vibrant food, music, and religious traditions. The strong sense of community
    in Houston’s Mexican diaspora shaped her values of hard work, hospitality, and familial solidarity. Although she never married, she maintains close ties with extended family, participates in church
    activities at a local Catholic parish, and supports neighborhood organizations that empower domestic workers. Her cultural identity influences her daily rituals—starting the day with a cup of café de
    olla, incorporating Mexican folk art into home décor, and sharing traditional recipes with friends and clients.
attributes:
  skills: '[''Deep Cleaning'', ''Floor Care (hardwood, tile, carpet)'', ''Upholstery Maintenance'', ''Eco‑friendly Product Knowledge'', ''Bilingual Communication (Spanish/English)'', ''Inventory Management'',
    ''Digital Scheduling and Checklist Creation'', ''Client Relationship Management'', ''Basic Business Accounting'', ''Staff Training and Supervision'', ''Problem Solving under Pressure'']'
  hobbies: '[''Cumbia and Salsa Dancing'', ''Volunteer Choreography for Youth'', ''Traditional Mexican Cooking'', ''DIY Natural Cleaning Experiments'', ''Herb Gardening'', ''Reading Leadership & Time Management
    Books'', ''Karaoke'', ''Watching Telenovelas'', ''Participating in Cinco de Mayo and Día de los Muertos Festivals'']'
  career_goals: Leveraging her extensive housekeeping background and business knowledge, Dorca aims to move from a frontline cleaning role to a supervisory and entrepreneurial position. In the next five
    years she plans to obtain a Certified Professional Cleaner (CPC) credential and a Green Cleaning Specialist certification, then secure a senior house manager role for high‑net‑worth families in the
    Houston metro area. Ultimately she aspires to launch her own boutique cleaning service that employs and mentors other domestic workers, emphasizing reliability, safety, and environmentally responsible
    practices. She also hopes to develop a client‑education program on maintaining healthy home environments, positioning herself as a trusted authority in residential cleaning.
