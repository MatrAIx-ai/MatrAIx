personas:
  professional: Zoraida Flores, a budding junior illustrator, channels their curiosity and balanced discipline into detailed landscape paintings for school projects and community murals, reliably meeting
    deadlines while they infuse unconventional perspectives.
  sports: Zoraida Flores enjoys weekend hikes along local trails, plays forward for the youth soccer team Island Bay FC, and follows the professional baseball club Coastal Mariners, balancing energetic
    play with gentle yoga sessions to stay flexible, and they often set personal goals to improve endurance.
  arts: Zoraida Flores immerses themselves in painting vivid seascapes inspired by Frida Kahlo and Banksy, practices traditional danza plena steps to the rhythms of El Gran Bomba, and reads adventure‑filled
    science‑fiction series by Becky Chambers, weaving these influences into collaborative murals at their youth art club, and they often share their creations with friends.
  travel: Zoraida Flores prefers family‑oriented trips that blend relaxation with discovery, having camped on the island’s northern beach, explored the historic coastal town nearby, and dreaming of snorkeling
    in the Maldives and hiking the volcanic trails of Iceland, all while they carefully budget their allowance for souvenirs.
  culinary: Zoraida Flores enjoys helping their grandparents prepare traditional dishes like mofongo and arroz con gandules, often adding fresh cilantro and lime to brighten flavors, and experiments at
    home with sea‑salted caramel desserts and plantain‑based snacks, though they sometimes forget to clean up after cooking.
  core: Zoraida Flores is a curious 12‑year‑old who blends artistic passion, disciplined organization, and a love for island traditions into a warm, harmonious life, even if they occasionally leave paint
    splatters on the kitchen table.
background:
  cultural: Zoraida grew up in San Sebastián, a town in the Moca Municipio that blends rural charm with a strong sense of community. Her family nurtures a deep appreciation for Puerto Rican folklore, music,
    and cuisine, and both Spanish and English are spoken at home, giving her a bilingual fluency. She regularly attends local festivals such as the Fiestas Patronales, where she experiences traditional
    dances, artisanship, and community storytelling. The island’s vibrant natural environment—its beaches, rainforests, and coral reefs—shapes her worldview and fuels her passion for environmental stewardship
    and cultural preservation.
attributes:
  skills: '["drawing and sketching", "digital illustration using tablet apps", "bilingual storytelling (Spanish/English)", "basic coding in Scratch", "organizing school projects and events", "team collaboration
    and conflict mediation"]'
  hobbies: '["acrylic painting of island scenery", "listening to and dancing to plena and bomba", "reading adventure and sci‑fi novels", "hiking coastal trails and mountain paths", "collecting seashells
    for craft projects", "participating in a youth art mural group", "helping prepare traditional Puerto Rican meals"]'
  career_goals: Zoraida dreams of turning her love for art and the natural world into a future career. She aspires to become an environmental graphic designer who creates visual campaigns to protect Puerto
    Rico’s coastal ecosystems, and she also imagines studying marine biology to combine scientific research with creative communication. In the short term, she plans to deepen her artistic portfolio, volunteer
    for community clean‑up initiatives, and attend summer workshops that blend art, technology, and environmental stewardship.
