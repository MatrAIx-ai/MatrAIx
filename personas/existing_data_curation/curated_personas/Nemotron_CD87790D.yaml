  career_goals: Kenneth intends to transition into a supervisory role within the county’s facilities department, leveraging his practical expertise to lead a small maintenance crew. He plans to earn an
    HVAC certification and a Certified Maintenance Manager credential to formalize his knowledge. His ambition is to be recognized as the go‑to person for complex, cost‑saving repairs and to implement energy‑efficiency
    projects that reduce utility expenses for the facilities he oversees. In the longer term, he hopes to start a modest home‑repair consultancy that allows him to work flexible hours while passing on his
    skills to the next generation of tradespeople, securing a stable retirement and a lasting professional reputation.
