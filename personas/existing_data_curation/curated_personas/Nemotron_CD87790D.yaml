personas:
  professional: Kenneth Hornsby, a veteran facilities maintenance specialist in Lompoc, combines three decades of hands‑on expertise in electrical, plumbing, and HVAC systems with a curiosity‑driven yet
    pragmatic mindset; they lead a small crew through improvisational problem‑solving while navigating a relaxed, sometimes disorganized schedule as they pursue HVAC certification and a Certified Maintenance
    Manager credential.
  sports: Kenneth Hornsby spends Saturday afternoons shooting hoops for the Lompoc Lobos in a local basketball league, competes in weekend fishing tournaments for Pacific halibut and striped bass along
    the Santa Barbara coast, and they passionately root for the LA Dodgers and the San Jose Sharks, often debating game outcomes at community barbecues.
  arts: Kenneth Hornsby fills free moments with classic rock vinyl from The Eagles, Led Zeppelin, and AC DC, builds detailed model‑airplane kits, and they regularly attend the Lompoc summer art fair where
    they admire surf‑inspired paintings and local photography that echo the rhythm of the Pacific.
  travel: Kenneth Hornsby favors road trips down Highway 1, with past stops at Big Sur, the towering redwoods of Humboldt County, and wine‑tasting weekends in Santa Ynez, and they dream of a future fishing
    charter in Alaska’s Inside Passage as the ultimate escape from coastal routine.
  culinary: Kenneth Hornsby’s kitchen revolves around grilled catches—especially halibut tacos with lime, cilantro, and charred corn—while their weekend barbecues showcase classic burgers smothered in cheddar,
    a habit of over‑seasoning with extra salt, and they proudly serve the occasional smoked ribs that earn nods of approval from neighbors.
  core: Kenneth Hornsby blends rugged hands‑on know‑how with a sociable, competitive spirit, juggling a relaxed, occasionally chaotic schedule, modest frugality, and a penchant for classic rock and coastal
    living that keeps their life both grounded and ever‑curious.
background:
  cultural: Kenneth comes from a white, working‑class family rooted in the Central Coast of California. His grandparents migrated to the area during the post‑World War II industrial boom, and he grew up
    in a modest Lompoc neighborhood where agriculture, oil production, and small‑scale manufacturing shaped daily life. The community’s values of self‑reliance, neighborly cooperation, and practical problem solving
    have influenced his worldview. While not formally educated beyond the eighth grade, he has absorbed a strong ethic of hands‑on learning from local trade mentors and a cultural appreciation for the coastal
    lifestyle, including outdoor recreation and communal gatherings.
