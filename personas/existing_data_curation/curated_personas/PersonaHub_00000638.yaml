  that address basic questions such as how rocks get so hot that they melt and what causes a volcano. They are interested in books that have well-edited photographs and short, crisp texts. They are interested
  in books that are meant to whet the appetite for further exploration. They are interested in books that are meant to teach young scientists about volcanism.
