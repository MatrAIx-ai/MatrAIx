persona_description: A transportation expert who is passionate about urban planning and the impact of transportation infrastructure on urban development. They are interested in the benefits of removing
  urban highways, such as improving air and water quality, easing traffic, and creating opportunities for development, and are willing to invest in a beautiful, accessible, and people-friendly alternative
  to urban highways. They are also aware of the challenges of removing urban highways, such as the political feasibility of such a project, and are considering the merits of rebuilding crumbling and aging
  highway infrastructure versus removing them.
