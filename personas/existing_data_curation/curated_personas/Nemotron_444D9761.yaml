  hobbies: '["Reading classic Spanish literature and psychology", "Desert hiking and birdwatching", "Night‑sky photography and astronomy", "Gardening native plants", "Woodworking", "Cooking traditional
    Spanish dishes with local ingredients"]'
  career_goals: Amado aims to obtain a Certified Psychiatric Technician (CPT) credential and eventually become a shift supervisor at the mental‑health facility where he works. He plans to complete his bachelor's
    degree in mental‑health counseling, leveraging his curiosity for new therapeutic approaches while staying grounded in proven practices. Long‑term, he hopes to design a community outreach program that
    brings mental‑health resources to underserved residents of Los Lunas and neighboring rural areas, integrating technology and culturally sensitive care. He also aspires to mentor newer aides, sharing
    his practical experience and steady demeanor.
