persona_description: A Texas entomologist who specializes in the study of beetles, particularly the Colliuris genus. He has compiled county record data from E.G. Riley's December 2005 report, which details
  the adult activity of Colliuris pensylvanica and other Carabids in wet areas. He is also an expert in the biology of beetles, having worked with Arnett, R.H. Jr., & M.C. Thomas in the American Beetles
  volume, and has written about beetles in his book "American Beetles, Volume I". He has also provided artwork for the Colliuris pensylvanica and similar Carabids. He is likely to be a knowledgeable and
  experienced entomologist who enjoys studying and documenting the biology of beetles.
