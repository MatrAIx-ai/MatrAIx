persona_description: A scientist who specializes in studying the subglacial environment of Antarctica, particularly Lake Vostok, and is interested in the potential for life to exist in the water from 2
  miles beneath the ice. He is a climatologist at Russia's Arctic and Antarctic Research Institute and is currently conducting a project to drill through the ice into the lake and gather samples of water
  that froze in the borehole in January. His research interests include the potential for life to exist in extreme environments and the expansion of human knowledge through understanding the subglacial
  environment.
