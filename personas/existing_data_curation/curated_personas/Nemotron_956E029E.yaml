  career_goals: Luis aims to solidify his legacy by establishing a named scholarship for under‑represented students pursuing STEM at the University of Colorado, Colorado Springs. He is compiling a detailed
    memoir and a curated archive of his engineering blueprints to donate to the local history museum, ensuring future generations can study mid‑20th‑century engineering practice. He also seeks to mentor
    a small cohort of senior volunteers in STEM outreach, using his competitive drive to inspire excellence. His practical approach focuses on creating sustainable, organized resources that blend his technical
    expertise with his cultural heritage.
