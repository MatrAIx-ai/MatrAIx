personas:
  professional: Victoria Earhart, a retired community organizer turned folk‑art curator, leverages her project‑management acumen, Adobe Photoshop skills, and love of genealogy to orchestrate traveling exhibits
    of regional craft while mentoring volunteers with a methodical yet compassionate style.
  sports: Victoria Earhart enjoys leisurely nature walks along the Mississippi River, participates in a local birdwatching and walking club, follows the Green Bay Packers and Milwaukee Brewers with avid
    fandom, and practices gentle tai chi in winter to maintain flexibility.
  arts: Victoria Earhart immerses herself in watercolor painting inspired by Winslow Homer, quilts reminiscent of the Gee’s Bend tradition, and curates regional folk art fairs where she often references
    the works of Grandma Moses and the contemporary prints of local artist Jenna Hart.
  travel: Victoria Earhart prefers thoughtfully planned trips, having explored Door County’s lighthouses, taken a genealogy‑focused tour of historic towns along the Great Lakes, and now dreaming of a cultural
    pilgrimage to Copenhagen’s design museums and the Bavarian villages where her ancestors once lived.
  culinary: Victoria Earhart enjoys farm‑to‑table cooking, often preparing beet and goat cheese salad, rosemary‑infused roasted chicken, and fresh herb pesto with basil and dill from her garden, while occasionally
    treating herself to a cheese board featuring local cheddar and blue cheese.
  core: Victoria Earheart blends meticulous organization with boundless curiosity, turning every community project, art piece, and garden task into a chance to preserve local heritage while quietly indulging
    in her love of watercolor and genealogy.
background:
  cultural: Victoria was raised in a small Midwestern town in Wisconsin, immersed in the values of community, modesty, and self‑reliance typical of the region. Her family heritage includes German and Norwegian
    ancestry, reflected in traditional celebrations, seasonal festivals, and a strong emphasis on folk crafts. Her upbringing in the Lutheran church and participation in local community events fostered
    a deep appreciation for collective stewardship and cultural preservation, which continue to shape her worldview and volunteer commitments.
attributes:
  skills: '[''Event planning'', ''Volunteer coordination'', ''Basic accounting'', ''Digital photo archiving'', ''Adobe Photoshop (intermediate)'', ''Watercolor painting'', ''Quilting'', ''Sewing'', ''Public
