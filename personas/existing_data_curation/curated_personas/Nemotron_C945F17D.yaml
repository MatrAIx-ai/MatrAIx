  hobbies: '[''Watercolor Painting'', ''Sketching'', ''Creative Writing'', ''Speculative Fiction Reading'', ''Philosophy Exploration'', ''Hiking'', ''Yoga'', ''Community Library Volunteering'', ''Acoustic
    Guitar'', ''Art Workshops'', ''Artisanal Baking'']'
  career_goals: Mai aspires to transition from a classroom caregiver to a program director within the next five years, pursuing a Bachelor’s degree in Early Childhood Education while obtaining a State Child
    Care Director license. She is driven to develop a signature learning model that fuses abstract artistic concepts with foundational literacy and numeracy, positioning her center as an innovative hub
    in Luzerne County. Long‑term, she envisions opening her own boutique early‑learning center that offers specialized arts‑infused curricula for children ages 2‑6, while mentoring new educators and advocating
    for evidence‑based early childhood policies at the county level.
