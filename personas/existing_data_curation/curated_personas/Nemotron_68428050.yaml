  career_goals: Although retired, Nadia seeks to keep her curiosity alive through structured, manageable goals. She plans to enroll in senior‑adult education courses at a local community college, focusing
    on Florida history and digital photography, with the aim of documenting her garden and family memories. Writing a memoir that weaves personal stories with the cultural history of Jacksonville is a central
    ambition, allowing her to preserve lessons for future generations. Nadia also hopes to expand her volunteer role at the nearby senior center, helping design easy‑to‑follow activity guides for residents,
    and to remain an active participant in the community garden, sharing her horticultural expertise. Maintaining her health through regular walks along the St. Johns River and gentle yoga classes is an
    ongoing priority, as is cultivating a calm mindset to counteract her natural tendency toward worry.
