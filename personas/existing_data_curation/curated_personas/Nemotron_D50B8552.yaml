  career_goals: Antonia aspires to move into a regional management position within a hospitality group where she can champion employee well‑being, sustainable sourcing, and community engagement across multiple
    locations. While she values steady progress, her curiosity drives her to experiment with new service models, and she hopes to eventually open a small, farm‑to‑table bistro in Oklahoma City that emphasizes
    a communal dining experience and local partnerships. Mentoring emerging female leaders in the food‑service industry is a personal ambition, allowing her to foster harmony and professional growth in
    others while managing her own stress through incremental, well‑planned steps.
