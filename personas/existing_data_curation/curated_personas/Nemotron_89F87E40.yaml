  skills: '[''MIG welding'', ''TIG welding'', ''Stick welding'', ''CNC machining'', ''Blueprint reading'', ''Sheet metal fabrication'', ''Plastic injection molding'', ''CAD modeling (SolidWorks)'', ''Rapid
