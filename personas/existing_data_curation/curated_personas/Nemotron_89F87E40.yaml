  hobbies: '[''Metal sculpture'', ''3D printing'', ''DIY home projects'', ''Visiting art galleries'', ''Attending live music festivals'', ''Fishing'', ''Cooking (Texas BBQ)'', ''Reading science-fiction'',
    ''Technology podcasts'', ''Volunteer teaching metalworking'', ''Motorcycle restoration'']'
  career_goals: He aims to become a master fabricator recognized for blending functional engineering with artistic expression. Over the next five years Owen plans to earn a journeyman welding certification
    and become a certified CNC operator, while also completing an online associate degree in industrial design. He hopes to open a small workshop in the Brazoria area that offers custom metal art, bespoke
    plastic components for the local petrochemical sector, and prototyping services for startups. A longer-term ambition is to mentor apprentices, contribute to community makerspaces, and develop sustainable
    fabrication techniques that minimize waste.
