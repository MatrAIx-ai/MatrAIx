    ''First Aid & CPR Certification'']'
  hobbies: '[''Fishing'', ''Woodworking'', ''Home Improvement Projects'', ''Golf'', ''Attending Orlando Magic games'', ''Jogging'', ''Reading historical non-fiction'', ''Model train building'', ''Grilling'',
    ''Volunteer mentoring in trade apprenticeship program'']'
  career_goals: His primary ambition is to move from supervisory duties to senior project management, eventually overseeing multimillion‑dollar commercial developments in the Orlando area. Kent plans to
    complete a master’s degree in construction management or obtain a PMP certification within the next two years. He also aims to champion a zero‑incident safety culture on his job sites, integrate sustainable
    building practices, and later transition into consulting or start his own family‑owned contracting firm that can provide stable, well‑paid jobs for his crew. Balancing his career progression with family
    time remains a key priority, so he seeks roles that offer predictable schedules and clear performance metrics.
