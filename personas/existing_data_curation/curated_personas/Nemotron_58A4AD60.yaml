personas:
  professional: Kent Mayeur, a seasoned construction supervisor with 25 years of hands‑on trade experience and a solid STEM background, leverages his OSHA‑certified safety expertise, blueprint reading,
    and Procore proficiency to lead crews methodically, planning each project phase with a precision that reflects his need for structure while mentoring apprentices toward a future in senior project management.
  sports: Kent Mayeur, an avid weekend golfer at the Orlando Country Club and a faithful supporter of the Orlando Magic, joins a local jogging club for early‑morning runs around Lake Eola and follows the
    Florida Panthers during the NHL season, balancing competitive spirit with a disciplined, low‑impact fitness regimen that satisfies his methodical nature.
  arts: Kent Mayeur, who finds creative release in woodworking and model‑train construction, enjoys listening to classic rock icons like The Rolling Stones and Bob Dylan while shaping furniture, and collects
    prints of Frank Lloyd Wright’s architecture to inspire his designs, occasionally attending the Orlando Museum of Art’s exhibit on American realism.
  travel: Kent Mayeur, preferring well‑planned road trips that blend scenic fishing spots with family‑friendly activities, has explored the Florida Keys on a weekend fishing charter, toured the historic
    districts of Savannah, Georgia, and dreams of a spring road‑trip through the Canadian Rockies to photograph mountain railways, all while budgeting travel around his children's school calendar.
  culinary: Kent Mayeur, a confident backyard grillmaster, favors searing a cedar‑plank salmon seasoned with lemon‑zest and dill, smoking ribs with mesquite wood, and whipping up a classic shrimp‑and‑grits
    dish that showcases Florida’s Gulf seafood, while his modest cooking skill level lets him rely on simple, high‑quality ingredients like fresh local herbs and premium USDA steaks.
  core: Kent Mayeur blends a meticulous, safety‑first mindset with a hands‑on love for woodworking, golf, and family grilling, yet his chronic worry about project deadlines often leads to late‑night email
    checks and a stubborn reluctance to delegate.
background:
  cultural: Kent was raised in a middle‑class suburban family in the Midwest, the son of a French‑Canadian father and an Irish‑American mother. The family emphasized a strong work ethic, punctuality, and
    community involvement, values that were reinforced by regular attendance at a Protestant church. After moving to Orlando in his early thirties, he embraced the Southern hospitality and multicultural
    vibe of Central Florida, while still honoring traditional American holidays and the local fishing and outdoor culture. His cultural identity blends his European ancestry, Midwestern upbringing, and
    the diverse, sun‑rich lifestyle of modern Florida.
attributes:
  skills: '[''Crew Scheduling'', ''Site Safety & OSHA Compliance'', ''Blueprint Reading & Technical Drawings'', ''Construction Cost Estimation'', ''Project Coordination & Scheduling'', ''Heavy Equipment
