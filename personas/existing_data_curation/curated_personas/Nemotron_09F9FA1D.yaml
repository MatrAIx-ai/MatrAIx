  professional: Derrick Estroff, a curious one-year-old, demonstrates early engineering instincts by persistently stacking, toppling, and reassembling wooden blocks, blending curiosity with a practical
    knack for cause-and-effect, while their relaxed, slightly disorganized play style shows a preference for spontaneous discovery over rigid routines.
  sports: Derrick Estroff, a one-year-old, watches the New York Yankees with wide-eyed fascination, claps enthusiastically during games on family viewing nights, and joins the Westchester YMCA toddlers'
    "Tumble Time" program where their energetic, competitive streak shines as they race for a squeaky toy.
  arts: Derrick Estroff, a one-year-old, delights in Raffi's "Baby Beluga" and the lively antics of Sesame Street's Elmo while engaging in finger-painting sessions reminiscent of the bright colors in a
    Dr. Seuss book, allowing music and visual art to shape their playful identity.
  travel: Derrick Estroff, a one-year-old, has been cradled on a road trip to the family's summer cottage on the Hudson River, marveled at giraffes during a visit to the Bronx Zoo, celebrated Fourth of
    July fireworks at the Westchester County Fair, and looks forward to a stroller-friendly adventure at Disney World in Florida when the family's schedule permits.
  culinary: Derrick Estroff, a one-year-old, prefers the smooth sweetness of apple puree, warm vanilla oatmeal laced with cinnamon, soft scrambled eggs with cheddar, and gets delightfully messy when exploring
    finger foods like steamed broccoli florets and soft cheese cubes.
  core: Derrick Estroff, a one-year-old, blends relentless curiosity, a competitive spark, and a sensitive disposition into a lively, slightly chaotic world of blocks, jingling coins, bright colors, and
    family-filled celebrations.
