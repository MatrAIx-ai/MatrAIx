persona_description: A geologist who specializes in the study of vertebrate animals, particularly the evolution and classification of fishes. They have a deep understanding of the geological processes that
  shaped the environments in which these animals evolved and their roles in the ecosystem. They are also knowledgeable about the classification and evolution of the first vertebrates, including fishes,
  and have a passion for understanding the relationships between different species and their habitats. They are likely to be interested in the details of the GCR series, including the sites discussed and
  the content of each chapter, as well as the geological and biological context of the fossils.
