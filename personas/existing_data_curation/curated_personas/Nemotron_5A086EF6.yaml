  career_goals: Carolyn dreams of exploring Maine's coastal ecosystems and becoming a marine biologist who discovers and protects marine life, especially lobster habitats. She also hopes to merge her love
    of art and science by curating interactive museum exhibits that inspire curiosity. Her competitive spirit drives her to win school science fairs and lead community projects. Ultimately, she aspires
    to be a future leader who encourages peers to pursue creative and scientific endeavors.
