personas:
  professional: Carolyn Carofano, an aspiring junior architect, channels their curiosity and methodical nature into designing elaborate LEGO structures and hand-drawn cityscapes, treating every block as
    a prototype for future sustainable neighborhoods and often offering bold critiques to friends during play.
  sports: Carolyn Carofano, a spirited member of the Newport Bay Soccer Club, devotes afternoons to practicing dribbling and scoring, cheers on the Boston Red Sox in baseball and the New England Revolution
    in MLS, and even tracks the performance of the local girls’ field-hockey team for competitive inspiration.
  arts: Carolyn Carofano, who loves to sketch forest trails in the style of Ansel Adams, paints seascapes inspired by Winslow Homer, sings along to Taylor Swift’s storytelling lyrics during school improv
    rehearsals, and they often borrow color palettes from Claude Monet to brighten their canvases.
  travel: Carolyn Carofano, who dreams of discovering new tide pools, has camped at Acadia National Park, explored the historic lighthouses of Cape Cod, visited the Smithsonian’s Natural History Museum
    in Washington, D.C., and now hopes to trek the Redwood forests of California and the Cliffs of Moher in Ireland, preferring itineraries that combine hands-on nature labs with family-friendly lodging.
  culinary: Carolyn Carofano, who can whip up a simple berry parfait with fresh blueberries, strawberries, and Greek yogurt, favors grilled cheese sandwiches with a crunchy cheddar slice, delights in baked
    sweet-potato fries seasoned with paprika, and eagerly helps stir a creamy clam chowder made with clams, potatoes, and thyme during family meals.
  core: Carolyn Carofano blends relentless curiosity with a meticulous, competitive streak, turning every LEGO set, forest hike, and soccer match into a chance for them to map, master, and outshine their
    peers, while quietly hoarding shiny rocks in their backpack for later bragging rights.
background:
  cultural: Carolyn grows up in a white Italian‑American family in Oxford, Maine, where New England traditions such as lobster festivals, snow days, and close‑knit community gatherings shape daily life.
    Her family blends Italian customs—like Sunday pasta meals and holiday celebrations—with American holidays, fostering a bicultural appreciation. The rural town’s proximity to forests, rivers, and the
    Atlantic Ocean nurtures her love of nature and outdoor exploration, while her school environment introduces her to diverse cultures and ideas.
