personas:
  professional: An aspiring junior author and illustrator, Anthony Beene channels their vivid imagination into sketching fantastical creatures and crafting short stories, while their methodical planning
    and compassionate nature make them a reliable volunteer at the local library's story‑time sessions.
  sports: Anthony Beene, an avid hiker of Boise's foothills and a member of the Boise Junior Soccer Club, follows the Boise State Broncos football season religiously, dribbles a soccer ball after school
    with the same methodical precision he applies to LEGO builds, and uses weekend trail runs to balance imaginative indoor pursuits with physical exertion.
  arts: Anthony Beene, a budding fantasy illustrator and ukulele player, draws inspiration from Hayao Miyazaki's animated worlds, the lyrical storytelling of Taylor Swift, and the magical prose of J.K.
    Rowling, often recreating scenes with their own twist while humming acoustic renditions of classic folk songs.
  travel: Anthony Beene, a curious eleven‑year‑old who plans trips on a hand‑drawn map and logs each stop in a nature journal, has hiked the geysers of Yellowstone and picnicked in the Portland Japanese
    Garden, and dreams of exploring the fjords of Iceland and the bustling streets of Tokyo with their family, though their worry about missing schoolwork sometimes makes them hesitate to book longer journeys.
  culinary: Anthony Beene, an enthusiastic junior chef with a modest knack for cooking, loves whipping up spaghetti carbonara with pecorino cheese and pancetta, experiments with dragonfruit smoothies topped
    with fresh mint, and delights in crafting homemade pepperoni pizza, though they often over‑season their dishes in a burst of creative energy.
  core: Anthony Beene, an imaginative yet worry‑prone eleven‑year‑old, balances meticulous planning with endless fantasy world‑building, often losing sleep over unfinished sketches while obsessively organizing
    their LEGO city in perfect symmetry.
background:
  cultural: Anthony is a white American raised in Boise, Idaho, within a middle‑class family that values self‑reliance, community service, and outdoor recreation. The region’s blend of mountain culture,
    burgeoning tech influences, and strong emphasis on environmental awareness shapes his appreciation for nature, hands‑on making, and collaborative learning. School programs that highlight local Native
    American heritage and community volunteer initiatives have nurtured his respect for cultural diversity and stewardship.
attributes:
  skills: '[''drawing'', ''storyboarding'', ''comic creation'', ''basic Scratch programming'', ''LEGO construction'', ''project planning'', ''peer mediation'', ''creative writing'']'
  hobbies: '[''sketching'', ''creative writing'', ''building LEGO models'', ''reading fantasy & science‑fiction'', ''playing ukulele'', ''hiking and nature journaling'', ''library volunteering'']'
  career_goals: Anthony dreams of becoming an architect who designs community spaces that blend art, nature, and accessibility, while also considering mental‑well‑being. He is equally fascinated by the
    idea of being a children’s author, crafting imaginative stories that teach empathy and resilience. Long‑term, he hopes to study environmental design and eventually lead youth programs that combine creativity,
    outdoor stewardship, and emotional support for peers.
