personas:
  professional: Brittany Cardona, a retired church community organizer and lifelong gardener, leverages their meticulous budgeting, event‑planning, and quilting expertise to mentor younger congregants in
    cooking, budgeting, and horticulture while aggressively pursuing consecutive wins at the Lee County bake‑off, reflecting a competitive streak and love of structured, step‑by‑step instruction.
  sports: Brittany Cardona is a devoted fan of the Atlanta Braves and Georgia Bulldogs, attends local senior walking club meet‑ups at the Lee County park every Saturday for low‑impact exercise, and enjoys
    cheering on the Atlanta Hawks basketball games on television while keeping a casual rivalry with friends over bridge scores as a strategic sport of its own.
  arts: Brittany Cardona immerses themselves in gospel music, regularly listening to Mahalia Jackson, Shirley Caesar, and Aretha Franklin on their favorite radio station, while also savoring historical
    novels by Toni Morrison and Jesmyn Ward, and they attend monthly church choir rehearsals where they appreciate the harmonious blend of traditional hymns and modern arrangements.
  travel: Brittany Cardona prefers low‑key, budget‑friendly trips that blend history and relaxation, having visited Savannah, Charleston, and New Orleans on weekend getaways and dreaming of a pilgrimage
    to Washington D.C. to explore the National Museum of African American History and Culture, all while planning each itinerary in a detailed notebook to avoid unexpected costs.
  culinary: Brittany Cardona excels at traditional Southern cooking, perfecting sweet potato pie, buttery cornbread, and chicken and dumplings using fresh garden vegetables, butternut squash, and locally
    sourced herbs like thyme and sage, and they approach each recipe with a laboratory‑like precision, timing each step to the minute to ensure consistent, soulful flavors.
  core: Brittany Cardona blends a love of structure with a competitive spirit, channeling meticulous budgeting, gardening, and baking into community mentorship while battling occasional worries and a skeptical
    outlook toward new ideas.
background:
  cultural: Brittany was raised in the African‑American community of the Black Belt of Alabama, where the church has long served as the cultural and social anchor. Her upbringing was steeped in the traditions
    of soul food, gospel music, and oral storytelling passed down through generations of foremothers who endured segregation and the civil‑rights struggle. Family gatherings emphasized communal cooking,
    sharing recipes like collard greens, sweet potato pie, and seasoned fried chicken, which continue to shape her culinary identity. The close‑knit church fellowship in Valley, AL, instilled a sense of
    responsibility to give back through service and mentorship. Brittany’s cultural heritage also includes the legacy of quilting circles, where women preserved history through fabric, and a deep respect
    for self‑reliance, reflecting the resilience of her community amid historic economic challenges.
attributes:
  skills: '["Traditional Southern cooking and baking", "Household budgeting and ledger keeping", "Community event planning and execution", "Quilting with pattern charts", "Seasonal vegetable gardening",
