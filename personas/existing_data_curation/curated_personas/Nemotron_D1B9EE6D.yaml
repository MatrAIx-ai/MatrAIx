  hobbies: '["Vegetable gardening", "Baking and cooking", "Quilting and crocheting", "Church choir singing", "Weekly Bible study", "Bridge card game", "Reading African‑American history novels", "Listening
    to gospel music"]'
  career_goals: Although officially retired, Brittany’s ambitions focus on preserving her independence and sharing her expertise. She hopes to become the go‑to mentor for younger members of her church in
    cooking, budgeting, and gardening, offering structured workshops that emphasize step‑by‑step learning. She aims to win the annual Lee County church bake‑off three years in a row, cementing her reputation
    for reliable, high‑quality pies and casseroles. Brittany also aspires to compile a memoir and a family recipe book, documenting oral histories and cultural dishes for future generations. Additionally,
    she plans to enroll in a community‑college horticulture program to formalize her gardening knowledge, ensuring she can maintain a thriving garden that supplies fresh produce for her household and church
    pantry.
