  hobbies: '[''Nature Photography'', ''Watercolor Painting'', ''Acoustic Guitar Playing'', ''Reading (Fiction, Philosophy, True-Crime)'', ''Creative Writing'', ''Community Theater Improv'', ''Youth Mentorship
    Volunteering'', ''Hiking'', ''Experimental Cooking'', ''Live Music Attendance'']'
  career_goals: Dennis aims to ascend to a senior command position within the county sheriff’s office, ideally as a Deputy Chief or Chief of Police, where he can institutionalize innovative community‑policing
    models that integrate arts, local culture, and restorative justice. He also envisions establishing a cross‑departmental task force that tackles emerging threats such as drug trafficking and cyber‑crimes,
    using his business acumen to secure grant funding and partnerships. Beyond the uniform, he aspires to author a book on the psychology of policing and to teach a course on ethical leadership at a regional
    community college. Ultimately, he seeks to leave a legacy of a more compassionate, resilient, and forward‑thinking law‑enforcement agency that strengthens trust between officers and the diverse residents
    and tourists of Sevierville.
