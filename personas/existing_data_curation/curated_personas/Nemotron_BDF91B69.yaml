personas:
  professional: Srikanth Inayat is a budding robotics enthusiast who leverages curiosity and practicality to lead his school's robotics club, coding autonomous bots while balancing teamwork with methodical
    planning, and they consistently apply a blend of organized scheduling and spontaneous tinkering to keep projects on track.
  sports: Srikanth Inayat chases the ball on the field for the Sunrise Soccer Club and on the court for the Eagle Mountain Basketball Club, maintaining a balanced fitness routine that mixes after‑school
    drills with weekend pickup games, while they passionately root for Manchester United and the Los Angeles Lakers.
  arts: Srikanth Inayat strums acoustic renditions of A.R. Rahman's film melodies and Billie Eilish's pop hits on the guitar, while they regularly attend local cultural festivals and school talent shows
    featuring performers like Shakira and The 1975, using music as their primary outlet for social connection and creative expression.
  travel: Srikanth Inayat favors short, budget‑friendly family road trips to historic sites like Rajasthan's forts and school‑organized field trips to New York City, while they dream of a solo summer adventure
    in Tokyo's Akihabara district and a cultural immersion tour in Paris to sample café pastries and museum art.
  culinary: Srikanth Inayat, a budding home chef, frequently cooks fragrant chicken biryani using basmati rice, saffron, and caramelized onions and masters crisp dosas with fermented rice‑lentil batter,
    while they also experiment with quick taco bowls topped with avocado and jalapeño for after‑school meals.
  core: Srikanth Inayat is a socially energetic, curiosity‑driven teen who blends technical tinkering with cultural cooking, and they navigate life with pragmatic optimism, occasional impulsive spending,
    and a habit of postponing homework until the last minute.
background:
  cultural: Srikanth belongs to a South Asian (Indian) family that settled in Irving, Texas. His household blends Indian cultural traditions—celebrating Diwali and Holi, speaking Telugu at home, and preparing
    traditional meals—with the broader American lifestyle of Dallas County. This multicultural environment nurtures his ability to navigate both cultural worlds, valuing respect for elders, communal harmony,
    and the energetic, outgoing spirit of his Texan peers.
