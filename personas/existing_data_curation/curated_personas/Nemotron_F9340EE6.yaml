  hobbies: '[''Hiking in the Rockies'', ''Gardening'', ''Book club'', ''Volunteer STEM outreach'', ''Live music and theater'', ''Cooking classes'', ''Bridge (card game)'', ''Makerspace projects (Arduino)'']'
  career_goals: Looking ahead, Meradeth aims to transition from day-to-day supervision to a senior advisory role where she can shape organizational strategy and mentor emerging leaders. She hopes to lead
    a department-wide digital transformation initiative that streamlines administrative workflows, while also establishing a mentorship program for women and underrepresented groups in STEM. In the longer
    term, she envisions consulting part-time for nonprofit organizations to improve their operational efficiency before fully retiring.
