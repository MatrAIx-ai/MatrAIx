  career_goals: Approaching retirement, Luis aims to transition from full‑time long‑haul driving to a part‑time supervisory and trainer role within his current logistics company. He plans to obtain a certified
    driver‑trainer designation so he can formally mentor younger drivers, especially those from Hispanic backgrounds. Luis also envisions launching a small, family‑owned delivery service that focuses on
    specialty goods for the Lafayette community, allowing him to stay engaged while reducing the physical demands of long‑distance driving. Financial security remains a priority, so he is dedicated to maximizing
    his savings, investing in a modest property, and providing for his grandchildren’s education. Throughout these ambitions, he intends to maintain the structured, reliable work ethic that has defined
    his career.
