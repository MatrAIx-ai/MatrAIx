  hobbies: '[''Gardening (vegetable and herb beds)'', ''Quilting and patchwork crafts'', ''Reading mystery novels'', ''Bird‑watching at local nature preserves'', ''Listening to classic country and folk
    music'', ''Volunteering at church food pantry'', ''Attending community potlucks and fairs'']'
  career_goals: Even at 71, Wanda aims to translate her decades of driving experience into a mentorship role, offering part‑time training for new commercial drivers and serving as a safety auditor for her
    company’s fleet. She hopes to earn a recognized "Senior Driver of the Year" award that highlights her spotless safety record, giving her a sense of personal achievement and competitive validation. Financially,
    she wants to secure a stable supplemental income that allows her to maintain her independence without over‑extending her schedule, thereby reducing the stress that often weighs on her. Long‑term, she
    aspires to launch a small home‑based side business selling hand‑stitched quilts, merging her love of craft with a modest entrepreneurial venture.
