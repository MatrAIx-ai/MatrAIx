persona_description: A healthcare professional who is interested in the health of the oral cavity, particularly the tongue. They are knowledgeable about the common conditions that can affect the tongue,
  such as oral thrush, leukoplakia, oral lichen planus, vitamin deficiencies, and geographic tongue. They are also familiar with the symptoms and treatments for these conditions, and can provide guidance
  to patients on how to manage their tongue health. They may also have experience in interpreting tongue changes as a reflection of underlying health issues.
