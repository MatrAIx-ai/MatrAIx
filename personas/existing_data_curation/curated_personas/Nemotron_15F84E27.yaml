  hobbies: '[''Reading historical nonfiction and science books'', ''Listening to and collecting jazz vinyl'', ''Balcony gardening (herbs and vegetables)'', ''Cooking with a focus on healthy Soul Food adaptations'',
    ''Walking the Chicago lakefront trail'', ''Mentoring high school students in coding'', ''Conducting tech‑literacy workshops for seniors'']'
  career_goals: Damien aims to transition into a senior leadership role such as Director of IT or Chief Information Officer within the next five years, where he can drive digital transformation initiatives
    that improve efficiency and customer experience. He is passionate about building inclusive technology teams and plans to establish a mentorship pipeline for Black and under‑represented professionals
    in the tech sector. Additionally, he envisions launching a community‑focused nonprofit that offers free technology workshops and career counseling for Chicago youth, leveraging his managerial experience
    to create sustainable impact. Damien also hopes to champion environmentally responsible IT practices, integrating green computing standards into organizational policy.
