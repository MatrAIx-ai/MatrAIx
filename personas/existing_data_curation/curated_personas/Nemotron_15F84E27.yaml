personas:
  professional: Damien Snow, a seasoned IT executive with over twenty years steering complex infrastructure projects, leverages deep expertise in network design, cloud migrations, cybersecurity risk assessments,
    and data analytics while nurturing inclusive teams through mentorship and translating technical concepts into clear guidance for stakeholders, because they balance curiosity with practicality.
  sports: Damien Snow, a regular walker on Chicago’s lakefront trail who frequents the Lakefront Running Club, follows the Chicago Bulls and Bears passionately, and enjoys weekend pickleball matches at
    the nearby community center, because they value low‑key, consistent fitness activities over high‑intensity competition.
  arts: Damien Snow, a devoted jazz aficionado who collects vinyl from legends like Miles Davis and Kamasi Washington, attends intimate shows at The Green Mill, and finds inspiration in exhibits at the
    Art Institute of Chicago, as they blend a love of music with visual art appreciation.
  travel: Damien Snow, an intentional traveler who designs detailed itineraries for weekend getaways to Lake Geneva and annual culinary pilgrimages to New Orleans, while also dreaming of a cultural immersion
    trip to Ghana to explore diaspora connections, because they balance adventure with thoughtful planning and budget considerations.
  culinary: Damien Snow, a home‑cook who tends a balcony garden of basil, thyme, and kale, merges traditional Soul Food staples—such as collard greens and sweet‑potato pie—with healthier twists like quinoa‑infused
    dishes, and relishes experimenting with spice blends like smoked paprika and sumac, because they cherish flavors that honor heritage while promoting well‑being.
  core: Damien Snow blends disciplined IT leadership with a quiet curiosity for history, jazz, and sustainable living, they mentor the next generation while quietly juggling a love for vintage vinyl and
    a modest balcony garden.
background:
  cultural: Damien identifies as African American and was raised in Chicago’s Bronzeville neighborhood, a community steeped in cultural heritage and civil‑rights activism. His upbringing emphasized resilience,
    collective responsibility, and the importance of education, values reinforced by his family's active participation in the local church and neighborhood associations. While he has navigated professional
    spaces where he was often one of the few Black leaders, he remains deeply connected to his roots, celebrating Juneteenth, supporting local Black-owned businesses, and attending cultural festivals that
    highlight African American art and music. These experiences shape his commitment to mentorship, community empowerment, and advocating for diversity within the tech industry.
attributes:
  skills: '[''IT project management'', ''Network architecture'', ''Cloud migration planning'', ''Cybersecurity risk assessment'', ''Data analytics (SQL, Power BI)'', ''ERP implementation'', ''Budgeting
