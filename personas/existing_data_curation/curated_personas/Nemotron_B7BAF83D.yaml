  hobbies: '[''Abstract painting'', ''Coastal photography'', ''Science‑fiction reading'', ''Arduino and Raspberry Pi tinkering'', ''Puzzle solving'', ''Gardening'', ''Yoga'', ''Volunteer tech workshops
    for seniors'', ''Attending art festivals'', ''Model train building'']'
  career_goals: Patricia aims to become a certified Master Vending Technician and to lead a regional service team that sets industry standards for reliability and innovative design. She plans to launch
    a boutique consultancy that refurbishes and custom‑designs arcade and vending units for upscale hotels, museums, and event spaces, blending her technical expertise with her artistic imagination. Long‑term,
    she hopes to mentor more women in technical trades, develop a training curriculum for cashless‑payment integration, and eventually transition into a product‑development role where she can influence
    the next generation of interactive, art‑focused vending experiences.
