personas:
  professional: Jean Lumpkin, a 32‑year‑old landscape architect, blends her AutoCAD, SketchUp, and native‑plant stormwater expertise into practical, community‑focused designs, while they turn client briefings
    into lively brainstorming sessions with their talkative, relationship‑focused demeanor, and their preference for routine drives them to lock down project timelines even as their desk habitually becomes
    a organized chaos of plant cuttings and coffee cups.
  sports: Jean Lumpkin, a 32‑year‑old nature lover, stays fit through weekly coastal hikes with the Orange County Trails club, joins weekend beach‑volleyball pick‑ups at Huntington Beach, and follows the
    Los Angeles Dodgers, LA Galaxy, and Anaheim Ducks with spirited game‑day viewing parties, all while they prefer a relaxed, no‑gym routine that fits around their project deadlines.
  arts: Jean Lumpkin, a 32‑year‑old social butterfly, regularly attends live‑music evenings featuring artists like John Mayer, Norah Jones, and local indie folk band The Paper Kites at neighborhood venues,
    enjoys occasional performances by the Los Angeles Philharmonic, and draws inspiration from the vibrant murals of LA street artists such as Shepard Fairey, all while they often discuss the latest gallery
    openings over a glass of pinot.
  travel: Jean Lumpkin, a 32‑year‑old explorer, favors spur‑of‑the‑moment weekend getaways to nearby gems like Joshua Tree National Park and the coastal cliffs of Big Sur, while also dreaming of Mediterranean
    escapes to Barcelona and Santorini, planning trips loosely around work cycles and a modest travel fund, and they often blend hiking adventures with wine‑tasting tours.
  culinary: Jean Lumpkin, a 32‑year‑old culinary hobbyist, enjoys experimenting with Mediterranean recipes such as grilled branzino with lemon‑oregano glaze, roasted ratatouille featuring zucchini, eggplant,
    and bell peppers, and homemade hummus seasoned with tahini and smoked paprika, and they frequently pair these dishes with a crisp Sauvignon Blanc while honing their intermediate cooking skills through
    weekend DIY kitchen projects.
  core: Jean Lumpkin, a 32‑year‑old landscape architect, thrives on routine‑driven design work yet frequently misplaces their sketchbook in cafés, fuels project collaboration with talkative charm, and can’t
    resist a spontaneous wine‑tasting or coastal hike on a weekend.
background:
  cultural: Jean was raised in a middle‑class suburban family in Southern California, with roots tracing back to English and Irish ancestry. Her upbringing emphasized practicality, self‑reliance, and community
    involvement, reflecting the West Coast’s blend of laid‑back lifestyle and strong civic engagement. Growing up near the beaches of Orange County, she developed an appreciation for outdoor living and
    native ecosystems, which influences both her personal hobbies and professional design ethos.
attributes:
  skills: '[''Site Analysis'', ''Conceptual Landscape Design'', ''AutoCAD'', ''SketchUp'', ''Vectorworks'', ''Native Plant Selection'', ''Sustainable Stormwater Management'', ''Construction Documentation'',
    ''Client Consultation'', ''Team Collaboration'']'
  hobbies: '[''Community‑Garden Volunteering'', ''Coastal Hiking'', ''Photography'', ''Wine Tasting'', ''Live‑Music Events'', ''Yoga'', ''Mediterranean Cooking'', ''DIY Home‑Decor Workshops'']'
  career_goals: Jean aims to become a senior project lead within the next five years, guiding multidisciplinary teams to deliver community‑focused landscape projects that blend practicality with aesthetic
    appeal. She hopes to spearhead public‑space revitalization initiatives in Orange County, integrating native plantings and low‑maintenance designs that foster neighborhood cohesion. Long‑term, she envisions
    launching her own boutique firm that prioritizes collaborative design processes, offering flexible, client‑centered services while maintaining the routine‑driven workflow she values.
