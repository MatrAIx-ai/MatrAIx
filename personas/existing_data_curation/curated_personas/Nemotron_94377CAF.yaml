  hobbies: '[''Abstract Painting (Cuban-inspired)'', ''Digital Photography'', ''Salsa Dancing'', ''Cooking Traditional Cuban Cuisine'', ''Reading Contemporary Fiction & Philosophy'', ''Volunteer Mentoring
    at Community Center'', ''Organizing Art Workshops'', ''Gardening Tropical Plants'', ''Attending Cuban Cultural Festivals'', ''Planning Weekend Trips to Natural Reserves'']'
  career_goals: Looking ahead, Rosario aims to advance into an Office Manager or Operations Manager role within the next three to five years, leveraging her supervisory experience to oversee larger organizational
    functions. She plans to earn professional credentials such as the Certified Administrative Professional (CAP) and Project Management Professional (PMP) to strengthen her strategic skill set. Passionate
    about technology, she intends to spearhead company‑wide initiatives that integrate AI‑driven productivity tools and workflow automation, improving efficiency while fostering a culture of continuous
    learning. Rosario also seeks to champion diversity and inclusion, especially promoting Hispanic and Latino representation in leadership. In the longer term, she envisions transitioning to a consulting
    practice that helps small businesses streamline administrative processes, and she hopes to establish a community art space that celebrates Cuban heritage and modern creativity.
