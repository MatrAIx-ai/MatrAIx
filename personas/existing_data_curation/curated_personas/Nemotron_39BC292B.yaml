personas:
  professional: Paris Sanders thrives as a real‑time stenographer and simultaneous captioner in Georgia courts, leveraging their STEM‑honed analytical mind and compassionate demeanor to deliver rapid, accurate
    transcriptions while mentoring junior reporters and gently de‑escalating tense courtroom moments.
  sports: Paris Sanders enjoys gentle fitness activities like community walking club hikes and weekdays pickleball at a local senior center, while cheering on the Atlanta Falcons, Atlanta Hawks, and Georgia
    Bulldogs, finding sports a low‑key outlet that balances their need for movement and relaxation.
  arts: Paris Sanders finds creative refuge in quilting, crochet, and reading the works of Toni Morrison, Walter Mosley, and Hilary Mantel, while also listening to the soulful sounds of Otis Redding, Aretha
    Franklin, and contemporary artist Leon Bridges, weaving these artistic passions into family potluck gatherings.
  travel: Paris Sanders prefers relaxed, purpose‑driven travel, often road‑tripping to Southern gems like Savannah and New Orleans for culinary inspiration, while dreaming of a leisurely visit to Asheville’s
    Blue Ridge Parkway and a culturally immersive tour of Washington, D.C., all within a modest travel budget.
  culinary: Paris Sanders delights in Southern soul food, skillfully blending garden‑fresh tomatoes, collard greens, and herbs into inventive dishes such as smoked turkey collard greens, tomato‑infused
    gumbo, and cornbread stuffing, while experimenting with spice twists that reflect their curiosity and love for comforting, community‑focused meals.
  core: Paris Sanders is a compassionate, tech‑savvy court captioner who balances meticulous transcription work with a garden‑tended, improvisational lifestyle, often wrestling with anxiety and a delightfully
    chaotic approach to planning.
background:
  cultural: Paris is a Black woman raised in Tyrone, GA, a community steeped in Southern African‑American traditions. Her family’s roots trace back to the Great Migration, and she grew up listening to gospel
    choirs, soul music, and stories of civil‑rights activism that shaped her sense of resilience and solidarity. Church has been a central pillar, offering both spiritual nourishment and a space for communal
    support. She embraces Southern culinary heritage, preserving family recipes while sharing them at neighborhood gatherings and Juneteenth celebrations. The close‑knit nature of her community, combined
    with the legacy of fighting for equal rights in Georgia, informs her deep commitment to accessibility and social justice. As a professional Black woman in the legal‑tech field, Paris navigates a predominantly
    white environment with poise, drawing strength from the collective history of perseverance and the supportive networks of her local Black community.
attributes:
  skills: '["Real‑time courtroom stenography", "Simultaneous captioning with CART technologies", "Legal terminology expertise", "Assistive technology troubleshooting", "Audio‑visual equipment maintenance",
    "Technical documentation", "Peer training and mentorship", "Effective written communication", "Crisis de‑escalation"]'
  hobbies: '["Vegetable gardening", "Southern soul cooking", "Reading historical fiction and African‑American literature", "Volunteering at a legal‑aid clinic", "Co‑hosting church study groups", "Yoga and
    mindfulness meditation", "Quilting and crochet", "Building simple electronics kits"]'
  career_goals: Paris aims to become a certified captioning trainer and eventually lead a state‑wide accessibility program that integrates captioning services across all Georgia courts. She hopes to launch
    a consultancy that advises legal institutions on inclusive communication technologies, while also pursuing a master’s degree in Disability Studies to deepen her expertise. Recognizing the emotional
    toll of live transcription, she advocates for mental‑health resources for court reporters and plans to spearhead a peer‑support network within the profession. Ultimately, she wants to blend her technical
    acumen with her drive to help others, ensuring that every courtroom participant—regardless of hearing ability—has equitable access to justice.
