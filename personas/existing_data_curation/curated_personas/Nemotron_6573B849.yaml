  career_goals: Looking ahead, Tristan aims to step into a Director of People Operations role within a forward‑thinking technology firm, where he can shape a culture that blends rigorous performance standards
    with artistic expression and employee well‑being. He plans to complete an MBA to solidify his strategic leadership capabilities and to deepen his expertise in HR analytics and organizational design.
    In the longer term, he envisions founding a boutique consultancy that helps mid‑size companies embed creativity‑focused wellness programs and flexible work structures, positioning himself at the intersection
    of human capital strategy and innovative workplace culture. Throughout his progression, he remains committed to championing mental‑health resources and stress‑reduction initiatives for his teams, drawing
    on his own experience with anxiety.
