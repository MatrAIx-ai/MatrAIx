personas:
  professional: Tristan Hollinger is an HR business partner with a decade of tech‑sector experience, expertly blending employee relations, talent acquisition, and compensation strategy with a flair for
    art‑driven engagement workshops; their competitive edge secures top talent while their flexible, sometimes disorganized style pushes them to prioritize creativity over rigid planning as they chase a
    Director of People Operations role and an MBA.
  sports: Tristan Hollinger plays on a co‑ed recreational basketball league at the Berkeley Recreation Center, follows the Golden State Warriors and the San Francisco Giants, hikes Mission Peak and Mount
    Diablo monthly for cardio and mental reset, and occasionally joins a weekend beach volleyball meetup with friends, approaching fitness as a social outlet rather than a strict regimen.
  arts: Tristan Hollinger immerses themselves in the Bay Area's contemporary art scene, photographing street murals by Shepard Fairey and local muralist Mearl, attending SFMOMA exhibitions of Yayoi Kusama,
    jamming acoustic guitar covers of Neil Young at house concerts, and performing improv sketches with a community theater troupe, using these creative experiences to recharge their professional mindset.
  travel: Tristan Hollinger prefers spontaneous, budget‑conscious weekend getaways, often road‑tripping the Pacific Coast Highway to Big Sur or hiking the Redwood forests, while also savoring international
    art‑focused trips to Berlin’s Kreuzberg district and Kyoto’s temples; their flexible planning style means they book flights last minute, but their anxiety sometimes forces them to stick to familiar
    West‑Coast destinations.
  culinary: Tristan Hollinger treats the kitchen as a creative laboratory, regularly whipping up Korean‑Mexican fusion dishes like gochujang‑marinated pork tacos and miso‑glazed salmon ramen, favoring ingredients
    such as gochujang, miso, cilantro, and quinoa, yet their tendency to experiment can leave a cluttered pantry and occasional burnt sauces due to a distracted, multitasking approach.
  core: Tristan Hollinger is a 35‑year‑old HR strategist who blends art, competitive ambition, and mindfulness to navigate a creatively chaotic professional and personal life, often battling anxiety and
    occasional disorganization.
background:
  cultural: Tristan is a white American who grew up in a middle‑class suburb in the Midwest before relocating to the culturally diverse Silicon Valley region for his HR career. Living in Fremont, a city
    known for its rich ethnic tapestry, he is regularly exposed to a variety of Asian, Latin American, and European influences—from neighborhood festivals and diverse culinary offerings to multicultural
    community events. While his upbringing emphasized classic American values of individualism, self‑reliance, and a strong work ethic, his adult life reflects a broader, more inclusive worldview. He celebrates
    traditional holidays like Thanksgiving and the Fourth of July alongside local celebrations such as Lunar New Year and Diwali, which he enjoys with his neighbors. This blend of familiar American roots
    and the eclectic Bay Area milieu informs both his personal identity and his professional approach to fostering inclusive, adaptable workplaces.
