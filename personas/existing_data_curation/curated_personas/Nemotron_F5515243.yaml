  skills: '[''event coordination'', ''volunteer management'', ''budgeting'', ''public speaking'', ''storytelling'', ''gardening'', ''knitting'', ''basic computer literacy'', ''senior care assistance'']'
  hobbies: '[''vegetable gardening'', ''knitting'', ''bridge (card game)'', ''church choir'', ''potluck cooking'', ''storytelling'', ''book club'']'
  career_goals: Although retired, Monique aims to remain a central pillar of Rosedale’s community life. She plans to expand the senior‑center’s weekly programs, mentor younger volunteers, preserve local
    history through oral storytelling, and advocate for improved senior services in Clay County. Additionally, she hopes to compile her family’s traditional recipes and pass them on to her grandchildren,
    reinforcing familial continuity.
