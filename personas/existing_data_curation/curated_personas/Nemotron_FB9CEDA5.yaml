personas:
  professional: Carlos Rivera, a budding LEGO architect who channels a vivid imagination into constructing elaborate, story‑filled cityscapes, balances careful organization of bricks with spontaneous narratives,
    and they show early signs of spatial reasoning and cooperative problem‑solving.
  sports: Carlos Rivera dabbles in soccer with the local Strikers youth club, proudly wears a miniature FC Dallas jersey during games, enjoys watching the Dallas Cowboys on Sundays, and they prefer short
    practice sessions that fit their love for quiet, focused activity over crowded tournaments.
  arts: Carlos Rivera delights in painting bright papel picado banners inspired by family festivals, sings along to Disney soundtracks and the playful tunes of child‑friendly singer Raffi, and they often
    create tiny folk‑themed puppets during quiet afternoons, letting imagination guide their artistic expression.
  travel: Carlos Rivera enjoys family road trips to San Antonio’s River Walk and weekend visits to grandparents’ farm, where they ride a tiny tractor and explore backyard gardens, yet they dream of a future
    adventure to the Grand Canyon, preferring short, familiar journeys over long, solitary voyages.
  culinary: Carlos Rivera loves the aromatic comfort of tamales drenched in red salsa and hearty pozole with tender pork, insists on adding fresh corn kernels to every bite, yet they are picky about green
    vegetables, and they proudly help their parents roll tortillas during weekend cooking sessions.
  core: Carlos Rivera, the quiet dreamer who blends meticulous order with boundless fantasy, spins solitary stories while quietly sharing kindness in small groups, and they occasionally lose socks in the
    chaos of creative play.
background:
  cultural: Carlos grows up in a Mexican‑American household in Garland, Texas. His family speaks both Spanish and English, celebrating traditions such as Día de los Muertos, Cinco de Mayo, and family quinceañeras
    with music, dance, and traditional foods like tamales and pozole. He learns Mexican folklore stories from grandparents, participates in community festivals at the local cultural center, and attends
    a bilingual preschool where he practices both languages. The blend of Mexican heritage and Texan community life shapes his values of family, compassion, and respect for cultural diversity.
