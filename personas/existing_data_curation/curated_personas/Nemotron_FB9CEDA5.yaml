  career_goals: Although only five, Carlos already dreams of a future where he can explore the unknown and help others. He talks about becoming an astronaut who discovers new planets, a cartoonist who creates
    characters that bring joy, or a teacher who shares stories and kindness with children. He also expresses a desire to be a community helper, such as a firefighter or a doctor, because he wants to keep
    people safe and healthy.
