  hobbies: '[''Live music concerts'', ''Fishing at Lake Ming'', ''Hiking in the Sierra foothills'', ''Restoring a classic Chevrolet Camaro'', ''Street photography'', ''Community trivia nights'', ''Playing
    poker'', ''True crime podcasts'', ''Neighborhood watch volunteering'', ''Gym workouts'', ''Home security tech tinkering'']'
  career_goals: Wilson aims to progress into a senior supervisory role within the casino’s security department, eventually becoming the shift manager or security director. He plans to earn industry certifications
    such as the Certified Protection Professional (CPP) and to complete a GED followed by an associate certificate in criminal justice to broaden his credentials. In the medium term, he wishes to lead a
    training program for new guards, incorporating the latest video‑analytics technology. Long‑term, Wilson envisions launching his own security consulting firm that serves small businesses and community
    events in Bakersfield, leveraging his practical experience and his curiosity for new security solutions. He wants his career to be recognized for both reliability and innovative improvements to safety
    protocols.
