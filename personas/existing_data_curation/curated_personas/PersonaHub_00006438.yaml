persona_description: A team of researchers and engineers working on the development and application of graphene-based materials in energy storage applications. They are focused on solving some of the toughest
  challenges faced by leading companies in the industry and delivering unique performance improvements. Their expertise lies in the use of graphene formulations to improve battery cycle life, maintain high
  discharge rates at low temperatures, reduce negative plate sulfation, improve negative electrode conductivity, increase modulus, and eliminate performance trade-offs. They have established a team focused
  on leveraging Cabot's experience in carbon materials to deliver graphene solutions that can break trade-offs for their customers and deliver breakthrough product improvements.
