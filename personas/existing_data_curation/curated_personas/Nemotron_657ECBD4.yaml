  career_goals: Haniff aims to transition from his current managerial role to a senior director position within a technology‑focused organization, where he can design and implement systematic operational
    frameworks that improve efficiency and reduce employee stress. He also plans to earn an MBA to deepen his strategic acumen, and he aspires to mentor junior staff, fostering a workplace culture that
    balances performance with mental‑health awareness.
