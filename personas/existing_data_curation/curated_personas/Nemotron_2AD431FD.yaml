personas:
  professional: Cecile Dunn, a 38‑year‑old seasoned carpenter in Springfield, leverages meticulous blueprint reading, advanced finishing, and a practical focus on sustainable materials to deliver high‑quality
    residential remodels, while their structured workflow and quiet, solitary work style enable them to assertively manage projects and mentor aspiring women carpenters.
  sports: Cecile Dunn, an avid hiker who spends weekends on the Hocking Hills trails with the local Earthwalkers club, follows the Cleveland Browns for football, the Ohio State Buckeyes for college football,
    and maintains fitness through disciplined early‑morning trail runs, but often skips gym sessions when a woodworking project consumes their evenings.
  arts: Cecile Dunn nurtures a love for American regionalist art like Grant Wood’s “American Gothic,” enjoys the folk storytelling of Gillian Welch, reads Willa Cather’s prairie novels and classic works
    by Jane Austen, and regularly participates in maker‑space workshops where they exchange techniques with fellow craftsmen, all of which shape their creative identity.
  travel: Cecile Dunn prefers meticulously planned road trips that balance low‑cost adventure with quiet relaxation, often revisiting Ohio’s Hocking Hills and Amish Country while dreaming of a sustainable‑focused
    workshop tour in Sweden’s Västra Götaland region and a summer hike through Oregon’s Columbia River Gorge once their contracting business stabilizes.
  culinary: Cecile Dunn, a competent home baker, regularly crafts sourdough loaves using heritage rye flour and wildflower honey, preserves heirloom tomatoes and pickled cucumbers from their garden, and
    delights in farm‑to‑table meals centered on roasted root vegetables, though they occasionally succumb to a late‑night slice of store‑bought pizza.
  core: Cecile Dunn blends a disciplined, solitary work ethic with a stubborn love for reclaimed wood, a habit of over‑checking project budgets, and a quiet determination that they channel into carving
    out a sustainable, women‑focused carpentry legacy.
background:
  cultural: Cecile grew up in a middle‑class, white, Midwestern family in Ohio, where values of hard work, self‑reliance, and community were emphasized. Her upbringing blended Protestant work‑ethic traditions
    with the practical, hands‑on culture of the region’s agricultural and manufacturing heritage. Exposure to local craft fairs, historic preservation societies, and a strong local union presence shaped
    her appreciation for skilled trades. Though she now lives in Springfield, Clark County, she maintains connections to the area’s seasonal festivals, county fairs, and the modest, modesty‑driven social
    norms typical of small‑town Ohio.
