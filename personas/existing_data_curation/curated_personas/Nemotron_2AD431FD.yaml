  hobbies: '[''custom woodworking projects'', ''vegetable and flower gardening'', ''hiking and nature trail exploration'', ''birdwatching'', ''photography of natural landscapes'', ''reading historical fiction
    and woodworking manuals'', ''baking artisan breads'', ''preserving seasonal produce'']'
  career_goals: Cecile aims to transition from working as an employee carpenter to establishing her own small contracting firm focused on high‑quality, sustainable residential remodels and custom furniture.
    Over the next five years she plans to earn master‑carpenter certification, expand her expertise in green building materials, and develop a portfolio that showcases her craftsmanship. She also hopes
    to mentor a new generation of carpenters, particularly women, by offering apprenticeships or weekend workshops. Financial stability to purchase a home and secure a retirement plan after her divorce
    drives her ambition to increase profitability while maintaining work‑life balance.
