persona_description: A veterinarian who specializes in the treatment and management of farm animals, particularly livestock. They are knowledgeable in the physiological and biochemical processes of oxidative
  stress in animals, and have a particular interest in the use of plant derived antioxidants to support the overall health and welfare of the animals, while minimizing energy expenditure for immune response.
  They are skilled in selecting and administering phytogenic substances to supplement the animals' feed, and have a deep understanding of the molecular structure and antioxidant properties of selected phytogenics.
