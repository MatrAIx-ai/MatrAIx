  hobbies: '[''Volunteer Safety Workshops'', ''Book Club'', ''Community Theater Stage Management'', ''Gardening'', ''Trail Running'', ''Yoga'', ''Mindfulness Journaling'', ''Baking'', ''Board Games'']'
  career_goals: Bailey aims to advance to a supervisory role within the Prospect Police Department, targeting promotion to Sergeant within the next three years. She wishes to lead a community‑relations
    unit that develops structured outreach programs to reduce crime and improve mental‑health support. Long‑term, she envisions becoming a precinct commander, implementing data‑driven policing strategies,
    and mentoring new officers, especially women, to foster a supportive and organized department culture.
