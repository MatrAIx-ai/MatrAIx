persona_description: A researcher at the Translational Genomics Research Institute (TGen), specifically focused on studying the molecular mechanisms underlying the development and progression of diabetic
  nephropathy, a leading cause of kidney disease among diabetics. The researcher is interested in identifying potential molecular mechanisms by which PVT1 may contribute to the etiology of diabetic nephropathy
  in mesangial cells. The researcher is part of the Diabetes, Cardiovascular and Metabolic Diseases Center at TGen, and their work is funded by the American Diabetes Association. The researcher is a highly
  skilled scientist with expertise in RNA interference, molecular biology, and genetics, and has a background in the study of diabetes and kidney disease.
