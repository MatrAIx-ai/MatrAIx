persona_description: An engineer or scientist with expertise in nuclear reactor thermal hydraulics, specifically focusing on the stability of supercritical water-cooled reactors. They are interested in
  exploring the effects of heat transport from fuel rods and water rods on the stability of these reactors, and how the stability margin compares with that of boiling water reactors. They are likely to
  conduct sensitivity studies on operating conditions to determine the stability sensitivity of the SCWR design, and to assess the robustness of stability by examining the potential variation and uncertainty
  about the nominal conditions.
