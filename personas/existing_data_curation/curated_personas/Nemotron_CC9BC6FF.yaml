personas:
  professional: Enitza Cadahia is an aspiring digital illustrator and debate club leader who blends curiosity with practicality, using their tablet to craft comic‑style characters while rehearsing persuasive
    arguments in class, and they rely on their natural talkativeness and organized work habits to juggle school projects, gaming sessions, and family responsibilities.
  sports: Enitza Cadahia enjoys dancing cumbia and paso doble at school events, they play pick‑up soccer with friends on Saturdays, follow the Rio Grande Valley FC and Houston Astros closely, belong to
    the school dance club for fitness, but often skip formal workouts when academic stress peaks.
  arts: Enitza Cadahia is a fervent fan of reggaeton stars Bad Bunny and J Balvin, classic balladeer Luis Miguel, and ranchera legend Vicente Fernández; they draw inspiration from comic creators Alan Moore
    and manga artists for their digital sketches, and love rewatching the animated film "Coco" while curating playlists that blend modern beats with traditional melodies.
  travel: Enitza Cadahia loves weekend road trips to South Padre Island for beach bonfires, they make annual family visits to Matamoros to celebrate Día de los Muertos with multi‑generational gatherings,
    and they dream of exploring Oaxaca’s historic streets during the Day of the Dead, balancing a teen budget with a craving for cultural immersion.
  culinary: Enitza Cadahia frequently cooks tacos al pastor with pineapple and adobo‑marinated pork, they roll tamales with masa and pork filling, experiment by adding fresh cilantro, lime, and even Korean
    kimchi to quesadillas, and share short TikTok videos featuring salsa verde and grilled corn.
  core: Enitza Cadahia is a talkative, curious teen who balances school debates, digital art, and family cooking while they juggle anxiety, budgeting quirks, and a deep love for music and dance.
background:
  cultural: 'Enitza is a second‑generation Hispanic teenager of Mexican descent, raised in the culturally rich border city of Brownsville, Texas. Her upbringing reflects the strong familismo and respeto
    values common in Mexican‑American communities: close‑knit family ties, frequent multi‑generational gatherings, and a deep appreciation for bilingual communication. She celebrates traditions such as
    Día de los Muertos, Cinco de Mayo, and local fiestas, and she has been exposed to both American and Mexican media, shaping a bicultural identity. Her Catholic upbringing (though she now explores personal
    spirituality) and community involvement at the local church and neighborhood center underscore her commitment to collective harmony and service.'
attributes:
  skills: '[''Spanish-English bilingualism'', ''Digital literacy (smartphone and computer use)'', ''Basic video editing (TikTok, Instagram Reels)'', ''Graphic design basics (Canva)'', ''Public speaking
    and presentation'', ''Event planning for school clubs'', ''Time management and organization'', ''Peer mediation and conflict resolution'', ''Volunteer coordination'', ''Google Workspace and Microsoft
    Office basics'']'
  hobbies: '[''Listening to reggaeton and regional Mexican music'', ''Dancing cumbia and paso doble'', ''Sketching and digital illustration'', ''Playing Fortnite and Minecraft'', ''Cooking family recipes
    and sharing cooking videos'', ''Debate club participation'', ''Volunteering at the local food pantry'', ''Creating TikTok content about daily life'']'
  career_goals: Enitza aims to complete her GED within the next two years and then enroll in a community college program for communications or public health. She envisions a career where she can combine
    her bilingual fluency, love for storytelling, and commitment to community well‑being—such as becoming a bilingual journalist for a local news outlet, a social‑media manager for a Hispanic cultural organization,
    or a community outreach coordinator for a health‑services nonprofit. Her long‑term ambition is to use her voice and media skills to amplify under‑represented stories from the Brownsville area while
    maintaining a stable, practical job that supports her family.
