  hobbies: '["Hiking", "Biking", "Community Volunteering", "Book Club", "Yoga", "Meditation", "Gardening", "Mediterranean Cooking", "Live Music Events", "Home Automation Projects", "Custom PC Building"]'
  career_goals: Briana aims to become a senior network architect overseeing enterprise‑wide initiatives and shaping her company's long‑term technology roadmap. She aspires to transition into a chief technology
    officer or senior technology consultant role where she can influence strategic decisions at the executive level. Additionally, she is committed to fostering a healthier work‑life balance to mitigate
    stress, and she wants to mentor more women entering STEM fields while championing inclusive workplace practices.
