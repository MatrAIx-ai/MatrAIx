personas:
  professional: Briana Riley, a network architect with a graduate business background, designs scalable LAN/WAN and cloud infrastructures while translating technical solutions into strategic value, leading
    cross‑functional teams, mentoring junior engineers, and championing women in STEM despite a tendency to juggle too many tasks at once, and they constantly seek to balance structure with flexibility.
  sports: Briana Riley enjoys weekend hikes on the Santa Rosa Plateau, weekday bike rides on local Murrieta trails, practices yoga for flexibility, and roots for the Los Angeles Rams, LA Dodgers, and the
    San Diego State Aztecs soccer team, blending personal fitness with regional sports fandom, and they appreciate both competitive excitement and personal wellness.
  arts: Briana Riley immerses themselves in live music, frequently attending concerts by Florence Welch, The Lumineers, and local folk bands, participates in a neighborhood book club discussing authors
    like Chimamanda Ngozi Adichie, and indulges in community theater productions, allowing artistic appreciation to refresh their technical mind, and they find this artistic immersion recharges their problem‑solving
    mindset.
  travel: Briana Riley prefers well‑planned family road trips to national parks such as Yosemite and the Grand Canyon, interspersed with spontaneous weekend getaways to Mediterranean destinations like Santorini
    for culinary inspiration, balancing structured itineraries with occasional spur‑of‑the‑moment adventures, and they use these travels to unwind from professional pressures.
  culinary: Briana Riley, an avid home cook, experiments with Mediterranean dishes like shakshuka, roasted eggplant with tahini, and lemon‑herb grilled fish, sourcing fresh herbs from their garden and savoring
    the process despite a habit of meticulously timing each step yet occasionally over‑seasoning, reflecting they love bold flavors and the creative outlet of cooking.
  core: Briana Riley is a tech‑savvy, health‑conscious network architect who blends structured career ambition with a love for outdoor family adventures, spontaneous DIY projects, and the occasional stress‑filled
    worry spree, and they constantly seek balance through yoga and community.
background:
  cultural: Briana grew up in a middle‑class suburban environment in Southern California, where the blend of family‑oriented values and the region's entrepreneurial spirit shaped her outlook. As a white
    American with a graduate education in business, she embraces the Californian ethos of openness, innovation, and a strong work ethic while maintaining traditional values of reliability and community
    involvement. Her marriage and long‑term residence in Murrieta reflect a commitment to family stability and local community ties.
