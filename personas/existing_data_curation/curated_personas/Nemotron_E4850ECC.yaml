personas:
  professional: Jessica Aburto, a 25‑year‑old interior‑design professional based in Boston, combines rigorous STEM‑driven analysis with an artistic eye, expertly using AutoCAD, Revit, SketchUp, and Adobe
    Creative Suite to create sustainable, ergonomic spaces while constantly balancing her penchant for structured planning with occasional spontaneous design bursts.
  sports: Jessica Aburto fuels her fitness routine through salsa dancing at a local studio, weekend hikes with the Boston Hiking Club in the White Mountains, and occasional volleyball matches at the community
    center, while cheering on the Boston Red Sox and the Boston Celtics.
  arts: Jessica Aburto finds inspiration at Boston gallery openings, particularly admiring works by Kehinde Wiley and local photographer Susan Bilgrich, enjoys listening to jazz vocalist Norah Jones during
    design sessions, and volunteers at community arts programs where she teaches youth basic design principles.
  travel: Jessica Aburto prefers a mix of meticulously planned city trips—such as a recent weekend getaway to New York’s design districts—and spontaneous explorations of historic neighborhoods in Barcelona,
    balancing a modest travel budget with a desire to experience architectural marvels worldwide.
  culinary: Jessica Aburto, an intermediate home chef, loves preparing aromatic arroz con gandules and lechón using fresh cilantro, sofrito, and annatto, often pairing these dishes with a side of plantains
    while experimenting with sustainable, locally sourced ingredients.
  core: Jessica Aburto is a detail‑oriented yet occasionally impulsive designer who jugles sustainable interior projects, spontaneous décor cravings, and a relentless commitment to community mentorship,
    all while battling occasional back pain and a sweet spot for late‑night salsa.
background:
  cultural: Jessica comes from a proud Puerto Rican family that immigrated to the United States before she was born. Raised bilingual in Spanish and English, she grew up celebrating traditions such as Nochebuena,
    bomba music, and the vibrant street festivals of San Juan, which have instilled in her a deep appreciation for color, texture, and communal spaces. Although she lives in Boston, she remains actively
    involved in the local Puerto Rican community through cultural events, language‑exchange groups, and volunteer initiatives. This bicultural experience enriches her design aesthetic, often weaving warm
    palettes, tropical motifs, and a sense of hospitality into her projects. Jessica’s cultural identity also informs her commitment to social equity in design, motivating her to create inclusive environments
    that honor diverse backgrounds while reflecting contemporary Boston living.
attributes:
  skills: '["Space planning", "AutoCAD", "Revit", "SketchUp", "Adobe Photoshop", "Adobe Illustrator", "Material sourcing", "Sustainable design", "Ergonomic design", "Building code compliance", "Cost estimating",
    "Data‑driven design trend analysis", "Client consultation", "Project coordination", "Presentation and visualization", "Smart home technology integration"]'
  hobbies: '["Cooking Puerto Rican cuisine", "Salsa dancing", "Hiking in the White Mountains", "Yoga and meditation", "Photography of interiors and architecture", "Reading design and architecture journals",
    "Visiting art galleries", "DIY home improvement projects", "Volunteering with community arts programs", "Exploring Boston''s food scene"]'
  career_goals: 'Jessica aims to establish her own boutique interior‑design studio in Boston within the next five years, focusing on sustainable, culturally resonant spaces for both residential and small‑scale
    commercial clients. She plans to earn the NCIDQ credential and become a LEED‑AP accredited professional to strengthen her technical credibility. Leveraging her STEM background, she wants to integrate
    smart‑home systems and IoT solutions into her designs, creating homes that are both beautiful and technologically intuitive. Community impact drives her long‑term vision: she hopes to provide pro‑bono
    design services for underserved neighborhoods, especially within Boston''s Puerto Rican community, mentor emerging designers from underrepresented backgrounds, and eventually lead workshops that blend
    design thinking with social responsibility.'
