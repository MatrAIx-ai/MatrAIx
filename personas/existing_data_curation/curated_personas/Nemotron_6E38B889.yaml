personas:
  professional: Dianne Ziems is a seasoned telecommunications technician who excels at installing, aligning, and maintaining broadcast and cellular antenna systems, harnessing their curiosity for emerging
    5G and fiber‑optic technologies while maintaining a practical, organized workflow that ensures FCC compliance, safety standards, and clear communication with clients, all driven by a cooperative desire
    to mentor women apprentices and lead future rural broadband teams.
  sports: Dianne Ziems is an avid hiker who weekend‑trails the Natchez Trace Parkway, plays in the Jones County women's softball league, belongs to a local bird‑watching club that meets for early morning
    walks, and follows the Mississippi State Bulldogs football team and Memphis Grizzlies basketball, balancing active outdoor pursuits with regional sports fandom.
  arts: Dianne Ziems immerses themselves in vintage country music, frequently tuning into classics by Willie Nelson, Dolly Parton, and live broadcasts of The Grand Ole Opry, while savoring historical fiction
    by Philippa Gregory and Ken Follett, and attends the county fair’s art exhibitions and local theater performances, letting the arts enrich both their leisure and culinary creativity.
  travel: Dianne Ziems prefers well‑planned road‑trip adventures that blend nature and culture, having explored New Orleans' music scene, Charleston's historic districts, the Great Smoky Mountains, and
    a weekend getaway to Nashville's honky‑tonk venues, while eyeing future visits to Washington, D.C.’s museums and Savannah’s cobblestone streets, balancing limited vacation days with family commitments.
  culinary: Dianne Ziems is a competent home cook who delights in perfecting Southern classics such as shrimp étouffée and fried pies, often incorporating fresh herbs, okra, and locally sourced seafood
    from their garden plot, while occasionally experimenting with Cajun spice blends to add a personal twist to traditional family recipes.
  core: Dianne Ziems blends technical precision with southern hospitality, balancing field‑ready pragmatism and garden‑grown creativity, all while juggling a love for vintage country tunes, a budget‑savvy
    mindset, and a habit of checking their smartwatch for both signal strength and blood pressure.
background:
  cultural: Dianne was born and raised in the deep‑South environment of rural Mississippi. Her cultural heritage is rooted in the traditions of Southern hospitality, close‑knit community life, and a Protestant
    (Baptist) upbringing. Family gatherings, church potlucks, and county fairs have shaped her sense of belonging and her emphasis on cooperation and kindness. She grew up with a respect for hard work and
    self‑reliance, values that are reflected in her practical approach to both her trade and everyday life. While she cherishes these traditions, her curiosity drives her to stay engaged with new technologies
    and broader cultural perspectives, blending classic Southern values with a modern, forward‑thinking outlook.
attributes:
  skills: '[''RF system installation'', ''Antenna alignment and tower climbing'', ''Microwave link troubleshooting'', ''Fiber optic splicing and testing'', ''Spectrum analyzer and OTDR operation'', ''Electrical
    safety and FCC compliance'', ''Technical customer support'', ''Blueprint and schematic interpretation'', ''Preventive maintenance planning'', ''Documentation and reporting'']'
  hobbies: '[''Gardening'', ''Cooking Southern cuisine'', ''Listening to classic country and technology podcasts'', ''Birdwatching'', ''Hiking'', ''Volunteer work at local library'', ''DIY home improvement'',
    ''Reading historical fiction'']'
  career_goals: Dianne aims to broaden her technical repertoire by earning advanced BICSI and FCC certifications in fiber‑optic and 5G small‑cell deployment. She hopes to transition into a supervisory role
    where she can lead a team of field technicians, oversee large‑scale rural broadband projects, and ensure quality and safety standards. In the long term she envisions launching her own independent telecommunications
    contracting firm that serves the Jones County community, while also providing mentorship opportunities for apprentices, especially women entering the trades.
