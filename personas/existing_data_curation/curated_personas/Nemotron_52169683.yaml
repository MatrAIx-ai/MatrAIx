personas:
  professional: Clyde Mcghee is a 16‑year‑old budding concept artist who blends hand‑drawn sketching with Procreate‑crafted digital illustrations, leads collaborative brainstorming at his youth arts center,
    and channels his improvisational flair into storytelling for future interactive media studies.
  sports: Clyde Mcghee spends weekends shredding at the Rochester Skatepark with the self‑named 'Rochester Rippers' crew, tunes into the Rochester Red Wings for baseball, and catches Buffalo Bills games
    as his go‑to football fix while occasionally joining pickup basketball games at the local high school gym.
  arts: Clyde Mcghee devotes free hours to sketching vibrant comic heroes inspired by the kinetic style of KAWS, the storytelling of Akira Toriyama, and the emotive worlds of Studio Ghibli, while listening
    to producers like Flying Lotus and Aphex Twin for beat‑making inspiration and regularly attending the Rochester Street Art Festival to soak up murals by local and visiting graffiti artists.
  travel: Clyde Mcghee prefers spontaneous road trips with friends, balancing skate‑friendly stops and street‑art hotspots, having already road‑tripped to Niagara Falls and a school field visit to Washington,
    D.C., while dreaming of a future solo adventure to Tokyo’s Akihabara district and a creative retreat in Portland, Oregon.
  culinary: Clyde Mcghee’s culinary palate swings between grabbing pepperoni pizza slices topped with extra cheese after a skate session, savoring ramen bowls with pork belly, soy‑soft boiled eggs, and
    nori, and dabbling in simple home‑cooked stir‑fry of chicken, bell peppers, and sesame oil, though they often burn the garlic when distracted by music.
  core: Clyde Mcghee is a hyper‑creative teen who merges sketch‑book doodles with digital beats, leads community art projects, and navigates life with a laid‑back, people‑first vibe that sometimes leaves
    their schedule in doodles.
background:
  cultural: Clyde is a Black teenager raised in Rochester’s vibrant African‑American community. His family blends contemporary urban culture with deep respect for African heritage, celebrating traditions
    through music, food, and storytelling. He grew up listening to hip‑hop, jazz, and R&B while participating in community events at the Rochester Youth Arts Center and local church gatherings that emphasize
    mutual support and creative expression. The city’s history of social activism and its strong mural and arts scene have shaped his worldview, reinforcing a commitment to using art as a means of connection
    and empowerment.
attributes:
  skills: '["hand-drawing and sketching", "digital illustration (Procreate, Canva)", "storytelling and narrative development", "improvisational theatre", "basic video editing (iMovie, TikTok editing)",
