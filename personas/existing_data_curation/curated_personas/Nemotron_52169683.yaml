  hobbies: '["comic drawing", "digital animation", "beat-making and music production", "improvisational comedy", "reading speculative fiction", "Minecraft and collaborative gaming", "skateboarding", "attending
    local art festivals", "volunteering at youth art programs"]'
  career_goals: Clyde envisions a future where his imagination and artistic talent shape immersive experiences for others. He aims to study fine arts or interactive media at a college, eventually working
    as a concept artist, digital storyteller, or creative director for video games, animation studios, or community‑based art projects. He also hopes to launch a youth art collective in Rochester that offers
    workshops in drawing, digital media, and improvisational performance, using his leadership and empathy to mentor peers and inspire positive change.
