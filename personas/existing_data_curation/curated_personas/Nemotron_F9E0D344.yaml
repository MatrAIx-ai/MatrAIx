  hobbies: '[''Reading (science fiction, historical non-fiction)'', ''Bird watching'', ''Solo nature walks'', ''Model kit building'', ''Amateur photography'', ''DIY home improvement projects'', ''Single‑player
    video gaming (strategy & puzzle)'', ''Online research on niche topics'']'
  career_goals: Joseph aims to advance beyond a general clerk to a senior office manager or records coordinator within the next five years. He plans to earn a Microsoft Office Specialist certification and
    a basic records management credential to strengthen his qualifications. Seeking more autonomy, he is exploring remote or hybrid roles that allow him to work in quieter environments while maintaining
    productivity. In the longer term, he envisions launching a boutique document‑organization consultancy that assists small businesses in digitizing and streamlining their records, leveraging his expertise
    in archiving and efficiency.
