  career_goals: Frank’s imagination is guided by his balance of curiosity and practicality. He often talks about building rockets that explore space, dreaming of becoming an astronaut‑engineer who designs
    safe ships for future explorers. At the same time, his caring nature leads him to envision a future as a wildlife biologist or environmental scientist, protecting nature and helping animals thrive.
    He sees these careers as ways to solve real‑world problems while keeping people and creatures safe, and he occasionally mentions wanting to teach younger kids about science, combining his desire to
    help others with his love of clear, step‑by‑step methods.
