  hobbies: '[''Visiting art galleries and museums'', ''Listening to jazz and blues music'', ''Community theater and improv'', ''Gardening and urban farming'', ''Woodworking and simple crafts'', ''Church
    choir singing'', ''Reading biographies of African and African‑American figures'', ''Cooking and experimenting with recipes'', ''Yoga and meditation for stress management'', ''Leading walking groups
    at the senior center'']'
  career_goals: Victor aims to earn a certification in green cleaning and facilities management so he can advance to a senior housekeeping supervisor role at a local senior‑living community. He also envisions
    launching a boutique cleaning and home‑staging business that blends sustainable practices with artistic presentation, allowing him to mentor younger workers and secure a comfortable retirement for his
    family.
