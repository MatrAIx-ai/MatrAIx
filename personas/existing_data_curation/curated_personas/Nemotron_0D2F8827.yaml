personas:
  professional: Victor Mathis, a seasoned housekeeping professional with expertise in eco‑friendly deep cleaning, inventory management, and staff training, blends his meticulous eye for aesthetic arrangement
    with his curiosity for art and his outgoing, cooperative yet assertive style to transform clients' homes into organized, visually pleasing spaces while mentoring younger workers.
  sports: Victor Mathis follows the Los Angeles Dodgers and the Los Angeles Lakers, joins the Bakersfield Silver Sneakers senior‑fitness program for weekly low‑impact aerobics, plays casual pickleball at
    the local YMCA, and enjoys weekend hikes in the nearby Sierra Nevada foothills, all while preferring a gentle, consistent routine that protects his joints and satisfies his love of community activity.
  arts: Victor Mathis immerses himself in Bakersfield’s art scene, regularly visiting the Bakersfield Museum of Art to admire works by Frida Kahlo, Georgia O’Keeffe, and emerging California muralists, performing
    in community theater productions of classics like ‘Our Town,’ singing gospel in his church choir, and delighting in live jazz sets featuring pianist Gregory Porter and blues legends such as B.B. King.
  travel: Victor Mathis prefers well‑planned road trips with his adult children—he has already explored the Grand Canyon, Napa Valley, and New Orleans, and he dreams of a cultural pilgrimage to Paris and
    a beach retreat in Costa Rica—always balancing his love for adventure with his modest retirement budget and seasonal schedule.
  culinary: Victor Mathis loves experimenting in the kitchen, often using fresh basil, rosemary, and thyme from his garden to craft herb‑infused grilled salmon, a rustic ratatouille with zucchini and eggplant,
    and a weekend indulgence of slow‑cooked chicken parmesan, while occasionally treating himself to classic Southern shrimp‑and‑grits after a lively jazz soirée.
  core: Victor Mathis is a 63‑year‑old green‑cleaning guru with a green thumb, a gospel‑singing soul, a jittery habit of rereading biographies before bed, and a penchant for turning every client’s home
    into a mini‑gallery while secretly worrying about every detail.
background:
  cultural: Victor is an African American man whose paternal grandparents immigrated from the Yoruba region of Nigeria, evident in his middle name Taiwo, a traditional Yoruba name for a first‑born twin.
    Raised in Bakersfield’s Black community, he grew up amidst church life, soul music, and Southern U.S. traditions, while also preserving West African customs such as celebrating Yoruba holidays and cooking
    dishes like jollof rice. This blended heritage informs his appreciation for both African diaspora culture and the broader Californian artistic landscape.
