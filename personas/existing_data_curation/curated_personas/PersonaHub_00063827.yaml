persona_description: A global advocate for road safety, Claudia Adriazola, the director of health and road safety for EMBARQ, has extensive knowledge and expertise in the field of road safety. She has worked
  on improving road safety in Mexico, Brazil, India, Peru, and Turkey, and has developed the Global Plan for the Decade of Action for Road Safety 2011-2020. Adriazola's work has been recognized with a grant
  from Bloomberg Philanthropies to implement programs in low-and middle-income countries with a high burden of road traffic injuries and fatalities, representing nearly half of traffic deaths globally.
