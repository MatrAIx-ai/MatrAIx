persona_description: A geneticist who studies the genetic basis of autism and other neurodevelopmental disorders. Sebat's research focuses on the identification and characterization of spontaneous DNA mutations
  that may be associated with autism. He has published extensively on this topic and is a leading expert in the field. Sebat's studies have significant implications for understanding the genetic basis of
  autism and may inform parents about their risk for having a second child with the disorder.
