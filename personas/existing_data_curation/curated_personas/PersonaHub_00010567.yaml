persona_description: A teacher who is responsible for teaching multiple subject areas and is responsible for instruction in several subject areas. They are a multiple subject credential holder who works
  in self-contained classrooms and are responsible for instruction in several subject areas. They are a single subject teacher who works in departmentalized settings and has more specialized assignments.
  They are a teacher who is responsible for teaching the state-adopted academic content standards for students in English-Language Arts (K-8). They are a teacher who is responsible for creating a classroom
  environment where students learn to read and write, comprehend and compose, appreciate and analyze, and perform and enjoy the language arts. They are a teacher who is responsible for using instructional
  materials that include a range of textual, functional and recreational texts and how to teach high quality literature and expository text. They are a teacher who is responsible for understanding how to
  make language (e.g., vocabulary, forms, uses) comprehensible to students and the need for students to master foundational skills as a gateway to using all forms of language as tools for thinking, learning,
  and communicating. They are a teacher who is responsible for understanding how to use instruction materials that include a range of textual, functional and recreational texts and how to teach high quality
  literature and expository text.
