    certification'', ''basic PLC programming'']'
  hobbies: '[''salsa and reggaeton dancing'', ''beach volleyball'', ''exploring historic Old San Juan'', ''Arduino and Raspberry Pi tinkering'', ''cooking Puerto Rican cuisine'', ''hosting communal meals'',
    ''volunteering for electrical safety education'', ''neighborhood clean‑up events'']'
  career_goals: Nura aims to earn her journeyman electrician license within the next two years and become a senior line crew supervisor, leading projects that modernize San Juan’s power grid with renewable‑energy
    sources. She plans to obtain additional certifications in smart‑grid systems and utility automation, positioning herself as a bridge between traditional line work and emerging technologies. Long‑term,
    she dreams of starting a community‑focused electrical contracting firm that prioritizes hiring and mentoring women and under‑represented youth, while also offering free safety workshops for local neighborhoods.
