    Fair Volunteering'']'
  career_goals: In the next five years, Courtney aims to transition from full‑time classroom teaching to a mentorship and leadership role that leverages her organizational strengths. She plans to lead district‑wide
    professional development workshops focused on evidence‑based instruction, spearhead a school‑wide literacy initiative to boost reading proficiency, and serve as a consultant for curriculum alignment
    projects. Ultimately, she aspires to leave a lasting impact on teacher practice while achieving a balanced, low‑stress semi‑retirement that allows her to continue supporting at‑risk students through
    targeted tutoring.
