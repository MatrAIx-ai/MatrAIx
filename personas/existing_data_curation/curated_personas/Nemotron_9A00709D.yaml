  hobbies: '[''Gardening'', ''Cooking Mexican cuisine'', ''Volunteering at food bank'', ''Hiking'', ''Fishing'', ''Attending cultural festivals'', ''Classic rock music'', ''Woodworking'', ''Home improvement
    projects'', ''Storytelling in Spanish'']'
  career_goals: Harrison aims to advance to a regional operations manager role within the next five years, overseeing multiple locations and implementing best‑practice standards across the chain. He is
    passionate about mentoring younger staff and hopes to develop a formal apprenticeship program for aspiring food‑service leaders. Additionally, he plans to integrate more sustainable practices—such as
    waste reduction and locally sourced ingredients—into the restaurants he oversees. In the longer term, he dreams of opening a family‑owned restaurant that blends traditional Mexican flavors with Idaho’s
    farm‑fresh produce, creating a community gathering spot that celebrates cultural heritage and healthy eating.
