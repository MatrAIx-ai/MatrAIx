personas:
  professional: Harrison Gurrola, a seasoned food‑service operations leader with three decades of experience in staff scheduling, inventory control, and ServSafe compliance, leverages their bilingual fluency
    and compassionate, structured approach to mentor teams, drive cost‑efficient sustainable practices, and pursue regional managerial responsibilities.
  sports: Harrison Gurrola enjoys weekend hikes and fly‑fishing excursions, rallies behind the Boise State Broncos football team and the Seattle Seahawks, and they actively participate in the Gem State
    Outdoor Club’s monthly trail outings.
  arts: Harrison Gurrola draws inspiration for woodworking projects from the classic rock sounds of The Eagles, Fleetwood Mac, and Led Zeppelin, and they regularly attend local folk‑music festivals featuring
    artists like Sierra Echo, while occasionally watching classic Robert De Niro films for creative spark.
  travel: Harrison Gurrola prefers meticulously planned road trips that combine hiking in Yellowstone and Banff with cultural immersion in Oaxaca City, and they often arrange itineraries with grandchildren
    while balancing limited vacation days and a modest travel budget.
  culinary: Harrison Gurrola skillfully prepares herb‑infused salsa verde with cilantro and jalapeño, smoky chipotle‑marinated pork carnitas, and Idaho trout topped with roasted poblano, and they frequently
    pair meals with rosemary focaccia while experimenting with farm‑fresh produce in fusion recipes.
  core: Harrison Gurrola balances a structure‑oriented mindset with spontaneous bursts of chili‑flavored culinary experiments, classic‑rock‑driven DIY projects, and a deep commitment to community service,
    though they sometimes forget to water newly planted herbs.
background:
  cultural: Harrison is a first‑generation Mexican‑American whose parents immigrated to the United States in the 1960s. He was raised in a bilingual household where Spanish was spoken daily, and traditional
    Mexican customs—such as celebrating Día de los Muertos, preparing family recipes, and emphasizing hospitality—were core to his upbringing. Though he now lives in Caldwell, Idaho, he maintains strong
    ties to the local Mexican community, participating in cultural events, supporting Mexican-owned businesses, and sharing his culinary heritage with neighbors. His cultural identity informs his compassionate
    leadership style, his love for communal meals, and his dedication to fostering harmony and inclusion both at work and in the broader community.
attributes:
  skills: '[''Food Service Management'', ''Staff Scheduling'', ''Inventory Control'', ''Cost Management'', ''Food Safety & ServSafe Certification'', ''Bilingual Communication (English/Spanish)'', ''Menu
