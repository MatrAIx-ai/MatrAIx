persona_description: A scientist who specializes in climate research, particularly the study of ocean circulation and its effects on global warming. The scientist is from the CSIRO and the University of
  NSW, and has conducted research on the observed warming and cooling trends in the Southern Hemisphere subtropical oceans. The scientist's work has been supported by the CSIRO Wealth from Oceans National
  Research Flagship, The Australian Climate Change Science Program, and the Australian Research Council Centre of Excellence in Climate System Science. The scientist's research has been published in Scientific
  Reports and has implications for understanding the impact of human-emitted aerosols on remote ocean temperatures.
