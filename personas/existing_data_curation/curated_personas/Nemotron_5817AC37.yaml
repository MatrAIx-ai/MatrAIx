  career_goals: Approaching the latter stage of her career, Brenda aims to transition from day-to-day management to a mentorship and advisory role. She hopes to earn an HR Director title within the next
    two years, focusing on succession planning and building a robust pipeline of future HR leaders in her organization. Post-retirement, she plans to offer boutique HR consulting services to local small-businesses
    and nonprofits, sharing her wealth of experience while staying engaged with her community. Additionally, Brenda is interested in contributing to regional workforce development initiatives, helping to
    align educational programs with the talent needs of growing industries in Kane County. She also envisions leading volunteer workshops on workplace civility and career readiness for high-school students.
