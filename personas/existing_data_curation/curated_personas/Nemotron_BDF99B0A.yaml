  career_goals: Victoria aims to advance to a senior housekeeping supervisor position within a reputable hotel or senior‑living facility over the next five years, seeking a Professional Housekeeping Management
    certification to solidify her expertise. She also plans to launch a small, neighborhood‑focused cleaning business that emphasizes green cleaning methods, allowing her to serve her community while achieving
    greater financial stability. Long‑term, she hopes to mentor new staff, become a trusted resource for best practices, and eventually own her own home.
