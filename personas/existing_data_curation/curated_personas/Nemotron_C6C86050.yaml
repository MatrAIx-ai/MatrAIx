personas:
  professional: An experienced elementary educator, Anna Lioon blends interdisciplinary curriculum design, technology integration, and differentiated instruction to cultivate creative problem‑solving in
    their classroom, and they channel their curiosity and balanced organization into mentoring novice teachers and championing district‑wide STEAM initiatives.
  sports: A dedicated outdoor enthusiast, Anna Lioon hails the Colorado Rockies baseball team, follows the Denver Broncos, and supports the Colorado Avalanche, they regularly hike with the Loveland Outdoor
    Club, practice yoga three times a week, and join a weekend adult softball league in the spring.
  arts: Anna Lioon expresses a love for visual and performing arts by painting watercolors inspired by the Colorado alpine palette, attending Denver Art Museum exhibitions of Claude Monet and local painter
    James Langley, enjoying concerts by Sufjan Stevens and Bon Iver, and cheering the Colorado Shakespeare Festival’s productions, they immerse themselves in artistic experiences to recharge their creative
    spirit.
  travel: Anna Lioon treasures both spontaneous weekend getaways to Rocky Mountain National Park and carefully planned trips abroad, such as a cultural tour of Kyoto’s temples and a wildlife safari in Banff;
    they balance family responsibilities and a modest travel budget by booking off‑season flights and staying in eco‑lodges, aiming to add the vineyards of Tuscany to their bucket list.
  culinary: A farm‑to‑table enthusiast, Anna Lioon delights in cooking seasonal dishes like roasted beet and goat‑cheese salad with toasted hazelnuts, quinoa pilaf with kale and local pink salmon, and summer
    peach cobbler topped with vanilla bean ice cream; they source ingredients from the community garden and farmers’ markets, often experimenting with rosemary, lavender, and heirloom tomatoes.
  core: Anna Lioon is a curious, organized educator who fuses art and science into teaching, balances prudent finances with occasional creative splurges, actively manages mild health concerns, stays fit
    through hiking and yoga, immerses in the arts, travels thoughtfully, and cooks seasonally while nurturing community stewardship.
background:
  cultural: Anna grew up in the Front Range of Colorado as a third‑generation American from a family with German and Scandinavian roots that settled in the state during the early 20th century. Her upbringing
    combined the independent, outdoor‑oriented ethos of the Rockies with a strong sense of community and civic participation typical of small‑town Colorado. She values environmental stewardship, local arts,
    and inclusive community traditions, and she brings these cultural influences into her classroom by celebrating regional history, encouraging respect for diverse perspectives, and integrating outdoor
    learning experiences.
attributes:
  skills: '[''Curriculum Development'', ''Arts Integration'', ''Classroom Management'', ''Differentiated Instruction'', ''Technology Integration (Google Classroom, Interactive Whiteboards)'', ''Formative
    Assessment Design'', ''Collaborative Project Facilitation'', ''Parent‑Teacher Communication'', ''Mentoring New Teachers'', ''Conflict Resolution'']'
  hobbies: '[''Watercolor Painting'', ''Hiking'', ''Gardening'', ''Reading Historical Fiction'', ''Visiting Art Galleries'', ''Yoga'', ''Cooking'', ''Community Volunteering'']'
  career_goals: Anna aims to complete a bachelor's degree in education within the next two years and transition into a curriculum specialist role within the Loveland School District. She aspires to lead
    an arts‑integration program that provides professional development for teachers and expands student access to STEAM experiences. Long‑term, she envisions becoming an instructional coach or assistant
    principal, shaping school culture to prioritize collaborative learning, student well‑being, and community engagement. Additionally, she hopes to launch an after‑school garden‑science program that connects
    horticulture with elementary science concepts.
