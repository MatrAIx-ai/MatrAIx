persona_description: A linguist with expertise in the study of syntax, semantics, and language typology. This person is likely to have a strong background in linguistics, with a focus on syntax and semantics,
  and an interest in the comparative study of adjectives in different languages. They are likely to be proficient in various languages, including English, French, Mandarin Chinese, Modern Hebrew, Russian,
  Spanish, and Serbocroatian, and are familiar with the syntax and semantics of adjectives in these languages. They may also have experience with theoretical issues related to the syntax and semantics of
  adjectives, such as the syntax of attributive and predicative adjectives, the syntax of nominalized adjectives, and the identification of adjectives as a distinct lexical category in Mandarin Chinese.
