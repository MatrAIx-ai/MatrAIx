  career_goals: Dora aims to earn her broker’s license within the next year and launch a boutique agency that specializes in serving Denver’s growing Latinx community. She envisions building a portfolio
    of eco‑friendly and artistically designed homes, becoming a go‑to resource for first‑time buyers, and eventually mentoring new agents. Long‑term, she hopes to invest in residential properties and use
    her platform to promote culturally inclusive homeownership.
