personas:
  professional: Dora Rodas, a 26‑year‑old Denver real‑estate specialist, blends their curiosity for art with a talent for negotiation, creatively staging homes with acrylic accents and eco‑friendly touches
    while navigating a relaxed, sometimes disorganized workflow that they offset with natural rapport‑building skills.
  sports: Dora Rodas, an avid hiker who tackles Rocky Mountain trails each month, cheers for the Denver Broncos and the Colorado Avalanche, and joins a lively salsa‑dance fitness class for cardio, though
    they frequently forget to schedule rest days and occasionally miss a game due to unpredictable showings.
  arts: Dora Rodas, a passionate gallery‑hopper and street‑photographer, spends weekends painting acrylic abstracts inspired by the vibrant patterns of Yayoi Kusama and the social realism of Diego Rivera,
    regularly attends performances at Red Rock Amphitheatre and the Denver Center for the Performing Arts, and they often curate pop‑up exhibitions featuring their own work alongside local artists.
  travel: Dora Rodas, a spontaneous explorer, favors short road trips to mountain towns like Aspen and Moab for hiking adventures, dreams of a cultural immersion tour of Oaxaca’s historic markets, and they
    balance this wanderlust with a modest travel budget by packing light, using reward points, and planning trips around slow periods in the real‑estate market.
  culinary: Dora Rodas, a home‑cook who delights in preparing traditional dishes such as pepian and tamales using masa harina, roasted chilies, and plantains, experiments with quinoa salads and artisanal
    cheese boards for community potlucks, and they often blend these flavors with contemporary twists while inviting friends to share in the cooking process.
  core: Dora Rodas, a curious, art‑infused real‑estate go‑getter who hikes, salsa‑dances, hosts potlucks, and balances spontaneous spending with a habit of misplacing keys and delayed paperwork.
background:
  cultural: Dora is a first‑generation American of Guatemalan descent. She grew up speaking Spanish at home and celebrating traditions such as Día de los Muertos, Semana Santa, and the Feast of the Virgin
    of Maximiliana. Her heritage informs her warm, family‑centered approach to client care and fuels her desire to help other Latinx families navigate homeownership in Denver. She remains active in the
    local Guatemalan community, participating in cultural festivals and supporting diaspora businesses, while seamlessly blending her roots with the urban, outdoorsy lifestyle of Colorado.
