persona_description: A missile expert who specializes in the study of guided missiles, particularly their methods of propulsion and control. Their research interests include, but are not limited to, the
  differences in performance and suitability for different types of guided missiles, the methods of propulsion used for launching guided missiles from the ground and the air, and the control systems used
  in guided missiles. They have a deep understanding of the principles of flight and the mechanics of missiles, and are able to apply this knowledge to classify guided missiles based on their methods of
  propulsion and control.
