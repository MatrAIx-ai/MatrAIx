personas:
  professional: Amy Wilford, a budding engineer in training, applies their organized, methodical mindset to building elaborate Lego cities, turning curiosity into early lessons in spatial reasoning while
    always ensuring each block fits perfectly before moving on, and they proudly display each finished model on the shelf for friends to admire.
  sports: Amy Wilford enjoys weekend soccer matches with the Little Sprinters Club, cheers on the town's junior baseball team the Riverside Rookies, and practices balance by climbing the backyard treehouse,
    preferring small‑team drills over crowded playground games, and they relish the quiet focus of a single ball being passed around.
  arts: Amy Wilford delights in drawing animals inspired by Eric Carle’s vivid illustrations, crafts friendship bracelets while humming to The Wiggles, and sings along to Sesame Street’s catchy tunes, often
    sharing their creations with a close circle of friends during simple board game afternoons.
  travel: Amy Wilford loves family trips to the nearby state park for leaf‑collecting adventures, eagerly anticipates a future visit to the National Aquarium, and enjoys day trips to the local farm where
    they can help pick strawberries, favoring relaxed, nature‑focused outings over crowded amusement parks.
  culinary: Amy Wilford prefers bright, bite‑size meals like peanut‑butter and banana sandwiches, carrot sticks with hummus, and colorful fruit kebabs, skillfully assembling these tiny dishes with guidance
    from a child‑friendly cookbook, while quietly insisting on arranging food on the plate in neat rows of three.
  core: Amy Wilford is a methodical, curious six‑year‑old who turns backyard explorations, Lego constructions, and careful budgeting into a distinctive blend of organized play, gentle kindness, and quiet
    confidence, and they approach each new challenge with quiet determination.
background:
  cultural: Amy grows up in Waycross, a small town in southern Georgia, where community and family ties are strong. Her family participates in local church activities, Sunday school, and community events
    such as county fairs and holiday parades. Southern hospitality and polite manners are emphasized at home, and she enjoys traditional foods like fried chicken, peach cobbler, and sweet tea during family
    gatherings. Exposure to Southern storytelling, folk music, and local wildlife (like the nearby Okefenokee Swamp) shapes her appreciation for nature and community harmony.
