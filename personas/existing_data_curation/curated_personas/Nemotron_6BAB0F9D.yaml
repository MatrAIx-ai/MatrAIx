  career_goals: Amy dreams of becoming a veterinarian because she loves caring for animals and is fascinated by how they live. She also expresses interest in being a teacher one day, hoping to help other
    children learn in a structured and supportive environment. Her long‑term ambition is to finish school with good grades, attend a college nearby, and work in a role that blends her love for animals,
    people, and organized, practical problem‑solving.
