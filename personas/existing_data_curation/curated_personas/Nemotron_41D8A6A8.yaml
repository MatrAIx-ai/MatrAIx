personas:
  professional: Angel Ojeda, a seasoned stockroom and order fulfillment specialist with over three decades of retail experience, leverages meticulous inventory management, fluency in Spanish and English,
    and a knack for data‑driven reporting to keep shelves stocked, while channeling a curiosity for logistics analytics into a budding leadership role.
  sports: Angel Ojeda, an avid trail walker along the Bay shoreline and member of a local walking club, practices gentle yoga at the community center, roots for the San Francisco Giants and the Golden State
    Warriors, and occasionally joins a seniors’ pickleball league at the recreation center.
  arts: Angel Ojeda, who volunteers at the annual Día de los Muertos celebration, teaches Spanish to children through storytelling, captures everyday moments with a smartphone inspired by Annie Leibovitz,
    and enjoys listening to the classic folk ballads of Carlos Vives while appreciating the mural work of Diego Rivera at the local museum.
  travel: Angel Ojeda, a methodical planner, prefers road trips to nearby wine country and occasional pilgrimages to Oaxaca for authentic culinary experiences, balances travel with family responsibilities,
    and often books off‑peak stays to stretch a modest travel budget while using a travel rewards credit card to earn points.
  culinary: Angel Ojeda, a home‑cooking enthusiast, blends fresh herbs from her garden like cilantro, epazote, and oregano into traditional mole, slow‑cooked tamales, and vibrant salsas, skillfully handling
    corn masa and dried ancho chilies, while occasionally indulging in a fondness for extra spicy salsa verde that sometimes leaves guests reaching for milk.
  core: Angel Ojeda, a pragmatic yet curious 55‑year‑old logistics ace, balances meticulous inventory work, community garden devotion, and a habit of snapping spontaneous photos, all while navigating mild
    health quirks and a disciplined financial plan toward a future consulting role.
background:
  cultural: Angel was raised in a Mexican‑American household in Oakland, where Spanish was spoken daily and family gatherings centered around Mexican cuisine, music, and holidays such as Día de los Muertos
    and Cinco de Mayo. Her parents immigrated from Jalisco, and she has retained strong ties to her heritage through cooking, community festivals, and participation in local Mexican cultural organizations.
    Living in the diverse Bay Area, Angel blends traditional Mexican values of family, respect, and community service with the progressive, inclusive spirit of Oakland, shaping a bicultural identity that
    informs both her personal life and her collaborative work style.
attributes:
  skills: '["Inventory Management", "Order Fulfillment", "Stockroom Organization", "Bilingual Customer Service (Spanish/English)", "POS and Inventory Software (Oracle Retail, SAP)", "Data Entry and Reporting",
    "Warehouse Equipment Operation (Pallet Jack, Forklift)", "Time Management", "Problem Solving", "Safety and Compliance Practices"]'
  hobbies: '["Community Gardening", "Traditional Mexican Cooking", "Volunteering at Cultural Events", "Bay Area Walking/Hiking", "Yoga", "Smartphone Photography", "Reading Practical Nonfiction", "Knitting"]'
  career_goals: Looking ahead, Angel aspires to move into a supervisory role, such as shift lead or inventory manager, where she can mentor new employees and streamline stock processes. She plans to enroll
    in a part‑time logistics certificate program at a community college to deepen her knowledge of supply‑chain analytics. Over the next five years, she hopes to lead a project that reduces shrinkage by
    implementing data‑driven inventory audits, and eventually transition to a part‑time consulting position helping small retailers optimize their stockroom operations before retirement.
