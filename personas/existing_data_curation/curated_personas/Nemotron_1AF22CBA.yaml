  hobbies: '[''Gardening'', ''Knitting'', ''Reading mystery novels'', ''Bridge club'', ''Volunteer work at food pantry'', ''Attending church services'', ''Walking in Fairmount Park'', ''Cooking Italian
    dishes'']'
  career_goals: Although retired, Isabel aims to deepen her impact on the Philadelphia senior community. She plans to mentor new volunteers at the local senior center, document and share her family's Italian
    recipes in a community cookbook, and write a memoir of her life's experiences to inspire younger generations. She also hopes to maintain her health through regular walks in Fairmount Park, stay mentally
    active by learning new historical novels, and support her grandchildren's education through scholarships. Her overarching ambition is to leave a legacy of compassion, practical help, and cultural heritage
    for her family and neighbors.
