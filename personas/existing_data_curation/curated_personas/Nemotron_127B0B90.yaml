personas:
  professional: Luisa Colindres, a 40‑year‑old master carpenter, merges precise blueprint interpretation with an artist’s eye to deliver exacting residential framing, custom cabinetry, and hand‑carved décor
    while mentoring apprentices and championing sustainable building practices, and they approach each project with methodical patience.
  sports: Luisa Colindres stays active by weekend trail‑hiking with the Jackson County Hiking Club, plays on a local adult softball team called the Jackson Wildcats, follows the Detroit Lions, Detroit Tigers,
    and Detroit Pistons as their preferred professional sports franchises, and they view each outing as a mindful break from the workshop.
  arts: Luisa Colindres finds inspiration sketching architectural concepts in a well‑worn sketchbook, explores galleries featuring Frida Kahlo and Diego Rivera, listens to the soulful guitar of Lila Downs
    and the cello mastery of Yo‑Yo Ma while working in her workshop, and they often translate these artistic influences into hand‑carved motifs on cabinets.
  travel: Luisa Colindres prefers meticulously planned road trips that combine photography hikes through the Ozark National Forest with cultural immersion in Oaxaca’s bustling markets, and they occasionally
    squeeze in spontaneous weekend escapes to the historic streets of San Miguel de Allende when a client deadline eases.
  culinary: Luisa Colindres, an adept home chef, layers the complex flavors of mole poblano with roasted chilies, chocolate, and spices while hand‑making tamales wrapped in corn husks, often incorporates
    garden‑fresh zucchini, heirloom tomatoes, and Oaxaca cheese into their weekly family meals, and they relish sharing the dishes with friends at community gatherings.
  core: Luisa Colindres, a methodical yet creatively restless 40‑year‑old, balances a disciplined work schedule with midnight sketching sessions, an obsessive habit of cataloguing reclaimed‑wood samples,
    and a tendency to over‑commit to community workshops at the expense of personal downtime, and they often find themselves juggling too many projects at once.
background:
  cultural: Luisa is a first‑generation Mexican American who grew up in a bilingual household where family gatherings were anchored by shared meals, Dia de los Muertos celebrations, and stories of her grandparents'
    journey from Mexico. Living in Grandview, MO, she balances Midwestern values of hard work and self‑reliance with her Mexican heritage, often infusing her carpentry with vibrant colors and motifs reminiscent
    of Talavera tiles and folk art. She stays connected to the local Hispanic community through cultural festivals, a volunteer role at the county's Spanish language outreach program, and by teaching weekend
    woodworking classes for youths of diverse backgrounds. This blend of cultures enriches her perspective, fueling both her professional creativity and her commitment to fostering inclusive, collaborative
    spaces.
attributes:
  skills: '["Residential framing", "Custom cabinetry", "Finish carpentry", "Wood joinery (mortise & tenon, dovetail)", "Blueprint interpretation", "Project planning & scheduling", "Material estimation &
    budgeting", "Tool maintenance & safety compliance", "Sustainable building practices (reclaimed wood)", "Bilingual communication (English/Spanish)", "Mentoring apprentices", "Artistic wood carving"]'
  hobbies: '["Sketching architectural designs", "Visiting local art galleries", "Hiking and nature photography", "Cooking Mexican cuisine", "Reading historical novels", "Sewing/embroidery", "Community woodworking
    workshops (teaching)", "Gardening and plant care", "Listening to traditional Mexican folk music", "Collecting vintage hand tools"]'
  career_goals: Luisa aims to become a master carpenter recognized for her blend of technical precision and artistic craftsmanship. She plans to obtain NCCER certification and eventually open a small custom‑furniture
    workshop that showcases Mexican design motifs alongside contemporary Midwestern style. In the next five years, she hopes to lead larger renovation projects, especially historic home restorations in
    Jackson County, and to mentor more women entering the trades. Long‑term, she envisions expanding her business to include sustainable building consulting, helping homeowners adopt eco‑friendly practices
    while preserving cultural aesthetics.
