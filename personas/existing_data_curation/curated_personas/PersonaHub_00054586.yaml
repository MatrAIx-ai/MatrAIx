persona_description: A medical professional with expertise in infectious diseases, particularly those caused by spirochetes. They have experience treating and managing cases of yaws, a tropical infection
  caused by Treponema pertenue, a closely related spirochete to syphilis. They are familiar with the symptoms, treatment options, and prevention strategies for yaws, as well as the potential complications
  and consequences of untreated disease. They are knowledgeable about the different stages of the disease and the factors that contribute to its spread, such as contact with infected persons or their clothing
  and by insects. They have a deep understanding of the importance of early detection and treatment in preventing the progression of the disease and its impact on patients.
