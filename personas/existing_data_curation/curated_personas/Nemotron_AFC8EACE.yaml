personas:
  professional: Asgar Underwood is a budding mini‑architect who meticulously arranges building blocks by color and shape, plans elaborate tower designs before starting, and proudly presents each completed
    structure to family; they demonstrate a blend of curiosity, practicality, and a competitive drive to out‑do peers.
  sports: Asgar Underwood is an enthusiastic participant in the neighborhood T‑ball league at the local park, proudly wears a miniature Houston Astros cap, competes in backyard foot‑race challenges after
    Sunday church service, and cheers for the Dallas Cowboys on game night; they blend early team spirit with a competitive streak.
  arts: Asgar Underwood is a creative finger‑painter who loves drawing fireworks and sunshine while listening to a church choir’s rendition of Amazing Grace, dances to Shania Twain songs at family barbecues,
    and enjoys watching Mickey Mouse cartoons; they reveal a vivid imagination shaped by community celebrations and classic country tunes.
  travel: Asgar Underwood is a curious road‑trip adventurer who has explored the Dallas skyline on a State Fair visit, delighted at Disneyland in Anaheim, dreams of strolling the San Antonio River Walk
    to see the Alamo, and balances travel plans around Sunday church attendance and Independence Day fireworks displays; they eagerly anticipate future trips.
  culinary: Asgar Underwood is a budding food explorer who prefers chicken nuggets with ketchup, buttery mac and cheese, sweet watermelon slices, helps stir a simple guacamole with a plastic spoon, and
    occasionally adds a pinch of toasted pumpkin seeds to a side salad; they reflect a taste for familiar Southern comfort foods mixed with playful kitchen experiments.
  core: Three‑year‑old Asgar Underwood blends a curious, methodical streak with a love for backyard barbecues and church gatherings, competitively stacks blocks, saves change in a piggy bank, occasionally
    forgets eczema skin care, and thrives on routine and playful rivalry; they embody a tiny but organized dynamo.
background:
  cultural: Asgar is raised in a white, middle-class family in Pasadena, Texas, located in Harris County near Houston. The community blends suburban Southern Texas customs with influences from the larger
    metropolitan area. Family traditions include Sunday church attendance, backyard barbecues, and celebrating holidays such as Independence Day with fireworks and communal meals. The local culture emphasizes
    hospitality, independence, and a mix of rural and urban values, which fosters Asgar's practical outlook and organized approach to daily life.
