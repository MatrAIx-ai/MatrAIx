  career_goals: Even at three, Asgar enjoys imagining future roles. He often talks about becoming a firefighter because of his fascination with bright trucks and helping people, a builder or construction
    worker because he loves assembling block towers, and a teacher after he enjoys storytime and sharing books with peers. These ambitions reflect his curious nature, practical mindset of wanting to make
    a tangible difference, organized approach to learning new skills, and a competitive drive to master tasks quickly.
