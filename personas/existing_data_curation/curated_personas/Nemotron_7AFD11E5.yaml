  career_goals: Troy aims to secure a stable, structured position in logistics or IT support, ideally obtaining a CompTIA A+ certification and a forklift operator license within the next year. He hopes
    to progress to a supervisory role where he can apply his organizational skills, eventually saving enough to purchase a home in Houston and, long-term, launch a small mobile car-detailing business that
    leverages his mechanical expertise.
