  career_goals: She dreams of turning her love for art and technology into a future career, hoping to become an illustrator or concept artist for video games or animation, perhaps studying visual arts or
    interactive media in college. She also imagines using her cultural background to create multicultural storytelling projects and wants to keep her options open for a flexible, creative profession.
