personas:
  professional: Vasantha Soni is an aspiring visual artist and budding robotics hobbyist, who blends a love for sketching, digital painting, and LEGO construction with a relaxed, curiosity‑driven approach
    that favors experimentation over strict planning.
  sports: Vasantha Soni cheers for the Riverdale Rovers soccer team, plays on the school’s co‑ed soccer squad each fall, and spends leisurely Saturdays swimming at the community pool, preferring low‑key
    activities over competitive leagues.
  arts: Vasantha Soni immerses themselves in drawing characters inspired by graphic novels like 'Lumberjanes', admires digital artists Loish and James Jean, streams Studio Ghibli films by Hayao Miyazaki,
    and explores local galleries featuring works by contemporary street artist Banksy.
  travel: Vasantha Soni loves weekend trips to the nearby interactive science museum, dreams of wandering the Louvre in Paris, and hopes to explore Tokyo’s Akihabara district to experience anime culture
    firsthand.
  culinary: Vasantha Soni enjoys baking chocolate chip cookies and experimenting with a family‑secret almond brittle, often mixing cocoa powder, toasted almonds, and a pinch of sea salt, and occasionally
    tries to recreate a mango‑poppy seed tart seen on a cooking show.
  core: Vasantha Soni is a curious 11‑year‑old who blends art, tech, and sweet treats, prefers flexibility over strict schedules, and balances bursts of creativity with occasional forgetfulness.
background:
  cultural: 'Vasantha is a second‑generation South Asian American, whose family roots trace back to Tamil‑speaking India. Growing up in Long Beach, she experiences a blend of American and Indian traditions:
    celebrating Diwali and Pongal, speaking Tamil at home while attending English‑medium school, enjoying Indian cuisine alongside Californian seafood, and participating in community cultural festivals.
    This multicultural environment nurtures her appreciation for diverse art forms and fuels her curiosity about blending cultures in creative work.'
