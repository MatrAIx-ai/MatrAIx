  career_goals: Felix aims to cement his company's reputation as a pioneer in sustainable technology solutions while expanding its footprint beyond Texas into emerging markets. He is passionate about establishing
    a mentorship pipeline for young Puerto Rican and Hispanic engineers, and plans to launch a scholarship fund that supports STEM education in underserved communities. Ultimately, he envisions a legacy
    that blends business success with tangible social impact and cultural pride.
