  hobbies: '[''Reading mystery and historical fiction'', ''Gardening (vegetables and herbs)'', ''Cooking and recipe experimentation'', ''Furniture upcycling'', ''Hiking local trails'', ''Board‑game and
    trivia nights'', ''Online research on sustainable living'', ''Blog writing about DIY projects'']'
  career_goals: Victoria intends to transition from her current offline status into a flexible, home‑based role that leverages her practical expertise and writing talent. Over the next few years she plans
    to launch a modest online business offering how‑to guides, curated DIY kits, and personalized budgeting consultations, providing a reliable income stream while preserving her preference for autonomy,
    minimal structured schedules, and the ability to work at her own pace.
