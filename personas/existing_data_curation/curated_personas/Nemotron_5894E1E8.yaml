  hobbies: '["Watercolor painting", "Knitting", "Gardening (roses and herbs)", "Genealogy research", "Reading historical fiction", "Attending small art exhibit openings", "Bird watching", "Cooking Southern
    dishes", "Listening to bluegrass music", "Participating in community volunteer projects"]'
  career_goals: Antoinette aims to deepen her engagement with the arts and her community through volunteer leadership. She plans to complete a docent training program at the Speed Art Museum so she can
    lead intimate tours for senior visitors, sharing her appreciation for visual art. She also hopes to start an intergenerational workshop where she teaches knitting and basic computer skills to neighborhood
    teens, fostering connections across age groups. In the next five years she aspires to travel to three major U.S. art museums to broaden her exposure to diverse artistic traditions. Additionally, she
    intends to compile and self‑publish a family genealogy book that weaves together personal stories with the broader history of Kentucky.
