personas:
  professional: Antoinette Stone, a retired educator turned community arts docent, leverages meticulous budgeting, gentle mediation, and a love of local history to lead intimate tours at the Speed Art Museum
    for senior visitors, and they orchestrate intergenerational knitting and basic computer workshops that blend craftsmanship with technology.
  sports: Antoinette Stone participates in the Sunday Morning Rose Garden Walking Club for gentle 3‑mile strolls, cheers on the Kentucky Wildcats during basketball season, and occasionally attends low‑impact
    water aerobics classes at the community center, preferring these low‑stress activities to high‑intensity sports, and they appreciate the quiet camaraderie these gatherings bring.
  arts: Antoinette Stone expresses creativity through watercolor paintings of historic streets and garden roses inspired by Georgia O'Keeffe and Mary Cassatt, knits while listening to Bill Monroe’s bluegrass,
    regularly attends intimate exhibit openings featuring regional artists like Joyce Pelgrim, and they proudly share their artwork at local senior centers.
  travel: Antoinette Stone meticulously plans art‑focused journeys, having already visited the Metropolitan Museum of Art in New York and the Art Institute of Chicago, now aiming for the Getty Center in
    Los Angeles, while also returning annually to the historic town of Bardstown for weekend getaways, balancing ambition with a comfortable travel pace, and they favor leisurely itineraries that allow
    time for reflection.
  culinary: Antoinette Stone delights in preparing Southern staples such as fried chicken, collard greens, shrimp and grits, and peach cobbler, seasoning them with fresh rosemary, thyme, and mint from their
    garden, often gifting handwritten recipe cards, yet they sometimes forget to label leftovers, creating mysterious fridge surprises.
  core: Antoinette Stone, a garden‑loving docent and genealogist, weaves quiet curiosity into art tours and knitting workshops, yet habitually misplaces their reading glasses, prompting spontaneous scavenger
    hunts that reveal their playful resilience.
background:
  cultural: Antoinette grew up in the suburban outskirts of Louisville, Kentucky, in a family that traces its roots to German and Irish immigrants who settled in the Bluegrass State in the 19th century.
    Her upbringing blended Midwestern modesty with Southern hospitality, emphasizing community, self‑reliance, and respect for tradition. Regular participation in a Baptist church shaped her values of kindness,
    cooperation, and service to others. The vibrant Louisville arts scene—museums, galleries, and the annual Kentucky Derby festivities—nurtured her appreciation for visual art and cultural events, while
    local craft fairs and county fairs reinforced a love for handmade arts. These cultural influences inform her practical skills in gardening and budgeting, her devotion to community volunteerism, and
    her appreciation for regional music, cuisine, and history.
attributes:
  skills: '["Event planning and coordination", "Volunteer management and mentorship", "Basic computer literacy", "Gardening (perennials and roses)", "Knitting and crocheting", "Southern cuisine cooking",
