personas:
  professional: Abraham Boggs, a diligent file clerk specializing in records management and document archiving, leverages their meticulous attention to detail, methodical workflow optimization, and curiosity
    for new technologies to streamline filing processes, implement precise Excel tracking systems, and assertively lead small‑scale improvement projects while maintaining courteous communication with colleagues.
  sports: Abraham Boggs, an avid weekend angler on the Atchafalaya Bayou and member of a local adult softball league, stays fit with early morning jogs along the river trail, passionately supports the New
    Orleans Saints, the New Orleans Pelicans, and the LSU Tigers, and incorporates seasonal outdoor activities like kayaking in summer and brisk walks in cooler months.
  arts: Abraham Boggs, an active participant in Prairieville’s community photography club, frequently attends gallery openings showcasing works by local painter George Rodrigue and photographer Gordon Parks,
    enjoys the jazz of Wynton Marsalis and spoken‑word poetry by Tayari Jones, and channels this inspiration into designing vibrant flyers for church events using Canva and Photoshop.
  travel: Abraham Boggs, who prefers thoughtfully planned road trips that blend cultural immersion with relaxation, has explored New Orleans’ historic French Quarter and Lafayette’s Creole countryside,
    dreams of a culinary pilgrimage to Marseille’s markets, and occasionally postpones longer overseas journeys due to family commitments and budgeting constraints.
  culinary: Abraham Boggs, a proficient home chef, delights in preparing soul‑food classics such as shrimp étouffée, collard greens simmered with smoked turkey, and sweet potato pie, often experimenting
    with locally sourced okra and cayenne pepper, yet admits to over‑seasoning dishes when excited about new flavor ideas.
  core: Abraham Boggs, a methodical yet creatively curious 30‑year‑old, balances a disciplined work routine with spontaneous bursts of artistic inspiration, occasionally over‑indulges in late‑night snacking
    after a successful photography shoot, and habitually forgets to water houseplants when caught up in community projects.
background:
  cultural: Abraham was raised in a close-knit African-American family in the River Parishes, where church, family gatherings, and Creole culinary traditions play central roles. Growing up in Prairieville,
    he absorbed the rhythms of gospel and jazz, the storytelling of elders, and the value of community service that are hallmarks of Southern Black culture. He honors his heritage by participating in local
    festivals, cooking soul-food dishes passed down through generations, and maintaining strong ties to his extended family and church community.
attributes:
  skills: '[''records management'', ''document archiving'', ''Microsoft Office Suite'', ''Excel data tracking'', ''SharePoint administration'', ''process improvement'', ''time management'', ''event planning'',
