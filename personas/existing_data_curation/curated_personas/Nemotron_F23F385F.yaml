  hobbies: '[''photography'', ''visiting art galleries'', ''reading African-American literature'', ''cooking Southern cuisine'', ''gardening'', ''fishing'', ''jazz listening'', ''community volunteer mentoring'']'
  career_goals: He aims to advance to a supervisory role in records administration within the next three years, obtain a Certified Records Manager credential, and eventually transition to an office manager
    position while pursuing an associate degree in Business Administration. Long-term, Abraham hopes to combine his administrative expertise with his passion for the arts by establishing a community art
    space that showcases local talent and provides workshops for youth.
