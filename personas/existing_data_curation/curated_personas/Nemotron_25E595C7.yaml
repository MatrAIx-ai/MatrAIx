personas:
  professional: Ryan Robertson, a budding aerospace hobbyist, channels their curiosity and practicality into designing and launching custom model rockets while tinkering with electronics kits, eagerly troubleshooting
    on the fly and improvising when deadlines loom, reflecting their spontaneous, competitive spirit and occasional struggle with organization.
  sports: Ryan Robertson, an energetic member of the town’s junior basketball league, practices dribbles and jump shots at the community gym three times a week, roots for the local high school Wildcats,
    and embraces spontaneous trail runs on prairie paths on weekends, yet their competitive edge sometimes makes teamwork feel like a rivalry.
  arts: Ryan Robertson, a sci‑fi aficionado and wildlife photographer, devours novels like "Dune" and "Ender’s Game," captures prairie critters through macro lenses inspired by Ansel Adams, and fuels creative
    bursts with the synth‑driven scores of Daft Punk and Vangelis, blending imagination with hands‑on craftsmanship.
  travel: Ryan Robertson, an adventurous prairie explorer, spends weekends trekking the Windy Ridge State Park trails and dreaming of a pilgrimage to the Kennedy Space Center in Florida and Utah’s Arches
    National Park, but their modest travel budget confines most journeys to family road trips and county‑fair excursions.
  culinary: Ryan Robertson, a self‑declared snack connoisseur, toggles between greasy pepperoni pizza slices and homemade trail mix of dried mango, almonds, and chocolate chips, while they often whip up
    quick oatmeal with cinnamon after late‑night rocket tests, occasionally neglecting balanced meals for convenience.
  core: Ryan Robertson, a 12‑year‑old curiosity‑driven tinkerer, balances competitive rocket building and basketball with impulsive spending, occasional health‑check neglect, and a love of sci‑fi and prairie
    photography, all while sprinting between spontaneous projects and organized schoolwork.
background:
  cultural: Ryan grew up in Georgetown, Illinois, a small town in Vermilion County where Midwestern values of hard work, self‑reliance, and community are prominent. His family has deep roots in local agriculture
    and small‑scale trades, which has shaped his practical outlook and appreciation for hands‑on problem solving. Community events like the county fair, local sports leagues, and school clubs provide a
    supportive backdrop for his competitive spirit and social interactions. The cultural emphasis on modesty, teamwork, and respect for tradition blends with his curiosity, encouraging him to explore new
    ideas while staying grounded in the pragmatic, resource‑focused mindset of his rural environment.
attributes:
  skills: '[''Basic woodworking'', ''Bike repair'', ''Scratch programming'', ''Strategic gaming (chess and video games)'', ''Problem solving'', ''Effective group communication'']'
  hobbies: '[''Model rocket building'', ''Electronics DIY (Arduino)'', ''Basketball'', ''Hiking and wildlife photography'', ''County fair project competitions'', ''Science‑fiction reading'', ''Strategic
    board and video games'']'
  career_goals: Ryan aims to turn his curiosity and practical skills into a future career in engineering, preferably robotics or mechanical design. He hopes to join a high‑school robotics club, master Arduino
    and 3D‑printing projects, and compete in regional contests. In the longer term, he dreams of working on innovative agricultural equipment that helps local farms run more efficiently, while also keeping
    the option open to pursue a varsity sports scholarship for basketball.
