  career_goals: Geron talks about growing up as someone who makes people smile. He dreams of becoming an artist who paints bright pictures for his family, a teacher who reads stories to little kids, or
    a kind caretaker who looks after animals at a pet clinic. He also mentions wanting to be a helper who keeps his neighborhood safe and happy, reflecting his deep desire to assist others and maintain
    harmony.
