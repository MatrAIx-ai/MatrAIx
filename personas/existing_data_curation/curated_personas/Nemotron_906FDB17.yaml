personas:
  professional: Brett Castilla is a warehouse operations specialist who leverages meticulous inventory management, forklift expertise, and creative problem‑solving to streamline dock flow, while their competitive
    drive and methodical work ethic fuel ambitions to become a shift lead and eventually launch a tech‑enabled moving and storage business that integrates community art projects.
  sports: Brett Castilla is a regular member of the Milwaukee City Soccer Club intramural team, cheers for the Milwaukee Bucks and Green Bay Packers, and combines the competitive spirit of Saturday soccer
    with a disciplined fitness routine that includes early‑morning jogs and weekend pick‑up games to stay in peak condition.
  arts: Brett Castilla spends weekends sketching Milwaukee’s riverfront warehouses, curates Instagram reels of installations by Yayoi Kusama and local street artist Vicki Bryson, and volunteers as a set
    builder for community‑theater productions, where their love of abstract concepts fuels inventive stage designs.
  travel: Brett Castilla favors short, purposeful trips that balance adventure with practicality—exploring Detroit’s industrial heritage, soaking up Berlin’s vibrant street‑art scene, and planning a future
    road trip along the Pacific Northwest coast—while budgeting travel expenses through a points‑earning credit card and a meticulous itinerary spreadsheet.
  culinary: Brett Castilla enjoys cooking hearty Midwestern comfort foods, mastering the perfect bratwurst + sauerkraut combo and homemade cheese curds, while their culinary curiosity leads them to experiment
    with Korean kimchi‑fried rice and sample craft beers from local breweries such as New Glarus.
  core: Brett Castilla is a methodical, art‑infused logistics pro whose competitive spark drives a quest to transform warehouse efficiency into a community‑focused moving business, even if occasional impulsive
    art purchases and late‑night board‑game marathons threaten their otherwise disciplined routine.
background:
  cultural: Brett hails from a working‑class white family rooted in the German‑Polish immigrant communities that shaped Milwaukee’s cultural fabric. Raised in the suburbs of Milwaukee County, he grew up
    attending local festivals such as German Fest and Polish Fest, and was immersed in the city’s strong brewing and industrial heritage. His upbringing emphasized hard work, reliability, and community
    involvement, while his exposure to the city’s vibrant arts scene fostered an appreciation for creativity and cultural diversity. Though he identifies with Midwestern values, he remains open‑minded,
    integrating both traditional and contemporary influences into his worldview.
