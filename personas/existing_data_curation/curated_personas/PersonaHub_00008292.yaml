persona_description: A neonatologist who specializes in the management of very low birth weight infants, particularly those requiring blood transfusions. She is aware of the risks and benefits associated
  with blood transfusions and is looking for evidence-based recommendations to make decisions on the appropriate level of haemoglobin for transfusion. She is concerned with the potential risks of infection
  and reaction to foreign blood components and is interested in the long-term effects of low levels of haemoglobin on the baby's survival, growth, and development. She is looking for a review that compares
  the effects of blood transfusion at low and high levels, and is interested in the conclusions that the review draws from the studies.
