  career_goals: Although retired from formal employment, Iris aims to leave a lasting imprint on her community by launching a recurring art exhibition series that showcases emerging local talent and garners
    regional cultural awards. She aspires to complete and publish a memoir that intertwines her personal journey with the social history of Mogadore, thereby contributing to the town’s collective memory.
    Additionally, she seeks to mentor the next generation of volunteers, fostering leadership skills and critical inquiry within local nonprofit organizations. Iris also hopes to secure a leadership role
    within the Summit County Historical Society, guiding archival projects and public programming.
