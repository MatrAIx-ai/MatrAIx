personas:
  professional: Jennifer Benson is an aspiring veterinary technician in middle school who channels their practical problem‑solving skills and love of horses into science fair projects and animal‑care volunteering,
    while they adopt a laid‑back approach to homework deadlines and balance choir rehearsals.
  sports: Jennifer Benson participates in the local junior equestrian club, enjoys weekend fishing trips at the nearby state park, and is a devoted fan of the Dallas Cowboys and Dallas Mavericks, occasionally
    joining a school intramural softball team while they prefer relaxed hikes over competitive sports.
  arts: Jennifer Benson expresses creativity by sketching cartoon characters during choir practice, baking cupcakes inspired by the whimsical designs of Martha Stewart’s dessert line, and listening to country
    music legends like Dolly Parton and modern artists such as Luke Bryan, while they also binge‑watch animated series by Matt Groening for artistic inspiration.
  travel: Jennifer Benson prefers spontaneous road trips that combine camping under the stars with quick visits to local fairs, has already explored Austin’s music scene and the National Ranching Heritage
    Center in Lubbock, and dreams of backpacking through the Grand Canyon and visiting the historic streets of Savannah during summer break, while they plan most outings on a loose itinerary rather than
    strict schedules.
  culinary: Jennifer Benson loves baking cupcakes flavored with vanilla bean, salted caramel, and red velvet, skillfully folds in fresh strawberries and dark chocolate chips, and often experiments with
    homemade buttercream frosting spiced with a pinch of cinnamon, balancing their amateur baking adventures with a fondness for classic barbecue ribs at family gatherings.
  core: Jennifer Benson is a horse‑loving, cupcake‑baking, mystery‑reading teen who balances practical problem‑solving with a laid‑back approach to schoolwork, while they often forget to floss but never
    miss a chance to volunteer at the animal shelter.
background:
  cultural: Jennifer was raised in Jacksboro, a small, close‑knit community in North Texas. Her family’s traditions blend classic Southern hospitality with a strong sense of Texas independence. She grew
    up attending a local Baptist church, participating in community events like the Jack County Fair, and embracing Texas customs such as country music, barbecues, and high‑school football gatherings. Her
    upbringing emphasizes family support, respect for the land, practical problem‑solving, and a love for community service.
attributes:
  skills: '[''Animal care'', ''Basic gardening'', ''Simple cooking/baking'', ''Microsoft Office (Word, PowerPoint)'', ''Elementary video editing (iMovie)'', ''Leadership in 4‑H club'', ''Teamwork in school
    band'', ''First‑aid basics'', ''Social media content creation'']'
  hobbies: '[''Horseback riding'', ''Dog walking and grooming'', ''Baking and cooking'', ''Reading mystery novels'', ''Drawing cartoons'', ''Playing Minecraft'', ''Hiking/camping'', ''Church youth choir'',
    ''Volunteering at animal shelter'']'
  career_goals: Jennifer aims to graduate high school with strong grades in science and stay involved in her 4‑H projects. She hopes to attend college to study veterinary medicine or animal science, eventually
    working as a veterinarian or a veterinary technician on a family farm. In the short term she wants to earn the 4‑H All‑American award, become a lead vocalist in her high school band, and grow her YouTube
    channel that focuses on pet‑care tips and easy recipes for teens.
