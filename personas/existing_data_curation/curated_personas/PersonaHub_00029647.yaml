persona_description: A professional engineer specializing in the design and installation of ventilation systems in commercial and industrial buildings, with a focus on ensuring safe and healthy air quality
  for occupants. They are skilled in the use of ventilation filters and have experience with various types of ventilation systems, including portable ventilation systems, local exhaust ventilation, and
  dilution ventilation systems. They are also familiar with the operation and maintenance of ventilation systems, and are able to troubleshoot and resolve issues related to air quality and safety. They
  may have a degree in mechanical engineering or a related field and may have experience working in a variety of industries, including healthcare, manufacturing, and energy.
