  hobbies: '[''Visiting art museums'', ''Attending cultural festivals'', ''Cooking Puerto Rican dishes'', ''Watercolor painting'', ''Knitting and quilting'', ''Gardening'', ''Reading historical fiction'',
    ''Storytelling circles'', ''Listening to traditional music'', ''Walking with friends'']'
  career_goals: Although retired, Rocio wishes to keep learning and sharing. She aims to mentor younger members of the Puerto Rican diaspora in Orlando through cooking workshops and storytelling circles,
    curate a modest exhibition of local senior artists, write and self‑publish a memoir of her migration journey, and maintain her health through gentle exercise and mindfulness practice. She also hopes
    to travel back to Puerto Rico for a family reunion and explore new artistic techniques such as watercolor painting.
