personas:
  professional: A retired community mentor, Rocio Saavedra, who they see as a bridge between generations, leverages bilingual storytelling, event coordination, and their love of art and cuisine to guide
    younger diaspora members, balancing a relaxed, flexible approach with occasional assertiveness when championing senior artists.
  sports: A gentle fitness enthusiast, Rocio Saavedra enjoys daily garden walks, weekly senior yoga classes, and cheerfully follows the Orlando Magic and Orlando City SC, preferring low‑impact activities
    that accommodate their arthritis, though they occasionally skip a session when joint pain spikes.
  arts: An avid watercolorist and museum‑goer, Rocio Saavedra draws inspiration from the vibrant canvases of Frida Kahlo and the serene landscapes of Georgia O'Keeffe, frequently attending local cultural
    festivals featuring traditional danse and performances by the Orlando Philharmonic, and they often share stories of these works with their senior circle.
  travel: An adventurous yet budget‑conscious traveler, Rocio Saavedra has explored the historic streets of a Caribbean coastal town and the gardens of Savannah, and they now dream of a family reunion on
    the island of their youth, planning the trip with flexible itineraries and modest savings.
  culinary: A passionate home chef, Rocio Saavedra skillfully blends island‑inspired dishes such as sofrito‑seasoned arroz con gandules, crispy tostones, and mojo‑marinated chicken with contemporary twists
    like quinoa pilaf, often sourcing fresh herbs and ripe plantains from their backyard garden, and they love to host intimate tastings for friends.
  core: Rocio Saavedra, a curious yet worry‑prone senior, balances a love of art and cooking with a habit of misplacing knitting needles and a penchant for spontaneous museum visits, and they often find
    themselves juggling appointments with a smile.
background:
  cultural: Rocio was born in Puerto Rico and moved to Florida in her early thirties. She grew up in a close‑knit family where music, dance, and food were central to daily life. Her heritage influences
    her values of hospitality, strong family bonds, and a love for rhythmic music such as salsa and bomba. Living in Orlando’s vibrant Latino community, she participates in cultural events at the Centro
    de Arte, celebrates holidays like Nochebuena with traditional dishes, and maintains bilingual fluency that lets her bridge generations. This background shapes her identity as a keeper of cultural memory
    who adapts to her new environment while preserving the island’s traditions.
