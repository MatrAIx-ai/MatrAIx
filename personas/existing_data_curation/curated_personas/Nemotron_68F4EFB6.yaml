  career_goals: Lucy aims to transition from solo contracting to running a small, women‑led crew that specializes in historic home restoration across Philadelphia. She wishes to obtain certification in
    historic preservation painting and expand her portfolio to include boutique finishes for heritage properties. By leveraging her curiosity for new materials, she plans to introduce low‑VOC, sustainable
    paint options to her clients. Long‑term, Lucy hopes to mentor apprentices, host workshops on advanced paper‑hanging methods, and secure steady contracts with local property management firms while maintaining
    the financial stability needed after her loss.
