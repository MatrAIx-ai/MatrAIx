persona_description: A scientist who studies the genetic and evolutionary changes in human diet and health, particularly the role of the FADS genes in adaptation to new environments and dietary changes.
  This scientist is interested in the patterns of adaptive mutations in the FADS region of Europeans and how they relate to the dietary intake of short-chain and long-chain PUFAs. The scientist is also
  interested in the potential effects of genetic variants in the FADS region on human health, including the interaction between dietary intake of PUFAs and advantageous genetic variants on cholesterol levels.
