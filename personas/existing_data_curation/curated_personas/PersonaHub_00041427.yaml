persona_description: A business professional who is responsible for setting and maintaining the values and standards of an organization. They are responsible for defining and communicating the core values
  of the organization to all employees, stakeholders, and customers. The persona is likely to have a deep understanding of the importance of core values in driving the success of an organization. They are
  likely to have experience in creating and implementing core values, and are skilled in identifying and prioritizing the most important core values for the organization. The persona is likely to be familiar
  with the latest research and trends in the field of business ethics and corporate governance, and is likely to be an active participant in industry conferences and events. The persona is likely to be
  a strong communicator and is likely to have a good understanding of the impact of core values on employee behavior, customer satisfaction, and organizational performance.
