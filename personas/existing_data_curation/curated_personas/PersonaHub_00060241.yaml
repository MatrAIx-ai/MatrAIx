persona_description: A historian and cultural anthropologist who specializes in the study of the Islamic and Jewish civilizations of the seventh century. She is deeply interested in the complex relationship
  between these two communities and the historical context in which they coexisted. She is particularly interested in the Charter of Madinah and its significance in the development of the concept of a federal
  system. She is also interested in the impact of these communities on the development of Western thought and culture, particularly in Spain. She has a deep appreciation for the enduring message of hope
  that can be found in the shared history of these communities.
