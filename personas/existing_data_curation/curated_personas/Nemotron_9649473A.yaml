  career_goals: Her career goal is to become the director of her childcare center and to spearhead a district-wide STEAM early-learning initiative. She plans to earn a master’s degree in early childhood
    education, mentor new staff, and advocate for policies that embed play-based STEM experiences in preschool settings. Stephanie also hopes to launch a community maker space, publish a guide on integrating
    art and technology into early education, and eventually work as a consultant supporting childcare programs across Wisconsin.
