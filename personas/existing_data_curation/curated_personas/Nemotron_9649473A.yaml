personas:
  professional: Stephanie Leon, a veteran early childhood educator with a STEM graduate background, designs inquiry‑based STEAM curricula for preschoolers while leveraging their knack for collaborative
    leadership and community‑focused values to mentor staff and champion district‑wide play‑based science initiatives.
  sports: Stephanie Leon, an avid cyclist with the Madison Cycling Club and a frequent hiker on the Ice Age Trail, roots for the Green Bay Packers in the fall, cheers the Milwaukee Bucks during the winter,
    and swears by weekend yoga sessions and community‑run 5K races to stay fit.
  arts: Stephanie Leon, a regular at the Madison Community Theatre's productions of classics like "Our Town" and a member of a swing‑dance troupe that rehearses to the sounds of Benny Goodman, spends weekend
    afternoons painting in the style of Wisconsin artist Kerry James Marshall and finds inspiration in the rotating exhibits at the Milwaukee Art Museum, especially works by contemporary painter Yayoi Kusama.
  travel: Stephanie Leon, who prefers meticulously planned road trips that balance cultural discovery with nature, has explored the historic streets of Edinburgh on a spring getaway, delights in weekend
    retreats to Door County’s lighthouse evenings, and dreams of a summer pilgrimage to Norway’s fjords, all while budgeting within the modest constraints of a public‑sector salary.
  culinary: Stephanie Leon, an enthusiastic home cook with a strong seasonal focus, whips up hearty beet and goat‑cheese salads for summer potlucks, perfects rustic apple‑cinnamon crumble using locally
    sourced heirloom apples, and delights in experimenting with smoked paprika‑glazed chicken, though they consistently over‑salt their soups when the podcast they’re listening to gets especially exciting.
  core: Stephanie Leon blends a Midwestern work ethic with a boundless curiosity for art and science, leading early‑learning teams while secretly hoarding craft glitter in a kitchen drawer and caffeinating
    through late‑night science podcasts.
background:
  cultural: Stephanie is a native of Middleton, Wisconsin, from a Midwestern white heritage with family roots in German and Scandinavian immigrants who settled in Dane County in the late 1800s. She grew
    up in a close-knit community where Lutheran values, a strong work ethic, and a tradition of volunteerism were emphasized. The region’s focus on public education, community support, and seasonal celebrations
    such as county fairs and dairy-farm events shaped her commitment to inclusive, collaborative learning environments.
