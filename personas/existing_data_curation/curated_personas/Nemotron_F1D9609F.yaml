  hobbies: '[''Sketching and digital illustration'', ''Playing acoustic guitar'', ''Listening to indie and alternative music'', ''Exploring street art and murals in Manchester'', ''Casual skateboarding'',
    ''Hiking in the nearby White Mountains'', ''Photography of urban and natural scenes'', ''Reading graphic novels'']'
  career_goals: William aspires to turn his passion for visual storytelling into a sustainable career. He aims to pursue a community‑college program or apprenticeship in graphic design or illustration,
    eventually working as a freelance artist, a junior designer at a local studio, or a creator of digital content for indie game projects. He also envisions launching an online shop for prints and custom
    artwork, valuing a flexible schedule that allows him to continue exploring new artistic mediums and community art initiatives.
