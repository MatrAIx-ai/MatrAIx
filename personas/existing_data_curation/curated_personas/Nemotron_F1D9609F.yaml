personas:
  professional: William Vaden, an aspiring freelance visual storyteller, leverages their self-taught digital illustration, sketching, and photography abilities to craft quirky brand identities and narrative
    graphics, and they often thrive on last-minute inspiration thanks to their curious, flexible nature, even if their workspace sometimes resembles organized chaos.
  sports: William Vaden, who spends weekends skateboarding at the local Moth Street skate park and hiking the White Mountains in summer, balances their low-key fitness routine with avid support for Manchester
    United and occasional pick-up football matches with friends, yet they often skip scheduled workouts in favor of impromptu photo walks.
  arts: William Vaden, an avid sketcher and photographer, channels the bold lines of Loish, the atmospheric compositions of Hayao Miyazaki, and the raw lyrics of Arctic Monkeys and Phoebe Bridgers into
    their acoustic-guitar sessions and open-mic performances, and they frequently experiment with mixed media during street-art tours and at the Manchester International Festival to stay immersed in contemporary
    culture.
  travel: William Vaden, who prefers spontaneous weekend getaways over meticulously planned trips, has already explored the Lake District and Berlin's vibrant street-art scene, dreams of a winter photography
    expedition to Reykjavik, and often improvises travel itineraries around a limited teen budget and school schedules, which they balance with after-school responsibilities.
  culinary: William Vaden, a modest home-cook, enjoys whipping up quick avocado toast, spaghetti carbonara, and homemade pizza topped with fresh basil, garlic, and mozzarella, while also savoring Manchester's
    fish-and-chips stalls and occasionally indulging in late-night ramen from a nearby take-out joint, though they sometimes skip grocery shopping until the last minute, resulting in a pantry that runs
    low on fresh produce.
  core: William Vaden blends a restless creative curiosity with a laid-back, sometimes disorganized approach, channeling spontaneous art projects and impromptu skate sessions into a flexible yet occasionally
    chaotic teenage life, which they navigate with a keen eye for visual storytelling.
background:
  cultural: William was raised in Manchester, New Hampshire, a working‑class, predominantly white New England community with deep roots in the region’s manufacturing history. His family’s background reflects
    the area’s traditional values of hard work and community solidarity, while his upbringing was shaped by local public schools, youth programs, and the growing arts scene that blends historic preservation
    with contemporary creative expression. He participates in neighbourhood art festivals, values seasonal New England traditions, and draws inspiration from the blend of rural landscapes and urban revitalization
    that characterises his hometown.
attributes:
  skills: '[''Digital illustration (using free software like GIMP and Krita)'', ''Hand‑drawing and sketching'', ''Basic photo editing'', ''Creative writing (short stories and poetry)'', ''Social media content
