    Acting'',''Local Sports Watching'']'
  career_goals: Looking ahead, Gregory aims to transition into a supervisory role where he can shape warehouse procedures and coach younger staff. He plans to obtain a Certified in Production and Inventory
    Management (CPIM) credential to bolster his credentials. While he remains mindful of the physical demands of his current position, he is eager to take on a logistics coordinator role that leverages
    his organizational talent and reduces on‑floor strain. His competitive nature fuels a goal of achieving the top safety and efficiency scores for his shift. Ultimately, Gregory hopes to secure a stable
    retirement fund while leaving a legacy of streamlined operations and a well‑trained team.
