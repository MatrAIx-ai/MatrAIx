  hobbies: '["Visiting contemporary art galleries and museums", "Attending live jazz and blues performances", "Playing the piano", "Reading contemporary fiction and poetry", "Cooking creative dishes that
    blend Southern and Caribbean flavors", "Gardening native Florida plants", "Swimming at local community pools", "Volunteering for mental health outreach in community centers", "Participating in community
    theater", "Traveling to cultural festivals"]'
  career_goals: Looking ahead, Keith aims to expand his private practice into a community‑focused mental‑health hub that offers integrated art‑therapy programs for underserved populations, especially older
    African‑American adults. He plans to develop a mentorship pipeline for early‑career psychologists, author a book that explores the intersection of creativity and mental health, and regularly contribute
    to local media to destigmatize therapy. He also seeks to collaborate with local arts organizations and city officials to advocate for policies that increase access to culturally responsive mental‑health
    services. Ultimately, he hopes to leave a lasting legacy of compassionate, innovative care that bridges psychology and the arts.
