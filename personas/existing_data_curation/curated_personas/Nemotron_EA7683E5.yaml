personas:
  professional: A seasoned psychologist, Keith Wilson leverages three decades of clinical expertise and a love of the arts to blend cognitive‑behavioral, psychodynamic, and humanistic therapies with music
    and visual‑art interventions, regularly speaking at community workshops and steering his private practice toward a culturally responsive mental‑health hub for underserved seniors.
  sports: An active senior athlete, Keith Wilson swims laps at his community pool three times a week, participates in a weekly pickleball league at the South Florida Senior Fitness Club, and proudly cheers
    for the Miami Heat and the Miami Marlins, while also enjoying occasional beach volleyball with friends during the winter months.
  arts: A lifelong arts enthusiast, Keith Wilson frequents contemporary galleries showcasing artists like Kehinde Wiley and Julie Mehretu, attends live performances by the New York Jazz Orchestra featuring
    Miles Davis tributes, plays piano in informal jam sessions of standards by Nina Simmons and B.B. King, and acts both onstage and behind the scenes in a local community‑theater troupe that stages classics
    such as "A Raisin in the Sun."
  travel: A culturally curious traveler, Keith Wilson delights in weekend getaways to the New Orleans Jazz & Heritage Festival, explores Caribbean culinary fairs in Miami, and plans a dream trip to the
    Edinburgh Fringe to experience avant‑garde theater, all while balancing travel costs with his modest retirement budget.
  culinary: A culinary experimenter, Keith Wilson blends Southern comfort with Caribbean zest, regularly preparing dishes like shrimp and grits with coconut‑curry broth, jerk‑spiced chicken served over
    collard‑green‑and‑callaloo sauté, and sweet‑potato‑and‑plantain pies, often seasoning with Scotch bonnet peppers and fresh thyme to achieve bold, layered flavors.
  core: Keith Wilson is a talkative, curiosity‑driven psychologist who channels his love of jazz, art, and community service into an integrated practice, while juggling mild health concerns, disciplined
    finances, and a penchant for experimental cooking and weekend travel.
background:
  cultural: Born and raised in the South, Keith is a first‑generation African‑American who grew up in a close‑knit, church‑centered community in Florida. His family’s narrative is rooted in the Great Migration
    and the civil‑rights era, instilling in him a strong sense of resilience, social justice, and communal responsibility. He embraces a rich cultural tapestry that includes Southern culinary traditions,
    gospel and jazz music, and storytelling passed down through generations. This heritage informs his deep empathy for marginalized clients and fuels his commitment to culturally responsive mental‑health
    care. Keith also celebrates Caribbean influences prevalent in Broward County, integrating those rhythms and flavors into his personal and professional life.
attributes:
  skills: '["Clinical assessment & diagnosis", "Cognitive-behavioral therapy (CBT)", "Psychodynamic therapy", "Humanistic & person-centered counseling", "Group therapy facilitation", "Crisis intervention
