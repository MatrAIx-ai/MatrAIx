persona_description: A researcher in the field of neuroscience who specializes in studying the molecular mechanisms underlying multiple sclerosis (MS). The researcher has a deep interest in the role of
  leukocytes in the disease process and has developed a molecular switch called EMMPRIN that plays a significant role in MS. The researcher has published groundbreaking findings on how EMMPRIN affects MMPs
  and the entry of leukocytes into the CNS to result in disease activity. The research is funded by the Canadian Institutes of Health Research and the MS Society of Canada. The researcher has a unique perspective
  on the disease process and has identified a new factor that can serve as a potential target of MS therapeutics.
