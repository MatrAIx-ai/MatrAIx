personas:
  professional: Susan Liu, a 34‑year‑old library services specialist, leverages her methodical curriculum design and data‑driven needs assessments to create structured literacy programs while her competitive
    edge drives her to secure grant funding and push innovative makerspace initiatives.
  sports: Susan Liu competes in a co‑ed volleyball league with the Watchung Warriors, hikes the Watchung Mountains every weekend with the local Trails Club, and avidly follows the New York Giants, Yankees,
    and Knicks, combining rigorous training plans on Strava with a competitive drive to improve her spike and endurance.
  arts: Susan Liu volunteers as a stage manager for community theater productions, discusses contemporary diverse literature in her Morristown book club featuring authors like Chimamanda Adichie and Ocean
    Vuong, and regularly attends live performances by Hozier and The National, allowing the arts to fuel her creative program design.
  travel: Susan Liu plans weekend hikes with meticulous itineraries, enjoys annual trips to New York City’s museums and culinary districts, and aspires to explore Kyoto’s markets to deepen her international
    cooking repertoire, balancing budget constraints with a desire for cultural immersion.
  culinary: Susan Liu experiments with Thai green curry, Ethiopian injera, and Korean bibimbap, often sourcing lemongrass, gochujang, and harissa at local farmers’ markets, and while her cooking skill is
    solid enough for dinner parties, she occasionally over‑spices dishes in her enthusiasm to impress.
  core: Susan Liu is a methodical, socially energetic library professional whose competitive streak fuels her drive for innovative literacy projects, yet she occasionally over‑commits to group activities,
    neglects self‑care, and lives on a steady stream of coffee and concert tickets.
background:
  cultural: Raised in a suburban New Jersey environment, Susan’s cultural background reflects mainstream American middle‑class values that prioritize education, community involvement, and civic participation.
    She celebrates traditional holidays such as Thanksgiving, Independence Day, and seasonal festivals, while also embracing the diverse cultural programming of her local public libraries. The Northeast’s
    strong emphasis on public libraries and academic achievement shaped her professional ethos, and she actively promotes inclusive, multicultural perspectives in her work and personal life.
attributes:
  skills: '[''Curriculum Development'', ''Instructional Technology Integration'', ''Library Management'', ''Information Literacy Instruction'', ''Cataloging and Metadata'', ''Data-Driven Assessment'', ''Workshop
    Facilitation'', ''Grant Writing'', ''Public Speaking'', ''Project Coordination'']'
  hobbies: '[''Co‑ed volleyball'', ''Book club'', ''Hiking'', ''Cooking international cuisine'', ''Community theater'', ''Live music concerts'', ''Mentoring in after‑school programs'', ''Organizing literacy
    events'']'
  career_goals: Susan aims to deepen her expertise by completing a Master of Library and Information Science within the next two years, positioning herself for a senior leadership role such as Library Director
    or District Education Coordinator. She envisions creating an innovative makerspace that bridges technology and literacy, securing competitive grant funding to expand community outreach, and leading
    district‑wide professional development on digital learning strategies. Long‑term, she aspires to influence policy on equitable access to information resources and become a recognized advocate for integrating
    evidence‑based practices in education and library services.
