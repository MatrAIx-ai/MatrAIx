  hobbies: '[''sketching'', ''digital illustration'', ''writing short stories'', ''reading sci‑fi/fantasy novels'', ''playing indie video games'', ''drama club'', ''salsa dancing'', ''community art workshops'']'
  career_goals: Melissa dreams of earning a spot in a specialized arts high school and building a compelling portfolio that lands her a scholarship to a top art college. She aspires to become a concept
    artist for video games or animated films, where she can merge her love for imagination, storytelling, and visual design. In the longer term, she hopes to lead creative teams, win national art competitions,
    and eventually illustrate her own graphic novel series that reflects both contemporary fantasy and her cultural heritage.
