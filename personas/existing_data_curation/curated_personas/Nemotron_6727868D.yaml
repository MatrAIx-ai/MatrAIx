personas:
  professional: Melissa Mariscal, a 14‑year‑old aspiring comic creator, blends hand‑sketched character designs with digital storytelling on a tablet, often improvising plot twists during after‑school drama
    club rehearsals, but frequently stalls on deadlines because their spontaneous workflow clashes with required structure.
  sports: Melissa Mariscal channels their energetic spirit into salsa dancing classes on Saturdays, cheers for the local youth soccer club—the Tigers—while also following the NBA’s Golden State Warriors,
    and occasionally joins a school intramural basketball game, though they prefer the rhythmic footwork of dance over competitive sports.
  arts: Melissa Mariscal’s artistic identity is shaped by a love for graphic novels like "Saga" and "Monstress," a habit of sketching manga‑style heroes between classes, a deep appreciation for indie game
    soundtracks such as "Celeste" and "Hollow Knight," and a weekly habit of attending community art workshops where they swap techniques with peers, often pulling all‑nighters to refine a comic panel.
  travel: Melissa Mariscal dreams of visiting the bustling streets of Tokyo to explore Akihabara’s manga shops and attend a traditional lantern festival, while also planning a road‑trip to the nearby mountain
    town’s cultural fair that showcases folk dances and food stalls, yet their travel plans are limited by school schedules and a modest family budget, leading them to prioritize day‑trips over overseas
    travel for now.
  culinary: Melissa Mariscal favors bold, colorful meals like tacos al pastor with fresh cilantro and lime, loves experimenting with homemade guacamole, and often orders sushi rolls featuring avocado and
    spicy mayo after marathon gaming sessions, yet they sometimes neglect regular meals, grabbing convenience snacks like cheese‑filled pretzels while sketching.
  core: Energetic, imagination‑driven teen Melissa Mariscal channels boundless creativity into comics, improv, and salsa, juggling spontaneous bursts of artistic brilliance with a habit of procrastinating
    deadlines and impulsive spending.
background:
  cultural: Melissa is a Mexican‑American who grew up in Missouri City, Texas, in a bilingual household where Spanish and English flow interchangeably. Her family celebrates Mexican traditions such as Día
    de los Muertos, quinceañeras, and lively holiday gatherings with tamales, pozole, and mariachi music. These cultural experiences inform her artistic style, often incorporating vibrant colors and folkloric
    motifs. While she embraces the suburban Texan teen lifestyle—social media, school clubs, and group sports—she stays connected to her heritage through community events at local cultural centers and by
    helping younger kids learn Spanish through art.
attributes:
