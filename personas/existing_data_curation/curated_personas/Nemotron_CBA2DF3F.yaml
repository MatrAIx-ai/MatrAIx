personas:
  professional: Donald Lettieri is a fast‑food operations specialist who leverages eight years of front‑line experience, ServSafe certification, and emerging graphic‑design skills to streamline service,
    craft eye‑catching promotional materials, and mentor teammates, while they apply their methodical, organized nature and assertive yet compassionate leadership style to pursue a path toward shift‑manager
    and eventual café ownership.
  sports: Donald Lettieri is a fan of the Kansas City Chiefs and the Kansas City Royals, joins a local bike‑club called River Valley Riders for weekend trail rides, and occasionally shoots hoops at the
    community center, preferring low‑impact fitness that fits their busy schedule.
  arts: Donald Lettieri is a regular visitor to the Nelson‑Atkins Museum of Art, draws inspiration from the brushwork of Vincent van Gogh, the bold graphics of Shepard Fairey, and the portraiture of Annie
    Leibovitz, and they channel these influences into sketchbooks and food‑styling photography that double as a personal creative outlet.
  travel: Donald Lettieri enjoys planning short, budget‑friendly road trips to nearby towns like Lawrence, Kansas and the Ozark National Forest, while dreaming of a longer cultural immersion in Kyoto, Japan,
    balancing spontaneous bike‑friendly adventures with the financial constraints of saving for a home.
  culinary: Donald Lettieri loves experimenting with international dishes such as ramen with miso‑glazed pork, shakshuka with harissa‑spiced tomatoes, and Korean bibimbap featuring gochujang, adapting these
    recipes to their family's palate with fresh cilantro, Thai basil, and locally sourced ingredients, and they consider themselves an intermediate home chef who takes pride in plating as much as flavor.
  core: Donald Lettieri is a methodical fast‑food veteran with a secret passion for art and cooking, who balances meticulous budgeting with occasional splurges on creative projects, and who quietly battles
    mild hypertension while chasing the dream of a café that doubles as a gallery.
background:
  cultural: Donald was raised in the Kansas City metropolitan area, specifically the suburban community of Olathe in Johnson County, a region characterized by a blend of agricultural roots and modern suburban
    development. As a white Midwestern American, his upbringing emphasized values such as reliability, modesty, self‑reliance, and a strong sense of community responsibility. He grew up attending local
    public schools, participating in neighborhood events, and supporting high‑school sports teams, all hallmarks of Midwestern culture. Although the area is known for its practical sensibilities, the proximity
    to Kansas City has exposed him to a growing arts scene, which nurtured his curiosity about visual arts and creative expression. This mix of traditional Midwestern work ethic with an emerging appreciation
    for cultural experiences shapes his outlook on life and his personal aspirations.
attributes:
  skills: '[''Food Preparation'', ''Food Safety (ServSafe Certified)'', ''Cash Handling'', ''POS System Operation'', ''Inventory Management'', ''Shift Scheduling'', ''Team Coordination'', ''Customer Service'',
    ''Problem Solving Under Pressure'', ''Basic Graphic Design (Adobe Photoshop)'', ''Photography (Food & Portrait)'', ''Microsoft Office Proficiency'']'
  hobbies: '[''Sketching and Drawing'', ''Food Photography'', ''Visiting Local Art Galleries'', ''Reading Science Fiction & Fantasy'', ''Playing Tabletop Board Games'', ''Experimenting with Home Cooking'',
    ''Listening to Culinary and Tech Podcasts'', ''Community Volunteer Work (Food Bank)'', ''Cycling on Local Trails'', ''DIY Woodworking'']'
  career_goals: Donald aims to advance from his current fast‑food counter role into supervisory and management positions. In the next three to five years he plans to become a shift manager, then a restaurant
    manager, and ultimately pursue ownership of a small café that blends his interest in food service with local art displays. To support this trajectory he intends to enroll in a hospitality‑management
    certificate program at a nearby community college and obtain additional certifications in food safety and operations. Financial stability for his family is a core motivator, so he also seeks to purchase
    a home in Olatre and build a modest savings plan. Parallel to his restaurant ambitions, Donald hopes to freelance as a graphic‑design and photography contributor for local businesses, using his artistic
    skills to generate supplemental income and further develop his creative portfolio.
