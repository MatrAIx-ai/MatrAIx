personas:
  professional: Maria Ayala, a meticulous licensed practical nurse with a STEM background, excels at medication administration, wound care, and chronic disease management, channeling their love for routine
    and systematic improvement into developing standardized workflows and mentoring junior staff.
  sports: Maria Ayala joins the Clark County Senior Walkers group for daily park strolls and tunes into the Las Vegas Raiders' football games on Sundays, while occasionally cheering for the Vegas Golden
    Knights during the hockey season.
  arts: Maria Ayala unwinds by stitching intricate quilts while listening to the classic ballads of Vicente Fernández, and they devour historical novels by Isabel Allende and classic films starring Dolores
    del Río during quiet evenings.
  travel: Maria Ayala enjoys weekend trips to Red Rock Canyon, day trips to the Grand Canyon, and dreams of exploring Oaxaca's culinary scene and the historic streets of Seville, balancing local adventures
    with long‑term travel aspirations.
  culinary: Maria Ayala excels at cooking traditional dishes, perfecting tamales with masa harina and pork filling, layering mole with chilies, chocolate, and spices, while also growing fresh chilies and
    herbs for their recipes, though they occasionally over‑salt due to their meticulous taste testing.
  core: Maria Ayala is a methodical caregiver who blends routine with creativity—gardening, quilting, and perfecting flavorful cuisine—while maintaining a calm, competitive edge and a strict personal budget.
background:
  cultural: Maria is a first‑generation Mexican‑American who grew up in a close‑knit family that emphasized familismo, respeto, and strong work ethic. Bilingual in Spanish and English, she retains deep
    ties to Mexican customs, celebrating Día de los Muertos, Cinco de Mayo, and family holidays with traditional foods and music. Her Catholic faith influences her community involvement and the value she
    places on service. Maria’s cultural identity informs her nursing practice, as she prioritizes culturally competent care, especially for Spanish‑speaking patients, and often integrates culturally relevant
    health education into her work. Living in Vancouver, WA, she balances her Mexican heritage with the Pacific Northwest lifestyle, contributing to a multicultural perspective in both her personal and
    professional life.
attributes:
  skills: '[''Medication administration'', ''Advanced wound care'', ''Chronic disease management'', ''Bilingual patient education (English/Spanish)'', ''Accurate patient assessment and vital sign monitoring'',
    ''Infection control compliance'', ''Quality improvement and protocol development'', ''Data documentation and health record management'', ''Workflow optimization and process improvement'', ''Mentoring
    and supervision of nursing assistants'', ''Certified Wound Care Nurse (CWSN) certification'']'
  hobbies: '[''Vegetable gardening'', ''Traditional Mexican cooking (tamales, mole, salsas)'', ''Quilting and needlework'', ''Reading historical novels and Mexican literature'', ''Volunteering at community
    health fairs (bilingual health education)'', ''Church charitable food drive participation'', ''Morning walks in local parks'', ''Crossword puzzles'', ''Listening to ranchera and mariachi music'']'
  career_goals: Maria aims to transition to a Registered Nurse role by completing an RN bridge program, leveraging her STEM background to specialize in geriatric and community health nursing. She aspires
    to become a charge nurse or nurse manager, where she can implement systematic improvements that enhance patient safety and staff performance. Additionally, Maria plans to earn advanced certifications
    in gerontology and wound care, positioning herself as a subject‑matter expert. Long‑term, she envisions establishing a bilingual health‑education outreach program in Clark County to serve the Mexican‑American
    community, combining her clinical expertise with her cultural ties.
