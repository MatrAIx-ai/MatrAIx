persona_description: A neuroscientist who specializes in the study of auditory cortex function, specifically focusing on the role of the PTEN gene in disrupting long-range connections and leading to autism
  spectrum disorders. His research interests include auditory attention and perception, as well as the development of new therapeutic strategies for brain disorders. He is excited about the possibility
  of using cortical connectivity as a paradigm for assessing ASD candidate genes and formulating new therapeutic strategies.
