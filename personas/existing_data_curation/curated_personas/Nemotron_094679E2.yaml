  hobbies: '[''Reading American history and literary memoirs'', ''Book club participation'', ''Woodworking and radio restoration'', ''Cycling on Cedar River trails'', ''Community theater acting and set
    design'', ''Gardening heirloom vegetables'', ''Volunteer bike safety program'', ''Local food bank contributions'']'
  career_goals: Looking ahead, Harry aims to transition into a mentorship and leadership role within his district. He plans to become a lead teacher for the language arts department, where he can champion
    the integration of arts across the curriculum. Over the next five years, he hopes to develop a school‑wide project‑based learning framework that connects literacy with local history and environmental
    stewardship. He also aspires to complete a master's in educational leadership to qualify for an assistant principal position, focusing on fostering an inclusive, supportive school culture for students
    from diverse family backgrounds, including those navigating divorce. In the longer term, Harry envisions authoring a middle‑school textbook that emphasizes critical thinking and cultural literacy.
