personas:
  professional: Laurine Voorhies, a retired senior center art instructor and community garden organizer, channels their methodical planning and deep appreciation for visual arts into curating local exhibitions
    and mentoring younger seniors, while they competitively push for state-level garden design awards.
  sports: Laurine Voorhies enjoys low-impact walking along the Spokane River corridor, follows the Spokane Indians baseball team and the Seattle Seahawks football team, and they participate in a senior
    softball league each summer, balancing seasonal activity with a gentle exercise routine.
  arts: Laurine Voorhies regularly attends the Northwest Museum of Arts and Culture to study works by Claude Monet, Emily Carr, and local watercolorists, enjoys theater productions such as 'Our Town' at
    the local playhouse, and they spend evenings listening to John Coltrane’s jazz and Ludwig van Beethoven’s symphonies, all of which enrich their artistic identity.
  travel: Laurine Voorhies prefers short, well-planned day trips, frequently visiting Riverfront Park, the Palouse hills, and taking weekend getaways to Coeur d’Alene and the San Juan Islands for photography
    walks, and they favor relaxed exploration over exhaustive travel itineraries due to budget considerations and energy levels.
  culinary: Laurine Voorhies delights in seasonal cooking, often preparing wild-berry crumble, salmon with dill, and heirloom tomato stew, while they expertly preserve garden herbs into peppery pesto and
    use locally harvested hazelnuts, sage, and apples to craft comforting family dishes.
  core: Laurine Voorhies merges a keen eye for art with a meticulous garden planner’s mind, and they juggle competitive garden awards, lingering worry about finances, and a heart full of jazz and vintage
    literature.
background:
  cultural: Laurine is a white American whose ancestry traces back to Dutch immigrants who settled in the Midwest before her family moved to Spokane in the early 20th century. Born in the late 1930s, she
    grew up during the post-World War II era, absorbing the era’s values of self-reliance, civic duty, and community participation that remain strong in the Pacific Northwest. Her upbringing in Spokane
    exposed her to both mainstream American traditions—such as holiday gatherings and community potlucks—and the region’s distinctive appreciation for the natural environment and indigenous art. These influences
    shaped her respect for local history, love of native plant gardening, and curiosity about the cultural heritage of the Spokane area, while her Dutch roots fostered an appreciation for storytelling,
    family recipes, and a disciplined work ethic. Together, these cultural strands inform her artistic interests, community engagement, and commitment to preserving family legacy.
