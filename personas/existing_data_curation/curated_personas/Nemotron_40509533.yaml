  hobbies: '[''Fishing'', ''Woodworking'', ''Watching baseball'', ''Classic rock music'', ''Reading historical non-fiction'', ''Walking/hiking'', ''Cooking simple meals'', ''Community trivia nights'']'
  career_goals: Neal aims to earn his ASCP certification within the next year and transition into a lead technologist or quality assurance supervisory role at his hospital laboratory. He is interested in
    expanding his knowledge of molecular diagnostics and hopes to spearhead a small pilot program for rapid PCR testing. As he approaches retirement age, he plans to negotiate a reduced‑hour schedule that
    allows him to maintain a stable income while lowering stress. Additionally, Neal wants to formalize a mentorship program for junior staff, leveraging his experience to improve team performance and job
    satisfaction.
