personas:
  professional: Henson Davis, a retired art educator and community arts coordinator, leverages his deep grounding in art history and philosophical analysis to design interdisciplinary workshops that blend
    sustainability, creative writing, and hands‑on painting, reflecting his imaginative curiosity and balanced reliability.
  sports: Henson Davis embraces low‑impact fitness through weekly hikes on the Willamette River Trail, birdwatching excursions, participation in the Eugene Senior Walking Club, and occasional kayaking on
    the lake, while cheering for the Oregon Ducks football team, the Portland Timbers soccer club, and occasionally attending a Portland Trail Blazers game.
  arts: Henson Davis is a prolific watercolor painter, poet, and photographer who frequents Eugene’s independent film screenings and the local theater, draws inspiration from Ansel Adams, The Decemberists,
    and Oregon poet Terri Jean, and volunteers as a mentor in community art workshops, infusing each project with a blend of abstract expression and ecological consciousness.
  travel: Henson Davis favors eco‑conscious slow travel, often taking the Amtrak Cascades to explore the Oregon Coast, the Columbia River Gorge, and day‑trips to Seattle and San Francisco, while dreaming
    of photographing Iceland’s volcanic landscapes and planning a future pilgrimage to the historic castles of the Loire Valley.
  culinary: Henson Davis, an avid home baker, delights in crafting sourdough loaves, wild mushroom risotto, and seasonal raspberry‑lavender jam using fresh produce from his organic garden, relishes farm‑to‑table
    meals at The Farm Café, and occasionally over‑saturates dishes with extra cinnamon, a quirk that delights guests.
  core: Henson Davis is a 71‑year‑old retired art educator who weaves sustainability, poetry, and community mentorship into a vibrant, slightly eccentric tapestry of lifelong creativity.
background:
  cultural: 'Born into a white, middle‑class family in the Pacific Northwest, Henson grew up during the social upheavals of the 1960s and 1970s. The era’s countercultural spirit, environmental activism,
    and vibrant arts scene shaped his values: progressive, secular, and deeply committed to sustainability. Living in Eugene, Oregon—a city renowned for its strong artistic community and ecological consciousness—has
    reinforced his appreciation for local culture, collaborative creativity, and the blend of independence with community engagement.'
