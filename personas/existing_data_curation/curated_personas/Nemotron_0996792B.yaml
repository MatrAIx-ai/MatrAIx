  hobbies: '[''Watercolor and abstract painting'', ''Poetry and short story writing'', ''Birdwatching'', ''Hiking and trail walking'', ''Reading philosophy and speculative fiction'', ''Attending theater
    and independent film screenings'', ''Playing piano'', ''Organic gardening'', ''Digital photography'', ''Participating in community art workshops'']'
  career_goals: Even in retirement, Henson seeks to leave a creative legacy. He aims to publish a personal anthology of poems and paintings that explore the natural and abstract world of the Pacific Northwest,
    curate a community exhibition of local artists, produce a short documentary on Eugene’s countercultural art history, and mentor emerging creators through free workshops at the community center. He also
    plans to establish a small scholarship for art students and continue lifelong learning in contemporary philosophy and digital media, all while maintaining a sustainable garden that serves as both a
    personal sanctuary and educational space.
