    and mentorship'', ''Use of personal protective equipment (PPE)'']'
  hobbies: '[''Church fellowship and choir'', ''Gardening (vegetable patch)'', ''Weekly bingo night'', ''Dancing to country music'', ''Cooking Southern comfort meals'', ''Reading romance novels'', ''Watching
    classic TV sitcoms'', ''Fishing trips with family'']'
  career_goals: Judy aims to leverage her extensive hands‑on experience into a supervisory role within facility management. She is pursuing a certification as a Certified Professional Cleaner (CPC) and
    plans to enroll in a short‑term course on facilities operations to qualify for a lead janitor or building maintenance coordinator position at a larger institution, such as a school or hospital. Long‑term,
    she envisions starting her own residential and small‑business cleaning service, allowing her to set flexible schedules that align with her preference for routine while also using her outgoing personality
    to build a loyal client base. Financial stability and the ability to maintain independence after her divorce are key motivators behind her career ambitions.
