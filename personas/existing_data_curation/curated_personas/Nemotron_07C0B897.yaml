  career_goals: Gwendolyn dreams of turning her love for animals and the Gulf Coast environment into a future career as a marine biologist or veterinarian. She is determined to earn a scholarship that would
    let her study at a university with a strong marine science program, and she hopes to secure a sports scholarship through basketball. In the short term, she aims to win her middle school science fair,
    become captain of her basketball team, and maintain a high GPA to qualify for advanced STEM classes. She also aspires to be a role model for younger girls in her community, perhaps volunteering as a
    mentor in her church’s youth group and eventually working on outreach programs that connect local children with marine conservation.
