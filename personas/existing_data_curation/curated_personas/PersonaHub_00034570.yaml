persona_description: A researcher in the field of molecular electronics, particularly in the development of ultra-sensitive instruments for studying the conductance of single-molecule junctions. He is a
  post-doctoral researcher in Professor Nongjian Tao's research group at Arizona State University, and is the first author of a recent paper in Nanotechnology describing a novel conductance screening tool
  for molecules. His research focuses on identifying signals due to a single molecule covalently bound between two electrodes and performing statistical analysis of the results to take into account the
  affects of different contact geometries and molecular configurations.
