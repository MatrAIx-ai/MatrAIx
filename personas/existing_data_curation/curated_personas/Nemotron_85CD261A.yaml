  hobbies: '[''Hunting'', ''Target shooting'', ''Woodworking'', ''Fishing'', ''Engine tinkering'', ''Technical reading'', ''Gardening'', ''Competitive shooting'']'
  career_goals: Alan aims to formalize his practical abilities into a self‑employed trade business, offering automotive maintenance, woodworking, and home‑repair services to his community. He plans to earn
    a certification in HVAC or electrical work to broaden his service offerings, achieve financial independence, and eventually acquire a small parcel of land where he can run a self‑sustaining homestead
    that blends his mechanical skills with outdoor living.
