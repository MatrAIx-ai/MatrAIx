personas:
  professional: Alan Pickett is a hands‑on tradesperson who blends automotive repair, woodworking, and home‑maintenance expertise with a methodical, solitary work style, channeling his love of routine and
    competitive edge into a budding self‑employed service business.
  sports: Alan Pickett’s athletic interests revolve around seasonal hunting trips in the nearby woods, competitive target shooting at the county rifle club, and a steadfast loyalty to the local minor‑league
    baseball team, the River City Rangers, while they also follow the NFL’s Green Bay Packers for their disciplined play.
  arts: Alan Pickett finds artistic expression in hand‑carved furniture and classic literature, devouring works like Hemingway’s "The Old Man and the Sea" and listening to Johnny Cash and Bob Dylan on the
    porch, while they occasionally attend a regional folk music festival to connect with the heritage of acoustic storytelling.
  travel: Alan Pickett prefers solitary, low‑key road trips that blend work and leisure, itineraries that loop through familiar hunting grounds in the Texas Hill Country and occasional ventures to Yellowstone’s
    geysers, always planning routes on a paper map and camping in modest tent sites to keep expenses low.
  culinary: Alan Pickett’s culinary profile features a knack for season‑rich barbecue, regularly smoking brisket with a dry rub of paprika, brown sugar, and cracked pepper, cooking fresh‑caught trout on
    a campfire skillet with lemon and dill, and savoring hearty stews peppered with root vegetables like carrots and potatoes.
  core: Alan Pickett is a solitary, methodical craftsman who balances a disciplined work ethic with a competitive spark, often trading money‑saving precision for an occasional splurge on high‑quality tools,
    and occasionally neglects social calls in favor of tinkering in the garage.
background:
  cultural: Alan is a white male with French‑Canadian (Leblanc) ancestry raised in the Appalachian region of western North Carolina. The local culture emphasizes self‑reliance, practicality, and respect
    for the natural environment. Traditions such as hunting, forestry, and craftsmanship are deeply embedded in his community, shaping his values toward routine, hard work, and modest, hands‑on competence.
    While he prefers solitude, he carries the region's heritage of modesty, responsibility, and a strong work ethic.
attributes:
  skills: '[''Automotive repair'', ''Small engine maintenance'', ''Woodworking'', ''Basic carpentry'', ''Household electrical troubleshooting'', ''Computer troubleshooting'', ''Data entry'', ''Hunting and
