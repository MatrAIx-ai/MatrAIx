  hobbies: '[''Hiking'', ''Bowling league'', ''Bridge tournaments'', ''Quilting'', ''Gardening'', ''Volunteering at food pantry'', ''Community theater'', ''Bingo nights'', ''Walking group'']'
  career_goals: Betsy aspires to move into a supervisory role where she can lead a cleaning crew, develop and implement more efficient cleaning protocols, and mentor younger employees. She plans to complete
    a custodial management certification offered by a local community college and, with her husband, explore starting a small independent cleaning business focused on residential clients in the Williamsport
    area. Additionally, she hopes to be recognized for her contributions to workplace safety and to volunteer her expertise in community facilities such as the senior center and local church.
