personas:
  professional: Erin Seitz, a 28-year‑old pipefitter and steamfitter, combines meticulous blueprint reading, MIG/TIG welding, and trenchless repair expertise to lead crews with disciplined organization
    while they channel curiosity for green‑building innovations into assertive, safety‑first decision‑making.
  sports: Erin Seitz, 28, fuels fitness with CrossFit, weekend long‑distance runs, and mountain biking through the Shasta Hills as a member of the Shasta Mountain Bike Club, cheering the Sacramento Kings
    in basketball season and the San Francisco 49ers in football, while they also join the Lassen Trails Running Club for early‑morning trail races.
  arts: Erin Seitz, 28, channels outgoing energy into acoustic guitar performances at neighborhood open‑mic nights covering folk classics by Bob Dylan and contemporary tunes by John Mayer, while winding
    down with science‑fiction novels from William Gibson, attending community theater shows starring local talent, and listening to indie artist Mitski for creative inspiration.
  travel: Erin Seitz, 28, balances project deadlines with adventure‑focused trips, meticulously planning hikes in Yosemite and kayaking on Lake Tahoe, having explored Iceland’s geothermal landscapes, dreaming
    of a cycling tour through New Zealand’s South Island, and staying budget‑aware by using reward points and off‑season bookings.
  culinary: Erin Seitz, 28, cooks with a practical yet experimental hand, mastering quinoa‑seed salads tossed with roasted sweet potatoes and feta, perfecting grilled salmon seasoned with rosemary, lemon,
    and smoked paprika, and indulging in a weekly sourdough pizza topped with fresh mozzarella, basil, and caramelized onions, while they occasionally treat themselves to a craft espresso from a local roastery.
  core: Erin Seitz, 28, blends disciplined pipefitting precision with a boundless love for the outdoors, but they tend to hoard power‑tool accessories and forget to water houseplants during busy project
    weeks.
background:
  cultural: Erin is a White woman raised in a working‑class family in the Redding area, where her father was a carpenter and her mother worked in the local school system. Growing up in Northern California,
    she absorbed a culture that values hard work, self‑reliance, and community cooperation. The region's strong outdoor ethos fostered her love of hiking, camping, and riverside recreation. While respecting
    traditional family values—she is married and plans to start a family—she embraces modern, egalitarian ideals, championing gender equity within the trades. Erin participates in local festivals such as
    Riverfest, supports her high school’s sports teams, and maintains close ties to her community’s emphasis on skilled labor and environmental stewardship.
attributes:
  skills: '[''Pipe welding (MIG/TIG)'', ''Brazing and soldering'', ''Pipe threading and cutting'', ''Blueprint and schematic interpretation'', ''California Plumbing Code compliance'', ''OSHA safety and
    hazard assessment'', ''Trenchless pipe repair techniques'', ''Steam system installation and maintenance'', ''Project scheduling and resource allocation'', ''Team leadership and apprentice mentorship'']'
  hobbies: '[''Hiking and backpacking in the Cascades'', ''Mountain biking'', ''Kayaking on the Sacramento River'', ''CrossFit and endurance running'', ''DIY home renovation and woodworking'', ''Volunteering
    with Girl Scouts (plumbing workshops)'', ''Playing acoustic guitar at community events'', ''Reading trade magazines and science‑fiction literature'']'
  career_goals: Erin aims to attain Master Pipefitter certification within the next three years and to specialize in trenchless technology and green‑building piping solutions. She plans to become a foreman
    overseeing large commercial and industrial projects throughout Shasta County and the broader Northern California region. Long‑term, she aspires to launch her own contracting firm focused on energy‑efficient
    heating, cooling, and water‑conservation systems, while also serving as an instructor for the local IBEW apprenticeship program to mentor the next generation of tradespeople, especially women entering
    the field.
