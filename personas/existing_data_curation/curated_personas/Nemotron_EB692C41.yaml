  hobbies: '["Traditional Mexican Cooking (tamales, pozole, mole)", "Acoustic Guitar Playing and Singing (ranchera, norteño)", "Gardening (heirloom tomatoes, chilies, nopales, native wildflowers)", "Attending
    Art Fairs and Museum Exhibitions", "Participating in Fiesta San Marcos and Local Cultural Festivals", "Reading (Mexican folklore, art history, biographies)", "Volunteer Work at Church (choir, event
    organization)", "Card Games (euchre, rummy) with friends", "Traveling to visit family in Mexico", "Bird‑watching (hummingbirds, sparrows)", "Storytelling Circle and Oral History Preservation"]'
  career_goals: Although retired from formal employment, Williams remains driven to contribute meaningfully to his community. He aims to formalize his oral‑history recordings into a small booklet to share
    with local schools and the San Marcos public library. He hopes to curate a traveling exhibit of Mexican‑American folk art that can be displayed at community centers and churches, showcasing both his
    own collection and works of local artisans. He is also eager to learn digital photography to document festivals and family gatherings, and to teach his grandchildren how to prepare classic family recipes.
    Maintaining his health so he can continue attending weekly dance nights, volunteer at the senior center, and lead a monthly storytelling circle are central to his personal ambitions.
