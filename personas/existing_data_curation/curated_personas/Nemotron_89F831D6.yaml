  hobbies: '[''Pickup basketball league'', ''Sunday bowling league'', ''Trivia nights at local breweries'', ''Hiking in Wharton State Forest'', ''Home‑brewing'', ''Volunteer youth soccer coaching'', ''Watching
    NFL (NY Giants)'', ''Reading business biographies'']'
  career_goals: Scott aims to leverage his supervisory experience into a store‑manager position within the next 12‑18 months, focusing on measurable improvements in sales performance and employee retention.
    Over the next 3‑5 years, he aspires to become a district manager, overseeing multiple locations across New Jersey, and to earn the Certified Retail Manager (CRM) credential. Long‑term, he envisions
    opening his own boutique retail concept that emphasizes locally sourced home goods, using his deep community ties in Burlington County and the practical skills he has honed in structured retail environments.
