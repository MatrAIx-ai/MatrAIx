personas:
  professional: An organized five‑year‑old kindergartner named Tanner Davis demonstrates a meticulous approach to building block projects, turning classroom activities into structured challenges, where
    their competitive drive and love for order make them the go‑to helper for arranging supplies and leading group clean‑up.
  sports: A competitive five‑year‑old named Tanner Davis plays forward on the Dittmer Lions youth soccer club, practices drills twice a week with a disciplined schedule, idolizes the St. Louis Cardinals
    and Kansas City Chiefs, and they channel their love of structure into meticulously aligning their soccer cleats before each game.
  arts: An imaginative five‑year‑old named Tanner Davis delights in drawing detailed pictures of farm scenes with Crayola crayons, sings along to Sesame Street’s Elmo and Raffi’s Baby Beluga, collects Disney
    soundtracks including "Let It Go", and participates in the church’s children’s choir, they often mimic the rhythm of local fiddlers.
  travel: A curious five‑year‑old named Tanner Davis enjoys highly planned family trips to the St. Louis Zoo and the Mark Twain National Forest, loves day‑long camping hikes at Camp Branson, and dreams
    of a future visit to Disneyland, they always carry a pocket‑sized itinerary checklist.
  culinary: A food‑enthusiastic five‑year‑old named Tanner Davis favors cheesy macaroni, chicken nuggets with honey‑mustard dip, sweet corn on the cob, and peanut butter‑jelly sandwiches, they proudly help
    stir pancake batter with a plastic whisk, and insist on arranging the dinner plates in a perfect line before eating.
  core: Tanner Davis, a disciplined five‑year‑old, they blend a love of structure, competitive curiosity, and calm resilience into every activity from school projects to saving allowance.
background:
  cultural: Tanner is raised in Dittmer, a small, largely white community in Washington County, Missouri. His family reflects typical Midwestern values of hard work, order, and community involvement, often
    attending local church events and participating in school and county fair activities. The rural setting emphasizes routine, practicality, and a close‑knit neighborhood, all of which shape Tanner’s preference
    for structure, discipline, and calm resilience.
attributes:
  skills: '[''Organizing toys'', ''Following daily routines'', ''Reading basic words'', ''Counting to 20'', ''Assembling simple LEGO sets'', ''Solving simple jigsaw puzzles'', ''Pattern recognition in games'']'
  hobbies: '[''Building LEGO'', ''Reading picture books'', ''Playing structured games'', ''Riding a tricycle on set routes'', ''Collecting and sorting stickers'', ''Doing simple puzzles'']'
  career_goals: Although still young, Tanner often talks about wanting to become a firefighter or a construction engineer because he admires the clear structure, teamwork, and tangible results of those
    jobs. He also dreams of being the best at building LEGO creations and hopes to win a local building contest someday.
