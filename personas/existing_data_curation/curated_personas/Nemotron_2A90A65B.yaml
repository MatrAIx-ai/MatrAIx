  hobbies: '["Reading African-American and historical fiction", "Community theater acting and set design", "Gardening native plants and culinary herbs", "Quilting and craft projects", "Attending gospel
    concerts and cultural festivals", "Participating in book clubs and storytelling circles", "Cooking soul food with experimental twists", "Volunteer tutoring and literacy programs", "Traveling to civil‑rights
    landmarks", "Hosting neighborhood potlucks"]'
  career_goals: Although retired from formal employment, Alayshia aims to channel her expertise into lasting community impact. She plans to launch a neighborhood oral‑history archive that preserves local
    African‑American narratives, partnering with the Fayetteville Public Library and nearby schools. She aspires to serve on the board of a regional arts council, advocating for greater funding for youth
    arts programs and cultural festivals. Additionally, she hopes to compile and self‑publish a collection of short stories and memoir excerpts that reflect her life experiences and the rich heritage of
    her community. Travel to historic civil‑rights sites across the South is also on her list, as she seeks to deepen her understanding of the broader cultural legacy she wishes to share with future generations.
