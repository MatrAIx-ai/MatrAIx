  hobbies: '["Building block towers", "Sorting puzzles", "Crayon drawing", "Listening to Spanish lullabies", "Kitchen helper (mixing batter)", "Picture book reading", "Quiet solitary play"]'
  career_goals: Even at three, Rosana imagines future roles where she can help others in practical ways. She often says she wants to become a teacher to share stories and teach children, a nurse or doctor
    to care for people, and sometimes a chef to make her family's favorite tacos. Her competitive streak makes her want to be the best at whatever she chooses.
