personas:
  professional: A junior librarian-in-training, Rosana Mercado spends hours arranging picture books by color and size on the preschool shelf, and they showcase an innate love for routine, organization,
    and methodical planning that hints at a future career as a librarian or educator.
  sports: Rosana Mercado enjoys the structured fun of the Show Low Kids Tee-Ball league and the weekly preschool soccer sessions with the local Cubs Jr. team, and they prefer the familiarity of playing
    with a small group of peers on a soft grass field under the shade of a cottonwood tree.
  arts: Rosana Mercado delights in the lively tunes of traditional mariachis that accompany family Día de los Muertos celebrations and sways to the catchy children's songs of The Wiggles and Sesame Street,
    and they often attempt to draw colorful scenes of sugar skulls and cartoon characters with thick crayons.
  travel: Rosana Mercado loves car trips to the nearby Apache-Sitgreaves National Forest where they explore gentle trails with a small backpack and their favorite plush armadillo, has visited the Petrified
    Forest National Park with grandparents, and dreams of strolling through the colorful streets of Oaxaca someday.
  culinary: Rosana Mercado savors soft cheese quesadillas with a mild salsa, giggles while helping mix chocolate chip pancake batter spiced with a pinch of cinnamon, and they enjoy the sweet tang of fresh
    watermelon chunks, often insisting on sprinkling a little shredded cheese on everything.
  core: Rosana Mercado thrives on routine, meticulously lines up stuffed animals before bedtime, can be stubbornly competitive during sandbox play, and they secretly collect extra crayons in a hidden drawer.
background:
  cultural: Rosana lives in Show Low, Arizona, in a home that honors her Mexican heritage. She hears traditional Mexican music, celebrates holidays like Día de los Muertos and Navidad with family, and speaks
    Spanish with her grandparents while also learning English at preschool. The blend of Mexican family values and the rural Southwest lifestyle shapes her love for routine, family-centered celebrations,
    and simple, practical activities.
attributes:
  skills: '["Fine motor coordination (block stacking)", "Sorting by color and shape", "Bilingual vocabulary (Spanish & English)", "Basic counting (1-10)", "Routine adherence", "Pattern recognition", "Puzzle
