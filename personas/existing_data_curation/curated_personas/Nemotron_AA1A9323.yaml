personas:
  professional: Chimene Love is a budding LEGO architect who reads adventure books for inspiration, applies a practical, structured mindset to complex builds, channels their competitive edge into weekly
    challenge tournaments, embraces the flexible, spontaneous play that keeps each project fresh, and they love sharing their creations with friends.
  sports: Chimene Love competes as a forward for the Little Strikers Soccer Club, proudly supports Manchester United during televised matches, treats weekend nature walks as active recovery—a habit they
    cherish—balancing a love for competition with an inquisitive eye for local bird species.
  arts: Chimene Love fills sketchbooks with scenes inspired by adventure novels and the animated worlds of Pixar’s 'Up' and 'Toy Story', dances to upbeat pop tracks by Billie Eilish in class, trades sticker
    albums featuring animal, sport, and cartoon themes, and they often lose track of time while drawing, letting music and visual art shape their creative identity.
  travel: Chimene Love has hiked the nearby state forest with family, dreams of camping under the stars in Yosemite National Park after reading about it in a picture guide, hopes to visit Tokyo’s Inokashira
    Park to see cherry blossoms with their school class, and they blend local exploration with global curiosity on every adventure.
  culinary: Chimene Love loves the cheesy stretch of homemade pizza topped with extra mozzarella, enjoys assembling fruit kebabs with apple slices, grapes, and banana chunks, can whisk together simple pancake
    batter, though they often forget the pinch of salt, and they proudly serve their creations to family and friends.
  core: Chimene Love is an eight‑year‑old who blends a love for structured LEGO challenges with spontaneous soccer games, meticulous sticker sorting, and they maintain a practical yet flexible approach
    to money, health, and adventure.
background:
  cultural: Chimene is an African‑American girl growing up in Darlington, South Carolina, where family, church, and community traditions shape her daily life. She attends a local elementary school and participates
    in after‑school programs at the neighborhood community center. Sundays are spent at a historically Black Baptist church, where she enjoys gospel music, Sunday school stories, and the close‑knit fellowship
    of the congregation. Family gatherings feature Southern comforts like fried chicken, collard greens, sweet tea, and cornbread, and seasonal events include Juneteenth celebrations, church picnics, and
    local festivals that highlight African‑American heritage. Her grandparents often share stories of the civil‑rights era, instilling pride in her cultural roots while encouraging her to pursue her own
    goals.
