  hobbies: '[''Adventure reading'', ''LEGO building'', ''Soccer'', ''Sticker collecting'', ''Tap dancing'', ''Puzzle solving'', ''Nature walks'']'
  career_goals: Chimene dreams of becoming a veterinarian because she loves animals and appreciates the clear routines of caring for them, from feeding schedules to health check‑ups. She also imagines herself
    as a professional soccer player or later a coach, channeling her competitive spirit and love for structured practice. In the longer term, she hopes to combine both interests by working with a community
    animal‑care program that teaches kids about pet health, giving her a practical way to help others while following a defined career path.
