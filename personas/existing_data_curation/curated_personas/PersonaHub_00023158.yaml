persona_description: A neuroscientist who studies the human brain and its functions, particularly the areas responsible for visual processing and spatial perception. The individual is interested in understanding
  the mechanisms behind selective attention and the neural basis of visual imagery. They use functional MRI to investigate how different visual stimuli elicit activity in different regions of the brain
  and how these regions are related to each other. The individual is likely to have expertise in the study of the inferior temporal cortex, parahippocampal place area, and the role of spatial frequency
  in visual processing. They are likely to have published research on the topic and have a keen interest in the intersection of neuroscience and visual perception.
