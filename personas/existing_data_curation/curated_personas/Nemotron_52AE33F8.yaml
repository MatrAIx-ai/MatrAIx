  career_goals: Joshua aims to progress to a senior full‑stack developer role within the next two years, focusing on performance‑critical applications and cloud‑native architectures. He aspires to become
    a technical lead who can design structured development processes, mentor junior developers, and ensure consistent delivery standards. Long‑term, he envisions launching his own consultancy that provides
    reliable, low‑maintenance web solutions for small businesses, particularly those serving the Mexican‑American community. He plans to earn AWS Certified Developer and Google Cloud certifications to broaden
    his cloud expertise.
