personas:
  professional: Joshua Beltre is a meticulous full‑stack web developer who leverages React, Node.js, and Python to build robust, maintainable applications, and they consistently enforce clean architecture,
    rigorous testing, and Agile Scrum processes to ensure predictability and timely delivery.
  sports: Joshua Beltre is an avid hiker who explores nearby nature preserves every weekend, a member of the local Summit Trail Club, and they channel that competitive spirit into cheering for the Dallas
    Cowboys and FC Dallas while occasionally playing in a casual ultimate frisbee league called the Pine Ridge Flyers.
  arts: Joshua Beltre indulges in architectural and landscape photography, drawing inspiration from Ansel Adams, Andreas Gursky, and modern Mexican photographer Graciela Iturbide, and they regularly visit
    the city’s contemporary art museum to study exhibitions while curating a personal online portfolio that reflects their precise aesthetic.
  travel: Joshua Beltre prefers meticulously planned solo trips that blend nature and architecture, having trekked the red rock canyons of Sedona, explored Barcelona’s Gaudí masterpieces, and they now dream
    of completing the Inca Trail to Machu Picchu, all while budgeting each itinerary to stay within a modest travel fund.
  culinary: Joshua Beltre enjoys cooking traditional Mexican dishes like carnitas, mole poblano, and chiles en nogada with scientific precision, measuring spices to the gram, using a sous‑vide for perfectly
    tender slow‑cooked meats, and they often pair the meals with a curated playlist of ambient electronic music to maintain focus.
  core: Joshua Beltre is a methodical 24‑year‑old full‑stack developer who balances solitary coding marathons with precise culinary experiments, structured hikes, and meticulous budgeting, all while silently
    battling a tendency to over‑organize every facet of life.
background:
  cultural: Joshua is a first‑generation Mexican‑American whose family maintains strong ties to their heritage. He grew up speaking both Spanish and English, celebrating holidays such as Día de los Muertos
    and Cinco de Mayo with modest family gatherings. The flavors of Mexican cuisine are a comfort to him, and he often prepares traditional dishes at home, appreciating the precision of recipes passed down
    from his grandparents. While he values community and family, his introverted nature leads him to enjoy quieter, one‑on‑one interactions rather than large social events. Living in Oakland, Florida, he
    balances his cultural roots with the diverse, suburban environment of Orange County.
