  career_goals: Lindsey aims to transition from LPN to Registered Nurse by completing a BSN program within the next two years, leveraging her STEM background to specialize in geriatric or wound-care nursing.
    She envisions a future as a nurse practitioner who can run a community-based wellness clinic in Saratoga County, integrating mental-health support and health-technology tools for seniors. In the short
    term, she seeks leadership roles such as charge nurse or clinical educator, where she can mentor staff and champion evidence-based improvements. Recognizing her need for flexible work structures, she
    also plans to take on per-diem or travel nursing assignments that provide variety while she builds her credentials. Ultimately, she hopes to launch a freelance health-consulting practice that offers
    stress-management workshops and patient-advocacy services, combining her clinical expertise with her passion for innovative, practical solutions.
