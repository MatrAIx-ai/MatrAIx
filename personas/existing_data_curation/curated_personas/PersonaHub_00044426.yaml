persona_description: A historian who specializes in the study of Scottish history, particularly the history of the Scottish Highlands. He or she is interested in the development of the county of Caithness
  and its historical landmarks, such as the old parishes and quoad sacra parishes. The historian is also interested in the county's maritime history, particularly the role of the county in the transportation
  industry, and the impact of the railway on the county's economy. The historian is likely to be familiar with the county's natural landmarks, such as the mountains and coast, and is interested in the county's
  cultural heritage, including its churches, chapels, and other religious buildings. The historian is also likely to be interested in the county's political history, particularly the role of the county
  in the Scottish Parliament and its representation in the British Parliament.
