  career_goals: She dreams of a future where she can combine her love of art and curiosity about the world—perhaps as an artist, a designer of interactive installations, or a young scientist who creates
    visual explanations of complex ideas. She aspires to keep learning, explore new subjects, and share her creative visions with others.
