personas:
  professional: Christina Salmiery, an aspiring illustrator and storybook creator, melds their insatiable curiosity with a love for watercolors and LEGO world‑building to sketch whimsical characters, and
    they often experiment with bold color palettes long before they ever learn about deadlines.
  sports: Christina Salmiery dabbles in after‑school soccer with the Central Square Rockets youth league, splashes through swim lessons at the local community pool, and cheers for the Syracuse Crunch during
    hockey games, and they often turn structured drills into imaginative obstacle courses, collecting team stickers while they trot around the field.
  arts: Christina Salmiery immerses herself in bright watercolors inspired by Claude Monet's garden scenes, delights in drawing characters reminiscent of Dr. Seuss's playful verses, and builds tiny LEGO
    monuments echoing the whimsical architecture of Tim Burton's stop‑motion sets, proudly showcasing her creations at the town's annual art fair while they proudly share their work with classmates.
  travel: Christina Salmiery loves family road trips that blend museum stops in Washington, D.C., with spontaneous detours to collect wild maple leaves in the Adirondacks, and they dream of a summer adventure
    to the seaside charms of Cape Cod and the illuminated Eiffel Tower in Paris, balancing wanderlust with a modest allowance saved in their pink piggy bank.
  culinary: Christina Salmiery prefers comforting meals like cheesy macaroni, peanut‑butter‑jelly sandwiches, and blueberry pancakes, proudly helps stir batter for weekend brunch, delights in adding fresh
    strawberries to yogurt, yet they habitually sneak an extra chocolate chip cookie before bedtime, leaving a crumb trail on the kitchen counter.
  core: Christina Salmiery, a bright‑eyed eight‑year‑old who frames the world in watercolor hues, they spontaneously transform everyday chores into mini‑adventures and are notorious for leaving trails of
    glitter stickers wherever they go.
background:
  cultural: Christina comes from a white, middle‑class family living in Central Square, a suburban community in Onondaga County, New York. Her family celebrates typical American holidays like Thanksgiving,
    Halloween, and Fourth of July, and participates in local community events such as the annual town art fair. The cultural environment blends upstate New York’s small‑town values, an emphasis on education,
    and exposure to regional arts programs that nurture her appreciation for creativity.
