personas:
  professional: Derita Crawford, a 15-year-old dance team member and drama club improviser, channels their sociable energy, curiosity, and knack for quick coordination into planning school performances
    and volunteer events, while they often leave organizers scrambling to meet tight deadlines.
  sports: Derita Crawford is a spirited member of the school dance team who also kicks a soccer ball at the local community league, cheering on the Dallas Cowboys on Sundays and the Dallas Mavericks during
    the NBA season, while they prefer spontaneous pick-up games over regimented practice sessions.
  arts: Derita Crawford blends a love for choreography and costume design with a flair for drama improvisation, curating Instagram playlists that feature Billie Eilish, BTS, and Taylor Swift, while they
    sketch runway-inspired outfits during quiet evenings and draw inspiration from the theatrical works of Lin-Manuel Miranda and the painting style of Frida Kahlo.
  travel: Derita Crawford enjoys weekend getaways to nearby Austin for live music and foodie festivals, dreams of exploring Tokyo's Harajuku fashion districts and Disney World's theme parks, and they prefer
    DIY travel itineraries over guided tours because of limited family budget and school schedule.
  culinary: Derita Crawford relishes Tex-Mex staples like chicken-and-black-bean tacos with fresh cilantro and jalapeno, can whip up a decent mac and cheese using sharp cheddar and a splash of hot sauce,
    and they frequently experiment with DIY crafts that double as edible garnish for their Instagram snack posts.
  core: Derita Crawford is a charisma-filled teen whose love for dance, drama, and community service fuels a spontaneous, people-centric outlook, even as they battle frequent worries and a tendency to procrastinate
    on organized tasks.
background:
  cultural: Derita grew up in a suburban Dallas neighborhood with a predominantly White, middle‑class family. Her upbringing blends typical Southern Texas values—such as close‑knit family ties, community
    involvement, and a relaxed approach to life—with the multicultural vibe of Dallas. She attends a public middle school where she experiences a mix of cultural influences, from local music festivals to
    neighborhood block parties. Regular participation in church youth groups and city-wide volunteer drives has reinforced her sense of cooperation and service. While she embraces mainstream American pop
    culture, she also appreciates the regional food traditions and outdoor activities common in North Texas.
