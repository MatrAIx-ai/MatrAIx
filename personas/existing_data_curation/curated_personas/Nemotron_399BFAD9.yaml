  hobbies: '[''dance (team and freestyle)'', ''improv theater'', ''volunteering at community center'', ''tutoring younger students'', ''fashion sketching'', ''DIY crafts'', ''creating playlists'', ''reading
    mystery novels'', ''watching science YouTube channels'']'
  career_goals: Derita aims to finish high school with strong grades and later pursue a degree in communications, psychology, or community development. She envisions a career that blends her love for helping
    others with her creative spark—such as becoming a community outreach coordinator, youth mentor, or public relations specialist for nonprofit organizations. She also hopes to develop her own platform
    to share coping strategies for stress and anxiety, reflecting her personal experience with negative emotions. While she prefers flexible, dynamic work environments, she is working on building time‑management
    skills to meet future professional expectations.
