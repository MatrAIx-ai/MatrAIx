persona_description: A policy analyst and economist who specializes in the field of behavioural economics, particularly in the study of cognitive biases and their impact on consumer behavior. He is passionate
  about understanding why people overeat and how to reduce food consumption through evidence-based policy changes and randomized experiments in the laboratory or real world. He is interested in the intersection
  of economics and psychology and is committed to bringing a more rigorous approach to the diet industry. He is a regular reader of academic journals in economics and psychology and is always looking for
  new insights and research to inform his work.
