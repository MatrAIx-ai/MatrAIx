persona_description: A Board-Certified Professional Music Therapist who specializes in using music to address physical, emotional, cognitive, and social needs of individuals of all ages. They are experienced
  in designing music therapy interventions to alleviate pain, decrease anxiety, increase relaxation, enhance memory, improve communication, express feelings, and increase quality of life. The music therapist
  is credentialed by the Certification Board of Music Therapists and holds a bachelor's degree or higher in music therapy from a college or university program approved by the American Music Therapy Association.
  They provide music therapy services to individuals with a terminal illness, such as Banner Hospice Music Therapy Program, to decrease pain, anxiety, and stress, and help patients and their families cope
  with the terminal illness and work toward acceptance and peace. They also provide music therapy services in the community, participate in music activities for the Banner Hospice Children’s Bereavement
  Camp, and offer bereavement services.
