personas:
  professional: Angelique Scarborough, a 20‑year‑old carpenter apprentice in Philadelphia, leverages solid practical skills—from hand tools and power saws to traditional mortise‑and‑tenon joinery and blueprint
    reading—to lead small crews, balancing a love for routine‑driven workflow with spontaneous on‑site improvisations as they chase journeyman certification and a future custom‑furniture studio.
  sports: Angelique Scarborough shoots hoops in a tight‑knit pick‑up basketball crew at a South Philly park, cheers for the Philadelphia 76ers and follows the Eagles’ season, jogs the Fairmount Park loop
    with a local running club in spring, and joins a seasonal adult softball league in summer, reflecting a competitive yet community‑oriented fitness routine.
  arts: Angelique Scarborough draws creative energy from listening to the gospel harmonies of the Blind Boys of Alabama and the lyrical flow of Kendrick Lamar, studies poetry by Langston Hughes while crafting
    furniture, and spends evenings at the Philadelphia Museum of Art admiring installations by Kerry James Marshall, showing how music, literature, and visual art shape their design aesthetic.
  travel: Angelique Scarborough favors weekend road trips that blend historic architecture tours of Annapolis, Maryland, with nature hikes in the Pocono Mountains, dreams of a summer apprenticeship in Copenhagen’s
    timber workshops, and balances a modest travel budget by staying in boutique hostels while occasionally splurging on a culinary tour of New Orleans.
  culinary: Angelique Scarborough loves cooking comfort dishes like shrimp and grits seasoned with smoked paprika and collard greens, experiments with reclaimed‑wood cutting boards while perfecting BBQ
    ribs glazed with honey‑brown sugar, and never passes up a classic Philly cheesesteak loaded with provolone and sautéed onions, reflecting a palate that mixes Southern flavors with local staples.
  core: Angelique Scarborough is a routine‑loving yet spur‑of‑the‑moment carpenter who balances disciplined tool management with spontaneous design experiments, dominates on the basketball court, and fuels
    themselves on gospel and hip‑hop beats, even though they sometimes procrastinate on project deadlines.
background:
  cultural: Angelique grew up in North Philadelphia's vibrant African-American community, where family, church, and skilled-trade traditions are deeply valued. Her father was a carpenter and her grandmother
    a seamstress, both of whom taught her the pride of hands-on work. She attended a public high school with a strong vocational program and spent weekends at the African American Museum, absorbing the
    legacy of Black artisans and builders. The city's gospel choirs, hip-hop scene, and events like the Odunde Festival shape her cultural identity, while her church's community service initiatives reinforced
    a practical, service-oriented outlook. These roots inform her dedication to craftsmanship, her preference for small-group collaboration, and her ambition to continue a lineage of Black woodworking excellence.
attributes:
  skills: '[''Hand tool operation'', ''Power tool proficiency'', ''Blueprint reading'', ''Measuring and layout'', ''Framing and structural work'', ''Finish carpentry'', ''Cabinetry and custom furniture'',
