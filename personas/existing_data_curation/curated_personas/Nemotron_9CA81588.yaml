    small-team leadership'']'
  hobbies: '[''Urban architecture photography'', ''Restoring vintage furniture'', ''Listening to gospel and hip-hop music'', ''Reading African-American poetry and literature'', ''Playing basketball with
    close friends'', ''Jogging in Fairmount Park'', ''Volunteering in community carpentry workshops'']'
  career_goals: Short-term, Angelique aims to secure her journeyman certification and join a reputable Philadelphia construction firm to broaden her experience with larger residential projects. Mid-term,
    she plans to specialize in custom, reclaimed-wood furniture, building a modest workshop where she can blend traditional techniques with her own improvisational style. Long-term, she envisions launching
    her own boutique carpentry studio that serves small-scale renovation clients and offers apprenticeships to other young Black women interested in the trades. Throughout, she seeks a stable, routine-based
    income while retaining the flexibility to take on creative, on-the-fly projects that challenge her skills.
