personas:
  professional: Andrea James, a senior business strategist known for weaving art and sustainability into corporate culture, leverages Lean Six Sigma, ESG analysis, and compassionate leadership to drive
    growth while mentoring emerging women leaders and championing inclusive policies.
  sports: Andrea James, an avid member of the Rocky Mountain Hiking Club, tackles seasonal trail challenges in the Rockies, follows the Denver Broncos and Colorado Avalanche with enthusiasm, and practices
    weekly yoga for flexibility and stress relief.
  arts: Andrea James curates community art displays, captures urban street scenes inspired by Vivian Maier, studies Ansel Adams for landscape photography techniques, draws creative energy from the Denver
    Art Museum’s contemporary exhibitions, and often quotes Georgia O’Keeffe in boardroom presentations.
  travel: Andrea James prefers meticulously planned journeys that blend adventure and cultural immersion, having trekked the Inca Trail, explored Kyoto’s temples, driven through Patagonia, and budgeting
    for future eco‑focused trips to the Galápagos Islands.
  culinary: Andrea James enjoys experimenting with global flavors, mastering a perfect Thai green curry, a Moroccan tagine with preserved lemons, and classic Argentine empanadas, frequently improvising
    with fresh rosemary from their balcony garden, though they sometimes skip meal prep when work commitments surge.
  core: Andrea James blends a love of art, mountain trails, and compassionate leadership into a balanced, purpose‑driven life, even if they occasionally overcommit to projects and forget to water their
    indoor plants.
background:
  cultural: Andrea is a White American with deep roots in the Midwest, having grown up in a small town in Iowa before moving to Denver for graduate studies. Her family heritage includes German and Irish
    ancestry, which has contributed to a blend of cultural values emphasizing hard work, community involvement, and an appreciation for the arts. In Denver, she embraces the city’s vibrant outdoor lifestyle,
    progressive social ethos, and the flourishing local arts scene, integrating these influences into both her professional and personal life.
