  career_goals: Andrea aims to transition into senior executive leadership, seeking a role such as Vice President of Corporate Social Responsibility or Director of People and Culture, where she can scale
    impact through sustainability and community engagement initiatives. She aspires to embed arts and creativity into organizational innovation pipelines, launch mentorship programs for emerging women leaders,
    and champion inclusive policies. In the longer term, she envisions establishing her own consulting practice focused on compassionate leadership, ESG strategy, and cultural transformation for mid-sized
    firms. She also hopes to serve on the board of a nonprofit arts organization in Denver, leveraging her business acumen to support community arts and education.
