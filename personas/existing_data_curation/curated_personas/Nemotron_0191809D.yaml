  hobbies: '[''Gospel choir singing'', ''Pickup basketball'', ''Soul‑food cooking and BBQ'', ''Playing harmonica'', ''Attending blues and jazz festivals'', ''Fishing on the Mississippi River'', ''Gardening'',
    ''Mentoring youth in after‑school programs'']'
  career_goals: Willie aims to advance from a support role to a supervisory position within his hospital’s patient services department, eventually becoming a patient care coordinator or community health
    liaison. He hopes to obtain his GED and pursue a certification as a Certified Nursing Assistant (CNA) to broaden his clinical responsibilities. Long-term, he envisions leading a neighborhood health-education
    program that blends his practical experience with his curiosity for innovative health-promotion strategies, especially targeting underserved populations in Memphis.
