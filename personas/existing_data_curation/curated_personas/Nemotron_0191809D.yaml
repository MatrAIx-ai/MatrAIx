personas:
  professional: Willie Bolden is a hands‑on patient care associate at a Memphis hospital who leverages their curiosity for new health‑tech tools and a practical mindset to lead triage teams, communicate
    clearly with a diverse patient population, and actively pursue a supervisory path toward a CNA certification and community health liaison role, and they thrive on bridging immediate care with long‑term
    health education.
  sports: Willie Bolden is an avid pickup basketball player at the local community center who roots for the Memphis Grizzlies and the Memphis Redbirds, participates in a weekend Sunday league, and spends
    quiet mornings fishing the Mississippi River with a local angler’s club, while they balance team sports enthusiasm with solitary outdoor activity.
  arts: Willie Bolden is a dedicated member of their church’s gospel choir, a casual harmonica player, and a regular attendee of blues festivals where they enjoy the sounds of B.B. King, John Lee Hooker,
    and modern jazz icons like Kamasi Washington, allowing music to energize both personal relaxation and community service.
  travel: Willie Bolden is a travel enthusiast who has road‑tripped to New Orleans for its jazz heritage, spent family weekends in Nashville for music and barbecue, dreams of exploring the Mississippi River
    towns on a guided river cruise, and plans a future cultural pilgrimage to Chicago’s blues clubs, while they balance a modest travel budget and family responsibilities.
  culinary: Willie Bolden is a soulful barbecue aficionado who masters smoked pork ribs with hickory chips, collard greens seasoned with smoked turkey, and sweet corn pudding, experimenting with cayenne
    pepper rubs and buttermilk marinades for family gatherings, while they showcase a confident yet always‑learning kitchen skill set.
  core: Willie Bolden is a curious, practical, and sociable healthcare worker who blends gospel harmonica jams, barbecue experiments, and community mentorship, even if their spontaneity sometimes derails
    strict organization, and they still manage to keep the collective vibe alive.
background:
  cultural: Willie is a second‑generation African‑American from Memphis, a city steeped in musical and culinary traditions. He grew up surrounded by the sounds of blues, soul, and gospel, which have shaped
    his love for music and community gatherings. His family’s deep roots in the local church have instilled a strong sense of service and communal responsibility. He is proud of his heritage, celebrating
    milestones with family cookouts, church events, and participation in neighborhood block parties that reflect the vibrant culture of Memphis’s black community.
attributes:
  skills: '[''Patient intake'', ''Vital signs monitoring'', ''Electronic Health Record (EHR) navigation'', ''Basic Life Support (BLS) certification'', ''Patient transport coordination'', ''Infection control'',
