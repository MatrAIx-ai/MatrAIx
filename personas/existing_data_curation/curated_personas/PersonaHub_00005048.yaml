persona_description: A higher education faculty member who is interested in integrating mobile, multi-point connections (MMCs) into the classroom to enhance engagement and learning experiences. This individual
  is familiar with the concept of webbed-out flows and the potential for customized spaces of interaction. They are open to the idea of breaking away from traditional instructional frameworks and planning
  for courses in a more fluid and flexible manner. This person is likely to have expertise in problem-solving approaches and the use of technology to support learning. They are interested in the concept
  of the Zone of Proximal Development (ZPD) and how it can be applied to the use of mobile technology in the classroom. They are interested in the potential for social spaces to be integrated into a learning
  process and are open to the idea of accommodating this in the planning and delivery of a course.
