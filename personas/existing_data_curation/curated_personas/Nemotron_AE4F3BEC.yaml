  career_goals: Wesley aims to combine his love for sports, technology, and community involvement into a future career. In the short term, he plans to graduate high school, improve his academic standing,
    and possibly take introductory courses in digital media at a local community college. He dreams of becoming a multimedia producer or digital content creator who highlights local youth culture and sports,
    and eventually envisions mentoring younger kids in his neighborhood through a community sports and media program. Ultimately, he hopes to be a role model who demonstrates that curiosity and practical
    skills can lead to meaningful, socially‑impactful work.
