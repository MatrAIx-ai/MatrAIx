personas:
  professional: Wesley Poteat is a budding TikTok content creator whose video‑editing chops, quick humor, and spontaneous rap verses reflect their lively, sociable personality and their flexible, sometimes
    disorganized approach to projects.
  sports: Wesley Poteat dominates the neighborhood basketball court as a member of the Clifton Youth Basketball League, cheering on the New York Knicks while also cruising the skate park on a custom deck
    during the summer, and occasionally joins after‑school pick‑up games organized by the community center.
  arts: 'Wesley Poteat channels the rebellious edge of street artist Banksy into graffiti sketches, drops freestyle verses inspired by Kendrick Lamar and J Cole, and replays Marvel’s Spider‑Man soundtrack
    while binge‑watching superhero epics like "Avengers: Endgame" and "The Dark Knight", letting their artistic energy flow across visual, musical, and cinematic realms.'
  travel: Wesley Poteat maps out weekend trips to the bustling streets of New York City and the historic sites of Washington, D.C., and dreams of an extended summer adventure to Tokyo’s Harajuku district
    to soak up anime culture and neon‑lit graffiti scenes, favoring spontaneous, budget‑friendly travel over rigid itineraries.
  culinary: Wesley Poteat prefers late‑night pepperoni pizza and crunchy nachos drizzled with jalapeño salsa, can whip up a quick skillet mac‑and‑cheese using cheddar and breadcrumbs, but often relies on
    fast‑food chicken nuggets when school projects run late, reflecting a casual cooking skill set and a love for bold, salty flavors.
  core: Wesley Poteat blends boundless energy with a carefree streak, bouncing from basketball courts to TikTok edits, but habitually misplaces homework in a pile of sketchbooks while dreaming of rap stardom.
background:
  cultural: Wesley grows up in a close‑knit Black family in Clifton, New Jersey, where family gatherings, church youth groups, and community events play a central role. His household celebrates cultural
    traditions such as Juneteenth, Black History Month, and soulful family meals featuring dishes like fried chicken, collard greens, and cornbread, while also embracing the diverse culinary scene of New
    Jersey. The blend of urban Black cultural influences—music, sports, and storytelling—and the suburban environment of Passaic County shapes his identity. He is aware of the broader social dynamics that
    affect Black youth and strives to honor his heritage by being supportive, cooperative, and proactive in his community.
