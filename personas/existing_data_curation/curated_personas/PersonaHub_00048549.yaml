persona_description: A biologist who specializes in the study of wolf populations, particularly the Iberian wolf subpopulation south of the Douro River. He has been working with the wolf subpopulation since
  2002 and has a close connection with the elusive yet resilient animals. His research interests include the genetic dynamics of the wolf subpopulation, the assessment of population connectivity between
  packs, and the development of a local nature-based economy. He is optimistic about the future of the wolf population in Portugal and believes that a Portugal with a healthy wolf population is better for
  wild nature and humans. He is out in the field nearly every day of the week, surveying the wolf subpopulation and collecting scat samples.
