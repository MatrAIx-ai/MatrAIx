  hobbies: '[''Visiting art galleries'', ''Sketching and drawing'', ''Photography'', ''Playing acoustic guitar'', ''Basketball (intramural)'', ''Competitive eSports (League of Legends)'', ''Hiking local
    trails'', ''Attending music festivals'', ''Reading speculative fiction'', ''Volunteering for community event planning'']'
  career_goals: Joseph aims to earn a bachelor's degree in Business Administration within the next two years while pursuing the Project Management Professional (PMP) certification. He envisions progressing
    to a senior project manager role at a technology or creative agency where he can blend his organizational expertise with his love for art and new ideas. Long‑term, he dreams of launching his own consultancy
    that specializes in managing interdisciplinary projects, such as art installations, tech startups, and community events, allowing him to harness both his competitive drive and his collaborative spirit.
