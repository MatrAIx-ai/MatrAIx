  career_goals: Rula aims for a career that blends creativity with tangible community impact. She plans to enroll in a community‑college program in digital media or graphic design, with the long‑term ambition
    of launching a freelance content‑creation studio that highlights local stories and social‑good projects around Detroit. She also wants to earn certifications in automotive technology to stay connected
    to the region’s industry, and ultimately hopes to work for a nonprofit that uses media and hands‑on projects to empower youth and strengthen neighborhood cohesion.
