personas:
  professional: Rula Wedlake, a 17‑year‑old high‑school junior, leverages a curious yet practical mindset to run a small online accessory shop, coordinate neighborhood clean‑up events, and craft digital
    sketches, all while dreaming of a community‑college program in graphic design that will launch a freelance studio spotlighting Detroit’s local stories, even as they wrestle with spontaneous bursts of
    creativity that sometimes derail deadlines.
  sports: Rula Wedlake spends afternoons at the Belle River Skate Crew’s local park mastering tricks, joins pickup basketball games at the community center while cheering for the Detroit Pistons and Lions,
    and hikes the Belle River trail on weekends, blending spontaneous movement with occasional structured training.
  arts: Rula Wedlake channels a down‑to‑earth curiosity into sketching Detroit street scenes, snapping candid photos of friends, curating playlists that weave together Kendrick Lamar, Tame Impala and SZA,
    and crafting bead bracelets sold on Etsy, finding identity in the city’s vibrant visual and musical culture.
  travel: Rula Wedlake favors spontaneous weekend road trips to nearby gems like Mackinac Island and Grand Rapids, while dreaming of a student‑exchange stint in Toronto and a music‑themed pilgrimage to
    New Orleans, balancing a shoestring budget with a love for discovering new places on the fly.
  culinary: Rula Wedlake enjoys cooking straightforward, health‑focused meals such as grilled chicken quinoa bowls, avocado toast, and roasted sweet potato fries seasoned with rosemary, while indulging
    in Detroit‑style pizza on cheat days and often experimenting with fresh herbs and sriracha to add a spicy kick.
  core: Rula Wedlake, a 17‑year‑old Detroit teen, blends curiosity‑driven creativity with practical community hustle, juggling spontaneous skate sessions, DIY crafts, and a dream of using digital media
    to empower local youth.
background:
  cultural: Rula comes from a white Midwestern background rooted in Romulus, Michigan. Her family blends Irish and German ancestry, typical of many Detroit‑area households, and she was raised with a mix
    of Catholic traditions and strong neighborhood ties. The local culture’s emphasis on hard work, the automotive industry, and Motown music has shaped her values of practicality, collaboration, and a
    balanced respect for both new ideas and established methods. She identifies with the friendly, down‑to‑earth Midwestern hospitality that encourages helping neighbors while staying open to the diverse
    influences of the Detroit metropolitan region.
