personas:
  professional: David Vega is a budding robotics enthusiast who channels his methodical planning and practical curiosity into designing Scratch programs for his school's robotics club, while his sociable
    nature makes him a natural team leader on group projects.
  sports: David Vega shines on the court for the Salt Lake City Youth Basketball Association and scores goals for the Wasatch United Soccer Club, cheering on the Utah Jazz and Real Salt Lake while balancing
    rigorous after-school practices with weekend hikes in the Wasatch Mountains to stay fit and recharge.
  arts: David Vega finds artistic refuge in strumming acoustic guitar versions of John Denver's 'Take Me Home, Country Roads' while jamming with friends, and fuels his imagination with sci-fi novels by
    Isaac Asimov and popular science books by Neil deGrasse Tyson, regularly listening to the soundtrack of the movie 'Interstellar' for inspiration.
  travel: David Vega prefers active family trips that combine hiking in Utah's national parks like Zion and Bryce Canyon with visits to science museums in Washington, D.C., and dreams of attending a robotics
    expo in Tokyo, always planning itineraries with detailed checklists and pocket-sized maps.
  culinary: David Vega enjoys crafting simple yet hearty meals such as spaghetti with meatballs, pepperoni pizza, and homemade tacos, favoring ingredients like mozzarella, ground beef, and fresh cilantro,
    and often experiments with snack-friendly protein bars packed with oats, almond butter, and honey.
  core: David Vega is a curious, organized twelve-year-old whose boundless energy fuels robotics, sports, and guitar riffs, yet a lingering worry habitually nudges them into journal-filled evenings and
    occasional splurges on LEGO.
background:
  cultural: David grew up in Clearfield, Utah, a predominantly white, middle‑class community where family, church, and community involvement are central values. The local culture emphasizes self‑reliance,
    modesty, and a strong work ethic, but also encourages cooperation through school clubs, sports leagues, and youth service projects. Outdoor recreation—hiking, skiing, and camping in the nearby mountains—is
    a common family activity, reflecting the region’s appreciation for nature. These cultural influences, alongside the supportive environment of his school and church, shape David’s emphasis on reliability,
    teamwork, and a desire to contribute positively to his community.
attributes:
  skills: '[''Organizational planning for school projects'', ''Team collaboration in sports and clubs'', ''Basic coding in Scratch'', ''LEGO building and model design'', ''Public speaking in class presentations'',
    ''Problem‑solving in science experiments'', ''Peer tutoring in math and science'', ''Basic first‑aid knowledge'']'
  hobbies: '[''Basketball'', ''Soccer'', ''LEGO building'', ''Robotics club'', ''Coding with Scratch'', ''Reading science fiction and popular science'', ''Hiking in the Wasatch Mountains'', ''Playing acoustic
    guitar'', ''Community service projects'', ''Journaling and mindfulness exercises'']'
  career_goals: David dreams of turning his love for building and problem‑solving into a career as an engineer—particularly in robotics or civil engineering—so he can create practical solutions that benefit
    his community. He envisions attending a university where he can deepen his technical skills while also studying environmental sustainability. Because he values helping others, he also hopes to mentor
    younger students in STEM clubs and possibly combine engineering with community service projects. Long‑term, he aims to be a dependable professional who can balance innovative ideas with reliable, real‑world
    results.
