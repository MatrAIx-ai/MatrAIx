persona_description: A computer scientist who is concerned about the long-term preservation and accessibility of machine-generated, machine-read material. They believe that technology is deeply flawed and
  threaten to cast future generations into a "digital dark age." They are working on a preservation project to create a standard process and infrastructure for the long-term storage of government digital
  records and are aware of the problems faced by families, librarians, and archivists in preserving old snapshots and irreplaceable hard-copy material. They are also aware of the need to balance a commitment
  to deliver responsive government through improved use of IT with a legal requirement that machine-readable material be stored in a form that is safe, secure from degradation, and accessible to subsequent
  generations.
