persona_description: A mental health and wellness educator or advocate who is committed to reducing the impact of adverse childhood experiences (ACEs) on children and adults. This person is likely to have
  a background in psychology, social work, or related fields and has experience working with at-risk populations. They are passionate about providing accessible and low-cost mental health and wellness resources
  and have a strong understanding of the impact of ACEs on mental health. This person may have experience working with after-school programs or organizations that address ACEs and may have a background
  in social emotional learning or related fields. They are likely to be familiar with the work of The Sarafian Foundation and may have experience with similar programs or initiatives.
