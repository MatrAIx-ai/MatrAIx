  hobbies: '[''Hiking'', ''Sailing'', ''Gardening'', ''Woodworking'', ''Historical Fiction'', ''Community Volunteering'', ''Engineering Meetups'', ''Cooking'', ''Piano'', ''DIY Home Projects'']'
  career_goals: Looking ahead, Danielle aims to obtain her Professional Engineer (PE) license and transition into a senior engineering leadership role where she can drive the development of energy‑efficient
    building solutions. She aspires to head a multidisciplinary team focused on sustainable mechanical designs, mentor junior engineers, and eventually establish a consultancy that helps mid‑size firms
    integrate green technologies. Balancing her curiosity for emerging materials with pragmatic project delivery, she also envisions contributing to industry standards and publishing technical papers.
