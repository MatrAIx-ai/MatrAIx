  hobbies: '[''Visiting art galleries and museums'', ''Participating in cultural festivals (Día de los Muertos, Cinco de Mayo)'', ''Cooking and sharing traditional Mexican recipes'', ''Herb and chili gardening'',
    ''Lakefront walking with friends'', ''Playing chess at the senior center'', ''Listening to boleros, mariachi, and jazz'', ''Attending language‑exchange meetups'']'
  career_goals: Although retired, Jorge aims to deepen his role as a cultural ambassador within Chicago's Mexican‑American community. He plans to establish a monthly storytelling series at the local community
    center, where elders share life experiences with younger generations. He hopes to co‑curate a small exhibit of senior‑created artwork at the Chicago History Museum, highlighting the intersection of
    Mexican heritage and contemporary life. Jorge also aspires to publish a memoir chronicling his journey from a small town in Mexico to a vibrant senior in Chicago, preserving familial and immigrant narratives
    for posterity. Additionally, he seeks to mentor bilingual volunteers, encouraging intergenerational language exchange, and to support senior health initiatives by organizing low‑impact fitness and nutrition
    workshops.
