  hobbies: '[''Reading classic literature'', ''Philosophy'', ''Oil painting'', ''Watercolor painting'', ''Woodworking'', ''Birdwatching'', ''Hiking'', ''Gardening'', ''Photography'', ''Crossword puzzles'',
