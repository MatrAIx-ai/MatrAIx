persona_description: A teacher who is experienced in teaching English Language and Literature, particularly at KS3 and KS4 levels. They have a clear understanding of the Edexcel English Language Specification
  and can adapt lesson plans to accommodate different exam boards. They have a proven track record of delivering outstanding lessons that are observed by Ofsted to be 'Outstanding'. They have a passion
  for teaching and are dedicated to improving their students' writing skills, particularly in persuasive language techniques. They are skilled at creating differentiated lesson plans and are able to assess
  students' progress through peer and self-assessment. They have a wealth of experience in creating a range of resources, including lesson plans, Powerpoints, and activities, and are able to provide clear
  marking criteria for self or peer assessment. They are also experienced in teaching GCSE 1-9 non-fiction writing skills and have a proven track record of success in empowering students to take ownership
  of their learning and progress effectively.
