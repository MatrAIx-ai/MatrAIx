persona_description: A Celtic Studies scholar who is passionate about expanding the online resource for teaching and research in the field of Celtic studies. They are dedicated to building an ever-expanding
  web-based resource for teaching and research in the field of Celtic studies, which will include an integrated catalogue of texts and manuscripts as well as a bibliography. They are aware of the challenges
  of finding primary sources in the field and are committed to filling this gap by building an index to as many written texts and manuscripts as can be considered relevant to the field of Celtic studies.
  They are also aware of the different nature of this platform and believe that it may open doors which would otherwise remain closed.
