  hobbies: '[''Gardening (vegetables and flowers)'', ''Canning and food preservation'', ''Knitting'', ''Crocheting'', ''Quilting'', ''Reading historical fiction and biographies'', ''Crossword puzzles and
    jigsaw puzzles'', ''Bridge (card game)'', ''Bird-watching'', ''Attending church socials'', ''Storytelling and sharing family history'', ''Listening to classic swing and early rock music'']'
  career_goals: Irene's current ambitions focus on maintaining her health, staying socially engaged, and passing on her skills and stories. She aims to compile a handwritten family recipe and storybook
    for her grandchildren, teach a weekly quilting circle at the senior center, and continue volunteering as a mentor for community youth. She also hopes to stay independent by regularly walking the local
    park and participating in low‑impact exercise classes, and to make occasional trips to visit her children and grandchildren. Her long‑term aspiration is to leave a legacy of kindness, practical knowledge,
    and community harmony.
