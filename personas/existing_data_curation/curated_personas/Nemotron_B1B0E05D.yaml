  career_goals: Andre dreams of becoming someone who can turn ideas into real-world solutions for his city. He often says he wants to be a 'city builder' - a future urban planner or community engineer who
    designs safe parks, bike lanes, and vibrant community spaces in Detroit. He is also fascinated by firefighting because of the heroism and teamwork, and he enjoys imagining himself designing video games
    that tell stories about his neighborhood. Though he worries sometimes about whether his ideas are good enough, his practical curiosity drives him to experiment, read about engineers, watch documentaries
    about city infrastructure, and ask adults about how things work. His ambition is to combine his love of building, coding, and helping others into a career that improves his community.
