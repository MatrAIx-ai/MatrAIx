personas:
  professional: Andre Johnson is a budding young engineer‑designer who blends curiosity‑driven LEGO constructions with practical Scratch coding, and their balanced mix of organization and flexibility lets
    them meticulously plan builds while still improvising new features, even as occasional worry about perfection makes them double‑check each detail.
  sports: Andre Johnson is a devoted young basketball enthusiast who spends weekends shooting hoops at the neighborhood park, practices dribbling drills with friends from the Detroit Youth Basketball Club,
    cheers for the Detroit Pistons, and balances the competitive energy of the sport with a cautious approach to avoid injuries from their asthma.
  arts: Andre Johnson is an imaginative comic‑strip creator who drafts panels inspired by Detroit’s vibrant street murals by artists like Banksy and channels the rhythmic storytelling of Motown legends
    such as Stevie Wonder and hip‑hop icons like Kendrick Lamar, while also admiring classic illustrators like Stan Lee.
  travel: Andre Johnson loves weekend road trips to Michigan’s Great Lakes shoreline and annual visits to the Detroit Institute of Arts, and they dream of exploring New York City’s museums and Disneyland,
    preferring carefully planned itineraries with parents while balancing a modest travel budget that limits long‑distance adventures.
  culinary: Andre Johnson delights in baking chocolate‑chip cookies with their parents, experiments with adding crushed LEGO‑shaped sprinkles for fun, enjoys a well‑seasoned pepperoni pizza topped with
    extra cheese, and while their cooking skills are still beginner‑level, they proudly claim the title of 'Junior Chef' at family meals.
  core: Andre Johnson is a curious, hyper‑creative eight‑year‑old who transforms LEGO bricks into animated stories, worries about perfection, and secretly hoards extra pennies for future inventions.
background:
  cultural: Andre is raised in an African-American family rooted in Detroit's rich cultural tapestry. His grandparents came to the city during the Great Migration, and family stories often reference the
    legacy of Motown, the auto-industry heritage, and the neighborhood churches that serve as community hubs. He grows up surrounded by the rhythms of classic soul, modern hip-hop, and the vibrant street
    art that decorates his block. Community events at the local recreation center, church gatherings, and neighborhood block parties shape his sense of belonging and responsibility. These influences nurture
    his pride in Detroit's resilience, its history of innovation, and the collective spirit of helping neighbors, all of which inform his worldview and aspirations.
