personas:
  professional: Mariselle Martinez, a 24‑year‑old casino security officer, blends meticulous CCTV monitoring with creative problem‑solving, using bilingual de‑escalation skills and a curiosity for AI‑driven
    video analytics to keep the gaming floor safe while mentoring peers through artistic training workshops.
  sports: Mariselle Martinez, an avid beach‑volleyball player with the South Florida Sand Spikers, also follows the Miami Heat and Miami Marlins, and blends high‑energy group workouts with occasional solo
    runs to counteract anxiety.
  arts: Mariselle Martinez curates her artistic life by photographing vibrant Miami murals—channeling the social commentary of street artists like JR and Swoon—while dancing to the rhythms of Celia Cruz
    and Victor Manuelle and drawing inspiration from the kinetic energy of live performance.
  travel: Mariselle Martinez favours spontaneous weekend road trips to the Florida Keys and occasional budget‑friendly flights to Mexico City, balancing her love for colorful street art with the need to
    fit travel costs into a student budget.
  culinary: Mariselle Martinez, an aficionado of bold flavors, cooks family recipes like bandeja paisa with chorizo, black beans, plantains, and arepas stuffed with cheese, while also experimenting with
    vegan tacos and frequenting Miami’s cevicherías for fresh fish, lime, and cilantro.
  core: Mariselle Martinez channels a restless curiosity and competitive edge into a dynamic blend of surveillance expertise, salsa rhythm, and vibrant street‑art photography, all while wrestling with an
    undercurrent of anxiety that fuels both meticulous planning and occasional impulsive splurges.
background:
  cultural: Mariselle was born to Colombian immigrant parents and grew up in a bilingual household where Spanish and English were spoken interchangeably. Family gatherings were centered around music, dance,
    and food, with regular celebrations of traditions such as Carnaval de Barranquilla and the sharing of coffee from the Andean region. Her parents instilled a strong sense of community, respect for elders,
    and pride in Colombian heritage, which she carries into her daily life in Coral Springs. Living in the multicultural environment of South Florida has allowed her to blend Colombian customs with the
    diverse influences of the area, shaping a worldview that values cultural exchange, artistic expression, and collective responsibility. She remains connected to her roots through visits to Colombia,
    participation in local Latino community events, and maintaining close ties with extended family.
attributes:
  skills: '[''CCTV operation and monitoring'', ''Video analytics software (Milestone, Genetec)'', ''Physical security protocols'', ''Threat assessment and risk analysis'', ''Emergency response and first
    aid/CPR'', ''Bilingual communication (Spanish/English)'', ''Conflict de-escalation'', ''Report writing and documentation'', ''Team coordination and shift management'', ''Creative problem-solving'',
    ''Attention to detail'', ''Adaptability under pressure'', ''Basic network security fundamentals'']'
  hobbies: '[''Visiting art galleries and documenting street murals'', ''Salsa and bachata dancing'', ''Beach volleyball'', ''Improv theater participation'', ''Photography (urban and candid)'', ''Reading
    science-fiction and philosophy'', ''Cooking Colombian dishes'', ''Yoga and mindfulness meditation'', ''Journaling for emotional regulation'', ''Volunteering at local cultural festivals'']'
  career_goals: Mariselle aims to move from a front-line surveillance officer to a supervisory role within a casino environment, eventually becoming a security operations manager. She plans to complete
    a bachelor's degree in Criminal Justice within the next two years and earn professional certifications such as Certified Protection Officer (CPO) and Advanced CCTV Operations. Building on her curiosity
    for technology, she wants to specialize in AI-driven video analytics to improve threat detection. Her competitive drive motivates her to lead a team of guards, develop and deliver engaging training
    workshops that incorporate her artistic interests, and mentor new hires. Long-term, she envisions a position that blends security leadership with community outreach, such as organizing safety-focused
    public art installations during local festivals, while also continuing personal work on stress-management techniques to better handle her intense emotional reactivity.
