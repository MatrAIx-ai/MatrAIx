personas:
  professional: Victor Estradaperez works as a bilingual personal care aide, using their practical problem‑solving and curiosity for emerging assistive technology to deliver compassionate home care to elderly
    clients while juggling a relaxed, sometimes disorganized schedule as they pursue CNA certification.
  sports: Victor Estradaperez keeps fit through solo hikes with the Hill Country Hiking Club, weekend fly‑fishing trips with the Eagle Pass Fly‑Fishing Association, and cheering on the Dallas Cowboys on
    football Sundays, while occasionally catching a Texas Rangers game for a relaxed baseball outing.
  arts: Victor Estradaperez immerses themselves in the literary worlds of Juan Rulfo and Laura Esquivel, draws border‑land photography inspiration from Graciela Iturbide, and finds solace listening to Lila
    Downs and Los Tigres del Norte while attending community Día de los Muertos altar displays.
  travel: Victor Estradaperez favors impromptu weekend road trips across West Texas, from Big Bend to San Antonio, while dreaming of a solo photography pilgrimage to Oaxaca’s Día de los Muertos festivities
    and a rugged trek through the Sierra de la Laguna, having already visited Austin, Laredo, and the Guadalupe Mountains.
  culinary: Victor Estradaperez cooks mole poblano with pasilla, mulato, and Mexican chocolate, crafts tamales using masa and adds quinoa for a modern protein boost, and prepares pozole with hominy and
    pork shoulder, blending tradition with health‑focused twists like avocado garnish.
  core: Victor Estradaperez is a solitary, curiosity‑driven caregiver who balances a love of traditional cooking and border photography with a laid‑back, occasionally disorganized lifestyle and a habit
    of postponing mundane tasks until the last minute.
background:
  cultural: Victor grew up in the border town of Eagle Pass, Texas, in a close-knit Mexican-American family. His upbringing was steeped in Mexican traditions—celebrating Día de los Muertos, attending Mass,
    and sharing extended family meals—while also navigating the Texan cultural landscape. Bilingualism is a cornerstone of his identity; he speaks Spanish at home and English at school and work, allowing
    him to act as a cultural bridge in his caregiving role. The proximity to the United States-Mexico border has given him a nuanced perspective on cross-border dynamics, fostering respect for both sides
    of his heritage. He maintains strong ties to his parents' hometown in Mexico, visiting frequently and participating in family gatherings that emphasize hospitality, respect for elders, and community
    solidarity. These cultural values inform his compassionate approach to personal care, his preference for small, meaningful social interactions, and his desire to provide culturally sensitive services
    to clients who share his background.
