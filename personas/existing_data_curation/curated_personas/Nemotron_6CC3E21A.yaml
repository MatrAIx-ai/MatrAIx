  hobbies: '[''Walking club outings'', ''Bridge and mahjong games'', ''Church choir singing'', ''Vegetable gardening'', ''Folk music concerts'', ''Genealogy research'', ''Woodworking and crafting'']'
  career_goals: Although retired, Elliot aims to leave a lasting legacy through community service. He plans to expand the senior center’s inter‑generational gardening program, document oral histories of
    Black families in Watauga County, and mentor high‑school students interested in trades. He also hopes to write a memoir that weaves his personal experiences with the broader civil‑rights history of
    the region, and to organize inclusive cultural festivals that celebrate the town’s diverse heritage.
