personas:
  professional: Elliot Watkins, a retired engineer turned community organizer, blends methodical problem‑solving with hands‑on carpentry and horticultural expertise to coordinate inter‑generational garden
    projects, mentor trades‑interested youth, and document local oral histories, all while maintaining a flexible yet reliable approach fueled by curiosity and compassionate teamwork.
  sports: Elliot Watkins stays active through a senior walking club that explores the Blue Ridge trails, participates in a weekly bowling league at the community center, and passionately supports the Charlotte
    Hornets, the Carolina Panthers, and the local Asheville Tourists, using these affiliations to bond with friends and maintain social engagement.
  arts: Elliot Watkins sings baritone harmonies in the historic church choir, revels in folk‑music concerts featuring artists like Rhiannon Giddens, The Avett Brothers, and Pete Seeger, and spends quiet
    evenings listening to classic recordings by Nina Simone and Johnny Cash, drawing creative inspiration that fuels their woodworking designs.
  travel: Elliot Watkins prefers well‑planned, low‑stress trips that blend scenic hiking with cultural immersion, having explored the Blue Ridge Parkway, the Great Smoky Mountains, and historic Savannah,
    while dreaming of a genealogical pilgrimage to Edinburgh, Scotland and a relaxed river cruise on the Mississippi.
  culinary: Elliot Watkins enjoys preparing Southern comfort dishes such as shrimp and grits, fried catfish with hush‑puppy cornmeal batter, collard greens simmered with smoked ham hocks, and peach cobbler,
    demonstrating a seasoned grill‑master’s skill, a penchant for experimenting with okra, sweet potatoes, and homemade spice rubs, and a love for sharing these meals with neighbors.
  core: Elliot Watkins, an 82‑year‑old community‑spirit champion, merges curiosity‑driven woodworking and gardening with relentless generosity, occasional coupon‑clipping frugality, and a steadfast love
    for folk music and intergenerational mentorship.
background:
  cultural: Elliot’s cultural identity is rooted in his African‑American heritage and the history of the Southern United States. Born in the 1940s during segregation, he grew up attending a Black church
    that served as a community and activism hub, and his family preserved traditions of storytelling, soul‑food cooking, and gospel music. Relocating to Boone in the 1970s, he navigated a predominantly
    white Appalachian town while maintaining his cultural roots. His experiences with the civil‑rights movement, church leadership, and inter‑generational family ties shape his deep commitment to community
    harmony, mentorship, and celebrating Black cultural contributions within a rural setting.
attributes:
