personas:
  professional: Yuri Morejon, a seasoned dental and ophthalmic laboratory technician, merges 25 years of hand‑wax craftsmanship with modern CAD/CAM and 3‑D printing expertise, letting their artistic eye
    and relaxed curiosity guide meticulous prosthetic design while inventively troubleshooting lab equipment.
  sports: Yuri Morejon enjoys casual pickup basketball at a community center, follows the Chicago Bulls and Cubs with enthusiasm, and joins a local adult softball league, but their fitness routine remains
    sporadic, favoring short lakefront walks over structured gym workouts.
  arts: Yuri Morejon spends evenings painting watercolor cityscapes of Chicago alongside folk‑inspired motifs, draws inspiration from artists such as Diego Rivera and Edward Hopper, captures street moments
    with a vintage Leica camera, sculpts small 3‑D printed pieces, and strums acoustic guitar at local Latin jazz jam sessions featuring musicians like Eddie Palmieri.
  travel: Yuri Morejon favors spur‑of‑the‑moment cultural getaways, often booking budget flights to vibrant art hubs like Mexico City, Barcelona, and New Orleans, while also returning annually to a family
    cabin by the Great Lakes for quiet reflection, balancing a love of street photography with a modest travel budget.
  culinary: Yuri Morejon is an intermediate home cook who perfects mole poblano with a splash of Wisconsin cheddar and crafts tamales that fuse corn masa with locally sourced pork and roasted poblano peppers,
    regularly seasoning with fresh cilantro, dried chilies, and occasionally drawing inspiration from Chicago‑style deep‑dish pizza.
  core: Yuri Morejon is a 51‑year‑old lab artisan who seamlessly blends high‑tech prosthetic fabrication with watercolor street scenes, yet habitually misplaces the vintage camera lens cap and lets a delightful
    clutter of art supplies spill into their workspace.
background:
  cultural: Yuri is of Mexican descent and was raised in a bicultural Mexican‑American household in the Chicago metropolitan area. He grew up speaking Spanish at home and celebrating traditions such as
    Día de los Muertos, quinceañeras, and Mexican holidays, while also absorbing Midwestern values of independence and community involvement. His heritage informs his culinary tastes, musical preferences,
    and artistic sensibilities. He remains active in the local Mexican community, participating in cultural associations, bilingual outreach programs, and supporting Spanish‑speaking patients at his workplace.
    This blend of Mexican cultural roots and American experiences shapes his identity and guides his personal and professional pursuits.
attributes:
  skills: '[''Dental prosthetic fabrication (crowns, bridges, dentures)'', ''Orthodontic appliance creation'', ''Porcelain layering and shade matching'', ''CAD/CAM design and milling'', ''3‑D printing of
    dental and optical devices'', ''Digital intraoral scanning and data integration'', ''Ophthalmic lens edging and surfacing'', ''Custom low‑vision aid production'', ''Materials science (ceramics, composites,
    high‑index plastics)'', ''Quality control & inspection'', ''Laboratory equipment troubleshooting'', ''Inventory management & regulatory compliance'', ''Patient communication & interdisciplinary collaboration'',
    ''Artistic design & aesthetic judgment'']'
  hobbies: '[''Watercolor painting (Mexican folk motifs and cityscapes)'', ''Street photography with vintage camera'', ''Visiting art museums and galleries'', ''Attending live Latin jazz and mariachi performances'',
    ''Cooking traditional Mexican cuisine and experimenting with fusion dishes'', ''Exploring Chicago neighborhoods and cultural festivals'', ''3‑D printing small artistic sculptures'', ''Playing acoustic
    guitar'', ''Reading professional journals in dentistry and optics'', ''Volunteering at community eye‑health screenings'']'
  career_goals: Yuri aims to achieve Master Dental Technician certification and deepen his expertise in additive manufacturing for both dental and ophthalmic applications. He envisions opening a boutique
    laboratory in the Chicago area that blends high‑tech digital workflows with artisanal craftsmanship, offering affordable custom prosthetics and low‑vision devices to underserved Mexican‑American communities.
    He also aspires to mentor emerging technicians through workshops at a local community college and to publish articles on integrating artistic principles into clinical device design. Continuing education
    in biomedical engineering and advanced optics is part of his plan to stay at the forefront of innovation.
