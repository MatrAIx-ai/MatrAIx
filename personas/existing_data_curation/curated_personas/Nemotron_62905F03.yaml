  hobbies: '["Exploring local nature trails", "Sketching wildlife and natural features", "Building LEGO and model kits", "Playing Minecraft (creative mode)", "Reading science and nature books", "Participating
    in community clean‑up events", "Board games with friends"]'
  career_goals: Inspired by his love of the outdoors and his practical building skills, Christopher envisions a future where he can protect and understand natural environments while creating tangible solutions.
    He hopes to pursue a path that blends science and hands‑on work, such as wildlife conservation, environmental engineering, or becoming a park ranger. In the short term, he plans to attend a technical
    high school where he can deepen his knowledge of ecology and learn trade skills like carpentry or metalwork. He also aims to volunteer with local conservation groups, develop leadership abilities in
    small‑team settings, and eventually contribute to sustainable projects that benefit his community and the broader environment.
