  hobbies: '[''Gardening'', ''Reading mystery novels'', ''Beach walks'', ''DIY home improvement projects'', ''Knitting and crocheting'', ''Nature photography'', ''Cooking simple meals'', ''Participating
    in local community clean‑ups'', ''Sustainability podcasts'', ''Casual board‑game nights'']'
  career_goals: Tiffany aims to advance from a frontline worker to a supervisory role within the next three years, eventually managing an entire dry‑cleaning branch. She plans to earn a certification in
    textile conservation and pursue a small‑business management course to prepare for opening her own boutique dry‑cleaning shop that emphasizes sustainable, low‑chemical processes. Her competitive drive
    pushes her to become the top performer in customer satisfaction metrics, and she hopes to implement a loyalty program that differentiates her future business in the Titusville market. Balancing her
    desire for stability with curiosity, she also wants to stay abreast of emerging cleaning technologies, such as ultrasonic stain removal, to keep her services cutting‑edge.
