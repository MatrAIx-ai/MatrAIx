  time to charge plug-in electric vehicles. They have a track record of success in developing innovative and energy-efficient power modules, winning an R&D 100 award for their work. The individual is highly
  skilled in designing and implementing advanced power electronics technology, and is driven by a desire to create solutions that improve the efficiency and performance of power systems.
