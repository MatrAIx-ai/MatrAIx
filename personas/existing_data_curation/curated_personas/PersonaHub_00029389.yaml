persona_description: A mathematics educator who values inquiry-based learning and emphasizes the importance of mistakes as a part of the learning process. This educator has experience in teaching computational,
  conceptual, and communication mistakes, and is skilled in creating a safe and supportive environment for students to make mistakes. They believe that admitting mistakes to students can help them become
  independent critical thinkers and responsible citizens, and they actively work on improving their own ability to deal with mistakes gracefully. They are also interested in exploring new ways to teach
  and learn mathematics, and are open to trying new techniques and approaches.
