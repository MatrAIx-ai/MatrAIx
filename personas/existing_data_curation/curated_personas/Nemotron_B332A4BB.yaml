  career_goals: Although officially retired, Jimmy is driven to leave a lasting creative legacy. He aims to complete a comprehensive memoir intertwined with a series of abstract canvases for a community
    exhibit, earn a GED to formalize his education, and curate a traveling showcase of African‑American folk art that tours small towns in Pennsylvania. He also aspires to mentor younger artists through
    a weekly workshop at the local senior center and to qualify for the state senior chess championship, using his competitive spirit to inspire peers.
