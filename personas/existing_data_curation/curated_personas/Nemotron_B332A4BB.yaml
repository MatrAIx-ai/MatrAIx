personas:
  professional: Jimmy Rodgers, a self‑taught abstract painter, mixed-media creator, and community art curator, channels their imaginative curiosity and fierce competitive streak—refined by years of chess
    tournaments—into meticulously planned traveling folk-art exhibitions that rigorously spotlight authentic narratives while mentoring senior artists through weekly workshops.
  sports: Jimmy Rodgers stays active by walking the trails of the Clinton Senior Walking Club and tending his garden, while cheering on the Pittsburgh Steelers in fall football and the Pittsburgh Penguins
    during the icy hockey season, a blend of gentle exercise and passionate spectator fandom that satisfies their competitive spirit without overexertion.
  arts: Jimmy Rodgers immerses themselves in the improvisational world of Miles Davis, John Coltrane, and B B King while creating large‑scale abstract canvases inspired by the gestural energy of Jackson
    Pollock and the luminous patterns of Hilma af Klint, and they capture quiet woodland moments with a vintage Nikon, channeling their imagination into each brushstroke and shutter click.
  travel: Jimmy Rodgers prefers meticulously planned road trips that weave together personal genealogy and quiet contemplation, having journeyed to Savannah, Georgia, and New Orleans, Louisiana, to trace
    family roots, while also savoring the scenic charm of Lancaster, Pennsylvania, and dreaming of a future pilgrimage to the art‑laden streets of Paris.
  culinary: Jimmy Rodgers delights in preparing home‑cooked meals centered around heirloom tomatoes, from fresh tomato‑basil bruschetta to slow‑roasted beet and goat‑cheese salads, occasionally crafting
    a comforting shrimp étouffée seasoned with cayenne and thyme, a culinary rhythm that reflects their artistic improvisation and love for fragrant, garden‑fresh ingredients.
  core: Jimmy Rodgers, a 79‑year‑old abstract painter and chess enthusiast, mixes meticulous community‑art planning with a midnight habit of obsessively re‑listening to rare jazz vinyl, all while their
    vivid imagination is constantly tempered by a lingering worry that fuels both creative drive and occasional sleeplessness.
background:
  cultural: Jimmy is a second‑generation African‑American whose grandparents moved from rural Georgia to Pennsylvania during the Great Migration. Growing up in the 1950s and 60s in Clinton, he experienced
    a predominantly white, working‑class community while maintaining strong ties to Black church music, oral storytelling, and the civil‑rights activism of his youth. These experiences fostered a deep appreciation
    for African‑American artistic traditions—particularly jazz, blues, and folk narratives—which he weaves into his visual art and writing. His cultural identity is a source of both pride and introspection,
    informing his commitment to preserving Black history in the region.
