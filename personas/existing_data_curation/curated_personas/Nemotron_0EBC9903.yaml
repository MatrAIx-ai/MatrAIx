personas:
  professional: Rachiel Dehart, a 45‑year‑old seasoned casino security officer in Minneapolis, harnesses their detail‑oriented curiosity and pattern‑recognition expertise to monitor multiple CCTV feeds
    and draft concise incident reports, yet their relaxed approach to scheduling sometimes leads to delayed paperwork, and their competitive drive pushes them toward top‑tier response metrics, the pursuit
    of PSP and CPO credentials, and eventually a shift‑supervisor and statewide security‑operations manager role.
  sports: Rachiel Dehart follows the Minnesota Vikings and Timberwolves with fervor, enjoys solo hikes along the Mississippi River trails and bird‑watching at the Chain of Lakes, occasionally joins a small
    Sunday morning pick‑up soccer game but avoids large crowds, preferring the quiet satisfaction of personal fitness routines and occasional fishing trips on Lake Minnetonka.
  arts: Rachiel Dehart, an urban night photographer, captures the interplay of light on Minneapolis’s skyline inspired by Henri Cartier‑Bresson, collects vintage Leica lenses, listens to The Black Keys
    and true‑crime podcasts like "Serial," and attends occasional gallery openings featuring noir‑themed photography while also enjoying classic film noir movies such as "Double Indemnity."
  travel: Rachiel Dehart prefers spontaneous road trips to nearby Minnesota lakes, the Boundary Waters, and occasional weekend getaways to Vancouver, yet dreams of a winter photography expedition to Iceland’s
    auroras; they plan loosely, book last‑minute flights, balance a modest travel budget with occasional splurges on a brew‑tour in Belgium, and deliberately avoid crowded tourist hotspots in favor of quiet,
    off‑the‑beaten‑path locales.
  culinary: Rachiel Dehart brews craft beer at home, experimenting with hop varieties like Simcoe, Citra, and a touch of orange peel in a seasonal IPA they dub "Midnight Skyline," enjoys cooking walleye
    au poivre, reuben sandwiches, and hearty chili, their cooking skill is intermediate, and they relish pairing their brews with sharp cheddar while keeping an eye on sodium intake.
  core: Rachiel Dehart blends a keen eye for surveillance patterns with a restless curiosity, night‑time photography, and a competitive streak that fuels both their career ambitions and home‑brew experiments.
background:
  cultural: 'Rachiel was raised in a middle‑class white family in the suburbs of Minneapolis, with German‑Scandinavian ancestry common in Hennepin County. Her upbringing reflected typical Midwestern values:
    practicality, modesty, self‑reliance, and a strong sense of community. Frequent family gatherings around holiday traditions such as Thanksgiving and the Lutheran liturgical calendar reinforced her respect
    for routine while her parents encouraged curiosity and independent problem solving. Growing up in harsh winters and a landscape dotted with lakes fostered an appreciation for outdoor recreation and
    an adaptive, pragmatic outlook. These cultural influences blend with her reserved demeanor and competitive streak, shaping her approach to both personal and professional life.'
attributes:
