  hobbies: '[''True‑crime reading'', ''Investigative podcasts'', ''Urban night photography'', ''Hiking'', ''Birdwatching'', ''Puzzle solving (crosswords, Sudoku)'', ''Chess'', ''Strategy board games'',
    ''Home brewing'', ''DIY electronics projects'']'
  career_goals: Rachiel’s primary career ambition is to move from floor surveillance officer to shift supervisor and eventually to security operations manager for a statewide casino network. She plans to
    earn the Physical Security Professional (PSP) and Certified Protection Officer (CPO) credentials, and to deepen her expertise in risk‑assessment methodologies. In the longer term, she envisions launching
    a consulting practice that offers loss‑prevention training and technology integration for midsized gaming venues. Her competitive nature fuels a desire to be recognized as a top performer in incident
    response metrics and to mentor newer guards.
