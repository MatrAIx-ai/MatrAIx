  career_goals: Pedro aims to transition from independent street vending to a supervisory role within a regional sales team, with the long‑term goal of opening his own boutique that blends local Cajun crafts
    with contemporary art pieces. To achieve this, he plans to complete his associate degree in business administration, earn certifications in sales management, and develop a small online store that showcases
    locally sourced products. He also hopes to become a mentor for new sales representatives, fostering a supportive, collaborative environment that reflects his cooperative nature.
