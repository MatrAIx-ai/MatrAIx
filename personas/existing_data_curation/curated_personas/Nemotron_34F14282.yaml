  career_goals: Claire aims to transition from a mid‑level developer to a senior engineering role within the next three to five years, eventually moving into a software architect or technical lead position.
    She plans to solidify her credentials by completing a professional certification in cloud architecture (AWS Solutions Architect) and pursuing a bachelor's degree in computer science part‑time. Her long‑term
    ambition is to lead a focused development team that delivers reliable, user‑centric applications, while mentoring junior programmers and fostering a collaborative, structured work environment that aligns
    with her organized and dependable personality.
