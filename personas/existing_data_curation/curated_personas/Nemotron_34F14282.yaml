personas:
  professional: Claire Sousa, a mid‑level full‑stack developer, writes clean Python and Java code, builds responsive React front‑ends, orchestrates Docker‑based CI pipelines, and applies an organized, test‑driven
    methodology that mirrors their love for structure and incremental progress.
  sports: Claire Sousa, an early‑morning runner and weekly yoga practitioner, belongs to the Seattle Road Runners club, follows the Seattle Sounders FC during the MLS season, and tunes into Seattle Kraken
    hockey games for an added competitive spark.
  arts: Claire Sousa, an avid non‑fiction reader, also draws creative inspiration from minimalist composer Philip Glass, filmmaker Christopher Nolan, and jazz legend Miles Davis, regularly attending tech‑themed
    art installations to blend structure with artistic expression.
  travel: Claire Sousa plans trips with detailed itineraries, favoring short, well‑structured city breaks like a weekend in Reykjavik, a cultural immersion in Kyoto, and a nature retreat in the Lake District,
    while dreaming of longer explorations to Patagonia, Santorini, and the Scottish Highlands as their career progresses.
  culinary: Claire Sousa, a meticulous home cook, delights in mastering precise recipes such as classic ratatouille, miso‑glazed salmon, and soda bread, savoring ingredients like eggplant, fresh dill, smoked
    paprika, and sea‑salt caramel to balance flavor and technique.
  core: Claire Sousa blends a programmer’s logical precision with a puzzle‑solver’s patience, obsessively aligning code and life into tidy blocks while occasionally succumbing to over‑planning and a stubborn
    reluctance to deviate from a well‑structured routine.
background:
  cultural: Claire grew up in Canton, Ohio, in a family that blends Portuguese and Irish ancestry, reflected in her last name Sousa and family traditions. Her parents emphasized Midwestern values of hard
    work, reliability, and community engagement, while also celebrating Portuguese holidays such as Festa de São João and Irish cultural events like St. Patrick's Day. This multicultural upbringing fostered
    an appreciation for diverse cuisines, music, and a respectful, cooperative mindset. Claire’s cultural identity combines the pragmatic, down‑to‑earth perspective typical of the Midwest with a subtle
    appreciation for her European roots, which influences her cooking, family gatherings, and community involvement.
