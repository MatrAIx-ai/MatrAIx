personas:
  professional: Miranda Haas, an experienced curriculum developer and data‑driven instructional leader, leverages analytical rigor, technology integration, and calm conflict resolution to design evidence‑based
    programs while tolerating the occasional disorganization that arises from her preference for flexible, solitary work.
  sports: Miranda Haas, a dedicated trail runner and weekend cyclist, logs early morning miles on the Scioto Mile paths while cheering on the Columbus Crew SC during MLS season and the Cleveland Browns
    in the fall, and maintains a membership with the local Scioto River Running Club to stay accountable to her fitness goals.
  arts: Miranda Haas, an avid follower of modern photography, regularly studies the work of Ansel Adams and Annie Leibovitz for compositional inspiration, while her playlists feature Philip Glass's minimalist
    scores and the folk nuances of Sufjan Stevens, and she occasionally attends off‑beat performances at the Columbus Museum of Art's film series.
  travel: Miranda Haas, a meticulous planner who prefers low‑key, nature‑focused getaways, often spends long weekends hiking the Cuyahoga Valley National Park in Ohio and earmarks future trips to the remote
    islands of Iceland's Westfjords and Japan's Shikoku pilgrimage route, always booking budget‑friendly hostels well in advance and limiting travel to periods that avoid school‑year commitments.
  culinary: Miranda Haas, a methodical home chef, enjoys experimenting with sous‑vide salmon, perfecting the fermentation of kimchi, and baking sourdough loaves by meticulously timing proofing stages, always
    referencing the precise ratios in On Food and Cooking by Harold McGee and incorporating ingredients like Himalayan pink salt and heirloom tomatoes.
  core: Miranda Haas blends analytical rigor with solitary curiosity, navigating career and life through data‑driven decisions, quiet hobbies, and a calm yet competitively skeptical mindset that fuels both
    her professional ambitions and personal quirks.
background:
  cultural: Miranda grew up in a middle-class family in the Columbus metropolitan area, where Midwestern values of modesty, practicality, and community orientation shaped her outlook. Her family’s European
    heritage—predominantly German and Irish—instilled a respect for education and a strong work ethic. While she identifies with broader American cultural norms, she often draws on the region’s emphasis
    on self-reliance and calm resilience in both her personal and professional life.
attributes:
  skills: '[''Curriculum Design'', ''Instructional Design'', ''Educational Technology Integration'', ''Data-driven Decision Making'', ''Team Leadership'', ''Strategic Planning'', ''Budget Management'',
    ''Process Improvement'', ''Conflict Mediation'', ''Stakeholder Communication'']'
  hobbies: '[''Reading non-fiction'', ''Gardening'', ''Solo hiking and nature photography'', ''Crossword puzzles'', ''Sudoku'', ''Quiet cooking/baking'', ''Journaling'', ''Listening to classical music'']'
  career_goals: She aspires to become a district-wide Director of Curriculum and Instruction, where she can shape large-scale learning initiatives while preserving flexibility for innovative pilot projects.
    In the next five years, she plans to earn a Master’s in Educational Leadership and launch an evidence-based professional development program that positions her district as a model for data-informed
    instruction.
