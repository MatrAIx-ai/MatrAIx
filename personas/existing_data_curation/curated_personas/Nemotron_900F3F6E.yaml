personas:
  professional: Linda Walls is a veteran retail cashier with three decades of point‑of‑sale mastery, who now channels her meticulous organizational skills and passion for art into coordinating senior‑center
    events and preparing to serve as a volunteer docent at the Plains Art Museum.
  sports: Linda Walls is an avid member of the Fargo‑Moorhead Senior Hiking Club, tackling gentle trails along the Red River Valley each weekend, while cheering on the Minnesota Vikings on Sundays and rooting
    for the Fargo‑Moorhead RedHawks during the baseball season, and they occasionally join a local shuffleboard league to stay active.
  arts: Linda Walls immerses herself in the regional art scene, attending the Plains Art Museum’s exhibitions of works by Georgia O’Keeffe and Andy Warhol, taking watercolor classes inspired by Winslow
    Homer, and collecting prints by local artist Tim Johnson; they also enjoy listening to the music of Norah Jones and watching classic films starring Audrey Hepburn.
  travel: Linda Walls prefers well‑planned cultural getaways, having already visited the Art Institute of Chicago and the Metropolitan Museum of Art in New York, they now dream of a summer trip to Paris
    to see the Louvre, while they regularly take short road trips to nearby Sioux Falls and keep travel expenses within their senior‑friendly budget.
  culinary: Linda Walls delights in experimental baking, frequently whisking up rose‑infused lavender shortbread and raspberry‑cream cheese tartlets, while their dinner menu often features herb‑roasted
    chicken with rosemary and sage, and they love pairing their creations with a glass of Pinot Gris; their garden of roses also supplies fresh petals for jam and desserts.
  core: Linda Walls blends a sharp, organized mind with a curious love for art and community, balancing meticulous budgeting and health routines with lively bridge games, weekend hikes, and experimental
    baking, all while planning their next art‑focused adventure.
background:
  cultural: Linda grew up in the Upper Midwest, raised in a largely German‑Scandinavian Protestant community that values hard work, neighborly support, and modest living. Her family traditions include folk
    arts such as quilting and barn‑painting, which fuel her appreciation for regional craftsmanship. Living in Fargo, North Dakota, she blends small‑town values with exposure to a growing, diverse urban
    culture, participating in community festivals, local church gatherings, and the city’s vibrant arts scene. This Midwestern heritage shapes her practical mindset, community‑oriented outlook, and openness
    to exploring new ideas while staying rooted in regional customs.
