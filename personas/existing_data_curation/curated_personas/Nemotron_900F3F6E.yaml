  career_goals: Linda aims to transition from full‑time cashier work to a volunteer docent position at the Plains Art Museum, where she can share her love of art with visitors. She also plans to complete
    a short certificate in gerontology to better serve the senior community through program coordination. Over the next few years she hopes to launch a weekly art‑appreciation club for seniors, travel to
    renowned art hubs such as Chicago and New York, and mentor the next generation of cashiers in customer‑service excellence, ensuring a smooth hand‑over when she fully retires.
