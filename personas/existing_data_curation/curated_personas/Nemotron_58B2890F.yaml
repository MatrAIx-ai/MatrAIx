  hobbies: '["Gardening", "Hiking", "Birdwatching", "Quilting", "Reading historical fiction", "Crossword puzzles", "Sudoku", "Bridge", "Community theater", "Volunteering at museum", "Dancing at senior center",
    "Cooking seasonal dishes", "Mentoring robotics club"]'
  career_goals: Although retired from formal employment, Merissa is determined to keep contributing her STEM expertise to the community. She aims to mentor high‑school students in local robotics and coding
    clubs, serve on the advisory board of the Meridian Science Center, and develop workshops that introduce older adults to basic digital literacy and AI tools. She also plans to lead a community garden
    that applies scientific principles of soil health and water conservation, blending her curiosity with practical sustainability. On a personal level, Merissa hopes to author a series of reflective essays
    on aging, technology, and resilience, and to engage in lifelong learning to counterbalance her tendency toward worry by staying intellectually active.
