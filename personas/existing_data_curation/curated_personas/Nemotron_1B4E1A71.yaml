personas:
  professional: Kitrena Hiers, a retired physicist and computer scientist turned interdisciplinary storyteller, blends their analytical prowess in data modeling and Python programming with a vibrant creative
    streak, curating art-science workshops, mentoring makerspace robotics projects, and drafting a speculative-fiction novel that weaves authentic scientific concepts into narrative, all while organizing
    community events with meticulous yet flexible planning.
  sports: Kitrena Hiers stays fit through regular walks along Gulf Coast nature trails, participates in the Gulf Coast Senior Running Club's weekend jogs, enjoys water aerobics at the local community center,
    follows the New Orleans Saints, Miami Heat, and Houston Astros with enthusiastic game-day gatherings, and sharpens their strategic mind playing chess at the community center's senior league.
  arts: Kitrena Hiers expresses their creative soul through watercolor coastal landscapes reminiscent of Winslow Homer, fluid calligraphy inspired by traditional brush techniques, captures sunset photography
    with a vintage Nikon, and finds narrative fuel in the works of Ursula K. Le Guin, Isaac Asimov, and Jane Austen, all of which shape their speculative-fiction writing and community art-science events.
  travel: Kitrena Hiers plans their travels with a blend of meticulous research and spontaneous curiosity, favoring coastal retreats such as Sanibel Island and the Outer Banks, while also cherishing culturally
    rich trips to Kyoto for calligraphy workshops and Florence for culinary inspiration, balancing modest budgets with occasional splurges on photography tours.
  culinary: Kitrena Hiers delights in experimental fusion cuisine, often seasoning shrimp tacos with garden-grown lime zest and cilantro, crafting basil-tarragon pesto for grilled vegetables, and perfecting
    a citrus-infused jambalaya, all while proudly mastering techniques from James Beard recipes and occasionally over-spicing dishes due to their adventurous palate.
  core: Kitrena Hiers is a curious blend of scientific rigor and artistic flair, balancing disciplined project management with spontaneous watercolor strokes, and occasionally misplacing their reading glasses
    during midnight coding sessions.
background:
  cultural: Kitrena is a White American of European descent who grew up in the Midwest during the 1960s and 1970s, experiencing a culture of industriousness and community involvement. After a long career
    in engineering, she retired to Bradenton, Florida, embracing the region’s relaxed coastal lifestyle while staying connected to the broader American senior community, which values volunteerism, lifelong
    learning, and intergenerational harmony. Her cultural outlook blends Midwestern pragmatism with the eclectic, arts‑friendly atmosphere of the Gulf Coast, shaping her appreciation for both scientific
    rigor and creative expression.
