  hobbies: '[''Watercolor painting'', ''Birdwatching'', ''Calligraphy'', ''Science-fiction reading'', ''Classic literature reading'', ''Fusion cooking'', ''Gardening'', ''Photography'', ''Chess'', ''Volunteer
    mentoring at makerspace'']'
  career_goals: Her current ambition is to author a speculative‑fiction novel that weaves authentic scientific principles into narrative, launch a community makerspace program that mentors high‑school girls
    in STEM‑art integration, and serve as a docent at the local art museum to bridge science and visual art for senior visitors. She also hopes to continue formal learning through online courses in environmental
    science and photography, expanding her creative and intellectual horizons.
