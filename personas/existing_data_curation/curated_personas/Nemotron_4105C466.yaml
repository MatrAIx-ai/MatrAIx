  career_goals: Oscar aims to formalize his passion for community arts by establishing a nonprofit cultural center in Ponce that offers free art workshops, mentorship programs for at‑risk youth, and a rotating
    gallery for emerging Puerto Rican artists. He plans to secure grant funding to sustain the center and hopes to complete a certification in arts administration to strengthen his organizational capacity.
    Long‑term, he envisions becoming a cultural heritage educator, integrating art therapy techniques to support mental‑health initiatives within his community.
