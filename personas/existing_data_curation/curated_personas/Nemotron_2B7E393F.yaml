  career_goals: Gregg aims to transition from employee to owner‑operator of his own landscaping firm within the next five years, focusing on eco‑friendly services such as native‑plant landscaping, rain‑garden
    installation, and smart‑irrigation systems. He plans to obtain additional certifications—Certified Landscape Contractor and Certified Arborist—to broaden his expertise. He also hopes to secure contracts
    with municipal parks and local schools, positioning his business as a community partner for green‑space stewardship. Long‑term, Gregg envisions mentoring younger workers, establishing a reputation for
    high‑quality, cost‑effective projects, and eventually selling the business at a comfortable retirement age while retaining a consulting role.
