personas:
  professional: Hany Sotocintron is a 32‑year‑old bookkeeper who leverages QuickBooks and advanced Excel analytics to streamline accounts payable, receivable, and payroll, while their curiosity for new
    accounting software fuels occasional workflow experiments that sometimes leave their digital filing slightly chaotic, and they channel their bilingual communication skills to mentor junior staff on
    their path toward CPA certification and a future lead accountant role.
  sports: Hany Sotocintron fuels their competitive edge by playing beach volleyball with a local Los Angeles club and tackling weekend hikes in the Santa Ana Mountains, while cheering on the Los Angeles
    Dodgers and the LA Galaxy, and they squeeze in occasional yoga classes to counterbalance the impact of their high‑energy social sports.
  arts: Hany Sotocintron’s artistic soul shines on salsa and bachata nights where they twirl to the rhythms of Marc Anthony and Celia Cruz, they dominate karaoke sessions belting out Livin’ la Vida Loca,
    and they relish visiting Riverside’s community theater for indie productions featuring actors like Lupita Nyong’o.
  travel: Hany Sotocintron is an avid weekend explorer who hikes Joshua Tree and camped under the stars in Grand Canyon National Park, they’ve taken a road trip to Tijuana to sample authentic street tacos,
    and they dream of dancing the nights away in Barcelona’s La Rambla while keeping travel spending within a modest budget.
  culinary: Hany Sotocintron loves cooking Mexican comfort food, meticulously preparing homemade guacamole, chiles en nogada, and fresh corn tortillas for family gatherings, they experiment with smoky chipotle
    marinades and often swap recipes on cooking forums, yet their pantry is occasionally a chaotic mess of spices they never fully label.
  core: Hany Sotocintron is a sociable, competitive bookkeeper with a penchant for late‑night dances, a relaxed approach to budgeting, and a habit of starting projects—whether spreadsheets or sauces—full
    of enthusiasm only to let them trail off when routine sets in.
background:
  cultural: Born to Mexican parents, Hany grew up immersed in both Mexican traditions and Southern Californian culture. She is fluent in Spanish and English, actively celebrates Día de los Muertos, Mexican
    Independence Day, and family milestones with festive meals and music. Her cultural heritage shapes her strong sense of community, emphasizes the importance of family ties, and influences her culinary
    interests, while her American upbringing encourages a pragmatic approach to career and personal growth.
attributes:
