  hobbies: '[''Salsa dancing'', ''Hiking'', ''Cooking traditional Mexican cuisine'', ''Volunteering at local community events'', ''Karaoke'', ''Gardening'', ''Playing beach volleyball'', ''DIY home decoration'']'
  career_goals: Hany aims to obtain her CPA certification within the next three years to qualify for senior accounting roles. She aspires to become a lead accountant or finance manager at a mid-sized firm,
    where she can mentor junior staff and oversee a small team. Long‑term, she envisions launching her own boutique bookkeeping consultancy that offers flexible services to small businesses, allowing her
    to blend her competitive drive with her preference for adaptable, client‑focused work environments.
