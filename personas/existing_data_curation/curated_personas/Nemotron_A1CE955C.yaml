    at local museum", "Gardening", "Cycling", "Attending public lectures on sustainability", "Practicing calligraphy", "Craft beer brewing"]'
  career_goals: Approaching retirement, Son aims to transition into a mentorship and advisory role, establishing a consultancy focused on sustainable logistics for mid‑size companies in the Boulder region.
    He plans to earn the Certified Transportation Professional (CTP) credential and launch a pilot program that integrates electric trucks and renewable fuel sources into existing fleets. Additionally,
    Son hopes to partner with local arts and community organizations to develop educational workshops that link the creative arts with transportation design, leveraging his appreciation for unconventional
    thinking. He is also passionate about championing age‑diverse workforce initiatives, seeking to create mentorship pathways for younger workers while advocating for the value of seasoned expertise in
    the industry.
