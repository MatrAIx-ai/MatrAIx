persona_description: A professional architect who specializes in historic preservation and restoration, particularly focusing on the restoration of Spanish colonial missions in San Antonio, Texas. She has
  worked on the missions since the 1960s and has been involved in the restoration efforts of the four active parishes in conjunction with the National Park Service. She is currently working on the restoration
  of the Mission Concepción and has made an interesting discovery of remnants of Spanish frescos on the original wall beneath the 19th-century plaster.
