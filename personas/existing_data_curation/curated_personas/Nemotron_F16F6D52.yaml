personas:
  professional: Maygen Holler, a pint-sized aspiring engineer, builds functional LEGO machines and uses their curiosity and pragmatic mindset to turn playtime ideas into tiny prototypes, often competing
    with peers for the most inventive build while sometimes leaving spare bricks scattered because they favor flexibility over strict organization, and they love to see who can create the fastest moving
    LEGO car.
  sports: Maygen Holler, a lively participant in neighborhood tag games and after‑school soccer with the Little Lions club, also cheers for the New York Yankees and the Los Angeles Lakers, channeling competitive
    energy into sprint races during school field days and proudly wearing the teams’ colors, and they celebrate each victory with a celebratory dance, even as they sometimes doubt the fairness of a referee’s
    call.
  arts: Maygen Holler, an avid doodler, fills sketchbooks with bright scenes inspired by the whimsical worlds of Dr. Seuss, Pixar's Toy Story, and the playful songs of Taylor Swift, often performing animated
    finger dances to the beat of Shake It Off, and they proudly display their artwork at the community block party, while occasionally questioning the value of abstract art they don’t understand.
  travel: Maygen Holler, a curious explorer, loves weekend trips to the local city park's butterfly garden and dreams of visiting the Grand Canyon and the Eiffel Tower, preferring hands‑on scavenger hunts
    over long car rides, and they sometimes get frustrated when itineraries change unexpectedly, yet they eagerly pack a small backpack with snacks and a magnifying glass for spontaneous adventure.
  culinary: Maygen Holler, a budding chef, enjoys assembling peanut butter and banana sandwiches, munching on carrot sticks with hummus, and experimenting with rainbow fruit kebabs, yet they often forget
    to wash hands before eating and can be coaxed into trying new foods if a story about the ingredients is told, while they sometimes hoard extra grapes for later.
  core: Maygen Holler, a six‑year‑old bundle of boundless energy, mixes fierce competition with a love for creative building, thrives on group play, yet occasionally loses focus and hoards snacks, making
    them both a lively friend and a tiny tornado of curiosity, and they often surprise adults with unexpected insights.
background:
  cultural: Maygen grows up in a vibrant Brooklyn neighborhood where mainstream American traditions blend with the city’s multicultural rhythm. Her family observes holidays like Thanksgiving, Halloween,
    and Fourth of July, while also joining neighborhood festivals that showcase diverse cuisines, music, and languages. Frequent visits to the Brooklyn Public Library, children’s museums, and city parks
    expose her to a wide range of cultural experiences, fostering an open‑minded outlook and comfort with diversity, even as she is raised in a white household within this dynamic urban setting.
attributes:
  skills: '["letter recognition", "basic phonics reading", "counting to 20", "fine‑motor coordination", "LEGO building", "group collaboration"]'
  hobbies: '["park group games", "relay races", "LEGO construction", "drawing", "library storytime", "basic science experiments", "community block parties"]'
  career_goals: Maygen dreams of becoming an astronaut who explores space and solves cosmic puzzles, but she also imagines designing practical tools that help everyday people, like a friendly robot for
    kids. She expresses a wish to be a teacher one day, sharing knowledge and leading group activities, while her competitive side fuels the ambition to win science fair ribbons for clever, hands‑on projects.
