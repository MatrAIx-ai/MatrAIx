  career_goals: Although retired, Kyle remains goal‑oriented. He aims to deepen his involvement with the Waukesha Historical Society, helping to document and preserve local heritage. He plans to lead a
    community‑garden initiative at the senior center, mentoring younger volunteers in sustainable gardening practices. Kyle is also pursuing a basic digital photography workshop so he can capture family
    moments and community events, creating a visual archive for future generations. He hopes to obtain a first‑aid certification to support emergency response efforts among seniors. Finally, Kyle aspires
    to bridge generations by sharing his life experiences and practical knowledge through school talks and intergenerational programs, leaving a lasting positive impact on his community.
