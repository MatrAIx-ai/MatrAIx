  hobbies: '[''Classic car restoration'', ''Woodworking'', ''True‑crime reading'', ''Deer hunting'', ''Fly fishing'', ''Hiking'', ''Pickup softball'', ''Model railroad building'']'
  career_goals: Robert aims to advance to a supervisory role within the department—first to sergeant, then to lieutenant—and eventually lead the investigative division. He is eager to develop a specialized
    unit focused on data‑driven crime prevention and modern forensic technologies. Completing a state‑certified homicide investigation program is a near‑term objective, and later, he plans to transition
    to a private security consulting role where he can apply his practical experience and analytical mindset to advise on risk management, training programs, and community safety initiatives. Throughout
    his career, he wants to foster a culture of continuous learning, professionalism, and efficiency among his colleagues.
