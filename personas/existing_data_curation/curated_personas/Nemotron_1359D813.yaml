personas:
  professional: Terry Burton, a preschool enthusiast who loves building LEGO castles and asking endless “why” questions, already displays the collaborative spirit and creative problem‑solving that will
    later translate into a career as a child‑focused designer or educator.
  sports: Terry Burton kicks a ball with the Zionsville Little Soccer Club every Saturday, cheers for the Indiana Pacers during basketball season, and eagerly joins the family’s winter sledding outings
    down the local hill, preferring small‑group play to big‑crowd games.
  arts: Terry Burton spends afternoons finger‑painting at the town’s community arts festival, sings along to Raffi’s “Baby Beluga,” and can recite the lines from Sesame Street’s Cookie Monster with unabashed
    enthusiasm, reflecting a deep love for colorful, interactive storytelling.
  travel: Terry Burton enjoys car rides to the Indianapolis Children’s Museum and summer trips to Mammoth Cave, and dreams of a future family adventure to Walt Disney World’s Magic Kingdom, preferring carefully
    planned short trips over long, unstructured journeys.
  culinary: Terry Burton loves dipping apple slices into peanut butter, devouring cheesy macaroni, and eagerly helps stir the batter when making homemade pizza, yet they stubbornly refuse broccoli, making
    dinner a frequent negotiation.
  core: Terry Burton is a curious, gentle four‑year‑old who balances a love for imaginative play with a relaxed, sometimes scattered approach to daily routines, always ready to share a smile or a sticker
    with friends.
background:
  cultural: Terry is a white American growing up in Zionsville, Indiana, a suburban community known for its small‑town charm and strong emphasis on neighborly support. His family celebrates typical Midwestern
    traditions such as Thanksgiving, Fourth of July barbecues, and local community arts festivals, providing him with exposure to music, crafts, and public performances. The town’s quiet streets and nearby
    parks encourage outdoor exploration, while the local preschool and library foster early social interaction in small groups, aligning with his reserved yet cooperative nature. Though his cultural upbringing
    reflects mainstream American values of kindness, humility, and community involvement, his parents encourage openness to diverse ideas and artistic expression, nurturing his curiosity about the world
    beyond his immediate surroundings.
