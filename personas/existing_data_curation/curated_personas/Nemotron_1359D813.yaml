  career_goals: Although still very young, Terry often talks about what he wants to be when he grows up. He dreams of becoming an artist who can paint bright, joyful scenes that make people smile, and he
    imagines teaching younger children how to create their own art in a caring, supportive environment. He also expresses a wish to work in a role that helps animals or people—such as a veterinarian or
    a community helper—reflecting his deep compassion and desire for harmony. In the future, he hopes to combine his love for creativity with a job that lets him bring comfort and inspiration to others,
    while keeping his schedule flexible enough to explore new ideas.
