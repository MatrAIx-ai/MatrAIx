personas:
  professional: Robyn Hansen runs a thriving freelance photography practice that blends analog mastery with AI-assisted digital editing, delivering fine-art landscape and portrait projects while mentoring
    emerging women photographers, curating community exhibitions, and planning a photo book that juxtaposes Tarrytown’s historic architecture with abstract compositions, and they constantly explore new
    visual narratives through sustainable printing methods.
  sports: Robyn Hansen enjoys leisurely walks along the Hudson River shoreline, participates in a local senior center’s weekly shuffleboard league, and avidly follows the New York Giants and the Westchester
    Knicks, balancing low-impact exercise with occasional weekend tennis at a nearby club, and they often track their steps using a smartwatch.
  arts: Robyn Hansen immerses themselves in visual culture by attending Hudson River Museum lectures, studying Hudson River School paintings, collecting vintage 35 mm cameras, and drawing inspiration from
    Ansel Adams, Diane Arbus, and contemporary abstract artists like Julie Mehretu, while also curating pop-up exhibitions that spotlight interdisciplinary work, and they frequently collaborate with local
    poets to integrate text into visual displays.
  travel: Robyn Hansen prefers thoughtfully planned, off-season trips that blend scenic river retreats in the Hudson Valley—such as a weekend in Cold Spring—with occasional overseas pilgrimages to Italy’s
    Tuscan countryside to photograph Renaissance architecture, balancing a modest travel budget with a desire for artistic inspiration, and they often document each journey in a hand-bound sketchbook.
  culinary: Robyn Hansen delights in cooking seasonal farm-to-table meals, often preparing rosemary-infused roasted chicken with root vegetables, heirloom beet salad with goat cheese, and homemade preserves
    from local strawberries, while experimenting with vintage copper cookware and occasionally over-salting dishes, and they sometimes share recipes with the senior center cooking club.
  core: Robyn Hansen is a 61-year-old analog-digital photographer who merges vintage camera craftsmanship with AI tools, mentors women artists, practices yoga, savors farm-fresh cuisine, and they juggle
    meticulous finances with a tendency to forget dental floss.
background:
  cultural: Robyn grew up in a middle‑class white family in suburban New York during the 1960s and 1970s, where exposure to the Hudson River School painters and the region’s historic estates sparked her
    early love of visual art. Her parents encouraged a broad education that included literature, music, and community service, shaping a culturally rich but grounded upbringing. Living her adult life in
    Westchester County, she has absorbed the area’s blend of historic preservation, affluent patronage of the arts, and a vibrant local artist community. These influences, combined with her American Mid‑Atlantic
    heritage, inform her aesthetic sensibility and commitment to fostering inclusive artistic spaces.
attributes:
  skills: '["Portrait photography", "Conceptual fine‑art photography", "Landscape photography", "Studio lighting design", "Digital post‑processing (Lightroom, Photoshop, AI tools)", "Analog darkroom techniques",
    "Archival preservation and print production", "Exhibition curation", "Visual storytelling and direction", "Freelance business management", "Mentorship and teaching"]'
  hobbies: '["Hudson River walking and sketching", "Reading modern philosophy, art history, and speculative fiction", "Collecting and restoring vintage cameras", "Yoga and meditation", "Farm‑to‑table cooking",
    "Teaching photography workshops at a senior center", "Attending museum lectures and gallery openings", "Travel photography trips across the Northeast"]'
  career_goals: Robyn aims to publish a curated photo book that juxtaposes the historic architecture of Tarrytown with contemporary abstract compositions, followed by a solo exhibition at a regional gallery.
    She aspires to expand her teaching practice by offering advanced workshops at the Westchester Community College and to develop a mentorship program for women photographers entering the field. Additionally,
    she seeks to integrate sustainable printing methods and experiment with AI‑enhanced imaging to push the boundaries of visual narrative. Long‑term, she hopes to establish a small artist‑run space that
    showcases interdisciplinary work and fosters community collaboration.
