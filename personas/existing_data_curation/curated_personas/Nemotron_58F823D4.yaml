  hobbies: '[''Book Club'', ''Volunteer at Local Shelter'', ''Group Fitness (Zumba)'', ''Hiking'', ''Cooking'', ''Improv Theater'', ''Gardening'', ''Salsa Dancing'', ''Collecting Vintage Science Magazines'',
    ''Reading Personal Development Books'']'
  career_goals: Silveria aspires to become a clinical supervisor and eventually a director of community mental health services in Jacksonville. She aims to develop a comprehensive, evidence‑based outreach
    program that blends traditional counseling with digital tools, expanding access for underserved families. Over the next five years she plans to earn her Licensed Clinical Professional Counselor (LCPC)
    certification, complete advanced training in trauma‑informed care, and publish a guide on integrating routine‑based therapeutic models with flexible group interventions. Her long‑term ambition includes
    establishing a private practice that emphasizes structured, data‑driven treatment while offering spontaneous community workshops to foster resilience.
