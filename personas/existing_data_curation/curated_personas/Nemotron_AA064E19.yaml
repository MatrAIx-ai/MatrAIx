personas:
  professional: Cindy is a budding junior scientist who meticulously records her backyard insect discoveries in a tiny field journal, balancing an eager curiosity about nature with a practical, organized
    approach and a competitive streak that drives them to compare findings with friends.
  sports: Cindy enjoys energetic T‑ball sessions with the Wheaton Little League in spring and weekend soccer drills at the Wheaton Youth Soccer Club in fall, cheering loudly for the Chicago Cubs and the
    Chicago Bulls while proudly wearing their team‑colored sneakers during every practice.
  arts: Cindy delights in singing Raffi’s Baby Beluga during library storytimes, reenacting scenes from Disney’s Frozen with a homemade snowflake costume, and collecting picture books by Dr. Seuss, letting
    those vibrant tales shape their imaginative play.
  travel: Cindy loves family road trips to nearby attractions like Chicago’s Navy Pier and the historic pumpkin farms of the Midwest, and dreams of an adventurous summer vacation at Disney World and a snowy
    visit to the Eiffel Tower, always clutching a map and asking endless 'why?' questions as they travel.
  culinary: Cindy prefers cheesy macaroni, chicken nuggets, and apple slices with peanut butter, proudly helps stir pancake batter and sprinkle cinnamon on pumpkin pie, yet often makes a mess by over‑loading
    their plate with extra chocolate sprinkles.
  core: Cindy is a curious yet practical five‑year‑old who meticulously organizes her crayons by color, fiercely debates the best dinosaur names, and can’t resist counting every step on the way to the kitchen,
    often giggling when they finish a perfect tally.
background:
  cultural: 'Cindy is raised in a middle‑class white family in Wheaton, a suburban community in DuPage County, Illinois. Her upbringing reflects typical Midwestern American values: a strong emphasis on
    education, community involvement, and participation in local traditions such as library storytimes, county fairs, pumpkin patches, and holiday celebrations like Thanksgiving, Christmas, and the Fourth
    of July. The family’s regular attendance at community events and school activities shapes her sense of belonging and cultural identity.'
