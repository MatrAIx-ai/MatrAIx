  hobbies: '[''home gardening'', ''cooking traditional Puerto Rican dishes'', ''coastal walking'', ''listening to plena and salsa music'', ''crochet and sewing'', ''attending community festivals and church
    events'', ''reading historical novels'', ''volunteering at the senior center'']'
  career_goals: Lourdes hopes to expand her role as a cultural mentor in Vega Baja by leading informal cooking workshops that celebrate Puerto Rican heritage, especially for younger residents. She aims
    to volunteer regularly at the local senior center, offering assistance with event planning and digital‑literacy classes for seniors. While she enjoys a flexible lifestyle, she also aspires to document
    her family’s recipes in a handwritten cookbook to preserve them for future generations. A personal health goal is to maintain her independence through regular walks along the beach and participation
    in low‑impact exercise groups. She is also interested in learning basic smartphone photography to capture community events and share them with family abroad.
