personas:
  professional: Lourdes Fuentesgonzalez, a 60-year-old community cultural mentor, blends their practical horticultural know‑how and bilingual facilitation skills with a relaxed, curiosity‑driven approach
    to lead informal cooking workshops at the senior center, often improvising when plans slip and using their organizational knack to coordinate volunteer events, which they find both rewarding and a gentle
    test of their flexibility.
  sports: Lourdes Fuentesgonzalez, a 60-year-old who walks daily along the coast with the Vega Baja Senior Strollers club, joins seasonal community volleyball games in the cooler months, and follows the
    local baseball team Criollos de Caguas with enthusiastic attendance at Sunday games, using these activities as low‑impact exercise and social interaction, which they cherish.
  arts: Lourdes Fuentesgonzalez, a 60-year-old lover of plena and salsa, hums the rhythms of Willie Colón and Gilberto Santa Rosa while crocheting blankets, attends local parrandas featuring tributes to
    Ismael Rivera, reads historical Caribbean novels by Edwidge Danticat and Maryse Condé for quiet escape, and lets the stories inspire the colorful arrangements of their garden, a creative outlet they
    cherish.
  travel: Lourdes Fuentesgonzalez, a 60-year-old who prefers relaxed, low‑cost trips, enjoys weekend drives to historic Old San Juan, makes an annual pilgrimage to the Cathedral of St. John the Baptist
    in Portland, Maine, dreams of a cultural immersion tour of Granada, Spain, but balances these aspirations against limited finances and family responsibilities, which they hope to reconcile through careful
    planning.
  culinary: Lourdes Fuentesgonzalez, a 60-year-old culinary enthusiast, masterfully prepares arroz con gandules, pasteles de masa madre, and sofrito‑infused stews using home‑grown herbs, tomatoes, and plantains,
    experiments with fusion twists like citrus‑marinated tilapia atop traditional mofongo, and delights guests with a signature guava‑cream cheese canapé, a dish they take pride in presenting to friends
    and family.
  core: Lourdes Fuentesgonzalez, a 60-year-old garden‑to‑table storyteller, balances curiosity and practicality with a relaxed, slightly disorganized style, worries often about health costs, yet finds peace
    humming salsa while crocheting blankets for loved ones, a ritual they perform each evening.
background:
  cultural: Lourdes was born and raised in Vega Baja, a coastal municipality in Puerto Rico with strong ties to both the island’s agricultural roots and its maritime traditions. Her family’s heritage blends
    Spanish colonial influences, African rhythms, and indigenous Taíno elements, reflected in the food, music, and communal celebrations she grew up with. Catholicism has shaped many of her life rites,
    from baptisms to community fiestas. She identifies with the island’s jíbaro spirit of resilience, hospitality, and pride in the Spanish language, while also being comfortable switching to English when
    needed, especially to stay connected with relatives living abroad. The local culture’s emphasis on neighborly support, seasonal festivals like parrandas and bomba y plena performances, and a love for
    the ocean has informed her values of community, flexibility, and a practical approach to everyday life.
