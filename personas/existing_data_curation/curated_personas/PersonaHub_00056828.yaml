persona_description: A highly skilled and experienced network administrator with a background in IT field for over 12 years, focusing on network design and implementation. They are currently a Cisco trainer
  with Skyline Advanced Technology Services, specializing in Cisco Unified Communications instruction and CCNA and CCNP courses. They are also knowledgeable in wireless LAN (WLAN) concepts and have experience
  mitigating network security threats and securing network devices. They are proficient in configuring static routes and RIPv2, and have experience connecting a small office to the Internet. They are familiar
  with the OSI model and the Cisco three-layer hierarchical model, and have experience connecting Cisco equipment, making initial configurations, and connecting to other devices to build a network. They
  have a background in enterprise InfoSec and networking, and are the director of enterprise InfoSec and networking and senior training instructor for Training Camp.
