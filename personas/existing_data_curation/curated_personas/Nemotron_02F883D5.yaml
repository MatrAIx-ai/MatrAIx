  career_goals: Resa aims to deepen her expertise at the intersection of technology and art by creating immersive, accessible web experiences that function as digital galleries. Over the next five years
    she plans to launch a boutique consultancy that partners with emerging artists and cultural institutions to build interactive exhibition platforms powered by progressive web-app technologies and AI-driven
    personalization. She also aspires to mentor junior developers—especially women over 40—through virtual workshops and a community blog that shares practical techniques for inclusive design and sustainable
    coding practices. Continuing professional development in AR/VR web frameworks (WebXR) and serverless architectures is a personal ambition, as is publishing a guide titled "Creative Coding for the Solitary
    Artist."
