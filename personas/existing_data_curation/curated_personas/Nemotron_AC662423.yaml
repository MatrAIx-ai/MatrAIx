  hobbies: '[''Exploring local art murals'', ''Street photography of architecture'', ''Attending live music events'', ''Participating in community dance nights'', ''Improvisational theatre workshops'',
    ''Reading sci‑fi and graphic novels'', ''Cooking Southern comfort food with Tex‑Mex twists'', ''Hiking in Hill Country'', ''DIY home renovation projects'', ''Playing social board games with friends'']'
  career_goals: Laquita aims to transition from skilled roofer to foreman and eventually launch her own roofing subcontracting firm that specializes in sustainable and design‑forward projects. She plans
    to earn certifications in green roofing and solar‑panel integration, positioning herself as a pioneer among women in the traditionally male‑dominated trade. Beyond business growth, she hopes to mentor
    other young workers—especially women and people of color—through apprenticeship programs, fostering a more inclusive construction community in San Antonio.
