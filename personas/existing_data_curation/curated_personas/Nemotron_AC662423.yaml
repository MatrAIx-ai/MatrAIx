personas:
  professional: Laquita Rejouis, a 36‑year‑old roofing specialist in San Antonio, combines masterful installation skills with a charismatic, improvisational leadership style, driving crews to meet code
    standards while integrating custom aesthetic details and aiming to launch a green‑roofing subcontracting firm.
  sports: Laquita Rejouis follows the San Antonio Spurs avidly, plays pick‑up basketball at the local YMCA during summer, participates in a community soccer league in the fall, and attends weekend yoga
    classes at a downtown studio to balance the physical demands of her trade.
  arts: Laquita Rejouis immerses herself in the city’s mural scene, snapping photos of José Garza’s vibrant wall art, vibing to Kendrick Lamar and Kamasi Washington at live venues, and leading improv theatre
    workshops where she channels her talkative energy into spontaneous storytelling.
  travel: Laquita Rejouis favors spur‑of‑the‑moment road trips, having explored the Hill Country’s wineries, the art districts of Austin, and the historic plazas of San Miguel de Allende, while dreaming
    of a future solo trek through the deserts of New Mexico for sunrise photography.
  culinary: Laquita Rejouis loves cooking soulful Southern staples like collard greens and fried chicken, giving them a Tex‑Mex twist by adding smoky chipotle, fresh cilantro, and queso fresco, and she
    confidently seasons her jambalaya with Cajun spices blended with ancho chilies.
  core: Laquita Rejouis is a charismatic, improvisational roofer who dreams of greener roofs, often forgets appointments but never misses a chance to lead a dance floor, and balances a competitive edge
    with a deep community spirit.
background:
  cultural: Laquita is a Black woman who grew up in a close‑knit, working‑class neighborhood of San Antonio, where African‑American traditions intersect with the city’s strong Tex‑Mex heritage. She was
    raised on gospel music and family gatherings that celebrated Juneteenth and Kwanzaa, while also absorbing the flavors and rhythms of the broader Texas culture. This blend of influences nurtured her
    appreciation for diverse artistic expression and community solidarity, shaping both her personal identity and her desire to uplift others through mentorship and inclusive entrepreneurship.
