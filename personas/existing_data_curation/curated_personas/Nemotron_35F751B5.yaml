  hobbies: '["Reading non‑fiction (health policy, business strategy)", "Gardening (vegetable garden)", "Running (early‑morning)", "Cooking (recipe‑focused)", "Chess", "Crossword and Sudoku puzzles", "Volunteer
    health education for small community groups"]'
  career_goals: Amber aims to advance into senior leadership within a multi‑site pharmacy network, ultimately becoming a Pharmacy Director or Vice President of Pharmacy Services. She seeks to leverage her
    business degree to drive operational excellence, expand community health initiatives, and mentor emerging pharmacists. In the long term, she envisions establishing a boutique independent pharmacy that
    integrates clinical services with wellness programs, using data‑driven strategies to improve patient outcomes while maintaining rigorous standards of safety and efficiency.
