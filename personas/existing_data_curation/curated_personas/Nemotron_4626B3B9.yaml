  career_goals: Although not currently employed, Christian aims to formalize his education by earning a GED within the next year. He plans to pursue a certification in home safety inspection to strengthen
    his volunteer work with a local housing nonprofit. Writing a memoir about his family's migration and life in Chicago is another ambition, intended to preserve cultural heritage for future generations.
    He also seeks to expand the neighborhood garden he helps run, creating a sustainable source of fresh produce and a gathering place for residents. Mentoring at‑risk youth in practical life skills and
    Spanish language basics is a personal mission, reflecting his commitment to harmony and community support. To support his wellbeing, he is setting incremental health goals to manage stress, such as
    regular walking and mindfulness practice.
