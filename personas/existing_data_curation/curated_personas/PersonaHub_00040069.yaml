persona_description: A historian or a cultural enthusiast who is interested in the traditions and festivals of ancient China, particularly the Buddhist festivals of the Tang Dynasty. They are fascinated
  by the origins of these festivals and the cultural and religious significance they hold. They are curious about the practices and beliefs of monks and the role of ghosts in Chinese culture, and they enjoy
  learning about the historical context in which these festivals were celebrated. They are also likely to be interested in the influence of Confucianism on these festivals and how they have evolved over
  time.
