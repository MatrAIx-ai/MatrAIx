  career_goals: Kathleen aims to step into a regional director role that oversees multiple facilities, leveraging technology to modernize operations while maintaining the reliability of established practices.
    She plans to earn a Six Sigma Black Belt, lead sustainability initiatives to reduce waste, and mentor emerging managers within her organization. Additionally, she aspires to build partnerships with
    local producers and community groups to boost economic development in eastern Kentucky, blending her professional expertise with her commitment to regional well‑being.
