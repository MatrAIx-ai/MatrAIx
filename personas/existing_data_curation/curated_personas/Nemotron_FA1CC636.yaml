  career_goals: Joseph dreams of a career that blends his love for art, structure, and curiosity about how things work. He aspires to become a visual designer or architect, aiming to study at a university
    known for engineering and design. He hopes to create sustainable buildings that are both functional and beautiful, using his disciplined planning skills to manage complex projects. He also entertains
    the idea of working as a scientific illustrator, turning scientific discoveries into clear visual narratives, because it would let him combine his artistic talent with his fascination for new ideas.
