personas:
  professional: Joseph Mclean, an aspiring digital artist and junior builder, merges his passion for Minecraft architecture with disciplined sketching, leveraging his natural curiosity and organizational
    prowess to create intricate virtual worlds and detailed hand‑drawn concept art, and they consistently set high standards for each project.
  sports: Joseph Mclean, an enthusiastic outdoor kid from the Columbia River Gorge area, spends weekends hiking the gorge’s trails, rides a BMX bike with the local club "Gorge Riders," follows the Portland
    Timbers (MLS) and Seattle Seahawks (NFL), and competes on the school’s cross‑country team, demonstrating a balanced love for individual adventure and team sport.
  arts: Joseph Mclean, a budding visual storyteller, spends afternoons sketching fantasy creatures inspired by authors like Ursula K. Le Guin and films by Hayao Miyazaki, practices piano pieces such as
    Debussy’s "Clair de Lune," enjoys listening to Hans Zimmer’s ambient scores, and frequently visits the Portland Art Museum to study works by contemporary illustrator Kim Jung Gi, weaving these influences
    into both analog and digital creations.
  travel: Joseph Mclean, an inquisitive traveler, prefers meticulously planned road trips that blend nature and culture, having explored the Oregon Coast, camped near Crater Lake, and dreaming of visiting
    Kyoto to see its historic temples and anime studios, balancing family budget constraints with a thirst for immersive, kid‑friendly adventures.
  culinary: Joseph Mclean, a curious home chef, enjoys crafting colorful rainbow cupcakes, perfecting pizza topped with wild mushrooms and pepperoni, and occasionally helping his family roll sushi with
    tuna and avocado, showcasing a growing skill set that mixes comfort foods with experimental flavors.
  core: Joseph Mclean, an ultra‑organized 11‑year‑old explorer, blends relentless curiosity with disciplined creativity, turning every hobby—from Minecraft builds to piano practice—into a meticulously crafted
    adventure, all while maintaining calm composure and a hint of perfectionist quirkiness.
background:
  cultural: Joseph grew up in a middle‑class family in Vancouver, Washington, a suburb of Portland known for its access to both urban cultural activities and abundant natural spaces. His household reflects
    a predominantly white, North‑American background with an emphasis on education, community involvement, and outdoor recreation. Family outings often include trips to the nearby Columbia River Gorge for
    hiking, visits to regional museums, and participation in community art workshops. The Pacific‑Northwest climate and landscape have nurtured his appreciation for nature, while the local school’s diverse
    student body has exposed him to a range of cultural perspectives, encouraging his open‑mindedness and respect for harmony.
