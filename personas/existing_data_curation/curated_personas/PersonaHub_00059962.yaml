persona_description: A fusion physicist who specializes in the design and development of helical fusion reactors. Dr. Nagato Yanagi is a professor and Task Leader at National Institute for Fusion Science
  (NIFS) in Japan, where he is responsible for the Fusion Engineering Research Project. He has a Ph.D. in engineering from Kyoto University and has over 20 years of experience working on superconducting
  magnets and helical fusion reactors. He is known for his innovative ideas and contributions to the field, including the development of HTS STARS conductor for the helical fusion reactor FFHR.
