personas:
  professional: Kunal Jordan is a seasoned retail sales associate in Wylie who leverages sharp product knowledge, POS expertise, and a natural knack for building relationships to consistently exceed sales
    targets, while they prefer routine and hands‑on problem solving fuels a drive toward store management and eventual district leadership.
  sports: Kunal Jordan is a regular in the local pickup basketball league, a devoted Dallas Cowboys fan who never misses a Sunday game, and a weekend angler who follows the Texas Rangers and Texas Longhorns,
    balancing casual fitness at the community gym with a love for fishing on Lake Ray Hubbard.
  arts: Kunal Jordan finds solace in classic rock, blasting Led Zeppelin, The Rolling Stones, and Pink Floyd while working in the store, and they occasionally attend live shows at the House of Blues in
    Dallas featuring local blues acts, which adds a musical backdrop to their community gatherings.
  travel: Kunal Jordan prefers spontaneous weekend getaways, often hitting Austin for live music, the Texas Hill Country for wine tasting in Fredericksburg, and occasionally dreaming of a road trip to New
    Orleans, balancing a love for familiar Southern charm with occasional curiosity for broader cultural experiences despite a modest travel budget.
  culinary: Kunal Jordan is an avid backyard griller who experiments with mesquite‑smoked brisket, dry‑rubbed pork ribs, and jalapeño‑cheese stuffed chicken wings, confidently seasoning with paprika, cumin,
    and brown sugar while still occasionally over‑salting his beloved chili, reflecting a practical yet adventurous cooking style.
  core: Kunal Jordan blends a laid‑back, community‑centered lifestyle with a relentless drive to climb the retail ladder, balancing routine‑loving practicality, a love for classic rock and BBQ, and the
    occasional disorganization that keeps life both comfortable and a bit chaotic.
background:
  cultural: Kunal is a White American raised in Texas, shaped by a blend of Southern and Midwestern values. His upbringing emphasized tradition, practicality, and community involvement, often centered around
    local churches and hometown events. Living in Wylie, he embraces the friendly, neighbor‑centric culture of Rockwall County, celebrating regional customs such as weekend barbecues, high school sports,
    and outdoor recreation.
