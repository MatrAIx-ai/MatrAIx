  career_goals: Kunal aims to move from a sales associate role to store management within the next two years, leveraging his people skills and practical experience. He plans to complete his associate degree
    in Business Administration, pursue a management certification, and eventually progress to a district manager position or open a small franchise in his community, while maintaining a stable work‑life
    balance for his family.
