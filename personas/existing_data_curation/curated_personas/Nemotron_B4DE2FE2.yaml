  career_goals: He aims to transform his curiosity about art and food into a small pop-up venture that fuses Mexican street flavors with locally sourced seafood, showcasing his creations at Monterey Bay
    art festivals and beach gatherings. Over the next few years he plans to enroll in a culinary certificate program and a basic business-management course to develop the organizational skills that currently
    challenge him, eventually opening a community-focused kitchen space that doubles as an informal gallery for local artists. Pedro also hopes to use his experiences to mentor other young workers dealing
    with anxiety in the hospitality industry.
