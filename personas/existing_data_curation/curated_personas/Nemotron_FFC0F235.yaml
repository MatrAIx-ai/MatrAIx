  career_goals: Estefani aims to advance her nursing career by earning a Bachelor of Science in Nursing (BSN) and subsequently a Master’s degree to become a Nurse Practitioner specializing in primary care
    for underserved Mexican‑American communities. She also seeks to take on a charge nurse or unit manager position within her Denver hospital, leveraging her competitive drive and organizational strengths
    to improve patient safety and workflow efficiency. Long‑term, she hopes to develop a community outreach program that blends conventional medical care with creative arts therapies, fostering holistic
    health for immigrant families.
