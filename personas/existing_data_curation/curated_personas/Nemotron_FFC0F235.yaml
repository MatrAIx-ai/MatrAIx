personas:
  professional: Estefani Ramirez is a registered nurse at a busy Denver hospital, mastering patient assessment, IV therapy, wound care, medication administration, and electronic health record coordination
    while weaving their love for abstract watercolor into art‑based therapeutic interventions; they demonstrate curiosity, organized flexibility, a competitive edge, and calm resilience under pressure.
  sports: Estefani Ramirez hikes the foothills around Denver several times a month, attends weekly yoga classes for stress relief, chants for the Denver Broncos on game days, and joins a local soccer pick‑up
    league where their competitive streak fuels a drive to improve, though they sometimes skip a workout after overtime shifts.
  arts: Estefani Ramirez frequents the Museum of Contemporary Art Denver, draws inspiration from artists like Frida Kahlo and Yayoi Kusama, participates in community mural projects, and spends evenings
    crafting mixed‑media pieces that blend vivid watercolor with collage, using these creative outlets to unwind and occasionally incorporate art therapy techniques at work.
  travel: Estefani Ramirez enjoys weekend getaways that blend adventure and cultural immersion, having celebrated Día de los Muertos in Oaxaca, explored the historic streets of New Orleans during jazz season,
    and hiked the trails of Rocky Mountain National Park, while dreaming of a future trip to Barcelona to study Gaudí’s architecture and to Kyoto for its serene gardens.
  culinary: Estefani Ramirez experiments in the kitchen with innovative dishes such as deconstructed tacos featuring quinoa‑crusted fish and sautéed nopal, a mole sauce enriched with dark chocolate and
    chiltepin, and uses ingredients like epazote, avocado, and corn masa to create modern twists on traditional flavors, often pairing meals with artisanal mezcal for a sensory experience.
  core: Estefani Ramirez blends clinical precision with artistic curiosity, juggling a fast‑paced nursing career, creative pursuits, and a competitive drive while staying grounded in community traditions
    and mindful self‑care, and they constantly seek new ways to integrate their passions.
background:
  cultural: Estefani grew up in a bilingual Mexican household, celebrating traditions such as Día de los Muertos, Christmas posadas, and family gatherings centered around shared meals. Her cultural identity
    informs her compassionate nursing style, emphasizing family involvement and holistic health perspectives. Living in Denver’s vibrant Mexican‑American community, she maintains strong ties to her heritage
    through language, music, and community service, often volunteering at local health fairs that address the specific needs of immigrant populations.
