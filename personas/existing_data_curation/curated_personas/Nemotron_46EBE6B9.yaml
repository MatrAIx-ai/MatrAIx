  career_goals: Although retired, Albert aims to stay actively involved in his community by volunteering as a STEM mentor for local high schools and serving on the Oklahoma City Planning Advisory Board.
    He hopes to contribute his experience to sustainable infrastructure initiatives, write a memoir detailing his engineering career and the evolution of civil projects in Oklahoma, and continue learning
    through short courses on emerging technologies like renewable energy systems. Maintaining his health for continued participation in group activities and supporting his spouse’s community projects are
    also top priorities.
