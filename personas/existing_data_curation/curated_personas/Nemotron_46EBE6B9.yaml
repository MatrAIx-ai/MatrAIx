personas:
  professional: Rodriguez Mahnke is a retired civil engineer whose decades of expertise in infrastructure design, CAD, BIM, and GIS now fuel a methodical volunteer role as a STEM mentor for local high schools
    and as a member of the Oklahoma City Planning Advisory Board, where they translate complex engineering concepts into clear guidance while drafting a memoir on sustainable public works.
  sports: Rodriguez Mahnke is a steadfast supporter of the Oklahoma City Thunder, regularly attending home games with friends and proudly wearing team merchandise, while also participating in the local
    senior bowling league and occasional community softball matches, balancing high‑energy fandom with gentle exercise.
  arts: Rodriguez Mahnke immerses themselves in the blues and jazz scene, often listening to records by B.B. King, Miles Davis, and John Coltrane, and regularly attending live performances at the Oklahoma
    City Jazz Hall and the historic Deep Orange Blues Club, where they find inspiration that colors their garden and kitchen.
  travel: Rodriguez Mahnke prefers organized group trips to historic sites such as Gettysburg, Monticello, and the Freedom Trail, relishes the annual family reunion in Texas, and dreams of a leisurely tour
    of New Orleans during the Jazz & Heritage Festival, planning each journey with a detailed itinerary and budgeting carefully around their fixed retirement income.
  culinary: Rodriguez Mahnke enjoys cooking soul‑food dishes like collard greens simmered with smoked turkey, baked sweet potato pie, and fried catfish seasoned with Old Bay, using fresh herbs from their
    community garden and occasionally experimenting with a pinch of cayenne to add a subtle kick.
  core: Rodriguez Mahnke blends engineering precision with a vibrant community spirit, never missing a garden plot, a jazz set, or a Thunder game, while occasionally misplacing their glasses and forgetting
    a bill.
background:
  cultural: Albert was born and raised in Oklahoma City to African‑American parents whose family migrated from the Deep South during the Great Migration. Growing up in a close‑knit black community centered
    around a historic Baptist church, he was immersed in traditions of gospel music, southern cooking, and storytelling. The civil‑rights era shaped his commitment to education and community service, and
    his cultural identity reflects a blend of Southern heritage, Midwestern resilience, and a lifelong emphasis on collective progress and mentorship.
