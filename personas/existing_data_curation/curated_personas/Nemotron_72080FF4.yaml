personas:
  professional: Jacob Gleiberman, a disciplined teenage coder and budding engineer, channels their love for strategic games and precise model building into Python projects that solve small real‑world problems,
    applying methodical planning and a meticulous eye for detail.
  sports: Jacob Gleiberman, a committed member of the coastal community swim team, trains five days a week at the local beach pool, models their workouts after the structured training plans of the United
    States Olympic swimming program, and cheers for the nearby professional baseball team, the San Diego Padres, during off‑season weekends.
  arts: Jacob Gleiberman, an avid reader of mystery novels by Agatha Christie and tech biographies like Walter Isaacson's The Innovators, finds inspiration in the precise craftsmanship of LEGO art installations
    and enjoys listening to instrumental film scores by Hans Zimmer while building models.
  travel: Jacob Gleiberman prefers meticulously planned trips that blend educational exposure and relaxation, such as a summer visit to the Smithsonian Air and Space Museum in Washington, D.C., followed
    by a beachside stay in Maui, always drafting detailed itineraries and budgeting each activity in advance.
  culinary: Jacob Gleiberman, an aspiring home chef, loves cooking with exact measurements, frequently preparing dishes like spaghetti carbonara, homemade pizza with precise topping ratios, and classic
    grilled cheese sandwiches, while savoring the tactile satisfaction of arranging fresh basil and mozzarella.
  core: Jacob Gleiberman is a calm, highly organized 14‑year‑old who thrives on structured challenges, from chess and coding to swimming, balancing disciplined achievement with a gentle, cooperative spirit.
background:
  cultural: Jacob was raised in Saint Petersburg, Florida, a coastal community in Pinellas County that blends Southern hospitality with a diverse, multicultural environment. His family, of European descent,
    emphasizes traditional American values while also appreciating local customs such as beach outings, community festivals, and marine conservation initiatives. Growing up near the Gulf of Mexico has fostered
    his respect for outdoor activities and an awareness of environmental stewardship common to the region.
