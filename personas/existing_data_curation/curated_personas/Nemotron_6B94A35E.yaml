personas:
  professional: Mitchell Peltier, a newborn with a natural curiosity for patterns, already captivates caregivers by arranging toys in color-coded rows, hinting at a future career in design and visual communication
    where they will apply a relaxed, flexible approach to collaborative work.
  sports: Mitchell Peltier, a newborn who delights in tummy-time stretches and weekly infant swim classes at the Little Sprouts Community Center, watches the Chicago Cubs games on family TV and cheers at
    the local youth soccer practices, embodying a relaxed, exploratory approach to fitness while their parents gently introduce them to the rhythm of sports, and they respond with bright smiles to each
    new movement.
  arts: Mitchell Peltier, a newborn with a pronounced appreciation for soft lullabies, often drifts to sleep to the gentle piano works of Claude Debussy and the pastel illustrations of Mary Blair, reflecting
    how early exposure to those artists nurtures a budding love for visual and auditory arts that will shape their creative play, and they often reach for textured toys that echo the colors they have seen.
  travel: Mitchell Peltier, a newborn who has already experienced a stroller-tour of Central Park in New York and a beach day in Santa Monica, loves family road trips that balance soothing routines with
    novel sights, and eagerly anticipates a future family vacation to Kyoto's cherry-blossom festivals, where they can absorb new sights.
  culinary: Mitchell Peltier, a newborn whose palate currently revolves around warm breastmilk, pureed carrots, and occasional banana mash, enjoys the familiar comfort of mild flavours and will someday
    delight in experimenting with homemade vegetable purees seasoned with a pinch of cinnamon that they can eventually share.
  core: Mitchell Peltier, a newborn curiosity-driven explorer, balances a tender sensitivity to stress with a playful, flexible approach to every new sensory experience, from arranging toys to soothing
    lullabies, which they cherish.
background:
