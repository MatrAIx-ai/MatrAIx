personas:
  professional: Donnie Kennedy, a retired rural Colorado handyman turned community mentor, uses his methodical woodworking and engine‑repair expertise to lead hands‑on workshops at the local historical
    society, balancing his competitive drive to perfect each project with a cautious skepticism toward untested teaching methods.
  sports: Donnie Kennedy, an avid hiker with the La Junta Trail Club, spends weekends trekking the Sangre de Cristo Mountains, follows the Colorado Rockies and Denver Broncos for a dose of community spirit,
    and occasionally joins a local senior softball league where their competitive nature surfaces on the field.
  arts: Donnie Kennedy, a devoted model‑train enthusiast, spends evenings fine‑tuning intricate layouts while listening to the classic folk songs of Johnny Cash and reading the histories of railway artist
    John H. White, and they regularly attend the Santa Fe Folk Art Fair to admire woodcarvings by artists like Mary N. Butler.
  travel: Donnie Kennedy, a practical explorer with a love for historical sites, has driven the Pacific Coast Highway to photograph the Redwood forests, visited Gettysburg to walk the battlefields chronicled
    in his military‑history books, and dreams of a quiet retreat in the Scottish Highlands where they can garden and watch local birdlife.
  culinary: Donnie Kennedy, a garden‑to‑table cook, frequently prepares fresh heirloom tomato bruschetta with basil and locally sourced pepper‑infused chicken stew, delights in making homemade salsa with
    jalapeños from their plot, and enjoys pairing the dishes with a crisp Colorado craft beer.
  core: Donnie Kennedy, a meticulous 71‑year‑old retiree, channels a lifelong curiosity into woodworking, gardening, and model trains while battling a habit of over‑worrying about finances and health, yet
    remains fiercely competitive about perfecting every project.
background:
  cultural: Donnie grew up in the American Southwest, raised in a farming family that emphasized self‑reliance, hard work, and respect for tradition. The cultural fabric of La Junta, with its mix of ranching,
    mining heritage, and tight‑knit community values, shaped his pragmatic outlook and competitive spirit. He identifies with Midwestern‑American values of punctuality, responsibility, and modesty, while
    also embracing the openness of the frontier culture that values practical ingenuity. His upbringing during the post‑World War II era instilled a sense of duty and a cautious optimism, reflected in his
    methodical approach to life. Although he is divorced, he remains connected to local churches and community groups that reinforce a shared heritage of respect for elders, volunteerism, and an appreciation
    for both old customs and new ideas.
attributes:
  skills: '["Mechanical repair of small engines", "Carpentry and woodworking", "Home maintenance and property management", "Budgeting and retirement financial planning", "Basic computer and internet research",
