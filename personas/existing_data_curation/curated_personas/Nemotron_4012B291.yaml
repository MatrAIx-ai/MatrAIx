  hobbies: '["Woodworking", "Vegetable gardening", "Reading war history", "Model train building", "Bird watching", "Classic car restoration", "Coin collecting", "Hiking in the Sangre de Cristo Mountains",
    "Attending local historical society meetings"]'
  career_goals: Although retired, Donnie is focused on staying active and purposeful. He aims to keep his mind sharp by learning new digital tools, such as photo editing and tablet use, and to document
    his family’s genealogy for future generations. He wants to mentor younger community members interested in trades, sharing his mechanical and woodworking expertise. Donnie is determined to maintain his
    health through regular gardening and walking, and to ensure his estate is well‑organized, with a clear will and financial plan. He also hopes to contribute to the preservation of La Junta’s local history
    by volunteering with the historical society and possibly selling handcrafted wooden items at community markets to stay engaged and financially secure.
