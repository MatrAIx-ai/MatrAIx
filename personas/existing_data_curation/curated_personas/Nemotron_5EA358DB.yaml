  hobbies: '["Baking and pastry making", "Gardening", "Church choir singing", "Hiking", "Quilting", "Volunteer work at food banks", "Attending county fairs", "Home DIY projects"]'
  career_goals: Daisy aims to earn her GED within the next year and enroll in a certified nursing assistant program, with the long‑term goal of working in home health care. In parallel, she plans to launch
    a small home‑based bakery that supplies pastries to the local farmers’ market and church events. She also hopes to take on a leadership role in the town’s community center, helping to organize youth
    programs and seasonal festivals.
