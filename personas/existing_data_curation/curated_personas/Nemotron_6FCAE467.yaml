personas:
  professional: Sonia Jacques, a seasoned strategic business advisor, translates her deep expertise in financial analysis, risk management, and data-driven decision making into boutique consulting projects
    for early-stage entrepreneurs and community nonprofits, where her organized, competitive, and calm mindset ensures meticulously crafted, results-focused plans.
  sports: Sonia Jacques, an avid weekend hiker of the Castle Rock foothills and member of the local senior walking club, follows the Colorado Rockies, Denver Broncos, and Denver Nuggets with quiet loyalty
    while dedicating her fitness routine to low-impact trail walks and weekly yoga classes designed to keep her osteoarthritis in check.
  arts: Sonia Jacques, a budding landscape photographer who captures sunrise over the Rocky Mountains in homage to Ansel Adams, enjoys evenings listening to the timeless compositions of Ennio Morricone
    while sipping Chianti, and regularly attends pottery and watercolor workshops inspired by Monet's impressionist palette.
  travel: Sonia Jacques, who crafts meticulous travel itineraries in Excel, prefers small-group cultural tours and has already explored the historic towns of Tuscany and the Greek islands of Santorini and
    Crete, while her future bucket list includes a quiet retreat to Patagonia's Andean trails and a return to Colorado's Rocky Mountain National Park for seasonal wildflower hikes.
  culinary: Sonia Jacques, a skilled Mediterranean home-chef, delights in preparing dishes such as grilled branzino with lemon-thyme, ratatouille infused with fresh Provencal herbs, and a saffron-laden
    paella accented by peas and shrimp, while she meticulously seasons each recipe with extra-virgin olive oil, garlic, and sea salt, reflecting her disciplined yet curious culinary approach.
  core: Sonia Jacques, a calm yet fiercely competitive retiree, balances a relentless love for crossword puzzles and data-driven consulting with a quirky habit of over-organizing her pantry into color-coded
    bins, often forgetting to water her garden while she perfects her next Excel model.
background:
  cultural: Sonia grew up in a middle‑class white family in the Midwestern United States, where a strong work ethic and practical problem‑solving were emphasized. After completing her undergraduate studies
    in Ohio, she earned a graduate degree in business at the University of Colorado and spent much of her career in Denver’s corporate sector. Since moving to Castle Rock, she has embraced the outdoors‑oriented,
    community‑focused culture of Colorado, integrating activities like hiking and local volunteering into her routine. Her cultural identity blends traditional American values of self‑reliance, punctuality,
    and resilience with a respect for the region’s natural environment and a pragmatic, results‑oriented mindset.
