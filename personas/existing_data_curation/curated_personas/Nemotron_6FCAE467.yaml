  career_goals: Although retired from full‑time employment, Sonia aims to channel her business acumen into selective, high‑impact endeavors. She plans to establish a boutique consulting practice that offers
    strategic planning and financial advisory services to early‑stage entrepreneurs and community nonprofits, allowing her to work on a limited number of projects that align with her interests. She also
    aspires to mentor a small cohort of aspiring women leaders through a structured program, author a concise guide on strategic planning for senior professionals, and serve on the board of a local nonprofit
    focused on youth entrepreneurship. Ultimately, her ambition is to leave a lasting legacy of pragmatic, results‑driven guidance while maintaining the calm, methodical lifestyle she values.
