personas:
  professional: Chanelle Russell leverages three decades of operations leadership across retail, manufacturing, and service sectors, using Lean Six Sigma and data‑driven analysis to drive continuous improvement
    while championing mentorship for women and people of color and integrating local arts into workplace culture.
  sports: Chanelle Russell supports the Indiana Pacers and Indianapolis Colts, follows the Indianapolis 500 each May, and stays active by participating in a senior tennis league at the Indianapolis Racquet
    Club while also maintaining her weekly salsa‑dance class, which she treats as both social workout and cultural immersion.
  arts: Chanelle Russell immerses herself in the arts by frequenting the Indianapolis Museum of Art for exhibitions by artists like Kara Walker, attending community‑theater productions at The Repertory
    Theatre of Indianapolis, reveling in live jazz shows headlined by Wynton Marsalis, and channeling that inspiration into her weekly salsa‑dance sessions.
  travel: Chanelle Russell curates her travel around cultural hubs, having explored New Orleans’ jazz scene, Kyoto’s historic temples, and Barcelona’s modernist architecture, while planning a future trip
    to Florence to study Renaissance art, balancing her itinerary with a modest travel budget and occasional family obligations.
  culinary: Chanelle Russell showcases her culinary curiosity in the Indy Food Explorers club by mastering miso‑glazed black cod, charred cauliflower tacos, and saffron risotto, favoring ingredients like
    smoked paprika, sumac, and garden‑fresh basil and thyme, and often experiments with molecular gastronomy techniques at home.
  core: Chanelle Russell is a competitive, curiosity‑driven operations veteran whose love of art and salsa offsets a chronic worry‑about‑details habit, making them both meticulous and delightfully eclectic.
background:
  cultural: Chanelle grew up in Indianapolis as part of a close-knit African-American community that celebrated music, storytelling, and civic engagement. Her family’s roots trace back to the Great Migration,
    and she was raised on the traditions of Juneteenth celebrations, church choir singing, and neighborhood block parties on Indiana Avenue, a historic hub for jazz and Black entrepreneurship. These experiences
    instilled a deep appreciation for cultural expression and a commitment to uplift the next generation of Black professionals. While she never married, her network of extended family, church, and community
    organizations has provided a strong support system that shapes her identity and informs her leadership style.
