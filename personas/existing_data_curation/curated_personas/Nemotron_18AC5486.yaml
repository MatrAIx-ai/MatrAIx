  hobbies: '[''Museum visits'', ''Community theater'', ''Jazz concerts'', ''Salsa dancing'', ''Cooking classes'', ''Urban gardening'', ''Book club (nonfiction/social-justice)'', ''Travel'', ''Art workshops'',
    ''Mentoring through Black women’s business network'']'
  career_goals: Chanelle aims to transition into a senior executive role—such as Director or Vice President of Operations—where she can shape organization-wide strategy and mentor emerging talent, especially
    women and people of color. She plans to earn a Lean Six Sigma Black Belt and PMP certification within the next two years to bolster her credibility. In parallel, she envisions launching a boutique consulting
    practice that helps small, minority-owned businesses streamline operations while embedding cultural and artistic elements into their brand identity. Long-term, she hopes to establish a scholarship program
    for under-represented students pursuing business leadership.
