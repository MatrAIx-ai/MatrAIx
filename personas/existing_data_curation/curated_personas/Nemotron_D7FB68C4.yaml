  career_goals: Jonathon aims to establish a freelance visual‑artist practice that allows him to work from his quiet studio in Kirtland, creating art that reflects the Southwest’s natural beauty and environmental
    concerns. He plans to complete a BFA or a certificate program in Fine Arts while building a professional portfolio that can attract gallery representation and community‑based commissions. Long‑term,
    he hopes to integrate art therapy techniques into his work, offering solitary, private sessions that help clients process stress and anxiety through creative expression.
