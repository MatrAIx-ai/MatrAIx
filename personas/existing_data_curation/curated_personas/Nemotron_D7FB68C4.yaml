personas:
  professional: Jonathon Bentley, a 20‑year‑old aspiring freelance visual artist, blends desert‑inspired sketches, photographs, and analog synth soundscapes into digital illustrations and kinetic installations
    from a relaxed‑about‑deadlines studio in Kirtland, leveraging self‑directed learning and beginner‑level Python scripting while navigating a BFA program and seeking gallery representation that mirrors
    their environmental concerns.
  sports: Jonathon Bentley fuels their love of solitude through seasonal desert hikes with the Kirtland Desert Hiking Club, occasional spring trail‑runs, and relaxed attendance at Albuquerque Isotopes baseball
    games when they feel socially up to it, while avoiding formal gyms in favor of natural movement that fits their disorganized schedule.
  arts: Jonathon Bentley channels inspiration from Georgia O’Keeffe’s Southwestern palettes, Brian Eno’s ambient textures, and Tangerine Dream’s experimental synth work into painterly canvases, glitch‑infused
    digital illustrations, and analog synth compositions that echo the shifting desert light they photograph, often sharing these pieces at Southwest Artists’ Network gatherings where their empathetic communication
    shines despite a preference for solitary creation.
  travel: Jonathon Bentley prefers low‑key, self‑planned trips that blend photography and contemplation—such as sunrise hikes in Joshua Tree, night‑stargazing at White Sands, a soul‑searching week in Morocco’s
    Merzouga desert, and a quiet retreat to Kyoto’s Ryoan‑ji garden—always budgeting travel around freelance income and allowing room for spontaneous detours that soothe their anxiety.
  culinary: Jonathon Bentley enjoys modest cooking experiments that feature desert‑sourced ingredients like prickly pear salsa on grilled fish, roasted sweet potatoes seasoned with rosemary and pomegranate
    seeds, and handcrafted pour‑over coffee using Ethiopian beans, a skill set cultivated at the kitchen counter between late‑night analog synth sessions that double as ambient soundtracks.
  core: Jonathon Bentley is a 20‑year‑old visual artist who trades chronic worry for solitary desert hikes punctuated by analog synth experiments, while their disorganized studio and flexible approach to
    deadlines reflect a creative mind that refuses strict planning.
background:
  cultural: Jonathon comes from a multigenerational White Anglo‑American family that settled in northern New Mexico during the 1950s. Raised in the small community of Kirtland, he grew up surrounded by
    expansive desert landscapes and a mix of cultural influences, including the vibrant visual traditions of nearby Pueblo and Navajo peoples, which he respects and draws inspiration from. His upbringing
    was modest and largely secular, though he attended a local Catholic school in his early years. The region’s emphasis on self‑reliance, open space, and appreciation for the arts has shaped his identity
    and creative outlook.
