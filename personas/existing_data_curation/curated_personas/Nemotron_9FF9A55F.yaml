  hobbies: '[''gardening'', ''quilting'', ''reading classic novels'', ''bird watching'', ''baking pies'', ''church choir'', ''genealogy research'', ''walking trails'']'
  career_goals: Jill aims to stay engaged in her community by expanding her volunteer work, leading intergenerational gardening projects, and documenting family stories for future generations. She aspires
    to learn basic digital photography to capture community events, maintain her health through regular walking, and support her husband in remaining socially active. She also hopes to mentor other seniors
    in developing practical home‑management skills and to compile a memoir of her life in rural Pennsylvania.
