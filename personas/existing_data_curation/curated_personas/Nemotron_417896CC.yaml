  career_goals: Kevin dreams of becoming a robotics engineer who can design machines that help people, inspired by his love for building and coding. He also imagines playing soccer at a professional level,
    hoping to represent his community. In the longer term, he wants to use his technical skills to mentor younger kids in STEM clubs, blending his competitive spirit with a desire to give back. Occasionally,
    he talks about creating his own video games that showcase his cultural stories, hoping to merge his artistic side with his technical ambitions.
