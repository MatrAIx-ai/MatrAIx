personas:
  professional: Kevin Perros, an aspiring young technologist, builds LEGO bridges and simple robots while coding animated stories on Scratch, applying his practical curiosity and competitive drive to create
    projects that impress peers and mentors.
  sports: Kevin Perros plays forward for the Brookside Youth Soccer Club, follows the professional team LAFC with fervor, and during off‑season practices drills with the local Little League baseball team,
    balancing competitive play with team camaraderie.
  arts: Kevin Perros creates comic strips inspired by Calvin and Hobbes, composes keyboard renditions of pop hits by BTS and Imagine Dragons, and animates Scratch projects that blend modern pop culture
    with traditional folk tunes from his family's heritage, often sharing them at after‑school clubs.
  travel: Kevin Perros has explored Disneyland in Anaheim, trekked the Grand Canyon on a school field trip, visited the ancient pyramids at Teotihuacan, and dreams of experiencing cherry blossom season
    in Tokyo while saving up pocket money for future adventures.
  culinary: Kevin Perros loves assembling tacos with fresh cilantro, lime, and diced jalapeños, whips up guacamole using ripe avocados, and enjoys cooking chicken quesadillas, approaching each kitchen task
    at a beginner’s skill level but with enthusiastic collaboration.
  core: Kevin Perros blends fierce competitiveness with a practical curiosity, turning every soccer match, LEGO build, and Scratch project into a chance to test, organize, and outsmart friends while occasionally
    letting skepticism guide their decisions.
background:
  cultural: Kevin is a Mexican‑American growing up in Los Angeles. His home is bilingual, with Spanish spoken at the dinner table and English at school, giving him fluency in both languages. Family gatherings
    often feature traditional Mexican foods, music, and stories, which have shaped his appreciation for his heritage. He celebrates Día de los Muertos and Cinco de Mayo with his extended family, enjoying
    the communal meals, colorful decorations, and music. The vibrant Latino community in LA provides Kevin with role models in sports, arts, and academics, reinforcing his sense of belonging while encouraging
    him to pursue his personal goals. His cultural upbringing emphasizes respect for elders, the value of hard work, and the importance of community support, all of which influence his collaborative yet
    competitive nature.
