  hobbies: '[''Gardening'', ''Quilting'', ''Book club (historical fiction)'', ''Volunteer at historical museum'', ''Bridge'', ''Cooking traditional Midwestern dishes'', ''Walking groups'', ''Genealogy research'']'
  career_goals: Although retired from formal employment, Nina aims to deepen her impact on the Findlay community by leading larger volunteer initiatives, mentoring younger volunteers, and possibly serving
    on the board of the local senior center. She is also eager to complete a genealogy project tracing her family’s roots in the Midwest, and hopes to share her findings through local historical society
    presentations. Maintaining her health and staying active remain top priorities, so she plans to incorporate regular walking groups and low‑impact fitness classes into her routine.
