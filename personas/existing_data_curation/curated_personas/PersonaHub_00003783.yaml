persona_description: A wind energy project manager who is responsible for overseeing the design, construction, and operation of large wind projects. This person is aware of the complex and dynamic nature
  of wind energy projects, including the effects of atmospheric conditions, turbine spacing, and wind-shear conditions on wake behavior. They are skilled in conducting detailed wind energy assessments and
  using advanced modeling techniques to predict and mitigate the effects of wake losses. The persona is aware of the importance of accurate modeling and data collection for wind energy projects, and they
  are committed to ensuring that their projects are designed and constructed in a way that maximizes the benefits of wind energy while minimizing its negative impacts.
