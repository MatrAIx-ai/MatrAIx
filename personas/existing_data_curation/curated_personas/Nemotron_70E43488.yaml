  hobbies: '["Playing golf", "Sailing", "Reading historical non-fiction", "Garden landscaping", "Playing bridge", "Volunteering as a church treasurer", "Organized cruises with his wife"]'
  career_goals: Although retired, Joshua’s primary ambition is to leave a lasting, positive impact on his family and community. He aims to mentor younger entrepreneurs and retirees, sharing his structured
    approach to problem solving and financial stewardship. He also seeks to serve on the board of a local charitable foundation, applying his strategic planning skills to enhance program effectiveness.
    Maintaining his health and structured routine, Joshua wants to ensure his legacy—both financial and ethical—remains a guiding example for his grandchildren and the broader Sarasota community.
