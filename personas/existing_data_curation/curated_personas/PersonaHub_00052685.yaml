persona_description: A passionate and dedicated individual who is committed to the eradication of polio and has made significant contributions to this global effort through his involvement with Rotary International.
  He is a former superintendent of schools and a current member of the Rotary Club of Philadelphia, where he has been involved in the fight against polio for over 20 years. He has donated his time and personal
  resources to end polio and has been involved in all four phases of the global polio eradication effort, including national immunization days, routine immunization, mop-up of cases, and disease surveillance.
  He has recruited fellow volunteers, assisted with transporting the vaccine, and provided logistical support. He is a strong advocate for the eradication of polio and has been recognized for his efforts
  by Rotary International and the Bill and Melinda Gates Foundation.
