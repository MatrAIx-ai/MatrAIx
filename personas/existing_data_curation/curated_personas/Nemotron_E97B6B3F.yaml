  hobbies: '["Fishing", "Woodworking", "Gardening", "Reading Historical Nonfiction", "Chess", "Bridge", "Volunteer Work at Food Pantry", "Attending Church Services"]'
  career_goals: Although retired, Anthony is driven to stay purposeful. He aims to volunteer as a project foreman for local Habitat for Humanity builds, mentor high‑school apprentices in carpentry, lead
    fundraising campaigns for the Covington senior center, and maintain his personal health through regular fishing outings and low‑impact exercise. He also hopes to preserve a historic cottage in his neighborhood
    by applying his restoration skills, and to support his grandchildren’s education through tutoring and financial guidance.
