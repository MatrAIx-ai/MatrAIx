personas:
  professional: Anthony Mccollum is a retired hardware store owner and seasoned construction manager who now channels his three decades of carpentry, budgeting, and supplier negotiation expertise into volunteer
    project foreman roles, applying his methodical, structured mindset and competitive edge to keep Habitat for Humanity builds on schedule and within budget.
  sports: Anthony Mccollum is an early‑morning catfish angler who competes in the Pearl River Catfish Classic, supports the New Orleans Saints football team and the New Orleans Pelicans, and maintains their
    fitness by rowing their skiff and tending the garden, preferring solitary, low‑impact exercise over gym routines.
  arts: Anthony Mccollum finds artistic solace in woodworking, often carving intricate inlays while listening to the timeless croon of Johnny Cash and the hymnals of their church, and they regularly attend
    performances by the Louisiana Philharmonic Orchestra and visit the New Orleans Museum of Art to admire works by regional painters such as George Rodrigue.
  travel: Anthony Mccollum prefers meticulously planned road trips that blend their love for Southern history with leisurely comforts, having driven to Gettysburg, Vicksburg, and the historic French Quarter
    of New Orleans, while they dream of a quiet pilgrimage to the Blue Ridge Mountains of Asheville before health limits longer journeys.
  culinary: Anthony Mccollum delights in cooking hearty Southern fare, often preparing a crisp fried catfish po’ boy with a side of their home‑grown tomato‑basil soup and cornbread, while their garden yields
    fresh herbs and sweet tomatoes that they pepper into gumbo and jambalaya, reflecting a modest yet skillful kitchen prowess.
  core: Anthony Mccollum is a disciplined, early‑rising carpenter‑mentor who balances a competitive spirit in catfish tournaments with a habit of double‑checking every invoice, yet they can be stubbornly
    skeptical of new technology, often opting for a paper ledger over a digital app.
background:
  cultural: Anthony grew up in a working‑class, white Catholic family on the North Shore of Lake Pontchartrain during the post‑war era. The cultural fabric of the Gulf Coast—Mardi Gras celebrations, Cajun
    and Creole cuisine, and a deep respect for the outdoors—shapes his daily life. He values Southern hospitality, self‑reliance, and the importance of family gatherings, especially holiday meals and church
    events. His upbringing emphasized discipline, order, and a pragmatic outlook, which dovetails with his preference for structure and predictable routines. The close‑knit community of Covington reinforces
    his commitment to local traditions and volunteerism.
