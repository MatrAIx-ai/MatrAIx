  career_goals: Peter dreams of becoming a creator who blends art and science—he talks about wanting to design futuristic inventions, build spaceships, or write comic‑book adventures. He often says he wants
    to be an astronaut‑engineer who can draw alien worlds and solve puzzles in space. His competitive streak fuels a desire to be the best in whatever he does, so he aspires to be a renowned inventor or
    "master builder" who wins science fairs and art contests.
