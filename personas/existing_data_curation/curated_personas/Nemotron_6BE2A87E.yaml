personas:
  professional: Peter Townsend, a budding junior scientist, meticulously designs LEGO city blueprints and magnet circuit experiments, and they channel their boundless imagination and competitive drive into
    winning school science fairs.
  sports: Peter Townsend, an energetic member of the Cypress Soccer Association, passionately follows the Houston Astros and the Houston Rockets, and they channel their competitive spirit into weekend matches
    where they devise new strategies and celebrate every goal with a triumphant fist‑pump.
  arts: Peter Townsend, a creative storyteller, immerses themselves in the whimsical worlds of 'Calvin and Hobbes', Studio Ghibli’s 'My Neighbor Totoro', and the classic songs of Disney’s 'The Little Mermaid',
    and they translate this artistic inspiration into detailed sketches of fantastical creatures and lively performances in the school drama club.
  travel: Peter Townsend, an inquisitive traveler, loves family road trips to the Houston Space Center and San Antonio River Walk, dreams of exploring Disneyland Paris and the pyramids of Giza, and they
    plan each adventure with a notebook full of doodles, itineraries, and a checklist of snacks.
  culinary: Peter Townsend, a budding chef, delights in the smoky aroma of backyard BBQ ribs, the cheesy comfort of macaroni and cheese, and the zesty crunch of soft tacos, and they often experiment by
    adding a pinch of cumin to their grilled cheese sandwiches while proudly showcasing their creations at family gatherings.
  core: Peter Townsend, a fiercely imaginative 7‑year‑old with a competitive streak, transforms LEGO bricks into sprawling kingdoms, dominates school science fairs, and they lead friends in epic storytelling
    quests, all while meticulously budgeting their allowance in a bright pink piggy bank.
background:
  cultural: Peter lives in Cypress, Texas, a suburban community in Harris County near Houston. His family reflects a mainstream white American background with roots in English, German, and Irish ancestry.
    He participates in typical Southern‑Texas customs such as holiday barbecues, fireworks, and local community fairs, and attends neighborhood soccer leagues and church youth events. The diverse Houston
    metro area also exposes him to a variety of foods, music, and cultural festivals, enriching his everyday experiences.
