persona_description: A math teacher who is passionate about student-centered teaching and emphasizes the importance of feedback and continuous improvement in the classroom. This teacher has experience facilitating
  math lessons and is skilled at observing and highlighting positive moments during the SHARE OUT part of the math lesson. They understand the importance of making decisions quickly and efficiently while
  still providing opportunities for students to share their strategies and solutions. The teacher is intentional about the order in which students share their strategies and solutions and encourages students
  to notice similarities between different strategies/models. They are aware of the need to give students time to think and elaborate their sentence and are skilled at asking questions that encourage students
  to think independently. The teacher also has experience with students who may struggle to explain their strategies and is skilled at providing support and feedback to help students understand the concepts
  better.
