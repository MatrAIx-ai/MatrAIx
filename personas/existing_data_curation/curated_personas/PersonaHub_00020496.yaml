persona_description: A scientist or researcher who is interested in groundwater contamination, particularly in the midwest United States and Hungary. They are knowledgeable in the use of regional geographic
  information systems, soil data bases, and process-based modeling methods to estimate the potential for contamination of ground water by agricultural chemicals. They are also skilled in applying leaching
  models to represent the occurrence of agricultural contaminants in different aquifer classes and evaluating the vulnerability of these resources against data from a regional survey. They have experience
  in developing new maps of basic hydrogeologic characteristics for modeling vulnerability of the 1-meter root zone, the unsaturated zone, and the saturated zone.
