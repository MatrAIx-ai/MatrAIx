personas:
  professional: Jaime Elliff, a seasoned journeyman electrician who blends technical precision with artistic flair, channels their curious, organized yet flexible mindset into crafting sustainable lighting
    installations, mentoring apprentices, and they meticulously navigate NEC code compliance for residential and commercial projects.
  sports: Jaime Elliff, an avid hiker of Padre Island’s dunes and a weekend beach-volleyball player, participates in the local Corpus Christi running club that meets for early-morning 5-k runs along the
    shoreline, and they follow the Houston Astros and the Dallas Cowboys with enthusiastic devotion.
  arts: Jaime Elliff immerses themselves in watercolor seascapes inspired by Winslow Homer, curates gallery evenings at the Art Center of Corpus Christi showcasing Frida Kahlo retrospectives, and they strum
    acoustic renditions of Bob Dylan’s "Knockin’ on Heaven’s Door" while sipping cold brew on their porch.
  travel: Jaime Elliff revels in road-trip adventures along the Gulf, having explored the historic streets of New Orleans and the rainforests of Costa Rica, and they dream of an Icelandic tour to witness
    geothermal springs and the Northern Lights, preferring balanced itineraries that blend photography stops with spontaneous local food finds.
  culinary: Jaime Elliff enjoys cooking Tex-Mex classics like shrimp tacos with fresh cilantro, cotija cheese, and fiery jalapeños, as well as grilling marinated carne asada, and they sometimes over-salt
    dishes when experimenting with new spice blends, while their succulent garden supplies occasional garnish herb bursts.
  core: Jaime Elliff is a curiosity-driven electrician who fuses sustainable lighting art with a disciplined work ethic, mentors apprentices, savors Tex-Mex flavors, and they balance meticulous planning
    with spontaneous creative bursts.
background:
  cultural: Jaime grew up in a modest white Anglo‑American family in the coastal region of South Texas. Her upbringing combined traditional Southern Texan values—hard work, self‑reliance, and community
    hospitality—with the multicultural flavor of Corpus Christi, where Mexican‑American traditions, Gulf Coast cuisine, and an active arts scene are part of daily life. This blend shapes her practical yet
    creative outlook, her appreciation for both technical precision and artistic expression, and her commitment to fostering inclusive opportunities in the trades.
attributes:
  skills: '["Residential wiring", "Commercial electrical systems", "NEC code compliance", "Troubleshooting and diagnostics", "Solar photovoltaic installation", "Smart home automation", "Low‑voltage data
    cabling", "Custom lighting design for art installations", "Project planning and scheduling", "Safety training and OSHA compliance", "Mentoring apprentices", "Blueprint reading"]'
  hobbies: '["Watercolor painting", "Coastal photography", "Visiting art galleries", "Hiking at Padre Island", "DIY home improvement", "Arduino electronics projects", "Reading science fiction", "Cooking
    Tex‑Mex cuisine", "Succulent gardening", "Playing acoustic guitar"]'
  career_goals: Jaime aims to become a master electrician and eventually launch her own boutique electrical contracting firm that specializes in sustainable and artistic lighting solutions for homes and
    small businesses. She plans to earn NABCEP certification for solar installations and pursue LEED consultancy training to broaden her expertise in green building practices. Additionally, she hopes to
    develop a mentorship program that encourages more women to enter the skilled trades, fostering a supportive community within the Corpus Christi area.
