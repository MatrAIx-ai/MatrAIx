personas:
  professional: John Bennett, a meticulous cleaning specialist with deep expertise in eco‑friendly floor care, workflow optimization, and staff training, channels his curiosity and disciplined organization
    into designing green cleaning protocols, and they aim to supervise a team while pursuing certifications in green cleaning and facility management.
  sports: John Bennett, a low‑key fitness enthusiast, jogs on the Litchfield Trail twice a week, supports the Hartford Yard Goats and the New England Revolution, and they participate in a local community
    running club while occasionally playing casual frisbee with a small group of friends.
  arts: John Bennett, an avid interior photographer who captures the symmetry of well‑organized spaces, curates a collection of Ansel Adams prints for inspiration, assembles Tamiya model kits on weekends,
    and they unwind listening to Bon Iver and folk‑rock classics by Bob Dylan.
  travel: John Bennett, a methodical planner, prefers weekend getaways to nearby New England towns like Mystic and Burlington, enjoys quiet nature walks in the Green Mountain National Forest, dreams of
    exploring the zen gardens of Kyoto, and they always book eco‑friendly accommodations within a modest budget.
  culinary: John Bennett, an intermediate home cook who favors herb‑infused dishes such as rosemary‑roasted potatoes, oregano pesto pasta, and lavender honey tea, often uses fresh herbs from their indoor
    garden and they experiment with sustainable, low‑waste cooking techniques.
  core: John Bennett is a detail‑obsessed, eco‑mindful cleaning professional who balances a love for order with quiet curiosity, rarely socializes beyond small circles, and they manage stress through meticulous
    planning, gardens, and indoor photography.
background:
  cultural: John is a white American from a modest, multi‑generational New England family rooted in Connecticut. He was raised in a community where punctuality, hard work, and self‑reliance are valued,
    and traditions such as Thanksgiving family gatherings and summer outings in the Litchfield area shaped his outlook. The cultural emphasis on modesty and practical skill development has reinforced his
    disciplined, organized nature. While he identifies with mainstream American customs, his upbringing in the rural‑suburban setting of Bristol instilled a respect for tidy, well‑maintained homes and an
    appreciation for local heritage.
attributes:
  skills: '[''Residential cleaning'',''Commercial cleaning'',''Floor care and polishing'',''Upholstery and fabric care'',''Sanitization and infection control'',''Eco‑friendly cleaning techniques'',''Chemical
    safety and handling'',''Inventory management'',''Scheduling and client coordination'',''Training and supervision'',''Basic home maintenance'',''Space optimization'']'
  hobbies: '[''Indoor gardening'',''Reading practical DIY and sustainability books'',''Puzzle assembly'',''Model kit building'',''Nature walks'',''Interior photography'']'
  career_goals: John aims to advance from front‑line housekeeping to a supervisory role where he can design cleaning protocols and lead a team. Over the next five years he plans to earn certifications in
    green cleaning and facility management, and eventually launch his own small‑scale, environmentally‑focused cleaning service that serves residential clients in Litchfield County. He also hopes to achieve
    a stable, higher income to support his growing family and to reduce the financial stress that often weighs on him.
