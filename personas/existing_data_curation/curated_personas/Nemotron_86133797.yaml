  career_goals: Jeffrey aims to become a senior design engineer within the next three years, leading complex power‑electronics projects for electric‑vehicle or renewable‑energy systems. He plans to earn
    his Professional Engineer (PE) license and obtain certifications in energy management to strengthen his technical credibility. Over the longer term, he aspires to move into an engineering‑manager role
    where he can mentor junior engineers and shape product roadmaps. He also dreams of launching his own startup that delivers affordable, modular smart‑home IoT devices, leveraging his low‑power embedded‑hardware
    expertise and cloud integration skills. In parallel, he wants to contribute to open‑source hardware projects and present his work at industry conferences.
