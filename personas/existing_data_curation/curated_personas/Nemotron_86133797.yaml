personas:
  professional: Jeffrey Lee, a 28‑year‑old embedded‑systems specialist, combines rigorous analog/digital circuit design and PCB layout expertise with a practical curiosity that fuels their drive to lead
    power‑electronics projects for EVs, while their organized yet flexible work style lets them document thorough project plans and adapt on the fly in a small‑team maker environment.
  sports: Jeffrey Lee is an avid hiker with the Texas Hill Country Hiking Club, follows the Dallas Cowboys, Austin FC, and Texas Rangers, and spends weekends trail‑running or playing pickup basketball at
    the local community center, balancing their love of outdoor endurance with occasional sedentary board‑game marathons.
  arts: Jeffrey Lee regularly attends intimate shows at Austin’s Mohawk featuring artists like Khruangbin and St. Vincent, devours science‑fiction novels by Isaac Asimov and Neal Stephenson, and hosts nightly
    board‑game sessions featuring Terraforming Mars and Scythe, letting these creative outlets shape their problem‑solving mindset.
  travel: Jeffrey Lee prefers low‑key road trips through the Texas Hill Country, having camped at Enchanted Rock and explored Big Bend, while they dream of hiking Iceland’s waterfalls and navigating Akihabara’s
    electronics districts in Japan, often planning itineraries on TripIt and balancing travel costs with their modest savings.
  culinary: Jeffrey Lee brews a precise pour‑over with Ethiopian Yirgacheffe beans using a Kalita Wave, cooks spicy chicken fajitas and chili rellenos topped with Valentina hot sauce, and while their culinary
    skill is solid enough for weekend brunches, they frequently over‑extract coffee when debugging late‑night code.
  core: Jeffrey Lee fuses a maker’s relentless curiosity with disciplined budgeting, turning late‑night circuit experiments into modular IoT prototypes while juggling a coffee‑addicted, board‑game‑fueled
    lifestyle.
background:
  cultural: Jeffrey grew up in a suburban community near Austin, Texas, in a middle‑class white family that emphasized self‑reliance, education, and community involvement. His upbringing blended traditional
    Anglo‑American values—such as individualism, practical problem‑solving, and a respect for hard work—with the vibrant, progressive culture of Austin’s tech and music scenes. He celebrates typical American
    holidays like Thanksgiving and the Fourth of July, enjoys local traditions such as Texas barbecue and outdoor festivals, and has developed an appreciation for the city’s multicultural atmosphere while
    maintaining a personal identity rooted in mainstream American norms.
