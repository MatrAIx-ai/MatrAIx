  career_goals: Anne aims to advance from her current clerk role to a senior claims adjuster position within the next three years, eventually moving into a claims management or supervisory role. She plans
    to earn the Chartered Property Casualty Underwriter (CPCU) designation and complete a bachelor’s degree in Business Administration or Risk Management. Her long‑term ambition is to spearhead technology‑driven
    workflow enhancements that increase claim processing efficiency, and she envisions one day founding a boutique consultancy that helps regional insurers adopt data‑analytics tools and creative problem‑solving
    frameworks. Balancing career growth with family life, she seeks roles that offer flexible scheduling and professional development opportunities.
