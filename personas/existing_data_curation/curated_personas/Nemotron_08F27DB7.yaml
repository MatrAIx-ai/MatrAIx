  hobbies: '["Church choir participation", "Community event organization", "Gardening", "Cooking Southern comfort food", "Reading historical fiction", "Quilting", "Genealogy research", "Volunteering for
    financial literacy workshops", "Walking in local parks", "Bingo club"]'
  career_goals: Approaching retirement, Marie aims to transition into a mentorship role, formally training the next generation of analysts within the county. She plans to obtain a Certified Government Financial
    Manager (CGFM) credential to deepen her expertise and to spearhead a county‑wide initiative that streamlines service delivery using data‑driven insights. Additionally, she hopes to establish a part‑time
    consulting practice that focuses on nonprofit financial literacy and to continue volunteering as a liaison between local government and community organizations.
