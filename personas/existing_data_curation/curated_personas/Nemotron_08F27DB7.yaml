personas:
  professional: Marie Scott, a veteran management analyst for Person County, channels three decades of quantitative expertise and a methodical, organized style into crafting Power BI dashboards and streamlined
    SOPs that earn trust across departments, while they blend data-driven insights with the warmth of community gatherings through talkative presentations.
  sports: Marie Scott, an avid follower of the Charlotte Hornets and Carolina Panthers, they join a local walking club that meets in the Person County park each Saturday, and occasionally cheer on the Durham
    Bulls during spring training outings with their quilting circle friends.
  arts: Marie Scott, a gospel‑song leader in her church choir, they often arrange renditions of classic gospel standards popularized by renowned gospel singers, delight in quilting patterns inspired by
    traditional motifs, and spend evenings immersed in historical fiction by acclaimed authors and biographies of influential American leaders.
  travel: Marie Scott, who prefers well‑planned road trips over spontaneous flights, they have revisited the historic streets of Savannah and the jazz districts of New Orleans, while dreaming of a future
    cruise to the Bahamas as a low‑stress retirement adventure.
  culinary: Marie Scott, a proficient home cook, they craft soul‑food classics such as slow‑cooked pork shoulder, collard greens seasoned with smoked turkey, sweet potato casserole, and keep a secret recipe
    for buttery cornbread that they serve at weekly choir potlucks.
  core: Marie Scott, a routine‑loving, talkative analyst who balances meticulous budgeting with gospel‑filled community gatherings, they never miss a Sunday choir rehearsal, yet occasionally burn the cornbread
    while multitasking between spreadsheets and quilting needles.
background:
  cultural: Marie’s cultural identity is rooted in the rich tapestry of Southern African‑American heritage. Her family migrated from the coastal Gullah/Geechee communities of South Carolina to Roxboro during
    the mid‑20th century, bringing with them distinct culinary traditions, storytelling customs, and a deep reverence for church life. She maintains close ties to her church, which serves as a hub for communal
    support, celebration of holidays like Juneteenth, and intergenerational bonding. Her upbringing emphasized respect for elders, community service, and the preservation of oral histories, which she now
    shares through storytelling and mentoring younger community members.
attributes:
  skills: '["Data analysis", "Process improvement", "Project coordination", "Stakeholder communication", "Report writing", "Budgeting and financial forecasting", "Microsoft Excel, Access, and Power BI",
