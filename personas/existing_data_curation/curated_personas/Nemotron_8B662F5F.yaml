  career_goals: Although only two years old, Mary frequently expresses a bright imagination about her future. She often says she wants to be a dancer who can twirl on stage, an artist who paints vibrant
    pictures, or a teacher who shares stories with other children. Her desire to be the center of attention and to bring joy to others fuels these early ambitions, and she looks forward to growing up surrounded
    by music, art, and community.
