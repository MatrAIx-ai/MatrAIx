personas:
  professional: Mary Vickers, a curious two‑year‑old who turns daily routines into mini‑projects—organizing her toy kitchen by color, dictating pretend news reports about the backyard, and asking “why”
    at every turn—exemplifies an early blend of structure and imagination that foreshadows a future in creative problem‑solving.
  sports: Mary Vickers, a two‑year‑old who loves the neighborhood park’s mini‑soccer net, proudly waves a tiny Chicago Cubs cap while chasing foam balls, attends toddler swim classes where she splashes
    energetically, and uses a plastic jump rope as a prop for imaginative “dragon‑riding” games—reflecting her sociable, energetic, and slightly competitive spirit.
  arts: Mary Vickers, a two‑year‑old fascinated by vivid colors, spends mornings finger‑painting scenes inspired by Eric Carle’s books, sings along loudly to Laurie Berkner’s “We Are the Dinosaurs”, and
    insists on displaying her crayon drawings on the fridge, often narrating elaborate stories about each picture, embodying her artistic curiosity and love for being the center of attention.
  travel: Mary Vickers, a two‑year‑old who clings to the car seat on family road trips to Monterey’s aquarium, lights up at the salty breeze and the movement of sea turtles, enjoys stroller walks at the
    local botanical garden, and dreams of seeing Disneyland’s fireworks after hearing her older cousin’s tales—blending her love for new experiences with a comforting need for familiar routine.
  culinary: Mary Vickers, a two‑year‑old who favors creamy mac and cheese, smooth avocado mash, and sweet mango puree, grimaces at broccoli like a tiny critic, insists on using a plastic fork “just like
    the big kids”, and occasionally surprises everyone by reaching for a bite of a new spice‑light salmon bite offered by her mother—showcasing her picky palate punctuated by occasional adventurous bites.
  core: Mary Vickers, a curious, talkative two‑year‑old who balances a love for bright art and playful learning with anxious moments over missing crayons or a scraped knee.
background:
  cultural: Mary is raised in a Black family in Merced, California. Her household celebrates African‑American cultural traditions such as gospel music, storytelling, and community gatherings at the local
    church. Family events often feature soulful rhythms, clapping games, and shared meals that reinforce a strong sense of heritage. The multicultural atmosphere of Merced, with its local festivals and
    art programs, further nurtures Mary's appreciation for varied experiences and artistic expression.
