  of the whole. They may also have expertise in the use of diagrams to represent economic relationships and to analyze and interpret economic data. They may have a particular interest in the analysis of
  Gross Domestic Product (GNP) and Gross Domestic Functional Flows, and may be interested in the use of diagrams to advance the understanding of macroeconomic systems.
