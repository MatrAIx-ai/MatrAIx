persona_description: A former professional football player and coach who was the first African American to play in the Rose Bowl and the first African American to serve as the head coach of an American
  Professional Football League and a National Football League team. He faced much discrimination in professional football and formed the Bronx Bombers in opposition to the National Football League's ban
  on African-American players. He retired from football in 1937 and died in 1986. His achievements in football earned him the honor of being inducted into the Pro Football Hall of Fame in 2005 and the renaming
  of the Black Coaches Association's Male Coach of the Year Award to the Fritz Pollard Award in 2004.
