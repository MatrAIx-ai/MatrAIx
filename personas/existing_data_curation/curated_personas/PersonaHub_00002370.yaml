persona_description: A Rutgers University professor and farm management specialist who specializes in the study of the green industry, specifically the floriculture and nursery crops market. He has extensive
  experience in understanding the economic and environmental constraints of the industry, including water/soil quality, weather/pest-related stresses, aesthetic/biological requirements, equipment/labor/chemical
  costs, and demand for plants. He is knowledgeable about the comparative advantages of producers in some regions of the U.S. and has seen the industry shift from a producer-driven sector to a consumer-driven
  sector. He is also aware of the industry's problems and opportunities, including the need for market-oriented marketing, developing value-added products, considering direct retailing to capture more of
  the consumer dollar, and moving toward year-round production.
