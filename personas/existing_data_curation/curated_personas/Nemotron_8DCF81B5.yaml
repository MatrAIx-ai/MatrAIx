personas:
  professional: Susan Witt, a seasoned volunteer coordinator turned senior‑center health advocate, leverages her meticulous household budgeting, event‑planning expertise, and gentle yet assertive communication
    to organize community workshops on medical advances while mentoring younger volunteers, embodying a blend of curiosity‑driven learning and methodical execution.
  sports: Susan Witt, a devoted member of the Patapsco Valley walking club, enjoys daily strolls along the river trail, proudly dons a Baltimore Orioles cap during spring training games, follows the Baltimore
    Ravens season with a modest enthusiasm, and prefers low‑impact activities such as gentle yoga over competitive sports, reflecting her reserved yet health‑conscious approach to fitness.
  arts: Susan Witt, an avid participant in a close‑knit book club, immerses herself in historical fiction by Hilary Mantel and contemporary nonfiction by Malcolm Gladwell, knits intricate shawls inspired
    by William Morris’s designs, and attends the Baltimore Symphony Orchestra’s performances of Mahler and John Harbison, allowing her to blend intellectual curiosity with creative precision.
  travel: Susan Witt, a meticulous planner of leisurely excursions, has explored the colonial streets of Williamsburg, Virginia, dreams of strolling through the Georgian architecture of Bath, England, prefers
    road trips with detailed itineraries and stays at garden‑focused bed‑and‑breakfasts, balancing her love of history with a cautious travel budget.
  culinary: Susan Witt, who enjoys turning her garden’s bounty into meals, frequently prepares heirloom tomato bruschetta with fresh basil, roasts beet salads with goat cheese, bakes oatmeal raisin cookies
    spiced with cinnamon, and expertly can‑preserves summer produce, though she sometimes over‑salts her soups in a quest for bold flavor.
  core: Susan Witt is a methodical, curiosity‑driven octogenarian who balances organized advocacy, cautious finances, vigilant health habits, and quiet creative pursuits, all while navigating a persistent
    undercurrent of worry.
background:
  cultural: Susan was raised in a middle‑class white family in the mid‑Atlantic region during the post‑World War II era. Her upbringing reflected the values of the Baby Boomer generation—self‑reliance,
    community involvement, and respect for tradition—while also exposing her to the gradual social changes of the 1960s and 1970s. She identifies with the cultural norms of suburban Maryland, including
    participation in church activities, a strong emphasis on family cohesion, and a deep appreciation for the region’s historical heritage. Her education at a local community college and lifelong residence
    in Baltimore County have further rooted her in the practical, neighborly ethos of the area.
