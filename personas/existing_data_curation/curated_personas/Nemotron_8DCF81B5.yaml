  hobbies: '[''Reading historical fiction'', ''Exploring contemporary science articles'', ''Genealogy research'', ''Organic vegetable gardening'', ''Knitting'', ''Crossword puzzles'', ''Digital photo archiving'',
    ''Attending small book club meetings'', ''Walking local nature trails'']'
  career_goals: Susan's primary ambition at this stage is to maintain her independence and continue cultivating her curiosity. She aims to complete a comprehensive family genealogy that will be digitized
    and shared with future generations, and to publish a brief memoir reflecting her experiences across seven decades of American life. She also hopes to mentor younger volunteers at the senior center,
    teaching them organizational best‑practices and patient advocacy. Healthwise, her goal is to stay physically active through daily walks and gentle yoga, and to manage her worry through regular journaling
    and mindfulness exercises.
