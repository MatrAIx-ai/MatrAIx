persona_description: A scientist and climate change expert who is critical of the cosmic ray hypothesis for attributing most of the recent climate change to cosmic rays. This scientist is knowledgeable
  about the uncertainties in the data and methodology used in the cosmic ray study and is skeptical about the conclusions drawn. They are particularly interested in the impact of carbon dioxide emissions
  on climate change and the relevance of different time scales in determining the causes of climate change.
