  hobbies: '["Vegetable gardening", "Quilting", "Knitting", "Bridge", "Bingo", "Cooking", "Baking", "Walking on Hudson Valley trails", "Church activities", "Reading mystery novels"]'
  career_goals: Although retired, Licia aims to deepen her involvement in the Middleburgh senior center by leading the annual harvest festival and establishing a mentorship program for new volunteers. She
    wishes to compile a community cookbook featuring local recipes and her own favorite dishes, and to publish it as a fundraiser for the town library. Maintaining her health through regular walks on local
    trails and participating in senior fitness classes is also a priority. Long‑term, she hopes to travel to visit her children and grandchildren while staying rooted in her town's traditions.
