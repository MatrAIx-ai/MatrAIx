  career_goals: Although retired, Marissa aims to deepen her impact in the Durham community by mentoring young adults at the local community center, organizing intergenerational storytelling sessions, and
    compiling a cookbook that blends family recipes with narratives of her family's history. She also hopes to learn more advanced digital tools to create a short video series preserving the experiences
    of her peers from the Civil Rights era. Ultimately, she aspires to leave a lasting record of the neighborhood’s cultural heritage while continuing to support her church’s youth programs.
