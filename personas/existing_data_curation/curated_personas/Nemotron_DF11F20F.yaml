personas:
  professional: Marissa Gourdet, a retired volunteer coordinator turned community mentor, leverages her event‑planning, budgeting, and conflict‑mediation expertise to organize intergenerational storytelling
    sessions at the Durham community center, merging her practical curiosity with a flexible, organized approach, and they enjoy teaching digital tools to young adults.
  sports: Marissa Gourdet, an enthusiastic walker who joins the senior center’s low‑impact aerobics, cheers on the Durham Bulls during summer baseball, follows the Duke Blue Devils basketball season, and
    they treat gardening as their daily cardio, preferring gentle movement over high‑intensity workouts.
  arts: Marissa Gourdet, a devoted fan of jazz legends like Billie Holiday and B.B. King, immerses herself in historical fiction by Walter Dean Myers, while channeling artistic energy into quilting intricate
    patchwork blankets inspired by traditional Southern motifs, and they often listen to vinyl records while stitching.
  travel: Marissa Gourdet, who favors leisurely road trips to historic locales such as Savannah’s squares, the Smithsonian museums in Washington, D.C., and the gardens of Charleston, prefers guided group
    tours that accommodate her mobility, and they dream of a gentle cruise along the Mississippi River to explore river towns.
  culinary: Marissa Gourdet, an accomplished home cook specializing in Southern comfort foods like fried chicken, collard greens simmered with smoked turkey, and sweet potato pie, delights in experimenting
    with fresh herbs from her garden to reinvent classics like tomato bisque with basil and thyme, and they often host potluck gatherings for neighbors.
  core: Marissa Gourdet, a 79‑year‑old garden‑tending, community‑spirit‑driven storyteller, balances curiosity with practicality, often juggling quilting needles, budgeting spreadsheets, and jazz vinyls,
    while they occasionally forget to water their tomatoes in favor of a late‑night bridge game.
background:
  cultural: Marissa was born and raised in Durham’s historic African-American neighborhoods, where church, family, and community were central pillars of daily life. Growing up during the civil‑rights movement,
    she witnessed and participated in local activism, shaping a strong sense of social responsibility. Her culinary traditions are rooted in Southern soul food, passed down through generations, and her
    storytelling reflects the oral history tradition of her community. She embraces the values of resilience, mutual support, and collective pride that characterize the Black community of Durham, and she
    continues to honor these cultural legacies through her volunteer work and intergenerational mentorship.
