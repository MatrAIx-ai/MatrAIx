  hobbies: '[''Visiting art galleries and museums'', ''Live music concerts'', ''Ultimate frisbee'', ''Urban photography'', ''Traveling to cultural festivals'', ''Experimenting with cooking and food trucks'',
    ''Socializing at local bars and pubs'', ''Attending improv comedy shows'', ''Multiplayer video gaming'', ''Volunteering at community art events'']'
  career_goals: Heiko aims to become a senior marketing strategist within the next two years, leading high‑impact, culturally resonant campaigns for emerging brands. In five to seven years, he aspires to
    step into a Marketing Director role, overseeing a multidisciplinary team and integrating cutting‑edge technologies such as AI‑driven personalization and AR experiences. He plans to complete his bachelor's
    degree in marketing, pursue certifications in data analytics, and eventually launch his own boutique agency that blends art, music, and innovative marketing for cultural institutions and indie businesses.
