  hobbies: '[''Building LEGO sets'', ''Solving jigsaw puzzles'', ''Reading wildlife and science books'', ''Boy Scouts activities'', ''Helping in family garden'', ''Caring for the family dog'', ''Playing
    strategy video games (Minecraft Creative)'']'
  career_goals: Although only ten, Douglas already envisions a future that blends his love for animals with a stable, structured profession. He aims to maintain high grades, especially in science and math,
    to eventually study veterinary science. He hopes to join the 4‑H club and volunteer at the local animal shelter to gain hands‑on experience. In the long term, he aspires to work as a veterinarian or
    a farm animal caretaker, where routine, responsibility, and caring for living beings are central.
