  hobbies: '[''Woodworking'', ''Scale model building'', ''Vegetable gardening'', ''Reading historical non-fiction and DIY manuals'', ''Documentary watching'', ''Listening to classic soul and jazz'', ''Urban
    photography'', ''Genealogy research'', ''Walking in local parks'', ''Home improvement projects'']'
  career_goals: Danny aims to transition into a supervisory role that leverages his organizational strengths while allowing him to maintain a predictable, low‑stress work environment. Over the next three
    years he plans to obtain OSHA 30‑hour certification and a formal site‑supervisor credential, positioning himself for a foreman or safety‑coordinator role on day‑shift projects. Ultimately, he hopes
    to establish a small, family‑run renovation business focused on residential remodels, where he can apply his methodical expertise, mentor younger workers on a one‑on‑one basis, and secure a steady income
    for his family’s retirement.
