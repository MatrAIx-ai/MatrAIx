persona_description: A scientist who specializes in the study of molecular carcinogenesis and the regulation of cell specialisation processes. Her research interests include the role of transcription factors
  in the formation of functional epithelial tissues, particularly in the context of bladder cancer and urothelial cells. She has published extensively in journals such as Nature's Cell Death and Differentiation
  and has received funding from the BBSRC and York Against Cancer. Her work has implications for the development of therapeutic options for urothelial cell disorders.
