  career_goals: Leeann aspires to attend a reputable university where she can major in environmental science or biomedical engineering. Her long‑term goal is to become a research scientist focused on sustainable
    agriculture or wildlife conservation, applying her disciplined work ethic to develop practical solutions for rural communities. She envisions a career that combines rigorous scientific inquiry with
    tangible, community‑oriented impact, and she is determined to achieve academic excellence to qualify for competitive scholarships and research internships.
