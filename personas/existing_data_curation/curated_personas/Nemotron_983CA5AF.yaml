  career_goals: Michaela aims to transition into a senior technical architect role where she can shape enterprise‑level systems while maintaining the focused, remote work environment she prefers. She plans
    to attain AWS Solutions Architect Professional and CISSP certifications to deepen her expertise in secure cloud architecture. Over the next decade, she hopes to launch a consultancy that helps nonprofit
    organizations implement data‑driven solutions for community impact, and she wants to be recognized as a thought leader on ethical AI and inclusive technology practices. Additionally, she is committed
    to mentoring the next generation of Black women in tech through formal programs and speaking engagements, ultimately contributing to greater diversity and equity in the industry.
