  career_goals: Dionta aims to transform her company into a market leader that integrates cultural insight with sustainable growth. She aspires to launch a strategic initiative that partners with Black‑owned
    art collectives, positioning the firm as a champion of creative entrepreneurship. Long‑term, she seeks a seat on the board of a national nonprofit focused on economic empowerment for women of color,
    and plans to author a memoir that blends leadership lessons with reflections on navigating corporate spaces as a Black female executive. Her ambition is guided by personal impact, competitive achievement,
    and the desire to leave a legacy of inclusive innovation.
