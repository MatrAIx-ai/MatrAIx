personas:
  professional: Mario Lirette is a freelance visual artist and workshop facilitator who blends watercolor painting, graphic design, and DIY woodworking, and they channel their imaginative curiosity and
    collaborative spirit into immersive art experiences while navigating a perpetually flexible schedule and occasional disorganization.
  sports: Mario Lirette enjoys casual weekend basketball at the Upper Darby Recreation Center, follows the Philadelphia Eagles and Phillies with fervor, they also join a seasonal community soccer league
    in spring, and they balance fitness with relaxation rather than intense training.
  arts: Mario Lirette immerses themselves in the Philadelphia art scene, drawing inspiration from the abstract canvases of Whitfield Lovell, the lyrical folk of ukulele player Jake Shimabukuro, and the
    poetic prose of Ocean Vuong, and they host intimate critique circles with fellow creators to deepen their practice.
  travel: Mario Lirette prefers low‑key, culturally rich trips, having explored the historic neighborhoods of Boston and the vineyards of Tuscany, they dream of a future pilgrimage to the rugged cliffs
    of County Kerry, and they balance this wanderlust with a modest travel budget and a desire for artistic inspiration.
  culinary: Mario Lirette delights in cooking simple yet flavorful meals such as mushroom risotto with fresh thyme and Parmesan, they occasionally perfect a Sunday family‑style braised short rib dish seasoned
    with garlic and rosemary, and they favor both farm‑to‑table produce markets and the occasional artisanal charcuterie board.
  core: Mario Lirette is a dream‑driven creator who balances a love for spontaneous watercolor bursts with an occasional habit of misplacing tools, they thrive on quiet reflection and collaborative modesty.
background:
  cultural: Mario is a second-generation American of Italian and Irish ancestry, raised in the suburban milieu of Upper Darby, Pennsylvania. He grew up in a modest, middle-class household that valued community,
    modesty, and mutual support. The multicultural environment of the Philadelphia metropolitan area exposed him to diverse artistic influences, while his family's Catholic roots instilled a sense of responsibility
    and cooperation. These cultural threads combine to shape his appreciation for the local arts scene, his collaborative spirit, and his preference for harmony in personal interactions.
attributes:
  skills: '[''Sketching and watercolor painting'', ''Creative writing (poetry and short fiction)'', ''Basic graphic design using Adobe Photoshop and Illustrator'', ''DIY woodworking for functional art'',
