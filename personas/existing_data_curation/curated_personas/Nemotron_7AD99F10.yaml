  hobbies: '[''Watercolor painting'', ''Sketching'', ''Creative writing (poetry and flash fiction)'', ''Reading philosophy and speculative fiction'', ''Visiting art galleries and museums'', ''Playing ukulele'',
    ''DIY woodworking and upcycling'', ''Meditation and nature walks'', ''Participating in small-group art and writing meet-ups'', ''Collecting vintage postcards'']'
  career_goals: Mario aspires to transition his creative passions into a modest, sustainable independent practice. He plans to hold a solo art exhibition at a local community gallery within the next two
    years, publish a collection of his poems and flash fiction through a small press, and launch a part-time workshop series for adults that combines visual art techniques with reflective writing. He also
    hopes to volunteer as an art mentor at the Upper Darby Youth Center, fostering creativity in a supportive environment. Ultimately, he seeks a lifestyle that balances artistic production with the freedom
    to explore new ideas without the constraints of a full-time job.
