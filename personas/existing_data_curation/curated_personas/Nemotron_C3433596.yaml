personas:
  professional: Kandy Gutierrez, a 64‑year‑old retired community organizer, leverages her bilingual fluency, meticulous budgeting, and network‑building skills to curate quarterly art and music series that
    bridge her heritage community with the broader Sarasota public, embodying her curious, organized, and sociable nature while maintaining a healthy skepticism that drives rigorous grant proposals.
  sports: Kandy Gutierrez stays active by participating in the local senior tennis league at the Sarasota Country Club, cheering on the Tampa Bay Buccaneers in football season and the Miami Heat during
    basketball, while also attending weekly aqua‑fit classes at the community center to maintain flexibility and cardiovascular health.
  arts: Kandy Gutierrez, an avid painter and photographer, draws inspiration from the vivid color palettes of artists like Frida Kahlo and the contemporary works of Jeff Koons, frequently curates community
    exhibitions featuring local emerging talent, and enjoys dancing to the lively rhythms of salsa legends such as Marc Anthony during weekly studio sessions.
  travel: Kandy Gutierrez prefers thoughtfully planned itineraries that blend cultural immersion with relaxation, having explored the historic streets of Savannah, Georgia, the art‑filled alleys of Barcelona,
    and the serene beaches of Key West, while dreaming of a future trip to the maritime villages of Portugal’s Algarve coast where she plans to capture sunrise photographs.
  culinary: Kandy Gutierrez, an experienced home chef, specializes in crafting vibrant tropical‑inspired meals such as grilled mahi‑mahi with mango‑coconut salsa, slow‑roasted pork shoulder seasoned with
    adobo spices, and plantain‑topped black bean rice, often experimenting with fresh cilantro, lime juice, and cumin to create authentic flavors, while occasionally over‑indulging in rich desserts during
    holiday gatherings.
  core: Kandy Gutierrez balances her disciplined, detail‑oriented planning with a contagious zest for social gatherings, a penchant for spontaneous salsa dance‑offs, and an unapologetic habit of hoarding
    vintage art flyers in every drawer.
background:
  cultural: Kandy was born in Santiago de Cuba and emigrated to the United States in her early twenties, bringing a rich tapestry of Cuban traditions with her. Her family maintains strong ties to music—especially
    son, mambo, and salsa—traditional cooking, and Catholic celebrations, and she continues to speak Spanish at home while fully participating in Sarasota's multicultural environment. Her Cuban heritage
    shapes her values of family loyalty, hospitality, and a deep appreciation for the arts, which she actively shares through community initiatives.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Community event planning'', ''Fundraising and grant writing'', ''Art curation and appreciation'', ''Cuban cuisine cooking'', ''Gardening'', ''Public
