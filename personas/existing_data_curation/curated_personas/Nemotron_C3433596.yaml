  hobbies: '[''Painting'', ''Salsa dancing'', ''Cooking Cuban cuisine'', ''Gardening'', ''Reading mystery novels'', ''Volunteering at senior center art classes'', ''Photography'', ''Traveling to visit family'']'
  career_goals: Although retired, Kandy is determined to expand her role as a cultural ambassador for the Cuban diaspora in Sarasota. She aims to launch and lead a quarterly Cuban art and music series at
    the local community center, secure sustainable grant funding, and eventually publish a memoir that weaves her personal journey with the story of Cuban-American culture. She also aspires to mentor emerging
    community organizers, sharing her disciplined planning and networking expertise.
