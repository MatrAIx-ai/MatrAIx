  career_goals: Although retired, Joseph aspires to complete and publish a collection of short stories inspired by his love of abstract concepts, as well as a personal memoir chronicling his life in Minnesota.
    He hopes to become a regular volunteer docent at the local history museum, sharing his deep appreciation for regional heritage. Joseph also plans to curate a small community art showcase that features
    local artists and encourages intergenerational collaboration. Continuous personal growth remains a priority, so he intends to enroll in online courses on digital illustration and continue exploring
    new creative mediums.
