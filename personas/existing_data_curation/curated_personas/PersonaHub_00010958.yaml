persona_description: A clinical cardiologist who has extensive experience in interpreting electrocardiograms (ECGs) and has developed a deep understanding of the various waveforms and their significance.
  This person has a detailed knowledge of the anatomy and physiology of the heart and is proficient in measuring the height and width of the various waveforms on an ECG paper. They are skilled in using
  a metric ruler to accurately measure the height and width of the P, Q, R, S, T, and U waves, and are able to identify the various waveforms and their significance in understanding the ECG. This person
  is highly specialized and has developed a unique set of skills that allow them to interpret ECGs with high accuracy and precision.
