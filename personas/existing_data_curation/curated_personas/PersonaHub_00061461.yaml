persona_description: A Ghanaian city mayor who is passionate about promoting sustainable development and reducing air pollution in his city, particularly in Accra. He is actively involved in the development
  and implementation of national climate plans and policies, including the Ghana Environmental Protection Agency's open burning programme and the development of the Accra city electric bus project. He is
  also a member of the steering committee of the Global Methane Initiative and the biogas, agriculture, and waste technical groups under the biogas sector. Additionally, he is a vocal advocate for the use
  of alternative energy sources and has taken the lead in implementing the Kigali Amendment to phase out HFCs and incorporating targets, policies, and actions on short-lived climate pollutants (SLCPs) into
  his city's updated Nationally Determined Contributions (NDCs).
