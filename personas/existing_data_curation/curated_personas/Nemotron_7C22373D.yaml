  hobbies: '[''Visiting art galleries and museums'', ''Listening to diverse music genres'', ''Playing acoustic guitar'', ''Participating in community theater improv'', ''Hiking in nearby state parks'',
    ''Cooking Southern cuisine'', ''Hosting game nights for friends'', ''Exploring local history and folklore'', ''DIY home improvement projects'', ''Social media storytelling'']'
  career_goals: Jake aims to transition into a part-time role that leverages his sociable nature and love for the arts, such as a community events coordinator, local art workshop facilitator, or a host
    for a neighborhood radio show/podcast. He dreams of eventually opening a small coffee shop and gallery that serves as a creative hub for Lyons residents, while also pursuing a GED or community college
    courses in communications to enhance his professional prospects.
