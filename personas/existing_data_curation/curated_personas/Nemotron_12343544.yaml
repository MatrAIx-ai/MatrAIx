personas:
  professional: A budding young illustrator, Brittany Lewis channels her love for detailed nature sketches into early freelance commissions for school newsletters, and they eagerly incorporate community
    feedback into each project, reflecting a practical, organized mindset and compassionate eye for sharing stories.
  sports: An enthusiastic member of the local community swimming program, Brittany Lewis swims laps at the neighborhood pool twice a week for fitness, and they also volunteer with the Girl Scouts' nature‑hike
    club, preferring low‑pressure activities that keep them active without the stress of competition.
  arts: A dedicated art club participant, Brittany Lewis draws inspiration from nature, emulating the brushwork of Claude Monet and the whimsical style of Beatrix Potter, and they often pair their sketching
    sessions with reading the Nancy Drew mystery series and listening to folk singer‑songwriter Joni Mitchell.
  travel: A thoughtful family traveler, Brittany Lewis has explored the Redwood National Forest and the historic streets of Boston with their parents, and they prefer carefully planned road trips that include
    scenic picnics, while dreaming of a solo backpacking adventure through the Swiss Alps once they’re older.
  culinary: A budding home chef, Brittany Lewis helps prepare vegetable stir‑fry with carrots, zucchini, and fresh basil, and they enjoy baking chocolate chip cookies with their mom, though they sometimes
    burn the edges when distracted by a new sketch idea.
  core: Brittany Lewis is a structured, compassionate 11‑year‑old who finds calm in sketching nature, saving allowance, and caring for their dog, yet they wrestle with worry and occasional forgetfulness
    that can turn a perfect plan into a minor scramble.
background:
  cultural: Brittany is raised in a middle‑class, predominantly white suburban community in Canton, Michigan. Her family emphasizes Midwestern values of hard work, modesty, and community involvement. She
    grew up attending local public schools, participating in community events such as county fairs and holiday parades, and experiencing the seasonal rhythms of the Great Lakes region. These cultural influences
    shape her practical outlook, sense of responsibility, and compassionate engagement with others.
