personas:
  professional: John Moreno, a retired mechanical and aerospace engineer, uses their expertise in thermodynamics, finite element analysis, and CAD to mentor engineering students and author a memoir, channeling
    their preference for routine and meticulous organization into structured workshop sessions and detailed technical writing.
  sports: John Moreno maintains their fitness through low‑impact activities like walking with the Riverbend Senior Walking Club and weekly pickleball matches at the senior center, while cheering on the
    Atlanta Braves in baseball and the New Orleans Saints in football during the season.
  arts: John Moreno’s cultural palate includes listening to the blues of B.B. King, the jazz of Miles Davis, and the classic westerns of John Ford, and they regularly attend the town’s community theatre
    productions of Tennessee Williams’ plays.
  travel: John Moreno prefers meticulously planned road trips to historic sites, having driven the Blue Ridge Parkway and toured the Smithsonian in Washington DC, while their dream destination is a genealogical
    pilgrimage to the English countryside of Kent and the battlefields of Gettysburg.
  culinary: John Moreno enjoys preparing classic Southern dishes—smoked chicken, collard greens cooked with ham hocks, shrimp and grits, and pecan pie—using their garden’s fresh okra and tomatoes and a
    well‑seasoned cast‑iron skillet, and they take pride in faithfully replicating their family’s cherished recipes.
  core: John Moreno blends a disciplined engineer’s mind with a hands‑on hobbyist’s heart, finding comfort in routines while secretly worrying about every detail, and their stubborn refusal to experiment
    with newer technology sometimes leads to missed opportunities.
background:
  cultural: John grew up in post‑World War II North Carolina as part of a white middle‑class family that valued self‑reliance, practicality, and respect for tradition. His upbringing emphasized a strong
    work ethic, community involvement through his local church, and an appreciation for the Piedmont region’s history and natural landscape. After completing graduate studies in STEM at a state university,
    he built a career in regional manufacturing and engineering, embedding himself in the modest, family‑oriented culture of the American South. These experiences have shaped his identity, reinforcing a
    practical, routine‑oriented outlook while maintaining a deep sense of family loyalty and community service.
