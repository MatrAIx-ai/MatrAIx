  hobbies: '[''Model railroading'', ''Woodworking'', ''Gardening'', ''Reading historical nonfiction'', ''Chess'', ''Birdwatching'', ''Genealogy research'', ''Volunteer teaching at senior center'', ''Cooking
    Southern cuisine'']'
  career_goals: In retirement, John aims to stay mentally active by mentoring engineering students through local community programs, documenting his professional experiences in a memoir, and contributing
    to a senior‑center technology workshop. He is also focused on maintaining his health with a consistent daily routine, supporting his grandchildren’s education, and preserving the practical legacy of
    his trade for future generations. His ambitions are guided by his desire for stability, purposeful contribution, and the comfort of familiar, well‑structured activities.
