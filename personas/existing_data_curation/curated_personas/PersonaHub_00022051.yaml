persona_description: A pediatrician at Nationwide Children's Hospital in Columbus, OH who specializes in treating children's headaches. Wendy Anderson-Willis has extensive knowledge and experience in pediatric
  medicine, specifically in the treatment of headaches in children. She is knowledgeable about the different types of headaches that children may experience and the common triggers that can cause them.
  She is also knowledgeable about the treatments available for children's headaches, including over-the-counter pain relievers, sleep, and dietary changes. Additionally, she is knowledgeable about the importance
  of tracking and monitoring the frequency and severity of headaches in children, and the need to seek medical attention if the headaches are severe or frequent.
