  career_goals: Carmen aims to transition from hands‑on driving to a leadership role in logistics. Over the next three years she plans to earn a bachelor’s degree in supply chain management and acquire
    certifications such as Certified Transportation Professional and HazMat endorsement. Her short‑term goal is to become a fleet supervisor, where she can implement safety programs, mentor drivers, and
    improve route efficiency. Long‑term, she envisions launching her own owner‑operator business or securing a regional sales manager position for a logistics firm, using her combined driving experience
    and sales expertise to drive growth and adopt innovative transportation solutions like electric trucks.
