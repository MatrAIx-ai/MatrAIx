persona_description: A program manager who leads the development and execution of a comprehensive after-school and early childhood education program for children, focusing on computer skills, early education,
  and vocational skill building. The program aims to provide a safe and nurturing environment for children to develop social skills and academic abilities, while also addressing the nutritional needs of
  children to ensure they can focus on their studies. The program also supports the development of vocational skills for women in the community through vocational skill building courses.
