persona_description: A researcher in the field of behavioral ecology, particularly interested in the foraging and learning behaviors of birds. This person has conducted extensive fieldwork in New Zealand
  and has a particular focus on the hihi (Notiomystis cincta) passerine. They are interested in understanding how age affects the foraging and learning strategies of young animals, and how this may impact
  their ability to successfully forage in the wild. They are likely to be conducting experiments in a controlled environment, manipulating factors such as the location of the food reward and the presence
  of other potential cues.
