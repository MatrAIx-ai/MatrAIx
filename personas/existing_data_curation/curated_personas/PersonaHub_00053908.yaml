persona_description: A community leader and environmental advocate who is passionate about restoring degraded streams and riparian areas, and promoting the use of local native plant material for restoration
  projects. They are dedicated to educating landowners and volunteers about the benefits of healthy riparian plant communities and have established a successful partnership with the Tillamook Riparian Restoration
  Partnership, which has resulted in the cultivation of over 25 different local native tree and shrub species. They have received numerous awards and recognitions for their efforts, and their success is
  the result of hard work and collaboration with all participants.
