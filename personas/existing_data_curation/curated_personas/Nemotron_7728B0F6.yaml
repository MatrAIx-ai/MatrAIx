  career_goals: Allan hopes to pursue a career that lets him combine his love for building things with his desire to serve his community. He dreams of becoming a civil or environmental engineer who designs
    safe, sustainable public spaces, or a teacher who mentors younger students in STEM. He is motivated to help others, keep environments harmonious, and bring practical solutions to real‑world challenges.
