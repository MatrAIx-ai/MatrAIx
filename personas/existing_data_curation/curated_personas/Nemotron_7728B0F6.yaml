personas:
  professional: Allan Wagner is a middle‑school student who channels his curiosity and practicality into designing LEGO robots and Scratch games, eagerly helping classmates with group projects and dreaming
    of a future as a robotics engineer, and they often volunteer to lead the tech club’s weekly sessions.
  sports: Allan Wagner pitches in after‑school pickup soccer games and shoots hoops at the community gym, cheering for the Michigan Wolverines during football season and following the Detroit Tigers, while
    they also belong to the local youth basketball league that practices at the Big Rapids Recreation Center.
  arts: Allan Wagner brings their clarinet to school band rehearsals where they play pieces by John Philip Sousa, enjoys listening to The Beatles and modern pop artist Ariana Grande, and finds creative
    release building intricate LEGO sculptures inspired by their favorite science‑fiction novels.
  travel: Allan Wagner loves weekend hikes through the nearby Manistee National Forest and fishing on Lake Muskegon, dreams of exploring the geysers of Yellowstone, and they hope to visit Chicago’s Museum
    of Science and Industry during a school field trip.
  culinary: Allan Wagner favors home‑cooked meals like mac and cheese, grilled trout caught on family fishing trips, and apple pie served at Thanksgiving, and they enjoy experimenting with simple recipes
    such as peanut‑butter cookies using honey and oats.
  core: Allan Wagner is a curious, community‑oriented twelve‑year‑old who balances LEGO engineering, clarinet melodies, and weekend outdoor adventures, yet they occasionally forget to finish homework before
    a game.
background:
  cultural: Allan grows up in a white, Midwestern family with German‑American roots in the Big Rapids area of Michigan. His household emphasizes community involvement, modesty, and a strong work ethic,
    reflecting the agricultural and small‑town heritage of Newaygo County. Family traditions include attending a local church, participating in the county fair, and celebrating holidays such as Thanksgiving
    and the Fourth of July with communal gatherings. The region’s emphasis on outdoor recreation and public schools has given Allan a practical, collaborative outlook shaped by both his ethnic background
    and the broader American Midwest culture.
