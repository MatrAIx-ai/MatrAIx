  hobbies: '["Watercolor painting", "Reading contemporary philosophy", "Collecting vintage postcards", "Visiting art museums", "Gardening", "Crossword puzzles", "Logic games", "Writing poetry", "Birdwatching"]'
  career_goals: Kyla aims to advance into a senior leadership role within her insurance firm, such as a Claims Operations Manager or Training Supervisor, where she can mentor junior adjusters and shape
    best‑practice protocols. She plans to earn the Chartered Property Casualty Underwriter (CPCU) designation to deepen her regulatory and technical expertise. Passionate about innovation, Kyla is also
    exploring ways to integrate AI‑driven analytics into claim triage processes to improve efficiency and accuracy. In the longer term, she envisions transitioning into a consulting capacity, advising niche
    creative industries—such as galleries, film productions, and designers—on tailored risk management strategies that blend her analytical acumen with her love for art and abstract concepts.
