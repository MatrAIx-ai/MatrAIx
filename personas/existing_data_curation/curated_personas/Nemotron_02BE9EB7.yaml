personas:
  professional: Firehiwot Mandal, a budding junior explorer, channels their curiosity and methodical planning into organizing elaborate backyard treasure hunts for friends, showcasing early leadership,
    an eye for unconventional ideas, and a competitive streak that drives them to win every clue race.
  sports: Firehiwot Mandal, a sprightly member of the Little Tigers Soccer Club, dashes across the field in the fall season, idolizes the Los Angeles Lakers for their teamwork, cheers loudly for the New
    York Yankees during baseball season, and enthusiastically participates in weekend gymnastics classes.
  arts: Firehiwot Mandal, who spends afternoons drawing whimsical characters inspired by Dr. Seuss and coloring Van Gogh’s Starry Night, eagerly sings along to Disney’s "Let It Go" and proudly displays
    a collection of Peppa Pig stickers, reflecting a deep appreciation for varied artistic expressions.
  travel: Firehiwot Mandal, who loves family road trips to the San Diego Zoo and a recent adventure at the Grand Canyon, dreams of exploring the Eiffel Tower’s lights in Paris and often plans imaginary
    voyages with a colorful world map spread across the bedroom floor.
  culinary: Firehiwot Mandal, who adores cheesy mac and cheese, crunchy carrot sticks with hummus, and Sunday pancakes topped with fresh blueberries, enjoys helping stir batter in the kitchen but frequently
    forgets to wash hands before eating, leading to occasional sticky fingers.
  core: Firehiwot Mandal is a curious, organized, and energetic five‑year‑old whose love for planning treasure hunts, meticulous allowance jars, and occasional worry about missing stickers paints a vivid
    picture of a tiny yet determined explorer.
background:
  cultural: Firehiwot belongs to an Eastern Woodlands Native American family with roots in the Mohegan tribe that historically inhabited the Connecticut River Valley. Her household honours tribal customs
    such as seasonal powwows, drum circles and oral storytelling, which she regularly experiences at home and community events. Language lessons introduce her to a few words of the Mohegan language, reinforcing
    a sense of identity. The family's connection to the land shapes her appreciation for nature, teaching her the importance of stewardship and respect for the environment. These cultural influences blend
    with modern life in Jewett City, giving her a unique perspective that values both tradition and contemporary experiences.
attributes:
  skills: '["Reading basic phonics and picture books", "Counting and simple addition", "Crayon and watercolor drawing", "Narrating traditional stories", "Organising toys and play spaces", "Guiding group
