  hobbies: '["Drawing animals and nature scenes", "Beadwork and crafting", "Watercolour painting", "Listening to tribal drumming and dancing", "Exploring woods and collecting natural objects", "Group games
    like tag and hide-and-seek", "Reading picture books about cultures and imagination", "Storytelling circle participation"]'
  career_goals: Even at five, Firehiwot imagines future paths where she can blend her love for art, storytelling and nature. She dreams of becoming a community muralist who paints vibrant scenes that honour
    her tribe's legends, or a cultural storyteller who records and shares oral histories with younger generations. She also expresses interest in working as a wildlife educator at a nature centre, guiding
    children to appreciate the environment. Her competitive streak fuels a desire to excel in school art competitions and local science fairs, while her organised mindset leads her to envision a future
    as a teacher who structures engaging lessons for diverse learners.
