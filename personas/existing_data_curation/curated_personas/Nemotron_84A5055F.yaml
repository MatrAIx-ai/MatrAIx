personas:
  professional: Evelyn Ferrer, a 30‑year‑old HR specialist at a mid‑size tech firm, blends methodical data‑driven talent acquisition with a natural curiosity for people dynamics, using bilingual communication
    to lead diversity initiatives while channeling a competitive drive into measurable improvements in employee engagement and a roadmap toward strategic HR leadership, and they are already mapping out
    the next steps toward a director role.
  sports: Evelyn Ferrer plays co‑ed volleyball on Thursday evenings, follows San Antonio FC and the Dallas Mavericks, and they complement team sports with solo trail runs in the Texas Hill Country and a
    disciplined yoga practice for balance.
  arts: Evelyn Ferrer frequents live tex‑mex music venues, cheering for bands like Los Cafres and attending Selena tributes, they devour contemporary novels by Chimamanda Ngozi Adichie, and capture vibrant
    moments of Día de los Muertos altars with their trusty DSLR.
  travel: Evelyn Ferrer prefers immersive cultural trips, meticulously planning a culinary tour of Oaxaca’s markets, a weekend music‑festival escape to Austin, and they balance wanderlust with budget limits
    by leveraging reward points and traveling during off‑peak weeks.
  culinary: Evelyn Ferrer enjoys cooking traditional dishes like pozole, mole poblano, and enchiladas, they skillfully blend roasted chiles de árbol and epazote into sauces, yet they sometimes over‑spice
    in the quest for authentic flavor.
  core: Evelyn Ferrer is a methodical, socially energized HR professional who fuses competitive ambition with a love for community celebrations, sprinkling salsa steps and data analysis into every aspect
    of life, and they never miss a chance to dance after a successful project.
background:
  cultural: Evelyn is a second‑generation Mexican‑American raised in San Antonio’s richly diverse Bexar County. Fluent in Spanish and English, she grew up celebrating Día de los Muertos, quinceañeras, and
    Catholic traditions while also embracing the broader Texan culture of hospitality and community pride. Her family’s emphasis on storytelling, music, and food has shaped her appreciation for cultural
    heritage, which she actively integrates into her professional life through diversity initiatives and community outreach. She maintains close ties with local Mexican cultural clubs and often mentors
    young professionals from similar backgrounds, reflecting a blend of Mexican values of family and collectivism with the entrepreneurial spirit of Texas.
