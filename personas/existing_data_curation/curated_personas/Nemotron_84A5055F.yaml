  career_goals: Evelyn aims to transition from a specialist role to a strategic HR leadership position within the next five years. She plans to earn the SHRM‑CP certification, pursue an MBA with a focus
    on organizational leadership, and eventually become an HR Manager overseeing talent strategy and culture transformation. Her long‑term ambition is to serve as a Director of People, championing inclusive
    workplace practices and building community partnership programs that connect her company with San Antonio’s vibrant Mexican‑American community.
