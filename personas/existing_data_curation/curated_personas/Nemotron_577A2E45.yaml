  hobbies: '[''Hiking'', ''Group Fitness Classes'', ''Weekend Brunches with Friends'', ''Experimental Cooking'', ''Tech Meetups'', ''Volunteering at Makerspace'', ''Board Games (e.g., Catan, Ticket to Ride)'']'
  career_goals: Elena aims to move into senior operations management within the next five years, ultimately aspiring to become a plant manager overseeing multiple production lines. She plans to earn a Six
    Sigma Black Belt and pursue an MBA with a focus on operations strategy to broaden her strategic perspective. Elena is also passionate about driving sustainability initiatives on the shop floor, such
    as waste reduction and energy‑efficiency programs, and hopes to lead a cross‑functional team that pilots advanced digital tools like IoT‑enabled monitoring systems. Long‑term, she envisions mentoring
    emerging female engineers and supervisors to foster a more inclusive manufacturing culture.
