persona_description: A software developer who is experienced with the Common Lisp programming language and its package system. They have a deep understanding of the structure and mechanics of packages,
  including the use of package qualifiers, external and internal symbols, and the inheritance of mappings. They are skilled in writing and maintaining packages for large Lisp systems and have a passion
  for making the modular structure of these systems more explicit. They are also familiar with the trade-offs between external and internal symbols and the importance of naming conventions in package design.
