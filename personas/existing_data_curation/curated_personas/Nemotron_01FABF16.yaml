  career_goals: As he approaches retirement, Frederick aims to cement a lasting impact on St. Louis’s built environment. He plans to launch a boutique practice dedicated to revitalizing historic neighborhoods
    with climate‑responsive designs, partnering with local arts organizations to create community‑focused public spaces. He aspires to mentor a new generation of architects, formalizing a structured apprenticeship
    within his firm. Additionally, he hopes to author a book that explores the dialogue between modern architecture and visual arts, and to be recognized with a regional AIA award for innovative sustainable
    design.
