personas:
  professional: Frederick Boyce, a veteran architect with three decades of experience, blends rigorous engineering, sustainable design, and historic preservation in a practice that unites cutting‑edge BIM
    tools with a curatorial eye for art, leading interdisciplinary teams while mentoring junior staff and shaping St. Louis's built environment through climate‑responsive adaptive reuse projects, and they
    constantly seek fresh visual inspiration during site visits.
  sports: Frederick Boyce, a lifelong St. Louis Cardinals fan and occasional member of the St. Louis Rowing Club, spends Saturday mornings kayaking the Mississippi, joins a community senior tennis league
    at Forest Park, and follows the Blues and City SC season schedules, balancing low‑impact cardio with a love of classic American baseball rituals, and they never miss the opening day game.
  arts: Frederick Boyce, an avid patron of the St. Louis Art Museum, regularly attends jazz nights featuring Wynton Marsalis tributes, curates personal photo exhibitions inspired by Ansel Adams and Edward
    Hopper, and draws creative fuel from the sculptural works of Isamu Noguchi and the architectural visions of Frank Lloyd Wright, and they often sketch backstage during performances to capture fleeting
    moments of improvisation.
  travel: Frederick Boyce favors curated road trips that blend historic architecture and natural scenery, having driven the Appalachian Trail’s Blue Ridge Parkway in fall, explored the river towns of the
    Mississippi Delta, and planning a future visit to the sustainable eco‑village of Hvar, Croatia, while balancing travel costs with a modest retirement budget, and they keep a travel journal filled with
    hand‑drawn maps and watercolor postcards.
  culinary: Frederick Boyce, a proficient home cook, delights in preparing slow‑smoked St. Louis‑style ribs with a dry rub of smoked paprika and brown sugar, crafting fresh herb‑infused trout with lemon‑dill
    sauce for riverside picnics, and savoring a well‑aged Gouda paired with a glass of Missouri Zinfandel, while often experimenting with a small‑batch sourdough starter they maintain on the kitchen countertop,
    and they occasionally over‑salt a dish when caught up in a new photography project.
  core: Frederick Boyce, a curiosity‑driven architect‑photographer, balances meticulous project leadership with spontaneous weekend sketch‑sessions, occasionally forgets to water houseplants during prolonged
    river excursions, and quietly champions sustainable design in a community that values heritage, and they credit their even‑keeled temperament for handling stressful client meetings with poise.
background:
  cultural: Born and raised in suburban St. Louis County to a family of German‑Irish descent, Frederick embodies Midwestern values of pragmatism, humility, and community involvement. He grew up amidst the
    region’s mix of industrial heritage and vibrant cultural scene, which shaped his appreciation for both functional design and artistic expression. His education in STEM at a state university exposed
    him to rigorous scientific thinking, while his subsequent travels across Europe deepened his respect for historic architecture and cross‑cultural design dialogues. He remains actively engaged with local
    cultural institutions, contributing his expertise to preservation projects and public art installations, reflecting a blend of his white Midwestern heritage and the city’s diverse artistic tapestry.
