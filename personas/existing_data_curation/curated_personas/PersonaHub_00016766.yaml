persona_description: A GVSU professor who specializes in renewable energy storage technology, particularly the development of solar-powered energy storage devices. Jim Wolter, a founder of Energy Partners
  LLC and GVSU professor emeritus, has created a revolutionary device called Solar 24 that addresses the intermittent nature of solar energy. The device allows for solar-generated electricity to be steadily
  discharged, making it ideal for powering houses that are off the electrical grid. Jim Wolter and Ed Brandel's invention is a game-changer in the energy storage industry and is expected to revolutionize
  the way we store and use renewable energy.
