persona_description: A historian or architect who is interested in the history of the Bank of England and its complex, and the design and construction of its buildings. This persona is particularly interested
  in the work of Sir Robert Soane, who was the Surveyor to the Bank of England and who oversaw the rebuilding of the Bank's complex in the 18th century. This persona is also interested in the history of
  the Bank of England, its role in managing the National Debt, and the role of the Bank in the economy of the time.
