  hobbies: '[''woodworking'', ''classic truck restoration'', ''fishing'', ''college football watching'', ''gardening'', ''shooting club'']'
  career_goals: Tony’s primary career goal is to solidify his position as a trusted first‑line leader and earn a senior supervisory or plant‑manager role within the next five years, ensuring a stable income
    for his family as he approaches retirement age. He aims to formalize his knowledge through a short‑term supervisory certification and to mentor at least two junior supervisors, passing on his pragmatic
    approach to operations. A secondary ambition is to negotiate a performance‑based bonus structure that rewards the consistent, predictable results his team delivers, while also seeking a reduced‑hours
    schedule that would give him more flexibility to manage his anxiety and personal projects.
