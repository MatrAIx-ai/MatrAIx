persona_description: A country's central bank governor who is responsible for managing the country's monetary and banking system to ensure efficient management of the money stock and related part growth
  of the economy. The governor must be skilled in financial programming and must be able to effectively estimate and adjust the money supply based on the target for GDP growth, inflation rate, and external
  reserves. The governor must also be able to balance the permissible segregate domestic credit between the government and private sectors, and must be able to influence credit growth either directly or
  indirectly through market-based instruments. The governor must also be aware of the potential issues that impinge on the banks' ability to effectively discharge their responsibilities and must be able
  to implement measures to strengthen the financial sector and enhance monetary and fiscal policies.
