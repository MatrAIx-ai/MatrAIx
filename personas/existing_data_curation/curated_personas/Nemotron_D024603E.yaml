    ''Church food-bank volunteering'', ''Community park clean-up'']'
  career_goals: James aims to transition from a senior purchasing agent to a procurement manager within the next three years, ultimately stepping into a director‑level supply chain role at a regional manufacturing
    or healthcare organization. He intends to obtain the Certified Professional in Supply Management (CPSM) credential to formalize his expertise, and to lead a digital transformation initiative that integrates
    AI‑driven spend analytics and automated contract management. James also seeks to mentor emerging procurement talent, champion sustainable sourcing practices, and contribute to cost‑saving programs that
    enhance the organization’s profitability while maintaining high quality standards.
