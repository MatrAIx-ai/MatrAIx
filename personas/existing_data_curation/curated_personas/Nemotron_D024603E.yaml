personas:
  professional: James Mirabelli, a senior purchasing agent with over two decades of procurement and supply chain expertise, blends his mechanical‑engineering precision, SAP MM and Oracle Procurement Cloud
    proficiency, and Lean Six Sigma mindset to drive strategic sourcing, cost‑reduction initiatives, and AI‑enabled spend analytics, while they mentor emerging talent and champion sustainable supplier practices.
  sports: James Mirabelli blends solitary and social athletic pursuits, casting lines on the Neuse River at sunrise, tackling the Sandhills trail network in the cooler months, and playing a Saturday‑morning
    eight‑hole round at Pinehurst Country Club, all while cheering for the Carolina Panthers, following the Charlotte Hornets, and tracking the Carolina Hurricanes’ seasons.
  arts: James Mirabelli finds artistic release in building scale model railroads, listening to the Boston Symphony Orchestra’s Beethoven symphonies, admiring Andrew Wyeth’s realist paintings at the North
    Carolina Museum of Art, attending the North Carolina Stage Company’s productions of Tennessee Williams’ plays, and winding down with historical biographies by Doris Kearns Goodwin, while they occasionally
    binge‑watch classic Spielberg films for nostalgia.
  travel: James Mirabelli prefers meticulously planned road trips that combine heritage and nature, having driven the Blue Ridge Parkway to Shenandoah National Park, explored the National Railway Museum
    in York, England, relaxed at the historic Biltmore Estate in Asheville, and booked a future cruise to the Scottish Highlands, all while balancing budget constraints with a desire for comfortable accommodations
    and occasional family visits.
  culinary: James Mirabelli enjoys cooking as an extension of his woodworking craft, regularly preparing grilled salmon seasoned with rosemary and lemon, slow‑smoked pork ribs rubbed with paprika and brown
    sugar, and creamy shrimp and grits with fresh collard greens, using a cast‑iron skillet and occasionally experimenting with sourdough bread made from rye flour and whole‑grain spelt.
  core: James Mirabelli is a methodical procurement professional who channels his love of precision into model‑railroad building, woodworking, and disciplined financial planning, yet wrestles with a stubborn
    coffee habit that fuels late‑night strategy sessions.
background:
  cultural: James grew up in a middle‑class family in the Mid‑Atlantic, later relocating to Eastern North Carolina, where he embraced the region’s blend of Southern hospitality and modest conservatism.
    His cultural identity is rooted in mainstream American values—self‑reliance, hard work, and community involvement—shaped by the close‑knit social fabric of Greenville and Pitt County. He regularly participates
    in local traditions such as backyard barbecues, college football tailgates for the ECU Pirates, and church gatherings, while maintaining an appreciation for broader American cultural narratives through
    his reading and volunteer work. His upbringing has fostered a pragmatic outlook, respect for punctuality and order, and an understated pride in regional heritage.
