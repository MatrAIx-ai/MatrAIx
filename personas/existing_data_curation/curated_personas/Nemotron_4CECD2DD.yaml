  hobbies: '[''Visiting art galleries'', ''Street photography'', ''Sketching'', ''Attending live music concerts'', ''Community theater'', ''Hiking in the Sonoran Desert'', ''Listening to creativity podcasts'',
    ''Journaling'', ''Yoga'', ''Socializing at local coffee shops'']'
  career_goals: Elinor aims to rise from a laborer to a supervisory role within a logistics or distribution center, leveraging her reliability and knack for organizing tasks. She plans to obtain an official
    forklift certification and complete a GED, followed by a certification in supply‑chain management. Over the next five years she hopes to become a warehouse team lead, managing schedules and performance
    metrics. Long‑term, she dreams of launching her own small moving and storage business that can blend her love for varied experiences, creative problem‑solving, and community engagement, while providing
    the financial stability that helps mitigate her anxiety.
