personas:
  professional: Neil Diggs is an aspiring junior environmental scientist who combines their curiosity for wildlife, practical LEGO building skills, and collaborative spirit into early experiments on local
    habitats, demonstrating keen observation, structured problem‑solving, and a compassionate drive to protect nature.
  sports: Neil Diggs charges onto the field as a midfield forward for the Queensbury Cubs U‑10 soccer club, drills after school while cheering for the New York Knicks and New York Rangers, spends winter
    sledding down local hills and building snow forts, and pedals their bike along the Oak Trail for extra cardio, though they sometimes forget to bring their soccer cleats because of a laid‑back approach
    to planning.
  arts: Neil Diggs builds intricate LEGO cityscapes, devours graphic novels like Jeff Smith’s _Bone_ and Raina Telgemeier’s _Smile_, and draws inspiration from Studio Ghibli films, channeling storytelling
    into doodles and mini‑set designs, while occasionally misplacing bricks and leaving projects unfinished due to their flexible, unstructured planning style.
  travel: Neil Diggs enjoys spontaneous day hikes in the Adirondack woods near their home, has camped at Lake George, visited the Children’s Museum in Boston, dreams of exploring Yellowstone National Park,
    and prefers a flexible itinerary that leaves room for impromptu rock collecting or leaf identification, all while balancing family schedules and school commitments.
  culinary: Neil Diggs favors cheesy pizza, chicken nuggets, and apple crisp, can whisk together a decent scrambled‑egg‑and‑cheese breakfast, loves helping bake blueberry muffins with their parents, and
    seeks out crunchy carrots and fresh strawberries as snack staples, though they sometimes skip the vegetables when a new LEGO kit arrives.
  core: Neil Diggs is a curious, compassionate explorer who blends spontaneous woodland adventures with LEGO engineering, always balancing teamwork and alone time while occasionally losing track of chores.
background:
  cultural: Neil comes from a white, Anglo‑American family with roots in the Northeastern United States. Growing up in Queensbury, NY, he experiences a blend of rural and small‑town culture, including seasonal
    outdoor activities like fishing, hiking, and snow sports. His family observes traditional American holidays such as Thanksgiving, Christmas, and the Fourth of July, and they attend a local Methodist
    church where community service is emphasized. The region’s close‑knit community and emphasis on self‑reliance shape his compassionate and cooperative nature.
attributes:
  skills: '["Reading comprehension", "Basic arithmetic", "Collaborative teamwork", "Empathy and peer mediation", "LEGO building and spatial reasoning", "Basic woodworking (simple projects)", "Digital literacy
