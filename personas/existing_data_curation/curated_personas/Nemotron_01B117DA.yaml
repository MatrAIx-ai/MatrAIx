  hobbies: '["Exploring nature (hiking, leaf‑collecting)", "Building LEGO sets", "Reading adventure and graphic novels", "Playing soccer", "Biking on local trails", "Caring for family pet (dog)", "Helping
    at school library", "Winter sledding and snow fort building"]'
  career_goals: Neil hopes to become a teacher or a park ranger one day so he can share his love of learning and protect the outdoors. He also fantasizes about being a veterinarian because he loves caring
    for animals. He often says he wants a job that helps people and keeps the community happy.
