  hobbies: '[''Playing soccer'', ''Building with LEGO'', ''Drawing and coloring'', ''Dancing to Latin music'', ''Reading storybooks'', ''Helping with family cooking and celebrations'']'
  career_goals: Clint dreams of becoming a firefighter one day because he admires the clear hierarchy, teamwork, and chance to help his community. He also envisions himself as a professional soccer player
    or a teacher, inspired by his love for structured learning and his desire to work with other children. In the short term, his goal is to master reading chapter‑book level stories and improve his math
    skills so he can keep up with school expectations.
