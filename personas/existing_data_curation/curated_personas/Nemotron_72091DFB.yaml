personas:
  professional: Clint Ochoa, a budding neighborhood soccer captain and LEGO architect, showcases early leadership by organizing impromptu matches and building intricate structures, reflecting a blend of
    practical focus and collaborative energy.
  sports: Clint Ochoa thrives on the local junior soccer league, proudly wears the number 7 jersey for the Sun Valley Soccer Club, and avidly follows the regional professional team, the River City Rangers,
    cheering them on during weekend games.
  arts: Clint Ochoa channels their creativity through bright drawings of SpongeBob SquarePants and Spider-Man, dances exuberantly to Shakira’s “Waka Waka”, and enjoys watching Pixar’s “Toy Story” for inspiration.
  travel: Clint Ochoa loves family road trips to the coastal town of Seaside Bay where they build sandcastles, cherishes the memory of a summer visit to Disneyland, and dreams of exploring the vibrant streets
    of Barcelona when the family saves enough for a big vacation.
  culinary: Clint Ochoa delights in helping prepare simple tacos with seasoned beef, shredded cheese, and fresh avocado slices, enjoys munching on pizza topped with pepperoni and olives, and proudly claims
    to master the art of mixing fruit smoothies with banana, strawberries, and yogurt.
  core: Clint Ochoa is a spirited six‑year‑old who blends a love for structured play, energetic soccer, creative LEGO building, and lively family traditions into a vivid, organized, and socially magnetic
    world.
background:
  cultural: Clint comes from a Mexican‑American family in Fort Worth, Texas. Spanish is spoken at home alongside English, and he participates in cultural traditions such as celebrating Día de los Muertos,
    Cinco de Mayo, and Christmas posadas. His family enjoys Mexican cuisine—tacos, tamales, and atole—and music ranging from mariachi to reggaetón, which often leads to spontaneous dance sessions. Growing
    up in a predominantly Latino neighborhood, Clint feels a strong sense of community and pride in his heritage, shaping values of family loyalty, respect for elders, and communal celebration.
