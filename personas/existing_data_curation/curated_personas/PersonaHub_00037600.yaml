persona_description: A public health expert with a focus on infectious diseases, particularly those related to the Middle East Respiratory Syndrome (MERS). Kamran Khan is a practicing infectious disease
  physician who has published research on the potential for the international spread of MERS associated with mass gatherings in Saudi Arabia. He is concerned about the lack of public health capacity in
  South and Southeast Asia to contain an outbreak and the potential for a global epidemic. Khan is also a recognized expert on the global health impact of mass gatherings, such as the Haj in Mecca, and
  has written extensively on the potential for an MERS outbreak to occur during such events.
