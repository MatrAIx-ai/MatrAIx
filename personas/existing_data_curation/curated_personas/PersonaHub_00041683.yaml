persona_description: A planner or urban designer who is interested in sustainable development and has expertise in reusing and reorganizing suburban development into complete, livable, and robust communities.
  They have knowledge of the potential of shopping malls to be transformed into transit-ready urban cores, commonly referred to as town centers, and are interested in implementing a comprehensive method
  to repair the full range of suburban development types, based on the book "The Sprawl Repair Manual". They are familiar with urban design, zoning, and implementation techniques, and have experience with
  built projects. They are passionate about addressing the numerous and gargantuan problems of sprawl and finding responsible and sustainable solutions.
