  career_goals: Nancy aims to open a boutique salon that blends high‑end artistic hairstyling with sustainable, eco‑friendly practices, offering bespoke color services and organic hair‑care treatments.
    She plans to develop her own line of natural hair products, earn Master Stylist certification, and become a sought‑after speaker at regional cosmetology conferences. Additionally, she hopes to formalize
    mentorship programs, host quarterly workshops for emerging stylists, and teach part‑time at a local cosmetology school, thereby influencing the next generation of creative professionals.
