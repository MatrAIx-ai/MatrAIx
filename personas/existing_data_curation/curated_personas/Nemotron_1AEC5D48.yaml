personas:
  professional: A master hairstylist with over two decades of experience, Nancy Wu leverages their precision cutting, custom balayage, and scalp health expertise to craft avant‑garde looks that echo the
    texture and color of fine art, while their disciplined, organized nature drives meticulous salon operations and mentorship of junior stylists.
  sports: Nancy Wu enjoys low‑impact fitness such as yoga and weekend cycling with the Twin Cities Cycling Club, follows the Minnesota Lynx in the WNBA and cheers for the Minnesota Wild during the hockey
    season, and they also occasionally join a local adult softball league for social exercise.
  arts: Nancy Wu immerses themselves in the visual arts by sketching at the Minneapolis Institute of Arts, drawing inspiration from the bold colors of Georgia O'Keeffe, the abstract compositions of Wassily
    Kandinsky, and the soulful jazz of Nina Simone, which they weave into their avant‑garde hair designs.
  travel: Nancy Wu plans meticulously for their solo fashion pilgrimages, favoring immersive stays in Paris’s Le Marais, Milan’s Brera district, and Copenhagen’s Østerbro neighborhood to study runway trends,
    yet balances these trips with weekend getaways to nearby Lake Superior islands for relaxation and botanical inspiration.
  culinary: Nancy Wu, an adept home cook, favors farm‑to‑table meals like roasted beet and goat‑cheese salad with dill and spruce tips, enjoys preparing their own sourdough rye bread, and they also relish
    occasional evenings at a local bistro tasting sustainably sourced elk carpaccio.
  core: Nancy Wu blends disciplined artistry with quiet curiosity, turning hair into canvas while they nurture community, sustainability, and a love for vintage elegance.
background:
  cultural: Nancy is a white Midwestern American with German and Scandinavian ancestry, raised in the Minneapolis–St. Paul metropolitan area. The region's strong community orientation, rich arts scene,
    and progressive values have shaped her worldview. She is attuned to the Twin Cities' cultural diversity and often incorporates multicultural influences into her styling work. Her upbringing fostered
    a self‑reliant yet cooperative mindset, valuing personal achievement alongside community contribution.
