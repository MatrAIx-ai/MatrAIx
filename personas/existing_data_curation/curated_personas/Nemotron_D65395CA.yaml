  career_goals: Although only two, Carla already expresses simple aspirations through her play. She loves pretending to care for dolls and frequently says she wants to become a teacher or a nurse when she
    grows up, reflecting a desire to help others and be part of a caring community. She also enjoys dressing up as a firefighter or a dancer, indicating a budding ambition to protect and perform. These
    early goals are shaped by the adults she observes and the structured, supportive environment of her family and local preschool.
