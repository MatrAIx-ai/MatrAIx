  hobbies: '["Sudoku", "Logic Puzzles", "Crossword Puzzles", "Knitting", "Hiking", "Book Club", "Community Events", "STEM Mentoring", "Coding Workshops"]'
  career_goals: She wants to leverage her STEM background to move into a role that blends her analytical abilities with retail operations, such as a data analyst or operations manager in a regional retail
    chain. Short‑term, she plans to earn a certification in data analytics while continuing at her cashier job to fund the training. Mid‑term, she aims to secure a position that involves analyzing sales
    data, optimizing staffing schedules, and improving inventory forecasting. Long‑term, she envisions advancing into a senior managerial role where she can design and implement systematic process improvements
    across multiple store locations, ensuring predictable outcomes and operational efficiency. She also wishes to volunteer part‑time as a STEM mentor for local middle‑school students, reflecting her desire
    to give back while reinforcing her own technical skills.
