personas:
  professional: Debra Daigle is an aspiring robotics engineer who channels methodical thinking and organized planning into designing and programming line‑following robots for their high‑school club, while
    they assertively lead teammates during project sprints.
  sports: Debra Daigle enjoys hiking the nearby ridge trails, competes on the high‑school cross‑country team, avidly follows the New York Yankees and New York Knicks, and they treat each weekend run as
    a disciplined practice session to balance endurance with their methodical mindset.
  arts: Debra Daigle dives into Agatha Christie mysteries and Isaac Asimov’s sci‑fi classics, sketches comic panels inspired by Brian K. Vaughan’s storytelling, strums acoustic renditions of Taylor Swift
    and The Beatles, and they often blend these influences into a personal visual‑audio diary.
  travel: Debra Daigle dreams of backpacking through Yosemite and the Canadian Rockies, has already explored the nearby Blue Ridge Trail, plans meticulous itineraries using Google Maps, and they hope to
    visit Tokyo’s Akihabara for anime inspiration once family finances allow.
  culinary: Debra Daigle bakes moist red‑velvet cupcakes topped with cream cheese frosting, whips up chocolate chip cookies with a pinch of sea salt, experiments with a spicy ramen broth, and they consider
    themselves a moderately skilled home baker who loves sharing treats at school.
  core: Debra Daigle is a curiosity‑driven, methodically organized teen who alternates between sketching comic heroes and calibrating robot sensors, yet they secretly hoard half‑eaten cupcakes in their
    locker for late‑night snack raids.
background:
  cultural: Debra comes from a white, middle‑class family with French‑Canadian ancestry reflected in her surname, Daigle. Growing up in Spring, Texas, she experiences a blend of suburban Texan culture—characterized
    by community events, school sports, and Southern hospitality—and family traditions such as holiday gatherings and occasional church attendance. This regional environment, combined with her family's
    appreciation for education and cultural heritage, shapes her values of reliability, community involvement, and a balanced approach to curiosity and practicality.
