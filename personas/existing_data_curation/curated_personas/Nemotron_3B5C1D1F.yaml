  career_goals: Debra aspires to pursue a career that blends her love of science with her practical mindset, aiming to become a veterinarian or a wildlife biologist. She envisions attending a strong high‑school
    science program, earning scholarships, and eventually studying animal health or environmental science at a university. Alongside her professional ambition, she hopes to develop leadership abilities
    by participating in student government and community service, ultimately contributing to conservation efforts in her region.
