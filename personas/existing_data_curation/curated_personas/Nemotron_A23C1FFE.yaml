personas:
  professional: Elizabeth Davis is an aspiring community engagement coordinator who leverages her strong verbal communication, active listening, and Canva graphic design skills to orchestrate structured
    outreach events while flexibly adapting on the fly, balancing her love for predictability with her sociable, outgoing nature.
  sports: Elizabeth Davis enjoys pick‑up basketball at the Gainesville Community Center, follows the Florida Gators men’s basketball team and the Orlando Magic, and plays in the local parks league, though
    occasional disorganization means she sometimes forgets game times.
  arts: Elizabeth Davis nurtures her love for contemporary R&B and hip‑hop by regularly attending shows at The Social, dancing to Beyoncé and Anderson .Paak, and unwinding with novels like Chimamanda Ngozi
    Adichie's "Americanah" and self‑development books by Brené Brown.
  travel: Elizabeth Davis prefers weekend getaways to natural springs such as Ichetucknee and Ginnie Springs, has visited Savannah’s historic squares, dreams of a music‑filled trip to New Orleans, and balances
    spontaneous road trips with a carefully drafted itinerary to stay within her student budget.
  culinary: Elizabeth Davis cooks soulful Southern dishes like collard greens, fried chicken, sweet potato pie, and cornbread, seasoning with smoked paprika and okra, often sharing these meals at church
    potlucks while juggling her cooking tasks with social media posts.
  core: Elizabeth Davis blends a structured ambition for community impact with a spontaneous love for music, basketball, and soul food, often juggling spreadsheets while dancing, yet occasionally forgetting
    appointments.
background:
  cultural: As an African‑American woman raised in Gainesville, Elizabeth grew up immersed in a supportive Black community that values family, faith, and cultural heritage. She regularly participates in
    church gatherings and local cultural festivals like the Gainesville African American Heritage Festival, and she takes pride in the region’s rich history of civil rights activism. Her culinary preferences
    reflect Southern Black traditions, and she often shares these dishes with friends. Elizabeth’s cultural identity informs her perspective on community empowerment and shapes her career aspirations.
attributes:
  skills: '[''Verbal communication'', ''Active listening'', ''Event coordination'', ''Social media management'', ''Adaptability'', ''Microsoft Office Suite'', ''Basic graphic design (Canva)'', ''Community
    outreach'', ''Volunteer coordination'', ''Customer service'']'
  hobbies: '[''Dancing (R&B, hip‑hop)'', ''Live music events'', ''Pick‑up basketball'', ''Hiking and nature exploration'', ''Cooking (soul food & Southern cuisine)'', ''Youth mentoring'', ''Reading fiction
    and self‑help books'']'
  career_goals: She aims to secure a full‑time position in community engagement or marketing within a non‑profit or local business, leveraging her communication strengths to build outreach programs. Elizabeth
    plans to complete her bachelor's degree in Communications or Public Relations, with a long‑term goal of advancing to a program manager or public relations director role, where she can lead initiatives
    that empower the local Black community.
