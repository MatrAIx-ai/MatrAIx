  hobbies: '[''Drawing'', ''Coloring'', ''Storytime reading'', ''Block building'', ''Playground activities'', ''Dancing'', ''Bilingual singing'', ''Craft making'', ''Sticker collecting'', ''Nature walks'']'
  career_goals: Ingrid dreams of becoming an artist who fills the world with bright paintings, imagines herself as an explorer of new ideas like an astronaut, hopes one day to help animals as a veterinarian,
    and loves the thought of sharing stories as a teacher—all while staying curious and creative.
