personas:
  professional: Ingrid Vasquez, an aspiring junior scientist, channels their boundless curiosity and meticulous organizational skills into preschool science experiments, carefully recording each observation
    in a bright notebook; they confidently lead group activities and calmly handle occasional mishaps.
  sports: Ingrid Vasquez loves to sprint around the playground, attends twice‑weekly soccer practice with the local under‑6 Tigers club, cheers on the nearby professional baseball team the Austin Aces,
    and enjoys beginner swimming lessons at the community pool; they balance energetic play with structured team sports.
  arts: Ingrid Vasquez spends afternoons drawing whimsical characters inspired by Dr. Seuss, watching animated films by Pixar, humming Disney’s 'Frozen' songs performed by Idina Menzel, and eagerly participating
    in preschool art projects that let them experiment with watercolors, glitter glue, and modeling clay; they often showcase their creations with proud smiles.
  travel: Ingrid Vasquez’s family vacation bucket list already includes a trip to Disneyland in Anaheim for magical rides, a sunny beach stay on the Gulf Coast where they build elaborate sandcastles, and
    a weekend visit to the nearby state museum, reflecting a blend of adventurous excitement and the comfort of short, well‑planned outings; they look forward to each new adventure with a sparkling sense
    of wonder.
  culinary: Ingrid Vasquez delights in the creamy comfort of mac and cheese, the crisp snap of carrot sticks with hummus, and the sweet tang of strawberry yogurt, often helping stir pancake batter and proudly
    presenting a garnish of fresh blueberries on the finished stack; they also enjoy sprinkling a dash of cinnamon on their toast for extra flavor.
  core: Ingrid Vasquez is a methodical mini‑explorer who balances a love for organized experiments, disciplined savings, and creative play, occasionally losing socks in the laundry but always bouncing back
    with a bright smile; they turn every small setback into a new opportunity for discovery.
background:
  cultural: Ingrid’s family is proud of its Hispanic/Latino roots. At home she hears Spanish spoken by her parents and grandparents, enjoys traditional foods such as tacos, tamales, and empanadas, and celebrates
    cultural holidays like Día de los Muertos and Las Posadas. The family takes part in Beloit’s local Latino festivals, listens to mariachi and reggaetón music, and she often learns Spanish lullabies and
    songs at her bilingual preschool. These cultural experiences shape her love for art, music, and curiosity about the world.
