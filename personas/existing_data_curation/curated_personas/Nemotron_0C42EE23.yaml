  career_goals: Alan's ambitions are shaped by his love for helping others and exploring the world. He frequently says he wants to be a firefighter because he admires the bravery and the chance to keep
    people safe. He also dreams of becoming an astronaut, fascinated by stars and the idea of discovering new places. At times he imagines being a teacher, sharing stories and songs with friends, or a veterinarian,
    caring for the animals he sees around the farm. These goals reflect his curiosity, practical mindset, and desire to contribute to his community.
