persona_description: A researcher who studies the impact of transportation costs and fixed costs on the availability of manufactured goods in remote villages. The researcher uses data from surveys and theoretical
  models to estimate the welfare impacts of low variety on consumers in remote areas, and the compensating variation from the loss of marginal items. The researcher is interested in the costs of losing
  variety in manufactured goods, the impact of transportation costs and fixed costs on consumer welfare, and the implications for welfare measurement. The researcher's findings have implications for poverty
  measurement and the trade-off between domestic trade costs and consumer welfare.
