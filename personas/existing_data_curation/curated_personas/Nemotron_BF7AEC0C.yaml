personas:
  professional: Shirley Smith, a 13‑year‑old aspiring game developer and digital illustrator, blends curiosity with practicality by building simple Scratch games while sketching character concepts, often
    improvising when their school projects get disorganized, and they thrive on collaborative feedback from friends.
  sports: Shirley Smith, a 13‑year‑old basketball enthusiast, practices after school at the local community center, cheers for the NBA’s Golden State Warriors, and also channels kinetic energy into hip‑hop
    dance routines, balancing team camaraderie with personal rhythm, and they love the feeling of the ball echoing off the court.
  arts: Shirley Smith immerses themselves in R&B and hip‑hop, favoring artists like H.E.R., Kendrick Lamar, and Megan Thee Stallion, while they draw cartoons inspired by Adventure Time and illustrate digital
    fan art for graphic novels such as Ms. Marvel, turning the bedroom into a personal studio.
  travel: Shirley Smith loves weekend getaways to nearby state parks for stargazing, has visited the local science museum, dreams of touring the Grand Canyon’s night sky and a future trip to Japan’s Akihabara
    district to soak up anime culture, and they keep a scrapbook of travel photos and telescope sketches.
  culinary: Shirley Smith often helps bake chocolate‑cocoa cupcakes topped with vanilla frosting and prepares soul‑food sides like collard greens and baked sweet potatoes, delighting in mixing cocoa, butter,
    and a pinch of nutmeg, while they still gravitate toward sweet treats after practice.
  core: Shirley Smith blends a calm, resilient spirit with a boundless curiosity, hopping between coding, basketball, and cupcake baking while they occasionally forget homework in the chaos of creative
    projects.
background:
  cultural: Shirley grows up in Baldwin, a suburb of Long Island, within a close‑knit African‑American family that celebrates Black cultural traditions while also absorbing the diverse influences of the
    greater New York region. Family gatherings often feature soul‑food staples like collard greens, sweet potatoes, and cornbread, and music ranging from gospel to contemporary hip‑hop. She attends a public
    middle school that observes Black History Month events, and she participates in church youth groups where community service is emphasized. The neighborhood’s multicultural atmosphere exposes her to
    Caribbean flavors and other ethnic traditions, enriching her sense of identity and fostering a respect for cultural diversity.
