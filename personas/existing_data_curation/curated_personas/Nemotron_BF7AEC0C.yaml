  career_goals: She envisions a future where she can blend her love for helping others with her practical mindset. In the short term, she aims to excel in high school science and humanities courses, seek
    mentorship opportunities, and participate in community service programs. Long‑term, she hopes to become a teacher or school counselor, guiding younger students and fostering a supportive learning environment.
    She also considers studying biomedical science to contribute to health initiatives in underserved communities, valuing a career that offers stability, impact, and the chance to apply her problem‑solving
    skills.
