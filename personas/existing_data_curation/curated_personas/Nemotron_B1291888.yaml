  career_goals: He dreams of becoming a concept artist or animator for films and video games, hoping to bring his fantastical worlds to life. He also envisions writing sci‑fi stories or creating illustrated
    books, and imagines someday guiding creative teams as a creative director. His long‑term ambition is to merge art and storytelling to inspire curiosity in others.
