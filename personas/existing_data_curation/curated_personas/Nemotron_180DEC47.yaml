  career_goals: Yuchieh aspires to become a software engineer or game developer who creates tools that make learning more engaging for other students. He hopes to study computer science in college, focusing
    on user‑friendly educational apps and interactive media that blend his artistic talent with technology. While he dreams of technical excellence, he also wants a balanced lifestyle that preserves flexibility
    and creativity, and he is mindful of managing his stress and worry as he pursues higher education and future career opportunities.
