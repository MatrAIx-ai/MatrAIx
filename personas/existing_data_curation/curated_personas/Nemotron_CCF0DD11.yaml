personas:
  professional: Olivia Johnston, a seasoned education and childcare administrator from upstate South Carolina, leverages their methodical budgeting, staff coordination, and community partnership expertise
    to ensure school compliance while planning to become an elementary principal within five years, and they mentor newer administrators with the same reliable, harmonious approach they value.
  sports: Olivia Johnston enjoys walking their rescued Labrador along historic town trails for low‑impact daily exercise, joins the church’s seasonal softball league each spring, and supports the Carolina
    Panthers and Clemson Tigers, while they also belong to a local walking club that helps maintain a steady fitness routine.
  arts: Olivia Johnston spends evenings crocheting blankets inspired by traditional Southern quilt patterns, reads historical novels by Hilary Mantel and Philippa Gregory, and listens to gospel favorites
    like the Blind Boys of Alabama alongside contemporary country artist Kacey Musgraves, allowing the arts to weave comfort and reflection into their life.
  travel: Olivia Johnston prefers well‑planned, leisurely road trips that combine family visits with cultural stops, savoring weekend getaways to Charleston’s historic district, Asheville’s Blue Ridge Mountains,
    and annual pilgrimages to the Gaffney Strawberry Festival, while they also dream of a springtime tour of England’s historic estates to trace the settings of their favorite historical novels.
  culinary: Olivia Johnston, an adept home cook, delights in preparing Southern comfort dishes such as fried chicken with buttermilk brine, collard greens simmered with smoked ham hocks, and peach cobbler
    topped with a buttery crumble, often incorporating home‑grown tomatoes, okra, and sweet potatoes from their garden, and they enjoy sharing these meals at church potlucks.
  core: Olivia Johnston blends meticulous routine with Southern hospitality, juggling a love of garden‑to‑table cooking, weekend church service, and an occasional habit of over‑scheduling that leaves little
    room for spontaneous breaks, and they habitually check their budget spreadsheet before bed.
background:
  cultural: Olivia is a white Southern woman who grew up in a small town in upstate South Carolina. Her upbringing was shaped by traditional Southern values of hospitality, faith, and community involvement.
    She identifies with the Protestant Christian tradition, regularly attending her local church and participating in its outreach programs. Family gatherings and regional celebrations, such as harvest
    festivals and the Gaffney Strawberry Festival, have reinforced a sense of belonging and pride in her Cherokee County roots. While her ancestry includes English and Scots‑Irish lineage, Olivia embraces
    a contemporary Southern identity that balances respect for tradition with a practical, forward‑looking mindset.
