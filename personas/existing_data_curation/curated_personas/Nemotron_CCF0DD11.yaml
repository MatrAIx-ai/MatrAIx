  career_goals: Olivia aims to advance to an elementary school principal role within the next five years, leveraging her practical experience to shape school-wide policies and improve student outcomes.
    She plans to enroll in a part‑time bachelor's program in Educational Administration to complement her hands‑on skills. Additionally, she hopes to spearhead a district‑wide initiative that integrates
    evidence‑based early‑childhood practices and strengthens partnerships with local businesses and faith‑based organizations. Olivia also aspires to mentor newer administrators, fostering a supportive,
    harmonious work environment.
