  hobbies: '[''Cooking (fusion cuisine)'', ''Running'', ''Street photography'', ''Reading non-fiction (business, psychology)'', ''Mandarin calligraphy'', ''Attending cultural festivals'', ''Online chess'']'
  career_goals: Chien aims to translate his floor‑level expertise into leadership roles. Within the next two years he plans to earn a Retail Management Certificate and move into an assistant store manager
    position, eventually becoming a store manager for a high‑traffic location in Houston. His long‑term ambition is to oversee a district of stores, integrating omnichannel strategies that blend brick‑and‑mortar
    and e‑commerce, and eventually launch his own boutique that curates Asian‑inspired lifestyle products for the Texas market. He is also motivated to mentor new sales associates, using his competitive
    mindset to drive team performance and foster a culture of continuous improvement.
