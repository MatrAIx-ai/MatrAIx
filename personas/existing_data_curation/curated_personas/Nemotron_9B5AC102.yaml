personas:
  professional: Chien Greene blends a decade of direct‑to‑consumer retail experience with a competitive, data‑driven mindset, using advanced POS platforms, bilingual communication, and flexible organization
    to boost sales, mentor associates, and keep the floor agile in Houston’s diverse market.
  sports: Chien Greene maintains a disciplined fitness regimen by running five miles each morning in Memorial Park, joining the local Houston Runners Club for group long‑runs, and cheering on the Houston
    Rockets and Astros while squeezing in weekend pickup basketball games.
  arts: Chien Greene captures Houston’s multicultural vibrancy through street photography inspired by Nan Goldin, practices Mandarin calligraphy as a meditative art, and unwinds listening to Lightnin’ Hopkins’s
    blues and Teresa Teng’s pop, regularly attending local gallery openings when time allows.
  travel: Chien Greene prefers carefully planned trips that balance cultural immersion and adventure, having explored Taipei’s night markets, San Antonio’s historic River Walk, and now dreaming of a road‑trip
    through Utah’s National Parks while managing budget constraints.
  culinary: Chien Greene experiments in the kitchen by fusing soy‑marinated pork with smoked Texas brisket into bao‑tacos, perfecting a Sichuan‑style brisket chili with cumin and star‑anise, and they often
    source fresh cilantro, hoisin, and jalapeños from local farmers’ markets to craft bold, cross‑cultural meals.
  core: Chien Greene is a 43‑year‑old retail strategist who balances relentless competitiveness with a love for solitary runs, spontaneous kitchen experiments, and a midnight habit of over‑analyzing sales
    data, yet never skips their daily calligraphy practice.
background:
  cultural: Chien is a second‑generation Chinese‑American whose parents immigrated from Taiwan in the early 1990s. Raised in Houston’s vibrant multicultural environment, he grew up navigating a blend of
    East Asian traditions—such as respect for hierarchy, emphasis on education, and celebration of Lunar New Year—and Southern American customs like hospitality and community gatherings. Bilingual in Mandarin
    and English, he maintains close ties to the local Chinese community, participating in cultural events at the Houston Chinese Culture Center while also embracing Texan culinary and musical influences.
    This bicultural upbringing informs his communication style—polite yet direct—and his work ethic, combining the diligence often emphasized in East Asian families with the adaptability prized in the diverse
    Houston retail landscape.
attributes:
  skills: '[''Retail sales'', ''Customer service'', ''POS system operation'', ''Inventory management'', ''Visual merchandising'', ''Bilingual communication (English, Mandarin)'', ''Sales data analysis'',
