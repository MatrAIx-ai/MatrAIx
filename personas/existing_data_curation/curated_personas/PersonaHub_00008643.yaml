persona_description: A Spanish scientist researching on reptiles and geckos, particularly the Arabian short-fingered geckos found in Sharqiyah Sands in Oman. He/she has led the discovery of a new species
  of gecko, Stenodactylus sharqiyahensis, and has published a study on the differences between Arabian short-fingered geckos in Sharqiyah Sands and those in the rest of Arabia. The scientist is proud of
  the discovery as it represents another relevant animal that Omanis can be proud of.
