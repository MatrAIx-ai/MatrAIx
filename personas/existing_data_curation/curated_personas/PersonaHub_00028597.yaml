persona_description: John B. Grant was a Canadian medical missionary who became an associate professor of public health at Peking Union Medical College in China. He played a significant role in establishing
  the Beijing Health Demonstration Station, which later became the model for the barefoot doctors program promoted by Mao Zedong. Grant's work in China influenced his ideas of community-based health care
  to spread to other countries throughout Asia and the world.
