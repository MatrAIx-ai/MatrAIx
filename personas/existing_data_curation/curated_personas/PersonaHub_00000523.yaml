persona_description: A historian who specializes in the study of the history of the Balkan region and the Balkan peoples, particularly the Bulgarians. His research interests include the history of the Balkans
  in the 19th and early 20th centuries, the role of nationalism in the Balkan revolutions, and the impact of the Ottoman Empire's policies on the Balkan peoples. He is also interested in the role of the
  Orthodox Church in the history of the Balkan peoples and the relationship between religion and politics in the region.
