personas:
  professional: Robert Buttacavoli, a retired mechanical engineer turned art curator, leverages their CAD expertise and systems‑analysis mindset to meticulously research provenance, document collections,
    and mentor emerging engineers and artists, all while upholding the exacting standards that once drove their industrial automation projects.
  sports: Robert Buttacavoli, a dedicated member of the local senior walking club and occasional volunteer coach for a community fitness‑chess hybrid, enjoys regular strolls through their native‑plant garden,
    follows the San Francisco Giants and Golden State Warriors on game days, and participates in low‑impact yoga classes at the community center to maintain flexibility.
  arts: Robert Buttacavoli, an avid watercolorist and digital photographer, frequents avant‑garde installations at the Museum of Modern Art, studies the techniques of Claude Monet and Ansel Adams, and curates
    private exhibitions that juxtapose vintage radios with contemporary sound art, drawing inspiration from artists like Yayoi Kusama and James Turrell.
  travel: Robert Buttacavoli, who plans trips with the same precision as their engineering projects, has toured the Napa and Sonoma wine regions, photographed the coastline of Big Sur, and dreamed of a
    scholarly pilgrimage to Florence’s Uffizi Gallery, while preferring leisurely road trips that allow ample time for stops at botanic gardens and historic museums.
  culinary: Robert Buttacavoli, a culinary enthusiast who blends their gardening bounty with Mediterranean flair, regularly prepares dishes such as grilled salmon with herb‑marinated heirloom tomatoes,
    avocado‑lime quinoa salads, and classic California‑style cioppino, while perfecting their espresso technique using freshly roasted beans from a local roastery.
  core: Robert Buttacavoli, a meticulously organized former engineer turned art‑loving gardener, balances relentless curiosity with lingering worry about over‑extension, often found juggling watercolor
    brushes, a camera, and a spreadsheet of upcoming museum talks.
background:
  cultural: Robert comes from a second-generation Italian-American family; his grandparents emigrated from Calabria and settled in a small Pennsylvania town where he was raised in a close-knit Catholic
    household. The values of hard work, family loyalty, and appreciation for fine cuisine were instilled early. Moving to California in his forties, he embraced the West Coast's emphasis on outdoor recreation
    and multiculturalism while maintaining his Italian customs, such as celebrating Festa della Madonna and cooking traditional dishes for family gatherings. His active involvement in the El Dorado County
    community reflects a blend of Midwestern modesty, Mediterranean hospitality, and the progressive, environmentally-conscious culture of the Sierra foothills.
attributes:
  skills: '["Mechanical Engineering", "Systems Analysis", "CAD Modeling", "Data-Driven Process Optimization", "Technical Writing", "Project Management", "Budgeting", "Cross-Functional Team Leadership",
