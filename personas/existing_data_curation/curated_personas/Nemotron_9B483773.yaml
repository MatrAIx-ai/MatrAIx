personas:
  professional: Antoinette Herard, an aspiring nursing student, leverages her methodical planning, detail‑oriented document handling, and calm, cooperative demeanor to excel in structured clinical rotations,
    while her tendency to worry pushes her to double‑check protocols and maintain impeccable patient records.
  sports: Antoinette Herard, a diligent high‑school student, enjoys low‑key fitness activities such as early morning walks in Oak Park, participates in the after‑school walking club and a beginner yoga
    class at the community recreation center, and is an avid fan of the Seattle Mariners and Seattle Seahawks, occasionally catching a game with family on weekends.
  arts: Antoinette Herard, a quiet creative, spends evenings sketching characters inspired by contemporary fiction, finds solace in the soulful sounds of Alicia Keys, Marvin Gaye, and Kirk Franklin, and
    attends the local youth theatre’s matinee production of The Little Foxes, which fuels her appreciation for dramatic storytelling.
  travel: Antoinette Herard, a meticulous planner, prefers short, well‑organized weekend getaways to nearby nature spots like Asheville, North Carolina, and dreams of a solo cultural trip to New Orleans
    to explore its jazz heritage, yet she keeps travel budgets tight by using a spreadsheet to allocate funds from her part‑time babysitting gigs.
  culinary: Antoinette Herard, an aspiring baker, loves the precise chemistry of desserts, frequently perfecting chocolate chip cookies with semi‑sweet chips, lemon‑zest shortbread, and red velvet cake,
    and her go‑to pantry staples include vanilla extract, almond flour, and a trusty digital kitchen scale.
  core: Antoinette Herard, a methodical teen with a love for order, finds peace in sketching, baking, and meticulously planned routines while quietly battling a habit of over‑worrying about every detail.
background:
  cultural: Antoinette is part of a multigenerational African American family that has lived in the suburban community of Commack, Long Island, for several decades. Her family maintains close ties to a
    local church where gospel music, communal service, and family gatherings are central to their cultural life. They celebrate traditions such as soul‑food cook‑outs, storytelling sessions with older relatives,
    and community outreach events that emphasize resilience and collective support. Growing up in Suffolk County, Antoinette blends this Black cultural heritage with the broader suburban New York environment,
    shaping values of perseverance, responsibility, and a strong focus on education and community involvement.
attributes:
  skills: '[''Organizational planning'', ''Time management'', ''Basic Microsoft Office (Word, Excel)'', ''Attention to detail'', ''Written communication'', ''Volunteer coordination'', ''Basic budgeting'']'
  hobbies: '[''Reading contemporary fiction'', ''Sketching in a notebook'', ''Journaling'', ''Baking desserts'', ''Walking in local parks'', ''Listening to R&B, soul, and gospel music'', ''Small‑group volunteer
    work at church'']'
  career_goals: Antoinette intends to earn her GED within the next year and then enroll in a community‑college health‑sciences program. She aspires to become a registered nurse or a medical assistant, drawn
    to the clear protocols, predictable routines, and the opportunity to help others. She also envisions a parallel path in office administration or professional organizing, where her methodical mindset
    and reliability can add value. Ultimately, she hopes to combine her compassion with a structured career that offers stability and the chance to support her community.
