  career_goals: Regina aims to translate her frontline expertise into a leadership role within the next two years. She is targeting a team lead or shift supervisor position where she can mentor agents,
    drive performance improvements, and influence service standards. To prepare, she is pursuing a certification in Call Center Management and completing an online course in data‑driven decision‑making.
    Ultimately, Regina envisions moving into a quality‑assurance analyst or operations manager role, shaping policies that balance innovative solutions with proven practices. While she values stable, locally‑based
    employment, she also entertains the possibility of consulting part‑time for small businesses seeking to improve their customer experience.
