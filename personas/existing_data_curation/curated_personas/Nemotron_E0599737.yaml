  hobbies: '[''Hiking and trail biking in Utah'', ''Casual video gaming (strategy and puzzle games)'', ''Listening to tech podcasts'', ''Experimenting with home cooking'', ''Landscape photography'', ''Attending
    community events and game nights'']'
  career_goals: Adam aims to transition from an entry‑level clerk to a supervisory role within the office environment. He plans to obtain a Certified Administrative Professional (CAP) credential and, if
    feasible, complete a GED followed by an associate degree in Business Administration at a community college. His short‑term goal is to lead a small team of clerks, streamline workflow using new digital
    tools, and improve the office’s overall efficiency. Long‑term, Adam hopes to secure a stable managerial position that offers a reliable income, enabling him to purchase a home in West Jordan and reduce
    the financial stress that currently contributes to his worry. He also wants to develop stronger organizational habits to mitigate stress and improve his work‑life balance.
