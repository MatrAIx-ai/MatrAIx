personas:
  professional: Jeffry Pitts is a diligent high‑school junior who leverages his methodical planning and outgoing leadership to spearhead school tech projects and community clean‑ups, while eyeing an apprenticeship
    in automotive or electrical trades to turn his hands‑on tinkering into a reliable career path.
  sports: Jeffry Pitts dominates the point‑guard seat on his high‑school basketball team, drills with the local YMCA hoops league, follows the Jacksonville Jaguars on Sundays, and spends weekends skateboarding
    at the River City Skatepark, all while fitting in fishing trips on the St. Johns River during the spring season.
  arts: Jeffry Pitts captures sunrise moments with a DSLR, edits them to the rhythm of classic rock legends like Led Zeppelin and contemporary hip‑hop stars such as Kendrick Lamar, and occasionally reenacts
    their favorite scenes from Spike Lee’s films during school talent shows.
  travel: Jeffry Pitts plans weekend getaways using Google Maps, has already road‑tripped to the Everglades and a day‑long fishing excursion in the Florida Keys, and dreams of a future backpacking tour
    through Japan’s Akihabara district to soak up tech culture and sushi.
  culinary: Jeffry Pitts prefers quick, high‑protein meals like grilled chicken wraps with avocado and lime, but also loves cooking fish tacos with cilantro, corn tortillas, and a splash of hot sauce, and
    they’ll swap a burger for a homemade shrimp po’boy when the family gathers for dinner.
  core: Jeffry Pitts blends a competitive edge with a meticulous planner’s mindset, channeling teenage stress into basketball, skate‑boarding, and DIY electronics while juggling worries about skeptics and
    the occasional impulse‑buy habit.
background:
  cultural: Jeffry grew up in a working‑class family in Jacksonville, where Southern hospitality meets the laid‑back coastal vibe. His family values hard work and self‑reliance, traits reinforced by the
    city’s strong connection to the sea, military presence, and local sports culture. He’s been shaped by school experiences that emphasize teamwork, community service, and a blend of traditional Southern
    values with the diverse, multicultural atmosphere of Duval County.
attributes:
  skills: '[''project planning'', ''basic web development (HTML/CSS)'', ''graphic design using Canva'', ''team leadership in sports'', ''handyman tasks (basic carpentry, tool use)'', ''first aid certified'',
    ''digital video editing (Adobe Premiere Rush)'', ''strategic gaming (eSports)'', ''public speaking (student council)'', ''event organization (school clubs)'']'
  hobbies: '[''basketball (team captain)'', ''competitive video gaming (FPS and strategy)'', ''DIY electronics projects (Arduino, Raspberry Pi)'', ''street skateboarding'', ''river fishing'', ''photography
    (sports and nature)'', ''volunteering (local community clean‑up)'', ''listening to classic rock and hip‑hop'']'
  career_goals: Jeffry aims to secure a skilled‑trade apprenticeship—preferably in automotive technology or electrical work—so he can combine his love of tinkering with a reliable career path. He also hopes
    to earn a scholarship to a community college where he can study project management, giving him the tools to eventually lead larger construction or tech projects. Ultimately, he wants to be financially
    independent, prove his capabilities to skeptics, and perhaps mentor younger kids in his community.
