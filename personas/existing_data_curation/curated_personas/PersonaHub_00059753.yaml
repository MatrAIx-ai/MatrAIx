persona_description: A historian who specializes in the study of mass atrocities and their representation in history and art, particularly in relation to the Dominican Republic and Haiti. Has a deep understanding
  of the events of the Parsley Massacre and its impact on relations between the two countries. Has a passion for exploring the issues surrounding the representation and interpretation of history and culture
  in diasporic contexts. Is interested in the ways in which history and culture are represented in art and literature, and how these representations can be used to understand and commemorate the victims
  of mass atrocities. Is knowledgeable about the events of the Parsley Massacre and its impact on relations between the Dominican Republic and Haiti, and has a deep interest in exploring the ways in which
  these events have been represented and remembered over time. Is interested in the ways in which the Parsley Massacre and its impact on relations between the two countries have been represented and remembered
  in diasporic contexts, particularly in New York City, the second largest city of both Haiti and the Dominican Republic. Has a unique perspective on the events of the Parsley Massacre and its impact on
  relations between the two countries, and is interested in exploring the ways in which these events have been represented and remembered over time.
