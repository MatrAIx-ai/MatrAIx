  career_goals: John aims to move from a mid‑level programmer to a senior engineer and eventually into a technical lead or engineering manager role. Over the next three years he plans to earn AWS Solutions
    Architect and Google Cloud certifications, deepen his expertise in cloud‑native architecture, and lead a small team developing a SaaS platform that helps local farms digitize crop management and supply‑chain
    data. He also wants to give back to his community by organizing coding bootcamps and mentorship programs for high‑school students in Sumner, blending his curiosity for new technologies with a practical
    focus on delivering reliable, impactful solutions.
