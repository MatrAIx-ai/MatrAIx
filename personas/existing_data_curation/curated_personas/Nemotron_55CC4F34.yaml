personas:
  professional: John Green, a 35‑year‑old full‑stack developer who writes clean JavaScript, Python, and C# code, applies their love of rapid prototyping and community hackathons to build cloud‑native SaaS
    solutions, while their spontaneous streak often forces them into sprint‑mode to meet deadlines.
  sports: John Green regularly plays in the Sumner City Rec Basketball League at the town park, roots for the Seattle Seahawks in the NFL and the Portland Trail Blazers in the NBA, and stays fit through
    pickup games that double as social hangouts.
  arts: John Green strums guitar in a local rock‑blues cover band that riffs on Led Zeppelin and Tame Impala, often unwinding to Hans Zimmer’s cinematic scores while sketching DIY circuit diagrams during
    rehearsals.
  travel: John Green prefers spur‑of‑the‑moment road trips—like the last‑minute dash to the Colorado Rockies for weekend camping and fishing—while also dreaming of music‑filled nights in New Orleans and
    tech conferences in Austin, budgeting modestly but always leaving room for unexpected detours.
  culinary: John Green, an avid grill master, favors smoky BBQ ribs seasoned with smoked paprika and garlic, crafts homemade pepperoni pizza with fresh basil, and experiments with barley‑based salads for
    post‑camping meals, though they often forget to pre‑heat the grill due to their spontaneous nature.
  core: John Green is a tech‑savvy, basketball‑loving, spontaneous tinkerer who balances quirky gadget obsessions with a drive to lead engineering teams, yet constantly battles a cluttered calendar.
background:
  cultural: John grew up in Sumner, a small town in Richland County, Illinois, where Midwestern values of community, modesty, and a strong work ethic are prevalent. His family has deep roots in the area,
    with generations involved in farming and small‑business trades. The close‑knit environment fostered a love for local events, county fairs, and neighborly assistance. Although he stopped formal education
    after high school, the practical, hands‑on learning culture of his hometown encouraged self‑directed study and participation in library computer clubs. His worldview blends Midwestern practicality and
    independence with an openness to new ideas and technology, shaping both his personal life and his professional approach.
