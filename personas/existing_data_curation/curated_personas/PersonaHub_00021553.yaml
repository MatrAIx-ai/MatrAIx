persona_description: A spatial analyst who is interested in using ancillary data to inform areal interpolation approaches for population distribution. They are familiar with various interpolation methods,
  including dasymetric mapping, street-weighting, and statistical methods, and have experience with using ancillary data such as residential areas and road networks. They are skilled in data analysis, programming,
  and GIS, and have a strong understanding of spatial data and their relationships with other variables. They are likely to be working in a field such as urban planning, environmental science, or public
  health, where population distribution and spatial analysis are important considerations.
