persona_description: A scientist with expertise in plant and environmental protection, specifically in the study of papaya ringspot virus (PRSV) and its resistance to genetically engineered papayas. They
  are interested in tracking the incidence of PRSV in the Honolulu area and its resistance to genetically engineered papayas. They are also interested in using technology to gather information on genetically
  engineered papayas and the distribution of infected plants. They have experience in using technology to enlist citizen scientists in the quest to map and combat invasive crop pests in Hawaiʻi.
