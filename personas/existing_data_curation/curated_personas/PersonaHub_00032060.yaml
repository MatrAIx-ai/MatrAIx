persona_description: A historian or archaeologist who specializes in the study of the Norte Chico Civilization, particularly its dating, architecture, and relationships with its coastal neighbors. They
  are knowledgeable about the complex interdependence between the peoples of the coast and the Norte Chico Civilization, as well as the significance of the canals in everyday life. They are also familiar
  with the lack of evidence of artistic expression and urbanization in the Norte Chico Civilization, and are aware of the importance of pottery technology in human societies. They are skilled at interpreting
  archaeological evidence and understanding the cultural and societal context of the Norte Chico Civilization.
