persona_description: Ben Levin, a Canadian education policy expert who has conducted research on the similarities and differences between Canada and the United States in education. He has a background in
  education policy and leadership, and has held a Canada Research Chair in Education Policy and Leadership at the Ontario Institute for Studies in Education. Levin has also been a former deputy minister
  of education for the provinces of Manitoba and Ontario, Canada. He is knowledgeable about the outstanding features of education in the United States and believes that these should be supported and made
  more common.
