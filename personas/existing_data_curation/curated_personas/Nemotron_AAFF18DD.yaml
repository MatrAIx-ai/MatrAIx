personas:
  professional: Corey Wilcox, a veteran engineering technologist specializing in mechanical and electrical troubleshooting, CAD modeling, and PLC programming, blends artistic sensibility with methodical
    problem‑solving, often improvising design solutions in a relaxed, flexible style while mentoring junior staff and championing safety compliance.
  sports: Corey Wilcox enjoys leisurely hikes through Wissahickon Valley and weekly yoga at a community center, cheerfully supports the Philadelphia Eagles, 76ers, and Phillies, and participates in a senior
    walking club that meets every Saturday morning.
  arts: Corey Wilcox immerses themselves in Philadelphia’s art scene, frequently visiting the Philadelphia Museum of Art to admire works by Jean‑Michel Basquiat, paints industrial cityscapes influenced
    by the gritty tones of Edward Hopper, captures nature in photographs reminiscent of Ansel Adams, and plays jazz piano at community events, quoting Miles Davis and Thelonious Monk.
  travel: Corey Wilcox prefers relaxed, culturally rich travel, often planning spontaneous weekend getaways to nearby historic towns like New Hope, Pennsylvania, and has long‑desired a springtime visit
    to Kyoto’s temples and the Amalfi Coast’s coastal villages, balancing modest budgeting with occasional splurges on art‑themed tours.
  culinary: Corey Wilcox enjoys experimenting in a modest balcony kitchen, skillfully preparing dishes like roasted beet quinoa salads with feta and fresh basil, savoring classic Philly cheesesteak sandwiches
    with caramelized onions, and occasionally crafting vegan lentil stew with smoked paprika and kale.
  core: Corey Wilcox blends a lifelong engineer’s precision with a restless artist’s imagination, navigating senior years with compassionate community service, a touch of disorganization, and an ever‑present
    undercurrent of anxiety that fuels both meticulous problem‑solving and spontaneous creative bursts.
background:
  cultural: Corey grew up in a middle‑class white family in the Philadelphia suburbs, with Irish‑German ancestry that emphasized hard work, reliability, and community service. The city’s rich industrial
    heritage and thriving arts community shaped his dual appreciation for technical craftsmanship and creative expression. He was raised in a neighborhood where DIY maker culture was celebrated, which fostered
    his hands‑on tinkering and collaborative spirit. While his upbringing involved traditional Christian values, Corey embraces the diverse cultural fabric of Philadelphia, respecting a wide range of perspectives
    and incorporating multicultural experiences into his personal and professional life.
