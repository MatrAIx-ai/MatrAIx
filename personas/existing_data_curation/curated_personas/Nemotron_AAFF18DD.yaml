  career_goals: Corey aims to shift his career toward roles that combine technical expertise with community impact. He plans to pursue part‑time consulting for local non‑profits developing assistive devices
    for seniors and people with disabilities, leveraging his engineering background to improve quality of life. He also hopes to become a mentor for youth STEM programs and to teach evening courses at a
    community college, sharing his practical knowledge while fostering inclusive, cooperative learning environments. Additionally, Corey is interested in obtaining a certification in occupational safety
    and health to champion safer workplaces and promote mental‑wellness initiatives for his peers, seeking a flexible schedule that reduces stress and supports his compassionate nature.
