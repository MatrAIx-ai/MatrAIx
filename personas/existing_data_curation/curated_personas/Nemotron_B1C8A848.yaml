  hobbies: '[''reading historical fiction'', ''poetry writing'', ''watercolor painting'', ''gardening'', ''Southern soul‑food cooking'', ''floral arrangement'', ''visiting art galleries'', ''listening to
    jazz and gospel music'', ''genealogy research'']'
  career_goals: Angelia’s foremost ambition is to leave a lasting cultural and emotional legacy within her Charlotte community. She intends to complete a memoir that weaves together her personal history,
    family genealogy, and reflections on the African‑American experience in the South. She plans to curate a traveling exhibition of artwork created by senior local artists, accompanied by workshops that
    mentor younger participants in storytelling and creative expression. Additionally, Angelia aims to expand her volunteer outreach by establishing a peer‑support circle for widowed seniors, fostering
    harmony, mutual support, and resilience among members.
