  hobbies: '[''Gardening'', ''Quilting'', ''Reading Historical Fiction'', ''Book Club Participation'', ''Birdwatching'', ''Nature Walks'', ''Volunteering at Library Story-time'', ''Cooking Tex-Mex Cuisine'',
    ''Church Choir Singing'', ''Genealogy Research'']'
  career_goals: Looking ahead, Amanda aims to transition from full-time teaching to a part-time advisory role, where she can mentor emerging educators and help local schools implement structured early-learning
    programs. She is also passionate about launching a community-based reading initiative for preschoolers and hopes to author a practical guide on balancing structure and flexibility in early childhood
    classrooms. While she plans to reduce her workload, she remains committed to contributing her expertise to improve early literacy rates in Wise County.
