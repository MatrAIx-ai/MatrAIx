personas:
  professional: Estela Otero is a financial manager who harnesses advanced Excel, SQL, and Python to produce precise budgeting, forecasting, and risk‑assessment reports while fostering cross‑functional
    collaboration, and they balance curiosity with tried‑and‑true methods to drive strategic planning.
  sports: Estela Otero joins weekend hikes across the Texas Hill Country with a local club, roots for the Dallas Mavericks and the Dallas Cowboys, and they regularly participate in high‑energy Zumba classes,
    blending competitive fandom with personal fitness.
  arts: Estela Otero frequently attends salsa nights where the rhythms of Marc Anthony fill the floor, hones their performance skills in community theater workshops, and they contribute thoughtful insights
    on business‑tech books like "AI Superpowers" during a lively book club.
  travel: Estela Otero plans trips that blend meticulous spreadsheets for budgeting with spontaneous detours—from a curated food tour of Austin to an impromptu weekend in Barcelona—while always eyeing the
    next adventure that fits their career‑friendly calendar.
  culinary: Estela Otero refines modern twists on classic Latin dishes such as quinoa‑filled empanadas, chipotle‑marinated plantains, and cilantro‑lime shrimp, sourcing fresh herbs at the Fort Worth farmers’
    market and showcasing their creations in the cooking classes they both attend and occasionally lead.
  core: Estela Otero merges razor‑sharp finance acumen with a zest for salsa, hiking, and triple‑espresso mornings, turning every challenge into a rhythm they can dance to.
background:
  cultural: Estela grew up in a bilingual Cuban household, where Spanish and English intertwined in daily life. Family gatherings centered around music, dance, and shared meals, instilling a strong sense
    of community and hospitality. These cultural roots shape her collaborative work style and her commitment to giving back, especially through initiatives that support the Cuban‑American community. Her
    heritage also fuels a love for rhythmic movement and flavorful cooking, which she balances with her practical, analytical mindset.
