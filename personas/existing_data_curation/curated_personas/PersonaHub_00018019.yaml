persona_description: A professional engineer who is interested in material properties and is looking for a tool to visualize and understand these properties in a more interactive and engaging way. The person
  is likely to be familiar with the ASME standards and is looking for a tool that can help them explore and analyze data on materials. The person is also interested in learning about the cost of materials
  and is looking for a tool that can present this information in a way that is easy to understand. The person is looking for a tool that can help them compare the range of each property within material
  classifications as well as across classifications. The person is looking for a tool that can help them understand the concepts behind material properties and why certain material properties have the values
  they do. The person is looking for a tool that can help them apply formulas without overwhelming them.
