persona_description: A former member of the intelligentsia who was purged from the communist regime and later defected to France in 1990. He or she is knowledgeable about the transformation of the intelligentsia
  in Yugoslavia under communist rule and the subsequent changes in the social composition of the intelligentsia, including the purge of Western-educated intellectuals and the employment of intellectuals
  in training new personnel for work in industry, government service, and the party bureaucracy. The persona is interested in the political and social dynamics of Yugoslavia during the communist era and
  the impact of the communist regime on the intellectual and cultural life of the country.
