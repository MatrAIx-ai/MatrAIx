personas:
  professional: Amanda Shorter, a seasoned retail and warehouse specialist, translates their meticulous inventory expertise and eye for visual merchandising into a drive to secure a supervisory shift‑lead
    position, where their competitive spirit, reliable yet flexible work ethic, and keen curiosity for new process technologies guide mentoring of younger teammates.
  sports: Amanda Shorter keeps active by hiking the Goguhegan River trails, attending weekly senior fitness sessions at the local community center, cheering on the Michigan Wolverines football team and
    the Kalamazoo Wings hockey club, and they occasionally join a regional walking club that competes in charity step‑challenges during the summer.
  arts: Amanda Shorter, an avid watercolorist, regularly paints Midwestern prairie skies inspired by the luminous works of Edward Hopper and the contemporary prints of Ann Arbor artist Carol Weninger, while
    their evenings are often filled with the folk guitar of Joni Mitchell and discussions of art‑history novels by Susan Sontag during their book club gatherings.
  travel: Amanda Shorter plans their travels with meticulous itineraries, favoring leisurely road trips through Michigan’s picturesque shoreline towns like Saugatuck and Holland, occasional weekend getaways
    to Chicago for museum hopping at the Art Institute, and a long‑held dream of a twelve‑day painting retreat in the lavender fields of Provence, France, all balanced against a modest travel budget and
    the need to keep their retirement timeline in view.
  culinary: Amanda Shorter, a modest home cook, incorporates their heirloom tomatoes, fingerling potatoes, and native Michigan wildflowers into seasonal dishes such as roasted vegetable ratatouille and
    cherry‑scented crumble pies, while they occasionally over‑salt their soups in enthusiasm and delight in pairing their meals with a chilled glass of locally‑produced Riesling.
  core: Amanda Shorter, a 61‑year‑old retail veteran with a competitive streak, blends meticulous inventory mastery with a love for watercolor landscapes, gardening heirloom vegetables, and an ever‑growing
    collection of local art prints, while they occasionally neglect their back‑care stretches in favor of obsessive seed catalog browsing.
background:
  cultural: Amanda was raised in a small Midwestern town in Michigan, part of a white, working‑class family with German and Scotch‑Irish roots. Her upbringing emphasized hard work, community responsibility,
    and modesty, values reflected in her steady employment and civic involvement. The local culture, shaped by agricultural fairs, church gatherings, and a strong sense of regional pride, fostered her appreciation
    for seasonal traditions and local artisans. While her early life was steeped in Protestant values, her later years have broadened her spiritual outlook, inviting curiosity about diverse artistic and
    cultural expressions. She remains deeply connected to the Lenawee County community, participating in volunteer events, supporting local businesses, and celebrating regional heritage.
attributes:
  skills: '[''inventory management'', ''stock counting and discrepancy resolution'', ''point‑of‑sale and inventory software operation'', ''product display design'', ''customer service'', ''logistical coordination'',
    ''new hire training'', ''physical material handling'', ''attention to detail'', ''problem solving'']'
  hobbies: '[''visiting art galleries and museums'', ''watercolor painting'', ''reading contemporary fiction and art history'', ''book club participation'', ''gardening (heirloom vegetables, native flowers)'',
    ''hiking local trails'', ''attending Lenawee County Fair'', ''knitting and teaching'', ''volunteering with historical society'']'
  career_goals: Amanda aims to transition into a supervisory role within the next two years, seeking a position such as Shift Lead or Inventory Coordinator where she can mentor younger employees and shape
    store procedures. She plans to enroll in a community college course on supply‑chain fundamentals to formalize her knowledge and stay current with emerging inventory technologies. While she intends to
    continue working for financial stability, she also hopes to gradually reduce her hours as she approaches retirement, allowing more time for community involvement and personal artistic pursuits. Ultimately,
    she envisions a post‑retirement role leading a local senior center’s art‑and‑craft workshops, merging her organizational expertise with her love of the arts.
