persona_description: A Stanford University researcher and computer scientist who specializes in developing email systems and semantic technology. They have developed a system that can determine the intended
  recipients of emails without providing their email addresses, and can also find the recipients' email addresses if their contact list is not available. This system has been tested by Stanford and is currently
  being perfected to be rolled out to about 6,000 students in Stanford's Computer Science department later this year. The system has been described as changing the way we address emails by describing the
  person we want to receive the email instead of characters.
