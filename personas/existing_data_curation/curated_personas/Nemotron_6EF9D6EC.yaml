  career_goals: Mustafa plans to earn his GED within the next year, then enroll in a community‑college program in graphic design or multimedia arts. He aims to build a professional portfolio of visual work,
    secure an entry‑level position as a design assistant or gallery associate, and eventually freelance as a visual content creator for local businesses and artists. His longer‑term ambition is to open
    a small studio where he can host workshops on DIY crafts and photography, blending his love for art with community outreach.
