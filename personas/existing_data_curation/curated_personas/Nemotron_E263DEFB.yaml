personas:
  professional: Jhi Myers, a budding storyteller and block‑builder who leads his preschool's daily art circle, they combine meticulous sorting of shapes with spontaneous improvisation, and their competitive
    nature pushes them to out‑shine peers while their reserved demeanor keeps the spotlight modest.
  sports: Jhi Myers, a member of the Culver City Kids Soccer Club, delights in chasing the ball at the neighborhood park, they cheer for the Los Angeles Lakers on game night, and they balance solitary play
    on the swing set with occasional tag games with a small circle of friends.
  arts: Jhi Myers, enchanted by the rhythmic beats of Kendrick Lamar and the soulful piano of Nina Simone, spends afternoons painting vivid scenes at the community art workshop, they dream of staging a
    tiny dance to hip‑hop tracks, and they often hum jazz riffs while assembling LEGO creations.
  travel: Jhi Myers, after a memorable family trip to Disneyland and a sunny weekend at Santa Monica Beach, now fantasizes about exploring the towering redwoods of Northern California and hopes to someday
    ride the carousel at a historic New York borough fair, they prefer short, parent‑guided journeys over long solo adventures.
  culinary: Jhi Myers, whose palate delights in mac and cheese topped with crispy breadcrumbs, sweet potato fries, and occasional banana pancakes made with their own tiny whisk, loves helping their mother
    stir the pot during soul‑food gatherings, yet they often insist on adding extra cheese, leading to occasional kitchen messes.
  core: Jhi Myers, a three‑year‑old explorer who balances a fierce love for art and a competitive streak with an anxious, solitary spirit, often loses focus when overwhelmed, yet they find joy in small
    triumphs like completing a perfect puzzle.
background:
  cultural: Jhi grows up in a Black family in Culver City, a culturally rich part of Los Angeles that blends West Coast urban art with African American traditions. He is exposed to the rhythms of hip‑hop
    and jazz that echo his community’s heritage, and his family celebrates cultural markers such as Kwanzaa and soul food gatherings. Community centers nearby offer art workshops and story‑time sessions
    that nurture his love for creative expression, while neighborhood parks provide safe spaces for solitary exploration. This environment shapes his appreciation for varied artistic experiences and fuels
    his curiosity about the wider world.
