  career_goals: Although only three, Jhi already imagines future paths filled with creativity and discovery. He talks about becoming an artist who paints bright pictures, an inventor who builds new toys,
    or a storyteller who shares adventures with friends. His competitive streak drives a desire to excel in activities he loves, such as drawing the best picture or building the tallest tower, while his
    sense of responsibility fuels a gentle ambition to help his family and keep his home tidy.
