persona_description: A historian who specializes in the study of prehistoric human settlements and their impact on the environment. She is particularly interested in the interaction between humans and their
  natural surroundings, particularly in the context of Florida's warm climate and abundant rainfall. Her research focuses on the chemical changes that accompany human habitation and the physical changes
  that past settlers may have made, and how these changes are a vital part of the site's story. She is skilled at using soil studies to understand how humans alter their surroundings through time and how
  these changes can be used to reconstruct the site's history.
