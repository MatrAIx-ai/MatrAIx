personas:
  professional: Thomas Green is a seasoned automotive service technician who excels at systematic engine diagnostics, hybrid powertrain repairs, and precise metal fabrication, and they apply their methodical
    mindset and reliability to deliver high‑quality service while fostering a collaborative, safety‑first shop culture.
  sports: Thomas Green enjoys early‑morning jogs in Riverside Park, follows the hometown football team—the River City Raiders—as a loyal TV fan, and plays occasional pickup basketball with a small group
    at the community center, while they also participate in the local chess club which they treat as a strategic sport.
  arts: Thomas Green finds quiet refuge in classic soul and jazz, regularly spinning vinyl records by Marvin Gaye, Aretha Franklin, Miles Davis, and John Coltrane while restoring cars, and they occasionally
    attend live performances at the downtown Blue Note Café, which fuels their appreciation for musical craftsmanship.
  travel: Thomas Green prefers meticulously planned road trips that blend his love of automobiles with scenic exploration, such as the recent drive along California’s Pacific Coast Highway to visit the
    Petersen Automotive Museum in Los Angeles, a weekend at the Nürburgring’s historic circuit in Germany, and a future goal of touring the classic car fairs in Maranello, Italy, and they always map each
    route in advance to ensure efficiency.
  culinary: Thomas Green cooks with practical confidence, favoring hearty, straightforward meals like smoked brisket seasoned with smoky paprika, homemade beef chili packed with chipotle and beans, and
    occasionally experimenting with a sourdough starter he maintains on his kitchen counter, while they also appreciate a well‑crafted fish taco at their favorite local taqueria.
  core: Thomas Green is a methodical, car‑obsessed technician who channels his solitary craft into reliable service, quietly worries about the future, and balances frugality with a deep love for classic
    music and the occasional impulsive restoration project, and they often double‑check every torque spec before signing off.
background:
  cultural: Thomas grew up in Newark, New Jersey, within a close‑knit African‑American community that valued perseverance, practical skill, and mutual support. His family emphasized the importance of steady
    work and education; his father, a hobbyist mechanic, introduced him to tools and engines at an early age, while his mother encouraged academic achievement and community involvement. Church gatherings
    and local cultural events reinforced a sense of belonging and collective responsibility. This background nurtured Thomas's respect for routine, his practical approach to problem‑solving, and his desire
    to give back through mentorship, all while maintaining a personal identity rooted in the resilience and cultural richness of his Newark upbringing.
attributes:
  skills: '["Engine diagnostics", "Transmission repair", "Electrical and electronic systems troubleshooting", "Hybrid/electric vehicle maintenance", "Brake system service", "HVAC repair", "OBD‑II scanning",
    "Welding and metal fabrication", "Preventive maintenance planning", "Customer service and communication", "Safety compliance", "Team coordination"]'
  hobbies: '["Restoring classic cars", "Building scale model cars", "Listening to classic soul and jazz music", "Reading automotive magazines and technical manuals", "Playing chess", "Jogging in local parks",
    "Mentoring youth in basic automotive skills"]'
  career_goals: Thomas aims to achieve ASE Master Technician certification within the next two years and leverage that credential to become a lead technician in his shop. He aspires to specialize further
    in electric‑vehicle systems, positioning himself as a go‑to expert as the market shifts toward greener technology. Long‑term, he hopes to transition into a shop manager role, overseeing a small, tightly
    knit team where he can mentor younger mechanics and shape workflow processes. Ultimately, Thomas envisions opening his own independent garage that emphasizes routine, high‑quality service and offers
    apprenticeship opportunities for local youth.
