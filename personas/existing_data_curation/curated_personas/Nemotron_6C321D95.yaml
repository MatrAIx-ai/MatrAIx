personas:
  professional: Vanessa Hughes, an aspiring graphic design student with solid communication skills and a flair for Instagram visual storytelling, blends her curiosity for visual narratives with practical
    problem‑solving, while juggling freelance gigs for Birmingham cafés and a part‑time retail job, even as her flexible schedule sometimes leads to missed deadlines.
  sports: Vanessa Hughes, a casual outdoor enthusiast, spends weekends hiking Ruffner Mountain, roots for the Birmingham Barons baseball team, occasionally joins a community yoga class, and prefers low‑impact
    fitness that fits their flexible schedule.
  arts: Vanessa Hughes embraces creative expression through Instagram‑styled street‑photography, sketching whimsical characters, writing flash fiction inspired by authors like John Green, and enjoys playlists
    featuring Dolly Parton, Lynyrd Skynyrd, and Taylor Swift, often visiting the Birmingham Arts District for inspiration.
  travel: Vanessa Hughes prefers short, budget‑friendly trips, often road‑tripping to Nashville for live music, exploring the farmer’s market scene in Asheville, and dreaming of a future backpacking adventure
    through the Scottish Highlands once college finances allow.
  culinary: Vanessa Hughes delights in baking chocolate chip cookies and vanilla cupcakes with cream‑cheese frosting for church events, while also whipping up quick Southern comfort meals like shrimp and
    grits and mastering the art of perfectly fluffy biscuits.
  core: Vanessa Hughes is a curiosity‑driven, socially attuned creative who balances flexible, sometimes disorganized habits with a sincere drive to serve her community through art, food, and volunteerism.
background:
  cultural: Vanessa grew up in a middle-class white family in Birmingham, Alabama, where Southern traditions and community ties are central to daily life. She was raised with Methodist values, attending
    church services and youth events that emphasize hospitality, volunteerism, and family gatherings. Holiday meals often feature Southern staples such as fried chicken, collard greens, mac & cheese, and
    sweet tea, and she enjoys seasonal festivals like the Birmingham Art Festival and the Magic City Christmas parade. The city's historic role in the civil-rights movement, combined with a diverse neighbourhood
    environment, gave her an appreciation for social equity and a curiosity about other cultures. She identifies with Southern hospitality—being friendly, supportive, and open-hearted—while also embracing
    contemporary pop culture and digital connectivity.
