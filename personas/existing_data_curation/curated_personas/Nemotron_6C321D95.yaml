    Valley)'', ''Listening to music (country, Southern rock, pop)'', ''Attending church youth group'', ''Volunteering at community food pantry'', ''Hiking local trails (Ruffner Mountain)'']'
  career_goals: Vanessa plans to enroll in a two-year associate program in graphic design or visual communications at a local community college, motivated by her curiosity about visual storytelling and
    the practical goal of gaining marketable skills. She hopes to build a portfolio through freelance projects for small Birmingham businesses such as local cafés and boutique shops, while also exploring
    part-time work in a retail or hospitality setting to support herself. In the longer term she aims to become a brand strategist or social-media content creator, blending her creative interests with a
    stable income. She remains open to shifting toward a health-related field like medical assisting if she finds it aligns with her desire to help her community.
