  career_goals: Frederick aims to move into a senior strategic leadership role, such as Director of Business Operations or Head of Corporate Strategy, where he can shape long‑term organizational direction
    while fostering a collaborative culture. He wants to champion flexible work processes that preserve structure yet allow teams to adapt quickly, integrating his love for practical outcomes with his commitment
    to team harmony. He also aspires to lead a corporate social responsibility initiative that leverages his humanities background to connect the company with community arts programs. Ultimately, he seeks
    a position that balances professional influence with a healthy work‑life integration, enabling him to remain calm, resilient, and present for his family.
