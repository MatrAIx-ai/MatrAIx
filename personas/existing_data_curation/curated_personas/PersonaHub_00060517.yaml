persona_description: A Washington State Department of Ecology employee who is responsible for developing a modeling approach to assess the risk of oil spills in Washington waters and to evaluate the effectiveness
  of oil spill prevention, preparedness, and response strategies. The persona is involved in the early stages of the modeling project, where they will be responsible for deciding on the components of the
  model and for conducting discussions on specific model components. The persona has experience in marine transportation systems and has knowledge of historical data related to oil spills, vessel behavior,
  and safety measures. They are passionate about using modeling to consider current and future oil spills risks and to provide tools to consider oil spill risks.
