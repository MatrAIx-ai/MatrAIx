  hobbies: '[''Reading adventure/fantasy books'',''Building LEGO sets'',''Hiking and nature exploration around Lake Keowee'',''Scratch programming and creating simple games'',''Baking cookies with family'',''Watercolor
    painting of local landscapes'',''Participating in school drama club'']'
  career_goals: Catherine dreams of turning her love for animals and the outdoors into a future career. In the short term, she aims to earn the junior badge in the school's environmental stewardship program,
    lead a small garden project for her class, and win a local 4‑H animal‑care competition. Long‑term, she hopes to attend a high‑school science magnet program, study veterinary medicine, and eventually
    run a small clinic that serves farm animals in her community. She also imagines exploring a path in environmental science, where she could help protect the lake and forests surrounding Seneca, and perhaps
    combine both interests by working in wildlife rehabilitation.
