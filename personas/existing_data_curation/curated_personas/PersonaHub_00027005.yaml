persona_description: A Chinese company, CITIC Envirotech Limited (CEL), which specializes in providing engineering, procurement, and construction services for municipal and industrial wastewater treatment
  projects, and manufacturing and supplying polyvindylidence fluoride hollow fiber membrane and membrane products. CEL is a leading water treatment and recycling solution provider in China, with a focus
  on providing efficient, effective wastewater treatment solutions to meet China's recent stricter water quality regulations and avoid associated non-compliance penalties. The company has built more than
  100 MBR plants, including the largest wastewater treatment plant with membrane technology in China, and has built one of the largest underground municipal wastewater treatment plants in the world. CEL
  actively seeks to improve the quality of water discharged from its treatment plants and also focuses on reducing energy consumption, waste generation, and chemical use.
