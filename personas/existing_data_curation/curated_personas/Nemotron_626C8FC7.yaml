  career_goals: Erik aspires to transition from an analyst role to a senior leadership position within the field of operations research. Over the next five years, he aims to earn a professional certification
    such as Certified Analytics Professional and complete a part‑time Master’s in Operations Research or Business Analytics. He wants to lead a cross‑functional analytics team that drives efficiency improvements
    for regional manufacturing firms in the Midwest, and ultimately become an Operations Research Manager or Director of Analytics. He is also motivated to develop niche expertise in applying OR to healthcare
    logistics, reflecting his personal interest in community well‑being. Additionally, he hopes to mentor junior analysts and contribute to open‑source OR tools, marrying his competitive drive with a desire
    for broader impact.
