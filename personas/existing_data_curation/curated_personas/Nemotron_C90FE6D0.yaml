personas:
  professional: Olga Ocampo is a diligent stocker and order filler at a regional retailer, leveraging bilingual fluency, Excel mastery, and a keen eye for visual appeal to train new hires, streamline inventory,
    and aspire to transition into a visual merchandising or supply‑chain analyst role where she can fuse efficient stock control with creative product displays.
  sports: Olga Ocampo stays active primarily through salsa dancing classes at a local studio, occasional yoga flow sessions, cheering on the Bowling Green Falcons football and basketball teams, and joining
    a community weekend volleyball league that balances social interaction with moderate exercise.
  arts: Olga Ocampo immerses herself in creative pursuits by sketching watercolor cityscapes, curating a small Instagram showcase of emerging artists from her cultural roots, attending community theater
    productions like “Our Town” at the Cactus Theatre, and drawing inspiration from Frida Kahlo’s vivid self‑portraits, Ocean Vuong’s poignant poetry, and the rhythmic beats of J Balvin’s reggaeton hits.
  travel: Olga Ocampo favors road trips that blend cultural immersion with artistic discovery, such as exploring the mural‑laden streets of Oaxaca, sampling the jazz scene in New Orleans, wandering the
    galleries of Nashville’s art district, and taking weekend getaways to the rolling hills surrounding Bowling Green, all while budgeting carefully to fund future journeys to Barcelona’s street‑art festivals.
  culinary: Olga Ocampo enjoys cooking homemade tamales, empanadas, and chilaquiles, skillfully seasoning dishes with chipotle, ancho chilies, fresh cilantro, and queso fresco, while experimenting with
    Caribbean twists like coconut‑infused arroz con pollo, often pairing meals with freshly brewed café de olla and a side of plantain chips.
  core: Olga Ocampo balances meticulous logistical expertise with a vibrant artistic spirit, navigating anxiety through structured routines, creative expression, and a love for cultural celebrations.
background:
  cultural: Olga identifies as a Latina of mixed Mexican and Central American heritage. Growing up in a bilingual household, she celebrates traditions such as Día de los Muertos, quinceañeras, and family
    gatherings centered around homemade tamales and empanadas. Living in Bowling Green, Kentucky, she blends Southern hospitality with her Latin roots, participating in the local Hispanic community's festivals
    and cultural events. Her cultural background informs her love for vibrant colors, rhythmic music, and storytelling, and it fuels her interest in promoting Latin American artists and preserving cultural
    narratives through her creative pursuits.
attributes:
  skills: '["Inventory Management", "Order Fulfillment", "Warehouse Safety Procedures", "Data Entry", "Microsoft Excel", "Spanish (fluent)", "Customer Service", "Time Management", "Basic Graphic Design",
