  hobbies: '["Visiting art galleries and murals", "Watercolor sketching", "Reading contemporary fiction and poetry", "Learning and dancing salsa", "Yoga and mindfulness meditation", "Photography of urban
    and rural scenes", "Cooking traditional Mexican and Caribbean dishes", "Volunteering at community art workshops"]'
  career_goals: Olga aims to leverage her logistical expertise and artistic curiosity to transition into a visual merchandising or supply‑chain analyst role within the next three years. She plans to complete
    a bachelor's degree in Business Administration with electives in Arts Management, and obtain a certification in supply‑chain operations (e.g., APICS). Her long‑term ambition is to become a merchandising
    manager who blends efficient inventory control with creative product presentation, potentially overseeing a team in a regional retail chain or an art‑focused boutique. She also hopes to develop a side
    venture that curates and sells emerging Latin American artists' works online, merging her cultural heritage with her professional skills.
