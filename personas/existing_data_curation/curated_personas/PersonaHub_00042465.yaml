persona_description: A legal expert who specializes in the field of international refugee law and its implementation, particularly focusing on the rights and obligations of refugees as outlined in the 1951
  Convention and its 1967 Protocol. They are knowledgeable about the protection and assistance provided to refugees by states, UNHCR, and relevant organizations, and are skilled in interpreting and applying
  these provisions under international law. They also have experience in analyzing and evaluating the effectiveness of refugee protection measures and advocating for improvements in the protection of refugees'
  rights.
