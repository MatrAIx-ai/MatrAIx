personas:
  professional: Mark Barnett, a first‑line supervisor on a manufacturing floor, blends lean‑manufacturing expertise with a compassionate leadership style, using their curiosity and flexibility to drive
    process improvements while fostering a supportive team environment.
  sports: Mark Barnett spends weekends hiking the Franklin Mountains, cheering for El Paso Locomotive FC, playing pickup basketball at a community center, and following the Texas Rangers baseball season
    with enthusiastic devotion.
  arts: Mark Barnett immerses themselves in the vibrant El Paso art scene, photographing street murals by artists like Sam Bogg, visiting galleries featuring painter Ana Marquez, and unwinding by playing
    folk and blues guitar covers of Bob Dylan and Mississippi John Hurt.
  travel: Mark Barnett prefers budget‑friendly road trips that blend cultural immersion and outdoor adventure, having recently explored the historic missions of San Antonio, road‑tripped to Santa Fe for
    its adobe architecture, and dreaming of a future solo backpack trek through Patagonia’s windswept plains.
  culinary: Mark Barnett enjoys cooking Tex‑Mex dishes such as carne asada tacos, chilaquiles, and homemade salsa verde, experimenting with smoked paprika and fresh cilantro, and they often host friends
    for communal meals that double as casual jam sessions.
  core: Mark Barnett is a curious, compassionate, and slightly anxious manufacturing supervisor who balances lean‑process innovation with nightly guitar riffs, mindful yoga, and a love for mural‑filled
    streets and spicy salsa.
background:
  cultural: Mark is a White American raised in a suburban neighborhood of El Paso, Texas. Growing up near the US‑Mexico border, he was exposed to a blend of Southwestern and Hispanic cultures, which shaped
    his appreciation for diverse artistic expressions and bilingual communication. While his family background is rooted in Anglo‑American traditions, his community ties have fostered a respect for Mexican
    culinary flavors, music, and the collaborative spirit of the border region. This multicultural environment informs his openness to unconventional ideas and his ability to relate empathetically to a
    diverse workplace.
attributes:
  skills: '[''Production Scheduling'', ''Lean Manufacturing Basics'', ''Safety Compliance (OSHA)'', ''Quality Control'', ''Data Analysis (KPI Tracking)'', ''Team Leadership'', ''Conflict Resolution'', ''Employee
