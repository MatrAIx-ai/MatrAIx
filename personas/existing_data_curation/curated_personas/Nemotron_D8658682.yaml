  hobbies: '[''Photography'', ''Painting'', ''Playing Guitar'', ''Reading about Design and Technology'', ''Yoga and Mindfulness'', ''Mentoring Youth in STEM'', ''Hiking in Franklin Mountains'', ''Cooking
    Tex-Mex'']'
  career_goals: Mark aims to advance from his supervisory role to an operations manager position within the next five years. To support this trajectory, he plans to complete his associate degree and pursue
    a bachelor's in Industrial Engineering or Business Administration, while obtaining a Six Sigma Green Belt certification. He is eager to deepen his expertise in automation and data‑driven process optimization,
    integrating innovative technologies to enhance efficiency and sustainability. Guided by his compassionate nature, Mark also hopes to champion workplace mental‑health initiatives, creating a supportive
    environment that mitigates stress for his team. Ultimately, he envisions launching a consultancy that advises manufacturers on humane, efficient production practices, merging his technical acumen with
    his commitment to helping others.
