personas:
  professional: Aleksi Arnold, a two-year-old with a surprisingly methodical approach to play, pretends to run a tiny office where they line up toy blocks in color-coded rows, diligently follow through
    on building projects, and eagerly share tasks with peers in the playroom, balancing eagerness to lead with a readiness to cooperate.
  sports: Aleksi Arnold, a two-year-old who gleefully joins the neighborhood Tiny Kickers toddler soccer club, cheers on the hometown minor-league baseball team the Springfield Sluggers, and loves tumbling
    in parent-child gymnastics class at the local community center, embodying their sociable energy and love for group activities.
  arts: Aleksi Arnold, a two-year-old who delights in the bright illustrations of Eric Carle's books, sings along to Raffi's "Baby Beluga" and The Wiggles' "Fruit Salad", and proudly displays crayon scribbles
    that mimic abstract art, channeling their curious appreciation for varied creative experiences.
  travel: Aleksi Arnold, a two-year-old who prefers short, stroller-friendly excursions, has already explored the local city zoo, splashed at the seaside town of Coral Bay, and enjoyed weekend stays at
    Grandma's farm in Willow Creek, always traveling with a beloved plush bunny and a playlist of nursery rhymes.
  culinary: Aleksi Arnold, a two-year-old with a pronounced palate for soft banana slices, mild mac and cheese, chicken nuggets, and creamy avocado toast, yet stubbornly refuses peas and broccoli, often
    demanding the food be cut into bite-size shapes and occasionally swapping snacks for a cookie when a meal is delayed.
  core: Aleksi Arnold, a two-year-old curiosity-driven explorer who methodically arranges toys, hoards coins, sings loudly with plush friends, and occasionally rebels against bedtime, epitomizes a blend
    of organized playfulness, social exuberance, and charmingly stubborn habits.
background:
  cultural: Aleksi is raised in a white, middle‑class family in Charlotte, North Carolina. His cultural environment blends Southern hospitality with a diverse urban community, exposing him to local traditions
    such as family barbecue gatherings, community festivals, and church‑based children's programs. The family values education, creativity, and social interaction, encouraging his curiosity and appreciation
    for art from an early age.
