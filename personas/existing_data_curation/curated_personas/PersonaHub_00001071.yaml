persona_description: A healthcare provider who specializes in pediatric medicine, particularly in the diagnosis and treatment of bacterial infections in children, such as strep throat and tonsillitis. They
  are skilled in conducting rapid in-clinic tests for bacterial infections and interpreting the results, as well as providing at-home care strategies for managing these infections. They are knowledgeable
  in the use of antibiotics and other treatments for bacterial infections, and are familiar with the risks and benefits of using antibiotics. They are also skilled in the use of CBC tests to determine the
  cause of infections, and in the management of viral infections.
