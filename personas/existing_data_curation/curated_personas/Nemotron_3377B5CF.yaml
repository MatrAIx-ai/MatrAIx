  hobbies: '[''Gardening'', ''Reading historical fiction'', ''Book club'', ''Yoga and mindfulness meditation'', ''Walking her dog'', ''Volunteering at legal aid clinic'', ''Cooking Southern cuisine'', ''Attending
    church social events'']'
  career_goals: Leslie aims to advance to a senior paralegal or legal office manager role within the next three years, seeking to lead a team of support staff and streamline the firm’s workflow through
    technology integration. She aspires to become a subject‑matter expert in corporate and real‑estate law, and eventually pursue certification as a Certified Paralegal and possibly a compliance officer
    position in a corporate setting. She also hopes to mentor younger paralegals, develop training programs to improve efficiency, and find ways to balance her professional ambitions with her personal need
    for stability and mental wellbeing.
