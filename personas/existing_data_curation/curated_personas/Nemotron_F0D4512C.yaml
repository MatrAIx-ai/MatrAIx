  career_goals: Although retired from formal employment, Victoria aims to remain an active contributor to her community. She aspires to lead a series of art‑appreciation workshops at the local senior center,
    helping participants discover and discuss new artistic ideas. She hopes to volunteer as a docent at a nearby museum, sharing her curiosity and informal art knowledge with visitors. Writing a memoir
    that captures her life’s varied experiences, including the challenges of balancing worry with resilience, is a personal goal. Victoria also wants to deepen her digital skills—learning to use photo‑editing
    software so she can document her garden and share it online. Finally, she seeks to promote senior well‑being by advocating for mental‑health resources within her neighborhood association.
