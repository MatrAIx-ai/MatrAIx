personas:
  professional: Joshua Harrell is an aspiring concept artist and budding art therapist who blends hand‑drawn sketching, digital illustration, and empathetic storytelling to craft immersive video‑game worlds,
    though their relaxed approach to deadlines often leaves projects half‑finished.
  sports: Joshua Harrell enjoys casual weekend hikes in Oakland County parks, follows the Detroit Lions and Detroit Pistons avidly, and participates in the local trail‑running club, though they rarely commit
    to a structured training regimen.
  arts: Joshua Harrell immerses themselves in speculative fiction and visual arts, drawing inspiration from creators like Hayao Miyazaki, Frida Kahlo, and the atmospheric scores of Jeremy Soule, and they
    regularly visit the Detroit Institute of Arts and attend indie game showcase events.
  travel: Joshua Harrell prefers low‑cost, purpose‑driven trips, having explored the Pacific Northwest’s Portland bookstores, the historic streets of Kyoto’s Gion district, and the surreal landscapes of
    Iceland’s Skaftafell, while they dream of a future creative pilgrimage to the Studio Ghibli Museum.
  culinary: Joshua Harrell is an intermediate home cook who favors vegetarian ramen with shiitake mushrooms, avocado toast topped with microgreens, and occasional homemade sourdough, often experimenting
    with fresh basil and coconut oil to elevate simple meals.
  core: Joshua Harrell is a creatively restless teen who transforms imagined worlds into sketches, battles persistent worry with mindfulness, and aspires to heal others through art.
background:
  cultural: Joshua grew up in West Bloomfield, a suburban enclave in Oakland County, Michigan, within a predominantly white, middle‑class family of European ancestry. The community’s proximity to Detroit
    exposed him to a rich tapestry of cultural events—music festivals, museum exhibitions, and diverse culinary scenes—that sparked his appreciation for artistic expression beyond his immediate environment.
    His family values education, community service, and modest religious traditions, encouraging volunteerism at local charities and participation in school clubs. This Midwestern upbringing blends a strong
    sense of community responsibility with access to quality public resources, such as the West Bloomfield Community Center and regional art programs, shaping his compassionate outlook and creative pursuits.
attributes:
  skills: '["digital illustration", "hand‑drawn sketching", "creative writing (poetry & short stories)", "basic graphic design (Adobe Photoshop, GIMP)", "conceptual brainstorming", "empathetic listening",
    "peer support", "basic video editing (iMovie)"]'
  hobbies: '["sketching and watercolor painting", "reading speculative fiction (science fiction & fantasy)", "playing acoustic guitar", "writing fan fiction and poetry", "digital art and concept design
    for video games", "visiting local art museums and galleries", "volunteering at animal shelters", "nature walks in Oakland County parks", "mindfulness meditation"]'
  career_goals: Joshua envisions a future where his imagination and compassion intersect. He aims to earn a scholarship to a visual‑arts or art‑therapy program, build a professional portfolio, and eventually
    work as a concept artist for video‑game studios or as an art therapist serving at‑risk youth. He also hopes to launch a community‑based art workshop in West Bloomfield that offers free classes, mentorship,
    and a safe space for creative expression, allowing him to give back while honing his craft. Over the next decade, he wants to balance artistic fulfillment with tangible impact on others' well‑being.
