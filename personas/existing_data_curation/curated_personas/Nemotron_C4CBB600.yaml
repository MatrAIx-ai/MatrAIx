  hobbies: '[''Visiting art galleries and museum talks'', ''Reading biographies of artists and historians'', ''Gardening with heirloom vegetables and native flowers'', ''Woodworking projects'', ''Listening
    to jazz and world music'', ''Cooking dishes from diverse cuisines'', ''Genealogy research'', ''Sketching local scenes'', ''Attending community theater'']'
  career_goals: Even though retired, Naveen aims to stay actively engaged in his community and personal growth. He plans to volunteer regularly at the Staten Island Museum, helping with docent tours and
    occasional exhibit set‑ups. He hopes to compile his recollections of neighborhood changes into a memoir that will serve as a resource for future generations. He also wishes to explore new artistic mediums,
    such as watercolor painting, and to curate a small senior‑focused art showcase. Travel to regional art festivals and historic sites remains a modest ambition, as does supporting his spouse in joint
    creative projects.
