  hobbies: '[''Watercolor painting (Mexican folk themes)'', ''Attending art exhibitions and museum talks'', ''Cooking and experimenting with fusion recipes'', ''Gardening herbs and native plants'', ''Listening
    to traditional Mexican music and world music'', ''Senior card game nights and crossword puzzle groups'', ''Volunteering at the senior center (cultural event organization, Spanish teaching)'', ''Exploring
    virtual reality museum tours on a tablet'']'
  career_goals: Even at 93, Giovanna pursues purposeful goals that blend personal fulfillment with community contribution. She aims to compile a memoir of her family's Mexican heritage, complete with recipes,
    stories, and photographs, to be passed down to her grandchildren and local cultural archives. She aspires to mentor younger members of the Downey Mexican‑American community by teaching traditional cooking,
    handcrafts, and storytelling at the neighborhood cultural center. Giovanna also seeks to serve as a volunteer docent at the nearby museum, offering informal tours that highlight Mexican folk art and
    its contemporary interpretations. To maintain her independence, she plans to meet weekly walking goals at the local senior fitness center and to master a new digital painting technique using her tablet.
    Lastly, she hopes to champion a community garden project featuring native Mexican plants, fostering intergenerational collaboration while satisfying her competitive spirit in garden contests.
