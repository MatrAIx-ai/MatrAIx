  career_goals: Looking ahead, William aims to transition into a senior regional management role that lets him shape strategy across multiple locations while staying hands‑on with team development. He is
    motivated to mentor emerging leaders, formalizing a structured mentorship program within his organization. His curiosity drives him to pursue a certificate in digital transformation, enabling him to
    integrate emerging technologies into legacy processes. Ultimately, he envisions founding a consulting practice focused on helping small businesses in the Greater Boston area adopt efficient operational
    practices, allowing him to combine his practical experience with his desire to give back to the community.
