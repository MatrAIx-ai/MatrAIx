persona_description: A politician who is known for their moderate fiscal policy preferences and their role in effectively ending the Bretton Woods fixed currency system. They are conflicted by foreign direct
  investors who want free movement of capital, business nationalists who fear foreign competition, and U.S. commodity exporters whose access to foreign markets is frustrated by the overvalued dollar. They
  are skilled in international relations and have a deep understanding of the complexities of the global economy. They are also experienced in dealing with crises and have a history of successfully implementing
  economic policies to stabilize the economy.
