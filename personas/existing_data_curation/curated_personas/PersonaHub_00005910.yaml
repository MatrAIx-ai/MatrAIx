persona_description: 'A neobehavioral psychologist known for his theoretical and experimental studies of conditioning and learning, Kenneth Wartinbee Spence. Spence''s contributions fall into three major
  categories: learning and motivation theory, the experimental psychology of learning and motivation, and methodology and philosophy of science. His insights into the nature of psychology and the role of
  operationism in theory construction were influential to the field.'
