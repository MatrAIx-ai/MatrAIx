  career_goals: Jamila aspires to turn her love of helping others and her personal experience with stress into a career that supports the mental and physical health of her community. She hopes to pursue
    a high‑school health‑science track, eventually studying nursing or social work so she can become a community health advocate focused on youth mental‑wellbeing on the reservation. She also dreams of
    using her communication skills to create a youth‑focused social‑media platform that shares stress‑management tips, cultural stories, and education resources. Long‑term, she envisions leading a tribal
    wellness program that blends modern health practices with traditional Ojibwe healing teachings, providing structured, reliable support for future generations.
