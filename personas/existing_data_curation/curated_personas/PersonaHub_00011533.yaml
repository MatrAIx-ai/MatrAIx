persona_description: A cardiologist who is a senior author of a study that has found a small adhesive wireless device called the ZIO Patch to be more effective than the Holter monitor in detecting abnormal
  and potentially dangerous heart rhythms. The study was published in the American Journal of Medicine and the findings suggest that the ZIO Patch could replace the Holter monitor as the preferred method
  of tracking electrical heart activity in ambulatory patients. The study involved using the ZIO Patch and a Holter monitor on 146 patients and found that the ZIO Patch detected 96 arrhythmia events while
  the Holter monitor detected 61. The study also found that the ZIO Patch was preferred by patients over the Holter monitor and that the Holter monitor detected 11 more arrhythmias during the initial 24
  hour period when both devices were working simultaneously.
