  hobbies: '[''Reading'', ''Journaling'', ''Puzzle Solving'', ''Nature Walks'', ''Birdwatching'', ''Sketching'', ''Gardening'', ''Crocheting'', ''Baking'', ''Yoga'', ''Meditation'']'
  career_goals: Shauntae aims to advance from her current representative role to a team‑lead or supervisory position within the next two to three years, focusing on quality assurance and process improvement.
    She plans to earn a 'Certified Customer Service Professional' credential and enroll part‑time in a community‑college program in Business Administration to broaden her managerial skill set. Long‑term,
    she envisions a career in operations or customer experience management where she can design structured service workflows while maintaining a balanced, low‑stress work environment that supports her preference
    for quiet, focused work.
