personas:
  professional: Arya Mouton, a transportation service attendant in St. George, leverages her meticulous attention to detail, calm assertiveness, and knack for troubleshooting schedule disruptions to keep
    passengers moving smoothly while quietly championing process‑improvement ideas that reflect her practical, reliability‑driven mindset.
  sports: Arya Mouton is a dedicated member of the Red Cliffs Hiking Club, embraces trail runs and weekend climbs in the snow‑capped canyon, roots for the Utah Jazz and follows the Utah Utes football season,
    and joins the local senior center’s soft‑ball league each spring, blending disciplined cardio with community‑spirit team play.
  arts: Arya Mouton relaxes after a long shift by immersing herself in Agatha Christie mysteries, tackling weekly crossword puzzles, and attending the St. George Community Theater’s productions of classics
    like Arthur Miller’s ‘The Crucible,’ while her playlists feature folk‑rock favorites such as The Lumineers and local bluegrass groups, stitching together literary intrigue, puzzle‑solving, and live
    performance into her creative outlet.
  travel: Arya Mouton prefers meticulously planned road trips, charting routes through the Southwest’s iconic parks such as Zion and the Grand Canyon, while dreaming of a future family adventure to Banff
    National Park and Norway’s fjords, balancing her love of nature with budget‑conscious scheduling and a habit of double‑checking fuel stops and campsite reservations.
  culinary: Arya Mouton enjoys farm‑to‑table cooking at a moderate skill level, regularly preparing roasted heirloom carrots, quinoa‑seeded salads with fresh basil from her garden, and occasional chili‑lime
    grilled trout, savoring the simplicity of seasonal ingredients like kale, sweet potatoes, and locally sourced goat cheese.
  core: Arya Mouton blends a pragmatic love for orderly schedules with a quiet wanderlust for hiking trails, a penchant for mystery novels, and a habit of double‑checking every reservation, all while occasionally
    forgetting to water her succulents on a busy week.
background:
  cultural: Arya grew up in a predominantly white, Western‑American community and now lives in St. George, Utah, a region known for its strong family values, community involvement, and appreciation for
    the outdoors. The cultural environment emphasizes reliability, modesty, and service to neighbors, which aligns with her practical and cooperative nature. While she may participate in local traditions
    such as community festivals, church service projects, and seasonal farmers’ market gatherings, her personal identity is shaped more by a blend of regional Western values—self‑reliance, respect for nature,
    and a collaborative spirit—than by any single cultural or religious affiliation.
attributes:
  skills: '[''Customer service'', ''Ticketing and check‑in operations'', ''Route planning and schedule coordination'', ''Safety compliance (DOT, FAA regulations)'', ''Transportation logistics fundamentals'',
    ''Conflict resolution'', ''Use of reservation/ticketing software (e.g., Sabre, Amadeus)'', ''Data entry and reporting (Excel)'', ''Team training and onboarding'', ''Time management'']'
  hobbies: '[''Hiking (Red Cliffs, Snow Canyon)'', ''Gardening (vegetable garden)'', ''Reading mystery novels'', ''Puzzle solving (crosswords, Sudoku)'', ''Book club participation'', ''Volunteering at senior
    transportation program'', ''Family road trips and camping'', ''Itinerary planning'']'
  career_goals: Arya aims to advance to a supervisory or managerial position within the transportation sector, such as Transportation Operations Supervisor or Logistics Coordinator. To achieve this, she
    plans to complete a bachelor's degree in Logistics and Supply Chain Management while obtaining certifications like Certified Transportation Professional (CTP). She also aspires to lead process‑improvement
    projects that increase efficiency and passenger satisfaction at her facility. Balancing her career growth with family life, Arya wants to cultivate mentorship opportunities for younger employees and
    contribute to community outreach programs that promote safe and reliable transportation services in the Washington County area.
