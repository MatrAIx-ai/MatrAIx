  hobbies: '[''Model train building'', ''DIY electronics projects'', ''Gardening'', ''Cooking traditional Vietnamese meals'', ''Fishing'', ''Reading technical journals'', ''Meditation'', ''Watching classic
    films'', ''Playing chess'', ''Attending local cultural festivals'']'
  career_goals: At 43, Hai aims to advance to a senior technician or shop supervisor role where he can oversee a small team, implement standardized maintenance protocols, and earn certifications such as
    the Certified Maintenance & Reliability Technician (CMRT). He also wishes to obtain a journeyman electrician license to broaden his service offerings. Long‑term, he envisions opening a modest, family‑run
    repair shop that emphasizes reliable service and a calm work environment, allowing him to balance professional growth with reduced stress.
