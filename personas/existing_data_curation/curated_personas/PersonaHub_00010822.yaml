persona_description: A painter and artist who specializes in depicting the lives of ordinary people through kitchen-sink realism, often capturing the dignity and humanity of those in difficult circumstances.
  His work is known for its relatable edge and ability to portray life on the streets without the condescension often found in other artists. His work often reflects the gritty and tough nature of life
  in Ipswich, England, and he has a particular interest in the lives of working-class people. He is known for his unconventional decision to paint the unemployed men of Jarrow, which he felt captured their
  upright determination as a body of humanity rather than as individuals.
