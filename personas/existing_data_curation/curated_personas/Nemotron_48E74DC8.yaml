  hobbies: '[''Gardening (vegetables and herbs)'', ''Knitting and crocheting'', ''Cooking traditional and experimental dishes'', ''Reading historical fiction and Colombian literature'', ''Playing card games
    (bridge, rummy)'', ''Attending church and community events'', ''Walking in local parks'', ''Storytelling with family'', ''Documenting personal memoirs'', ''Listening to Colombian music (cumbia, vallenato)'']'
  career_goals: At 84, Raquel’s primary ambition is to remain independent and emotionally resilient while leaving a legacy of her cultural heritage. She aims to mentor her grandchildren and other young
    relatives in cooking and family stories, expand her volunteer role at the senior center by organizing intergenerational cooking workshops, and maintain her health through regular walking and preventive
    care. She also hopes to document her life experiences in a short memoir for her family, ensuring her Colombian roots and personal resilience are preserved.
