  hobbies: '[ ''Reading speculative fiction (sci‑fi/fantasy)'', ''Acrylic painting (abstract)'', ''Acoustic guitar playing'', ''Photography (urban & nature)'', ''Hiking (Texas Hill Country)'', ''Visiting
    art galleries and exhibitions'', ''Improv theatre workshops'', ''Volunteer mentorship for youth'', ''Strategy board games and puzzles'' ]'
  career_goals: Robert aims to advance to a supervisory or training specialist role within the next two to three years, where he can mentor new representatives and design empathy‑driven support curricula.
    Long‑term, he envisions transitioning into user experience (UX) design or community management, leveraging his knack for abstract thinking and artistic skills to shape product interactions and foster
    supportive online communities. Parallel to his professional growth, he plans to build a modest portfolio of artwork and launch a personal website that combines his visual art, speculative‑fiction writing,
    and insights on customer experience.
