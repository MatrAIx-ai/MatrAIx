personas:
  professional: Regina Mccoy is a detail‑oriented aspiring community health worker who leverages their budgeting acumen, garden management experience, and small‑group facilitation skills to coordinate volunteer
    programs while planning a modest CSA venture.
  sports: Regina Mccoy enjoys low‑impact fitness like weekend hikes on nearby forest trails, follows the local minor‑league baseball team the River Valley Cubs, and participates in a community walking club
    that meets twice a week.
  arts: Regina Mccoy finds creative renewal in quilting inspired by folk patterns, reads mystery novels by Agatha Christie and Sue Grafton, and regularly attends performances by the regional theater troupe
    showcasing classic plays by Arthur Miller and contemporary works by local playwrights.
  travel: Regina Mccoy prefers short, purposeful trips such as a weekend farm stay in upstate New York to learn about organic permaculture, and annual visits to a historic Midwestern town where they trace
    ancestor migration routes, balancing travel with their part‑time commitments.
  culinary: Regina Mccoy crafts seasonal farm‑to‑table meals featuring heirloom tomatoes, roasted root vegetables, and fresh herb‑infused sauces, often experimenting with dishes like zucchini lasagna and
    carrot‑ginger soup, while their cooking skill is solidly intermediate with a penchant for preserving excess produce as pickles and jams.
  core: Regina Mccoy blends quiet curiosity with pragmatic action, turning garden bounty into community nourishment while juggling spreadsheets, first‑aid kits, and a steady stream of mystery novels and
    quilt patterns.
background:
  cultural: Regina’s cultural background is rooted in the traditional Midwestern values of rural Michigan. Raised in a small community in Newaygo County, she comes from a family of mixed German and Irish
    ancestry that emphasized hard work, self‑reliance, modesty, and close‑knit community ties. The local Protestant church, county fairs, and family gatherings shaped her sense of belonging and reinforced
    a courteous, neighborly demeanor. While she treasures these longstanding traditions, her innate curiosity drives her to explore broader ideas through reading, online learning, and sustainable living
    practices, creating a blend of conventional Midwestern sensibility with an openness to new perspectives.
