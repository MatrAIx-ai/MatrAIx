  career_goals: Regina aims to complete her associate degree, likely in business administration or community health, and obtain a certification as a community health worker. She envisions re‑entering the
    workforce part‑time by coordinating volunteer programs for the local senior center or a nonprofit focused on sustainable living. Parallel to that, she hopes to develop a modest farm‑stand or community‑supported
    agriculture (CSA) box service that showcases the produce she grows, merging her practical gardening expertise with entrepreneurial aspirations. Lifelong learning remains a priority, and she plans to
    attend workshops on sustainable agriculture, digital tools for small businesses, and effective community outreach.
