  career_goals: In the coming years, Mariana aims to expand her vocabulary to include simple sentences, refine fine-motor skills for drawing and manipulating small objects, and engage in early learning
    programs that nurture her curiosity about the world. She shows a budding interest in music and movement, with a long-term hope of expressing herself through dance or rhythmic performance, reflecting
