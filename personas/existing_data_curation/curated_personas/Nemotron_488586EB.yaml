personas:
  professional: Mariana Campos, a one‑year‑old explorer, already balances curiosity with practicality by testing new toys to see how they work while instinctively figuring out the simplest way to make them
    roll, and their relaxed, flexible approach to play reveals a budding cooperative yet assertive spirit.
  sports: Mariana Campos, a one‑year‑old attending parent‑led baby swim classes at the community pool, loves splashing in the water and mimicking the cheers of the New York Yankees on television, and they
    also enjoy the family’s weekend walks to the nearby park where they chase a soft ball with other toddlers, reflecting a flexible yet enthusiastic approach to early physical activity.
  arts: Mariana Campos, a one‑year‑old who lights up at the soft melodies of Mozart’s 'Eine kleine Nachtmusik' and the playful beats of the children's album 'Baby Einstein', often watches animated short
    films by Pixar, especially 'Toy Story', and they delight in the bright, swirling patterns of a mural by street artist Banksy in the local library.
  travel: Mariana Campos, a one‑year‑old who has already taken short trips to the grandparents' farm in the countryside, enjoys the sensory experience of fresh hay and pond breezes, and daydreams (through
    diaper‑clad imagination) of visiting Disneyland Paris and exploring the beaches of Bali once they’re older.
  culinary: Mariana Campos, a one‑year‑old with a developing palate, favors smooth pureed carrots, sweet mashed banana, and occasionally insists on a spoonful of avocado, while their habit of flinging leftover
    yogurt across the high chair makes mealtime a lively, mess‑filled event.
  core: Mariana Campos, a one‑year‑old blend of inquisitive explorer and easy‑going stroller, navigates the world with a hands‑on curiosity, a relaxed attitude toward routine, and a charming knack for turning
    everyday moments into playful experiments.
background:
  cultural: Mariana comes from a Dominican family, where Spanish and English are spoken at home, and traditions like family gatherings, sharing meals of rice, beans, and plantains, and celebrating Dominican
    holidays are part of daily life. Growing up in Santa Monica, she is exposed to a multicultural environment that blends coastal California influences with her Caribbean heritage. The rhythmic sounds
    of merengue and bachata often fill her home, fostering an early love for music and movement, while community events such as local Dominican festivals provide a sense of cultural identity and belonging.
