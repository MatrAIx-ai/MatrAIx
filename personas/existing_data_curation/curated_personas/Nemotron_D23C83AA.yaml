  career_goals: Although retired, Honda aims to leave a lasting cultural legacy. She plans to compile a memoir and a series of oral histories that capture the Appalachian experience of Floyd, VA. She hopes
    to curate a community art exhibition showcasing local folk artists and to mentor younger writers and artists through workshops at the library. Publishing a collection of essays on the intersection of
    art, memory, and regional identity is a key ambition, as is mastering digital illustration tools to preserve her work for future generations.
