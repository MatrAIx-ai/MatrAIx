personas:
  professional: Enedina Santamaria is a senior operations leader with three decades of supply‑chain and lean Six Sigma expertise, who blends data‑driven strategic planning with a love of unconventional
    solutions, occasionally letting deadlines slip while they mentor emerging talent and push for sustainability and digital transformation across multiple sites.
  sports: Enedina Santamaria enjoys low‑impact fitness through morning yoga, weekend walks in the neighborhood garden, and a weekly pickleball league at the community recreation center, all while cheering
    for the local baseball team the Guardians and the women's professional soccer club the Revolution, a flexible yet social approach to staying active that they cherish.
  arts: Enedina Santamaria immerses themselves in the visual arts by frequenting the Museum of Modern Art, painting watercolor landscapes inspired by Georgia O'Keeffe, collecting folk art and vintage tiles,
    and finding inspiration in the music of Lila Downs and the performances of Lin‑Manuel Miranda, which they channel into creative problem‑solving at work.
  travel: Enedina Santamaria favours flexible, culturally immersive trips, having explored the historic streets of Kyoto, the colorful markets of Marrakech, and a weekend getaway to Santa Fe's art scene,
    while dreaming of a road‑trip along the Pacific Coast and a pilgrimage to Machu Picchu, planning each adventure with a mix of spontaneous itinerary tweaks and modest budgeting constraints that they
    find exhilarating.
  culinary: Enedina Santamaria is an adept home chef who blends traditional dishes like mole poblano and chiles en nogada with unexpected twists such as miso‑marinated carnitas, regularly sourcing fresh
    heirloom tomatoes, Oaxaca cheese, and smoked paprika from the farmer's market, while they experiment with fusion techniques in their well‑equipped kitchen, though occasional garden projects can distract
    them from finishing a meal on schedule.
  core: Enedina Santamaria navigates life with a curious, art‑infused mind, an easygoing way of handling obligations, a penchant for spontaneous creative projects, and a steadfast commitment to mentoring
    the next generation, even if it occasionally leads to missed deadlines and a cluttered calendar that they accept with a grin.
background:
  cultural: Enedina’s cultural background is deeply rooted in her Mexican heritage, shaped by a bilingual household where Spanish and English were spoken interchangeably. Family gatherings centered around
    shared meals, music, and the celebration of traditions such as Día de los Muertos, Cinco de Mayo, and religious holidays. Raised in the Chicago area, she blended the warmth and collectivist values of
    Mexican culture with the Midwestern emphasis on community involvement and modesty. This dual identity informs her cooperative nature, her love for Mexican folk art, and her commitment to supporting
    the local Mexican‑American community in Grayslake through cultural events and mentorship.
