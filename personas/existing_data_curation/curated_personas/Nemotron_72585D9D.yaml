  career_goals: Looking ahead, Enedina aims to transition into a senior executive role where she can shape the strategic direction of operations across multiple sites, championing sustainability and digital
    transformation. She aspires to build a mentorship program that nurtures emerging talent, especially women and underrepresented groups, and to serve on the board of a community nonprofit that promotes
    arts education. While preparing for a phased retirement, she hopes to leverage her expertise as a consultant, guiding organizations in implementing creative, flexible operational solutions that honor
    both efficiency and employee well‑being.
