personas:
  professional: Ruben Veloz is a seasoned electrical systems specialist who combines meticulous schematic reading, PLC maintenance, and strict NEC compliance with a methodical mentorship style that fosters
    junior technicians’ growth while consistently meeting uptime targets.
  sports: Ruben Veloz plays midfield for a local recreational soccer league, regularly fishes on Lake Okeechobee, cheers for the Tampa Bay Rays and Jacksonville Jaguars, and occasionally rows with a community
    club at the nearby marina.
  arts: Ruben Veloz immerses themselves in vibrant Latin‑inspired rhythm nights at the downtown cultural center, frequently enjoying performances by artists such as Marc Anthony, Celia Cruz, and local salsa
    bands, which recharge their social energy and inspire their DIY projects.
  travel: Ruben Veloz prefers well‑planned weekend getaways that blend fishing trips to the Keys, road‑tripping along the Gulf Coast to explore historic towns like St. George Island, and occasional budget‑friendly
    flights to experience Caribbean festivals, always balancing family time with personal adventure.
  culinary: Ruben Veloz delights in preparing heritage‑inspired dishes such as slow‑cooked stews with corn masa, chipotle‑spiced pork, and fresh cilantro‑lime salsa, skillfully grilling seafood caught on
    their trips, and often hosts neighborhood potlucks where they showcase their knack for pairing robust chilies with tangy tomatillos.
  core: Ruben Veloz blends a methodical, safety‑first work ethic with a sociable, community‑driven spirit, balancing structured career ambitions and disciplined finances with a love for soccer, fishing,
    live music, and cooking, all while occasionally succumbing to spontaneous gadget purchases and occasional back‑pain after long days.
background:
  cultural: Ruben grew up in a Mexican‑American household where Spanish was spoken daily, and family gatherings centered around food, music, and shared responsibilities. He celebrates Día de los Muertos
    and Mexican Independence Day with community festivals in Polk County, blending traditional customs with his Floridian lifestyle. His bilingual ability enables him to bridge cultural gaps at work and
    in volunteer settings, fostering inclusive collaboration and mutual support.
attributes:
