  hobbies: '[''Recreational soccer league'', ''Cooking Mexican cuisine'', ''DIY electronics tinkering'', ''Community center volunteering (electrical safety workshops)'', ''Fishing in central Florida lakes'',
    ''Attending live Latin music events'']'
  career_goals: Ruben aims to become a lead technician or maintenance supervisor within the next three years, obtaining a Certified Electrical Technician credential and a journeyman license to formalize
    his expertise. He plans to lead a small team focused on improving safety metrics and operational uptime. Long‑term, he envisions opening his own community‑oriented electrical services company that offers
    affordable repairs and mentorship programs for youth from similar backgrounds.
