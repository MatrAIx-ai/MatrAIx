  hobbies: '["Salsa and hip‑hop dancing", "Community basketball", "Volunteering at health fairs", "Exploring Baltimore''s music venues", "Cooking Southern and Caribbean cuisine", "Attending African‑American
    cultural festivals", "Yoga", "Hiking in Patapsco Valley State Park", "Reading science‑fiction novels", "Photography"]'
  career_goals: Jasmine aims to become a senior MRI technologist and eventually a department supervisor, overseeing protocol development and staff mentorship. She plans to acquire advanced certifications
    from the American Registry of Radiologic Technologists and pursue a master's degree in biomedical imaging or health informatics. Long‑term, she hopes to lead research initiatives in functional MRI techniques,
    contribute to published studies, and mentor underrepresented students pursuing careers in medical imaging.
