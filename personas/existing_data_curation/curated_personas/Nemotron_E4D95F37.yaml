personas:
  professional: Jasmine Allensworth is a senior MRI technologist in the making, combining rigorous protocol precision with warm patient rapport; their mastery of magnetic resonance physics and quality assurance
    is balanced by a flexible, team‑oriented approach that values mentorship and community outreach.
  sports: Jasmine Allensworth is a passionate member of a community basketball league in Baltimore, a regular participant in salsa and hip‑hop dance classes, and an avid supporter of the Baltimore Ravens
    and Maryland Terrapins women’s basketball, while also hiking the trails of Patapsco Valley State Park on weekends to stay fit.
  arts: Jasmine Allensworth immerses themselves in creative expression by attending live gospel performances, listening to classic soul icons like Marvin Gaye, modern artists such as Alicia Keys, and salsa
    legends like Celia Cruz, while also exploring sci‑fi literature by N.K. Jemisin and capturing urban street scenes through photography inspired by Vivian Maier.
  travel: Jasmine Allensworth seeks a blend of cultural immersion and adventure, favoring spontaneous weekend getaways to Philadelphia’s historic districts and New Orleans’ jazz scene, having already visited
    Jamaica for its vibrant culinary traditions, and dreaming of a future trip to Ghana to explore ancestral roots while balancing travel budgets through strategic use of reward points.
  culinary: Jasmine Allensworth loves to craft soulful Southern and Caribbean dishes, proudly preparing collard greens seasoned with smoked turkey, Jerk chicken spiced with scotch bonnet pepper, and sweet
    potato pie featuring nutmeg and cinnamon, while their kitchen skill sits at an intermediate level that shines during lively dinner parties for friends.
  core: Jasmine Allensworth blends technical MRI expertise with community‑driven compassion, navigates finances with structured yet relaxed habits, tackles mild health issues proactively, energizes life
    through basketball, dance, and music, and flavors daily living with vibrant Southern‑Caribbean cooking and adventurous travel plans.
background:
  cultural: Jasmine grew up in a close‑knit African‑American family in Baltimore, where church gatherings, family reunions, and community events emphasized resilience, collective support, and cultural pride.
    Her upbringing instilled a strong sense of responsibility to represent Black professionals in STEM fields, and she often mentors youth through local outreach programs. She draws inspiration from the
    rich history of Baltimore's Black neighborhoods, celebrating traditions like soul food, gospel music, and storytelling while also engaging with contemporary Black arts and activism. This cultural foundation
    informs her collaborative spirit, her dedication to community health, and her aspiration to serve as a role model in medical imaging.
attributes:
  skills: '["Magnetic Resonance Imaging operation", "Radiology physics", "Patient positioning and safety", "Image quality assurance", "MRI hardware troubleshooting", "Electronic medical records management",
