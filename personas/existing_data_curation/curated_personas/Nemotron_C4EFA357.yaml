personas:
  professional: Carlos Botero is a logistics supervisor in Jayuya who coordinates daily material movement across rugged terrain, leverages Excel and inventory software to optimize routes while applying
    lean thinking, and balances meticulous organization with a willingness to experiment on eco‑friendly transport options.
  sports: Carlos Botero joins a local soccer pickup league at the Jayuya field on weekends, hikes the trails of Cerro de la Santa for cardio, and cheers for the Puerto Rico national soccer team and the
    Cangrejeros de Santurce baseball club while also belonging to a community running club that meets on Saturday mornings.
  arts: Carlos Botero spends free afternoons sketching vibrant murals around Jayuya, draws inspiration from the street art of Diego Santos and the musical stylings of Luis Fonsi, and regularly attends performances
    by local cuatro ensembles, which fuel their own improvisations on the instrument.
  travel: Carlos Botero prefers weekend road trips to nearby scenic spots like the Bioluminescent Bay in Vieques and city escapes to Old San Juan, while dreaming of a future backpacking adventure through
    the Andes, balancing spontaneous planning with budget constraints from a modest income.
  culinary: Carlos Botero loves cooking pasteles and arroz con gandules, seasoning them with sofrito, achiote and a pinch of adobo, experiments by adding plantain mash to pasteles, and also relishes street‑food
    tacos al pastor when exploring San Juan’s bustling food markets.
  core: Carlos Botero is a socially‑driven logistics enthusiast who blends youthful curiosity, a love for community art and soccer, and a budding ambition to green‑ify transport while occasionally overcommitting
    to weekend festivals.
background:
  cultural: Carlos is a proud Puerto Rican from the mountain municipality of Jayuya, a town known for its strong Taíno roots and lively bomba y plena celebrations. He grew up in a close‑knit family where
    Spanish is spoken at home and English is taught at school, and where respect for elders and community solidarity are central values. The island’s rich musical traditions, colorful festivals (such as
    the Festival de la Cultura Indígena), and love of food have shaped his identity. Living in a region where agriculture and small‑scale manufacturing coexist with challenges in road infrastructure has
    given him firsthand insight into the importance of reliable transportation for daily life. His cultural heritage informs his vibrant social life, his appreciation for art, and his desire to contribute
    positively to his community.
