  hobbies: '[''Soccer'', ''Hiking'', ''Attending cultural festivals'', ''Sketching street art'', ''Playing the cuatro'', ''Cooking traditional Puerto Rican dishes'', ''Reading about urban planning and transport
    tech'']'
  career_goals: Carlos aims to advance from his current supervisory role to a senior logistics manager position within the municipal government or a regional shipping company. Over the next five years he
    plans to obtain an associate degree in Supply Chain Management and certifications such as Certified Logistics Associate (CLA) and OSHA Forklift Operator. He aspires to lead larger operations, implement
    green‑transport strategies to reduce fuel consumption in Puerto Rico’s hilly regions, and eventually mentor younger workers. In the longer term, he dreams of founding a community‑based courier service
    that supports local artisans by delivering their products efficiently to the island’s tourism hubs.
