  career_goals: Lynwood aims to leverage his extensive field experience to move into a supervisory role within the United States Postal Service, such as a Route Manager or Assistant Postmaster. He plans
    to complete a certification in logistics management through a community college program, building on his some-college background. Over the next five years, he hopes to lead a team of carriers, mentor
    new employees, and contribute to process improvements that increase on-time delivery rates. As he approaches retirement, he envisions transitioning to a part‑time consulting position, advising small
    businesses on local delivery logistics or starting a modest home‑based courier service that serves the Bentonville community.
