persona_description: A prominent economist and financial expert with a keen interest in history and literature, particularly in the works of Jane Austen and Charles Darwin. Mark Carney's decision to place
  Austen on the £10 banknote, in place of Darwin, is a reflection of his understanding of Austen's keen interest in economics and finance, as well as her ability to raise issues of the relation of money
  and wealth to living standards and people's aspirations. Carney's decision to opt for Jane Austen on the British currency would be well advised, as she would be a remarkably appropriate presence on a
  denomination issued by the Bank of England, which is likely to be of interest to a persona who is knowledgeable about economics and financial matters, and has a special interest in Austen's works.
