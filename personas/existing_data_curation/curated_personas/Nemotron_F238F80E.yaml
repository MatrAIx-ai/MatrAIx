personas:
  professional: Emily Dalton, a 1‑year‑old, may not yet hold a job but already demonstrates a budding engineer’s mindset by fiddling with stacking blocks, balancing curiosity with practicality as they test
    cause‑and‑effect, while their relaxed attitude toward tidy play areas results in charmingly chaotic scenes of half‑built creations.
  sports: Emily Dalton, a 1‑year‑old, delights in crawling races across the living room carpet, enjoys parent‑guided infant swim lessons at the community pool, proudly wears the tiny jersey of the local
    toddler soccer club The Little Strikers, and beams whenever the nearby professional baseball team, the Chicago Cubs, appears on the family TV.
  arts: Emily Dalton, a 1‑year‑old, sways to the gentle guitar strums of classic lullaby artist Jewel while clapping along to the playful tunes of children's musician Raffi, and loves the bright colors
    of finger‑painting sessions inspired by the whimsical illustrations of Dr. Seuss.
  travel: Emily Dalton, a 1‑year‑old, has already been cradled on a family road trip to the nearby lake park, giggled on a short flight to Orlando’s theme park attractions, and, through bedtime stories,
    eagerly anticipates a future sun‑kissed stroll on the sandy beaches of Maui.
  culinary: Emily Dalton, a 1‑year‑old, favors smooth purees like sweet‑potato mash with a hint of cinnamon, scoops up mashed avocado with tiny hands, and shows a particular fondness for the bright orange
    burst of carrot puree served in a colorful silicone bowl.
  core: Emily Dalton, a 1‑year‑old, blends unstoppable curiosity with a relaxed, sometimes messy approach to exploration, constantly scattering toys while offering warm coos to anyone nearby, embodying
    a gentle, stable spirit.
background:
