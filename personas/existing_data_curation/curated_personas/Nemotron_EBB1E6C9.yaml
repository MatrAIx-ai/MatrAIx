  hobbies: '[''Visiting art galleries'', ''Sketching and watercolor painting'', ''Reading contemporary fiction'', ''Journaling'', ''Yoga and mindfulness meditation'', ''Solo nature walks'', ''Participating
    in a small‑group book club'', ''Volunteer tutoring'', ''Cooking experimental dishes'', ''Listening to educational podcasts'']'
  career_goals: Carolina aims to obtain her state teaching license within the next year and transition from a teaching assistant to a full‑time elementary classroom teacher. She is particularly interested
    in leading an arts‑infused curriculum that nurtures creativity and critical thinking. Over the next five years she hopes to become a curriculum specialist or instructional coach focusing on inclusive,
    interdisciplinary instruction, and to develop professional development workshops for teachers on integrating art and mindfulness into daily lessons. Long‑term, she envisions founding a community‑based
    after‑school program that provides low‑cost art and tutoring opportunities for under‑served families in the Chicago suburbs, combining her passion for education, equity, and the arts.
