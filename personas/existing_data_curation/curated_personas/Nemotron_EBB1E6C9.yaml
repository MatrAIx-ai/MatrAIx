personas:
  professional: Carolina Mclean, a 28-year-old aspiring elementary teacher, leverages graduate education training and teaching-assistant experience to craft interdisciplinary, arts-infused curricula, blending
    meticulous lesson planning with flexible, mindfulness-based classroom management that nurtures creativity and equity, and they thrive on small-group mentorship.
  sports: Carolina Mclean, a 28-year-old Chicago suburb resident, follows the Chicago Bears in football, the Chicago Cubs in baseball, and plays with a local 5K running club that meets at the lakefront
    trail twice a week, while also attending weekly yoga sessions at a boutique studio, and they stay balanced.
  arts: Carolina Mclean, a 28-year-old watercolor enthusiast, sketches urban landscapes at the Riverwalk, draws inspiration from Georgia O’Keeffe’s vivid palettes, curates monthly viewing parties for local
    Chicago artists, and finds emotional resonance in the indie folk melodies of Sufjan Stevens and the theatrical energy of Lin-Manuel Miranda’s ‘Hamilton,’ and they often journal reflections on contemporary
    fiction by Ocean Vuong to fuel their creative teaching.
  travel: Carolina Mclean, a 28-year-old lover of quiet exploration, prefers low-key, off-season trips that combine nature and art, planning solo weekend escapes to Sedona’s red-rock trails, Minnesota’s
    Boundary Waters, and the historic art town of Santa Fe, while dreaming of a spring immersion in Florence, Italy, balancing modest budgets with occasional splurges on boutique hostels, and they savor
    the reflective solitude of each journey.
  culinary: Carolina Mclean, a 28-year-old hobbyist chef, enjoys experimenting with seasonal produce by preparing miso-glazed carrots, quinoa-stuffed bell peppers seasoned with fresh basil and smoked paprika,
    and hand-rolled sushi featuring avocado and pickled ginger, pairing meals with locally sourced chardonnay, and they occasionally over-indulge in artisanal dark chocolate truffles.
  core: Carolina Mclean, 28, blends artistic curiosity, calm mindfulness, and compassionate teaching to create inclusive, creativity-driven classrooms while quietly indulging in spontaneous watercolor splurges
    and careful budgeting, and they radiate calm in collaborative settings.
background:
  cultural: Carolina was raised in a middle‑class white family in Arlington Heights, a suburban community in Cook County, Illinois. Her upbringing reflected typical Midwestern values of community involvement,
    modesty, and a strong work ethic. Family traditions emphasized volunteerism and support for local cultural institutions such as the Arlington Heights Historical Society and the nearby Chicago Museum
    of Contemporary Art. While her cultural heritage is predominantly Anglo‑American, she has always been encouraged to explore diverse perspectives, fostering an open‑minded appreciation for the arts and
    multicultural experiences that now shape her personal and professional life.
attributes:
  skills: '[''Instructional support'', ''Curriculum development'', ''Arts integration'', ''Differentiated instruction'', ''Assessment design'', ''Classroom management'', ''Educational technology integration'',
