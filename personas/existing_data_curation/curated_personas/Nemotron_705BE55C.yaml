  career_goals: Although still a toddler, Edwin often talks about becoming an artist or a teacher when asked about the future. He loves creating pictures and sharing them with friends, and he enjoys helping
    peers during play, hinting at an early ambition to work in a caring, creative field. As he grows, his aspirations may evolve toward a career that blends art, community involvement, and education, such
    as an elementary art teacher, a community muralist, or a children’s program coordinator.
