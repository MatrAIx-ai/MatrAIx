  as the expansion of warming oceans, melting glaciers, and shrinking polar ice sheets, and the potential consequences of such rise, including flooding, erosion, and loss of infrastructure. They are also
  likely to be aware of the potential impacts on the global economy and the space program, and may be involved in advocacy efforts to mitigate these impacts.
