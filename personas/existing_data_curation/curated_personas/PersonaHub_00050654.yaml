persona_description: A journalist who covers environmental issues and is particularly interested in the impact of mining on Indigenous communities and the environment. She is aware of the challenges faced
  by First Nations in negotiating with mining companies and the importance of protecting their rights. She is also knowledgeable about the environmental impacts of hydraulic fracturing and the exemptions
  that allow the oil and gas industry to operate without many of the environmental regulations that apply to other industries. She is passionate about the need for transparency and accountability in the
  mining industry and is committed to supporting Indigenous rights and environmental protection.
