persona_description: A scholar of sports history who specializes in the study of sports spectators from ancient times to the Renaissance, particularly in the context of the scientific study of sports. They
  are knowledgeable about the history of sports, the development of sports as an activity, and the significance of sports spectators in the evolution of sports as an art form. They are also interested in
  the ideological critique of sports spectatorship, the concerns of government officials, sports promoters, journalists, and non-Marxist scholars about sports-related crowd violence, and the study of group
  theory in the context of sports.
