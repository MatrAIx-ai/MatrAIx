persona_description: A political historian who specializes in the study of the English Restoration period, particularly the events leading up to the Restoration of King Charles II in 1660. This person is
  knowledgeable about the political and religious dynamics of the time and the role of the monarchy in shaping public opinion. They are also familiar with the legal and constitutional issues that arose
  during this period, including the question of whether the monarch should be forced to convert to Anglicanism.
