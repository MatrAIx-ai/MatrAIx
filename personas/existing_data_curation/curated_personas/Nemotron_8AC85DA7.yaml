personas:
  professional: Margaret Queen is a community event coordinator and traditional crafts mentor who blends meticulous planning with a deep respect for heritage, using her practical home‑management skills
    and newly acquired digital tools to organize workshops, preserve family recipes, and keep the local cultural center’s calendar running like a well‑tuned beaded loom.
  sports: Margaret Queen enjoys early‑morning hikes along the Flathead Lake trail network, participates in the Flathead Lake Anglers Association for weekend fishing trips, follows the University of Montana
    Grizzlies football and Missoula Osprey baseball seasons, and is a member of the Silver‑Streak Seniors Walking Club, balancing low‑impact cardio with her love of the outdoors.
  arts: Margaret Queen expresses her creativity through intricate beadwork and basket weaving while drawing inspiration from folk musicians like Joan Baez and the cinematic landscapes of Ansel Adams, and
    she regularly attends powwows where traditional drumming, dance, and the music of the River Band keep her cultural pulse alive.
  travel: Margaret Queen prefers carefully planned trips that blend adventure and relaxation, such as a week‑long road trip to Glacier National Park to photograph alpine meadows, a family visit to the historic
    town of St. Augustine for its Spanish architecture, and a dream itinerary to the coastal vineyards of New Zealand’s Marlborough region, all scheduled around community events.
  culinary: Margaret Queen specializes in seasonal preservation, turning freshly foraged huckleberries into fragrant jam, curing wild game into smoky jerky, and canning heirloom tomatoes for winter soups,
    while her everyday meals often feature cedar‑infused salmon, sorrel‑laden quinoa, and whole‑grain bannock seasoned with pine nuts.
  core: Margaret Queen is a methodical guardian of tradition who balances community stewardship with personal solitude, weaving heritage into every garden, bead, and budget she tends.
background:
  cultural: Margaret is a member of the Confederated Salish and Kootenai Tribes of the Flathead Reservation in western Montana. Raised in a multigenerational household, she grew up learning Salish language
    basics, traditional ceremonies, and crafts such as beadwork and basket weaving from her elders. The tribe’s close connection to the land has fostered her appreciation for native plants, sustainable
    harvesting, and the importance of oral history. While she lives in Polson, an off‑reservation community, she maintains strong ties to tribal events and continues to practice cultural customs, balancing
    them with contemporary life in a small Montana town.
