  hobbies: '[''Beadwork'', ''Garden cultivation (native herbs and flowers)'', ''Hiking and nature walks around Flathead Lake'', ''Fishing'', ''Attending powwows and tribal gatherings'', ''Reading historical
    novels'', ''Cooking and food preservation'', ''Storytelling'', ''Mentoring younger family members'']'
  career_goals: Margaret aims to deepen her involvement in cultural preservation by leading workshops on traditional crafts at the local tribal center, documenting her family's recipes and stories for future
    generations, and mentoring younger community members in both heritage practices and practical life skills. She also aspires to maintain her health to continue supporting her husband and grandchildren,
    and to organize an intergenerational community garden that combines her love of native plants with sustainable food production.
