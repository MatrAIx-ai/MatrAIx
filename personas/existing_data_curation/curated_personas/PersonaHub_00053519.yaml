persona_description: A radiation-hardened CCD imaging device designer who specializes in the development of CCD imagers that are capable of functioning in harsh radiation environments. This person is skilled
  in the use of P-channel technology to fabricate radiation-hardened CCDs, which are able to withstand high levels of ionizing radiation exposure without failing. They are also knowledgeable in the use
  of ionizing radiation to accumulate positive charge in the field oxide regions of MOS transistors, causing N-channel transistors to short out. This person is skilled in the use of charge injection devices
  (CID) to extend the linear dynamic range of the CCD image sensor. They are also skilled in the use of channel stop threshold voltage to minimize the effect of ionizing radiation on the CCD device.
