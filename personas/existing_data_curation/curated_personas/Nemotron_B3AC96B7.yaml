personas:
  professional: Antonio Vasquez, a nine‑year‑old aspiring junior architect, merges his love for Lego construction and Minecraft world‑building with a practical, detail‑oriented mindset, eagerly sketching
    blueprints for bridges and towers while delighting in the structured challenges of each project.
  sports: Antonio Vasquez plays midfield for the Desert Sun Soccer Club, cheers for the LA Galaxy, and follows the World Cup, balancing team drills after school with weekend matches while maintaining a
    disciplined fitness routine.
  arts: Antonio Vasquez immerses themselves in bilingual storybooks and Spider‑Man comic issues, draws intricate Minecraft landscape sketches, and collects Lego Architecture sets inspired by Frank Lloyd
    Wright, finding creative inspiration from both classic cartoons and modern design.
  travel: Antonio Vasquez enjoys weekend trips to the nearby desert observatory and Red Rock Canyon, dreams of exploring the ancient ruins of Machu Picchu, and savors family road trips that blend stargazing
    nights with museum visits.
  culinary: Antonio Vasquez helps prepare traditional dishes such as tacos, guacamole, and quesadillas, showing budding kitchen skills and a preference for fresh cilantro, lime, and crunchy tortilla shells,
    while also loving homemade pizza and fruit smoothies.
  core: Antonio Vasquez is a structured, curious nine‑year‑old who builds Lego skyscrapers, scores goals on the soccer field, and keeps a secret stash of candy for extra energy.
background:
  cultural: Antonio is raised in a Mexican-American household in Indio, California, where Spanish is spoken alongside English. Family gatherings often feature traditional Mexican foods, music, and celebrations
    such as Día de los Muertos and Cinco de Mayo, instilling a strong sense of cultural pride. The local community is a vibrant mix of Latino families and desert‑inspired lifestyles, exposing Antonio to
    both urban and natural environments. He participates in community events at the Indio Library’s bilingual story hour and attends a neighborhood soccer league where many players share his heritage. The
    desert landscape fuels his interest in astronomy and native plants, while his family's emphasis on respect, cooperation, and responsibility shapes his personal values.
