persona_description: A county official in Texas who is responsible for overseeing flood mitigation projects and is currently preparing for an Aug. 25 bond election on $2.5 billion in flood mitigation projects.
  The persona is knowledgeable about the Army Corps of Engineers' dredging project and the potential impact of the project on flood risks in Kingwood, a community that was heavily impacted by Hurricane
  Harvey. The persona is also aware of the potential for sand and gravel mines along the river to contribute to the sedimentation problem and is aware of the need for routine maintenance dredging.
