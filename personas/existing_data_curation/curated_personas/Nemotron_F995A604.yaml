  hobbies: '[''Fishing'', ''Hiking'', ''Woodworking'', ''Reading technical manuals'', ''Gardening'', ''Listening to classic rock'', ''Community center volunteering (organizing donations)'', ''Playing board
    games with close friends'']'
  career_goals: Glen aims to advance from a floor laborer to a supervisory role within the next three years, targeting a shift‑lead or warehouse manager position. He plans to obtain a Certified Forklift
    Operator credential and an OSHA Safety Trainer certification to strengthen his qualifications. Long‑term, he hopes to transition into supply‑chain planning or logistics coordination, potentially completing
    a bachelor’s degree in Business Administration or Supply Chain Management part‑time. Stability and a clear career path are important to him as he supports his growing family and seeks to reduce the
    stress associated with uncertain job prospects.
