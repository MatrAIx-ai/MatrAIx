personas:
  professional: Elaine Zimmerman, an aspiring junior engineer, combines her curiosity and practicality by turning LEGO builds and simple home science experiments into early problem‑solving practice, showing
    organized yet flexible thinking and an outgoing, team‑oriented approach to class projects.
  sports: Elaine Zimmerman, a lively member of the neighborhood Little League soccer team, dashes through weekend games with boundless energy, cheers on the Louisville Cardinals during basketball season,
    and never misses the local children's parade where they proudly wear their team jersey.
  arts: Elaine Zimmerman, an avid drawer of animals and bright storybook scenes, spends afternoons emulating the whimsical style of Dr. Seuss, sings along to upbeat pop hits by Taylor Swift during family
    dance nights, and eagerly attends library storytime where they listen to Mo Willems' tales.
  travel: Elaine Zimmerman, an adventure‑seeking kid, loves short road trips to the Kentucky Derby Museum where they marvel at horse‑drawn carriages, has explored the National Mall in Washington, D.C.,
    and dreams of a future family vacation to Disney World’s Magic Kingdom, preferring trips that blend excitement with familiar family rituals.
  culinary: Elaine Zimmerman, a budding chef in the kitchen, prefers chicken nuggets, macaroni‑and‑cheese, and peanut‑butter‑and‑jelly sandwiches, enjoys helping their parents mash sweet potatoes for a
    holiday side dish, and loves crafting fruit kebabs with grapes, strawberries, and banana slices for snack time.
  core: Elaine Zimmerman, a perpetual motion enthusiast, can’t resist turning any flat surface into a LEGO construction zone, often leaves a trail of bricks behind before remembering to clean up, and giggles
    whenever a soccer ball bounces unexpectedly off a shoe.
background:
  cultural: Elaine is raised in a predominantly white, middle‑class family in Louisville, Kentucky. Her upbringing blends Southern hospitality with Midwestern sensibility, featuring family traditions like
    church gatherings, celebrating local events such as the Kentucky Derby festivities, and active participation in school and neighborhood community activities. Her family emphasizes curiosity, practical
    learning, and social involvement, fostering her outgoing, organized, and emotionally steady personality.
