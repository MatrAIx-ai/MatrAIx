personas:
  professional: Charles Rosenthal, a six‑year‑old budding civil architect, channels his love of LEGO bridges and boats into meticulously planned miniature cityscapes, applying an organized, methodical approach
    that reflects his tendency to balance curiosity with practical execution and his competitive spirit for perfecting every connection.
  sports: Charles Rosenthal dives into the community pool three times a week with the junior "Splash Kids" swim team, spends summer weekends collecting shells at the local harbor while cheering for the
    Los Angeles Lakers and the San Francisco Giants, and brings the same competitive drive from chess to friendly relay races at the neighborhood park.
  arts: 'Charles Rosenthal devotes afternoons to sketching detailed sea‑creature illustrations inspired by Ernst Haeckel’s marine drawings and Jacques Cousteau’s documentary stills, while also binge‑watching
    Studio Ghibli’s "Ponyo" and listening to the orchestral score of "Star Wars: A New Hope", weaving these artistic influences into the narratives of their LEGO city constructions.'
  travel: Charles Rosenthal has visited the Monterey Bay Aquarium, collected shells at Cannon Beach, taken a family road‑trip to the Grand Canyon, and dreams of a cruise to the Galapagos Islands to study
    giant tortoises up close, preferring carefully planned itineraries that still leave room for spontaneous sandcastle building and shell‑hunting detours.
  culinary: Charles Rosenthal loves the crunchy bite of fish sticks with tartar sauce, homemade mac & cheese seasoned with a pinch of paprika, and building peanut‑butter‑banana sandwiches, often sprinkling
    rainbow sprinkles over plain yogurt for a sweet finish; their cooking skill is limited to assembling pre‑made snacks, but they arrange plates with the same precision they use for LEGO layouts.
  core: Charles Rosenthal is a meticulous six‑year‑old builder, competitive strategist, and cautious planner who balances boundless curiosity with a structured, sometimes worry‑prone outlook.
background:
  cultural: Charles was raised in a middle-class white family in suburban Miami, a city known for its cultural mix of Latin American, Caribbean, and North-American influences. While his household celebrates
    traditional American holidays such as Thanksgiving and Fourth of July, he also participates in local festivals like Calle Ocho, hears Spanish phrases at school and in the neighborhood, and enjoys the
    diverse cuisine that Miami offers. This multicultural environment subtly shapes his curiosity about different cultures and his appreciation for the coastal ecosystem, even as his primary cultural identity
    aligns with mainstream American values.
