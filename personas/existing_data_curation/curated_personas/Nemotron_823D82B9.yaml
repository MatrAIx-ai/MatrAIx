  career_goals: Although only six, Charles already envisions a future where he can combine his love of building and his careful planning. He dreams of becoming a marine engineer or a young inventor who
    designs tools to protect the ocean, inspired by Miami’s coastal environment. He also hopes to win the school science fair, earn the title of “youngest inventor,” and one day work on a real research
    vessel. His competitive streak pushes him to set clear milestones, such as mastering robotics kits before middle school and leading a team project to create a simple water-purification device.
