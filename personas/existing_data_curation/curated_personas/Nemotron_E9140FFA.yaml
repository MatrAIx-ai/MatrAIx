  career_goals: Nyma aims to progress from senior sales associate to store manager within the next two years, seeking to lead her own department and mentor younger staff. In the longer term, she envisions
    launching a boutique that fuses South Asian textile art with contemporary fashion, creating a curated space for culturally inspired designs. She also hopes to develop workshops for small retailers on
    visual storytelling and inclusive customer service, balancing professional growth with her desire for creative fulfillment.
