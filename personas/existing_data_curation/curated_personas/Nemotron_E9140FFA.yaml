  hobbies: '[''Watercolor Painting'', ''Art Museum Visits'', ''Historical Fiction Reading'', ''Yoga and Meditation'', ''Fusion Cooking'', ''Herb and Ginger Gardening'', ''Mentoring at Community Center'',
