  career_goals: Although retired from formal work, Lupe aims to stay active in her community by volunteering at the local senior center, sharing her cooking knowledge through occasional workshops, and preserving
    her family’s recipes in a handwritten cookbook. She also hopes to maintain her independence, keep her home safe and comfortable, and perhaps travel back to her hometown in Mexico for a family reunion.
