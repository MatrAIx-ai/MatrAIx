persona_description: A geographer who specializes in habitat modelling, particularly in the use of GIS to create and process data for habitat analyses and habitat modelling. Her research interests include,
  but are not limited to, the predictive ability of different habitat modelling techniques, the representativeness of survey data for use in habitat analyses, and the effect of climate change on cetacean
  species ranges. She has developed a Habitat Representativeness Score (HRS) to assess the representativeness of survey data for use in habitat analyses and has investigated how and why a North Pacific
  grey whale ended up in the Mediterranean and the spatial and temporal patterns of beaked whale strandings around UK and Ireland.
