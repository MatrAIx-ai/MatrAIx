  hobbies: '[''Line dancing'', ''Church choir'', ''Community softball'', ''Gardening'', ''Baking bread'', ''Knitting'', ''Reading mystery novels'', ''Journaling for stress relief'', ''Attending local festivals'']'
  career_goals: Joyce aims to move into a supervisory role within a larger cleaning operation or estate over the next three years, leveraging her competitive drive to become the top performer on her team.
    She plans to earn professional certifications such as Certified Professional Cleaner and Green‑Cleaning Specialist, integrating her curiosity for sustainable practices. Long‑term, she hopes to launch
    her own small, eco‑friendly cleaning service that can provide stable income and allow her to support her family while maintaining a predictable schedule that reduces stress.
