personas:
  professional: Joyce Lima, a veteran housekeeper with over twenty years of experience, leads deep‑cleaning projects, mentors junior staff in advanced stain‑removal and green‑cleaning methods, and balances
    meticulous attention to detail with practical handyman fixes, positioning themselves for a supervisory role in a large estate.
  sports: Joyce Lima stays active by playing catcher on the local women’s softball league, perfecting line‑dancing steps at the community hall each Tuesday, cheering for the Washington Commanders and the
    Virginia Tech Hokies, and incorporates a brisk morning walk through their garden as a low‑impact fitness habit during the spring.
  arts: Joyce Lima finds creative balance in singing alto in their church choir, knitting scarves while listening to classic bluegrass and the haunting melodies of traditional fado, devouring mystery novels
    by Agatha Christie and true‑crime works by Gillian Flynn, and attending the annual county fair’s folk‑art showcase where they admire local painters like Mary Cassatt‑inspired folk artists.
  travel: Joyce Lima prefers weekend road trips to scenic spots like Shenandoah National Park, revisits the historic waterfront town of St. Michaels for its seafood festivals, dreams of a summer pilgrimage
    to a coastal saint’s feast in Lisbon, and balances travel desires with family obligations by planning budget‑friendly stays at nearby family‑run B&Bs, so they can reconnect with nature while honoring
    community ties.
  culinary: Joyce Lima delights in baking sourdough loaves and experimenting with dishes such as grilled sardines with lemon‑herb glaze, collard greens simmered with smoked chorizo, and rosemary‑infused
    roasted chicken, favors fresh herbs, garlic, olives, and seasonal produce, and often hosts potluck gatherings where their signature cheese rolls, inspired by a heritage recipe, become the talk of the
    table.
  core: Joyce Lima, a competitively curious housekeeper who juggles softball, line‑dancing, and sourdough baking while channeling daily stress into meticulous journaling, approaches life as a flexible checklist
    that never fully relaxes the inner skeptic, so they keep both schedules and doubts in constant motion.
background:
  cultural: Joyce grew up in a modest, working‑class family in rural King and Queen County, Virginia. While identified as white, her ancestry blends English, Scots‑Irish, and Portuguese roots, the latter
    reflected in her surname. Her upbringing combined Southern hospitality, strong community and church ties, and occasional Portuguese traditions such as celebratory meals during Festa de São João. These
    influences shape her values of hard work, modesty, and a deep appreciation for communal gatherings, family loyalty, and a mix of Southern and Iberian culinary customs.
attributes:
  skills: '[''Deep cleaning'', ''Standard housekeeping'', ''Advanced stain removal'', ''Time management'', ''Inventory control'', ''Client communication'', ''Basic home repairs'', ''Laundry management'',
