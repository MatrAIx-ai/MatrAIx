persona_description: A conservation biologist who specializes in the study of seabird populations and the factors affecting their decline and recovery. She has extensive experience working on the Lundy
  Seabird Recovery Project, which was set up to help the Manx shearwater population on the island off the North Devon coast. Her research interests include the impact of human activities on seabird populations,
  the effects of habitat destruction and pollution, and the use of population modeling and monitoring techniques to assess and manage seabird populations. She is dedicated to the conservation of seabird
  populations and has a passion for understanding the complex interactions between human activities and the natural world.
