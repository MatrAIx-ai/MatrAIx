persona_description: Ropata Taylor, a Ngati Rarua and Te Atiawa descent person who reflects on the legacy of Te Maatu, a large piece of land that was the heart of their ancestors' land. He is a Trustee
  of NRAIT, Chair of its Audit Committee, and Deputy Chair of Koru Investments. He is also General Manager Manaaki and HR for Wakatu Incorporation, Chair of Te Awhina Marae, and a Trustee of the Nelson
  Regional Economic Development Agency.
