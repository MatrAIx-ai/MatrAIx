personas:
  professional: Eduardo Araujo leverages their solid expertise in floor care, hazardous material handling, and bilingual communication to efficiently manage commercial cleaning tasks, and they balance curiosity
    for new techniques with a practical, organized approach while assertively coordinating with tenants and supervisors.
  sports: Eduardo Araujo stays active by playing midfield in a local amateur soccer league, cheering on the Houston Dynamo during MLS season and the Dallas Cowboys on Sundays, while they also join weekend
    hikes along the Laguna Madre trails and view each workout as a social rally.
  arts: Eduardo Araujo unwinds by strumming acoustic guitar to the melodies of Los Tigres del Norte and Celso Piña at community festivals, and they often quote folk verses to add flavor to social gatherings
    while enjoying the vibrant rhythms of regional cumbia bands.
  travel: Eduardo Araujo prefers budget‑friendly road trips, often planning spontaneous weekend getaways to Big Bend National Park or the historic River Walk in San Antonio, while they dream of a cross‑border
    tour of bustling markets and cultural sites, balancing these aspirations with modest savings and community commitments.
  culinary: Eduardo Araujo showcases a knack for cooking hearty corn‑based stews, spicy pork tacos, and silky bean‑filled tamales, seasoning them with fresh chilies, cilantro, and lime, and they sometimes
    burn the edges of a salsa when experimenting with extra heat at community potlucks.
  core: Eduardo Araujo blends a practical work ethic with a sociable spirit, juggling janitorial precision, weekend soccer, guitar riffs, and a tendency to procrastinate paperwork until the last minute,
    while they dream of launching their own cleaning venture.
background:
  cultural: Eduardo grew up in a bicultural Mexican‑American household in McAllen, Texas, a city on the U.S.–Mexico border. His family maintains strong ties to Mexican traditions, celebrating holidays such
    as Día de los Muertos and Cinco de Mayo with food, music, and family gatherings. Bilingualism is a natural part of his daily life, enabling him to navigate both English‑speaking work environments and
    Spanish‑speaking community settings. The cultural emphasis on hospitality, communal support, and respect for elders influences his friendly, outgoing demeanor. At the same time, living in the Rio Grande
    Valley exposes him to a blend of Tex‑Mex cuisine, border‑region sports, and a vibrant local arts scene, all of which shape his interests and values.
