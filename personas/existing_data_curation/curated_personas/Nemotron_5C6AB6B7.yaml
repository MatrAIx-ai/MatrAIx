  career_goals: Eduardo aspires to advance within the facilities management field, aiming to become a shift supervisor and eventually a facilities manager for a larger commercial property. He plans to obtain
    certifications such as the ISSA Clean Technician credential and OSHA safety training to enhance his technical expertise. Over the next few years, he hopes to enroll in a vocational program or complete
    his associate degree in facilities management, which will open pathways to supervisory roles. In the longer term, Eduardo considers starting his own cleaning service business, leveraging his knowledge
    of efficient operations, customer relations, and community networks to provide reliable services across the Rio Grande Valley.
