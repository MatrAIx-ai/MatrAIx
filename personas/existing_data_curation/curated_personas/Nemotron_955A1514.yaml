    ''copywriting basics'', ''data analysis (Excel, Tableau)'']'
  hobbies: '[''golf'', ''walking his dog'', ''gardening'', ''volunteering at local community events'', ''reading business and leadership books'', ''watching New York sports teams'', ''DIY home improvement'',
    ''listening to classic rock music'', ''playing bridge'', ''crossword puzzles'']'
  career_goals: Kiran aims to progress to a regional sales director role, overseeing multiple offices in the New York market while maintaining the structured, predictable revenue streams he values. He wants
    to mentor junior sales agents, develop integrated advertising solutions for local businesses, and eventually transition into a strategic consulting position that allows a balanced work‑life schedule
    as he approaches retirement. He also envisions leading a community‑focused initiative that helps small businesses adopt effective digital advertising while reducing his own stress through delegated
    leadership responsibilities.
