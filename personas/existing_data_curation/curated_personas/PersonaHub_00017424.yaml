persona_description: The teachers and parents of students/children with ADHD are likely to be interested in the above text. They are individuals who are responsible for managing the many difficult behavioral
  aspects of students/children with ADHD. They are involved in teaching new strategies to monitor the behavior and learning difficulties of ADHD pupils, and are interested in improving their skills in managing
  these difficult behaviors. They are also interested in spreading good practices and new theoretical results throughout the whole community engaged to manage these disorders, at national and international
  level. They are interested in accessing to some interventions, and to share results and efficacy practices.
