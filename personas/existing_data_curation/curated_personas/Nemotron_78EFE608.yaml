    ''Open-mic poetry'', ''Community health fairs volunteering'', ''Tabletop RPGs'']'
  career_goals: Joshua aims to transition from EMT to paramedic within the next two years, pursuing advanced certification and exploring opportunities to bridge his biomedical engineering background with
    emergency care. He hopes to contribute to the development of innovative medical devices for pre‑hospital settings, possibly collaborating with local universities or startups in the Berkshires. Long‑term,
    he envisions a role as an EMS education coordinator or a clinical research specialist focusing on improving emergency response protocols. He also dreams of authoring a memoir or a blog that combines
    his field experiences with reflections on the human condition, using his artistic inclinations to communicate the realities of emergency medicine to a broader audience.
