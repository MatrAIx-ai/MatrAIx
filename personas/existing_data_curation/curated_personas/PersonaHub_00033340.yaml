persona_description: A rock and mineral collector who is interested in exploring and collecting fossils in Pennsylvania, particularly those from the Paleozoic and Mesozoic eras. They are passionate about
  learning about the geological variety of the state and the different rock and mineral types found there. They appreciate the educational materials provided by the Pennsylvania Geological Survey and are
  respectful of the private landowners' property rights. They are knowledgeable about the history of fossils and minerals in Pennsylvania and are interested in developing an interesting collection of rocks,
  minerals, and fossils.
