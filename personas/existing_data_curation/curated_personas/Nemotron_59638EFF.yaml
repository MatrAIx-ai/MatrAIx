personas:
  professional: Marta Rodriguez, a 25-year-old data-driven marketer, blends rigorous statistical analysis with vivid visual storytelling, using Python, Tableau, and Adobe tools to turn consumer insights
    into compelling campaigns while leading cross-functional Agile teams with calm authority.
  sports: Marta Rodriguez fuels their love for the Rockies by trail-running the Flatirons in summer, joining a local yoga studio for weekly Vinyasa flow, and cheering on the Denver Broncos and Colorado
    Avalanche, while balancing a habit of occasional couch-potato weekends after intense hikes.
  arts: Marta Rodriguez immerses themselves in the visual arts scene, attending abstract exhibitions at the Denver Art Museum, sketching sunrise vistas in the Rockies, playing acoustic guitar to indie folk
    tunes by Sufjan Stevens and Feist, and performing improv sketches with the Denver Improv collective.
  travel: Marta Rodriguez prefers purposeful travel, planning weekend getaways to national parks like Yosemite and international art-centric trips to Barcelona, where they can photograph architecture, sample
    tapas, and return home refreshed for their next market research project.
  culinary: Marta Rodriguez experiments with contemporary Mexican fusion dishes, crafting tacos with paneer-infused carnitas, mole-marinated quinoa bowls, and avocado-lime sorbet, while their cooking skill
    hovers between enthusiastic amateur and occasional kitchen disaster when multitasking between guitar practice and recipe videos.
  core: Marta Rodriguez, a 25-year-old analytical creative, turns data into art, balances mountain climbs with mindful meditation, and quietly obsesses over perfecting the perfect mole-infused dessert.
background:
  cultural: Marta was raised in a bilingual Mexican‑American household, celebrating traditions such as Día de los Muertos, quinceañeras, and family gatherings centered around homemade mole and tamales.
    Her grandparents instilled a deep appreciation for Mexican folklore, music, and storytelling, which now inform her cultural lens in market research. Living in Denver's diverse community, she bridges
    her Mexican heritage with the broader American context, often acting as a cultural liaison in campaigns targeting Hispanic audiences. Her fluency in Spanish and intimate knowledge of Mexican consumer
    values enable her to craft insights that respect cultural nuance while driving inclusive brand narratives.
attributes:
  skills: '[''Market research methodology'', ''Statistical analysis (Python, R, SPSS)'', ''Data visualization (Tableau, Power BI)'', ''Survey design and implementation'', ''Consumer behavior analysis'',
