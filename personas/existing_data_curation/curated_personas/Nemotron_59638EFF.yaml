    ''Bilingual communication (Spanish-English)'', ''Presentation and storytelling'', ''Data-driven decision making'', ''Cross-functional collaboration'']'
  hobbies: '[''Digital painting'', ''Sketching and illustration'', ''Visiting contemporary art exhibitions'', ''Photography of natural scenery'', ''Reading speculative fiction and philosophy'', ''Hiking
    in the Rocky Mountains'', ''Yoga and mindfulness meditation'', ''Playing acoustic guitar'', ''Experimenting with Mexican fusion cuisine'', ''Participating in improv theater workshops'']'
  career_goals: Marta aims to become a senior insights leader within a multinational consumer‑goods company, guiding strategic direction through innovative, data‑rich storytelling. In the next five years
    she plans to earn a professional certification in data analytics and pursue an MBA to blend her technical expertise with business leadership. Ultimately, she envisions founding her own consultancy that
    helps brands navigate multicultural markets, especially leveraging her Mexican heritage to create authentic, culturally resonant campaigns that blend technology, creativity, and consumer empathy.
