  career_goals: Eric aims to finish high school with improved grades and then enroll in a vocational program that blends his passions for food and community. In the short term, he hopes to attend a culinary
    institute where he can refine his cooking techniques and learn professional kitchen management. Long‑term, Eric envisions opening a community‑focused restaurant or kitchen that celebrates Dominican
    flavors while offering mentorship and job‑training opportunities for local youth. He is also interested in staying involved with sports, potentially becoming a youth basketball coach or organizing neighborhood
    sports leagues, allowing him to combine his love for teamwork, mentorship, and cultural pride.
