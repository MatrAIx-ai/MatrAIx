personas:
  professional: Eric Obando, a high‑school sophomore who balances a strict after‑school practice schedule for basketball and soccer with the spontaneous creation of TikTok videos, uses their natural leadership
    and teamwork skills to coach peers at the community youth center, and blends a practical mindset with a flair for improvisation in digital storytelling.
  sports: Eric Obando, a dedicated member of his high‑school basketball team and a midfield player for the Paterson United Soccer Club, trains five days a week at the community center, idolizes the New
    York Knicks and the New York Red Bulls, and balances structured conditioning drills with spontaneous pickup games after school.
  arts: Eric Obando channels his love of rhythm by dancing to Bad Bunny, Romeo Santos, and classic salsa tracks at family gatherings, while also sketching graffiti‑style murals inspired by street artists
    like Banksy and local New Jersey muralists, and frequently shares short performance clips and art time‑lapses on TikTok.
  travel: Eric Obando enjoys weekend trips to the Jersey Shore and occasional family road trips to New York City, while dreaming of a summer adventure in Puerto Rico’s coast and a cultural exchange program
    in Spain, balancing meticulous planning with spur‑of‑the‑moment getaways with friends.
  culinary: Eric Obando, an eager home chef, regularly prepares arroz con habichuelas, crispy fried plantains, and spiced chicken tacos, skillfully blending traditional flavors from their family's kitchen
    with modern twists, and delights in experimenting with cilantro, lime, and ají while hosting lively dinner sessions for friends and family.
  core: Eric Obando navigates teenage life with a disciplined practice routine that collides with impulse TikTok bursts, a love for soccer and salsa, and a habit of leaving their phone charger unplugged
    on the hallway floor, often forgetting to finish homework before lights out.
background:
  cultural: Eric is a second‑generation Dominican‑American raised in Paterson, New Jersey, a city with a vibrant Dominican enclave. At home, Spanish is spoken alongside English, and family meals center
    around classic Dominican cuisine, reinforcing strong ties to his heritage. He celebrates Dominican holidays such as Independence Day (Feb 27) and Carnaval, participating in neighborhood parades and
    cultural festivals. Catholic traditions influence his upbringing, with occasional attendance at the local parish. The close‑knit Dominican community in Paterson provides a supportive network that values
    family, mutual assistance, and cultural pride. Eric’s bicultural identity shapes his worldview, allowing him to navigate both American school life and Dominican family customs, fostering a deep respect
    for his roots while embracing the diversity of his urban environment.
