  hobbies: '[''Abstract painting'', ''Jazz piano improvisation'', ''Reading philosophy and African diaspora literature'', ''Senior storytelling circles'', ''Community theater attendance'', ''Chess'', ''Urban
    gardening and heirloom cooking'', ''Volunteer at local museum exhibitions'']'
  career_goals: Although retired, Antonio aims to leave a lasting legacy by preserving and sharing Chicago’s Black cultural heritage. He is working on an oral‑history project that records stories from longtime
    residents of the South Side, hoping to curate a traveling exhibition that blends photography, artwork, and recorded narratives. He also aspires to write a memoir that chronicles his experiences from
    the civil‑rights era to present‑day Chicago, and to serve on the board of a local nonprofit that provides arts programming for seniors and underserved youth.
