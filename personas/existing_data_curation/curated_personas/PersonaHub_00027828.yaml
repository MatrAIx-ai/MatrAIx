persona_description: A researcher studying thyroid development in zebrafish and mice, focusing on the role of the Pax2 gene in thyroid specification and differentiation. They are particularly interested
  in the conserved and non-conserved aspects of Pax2 function in different species, and how these differences affect thyroid development in zebrafish. They are also interested in the potential of zebrafish
  as a model organism for thyroid development, and how it can be used to study thyroid disorders and related diseases. They are likely to have expertise in zebrafish genetics, embryology, and thyroid development,
  and are looking for opportunities to collaborate and contribute to the field.
