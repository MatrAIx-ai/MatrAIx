personas:
  professional: Kenia Montalvo is an emerging young engineer who channels her love for building intricate LEGO models into early experiments with basic mechanical concepts, meticulously planning each build
    on paper, recording step‑by‑step instructions, and treating her school science projects with the same methodical precision, because they thrive on clear structure.
  sports: Kenia Montalvo participates in the Riverside Youth Soccer Tigers, attending thrice‑weekly practices that follow a disciplined drill routine, enjoys the predictable rhythm of weekend swimming laps
    at the community pool, and they support the hometown baseball team, the Riverbank Runners, for their steady schedule of games.
  arts: Kenia Montalvo immerses herself in mystery novels like "The Secret of the Locked Library", draws detailed everyday street scenes reminiscent of Edward Hopper, practices the traditional folk dance
    "La Danza del Pueblo" with a small circle of friends, and they find creative inspiration from the structured narratives of Agatha Christie and the rhythmic patterns of their cultural dance.
  travel: Kenia Montalvo prefers meticulously planned family outings, such as a road trip to the Grand Canyon with a daily checklist of viewpoints, a two‑day beach stay in Monterey where activities are
    scheduled hour by hour, and a weekend camping adventure at Lake Meadow that follows a pre‑written itinerary, and they balance adventure with the comfort of routine.
  culinary: Kenia Montalvo loves assisting in the kitchen, especially when following step‑by‑step recipes for family favorites like spiced masa dumplings, hearty bean stew, and fresh lime‑bright salsa,
    honing her precision by measuring ingredients exactly, and they enjoy the predictability of flavors that echo her cultural heritage.
  core: Kenia Montalvo is a methodical 11‑year‑old who thrives on structure, channeling their love for LEGO, chess, mystery stories, and family cooking into organized routines while they quietly navigate
    a world of predictable patterns and occasional perfectionist quirks.
background:
  cultural: Kenia comes from a Mexican‑American family that maintains strong ties to its cultural roots while living in Scottsdale, Arizona. At home, Spanish is spoken daily, and family meals often feature
    traditional dishes like tamales and pozole. She celebrates cultural holidays such as Día de los Muertos and attends a local Mexican community center where she participates in cultural workshops. This
    blend of Mexican heritage and the diverse Southwest environment shapes her worldview, fostering humility, respect for family, and an appreciation for both American and Mexican traditions.
attributes:
  skills: '["Time management", "Bilingual Spanish‑English communication", "Puzzle solving", "Basic coding in Scratch", "Organizing group projects"]'
  hobbies: '["Reading mystery books", "Building LEGO models", "Sketching detailed drawings", "Cooking Mexican recipes with her mother", "Practicing Mexican folk dance in a small group", "Playing chess with
    her grandfather"]'
  career_goals: Kenia dreams of pursuing a career that combines her knack for organization with a desire to serve her community. She envisions herself as a civil engineer designing safe, functional spaces,
    or as a teacher who can incorporate her Mexican heritage into a structured classroom environment. In the short term, she aims to excel in her current school subjects, earn a scholarship for a STEM program,
    and participate in a local youth mentorship initiative.
