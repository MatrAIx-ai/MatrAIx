personas:
  professional: Luis Perez is a budding junior game designer who combines their love for drawing cartoon characters, storytelling with LEGO bricks, and Scratch programming to prototype simple games, using
    their curious mind and organized yet flexible approach to turn ideas into playful digital experiences, and they eagerly share their creations with friends.
  sports: Luis Perez avidly follows River City FC and watches Real Madrid matches on TV, plays pick-up soccer games at the neighborhood park, belongs to the Little Strikers Soccer Club, and during winter
    joins a junior basketball league, showing an energetic, team-oriented approach to sports, and they love cheering for their teammates.
  arts: Luis Perez draws cartoon characters inspired by Studio Ghibli and Disney, builds narrative LEGO worlds, visits the City Art Museum to admire works by Frida Kahlo and Vincent van Gogh, and they dance
    to salsa tracks by Celia Cruz and merengue beats by Elvis Crespo while singing along to English pop songs, weaving a rich tapestry of artistic expression.
  travel: Luis Perez enjoys weekend trips to the local science museum, has explored the coastal town of Sunny Cove, dreams of visiting the Grand Canyon and Disneyland, and they prefer family-friendly itineraries
    that blend structured activities with spontaneous play.
  culinary: Luis Perez loves helping in the kitchen to make cheese arepas, beef empanadas, and homemade pizza, showing beginner-level cooking skills but a big appetite for experimenting with cornmeal, cheese,
    tomato sauce, and a pinch of cinnamon, and they often serve the finished dishes to family members with a proud smile.
  core: Luis Perez is a curious, energetic eight-year-old who blends art, soccer, and coding into daily adventures, often juggling a LEGO masterpiece with a soccer ball while they occasionally forget to
    finish homework.
background:
  cultural: Luis grows up in a Venezuelan household in Miami's vibrant multicultural neighborhood. At home Spanish is spoken, and family gatherings are filled with traditional dishes such as arepas, hallacas,
    and dulce de leche, as well as stories about Venezuelan holidays like Independence Day. The community's Latinx influence, combined with the diverse sounds of South Florida, exposes him to a blend of
    Caribbean music, American school culture, and a strong sense of family cohesion. This bicultural upbringing nurtures his bilingual abilities, appreciation for both Venezuelan and American traditions,
    and a worldview that values community, resilience, and artistic expression.
attributes:
  skills: '[''reading comprehension'', ''basic arithmetic'', ''bilingual communication (Spanish & English)'', ''drawing and sketching'', ''creative storytelling'', ''basic coding with Scratch'', ''team
    collaboration'', ''musical rhythm and clapping'', ''memory recall'']'
  hobbies: '[''drawing and doodling'', ''playing soccer'', ''building LEGO sets'', ''reading adventure books'', ''listening to music and dancing'', ''watching cartoons'', ''exploring museums and art exhibits'',
    ''learning to code with Scratch'', ''playing with friends at the park'', ''cooking simple Venezuelan recipes with family'']'
  career_goals: Luis dreams of becoming someone who can combine his love of art and technology. He often says he wants to be a cartoonist who creates animated stories, a video-game designer who builds interactive
    worlds, or an astronaut who explores new frontiers and draws what he sees. He is also fascinated by scientists who solve problems for the planet, and sometimes imagines working as an environmental artist
    who raises awareness through his drawings. At this stage his ambition is to keep learning, try new things, and one day turn his curiosity into a career that lets him share ideas and help others.
