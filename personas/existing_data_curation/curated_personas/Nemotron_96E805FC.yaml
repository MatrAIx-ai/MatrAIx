  hobbies: '[''Boardwalk sunrise walks'', ''Reading historical fiction'', ''Gardening'', ''Farm-to-table cooking'', ''Yoga and mindfulness meditation'', ''Volunteering at food pantry'', ''After‑school tutoring'',
    ''Quilting circle'']'
  career_goals: Peggy Jo aims to expand her impact beyond her classroom by moving into a leadership role within her school or district. She plans to pursue a master's degree in Educational Leadership to
    qualify for positions such as Instructional Coach, Curriculum Coordinator, or Assistant Principal. She is passionate about developing inclusive curricula that incorporate project‑based learning and
    community engagement. Long‑term, she hopes to mentor new teachers, champion mental‑health initiatives for students and staff, and design after‑school programs that strengthen community ties in Virginia
    Beach.
