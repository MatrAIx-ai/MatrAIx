personas:
  professional: A budding engineer in the making, Matthew Silvestro channels his love for LEGO construction and space‑themed comic sketches into a developing skill set of problem‑solving, spatial reasoning,
    and teamwork, while their balanced curiosity and practicality guide them to experiment with new building techniques while still following step‑by‑step instructions.
  sports: Matthew Silvestro plays midfield for the Oakwood Rovers youth soccer club, idolizes Manchester United’s dynamic play and cheers for the U.S. Men’s National Team during World Cup qualifiers, rides
    a blue mountain bike on weekend trails, and never misses a game‑day viewing of the Los Angeles Lakers basketball with family.
  arts: Matthew Silvestro channels creative energy into drawing comic panels inspired by the storytelling of Stan Lee and the whimsical illustrations of Dr. Seuss, strums simple chords of “Yellow Submarine”
    by The Beatles on a child‑size acoustic guitar, and binge‑watches Pixar’s “Toy Story” and “Coco” for narrative inspiration, while also collecting limited‑edition Funko Pop figures of favorite characters.
  travel: Matthew Silvestro’s wanderlust includes annual family hikes in Yosemite National Park, unforgettable weekend trips to the nearby state park for rock‑collecting expeditions, and a dream vacation
    to London’s Warner Bros. Studio Tour to walk the real Hogwarts sets, all planned with colorful maps and a pencil‑filled travel journal.
  culinary: Matthew Silvestro is a self‑declared pizza aficionado who can name every topping on a pepperoni pizza, loves the melty stretch of mozzarella on a classic margherita, delights in whipping up
    chocolate chip pancakes with a dash of cinnamon, and experiments with building snack “rock” kebabs using grapes, cheese cubes, and pretzel sticks.
  core: Matthew Silvestro is a curiosity‑driven LEGO architect who balances day‑dream adventures with practical projects, yet often forgets to put finished builds back in the box, leaving a trail of bricks
    across the living room.
background:
  cultural: Matthew is a white American growing up in Bonney Lake, Washington, a suburban community surrounded by forests, lakes, and mountains. His family celebrates typical American holidays such as Thanksgiving,
    Christmas, and the Fourth of July, while also participating in local community events like the seasonal farmer's market and school cultural fairs. The Pacific Northwest environment nurtures his love
    for outdoor activities—hiking, fishing, and exploring nature—while the nearby Seattle tech scene influences his curiosity about computers and coding. His school curriculum incorporates multicultural
    perspectives, giving him exposure to diverse traditions beyond his immediate cultural upbringing.
