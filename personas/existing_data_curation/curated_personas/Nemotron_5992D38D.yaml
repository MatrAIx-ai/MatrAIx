  career_goals: Matthew dreams of exploring the world and helping protect it. He often talks about becoming an astronaut or a wildlife biologist who studies animals in the Pacific Northwest. He also enjoys
    building and programming, so he imagines creating video games or designing innovative tools that keep parks safe. While his aspirations are imaginative, he also values practical ways to help others,
    such as someday becoming a park ranger or a science teacher who inspires younger kids.
