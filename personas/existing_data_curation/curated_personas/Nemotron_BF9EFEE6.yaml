personas:
  professional: A four-year-old preschooler named Santiago Griffith, whose curiosity and methodical nature transform everyday play into a tiny entrepreneurial venture, runs a meticulously organized lemonade
    stand, complete with handwritten price tags, inventory logs, and enthusiastic pitches that draw peers like an audience at a mini-business fair, and they proudly declare each sale with a booming voice.
  sports: A four-year-old Santiago Griffith dashes around weekend soccer clinics with the same energetic gusto they use to chant for the local baseball team, the Bay City Bears, and they proudly wear a
    tiny jersey while also juggling a love for beginner gymnastics classes at the community center.
  arts: Four-year-old Santiago Griffith, a budding artist with a vivid imagination, spends afternoons splashing watercolors on large sheets while humming tunes from The Wiggles and Disney's Frozen soundtrack,
    proudly showing off their latest masterpiece to anyone who stops by, and they delight in dramatic storytelling sessions that turn the living room into a stage.
  travel: Four-year-old Santiago Griffith loves family road trips that blend the excitement of stopping at a giant dinosaur museum in Ohio with the thrill of visiting Disneyland Paris, preferring a carefully
    plotted itinerary that includes snack breaks and playground pit stops, though they sometimes get cranky when the car ride exceeds a certain length.
  culinary: Four-year-old Santiago Griffith enjoys building their own mini-pizza topped with mozzarella, sliced turkey, and a pinch of pineapple, proudly sprinkling oregano with a tiny wooden spoon, and
    they eagerly sip mango smoothies while bragging about their ability to stir batter without spilling.
  core: Santiago Griffith, a four-year-old whirlwind of curiosity, meticulous planning, and endless chatter, mixes a love for tiny entrepreneurial ventures with a habit of worrying over every detail, turning
    everyday moments into expressive performances.
background:
  cultural: Santiago comes from a white, middle‑class family living in Montclair, New Jersey, a suburb known for its vibrant arts community and progressive schools. His upbringing includes exposure to local
    cultural events such as children's theater performances, community art fairs, and multicultural festivals in nearby New York City, which nurture his curiosity for new ideas and unconventional thinking
    while grounding him in a supportive, family‑oriented American cultural setting.
