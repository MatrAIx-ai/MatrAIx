  career_goals: Santiago expresses a vivid imagination about future careers. He dreams of becoming an artist who creates colorful murals, a scientist who explores space, and a teacher who shares stories.
    He often talks about wanting to make people smile and help others learn, reflecting his sociable and compassionate nature.
