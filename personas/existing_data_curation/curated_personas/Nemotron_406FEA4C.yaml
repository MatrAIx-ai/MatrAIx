    and informal counseling", "Basic computer and digital photo editing"]'
  hobbies: '["Abstract watercolor painting", "Creative writing (poetry and short stories)", "Experimental traditional Mexican cooking", "Folklorico and salsa dancing", "Community potluck organization",
    "Gardening (herbs and succulents)", "Crossword and Sudoku puzzles", "Reading magical realism literature", "Volunteer storytelling workshops", "Attending cultural festivals and travel to Mexico"]'
  career_goals: Although officially not in the workforce, Graciela dreams of channeling her lifelong passion for art and culture into formal community leadership. She aims to mentor emerging artists at
    the Glendale Senior Center, eventually establishing a modest community art studio where seniors and youth can collaborate on projects. Publishing a small anthology of her poetry and family stories—highlighting
    Mexican‑American experiences—is a personal literary ambition. She also hopes to complete her high‑school equivalency (GED) to set a positive example for her grandchildren. In the longer term, Graciela
    envisions curating a traveling exhibition of traditional Mexican crafts combined with her own abstract works, and organizing cultural exchange trips to her ancestral hometown in Jalisco, Mexico.
