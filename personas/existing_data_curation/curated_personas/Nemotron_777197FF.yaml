personas:
  professional: Retired mechanic and hobbyist woodworker, Taju Lowe channels their curiosity and competitive streak into mentoring youth at the community center while informally documenting Waco’s historic
    neighborhoods with a pragmatic yet spontaneously organized approach to oral history.
  sports: A devoted fan of the Dallas Cowboys and the Baylor Bears, Taju Lowe competes in the senior center’s weekly pickleball league, walks the Waco Creek trail each morning, and occasionally joins church
    friends for a game of Texas Rangers baseball at the stadium.
  arts: A passionate aficionado of blues, jazz, and gospel, Taju Lowe spins B.B. King’s The Thrill Is Gone, John Coltrane’s A Love Supreme, and Mahalia Jackson’s How I Got Over on a restored vintage radio
    while crafting short folklore‑infused stories inspired by the works of Langston Hughes and reciting them at community open‑mic nights.
  travel: Taju Lowe prefers weekend drives to the Mississippi Delta to soak up Delta blues heritage, spontaneous road trips to Austin’s live‑music scene, and annual pilgrimages to New Orleans’ French Quarter,
    balancing a modest travel budget with a yearning to explore historic sites that echo the narratives they preserve.
  culinary: Taju Lowe delights in cooking garden‑fresh collard greens with smoked turkey, heirloom tomato salsa, and buttery cornbread while humming gospel hymns, though they often forget to label leftovers,
    leading to occasional food‑safety mishaps.
  core: Taju Lowe blends relentless curiosity with hands‑on practicality, channeling competitive chess tactics into mentorship while battling a chronic worry habit that fuels both meticulous projects and
    occasional disorganization.
background:
  cultural: Born and raised in Waco, Texas, Taju grew up in a close‑knit Black community shaped by the legacy of the civil‑rights movement and Southern traditions. His family emphasized the central role
    of the church, with gospel music and weekly fellowship forming the core of social life. He inherited West African storytelling traditions, which he adapted into oral histories passed down at family
    reunions and community events. The cultural fabric of Waco’s Black neighborhoods—marked by soul‑food cookouts, blues clubs, and grassroots activism—instilled in him a sense of resilience and pride.
    Over the decades, he has navigated the challenges of segregation and economic disparity, which inform his critical outlook and commitment to preserving community memory. His cultural identity blends
    African‑American heritage, Southern hospitality, and the diverse influences of Central Texas, including exposure to Mexican and Native Texan customs through regional festivals and neighborhood interactions.
attributes:
