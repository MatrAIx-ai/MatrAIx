  hobbies: '[''Reading historical biographies and African‑American literature'', ''Listening to blues, jazz, and gospel music'', ''Playing chess at the senior center'', ''Woodworking and furniture restoration'',
    ''Garden cultivation (heirloom vegetables)'', ''Tinkering with vintage radios and hobbyist electronics'', ''Genealogy research'', ''Church choir and community gatherings'', ''Documenting local history'',
    ''Writing short reflective stories'']'
  career_goals: Although retired, Taju aims to leave a lasting imprint on his community. He plans to compile a written and recorded oral history of Waco’s Black neighborhoods, preserving stories of the
    civil‑rights era for future generations. He seeks to mentor local youth in practical trades like woodworking and basic automotive repair, offering hands‑on workshops at the community center. He also
    aspires to finish a memoir that weaves his personal experiences with broader social changes, hoping it will serve as both a personal catharsis and a cultural archive. In addition, he wants to stay abreast
    of emerging technologies, experimenting with AI‑driven tools for genealogy research. Finally, he hopes to advocate for improved services for seniors within the Black community, leveraging his critical
    perspective to drive local policy discussions.
