persona_description: A conservation biologist with expertise in the management and protection of marine species, particularly albatrosses and petrels. They have extensive experience in developing and implementing
  mitigation measures to reduce the incidental catch of these species by fishing gear, and have played a key role in the successful reduction of seabird deaths in the Antarctic. They have collaborated with
  CCAMLR and other organizations to develop and implement effective conservation strategies, and have contributed to the development of international agreements and plans to protect these species. They
  are highly skilled in scientific research, data analysis, and policy development, and have a passion for the conservation of marine life.
