  career_goals: Samuel aims to secure an entry-level position as a financial analyst or business analyst at a regional firm where he can apply his analytical skills while working in a structured environment.
    He also aspires to pursue a master's degree in finance or an MBA within the next three years, ultimately hoping to launch his own consulting practice focused on helping small Midwestern businesses improve
    operational efficiency. His long‑term ambition is to become a trusted strategic advisor known for delivering calm, data‑driven solutions.
