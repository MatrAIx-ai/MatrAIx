  career_goals: Kenneth aims to move into a supervisory role on the shop floor, such as shift lead or quality inspection supervisor, where he can leverage his deep institutional knowledge and coaching skills.
    He plans to earn a Certified Weight & Measures Professional (CWMP) credential and a safety‑training certification to formalize his expertise. Over the next five years he hopes to implement small‑scale
    lean improvements that reduce waste and improve record accuracy, while mentoring younger teammates to preserve the workforce pipeline. Long‑term, he envisions a gradual transition toward early retirement
    with a modest side venture—perhaps woodworking or a neighborhood barbecue stall—allowing him to stay socially active and give back to the community.
