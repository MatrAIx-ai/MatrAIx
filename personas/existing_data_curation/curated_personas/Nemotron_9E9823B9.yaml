personas:
  professional: David Coleman, a retired historian and museum docent, channels their meticulous research skills, critical analysis, and competitive drive into crafting a historically rich memoir while mentoring
    younger enthusiasts through workshops, balancing curiosity with pragmatic storytelling.
  sports: David Coleman enjoys low‑impact fitness by walking along the St. Johns River, participates in senior center yoga classes, follows the Jacksonville Jaguars football team avidly, and engages in
    occasional bird‑watching hikes, reflecting a balanced, competitive yet gentle approach to staying active.
  arts: David Coleman, an aficionado of poetry and classic literature, frequently reads Robert Frost and Emily Dickinson, listens to Beethoven symphonies and local jazz pianist Chris Dario, and attends
    community theater productions of Shakespeare, letting the arts shape his reflective leisure time.
  travel: David Coleman favors purposeful trips to historic locales, having toured St. Augustine’s Spanish colonial forts, Savannah’s riverfront squares, and planning a future pilgrimage to Colonial Williamsburg,
    preferring guided tours and modest accommodations that fit his retirement budget.
  culinary: David Coleman, an enthusiastic home gardener, incorporates his own citrus—fresh oranges, lemons, and grapefruits—into simple dishes like orange‑glazed salmon and lemon‑herb chicken, enjoys making
    marmalade for breakfast toast, and prefers dining at local diners with classic Florida seafood fare, reflecting his practical yet flavorful palate.
  core: David Coleman blends scholarly curiosity with a competitive zest, devoting mornings to crossword puzzles, evenings to bridge tournaments, and a lifelong habit of documenting every citrus harvest,
    all while maintaining a skeptical yet steady stride through retirement.
background:
  cultural: He identifies as a White American raised in the Deep South during the post-World War II era. Growing up in Jacksonville, his formative years were shaped by the region's blend of Southern hospitality,
    a strong sense of community, and the social changes of the civil-rights movement. His arts-humanities education instilled a respect for diverse perspectives while his critical, skeptical nature led
    him to question prevailing narratives. This cultural mix informs his values of self-reliance, lifelong learning, and a commitment to preserving local heritage for future generations.
