  career_goals: Although retired, David is driven by a desire to leave a lasting intellectual legacy. He aims to complete a memoir that weaves personal stories with Jacksonville's history, publish a series
    of articles for the local historical society, and digitize his extensive family archives for public access. He also hopes to mentor younger enthusiasts through workshops, secure a small endowment for
    scholarship in local history, and continue his lifelong learning by enrolling in an online course on historic preservation.
