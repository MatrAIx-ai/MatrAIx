personas:
  professional: A dedicated higher‑education facilitator, Korren Gallagher blends abstract visual arts and speculative literature into interdisciplinary curricula, leveraging their strong emotional intelligence,
    improvisational problem‑solving, and digital proficiency while navigating a relaxed approach to administrative deadlines.
  sports: A casual fitness enthusiast, Korren Gallagher participates in a local walking club that meets at the state capitol grounds, follows the Indiana Pacers and Indianapolis Colts, and enjoys light
    hiking in Brown County on weekends as a reflective escape.
  arts: An abstract painter and speculative poet, Korren Gallagher frequently visits the Indianapolis Museum of Art, draws inspiration from artists like Mark Rothko and writers such as Octavia Butler, and
    volunteers to lead creative workshops that merge visual art with futuristic storytelling.
  travel: A reflective traveler, Korren Gallagher prefers short‑term, culturally immersive trips, having explored the historic streets of Savannah, the jazz heritage of New Orleans, and the serene landscapes
    of the Adirondacks, while planning a future pilgrimage to the British Museum to study historic art movements.
  culinary: An adventurous home chef, Korren Gallagher delights in crafting comfort dishes like braised collard greens with smoked turkey, spiced sweet‑potato mash, and experimental fusions that meld Southern
    flavors with Mediterranean herbs, often sharing meals with neighbors after garden harvests.
  core: Korren Gallagher is a creatively restless educator whose love of abstract art and speculative storytelling offsets a laid‑back, occasionally disorganized lifestyle, punctuated by anxiety‑driven
    self‑care rituals and a habit of impulsively buying art supplies.
background:
  cultural: Korren is a Black woman whose family roots trace back to the Great Migration, with grandparents who settled in Indiana from the South in the mid‑20th century. Growing up in a vibrant African
    American community in Indianapolis, she was shaped by the storytelling traditions, church gatherings, and cultural festivals that celebrated Black history and resilience. Relocating to Carmel, a predominantly
    white suburban area, she has navigated the dynamics of maintaining cultural identity while integrating into new social circles. She remains active in the campus African American Student Association,
    mentors Black undergraduates, and incorporates African American literature and art into her teaching. Her heritage informs her artistic practice, community engagement, and commitment to social justice
    through education.
attributes:
  skills: '[''Literary analysis'', ''Interdisciplinary curriculum design'', ''Facilitating small‑group discussions'', ''Student mentorship and tutoring'', ''Academic writing and research assistance'', ''Digital
    media creation (Adobe Creative Suite)'', ''Learning management system (Canvas) administration'', ''Qualitative research methods'', ''Emotional support and counseling basics'', ''Improvisational problem‑solving'']'
  hobbies: '[''Abstract painting'', ''Creative writing (short stories & poetry)'', ''Reading speculative and Afrofuturist fiction'', ''Visiting art galleries and museums'', ''Meditation and yoga for anxiety
    management'', ''Gardening'', ''Cooking soul food and exploring African diaspora cuisines'', ''Volunteering at community literacy programs'', ''Local African American cultural events (e.g., Juneteenth
    celebrations)'', ''Walking/hiking in nature'']'
  career_goals: Korren aims to earn a Ph.D. in Education or Humanities with a focus on arts integration and inclusive pedagogy. She aspires to transition from a teaching assistant to a tenure‑track faculty
    position where she can develop interdisciplinary courses that highlight abstract art and Afrofuturist literature. She also hopes to lead community outreach programs that bring arts‑based learning to
    underrepresented youth in Indiana, publish research on the impact of creative expression on student well‑being, and curate a solo exhibition of her abstract paintings. Additionally, she seeks to become
    an advocate for mental‑health resources within academic settings, building support networks for students coping with anxiety and depression.
