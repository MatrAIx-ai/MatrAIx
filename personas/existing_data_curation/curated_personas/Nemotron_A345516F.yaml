  hobbies: '[''Watching soccer (Salvadoran national team and MLS)'', ''Cooking Salvadoran cuisine (pupusas, tamales, yuca frita)'', ''Fishing at the Patuxent River'', ''DIY woodworking projects'', ''Attending
    church gatherings and community festivals'', ''Listening to Cumbia, salsa, and classic rock music'', ''Reading local news'', ''Playing card games with friends'']'
  career_goals: Approaching his mid‑fifties, Tomas aims to transition from purely physical labor to a supervisory or coordination role that offers more stability and less strain. He plans to obtain a Certified
    Warehouse Manager credential and a commercial driver’s license (CDL) to broaden his job prospects. Tomas is also exploring a side venture—starting a small, community‑focused moving and delivery service
    that leverages his network within the Salvadoran diaspora in Prince George’s County. By expanding his skill set and building a reliable supplemental income, he hopes to secure financial peace of mind
    for retirement and reduce the stress and worry that have accompanied his current job’s physical demands and job‑security concerns.
