personas:
  professional: Mukti Doshi, a full‑stack software developer proficient in Java, Python, JavaScript, React, and Node.js, leverages their methodical yet adaptable mindset to design cloud‑native platforms,
    and they mentor junior engineers while infusing user‑centered design into scalable products as they chart a path toward lead engineering and AI‑driven educational equity.
  sports: Mukti Doshi, an avid hiker of the Santa Cruz Mountains and regular participant in sunrise yoga sessions, follows the San Francisco Giants, Golden State Warriors, and San Jose Sharks, and is a
    member of a local climbing gym's weekend group that tackles indoor bouldering challenges.
  arts: Mukti Doshi, an enthusiastic sitar player who studies pieces by Ravi Shankar and Anoushka Shankar, frequently attends Bay Area indie music gigs featuring artists like Tame Impala and Haim, and devours
    sci‑fi novels ranging from Liu Cixin's *The Three‑Body Problem* to Neal Stephenson's *Seveneves*.
  travel: Mukti Doshi, a meticulous planner who mixes weekend nature escapes to Yosemite and wine‑country tours with occasional international trips such as a spring visit to Kyoto for cherry blossoms and
    a planned summer adventure to Queenstown to explore adventure sports, always budgeting travel costs through a dedicated travel fund.
  culinary: Mukti Doshi, a moderately skilled home chef who loves crafting spice‑rich thalis featuring dishes like dhokla, khandvi, and carrot halwa, experiments with asafoetida, tamari, and fresh curry
    leaves, and delights in sharing these meals at community potlucks while occasionally over‑seasoning in the pursuit of flavor perfection.
  core: Mukti Doshi blends analytical engineering prowess with a love for sitar, hikes, and thali cooking, navigates life with balanced curiosity and practicality, and they habitually sync work ambition
    with community mentorship, all while occasionally binge‑watching sci‑fi series late into the night.
background:
  cultural: Mukti is a first‑generation Indian American of Gujarati descent. Her family maintains traditional customs such as celebrating Navratri, Diwali, and Uttarayan, while also embracing American cultural
    practices. She grew up bilingual, speaking Gujarati at home and English at school, which gives her a nuanced understanding of cross‑cultural communication. The Doshi family values education, community
    service, and hospitality, influencing Mukti’s collaborative work style and her dedication to mentoring the next generation of South Asian women in tech.
