  career_goals: Mukti aims to transition into a lead engineering role within the next three years, steering the architecture of cloud‑native platforms that serve millions of users. She plans to deepen her
    expertise in machine learning and AI to embed intelligent features into her products. In the long term, she envisions founding a technology startup that leverages AI for educational equity, especially
    for under‑represented communities. Alongside her technical growth, Mukti is committed to championing diversity and inclusion, mentoring other women of South Asian descent, and contributing to open‑source
    projects that promote accessible software development.
