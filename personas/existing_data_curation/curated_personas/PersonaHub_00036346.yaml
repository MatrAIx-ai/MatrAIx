persona_description: A conservation biologist who specializes in the study of large carnivore populations and their interactions with human communities. This individual has experience working with nongovernmental
  organizations and has a proven track record of building successful community-based conservation programs. They are adept at using an integrative, multi-method approach to address conflicts between large
  carnivores and human communities, and are highly skilled in data collection and project management. They are particularly interested in reducing conflict with wolves in communities that are adjusting
  to an increasing large carnivore presence over a short period.
