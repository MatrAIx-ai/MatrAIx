personas:
  professional: Maria Marrero, they channel their boundless curiosity into reading adventure books about explorers and ocean life, drawing detailed sketches of shells and fish, and solving puzzles, laying
    early groundwork for a future marine biologist who balances practicality with a love for new ideas despite occasional disorganization.
  sports: Maria Marrero, they are a dedicated member of the Coastal Cubs U10 soccer squad, spending weekends training on the sand‑covered field, idolizing Los Angeles FC forwards for their speed, and approaching
    each match with a competitive edge, often challenging their three close friends to improve drills rather than playing on larger teams.
  arts: Maria Marrero, they spend afternoons sketching shells with meticulous detail while humming to salsa legends like Celia Cruz and vibrant bomba rhythms from Bomba Sonora, drawing creative inspiration
    from the colorful murals of José Campeche, and occasionally trying out simple dance steps to the beats, blending visual and musical expression.
  travel: Maria Marrero, they love beach‑combing along nearby Coral Bay, dreaming of snorkeling the Great Barrier Reef and wandering the historic streets of Old San Juan, preferring short family road trips
    that let them collect shells and map tide pools, while avoiding crowded theme parks in favor of quiet coastal getaways.
  culinary: Maria Marrero, they act as a budding kitchen helper, rolling dough for empanadillas stuffed with seasoned ground beef, olives and raisins alongside their mother, and experimenting with simple
    fish tacos using fresh shrimp, lime juice, cilantro and a pinch of paprika, though they often forget to wash their hands after handling shells, leading to occasional kitchen messes.
  core: Maria Marrero, they are a curious yet disorganized 9‑year‑old explorer who mixes a love for ocean adventures, competitive soccer, and detailed sketching, while juggling a skeptical, solitary nature
    and a habit of forgetting chores.
background:
  cultural: Maria is a Puerto Rican child raised in the coastal town of Quebradillas, where the sea shapes daily life. Her family primarily speaks Spanish, with English introduced at school, fostering bilingual
    communication. The community's strong Catholic traditions, vibrant music (bomba, plena, salsa), and festive celebrations like the Fiesta de la Virgen del Carmen influence her upbringing. She enjoys
    traditional foods such as arroz con gandules and empanadillas, and participates in family gatherings that emphasize respect for elders and pride in island heritage. The nearby beaches and local fishing
    culture give her a deep connection to marine environments, while the close‑knit family network supports her curiosity and practical learning.
