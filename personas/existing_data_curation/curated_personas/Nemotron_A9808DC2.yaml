  career_goals: Maria dreams of becoming a marine biologist one day, driven by her curiosity about the sea creatures and tide‑pools she explores along Quebradillas' coast. She also envisions herself as
    a future teacher who can share Puerto Rican culture and science with younger kids in her community. Alongside these aspirations, she hopes to excel in youth soccer, aiming to lead her team to local
    championships and showcase her competitive spirit.
