personas:
  professional: Shirley Oneal, a 45‑year‑old aspiring community health worker, leverages her event‑planning savvy, meticulous budgeting, and natural knack for connecting with people to coordinate neighborhood
    health fairs and mediate client concerns while confidently steering community discussions.
  sports: Shirley Oneal avidly follows the St. Louis Cardinals and the Chicago Bears, participates in a Sunday morning walking club at Kay Kay Park, plays softball in her church’s summer league, and occasionally
    joins a community yoga class during the winter months to stay flexible.
  arts: Shirley Oneal sings in her church choir, revels in the sounds of gospel artist Kirk Franklin and jazz legend Wynton Marsalis at local concerts, discusses Toni Morrison’s novels in her book club,
    and finds creative release quilting vibrant patterns inspired by family stories.
  travel: Shirley Oneal favors short, budget‑friendly road trips, such as weekend getaways to Nashville for live music, a culinary pilgrimage to New Orleans to explore Creole flavors, and hikes in Shawnee
    National Forest, while dreaming of a future family retreat in Asheville’s mountain cabins.
  culinary: Shirley Oneal blends Southern comfort with health consciousness, expertly preparing collard greens seasoned with smoked turkey, shrimp‑and‑okra gumbo, jalapeño‑infused cornbread, and sweet‑potato
    quinoa salads, all while incorporating fresh tomatoes, basil, and zucchini from her backyard garden.
  core: Shirley Oneal is a community‑centered catalyst who mixes Southern hospitality with pragmatic resilience, constantly juggling caregiving, budgeting stress, and creative expression while staying fiercely
    sociable.
background:
  cultural: Shirley identifies as African‑American and grew up in Belleville, a city with a tight‑knit Black community shaped by the Great Migration and Midwestern industrial roots. Family traditions centered
    around church, gospel music, and Southern cooking have been passed down through generations, while local festivals celebrate both African‑American heritage and the broader cultural mosaic of St. Clair
    County. Her upbringing reflects a blend of historical resilience and contemporary Midwestern sensibilities, influencing her values of community solidarity, self‑reliance, and cultural pride.
attributes:
  skills: '["Interpersonal communication", "Community event planning", "Logistical coordination", "Caregiving and health navigation", "Household budgeting", "Culinary arts (Southern and Midwestern cuisine)",
    "Conflict mediation", "Peer support", "Public speaking", "Basic computer literacy (email, social media)", "Gardening basics"]'
  hobbies: '["Choir singing", "Hosting potluck gatherings", "Book club (personal development & African-American literature)", "Backyard gardening", "Experimental cooking", "Attending jazz and gospel concerts",
    "Watching talk-show podcasts", "Quilting", "Volunteering at food pantry", "Community cleanup projects"]'
  career_goals: Shirley aims to leverage her community‑focused strengths into a part‑time role as a community health worker or peer‑support specialist, potentially after completing a certification program
    at the local community college. In the longer term, she hopes to launch a small home‑based catering service that offers healthy comfort food, allowing her to combine culinary talent with entrepreneurial
    independence. She also wants to develop robust coping strategies for stress, attend resilience‑building workshops, and eventually become a mentor for other women navigating separation and workforce
    re‑entry.
