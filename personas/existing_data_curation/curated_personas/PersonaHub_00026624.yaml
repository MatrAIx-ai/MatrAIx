persona_description: A scientist and researcher in agricultural engineering and knowledge systems who has explored the processes of innovation and adoption of technologies, how these innovations shaped
  current U.S. production systems, and what will be needed for future agricultural technologies. They have identified challenges for farmers and researchers to develop technologies through multidisciplinary
  problem solving approaches that balance the needs of producers with the expectations of society and create economically and environmentally sustainable production systems. They have also explored the
  spatial variability of cotton fiber quality and the importance of cotton fiber quality for advancements in spinning technology.
