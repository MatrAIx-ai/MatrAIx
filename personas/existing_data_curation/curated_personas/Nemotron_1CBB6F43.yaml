personas:
  professional: Sarah Brown, an 18‑year‑old building cleaner known for meticulous floor care and safety adherence, combines their curiosity for art with an outgoing personality to work part‑time at a community
    museum while studying visual arts at a local college, and they already sketch plans for a boutique cleaning service that would specialize in galleries, despite occasionally missing deadlines due to
    their spontaneous nature.
  sports: Sarah Brown is an enthusiastic ultimate frisbee player in a co‑ed Bay Area league, rides their bike along the Bay Trail almost daily, and roots for the San Francisco Giants and Golden State Warriors
    while occasionally joining community volleyball pick‑ups at the local park.
  arts: Sarah Brown wanders through the de Young Museum and the Contemporary Jewish Museum, sketches Mission District murals inspired by artists like Shepard Fairey and Banksy, captures candid street scenes
    with their camera at live shows in The Independent and Bottom of the Hill, and credits the glitch art of Refik Anadol for igniting their creative curiosity.
  travel: Sarah Brown loves spontaneous weekend escapes to Muir Woods, the dramatic cliffs of Big Sur, and tasting wines in Napa Valley, while dreaming of a future backpacking art tour across Berlin and
    Barcelona, though their student budget keeps most journeys within California and limited low‑cost flights.
  culinary: Sarah Brown is a self‑taught coffee enthusiast experimenting with pour‑over and Aeropress techniques using beans from Stumptown, and they often cook avocado toast with feta, spicy ramen, and
    California‑style fish tacos topped with pickled radish for friends after a day of sketching and biking.
  core: Sarah Brown is a curious, outgoing 18‑year‑old who deftly balances meticulous custodial work with a vibrant passion for street art, spontaneous bike rides, and a budding plan to launch a boutique
    cleaning service for galleries, even though they occasionally struggle with disorganization and habitually overlook appointments.
background:
  cultural: Sarah grew up in the suburban enclave of San Bruno, a diverse community on the San Mateo County edge of the Bay Area. Her family, rooted in a middle‑class white American background with Midwestern
    ancestry, embraced traditional holidays like Thanksgiving and Christmas while also being open to the multicultural festivals and progressive values of the Peninsula. The region’s emphasis on environmental
    stewardship, artistic expression, and social inclusion shaped her worldview, encouraging a blend of practical work ethic with a curiosity for the arts and community engagement.
attributes:
  skills: '[''Floor care and sanitation'', ''Safe handling of cleaning chemicals'', ''Waste segregation and recycling'', ''Basic facility maintenance'', ''Safety compliance (OSHA)'', ''Inventory management'',
    ''Team collaboration'', ''Customer service and communication'', ''Problem‑solving under time pressure'', ''Introductory photography'', ''Sketching and visual observation'']'
  hobbies: '[''Visiting art galleries and museums'', ''Sketching and drawing'', ''Photography'', ''Biking the Bay Trail'', ''Playing ultimate frisbee'', ''Attending live music and open‑mic events'', ''Participating
    in trivia nights'', ''Volunteering for community mural projects'', ''Reading contemporary fiction'', ''Experimenting with coffee brewing'']'
  career_goals: Sarah aims to leverage her hands‑on experience and love of the arts by transitioning into a facilities or custodial role within a museum, gallery, or cultural center, where she can support
    artistic environments while continuing to learn about art preservation. She plans to complete an associate degree in visual arts or museum studies at a local community college, and eventually pursue
    a certification in facilities management. In the longer term, Sarah dreams of establishing her own boutique cleaning service that specializes in art studios and galleries, combining her operational
    expertise with her passion for creative spaces.
