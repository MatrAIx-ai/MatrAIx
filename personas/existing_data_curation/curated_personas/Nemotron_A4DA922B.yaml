  hobbies: '[''Visiting Art Galleries'', ''Sketching and Photography'', ''Community Basketball'', ''Improvisational Comedy'', ''Playing Keyboard'', ''Cooking Soul Food'', ''Reading Speculative Fiction'',
    ''Youth Mentorship Volunteering'', ''Mindfulness Meditation'']'
  career_goals: Kevin aims to advance to a store manager role within the next two to three years and subsequently move into district or corporate retail management. Parallel to his retail trajectory, he
    plans to complete a bachelor's degree in marketing or arts administration, allowing him to transition into brand management or visual merchandising for a major retailer or cultural institution. He also
    dreams of launching a side business—a curated online boutique featuring African‑inspired fashion and artwork—balancing entrepreneurial ambition with career stability while developing leadership and
    stress‑management skills to offset his sensitivity to pressure.
