personas:
  professional: Kevin Peck is a retail associate turned visual merchandising enthusiast who leverages strong customer‑facing abilities, data‑driven sales analysis, and an eye for aesthetic storytelling
    to create in‑store experiences that feel like gallery installations, while their natural curiosity and occasional stress‑induced over‑planning keep them both innovative and meticulously organized.
  sports: Kevin Peck competes in a Chicago community basketball league every summer, follows the Chicago Bulls and the Chicago White Sox for professional inspiration, and treats each workout as a social
    event, preferring evening pick‑up games at local parks over solitary gym sessions, though they sometimes skip cardio when a weekend art opening runs late.
  arts: Kevin Peck is an avid gallery‑hopper who sketches street murals inspired by Banksy, curates Instagram reels featuring Kendrick Lamar’s lyrical flow, improvises jazz riffs on a portable keyboard
    after listening to Kamasi Washington, and regularly attends live performances by local spoken‑word poets, letting these experiences fuel both personal creativity and retail visual concepts.
  travel: Kevin Peck enjoys weekend road trips to Midwestern art festivals in Detroit and Milwaukee, dreams of exploring the vibrant markets of Marrakech and the contemporary galleries of Lisbon, and tends
    to book budget‑friendly Airbnb stays while meticulously planning itineraries that balance cultural immersion with opportunities to capture street art on their phone.
  culinary: Kevin Peck passionately cooks soul‑food staples like collard greens, smoked cornbread, and maple‑glazed sweet potato pie, experimenting with spices such as smoked paprika and cumin, and often
    hosts informal pop‑up tastings for friends after basketball games, though they occasionally over‑season dishes when excitement spikes.
  core: Kevin Peck blends a restless curiosity for art with a sociable streak, turning retail aisles into mini‑exhibits while battling anxiety through mindfulness, and can be found juggling a sketchbook,
    a basketball, and a fresh batch of soul‑food on any given weekend.
background:
  cultural: Kevin was raised in a close‑knit African‑American family in rural Sussex County, where church gatherings, family storytelling, and community festivals were central to daily life. The legacy
    of the Great Migration and the vibrant cultural tapestry of Delaware's Black communities fostered his love for soul music, gospel, and African diaspora cuisine. He identifies both with the local traditions
    of the Mid‑Atlantic region and broader Black cultural movements, which inform his appreciation for expressive art, communal activism, and the importance of representation. His upbringing emphasized
    education, resilience, and giving back, inspiring him to pursue professional growth while staying actively engaged in community initiatives.
attributes:
  skills: '[''Customer Service'', ''Sales Communication'', ''Conflict Resolution'', ''POS System Operation'', ''Inventory Management'', ''Visual Merchandising'', ''Basic Data Analysis'', ''Social Media
