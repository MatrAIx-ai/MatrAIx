persona_description: An amateur herpetologist who has spent years exploring the creeks and woods of Tennessee, Kentucky, Georgia, and Alabama, and has encountered a variety of snake species, including the
  Northern Water Snake, Gray Rat Snake, Common Garter Snake, and Timber Rattlesnake. The individual is particularly interested in poisonous snakes and has encountered few positive ID's of them, but is cautious
  and does not approach wild snakes unless certain they are not poisonous. The persona has a fascination with reptiles and their behavior, and is knowledgeable about the identification of snakes, especially
  poisonous ones.
