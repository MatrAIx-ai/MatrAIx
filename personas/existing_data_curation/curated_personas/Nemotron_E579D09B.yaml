  career_goals: Michael aims to become a certified master auto body technician within the next five years, pursuing ASE and I‑CAR certifications while also studying advanced automotive painting techniques.
    He envisions opening a boutique body shop in Falls County that offers both conventional collision repair and bespoke custom paint work, combining his technical skill with his artistic sensibility. In
    the longer term, he hopes to mentor younger technicians, develop a small training program, and eventually expand his shop into a regional service center that emphasizes quality, precision, and creative
    customization. His competitive drive pushes him to earn recognition at state-level body shop competitions, and his desire for family stability motivates him to achieve financial independence and home
    ownership.
