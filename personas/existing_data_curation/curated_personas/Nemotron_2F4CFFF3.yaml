personas:
  professional: Jiwon Park, a seasoned computer systems analyst, blends graduate-level business strategy with hands‑on technical skill in SQL, Python, and cloud platforms (AWS, GCP) to craft pragmatic data
    models and agile roadmaps, while their gentle, collaborative style keeps interdisciplinary, cross‑cultural teams aligned despite a relaxed, sometimes unstructured approach to deadlines.
  sports: Jiwon Park, an avid hiker, regularly trails coastal cliffs and foothill paths with the Puget Sound Hiking Club, practices yoga twice a week at a downtown studio, follows the Seattle Seahawks (NFL)
    and Seattle Sounders FC (MLS) for game‑day motivation, and joins the local amateur trail‑running group for seasonal races.
  arts: Jiwon Park, an enthusiastic photographer, frames urban skylines and mist‑laden forests inspired by Andreas Gursky’s large‑scale detail and Christopher Nolan’s cinematic composition, while their
    playlists feature Bon Iver, the ambient soundscapes of Tycho, and they often lose themselves in sci‑fi novels by Liu Cixin during quiet evenings.
  travel: Jiwon Park, a purposeful traveler, has hiked the Cliffs of Moher in Ireland and watched sunrise at Haleakalā in Hawaii, prefers spontaneous weekend escapes to nature‑rich locales, and dreams of
    sailing through Norway’s fjords and exploring the terraced rice paddies of Bali when their limited vacation windows allow.
  culinary: Jiwon Park, a curious home chef, reimagines traditional Korean flavors by creating kimchi‑infused carbonara, miso‑glazed pork belly, and bibimbap‑styled quinoa bowls, always reaching for gochujang,
    fermented soybean paste, shiitake mushrooms, and Korean pear to balance umami and sweetness in their experimental dishes.
  core: Jiwon Park balances analytical rigor with creative curiosity, weaving tech strategy, nature hikes, and experimental cooking into a life guided by flexible planning and a warm, collaborative spirit.
background:
  cultural: Born in South Korea and raised in the United States, Jiwon maintains strong ties to her Korean heritage while fully engaging with the multicultural environment of the Bay Area. She values education,
    family cohesion, and collective harmony—principles rooted in Confucian tradition. These cultural influences shape her respectful communication style, preference for consensus, and dedication to community
    service. Jiwon celebrates Korean holidays such as Chuseok and Lunar New Year with family gatherings, enjoys K‑pop and Korean cinema, and participates in local Korean cultural events, all while blending
    these experiences with the diverse perspectives of her Californian surroundings.
