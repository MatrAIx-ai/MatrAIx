  career_goals: Jiwon aims to advance into a senior systems analyst or technology strategy lead role where she can influence roadmap decisions and integrate emerging technologies like AI and machine‑learning
    into enterprise solutions. She plans to earn professional certifications such as CBAP and PMP to formalize her expertise. Mentoring junior analysts and fostering collaborative team cultures are high
    priorities, reflecting her harmonious and considerate nature. While ambitious, she seeks a flexible, hybrid work environment that supports her family life and allows her to continue exploring diverse
    ideas without being confined to rigid structures.
