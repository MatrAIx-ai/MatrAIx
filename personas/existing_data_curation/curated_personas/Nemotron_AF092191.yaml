  hobbies: '[''Drama club'', ''Community theater'', ''Volunteer at local food bank'', ''Reading contemporary fiction'', ''Creative writing'', ''Playing acoustic guitar'', ''Organizing game nights'', ''DIY
    crafts'', ''Social media blogging'', ''Cooking and baking'']'
  career_goals: Laura aims to complete her GED within the next year and then pursue an associate degree in communications or hospitality management at a community college. She envisions a career that blends
    her love for people and organization, such as community event planning, youth program coordination, or public relations for a nonprofit. In the long term, she hopes to launch a local youth outreach
    initiative that offers mentorship, after‑school activities, and career‑readiness workshops for peers in Youngstown. She also dreams of building a personal blog that highlights stories of resilience
    and community spirit in the Mahoning County area.
