personas:
  professional: Laura Borges, a high‑school senior blending drama club stage‑management experience with student‑council leadership, they leverage clear communication, meticulous checklist organization,
    and an outgoing sociable style to orchestrate school fundraisers, community theater productions, and local volunteer events, laying the groundwork for a future career in nonprofit public relations or
    event planning.
  sports: Laura Borges, a fan of the Cleveland Browns and Youngstown State Penguins, they compete in her school’s intramural volleyball league each fall, jog the Mahoning River trail for cardio in the spring,
    and join community pick‑up basketball games during winter, treating each sport as a social rehearsal for teamwork and community connection.
  arts: Laura Borges immerses themselves in the arts by starring in her school’s production of ‘Grease,’ designing set pieces for local community theater, curating a personal blog featuring short stories
    inspired by Sarah J. Maas, and crafting playlists that blend Billie Eilish, Lin‑Manuel Miranda, and the regional folk group The Mahoning County Ramblers.
  travel: Laura Borges plans weekend road trips using shared Google spreadsheets, they enjoy day trips to Pittsburgh’s Strip District and Cuyahoga Valley National Park, dream of backpacking through New
    England’s autumn foliage, and hope to join a service‑oriented travel program to Guatemala once they secure a scholarship, balancing wanderlust with modest teen finances.
  culinary: Laura Borges, a confident home‑cook, they frequently craft homemade pizza topped with fresh mozzarella, basil, and pepperoni, whip up an Ohio apple‑cinnamon crumble for game‑night friends, perfect
    budget‑friendly mac & cheese and chicken tacos, and occasionally over‑salt dishes when trying new recipes, reflecting their experimental culinary spirit.
  core: Laura Borges, the 17‑year‑old event‑obsessed organizer who lives by color‑coded checklists, they channel a talkative energy into community projects, hoard glitter pens for future crafts, and habitually
    forget to reply to group texts until the next day.
background:
  cultural: Laura comes from a white, Portuguese‑heritage family that settled in Youngstown generations ago. Raised in a Catholic household, she grew up with traditions such as family meals featuring dishes
    like bacalhau, blended with classic Midwestern comfort foods. The city's industrial past and close‑knit neighborhoods have shaped her strong sense of community, responsibility, and resilience. She values
    the hardworking ethos of the Mahoning County region while also embracing the multicultural influences present in the city, which inform her inclusive outlook and desire to give back.
