  career_goals: Kishore aims to transition from his current hiatus into a stable, full‑time role in the technology sector where his data‑analysis and software‑engineering expertise can be applied within
    a predictable, structured environment. He is targeting junior data analyst or software engineer positions at mid‑size firms or research‑oriented labs that offer clear responsibilities and incremental
    skill growth. Over the next three to five years, he plans to earn industry certifications such as AWS Certified Cloud Practitioner and TensorFlow Developer, possibly pursue a master’s degree in data
    science, and eventually advance to a senior analytical or technical lead role that balances technical depth with collaborative, low‑stress team dynamics. Achieving financial stability and the ability
    to support his family are central motivations.
