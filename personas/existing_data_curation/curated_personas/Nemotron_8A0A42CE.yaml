  hobbies: '[''Sketching & Watercolor Painting'', ''Visiting Art Galleries'', ''Photography (Nature & Sunset)'', ''Kayaking on the Suwannee River'', ''Spontaneous Road Trips to State Parks'', ''Improv Comedy
    Workshops'', ''Strategic Board Games (Catan, Chess) and Trivia Nights'', ''Reading Contemporary Fiction'', ''Journaling'', ''Listening to Podcasts on Science and Culture'']'
  career_goals: In the next few years Ashtin aims to move from a frontline representative to a supervisory role, leading a small team of agents and shaping service standards. She is interested in obtaining
    a certification in Customer Experience Management and deepening her expertise in user‑experience research so she can bridge customer service with product design. Long‑term, she envisions a position
    such as Customer Experience Manager or CX Strategist where she can leverage her creative problem‑solving mindset to design innovative service workflows, mentor junior staff, and influence company‑wide
    customer‑centric strategies. She also plans to pursue part‑time coursework in digital marketing and UX design to broaden her career options.
