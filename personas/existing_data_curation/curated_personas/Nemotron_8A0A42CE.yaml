personas:
  professional: Ashtin Silvio leverages their call‑center expertise and innate curiosity to transform customer complaints into creative service solutions, excelling at active listening, CRM navigation,
    and spontaneous problem‑solving while still wrestling with rigid deadline structures as they eye a supervisory role.
  sports: Ashtin Silvio channels their spontaneous energy into weekend kayaking with the Suwannee Paddlers Club, casual beach volleyball at a Jacksonville community league, and fervently cheering on the
    Jacksonville Jaguars in the fall and the Florida Gators during college football season.
  arts: Ashtin Silvio immerses themselves in the Lake City art scene by sketching river landscapes inspired by Monet, attending gallery openings featuring local Floridian painter James M., humming along
    to indie songwriter Mitski, and honing quick wit in improv workshops that echo the style of The Second City.
  travel: Ashtin Silvio prefers spur‑of‑the‑moment road trips to Florida’s state parks like Ichetucknee Springs, balancing their love of sunrise kayaking with a wish to explore the ancient ruins of Machu
    Picchu on a future backpacking adventure, all while meticulously using a travel rewards credit card to stretch their modest budget.
  culinary: Ashtin Silvio’s palate gravitates toward fresh Gulf shrimp tacos with cilantro‑lime slaw, homemade lemon‑garlic pasta, and occasional experimental beet‑infused risotto, a skill level that oscillates
    between confident sauté‑master and occasional over‑salting misstep, and they love pairing each meal with a crisp Riesling or a locally brewed IPA.
  core: Ashtin Silvio is a creatively restless 32‑year‑old who blends artful curiosity with a love for spontaneous problem‑solving, yet habitually battles deadline dread and occasional insomnia, and they
    often compensate with late‑night sketching sessions fueled by caffeine.
background:
  cultural: Ashtin was raised in a middle‑class white family in Lake City, Florida, a small town with strong Southern hospitality and community ties. Her upbringing combined traditional values—such as church
    gatherings, high school football culture, and close‑knit neighborhood events—with an early encouragement to question norms and explore creative pursuits. Local schools offered community theater and
    art programs, which nurtured her appreciation for the visual arts. The natural surroundings of the Suwannee River and nearby forests fostered a love for outdoor activities, while periodic trips to larger
    cities exposed her to diverse cultural experiences. This blend of Southern rootedness and curiosity for unconventional ideas shapes her worldview and personal identity.
attributes:
  skills: '[''Active Listening'', ''Customer Service'', ''Conflict Resolution'', ''Empathetic Problem Solving'', ''CRM Software (Zendesk, Salesforce)'', ''Data Entry and Documentation'', ''Multitasking'',
