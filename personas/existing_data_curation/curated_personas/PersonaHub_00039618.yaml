persona_description: A Ph.D. student in Education who is conducting research on the peer influence on Taiwanese adolescents' romantic relationships. She is interested in understanding how young people are
  influenced by their peers regarding their romantic relationships and how these influences are shaped by developmental theories. Her research aims to promote appropriate education on sexual and romantic
  relationships, particularly in light of the increasing rate of teen pregnancy and young people's mental and health issues. She is using both qualitative and quantitative research methods to collect data
  and analyze the themes generated from the qualitative results. Her goal is to explain the influences that Taiwanese young people have from their peers and how these influences impact their romantic relationships.
