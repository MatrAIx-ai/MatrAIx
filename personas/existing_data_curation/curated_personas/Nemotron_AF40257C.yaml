  career_goals: Angelina aspires to transition into a senior regional director role for environmental health and safety, where she can champion innovative, art‑infused safety programs that resonate across
    diverse workforces. She plans to launch a boutique consulting practice focused on culturally responsive safety design for manufacturing firms in the Southeast. Additionally, she intends to mentor Black
    women engineers through local STEM outreach and to author a book that explores the intersection of creativity and industrial safety, positioning herself as a thought leader in inclusive engineering
    practices.
