personas:
  professional: Angelina Sims, a seasoned industrial engineer specializing in lean manufacturing, Six Sigma, and occupational health and safety, weaves abstract artistic concepts into data‑driven safety
    training, balancing a relaxed approach to deadlines with assertive advocacy for culturally inclusive workplaces.
  sports: Angelina Sims enjoys morning hikes on the Augusta Canal Trail with the local Trailblazers Hiking Club, follows the Atlanta Falcons in the NFL and the Atlanta Hawks in the NBA, and practices yoga
    twice weekly to counterbalance a laid‑back approach to formal exercise routines.
  arts: Angelina Sims expresses creativity through abstract painting inspired by the bold colors of Romare Bearden and the improvisational spirit of Miles Davis, regularly attends jazz and blues gigs at
    the Morris Center and participates in community improv theater workshops.
  travel: Angelina Sims favors spontaneous road trips that blend cultural immersion and relaxation, having explored the historic streets of Savannah, the vibrant cuisine of New Orleans, and the artistic
    enclaves of Asheville, while their flexible planning sometimes results in last‑minute accommodation scrambles.
  culinary: Angelina Sims experiments in the kitchen by fusing Southern staples like fried catfish and sweet potato pie with West African flavors such as berbere‑spiced collard greens and injera‑bread‑based
    gumbo, confidently wielding ingredients like smoked paprika, okra, and coconut milk.
  core: Angelina Sims is an imaginative engineer who blends art with safety, navigates life with a relaxed yet assertive style, occasionally misplaces keys and invoices, but always returns to the canvas
    or garden for renewal.
background:
  cultural: Angelina grew up in Augusta's historic African American neighborhoods, where Southern hospitality merged with a strong sense of community resilience. Her family emphasized education and self‑advocacy,
    shaping her commitment to both professional excellence and empowerment of underrepresented groups. She carries forward the rich traditions of African American art, gospel music, and soul food, which
    inform her creative pursuits and her inclusive approach to workplace safety. Engaged in local cultural festivals like Juneteenth celebrations, she often integrates cultural awareness into her safety
    training, ensuring that solutions respect the diverse backgrounds of workers.
