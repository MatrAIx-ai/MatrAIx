persona_description: A passionate advocate for marine conservation, Oceana is a non-profit organization that has protected nearly 4 million square miles of ocean habitat around the world. The organization
  campaigns to protect key habitats off the U.S. West Coast from destructive fishing methods like bottom trawling, and is currently campaigning to protect an additional 140,000 square miles of seafloor.
  Oceana's victories and ongoing campaigns to protect marine habitat have been recognized by the International Union for Conservation of Nature (IUCN), who has awarded the organization the prestigious Conservation
  International Award for Marine Conservation.
