personas:
  professional: Delma Riveraperez is a budding community play leader who channels their love for group activities into orchestrating impromptu soccer matches and guided craft circles for neighborhood friends,
    using practical tidbits and an easygoing attitude to keep games flowing while kindly smoothing over any disputes that arise.
  sports: Delma Riveraperez thrills to kick the ball at the neighborhood park after school, proudly dons the jersey of the local youth side River City Kids FC, cheers enthusiastically for the city’s professional
    team the Rapids during televised games, and uses their boundless energy to practice dribbling drills on weekends while occasionally losing track of time and missing dinner.
  arts: Delma Riveraperez delights in dancing to cumbia rhythms at family gatherings, mimicking steps from the children’s performer group Little Rhythm Stars, loves splashing Crayola colors onto paper while
    crafting friendship bracelets, and regularly flips through picture books by Mo Willems—especially savoring the playful chaos of 'Don’t Let the Pigeon Drive the Bus!' they often share their favorite
    stories with friends.
  travel: Delma Riveraperez loves weekend adventures, attending neighborhood cultural festivals, strolling familiar trails through Maple Grove Park, has taken a family road trip to Sunnyshore Beach to build
    sandcastles, and dreams of one day trekking the Grand Canyon’s rim to glimpse its towering vistas they eagerly map out on a homemade travel chart.
  culinary: Delma Riveraperez enjoys helping their mother roll tiny tortillas for taco night, sprinkling cheese, diced tomatoes, and mild salsa over them, mashing ripe avocado with lime juice to make guacamole,
    and proudly tasting the fresh cilantro flavor, while occasionally sneaking a bite of sweet strawberries as an after‑school snack they adore.
  core: Delma Riveraperez is a lively, routine‑loving seven‑year‑old who thrives on group play, balances organized creativity with occasional scatter‑brained moments, and carries a tender heart that worries
    about others while humming to cumbia melodies they love.
background:
  cultural: Delma comes from a Mexican family that lives in Culver City, California. Her home life blends Mexican traditions with the diverse culture of Los Angeles County. Spanish is spoken daily alongside
    English, and family meals often feature tacos, tamales, and guacamole, prepared together with her grandparents who share stories and folk songs. She celebrates Día de los Muertos, Mexican Independence
    Day, and participates in local community events that highlight Mexican music, dance, and art. She attends a bilingual elementary school that integrates both Mexican and American curricula, reinforcing
    her bicultural identity and reinforcing values of family, respect, and community harmony.
attributes:
  skills: '[''Reading simple books'', ''Basic arithmetic'', ''Bilingual (English and Spanish)'', ''Drawing and coloring'', ''Craft-making'', ''Following classroom routines'', ''Simple cooking assistance'',
    ''Singing traditional songs'', ''Basic folkloric dance steps'', ''Peer conflict mediation'']'
  hobbies: '[''Soccer'', ''Dancing to cumbia and folkloric music'', ''Guided arts and crafts'', ''Reading picture books'', ''Helping in the kitchen'', ''Attending cultural festivals'', ''Making friendship
    bracelets'', ''Sticker collecting'', ''Nature walks'', ''Group games'']'
  career_goals: Delma dreams of one day becoming a teacher because she loves the idea of guiding children through familiar routines and helping them learn to read and count. She also imagines working as
    a pediatric nurse, providing care to kids who feel worried or stressed, and hopes to keep the comforting atmosphere she values at home. In the future she would like to learn family cooking techniques
    and perhaps open a small kitchen where she can share traditional Mexican meals with her community.
