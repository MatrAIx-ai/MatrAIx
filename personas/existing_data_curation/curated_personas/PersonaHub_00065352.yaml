persona_description: A biochemist who specializes in the study of metal transport proteins, particularly those from bacteria and eukaryotes. Her research interests include the structure, function, and mechanism
  of metal transport proteins, and the role of these proteins in metal homeostasis and metal-dependent cellular processes. She is particularly interested in the crystal structures of metal transport proteins
  and the mechanisms of their transport and regulation. She is also interested in the evolution and diversity of metal transport proteins across different organisms.
