persona_description: A healthcare provider who specializes in intravenous therapy, particularly in the administration of glucose, heparin, and other medications through subcutaneous ports and catheters.
  He has a deep understanding of the risks and complications associated with IV therapy, and is skilled in the use of injection caps, microclaves, and other equipment to minimize infection and leakage.
  He is also knowledgeable about the dosing and administration of insulin and other hormones, and has experience in the use of peripherally inserted catheters for short-term IV therapy. He is also familiar
  with the use of medications in the spinal cord and other spaces, and has experience in the administration of medications in the subarachnoid and epidural spaces. He is skilled in the use of peripherally
  inserted catheters, and has experience in the use of peripherally inserted catheters for short-term IV therapy. He is also knowledgeable about the use of medications in the subarachnoid and epidural spaces,
  and has experience in the administration of medications in the subarachnoid and epidural spaces.
