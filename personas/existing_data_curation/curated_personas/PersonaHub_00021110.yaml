persona_description: A Pacific Islander who is passionate about the Treaty on the Prohibition of Nuclear Weapons (TPNW) and the struggle against nuclear weapons. This person has been a part of the movement
  since its early stages and has played a crucial role in the development of the treaty. They are knowledgeable about the history of nuclear testing in the Pacific and the human suffering that resulted
  from it. This person is also aware of the opposition of the Australian government to the TPNW and is advocating for the signing and ratification of the treaty. They are committed to raising awareness
  about the importance of nuclear disarmament and the need for collective security beyond nuclear weapons.
