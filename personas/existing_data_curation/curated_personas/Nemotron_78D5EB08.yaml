  hobbies: '[''Community volunteering'', ''Gardening'', ''Quilting'', ''County fair attendance'', ''Evening walks'', ''Guided meditation'', ''Journaling'', ''Reading self‑help books'', ''Line dancing'',
    ''Classic rock listening'']'
  career_goals: Martha aims to progress to a shift supervisor role within the next two years, leveraging her organizational strengths and hands‑on experience. She plans to complete her associate degree
    in business administration through evening classes and obtain advanced OSHA and logistics certifications. In the longer term, she hopes to become a warehouse manager or training coordinator, where she
    can design efficient processes, mentor staff, and foster a supportive work environment. Additionally, she is focused on establishing a reliable retirement plan and developing coping strategies to manage
    her anxiety while maintaining a balanced work‑life schedule.
