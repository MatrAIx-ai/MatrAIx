  career_goals: Luz often imagines herself in a caring role, expressing a desire to be a teacher who organizes classroom activities or a veterinarian who helps animals, reflecting her love for structure
    and helping others. She is drawn to professions that offer clear routines and the opportunity to nurture, and she enjoys visualizing herself leading a group of friends in learning games. Though still
    young, these aspirations guide her play and the stories she loves to hear.
