personas:
  professional: Luz Guerrido, a three-year-old preschool enthusiast, already shows a budding aptitude for organization by arranging blocks into precise patterns, foreshadowing a future career in design
    or engineering.
  sports: Luz Guerrido, a three-year-old who loves the local junior soccer program, eagerly runs after a bright orange soccer ball on weekends, idolizes the city's professional baseball team the River Raptors,
    and practices basic gymnastics moves at a community center.
  arts: Luz Guerrido, a three-year-old who delights in drawing simple circles and listening to the whimsical songs of Disney's The Little Mermaid and Sesame Street's Elmo, spends afternoons coloring with
    Crayola crayons and mimicking dance routines from their favorite animated film Frozen.
  travel: Luz Guerrido, a three-year-old who enjoys short family trips, has visited the nearby city zoo and aquarium, and dreams of a future vacation to a magical theme park after watching Disney movies.
  culinary: Luz Guerrido, a three-year-old with a pronounced love for cheesy macaroni, chicken nuggets, and strawberry yogurt, enjoys helping stir batter under supervision, but often insists on eating straight
    from the plate, creating a delightful mess.
  core: Luz Guerrido, a three-year-old who blends a love for predictable routines with bursts of spirited curiosity, keeps a tidy row of stuffed animals, refuses bedtime without a story, and secretly collects
    glitter stickers.
background:
  cultural: Luz grows up in a Mexican‑American household in Bakersfield, California, where Spanish is spoken alongside English, and family traditions such as Día de los Muertos, Christmas posadas, and Saturday
    family meals are central. Her parents emphasize respect for elders, close‑knit community ties, and a love of Mexican cuisine, while also exposing her to the agricultural environment of Kern County.
    This bicultural setting shapes her language use, values, and daily celebrations.
