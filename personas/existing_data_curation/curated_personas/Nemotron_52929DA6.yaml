  career_goals: Jose dreams of a future where his curiosity for how things work meets practical impact. He aspires to become an engineer—either aerospace or civil—so he can design sustainable structures
    or spacecraft that benefit his community and beyond. He plans to pursue advanced STEM studies at a top university, aiming to earn scholarships that support his Mexican-American background. Long‑term,
    he hopes to mentor younger students in his neighborhood, guiding them toward academic excellence and technical careers while honoring his cultural heritage.
