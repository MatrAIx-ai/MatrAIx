personas:
  professional: Jose Lancette is a budding technologist who spends afternoons constructing intricate LEGO models, programming interactive stories in Scratch, and solving puzzles, channeling their disciplined,
    organized nature and balanced curiosity into early technical skill-building.
  sports: Jose Lancette plays soccer on a small, tight‑knit after‑school team called the Little Eagles, enjoys tactical drills with three close friends, and idolizes FC Barcelona’s Lionel Messi, aligning
    with their disciplined, cooperative nature.
  arts: Jose Lancette channels creative energy into building LEGO worlds, crafting Scratch narratives inspired by Isaac Asimov and J.K. Rowling, and designing Día de los Muertos altars that echo the vibrant
    aesthetics of Frida Kahlo, while listening to the melodic tunes of Lin‑Manuel Miranda’s Broadway scores.
  travel: Jose Lancette prefers family‑planned trips that blend short nature hikes in nearby parks with visits to iconic sites like the Grand Canyon and Barcelona, collecting postcards as tangible souvenirs
    while carefully budgeting each outing to balance adventure with their allowance constraints.
  culinary: Jose Lancette enjoys assisting in the kitchen, expertly kneading masa for tamales and shaping tortillas, savoring dishes such as chilaquiles with salsa verde and pozole, and takes pride in measuring
    ingredients to the gram, reflecting a disciplined, detail‑oriented cooking style.
  core: Jose Lancette is a methodical, curiosity‑driven ten‑year‑old who balances disciplined LEGO building and coding with a quiet love for sci‑fi adventures, yet sometimes neglects homework when lost
    in a puzzle.
background:
  cultural: Jose is a first‑generation Mexican‑American raised in a bilingual household in Glenwood, Illinois. His parents emigrated from Oaxaca, bringing Spanish language, traditional foods, and vibrant
    celebrations such as Día de los Muertos, Las Posadas, and Mexican Independence Day into daily life. At home, Spanish is spoken daily, and the family maintains strong ties to Catholic traditions, attending
    a local parish. He takes pride in Mexican cuisine, often helping prepare tortillas, salsa, and tamales. While navigating American school culture, Jose balances his heritage with his community, actively
    sharing his culture with peers and preserving family customs.
