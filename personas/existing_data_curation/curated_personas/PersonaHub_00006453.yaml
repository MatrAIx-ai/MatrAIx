persona_description: A conservationist and wildlife advocate who is passionate about protecting sharks and their habitats, particularly the scalloped hammerhead shark (Sphyrna lewini) and the great hammerhead
  shark (Sphyrna mokarran). They are also aware of the decline in demand for shark fins and the impact of this on the wider ecosystem. They are actively involved in campaigns against shark fin soup and
  support legislative bans on the consumption of shark fins in certain countries. They are aware of the importance of shark sanctuaries and the need for international cooperation to protect sharks.
