  career_goals: Robert aims to expand his tutoring practice into a small boutique learning center that offers flexible scheduling and a hybrid in-person/online model. He aspires to develop a proprietary
    curriculum that blends rigorous academic standards with practical, project-based learning, positioning his center as a competitive alternative to larger tutoring franchises. He also seeks to obtain
    an advanced certification in instructional design and possibly pursue a doctoral degree in education to deepen his expertise. Over the next five years, he hopes to be recognized regionally for consistently
    improving student outcomes, mentor new tutors, and advocate for evidence-based educational policies within Johnston County.
