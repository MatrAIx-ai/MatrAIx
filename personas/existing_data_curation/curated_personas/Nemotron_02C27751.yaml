personas:
  professional: Robert Coady blends rigorous math tutoring with a DIY‑style problem‑solving mindset, they draw on their graduate education in instructional design to craft data‑driven, flexible lesson plans
    while staying competitive about student outcomes and often improvising on the fly when schedules get chaotic.
  sports: Robert Coady follows the Charlotte Hornets and North Carolina Tar Heels, they join the Johnston County senior cycling club for weekend rides, play a casual adult softball league in the spring,
    and they balance their love of fishing with a laid‑back approach to fitness, preferring occasional walks over regimented gym sessions.
  arts: Robert Coady finds artistic release in woodworking, they enjoy the folk storytelling of Bob Dylan, the cinematic humor of John Hughes, and they make it a habit to attend the downtown Raleigh Community
    Theatre’s monthly productions, often noting how the narratives echo the strategic patterns they love in chess.
  travel: Robert Coady favors road trips that combine historical intrigue with nature, they have driven the Blue Ridge Parkway to Asheville, explored the Civil War battlefield at Gettysburg, and they set
    their sights on a future European tour of Edinburgh and Bruges, while usually planning trips around their tutoring calendar and a modest travel budget.
  culinary: Robert Coady is a competent home cook who frequently seasons their garden‑grown tomatoes with basil and oregano for a classic Southern shrimp and grits, they devote weekends to slow‑cooking
    a smoked pulled pork with apple‑cider glaze, and they occasionally indulge in takeout Pad Thai from their favorite local restaurant when time for kitchen experiments runs short.
  core: Robert Coady is a competitively driven, slightly disorganized tutor who can spend hours perfecting a chess opening or a woodworking joint, yet they still forget to file their taxes on time, balancing
    curiosity with a pragmatic, flexible life philosophy.
background:
  cultural: Robert grew up in the suburban-rural context of Johnston County, North Carolina, absorbing the values of Southern hospitality, community involvement, and a practical work ethic common to the
    region. His white, Anglo-American heritage places him within a cultural tradition that emphasizes self-reliance, respect for education, and family cohesion. He maintains ties to local institutions such
    as the county library and his church, and he participates in community events like county fairs and local sports leagues, reflecting the modest, neighbor-centric culture of the American South.
