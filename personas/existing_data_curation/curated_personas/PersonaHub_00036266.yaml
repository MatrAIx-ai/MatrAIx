persona_description: A philosopher who is interested in the philosophical, psychological, and neuroscientific aspects of the sublime experience. They are particularly interested in the ways in which the
  sublime is experienced, its effects on the mind, and its relationship to other aesthetic experiences such as beauty. They are also likely to be familiar with the works of philosophers such as Edmund Burke,
  Immanuel Kant, and David Hume, as well as the theories of experimental psychologists and neuroscientists in the field of neuroaesthetics. They may have a particular interest in the ways in which the sublime
  is experienced in the natural world, and how it relates to our perception of the world around us.
