personas:
  professional: Veronica Hevia is an aspiring digital illustrator who spends her afternoons sketching graphic‑novel characters, mastering Photoshop brushes on her tablet, and posting vibrant artworks to
    Instagram and TikTok, channeling her curious, open‑minded nature and love for unconventional ideas into a growing creative portfolio while navigating schoolwork with a relaxed, flexible mindset.
  sports: Veronica Hevia rides her bike with the Hill Country Bike Club through the rolling hills of the Texas Hill Country, joins family hikes on the San Marcos River Trail, and avidly supports the San
    Antonio Spurs and Texas Rangers, balancing a love for outdoor recreation with enthusiastic fandom of local professional sports teams.
  arts: Veronica Hevia draws inspiration from graphic novel artists like J. Scott Campbell and Alberto Montt, films by Hayao Miyazaki, and contemporary Latin pop stars such as Luis Fonsi and Natti Natasha,
    weaving these influences into daily sketches, digital experiments, and spontaneous dance sessions that shape her vibrant artistic identity.
  travel: Veronica Hevia prefers spontaneous weekend getaways with friends and family, often road‑tripping to Austin’s live‑music scene, exploring the vineyards of Fredericksburg, and dreaming of future
    adventures in Mexico City’s historic centers and Barcelona’s street‑art districts, balancing a love for cultural immersion with an easygoing, budget‑conscious travel style.
  culinary: Veronica Hevia delights in helping her mother craft homemade tamales and cheesy quesadillas, while also experimenting with guacamole, tacos al pastor, and churro‑style desserts, showcasing a
    moderate cooking skill set that blends family recipes with a curiosity for bold, spicy flavors.
  core: Veronica Hevia is a vibrant, art‑obsessed teen who transforms everyday moments into colorful creations, thrives on spontaneous social gatherings, and navigates life with a laid‑back, occasionally
    messy, yet passionately curious spirit.
background:
  cultural: Veronica grows up in a Mexican‑American household in San Marcos, Texas, where Spanish is spoken at home and English dominates school life. Her family maintains Mexican traditions such as Dia
    de los Muertos altars, celebrating Cinco de Mayo with music and food, and preparing home‑cooked meals like tamales, refried beans, and pozole. She participates in local Hispanic community events, often
    helping with decorations and volunteer activities at the city’s cultural festival. Catholic holidays and family gatherings shape her sense of community and responsibility. While she embraces her Mexican
    roots—through language, cuisine, and celebrations—she also integrates Texan influences, enjoying outdoor recreation and the diverse cultural landscape of Guadalupe County.
