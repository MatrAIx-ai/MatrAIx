  career_goals: Veronica envisions turning her passion for art and cultural expression into a career that blends creativity with community impact. She hopes to attend a high school with a strong visual‑arts
    program, then study graphic design or illustration at university. Long‑term, she dreams of founding a youth art collective that celebrates Mexican‑American heritage, working as a multimedia artist or
    cultural liaison for local festivals, and using her bilingual skills to bridge diverse audiences.
