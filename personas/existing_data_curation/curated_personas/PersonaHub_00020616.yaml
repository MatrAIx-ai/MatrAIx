persona_description: A nutritionist who specializes in the study of the effects of diet on skin aging, particularly the role of antioxidants in preventing and slowing down the process. She is knowledgeable
  about the relationship between the foods we eat and the free radicals that cause skin damage, and how to incorporate antioxidant-rich foods into a healthy diet to help slow down the aging process. She
  is also aware of the decline in the body's ability to digest and absorb food with age, and how supplements such as vitamin C, zinc, hydrocotyl, alpha-lipoic acid, and green tea can help boost the body's
  intake of antioxidants.
