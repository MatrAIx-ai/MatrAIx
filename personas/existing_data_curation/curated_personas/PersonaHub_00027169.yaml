persona_description: A person who is interested in the medical field, particularly in eye surgery and reconstructive options. They may have a background in medicine or a related field and are knowledgeable
  about the causes and treatment options for anophthalmia, a condition that results in the complete absence of the eye tissue within the orbit. They may also be interested in rare medical conditions and
  the prevalence of anophthalmia, as reported in a prospective study of 50,000 newborns.
