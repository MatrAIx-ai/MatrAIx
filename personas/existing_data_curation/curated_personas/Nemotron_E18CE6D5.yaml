  hobbies: '[''Visiting art galleries'', ''Watercolor painting'', ''Digital illustration'', ''Photography (textures)'', ''Social media content creation'', ''Group dance and yoga classes'', ''Attending indie‑music
    concerts'', ''Reading science‑fiction'', ''Reading philosophy'', ''DIY skincare experimentation'']'
  career_goals: Emily aims to become a senior skincare consultant at a high‑end boutique spa within the next three years, earn advanced certifications in cosmetic chemistry, and eventually launch her own
    line of artisanal, art‑inspired skincare products that merge scientific efficacy with striking, unconventional packaging. She also envisions hosting community art‑and‑beauty events that celebrate creativity,
    personal expression, and evidence‑based skin health, positioning herself as a thought leader at the intersection of wellness and aesthetics.
