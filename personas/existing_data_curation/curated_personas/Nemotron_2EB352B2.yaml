  hobbies: '[''Watercolor painting'', ''Sketching'', ''Reading speculative fiction'', ''Creative writing'', ''Acoustic guitar'', ''Street photography'', ''Attending local gallery openings'', ''Indie music
    concerts'', ''Board game nights (small group)'', ''Exploring coffee shops'', ''Journaling'', ''Cooking experimental recipes'']'
  career_goals: Michael aims to move into a supervisory role and become a store manager where he can shape experiential retail through innovative visual merchandising. He plans to enroll in a retail management
    certification or complete a bachelor's degree in marketing or visual arts to strengthen leadership and strategic planning skills. Over the next five years, he hopes to oversee multiple locations or
    launch his own boutique that integrates art, curated products, and local craftsmanship. Ultimately, he envisions influencing the retail sector by blending creative concepts with commerce, possibly collaborating
    with regional artists for in‑store exhibitions and community events.
