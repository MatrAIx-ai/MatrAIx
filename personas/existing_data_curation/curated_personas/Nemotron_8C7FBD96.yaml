  hobbies: '[''Visiting Art Galleries'', ''Reading Philosophy and Business Books'', ''Listening to Jazz, Soul, and Hip‑Hop'', ''Digital Illustration'', ''Desert Photography'', ''Strategy Gaming'', ''Competitive
    Gaming'', ''Journaling'', ''Hiking Desert Trails'', ''Cooking Traditional African‑American Dishes'']'
  career_goals: Bruce aims to scale his current venture into a leading boutique brand that fuses contemporary art with e‑commerce, positioning the company as a cultural hub in the Southwest. He plans to
    pursue an MBA within the next three years to deepen his strategic and financial expertise while expanding his professional network. Long‑term, he envisions establishing a mentorship program for young
    Black entrepreneurs in Arizona, leveraging his own experience to create pathways for underrepresented talent. Bruce also aspires to be recognized as an innovative thought leader who can balance rigorous
    business discipline with creative, unconventional thinking, ultimately building a sustainable enterprise that contributes positively to his community.
