  hobbies: '[''Desert landscape photography'', ''Visiting art galleries and mural tours'', ''Sketching and painting'', ''Hiking in nearby natural areas'', ''Playing acoustic guitar'', ''Cooking traditional
    Spanish dishes'', ''Target shooting at local range'', ''Attending the Roswell UFO Festival'', ''Reading about construction technology'', ''Community service projects'']'
  career_goals: Joel aims to transition from hands‑on equipment operation to a supervisory and managerial role within the construction industry. He plans to obtain a certified heavy‑equipment trainer credential
    and OSHA trainer certification, positioning himself to mentor junior operators. Over the next five years, he hopes to become a fleet manager or foreman, integrating emerging technologies such as drone
    surveying and tele‑operated equipment to improve site efficiency. Ultimately, he aspires to launch his own small equipment‑rental and contracting business that emphasizes sustainable building practices
    and offers training programs for local workers.
