personas:
  professional: Joel Gonzalez is a heavy‑equipment operator in the New Mexico construction sector who applies a methodical, organized approach to running excavators, bulldozers, and loaders, reads blueprints
    with precision, enforces OSHA safety standards, and mentors junior crew members while piloting drone surveys and tech upgrades in preparation for a future foreman or fleet‑manager role.
  sports: Joel Gonzalez hikes the foothills surrounding Roswell with the local Trail Club, competes in trap shooting at the regional range where their competitive nature shines, follows the New Mexico State
    Aggies football team and the Albuquerque Isotopes baseball club, and includes disciplined strength‑training sessions twice a week to maintain stamina for demanding equipment work.
  arts: Joel Gonzalez spends weekends photographing stark desert vistas inspired by Ansel Adams, sketches murals after visits to the Roswell Museum and Art Center, strums acoustic folk tunes reminiscent
    of Bob Dylan on an old guitar, and draws creative energy from Georgia O'Keeffe’s New Mexico landscapes—all while never leaving home without a 35mm camera and a battered sketchbook.
  travel: Joel Gonzalez prefers low‑key road trips that blend adventure and stargazing, planning routes on topographic maps to explore Carlsbad Caverns, White Sands, and Santa Fe, while dreaming of a future
    trek to Patagonia’s Patagonia National Park; travel plans are always slotted around work schedules and budgeted in a dedicated travel fund.
  culinary: Joel Gonzalez enjoys cooking traditional dishes such as saffron‑infused paella with chorizo, homemade empanadas, and chilled gazpacho, frequently incorporating desert herbs like oregano and
    prickly pear, and experiments with flavor pairings while admitting a habit of over‑salting sauces when distracted by a new photography project.
  core: Joel Gonzalez is a methodical construction veteran who balances a love for desert photography and folk guitar with a competitive streak, healthy skepticism, and a drive toward sustainable entrepreneurship.
background:
  cultural: Joel is a first‑generation American of Spanish descent, raised in a bilingual household where both English and Spanish were spoken daily. He celebrates traditional Spanish holidays such as Día
    de los Reyes and incorporates Spanish cuisine, music, and flamenco rhythms into family gatherings. Living in Roswell, New Mexico, he has also embraced the Southwest’s Hispanic heritage, participating
    in local festivals like the Fiesta de los Vaqueros, enjoying pueblo art, and savoring New Mexican chile dishes. This blend of European Spanish roots and Southwestern US culture shapes his appreciation
    for art, his culinary interests, and his curiosity about diverse ideas, from classic painters to the region’s UFO folklore.
