persona_description: A pediatrician who is concerned about the safety of babies who roll over during sleep, particularly those at risk for sudden infant death syndrome (SIDS). They are aware of the "Back
  to Sleep" campaign and its impact on reducing the incidence of SIDS, but also recognize the importance of making the sleeping environment as safe as possible for rolling babies. They are knowledgeable
  about the developmental milestones of babies, including the ability to roll over and the correlation between head control and a reduced risk of SIDS. They are also aware of the importance of tummy time
  and the benefits of using soft bedding and avoiding anything that could cover the infant's mouth and nose.
