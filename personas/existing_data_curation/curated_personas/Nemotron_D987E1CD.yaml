personas:
  professional: Shaun Carter, a retired Nissan plant shift foreman turned community mentor, leverages three decades of automotive assembly, electrical diagnostics, and quality‑control expertise to guide
    apprenticeship trainees, lead church safety workshops, and solve everyday home‑repair challenges with a pragmatic, hands‑on mindset, and they approach each task with methodical precision tempered by
    a willingness to adjust when plans drift.
  sports: Shaun Carter, who combines daily walks and garden labor as his primary fitness routine, follows the Memphis Grizzlies in basketball, cheers for the Tennessee Titans during football season, and
    participates in a senior bocce league, preferring low‑impact activities that accommodate his arthritic joints while still satisfying his competitive spirit.
  arts: Shaun Carter, a choir member who fills the house with the sounds of Mahalia Jackson, B.B. King, and Aretha Franklin while cooking, devotes afternoons to savoring historical fiction by authors such
    as Walter Mosley, and occasionally attends community‑theater productions, allowing them to blend soulful music, storytelling, and moderate social talk into a rich artistic life.
  travel: Shaun Carter, who dreams of exploring the civil‑rights landmarks of Selma, the jazz heritage of New Orleans, and the antebellum architecture of Charleston with his wife, plans each trip around
    modest savings, an itinerary crafted with flexibility to accommodate last‑minute health check‑ups, and a desire to gather stories for his memoir.
  culinary: Shaun Carter, a seasoned home cook, transforms garden harvests of collard greens, sweet potatoes, and fresh okra into soulful dishes like fried catfish, collard greens seasoned with smoked turkey,
    and sweet‑potato pie spiced with nutmeg and cinnamon, and they relish sharing these meals with family and neighbors at community potlucks.
  core: Shaun Carter epitomizes a pragmatic, garden‑driven soul who balances methodical problem‑solving with occasional forgetfulness, a love of gospel music, and a steadfast dedication to preserving family
    history through his memoir.
background:
  cultural: Shaun’s cultural identity is rooted in Southern African‑American traditions. He was raised in a close‑knit Baptist church that emphasized storytelling, gospel music, and communal support. His
    family’s history traces back to the Great Migration, with grandparents who moved from the Mississippi Delta to Tennessee seeking work in the burgeoning manufacturing sector. He embraces the culinary
    heritage of Southern soul food, the rhythmic legacy of blues and gospel, and the strong sense of responsibility toward family and community that characterizes many Black families in the Memphis area.
attributes:
  skills: '[''Automotive assembly'', ''Basic electrical troubleshooting'', ''Quality‑control inspection'', ''Shift supervision'', ''Team leadership'', ''Conflict resolution'', ''Home repair'', ''Gardening'',
