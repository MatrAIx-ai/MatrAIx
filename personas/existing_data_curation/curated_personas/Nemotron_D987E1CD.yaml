  hobbies: '[''Gardening'', ''Soul‑food cooking'', ''Woodworking'', ''Listening to gospel and blues music'', ''Church choir singing'', ''Community potluck participation'', ''Reading historical fiction'']'
  career_goals: Although officially retired, Shaun aims to stay purposeful by mentoring younger workers at the plant’s apprenticeship program, volunteering as a safety trainer for his church’s senior‑safety
    workshop, and completing a memoir that captures his family's journey from the Great Migration to present‑day Cordova. He also hopes to improve his mental well‑being through regular counseling, maintain
    his health with daily walks, and eventually travel with his wife to historic sites in the South that reflect African‑American heritage.
