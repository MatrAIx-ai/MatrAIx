  hobbies: '[''Photography of historic architecture'', ''Sketching decorative motifs'', ''Visiting local art galleries'', ''Listening to bomba and plena music'', ''Cooking traditional Puerto Rican recipes'',
    ''Woodworking'', ''Fishing'', ''Participating in community restoration projects'', ''Reading about art history and architecture'']'
  career_goals: At 51, Israel aims to transition from general stucco work to becoming a recognized artisan of decorative plaster in Ponce. He plans to enroll in a short certification program in historic
    preservation, so he can officially restore heritage buildings. He hopes to mentor a younger apprentice, passing on traditional techniques that combine Caribbean motifs with modern materials. Over the
    next five years he envisions launching a boutique restoration studio that focuses on preserving the city’s colonial architecture while offering bespoke decorative finishes for private homes. He also
    aspires to document his methods in a small guidebook, contributing to the local craft community. While he values financial stability, he prefers a flexible schedule that lets him continue his personal
    art‑related pursuits.
