  hobbies: '[''Oil Painting'', ''Visiting Art Galleries'', ''Hiking in the Appalachian Region'', ''Reading Contemporary Fiction'', ''Traveling to Cultural Sites'', ''Gardening'', ''Yoga'', ''Volunteer Art
    Education Programs'', ''Photography'', ''Cooking'']'
  career_goals: Marcie aims to secure tenure and become Chair of the Department of Education, where she can champion interdisciplinary and arts‑based curricula. She seeks external funding to launch a regional
    arts‑education partnership, publish research on the impact of arts integration on student outcomes, and mentor junior faculty. Long‑term, she envisions founding a Center for Innovative Teaching that
    fosters community‑college collaborations and lifelong learning initiatives.
