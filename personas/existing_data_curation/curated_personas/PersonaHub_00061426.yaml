persona_description: An educational psychologist who specializes in Positive Behaviour Support and Functional Assessment, particularly in understanding the function of challenging behavior and developing
  strategies to replace it with positive behavior. They recognize the individual's right to a life that is valued and engaged, and work towards helping individuals with autism to learn to cope with their
  surroundings better. Their expertise lies in understanding the communication of behaviors and developing skills, emotional or physical responses, and improving quality of life.
