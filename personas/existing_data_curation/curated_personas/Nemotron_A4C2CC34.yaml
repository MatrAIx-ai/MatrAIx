  career_goals: Diego dreams of a future where he can explore how things work and help others. He is fascinated by space and imagines becoming an astronaut, but he also loves the idea of designing and building—so
    he says he wants to be an engineer or a scientist who creates order from chaos. He envisions a career that combines structure, high standards, and the chance to contribute to his community, such as
    a teacher who inspires younger children to love learning.
