personas:
  professional: Diego Dedios, a budding LEGO architect, channels an almost‑obsessive love for step‑by‑step building instructions into meticulously crafted models, turning every play session into a disciplined
    practice of precision and achievement.
  sports: Diego Dedios scores goals for the Little Strikers youth soccer team, idolizes Lionel Messi, and cheerfully tracks the local professional team the River City Raptors while spending afternoons perfecting
    dribbling drills in the neighborhood park.
  arts: Diego Dedios expresses creativity through vivid coloring within the lines, sketches scenes of the backyard jungle, builds intricate LEGO sculptures, and listens to the family’s traditional folk
    songs, drawing inspiration from child‑friendly artists like Dr. Seuss and Maya the Bee.
  travel: Diego Dedios loves weekend road trips to the nearby state park’s hiking trails, dreams of exploring the Grand Canyon’s canyons, and cherishes family vacations to Disneyland, always packing a backpack
    of stickers and a notebook for doodles.
  culinary: Diego Dedios eagerly assists in the kitchen, mashing avocados for guacamole, arranging seasoned taco fillings on corn tortillas, and perfecting the ratio of cheese to salsa on homemade quesadillas,
    though they sometimes sneak extra chips when parents aren’t looking.
  core: Diego Dedios blends disciplined precision with playful curiosity, turning every LEGO build, soccer game, and kitchen task into a structured adventure while occasionally succumbing to sticker‑obsessed
    hoarding and snack‑stealing quirks.
background:
  cultural: 'Diego grows up in a Mexican‑American household in Cedar Creek, Texas. His family maintains strong ties to Mexican traditions: they celebrate Día de los Muertos and Mexican Independence Day,
    speak Spanish at home, and prepare foods like tamales, tacos, and mole for family meals. Catholic holidays and church attendance are part of his routine, reinforcing community values. While embracing
    his Mexican heritage, Diego also experiences Texan influences through school, local festivals, and friendships, creating a blended cultural identity that shapes his worldview and daily life.'
