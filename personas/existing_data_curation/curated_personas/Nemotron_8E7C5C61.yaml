personas:
  professional: Daniel Ferreira, a 50‑year‑old full‑stack software developer turned architect, harnesses 25 years of Python, JavaScript, Java, and C++ mastery along with AWS microservices expertise while
    letting his curiosity and relaxed, flexible mindset drive experimental projects that blend code, UI/UX design, and visual art.
  sports: Daniel Ferreira enjoys weekend hikes along the Santa Cruz coastal trails, participates in a local cycling club that rides the Pacific shoreline, follows the San Jose Sharks (NHL) and Santa Cruz
    Derby Girls (roller derby) for inspiration, and practices yoga sporadically to counterbalance the strain of outdoor activities.
  arts: Daniel Ferreira, an avid painter and photographer, draws inspiration from muralist Diego Rivera, experimental musician Brian Eno, and contemporary digital artist Refik Anadol, regularly visits the
    San Jose Museum of Art and underground electronic venues to fuel his interdisciplinary creativity.
  travel: Daniel Ferreira prefers low‑key, introspective trips, having explored the colonial architecture of Guanajuato, the street art of Berlin, and the coastal cliffs of Portugal, while planning a future
    pilgrimage to the ruins of Tulum to capture sunrise panoramas with his lenses.
  culinary: Daniel Ferreira, a confident home chef, specializes in slow‑cooked mole with toasted chilies, masa‑based tamales, and fresh salsa verde featuring tomatillos and cilantro, often experimenting
    with mole’s chocolate undertones and pairing dishes with craft mezcal.
  core: Daniel Ferreira blends disciplined coding with spontaneous brushstrokes, meditative calm, occasional budgeting procrastination, and a relentless curiosity that turns every hike, meal, and line of
    code into a canvas for exploration.
background:
  cultural: Daniel grew up in a bicultural Mexican‑American household in Southern California, where Spanish and English were spoken interchangeably. Family celebrations—Día de los Muertos, quinceañeras,
    and holiday feasts—instilled a deep appreciation for Mexican traditions, folk art, and communal values like familismo and respeto. Early exposure to Mexican muralism and vibrant folk patterns sparked
    his lifelong love for visual arts. Now residing in Santa Cruz, he blends his Mexican heritage with the progressive, coastal culture of the Bay Area, participating in local Latinx tech meetups, supporting
    community festivals, and preserving his cultural identity through language, cooking, and artistic expression.
