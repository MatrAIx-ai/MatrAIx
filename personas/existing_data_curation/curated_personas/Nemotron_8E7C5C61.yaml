  career_goals: Daniel aims to transition into a lead architect or CTO role at a mission‑driven tech company that values creative expression and social impact. He envisions leading interdisciplinary projects
    that combine technology with art—such as interactive installations, immersive digital storytelling, or educational platforms that preserve cultural heritage. A core ambition is to mentor and create
    pathways for underrepresented developers, especially those from Latinx backgrounds. He also hopes to allocate flexible time for his artistic pursuits and community work, and to contribute open‑source
    tools that improve accessibility and user‑centred design in web applications.
