persona_description: A United Nations Environment Programme (UNEP) staff member who is responsible for managing the negotiation of legally binding instruments on hazardous chemicals and persistent organic
  pollutants, as well as promoting environmental conservation in sports competitions and the preparation of the Global Biodiversity Assessment. The individual has a strong background in environmental science,
  having worked on various international negotiations and initiatives aimed at protecting the environment and promoting sustainable development. They have also been involved in the development of guidelines
  for sports federations and countries bidding for the Olympic Games, as well as the preparation of the International Declaration on Cleaner Production. The individual's expertise and knowledge in these
  areas have helped to advance global efforts to protect the environment and promote sustainable development.
