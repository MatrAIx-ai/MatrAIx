  career_goals: Juan dreams of turning his love for technology into a career. He aims to earn a scholarship to study computer engineering or robotics at a top university, with the long‑term goal of designing
    affordable tech solutions for his community. He envisions creating bilingual educational apps that blend gaming with cultural storytelling, helping other Latino youth feel represented in STEM. In the
    short term, he plans to deepen his coding skills, compete in regional robotics competitions, and build a portfolio of personal projects. He also keeps an eye on the eSports scene, hoping to balance
    a future as a professional gamer or content creator with his engineering ambitions.
