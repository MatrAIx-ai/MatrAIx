personas:
  professional: Juan Ramos is an aspiring robotics enthusiast and budding game streamer who blends a strategic mindset from chess and shooter games with practical programming skills, often improvising robot
    designs for school competitions despite a tendency to procrastinate on deadlines; they thrive on the challenge of solving problems on the fly.
  sports: Juan Ramos enjoys skateboarding with the local Sunset Skate Club on quiet streets, hikes the Angeles National Forest trails in the summer, and follows the Los Angeles Lakers, Dodgers, and LA Galaxy,
    often cheering for the Lakers during weekend games while preferring solo outdoor activity over team sports; they find the individual challenge of skateboarding aligns with their competitive spirit.
  arts: Juan Ramos channels creativity through digital illustration, drawing inspiration from artists like Studio Ghibli’s Hayao Miyazaki, anime illustrator Sakiyama, and game concept artist Yoshitaka Amano,
    while also designing flyers for school clubs and listening to the chiptune soundtrack of the video game 'Celeste', blending visual and auditory art forms; they often experiment with bold color palettes
    to express their competitive edge.
  travel: Juan Ramos prefers low‑key road trips to nearby destinations such as San Diego’s seaside boardwalk and a family visit to the historic town of Tijuana, while dreaming of a future adventure to Tokyo’s
    Akihabara district to experience a gaming expo, balancing budget constraints with a desire for immersion in tech culture; they meticulously save allowance for travel gear despite their spontaneous streak.
  culinary: Juan Ramos loves cooking Mexican dishes like carne asada tacos, chicken tamales, and fresh guacamole, skillfully chopping cilantro, jalapeños, and onions while experimenting with smoky chipotle
    adobo, often inviting friends over to taste-test their latest culinary creations; they take pride in perfecting the balance of spice and flavor.
  core: Juan Ramos is a competitive, tech‑savvy teen who oscillates between intense focus on robotics and gaming and occasional procrastination, channeling solitary creativity into digital art and impromptu
    skate sessions, while occasionally neglecting health routines; they cherish the thrill of outsmarting opponents.
background:
  cultural: Juan is a second‑generation Mexican American living in La Crescenta, California. At home, Spanish is spoken alongside English, and his family maintains Mexican traditions such as Día de los
    Muertos, Las Posadas, and celebrating Mexican holidays with food, music, and storytelling. He grew up with a strong sense of family responsibility, often helping with cooking and community events. The
    multicultural environment of Los Angeles County exposes him to a blend of American and Mexican influences, shaping his bilingual identity and giving him a unique perspective that he hopes to bring into
    his future tech endeavors.
