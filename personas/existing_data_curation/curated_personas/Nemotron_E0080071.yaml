personas:
  professional: Christopher Gibson, a two-year-old, is a budding cause-and-effect explorer who turns everyday objects into learning tools, building block towers with a ritualistic preference for the same
    red block each day, and quietly observes adult work with a gentle, cooperative demeanor, though they often drift into imagined play when routine is disrupted.
  sports: Christopher Gibson, aged two, delights in the local park's toddler soccer tumble-mat and the weekly 'Little Sprouts' playgroup where they chase soft foam balls, cheering quietly for the hometown
    baseball team the River City Cubs during family TV nights, but they prefer small, familiar groups over large crowds and often retreat to a cozy corner when the activity feels overwhelming.
  arts: Christopher Gibson, a two-year-old, immerses themselves in finger-painting sessions with bright primary colors, especially loving to recreate the classic 'Rainbow' by children's artist Eric Carle,
    and enjoys listening to the gentle lullabies of folk singer Jewel and the playful tunes of The Wiggles, which soothe their heightened emotions and inspire cooperative storytelling during playtime.
  travel: Christopher Gibson, at two, enjoys family road trips to the nearby beach town of Seaside Cove where the sand feels familiar under their tiny feet, and they eagerly anticipate short visits to the
    city zoo, yet their preference for routine means they favor repeat stays at a beloved seaside cottage over long-haul flights to faraway destinations like Disney World, which they watch on screen instead.
  culinary: Christopher Gibson, a two-year-old, adores creamy mac & cheese with a dash of mild cheddar and the sweet bite of banana-sliced pancakes, often helping stir the batter with a small wooden spoon,
    while their favorite snack is soft avocado cubes seasoned lightly with a pinch of sea salt, reflecting a simple palate that finds comfort in familiar, mild flavors.
  core: Christopher Gibson, a two-year-old, navigates the world through comforting routines, gentle kindness, and intense emotional reactions, turning everyday play into a soothing, yet occasionally anxious,
    exploration of life.
background:
  cultural: Christopher is an American Indian child raised in Williston, ND, within the Mandan, Hidatsa, and Arikara Nation community. His family emphasizes traditional values such as respect for the land,
    storytelling, and communal harmony while also navigating contemporary life on the reservation. He is exposed to both English and his tribe's language, participates in cultural gatherings, and learns
    early on the importance of preserving heritage through everyday rituals and the natural surroundings of the North Dakota prairie.
