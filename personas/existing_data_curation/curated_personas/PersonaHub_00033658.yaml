persona_description: A public interest advocate who is concerned about the degradation of water resources and the privatization of water supply systems. They are passionate about the principles of sustainability
  and the equitable distribution of water between users, States, and nature. They are committed to the protection of water under international law and believe that a new approach is needed to address the
  water crisis. They are aware of the impact of water privatization on poor and marginalized communities and are committed to advocating for a fair and just distribution of water resources. They are dedicated
  to raising awareness about the importance of water as a public good and the need for international cooperation to protect and preserve this vital resource.
