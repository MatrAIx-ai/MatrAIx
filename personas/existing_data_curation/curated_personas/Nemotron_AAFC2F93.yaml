  hobbies: '[''building block towers'', ''shape‑sorting puzzles'', ''color and size categorization games'', ''singing nursery rhymes'', ''group dancing'', ''storytime picture‑book reading'', ''visiting
    the zoo and observing animals'', ''pretend caregiving (clinic, firefighter drills)'']'
  career_goals: Robert frequently talks about growing up to be a helper—he imagines himself as a teacher who makes sure every child feels safe, a firefighter who rescues people, or a doctor who eases pain.
    He expresses a clear ambition to keep others happy and harmonious, saying he wants to “make everyone smile” and “keep the world tidy.” While still playful, his long‑term goal is to stay dependable,
    calm, and compassionate in any role he chooses, using his natural sociability and orderly nature to support his community.
