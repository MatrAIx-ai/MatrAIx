personas:
  professional: Donald Askew, a veteran postal service carrier nearing retirement, leverages four decades of route‑planning mastery, meticulous sorting expertise, and calm problem‑solving to mentor new
    carriers and champion reliable service standards within the union.
  sports: Donald Askew stays active by walking the routes of his historic garden and attending weekly fishing trips on Lake Altus, while cheering on the Oklahoma City Thunder in basketball, the Dallas Cowboys
    in football, and joining the Greer County senior walking club for low‑impact exercise.
  arts: Donald Askew finds artistic solace in the precise craftsmanship of model‑train kits, the rustic woodworking techniques of Roy Underhill, the narrative histories of David McCullough, and the timeless
    paintings of Norman Rockwell, while occasionally listening to John Denver’s folk ballads during evenings in his garden.
  travel: Donald Askew prefers low‑key, well‑planned road trips that blend historical curiosity with gentle scenery, such as his annual visits to the National Postal Museum in Washington, D.C., weekend
    drives to Santa Fe’s historic plaza, and a dreamed‑for pilgrimage to the United Kingdom’s Royal Mail Museum in London, always booking accommodations months in advance to fit his methodical schedule.
  culinary: Donald Askew enjoys cooking straightforward, home‑cooked fare such as roasted chicken with rosemary, garden‑fresh tomato and basil soup, and seasoned pan‑fried trout from his lake catches, favoring
    reliable ingredients like potatoes, carrots, and locally grown herbs over exotic flavors.
  core: Donald Askew is a methodical, tradition‑loving retiree who balances a disciplined routine of gardening, woodworking, and postal mentorship with a gentle stubbornness that keeps his garden’s planting
    calendar untouched, even when the weather protests.
background:
  cultural: Donald was raised in a tight‑knit, rural Oklahoma community where family, church, and hard work form the core of daily life. His upbringing reflects the Great Plains values of self‑reliance,
    neighborly cooperation, and respect for tradition. He identifies with the predominantly white, agrarian heritage of the region, drawing on family stories of early settlers of German and Scandinavian
    descent. Local customs such as county fairs, community potlucks, and church gatherings have shaped his sense of belonging. Although he is practical and routine‑oriented, Donald's kindness and cooperative
    spirit are rooted in the close community ties typical of small‑town Oklahoma, where helping neighbors and maintaining social harmony are highly valued.
attributes:
