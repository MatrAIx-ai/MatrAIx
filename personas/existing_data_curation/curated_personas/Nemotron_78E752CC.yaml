  career_goals: Nina frequently talks about becoming a famous painter who fills canvases with bright colors, a brave astronaut who explores space, or a kind teacher who shares stories with younger kids.
    She loves winning the small art contests at preschool and aims to be the first to finish puzzles, showing a budding competitive drive alongside her artistic curiosity.
