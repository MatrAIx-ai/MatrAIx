persona_description: Jeff Atherton is an Assistant Professor in the Foundation Program at the CSULB School of Art. He has expertise in two-dimensional composition and color theory, and his interest in color
  perception was sparked in 2002 when he was asked to demonstrate the relationship between color and light to German national merit students. Since then, he has been working on applying current theories
  of human perception to an applied color theory for artists. Atherton is known for his research interests in group theory and representation theory of groups, as well as his work on isomorphism problems
  and the theory of group automorphisms.
