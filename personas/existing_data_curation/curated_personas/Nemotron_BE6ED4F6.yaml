  hobbies: '[''Community basketball league'', ''Habitat for Humanity volunteering'', ''Church outreach and choir participation'', ''Cooking Southern soul food'', ''Fishing on Lake Spivey'', ''Attending
    gospel and R&B concerts'', ''Classic car restoration'', ''Mentoring youth in automotive workshops'']'
  career_goals: Johnny aims to transition into a senior supervisory role such as Lead Equipment Supervisor or Safety Training Coordinator, where he can formalize his mentoring strengths and develop comprehensive
    safety programs for his site. He plans to earn the Certified Material Handling Trainer credential and pursue advanced certifications in lean manufacturing and telematics integration. Long‑term, he hopes
    to launch a community‑focused consulting service that helps small businesses in the Fairburn area improve operational efficiency while providing apprenticeship opportunities for local youth.
