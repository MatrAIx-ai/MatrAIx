personas:
  professional: Johnny Melton, a seasoned heavy‑equipment operator with 25 years of forklift, tractor, and diesel engine expertise, merges a safety‑first mindset with a curiosity for telematics to streamline
    warehouse workflows, mentor new operators, and pursue a Lead Equipment Supervisor or Safety Training Coordinator role, and they leverage their practical experience to champion a cooperative safety culture.
  sports: Johnny Melton maintains an active fitness routine by playing weekly in the Fairburn community basketball league, cheering on the Atlanta Hawks and Falcons, and belonging to the Lake Spivey Anglers
    Association, where they blend competitive play with relaxed fishing outings to stay physically and socially engaged.
  arts: Johnny Melton regularly attends gospel concerts featuring Kirk Franklin and R&B shows headlined by John Legend, and they draw creative inspiration from the soulful rhythms and vintage aesthetics,
    which also inform their classic‑car restoration projects.
  travel: Johnny Melton prefers weekend road trips across the Southeast, planning spontaneous stops at historic Savannah, the Blue Ridge Parkway in Asheville, and the jazz‑rich streets of New Orleans, while
    they allocate a modest travel budget that balances family obligations with a yearning to someday explore the Caribbean islands.
  culinary: Johnny Melton showcases proficient cooking skills by preparing Southern soul‑food staples such as fried catfish, collard greens seasoned with smoked turkey, sweet‑potato casserole, and cornbread
    made with stone‑ground cornmeal, often pairing these dishes with fresh thyme, rosemary, and a splash of hot sauce for an authentic flavor punch, and they delight in improvising seasonal twists on classic
    recipes.
  core: Johnny Melton blends a pragmatic safety mindset with boundless curiosity, channeling their love for community, classic cars, and soulful music into a life where structured work meets spontaneous
    service, even if they occasionally forget to lock the garage after a long tinkering session.
background:
  cultural: Johnny was raised in the Atlanta metropolitan area, steeped in the rich traditions of Southern African‑American culture. His upbringing emphasized church involvement, family gatherings, and
    the communal values of hospitality and mutual support. He grew up with the sounds of gospel choirs, the flavors of soul food, and a strong awareness of the civil‑rights legacy that shaped his community.
    This cultural foundation informs his dedication to collective well‑being, his love for music and food, and his commitment to giving back through service and mentorship in Fairburn and the broader Fulton
    County region.
attributes:
