  hobbies: '[''Vegetable Gardening'', ''Crossword and Sudoku Puzzles'', ''Genealogy Research'', ''Knitting'', ''Birdwatching'', ''Volunteer Reading Companion'', ''Historical Nonfiction Discussion Groups'']'
  career_goals: Post-retirement, Jeanette aims to leverage her educational background to expand the adult literacy program at the Coatesville public library, eventually creating a structured intergenerational
    learning series that pairs seniors with high-school students. She aspires to obtain a certification in community mediation so she can help resolve local disputes with a fair, evidence-based approach.
    Additionally, she plans to author a memoir that blends personal history with reflections on educational practices, hoping it will serve as both a personal legacy and a resource for future teachers.
