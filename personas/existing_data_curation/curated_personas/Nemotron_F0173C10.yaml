  hobbies: '[''Woodworking'',''Vintage Car Restoration'',''Vegetable Gardening'',''Fishing'',''Target Shooting'',''Reading Non‑Fiction (Engineering, Economics, Philosophy)'',''Listening to Industry Podcasts'',''Online
    Chess'',''Architectural Photography'']'
  career_goals: Nicholas aims to transition from site‑level management to a senior executive role such as Director of Construction Operations or to launch his own boutique consultancy that helps developers
    integrate sustainable building practices and digital planning tools. He is pursuing the Certified Construction Manager (CCM) credential and plans to complete a PMP certification within the next year.
    Long‑term, he wants to be recognized as a regional authority on efficient, low‑risk project delivery while establishing processes that reduce his own managerial stress and give him greater control over
    his schedule.
