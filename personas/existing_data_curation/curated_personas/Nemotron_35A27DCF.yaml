personas:
  professional: Ryan Bohannon is a retired construction manager turned community arts advocate who combines his hands‑on building expertise, woodworking skill, and strategic bridge mindset to curate senior‑artist
    exhibitions, mentor budding photographers at the Sarasota Art Center, and author memoir excerpts, all guided by his calm resilience, curiosity, and a relaxed, sometimes disorganized, approach to deadlines.
  sports: Ryan Bohannon stays active with morning walks along the Gulf shoreline, weekly low‑impact yoga at the senior center, and friendly matches at the Sarasota Pickleball Club, while cheering on the
    Tampa Bay Buccaneers, Tampa Bay Rays, and Miami Heat and occasionally attending local high‑school baseball games on weekends.
  arts: Ryan Bohannon paints atmospheric Gulf Coast sunrise watercolors in the spirit of Winslow Homer, captures analog photographs inspired by Ansel Adams' mastery of light, avidly attends Ringling Museum
    openings featuring works by Claude Monet and contemporary artists like Kerry James Marshall, and uses his storytelling flair to lead informal tours that blend art history with personal anecdotes.
  travel: Ryan Bohannon favors flexible, low‑key travel, using senior discounts to explore cultural festivals in New Orleans and Kyoto and to embark on dream trips to Florence's Renaissance galleries, often
    planning itineraries on the fly and relishing short, sunrise‑lit seaside jaunts along Florida’s Gulf Coast.
  culinary: Ryan Bohannon enjoys preparing Mediterranean‑inspired dishes such as grilled sardines with lemon‑olive oil, ratatouille with fresh basil and thyme, and creamy hummus paired with warm pita, boasting
    a confident home‑cooking style that occasionally forgets seasoning but always highlights quality olive oil, fresh herbs, and locally grown Florida vegetables from his garden.
  core: Ryan Bohannon is a calm, endlessly curious 79‑year‑old who blends his construction‑born hands‑on skill with a lover’s eye for art, maintaining a flexible, competitive spirit that fuels his community‑focused
    projects, seasoned by occasional disorganization and a penchant for Mediterranean flavors.
background:
  cultural: Ryan was raised in a modest Midwestern town in Ohio during the post‑war era, steeped in a blend of Protestant work ethic and community‑centered values. His family’s German‑Irish ancestry contributed
    to a modest, self‑reliant upbringing that prized curiosity and practical skills. After completing some college coursework in engineering, he moved to the Gulf Coast upon retirement, where the vibrant
    arts scene and laid‑back Florida lifestyle resonated with his appreciation for flexibility and relaxed obligations. He and his wife have integrated into Sarasota’s senior community, participating in
    local cultural events while preserving the grounded, resilient outlook shaped by his Midwestern roots.
