persona_description: A researcher and historian who is interested in the history and culture of the Melungeon people, specifically the Saponi tribe. This individual is knowledgeable about the history of
  the region in which the Melungeon people lived, and has a particular interest in the specific group of Saponi who settled on William Eaton's land in Granville County, NC in 1754. This person is also interested
  in the broader history of the Native American tribes in the region and the impact of European settlement on their way of life.
