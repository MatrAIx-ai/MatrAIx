  hobbies: '["DIY home projects", "Bicycle rides along coastal trails", "Photography of urban and natural landscapes", "Cooking Puerto Rican cuisine", "Listening to reggaetón, salsa, and indie music", "Reading
    tech blogs and repair manuals", "Volunteering for community clean-up events", "Playing strategy video games"]'
  career_goals: She aims to earn certifications such as the EPA 608 for HVAC and OSHA safety training within the next two years, with a long‑term goal of becoming a lead maintenance technician or supervisor
    at a larger facility in the San Juan metro area. Daniela also dreams of eventually launching her own small residential repair business, capitalizing on her curiosity for new technologies and her practical
    know‑how. She wants to improve her organizational habits to qualify for supervisory roles and achieve financial stability to support her family.
