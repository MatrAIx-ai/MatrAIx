personas:
  professional: Daniela Morera, a 22‑year‑old hands‑on maintenance and repair worker, leverages bilingual communication and a knack for improvising solutions across electrical, plumbing, HVAC, and carpentry
    tasks while battling a tendency to procrastinate on documentation and scheduling as she hustles toward EPA‑608 and OSHA certifications and a future supervisory role.
  sports: Daniela Morera cycles the coastal trails near Manatí five times a week, belongs to the local Manatí Cyclists club, cheers on the Cangrejeros de Santurce basketball team and follows the San Juan
    FC soccer squad, while occasionally joining community beach volleyball pick‑ups that satisfy her love for spontaneous, low‑key fitness.
  arts: Daniela Morera’s artistic life spins around a mixtape of Bad Bunny, Marc Anthony, and Tame Impala that scores her cooking sessions, a wall‑filled gallery of vibrant street murals she photographs
    on her modest camera, and a habit of devouring Wired and iFixit articles that feed her indie‑tech curiosity.
  travel: Daniela Morera prefers spur‑of‑the‑moment road trips along the island’s western coast—past visits to Cabo Rojo’s cliffs and Vieques’ bioluminescent bay have left her yearning for a future eco‑tour
    of Costa Rica—yet she often squeezes itineraries into weekend windows, balancing limited funds with a desire for both adventure and beach relaxation.
  culinary: Daniela Morera whips up hearty mofongo with chicharrón, crispy tostones, and a splash of lime while the kitchen fills with salsa beats, often experimenting with pastelón layered with sweet plantains
    and queso blanco, and she adds a dash of cumin and cilantro to every dish, showcasing a moderate cooking skill that leans heavily on her family recipes.
  core: Daniela Morera channels a restless curiosity into DIY repairs and bike rides, yet wrestles with chronic worry, a love for spontaneous music‑fueled cooking, and a habit of putting off paperwork until
    the last minute.
background:
  cultural: Daniela grew up in Manatí, a town on Puerto Rico’s northern coast, where community and family are central. She was raised in a bilingual household, speaking Spanish at home and using English
    at school and work. Puerto Rican cultural traditions—such as the vibrant music of salsa and plena, festive local celebrations, and the shared meals of arroz con gandules—have shaped her values of camaraderia
    and respeto. The island’s warm climate and coastal setting fostered her love for outdoor activities and a practical, hands‑on approach to life. Her cultural identity also instills a strong sense of
    resiliency and a willingness to help neighbours, which she brings to her maintenance work and community involvement.
attributes:
  skills: '["Basic electrical repairs", "Plumbing maintenance", "HVAC troubleshooting", "Carpentry repairs", "Preventive maintenance", "Power tools operation", "Technical schematics reading", "Improvisational
