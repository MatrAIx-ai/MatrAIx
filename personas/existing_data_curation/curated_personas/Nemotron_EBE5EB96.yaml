  hobbies: '[''Street-Art Exploration'', ''Sketching'', ''Digital Photography'', ''Surfing'', ''Basketball'', ''Live Jazz and Hip-Hop Events'', ''Reading Sci-Fi & Philosophy'', ''Podcast Listening'', ''Competitive
    Video Gaming'', ''Journaling'', ''Mindfulness Meditation'']'
  career_goals: Jamal aims to transition from sales associate to assistant manager within the next year, then to store manager and eventually a district manager role. He plans to complete an online Bachelor’s
    degree in Business Administration to strengthen his leadership credentials. Long-term, he hopes to open a boutique that showcases work by local artists and offers a curated, art-focused shopping experience.
    He also wants to mentor younger retail staff and launch a community program that brings art workshops to underserved neighborhoods.
