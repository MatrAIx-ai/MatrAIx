  career_goals: Delena envisions a future where she can combine her love of communication with her desire to help others manage stress and emotional wellbeing. She aims to study communications, journalism,
    or public health at a university, with the long-term goal of becoming a mental-health advocate or community outreach coordinator. She dreams of creating a youth-focused platform—such as a podcast or
    online magazine—that provides practical coping strategies, promotes mental-health awareness, and gives a voice to teenage experiences. In the shorter term, she plans to take leadership roles in her
    high school student council, join the school newspaper, and seek internships or volunteer work with local health organizations. Ultimately, she hopes to earn a degree in public relations or counseling,
    and later work in a setting that blends media, community engagement, and mental-health support.
