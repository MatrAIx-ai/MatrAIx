persona_description: A paleoecologist or forest historian who specializes in reconstructing the fire and vegetation history of mid-elevation mixed-conifer forests in the eastern Cascades, Washington, USA.
  They are likely to be interested in understanding the long-term fire dynamics in these environments and determining whether Holocene fire activity in this watershed was intermediate to fire regimes observed
  at higher and lower elevations in the eastern Cascades. They may also be interested in comparing the Holocene fire regimes at Long Lake with other eastern Cascade sites to better understand the patterns
  and dynamics of fire in these ecosystems.
