personas:
  professional: A veteran aluminum foundry molder and caster, Rosamaria Linares applies meticulous pattern‑making expertise and disciplined process‑control to lead a team, channeling their curiosity for
    sustainable alloys and the collaborative spirit honed through years of communal workshops into mentoring apprentices and spearheading eco‑friendly casting initiatives.
  sports: Rosamaria Linares enjoys hiking with the Sandia Trailblazers club, cheering on the Albuquerque Isotopes during spring baseball season and supporting New Mexico United’s soccer matches, while they
    fit in weekly strength‑training circuits to counter osteoarthritis and maintain the stamina needed for long days in the foundry.
  arts: Rosamaria Linares immerses herself in the Albuquerque arts scene, frequenting gallery openings showcasing Georgia O’Keeffe’s Southwestern palette, participating in pottery workshops inspired by
    Pueblo ceramists, and drawing creative inspiration from metal sculptor Luis Jiménez, while they enjoy listening to Los Lobos during studio sessions and often contribute to Día de los Muertos art installations.
  travel: Rosamaria Linares plans trips with meticulous itineraries and spontaneous detours, having explored the adobe streets of Santa Fe and the ceramics markets of Oaxaca, while yearning to attend a
    metal‑casting symposium in Barcelona and hike the Andean trails of Peru, balancing travel costs with a modest savings plan and a desire to bring back techniques for community workshops.
  culinary: Rosamaria Linares is a confident home chef who often prepares red‑and‑green chile enchilada casseroles, carne adovada, and fresh tamales using garden‑grown Hatch chilies, roasted garlic, and
    oregano, while they occasionally experiment by infusing smoky chipotle into classic New Mexican sopapillas for communal meals.
  core: Rosamaria Linares blends disciplined aluminum casting expertise with a vibrant love for community arts, juggling meticulous process improvement and spontaneous garden chili harvests, all while wrestling
    with a chronic worry about meeting high standards.
background:
  cultural: Rosamaria is a second‑generation Hispanic woman rooted in the Hispano community of Albuquerque. She grew up bilingual, speaking both Spanish and English at home, and maintains a strong connection
    to family traditions such as Día de los Muertos celebrations and communal meals featuring chile‑based dishes. Her cultural heritage influences her appreciation for handcrafted work, evident in her interest
    in combining functional casting with artistic design. She actively participates in local Hispanic cultural events, supports regional artisans, and values the communal spirit of mutual aid that is characteristic
    of her neighborhood. This background informs her collaborative work style, her desire to mentor younger community members, and her commitment to preserving and evolving traditional craftsmanship within
    a modern industrial setting.
attributes:
  skills: '[''Aluminum sand casting'', ''Pattern making'', ''CNC machine operation'', ''Quality control & inspection'', ''Safety compliance (OSHA)'', ''Process optimization'', ''Inventory management'',
    ''Team leadership & mentorship'', ''Technical documentation'', ''Sustainable casting practices'']'
  hobbies: '[''Pottery and small‑scale metal casting'', ''Visiting art galleries and museums'', ''Cooking New Mexican cuisine'', ''Hiking the Sandia Mountains'', ''Teaching metalworking workshops for youth'',
    ''Dancing at cultural festivals'', ''Reading art‑history and design books'', ''Gardening (chilies, herbs)'']'
  career_goals: Rosamaria aims to move into a supervisory role where she can lead a cross‑functional team focused on eco‑friendly casting processes. She aspires to earn a certification as a Certified Foundry
    Engineer and to spearhead a pilot project that reduces emissions and scrap rates at her plant. Over the next five years, she hopes to establish a mentorship program for young Hispanic workers in the
    region, preserving craftsmanship while fostering career advancement. Ultimately, she envisions branching into a niche market producing artistic metal sculptures that combine her technical skill with
    her love of art, possibly launching a small boutique foundry that collaborates with local artists.
