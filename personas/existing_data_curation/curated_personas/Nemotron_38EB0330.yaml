  hobbies: '[''Nature walks and rock collecting'', ''LEGO building'', ''Scratch programming'', ''Singing and performing skits'', ''Baking with family'', ''Reading mystery novels'', ''Playing group games
    at the local park'', ''Visiting the Chautauqua County Fair'']'
  career_goals: Although still young, Annmarie imagines a future where she can combine her love of talking to people with her curiosity about the world. She hopes to become a science teacher or a community
    radio host, positions that would let her share discoveries, interview neighbors, and celebrate local stories. She also dreams of working at an animal shelter or a nature center, where she can apply
    her practical problem‑solving skills to help care for animals and protect the outdoors she enjoys exploring.
