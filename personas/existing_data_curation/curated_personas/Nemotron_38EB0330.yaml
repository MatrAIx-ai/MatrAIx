personas:
  professional: Annmarie Mapes is a budding young technologist who blends curiosity about nature with hands-on creativity, spending afternoons building LEGO cities, sketching observations in a nature journal,
    and coding simple Scratch games that they share proudly with classmates.
  sports: Annmarie Mapes joins the local Peewee soccer league on Saturdays, roots for the Buffalo Bills during football season, and spends summer afternoons climbing trees and exploring the nearby creek,
    preferring unstructured play over organized workouts, yet they sometimes attend a family-friendly yoga class at the community center for flexibility.
  arts: Annmarie Mapes delights in performing impromptu skits and singing short songs for family, frequently drawing inspiration from the whimsical humor of "Adventure Time" and the catchy tunes of Taylor
    Swift's kid-friendly tracks, while they devour mystery books by R.L. Stine, which fuel their creative storytelling during school assemblies.
  travel: Annmarie Mapes loves day trips to the nearby Chautauqua County Fair, where they ride the Ferris wheel and sample funnel cake, dreams of visiting Niagara Falls to hear the roaring water, and prefers
    spontaneous, family-planned outings over meticulously booked tours, often packing a backpack with a snack bar, a nature journal, and a LEGO minifigure for luck.
  culinary: Annmarie Mapes enjoys baking chocolate chip cookies with their mother, proudly perfecting the crisp edging and gooey center, and also loves a well-made mac and cheese with a sprinkle of cheddar,
    often experimenting by adding a pinch of cinnamon to their cookie dough for an unexpected twist.
  core: Annmarie Mapes is a curious, talkative ten-year-old whose love of nature, LEGO building, and spontaneous performances fuels a lively, slightly disorganized life that they navigate with practical
    saving habits and the joy of everyday adventure.
background:
  cultural: Annmarie was born and raised in Clymer, a small rural community in Chautauqua County, New York. Her family belongs to the local public school system and participates in community events such
    as the county fair, town clean‑up days, and seasonal church gatherings. The community places a high value on neighborly support, outdoor recreation, and seasonal traditions like Thanksgiving potlucks
    and summer picnics by the creek. Growing up in this Mid‑Atlantic setting, she has been exposed to a blend of traditional American values—respect for nature, community involvement, and a pragmatic work
    ethic—while also accessing broader ideas through school programs and internet resources.
