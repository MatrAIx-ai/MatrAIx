    User 1: I''m sure it has. But you''re not alone.

    User 2: I know. I have my kids to keep me going.

    User 1: That''s great. They''re lucky to have you.

    User 2: Thanks. I''m lucky to have them too.

    User 1: So, what are you going to do now?

    User 2: I''m not sure yet. I''m thinking about going back to school.

    User 1: That''s a great idea. What do you want to study?

    User 2: I''m not sure yet. I''m thinking about something in the medical field.

    User 1: That would be great. You could be a doctor or a nurse.

    User 2: I know. I''m excited about it.

    User 1: I''m sure you''ll do great.

    User 2: Thank you. I hope so.

    User 1: So, what do you like to do for fun?

    User 2: I like to go shopping, go to the movies, and read.

    User 1: Oh, me too. I love to read. What''s your favorite book?

    User 2: I love The Hunger Games series.

    User 1: Me too! I''ve read all of them.

    User 2: Oh, cool. We should read them together sometime.

    User 1: That would be fun.

    User 2: Great. I''ll bring the books.

    User 1: Okay. I''ll bring the snacks.

    User 2: Sounds good. We''ll have a movie night.

    User 1: That sounds great. I''ll bring the popcorn.

    User 2: Okay. I''ll bring the soda.

    User 1: Great. See you then.

    User 2: See you.'
