personas:
  professional: Carmen Woods, a seasoned postsecondary instructor specializing in curriculum development and instructional design, blends data‑driven assessment tools with culturally responsive lesson plans,
    channels their sociable energy into dynamic workshops, and leverages their organizing knack to steer community outreach while remaining flexible enough to pivot when campus priorities shift.
  sports: Carmen Woods follows the Brooklyn Nets and New York Yankees with avid enthusiasm, regularly plays pickup basketball with the Crown Heights Community Center league, and balances their competitive
    streak by attending weekday yoga sessions at a nearby studio.
  arts: Carmen Woods immerses themselves in the arts by acting in the Bushwick Playhouse’s community theater productions, handling stage management for shows that feature works by Lin‑Manuel Miranda, while
    they unwind at local venues listening to live sets by Kendrick Lamar, Lizzo, and the timeless grooves of Miles Davis.
  travel: Carmen Woods prefers purposeful travel, having explored Kingston’s reggae roots and Trinidad’s Carnival before planning a cultural immersion trip to Dublin’s literary festivals, while balancing
    family obligations and a modest travel fund that guides them toward off‑season flight deals and weekend getaways to nearby Hudson Valley vineyards.
  culinary: Carmen Woods showcases their culinary flair by mastering Southern‑Caribbean staples like jerk‑marinated chicken with scotch bonnet pepper, shrimp and grits seasoned with thyme and smoked paprika,
    and sweet potato pie spiced with nutmeg, often hosting weekend potlucks where friends rave about their perfectly crisp plantain chips.
  core: Carmen Woods is a community‑driven educator who juggles lecture halls, theater rehearsals, and volunteer tutoring with a boundless talkative energy, yet wrestles with persistent worry that they
    manage through nightly yoga and occasional midnight cravings for extra‑cheesy pizza.
background:
  cultural: Carmen grew up in a close‑knit Black family in Brooklyn’s Crown Heights neighborhood, where the rhythms of gospel music, Caribbean celebrations, and activist gatherings shaped her worldview.
    Her parents emphasized the importance of community solidarity, storytelling, and education as tools for empowerment. She attended a local public high school, where teachers who used culturally relevant
    curricula sparked her love for learning. The neighborhood’s mix of African‑American, Caribbean, and immigrant cultures gave her a deep appreciation for diverse traditions, which she weaves into her
    teaching and community work. Carmen remains active in her church’s outreach ministry, participates in Black cultural festivals, and mentors young Black professionals, honoring the legacy of the civil‑rights
    era while forging her own path in modern urban education.
