  hobbies: '[''Attending live jazz and hip‑hop concerts'', ''Community theater acting and stage management'', ''Cooking Southern and Caribbean cuisine'', ''Yoga and mindfulness meditation'', ''Volunteering
    at after‑school tutoring programs'', ''Exploring street art and murals'', ''Participating in neighborhood block parties'']'
  career_goals: Carmen aims to earn a bachelor’s degree in Education within the next two years, positioning herself for a tenure‑track position and eventually a department chair role at her institution.
    She dreams of establishing a Brooklyn‑based community education program that offers after‑school tutoring and adult learning courses focused on African‑American history and digital literacy. Additionally,
    she aspires to become a recognized speaker on culturally responsive teaching at national conferences, publish a guidebook on integrating community resources into postsecondary curricula, and influence
    policy that promotes equitable access to higher education for underserved students.
