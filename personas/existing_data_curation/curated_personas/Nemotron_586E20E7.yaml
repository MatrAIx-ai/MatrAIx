  hobbies: '[''soccer'', ''basketball'', ''multiplayer video gaming'', ''LEGO building'', ''Scratch coding projects'', ''hiking'', ''collecting baseball cards'', ''playing ukulele'']'
  career_goals: While still young, Ilya envisions a future where he can blend his love for routine practice, competition, and practical problem-solving. He hopes to become a professional soccer player or,
    alternatively, a video-game developer focused on sports-themed games, allowing him to stay connected to teamwork and competition. He plans to attend a high school with strong STEM and athletics programs,
    maintain a disciplined daily training and coding schedule, and eventually earn a degree in computer science or sports science. His long-term ambition is to work in a career that offers a clear set of
    responsibilities - whether on the field, in a design studio, or in an engineering workshop - while still giving him the flexibility to adapt his routine as needed.
