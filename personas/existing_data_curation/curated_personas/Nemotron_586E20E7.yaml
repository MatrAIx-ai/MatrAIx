personas:
  professional: Ilya Crosby, a budding robotics hobbyist who builds LEGO sets and programs strategy games in Scratch, channels their competitive streak into weekly coding challenges, applying a practical,
    routine‑driven mindset to solve problems step‑by‑step.
  sports: Ilya Crosby, a member of the Cedar City Youth Soccer Club and the local Future Basketball League, cheers for the Utah Jazz and Real Salt Lake, hones three‑point shooting at the community park
    after school, runs cross‑country for the school track team in the fall, and never misses a weekend trek to Zion National Park, blending team sports with endurance pursuits, and they often organize practice
    games for their teammates.
  arts: Ilya Crosby, a budding ukulele enthusiast who practices songs by Jack Johnson and Taylor Swift, regularly attends the Utah Shakespeare Festival with family, builds LEGO‑based sculptures for display,
    and designs interactive Scratch stories inspired by Star Wars and Marvel movies, weaving together music, theater, and digital creativity, and they frequently share their Scratch creations online.
  travel: Ilya Crosby, an eager weekend explorer, favors family‑planned trips to nearby national parks like Zion and Bryce Canyon for familiar hikes, while dreaming of a future road trip to Yellowstone
    and a summer vacation on the Hawaiian islands, balancing structured itineraries with occasional spontaneous detours to hidden waterfalls, and they keep a travel journal of each hike.
  culinary: Ilya Crosby, a modest home‑cook, loves tossing pepperoni pizza with extra mozzarella, whipping up cheese quesadillas with mild salsa, stirring up chili spiced with a pinch of cumin, and mixing
    trail‑mix snacks of almonds, dried apricots, and chocolate chips for hikes, often improvising with whatever ingredients are on hand, and they sometimes add a dash of hot sauce to their chili for extra
    kick.
  core: Ilya Crosby, an energetic eleven‑year‑old who thrives on routine, competitive gaming, hands‑on LEGO building, and weekend hikes, stays calm and resilient while occasionally splurging impulsively
    on a trading card, and they embody a practical yet sociable outlook.
background:
  cultural: Ilya grew up in Cedar City, a small town in southwestern Utah known for its close-knit community, outdoor recreation, and a mix of LDS (Mormon) and broader American cultural influences. His
    family values practicality, self-reliance, and routine, reflecting the region's traditional, conservative ethos. Community events such as the Utah Shakespeare Festival, school sports, and local church
    gatherings shape his social life. The surrounding landscape of cliffs, forests, and nearby national parks fosters an appreciation for nature and activities like hiking and camping. These cultural elements
    combine with his middle-class upbringing to produce a pragmatic yet socially vibrant background that emphasizes hard work, teamwork, and a love for familiar, structured activities.
attributes:
