persona_description: A person who is passionate about teaching and helping others, particularly those who are at risk of suffering out-of-hospital cardiac arrests. They are likely to be a teacher, paramedic,
  or a healthcare professional who has a strong interest in CPR and the Chain of Survival. They may also have a background in public health or emergency response, and be aware of the importance of CPR in
  saving lives. They are likely to be involved in teaching CPR and the Chain of Survival to students, either in the classroom or through community outreach programs. They may also be involved in research
  or advocacy efforts to improve CPR education and access to it.
