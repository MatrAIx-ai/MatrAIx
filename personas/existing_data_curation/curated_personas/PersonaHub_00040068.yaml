persona_description: A researcher or scientist who is interested in the genetic and environmental factors that influence intelligence, particularly in the context of intelligence quotients (IQ). They are
  likely to be curious about the complex nature of intelligence and how it is determined by both genetic and environmental factors. They may be interested in studying the similarities and differences in
  IQ within families, looking for specific areas of the genome associated with IQ, and exploring the influence of the environment on intelligence. They may also be interested in the challenges of distinguishing
  the effects of genetics and environment in determining intelligence.
