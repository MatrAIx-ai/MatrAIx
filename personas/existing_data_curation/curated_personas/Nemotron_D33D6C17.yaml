  hobbies: '[''Reading true-crime biographies'', ''Historical nonfiction reading'', ''Dog walking along Patapsco River Trail'', ''Garden cultivation (tomatoes, herbs)'', ''Chess club'', ''Classic jazz and
    soul music'', ''Restoring a 1965 Chevrolet'']'
  career_goals: Hasan aims to transition into a senior supervisory role, such as Lieutenant or Captain, where he can shape department policy around community engagement and mental‑health response. He is
    dedicated to developing a comprehensive training curriculum for de‑escalation and cultural competence, mentoring the next generation of officers, and fostering stronger trust between the police and
    the predominantly African‑American neighborhoods of Anne Arundel County. Over the next five years, he plans to earn the department’s Advanced Leadership Certification and, following retirement, serve
    as a consultant for community‑based safety initiatives.
