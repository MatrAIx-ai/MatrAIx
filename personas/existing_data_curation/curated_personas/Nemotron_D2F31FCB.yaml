personas:
  professional: Orisel Delanuez, a 53‑year‑old journeyman electrician with over three decades of residential, commercial, and industrial wiring experience, blends meticulous project scheduling and safety‑first
    leadership with a pragmatic drive to mentor women apprentices and expand into solar retrofits as they pursue Master Electrician licensure.
  sports: Orisel Delanuez, a 53‑year‑old avid baseball fan, roots for the Philadelphia Phillies and the Puerto Rico national team while joining the Fairmount Park Flyers adult softball league for occasional
    weekend games and walking with the Philadelphia Cycling Club to stay active.
  arts: Orisel Delanuez, a 53‑year‑old who revels in salsa nights to the rhythms of Celia Cruz and Marc Anthony, engages in a mystery‑novel book club dissecting Agatha Christie and Tana French, and delights
    in annual Caribbean cultural festivals where they admire traditional dance troupes and vibrant mural art.
  travel: Orisel Delanuez, a 53‑year‑old who prefers meticulously planned itineraries, often combines short weekend road trips to historic towns like Lancaster, PA with annual vacations to Caribbean islands
    such as Old San Juan and has a bucket‑list yearning to explore Barcelona’s architecture while balancing family and budget constraints.
  culinary: Orisel Delanuez, a 53‑year‑old home‑cook who masterfully prepares mofongo, arroz con gandules, and herb‑infused grilled fish using garden‑grown cilantro, cumin, and plantain peels, balances
    a high cooking confidence with the occasional penchant for over‑salting, and treats themselves to occasional trips to local seafood bistros for fresh oysters.
  core: Orisel Delanuez, a 53‑year‑old electrician with a meticulous mind, channels their love for salsa, community, and safety into a life where structured schedules meet spontaneous dance, yet they often
    worry about tomorrow’s invoice while secretly hoarding extra copper wire for future projects.
background:
  cultural: Orisel’s cultural background is rooted in her Puerto Rican heritage, shaped by a bilingual upbringing that blends Spanish traditions with American life. Growing up in a close-knit Puerto Rican
    family, she inherited strong community values, a love for music and dance, and a deep appreciation for family gatherings centered around food. In Philadelphia, she stays connected to the vibrant Puerto
    Rican community through local festivals, the annual Puerto Rican Day Parade, and cultural organizations, while also navigating the multicultural landscape of the city. Her heritage influences her work
    ethic, emphasizing resilience, loyalty, and a collaborative spirit, and she often incorporates Spanish into daily conversation and community interactions.
attributes:
  skills: '["Electrical wiring and conduit installation", "Blueprint reading and schematic interpretation", "Load calculation and circuit design", "Troubleshooting and fault diagnosis", "NEC compliance
    and permitting", "Solar PV and energy-efficient retrofits", "Project planning and crew scheduling", "Safety compliance (OSHA, CPR/First Aid)", "Team leadership and apprenticeship mentorship", "Customer
    communication and service"]'
  hobbies: '["Salsa dancing", "Cooking Puerto Rican dishes", "Gardening", "Volunteering with youth apprenticeship programs", "Walking in Fairmount Park", "Watching baseball", "Women’s book club", "Attending
    Puerto Rican cultural festivals"]'
  career_goals: Orisel aims to obtain Master Electrician licensure within the next two years, positioning herself to lead larger commercial projects and mentor the next generation of electricians, especially
    women and Latino apprentices. She plans to deepen her expertise in renewable-energy systems by earning certifications in solar installation and energy-efficient retrofitting. Ultimately, she envisions
    launching a modest family-owned electrical contracting firm that prioritizes safety, reliability, and community service, providing a predictable schedule and financial security for her family while
    giving back to the Puerto Rican community in Philadelphia.
