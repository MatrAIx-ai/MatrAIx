  career_goals: Joseph aims to advance from senior drafter to a CAD manager role, overseeing a team of drafters and integrating more artistic creativity into engineering projects. He plans to pursue a professional
    engineer (PE) license to broaden his technical authority and eventually transition into a design engineer position focused on sustainable, user‑centered product development. Balancing his ambition,
    he seeks a work environment that offers flexibility and supports his well‑being, allowing him to manage stress while contributing innovative ideas to his organization.
