personas:
  professional: Bradley Santeramo, a retired business administrator turned community arts coordinator, blends his meticulous budgeting expertise with a vivid imagination to organize senior watercolor workshops,
    curate a traveling photo‑essay of historic farms, and steer grant proposals for the Madison County Historical Society.
  sports: Bradley Santeramo enjoys low‑impact recreation, fishing on Lake Greenwood at dawn, playing forward for the Madison County senior softball league, cheering the local high school football team,
    the Madison County Mustangs, and occasionally watching the Jacksonville Jaguars on television.
  arts: Bradley Santeramo paints watercolor scenes of native Florida wildflowers, creates abstract digital illustrations of historic barns, curates a monthly senior art showcase featuring works by local
    painters, and finds inspiration in the jazz of Miles Davis, the piano works of Bill Evans, and the photography of Ansel Adams.
  travel: Bradley Santeramo favors purposeful road trips that blend heritage and nature, such as a weekend drive to the historic streets of St. Augustine for its colonial architecture and a sunrise hike
    in the Ocala National Forest, while dreaming of a future pilgrimage to Tuscany’s rolling vineyards to explore family culinary roots.
  culinary: Bradley Santeramo delights in rolling homemade gnocchi tossed in sage‑brown butter alongside heirloom tomato salads, and his garden yields basil, oregano, and wildflower honey that he incorporates
    into rustic wood‑fire pizza dough, reflecting a palate that balances comfort food with farm‑to‑table freshness.
  core: Bradley Santeramo is a methodical, art‑loving retiree who channels his worry into meticulous community projects, savoring garden‑grown meals and late‑night watercolor sessions while never missing
    a chance to mentor younger artists.
background:
  cultural: Bradley comes from a multi‑generational white family with roots in both Southern Appalachian and Italian‑American traditions. His grandparents settled in Madison County during the post‑World
    War II migration, bringing a blend of Italian culinary customs—such as homemade pasta and Sunday family meals—and the Southern values of hospitality, community involvement, and respect for the land.
    Raised in a modest, Catholic household, he maintained many of the rituals of the faith while also embracing the secular, nature‑oriented lifestyle of rural Florida. These cultural strands influence
    his love of food, storytelling, and an enduring sense of responsibility to his local community.
