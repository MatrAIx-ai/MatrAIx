persona_description: A researcher involved in the International Bovine Genome Sequencing Project, focusing on the sequencing and assembly of the bovine genome. The researcher has expertise in genomics,
  particularly in the area of full-length cDNA sequencing and gene annotation. The researcher is part of a Canadian team led by Marco Marra, Ph.D., at the British Columbia Cancer Agency. The researcher
  is also a member of the International Bovine Genome Sequencing Program Steering committee, which meets through monthly conference calls to coordinate the annotation of the bovine genome sequence. The
  researcher is also involved in the Canadian component of the project, funded by Genome Canada and led by scientists in British Columbia and Alberta, and ended in July 2007.
