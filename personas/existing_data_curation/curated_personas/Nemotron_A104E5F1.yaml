personas:
  professional: Meika Hodges, a retired church event coordinator, leverages their meticulous bookkeeping, volunteer‑management expertise, and warm‑hearted compassion to mentor younger volunteers and keep
    the local outreach programs thriving while documenting community stories for future generations.
  sports: Meika Hodges enjoys low‑impact fitness through daily walks around their garden, participates in the local senior center’s gentle yoga class, and never misses the Friday night high school football
    game featuring the Tar Heel Tigers, while cheering on the Carolina Panthers during the NFL season.
  arts: Meika Hodges finds inspiration in gospel legends like Mahalia Jackson and folk icons such as Bob Dylan, sings in their church choir, reads Agatha Christie mysteries and Philippa Gregory historical
    novels, and crafts quilts featuring William Morris designs, all of which nurture their creative spirit.
  travel: Meika Hodges favors leisurely road trips to nearby historic towns like Asheville, Charleston, and Savannah, often traveling with their daughter’s family in a modest RV, and dreams of strolling
    the Blue Ridge Parkway during fall, balancing their love of exploration with health‑friendly pacing and a modest travel budget.
  culinary: Meika Hodges delights in cooking classic Southern dishes such as fried chicken, collard greens, and peach cobbler using fresh garden produce like heirloom tomatoes and sweet potatoes, bakes
    buttery biscuits and banana pudding, and occasionally over‑salts a stew when they get caught up in reminiscing about family stories.
  core: Meika Hodges blends steadfast organization, gentle compassion, and a curiosity for new garden varieties into a life of community service, flavorful cooking, and quiet reflection.
background:
  cultural: Meika grew up in a small, close‑knit community in the foothills of Rutherford County, North Carolina, within a white, Anglo‑American family of English and Scots‑Irish ancestry. Raised in the
    Baptist tradition, she embodies Southern hospitality, strong church ties, and a deep sense of communal responsibility typical of the Appalachian region. Her formative years spanned the post‑World War II
    era and the civil‑rights movement, shaping a pragmatic yet compassionate worldview. She carries forward traditions of Southern cooking, gardening, quilting, and oral storytelling while embracing new
    ideas through community programs and intergenerational mentorship.
