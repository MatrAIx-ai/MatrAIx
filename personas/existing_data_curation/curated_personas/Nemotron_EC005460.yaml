personas:
  professional: Kathryn Arcangel, a retired office administrator turned volunteer coordinator, leverages meticulous bookkeeping, Excel wizardry, and grant‑writing prowess to design a data‑driven scheduling
    system for the Butte Historical Society, while their competitive drive fuels a quest to be recognized as Jefferson County’s top volunteer organizer.
  sports: Kathryn Arcangel, an avid hiker who leads weekly treks for the Rocky Mountain Hiking Club and cheers for the Denver Broncos on Sundays, keeps fit through moderate trail walks, a seasonal yoga
    routine, and occasional community softball games, balancing a competitive spirit with the camaraderie of local senior outdoor groups.
  arts: Kathryn Arcangel, a dedicated quilter who stitches blocks inspired by prairie grasses, reads historical nonfiction by David McCullough, and enjoys the folk ballads of Joan Baez, weaves these artistic
    influences into storytime sessions at the library, providing both cultural enrichment and personal creative release.
  travel: Kathryn Arcangel, a meticulous travel planner with a penchant for national‑park photography, has already documented hikes through Yellowstone, Grand Teton, and Rocky Mountain National Parks, and
    now aims to capture sunrise at Zion, explore the cliffs of Acadia, and trek the glaciers of Glacier National Park within the next five years.
  culinary: Kathryn Arcangel, who delights in cooking seasonal farm‑to‑table meals such as roasted root‑vegetable stew with sage, heirloom tomato caprese, and apple crisp with cinnamon, skillfully blends
    garden harvests with fresh herbs like rosemary and thyme, and regularly shares these dishes at community potlucks.
  core: Kathryn Arcangel, the 69‑year‑old garden‑loving volunteer with a competitive edge, balances meticulous spreadsheets, skeptical curiosity, and occasional seed‑hoarding tendencies while championing
    community heritage through volunteer leadership.
background:
  cultural: Kathryn was born in a Midwestern small town to a family of German‑Scandinavian descent and relocated to Butte, Montana in her early adulthood. Her upbringing emphasized self‑reliance, hard work,
    and community service—values reinforced by the close‑knit, frontier spirit of the mining community. Identifying with mainstream white American cultural norms, she celebrates holidays such as Independence
    Day and Thanksgiving and grew up in a Protestant Christian environment that shaped her sense of duty, modesty, and reliability. The regional heritage of mining, rugged landscapes, and local history
    deeply influences her appreciation for preservation and community involvement.
