  career_goals: Although retired from formal employment, Kathryn aims to stay highly engaged in her community. She plans to mentor younger volunteers at the Butte Historical Society, spearhead the creation
    of a data‑driven volunteer scheduling system to improve efficiency, and earn a certification in digital preservation to safeguard local mining records. She aspires to publish a memoir that intertwines
    personal history with regional heritage, and she sets a personal challenge to visit three new national parks within the next five years, documenting each trip with photography and research. Her competitive
    streak drives her to be recognized as the leading volunteer coordinator in Jefferson County.
