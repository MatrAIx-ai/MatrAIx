personas:
  professional: Michelle Mostella, a retired senior services coordinator turned community mentor, leverages decades of volunteer experience, active listening, and conflict mediation to organize multicultural
    events, lead knitting circles and cooking workshops, and now spearheads a weekly storytelling circle for youth, blending curiosity with practical budgeting and tech‑savvy troubleshooting.
  sports: Michelle Mostella enjoys low‑impact fitness through daily walks around her Miami neighborhood, participates in a senior salsa dance class that doubles as cardio, roots for the Miami Heat and Miami
    Marlins, occasionally joins a walking club that meets at the local park, and follows professional tennis on the US Open to inspire her own rhythm and coordination.
  arts: Michelle Mostella finds inspiration at local jazz concerts featuring the Marsalis family and Ella Fitzgerald tributes, reads historical fiction by authors such as Hilary Mantel and biographies of
    pioneering figures, and supports the Wynwood Arts District murals, while also taking salsa lessons that blend music, movement, and cultural storytelling.
  travel: Michelle Mostella prefers short, purposeful trips, such as weekend getaways to Key West’s historic Old Town, day excursions to the Everglades for birdwatching, and occasional cruises to the Caribbean
    islands where she can explore the flavors that influence her cooking, all while balancing travel plans with her volunteer commitments and a modest budget.
  culinary: Michelle Mostella’s kitchen is a vibrant fusion of soul food and Caribbean cuisine, where she perfects dishes like jerk chicken, callaloo, collard greens seasoned with smoked paprika, and plantain
    fritters, uses fresh herbs from her balcony—including lemongrass, basil, and mint—to create bold sauces, and while she excels at improvisation, she sometimes over‑salts and then rescues the dish with
    a splash of lime.
  core: Michelle Mostella blends pragmatic budgeting with a boundless curiosity for cultural stories, dancing, and cooking, all while juggling osteoarthritis, occasional forgetfulness about meds, and a
    habit of over‑salting her beloved Caribbean dishes.
background:
  cultural: Michelle is a second‑generation African‑American with deep roots in Miami's vibrant Black community. Her mother emigrated from Jamaica, and her father grew up in the Southern United States before
    moving to Florida during the Great Migration. This blend of African‑American and Caribbean heritage informs her love for reggae, soul food, and community solidarity. Growing up in the multicultural
    tapestry of Miami‑Dade County, she absorbed influences from Latinx, Haitian, and Afro‑Caribbean neighbors, shaping a culturally fluid identity that values both tradition and the dynamic rhythms of contemporary
    South Florida.
