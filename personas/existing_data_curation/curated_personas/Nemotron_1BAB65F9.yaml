  career_goals: Although retired from formal employment, Michelle aims to deepen her impact as a community mentor and cultural steward. She plans to lead a weekly storytelling circle for grandchildren and
    local youth, documenting oral histories of Black Miami residents. She also hopes to co‑author a memoir that weaves her life experiences with the broader narrative of civil rights and Caribbean immigration
    in South Florida. Additionally, she aspires to champion the creation of a neighborhood garden that provides fresh produce and a gathering space for seniors.
