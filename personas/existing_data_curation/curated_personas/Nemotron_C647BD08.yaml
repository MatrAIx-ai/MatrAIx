  career_goals: Zenaida aspires to become a bilingual elementary school teacher, hoping to combine her love for organization, structure, and helping others. She wants to create a supportive classroom where
    students feel safe and valued, and where she can incorporate Venezuelan cultural elements to promote diversity. She also dreams of pursuing a degree in education that will allow her to develop curricula
    that balance clear expectations with creative learning. In the long term, she hopes to mentor other immigrant children and possibly work on community programs that provide tutoring and cultural enrichment.
