personas:
  professional: Zenaida Maymi, a budding game developer, blends their love for mystery novels with methodical Scratch programming to prototype interactive detective games, using their organized planning
    skills to set clear milestones and collaborate reliably with classmates.
  sports: Zenaida Maymi, a committed midfielder on their middle‑school soccer team, follows a structured after‑school practice schedule to channel stress, cheers for the Los Angeles Galaxy during the MLS
    season, and joins a seasonal community swim club in the summer to stay fit, and they find the routine calming.
  arts: Zenaida Maymi, an avid sketcher and piano enthusiast, draws inspiration from Agatha Christie’s mystery plots and Frida Kahlo’s bold colors, practices Beethoven’s “Moonlight Sonata” daily, and participates
    in salsa‑joropo dance workshops where they mirror the rhythmic flair of Carlos Vives, channeling their curiosity into every brushstroke and note.
  travel: Zenaida Maymi, an organized young traveler, prefers itineraries with detailed checklists, loves weekend getaways to the nearby coastal town of Clearwater and annual family trips to Disney World,
    and dreams of exploring the historic streets of Cartagena and the Andes of Peru once they save enough for a school‑sponsored exchange, planning each stop down to the snack for them.
  culinary: Zenaida Maymi, a budding home chef, enjoys preparing traditional family arepas with corn masa, shredded cheese, and avocado, crafts empanadas stuffed with spiced ground beef and plantains, and
    experiments with adding chorizo and queso fresco, showcasing intermediate cooking skills and a love for bold, comforting flavors, and they relish the tactile process of shaping the dough.
  core: Zenaida Maymi thrives on structure, balancing mystery‑filled creativity with meticulous planning, yet often wrestles with worry and occasional sticker‑buying impulsivity that color their otherwise
    disciplined world, and they navigate each day with a careful blend of curiosity and caution.
background:
  cultural: Zenaida comes from a Venezuelan immigrant family that settled in Buford, Georgia. At home, Spanish is spoken daily, and family gatherings feature music, stories, and dishes from Venezuela, such
    as arepas, hallacas, and black beans. Her parents celebrate Venezuelan holidays like Día de la Independencia (July 5) and Carnaval, while also integrating Southern American traditions like Thanksgiving.
    The family maintains strong ties to the local Venezuelan diaspora, attending church services and community events that emphasize mutual support, education, and cultural preservation. These experiences
    shape Zenaida’s bilingual identity and her appreciation for both her heritage and her American community.
