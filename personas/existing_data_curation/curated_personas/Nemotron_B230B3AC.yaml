  hobbies: '[''Gardening (heirloom vegetables and chilies)'', ''Cooking Mexican cuisine'', ''Folklórico and salsa dancing'', ''Astronomy club participation'', ''Hiking in the Flint Hills'', ''Volunteering
    for computer literacy workshops'', ''Reading historical fiction and science biographies'', ''Organizing teacher book‑exchange circles'']'
  career_goals: Inés aims to step into a leadership role as a STEM department chair or instructional technology coordinator within the Wichita public school system. She aspires to expand her impact by securing
    state and private funding to launch a regional STEM enrichment program that serves underrepresented Mexican‑American students. Over the next five years, she plans to pursue an Ed.D. focused on STEM
    education equity, publish research on bilingual science pedagogy, and mentor a cohort of teachers to adopt culturally responsive instructional practices.
