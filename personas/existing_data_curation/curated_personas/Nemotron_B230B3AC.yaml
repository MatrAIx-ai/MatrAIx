personas:
  professional: Ines Correa, a veteran high school STEM educator and bilingual curriculum designer in Wichita, harnesses her meticulous, methodical planning and lively, collaborative spirit to create inquiry‑based
    physics units, lead district‑wide science fairs, mentor novice teachers, and strategically pursue grant funding for equitable STEM programs.
  sports: Ines Correa stays active by trail‑running with the Wichita Running Club, cheering the Kansas City Royals during baseball season, and playing in a co‑ed recreational softball league at the local
    community center, using her sociable nature to blend fitness and friendship.
  arts: Ines Correa expresses her artistic side through a folklórico and salsa dance troupe, drawing rhythmic inspiration from musicians such as Lila Downs and Carlos Vives, while also attending Wichita’s
    art walks to admire murals reminiscent of Diego Rivera and savoring live jazz performances by local saxophonist Ben Hightower.
  travel: Ines Correa favors purposeful road trips that combine cultural exploration and outdoor adventure, having driven the historic Route 66 to Santa Fe to visit its art markets and planning a future
    trek through Yellowstone’s geysers, all while coordinating family calendars and keeping a modest travel budget.
  culinary: Ines Correa’s kitchen is a laboratory of flavor where she lovingly cultivates heirloom tomatoes and fire‑roasted chilies to perfect mole poblano, enchiladas verdes, and fresh salsa ranchera,
    while also mastering hand‑rolled corn tortillas and whipping up pickled habanero jam for family gatherings.
  core: Ines Correa merges a data‑driven, organized approach to teaching with an exuberant love for community dance, often juggling too many volunteer projects yet never missing a chance to nurture her
    garden under the moonlight.
background:
  cultural: Inés was raised in a close‑knit Mexican family that emphasized respect for elders, communal celebrations, and the importance of education. Her grandparents emigrated from Jalisco, and she grew
    up bilingual, celebrating Día de los Muertos, Las Posadas, and Mexican Independence Day alongside Kansas holidays. This bicultural upbringing nurtured her ability to bridge Mexican cultural traditions
    with Midwestern American life, informing her teaching philosophy that values cultural relevance and inclusive practices. She stays connected to her heritage through regular visits to her extended family
    in Mexico, participation in local Mexican cultural festivals, and by incorporating Mexican scientific contributions and narratives into her classroom lessons.
