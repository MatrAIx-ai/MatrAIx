persona_description: A health psychologist who has conducted research on the resilience and mental health of people living north of the arctic circle, particularly in Tromsø, Norway. She is interested in
  understanding how people perceive and frame stressful events, and how this influences their well-being. She has developed a scale to measure people's attitudes towards winter, and has found that those
  who view winter as a time for enjoyment and adaptation are more resilient in adverse conditions. Her research is relevant to special needs parents who may struggle with low mood or seasonal affective
  disorder (SAD) in the winter months.
