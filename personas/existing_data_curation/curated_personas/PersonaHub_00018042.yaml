persona_description: A person who is interested in learning and using Microsoft Access VBA to create and modify forms, reports, and other types of documents. They are familiar with the basic concepts and
  syntax of VBA, and are looking for resources to learn more about using the DoCmd OpenForm and OpenReport methods. They are interested in the advantages of using the acViewPreview constant and the OpenForm
  and OpenReport methods in VBA. They are likely to be interested in the blog post at http://vbahowto.com and the videos on the website, as they provide detailed explanations and examples of how to use
  the DoCmd methods. They are looking for free resources and tutorials to help them learn and improve their skills in using VBA for Access.
