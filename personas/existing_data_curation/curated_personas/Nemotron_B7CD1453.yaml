  career_goals: Aaron dreams of becoming a scientist‑explorer who discovers how things work and can build useful inventions for his friends. He is also fascinated by firefighters and hopes to help people
    in emergencies. In the next few years he aims to learn to read independently, master building more complex LEGO creations, and lead his class in group projects, reflecting his blend of curiosity, practicality,
    and sociable energy.
