  career_goals: Fareez aims to transition from individual project work to mentorship and community leadership. He plans to launch a mentorship program for senior‑age and underrepresented coders in San Diego,
    leveraging his calm resilience to guide others through career pivots. Additionally, he aspires to contribute to open‑source projects that preserve Mexican cultural heritage through interactive digital
    archives, combining his competitive drive to produce high‑quality, impactful software. Long‑term, he hopes to author a book on integrating artistic thinking into software engineering practices.
