personas:
  professional: Sam Wright, a retired hardware store owner, leverages their decades of carpentry and budgeting expertise to lead volunteer workshops on home‑maintenance safety at the local senior center,
    blending a love of structure with a flexible, hands‑on teaching style.
  sports: Sam Wright finds peace casting a line on Lake Martin, follows the Alabama Crimson Tide football team with fervor, plays friendly checkers‑turned‑basketball games with church members, and joins
    a senior walking club that meets every Saturday morning for light exercise, which they consider a gentle way to stay active.
  arts: Sam Wright sings baritone in their church’s gospel choir, drawing inspiration from Mahalia Jackson and Aretha Franklin, collects vintage gospel vinyls, and devours biographies of civil‑rights leaders,
    which fuel their storytelling at family gatherings.
  travel: Sam Wright prefers modest road trips to historic Southern sites like Selma and Montgomery, but dreams of a leisurely Caribbean cruise, balancing a desire for relaxed itineraries with a careful
    travel budget and the need to stay close to family, which they plan meticulously.
  culinary: Sam Wright’s kitchen is a hub of soul‑food cooking, featuring fried catfish, collard greens simmered with smoked turkey, and peach cobbler, and while they excel at using fresh garden produce,
    they sometimes over‑salt dishes in the quest for bold flavor.
  core: Sam Wright merges a lifetime of hands‑on craftsmanship and community service with a steady undercurrent of worry, channeling structured mentorship into flexible, soulful gatherings while indulging
    in fishing, gospel singing, and experimental gardening.
background:
  cultural: Sam was born and raised in Opelika, Alabama, in a close‑knit African‑American community rooted in the Black Belt’s historical legacy. Growing up during the civil‑rights movement, he experienced
    the shifting tides of segregation, church activism, and the rise of Black pride. His family traditions emphasize respect for elders, strong church involvement, and soulful cooking that blends Southern
    and African‑American flavors. The local Baptist congregation has been a central social hub, shaping his values of communal support, gospel music, and service. Sam’s cultural identity is a tapestry of
    Southern hospitality, resilience forged by historic adversity, and a deep reverence for storytelling through music, food, and oral history.
attributes:
  skills: '["Carpentry", "Basic Plumbing", "Automotive Maintenance", "Hardware Store Management", "Inventory Control", "Budgeting and Financial Planning", "Community Mentoring", "Conflict Resolution", "Event
