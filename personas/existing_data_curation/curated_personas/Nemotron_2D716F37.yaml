personas:
  professional: Nancy Barker, a civil engineer specializing in structural analysis and BIM using Revit and AutoCAD, leverages their love of order to meticulously coordinate sustainable design projects while
    occasionally embracing flexible, disorganized brainstorming sessions that keep creativity alive and align with their goal of earning a PE license and mentoring junior staff.
  sports: Nancy Barker follows the New England Patriots and the Boston Red Sox, hikes with the Connecticut Coastal Hikers club during spring and fall, plays on a local women's recreational soccer team in
    the summer, and tries cross‑country skiing with the Greenwich Nordic Ski Group in winter.
  arts: Nancy Barker enjoys shooting photography of autumnal Connecticut woodlands inspired by Ansel Adams, reads historical fiction by Ken Follett and Philippa Gregory, listens to folk artists Brandi Carlile
    and The Milk Carton Kids, and hosts board game nights featuring Catan and Ticket to Ride with friends and family.
  travel: Nancy Barker prefers meticulously planned weekend getaways to nearby destinations like Acadia National Park and the Berkshires, while dreaming of a sustainable architecture tour of Iceland and
    a cultural immersion trip to Kyoto, balancing travel costs with a disciplined vacation savings plan and a spreadsheet‑driven itinerary.
  culinary: Nancy Barker relishes cooking seasonal dishes such as lobster bisque, maple‑glazed salmon, and apple crisp, enjoys experimenting with local herbs like rosemary and sage, regularly sources fresh
    produce from Connecticut farm stands, and occasionally over‑spices recipes in pursuit of bold flavors.
  core: Nancy Barker blends disciplined engineering precision with a laid‑back love of seasonal gardening, yoga, and community, all while juggling a penchant for spontaneous splurges and a chronic back
    ache.
background:
  cultural: Nancy grew up in a middle‑class New England family in Connecticut, where community involvement, practical problem solving, and a strong emphasis on education were core values. Her upbringing
    reflects the region’s appreciation for seasonal change, local traditions such as Thanksgiving gatherings, and a balanced approach to work and family life.
