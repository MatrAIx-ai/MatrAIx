  career_goals: She aims to earn her Professional Engineer license within the next two years, transition into senior project manager roles overseeing large‑scale sustainable infrastructure projects, and
    eventually establish a boutique consultancy focused on resilient community design. Nancy also aspires to mentor junior engineers and champion work‑life balance initiatives within her firm.
