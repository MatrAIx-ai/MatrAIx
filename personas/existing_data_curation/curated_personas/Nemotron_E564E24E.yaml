personas:
  professional: Maria Mora is a data‑driven HR specialist who leverages Python‑based analytics and arts‑infused training design to streamline talent acquisition and performance management while they champion
    inclusive policies rooted in community‑first values.
  sports: Maria Mora enjoys weekend hikes with the Triangle Hiking Club, follows the Carolina Hurricanes and Duke Blue Devils with avid enthusiasm, and they play in a co‑ed recreational soccer league that
    meets at a community field in Raleigh.
  arts: Maria Mora is an avid painter who draws inspiration from Frida Kahlo’s vibrant storytelling, the kinetic murals of Diego Rivera, and local Piedmont artist Sarah Hines, frequently attending exhibitions
    featuring works by Yayoi Kusama and the Carolina Museum of Art.
  travel: Maria Mora prefers a mix of spontaneous weekend road trips to the Blue Ridge Mountains and carefully planned cultural tours, having explored historic San Salvador and Oaxaca, and now dreaming
    of a spring immersion in Kyoto’s cherry‑blossom festivals.
  culinary: Maria Mora is a confident home chef who perfects pupusas stuffed with mozzarella and loroco, experiments with quinoa‑infused masa for a modern twist, and delights in pairing each dish with lime‑marinated
    cilantro rice and a splash of tamarind hot sauce.
  core: Maria Mora blends analytical rigor with artistic flair, habitually juggling spreadsheets and paintbrushes, while occasionally losing track of time over midnight blog posts and over‑indulging in
    late‑night coffee before morning hikes.
background:
  cultural: Maria was raised in a bilingual Salvadoran household where family, Catholic traditions, and communal celebrations were central. She continues to honor Salvadoran holidays such as Independence
    Day and Día de los Muertos with gatherings featuring pupusas, tamales, and marimba music. Through regular video calls, she maintains close ties with relatives in El Salvador and actively participates
    in the Salvadoran‑American community in North Carolina, contributing to cultural festivals and supporting local organizations. The values of resilience, hospitality, and collectivism from her heritage
    shape her collaborative leadership style and inform her commitment to inclusive workplace policies.
attributes:
  skills: '[''HRIS management'', ''Data analytics for workforce metrics'', ''Talent acquisition and recruitment strategy'', ''Employee relations and conflict resolution'', ''Organizational development and
