  hobbies: '[''Painting'', ''Visiting art galleries'', ''Cooking Salvadoran cuisine'', ''Dancing (cumbia, salsa)'', ''Reading technology and psychology books'', ''Hiking'', ''Volunteering for immigrant
    support services'', ''Blogging about art and workplace culture'']'
  career_goals: Maria aims to earn senior HR certifications such as SHRM‑SCP and pursue a master's degree in Human Resources or an MBA with a focus on HR analytics. She aspires to transition into an HR
    Manager or Director role within a mid‑size technology or manufacturing firm in the Research Triangle, where she can lead data‑driven talent initiatives. A core ambition is to champion diversity, equity,
    and inclusion programs that elevate Latino and immigrant voices, develop mentorship pipelines for young Salvadoran professionals, and eventually launch a consultancy that blends cultural insight with
    innovative HR practices.
