persona_description: A chemistry professor who specializes in the field of carbon materials, particularly in the preparation of porous carbon sponges using the aerosol technique. His research interests
  include the development of new synthetic routes to mesoporous and macroporous carbon powders, as well as the potential applications of these materials in various fields such as adsorbent, catalytic, and
  electrochemical applications. He is also interested in the collaboration with Korean researchers for fuel cell electrodes.
