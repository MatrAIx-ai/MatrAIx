personas:
  professional: Alfredo Dobbins, an industrial engineering junior on the shop floor, merges lean manufacturing expertise with a vivid imagination to redesign plant layouts in AutoCAD, craft PowerBI dashboards,
    and pilot IoT sensor projects, while they continuously challenge conventional workflows and push throughput, scrap reduction, and equipment uptime metrics upward.
  sports: Alfredo Dobbins, an avid weekend hiker in the Ouachita foothills, regularly joins the local hiking club, follows the Arkansas Razorbacks basketball team and the St. Louis Cardinals, and incorporates
    interval training and occasional rock‑climbing sessions into his fitness routine to counterbalance the sedentary nature of shop‑floor work.
  arts: Alfredo Dobbins, a self‑taught abstract painter inspired by Jackson Pollock’s splatter technique while sketching industrial forms, also strums guitar to the folk stylings of Gordon Lightfoot and
    the electrifying riffs of David Bowie, often composing original melodies during makerspace evenings, and they showcase their work at community art nights.
  travel: Alfredo Dobbins, who prefers meticulously planned itineraries blending adventure with cultural immersion, has trekked the Grand Canyon, explored Tokyo’s tech districts, and now dreams of cycling
    through the Bavarian Alps and attending a robotics expo in Singapore, balancing limited student funds with a desire for hands‑on experiences.
  culinary: Alfredo Dobbins, a competent home cook who enjoys experimenting with fresh herbs, frequently prepares citrus‑marinated grilled fish, smoky lentil stew spiced with cumin and paprika, and hand‑rolled
    empanadas filled with seasoned ground beef, while they never pass up a perfectly brewed espresso after a long shift.
  core: Alfredo Dobbins, a 21‑year‑old industrial engineering enthusiast with a competitive streak, balances a love for abstract art, guitar riffs, and data‑driven process tweaks, often losing sleep over
    new prototypes while hoarding half‑finished sketches in their backpack.
background:
  cultural: Alfredo is a first‑generation Mexican‑American raised in Hanna, Oklahoma. He grew up bilingual, speaking Spanish at home and English at school, and his family maintains strong ties to Mexican
    traditions such as Día de los Muertos, Cinco de Mayo, and weekly family meals featuring tamales and mole. The fusion of his Mexican heritage with the close‑knit rural Midwestern community instilled
    a strong work ethic, respect for elders, and a sense of communal responsibility. He often incorporates Mexican motifs—vivid colors, symbolic patterns, and folklore references—into his artistic projects,
    and his cultural identity shapes his competitive yet collaborative approach to leadership.
