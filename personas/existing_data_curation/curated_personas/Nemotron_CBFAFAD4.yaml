personas:
  professional: Henry Porch, a budding DIY enthusiast who revels in assembling LEGO sets and model airplane kits, treats each build like a small engineering project, applying step‑by‑step logic learned
    from car repair magazines while maintaining a laid‑back attitude toward school deadlines.
  sports: Henry Porch follows the Dallas Cowboys avidly, cheers on Cedar Hill High School football on weekends, spends evenings fishing with the Cedar Hill Youth Fishing Club, and rides a fixed‑gear bike
    with a small neighborhood cycling group, favoring low‑key workouts over organized sports.
  arts: Henry Porch immerses themselves in classic rock and country, repeatedly listening to The Eagles, Johnny Cash, and Led Zeppelin while assembling LEGO sets, and occasionally attends the Cedar Hill
    Community Theatre’s high school productions of "Grease" and "West Side Story" with their family.
  travel: Henry Porch enjoys spontaneous road trips to the Texas Hill Country and occasional family visits to Monterrey for authentic Tex‑Mex cuisine, preferring flexible, unplanned stops at roadside diners
    over meticulously mapped itineraries.
  culinary: Henry Porch favors smoky Texas barbecue—especially brisket and smoked sausage—paired with salsa‑laden tacos al pastor and cornbread, enjoys whipping up quick quesadillas with shredded cheddar
    and jalapeños, yet often forgets to clean the kitchen after meals, leaving remnants on the counter.
  core: Henry Porch is a routine‑loving teen who builds intricate LEGO worlds and model planes with meticulous focus, yet habitually procrastinates on school projects, finding solace in classic rock and
    spontaneous fishing trips with Dad.
background:
  cultural: Henry grew up in a typical white, middle‑class suburban setting in Cedar Hill, Texas. His family practices Protestant Christian traditions, attending church services on Sundays and participating
    in community events. He enjoys Texas barbecue family gatherings, local high school football tailgates, and country music alongside classic rock. While his household is primarily Anglo‑American, the
    diverse Dallas County environment has exposed him to Hispanic cultural influences, such as enjoying Tex‑Mex food and bilingual community festivals. These regional customs shape his practical outlook
    and appreciation for routine.
