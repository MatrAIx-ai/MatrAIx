  career_goals: Henry aspires to a stable, hands‑on career. He plans to attend a vocational high school program focused on automotive technology, earn a certification as a technician, and eventually work
    at a local auto repair shop or start his own garage. He also considers a future in construction or carpentry, valuing practical work that produces visible results. His long‑term goal is to achieve financial
    independence while maintaining a balanced routine that allows time for his personal interests.
