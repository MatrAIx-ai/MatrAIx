    at Community Art Collective'',''Exploring Independent Cafés'',''Experimental Cooking'']'
  career_goals: Amna aims to transition from floor sales to a leadership role that leverages her creative strengths, such as visual merchandising manager or boutique owner focused on handcrafted and locally
    sourced goods. She hopes to complete her bachelor's degree in business administration, which she started in college, to formalize her managerial knowledge. In the longer term, she envisions opening
    a small community art shop in Topeka where she can curate and sell works by regional artists, host intimate workshops, and provide mentoring for younger entrepreneurs. Her competitive nature drives
    her to set measurable sales and growth targets for the venture, while her preference for flexibility ensures she balances work with family commitments.
