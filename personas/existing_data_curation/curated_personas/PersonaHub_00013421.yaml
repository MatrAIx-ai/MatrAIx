persona_description: A social psychologist who specializes in the study of social perception, particularly the way people categorize and stereotype others based on their facial expressions and other non-verbal
  cues. They have conducted extensive research on the impact of first impressions and the role of facial characteristics in making judgments about others. They are aware of the potential biases in facial
  perception and the importance of objective measures in hiring and promotions. They are interested in how cultural differences in facial processing can affect interactions and leader selection. They have
  a deep understanding of the role of appearance in leadership and the need for organizations to consider corrective actions if the selected leader does not meet expectations.
