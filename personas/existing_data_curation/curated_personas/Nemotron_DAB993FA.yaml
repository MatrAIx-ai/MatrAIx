personas:
  professional: Cheralyn Burnett is a veteran customer service specialist who leverages three decades of front‑line telephone etiquette, active listening, and empathy‑driven problem solving to de‑escalate
    tense calls, while seamlessly navigating from legacy mainframe CRM to modern cloud platforms; they mentor new hires with a pragmatic curiosity, prefer flexible schedules over rigid plans, and bring
    a cooperative yet assertive demeanor that keeps team morale high.
  sports: Cheralyn Burnett enjoys daily morning walks with the Brownsburg Parks and Recreation senior walking group, avidly cheers for the Indianapolis Colts on Sundays, and volunteers as a scorekeeper
    at the Brownsburg High Bulldogs baseball games, balancing gentle cardio with community spirit.
  arts: Cheralyn Burnett blends a lifelong love for historical fiction—favoring authors like Ken Follett and Hilary Mantel—with active participation in the church choir where they belt out mahogany‑rich
    renditions of Mahalia Jackson’s gospel standards, and they delight in knitting intricate blankets while listening to classic swing tunes at community‑center dance evenings.
  travel: Cheralyn Burnett prefers low‑key, escorted trips that blend family reunions in Washington, D.C., with leisurely river cruises along the Mississippi, and they harbor a dream of seeing the Grand
    Canyon’s sunrise, always choosing travel agencies that cater to seniors and offering flexible itineraries that accommodate their relaxed approach to plans.
  culinary: Cheralyn Burnett cultivates a modest vegetable garden where fresh tomatoes, basil, and carrots blossom, and they transform the harvest into hearty dishes like chicken pot pie, rosemary‑infused
    roast beef with root vegetables, and a warm apple crisp topped with crunchy oat streusel, while also delighting in simple tea brewed from marigold petals and a splash of honey.
  core: Cheralyn Burnett, a 93‑year‑old whirlwind of curiosity and compassion, blends impeccable telephone etiquette with daily park strolls, a penchant for loose schedule‑keeping, and an ever‑growing stash
    of knitted blankets for strangers.
background:
  cultural: Cheralyn was born in 1932 in rural Indiana during the Great Depression, raised in a predominantly white, Midwestern community with German and Irish ancestry. Her parents instilled values of
    hard work, modesty, and neighborly support, shaping her pragmatic yet open-minded outlook. She attended a local high school, where church and community activities reinforced a culture of collective
    responsibility. Growing up, she witnessed the home-front efforts of World War II, the post-war economic boom, and the social shifts of the 1960s, experiences that fostered both stability and curiosity.
    Today, she celebrates Midwestern traditions through holiday potlucks, county fairs, and volunteering with civic organizations, reflecting the region's blend of practicality, community spirit, and modest
    optimism.
