  career_goals: Robert aims to become a leading attorney in intellectual property, specializing in protecting visual artists and musicians. In the next five years, he seeks to earn a partnership at a boutique
    firm that blends legal expertise with cultural advocacy. He plans to obtain board certification in IP law, publish articles on art law, and eventually launch a nonprofit legal clinic offering pro bono
    services to emerging creators in the Midwest. Long‑term, he aspires to influence legislation that strengthens creators' rights and to be recognized as a thought leader at national conferences, while
    also mentoring young lawyers and speaking at industry events.
