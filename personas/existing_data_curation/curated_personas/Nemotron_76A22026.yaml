personas:
  professional: Carlos Christian is a teenage hobbyist model builder who channels a practical mindset into assembling airplane, car, and tiny‑house kits, faithfully following step‑by‑step guides while adding
    personal improvisations, and who dreams of one day designing functional prototypes in a future engineering program.
  sports: A teenage nature enthusiast, Carlos Christian spends weekends trekking the wooded trails around Arrington, joins occasional pickup basketball games at the community center, follows the Richmond
    Kickers and the Washington Capitals, yet prefers solitary walks and quiet observation over crowded stadium atmospheres.
  arts: Carlos Christian’s evening soundtrack features R&B and classic soul artists such as Alicia Keys, Marvin Gaye, and Aretha Franklin, complemented by gospel energizers like Kirk Franklin, and they
    occasionally dabble in creating lo‑fi beats on a laptop to accompany their model‑building focus.
  travel: Carlos Christian’s wanderlust blends low‑key weekend trips to Shenandoah National Park and family vacations to Washington, D.C., with a budding desire to explore Tokyo’s Akihabara district and
    its tech culture, all while staying within a parent‑approved budget and balancing school commitments.
  culinary: When not assembling models, Carlos Christian enjoys simple comfort meals like mac and cheese and chicken tenders, whips up quick peanut‑butter‑banana smoothies, and occasionally experiments
    with homemade honey‑almond granola bars, though they often sacrifice balanced nutrition for chips and soda during late‑night Minecraft sessions.
  core: Carlos Christian balances a love for methodical model kits and solitary nature walks with spontaneous bursts of R&B‑driven creativity, all while navigating teenage routines, occasional disorganization,
    and a modest, carefully guarded allowance.
background:
  cultural: Carlos is a Black teenager raised in a close‑knit African‑American family in Arrington, Tennessee. His family has deep roots in the region, tracing ancestry back to the post‑Civil‑War era when
    several generations settled in Rutherford County. Church plays a central role in his upbringing; his family attends a Baptist congregation where gospel singing, communal meals, and weekly fellowship
    reinforce a sense of belonging. Family gatherings often feature traditional Southern dishes—collard greens, cornbread, and fried chicken—cooked from recipes passed down through his grandparents. Music
    from his community, from classic soul to contemporary R&B, shapes his tastes, and storytelling traditions from elders instill values of resilience and mutual support. While he navigates the challenges
    of a rural setting, his cultural heritage provides a foundation of pride, responsibility, and a desire to contribute positively to his neighborhood.
attributes:
  skills: '["basic home maintenance", "simple carpentry repairs", "cooking family recipes", "basic computer troubleshooting", "team support in school projects"]'
  hobbies: '["building model kits", "playing Minecraft", "listening to R&B and gospel music", "walking local nature trails", "reading comic books"]'
  career_goals: Carlos aims to complete his high school education, obtaining a GED if necessary, and then enroll in a vocational program to become an automotive technician. He is drawn to the hands‑on nature
    of repairing vehicles and sees this career as a way to provide financial stability for his family. In the longer term, he hopes to open a small auto‑repair shop in his community, where he can offer
    dependable service and give back by hiring local youth for apprenticeships. He also values a job that allows him to maintain a predictable schedule, so he is interested in roles that balance routine
    work with occasional problem‑solving challenges.
