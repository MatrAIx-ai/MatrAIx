  hobbies: '[''Hiking in the Sierra foothills'', ''Attending local tech meetups and hackathons'', ''Cooking classes with friends'', ''Volunteering as a mentor for after‑school coding workshops'', ''Board‑game
    nights at community cafés'', ''Yoga practice'', ''Traveling to national parks'', ''Photography (nature and urban)'', ''Live music events'']'
  career_goals: Jessica aims to advance to a senior engineering role within the next two years, eventually stepping into a technical lead or engineering manager position where she can shape product strategy
    and mentor junior developers. She is passionate about fostering inclusive, collaborative team cultures and hopes to champion diversity initiatives within tech. Long‑term, she envisions contributing
    to open‑source projects, influencing the design of user‑centric software products, and possibly launching her own startup focused on educational technology that bridges gaps for underrepresented learners.
