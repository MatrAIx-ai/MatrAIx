  hobbies: '[''Soccer (recreational league)'', ''Competitive video gaming (FPS/strategy)'', ''Department basketball pick‑up games'', ''Gym workouts and functional training'', ''Hiking in Texas Hill Country'',
    ''Cooking traditional Mexican dishes'', ''Attending Fiesta San Antonio and Día de los Muertos celebrations'', ''Participating in community volunteer clean‑ups'', ''Bilingual poetry reading clubs'']'
  career_goals: Anthony aims to advance to sergeant within the next five years, targeting a specialty in community policing or a tactical unit like SWAT. He plans to pursue an associate degree in criminal
    justice through night classes, eventually earning a bachelor's and possibly a master's in public administration. His long‑term ambition is to become a detective focusing on gang‑related investigations,
    leveraging his cultural insight to build trust between law enforcement and the Hispanic community. He also hopes to create a mentorship program for at‑risk youth in Bexar County, using his experience
    to guide them toward positive pathways.
