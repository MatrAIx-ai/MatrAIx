persona_description: A professional educator who is dedicated to supporting children with movement difficulties and improving their educational outcomes. This person is likely to have a background in special
  education, physical education, or early childhood education and has a strong interest in understanding and addressing the neurodevelopmental needs of children. They are familiar with current inclusion
  guidelines and have a deep understanding of the neurology of dyspraxia and its impact on motor milestones. They are skilled in practical strategies for identifying and supporting children with movement
  difficulties and have a passion for empowering teachers and other professionals to work effectively with parents to support the children. They are also knowledgeable about the importance of balance, coordination,
  and control in supporting children with movement difficulties.
