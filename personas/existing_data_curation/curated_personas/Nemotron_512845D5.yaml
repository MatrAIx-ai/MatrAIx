personas:
  professional: Freda Nelson, a curious two‑year‑old who loves to help their mom organize crayons and pretend to run the neighborhood library's story hour, demonstrates early organizational and cooperative
    skills that hint at future leadership potential.
  sports: Freda Nelson loves to chase after the neighborhood’s community soccer team's warm‑up drills at the local park, regularly attends the Little Rascals Tumble‑Tumble gymnastics class, and cheers for
    the Chicago Cubs during televised games with a mini foam glove.
  arts: Freda Nelson frequently attends the recreation centre art class where they paint with water‑based paints while listening to The Beatles and Sara Bareilles, enjoys story time with Dr. Seuss, and
    watches Disney’s Frozen for its vibrant colors and music.
  travel: Freda Nelson’s family weekend outings include trips to the Schaumburg Botanic Garden and occasional drives to Chicago’s Navy Pier, while they day‑dream about visiting Times Square’s bright lights
    and Washington, D.C.’s museums, balancing their curiosity with the comfort of familiar routines.
  culinary: Freda Nelson prefers bite‑size cheese cubes and banana slices, enjoys helping stir applesauce, and loves creamy mac and cheese with cheddar, yet often insists on a dash of ketchup, which their
    parents gently moderate.
  core: Freda Nelson is a meticulous, socially‑bubbly two‑year‑old whose love of order, constant curiosity, and occasional worry make every day an adventure between organized play and heartfelt hugs.
background:
  cultural: Freda is raised in Woodridge, Illinois, a predominantly white, middle‑class suburb in DuPage County. The community reflects Midwestern values of friendliness, politeness, and strong neighborhood
    ties. Her family participates in local traditions such as holiday celebrations (Thanksgiving, Christmas, Fourth of July), community festivals, and church gatherings that may be Protestant or Catholic.
    She attends the public library’s early‑learning programs, the town’s recreation centre art and music classes, and plays in neighborhood parks. This environment emphasizes group activities, orderly routines,
    and a supportive, caring atmosphere that shapes her sociable, cooperative personality.
