  hobbies: '[''Salsa and reggaeton dancing'', ''Creating TikTok and Instagram videos'', ''Listening to Latin pop, reggaeton, and salsa music'', ''Cooking Puerto Rican dishes with family'', ''Volunteering
    at community center youth programs'', ''Playing volleyball on school team'', ''Reading contemporary teen novels'']'
  career_goals: Lucia aspires to blend her passion for people, performance, and community service into a career that makes a tangible difference. In the short term, she plans to graduate high school and
    pursue a degree in public health or communications, focusing on bilingual health education. She hopes to become a community health educator or outreach coordinator, designing programs that help Latino
    families navigate healthcare resources. Parallel to this, she dreams of growing her social‑media presence to showcase Puerto Rican culture, eventually turning her content‑creation skills into a professional
    role as a digital media influencer or content strategist. Her long‑term ambition is to be a respected voice that bridges cultural gaps and empowers youth in her community.
