personas:
  professional: Dustin is a budding technologist who spends afternoons building gear‑laden LEGO constructions, coding interactive Scratch stories, and collaborating on competition robots in his school’s
    robotics club, where his organized, methodical nature and compassionate teamwork make them the go‑to teammate for debugging and documentation.
  sports: Dustin is a midfield player on the Howard County Middle School soccer team, drills with the local Youth Soccer Club Wolves, cheers for the Baltimore Ravens on Sundays, and balances fitness by
    hiking the Patapsco Valley State Park trails on weekends.
  arts: Dustin is an aspiring acoustic guitarist who practices classic folk songs by Jack Johnson, enjoys drawing comic‑style sketches of his LEGO creations, and reads sci‑fi authors like Isaac Asimov and
    Becky Chambers, often attending the local community library’s monthly author talk series.
  travel: Dustin prefers day trips that blend adventure and learning, such as hiking the Appalachian Trail sections near Hagerstown, exploring the Smithsonian National Air and Space Museum in Washington
    D.C., and dreaming of a family vacation to the LEGOLAND discovery centre in California.
  culinary: Dustin enjoys cooking simple meals like spaghetti with meatballs, assembling homemade tacos with seasoned chicken and avocado, and experimenting with LEGO‑shaped cookie cutters to bake gingerbread
    bricks, though they often forget to clean the kitchen afterward.
  core: Dustin is a curious, organized teen who balances building robots, playing soccer, strumming guitar, and saving for the next LEGO set, all while occasionally procrastinating on chores.
background:
  cultural: Dustin grew up in Sykesville, Maryland, a suburban community in Howard County that blends historic small‑town charm with easy access to the Baltimore‑Washington metropolitan area. His family
    is white and middle‑class, emphasizing education, community involvement, and a modest religious upbringing that values service and respect for others. The local culture includes seasonal events such
    as the county fair, Fourth of July celebrations, and school programs highlighting Maryland's natural heritage, like the Chesapeake Bay ecosystem. Howard County's diverse population has exposed Dustin
    to a range of cultural perspectives, fostering an inclusive and cooperative outlook while his household upholds traditional American values of hard work, politeness, and helping neighbors.
