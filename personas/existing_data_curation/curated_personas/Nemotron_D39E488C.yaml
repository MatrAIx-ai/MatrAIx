  career_goals: Dustin aims to combine his love of how things work with his desire to help others. He envisions a future as a civil or environmental engineer, designing sustainable infrastructure and community
    projects that improve the quality of life in his hometown. Alternatively, he is intrigued by the idea of becoming a science teacher, where he could inspire younger students with hands‑on experiments
    and mentorship. To achieve these goals, Dustin plans to excel academically in high school, pursue advanced science and math courses, participate in engineering clubs, and eventually attend a university
    with strong engineering or education programs. He also hopes to integrate community service into his career, contributing to local environmental clean‑up and youth tutoring initiatives.
