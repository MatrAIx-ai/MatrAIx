  skills: '[''reading fluently'', ''basic arithmetic'', ''educational computer use'', ''bird and insect identification'', ''drawing and sketching'', ''basic household chores'']'
  hobbies: '[''exploring nature'', ''collecting natural specimens'', ''drawing and sketching'', ''reading adventure books'', ''building LEGO models'', ''baking with family'', ''listening to classic country
    music'', ''playing board games'']'
  career_goals: Tammy dreams of growing up to work with animals and nature; she hopes to become a wildlife biologist or a veterinarian so she can protect the local ecosystem she loves to explore. She also
    imagines herself sharing her curiosity in a classroom one day, perhaps as an elementary school teacher who encourages other kids to ask questions and discover the world through hands‑on projects.
