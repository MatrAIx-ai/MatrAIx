personas:
  professional: A budding junior naturalist, Tammy Cain blends meticulous observation and sketching with a laid‑back attitude toward scheduling, turning each field stroll into a practical learning adventure
    that they cherish.
  sports: An energetic explorer, Tammy Cain joins the Lil' Raptors youth soccer club in the fall, cheers for the River City Rivermen baseball team during summer games, and spends weekends biking and climbing
    in the meadow, treating fitness as a playful extension of their nature excursions that they find both fun and grounding.
  arts: A budding illustrator, Tammy Cain fills their nature journal with detailed sketches of meadow creatures while humming along to Johnny Cash and Dolly Parton classics, draws inspiration from the adventurous
    pages of Nancy Drew, and they recreate favorite scenes with LEGO builds that echo the colorful designs of artist James Gurney.
  travel: Tammy Cain prefers spontaneous family road trips to nearby state parks and savors the idea of visiting Yellowstone’s geysers and the Grand Canyon’s cliffs, favoring relaxed, nature‑focused adventures
    over crowded tourist resorts that they find soothing.
  culinary: A budding baker, Tammy Cain measures flour, sugar, and chocolate chips for their signature soft chocolate chip cookies on rainy afternoons, enjoys snack‑time carrot sticks with hummus, and they
    delight in cheesy pepperoni pizza topped with oregano during family movie nights.
  core: Tammy Cain is a curiosity‑driven nine‑year‑old who chronicles meadow discoveries, yet often misplaces their sketchbook, worries about imagined mishaps, and they embrace a flexible, unstructured
    routine.
background:
  cultural: Tammy is raised in a white, Midwestern family in Jamesport, Missouri, where community ties and small‑town values shape daily life. Her family attends a local Baptist church, participates in
    county fairs, and maintains traditions such as Sunday family dinners, Fourth of July fireworks, and seasonal hunting and fishing trips. The cultural mix of rural agricultural heritage and close‑knit
    neighborly support informs her respectful, cooperative nature and her appreciation for both new ideas and tried‑and‑true practices.
