  hobbies: '[''hiking'', ''fly fishing'', ''hunting'', ''woodworking'', ''classic car restoration'', ''bluegrass music'', ''reading business literature'', ''volunteering at church'', ''local history research'']'
  career_goals: Tyler aims to advance to a regional sales director position within the next five years, overseeing multiple territories and integrating advanced analytics into the sales workflow. He seeks
    to champion a culture of continuous improvement, combining his curiosity for new technologies with the reliability of established methods. Additionally, he plans to mentor emerging supervisors, contribute
    to workforce development programs in Greenbrier County, and eventually transition into a consulting role that helps small businesses adopt effective sales strategies while preserving local values.
