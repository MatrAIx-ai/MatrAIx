personas:
  professional: Melanie Wood, a senior architect with a flair for sustainable design, blends rapid conceptual sketches with meticulous code compliance, leading a community center project in Putnam County
    while mentoring younger colleagues, though their competitive edge sometimes clashes with deadline discipline.
  sports: Melanie Wood supports the Florida Gators and the Tampa Bay Buccaneers, participates in weekly pickleball matches at the Putnam County Community Center, and joins a local senior Softball League,
    balancing a competitive spirit with a love for low‑impact exercise.
  arts: Melanie Wood finds inspiration in the landscape photography of Edward Burtynsky, the watercolor scenes of Georgia O’Keeffe, the Southern prose of William Faulkner, and the acoustic melodies of Alison
    Krauss, often attending the annual St. Augustine Art Walk to mingle with fellow creatives.
  travel: Melanie Wood prefers spontaneous road trips in their reliable SUV to explore historic Southern towns like Savannah and Charleston, has photographed sunrise over the Everglades, dreams of a pilgrimage
    to Barcelona’s Gaudí masterpieces, and plans trips within a modest retirement budget that still allow occasional weekend getaways.
  culinary: Melanie Wood enjoys cooking low‑sugar Southern dishes such as citrus‑glazed grilled chicken, collard greens with smoked turkey, and a reduced‑sugar key lime tart, often using fresh herbs and
    fruit from their garden and boasting an intermediate skill level that balances family comfort with health consciousness.
  core: Melanie Wood is a curiosity‑driven yet pragmatic architect who balances sustainable creativity with a competitive streak, thriving on sunrise photography, community volunteering, and cautious financial
    planning while navigating occasional deadline slips.
background:
  cultural: Melanie was raised in a middle‑class family in the Deep South, experiencing the blend of Southern hospitality, respect for tradition, and an appreciation for self‑reliance. Her parents emphasized
    practical skills and community involvement, instilling a work ethic that values both hard work and ingenuity. Although she identifies as white American, she embraces the cultural tapestry of her Florida
    home—celebrating regional festivals, supporting local churches, and partaking in seasonal traditions such as shrimp boils and holiday decorations. Her marriage of over 30 years provides a stable foundation,
    and her relocation to Fort McCoy in Putnam County reflects a desire for a slower pace that still offers access to nature and historic sites. These cultural threads inform her design sensibility, which
    often incorporates local vernacular elements and sustainable practices suited to the Floridian climate.
attributes:
  skills: '[''Conceptual architectural design'', ''Sustainable/green building strategies'', ''Florida building code compliance'', ''Hand drawing and sketching'', ''AutoCAD'', ''Revit (BIM)'', ''SketchUp'',
    ''Construction documentation'', ''Client presentation and persuasion'', ''Adaptive problem solving'']'
  hobbies: '[''Landscape photography'', ''Watercolor sketching of historic buildings'', ''Gardening (native plants and citrus)'', ''Volunteering with Habitat for Humanity'', ''Reading architectural history
    and Southern literature'', ''Yoga'', ''Weekend road trips to explore regional architecture'', ''Cooking Southern cuisine'']'
  career_goals: Melanie aims to lead a flagship community center project in Putnam County that showcases climate‑responsive, resilient design while honoring regional architectural vernacular. She seeks
    to mentor emerging architects within her firm, sharing her balanced approach of curiosity and practicality. Over the next five years she hopes to establish a boutique consultancy that experiments with
    cost‑effective, sustainable solutions and earns a state‑level design award for innovation. As she approaches retirement, her long‑term ambition is to transition into an advisory role, providing strategic
    insight on sustainable development and preserving the built heritage of her Florida community.
