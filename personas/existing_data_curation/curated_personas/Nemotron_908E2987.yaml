  career_goals: Jae aims to complete a Bachelor of Science in Nursing (BSN) within the next two years, followed by a specialization in emergency or critical care nursing. He plans to obtain ACLS and Pediatric
    Advanced Life Support (PALS) certifications, and eventually pursue a master's degree to become a Nurse Practitioner with a focus on community health. He is motivated to develop culturally competent
    care models for the growing East Asian population in Bloomington and hopes to lead a community health outreach program that integrates preventive health education with technology. Long‑term, he envisions
    taking on a leadership role in a hospital setting, mentoring new nurses, and contributing to health policy initiatives that improve access to care for underserved groups.
