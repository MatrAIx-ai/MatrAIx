personas:
  professional: Jae Chang, a newly licensed registered nurse at a bustling university hospital, blends curiosity-driven tech enthusiasm with practical bedside skills, mastering vital signs, IV administration,
    and EHR documentation while eagerly integrating emerging health‑app data into patient education and preparing for ACLS and PALS certification.
  sports: Jae Chang dominates the Indiana University recreation floor with intramural basketball and joins the Bloomington Ultimate Frisbee club for weekend matches, cheering on the Indiana Pacers and Indianapolis
    Colts while favoring high‑energy, group‑based workouts over solitary gym routines.
  arts: Jae Chang lights up karaoke nights belting out BTS and Blackpink hits, streams K‑dramas starring Hyun Bin, attends the Bloomington Arts Festival to admire works by local painter Sarah Meyer, and
    curates a gaming soundtrack playlist featuring composers like Jeremy Soule.
  travel: Jae Chang prefers spur‑of‑the‑moment weekend getaways, having already explored Chicago’s deep‑dish scene and a spring break road‑trip to New Orleans, while dreaming of a future backpacking adventure
    through Japan and Vietnam once student loans are settled.
  culinary: Jae Chang whips up moderately spicy kimchi and bulgogi using gochujang, sesame oil, and fermented shrimp paste, perfects tteokbokki on late‑night study sessions, and often pairs their Korean
    feast with a side of instant ramen while swapping recipes with their roommate.
  core: Jae Chang is a tech‑savvy nursing student who thrives on high‑energy group fun, juggles spontaneous gaming marathons with occasional disorganized budgeting, and balances a fierce competitive streak
    with a genuine desire to improve community health.
background:
  cultural: Jae is a second‑generation Korean‑American. His parents emigrated from South Korea in the early 2000s and raised him in a bilingual household where both Korean and English are spoken daily.
    He grew up celebrating Chuseok, Seollal, and other Korean traditions while also participating in mainstream American holidays. The family places a strong emphasis on education, respect for elders, and
    collective responsibility, which has shaped Jae’s disciplined work ethic and his desire to give back to his community. Living in Bloomington, he navigates a blend of Korean cultural values—such as harmony
    and modesty—with the Midwestern American ethos of independence and openness. This dual cultural lens informs his approach to patient care, where he strives to be culturally sensitive and to bridge communication
    gaps for patients from diverse backgrounds.
