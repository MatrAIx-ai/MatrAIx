  hobbies: '["Intramural basketball", "Ultimate frisbee", "Karaoke (K‑pop)", "Korean cooking (kimchi, bulgogi)", "Asian Student Association cultural events", "Home‑brew tech projects (Raspberry Pi)", "Competitive
