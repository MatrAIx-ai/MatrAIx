personas:
  professional: Thomas Fonville, age four, serves as the household junior librarian, meticulously organizing picture books while inventing imaginative storyscapes for his stuffed friends, showcasing his
    vivid curiosity and a surprisingly disciplined sense of order.
  sports: Thomas Fonville, age four, dashes through weekly preschool soccer drills, proudly wears the cap of the New York Yankees during free‑play baseball, and attends a Sunday beginner gymnastics class
    at the local community center where they love balancing on the low beam.
  arts: Thomas Fonville, age four, spends afternoons drawing vibrant dinosaurs inspired by the animated series 'Adventure Time', hums the melodic refrains of 'Baby Shark' and the timeless piano tunes of
    Scott Joplin, and delights family friends with improvised puppet shows featuring characters from 'Sesame Street'.
  travel: Thomas Fonville, age four, loves weekend trips to the nearby marine aquarium where they can watch playful clownfish, dreams of a future vacation to Disneyland in California, and cherishes the
    annual family outing to the Grand Canyon for its awe‑inspiring vistas.
  culinary: Thomas Fonville, age four, adores buttery mac & cheese sprinkled with cheddar, loves apple slices dipped in creamy peanut butter, can recite the ingredients of a classic banana split, and eagerly
    helps stir pancake batter, though the kitchen is often left with a trail of flour footprints.
  core: Thomas Fonville, age four, is a tiny imaginative explorer whose boundless curiosity is balanced by an unexpected knack for organization, which shows up in everything from building block castles
    to managing a piggy bank, despite occasional forgotten bedtime tooth brushing.
