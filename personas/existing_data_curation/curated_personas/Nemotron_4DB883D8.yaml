  career_goals: Looking ahead, James aims to transition into a supervisory role where he can mentor junior officers and shape security policies at his facility. He is pursuing the Certified Protection Professional
    (CPP) credential to formalize his expertise and plans to lead a shift that consistently meets the highest performance metrics. Over the next few years, he also hopes to develop a consulting practice
    that advises local businesses on loss‑prevention strategies, ultimately securing a stable retirement while continuing to contribute to community safety.
