persona_description: A historical archaeologist who specializes in the study of iron furnace operations, particularly those from the early to mid-eighteenth century in the Catoctin Ridge area of Maryland.
  Their research interests include the development of iron technology, the economic impact of iron furnaces on the surrounding communities, and the social and cultural significance of the village complex
  that developed around the Johnson furnace. They are particularly interested in the use of coal as a fuel source and the impact of changing technology on the operation of iron furnaces.
