personas:
  professional: Ricky Lastra, a nursing assistant at Berryville Community Clinic, blends solid patient care fundamentals—vital sign monitoring, wound dressing, and EMR documentation—with a curious, art‑infused
    perspective that fuels creative problem‑solving in care plans and fuels their ambition to become a mental‑health RN and later an art‑therapy educator for elderly residents.
  sports: Ricky Lastra enjoys weekend hikes in the Ozarks, occasional fishing trips on the White River, and participates in the Berryville Trail Runners club, while cheering for the Arkansas Razorbacks
    football team and the St. Louis Cardinals baseball club during the season.
  arts: Ricky Lastra spends evenings sketching Ozark vistas inspired by Thomas Moran, captures moody light in photographs echoing Ansel Adams, strums acoustic renditions of Bob Dylan and Sufjan Stevens
    on a worn‑in guitar, and engages in a small book club discussing contemporary fiction by Haruki Murakami and philosophical works by Simone de Beauvoir.
  travel: Ricky Lastra prefers low‑cost, nature‑focused getaways, having trekked the Ozark National Forest, explored the Great Smoky Mountains, and attended a music festival in Nashville, while dreaming
    of photographing the red rocks of Sedona and the cherry blossoms of Kyoto on a future backpacking adventure.
  culinary: Ricky Lastra enjoys experimenting in the kitchen, turning classic shrimp and grits into a smoky paprika‑infused version, spicing fried chicken with a hot honey glaze, whisking collard greens
    with smoked paprika and apple cider vinegar, and baking peach cobbler that incorporates fresh ginger for an unexpected zing.
  core: Ricky Lastra is a quietly intense 20‑year‑old nursing assistant who channels curiosity, artistic flair, and a restless anxiety into compassionate patient care, soulful guitar sessions, and meticulous
    yet flexible plans for a future that melds mental‑health nursing with community art therapy.
background:
  cultural: Ricky was raised in Berryville, a small town in the Ozark region of northwestern Arkansas. His family's white American background is rooted in Midwestern-Southern traditions that value self-reliance,
    community service, and a close connection to the land. Attending church gatherings and local volunteer events instilled a strong sense of compassion and responsibility. The region's folk music, storytelling,
    and outdoor lifestyle nurtured his love of acoustic guitar, hiking, and fishing. While his upbringing emphasized modest, down-to-earth values, his curiosity and college exposure have broadened his outlook,
    leading him to explore diverse artistic and intellectual ideas. This blend of rural Southern heritage and an emerging openness to new perspectives shapes his desire to bring creative, mental-health-focused
    initiatives to his community.
attributes:
  skills: '["Patient care assistance", "Vital sign monitoring", "Wound care and dressing changes", "Electronic medical record documentation", "Infection control practices", "Medication assistance (under
    supervision)", "Team collaboration and communication", "Time management", "Crisis de-escalation", "Emotional support provision", "Observational drawing", "Creative problem-solving in care planning"]'
  hobbies: '["Sketching and drawing", "Landscape photography", "Acoustic guitar playing", "Reading contemporary fiction and philosophy", "Participating in a small book club", "Attending community art workshops",
    "Hiking and nature walks", "Fishing", "Mindfulness meditation and journaling", "Volunteering at local art fairs", "Experimenting with cooking Southern recipes"]'
  career_goals: Ricky plans to advance from nursing assistant to a registered nurse by enrolling in an accelerated Bachelor of Science in Nursing program while continuing to work part-time. He is drawn
    to mental health nursing, hoping to integrate his interest in art by establishing art-therapy activities for elderly residents. In the next few years he aims to become a certified nursing assistant
    educator, mentoring new aides. Ultimately, he envisions creating a community health outreach initiative in Berryville that combines creative workshops, mental-health awareness, and preventative care
    to address rural health disparities.
