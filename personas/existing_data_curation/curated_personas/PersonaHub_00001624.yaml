persona_description: A person who enjoys spending time outdoors, particularly during the summer months when the sun is at its highest. They are aware of the harmful effects of the sun's ultraviolet rays
  and the damage it can cause to the ozone layer. They are concerned about the health risks associated with prolonged exposure to the sun and are therefore cautious about how much sun they expose themselves
  to. They are also aware of the importance of moderation in sun exposure and are aware of the different factors that can affect the amount of UV that reaches and is absorbed by a person's skin, such as
  the season, latitude, time of day, and skin coloring. They are interested in learning more about the science behind sun exposure and the ways in which it can be safely and effectively managed.
