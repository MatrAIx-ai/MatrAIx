  career_goals: Emily aims to build a robust career in operations management. In the short term, she plans to complete a bachelor’s degree in Business Administration, earn a Six Sigma Green Belt, and lead
    a cross‑functional process‑improvement project at her current company. Within five years, she envisions moving into an Operations Manager role, overseeing multiple sites and driving strategic initiatives.
    Long‑term, she hopes to start her own consulting firm that helps small businesses in rural Georgia adopt modern operational practices and technology.
