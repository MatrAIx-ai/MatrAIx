personas:
  professional: Danilo Lee, a 13-year-old aspiring robotics hobbyist, combines his love of routine and practical problem-solving with his sociable energy by reliably coordinating his school's weekly robotics
    club builds, meticulously following step-by-step checklists while still encouraging teammates to pitch creative tweaks.
  sports: Danilo Lee thrives on the soccer field as a midfielder for the local youth Falcons, cheering on the professional Guardians during weekend matches, and spends evenings at the Riverside Skate Club
    mastering new tricks on the concrete half-pipe, balancing structured team drills with the free-flow of skate culture.
  arts: Danilo Lee channels creative flair into the school band as a rhythm-guitarist idolizing John Mayer, sketches comic strips inspired by Stan Lee's dynamic panels, and curates a growing collection
    of Pokémon cards, often swapping stories about the latest releases with friends during after-school hangouts.
  travel: Danilo Lee prefers well-planned weekend getaways that blend familiarity with a splash of adventure, having visited the San Diego Zoo and Disney World with family, while day-tripping to the nearby
    Redwood State Park for hikes, they dream of an immersive trip to Tokyo's Akihabara district to explore robotics museums and anime culture despite a modest travel budget.
  culinary: Danilo Lee enjoys a moderate kitchen skill set, confidently whipping up pepperoni pizza and taco bowls with fresh avocado and cheddar, while also experimenting with simple ramen recipes and
    occasional baking of chocolate chip cookies, favoring bold flavors like garlic, cheese, and sriracha.
  core: Danilo Lee is a routine-driven, socially energetic teen who balances a practical love for robotics, soccer, and guitar with bouts of anxiety that fuel both diligent planning and occasional impulsive
    splurges.
background:
  cultural: Danilo is a white American adolescent raised in Los Angeles, California. His family traces its roots to various European ancestries, and his upbringing reflects mainstream U.S. cultural traditions,
    such as celebrating Thanksgiving, Christmas, and the Fourth of July. Living in a diverse, coastal city, he has been exposed to a blend of cultural influences—from the vibrant local music and art scenes
    to the city's strong emphasis on outdoor recreation and community involvement. While his household values routine and practicality, the multicultural environment of Los Angeles encourages openness,
    collaboration, and an appreciation for a range of perspectives.
