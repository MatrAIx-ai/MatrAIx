  career_goals: Danilo aims to pursue a career that combines practicality, routine, and community service. He plans to focus on his high school studies, earn good grades, and explore a certification program
    in emergency medical services or firefighting after graduation. In the meantime, he hopes to leverage his leadership in sports by coaching a youth soccer team or assisting as a training aide. Ultimately,
    he envisions a stable, structured role—such as an EMT, firefighter, or community safety officer—where he can help others while applying his organized and collaborative strengths.
