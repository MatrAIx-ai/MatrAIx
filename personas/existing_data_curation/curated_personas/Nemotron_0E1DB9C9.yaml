  career_goals: Although he is only two years old and not yet in school or the workforce, Guillermo shows a budding fascination with colors, shapes, and storytelling that hints at future aspirations in
    creative or educational fields. His family encourages his curiosity, and he often imagines drawing pictures that tell stories about his Mexican heritage. This early spark may one day guide him toward
    a career as a visual artist, illustrator, or early‑child educator who shares cultural narratives and nurtures curiosity in young learners.
