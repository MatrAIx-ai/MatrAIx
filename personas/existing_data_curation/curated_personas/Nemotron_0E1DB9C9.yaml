personas:
  professional: Guillermo Ortega, a two-year-old who treats his living room carpet as an open-plan office, demonstrates early problem-solving skills by stacking wooden blocks with surprising precision while
    balancing the routine of a daily nap with spontaneous bursts of imaginative play.
  sports: Guillermo Ortega, a two-year-old who eagerly joins the Little Red Cubs toddler soccer club every Saturday, idolizes the hometown baseball team the Riverside Rockets, and balances his boundless
    energy with short nap intervals to keep his fitness level in check.
  arts: Guillermo Ortega, a two-year-old who loves listening to Raffi's Baby Beluga while finger-painting abstract shapes, mimics dances from the animated series Bluey, and claims a stuffed rabbit as a
    trusted creative sidekick.
  travel: Guillermo Ortega, a two-year-old who prefers short car rides to familiar places like the family's beach cottage in San Diego, dreams of seeing the bright lights of Times Square, and enjoys vacations
    when parents schedule a nap-friendly itinerary with plenty of snacks and a portable playpen.
  culinary: Guillermo Ortega, a two-year-old who energetically smears mashed avocado on toast, delights in banana pancakes topped with a drizzle of honey, and insists on tasting the cinnamon-sprinkled applesauce
    from the kitchen counter.
  core: Guillermo Ortega, a two-year-old with a calm, curious nature, obsessively collects smooth pebbles, refuses bedtime when the moon is full, and quietly hums the tune of Twinkle, Twinkle, Little Star
    while sorting crayons by color.
background:
  cultural: Guillermo is a Mexican‑American toddler raised in Midland, Texas. He grows up in a bilingual household where Spanish is spoken alongside English, and he participates in Mexican traditions such
    as Día de los Muertos celebrations, family gatherings with tacos and tamales, and listening to mariachi music. The West Texas environment adds a desert landscape influence, community events tied to
    the oil industry, and a blend of Southwestern customs. This rich cultural tapestry shapes his early experiences, language development, and appreciation for both Mexican heritage and the local Texan
    community.
