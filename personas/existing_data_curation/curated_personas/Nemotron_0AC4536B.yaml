  career_goals: 'Misun dreams of becoming a scientist‑engineer who designs practical solutions to everyday problems, such as eco‑friendly gadgets or educational tools. She envisions a clear path: excelling
    in math and science classes, joining the school robotics club, and eventually attending a STEM‑focused middle school. Her curiosity drives her to explore new ideas, while her practicality ensures she
    sets concrete milestones, like mastering coding basics and participating in science fairs, to keep her long‑term ambition grounded.'
