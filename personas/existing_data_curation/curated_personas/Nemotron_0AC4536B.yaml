personas:
  professional: Misun Deng is an aspiring young scientist who combines a love of chemistry kits, meticulous LEGO engineering, and disciplined piano practice to solve problems methodically while dreaming
    of one day designing eco‑friendly inventions.
  sports: Misun Deng plays on the local Pacific Youth Swim Club during the summer, attends a Saturday morning taekwondo class for discipline, cheers for the Seattle Seahawks in football season, and enjoys
    watching the Seattle Storm’s WNBA games as a young fan.
  arts: Misun Deng delights in playing piano pieces by Yiruma, practicing Korean calligraphy on traditional rice‑paper during family evenings, building intricate LEGO Architecture models inspired by the
    works of Frank Lloyd Wright, and losing themselves in fantasy novels by J.K. Rowling and science adventures by Isaac Asimov, all of which shape a creative yet orderly identity.
  travel: Misun Deng loves family trips that blend structured itineraries with quiet moments, having visited the interactive science museum in San Francisco, the bamboo forest in Kyoto, and dreaming of
    a future visit to the Grand Canyon for its awe‑inspiring vistas, while always packing a favorite LEGO set for downtime on the road.
  culinary: Misun Deng prefers simple, balanced meals like cheese pizza, spaghetti with marinara, and fruit smoothies with banana and blueberries, enjoys helping blend pancake batter under parental supervision,
    and takes pride in mastering the precise measurements needed for a perfect kimchi fried rice, reflecting a budding but meticulous culinary curiosity.
  core: Misun Deng is a methodical eight‑year‑old who turns curiosity into carefully organized projects, yet often worries about the smallest details, leading to both impressive achievements and occasional
    over‑thinking.
background:
  cultural: Misun is a second‑generation Korean‑American raised in Philadelphia. Her household blends Korean traditions—such as celebrating Chuseok and Lunar New Year, speaking Korean at home, and enjoying
    Korean cuisine—with American customs like Thanksgiving and Halloween. This bicultural environment nurtures her bilingual abilities and appreciation for both cultures' emphasis on education and community.
    While she participates in local community events and school activities, she also maintains close ties to her heritage through family gatherings, language lessons, and occasional visits to a Korean cultural
    center in the city.
