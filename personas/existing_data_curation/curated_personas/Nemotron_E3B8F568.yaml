  hobbies: '[''abstract painting'', ''experimental cooking'', ''organic gardening'', ''senior center improv workshops'', ''jazz jam sessions'', ''speculative fiction book club'', ''bridge tournaments'',
    ''chess meet‑ups'']'
  career_goals: Although retired from formal employment, Emma aspires to become the lead docent for Savannah's historic African‑American district, using her storytelling talent to educate visitors. She
    hopes to publish a memoir that blends personal memories with speculative fiction, thereby preserving her family’s legacy while exploring new artistic frontiers. Additionally, Emma aims to launch a community
    arts program that pairs senior volunteers with local schools, fostering creative exchange and reinforcing her reputation as a cultural catalyst in her neighborhood.
