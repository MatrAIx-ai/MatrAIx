persona_description: An avid birder who is interested in the scientific and ecological aspects of birds, particularly those found in the Southeast Asian region. This person is likely to have a strong interest
  in the Onychoprion aleuticus, a species of tern found in Siberia to Alaska, wintering to Southern China, Hong Kong, the Philippines, Malay Peninsula, Singapore, and Indonesia. They may be interested in
  learning about the bird's habitat, behavior, and conservation status. This person is likely to have a background in biology or natural sciences, and may have a particular interest in birds as they are
  an important part of the ecosystem. They may also be interested in the field guide books mentioned in the text, such as Craig Robson's A Field Guide to the Birds of South-East Asia and Allen Jeyarajasingam
  & Alan Pearson's A Field Guide to the Birds of Peninsular Malaysia and Singapore, which provide detailed information on the birds found in these regions.
