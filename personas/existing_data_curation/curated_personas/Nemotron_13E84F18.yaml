  hobbies: '[''Woodworking'', ''Puzzle solving (crosswords, sudoku)'', ''Reading scientific and historical non‑fiction'', ''Cooking traditional Salvadoran dishes (pupusas, tamales)'', ''Coastal jogging
    and nature walks'', ''Landscape photography'', ''Volunteer mental‑health education'', ''Playing chess'']'
  career_goals: Looking ahead, Humberto aims to transition into a lead‑technician or clinical coordinator role where he can shape patient‑care pathways and champion data‑driven improvements. He plans to
    develop a culturally tailored mental‑health outreach program for the Salvadoran community in Greater Boston, leveraging his bilingual skills and personal network. Competitively, he wants to publish
    a case‑study on the impact of evidence‑based crisis interventions, securing recognition within his institution for innovative practice. As retirement approaches, he also envisions a mentorship legacy,
    training the next generation of technicians to balance curiosity with pragmatic care.
