  career_goals: Andrew plans to enroll in a bachelor's program that bridges technology and art—such as Interaction Design, Human-Computer Interaction, or Computer Science with a focus on UI/UX. He aspires
    to become a creative technologist or UX/UI designer who crafts intuitive digital experiences, eventually leading multidisciplinary design teams at an innovative tech firm or running his own freelance
    studio. He also hopes to develop an independent video game that merges narrative storytelling with experimental art, reflecting his love for novelty and abstract concepts.
