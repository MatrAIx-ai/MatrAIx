  career_goals: Artha aims to advance from her current first‑line supervisory role to a plant‑manager position within the next three to five years, leveraging her hands‑on experience to drive larger‑scale
    operational efficiencies. She plans to obtain advanced certifications, such as a Six Sigma Black Belt and an occupational health and safety credential, to deepen her expertise in process optimization
    and workplace safety. A key ambition is to design and implement a formal mentorship program for new hires, improving retention and skill development across the workforce. Long‑term, Artha envisions
    transitioning to a regional operations role or establishing a consulting practice that assists small manufacturers in Central Florida with lean‑manufacturing and quality‑improvement initiatives, while
    maintaining a balanced work‑life schedule as she approaches retirement.
