personas:
  professional: Artha Jordan is a seasoned manufacturing supervisor with over two decades of experience applying Six Sigma Green Belt methodology, lean-manufacturing initiatives, and compassionate mentorship,
    using their methodical, organized nature to pursue a plant-manager role and eventually a consulting practice for small Central Florida manufacturers.
  sports: Artha Jordan stays active by walking the lakeside trail each sunrise, participates in a local women's pick-up softball league with the Orlando Women's Softball Club, and loyally follows the Orlando
    Magic and Tampa Bay Rays, preferring low-impact exercise and small-group activity over crowded gyms.
  arts: Artha Jordan expresses their creativity through quilting intricate hand-stitched projects, finds inspiration in soft-rock R&B artists like Stevie Wonder and Alicia Keys while cooking, reads historical
    biographies at the community library, and enjoys attending local theatre productions starring actors such as Jeff Daniels.
  travel: Artha Jordan favors meticulously planned road trips to historic Southern towns such as Savannah's cobblestone streets, Charleston's culinary scene, and Asheville's mountain arts community, traveling
    with their close-knit book club for cultural enrichment while keeping expenses within a modest budget.
  culinary: Artha Jordan prepares beloved Southern comfort foods like shrimp and grits, fried catfish with collard greens, and a garden-fresh tomato-okra stew, skillfully blending herbs from their own plot,
    and although they are an intermediate home cook, they sometimes over-salt dishes in their enthusiasm for bold flavors.
  core: Artha Jordan is a methodical, compassionate manufacturing leader who balances structured career goals with a love for gardening, quilting, and Southern cooking while quietly nurturing their community.
background:
  cultural: Artha was raised in a close‑knit African‑American family in Central Florida, where church and community service have long been central pillars of daily life. Her grandparents migrated from the
    Deep South during the 1960s, bringing traditions of gospel music, soul food, and a strong sense of collective responsibility. Growing up in Davenport, she attended a historically Black elementary school
    before moving to an integrated high school, experiences that fostered both pride in her cultural heritage and an appreciation for cross‑cultural collaboration. The values of perseverance, respect for
    elders, and service to the community, emphasized in her upbringing, continue to shape her compassionate leadership style and her involvement in local volunteer initiatives.
