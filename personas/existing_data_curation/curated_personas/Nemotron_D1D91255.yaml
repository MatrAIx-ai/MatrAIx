personas:
  professional: Agueda Haque, a retired community liaison, draws on their bilingual fluency, meticulous event coordination, and fiercely competitive mindset to champion senior programs and mediate disputes,
    all while staying vigilant for hidden motives.
  sports: Agueda Haque, who enjoys strolling with their golden retriever through the nearby park and joining the senior walking club, also supports the Dallas Cowboys on game days, follows the Texas Rangers,
    and participates in low‑impact aerobics at the community center each spring.
  arts: Agueda Haque, a lifelong lover of melody and mystery, regularly plays the sounds of mariachi legend Vicente Fernández, cumbia rhythmist Celso Piña, and norteño icons Los Tigres del Norte, while
    devouring Agatha Christie thrillers and attending local theater productions of classic dramas.
  travel: Agueda Haque, preferring relaxed, family‑friendly road trips, often plans weekend outings to culturally rich destinations like San Miguel de Allende, Santa Fe, and Austin, and dreams of a pilgrimage
    to Oaxaca, though they weigh each journey against their modest travel budget and lingering worry about medical access.
  culinary: Agueda Haque, an adept home chef, takes pride in hand‑rolling tamales with masa and slow‑cooked chilies, simmering mole enriched with chocolate and spices, and crafting hearty pozole brimming
    with hominy, frequently hosting neighborhood potlucks where they swap secret ingredient tips for chiles rellenos and arroz con pollo.
  core: Agueda Haque blends a competitive drive with warm community spirit, obsessively organizes bingo nights while fretting over every detail, and can’t resist slipping a confidential recipe to a friend
    over a game of cards.
background:
  cultural: Agueda grew up in a Mexican‑American household where Spanish was spoken daily and Mexican holidays such as Día de los Muertos, Cinco de Mayo, and Las Posadas were celebrated with family rituals
    and traditional foods. She maintains strong ties to the local Mexican community in Haltom City, regularly participating in cultural festivals, sharing traditional recipes, and teaching younger generations
    about Mexican customs. Her identity blends the warmth, hospitality, and resilience of her Mexican heritage with the suburban Texan lifestyle, influencing her values of family cohesion, community service,
    and cultural pride.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Event planning and coordination'', ''Traditional Mexican cooking'', ''Community outreach and volunteer management'', ''Gardening and small‑scale
