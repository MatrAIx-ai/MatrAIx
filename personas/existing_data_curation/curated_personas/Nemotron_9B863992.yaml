personas:
  professional: Jacqueline Mcguire, a budding comic-book illustrator and digital storyteller, combines a curious mind and organized work ethic to sketch daily panel ideas, master Procreate tools, and collaborate
    with classmates on school art projects, channeling their love for fantasy narratives into a growing personal portfolio.
  sports: Jacqueline Mcguire, a midfielder for the neighborhood Hagerstown Hawks soccer club, spends Saturday mornings hiking the Catoctin ridges, cheers on the Baltimore Ravens during football season and
    follows the Washington Capitals in hockey, and balances their active schedule with daily stretching routines to prevent ankle sprains they once suffered in a crowded match.
  arts: Jacqueline Mcguire, an avid comic creator who draws with ink pens and digitally paints Appalachian landscapes on their tablet, finds inspiration in the storytelling of Neil Gaiman, the magical worlds
    of J.K. Rowling, and the animated films of Hayao Miyazaki, while also playing piano pieces by Ludovico Einaudi and singing in the school choir to nurture their artistic voice.
  travel: Jacqueline Mcguire, whose family vacations blend local tradition with curiosity, has explored the historic streets of Williamsburg, trekked the misty trails of Shenandoah National Park, and dreamily
    plans a future trip to the Scottish Highlands to see ancient castles, preferring road-trip itineraries that let them stop at quirky roadside museums and sample regional snacks.
  culinary: Jacqueline Mcguire, a self-declared snack connoisseur, loves homemade mac and cheese with sharp cheddar and crispy bacon, enjoys whipping up blueberry pancakes topped with basil-infused maple
    syrup, and often experiments with simple pastas using garlic, sun-dried tomatoes, and mozzarella while honing their beginner-level cooking skills in the family kitchen.
  core: Jacqueline Mcguire, a 12-year-old whirlwind of curiosity, never lets a blank page survive and habitually swaps homework for doodling whenever inspiration strikes.
background:
  cultural: Jacqueline grows up in a middle‑class, white American family in Hagerstown, Maryland, with Irish and German ancestry that influences holiday traditions and family stories. Her household celebrates
    broadly observed American holidays—Thanksgiving, Fourth of July, and Christmas—with communal meals and community events such as the Washington County Fair. The town's mix of suburban and Appalachian
    cultural elements fosters her appreciation for storytelling, folk music, and outdoor recreation. She frequently visits the local public library and community center, participates in school and church
    activities, and values education, community service, and close family bonds.
