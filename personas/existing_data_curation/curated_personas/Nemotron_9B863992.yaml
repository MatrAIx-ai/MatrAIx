  career_goals: Jacqueline dreams of attending a high school with a strong visual‑arts program and eventually studying illustration or animation in college. She hopes to become a graphic novelist or animator
    who can blend storytelling with visual art to raise awareness about topics she cares about, such as environmental conservation. In the longer term, she envisions creating community art workshops for
    youth, combining her love of creativity with her desire to mentor and inspire other kids. She also aspires to win regional art competitions and have her work displayed in local galleries.
