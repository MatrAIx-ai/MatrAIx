personas:
  professional: A budding architect in the making, Justin Sheppard eagerly stacks interlocking blocks into precise geometric patterns, demonstrating early spatial reasoning, meticulous planning, and a vivid
    imagination that hint at a future career designing structures.
  sports: A budding soccer enthusiast, Justin Sheppard participates in the local “Tiny Tots Soccer Club” where he idolizes the Seattle Sounders, enjoys short bursts of goal‑scoring play in the backyard,
    and prefers small‑group drills over crowded matches, reflecting his reserved yet cooperative nature.
  arts: A miniature artist, Justin Sheppard delights in finger‑painting abstract swirls of neon colors, loves humming along to Raffi’s “Baby Beluga” and Mozart’s “Eine kleine Nachtmusik,” and proudly displays
    stickers of his favorite cartoon characters, embodying his love for novelty, creativity, and structured play.
  travel: A curious little explorer, Justin Sheppard has already visited Grandma’s countryside farm, a nearby aquarium, and taken a family road‑trip to the Grand Canyon, favoring short, well‑planned outings
    with plenty of nap time and dreaming of a future adventure at Disney World’s Magic Kingdom.
  culinary: A selective tiny gourmand, Justin Sheppard favors soft scrambled eggs, sweet potato fries, and the occasional avocado toast, insists on a sprig of basil on his mac & cheese, and only tries new
    textures when presented on his beloved dinosaur‑shaped plate, revealing a cautious yet imaginative palate.
  core: Justin Sheppard, a two‑year‑old with boundless imagination, methodical block‑building, disciplined piggy‑bank habits, calm health routines, and a picky‑food streak, navigates toddlerhood with quiet
    curiosity and occasional stubbornness.
background:
  cultural: Justin is being raised in a middle‑class, white family in Marietta, Georgia, a suburban community in Cobb County. His upbringing reflects Southern values such as hospitality, community involvement,
    and a respect for family traditions, while his parents actively expose him to a blend of local cultural activities—preschool programs, weekend visits to the Marietta Museum of History and local parks—and
    encourage appreciation for both classic Southern cuisine and diverse artistic experiences.
