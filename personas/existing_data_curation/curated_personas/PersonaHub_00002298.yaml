persona_description: A pediatrician who prefers to discuss symptoms and candidate diagnoses in their interactions with parents, and is more likely to prescribe antibiotics when a candidate diagnosis is
  offered. They are familiar with the study by Tanya Stivers, Ph.D., of the University of California at Los Angeles, and are aware of the implications of parental pressure to prescribe antibiotics. They
  are interested in understanding the nuances of presenting the problem in pediatric encounters and are looking for ways to improve their approach to communicating with parents.
