personas:
  professional: Aida Carbone, a 31‑year‑old multidisciplinary artist and community project coordinator, leverages her Adobe Photoshop and Illustrator expertise, meticulous project‑management skills, and
    imaginative flair to design eye‑catching flyers, run volunteer events, and develop a part‑time online boutique of original prints, hand‑painted ceramics, and custom greeting cards, all while maintaining
    her high standards and disciplined schedule.
  sports: Aida Carbone, a casual fitness enthusiast, practices yoga three times weekly at the Westhoff Community Center, follows the Dallas Cowboys and Houston Astros for her seasonal sports fix, and participates
    in a local adult softball league called the Westhoff Grasshoppers during spring, blending team camaraderie with personal wellness.
  arts: Aida Carbone, an abstract painter and digital illustrator, draws inspiration from Georgia O'Keeffe's bold color fields, Frida Kahlo's introspective symbolism, and contemporary illustrator James
    Jean's surreal textures, spending evenings sketch‑journaling, experimenting with watercolor washes, and curating virtual galleries for her online boutique.
  travel: Aida Carbone, an adventure‑curious traveler, prefers meticulously planned road trips that combine artistic workshops in Santa Fe, spontaneous photo‑excursions to Hill Country lavender fields,
    and relaxing farm stays in Tuscany‑style vineyards across Texas, while budgeting carefully to accommodate her boutique's growth and occasional family visits.
  culinary: Aida Carbone, a culinary experimenter, blends Southern comfort with Mediterranean flavors, perfecting dishes like shrimp and grits with basil‑infused olive oil, handmade gnocchi tossed in smoked
    brisket broth, and herb‑garden pesto featuring rosemary, sage, and cilantro, while honing her skill level from home‑cooked meals to occasional pop‑up dinner events.
  core: Aida Carbone, a 31‑year‑old organized dreamer, channels her imagination into art, balances disciplined budgeting with occasional splurges on paint, keeps her garden thriving despite a sneaky allergy,
    and finds peace in yoga while chasing community‑focused creativity.
background:
  cultural: Aida’s family traces its roots to southern Italy, where traditional celebrations and culinary practices were passed down through generations. Growing up in Westhoff, Texas, she blends her Italian
    heritage with the values of rural Texan life—strong community ties, modest hospitality, and a deep appreciation for family gatherings. Her upbringing in a Catholic household and participation in local
    church activities reinforce a sense of service and togetherness, while the surrounding agricultural landscape inspires her love for gardening and farm‑to‑table cooking.
