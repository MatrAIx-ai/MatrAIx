  hobbies: '[''Abstract painting'', ''Sketch journaling'', ''Reading speculative fiction'', ''DIY home‑decor'', ''Photography'', ''Italian‑Southern cooking'', ''Herb gardening'', ''Yoga and meditation'']'
  career_goals: Aida aims to transform her artistic talents into a sustainable part‑time business by launching an online boutique that sells original prints, hand‑painted ceramics, and custom greeting cards.
    She plans to develop a series of weekend art workshops for children and adults at the local community center, eventually earning a certificate in art education. Over the next five years she hopes to
    expand her brand, achieve financial independence while balancing family life, and contribute to the cultural vitality of Westhoff by organizing an annual arts festival.
