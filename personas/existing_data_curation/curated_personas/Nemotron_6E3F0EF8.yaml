  hobbies: '[''Woodworking and furniture restoration'', ''Vegetable gardening'', ''Reading historical nonfiction'', ''Genealogy research'', ''Model‑train layout building'', ''Listening to classic jazz'',
    ''Playing chess'', ''Volunteer workshop assistance at senior center'', ''Fishing'']'
  career_goals: As a retired professional, Demarko’s primary ambition is to maintain a well‑ordered, self‑sufficient household and to complete a series of home‑improvement projects that reflect his high
    standards. He aims to document his family’s genealogy and write a memoir that captures his experiences from the civil‑rights era to present‑day community life. He also strives to mentor younger relatives
    and local apprentices, offering structured guidance in practical trades. Additionally, he seeks to sustain his involvement with his church’s facilities committee, ensuring a safe and welcoming environment
    for the congregation.
