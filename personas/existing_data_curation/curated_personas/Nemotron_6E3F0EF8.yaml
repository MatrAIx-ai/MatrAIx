personas:
  professional: Demarko Abner, a 70‑year‑old retired facilities maintenance specialist, channels his three‑decade expertise in preventive maintenance planning, electrical, plumbing, and HVAC troubleshooting
    into meticulously organized home renovation projects, where his disciplined, structure‑loving mindset ensures every detail meets his exacting standards and his apprentices receive systematic mentorship.
  sports: Demarko Abner, a dedicated believer in low‑impact fitness, walks the historic campus paths three times a week, supports the University of Illinois Fighting Illini football and the Chicago Cubs,
    and belongs to the Champaign County senior cycling club for occasional leisure rides in the spring.
  arts: Demarko Abner finds solace in classic jazz, repeatedly playing Miles Davis’ ‘Kind of Blue’ and John Coltrane’s ‘A Love Supreme,’ while also attending community theater productions of August Wilson’s
    *Fences* and curating their workshop with prints of Edward Hopper’s *Nighthawks*, integrating music and visual art into daily life.
  travel: Demarko Abner prefers meticulously planned trips that blend genealogy research and quiet exploration, such as a recent week‑long pilgrimage to the National Archives in Washington, D.C., a nostalgic
    drive through the historic streets of Savannah, Georgia, and a future goal to visit the castles of England’s Yorkshire countryside.
  culinary: Demarko Abner, an adept home cook with intermediate woodworking flair, frequently prepares herb‑crusted roasted chicken with rosemary and thyme, sweet potato casserole, and hand‑made cornbread,
    savoring the fresh produce from their vegetable plot while occasionally treating themselves to a buttery slice of pecan pie from the local diner.
  core: Demarko Abner, a meticulously organized 70‑year‑old retiree, balances disciplined home‑improvement rituals with a quiet love of jazz, genealogy, and occasional indulgence in premium tools, all while
    occasionally forgetting to schedule routine eye check‑ups.
background:
  cultural: Demarko is a second‑generation African‑American who grew up during the 1950s and 60s in the Midwest, experiencing both the challenges of segregation and the optimism of the civil‑rights movement.
    His family participated in the Great Migration, relocating from the South to Illinois in search of better opportunities. A lifelong member of the local black Baptist church, he internalized values of
    community service, resilience, and respect for elders. These cultural influences shape his disciplined work ethic, emphasis on order, and dedication to mentoring younger generations. He maintains traditional
    culinary practices, celebrates milestones with family gatherings, and preserves oral histories, linking his personal identity to the broader tapestry of African‑American Midwestern heritage.
attributes:
  skills: '[''Preventive maintenance planning'', ''Electrical and plumbing troubleshooting'', ''HVAC system basics'', ''Carpentry and woodworking'', ''Budget and personal finance management'', ''Small‑group
