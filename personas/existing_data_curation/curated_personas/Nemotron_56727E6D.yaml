  hobbies: '[''Knitting'', ''Quilting'', ''Gardening'', ''Cooking traditional soul‑food recipes'', ''Church choir singing'', ''Listening to R&B and gospel music'', ''Reading newspapers'', ''Crossword puzzles'',
    ''Storytelling'', ''Neighborhood walks'']'
  career_goals: Rachel aims to keep the store a dependable neighborhood hub, continue mentoring younger employees, and use her experience to volunteer at the local senior center. She hopes to ensure her
    family’s financial stability, preserve the store’s community role, and pass on her knowledge of good service and cooperation to the next generation.
