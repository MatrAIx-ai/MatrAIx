  career_goals: Eric aims to progress to a senior software engineer position within the next three years, with a long‑term ambition of becoming a technical lead or software architect where he can influence
    system design and mentor junior developers. He values a collaborative, supportive team culture and seeks to champion sustainable development practices and workplace mental‑health awareness. He also
    plans to contribute regularly to open‑source projects focused on accessibility and security, and to maintain a work‑life balance that allows flexibility for personal pursuits.
