personas:
  professional: Eric Duncan is a full‑stack software developer who leverages modern front‑end frameworks, RESTful APIs, and cloud‑native architectures to deliver scalable, maintainable web solutions, while
    channeling their pragmatic problem‑solving mindset and collaborative spirit to mentor junior teammates and champion workplace mental‑health awareness as they eye a senior engineer role within the next
    three years.
  sports: Eric Duncan fuels his love of the outdoors by hiking the Patapsco Valley State Park trails on weekends, participates in a local intramural soccer league during the spring, and follows the Baltimore
    Ravens and Orioles with fervor, cheering them on from his living‑room couch while swapping strategic game analyses on fan forums.
  arts: Eric Duncan channels his creative spark by attending intimate live shows at Baltimore’s Rams Head Live, where bands like Tame Impala and local indie act The Hush captivate him, while he unwinds
    with science‑fiction reading marathons featuring authors such as Neal Stephenson and N.K. Jemisin, and occasionally experiments with Arduino‑driven light installations to set the mood during his gaming
    sessions.
  travel: Eric Duncan prefers a balance of spontaneous road trips and meticulously planned getaways, having explored the historic streets of Washington, D.C., the mountain vistas of Shenandoah National
    Park, and now dreaming of a summer trek through Iceland’s volcanic landscapes while budgeting for the adventure through a dedicated travel savings account.
  culinary: Eric Duncan enjoys whipping up simple comfort foods such as creamy mac and cheese, chicken pot pie, and Maryland crab cakes seasoned with Old Bay, while they also dabble in crafting homemade
    ramen broth infused with ginger and miso, showcasing a moderate cooking skill that blends reliability with occasional culinary experimentation.
  core: Eric Duncan is a 29‑year‑old full‑stack developer who balances a love for structure with spontaneous hikes, strategy‑rich video games, mindfulness routines, and a chronic undercurrent of worry,
    all while indulging in comfort food and indie music.
background:
  cultural: Eric grew up in a middle‑class, white suburban family in Baldwin, Maryland, within Baltimore County. The area’s blend of suburban stability and proximity to Baltimore’s culturally diverse urban
    environment shaped his worldview. His upbringing emphasized academic achievement, community involvement, and respect for a variety of cultural perspectives, which he expresses through appreciation for
    local music, food, and history. He participates in neighborhood volunteer tech initiatives, reflecting his cooperative, harmony‑seeking personality.
