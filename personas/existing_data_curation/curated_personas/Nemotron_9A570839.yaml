  hobbies: '[''Hiking'', ''Gardening'', ''Reading historical fiction and poetry'', ''Watercolor painting'', ''Book club participation'', ''Volunteer work at local library'', ''Knitting'', ''Community garden
    leadership'']'
  career_goals: Marilyn plans to complete a bachelor’s degree in education and pursue a master’s in educational leadership within the next three years. She aims to become a department chair or curriculum
    specialist, leading school‑wide initiatives that emphasize interdisciplinary learning and technology integration. Additionally, she hopes to establish a regional partnership program linking students
    with local farms and small businesses for experiential learning. In the longer term, she envisions stepping into an administrative role such as assistant principal to shape school culture and support
    professional development of her colleagues.
