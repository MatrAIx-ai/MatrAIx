personas:
  professional: Marilyn Dulniak, a seasoned secondary-school teacher with two decades of experience, blends inquiry‑based curriculum design with pragmatic classroom management, leveraging Google Classroom
    and interactive whiteboards while mentoring new teachers and spearheading interdisciplinary, technology‑rich projects.
  sports: Marilyn Dulniak enjoys hiking the Tuscarora Ridge in spring and fall, follows the Philadelphia Eagles and Pittsburgh Steelers on game days, participates in a local women's walking club that meets
    twice weekly, and squeezes in yoga sessions at the community center during winter evenings.
  arts: Marilyn Dulniak spends quiet evenings watercolor painting pastoral scenes inspired by the works of Winslow Homer, knits scarves while listening to folk singer Gillian Welch, and immerses herself
    in historical fiction by Philippa Gregory and poetry by Mary Oliver, often sharing these passions at the local book club.
  travel: Marilyn Dulniak favors balanced travel that mixes nature and cultural enrichment, having explored the Shenandoah National Park and the historic streets of Williamsburg, Virginia, while dreaming
    of a summer pilgrimage to the Scottish Highlands to trace Celtic folklore roots.
  culinary: Marilyn Dulniak prefers farm‑to‑table meals, often cooking roasted beet and goat cheese salads, quinoa‑stuffed bell peppers, and fresh herb‑infused lemon chicken, while experimenting with a
    homemade sourdough starter and a penchant for adding fresh basil to every dish.
  core: Marilyn Dulniak balances curiosity and practicality, channeling disciplined organization into both her teaching career and her love of gardening, art, and community service, all while maintaining
    a steady, modest financial routine and occasional impulsive artistic splurges.
background:
  cultural: Marilyn comes from a White, multi‑generational family rooted in Huntingdon County, Pennsylvania. The rural Appalachian‑influenced culture of the area, emphasizing self‑reliance, close‑knit community
    ties, and respect for tradition, informs her values. Her family heritage includes Pennsylvania Dutch and Irish ancestry common to the region, and she participates in local church activities, county
    fairs, and community gatherings that celebrate local folk music, shared meals, and the valley’s history.
attributes:
  skills: '[''Curriculum development'', ''Differentiated instruction'', ''Classroom management'', ''Formative and summative assessment'', ''Educational technology integration'', ''Project‑based learning'',
