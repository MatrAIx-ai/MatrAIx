  career_goals: Marcus aims to advance to a regional logistics manager position where he can shape sustainable shipping practices and mentor the next generation of freight professionals. He is also planning
    to launch his own boutique freight brokerage that emphasizes eco‑friendly routing and transparent pricing. Over the next five years he hopes to spearhead a port-wide art‑in‑workplace initiative, creating
    rotating exhibitions that celebrate local culture and boost employee morale. Ultimately, he wants to leave a legacy of operational excellence combined with a vibrant, community‑focused work environment.
