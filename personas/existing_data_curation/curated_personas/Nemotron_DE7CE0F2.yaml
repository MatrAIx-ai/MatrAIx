personas:
  professional: Jason Neil is a budding junior architect who channels their disciplined organization and curiosity into intricate LEGO builds of houses and bridges, and they eagerly present design plans
    during Sunday school storytelling sessions.
  sports: Jason Neil plays forward for the local community soccer league, practicing passing drills after school, and they cheer for the Atlanta Braves and Atlanta Falcons while dreaming of joining a youth
    baseball camp at the Pike County Fair.
  arts: Jason Neil loves drawing inventive contraptions while humming gospel tunes from Kirk Franklin and R&B tracks by Beyoncé, and they often explore narrative art through Mo Willems’ picture books and
    create Minecraft Education worlds that echo those stories.
  travel: Jason Neil delights in weekend trips to the Georgia State Fair and the Children's Museum of Atlanta, and they dream of traveling to Washington, D.C. to see the Smithsonian’s space exhibit and
    to Disney World for a magical vacation, preferring family‑oriented itineraries with plenty of nature hikes.
  culinary: Jason Neil favors Southern soul food like collard greens, cornbread, and fried chicken at family gatherings, enjoys helping to stir mac and cheese with sharp cheddar, and they snack on dinosaur‑shaped
    chicken nuggets while listening to gospel music, though they sometimes sneak extra cookies before dinner.
  core: Jason Neil is a curious, organized seventh‑grader who blends disciplined LEGO engineering with spirited soccer play, a love for gospel and R&B, and a habit of counting every penny, even if they
    occasionally forget their inhaler on the field.
background:
  cultural: Jason is an African‑American boy raised in Meansville, a small community in Pike County, Georgia. His family carries a deep Southern heritage, with roots that trace back to the Great Migration
    and the civil‑rights era in the South. The Moore‑Neil household places strong emphasis on family cohesion, church participation, and community service. He regularly attends a historically African‑American
    Baptist congregation where gospel music, storytelling, and celebrations like Juneteenth and Black History Month are central. Family gatherings feature traditional Southern soul food—collard greens,
    cornbread, and fried chicken—reinforcing cultural ties. Local traditions such as the Pike County Fair, community soccer leagues, and school projects highlighting African‑American contributions shape
    his sense of identity. Jason’s upbringing balances the pride of his ancestry with the values of perseverance, respect, and collective well‑being that his parents and grandparents emphasize.
