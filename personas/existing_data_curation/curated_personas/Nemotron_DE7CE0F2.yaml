  career_goals: At seven, Jason’s aspirations already point toward careers that blend his love of building, helping others, and structured problem‑solving. He dreams of becoming a civil engineer who designs
    safe playgrounds and community bridges, inspired by his LEGO projects and frequent visits to local construction sites with his dad. He is also fascinated by the idea of being a teacher, sharing knowledge
    in a way that mirrors his cooperative school habits. Occasionally, he imagines serving as a firefighter or fire chief, drawn to the role’s emphasis on teamwork, discipline, and community protection.
    In the short term, he aims to win his school’s science fair with a bridge‑building project and to lead his soccer team as captain, experiences he sees as stepping stones toward his future goals.
