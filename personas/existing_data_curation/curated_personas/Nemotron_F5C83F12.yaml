  career_goals: Kelly aims to leverage her current managerial experience to step into a regional assistant manager role within the next three years, focusing on larger retail chains with opportunities for
    mentorship and professional development. She plans to enroll part‑time in a business administration program at a nearby community college to deepen her understanding of operations and supply chain management.
    Long‑term, she dreams of opening a small boutique coffee‑shop that blends local artisan products with a community gathering space, allowing her to apply both her practical management skills and her
    curiosity about sustainable sourcing. She is also interested in eventually taking on a mentorship role to guide other young women entering retail leadership.
