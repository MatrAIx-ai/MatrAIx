personas:
  professional: Kelly Miller is a retail manager who blends sharp observational skills with a relaxed, flexible workflow, using curiosity‑driven data analysis to streamline inventory while leading a small
    team through informal, low‑key coordination and aiming for a regional assistant manager role.
  sports: Kelly Miller enjoys low‑intensity fitness, joining the Delta Walkers Club for weekend strolls along the waterways, cheering on the Stockton Ports baseball team and the Golden State Warriors, and
    occasionally playing pick‑up volleyball at the local community center.
  arts: Kelly Miller nurtures a quiet creative side by reading contemporary literary fiction from authors like Ocean Vuong and Zadie Smith, capturing Delta sunsets with a DSLR, strumming acoustic renditions
    of Joni Mitchell and Nick Drake at open‑mic nights, and sketching journal scenes inspired by the poetry of Rupi Kaur.
  travel: Kelly Miller prefers spontaneous, budget‑conscious getaways, often escaping to Lake Tahoe for a weekend of hiking and photography, dreaming of a future trip to Kyoto’s temples, and planning trips
    around student discounts and occasional rideshare deals.
  culinary: Kelly Miller experiments with simple pastries such as blueberry muffins, lemon scones, and cinnamon rolls, honing intermediate baking skills while pairing their creations with a carefully brewed
    pour‑over coffee and a dash of locally sourced honey.
  core: Kelly Miller is a quietly curious 20‑year‑old who balances solitary walks, literary musings, and modest retail leadership with a habit of misplacing keys and a persistent dream of opening a community‑focused
    boutique coffee shop.
background:
  cultural: Kelly grew up in Stockton, a city in California’s Central Valley that blends agricultural roots with diverse urban influences. Her family, who identify as white American, have lived in the area
    for several generations, originally working in the region’s service and retail sectors. The cultural fabric of Stockton—marked by close‑knit community events, weekend farmers’ markets, and a mix of
    Hispanic and Asian culinary traditions—has shaped Kelly’s appreciation for practical, communal values and an openness to exploring new ideas. While she was raised with a moderate, middle‑class upbringing
    that emphasized self‑reliance and hard work, she also enjoys the seasonal festivals and local art shows that reflect the broader multicultural tapestry of the Bay Area and Central Valley.
