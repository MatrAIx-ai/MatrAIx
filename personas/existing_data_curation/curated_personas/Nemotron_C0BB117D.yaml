personas:
  professional: Aiyah Massey, a budding student playwright and drama club leader, combines natural stage confidence with a love for organized rehearsals, turning her sociable energy and penchant for structure
    into seamless school productions despite occasional forgetfulness about meeting deadlines.
  sports: Aiyah Massey, a forward on the Riverside Rangers youth soccer team, follows the Women's National Soccer League and enjoys biking the local greenway on weekends, all while cheering for the Hollywood
    Hurricanes basketball team.
  arts: Aiyah Massey, an enthusiastic drama club member and choir singer, draws inspiration from Broadway hits like \"Hamilton\", pop icons such as Taylor Swift and Billie Eilish, and Disney animated classics,
    often crafting friendship bracelets while rehearsing lines.
  travel: Aiyah Massey loves quick weekend getaways, has explored a nearby state park and a coastal boardwalk, and dreams of visiting the Warner Bros. Studio Tour in London and experiencing the magical
    realms of Disney theme parks worldwide.
  culinary: Aiyah Massey, a junior baker, frequently helps bake chocolate chip cookies and peanut butter brownies, delights in pizza with extra cheese, and experiments with rainbow fruit kebabs and glittery
    cupcake frosting during family cooking sessions.
  core: Aiyah Massey is a lively, socially‑driven 11‑year‑old who channels her love for drama, games, and crafts into creative storytelling, while juggling occasional anxiety, impulsive spending, and a
    fondness for sweets.
background:
  cultural: Aiyah is a White, middle‑class child raised in Belleview, Florida, a small city in Marion County known for its close‑knit community and Southern‑Florida lifestyle. Her upbringing reflects mainstream
    American traditions—celebrating holidays like Thanksgiving, Halloween, and the Fourth of July with neighborhood gatherings, fireworks, and community barbecues. The region’s emphasis on Southern hospitality
    influences her friendly, outgoing demeanor, and she frequently participates in church events, local sports leagues, and community center activities. While primarily reflecting Caucasian American customs,
    she also experiences the multicultural fabric of central Florida through school friendships with Hispanic and African American peers, enriching her outlook with diverse perspectives.
