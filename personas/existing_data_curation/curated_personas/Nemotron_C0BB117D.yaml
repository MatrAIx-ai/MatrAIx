  career_goals: Aiyah dreams of a future where she can combine her love of communication, structure, and helping peers. She aspires to become a middle‑school teacher or a children's TV host, roles that
    would let her share knowledge, create engaging content, and provide a supportive, predictable environment for other kids. She also imagines directing community theater productions, where she could blend
    her performance talents with organizing events. Ultimately, she wants a career that lets her be the center of attention while making a positive difference in the lives of children.
