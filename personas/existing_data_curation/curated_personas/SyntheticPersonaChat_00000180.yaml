    I have only one child.

    I have been in 3 triathlons.

    I like snowboarding.'
  Best Generated Conversation: 'User 1: What''s your favorite sport?

    User 2: I love to snowboard!

    User 1: That''s awesome! I''ve always wanted to try it.

    User 2: You should! It''s so much fun.

    User 1: Maybe I will. I''ve heard it''s really hard to learn, though.

    User 2: It is, but it''s worth it. Once you get the hang of it, it''s really addictive.

    User 1: What''s the best part about snowboarding?

    User 2: I love the feeling of freedom. When you''re snowboarding, you feel like you can do anything.

    User 1: That sounds amazing. I''m definitely going to give it a try.

    User 2: You won''t regret it!

    User 1: What other sports do you like?

    User 2: I also like running. I run more than two miles a day, even though I hate it.

    User 1: Why do you hate it?

    User 2: I don''t know. I just don''t enjoy it. But I know it''s good for me, so I keep doing it.

    User 1: That''s very disciplined of you.

    User 2: Thanks. I try.

    User 1: What else do you like to do?

    User 2: I like to bake. I''m a really good baker.

    User 1: Oh, that''s cool. What do you like to bake?

    User 2: I like to bake all sorts of things. But my specialty is chocolate chip cookies.

    User 1: Chocolate chip cookies are my favorite!

    User 2: I know, right? They''re the best.

    User 1: What else do you like to do?

    User 2: I like to read. I''m a big fan of sci-fi and fantasy.

    User 1: Me too! I love sci-fi and fantasy.

    User 2: Oh, that''s awesome! We should talk about books sometime.

    User 1: Yeah, that would be fun.'
