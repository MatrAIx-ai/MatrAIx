  career_goals: Leobardo aims to transition from classroom teaching to a district‑wide instructional leadership role where he can champion arts‑infused curricula. He plans to pursue a master’s degree in
    curriculum and instruction, publish a guide on integrating abstract concepts into secondary education, and lead professional‑development workshops that help teachers create student‑centered, imaginative
    learning experiences. Ultimately, he hopes to establish a community art‑and‑mindfulness hub for at‑risk youth in Belleville, providing solitary creative spaces that support emotional well‑being and
    cultural expression.
