  career_goals: Bruno aims to advance from frontline support to a supervisory or quality-assurance position within the next three to five years. He wishes to lead a small team, implement process-improvement
    initiatives, and mentor new hires, leveraging his competitive drive and detail-orientation. Long-term, he envisions moving into a role that bridges customer experience with product development, perhaps
    as a user-experience analyst or a training specialist, allowing him to merge his curiosity about new ideas with his practical service background.
