personas:
  professional: Matthew Martin is an aspiring concept artist and UI/UX designer who blends digital illustration, Python generative art, and meticulous project planning with a curiosity‑driven, organization‑flexible
    approach, and they channel this blend into immersive visual experiences for indie games.
  sports: Matthew Martin regularly hikes the Ozark trail network with the Maryville Outdoor Club, plays pick‑up soccer at the local community center in summer, follows the Kansas City Royals and St. Louis
    Blues, and they balance solitary cardio with occasional team sport camaraderie.
  arts: Matthew Martin immerses themselves in sketching, digital painting, and generative art, drawing inspiration from James Turrell's light installations, H.R. Giger's surreal visuals, and Brian Eno's
    ambient soundscapes, while attending local gallery openings and open‑mic poetry nights that nurture their speculative storytelling, and they often experiment with new visual styles in late‑night sessions.
  travel: Matthew Martin favors low‑key road trips to the Ozark Riverways and weekend stays in St. Louis, dreams of an immersive cultural exchange in Kyoto, plans travel with a mix of detailed itineraries
    and spontaneous detours, balancing budget constraints with a yearning for diverse artistic perspectives, and they relish the quiet solitude of off‑the‑beaten‑path destinations.
  culinary: Matthew Martin enjoys simple, hearty meals like grilled chicken seasoned with smoked paprika and corn on the cob, experiments with Japanese ramen and avocado toast, drinks cold‑brew black coffee,
    and snacks on dark chocolate and raw almonds, often cooking at the communal kitchen of their dorm, and they appreciate the ritual of prep as a moment of creative pause.
  core: Matthew Martin is a quietly driven 19‑year‑old whose modest Midwestern upbringing fuels a relentless curiosity for blending art and technology, often pulled between late‑night coding sessions, coffee‑fueled
    sketch marathons, and a yearning to launch their own indie studio, and they balance humility with bold ambition.
background:
  cultural: Matthew is a white Midwesterner raised in Maryville, a small town in Nodaway County, Missouri. The town’s close‑knit community, agricultural surroundings, and the presence of Northwest Missouri
    State University have shaped his values of self‑reliance, modesty, and appreciation for learning. Community events, local fairs, and university cultural programs provided exposure to both traditional
    Midwestern life and artistic pursuits. This blend of rural upbringing and academic environment fosters his comfort with solitude, small‑group interactions, and a curiosity about broader, abstract ideas.
attributes:
  skills: '["Digital illustration (Adobe Photoshop, Clip Studio Paint)", "3D modeling (Blender)", "Python programming (creative coding)", "Research and critical analysis", "Creative writing (speculative
    fiction)", "Project planning and time management"]'
  hobbies: '["Sketching and digital painting", "Generative art with Python", "Reading speculative and philosophical books", "Writing short stories", "Listening to ambient/experimental music", "Hiking and
    nature photography", "Attending indie game meetups and art gallery openings"]'
  career_goals: Matthew aims to fuse his visual art and technology skills in a career as a concept artist or UI/UX designer within the interactive media or indie game industry. He plans to complete a bachelor’s
    degree in Visual Arts or Interactive Media, build a strong portfolio of interdisciplinary work, and secure an entry‑level position at a creative studio. In the longer term, he aspires to launch his
    own independent studio that produces narrative‑driven games and graphic novels, and may pursue graduate study in Digital Narrative or Creative Technology to deepen his expertise.
