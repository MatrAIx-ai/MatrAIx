personas:
  professional: A strategic sourcing specialist named Clayton Yeomans leverages five years of purchasing experience, Lean Six Sigma expertise, and advanced Excel and VBA skills to drive cost‑efficient,
    sustainable procurement at a mid‑size manufacturer, while fostering cooperative vendor relationships and rigorously tracking performance through SAP MM and Oracle, applying the same meticulous planning
    he uses for family Thanksgiving potlucks to vendor negotiations.
  sports: Clayton Yeomans is a dedicated fan of the Detroit Tigers baseball team and the Grand Rapids Griffins hockey club, participates in a local hiking group that treks the scenic trails of Muskegon
    State Park, and spends Saturday mornings fishing the Grand River for trout, preferring low‑intensity cardio like brisk walks over gym crowds while often catching a Griffins game after a family weekend
    at the annual summer festival.
  arts: Clayton Yeomans embraces the regional art scene, regularly attending the ArtPrize exhibitions and the Grand Rapids Art Museum where they admire works by Grant Wood and contemporary glass artist
    Dale Chihuly, enjoys listening to folk‑rock icons like The Avett Brothers and John Mayer while unwinding at home, and occasionally hosts puzzle nights that blend strategic board games with creative
    brain‑exercise.
  travel: Clayton Yeomans approaches travel with meticulous spreadsheets, favors road‑trip itineraries that combine nature and small‑town charm, has explored Yellowstone National Park, the Apostle Islands,
    and aims to hike Norway’s Fjordland region, balancing a modest family budget with weekend getaways to nearby Lake Michigan beaches and occasional visits to regional summer festivals.
  culinary: Clayton Yeomans enjoys cooking hearty Midwest fare, frequently preparing grilled perch with lemon‑dill sauce, homemade beef stew with carrots and potatoes, and seasonal roasted Brussels sprouts,
    while indulging in a classic pork bratwurst at a local brewery and savoring a slice of lemon pound cake for dessert, perfecting the bratwurst recipe for the family's annual backyard cookout.
  core: Clayton Yeomans is a methodical procurement strategist who channels Midwestern reliability into organized work, disciplined finances, purposeful health routines, quiet hobbies, and a steady quest
    for sustainable growth.
background:
  cultural: Clayton grew up in a typical Midwestern household in Grand Rapids, with roots tracing back to German and Irish ancestry. His upbringing emphasized hard work, community involvement, modesty,
    and a strong sense of responsibility—values reflected in his cooperative nature and dedication to family. He celebrates regional traditions such as Thanksgiving potlucks, local summer festivals, and
    the annual ArtPrize event, while maintaining occasional ties to his family's evangelical Christian heritage through community gatherings. This blend of Midwestern practicality and cultural emphasis
    on reliability shapes his approach to work, relationships, and leisure.
attributes:
  skills: '[''Strategic Sourcing'', ''Supplier Negotiation'', ''Cost Modeling'', ''Inventory Optimization'', ''Contract Compliance'', ''ERP Systems (SAP MM, Oracle Procurement)'', ''Advanced Excel (PivotTables,
    Power Query, VBA)'', ''Data Analysis and Visualization'', ''Lean Six Sigma Green Belt'', ''Process Documentation'']'
  hobbies: '[''Woodworking'', ''DIY Home Renovations'', ''Nonfiction Reading (History, Science)'', ''Puzzle Solving (Sudoku, Crossword)'', ''Bullet Journaling'', ''Fishing'', ''Hiking'', ''Strategic Board‑Game
    Nights'']'
  career_goals: Clayton aims to move into senior procurement leadership within the next three to five years, targeting roles such as Category Manager or Purchasing Manager where he can design end‑to‑end
    sourcing strategies and champion sustainable procurement practices. He plans to earn the Certified Professional in Supply Management (CPSM) credential and pursue a part‑time MBA focused on supply‑chain
    management to broaden his strategic perspective. Long‑term, he envisions leading a procurement department that balances cost efficiency with supplier diversity and environmental responsibility, providing
    stability for his family and contributing to the growth of a Midwestern manufacturing hub.
