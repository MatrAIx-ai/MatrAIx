  career_goals: She aims to become a lead architect of interactive digital experiences, eventually founding a startup that fuses art and technology to create immersive installations for public spaces. She
    aspires to shape product strategy, mentor junior developers, and champion interdisciplinary collaboration. In the next five years, she plans to contribute to open‑source creative‑coding libraries, secure
    a senior position at a forward‑thinking tech company, and launch a portfolio of personal art‑tech projects.
