  career_goals: Even at 84, Kieu remains driven to preserve her cultural legacy and stay mentally active. She hopes to compile a handwritten memoir of her family's migration story to share with her grandchildren,
    volunteer at the local Vietnamese community center to teach cooking classes, and continue learning simple technology to reduce feelings of isolation. She also aims to maintain her physical health through
    gardening and gentle yoga, and to cultivate a sense of calm to manage her anxiety and emotional reactivity.
