  career_goals: Kalei hopes to pursue a career that blends creativity with community involvement. She is interested in becoming an event planner or community outreach coordinator, where she could design
    and run youth programs, local festivals, or school activities. She also enjoys the idea of working in digital media—perhaps as a social‑media strategist for a nonprofit—so she can use her video‑making
    and communication skills to raise awareness for causes she cares about. Ultimately, she aims for a role that offers both structured planning and the flexibility to adapt to new ideas.
