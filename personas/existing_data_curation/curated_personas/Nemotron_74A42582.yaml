  hobbies: '[''Digital illustration'', ''Street photography'', ''Contemporary art gallery visits'', ''Improv theatre'', ''Social basketball league'', ''Competitive board gaming'', ''Experimental Mexican-fusion
    cooking'', ''Science fiction reading'', ''Tech meetups and hackathons'', ''Exploring urban murals'', ''Experimental electronic music'', ''Vintage vinyl collecting'']'
  career_goals: Yonis aims to transition from front-line supervisor to a district-level manager within the next three to five years, leveraging his data-centric approach to become a recognized driver of
    sales growth. He plans to earn an MBA or a retail-management certification while spearheading pilot projects that blend emerging technologies—such as AI-powered inventory forecasting and augmented-reality
    product displays—with innovative store designs inspired by Mexican art. Long-term, he aspires to hold a senior operations role where he can shape multi-store strategies, mentor emerging leaders, and
    launch his own boutique concept that fuses technology, art, and culturally resonant merchandising.
