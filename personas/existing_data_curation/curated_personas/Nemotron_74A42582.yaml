personas:
  professional: Yonis Lanas is a retail supervisor who blends data‑driven performance analytics with a flair for experimental visual merchandising, using their scripting skills to automate sales reports
    while championing AI‑powered inventory forecasting and AR product displays to prepare for a future district‑manager role.
  sports: Yonis Lanas fuels their competitive edge on the court with a local social basketball league, cheering for the Los Angeles Lakers while also supporting the LA Galaxy, and they blend their love
    for strategy into board‑gaming nights featuring Catan and Risk.
  arts: Yonis Lanas immerses themselves in the LA mural scene with street photography, creates digital illustrations inspired by artists like Shepard Fairey and Julie Mehretu, and loses themselves at experimental
    electronic music shows headlined by Aphex Twin and Flying Lotus while attending contemporary gallery openings.
  travel: Yonis Lanas prefers spontaneous, experience‑driven travel, often jet‑setting to Mexico City for culinary inspiration, road‑tripping to Joshua Tree for sunset photography, and dreaming of Reykjavik’s
    northern lights, all while budgeting for these adventures through a flexible travel fund.
  culinary: Yonis Lanas enjoys cooking experimental Mexican‑fusion dishes such as kimchi‑topped tacos, chipotle‑infused ramen, and miso‑glazed carnitas, mastering ingredients like achiote, coriander, and
    avocado, and they often invite friends over for tasting sessions after improv rehearsals.
  core: Yonis Lanas is an imaginative, data‑savvy retail leader who thrives on group dynamics, balances a love for avant‑garde art and competitive games with a laid‑back, occasionally disorganized lifestyle,
    and channels that tension into creative problem‑solving.
background:
  cultural: Yonis is a first-generation Mexican-American raised in the multicultural tapestry of Los Angeles County. Fluent in both Spanish and English, he grew up celebrating Día de los Muertos, traditional
    Mexican holidays, and family gatherings centered around Mexican cuisine, while also being immersed in the diverse influences of Southern California’s art, music, and tech scenes. His heritage informs
    his aesthetic sensibility—particularly an appreciation for vibrant colors, folk motifs, and storytelling—which he weaves into his retail visual merchandising and personal creative projects. He remains
    connected to the local Mexican community through participation in cultural festivals such as Fiesta Broadway and by supporting neighborhood murals that honor Latino history.
