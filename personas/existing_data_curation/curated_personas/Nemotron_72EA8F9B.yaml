  career_goals: Kristina’s immediate goal is to secure a full‑time position that offers a predictable schedule and clear responsibilities—ideally in a role such as administrative assistant, retail shift
    manager, or pharmacy technician where her routine‑driven nature can thrive. Over the next two to three years she plans to earn a certification as a medical or pharmacy technician, seeing it as a pathway
    to a more stable, higher‑paying career in healthcare support. Long‑term, she hopes to combine her organizational strengths and people‑skills to become a supervisory manager in a community‑oriented setting,
    providing both a reliable income and the routine structure that helps lessen her anxiety. She also intends to continue therapy and mindfulness training to better manage emotional reactivity, which she
    views as essential for sustaining career growth.
