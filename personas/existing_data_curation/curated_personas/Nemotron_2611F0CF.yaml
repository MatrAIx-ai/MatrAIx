personas:
  professional: Jenny Ramoslopez is an aspiring junior multimedia storyteller who blends vivid hand‑drawn illustrations with simple Scratch programming, channeling their boundless curiosity and well‑balanced
    mix of organization and spontaneity into weekly story‑creation projects that they reliably complete while still leaving room for impromptu doodles.
  sports: Jenny Ramoslopez plays forward for the Riverside Rangers youth soccer club, enjoys weekend practice sessions where they practice dribbling and shooting, cheers enthusiastically for the US Women’s
    National Soccer Team and its star Alex Morgan, and adds salsa dance steps to warm‑ups during family gatherings.
  arts: Jenny Ramoslopez immerses themselves in the vibrant worlds of illustrated fantasy by sketching characters inspired by Hayao Miyazaki, rereading classic Disney animated films such as Frozen, and
    devouring Stan Lee comics, while they also practice salsa and reggaetón moves to the rhythms of Marc Anthony at family celebrations, letting the arts shape their identity as a color‑loving storyteller.
  travel: Jenny Ramoslopez dreams of visiting Disney World in Orlando, has already explored the nearby state park’s hiking trails during weekend family outings, and longs to travel to the ancient Mayan
    ruins of Copán in Honduras, imagining the new stories they could weave after seeing the stone carvings.
  culinary: Jenny Ramoslopez loves helping their mom roll sweetbread dough scented with cinnamon and butter, enjoys whipping up quick cheese quesadillas with shredded chicken, and delights in snacking on
    fresh mango slices and chocolate chip cookies, proudly claiming the title of junior kitchen assistant while they occasionally forget to clean up the flour‑covered counter.
  core: Jenny Ramoslopez is a curious, art‑obsessed nine‑year‑old who balances their love for vibrant storytelling with a habit of leaving crayons scattered across the living room, and they can spend hours
    lost in a fantasy novel while still remembering to feed their goldfish each evening.
background:
  cultural: Jenny comes from a Honduran family, where Spanish is spoken at home and traditions from her parents' homeland are celebrated. She enjoys Honduran dishes like baleadas and tamales, and she participates
    in cultural celebrations such as Día de la Independencia (September 15) and Semana Santa with family. Music and dance, especially marimba rhythms and tropical beats, are a vibrant part of her upbringing.
    While growing up in New Milford, NJ, she balances her American school life with regular visits to a local Latino community center, where she shares stories, learns about other Latin cultures, and helps
    organize cultural events. This blend of Honduran heritage and American experiences shapes her identity, fostering a deep appreciation for diversity, community harmony, and artistic expression.
