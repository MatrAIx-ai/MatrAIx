  career_goals: Jenny dreams of becoming a teacher who uses art and storytelling to help kids learn, and she also imagines herself as a veterinarian caring for animals. She is fascinated by science and
    hopes to be a researcher who discovers ways to protect the environment. Additionally, she is excited about sharing her Honduran heritage through community events or becoming a cultural storyteller who
    preserves family traditions for future generations.
