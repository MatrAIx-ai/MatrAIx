  career_goals: Although retired from formal teaching, Dorys aims to leave a lasting imprint on her community by compiling a memoir of her immigrant journey, establishing a storytelling workshop that blends
    Mexican folklore with contemporary artistic expression, mentoring young educators through a volunteer program at the local community center, and creating a small herb garden that serves as a living
    repository of cultural culinary traditions. She also hopes to organize a traveling exhibition showcasing senior artists from diverse backgrounds.
