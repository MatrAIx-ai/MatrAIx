  career_goals: Lucretia dreams of a career that lets her explore the natural world while helping her community. She is fascinated by urban ecology and hopes to become an environmental scientist who studies
    how city green spaces can improve health and well‑being. She also imagines using her writing skills to create stories that give voice to young people’s emotions. Ultimately, she wants a profession that
    balances curiosity, practical impact, and the opportunity to support others, such as a community outreach coordinator for environmental education.
