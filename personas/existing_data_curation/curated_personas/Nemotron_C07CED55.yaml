personas:
  professional: Lucretia Jackson, an 11‑year‑old junior scientist in their after‑school science club, merges their sci‑fi curiosity and practical problem‑solving with keen observational sketching, collaborates
    kindly in small groups, but their flexible, often disorganized schedule and heightened emotional reactivity sometimes lead them to rush projects at the eleventh hour.
  sports: Lucretia Jackson enjoys casual jogging and bird‑watching walks in Branch Brook Park, joins the Newark Youth Soccer Club in the fall, picks up a basketball for after‑school pickup games with friends,
    proudly roots for the New York Knicks, the New York Giants, the New York Yankees, and the New Jersey Devils, yet they prefer low‑pressure, flexible exercise over regimented training.
  arts: Lucretia Jackson fuels their imagination by sketching birds and cityscapes after community art workshops, draws inspiration from visual storytellers like Jacob Lawrence, grooves to R&B and hip‑hop
    legends Beyoncé, Kendrick Lamar, and Alicia Keys, and celebrates the lyrical genius of Lin‑Manuel Miranda, weaving these influences into their journal‑filled creative world.
  travel: Lucretia Jackson loves weekend excursions to nearby cultural hotspots like Philadelphia’s museum of art and the historic streets of New York City, dreams of an adventure trip to the Grand Canyon’s
    rim for star‑gazing, plans trips with a loose itinerary that leaves room for spontaneous bird‑watching detours, yet their family finances often shape their adventures into affordable day‑trips rather
    than costly vacations.
  culinary: Lucretia Jackson, an enthusiastic junior baker, whips up vanilla‑frosted cupcakes with strawberry jam swirls alongside their mother, savors Southern‑inspired comfort foods such as collard greens,
    cornbread, and sweet‑potato pie, confidently handles butter, brown sugar, and fresh vanilla, but their cooking skills stay at the fun‑family‑cook level, preferring home‑cooked meals to fast‑food outings.
  core: Lucretia Jackson is an imaginative, 11‑year‑old who blends sci‑fi curiosity with a love for community storytelling, struggles with anxiety, and balances spontaneous creativity with a habit of leaving
    their school projects to the last minute.
background:
  cultural: Lucretia is an African‑American girl growing up in Newark, New Jersey, a city with a vibrant Black cultural heritage. Her family maintains traditions of storytelling, gospel music, and home‑cooked
    Southern‑inspired meals, and she often hears about the city’s civil‑rights history from her parents and grandparents. Community institutions such as the local library, the Newark Public Schools, and
    neighborhood churches play central roles in her life, offering after‑school programs, mentorship, and cultural events like block parties and the Newark Black Film Festival. These influences nurture
    her sense of belonging, her collaborative spirit, and her desire to give back to the community.
