  hobbies: '[''Fishing'', ''Hiking'', ''Listening to bluegrass and country music'', ''Woodworking'', ''Home‑brewing'', ''Reading manufacturing podcasts and trade magazines'', ''Volunteering at community
    food bank'']'
  career_goals: Michael aims to move into a supervisory role within the next five years, targeting positions such as shift lead or production manager. He plans to complete his associate degree in industrial
    technology and earn certifications like Six Sigma Green Belt and forklift certification. His long‑term ambition is to lead efficiency projects that blend his practical experience with innovative process
    improvements, and eventually launch a small custom fabrication shop serving local businesses.
