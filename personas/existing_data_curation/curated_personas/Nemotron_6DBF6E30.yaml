  career_goals: Nancy aims to leverage her practical experience and curiosity to move into a supervisory role within retail. Over the next two years she plans to become a shift lead or assistant manager,
    and eventually target a store manager position. She also intends to complete a bachelor's degree in business administration part‑time, which will open opportunities for regional management or opening
    her own boutique that blends Mexican cultural products with modern retail trends. Flexibility remains important, so she prefers positions that allow adaptable scheduling while offering stable benefits.
