personas:
  professional: Nancy Maury, a bilingual retail associate proficient in POS systems, cash handling, and inventory control, leverages a calm, problem‑solving demeanor and a flexible, curiosity‑driven mindset
    to thrive in fast‑moving store environments while actively pursuing a shift‑lead role that bridges practical operations with strategic improvement.
  sports: Nancy Maury enjoys weekend hikes along Red Rock Canyon trails, belongs to a local hiking club that meets monthly, cheered on the Las Vegas Golden Knights during the NHL season, and occasionally
    joins pick‑up volleyball games at a community center, reflecting a low‑key yet consistent commitment to staying active.
  arts: Nancy Maury frequents intimate live‑music venues to hear artists like Natalia Lafourcade and Alejandro Sanz, immerses herself in historical fiction from authors such as Hilary Mantel, and channels
    creativity into knitting intricate patterns inspired by YouTube craft channel “VeryPink Knits,” weaving cultural appreciation into her artistic pursuits.
  travel: Nancy Maury prefers spontaneous weekend getaways, having explored Sedona’s red rock scenery, visited Oaxaca to hunt authentic mole recipes, and volunteered at a food‑bank in Puerto Vallarta, while
    dreaming of a future road trip across the Southwest to blend culinary inspiration with hiking adventures.
  culinary: Nancy Maury balances a love for classic Mexican comfort foods—like pozole, chiles en nogada, and cochinita pibil—with a curiosity for fusion dishes, expertly using ingredients such as dried
    chipotle, fresh epazote, and masa harina, and spends evenings perfecting recipes from cookbooks by Rick Bayless while often treating herself to a glass of mezcal.
  core: Nancy Maury blends a practical, calm work ethic with a quiet curiosity for culture, cooking, and community, navigating life with a flexible schedule, occasional disorganization, and a habit of turning
    solitary moments into creative or charitable endeavors.
background:
  cultural: Nancy was raised in a Mexican‑American household in Las Vegas, where Spanish was spoken at home and Mexican holidays such as Día de los Muertos, Cinco de Mayo, and Christmas posadas were celebrated
    with family gatherings and traditional foods. Her parents instilled a strong sense of family loyalty, community involvement, and respect for cultural heritage. She maintains close ties to the local
    Mexican community, participates in cultural festivals, and incorporates Mexican culinary traditions into her daily life, while also navigating the broader American culture of Nevada.
