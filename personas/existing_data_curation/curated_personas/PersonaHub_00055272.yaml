persona_description: A seasoned educator who is passionate about creating learner-centered environments in their classroom. They understand the importance of considering the knowledge, skills, attitudes,
  and beliefs of their learners, as well as the cultural practices that impact their learning. They are aware of the different levels of communities, including classroom, school, homes, community centers,
  after-school programs, and businesses, and the impact that cultural practices can have on these environments. They are skilled in assessing their students' thinking and understanding, and they use this
  information to continually reflect on their teaching practices and evolve their methods over time. They are aware of the iterative process of teaching and the importance of considering the different environmental
  levels and the students they are working with. They are aware of the role of the family in learning and the importance of understanding the attitudes of family members toward skills and values of schooling.
  They are aware of the need to view teaching and learning from the perspective of the overall culture of the society and its relationship to the norms of the classrooms.
