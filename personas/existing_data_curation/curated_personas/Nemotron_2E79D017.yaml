  career_goals: Approaching retirement, James aims to transition from full‑time field work to a mentorship and consulting role. He plans to earn the Certified Maintenance & Reliability Professional (CMRP)
    credential, launch a part‑time consulting service that helps small property owners optimize maintenance schedules, and volunteer his expertise with local Habitat for Humanity projects. Additionally,
    he hopes to create a series of workshops for community colleges to pass on his trade knowledge, ensuring a lasting legacy for the next generation of maintenance professionals.
