  hobbies: '["Gardening (vegetable and flower beds)", "Woodworking (furniture building)", "Senior bowling league", "Volunteering at the food pantry", "Historical society meetings", "Reading biographies
    and local history", "Playing bridge", "Walking his dog", "Watching classic movies", "Attending church socials"]'
  career_goals: Although retired, Joseph aims to stay actively engaged in his community. He hopes to mentor younger residents through the local historical society, complete the bachelor's degree he began
    decades ago, and write a memoir documenting Brookfield’s industrial heritage. He also aspires to organize a small exhibition of local history artifacts, maintain his health through regular walking and
    stress‑reduction practices, and travel occasionally to visit family members across the country.
