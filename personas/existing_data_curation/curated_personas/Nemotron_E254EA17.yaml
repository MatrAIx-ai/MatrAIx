personas:
  professional: A budding robotics and strategy enthusiast, Bradley Purcell channels their love of structure and practical problem‑solving into building LEGO‑based automated devices, while their competitive
    edge sharpens their programming and tactical gaming skills, making them a reliable yet driven young innovator.
  sports: A dedicated Little League baseball player, Bradley Purcell pitches for the Bayou Bulls, follows a strict training schedule, and tracks performance stats like a pro, cheering on the New Orleans
    Saints in the fall, the New Orleans Pelicans in winter, and the LSU Tigers during college football season, while they embody a balanced yet competitive athletic mindset.
  arts: A budding acoustic guitarist, Bradley Purcell strums along to John Mayer and Ed Sheeran while devouring adventure and sci‑fi novels like Ender’s Game, and they often quote lines from Star Wars,
    letting music and storytelling shape their imaginative yet grounded worldview.
  travel: An organized young explorer, Bradley Purcell prefers meticulously planned weekend trips—like camping in the nearby bayou, a family road‑trip to the Everglades, and a summer visit to Orlando’s
    theme parks—balancing adventure with budget‑friendly choices while they dream of a future trip to Washington, D.C. to see the Smithsonian.
  culinary: A budding home‑chef, Bradley Purcell loves cooking fish tacos with grilled shrimp, corn, and jalapeño, can whip up a decent spaghetti Bolognese, and often assists dad in preparing Cajun gumbo,
    favoring bold flavors and hands‑on cooking, and they still prefer pizza night as a quick treat.
  core: Bradley Purcell is a structure‑loving, competitive 12‑year‑old who balances LEGO robotics, baseball, and strategy gaming with a meticulous approach to saving, health, and weekend adventures, and
    they indulge in guitar riffs and sci‑fi tales.
background:
  cultural: Bradley grows up in League City, a suburban community in Galveston County, Texas, where Southern hospitality and Texan pride shape his upbringing. His family embraces traditional values such
    as hard work, self‑reliance, and community involvement, often attending local church gatherings, Texas‑style BBQs, and high school football games. The proximity to the Gulf Coast gives him a love for
    fishing and outdoor activities, while the nearby Houston space industry fuels his interest in aerospace. He celebrates holidays like Thanksgiving and the Fourth of July with spirited family traditions,
    enjoys country music and regional cuisine, and feels a strong sense of identity tied to both his local community and broader Texan culture.
