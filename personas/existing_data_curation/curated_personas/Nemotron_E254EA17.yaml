  career_goals: Bradley aims to earn a college scholarship for baseball with the long‑term ambition of playing professionally, while also nurturing a parallel dream of working in aerospace engineering inspired
    by the nearby Johnson Space Center. He plans to strengthen his math and science foundation to qualify for engineering programs and envisions a future that blends structure, teamwork, and competition—such
    as a project manager in a technology firm or a professional athlete. He also sees himself contributing to his community, possibly as a firefighter or Navy enlisted member, as part of his broader desire
    to serve and lead.
