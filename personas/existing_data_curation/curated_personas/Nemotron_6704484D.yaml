  hobbies: '[''Gardening'', ''Birdwatching'', ''Reading Historical Fiction'', ''Knitting'', ''Walking Nature Trails'', ''Small Book Club'', ''Cooking Southern Cuisine'', ''Volunteering at Community Garden'',
    ''Listening to Classic Country and Jazz Music'', ''Photography (spontaneous landscape shots)'']'
  career_goals: Katherine aims to obtain the Certified Manager of Community Associations (CMCA) credential within the next two years to formalize her expertise and increase her credibility. She also wants
    to implement eco‑friendly practices across the properties she manages, such as solar lighting and drought‑resistant landscaping, reflecting her practical curiosity about sustainable solutions. Katherine
    hopes to mentor a junior property‑manager, passing on her knowledge while delegating time‑intensive tasks to reduce her own stress. Ultimately, she envisions transitioning to a consulting role that
    allows her to guide small HOAs in coastal Georgia while freeing up more personal time for family and self‑care.
