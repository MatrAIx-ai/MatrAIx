  hobbies: '[''pretend play (teacher, doctor, veterinarian)'', ''building block towers'', ''coloring and drawing'', ''singing songs'', ''exploring the park and nature'', ''listening to library storytime'',
    ''dancing to music'']'
  career_goals: Bianca frequently talks about wanting to help others and learn new things when she grows up. She dreams of becoming a teacher because she loves storytime and enjoys helping friends solve
    problems. She also imagines being a doctor or a veterinarian, caring for people and animals. Occasionally, she mentions becoming an artist, often drawing pictures of her family and the outdoors. Her
    ambitions are shaped by her caring nature, curiosity about how things work, and a desire to create harmonious environments for others.
