personas:
  professional: Elissa Whitley, an aspiring arts administrator with a natural knack for rallying diverse crowds, leverages their strong interpersonal skills, basic graphic‑design know‑how, and a relaxed‑about‑deadlines
    mindset to curate pop‑up exhibits and coordinate community festivals, while their competitive streak pushes them to out‑shine rival event planners.
  sports: Elissa Whitley, a devoted member of the Trenton Ultimate Frisbee Club who jogs through Cadwalader Park each sunrise, roots for the Philadelphia Eagles in football season and the New York Knicks
    during basketball, and squeezes indoor rock‑climbing sessions into winter weekends, embodies a sociable yet competitively driven approach to fitness.
  arts: Elissa Whitley, a frequent visitor to the New Jersey State Museum and follower of street‑artist ‘Moe,’ curates pop‑up galleries featuring emerging talents like painter Jamila Ortiz, regularly performs
    improv sketches at The Theatre on the River, and shares candid Instagram reels of murals by Shepard Fairey, letting a curious, open‑minded spirit shape their creative identity.
  travel: Elissa Whitley, a spontaneous traveler who prefers weekend road trips over meticulous itineraries, has explored the mural‑rich neighborhoods of Philadelphia, the music‑laden streets of New Orleans
    during Mardi Gras, dreams of strolling Barcelona’s El Raval district, and balances these adventures with a part‑time job that limits long‑duration vacations.
  culinary: Elissa Whitley, an enthusiastic home‑cook with intermediate skill, loves experimenting with fusion dishes like kimchi‑taco nachos, basil‑infused shrimp ramen, and matcha‑pistachio pancakes,
    sourcing fresh basil, chilies, and locally sourced quinoa from the Trenton farmers market, while occasionally treating friends to midnight guacamole sessions.
  core: Elissa Whitley is a community‑oriented art enthusiast who juggles spontaneous creativity, a competitive edge, and a laid‑back approach to obligations, often forgetting bills but never missing a
    chance to snap a mural or rally a crowd.
background:
  cultural: Elissa grew up in a white, middle‑class family of mixed Irish and German ancestry in Trenton, New Jersey. The city’s multicultural fabric exposed her to a wide range of cultural expressions—from
    Latino street festivals to African‑American jazz clubs—shaping a broad appreciation for diverse art forms. Her family valued independence, community involvement, and a love for music and visual arts,
    encouraging her curiosity and openness to unconventional ideas. While her formal education ended before ninth grade, community programs, local libraries, and neighborhood workshops provided informal
    learning experiences that deepened her artistic sensibilities and social awareness.
