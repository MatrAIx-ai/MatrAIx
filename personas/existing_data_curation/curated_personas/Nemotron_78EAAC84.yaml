  hobbies: '[''visiting art galleries'', ''street art photography'', ''improv theater'', ''open‑mic performances'', ''jogging'', ''ultimate frisbee'', ''attending live music concerts'', ''experimenting
    with fusion cooking'', ''participating in cultural festivals'', ''volunteering for community clean‑ups'']'
  career_goals: She plans to earn her GED within the next year and enroll in a community college program focused on arts administration or event management. Her short‑term goal is to secure a part‑time
    role as an assistant coordinator for a local non‑profit that runs cultural festivals. In the longer term, she aspires to launch her own community art space in Trenton that offers pop‑up galleries, workshops,
    and performance nights, providing a platform for emerging artists. She also hopes to develop a digital platform to connect local creatives with patrons, eventually turning it into a sustainable business.
