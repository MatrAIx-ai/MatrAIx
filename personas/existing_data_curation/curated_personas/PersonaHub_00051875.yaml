persona_description: A person interested in HIV/AIDS prevention and mapping, particularly in the context of rapid assessment tools like PLACE. They are likely to be involved in or interested in developing,
  implementing, or evaluating HIV/AIDS prevention programs in areas where sexual network sites are identified. They may be familiar with the PLACE method and its mapping process, and would be interested
  in understanding how to effectively use maps to monitor and improve HIV/AIDS prevention program coverage. They may also have an interest in geographic information systems (GIS) and data visualization,
  and would be interested in learning about the mapping of priority prevention areas in the context of HIV/AIDS prevention.
