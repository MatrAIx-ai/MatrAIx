  hobbies: '[''Gardening club'', ''Book discussion group (historical fiction)'', ''Quilting circle'', ''Line dancing'', ''Volunteer at food bank'', ''Walking in parks (Umstead State Park)'', ''Church choir'',
    ''Seasonal charity events'', ''Cooking family recipes'', ''Exploring new culinary techniques'']'
  career_goals: Although retired from formal employment, Tiffany aims to deepen her impact as a community volunteer coordinator, fostering intergenerational programs at the local senior center and public
    library. She aspires to compile and publish a memoir that weaves together her family history, Southern recipes, and lessons learned from decades of service. Continuing education interests include introductory
    photography and advanced cooking classes, which she hopes will enrich her mentorship of younger neighbors. Maintaining her health, financial security, and a sense of purpose remain central to her long‑term
    ambitions.
