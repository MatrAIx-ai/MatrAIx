personas:
  professional: A retired volunteer coordinator named Tiffany Whalen, who they view as a bridge between generations, leverages their strong interpersonal skills and meticulous event‑planning experience
    to design intergenerational programs at the senior center, balances curiosity about new digital tools with a practical, budget‑conscious approach, and assertively mentors younger neighbors while remaining
    reliably organized.
  sports: A line‑dancing enthusiast and brisk walker named Tiffany Whalen, who they join through the Umstead Trail Club, roots for the Carolina Hurricanes during NHL season, follows the Carolina Panthers
    on Sundays, and sometimes participates in a senior softball league at the community center, keeping their fitness routine lively and social.
  arts: A dedicated quilter and choir singer named Tiffany Whalen, who they enjoy while listening to Dolly Parton and the Chatham County Symphony, participates in monthly historical‑fiction book discussions
    featuring Hilary Mantel’s works, and draws inspiration from Southern author Pat Conroy for their patchwork designs.
  travel: An avid mini‑traveler named Tiffany Whalen, who they have explored historic Savannah and Charleston on weekend trips, dreams of driving the Blue Ridge Parkway’s fall foliage, plans a pilgrimage
    to Dublin to trace family roots, and prefers guided group tours that accommodate mobility while staying within a modest budget.
  culinary: A home‑cooking aficionado named Tiffany Whalen, who they delight in preparing family‑style fried chicken, collard greens with smoked turkey, and sweet potato pie, experiments with new techniques
    like sous‑vide shrimp étouffée using okra and creamed corn, frequently swaps recipes at senior center potlucks, though they sometimes over‑salt dishes when stress spikes.
  core: Tiffany Whalen is a sociable, detail‑oriented 72‑year‑old who channels curiosity into community service, worries about finances and health, yet finds joy in quilting, line dancing, and cooking,
    even if they occasionally forget to hydrate during busy days.
background:
  cultural: Tiffany is a white American who was born and raised in the Raleigh area of North Carolina. Her family traces its roots to English and Irish ancestors who settled in the American South generations
    ago. She grew up immersed in Southern hospitality, Methodist church traditions, and a strong sense of community service. The cultural rhythms of Southern cuisine, bluegrass music, and seasonal festivals
    have shaped her values of generosity, resilience, and connection to place.
