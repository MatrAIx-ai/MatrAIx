  hobbies: '[''Art Gallery Visits'', ''Watercolor Painting'', ''Gardening'', ''Birdwatching'', ''Historical Fiction Reading'', ''Art History Exploration'', ''Crossword Puzzles'', ''Calligraphy'', ''Cooking
    and Baking'', ''Community Volunteering (Historic Preservation)'', ''Small‑Group Theater Attendance'']'
  career_goals: Approaching retirement, Joy aims to transition from daily desk duties to a mentorship role, guiding younger colleagues in delivering high‑quality guest experiences and mastering modern reservation
    technologies. She hopes to lead a small staff committee focused on service excellence and to develop a quarterly welcome guide that highlights regional art events, historic sites, and cultural activities—leveraging
    her love of art and community knowledge. Joy also aspires to volunteer with the Old Saybrook Historical Society, where she can contribute her organizational skills to preserve local heritage, and she
    dreams of compiling a memoir of her decades‑long hospitality career, capturing the evolving landscape of tourism in New England.
