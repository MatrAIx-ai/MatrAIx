  career_goals: Garry hopes to translate his practical skill set into a part‑time handyman business serving his neighbors, while also taking on a volunteer leadership role in the town’s seniors' outreach
    program. He aims to earn a certification in home‑repair safety to enhance his credibility, and eventually, to mentor younger community members in trade skills.
