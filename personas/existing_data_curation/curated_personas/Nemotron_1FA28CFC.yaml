  career_goals: Maibel aims to advance to a supervisory role within the next three years, targeting a shift‑lead or foreperson position that allows her to oversee production teams and implement safety initiatives.
    She plans to earn OSHA certification and a CNC machining certificate to broaden her technical expertise. Parallel to her career progression, she dreams of launching a small side business that creates
    custom, up‑cycled furniture and decorative pieces that blend functional fabrication with her love of art and Latino cultural motifs. Her long‑term ambition is to secure a stable, higher‑paying position
    that supports her family while keeping her connected to the vibrant Miami community.
