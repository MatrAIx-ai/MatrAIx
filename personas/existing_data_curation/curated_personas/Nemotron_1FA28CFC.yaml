personas:
  professional: Maibel Gonzalez is a seasoned assembler and fabricator in Miami's manufacturing sector, expertly interpreting assembly drawings, wielding hand and power tools, performing meticulous quality
    inspections, and mentoring newcomers, while leveraging her curiosity to integrate 3‑D printing and CNC routing into production and eyeing a shift‑lead role bolstered by upcoming OSHA and CNC certifications.
  sports: Maibel Gonzalez joins a local beach volleyball league, attends salsa dance classes for cardio, follows the Miami Heat and Inter Miami CF with fervor, and participates in a semi‑annual 5K run with
    the Miami Runners club, balancing competitive spirit with social camaraderie.
  arts: Maibel Gonzalez immerses herself in Miami's vibrant art scene, volunteering on community mural projects inspired by the bold colors of Frida Kahlo and the urban narratives of Banksy, regularly attending
    exhibitions at PAMM, and listening to the rhythmic beats of Bad Bunny, Shakira, and traditional salsa while reading lifestyle magazines like Vogue and Casa & Jardín for creative inspiration.
  travel: Maibel Gonzalez prefers short, culturally rich getaways, often planning weekend trips to Key West, the Everglades, or the historic streets of Old Miami, while dreaming of a week‑long exploration
    of Cartagena’s colonial architecture and the tropical flavors of Puerto Rico, balancing travel with family responsibilities and a modest travel budget.
  culinary: Maibel Gonzalez enjoys cooking Caribbean‑Latin fusion dishes such as Ropa Vieja with plantain purée, Mofongo stuffed with shrimp, and a fresh mango‑coconut salsa, often experimenting with ingredients
    like achiote, cumin, and fresh cilantro, showcasing a confident intermediate skill level that blends traditional flavors with modern plating.
  core: Maibel Gonzalez blends hands‑on technical expertise with a zest for community art and lively social scenes, striving for supervisory growth while juggling a budding up‑cycling side hustle, a disciplined
    yet occasionally impulsive financial habit, and a pragmatic approach to health and fitness.
background:
  cultural: Maibel’s cultural identity is rooted in her Hispanic heritage, with family origins tracing back to Puerto Rico and the Dominican Republic. Growing up in Miami‑Dade County, she is bilingual in
    Spanish and English and actively participates in community celebrations such as Carnaval Miami, Día de los Muertos altars, and neighborhood block parties. Catholic traditions, strong family ties, and
    a love for Latin music, dance, and cuisine shape her daily life. The multicultural environment of Miami also encourages her openness to diverse artistic expressions and new ideas, influencing both her
    personal and professional pursuits.
