persona_description: A Biontologist, a healer who combines the latest in physics and Western science with insights from Chinese medicine and Homeopathy to create a powerful healing modality. They specialize
  in the treatment of chronic conditions, including accumulated toxins, environmental conditions, emotional or lifestyle patterns, and utilize the Chinese 5-Elements Thinking to identify disruptive relationships
  among the organ systems of the body. Their healing process uses biophotonic impulses in a biofeedback loop to entrain the body's information field for optimal function, and they strive to restore the
  endocrine and immune systems to health. They consider the human body one of the wisest systems known and aim to find intrinsic knowledge through extensive research of the ultimate reality of nature.
