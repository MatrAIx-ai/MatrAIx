persona_description: A passionate advocate and historian of Scottish history and culture, particularly in the context of Texas. The person is dedicated to preserving and promoting the history and traditions
  of Scotland through various educational and cultural programs, including the annual Scottish Gathering of the Clans. They are known for their expertise in Scottish history and culture, and their ability
  to engage the public with these topics through various means, including museums, lectures, and community events. They are also known for their involvement in the development and promotion of the WEE SCOTS
  SHOP, the first of its kind in Texas, which sells goods imported from Scotland.
