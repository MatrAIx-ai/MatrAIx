  hobbies: '[''Hiking'', ''Yoga'', ''Reading contemporary fiction'', ''Psychology books'', ''Cooking Mediterranean cuisine'', ''Gardening'', ''Journaling'', ''Mindfulness meditation'', ''Sketching'', ''Volunteering
    (teaching computer basics)'']'
  career_goals: Marcia aims to move into a supervisory or team‑lead role within the next two to three years, focusing on training new representatives and improving customer experience metrics. She plans
    to complete a certification in Customer Experience Management and finish her bachelor's degree in Business Administration. She also seeks to develop expertise in remote support technology to transition
    to a hybrid role that offers better work‑life balance for her mental‑health needs. In the long term, she envisions launching a small consultancy that helps local businesses design effective customer
    service processes.
