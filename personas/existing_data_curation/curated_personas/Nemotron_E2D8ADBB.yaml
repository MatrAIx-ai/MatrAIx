  career_goals: Looking ahead, Yi aims to move from a frontline labor position to a supervisory role within the next three years. He plans to obtain the Certified Logistics Associate (CLA) credential and
    complete an associate’s program in Supply Chain Management at a community college. Leveraging his curiosity about the art world, he hopes to become a logistics coordinator for galleries or museums,
    merging his material‑handling expertise with his appreciation for creative work. In the longer term, he envisions launching a boutique, artist‑focused moving and storage company that prioritizes flexible,
    low‑stress services for emerging creators. He is also open to taking on occasional freelance photography projects to supplement his income.
