personas:
  professional: Yi Do is a seasoned logistics specialist with forklift and reach‑truck certification, adept at barcode‑based inventory control in Fishbowl and SAP WM, who leverages a keen visual‑art awareness
    to handle delicate museum shipments, and they channel their curiosity and relaxed planning style into continuous process improvements as they pursue a supervisory role in the art‑logistics niche.
  sports: Yi Do is an avid cyclist who tackles the Pacific Coast Bike Trail on weekends with the Ventura Cyclists club, hikes the Santa Monica Mountains in the summer, follows the Los Angeles Dodgers and
    Los Angeles Lakers for seasonal excitement, and they treat fitness as a flexible outlet that balances competitive board‑game drives with a love for outdoor endurance.
  arts: Yi Do immerses themselves in urban mural photography inspired by artists like Shepard Fairey and Banksy, practices Mandarin calligraphy echoing the fluid strokes of Wang Xizhi, crafts minimalist
    wooden furniture that mirrors the clean lines of Scandinavian design, frequents galleries showcasing Yayoi Kusama and Edward Hopper, and they channel the ambient soundscapes of Radiohead into their
    creative workflow.
  travel: Yi Do prefers flexible, off‑the‑beaten‑path road trips that blend photography and food, having explored the mural‑rich streets of Portland, the temple gardens of Kyoto, and the coastal cliffs
    of Big Sur, while they budget for occasional weekend escapes to Santa Fe for its art festivals and plan future voyages to Taipei to reconnect with culinary roots.
  culinary: Yi Do is a confident home chef who perfects Taiwanese beef noodle soup with braised shank, star anise, and soy‑based broth, whips up savory oyster omelets using fresh oysters, sweet potato starch,
    and cilantro, experiments with seasonal farm‑to‑table ingredients like heirloom tomatoes and bok choy, and they relish the tactile joy of kneading dough for homemade bao while sharing meals with friends.
  core: Yi Do blends a hands‑on logistics career with a restless curiosity for murals, cycling, and Taiwanese cuisine, they navigate life with a relaxed, sometimes disorganized schedule, a competitive edge
    at board games, and a steady, skeptical eye toward new opportunities.
background:
  cultural: Yi Cheng Do is a second‑generation Chinese‑American raised in Southern California. His parents immigrated from Taiwan in the early 1990s, and he grew up speaking both Mandarin and English at
    home. Family gatherings revolve around traditional Lunar New Year rituals, sea‑food feasts, and storytelling about heritage, while his everyday life reflects the multicultural tapestry of Camarillo
    and Ventura County. He identifies strongly with the work ethic and respect for elders emphasized in his cultural upbringing, yet he also embraces the laid‑back, outdoor lifestyle of coastal California.
    This blend of cultures informs his appreciation for both contemporary street art and classical Asian brush painting, and it shapes his open‑minded yet pragmatic worldview.
