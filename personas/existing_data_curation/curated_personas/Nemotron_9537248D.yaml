  career_goals: Marielle dreams of a future where she can blend her love of art with caring for others. She imagines becoming an artist who creates soothing illustrations for books, or an elementary school
    teacher who uses creative projects to help children express their feelings. Over time, she hopes to study art therapy so she can support classmates who feel anxious or sad, turning her own emotional
    sensitivity into a source of comfort for others.
