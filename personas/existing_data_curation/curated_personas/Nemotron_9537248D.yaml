personas:
  professional: An aspiring children's book illustrator, Marielle Bass blends a disciplined daily sketch routine with a vivid imagination, leveraging their curiosity, thoughtful organization, and deep empathy
    to craft whimsical characters that speak to young readers.
  sports: Marielle Bass enjoys weekend bike rides through the prairie and participates in the Sunset Prairie Youth Soccer Club during the fall, cheering for the Kansas City Royals and the Nebraska Cornhuskers
    while preferring low‑key, imaginative play over intense competition.
  arts: Marielle Bass devotes afternoons to sketching animal characters inspired by the whimsical illustrations of Beatrix Potter and the bold colors of Mo Willems, while listening to Mozart’s Eine kleine
    Nachtmusik and Dolly Parton’s Coat of Many Colors, often sharing their comic strips with friends at the library's art club.
  travel: Marielle Bass dreams of exploring the geysers of Yellowstone on family road trips and imagines strolling through the streets of Paris to sketch the Eiffel Tower, yet prefers the comfort of planned,
    short weekend getaways to unfamiliar places.
  culinary: Marielle Bass loves buttery macaroni and cheese topped with a sprinkle of cheddar, delights in peanut‑butter‑and‑jelly sandwiches, and can proudly mix a fruit salad with strawberries and blueberries,
    though their kitchen adventures are limited to baking chocolate‑chip cookies under parental supervision.
  core: Marielle Bass is a quietly curious eight‑year‑old who channels vivid imagination into sketching fantastical worlds, keeps a tidy notebook of feelings, and balances gentle anxiety with a strong desire
    for harmony and artistic expression.
background:
  cultural: Marielle was raised in a predominantly white, middle‑class family in Guthrie, Oklahoma, a town known for its historic downtown and strong community spirit. Her family participates in local traditions
    such as the Oklahoma Territorial Days Festival and attends a nearby church, where values of kindness, cooperation, and modesty are emphasized. She has been exposed to a blend of Midwestern and Southern
    Plains influences, including country music, cowboy folklore, and an appreciation for the native history of the region. School and community events encourage curiosity about the world, and her parents
    support her artistic pursuits and encourage asking questions and exploring unconventional ideas.
