  career_goals: Mansoor aims to progress from a cost estimator to a senior cost manager within the next five years, securing the Certified Cost Professional (CCP) credential from AACE International. He
    is eager to lead a multidisciplinary estimating team, champion the adoption of AI‑driven cost forecasting and BIM‑based cost integration on large‑scale commercial projects, and contribute to sustainable
    construction practices. Ultimately, he envisions establishing his own consultancy that offers data‑centric cost advising while maintaining a balanced schedule that allows quality time with his wife
    and future children.
