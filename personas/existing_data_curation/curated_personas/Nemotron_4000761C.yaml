  hobbies: '["Hiking in the Green Mountains","Woodworking and furniture building","Homebrewing craft beer","Reading non‑fiction (technology, psychology)","Nature photography","Community garden volunteering","Board
    games with friends","Mindfulness meditation","Playing acoustic guitar"]'
  career_goals: Thomas aims to advance to a senior program‑management role where he can lead large, multi‑disciplinary initiatives that emphasize sustainable and socially responsible outcomes. He plans
    to earn PMP and Lean Six Sigma Black Belt certifications, mentor emerging project managers, and eventually shape the strategic direction of a PMO within a forward‑thinking organization. He also hopes
    to champion flexible work practices that balance productivity with employee well‑being.
