personas:
  professional: Thomas Frase is a project manager who blends a STEM background with hands‑on craftsmanship, building data‑driven, sustainable program plans while championing flexible work practices and
    mentoring emerging talent, all with a cooperative, community‑first mindset they nurture through regular stakeholder workshops.
  sports: Thomas Frase treks the Green Mountains in summer, joins the local trail club for weekend hikes, laces up cross‑country skis in winter, follows the Vermont Catamounts hockey team, and keeps a modest
    weekly routine of bodyweight exercises, all while modestly tracking progress on a Strava app they update after each outing.
  arts: Thomas Frase captures the crisp Vermont landscape through black‑and‑white photography, builds hand‑crafted furniture inspired by Shaker design, enjoys listening to folk legends like Bob Dylan and
    contemporary indie band Fleet Foxes, and attends the annual Burlington Arts Festival to stay immersed in local creative culture they cherish.
  travel: Thomas Frase favors low‑key, nature‑focused getaways, having explored the autumn foliage of Woodstock, the rocky coast of Maine, and a contemplative weekend in Kyoto’s garden districts, while
    dreaming of a future trip to Iceland’s geothermal sites that blend adventure with sustainable tourism they admire.
  culinary: Thomas Frase brews a seasonal amber ale flavored with Vermont maple syrup, whips up a hearty vegetable stew with locally sourced carrots and potatoes, and perfects a maple‑glazed salmon dish,
    yet occasionally over‑spices their creations when the stress of work spills into the kitchen.
  core: Thomas Frase blends practical project leadership with a love for Vermont’s outdoors, craft, and community, all while juggling worry‑induced perfectionism and a habit of over‑planning they seldom
    admit to.
background:
  cultural: Thomas was raised in Moretown, a small New England town in Washington County, Vermont. His upbringing reflects classic Yankee values of self‑reliance, community stewardship, and an appreciation
    for the outdoors. The region’s emphasis on seasonal agriculture, local craftsmanship, and civic engagement has shaped his cooperative spirit and respect for tradition, while also encouraging curiosity
    about innovative practices. His family’s roots trace back to early European settlers, and the community’s modest, inclusive ethos continues to influence his personal and professional outlook.
attributes:
  skills: '["Project planning and scheduling","Agile and Scrum methodologies","Risk assessment and mitigation","Data analysis and visualization (Excel, Tableau)","Cross‑functional team coordination","Stakeholder
