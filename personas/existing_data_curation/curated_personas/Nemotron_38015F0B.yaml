    (Dutch‑American migration, Midwestern history)'', ''Experimenting with cooking (Mediterranean and Dutch recipes)'']'
  career_goals: Looking ahead, Michael aims to transform his extensive sales background into a senior leadership role within the next three years. He plans to earn the Chartered Property‑Casualty Underwriter
    (CPCU) designation and complete his bachelor's degree in Business Administration, strengthening his strategic credibility. His long‑term ambition is to launch a boutique insurance agency that focuses
    on personalized risk management for small businesses and high‑net‑worth families in western Michigan, integrating technology‑driven underwriting tools and a strong community‑service ethic. Michael also
    seeks to develop a mentorship program for new agents, author thought‑leadership articles for industry publications, and ultimately secure a comfortable retirement that affords him the freedom to pursue
    his artistic interests full‑time.
