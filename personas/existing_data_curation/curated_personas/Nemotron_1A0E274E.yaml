  career_goals: Fredrick aims to ascend to a senior executive role such as Director of Operations or Vice President of Construction within a forward‑thinking development firm, where he can champion projects
    that blend cutting‑edge sustainability with artistic design. He dreams of eventually founding his own construction consultancy that specializes in culturally resonant, environmentally responsible builds,
    positioning himself as a thought leader at industry conferences and contributing to regional architecture through mentorship and community‑focused initiatives.
