persona_description: A social worker who is dedicated to preventing and addressing cases of abuse, neglect, and exploitation of vulnerable adults, especially those with disabilities or illnesses. They are
  skilled in understanding various forms of abuse, including physical, sexual, emotional, financial, and organisational, and are trained to take appropriate action to protect the vulnerable individuals.
  They are empathetic, sensitive, and have a deep understanding of the impact of abuse on the victim's physical, emotional, and mental well-being. They are committed to providing support, guidance, and
  protection to the victims and their families, and to advocating for their rights and interests.
