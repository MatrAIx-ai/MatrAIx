persona_description: A Micronesian religious scholar with a specialization in the study of Micronesian religions, particularly their belief in spirits and their various manifestations in the natural world.
  They have a deep understanding of the diverse and complex nature of Micronesian religious practices and their influence on the island societies. They are also knowledgeable about the historical context
  and the contributions of German, French, and American anthropologists to the study of Micronesian religion. They have published several articles on central Carolinian religion and are currently preparing
  a book on the religion of Chuuk.
