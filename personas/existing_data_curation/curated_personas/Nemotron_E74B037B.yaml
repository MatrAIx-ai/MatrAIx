  career_goals: James aims to advance from his current operator role to a supervisory position within the next three years, eventually becoming a plant lead or process engineer. He plans to complete a bachelor’s
    degree in mechanical engineering or industrial technology while obtaining certifications such as Certified Manufacturing Technologist (CMfgT) and Six Sigma Green Belt. His long‑term ambition is to drive
    efficiency initiatives across the facility, mentor junior staff, and possibly launch his own consulting firm specializing in small‑scale manufacturing optimization.
