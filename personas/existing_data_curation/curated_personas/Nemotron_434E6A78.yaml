personas:
  professional: Bobby Potts, a 23‑year‑old aspiring handyman‑entrepreneur, blends hands‑on repair skills with a budding eye for photography, leveraging their experience in small‑engine maintenance, carpentry,
    and social‑media content creation to launch a freelance photography side‑hustle while studying automotive technology at a community college.
  sports: Bobby Potts is an avid skateboarder on the Asbury Park boardwalk and a regular participant in the Jersey Shore Volleyball League, cheering for the New York Yankees and Philadelphia Eagles, which
    showcases their love for both solo and team sports and their socially engaged yet independent spirit.
  arts: Bobby Potts, a self‑taught acoustic guitarist and photographer, draws creative inspiration from indie folk artists like Bon Iver and classic sci‑fi illustrators such as Moebius, regularly jamming
    at local venues and curating Instagram feeds featuring sunset boardwalk shots and 3‑D‑printed sculptures, reflecting their curiosity‑driven artistic expression and collaborative nature.
  travel: Bobby Potts, a budget‑conscious explorer, plans weekend road trips to the Pine Barrens and occasional city getaways to New York City for live shows while dreaming of a culinary tour of Italy’s
    coastal towns, balancing limited funds with a curiosity for new experiences and a desire for occasional relaxation, and they often map out itineraries using free travel apps.
  culinary: Bobby Potts, a moderately skilled home cook, loves experimenting with dishes like spicy kimchi fried rice, homemade gnocchi with sage butter, and a tropical mango‑coconut smoothie, favoring
    fresh basil, smoked mozzarella, and jalapeños as staple pantry ingredients, reflecting their practical approach to cooking mixed with a curiosity‑driven palate.
  core: Bobby Potts blends a restless skateboard spirit with a meticulous DIY mindset, juggling late‑night jam sessions, 3‑D‑printed gadgets, and a perpetual quest for the perfect recipe while occasionally
    procrastinating on GED paperwork, and they keep the balance by setting small daily goals.
background:
  cultural: Bobby grew up in a working‑class, predominantly white, suburban setting on the New Jersey shore, specifically in Monmouth County’s Asbury Park area. His upbringing was shaped by the laid‑back
    boardwalk lifestyle, a strong local music scene that celebrates rock and indie genres, and family traditions rooted in the broader Mid‑Atlantic culture, including occasional Italian‑American holiday
    meals and community gatherings. The blend of beach culture, small‑town pride, and an emerging arts community has influenced his values, fostering a pragmatic outlook paired with an appreciation for
    creativity and local heritage.
