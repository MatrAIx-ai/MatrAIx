  career_goals: Bobby’s immediate goal is to obtain his GED within the next year, which will open the door to further education. He plans to enroll in a community‑college program or vocational school in
    Monmouth County, focusing on automotive technology or culinary arts to combine his practical repair skills with his interest in cooking. While pursuing formal training, he aims to build a portfolio
    of photography and digital content that could support freelance work. In the longer term, he envisions establishing a small handyman service that offers reliable home‑repair assistance to neighbors,
    alongside a side venture as a freelance photographer for local events and businesses. Achieving financial independence, developing a reputation for reliability, and contributing to his community are
    central to his ambitions.
