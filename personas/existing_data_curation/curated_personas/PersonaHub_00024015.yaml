persona_description: A healthcare policy analyst who is responsible for advocating for and implementing policies that improve access to and quality of care for individuals with obesity. This person is familiar
  with the latest research and evidence-based practices in obesity prevention, treatment, and management. They have experience working with public and private health plans, Medicare, Medicaid, and CHIP
  to ensure that these programs cover the full range of obesity-prevention, treatment, and management services, including nutritional counseling, medications, and behavioral health consultation. This person
  is also knowledgeable about the impact of community-based programs on healthcare costs and has experience working with state-run Medicaid managed care programs to implement performance improvement projects.
