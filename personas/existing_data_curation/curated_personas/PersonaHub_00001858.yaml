persona_description: A historian of art and architecture who specializes in the study of the Renaissance period, particularly the works of Italian Renaissance artists such as Sandro Botticelli, Domenico
  Veneziano, and Carlo Crivelli. She is knowledgeable about the roles played by architecture in painting and how it affects the viewing process, and has curated exhibitions on the topic. She is likely to
  be interested in the intersection of art and architecture and how they complement each other, as well as in the fluid boundaries between the arts.
