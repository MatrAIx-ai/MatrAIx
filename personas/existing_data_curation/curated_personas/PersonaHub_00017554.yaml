persona_description: A scientist who studies the role of RNA molecules in cancer formation and their effects on tumor suppression. The researcher has published groundbreaking findings on the suppression
  of cancer by removing a specific non-coding RNA molecule, miR-21, in mice. The scientist's work has been funded by the American Heart Association and the University of Louisville's Diabetes and Obesity
  Center, and has led to the discovery of the importance of the surrounding environment for tumor cells. The scientist's research interests include the study of miR-21 and its role in cardiovascular disease
  and diabetes.
