  hobbies: '[''Reading fantasy and science‑fiction novels'', ''Sketching and digital painting'', ''Writing short stories and poetry'', ''Playing piano (intermediate level)'', ''Participating in school art
    club'', ''Coding simple games and interactive stories in Scratch'', ''Exploring local nature trails and birdwatching'', ''Solving puzzles and brain teasers'', ''Attending library reading events'', ''Collecting
    stickers and art supplies'']'
  career_goals: Sherry aspires to become a published author and illustrator of graphic novels, dreaming of attending a specialized arts high school and later studying visual storytelling and creative writing
    at a university. She also hopes to blend her love of science and art by working as a scientific illustrator or museum exhibit designer, and she wishes to travel to major art museums and attend writing
    workshops to refine her craft.
