    User 2: Yoga, coffee, and chocolate? That''s my kind of person!

    User 1: What about you? What do you like to do for fun?

    User 2: I love to read, watch movies, and spend time with my friends and family.

    User 1: Sounds like we have a lot in common.

    User 2: I think so too!

    User 1: Well, it was nice chatting with you. I hope you have a great day!

