  hobbies: '[''Watercolor painting'', ''Photography'', ''Visiting art museums'', ''Cooking Salvadoran cuisine'', ''Reading contemporary and science‑fiction books'', ''Volunteer digital‑literacy tutoring'',
    ''Salsa dancing'', ''Walking along the Potomac River'', ''Participating in community cultural festivals'']'
  career_goals: As she approaches the next phase of her career, Carmen aims to leverage her technical acumen and community‑focused spirit to champion digital inclusion for older adults and the Salvadoran
    diaspora in the DC metropolitan area. She envisions establishing a part‑time consulting practice that partners with local non‑profits to develop accessible, culturally relevant technology platforms—such
    as an online archive of Salvadoran art and oral histories. Carmen also aspires to mentor a cohort of under‑represented women in STEM, creating a structured apprenticeship that blends technical training
    with soft‑skill development. Ultimately, she hopes to leave a legacy of bridging technology, art, and cultural heritage while maintaining a balanced, low‑stress work rhythm.
