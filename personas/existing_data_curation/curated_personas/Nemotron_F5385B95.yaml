personas:
  professional: Carmen Colet, a veteran information‑technology systems analyst with 35 years of experience, leverages a curious, art‑inspired mindset and bilingual fluency to translate complex business
    needs into clear technical designs, coordinate low‑stress, iterative projects, mentor junior analysts, and champion culturally inclusive digital platforms for older adults, all while carefully managing
    the occasional worry that accompanies tight deadlines.
  sports: Carmen Colet stays active through leisurely walks with the Capitol Hill Senior Strollers club, occasional salsa dancing sessions that double as cardio, follows the Washington Capitals and Washington
    Wizards with spirited game‑day gatherings, and enjoys the springtime tradition of joining a community gardening fitness class for gentle strength work.
  arts: Carmen Colet cultivates her artistic side by painting watercolor landscapes influenced by the luminous canvases of Claude Monet and Georgia O'Keeffe at the American Art Museum, curating a personal
    photography collection reminiscent of Alec Soth’s storytelling style, and regularly attending live jazz concerts featuring Wynton Marsalis, which together shape her leisure and creative outlook.
  travel: Carmen Colet prefers low‑stress, culturally immersive travel, meticulously planning weekend getaways to Shenandoah National Park’s fall foliage, historic walking tours of Boston’s Freedom Trail,
    week‑long visits to the art‑rich city of Granada, Spain, and occasional river cruises on the Potomac, balancing her love for discovery with a modest budget and family responsibilities.
  culinary: Carmen Colet delights in cooking traditional pupusas stuffed with cheese and chicharrón and steaming tamales wrapped in corn husks, often seasoning them with freshly chopped cilantro and roasted
    tomatillo salsa, showcasing a competent yet sometimes over‑enthusiastic kitchen style that leads to occasional over‑spiced batches, while also enjoying occasional experiments with Mediterranean mezze
    plates.
  core: Carmen Colet bridges technology, art, and community with a curious, organized spirit, yet habitually checks her email ten minutes before bedtime, worries about every deadline, and keeps a beloved
    collection of watercolor brushes arranged by size on her desk.
background:
  cultural: Carmen was born into a Salvadoran family that migrated to the United States when she was a child, and she grew up in a bilingual household where Spanish customs and U.S. influences intertwined.
    In Washington, DC she remains closely linked to the Salvadoran diaspora, taking part in local church celebrations, the annual Salvadoran Festival at the DC Statehood Memorial, and family gatherings
    centered around traditional foods and music. Her cultural identity informs her perspective on collaboration, emphasizing harmony, respect, and communal support. Carmen’s fluency in both Spanish and
    English enables her to serve as a cultural liaison in professional settings, ensuring that technology solutions are accessible and meaningful to the diverse communities she serves.
attributes:
  skills: '[''Systems analysis'', ''Business process modeling'', ''Data analytics'', ''Project coordination'', ''Risk assessment'', ''Stakeholder communication'', ''Bilingual English‑Spanish communication'',
