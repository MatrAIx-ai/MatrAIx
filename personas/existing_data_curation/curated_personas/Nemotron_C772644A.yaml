  career_goals: Looking ahead, Umberto aims to transition from daily floor supervision to a mentorship and consulting role, sharing his practical retail wisdom with emerging entrepreneurs in the New England
    region. He plans to complete a bachelor’s degree in business administration to formalize his knowledge, and to help local small‑business owners adopt creative merchandising inspired by his art appreciation.
    Additionally, he hopes to take a more active role in the Swanzey community arts council, leveraging his curiosity for new ideas to curate pop‑up shop events that blend commerce with local artists. On
    a personal level, he wishes to mentor his adult children and grandchildren in financial literacy and the value of flexible, people‑first leadership.
