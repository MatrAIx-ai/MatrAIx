personas:
  professional: Monica Armstrong leverages her advanced skills in Excel, SQL, Tableau, and Lean Six Sigma to translate complex data into strategic operational improvements, while their compassionate, collaborative
    nature fosters cross‑functional teamwork and empathetic stakeholder engagement.
  sports: Monica Armstrong hikes the Boise foothills most weekends with the Boise Peaks Hiking Club, follows the Boise State Broncos football and Idaho Stampede basketball teams, and supplements their outdoor
    routine with seasonal indoor swimming at the Boise Aquatic Center to maintain overall fitness.
  arts: Monica Armstrong channels their love of visual storytelling by sketching watercolors after visits to Boise's art museums, drawing inspiration from Georgia O'Keeffe and Edward Hopper, while also
    delighting in community theater productions of Lin Manuel Miranda's 'Hamilton' and unwinding with Joni Mitchell's folk albums, using pottery sessions to bring tactile creativity into their routine.
  travel: Monica Armstrong prefers meticulously planned nature‑focused trips, having recently explored Yellowstone and the Canadian Rockies with a detailed itinerary, while they are saving for a dream backpacking
    adventure across Patagonia's Torres del Paine, balancing a love for rugged hiking with occasional relaxing stays at boutique bed‑and‑breakfasts in European wine regions.
  culinary: Monica Armstrong, an avid backyard herb grower, enjoys cooking medium‑skill dishes like rosemary‑infused roasted chicken, quinoa salad with fresh basil and heirloom tomatoes, and wild mushroom
    risotto, while they also treat themselves to Idaho finger‑steak fries and periodic farm‑to‑table dinners at the Boise Fork restaurant.
  core: Monica Armstrong blends analytical rigor with artistic curiosity, constantly juggling data dashboards and watercolor palettes, often losing sleep over perfecting a Tableau chart the same night they
    forget to water their native lavender.
background:
  cultural: Monica comes from a white, middle‑class American background rooted in the Pacific Northwest and the rural‑suburban culture of Idaho. Raised in a family that valued modesty, self‑reliance, and
    community service, she was taught to appreciate both the natural landscape of the Snake River region and the importance of giving back to neighbors. While her upbringing emphasized practicality and
    hard work, her parents encouraged exposure to the arts and education, fostering an open‑minded curiosity that has carried into adulthood. Living in Star, Canyon County, she blends small‑town values—such
    as neighborly cooperation and a close connection to the outdoors—with a progressive appreciation for diverse ideas, cultural experiences, and collaborative harmony.
attributes:
  skills: '["Data analysis (Excel, SQL, Tableau, Power BI)", "Process improvement (Lean, Six Sigma)", "Project management", "Strategic planning", "Stakeholder communication", "Report writing", "Data visualization",
    "Statistical analysis", "Process mapping", "Change management", "Conflict resolution", "Team facilitation", "Mentoring"]'
  hobbies: '["Visiting art galleries and museums", "Watercolor painting", "Reading fiction, philosophy, and psychology", "Hiking in the Boise foothills", "Gardening", "Birdwatching", "Volunteering at the
    local food bank", "Small‑group book club", "Pottery", "Attending community theater productions"]'
  career_goals: Monica aims to progress to a senior management analyst position or a director of operational excellence within the next five years, where she can lead organization‑wide transformation initiatives
    that embed innovative thinking and employee well‑being. She plans to complete her bachelor’s degree in Business Administration—or pursue an MBA—to deepen her expertise in data‑driven decision‑making.
    Monica is also passionate about integrating sustainable practices and community‑focused projects into corporate strategies, ultimately influencing a corporate culture that prioritizes collaborative
    problem‑solving and a harmonious work environment.
