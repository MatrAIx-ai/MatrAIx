persona_description: A scientist and researcher who specializes in the study of infectious diseases, particularly Middle East Respiratory Syndrome (MERS). They have expertise in the development of convalescent
  plasma and the use of camel sera to treat or protect against MERS-CoV infection in mice. They have conducted research on the use of camel sera in the treatment of MERS-CoV infection, and have published
  results in the Journal of Virology and an accompanying press release. They are interested in the potential therapeutic effects of camel sera and are looking for ways to improve the efficacy of their treatment.
