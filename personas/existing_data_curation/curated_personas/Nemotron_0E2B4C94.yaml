personas:
  professional: Juan Perez, a seasoned computer hardware engineer with three decades of experience, is transitioning to part‑time consulting for small businesses while leading community workshops on IoT
    and custom PC building, leveraging their methodical, organized approach and love for mentoring junior technicians.
  sports: Juan Perez competes in the Los Angeles Senior Soccer League as a midfielder for the Riverside Rangers, follows the LA Galaxy with avid enthusiasm, practices disciplined conditioning through weekly
    yoga, and balances competitive drive with friendly camaraderie, though his worry sometimes leads him to over‑analyze game footage.
  arts: Juan Perez enjoys salsa dancing to the rhythms of Carlos Santana and Celia Cruz at local cultural nights, attends live performances at the downtown theater, and collects vintage synth albums, using
    music as a soothing counterpoint to their technical mind.
  travel: Juan Perez prefers road‑tripping to tech hubs such as the Computer History Museum in Mountain View, attends regional cultural festivals along the California coast, and dreams of wandering the
    historic neighborhoods of Barcelona, always mapping out itineraries in detail to keep costs within his retirement budget.
  culinary: Juan Perez loves preparing homemade tamales and pozole using masa, dried chilies, and pork shoulder, perfects a mole sauce with chocolate and ancho chilies for Sunday family meals, and enjoys
    pairing his cooking with fresh cilantro, lime, and avocado, while occasional over‑spicing a batch out of earnest experimentation.
  core: Juan Perez blends a meticulous engineering mind with a love for salsa, senior soccer, and home‑cooked comfort food, yet constantly battles a habit of over‑planning that fuels both productivity and
    stress.
background:
  cultural: Juan was raised by Mexican immigrant parents and grew up bilingual, speaking both Spanish and English. He maintains strong ties to Mexican traditions, celebrating Día de los Muertos, Cinco de
    Mayo, and family‑centered holidays even though he has never married. Living in Broadview, IL, he participates in the local Mexican-American community, attending church gatherings and cultural events
    that reinforce his sense of identity. His background influences his warm, sociable nature and his appreciation for community, while also shaping his love for Mexican cuisine and music.
