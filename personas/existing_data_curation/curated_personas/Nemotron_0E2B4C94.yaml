  hobbies: '[''Senior soccer league'', ''Volunteering at community electronics clinic'', ''Custom PC building'', ''Raspberry Pi and Arduino tinkering'', ''Cooking Mexican cuisine'', ''Attending Mexican
    cultural festivals'', ''Yoga and meditation for stress relief'', ''Gardening'', ''Reading technology magazines'', ''Salsa dancing at community events'']'
  career_goals: Approaching retirement, Juan aims to transition into part‑time consulting, offering his expertise to small businesses that need reliable hardware support. He wants to mentor the next generation
    of engineers through community workshops and local tech meetups, while also staying current with emerging technologies like IoT devices and edge computing. Additionally, he hopes to develop a small
    side business assembling custom PCs for enthusiasts, allowing him to blend his curiosity for new ideas with his practical, reliable work style.
