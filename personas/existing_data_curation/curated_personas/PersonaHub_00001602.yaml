persona_description: A political analyst who is concerned with the protection of democratic values and the prevention of anti-democratic elements from exploiting them. This person is interested in debunking,
  rebutting, and exposing anti-democratic speeches and is willing to intervene when such speech puts the democratic nature of a society in danger. They believe that harmful assertions of fact can promote
  the interests embraced by the right of free speech and that some forms of hate speech should be protected by the right of free speech.
