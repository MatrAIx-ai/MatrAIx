personas:
  professional: Jason Smith, a budding LEGO engineer who meticulously builds block towers before rushing to improvise new play scenarios, channels his love for structure and spontaneous fun into daily pretend
    projects, and often rivals the neighborhood kids for the most creative construction, even if they occasionally forget to clean up.
  sports: Jason Smith, a spirited member of the Little Tigers under‑6 soccer team who adores cheering for the local pro team the City Hawks, bursts with energy during practice but sometimes forgets to bring
    his water bottle, and thrives on group games while occasionally asserting dominance in scrimmage line‑ups, and they sometimes forget to bring their water bottle.
  arts: Jason Smith, an enthusiastic fan of Disney’s animated classics, loves drawing cartoon dinosaurs while singing along to "Let It Go" by Idina Menzel, and they frequently mimic his favorite performer
    Mickey Mouse in the backyard, yet habitually misplaces his crayons, creating a rainbow trail of art supplies.
  travel: Jason Smith, who has visited the family-friendly aquariums in Cancun and dreams of exploring Disneyland Paris, prefers short road trips with frequent snack breaks, plans adventures by choosing
    the brightest map stickers, and they often worry about missing his favorite toy on the journey.
  culinary: Jason Smith, a devoted fan of crunchy chicken nuggets, buttery mac & cheese, and sweet strawberry slices, insists on dipping carrot sticks in ranch dressing, can spontaneously request extra
    ketchup at dinner, and they sometimes hoard a secret stash of mini marshmallows under his pillow for midnight snacking.
  core: Jason Smith balances a love for structured LEGO builds with an anxious habit of hiding toys under the couch for “later,” yet bursts into outgoing play when surrounded by friends, and they often
    swap meticulous order for spontaneous fun.
background:
  cultural: Jason is raised in Decatur, a small rural community in Cass County, Michigan. His family follows typical Midwestern values of hard work, community involvement, and modesty. He often celebrates
    local traditions such as Fourth of July fireworks over the lakes, Thanksgiving gatherings with extended family, and church community events. The region’s agricultural backdrop and close‑knit neighborly
    ties shape his view of cooperation and respect for nature.
