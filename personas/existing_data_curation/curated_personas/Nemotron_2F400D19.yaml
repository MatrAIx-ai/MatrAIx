  career_goals: He often talks about wanting to be a firefighter or police officer one day because he likes helping people and being part of a team. He also enjoys the idea of becoming a teacher so he can
    share what he knows with friends. He expresses a desire to keep learning new things, become stronger at reading, and be responsible for his own tasks.
