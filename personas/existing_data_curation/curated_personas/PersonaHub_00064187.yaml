persona_description: A teacher who values face-to-face communication and collaborative learning, and is committed to providing meaningful intervention for students who need it to get unstuck in their inquiry
  process. This teacher has a passion for working closely with a specific class for an extended period of time, and relishes having uninterrupted time to really listen closely and have these conversations
  for learning. They are grateful to work with teachers like Susan Lester, who they admire for their expertise and dedication to their students. This teacher is also interested in the use of information
  dashboards and prefers Netvibes to Symbaloo.
