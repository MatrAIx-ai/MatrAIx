personas:
  professional: A budding preschool helper, Travis Kehoe loves arranging crayons by color and pretends to run a tiny “library” in the playroom, showcasing an early knack for caring for peers, a relentless
    curiosity that fuels endless “why” questions, and a relaxed approach that often leaves toys scattered despite their best intentions.
  sports: A tiny athlete who delights in splashy toddler swimming lessons, participates in the neighborhood “Little Tigers” soccer group, and imitates the moves of the Chicago Cubs during spring games on
    TV, while parents encourage free play at the local park to keep their energy channelled.
  arts: An early art enthusiast, Travis Kehoe is enchanted by the lively tunes of Raffi, the colorful rhymes of Sesame Street, and the whimsical brushstrokes of Dr. Seuss picture books, often pairing finger
    painting sessions with Disney’s “Let It Go” soundtrack to express their boundless imagination.
  travel: An adventurous stroller rider, Travis Kehoe enjoys family road trips to the Grand Canyon, the magical excitement of a week at Disney World in Orlando, and dreams of a future visit to Paris to
    see the Eiffel Tower and taste buttery croissants.
  culinary: A little foodie who prefers soft bites like macaroni and cheese, sweet banana slices, and chicken nuggets, can mash peas with a plastic fork, and loves the occasional splash of ketchup on a
    blueberry‑topped pancake, yet consistently refuses mixed vegetables on the plate.
  core: A two‑year‑old bundle of curiosity and compassion, Travis Kehoe navigates the world with a love for art, a flexible but scattered routine, and big‑hearted emotions that swing quickly from joy to
    anxiety.
background:
  cultural: Travis is raised in a white Southern family in Goldsboro, North Carolina. His cultural upbringing reflects the values of Southern hospitality, community cohesion, and church‑centered gatherings
    common in the region. Family traditions emphasize kindness, helping neighbors, and participating in local events such as neighborhood picnics and seasonal festivals. Exposure to regional folk music,
    quilting patterns, and storytelling nurtures his appreciation for artistic expression and reinforces his compassionate, cooperative nature.
