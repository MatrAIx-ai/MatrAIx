data:
  user 1 personas: 'I love to go hiking.

    My favorite phone is as iphone.

    I have never been to college.

    I have never been out of the country.

    I am a bank teller.'
  user 2 personas: 'I want to put my photos to a music video staring adam levin.

    I want to be a famous photographer.

    I want to travel the world taking photographs of my travels.

    I like taking pictures.

    I am a widow.'
  Best Generated Conversation: 'User 1: Hi! I''m [name].

    User 2: Hi, [name]! I''m [name].

    User 1: What do you like to do for fun?

    User 2: I like to take pictures.

    User 1: Oh, that''s cool! What kind of pictures do you like to take?

    User 2: I like to take pictures of nature, people, and animals.

    User 1: Do you have any pictures you''d like to share?

    User 2: Sure! Here''s one of my favorite photos. [User 2 shares a photo of a beautiful landscape.]

    User 1: That''s a great photo! I love the colors.

    User 2: Thanks!

    User 1: What else do you like to do?

    User 2: I also like to travel.

    User 1: Oh, that''s cool! Where have you been?

    User 2: I''ve been to a few places, but my favorite place was Hawaii.

    User 1: I''ve heard Hawaii is beautiful. I''ve never been, but I''d love to go someday.

    User 2: You should! It''s definitely worth it.

    User 1: I''m sure it is.

    User 2: I also like to hike.

    User 1: Oh, that''s cool! I love to hike too.

    User 2: Have you ever been on a big hike?

    User 1: I have! I did the Appalachian Trail a few years ago.

    User 2: Wow! That''s a long hike. How was it?

    User 1: It was amazing! I loved it.

    User 2: I''m sure it was.

    User 1: So, what do you like to do for fun?

    User 2: I like to go to concerts.

    User 1: Oh, that''s cool! What kind of music do you like?

    User 2: I like all kinds of music, but my favorite is country music.

    User 1: I love country music too!

    User 2: Cool!

    User 1: So, what are you up to tonight?

    User 2: I''m not sure yet. What are you doing?

    User 1: I''m not sure either. Maybe we could hang out?

    User 2: That sounds like fun! What did you have in mind?

    User 1: I don''t know. We could go see a movie, or go for a walk, or something.

    User 2: I''d love to go for a walk.

    User 1: Great! Where do you want to go?

    User 2: There''s a nice park near my house.

    User 1: That sounds perfect.

    User 2: Great! I''ll meet you there in 10 minutes.

    User 1: See you then!'
