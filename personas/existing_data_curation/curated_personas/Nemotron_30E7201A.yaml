personas:
  professional: Glaucia Perdomo, an eager elementary student, practices organization and routine by keeping tidy school notebooks, excels in art projects and soccer drills, and demonstrates emerging leadership
    by guiding peers during group activities, reflecting her practical yet creative mindset.
  sports: Glaucia Perdomo plays forward for the Greenfield Sprouts youth soccer league, practices three times a week at the local park, follows the regional professional team River City FC, and enjoys seasonal
    activities like ice skating in winter, showing disciplined teamwork and occasional assertiveness on the field.
  arts: Glaucia Perdomo, a budding visual creator, spends afternoons drawing whimsical animals inspired by Oliver Jeffers, building intricate LEGO models, listening to folk melodies during family gatherings,
    and watching Pixar's animated films for color ideas, illustrating her blend of routine practice and imaginative flair.
  travel: Glaucia Perdomo loves weekend trips to the nearby coastal town of Sunny Bay where she builds sandcastles, dreams of exploring the historic museums of Washington, D.C., and hopes to someday see
    the ancient pyramids of Giza, balancing family budgeting with a vivid curiosity for diverse cultures.
  culinary: Glaucia Perdomo enjoys baking chocolate chip cookies and simple corn tortillas with her grandmother, mixing flour, butter, chocolate chips, masa harina, and cheese, often forgetting exact measurements
    but producing tasty treats that become the centerpiece of family gatherings, reflecting her love for hands-on routine and shared meals.
  core: Glaucia Perdomo blends a love for routine with bursts of creativity, balancing organized school life, persistent artistic projects, and a gentle curiosity about the wider world.
background:
  cultural: Glaucia grows up in a Mexican‑American household in San Antonio, where Spanish is spoken alongside English, and family traditions such as cooking together, celebrating Día de los Muertos and
    Cinco de Mayo, and attending local community festivals are central to her life. Her family emphasizes respect for elders, close family ties, and practical values, providing her with a strong sense of
    cultural identity and belonging within the vibrant Bexar County community.
