  career_goals: Jeffrey aims to earn a Bachelor of Science in Nursing (BSN) within the next two years, positioning himself for a future role as a charge nurse or unit manager in a hospital setting. He is
    interested in pursuing a certification in psychiatric‑mental health nursing to better support patients with anxiety and mood disorders, reflecting his own experience with emotional reactivity. Long‑term,
    he hopes to lead a staff wellness program that provides peer support, mindfulness training, and resilience workshops for healthcare workers. He also envisions contributing to research on patient‑centered
    care models and publishing findings in nursing journals, blending his curiosity with his commitment to practical, evidence‑based improvements.
