personas:
  professional: A 14‑year‑old aspiring mechanical hobbyist, Woodrow Irizarry combines his love for football teamwork with hands‑on model car building, applying a practical, structure‑focused mindset to
    school projects while staying flexible enough to join spontaneous gaming sessions, making them a cooperative leader among classmates.
  sports: Woodrow Irizarry, a wide receiver for his middle‑school football team, idolizes the New England Patriots and follows the local high‑school basketball squad, while also joining the community youth
    fishing club and hiking group, balancing structured training with spontaneous outdoor adventures.
  arts: Woodrow Irizarry, an acoustic‑guitar enthusiast, frequently performs folk covers of Ed Sheeran and Jack Johnson at church youth gatherings, enjoys listening to Imagine Dragons and John Mayer, and
    spends evenings crafting model car kits inspired by classic automotive designs.
  travel: Woodrow Irizarry prefers short, action‑packed trips, having camped at the Adirondack Lakes with family for fishing, visited Disney World with friends for a weekend getaway, and dreaming of hiking
    Zion National Park, yet budget constraints keep most adventures within a few hours’ drive.
  culinary: Woodrow Irizarry gravitates toward quick, flavorful meals like pepperoni pizza, cheesy macaroni, and grilled cheese, but also loves cooking the trout they catch on lake trips using lemon, butter,
    and fresh herbs, while their cooking skill remains at a confident beginner level.
  core: Woodrow Irizarry is a sociable, structure‑loving teen who balances football, gaming, and guitar with occasional impulsive spending and a habit of forgetting dental appointments.
background:
  cultural: Growing up in Trion, a small town in Walker County, Georgia, Woodrow is immersed in a Southern Appalachian culture that values community, hospitality, and tradition. The town’s rhythm is shaped
    by high school football Saturdays, church services on Sundays, family barbecues, and seasonal outdoor activities like fishing and hiking. Although his family identifies as white, the Irizarry surname
    reflects a blend of cultural histories, giving Woodrow an awareness of broader American diversity while his day-to-day life remains rooted in the close‑familiar, church‑centered, and family‑oriented
    environment typical of rural Georgia.
