    youth group activities"]'
  career_goals: Woodrow envisions completing high school with solid grades and then attending a technical college to earn an automotive technology certification. He is drawn to the practical nature of auto
    mechanics and also admires the local fire department, dreaming of one day becoming a volunteer firefighter who can serve his close‑knit community. In the longer term, he hopes to combine these interests
    by either owning a small auto repair shop or pursuing a career in emergency services, all while staying involved in community youth programs.
