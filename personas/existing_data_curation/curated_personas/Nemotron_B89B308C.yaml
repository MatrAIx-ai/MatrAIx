  hobbies: '["Watercolor painting", "Woodworking", "Attending art galleries and community theater", "Senior Debates Club (public speaking)", "Gardening", "Birdwatching", "Road trips to museums", "Strategic
    board games (e.g., Settlers of Catan)", "Collecting vintage postcards", "Reading biographies"]'
  career_goals: Johnny’s foremost ambition is to leave a lasting cultural imprint on his hometown. Over the next few years he plans to volunteer as a resident curator at the Galion Art Center, spearheading
    rotating exhibitions that highlight emerging regional artists. He also wants to author a memoir that weaves together his personal journey, Midwestern heritage, and reflections on art and society. A
    travel bucket list includes visits to the Metropolitan Museum of Art in New York, the Art Institute of Chicago, and the Louvre in Paris. Additionally, he hopes to launch a modest side business selling
    handcrafted wooden furniture and to run a quarterly public‑speaking workshop for senior citizens.
