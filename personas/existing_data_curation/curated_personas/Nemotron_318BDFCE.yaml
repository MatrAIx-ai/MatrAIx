personas:
  professional: Courtney Rehm, a seasoned community arts organizer with polished public‑speaking and event‑coordination skills, applies their skeptical, competitive edge to scrutinize grant proposals while
    thriving as the charismatic centerpiece of Wichita’s artistic gatherings, all in pursuit of directing the local Arts Council.
  sports: Courtney Rehm enjoys low‑impact fitness like weekend hikes through the Flint Hills and weekly senior tennis matches at the local YMCA, rallies behind the Wichita State Shockers and the Kansas
    City Chiefs, and balances a flexible routine of gentle yoga with the occasional competitive bridge marathon that still feels like an athletic challenge.
  arts: Courtney Rehm pours curiosity into oil landscapes of Kansas plains echoed in the bold hues of O'Keeffe, curates quilt exhibitions that highlight Faith Ringgold’s narrative stitchwork, and frequents
    Wichita’s community theater for productions of August Wilson, all while mentoring young volunteers in craft techniques.
  travel: Courtney Rehm favors spontaneous weekend road trips to national treasures like Badlands National Park and Rocky Mountain National Park, yet dreams of a springtime cultural pilgrimage to Kyoto’s
    historic gardens, planning each journey around affordable lodging and an art‑festival itinerary that fuels their creative spark.
  culinary: Courtney Rehm, an adventurous home chef, experiments with turmeric‑spiced quinoa pilaf paired with lavender‑honey glazed carrots, frequently improvises with garden‑fresh herbs such as sage and
    rosemary, and occasionally burns the edges of a slow‑cooked lamb stew while chasing bold, innovative flavors.
  core: Courtney Rehm, a talkative, art‑obsessed 56‑year‑old, channels competitive energy into grant hunting and bridge tournaments, worries over every detail yet finds solace in gentle yoga, and can’t
    resist late‑night binges of contemporary memoirs and a lingering habit of over‑stocking craft supplies.
background:
  cultural: Courtney was raised in a middle‑class white family in Wichita, Kansas, with deep roots in the American Midwest. Her ancestry includes German and Irish heritage, which influences family traditions
    such as seasonal gatherings and a love for folk music. Growing up in the heartland instilled values of hospitality, self‑reliance, and community service. She remains actively involved in local church
    groups and volunteer organizations, reflecting the region's emphasis on communal support. The cultural landscape of Wichita, with its blend of agricultural history and burgeoning arts scene, has shaped
    her appreciation for both the practical and the creative aspects of life.
