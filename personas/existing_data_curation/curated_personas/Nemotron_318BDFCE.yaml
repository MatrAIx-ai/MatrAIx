  career_goals: Although currently not in the formal workforce, Courtney aims to transition into a leadership role within the local arts community. She aspires to become the director of the Wichita Arts
    Council, where she can design and implement weekly workshops for seniors and expand outreach to under‑served neighborhoods. Securing grant funding to launch a regional arts festival that showcases emerging
    Midwestern artists is a top priority. Concurrently, she dreams of opening a small boutique studio that sells her handcrafted quilts and paintings, providing a platform for community members to collaborate
    and sell their work. Ultimately, she hopes to combine her passion for the arts with advocacy for mental health, creating programs that use creative expression to reduce stress and foster social connection.
