personas:
  professional: Roshan Amin is a seasoned electrical and electronics engineer specializing in power systems analysis, circuit design, and embedded firmware development, whose calm, empathetic demeanor and
    conflict‑resolution skills keep multidisciplinary microgrid projects on track and foster collaborative team dynamics.
  sports: Roshan Amin hikes the Texas Hill Country trails with the Austin Hiking Club, joins community basketball games on weekends, and follows the Dallas Cowboys, Texas Rangers, and Austin FC as their
    favorite professional teams, integrating moderate cardio hikes into their routine to balance a desk‑bound career.
  arts: Roshan Amin relaxes to the intricate sitar performances of Ravi Shankar and tabla rhythms of Zakir Hussain while also attending Austin Symphony Orchestra concerts featuring Beethoven, reflecting
    how these classical and world‑music influences shape their introspective leisure time.
  travel: Roshan Amin plans travel around a blend of purposeful and spontaneous experiences, favoring well‑researched trips to Austin’s sister city San Antonio for local festivals, extended hikes in New
    Mexico’s Sangre de Cristo Mountains, and occasional pilgrimages to Istanbul’s historic mosques, all balanced against family commitments and a modest travel budget.
  culinary: Roshan Amin delights in preparing aromatic chicken biryani layered with saffron‑infused basmati rice, tender beef kebabs marinated in garam masala and yogurt, and slow‑cooked nihari seasoned
    with cardamom, often sharing these dishes with family gatherings and occasionally tweaking recipes with smoked paprika for a modern twist.
  core: Roshan Amin merges precise power‑grid engineering with a calm, community‑oriented outlook, balancing a love for structured problem‑solving, reflective solo hobbies, and occasional disorganized spontaneity
    that makes them both reliable and endearingly human.
background:
  cultural: Roshan is a second‑generation South Asian (Pakistani) American who grew up in a bilingual Urdu‑English household in Texas. His family places a strong emphasis on education, hospitality, and
    collective well‑being, values that continue to shape his professional ethos of cooperation and harmony. He observes Islamic traditions such as Ramadan fasting, daily prayers, and celebrates Eid al‑Fitr
    and Eid al‑Adha with extended family and the local diaspora community. Roshan remains active in Austin's Pakistani cultural association, supporting events that showcase traditional music, dance, and
    cuisine. This multicultural upbringing blends South Asian heritage with Texan openness, informing his respectful communication style, his appreciation for diverse perspectives, and his resilient, calm
    approach to both personal and professional challenges.
attributes:
  skills: '[''Power systems analysis'', ''Circuit design and PCB layout'', ''Embedded firmware development (C/C++, Python)'', ''PLC and SCADA configuration'', ''Renewable energy integration'', ''Electrical
    safety compliance (NEC, Texas Interconnection Standards)'', ''Systematic testing and verification'', ''Technical mentorship and team coordination'', ''Troubleshooting under high‑pressure conditions'']'
  hobbies: '[''Home automation and hobby electronics'', ''Science‑fiction literature'', ''Classical Indian instrumental music'', ''Cooking traditional Pakistani cuisine'', ''Hiking in the Texas Hill Country'',
    ''Chess'', ''Small community cultural gatherings'', ''Meditative yoga practice'']'
  career_goals: Roshan aspires to become a principal engineer leading large‑scale microgrid and sustainable energy projects across Texas, leveraging his expertise to improve grid resilience. He aims to
    mentor the next generation of engineers, particularly those from underrepresented backgrounds, and to establish a consulting practice that advises utilities on integrating clean energy while maintaining
    reliability. Balancing professional ambition with family life, he also seeks to expand his involvement in community STEM outreach programs and to contribute his technical knowledge to local Pakistani
    cultural organizations.
