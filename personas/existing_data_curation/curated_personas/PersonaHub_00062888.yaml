persona_description: A historian who specializes in the study of racial oppression and the struggle for civil rights in the United States during the post-war era. She is interested in the experiences of
  African Americans who served in the military during WWII and the conditions they faced after their return to the South. She is also interested in the violent retribution by white racists that occurred
  during this period and the impact it had on the social atmosphere. She is a vocal advocate for the rights of African Americans and is committed to fighting against racist violence against the oppressed.
