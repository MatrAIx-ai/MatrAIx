  hobbies: '[''gardening'', ''traditional cooking'', ''bridge club'', ''walking group'', ''volunteering at cultural center'', ''reading historical biographies'', ''woodworking'', ''listening to jazz'',
    ''attending cultural festivals'']'
  career_goals: Although retired, Sheng remains driven to contribute meaningfully to his community. He aspires to expand the senior activity program at the Kent community center, introducing new intergenerational
    workshops that blend cultural storytelling with practical skill‑building. He hopes to mentor younger volunteers, passing on his organizational expertise and cultural heritage. A personal ambition is
    to travel back to Laos for a cultural pilgrimage and document his family's recipes in a small cookbook for his grandchildren. Maintaining his health and independence, he also aims to stay physically
    active through regular walking and gardening.
