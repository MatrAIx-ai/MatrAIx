  hobbies: '[''Gardening'', ''Listening to R&B/Soul/Jazz Music'', ''Reading African American History'', ''Church Attendance and Choir Participation'', ''Walking/Outdoor Strolls'', ''Fishing'', ''Chess'',
    ''Cooking Soul Food'', ''Storytelling'', ''Watching Classic Movies'']'
  career_goals: Although retired, Derrick’s ambitions revolve around staying healthy, preserving his legacy, and giving back to his community. He aims to maintain his independence by keeping active with
    daily walks and gardening. He is working on a memoir that captures his life from the civil‑rights era to the present, hoping to leave a written record for his grandchildren. He plans to establish a
    modest scholarship fund for local high‑school students interested in trades, drawing on his own experience as a mentor. Derrick wants to deepen his involvement in the Bradenton Seniors Council, advocating
    for senior‑friendly policies and organizing more intergenerational activities. He also hopes to refine family recipes and compile them into a small cookbook to preserve his cultural culinary heritage.
    Occasionally, he enjoys spontaneous weekend trips to historic sites or natural areas in Florida while keeping his regular morning routine.
