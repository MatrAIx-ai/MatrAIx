  hobbies: '[''Visiting museums and galleries'', ''Listening to jazz and blues performances'', ''Reading historical fiction and poetry'', ''Urban balcony gardening'', ''Knitting and crocheting'', ''Genealogy
    research'', ''Attending community storytelling events'', ''Experimenting with multicultural cooking'']'
  career_goals: Although retired, Adaya is determined to leave a lasting legacy. She aims to compile a memoir and a photographic archive that capture the evolution of her Brooklyn neighborhood through the
    lens of Black and cross‑cultural experiences. She hopes to curate a traveling exhibition of artworks created by senior artists in her community, providing them with broader exposure. Adaya also aspires
    to mentor emerging youth artists through a structured mentorship program at the local cultural center, and to contribute her stories to city oral‑history archives. In addition, she plans a short trip
    to historic Civil Rights sites and a visit to Vietnam to honor her late husband’s heritage and explore the culinary traditions his family cherished.
