  hobbies: '["Sketching and doodling","Digital illustration with a tablet","Reading speculative fiction and poetry","Playing chess","Visiting local art galleries and museums","Listening to Mexican folk
    and indie music","Photography of nature and urban scenes","Writing short stories and poems","Participating in school art and science clubs","Exploring coding tutorials on Scratch and Python"]'
  career_goals: Nicole aspires to merge her artistic talent with technology, aiming to become a UI/UX designer or multimedia artist who creates culturally resonant digital experiences. She plans to attend
    a specialized arts high school that offers intensive visual communication programs, then pursue a college degree in graphic design or interactive media. Her long‑term ambition is to build a professional
    portfolio that reflects her Mexican heritage and to mentor younger Latino students in the arts, helping them navigate both creative and academic challenges. She values careers that allow independent
    work while still offering collaboration in small, trusted teams.
