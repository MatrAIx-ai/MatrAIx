personas:
  professional: Nicole Molano, an aspiring digital illustrator and visual storyteller, channels her curiosity and disciplined organization into creating speculative comic strips that blend everyday school
    scenes with symbolic motifs from her family's traditions.
  sports: Nicole Molano enjoys the strategic challenge of chess, competing in the school club and local youth tournaments, while also dabbling in seasonal swimming at the community pool during summer and
    cheering on the Columbia Fireflies baseball team in the spring.
  arts: Nicole Molano immerses herself in creative expression, drawing inspiration from surrealist painter Frida Kahlo, digital artist Loish, and the emotive indie sounds of Mitsui and Lila Downs, while
    she spends weekends curating a personal Instagram gallery of photo essays that capture the vivid color palettes of everyday life.
  travel: Nicole Molano favors small‑group road trips that blend art and culture, having already explored the mural‑rich streets of Mexico City, the jazz‑filled neighborhoods of New Orleans, and the historic
    plazas of Barcelona, and she dreams of a solo backpacking adventure through Kyoto’s cherry‑blossom season.
  culinary: Nicole Molano delights in cooking and tasting bold flavors, mastering dishes like chicken tamales, mole poblano, and avocado‑lime salsa, while she engages with ingredients such as corn masa,
    dried chiles, cacao, and fresh cilantro, and she often experiments with fusion recipes that marry traditional spices with modern plating.
  core: Nicole Molano is a thoughtful, competitive teen who balances a vivid artistic imagination with a cautious, detail‑oriented approach to money, health, and life, often overthinking decisions yet channeling
    that energy into striking visual stories.
background:
  cultural: Nicole identifies as Mexican American, raised in a bilingual household that celebrates traditions such as Día de los Muertos, quinceañeras, and the preparation of authentic regional Mexican
    dishes. Her family maintains strong ties to their Mexican roots while integrating into the Columbia, SC community, where she participates in local Latino festivals and cultural events. This bicultural
    upbringing informs her artistic expression, inspiring her to incorporate vibrant colors, symbolic motifs, and stories from her heritage into her work. Nicole feels a deep sense of responsibility to
    honor her family's immigrant journey, using her creativity and future career to give voice to her community.
