personas:
  professional: Norma Walk is an aspiring visual storyteller who blends traditional sketching with digital illustration, using a tablet and a well‑worn sketchbook to explore fantasy worlds while quietly
    honing a portfolio for future art school applications.
  sports: Norma Walk enjoys solitary sunrise jogs along the local beach, occasionally joins the junior surf club for weekend paddles, and roots for the regional minor league baseball team, the Harbor Hawks,
    while shying away from large team sports that demand extensive coordination.
  arts: Norma Walk curates indie playlists featuring Mitski and Phoebe Bridgers, draws inspiration from the pastel landscapes of Studio Ghibli and the graphic style of Loish, frequently visits the City
    Art Museum’s contemporary exhibits and local community art fairs, and keeps a sketchbook filled with doodles of fantastical creatures.
  travel: Norma Walk prefers flexible, low‑key trips, often spending summers at the nearby Seaside Cove to photograph shells and sunsets, has taken weekend road trips to Redwood National Park, and dreams
    of backpacking through Iceland’s volcanic coastlines and exploring Kyoto’s historic temples when budget permits.
  culinary: Norma Walk favors coastal flavors, regularly makes avocado toast with smoked salmon, experiments with miso ramen and grilled shrimp tacos, and enjoys the tactile process of slicing fresh herbs
    while documenting each dish with the same meticulous eye they apply to their art.
  core: Norma Walk is a quiet dreamer who channels curiosity into sketching, music curation, and beach photography, yet battles persistent worry and a habit of last‑minute planning that often leaves creative
    projects half‑finished.
background:
  cultural: 'Norma was raised in a middle‑class, predominantly white family in Bayville, New Jersey, a coastal suburb in Ocean County. Her heritage likely includes European roots such as Irish and Italian
    ancestry, common among many families in the area. Growing up near the Atlantic, she has been influenced by the beach lifestyle, local seafood traditions, and community events like summer festivals and
    neighborhood block parties. Her upbringing reflects typical American suburban values: emphasis on family meals, respect for personal space, and participation in school clubs like the art club. The cultural
    milieu blends mainstream U.S. media with a strong sense of local coastal identity, which shapes her appreciation for both familiar and novel artistic experiences.'
