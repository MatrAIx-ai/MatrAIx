  career_goals: Norma dreams of pursuing a career that blends her love for art and helping others. She envisions studying visual arts in a specialized high school and eventually becoming a graphic designer
    or concept artist. Over the long term, she hopes to earn a degree in art therapy so she can use creative expression to support people dealing with stress and emotional challenges, aligning her kindness
    and empathy with a professional purpose. She also aspires to build a flexible freelance portfolio that allows her to continue exploring new ideas and mediums.
