  hobbies: '["Visiting art galleries and museums", "Burmese cooking and culinary experimentation", "Gardening (herbs and tropical orchids)", "Senior center book club", "Photography (street and nature)",
    "Tai chi", "Volunteer guide for community events", "Reading historical non‑fiction and travel books"]'
  career_goals: Although retired from formal employment, Maung aims to cement his legacy as a cultural bridge between the Burmese diaspora and the wider Saint Petersburg community. He aspires to document
    and publish a memoir of his life’s journey, highlighting the evolution of Burmese art and cuisine in Florida. He plans to establish a small, volunteer‑run cultural hub at the senior center where he
    can teach cooking classes, curate rotating art exhibits, and host intergenerational storytelling evenings. He also hopes to travel to a few major U.S. art museums and to revisit Myanmar once health
    permits, to deepen his understanding of contemporary Burmese art and bring fresh perspectives back to his local community.
