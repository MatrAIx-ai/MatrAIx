personas:
  professional: Maung Boriboune, an 83‑year‑old retired community liaison and volunteer tax assistant, blends meticulous bookkeeping with a passion for cultural storytelling, and they channel their curiosity
    and methodical nature into organizing senior‑center art workshops and guiding new immigrants through bilingual support.
  sports: Maung Boriboune, an enthusiastic participant in weekly tai chi classes and morning walks along the Pinellas trail, also cheers for the Tampa Bay Buccaneers, follows the Tampa Bay Rays during baseball
    season, and occasionally joins a senior‑aged softball league at the community center, and they consider staying active a vital part of their longevity.
  arts: Maung Boriboune, a devoted patron of the local art scene, regularly attends guided tours of galleries showcasing works from Monet to contemporary installations by Yayoi Kusama, leads discussion
    groups that reference the intricate patterns of traditional lacquerware alongside the abstract brushwork of Jackson Pollock, and they find inspiration for their cooking and storytelling in the visual
    narratives.
  travel: Maung Boriboune, a meticulous planner who prefers organized itineraries, has toured the Smithsonian in Washington, D.C., the Met in New York City, and dreams of a gentle pilgrimage back to their
    native land’s historic temples once health stabilizes, while also hoping to explore the Louvre in Paris during a future summer, and they always keep a travel journal to document each experience.
  culinary: Maung Boriboune, an adept home chef, delights in perfecting mohinga broth with lemongrass, turmeric and fresh grouper, crafting tea leaf salad with crisp mustard greens and toasted peanuts,
    and occasionally fusing these flavors with Florida’s key lime and shrimp to create a unique coastal twist, and they love sharing their recipes with neighbors during community potlucks.
  core: Maung Boriboune, an 83‑year‑old cultural bridge who balances disciplined bookkeeping with spontaneous culinary experiments, volunteers tirelessly while occasionally forgetting their own medication
    during community events, and they infuse each day with curiosity, organized planning, and a love for lantern‑lit festivals.
background:
  cultural: Maung B. Boriboune was born in Myanmar (Burma) and grew up in a modest family that practiced Theravada Buddhism. He emigrated to the United States in the late 1970s, settling in the Tampa Bay
    area where a growing Burmese community provided a familiar cultural network. He retains strong ties to Burmese traditions, celebrating festivals such as Thingyan (Water Festival) and Thadingyut (Festival
    of Lights) with his extended family and neighbors. His cultural identity blends Burmese customs—such as offering alms, meditation, and respect for elders—with the relaxed, multicultural atmosphere of
    Saint Petersburg, Florida. He uses his bilingual skills to assist newer immigrants, preserving the Burmese language and culinary heritage while also embracing American societal values like volunteerism
    and community engagement.
attributes:
  skills: '["Burmese (fluent)", "English (conversational)", "Traditional Burmese cooking", "Art history (Southeast Asian focus)", "Community event planning", "Bookkeeping and volunteer tax assistance",
