  career_goals: Amber aims to transition from a specialist analyst role to a strategic technology leadership position within the next five years. She envisions becoming a senior systems architect or IT
    strategy director, where she can shape digital transformation initiatives that blend functional efficiency with creative user experiences. Passionate about mentorship, she plans to launch a mentorship
    program for women in technology at her company and to speak at industry conferences about the value of interdisciplinary thinking. Long‑term, Amber aspires to contribute to nonprofit projects that leverage
    technology to make arts education more accessible in under‑served urban communities.
