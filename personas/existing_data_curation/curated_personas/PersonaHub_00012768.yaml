persona_description: A healthcare professional who is responsible for confirming and differentiating the presence of HIV-1 and HIV-2 antibodies in specimens of serum. This person is skilled in performing
  third and fourth generation HIV serologic assays and is aware of the importance of detecting both HIV-1 and HIV-2 antibodies in order to accurately diagnose AIDS and AIDS-related complex. This person
  is likely to be a laboratory technician, a physician, or a public health official who is responsible for conducting HIV testing and surveillance in their respective regions.
