  career_goals: Michael aims to become a senior stylist and eventually open his own boutique salon that serves the Philadelphia community, focusing on a welcoming environment for families and a space that
    celebrates Black culture. He plans to acquire additional certifications in advanced color techniques, expand his skill set into makeup artistry, and develop a line of grooming products tailored for
    men of color. He also wants to mentor younger stylists and contribute to community outreach programs that use barbering as a platform for empowerment.
