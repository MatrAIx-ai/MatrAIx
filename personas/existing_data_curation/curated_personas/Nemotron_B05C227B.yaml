    preservation'']'
  hobbies: '[''Traditional Mexican cooking'', ''Ballet Folklórico dance'', ''Community gardening'', ''Lakefront walking'', ''Reading historical novels'', ''Bilingual book clubs'', ''Yoga'', ''Volunteering
    at senior centers'', ''Organizing potluck gatherings'', ''Storytelling and cultural heritage activities'']'
  career_goals: Yahaira aspires to formalize her community involvement by obtaining a certificate in community health or social work at a local community college. She aims to become a volunteer coordinator
    at a neighborhood cultural center, where she can design and lead regular workshops on Mexican cooking, folklore, and health education for seniors. Additionally, she hopes to launch a small catering
    business that specializes in authentic Mexican dishes for local events, blending her culinary passion with entrepreneurial goals. Long‑term, she envisions serving as a board member for a nonprofit focused
    on senior services in Chicago's Mexican‑American community.
