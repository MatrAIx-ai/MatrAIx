  career_goals: Stephanie aims to enroll in a business administration associate program at West Virginia Community and Technical College within the next year, with the goal of obtaining an Administrative
    Assistant certification. She envisions a stable, full‑time position in a government office or local healthcare clinic where she can apply her organizational strengths. Long‑term, she hopes to advance
    to an Office Manager role, overseeing team workflows and implementing efficient office procedures. She also wishes to gain a professional certification in medical records administration to broaden her
    career options while maintaining a predictable, structured work environment.
