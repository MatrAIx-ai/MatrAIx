persona_description: 'A medical professional who is experienced in evaluating and managing orthopedic injuries, particularly those involving fractures of the tibia and fibula. They are skilled in interpreting
  x-rays, particularly those showing fractures that appear well aligned on one view and displaced on the other. They are familiar with the Atlas of Emergency Medicine, 4e, and CURRENT Diagnosis and Treatment
  Surgery: Chapter 40. Orthopedic Surgery, and have a strong understanding of the principles of fracture management, including the importance of obtaining at least two views at 90 degrees. They are also
  familiar with the concept of lateral x-rays, which are often used to evaluate fractures of the tibia and fibula.'
