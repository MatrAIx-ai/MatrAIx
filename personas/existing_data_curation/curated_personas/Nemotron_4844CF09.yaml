  career_goals: Wei aims to transform his passion for art and community into a sustainable career by opening a multicultural art café in Miami that doubles as a gallery and workshop space for emerging Asian-American
    artists. To achieve this, he plans to earn a Project Management Professional (PMP) certification and complete a short-term culinary arts program to formalize his cooking skills. In the medium term,
    he wants to secure a role as a community engagement coordinator for a local non-profit arts organization, where he can leverage his event-planning expertise and bilingual abilities. Ultimately, he aspires
    to become a recognized curator of Chinese and Asian diaspora art exhibitions in South Florida, establishing his reputation as a competitive and innovative cultural leader.
