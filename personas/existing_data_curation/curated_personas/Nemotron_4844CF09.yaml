personas:
  professional: Wei Chen, a 47‑year‑old community arts coordinator in Miami, leverages meticulous project‑management expertise, bilingual fluency in Mandarin and English, and an insatiable curiosity for
    unconventional artistic expression to design and execute multicultural exhibitions, while their competitive drive pushes them to secure larger grants and outpace rival venues.
  sports: Wei Chen, an avid member of the Miami Badminton Club and a devoted fan of the Miami Heat, energizes their routine with weekly badminton matches, early‑morning runs through the Everglades, and
    pickup basketball games with friends, embodying their sociable, competitive spirit.
  arts: Wei Chen, a passionate explorer of Miami’s contemporary art scene, spends weekends photographing installations by Mickalene Thomas at the Pérez Art Museum Miami and vibrant Wynwood murals by Shepard Fairey,
    while they regularly attend live salsa nights featuring Son de Cuba and fusion‑jazz sets by Snarky Puppy, channeling these experiences into community‑event designs that celebrate multicultural expression.
  travel: Wei Chen prefers meticulously planned short getaways that blend cultural immersion and leisure, having explored Havana’s historic streets, snorkeled in the Bahamas, trekked the Everglades, and
    taken a road trip to Key West, while dreaming of a culinary research journey to Tokyo’s Tsukiji market and an art pilgrimage to Barcelona’s MACBA, always booking boutique stays through Airbnb for authentic
    local flavor.
  culinary: Wei Chen’s kitchen doubles as a creative laboratory where they craft Chinese‑fusion dishes such as miso‑glazed Peking duck tacos with pickled daikon, mapo tofu ramen enriched with Sichuan peppercorn
    and coconut milk, and mango‑infused sticky‑rice sushi rolls, showcasing advanced cooking skills honed through a short‑term culinary arts program and a penchant for sourcing fresh lemongrass and black
    garlic at the local Latin market.
  core: Wei Chen, a 47‑year‑old bilingual arts strategist, merges meticulous project management with relentless curiosity and a competitive spark, juggling community events, culinary experiments, and a
    bold vision to launch a multicultural art café in Miami.
background:
  cultural: Wei Chen is of Chinese heritage, born to parents who immigrated from Taiwan in the late 1970s. He was raised in a bilingual household that celebrated traditional festivals such as Lunar New
    Year and the Mid-Autumn Festival, while also embracing the multicultural vibrancy of Miami. Over the years, he has blended Chinese customs with local Latin American influences, participating in community
    events like Miami’s Calle Ocho and local seafood festivals. His cultural identity is marked by a strong emphasis on family ties, respect for education, and a love for sharing Chinese cuisine and artistic
    traditions with a diverse audience.
