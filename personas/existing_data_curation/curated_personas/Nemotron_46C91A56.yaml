  hobbies: '[''Community volunteering'', ''Coaching youth soccer'', ''Hunting and fishing'', ''Backyard gardening'', ''DIY home improvement projects'', ''Playing acoustic guitar'', ''Listening to classic
    rock and country music'', ''Reading business and self‑development books'', ''Genealogy research'', ''Attending local craft fairs and festivals'']'
  career_goals: Vince aims to move from a frontline sales representative to a regional sales manager within the next three years, overseeing a team of reps across multiple states. He wants to lead the launch
    of new product lines that blend traditional manufacturing with emerging technologies, positioning his company as an innovator in the market. To support this, he plans to complete his bachelor’s degree
    in business administration and earn the Certified Professional Sales Leader (CPSL) credential. He also aspires to mentor junior sales staff, improve his stress‑management skills, and eventually explore
    the possibility of starting his own distribution business, leveraging his deep network in the Kentucky and broader Appalachian region.
