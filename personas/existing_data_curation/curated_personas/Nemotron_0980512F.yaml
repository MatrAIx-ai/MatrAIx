    under adverse conditions'', ''Bilingual communication (Spanish/English)'', ''Basic carpentry and framing repairs'', ''Power and hand tool operation'']'
  hobbies: '[''Hiking on coastal trails'', ''Fishing at local bays'', ''Balcony gardening'', ''Building scale model houses'', ''Restoring vintage bicycles'', ''Listening to traditional Mexican music'',
    ''Cooking Mexican dishes (tamales, mole)'', ''Podcast listening on sustainable construction'', ''Landscape photography'']'
  career_goals: Nasar aims to transition from crew member to independent contractor, eventually launching his own roofing company that specializes in sustainable, energy‑efficient roofs for Southern California
    homeowners. He plans to obtain NMCA certification, complete a Green Building Professional program, and earn a state roofing contractor license within the next two years. Long‑term, he envisions expanding
    into roof inspection services and mentoring younger apprentices while preserving a work schedule that allows quiet, focused time.
