personas:
  professional: Dorothy Robson, a seasoned project coordinator with fifteen years of experience, leverages her STEM background and Lean Six Sigma expertise to blend Agile and Waterfall methods, delivering
    data‑driven risk assessments and measurable process improvements while mentoring junior staff.
  sports: Dorothy Robson, an avid cross‑country skier and kayaker, trains with the Twin Cities Ski Club in the winter, rows on Lake Superior in summer, and roots for the Minnesota Timberwolves, Wild, and
    Vikings, balancing solo endurance workouts with occasional community league softball games.
  arts: Dorothy Robson enjoys contemporary mystery novels by Tana French and Gillian Flynn, attends performances at the Guthrie Theater featuring works by Lin‑Manuel Miranda, and curates a mixtape of Bon
    Iver, The National, and Bob Dylan for background music during DIY projects.
  travel: Dorothy Robson prefers meticulously planned road trips that combine outdoor adventure with family time, having explored the Boundary Waters Canoe Area and the Canadian Rockies, and they aim to
    cycle the fjords of Norway and kayak Iceland’s Jökulsárlón later this decade.
  culinary: Dorothy Robson, a confident home cook, regularly prepares hearty wild‑rice and mushroom soup, roasted heirloom tomatoes from their garden, cedar‑plank salmon with dill, and homemade sourdough
    bread, while occasionally indulging in a nightly slice of New York‑style pizza from a local pizzeria.
  core: Dorothy Robson balances analytical precision with a love for rugged Minnesota outdoors, turning structured project plans into spontaneous kayak outings and garden harvests, all while juggling a
    pragmatic budget and the occasional over‑ambitious DIY marathon.
background:
  cultural: Raised in a small town near Sartell, Minnesota, Dorothy grew up in a family with German‑Scandinavian heritage. The community’s Midwestern values—practicality, self‑reliance, modesty, and a strong
    sense of civic duty—shaped her worldview. Her upbringing emphasized collaborative problem solving, respect for tradition, and an appreciation for the natural environment, reflected in her love of seasonal
    outdoor activities and community volunteering. While identifying with a mainstream Protestant background, she maintains an inclusive, progressive outlook that balances cultural heritage with contemporary
    ideas.
