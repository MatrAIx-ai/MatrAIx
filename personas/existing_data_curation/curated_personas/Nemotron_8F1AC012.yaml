  hobbies: '[''Hiking'', ''Cross-Country Skiing'', ''Kayaking'', ''Gardening'', ''Reading Mystery Novels'', ''DIY Home Improvement'', ''Cooking Family Meals'', ''Volunteering at Community Center'', ''Project
    Management Meetups'', ''Book Club'']'
  career_goals: Over the next five years Dorothy aims to ascend to a senior PMO leadership role within a mid‑size manufacturing or technology firm in the Upper Midwest. She plans to obtain PMP and Certified
    Scrum Professional credentials, expand her strategic portfolio‑management capabilities, and spearhead organization‑wide digital‑transformation initiatives. A core ambition is to build a mentorship program
    that cultivates emerging project managers, while preserving a sustainable work‑life balance for her family.
