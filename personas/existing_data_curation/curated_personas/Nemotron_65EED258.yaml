personas:
  professional: Eric Ruiz, a 60‑year‑old logistics and facilities veteran, leverages four decades of process design, inventory control, and budgeting expertise to craft meticulous SOPs and mentor emerging
    managers, while maintaining a calm, empathetic approach that prioritizes operational stability over high‑pressure firefighting.
  sports: Eric Ruiz enjoys leisurely hikes on the nearby nature preserve, participates in a small walkers’ club that meets on Saturday mornings, and faithfully follows the Los Angeles Dodgers and the LA
    Galaxy, preferring low‑impact activities that align with his desire for calm routine.
  arts: Eric Ruiz finds solace in the mellow boleros of Benny Moré and Celia Cruz, devotes evenings to rereading classics like Tolstoy’s War and Peace and biographies of figures such as Winston Churchill,
    and occasionally visits the local history museum to admire early 20th‑century art exhibitions.
  travel: Eric Ruiz favors meticulously planned, low‑stress getaways to historic destinations, such as a guided tour of Seville’s colonial architecture and a relaxed weekend in Havana to reconnect with
    the rhythms of traditional cuisine, always setting a detailed itinerary and reserving a quiet boutique hotel.
  culinary: Eric Ruiz showcases his love of heritage by preparing weekend feasts of ropa vieja, arroz con pollo, and plantain‑based tostones, using home‑grown tomatoes and cilantro from his garden, while
    his modest culinary skill is punctuated by a tendency to over‑season the sofrito, much to his family’s amused chagrin.
  core: Eric Ruiz is a meticulous, low‑key logistic veteran who balances a love for order with solitary hobbies, quietly confronting worries while nurturing his garden, workshop, and heritage through music
    and food.
background:
  cultural: Eric’s Cuban heritage is a central part of his identity. He grew up in a bilingual household where Spanish was spoken daily, and family gatherings were marked by shared meals of ropa vieja,
    plantains, and coffee. The values of family solidarity, respect for elders, and a strong work ethic were reinforced by his parents, who emigrated from Cuba in the 1960s. While living in Corona, he stays
    connected to the local Cuban‑American community through occasional visits to cultural festivals, a neighborhood church, and by preserving Cuban culinary traditions at home. This background informs his
    cooperative nature, his appreciation for harmony, and his calm, caring approach to both work and personal relationships.
