  hobbies: '["Reading historical biographies","Vegetable gardening","Woodworking","Listening to Cuban boleros","Nature walks","Jigsaw puzzles","Cooking Cuban cuisine"]'
  career_goals: As he approaches retirement, Eric aims to cement a legacy of operational stability for his company, mentoring younger managers and codifying best‑practice SOPs that will outlive his tenure.
    He hopes to transition into an advisory role that allows him to influence strategic decisions without the day‑to‑day pressure, while also focusing on creating a low‑stress work environment for his team.
    He is also interested in consulting part‑time for other small businesses in the Corona area, helping them implement structure and predictability in their operations.
