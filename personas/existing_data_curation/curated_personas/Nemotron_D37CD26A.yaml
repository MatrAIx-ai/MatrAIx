  hobbies: '[''Reading classic literature'', ''Painting'', ''Photography'', ''Hiking'', ''Gardening'', ''Gallery visits'', ''Live jazz concerts'', ''Community theater attendance'', ''Woodworking'', ''Poetry
    writing'']'
  career_goals: In retirement, Mark aims to compile and publish a memoir that interweaves his lifelong encounters with art, social change, and personal reflection. He wishes to mentor emerging artists in
    Asheville through a weekly workshop series, fostering critical thinking and experimental practice. He plans to establish a modest scholarship for local high‑school students pursuing humanities studies,
    hoping to leave a lasting educational legacy. Additionally, Mark aspires to curate a traveling exhibition of Appalachian folk art that highlights underrepresented creators, and to exhibit a series of
    mixed‑media works that blend traditional painting with found objects from his gardening and woodworking projects.
