  hobbies: '[''Gardening (vegetable and flower beds)'', ''Walking and nature trails'', ''Bridge and chess'', ''Reading mystery novels and biographies'', ''Woodworking'', ''Cooking for family gatherings'',
    ''Volunteering at senior center'', ''Listening to classic rock music'']'
  career_goals: In retirement, Dylan aims to channel his business acumen into community service. He seeks to mentor emerging entrepreneurs in Reading, volunteer as a pro‑bono consultant for local nonprofits,
    and serve on advisory boards for senior‑center programs. He hopes to develop and teach a series of financial‑literacy workshops tailored for older adults, write a concise guide on navigating retirement
    finances, and maintain his health through regular walks and gardening. Managing his stress sensitivity, he also plans to incorporate mindfulness practices into his daily routine, ensuring his ambitions
    remain sustainable and low‑pressure.
