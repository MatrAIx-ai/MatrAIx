personas:
  professional: Debbie Leo, a 33‑year‑old aspiring part‑time library clerk, leverages meticulous household management, budgeting expertise, and Excel record‑keeping to keep the circulation desk organized
    while furnishing detailed schedules for community programs, despite a constant undercurrent of self‑doubt that drives them to double‑check every task.
  sports: Debbie Leo enjoys early‑morning walks in the neighborhood park, participates in the local senior softball league, and is a faithful fan of the Jackson State Tigers football team, attending games
    whenever possible, while also tending to a modest home garden that doubles as low‑impact cardio.
  arts: Debbie Leo immerses themselves in mystery novels by Agatha Christie and historical fiction by Hilary Mantel, knits while listening to gospel legends Mahalia Jackson and soul icons Aretha Franklin,
    and occasionally joins a community theater book club that discusses classic stage adaptations, allowing them to indulge their love of storytelling and soulful music.
  travel: Debbie Leo prefers short, well‑planned road trips to culturally rich Southern cities such as Savannah, Charleston, and New Orleans, enjoys visiting historic districts and local museums, and dreams
    of a solo pilgrimage to the historic sites of Washington, D.C., while balancing a limited travel budget and a desire for familiar comforts.
  culinary: Debbie Leo delights in preparing Southern staples like fried chicken, collard greens seasoned with smoked turkey, and cornbread, while experimenting with low‑sugar peach cobbler using stevia
    and fresh garden tomatoes in a tangy salsa, showcasing a culinary edge that blends tradition with health‑conscious tweaks.
  core: Debbie Leo is a 33‑year‑old routine‑driven planner who knits, gardens, and spreadsheets their way through life, balancing meticulous organization with a temperate scepticism that fuels their constant
    worry about the unknown.
background:
  cultural: Debbie grew up in the historically Black community of Haywood County, where church life, family ties, and Southern hospitality are central. Her upbringing was shaped by the traditions of African‑American
    gospel music, community gatherings at the church, and a strong emphasis on self‑reliance and mutual support among neighbors. She values the practical wisdom passed down through generations, from cooking
    family recipes to maintaining a tidy home. While she embraces the cultural richness of her heritage, she also navigates the challenges of a small‑town environment, seeking stability and predictability
    in her daily routines.
