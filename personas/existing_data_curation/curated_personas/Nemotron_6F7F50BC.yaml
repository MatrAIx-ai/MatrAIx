    Bible study"]'
  career_goals: Debbie aims to secure a stable, part‑time position that leverages her organizational strengths, such as a clerical role at the local library or a scheduling assistant for a community health
    clinic. She plans to earn her GED and complete a short vocational certificate in medical office administration, which will give her a clear career path with predictable routines. Long‑term, she hopes
    to become a trusted administrative coordinator for a nonprofit organization serving the Jackson community, where she can apply her meticulous planning skills while maintaining a consistent work schedule
    that fits her preference for routine.
