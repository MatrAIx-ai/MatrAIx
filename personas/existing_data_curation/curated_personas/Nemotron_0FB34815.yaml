  career_goals: Cherry aims to advance to a senior executive role—such as Director of Operations or Vice President—within the next five to seven years, focusing on scaling operational excellence, sustainability,
    and community impact for a regional or national organization. She also envisions launching a boutique consulting firm that helps small businesses in Western North Carolina adopt data‑driven strategies
    and sustainable practices, while mentoring emerging female leaders and promoting inclusive workplace cultures.
