personas:
  professional: Cherry Lee, a senior operations strategist at a regional manufacturing firm, fuses data‑driven planning, rigorous budgeting, and process optimization with a curiosity for sustainable technology,
    and they leverage their disciplined organization and compassionate assertiveness to champion cross‑functional collaboration that drives operational excellence and community impact.
  sports: Cherry Lee, an avid hiker and mountain‑bike enthusiast, spends summer weekends tackling the Blue Ridge Parkway and leading rides with the Asheville Cycling Club, follows the Carolina Panthers
    and Charlotte Hornets for a dose of pro‑sports excitement, and in winter joins a cross‑country ski group at Beech Mountain to maintain year‑round fitness, while they balance these pursuits with weekly
    yoga sessions for flexibility.
  arts: Cherry Lee, a photography hobbyist and regular attendee of Asheville’s live‑music scene, draws creative inspiration from folk‑rock duo The Avett Brothers, the lyrical storytelling of Alison Krauss,
    and the cinematic craft of Greta Gerwig, and they channel this artistic energy into weekend photo walks capturing mist‑shrouded mountain vistas.
  travel: Cherry Lee, who balances a love for planned road trips with spontaneous weekend getaways, has hiked the Utah red rocks of Sedona, savored fresh seafood in Brittany, France, and explored the historic
    charm of Charleston, SC, and they dream of trekking the Inca Trail to Machu Picchu while keeping travel budgets aligned with their disciplined savings plan.
  culinary: Cherry Lee, an intermediate home chef with a thriving vegetable garden, crafts farm‑to‑table meals such as roasted heirloom carrots with thyme and goat cheese, wild mushroom risotto featuring
    foraged morels, and grilled trout with lemon‑caper butter, and they relish pairing these dishes with locally sourced honey‑infused olive oil.
  core: Cherry Lee, a disciplined strategist who treats every project like a garden plot, meticulously plans both spreadsheets and seed beds, yet they habitually over‑book their calendar, leaving scant
    room for spontaneous downtime.
background:
  cultural: Cherry’s cultural background is rooted in a white, middle‑class family that relocated to Western North Carolina during her childhood. Growing up in Asheville, she absorbed the region’s blend
    of Southern hospitality, Appalachian traditions, and a progressive, arts‑focused community ethos. This upbringing fostered a strong work ethic, respect for self‑reliance, and an appreciation for sustainability,
    local food culture, and cultural diversity, shaping both her personal values and professional outlook.
