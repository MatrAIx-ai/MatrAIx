persona_description: A global health official who is passionate about the prevention and control of diabetes, particularly in low and middle-income countries where it is a major public health problem. They
  are aware of the devastating health consequences of high blood sugar levels and the need for drastic action to stop the spread of diabetes. They have experience working in the field of public health and
  have a deep understanding of the impact of lifestyle factors such as diet and inactivity on the prevalence of diabetes. They are committed to working with partners and stakeholders to develop and implement
  effective strategies to prevent and control diabetes in these countries.
