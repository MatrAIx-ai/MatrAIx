  hobbies: '[''Gardening'', ''Cooking traditional Honduran cuisine'', ''Church choir singing'', ''Walking and nature hikes'', ''Reading (historical fiction and memoirs)'', ''Knitting and crocheting'', ''Traditional
    Central American dance'', ''Volunteer story‑time sessions'', ''Participating in cultural festivals'', ''Genealogy research'']'
  career_goals: Although officially retired, Esperanza aims to leverage her educational background to enrich her community. She plans to expand her volunteer work at the local senior center, developing
    a weekly Spanish‑language conversation group for seniors to reduce isolation. She hopes to mentor a cohort of young teachers through a structured apprenticeship, sharing best practices in bilingual
    education. Another ambition is to document traditional Honduran recipes and oral histories in a community‑based cookbook, preserving cultural heritage for future generations. She also aspires to learn
    to use tablets and social media more fluently to maintain daily contact with relatives abroad, and perhaps to organize an annual cultural exchange trip to Honduras for seniors in Lafayette.
