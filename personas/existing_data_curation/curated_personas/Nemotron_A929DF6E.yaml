personas:
  professional: Esperanza Giniebra, a retired bilingual educator with over thirty years of classroom and adult literacy experience, now channels a calm, organized authority into volunteer tutoring, curriculum
    design, and mentorship of novice teachers, all while balancing structured lesson planning with the flexibility needed for community outreach.
  sports: Esperanza Giniebra enjoys leisurely walks along the Vermilion River, participates in a local senior walking club, follows the New Orleans Saints and LSU Tigers from the comfort of her living room,
    and attends a weekly traditional dance class that doubles as gentle cardio, balancing structured fitness with social interaction.
  arts: Esperanza Giniebra contributes her rich alto voice to the church choir, practices the folk dance Palmas de la Tierra, knits intricate doilies while listening to choral works of Mozart and the soulful
    ballads of traditional folk singers, and finds inspiration in the novels discussed at her book club, all of which nurture her creative spirit.
  travel: Esperanza Giniebra prefers meticulously planned trips, often taking short drives to historic towns like St. Francisville or a weekend cruise along the Gulf, while dreaming of a cultural exchange
    journey to Central America to visit family farms and markets, balancing a modest travel budget with a desire for immersive experiences.
  culinary: Esperanza Giniebra excels in cooking traditional dishes such as baleadas, sopa de caracol, and pastelitos, skillfully layering corn tortillas, refried beans, cheese, marinated shrimp, and plantain
    flour, and delights in sharing these meals at church potlucks, while also experimenting with fresh herbs from her garden like cilantro, oregano, and chamomile.
  core: Esperanza Giniebra is a structured, community‑focused retiree whose love of teaching, garden‑to‑table cooking, and cultural preservation is tempered by a habit of worrying over details and a tendency
    to over‑schedule her days.
background:
  cultural: Esperanza is a first‑generation Honduran American who arrived in the United States as a teenager with her family and grew up in a tightly knit Hispanic community in Texas before moving to Lafayette,
    Louisiana. Her upbringing blended Catholic traditions, vibrant Honduran festivals (Semana Santa, Feria Juniana), and the Spanish language, while her adult life has integrated the Cajun culture of south
    Louisiana—its music, cuisine, and communal spirit. She maintains strong ties with relatives in Tegucigalpa and the surrounding Honduran countryside, regularly sending remittances and sharing family
    stories. This bicultural experience informs her values of family solidarity, respect for elders, and a deep appreciation for cultural preservation.
attributes:
  skills: '[''Bilingual instruction (Spanish-English)'', ''Curriculum development'', ''Classroom management'', ''Adult literacy tutoring'', ''Community outreach coordination'', ''Grant budgeting and reporting'',
