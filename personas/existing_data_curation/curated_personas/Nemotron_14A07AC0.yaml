personas:
  professional: Mildred Burnup, a 76-year-old retired community volunteer, leverages decades of budgeting and record-keeping expertise to mentor younger volunteers, run a thriving gardening club, and publish
    a monthly seniors' newsletter, all while approaching challenges with a practical, structured and slightly competitive edge.
  sports: Mildred Burnup enjoys low-impact cardio through line-dancing classes and a senior walking club, cheerfully follows the Dallas Cowboys, Houston Astros and local West Texas High School Wildcats
    football, competes in bridge at the community center, and occasionally coaches a senior softball league.
  arts: Mildred Burnup spends afternoons immersed in historical fiction by Ken Follett and true-crime mysteries by Ann Rule, stitches intricate quilts with traditional patterns, listens to country legends
    Willie Nelson and Sturgill Simpson as well as performances by the Texas Symphony Orchestra, and attends community theater productions at the Alamo Plaza Playhouse.
  travel: Mildred Burnup prefers carefully planned short road trips, often driving the Bluebonnet Trail to visit historic towns such as Fredericksburg and Waco's Magnolia Market, keeps a handwritten itinerary
    for each journey, and dreams of a leisurely pilgrimage to Savannah, Georgia, to explore its antebellum architecture.
  culinary: Mildred Burnup delights in simmering a robust chili with cumin, jalapenos, and garden-grown tomatoes, bakes pecan pie with locally sourced pecans, prepares fresh garden salads with heirloom
    peppers, and frequently hosts potluck lunches at the Methodist church where they share a signature cornbread casserole.
  core: Mildred Burnup blends Southern hospitality with meticulous budgeting, community gardening, and lively line-dancing, though they hoard coupons and sometimes forget dental appointments.
background:
  cultural: Mildred is a White Texan who grew up in a modest, middle‑class family steeped in Southern hospitality and community values. Her upbringing emphasized self‑reliance, respect for tradition, and
    a strong Christian faith (Methodist). Texas cultural influences are evident in her love of gardening, line‑dancing, and cooking comfort food like chili and pecan pie. She values independence and practicality,
    reflecting the regional ethos of “do‑it‑yourself” while maintaining close ties to her extended family and local church community.
