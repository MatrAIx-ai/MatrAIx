  career_goals: Oliver’s imagination is already painting a picture of his future. Inspired by his frequent beach trips and his fascination with sea turtles nesting on nearby shores, he dreams of becoming
    a marine biologist who helps protect ocean life. He also expresses a desire to be an astronaut, excited by the idea of exploring new frontiers, and occasionally talks about becoming a firefighter because
    he likes helping others. These ambitions reflect his blend of curiosity about the natural world and a practical desire to make a positive difference in his community. In the near term, he aims to master
    reading longer storybooks, ride his bike without training wheels, and learn to swim confidently in the deeper part of the pool.
