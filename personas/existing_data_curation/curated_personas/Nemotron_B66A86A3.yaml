personas:
  professional: A diligent preschool student, Oliver Hemphill shows early aptitude for sorting shapes and stories, they blend curiosity about how things work with practical, hands-on problem solving, and
    balance their natural talkativeness with quiet focus during nap time.
  sports: A beach-loving little athlete, Oliver Hemphill participates in the Venice Junior Swim Club and the Florida Gators T-ball league, they cheer for the Miami Dolphins during game day picnics and balance
    energetic sandcastle building with calm moments of drawing in the sand, reflecting their mix of social play and solitary focus.
  arts: A budding creative, Oliver Hemphill enjoys drawing sunsets on beach paper, listening to the whimsical tunes of Sesame Street and kid-friendly pop songs by Taylor Swift, they often reenact scenes
    from Mickey Mouse Clubhouse, demonstrating a blend of cooperative storytelling and assertive imagination.
  travel: A curious explorer, Oliver Hemphill loves weekend trips to Key West's historic lighthouse, summer vacations at Orlando's theme parks, and dreaming of a family road trip to the Grand Canyon, they
    plan adventures with colorful stickers on a travel chart while balancing excitement with occasional beach-side stay-cations to respect family budget constraints.
  culinary: A tiny food enthusiast, Oliver Hemphill favors grilled cheese sandwiches, fresh shrimp tacos, and key lime pie topped with zest, they proudly help stir orange juice and sprinkle shredded cheese,
    yet they stubbornly refuse broccoli, reflecting a playful yet selective palate.
  core: Oliver Hemphill is a sun-kissed five-year-old who balances a fierce love for sandcastles and shells with a habit of leaving toys scattered, they navigate their world with curiosity, practicality,
    and a charmingly stubborn appetite for sweet treats.
background:
  cultural: Oliver grows up in a white, middle‑class family in Venice, Florida, a coastal community known for its sandy beaches, a relaxed southern‑florida vibe, and a strong sense of local community. His
    family celebrates typical American holidays such as Thanksgiving, Christmas, and the Fourth of July, often incorporating beach‑side picnics and barbecues. They attend a local Methodist church, where
    community service and fellowship are emphasized. The multicultural environment of Sarasota County, with its mix of retirees, families, and seasonal residents, exposes Oliver to diverse traditions and
    cuisines, fostering an open‑minded outlook while maintaining the family’s core values of kindness, responsibility, and a love for the outdoors.
