  hobbies: '[''Basketball'', ''Beach volleyball'', ''Karaoke'', ''DIY home renovation'', ''Classic car restoration'', ''Fishing'', ''Watching competitive sports'', ''Charity build‑days'']'
  career_goals: Tommy aims to advance from laborer to foreman within the next three years by completing an OSHA 30‑hour certification and a certification in construction management. He plans to finish his
    associate degree in construction technology and eventually earn a bachelor's in construction management. His long‑term ambition is to launch his own general contracting firm that emphasizes structured
    project workflows and a reliable, safety‑first culture. He also aspires to build a reputation as a go‑to leader for complex, high‑pressure builds, leveraging his calm composure and competitive drive
    to win bids and grow his business network.
