personas:
  professional: Tommy Rodan, a construction laborer with a knack for reading blueprints and operating skid‑steer loaders, leverages their calm, competitive mindset and strong communication to keep crews
    on schedule, enforce OSHA standards, and consistently out‑perform project benchmarks as they work toward a foreman role.
  sports: Tommy Rodan, a 35‑year‑old sports enthusiast, plays pickup basketball at the community center, joins a beach‑volleyball league in the summer, follows the NFL’s Dallas Cowboys and the UFC, and
    trains with the local CrossFit box for conditioning.
  arts: Tommy Rodan loves karaoke, often belting out Queen’s Bohemian Rhapsody, admires the stage presence of Beyoncé and the storytelling of Tom Hanks, and collects vinyl records of classic rock bands
    like Led Zeppelin.
  travel: Tommy Rodan plans travel around long weekends, opting for a mix of adventure and relaxation—road‑tripping to the Grand Canyon for hiking in spring, cruising the Pacific coast to enjoy fishing
    in Baja, and dreaming of a future European classic‑car tour through Italy’s Tuscan roadways.
  culinary: Tommy Rodan enjoys grilling freshly caught snapper with lemon‑herb butter, crafts homemade BBQ ribs using a dry rub of paprika, brown sugar, and smoked salt, and experiments with DIY renovations
    of their kitchen that let them perfect a cast‑iron skillet sear.
  core: Tommy Rodan is a structured, charismatic builder who turns every project, game, and karaoke night into a competition, yet can’t resist a weekend fishing trip and a late‑night slice of pepperoni
    pizza.
background:
  cultural: Tommy grew up in Hollywood, Florida, in a middle‑class white family with Midwestern roots. His upbringing blended a traditional Southern work ethic with the multicultural, vibrant atmosphere
    of Broward County. He was exposed to a mix of American cultural values—self‑reliance, punctuality, and respect for practical skills—while also experiencing the diverse culinary, musical, and social
    influences of South Florida’s immigrant communities. This background fostered his pragmatic outlook, sociable demeanor, and ability to navigate varied social settings with ease.
attributes:
  skills: '[''Blueprint interpretation'', ''OSHA safety compliance'', ''Heavy equipment operation'', ''Concrete finishing'', ''Basic carpentry'', ''Drywall installation'', ''Time management'', ''Crew scheduling'',
