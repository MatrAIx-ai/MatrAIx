personas:
  professional: Ramona Harris is a budding visual artist with a knack for sketching, digital illustration, and community art events, whose curious mind and love for flexible, improvisational project planning
    drive her pursuit of a graphic design degree and freelance illustration work for local nonprofits.
  sports: Ramona Harris enjoys casual weekend hikes in the nearby state park and follows the local semi‑pro soccer team, the River Valley Rangers, while occasionally joining the town’s community volleyball
    league, where she prefers the social camaraderie over competition.
  arts: Ramona Harris immerses herself in the arts by frequenting the downtown gallery featuring works by emerging painter Maya Lin and attending indie concerts by the experimental duo Black Pumas, while
    her own sketchbook reflects the influence of photographers like Henri Cartier‑Bresson and street artist Banksy.
  travel: Ramona Harris dreams of trading her small town’s quiet streets for a weekend road trip to the red‑rock canyons of Sedona, has already explored the museum‑rich city of Chicago on a school field
    trip, and likes to plan spontaneous day‑trips to nearby coastal towns, preferring flexible itineraries over rigid bookings.
  culinary: Ramona Harris’s palate swings between experimental vegan tacos with roasted cauliflower, quick avocado toast topped with feta and chili flakes, and the occasional comfort bowl of homemade ramen,
    which she attempts in her modest kitchen armed with a well‑worn cast‑iron skillet and a love for fresh herbs like cilantro and basil.
  core: Ramona Harris is a curious, 19‑year‑old art enthusiast who blends sketching, community volunteering, and a relaxed, slightly disorganized lifestyle into a creative life that constantly seeks new
    visual inspiration while occasionally forgetting deadlines.
background:
  cultural: Ramona comes from a white, Midwestern American background typical of the Homer, Minnesota area. Her family traces its roots to German and Scandinavian ancestors, and she was raised in a modest
    Protestant household that emphasized community, humility, and hard work. Growing up, she participated in local traditions such as the Dakota County Fair, high school sports events, and seasonal holidays
    like Thanksgiving and Christmas with town-wide celebrations. While she values these regional customs, her innate curiosity has led her to explore diverse artistic and cultural perspectives through school
    programs, online resources, and occasional trips to Minneapolis, broadening her outlook beyond the small-town setting.
