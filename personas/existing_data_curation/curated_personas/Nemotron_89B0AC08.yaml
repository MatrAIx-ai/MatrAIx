  hobbies: '[''Sketching and drawing'', ''Photography'', ''Visiting art galleries and museums'', ''Reading contemporary fiction'', ''Listening to indie/experimental music'', ''Hiking and nature walks'',
    ''Cooking and trying new recipes'', ''Journaling'', ''Volunteering at community center (art workshops)'', ''DIY crafts'']'
  career_goals: Ramona plans to enroll in a community college or art institute to study visual arts or graphic design, aiming to combine her love for art with community outreach. She envisions a career
    where she can work as a freelance illustrator, create content for local nonprofits, or become a community arts coordinator who organizes workshops and public art projects. Flexibility and the ability
    to explore new ideas are central to her ambition, so she seeks roles that allow creative freedom and occasional travel to galleries or cultural events.
