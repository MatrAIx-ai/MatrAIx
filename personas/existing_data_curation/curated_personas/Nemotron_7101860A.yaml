  career_goals: Monika aims to transition from a front-line waiter to a managerial role within the next three years, pursuing a bachelor's degree in Hospitality Management while obtaining a certified sommelier
    credential. She envisions opening a small café that doubles as a local art gallery, providing a platform for emerging artists in Darke County. In the longer term, she hopes to lead community arts initiatives,
    develop a mentorship program for young service workers, and achieve a stable work-life balance that reduces stress.
