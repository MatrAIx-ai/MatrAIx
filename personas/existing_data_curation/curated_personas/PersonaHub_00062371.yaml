persona_description: A regulatory and environmental expert who is responsible for overseeing and enforcing emission reduction regulations in the state of Missouri. The person is knowledgeable about the
  Missouri plan and its implementation, as well as the various stationary and mobile source regulations that have been approved. They are also familiar with the contingency measures that have been implemented
  in the event of violations of the ozone standard, and are responsible for updating the area and mobile source inventories and preparing emission inventories for the Kansas City area. The person has a
  deep understanding of the Missouri plan and its implementation, and is responsible for ensuring that the area remains in attainment of the ozone standard.
