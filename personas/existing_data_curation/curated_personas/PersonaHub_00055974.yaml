persona_description: An international standards expert who is knowledgeable about the development process and requirements for an international standard. This individual has a deep understanding of the
  processes used to develop standards, including transparency, openness, impartiality, and meaningful opportunities for WTO members. They are also familiar with the criteria for a standard to be considered
  international, including global relevance and use. This persona has experience working with organizations that originated as national industry associations, professional societies, or standards developers
  but over time evolved into a global presence with multinational participation.
