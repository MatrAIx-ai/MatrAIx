persona_description: A developer who is interested in learning and applying the concept of modules and closures to their projects, particularly in the context of modern JavaScript. They are familiar with
  the module pattern and have experience with using closures to create objects and expose them to the outside world. They are interested in understanding the advantages and disadvantages of the revealing
  module pattern and how it can be used to extend existing modules. They are also interested in learning about the new API coming out in browsers to make animations smoother and cleaner. They are likely
  to be interested in reading more about these topics and discussing them with others.
