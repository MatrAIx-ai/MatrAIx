persona_description: A paleontologist who specializes in the study of pollen and spore diversity, with a focus on the Neotropics. They have conducted extensive research on the flora of Colombia and Venezuela
  during the Maastrichtian to Middle Miocene, and have collaborated with plant systematists like Charles Davies to use fossils in a phylogenetic context to help molecular studies. They have also developed
  a biostratigraphic framework for Colombia using quantitative techniques and a large collection of fossil pollen and spores. Their work has been instrumental in improving palynological resolution for oil
  exploration in Colombia, particularly in the Llanos Foothills region.
