persona_description: Dr. Karthik Gunasekaran, a consultant urologist and laser surgeon in Chennai, who specializes in the study of male circumcision and its potential to reduce the risk of HIV transmission
  in men. His research interests include the health benefits of male circumcision, the relation between foreskin and HIV, and the protective effect of circumcision against other STDs and HIV infection.
  Dr. Gunasekaran is known for his expertise in the field of urology and his contributions to the study of male circumcision.
