personas:
  professional: An experienced clinical laboratory technologist, Wanda Hayes leverages 15 years of expertise with high‑complexity hematology, chemistry, microbiology, and immunoassay platforms—operating
    Sysmex XN, Roche Cobas, and Abbott Architect analyzers—while championing collaborative training, empathetic communication, and innovative quality‑improvement projects that pave the way toward CLS certification
    and future laboratory leadership.
  sports: Wanda Hayes avidly supports the Dallas Cowboys, Dallas Mavericks, and Texas Rangers, joins a local Mansfield running club for weekend 5k jogs, enjoys occasional yoga classes at the community center,
    and prefers low‑impact activities that fit her spontaneous lifestyle over rigorous gym routines.
  arts: Wanda Hayes immerses herself in the Dallas art scene, regularly attending openings featuring contemporary painters like Kehinde Wiley and Kara Walker, sings gospel and soul classics with her community
    choir alongside artists such as Alicia Keys and John Legend, and draws personal acrylic works inspired by heritage motifs and modern abstraction.
  travel: Wanda Hayes favors spontaneous road trips with her husband, charting routes to small‑town music venues in Austin, Fredericksburg, and Hot Springs, while keeping a bucket list that includes a cultural
    weekend in New Orleans and a scenic drive through the Blue Ridge Mountains, balancing adventure with the practicalities of family time and a modest travel budget.
  culinary: Wanda Hayes enjoys cooking with fresh heirloom tomatoes, basil, and thyme from her garden, skillfully preparing dishes like herb‑roasted chicken, tomato‑basil bruschetta, and slow‑cooked pork
    shoulder glazed with a honey‑chipotle sauce, and delights in sharing these soul‑inspired meals at family gatherings, though she occasionally over‑salts when experimenting with new recipes.
  core: Wanda Hayes blends scientific precision with artistic spontaneity, turning laboratory data into community health outreach while filling her weekends with paint, choir, and impromptu road trips—though
    she often juggles deadlines and forgets to file receipts.
background:
  cultural: Wanda is an African‑American woman whose family roots trace back to the Great Migration from the Mississippi Delta to Texas. Growing up in a close‑knit Black community in the Dallas‑Fort Worth
    metroplex, she was immersed in church life, gospel music, and Southern cuisine. Her heritage combines the storytelling tradition of African‑American oral histories with the resilience and communal support
    of the Texas Black diaspora. Wanda’s cultural identity informs her values of harmony, cooperation, and community service, and she proudly celebrates Juneteenth, Kwanzaa, and local Black cultural festivals
    that honor her ancestors’ legacy.
attributes:
  skills: '["Specimen collection and processing","Automated chemistry and immunoassay analysis","Hematology and coagulation testing","Microbiology culture and susceptibility testing","Molecular diagnostic
    techniques","Laboratory instrument calibration and troubleshooting","Quality control and CAP/CLIA compliance","Laboratory information system (LIS) data management","Staff training and mentorship","Process
    improvement and Lean Six Sigma basics"]'
  hobbies: '["Visiting art museums and galleries","Painting (acrylic, cultural themes)","Spontaneous road trips and music venue hopping","Community choir singing","Cooking soul food and hosting family gatherings","Gardening
    (heirloom vegetables and herbs)","Volunteering at health fairs and church events","Attending local cultural festivals"]'
  career_goals: Wanda aims to obtain her Clinical Laboratory Scientist (CLS) certification and become a lead technologist or laboratory supervisor within her hospital network. She aspires to lead a multidisciplinary
    quality‑improvement team that integrates new molecular testing platforms, and eventually transition into a combined clinical‑research role where she can bridge patient care with innovative diagnostic
    research. Long‑term, she dreams of establishing a community health outreach clinic in Mansfield that offers free laboratory screening services and health education workshops, fostering greater health
    equity for underserved Black families in the area.
