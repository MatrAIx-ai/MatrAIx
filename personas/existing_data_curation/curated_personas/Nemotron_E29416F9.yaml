personas:
  professional: Fareeda Hill is a seasoned painter and paperhanger who blends meticulous surface preparation, EPA lead‑safe certification, and a flair for abstract faux finishes with an organized, deadline‑driven
    mindset, assertively leading crews while mentoring apprentices toward a future decorative‑finishing business.
  sports: Fareeda Hill stays active by hiking the trails at Panola Mountain State Park, joining a regional trail‑running club each spring, playing weekend pick‑up basketball at the local community center,
    and cheering for the Atlanta Falcons and Atlanta United.
  arts: Fareeda Hill channels artistic curiosity into fine‑art painting, drawing inspiration from Georgia O’Keeffe’s bold forms, Mark Rothko’s color fields, and Kehinde Wiley’s portraiture, while also performing
    in the church choir on evenings that echo the soulful harmonies of Aretha Franklin and contemporary gospel artist Le’Andria Johnson.
  travel: Fareeda Hill prefers well‑planned road trips that balance scenic hikes and cultural immersion, having driven the Blue Ridge Parkway to explore Asheville’s art scene, savored Creole flavors in
    New Orleans, and dreaming of a springtime visit to the historic gardens of Seville, Spain.
  culinary: Fareeda Hill enjoys cooking Southern comfort dishes with a modern twist, expertly preparing shrimp and grits seasoned with smoked paprika, whipping up collard greens sautéed with garlic and
    chili flakes, and mastering a flaky buttermilk biscuit recipe that they proudly serve alongside homemade peach cobbler.
  core: Fareeda Hill is a detail‑oriented artist‑tradesperson who meticulously balances vibrant creativity with pragmatic business sense, yet secretly hoards half‑finished canvases in the garage and forgets
    to water their garden when a deadline approaches.
background:
  cultural: Fareeda grew up in a close‑knit Black family in Jonesboro, GA, where church, family gatherings, and community events shaped her values of perseverance, cooperation, and self‑advocacy. Her Southern
    African‑American heritage informs her love for gospel music, soulful cooking, and storytelling, often reflected in the color palettes and themes of her artwork. She frequently participates in Juneteenth
    celebrations and local heritage festivals, drawing inspiration from the vibrant cultural landscape of Fayette County while honoring the traditions passed down by her ancestors.
attributes:
  skills: '[''interior painting'', ''exterior painting'', ''paper hanging'', ''wallpaper removal'', ''surface preparation'', ''color mixing'', ''faux finishing'', ''custom mural creation'', ''project estimation'',
