  hobbies: '[''fine art painting'', ''custom mural creation'', ''DIY home improvement'', ''gardening'', ''southern cooking'', ''reading design and architecture magazines'', ''attending local cultural festivals'',
    ''hiking at Panola Mountain State Park'', ''participating in church choir'']'
  career_goals: Fareeda aims to launch her own painting and decorative finishing business in Fayette County within the next three years, leveraging her artistic flair and practical expertise. She plans
    to obtain advanced certifications, such as a state contractor’s license and specialized historic‑home restoration training, to differentiate her services. By building a reputation for quality and reliability,
    she hopes to become a go‑to subcontractor for larger renovation firms and eventually mentor apprentices, fostering a supportive community of skilled tradespeople. Long‑term, she envisions expanding
    into interior design consulting that blends functional painting with custom art installations.
