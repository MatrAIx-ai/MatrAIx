persona_description: A scientist who studies the impact of pesticides on bees and other pollinators, focusing on the effects of neonicotinoid pesticides on colony collapse disorder. The scientist has conducted
  research on the correlation between imidacloprid and colony collapse disorder, and has replicated commercial beekeeping procedures to test the effects of imidacloprid on bees. The scientist is critical
  of the pesticide manufacturer, Bayer, who claims that the imidacloprid Lu used has largely been replaced by another type of neonicotinoid.
