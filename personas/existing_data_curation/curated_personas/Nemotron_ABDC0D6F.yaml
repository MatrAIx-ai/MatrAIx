personas:
  professional: Kimberly Wilcox, a methodical architect specializing in low‑impact residential design, leverages strong BIM coordination and deep knowledge of South Carolina building codes to translate
    innovative concepts into realistic construction documents, while their curiosity drives sustainable solutions and their organized, reliable nature keeps projects on schedule and within budget.
  sports: Kimberly Wilcox, an avid kayaker who rows the Intracoastal Waterway on Saturday mornings, is a member of the Lowcountry Kayak Club, hikes the Palmetto Trail for cardio, and follows the Charleston
    Battery soccer team and the Clemson Tigers football team, balancing structured exercise with spontaneous weekend paddles.
  arts: Kimberly Wilcox, a dedicated photographer of historic homes, draws artistic inspiration from the works of photographer Walker Evans and the architectural sketches of Samuel Sloan, regularly attends
    Charleston Symphony Orchestra concerts, and volunteers with the local historic preservation society, weaving visual and musical appreciation into their design ethos.
  travel: Kimberly Wilcox, a planner who loves weekend road trips, frequently explores coastal towns like Savannah and St. Augustine, has a fondness for European historic sites such as the medieval streets
    of Bruges, and dreams of visiting the Amalfi Coast to study Mediterranean vernacular architecture, always balancing budget constraints with a desire for authentic cultural immersion.
  culinary: Kimberly Wilcox, a home‑cook who delights in preparing shrimp and grits with stone‑ground grits, she‑crab soup seasoned with fresh thyme, and collard greens simmered with smoked turkey, sources
    okra and oysters from local farmers’ markets, and enjoys hosting dinner gatherings where they experiment with low‑impact, seasonal menus.
  core: Kimberly Wilcox blends meticulous planning, sustainable design, and a love for low‑impact coastal living while occasionally indulging in coffee‑fuelled late‑night drafting sessions and weekend paddles
    on the Intracoastal.
background:
  cultural: Kimberly grew up in a white, Southern family in coastal South Carolina, absorbing the Lowcountry’s reverence for hospitality, community ties, and the natural environment. Her upbringing emphasized
    modesty, church involvement, and a strong work ethic, which shape her collaborative and considerate demeanor. Living in Hardeeville, she feels a deep connection to the region’s fishing heritage, historic
    architecture, and the rhythm of small‑town life, while her recent divorce has strengthened her independence and resilience.
attributes:
  skills: '[''Architectural Design'', ''Building Information Modeling (BIM)'', ''AutoCAD'', ''Revit'', ''SketchUp'', ''Sustainable Design'', ''Code Compliance (International Residential Code, South Carolina
