  hobbies: '[''Coastal kayaking'', ''Gardening (native lowcountry plants)'', ''Historical architecture photography'', ''Reading architectural history'', ''Hiking on local nature trails'', ''Volunteer work
    with historic preservation societies'', ''Southern cooking'', ''Knitting'']'
  career_goals: Kimberly aims to become a senior project architect specializing in resilient, low‑impact residential design for the Lowcountry. She plans to earn LEED Accredited Professional certification
    within the next two years and lead a team that integrates flood‑risk mitigation with modern aesthetics. In the longer term, she hopes to launch a boutique firm focused on sustainable coastal homes and
    to mentor emerging women architects in her community, fostering a culture of collaboration and practical creativity.
