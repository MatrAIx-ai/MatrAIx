  career_goals: Irene dreams of becoming a civil engineer who designs safe, sustainable infrastructure for her community. She hopes to combine her love of building and problem solving with a desire to improve
    local parks and public spaces, and later mentor younger students—especially those from Latino backgrounds—to explore STEM fields.
