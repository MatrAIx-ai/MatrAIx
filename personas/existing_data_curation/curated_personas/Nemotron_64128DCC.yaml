personas:
  professional: Irene Padua, a budding robotics enthusiast, combines her love for adventure and science books with a methodical approach to building LEGO and simple robotics kits, showcasing early problem-solving
    skills, meticulous planning, and a curiosity that balances new ideas with proven techniques.
  sports: Irene Padua plays midfield for the local youth soccer club, the Greenfield Tigers, drills after school, and cheers for the US Women's National Team and FC Barcelona during big matches, balancing
    a competitive spirit with teamwork and her organized practice schedule.
  arts: Irene Padua spends weekends sketching cartoons inspired by Bill Watterson's Calvin and Hobbes, dances to the lively rhythms of cumbia and mariachi while practicing Spanish riddles, and enjoys listening
    to the vibrant songs of Carlos Vives and the theatrical flair of Lin-Manuel Miranda.
  travel: Irene Padua loves planning family road trips that combine adventure and culture, having explored the ancient ruins of Teotihuacan and dreaming of hiking Patagonia's Torres del Paine, while balancing
    her travel enthusiasm with the constraints of school schedules and a modest allowance.
  culinary: Irene Padua enthusiastically helps her family prepare tacos al pastor, homemade guacamole, and chilaquiles, mastering the art of seasoning with cilantro and lime, and despite still being a novice
    cook, she takes pride in perfecting each Mexican dish she attempts.
  core: Irene Padua is a curious, organized ten-year-old who builds LEGO skyscrapers, scores goals on the soccer field, and never misses a chance to rhyme a Spanish riddle, even if that sometimes means
    a messy room and a half-finished homework assignment.
background:
  cultural: Irene is a second‑generation Mexican‑American growing up in Perris, California. She lives in a bilingual household where Spanish is spoken alongside English, and her family maintains many Mexican
    traditions such as celebrating Día de los Muertos, Cinco de Mayo, and enjoying home‑cooked dishes like tamales and pozole. The close‑knit community in Riverside County emphasizes family, respect, and
    mutual support, shaping her values and daily life.
