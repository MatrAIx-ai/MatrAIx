  hobbies: '["Potluck Dinner Hosting", "Book Club", "Gardening", "Knitting", "Quilting", "Senior Dance Classes", "Traveling", "Nature Photography", "Volunteer Work at Local Library", "Community Choir",
    "Bridge"]'
  career_goals: Although retired from formal employment, Claudine is driven to deepen her involvement in community service. She aims to become the lead coordinator for the senior garden club in Dublin,
    expanding its educational programs and partnering with local schools for intergenerational projects. She also wishes to mentor younger volunteers in event planning and basic digital skills, ensuring
    the next generation can sustain these community traditions. Maintaining her health and staying active are personal priorities, so she plans to complete a gentle fitness program and take evening classes
    on digital photography to better capture and share her garden’s progress with family online. Her overarching ambition is to preserve a lively, supportive environment for her family, friends, and neighbors
    while continuing to learn new, practical hobbies.
