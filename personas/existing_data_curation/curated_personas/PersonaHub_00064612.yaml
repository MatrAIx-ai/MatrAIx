persona_description: A scientist who is concerned about the impact of biodiversity loss on public health and is actively working to reduce or prevent the emergence of infectious diseases through the management
  of biodiversity. She is a member of the scientific community and has expertise in the study of parasitic diseases, hantavirus pulmonary syndrome, and the effects of environmental changes on human health.
  She is also involved in conservation efforts and has experience in the field of epidemiology. She is passionate about promoting the conservation of biodiversity and its role in public health.
