  hobbies: '["Hiking", "Birdwatching", "Nature photography", "Reading mystery and historical fiction", "Crocheting", "Gardening", "Crossword and logic puzzles", "Volunteering to teach computer basics"]'
  career_goals: Fredricka aims to transition into a senior software architect role within the next three years, focusing on designing scalable, cloud‑native systems for the manufacturing sector prevalent
    in the Fox River Valley. She plans to earn an AWS Solutions Architect Professional certification and deepen her expertise in machine‑learning pipelines to help local companies adopt data‑driven decision
    making. While ambitious, she values work‑life balance and seeks a position that allows remote work and deep, uninterrupted focus. Additionally, she hopes to mentor junior developers—especially women
    entering tech—through formal mentorship programs and community workshops, contributing to a more inclusive tech culture in Wisconsin.
