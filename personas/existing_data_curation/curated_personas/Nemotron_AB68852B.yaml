personas:
  professional: Rebecca Aegerter, a 16‑year‑old aspiring veterinary assistant, channels their calm, hands‑on farm experience into leading the Burlington High School softball team’s strategy sessions, and
    they dream of turning the family homestead into a community‑focused agritourism hub.
  sports: Rebecca Aegerter captains the Burlington High School softball team, drills with the local youth basketball league, and they never miss a chance to root for the Iowa Hawkeyes during football season,
    mixing their love of structured practice with a relaxed attitude toward detailed game‑day prep.
  arts: Rebecca Aegerter unwinds after practice by dancing to upbeat pop‑rock hits from artists like Taylor Swift and Imagine Dragons at school socials, and they frequently volunteer to set up lighting
    and seating for the Burlington Community Playhouse’s seasonal productions, letting their teamwork spirit spill into the arts.
  travel: Rebecca Aegerter prefers quick, budget‑friendly road trips such as the annual family drive to the Iowa State Fair in Des Moines and a weekend excursion to the Badlands in South Dakota, while secretly
    dreaming of a summer abroad exploring alpine villages in Switzerland to taste authentic raclette, and they plan each outing with a loose itinerary that leaves room for spontaneous barn‑yard detours.
  culinary: Rebecca Aegerter, who rates themselves as a kitchen‑hand rather than a chef, loves whipping up hearty chicken and vegetable casseroles, buttery corn on the cob, and fresh apple crisp using farm‑grown
    produce and a secret dash of cheddar, and they cater to friends’ late‑night cravings after a game.
  core: Rebecca Aegerter is a routine‑loving, competitively spirited teen who balances farm chores, team leadership, and spontaneous casserole parties while staying unusually calm, and they occasionally
    forget to write down homework assignments.
background:
  cultural: Rebecca grew up in a predominantly white, Midwestern community in Burlington, Iowa. Her family’s Swiss‑German roots (the Aegerter name) and Protestant church involvement have instilled values
    of hard work, self‑reliance, and community service. The region’s agricultural heritage shapes her daily life, with a strong emphasis on practicality, tradition, and close‑knit neighborhood ties.
attributes:
  skills: '["Team sports leadership (softball captain)", "Animal husbandry (caring for farm animals)", "Basic automotive maintenance (oil changes, tire checks)", "Practical cooking (simple meals for groups)",
    "Event coordination (school dances, community fairs)", "Public speaking (announcements, group presentations)", "Social media content creation (promoting events)", "First aid (basic emergency response)"]'
  hobbies: '["Softball", "Basketball", "Farm animal care", "Cooking for friends", "Game night organization", "Volunteering at the County Fair", "Listening to pop‑rock music", "DIY home projects (e.g., birdhouse
    building)"]'
  career_goals: Rebecca envisions a career that blends her love for community, practical work, and competition. In the short term she aims to earn a certification as a veterinary assistant or agricultural
    technician, allowing her to work hands‑on with animals while staying grounded in routine tasks. Long‑term, she hopes to manage the family farm or open a small, community‑focused agritourism business
    that hosts county‑fair‑style events, and she also dreams of coaching the high‑school softball team to give back to her hometown.
