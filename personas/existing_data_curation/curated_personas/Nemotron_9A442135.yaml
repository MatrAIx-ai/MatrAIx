  hobbies: '[''Reading historical fiction'', ''Gardening (vegetable and flower)'', ''Pottery'', ''Knitting'', ''Walking in Baltimore’s parks'', ''Volunteering at the Baltimore Historical Society'', ''Local
    book club participation'', ''Writing memoirs'', ''Genealogy research'', ''Cooking (experimenting with new recipes)'']'
  career_goals: Theresa aims to transition into a mentorship and curriculum development role before retirement, focusing on guiding new teachers, leading professional development workshops, and creating
    an interdisciplinary literacy program that integrates local history and the arts. She also hopes to volunteer as a literacy tutor for adult learners and to document her experiences in a memoir that
    highlights the challenges and rewards of public education. Additionally, she is interested in advocating for mental‑health resources in schools, drawing on her own sensitivity to stress and her desire
    to support student well‑being.
