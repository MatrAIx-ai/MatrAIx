personas:
  professional: Theresa Rao, a veteran elementary and middle school teacher with three decades of experience in literacy and arts integration, blends their practical knack for data‑driven assessment with
    an inquisitive drive to embed local history into curriculum, while their natural skepticism and competitive streak push them to mentor new teachers through rigorous professional development workshops.
  sports: Theresa Rao, an avid walker who joins the Baltimore Parks Senior Stroll Club and cheers for the Orioles in spring and the Ravens in fall, keeps fit by tending their vegetable garden and participating
    in a community pickleball league, while their competitive edge surfaces in friendly matches against younger opponents.
  arts: Theresa Rao, a devoted pottery enthusiast who studies the techniques of Bernard Leach and a knit aficionado inspired by the patterns of Aran sweaters, regularly attends performances by the Baltimore
    Symphony Orchestra and the Maryland Historical Society’s lecture series on local theater, letting their curiosity guide them to explore works by Maya Angelou and Ansel Adams.
  travel: Theresa Rao, a methodical planner with a penchant for historic travel, has mapped out pilgrimages to colonial Williamsburg, the battlefields of Gettysburg, and a genealogy‑focused trip to a Mediterranean
    seaside town, balancing careful budgeting with occasional spontaneous tickets to a weekend workshop in Santa Fe’s art community.
  culinary: Theresa Rao, a garden‑to‑table cook who harvests rosemary, basil, and thyme for a signature chicken cacciatore, delights in crafting Southern shrimp étouffée and experimenting with a weekly
    Mediterranean quinoa salad, yet often forgets to lock the pantry, leading to late‑night snacking on homemade biscuits.
  core: Theresa Rao is a detail‑oriented, curiosity‑driven lifelong educator who balances community service with a competitive drive, a cautious wallet, and a habit of over‑thinking both lesson plans and
    life’s small choices, and they constantly seek ways to turn worries into productive classroom strategies.
background:
  cultural: Theresa grew up in a middle‑class family in Baltimore, Maryland, with Irish‑Italian roots. Her upbringing in the Mid‑Atlantic region exposed her to the city’s rich history, diverse neighborhoods,
    and strong public‑school tradition. She was raised with an emphasis on community service, civic engagement, and appreciation for the arts, often attending local theater productions and museum events.
    While she identifies as white American, she values the multicultural tapestry of Baltimore and incorporates local cultural references into her teaching. Her Catholic upbringing contributed to a sense
    of duty and service, and her life experiences have shaped a pragmatic yet curious worldview.
attributes:
  skills: '[''Classroom Management'', ''Curriculum Development'', ''Literacy Instruction'', ''Differentiated Instruction'', ''Educational Technology Integration'', ''Arts Integration'', ''Parent-Teacher
