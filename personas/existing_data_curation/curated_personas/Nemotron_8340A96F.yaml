personas:
  professional: Wendy Hudman, a seasoned audit specialist with over 30 years of bookkeeping, tax, and internal audit expertise, blends meticulous financial scrutiny with a vivid artistic flair, turning
    dense ledgers into color‑coded Tableau dashboards and guiding community workshops that demystify complex fiscal concepts.
  sports: Wendy Hudman, an avid weekend hiker, tackles Appalachian Trail segments with a local trail club, follows the Portland Sea Dogs and New England Patriots with enthusiastic game‑day snacks, integrates
    low‑impact cardio and community yoga into a modest weekly fitness routine, yet occasionally skips gym sessions after marathon painting evenings.
  arts: Wendy Hudman, an abstract watercolor painter inspired by Maine’s coast and forests, captures seasonal changes through photography reminiscent of Ansel Adams, leads speculative‑fiction discussions
    of Neal Stephenson and Octavia Butler in their book club, acts in community theater productions while designing set pieces with a flair akin to set designer Heidi Landesman, and relaxes to the sounds
    of Joni Mitchell and David Bowie.
  travel: Wendy Hudman prefers purposeful yet leisurely travel, planning spontaneous road trips through New England’s autumnal corridors, revisiting Acadia National Park and dreaming of a summer in the
    Scottish Highlands, budgeting each journey with spreadsheet precision, favoring boutique B&Bs over chains, and scheduling sunrise photography walks, while often postponing longer trips due to demanding
    audit work.
  culinary: Wendy Hudman delights in farm‑to‑table cooking, often preparing seared salmon with dill and lemon, beet‑goat‑cheese salads, and wild mushroom risotto using locally sourced blueberries, fresh
    thyme, and artisanal sourdough, while hosting lively potluck dinners where neighbors bring diverse dishes, though they sometimes overindulge in late‑night cheese plates after theater rehearsals.
  core: Wendy Hudman, a 53‑year‑old blend of accountant precision and artistic spontaneity, obsessively color‑codes spreadsheets, hikes in rainboots, and never turns down a potluck, even if it means a midnight
    slice of blueberry pie.
background:
  cultural: Wendy's cultural background is rooted in the traditional New England rural fabric of central Maine. Her family lineage traces back to early English and Scots‑Irish settlers who established farms
    and sawmills in Somerset County. The region's values of self‑reliance, modesty, and close‑knit community involvement have shaped her worldview. Growing up in Skowhegan, she was immersed in seasonal
    cycles—lumbering, fishing, and autumn leaf‑peeping—while also participating in town events such as the annual Apple Harvest Festival and the Skowhegan State Fair. This heritage blends a respect for
    historical customs with an openness to new ideas, reflected in her appreciation for folk art, local craftsmanship, and the town's emerging arts scene.
attributes:
  skills: '["Bookkeeping", "Financial Statement Preparation", "Tax Preparation", "Internal Auditing", "QuickBooks", "Microsoft Excel", "Data Visualization", "Financial Analysis", "Process Improvement",
    "Financial Literacy Instruction", "Team Collaboration", "Public Speaking"]'
  hobbies: '["Abstract Watercolor Painting", "Photography", "Speculative Fiction Reading", "Book Club Participation", "Hiking", "Community Gardening", "Community Theater Acting", "Set Design", "Financial
    Literacy Volunteering", "Potluck Hosting"]'
  career_goals: Wendy aims to leverage her extensive experience to become the senior auditor for the county's municipal finance department, while also establishing a part‑time financial‑coaching program
    for local artists and small‑business owners. She hopes to formalize her knowledge by completing a GED and obtaining the Certified Public Accountant (CPA) designation, which would deepen her credibility
    and open doors for consulting work. Additionally, she envisions mentoring younger staff, leading community workshops on budgeting and tax planning, and eventually writing a guidebook that blends practical
    finance with creative budgeting techniques for creative professionals.
