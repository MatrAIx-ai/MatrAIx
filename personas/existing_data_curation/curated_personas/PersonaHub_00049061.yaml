persona_description: A professional with expertise in arc flash studies, specifically in conducting hazard assessments for workers on live or electrically energized equipment. They are knowledgeable in
  the application of protective clothing requirements for arc flash exposure, as outlined in the National Fire Protection Association Guidelines (NFPA 70E). They are capable of performing arc flash calculations
  to determine the expected arc energy that people may be exposed to and can specify protective clothing that can safely protect workers within the calculated energy limits. Their expertise in this field
  is valuable for facility owners who require arc flash hazard analyses before allowing workers to perform tasks on energized equipment.
