personas:
  professional: Ebony Bennett is a seasoned retail analyst who leverages three decades of front‑line experience, Excel‑driven data reporting, and point‑of‑sale expertise to design a digital‑first ordering
    platform while they mentor emerging staff, especially women of color, with a collaborative, harmony‑seeking approach.
  sports: Ebony Bennett passionately supports the Detroit Tigers and Lions, plays weekly pickleball at the community center, and incorporates early‑morning walks through historic neighborhoods to capture
    street art while maintaining a modest fitness routine.
  arts: Ebony Bennett curates a personal soundtrack of Motown classics like Marvin Gaye and Stevie Wonder alongside jazz legends such as John Coltrane, devotes weekend afternoons to photographing Detroit’s
    murals with a modest DSLR, and participates in a five‑member book club that often discusses Octavia Butler’s science‑fiction works.
  travel: Ebony Bennett enjoys road‑tripping to the Michigan Upper Peninsula for lakeside solitude, revisits New Orleans each spring for jazz festivals and Creole cuisine, and dreams of a cultural immersion
    trip to Kyoto’s historic gardens to inspire their indoor herb cultivation.
  culinary: Ebony Bennett reinvents soul‑food staples by seasoning collard greens with smoked paprika and quinoa, baking sweet‑potato pie with a crunchy pecan topping, and frequently incorporates fresh
    basil, rosemary, and mint from their indoor garden into experimental dishes.
  core: Ebony Bennett is a data‑driven retail mentor who balances quiet curiosity, a love of jazz vinyls, and a habit of late‑night knitting projects with a steady drive toward community‑focused technology
    adoption.
background:
  cultural: Ebony was raised in Detroit’s historic Black Bottom neighborhood, a community shaped by the Great Migration and the vibrant legacy of African‑American culture. Her family’s roots trace back
    to the Southern United States, and stories of civil‑rights activism were a staple of her upbringing. Growing up amidst Detroit’s rich musical heritage—Motown, soul, and jazz—she developed a deep appreciation
    for the city’s artistic expressions. As a Black woman who earned a STEM degree in the 1980s, she navigated both gender and racial barriers, which fostered a strong sense of resilience and a commitment
    to equity. She celebrates Juneteenth and Kwanzaa with family, participates in local church gatherings in a low‑key manner, and is actively involved in community initiatives that promote STEM education
    for youth of color. Her cultural identity informs her collaborative, harmony‑seeking nature and her desire to mentor the next generation.
