  career_goals: Looking ahead, Ebony aims to move into a supervisory or store‑manager role where she can blend her analytical background with her retail expertise to lead digital‑first initiatives, such
    as introducing an online ordering platform and using data analytics to optimize inventory. She plans to earn a retail‑management certification and deepen her knowledge of e‑commerce tools, positioning
    herself as a bridge between technology and frontline sales. A core ambition is to mentor younger employees—especially women of color—by offering informal coaching and eventually establishing a small
    consulting practice that helps independent retailers adopt affordable tech solutions. Long‑term, she hopes to achieve financial security for retirement while giving back to the Detroit community through
    a scholarship fund for local students pursuing STEM fields.
