persona_description: A biological anthropologist who specializes in studying human evolution and the interactions between human culture, biological factors, and the environment throughout the history of
  human evolution. They are particularly interested in the study of primates, including the study of forensics, and are often consulted on legal cases involving human skeletal material. They have a unique
  understanding of human behavior and physical features, as well as the ability to observe and document primate behaviors and physical traits, and can identify how certain primate behaviors or physical
  traits may have evolved by documenting their adaptive value. They are also skilled in the use of forensic techniques to establish the identity of victims of violence and to confirm reports of human rights
  violations.
