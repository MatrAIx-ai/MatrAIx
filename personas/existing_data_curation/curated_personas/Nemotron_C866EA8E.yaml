  career_goals: Although retired, Jessica’s primary ambition is to ensure that the community programs she helped build continue to thrive after she’s gone. She aims to mentor a new generation of volunteers,
    document oral histories of longtime Morton Grove residents, and compile her own memoir to preserve family stories and local heritage. Jessica also hopes to secure sustainable funding for the senior‑center
    activities she oversees and to advocate for policies that improve accessibility for seniors in Cook County. By leaving a living legacy of compassion, organization, and tradition, she seeks to nurture
    the social fabric of her neighborhood for years to come.
