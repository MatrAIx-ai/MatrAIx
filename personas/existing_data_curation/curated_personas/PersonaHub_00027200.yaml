persona_description: A neuroscientist who specializes in the study of the neural basis of language and its disorders, particularly autism. This person has expertise in neuropsychological assessments and
  family-genetics studies, and is interested in the inter-generational transmission of language impairments genetically relevant to autism. They aim to provide important phenotypic information for efforts
  to dissect the genetic underpinnings of autism and inform preventive intervention efforts by highlighting targets for intervention across the autistic spectrum.
