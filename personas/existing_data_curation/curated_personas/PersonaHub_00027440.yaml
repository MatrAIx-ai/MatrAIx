persona_description: A digital humanities scholar who is interested in the impact of computation on both aesthetic expression and aesthetic criticism. They are familiar with the use of digital technologies
  in analyzing works of art and literature, and are interested in how computational technologies can change what we call reading, particularly in the context of surveillance. They are also interested in
  the work of the Writing Machine Collective, a Hong Kong-based media art collective that focuses on new media issues and collaborates with guest artists from overseas.
