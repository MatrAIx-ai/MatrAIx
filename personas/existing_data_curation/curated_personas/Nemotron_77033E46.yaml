  career_goals: Frances aims to advance to a senior management analyst role where she can lead cross‑functional initiatives that blend quantitative rigor with innovative thinking. She plans to pursue an
    MBA focused on strategy and entrepreneurship within the next two years, positioning herself for a future as a director of strategic planning or an innovation lead. Long‑term, she envisions shaping corporate
    social‑responsibility programs that leverage data to drive community impact in Milwaukee, while mentoring junior analysts to foster a collaborative and harmonious workplace culture.
