personas:
  professional: Frances Anelli, a senior management analyst at a regional manufacturing firm, blends rigorous financial modeling with design-thinking and visual storytelling; they turn complex data into
    clear, imaginative presentations that steer cross‑functional strategy.
  sports: Frances Anelli, an avid hiker of Milwaukee County parks, follows the Milwaukee Bucks and Brewers loyally and participates in a local adult softball league each summer; they use these activities
    as both social connection and stress relief.
  arts: Frances Anelli, an abstract painter and experimental photographer, draws inspiration from Mark Rothko’s color fields, Ansel Adams’s landscapes, and Yayoi Kusama’s immersive installations while devouring
    speculative fiction by N.K. Jemisin; they channel this artistic energy into both personal projects and workplace creativity.
  travel: Frances Anelli, who favors thoughtfully planned weekend escapes, revisits the scenic shoreline of Door County, dreams of strolling through Kyoto’s historic temples, and balances her love of cultural
    immersion with a practical budget that prioritizes train travel over costly flights; they curate travel experiences that blend structure with spontaneous discovery.
  culinary: Frances Anelli, a competent home cook, loves crafting fresh pasta with a Sunday‑sauce ritual, seasons dishes with basil, garlic, and a hint of truffle oil, and savors artisanal cheeses paired
    with robust, locally roasted coffee; they view cooking as a soothing bridge between analytical work and sensory pleasure.
  core: Frances Anelli, a 36‑year‑old analytical dreamer, blends data rigor with artistic flair, balances disciplined savings with creative splurges, and nurtures community through quiet hobbies and mindful
    self‑care, even if occasional migraines and late‑night work disrupt their calm.
background:
  cultural: Frances grew up in a middle‑class, Italian‑American family in the suburbs of Milwaukee, where community values and modesty are central. Her upbringing blended Midwestern pragmatism with the
    warmth of Italian family traditions, from weekend meals featuring homemade pasta to annual celebrations of cultural festivals. She earned her B.A. in Business from the University of Wisconsin–Milwaukee,
    staying connected to the city’s vibrant arts scene through frequent visits to local galleries and the Milwaukee Art Museum. While identifying as white American, she embraces a culturally inclusive outlook,
    drawing inspiration from the diverse neighborhoods of Milwaukee and fostering harmony in both her professional and personal circles.
