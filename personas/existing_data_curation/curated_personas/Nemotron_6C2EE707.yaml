  career_goals: Robert aims to advance into EMS leadership, targeting a role as a regional operations manager or director of emergency services for Durham County. He plans to pursue a Master’s in Health
    Administration to deepen his strategic and policy expertise. His ambitions include modernizing the ambulance fleet with data‑driven dispatch algorithms, establishing a paramedic‑led community outreach
    program that blends emergency preparedness with creative arts workshops, and mentoring the next generation of medics. He also envisions collaborating with local universities to research innovative pre‑hospital
    care techniques and advocating for policies that improve response times and patient outcomes across the Research Triangle area.
