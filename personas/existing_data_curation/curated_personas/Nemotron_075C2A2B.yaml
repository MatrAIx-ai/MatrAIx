personas:
  professional: Cristina Rodriguez, a 37‑year‑old nursing assistant with a STEM bachelor’s degree, leverages their methodical, organized nature and bilingual fluency to excel in patient monitoring, precise
    documentation, and equipment troubleshooting, while channeling their curiosity into quality‑improvement projects that lay the groundwork for a future in critical‑care nursing and health‑informatics.
  sports: Cristina Rodriguez jogs along Pompano Beach every sunrise, participates in the local Pompano Beach Runners Club, follows the Miami Dolphins and Miami Heat passionately, and they unwind by attending
    weekend salsa dance workshops that double as cardio.
  arts: Cristina Rodriguez captures sunrise silhouettes over the Atlantic with their DSLR, curates playlists that blend Celia Cruz, Carlos Santana, and contemporary Latin pop, enjoys occasional trips to
    the Pérez Art Museum to see works by Frida Kahlo and Diego Rivera, and they channel this visual and musical inspiration into their salsa dancing on weekends.
  travel: Cristina Rodriguez prefers meticulously planned short getaways that blend relaxation with cultural immersion, having explored the historic streets of New Orleans, the vibrant markets of Oaxaca,
    and the Everglades' mangrove trails, while they dream of a future road trip along the Pacific Coast Highway to capture sunrise vistas.
  culinary: Cristina Rodriguez is a proficient home chef who masterfully prepares tamales, carnitas, and chipotle‑marinated grilled fish, often experimenting with mole sauce infused with chocolate, chilhuacle,
    and epazote, and they love hosting friends for communal mezcal‑tasting evenings paired with fresh guacamole and homemade salsa fresca.
  core: Cristina Rodriguez balances methodical precision at work with spontaneous salsa steps on weekends, and they turn daily routines into a rhythm of disciplined plans and lively improvisations.
background:
  cultural: Cristina was born in Guadalajara, Jalisco, and moved to South Florida with her family at age twelve. Growing up in a bilingual household, she celebrated Mexican traditions such as Día de los
    Muertos, Las Posadas, and family‑centered gatherings while also embracing Floridian customs. Her Mexican heritage instills strong family ties, communal values, and a love for shared meals, which she
    brings to her professional role by fostering culturally sensitive patient interactions. She remains actively involved in the local Mexican community, participating in cultural festivals, Spanish‑language
    workshops, and mentorship programs for Latino youth.
attributes:
  skills: '["Patient vital signs monitoring", "Medical charting and electronic health record (EHR) management", "Basic life support (BLS) certified", "Wound care and dressing changes", "Phlebotomy assistance",
