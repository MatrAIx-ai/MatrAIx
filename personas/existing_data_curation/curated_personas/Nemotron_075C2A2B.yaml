    and data analysis basics"]'
  hobbies: '["Cooking Mexican cuisine", "Beach walking and jogging", "Yoga and meditation", "Reading science and medical literature", "Volunteering at community health fairs", "Salsa dancing", "Gardening
    (herbs and succulents)", "Photography of local nature", "Puzzle solving (crosswords, Sudoku)"]'
  career_goals: She aims to leverage her practical experience and technical background to become a registered nurse, focusing on critical‑care or health‑informatics pathways. Over the next five years, Cristina
    plans to complete an RN program, obtain certifications such as Certified Medication Aide and Certified Health Data Analyst, and transition into a supervisory role overseeing patient‑care coordination.
    In parallel, she aspires to design community‑health outreach programs that bridge care gaps for the Mexican‑American population in Broward County.
