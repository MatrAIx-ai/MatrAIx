persona_description: A scientist who specializes in the study of DNA replication, specifically in the area of Okazaki fragments and nucleosomes. They are interested in understanding the mechanisms of nucleosome
  assembly and positioning in vivo, the link between Okazaki fragments and nucleosome assembly, and the potential applications of Okazaki fragments analysis in the investigation of protein factors involved
  in DNA replication and chromatin assembly. They are also interested in studying Okazaki fragments from metazoans to test general principles and detecting and investigating novel processes that take advantage
  of the asymmetry at the replication fork.
