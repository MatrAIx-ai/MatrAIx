persona_description: A political scientist who specializes in Central American history and the political evolution of Guatemala. He is particularly interested in the role of the military and the economy
  in shaping political power and the development of the state. His research interests include the history of the Guatemalan revolution, the role of foreign powers in the region, and the impact of colonialism
  on the development of Central American states. He has written extensively on the political history of Guatemala, including the rise of Don Rafael Carrera and the struggles for power between Carrera and
  the military.
