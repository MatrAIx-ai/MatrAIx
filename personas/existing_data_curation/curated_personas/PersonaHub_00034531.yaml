persona_description: A historian and archeologist who is particularly interested in the history and development of Chicago's public parks, particularly Humboldt Park. They are particularly fascinated by
  the history of the park's naming and the contributions of its landscape architects, Jens Jensen and Schmidt, Garden, and Martin. They are also interested in the design and architecture of the park's historic
  buildings, including the boat house and refectory building designed by Schmidt, Garden, and Martin. They may be interested in the park's role in the history of Chicago and the United States as a whole.
