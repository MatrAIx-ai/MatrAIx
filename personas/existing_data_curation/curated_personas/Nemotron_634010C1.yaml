  career_goals: Susan aspires to work with animals and the natural world, expressing a desire to become a veterinarian or wildlife biologist. She also enjoys explaining concepts to peers, hinting at a future
    as a science teacher. To achieve these goals she plans to win her school's science fair, join the after‑school robotics club to deepen her coding skills, volunteer at the local animal shelter, and maintain
