personas:
  professional: Susan Florendo, a budding junior scientist who blends curiosity with practicality, thrives on constructing elaborate LEGO inventions and tinkering with beginner electronics, channeling their
    organized yet flexible mindset into hands‑on science‑club projects and collaborative problem‑solving.
  sports: Susan Florendo, a devoted midfielder on the Eastside Tigers U‑11 soccer team, balances energetic weekend practices with after‑school sketch‑inspired warm‑ups, regularly watches matches of the
    national women’s soccer team for inspiration, and maintains a habit of quick stretch routines before each game to manage stress.
  arts: Susan Florendo, an enthusiastic piano student who practices Mozart’s Sonata in C Major twice weekly, loves sketching squirrels and birds during park strolls, and devours fantasy novels by J.K. Rowling
    and Rick Riordan, often humming Disney’s 'Frozen' themes while drawing.
  travel: Susan Florendo, who treats family trips like mini‑projects—drawing itineraries in their journal—relishes the adventure of exploring Yellowstone’s geysers and Barcelona’s colorful streets, yet
    dreams of a future visit to Tokyo’s Akihabara to see the latest gadget exhibits, balancing excitement with the practical need for parental supervision.
  culinary: Susan Florendo, a budding home chef at the enthusiastic beginner level, loves whipping up strawberry‑banana smoothies with fresh berries and Greek yogurt, crafts intricate LEGO‑shaped pancakes
    for breakfast, and can perfectly melt cheese on a classic pepperoni pizza, though they often forget to rinse vegetables before sautéing.
  core: Susan Florendo, a curious and organized 10‑year‑old who balances a love for building LEGO circuits with a tendency to over‑worry, often turns to journaling and sketching as both a sanctuary and
    a planning tool.
background:
  cultural: Susan grows up in Bensalem, a suburban community in Bucks County, Pennsylvania, within a middle‑class family that emphasizes education, community involvement, and a blend of cultural traditions.
    While her primary ethnic identification is white, her family incorporates occasional Korean dishes and celebrations due to her mother's heritage, enriching her exposure to multicultural foods and customs.
    She attends a public elementary school that participates in local field trips to Philadelphia museums and historic sites, and she enjoys community events such as the annual Fourth of July parade, library
    reading programs, and the Bucks County farmers' market.
