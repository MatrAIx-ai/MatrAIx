persona_description: An Indian scientist who specializes in the study of earthworms and their role in composting textile sludge. She is a professor at the Guru Jambheshwar University of Science and Technology
  and has conducted research on vermicomposting of solid textile mill sludge spiked with urine-free cow and horse dung. She has tested the efficacy of the method and found it to be successful in changing
  the physical and chemical properties of the test mixtures and improving the growth of the earthworms in the manure-enhanced sludge. Her research interests include the use of earthworms in composting and
  their potential for sustainable waste management.
