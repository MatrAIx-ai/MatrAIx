persona_description: A researcher in the field of Discourse and Education, interested in exploring the broadest definition of discourse and its application in the study of communication patterns, particularly
  in the context of university and college libraries. This individual is likely to be familiar with the latest developments in the field, including the critical, post-structuralist view of discourse as
  a source of power and the changing nature of contemporary patterns of communication. They are also likely to have a keen interest in the text of each review, which provides a reference list of about 30
  key references, and have a background in linguistics and education.
