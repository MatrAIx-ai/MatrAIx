personas:
  professional: Brian Landin is a self‑taught multidisciplinary creator who blends acrylic painting, speculative‑fiction writing, acoustic songwriting, and DIY woodworking into a freelance portfolio, and
    they leverage their vivid imagination and relaxed approach to deadlines to attract book‑cover commissions and custom songs while dreaming of a community art space.
  sports: Brian Landin enjoys weekend fishing and kayaking on the bayou, hikes the nearby Atchafalaya Trail with a local outdoors club, and they are a loyal fan of the New Orleans Saints, the New Orleans
    Pelicans, and the LSU Tigers football team, often attending games when the schedule permits.
  arts: Brian Landin immerses themselves in surreal watercolor landscapes of swamplands, collects vintage vinyl from Joni Mitchell, Neil Young, and The Doors, draws inspiration from Salvador Dali and contemporary
    folk painter Kehinde Wiley, and they regularly volunteer at the Gonzales Jambalaya Festival art displays, where they collaborate with local musicians and artisans.
  travel: Brian Landin prefers loosely planned road trips that blend creative inspiration with outdoor adventure, having explored New Orleans, Austin, and Asheville on weekend getaways, dreaming of a future
    pilgrimage to Iceland’s aurora‑lit landscapes and the misty rainforests of New Zealand while balancing a modest freelance income and family commitments, and they often let spontaneity dictate the itinerary.
  culinary: Brian Landin cooks with a blend of traditional bayou flavors—gumbo, jambalaya, crawfish étouffée—enhanced by foraged wild garlic and ramps, enjoys experimenting with file powder and smoked tasso,
    and they rate themselves as an enthusiastic home cook who dishes out generous portions at community potlucks.
  core: Brian Landin is a 36‑year‑old imaginative creator who trades structure for spontaneity, turning backyard art projects and spontaneous jam sessions into a freelance livelihood while juggling vintage
    vinyl splurges, allergy meds, and a love for bayou‑inspired cuisine, and they never seem to finish a budget spreadsheet without a coffee break.
background:
  cultural: Brian grew up in Gonzales, a small town in Ascension Parish, Louisiana, a region where French‑Acadian (Cajun) influences mingle with broader Southern traditions. Though his family identifies
    as white and has deep roots in the rural South, the local culture—characterized by hospitality, communal gatherings, and celebrations like the annual Jambalaya Festival—has shaped his worldview. He
    was raised in a modest household that valued self‑reliance, informal learning, and community involvement. The Catholic and Protestant heritage of the area introduced him to seasonal rituals and music,
    while the rich culinary scene sparked his interest in cooking with local spices. These cultural threads inform his artistic sensibilities, his love of communal art projects, and his appreciation for
    the blend of tradition and novelty that defines his hometown.
attributes:
  skills: '["Creative Writing", "Visual Sketching", "Digital Illustration (self‑taught)", "Basic Photo Editing", "Acoustic Guitar Playing", "DIY Home Repair", "Community Event Coordination", "Self‑directed
