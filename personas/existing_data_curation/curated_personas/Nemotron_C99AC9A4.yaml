  hobbies: '["Painting (acrylic and watercolor)", "Reading speculative fiction and fantasy books", "Acoustic guitar playing and improvisation", "Hiking and nature photography", "Exploring local Cajun cooking",
    "Volunteering at community festivals", "Collecting vintage vinyl records", "DIY woodworking"]'
  career_goals: Brian aims to transform his artistic passions into a sustainable, flexible livelihood. He plans to build an online portfolio that showcases his writing, illustrations, and music, eventually
    securing freelance commissions for book covers, illustrations, and custom songwriting. A long‑term ambition is to self‑publish a speculative‑fiction novella or graphic novella that blends his love of
    abstract concepts with storytelling. He also envisions opening a modest community art space or a pop‑up studio in Gonzales where locals can collaborate, attend workshops, and display work. Throughout,
    he seeks autonomy, allowing him to explore new creative avenues without being tied to a conventional schedule.
