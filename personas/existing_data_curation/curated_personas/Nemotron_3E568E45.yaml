  career_goals: Building on her competitive drive and desire for stability, Jessica aims to earn an NCCER certification and transition into a foreperson role within the next two years. She wants to lead
    a small crew, improve site safety records, and introduce green building practices on residential projects in Hawaii. Long‑term, she hopes to start her own contracting business focused on eco‑friendly
    home renovations, blending her practical skills with her curiosity about new technologies while maintaining a flexible schedule for her family.
