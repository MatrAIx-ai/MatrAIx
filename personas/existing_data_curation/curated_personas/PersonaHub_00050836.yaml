persona_description: A Federal agency official who is responsible for overseeing and guiding research programs related to the understanding and management of potential risks associated with engineered nanoscale
  materials. This persona is likely to have a deep understanding of nanotechnology and its potential benefits and risks, as well as a keen interest in ensuring the safety and health of the public. This
  individual is likely to be involved in the National Nanotechnology Initiative (NNI) and is responsible for ensuring that Federal agencies and industry partners have the necessary knowledge and understanding
  to manage potential risks associated with nanomaterials. This persona is likely to be highly collaborative and open-minded, as they work closely with a diverse group of stakeholders to identify and agree
  upon major EHS research needs.
