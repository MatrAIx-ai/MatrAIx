  career_goals: Andrew aims to progress from a front‑line surveillance officer to a supervisory or managerial role within casino security, eventually earning certifications such as Certified Protection
    Officer (CPO) and Advanced Surveillance Analyst. He envisions leading a security team, shaping policy, and implementing cutting‑edge technologies like AI‑driven analytics to improve incident response.
    Long‑term, he is interested in transitioning into private investigations or security consultancy, where he can leverage his curiosity and problem‑solving mindset to advise businesses on risk mitigation
    and operational safety.
