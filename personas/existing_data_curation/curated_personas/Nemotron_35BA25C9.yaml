  career_goals: Freddy aspires to transition into a senior leadership role within the EMS system, leveraging his business degree to modernize operations. He aims to become an EMS Operations Manager or a
    Community Paramedicine Program Director, develop data‑driven response protocols, and integrate telemedicine into field care. He also wants to establish a mentorship program for new paramedics and eventually
    launch a consulting firm focused on emergency preparedness for schools and small businesses. Additionally, he hopes to earn certification as a Certified Emergency Manager and teach part‑time at a local
    community college.
