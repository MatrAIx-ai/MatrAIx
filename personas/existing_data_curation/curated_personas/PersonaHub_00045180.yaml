persona_description: A Peruvian architect who specializes in the design of cultural and heritage sites, particularly those related to the Paracas culture. He has experience in designing museums, cultural
  centers, and other heritage buildings. His work has been influenced by the Paracas culture, which developed from 700 BC to 200 AD, and the Paracas were the ancestors of the people who made the renowned
  Nazca lines. He has also worked on the reconstruction of a site museum that was destroyed by a deadly earthquake in 2007, and the design of a new site museum that was opened to the public in 2016. He
  is known for his innovative approach to design, which considers the delicate balance between archaeological conservation, adequate conditions for the exhibition of archeological pieces, and the relationship
  to a local community living outside the National Park, with little concern to the site's heritage.
