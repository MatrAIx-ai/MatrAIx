  hobbies: '[''Salsa and bachata dancing'', ''Cooking Mexican dishes'', ''Volunteering at community centers'', ''Group fitness classes (Zumba)'', ''Gardening'', ''Reading personal development books'', ''Attending
    local cultural festivals'']'
  career_goals: Minerva aims to obtain her GED and then enroll in a community college program, focusing on Business Administration or Early Childhood Education to build a stable career path. She aspires
    to work in nonprofit community development, leveraging her event planning and outreach skills to support Latinx families in Houston. In the longer term, she dreams of launching a small catering business
    that offers authentic Mexican and Tex-Mex fusion dishes, providing both a source of income and a cultural touchpoint for her community. Throughout, she seeks roles that combine structure, practicality,
    and social impact, aligning with her values of compassion and self-reliance.
