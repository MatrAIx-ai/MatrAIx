personas:
  professional: Minerva Medina, a 29‑year‑old bilingual community event coordinator in Houston, blends meticulous budgeting, structured scheduling, and an outgoing flair for group activities to produce
    culturally resonant festivals and fitness classes while they pursue a GED and plan future studies in business administration.
  sports: Minerva Medina, an energetic participant in salsa and Zumba at the local Salsa Fusion studio, follows a structured weekly workout plan, cheers for the Houston Astros during baseball season, and
    joins the community’s recreational soccer league in spring, blending cultural dance with mainstream sports fandom while they stay active.
  arts: Minerva Medina, an avid fan of Tejano and Latin pop icons like Selena and Carlos Vives, regularly attends live performances at the Diverse Arts Center, explores street murals in Houston’s East End,
    and immerses themselves in the Museum of Fine Arts’ exhibitions, while they let music and visual art fuel their community storytelling.
  travel: Minerva Medina favors well‑planned weekend getaways to Texas towns such as Austin and San Antonio, dreams of exploring Oaxaca’s markets and New Orleans’s jazz scene, and balances budget‑friendly
    travel with occasional splurges on cultural festivals, always packing a reusable water bottle and a salsa playlist as they journey.
  culinary: Minerva Medina, a devoted home cook, masters tacos al pastor, chilaquiles with chipotle‑spiced salsa, and a Tex‑Mex fusion mole, delights friends with fresh cilantro, hominy, and masa‑made tortillas,
    but they occasionally over‑season dishes in their enthusiastic quest for bold flavor.
  core: Minerva Medina, a structured yet sociable community organizer, channels their love of dance, cooking, and cultural celebration into purposeful actions, though they sometimes splurge impulsively
    on new dance shoes.
background:
  cultural: Minerva is a first-generation Mexican-American raised in a bilingual household in Houston's vibrant Hispanic community. Her upbringing blended traditional Mexican customs—such as celebrating
    Día de los Muertos, quinceañeras, and family-oriented gatherings—with the multicultural influences of Texas. She was raised Catholic, observing religious festivals and community rituals. Her strong
    ties to Mexican heritage are reflected in her language fluency, culinary practices, and participation in local cultural events, while her daily life incorporates the diverse, entrepreneurial spirit
    of Houston.
