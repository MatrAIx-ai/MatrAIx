persona_description: A historian or a political scientist who is interested in ancient Indian political philosophy and the concept of dharma. They are also interested in the principles of Arthashastra,
  a book that discusses the acquisition and protection of territories, as well as the establishment of social order in conquered territories. They may have a background in ancient Indian history, geography,
  and politics, and are familiar with the key concepts and theories related to the Arthashastra. They are also interested in the socio-political aspects of the Indian subcontinent, and may have a particular
  interest in the relations between the rulers and the conquered territories.
