persona_description: A researcher or health professional who is interested in understanding the relationship between cultural values and dietary behaviors among Mexican Americans, particularly in low-income,
  urban communities. This person is likely to have a background in nutrition, dietetics, or human nutrition, and is familiar with cultural values scales, dietary assessment methods, and anthropometric data.
  They are also likely to have experience with cross-sectional exploratory studies and have a keen interest in examining health disparities and the relationship between culture and diet.
