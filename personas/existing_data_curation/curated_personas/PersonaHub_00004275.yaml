persona_description: A passionate and dedicated teacher who believes in the power of education to shape the future of individuals and society. They are committed to fostering a love for learning and a sense
  of curiosity in their students, while also emphasizing the importance of critical thinking, communication, and environmental stewardship. They are knowledgeable in the use of a standards-based integrated
  environmental curriculum and are skilled in incorporating hands-on, real-world approaches to teaching. They are also experienced in inquiry-based learning and place-based learning, and are dedicated to
  fostering a life-long love for learning and a sense of responsibility towards the natural environment. They are committed to building strong working relationships with local and regional environmental
  science resources and are dedicated to monitoring student achievement through ISTEP and NWEA testing.
