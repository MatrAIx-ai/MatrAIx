personas:
  professional: Randy Bohannon, an aspiring property-maintenance specialist with hands‑on carpentry, basic plumbing, and budgeting expertise, leverages his calm, cooperative nature to coordinate community
    projects while pursuing EPA and NATE certifications.
  sports: Randy Bohannon follows the Tampa Bay Buccaneers and Orlando Magic, plays weekly adult‑league softball with the Lake Kissimmee Mariners, and hits the local gym for functional training twice a week,
    balancing his love for football Saturdays at the high school with a habit of checking pick‑six odds before each game.
  arts: Randy Bohannon enjoys the folk storytelling of John Prine, unwinds with the blues of B.B. King, and attends the annual Lake Wales Arts & Crafts Fair where he admires the work of local potter Maria
    Alvarez, while occasionally strumming an old acoustic guitar during quiet evenings.
  travel: Randy Bohannon prefers weekend road trips that blend fishing at Lake Okeechobee with camping under the stars, has explored Asheville’s craft breweries and the historic streets of Savannah, and
    hopes to trek the cloud forests of Costa Rica once his family’s home‑ownership budget allows.
  culinary: Randy Bohannon’s culinary repertoire centers on grilled catfish seasoned with lemon‑pepper, fresh garden tomato‑basil salad, and a hearty bean‑and‑corn chili seasoned with cumin and jalapeño,
    which he prepares on his backyard smoker while occasionally over‑salting his stew in his quest for bold flavor.
  core: Randy Bohannon blends practical know‑how with community‑first generosity, habitually checking the weather before every outdoor project and never passing up a chance to fix a neighbor’s leaky faucet.
background:
  cultural: Randy’s cultural background is rooted in a working‑class, white community of central Florida. He grew up in the Lake Wales region, where the legacy of citrus agriculture, a strong sense of neighborly
    cooperation, and a laid‑back outdoor lifestyle shaped his values. Family gatherings, church involvement, and community events have reinforced his emphasis on harmony, cooperation, and self‑reliance.
    These regional influences, combined with the broader Southern‑Florida cultural mix, inform his practical outlook, community‑oriented mindset, and appreciation for both tradition and modest innovation.
attributes:
  skills: '[''Basic Carpentry'', ''Home Repair (Plumbing & Electrical)'', ''Lawn & Garden Maintenance'', ''Automotive Maintenance'', ''Budgeting & Financial Planning'', ''Project Coordination'', ''Computer
