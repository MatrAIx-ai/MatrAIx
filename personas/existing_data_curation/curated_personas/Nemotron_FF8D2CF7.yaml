  hobbies: '[''Fishing'', ''Gardening (Vegetable & Native Plants)'', ''Woodworking'', ''Community Volunteering (Food Bank & Clean‑ups)'', ''DIY Home Improvement Projects'', ''Reading (DIY, Sustainable Living,
    Tech)'', ''Attending Local Sports Events'', ''Nature Walks'']'
  career_goals: Randy’s primary career goal is to secure stable, full‑time employment in the skilled‑trade sector—ideally as a property‑maintenance specialist, landscaper, or HVAC technician—while working
    toward industry certifications (e.g., EPA, NATE). He also hopes to leverage his practical experience to launch a small, locally‑focused property‑care business that offers lawn, garden, and basic home‑repair
    services to neighbors. In the longer term, Randy wants to mentor younger volunteers, contribute to community improvement projects, and achieve financial stability that supports his family’s home‑ownership
    aspirations.
