personas:
  professional: Kevin Dettloff is a veteran mechanical fabricator in a defense‑contract manufacturing plant near Fort Polk, whose three decades of hands‑on experience with CNC routers, MIG/TIG welding,
    and lean production have earned them a reputation as a problem‑solver who blends technical precision with an artist’s curiosity for reclaimed materials, while their outgoing, cooperative nature fosters
    a harmonious team environment as they pursue a lead fabricator or production supervisor role, AWS welding certification, and a Six Sigma Green Belt.
  sports: Kevin Dettloff throws the occasional fastball in a community softball league, rallies with friends for weekend deer hunts in Vernon Parish, casts lines for bass on the Sabine River, and roots
    for the New Orleans Saints and LSU Tigers during football season, while their sociable energy fuels team camaraderie and they fit in early‑morning jogs and weight‑lifting sessions at the local gym to
    stay fit for both the field and the woods.
  arts: Kevin Dettloff immerses themselves in the vibrant Louisiana art scene, regularly visiting galleries during the Lafayette ArtWalk and Shreveport Film & Arts Festival, drawing inspiration from regional
    artists like George Rodrigue and the folk‑metal works of local sculptor Jason Hensley, while their curiosity drives them to experiment with reclaimed metal and wood, and they share their love of music
    by strumming a Gibson guitar in the neighborhood band The Bayou Strummers, building a social bridge between craftsmanship and community.
  travel: Kevin Dettloff favors spontaneous road trips that blend hunting, fishing, and cultural stops, such as a weekend drive to the Texas Hill Country for a BBQ cook‑off, a spring fly‑fishing excursion
    in the Colorado River, an annual pilgrimage to New Orleans for Mardi Gras and jazz, and a long‑term dream of trekking Patagonia's remote rivers, planning on the fly with a trusted map and a willingness
    to adjust itineraries around work schedules, reflecting their relaxed, flexible outlook on life.
  culinary: Kevin Dettloff’s palate is anchored in smoky BBQ—smoked brisket, dry‑rubbed ribs, and cedar‑plank salmon—spiced with a blend of paprika, cayenne, and a hint of brown sugar, complemented by occasional
    pots of Cajun gumbo with andouille sausage, jambalaya loaded with shrimp, and a fondness for homemade cornbread, while they enjoy experimenting with reclaimed wood planks for grilling and often host
    backyard cookouts featuring their signature hickory‑infused sauces that bring friends and coworkers together.
  core: Kevin Dettloff is a curious, sociable veteran fabricator who balances hands‑on metal work with a love for art, BBQ, and community, all while navigating a relaxed approach to planning and a steady
    drive toward mentorship and creative entrepreneurship.
background:
  cultural: Kevin grew up in a working‑class family in central Louisiana, where the values of hard work, community support, and southern hospitality were ingrained early on. The region’s mix of Cajun and
    Creole influences exposed him to a rich culinary tradition of gumbo, jambalaya, and crawfish boils, as well as lively music and festivals. Proximity to Fort Polk introduced a strong military presence,
    shaping his perspective on discipline and teamwork. Attending a local community college, he earned an associate’s degree in industrial technology, which launched his career in assembly and fabrication.
    As a lifelong resident of Leesville, his daily life reflects the close‑knit nature of small‑town life, with deep ties to local churches, sports leagues, and volunteer groups.
