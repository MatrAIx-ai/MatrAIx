  hobbies: '[''Attending art festivals'', ''Metal sculpture making'', ''Woodworking'', ''Softball league'', ''Hunting and fishing'', ''Guitar playing'', ''BBQ cooking'', ''Volunteering with Habitat for
    Humanity'']'
  career_goals: Kevin aims to advance to a lead fabricator or production supervisor role within the next few years, leveraging his experience to guide teams and drive efficiency. He plans to obtain AWS
    welding certification and pursue a Green Belt in Six Sigma to deepen his expertise in quality improvement. At the same time, his love for art fuels a long‑term ambition to open a small workshop where
    he can design and sell custom metal art and functional furniture, combining his technical skills with creative expression. He also hopes to mentor younger workers through an apprenticeship program at
    the local community college, giving back to the Leesville community while maintaining the flexible schedule he values.
