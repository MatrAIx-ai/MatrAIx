persona_description: A teacher who specializes in teaching early reading skills, particularly in phonics and text analysis. She has a passion for promoting a love of reading and writing among children and
  is committed to ensuring that all children have the opportunity to develop their understanding of reading from early phonics skills to higher order reasoning. She uses a variety of strategies to promote
  enjoyment and a love of reading, including using attractive reading areas, shared reviews, and provision of book lists. She is also an expert in using the Talk for Writing approach to teaching English,
  and is skilled in using a range of active, appropriately challenging learning opportunities to promote children's understanding of reading.
