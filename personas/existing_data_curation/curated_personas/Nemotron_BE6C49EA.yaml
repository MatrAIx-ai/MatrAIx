personas:
  professional: Kenny Williams is an aspiring young game designer who uses Scratch to create simple interactive stories, applying a practical debugging mindset while joyfully sharing coding tips with friends
    during soccer break-times.
  sports: Kenny Williams plays midfield for the Oakwood Youth Soccer Club, cheers on the Chicago Fire FC, and enjoys swimming at Lake Michigan in summer, combining team drills with solo practice jogs to
    stay fit.
  arts: Kenny Williams sketches comic-style heroes inspired by classic R&B icons like Stevie Wonder and Aretha Franklin, builds elaborate LEGO cityscapes while listening to gospel music, and devours Magic
    Tree House adventures for story ideas.
  travel: Kenny Williams loves weekend family trips to the Lake Michigan shoreline, collecting shells at Indiana Dunes, and dreams of visiting the Great Lakes Maritime Museum in Muskegon, preferring short
    road trips with a packed snack box and a balance of exploration and familiar comfort.
  culinary: Kenny Williams helps grandparents bake banana bread, prepares kid-friendly mac & cheese, and learns to season fish tacos with lemon zest and dill, often humming classic R&B tunes while stirring
    the pot.
  core: Kenny Williams is an organized, curious 8-year-old who balances LEGO building, soccer, coding, and family cooking with practical money habits and a steady approach to health, despite occasional
    forgetfulness about chores.
background:
  cultural: Kenny is part of an African American family rooted in the Midwest, with cultural traditions that blend church community gatherings, soulful music, and storytelling. His parents and grandparents
    emphasize the importance of education, respect, and perseverance, often sharing stories of Black history and local community leaders. Growing up in Muskegon's diverse neighborhoods, he experiences a
    mix of city life and the natural environment of the Great Lakes, which shapes his appreciation for both cultural heritage and the outdoors.
