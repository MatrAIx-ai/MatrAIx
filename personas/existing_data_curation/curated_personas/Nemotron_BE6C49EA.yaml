  career_goals: Kenny dreams of one day becoming someone who can solve real‑world problems, such as an engineer who designs sustainable toys or a marine biologist who studies the Great Lakes. He is fascinated
    by space and occasionally imagines being an astronaut, but he also likes the idea of helping his community as a future firefighter or teacher. He plans to keep learning, work hard in school, and use
    his curiosity to create inventions that make life easier for his friends and family.
