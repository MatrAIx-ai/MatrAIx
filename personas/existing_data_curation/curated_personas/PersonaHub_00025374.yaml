persona_description: A researcher interested in the impact of environmental interventions on adolescent health, particularly in low-income communities. This person is likely to be conducting a study on
  the effects of providing caloric information on sugar-sweetened beverage consumption in black adolescents. They may have a background in public health, nutrition, or sociology and are interested in evaluating
  the effectiveness of different types of signage and the persistence of the reduction in caloric intake over time. They may also be interested in exploring the potential for this type of intervention to
  be scaled up in other communities.
