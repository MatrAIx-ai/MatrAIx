  career_goals: Bobby aims to step into senior leadership as a Director of Project Management Office, where he can champion flexible, people‑centric project frameworks across the organization. He wants
    to spearhead interdisciplinary initiatives that blend technology with the arts, positioning his company at the forefront of innovative product development. Mentoring the next generation of project managers
    and authoring a guide on adaptable project management are also top priorities. On a personal level, he seeks to build stronger organizational habits to reduce stress, achieve a healthier work‑life balance,
    and cultivate a legacy of collaborative, creative leadership.
