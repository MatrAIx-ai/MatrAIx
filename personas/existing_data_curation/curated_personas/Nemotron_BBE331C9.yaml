personas:
  professional: Shawn Cornwell, a seasoned IT architect specializing in Java, Python, and cloud-native solutions, leverages their methodical, curiosity‑driven approach to design resilient enterprise systems
    while steering cross‑functional teams with organized precision and strategic foresight.
  sports: Shawn Cornwell enjoys weekend hikes in the Watchung Mountains, rides with the local Watchung Cycling Club during spring and fall, follows the New York Giants and New York Knicks for football and
    basketball, and participates in occasional 5K charity runs to stay fit.
  arts: Shawn Cornwell strums acoustic folk tunes by Nick Drake and John Denver on guitar, devours science‑fiction works from Liu Cixin and Octavia Butler, and attends contemporary theater productions,
    letting these artistic experiences inspire both their woodworking designs and problem‑solving mindset.
  travel: Shawn Cornwell prefers meticulously planned weekend getaways that blend hiking and cultural immersion, having trekked the Shenandoah Trail and explored Kyoto’s temples, while dreaming of a future
    cycling tour through the Dolomites.
  culinary: Shawn Cornwell, an advanced home chef, delights in crafting wood‑fire pizzas topped with fresh mozzarella, San Marzano tomatoes, and basil, while also perfecting slow‑braised short ribs seasoned
    with rosemary and garlic, often sourcing ingredients at farmers’ markets for optimal flavor.
  core: Shawn Cornwell, a methodical 49‑year‑old tech veteran, merges a love for rugged mountain hikes with meticulous woodworking, a habit of juggling complex codebases while strumming acoustic folk tunes
    on the porch, and a tendency to over‑schedule every free hour.
background:
  cultural: Shawn grew up in a middle‑class suburban setting in New Jersey, where family traditions emphasized education, holiday celebrations, and community involvement. His upbringing blended typical
    Mid‑Atlantic American values—hard work, reliability, and civic participation—with occasional ties to his European ancestry, manifesting in cultural practices such as Thanksgiving gatherings and summer
    barbecues. Living in Livingston, he enjoys the region's mix of urban convenience and access to nature, reinforcing his balanced lifestyle of professional dedication and personal enrichment.
