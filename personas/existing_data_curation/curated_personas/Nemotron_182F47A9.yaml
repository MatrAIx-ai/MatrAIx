personas:
  professional: Ana Ramosdiaz, an aspiring young naturalist and budding illustrator, merges curiosity about wildlife with practical LEGO engineering by sketching animals and constructing miniature habitats
    that echo the park ecosystems they explore, all while navigating schoolwork with a relaxed, occasionally disorganized approach.
  sports: Ana Ramosdiaz spends Saturday mornings kicking a soccer ball with a neighborhood under‑8 league, watches the Washington Capitals on TV with their dad, and follows the DC United youth academy with
    enthusiasm, yet they shy away from crowded stadiums, preferring intimate park games with a small group of friends.
  arts: Ana Ramosdiaz spends afternoons drawing detailed animal sketches inspired by the vibrant illustrations of Eric Carle and Beatrix Potter, listening to soothing Spanish lullabies such as 'Los Pollitos
    Dicen' while flipping through picture‑book folktales, and they often reenact favorite story scenes using LEGO characters, channeling their reserved imagination into quiet, vivid creativity.
  travel: Ana Ramosdiaz loves weekend trips to Great Falls Park to hunt for dragonflies, has taken a family road‑trip to Washington, D.C., where they marveled at the National Museum of Natural History,
    and they dream of exploring ancient stone pyramids in the Yucatán and strolling through Barcelona’s bustling markets, balancing cautious planning with spontaneous ice‑cream stops.
  culinary: Ana Ramosdiaz eagerly helps whisk masa and wrap pork‑filled tamales in corn husks alongside their parents, delights in the sweet aroma of plantain fritters and fresh cilantro, yet they often
    forget to wash their hands before cooking, and on weekends they enjoy simple cheese quesadillas with salsa verde as a favorite snack.
  core: Ana Ramosdiaz is a quietly curious eight‑year‑old who intertwines a love for nature, LEGO architecture, and family traditions, while battling occasional worry and a tendency to misplace school supplies.
background:
  cultural: Ana comes from a Guatemalan family that maintains strong ties to their heritage while living in Chantilly, Virginia. At home, Spanish is spoken daily, and she celebrates holidays such as Día
    de los Muertos and Semana Santa with traditional foods, music, and family stories. Her parents teach her about Mayan legends and Guatemalan customs, fostering a bicultural identity. In school, she navigates
    an English‑dominant environment, blending both cultures in her friendships and projects.
attributes:
  skills: '["Reading fluently", "Basic arithmetic", "Bilingual Spanish/English", "Tablet navigation", "Creative drawing", "Nature observation", "Cooperative teamwork", "Assertive communication"]'
  hobbies: '["Drawing animals", "Reading picture books and folktales", "LEGO building", "Nature walks and birdwatching", "Helping in the kitchen with Guatemalan recipes", "Educational tablet games", "Listening
    to Spanish music"]'
  career_goals: Ana dreams of a future where she can care for animals and teach others about the natural world. She imagines herself as a veterinarian who helps pets and wildlife, or as a teacher who shares
    stories from her Guatemalan heritage and science facts with curious students. Her practical side often asks how she can learn the steps to become a vet, and she plans to start by reading animal books,
    volunteering at the local shelter, and staying curious about science.
