  hobbies: '["Organic Gardening", "Birdwatching", "Historical Non‑Fiction Reading", "Crossword Puzzles", "Knitting", "Calligraphy", "Model Train Building", "Genealogical Research", "Nature Photography",
    "Classical Music Listening"]'
  career_goals: Although retired from full‑time teaching, Shauna aims to volunteer as a literacy tutor for seniors at the local library, develop a community garden as a living classroom for sustainable
    practices, and earn a horticulture certification from a nearby community college. She aspires to write a memoir or guidebook about her decades in education, offering insights on balancing tradition
    with innovation. On a personal level she sets competitive goals in weekly crossword puzzle tournaments and plans to complete a series of challenging jigsaw puzzles. She is also pursuing mindfulness
    training to better manage her anxiety and emotional reactivity, with the ambition to become a supportive mentor who models resilience. Ultimately, she hopes to be recognized locally for her contributions
    through a community service award.
