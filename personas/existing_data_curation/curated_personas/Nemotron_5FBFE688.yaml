personas:
  professional: Shauna Black, a retired elementary teacher with three decades of curriculum design expertise, leverages their curiosity‑driven approach and competitive streak to craft evidence‑based lesson
    plans while rigorously measuring outcomes, and they remain skeptical of unproven educational trends.
  sports: Shauna Black enjoys low‑impact fitness through daily garden walks and weekly tai chi sessions at the York County senior center, while cheering on the Philadelphia Eagles during football season
    and the Philadelphia Phillies in spring, and they occasionally join a community senior softball league for friendly competition.
  arts: Shauna Black weaves natural‑fiber scarves while listening to Beethoven’s piano sonatas, practices elegant copperplate calligraphy inspired by Edward Johnston, curates a digital photo archive of
    garden wildlife reminiscent of Ansel Adams, and they spend evenings absorbed in David McCullough’s biographies, all of which nourish a solitary artistic soul.
  travel: Shauna Black meticulously plans low‑key trips to historic locales, having explored Colonial Williamsburg and the Cotswold villages of England, while they dream of a sunrise at Acadia National
    Park’s Cadillac Mountain and a weekend gardening workshop in Kyoto’s traditional tea gardens.
  culinary: Shauna Black delights in preparing farm‑to‑table meals such as heirloom tomato bruschetta with fresh basil, roasted beet and goat cheese salad with walnuts, and seasonal apple‑cinnamon crumble,
    using modest culinary skills to coax flavor from organic vegetables, herbs, and locally sourced honey, and they often pair the dishes with a glass of chilled local cider.
  core: Shauna Black balances a fierce competitive edge in crossword tournaments with a quietly introspective life of gardening, genealogy, and piano, yet they often wrestle with intense anxiety that fuels
    a relentless pursuit of meticulous order and occasional over‑caffeination.
background:
  cultural: Shauna Elaine Black grew up in Stewartstown, Pennsylvania, within a white, middle‑class Protestant community that emphasized hard work, self‑reliance, and community service. Her family’s roots
    trace back to English settlers of the early 19th century, instilling values of modesty, frugality, and respect for tradition. The agricultural heritage and close‑knit church life of York County shaped
    her decision to pursue a career in public education. Exposure to neighboring Pennsylvania Dutch and Amish communities broadened her appreciation for craftsmanship and sustainable living, influencing
    her later passion for organic gardening. As a divorced senior woman, she navigates a cultural context that values independence and civic contribution, leading her to seek volunteer roles that align
    with the community‑oriented ethos of her hometown.
