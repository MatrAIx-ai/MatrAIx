personas:
  professional: Irma Comeaux, a seasoned community event coordinator and part‑time senior‑center educator, leverages their meticulous budgeting, art‑history knowledge, and digital proficiency to design
    inclusive cultural programs, and they apply their innate curiosity and orderly nature to ensure each exhibition runs seamlessly while offering fresh perspectives for seniors and school groups.
  sports: Irma Comeaux, an active member of the Boston Senior Walking Club, enjoys low‑impact cardio through daily walks along the Charles River and a seasonal pickleball league, and they cheer on the Boston
    Red Sox in baseball season and the Boston Celtics during basketball season.
  arts: Irma Comeaux fuels their artistic soul by painting delicate watercolors inspired by Monet’s garden scenes, quilting intricate patterns echoing O’Keeffe’s bold forms, attending Renaissance lectures
    at the Boston Museum of Fine Arts, and they listen to Beethoven’s Symphony No. 6 while sketching in their sunlit studio.
  travel: Irma Comeaux plans each getaway with a meticulous itinerary, favoring short road trips to New England gems like the Salem Witch Museum, the Newport Folk Festival, and a sunrise at Portland’s Eastern
    Promenade, while they dream of a future pilgrimage to the historic streets of Savannah, Georgia.
  culinary: Irma Comeaux, an enthusiastic home cook with intermediate skill, delights in crafting herb‑roasted rosemary chicken, fresh garden‑pepper ratatouille, and seasonal apple‑cinnamon crumble, frequently
    experimenting with home‑grown basil, thyme, and rose petals as they create aromatic farm‑to‑table dishes.
  core: Irma Comeaux, a detail‑oriented cultural curator who balances a disciplined planner’s mind with an artist’s heart, channels their curiosity into community events while they secretly hoard vintage
    fabric swatches in the garden shed.
background:
  cultural: Irma grew up in a middle‑class New England household with deep roots in the region. Her family's heritage includes French‑Canadian and Irish ancestry, traditions that emphasized community service,
    Catholic holidays, and an appreciation for education and the arts. Living most of her life in the Boston suburbs, she has internalized the New England values of self‑reliance, civic involvement, and
    respect for cultural institutions. These influences shape her love for local history, her participation in community events, and her desire to preserve and share the region's artistic heritage.
attributes:
  skills: '[''event planning'', ''budget management'', ''record keeping'', ''art history knowledge'', ''museum curation basics'', ''digital literacy (email, word processing, spreadsheets)'', ''crafting
    (quilting, knitting, basic woodworking)'', ''gardening'', ''cooking'', ''volunteer coordination'', ''interpersonal communication'', ''conflict resolution'', ''mentorship'']'
  hobbies: '[''visiting museums and galleries'', ''attending art and history lectures'', ''watercolor painting'', ''quilting'', ''knitting'', ''seasonal cooking'', ''reading historical fiction and biographies'',
    ''gardening (roses, herbs, vegetables)'', ''listening to classical music'', ''participating in a book club'', ''community gardening group'', ''road trips to cultural festivals'']'
  career_goals: As she approaches the next phase of her life, Irma aims to deepen her engagement with the arts and her community. She plans to complete the remaining credits toward an associate degree in
    liberal arts through online courses, and to become a certified docent at the nearby Boston Museum of Fine Arts, leading tours for seniors and school groups. Irma also hopes to curate a small traveling
    exhibition of local artists' work at community centers, and to launch an online shop for handmade quilts and knitted goods. Additionally, she is interested in writing a memoir that weaves together her
    personal history, her love of art, and reflections on life in New England.
