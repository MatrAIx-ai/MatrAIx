  hobbies: '[''Scale model building (cars, trains)'', ''Woodworking and furniture making'', ''Attending live concerts and sports events'', ''Reading non‑fiction (technology, history)'', ''Community park
    maintenance volunteer work'']'
  career_goals: George aims to move from front‑line attendant work to a senior operations management position within the regional entertainment industry. He wants to lead a team that implements new technology
    solutions—such as automated ticketing systems and advanced safety monitoring—to increase efficiency and guest satisfaction. Over the next five years, he plans to obtain certifications in venue safety
    and event management, and ultimately to oversee multiple venues in the Midwest. In the longer term, he envisions launching his own consultancy that helps smaller amusement parks modernize their operations
    while maintaining rigorous safety standards.
