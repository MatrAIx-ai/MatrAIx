  hobbies: '[''Reading chapter books'', ''LEGO building'', ''Puzzle solving (jigsaw, Sudoku)'', ''Nature walks'', ''Pet care'', ''Board games (Scrabble, Connect Four)'', ''Journaling and list making'']'
  career_goals: Patricia dreams of becoming a librarian or teacher, roles that allow her to create orderly, predictable environments and help others learn. She aspires to work in her hometown’s community
    center, where she can organize events, maintain a tidy space, and support younger children. She also imagines a future where she can combine her love of books with her sense of responsibility, perhaps
    as a school librarian who curates reading lists and ensures a calm, structured atmosphere for students.
