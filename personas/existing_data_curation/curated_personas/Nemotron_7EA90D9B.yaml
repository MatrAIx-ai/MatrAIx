personas:
  professional: John Evans, a five‑year‑old budding engineer, sketches simple bridge designs in a spiral notebook before building them with Lego blocks, balancing boundless curiosity with a practical step‑by‑step
    mindset while preferring quiet solo construction sessions that keep his play area tidy for the sake of harmony.
  sports: John Evans, a five‑year‑old who dashes around the backyard with a soccer ball, proudly dons a Chicago Fire youth jersey, watches the Chicago Cubs on TV every weekend, and participates in the neighborhood
    Little League Tigers, preferring calm, solo play over noisy team drills while still enjoying occasional family swims at the local pool.
  arts: John Evans, a five‑year‑old who spends afternoons drawing bright dinosaurs in the style of Eric Carle, sings along to The Wiggles and Sesame Street songs, and collects Toy Story action figures,
    he finds comfort in the gentle storytelling of Dr. Seuss during quiet reading time.
  travel: John Evans, a five‑year‑old who enjoys calm family road trips, recently explored the interactive exhibits at the Smithsonian in Washington, DC, loved the gentle rides at Disneyland, and dreams
    of a quiet sunrise hike in the Grand Canyon, preferring well‑planned, low‑stimulus travel over crowded adventure camps.
  culinary: John Evans, a five‑year‑old with a budding appetite, adores creamy macaroni‑and‑cheese, crunchy carrot sticks, and chocolate‑chip pancakes, can confidently spread peanut butter on toast and
    stir a bowl of warm soup, and delights in tasting homemade mini pepperoni pizzas sprinkled with oregano.
  core: John Evans, a thoughtful five‑year‑old who balances vivid curiosity with a quiet, meticulous nature, often worries over tiny details, prefers solitary play, yet shows generous kindness to friends
    and keeps a secret stash of shiny rocks for later.
background:
