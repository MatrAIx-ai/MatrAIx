  career_goals: Tanika aspires to become a licensed social worker or youth outreach coordinator, aiming to support at‑risk teens in Kansas City. She plans to attend college to study psychology or social
    work and hopes to earn certifications in peer counseling and mental health first aid. Her long‑term ambition is to establish a community nonprofit that provides mentorship, counseling, and resources
    for underserved adolescents, while also serving as a positive role model in her community.
