personas:
  professional: Tanika Parker, a high‑school junior with a knack for organization, aspires to become a community outreach coordinator, leveraging their practical mindset and compassionate nature to design
    structured volunteer programs that empower local youth.
  sports: Tanika Parker enjoys pick‑up basketball at the community center, cheers for the local high school Wildcats while also following the Chicago Sky in the WNBA, and they attend weekly dance workouts
    that blend hip‑hop and R&B for cardio fitness.
  arts: Tanika Parker expresses creativity through gospel singing in the church youth choir, hip‑hop dance routines at home, and sketching in a personal journal, drawing inspiration from artists like Beyoncé,
    H.E.R., and author Angie Thomas.
  travel: Tanika Parker prefers well‑planned weekend road trips to nearby state parks and dreams of a structured summer visit to New Orleans to explore its music scene, though they sometimes indulge in
    spontaneous day trips with friends to the city’s historic museum.
  culinary: Tanika Parker enjoys cooking family soul‑food recipes such as collard greens, cornbread, and macaroni and cheese, skillfully following handwritten instructions while they often add a pinch of
    hot sauce for extra flavor and love sipping sweet tea after meals.
  core: Tanika Parker balances a disciplined, compassionate outlook with a love for music, community service, and structured creativity, occasionally letting procrastination and a sweet‑tooth sidetrack
    their otherwise organized life.
background:
  cultural: Tanika is a Black teenager raised in Kansas City, Missouri, immersed in the city’s rich African‑American heritage. Her family emphasizes community, faith, and education, and she regularly attends
    church activities. She celebrates cultural traditions such as Juneteenth and Kwanzaa, enjoys the local music scene that blends jazz, blues, and hip‑hop, and draws inspiration from Kansas City’s history
    of civil‑rights activism and Black entrepreneurship. These influences shape her values of resilience, cooperation, and a strong commitment to uplifting her community.
