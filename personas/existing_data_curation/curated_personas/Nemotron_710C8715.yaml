personas:
  professional: Luis Santacruz, a 39‑year‑old arts manager with a humanities background and years of corporate leadership, translates creative visions into actionable projects by orchestrating interdisciplinary
    teams, curating community‑focused exhibitions, and leveraging bilingual communication to forge cross‑cultural partnerships, all while thriving on a flexible, sometimes chaotic schedule that fuels their
    innovative problem‑solving.
  sports: Luis Santacruz, a regular midfielder for the Houston Futbol Club’s amateur league, passionately supports the Houston Astros and the Houston Rockets, and supplements team play with weekend jogs
    in Hermann Park, preferring communal activity over solitary gym workouts despite a habit of skipping structured training plans.
  arts: Luis Santacruz, a devoted explorer of Houston’s street‑art corridors, captures murals by artists like Shepard Fairey and local pioneer Victor Nunez on camera, curates pop‑up shows featuring contemporary
    Mexican painter Francisco Toledo, and they spin vintage vinyl by Miles Davis, Nina Simone, and Tame Impala, allowing their curiosity and cultural empathy to shape both personal taste and professional
    curation.
  travel: Luis Santacruz, an impulsive wanderer who favors short‑haul road trips over elaborate itineraries, has driven to the Rio Grande Valley’s art colonies and visited Mexico City’s Frida Kahlo Museum,
    while dreaming of a future solo adventure to Barcelona’s vibrant street‑art districts, balancing limited family time with a modest travel budget.
  culinary: Luis Santacruz, a confident home chef, masterfully prepares authentic Mexican dishes such as chiles en nogada, carnitas, and mole poblano, sourcing fresh corn husks, dried chilies, and queso
    fresco from local markets, and revels in hosting communal meals where guests enjoy homemade salsa verde, horchata, and spirited conversation.
  core: Luis Santacruz blends relentless curiosity with a laid‑back, occasionally disorganized approach, turning every social gathering into a creative workshop while quietly wrestling with procrastination
    and stress‑induced worry.
background:
  cultural: Luis is a second-generation Mexican-American who grew up in Houston's vibrant Hispanic neighborhoods. Raised in a bilingual household, he celebrates Mexican traditions such as Dia de los Muertos,
    Dia de la Independencia, and family fiestas, while also embracing the multicultural fabric of Texas. His parents instilled a respect for Mexican folklore, cuisine, and the Spanish language, which he
    carries into his professional and social life. At the same time, he identifies strongly with the diverse, cosmopolitan culture of Houston, drawing inspiration from its mix of Latino, Anglo, African-American,
    and Asian influences. This bicultural perspective informs his artistic sensibilities, communication style, and commitment to fostering inclusive cultural experiences.
