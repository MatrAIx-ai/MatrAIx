  hobbies: '[''Visiting art galleries and museum exhibitions'', ''Street-art exploration and photography'', ''Cooking traditional Mexican cuisine'', ''Hosting dinner parties for friends and family'', ''Playing
    in a community soccer league'', ''Salsa and cumbia dancing'', ''Traveling to cultural destinations in Mexico and beyond'', ''Volunteering with youth arts education programs'', ''Reading contemporary
    fiction and non-fiction'', ''Collecting vintage vinyl records'', ''Practicing yoga and mindfulness meditation'']'
  career_goals: Luis aims to transition into senior leadership within the cultural sector, with a long-term goal of becoming the director of a regional museum or arts center in the Greater Houston area.
    He is pursuing a graduate certificate in Museum Studies to deepen his expertise, and he envisions building inclusive programming that expands access to the arts for underserved communities. Ultimately,
    he hopes to launch his own consulting firm that advises corporations and non-profits on integrating artistic and cultural initiatives into their organizational strategies, while maintaining a flexible
    work style that supports his personal well-being.
