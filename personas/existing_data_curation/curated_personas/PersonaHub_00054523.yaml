persona_description: A person who is interested in alternative medicine and has knowledge of orthomolecular psychiatry, specifically regarding the use of food and vitamins to treat mental illnesses. They
  are familiar with the concept of essential fatty-acid deficiency and imbalance, and have experience with the use of omega-3 fats to treat schizophrenia and other mental illnesses. They are also aware
  of the importance of dietary changes and supplements in managing hypoglycaemia, and have knowledge of the role of vitamins and minerals in brain function. They are also familiar with the concept of cerebral
  allergies and the use of an elimination diet to identify the substances causing mental illness.
