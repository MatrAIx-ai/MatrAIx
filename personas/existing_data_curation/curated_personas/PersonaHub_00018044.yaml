persona_description: A teacher or educational specialist who specializes in teaching and supporting students with visual impairments, particularly those who have additional disabilities such as autism or
  other communication challenges. They are knowledgeable about AAC systems and have experience designing and modifying environments and materials to ensure effective access to literacy and communication
  for students. They are skilled in assessing, supporting, and planning for the complex communication needs of students with visual impairments, and have experience in teaching social communication skills
  to students with visual impairments and autism. They are also knowledgeable about the development of meaningful communication for children who are deaf-blind and have experience with teaching writing
  skills to students who are blind and deafblind.
