  career_goals: Christopher dreams of turning his love for art and technology into a career that lets him create experiences for others. He aspires to become a video game designer or digital animator, envisioning
    games that blend storytelling, visual art, and interactive puzzles. He also imagines working as a concept artist for movies or video games, where he could bring unconventional ideas to life. Because
    of his heightened emotional sensitivity, he hopes his work will help people feel understood and less anxious, perhaps by designing calming game environments or creating art that sparks conversation
    about mental health. Long‑term, he sees himself owning a flexible studio where he can collaborate with others while maintaining the freedom to explore new ideas at his own pace.
