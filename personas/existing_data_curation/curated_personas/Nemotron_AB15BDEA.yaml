personas:
  professional: Christopher Stotesbury, a 12‑year‑old aspiring digital illustrator and budding game world‑builder, combines a voracious curiosity for fantasy lore with a relaxed, improvisational workflow
    that lets them swing between pencil sketches and tablet art while experimenting with Minecraft mechanics to prototype narrative environments.
  sports: Christopher Stotesbury enjoys weekend hikes through Red Rock Canyon and plays on a community center’s youth soccer league, cheering on the Arizona Diamondbacks while occasionally swapping the
    soccer cleats for a basketball court at school, though bouts of anxiety sometimes make them shy away from larger team practices.
  arts: Christopher Stotesbury channels boundless imagination into sketchbooks and a digital tablet, writes short sci‑fi stories inspired by authors like Brandon Sanderson, devours indie animated films
    such as Studio Ghibli’s *Spirited Away* and Wes Anderson’s *The Grand Budapest Hotel*, and practices simple piano melodies reminiscent of Ludovico Einaudi while humming original lyrics.
  travel: Christopher Stotesbury prefers family‑oriented road trips that blend relaxed exploration with spontaneous photo stops, having already captured sunrise at the Grand Canyon and dreaming of a future
    adventure to Kyoto’s bamboo forests to sketch cherry‑blossom landscapes.
  culinary: Christopher Stotesbury loves cheesy pepperoni pizza and homemade mac and cheese, experiments with simple recipes like avocado toast topped with cherry tomatoes and feta, and enjoys snack‑time
    mixes of chocolate chips, dried apricots, and pretzel sticks while occasionally attempting to bake cinnamon‑sugar churros for friends.
  core: Christopher Stotesbury, a 12‑year‑old dreamer who toggles between sketchbooks and sandbox games, battles waves of anxiety with nightly journaling, hoards stray crayons in a secret drawer, and can’t
    resist a late‑night Minecraft raid even when a school project looms.
background:
  cultural: Christopher comes from a middle‑class white American family living in Las Vegas, Nevada. The city's vibrant entertainment culture—magical shows, neon signage, and a constant flow of performers—has
    shaped his appreciation for bold visual expression and storytelling. While his family adopts mainstream American values such as independence and self‑reliance, they also encourage creativity, enrolling
    him in community art programs and exposing him to local festivals like the Nevada State Fair. The desert landscape surrounding Las Vegas offers a contrast to the city's sparkle, inspiring his interest
    in nature photography and outdoor exploration. He identifies with the broader American youth culture, enjoying popular music, video games, and online communities, yet his experiences in a city known
    for theatrical spectacle give him a unique perspective on art and performance.
