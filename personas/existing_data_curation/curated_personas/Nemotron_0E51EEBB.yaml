  hobbies: '[''Reading Historical Fiction'', ''Genealogy Research'', ''Vegetable Gardening'', ''Quilting'', ''Crocheting'', ''Book Club'', ''Bird Watching'', ''Nature Walks'']'
  career_goals: Although retired, Deanna aims to keep influencing education in her community. She plans to mentor new teachers through informal workshops, expand the local literacy program for seniors,
    and establish an intergenerational garden that provides experiential learning for children and a therapeutic space for adults. She also hopes to author a practical guidebook on teaching strategies for
    rural schools and to secure a modest endowment that funds scholarships for high‑school students in Scott County.
