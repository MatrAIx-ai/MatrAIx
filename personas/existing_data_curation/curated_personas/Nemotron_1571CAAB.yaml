  hobbies: '["Recreational basketball", "4‑H volunteer work", "Hunting", "Fishing", "Playing guitar and singing folk‑rock", "DIY home‑improvement (fire pits, projects)", "Woodworking", "Watching classic
    western movies", "Reading historical nonfiction about the American West"]'
  career_goals: Leroy aims to turn his practical abilities and community spirit into a sustainable role that benefits Rock Springs. Over the next year he plans to earn his GED and then pursue a certification
    in HVAC or automotive service to secure part‑time employment. He also wants to lead a local volunteer group that organizes neighborhood clean‑ups, seasonal festivals, and youth mentorship programs.
    In the longer term, Leroy envisions starting a small mobile repair business serving ranches and farms, leveraging his mechanical and carpentry skills, while continuing to mentor at‑risk youth by teaching
    them practical trades and teamwork.
