personas:
  professional: Lorna Carter, an aspiring junior visual artist, wields crayons and building blocks with burgeoning fine‑motor skill and storytelling flair, letting their innate curiosity and flexible, low‑pressure
    approach shape each spontaneous ‘masterpiece,’ and they often proudly display their colorful creations on the fridge.
  sports: Lorna Carter enjoys a toddler gymnastics class every Saturday, eagerly watches the Chicago Cubs play on television with the family, and they prefer short bursts of movement over structured sport,
    valuing the freedom to explore playground equipment at their own pace.
  arts: Lorna Carter spends hours finger‑painting swirls of bright colors while humming Raffi’s ‘Baby Belugaa,’ delights in the animated storytelling of Disney’s ‘Moana,’ and they show a budding appreciation
    for visual art by arranging stickers of the classic ‘Miffy’ series.
  travel: Lorna Carter loves short family road trips to the nearby coastal town of Sunnybay for sandcastle building, cherishes the sensory wonder of the city zoo’s petting area, and they day‑dream about
    a future visit to the tropical waterfalls of Costa Rica, preferring relaxed itineraries that leave space for spontaneous play.
  culinary: Lorna Carter prefers soft foods like avocado mash with lime and banana slices, occasionally delights in cheesy macaroni bites, enjoys the occasional tiny salmon‑and‑cucumber sushi roll, and
    although they cannot cook themselves, they eagerly help stir their mother's oatmeal with a wooden spoon.
  core: Lorna Carter navigates the world with insatiable curiosity, an endearing habit of hoarding shiny stickers in their pocket, and they have a penchant for spontaneous, mess‑infused art sessions that
    leave the living room looking like a rainbow explosion.
background:
  cultural: Lorna is raised in a Black family in New Orleans, a city celebrated for its rich African‑American heritage. Her upbringing includes regular exposure to gospel and jazz music, community gatherings
    like family picnics and second‑line parades, and home‑cooked Creole and Southern dishes shared during celebrations. Storytelling at home honors African roots and local history, instilling a sense of
    pride, resilience, and an enduring love for music, art, and community connection.
attributes:
  skills: '[''Walking'', ''Running'', ''Climbing'', ''Balancing'', ''Stacking blocks'', ''Turning pages'', ''Crayon drawing'', ''Basic vocabulary'', ''Color identification'', ''Rhythmic movement'']'
  hobbies: '[''Playing with blocks'', ''Exploring the backyard'', ''Listening to jazz music'', ''Dancing'', ''Looking at picture books'', ''Crayon drawing'', ''Singing along to nursery rhymes'']'
  career_goals: Although only two, Lorna’s natural curiosity points toward a future love of the arts. She often mimics dancing, enjoys watching people paint, and repeats the phrase "make pictures" with
    excitement. Her family nurtures a desire to explore learning, so she imagines herself one day attending preschool, learning to draw, singing loudly, and perhaps becoming a dancer or musician who creates
    beautiful things.
