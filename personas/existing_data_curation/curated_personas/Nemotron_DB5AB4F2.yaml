  career_goals: Keith aims to advance from his current courier role to a supervisory position within the logistics sector, such as a route manager or fleet coordinator, over the next five years. He plans
    to obtain a commercial driver’s license (CDL) and pursue certifications in supply chain management to broaden his qualifications. In the longer term, he envisions launching a small, locally‑focused
    delivery service that leverages his expertise in route planning and customer relations, while maintaining a stable income that supports home ownership and financial independence.
