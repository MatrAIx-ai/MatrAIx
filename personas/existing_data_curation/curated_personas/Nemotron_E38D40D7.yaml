    ''Community youth workshops'']'
  career_goals: Davon aspires to earn a scholarship to a competitive high school that offers strong STEM and athletic programs, aiming to study engineering—particularly robotics or mechanical engineering—while
    keeping the dream of playing basketball at the collegiate level and possibly professionally. He is motivated to develop skills that will allow him to give back to Detroit’s youth, envisioning a future
    where he mentors younger students in coding clubs or sports camps. He also seeks to build a reliable career path that provides financial stability for his family.
