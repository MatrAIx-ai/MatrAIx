personas:
  professional: Davon Toney is an aspiring junior robotics designer who merges a love for LEGO Technic, Scratch game creation, and strategic basketball drills into methodical, competition‑driven projects,
    often leading peer workshops at the community center while meticulously planning each build and code iteration.
  sports: Davon Toney anchors the local community center’s U‑13 basketball team, idolizing LeBron James and the Los Angeles Lakers, while dominating weekends at the downtown skate park as a member of the
    “Ramp Runners” crew, constantly refining offensive dribble moves and skateboard tricks with a fiercely competitive mindset.
  arts: Davon Toney immerses in hip‑hop and R&B, blasting tracks by Kendrick Lamar, J. Cole, and SZA while practicing drumming on a practice pad, and channels that rhythmic storytelling into Scratch animations
    inspired by Studio Ghibli’s “My Neighbor Totoro,” blending musical beats with visual creativity.
  travel: Davon Toney’s travel style blends family road trips with tech‑savvy adventures, having toured Washington, D.C.’s Smithsonian museums and Disney World, while plotting a future spring visit to Tokyo’s
    Akihabara district for robotics shops and the iconic Yoyogi skate spot, all meticulously scheduled in a planner to fit a tight school calendar.
  culinary: Davon Toney favors bold, high‑energy meals like spicy chicken wings, pepperoni pizza, and pork‑belly ramen, often whipping up quick nacho‑cheese snacks with jalapeños after gaming sessions,
    though they frequently fall back on microwave meals when homework piles up, revealing a pragmatic yet indulgent eating habit.
  core: Davon Toney is a methodical, competitive 13‑year‑old who fuses robotics, basketball, and hip‑hop passions with a skeptical edge and a habit of worrying about performance, turning every project into
    a calculated quest for mastery.
background:
  cultural: Davon is an African‑American teenager raised in Detroit’s vibrant west side, a neighborhood shaped by a strong sense of community, music, and resilience. His family emphasizes the values of
    hard work, education, and mutual respect, often gathering for Sunday church services and neighborhood block parties that celebrate local traditions. He grew up surrounded by the legacy of Motown and
    the city’s sports culture, which fuels his passion for basketball and music. While navigating the challenges of urban life, he draws pride from Detroit’s history of innovation and activism, and he seeks
    to contribute positively to his community through mentorship and civic involvement.
