persona_description: A neuroscientist who is passionate about the study of the neural mechanisms of Fragile X syndrome and the potential of new drugs to address the core symptoms of autism. This person
  has experience in basic research, has worked with the drug arbaclofen, and has seen the preliminary results of its use in children with Fragile X syndrome. They are excited about the potential of this
  new drug to help families with children who struggle with autism and have a unique understanding of the importance of clinical trials and independent reviews of data.
