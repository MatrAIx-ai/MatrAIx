personas:
  professional: Salaheddin Figueroa is a diligent fifth‑grader who channels a love of structure into school science projects and coding clubs, excelling at building intricate LEGO models and designing redstone
    contraptions in Minecraft, while they sometimes relax about assignments, leading to last‑minute cramming.
  sports: Salaheddin Figueroa joins the Tensas Kids Basketball League for after‑school pick‑up games, idolizes the nearby Louisiana Wildcats high‑school team, and spends weekends fishing at Lake Concord
    with their dad, combining structured team play with spontaneous outdoor recreation.
  arts: Salaheddin Figueroa immerses themselves in gospel choirs where they practice hand‑drum rhythms inspired by Tasha Cobbs, enjoys hip‑hop tracks from Kendrick Lamar on family car rides, and recreates
    scenes from favorite adventure books as LEGO dioramas, blending spiritual music, contemporary beats, and hands‑on storytelling.
  travel: Salaheddin Figueroa dreams of exploring the historic French Quarter of New Orleans after their family’s annual trip to the Gulf Coast beach, preferring trips that blend a clear itinerary—like
    guided museum tours—with spontaneous moments such as catching a local blues jam session.
  culinary: Salaheddin Figueroa loves the aroma of fried catfish and the comforting taste of jambalaya with Andouille sausage, helps their mother tend a small garden of collard greens and sweet corn, and
    enjoys experimenting with homemade cornbread topped with honey butter, though they are prone to over‑seasoning their dishes.
  core: Salaheddin Figueroa balances a methodical love for order—evident in LEGO builds, budgeting, and choir rhythms—with a playful, sometimes forgetful charm that leads them to last‑minute homework rushes
    and occasional over‑spicing of meals.
background:
  cultural: As a Black boy growing up in Tallulah, a small town in the Mississippi Delta region of Louisiana, Salaheddin is immersed in a rich African‑American cultural heritage. Family gatherings often
    center around soulful gospel music, storytelling, and traditional Southern cuisine such as fried catfish, jambalaya, and cornbread. The local church serves as a cornerstone of community life, providing
    weekly choir rehearsals, youth events, and a supportive network that reinforces values of resilience and mutual aid. Regional history—marked by the legacy of the civil‑rights movement and the agricultural
    labor that shaped the area—instills in him an awareness of community pride and the importance of collective progress. Seasonal festivals, like the Tensas Parish fair, expose him to local crafts, blues
    and jazz influences, and the spirit of communal celebration. These cultural currents shape his identity, fostering a blend of reverence for tradition and aspiration for future opportunities.
attributes:
