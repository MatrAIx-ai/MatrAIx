  hobbies: '["Reading adventure and mystery books", "Playing Minecraft", "Playing Roblox", "Building LEGO sets", "Listening to gospel music", "Listening to hip‑hop", "Hand‑drum practice in church choir",
    "Bicycle riding", "Fishing with family", "Helping in a vegetable garden", "Basketball pick‑up games", "Youth choir performances"]'
  career_goals: As a young student, Salaheddin’s career ideas are still forming, but they reflect his practical mindset and desire to serve his community. He imagines becoming a skilled mechanic who can
    repair trucks and farm equipment, a civil engineer who designs safe roads and bridges for Tallulah, or a firefighter who works within a structured team to protect neighbors. In the near term, he aims
    to win his school’s science fair with a project about simple machines, improve his basketball shooting to join the middle‑school team, and earn a badge in the local Boy Scouts program, which he sees
    as a stepping stone toward future leadership roles.
