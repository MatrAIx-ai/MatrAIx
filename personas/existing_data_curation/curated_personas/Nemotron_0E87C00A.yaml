personas:
  professional: Otis Jeffcoat, a budding robotics enthusiast, channels their curiosity and competitive drive into designing Scratch-coded machines for their school club, balancing meticulous planning with
    spontaneous tweaks while they sketch comic-inspired blueprints during downtime.
  sports: Otis Jeffcoat pumps up their energy playing pickup basketball with friends at the local YMCA, follows the Memphis Grizzlies and the University of Memphis Tigers avidly, and they spend weekends
    practicing free throws with the Memphis Youth Hoops League while also dabbling in weekend soccer with the Overton Park Juniors.
  arts: Otis Jeffcoat immerses themselves in the world of comics by sketching characters reminiscent of Stan Lee’s heroes, experiments with watercolor collages inspired by Keith Haring’s bold lines, and
    they remix beats on their keyboard echoing Kendrick Lamar’s rhythm, while regularly attending community art workshops that showcase local muralists and live‑music performances.
  travel: Otis Jeffcoat thrives on urban adventures, wandering through Memphis’s Beale Street murals, the National Civil Rights Museum, and Overton Park on weekend outings, while they dream of future trips
    to New Orleans’s French Quarter and Kyoto’s Gion district, preferring self‑guided walking tours that fit within their family’s modest travel budget.
  culinary: Otis Jeffcoat enjoys the bold flavors of Southern cuisine, favoring fried catfish, smoky BBQ ribs, and creamy collard greens, while their snack‑time favorites include banana pudding and mango
    salsa, and they often help in the kitchen by mastering simple recipes like grilled cheese with a pinch of smoked paprika.
  core: Otis Jeffcoat is a hyper‑curious, beat‑making, sketch‑loving 11‑year‑old who balances a competitive streak with a flair for spontaneous art projects, yet they often misplace their inhaler and hoard
    limited‑edition comics.
background:
  cultural: Otis grew up in the vibrant African‑American community of Memphis, where music, storytelling, and visual expression are woven into daily life. His family attends a local Baptist church that
    emphasizes fellowship and community service, and many neighborhood events celebrate the city’s rich blues and soul heritage. He has been exposed to the rhythms of Beale Street, community mural projects,
    and the tradition of oral history passed down through elders, all of which shape his identity and inspire his artistic pursuits. These cultural influences encourage him to view art as a means of personal
    expression and community connection.
attributes:
  skills: '[''drawing'', ''mixed-media collages'', ''basic Scratch programming'', ''basketball'', ''public speaking'', ''critical thinking'', ''organizing group projects'']'
