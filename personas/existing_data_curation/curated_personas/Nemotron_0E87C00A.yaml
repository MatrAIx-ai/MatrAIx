  career_goals: Otis dreams of becoming a visual storyteller who blends art and technology—potentially as an illustrator for graphic novels, a digital animator, or a game designer. He also envisions creating
    community murals that celebrate Memphis' musical heritage and inspire other kids. In the longer term, he hopes to attend a specialized high school for the arts and later pursue a degree in visual communications
    or interactive media, using his creativity and problem‑solving abilities to bring new ideas to life.
