  career_goals: Maresa aims to expand her home‑based practice into a boutique salon in downtown Anchorage that blends premium nail services with holistic foot‑care, featuring design elements inspired by
    the Alaskan landscape. She plans to obtain a certification as a nail‑technology educator, develop workshops for aspiring technicians, and launch a line of eco‑friendly, locally sourced nail products.
    Building an online portfolio to attract a broader clientele and establishing a mentorship program for younger women in the trade are also key ambitions, all geared toward achieving financial stability
    for her retirement while giving back to the community.
