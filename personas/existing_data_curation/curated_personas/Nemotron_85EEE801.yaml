  hobbies: '[''Visiting art galleries'', ''Listening to jazz and gospel music'', ''Playing piano'', ''Reading poetry and fiction'', ''Writing short reflections'', ''Photography'', ''Gardening'', ''Soul-food
    cooking'', ''Group walks'', ''Church choir participation'']'
  career_goals: Even at 77, Bernard aims to become the lead volunteer coordinator for the Gastonia Arts and Culture Center, designing programs that preserve African American heritage and promote creative
    expression among seniors. He aspires to compile a memoir of his life experiences, intertwining personal reflections with broader civil rights history, and to publish it locally. He also hopes to establish
    a seasonal community garden that doubles as a therapeutic space and a venue for art installations, seeking to secure modest grant funding to sustain these initiatives.
