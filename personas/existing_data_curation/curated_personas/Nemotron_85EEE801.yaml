personas:
  professional: Bernard Wright, a veteran community arts facilitator, they weave visual art, music, and storytelling into intergenerational workshops, coordinate small‑scale events at local centers and
    churches, draw on their oral‑history expertise to preserve regional heritage, and aim to become the lead volunteer coordinator at the Gastonia Arts and Culture Center, all while embracing a relaxed,
    curiosity‑driven planning style.
  sports: Bernard Wright, a regular participant in group walks through Oak Park and a devoted fan of the Gastonia Honey Hunters baseball team, they stay active with low‑impact cardio and occasionally join
    a senior pick‑up basketball game at the community center.
  arts: Bernard Wright, an avid visitor of the Gastonia Art Gallery and regular attendee of jazz concerts featuring legends like John Coltrane, Miles Davis, and Ella Fitzgerald, as well as gospel choir
    performances that showcase Thomas A. Dorsey’s compositions, they play a modest upright piano at home, write reflective poetry inspired by Robert Frost and Pablo Neruda, and capture neighborhood scenes
    with their vintage Canon camera, finding artistic kinship with painters such as Georgia O'Keeffe and Claude Monet.
  travel: Bernard Wright, who favors relaxed, culturally enriching excursions, they have explored historic Savannah’s riverfront, strolled the French Quarter of New Orleans, and hiked gentle sections of
    the Appalachian Trail near Asheville, often planning trips around their garden schedule and modest travel budget.
  culinary: Bernard Wright, a devoted home cook, they prepare family‑style dishes such as slow‑cooked collard greens, baked sweet‑potato pie, and seasoned fried chicken using fresh herbs from their garden,
    showcasing a modest cooking skill that delights friends at potluck gatherings and church events.
  core: Bernard Wright, they blend a lifelong love of community arts, soulful cooking, and garden therapy with a flexible, curiosity‑driven outlook, yet their tendency toward disorganization and occasional
    anxiety often colors their otherwise warm, sociable nature.
background:
  cultural: Bernard is an African-American who grew up in the segregated South during the 1950s and 60s, witnessing the civil rights movement firsthand in North Carolina. His family's traditions are rooted
    in church gospel music, communal storytelling, and a strong emphasis on resilience and community support. These cultural influences shape his appreciation for art, history, and collective experience.
    He maintains close ties to the Black community in Gastonia, regularly attending church events, local heritage festivals, and community gatherings that celebrate Black Southern cuisine and history.
attributes:
  skills: '[''Community arts facilitation'', ''Oral history documentation'', ''Storytelling'', ''Intergenerational mentorship'', ''Gardening'', ''Soul-food cooking'', ''Basic photography'', ''Event coordination'',
