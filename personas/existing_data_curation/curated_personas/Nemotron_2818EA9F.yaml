personas:
  professional: Markus is an aspiring junior coder who blends his methodical planning with boundless curiosity, using Scratch to prototype games that draw on the sci‑fi adventures they read, while also
    engineering intricate LEGO sets that reflect a disciplined yet imaginative mindset.
  sports: Markus drills with the Eagle Juniors basketball team at the community park three times a week, roots for the Chicago Bulls, swims laps at the City Aquatic Center every Thursday, and hikes the
    nearby Redwood Nature Trail during weekends, balancing structured team practice with free‑form outdoor activity.
  arts: Markus drums along to beats from Kendrick Lamar and Kirk Franklin, draws inspiration from sci‑fi authors like Isaac Asimov while building LEGO NASA models, and showcases short Scratch animations
    featuring original characters, weaving together hip‑hop rhythm, gospel soul, and imaginative storytelling.
  travel: Markus has visited the National Air and Space Museum in Washington, D.C., camped at the nearby Redwood State Park, and dreams of exploring the Kennedy Space Center in Florida, preferring hands‑on
    science trips that blend learning with adventure while their family budget restrains longer overseas vacations.
  culinary: Markus loves pepperoni pizza, homemade mac and cheese, and crafts banana‑strawberry smoothies, often experimenting with a dash of cinnamon, while their favorite snack after a LEGO session is
    a warm grilled cheese sandwich with extra cheddar.
  core: Markus fuses methodical planning with adventurous curiosity, turning sci‑fi reading into LEGO creations and Scratch games, while their friendly, reliable nature sometimes leads to a habit of hoarding
    allowance for gadgets.
background:
  cultural: Markus comes from a close‑knit African‑American family in Hampton, Florida. His parents emphasize education, community service, and cultural pride, often sharing stories about their ancestors'
    journeys from the rural South to the suburbs. Family gatherings feature soulful music, home‑cooked Southern dishes, and celebrations of Juneteenth and Black History Month, fostering a strong sense of
    identity. He attends a local church youth group where mentorship and service projects reinforce values of cooperation and respect. This cultural foundation, combined with the vibrant natural surroundings
    of Alachua County, shapes his curiosity about the environment and his desire to give back to his community.
attributes:
