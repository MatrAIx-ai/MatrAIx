  career_goals: Markus dreams of turning his love for nature and problem‑solving into a career as a marine biologist or environmental scientist focused on Florida's coastal ecosystems. He imagines studying
    marine life, helping protect coral reefs, and eventually sharing his passion by teaching STEM subjects to younger students. In the short term, he aims to deepen his coding skills, participate in science
    fairs, and join local conservation clubs to gain hands‑on experience.
