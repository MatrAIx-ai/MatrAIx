persona_description: Justin Henriques is a professional engineer who specializes in developing alternative fueling mechanisms for communities. He has extensive experience in capacity factor analysis and
  community capacity to manage technology. His research interests include biogas digesters, sustainable supply chains, and training in system management, operation, and maintenance. He has worked with community
  decision makers to identify low, medium, and high capacity in each capacity factor category, and established a local supply chain to mitigate the village's low technical capacity. He has collaborated
  with engineers at 2rw Consultants, Possibilities Africa, and an implementing developing agency, LOTI, to develop an alternative fueling mechanism for the village of 15,000.
