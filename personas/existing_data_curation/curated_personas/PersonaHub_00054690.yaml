persona_description: A team of researchers working on the structural dynamics of proteins, particularly focusing on the study of how structural fluctuations influence protein function and the observation
  of intermediate states in complex structural transitions. They use confocal fluorescence spectroscopy in a cryogenic setup to achieve extreme temperature gradients necessary for studying protein movements
  and their interactions with ligands. They are particularly interested in the binding of carbon monoxide to Myoglobin and the reversible kinetics of ligand binding to the heme cofactor. They use single-molecule
  spectroscopy to visualize and analyze interactions and dynamics of individual molecules, while their cryogenic setup allows them to observe the rate of bond formation in the frozen sample while still
  allowing the protein to explore its conformational state by intermittently heating it to the liquid phase.
