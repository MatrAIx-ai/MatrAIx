  hobbies: '[''Gardening'', ''Reading historical fiction'', ''Knitting and quilting'', ''Cooking soul food'', ''Church choir participation'', ''Volunteering at senior center'', ''Walking Lehigh River trails'',
    ''Listening to R&B and jazz'', ''Genealogy research'', ''Local history tours'']'
  career_goals: Although retired from formal employment, Shirley aims to deepen her involvement in local historic preservation projects, expand her community garden to share fresh produce with neighbors,
    and mentor at‑risk youth through the senior center’s outreach programs. She also aspires to complete a series of online courses on horticulture and local history, and to maintain her health and independence
    well into her senior years.
