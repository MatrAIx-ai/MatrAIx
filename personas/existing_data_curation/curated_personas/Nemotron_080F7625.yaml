  career_goals: Sabrina aims to enroll in a STEM‑focused high school program and eventually pursue a career as a robotics or mechanical engineer, designing sustainable outdoor equipment. She hopes to compete
    in regional and national science fairs, earn scholarships, and study at a university with strong engineering and environmental science programs. In parallel, she is interested in developing her communication
    skills to work in science communication or journalism, bridging technical topics with public audiences. She envisions leading a student robotics team, winning competitions, and later contributing innovative
    solutions to real‑world challenges.
