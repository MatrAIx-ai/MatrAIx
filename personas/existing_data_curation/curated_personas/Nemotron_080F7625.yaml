personas:
  professional: Sabrina Bors is a budding robotics enthusiast who blends her curiosity with practicality, leading the school’s STEM club to design and program small autonomous robots while balancing debate
    prep and soccer practice with organized flexibility.
  sports: Sabrina Bors stars as a forward for the Oakridge Middle School girls’ soccer team, trains with the Hilltop Hiking Club on weekend foothill treks, follows the Portland Thorns FC and the Los Angeles
    Lakers with avid enthusiasm, and treats fitness as a strategic game, logging mile‑counters and strength drills to stay ahead of teammates.
  arts: Sabrina Bors streams contemporary pop icons like Billie Eilish and BTS while penning short sci‑fi flash fiction inspired by Neil Gaiman, and creates vibrant digital illustrations in Procreate that
    blend anime‑style characters with abstract geometric patterns.
  travel: Sabrina Bors prefers active, budget‑friendly trips, having trekked Yosemite’s Redwood trails and explored Tokyo’s bustling districts on family vacations, and now dreams of hiking Patagonia’s Torres Del Paine
    and skiing the Swiss Alps, though school exams and a modest allowance shape her travel planning.
  culinary: Sabrina Bors enjoys devouring pepperoni pizza, spicy chicken tacos, and instant miso‑flavored ramen, often whipping up a quick cheese‑and‑tomato sandwich while experimenting with avocado toast
    for a healthier snack, yet she rarely ventures beyond microwavable meals without parental prompting.
  core: Sabrina Bors is a fiercely curious, competitively driven 13‑year‑old who balances robotics tinkering with soccer drills, pop music playlists, and a habit of compulsively checking her savings app
    while occasionally neglecting sleep and eye‑rest.
background:
  cultural: Sabrina comes from a White, middle‑class family in Louisville, Colorado, a suburban community that blends a strong appreciation for outdoor recreation with a supportive school environment. Her
    cultural upbringing emphasizes self‑reliance, community involvement, and a balanced appreciation of both tradition and innovation. Family gatherings often feature backyard barbecues, and holidays are
    celebrated with a mix of mainstream American customs and regional Colorado traditions such as seasonal hikes and farm‑to‑table meals. The community’s focus on school clubs, sports, and volunteerism
    has shaped her sociable, competitive, and curious nature.
