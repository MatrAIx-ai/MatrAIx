persona_description: A banker who specializes in the analysis of banking regulations and the impact of regulatory policies on the financial industry. He is particularly interested in the Recourse Rule and
  its impact on the profitability and vulnerability of banks. He is knowledgeable about the complex world of banking and the strategies of bankers, and is skilled in analyzing the heterogeneous strategies
  of bankers and the homogenization of these strategies by regulatory policies. He is also interested in the role of regulators in shaping the banking industry and the consequences of regulatory policies
  on the financial industry.
