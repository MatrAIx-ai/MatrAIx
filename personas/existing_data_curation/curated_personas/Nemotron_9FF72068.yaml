  career_goals: Sebastian is determined to become a Certified Public Accountant within the next two years, followed by a promotion to senior auditor and eventually finance manager at a regional firm. He
    plans to earn his GED, then pursue an associate degree in accounting while working full‑time, leveraging his practical experience to accelerate his advancement. In the longer term, his competitive drive
    fuels the ambition to launch his own boutique accounting practice that specializes in serving small Mexican‑American businesses and supports local arts initiatives with pro‑bono financial consulting.
    He also aims to develop a reputation for innovative audit solutions that incorporate the latest fintech tools.
