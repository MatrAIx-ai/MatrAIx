personas:
  professional: Sebastian Carrasco, a 33‑year‑old accountant, blends rigorous GAAP knowledge with advanced Excel, QuickBooks, and Power BI skills; they apply a skeptical, data‑driven lens to audits, constantly
    seeking fintech enhancements while their competitive nature fuels a relentless push toward CPA certification.
  sports: Sebastian Carrasco, a 33‑year‑old soccer enthusiast, plays weekly in the Houston Premier Soccer League, tracks the Houston Astros and Rockets with competitive fervor, and they fit in high‑intensity
    interval workouts to stay game‑ready, though occasional work stress leads to missed gym sessions.
  arts: Sebastian Carrasco, a 33‑year‑old art aficionado, spends weekends roaming Houston’s street‑art corridors and the Museum of Fine Arts, paints cityscapes inspired by William Eggleston’s photography,
    and they unwind at live shows featuring John Coltrane’s jazz recordings, Marc Anthony’s salsa rhythms, and Banda Los Recoditos, integrating these creative outlets into a disciplined yet imaginative
    lifestyle.
  travel: Sebastian Carrasco, a 33‑year‑old meticulous planner, prefers budget‑friendly cultural trips, having explored Mexico City’s historic centers and New Orleans’ jazz scene, and they dream of a weekend
    art‑focused getaway to Barcelona’s street‑mural districts, always booking flights and accommodations months in advance to fit his tight schedule and financial goals.
  culinary: Sebastian Carrasco, a 33‑year‑old home‑chef, balances intermediate cooking skills with a love for traditional Mexican fare—mastering tacos al pastor, enchiladas verdes, and mole poblano using
    fresh cilantro, ancho chilies, and homestyle corn tortillas—while they also host weekend barbecues that blend smoked brisket with spicy salsa roja for friends and family.
  core: Sebastian Carrasco, a data‑driven accountant who channels competitive curiosity into art, soccer, and fintech, often over‑analyzes budgets, wrestles with anxiety, and they can’t resist a late‑night
    taco after a jam session.
background:
  cultural: Sebastian grew up in a working‑class Mexican‑American family in the Houston metro area. His parents immigrated from Jalisco and instilled a strong sense of family loyalty, respect for elders,
    and pride in Mexican traditions such as Día de los Muertos, Cinco de Mayo, and the weekly sobremesa. Bilingual from childhood, he navigated both Spanish‑speaking community gatherings and English‑dominant
    school environments, which sharpened his adaptability but also contributed to his early departure from formal schooling to help support the household. Living in Richmond, Fort Bend County, he blends
    his heritage with Texan customs—enjoying barbecue, high school football, and the multicultural festivals that define the region. This dual cultural lens informs his work ethic, competitive spirit, and
    desire to give back to the community, especially through initiatives that empower other Mexican‑American families.
