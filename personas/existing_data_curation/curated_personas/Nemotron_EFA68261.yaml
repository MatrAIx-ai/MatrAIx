personas:
  professional: Joel Hyde, a seasoned general maintenance specialist with three decades of hands‑on expertise in HVAC, electrical, plumbing and small‑engine repair, blends his checklist‑driven method with
    a laid‑back flexibility that lets him troubleshoot unexpected issues while mentoring junior technicians as he pursues a senior supervisor role.
  sports: Joel Hyde supports the Indianapolis Colts and the Indiana Pacers, enjoys casual weekend rounds of golf at the community country club and daily walks along the White River trail for functional
    fitness, and participates in a local masters chess league as his mental sport.
  arts: Joel Hyde attends community‑theater productions like 'Our Town' by the local troupe, collects vinyl records of classic rock icons such as Led Zeppelin and country legends like Johnny Cash, and draws
    inspiration from Edward Hopper’s realist paintings while restoring vintage motorcycles.
  travel: Joel Hyde prefers low‑key, self‑planned road trips that combine his love of classic motorcycles with scenic fishing stops, having already explored the Kenai River in Alaska, the Grand Canyon’s
    rim, and dreaming of a Bavarian countryside motorbike tour, all while budgeting carefully for his upcoming retirement.
  culinary: Joel Hyde enjoys cooking hearty Midwestern fare, regularly grilling pork chops with apple sauce, smoking trout in a DIY smoker he built, and tossing a garden‑fresh vegetable stir‑fry using home‑grown
    tomatoes and bell peppers, favoring robust flavors over trendy health fads.
  core: Joel Hyde is a meticulous maintenance veteran who channels his love of structure into solitary hobbies, yet his stress‑prone nature keeps his retirement plans perpetually in the works.
background:
  cultural: Joel grew up in the rural Midwest of Indiana, a region where self-reliance, hard work, and community solidarity are core values. As a white American from a small town, his upbringing emphasized
    modesty, family responsibility, and a practical outlook on life. He was raised in a Protestant environment that reinforced a sense of duty to help neighbors and maintain harmonious relationships. Local
    traditions of hand-craftsmanship, seasonal community events, and a love for the outdoors continue to shape his worldview, fostering a preference for modest, close-knit social circles and a respect for
    routine complemented by the flexibility needed in everyday life.
attributes:
  skills: '[''Preventive maintenance scheduling'', ''Electrical troubleshooting'', ''Plumbing repairs'', ''HVAC servicing'', ''Carpentry and fixture installation'', ''Small engine repair'', ''Blueprint
    and schematic reading'', ''OSHA safety compliance'', ''Inventory management'', ''Vendor coordination'', ''Basic welding'', ''Customer service and communication'']'
  hobbies: '[''Fishing'', ''DIY woodworking'', ''Classic motorcycle restoration'', ''Gardening'', ''Amateur radio'', ''Chess'', ''Reading repair manuals'', ''Community theater attendance'', ''Volunteer
    work at food pantry'', ''Listening to classic rock and country music'']'
  career_goals: Approaching retirement age, Joel aims to secure a senior maintenance supervisor role at a local manufacturing or agricultural facility, where he can apply his extensive hands-on knowledge
    while mentoring younger technicians. He plans to earn a Certified Maintenance Manager (CMM) credential and obtain additional certifications in HVAC and electrical systems to bolster his qualifications.
    Simultaneously, he hopes to streamline his own workflow by adopting better organizational tools, reducing stress, and eventually transitioning to part-time consulting or a small independent maintenance
    service that offers greater flexibility and work-life balance.
