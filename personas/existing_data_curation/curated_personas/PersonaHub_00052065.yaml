persona_description: A postdoctoral fellow at the Hadassah-Hebrew University School of Medicine who has dedicated her research to the fight against brain cancer, specifically focusing on the genetic protein
  that is implicated in the development of glioblastoma. Her work has led to the identification of a mechanism called "splicing" that is altered in the splicing process when a person is sick, resulting
  in an alternative splicing. This discovery has the potential to lead to the development of a new treatment for brain cancer.
