  career_goals: Richard aspires to secure a tenure‑track faculty position within the next five years, building an interdisciplinary research program that links fundamental physics with sustainable energy
    solutions such as next‑generation photovoltaic materials. He aims to obtain multi‑year NSF or DOE funding to establish a state‑of‑the‑art laboratory that also serves as a training hub for underrepresented
    students, integrating mentorship, mental‑health awareness, and inclusive lab culture. In the long term, he envisions a leadership role that bridges academia and industry, creating community‑focused
    outreach initiatives and collaborative projects that translate scientific breakthroughs into tangible societal benefits while maintaining a supportive, harmonious work environment.
