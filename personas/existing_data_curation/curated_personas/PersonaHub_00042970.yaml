persona_description: A poet who is deeply interested in the modernist movement, particularly the works of Robert Frost, Wallace Stevens, T. S. Eliot, Ezra Pound, Marianne Moore, e. e. cummings, Robinson
  Jeffers, H. D. (Hilda Doolittle), Robert Graves, W. H. Auden, Archibald MacLeish, Basil Bunting, Robert Lowell, Philip Larkin, Stephen Spender, and others. The poet is skilled in employing hard, dry images
  to unravel the futility and anarchy of the present society. The poet is also skilled in the use of symbols, which he believes are the only possible expression of some invisible essence, a transparent
  lamp about a spiritual flame. The poet is interested in the concept of rhythm and how it can prolong the moment of contemplation, keeping the mind in a state of real trance.
