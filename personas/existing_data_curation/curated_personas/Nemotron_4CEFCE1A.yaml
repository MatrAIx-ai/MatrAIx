  career_goals: Looking ahead, Felipe aims to earn a Master’s in Educational Leadership within the next two years, followed by certification in early‑childhood administration. His long‑term ambition is
    to become a district director of early‑learning programs, where he can scale innovative, bilingual STEM initiatives across Maricopa County schools. He also plans to develop a city‑wide partnership network
    that connects schools with local tech firms and community organizations to create after‑school makerspaces, and to mentor emerging administrators, ensuring sustainable, equity‑focused growth.
