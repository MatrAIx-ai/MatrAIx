personas:
  professional: Shannon Bosman translates three decades of hospital administrative mastery into a consulting practice that streamlines budgeting, filing, and event coordination for small nonprofit groups,
    leveraging their competitive edge and love for precise spreadsheets while maintaining a reserved yet reliable demeanor.
  sports: Shannon Bosman follows the Houston Astros and the Houston Rockets, walks their Labrador on the Buffalo Bayou trail three times a week with a set route, and practices gentle senior yoga, treating
    physical activity as a structured regimen rather than a competitive sport.
  arts: Shannon Bosman expresses creativity through quilting patterns inspired by William Morris, enjoys listening to Debussy’s piano nocturnes, reads biographies of figures like Eleanor Roosevelt, and
    attends local productions of Tennessee Williams’ plays, allowing the arts to temper their analytical mindset.
  travel: Shannon Bosman prefers meticulously planned journeys that blend cultural exposure with predictability, such as a guided tour of Savannah’s historic squares, a weekend in the gardens of Versailles,
    and a pre‑programmed Caribbean cruise with daily itineraries set in advance.
  culinary: Shannon Bosman relies on Julia Child’s precise recipes to craft dishes like coq au vin, lemon‑garlic roasted salmon with fresh dill, and a seasonal ratatouille, favoring ingredients such as
    heirloom tomatoes, rosemary, and locally sourced quinoa for their reliable flavors.
  core: Shannon Bosman is a structured, competitive retiree who balances methodical budgeting, disciplined health routines, and quiet skepticism with a love for gardening, quilting, and meticulously planned
    travel.
background:
  cultural: Shannon is a white American born and raised in Houston, Texas, during the 1950s and 1960s. Her upbringing was shaped by a middle‑class post‑war environment that valued self‑reliance, punctuality,
    and community service. Influences from Southern hospitality and Protestant Christian traditions are evident in her emphasis on family gatherings, modest celebration of holidays, and participation in
    church activities. Although she appreciates Houston’s multicultural vibrancy, she maintains a cultural identity rooted in traditional Texan values—practicality, respect for order, and a competitive
    spirit tempered by personal responsibility. She speaks English with a subtle Texas accent and holds a strong sense of civic duty.
attributes:
