  hobbies: '[''Gardening'', ''Cooking'', ''Historical Nonfiction Reading'', ''Chess'', ''Bridge'', ''Crossword Puzzles'', ''Sudoku'', ''Quilting'', ''Volunteer Organizing'', ''Book Club'', ''Dog Walking'',
    ''Senior Yoga'']'
  career_goals: Although retired, Shannon seeks purposeful engagement by volunteering as a senior advisor for local non‑profits and her church, focusing on strengthening their administrative and financial
    processes. She aims to mentor younger women in budgeting and career planning, and to launch a modest consulting practice that offers structured organizational strategies to small community groups. She
    also intends to write a memoir that captures her life lessons on stability, competition, and resilience. Travel remains a personal ambition, with meticulously planned itineraries that balance cultural
    exposure and predictability. Maintaining health through regular walking, senior yoga, and balanced nutrition is also a core goal.
