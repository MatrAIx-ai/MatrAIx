    resolution and de-escalation'', ''Cash handling and basic bookkeeping'']'
  hobbies: '[''Cooking Mexican cuisine'', ''Salsa dancing'', ''Yoga'', ''Desert hiking'', ''Reading contemporary fiction'', ''Volunteering as an ESL tutor'', ''Watching Mexican cinema and listening to regional
    music'']'
  career_goals: Candida aims to complete an associate's degree in Business Administration within the next two years, followed by obtaining the Certified Administrative Professional (CAP) credential. She
    aspires to transition from receptionist roles to an office manager position in a community‑focused organization, such as a nonprofit serving Hispanic families or a healthcare clinic. Long‑term, she
    envisions leading a bilingual administrative team, using her cultural insight to improve service accessibility for Mexican‑American residents of Phoenix.
