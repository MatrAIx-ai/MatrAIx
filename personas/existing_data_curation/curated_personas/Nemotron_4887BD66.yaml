  career_goals: John aims to enroll in a community college program in electrical engineering technology, followed by an apprenticeship to become a licensed electrician. He aspires to blend his technical
    aptitude with his collaborative nature by eventually managing small‑scale construction projects or launching his own handyman service that emphasizes reliable, community‑focused work. In the longer
    term, he hopes to earn additional certifications in sustainable building practices and potentially transition into a project management role where he can apply his organizational strengths.
