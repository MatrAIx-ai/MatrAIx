personas:
  professional: Mariana Ramos, a seasoned management analyst with a knack for translating complex data into actionable insights, leverages their bilingual fluency and love for contemporary art to advise
    cultural institutions on strategic growth, while their spontaneous nature sometimes leads to missed deadlines in project timelines.
  sports: Mariana Ramos enjoys low‑impact fitness routines like yoga and leisurely walks in Central Park, while cheering on the New York Knicks and Yankees from the comfort of their home, preferring solitary
    exercise over team sports and occasionally joining a senior walking club at a local botanical garden.
  arts: Mariana Ramos spends weekends immersed in contemporary installations at MoMA, studies the works of artists like Olafur Eliasson and Yayoi Kusama, and curates a personal collection of vintage island
    ceramics, finding solace in solitary gallery visits and reflective sketching sessions.
  travel: Mariana Ramos favors quiet, art‑centric travel, planning solo trips to Florence’s Uffizi, Mexico City’s Frida Kahlo Museum, and the Caribbean’s historic towns, using travel points to keep costs
    low while seeking immersive cultural experiences over crowded tourist hotspots.
  culinary: Mariana Ramos delights in preparing traditional Caribbean dishes such as arroz con gandules, mofongo, and plantain fritters, mastering the balance of spices and fresh cilantro, and often cooks
    these meals as a meditative ritual while listening to classical piano recordings.
  core: Mariana Ramos blends analytical rigor with artistic curiosity, navigating life with disciplined financial habits, occasional health neglect, a love for solo museum strolls, and a penchant for spontaneous
    vintage‑ceramic finds.
background:
  cultural: Born into a proud Puerto Rican family that migrated to New York in the 1970s, Mariana grew up immersed in the vibrant Nuyorican community of the Bronx and later Manhattan. Her household blended
    Spanish and English, preserving traditions such as salsa music, bomba dancing, and festive holiday gatherings, while also encouraging academic achievement and civic involvement. The resilience and communal
    spirit of her heritage shaped her collaborative nature and deep respect for harmony. Mariana’s cultural identity informs her appreciation for the arts, particularly Caribbean visual expressions, and
    fuels her desire to elevate Latino voices within the broader art world. She remains connected to her roots through regular visits to Puerto Rico, participation in cultural festivals, and mentoring of
    young Puerto Rican professionals in the city.
