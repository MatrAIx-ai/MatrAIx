  career_goals: Mariana aims to transition into senior strategic consulting, focusing on integrating business analytics with cultural and artistic organizations. She aspires to serve on the board of a New
    York museum or nonprofit that promotes Latino art, leveraging her analytical acumen to drive sustainable growth and inclusive programming. Additionally, she seeks to mentor emerging Puerto Rican professionals,
    championing equitable workplace practices and fostering a new generation of women leaders in analytics and the arts.
