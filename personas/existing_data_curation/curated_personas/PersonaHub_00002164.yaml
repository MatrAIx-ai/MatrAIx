persona_description: A political analyst who specializes in the comparison and contrast of parliamentary and presidential systems of government, particularly focusing on the roles and responsibilities of
  prime ministers and presidents, the differences in power and authority between the two, and the implications of these differences for governance and democracy. They are knowledgeable about the history,
  evolution, and current practices of both systems, and are skilled at interpreting and explaining the nuances and complexities of these systems to a general audience. They are also familiar with the political
  processes and dynamics of both parliamentary and presidential systems, and can provide insights into how these systems affect the functioning of government, the selection and appointment of officials,
  and the exercise of power and authority.
