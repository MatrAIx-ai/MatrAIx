  hobbies: '[''Reading African‑American literature'', ''Historical fiction'', ''Genealogy research'', ''Gardening'', ''Quilting'', ''Cooking Southern soul‑food'', ''Nature walks'', ''Birdwatching'', ''Photography'',
    ''Listening to gospel and blues music'', ''Church women’s group'', ''Volunteering at literacy program'']'
  career_goals: Charee aims to earn a bachelor’s degree in counseling followed by a master’s in school counseling to become a certified school counselor, positioning herself for a leadership role within
    the Smith County school system. She also plans to launch a community resource hub that offers free career‑planning workshops, mentorship pairings with local businesses, and an online portal for underrepresented
    youth. Additionally, she hopes to mentor emerging counselors, present at regional education conferences, and author a guidebook on navigating post‑secondary pathways for non‑traditional students while
    integrating culturally responsive practices.
