personas:
  professional: Charee Rouse, a veteran educational guidance and career counselor in Smith County, blends two decades of expertise in academic advising, labor‑market analysis, and culturally responsive
    counseling with a curiosity‑driven yet relaxed workflow that allows them to craft detailed individualized education plans while sometimes letting paperwork pile up, and they assertively champion students’
    self‑advocacy even in the midst of a delightfully disorganized office.
  sports: Charee Rouse enjoys low‑impact fitness, taking daily walks on Natchez Trace State Park trails with the Smith County Birdwatching Club, and they cheer on the Tennessee Titans on Sundays while they
    also participate in a casual weekend baseball league affiliated with the Nashville Sounds alumni, balancing garden chores with relaxed, seasonal exercise.
  arts: Charee Rouse weaves stories through quilting while listening to the soulful hymns of Mahalia Jackson, the blues of B.B. King, and the empowering R&B of Beyoncé, and they draw literary inspiration
    from Toni Morrison and James Baldwin, believing that art serves as a bridge between personal reflection and community healing.
  travel: Charee Rouse favors relaxed road‑trip adventures that blend birdwatching in the Everglades, pottery workshops in Asheville, and culinary explorations in New Orleans, and they often plan these
    journeys on a shoestring budget after work hours while dreaming of a historical pilgrimage to Savannah’s cobblestone streets.
  culinary: Charee Rouse, an intermediate home chef with a passion for Southern soul‑food, regularly prepares collard greens simmered with smoked turkey, crisp fried catfish coated in cornmeal, and sweet‑potato
    pie scented with nutmeg and cinnamon, using garden‑grown sage and thyme, and they enjoy swapping recipe secrets over potluck gatherings with their quilting circle.
  core: Charee Rouse merges a restless curiosity with a relaxed, garden‑scented routine, turning counseling into soulful storytelling while they occasionally lose their planner among seed packets and quilting
    needles.
background:
  cultural: Charee is a Black woman raised in the close‑knit community of Lebanon, Tennessee, where Southern traditions intertwine with the rich heritage of African‑American culture. Her upbringing was
    shaped by church involvement, family gatherings centered on soulful music and hearty cooking, and a strong emphasis on resilience and community support. She carries forward the values of perseverance
    and solidarity, drawing on the history of the Black South to inform her counseling practice, and she actively celebrates her cultural roots through food, music, storytelling, and mentorship of the next
    generation.
attributes:
  skills: '[''Career counseling'', ''Academic advising'', ''Labor‑market analysis'', ''Resume and interview coaching'', ''College admissions guidance'', ''Individualized education plan development'', ''Community
