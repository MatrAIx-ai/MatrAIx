  hobbies: '[''Coaching Youth Soccer'', ''Volunteering with Habitat for Humanity'', ''Hiking and Birdwatching in Kickapoo State Park'', ''Traveling to historic sites with wife'', ''Attending live music
    concerts and community theater'', ''Reading historical non-fiction and business leadership books'', ''Woodworking (custom furniture)'']'
  career_goals: Steven aims to ascend to a senior executive role such as Director of Operations or Vice President of Business Development within the next five years, leveraging his expertise to lead large‑scale
    transformation initiatives that integrate sustainable practices and digital technologies. He is also passionate about mentoring the next generation of managers, establishing a formal leadership development
    program within his organization, and contributing to community economic development through partnerships with local universities and nonprofits. Ultimately, he envisions a balanced transition into a
    consulting advisory role that allows him to share his practical insights while maintaining a fulfilling work‑life balance with his family.
