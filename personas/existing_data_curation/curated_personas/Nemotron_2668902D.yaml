personas:
  professional: Steven Ramey is a veteran operations manager who leverages three decades of strategic planning, Six Sigma process improvement, and financial stewardship to drive ROI‑focused transformation;
    they balance curiosity about emerging tech with a pragmatic, team‑centric leadership style that values both data and people.
  sports: Steven Ramey is the head coach of the local youth soccer league, a dedicated member of the Kickapoo Trails Hiking Club, and a lifelong fan of the Chicago Bears, Chicago Cubs, and Indiana Hoosiers
    basketball, often attending games on weekends to stay energized and connected to the community.
  arts: Steven Ramey regularly attends live music performances by The Avett Brothers and local folk acts at the Illinois State Fairgrounds, and supports community theater productions at the Illiana Theatre,
    while also participating in book clubs that discuss historical nonfiction and modern leadership literature, enriching his appreciation for storytelling.
  travel: Steven Ramey and his wife plan meticulously for heritage trips, having explored Gettysburg, Independence Hall, and the Alamo, and they dream of visiting Colonial Williamsburg and the National
    Museum of African American History, balancing scheduled itineraries with spontaneous detours to small‑town diners for authentic local flavor.
  culinary: Steven Ramey enjoys crafting wood‑fired pizzas topped with heirloom tomatoes and smoked mozzarella, perfecting smoked brisket seasoned with dry rubs, and preparing rosemary‑infused roasted chicken,
    often experimenting with locally sourced corn and maple glaze in his home workshop kitchen, while his woodworking hobby inspires a meticulous, hands‑on approach to plating.
  core: Steven Ramey is a pragmatic idealist who transforms data into community impact, never misses a Sunday soccer game, and occasionally burns his fingers in the workshop while chasing the perfect finish.
background:
  cultural: Steven was raised in a middle‑class Midwestern family in central Illinois, where values of hard work, community responsibility, and humility were emphasized. His cultural upbringing reflects
    the traditional Midwest ethos of friendliness, pragmatism, and a strong belief in education, shaped by his parents’ encouragement to pursue higher learning and civic involvement. Living in Champaign,
    a university town, has further broadened his perspective, exposing him to diverse academic and cultural influences while reinforcing the importance of inclusive community engagement. This blend of Midwestern
    roots and university-town diversity informs his balanced, collaborative, and practical approach to both professional and personal life.
attributes:
  skills: '[''Strategic Planning'', ''Operations Management'', ''Financial Analysis & Budgeting'', ''Team Leadership & Development'', ''Project Management'', ''Process Improvement (Six Sigma Green Belt)'',
