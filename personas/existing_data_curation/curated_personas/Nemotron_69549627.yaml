  career_goals: Robert aims to complete a bachelor's degree in Business Administration while obtaining industry certifications such as CompTIA A+ and ITIL. He aspires to secure an entry‑level project coordination
    role within a technology firm, leveraging his blend of technical know‑how and organizational skills. Over the next five years, he hopes to progress into a managerial position overseeing corporate social‑responsibility
    initiatives that benefit his local community. Simultaneously, he plans to develop a modest freelance computer‑repair side business to gain practical experience and financial stability, while continuing
    to refine stress‑management techniques like mindfulness and structured planning to mitigate his tendency toward worry.
