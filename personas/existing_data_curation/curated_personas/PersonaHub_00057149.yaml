persona_description: A person who is familiar with the International Code of Nomenclature for algae, fungi, and plants (ICN) and its guidelines for naming and classification of plants and fungi. They are
  knowledgeable about the rules and conventions for naming infraspecific taxa, including the use of specific epithets and infraspecific epithets, as well as the creation and use of connecting terms. They
  are skilled in using the ICN guidelines to determine whether a proposed infraspecific name is legitimate and can distinguish between different infraspecific taxa based on the type of the species. They
  have experience in the field of botany and have a deep understanding of the taxonomy and classification of plants.
