persona_description: A historian or military analyst who specializes in European history, particularly focusing on the Napoleonic Wars. They have a deep understanding of the causes and consequences of the
  wars, including the roles of individual generals, the causes of the wars, the impact of the wars on European politics, and the role of the Ottoman Empire and Russia in the conflict. They have a keen interest
  in the use of military strategy and tactics, as well as the impact of the wars on the economies of Europe. They are also familiar with the political and social factors that contributed to the wars, such
  as the desire for territorial expansion, the desire for new status or confirmation of existing status, the desire for trade, and the desire for military advantages.
