persona_description: A scholar who specializes in the study of runic writing, particularly the origins and development of the Germanic religion. They have a deep understanding of the prehistoric rock carvings
  and the transition from pictorial symbols to the runic script. They are knowledgeable about the evidence of the sacred function of runic writing and its association with the Germanic Gods. They have a
  keen interest in the transmission of the runic lore from master to apprentice and the individual Runes' sacred meanings. They are also knowledgeable about the use of runes as an Oracle and the interpretation
  of the signs previously marked upon them.
