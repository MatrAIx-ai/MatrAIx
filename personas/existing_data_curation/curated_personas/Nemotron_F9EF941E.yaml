personas:
  professional: Juan Perez, a senior research associate with deep expertise in molecular immunology, leads pre‑clinical immunotherapy studies with a systematic, data‑driven approach, translating complex
    results into clear grant proposals and manuscripts while balancing curiosity for new methods with pragmatic project timelines, and they are known for meticulous experimental design and reliable project
    management.
  sports: Juan Perez channels their love of the outdoors into seasonal long‑distance hikes across the Idaho mountains, joins a local climbing club for weekend bouldering sessions, follows the Boise State
    Broncos football team, and occasionally participates in community 5K runs to stay active.
  arts: Juan Perez nurtures a quiet artistic side through landscape photography inspired by Ansel Adams, strategically planning shots of wildflowers during hikes, competing in weekly online chess tournaments
    on Lichess, indulging in historical nonfiction by authors like David McCullough and Yuval Noah Harari, and crafting custom wooden bookshelves, all while listening to the folk harmonies of Fleet Foxes
    and the classical arias of Cecilia Bartoli.
  travel: Juan Perez plans travel with meticulous itineraries, favoring solo adventure trips that combine photography and hiking, having trekked through Glacier National Park, the Grand Canyon, and Patagonia,
    and now longing to explore the cherry blossoms of Kyoto and the rugged highlands of Iceland, all while balancing a modest travel budget against their research commitments.
  culinary: Juan Perez finds therapeutic rhythm in preparing pork tamales and chocolate mole poblano, meticulously grinding masa harina, roasting dried pasilla and mulato chilies, and slow‑cooking the mole
    with almonds, sesame seeds, and a hint of dark chocolate, while also experimenting with cedar‑plank salmon and seasonal vegetable roasts.
  core: Juan Perez blends methodical scientific rigor with solitary creative pursuits, using meditation, hiking, and elaborate cooking to manage intense anxiety, yet they often over‑schedule projects and
    give in to spontaneous gear splurges.
background:
  cultural: Juan was born to Mexican parents who immigrated to the United States in the early 1980s. Raised in a bilingual household, he celebrates Día de los Muertos, family reunions, and traditional holidays
    while also embracing the individualistic values of his American upbringing. His deep respect for family, community, and education reflects Mexican cultural values, and he maintains regular contact with
    relatives in Mexico. Living in rural Idaho, Juan integrates his heritage with the local community, often volunteering as a Spanish-language health educator at county clinics, thereby bridging cultural
    gaps and fostering mutual understanding.
attributes:
  skills: '[''Molecular biology techniques'', ''Cell culture and tissue engineering'', ''Immunoassays (ELISA, flow cytometry)'', ''Statistical analysis (R, Python)'', ''Scientific writing and grant proposals'',
    ''Project management and experimental design'', ''Regulatory compliance (FDA guidelines)'', ''Data visualization (ggplot2, Tableau)'', ''Bioinformatics pipeline development'']'
  hobbies: '[''Hiking and nature photography'', ''Cooking traditional Mexican cuisine'', ''Meditation and mindfulness journaling'', ''Chess'', ''Reading historical non-fiction'', ''DIY woodworking'', ''Home
    gardening (herbs, vegetables)'', ''Volunteering at local community health clinics (Spanish)'']'
  career_goals: Juan aims to transition from a senior research associate to a principal investigator leading his own lab focused on novel immunotherapies for autoimmune diseases. He aspires to secure independent
    funding through NIH and private foundations, publish high-impact papers, and eventually translate his discoveries into clinical trials. Long-term, he hopes to mentor junior scientists, particularly
    those from underrepresented backgrounds, and to foster collaborations between U.S. research institutions and Mexican academic partners to address health disparities.
