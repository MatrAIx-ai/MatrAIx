  career_goals: Vi aims to become a store manager within the next two years, leveraging her associate degree in business administration to pursue a bachelor's degree part‑time. She plans to earn a Retail
    Management Analytics certificate and expand her expertise in omnichannel retail, including click‑and‑collect and digital inventory solutions. Long‑term, she envisions moving into a district‑manager
    role where she can mentor a larger cohort of supervisors and champion inclusive, harmonious workplace cultures. Eventually, she hopes to use her accumulated knowledge to open a boutique that blends
    contemporary design with cultural heritage, offering a curated shopping experience rooted in community values.
