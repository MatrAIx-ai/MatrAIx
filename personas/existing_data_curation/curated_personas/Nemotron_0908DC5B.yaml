personas:
  professional: Vi Shum, a 29‑year‑old retail supervisor in Los Angeles, they blend three years of front‑line leadership, bilingual communication, and data‑driven process improvements to build harmonious,
    high‑performing teams while pursuing a part‑time bachelor's degree and a retail analytics certificate.
  sports: Vi Shum, an active member of the SoCal Hiking Club, they tackle the trails at Sawmill Outpost, cheer on the Los Angeles Lakers and LAFC, and balance their fitness routine with weekly yoga that
    doubles as a mindfulness practice.
  arts: Vi Shum, an avid museum-goer, they find artistic solace in exhibitions by Cai Guo‑Qiang and Takashi Murakami, enjoy indie sounds from Mitski and Rina Sawayama, and unwind with intimate board‑game
    evenings featuring Pandemic and Azul.
  travel: Vi Shum, a nature‑focused traveler, they have road‑tripped along California’s Pacific Coast Highway and trekked the Redwood Forest, while dreaming of a solo expedition to New Zealand’s South Island
    to combine hiking with quiet meditation.
  culinary: Vi Shum, a budding home‑cook, they perfect bubble tea with fresh tapioca pearls, craft Korean bibimbap using gochujang and a rainbow of vegetables, and experiment with matcha‑infused desserts,
    though they sometimes over‑season their kimchi.
  core: Vi Shum, a meticulous yet quietly curious professional, they weave community‑oriented work ethic with solitary hobbies, hoard succulents, whisper TED talk quotes during yoga, and can’t resist a
    late‑night bubble‑tea binge after a perfectly organized day.
background:
  cultural: Vi is a second‑generation East Asian American; her parents emigrated from Taiwan to Los Angeles in the early 1990s. Raised bilingual, she celebrates Lunar New Year and the Mid‑Autumn Festival
    with family, preparing traditional dishes and joining community events at local cultural centers. The Confucian values of respect for elders, dedication to education, and collective harmony shape her
    cooperative nature and emphasis on team cohesion. While deeply connected to her heritage, Vi also embraces Southern California lifestyle—hiking, outdoor yoga, and multicultural culinary exploration.
    She is an active member of a regional Asian‑American professional networking group, which reinforces both her cultural identity and career aspirations.
