personas:
  professional: David Wilkinson, a curious 12‑year‑old aspiring game developer, combines a knack for building intricate LEGO sets with Scratch coding to create narrative‑driven mini‑games, channeling their
    practical side into organized project plans while still leaving room for spontaneous story twists.
  sports: David Wilkinson enjoys weekend snowboarding at the nearby Aspen Snowmass slopes, follows the Denver Broncos and Colorado Avalanche with fervor, participates in the Junior Trailblazers Hiking Club
    for local forest treks, and trains with the Kids Ski Club to improve balance and endurance.
  arts: David Wilkinson finds inspiration in the lyrical storytelling of Billie Eilish, the imaginative worlds of J.K. Rowling and Neil Gaiman, sketches fan art of Pixar’s Inside Out characters in their
    journal, and studies the cinematic techniques of director Hayao Miyazaki to enhance their own game narratives.
  travel: David Wilkinson prefers meticulously planned family road trips to national parks like Yosemite and Banff, dreams of visiting Tokyo’s Akihabara for its gaming culture, balances adventure with comfort
    by packing a sketchbook for quiet moments, and often curates travel playlists featuring Imagine Dragons.
  culinary: David Wilkinson enjoys cooking simple meals such as mac and cheese, spaghetti Bolognese, and chocolate‑chip pancakes, experiments with trail‑mix recipes featuring dried cranberries, almonds,
    and dark chocolate, and delights in making s’mores over a backyard fire pit during weekend gatherings.
  core: David Wilkinson is a curious yet anxious 12‑year‑old who merges LEGO engineering with Scratch game design, obsessively journals moods, and sometimes trades careful budgeting for impulsive Minecraft
    purchases.
background:
  cultural: David comes from a white, middle‑class family in Orem, Utah County. The community emphasizes family cohesion, academic achievement, and outdoor recreation. Local cultural influences include
    participation in community service projects, seasonal activities like skiing and hiking, and a subtle undercurrent of the region's broader values of self‑reliance and modesty. While not strongly tied
    to a specific religious practice, his upbringing reflects the typical suburban Utah environment that balances traditional family life with opportunities for personal exploration.
attributes:
  skills: '["Basic computer literacy", "Scratch programming", "DIY electronics and crafting", "Project planning and organization", "Hardware troubleshooting", "Nature observation"]'
  hobbies: '["Reading science‑fiction novels", "Building LEGO models", "Playing Minecraft", "Scratch game development", "Hiking local trails", "Birdwatching", "Journaling and sketching", "Skiing on nearby
    slopes"]'
  career_goals: David aspires to become a software engineer focused on creating educational games and apps that help kids manage anxiety. He plans to graduate high school with strong STEM grades, pursue
    a computer science degree, and later contribute to mental‑health tech initiatives. He also harbors a secondary interest in environmental science, hoping to combine coding with conservation projects
    in Utah's national parks.
