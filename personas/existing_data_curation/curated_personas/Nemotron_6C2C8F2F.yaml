  career_goals: Although retired from formal employment, Glenda remains driven to leave a lasting positive impact on her community. She aims to mentor younger volunteers at the local senior center, expand
    a garden‑share program that supplies fresh produce to homebound elders, and document oral histories of long‑time Alexandria residents for the town archive. She also hopes to compile a memoir of her
    family's Southern traditions and recipes, preserving cultural knowledge for future generations. Her long‑term ambition is to foster intergenerational connections that sustain the town’s sense of belonging
    and mutual support.
