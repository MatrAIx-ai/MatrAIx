personas:
  professional: Lori Wooster, a veteran special‑education teacher with two decades of experience, blends rigorous data‑driven IEP design, assistive‑technology integration, and art‑infused STEM lessons while
    quietly critiquing school policies on a personal blog, navigating their naturally relaxed, slightly disorganized workflow with a fiercely curious and skeptical mindset.
  sports: Lori Wooster, a dedicated member of the Lake County Trails Association, spends weekends hiking the dense forest paths and birdwatching while cheering on the Chicago Cubs in the spring and the
    Chicago Bulls during the NBA season, preferring low‑intensity endurance over high‑impact workouts and occasionally joining a local paddle‑tennis league for a competitive social spark.
  arts: Lori Wooster, an avid sketcher of Chicago’s skyline and mixed‑media collage creator, draws inspiration from contemporary visionaries such as Kara Walker and Cindy Sherman, devotes weekends to the
    Museum of Contemporary Art, and winds down listening to Philip Glass’s minimalist scores while occasionally catching a performance by the Chicago Symphony Orchestra.
  travel: Lori Wooster favors solo, loosely planned getaways that blend quiet reflection with cultural immersion—having trekked the ancient temples of Kyoto, strolled the art‑lined streets of Florence,
    and hiked the red rocks of Sedona, they now dream of a low‑budget expedition to Patagonia’s Torres del Paine while balancing a modest retirement savings plan.
  culinary: Lori Wooster, a competent home cook with a penchant for experimental flavor pairings, regularly prepares wild mushroom risotto using black garlic and a pinch of saffron, indulges in Chicago‑style
    deep‑dish pizza on lazy evenings, and explores fermented kimchi recipes, all while sourcing fresh heirloom tomatoes and locally foraged greens from the Lake County farmers’ market.
  core: Lori Wooster, a 52‑year‑old solitary scholar who merges art with STEM, navigates life with a relaxed, slightly scatterbrained rhythm yet a relentless curiosity and skeptical edge, turning every
    puzzle—be it a cryptic crossword or an IEP—into a personal challenge.
background:
  cultural: Lori was raised in the suburban environment of Lake County, Illinois, a region shaped by Midwestern values of independence, community involvement, and a strong emphasis on education. Her family,
    of German and Irish ancestry, emphasized curiosity, self‑reliance, and cultural appreciation, encouraging trips to local museums, theater performances, and science fairs. Growing up near Chicago, she
    was exposed to a vibrant arts scene and a diverse population, fostering an early appreciation for both the visual arts and scientific inquiry. This background instilled in her a blend of pragmatic problem‑solving
    and a deep respect for cultural expression, which continues to inform her teaching philosophy and personal pursuits.
attributes:
  skills: '[''Differentiated instruction for diverse learners'', ''Assistive technology integration'', ''IEP development and compliance'', ''Data‑driven assessment and progress monitoring'', ''STEM curriculum
    adaptation for special education'', ''Project‑based and inquiry‑based learning design'', ''Interdisciplinary collaboration with allied professionals'', ''Arts‑integrated teaching strategies'']'
  hobbies: '[''Sketching and mixed‑media collage'', ''Visiting contemporary art museums'', ''Reading philosophy, neuroscience, and educational research'', ''Maintaining a personal blog on teaching technology'',
    ''Solo hiking and birdwatching in Lake County trails'', ''Solving cryptic crosswords and logic puzzles'', ''Coding simple educational apps'']'
  career_goals: Lori aims to leverage her expertise to influence district‑wide special education policy, particularly the integration of inclusive STEM pathways. Over the next five years, she plans to earn
    an Ed.D. focusing on universal design for learning, publish research on art‑enhanced STEM instruction for students with disabilities, and secure a position as the lead special‑education coordinator
    for Lake County schools. She also aspires to mentor emerging teachers through a professional development series and to develop a community outreach program that partners local art institutions with
    special‑needs classrooms, fostering broader societal inclusion. Ultimately, she envisions becoming a recognized advocate and thought leader who shapes equitable educational practices at both the state
    and national levels.
