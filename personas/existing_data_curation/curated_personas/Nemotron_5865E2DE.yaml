  hobbies: '["Mixed-media painting", "Visiting art galleries", "Open mic poetry", "Dance classes (hip‑hop & contemporary)", "Reading speculative fiction", "Philosophy book club", "Strategy board games (Settlers
    of Catan)", "Community basketball", "Volunteering art workshops for youth", "Cooking soul food with modern twists", "Karaoke", "Exploring new coffee shops"]'
  career_goals: Destanie aims to transition from frontline material moving to a supervisory role within the next two years, targeting a position as a warehouse shift supervisor where she can implement efficiency
    initiatives and mentor new hires. Long term, she envisions becoming a warehouse operations manager or launching a boutique logistics consulting firm that helps small businesses streamline their supply
    chains. Parallel to her professional trajectory, she aspires to open a community art space that offers workshops and showcases local talent, merging her logistical expertise with her passion for art
    and community engagement.
