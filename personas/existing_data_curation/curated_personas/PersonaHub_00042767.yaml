persona_description: A wildlife biologist who specializes in studying the behavior, ecology, and adaptation of small wild predators in urban and suburban areas of North America. He has been studying coyote
  populations near Chicago for 12 years and has observed the coyotes' ability to adapt to an urban lifestyle. He believes that the coyote's success in adapting to an urban lifestyle could pave the way for
  larger carnivores to move in, and that the larger ones poised to invade are wolves, mountain lions, and bears.
