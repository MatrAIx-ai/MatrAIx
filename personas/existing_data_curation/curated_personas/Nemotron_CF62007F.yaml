  career_goals: Julie aims to advance into a Nurse Manager or Clinical Nurse Leader role within the next five years, pursuing a Master of Science in Nursing with a focus on health informatics or nursing
    education. She plans to earn board certification in a specialty such as emergency or oncology nursing and to obtain a case‑management credential. A key ambition is to design and implement an evidence‑based
    art‑therapy program that integrates creative activities into postoperative recovery and chronic‑illness care. Julie also seeks to lead hospital‑wide quality‑improvement projects that reduce infection
    rates and improve patient satisfaction scores. She aspires to publish research on innovative nursing practices, present at national conferences, and mentor the next generation of nurses through formal
    preceptorship programs. In the long term, she envisions contributing to health‑policy advocacy focused on equitable access to holistic patient care.
