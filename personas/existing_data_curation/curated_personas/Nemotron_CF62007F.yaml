personas:
  professional: Julie Edwards, a seasoned registered nurse with expertise in rapid triage, health informatics, and evidence-based quality improvement, leverages their curiosity, competitive drive, and knack
    for blending artistic therapy into patient care to lead interdisciplinary teams and mentor new clinicians.
  sports: Julie Edwards powers their fitness routine with sunrise runs along the St. Johns River in spring, weekly Zumba classes at the community center, monthly hikes with the Timucuan Trailblazers club,
    and cheers on the Jacksonville Jaguars, Florida Gators, and Jacksonville Jumbo Shrimp while occasionally joining a co-ed softball league in the summer.
  arts: Julie Edwards channels their curiosity into watercolor landscapes inspired by Georgia O'Keeffe's palette, captures eclectic Jacksonville street scenes with a vintage Nikon, frequents the Cummer
    Museum to study Ansel Adams prints, and energizes their social life at live shows featuring Larkin Poe and local salsa bands.
  travel: Julie Edwards favors spontaneous weekend road trips that blend Southern charm such as a culinary detour through Savannah's historic district and a sunrise hike in the Florida Keys with occasional
    overseas escapes to Barcelona's tapas bars and the Greek islands, always planning itineraries that include art galleries and live music venues.
  culinary: Julie Edwards is an intermediate home chef who fuses Southern comfort with Mediterranean flair, regularly preparing shrimp and grits spiced with harissa, collard-green pesto pasta, and citrus-marinated
    lamb with sweet-potato mash, while gathering fresh basil, olives, smoked paprika, and feta from the local farmers' market.
  core: Julie Edwards is a curiosity-driven nurse who mixes scientific rigor with artistic flair, balances competitive ambition with Southern generosity, suffers from occasional coffee-induced insomnia,
    and has a quirky habit of hoarding stray succulents for the kitchen windowsill.
background:
  cultural: Julie grew up in a middle‑class, white family in the southeastern United States, where she internalized Southern hospitality, a strong work ethic, and a respect for community service. Her upbringing
    in the Jacksonville‑area exposed her to a diverse patient population early on, fostering cultural competence and an appreciation for varied perspectives. The experience of divorce in her early thirties
    reinforced her independence and resilience, shaping a pragmatic yet open‑minded outlook. Her academic path in a STEM field and career as a registered nurse reflect a deep value placed on scientific
    inquiry and evidence‑based decision making. While she celebrates traditional American holidays and enjoys Southern cuisine, she actively seeks out multicultural experiences through travel, art, and
    community involvement, blending her roots with a progressive, inclusive worldview.
