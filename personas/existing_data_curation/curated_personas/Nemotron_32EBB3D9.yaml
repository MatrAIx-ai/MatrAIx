personas:
  professional: Blanca Domínguez, a seasoned medical assistant with 20+ years in fast‑paced outpatient clinics, leverages their methodical precision and bilingual fluency to streamline patient intake, manage
    clinic logistics, and design art‑infused health education, while eyeing the CMA credential and a supervisory role.
  sports: Blanca Domínguez, an energetic 56‑year‑old, treats weekly salsa and merengue socials as cardio, participates in a local walking club that meets at Freedom Park, and they root for the Charlotte
    Hornets and Carolina Panthers while occasionally joining a community softball league for fun.
  arts: Blanca Domínguez, an abstract painter who splashes vibrant hues onto large canvases, regularly joins neighborhood mural projects, and they draw inspiration from Yayoi Kusama and Frida Kahlo, attending
    Latin‑dance performances featuring artists like Gloria Estefan and integrating art and movement into daily life.
  travel: Blanca Domínguez, a curiosity‑driven traveler, has explored the historic streets of Granada, savored the markets of Oaxaca, and dreams of hiking the volcanic trails of Guatemala while also planning
    relaxed beach days in Puerto Vallarta and cultural tours of Barcelona’s modernist architecture.
  culinary: Blanca Domínguez, a self‑taught home chef, they perfect baleadas with refried beans, cheese, and avocado, simmer sopa de mondongo with robust spices, and roll tamales using corn masa and pork,
    often experimenting with plantain flour and fresh cilantro to keep their kitchen lively.
  core: Blanca Domínguez blends methodical medical expertise with vivid artistic imagination, turning clinic routines into community canvases while dancing through life’s challenges with organized flair
    and occasional splurges on paint.
background:
  cultural: Blanca was born in Honduras and immigrated to the United States in her early twenties. She maintains a strong connection to her Central‑American roots, speaking fluent Spanish and celebrating
    Honduran holidays such as Independence Day, Feria Juniana, and Día de la Madre. In Charlotte, she is an active member of the Honduran community association, attending cultural festivals, supporting
    newcomers, and sharing traditional music and cuisine. Her Catholic upbringing informs her values of family solidarity and service, while her experience in the U.S. has blended Southern hospitality with
    the warmth of her native culture. This bicultural perspective shapes her compassionate approach to patient care, allowing her to serve as a cultural bridge for Hispanic patients navigating the American
    healthcare system.
attributes:
  skills: '[''Patient registration and scheduling'', ''Vital signs measurement and triage'', ''Electronic health record management (Epic, Cerner)'', ''Medical terminology and clinical documentation'', ''Basic
    phlebotomy and specimen handling'', ''Infection control and safety compliance'', ''Bilingual communication (Spanish‑English) for patient education'', ''Health‑education material creation with artistic
    elements'', ''Office inventory and supply management'', ''Team coordination and informal staff mentorship'']'
  hobbies: '[''Abstract painting'', ''Latin dance (salsa, merengue)'', ''Cooking traditional Honduran cuisine'', ''Volunteering at community health fairs'', ''Gardening'', ''Reading speculative fiction'',
    ''Participating in local art workshops'', ''Walking clubs with friends'']'
  career_goals: Blanca aims to earn the Certified Medical Assistant (CMA) credential and step into a supervisory role as Lead Medical Assistant or Clinic Coordinator, where she can leverage her organizational
    strengths and mentor newer staff. Long‑term, she envisions establishing a community health outreach program in Charlotte that integrates culturally tailored health education with art‑therapy sessions
    for immigrant populations. She also hopes to complete her GED and explore a certificate in health education, positioning herself to transition into a formal Health Educator role that bridges clinical
    care and community wellness.
