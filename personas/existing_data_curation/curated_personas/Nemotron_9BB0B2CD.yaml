personas:
  professional: Hirut Gibson is an aspiring fantasy concept artist who blends meticulous digital tool mastery with a vivid imagination, juggling school assignments and weekly drawing sessions while staying
    organized enough to meet deadlines for school projects and art club responsibilities.
  sports: Hirut Gibson practices gymnastics at a local youth club three times a week, cheers for the Los Angeles Lakers during the NBA season, and follows the Seattle Sounders FC in soccer, preferring low‑impact
    activities that keep them flexible for hours of sketching.
  arts: Hirut Gibson creates intricate fantasy landscapes inspired by digital artists like Ross Tran and Sakimichan, the animated storytelling of Hayao Miyazaki, listens to R&B singers H.E.R. and SZA alongside
    instrumental scores by Hans Zimmer and Joe Hisaishi, and regularly visits the NSU Art Museum for fresh artistic ideas.
  travel: Hirut Gibson favors thoughtfully planned, low‑key trips that combine learning and imagination, having taken a weekend road trip to Washington, D.C. to explore the Smithsonian’s National Air and
    Space Museum, a family visit to New York City’s Met for art inspiration, and dreaming of an adventure to Kyoto, Japan to soak in historic temples and Akihabara’s anime culture.
  culinary: Hirut Gibson enjoys avocado toast topped with smoked salmon for breakfast, devours spicy ramen with soft‑boiled eggs from a favorite delivery spot for lunch, and spends weekends baking chocolate
    chip cookies and decorating cupcakes with edible glitter, using their moderate cooking skills to merge precise measurements with artistic plating.
  core: Hirut Gibson is a solitary dream‑weaver who channels boundless imagination into detailed fantasy art, meticulously balances a teen‑level budget, and quietly battles occasional neck strain from marathon
    sketching sessions.
background:
  cultural: Hirut is an African‑American teen growing up in Fort Lauderdale’s vibrant, multicultural Broward County. Her family’s roots trace back to the Southern United States and the Caribbean, exposing
    her to a blend of traditions, music, and storytelling. Community programs at the local library and youth art workshops have nurtured her creative talents, while church gatherings provide a supportive
    network that values education and artistic expression. The diverse cultural scene of South Florida—including Haitian, Jamaican, and Latin influences—shapes her aesthetic sensibilities and inspires her
    to create inclusive, globally‑aware artwork.
