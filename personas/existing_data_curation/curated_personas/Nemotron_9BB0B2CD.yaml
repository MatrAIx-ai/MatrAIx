  career_goals: Hirut aspires to become a multimedia artist and concept designer, creating fantasy worlds for video games, graphic novels, or animation. She dreams of attending a specialized arts high school
    and later a college program in visual arts or game design, where she can blend her storytelling passion with technology. In the longer term, she hopes to lead a creative studio that produces inclusive,
    imaginative content that reflects diverse cultures.
