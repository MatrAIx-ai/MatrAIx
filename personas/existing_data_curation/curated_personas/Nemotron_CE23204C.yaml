  hobbies: '[''Cooking'', ''Community theater'', ''Swing dancing'', ''Gardening'', ''Hiking'', ''Reading mystery novels'', ''Board games'', ''Volunteering at food bank'', ''Farmers market visits'']'
  career_goals: Melissa hopes to move into a supervisory role within the next two years, aiming to become a shift manager or assistant restaurant manager at a local eatery. She is also considering enrolling
    in an associate program in hospitality management to earn a formal qualification. Long-term, she dreams of opening a small neighborhood cafe that doubles as a community gathering space, offering live
    music and cooking classes. While she values career advancement, she wants to maintain a flexible schedule that allows her to stay involved in community volunteering.
