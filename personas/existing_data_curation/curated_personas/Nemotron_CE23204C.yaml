personas:
  professional: A seasoned front-of-house veteran with over three decades of high-volume dining experience, Melissa Johnson leverages an uncanny memory for menu items, rapid order taking, and a warm, sociable
    demeanor to forge personalized guest connections, while her curiosity drives continuous learning of new service trends and her spontaneous nature fuels creative problem‑solving in bustling shifts, all
    as she eyes a shift‑manager role and eventually a community‑focused café.
  sports: Melissa Johnson embraces outdoor fitness through weekly hikes in Kokosing State Forest and a Saturday morning jogging club, roots for the Cleveland Browns and the Cincinnati Reds, and occasionally
    joins a local senior volleyball league, balancing her love of nature with the camaraderie of team sports.
  arts: Melissa Johnson channels her love for performance into community theater productions of classics like 'Our Town' and swing‑dance evenings featuring the music of Ella Fitzgerald and Frank Sinatra,
    while unwinding with mystery novels by Agatha Christie and Tana French, and occasionally attends local concerts by the Ohio Symphony Orchestra.
  travel: Melissa Johnson prefers spontaneous road trips to nearby natural gems like Hocking Hills and Shenandoah National Park, but also savors occasional overseas culinary pilgrimages—having explored
    the tapas bars of Barcelona, the trattorias of Florence, and dreaming of the street food markets of Kyoto—balancing limited vacation days with a flexible work schedule that allows her to book flights
    on a whim.
  culinary: Melissa Johnson, an experimental home chef, delights in crafting dishes like Korean bibimbap with gochujang, Mediterranean lamb tagine with preserved lemons, and miso‑glazed salmon, often sourcing
    fresh heirloom tomatoes and heirloom carrots from the farmers market, and can be found perfecting a sourdough starter while humming swing tunes from her favorite dance nights.
  core: Melissa Johnson blends seasoned hospitality expertise with a restless curiosity, spontaneously juggling community theater rehearsals, swing‑dance nights, and experimental cooking, all while occasionally
    overcommitting herself and forgetting to bill a few tables.
background:
  cultural: Melissa grew up in a working-class, white, Midwestern family in Ohio, with roots tracing back to German and Irish ancestors who settled the region in the early 20th century. Raised in a Protestant
    (Methodist) community, she absorbed values of hard work, modesty, and neighborly support. The small-town culture of Xenia, with its traditions of local festivals, church gatherings, and a strong sense
    of communal responsibility, shapes her friendly, cooperative nature and her dedication to preserving community bonds.
attributes:
  skills: '[''Customer Service'', ''Order Taking'', ''POS System Operation'', ''Cash Handling'', ''Food Safety Compliance'', ''Conflict Resolution'', ''Upselling'', ''Event Coordination'', ''Team Training'',
