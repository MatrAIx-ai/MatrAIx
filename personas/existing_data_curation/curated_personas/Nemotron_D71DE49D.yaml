    ''Conflict mediation in volunteer groups'', ''Book club facilitation'']'
  hobbies: '[''Watercolor painting'', ''Vegetable and flower gardening'', ''Birdwatching'', ''Book club participation and discussion leading'', ''Genealogy research'', ''Traveling to historic sites in New
    York'', ''Community theater acting'', ''Volunteering as arts center usher'', ''Yoga and mindfulness meditation'', ''Experimental cooking and trying new recipes'']'
  career_goals: While officially retired, Christina is driven to keep learning and giving back. She hopes to develop a series of free community art‑history classes at the Johnson City public library, expand
    the intergenerational storytelling project she started, and write a memoir that captures her teaching journey and the cultural changes she has witnessed. She also aims to become a senior advisor on
    the local arts council, deepen her knowledge of digital photography, and advocate for increased accessibility for older adults in cultural institutions. Ultimately, she wishes to leave a lasting legacy
    of curiosity, openness, and community connection for younger generations.
