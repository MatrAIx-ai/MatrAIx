  hobbies: '["Korean cooking","Yoga","Hiking in nearby parks","Reading career development literature","K‑Pop music and dancing","Volunteering in community centers","Attending cultural festivals","Language
    exchange meetups","Board games with friends","Traveling to Korea"]'
  career_goals: Myungsook aims to earn a bachelor's degree in counseling or psychology within the next two years, followed by certification as a Licensed Professional Counselor. She aspires to become the
    lead guidance coordinator for a large high school in Queens, designing bilingual career‑development curricula and mentorship programs for first‑generation Asian‑American students. Long‑term, she dreams
    of founding a community‑based career‑development nonprofit that offers free workshops, internship placements, and college‑application support for under‑represented youth in New York City.
