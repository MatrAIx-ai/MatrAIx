personas:
  professional: Myungsook Choi, a 28-year-old career counselor in Queens, they blend meticulous data‑driven guidance with warm, group‑focused workshops, leveraging bilingual fluency, conflict‑resolution
    skills, and a practical curiosity to design actionable career pathways for immigrant youth.
  sports: Myungsook Choi spends weekends hiking the trails of Flushing Meadows‑Corona and Van Cortlandt, they also practice yoga three times a week, cheer for the New York Knicks and New York Mets, and
    belong to the Flushing Meadows Hiking Club, often joining group runs in early spring.
  arts: Myungsook Choi regularly attends film screenings showcasing contemporary cinema from their home country, they enjoy concerts by the global pop group BTS, study choreography in workshops led by celebrated
    performer Jimin, and admire performances by acclaimed actor Song Kang‑ho.
  travel: Myungsook Choi plans annual trips to reconnect with family in their country of origin, they dream of exploring the historic streets of Kyoto and the vibrant nightlife of Barcelona, and they prefer
    meticulously crafted itineraries that balance cultural immersion with budget‑friendly accommodations.
  culinary: Myungsook Choi loves preparing kimchi jjigae, bibimbap, and japchae using gochujang, fermented cabbage, toasted sesame oil, and rice noodles, they often showcase these dishes at neighborhood
    potlucks where friends admire their skillful balance of flavors and traditional techniques.
  core: Myungsook Choi is a methodical, people‑centered career coach who blends data‑driven counseling with heartfelt community service, while they juggle yoga, hiking, and a zest for cooking and global
    pop culture, all underpinned by a practical curiosity and occasional indulgent spending on culinary treats.
background:
  cultural: Myungsook is a second‑generation Korean‑American. Her parents immigrated to Queens in the early 1990s, and she grew up speaking Korean at home while navigating the U.S. school system. She celebrates
    Korean holidays such as Seollal and Chuseok, participates in a local Korean church, and values the community‑centered ethos of her heritage. This cultural foundation inspires her dedication to supporting
    immigrant youth and bridging educational gaps between Korean‑speaking families and American institutions.
attributes:
