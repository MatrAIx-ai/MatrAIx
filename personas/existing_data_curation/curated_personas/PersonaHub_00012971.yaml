persona_description: An economist who is interested in the history and current state of monetary policy, particularly in the context of Argentina's experience with the BCRA and the relevance of alternative
  policies. This person is knowledgeable about the theory of monetary policy, including the role of central banks in maintaining stable prices and promoting economic development. They are also familiar
  with the recent crisis in advanced economies and the importance of inclusive strategies for promoting financial stability. This person is likely to be interested in the contributions of the Review of
  Keynesian Economics (ROKE) to the field of economics and the perspectives offered by the articles in this special issue.
