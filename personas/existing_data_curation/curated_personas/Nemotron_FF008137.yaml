  career_goals: Even at four, Michael dreams big. He imagines becoming a firefighter because he admires the practical heroism and the chance to help others, reflecting his blend of curiosity and practicality.
    He also talks about being a park ranger or explorer, eager to discover bugs and rocks in the woods behind his home. A competitive streak fuels his ambition to be a soccer champion, and his love of building
    fuels a future as a builder or LEGO designer. These aspirations are shaped by his energetic, sociable nature and his desire for tangible, hands‑on experiences.
