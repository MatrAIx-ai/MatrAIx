  hobbies: '[''Acrylic painting'', ''Digital illustration'', ''Reading speculative fiction and philosophy'', ''Writing short stories'', ''Tabletop RPGs (e.g., Dungeons & Dragons)'', ''Attending local art
    shows and live music'', ''Yoga and mindfulness meditation'', ''Urban photography'', ''Puzzle solving (crosswords, Sudoku)'', ''Volunteering at community health fairs'']'
  career_goals: Sharon aims to become a Certified Pharmacy Technician (CPhT) within the next year, then complete a bachelor’s degree in pharmaceutical sciences and apply to a Doctor of Pharmacy program.
    She aspires to specialize in medication therapy management and eventually take on a leadership role as a pharmacy manager or clinical pharmacist. Her long‑term ambition is to combine her curiosity for
    novel therapies with technology by contributing to pharmacy informatics or developing digital tools that improve medication safety. She also envisions mentoring younger technicians and advocating for
    community health education.
