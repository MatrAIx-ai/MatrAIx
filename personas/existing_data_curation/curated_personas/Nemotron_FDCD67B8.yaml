personas:
  professional: Sharon Marsh, a 20‑year‑old pharmacy technician in Belleville, merges precise prescription verification with a creative curiosity for data‑driven medication safety, tackling high‑volume
    shifts while they sketch ideas for pharmacy informatics tools that could one day streamline therapy management.
  sports: Sharon Marsh follows the St. Louis Cardinals and the St. Louis Blues with avid enthusiasm, runs with the Belleville Joggers 5K club each spring, and they squeeze in weekly yoga sessions, preferring
    a competitive edge in personal fitness while still cheering loudly at local high‑school basketball games.
  arts: Sharon Marsh channels their love of abstract expression into acrylic canvases inspired by Yayoi Kusama and Banksy, attends live shows featuring Tame Impala and local folk singer Katie Herz, and
    they frequently quote Neil Gaiman while sketching digital illustrations for tabletop RPG characters.
  travel: Sharon Marsh plots weekend getaways with a penchant for scenic photography, having captured sunrise over the Mississippi River in St. Louis, explored the jazz‑filled streets of New Orleans, and
    they have the Pacific Northwest’s Oregon Coast atop their travel bucket list for future adventures.
  culinary: Sharon Marsh relishes cooking comfort foods with a twist—spicy fried chicken drizzled with honey‑sriracha, homemade acai bowls topped with pomegranate seeds, and they maintain a midnight habit
    of whisking avocado‑coconut smoothies for post‑yoga replenishment.
  core: Sharon Marsh fuses meticulous pharmacy work with a vivid imagination, balancing disciplined budgeting and health routines with spontaneous art splurges, a competitive streak, and they constantly
    search for novel experiences.
background:
  cultural: Sharon grew up in the Midwestern suburb of Belleville, Illinois, in a family that values practicality, community involvement, and education. Her cultural background blends the modest, self‑reliant
    ethos of the American Midwest with exposure to local arts through community theaters, murals, and regional festivals. She was raised with a modest Christian upbringing that emphasized service to others,
    which later influenced her choice of a health‑care career. The diverse mix of small‑town sensibility and proximity to the larger St. Louis metropolitan area has given her an appreciation for both traditional
    Midwestern values and contemporary cultural experiences.
