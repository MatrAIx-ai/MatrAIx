personas:
  professional: Virginia Mclean is a disciplined operations strategist who couples Six Sigma Black Belt rigor with a curiosity for digital transformation, leading cross-functional process-improvement projects
    using Excel, SQL, Tableau, and ERP automation while mentoring diverse teams and charting a path toward a Director of Operations role.
  sports: Virginia Mclean is an avid hiker of the Cascade foothills and a member of the Northwest Trails Club, follows a weekly yoga routine, supports the Seattle Seahawks and Seattle Sounders FC, and occasionally
    joins the Everett Running Club for half-marathon training during spring, balancing competitive spirit with a practical, schedule-driven approach to fitness.
  arts: Virginia Mclean immerses herself in gospel music legends like Kirk Franklin and Mahalia Jackson, attends performances at the Seattle Repertory Theatre, curates her reading list with leadership biographies
    by Simon Sinek and Walter Isaacson, and participates in community cultural festivals where storytelling and spoken-word poetry celebrate heritage.
  travel: Virginia Mclean enjoys meticulously planned trips that blend nature and culture, favoring hikes in Banff National Park, weekend escapes to Maui’s coastal trails, and cultural tours of New York’s
    Harlem Renaissance sites, while also exploring nearby Puget Sound islands and keeping a travel journal for future consultancy retreats.
  culinary: Virginia Mclean relishes artisan bread baking, perfecting sourdough loaves with wild foraged Pacific Northwest mushrooms and rosemary, while also savoring fresh salmon at Pike Place Market,
    cooking soulful collard greens with smoked turkey, and experimenting with seasonal farm-to-table recipes that reflect both her culinary curiosity and disciplined palate.
  core: Virginia Mclean blends methodical ambition with a love for community rhythm, using data-driven precision at work, devoting disciplined time to yoga and hiking, and occasionally rewarding herself
    with fresh-baked sourdough and gospel tunes.
background:
  cultural: Virginia identifies as African American and grew up in the Seattle metropolitan area, where she was shaped by a close‑knit extended family and the traditions of the local black church. The emphasis
    on education, community service, and resilience passed down from her grandparents informs her dedication to mentorship and professional excellence. She incorporates cultural elements such as gospel
    music and storytelling into her personal life, and she actively participates in regional black cultural festivals and advocacy groups that promote diversity in the business sector. Living in Everett,
    she blends this heritage with the Pacific Northwest lifestyle, valuing both the outdoors and the strong sense of community found in her neighbourhood.
