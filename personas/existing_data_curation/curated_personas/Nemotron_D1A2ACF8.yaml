  hobbies: '[''Hiking the Cascade foothills'', ''Balcony gardening'', ''Reading business biographies and non‑fiction'', ''Practicing yoga'', ''Baking artisan bread'', ''Mentoring at‑risk youth'', ''Attending
    Juneteenth and black history community events'', ''Photography of Pacific Northwest landscapes'']'
  career_goals: Virginia aims to transition from specialist to senior leadership, targeting a Director of Operations role within the next five years. She plans to deepen her expertise in digital transformation
    by completing an executive certificate in Business Analytics and pursuing a mentorship program focused on diversity and inclusion in corporate leadership. Long‑term, she envisions founding a consultancy
    that helps mid‑size firms in the Pacific Northwest implement sustainable, data‑driven operational strategies, while also creating a scholarship fund for African‑American women entering business fields.
