personas:
  professional: Jorge Munoz, a registered nurse in a fast‑paced Brooklyn hospital, leverages their analytical STEM background, bilingual communication, and art‑therapy creativity to deliver evidence‑based
    patient care while organizing multidisciplinary teams and precepting new staff with the reliability and sociability that define their approach.
  sports: Jorge Munoz stays fit by playing forward for the Prospect Park Soccer Club in a culturally diverse amateur league, follows New York City FC and the Brooklyn Nets passionately, and incorporates
    weekly salsa and bachata social dance classes as cardio, balancing competitive spirit with community connection.
  arts: Jorge Munoz immerses themselves in Brooklyn’s street‑art scene, joining guided tours that showcase murals by Banksy and local legends, paints acrylic canvases inspired by Basquiat’s bold colors,
    frequents the Brooklyn Museum to study works by Jean‑Michel Basquiat and Kehinde Wiley, and relaxes to the sounds of The Strokes, Kendrick Lamar, and Natalia Lafourcade, letting music fuel their own
    artistic experiments.
  travel: Jorge Munoz plans trips with a mix of cultural immersion and outdoor adventure, having explored the colonial charm of Cartagena, the historic canals of Venice, and the bustling markets of Marrakech,
    they now dream of trekking Patagonia’s glaciers while budgeting trips through a meticulous spreadsheet and preferring boutique hostels over luxury hotels.
  culinary: Jorge Munoz enjoys cooking at home, skillfully preparing traditional dishes like sancocho and empanadas using plantains, yuca, and cilantro, while experimenting with fusion creations such as
    sancocho ramen broth topped with soft‑boiled eggs, and they often source fresh produce from Brooklyn’s Greenmarkets before indulging in street‑food stalls at Smorgasburg.
  core: Jorge Munoz blends meticulous nursing expertise with a restless artistic curiosity, juggling night shifts, weekend soccer matches, and spontaneous paint sessions, all while habitually forgetting
    to water their houseplants.
background:
  cultural: Jorge was born to Panamanian parents and grew up with a blend of Caribbean-Latin rhythms, family-centric values, and a strong sense of community. He is bilingual in Spanish and English and maintains
    close ties to the Panamanian diaspora in Brooklyn, participating in cultural festivals such as Carnaval and sharing traditional music and cuisine with neighbors. His upbringing emphasized personalismo-
    the importance of warm, personal relationships- and respeto, a deep respect for elders and communal harmony. These cultural principles shape his compassionate nursing style, his preference for collaborative
    care, and his interest in integrating cultural art forms like mask-making and folk storytelling into therapeutic settings. At the same time, living in Brooklyn has broadened his perspective, allowing
    him to appreciate and incorporate the city's diverse cultural mosaic into his personal and professional life.
attributes:
  skills: '["Patient assessment", "IV insertion", "Medication administration", "Wound care", "Emergency response (BLS/ACLS)", "Health informatics and EMR proficiency", "Evidence-based practice and research",
    "Quality-improvement project leadership", "Cross-cultural communication (English/Spanish)", "Art-therapy facilitation", "Team leadership and preceptorship", "Organizational planning and scheduling"]'
  hobbies: '["Painting and visual arts", "Visiting museums and street-art tours", "Recreational soccer", "Salsa and bachata dancing", "Cooking Panamanian and fusion dishes", "Hiking and urban photography",
    "Volunteering at community health fairs (art-therapy workshops)", "Reading science-fiction"]'
  career_goals: Jorge aims to advance to a nurse manager role within the next five years, focusing on multidisciplinary teams that serve immigrant and low-income communities. He plans to enroll in a Master's
    program in Nursing with a concentration in Community Health to deepen his expertise in population-level interventions. His long-term ambition is to design and run a community wellness center in Brooklyn
    that blends traditional Panamanian health practices with modern nursing care, including art-based therapeutic programs. He also aspires to become a certified Nurse Practitioner specializing in mental
    health, to address the growing need for culturally competent behavioral health services. In parallel, Jorge wants to mentor new nurses and serve as a bridge between clinical practice and health policy
    advocacy.
