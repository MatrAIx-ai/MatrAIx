personas:
  professional: Yan Seo, a registered nurse at a community hospital, leverages meticulous chart organization, disciplined time management, and strong clinical assessment skills to excel in patient monitoring,
    IV therapy, and interdisciplinary communication, while they quietly chart a path toward a critical care certification and future charge nurse leadership.
  sports: Yan Seo, a member of the Suwanee Trail Runners club, routinely completes weekend 5k runs, follows the Atlanta Falcons for football and the Atlanta United for soccer, and balances these activities
    with daily yoga sessions to maintain flexibility and stress relief.
  arts: Yan Seo, who practices calligraphy and reads contemporary literature, finds inspiration in the works of Margaret Atwood, Neil Gaiman, and the ambient compositions of Max Richter, frequently attends
    local gallery openings featuring watercolor and ink art, and unwinds by listening to indie folk singer Sufjan Stevens while sketching in a quiet corner of the hospital break room.
  travel: Yan Seo, an avid planner who prefers low-key, nature-focused trips, has explored the Blue Ridge Mountains in Virginia and the coastal cliffs of Portugal, enjoys weekend getaways to Asheville's
    art-filled streets, and dreams of trekking the Inca Trail in Peru once their nursing schedule allows for an extended leave.
  culinary: Yan Seo, who cooks at an intermediate level, often prepares rosemary-roasted chicken, herb-infused quinoa salads, and fermented vegetable side dishes using basil, cilantro, and mint harvested
    from their indoor garden, and treats themselves to sushi rolls or pho on rare evenings out.
  core: Yan Seo, a detail-obsessed nurse with a penchant for perfectly aligned spreadsheets, quietly hoards extra pens, stretches yoga mats in the early morning, and can't resist the soothing rhythm of
    a well-executed calligraphy stroke.
background:
  cultural: Yan was raised in a Korean-American household in the Atlanta metropolitan area. Her family places a high value on education, discipline, and collective well‑being, which shaped her meticulous
    work ethic and cooperative nature. She grew up bilingual, speaking both Korean and English, and participates in cultural traditions such as Chuseok meals and Korean language schools, while also integrating
    into the broader Southern community through local festivals and volunteer work.
attributes:
  skills: '[''Clinical assessment'', ''IV therapy and medication administration'', ''Wound care and dressing changes'', ''Electronic Medical Record (EMR) documentation'', ''Infection control and safety
    protocols'', ''Patient education and health counseling'', ''Shift scheduling and time management'', ''Team coordination and communication'']'
  hobbies: '[''Reading medical journals and literature'', ''Calligraphy'', ''Indoor herb gardening'', ''Yoga and meditation'', ''Volunteer health screenings'', ''Walking on local trails'', ''Cooking Korean-American
    fusion meals'']'
  career_goals: She aims to complete her BSN within the next two years, obtain certification as a Critical Care Nurse (CCRN), and eventually transition into a charge nurse role where she can lead a unit
    with her organizational strengths. In the long term, Yan is interested in pursuing a Master’s in Nursing with a focus on nursing informatics to combine her love for structure with technology. She also
    aspires to mentor new nurses and contribute to quality improvement initiatives at her hospital.
