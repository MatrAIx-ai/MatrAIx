  career_goals: Samantha aims to advance from a senior administrative assistant to an office manager or executive assistant role within a cultural or nonprofit organization, where she can blend her organizational
    talents with her passion for the arts. She plans to obtain a certification in project management and pursue continuing education in arts administration to position herself for a director of operations
    role at a regional museum or gallery. Additionally, she envisions mentoring junior staff and leading initiatives that improve workplace efficiency while fostering a vibrant community culture.
