personas:
  professional: Samantha Deville, a senior administrative assistant at a regional nonprofit arts organization, leverages their meticulous organization, mastery of Microsoft Office, Google Workspace, and
    Asana, along with a charismatic, talkative demeanor, to streamline exhibition logistics, negotiate vendor contracts, and cultivate collaborative partnerships that reflect their curiosity and high standards.
  sports: Samantha Deville is an avid hiker and cyclist who spends weekends tackling the Mount Holyoke Range and riding the Connecticut River Trail, belongs to a local running club that trains for the Boston
    Marathon, and avidly follows the Boston Red Sox, Celtics, and New England Patriots, balancing seasonal sports enthusiasm with personal fitness routines.
  arts: Samantha Deville immerses themselves in the New England arts scene by curating watercolor series inspired by Monet's gardens, photographing autumn foliage in the style of Ansel Adams, attending
    repertory theater productions of Tennessee Williams at the Amherst Drama Center, and regularly pocket‑shopping contemporary works by artists like Amy Sherald and Yayoi Kusama at local galleries.
  travel: Samantha Deville plans trips with a blend of meticulous itineraries and spontaneous detours, favors cultural city breaks like a weekend in Montreal and a museum‑touring road trip through Boston,
    dreams of exploring the historic temples of Kyoto and the vineyards of Tuscany, and leverages travel‑reward points while balancing a modest budget and occasional family commitments.
  culinary: Samantha Deville enjoys cooking New England classics such as lobster rolls and creamy clam chowder, experiments with Korean bibimbap featuring gochujang and fresh vegetables, expertly assembles
    charcuterie boards with goat cheese, honey‑glazed figs, and rosemary‑infused crackers, and pairs meals with a preferred vintage pinot noir, reflecting a skilled yet adventurous palate.
  core: Samantha Deville is the hyper‑organized, endlessly curious cultural conduit who can coordinate a gallery opening while secretly hoarding a secret stash of artisan coffee beans for late‑night brainstorming
    sessions.
background:
  cultural: Samantha grew up in a New England household with deep ties to the region’s educational and cultural values. Her family heritage reflects a blend of English and Irish ancestry common in the area,
    which has cultivated an appreciation for historic preservation and community involvement. Living in Montague, Massachusetts, she is influenced by the town’s progressive, arts‑focused atmosphere and
    the broader intellectual environment of nearby Amherst and Northampton. This environment nurtured her curiosity, respect for diverse ideas, and commitment to civic engagement, shaping her identity as
    a socially active, culturally aware professional.
