  career_goals: Even at 90, Rose aspires to leave a lasting artistic and cultural legacy in Bloomfield. She hopes to publish a memoir that weaves together her personal reflections, poems, and the collected
    stories of longtime residents. She also dreams of establishing a small annual art exhibition showcasing works by senior artists, and to create a scholarship fund for local high‑school students who wish
    to pursue visual arts. Ultimately, Rose aims to ensure that the senior center’s arts program remains vibrant and inclusive, fostering creativity and community connection for years to come.
