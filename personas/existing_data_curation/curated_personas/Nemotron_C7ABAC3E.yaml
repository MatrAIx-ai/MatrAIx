  career_goals: While still very young, Randy expresses budding ambitions through his play. He frequently pretends to be a firefighter with his toy fire truck, showing a desire to help others and engage
    in brave roles. He shows fascination with bright pictures of stars and rockets, hinting at a future interest in space exploration. His nurturing nature suggests an aspiration to be someone who makes
    people happy, such as a teacher or community helper. In the short term, his main goals are to expand his vocabulary, learn to count higher, and become more independent in dressing and toileting.
