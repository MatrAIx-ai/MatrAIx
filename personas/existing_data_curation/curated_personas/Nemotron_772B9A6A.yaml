  career_goals: While Kiyoko is only two, her parents anticipate future ambitions rooted in her early curiosity and practical inclinations. They imagine she may be drawn to caring for animals, teaching
    other children, or creating things with her hands, suggesting potential goals such as becoming a veterinarian, an early‑childhood educator, or a designer/engineer. These aspirations reflect her love
    of exploration, problem solving, and desire to impart knowledge, balanced with a pragmatic view of task completion.
