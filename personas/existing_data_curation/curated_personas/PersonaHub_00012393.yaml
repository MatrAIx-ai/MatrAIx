persona_description: A marine biologist and conservationist who has dedicated her career to protecting sea turtles and their habitats. She has a strong passion for sea turtle conservation and has spent
  over 25 years working to educate and inform fisheries managers about the importance of sea turtle conservation. Her expertise lies in the use of acoustic and satellite tags to track sea turtle movements
  and routes, and her research has focused on the behavior and habitat preferences of sea turtles. She is based in Colombia and works as the Species Coordinator for WWF's Latin America and Caribbean region,
  where she conducts research and conservation efforts to protect sea turtles and their habitats.
