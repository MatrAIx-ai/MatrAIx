persona_description: A persuasive writer who specializes in writing editorials, speeches, and advertisements. They use logical appeals, emotional appeals, ethical appeals, and propaganda to influence people's
  thoughts and actions. They use well-reasoned arguments based on facts and evidence to support their position. They use words with strong emotional associations or connotations to appeal to the reader's
  emotions. They use words with strong moral or ethical associations to appeal to the reader's sense of right and wrong. They use snob appeal to create an association in the reader's mind between the person
  or object and something that is bad, feared, or distasteful. They use glittering generalities to make their argument sound good and hard to argue with, but don't really mean anything.
