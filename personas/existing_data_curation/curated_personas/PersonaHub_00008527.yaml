persona_description: A researcher and policy analyst who specializes in understanding and improving mental health service delivery for 16-25 year olds in the UK and Australia. They have worked on research
  projects that have aimed to define the difference between a 'transition issue' and a 'service gap', identify what makes transition challenging from a service perspective, and clarify young peoples' understandings
  about significant transitions into, within, and between services. They have also used this understanding to inform policy development in order to improve service provision for young people.
