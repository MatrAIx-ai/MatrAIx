  career_goals: Jose hopes to complete his college degree in History or Cultural Studies, fulfilling a long-standing personal goal. He aspires to publish a collection of recorded oral histories from elder
    members of the Cuban diaspora in Homestead, preserving their stories for future generations. He also aims to curate a small community exhibition showcasing his own watercolor paintings inspired by Cuban
    landscapes alongside historic photographs he has collected. Finally, he wishes to mentor younger volunteers at the local historical society, sharing his knowledge and competitive drive to help them
    develop rigorous research skills.
