  career_goals: Approaching retirement, Melanie aims to transition from front‑line cashier duties to a supervisory role where she can mentor younger employees and lead process‑improvement projects. She
    is interested in becoming a shift supervisor or assistant manager at her store, using her competitive drive to raise team performance and implement more efficient checkout procedures. Parallel to her
    professional aspirations, she hopes to develop a community‑based workshop on basic financial literacy for seniors, leveraging her practical skills and love of teaching. Ultimately, Melanie envisions
    a phased shift toward part‑time volunteer coordination at the local food bank, blending her career experience with her desire to give back to the Dallas community.
