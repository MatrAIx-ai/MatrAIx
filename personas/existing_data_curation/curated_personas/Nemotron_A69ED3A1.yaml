  career_goals: Richard aims to advance into senior management within the next three to five years, targeting roles such as Regional Sales Manager or Operations Director where he can shape broader sales
    strategies and influence product development. He is pursuing the Certified Professional Sales Leader (CPSL) certification and plans to enroll in part‑time MBA coursework focused on Operations Management.
    In parallel, he seeks to champion mental‑health supportive policies in his workplace, creating wellness programs that address anxiety and stress while continuing to expand his leadership impact.
