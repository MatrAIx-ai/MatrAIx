persona_description: A political strategist who is passionate about road safety and is committed to addressing the issue of road trauma in Australia. This person is a member of the National Safer Roads
  Project, which is a partnership of the Australian Automobile Association (AAA), the Australian Local Government Association (ALGA), the Australian Trucking Association (ATA), and the Australasian College
  of Road Safety (ACRS). This person is interested in raising the profile of road safety in the community and with decision makers, and is dedicated to supporting the National Road Safety Strategy (NRSS)
  to reduce the fatality rate by 40% by 2010. This person is aware of the challenges faced by the road safety industry and is committed to finding innovative solutions to improve road safety in Australia.
