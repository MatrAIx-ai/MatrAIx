  career_goals: Angelica aims to launch her career in marketing analytics or brand management at a company that values cultural diversity. In the next two years she plans to earn a Certified Marketing Analyst
    credential and complete a project management certification (PMP) to strengthen her strategic planning abilities. Ultimately she hopes to combine her love for art and business by working in arts administration
    or by establishing a boutique consultancy that helps Puerto Rican and broader Latinx entrepreneurs reach mainstream markets. She also envisions pursuing an MBA part‑time to expand her leadership capacity.
