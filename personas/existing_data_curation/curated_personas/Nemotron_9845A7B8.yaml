  career_goals: She dreams of growing up to work in a role that blends her love for order, helping others, and learning. Shashikala often says she wants to be a teacher because she enjoys explaining things
    to her friends and keeping a classroom organized. She also imagines being a school librarian, where she could maintain tidy shelves and recommend books. In the long term, she hopes to earn good grades,
    graduate high school with honors, and study education to become a caring, structured mentor for young learners.
