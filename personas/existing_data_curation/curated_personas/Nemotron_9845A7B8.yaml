personas:
  professional: Shashikala Vieira is an aspiring junior architect who uses LEGO blocks to practice spatial reasoning, often arranging pieces by color and shape before constructing, showcasing meticulous
    planning and a methodical approach that reflects her love of structure and predictability.
  sports: Shashikala Vieira is a fan of the local youth soccer club, the City Kids FC, enjoys watching the national basketball team the Chicago Bulls on TV, and participates in weekend gymnastics classes
    where she practices balance beams, reflecting her structured approach to fitness and eagerness to belong to organized team settings.
  arts: Shashikala Vieira delights in drawing animals after listening to the whimsical tunes of Disney’s \"Frozen\" soundtrack and the gentle folk songs of Raffi, and she eagerly flips through picture books
    by Dr. Seuss, where the rhythmic rhymes fuel her creative doodles and organized sketchbooks.
  travel: Shashikala Vieira loves weekend trips to the nearby botanical garden and has a yearning to visit the historic castles of Scotland, preferring meticulously planned itineraries with a set schedule,
    but also enjoys spontaneous ice‑cream stops that fit within her structured travel routine.
  culinary: Shashikala Vieira enjoys helping roll dough for soft flatbreads, mixing flour, water, and a pinch of salt, and she loves savoring the simple taste of buttered naan alongside a side of mango
    chutney, while proudly arranging her sticker collection of food‑themed stickers in a neat album.
  core: Shashikala Vieira blends a love for orderly play with restless curiosity, turning LEGO bricks and puzzles into mini‑projects, yet often worries about tiny changes in routine, prompting her to double‑check
    every detail before moving on.
background:
  cultural: Shashikala was born and raised in New Hudson, Michigan, to South Asian immigrant parents who originally come from Goa, India. At home, the family speaks English and Konkani, and they preserve
    Goan Catholic traditions, celebrating Christmas, Easter, and the Feast of Saint Francis Xavier. They also observe Diwali with lights, sweets, and family gatherings, introducing her to Indian festivals
    and cuisine. She attends a local Sunday school and enjoys cultural activities such as Goan folk dancing and learning Hindi songs at school. This blend of Indian, Portuguese, and American influences
    shapes her worldview and daily life.
