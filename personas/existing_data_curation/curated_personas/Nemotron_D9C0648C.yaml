  hobbies: '[''Bowling league'', ''Community gardening'', ''Karaoke nights'', ''Classic‑rock vinyl collection'', ''Barbecuing'', ''Woodworking'', ''Football watching (Dallas Cowboys)'', ''Church potlucks'',
