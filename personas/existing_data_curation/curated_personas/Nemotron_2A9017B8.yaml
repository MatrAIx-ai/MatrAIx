personas:
  professional: Summer Joyner, a 72‑year‑old senior‑center program director and longtime volunteer, blends meticulous budgeting, calendar‑keeping, and conflict‑mediation skills with their natural talkativeness
    to orchestrate weekly book clubs, bridge nights, and community‑theater productions that keep the senior floor humming.
  sports: Summer Joyner fuels their fitness by strolling the lakefront paths with the Minnesota Senior Walkers club each morning, passionately watches the Minnesota Twins and Vikings on weekends, and joins
    a light‑touch pickleball league at the community center during the summer months.
  arts: Summer Joyner immerses themselves in the arts by performing in community theatre adaptations of Shakespeare, singing gospel standards of Mahalia Jackson in their church choir, and regularly marveling
    at Monet’s water lilies and the Indigenous artwork at the Minneapolis Institute of Art.
  travel: Summer Joyner favors well‑planned, low‑stress travel, joining senior escorted tours to Door County’s historic lighthouses, taking relaxed weekend getaways to the Canadian Maritimes, and dreaming
    of a summer cruise along the Norwegian fjords once their health permits.
  culinary: Summer Joyner, a confident home cook, delights in preparing herb‑infused roasted chicken with fresh dill and wild rice, bakes apple‑cinnamon crumble pies for bridge nights, and never says no
    to a slice of local cheese curd‑laden poutine at the Minneapolis farmers' market, a treat they always share with fellow seniors.
  core: Summer Joyner’s bright scarves, endless anecdotes, and habit of double‑checking every schedule make them the beloved, if occasionally over‑organized, heart of their senior community.
background:
  cultural: Summer was raised in a mid‑century white, German‑American family in Minneapolis. The cultural values of the Upper Midwest—practicality, reliability, and a strong sense of community—are woven
    into her daily routine. Her upbringing in a Lutheran congregation emphasized modesty, service, and neighborly kindness, which continue to shape her interactions. Living in Hennepin County has given
    her a deep appreciation for the "Minnesota nice" ethos, where politeness, cooperation, and civic responsibility are prized. These cultural influences reinforce her preference for familiar routines,
    organized planning, and helping others.
