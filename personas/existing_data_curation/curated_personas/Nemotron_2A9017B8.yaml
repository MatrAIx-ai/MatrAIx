  career_goals: Although she is no longer part of the formal workforce, Summer aims to deepen her role as a community volunteer. She plans to continue leading senior‑center programs, mentor younger volunteers,
    and perhaps chair the local seniors’ advisory board. She also hopes to compile her life stories into a memoir that highlights the importance of routine, kindness, and community service. Maintaining
    her health, staying socially active, and fostering intergenerational connections remain her core ambitions.
