  career_goals: Brenda aims to attend a rigorous STEM-focused high school and eventually earn a degree in computer engineering or data science. She envisions a career where she can combine her love of practical
    problem-solving with innovative technology—specifically, developing software tools that improve community services or creating data-driven solutions for local businesses. Her competitive drive pushes
    her to seek scholarships, internships, and leadership roles that will position her as a future tech leader who can launch her own startup focused on sustainable, data-centric projects.
