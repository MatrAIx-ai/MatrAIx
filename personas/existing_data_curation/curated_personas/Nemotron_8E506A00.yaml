  hobbies: '[''Reading contemporary fiction'', ''Journaling'', ''Yoga and mindfulness meditation'', ''Indoor gardening (succulents & herbs)'', ''DIY home‑decor projects'', ''Spontaneous weekend trips to
    lakes or antique fairs'', ''Volunteering at a community center (teaching computer basics)'']'
  career_goals: Evangeline aims to move from a floor sales role into a supervisory position within the next two years, targeting an assistant manager role as a stepping stone to store manager. She plans
    to enroll in a bachelor’s program in business administration to solidify her managerial credentials and to develop a leadership style that balances compassion with assertiveness. In the longer term,
    she envisions opening a small boutique that reflects her aesthetic sensibility, offering a predictable schedule that supports her mental‑health needs while still allowing occasional flexibility for
    spontaneous opportunities.
