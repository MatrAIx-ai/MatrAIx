  hobbies: '[''vegetable gardening'', ''knitting'', ''quilting'', ''reading historical fiction'', ''listening to classic country and bluegrass'', ''attending church services'', ''birdwatching'', ''bingo'',
    ''volunteering at community events'']'
  career_goals: Although retired and widowed, Donna’s ambitions focus on maintaining her independence and health, preserving and passing down family traditions, and contributing quietly to her community.
    She aims to document her family’s genealogy and local history for future generations, mentor younger women in quilting and gardening through the church’s outreach programs, and stay physically active
    through regular walks and garden work. Ensuring a comfortable, self‑sufficient lifestyle in her later years and leaving a legacy of handmade crafts and stories are her primary goals.
