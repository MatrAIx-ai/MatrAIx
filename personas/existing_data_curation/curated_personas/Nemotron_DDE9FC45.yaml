  hobbies: '[''Community tech club participation'', ''Senior center volunteering for digital literacy'', ''Hiking and cycling in Bucks County'', ''DIY electronics and Raspberry Pi projects'', ''Gardening'',
    ''Board‑game nights'', ''Craft brewery tastings'', ''Reading science‑fiction'']'
  career_goals: John seeks to transition from a hands‑on support role to a leadership position where he can shape an organization’s IT strategy. Over the next five years he aims to earn advanced certifications
    such as ITIL, CompTIA Security+, and Microsoft Azure Fundamentals, and to become an IT Services Manager overseeing a small team in a midsize company or a regional nonprofit. He hopes to spearhead projects
    that improve digital accessibility for seniors in his community, develop a local tech‑help clinic, and introduce cost‑effective cloud‑based solutions that enhance workflow efficiency. Ultimately, John
    envisions a career that blends his technical expertise with his passion for helping others and building collaborative, harmonious work environments.
