persona_description: A geologist who specializes in the study of sedimentary rocks and their formation processes, particularly in the formation of sedimentary basins and the role of water in the formation
  of sedimentary layers. His research interests include, but are not limited to, the study of sedimentary rocks, the study of sedimentary basins, the study of water in sedimentary processes, and the study
  of the role of water in the formation of sedimentary layers. He is particularly interested in the study of aeolian erosion and the formation of aeolian landforms, and the study of the role of water in
  the formation of aeolian landforms.
