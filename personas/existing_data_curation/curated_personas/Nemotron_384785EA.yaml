personas:
  professional: Michelle Joyner, a fifteen‑year veteran hairdresser and cosmetologist, blends precision cutting, avant‑garde color work, and custom‑crafted accessories to turn every client’s look into a
    living art piece while juggling salon management and a growing social‑media empire, even though their studio calendar often resembles a freestyle sketch more than a rigid schedule.
  sports: Michelle Joyner fuels their energy with dance‑cardio classes at Rhythm & Flow Studio, joins a weekend yoga circle at Richmond’s River Rock Park, and cheers on the Richmond Flying Squirrels while
    occasionally playing in a co‑ed recreational softball league, balancing a love for movement with a competitive streak that drives them to out‑pace their fitness peers.
  arts: Michelle Joyner’s free hours are spent wandering the colorful streets of Richmond to photograph murals by artists like Shepard Fairey and local talent Jordan Casteel, attending live shows featuring
    Janelle Monáe and The Suffers at The National, and curating a personal playlist of Beyoncé and Anderson .Paak that fuels their styling creativity.
  travel: Michelle Joyner prefers spontaneous, culture‑rich getaways, having trekked to Marrakech to study traditional braiding methods, explored Tokyo’s Harajuku fashion scene, and dreaming of a future
    immersion in Lisbon’s vibrant tile art, all while budgeting trips around salon off‑days and the occasional family weekend.
  culinary: Michelle Joyner whips up Southern soul‑food favorites like crispy fried chicken with collard greens, shrimp and grits spiced with smoked paprika, and sweet potato pie topped with a dash of bourbon,
    showcasing a confident home‑cooking skill set that blends comfort flavors with occasional experimental twists like pastel‑hued macarons.
  core: Michelle Joyner is a creatively fierce hair artist who juggles a chaotic schedule, a love for bold colors, and a relentless drive to turn every salon chair into a stage, even if they sometimes forget
    to pay a bill on time.
background:
  cultural: Michelle grew up in a close‑knit African‑American community in Henrico, Virginia, where the legacy of Southern heritage, church gatherings, and family storytelling shaped her identity. Her cultural
    roots emphasize the significance of Black hair as a form of self‑expression and cultural pride, influencing her mastery of natural‑hair braiding and contemporary styling. She celebrates the music, culinary
    traditions, and artistic contributions of the African diaspora, and draws inspiration from Black entrepreneurs and artists who have paved the way in creative industries. This background fuels her commitment
    to uplift her community through mentorship and culturally resonant beauty.
