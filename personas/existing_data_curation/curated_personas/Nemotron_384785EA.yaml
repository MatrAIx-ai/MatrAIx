    to teach hair styling'', ''Participating in hair‑design competitions and runway shows'']'
  career_goals: She aims to open her own boutique salon in Henrico that functions as a creative hub where art, fashion, and hair intersect. Michelle plans to develop a signature line of hair care products
    that celebrate natural textures and vibrant colors, and to become a recognized influencer in the industry by sharing tutorials and avant‑garde looks on social media. Long‑term, she hopes to mentor emerging
    Black stylists, host community workshops, and compete in regional hair‑design competitions to showcase her innovative techniques.
