personas:
  professional: Angie Guerra is a precision instrument technician in a high‑tech biotech facility, leveraging their meticulous mechanical aptitude, ISO‑compliant calibration expertise, and calm, collaborative
    demeanor to lead complex metrology projects while mentoring junior staff and championing inclusive STEM workshops.
  sports: Angie Guerra enjoys weekend cycling along the Schuylkill River Trail, supports the Philadelphia Eagles and the 76ers, and participates in a local indoor climbing club, balancing their low‑impact
    cardio with occasional strength training sessions at the community gym.
  arts: Angie Guerra frequents the Philadelphia Museum of Art, draws inspiration from the surreal works of Remedios Varo and contemporary installations by teamLab, attends intimate poetry readings at the
    Lotus House, and experiments with their mixed‑media sketches that blend architectural lines with jazz improvisations.
  travel: Angie Guerra prefers thoughtfully planned getaways that combine cultural immersion and quiet reflection, such as a sunrise photography trip to New Mexico’s White Sands, a weekend workshop in Dublin’s
    artisan markets, and annual family visits to the historic town of Lancaster for their communal harvest festivals.
  culinary: Angie Guerra enjoys cooking rustic sauerkraut with caraway seeds, baking soda bread with buttermilk, and brewing herbal teas from their indoor garden, while their modest culinary skill shines
    when they plate meticulously arranged mezze platters featuring olives, feta, and roasted red peppers.
  core: Angie Guerra blends meticulous technical mastery with an artistic eye, channeling their calm curiosity into precision work, community mentorship, and a quietly adventurous life that balances disciplined
    finances, health vigilance, and a love for subtle creativity.
background:
  cultural: Angie grew up in a close‑knit, working‑class family in the western suburbs of Philadelphia. Her parents, both high school teachers, emphasized education, community service, and respect for craftsmanship.
    With roots tracing back to German and Irish immigrants, her family traditions include annual holidays centered on communal cooking and storytelling. The city's rich historical architecture and the vibrant
    murals of the Mural Arts Program sparked her early fascination with detail and design. Regular visits to the Philadelphia Museum of Art and local performance spaces nurtured her appreciation for visual
    and performing arts. These cultural experiences, combined with a neighborhood ethos of mutual aid, shaped her compassionate, cooperative outlook and her curiosity for varied ideas.
