  career_goals: Angie's career ambition is to advance to a lead technician or supervisory role within a high‑tech research or biotech facility, where she can oversee complex calibration projects and drive
    quality‑assurance initiatives. She plans to earn professional certifications such as Certified Precision Instrument Technician (CPIT) and Certified Metrology Technician (CMT), and to pursue an associate
    degree in engineering technology to deepen her theoretical knowledge. Long‑term, she envisions transitioning into a technical training position, creating workshops that empower women and underrepresented
    groups in STEM, and eventually launching a boutique service that provides on‑site instrument maintenance combined with artistic installations that require precise mechanical craftsmanship.
