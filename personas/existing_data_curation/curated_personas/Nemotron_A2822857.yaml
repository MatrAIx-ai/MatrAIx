personas:
  professional: Lewis Ables, an aspiring junior programmer, uses Scratch to design simple games, demonstrating their meticulous planning and curiosity while collaborating with friends on coding projects.
  sports: Lewis Ables plays as a midfielder for the Cascade Kids Soccer Club, cheers for the Seattle Sounders, and joins weekend hikes with the local scouting troop, balancing competitive practice with
    group fitness.
  arts: Lewis Ables builds intricate LEGO cityscapes, draws comic strips inspired by adventure books, and practices beginner piano pieces by Mozart, showcasing a blend of visual creativity and musical discipline.
  travel: Lewis Ables enjoys weekend hikes in the Cascade foothills, dreams of camping in Yellowstone National Park, and loves family road trips to the coast, preferring detailed maps and checklist planning
    for each adventure.
  culinary: Lewis Ables loves pepperoni pizza, homemade mac and cheese, and snackable carrot sticks, and they proudly bake chocolate chip cookies with their parents, though they sometimes overeat sugary
    treats after game days.
  core: Lewis Ables is a methodical, sociable 8‑year‑old who balances curiosity with worry, orchestrating LEGO builds and soccer drills while meticulously saving allowance and battling occasional allergy
    flare‑ups.
background:
  cultural: Lewis comes from a white, middle‑class family in Snohomish, Washington, a suburb of Seattle nestled in the Pacific Northwest. His community places a strong emphasis on outdoor recreation, environmental
    stewardship, and a close‑knit neighborhood spirit. He celebrates traditional American holidays such as Thanksgiving, Fourth of July, and Christmas, and his family often participates in local festivals
    and fairs. At school, he learns about the region's Coast Salish indigenous heritage and the importance of preserving natural habitats. The proximity to the tech hub of Seattle influences his early interest
    in coding and digital creativity, while the surrounding forests and rivers inspire his love for hiking, nature exploration, and conservation activities.
