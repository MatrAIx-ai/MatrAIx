    for holidays'', ''exploring local farmers markets'']'
  career_goals: Yuleidy dreams of opening a small boutique bakery that celebrates her Mexican heritage by offering signature pan dulce, tres leches cakes, and other culturally inspired pastries. She aims
    to obtain a professional pastry certification to deepen her technical expertise and to launch community baking workshops where she can share her knowledge with neighbors of all ages. Expanding her catering
    services for local festivals and family events, while eventually hiring and mentoring a team of apprentices, are key milestones in her long‑term vision of creating a thriving, family‑friendly culinary
    hub in McAllen.
