  career_goals: Margrit aims to establish her own boutique investigative agency in the Atlanta metro area, focusing on high‑stakes corporate fraud and unsolved missing‑person cases. She seeks certification
    as a Licensed Private Investigator in Georgia and plans to develop a specialized training program for women entering the field. Long‑term, she hopes to author a true‑crime memoir that integrates her
    investigative experiences with reflections on resilience and mental health. She also aspires to mentor younger detectives, leveraging her competitive drive to raise the professional standards of private
    investigation.
