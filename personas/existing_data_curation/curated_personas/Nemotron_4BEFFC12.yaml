  career_goals: Manuel wants to earn his GED and then enroll in a vocational program focused on graphic design and multimedia arts, aiming to become a professional visual artist who merges street art with
    digital media. He dreams of opening a community studio in Guayama where local youth can explore creative expression. Parallel to his artistic ambitions, he hopes to secure a basketball scholarship that
    would allow him to play at the collegiate level, using the sport as a channel for his competitive drive and as a stepping stone toward a future coaching role. Ultimately, he aspires to build a personal
    brand on social platforms, showcasing his art and music while leveraging his entrepreneurial spirit to create sustainable income.
