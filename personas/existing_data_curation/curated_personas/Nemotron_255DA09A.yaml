personas:
  professional: An aspiring junior game designer and digital illustrator, Antonio Lucas blends curiosity with meticulous organization as they prototype simple games in Scratch, sketch comic panels in their
    sketchbook, and lead peers in basic redstone logic during the after‑school robotics club.
  sports: A neighborhood basketball enthusiast, Antonio Lucas spends afternoons shooting hoops with the Riverside Youth Basketball Club at the Dream Center, cheers on the Miami Heat and the local Jacksonville
    Jaguars during televised games, and practices dribbling drills after school, channeling their competitive spirit while maintaining a relaxed, team‑oriented attitude.
  arts: A passionate visual storyteller, Antonio Lucas draws inspiration from artists like Jean‑Michel Basquiat and Kehinde Wiley while listening to jazz greats such as Ella Fitzgerald and contemporary
    hip‑hop artists like Kendrick Lamar, filling their sketchbook with vivid comic panels and visiting the Jacksonville Museum of Art and community murals for fresh ideas, which fuels their creative confidence
    and reflective worldview.
  travel: A budding explorer, Antonio Lucas enjoys family road trips to historic St. Augustine and the Kennedy Space Center, collects souvenirs like postcards from the Everglades, and dreams of a future
    adventure to Tokyo to experience anime culture and street art, balancing a love for local heritage with an imaginative wanderlust within the limits of a middle‑schooler’s budget.
  culinary: A young food enthusiast, Antonio Lucas loves helping in the kitchen to prepare collard greens with smoked paprika, mac and cheese with a crispy breadcrumb topping, and homemade banana bread,
    while also enjoying a slice of pepperoni pizza and snacking on gummy worms during gaming sessions, showcasing a palate that blends comfort soul‑food traditions with playful kid‑friendly treats.
  core: An inquisitive pre‑teen, Antonio Lucas channels relentless curiosity into art and coding, often loses track of homework while obsessively perfecting comic panels, hoards collectible stickers in
    a secret drawer, and occasionally procrastinates on chores, revealing a charming blend of focused creativity and endearing disorganization.
background:
  cultural: Antonio was born and raised in Jacksonville, Florida, within a close‑knit African‑American community. His family celebrates cultural traditions such as Juneteenth gatherings, soul‑food cooking,
    and church‑based music programs that expose him to gospel, jazz, and hip‑hop. He has grown up hearing stories from older relatives about the civil‑rights history of the city, which nurtures his appreciation
    for African‑American heritage. Local community centers offer art and STEM programs aimed at young Black youth, and Antonio participates in these, finding role models among Black artists and technologists.
    These experiences blend Southern cultural influences, community solidarity, and a strong emphasis on education and creativity, shaping his identity and worldview.
attributes:
  skills: '[''Sketching'', ''Digital illustration'', ''Basic coding (Scratch & introductory Python)'', ''Creative writing (comics & short stories)'', ''Research and information literacy'', ''Problem solving'',
