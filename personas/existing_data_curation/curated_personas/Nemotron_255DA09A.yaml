  hobbies: '[''Sketching and drawing'', ''Digital illustration on tablet'', ''Playing Minecraft'', ''Coding with Scratch and introductory Python'', ''Creative writing and comic creation'', ''Reading graphic
    novels and African‑American literature'', ''Listening to jazz, hip‑hop, and soul music'', ''Visiting local museums and street‑art sites'', ''Building LEGO sets'', ''Playing basketball with a small group
    of friends'']'
  career_goals: Antonio dreams of turning his passion for art and technology into a future career. In the short term, he aims to build a portfolio of digital artwork and to create his own simple video game
    using Python. He also hopes to write and illustrate a comic series that reflects stories from his community. Looking ahead, Antonio envisions himself as a multimedia artist or game developer who can
    blend visual storytelling with interactive experiences. He is also intrigued by the idea of working in a museum or cultural center, curating exhibits that celebrate African‑American history and contemporary
    art, and perhaps one day mentoring younger kids in his neighborhood to explore creativity through tech.
