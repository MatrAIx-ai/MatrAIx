  hobbies: '[''Abstract Painting'', ''Museum Visits'', ''Urban Photography'', ''Science-fiction Reading'', ''Chess'', ''Jogging'', ''Weightlifting'', ''Jazz Concerts'', ''Cooking Southern Dishes'', ''STEM
    Mentorship for Youth'']'
  career_goals: Sonya aims to rise to a detective lieutenant position within the Chicago Police Department, eventually leading a specialized cyber‑crime or data‑analytics unit. She wants to design and implement
    evidence‑based policing strategies that improve public safety while reducing bias. A long‑term ambition is to pursue a master’s degree in criminal justice and use her platform to mentor women of color
    in protective services, advocating for more inclusive hiring and promotion practices. Her competitive drive pushes her to earn commendations for innovative casework and to be recognized as a thought
    leader in modern law‑enforcement techniques.
