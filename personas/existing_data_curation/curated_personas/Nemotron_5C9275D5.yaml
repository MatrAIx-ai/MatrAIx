personas:
  professional: Sonya Hawkins is a data‑driven police detective on the Chicago Police Department, blending forensic expertise, GIS mapping, and cybersecurity basics to lead investigations while mentoring
    junior officers and championing evidence‑based strategies that bridge law enforcement and underserved neighborhoods.
  sports: Sonya Hawkins is an avid runner who logs miles with the Chicago Lakefront Trail Running Club, follows the Chicago Bulls, Bears, and Blackhawks, participates in a local weight‑lifting group at
    a community gym, and balances competitive edge with a data‑driven approach, using heart‑rate analytics to fine‑tune performance.
  arts: Sonya Hawkins is an abstract painter who draws inspiration from the bold colors of Kara Walker and the spatial depth of Mark Rothko, regularly attends exhibitions at the Art Institute of Chicago
    and MCA, and immerses herself in live jazz sessions featuring Kamasi Washington and Wynton Marsalis, which fuel her creative process.
  travel: Sonya Hawkins prefers purposeful travel that blends cultural enrichment and professional development, often weekend‑hiking in the Great Smoky Mountains, attending tech conferences in Austin, savoring
    the music heritage of New Orleans, and dreaming of a study‑tour of historic civil‑rights sites in Montgomery and Boston.
  culinary: Sonya Hawkins loves cooking Southern comfort food, regularly perfecting dishes like fried chicken with buttermilk brine, collard greens seasoned with smoked paprika, and shrimp and grits, while
    experimenting with farm‑fresh ingredients from the Green City Market and pairing meals with a glass of craft bourbon.
  core: Sonya Hawkins blends forensic rigor, community‑rooted empathy, and a restless curiosity, turning data into dialogue while juggling a demanding police career, artistic pursuits, and a disciplined
    yet occasionally indulgent lifestyle.
background:
  cultural: Sonya is a Black woman raised on Chicago’s South Side, deeply rooted in African‑American community traditions. She grew up attending local churches, celebrating Juneteenth, and participating
    in neighborhood block parties that feature soul food, blues, and jazz. Her family emphasizes resilience, storytelling, and the importance of education, which inspired her STEM pursuits. Sonya’s cultural
    identity informs her commitment to community policing, where she strives to bridge gaps between law enforcement and historically underserved neighborhoods, honoring the legacy of Chicago’s civil‑rights
    activists.
attributes:
  skills: '[''Criminal Investigation'', ''Forensic Evidence Collection'', ''Data Analytics'', ''Risk Assessment'', ''Crisis Negotiation'', ''Community Outreach'', ''Firearms Proficiency'', ''Physical Fitness
