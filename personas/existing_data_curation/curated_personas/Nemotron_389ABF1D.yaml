personas:
  professional: Cassandra Myers is a community‑oriented arts coordinator who blends event planning finesse with a flair for watercolor storytelling, using Canva graphics and social media savviness to rally
    volunteers, local nonprofits, and military families around creative workshops and craft fairs.
  sports: Cassandra Myers enjoys hiking the Chattahoochee River trails, plays recreational soccer with a local co‑ed league, and passionately supports the Atlanta Falcons, Atlanta Braves, and Atlanta United
    FC, often wearing their jerseys to weekend matches.
  arts: Cassandra Myers channels a love for watercolor into serene depictions of Georgia pine forests, follows the work of contemporary watercolorist Jean Haines, participates in weekly pottery sessions
    at Clay by the Creek, and regularly volunteers backstage at the Savannah Playhouse while debating art‑history podcasts from the Museum of Modern Art.
  travel: Cassandra Myers prefers road‑trip adventures to regional art festivals, having recently explored the Savannah Music Festival, the Asheville Folk Art Fair, and the Texas Folk Art Celebration, while
    balancing family time and a modest travel budget that leverages discount Airbnb stays and train passes.
  culinary: Cassandra Myers mixes Southern comfort cuisine with global twists, perfecting dishes like shrimp‑and‑grits with a citrus‑kick, fried chicken glazed with hot honey, collard greens sautéed with
    smoked turkey, and experimenting with berbere‑spiced lentil stew after reading travel memoirs.
  core: Cassandra Myers is a vibrant community arts champion who balances meticulous budgeting, creative bursts of watercolor, and a love for hiking, all while navigating occasional allergy flare‑ups and
    a penchant for spontaneous art‑festival road trips.
background:
  cultural: Cassandra grew up in a small town on coastal Georgia, steeped in Southern hospitality, church involvement, and a close‑knit community ethos. The region’s blend of traditional Southern values
    and the presence of the nearby Fort Stewart military base exposed her to a diverse set of perspectives, fostering an openness to new ideas while maintaining respect for local customs. Her family’s appreciation
    for folk crafts, Southern storytelling, and regional cuisine shapes her cultural identity, and she carries these influences into her artistic interests and community engagements.
attributes:
  skills: '[''Event planning'', ''Community outreach'', ''Volunteer coordination'', ''Interpersonal communication'', ''Basic graphic design'', ''Social media management'', ''Budget management'', ''Time
