  hobbies: '[''Watercolor painting'', ''Pottery'', ''Book club'', ''Hiking'', ''Community theater'', ''Cooking Southern cuisine'', ''Podcast listening (art, design, entrepreneurship)'', ''Traveling to art
    festivals'']'
  career_goals: Cassandra aims to leverage her community experience into a part‑time or freelance role as a community arts coordinator or outreach specialist for local non‑profits or Fort Stewart military
    family support programs. She plans to complete her associate degree in Communications or Arts Education and obtain a certification in nonprofit management. Over the next five years she hopes to launch
    a small business offering curated art workshops and custom décor services while mentoring youth in creative programs.
