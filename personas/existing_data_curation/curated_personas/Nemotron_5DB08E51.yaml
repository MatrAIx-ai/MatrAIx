personas:
  professional: Adalgisa Delafuente, a retired educator turned community mentor, channels decades of bilingual curriculum design and grant‑writing expertise into volunteer workshops where their methodical
    planning, pragmatic curiosity, and assertive advocacy for culturally responsive teaching shape every session.
  sports: Adalgisa Delafuente, an enthusiastic senior yogi, attends low‑impact classes at the Windermere Senior Fitness Club, walks the Lake Butler Trail each morning, cheers for the Orlando Magic and Orlando
    City SC from her patio, and volunteers as a timekeeper for the local senior softball league, balancing gentle activity with community sport involvement.
  arts: Adalgisa Delafuente, a devoted reader and cultural enthusiast, leads a bilingual book club that tackles historical novels like Hilary Mantel’s ‘Wolf Hall,’ enjoys dancing to salsa legends such as
    Celia Cruz at festivals, captures garden moments through amateur photography, and draws artistic inspiration from painters like Frida Kahlo, weaving these arts into her cooking classes and community
    events.
  travel: Adalgisa Delafuente, a leisurely traveler, plans detailed road trips to Florida’s Gulf Coast towns like Anna Maria Island, schedules annual visits to Washington, D.C.’s Smithsonian museums, dreams
    of exploring Oaxaca’s vibrant markets, and meticulously maps itineraries with spreadsheets, balancing a modest retirement budget with a thirst for both relaxation and cultural discovery.
  culinary: Adalgisa Delafuente, an experienced home chef, blends Floridian seafood such as blackened grouper and shrimp with fragrant garden herbs—including oregano, cilantro, and epazote—to craft dishes
    like citrus‑marinated ceviche, plantain‑scented paella, and spicy tomatillo salsa, frequently hosting intimate dinner gatherings where they occasionally over‑season out of enthusiasm and taste the pot
    a few minutes too long.
  core: Adalgisa Delafuente is a methodical, curiosity‑driven retiree who fuses bilingual education, tropical gardening, and community cooking, thriving on organized volunteer work while occasionally splurging
    on camera gear and over‑seasoning meals.
background:
  cultural: Born to Mexican immigrant parents, Adalgisa grew up in a bilingual household where Spanish was spoken daily and Mexican customs were celebrated alongside her integration into the broader American
    culture. She carries forward traditions such as Día de los Muertos altars, posadas, and the preparation of mole and tamales, while also embracing Florida’s coastal lifestyle. Her identity is shaped
    by a strong sense of familismo—placing family and community at the core of her life—combined with a respect for education as a pathway to upward mobility. In Orange County she participates in local
    Latino networks, contributes to multicultural events, and serves as a cultural bridge, helping newer immigrants adapt while preserving her own heritage.
