  hobbies: '[''Tropical gardening'', ''Mexican‑Floridian fusion cooking'', ''Hosting dinner gatherings'', ''Reading historical novels'', ''Book club participation'', ''Volunteer bilingual story‑time at
    library'', ''Gentle yoga'', ''Weekly church attendance'', ''Salsa and cumbia dancing at cultural festivals'']'
  career_goals: Though retired from formal employment, Adalgisa seeks to remain an active contributor to her community by serving as a volunteer mentor for new teachers, advising local schools on culturally
    responsive pedagogy, and co‑founding a bilingual reading program for preschoolers in Windermere. She hopes to document her experiences in a memoir that weaves together her Mexican heritage and decades
    in education, and to become an honorary board member of the Orange County Literacy Council. Her personal ambition includes maintaining her health and vitality through lifelong learning, exploring digital
    photography, and preserving her family’s stories for future generations.
