personas:
  professional: Sha Record, a 73‑year‑old facilities maintenance veteran at The Villages, blends an associate’s degree in facilities management with hands‑on expertise in HVAC, plumbing, and electrical
    systems to devise systematic preventive‑maintenance schedules, and they are currently drafting a community handbook while pursuing a Certified Maintenance Manager credential and planning a part‑time
    advisory role.
  sports: Sha Record, who enjoys low‑impact walking on the community’s nature trails, follows the Miami Dolphins football season and the St. Louis Cardinals baseball team on television, occasionally participates
    in a seniors’ pickleball league for a brief burst of activity, and they keep a modest collection of team scarves.
  arts: Sha Record, an avid reader of David McCullough biographies and Agatha Christie mysteries, finds solace crocheting blankets to the tunes of Ella Fitzgerald and while visiting the local arts center
    enjoys exhibitions of Georgia O'Keeffe’s paintings, and they use their quilting projects to reinterpret classic folk patterns, reflecting a gentle reverence for tradition.
  travel: Sha Record, who prefers well‑planned, low‑stress itineraries, has taken guided senior tours to Savannah, Georgia, Charleston, South Carolina, and the historic streets of St. Louis, dreams of seeing
    the sunrise over Acadia National Park, and they favor traveling by train or comfortable motor coach to avoid the hassles of driving.
  culinary: Sha Record, an enthusiastic herb gardener, regularly prepares fresh basil pesto pasta, rosemary‑infused roasted chicken, and mint tea, enjoys the occasional Southern comfort dish such as biscuits
    and gravy at community potlucks, and they consider themselves a competent home cook who still occasionally burns the edges of a quiche while multitasking.
  core: Sha Record, a meticulous 73‑year‑old with a lifelong dedication to dependable maintenance, quiet creative pursuits, and modest frugality, balances community service with solitary hobbies, and they
    occasionally over‑schedule garden watering but otherwise thrive on predictable routines.
background:
  cultural: Sha was raised in a middle‑class, mid‑western American family where reliability, a strong work ethic, and modesty were core values. Her upbringing reflected post‑war generational norms that
    prized routine, self‑reliance, and community service, often shaped by Protestant cultural influences emphasizing responsibility and neighborliness. Relocating to The Villages in Florida, she now lives
    within a retirement community that celebrates active aging and civic engagement, but she prefers the quieter side of that culture, focusing on solitary hobbies while still appreciating the shared values
    of courtesy, safety, and collective well‑being.
attributes:
  skills: '[''preventive maintenance scheduling'', ''HVAC system repair'', ''electrical troubleshooting'', ''plumbing repairs'', ''carpentry and woodworking'', ''inventory control'', ''safety compliance
    auditing'', ''staff training and mentorship'', ''energy efficiency assessment'']'
  hobbies: '[''herb gardening'', ''reading historical biographies'', ''mystery novels'', ''crochet'', ''quilting'', ''birdwatching'', ''jigsaw puzzles'', ''walking on nature trails'']'
  career_goals: Sha aims to formalize her decades of practical knowledge into a comprehensive maintenance handbook for The Villages, ensuring continuity and safety for future staff. She plans to earn a
    Certified Maintenance Manager (CMM) credential within the next two years and transition to a part‑time advisory role where she can focus on mentoring younger technicians. Additionally, she hopes to
    champion a community‑wide energy‑saving upgrade program that reduces operating costs while preserving the comfort and security of fellow residents.
