    building", "Data analysis of occupancy trends", "Problem solving"]'
  hobbies: '["Reading speculative fiction and philosophy", "Landscape painting", "Nature photography", "Hiking in Appalachia", "Gardening (native herbs and flowers)", "Writing short stories", "Playing piano",
    "Knitting", "Listening to folk music", "Puzzle solving (crosswords, Sudoku)"]'
  career_goals: Sandra aims to obtain a certified hospitality management credential and, in the long term, to purchase and transform a historic property into a boutique inn that showcases Appalachian art
    and nature retreats. She envisions creating a quiet, creatively stimulating environment for travelers and artists, while mentoring young staff in the industry. Additionally, she hopes to develop a small‑scale
    writer’s residency program that blends her love of abstract concepts with the region’s storytelling tradition.
