personas:
  professional: Sandra Foster is a seasoned hospitality operations manager who blends meticulous organizational skills with a vivid artistic vision, using their knack for interior design and local art curation
    to transform guest experiences while mentoring staff and planning a future boutique inn in the Appalachians.
  sports: Sandra Foster finds solace on quiet forest trails as an avid hiker with the Appalachian Trail Hiking Club, follows the West Virginia Mountaineers football team, enjoys cross-country skiing on
    local groomed trails in winter, and supplements the occasional trek with community yoga classes, preferring low-impact fitness over competitive sports.
  arts: Sandra Foster is a devoted painter of Appalachian landscapes inspired by Albert Bierstadt, a pianist who often retreats to folk-music gatherings featuring The Carolina Chocolate Drops, an enthusiastic
    reader of speculative fiction by Ursula K. Le Guin, and a knit-artist who incorporates traditional mountain motifs into their creations, all of which nourish their abstract storytelling.
  travel: Sandra Foster prefers slow, contemplative travel, meticulously planning itineraries that blend scenic hikes in the Blue Ridge Mountains, weekend stays at historic inns in Asheville, cultural excursions
    to Le Mont-Saint-Michel, and occasional trips to the misty highlands of Scotland to study mythic landscapes.
  culinary: Sandra Foster enjoys cooking with foraged native herbs like ramps and wild thyme, crafting dishes such as herb-infused pumpkin gnocchi, roasted venison with blackberry glaze, and brewing chamomile-lavender
    tea, while their garden supplies fresh ingredients that feed both their palate and creative spirit.
  core: Sandra Foster is a quietly imaginative hospitality professional who stitches together Appalachian art, thoughtful budgeting, and serene hikes into a life of purposeful solitude and gentle mentorship.
background:
  cultural: Sandra grew up in a tight‑knit Appalachian community in Raleigh County, WV, where hospitality and self‑reliance are deeply valued. Her upbringing emphasized storytelling, folk music, and a strong
    sense of local pride. Though she did not complete a formal high school diploma, she earned a GED and built her career through hands‑on experience, reflecting the region's tradition of learning through
    work. Her cultural identity includes participation in community church events, local arts festivals, and volunteer work at the town library, all of which reinforce the cooperative and considerate traits
    central to her personality.
attributes:
  skills: '["Guest services management", "Staff scheduling and shift coordination", "Budget preparation and financial tracking", "Inventory control and supply ordering", "Regulatory compliance (health,
