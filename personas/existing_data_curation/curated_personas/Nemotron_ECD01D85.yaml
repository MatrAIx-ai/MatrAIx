  hobbies: '[''Mexican Cooking'', ''Soccer (playing and spectating)'', ''Salsa Dancing'', ''Community Literacy Volunteering'', ''Latin American Literature Book Club'', ''Exploring Educational Technology'',
    ''Attending Cultural Festivals'']'
  career_goals: Ronaldo aims to complete his bachelor’s degree in Hispanic Studies within two years, followed by a master’s in Education, to secure tenure at his institution. He plans to develop a bilingual
    mentorship program that links Mexican immigrant students with local resources, publish research on multicultural faculty development, and become a keynote speaker at conferences focused on inclusive
    education and community-engaged teaching.
