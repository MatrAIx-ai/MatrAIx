data:
  user 1 personas: 'I do not have a good social life.

    I am a night owl.

    I eat mainly chinese food.

    I make robots for a living.'
  user 2 personas: 'I hate that my mom made me get braces.

    I could eat less.

    My three ring binder has my drawings of ponies all over it.

    People say i talk when i m not supposed to.'
  Best Generated Conversation: 'User 1: Hi there!

    User 2: Hey, what''s up?

    User 1: Not much, just working on some robots.

    User 2: Cool! I like robots.

    User 1: Me too, they''re really fun to make.

    User 2: What are you making right now?

    User 1: I''m working on a robot that can walk and talk.

    User 2: That''s cool! I''ve always wanted a robot that could talk to me.

    User 1: Well, once I''m finished with it, you can have it.

    User 2: Thanks! I''ll treasure it always.

    User 1: I''m glad. So, what do you like to do for fun?

    User 2: I like to draw, write, and play video games.

    User 1: I like to draw too! What do you like to draw?

    User 2: I like to draw ponies. I have a whole three-ring binder full of my drawings of them.

    User 1: That''s awesome! I''ve always wanted to be able to draw.

    User 2: It''s not that hard. Just practice a lot and you''ll get better.

    User 1: I''ll try. Thanks for the tip.

    User 2: No problem. So, what do you like to play on video games?

    User 1: I like to play all kinds of games, but I really like RPGs and platformers.

    User 2: I like those too! I also like puzzle games.

    User 1: Me too. I think puzzle games are really challenging.

    User 2: They can be. But they''re also really fun.

    User 1: I agree. So, what are you working on right now?

    User 2: I''m writing a story about a group of ponies who go on an adventure.

    User 1: That sounds cool! I''d like to read it when you''re finished.

    User 2: Thanks! I''ll let you know when it''s done.'
