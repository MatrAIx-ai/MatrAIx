  career_goals: Brandon aims to complete his GED within the next year and pursue a trade certification in automotive technology or culinary arts, fields that combine his hands‑on skills with his love for
    structured work. He also hopes to secure a position as a community event organizer for the Cass County Chamber of Commerce, where he can leverage his organizational talent and social energy. Long‑term,
    he sees himself in a supervisory role that balances practical management with opportunities to mentor younger teens, potentially as a youth program director or a small‑business manager.
