personas:
  professional: Brandon Rothman is a teen organizer who leads his school's debate and drama clubs, leveraging his natural charisma and methodical timing to manage events while also applying basic automotive
    tinkering skills to school projects, showing early promise as a future community event coordinator.
  sports: Brandon Rothman plays pick‑up basketball at the local park, follows the Indiana Pacers and the Cass County High School Tigers, and is a member of the Cass County Youth Basketball League, approaching
    fitness with a blend of competitive drive and social enjoyment.
  arts: Brandon Rothman curates playlists featuring Billie Eilish, Taylor Swift, and Kendrick Lamar, performs in drama club productions inspired by Lin‑Manuel Miranda, and creates short comedic TikTok sketches
    that echo Zach King's style, reflecting a love for performance and digital storytelling.
  travel: Brandon Rothman prefers structured road trips with clear itineraries, having backpacked through the Great Smoky Mountains on a family camping trip, dreaming of a weekend visit to Detroit’s automotive
    museum and a summer adventure at the Minnesota State Fair, while balancing school responsibilities.
  culinary: Brandon Rothman enjoys experimenting with grilled cheeseburgers, homemade mac & cheese with smoked Gouda, and lemon‑herb roasted chicken, cooking at a beginner level under their mother's guidance,
    and often plans meals as meticulously as event schedules, though they sometimes forget to clean up the kitchen afterward.
  core: Brandon Rothman is a talkative, plan‑obsessed teen who balances leadership in debate and drama with a passion for tinkering on a classic car, often juggling school, sports, and spontaneous TikTok
    creations.
background:
  cultural: Brandon was raised in a middle‑class, white, Midwestern family in Belton, Missouri. His heritage includes German and Irish ancestry common in the region. He grew up attending a local Methodist
    church, where community service and fellowship were emphasized. Family traditions include annual fishing trips, participation in the Cass County Fair, and a strong emphasis on practical skills such
    as gardening, carpentry, and cooking. The local culture values modesty, hard work, and close‑knit community ties, all of which have shaped Brandon’s outlook and everyday habits.
attributes:
  skills: '[''Event coordination'', ''Public speaking'', ''Basic automotive maintenance'', ''Social media content creation'', ''Time management'', ''Volunteer bookkeeping'']'
