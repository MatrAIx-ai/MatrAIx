personas:
  professional: Romelio Vazquez, an organized and methodical aspiring business professional, channels bilingual fluency, event-planning savvy, and spreadsheet analysis into coordinating community soccer
    tournaments and tutoring programs, and they eye a future as a logistics coordinator who bridges suppliers and markets with precision.
  sports: Romelio Vazquez, a midfield dynamo for a local amateur soccer squad, powers through weekly practices, joins the community center's pick-up basketball games, avidly follows the New York Mets and
    New York Islanders, and they blend structured training with spontaneous weekend matches.
  arts: Romelio Vazquez finds rhythm in evening salsa and cumbia classes while pumping to Bad Bunny and J Balvin, and they unwind with Netflix documentaries on global trade, letting the beats and visual
    storytelling weave into their organized, socially-driven lifestyle.
  travel: Romelio Vazquez prefers meticulously planned weekend getaways, balancing active exploration with downtime; they have already road-tripped to Pennsylvania's Amish country, explored the vibrant
    streets of New York City, and dream of hiking the Andes in Peru or soaking up the beaches of Costa Rica once finances allow.
  culinary: Romelio Vazquez, a confident home cook, revels in crafting golden-browned arepas filled with shredded cheese, hand-folded empanadas stuffed with spiced beef and potatoes, and hearty sancocho
    simmered with yucca, plantains, and corn, while they also seek out authentic street-food stalls for a taste of fresh arequipe and churros.
  core: Romelio Vazquez is a methodical social dynamo whose bullet-journal obsession, love for soccer midfield strategy, and occasional late-night reggaeton binge reveal a disciplined yet delightfully impulsive
    teen navigating the crossroads of business ambition and community service, and they constantly juggle structure with spontaneity.
background:
  cultural: Romelio grew up in a first‑generation Colombian family in Bay Shore. Spanish was spoken at home, and he celebrated Colombian holidays such as Independence Day (July 20) and Carnaval de Barranquilla
    with family gatherings, music, and traditional foods. The cultural emphasis on family cohesion, respect, and hospitality informs his cooperative and kind demeanor. He maintains regular video calls with
    relatives in Bogotá, helping preserve his connection to Colombian customs while navigating a bicultural identity in the United States.
attributes:
  skills: '[''Bilingual Spanish–English'', ''Team coordination'', ''Event planning'', ''Project management basics (Trello, Asana)'', ''Microsoft Office'', ''Google Workspace'', ''Customer service'', ''Data
    entry and spreadsheet analysis'', ''Time management'', ''Conflict resolution'']'
  hobbies: '[''Amateur soccer (midfield)'', ''Salsa and cumbia dance classes'', ''Cooking Colombian cuisine'', ''English tutoring for immigrants'', ''Listening to Latin music'', ''Watching trade documentaries'',
    ''Bullet journaling'', ''Community volunteering'']'
  career_goals: Romelio aims to complete his associate degree in Business Administration at Suffolk County Community College and then transfer to a university program in Supply Chain Management. He aspires
    to work as a logistics coordinator for a company that imports Colombian coffee and agricultural products, leveraging his bilingual ability and cultural insight to bridge suppliers and U.S. markets.
    In the long term, he hopes to advance into a senior operations manager role, overseeing cross‑border trade initiatives. Parallel to his professional track, Romelio is committed to becoming a mentor
    for recent immigrant youth in Bay Shore, using his organized approach to develop after‑school programs that promote education and cultural integration.
