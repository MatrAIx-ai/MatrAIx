  hobbies: '[''Oil painting'', ''Pottery'', ''Hiking'', ''Bird‑watching'', ''Kayaking'', ''Book club'', ''Community theater'', ''Museum volunteering'', ''Yoga'', ''Reflective journaling'']'
  career_goals: Jacqueline aspires to transition into a curriculum coordinator role where she can champion interdisciplinary, arts‑focused programs across the district. She aims to obtain a master's degree
    in Educational Leadership to better advocate for mental‑health resources and wellness initiatives for both students and staff. Long‑term, she hopes to establish a community arts partnership that connects
    local artists, Native American cultural educators, and schools, enriching the regional curriculum while promoting cultural awareness and emotional resiliency.
