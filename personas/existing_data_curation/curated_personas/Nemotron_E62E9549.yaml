personas:
  professional: Jacqueline Kelly, a 56‑year‑old veteran secondary‑school teacher with over twenty years of experience, blends rigorous curriculum design with arts‑integrated instruction; she leverages educational
    technology to craft interactive lessons, mentors new teachers with a balance of organization and flexibility, and assertively champions mental‑health resources while channeling her emotional intensity
    into nurturing collaborative, creativity‑rich classrooms.
  sports: Jacqueline Kelly, an avid outdoor enthusiast, spends weekends hiking the Rogue River trail network, kayaking on the river’s gentle bends, and bird‑watching with a local Audubon Society group;
    she roots for the Oregon Ducks football team and volunteers as a coach for a community youth soccer club, using these activities to ground her anxiety and maintain physical fitness.
  arts: Jacqueline Kelly, a dedicated painter and potter, draws creative fuel from the misty colors of the Rogue River and admires artists such as Georgia O'Keeffe, Claude Monet, and local Oregon ceramicist
    John Parker; she regularly volunteers as a docent at the Grants Pass Museum of Art, participates in community theater productions of "Our Town" and "The Glass Menagerie," and finds solace in reading
    works by poet Mary Oliver while attending live jazz performances by Gregory Porter.
  travel: Jacqueline Kelly, who prefers a blend of adventure and reflective retreats, plans road trips to scenic destinations like Multnomah Falls, the Columbia River Gorge, and the Redwood National and
    State Parks, has already visited Seattle’s Pike Place Market and Portland’s Art Walk, and dreams of a cultural pilgrimage to Santa Fe’s International Folk Art Market to deepen her vision for a future
    community arts partnership.
  culinary: Jacqueline Kelly, an enthusiastic home cook with intermediate skill, favors farm‑to‑table dishes such as grilled wild‑caught salmon with marionberry glaze, mushroom‑and‑hazelnut risotto, and
    hearty lentil stew seasoned with locally sourced rosemary; she loves experimenting with seasonal ingredients at the Grants Pass farmers' market and often serves her creations on hand‑thrown pottery
    bowls she crafts herself.
  core: Jacqueline Kelly is a curiosity‑driven, arts‑focused educator who balances intense anxiety with creative expression, community involvement, and a disciplined yet occasionally indulgent approach
    to life.
background:
  cultural: Jacqueline comes from a multi‑generational white American family with Irish and German roots. She grew up in the Midwest before moving to the Pacific Northwest in her early thirties, drawn by
    the region's natural beauty and strong community values. Living in Grants Pass, she has embraced the local culture's emphasis on outdoor recreation, environmental stewardship, and a vibrant arts scene.
    She respects the area's Native American heritage, incorporating indigenous histories and perspectives into her teaching where appropriate, and actively participates in regional cultural festivals and
    volunteer initiatives.
attributes:
  skills: '[''Curriculum development'', ''Differentiated instruction'', ''Classroom management'', ''Assessment design'', ''Educational technology integration'', ''Arts integration in lessons'', ''Student
