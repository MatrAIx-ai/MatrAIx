  hobbies: '[''Visiting art galleries and museums'', ''Digital photography (landscape & architecture)'', ''Reading poetry, modernist literature, and art criticism'', ''Writing personal essays and memoir'',
    ''Gardening (native plants and vegetables)'', ''Attending small artist talks and book club meetings'', ''Hiking and sketching nature'', ''Listening to classical music and philosophy podcasts'', ''Watercolor
    painting'', ''Collecting antique art prints'']'
  career_goals: Although retired, Joal aims to stay intellectually vibrant by completing a memoir that weaves his personal reflections with the cultural history of Bellingham’s art scene. He hopes to launch
    an online archive showcasing local artists and to volunteer as a docent-educator at the Bellingham Museum of Art, leading intimate tours for seniors. Over the next few years, he plans to travel to three
    major West Coast art exhibitions—Seattle’s Seattle Art Museum, Portland’s Portland Art Museum, and San Francisco’s de Young—to deepen his artistic knowledge. He also aspires to mentor younger volunteers,
    cultivate a small community garden focused on native plants, and sustain a regular creative practice to support his emotional wellbeing.
