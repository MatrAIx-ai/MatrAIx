  career_goals: Although retired from formal employment, Santana channels his ambition into legacy projects. He aims to complete a comprehensive digital archive of Saint Maries' settlement history, including
    oral interviews with longtime residents. He plans to self‑publish a memoir that weaves his personal story with the broader narrative of the region, preserving both family lineage and community memory.
    He also hopes to mentor a local high‑school student interested in history or archival work, passing on his research techniques and critical approach. Maintaining his physical health to continue gardening
    and nature walks is another personal goal, as is ensuring his spouse's well‑being through careful estate planning.
