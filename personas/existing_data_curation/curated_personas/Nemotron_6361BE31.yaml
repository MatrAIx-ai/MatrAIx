personas:
  professional: Santana Carrier, a retired humanities scholar turned community archivist, leverages their analytical acumen and hands‑on woodworking skill to digitize Saint Maries’ settlement records while
    juggling spontaneous field interviews that often clash with their preference for methodical cataloguing.
  sports: Santana Carrier, an avid chess competitor and senior walking club member, follows the Idaho Steelheads hockey team and the Portland Trail Blazers, while also joining occasional amateur scramble
    golf outings that satisfy their competitive streak in a low‑impact setting.
  arts: Santana Carrier, an aficionado of classic literature, regularly revisits works by Tolstoy and Austen, enjoys recordings of Béla Bartók's quartet, and attends the local community theater’s annual
    rendition of 'Our Town', finding the blend of narrative depth and live performance essential to their creative respite.
  travel: Santana Carrier plans trips with a spreadsheet of must‑see historic sites, favoring scenic drives to Yellowstone and a yearly pilgrimage to St. Louis’ History Museum, yet occasionally abandons
    the itinerary for an impromptu sunrise hike in the Selkirk Mountains whenever the weather permits.
  culinary: Santana Carrier prefers home‑grown herb‑infused dishes like rosemary‑potato soup and bean stew, brews Earl Grey tea with a splash of honey, and delights in crafting fresh bread using Idaho’s
    renowned russet potatoes, though they sometimes over‑salt the stew in a rush.
  core: Santana Carrier balances disciplined archival pursuits with spontaneous nature outings, embodying a meticulously curious mind that never quite tames its love for unexpected adventure.
background:
  cultural: Santana Ricardo Carrier is a white American whose family roots trace back to German and Irish immigrants who settled in the Pacific Northwest in the early 20th century. He grew up on a modest
    farm in the Midwest before moving to Idaho in his thirties, drawn by the region’s expansive forests and small‑town character. The rural Idaho culture—self‑reliance, respect for the land, and a low‑key
    social atmosphere—has shaped his values and daily habits. While he embraces the practical, hands‑on ethos of his community, his humanities education reflects a broader appreciation for literature, history,
    and critical inquiry. He participates in local traditions such as the Fourth of July parade and the annual harvest festival, but prefers to engage quietly, often volunteering behind the scenes with
    the Saint Maries Historical Society. His cultural identity blends the quiet, independent spirit of Idaho’s countryside with the intellectual curiosity fostered by his academic background.
