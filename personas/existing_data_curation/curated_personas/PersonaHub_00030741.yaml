persona_description: A historian or genealogist who is interested in the early history of fur trading in North America and the life of Gabriel Franchère, the clerk who wrote the journal that was later edited
  by Michel Bibaud and published as "Narrative of a voyage to the Northwest Coast of America in the years 1810, 11, 12, 13 and 14." The persona is also interested in the discrepancies between the original
  diary and later editions and the need for a comprehensive, authoritative version of Franchère's work.
