  hobbies: '[''Exploring local nature trails'', ''Woodworking'', ''Collecting vintage cameras'', ''Reading speculative fiction and philosophy'', ''Small-group art critique sessions'', ''Experimental cooking'',
    ''Traveling to art fairs and residencies'', ''Mindfulness meditation'', ''Playing acoustic guitar'']'
  career_goals: Johnny aims to secure representation with a forward‑thinking contemporary gallery in the Philadelphia region, followed by a solo exhibition that showcases his interdisciplinary practice.
    He dreams of receiving a residency that pairs technology and art, enabling him to develop a large‑scale public installation that engages community interaction. Long‑term, he hopes to establish his own
    studio space where he can mentor emerging artists while maintaining a flexible, self‑directed schedule that balances his competitive drive with his need for solitude and creative autonomy.
