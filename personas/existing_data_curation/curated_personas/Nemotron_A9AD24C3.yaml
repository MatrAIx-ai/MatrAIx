personas:
  professional: Johnny Morris, a 40‑year‑old interdisciplinary artist, merges electronic prototyping, 3D modeling in Blender and AutoCAD, and materials science into kinetic mixed‑media installations, leveraging
    their STEM‑driven curiosity and improvisational flair while they often battle tight deadlines and an aversion to rigid project structures.
  sports: Johnny Morris, an occasional trail‑runner who joins the Chester County Hiking Club for weekend hikes, enjoys casual pick‑up basketball games at a local community center while rooting for the Philadelphia
    76ers, and they prefer low‑key, self‑directed workouts over regimented gym routines, reflecting their resistance to rigid schedules.
  arts: Johnny Morris, an avid participant in intimate art‑critique circles, draws inspiration from the kinetic narratives of László Moholy‑Nagyi, the surreal photography of Man Ray, and the ambient soundscapes
    of Brian Eno, while they spend quiet evenings strumming acoustic renditions of Nick Drake and experimenting with mixed‑media installations that echo the experimental cinema of David Lynch.
  travel: Johnny Morris, who favors spontaneous, low‑key trips to regional art fairs in New York’s Hudson Valley and immersive artist residencies in rural France’s Loire Valley, plans most journeys on a
    whim using a sketchbook to map stops, yet they avoid lengthy vacations that would disrupt their studio rhythm, dreaming of a future visit to the kinetic sculpture gardens of Osaka, Japan.
  culinary: Johnny Morris, an experimental home cook with an intermediate skill set, loves crafting farm‑to‑table dishes like rosemary‑infused roasted carrots and charcoal‑seared steak topped with smoked
    paprika, while they also savor vintage coffee blends and occasionally indulge in a well‑aged blue cheese paired with honey, reflecting their appetite for both precision and creative improvisation in
    the kitchen.
  core: Johnny Morris, a 40‑year‑old restless inventor of art‑tech hybrids, balances a fierce competitive drive and meticulous curiosity with a chronic aversion to rigid deadlines, and they often find solace
    in late‑night sketching sessions and the occasional over‑caffeinated marathon of prototype testing.
background:
  cultural: Johnny grew up in a middle‑class, white Anglo‑American family in the suburban community of Exton, Pennsylvania, within Chester County's historically Quaker‑influenced region. His upbringing
    blended a respect for privacy and self‑reliance with exposure to the vibrant arts scene of nearby Philadelphia. This mix of suburban stability, regional appreciation for craftsmanship, and access to
    an urban cultural hub has shaped his independent yet collaborative artistic sensibility, informing both his work ethic and his appreciation for nuanced, unconventional creative expression.
attributes:
  skills: '[''Mixed‑media installation'', ''Digital painting'', ''3D modeling (Blender)'', ''CAD drafting (AutoCAD)'', ''Arduino programming for interactive art'', ''Sculpture (metal and wood)'', ''Concept
