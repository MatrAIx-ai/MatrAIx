  career_goals: At 81, Ottis’s primary goal is to remain physically independent and keep his home and garden well‑maintained for his wife’s comfort. He aims to pass his practical skills—such as woodworking
    and engine repair—to his grandchildren through hands‑on lessons. He wishes to document his family’s stories in a scrapbook or oral history for future generations. Ottis also hopes to expand his volunteer
    role at the local church by organizing senior‑support programs. Finally, he plans to complete a small shed for tool storage, reflecting his desire for orderly, predictable surroundings.
