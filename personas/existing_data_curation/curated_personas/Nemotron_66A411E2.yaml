  career_goals: Duane dreams of turning his love for art and culture into a career that connects people. He hopes to become a multimedia creator or graphic designer who uses visual storytelling to celebrate
    his Latin American and Indigenous heritage. He also envisions leading community workshops that teach youth about cultural art forms, and possibly studying media arts or cultural studies in college.
    In the short term, he aims to build a modest online portfolio and gain experience in his school’s art and drama clubs.
