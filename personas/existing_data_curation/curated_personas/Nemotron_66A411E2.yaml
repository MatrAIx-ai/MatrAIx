personas:
  professional: Duane Mccabe is a budding digital animator who turns sketches of video game characters into short clips, leveraging their natural curiosity and knack for improvisation to experiment with
    storytelling, even if their project timeline often drifts due to a relaxed attitude toward deadlines.
  sports: Duane Mccabe enjoys playing pickup soccer at the local park in spring, follows the Los Angeles Dodgers during baseball season, and cheers loudly for the high‑school basketball team, they show
    a sociable enthusiasm for team sports despite preferring creative over competitive activities.
  arts: Duane Mccabe thrives in the drama club, improvises quirky skits, draws inspiration from indie rock bands like Tame Impala, reggaeton star Bad Bunny, and folk group Mumford & Sons, and references
    iconic video‑game art from The Legend of Zelda while refining their own character designs.
  travel: Duane Mccabe loves spontaneous day trips to nearby state parks such as Yellowstone National Park, has a treasured memory of a family vacation to Washington, D.C., and dreams of visiting Tokyo’s
    Akihabara district for its gaming culture, they balance curiosity with a flexible, budget‑conscious travel style.
  culinary: Duane Mccabe is a beginner cook who regularly prepares spaghetti carbonara, homemade guacamole, and chocolate chip pancakes, they favor ingredients like fresh basil, ripe tomatoes, and sharp
    cheddar, and enjoy experimenting with family recipes while occasionally burning the toast due to multitasking.
  core: Duane Mccabe is a talkative, art‑obsessed teen who thrives on social interaction, leaps from sketch to animation with reckless enthusiasm, and balances a carefree approach to responsibilities with
    an earnest desire to improve.
background:
  cultural: Duane comes from a mixed Latin American and Indigenous background, with family roots tracing back to Mexican and Nahua (or other Central American indigenous) ancestors. Growing up in Stockton's
    vibrant Latino community, he celebrates traditions such as Día de los Muertos, quinceañeras, and community patron saint festivals. His household blends Spanish language, Mexican cuisine, and occasional
    indigenous rituals taught by grandparents, fostering a strong sense of cultural identity and pride.
