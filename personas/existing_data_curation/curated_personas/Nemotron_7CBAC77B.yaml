personas:
  professional: Aimee Scamihorn, a detail‑oriented line cook turned menu developer, channels her practical mindset and love for local herbs into crafting seasonal dishes that meet gluten‑free and vegetarian
    standards, while her knack for inventory control and clean‑station discipline helps her manage high‑pressure kitchens and quietly prepares her for a future sous‑chef role.
  sports: Aimee Scamihorn fuels her fitness routine with early‑morning hikes along the Sun Valley foothills, joins the Idaho Ridge Hiking Club for group treks, attends weekly yoga sessions at the Boise
    Fit Studio, and roots for the Boise State Broncos in college football while occasionally catching a Chukars game in the summer.
  arts: Aimee Scamihorn finds artistic solace in knitting intricate shawls while listening to Bon Iver and Fleet Foxes, devours historical fiction by Ken Follett and Philippa Gregory, and attends community
    theatre productions of classics by Arthur Miller, allowing the narratives to inspire her seasonal menu storytelling.
  travel: Aimee Scamihorn prefers low‑key road trips that combine hiking in Idaho’s Sawtooth National Forest with weekend stays at quaint B&Bs, has already explored the herb‑rich valleys of the Loire in
    France, and dreams of a future adventure to New Zealand’s South Island to forage for native ferns while keeping travel expenses within her moderate savings plan.
  culinary: Aimee Scamihorn, an adept home‑cook and professional chef, delights in foraging wild herbs such as nettles, ramps, and pine needles to craft dishes like nettle‑pesto pasta, wild‑fennel‑infused
    grilled salmon, and gluten‑free rosemary‑scented focaccia, constantly experimenting with seasonal Idaho produce.
  core: Aimee Scamihorn balances a meticulous culinary career with a habit of over‑checking inventory lists, a tendency to over‑think every menu decision, and a calming ritual of knitting between kitchen
    shifts to quiet an ever‑present anxiety.
background:
  cultural: Aimee descends from a Swiss‑German lineage, with grandparents who immigrated to the Pacific Northwest in the mid‑20th century. Her family settled in Idaho, where they embraced a culture of self‑reliance,
    community cooperation, and an appreciation for the outdoors. Growing up, she was exposed to a blend of traditional European home‑cooking—such as breads, cheese‑making, and hearty stews—and the farm‑fresh
    ethos of Idaho, which informs her culinary style and values. She celebrates this heritage through holidays like Oktoberfest and by preserving family recipes that combine Alpine flavors with local ingredients.
attributes:
  skills: '[''Culinary technique (sauté, braise, grill)'', ''Menu planning with seasonal ingredients'', ''Food safety & sanitation'', ''Inventory management'', ''Budgeting & cost control'', ''Baking and
    pastry basics'', ''Adaptation for dietary restrictions'', ''Team coordination and training'']'
  hobbies: '[''Hiking and nature walks'', ''Foraging for wild herbs'', ''Yoga and mindfulness meditation'', ''Knitting'', ''Volunteering at the local farmers’ market'', ''Reading historical fiction and
    food memoirs'']'
  career_goals: Aimee aims to advance to a sous‑chef position within the next two years, eventually becoming head chef at a farm‑to‑table restaurant that highlights Idaho’s produce. She wants to complete
    a professional culinary certification and possibly enroll in a culinary management program to strengthen her leadership capabilities. Long‑term, she dreams of opening a small community‑focused catering
    business that offers wholesome meals for local families and events, while maintaining a balanced schedule that supports her mental well‑being.
