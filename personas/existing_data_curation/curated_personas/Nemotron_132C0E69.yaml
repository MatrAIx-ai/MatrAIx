personas:
  professional: Maria Desouza, a 32‑year‑old IT support specialist with a humanities background, blends technical troubleshooting across Windows, macOS, and Linux with a talent for translating jargon into
    user‑friendly guides, and leverages their curiosity and collaborative spirit to champion inclusive digital solutions for arts organizations.
  sports: Maria Desouza, an avid participant in Westchester trail hikes and a member of a co‑ed soccer league, supports the New York Knicks in basketball and follows New York City FC in soccer, balancing
    weekend climbs with yoga to stay flexible.
  arts: Maria Desouza immerses herself in NYC’s art scene, attending pop‑up shows featuring emerging island‑influenced creators like Ebony G. Patterson and Yto Barrada, while she practices watercolor sketches
    of bustling streets, reads poetry by Ocean Vuong and the essays of bell hooks, and draws design inspiration from the bold graphics of Shepard Fairey.
  travel: Maria Desouza prefers short, culturally immersive trips, savoring the historic streets of Cartagena during a recent weekend getaway, planning a future solo hike through the Scottish Highlands,
    and balancing travel budgets by using points from a travel‑rewards credit card while occasionally missing longer vacations due to intensive work projects.
  culinary: Maria Desouza enjoys cooking hearty sancocho with yucca, plantains, and cilantro, masters a perfect mangú with onions and fried cheese, experiments with spice‑infused avocado toast, and often
    pairs meals with a robust espresso, yet they sometimes over‑salt their soups while perfecting their watercolor technique.
  core: Maria Desouza, a 32‑year‑old tech‑savvy art enthusiast, navigates life with relentless curiosity, a penchant for watercolor, a habit of double‑checking every email, and a worry‑prone mind that fuels
    both meticulous planning and spontaneous creative bursts.
background:
  cultural: Maria is a first‑generation American of Dominican descent. Raised in a bilingual household, she grew up speaking Spanish at home and English at school, which gave her a deep appreciation for
    both cultures. Family gatherings are centered around music, dance, and food—particularly merengue, bachata, and traditional dishes like sancocho and pasteles. She participates in local Dominican festivals
    and community organizations in the New York metropolitan area, keeping her heritage alive while also embracing the diverse cultural landscape of Westchester. Her Dominican roots shape her strong sense
    of community, her commitment to supporting fellow immigrants, and her love for rhythmic music and vibrant visual art. Though she respects her Catholic upbringing, she also values secular celebrations
    of cultural identity.
attributes:
  skills: '[''Hardware troubleshooting'', ''Software troubleshooting (Windows/macOS/Linux)'', ''Network diagnostics'', ''Remote assistance (VPN, TeamViewer)'', ''IT ticketing systems (ServiceNow, JIRA)'',
    ''Technical documentation and knowledge‑base management'', ''User training and workshop facilitation'', ''Bilingual support (English/Spanish)'', ''Basic graphic design (Adobe Photoshop, Canva)'', ''Content
    management (WordPress)'', ''Customer service with empathy'', ''Creative problem‑solving'', ''Project coordination'', ''Data privacy and security basics'']'
  hobbies: '[''Watercolor painting'', ''Sketching'', ''Museum and gallery visits'', ''Contemporary Caribbean art appreciation'', ''Bachata and merengue dancing'', ''Volunteer teaching computer basics'',
    ''Cooking Dominican cuisine'', ''Reading (poetry, fiction, social theory)'', ''Yoga and hiking'', ''Tech meetups and hackathons (mentoring)'']'
  career_goals: Maria aims to deepen her technical credentials while pivoting toward roles that intersect technology and the arts. In the next 12‑18 months she plans to earn CompTIA A+ and Network+ certifications
    and complete a short UX‑design course focused on digital‑media workflows. She wants to become the primary IT liaison for a museum, gallery, or cultural nonprofit, where she can support digital collections,
    interactive exhibits, and artist‑focused technology. Over the next five years, she envisions moving into an IT management position that oversees technology strategy for multiple arts organizations,
    championing inclusive digital access and community tech‑literacy programs. Ultimately, she hopes to launch a community initiative that provides free tech training and digital‑tool mentorship for emerging
    Dominican and other immigrant artists.
