persona_description: A computational nuclear physicist working on the development of the energy density functional (UNEDF) and related theories for describing the properties of finite nuclei and extended
  asymmetric nucleonic matter. The individual is part of the UNEDF collaboration, which includes researchers from seven national laboratories and nine U.S. universities, and is known for their work on the
  dynamics of quarks and gluons, the strong interaction between nucleons, and the development of new approaches for identifying the important degrees of freedom of the nuclear system. The persona is likely
  to have expertise in nuclear physics, quantum chromodynamics (QCD), effective field theory, and the use of computational methods to analyze and model nuclear systems. They may also have experience with
  the SciDAC program and the U.S. Department of Energy's Office of Science.
