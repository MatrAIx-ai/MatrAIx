  career_goals: In the short term, Toolsie aims to deepen her coding skills, win her middle‑school science fair, and achieve top grades in mathematics, while also participating in regional art competitions
    and honing her visual storytelling. Looking ahead, she envisions a career at the intersection of technology and creativity—such as a UI/UX designer, interactive media artist, or game developer—where
    she can craft experiences that blend aesthetic sensibility with functional design. She plans to attend a high‑performing high school with strong STEM and arts programs, eventually pursue a dual degree
    in Computer Science and Fine Arts, and incorporate narratives from her South Asian heritage into her work. Her competitive spirit fuels a desire to earn scholarships and be recognized in national contests.
