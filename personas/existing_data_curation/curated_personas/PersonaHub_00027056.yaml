persona_description: A person who is interested in higher education and has a keen eye for academic excellence. They are familiar with the UGC and AICTE guidelines and have a deep understanding of the difference
  between a Deemed University and an Autonomy College. They are also aware of the benefits of academic autonomy and how it can positively impact the Placements or Employability of graduates from autonomous
  colleges. They are likely to have a passion for teaching and are open to innovative teaching methods and assessment systems. They are also interested in the credit-based grade system and are aware of
  the internal assessment system that is in place in autonomous colleges.
