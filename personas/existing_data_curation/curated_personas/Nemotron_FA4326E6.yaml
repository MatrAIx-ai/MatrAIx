  hobbies: '["Salsa Dancing", "Bachata Dancing", "Cooking Traditional Mexican Cuisine", "Hiking Sierra Nevada Trails", "Community Volunteering (English Conversation Classes)", "Live Music Events", "Podcast
    Listening (Leadership & Personal Development)", "Karaoke Nights", "Gardening"]'
  career_goals: Talissa aims to progress from her current supervisory role to a regional sales manager position within the next three years, overseeing multiple territories and shaping broader sales strategies.
    She plans to earn her Bachelor’s degree in Business Administration and obtain a Certified Professional Sales Leader (CPSL) credential to solidify her knowledge base. Long‑term, she envisions establishing
    a consultancy focused on sales team development and cultural competency training, helping organizations build high‑performing, inclusive sales forces while preserving work‑life balance for herself and
    her family.
