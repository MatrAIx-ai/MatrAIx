  hobbies: '[''Oil painting'', ''Landscape photography'', ''Reading speculative fiction'', ''Poetry'', ''Acoustic guitar'', ''Songwriting'', ''Yoga'', ''Meditation'', ''Hiking in Chugach State Park'', ''Cooking
    fusion dishes'', ''Attending art gallery openings'', ''Participating in poetry readings'']'
  career_goals: Vixay aims to become a leading voice in the niche of art and environmental law, ultimately partnering at a firm that advises artists, cultural institutions, and indigenous communities on
    legal matters. He plans to launch a boutique practice that offers interdisciplinary counsel merging legal expertise with cultural insight, and he aspires to influence public policy on cultural heritage
    preservation in Alaska and the broader Pacific Northwest. Over the next five years, he hopes to publish a book exploring the relationship between law, imagination, and society, and he seeks a senior
    advisory role in a non‑profit focused on sustainable development and indigenous rights. His competitive drive pushes him toward thought‑leadership, speaking engagements, and recognition as an innovator
    in the legal field.
