personas:
  professional: Roger Lee, a 17‑year‑old digital illustrator and aspiring creative director, they blend graphic design expertise, basic Python coding, and debate‑honed persuasion to craft surreal multimedia
    portfolios while meticulously managing deadlines, reflecting community‑rooted discipline and a competitive edge.
  sports: Roger Lee, a lively teenager who follows the Boston Red Sox, Boston Celtics, and New England Patriots, they play pickup basketball at school and are a member of the Chicopee Youth Ultimate Club
    during the summer, balancing a strategic, competitive mindset honed in chess with a casual fitness routine that includes weekend runs to counteract their sedentary gaming schedule.
  arts: Roger Lee, a 17‑year‑old digital painter obsessed with surrealism, they draw inspiration from Salvador Dalí, contemporary meme‑artist Beeple, and the ambient soundscapes of Björk and Radiohead,
    regularly showcase work at Chicopee’s local art festivals and the Springfield Museum of Fine Arts, and keep a curated playlist of avant‑garde musicians to fuel their creative sessions.
  travel: Roger Lee, a 17‑year‑old explorer with a modest budget, they plan weekend road trips to Portland, Maine’s waterfront galleries and Boston’s historic sites while saving for a dream spring semester
    study abroad program in Tokyo, balancing a love for spontaneous street art tours with detailed itinerary spreadsheets that reflect their organized yet adventurous spirit.
  culinary: Roger Lee, a teenage food enthusiast, they enjoy whipping up spicy miso ramen, avocado toast drizzled with sriracha, and a weekend ritual of chocolate chip pancakes topped with maple syrup,
    while also mastering a solid stovetop clams dish reminiscent of local New England chowder, reflecting a blend of experimental kitchen confidence and comfort‑food nostalgia.
  core: Roger Lee is a 17‑year‑old hyper‑creative strategist who fuses disciplined project management with eclectic surreal art, a competitive edge, and a restless curiosity that fuels both digital masterpieces
    and relentless self‑improvement.
background:
  cultural: Roger was raised in Chicopee, a small industrial city in western Massachusetts with a strong New England heritage. His family is of Anglo‑American descent, tracing roots back several generations
    to the region’s early settlers, which has instilled in him a sense of self‑reliance and community pride. Growing up in a modest middle‑class household, he has been exposed to the area's blend of traditional
    values and a growing multicultural tapestry, including vibrant Hispanic and Polish neighborhoods, local art festivals, and community centers. This environment has fostered his appreciation for both
    individual achievement and collective cultural expression, shaping his worldview and creative outlook.
