    a cultural podcast'']'
  career_goals: Guided by his high standards and love of novelty, Roger aims to build a professional career at the intersection of art and technology. In the near term he plans to assemble a compelling
    digital portfolio of illustrations, multimedia projects, and written work to gain admission to a specialized visual arts program after completing a GED. He envisions becoming a creative director or
    multimedia producer for a forward‑thinking brand, crafting immersive visual narratives that blend abstraction with storytelling. Parallel to this, he intends to launch his own online content studio,
    producing a YouTube channel and Instagram feed that showcase experimental art, critical commentary, and interactive tutorials. He also hopes to organize a youth arts initiative in Chicopee, leveraging
    his organizational skills to mentor peers and compete for regional entrepreneurship awards.
