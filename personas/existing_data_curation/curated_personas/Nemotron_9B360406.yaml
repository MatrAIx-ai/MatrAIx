  career_goals: Sandra aims to move from managing a single restaurant to overseeing a portfolio of locations as a regional manager within the next five years. She plans to complete a bachelor’s degree in
    hospitality management, deepen her expertise in sustainable sourcing, and eventually open her own farm‑to‑table bistro that incorporates local art installations and community events. She also aspires
    to mentor emerging food‑service professionals, champion workplace wellbeing, and earn industry awards for culinary creativity and operational excellence.
