personas:
  professional: Stephanie Moore, a registered nurse renowned for her meticulous triage and infection‑control expertise, channels her disciplined organization and pragmatic curiosity into leading high‑stakes
    emergency shifts while mentoring new staff and embedding evidence‑based practices into daily workflows.
  sports: Stephanie Moore enjoys weekend hikes on Red Rock Canyon trails with a small group from her local hiking club, practices yoga three times a week for core strength, and follows the Las Vegas Raiders
    for the occasional adrenaline boost during the football season.
  arts: Stephanie Moore immerses herself in contemporary fiction—favoring authors like Chimamanda Adichie and Haruki Murakami—while capturing desert light through landscape photography, and unwinds to the
    smooth strains of Miles Davis and the soulful vocals of Alicia Keys.
  travel: Stephanie Moore plans her vacations with disciplined itineraries, favoring low‑key escapes to desert landscapes like Sedona and Zion National Park, while also penciling in future cultural trips
    to Barcelona and Kyoto for their historic architecture and culinary scenes.
  culinary: Stephanie Moore channels her creative energy into the kitchen, mastering Southern comfort dishes like buttermilk fried chicken and collard greens seasoned with Mediterranean sumac and olive
    oil, and delights in merging these flavors into innovative plates such as shrimp and grits with za'atar‑infused butter.
  core: Stephanie Moore blends meticulous organization with a quiet curiosity, balancing a disciplined nursing career and a lingering habit of binge‑watching true‑crime podcasts late into the night.
background:
  cultural: Stephanie grew up in a close‑knit Black family in Las Vegas, where church, community service, and education were core values. Her parents emphasized resilience, academic achievement, and caring
    for others, shaping her collaborative nature. She celebrates cultural traditions such as Juneteenth and Black History Month, frequently attending local events that honor African‑American heritage. Active
    in the Nevada Black Nurses Association, she mentors younger nurses and participates in health‑advocacy initiatives that address disparities facing the Black community. Her cultural roots inform her
    culinary tastes, music preferences, and commitment to culturally sensitive patient care.
attributes:
  skills: '[''Patient assessment'', ''IV therapy'', ''Wound care'', ''Medication administration'', ''Electronic medical records (EMR) documentation'', ''Infection control protocols'', ''Chronic disease
