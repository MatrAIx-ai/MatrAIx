    care'']'
  hobbies: '[''Reading contemporary fiction'', ''Landscape photography'', ''Yoga and meditation'', ''Cooking Southern and Mediterranean fusion dishes'', ''Journaling'', ''Hiking in the Nevada desert and
    nearby national parks'', ''Listening to jazz and R&B music'', ''Volunteering at community health clinics'', ''Knitting'']'
  career_goals: Stephanie aims to complete her BSN within the next year and pursue an MSN with a focus on nurse leadership or clinical specialization in critical care. She aspires to become a charge nurse
    or unit manager, where she can integrate evidence‑based practice and foster a supportive, low‑stress environment for her team. Long‑term, she envisions developing community health outreach programs
    that address mental‑health stigma in the Black community and mentoring aspiring nurses from underrepresented backgrounds. Her curiosity drives her to stay updated on emerging therapies, while her practicality
    ensures she translates that knowledge into measurable improvements in patient outcomes.
