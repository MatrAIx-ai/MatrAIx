personas:
  professional: Crystal Kennedy, a retired educator and seasoned community mentor, blends their meticulous curriculum design expertise with a practical curiosity for technology, orchestrating intergenerational
    digital‑literacy workshops while assertively upholding high standards for every program.
  sports: Crystal Kennedy cheers for the St. Louis Cardinals and the St. Louis Blues, participates in a senior walking club that meets each Saturday at Forest Park, and prefers their garden’s gentle lifting
    of soil to any high‑intensity gym routine.
  arts: Crystal Kennedy finds artistic solace playing Beethoven piano sonatas and singing along to Judy Collins folk ballads, while also volunteering to read historical fiction aloud at the local library’s
    senior program, merging music and literature in their community service.
  travel: Crystal Kennedy favors low‑key road trips to historic sites such as the Jefferson National Expansion Trail and a recent genealogy pilgrimage to ancestral villages in England, balancing their love
    of discovery with a modest travel budget and a preference for staying with relatives or friends.
  culinary: Crystal Kennedy cultivates a vibrant garden of heirloom tomatoes, rainbow carrots, and native coneflowers, often turning the harvest into rustic ratatouille and buttery cornbread, yet their
    enthusiasm sometimes leads to over‑salting the sauce.
  core: Crystal Kennedy merges disciplined organization, a lifelong curiosity, and a gentle stubbornness that fuels their garden, piano, and community workshops, while occasionally indulging in seed‑buying
    splurges and neglecting daily flossing.
background:
  cultural: Crystal was raised in a mid‑Midwestern, white American family that valued education, community involvement, and self‑reliance. Growing up in the post‑war era, she experienced the social shifts
    of the 1960s and 1970s, which cultivated her balanced perspective of curiosity and practicality. Her upbringing emphasized modesty, hard work, and civic duty, leading her to a career in education and
    later to active participation in local non‑profits. The cultural norms of St. Louis County—strong community ties, an appreciation for historical preservation, and a penchant for organized civic events—have
    deeply shaped her values and day‑to‑day practices.
attributes:
  skills: '[''Curriculum development'', ''Classroom management'', ''Adult education facilitation'', ''Technology integration (e.g., Zoom, interactive whiteboards)'', ''Project planning and event coordination'',
