persona_description: A Native American archaeologist who specializes in the study of pre-Columbian American Indian cultures, particularly those of the Ohlones people. He has extensive knowledge and experience
  in the excavation and analysis of prehistoric human remains, and has worked extensively in the Bay Area. He is the curator of Mission Dolores and is responsible for removing the remains and transporting
  them to the Ohlones Indian Cemetery in Fremont. He is known for his expertise in identifying gender and age from the remains, and for his ability to determine the time period of burial. He has served
  as the Most Likely Descendant for the Native American Heritage Commission and is expected to find additional remains over the course of the excavation.
