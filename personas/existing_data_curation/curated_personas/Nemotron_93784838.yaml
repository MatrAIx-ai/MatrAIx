  career_goals: Maria aims to move from her current sales associate position to a store manager role within the next three years, leveraging her leadership potential and compassionate style to foster a
    supportive and harmonious workplace. She is pursuing a part‑time bachelor's degree in business administration to broaden her strategic skills. In the short term, she seeks opportunities to mentor new
    hires and spearhead community‑focused retail initiatives, such as local charity drives and customer education events. Long‑term, she envisions overseeing multiple stores or transitioning into a corporate
    role that blends retail expertise with community engagement and employee well‑being programs.
