  career_goals: Nathalie aims to pursue a career that blends art and technology, such as graphic design, interactive media, or museum curation. She dreams of creating culturally resonant visual works that
    celebrate Mexican heritage while engaging a broad audience. In the longer term, she envisions leading community art initiatives that empower young people to explore their identities through creative
    expression. Her ambition includes earning a scholarship for a specialized art program and eventually obtaining a degree in visual communications or cultural studies.
