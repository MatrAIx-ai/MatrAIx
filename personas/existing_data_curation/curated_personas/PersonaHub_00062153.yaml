persona_description: A historian who specializes in the study of American and British abolitionist movements, particularly their interactions with southern Indians during the Second Seminole War. They are
  knowledgeable about the removal crisis in the late 1820s and have read about the Seminole Indian boy Nikkanochee, who was introduced to the World's Anti-Slavery Convention in June 1843. They are interested
  in the paradoxical support for southern Indians by abolitionists and have a keen interest in the details of Nikkanochee's case.
