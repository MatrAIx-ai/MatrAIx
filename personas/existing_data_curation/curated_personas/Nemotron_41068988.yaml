personas:
  professional: Sharlotte Flores, a seasoned cement mason and decorative concrete specialist with over two decades of hands‑on expertise, channels their curious, artistic mindset into precise mix designs
    and intricate stamped patterns while navigating spontaneous project changes, and they wrestle with the need for tighter organization on the road to an NCCER certification, an OSHA 30‑hour credential,
    and a future boutique studio that will mentor women and apprentices from underrepresented communities.
  sports: Sharlotte Flores fuels fitness by hiking the Blue Hills Reservation on weekends, playing casual soccer with a local community league, and cheering for the Boston Red Sox and Celtics, while they
    rely on a sporadic gym routine to sustain the strength needed for demanding concrete work.
  arts: Sharlotte Flores draws creative fuel from regular visits to the Museum of Fine Arts, Boston, immersing themselves in works by Monet and Ai Weiwei, participating in community mural projects, and
    dabbling in pottery and metalworking workshops, all of which inform the decorative concrete motifs they craft for cafés and public spaces.
  travel: Sharlotte Flores prefers spur‑of‑the‑moment road trips to coastal New England towns like Portland and Portsmouth, admires the natural beauty of the White Mountains, and plans a future culinary
    pilgrimage to Costa Rica to study authentic gallo pinto, balancing a modest travel budget while they seek new sustainable building ideas.
  culinary: Sharlotte Flores enjoys experimenting in the kitchen, blending Costa Rican staples such as gallo pinto and citrus‑marinated ceviche with New England ingredients like lobster, maple‑glazed apples,
    and fresh clams, crafting dishes like lobster‑topped gallo pinto and cedar‑smoked salmon ceviche, while they often over‑season in pursuit of bold flavor harmony.
  core: Sharlotte Flores is a curious, hands‑on concrete artisan who balances artistic spontaneity with sporadic organization, turning everyday materials into museum‑inspired designs while they occasionally
    lose track of deadlines and budgeting details.
background:
  cultural: Sharlotte is a first‑generation Costa Rican immigrant who grew up in a bilingual household, preserving traditions such as celebrating Día de los Santos, savoring gallo pinto for breakfast, and
    playing fútbol on weekends. Though she has lived in Malden, MA for many years, she remains connected to the vibrant Costa Rican diaspora through local cultural festivals, a Spanish‑language church community,
    and regular visits to relatives in San José. Her cultural identity informs her strong sense of community, love for rhythmic music, and an appreciation for vibrant colors—elements that often surface
    in her artistic concrete projects. She balances the warmth and collectivism of her heritage with the independent, pragmatic ethos of her New England environment.
attributes:
  skills: '[''Concrete Finishing'', ''Terrazzo Installation'', ''Formwork Carpentry'', ''Mix Design and Material Testing'', ''Blueprint Reading'', ''Power Tool Operation'', ''Health & Safety Compliance'',
    ''On‑site Problem Solving'', ''Mentoring Apprentices'', ''Bilingual Spanish‑English Communication'']'
  hobbies: '[''Gallery Visits'', ''Sketching Architectural Details'', ''Community Mural Painting'', ''Hiking'', ''Cooking Costa Rican‑New England Fusion'', ''Listening to Sustainable Building Podcasts'',
    ''Participating in Short‑Term Craft Workshops'']'
  career_goals: Sharlotte aims to transition from hands‑on execution to a supervisory and creative leadership role. She plans to earn an NCCER certification in concrete finishing and an OSHA 30‑hour construction
    safety credential within the next two years. Her long‑term ambition is to launch a boutique concrete‑art studio that offers custom stamped and polished terrazzo floors for local cafés, community murals,
    and eco‑friendly cement projects. She also hopes to mentor more young workers, especially women and Latinx apprentices, by establishing a small apprenticeship program in the Greater Boston area.
