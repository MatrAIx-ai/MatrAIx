  career_goals: Francelia aims to obtain her GED within the next year and enroll in a community college program that leads to a career in health sciences, with a particular interest in becoming a registered
    nurse or a community health worker serving Queens neighborhoods. She is drawn to roles that combine her love for helping others with her organizational strengths, such as coordinating health outreach
    programs for youth. In the longer term, she envisions leveraging her social‑media savvy to promote health education and celebrate Cuban culture, possibly creating a bilingual platform that bridges community
    resources and cultural heritage.
