personas:
  professional: Francelia Vega, a 16‑year‑old aspiring health‑science student, channels their natural organization and bilingual fluency into coordinating after‑school health outreach at the local community
    center, creates short TikTok videos that blend basic nursing tips with cultural dance, and aims to earn a GED before enrolling in a community college program to become a registered nurse or community
    health worker serving Queens neighborhoods.
  sports: Francelia Vega, an enthusiastic participant in Queens Community Center’s Saturday night basketball pick‑up league, looks up to the New York Knicks and follows the New York Liberty’s WNBA season,
    also enjoys cheering for the New York Rangers during hockey season, and complements court workouts with salsa and bachata practice to stay agile and fit.
  arts: Francelia Vega, a vibrant TikTok creator, showcases salsa and bachata choreography set to tracks by Bad Bunny, Ros Alía, and Shakira, curates fashion lookbooks featuring pieces from Zara, H&M, and
    vintage thrift finds, draws inspiration from contemporary YA authors like Angie Thomas and Brit Bennett, and regularly attends Caribbean street‑art festivals that celebrate muralists such as Basquiat
    and Kehinde Wiley, weaving these artistic influences into their digital content.
  travel: Francelia Vega loves exploring Queens neighborhoods on the A and 7 trains, frequently visits Astoria for its eclectic cafés and the Museum of the Moving Image, dreams of weekend road‑trips to
    the Long Island beaches of Rockaway, and aspires to experience the vibrant streets of San Juan, Puerto Rico, balancing low‑budget public‑transit travel with occasional family trips to upstate New York’s
    Adirondacks for hiking.
  culinary: Francelia Vega delights in cooking family‑favorite dishes like ropa vieja and empanadas, seasoning the stews with cumin, oregano, and a splash of sour orange juice, pairing them with crispy
    plantain chips and a refreshing mango‑lime mocktail, while experimenting with twists such as adding black beans to empanada fillings and documenting the process in bite‑sized TikTok tutorials that showcase
    their growing culinary confidence.
  core: Francelia Vega is a hyper‑organized teen who blends salsa rhythm, TikTok flair, and a budding health‑care ambition into a bilingual hustle, balancing disciplined study for a GED with spontaneous
    dance‑offs and occasional late‑night editing marathons.
background:
  cultural: Francelia was raised in a close‑knit Cuban‑American household in Forest Hills, where Spanish is spoken at home and family gatherings revolve around music, dance, and food. Her grandparents immigrated
    from Cuba and share stories of their homeland, instilling in her a deep appreciation for Cuban traditions such as celebrating San Juan, Cuban Independence Day, and participating in the annual Cuban
    Day Parade in New York City. She balances these cultural practices with the diverse influences of Queens, attending both local school events and community festivals that reflect the borough's multicultural
    fabric. This blend of her Cuban heritage and American upbringing shapes her values of family loyalty, resilience, community service, and a love for vibrant artistic expression.
