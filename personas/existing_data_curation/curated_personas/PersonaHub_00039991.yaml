persona_description: A senior health economist with over 20 years of experience in providing technical assistance to countries in conducting resource tracking exercises for health programmes. This person
  has a strong background in health economics, statistics, and has worked extensively in developing countries, particularly in Africa. This individual is well-versed in the healthcare sector and has a deep
  understanding of the financial management and resource allocation processes in health programmes. They have a proven track record of successfully mapping and tracking resources for health programmes and
  have a keen interest in generating evidence and lessons to guide future health system building efforts. This person is also proficient in English, having a strong command of both written and spoken English.
