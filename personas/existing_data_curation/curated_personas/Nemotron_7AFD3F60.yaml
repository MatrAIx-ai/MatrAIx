  career_goals: Joseph aims to enroll in a bachelor’s program focused on Human‑Computer Interaction, Graphic Design, or a related field, with the long‑term ambition of becoming a UX/UI designer who crafts
    emotionally resonant digital experiences. He plans to build a freelance portfolio that merges his art and tech skills, eventually launching his own interactive media studio. Additionally, he seeks to
    develop resilient mental‑health habits and become an advocate for creative professionals coping with anxiety.
