persona_description: A radiologist who is involved in a phase-3 clinical trial testing the effectiveness of a device called ExAblate 2000 in relieving pain in bones invaded by cancer. The radiologist is
  part of a team at Stanford University and is working with a postdoctoral scholar to evaluate the device's efficacy in treating cancer patients. The radiologist is looking for evidence of the device's
  effectiveness in reducing pain and improving the quality of life for patients who have undergone radiation therapy for cancer. The radiologist is also interested in the device's potential as a viable
  alternative to external-beam radiation therapy for patients who have not responded to radiation therapy.
