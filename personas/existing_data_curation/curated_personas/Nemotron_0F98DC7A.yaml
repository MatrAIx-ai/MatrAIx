personas:
  professional: Shanon Browy, a 28-year-old precision manufacturing specialist in Seattle, blends a STEM background with hands-on fabricator experience to lead ISO-9001 quality inspections, CNC machining,
    and lean process improvements while quietly steering small teams toward sustainable robotics integration through meticulous documentation and assertive yet collaborative leadership.
  sports: Shanon Browy is an avid hiker of the Cascades, a seasonal cyclist who rides the Seattle waterfront trail, a devoted fan of the Seattle Seahawks and Seattle Sounders, and a member of the local
    Seattle Running Club that meets for early-morning runs on Saturdays.
  arts: Shanon Browy expresses creativity through watercolor landscapes inspired by the misty Pacific Northwest, digital illustrations that echo the whimsical style of Beeple and find inspiration in the
    works of Georgia O'Keeffe, while curating indie folk playlists featuring Phoebe Bridgers and Fleet Foxes during her studio sessions.
  travel: Shanon Browy prefers purposeful travel, planning weekend escapes to Whidbey Island and the Hoh Rainforest for quiet hikes, while dreaming of a spring trip to Kyoto's tea houses and an Icelandic
    road trip to Reykjavik's geothermal spas, balancing a modest travel budget with a love for off-the-beaten-path photography.
  culinary: Shanon Browy enjoys experimental cooking at home, often whipping up miso-glazed salmon with smoked black garlic, hand-shaping sourdough loaves infused with roasted beets, and crafting matcha-infused
    panna cotta, while relying on a well-organized spice rack to fuel her culinary curiosity.
  core: Shanon Browy is a detail-oriented maker who harmonizes quiet curiosity, sustainable design, and a penchant for late-night tinkering with a disciplined yet occasionally procrastinating approach to
    life.
background:
  cultural: Shanon is a white American raised in the Pacific Northwest, with family roots tracing back to Anglo‑German heritage. Growing up in Seattle, she absorbed the region’s blend of tech‑driven innovation,
    environmental consciousness, and a strong DIY maker culture. This background informs her practical problem‑solving approach, appreciation for sustainable design, and participation in community activities
    that celebrate both artistic expression and collaborative craftsmanship. Her upbringing emphasized both individual responsibility and collective cooperation, shaping her balanced, reserved yet assertive
    personality.
attributes:
  skills: '[''CNC machining'', ''CAD modeling (SolidWorks, Fusion 360)'', ''Blueprint reading'', ''Composite material fabrication'', ''Electrical troubleshooting'', ''Robotics integration'', ''Quality inspection
    (ISO 9001)'', ''Lean manufacturing'', ''Problem solving'', ''Team collaboration'', ''Project documentation'']'
  hobbies: '[''Watercolor painting'', ''Sketching'', ''3D printing projects'', ''Woodworking'', ''Hiking in the Cascades'', ''Visiting art galleries'', ''Attending maker fairs'', ''Reading science fiction'',
    ''Cooking experimental recipes'', ''Board game nights'']'
  career_goals: Shanon aims to transition from a skilled assembler to a production engineer or team lead, focusing on process optimization and sustainable manufacturing practices. She plans to earn a Six
    Sigma Green Belt and a Certified Manufacturing Engineer credential within the next three years. Long‑term, she envisions opening a small maker studio that blends functional fabrication with artistic
    design, offering custom furniture and community workshops. Her ambition includes mentoring junior technicians, fostering a collaborative environment for small groups, and contributing to Seattle’s vibrant
    maker ecosystem.
