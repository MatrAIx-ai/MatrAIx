persona_description: A researcher interested in the study of complex networks, particularly in the brain and its information processing mechanisms. They are exploring the role of complex networks in brain
  function and are developing artificial neural networks with complex topological features to investigate information flow and computation in these networks. They are also investigating the atypical brains
  in autism spectrum disorders and are constructing a simulator of cortical neural networks to understand the relationship between brain structures and their activities and to elucidate the mechanisms of
  symptoms of ASD.
