  hobbies: '[''Abstract painting'', ''Sketch journaling'', ''Poetry writing'', ''Street photography'', ''Visiting art galleries and museums'', ''Community theater attendance'', ''Volunteering at youth art
    workshops'', ''Reading contemporary fiction and philosophy'', ''Mindfulness meditation'']'
  career_goals: Mary aspires to move beyond her current role as a crossing guard into a supervisory position within the Saint Louis County Department of Public Safety, eventually becoming a Safety Coordination
    Manager. She hopes to design and implement city‑wide pedestrian‑safety campaigns that weave visual art and storytelling to engage diverse audiences. Long‑term, she envisions creating a community art
    program that partners with local schools to produce murals and installations that highlight road‑safety themes, thereby merging her artistic passions with public‑service goals. She also plans to pursue
    a graduate certificate in urban planning or public administration to deepen her expertise in city‑wide mobility and equity initiatives.
