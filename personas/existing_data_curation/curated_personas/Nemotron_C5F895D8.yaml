personas:
  professional: Mary Green, a dedicated crossing guard certified in first aid and CPR, blends meticulous traffic‑control expertise with an imaginative eye for visual storytelling, using their strong observational
    skills and cooperative nature to mediate tense driver‑pedestrian interactions, train new guards, and envision city‑wide safety campaigns that weave art into public messaging.
  sports: Mary Green, an enthusiastic fan of the St. Louis Cardinals and St. Louis City SC, participates in a local adult soccer league on Saturdays, practices yoga at a community studio twice a week to
    stay flexible for their physically demanding guard duties, and follows the MLB and MLS seasons closely while cheering loudly at the stadium when possible.
  arts: Mary Green, a prolific painter of abstract landscapes, poet at a neighborhood literary salon, and street photographer capturing everyday St. Louis moments, draws inspiration from jazz icons like
    Miles Davis, contemporary visual artists such as Kehinde Wiley, and regularly volunteers to lead youth art workshops at the community center, integrating their love for music and visual art into their
    creative practice.
  travel: Mary Green, an inquisitive traveler, enjoys weekend road trips to Memphis for blues festivals, a summer escape to Savannah’s historic streets, and dreams of wandering Mexico City’s mural‑rich
    neighborhoods to study urban art, planning trips with a meticulous budget yet allowing spontaneous detours to satisfy their curiosity.
  culinary: Mary Green, an intermediate home cook, loves experimenting with Creole flavors like gumbo, collard greens, okra, and smoked paprika, frequently incorporates sweet potatoes into their dishes,
    and indulges in peach cobbler as a comforting dessert, balancing hearty, spicy meals with occasional gourmet experiments.
  core: Mary Green, a 35‑year‑old crossing guard turned community artist, fuses safety expertise with creative passion, navigates life’s stresses through mindfulness, meticulously budgets while splurging
    on art supplies, and dreams of reshaping city streets with murals that empower pedestrians, reflecting how they blend order and imagination.
background:
  cultural: Mary grew up in a close‑knit African‑American family in St. Louis, where church, music, and community gatherings were central to daily life. Her grandparents shared stories of the Great Migration
    and the rich cultural legacy of the city’s historic Black neighborhoods, instilling in her a deep sense of pride and responsibility. She regularly participates in Juneteenth celebrations and local Black
    arts festivals, drawing inspiration from jazz, blues, and contemporary African‑American visual artists. Her cultural heritage informs her collaborative spirit, her emphasis on harmony in relationships,
    and her desire to use art as a vehicle for community empowerment and social change.
attributes:
  skills: '[''First aid and CPR certification'', ''Traffic control and flagging procedures'', ''Training and mentorship of crossing guard staff'', ''Community outreach and safety education'', ''Conflict
