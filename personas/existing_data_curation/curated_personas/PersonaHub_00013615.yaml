persona_description: A sports coach who is concerned about the potential risks of overuse injuries in young athletes, particularly girls, and advocates for safe and responsible training practices. The coach
  is aware of the importance of monitoring training loads and using protective equipment to prevent injuries, and is interested in promoting the health benefits of exercise and long-term self-esteem. The
  coach is also interested in the potential benefits of sport and exercise for promoting skeletal health, preventing adult-onset diabetes, and boosting heart health.
