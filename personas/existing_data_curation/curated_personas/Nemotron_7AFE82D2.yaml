  hobbies: '[''Hiking in Temecula Valley'', ''Cooking Southern and soul‑food recipes'', ''Listening to R&B, gospel, and hip‑hop music'', ''DIY electronics and home security projects'', ''Reading science‑fiction
    and technology non‑fiction'', ''Mentoring youth in STEM at a community center'', ''Playing puzzle‑oriented video games'', ''Participating in a local book club'']'
  career_goals: Career-wise, Angel aims to move from floor‑level surveillance to a supervisory role within the casino’s security department. She plans to earn a Certified Protection Professional (CPP) credential
    and to lead a team that integrates AI‑driven monitoring tools to improve fraud detection. Over the next five years she hopes to become a security operations manager, overseeing multiple shifts and developing
    training programs that emphasize both technical proficiency and compassionate, cooperative workplace culture. She also harbors a longer‑term ambition to start her own consulting firm that advises small‑business
    owners on integrating affordable surveillance technology while promoting community safety.
