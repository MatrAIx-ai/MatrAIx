personas:
  professional: Alicia Prado, a seasoned social worker with expert case management, crisis intervention, and bilingual communication skills, applies their organized, methodical nature and quiet empathy
    to develop culturally sensitive community programs and meticulously document client progress.
  sports: Alicia Prado, an avid hiker who joins the Eagle Trail Hiking Club for weekend treks along the Boise River Canyon, follows the Boise State Broncos football season, keeps an eye on the Portland
    Trail Blazers for basketball, enjoys occasional snowshoeing in the winter, and treats fitness as a quiet, reflective ritual rather than competitive sport.
  arts: Alicia Prado, a quiet connoisseur of the arts, fills their evenings with Frida Kahlo’s paintings, the cinema of Guillermo del Toro, Juan Gabriel’s classic ballads, and the literary works of Carlos
    Fuentes, letting these cultural touchstones inform their quilting designs and book‑club discussions.
  travel: Alicia Prado prefers low‑key, purpose‑driven travel, having explored the historic streets of Mexico City and the natural beauty of Sedona, while dreaming of a pilgrimage to Oaxaca’s culinary festivals
    and a relaxed getaway to the seaside town of Carmel‑by‑the‑Sea, always planning trips months ahead to fit their budget and caregiving schedule.
  culinary: Alicia Prado, a capable home cook, expertly prepares traditional Mexican comfort foods like tamales de hoja, enchiladas verdes with homemade masa, and mole poblano flavored with chipotle and
    cacao, often incorporating fresh vegetables from their garden such as zucchini, tomatillos, and cilantro, and enjoys sharing these meals at neighborhood potlucks.
  core: Alicia Prado blends quiet diligence with a nurturing spirit, crafting quilts for shelters while occasionally over‑booking community projects, and they find peace in solitary gardening and the hum
    of hummingbird feeders.
background:
  cultural: Alicia was raised in a Mexican‑American household where Spanish was spoken at home, and family traditions such as Día de los Muertos and festive gatherings were central to her upbringing. Growing
    up in Wisconsin, she blends Mexican cultural values of familial loyalty, respect, and community with the Midwestern emphasis on modesty and self‑reliance. Her Catholic roots and community involvement
    have shaped her compassionate outlook, while her bilingual abilities allow her to serve as a bridge between the local Hispanic population and the broader community.
attributes:
  skills: '[''Case Management'', ''Crisis Intervention'', ''Resource Coordination'', ''Community Outreach'', ''Cultural Mediation'', ''Report Writing'', ''Program Development'', ''Conflict Resolution'',
    ''Bilingual Communication (Spanish/English)'']'
  hobbies: '[''Gardening'', ''Reading historical fiction'', ''Cooking Mexican cuisine'', ''Quilting'', ''Crocheting'', ''Hiking'', ''Small book club participation'']'
  career_goals: Alicia aims to advance into a supervisory role within the county’s social services department, where she can lead a bilingual outreach program that addresses the specific needs of Hispanic
    seniors and immigrant families. She aspires to obtain a Licensed Clinical Social Worker (LCSW) credential through a community college certification pathway, despite her non‑traditional educational background.
    Long‑term, she hopes to establish a community resource center offering workshops on health, legal rights, and cultural integration, and to mentor younger social workers from diverse backgrounds.
