  hobbies: '[''photography'', ''gardening'', ''historical reading'', ''art gallery visits'', ''poetry readings'', ''woodworking'', ''crafting workshops'']'
  career_goals: In the coming years Richard aims to turn his home‑repair expertise into a part‑time handyman service focused on assisting senior residents in West Springfield, while pursuing a GED and a
    certificate in historic preservation to blend his practical skills with his love of local history and art. He also hopes to secure a regular volunteer docent position at the Springfield Museums, allowing
    him to share his curiosity about art and regional heritage with visitors, and to deepen his engagement with the community through organized cultural programs.
