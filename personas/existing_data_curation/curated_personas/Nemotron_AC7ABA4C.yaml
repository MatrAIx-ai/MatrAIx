personas:
  professional: Evelyn Batts, a 31‑year‑old meticulous Mississippi building inspector with a knack for interpreting blueprints and navigating the International Building Code, leverages her detail‑oriented
    mindset and occasional emotional reactivity to deliver thorough safety reports while flexibly adapting to on‑site surprises.
  sports: Evelyn Batts, a 31‑year‑old avid weekend hiker who frequents DeSoto National Forest trails, also roots for the Mississippi State Bulldogs football team and the New Orleans Saints while participating
    in a community running club that meets every Saturday morning.
  arts: Evelyn Batts, a 31‑year‑old devoted gospel‑choir vocalist at her church, finds inspiration in the soulful sounds of Aretha Franklin and Marvin Gaye, dances to contemporary R&B and hip‑hop tracks
    at neighborhood gatherings, and unwinds with mystery novels by Tana French while exploring local art festivals featuring works by regional painters like John Smith.
  travel: Evelyn Batts, a 31‑year‑old who enjoys balanced getaways that combine historic Southern architecture tours—such as weekend trips to Savannah, Georgia, and New Orleans, Louisiana—with spontaneous
    day trips to nearby state parks, yet her busy schedule and anxiety sometimes limit her to short, well‑structured stays.
  culinary: Evelyn Batts, a 31‑year‑old passionate home chef, regularly crafts soul‑food classics like gumbo simmered with okra, roux, and fresh garden tomatoes, and fried catfish seasoned with cornmeal,
    while also delighting friends with collard greens sautéed with smoked turkey and cornbread made from scratch.
  core: Evelyn Batts, a 31‑year‑old building inspector, blends meticulous professionalism with spontaneous creativity, balancing a structured career against a lively home life filled with gardening, gospel
    music, and soulful cooking, while navigating anxiety‑driven habits and a drive to mentor others.
background:
  cultural: Evelyn grew up in Hattiesburg, Mississippi, as part of a close‑knit African‑American community that values family, faith, and shared cultural traditions. Her upbringing was shaped by Southern
    Black heritage, including gospel music, soul food, and the storytelling traditions of the region. She takes pride in the historical legacy of Mississippi’s Black builders and craftsmen, and she often
    volunteers with local initiatives that preserve historic neighborhoods and promote safe, affordable housing. Evelyn’s cultural identity informs her commitment to service, her love of community gatherings,
    and her appreciation for the resilience and creativity of Black Southern culture.
