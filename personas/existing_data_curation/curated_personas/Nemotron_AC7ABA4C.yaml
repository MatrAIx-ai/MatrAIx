  hobbies: '[''Gardening'', ''Southern cooking'', ''Gospel choir participation'', ''Yoga'', ''Hiking'', ''Reading mystery novels'', ''Attending art festivals'', ''Social dancing'']'
  career_goals: Evelyn aims to earn an ICC Certified Building Inspector credential and eventually move into a senior supervisory role within the county’s building department. She plans to complete her bachelor’s
    degree in construction management to broaden her technical expertise and to position herself for a future consulting practice focused on energy‑efficient retrofits for historic homes in the South. Balancing
    her career aspirations with her emotional well‑being, Evelyn also seeks to develop stronger time‑management habits, reduce workplace stress, and mentor other young inspectors from underrepresented backgrounds.
