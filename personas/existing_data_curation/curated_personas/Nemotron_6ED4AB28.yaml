  career_goals: In the next five years, Lavada aims to advance to a regional district manager role overseeing multiple stores across Orange County, where she can leverage her data‑driven approach to elevate
    sales performance and operational standards. She also aspires to develop a structured mentorship program for emerging retail supervisors, emphasizing resilience and analytical thinking. Long‑term, she
    envisions transitioning to a boutique art‑gallery management position or consulting for retailers seeking to integrate artistic concepts into their brand experience, combining her expertise in retail
    with her passion for visual arts.
