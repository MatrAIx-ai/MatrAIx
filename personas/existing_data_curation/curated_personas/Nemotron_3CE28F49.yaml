personas:
  professional: Joanne Smith, an 18-year-old certified diesel-engine specialist, blends methodical precision with a curiosity for new technologies; they excel at diagnosing heavy-duty powertrains, interpreting
    schematics, and leading team coordination while habitually planning every repair step ahead of time.
  sports: Joanne Smith fuels their fitness routine with early-morning beach jogs, competitive beach-volleyball matches at the Pensacola Beach V.O.Y. Club, and occasional weight-lifting sessions, while they
    cheer for the Tampa Bay Buccaneers in the fall, the Miami Heat during winter, and support the local Pensacola Blue Wahoos baseball team when the season rolls around.
  arts: Joanne Smith channels their creative side through editing truck-scape photography and attending live shows ranging from H.E.R. to gospel legend Mavis Staples, often singing karaoke to classic Southern
    soul tracks, while they also find inspiration in sci-fi illustrations and the contemporary mural program at the Pensacola Museum of Art.
  travel: Joanne Smith prefers low-cost road-trip adventures along the Gulf Coast, having already explored Key West, New Orleans, and Savannah by day and dreaming of a future backpacking journey through
    Bali's rice terraces, they always plan routes with a mix of Spotify road-trip playlists and spontaneous stops at local diners.
  culinary: Joanne Smith enjoys cooking Southern comfort food, skillfully preparing shrimp-and-grits with Cajun spices, collard greens flavored with smoked turkey, and fresh banana-pudding, while they also
    experiment with gourmet burgers on weekends, and they never turn down a plate of fried catfish with hush puppies at a beachfront food truck.
  core: Joanne Smith merges teenage optimism with disciplined precision, balancing the roar of diesel engines and the rhythm of gospel beats while they constantly wrestle with worry and a love for meticulous
    planning.
background:
  cultural: Joanne grew up in the historic African-American community of Pensacola, where church, family gatherings, and Southern culinary traditions shaped her worldview. Influenced by the vibrant local
    music scene—blues, gospel, and contemporary R&B—she embraces a strong sense of community responsibility and resilience. As a Black woman in a traditionally male-dominated trade, she draws on the legacy
    of pioneering African-American craftsmen in the region, and her family's emphasis on education and self-reliance fuels her ambition to blaze a path for the next generation.
attributes:
  skills: '[''Diesel engine diagnostics'', ''Heavy-duty brake system repair'', ''Hydraulic system maintenance'', ''Technical blueprint reading'', ''Electronic control module troubleshooting'', ''Welding
    basics'', ''EPA emissions compliance'', ''Inventory management'', ''Customer service communication'', ''Team coordination'']'
  hobbies: '[''Truck restoration projects'', ''DIY electronics'', ''Hip-hop and R&B music'', ''Beach volleyball'', ''Reading technical manuals and science-fiction'', ''Vehicle photography'', ''Cooking Southern
    cuisine'', ''Volunteering at a youth community center'', ''Jogging along the Gulf Coast'', ''Video-game simulations (e.g., Euro Truck Simulator)'']'
  career_goals: Short-term, Joanne aims to earn her ASE Master Technician certification in diesel and become the lead mechanic at a local fleet service center. She plans to enroll in advanced courses on
    alternative-fuel engines and to mentor new apprentices, especially other young women of color. Long-term, she envisions opening her own mobile diesel-repair business that serves the Gulf Coast region,
    while also partnering with community colleges to develop outreach programs that encourage under-represented students to enter the skilled-trade workforce. She aspires to be recognized as a thought leader
    in sustainable heavy-vehicle technologies.
